verses:
  '1':
  - type: text
    content: ' PAUL, SILVANUS (Silas), and Timothy, to the assembly (church) of the Thessalonians in God the Father and the Lord Jesus Christ (the Messiah): Grace (spiritual blessing and divine favor) to you and [heart] peace.'
  '10':
  - type: text
    content: ' And [how you] look forward to '
  - type: text
    content: and
  - type: text
    content: ' await the coming of His Son from heaven, Whom He raised from the dead–Jesus, Who personally rescues '
  - type: text
    content: and
  - type: text
    content: ' delivers us out of '
  - type: text
    content: and
  - type: text
    content: ' from the wrath [bringing punishment] which is coming [upon the impenitent] '
  - type: text
    content: and
  - type: text
    content: ' draws us to Himself [investing us with all the privileges and rewards of the new life in Christ, the Messiah].'
  '2':
  - type: text
    content: ' We are ever giving thanks to God for all of you, continually mentioning [you when engaged] in our prayers,'
  '3':
  - type: text
    content: ' Recalling unceasingly before our God and Father your work energized by faith and service motivated by love and unwavering hope in [the return of] our Lord Jesus Christ (the Messiah). [I Thess. 1:10.]'
  '4':
  - type: text
    content: ' [O] brethren beloved by God, we recognize '
  - type: text
    content: and
  - type: text
    content: ' know that He has selected (chosen) you;'
  '5':
  - type: text
    content: ' For our [preaching of the] glad tidings (the Gospel) came to you not only in word, but also in [its own inherent] power and in the Holy Spirit and with great conviction '
  - type: text
    content: and
  - type: text
    content: ' absolute certainty [on our part]. You know what kind of men we proved [ourselves] to be among you for your good.'
  '6':
  - type: text
    content: ' And you [set yourselves to] become imitators of us and [through us] of the Lord Himself, for you welcomed our message in [spite of] much persecution, with joy [inspired] by the Holy Spirit;'
  '7':
  - type: text
    content: ' So that you [thus] became a pattern to all the believers (those who adhere to, trust in, and rely on Christ Jesus) in Macedonia and Achaia (most of Greece).'
  '8':
  - type: text
    content: ' For not only has the Word concerning '
  - type: text
    content: and
  - type: text
    content: ' from the Lord resounded forth from you unmistakably in Macedonia and Achaia, but everywhere the report has gone forth of your faith in God [of your leaning of your whole personality on Him in complete trust and confidence in His power, wisdom, and goodness]. So we [find that we] never need to tell people anything [further about it].'
  '9':
  - type: text
    content: ' For they themselves volunteer testimony concerning us, telling what an entrance we had among you, and how you turned to God from [your] idols to serve a God Who is alive and true '
  - type: text
    content: and
  - type: text
    content: ' genuine,'
