document_id: ISA.35,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE WILDERNESS and the dry land shall be glad; the desert shall rejoice and blossom like the rose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the autumn crocus.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the ransomed of the Lord shall return and come to Zion with singing, and everlasting joy shall be upon their heads; they shall obtain joy and gladness, and sorrow and sighing shall flee away.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' It shall blossom abundantly and rejoice even with joy and singing. The glory of Lebanon shall be given to it, the excellency of [Mount] Carmel and [the plain] of Sharon. They shall see the glory of the Lord, the majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excellency of our God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Strengthen the weak hands and make firm the feeble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tottering knees. [Heb. 12:12.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Say to those who are of a fearful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hasty heart, Be strong, fear not! Behold, your God will come with vengeance; with the recompense of God He will come and save you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then the eyes of the blind shall be opened, and the ears of the deaf shall be unstopped.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then shall the lame man leap like a hart, and the tongue of the dumb shall sing for joy. For waters shall break forth in the wilderness and streams in the desert. [Matt. 11:5.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And the burning sand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the mirage shall become a pool, and the thirsty ground springs of water; in the haunt of jackals, where they lay resting, shall be grass with reeds and rushes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And a highway shall be there, and a way; and it shall be called the Holy Way. The unclean shall not pass over it, but it shall be for the redeemed; the wayfaring men, yes, the simple ones '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fools, shall not err in it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lose their way.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' No lion shall be there, nor shall any ravenous beast come up on it; they shall not be found there. But the redeemed shall walk on it.'
