document_id: EZK.34,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE word of the Lord came to me, saying,'
  '10':
  - type: text
    content: ' Thus says the Lord God: Behold, I am against the shepherds, and I will require My sheep at their hand and cause them to cease feeding the sheep, neither shall the shepherds feed themselves any more. I will rescue My sheep from their mouths, that they may not be food for them.'
  '11':
  - type: text
    content: ' For thus says the Lord God: Behold, I, I Myself, will search for My sheep and will seek them out.'
  '12':
  - type: text
    content: ' As a shepherd seeks out his sheep in the day that he is among his flock that are scattered, so will I seek out My sheep; and I will rescue them out of all places where they have been scattered in the day of clouds and thick darkness.'
  '13':
  - type: text
    content: ' And I will bring them out from the peoples and gather them from the countries and will bring them to their own land; and I will feed them upon the mountains of Israel, by the watercourses, and in all the inhabited places of the country.'
  '14':
  - type: text
    content: ' I will feed them with good pasture, and upon the high mountains of Israel shall their fold be; there shall they lie down in a good fold, and in a fat pasture shall they feed upon the mountains of Israel.'
  '15':
  - type: text
    content: ' I will feed My sheep and I will cause them to lie down, says the Lord God.'
  '16':
  - type: text
    content: ' I will seek that which was lost and bring back that which has strayed, and I will bandage the hurt '
  - type: text
    content: and
  - type: text
    content: ' the crippled and will strengthen the weak '
  - type: text
    content: and
  - type: text
    content: ' the sick, but I will destroy the fat and the strong [who have become hardhearted and perverse]; I will feed them with judgment '
  - type: text
    content: and
  - type: text
    content: ' punishment. [Luke 19:10.]'
  '17':
  - type: text
    content: ' And as for you, O My flock, thus says the Lord God: Behold, I judge between sheep and sheep, between the rams and the great he-goats [the malicious and the tyrants of the pasture].'
  '18':
  - type: text
    content: ' Is it too little for you that you feed on the best pasture, but you must tread down with your feet the rest of your pasture? And to have drunk of the waters clarified by subsiding, but you must foul the rest of the water with your feet?'
  '19':
  - type: text
    content: ' And My flock, must they feed on what your feet have trodden and drink what your feet have fouled?'
  '2':
  - type: text
    content: ' Son of man, prophesy against the shepherds of Israel; prophesy and say to them, even to the [spiritual] shepherds, Thus says the Lord God: Woe to the [spiritual] shepherds of Israel who feed themselves! Should not the shepherds feed the sheep?'
  '20':
  - type: text
    content: ' Therefore thus says the Lord God to them: Behold, I, I Myself, will judge between fat sheep and impoverished sheep, '
  - type: text
    content: or
  - type: text
    content: ' fat goats and lean goats.'
  '21':
  - type: text
    content: ' Because you push with side and with shoulder and thrust with your horns all those that have become weak '
  - type: text
    content: and
  - type: text
    content: ' diseased, till you have scattered them abroad,'
  '22':
  - type: text
    content: ' Therefore will I rescue My flock, and they shall no more be a prey; and I will judge between sheep and sheep.'
  '23':
  - type: text
    content: ' And I will raise up over them one Shepherd and He shall feed them, even My Servant David; He shall feed them and He shall be their Shepherd. [Ezek. 37:24; John 10:14-18.]'
  '24':
  - type: text
    content: ' And I the Lord will be their God and My Servant David a Prince among them; I the Lord have spoken it.'
  '25':
  - type: text
    content: ' And I will confirm with them a covenant of peace and will cause the evil beasts to cease out of the land, and [My people] shall dwell safely in the wilderness, desert, '
  - type: text
    content: or
  - type: text
    content: ' pastureland and sleep [confidently] in the woods. [Ps. 127:2b; Isa. 11:6-9; John 14:27; 16:33.]'
  '26':
  - type: text
    content: ' And I will make them and the places round about My hill a blessing, and I will cause the showers to come down in their season; there shall be showers of blessing [of good insured by God''s favor].'
  '27':
  - type: text
    content: ' And the tree of the field shall yield its fruit and the earth shall yield its increase; and [My people] shall be secure in their land, and they shall be confident '
  - type: text
    content: and
  - type: text
    content: ' know (understand and realize) that I am the Lord, when I have broken the bars of their yoke and have delivered them out of the hand of those who made slaves of them.'
  '28':
  - type: text
    content: ' And they shall no more be a prey to the nations, nor shall the beasts of the earth devour them, but they shall dwell safely and none shall make them afraid [in the day of the Messiah''s reign]. [Isa. 60:21; 61:3.]'
  '29':
  - type: text
    content: ' And I will raise up for them a planting of crops for renown, and they shall be no more consumed with hunger in the land nor bear the reproach of the nations any longer.'
  '3':
  - type: text
    content: ' You eat the fat, you clothe yourselves with the wool, you kill the fatlings, but you do not feed the sheep.'
  '30':
  - type: text
    content: ' Then shall they know [positively] that I, the Lord their God, am with them and that they, the house of Israel, are My people, says the Lord God,'
  '31':
  - type: text
    content: ' And that you, My sheep, the sheep of My pasture, are [only] men and I am your God, says the Lord God.'
  '4':
  - type: text
    content: ' The diseased '
  - type: text
    content: and
  - type: text
    content: ' weak you have not strengthened, the sick you have not healed, the hurt '
  - type: text
    content: and
  - type: text
    content: ' crippled you have not bandaged, those gone astray you have not brought back, the lost you have not sought to find, but with force and hardhearted harshness you have ruled them.'
  '5':
  - type: text
    content: ' And they were scattered because there was no shepherd, and when they were scattered they became food for all the wild beasts of the field.'
  '6':
  - type: text
    content: ' My sheep wandered through all the mountains and upon every high hill; yes, My sheep were scattered upon all the face of the earth and no one searched or sought for them. [Matt. 9:36.]'
  '7':
  - type: text
    content: ' Therefore, you [spiritual] shepherds, hear the word of the Lord:'
  '8':
  - type: text
    content: ' As I live, says the Lord God, surely because My sheep became a prey, and My sheep became food for every beast of the field because there was no shepherd–neither did My shepherds search for My sheep, but the shepherds fed themselves and fed not My sheep–'
  '9':
  - type: text
    content: ' Therefore, O you [spiritual] shepherds, hear the word of the Lord:'
