document_id: EZK.34
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, prophesy against the shepherds of Israel; prophesy and say to them, even to the [spiritual] shepherds, Thus says the Lord God: Woe to the [spiritual] shepherds of Israel who feed themselves! Should not the shepherds feed the sheep?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You eat the fat, you clothe yourselves with the wool, you kill the fatlings, but you do not feed the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The diseased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak you have not strengthened, the sick you have not healed, the hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crippled you have not bandaged, those gone astray you have not brought back, the lost you have not sought to find, but with force and hardhearted harshness you have ruled them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they were scattered because there was no shepherd, and when they were scattered they became food for all the wild beasts of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' My sheep wandered through all the mountains and upon every high hill; yes, My sheep were scattered upon all the face of the earth and no one searched or sought for them. [Matt. 9:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore, you [spiritual] shepherds, hear the word of the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As I live, says the Lord God, surely because My sheep became a prey, and My sheep became food for every beast of the field because there was no shepherd–neither did My shepherds search for My sheep, but the shepherds fed themselves and fed not My sheep–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore, O you [spiritual] shepherds, hear the word of the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Thus says the Lord God: Behold, I am against the shepherds, and I will require My sheep at their hand and cause them to cease feeding the sheep, neither shall the shepherds feed themselves any more. I will rescue My sheep from their mouths, that they may not be food for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For thus says the Lord God: Behold, I, I Myself, will search for My sheep and will seek them out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' As a shepherd seeks out his sheep in the day that he is among his flock that are scattered, so will I seek out My sheep; and I will rescue them out of all places where they have been scattered in the day of clouds and thick darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I will bring them out from the peoples and gather them from the countries and will bring them to their own land; and I will feed them upon the mountains of Israel, by the watercourses, and in all the inhabited places of the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I will feed them with good pasture, and upon the high mountains of Israel shall their fold be; there shall they lie down in a good fold, and in a fat pasture shall they feed upon the mountains of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I will feed My sheep and I will cause them to lie down, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will seek that which was lost and bring back that which has strayed, and I will bandage the hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the crippled and will strengthen the weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sick, but I will destroy the fat and the strong [who have become hardhearted and perverse]; I will feed them with judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment. [Luke 19:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And as for you, O My flock, thus says the Lord God: Behold, I judge between sheep and sheep, between the rams and the great he-goats [the malicious and the tyrants of the pasture].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Is it too little for you that you feed on the best pasture, but you must tread down with your feet the rest of your pasture? And to have drunk of the waters clarified by subsiding, but you must foul the rest of the water with your feet?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And My flock, must they feed on what your feet have trodden and drink what your feet have fouled?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Therefore thus says the Lord God to them: Behold, I, I Myself, will judge between fat sheep and impoverished sheep, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fat goats and lean goats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Because you push with side and with shoulder and thrust with your horns all those that have become weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' diseased, till you have scattered them abroad,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Therefore will I rescue My flock, and they shall no more be a prey; and I will judge between sheep and sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And I will raise up over them one Shepherd and He shall feed them, even My Servant David; He shall feed them and He shall be their Shepherd. [Ezek. 37:24; John 10:14-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And I the Lord will be their God and My Servant David a Prince among them; I the Lord have spoken it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And I will confirm with them a covenant of peace and will cause the evil beasts to cease out of the land, and [My people] shall dwell safely in the wilderness, desert, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pastureland and sleep [confidently] in the woods. [Ps. 127:2b; Isa. 11:6-9; John 14:27; 16:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And I will make them and the places round about My hill a blessing, and I will cause the showers to come down in their season; there shall be showers of blessing [of good insured by God''s favor].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the tree of the field shall yield its fruit and the earth shall yield its increase; and [My people] shall be secure in their land, and they shall be confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know (understand and realize) that I am the Lord, when I have broken the bars of their yoke and have delivered them out of the hand of those who made slaves of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they shall no more be a prey to the nations, nor shall the beasts of the earth devour them, but they shall dwell safely and none shall make them afraid [in the day of the Messiah''s reign]. [Isa. 60:21; 61:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And I will raise up for them a planting of crops for renown, and they shall be no more consumed with hunger in the land nor bear the reproach of the nations any longer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then shall they know [positively] that I, the Lord their God, am with them and that they, the house of Israel, are My people, says the Lord God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And that you, My sheep, the sheep of My pasture, are [only] men and I am your God, says the Lord God.'
