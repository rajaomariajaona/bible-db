document_id: GEN.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE whole earth was of one language and of one accent '
  - type: text
    content: and
  - type: text
    content: ' mode of expression.'
  '10':
  - type: text
    content: ' This is the history of the generations of Shem. Shem was 100 years old when he became the father of Arpachshad, two years after the flood.'
  '11':
  - type: text
    content: ' And Shem lived after Arpachshad was born 500 years and had other sons and daughters.'
  '12':
  - type: text
    content: ' When Arpachshad had lived 35 years, he became the father of Shelah.'
  '13':
  - type: text
    content: ' Arpachshad lived after Shelah was born 403 years and had other sons and daughters.'
  '14':
  - type: text
    content: ' When Shelah had lived 30 years, he became the father of Eber.'
  '15':
  - type: text
    content: ' Shelah lived after Eber was born 403 years and had other sons and daughters.'
  '16':
  - type: text
    content: ' When Eber had lived 34 years, he became the father of Peleg.'
  '17':
  - type: text
    content: ' And Eber lived after Peleg was born 430 years and had other sons and daughters.'
  '18':
  - type: text
    content: ' When Peleg had lived 30 years, he became the father of Reu.'
  '19':
  - type: text
    content: ' And Peleg lived after Reu was born 209 years and had other sons and daughters.'
  '2':
  - type: text
    content: ' And as they journeyed eastward, they found a plain (valley) in the land of Shinar, and they settled '
  - type: text
    content: and
  - type: text
    content: ' dwelt there.'
  '20':
  - type: text
    content: ' When Reu had lived 32 years, he became the father of Serug.'
  '21':
  - type: text
    content: ' And Reu lived after Serug was born 207 years and had other sons and daughters.'
  '22':
  - type: text
    content: ' When Serug had lived 30 years, he became the father of Nahor.'
  '23':
  - type: text
    content: ' And Serug lived after Nahor was born 200 years and had other sons and daughters.'
  '24':
  - type: text
    content: ' When Nahor had lived 29 years, he became the father of Terah.'
  '25':
  - type: text
    content: ' And Nahor lived after Terah was born 119 years and had other sons and daughters.'
  '26':
  - type: text
    content: ' After Terah had lived 70 years, he became the father of [at different times], Abram and Nahor and Haran, [his firstborn].'
  '27':
  - type: text
    content: ' Now this is the history of the descendants of Terah. Terah was the father of Abram, Nahor, and Haran; and Haran was the father of Lot.'
  '28':
  - type: text
    content: ' Haran died before his father Terah [died] in the land of his birth, in Ur of the Chaldees.'
  '29':
  - type: text
    content: ' And Abram and Nahor took wives. The name of Abram''s wife was Sarai, and the name of Nahor''s wife was Milcah, the daughter of Haran the father of Milcah and Iscah.'
  '3':
  - type: text
    content: ' And they said one to another, Come, let us make bricks and burn them thoroughly. So they had brick for stone, and slime (bitumen) for mortar.'
  '30':
  - type: text
    content: ' But Sarai was barren; she had no child.'
  '31':
  - type: text
    content: ' And Terah took Abram his son, Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram''s wife, and they went forth together to go from Ur of the Chaldees into the land of Canaan; but when they came to Haran, they settled there.'
  '32':
  - type: text
    content: ' And Terah lived 205 years; and Terah died in Haran.'
  '4':
  - type: text
    content: ' And they said, Come, let us build us a city and a tower whose top reaches into the sky, and let us make a name for ourselves, lest we be scattered over the whole earth.'
  '5':
  - type: text
    content: ' And the Lord came down to see the city and the tower which the sons of men had built.'
  '6':
  - type: text
    content: ' And the Lord said, Behold, they are one people and they have all one language; and this is only the beginning of what they will do, and now nothing they have imagined they can do will be impossible for them.'
  '7':
  - type: text
    content: ' Come, let Us go down and there confound (mix up, confuse) their language, that they may not understand one another''s speech.'
  '8':
  - type: text
    content: ' So the Lord scattered them abroad from that place upon the face of the whole earth, and they gave up building the city.'
  '9':
  - type: text
    content: ' Therefore the name of it was called Babel–because there the Lord confounded the language of all the earth; and from that place the Lord scattered them abroad upon the face of the whole earth.'
