document_id: GEN.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE whole earth was of one language and of one accent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mode of expression.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And as they journeyed eastward, they found a plain (valley) in the land of Shinar, and they settled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelt there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they said one to another, Come, let us make bricks and burn them thoroughly. So they had brick for stone, and slime (bitumen) for mortar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they said, Come, let us build us a city and a tower whose top reaches into the sky, and let us make a name for ourselves, lest we be scattered over the whole earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Lord came down to see the city and the tower which the sons of men had built.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord said, Behold, they are one people and they have all one language; and this is only the beginning of what they will do, and now nothing they have imagined they can do will be impossible for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Come, let Us go down and there confound (mix up, confuse) their language, that they may not understand one another''s speech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So the Lord scattered them abroad from that place upon the face of the whole earth, and they gave up building the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore the name of it was called Babel–because there the Lord confounded the language of all the earth; and from that place the Lord scattered them abroad upon the face of the whole earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' This is the history of the generations of Shem. Shem was 100 years old when he became the father of Arpachshad, two years after the flood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Shem lived after Arpachshad was born 500 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When Arpachshad had lived 35 years, he became the father of Shelah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Arpachshad lived after Shelah was born 403 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When Shelah had lived 30 years, he became the father of Eber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Shelah lived after Eber was born 403 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When Eber had lived 34 years, he became the father of Peleg.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Eber lived after Peleg was born 430 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When Peleg had lived 30 years, he became the father of Reu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Peleg lived after Reu was born 209 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When Reu had lived 32 years, he became the father of Serug.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Reu lived after Serug was born 207 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When Serug had lived 30 years, he became the father of Nahor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Serug lived after Nahor was born 200 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When Nahor had lived 29 years, he became the father of Terah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Nahor lived after Terah was born 119 years and had other sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' After Terah had lived 70 years, he became the father of [at different times], Abram and Nahor and Haran, [his firstborn].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now this is the history of the descendants of Terah. Terah was the father of Abram, Nahor, and Haran; and Haran was the father of Lot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Haran died before his father Terah [died] in the land of his birth, in Ur of the Chaldees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Abram and Nahor took wives. The name of Abram''s wife was Sarai, and the name of Nahor''s wife was Milcah, the daughter of Haran the father of Milcah and Iscah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But Sarai was barren; she had no child.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Terah took Abram his son, Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram''s wife, and they went forth together to go from Ur of the Chaldees into the land of Canaan; but when they came to Haran, they settled there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And Terah lived 205 years; and Terah died in Haran.'
