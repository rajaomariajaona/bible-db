document_id: ZEP.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE WORD of the Lord which came to Zephaniah son of Cushi, the son of Gedaliah, the son of Amariah, the son of Hezekiah, in the days of Josiah king of Judah and son of Amon.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in that day, says the Lord, there shall be heard the voice of crying from the Fish Gate [in the wall of Jerusalem] and a wailing from the Second Quarter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Lower City and a great crashing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sound of destruction from the hills.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wail, you inhabitants of the Mortar [those located in the hollow part of the city]! For all the merchant people, like the people of Canaan, will be silent [entirely destroyed]; all those who weighed out silver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were loaded with it will be cut off.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And at that time I will search Jerusalem with lamps and punish the men who [like old wine] are thickening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' settling on their lees, who say in their hearts, The Lord will not do good, nor will He do evil.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their wealth shall become plunder and their houses a desolation. Though they build houses, they shall not inhabit them; though they plant vineyards, they shall not drink the wine from them. [Deut. 28:30, 39; Amos 5:11, 12.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The great day of the Lord is near–near and hastening fast. Hark! the voice of the day of the Lord! The mighty man [unable to fight or to flee] will cry then bitterly.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That day is a day of wrath, a day of distress and anguish, a day of ruin and devastation, a day of darkness and gloom, a day of clouds and thick darkness, [Jer. 30:7; Joel 2:11; Amos 5:18.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A day of the blast of trumpet and battle cry against the fortified cities and against the high towers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' battlements.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will bring distress upon men, so that they shall walk like blind men, because they have sinned against the Lord; their blood shall be poured out like dust and their flesh like dung.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Neither their silver nor their gold shall be able to deliver them in the day of the Lord''s indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath. But the whole earth shall be consumed in the fire of His jealous wrath, for a full, yes, a sudden, end will He make of all the inhabitants of the earth. [Luke 21:35, 36; II Pet. 3:10-13.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By taking away I will make an end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I will utterly consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sweep away all things from the face of the earth, says the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sweep away man and beast; I will consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sweep away the birds of the air and the fish of the sea. I will overthrow the stumbling blocks (the idols) with the wicked [worshipers], and I will cut off mankind from the face of the earth, says the Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will also stretch out My hand over Judah and over all the inhabitants of Jerusalem, and I will cut off the remnant of Baal from this place and the name of the idol priests with the [false] priests,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those who worship the starry host of the heavens upon their housetops and those who [pretend to] worship the Lord and swear by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to Him and yet swear by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to [the heathen god Molech or] Malcam [their idol king],'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those who have drawn back from following the Lord and those who have not sought the Lord nor inquired for, inquired of, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' required the Lord [as their first necessity].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Hush!] Be silent before the Lord God, for the day [of the vengeance] of the Lord is near; for the Lord has prepared a sacrifice, and He has set apart [for His use] those who have accepted His invitation. [Hab. 2:20.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the day of the Lord''s sacrifice, I will punish the officials and the king''s sons and all who are clothed in [lavish] foreign apparel [instead of the Jewish dress, with its reminders to obey God''s commandments]. [Num. 15:38, 39.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the same day also will I punish all those who leap swiftly on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' over the threshold [upon entering houses to steal], who fill their master''s house with violence and deceit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fraud.'
