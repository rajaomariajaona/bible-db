document_id: GEN.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE days of the kings Amraphel of Shinar, Arioch of Ellasar, Chedorlaomer of Elam, and Tidal of Goiim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They made war on the kings Bera of Sodom, Birsha of Gomorrah, Shinab of Admah, Shemeber of Zeboiim, and the king of Bela, that is, Zoar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The latter kings joined together [as allies] in the Valley of Siddim, which is [now] the [Dead] Sea of Salt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Twelve years they had served Chedorlaomer, but in the thirteenth year they rebelled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And in the fourteenth year, Chedorlaomer and the kings who were with him attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' subdued the Rephaim in Ashteroth-karnaim, the Zuzim in Ham, and the Emim in Shaveh-kiriathaim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Horites in their Mount Seir as far as El-paran, which is on the border of the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then they turned back and came to En-mishpat, which [now] is Kadesh, and subdued all the country of the Amalekites, and also the Amorites who dwelt in Hazazon-tamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then the kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela, that is, Zoar, went out and [together] they joined battle [with those kings] in the Valley of Siddim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' With the kings Chedorlaomer of Elam, Tidal of Goiim, Amraphel of Shinar, and Arioch of Ellasar–four kings against five.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now the Valley of Siddim was full of slime '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bitumen pits, and as the kings of Sodom and Gomorrah fled, they fell (were overthrown) there and the remainder [of the kings] fled to the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' [The victors] took all the wealth of Sodom and Gomorrah and all the supply of provisions and departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they also took Lot, Abram''s brother''s son, who dwelt in Sodom, and his goods away with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then one who had escaped came and told Abram the Hebrew [one from the other side], who was living by the oaks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' terebinths of Mamre the Amorite, a brother of Eshcol and of Aner–these were allies of Abram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When Abram heard that [his nephew] had been captured, he armed (led forth) the 318 trained servants born in his own house and pursued the enemy as far as Dan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He divided his forces against them by night, he and his servants, and attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' routed them, and pursued them as far as Hobah, which is north of Damascus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he brought back all the goods and also brought back his kinsman Lot and his possessions, the women also and the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' After his [Abram''s] return from the defeat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slaying of Chedorlaomer and the kings who were with him, the king of Sodom went out to meet him at the Valley of Shaveh, that is, the King''s Valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Melchizedek king of Salem [later called Jerusalem] brought out bread and wine [for their nourishment]; he was the priest of God Most High,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And he blessed him and said, Blessed (favored with blessings, made blissful, joyful) be Abram by God Most High, Possessor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Maker of heaven and earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And blessed, praised, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified be God Most High, Who has given your foes into your hand! And [Abram] gave him a tenth of all [he had taken]. [Heb. 7:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the king of Sodom said to Abram, Give me the persons and keep the goods for yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But Abram said to the king of Sodom, I have lifted up my hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sworn to the Lord, God Most High, the Possessor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Maker of heaven and earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' That I would not take a thread or a shoelace or anything that is yours, lest you should say, I have made Abram rich.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' [Take all] except only what my young men have eaten and the share of the men [allies] who went with me–Aner, Eshcol, and Mamre; let them take their portion.'
