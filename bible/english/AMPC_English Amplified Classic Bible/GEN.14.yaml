document_id: GEN.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE days of the kings Amraphel of Shinar, Arioch of Ellasar, Chedorlaomer of Elam, and Tidal of Goiim,'
  '10':
  - type: text
    content: ' Now the Valley of Siddim was full of slime '
  - type: text
    content: or
  - type: text
    content: ' bitumen pits, and as the kings of Sodom and Gomorrah fled, they fell (were overthrown) there and the remainder [of the kings] fled to the mountain.'
  '11':
  - type: text
    content: ' [The victors] took all the wealth of Sodom and Gomorrah and all the supply of provisions and departed.'
  '12':
  - type: text
    content: ' And they also took Lot, Abram''s brother''s son, who dwelt in Sodom, and his goods away with them.'
  '13':
  - type: text
    content: ' Then one who had escaped came and told Abram the Hebrew [one from the other side], who was living by the oaks '
  - type: text
    content: or
  - type: text
    content: ' terebinths of Mamre the Amorite, a brother of Eshcol and of Aner–these were allies of Abram.'
  '14':
  - type: text
    content: ' When Abram heard that [his nephew] had been captured, he armed (led forth) the 318 trained servants born in his own house and pursued the enemy as far as Dan.'
  '15':
  - type: text
    content: ' He divided his forces against them by night, he and his servants, and attacked '
  - type: text
    content: and
  - type: text
    content: ' routed them, and pursued them as far as Hobah, which is north of Damascus.'
  '16':
  - type: text
    content: ' And he brought back all the goods and also brought back his kinsman Lot and his possessions, the women also and the people.'
  '17':
  - type: text
    content: ' After his [Abram''s] return from the defeat '
  - type: text
    content: and
  - type: text
    content: ' slaying of Chedorlaomer and the kings who were with him, the king of Sodom went out to meet him at the Valley of Shaveh, that is, the King''s Valley.'
  '18':
  - type: text
    content: ' Melchizedek king of Salem [later called Jerusalem] brought out bread and wine [for their nourishment]; he was the priest of God Most High,'
  '19':
  - type: text
    content: ' And he blessed him and said, Blessed (favored with blessings, made blissful, joyful) be Abram by God Most High, Possessor '
  - type: text
    content: and
  - type: text
    content: ' Maker of heaven and earth,'
  '2':
  - type: text
    content: ' They made war on the kings Bera of Sodom, Birsha of Gomorrah, Shinab of Admah, Shemeber of Zeboiim, and the king of Bela, that is, Zoar.'
  '20':
  - type: text
    content: ' And blessed, praised, '
  - type: text
    content: and
  - type: text
    content: ' glorified be God Most High, Who has given your foes into your hand! And [Abram] gave him a tenth of all [he had taken]. [Heb. 7:1-10.]'
  '21':
  - type: text
    content: ' And the king of Sodom said to Abram, Give me the persons and keep the goods for yourself.'
  '22':
  - type: text
    content: ' But Abram said to the king of Sodom, I have lifted up my hand '
  - type: text
    content: and
  - type: text
    content: ' sworn to the Lord, God Most High, the Possessor '
  - type: text
    content: and
  - type: text
    content: ' Maker of heaven and earth,'
  '23':
  - type: text
    content: ' That I would not take a thread or a shoelace or anything that is yours, lest you should say, I have made Abram rich.'
  '24':
  - type: text
    content: ' [Take all] except only what my young men have eaten and the share of the men [allies] who went with me–Aner, Eshcol, and Mamre; let them take their portion.'
  '3':
  - type: text
    content: ' The latter kings joined together [as allies] in the Valley of Siddim, which is [now] the [Dead] Sea of Salt.'
  '4':
  - type: text
    content: ' Twelve years they had served Chedorlaomer, but in the thirteenth year they rebelled.'
  '5':
  - type: text
    content: ' And in the fourteenth year, Chedorlaomer and the kings who were with him attacked '
  - type: text
    content: and
  - type: text
    content: ' subdued the Rephaim in Ashteroth-karnaim, the Zuzim in Ham, and the Emim in Shaveh-kiriathaim,'
  '6':
  - type: text
    content: ' And the Horites in their Mount Seir as far as El-paran, which is on the border of the wilderness.'
  '7':
  - type: text
    content: ' Then they turned back and came to En-mishpat, which [now] is Kadesh, and subdued all the country of the Amalekites, and also the Amorites who dwelt in Hazazon-tamar.'
  '8':
  - type: text
    content: ' Then the kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela, that is, Zoar, went out and [together] they joined battle [with those kings] in the Valley of Siddim,'
  '9':
  - type: text
    content: ' With the kings Chedorlaomer of Elam, Tidal of Goiim, Amraphel of Shinar, and Arioch of Ellasar–four kings against five.'
