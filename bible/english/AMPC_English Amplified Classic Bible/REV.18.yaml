document_id: REV.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw another angel descending from heaven, possessing great authority, and the earth was illuminated with his radiance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he shouted with a mighty voice, She is fallen! Mighty Babylon is fallen! She has become a resort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelling place for demons, a dungeon haunted by every loathsome spirit, an abode for every filthy and detestable bird.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For all nations have drunk the wine of her passionate unchastity, and the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders of the earth have joined with her in committing fornication (idolatry), and the businessmen of the earth have become rich with the wealth of her excessive luxury '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wantonness. [Jer. 25:15, 27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I then heard another voice from heaven saying, Come out from her, my people, so that you may not share in her sins, neither participate in her plagues. [Isa. 48:20; Jer. 50:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For her iniquities (her crimes and transgressions) are piled up as high as heaven, and God has remembered her wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [her] crimes [and calls them up for settlement]. [Jer. 51:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Repay to her what she herself has paid [to others] and double [her doom] in accordance with what she has done. Mix a double portion for her in the cup she mixed [for others]. [Ps. 137:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' To the degree that she glorified herself and reveled in her wantonness [living deliciously and luxuriously], to that measure impose on her torment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish and tears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourning. Since in her heart she boasts, I am not a widow; as a queen [on a throne] I sit, and I shall never see suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' experience sorrow–[Isa. 47:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So shall her plagues (afflictions, calamities) come thick upon her in a single day, pestilence and anguish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrow and famine; and she shall be utterly consumed (burned up with fire), for mighty is the Lord God Who judges her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders of the earth who joined her in her immorality (idolatry) and luxuriated with her will weep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beat their breasts and lament over her when they see the smoke of her conflagration. [Ezek. 26:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They will stand a long way off, in terror of her torment, and they will cry, Woe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alas, the great city, the mighty city, Babylon! In one single hour how your doom (judgment) has overtaken you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And earth''s businessmen will weep and grieve over her because no one buys their freight (cargo) any more. [Ezek. 27:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Their merchandise is of gold, silver, precious stones, and pearls; of fine linen, purple, silk, and scarlet [stuffs]; all kinds of scented wood, all sorts of articles of ivory, all varieties of objects of costly woods, bronze, iron, and marble; [Ezek. 27:12, 13, 22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Of cinnamon, spices, incense, ointment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfume, and frankincense, of wine and olive oil, fine flour and wheat; of cattle and sheep, horses and conveyances; and of slaves (the bodies) and souls of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The ripe fruits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delicacies for which your soul longed have gone from you, and all your luxuries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dainties, your elegance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor are lost to you, never again to be recovered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' experienced!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The dealers who handled these articles, who grew wealthy through their business with her, will stand a long way off, in terror of her doom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' torment, weeping and grieving aloud, and saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Alas, alas for the great city that was robed in fine linen, in purple and scarlet, bedecked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glittering with gold, with precious stones, and with pearls! [Ezek. 27:31, 36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Because in one [single] hour all the vast wealth has been destroyed (wiped out). And all ship captains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pilots, navigators and all who live by seafaring, the crews and all who ply their trade on the sea, stood a long way off, [Isa. 23:14; Ezek. 27:26-30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And exclaimed as they watched the smoke of her burning, What city could be compared to the great city!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they threw dust on their heads as they wept and grieved, exclaiming, Woe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alas, for the great city, where all who had ships on the sea grew rich [through her extravagance] from her great wealth! In one single hour she has been destroyed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has become a desert! [Ezek. 27:30-34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Rejoice (celebrate) over her, O heaven! O saints (people of God) and apostles and prophets, because God has executed vengeance for you upon her! [Isa. 44:23; Jer. 51:48.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then a single powerful angel took up a boulder like a great millstone and flung it into the sea, crying, With such violence shall Babylon the great city be hurled down to destruction and shall never again be found. [Jer. 51:63, 64; Ezek. 26:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the sound of harpists and minstrels and flute players and trumpeters shall never again be heard in you, and no skilled artisan of any craft shall ever again be found in you, and the sound of the millstone shall never again be heard in you. [Isa. 24:8; Ezek. 26:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And never again shall the light of a lamp shine in you, and the voice of bridegroom and bride shall never be heard in you again; for your businessmen were the great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prominent men of the earth, and by your magic spells '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poisonous charm all nations were led astray (seduced and deluded).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And in her was found the blood of prophets and of saints, and of all those who have been slain (slaughtered) on earth. [Jer. 51:49.]'
