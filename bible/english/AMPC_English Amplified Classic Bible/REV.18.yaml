document_id: REV.18,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN I saw another angel descending from heaven, possessing great authority, and the earth was illuminated with his radiance '
  - type: text
    content: and
  - type: text
    content: ' splendor.'
  '10':
  - type: text
    content: ' They will stand a long way off, in terror of her torment, and they will cry, Woe '
  - type: text
    content: and
  - type: text
    content: ' alas, the great city, the mighty city, Babylon! In one single hour how your doom (judgment) has overtaken you!'
  '11':
  - type: text
    content: ' And earth''s businessmen will weep and grieve over her because no one buys their freight (cargo) any more. [Ezek. 27:36.]'
  '12':
  - type: text
    content: ' Their merchandise is of gold, silver, precious stones, and pearls; of fine linen, purple, silk, and scarlet [stuffs]; all kinds of scented wood, all sorts of articles of ivory, all varieties of objects of costly woods, bronze, iron, and marble; [Ezek. 27:12, 13, 22.]'
  '13':
  - type: text
    content: ' Of cinnamon, spices, incense, ointment '
  - type: text
    content: and
  - type: text
    content: ' perfume, and frankincense, of wine and olive oil, fine flour and wheat; of cattle and sheep, horses and conveyances; and of slaves (the bodies) and souls of men!'
  '14':
  - type: text
    content: ' The ripe fruits '
  - type: text
    content: and
  - type: text
    content: ' delicacies for which your soul longed have gone from you, and all your luxuries '
  - type: text
    content: and
  - type: text
    content: ' dainties, your elegance '
  - type: text
    content: and
  - type: text
    content: ' splendor are lost to you, never again to be recovered '
  - type: text
    content: or
  - type: text
    content: ' experienced!'
  '15':
  - type: text
    content: ' The dealers who handled these articles, who grew wealthy through their business with her, will stand a long way off, in terror of her doom '
  - type: text
    content: and
  - type: text
    content: ' torment, weeping and grieving aloud, and saying,'
  '16':
  - type: text
    content: ' Alas, alas for the great city that was robed in fine linen, in purple and scarlet, bedecked '
  - type: text
    content: and
  - type: text
    content: ' glittering with gold, with precious stones, and with pearls! [Ezek. 27:31, 36.]'
  '17':
  - type: text
    content: ' Because in one [single] hour all the vast wealth has been destroyed (wiped out). And all ship captains '
  - type: text
    content: and
  - type: text
    content: ' pilots, navigators and all who live by seafaring, the crews and all who ply their trade on the sea, stood a long way off, [Isa. 23:14; Ezek. 27:26-30.]'
  '18':
  - type: text
    content: ' And exclaimed as they watched the smoke of her burning, What city could be compared to the great city!'
  '19':
  - type: text
    content: ' And they threw dust on their heads as they wept and grieved, exclaiming, Woe '
  - type: text
    content: and
  - type: text
    content: ' alas, for the great city, where all who had ships on the sea grew rich [through her extravagance] from her great wealth! In one single hour she has been destroyed '
  - type: text
    content: and
  - type: text
    content: ' has become a desert! [Ezek. 27:30-34.]'
  '2':
  - type: text
    content: ' And he shouted with a mighty voice, She is fallen! Mighty Babylon is fallen! She has become a resort '
  - type: text
    content: and
  - type: text
    content: ' dwelling place for demons, a dungeon haunted by every loathsome spirit, an abode for every filthy and detestable bird.'
  '20':
  - type: text
    content: ' Rejoice (celebrate) over her, O heaven! O saints (people of God) and apostles and prophets, because God has executed vengeance for you upon her! [Isa. 44:23; Jer. 51:48.]'
  '21':
  - type: text
    content: ' Then a single powerful angel took up a boulder like a great millstone and flung it into the sea, crying, With such violence shall Babylon the great city be hurled down to destruction and shall never again be found. [Jer. 51:63, 64; Ezek. 26:21.]'
  '22':
  - type: text
    content: ' And the sound of harpists and minstrels and flute players and trumpeters shall never again be heard in you, and no skilled artisan of any craft shall ever again be found in you, and the sound of the millstone shall never again be heard in you. [Isa. 24:8; Ezek. 26:13.]'
  '23':
  - type: text
    content: ' And never again shall the light of a lamp shine in you, and the voice of bridegroom and bride shall never be heard in you again; for your businessmen were the great '
  - type: text
    content: and
  - type: text
    content: ' prominent men of the earth, and by your magic spells '
  - type: text
    content: and
  - type: text
    content: ' poisonous charm all nations were led astray (seduced and deluded).'
  '24':
  - type: text
    content: ' And in her was found the blood of prophets and of saints, and of all those who have been slain (slaughtered) on earth. [Jer. 51:49.]'
  '3':
  - type: text
    content: ' For all nations have drunk the wine of her passionate unchastity, and the rulers '
  - type: text
    content: and
  - type: text
    content: ' leaders of the earth have joined with her in committing fornication (idolatry), and the businessmen of the earth have become rich with the wealth of her excessive luxury '
  - type: text
    content: and
  - type: text
    content: ' wantonness. [Jer. 25:15, 27.]'
  '4':
  - type: text
    content: ' I then heard another voice from heaven saying, Come out from her, my people, so that you may not share in her sins, neither participate in her plagues. [Isa. 48:20; Jer. 50:8.]'
  '5':
  - type: text
    content: ' For her iniquities (her crimes and transgressions) are piled up as high as heaven, and God has remembered her wickedness '
  - type: text
    content: and
  - type: text
    content: ' [her] crimes [and calls them up for settlement]. [Jer. 51:9.]'
  '6':
  - type: text
    content: ' Repay to her what she herself has paid [to others] and double [her doom] in accordance with what she has done. Mix a double portion for her in the cup she mixed [for others]. [Ps. 137:8.]'
  '7':
  - type: text
    content: ' To the degree that she glorified herself and reveled in her wantonness [living deliciously and luxuriously], to that measure impose on her torment '
  - type: text
    content: and
  - type: text
    content: ' anguish and tears '
  - type: text
    content: and
  - type: text
    content: ' mourning. Since in her heart she boasts, I am not a widow; as a queen [on a throne] I sit, and I shall never see suffering '
  - type: text
    content: or
  - type: text
    content: ' experience sorrow–[Isa. 47:8, 9.]'
  '8':
  - type: text
    content: ' So shall her plagues (afflictions, calamities) come thick upon her in a single day, pestilence and anguish '
  - type: text
    content: and
  - type: text
    content: ' sorrow and famine; and she shall be utterly consumed (burned up with fire), for mighty is the Lord God Who judges her.'
  '9':
  - type: text
    content: ' And the rulers '
  - type: text
    content: and
  - type: text
    content: ' leaders of the earth who joined her in her immorality (idolatry) and luxuriated with her will weep '
  - type: text
    content: and
  - type: text
    content: ' beat their breasts and lament over her when they see the smoke of her conflagration. [Ezek. 26:16, 17.]'
