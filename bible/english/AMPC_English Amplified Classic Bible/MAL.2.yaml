document_id: MAL.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND NOW, O you priests, this commandment is for you.'
  '10':
  - type: text
    content: ' Have we not all one Father? Has not one God created us? Why then do we deal faithlessly and treacherously each against his brother, profaning the covenant of [God with] our fathers?'
  '11':
  - type: text
    content: ' Judah has been faithless '
  - type: text
    content: and
  - type: text
    content: ' dealt treacherously, and an abomination has been committed in Israel and in Jerusalem; for Judah [that is, Jewish men] has profaned the holy sanctuary of the Lord which He loves, and has married the daughter of a foreign god [having divorced his Jewish wife]. [Ezra 9:2; Jer. 2:3.]'
  '12':
  - type: text
    content: ' The Lord will cast out of the tents of Jacob to the last man those who do this [evil thing], the master and the servant [or the pupil] alike, even him who brings an offering to the Lord of hosts.'
  '13':
  - type: text
    content: ' And this you do with double guilt; you cover the altar of the Lord with tears [shed by your unoffending wives, divorced by you that you might take heathen wives], and with [your own] weeping and crying out because the Lord does not regard your offering any more or accept it with favor at your hand.'
  '14':
  - type: text
    content: ' Yet you ask, Why does He reject it? Because the Lord was witness [to the covenant made at your marriage] between you and the wife of your youth, against whom you have dealt treacherously '
  - type: text
    content: and
  - type: text
    content: ' to whom you were faithless. Yet she is your companion and the wife of your covenant [made by your marriage vows].'
  '15':
  - type: text
    content: ' And did not God make [you and your wife] one [flesh]? Did not One make you and preserve your spirit alive? And why [did God make you two] one? Because He sought a godly offspring [from your union]. Therefore take heed to yourselves, and let no one deal treacherously '
  - type: text
    content: and
  - type: text
    content: ' be faithless to the wife of his youth.'
  '16':
  - type: text
    content: ' For the Lord, the God of Israel, says: I hate divorce '
  - type: text
    content: and
  - type: text
    content: ' marital separation and him who covers his garment [his wife] with violence. Therefore keep a watch upon your spirit [that it may be controlled by My Spirit], that you deal not treacherously '
  - type: text
    content: and
  - type: text
    content: ' faithlessly [with your marriage mate].'
  '17':
  - type: text
    content: ' You have wearied the Lord with your words. Yet you say, In what way have we wearied Him? [You do it when by your actions] you say, Everyone who does evil is good in the sight of the Lord and He delights in them. Or [by asking], Where is the God of justice?'
  '2':
  - type: text
    content: ' If you will not hear and if you will not lay it to heart to give glory to My name, says the Lord of hosts, then I will send the curse upon you, and I will curse your blessings; yes, I have already turned them to curses because you do not lay it to heart.'
  '3':
  - type: text
    content: ' Behold, I will rebuke your seed [grain–which will prevent due harvest], and I will spread the dung from the festival offerings upon your faces, and you shall be taken away with it.'
  '4':
  - type: text
    content: ' And you shall know, recognize, '
  - type: text
    content: and
  - type: text
    content: ' understand that I have sent this [new] decree to you priests, to be My [new] covenant with Levi [the priestly tribe], says the Lord of hosts.'
  '5':
  - type: text
    content: ' My covenant [on My part with Levi] was to give him life and peace, because [on his part] of the [reverent and worshipful] fear with which [the priests] would revere Me and stand in awe of My name.'
  '6':
  - type: text
    content: ' The law of truth was in [Levi''s] mouth, and unrighteousness was not found in his lips; he walked with Me in peace and uprightness and turned many away from iniquity.'
  '7':
  - type: text
    content: ' For the priest''s lips should guard '
  - type: text
    content: and
  - type: text
    content: ' keep pure the knowledge [of My law], and the people should seek (inquire for and require) instruction at his mouth; for he is the messenger of the Lord of hosts.'
  '8':
  - type: text
    content: ' But you have turned aside out of the way; you have caused many to stumble by your instruction [in the law]; you have corrupted the covenant of Levi [with Me], says the Lord of hosts.'
  '9':
  - type: text
    content: ' Therefore have I also made you despised and abased before all the people, inasmuch as you have not kept My ways but have shown favoritism to persons in your administration of the law [of God].'
