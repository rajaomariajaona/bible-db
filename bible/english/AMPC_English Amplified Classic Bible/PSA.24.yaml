document_id: PSA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE EARTH is the Lord''s, and the fullness of it, the world and they who dwell in it. [I Cor. 10:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For He has founded it upon the seas and established it upon the currents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the rivers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Who shall go up into the mountain of the Lord? Or who shall stand in His Holy Place?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He who has clean hands and a pure heart, who has not lifted himself up to falsehood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to what is false, nor sworn deceitfully. [Matt. 5:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He shall receive blessing from the Lord and righteousness from the God of his salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' This is the generation [description] of those who seek Him [who inquire of and for Him and of necessity require Him], who seek Your face, [O God of] Jacob. Selah [pause, and think of that]! [Ps. 42:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Lift up your heads, O you gates; and be lifted up, you age-abiding doors, that the King of glory may come in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who is the King of glory? The Lord strong and mighty, the Lord mighty in battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Lift up your heads, O you gates; yes, lift them up, you age-abiding doors, that the King of glory may come in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who is [He then] this King of glory? The Lord of hosts, He is the King of glory. Selah [pause, and think of that]!'
