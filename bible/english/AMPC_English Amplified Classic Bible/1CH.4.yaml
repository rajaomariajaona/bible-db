document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE SONS of Judah: Perez, Hezron, Carmi, Hur, and Shobal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Reaiah son of Shobal was the father of Jahath, and Jahath of Ahumai and Lahad. These were the families of the Zorathites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' These were the sons of [Hur] the father of Etam: Jezreel, Ishma, and Idbash. And their sister was Hazzelelponi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Penuel was the father of Gedor, and Ezer the father of Hushah. These were the sons of Hur, the eldest of Ephrathah (Ephrath), the father of Bethlehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Ashur the father of Tekoa had two wives, Helah and Naarah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Naarah bore him Ahuzzam, Hepher, Temeni, and Haahashtari. These were Naarah''s sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The sons of Helah: Zereth, Izhar, and Ethnan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Koz was the father of Anub, Zobebah, and the families of Aharhel son of Harum.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jabez was honorable above his brothers; but his mother named him Jabez [sorrow maker], saying, Because I bore him in pain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jabez cried to the God of Israel, saying, Oh, that You would bless me and enlarge my border, and that Your hand might be with me, and You would keep me from evil so it might not hurt me! And God granted his request.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Chelub the brother of Shuhah was the father of Mehir, the father of Eshton.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Eshton was the father of Beth-rapha, Paseah, and Tehinnah the father of Ir-nahash. These are the men of Recah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The sons of Kenaz: Othniel and Seraiah. The sons of Othniel: Hathath [and Meonothai].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Meonothai was father of Ophrah, and Seraiah of Joab the father of Ge-harashim [the Valley of Craftsmen], so named because they were craftsmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The sons of Caleb [Joshua''s companion] son of Jephunneh: Iru, Elah, and Naam. The son of Elah: Kenaz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The sons of Ezrah: Jether, Mered, Epher, and Jalon. These are the sons of Bithiah daughter of Pharaoh, whom Mered married: she bore Miriam, Shammai, and Ishbah the father of Eshtemoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Mered''s Jewish wife bore Jered the father of Gedor, Heber the father of Soco, and Jekuthiel the father of Zanoah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The sons of the wife of Hodiah, the sister of Naham, were: the father of Keilah the Garmite, and Eshtemoa the Maacathite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The sons of Shimon: Amnon, Rinnah, Ben-hanan, and Tilon. The sons of Ishi: Zoheth and Ben-zoheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The sons of Shelah son of Judah: Er the father of Lecah, and Laadah the father of Mareshah, and the families of the house of the linen workers at Beth-ashbea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Jokim, the men of Cozeba, Joash, and Saraph, who ruled in Moab, and returned to [Bethlehem]. These are ancient matters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' These were the potters and those who dwelt among plantations and hedges at Netaim and Gederah; there they dwelt with the king for his work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, and Shaul;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Shallum was his [Shaul''s] son, Mibsam his son, Mishma his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Shimei had sixteen sons and six daughters, but his brothers did not have many children; neither did all their family multiply like the children of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' They dwelt at Beersheba, Moladah, Hazar-shual,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Bilhah, Ezem, Tolad,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Bethuel, Hormah, Ziklag,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Beth-marcaboth, Hazar-susim, Beth-biri, and at Shaaraim. These were their towns [and villages] until the reign of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' There were also Etam, Ain, Rimmon, Tochen, and Ashan–five towns–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And all their villages that were round about these towns, as far as Baal[-ath-beer]. These were their settlements, and they had their genealogical record.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Meshobab, Jamlech, Joshah son of Amaziah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Joel, Jehu son of Joshibiah, the son of Seraiah, the son of Asiel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Ziza son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' These mentioned by name were princes in their families; and their fathers'' houses increased greatly [so they needed more room].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And they journeyed to the entrance of Gedor to the east side of the valley to seek pasture for their flocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And they found rich, good pasture, and the [cleared] land was wide, quiet, and peaceful, because people of Ham had dwelt there of old [and had left it a better place for those who came after them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And these registered by name came in the days of Hezekiah king of Judah and destroyed their tents and the Meunim [foreigners] who were found there and exterminated them to this day, and they settled in their stead, because there was pasture for their flocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And some of them from the sons of Simeon, 500 men, went to Mount Seir, having for their leaders Pelatiah, and Neariah, Rephaiah, and Uzziel, the sons of Ishi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' They destroyed the remnant of the Amalekites who had escaped, and they have dwelt there to this day.'
