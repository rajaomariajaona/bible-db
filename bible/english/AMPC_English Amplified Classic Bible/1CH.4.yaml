document_id: 1CH.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE SONS of Judah: Perez, Hezron, Carmi, Hur, and Shobal.'
  '10':
  - type: text
    content: ' Jabez cried to the God of Israel, saying, Oh, that You would bless me and enlarge my border, and that Your hand might be with me, and You would keep me from evil so it might not hurt me! And God granted his request.'
  '11':
  - type: text
    content: ' Chelub the brother of Shuhah was the father of Mehir, the father of Eshton.'
  '12':
  - type: text
    content: ' Eshton was the father of Beth-rapha, Paseah, and Tehinnah the father of Ir-nahash. These are the men of Recah.'
  '13':
  - type: text
    content: ' The sons of Kenaz: Othniel and Seraiah. The sons of Othniel: Hathath [and Meonothai].'
  '14':
  - type: text
    content: ' Meonothai was father of Ophrah, and Seraiah of Joab the father of Ge-harashim [the Valley of Craftsmen], so named because they were craftsmen.'
  '15':
  - type: text
    content: ' The sons of Caleb [Joshua''s companion] son of Jephunneh: Iru, Elah, and Naam. The son of Elah: Kenaz.'
  '16':
  - type: text
    content: ' The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel.'
  '17':
  - type: text
    content: ' The sons of Ezrah: Jether, Mered, Epher, and Jalon. These are the sons of Bithiah daughter of Pharaoh, whom Mered married: she bore Miriam, Shammai, and Ishbah the father of Eshtemoa.'
  '18':
  - type: text
    content: ' And Mered''s Jewish wife bore Jered the father of Gedor, Heber the father of Soco, and Jekuthiel the father of Zanoah.'
  '19':
  - type: text
    content: ' The sons of the wife of Hodiah, the sister of Naham, were: the father of Keilah the Garmite, and Eshtemoa the Maacathite.'
  '2':
  - type: text
    content: ' Reaiah son of Shobal was the father of Jahath, and Jahath of Ahumai and Lahad. These were the families of the Zorathites.'
  '20':
  - type: text
    content: ' The sons of Shimon: Amnon, Rinnah, Ben-hanan, and Tilon. The sons of Ishi: Zoheth and Ben-zoheth.'
  '21':
  - type: text
    content: ' The sons of Shelah son of Judah: Er the father of Lecah, and Laadah the father of Mareshah, and the families of the house of the linen workers at Beth-ashbea,'
  '22':
  - type: text
    content: ' And Jokim, the men of Cozeba, Joash, and Saraph, who ruled in Moab, and returned to [Bethlehem]. These are ancient matters.'
  '23':
  - type: text
    content: ' These were the potters and those who dwelt among plantations and hedges at Netaim and Gederah; there they dwelt with the king for his work.'
  '24':
  - type: text
    content: ' The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, and Shaul;'
  '25':
  - type: text
    content: ' Shallum was his [Shaul''s] son, Mibsam his son, Mishma his son.'
  '26':
  - type: text
    content: ' The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son.'
  '27':
  - type: text
    content: ' Shimei had sixteen sons and six daughters, but his brothers did not have many children; neither did all their family multiply like the children of Judah.'
  '28':
  - type: text
    content: ' They dwelt at Beersheba, Moladah, Hazar-shual,'
  '29':
  - type: text
    content: ' Bilhah, Ezem, Tolad,'
  '3':
  - type: text
    content: ' These were the sons of [Hur] the father of Etam: Jezreel, Ishma, and Idbash. And their sister was Hazzelelponi.'
  '30':
  - type: text
    content: ' Bethuel, Hormah, Ziklag,'
  '31':
  - type: text
    content: ' Beth-marcaboth, Hazar-susim, Beth-biri, and at Shaaraim. These were their towns [and villages] until the reign of David.'
  '32':
  - type: text
    content: ' There were also Etam, Ain, Rimmon, Tochen, and Ashan–five towns–'
  '33':
  - type: text
    content: ' And all their villages that were round about these towns, as far as Baal[-ath-beer]. These were their settlements, and they had their genealogical record.'
  '34':
  - type: text
    content: ' Meshobab, Jamlech, Joshah son of Amaziah,'
  '35':
  - type: text
    content: ' Joel, Jehu son of Joshibiah, the son of Seraiah, the son of Asiel,'
  '36':
  - type: text
    content: ' Also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah,'
  '37':
  - type: text
    content: ' Ziza son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah.'
  '38':
  - type: text
    content: ' These mentioned by name were princes in their families; and their fathers'' houses increased greatly [so they needed more room].'
  '39':
  - type: text
    content: ' And they journeyed to the entrance of Gedor to the east side of the valley to seek pasture for their flocks.'
  '4':
  - type: text
    content: ' And Penuel was the father of Gedor, and Ezer the father of Hushah. These were the sons of Hur, the eldest of Ephrathah (Ephrath), the father of Bethlehem.'
  '40':
  - type: text
    content: ' And they found rich, good pasture, and the [cleared] land was wide, quiet, and peaceful, because people of Ham had dwelt there of old [and had left it a better place for those who came after them].'
  '41':
  - type: text
    content: ' And these registered by name came in the days of Hezekiah king of Judah and destroyed their tents and the Meunim [foreigners] who were found there and exterminated them to this day, and they settled in their stead, because there was pasture for their flocks.'
  '42':
  - type: text
    content: ' And some of them from the sons of Simeon, 500 men, went to Mount Seir, having for their leaders Pelatiah, and Neariah, Rephaiah, and Uzziel, the sons of Ishi.'
  '43':
  - type: text
    content: ' They destroyed the remnant of the Amalekites who had escaped, and they have dwelt there to this day.'
  '5':
  - type: text
    content: ' Ashur the father of Tekoa had two wives, Helah and Naarah.'
  '6':
  - type: text
    content: ' Naarah bore him Ahuzzam, Hepher, Temeni, and Haahashtari. These were Naarah''s sons.'
  '7':
  - type: text
    content: ' The sons of Helah: Zereth, Izhar, and Ethnan.'
  '8':
  - type: text
    content: ' Koz was the father of Anub, Zobebah, and the families of Aharhel son of Harum.'
  '9':
  - type: text
    content: ' Jabez was honorable above his brothers; but his mother named him Jabez [sorrow maker], saying, Because I bore him in pain.'
