document_id: PSA.35,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' CONTEND, O Lord, with those who contend with me; fight against those who fight against me!'
  '10':
  - type: text
    content: ' All my bones shall say, Lord, who is like You, You Who deliver the poor '
  - type: text
    content: and
  - type: text
    content: ' the afflicted from him who is too strong for him, yes, the poor and the needy from him who snatches away his goods?'
  '11':
  - type: text
    content: ' Malicious '
  - type: text
    content: and
  - type: text
    content: ' unrighteous witnesses rise up; they ask me of things that I know not.'
  '12':
  - type: text
    content: ' They reward me evil for good to my personal bereavement.'
  '13':
  - type: text
    content: ' But as for me, when they were sick, my clothing was sackcloth; I afflicted myself with fasting, and I prayed with head bowed on my breast.'
  '14':
  - type: text
    content: ' I behaved as if grieving for my friend '
  - type: text
    content: or
  - type: text
    content: ' my brother; I bowed down in sorrow, as one who bewails his mother.'
  '15':
  - type: text
    content: ' But in my stumbling '
  - type: text
    content: and
  - type: text
    content: ' limping they rejoiced and gathered together [against me]; the smiters (slanderers and revilers) gathered against me, and I knew them not; they ceased not to slander '
  - type: text
    content: and
  - type: text
    content: ' revile me.'
  '16':
  - type: text
    content: ' Like profane mockers at feasts [making sport for the price of a cake] they gnashed at me with their teeth.'
  '17':
  - type: text
    content: ' Lord, how long will You look on [without action]? Rescue my life from their destructions, my dear '
  - type: text
    content: and
  - type: text
    content: ' only life from the lions!'
  '18':
  - type: text
    content: ' I will give You thanks in the great assembly; I will praise You among a mighty throng.'
  '19':
  - type: text
    content: ' Let not those who are wrongfully my foes rejoice over me; neither let them wink with the eye who hate me without cause. [John 15:24, 25.]'
  '2':
  - type: text
    content: ' Take hold of shield and buckler, and stand up for my help!'
  '20':
  - type: text
    content: ' For they do not speak peace, but they devise deceitful matters against those who are quiet in the land.'
  '21':
  - type: text
    content: ' Yes, they open their mouths wide against me; they say, Aha! Aha! Our eyes have seen it!'
  '22':
  - type: text
    content: ' You have seen this, O Lord; keep not silence! O Lord, be not far from me!'
  '23':
  - type: text
    content: ' Arouse Yourself, awake to the justice due me, even to my cause, my God and my Lord!'
  '24':
  - type: text
    content: ' Judge '
  - type: text
    content: and
  - type: text
    content: ' vindicate me, O Lord my God, according to Your righteousness (Your rightness and justice); and let [my foes] not rejoice over me!'
  '25':
  - type: text
    content: ' Let them not say in their hearts, Aha, that is what we wanted! Let them not say, We have swallowed him up '
  - type: text
    content: and
  - type: text
    content: ' utterly destroyed him.'
  '26':
  - type: text
    content: ' Let them be put to shame and confusion together who rejoice at my calamity! Let them be clothed with shame and dishonor who magnify '
  - type: text
    content: and
  - type: text
    content: ' exalt themselves over me!'
  '27':
  - type: text
    content: ' Let those who favor my righteous cause '
  - type: text
    content: and
  - type: text
    content: ' have pleasure in my uprightness shout for joy and be glad and say continually, Let the Lord be magnified, Who takes pleasure in the prosperity of His servant.'
  '28':
  - type: text
    content: ' And my tongue shall talk of Your righteousness, rightness, '
  - type: text
    content: and
  - type: text
    content: ' justice, and of [my reasons for] Your praise all the day long.'
  '3':
  - type: text
    content: ' Draw out also the spear and javelin '
  - type: text
    content: and
  - type: text
    content: ' close up the way of those who pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute me. Say to me, I am your deliverance!'
  '4':
  - type: text
    content: ' Let them be put to shame and dishonor who seek '
  - type: text
    content: and
  - type: text
    content: ' require my life; let them be turned back and confounded who plan my hurt!'
  '5':
  - type: text
    content: ' Let them be as chaff before the wind, with the Angel of the Lord driving them on!'
  '6':
  - type: text
    content: ' Let their way be through dark and slippery places, with the Angel of the Lord pursuing '
  - type: text
    content: and
  - type: text
    content: ' afflicting them.'
  '7':
  - type: text
    content: ' For without cause they hid for me their net; a pit of destruction without cause they dug for my life.'
  '8':
  - type: text
    content: ' Let destruction befall [my foe] unawares; let the net he hid for me catch him; let him fall into that very destruction.'
  '9':
  - type: text
    content: ' Then I shall be joyful in the Lord; I shall rejoice in His deliverance.'
