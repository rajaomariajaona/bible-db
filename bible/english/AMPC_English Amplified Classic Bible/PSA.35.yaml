document_id: PSA.35,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' CONTEND, O Lord, with those who contend with me; fight against those who fight against me!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' All my bones shall say, Lord, who is like You, You Who deliver the poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the afflicted from him who is too strong for him, yes, the poor and the needy from him who snatches away his goods?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Malicious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unrighteous witnesses rise up; they ask me of things that I know not.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They reward me evil for good to my personal bereavement.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But as for me, when they were sick, my clothing was sackcloth; I afflicted myself with fasting, and I prayed with head bowed on my breast.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I behaved as if grieving for my friend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' my brother; I bowed down in sorrow, as one who bewails his mother.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But in my stumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' limping they rejoiced and gathered together [against me]; the smiters (slanderers and revilers) gathered against me, and I knew them not; they ceased not to slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revile me.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Like profane mockers at feasts [making sport for the price of a cake] they gnashed at me with their teeth.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Lord, how long will You look on [without action]? Rescue my life from their destructions, my dear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' only life from the lions!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I will give You thanks in the great assembly; I will praise You among a mighty throng.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Let not those who are wrongfully my foes rejoice over me; neither let them wink with the eye who hate me without cause. [John 15:24, 25.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Take hold of shield and buckler, and stand up for my help!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For they do not speak peace, but they devise deceitful matters against those who are quiet in the land.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Yes, they open their mouths wide against me; they say, Aha! Aha! Our eyes have seen it!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' You have seen this, O Lord; keep not silence! O Lord, be not far from me!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Arouse Yourself, awake to the justice due me, even to my cause, my God and my Lord!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicate me, O Lord my God, according to Your righteousness (Your rightness and justice); and let [my foes] not rejoice over me!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Let them not say in their hearts, Aha, that is what we wanted! Let them not say, We have swallowed him up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utterly destroyed him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Let them be put to shame and confusion together who rejoice at my calamity! Let them be clothed with shame and dishonor who magnify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalt themselves over me!'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Let those who favor my righteous cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have pleasure in my uprightness shout for joy and be glad and say continually, Let the Lord be magnified, Who takes pleasure in the prosperity of His servant.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And my tongue shall talk of Your righteousness, rightness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice, and of [my reasons for] Your praise all the day long.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Draw out also the spear and javelin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' close up the way of those who pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute me. Say to me, I am your deliverance!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Let them be put to shame and dishonor who seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require my life; let them be turned back and confounded who plan my hurt!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let them be as chaff before the wind, with the Angel of the Lord driving them on!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let their way be through dark and slippery places, with the Angel of the Lord pursuing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicting them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For without cause they hid for me their net; a pit of destruction without cause they dug for my life.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Let destruction befall [my foe] unawares; let the net he hid for me catch him; let him fall into that very destruction.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then I shall be joyful in the Lord; I shall rejoice in His deliverance.'
