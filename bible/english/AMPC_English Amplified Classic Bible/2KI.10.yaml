document_id: 2KI.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AHAB HAD seventy [grandsons] in Samaria. So Jehu wrote letters and sent them from Jezreel to the rulers of Samaria, to the elders, and to those who brought up Ahab''s [grandsons], saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now as soon as this letter comes to you, seeing your master [Joram''s] sons are with you and also chariots and horses, a fortified city, and weapons,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Select the best and most fit of your master''s sons and set him on his father''s throne; and fight for your master''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But they were exceedingly afraid and reasoned, The two kings could not stand before [Jehu]; how then can we stand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And he who was over the household, he who was over the city, the elders also, and the guardians '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tutors sent to Jehu, saying, We are your servants and will do all that you bid us; [but] we will not make any man king; do what is good in your eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then [Jehu] wrote a second letter to them, saying, If you are with me and will obey me, take the heads of your master [Joram''s] sons and come to me at Jezreel by tomorrow this time. Now the [dead] king''s sons, seventy persons, were with the great men of the city, who were bringing them up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When the letter came to these men, they took the king''s sons and slew them, seventy persons, and put their heads in baskets and sent them to Jehu at Jezreel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When a messenger came and told him, They have brought the heads of the king''s sons, he said, Lay them in two heaps at the entrance of the city gate until morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The next morning he went out and stood and said to all the people, You are just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' innocent. Behold, I conspired against my master and slew him, but who smote all these?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Know now that nothing which the Lord spoke concerning the house of Ahab shall be unfulfilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ineffective; for the Lord has done what He said through His servant Elijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So Jehu slew all that remained of the house of Ahab in Jezreel, and all his great men, his familiar friends, and his priests, until he left him none remaining.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he arose and went to Samaria. And as he was at the shearing house of the shepherds on the way,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Jehu met the kinsmen of Ahaziah king of Judah and said, Who are you? They answered, We are the kinsmen of Ahaziah, and we came down to visit the royal princes and the sons of [Jezebel] the queen mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He said, Take them alive. And they did so and slew them at the cistern of the shearing house, forty-two men; he left none of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When Jehu left there, he met Jehonadab son of Rechab coming to meet him. He saluted him and said to him, Is your heart right, as my heart is with yours? Jehonadab answered, It is. [Jehu said] If it is, give me your hand. He gave him his hand, and Jehu took him up into the chariot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he said, Come with me and see my zeal for the Lord. So they made [the Rechabite] ride in Jehu''s chariot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When Jehu came to Samaria, he slew all who remained of Ahab''s family in Samaria, till he had destroyed them all, according to what the Lord said to Elijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Jehu assembled all the people and said to them, Ahab served Baal a little; but Jehu will serve him much.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So call to me all the prophets of Baal, all his worshipers, and all his priests. Let none be missing, for I have a great sacrifice to make to Baal; whoever is missing shall not live. But Jehu did it with trickery, intending to destroy the Baal worshipers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Jehu said, Sanctify a solemn assembly for Baal. And they proclaimed it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Jehu sent through all Israel, and all the worshipers of Baal came; not a man failed to come. They went to the house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' temple of Baal, filling it from one end to the other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And he said to the man over the vestry, Bring vestments for all the worshipers of Baal. And he brought them vestments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then Jehu with Jehonadab son of Rechab went into the house of Baal and said to the worshipers of Baal, Search and see that there are here with you none of the servants of the Lord–but Baal worshipers only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And when they went in to offer sacrifices and burnt offerings, Jehu appointed eighty men outside and said, If any of the men whom I have brought into your hands escape, he who lets him go shall forfeit his own life for his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' As soon as he had finished offering the burnt offering, Jehu said to the guards and to the officers, Go in and slay them; let none escape. And they smote them with the sword; and the guards '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' runners [before the king] and the officers threw their bodies out and went into the inner dwelling of the house of Baal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They brought out the pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obelisks of the house of Baal and burned them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' They broke down the pillars of Baal and the house of Baal, and made it [forever unclean] a privy to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Thus Jehu rooted Baal out of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But Jehu did not give up the sins of Jeroboam son of Nebat, by which he made Israel to sin, that is, the golden calves at Bethel and Dan. [I Kings 12:28ff.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the Lord said to Jehu, Because you have executed well what is right in My eyes and have done to the house of Ahab as I willed, your sons to the fourth generation shall sit on Israel''s throne. [Fulfilled in II Kings 15:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But Jehu paid no attention to walking in the law of the Lord, the God of Israel, with all his heart. He did not quit the sins with which Jeroboam made Israel to sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' [So] in those days the Lord began to cut off parts of Israel. Hazael [of Syria] defeated them in all the [across the Jordan] territory of Israel'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' From the Jordan east, all the land of Gilead, the Gadites, Reubenites, and Manassites, from Aroer which is by the Valley of the Arnon, even Gilead and Bashan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' The rest of the acts of Jehu, and all that he did, and all his might, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Jehu slept with his fathers. They buried him in Samaria. Jehoahaz his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The time that Jehu reigned over Israel in Samaria was twenty-eight years.'
