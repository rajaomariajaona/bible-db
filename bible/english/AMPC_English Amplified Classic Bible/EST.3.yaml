document_id: EST.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THESE things, King Ahasuerus promoted Haman the son of Hammedatha the Agagite and advanced him and set his seat above all the princes who were with him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the king took his signet ring from his hand [with which to seal his letters by the king''s authority] and gave it to Haman son of Hammedatha the Agagite, the Jews'' enemy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the king said to Haman, The silver is given to you, the people also, to do with them as it seems good to you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then the king''s secretaries were called in on the thirteenth day of the first month, and all that Haman had commanded was written to the king''s chief rulers and to the governors who were over all the provinces and to the princes of each people, to every province in its own script and to each people in their own language; it was written in the name of King Ahasuerus and it was sealed with the king''s [signet] ring.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And letters were sent by special messengers to all the king''s provinces–to destroy, to slay, and to do away with all Jews, both young and old, little children and women, in one day, the thirteenth day of the twelfth month, the month of Adar, and to seize their belongings as spoil.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' A copy of the writing was to be published '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given out as a decree in every province to all the peoples to be ready for that day.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The special messengers went out in haste by order of the king, and the decree was given out in Shushan, the capital. And the king and Haman sat down to drink, but the city of Shushan was perplexed [at the strange and alarming decree].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And all the king''s servants who were at the king''s gate bowed down and did reverence to Haman, for the king had so commanded concerning him. But Mordecai did not bow down or do him reverence.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then the king''s servants who were at the king''s gate said to Mordecai, Why do you transgress the king''s command?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Now when they spoke to him day after day and he paid no attention to them, they told Haman to see whether Mordecai''s conduct would stand, for he had told them that he was a Jew.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And when Haman saw that Mordecai did not bow down or do him reverence, he was very angry.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But he scorned laying hands only on Mordecai. So since they had told him Mordecai''s nationality, Haman sought to destroy all the Jews, the people of Mordecai, throughout the whole kingdom of Ahasuerus.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' In the first month, the month of Nisan, in the twelfth year of King Ahasuerus, Haman caused Pur, that is, lots, to be cast before him day after day [to find a lucky day for his venture], month after month, until the twelfth, the month of Adar.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Haman said to King Ahasuerus, There is a certain people scattered abroad and dispersed among the peoples in all the provinces of your kingdom; their laws are different from every other people, neither do they keep the king''s laws. Therefore it is not for the king''s profit to tolerate them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' If it pleases the king, let it be decreed that they be destroyed, and I will pay 10,000 talents of silver into the hands of those who have charge of the king''s business, that it may be brought into the king''s treasuries.'
