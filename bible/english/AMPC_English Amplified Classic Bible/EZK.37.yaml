document_id: EZK.37
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE HAND of the Lord was upon me, and He brought me out in the Spirit of the Lord and set me down in the midst of the valley; and it was full of bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He caused me to pass round about among them, and behold, there were very many [human bones] in the open valley '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' plain, and behold, they were very dry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to me, Son of man, can these bones live? And I answered, O Lord God, You know! [I Cor. 15:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Again He said to me, Prophesy to these bones and say to them, O you dry bones, hear the word of the Lord. [John 5:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says the Lord God to these bones: Behold, I will cause breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit to enter you, and you shall live;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I will lay sinews upon you and bring up flesh upon you and cover you with skin, and I will put breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit in you, and you [dry bones] shall live; and you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So I prophesied as I was commanded; and as I prophesied, there was a [thundering] noise and behold, a shaking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a rattling, and the bones came together, bone to its bone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I looked and behold, there were sinews upon [the bones] and flesh came upon them and skin covered them over, but there was no breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spirit in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then said He to me, Prophesy to the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit, son of man, and say to the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit, Thus says the Lord God: Come from the four winds, O breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit, and breathe upon these slain that they may live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So I prophesied as He commanded me, and the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit came into [the bones], and they lived and stood up upon their feet, an exceedingly great host. [Rev. 11:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then He said to me, Son of man, these bones are the whole house of Israel. Behold, they say, Our bones are dried up and our hope is lost; we are completely cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore prophesy and say to them, Thus says the Lord God: Behold, I will open your graves and cause you to come up out of your graves, O My people; and I will bring you [back home] to the land of Israel. [Hos. 13:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And you shall know that I am the Lord [your Sovereign Ruler], when I have opened your graves and caused you to come up out of your graves, O My people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I shall put My Spirit in you and you shall live, and I shall place you in your own land. Then you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I the Lord have spoken it and performed it, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The word of the Lord came again to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Son of man, take a stick and write on it, For Judah and the children of Israel his companions; then take another stick and write upon it, For Joseph, the stick of Ephraim, and all the house of Israel his companions;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And join them together into one stick that they may become one in your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when your people say to you, Will you not show us what you mean by these?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Say to them, Thus says the Lord God: Behold, I will take the stick of Joseph–which is in the hand of Ephraim–and the tribes of Israel his associates, and will join with it the stick of Judah and make them one stick, and they shall be one in My hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When the sticks on which you write shall be in your hand before their eyes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then say to them, Thus says the Lord God: Behold, I will take the children of Israel from among the nations to which they have gone, and will gather them from every side and bring them into their own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And I will make them one nation in the land, upon the mountains of Israel, and one King shall be King over them all; and they shall be no longer two nations, neither be divided into two kingdoms any more. [Jer. 50:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' They shall not defile themselves any more with their idols and their detestable things or with any of their transgressions, but I will save them out of all their dwelling places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from all their backslidings in which they have sinned, and I will cleanse them. So shall they be My people, and I will be their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And David My Servant shall be King over them, and they all shall have one Shepherd. They shall also walk in My ordinances and heed My statutes and do them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' They shall dwell in the land in which your fathers dwelt, that I gave to My servant Jacob, and they shall dwell there, they and their children and their children''s children, forever; and My Servant David shall be their Prince forever. [Isa. 60:21; Joel 3:20; Amos 9:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' I will make a covenant of peace with them; it shall be an everlasting covenant with them, and I will give blessings to them and multiply them and will set My sanctuary in the midst of them forevermore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' My tabernacle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dwelling place also shall be with them; and I will be their God, and they shall be My people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then the nations shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I the Lord do set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrate Israel for holy use, when My sanctuary shall be in their midst forevermore.'
