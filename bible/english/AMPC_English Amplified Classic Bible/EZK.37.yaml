document_id: EZK.37,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE HAND of the Lord was upon me, and He brought me out in the Spirit of the Lord and set me down in the midst of the valley; and it was full of bones.'
  '10':
  - type: text
    content: ' So I prophesied as He commanded me, and the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit came into [the bones], and they lived and stood up upon their feet, an exceedingly great host. [Rev. 11:11.]'
  '11':
  - type: text
    content: ' Then He said to me, Son of man, these bones are the whole house of Israel. Behold, they say, Our bones are dried up and our hope is lost; we are completely cut off.'
  '12':
  - type: text
    content: ' Therefore prophesy and say to them, Thus says the Lord God: Behold, I will open your graves and cause you to come up out of your graves, O My people; and I will bring you [back home] to the land of Israel. [Hos. 13:14.]'
  '13':
  - type: text
    content: ' And you shall know that I am the Lord [your Sovereign Ruler], when I have opened your graves and caused you to come up out of your graves, O My people.'
  '14':
  - type: text
    content: ' And I shall put My Spirit in you and you shall live, and I shall place you in your own land. Then you shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that I the Lord have spoken it and performed it, says the Lord.'
  '15':
  - type: text
    content: ' The word of the Lord came again to me, saying,'
  '16':
  - type: text
    content: ' Son of man, take a stick and write on it, For Judah and the children of Israel his companions; then take another stick and write upon it, For Joseph, the stick of Ephraim, and all the house of Israel his companions;'
  '17':
  - type: text
    content: ' And join them together into one stick that they may become one in your hand.'
  '18':
  - type: text
    content: ' And when your people say to you, Will you not show us what you mean by these?'
  '19':
  - type: text
    content: ' Say to them, Thus says the Lord God: Behold, I will take the stick of Joseph–which is in the hand of Ephraim–and the tribes of Israel his associates, and will join with it the stick of Judah and make them one stick, and they shall be one in My hand.'
  '2':
  - type: text
    content: ' And He caused me to pass round about among them, and behold, there were very many [human bones] in the open valley '
  - type: text
    content: or
  - type: text
    content: ' plain, and behold, they were very dry.'
  '20':
  - type: text
    content: ' When the sticks on which you write shall be in your hand before their eyes,'
  '21':
  - type: text
    content: ' Then say to them, Thus says the Lord God: Behold, I will take the children of Israel from among the nations to which they have gone, and will gather them from every side and bring them into their own land.'
  '22':
  - type: text
    content: ' And I will make them one nation in the land, upon the mountains of Israel, and one King shall be King over them all; and they shall be no longer two nations, neither be divided into two kingdoms any more. [Jer. 50:4.]'
  '23':
  - type: text
    content: ' They shall not defile themselves any more with their idols and their detestable things or with any of their transgressions, but I will save them out of all their dwelling places '
  - type: text
    content: and
  - type: text
    content: ' from all their backslidings in which they have sinned, and I will cleanse them. So shall they be My people, and I will be their God.'
  '24':
  - type: text
    content: ' And David My Servant shall be King over them, and they all shall have one Shepherd. They shall also walk in My ordinances and heed My statutes and do them.'
  '25':
  - type: text
    content: ' They shall dwell in the land in which your fathers dwelt, that I gave to My servant Jacob, and they shall dwell there, they and their children and their children''s children, forever; and My Servant David shall be their Prince forever. [Isa. 60:21; Joel 3:20; Amos 9:15.]'
  '26':
  - type: text
    content: ' I will make a covenant of peace with them; it shall be an everlasting covenant with them, and I will give blessings to them and multiply them and will set My sanctuary in the midst of them forevermore.'
  '27':
  - type: text
    content: ' My tabernacle '
  - type: text
    content: or
  - type: text
    content: ' dwelling place also shall be with them; and I will be their God, and they shall be My people.'
  '28':
  - type: text
    content: ' Then the nations shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that I the Lord do set apart '
  - type: text
    content: and
  - type: text
    content: ' consecrate Israel for holy use, when My sanctuary shall be in their midst forevermore.'
  '3':
  - type: text
    content: ' And He said to me, Son of man, can these bones live? And I answered, O Lord God, You know! [I Cor. 15:35.]'
  '4':
  - type: text
    content: ' Again He said to me, Prophesy to these bones and say to them, O you dry bones, hear the word of the Lord. [John 5:28.]'
  '5':
  - type: text
    content: ' Thus says the Lord God to these bones: Behold, I will cause breath '
  - type: text
    content: and
  - type: text
    content: ' spirit to enter you, and you shall live;'
  '6':
  - type: text
    content: ' And I will lay sinews upon you and bring up flesh upon you and cover you with skin, and I will put breath '
  - type: text
    content: and
  - type: text
    content: ' spirit in you, and you [dry bones] shall live; and you shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '7':
  - type: text
    content: ' So I prophesied as I was commanded; and as I prophesied, there was a [thundering] noise and behold, a shaking '
  - type: text
    content: and
  - type: text
    content: ' trembling '
  - type: text
    content: and
  - type: text
    content: ' a rattling, and the bones came together, bone to its bone.'
  '8':
  - type: text
    content: ' And I looked and behold, there were sinews upon [the bones] and flesh came upon them and skin covered them over, but there was no breath '
  - type: text
    content: or
  - type: text
    content: ' spirit in them.'
  '9':
  - type: text
    content: ' Then said He to me, Prophesy to the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit, son of man, and say to the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit, Thus says the Lord God: Come from the four winds, O breath '
  - type: text
    content: and
  - type: text
    content: ' spirit, and breathe upon these slain that they may live.'
