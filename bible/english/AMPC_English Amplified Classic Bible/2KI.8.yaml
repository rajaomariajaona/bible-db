document_id: 2KI.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW ELISHA had said to the woman whose son he had restored to life, Arise and go with your household and sojourn wherever you can, for the Lord has called for a famine, and moreover, it will come upon the land for seven years.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Elisha said, Go, say to him, You shall certainly recover; but the Lord has shown me that he shall certainly die.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Elisha stared steadily at him until Hazael was embarrassed. And the man of God wept.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And Hazael said, Why do you weep, my lord? He answered, Because I know the evil that you will do to the Israelites. You will burn their strongholds, slay their young men with the sword, dash their infants in pieces, and rip up their pregnant women.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And Hazael said, What is your servant, only a dog, that he should do this monstrous thing? And Elisha answered, The Lord has shown me that you will be king over Syria.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then [Hazael] departed from Elisha and came to his master, who said to him, What did Elisha say to you? And he answered, He told me you would surely recover.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But the next day Hazael took the bedspread and dipped it in water and spread it on [the Syrian king''s] face, so that he died. And Hazael reigned in his stead.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' In the fifth year of Joram son of Ahab king of Israel, Jehoshaphat being then king of Judah, Jehoram son of Jehoshaphat king of Judah began to reign.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He was thirty-two years old when he began to reign, and he reigned eight years in Jerusalem.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He walked in the ways of the kings of Israel, as did the house of Ahab, for [Athaliah] the daughter of Ahab was his wife. He did evil in the sight of the Lord.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Yet, for David His servant''s sake, the Lord would not destroy Judah, for He promised to give him and his sons a lamp forever.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So the woman arose and did as the man of God had said. She went with her household and sojourned in the land of the Philistines seven years.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' In his days, Edom revolted from the rule of Judah and set up a king over themselves.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' So Jehoram [of Judah] went over to Zair with all his chariots. He and his chariot commanders rose up by night and slew the Edomites who had surrounded them; and [escaping] his army fled home.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So Edom revolted from the rule of Judah to this day. Then Libnah revolted at the same time.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' The rest of the acts of Jehoram, and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Jehoram slept with his fathers and was buried with [them] in the City of David. Ahaziah his son reigned in his stead.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' In the twelfth year of Joram son of Ahab king of Israel, Ahaziah son of Jehoram king of Judah began to reign.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Ahaziah was twenty-two years old when he began to reign, and he reigned one year in Jerusalem. His mother''s name was Athaliah, the granddaughter of Omri king of Israel.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' He walked in the ways of the house of Ahab and did evil in the sight of the Lord, as did the house of Ahab, for his father was son-in-law of Ahab.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Ahaziah went with Joram son of Ahab to war against Hazael king of Syria in Ramoth-gilead; and the Syrians wounded Joram.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' King Joram returned to Jezreel to be healed of the wounds which the Syrians had given him at Ramah when he fought against Hazael king of Syria. And Ahaziah son of Jehoram king of Judah went down to see Joram son of Ahab in Jezreel, because he was sick.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' At the end of the seven years the woman returned from the land of the Philistines, and she went to appeal to the king for her house and land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The king talked with Gehazi, the servant of the man of God, saying, Tell me all the great things Elisha has done.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And as Gehazi was telling the king how [Elisha] had restored the dead to life, behold, the woman whose son he had restored to life appealed to the king for her house and land. And Gehazi said, My lord O king, this is the woman, and this is her son whom Elisha brought back to life.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' When the king asked the woman, she told him. So the king appointed to her a certain officer, saying, Restore all that was hers, and all the fruits of the field since the day that she left the land even until now.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Elisha came to Damascus, and Ben-hadad king of Syria was sick; and he was told, The man of God has come here.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the king said to Hazael, Take a present in your hand and go meet the man of God, and inquire of the Lord by him, saying, Shall I recover from this disease?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So Hazael went to meet Elisha and took a present with him of every good thing of Damascus, forty camel loads, and came and stood before him and said, Your son Ben-hadad king of Syria has sent me to you, asking, Shall I recover from this disease?'
