document_id: JOB.28,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SURELY THERE is a mine for silver, and a place for gold where they refine it.'
  '10':
  - type: text
    content: ' He cuts out channels '
  - type: text
    content: and
  - type: text
    content: ' passages among the rocks; and his eye sees every precious thing.'
  '11':
  - type: text
    content: ' [Man] binds the streams so that they do not trickle [into the mine], and the thing that is hidden he brings forth to light.'
  '12':
  - type: text
    content: ' But where shall Wisdom be found? And where is the place of understanding?'
  '13':
  - type: text
    content: ' Man knows not the price of it; neither is it found in the land of the living.'
  '14':
  - type: text
    content: ' The deep says, [Wisdom] is not in me; and the sea says, It is not with me.'
  '15':
  - type: text
    content: ' It cannot be gotten for gold, neither shall silver be weighed for the price of it.'
  '16':
  - type: text
    content: ' It cannot be valued in [terms of] the gold of Ophir, in the precious onyx '
  - type: text
    content: or
  - type: text
    content: ' beryl, or the sapphire.'
  '17':
  - type: text
    content: ' Gold and glass cannot equal [Wisdom], nor can it be exchanged for jewels '
  - type: text
    content: or
  - type: text
    content: ' vessels of fine gold.'
  '18':
  - type: text
    content: ' No mention shall be made of coral or of crystal; for the possession of Wisdom is even above rubies '
  - type: text
    content: or
  - type: text
    content: ' pearls.'
  '19':
  - type: text
    content: ' The topaz of Ethiopia cannot compare with it, nor can it be valued in pure gold.'
  '2':
  - type: text
    content: ' Iron is taken out of the earth, and copper is smelted from the stone ore.'
  '20':
  - type: text
    content: ' From where then does Wisdom come? And where is the place of understanding?'
  '21':
  - type: text
    content: ' It is hidden from the eyes of all living, and knowledge of it is withheld from the birds of the heavens.'
  '22':
  - type: text
    content: ' Abaddon (the place of destruction) and Death say, We have [only] heard the report of it with our ears.'
  '23':
  - type: text
    content: ' God understands the way [to Wisdom] and He knows the place of it [Wisdom is with God alone].'
  '24':
  - type: text
    content: ' For He looks to the ends of the earth and sees everything under the heavens.'
  '25':
  - type: text
    content: ' When He gave to the wind weight '
  - type: text
    content: or
  - type: text
    content: ' pressure and allotted the waters by measure,'
  '26':
  - type: text
    content: ' When He made a decree for the rain and a way for the lightning of the thunder,'
  '27':
  - type: text
    content: ' Then He saw [Wisdom] and declared it; He established it, yes, and searched it out [for His own use, and He alone possesses it].'
  '28':
  - type: text
    content: ' But to man He said, Behold, the reverential '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord–that is Wisdom; and to depart from evil is understanding.'
  '3':
  - type: text
    content: ' Man sets an end to darkness, and he searches out the farthest bounds for the ore buried in gloom and deep darkness.'
  '4':
  - type: text
    content: ' Men break open shafts away from where people sojourn, in places forgotten by [human] foot; and [descend into them], hanging afar from men, they swing '
  - type: text
    content: or
  - type: text
    content: ' flit to and fro.'
  '5':
  - type: text
    content: ' As for the earth, out of it comes bread, but underneath [its surface, down deep in the mine] there is blasting, turning it up as by fire.'
  '6':
  - type: text
    content: ' Its stones are the bed of sapphires; it holds dust of gold [which he wins].'
  '7':
  - type: text
    content: ' That path no bird of prey knows, and the falcon''s eye has not seen it.'
  '8':
  - type: text
    content: ' The proud beasts [and their young] have not trodden it, nor has the fierce lion passed over it.'
  '9':
  - type: text
    content: ' Man puts forth his hand upon the flinty rock; he overturns the mountains by the roots.'
