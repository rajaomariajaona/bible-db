document_id: JOB.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SURELY THERE is a mine for silver, and a place for gold where they refine it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Iron is taken out of the earth, and copper is smelted from the stone ore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Man sets an end to darkness, and he searches out the farthest bounds for the ore buried in gloom and deep darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Men break open shafts away from where people sojourn, in places forgotten by [human] foot; and [descend into them], hanging afar from men, they swing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' flit to and fro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' As for the earth, out of it comes bread, but underneath [its surface, down deep in the mine] there is blasting, turning it up as by fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Its stones are the bed of sapphires; it holds dust of gold [which he wins].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' That path no bird of prey knows, and the falcon''s eye has not seen it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The proud beasts [and their young] have not trodden it, nor has the fierce lion passed over it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Man puts forth his hand upon the flinty rock; he overturns the mountains by the roots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He cuts out channels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' passages among the rocks; and his eye sees every precious thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' [Man] binds the streams so that they do not trickle [into the mine], and the thing that is hidden he brings forth to light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But where shall Wisdom be found? And where is the place of understanding?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Man knows not the price of it; neither is it found in the land of the living.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The deep says, [Wisdom] is not in me; and the sea says, It is not with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' It cannot be gotten for gold, neither shall silver be weighed for the price of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' It cannot be valued in [terms of] the gold of Ophir, in the precious onyx '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' beryl, or the sapphire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Gold and glass cannot equal [Wisdom], nor can it be exchanged for jewels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vessels of fine gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' No mention shall be made of coral or of crystal; for the possession of Wisdom is even above rubies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pearls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The topaz of Ethiopia cannot compare with it, nor can it be valued in pure gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' From where then does Wisdom come? And where is the place of understanding?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' It is hidden from the eyes of all living, and knowledge of it is withheld from the birds of the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Abaddon (the place of destruction) and Death say, We have [only] heard the report of it with our ears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' God understands the way [to Wisdom] and He knows the place of it [Wisdom is with God alone].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For He looks to the ends of the earth and sees everything under the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' When He gave to the wind weight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pressure and allotted the waters by measure,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When He made a decree for the rain and a way for the lightning of the thunder,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then He saw [Wisdom] and declared it; He established it, yes, and searched it out [for His own use, and He alone possesses it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But to man He said, Behold, the reverential '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord–that is Wisdom; and to depart from evil is understanding.'
