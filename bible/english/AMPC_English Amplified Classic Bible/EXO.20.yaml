document_id: EXO.20,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN GOD spoke all these words:'
  '10':
  - type: text
    content: ' But the seventh day is a Sabbath to the Lord your God; in it you shall not do any work, you, or your son, your daughter, your manservant, your maidservant, your domestic animals, or the sojourner within your gates.'
  '11':
  - type: text
    content: ' For in six days the Lord made the heavens and the earth, the sea, and all that is in them, and rested the seventh day. That is why the Lord blessed the Sabbath day and hallowed it [set it apart for His purposes].'
  '12':
  - type: text
    content: ' Regard (treat with honor, due obedience, and courtesy) your father and mother, that your days may be long in the land the Lord your God gives you.'
  '13':
  - type: text
    content: ' You shall not commit murder.'
  '14':
  - type: text
    content: ' You shall not commit adultery. [Prov. 6:25, 26; Matt. 5:28; Rom. 1:24; Eph. 5:3.]'
  '15':
  - type: text
    content: ' You shall not steal. [Prov. 11:1; 16:8; 21:6; 22:16; Jer. 17:11; Mal. 3:8.]'
  '16':
  - type: text
    content: ' You shall not witness falsely against your neighbor. [Exod. 23:1; Prov. 19:9; 24:28.]'
  '17':
  - type: text
    content: ' You shall not covet your neighbor''s house, your neighbor''s wife, or his manservant, or his maidservant, or his ox, or his donkey, or anything that is your neighbor''s. [Luke 12:15; Col. 3:5.]'
  '18':
  - type: text
    content: ' Now all the people perceived the thunderings and the lightnings and the noise of the trumpet and the smoking mountain, and as [they] looked they trembled with fear '
  - type: text
    content: and
  - type: text
    content: ' fell back and stood afar off.'
  '19':
  - type: text
    content: ' And they said to Moses, You speak to us and we will listen, but let not God speak to us, lest we die.'
  '2':
  - type: text
    content: ' I am the Lord your God, Who has brought you out of the land of Egypt, out of the house of bondage.'
  '20':
  - type: text
    content: ' And Moses said to the people, Fear not; for God has come to prove you, so that the [reverential] fear of Him may be before you, that you may not sin.'
  '21':
  - type: text
    content: ' And the people stood afar off, but Moses drew near to the thick darkness where God was.'
  '22':
  - type: text
    content: ' And the Lord said to Moses, Thus shall you say to the Israelites, You have seen for yourselves that I have talked with you from heaven.'
  '23':
  - type: text
    content: ' You shall not make [gods to share] with Me [My glory and your worship]; gods of silver or gods of gold you shall not make for yourselves.'
  '24':
  - type: text
    content: ' An altar of earth you shall make to Me and sacrifice on it your burnt offerings and your peace offerings, your sheep and your oxen. In every place where I record My name and cause it to be remembered I will come to you and bless you.'
  '25':
  - type: text
    content: ' And if you will make Me an altar of stone, you shall not build it of hewn stone, for if you lift up a tool upon it you have polluted it.'
  '26':
  - type: text
    content: ' Neither shall you go up by steps to My altar, that your nakedness be not exposed upon it.'
  '3':
  - type: text
    content: ' You shall have no other gods before '
  - type: text
    content: or
  - type: text
    content: ' besides Me.'
  '4':
  - type: text
    content: ' You shall not make yourself any graven image [to worship it] or any likeness of anything that is in the heavens above, or that is in the earth beneath, or that is in the water under the earth;'
  '5':
  - type: text
    content: ' You shall not bow down yourself to them or serve them; for I the Lord your God am a jealous God, visiting the iniquity of the fathers upon the children to the third and fourth generation of those who hate Me, [Isa. 42:8; 48:11.]'
  '6':
  - type: text
    content: ' But showing mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love to a thousand generations of those who love Me and keep My commandments.'
  '7':
  - type: text
    content: ' You shall not use '
  - type: text
    content: or
  - type: text
    content: ' repeat the name of the Lord your God in vain [that is, lightly or frivolously, in false affirmations or profanely]; for the Lord will not hold him guiltless who takes His name in vain.'
  '8':
  - type: text
    content: ' [Earnestly] remember the Sabbath day, to keep it holy (withdrawn from common employment and dedicated to God).'
  '9':
  - type: text
    content: ' Six days you shall labor and do all your work,'
