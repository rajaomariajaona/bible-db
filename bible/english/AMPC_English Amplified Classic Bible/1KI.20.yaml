document_id: 1KI.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEN-HADAD KING of Syria gathered all his army together; thirty-two kings were with him, and horses and chariots. And he went up and besieged Samaria, warring against it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He sent messengers into Samaria to Ahab king of Israel and said to him, Thus says Ben-hadad:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Your silver and your gold are mine; your wives and your children, even the fairest, also are mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the king of Israel answered and said, My lord, O king, according to what you say, I am yours, and all that I have.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The messengers came again and said, Thus says Ben-hadad: Although I have sent to you, saying, You shall deliver to me your silver, your gold, your wives, and your children–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Yet I will send my servants to you tomorrow about this time, and they shall search your house and the houses of your servants; and all the desire of your eyes they shall lay hands upon and take it away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the king of Israel called all the elders of the land and said, Notice now and see how this man is seeking our destruction. He sent to me for my wives, my children, my silver, and my gold, and I did not refuse him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the elders and all the people said to him, Do not heed him or consent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So he said to Ben-hadad''s messengers, Tell my lord the king, All you first sent for to your servant I will do, but this thing I cannot do. And the messengers left; then they brought him word again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Ben-hadad sent to him and said, May the gods do so to me, and more also, if the rubbish of Samaria shall be enough for each one of all the people who are at my feet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow me to get a handful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The king of Israel answered, Tell him: Let not him who girds on his harness boast as he who puts it off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When Ben-hadad heard this message as he and the kings were drinking in the booths, he said to his servants, Set the army in array. And they set themselves in array against [Samaria].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then a prophet came to Ahab king of Israel and said, Thus says the Lord: Have you seen all this great multitude? Behold, I will deliver it into your hand today, and you shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Ahab said, By whom? And he said, Thus says the Lord: By the young men [the attendants or bodyguards] of the governors of the districts. Then Ahab said, Who shall order the battle? And he answered, You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Ahab numbered the attendants of the governors of the districts, and they were 232. After them he numbered all the people of [the army of] Israel, 7,000. [I Kings 19:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they went out at noon. But Ben-hadad was drinking himself drunk in the booths, he and the thirty-two kings who helped him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The servants of the governors of the districts went out first; and Ben-hadad sent out, and they told him, saying, There are men come out of Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he said, Whether they have come out for peace or for war, take them alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So these [strong young guards] of the governors of the districts went out of [Samaria], and the army followed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And each one killed his man; the Syrians fled, and Israel pursued them. Ben-hadad king of Syria escaped on a horse with the horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The king of Israel went out and smote [the riders of] the horses and chariots and slew the Syrians with a great slaughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The prophet came to the king of Israel and said to him, Go, fortify yourself and become strong and give attention to what you must do, for at the first of next year the king of Syria will return against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the servants of the king of Syria said to him, Israel''s gods are gods of the hills; therefore they were stronger than we. But let us fight against them in the plain, and surely we shall be stronger than they.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And do this thing: Remove the kings, each from his place, and put governors in their stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And muster yourself an army like the army you have lost, horse for horse and chariot for chariot. And we will fight against them in the plain, and surely we shall be stronger than they. And he heeded their speech and did so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And at the return of the year, Ben-hadad mustered the Syrians and went up to Aphek to fight against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The Israelites were counted and, all present, went against them. The Israelites encamped before the enemy like two little flocks of lost kids [absolutely everything against them but Almighty God], but the Syrians filled the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' A man of God came and said to the king of Israel, Thus says the Lord: Because the Syrians have said, The Lord is God of the hills but He is not God of the valleys, therefore I will deliver all this great multitude into your hands, and you shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize by experience that I am the Lord. [Phil. 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' They encamped opposite each other seven days. Then the battle was joined; and the Israelites slew of the Syrians 100,000 foot soldiers in one day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But the rest fled to the city of Aphek, and the wall fell upon 27,000 men who were left. Ben-hadad fled into the city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from chamber to chamber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' His servants said to him, We have heard that the kings of the house of Israel are merciful kings. Let us put sackcloth on our loins and ropes about our necks, and go out to the king of Israel; perhaps he will spare your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' So they girded sackcloth on their loins and put ropes on their necks, and came to the king of Israel and said, Your servant Ben-hadad says, I pray you, let me live. And King [Ahab] said, Is he yet alive? He is my brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Now the men took it as an omen and they hastily took it up and said, Yes, your brother Ben-hadad. Then the king said, Go, bring him. Then Ben-hadad came forth to him, and the victorious king caused him to come up into the chariot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Ben-hadad [tempting him] said, The cities which my father took from your father I will restore; and you may maintain bazaars of your own in Damascus, as my father did in Samaria. Then, said Ahab, I will send you away on these terms. So he made a covenant with him and sent him away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And a certain man of the sons of the prophets said to his neighbor, At the command of the Lord, strike me, I pray you. And the man refused to strike him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then said he to him, Because you have not obeyed the voice of the Lord, behold, as soon as you have left me a lion will slay you. And as soon as he departed from him, a lion found him and killed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then [the prophet] found another man and said, Strike me, I pray you. And the man struck him, so that in striking, he wounded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' So the prophet departed and waited for King Ahab by the way, and disguised himself with ashes upon his face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And as the king passed by, the [prophet] cried out to him, Your servant went out into the midst of the battle, and behold, a man turned aside and brought a man to me and said, Keep this man. If for any reason he is missing, then your life shall be required for his life, or else you shall pay a talent of silver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But while your servant was busy here and there, he was gone. And the king of Israel said to him, Such is your own verdict; you yourself have decided it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The man hastily removed the ashes from his face, and Ahab king of Israel recognized him as one of the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And he said to the king, Thus says the Lord: Because you have let go out of your hand the man I had devoted to destruction, therefore your life shall go for his life, and your people for his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And King [Ahab] of Israel went to his house resentful and sullen, and came to Samaria. [I Kings 22:34-36.]'
