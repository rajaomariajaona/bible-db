document_id: JER.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR THE word which the Lord speaks to you, O house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord: Learn not the way of the [heathen] nations and be not dismayed at the signs of the heavens, though they are dismayed at them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the customs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordinances of the peoples are false, empty, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futile; it is but a tree which one cuts out of the forest [to make for himself a god], the work of the hands of the craftsman with the ax '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' other tool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They deck [the idol] with silver and with gold; they fasten it with nails and with hammers so it will not fall apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' move around.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [Their idols] are like pillars of turned work [as upright and stationary and immobile as a palm tree], like scarecrows in a cucumber field; they cannot speak; they have to be carried, for they cannot walk. Do not be afraid of them, for they cannot do evil, neither is it possible for them to do good [and it is not in them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' None at all is like You, O Lord; You are great, and Your name is great in might.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Who would not fear You, O King of the nations? For it is fitting to You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your due! For among all the wise [men or gods] of the nations and in all their kingdoms, there is none like You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But they are altogether irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid and foolish. Their instruction is given by idols who are but wood [it is a teaching of falsity, emptiness, futility]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Silver beaten [into plates] is brought from Tarshish and gold from Uphaz, the work of the craftsman and of the hands of the goldsmith; the [idols''] clothing is violet and purple–they are all the work of skillful men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But the Lord is the true God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the God of truth (the God Who is Truth). He is the living God and the everlasting King. At His wrath the earth quakes, and the nations are not able to bear His indignation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus shall you say to them: The gods, who did not make the heavens and the earth, shall perish from the earth and from under the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' God made the earth by His power; He established the world by His wisdom and by His understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill stretched out the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When He utters His voice, there is a tumult of waters in the heavens, and He causes the vapors to ascend from the ends of the earth. He makes lightnings for the rain and brings forth the wind out from His treasuries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from His storehouses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Every man has become like a brute, irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid, without knowledge [of God]; every goldsmith is brought to shame by his graven idols; for his molten images are frauds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' falsehood, and there is no breath in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' They are devoid of worth, usefulness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' truth, a work of delusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mockery; in their time of trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment they shall [helplessly] perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The Portion of Jacob [the true God on Whom Israel has a claim] is not like these, for He is the Fashioner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Maker of all things, and Israel is the tribe of His inheritance–the Lord of hosts is His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Gather up your bundle [of baggage] from the ground, O you who dwell under siege.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For thus says the Lord: Behold, I will sling out the inhabitants of the land at this time and will bring distress on them, that they may feel it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find it [to be as I have said, and turn to Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Woe is me because of my hurt! [says Jeremiah, speaking for the nation.] My wound is grievous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incurable. But I said, Surely this sickness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grief are mine, and I must endure, tolerate, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' My tent (home) is taken by force '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plundered, and all my [tent] cords are broken. My children have gone forth [as captives] from me, and they are no more; there is no one to stretch forth my tent any more and to set up my [tent] curtains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the shepherds [of the people] have become like brutes, irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid, and have not sought the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' inquired of Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' required Him [by necessity and by right of His word]. Therefore they have not dealt prudently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have not prospered, and all their flocks are scattered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Hark, the sound of a rumor! [The invading army] comes!–a great commotion out of the north country–to make the cities of Judah a desolation, a dwelling place of jackals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' O Lord [pleads Jeremiah in the name of the people], I know that [the determination of] the way of a man is not in himself; it is not in man [even in a strong man or in a man at his best] to direct his [own] steps. [Ps. 37:23; Prov. 20:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' O Lord, correct, instruct, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chastise me, but with judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in just measure–not in Your anger, lest You diminish me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring me to nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Pour out Your wrath upon the nations that do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' recognize You and upon the peoples that do not call upon Your name. For they have devoured Jacob, yes, devoured him and consumed him and made his habitation a desolate waste.'
