document_id: 1CO.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW ABOUT the spiritual gifts (the special endowments of supernatural energy), brethren, I do not want you to be misinformed.'
  '10':
  - type: text
    content: ' To another the working of miracles, to another prophetic insight (the gift of interpreting the divine will and purpose); to another the ability to discern '
  - type: text
    content: and
  - type: text
    content: ' distinguish between [the utterances of true] spirits [and false ones], to another various kinds of [unknown] tongues, to another the ability to interpret [such] tongues.'
  '11':
  - type: text
    content: ' All these [gifts, achievements, abilities] are inspired '
  - type: text
    content: and
  - type: text
    content: ' brought to pass by one and the same [Holy] Spirit, Who apportions to each person individually [exactly] as He chooses.'
  '12':
  - type: text
    content: ' For just as the body is a unity and yet has many parts, and all the parts, though many, form [only] one body, so it is with Christ (the Messiah, the Anointed One).'
  '13':
  - type: text
    content: ' For by [means of the personal agency of] one [Holy] Spirit we were all, whether Jews or Greeks, slaves or free, baptized [and by baptism united together] into one body, and all made to drink of one [Holy] Spirit.'
  '14':
  - type: text
    content: ' For the body does not consist of one limb '
  - type: text
    content: or
  - type: text
    content: ' organ but of many.'
  '15':
  - type: text
    content: ' If the foot should say, Because I am not the hand, I do not belong to the body, would it be therefore not [a part] of the body?'
  '16':
  - type: text
    content: ' If the ear should say, Because I am not the eye, I do not belong to the body, would it be therefore not [a part] of the body?'
  '17':
  - type: text
    content: ' If the whole body were an eye, where [would be the sense of] hearing? If the whole body were an ear, where [would be the sense of] smell?'
  '18':
  - type: text
    content: ' But as it is, God has placed '
  - type: text
    content: and
  - type: text
    content: ' arranged the limbs '
  - type: text
    content: and
  - type: text
    content: ' organs in the body, each [particular one] of them, just as He wished '
  - type: text
    content: and
  - type: text
    content: ' saw fit '
  - type: text
    content: and
  - type: text
    content: ' with the best adaptation.'
  '19':
  - type: text
    content: ' But if [the whole] were all a single organ, where would the body be?'
  '2':
  - type: text
    content: ' You know that when you were heathen, you were led off after idols that could not speak [habitually] as impulse directed '
  - type: text
    content: and
  - type: text
    content: ' whenever the occasion might arise.'
  '20':
  - type: text
    content: ' And now there are [certainly] many limbs '
  - type: text
    content: and
  - type: text
    content: ' organs, but a single body.'
  '21':
  - type: text
    content: ' And the eye is not able to say to the hand, I have no need of you, nor again the head to the feet, I have no need of you.'
  '22':
  - type: text
    content: ' But instead, there is [absolute] necessity for the parts of the body that are considered the more weak.'
  '23':
  - type: text
    content: ' And those [parts] of the body which we consider rather ignoble are [the very parts] which we invest with additional honor, and our unseemly parts '
  - type: text
    content: and
  - type: text
    content: ' those unsuitable for exposure are treated with seemliness (modesty and decorum),'
  '24':
  - type: text
    content: ' Which our more presentable parts do not require. But God has so adjusted (mingled, harmonized, and subtly proportioned the parts of) the whole body, giving the greater honor '
  - type: text
    content: and
  - type: text
    content: ' richer endowment to the inferior parts which lack [apparent importance],'
  '25':
  - type: text
    content: ' So that there should be no division '
  - type: text
    content: or
  - type: text
    content: ' discord '
  - type: text
    content: or
  - type: text
    content: ' lack of adaptation [of the parts of the body to each other], but the members all alike should have a mutual interest in '
  - type: text
    content: and
  - type: text
    content: ' care for one another.'
  '26':
  - type: text
    content: ' And if one member suffers, all the parts [share] the suffering; if one member is honored, all the members [share in] the enjoyment of it.'
  '27':
  - type: text
    content: ' Now you [collectively] are Christ''s body and [individually] you are members of it, each part severally '
  - type: text
    content: and
  - type: text
    content: ' distinct [each with his own place and function].'
  '28':
  - type: text
    content: ' So God has appointed some in the church [for His own use]: first apostles (special messengers); second prophets (inspired preachers and expounders); third teachers; then wonder-workers; then those with ability to heal the sick; helpers; administrators; [speakers in] different (unknown) tongues.'
  '29':
  - type: text
    content: ' Are all apostles (special messengers)? Are all prophets (inspired interpreters of the will and purposes of God)? Are all teachers? Do all have the power of performing miracles?'
  '3':
  - type: text
    content: ' Therefore I want you to understand that no one speaking under the power '
  - type: text
    content: and
  - type: text
    content: ' influence of the [Holy] Spirit of God can [ever] say, Jesus be cursed! And no one can [really] say, Jesus is [my] Lord, except by '
  - type: text
    content: and
  - type: text
    content: ' under the power '
  - type: text
    content: and
  - type: text
    content: ' influence of the Holy Spirit.'
  '30':
  - type: text
    content: ' Do all possess extraordinary powers of healing? Do all speak with tongues? Do all interpret?'
  '31':
  - type: text
    content: ' But earnestly desire '
  - type: text
    content: and
  - type: text
    content: ' zealously cultivate the greatest '
  - type: text
    content: and
  - type: text
    content: ' best gifts '
  - type: text
    content: and
  - type: text
    content: ' graces (the higher gifts and the choicest graces). And yet I will show you a still more excellent way [one that is better by far and the highest of them all–love].'
  '4':
  - type: text
    content: ' Now there are distinctive varieties '
  - type: text
    content: and
  - type: text
    content: ' distributions of endowments (gifts, extraordinary powers distinguishing certain Christians, due to the power of divine grace operating in their souls by the Holy Spirit) and they vary, but the [Holy] Spirit remains the same.'
  '5':
  - type: text
    content: ' And there are distinctive varieties of service '
  - type: text
    content: and
  - type: text
    content: ' ministration, but it is the same Lord [Who is served].'
  '6':
  - type: text
    content: ' And there are distinctive varieties of operation [of working to accomplish things], but it is the same God Who inspires '
  - type: text
    content: and
  - type: text
    content: ' energizes them all in all.'
  '7':
  - type: text
    content: ' But to each one is given the manifestation of the [Holy] Spirit [the evidence, the spiritual illumination of the Spirit] for good '
  - type: text
    content: and
  - type: text
    content: ' profit.'
  '8':
  - type: text
    content: ' To one is given in '
  - type: text
    content: and
  - type: text
    content: ' through the [Holy] Spirit [the power to speak] a message of wisdom, and to another [the power to express] a word of knowledge '
  - type: text
    content: and
  - type: text
    content: ' understanding according to the same [Holy] Spirit;'
  '9':
  - type: text
    content: ' To another [wonder-working] faith by the same [Holy] Spirit, to another the extraordinary powers of healing by the one Spirit;'
