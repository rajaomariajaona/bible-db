document_id: 1CO.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW ABOUT the spiritual gifts (the special endowments of supernatural energy), brethren, I do not want you to be misinformed.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' To another the working of miracles, to another prophetic insight (the gift of interpreting the divine will and purpose); to another the ability to discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinguish between [the utterances of true] spirits [and false ones], to another various kinds of [unknown] tongues, to another the ability to interpret [such] tongues.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' All these [gifts, achievements, abilities] are inspired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought to pass by one and the same [Holy] Spirit, Who apportions to each person individually [exactly] as He chooses.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For just as the body is a unity and yet has many parts, and all the parts, though many, form [only] one body, so it is with Christ (the Messiah, the Anointed One).'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For by [means of the personal agency of] one [Holy] Spirit we were all, whether Jews or Greeks, slaves or free, baptized [and by baptism united together] into one body, and all made to drink of one [Holy] Spirit.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the body does not consist of one limb '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' organ but of many.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' If the foot should say, Because I am not the hand, I do not belong to the body, would it be therefore not [a part] of the body?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' If the ear should say, Because I am not the eye, I do not belong to the body, would it be therefore not [a part] of the body?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If the whole body were an eye, where [would be the sense of] hearing? If the whole body were an ear, where [would be the sense of] smell?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But as it is, God has placed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arranged the limbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' organs in the body, each [particular one] of them, just as He wished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saw fit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with the best adaptation.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But if [the whole] were all a single organ, where would the body be?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' You know that when you were heathen, you were led off after idols that could not speak [habitually] as impulse directed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' whenever the occasion might arise.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And now there are [certainly] many limbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' organs, but a single body.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the eye is not able to say to the hand, I have no need of you, nor again the head to the feet, I have no need of you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But instead, there is [absolute] necessity for the parts of the body that are considered the more weak.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And those [parts] of the body which we consider rather ignoble are [the very parts] which we invest with additional honor, and our unseemly parts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' those unsuitable for exposure are treated with seemliness (modesty and decorum),'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Which our more presentable parts do not require. But God has so adjusted (mingled, harmonized, and subtly proportioned the parts of) the whole body, giving the greater honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' richer endowment to the inferior parts which lack [apparent importance],'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' So that there should be no division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' discord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lack of adaptation [of the parts of the body to each other], but the members all alike should have a mutual interest in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' care for one another.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And if one member suffers, all the parts [share] the suffering; if one member is honored, all the members [share in] the enjoyment of it.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Now you [collectively] are Christ''s body and [individually] you are members of it, each part severally '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinct [each with his own place and function].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So God has appointed some in the church [for His own use]: first apostles (special messengers); second prophets (inspired preachers and expounders); third teachers; then wonder-workers; then those with ability to heal the sick; helpers; administrators; [speakers in] different (unknown) tongues.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Are all apostles (special messengers)? Are all prophets (inspired interpreters of the will and purposes of God)? Are all teachers? Do all have the power of performing miracles?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Therefore I want you to understand that no one speaking under the power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' influence of the [Holy] Spirit of God can [ever] say, Jesus be cursed! And no one can [really] say, Jesus is [my] Lord, except by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under the power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' influence of the Holy Spirit.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Do all possess extraordinary powers of healing? Do all speak with tongues? Do all interpret?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' But earnestly desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' zealously cultivate the greatest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' best gifts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graces (the higher gifts and the choicest graces). And yet I will show you a still more excellent way [one that is better by far and the highest of them all–love].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Now there are distinctive varieties '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distributions of endowments (gifts, extraordinary powers distinguishing certain Christians, due to the power of divine grace operating in their souls by the Holy Spirit) and they vary, but the [Holy] Spirit remains the same.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And there are distinctive varieties of service '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ministration, but it is the same Lord [Who is served].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And there are distinctive varieties of operation [of working to accomplish things], but it is the same God Who inspires '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' energizes them all in all.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But to each one is given the manifestation of the [Holy] Spirit [the evidence, the spiritual illumination of the Spirit] for good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profit.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' To one is given in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through the [Holy] Spirit [the power to speak] a message of wisdom, and to another [the power to express] a word of knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding according to the same [Holy] Spirit;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' To another [wonder-working] faith by the same [Holy] Spirit, to another the extraordinary powers of healing by the one Spirit;'
