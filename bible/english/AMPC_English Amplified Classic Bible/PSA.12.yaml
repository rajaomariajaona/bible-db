document_id: PSA.12,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; set +[possibly+] an octave below. A Psalm of David.
  - type: text
    content: ' HELP, '
  - type: text
    content: Lord
  - type: text
    content: '! For principled '
  - type: text
    content: and
  - type: text
    content: ' godly people are here no more; faithfulness '
  - type: text
    content: and
  - type: text
    content: ' the faithful vanish from among the sons of men.'
  '2':
  - type: text
    content: ' To his neighbor each one speaks words without use '
  - type: text
    content: or
  - type: text
    content: ' worth '
  - type: text
    content: or
  - type: text
    content: ' truth; with flattering lips and double heart [deceitfully] they speak.'
  '3':
  - type: text
    content: ' May the Lord cut off all flattering lips '
  - type: text
    content: and
  - type: text
    content: ' the tongues that speak proud boasting,'
  '4':
  - type: text
    content: ' Those who say, With our tongues we prevail; our lips are our own [to command at our will]–who is lord '
  - type: text
    content: and
  - type: text
    content: ' master over us?'
  '5':
  - type: text
    content: ' Now will I arise, says the Lord, because the poor are oppressed, because of the groans of the needy; I will set him in safety '
  - type: text
    content: and
  - type: text
    content: ' in the salvation for which he pants.'
  '6':
  - type: text
    content: ' The words '
  - type: text
    content: and
  - type: text
    content: ' promises of the Lord are pure words, like silver refined in an earthen furnace, purified seven times over.'
  '7':
  - type: text
    content: ' You will keep them and preserve them, O Lord; You will guard '
  - type: text
    content: and
  - type: text
    content: ' keep us from this [evil] generation forever.'
  '8':
  - type: text
    content: ' The wicked walk '
  - type: text
    content: or
  - type: text
    content: ' prowl about on every side, as vileness is exalted [and baseness is rated high] among the sons of men.'
