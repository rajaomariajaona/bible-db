document_id: PSA.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; set +[possibly+] an octave below. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HELP, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! For principled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly people are here no more; faithfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the faithful vanish from among the sons of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' To his neighbor each one speaks words without use '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' worth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' truth; with flattering lips and double heart [deceitfully] they speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' May the Lord cut off all flattering lips '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the tongues that speak proud boasting,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Those who say, With our tongues we prevail; our lips are our own [to command at our will]–who is lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' master over us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now will I arise, says the Lord, because the poor are oppressed, because of the groans of the needy; I will set him in safety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the salvation for which he pants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promises of the Lord are pure words, like silver refined in an earthen furnace, purified seven times over.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You will keep them and preserve them, O Lord; You will guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep us from this [evil] generation forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The wicked walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' prowl about on every side, as vileness is exalted [and baseness is rated high] among the sons of men.'
