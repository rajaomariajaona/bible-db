document_id: PSA.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; for Jeduthun +[founder of an official musical family+]. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I SAID, I will take heed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guard my ways, that I may sin not with my tongue; I will muzzle my mouth as with a bridle while the wicked are before me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I was dumb with silence, I held my peace without profit and had no comfort away from good, while my distress was renewed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' My heart was hot within me. While I was musing, the fire burned; then I spoke with my tongue:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Lord, make me to know my end and [to appreciate] the measure of my days–what it is; let me know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize how frail I am [how transient is my stay here].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, You have made my days as [short as] handbreadths, and my lifetime is as nothing in Your sight. Truly every man at his best is merely a breath! Selah [pause, and think calmly of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Surely every man walks to and fro–like a shadow in a pantomime; surely for futility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' emptiness he is in turmoil; each one heaps up riches, not knowing who will gather them. [I Cor. 7:31; James 4:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And now, Lord, what do I wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect? My hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation are in You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Deliver me from all my transgressions; make me not the scorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach of the [self-confident] fool!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I am dumb, I open not my mouth, for it is You Who has done it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Remove Your stroke away from me; I am consumed by the conflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the blow of Your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When with rebukes You correct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chasten man for sin, You waste his beauty like a moth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what is dear to him consumes away; surely every man is a mere breath. Selah [pause, and think calmly of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Hear my prayer, O Lord, and give ear to my cry; hold not Your peace at my tears! For I am Your passing guest, a temporary resident, as all my fathers were.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' O look away from me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spare me, that I may recover cheerfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know gladness before I go and am no more!'
