document_id: PSA.39,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; for Jeduthun +[founder of an official musical family+]. A Psalm of David.
  - type: text
    content: ' I SAID, I will take heed '
  - type: text
    content: and
  - type: text
    content: ' guard my ways, that I may sin not with my tongue; I will muzzle my mouth as with a bridle while the wicked are before me.'
  '10':
  - type: text
    content: ' Remove Your stroke away from me; I am consumed by the conflict '
  - type: text
    content: and
  - type: text
    content: ' the blow of Your hand.'
  '11':
  - type: text
    content: ' When with rebukes You correct '
  - type: text
    content: and
  - type: text
    content: ' chasten man for sin, You waste his beauty like a moth '
  - type: text
    content: and
  - type: text
    content: ' what is dear to him consumes away; surely every man is a mere breath. Selah [pause, and think calmly of that]!'
  '12':
  - type: text
    content: ' Hear my prayer, O Lord, and give ear to my cry; hold not Your peace at my tears! For I am Your passing guest, a temporary resident, as all my fathers were.'
  '13':
  - type: text
    content: ' O look away from me '
  - type: text
    content: and
  - type: text
    content: ' spare me, that I may recover cheerfulness '
  - type: text
    content: and
  - type: text
    content: ' encouraging strength '
  - type: text
    content: and
  - type: text
    content: ' know gladness before I go and am no more!'
  '2':
  - type: text
    content: ' I was dumb with silence, I held my peace without profit and had no comfort away from good, while my distress was renewed.'
  '3':
  - type: text
    content: ' My heart was hot within me. While I was musing, the fire burned; then I spoke with my tongue:'
  '4':
  - type: text
    content: ' Lord, make me to know my end and [to appreciate] the measure of my days–what it is; let me know '
  - type: text
    content: and
  - type: text
    content: ' realize how frail I am [how transient is my stay here].'
  '5':
  - type: text
    content: ' Behold, You have made my days as [short as] handbreadths, and my lifetime is as nothing in Your sight. Truly every man at his best is merely a breath! Selah [pause, and think calmly of that]!'
  '6':
  - type: text
    content: ' Surely every man walks to and fro–like a shadow in a pantomime; surely for futility '
  - type: text
    content: and
  - type: text
    content: ' emptiness he is in turmoil; each one heaps up riches, not knowing who will gather them. [I Cor. 7:31; James 4:14.]'
  '7':
  - type: text
    content: ' And now, Lord, what do I wait for '
  - type: text
    content: and
  - type: text
    content: ' expect? My hope '
  - type: text
    content: and
  - type: text
    content: ' expectation are in You.'
  '8':
  - type: text
    content: ' Deliver me from all my transgressions; make me not the scorn '
  - type: text
    content: and
  - type: text
    content: ' reproach of the [self-confident] fool!'
  '9':
  - type: text
    content: ' I am dumb, I open not my mouth, for it is You Who has done it.'
