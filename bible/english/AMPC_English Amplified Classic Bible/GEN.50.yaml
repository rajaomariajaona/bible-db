document_id: GEN.50,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JOSEPH fell upon his father''s face and wept over him and kissed him.'
  '10':
  - type: text
    content: ' And they came to the threshing floor of Atad, which is beyond [west of] the Jordan, and there they mourned with a great lamentation and extreme demonstrations of sorrow [according to Egyptian custom]; and [Joseph] made a mourning for his father seven days.'
  '11':
  - type: text
    content: ' When the inhabitants of the land, the Canaanites, saw the mourning at the floor of Atad, they said, This is a grievous mourning for the Egyptians. Therefore the place was called Abel-mizraim [mourning of Egypt]; it is west of the Jordan.'
  '12':
  - type: text
    content: ' Thus [Jacob''s] sons did for him as he had commanded them.'
  '13':
  - type: text
    content: ' For his sons carried him to the land of Canaan and buried him in the cave of the field of Machpelah, east of Mamre, which Abraham bought, along with the field, for a possession as a burying place from Ephron the Hittite.'
  '14':
  - type: text
    content: ' After he had buried his father, Joseph returned to Egypt, he and his brethren and all who had gone up with him.'
  '15':
  - type: text
    content: ' When Joseph''s brethren saw that their father was dead, they said, Perhaps now Joseph will hate us and will pay us back for all the evil we did to him.'
  '16':
  - type: text
    content: ' And they sent a messenger to Joseph, saying, Your father commanded before he died, saying,'
  '17':
  - type: text
    content: ' So shall you say to Joseph: Forgive (take up and away all resentment and all claim to requital concerning), I pray you now, the trespass of your brothers and their sin, for they did evil to you. Now, we pray you, forgive the trespass of the servants of your father''s God. And Joseph wept when they spoke thus to him.'
  '18':
  - type: text
    content: ' Then his brothers went and fell down before him, saying, See, we are your servants (your slaves)!'
  '19':
  - type: text
    content: ' And Joseph said to them, Fear not; for am I in the place of God? [Vengeance is His, not mine.]'
  '2':
  - type: text
    content: ' And Joseph ordered his servants the physicians to embalm his father. So the physicians embalmed Israel.'
  '20':
  - type: text
    content: ' As for you, you thought evil against me, but God meant it for good, to bring about that many people should be kept alive, as they are this day.'
  '21':
  - type: text
    content: ' Now therefore, do not be afraid. I will provide for '
  - type: text
    content: and
  - type: text
    content: ' support you and your little ones. And he comforted them [imparting cheer, hope, strength] and spoke to their hearts [kindly].'
  '22':
  - type: text
    content: ' Joseph dwelt in Egypt, he and his father''s household. And Joseph lived 110 years.'
  '23':
  - type: text
    content: ' And Joseph saw Ephraim''s children of the third generation; the children also of Machir son of Manasseh were brought up on Joseph''s knees.'
  '24':
  - type: text
    content: ' And Joseph said to his brethren, I am going to die. But God will surely visit you and bring you out of this land to the land He swore to Abraham, to Isaac, and to Jacob [to give you].'
  '25':
  - type: text
    content: ' And Joseph took an oath from the sons of Israel, saying, God will surely visit you, and you will carry up my bones from here.'
  '26':
  - type: text
    content: ' So Joseph died, being 110 years old; and they embalmed him, and he was put in a coffin in Egypt.'
  '3':
  - type: text
    content: ' Then forty days were devoted [to this purpose] for him, for that is the customary number of days required for those who are embalmed. And the Egyptians wept and bemoaned him [as they would for royalty] for seventy days.'
  '4':
  - type: text
    content: ' And when the days of his weeping '
  - type: text
    content: and
  - type: text
    content: ' deep grief were past, Joseph said to [the nobles of] the house of Pharaoh, If now I have found grace in your eyes, speak, I pray you, to Pharaoh [for Joseph was dressed in mourning and could not do so himself], saying,'
  '5':
  - type: text
    content: ' My father made me swear, saying, I am about to die; in my tomb which I hewed out for myself in the land of Canaan, there you shall bury me. So now let me go up, I pray you, and bury my father, and I will come again.'
  '6':
  - type: text
    content: ' And Pharaoh said, Go up and bury your father, as he made you swear.'
  '7':
  - type: text
    content: ' And Joseph went up [to Canaan] to bury his father; and with him went all the officials of Pharaoh–the nobles of his court, '
  - type: text
    content: and
  - type: text
    content: ' the elders of his house and all the nobles '
  - type: text
    content: and
  - type: text
    content: ' elders of the land of Egypt–'
  '8':
  - type: text
    content: ' And all the household of Joseph and his brethren and his father''s household. Only their little ones and their flocks and herds they left in the land of Goshen.'
  '9':
  - type: text
    content: ' And there went with [Joseph] both chariots and horsemen; and it was a very great company.'
