document_id: GEN.50
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOSEPH fell upon his father''s face and wept over him and kissed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Joseph ordered his servants the physicians to embalm his father. So the physicians embalmed Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then forty days were devoted [to this purpose] for him, for that is the customary number of days required for those who are embalmed. And the Egyptians wept and bemoaned him [as they would for royalty] for seventy days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when the days of his weeping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deep grief were past, Joseph said to [the nobles of] the house of Pharaoh, If now I have found grace in your eyes, speak, I pray you, to Pharaoh [for Joseph was dressed in mourning and could not do so himself], saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' My father made me swear, saying, I am about to die; in my tomb which I hewed out for myself in the land of Canaan, there you shall bury me. So now let me go up, I pray you, and bury my father, and I will come again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Pharaoh said, Go up and bury your father, as he made you swear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Joseph went up [to Canaan] to bury his father; and with him went all the officials of Pharaoh–the nobles of his court, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the elders of his house and all the nobles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' elders of the land of Egypt–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the household of Joseph and his brethren and his father''s household. Only their little ones and their flocks and herds they left in the land of Goshen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And there went with [Joseph] both chariots and horsemen; and it was a very great company.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they came to the threshing floor of Atad, which is beyond [west of] the Jordan, and there they mourned with a great lamentation and extreme demonstrations of sorrow [according to Egyptian custom]; and [Joseph] made a mourning for his father seven days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When the inhabitants of the land, the Canaanites, saw the mourning at the floor of Atad, they said, This is a grievous mourning for the Egyptians. Therefore the place was called Abel-mizraim [mourning of Egypt]; it is west of the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus [Jacob''s] sons did for him as he had commanded them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For his sons carried him to the land of Canaan and buried him in the cave of the field of Machpelah, east of Mamre, which Abraham bought, along with the field, for a possession as a burying place from Ephron the Hittite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' After he had buried his father, Joseph returned to Egypt, he and his brethren and all who had gone up with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When Joseph''s brethren saw that their father was dead, they said, Perhaps now Joseph will hate us and will pay us back for all the evil we did to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they sent a messenger to Joseph, saying, Your father commanded before he died, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So shall you say to Joseph: Forgive (take up and away all resentment and all claim to requital concerning), I pray you now, the trespass of your brothers and their sin, for they did evil to you. Now, we pray you, forgive the trespass of the servants of your father''s God. And Joseph wept when they spoke thus to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then his brothers went and fell down before him, saying, See, we are your servants (your slaves)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Joseph said to them, Fear not; for am I in the place of God? [Vengeance is His, not mine.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' As for you, you thought evil against me, but God meant it for good, to bring about that many people should be kept alive, as they are this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now therefore, do not be afraid. I will provide for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' support you and your little ones. And he comforted them [imparting cheer, hope, strength] and spoke to their hearts [kindly].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Joseph dwelt in Egypt, he and his father''s household. And Joseph lived 110 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Joseph saw Ephraim''s children of the third generation; the children also of Machir son of Manasseh were brought up on Joseph''s knees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Joseph said to his brethren, I am going to die. But God will surely visit you and bring you out of this land to the land He swore to Abraham, to Isaac, and to Jacob [to give you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Joseph took an oath from the sons of Israel, saying, God will surely visit you, and you will carry up my bones from here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So Joseph died, being 110 years old; and they embalmed him, and he was put in a coffin in Egypt.'
