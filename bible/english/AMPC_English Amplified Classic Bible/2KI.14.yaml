document_id: 2KI.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE second year of Jehoash son of Jehoahaz king of Israel, Amaziah son of Joash king of Judah reigned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He was twenty-five years old when he began his twenty-nine-year reign in Jerusalem. His mother was Jehoaddin of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He did right in the sight of the Lord, yet not like David his [forefather]. He did all things as Joash his father did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the high places were not removed; the people still sacrificed and burned incense on the high places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' As soon as the kingdom was established in Amaziah''s hand, he slew his servants who had slain the king his father. [II Kings 12:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But he did not slay the children of the murderers, in compliance with what is written in the Book of the Law of Moses, in which the Lord commanded, The fathers shall not be put to death for the children, nor the children for the fathers; but every man shall die for his own sin only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Amaziah slew of Edom in the Valley of Salt 10,000, and took Sela (Greek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: petra
  - type: text
    text: ' [rock]) by war, and called it Joktheel, which is the name of it to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Amaziah sent messengers to Jehoash son of Jehoahaz, the son of Jehu, king of Israel, saying, Come, let us look one another in the face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' test each other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jehoash king of Israel replied to Amaziah king of Judah, The thistle in Lebanon sent to the cedar in Lebanon, saying, Give your daughter to my son as wife. And a wild beast of Lebanon passed by and trampled the thistle [leaving the cedar unharmed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You have indeed smitten Edom, and your heart has lifted you up. Glory in that, and stay at home; for why should you meddle to your hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoke calamity, causing you to fall, you and Judah with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But Amaziah would not hear. So Jehoash king of Israel went up; and he and Amaziah king of Judah measured swords at Beth-shemesh, which belongs to Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But Judah was defeated by Israel, and every man fled home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Jehoash king of Israel captured Amaziah king of Judah, son of Joash, the son of Ahaziah, at Beth-shemesh, and came to Jerusalem and broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, 400 cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He seized all the gold and silver and all the vessels found in the Lord''s house and in the treasuries of the king''s house, also hostages, and returned to Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The rest of the acts of Jehoash, his might, and how he fought with Amaziah king of Judah, are they not written in the Book of the Chronicles of Israel''s Kings?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Jehoash slept with his fathers, and was buried in Samaria with Israel''s kings. Jeroboam [II] reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Amaziah son of Joash king of Judah lived after the death of Jehoash son of Jehoahaz king of Israel fifteen years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The rest of the acts of Amaziah, are they not written in the Book of the Chronicles of the Kings of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now a conspiracy was made against him in Jerusalem, and Amaziah fled to Lachish, but they sent after him to Lachish and slew him there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' They brought him on horses and he was buried at Jerusalem with his fathers in the City of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And all the people of Judah took Azariah, sixteen years old, and made him king instead of his father Amaziah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He built Elath and restored it to Judah after the king [his father] died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' In the fifteenth year of Amaziah son of Joash king of Judah Jeroboam [II] son of Jehoash king of Israel began to reign in Samaria, and reigned forty-one years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He did evil in the sight of the Lord; he did not depart from all the sins of Jeroboam [I] son of Nebat, with which he made Israel to sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Jeroboam restored Israel''s border from the entrance of Hamath to the [Dead] Sea of the Arabah, according to the word of the Lord, the God of Israel, which He spoke through His servant Jonah son of Amittai, the prophet from Gath-hepher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For the Lord saw as very bitter the affliction of Israel; there was no one left, bond or free, nor any helper for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But the Lord had not said that He would blot out the name of Israel from under the heavens, so He saved them by the hand of Jeroboam [II] son of Jehoash.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The rest of the acts of Jeroboam [II], all that he did, his might, how he warred, and how he recovered for Israel Damascus and Hamath, which had belonged to Judah, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jeroboam [II] slept with his fathers, the kings of Israel. Zechariah his son reigned in his stead.'
