document_id: EXO.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN MOSES and the Israelites sang this song to the Lord, saying, I will sing to the Lord, for He has triumphed gloriously; the horse and his rider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' its chariot has He thrown into the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord is my Strength and my Song, and He has become my Salvation; this is my God, and I will praise Him, my father''s God, and I will exalt Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord is a Man of War; the Lord is His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Pharaoh''s chariots and his host has He cast into the sea; his chosen captains also are sunk in the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The floods cover them; they sank in the depths [clad in mail] like a stone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Your right hand, O Lord, is glorious in power; Your right hand, O Lord, shatters the enemy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In the greatness of Your majesty You overthrow those rising against You. You send forth Your fury; it consumes them like stubble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' With the blast of Your nostrils the waters piled up, the floods stood fixed in a heap, the deeps congealed in the heart of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The enemy said, I will pursue, I will overtake, I will divide the spoil; my desire shall be satisfied upon them; I will draw my sword, my hand shall destroy them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You [Lord] blew with Your wind, the sea covered them; [clad in mail] they sank as lead in the mighty waters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Who is like You, O Lord, among the gods? Who is like You, glorious in holiness, awesome in splendor, doing wonders?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You stretched out Your right hand, the earth''s [sea] swallowed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You in Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness have led forth the people whom You have redeemed; You have guided them in Your strength to Your holy habitation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The peoples have heard of it; they tremble; pangs have taken hold on the inhabitants of Philistia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now the chiefs of Edom are dismayed; the mighty men of Moab [renowned for strength], trembling takes hold of them; all the inhabitants of Canaan have melted away–little by little.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Terror and dread fall upon them; because of the greatness of Your arm they are as still as a stone–till Your people pass by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' over [into Canaan], O Lord, till the people pass by whom You have purchased.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You will bring them in [to the land] and plant them on Your own mountain, the place, O Lord, You have made for Your dwelling, the sanctuary, O Lord, which Your hands have established.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Lord will reign forever and ever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the horses of Pharaoh went with his chariots and horsemen into the sea, and the Lord brought back the waters of the sea upon them, but the Israelites walked on dry ground in the midst of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Miriam the prophetess, the sister of Aaron, took a timbrel in her hand, and all the women went out after her with timbrels and dancing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Miriam responded to them, Sing to the Lord, for He has triumphed gloriously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is highly exalted; the horse and his rider He has thrown into the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Moses led Israel onward from the Red Sea and they went into the Wilderness of Shur; they went three days [thirty-three miles] in the wilderness and found no water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When they came to Marah, they could not drink its waters for they were bitter; therefore it was named Marah [bitterness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The people murmured against Moses, saying, What shall we drink?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And he cried to the Lord, and the Lord showed him a tree which he cast into the waters, and the waters were made sweet. There [the Lord] made for them a statute and an ordinance, and there He proved them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Saying, If you will diligently hearken to the voice of the Lord your God and will do what is right in His sight, and will listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey His commandments and keep all His statutes, I will put none of the diseases upon you which I brought upon the Egyptians, for I am the Lord Who heals you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they came to Elim, where there were twelve springs of water and seventy palm trees; and they encamped there by the waters.'
