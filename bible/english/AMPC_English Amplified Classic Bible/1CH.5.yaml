document_id: 1CH.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW [we come to] the sons of Reuben the firstborn of Israel. For [Reuben] was the eldest, but because he polluted his father''s couch [with Bilhah his father''s concubine] his birthright was given to the sons of Joseph [favorite] son of Israel; so the genealogy is not to be reckoned according to the birthright. [Gen. 35:22; 48:15-22; 49:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Judah prevailed above his brethren, and from him came the prince '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leader [and eventually the Messiah]; yet the birthright was Joseph''s. [Gen. 49:10; Mic. 5:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The sons of Reuben the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The sons of Joel: Shemaiah his son, Gog his son, Shimei his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Micah his son, Reaiah his son, Baal his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Beerah his son, whom Tilgath-pilneser king of Assyria carried away captive; he was a prince of the Reubenites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And his brethren by their families, when the genealogy of their generations was reckoned: the chief Jeiel, and Zechariah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Bela son of Azaz, the son of Shema, the son of Joel, who dwelt in Aroer as far as Nebo and Baal-meon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Eastward [Bela] inhabited the land as far as the entrance into the desert this [west] side of the river Euphrates, because their cattle had multiplied in the land of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In the days of [King] Saul they made war with the Hagrites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Ishmaelites, who fell by their hands; they dwelt in their tents in all the land east of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The children of Gad who dwelt opposite them in the land of Bashan, as far as Salecah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Joel the chief, Shapham the next, Janai, and Shaphat in Bashan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Their kinsmen of the houses of their fathers: Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber–seven in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' These were the sons of Abihail son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Ahi son of Abdiel, the son of Guni, was chief in their fathers'' houses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They dwelt in Gilead, in Bashan and in its towns, and in all the suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands of Sharon to their limits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All these were enrolled by genealogies in the days of Jotham king of Judah and in the days of Jeroboam [II] king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The sons of Reuben, the Gadites, and the half-tribe of Manasseh–valiant men able to bear buckler and sword and to shoot with bow and skillful in war–were 44,760 able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ready to go forth to war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And [these Israelites, on the east side of the Jordan River] made war with the Hagrites [a tribe of northern Arabia], Jetur, Naphish, and Nodab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' They were given help against them, and the Hagrites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Ishmaelites were delivered into their hands, and all who were allied with them, for they cried to God in the battle; and He granted their entreaty, because they relied on, clung to, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And [these Israelites] took away their adversaries'' herds: of their camels 50,000, and of sheep 250,000, and of donkeys 2,000, and of the lives of men 100,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For a great number fell mortally wounded, because the battle was God''s. And [these Israelites] dwelt in their territory until the captivity [by Assyria more than five centuries later]. [II Kings 15:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the people of the half-tribe of Manasseh dwelt in the land; their settlements spread from Bashan to Baal-hermon, Senir, and Mount Hermon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And these were the heads of their fathers'' houses: Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel, mighty men of strength of mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit [enabling them to encounter danger with firmness and personal bravery], famous men, and heads of the houses of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' They transgressed against the God of their fathers and played the harlot [by unfaithfulness to their own God and running] after the gods of the native peoples, whom God had destroyed before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So the God of Israel stirred up the spirit of Pul king of Assyria, [that is,] the spirit of Tilgath-pilneser king of Assyria, and he carried them away, the Reubenites, Gadites, and half-tribe of Manasseh and brought them to Halah, Habor, Hara, and the river Gozan, to this day.'
