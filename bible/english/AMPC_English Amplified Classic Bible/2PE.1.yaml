document_id: 2PE.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SIMON PETER, a servant and apostle (special messenger) of Jesus Christ, to those who have received (obtained an equal privilege of) like precious faith with ourselves in '
  - type: text
    content: and
  - type: text
    content: ' through the righteousness of our God and Savior Jesus Christ:'
  '10':
  - type: text
    content: ' Because of this, brethren, be all the more solicitous '
  - type: text
    content: and
  - type: text
    content: ' eager to make sure (to ratify, to strengthen, to make steadfast) your calling and election; for if you do this, you will never stumble '
  - type: text
    content: or
  - type: text
    content: ' fall.'
  '11':
  - type: text
    content: ' Thus there will be richly '
  - type: text
    content: and
  - type: text
    content: ' abundantly provided for you entry into the eternal kingdom of our Lord and Savior Jesus Christ.'
  '12':
  - type: text
    content: ' So I intend always to remind you about these things, although indeed you know them and are firm in the truth that [you] now [hold].'
  '13':
  - type: text
    content: ' I think it right, as long as I am in this tabernacle (tent, body), to stir you up by way of remembrance,'
  '14':
  - type: text
    content: ' Since I know that the laying aside of this body of mine will come speedily, as our Lord Jesus Christ made clear to me.'
  '15':
  - type: text
    content: ' Moreover, I will diligently endeavor [to see to it] that [even] after my departure (decease) you may be able at all times to call these things to mind.'
  '16':
  - type: text
    content: ' For we were not following cleverly devised stories when we made known to you the power and coming of our Lord Jesus Christ (the Messiah), but we were eyewitnesses of His majesty (grandeur, authority of sovereign power).'
  '17':
  - type: text
    content: ' For when He was invested with honor and glory from God the Father and a voice was borne to Him by the [splendid] Majestic Glory [in the bright cloud that overshadowed Him, saying], This is My beloved Son in Whom I am well pleased '
  - type: text
    content: and
  - type: text
    content: ' delight,'
  '18':
  - type: text
    content: ' We [actually] heard this voice borne out of heaven, for we were together with Him on the holy mountain.'
  '19':
  - type: text
    content: ' And we have the prophetic word [made] firmer still. You will do well to pay close attention to it as to a lamp shining in a dismal (squalid and dark) place, until the day breaks through [the gloom] and the Morning Star rises (comes into being) in your hearts.'
  '2':
  - type: text
    content: ' May grace (God''s favor) and peace (which is perfect well-being, all necessary good, all spiritual prosperity, and freedom from fears and agitating passions and moral conflicts) be multiplied to you in [the full, personal, precise, and correct] knowledge of God and of Jesus our Lord.'
  '20':
  - type: text
    content: ' [Yet] first [you must] understand this, that no prophecy of Scripture is [a matter] of any personal '
  - type: text
    content: or
  - type: text
    content: ' private '
  - type: text
    content: or
  - type: text
    content: ' special interpretation (loosening, solving).'
  '21':
  - type: text
    content: ' For no prophecy ever originated because some man willed it [to do so–it never came by human impulse], but men spoke from God who were borne along (moved and impelled) by the Holy Spirit.'
  '3':
  - type: text
    content: ' For His divine power has bestowed upon us all things that [are requisite and suited] to life and godliness, through the [full, personal] knowledge of Him Who called us by '
  - type: text
    content: and
  - type: text
    content: ' to His own glory and excellence (virtue).'
  '4':
  - type: text
    content: ' By means of these He has bestowed on us His precious and exceedingly great promises, so that through them you may escape [by flight] from the moral decay (rottenness and corruption) that is in the world because of covetousness (lust and greed), and become sharers (partakers) of the divine nature.'
  '5':
  - type: text
    content: ' For this very reason, adding your diligence [to the divine promises], employ every effort in exercising your faith to develop virtue (excellence, resolution, Christian energy), and in [exercising] virtue [develop] knowledge (intelligence),'
  '6':
  - type: text
    content: ' And in [exercising] knowledge [develop] self-control, and in [exercising] self-control [develop] steadfastness (patience, endurance), and in [exercising] steadfastness [develop] godliness (piety),'
  '7':
  - type: text
    content: ' And in [exercising] godliness [develop] brotherly affection, and in [exercising] brotherly affection [develop] Christian love.'
  '8':
  - type: text
    content: ' For as these qualities are yours and increasingly abound in you, they will keep [you] from being idle or unfruitful unto the [full personal] knowledge of our Lord Jesus Christ (the Messiah, the Anointed One).'
  '9':
  - type: text
    content: ' For whoever lacks these qualities is blind, [spiritually] shortsighted, seeing only what is near to him, and has become oblivious [to the fact] that he was cleansed from his old sins.'
