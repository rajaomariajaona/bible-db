verses:
  '1':
  - type: text
    content: ' O ISRAEL, return to the Lord your God, for you have stumbled '
  - type: text
    content: and
  - type: text
    content: ' fallen, [visited by calamity] due to your iniquity.'
  '2':
  - type: text
    content: ' Take with you words and return to the Lord. Say to Him, Take away all '
  - type: text
    content: our
  - type: text
    content: ' iniquity; accept what is good '
  - type: text
    content: and
  - type: text
    content: ' receive us graciously; so will we render [our thanks] as bullocks [to be sacrificed] '
  - type: text
    content: and
  - type: text
    content: ' pay the confession of our lips. [Heb. 13:15.]'
  '3':
  - type: text
    content: ' Assyria shall not save us; we will not ride upon horses, neither will we say any more to the work of our hands [idols], You are our gods. For in You [O Lord] the fatherless find love, pity, '
  - type: text
    content: and
  - type: text
    content: ' mercy.'
  '4':
  - type: text
    content: ' I will heal their faithlessness; I will love them freely, for My anger is turned away from [Israel].'
  '5':
  - type: text
    content: ' I will be like the dew '
  - type: text
    content: and
  - type: text
    content: ' the night mist to Israel; he shall grow '
  - type: text
    content: and
  - type: text
    content: ' blossom like the lily and cast forth his roots like [the sturdy evergreens of] Lebanon.'
  '6':
  - type: text
    content: ' His suckers '
  - type: text
    content: and
  - type: text
    content: ' shoots shall spread, and his beauty shall be like the olive tree and his fragrance like [the cedars and aromatic shrubs of] Lebanon.'
  '7':
  - type: text
    content: ' They that dwell under his shade shall return; they shall revive like the grain and blossom like the vine; the scent of it shall be like the wine of Lebanon.'
  '8':
  - type: text
    content: ' Ephraim shall say, What have I to do any more with idols? I have answered [him] and will regard '
  - type: text
    content: and
  - type: text
    content: ' watch over him; I am like a green fir '
  - type: text
    content: or
  - type: text
    content: ' cypress tree; with Me is the fruit found [which is to nourish you].'
  '9':
  - type: text
    content: ' Who is wise, that he may understand these things? Prudent, that he may know them? For the ways of the Lord are right and the [uncompromisingly] just shall walk in them, but transgressors shall stumble '
  - type: text
    content: and
  - type: text
    content: ' fall in them. [Ps. 107:43; Isa. 26:7; Jer. 9:12; Dan. 12:10.]'
