document_id: HOS.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O ISRAEL, return to the Lord your God, for you have stumbled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fallen, [visited by calamity] due to your iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Take with you words and return to the Lord. Say to Him, Take away all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' iniquity; accept what is good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receive us graciously; so will we render [our thanks] as bullocks [to be sacrificed] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay the confession of our lips. [Heb. 13:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Assyria shall not save us; we will not ride upon horses, neither will we say any more to the work of our hands [idols], You are our gods. For in You [O Lord] the fatherless find love, pity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will heal their faithlessness; I will love them freely, for My anger is turned away from [Israel].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I will be like the dew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the night mist to Israel; he shall grow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blossom like the lily and cast forth his roots like [the sturdy evergreens of] Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' His suckers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shoots shall spread, and his beauty shall be like the olive tree and his fragrance like [the cedars and aromatic shrubs of] Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They that dwell under his shade shall return; they shall revive like the grain and blossom like the vine; the scent of it shall be like the wine of Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ephraim shall say, What have I to do any more with idols? I have answered [him] and will regard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch over him; I am like a green fir '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cypress tree; with Me is the fruit found [which is to nourish you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who is wise, that he may understand these things? Prudent, that he may know them? For the ways of the Lord are right and the [uncompromisingly] just shall walk in them, but transgressors shall stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall in them. [Ps. 107:43; Isa. 26:7; Jer. 9:12; Dan. 12:10.]'
