document_id: 1CO.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO THEN, let us [apostles] be looked upon as ministering servants of Christ and stewards (trustees) of the mysteries (the secret purposes) of God.'
  '10':
  - type: text
    content: ' We are [looked upon as] fools on account of Christ '
  - type: text
    content: and
  - type: text
    content: ' for His sake, but you are [supposedly] so amazingly wise '
  - type: text
    content: and
  - type: text
    content: ' prudent in Christ! We are weak, but you are [so very] strong! You are highly esteemed, but we are in disrepute '
  - type: text
    content: and
  - type: text
    content: ' contempt!'
  '11':
  - type: text
    content: ' To this hour we have gone both hungry and thirsty; we [habitually] wear but one undergarment [and shiver in the cold]; we are roughly knocked about and wander around homeless.'
  '12':
  - type: text
    content: ' And we still toil unto weariness [for our living], working hard with our own hands. When men revile us [wound us with an accursed sting], we bless them. When we are persecuted, we take it patiently '
  - type: text
    content: and
  - type: text
    content: ' endure it.'
  '13':
  - type: text
    content: ' When we are slandered '
  - type: text
    content: and
  - type: text
    content: ' defamed, we [try to] answer softly '
  - type: text
    content: and
  - type: text
    content: ' bring comfort. We have been made and are now the rubbish '
  - type: text
    content: and
  - type: text
    content: ' filth of the world [the offscouring of all things, the scum of the earth].'
  '14':
  - type: text
    content: ' I do not write this to shame you, but to warn '
  - type: text
    content: and
  - type: text
    content: ' counsel you as my beloved children.'
  '15':
  - type: text
    content: ' After all, though you should have ten thousand teachers (guides to direct you) in Christ, yet you do not have many fathers. For I became your father in Christ Jesus through the glad tidings (the Gospel).'
  '16':
  - type: text
    content: ' So I urge '
  - type: text
    content: and
  - type: text
    content: ' implore you, be imitators of me.'
  '17':
  - type: text
    content: ' For this very cause I sent to you Timothy, who is my beloved and trustworthy child in the Lord, who will recall to your minds my methods of proceeding '
  - type: text
    content: and
  - type: text
    content: ' course of conduct '
  - type: text
    content: and
  - type: text
    content: ' way of life in Christ, such as I teach everywhere in each of the churches.'
  '18':
  - type: text
    content: ' Some of you have become conceited '
  - type: text
    content: and
  - type: text
    content: ' arrogant '
  - type: text
    content: and
  - type: text
    content: ' pretentious, counting on my not coming to you.'
  '19':
  - type: text
    content: ' But I will come to you [and] shortly, if the Lord is willing, and then I will perceive '
  - type: text
    content: and
  - type: text
    content: ' understand not what the talk of these puffed up '
  - type: text
    content: and
  - type: text
    content: ' arrogant spirits amount to, but their force (the moral power and excellence of soul they really possess).'
  '2':
  - type: text
    content: ' Moreover, it is [essentially] required of stewards that a man should be found faithful [proving himself worthy of trust].'
  '20':
  - type: text
    content: ' For the kingdom of God consists of '
  - type: text
    content: and
  - type: text
    content: ' is based on not talk but power (moral power and excellence of soul).'
  '21':
  - type: text
    content: ' Now which do you prefer? Shall I come to you with a rod of correction, or with love and in a spirit of gentleness?'
  '3':
  - type: text
    content: ' But [as for me personally] it matters very little to me that I should be put on trial by you [on this point], '
  - type: text
    content: and
  - type: text
    content: ' that you or any other human tribunal should investigate '
  - type: text
    content: and
  - type: text
    content: ' question '
  - type: text
    content: and
  - type: text
    content: ' cross-question me. I do not even put myself on trial '
  - type: text
    content: and
  - type: text
    content: ' judge myself.'
  '4':
  - type: text
    content: ' I am not conscious of anything against myself, '
  - type: text
    content: and
  - type: text
    content: ' I feel blameless; but I am not vindicated '
  - type: text
    content: and
  - type: text
    content: ' acquitted before God on that account. It is the Lord [Himself] Who examines '
  - type: text
    content: and
  - type: text
    content: ' judges me.'
  '5':
  - type: text
    content: ' So do not make any hasty '
  - type: text
    content: or
  - type: text
    content: ' premature judgments before the time when the Lord comes [again], for He will both bring to light the secret things that are [now hidden] in darkness and disclose '
  - type: text
    content: and
  - type: text
    content: ' expose the [secret] aims (motives and purposes) of hearts. Then every man will receive his [due] commendation from God.'
  '6':
  - type: text
    content: ' Now I have applied all this [about parties and factions] to myself and Apollos for your sakes, brethren, so that from what I have said of us [as illustrations], you may learn [to think of men in accordance with Scripture and] not to go beyond that which is written, that none of you may be puffed up '
  - type: text
    content: and
  - type: text
    content: ' inflated with pride '
  - type: text
    content: and
  - type: text
    content: ' boast in favor of one [minister and teacher] against another.'
  '7':
  - type: text
    content: ' For who separates you from the others [as a faction leader]? [Who makes you superior and sets you apart from another, giving you the preeminence?] What have you that was not given to you? If then you received it [from someone], why do you boast as if you had not received [but had gained it by your own efforts]?'
  '8':
  - type: text
    content: ' [You behave as if] you are already filled '
  - type: text
    content: and
  - type: text
    content: ' think you have enough [you are full and content, feeling no need of anything more]! Already you have become rich [in spiritual gifts and graces]! [Without any counsel or instruction from us, in your conceit], you have ascended your thrones '
  - type: text
    content: and
  - type: text
    content: ' come into your kingdom without including us! And would that it were true '
  - type: text
    content: and
  - type: text
    content: ' that you did reign, so that we might be sharing the kingdom with you!'
  '9':
  - type: text
    content: ' For it seems to me that God has made an exhibit of us apostles, exposing us to view last [of all, like men in a triumphal procession who are] sentenced to death [and displayed at the end of the line]. For we have become a spectacle to the world [a show in the world''s amphitheater] with both men and angels [as spectators].'
