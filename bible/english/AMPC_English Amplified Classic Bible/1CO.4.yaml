document_id: 1CO.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO THEN, let us [apostles] be looked upon as ministering servants of Christ and stewards (trustees) of the mysteries (the secret purposes) of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moreover, it is [essentially] required of stewards that a man should be found faithful [proving himself worthy of trust].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But [as for me personally] it matters very little to me that I should be put on trial by you [on this point], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that you or any other human tribunal should investigate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' question '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cross-question me. I do not even put myself on trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judge myself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I am not conscious of anything against myself, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I feel blameless; but I am not vindicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acquitted before God on that account. It is the Lord [Himself] Who examines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judges me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So do not make any hasty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' premature judgments before the time when the Lord comes [again], for He will both bring to light the secret things that are [now hidden] in darkness and disclose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expose the [secret] aims (motives and purposes) of hearts. Then every man will receive his [due] commendation from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now I have applied all this [about parties and factions] to myself and Apollos for your sakes, brethren, so that from what I have said of us [as illustrations], you may learn [to think of men in accordance with Scripture and] not to go beyond that which is written, that none of you may be puffed up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inflated with pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast in favor of one [minister and teacher] against another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For who separates you from the others [as a faction leader]? [Who makes you superior and sets you apart from another, giving you the preeminence?] What have you that was not given to you? If then you received it [from someone], why do you boast as if you had not received [but had gained it by your own efforts]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [You behave as if] you are already filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' think you have enough [you are full and content, feeling no need of anything more]! Already you have become rich [in spiritual gifts and graces]! [Without any counsel or instruction from us, in your conceit], you have ascended your thrones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come into your kingdom without including us! And would that it were true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that you did reign, so that we might be sharing the kingdom with you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For it seems to me that God has made an exhibit of us apostles, exposing us to view last [of all, like men in a triumphal procession who are] sentenced to death [and displayed at the end of the line]. For we have become a spectacle to the world [a show in the world''s amphitheater] with both men and angels [as spectators].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' We are [looked upon as] fools on account of Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for His sake, but you are [supposedly] so amazingly wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prudent in Christ! We are weak, but you are [so very] strong! You are highly esteemed, but we are in disrepute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contempt!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' To this hour we have gone both hungry and thirsty; we [habitually] wear but one undergarment [and shiver in the cold]; we are roughly knocked about and wander around homeless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And we still toil unto weariness [for our living], working hard with our own hands. When men revile us [wound us with an accursed sting], we bless them. When we are persecuted, we take it patiently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When we are slandered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defamed, we [try to] answer softly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring comfort. We have been made and are now the rubbish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' filth of the world [the offscouring of all things, the scum of the earth].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I do not write this to shame you, but to warn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel you as my beloved children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' After all, though you should have ten thousand teachers (guides to direct you) in Christ, yet you do not have many fathers. For I became your father in Christ Jesus through the glad tidings (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So I urge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' implore you, be imitators of me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For this very cause I sent to you Timothy, who is my beloved and trustworthy child in the Lord, who will recall to your minds my methods of proceeding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' course of conduct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' way of life in Christ, such as I teach everywhere in each of the churches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Some of you have become conceited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pretentious, counting on my not coming to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But I will come to you [and] shortly, if the Lord is willing, and then I will perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand not what the talk of these puffed up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant spirits amount to, but their force (the moral power and excellence of soul they really possess).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For the kingdom of God consists of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is based on not talk but power (moral power and excellence of soul).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now which do you prefer? Shall I come to you with a rod of correction, or with love and in a spirit of gentleness?'
