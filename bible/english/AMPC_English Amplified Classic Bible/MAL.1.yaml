document_id: MAL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BURDEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oracle (the thing to be lifted up) of the word of the Lord to Israel by Malachi [My messenger].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I have loved you, says the Lord. Yet you say, How '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in what way have You loved us? Was not Esau Jacob''s brother? says the Lord; yet I loved Jacob (Israel),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But [in comparison with the degree of love I have for Jacob] I have hated Esau [Edom] and have laid waste his mountains, and his heritage I have given to the jackals of the wilderness. [Rom. 9:13, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Though [impoverished] Edom should say, We are beaten down, but we will return and build the waste places–thus says the Lord of hosts: They may build, but I will tear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' throw down; and men will call them the Wicked Country, the people against whom the Lord has indignation forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Your own eyes shall see this and you shall say, The Lord is great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will be magnified over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beyond the border of Israel! [Isa. 34; 63:1-6; Jer. 49:7-22; Ezek. 25:12-14; Obad. 1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' A son honors his father, and a servant his master. If then I am a Father, where is My honor? And if I am a Master, where is the [reverent] fear due Me? says the Lord of hosts to you, O priests, who despise My name. You say, How '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in what way have we despised Your name?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' By offering polluted food upon My altar. And you ask, How have we polluted it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profaned You? By thinking that the table of the Lord is contemptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' may be despised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When you [priests] offer blind [animals] for sacrifice, is it not evil? And when you offer the lame and the sick, is it not evil? Present such a thing [a blind or lame or sick animal] now to your governor [in payment of your taxes, and see what will happen]. Will he be pleased with you? Or will he receive you graciously? says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now then, I [Malachi] beg [you priests], entreat God [earnestly] that He will be gracious to us. With such a gift from your hand [as a defective animal for sacrifice], will He accept it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' show favor to any of you? says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Oh, that there were even one among you [whose duty it is to minister to Me] who would shut the doors, that you might not kindle fire on My altar to no purpose [an empty, futile, fruitless pretense]! I have no pleasure in you, says the Lord of hosts, nor will I accept an offering from your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For from the rising of the sun to its setting My name shall be great among the nations, and in every place incense shall be offered to My name, and indeed a pure offering; for My name shall be great among the nations, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But you [priests] profane it when [by your actions] you say, The table of the Lord is polluted, and the fruit of it, its food, is contemptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' may be despised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You say also, Behold, what a drudgery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weariness this is! And you have sniffed at it, says the Lord of hosts. And you have brought that which was taken by violence, or the lame or the sick; this you bring as an offering! Shall I accept this from your hand? says the Lord. [Lev. 1:3; Deut. 15:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But cursed is the [cheating] deceiver who has a male in his flock and vows to offer it, yet sacrifices to the [sovereign] Lord a blemished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' diseased thing! For I am a great King, says the Lord of hosts, and My name is terrible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be [reverently] feared among the nations.'
