document_id: MAL.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE BURDEN '
  - type: text
    content: or
  - type: text
    content: ' oracle (the thing to be lifted up) of the word of the Lord to Israel by Malachi [My messenger].'
  '10':
  - type: text
    content: ' Oh, that there were even one among you [whose duty it is to minister to Me] who would shut the doors, that you might not kindle fire on My altar to no purpose [an empty, futile, fruitless pretense]! I have no pleasure in you, says the Lord of hosts, nor will I accept an offering from your hand.'
  '11':
  - type: text
    content: ' For from the rising of the sun to its setting My name shall be great among the nations, and in every place incense shall be offered to My name, and indeed a pure offering; for My name shall be great among the nations, says the Lord of hosts.'
  '12':
  - type: text
    content: ' But you [priests] profane it when [by your actions] you say, The table of the Lord is polluted, and the fruit of it, its food, is contemptible '
  - type: text
    content: and
  - type: text
    content: ' may be despised.'
  '13':
  - type: text
    content: ' You say also, Behold, what a drudgery '
  - type: text
    content: and
  - type: text
    content: ' weariness this is! And you have sniffed at it, says the Lord of hosts. And you have brought that which was taken by violence, or the lame or the sick; this you bring as an offering! Shall I accept this from your hand? says the Lord. [Lev. 1:3; Deut. 15:21.]'
  '14':
  - type: text
    content: ' But cursed is the [cheating] deceiver who has a male in his flock and vows to offer it, yet sacrifices to the [sovereign] Lord a blemished '
  - type: text
    content: or
  - type: text
    content: ' diseased thing! For I am a great King, says the Lord of hosts, and My name is terrible '
  - type: text
    content: and
  - type: text
    content: ' to be [reverently] feared among the nations.'
  '2':
  - type: text
    content: ' I have loved you, says the Lord. Yet you say, How '
  - type: text
    content: and
  - type: text
    content: ' in what way have You loved us? Was not Esau Jacob''s brother? says the Lord; yet I loved Jacob (Israel),'
  '3':
  - type: text
    content: ' But [in comparison with the degree of love I have for Jacob] I have hated Esau [Edom] and have laid waste his mountains, and his heritage I have given to the jackals of the wilderness. [Rom. 9:13, 16.]'
  '4':
  - type: text
    content: ' Though [impoverished] Edom should say, We are beaten down, but we will return and build the waste places–thus says the Lord of hosts: They may build, but I will tear '
  - type: text
    content: and
  - type: text
    content: ' throw down; and men will call them the Wicked Country, the people against whom the Lord has indignation forever.'
  '5':
  - type: text
    content: ' Your own eyes shall see this and you shall say, The Lord is great '
  - type: text
    content: and
  - type: text
    content: ' will be magnified over '
  - type: text
    content: and
  - type: text
    content: ' beyond the border of Israel! [Isa. 34; 63:1-6; Jer. 49:7-22; Ezek. 25:12-14; Obad. 1.]'
  '6':
  - type: text
    content: ' A son honors his father, and a servant his master. If then I am a Father, where is My honor? And if I am a Master, where is the [reverent] fear due Me? says the Lord of hosts to you, O priests, who despise My name. You say, How '
  - type: text
    content: and
  - type: text
    content: ' in what way have we despised Your name?'
  '7':
  - type: text
    content: ' By offering polluted food upon My altar. And you ask, How have we polluted it '
  - type: text
    content: and
  - type: text
    content: ' profaned You? By thinking that the table of the Lord is contemptible '
  - type: text
    content: and
  - type: text
    content: ' may be despised.'
  '8':
  - type: text
    content: ' When you [priests] offer blind [animals] for sacrifice, is it not evil? And when you offer the lame and the sick, is it not evil? Present such a thing [a blind or lame or sick animal] now to your governor [in payment of your taxes, and see what will happen]. Will he be pleased with you? Or will he receive you graciously? says the Lord of hosts.'
  '9':
  - type: text
    content: ' Now then, I [Malachi] beg [you priests], entreat God [earnestly] that He will be gracious to us. With such a gift from your hand [as a defective animal for sacrifice], will He accept it '
  - type: text
    content: or
  - type: text
    content: ' show favor to any of you? says the Lord of hosts.'
