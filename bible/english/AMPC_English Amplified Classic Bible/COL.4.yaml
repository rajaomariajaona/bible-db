document_id: COL.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MASTERS, [on your part] deal with your slaves justly and fairly, knowing that also you have a Master in heaven. [Lev. 25:43, 53.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Aristarchus my fellow prisoner wishes to be remembered to you, as does Mark the relative of Barnabas. You received instructions concerning him; if he comes to you give him a [hearty] welcome.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And [greetings also from] Jesus, who is called Justus. These [Hebrew Christians] alone of the circumcision are among my fellow workers for [the extension of] God''s kingdom, and they have proved a relief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a comfort to me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Epaphras, who is one of yourselves, a servant of Christ Jesus, sends you greetings. [He is] always striving for you earnestly in his prayers, [pleading] that you may [as persons of ripe character and clear conviction] stand firm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mature [in spiritual growth], convinced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fully assured in everything willed by God.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For I bear him testimony that he has labored hard in your behalf and for [the believers] in Laodicea and those in Hierapolis.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Luke the beloved physician and Demas salute you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Give my greetings to the brethren at Laodicea, and to Nympha and the assembly (the church) which meets in her house.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And when this epistle has been read before you, [see] that it is read also in the assembly (the church) of the Laodiceans, and also [see] that you yourselves in turn read the [letter that comes to you] from Laodicea.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And say to Archippus, See that you discharge carefully [the duties of] the ministry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fulfill the stewardship which you have received in the Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I, Paul, [add this final] greeting, writing with my own hand. Remember I am still in prison '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in chains. May grace (God''s unmerited favor and blessing) be with you! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen (so be it).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Be earnest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unwearied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast in your prayer [life], being [both] alert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intent in [your praying] with thanksgiving.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And at the same time pray for us also, that God may open a door to us for the Word (the Gospel), to proclaim the mystery concerning Christ (the Messiah) on account of which I am in prison;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' That I may proclaim it fully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make it clear [speak boldly and unfold that mystery], as is my duty.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Behave yourselves wisely [living prudently and with discretion] in your relations with those of the outside world (the non-Christians), making the very most of the time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seizing (buying up) the opportunity.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let your speech at all times be gracious (pleasant and winsome), seasoned [as it were] with salt, [so that you may never be at a loss] to know how you ought to answer anyone [who puts a question to you].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Tychicus will give you full information about my affairs; [he is] a much-loved brother and faithful ministering assistant and fellow servant [with us] in the Lord.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I have sent him to you for this very purpose, that you may know how we are faring and that he may comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage your hearts.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And with [him is] Onesimus, [our] faithful and beloved brother, who is [one] of yourselves. They will let you know everything that has taken place here [in Rome].'
