document_id: DEU.34,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND MOSES went up from the plains of Moab to Mount Nebo, to the top of Pisgah, that is opposite Jericho. And the Lord showed him all the land–from Gilead to Dan,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And there arose not a prophet since in Israel like Moses, whom the Lord knew face to face,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' [None equal to him] in all the signs and wonders which the Lord sent him to do in the land of Egypt–to Pharaoh and to all his servants and to all his land,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And in all the mighty power and all the great and terrible deeds which Moses wrought in the sight of all Israel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And all Naphtali, and the land of Ephraim and Manasseh, and all the land of Judah to the western [Mediterranean] sea,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the South (the Negeb) and the plain, that is, the Valley of Jericho, the City of Palm Trees, as far as Zoar.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the Lord said to him, This is the land which I swore to Abraham, Isaac, and Jacob, saying, I will give it to your descendants. I have let you see it with your eyes, but you shall not go over there.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' So Moses the servant of the Lord died there in the land of Moab, according to the word of the Lord,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And He buried him in the valley of the land of Moab opposite Beth-peor, but no man knows where his tomb is to this day.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Moses was 120 years old when he died; his eye was not dim nor his natural force abated. [Deut. 31:2.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the Israelites wept for Moses in the plains of Moab thirty days; then the days of weeping and mourning for Moses were ended.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And Joshua son of Nun was full of the spirit of wisdom, for Moses had laid his hands upon him; so the Israelites listened to him and did as the Lord commanded Moses.'
