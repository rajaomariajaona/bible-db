document_id: MAT.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN IT was morning, all the chief priests and the elders of the people held a consultation against Jesus to put Him to death;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And they gave them for the potter''s field, as the Lord directed me.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now Jesus stood before the governor [Pilate], and the governor asked Him, Are you the King of the Jews? Jesus said to him, You have stated [the fact].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But when the charges were made against Him by the chief priests and elders, He made no answer. [Isa. 53:7.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then Pilate said to Him, Do You not hear how many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' how serious are the things they are testifying against You?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But He made no reply to him, not even to a single accusation, so that the governor marveled greatly.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Now at the Feast [of the Passover] the governor was in the habit of setting free for the people any one prisoner whom they chose.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And at that time they had a notorious prisoner whose name was Barabbas.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So when they had assembled for this purpose, Pilate said to them, Whom do you want me to set free for you, Barabbas, or Jesus Who is called Christ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For he knew that it was because of envy that they had handed Him over to him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Also, while he was seated on the judgment bench, his wife sent him a message, saying, Have nothing to do with that just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright Man, for I have had a painful experience today in a dream because of Him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And they bound Him and led Him away and handed Him over to Pilate the governor.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But the chief priests and the elders prevailed on the people to ask for Barabbas, and put Jesus to death.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Again the governor said to them, Which of the two do you wish me to release for you? And they said, Barabbas!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Pilate said to them, Then what shall I do with Jesus Who is called Christ?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' They all replied, Let Him be crucified! And he said, Why? What has He done that is evil? But they shouted all the louder, Let Him be crucified!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' So when Pilate saw that he was getting nowhere, but rather that a riot was about to break out, he took water and washed his hands in the presence of the crowd, saying, I am not guilty of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' responsible for this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: righteous
    - type: text
      text: ' Man''s blood; see to it yourselves. [Deut. 21:6-9; Ps. 26:6.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And all the people answered, Let His blood be on us and on our children! [Josh. 2:19.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' So he set free for them Barabbas; and he [had] Jesus whipped, and delivered Him up to be crucified.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Then the governor''s soldiers took Jesus into the palace, and they gathered the whole battalion about Him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And they stripped off His clothes and put a scarlet robe (garment of dignity and office worn by Roman officers of rank) upon Him,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And, weaving a crown of thorns, they put it on His head and put a reed (staff) in His right hand. And kneeling before Him, they made sport of Him, saying, Hail (greetings, good health to You, long life to You), King of the Jews!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' When Judas, His betrayer, saw that [Jesus] was condemned, [Judas was afflicted in mind and troubled for his former folly; and] with remorse [with little more than a selfish dread of the consequences] he brought back the thirty pieces of silver to the chief priests and the elders, [Exod. 21:32.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And they spat on Him, and took the reed (staff) and struck Him on the head.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And when they finished making sport of Him, they stripped Him of the robe and put His own garments on Him and led Him away to be crucified.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' As they were marching forth, they came upon a man of Cyrene named Simon; this man they forced to carry the cross of Jesus.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And when they came to a place called Golgotha [Latin: Calvary], which means The Place of a Skull,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' They offered Him wine mingled with gall to drink; but when He tasted it, He refused to drink it.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And when they had crucified Him, they divided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distributed His garments [among them] by casting lots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so that the prophet's saying was fulfilled, They parted My garments among them and over My apparel they cast lots.
    - type: text
      text: ' [Ps. 22:18.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Then they sat down there and kept watch over Him.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And over His head they put the accusation against Him (the cause of His death), which read, This is Jesus, the King of the Jews.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' At the same time two robbers were crucified with Him, one on the right hand and one on the left.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And those who passed by spoke reproachfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abusively '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jeered at Him, wagging their heads, [Ps. 22:7, 8; 109:25.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Saying, I have sinned in betraying innocent blood. They replied, What is that to us? See to that yourself.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And they said, You Who would tear down the sanctuary of the temple and rebuild it in three days, rescue Yourself from death. If You are the Son of God, come down from the cross.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' In the same way the chief priests, with the scribes and elders, made sport of Him, saying,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' He rescued others from death; Himself He cannot rescue from death. He is the King of Israel? Let Him come down from the cross now, and we will believe in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleave to Him.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' He trusts in God; let God deliver Him now if He cares for Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' will have Him, for He said, I am the Son of God.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And the robbers who were crucified with Him also abused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproached '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made sport of Him in the same way.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Now from the sixth hour (noon) there was darkness over all the land until the ninth hour (three o''clock).'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And about the ninth hour (three o''clock) Jesus cried with a loud voice, Eli, Eli, lama sabachthani?–that is, My God, My God, why have You abandoned Me [leaving Me helpless, forsaking and failing Me in My need]? [Ps. 22:1.]'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' And some of the bystanders, when they heard it, said, This Man is calling for Elijah!'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And one of them immediately ran and took a sponge, soaked it with vinegar (a sour wine), and put it on a reed (staff), and was about to give it to Him to drink. [Ps. 69:21.]'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' But the others said, Wait! Let us see whether Elijah will come to save Him from death.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And casting the pieces of silver [forward] into the [Holy Place of the sanctuary of the] temple, he departed; and he went off and hanged himself.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' And Jesus cried again with a loud voice and gave up His spirit.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' And at once the curtain of the sanctuary of the temple was torn in two from top to bottom; the earth shook and the rocks were split. [Exod. 26:31-35.]'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' The tombs were opened and many bodies of the saints who had fallen asleep in death were raised [to life];'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' And coming out of the tombs after His resurrection, they went into the holy city and appeared to many people.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' When the centurion and those who were with him keeping watch over Jesus observed the earthquake and all that was happening, they were terribly frightened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' filled with awe, and said, Truly this was God''s Son!'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' There were also numerous women there, looking on from a distance, who were of those who had accompanied Jesus from Galilee, ministering to Him.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' Among them were Mary of Magdala, and Mary the mother of James and Joseph, and the mother of Zebedee''s sons.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' When it was evening, there came a rich man from Arimathea, named Joseph, who also was a disciple of Jesus.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' He went to Pilate and asked for the body of Jesus, and Pilate ordered that it be given to him.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' And Joseph took the body and rolled it up in a clean linen cloth used for swathing dead bodies'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But the chief priests, picking up the pieces of silver, said, It is not legal to put these in the [consecrated] treasury, for it is the price of blood.'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' And laid it in his own fresh (undefiled) tomb, which he had hewn in the rock; and he rolled a big boulder over the door of the tomb and went away.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' And Mary of Magdala and the other Mary kept sitting there opposite the tomb.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' The next day, that is, the day after the day of Preparation [for the Sabbath], the chief priests and the Pharisees assembled before Pilate'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' And said, Sir, we have just remembered how that vagabond Imposter said while He was still alive, After three days I will rise again.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' Therefore give an order to have the tomb made secure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' safeguarded until the third day, for fear that His disciples will come and steal Him away and tell the people that He has risen from the dead, and the last deception '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fraud will be worse than the first.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' Pilate said to them, You have a guard [of soldiers; take them and] go, make it as secure as you can.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' So they went off and made the tomb secure by sealing the boulder, a guard of soldiers being with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remaining to watch.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So after consultation they bought with them [the pieces of silver] the potter''s field [as a place] in which to bury strangers.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore that piece of ground has been called the Field of Blood to the present day.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then were fulfilled the words spoken by Jeremiah the prophet when he said, And they took the thirty pieces of silver, the price of Him on Whom a price had been set by some of the sons of Israel, [Zech. 11:12, 13.]'
