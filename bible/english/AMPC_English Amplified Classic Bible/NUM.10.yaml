document_id: NUM.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Make two trumpets of silver; of hammered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' turned work you shall make them, that you may use them to call the congregation and for breaking camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When they both are blown, all the congregation shall assemble before you at the door of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And if one blast on a single trumpet is blown, then the princes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' leaders, heads of the tribes of Israel, shall gather themselves to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When you blow an alarm, the camps on the east side [of the tabernacle] shall set out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When you blow an alarm the second time, then the camps on the south side shall set out. An alarm shall be blown whenever they are to set out on their journeys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When the congregation is to be assembled, you shall blow [the trumpets in short, sharp tones], but not the blast of an alarm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the sons of Aaron, the priests, shall blow the trumpets, and the trumpets shall be to you for a perpetual statute throughout your generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When you go to war in your land against the enemy that oppresses you, then blow an alarm with the trumpets, that you may be remembered before the Lord your God, and you shall be saved from your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Also in the day of rejoicing, and in your set feasts, and at the beginnings of your months, you shall blow the trumpets over your burnt offerings and your peace offerings; thus they may be a remembrance before your God. I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' On the twentieth day of the second month in the second year [since leaving Egypt], the cloud [of the Lord''s presence] was taken up from over the tabernacle of the Testimony,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Israelites took their journey by stages out of the Wilderness of Sinai, and the [guiding] cloud rested in the Wilderness of Paran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When the journey was to begin, at the command of the Lord through Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the first place went the standard of the camp of the sons of Judah by their companies; and over their host was Nahshon son of Amminadab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And over the host of the tribe of the sons of Issachar was Nethanel son of Zuar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And over the host of the tribe of the sons of Zebulun was Eliab son of Helon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When the tabernacle was taken down, the sons of Gershon and Merari, bearing [it] on their shoulders, set out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The standard of the camp of Reuben set forward by their companies; and over Reuben''s host was Elizur son of Shedeur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And over the host of the tribe of the sons of Simeon was Shelumiel son of Zurishaddai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And over the host of the tribe of the sons of Gad was Eliasaph son of Deuel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then the Kohathites set forward, bearing the holy things, and the tabernacle was set up before they arrived.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the standard of the camp of the sons of Ephraim set forward according to their companies; and over Ephraim''s host was Elishama son of Ammihud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Over the host of the tribe of the sons of Manasseh was Gamaliel son of Pedahzur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And over the host of the tribe of the sons of Benjamin was Abidan son of Gideoni.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then the standard of the camp of the sons of Dan, which was the rear guard of all the camps, set forward according to their companies; and over Dan''s host was Ahiezer son of Ammishaddai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And over the host of the tribe of the sons of Asher was Pagiel son of Ochran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And over the host of the tribe of the sons of Naphtali was Ahira son of Enan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' This was the Israelites'' order of march by their hosts when they set out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Moses said to Hobab son of Reuel the Midianite, Moses'' father-in-law, We are journeying to the place of which the Lord said, I will give it to you. Come with us, and we will do you good, for the Lord has promised good concerning Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Hobab said to him, I will not go; I will depart to my own land and to my family.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Moses said, Do not leave us, I pray you; for you know how we are to encamp in the wilderness, and you will serve as eyes for us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And if you will go with us, it shall be that whatever good the Lord does to us, the same we will do to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' They departed from the mountain of the Lord [Mount Sinai] three days'' journey; and the ark of the covenant of the Lord went before them during the three days'' journey to seek out a resting-place for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' The cloud of the Lord was over them by day when they went forward from the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Whenever the ark set out, Moses said, Rise up, Lord; let Your enemies be scattered; and let those who hate You flee before You. [Ps. 68:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And when it rested, he said, Return, O Lord, to the ten thousand thousands in Israel.'
