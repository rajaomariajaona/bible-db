document_id: NUM.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' Also in the day of rejoicing, and in your set feasts, and at the beginnings of your months, you shall blow the trumpets over your burnt offerings and your peace offerings; thus they may be a remembrance before your God. I am the Lord your God.'
  '11':
  - type: text
    content: ' On the twentieth day of the second month in the second year [since leaving Egypt], the cloud [of the Lord''s presence] was taken up from over the tabernacle of the Testimony,'
  '12':
  - type: text
    content: ' And the Israelites took their journey by stages out of the Wilderness of Sinai, and the [guiding] cloud rested in the Wilderness of Paran.'
  '13':
  - type: text
    content: ' When the journey was to begin, at the command of the Lord through Moses,'
  '14':
  - type: text
    content: ' In the first place went the standard of the camp of the sons of Judah by their companies; and over their host was Nahshon son of Amminadab.'
  '15':
  - type: text
    content: ' And over the host of the tribe of the sons of Issachar was Nethanel son of Zuar.'
  '16':
  - type: text
    content: ' And over the host of the tribe of the sons of Zebulun was Eliab son of Helon.'
  '17':
  - type: text
    content: ' When the tabernacle was taken down, the sons of Gershon and Merari, bearing [it] on their shoulders, set out.'
  '18':
  - type: text
    content: ' The standard of the camp of Reuben set forward by their companies; and over Reuben''s host was Elizur son of Shedeur.'
  '19':
  - type: text
    content: ' And over the host of the tribe of the sons of Simeon was Shelumiel son of Zurishaddai.'
  '2':
  - type: text
    content: ' Make two trumpets of silver; of hammered '
  - type: text
    content: or
  - type: text
    content: ' turned work you shall make them, that you may use them to call the congregation and for breaking camp.'
  '20':
  - type: text
    content: ' And over the host of the tribe of the sons of Gad was Eliasaph son of Deuel.'
  '21':
  - type: text
    content: ' Then the Kohathites set forward, bearing the holy things, and the tabernacle was set up before they arrived.'
  '22':
  - type: text
    content: ' And the standard of the camp of the sons of Ephraim set forward according to their companies; and over Ephraim''s host was Elishama son of Ammihud.'
  '23':
  - type: text
    content: ' Over the host of the tribe of the sons of Manasseh was Gamaliel son of Pedahzur.'
  '24':
  - type: text
    content: ' And over the host of the tribe of the sons of Benjamin was Abidan son of Gideoni.'
  '25':
  - type: text
    content: ' Then the standard of the camp of the sons of Dan, which was the rear guard of all the camps, set forward according to their companies; and over Dan''s host was Ahiezer son of Ammishaddai.'
  '26':
  - type: text
    content: ' And over the host of the tribe of the sons of Asher was Pagiel son of Ochran.'
  '27':
  - type: text
    content: ' And over the host of the tribe of the sons of Naphtali was Ahira son of Enan.'
  '28':
  - type: text
    content: ' This was the Israelites'' order of march by their hosts when they set out.'
  '29':
  - type: text
    content: ' And Moses said to Hobab son of Reuel the Midianite, Moses'' father-in-law, We are journeying to the place of which the Lord said, I will give it to you. Come with us, and we will do you good, for the Lord has promised good concerning Israel.'
  '3':
  - type: text
    content: ' When they both are blown, all the congregation shall assemble before you at the door of the Tent of Meeting.'
  '30':
  - type: text
    content: ' And Hobab said to him, I will not go; I will depart to my own land and to my family.'
  '31':
  - type: text
    content: ' And Moses said, Do not leave us, I pray you; for you know how we are to encamp in the wilderness, and you will serve as eyes for us.'
  '32':
  - type: text
    content: ' And if you will go with us, it shall be that whatever good the Lord does to us, the same we will do to you.'
  '33':
  - type: text
    content: ' They departed from the mountain of the Lord [Mount Sinai] three days'' journey; and the ark of the covenant of the Lord went before them during the three days'' journey to seek out a resting-place for them.'
  '34':
  - type: text
    content: ' The cloud of the Lord was over them by day when they went forward from the camp.'
  '35':
  - type: text
    content: ' Whenever the ark set out, Moses said, Rise up, Lord; let Your enemies be scattered; and let those who hate You flee before You. [Ps. 68:1, 2.]'
  '36':
  - type: text
    content: ' And when it rested, he said, Return, O Lord, to the ten thousand thousands in Israel.'
  '4':
  - type: text
    content: ' And if one blast on a single trumpet is blown, then the princes '
  - type: text
    content: or
  - type: text
    content: ' leaders, heads of the tribes of Israel, shall gather themselves to you.'
  '5':
  - type: text
    content: ' When you blow an alarm, the camps on the east side [of the tabernacle] shall set out.'
  '6':
  - type: text
    content: ' When you blow an alarm the second time, then the camps on the south side shall set out. An alarm shall be blown whenever they are to set out on their journeys.'
  '7':
  - type: text
    content: ' When the congregation is to be assembled, you shall blow [the trumpets in short, sharp tones], but not the blast of an alarm.'
  '8':
  - type: text
    content: ' And the sons of Aaron, the priests, shall blow the trumpets, and the trumpets shall be to you for a perpetual statute throughout your generations.'
  '9':
  - type: text
    content: ' When you go to war in your land against the enemy that oppresses you, then blow an alarm with the trumpets, that you may be remembered before the Lord your God, and you shall be saved from your enemies.'
