document_id: 2CH.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THE end of twenty years, in which Solomon had built the house of the Lord and his own house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The cities which Huram had given to [him] Solomon rebuilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortified, and caused the Israelites to dwell there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Solomon took Hamath-zobah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He built Tadmor in the wilderness and all his store cities in Hamath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Also he built Upper Beth-horon and Lower Beth-horon, fortified cities with walls, gates, and bars,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Baalath and all the store cities [he] had, and all the cities for his chariots and the cities for his horsemen, and all that Solomon desired to build in Jerusalem, in Lebanon, and in all his dominion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All the people who were left of the Hittites, Amorites, Perizzites, Hivites, and Jebusites, who were not of Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But descendants of those who were left in the land, whom the Israelites had not destroyed–of them Solomon made a levy for forced labor to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But of the Israelites Solomon made no slaves for his work; but they were men of war, chiefs of his captains, and captains of his chariots and horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' These were the chiefs of King Solomon''s officers, 250 in authority over the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Solomon brought the daughter of Pharaoh out of the City of David into the house he had built for her, for he said, My wife shall not dwell in the house of David king of Israel, because the places are holy to which the ark of the Lord has come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Solomon offered burnt offerings to the Lord on the Lord''s altar which he had built before the [temple] porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' A certain number every day, offering as Moses commanded for the Sabbaths, the New Moons, and the solemn feast days three times in the year–the Feasts of Unleavened Bread, of Weeks, and of Tabernacles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he appointed, as ordered by David his father, the divisions of the priests for their service, and the Levites to their offices to praise and to serve before the priests as the duty of every day required, and the gatekeepers also by their divisions at every gate; for so had David the man of God commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they did not turn from the command of the king to the priests and Levites in any respect or concerning the treasuries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Thus all the work of Solomon was prepared from the day the foundation of the Lord''s house was laid until it was finished. So the house of the Lord was completed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Solomon went to Ezion-geber and to Eloth on the shore of the [Red] Sea in the land of Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Huram sent him by his servants ships and servants familiar with the sea; and they went with the servants of Solomon to Ophir and took from there 450 talents of gold and brought them to King Solomon.'
