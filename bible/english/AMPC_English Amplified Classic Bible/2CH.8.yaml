document_id: 2CH.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AT THE end of twenty years, in which Solomon had built the house of the Lord and his own house,'
  '10':
  - type: text
    content: ' These were the chiefs of King Solomon''s officers, 250 in authority over the people.'
  '11':
  - type: text
    content: ' Solomon brought the daughter of Pharaoh out of the City of David into the house he had built for her, for he said, My wife shall not dwell in the house of David king of Israel, because the places are holy to which the ark of the Lord has come.'
  '12':
  - type: text
    content: ' Then Solomon offered burnt offerings to the Lord on the Lord''s altar which he had built before the [temple] porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule,'
  '13':
  - type: text
    content: ' A certain number every day, offering as Moses commanded for the Sabbaths, the New Moons, and the solemn feast days three times in the year–the Feasts of Unleavened Bread, of Weeks, and of Tabernacles.'
  '14':
  - type: text
    content: ' And he appointed, as ordered by David his father, the divisions of the priests for their service, and the Levites to their offices to praise and to serve before the priests as the duty of every day required, and the gatekeepers also by their divisions at every gate; for so had David the man of God commanded.'
  '15':
  - type: text
    content: ' And they did not turn from the command of the king to the priests and Levites in any respect or concerning the treasuries.'
  '16':
  - type: text
    content: ' Thus all the work of Solomon was prepared from the day the foundation of the Lord''s house was laid until it was finished. So the house of the Lord was completed.'
  '17':
  - type: text
    content: ' Then Solomon went to Ezion-geber and to Eloth on the shore of the [Red] Sea in the land of Edom.'
  '18':
  - type: text
    content: ' And Huram sent him by his servants ships and servants familiar with the sea; and they went with the servants of Solomon to Ophir and took from there 450 talents of gold and brought them to King Solomon.'
  '2':
  - type: text
    content: ' The cities which Huram had given to [him] Solomon rebuilt '
  - type: text
    content: and
  - type: text
    content: ' fortified, and caused the Israelites to dwell there.'
  '3':
  - type: text
    content: ' And Solomon took Hamath-zobah.'
  '4':
  - type: text
    content: ' He built Tadmor in the wilderness and all his store cities in Hamath.'
  '5':
  - type: text
    content: ' Also he built Upper Beth-horon and Lower Beth-horon, fortified cities with walls, gates, and bars,'
  '6':
  - type: text
    content: ' And Baalath and all the store cities [he] had, and all the cities for his chariots and the cities for his horsemen, and all that Solomon desired to build in Jerusalem, in Lebanon, and in all his dominion.'
  '7':
  - type: text
    content: ' All the people who were left of the Hittites, Amorites, Perizzites, Hivites, and Jebusites, who were not of Israel,'
  '8':
  - type: text
    content: ' But descendants of those who were left in the land, whom the Israelites had not destroyed–of them Solomon made a levy for forced labor to this day.'
  '9':
  - type: text
    content: ' But of the Israelites Solomon made no slaves for his work; but they were men of war, chiefs of his captains, and captains of his chariots and horsemen.'
