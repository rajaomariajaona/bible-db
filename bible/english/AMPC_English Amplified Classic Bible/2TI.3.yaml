document_id: 2TI.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT UNDERSTAND this, that in the last days will come (set in) perilous times of great stress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble [hard to deal with and hard to bear].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For people will be lovers of self '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [utterly] self-centered, lovers of money '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' aroused by an inordinate [greedy] desire for wealth, proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contemptuous boasters. They will be abusive (blasphemous, scoffing), disobedient to parents, ungrateful, unholy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [They will be] without natural [human] affection (callous and inhuman), relentless (admitting of no truce or appeasement); [they will be] slanderers (false accusers, troublemakers), intemperate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loose in morals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conduct, uncontrolled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fierce, haters of good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [They will be] treacherous [betrayers], rash, [and] inflated with self-conceit. [They will be] lovers of sensual pleasures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vain amusements more than '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rather than lovers of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For [although] they hold a form of piety (true religion), they deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are strangers to the power of it [their conduct belies the genuineness of their profession]. Avoid [all] such people [turn away from them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For among them are those who worm their way into homes and captivate silly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak-natured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritually dwarfed women, loaded down with [the burden of their] sins [and easily] swayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led away by various evil desires '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seductive impulses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [These weak women will listen to anybody who will teach them]; they are forever inquiring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' getting information, but are never able to arrive at a recognition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knowledge of the Truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now just as Jannes and Jambres were hostile to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resisted Moses, so these men also are hostile to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppose the Truth. They have depraved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distorted minds, and are reprobate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counterfeit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be rejected as far as the faith is concerned. [Exod. 7:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But they will not get very far, for their rash folly will become obvious to everybody, as was that of those [magicians mentioned].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now you have closely observed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' diligently followed my teaching, conduct, purpose in life, faith, patience, love, steadfastness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Persecutions, sufferings–such as occurred to me at Antioch, at Iconium, and at Lystra, persecutions I endured, but out of them all the Lord delivered me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Indeed all who delight in piety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are determined to live a devoted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly life in Christ Jesus will meet with persecution [will be made to suffer because of their religious stand].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But wicked men and imposters will go on from bad to worse, deceiving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leading astray others and being deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led astray themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But as for you, continue to hold to the things that you have learned and of which you are convinced, knowing from whom you learned [them],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And how from your childhood you have had a knowledge of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been acquainted with the sacred Writings, which are able to instruct you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give you the understanding for salvation which comes through faith in Christ Jesus [through the leaning of the entire human personality on God in Christ Jesus in absolute trust and confidence in His power, wisdom, and goodness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Every Scripture is God-breathed (given by His inspiration) and profitable for instruction, for reproof '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conviction of sin, for correction of error '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline in obedience, [and] for training in righteousness (in holy living, in conformity to God''s will in thought, purpose, and action),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So that the man of God may be complete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proficient, well fitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly equipped for every good work.'
