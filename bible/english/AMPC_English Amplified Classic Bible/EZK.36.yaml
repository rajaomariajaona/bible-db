document_id: EZK.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ALSO YOU, son of man, prophesy to the mountains of Israel and say, You mountains of Israel, hear the word of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord God: Because the enemy has said over you, Aha! and, The ancient heights have become our possession,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore prophesy and say, Thus says the Lord God: Because, yes, because they made you a desolation, and they snapped after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed you from every side so that you became the possession of the rest of the nations and you became the talk and evil gossip of the people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore, O mountains of Israel, hear the word of the Lord God: Thus says the Lord God to the mountains and hills, to the ravines and valleys, to the desolate wastes and the cities that are forsaken, that have become a prey and derision to the rest of the nations that are round about;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore thus says the Lord God: Surely in the fire of My hot jealousy have I spoken against the rest of the nations and against all Edom, who have given to themselves My land with wholehearted joy and with uttermost contempt, that they might empty it out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' possess it for a prey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Prophesy therefore concerning the land of Israel and say to the mountains and hills, to the ravines and valleys, Thus says the Lord God: Behold, I have spoken in My jealousy and in My wrath because you have suffered the shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach of the nations;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore thus says the Lord God: I have lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sworn, Surely the nations that are round about you shall themselves suffer shame and reproach.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But you, O mountains of Israel, shall shoot forth your branches and yield your fruit to My people Israel, for they are soon to come [home].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For behold, I am for you and I will turn to you; and you shall be tilled and sown,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I will multiply men upon you, the whole house of Israel, even all of it; the cities shall be inhabited and the waste places shall be rebuilt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And I will multiply upon you man and beast, and they shall increase and be fruitful. And I will cause you to be inhabited according to your former estate and I will do better for you than at your beginnings; and you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yes, [O mountains of Israel] I will cause men to walk upon you, even My people Israel, and they shall possess you, and you shall be their inheritance; and you shall no more after this bereave them of children [for idol sacrifices].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Thus says the Lord God: Because they say to you, You [O land] are a devourer of men and have bereaved your nation of children [offered to idols],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore you shall devour men no more, neither bereave your nation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cause it to stumble any more, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Neither will I let you hear any more the reproach of the nations, nor shall you suffer the dishonor of the peoples any more, nor shall you cause your nation to stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall any more [through idolatry], says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Son of man, when the house of Israel dwelt in their own land, they defiled it by [doing] their [own] way and by their [idolatrous] doings. Their conduct before Me was like the uncleanness of a woman during her [physical] impurity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So I poured out My wrath upon them for the blood that they had shed upon the land and for their idols with which they had defiled it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I scattered them among the nations, and they were dispersed through the countries; according to their conduct and their [idolatrous] deeds I judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when they came to the nations to which they went, they profaned My holy name in that men said of them, These are the people of the Lord, and yet they had to go forth out of His land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But I had regard, concern, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion for My holy name, which the house of Israel had profaned among the nations to which they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Therefore say to the house of Israel, Thus says the Lord God: I do not do this for your sakes, O house of Israel, but for My holy name''s sake, which you have profaned among the nations to which you went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And I will vindicate the holiness of My great name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' separate it for its holy purpose from all that defiles it–My name, which has been profaned among the nations, which you have profaned among them–and the nations will know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service], when I shall be set apart by you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My holiness vindicated in you before their eyes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For I will take you from among the nations and gather you out of all countries and bring you into your own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then will I sprinkle clean water upon you, and you shall be clean from all your uncleanness; and from all your idols will I cleanse you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' A new heart will I give you and a new spirit will I put within you, and I will take away the stony heart out of your flesh and give you a heart of flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And I will put my Spirit within you and cause you to walk in My statutes, and you shall heed My ordinances and do them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And you shall dwell in the land that I gave to your fathers; and you shall be My people, and I will be your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I will also save you from all your uncleannesses, and I will call forth the grain and make it abundant and lay no famine on you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And I will multiply the fruit of the tree and the increase of the field, that you may no more suffer the reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace of famine among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then you shall [earnestly] remember your own evil ways and your doings that were not good, and shall loathe yourselves in your own sight for your iniquities and for your abominable deeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Not for your sake do I do this, says the Lord God; let that be known to you. Be ashamed and confounded for your [own] wicked ways, O house of Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Thus says the Lord God: In the day that I cleanse you from all your iniquities I will [also] cause [Israel''s] cities to be inhabited, and the waste places shall be rebuilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And the desolate land shall be tilled, that which had lain desolate in the sight of all who passed by.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And they shall say, This land that was desolate has become like the garden of Eden, and the waste and desolate and ruined cities are fortified and inhabited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then the nations that are left round about you shall know that I the Lord have rebuilt the ruined places and replanted that which was desolate. I the Lord have spoken it, and I will do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Thus says the Lord God: For this also I will let the house of Israel inquire of Me to do it for them; I will increase their men like a flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Like the flock of holy things for sacrifice, like the flock of Jerusalem in her [solemn] appointed feasts, so shall the waste cities be filled with flocks of men; and they shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
