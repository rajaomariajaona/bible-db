document_id: HOS.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ISRAEL IS a luxuriant vine that puts forth its [material] fruit. According to the abundance of his fruit he has multiplied his altars [to idols]; according to the goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity of their land they have made goodly pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obelisks [to false gods].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Their heart is divided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deceitful; now shall they be found guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer punishment. The Lord will smite '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' break down [the horns of] their altars; He will destroy their [idolatrous] pillars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Surely now they shall say, We have no [actual] king because we fear not the Lord; and as for the king, what can he do for us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They have spoken mere words of the lips, swearing falsely in making covenants; therefore judgment springs up like hemlock [or other poisonous plants] in the furrows of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The inhabitants of Samaria shall be in terror for the calf [idol] of Beth-aven [the house of idolatry, contemptuously meaning Bethel], for its people shall mourn over it and its [idolatrous] priests who rejoiced over it [shall tremble] for the glory of [their calf god], because it is departed from it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [The golden calf] shall also be carried into Assyria as a tribute-gift to the fighting King Jareb; Ephraim shall be put to shame and Israel shall be ashamed of his own counsel [to set up calf worship and detach Israel from Judah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' As for Samaria, her king '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' her whole monarchy are cut off like twigs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' foam upon the water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The high places also of Aven [once Beth(el), house of God, now (Beth-)aven, house of idolatry], the sin of Israel, shall be destroyed; the thorn and the thistle shall come up on their [idol] altars, and they shall say to the mountains, Cover us! And to the hills, Fall on us! [Luke 23:30; Rev. 6:16; 9:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O Israel, you have [willfully] sinned from the days of Gibeah [when you all but wiped out the tribe of Benjamin]! There [Israel] stood [then, only] that the battle against the sons of unrighteousness might not overtake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn against them at Gibeah [but now the kingdom of the ten tribes and the name of Ephraim shall be utterly blotted out]. [Judg. 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When I please I will chastise them, and hostile peoples shall be gathered against them when I shall bind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yoke them for their two transgressions [revolt from the Lord their God and the worship of idols]. [Jer. 2:13; Lam. 3:31-33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Ephraim indeed is a heifer broken in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving to tread out the grain, but I have [heretofore] spared the beauty of her fair neck. I will now set a rider upon Ephraim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make him to draw; Judah shall plow and Jacob shall break his clods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Sow for yourselves according to righteousness (uprightness and right standing with God); reap according to mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness. Break up your uncultivated ground, for it is time to seek the Lord, to inquire for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of Him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to require His favor, till He comes and teaches you righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rains His righteous gift of salvation upon you. [II Cor. 9:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You have plowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plotted wickedness, you have reaped the [willful] injustice [of oppressors], you have eaten the fruit of lies. Because you have trusted in your [own] way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your chariots, in the multitude of your mighty men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore shall a tumult arise against your people and all your fortresses shall be wasted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed, as Shalmaneser wasted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed Beth-arbel on the day of battle; the mother was dashed in pieces with her children. [II Kings 17:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So shall it be done to you at [idolatrous] Bethel because of your great wickedness; at daybreak shall the king of Israel be utterly cut off.'
