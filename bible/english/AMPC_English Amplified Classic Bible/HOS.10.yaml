document_id: HOS.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ISRAEL IS a luxuriant vine that puts forth its [material] fruit. According to the abundance of his fruit he has multiplied his altars [to idols]; according to the goodness '
  - type: text
    content: and
  - type: text
    content: ' prosperity of their land they have made goodly pillars '
  - type: text
    content: or
  - type: text
    content: ' obelisks [to false gods].'
  '10':
  - type: text
    content: ' When I please I will chastise them, and hostile peoples shall be gathered against them when I shall bind '
  - type: text
    content: and
  - type: text
    content: ' yoke them for their two transgressions [revolt from the Lord their God and the worship of idols]. [Jer. 2:13; Lam. 3:31-33.]'
  '11':
  - type: text
    content: ' Ephraim indeed is a heifer broken in '
  - type: text
    content: and
  - type: text
    content: ' loving to tread out the grain, but I have [heretofore] spared the beauty of her fair neck. I will now set a rider upon Ephraim '
  - type: text
    content: and
  - type: text
    content: ' make him to draw; Judah shall plow and Jacob shall break his clods.'
  '12':
  - type: text
    content: ' Sow for yourselves according to righteousness (uprightness and right standing with God); reap according to mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness. Break up your uncultivated ground, for it is time to seek the Lord, to inquire for '
  - type: text
    content: and
  - type: text
    content: ' of Him, '
  - type: text
    content: and
  - type: text
    content: ' to require His favor, till He comes and teaches you righteousness '
  - type: text
    content: and
  - type: text
    content: ' rains His righteous gift of salvation upon you. [II Cor. 9:10.]'
  '13':
  - type: text
    content: ' You have plowed '
  - type: text
    content: and
  - type: text
    content: ' plotted wickedness, you have reaped the [willful] injustice [of oppressors], you have eaten the fruit of lies. Because you have trusted in your [own] way '
  - type: text
    content: and
  - type: text
    content: ' your chariots, in the multitude of your mighty men,'
  '14':
  - type: text
    content: ' Therefore shall a tumult arise against your people and all your fortresses shall be wasted '
  - type: text
    content: and
  - type: text
    content: ' destroyed, as Shalmaneser wasted '
  - type: text
    content: and
  - type: text
    content: ' destroyed Beth-arbel on the day of battle; the mother was dashed in pieces with her children. [II Kings 17:3.]'
  '15':
  - type: text
    content: ' So shall it be done to you at [idolatrous] Bethel because of your great wickedness; at daybreak shall the king of Israel be utterly cut off.'
  '2':
  - type: text
    content: ' Their heart is divided '
  - type: text
    content: and
  - type: text
    content: ' deceitful; now shall they be found guilty '
  - type: text
    content: and
  - type: text
    content: ' suffer punishment. The Lord will smite '
  - type: text
    content: and
  - type: text
    content: ' break down [the horns of] their altars; He will destroy their [idolatrous] pillars.'
  '3':
  - type: text
    content: ' Surely now they shall say, We have no [actual] king because we fear not the Lord; and as for the king, what can he do for us?'
  '4':
  - type: text
    content: ' They have spoken mere words of the lips, swearing falsely in making covenants; therefore judgment springs up like hemlock [or other poisonous plants] in the furrows of the field.'
  '5':
  - type: text
    content: ' The inhabitants of Samaria shall be in terror for the calf [idol] of Beth-aven [the house of idolatry, contemptuously meaning Bethel], for its people shall mourn over it and its [idolatrous] priests who rejoiced over it [shall tremble] for the glory of [their calf god], because it is departed from it.'
  '6':
  - type: text
    content: ' [The golden calf] shall also be carried into Assyria as a tribute-gift to the fighting King Jareb; Ephraim shall be put to shame and Israel shall be ashamed of his own counsel [to set up calf worship and detach Israel from Judah].'
  '7':
  - type: text
    content: ' As for Samaria, her king '
  - type: text
    content: and
  - type: text
    content: ' her whole monarchy are cut off like twigs '
  - type: text
    content: or
  - type: text
    content: ' foam upon the water.'
  '8':
  - type: text
    content: ' The high places also of Aven [once Beth(el), house of God, now (Beth-)aven, house of idolatry], the sin of Israel, shall be destroyed; the thorn and the thistle shall come up on their [idol] altars, and they shall say to the mountains, Cover us! And to the hills, Fall on us! [Luke 23:30; Rev. 6:16; 9:6.]'
  '9':
  - type: text
    content: ' O Israel, you have [willfully] sinned from the days of Gibeah [when you all but wiped out the tribe of Benjamin]! There [Israel] stood [then, only] that the battle against the sons of unrighteousness might not overtake '
  - type: text
    content: and
  - type: text
    content: ' turn against them at Gibeah [but now the kingdom of the ten tribes and the name of Ephraim shall be utterly blotted out]. [Judg. 20.]'
