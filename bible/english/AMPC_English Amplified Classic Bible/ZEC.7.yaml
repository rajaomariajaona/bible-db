document_id: ZEC.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND IN the fourth year of the reign of King Darius, the word of the Lord came to Zechariah on the fourth day of the ninth month, Chislev.'
  '10':
  - type: text
    content: ' And oppress not the widow or the fatherless, the temporary resident or the poor, and let none of you devise '
  - type: text
    content: or
  - type: text
    content: ' imagine '
  - type: text
    content: or
  - type: text
    content: ' think evil against his brother in your heart.'
  '11':
  - type: text
    content: ' But they refused to listen and turned a rebellious '
  - type: text
    content: and
  - type: text
    content: ' stubborn shoulder and made heavy '
  - type: text
    content: and
  - type: text
    content: ' dull their ears that they might not hear.'
  '12':
  - type: text
    content: ' Yes, they made their hearts as an adamant stone '
  - type: text
    content: or
  - type: text
    content: ' diamond point, lest they should hear the law and the words which the Lord of hosts had sent by His Spirit through the former prophets. Therefore there came great wrath from the Lord of hosts.'
  '13':
  - type: text
    content: ' So it came to pass that as He cried and they would not hear [He said], So they shall cry and I will not answer, says the Lord of hosts,'
  '14':
  - type: text
    content: ' But I will scatter them with a whirlwind among all the nations whom they know not '
  - type: text
    content: and
  - type: text
    content: ' who know not them. Thus the land was desolate after they had gone, so that no man passed through or returned, for they [the Jews by their sins] had [caused to be] laid waste '
  - type: text
    content: and
  - type: text
    content: ' forsaken the pleasant land (the land of desire).'
  '2':
  - type: text
    content: ' Now the people of Bethel had sent Sharezer and Regem-melech and their men to pray '
  - type: text
    content: and
  - type: text
    content: ' entreat the favor of the Lord'
  '3':
  - type: text
    content: ' And to speak to the priests of the house of the Lord of hosts and to the prophets, saying, [Now that I am returned from exile] should I weep in the fifth month, separating myself as I have done these so many years [in Babylon]?'
  '4':
  - type: text
    content: ' Then came the word of the Lord of hosts to me [Zechariah], saying,'
  '5':
  - type: text
    content: ' Speak to all the people of the land and to the priests, saying, When you fasted and mourned in the fifth and seventh months, even those seventy years you were in exile, was it for Me that you fasted, for Me?'
  '6':
  - type: text
    content: ' And when you ate and when you drank, did you not eat for yourselves and drink for yourselves?'
  '7':
  - type: text
    content: ' Should you not hear the words which the Lord cried by the former prophets when Jerusalem was inhabited and in prosperity with her cities round about her, and the South (the Negeb) and the lowlands were inhabited?'
  '8':
  - type: text
    content: ' And the word of the Lord came to Zechariah, saying,'
  '9':
  - type: text
    content: ' Thus has the Lord of hosts spoken: Execute true judgment and show mercy '
  - type: text
    content: and
  - type: text
    content: ' kindness and tender compassion, every man to his brother;'
