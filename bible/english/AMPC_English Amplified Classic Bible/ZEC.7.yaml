document_id: ZEC.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND IN the fourth year of the reign of King Darius, the word of the Lord came to Zechariah on the fourth day of the ninth month, Chislev.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now the people of Bethel had sent Sharezer and Regem-melech and their men to pray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entreat the favor of the Lord'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And to speak to the priests of the house of the Lord of hosts and to the prophets, saying, [Now that I am returned from exile] should I weep in the fifth month, separating myself as I have done these so many years [in Babylon]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then came the word of the Lord of hosts to me [Zechariah], saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Speak to all the people of the land and to the priests, saying, When you fasted and mourned in the fifth and seventh months, even those seventy years you were in exile, was it for Me that you fasted, for Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And when you ate and when you drank, did you not eat for yourselves and drink for yourselves?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Should you not hear the words which the Lord cried by the former prophets when Jerusalem was inhabited and in prosperity with her cities round about her, and the South (the Negeb) and the lowlands were inhabited?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the word of the Lord came to Zechariah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Thus has the Lord of hosts spoken: Execute true judgment and show mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness and tender compassion, every man to his brother;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And oppress not the widow or the fatherless, the temporary resident or the poor, and let none of you devise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' imagine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' think evil against his brother in your heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But they refused to listen and turned a rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stubborn shoulder and made heavy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dull their ears that they might not hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yes, they made their hearts as an adamant stone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' diamond point, lest they should hear the law and the words which the Lord of hosts had sent by His Spirit through the former prophets. Therefore there came great wrath from the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So it came to pass that as He cried and they would not hear [He said], So they shall cry and I will not answer, says the Lord of hosts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But I will scatter them with a whirlwind among all the nations whom they know not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' who know not them. Thus the land was desolate after they had gone, so that no man passed through or returned, for they [the Jews by their sins] had [caused to be] laid waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forsaken the pleasant land (the land of desire).'
