document_id: PSA.45,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; +[set to the tune of+] ``Lilies" +[probably a popular air. A Psalm+] of the sons of Korah. A skillful song, {or} a didactic {or} reflective poem. A song of love.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MY HEART overflows with a goodly theme; I address my psalm to a King. My tongue is like the pen of a ready writer.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Hear, O daughter, consider, submit, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consent to my instruction: forget also your own people and your father''s house;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' So will the King desire your beauty; because He is your Lord, be submissive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor Him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And, O daughter of Tyre, the richest of the people shall entreat your favor with a gift.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The King''s daughter in the inner part [of the palace] is all glorious; her clothing is inwrought with gold. [Rev. 19:7, 8.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' She shall be brought to the King in raiment of needlework; with the virgins, her companions that follow her, she shall be brought to You.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' With gladness and rejoicing will they be brought; they will enter into the King''s palace.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Instead of Your fathers shall be Your sons, whom You will make princes in all the land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I will make Your name to be remembered in all generations; therefore shall the people praise and give You thanks forever and ever.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' You are fairer than the children of men; graciousness is poured upon Your lips; therefore God has blessed You forever.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Gird Your sword upon Your thigh, O mighty One, in Your glory and Your majesty!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And in Your majesty ride on triumphantly for the cause of truth, humility, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteousness (uprightness and right standing with God); and let Your right hand guide You to tremendous things.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Your arrows are sharp; the peoples fall under You; Your darts pierce the hearts of the King''s enemies.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Your throne, O God, is forever and ever; the scepter of righteousness is the scepter of Your kingdom.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You love righteousness, uprightness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right standing with God and hate wickedness; therefore God, Your God, has anointed You with the oil of gladness above Your fellows. [Heb. 1:8, 9.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Your garments are all fragrant with myrrh, aloes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cassia; stringed instruments make You glad.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Kings'' daughters are among Your honorable women; at Your right hand stands the queen in gold of Ophir.'
