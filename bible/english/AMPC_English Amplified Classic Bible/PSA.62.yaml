document_id: PSA.62,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; according to Jeduthun +[Ethan, the noted musician, founder of an official musical family+]. A Psalm of David.
  - type: text
    content: ' FOR GOD alone my soul waits in silence; from Him comes my salvation.'
  '10':
  - type: text
    content: ' Trust not in '
  - type: text
    content: and
  - type: text
    content: ' rely confidently not on extortion '
  - type: text
    content: and
  - type: text
    content: ' oppression, and do not vainly hope in robbery; if riches increase, set not your heart on them.'
  '11':
  - type: text
    content: ' God has spoken once, twice have I heard this: that power belongs to God.'
  '12':
  - type: text
    content: ' Also to You, O Lord, belong mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, for You render to every man according to his work. [Jer. 17:10; Rev. 22:12.]'
  '2':
  - type: text
    content: ' He only is my Rock and my Salvation, my Defense '
  - type: text
    content: and
  - type: text
    content: ' my Fortress, I shall not be greatly moved.'
  '3':
  - type: text
    content: ' How long will you set upon a man that you may slay him, all of you, like a leaning wall, like a tottering fence?'
  '4':
  - type: text
    content: ' They only consult to cast him down from his height [to dishonor him]; they delight in lies. They bless with their mouths, but they curse inwardly. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' My soul, wait only upon God '
  - type: text
    content: and
  - type: text
    content: ' silently submit to Him; for my hope '
  - type: text
    content: and
  - type: text
    content: ' expectation are from Him.'
  '6':
  - type: text
    content: ' He only is my Rock and my Salvation; He is my Defense '
  - type: text
    content: and
  - type: text
    content: ' my Fortress, I shall not be moved.'
  '7':
  - type: text
    content: ' With God rests my salvation and my glory; He is my Rock of unyielding strength '
  - type: text
    content: and
  - type: text
    content: ' impenetrable hardness, and my refuge is in God!'
  '8':
  - type: text
    content: ' Trust in, lean on, rely on, '
  - type: text
    content: and
  - type: text
    content: ' have confidence in Him at all times, you people; pour out your hearts before Him. God is a refuge for us (a fortress and a high tower). Selah [pause, and calmly think of that]!'
  '9':
  - type: text
    content: ' Men of low degree [in the social scale] are emptiness (futility, a breath) '
  - type: text
    content: and
  - type: text
    content: ' men of high degree [in the same scale] are a lie '
  - type: text
    content: and
  - type: text
    content: ' a delusion. In the balances they go up; they are together lighter than a breath.'
