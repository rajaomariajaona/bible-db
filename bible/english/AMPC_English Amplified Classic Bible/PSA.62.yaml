document_id: PSA.62,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; according to Jeduthun +[Ethan, the noted musician, founder of an official musical family+]. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' FOR GOD alone my soul waits in silence; from Him comes my salvation.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Trust not in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rely confidently not on extortion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppression, and do not vainly hope in robbery; if riches increase, set not your heart on them.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' God has spoken once, twice have I heard this: that power belongs to God.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Also to You, O Lord, belong mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness, for You render to every man according to his work. [Jer. 17:10; Rev. 22:12.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He only is my Rock and my Salvation, my Defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my Fortress, I shall not be greatly moved.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' How long will you set upon a man that you may slay him, all of you, like a leaning wall, like a tottering fence?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' They only consult to cast him down from his height [to dishonor him]; they delight in lies. They bless with their mouths, but they curse inwardly. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' My soul, wait only upon God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' silently submit to Him; for my hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectation are from Him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He only is my Rock and my Salvation; He is my Defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my Fortress, I shall not be moved.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' With God rests my salvation and my glory; He is my Rock of unyielding strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' impenetrable hardness, and my refuge is in God!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Trust in, lean on, rely on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have confidence in Him at all times, you people; pour out your hearts before Him. God is a refuge for us (a fortress and a high tower). Selah [pause, and calmly think of that]!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Men of low degree [in the social scale] are emptiness (futility, a breath) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' men of high degree [in the same scale] are a lie '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a delusion. In the balances they go up; they are together lighter than a breath.'
