document_id: JER.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD that came to Jeremiah from the Lord, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Stand in the gate of the Lord''s house and proclaim there this word and say, Hear the word of the Lord, all you of Judah who enter in at these gates to worship the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Thus says the Lord of hosts, the God of Israel: Amend your ways and your doings, and I will cause you to dwell in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Trust not in the lying words [of the false prophets who maintain that God will protect Jerusalem because His temple is there], saying, This is the temple of the Lord, the temple of the Lord, the temple of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For if you thoroughly amend your ways and your doings, if you thoroughly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truly execute justice between every man and his neighbor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If you do not oppress the transient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the alien, the fatherless, and the widow or shed innocent blood [by oppression and by judicial murders] in [Jerusalem] or go after other gods to your own hurt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then I will cause you to dwell in this place, in the land that I gave of old to your fathers to dwell in forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behold, you trust in lying words that cannot benefit [so that you do not profit].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Will you steal, murder, commit adultery, swear falsely, burn incense to Baal, and go after other gods that you have not known,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And [then dare to] come and stand before Me in this house, which is called by My Name, and say, [By the discharge of this religious formality] we are set free!–only to go on with this wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' these abominations?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Has this house, which is called by My Name, become a den of robbers in your eyes [a place of retreat for you between acts of violence]? Behold, I Myself have seen it, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But go now to My place which was in Shiloh [in Ephraim], where I set My Name at the first, and see what I did to it for the wickedness of My people Israel. [I Sam. 4:10-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And now, because you have done all these things, says the Lord, and [because] when I spoke to you persistently [even rising up early and speaking], you did not listen, and when I called you, you did not answer,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore will I do to this house (the temple), which is called by My Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in which you trust, to the place which I gave to you and to your fathers, as I did to Shiloh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And I will cast you out of My sight, as I have cast out all your brethren, even the whole posterity of Ephraim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Therefore do not pray for this people [of Judah] or lift up a cry or entreaty for them or make intercession to Me, for I will not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hear you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Do you not see what they are doing in the cities of Judah and in the streets of Jerusalem?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The children gather wood, the fathers kindle the fire, and the women knead the dough, to make cakes for the queen of heaven; and they pour out drink offerings to other gods, that they may provoke Me to anger!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Am I the One Whom they provoke to anger? says the Lord. Is it not themselves [whom they provoke], to their own confusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to their own shame?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Therefore thus says the Lord God: Behold, My anger and My wrath will be poured out on this place, on man and beast, on the trees of the field and the fruit of the ground; it will burn and not be quenched.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Thus says the Lord of hosts, the God of Israel: Add your burnt offerings to your sacrifices and eat the flesh [if you will. It will avail you nothing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For in the day that I brought them out of the land of Egypt, I did not speak to your fathers or command them concerning burnt offerings or sacrifices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But this thing I did command them: Listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey My voice, and I will be your God and you will be My people; and walk in the whole way that I command you, that it may be well with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But they would not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Me or bend their ear [to Me], but followed the counsels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the stubborn promptings of their own evil hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minds, and they turned their backs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' went in reverse instead of forward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Since the day that your fathers came forth out of the land of Egypt to this day, I have persistently sent to you all My servants the prophets, sending them daily, early and late.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Yet the people would not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Me or bend their ears [to Me], but stiffened their necks and behaved worse than their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Speak all these words to them, but they will not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey you; also call to them, but they will not answer you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Yet you shall say to them, This is the nation that did not obey the voice of the Lord their God or receive instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warning; truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness have perished and have completely vanished from their mouths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Cut off your hair [your crown, O Jerusalem] and cast it away, and take up a lamentation on the bare heights, for the Lord has rejected and forsaken the generation of His wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For the children of Judah have done evil in My sight, says the Lord; they have set their abominations (extremely disgusting and shamefully vile things) in the house which is called by My Name to defile it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they have built the high places of Topheth, which is in the Valley of Ben-hinnom [son of Hinnom], to burn their sons and their daughters in the fire [in honor of Molech, the fire god]–which I did not command, nor did it come into My mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heart. [Lev. 18:21; Josh. 15:8; II Kings 16:2-3; 21:1, 6; Isa. 30:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Therefore, behold, the days are coming, says the Lord, when it shall no more be called Topheth or the Valley of Ben-hinnom [son of Hinnom], but the Valley of Slaughter, for [in bloody warfare] they will bury in Topheth till there is no more room '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' no place else to bury. [Jer. 19:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And the dead bodies of this people will be meat for the fowls of the air and for the beasts of the earth, and none will frighten them away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then will I cause to cease from the cities of Judah and from the streets of Jerusalem the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride; for the land will become a waste.'
