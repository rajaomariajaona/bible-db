document_id: JER.43
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND WHEN Jeremiah had finished speaking to all the people all these words of the Lord their God–everything for which the Lord their God had sent him to them–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Azariah son of Hoshaiah and Johanan son of Kareah and all the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent men said to Jeremiah, You are not telling the truth! The Lord our God has not sent you to say, Do not go into Egypt to dwell there temporarily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Baruch son of Neriah is setting you against us to deliver us into the hands of the Chaldeans, so they may put us to death or carry us away captive to Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So Johanan son of Kareah and all the captains of the forces and all the people did not obey the voice of the Lord to remain in the land of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But Johanan son of Kareah and all the captains of the forces took all the remnant of Judah who had returned to dwell in the land of Judah from all the nations to which they had been driven–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Even men, women, and children, the king''s daughters, and every person whom Nebuzaradan the captain of the guard had left with Gedaliah son of Ahikam, the son of Shaphan; also he took Jeremiah the prophet and Baruch son of Neriah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So they came into the land of Egypt–for they obeyed not the voice of the Lord. And they came to Tahpanhes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then came the word of the Lord to Jeremiah in Tahpanhes, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Take large stones in your hands and hide them in the mortar in the pavement of brick which is at the entrance of Pharaoh''s house in Tahpanhes, in the sight of the men of Judah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And say to them, Thus says the Lord of hosts, the God of Israel: Behold, I will send and take Nebuchadrezzar king of Babylon, My servant [because he works for Me], and I [through him] will set his throne upon these stones that I have hidden; and his [glittering, royal] canopy will be stretched over them. [Ezek. 29:19, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he shall come and smite the land of Egypt, giving such as are [destined] for death, to death, and such as are [destined] for captivity, to captivity, and such as are [destined] for the sword, to the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I [through him] will kindle a fire in the temples of the gods of Egypt; and he will burn [the houses] and carry [the people] away captive. And he will array himself with the land of Egypt, as a shepherd puts on his garment [as he wills and when he chooses]; and he will go away from there in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [Nebuchadrezzar] shall break also the images '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obelisks of Heliopolis [called On or Beth-shemesh–house of the sun] in the land of Egypt, and the temples of the gods of Egypt shall he burn with fire.'
