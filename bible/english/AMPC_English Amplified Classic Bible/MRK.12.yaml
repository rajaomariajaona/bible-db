document_id: MRK.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND [Jesus] started to speak to them in parables [with comparisons and illustrations]. A man planted a vineyard and put a hedge around it and dug a pit for the winepress and built a tower and let it out [for rent] to vinedressers and went into another country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When the season came, he sent a bond servant to the tenants to collect from them some of the fruit of the vineyard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But they took him and beat him and sent him away without anything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Again he sent to them another bond servant, and they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stoned him and
  - type: text
    text: ' wounded him in the head and treated him shamefully [sending him away with insults].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And he sent another, and that one they killed; then many others–some they beat, and some they put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He had still one left [to send], a beloved son; last of all he sent him to them, saying, They will respect my son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But those tenants said to one another, Here is the heir; come on, let us put him to death, and [then] the inheritance will be ours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they took him and killed him, and threw [his body] outside the vineyard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now what will the owner of the vineyard do? He will come and destroy the tenants, and give the vineyard to others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Have you not even read this [passage of] Scripture: The very Stone which [after putting It to the test] the builders rejected has become the Head of the corner [Cornerstone];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' This is from the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is His doing, and it is marvelous in our eyes? [Ps. 118:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they were trying to get hold of Him, but they were afraid of the people, for they knew that He spoke this parable with reference to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against them. So they left Him and departed. [Isa. 5:1-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But they sent some of the Pharisees and of the Herodians to Him for the purpose of entrapping Him in His speech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they came up and said to Him, Teacher, we know that You are sincere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what You profess to be, that You cannot lie, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that You have no personal bias for anyone; for You are not influenced by partiality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have no regard for anyone''s external condition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' position, but in [and on the basis of] truth You teach the way of God. Is it lawful (permissible and right) to give tribute (poll taxes) to Caesar or not?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Should we pay [them] or should we not pay [them]? But knowing their hypocrisy, He asked them, Why do you put Me to the test? Bring Me a coin (a denarius), so I may see it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they brought [Him one]. Then He asked them, Whose image (picture) is this? And whose superscription (title)? They said to Him, Caesar''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Jesus said to them, Pay to Caesar the things that are Caesar''s and to God the things that are God''s. And they stood marveling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greatly amazed at Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And [some] Sadducees came to Him, [of that party] who say there is no resurrection, and they asked Him a question, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Teacher, Moses gave us [a law] that if a man''s brother died, leaving a wife but no child, the man must marry the widow and raise up offspring for his brother. [Deut. 25:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now there were seven brothers; the first one took a wife and died, leaving no children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the second [brother] married her, and died, leaving no children; and the third did the same;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And all seven, leaving no children. Last of all, the woman died also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Now in the resurrection, whose wife will she be? For the seven were married to her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Jesus said to them, Is not this where you wander out of the way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go wrong, because you know neither the Scriptures nor the power of God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For when they arise from among the dead, [men] do not marry nor are [women] given in marriage, but are like the angels in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But concerning the dead being raised–have you not read in the book of Moses, [in the passage] about the [burning] bush, how God said to him, I am the God of Abraham and the God of Isaac and the God of Jacob? [Exod. 3:2-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He is not the God of [the] dead, but of [the] living! You are very wrong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then one of the scribes came up and listened to them disputing with one another, and, noticing that Jesus answered them fitly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admirably, he asked Him, Which commandment is first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' most important of all [in its nature]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jesus answered, The first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' principal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one of all commands
  - type: text
    text: ' is: Hear, O Israel, The Lord our God is one Lord;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And you shall love the Lord your God out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with your whole heart and out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with all your soul (your life) and out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with all your mind (with your faculty of thought and your moral understanding) and out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with all your strength. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is the first and principal commandment.
  - type: text
    text: ' [Deut. 6:4, 5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The second '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is like it and
  - type: text
    text: ' is this, You shall love your neighbor as yourself. There is no other commandment greater than these. [Lev. 19:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the scribe said to Him, Excellently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fitly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admirably answered, Teacher! You have said truly that He is One, and there is no other but Him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And to love Him out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with all the heart and with all the understanding [with the faculty of quick apprehension and intelligence and keenness of discernment] and with all the strength, and to love one''s neighbor as oneself, is much more than all the whole burnt offerings and sacrifices. [I Sam. 15:22; Hos. 6:6; Mic. 6:6-8; Heb. 10:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And when Jesus saw that he answered intelligently (discreetly and having his wits about him), He said to him, You are not far from the kingdom of God. And after that no one ventured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dared to ask Him any further question.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And as Jesus taught in [a porch or court of] the temple, He said, How can the scribes say that the Christ is David''s Son?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' David himself, [inspired] in the Holy Spirit, declared, The Lord said to my Lord, Sit at My right hand until I make Your enemies [a footstool] under Your feet. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' David himself calls Him Lord; so how can it be that He is his Son? Now the great mass of the people heard [Jesus] gladly [listening to Him with delight].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And in [the course of] His teaching, He said, Beware of the scribes, who like to go around in long robes and [to get] greetings in the marketplaces [public forums],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And [have] the front seats in the synagogues and the chief couches (places of honor) at feasts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Who devour widows'' houses and to cover it up make long prayers. They will receive the heavier [sentence of] condemnation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And He sat down opposite the treasury and saw how the crowd was casting money into the treasury. Many rich [people] were throwing in large sums.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And a widow who was poverty-stricken came and put in two copper mites [the smallest of coins], which together make half of a cent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And He called His disciples [to Him] and said to them, Truly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surely I tell you, this widow, [she who is] poverty-stricken, has put in more than all those contributing to the treasury.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' For they all threw in out of their abundance; but she, out of her deep poverty, has put in everything that she had–[even] all she had on which to live.'
