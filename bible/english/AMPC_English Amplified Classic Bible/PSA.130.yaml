document_id: PSA.130
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' OUT OF the depths have I cried to You, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Lord, hear my voice; let Your ears be attentive to the voice of my supplications.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If You, Lord, should keep account of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treat [us according to our] sins, O Lord, who could stand? [Ps. 143:2; Rom. 3:20; Gal. 2:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But there is forgiveness with You [just what man needs], that You may be reverently feared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshiped. [Deut. 10:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I wait for the Lord, I expectantly wait, and in His word do I hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I am looking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waiting for the Lord more than watchmen for the morning, I say, more than watchmen for the morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' O Israel, hope in the Lord! For with the Lord there is mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, and with Him is plenteous redemption.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And He will redeem Israel from all their iniquities.'
