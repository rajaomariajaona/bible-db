document_id: PSA.130,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' OUT OF the depths have I cried to You, O Lord.'
  '2':
  - type: text
    content: ' Lord, hear my voice; let Your ears be attentive to the voice of my supplications.'
  '3':
  - type: text
    content: ' If You, Lord, should keep account of '
  - type: text
    content: and
  - type: text
    content: ' treat [us according to our] sins, O Lord, who could stand? [Ps. 143:2; Rom. 3:20; Gal. 2:16.]'
  '4':
  - type: text
    content: ' But there is forgiveness with You [just what man needs], that You may be reverently feared '
  - type: text
    content: and
  - type: text
    content: ' worshiped. [Deut. 10:12.]'
  '5':
  - type: text
    content: ' I wait for the Lord, I expectantly wait, and in His word do I hope.'
  '6':
  - type: text
    content: ' I am looking '
  - type: text
    content: and
  - type: text
    content: ' waiting for the Lord more than watchmen for the morning, I say, more than watchmen for the morning.'
  '7':
  - type: text
    content: ' O Israel, hope in the Lord! For with the Lord there is mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, and with Him is plenteous redemption.'
  '8':
  - type: text
    content: ' And He will redeem Israel from all their iniquities.'
