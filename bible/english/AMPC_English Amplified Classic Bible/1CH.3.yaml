document_id: 1CH.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THESE SONS of David were born to him in Hebron: the firstborn was Amnon, of Ahinoam the Jezreelitess; second, Daniel (Chileab), of Abigail the Carmelitess;'
  '10':
  - type: text
    content: ' Solomon''s descendants [omitting nonreigning offspring] were: his son Rehoboam. Abijah was his son, Asa his son, Jehoshaphat his son,'
  '11':
  - type: text
    content: ' Jehoram (Joram) his son, Ahaziah his son, Joash his son,'
  '12':
  - type: text
    content: ' Amaziah his son, Azariah his son, Jotham his son,'
  '13':
  - type: text
    content: ' Ahaz his son, Hezekiah his son, Manasseh his son,'
  '14':
  - type: text
    content: ' Amon his son, Josiah his son.'
  '15':
  - type: text
    content: ' The descendants of Josiah: firstborn, Johanan; second, Jehoiakim; third, Zedekiah; fourth, Shallum.'
  '16':
  - type: text
    content: ' The descendants of Jehoiakim: Jehoiachin (Jeconiah) his son, Zedekiah his son.'
  '17':
  - type: text
    content: ' The descendants of Jehoiachin the captive: Shealtiel his son,'
  '18':
  - type: text
    content: ' Malchiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.'
  '19':
  - type: text
    content: ' The sons of Pedaiah: Zerubbabel and Shimei. The sons of Zerubbabel: Meshullam, Hananiah. And Shelomith was their sister;'
  '2':
  - type: text
    content: ' Third, Absalom the son of Maacah daughter of Talmai king of Geshur; fourth, Adonijah, of Haggith;'
  '20':
  - type: text
    content: ' And Hashubah, Ohel, Berechiah, Hasadiah, [and] Jushab-hesed–five [the sons of Meshullam?].'
  '21':
  - type: text
    content: ' The sons of Hananiah: Pelatiah and Jeshaiah, whose son was Rephaiah, his son Arnan, his son Obadiah, his son Shecaniah.'
  '22':
  - type: text
    content: ' The son of Shecaniah: Shemaiah. The sons of Shemaiah: Hattush, Igal, Bariah, Neariah, and Shaphat–six in all.'
  '23':
  - type: text
    content: ' The sons of Neariah: Elioenai, Hizkiah, and Azrikam–three in all.'
  '24':
  - type: text
    content: ' The sons of Elioenai: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani–seven in all.'
  '3':
  - type: text
    content: ' Fifth, Shephatiah, of Abital; sixth, Ithream, of his wife Eglah.'
  '4':
  - type: text
    content: ' These six were born to David in Hebron; there he reigned seven years and six months, and in Jerusalem he reigned thirty-three years.'
  '5':
  - type: text
    content: ' These were born to [David] in Jerusalem: Shimea, Shobab, Nathan, Solomon–four of Bathshua (Bathsheba) daughter of Ammiel (Eliam);'
  '6':
  - type: text
    content: ' Then Ibhar, Elishama, Eliphelet,'
  '7':
  - type: text
    content: ' Nogah, Nepheg, Japhia,'
  '8':
  - type: text
    content: ' Elishama, Eliada, and Eliphelet–nine in all.'
  '9':
  - type: text
    content: ' These were all the sons of David, besides the sons of the concubines. And Tamar was their sister.'
