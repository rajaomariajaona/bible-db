document_id: ISA.64
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' OH, THAT You would rend the heavens and that You would come down, that the mountains might quake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flow down at Your presence–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As when fire kindles the brushwood and the fire causes the waters to boil–to make Your name known to Your adversaries, that the nations may tremble at Your presence!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When You did terrible things which we did not expect, You came down; the mountains quaked at Your presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For from of old no one has heard nor perceived by the ear, nor has the eye seen a God besides You, Who works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shows Himself active on behalf of him who [earnestly] waits for Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You meet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spare him who joyfully works righteousness (uprightness and justice), [earnestly] remembering You in Your ways. Behold, You were angry, for we sinned; we have long continued in our sins [prolonging Your anger]. And shall we be saved?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For we have all become like one who is unclean [ceremonially, like a leper], and all our righteousness (our best deeds of rightness and justice) is like filthy rags '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a polluted garment; we all fade like a leaf, and our iniquities, like the wind, take us away [far from God''s favor, hurrying us toward destruction]. [Lev. 13:45, 46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And no one calls on Your name and awakens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bestirs himself to take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep hold of You; for You have hidden Your face from us and have delivered us into the [consuming] power of our iniquities. [Rom. 1:21-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Yet, O Lord, You are our Father; we are the clay, and You our Potter, and we all are the work of Your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do not be exceedingly angry, O Lord, or [seriously] remember iniquity forever. Behold, consider, we beseech You, we are all Your people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Your holy cities have become a wilderness; Zion has become a wilderness, Jerusalem a desolation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Our holy and our beautiful house, [the temple] where our fathers praised You, is burned with fire, and all our pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desirable places are in ruins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Considering these [calamities], will You restrain Yourself, O Lord [and not come to our aid]? Will You keep silent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not command our deliverance but humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflict us exceedingly?'
