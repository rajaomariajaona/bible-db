document_id: ISA.64,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' OH, THAT You would rend the heavens and that You would come down, that the mountains might quake '
  - type: text
    content: and
  - type: text
    content: ' flow down at Your presence–'
  '10':
  - type: text
    content: ' Your holy cities have become a wilderness; Zion has become a wilderness, Jerusalem a desolation.'
  '11':
  - type: text
    content: ' Our holy and our beautiful house, [the temple] where our fathers praised You, is burned with fire, and all our pleasant '
  - type: text
    content: and
  - type: text
    content: ' desirable places are in ruins.'
  '12':
  - type: text
    content: ' Considering these [calamities], will You restrain Yourself, O Lord [and not come to our aid]? Will You keep silent '
  - type: text
    content: and
  - type: text
    content: ' not command our deliverance but humble '
  - type: text
    content: and
  - type: text
    content: ' afflict us exceedingly?'
  '2':
  - type: text
    content: ' As when fire kindles the brushwood and the fire causes the waters to boil–to make Your name known to Your adversaries, that the nations may tremble at Your presence!'
  '3':
  - type: text
    content: ' When You did terrible things which we did not expect, You came down; the mountains quaked at Your presence.'
  '4':
  - type: text
    content: ' For from of old no one has heard nor perceived by the ear, nor has the eye seen a God besides You, Who works '
  - type: text
    content: and
  - type: text
    content: ' shows Himself active on behalf of him who [earnestly] waits for Him.'
  '5':
  - type: text
    content: ' You meet '
  - type: text
    content: and
  - type: text
    content: ' spare him who joyfully works righteousness (uprightness and justice), [earnestly] remembering You in Your ways. Behold, You were angry, for we sinned; we have long continued in our sins [prolonging Your anger]. And shall we be saved?'
  '6':
  - type: text
    content: ' For we have all become like one who is unclean [ceremonially, like a leper], and all our righteousness (our best deeds of rightness and justice) is like filthy rags '
  - type: text
    content: or
  - type: text
    content: ' a polluted garment; we all fade like a leaf, and our iniquities, like the wind, take us away [far from God''s favor, hurrying us toward destruction]. [Lev. 13:45, 46.]'
  '7':
  - type: text
    content: ' And no one calls on Your name and awakens '
  - type: text
    content: and
  - type: text
    content: ' bestirs himself to take '
  - type: text
    content: and
  - type: text
    content: ' keep hold of You; for You have hidden Your face from us and have delivered us into the [consuming] power of our iniquities. [Rom. 1:21-24.]'
  '8':
  - type: text
    content: ' Yet, O Lord, You are our Father; we are the clay, and You our Potter, and we all are the work of Your hand.'
  '9':
  - type: text
    content: ' Do not be exceedingly angry, O Lord, or [seriously] remember iniquity forever. Behold, consider, we beseech You, we are all Your people.'
