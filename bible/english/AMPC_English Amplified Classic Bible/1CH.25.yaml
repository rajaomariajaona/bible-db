document_id: 1CH.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ALSO DAVID and the chiefs of the host [of the Lord] separated to the [temple] service some of the sons of Asaph, Heman, and Jeduthun, who should prophesy [being inspired] with lyres, harps, and cymbals. The list of the musicians according to their service was:'
  '10':
  - type: text
    content: ' The third to Zaccur, his sons and his brethren, twelve;'
  '11':
  - type: text
    content: ' The fourth to Izri, his sons and his brethren, twelve;'
  '12':
  - type: text
    content: ' The fifth to Nethaniah, his sons and his brethren, twelve;'
  '13':
  - type: text
    content: ' The sixth to Bukkiah, his sons and his brethren, twelve;'
  '14':
  - type: text
    content: ' The seventh to Jesharelah, his sons and his brethren, twelve;'
  '15':
  - type: text
    content: ' The eighth to Jeshaiah, his sons and his brethren, twelve;'
  '16':
  - type: text
    content: ' The ninth to Mattaniah, his sons and his brethren, twelve;'
  '17':
  - type: text
    content: ' The tenth to Shimei, his sons and his brethren, twelve;'
  '18':
  - type: text
    content: ' The eleventh to Azarel, his sons and his brethren, twelve;'
  '19':
  - type: text
    content: ' The twelfth to Hashabiah, his sons and his brethren, twelve;'
  '2':
  - type: text
    content: ' Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah, the sons of Asaph under the direction of Asaph, who prophesied (witnessed and testified under divine inspiration) in keeping with the king''s order.'
  '20':
  - type: text
    content: ' The thirteenth to Shubael, his sons and his brethren, twelve;'
  '21':
  - type: text
    content: ' The fourteenth to Mattithiah, his sons and his brethren, twelve;'
  '22':
  - type: text
    content: ' The fifteenth to Jeremoth, his sons and his brethren, twelve;'
  '23':
  - type: text
    content: ' The sixteenth to Hananiah, his sons and his brethren, twelve;'
  '24':
  - type: text
    content: ' The seventeenth of Joshbekashah, his sons and his brethren, twelve;'
  '25':
  - type: text
    content: ' The eighteenth to Hanani, his sons and his brethren, twelve;'
  '26':
  - type: text
    content: ' The nineteenth to Mallothi, his sons and his brethren, twelve;'
  '27':
  - type: text
    content: ' The twentieth to Eliathah, his sons and his brethren, twelve;'
  '28':
  - type: text
    content: ' The twenty-first to Hothir, his sons and his brethren, twelve;'
  '29':
  - type: text
    content: ' The twenty-second to Giddalti, his sons and his brethren, twelve;'
  '3':
  - type: text
    content: ' Of the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, Shimei, Hashabiah, and Mattithiah, six in all, under the direction of their father Jeduthun, who witnessed '
  - type: text
    content: and
  - type: text
    content: ' prophesied under divine inspiration with the lyre in thanksgiving and praise to the Lord.'
  '30':
  - type: text
    content: ' The twenty-third to Mahazioth, his sons and his brethren, twelve;'
  '31':
  - type: text
    content: ' The twenty-fourth to Romamti-ezer, his sons and his brethren, twelve.'
  '4':
  - type: text
    content: ' Of Heman: the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-ezer, Joshbekashah, Mallothi, Hothir, and Mahazioth.'
  '5':
  - type: text
    content: ' All these were the sons of Heman the king''s seer [his mediator] in the words '
  - type: text
    content: and
  - type: text
    content: ' things of God to exalt Him; for God gave to Heman fourteen sons and three daughters, [Ps. 68:25.]'
  '6':
  - type: text
    content: ' All of whom were [in the choir] under the direction of their father for song in the house of the Lord, with cymbals, harps, and lyres, for the service of the house of God. Asaph, Jeduthun, and Heman were under the order of the king.'
  '7':
  - type: text
    content: ' So the number of them [who led the remainder of the 4,000], with their kinsmen who were specially trained in songs for the Lord, all who were talented singers, was 288. [I Chron. 23:5.]'
  '8':
  - type: text
    content: ' [The musicians] cast lots for their duties, small and great, teacher and scholar alike.'
  '9':
  - type: text
    content: ' The first lot fell for Asaph to Joseph; the second to Gedaliah, to him, his brethren and his sons, twelve;'
