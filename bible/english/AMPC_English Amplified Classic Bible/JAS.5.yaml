document_id: JAS.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' COME NOW, you rich [people], weep aloud and lament over the miseries (the woes) that are surely coming upon you.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [As] an example of suffering and ill-treatment together with patience, brethren, take the prophets who spoke in the name of the Lord [as His messengers].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You know how we call those blessed (happy) who were steadfast [who endured]. You have heard of the endurance of Job, and you have seen the Lord''s [purpose and how He richly blessed him in the] end, inasmuch as the Lord is full of pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tenderness and mercy. [Job 1:21, 22; 42:10; Ps. 111:4.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But above all [things], my brethren, do not swear, either by heaven or by earth or by any other oath; but let your yes be [a simple] yes, and your no be [a simple] no, so that you may not sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall under condemnation.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Is anyone among you afflicted (ill-treated, suffering evil)? He should pray. Is anyone glad at heart? He should sing praise [to God].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Is anyone among you sick? He should call in the church elders (the spiritual guides). And they should pray over him, anointing him with oil in the Lord''s name.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the prayer [that is] of faith will save him who is sick, and the Lord will restore him; and if he has committed sins, he will be forgiven.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Confess to one another therefore your faults (your slips, your false steps, your offenses, your sins) and pray [also] for one another, that you may be healed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restored [to a spiritual tone of mind and heart]. The earnest (heartfelt, continued) prayer of a righteous man makes tremendous power available [dynamic in its working].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Elijah was a human being with a nature such as we have [with feelings, affections, and a constitution like ours]; and he prayed earnestly for it not to rain, and no rain fell on the earth for three years and six months. [I Kings 17:1.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And [then] he prayed again and the heavens supplied rain and the land produced its crops [as usual]. [I Kings 18:42-45.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' [My] brethren, if anyone among you strays from the Truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' falls into error and another [person] brings him back [to God],'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Your abundant wealth has rotted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is ruined, and your [many] garments have become moth-eaten.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Let the [latter] one be sure that whoever turns a sinner from his evil course will save [that one''s] soul from death and will cover a multitude of sins [procure the pardon of the many sins committed by the convert].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Your gold and silver are completely rusted through, and their rust will be testimony against you and it will devour your flesh as if it were fire. You have heaped together treasure for the last days.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' [But] look! [Here are] the wages that you have withheld by fraud from the laborers who have reaped your fields, crying out [for vengeance]; and the cries of the harvesters have come to the ears of the Lord of hosts.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [Here] on earth you have abandoned yourselves to soft (prodigal) living and to [the pleasures of] self-indulgence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-gratification. You have fattened your hearts in a day of slaughter.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' You have condemned and have murdered the righteous (innocent man), [while] he offers no resistance to you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So be patient, brethren, [as you wait] till the coming of the Lord. See how the farmer waits expectantly for the precious harvest from the land. [See how] he keeps up his patient [vigil] over it until it receives the early and late rains.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So you also must be patient. Establish your hearts [strengthen and confirm them in the final certainty], for the coming of the Lord is very near.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Do not complain, brethren, against one another, so that you [yourselves] may not be judged. Look! The Judge is [already] standing at the very door.'
