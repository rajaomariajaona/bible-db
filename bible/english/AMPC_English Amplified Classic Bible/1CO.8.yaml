document_id: 1CO.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW ABOUT food offered to idols: of course we know that all of us possess knowledge [concerning these matters. Yet mere] knowledge causes people to be puffed up (to bear themselves loftily and be proud), but love (affection and goodwill and benevolence) edifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' builds up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourages one to grow [to his full stature].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For suppose someone sees you, a man having knowledge [of God, with an intelligent view of this subject and] reclining at table in an idol''s temple, might he not be encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' emboldened [to violate his own conscientious scruples] if he is weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uncertain, and eat what [to him] is for the purpose of idol worship?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And so by your enlightenment (your knowledge of spiritual things), this weak man is ruined (is lost and perishes)–the brother for whom Christ (the Messiah) died!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And when you sin against your brethren in this way, wounding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' damaging their weak conscience, you sin against Christ.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Therefore, if [my eating a] food is a cause of my brother''s falling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of hindering [his spiritual advancement], I will not eat [such] flesh forever, lest I cause my brother to be tripped up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be offended.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' If anyone imagines that he has come to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand much [of divine things, without love], he does not yet perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand as strongly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clearly, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' has he become as intimately acquainted with anything as he ought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' as is necessary.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But if one loves God truly [with affectionate reverence, prompt obedience, and grateful recognition of His blessing], he is known by God [recognized as worthy of His intimacy and love, and he is owned by Him].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' In this matter, then, of eating food offered to idols, we know that an idol is nothing (has no real existence) and that there is no God but one. [Deut. 6:4.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For although there may be so-called gods, whether in heaven or on earth, as indeed there are many of them, both of gods and of lords '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' masters,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Yet for us there is [only] one God, the Father, Who is the Source of all things and for Whom we [have life], and one Lord, Jesus Christ, through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by Whom are all things and through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by Whom we [ourselves exist]. [Mal. 2:10.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Nevertheless, not all [believers] possess this knowledge. But some, through being all their lives until now accustomed to [thinking of] idols [as real and living], still consider the food [offered to an idol] as that sacrificed to an [actual] god; and their weak consciences become defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' injured if they eat [it].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Now food [itself] will not cause our acceptance by God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' commend us to Him. Eating [food offered to idols] gives us no advantage; neither do we come short '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' become any worse if we do not eat [it].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Only be careful that this power of choice (this permission and liberty to do as you please) which is yours, does not [somehow] become a hindrance (cause of stumbling) to the weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' overscrupulous [giving them an impulse to sin].'
