document_id: 1CO.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW ABOUT food offered to idols: of course we know that all of us possess knowledge [concerning these matters. Yet mere] knowledge causes people to be puffed up (to bear themselves loftily and be proud), but love (affection and goodwill and benevolence) edifies '
  - type: text
    content: and
  - type: text
    content: ' builds up '
  - type: text
    content: and
  - type: text
    content: ' encourages one to grow [to his full stature].'
  '10':
  - type: text
    content: ' For suppose someone sees you, a man having knowledge [of God, with an intelligent view of this subject and] reclining at table in an idol''s temple, might he not be encouraged '
  - type: text
    content: and
  - type: text
    content: ' emboldened [to violate his own conscientious scruples] if he is weak '
  - type: text
    content: and
  - type: text
    content: ' uncertain, and eat what [to him] is for the purpose of idol worship?'
  '11':
  - type: text
    content: ' And so by your enlightenment (your knowledge of spiritual things), this weak man is ruined (is lost and perishes)–the brother for whom Christ (the Messiah) died!'
  '12':
  - type: text
    content: ' And when you sin against your brethren in this way, wounding '
  - type: text
    content: and
  - type: text
    content: ' damaging their weak conscience, you sin against Christ.'
  '13':
  - type: text
    content: ' Therefore, if [my eating a] food is a cause of my brother''s falling '
  - type: text
    content: or
  - type: text
    content: ' of hindering [his spiritual advancement], I will not eat [such] flesh forever, lest I cause my brother to be tripped up '
  - type: text
    content: and
  - type: text
    content: ' fall '
  - type: text
    content: and
  - type: text
    content: ' to be offended.'
  '2':
  - type: text
    content: ' If anyone imagines that he has come to know '
  - type: text
    content: and
  - type: text
    content: ' understand much [of divine things, without love], he does not yet perceive '
  - type: text
    content: and
  - type: text
    content: ' recognize '
  - type: text
    content: and
  - type: text
    content: ' understand as strongly '
  - type: text
    content: and
  - type: text
    content: ' clearly, '
  - type: text
    content: nor
  - type: text
    content: ' has he become as intimately acquainted with anything as he ought '
  - type: text
    content: or
  - type: text
    content: ' as is necessary.'
  '3':
  - type: text
    content: ' But if one loves God truly [with affectionate reverence, prompt obedience, and grateful recognition of His blessing], he is known by God [recognized as worthy of His intimacy and love, and he is owned by Him].'
  '4':
  - type: text
    content: ' In this matter, then, of eating food offered to idols, we know that an idol is nothing (has no real existence) and that there is no God but one. [Deut. 6:4.]'
  '5':
  - type: text
    content: ' For although there may be so-called gods, whether in heaven or on earth, as indeed there are many of them, both of gods and of lords '
  - type: text
    content: and
  - type: text
    content: ' masters,'
  '6':
  - type: text
    content: ' Yet for us there is [only] one God, the Father, Who is the Source of all things and for Whom we [have life], and one Lord, Jesus Christ, through '
  - type: text
    content: and
  - type: text
    content: ' by Whom are all things and through '
  - type: text
    content: and
  - type: text
    content: ' by Whom we [ourselves exist]. [Mal. 2:10.]'
  '7':
  - type: text
    content: ' Nevertheless, not all [believers] possess this knowledge. But some, through being all their lives until now accustomed to [thinking of] idols [as real and living], still consider the food [offered to an idol] as that sacrificed to an [actual] god; and their weak consciences become defiled '
  - type: text
    content: and
  - type: text
    content: ' injured if they eat [it].'
  '8':
  - type: text
    content: ' Now food [itself] will not cause our acceptance by God '
  - type: text
    content: nor
  - type: text
    content: ' commend us to Him. Eating [food offered to idols] gives us no advantage; neither do we come short '
  - type: text
    content: or
  - type: text
    content: ' become any worse if we do not eat [it].'
  '9':
  - type: text
    content: ' Only be careful that this power of choice (this permission and liberty to do as you please) which is yours, does not [somehow] become a hindrance (cause of stumbling) to the weak '
  - type: text
    content: or
  - type: text
    content: ' overscrupulous [giving them an impulse to sin].'
