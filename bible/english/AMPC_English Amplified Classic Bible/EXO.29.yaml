document_id: EXO.29,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THIS IS what you shall do to consecrate (set them apart) that they may serve Me as priests. Take one young bull and two rams, all without blemish,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Then bring the bull before the Tent of Meeting, and Aaron and his sons shall lay their hands upon its head.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And you shall kill the bull before the Lord by the door of the Tent of Meeting.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And you shall take of the blood of the bull and put it on the horns of the altar with your finger, and pour out all the blood at the base of the altar.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And take all the fat that covers the entrails, and the appendage that is on the liver, and the two kidneys, and the fat that is on them, and burn them on the altar.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But the flesh of the bull, its hide, and the contents of its entrails you shall burn with fire outside the camp; it is a sin offering. [Heb. 13:11-13.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' You shall also take one of the rams, and Aaron and his sons shall lay their hands upon the head of the ram.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And you shall kill the ram and you shall take its blood and throw it against the altar round about.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And you shall cut the ram in pieces and wash its entrails and legs and put them with its pieces and its head,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And you shall burn the whole ram upon the altar. It is a burnt offering to the Lord; it is a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance, an offering made by fire to the Lord.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And you shall take the other ram, and Aaron and his sons shall lay their hands upon the head of the ram;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And unleavened bread and unleavened cakes mixed with oil and unleavened wafers spread with oil; of fine flour shall you make them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then you shall kill the ram and take part of its blood and put it on the tip of the right ears of Aaron and his sons and on the thumb of their right hands and on the great toe of their right feet, and dash the rest of the blood against the altar round about.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then you shall take part of the blood that is on the altar, and of the anointing oil, and sprinkle it upon Aaron and his garments and on his sons and their garments; and he and his garments and his sons and their garments shall be sanctified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made holy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Also you shall take the fat of the ram, the fat tail, the fat that covers the entrails, the appendage on the liver, the two kidneys with the fat that is on them, and the right thigh; for it is a ram of consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Take also one loaf of bread, and one cake of oiled bread, and one wafer out of the basket of the unleavened bread that is before the Lord.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And put all these in the hands of Aaron and his sons and they shall wave them for a wave offering before the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then you shall take them from their hands, add them to the burnt offering, and burn them on the altar for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance before the Lord; it is an offering made by fire to the Lord.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And take the breast of the ram of Aaron''s consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination and wave it for a wave offering before the Lord; and it shall be your portion [Moses].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And you shall sanctify (set apart for God) the waved breast of the ram used in the ordination and the waved thigh of the priests'' portion, since it is for Aaron and his sons.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' It shall be for Aaron and his sons as their due portion from the Israelites perpetually, an offering from the Israelites of their peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanksgiving sacrifices, their offering to the Lord.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The holy garments of Aaron shall pass to his descendants who succeed him, to be anointed in them and to be consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained in them.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall put them in one basket and bring them in [it], and bring also the bull and the two rams;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And that son who is [high] priest in his stead shall put them on [each day for] seven days when he comes into the Tent of Meeting to minister in the Holy Place.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' You shall take the ram of the consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination and boil its flesh in a holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set-apart place.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Aaron and his sons shall eat the flesh of the ram and the bread in the basket, at the door of the Tent of Meeting.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' They shall eat those things with which atonement was made, to ordain and consecrate them; but a stranger (layman) shall not eat of them because they are holy (set apart to the worship of God).'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And if any of the flesh or bread for the ordination remains until morning, you shall burn it with fire; it shall not be eaten, because it is holy (set apart to the worship of God).'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Thus shall you do to Aaron and to his sons according to all I have commanded you; during seven days shall you ordain them.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' You shall offer every day a bull as a sin offering for atonement. And you shall cleanse the altar by making atonement for it, and anoint it to consecrate it.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Seven days you shall make atonement for the altar and sanctify it [set it apart for God]; and the altar shall be most holy; whoever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' whatever touches the altar must be holy (set apart for God''s service).'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Now this is what you shall offer on the altar: two lambs a year old shall be offered day by day continually.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' One lamb you shall offer in the morning and the other lamb in the evening;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And bring Aaron and his sons to the door of the Tent of Meeting [out where the laver is] and wash them with water.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And with the one lamb a tenth measure of fine flour mixed with a fourth of a hin of beaten oil, and a fourth of a hin of wine for a drink offering [to be poured out].'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' And the other lamb you shall offer at evening, and do with it as with the cereal offering of the morning and with the drink offering, for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance, an offering made by fire to the Lord.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' This shall be a continual burnt offering throughout your generations at the door of the Tent of Meeting before the Lord, where I will meet with you to speak there to you.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' There I will meet with the Israelites, and the Tent of Meeting shall be sanctified by My glory [the Shekinah, God''s visible presence].'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And I will sanctify the Tent of Meeting and the altar; I will sanctify also both Aaron and his sons to minister to Me in the priest''s office.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And I will dwell among the Israelites and be their God.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And they shall know [from personal experience] that I am the Lord their God, Who brought them forth out of the land of Egypt that I might dwell among them; I am the Lord their God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then take the garments and put on Aaron the long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunic and the robe of the ephod and the ephod and the breastplate, and gird him with the skillfully woven girding band of the ephod.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And you shall put the turban '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' miter upon his head and put the holy crown upon the turban.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then take the anointing oil and pour it on his head and anoint him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And bring his sons and put long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunics on them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And you shall gird them with sashes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' belts, Aaron and his sons, and bind caps on them; and the priest''s office shall be theirs by a perpetual statute. Thus you shall ordain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consecrate Aaron and his sons.'
