document_id: ACT.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW AT Iconium [also Paul and Barnabas] went into the Jewish synagogue together and spoke with such power that a great number both of Jews and of Greeks believed (became Christians);'
  '10':
  - type: text
    content: ' Shouted at him, saying, Stand erect on your feet! And he leaped up and walked.'
  '11':
  - type: text
    content: ' And the crowds, when they saw what Paul had done, lifted up their voices, shouting in the Lycaonian language, The gods have come down to us in human form!'
  '12':
  - type: text
    content: ' They called Barnabas Zeus, and they called Paul, because he led in the discourse, Hermes [god of speech].'
  '13':
  - type: text
    content: ' And the priest of Zeus, whose [temple] was at the entrance of the town, brought bulls and garlands to the [city''s] gates and wanted to join the people in offering sacrifice.'
  '14':
  - type: text
    content: ' But when the apostles Barnabas and Paul heard of it, they tore their clothing and dashed out among the crowd, shouting,'
  '15':
  - type: text
    content: ' Men, why are you doing this? We also are [only] human beings, of nature like your own, and we bring you the good news (Gospel) that you should turn away from these foolish '
  - type: text
    content: and
  - type: text
    content: ' vain things to the living God, Who made the heaven and the earth and the sea and everything that they contain. [Exod. 20:11; Ps. 146:6.]'
  '16':
  - type: text
    content: ' In generations past He permitted all the nations to walk in their own ways;'
  '17':
  - type: text
    content: ' Yet He did not neglect to leave some witness of Himself, for He did you good '
  - type: text
    content: and
  - type: text
    content: ' [showed you] kindness and gave you rains from heaven and fruitful seasons, satisfying your hearts with nourishment and happiness.'
  '18':
  - type: text
    content: ' Even in [the light of] these words they with difficulty prevented the people from offering sacrifice to them.'
  '19':
  - type: text
    content: ' But some Jews arrived there from Antioch and Iconium; and having persuaded the people '
  - type: text
    content: and
  - type: text
    content: ' won them over, they stoned Paul and [afterward] dragged him out of the town, thinking that he was dead.'
  '2':
  - type: text
    content: ' But the unbelieving Jews [who rejected their message] aroused the Gentiles and embittered their minds against the brethren.'
  '20':
  - type: text
    content: ' But the disciples formed a circle about him, and he got up and went back into the town; and on the morrow he went on with Barnabas to Derbe.'
  '21':
  - type: text
    content: ' When they had preached the good news (Gospel) to that town and made disciples of many of the people, they went back to Lystra and Iconium and Antioch,'
  '22':
  - type: text
    content: ' Establishing '
  - type: text
    content: and
  - type: text
    content: ' strengthening the souls '
  - type: text
    content: and
  - type: text
    content: ' the hearts of the disciples, urging '
  - type: text
    content: and
  - type: text
    content: ' warning '
  - type: text
    content: and
  - type: text
    content: ' encouraging them to stand firm in the faith, and [telling them] that it is through many hardships '
  - type: text
    content: and
  - type: text
    content: ' tribulations we must enter the kingdom of God.'
  '23':
  - type: text
    content: ' And when they had appointed '
  - type: text
    content: and
  - type: text
    content: ' ordained elders for them in each church with prayer and fasting, they committed them to the Lord in Whom they had come to believe [being full of joyful trust that He is the Christ, the Messiah].'
  '24':
  - type: text
    content: ' Then they went through Pisidia and arrived at Pamphylia.'
  '25':
  - type: text
    content: ' And when they had spoken the Word in Perga [the doctrine concerning the attainment through Christ of salvation in the kingdom of God], they went down to Attalia;'
  '26':
  - type: text
    content: ' And from there they sailed back to Antioch, where they had [first] been commended to the grace of God for the work which they had [now] completed.'
  '27':
  - type: text
    content: ' Arriving there, they gathered the church together and declared all that God had accomplished with them and how He had opened to the Gentiles a door of faith [in Jesus as the Messiah, through Whom we obtain salvation in the kingdom of God].'
  '28':
  - type: text
    content: ' And there they stayed no little time with the disciples.'
  '3':
  - type: text
    content: ' So [Paul and Barnabas] stayed on there for a long time, speaking freely '
  - type: text
    content: and
  - type: text
    content: ' fearlessly '
  - type: text
    content: and
  - type: text
    content: ' boldly in the Lord, Who continued to bear testimony to the Word of His grace, granting signs and wonders to be performed by their hands.'
  '4':
  - type: text
    content: ' But the residents of the town were divided, some siding with the Jews and some with the apostles.'
  '5':
  - type: text
    content: ' When there was an attempt both on the part of the Gentiles and the Jews together with their rulers, to insult '
  - type: text
    content: and
  - type: text
    content: ' abuse '
  - type: text
    content: and
  - type: text
    content: ' molest [Paul and Barnabas] and to stone them,'
  '6':
  - type: text
    content: ' They, aware of the situation, made their escape to Lystra and Derbe, cities of Lycaonia, and the neighboring districts;'
  '7':
  - type: text
    content: ' And there they continued to preach the glad tidings (Gospel).'
  '8':
  - type: text
    content: ' Now at Lystra a man sat who found it impossible to use his feet, for he was a cripple from birth and had never walked.'
  '9':
  - type: text
    content: ' He was listening to Paul as he talked, and [Paul] gazing intently at him and observing that he had faith to be healed,'
