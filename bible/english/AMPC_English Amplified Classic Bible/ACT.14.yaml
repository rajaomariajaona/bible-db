document_id: ACT.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW AT Iconium [also Paul and Barnabas] went into the Jewish synagogue together and spoke with such power that a great number both of Jews and of Greeks believed (became Christians);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But the unbelieving Jews [who rejected their message] aroused the Gentiles and embittered their minds against the brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So [Paul and Barnabas] stayed on there for a long time, speaking freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fearlessly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boldly in the Lord, Who continued to bear testimony to the Word of His grace, granting signs and wonders to be performed by their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the residents of the town were divided, some siding with the Jews and some with the apostles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When there was an attempt both on the part of the Gentiles and the Jews together with their rulers, to insult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' molest [Paul and Barnabas] and to stone them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They, aware of the situation, made their escape to Lystra and Derbe, cities of Lycaonia, and the neighboring districts;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And there they continued to preach the glad tidings (Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now at Lystra a man sat who found it impossible to use his feet, for he was a cripple from birth and had never walked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He was listening to Paul as he talked, and [Paul] gazing intently at him and observing that he had faith to be healed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Shouted at him, saying, Stand erect on your feet! And he leaped up and walked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the crowds, when they saw what Paul had done, lifted up their voices, shouting in the Lycaonian language, The gods have come down to us in human form!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They called Barnabas Zeus, and they called Paul, because he led in the discourse, Hermes [god of speech].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the priest of Zeus, whose [temple] was at the entrance of the town, brought bulls and garlands to the [city''s] gates and wanted to join the people in offering sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But when the apostles Barnabas and Paul heard of it, they tore their clothing and dashed out among the crowd, shouting,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Men, why are you doing this? We also are [only] human beings, of nature like your own, and we bring you the good news (Gospel) that you should turn away from these foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vain things to the living God, Who made the heaven and the earth and the sea and everything that they contain. [Exod. 20:11; Ps. 146:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' In generations past He permitted all the nations to walk in their own ways;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Yet He did not neglect to leave some witness of Himself, for He did you good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [showed you] kindness and gave you rains from heaven and fruitful seasons, satisfying your hearts with nourishment and happiness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Even in [the light of] these words they with difficulty prevented the people from offering sacrifice to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But some Jews arrived there from Antioch and Iconium; and having persuaded the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' won them over, they stoned Paul and [afterward] dragged him out of the town, thinking that he was dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the disciples formed a circle about him, and he got up and went back into the town; and on the morrow he went on with Barnabas to Derbe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When they had preached the good news (Gospel) to that town and made disciples of many of the people, they went back to Lystra and Iconium and Antioch,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Establishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthening the souls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the hearts of the disciples, urging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging them to stand firm in the faith, and [telling them] that it is through many hardships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tribulations we must enter the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when they had appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordained elders for them in each church with prayer and fasting, they committed them to the Lord in Whom they had come to believe [being full of joyful trust that He is the Christ, the Messiah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then they went through Pisidia and arrived at Pamphylia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when they had spoken the Word in Perga [the doctrine concerning the attainment through Christ of salvation in the kingdom of God], they went down to Attalia;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And from there they sailed back to Antioch, where they had [first] been commended to the grace of God for the work which they had [now] completed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Arriving there, they gathered the church together and declared all that God had accomplished with them and how He had opened to the Gentiles a door of faith [in Jesus as the Messiah, through Whom we obtain salvation in the kingdom of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And there they stayed no little time with the disciples.'
