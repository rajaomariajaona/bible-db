document_id: GEN.40
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW SOME time later the butler and the baker of the king of Egypt offended their lord, Egypt''s king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Pharaoh was angry with his officers, the chief of the butlers and the chief of the bakers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He put them in custody in the house of the captain of the guard, in the prison where Joseph was confined.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the captain of the guard put them in Joseph''s charge, and he served them; and they continued in custody for some time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they both dreamed a dream in the same night, each man according to [the personal significance of] the interpretation of his dream–the butler and the baker of the king of Egypt, who were confined in the prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When Joseph came to them in the morning and looked at them, he saw that they were sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So he asked Pharaoh''s officers who were in custody with him in his master''s house, Why do you look so dejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sad today?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they said to him, We have dreamed dreams, and there is no one to interpret them. And Joseph said to them, Do not interpretations belong to God? Tell me [your dreams], I pray you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the chief butler told his dream to Joseph and said to him, In my dream I saw a vine before me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And on the vine were three branches. Then it was as though it budded; its blossoms burst forth and the clusters of them brought forth ripe grapes [almost all at once].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Pharaoh''s cup was in my hand, and I took the grapes and pressed them into Pharaoh''s cup; then I gave the cup into Pharaoh''s hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Joseph said to him, This is the interpretation of it: The three branches are three days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Within three days Pharaoh will lift up your head and restore you to your position, and you will again put Pharaoh''s cup into his hand, as when you were his butler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But think of me when it shall be well with you and show kindness, I beg of you, to me, and mention me to Pharaoh and get me out of this house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For truly I was carried away from the land of the Hebrews by unlawful force, and here too I have done nothing for which they should put me into the dungeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the chief baker saw that the interpretation was good, he said to Joseph, I also dreamed, and behold, I had three cake baskets on my head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And in the uppermost basket were some of all kinds of baked food for Pharaoh, but the birds [of prey] were eating out of the basket on my head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Joseph answered, This is the interpretation of it: The three baskets are three days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Within three days Pharaoh will lift up your head but will have you beheaded and hung on a tree, and [you will not so much as be given burial, but] the birds will eat your flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And on the third day, Pharaoh''s birthday, he made a feast for all his servants; and he lifted up the heads of the chief butler and the chief baker [by inviting them also] among his servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he restored the chief butler to his butlership, and the butler gave the cup into Pharaoh''s hand;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But [Pharaoh] hanged the chief baker, as Joseph had interpreted to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But [even after all that] the chief butler gave no thought to Joseph, but forgot [all about] him.'
