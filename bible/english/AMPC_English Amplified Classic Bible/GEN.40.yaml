document_id: GEN.40,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW SOME time later the butler and the baker of the king of Egypt offended their lord, Egypt''s king.'
  '10':
  - type: text
    content: ' And on the vine were three branches. Then it was as though it budded; its blossoms burst forth and the clusters of them brought forth ripe grapes [almost all at once].'
  '11':
  - type: text
    content: ' And Pharaoh''s cup was in my hand, and I took the grapes and pressed them into Pharaoh''s cup; then I gave the cup into Pharaoh''s hand.'
  '12':
  - type: text
    content: ' And Joseph said to him, This is the interpretation of it: The three branches are three days.'
  '13':
  - type: text
    content: ' Within three days Pharaoh will lift up your head and restore you to your position, and you will again put Pharaoh''s cup into his hand, as when you were his butler.'
  '14':
  - type: text
    content: ' But think of me when it shall be well with you and show kindness, I beg of you, to me, and mention me to Pharaoh and get me out of this house.'
  '15':
  - type: text
    content: ' For truly I was carried away from the land of the Hebrews by unlawful force, and here too I have done nothing for which they should put me into the dungeon.'
  '16':
  - type: text
    content: ' When the chief baker saw that the interpretation was good, he said to Joseph, I also dreamed, and behold, I had three cake baskets on my head.'
  '17':
  - type: text
    content: ' And in the uppermost basket were some of all kinds of baked food for Pharaoh, but the birds [of prey] were eating out of the basket on my head.'
  '18':
  - type: text
    content: ' And Joseph answered, This is the interpretation of it: The three baskets are three days.'
  '19':
  - type: text
    content: ' Within three days Pharaoh will lift up your head but will have you beheaded and hung on a tree, and [you will not so much as be given burial, but] the birds will eat your flesh.'
  '2':
  - type: text
    content: ' And Pharaoh was angry with his officers, the chief of the butlers and the chief of the bakers.'
  '20':
  - type: text
    content: ' And on the third day, Pharaoh''s birthday, he made a feast for all his servants; and he lifted up the heads of the chief butler and the chief baker [by inviting them also] among his servants.'
  '21':
  - type: text
    content: ' And he restored the chief butler to his butlership, and the butler gave the cup into Pharaoh''s hand;'
  '22':
  - type: text
    content: ' But [Pharaoh] hanged the chief baker, as Joseph had interpreted to them.'
  '23':
  - type: text
    content: ' But [even after all that] the chief butler gave no thought to Joseph, but forgot [all about] him.'
  '3':
  - type: text
    content: ' He put them in custody in the house of the captain of the guard, in the prison where Joseph was confined.'
  '4':
  - type: text
    content: ' And the captain of the guard put them in Joseph''s charge, and he served them; and they continued in custody for some time.'
  '5':
  - type: text
    content: ' And they both dreamed a dream in the same night, each man according to [the personal significance of] the interpretation of his dream–the butler and the baker of the king of Egypt, who were confined in the prison.'
  '6':
  - type: text
    content: ' When Joseph came to them in the morning and looked at them, he saw that they were sad '
  - type: text
    content: and
  - type: text
    content: ' depressed.'
  '7':
  - type: text
    content: ' So he asked Pharaoh''s officers who were in custody with him in his master''s house, Why do you look so dejected '
  - type: text
    content: and
  - type: text
    content: ' sad today?'
  '8':
  - type: text
    content: ' And they said to him, We have dreamed dreams, and there is no one to interpret them. And Joseph said to them, Do not interpretations belong to God? Tell me [your dreams], I pray you.'
  '9':
  - type: text
    content: ' And the chief butler told his dream to Joseph and said to him, In my dream I saw a vine before me,'
