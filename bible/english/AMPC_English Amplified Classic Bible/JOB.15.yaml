document_id: JOB.15,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN ELIPHAZ the Temanite answered [Job],'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Among us are both the gray-haired and the aged, older than your father by far.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Are God''s consolations [as we have interpreted them to you] too trivial for you? Is there any secret thing (any bosom sin) which you have not given up? [Or] were we too gentle [in our first speech] toward you to be effective?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Why does your heart carry you away [why allow yourself to be controlled by feeling]? And why do your eyes flash [in anger or contempt],'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' That you turn your spirit against God and let [such] words [as you have spoken] go out of your mouth?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' What is man, that he could be pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clean? And he who is born of a woman, that he could be right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' just?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Behold, [God] puts no trust in His holy ones [the angels]; indeed, the heavens are not clean in His sight–'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' How much less that which is abominable and corrupt, a man who drinks iniquity like water?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I will show you, hear me; and that which I have seen I will relate,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' What wise men have not hid but have freely communicated; it was told to them by their fathers,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Unto whom alone the land was given, and no stranger intruded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' passed among them [corrupting the truth].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Should a wise man utter such windy knowledge [as we have just heard] and fill himself with the east wind [of withering, parching, and violent accusations]?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The wicked man suffers with [self-inflicted] torment all his days, through all the years that are numbered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laid up for him, the oppressor.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' A [dreadful] sound of terrors is in his ears; in prosperity the destroyer shall come upon him [the dwellings of robbers are not at peace].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' He believes that he will not return out of darkness, and [because of his guilt] he is waited for by the sword [of God''s vengeance].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' He wanders abroad for food, saying, Where is it? He knows that the day of darkness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction is already close upon him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Distress and anguish terrify him; [he knows] they shall prevail against him, like a king ready for battle.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Because he has stretched out his hand against God and bids defiance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' behaves himself proudly against the Almighty,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Running stubbornly against Him with a thickly ornamented shield;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Because he has covered his face with his fat, adding layers of fat on his loins [giving himself up to animal pleasures],'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And has lived in desolate [God-forsaken] cities and in houses which no man should inhabit, which were destined to become heaps [of ruins];'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' He shall not be rich, neither shall his wealth last, neither shall his produce bend to the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' his possessions be extended on the earth.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Should he reason with unprofitable talk? Or with speeches with which he can do no good?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' He shall not depart out of darkness [and escape from calamity; the wrath of God] shall consume him as flame consumes a dry tree, and by the blast of His mouth he shall be swept away.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Let him not deceive himself and trust in vanity (emptiness, falseness, and futility), for these shall be his recompense [for such living].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' It shall be accomplished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' paid in full while he still lives, and his branch shall not be green [but shall wither away].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' He shall fail to bring his grapes to maturity [leaving them to wither unnourished] on the vine and shall cast off blossoms [and fail to bring forth fruit] like the olive tree.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' For the company of the godless shall be barren, and fire shall consume the tents of bribery (wrong and injustice).'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' They conceive mischief and bring forth iniquity, and their inmost soul hatches deceit.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Indeed, you are doing away with [reverential] fear, and you are hindering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diminishing meditation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devotion before God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For your iniquity teaches your mouth, and you choose the tongue of the crafty.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Your own mouth condemns you, and not I; yes, your own lips testify against you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Are you the first man that was born [the original wise man]? Or were you created before the hills?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Were you present to hear the secret counsel of God? And do you limit [the possession of] wisdom to yourself?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' What do you know that we know not? What do you understand that is not equally clear to us?'
