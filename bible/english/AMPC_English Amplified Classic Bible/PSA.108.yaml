document_id: PSA.108
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A song. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GOD, my heart is fixed (steadfast, in the confidence of faith); I will sing, yes, I will sing praises, even with my glory [all the faculties and powers of one created in Your image]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Awake, harp and lyre; I myself will wake very early–I will waken the dawn!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I will praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to You, O Lord, among the peoples; and I will sing praises unto You among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness are great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' high as the heavens! Your truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness reach to the skies! [Ps. 57:7-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Be exalted, O God, above the heavens, and let Your glory be over all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That Your beloved [followers] may be delivered, save with Your right hand and answer us! [or me]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' God has promised in His holiness [regarding the establishment of David''s dynasty]: I will rejoice, I will distribute [Canaan among My people], dividing Shechem and [the western region and allotting the eastern region which contains] the Valley of Succoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Gilead is Mine, Manasseh is Mine; Ephraim also is My stronghold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the defense of My head; Judah is My scepter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawgiver. [Gen. 49:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Moab is My washbasin; upon Edom [My slave] My shoe I cast [to be cleaned]; over Philistia I shout [in triumph].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who will bring me [David] into the strong, fortified city [of Petra]? Who will lead me into Edom?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Have You not cast us off, O God? And will You not go forth, O God, with our armies?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Give us help against the adversary, for vain is the help of man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with God we shall do valiantly, for He it is Who shall tread down our adversaries. [Ps. 60:5-12.]'
