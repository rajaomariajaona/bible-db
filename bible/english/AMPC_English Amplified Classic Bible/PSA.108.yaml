document_id: PSA.108,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A song. A Psalm of David.
  - type: text
    content: ' O GOD, my heart is fixed (steadfast, in the confidence of faith); I will sing, yes, I will sing praises, even with my glory [all the faculties and powers of one created in Your image]!'
  '10':
  - type: text
    content: ' Who will bring me [David] into the strong, fortified city [of Petra]? Who will lead me into Edom?'
  '11':
  - type: text
    content: ' Have You not cast us off, O God? And will You not go forth, O God, with our armies?'
  '12':
  - type: text
    content: ' Give us help against the adversary, for vain is the help of man.'
  '13':
  - type: text
    content: ' Through '
  - type: text
    content: and
  - type: text
    content: ' with God we shall do valiantly, for He it is Who shall tread down our adversaries. [Ps. 60:5-12.]'
  '2':
  - type: text
    content: ' Awake, harp and lyre; I myself will wake very early–I will waken the dawn!'
  '3':
  - type: text
    content: ' I will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O Lord, among the peoples; and I will sing praises unto You among the nations.'
  '4':
  - type: text
    content: ' For Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness are great '
  - type: text
    content: and
  - type: text
    content: ' high as the heavens! Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness reach to the skies! [Ps. 57:7-11.]'
  '5':
  - type: text
    content: ' Be exalted, O God, above the heavens, and let Your glory be over all the earth.'
  '6':
  - type: text
    content: ' That Your beloved [followers] may be delivered, save with Your right hand and answer us! [or me]!'
  '7':
  - type: text
    content: ' God has promised in His holiness [regarding the establishment of David''s dynasty]: I will rejoice, I will distribute [Canaan among My people], dividing Shechem and [the western region and allotting the eastern region which contains] the Valley of Succoth.'
  '8':
  - type: text
    content: ' Gilead is Mine, Manasseh is Mine; Ephraim also is My stronghold '
  - type: text
    content: and
  - type: text
    content: ' the defense of My head; Judah is My scepter '
  - type: text
    content: and
  - type: text
    content: ' lawgiver. [Gen. 49:10.]'
  '9':
  - type: text
    content: ' Moab is My washbasin; upon Edom [My slave] My shoe I cast [to be cleaned]; over Philistia I shout [in triumph].'
