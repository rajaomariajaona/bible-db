document_id: DAN.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE second year of the reign of Nebuchadnezzar, Nebuchadnezzar had dreams by which his spirit was troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agitated and his sleep went from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then the king commanded to call the magicians, the enchanters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' soothsayers, the sorcerers, and the Chaldeans [diviners], to tell the king his dreams. So they came and stood before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the king said to them, I had a dream and my spirit is troubled to know the dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then said the Chaldeans [diviners] to the king in Aramaic [the Syrian language], O king, live forever! Tell your servants the dream, and we will show the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The king answered the Chaldeans, The thing is gone from me! And the decree goes forth from me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I say it with all emphasis: if you do not make known to me the dream with its interpretation, you shall be cut in pieces and your houses shall be made a dunghill!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But if you show the dream and its interpretation, you shall receive from me gifts and rewards and great honor. So show me the dream and the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They answered again, Let the king tell his servants the dream, and we will show the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The king answered, I know with certainty that you are trying to gain time, because you see the thing is gone from me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' because you see that my word [against you] is sure:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If you will not make known to me the dream, there is but one sentence for you; for you have prepared lying and corrupt words to speak before me [hoping to delay your execution] until the time is changed. Therefore tell me the dream, and I will know that you can tell me the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Chaldeans [diviners] answered before the king and said, There is not a man on earth who can show the king this matter, for no king, lord, or ruler has [ever] asked such a thing of any magician or enchanter or Chaldean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' A rare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weighty thing indeed the king requires! None except the gods can reveal it to the king, and their dwelling is not with [human] flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For this cause the king was angry and very furious and commanded that all the wise men of Babylon be destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So the decree went forth that the wise men were to be killed, and [the officers] sought Daniel and his companions to be slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then Daniel returned an answer which was full of prudence and wisdom to Arioch the captain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' executioner of the king''s guard, who had gone forth to slay the wise men of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He said to Arioch, the king''s captain, Why is the decree so urgent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hasty from the king? Then Arioch explained the matter to Daniel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Daniel went in and desired of the king that he would set a date '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give him time, and he would show the king the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Daniel went to his house and made the thing known to Hananiah, Mishael, and Azariah, his companions,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So that they would desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' request mercy of the God of heaven concerning this secret, that Daniel and his companions should not perish with the rest of the wise men of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the secret was revealed to Daniel in a vision of the night, and Daniel blessed the God of heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Daniel answered, Blessed be the name of God forever and ever! For wisdom and might are His!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He changes the times and the seasons; He removes kings and sets up kings. He gives wisdom to the wise and knowledge to those who have understanding! [Dan. 4:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He reveals the deep and secret things; He knows what is in the darkness, and the light dwells with Him! [Job 15:8; Ps. 25:14; Matt. 6:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' I thank You and praise You, O God of my fathers, Who has given me wisdom and might and has made known to me now what we desired of You, for You have made known to us the solution to the king''s problem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore Daniel went to Arioch, whom the king had appointed to destroy the wise men of Babylon; he went and said thus to him: Do not destroy the wise men of Babylon! Bring me in before the king, and I will show to the king the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then Arioch brought in Daniel before the king in haste and said thus to him: I have found a man of the captives of Judah who will make known to the king the interpretation [of his dream].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The king said to Daniel, whose name was Belteshazzar, Are you able to make known to me the dream which I have seen and the interpretation of it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Daniel answered the king, The [mysterious] secret which the king has demanded neither the wise men, enchanters, magicians, nor astrologers can show the king,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But there is a God in heaven Who reveals secrets, and He has made known to King Nebuchadnezzar what it is that shall be in the latter days (at the end of days). Your dream and the visions in your head upon your bed are these:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' As for you, O king, as you were lying upon your bed thoughts came into your mind about what should come to pass hereafter, and He Who reveals secrets was making known to you what shall come to pass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But as for me, this secret is not revealed to me for any wisdom that I have more than anyone else living, but in order that the interpretation may be made known to the king and that you may know the thoughts of your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' You, O king, saw, and behold, [there was] a great image. This image which was mighty and of exceedingly great brightness stood before you, and the appearance of it was frightening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrible.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' As for this image, its head was of fine gold, its breast and its arms of silver, its belly and its thighs of bronze,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Its legs of iron, its feet partly of iron and partly of clay [the baked clay of the potter].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' As you looked, a Stone was cut out without human hands, which smote the image on its feet of iron and [baked] clay [of the potter] and broke them to pieces. [I Pet. 2:3-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then the iron, the [baked] clay [of the potter], the bronze, the silver, and the gold were broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed together and became like the chaff of the summer threshing floors, and the wind carried them away so that not a trace of them could be found. And the Stone that smote the image became a great mountain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rock and filled the whole earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' This was the dream, and we will tell the interpretation of it to the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' You, O king, are king of the [earthly] kings to whom the God of heaven has given the kingdom, the power, the might, and the glory. [Jer. 25:9; 27:6; 28:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And wherever the children of men dwell, and the beasts of the field, and the birds of the heavens–He has given them into your hand and has made you to rule over them all. You [king of Babylon] are the head of gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And after you shall arise another kingdom [the Medo-Persian], inferior to you, and still a third kingdom of bronze [Greece under Alexander the Great] which shall bear rule over all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And the fourth kingdom [Rome] shall be strong as iron, since iron breaks to pieces and subdues all things; and like iron which crushes, it shall break and crush all these. [Dan. 7:7, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And as you saw the feet and toes, partly of [baked] clay [of the potter] and partly of iron, it shall be a divided kingdom; but there shall be in it some of the firmness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength of iron, just as you saw the iron mixed with miry [earthen] clay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And as the toes of the feet were partly of iron and partly of [baked] clay [of the potter], so the kingdom shall be partly strong and partly brittle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And as you saw the iron mixed with miry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earthen clay, so they shall mingle themselves in the seed of men [in marriage bonds]; but they will not hold together [for two such elements or ideologies can never harmonize], even as iron does not mingle itself with clay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And in the days of these [final ten] kings shall the God of heaven set up a kingdom which shall never be destroyed, nor shall its sovereignty be left to another people; but it shall break '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crush and consume all these kingdoms and it shall stand forever. [Dan. 7:14-17; Luke 1:31-33; Rev. 11:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Just as you saw that the Stone was cut out of the mountain without hands and that it broke in pieces the iron, the bronze, the clay, the silver, and the gold, the great God has made known to the king what shall come to pass hereafter. The dream is certain and the interpretation of it is sure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Then King Nebuchadnezzar fell on his face and paid homage to Daniel [as a great prophet of the highest God] and ordered that an offering and incense should be offered up to him [in honor of his God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' The king answered Daniel, Of a truth your God is the God of gods and the Lord of kings and a Revealer of secret mysteries, seeing that you could reveal this secret mystery! [Prov. 3:32; Rev. 19:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Then the king made Daniel great and gave him many great gifts, and he made him to rule over the whole province of Babylon and to be chief governor over all the wise men of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And Daniel requested of the king and he appointed Shadrach, Meshach, and Abednego over the affairs of the province of Babylon. But Daniel remained in the gate of the king [at the king''s court].'
