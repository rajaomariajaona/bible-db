document_id: EZK.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HE SAID to me, Son of man, eat what you find [in this book]; eat this scroll; then go and speak to the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So I opened my mouth, and He caused me to eat the scroll.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to me, Son of man, eat this scroll that I give you and fill your stomach with it. Then I ate it, and it was as sweet as honey in my mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And He said to me, Son of man, go, get you to the house of Israel and speak to them with My words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For you are not sent to a people of a foreign speech and of a difficult language but to the house of Israel;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Not to many peoples of foreign speech and of a hard language, whose words you cannot understand. Surely, had I sent you to such people, they would have listened to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeded My words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the house of Israel will not listen to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey you since they will not listen to Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Me, for all the house of Israel are impudent and stubborn of heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behold, I have made your face strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard against their faces and your forehead strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard against their foreheads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Like an adamant harder than flint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a diamond point have I made your forehead; fear them not, neither be dismayed at their looks, for they are a rebellious house. [Isa. 50:7; Jer. 1:18; 15:20; Mic. 3:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Moreover, He said to me, Son of man, all My words that I shall speak to you, receive in your heart and hear with your ears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And go, get you to the [Jewish] captives [in Babylon], to the children of your people, and speak to them and tell them, Thus says the Lord God, whether they will hear or refuse to hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the Spirit lifted me up, and I heard behind me a voice of a great rushing [saying], Blessed be the glory of the Lord from His place [above the firmament].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I heard the noise of the wings of the living creatures as they touched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joined each one the other [its sister wing], and I heard the noise of the wheels beside them and the noise of a great rushing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So the Spirit lifted me up and took me away [in the vision], and I went in bitterness [of discouragement] in the heat of my spirit; and the hand of the Lord was strong upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then I came to them of the captivity at Tel-abib, who sat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelt by the river of Chebar, and I sat where they sat and remained there among them seven days, overwhelmed with astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' silent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And at the end of seven days, the word of the Lord came to me:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Son of man, I have made you a watchman to the house of Israel; therefore hear the word at My mouth and give them warning from Me. [Isa. 52:8; 56:10; 62:6; Jer. 6:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' If I say to the wicked, You shall surely die, and you do not give him warning or speak to warn the wicked to turn from his wicked way, to save his life, the same wicked man shall die in his iniquity, but his blood will I require at your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Yet if you warn the wicked and he turn not from his wickedness or from his wicked way, he shall die in his iniquity, but you have delivered yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Again, if a righteous man turns from his righteousness (right doing and right standing with God) and some gift or providence which I lay before him he perverts into an occasion to sin and he commits iniquity, he shall die; because you have not given him warning, he shall die in his sin and his righteous deeds which he has done shall not be remembered, but his blood will I require at your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Nevertheless if you warn the righteous man not to sin and he does not sin, he shall surely live because he is warned; also you have delivered yourself from guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the hand of the Lord was there upon me, and He said to me, Arise, go forth into the plain and I will talk with you there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then I arose and went forth into the plain, and behold, the glory of the Lord stood there, like the glory I had seen by the river Chebar, and I fell on my face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then the Spirit entered into me and set me on my feet; He spoke and said to me, Go, shut yourself up in your house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But you, O son of man, behold, ropes will be put upon you and you will be bound with them, and you cannot go out among people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And I will make your tongue cleave to the roof of your mouth so that you cannot talk and be a reprover of the people, for they are a rebellious house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But when I speak with you, I will open your mouth and you shall say to the people, Thus says the Lord God; he who hears, let him hear, and he who refuses to hear, let him refuse; for they are a rebellious house.'
