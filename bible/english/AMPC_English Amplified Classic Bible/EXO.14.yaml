document_id: EXO.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Tell the Israelites to turn back and encamp before Pi-hahiroth, between Migdol and the [Red] Sea, before Baal-zephon. You shall encamp opposite it by the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For Pharaoh will say of the Israelites, They are entangled in the land; the wilderness has shut them in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will harden (make stubborn, strong) Pharaoh''s heart, that he will pursue them, and I will gain honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory over Pharaoh and all his host, and the Egyptians shall know that I am the Lord. And they did so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It was told the king of Egypt that the people had fled; and the heart of Pharaoh and of his servants was changed toward the people, and they said, What is this we have done? We have let Israel go from serving us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he made ready his chariots and took his army,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And took 600 chosen chariots and all the other chariots of Egypt, with officers over all of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord made hard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong the heart of Pharaoh king of Egypt, and he pursued the Israelites, for [they] left proudly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiantly. [Acts 13:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Egyptians pursued them, all the horses and chariots of Pharaoh and his horsemen and his army, and overtook them encamped at the [Red] Sea by Pi-hahiroth, in front of Baal-zephon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When Pharaoh drew near, the Israelites looked up, and behold, the Egyptians were marching after them; and the Israelites were exceedingly frightened and cried out to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And they said to Moses, Is it because there are no graves in Egypt that you have taken us away to die in the wilderness? Why have you treated us this way and brought us out of Egypt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Did we not tell you in Egypt, Let us alone; let us serve the Egyptians? For it would have been better for us to serve the Egyptians than to die in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Moses told the people, Fear not; stand still (firm, confident, undismayed) and see the salvation of the Lord which He will work for you today. For the Egyptians you have seen today you shall never see again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The Lord will fight for you, and you shall hold your peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain at rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The Lord said to Moses, Why do you cry to Me? Tell the people of Israel to go forward!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Lift up your rod and stretch out your hand over the sea and divide it, and the Israelites shall go on dry ground through the midst of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I, behold, I will harden (make stubborn and strong) the hearts of the Egyptians, and they shall go [into the sea] after them; and I will gain honor over Pharaoh and all his host, his chariots, and horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Egyptians shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord when I have gained honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory over Pharaoh, his chariots, and his horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Angel of God Who went before the host of Israel moved and went behind them; and the pillar of the cloud went from before them and stood behind them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Coming between the host of Egypt and the host of Israel. It was a cloud and darkness to the Egyptians, but it gave light by night to the Israelites; and the one host did not come near the other all night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Moses stretched out his hand over the sea, and the Lord caused the sea to go back by a strong east wind all that night and made the sea dry land; and the waters were divided.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the Israelites went into the midst of the sea on dry ground, the waters being a wall to them on their right hand and on their left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The Egyptians pursued and went in after them into the midst of the sea, even all Pharaoh''s horses, his chariots, and his horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And in the morning watch the Lord through the pillar of fire and cloud looked down on the host of the Egyptians and discomfited [them],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And bound (clogged, took off) their chariot wheels, making them drive heavily; and the Egyptians said, Let us flee from the face of Israel, for the Lord fights for them against the Egyptians!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then the Lord said to Moses, Stretch out your hand over the sea, that the waters may come again upon the Egyptians, upon their chariots and horsemen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So Moses stretched forth his hand over the sea, and the sea returned to its strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' normal flow when the morning appeared; and the Egyptians fled into it [being met by it]; and the Lord overthrew the Egyptians '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shook them off into the midst of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The waters returned and covered the chariots, the horsemen, and all the host of Pharaoh that pursued them; not even one of them remained.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But the Israelites walked on dry ground in the midst of the sea, the waters being a wall to them on their right hand and on their left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Thus the Lord saved Israel that day from the hand of the Egyptians, and Israel saw the Egyptians dead upon the seashore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Israel saw that great work which the Lord did against the Egyptians, and the people [reverently] feared the Lord and trusted in (relied on, remained steadfast to) the Lord and to His servant Moses.'
