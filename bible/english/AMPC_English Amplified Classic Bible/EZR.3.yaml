document_id: EZR.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THE seventh month came and the Israelites were in the towns, the people gathered together as one man to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then stood up Jeshua son of Jozadak, and his brethren the priests, and Zerubbabel son of Shealtiel, and his brethren, and they built the altar of the God of Israel to offer burnt offerings upon it, as it is written in the instructions of Moses the man of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they set the altar [in its place] upon its base, for fear was upon them because of the peoples of the countries; and they offered burnt offerings on it to the Lord morning and evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They kept also the Feast of Tabernacles, as it is written, and offered the daily burnt offerings by number according to the ordinances, as each day''s duty required,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And after that, the continual burnt offering, the offering at the New Moon, and at all the appointed feasts of the Lord, and the offerings of everyone who made a freewill offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' From the first day of the seventh month they began to offer burnt offerings to the Lord, but the foundation of the temple of the Lord was not yet laid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They gave money also to the masons and to the carpenters, and gave food, drink, and oil to the Sidonians and the Tyrians, to bring cedar trees from Lebanon to the seaport of Joppa, according to the grant they had from Cyrus king of Persia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In the second year of their coming to God''s house at Jerusalem, in the second month, Zerubbabel son of Shealtiel and Jeshua son of Jozadak made a beginning, with the rest of their brethren–the priests and Levites and all who had come to Jerusalem out of the captivity. They appointed the Levites from twenty years old and upward to oversee the work of the Lord''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Jeshua with his sons and his kinsmen, Kadmiel and his sons, sons of Judah, together took the oversight of the workmen in the house of God–the sons of Henadad, with their sons and Levite kinsmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And when the builders laid the foundation of the temple of the Lord, the priests stood in their vestments with trumpets, and the Levite sons of Asaph with their cymbals, to praise the Lord, after the order of David king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They sang responsively, praising and giving thanks to the Lord, saying, For He is good, for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever toward Israel. And all the people shouted with a great shout when they praised the Lord, because the foundation of the house of the Lord was laid!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But many of the priests and Levites and heads of fathers'' houses, old men who had seen the first house [Solomon''s temple], when the foundation of this house was laid before their eyes, wept with a loud voice, though many shouted aloud for joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So the people could not distinguish the shout of joy from the sound of the weeping of the people, for the people shouted with a loud shout, and the sound was heard far off.'
