document_id: ACT.18,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THIS [Paul] departed from Athens and went to Corinth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For I am with you, and no man shall assault you to harm you, for I have many people in this city. [Isa. 43:5; Jer. 1:8.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' So he settled down among them for a year and six months, teaching the Word of God [concerning the attainment through Christ of eternal salvation in the kingdom of God].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But when Gallio was proconsul of Achaia (most of Greece), the Jews unitedly made an attack upon Paul and brought him before the judge''s seat,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Declaring, This fellow is advising '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inducing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inciting people to worship God in violation of the Law [of Rome and of Moses].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But when Paul was about to open his mouth to reply, Gallio said to the Jews, If it were a matter of some misdemeanor or villainy, O Jews, I should have cause to bear with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listen;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But since it is merely a question [of doctrine] about words and names and your own law, see to it yourselves; I decline to be a judge of such matters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I have no intention of trying such cases.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And he drove them away from the judgment seat.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then they [the Greeks] all seized Sosthenes, the leader of the synagogue, and beat him right in front of the judgment seat. But Gallio paid no attention to any of this.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Afterward Paul remained many days longer, and then told the brethren farewell and sailed for Syria; and he was accompanied by Priscilla and Aquila. At Cenchreae he [Paul] cut his hair, for he had made a vow.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then they arrived in Ephesus, and [Paul] left the others there; but he himself entered the synagogue and discoursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argued with the Jews.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' There he met a Jew named Aquila, a native of Pontus, recently arrived from Italy with Priscilla his wife, due to the fact that Claudius had issued an edict that all the Jews were to leave Rome. And [Paul] went to see them,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' When they asked him to remain for a longer time, he would not consent;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But when he was leaving them he said, I will return to you if God is willing, and he set sail from Ephesus.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' When he landed at Caesarea, he went up and saluted the church [at Jerusalem], and then went down to Antioch.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' After staying there some time, he left and went from place to place in an orderly journey through the territory of Galatia and Phrygia, establishing the disciples '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imparting new strength to them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Meanwhile, there was a Jew named Apollos, a native of Alexandria, who came to Ephesus. He was a cultured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eloquent man, well versed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mighty in the Scriptures.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' He had been instructed in the way of the Lord, and burning with spiritual zeal, he spoke and taught diligently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately the things concerning Jesus, though he was acquainted only with the baptism of John.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' He began to speak freely (fearlessly and boldly) in the synagogue; but when Priscilla and Aquila heard him, they took him with them and expounded to him the way of God more definitely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And when [Apollos] wished to cross to Achaia (most of Greece), the brethren wrote to the disciples there, urging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraging them to accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome him heartily. When he arrived, he proved a great help to those who through grace (God''s unmerited favor and mercy) had believed (adhered to, trusted in, and relied on Christ as Lord and Savior).'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For with great power he refuted the Jews in public [discussions], showing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proving by the Scriptures that Jesus is the Christ (the Messiah).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And because he was of the same occupation, he stayed with them; and they worked [together], for they were tentmakers by trade.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But he discoursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argued in the synagogue every Sabbath and won over [both] Jews and Greeks.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' By the time Silas and Timothy arrived from Macedonia, Paul was completely engrossed with preaching, earnestly arguing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testifying to the Jews that Jesus [is] the Christ.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But since they kept opposing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abusing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reviling him, he shook out his clothing [against them] and said to them, Your blood be upon your [own] heads! I am innocent [of it]. From now on I will go to the Gentiles (the heathen). [Acts 13:46.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He then left there and went to the house of a man named Titus Justus, who worshiped God and whose house was next door to the synagogue.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But Crispus, the leader of the synagogue, believed [that Jesus is the Messiah and acknowledged Him with joyful trust as Savior and Lord], together with his entire household; and many of the Corinthians who listened [to Paul also] believed and were baptized.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And one night the Lord said to Paul in a vision, Have no fear, but speak and do not keep silent;'
