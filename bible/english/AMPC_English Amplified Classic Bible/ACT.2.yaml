    content: ' Until I make Your enemies a footstool for Your feet. [Ps. 110:1.]'
  '36':
  - type: text
    content: ' Therefore let the whole house of Israel recognize beyond all doubt '
  - type: text
    content: and
  - type: text
    content: ' acknowledge assuredly that God has made Him both Lord and Christ (the Messiah)–this Jesus Whom you crucified.'
  '37':
  - type: text
    content: ' Now when they heard this they were stung (cut) to the heart, and they said to Peter and the rest of the apostles (special messengers), Brethren, what shall we do?'
  '38':
  - type: text
    content: ' And Peter answered them, Repent (change your views and purpose to accept the will of God in your inner selves instead of rejecting it) and be baptized, every one of you, in the name of Jesus Christ for the forgiveness of '
  - type: text
    content: and
  - type: text
    content: ' release from your sins; and you shall receive the gift of the Holy Spirit.'
  '39':
  - type: text
    content: ' For the promise [of the Holy Spirit] is to '
  - type: text
    content: and
  - type: text
    content: ' for you and your children, and to '
  - type: text
    content: and
  - type: text
    content: ' for all that are far away, [even] to '
  - type: text
    content: and
  - type: text
    content: ' for as many as the Lord our God invites '
  - type: text
    content: and
  - type: text
    content: ' bids to come to Himself. [Isa. 57:19; Joel 2:32.]'
  '4':
  - type: text
    content: ' And they were all filled (diffused throughout their souls) with the Holy Spirit and began to speak in other (different, foreign) languages (tongues), as the Spirit kept giving them clear '
  - type: text
    content: and
  - type: text
    content: ' loud expression [in each tongue in appropriate words].'
  '40':
  - type: text
    content: ' And [Peter] solemnly '
  - type: text
    content: and
  - type: text
    content: ' earnestly witnessed (testified) and admonished (exhorted) with much more continuous speaking '
  - type: text
    content: and
  - type: text
    content: ' warned (reproved, advised, encouraged) them, saying, Be saved from this crooked (perverse, wicked, unjust) generation.'
  '41':
  - type: text
    content: ' Therefore those who accepted '
  - type: text
    content: and
  - type: text
    content: ' welcomed his message were baptized, and there were added that day about 3,000 souls.'
  '42':
  - type: text
    content: ' And they steadfastly persevered, devoting themselves constantly to the instruction and fellowship of the apostles, to the breaking of bread [including the Lord''s Supper] and prayers.'
  '43':
  - type: text
    content: ' And a sense of awe (reverential fear) came upon every soul, and many wonders and signs were performed through the apostles (the special messengers).'
  '44':
  - type: text
    content: ' And all who believed (who adhered to and trusted in and relied on Jesus Christ) were united and [together] they had everything in common;'
  '45':
  - type: text
    content: ' And they sold their possessions (both their landed property and their movable goods) and distributed the price among all, according as any had need.'
  '46':
  - type: text
    content: ' And day after day they regularly assembled in the temple with united purpose, and in their homes they broke bread [including the Lord''s Supper]. They partook of their food with gladness and simplicity '
  - type: text
    content: and
  - type: text
    content: ' generous hearts,'
  '47':
  - type: text
    content: ' Constantly praising God and being in favor '
  - type: text
    content: and
  - type: text
    content: ' goodwill with all the people; and the Lord kept adding [to their number] daily those who were being saved [from spiritual death].'
  '5':
  - type: text
    content: ' Now there were then residing in Jerusalem Jews, devout '
  - type: text
    content: and
  - type: text
    content: ' God-fearing men from every country under heaven.'
