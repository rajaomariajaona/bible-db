  - type: text
    content: ' For these men are not drunk, as you imagine, for it is [only] the third hour (about 9:00 a.m.) of the day;'
  '16':
  - type: text
    content: ' But [instead] this is [the beginning of] what was spoken through the prophet Joel:'
  '17':
  - type: text
    content: ' And it shall come to pass in the last days, God declares, that I will pour out of My Spirit upon all mankind, and your sons and your daughters shall prophesy [telling forth the divine counsels] and your young men shall see visions (divinely granted appearances), and your old men shall dream [divinely suggested] dreams.'
  '18':
  - type: text
    content: ' Yes, and on My menservants also and on My maidservants in those days I will pour out of My Spirit, and they shall prophesy [telling forth the divine counsels and predicting future events pertaining especially to God''s kingdom].'
  '19':
  - type: text
    content: ' And I will show wonders in the sky above and signs on the earth beneath, blood and fire and smoking vapor;'
  '2':
  - type: text
    content: ' When suddenly there came a sound from heaven like the rushing of a violent tempest blast, and it filled the whole house in which they were sitting.'
  '20':
  - type: text
    content: ' The sun shall be turned into darkness and the moon into blood before the obvious day of the Lord comes–that great and notable '
  - type: text
    content: and
  - type: text
    content: ' conspicuous and renowned [day].'
  '21':
  - type: text
    content: ' And it shall be that whoever shall call upon the name of the Lord [invoking, adoring, and worshiping the Lord–Christ] shall be saved. [Joel 2:28-32.]'
  '22':
  - type: text
    content: ' You men of Israel, listen to what I have to say: Jesus of Nazareth, a Man accredited '
  - type: text
    content: and
  - type: text
    content: ' pointed out '
  - type: text
    content: and
  - type: text
    content: ' shown forth '
  - type: text
    content: and
  - type: text
    content: ' commended '
  - type: text
    content: and
  - type: text
    content: ' attested to you by God by the mighty works and [the power of performing] wonders and signs which God worked through Him [right] in your midst, as you yourselves know–'
  '23':
  - type: text
    content: ' This Jesus, when delivered up according to the definite '
  - type: text
    content: and
  - type: text
    content: ' fixed purpose '
  - type: text
    content: and
  - type: text
    content: ' settled plan and foreknowledge of God, you crucified '
  - type: text
