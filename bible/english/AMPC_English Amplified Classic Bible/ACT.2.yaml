  - type: text
    content: ' And there appeared to them tongues resembling fire, which were separated '
  - type: text
    content: and
  - type: text
    content: ' distributed and which settled on each one of them.'
  '30':
  - type: text
    content: ' Being however a prophet, and knowing that God had sealed to him with an oath that He would set one of his descendants on his throne, [II Sam. 7:12-16; Ps. 132:11.]'
  '31':
  - type: text
