  '32':
  - type: text
    content: ' This Jesus God raised up, and of that all we [His disciples] are witnesses.'
  '33':
  - type: text
    content: ' Being therefore lifted high by '
  - type: text
    content: and
  - type: text
    content: ' to the right hand of God, and having received from the Father the promised [blessing which is the] Holy Spirit, He has made this outpouring which you yourselves both see and hear.'
  '34':
  - type: text
