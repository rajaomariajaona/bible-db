    content: ' Then how is it that we hear, each of us, in our own (particular) dialect to which we were born?'
  '9':
  - type: text
    content: ' Parthians and Medes and Elamites and inhabitants of Mesopotamia, Judea and Cappadocia, Pontus and [the province of] Asia,'
