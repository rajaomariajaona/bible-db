  - type: text
    content: and
  - type: text
    content: ' wicked men.'
  '24':
  - type: text
    content: ' [But] God raised Him up, liberating Him from the pangs of death, seeing that it was not possible for Him to continue to be controlled '
  - type: text
    content: or
  - type: text
    content: ' retained by it.'
  '25':
  - type: text
    content: ' For David says in regard to Him, I saw the Lord constantly before me, for He is at my right hand that I may not be shaken '
  - type: text
    content: or
  - type: text
    content: ' overthrown '
  - type: text
    content: or
  - type: text
    content: ' cast down [from my secure and happy state].'
  '26':
  - type: text
    content: ' Therefore my heart rejoiced and my tongue exulted exceedingly; moreover, my flesh also will dwell in hope [will encamp, pitch its tent, and dwell in hope in anticipation of the resurrection].'
  '27':
  - type: text
    content: ' For You will not abandon my soul, leaving it helpless in Hades (the state of departed spirits), nor let Your Holy One know decay '
  - type: text
