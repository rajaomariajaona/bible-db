  '28':
  - type: text
    content: ' You have made known to me the ways of life; You will enrapture me [diffusing my soul with joy] with '
  - type: text
    content: and
  - type: text
    content: ' in Your presence. [Ps. 16:8-11.]'
  '29':
  - type: text
    content: ' Brethren, it is permitted me to tell you confidently '
  - type: text
    content: and
  - type: text
    content: ' with freedom concerning the patriarch David that he both died and was buried, and his tomb is with us to this day.'
