document_id: ACT.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND WHEN the day of Pentecost had fully come, they were all assembled together in one place,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When suddenly there came a sound from heaven like the rushing of a violent tempest blast, and it filled the whole house in which they were sitting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And there appeared to them tongues resembling fire, which were separated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distributed and which settled on each one of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they were all filled (diffused throughout their souls) with the Holy Spirit and began to speak in other (different, foreign) languages (tongues), as the Spirit kept giving them clear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loud expression [in each tongue in appropriate words].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now there were then residing in Jerusalem Jews, devout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' God-fearing men from every country under heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And when this sound was heard, the multitude came together and they were astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered, because each one heard them [the apostles] speaking in his own [particular] dialect.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they were beside themselves with amazement, saying, Are not all these who are talking Galileans?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then how is it that we hear, each of us, in our own (particular) dialect to which we were born?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Parthians and Medes and Elamites and inhabitants of Mesopotamia, Judea and Cappadocia, Pontus and [the province of] Asia,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Phrygia and Pamphylia, Egypt and the parts of Libya about Cyrene, and the transient residents from Rome, both Jews and the proselytes [to Judaism from other religions],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Cretans and Arabians too–we all hear them speaking in our own native tongues [and telling of] the mighty works of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And all were beside themselves with amazement and were puzzled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered, saying one to another, What can this mean?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But others made a joke of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' derisively said, They are simply drunk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full of sweet [intoxicating] wine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But Peter, standing with the eleven, raised his voice and addressed them: You Jews and all you residents of Jerusalem, let this be [explained] to you so that you will know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand; listen closely to what I have to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For these men are not drunk, as you imagine, for it is [only] the third hour (about 9:00 a.m.) of the day;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But [instead] this is [the beginning of] what was spoken through the prophet Joel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And it shall come to pass in the last days, God declares, that I will pour out of My Spirit upon all mankind, and your sons and your daughters shall prophesy [telling forth the divine counsels] and your young men shall see visions (divinely granted appearances), and your old men shall dream [divinely suggested] dreams.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Yes, and on My menservants also and on My maidservants in those days I will pour out of My Spirit, and they shall prophesy [telling forth the divine counsels and predicting future events pertaining especially to God''s kingdom].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I will show wonders in the sky above and signs on the earth beneath, blood and fire and smoking vapor;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The sun shall be turned into darkness and the moon into blood before the obvious day of the Lord comes–that great and notable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conspicuous and renowned [day].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And it shall be that whoever shall call upon the name of the Lord [invoking, adoring, and worshiping the Lord–Christ] shall be saved. [Joel 2:28-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You men of Israel, listen to what I have to say: Jesus of Nazareth, a Man accredited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pointed out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shown forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attested to you by God by the mighty works and [the power of performing] wonders and signs which God worked through Him [right] in your midst, as you yourselves know–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' This Jesus, when delivered up according to the definite '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fixed purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' settled plan and foreknowledge of God, you crucified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put out of the way [killing Him] by the hands of lawless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' [But] God raised Him up, liberating Him from the pangs of death, seeing that it was not possible for Him to continue to be controlled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' retained by it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For David says in regard to Him, I saw the Lord constantly before me, for He is at my right hand that I may not be shaken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' overthrown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cast down [from my secure and happy state].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Therefore my heart rejoiced and my tongue exulted exceedingly; moreover, my flesh also will dwell in hope [will encamp, pitch its tent, and dwell in hope in anticipation of the resurrection].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For You will not abandon my soul, leaving it helpless in Hades (the state of departed spirits), nor let Your Holy One know decay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' see destruction [of the body after death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' You have made known to me the ways of life; You will enrapture me [diffusing my soul with joy] with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in Your presence. [Ps. 16:8-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Brethren, it is permitted me to tell you confidently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with freedom concerning the patriarch David that he both died and was buried, and his tomb is with us to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Being however a prophet, and knowing that God had sealed to him with an oath that He would set one of his descendants on his throne, [II Sam. 7:12-16; Ps. 132:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' He, foreseeing this, spoke [by foreknowledge] of the resurrection of the Christ (the Messiah) that He was not deserted [in death] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left in Hades (the state of departed spirits), nor did His body know decay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' see destruction. [Ps. 16:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' This Jesus God raised up, and of that all we [His disciples] are witnesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Being therefore lifted high by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the right hand of God, and having received from the Father the promised [blessing which is the] Holy Spirit, He has made this outpouring which you yourselves both see and hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For David did not ascend into the heavens; yet he himself says, The Lord said to my Lord, Sit at My right hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share My throne'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Until I make Your enemies a footstool for Your feet. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Therefore let the whole house of Israel recognize beyond all doubt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge assuredly that God has made Him both Lord and Christ (the Messiah)–this Jesus Whom you crucified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Now when they heard this they were stung (cut) to the heart, and they said to Peter and the rest of the apostles (special messengers), Brethren, what shall we do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Peter answered them, Repent (change your views and purpose to accept the will of God in your inner selves instead of rejecting it) and be baptized, every one of you, in the name of Jesus Christ for the forgiveness of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' release from your sins; and you shall receive the gift of the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' For the promise [of the Holy Spirit] is to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for you and your children, and to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for all that are far away, [even] to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for as many as the Lord our God invites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bids to come to Himself. [Isa. 57:19; Joel 2:32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And [Peter] solemnly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earnestly witnessed (testified) and admonished (exhorted) with much more continuous speaking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned (reproved, advised, encouraged) them, saying, Be saved from this crooked (perverse, wicked, unjust) generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Therefore those who accepted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed his message were baptized, and there were added that day about 3,000 souls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And they steadfastly persevered, devoting themselves constantly to the instruction and fellowship of the apostles, to the breaking of bread [including the Lord''s Supper] and prayers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And a sense of awe (reverential fear) came upon every soul, and many wonders and signs were performed through the apostles (the special messengers).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And all who believed (who adhered to and trusted in and relied on Jesus Christ) were united and [together] they had everything in common;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And they sold their possessions (both their landed property and their movable goods) and distributed the price among all, according as any had need.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And day after day they regularly assembled in the temple with united purpose, and in their homes they broke bread [including the Lord''s Supper]. They partook of their food with gladness and simplicity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generous hearts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Constantly praising God and being in favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodwill with all the people; and the Lord kept adding [to their number] daily those who were being saved [from spiritual death].'
