verses:
  '1':
  - type: text
    content: ' AND WHEN the day of Pentecost had fully come, they were all assembled together in one place,'
  '10':
  - type: text
    content: ' Phrygia and Pamphylia, Egypt and the parts of Libya about Cyrene, and the transient residents from Rome, both Jews and the proselytes [to Judaism from other religions],'
  '11':
  - type: text
    content: ' Cretans and Arabians too–we all hear them speaking in our own native tongues [and telling of] the mighty works of God!'
  '12':
  - type: text
    content: ' And all were beside themselves with amazement and were puzzled '
  - type: text
    content: and
  - type: text
    content: ' bewildered, saying one to another, What can this mean?'
  '13':
  - type: text
    content: ' But others made a joke of it '
  - type: text
    content: and
  - type: text
    content: ' derisively said, They are simply drunk '
  - type: text
    content: and
  - type: text
    content: ' full of sweet [intoxicating] wine.'
  '14':
  - type: text
    content: ' But Peter, standing with the eleven, raised his voice and addressed them: You Jews and all you residents of Jerusalem, let this be [explained] to you so that you will know '
  - type: text
    content: and
  - type: text
    content: ' understand; listen closely to what I have to say.'
