document_id: 3JN.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE ELDERLY elder [of the church addresses this letter] to the beloved (esteemed) Gaius, whom I truly love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Beloved, I pray that you may prosper in every way and [that your body] may keep well, even as [I know] your soul keeps well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prospers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' In fact, I greatly rejoiced when [some of] the brethren from time to time arrived and spoke [so highly] of the sincerity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fidelity of your life, as indeed you do live in the Truth [the whole Gospel presents].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I have no greater joy than this, to hear that my [spiritual] children are living their lives in the Truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Beloved, it is a fine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful work that you are doing when you give any service to the [Christian] brethren, and [especially when they are] strangers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They have testified before the church of your love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' friendship. You will do well to forward them on their journey [and you will please do so] in a way worthy of God''s [service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For these [traveling missionaries] have gone out for the Name''s sake (for His sake) and are accepting nothing from the Gentiles (the heathen, the non-Israelites).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So we ourselves ought to support such people [to welcome and provide for them], in order that we may be fellow workers in the Truth (the whole Gospel) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cooperate with its teachers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I have written briefly to the church; but Diotrephes, who likes to take the lead among them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put himself first, does not acknowledge my authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuses to accept my suggestions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to listen to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So when I arrive, I will call attention to what he is doing, his boiling over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' casting malicious reflections upon us with insinuating language. And not satisfied with that, he refuses to receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome the [missionary] brethren himself, and also interferes with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forbids those who would welcome them, and tries to expel (excommunicate) them from the church.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Beloved, do not imitate evil, but imitate good. He who does good is of God; he who does evil has not seen (discerned or experienced) God [has enjoyed no vision of Him and does not know Him at all].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Demetrius has warm commendation from everyone–and from the Truth itself; we add our testimony also, and you know that our testimony is true.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I had much [to say to you when I began] to write, but I prefer not to put it down with pen (a reed) and ink;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I hope to see you soon, and we will talk together face to face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Peace be to you! (Good-bye!) The friends here send you greetings. Remember me to the friends there [to every one of them personally] by name.'
