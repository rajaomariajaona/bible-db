document_id: 3JN.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE ELDERLY elder [of the church addresses this letter] to the beloved (esteemed) Gaius, whom I truly love.'
  '10':
  - type: text
    content: ' So when I arrive, I will call attention to what he is doing, his boiling over '
  - type: text
    content: and
  - type: text
    content: ' casting malicious reflections upon us with insinuating language. And not satisfied with that, he refuses to receive '
  - type: text
    content: and
  - type: text
    content: ' welcome the [missionary] brethren himself, and also interferes with '
  - type: text
    content: and
  - type: text
    content: ' forbids those who would welcome them, and tries to expel (excommunicate) them from the church.'
  '11':
  - type: text
    content: ' Beloved, do not imitate evil, but imitate good. He who does good is of God; he who does evil has not seen (discerned or experienced) God [has enjoyed no vision of Him and does not know Him at all].'
  '12':
  - type: text
    content: ' Demetrius has warm commendation from everyone–and from the Truth itself; we add our testimony also, and you know that our testimony is true.'
  '13':
  - type: text
    content: ' I had much [to say to you when I began] to write, but I prefer not to put it down with pen (a reed) and ink;'
  '14':
  - type: text
    content: ' I hope to see you soon, and we will talk together face to face.'
  '15':
  - type: text
    content: ' Peace be to you! (Good-bye!) The friends here send you greetings. Remember me to the friends there [to every one of them personally] by name.'
  '2':
  - type: text
    content: ' Beloved, I pray that you may prosper in every way and [that your body] may keep well, even as [I know] your soul keeps well '
  - type: text
    content: and
  - type: text
    content: ' prospers.'
  '3':
  - type: text
    content: ' In fact, I greatly rejoiced when [some of] the brethren from time to time arrived and spoke [so highly] of the sincerity '
  - type: text
    content: and
  - type: text
    content: ' fidelity of your life, as indeed you do live in the Truth [the whole Gospel presents].'
  '4':
  - type: text
    content: ' I have no greater joy than this, to hear that my [spiritual] children are living their lives in the Truth.'
  '5':
  - type: text
    content: ' Beloved, it is a fine '
  - type: text
    content: and
  - type: text
    content: ' faithful work that you are doing when you give any service to the [Christian] brethren, and [especially when they are] strangers.'
  '6':
  - type: text
    content: ' They have testified before the church of your love '
  - type: text
    content: and
  - type: text
    content: ' friendship. You will do well to forward them on their journey [and you will please do so] in a way worthy of God''s [service].'
  '7':
  - type: text
    content: ' For these [traveling missionaries] have gone out for the Name''s sake (for His sake) and are accepting nothing from the Gentiles (the heathen, the non-Israelites).'
  '8':
  - type: text
    content: ' So we ourselves ought to support such people [to welcome and provide for them], in order that we may be fellow workers in the Truth (the whole Gospel) '
  - type: text
    content: and
  - type: text
    content: ' cooperate with its teachers.'
  '9':
  - type: text
    content: ' I have written briefly to the church; but Diotrephes, who likes to take the lead among them '
  - type: text
    content: and
  - type: text
    content: ' put himself first, does not acknowledge my authority '
  - type: text
    content: and
  - type: text
    content: ' refuses to accept my suggestions '
  - type: text
    content: or
  - type: text
    content: ' to listen to me.'
