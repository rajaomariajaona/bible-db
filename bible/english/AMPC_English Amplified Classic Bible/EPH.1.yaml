document_id: EPH.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, AN apostle (special messenger) of Christ Jesus (the Messiah), by the divine will (the purpose and the choice of God) to the saints (the consecrated, set-apart ones) at Ephesus who are also faithful '
  - type: text
    content: and
  - type: text
    content: ' loyal '
  - type: text
    content: and
  - type: text
    content: ' steadfast in Christ Jesus:'
  '10':
  - type: text
    content: ' [He planned] for the maturity of the times '
  - type: text
    content: and
  - type: text
    content: ' the climax of the ages to unify all things '
  - type: text
    content: and
  - type: text
    content: ' head them up '
  - type: text
    content: and
  - type: text
    content: ' consummate them in Christ, [both] things in heaven and things on the earth.'
  '11':
  - type: text
    content: ' In Him we also were made [God''s] heritage (portion) '
  - type: text
    content: and
  - type: text
    content: ' we obtained an inheritance; for we had been foreordained (chosen and appointed beforehand) in accordance with His purpose, Who works out everything in agreement with the counsel '
  - type: text
    content: and
  - type: text
    content: ' design of His [own] will,'
  '12':
  - type: text
    content: ' So that we who first hoped in Christ [who first put our confidence in Him have been destined and appointed to] live for the praise of His glory!'
  '13':
  - type: text
    content: ' In Him you also who have heard the Word of Truth, the glad tidings (Gospel) of your salvation, and have believed in '
  - type: text
    content: and
  - type: text
    content: ' adhered to '
  - type: text
    content: and
  - type: text
    content: ' relied on Him, were stamped with the seal of the long-promised Holy Spirit.'
  '14':
  - type: text
    content: ' That [Spirit] is the guarantee of our inheritance [the firstfruits, the pledge and foretaste, the down payment on our heritage], in anticipation of its full redemption '
  - type: text
    content: and
  - type: text
    content: ' our acquiring [complete] possession of it–to the praise of His glory.'
  '15':
  - type: text
    content: ' For this reason, because I have heard of your faith in the Lord Jesus and your love toward all the saints (the people of God),'
  '16':
  - type: text
    content: ' I do not cease to give thanks for you, making mention of you in my prayers.'
  '17':
  - type: text
    content: ' [For I always pray to] the God of our Lord Jesus Christ, the Father of glory, that He may grant you a spirit of wisdom and revelation [of insight into mysteries and secrets] in the [deep and intimate] knowledge of Him,'
  '18':
  - type: text
    content: ' By having the eyes of your heart flooded with light, so that you can know '
  - type: text
    content: and
  - type: text
    content: ' understand the hope to which He has called you, and how rich is His glorious inheritance in the saints (His set-apart ones),'
  '19':
  - type: text
    content: ' And [so that you can know and understand] what is the immeasurable '
  - type: text
    content: and
  - type: text
    content: ' unlimited '
  - type: text
    content: and
  - type: text
    content: ' surpassing greatness of His power in '
  - type: text
    content: and
  - type: text
    content: ' for us who believe, as demonstrated in the working of His mighty strength,'
  '2':
  - type: text
    content: ' May grace (God''s unmerited favor) and spiritual peace [which means peace with God and harmony, unity, and undisturbedness] be yours from God our Father and from the Lord Jesus Christ.'
  '20':
  - type: text
    content: ' Which He exerted in Christ when He raised Him from the dead and seated Him at His [own] right hand in the heavenly [places],'
  '21':
  - type: text
    content: ' Far above all rule and authority and power and dominion and every name that is named [above every title that can be conferred], not only in this age '
  - type: text
    content: and
  - type: text
    content: ' in this world, but also in the age '
  - type: text
    content: and
  - type: text
    content: ' the world which are to come.'
  '22':
  - type: text
    content: ' And He has put all things under His feet and has appointed Him the universal and supreme Head of the church [a headship exercised throughout the church], [Ps. 8:6.]'
  '23':
  - type: text
    content: ' Which is His body, the fullness of Him Who fills all in all [for in that body lives the full measure of Him Who makes everything complete, and Who fills everything everywhere with Himself].'
  '3':
  - type: text
    content: ' May blessing (praise, laudation, and eulogy) be to the God and Father of our Lord Jesus Christ (the Messiah) Who has blessed us '
  - type: text
    content: in Christ
  - type: text
    content: ' with every spiritual (given by the Holy Spirit) blessing in the heavenly realm!'
  '4':
  - type: text
    content: ' Even as [in His love] He chose us [actually picked us out for Himself as His own] in Christ before the foundation of the world, that we should be holy (consecrated and set apart for Him) and blameless in His sight, '
  - type: text
    content: even
  - type: text
    content: ' above reproach, before Him in love.'
  '5':
  - type: text
    content: ' For He foreordained us (destined us, planned in love for us) to be adopted (revealed) as His own children through Jesus Christ, in accordance with the purpose of His will [because it pleased Him and was His kind intent]–'
  '6':
  - type: text
    content: ' [So that we might be] to the praise '
  - type: text
    content: and
  - type: text
    content: ' the commendation of His glorious grace (favor and mercy), which He so freely bestowed on us in the Beloved.'
  '7':
  - type: text
    content: ' In Him we have redemption (deliverance and salvation) through His blood, the remission (forgiveness) of our offenses (shortcomings and trespasses), in accordance with the riches '
  - type: text
    content: and
  - type: text
    content: ' the generosity of His gracious favor,'
  '8':
  - type: text
    content: ' Which He lavished upon us in every kind of wisdom and understanding (practical insight and prudence),'
  '9':
  - type: text
    content: ' Making known to us the mystery (secret) of His will (of His plan, of His purpose). [And it is this:] In accordance with His good pleasure (His merciful intention) which He had previously purposed '
  - type: text
    content: and
  - type: text
    content: ' set forth in Him,'
