verses:
  '1':
  - type: text
    content: ' SINCE [as is well known] many have undertaken to put in order '
  - type: text
    content: and
  - type: text
    content: ' draw up a [thorough] narrative of the surely established deeds which have been accomplished '
  - type: text
    content: and
  - type: text
    content: ' fulfilled in '
  - type: text
    content: and
  - type: text
    content: ' among us,'
  '10':
  - type: text
    content: ' And all the throng of people were praying outside [in the court] at the hour of incense [burning].'
  '11':
  - type: text
    content: ' And there appeared to him an angel of the Lord, standing at the right side of the altar of incense.'
  '12':
  - type: text
    content: ' And when Zachariah saw him, he was troubled, and fear took possession of him.'
  '13':
  - type: text
    content: ' But the angel said to him, Do not be afraid, Zachariah, because your petition was heard, and your wife Elizabeth will bear you a son, and you must call his name John [God is favorable].'
  '14':
  - type: text
    content: ' And you shall have joy and exultant delight, and many will rejoice over his birth,'
  '15':
  - type: text
    content: ' For he will be great '
  - type: text
    content: and
  - type: text
    content: ' distinguished in the sight of the Lord. And he must drink no wine nor strong drink, and he will be filled with '
  - type: text
    content: and
  - type: text
    content: ' controlled by the Holy Spirit even in '
  - type: text
    content: and
  - type: text
    content: ' from his mother''s womb. [Num. 6:3.]'
  '16':
  - type: text
    content: ' And he will turn back '
  - type: text
    content: and
  - type: text
    content: ' cause to return many of the sons of Israel to the Lord their God,'
  '17':
  - type: text
    content: ' And he will [himself] go before Him in the spirit and power of Elijah, to turn back the hearts of the fathers to the children, and the disobedient '
  - type: text
    content: and
  - type: text
    content: ' incredulous '
  - type: text
    content: and
  - type: text
    content: ' unpersuadable to the wisdom of the upright [which is the knowledge and holy love of the will of God]–in order to make ready for the Lord a people [perfectly] prepared [in spirit, adjusted and disposed and placed in the right moral state]. [Isa. 40:3; Mal. 4:5, 6.]'
  '18':
  - type: text
    content: ' And Zachariah said to the angel, By what shall I know '
  - type: text
    content: and
  - type: text
    content: ' be sure of this? For I am an old man, and my wife is well advanced in years.'
  '19':
  - type: text
    content: ' And the angel replied to him, I am Gabriel. I stand in the [very] presence of God, and I have been sent to talk to you and to bring you this good news. [Dan. 8:16; 9:21.]'
  '2':
  - type: text
    content: ' Exactly as they were handed down to us by those who from the [official] beginning [of Jesus'' ministry] were eyewitnesses and ministers of the Word [that is, of the doctrine concerning the attainment through Christ of salvation in the kingdom of God],'
  '20':
  - type: text
    content: ' Now behold, you will be '
  - type: text
    content: and
  - type: text
    content: ' will continue to be silent and not able to speak till the day when these things take place, because you have not believed what I told you; but my words are of a kind which will be fulfilled in the appointed '
  - type: text
    content: and
  - type: text
    content: ' proper time.'
  '21':
  - type: text
    content: ' Now the people kept waiting for Zachariah, and they wondered at his delaying [so long] in the sanctuary.'
  '22':
  - type: text
    content: ' But when he did come out, he was unable to speak to them; and they [clearly] perceived that he had seen a vision in the sanctuary; and he kept making signs to them, still he remained dumb.'
  '23':
  - type: text
    content: ' And when his time of performing priestly functions was ended, he returned to his [own] house.'
  '24':
  - type: text
    content: ' Now after this his wife Elizabeth became pregnant, and for five months she secluded herself entirely, saying, [I have hid myself]'
  '25':
  - type: text
    content: ' Because thus the Lord has dealt with me in the days when He deigned to look on me to take away my reproach among men. [Gen. 30:23; Isa. 4:1.]'
  '26':
  - type: text
    content: ' Now in the sixth month [after that], the angel Gabriel was sent from God to a town of Galilee named Nazareth,'
  '27':
  - type: text
    content: ' To a girl never having been married '
  - type: text
    content: and
  - type: text
    content: ' a virgin engaged to be married to a man whose name was Joseph, a descendant of the house of David; and the virgin''s name was Mary.'
  '28':
  - type: text
    content: ' And he came to her and said, Hail, O favored one [endued with grace]! The Lord is with you! '
  - type: text
    content: Blessed (favored of God) are you before all other women!
  '29':
  - type: text
    content: ' But '
  - type: text
    content: when she saw him,
  - type: text
    content: ' she was greatly troubled '
  - type: text
    content: and
  - type: text
    content: ' disturbed '
  - type: text
    content: and
  - type: text
    content: ' confused at what he said and kept revolving in her mind what such a greeting might mean.'
  '3':
  - type: text
    content: ' It seemed good '
  - type: text
    content: and
  - type: text
    content: ' desirable to me, [and so I have determined] also after having searched out diligently '
  - type: text
    content: and
  - type: text
    content: ' followed all things closely '
  - type: text
    content: and
  - type: text
    content: ' traced accurately the course from the highest to the minutest detail from the very first, to write an orderly account for you, most excellent Theophilus, [Acts 1:1.]'
  '30':
  - type: text
    content: ' And the angel said to her, Do not be afraid, Mary, for you have found grace (free, spontaneous, absolute favor and loving-kindness) with God.'
  '31':
  - type: text
    content: ' And listen! You will become pregnant and will give birth to a Son, and you shall call His name Jesus.'
  '32':
  - type: text
    content: ' He will be great (eminent) and will be called the Son of the Most High; and the Lord God will give to Him the throne of His forefather David,'
  '33':
  - type: text
    content: ' And He will reign over the house of Jacob throughout the ages; and of His reign there will be no end. [Isa. 9:6, 7; Dan. 2:44.]'
  '34':
  - type: text
    content: ' And Mary said to the angel, How can this be, since I have no [intimacy with any man as a] husband?'
  '35':
  - type: text
    content: ' Then the angel said to her, The Holy Spirit will come upon you, and the power of the Most High will overshadow you [like a shining cloud]; and so the holy (pure, sinless) Thing (Offspring) which shall be born '
  - type: text
    content: of you
  - type: text
    content: ' will be called the Son of God. [Exod. 40:34; Isa. 7:14.]'
  '36':
  - type: text
    content: ' And listen! Your relative Elizabeth in her old age has also conceived a son, and this is now the sixth month with her who was called barren.'
  '37':
  - type: text
    content: ' For with God nothing is ever impossible '
  - type: text
    content: and
  - type: text
    content: ' no word from God shall be without power '
  - type: text
    content: or
  - type: text
    content: ' impossible of fulfillment.'
  '38':
  - type: text
    content: ' Then Mary said, Behold, I am the handmaiden of the Lord; let it be done to me according to what you have said. And the angel left her.'
  '39':
  - type: text
    content: ' And at that time Mary arose and went with haste into the hill country to a town of Judah,'
  '4':
  - type: text
    content: ' [My purpose is] that you may know the full truth '
  - type: text
    content: and
  - type: text
    content: ' understand with certainty '
  - type: text
    content: and
  - type: text
    content: ' security against error the accounts (histories) '
  - type: text
    content: and
  - type: text
    content: ' doctrines of the faith of which you have been informed '
  - type: text
    content: and
  - type: text
    content: ' in which you have been orally instructed.'
  '40':
  - type: text
    content: ' And she went to the house of Zachariah and, entering it, saluted Elizabeth.'
  '41':
  - type: text
    content: ' And it occurred that when Elizabeth heard Mary''s greeting, the baby leaped in her womb, and Elizabeth was filled with '
  - type: text
    content: and
  - type: text
    content: ' controlled by the Holy Spirit.'
  '42':
  - type: text
    content: ' And she cried out with a loud cry, and then exclaimed, Blessed (favored of God) above all other women are you! And blessed (favored of God) is the Fruit of your womb!'
  '43':
  - type: text
    content: ' And how [have I deserved that this honor should] be granted to me, that the mother of my Lord should come to me?'
  '44':
  - type: text
    content: ' For behold, the instant the sound of your salutation reached my ears, the baby in my womb leaped for joy.'
  '45':
  - type: text
    content: ' And blessed (happy, to be envied) is she who believed that there would be a fulfillment of the things that were spoken to her from the Lord.'
  '46':
  - type: text
    content: ' And Mary said, My soul magnifies '
  - type: text
    content: and
  - type: text
    content: ' extols the Lord,'
  '47':
  - type: text
    content: ' And my spirit rejoices in God my Savior,'
  '48':
  - type: text
    content: ' For He has looked upon the low station '
  - type: text
    content: and
  - type: text
    content: ' humiliation of His handmaiden. For behold, from now on all generations [of all ages] will call me blessed '
  - type: text
    content: and
  - type: text
    content: ' declare me happy '
  - type: text
    content: and
  - type: text
    content: ' to be envied!'
  '49':
  - type: text
    content: ' For He Who is almighty has done great things for me–and holy is His name [to be venerated in His purity, majesty and glory]!'
  '5':
  - type: text
    content: ' In the days when Herod was king of Judea there was a certain priest whose name was Zachariah, of the daily service (the division) of Abia; and his wife was also a descendant of Aaron, and her name was Elizabeth.'
  '50':
  - type: text
    content: ' And His mercy (His compassion and kindness toward the miserable and afflicted) is on those who fear Him with godly reverence, from generation to generation '
  - type: text
    content: and
  - type: text
    content: ' age to age. [Ps. 103:17.]'
  '51':
  - type: text
    content: ' He has shown strength '
  - type: text
    content: and
  - type: text
    content: ' made might with His arm; He has scattered the proud '
  - type: text
    content: and
  - type: text
    content: ' haughty in '
  - type: text
    content: and
  - type: text
    content: ' by the imagination '
  - type: text
    content: and
  - type: text
    content: ' purpose '
  - type: text
    content: and
  - type: text
    content: ' designs of their hearts.'
  '52':
  - type: text
    content: ' He has put down the mighty from their thrones and exalted those of low degree.'
  '53':
  - type: text
    content: ' He has filled '
  - type: text
    content: and
  - type: text
    content: ' satisfied the hungry with good things, and the rich He has sent away empty-handed [without a gift].'
  '54':
  - type: text
    content: ' He has laid hold on His servant Israel [to help him, to espouse his cause], in remembrance of His mercy,'
  '55':
  - type: text
    content: ' Even as He promised to our forefathers, to Abraham and to his descendants forever. [Gen. 17:7; 18:18; 22:17; I Sam. 2:1-10; Mic. 7:20.]'
  '56':
  - type: text
    content: ' And Mary remained with her [Elizabeth] for about three months and [then] returned to her [own] home.'
  '57':
  - type: text
    content: ' Now the time that Elizabeth should be delivered came, and she gave birth to a son.'
  '58':
  - type: text
    content: ' And her neighbors and relatives heard that the Lord had shown great mercy on her, and they rejoiced with her.'
  '59':
  - type: text
    content: ' And it occurred that on the eighth day, when they came to circumcise the child, they were intending to call him Zachariah after his father, [Gen. 17:12; Lev. 12:3.]'
  '6':
  - type: text
    content: ' And they both were righteous in the sight of God, walking blamelessly in all the commandments and requirements of the Lord.'
  '60':
  - type: text
    content: ' But his mother answered, Not so! But he shall be called John.'
  '61':
  - type: text
    content: ' And they said to her, None of your relatives is called by that name.'
  '62':
  - type: text
    content: ' And they inquired with signs to his father [as to] what he wanted to have him called.'
  '63':
  - type: text
    content: ' Then Zachariah asked for a writing tablet and wrote, His name is John. And they were all astonished.'
  '64':
  - type: text
    content: ' And at once his mouth was opened and his tongue loosed, and he began to speak, blessing '
  - type: text
    content: and
  - type: text
    content: ' praising '
  - type: text
    content: and
  - type: text
    content: ' thanking God.'
  '65':
  - type: text
    content: ' And awe '
  - type: text
    content: and
  - type: text
    content: ' reverential fear came on all their neighbors; and all these things were discussed throughout the hill country of Judea.'
  '66':
  - type: text
    content: ' And all who heard them laid them up in their hearts, saying, Whatever will this little boy be then? For the hand of the Lord was [so evidently] with him [protecting and aiding him].'
  '67':
  - type: text
    content: ' Now Zachariah his father was filled with '
  - type: text
    content: and
  - type: text
    content: ' controlled by the Holy Spirit and prophesied, saying,'
  '68':
  - type: text
    content: ' Blessed (praised and extolled and thanked) be the Lord, the God of Israel, because He has come and brought deliverance '
  - type: text
    content: and
  - type: text
    content: ' redemption to His people!'
  '69':
  - type: text
    content: ' And He has raised up a Horn of salvation [a mighty and valiant Helper, the Author of salvation] for us in the house of David His servant–'
  '7':
  - type: text
    content: ' But they had no child, for Elizabeth was barren; and both were far advanced in years.'
  '70':
  - type: text
    content: ' This is as He promised by the mouth of His holy prophets from the most ancient times [in the memory of man]–'
  '71':
  - type: text
    content: ' That we should have deliverance '
  - type: text
    content: and
  - type: text
    content: ' be saved from our enemies and from the hand of all who detest '
  - type: text
    content: and
  - type: text
    content: ' pursue us with hatred;'
  '72':
  - type: text
    content: ' To make true '
  - type: text
    content: and
  - type: text
    content: ' show the mercy '
  - type: text
    content: and
  - type: text
    content: ' compassion '
  - type: text
    content: and
  - type: text
    content: ' kindness [promised] to our forefathers and to remember '
  - type: text
    content: and
  - type: text
    content: ' carry out His holy covenant [to bless, which is all the more sacred because it is made by God Himself],'
  '73':
  - type: text
    content: ' That covenant He sealed by oath to our forefather Abraham:'
  '74':
  - type: text
    content: ' To grant us that we, being delivered from the hand of our foes, might serve Him fearlessly'
  '75':
  - type: text
    content: ' In holiness (divine consecration) and righteousness [in accordance with the everlasting principles of right] within His presence all the days of our lives.'
  '76':
  - type: text
    content: ' And you, little one, shall be called a prophet of the Most High; for you shall go on before the face of the Lord to make ready His ways, [Isa. 40:3; Mal. 4:5.]'
  '77':
  - type: text
    content: ' To bring '
  - type: text
    content: and
  - type: text
    content: ' give the knowledge of salvation to His people in the forgiveness '
  - type: text
    content: and
  - type: text
    content: ' remission of their sins.'
  '78':
  - type: text
    content: ' Because of '
  - type: text
    content: and
  - type: text
    content: ' through the heart of tender mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness of our God, a Light from on high will dawn upon us '
  - type: text
    content: and
  - type: text
    content: ' visit [us] [Mal. 4:2.]'
  '79':
  - type: text
    content: ' To shine upon '
  - type: text
    content: and
  - type: text
    content: ' give light to those who sit in darkness and in the shadow of death, to direct '
  - type: text
    content: and
  - type: text
    content: ' guide our feet in a straight line into the way of peace. [Isa. 9:2.]'
  '8':
  - type: text
    content: ' Now while on duty, serving as priest before God in the order of his division,'
  '80':
  - type: text
    content: ' And the little boy grew and became strong in spirit; and he was in the deserts (wilderness) until the day of his appearing to Israel [the commencement of his public ministry].'
  '9':
  - type: text
    content: ' As was the custom of the priesthood, it fell to him by lot to enter [the sanctuary of] the temple of the Lord and burn incense. [Exod. 30:7.]'
