document_id: LUK.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SINCE [as is well known] many have undertaken to put in order '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' draw up a [thorough] narrative of the surely established deeds which have been accomplished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfilled in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among us,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Exactly as they were handed down to us by those who from the [official] beginning [of Jesus'' ministry] were eyewitnesses and ministers of the Word [that is, of the doctrine concerning the attainment through Christ of salvation in the kingdom of God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' It seemed good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desirable to me, [and so I have determined] also after having searched out diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' followed all things closely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' traced accurately the course from the highest to the minutest detail from the very first, to write an orderly account for you, most excellent Theophilus, [Acts 1:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [My purpose is] that you may know the full truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand with certainty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' security against error the accounts (histories) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doctrines of the faith of which you have been informed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in which you have been orally instructed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' In the days when Herod was king of Judea there was a certain priest whose name was Zachariah, of the daily service (the division) of Abia; and his wife was also a descendant of Aaron, and her name was Elizabeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they both were righteous in the sight of God, walking blamelessly in all the commandments and requirements of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But they had no child, for Elizabeth was barren; and both were far advanced in years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now while on duty, serving as priest before God in the order of his division,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' As was the custom of the priesthood, it fell to him by lot to enter [the sanctuary of] the temple of the Lord and burn incense. [Exod. 30:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And all the throng of people were praying outside [in the court] at the hour of incense [burning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And there appeared to him an angel of the Lord, standing at the right side of the altar of incense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And when Zachariah saw him, he was troubled, and fear took possession of him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the angel said to him, Do not be afraid, Zachariah, because your petition was heard, and your wife Elizabeth will bear you a son, and you must call his name John [God is favorable].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And you shall have joy and exultant delight, and many will rejoice over his birth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For he will be great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distinguished in the sight of the Lord. And he must drink no wine nor strong drink, and he will be filled with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controlled by the Holy Spirit even in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from his mother''s womb. [Num. 6:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he will turn back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause to return many of the sons of Israel to the Lord their God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he will [himself] go before Him in the spirit and power of Elijah, to turn back the hearts of the fathers to the children, and the disobedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incredulous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unpersuadable to the wisdom of the upright [which is the knowledge and holy love of the will of God]–in order to make ready for the Lord a people [perfectly] prepared [in spirit, adjusted and disposed and placed in the right moral state]. [Isa. 40:3; Mal. 4:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Zachariah said to the angel, By what shall I know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be sure of this? For I am an old man, and my wife is well advanced in years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the angel replied to him, I am Gabriel. I stand in the [very] presence of God, and I have been sent to talk to you and to bring you this good news. [Dan. 8:16; 9:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now behold, you will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will continue to be silent and not able to speak till the day when these things take place, because you have not believed what I told you; but my words are of a kind which will be fulfilled in the appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proper time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now the people kept waiting for Zachariah, and they wondered at his delaying [so long] in the sanctuary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But when he did come out, he was unable to speak to them; and they [clearly] perceived that he had seen a vision in the sanctuary; and he kept making signs to them, still he remained dumb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when his time of performing priestly functions was ended, he returned to his [own] house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Now after this his wife Elizabeth became pregnant, and for five months she secluded herself entirely, saying, [I have hid myself]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Because thus the Lord has dealt with me in the days when He deigned to look on me to take away my reproach among men. [Gen. 30:23; Isa. 4:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Now in the sixth month [after that], the angel Gabriel was sent from God to a town of Galilee named Nazareth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' To a girl never having been married '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a virgin engaged to be married to a man whose name was Joseph, a descendant of the house of David; and the virgin''s name was Mary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he came to her and said, Hail, O favored one [endued with grace]! The Lord is with you! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Blessed (favored of God) are you before all other women!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when she saw him,
  - type: text
    text: ' she was greatly troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confused at what he said and kept revolving in her mind what such a greeting might mean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the angel said to her, Do not be afraid, Mary, for you have found grace (free, spontaneous, absolute favor and loving-kindness) with God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And listen! You will become pregnant and will give birth to a Son, and you shall call His name Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' He will be great (eminent) and will be called the Son of the Most High; and the Lord God will give to Him the throne of His forefather David,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And He will reign over the house of Jacob throughout the ages; and of His reign there will be no end. [Isa. 9:6, 7; Dan. 2:44.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Mary said to the angel, How can this be, since I have no [intimacy with any man as a] husband?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then the angel said to her, The Holy Spirit will come upon you, and the power of the Most High will overshadow you [like a shining cloud]; and so the holy (pure, sinless) Thing (Offspring) which shall be born '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of you
  - type: text
    text: ' will be called the Son of God. [Exod. 40:34; Isa. 7:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And listen! Your relative Elizabeth in her old age has also conceived a son, and this is now the sixth month with her who was called barren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For with God nothing is ever impossible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' no word from God shall be without power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' impossible of fulfillment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then Mary said, Behold, I am the handmaiden of the Lord; let it be done to me according to what you have said. And the angel left her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And at that time Mary arose and went with haste into the hill country to a town of Judah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And she went to the house of Zachariah and, entering it, saluted Elizabeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And it occurred that when Elizabeth heard Mary''s greeting, the baby leaped in her womb, and Elizabeth was filled with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controlled by the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And she cried out with a loud cry, and then exclaimed, Blessed (favored of God) above all other women are you! And blessed (favored of God) is the Fruit of your womb!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And how [have I deserved that this honor should] be granted to me, that the mother of my Lord should come to me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' For behold, the instant the sound of your salutation reached my ears, the baby in my womb leaped for joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And blessed (happy, to be envied) is she who believed that there would be a fulfillment of the things that were spoken to her from the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And Mary said, My soul magnifies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extols the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And my spirit rejoices in God my Savior,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' For He has looked upon the low station '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliation of His handmaiden. For behold, from now on all generations [of all ages] will call me blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declare me happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be envied!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' For He Who is almighty has done great things for me–and holy is His name [to be venerated in His purity, majesty and glory]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And His mercy (His compassion and kindness toward the miserable and afflicted) is on those who fear Him with godly reverence, from generation to generation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' age to age. [Ps. 103:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' He has shown strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made might with His arm; He has scattered the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' haughty in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by the imagination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' designs of their hearts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' He has put down the mighty from their thrones and exalted those of low degree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' He has filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfied the hungry with good things, and the rich He has sent away empty-handed [without a gift].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' He has laid hold on His servant Israel [to help him, to espouse his cause], in remembrance of His mercy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' Even as He promised to our forefathers, to Abraham and to his descendants forever. [Gen. 17:7; 18:18; 22:17; I Sam. 2:1-10; Mic. 7:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' And Mary remained with her [Elizabeth] for about three months and [then] returned to her [own] home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' Now the time that Elizabeth should be delivered came, and she gave birth to a son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' And her neighbors and relatives heard that the Lord had shown great mercy on her, and they rejoiced with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' And it occurred that on the eighth day, when they came to circumcise the child, they were intending to call him Zachariah after his father, [Gen. 17:12; Lev. 12:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' But his mother answered, Not so! But he shall be called John.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' And they said to her, None of your relatives is called by that name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' And they inquired with signs to his father [as to] what he wanted to have him called.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' Then Zachariah asked for a writing tablet and wrote, His name is John. And they were all astonished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' And at once his mouth was opened and his tongue loosed, and he began to speak, blessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanking God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' And awe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverential fear came on all their neighbors; and all these things were discussed throughout the hill country of Judea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' And all who heard them laid them up in their hearts, saying, Whatever will this little boy be then? For the hand of the Lord was [so evidently] with him [protecting and aiding him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' Now Zachariah his father was filled with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controlled by the Holy Spirit and prophesied, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' Blessed (praised and extolled and thanked) be the Lord, the God of Israel, because He has come and brought deliverance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' redemption to His people!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' And He has raised up a Horn of salvation [a mighty and valiant Helper, the Author of salvation] for us in the house of David His servant–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' This is as He promised by the mouth of His holy prophets from the most ancient times [in the memory of man]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' That we should have deliverance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be saved from our enemies and from the hand of all who detest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue us with hatred;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: ' To make true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show the mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness [promised] to our forefathers and to remember '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carry out His holy covenant [to bless, which is all the more sacred because it is made by God Himself],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: ' That covenant He sealed by oath to our forefather Abraham:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: ' To grant us that we, being delivered from the hand of our foes, might serve Him fearlessly'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: ' In holiness (divine consecration) and righteousness [in accordance with the everlasting principles of right] within His presence all the days of our lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: ' And you, little one, shall be called a prophet of the Most High; for you shall go on before the face of the Lord to make ready His ways, [Isa. 40:3; Mal. 4:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: ' To bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give the knowledge of salvation to His people in the forgiveness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remission of their sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: ' Because of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through the heart of tender mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness of our God, a Light from on high will dawn upon us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' visit [us] [Mal. 4:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: ' To shine upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give light to those who sit in darkness and in the shadow of death, to direct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guide our feet in a straight line into the way of peace. [Isa. 9:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: ' And the little boy grew and became strong in spirit; and he was in the deserts (wilderness) until the day of his appearing to Israel [the commencement of his public ministry].'
