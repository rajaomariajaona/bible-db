document_id: PSA.22,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; set to +[the tune of+] Aijeleth Hashshahar +[the hind of the morning dawn+]. A Psalm of David.
  - type: text
    content: ' MY GOD, my God, why have You forsaken me? Why are You so far from helping me, and from the words of my groaning? [Matt. 27:46.]'
  '10':
  - type: text
    content: ' I was cast upon You from my very birth; from my mother''s womb You have been my God.'
  '11':
  - type: text
    content: ' Be not far from me, for trouble is near and there is none to help.'
  '12':
  - type: text
    content: ' Many [foes like] bulls have surrounded me; strong bulls of Bashan have hedged me in. [Ezek. 39:18.]'
  '13':
  - type: text
    content: ' Against me they opened their mouths wide, like a ravening and roaring lion.'
  '14':
  - type: text
    content: ' I am poured out like water, and all my bones are out of joint. My heart is like wax; it is softened [with anguish] '
  - type: text
    content: and
  - type: text
    content: ' melted down within me.'
  '15':
  - type: text
    content: ' My strength is dried up like a fragment of clay pottery; [with thirst] my tongue cleaves to my jaws; and You have brought me into the dust of death. [John 19:28.]'
  '16':
  - type: text
    content: ' For [like a pack of] dogs they have encompassed me; a company of evildoers has encircled me, they pierced my hands and my feet. [Isa. 53:7; John 19:37.]'
  '17':
  - type: text
    content: ' I can count all my bones; [the evildoers] gaze at me. [Luke 23:27, 35.]'
  '18':
  - type: text
    content: ' They part my clothing among them and cast lots for my raiment (a long, shirtlike garment, a seamless undertunic). [John 19:23, 24.])'
  '19':
  - type: text
    content: ' But be not far from me, O Lord; O my Help, hasten to aid me!'
  '2':
  - type: text
    content: ' O my God, I cry in the daytime, but You answer not; and by night I am not silent '
  - type: text
    content: or
  - type: text
    content: ' find no rest.'
  '20':
  - type: text
    content: ' Deliver my life from the sword, my dear life [my only one] from the power of the dog [the agent of execution].'
  '21':
  - type: text
    content: ' Save me from the lion''s mouth; for You have answered me [kindly] from the horns of the wild oxen.'
  '22':
  - type: text
    content: ' I will declare Your name to my brethren; in the midst of the congregation will I praise You. [John 20:17; Rom. 8:29; Heb. 2:12.]'
  '23':
  - type: text
    content: ' You who fear (revere and worship) the Lord, praise Him! All you offspring of Jacob, glorify Him. Fear (revere and worship) Him, all you offspring of Israel.'
  '24':
  - type: text
    content: ' For He has not despised or abhorred the affliction of the afflicted; neither has He hidden His face from him, but when he cried to Him, He heard.'
  '25':
  - type: text
    content: ' My praise shall be of You in the great congregation. I will pay to Him my vows [made in the time of trouble] before them who fear (revere and worship) Him.'
  '26':
  - type: text
    content: ' The poor '
  - type: text
    content: and
  - type: text
    content: ' afflicted shall eat and be satisfied; they shall praise the Lord–they who [diligently] seek for, inquire of '
  - type: text
    content: and
  - type: text
    content: ' for Him, '
  - type: text
    content: and
  - type: text
    content: ' require Him [as their greatest need]. May your hearts be quickened now '
  - type: text
    content: and
  - type: text
    content: ' forever!'
  '27':
  - type: text
    content: ' All the ends of the earth shall remember and turn to the Lord, and all the families of the nations shall bow down '
  - type: text
    content: and
  - type: text
    content: ' worship before You,'
  '28':
  - type: text
    content: ' For the kingship '
  - type: text
    content: and
  - type: text
    content: ' the kingdom are the Lord''s, and He is the ruler over the nations.'
  '29':
  - type: text
    content: ' All the mighty ones upon earth shall eat [in thanksgiving] and worship; all they that go down to the dust shall bow before Him, even he who cannot keep himself alive.'
  '3':
  - type: text
    content: ' But You are holy, O You Who dwell in [the holy place where] the praises of Israel [are offered].'
  '30':
  - type: text
    content: ' Posterity shall serve Him; they shall tell of the Lord to the next generation.'
  '31':
  - type: text
    content: ' They shall come and shall declare His righteousness to a people yet to be born–that He has done it [that it is finished]! [John 19:30.]'
  '4':
  - type: text
    content: ' Our fathers trusted in You; they trusted (leaned on, relied on You, and were confident) and You delivered them.'
  '5':
  - type: text
    content: ' They cried to You and were delivered; they trusted in, leaned on, '
  - type: text
    content: and
  - type: text
    content: ' confidently relied on You, and were not ashamed '
  - type: text
    content: or
  - type: text
    content: ' confounded '
  - type: text
    content: or
  - type: text
    content: ' disappointed.'
  '6':
  - type: text
    content: ' But I am a worm, and no man; I am the scorn of men, and despised by the people. [Matt. 27:39-44.]'
  '7':
  - type: text
    content: ' All who see me laugh at me '
  - type: text
    content: and
  - type: text
    content: ' mock me; they shoot out the lip, they shake the head, saying, [Matt. 27:43.]'
  '8':
  - type: text
    content: ' He trusted '
  - type: text
    content: and
  - type: text
    content: ' rolled himself on the Lord, that He would deliver him. Let Him deliver him, seeing that He delights in him! [Matt. 27:39, 43; Mark 15:29, 30; Luke 23:35.]'
  '9':
  - type: text
    content: ' Yet You are He Who took me out of the womb; You made me hope '
  - type: text
    content: and
  - type: text
    content: ' trust when I was on my mother''s breasts.'
