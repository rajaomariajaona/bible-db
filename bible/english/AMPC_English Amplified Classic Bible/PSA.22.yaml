document_id: PSA.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; set to +[the tune of+] Aijeleth Hashshahar +[the hind of the morning dawn+]. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MY GOD, my God, why have You forsaken me? Why are You so far from helping me, and from the words of my groaning? [Matt. 27:46.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I was cast upon You from my very birth; from my mother''s womb You have been my God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Be not far from me, for trouble is near and there is none to help.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Many [foes like] bulls have surrounded me; strong bulls of Bashan have hedged me in. [Ezek. 39:18.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Against me they opened their mouths wide, like a ravening and roaring lion.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I am poured out like water, and all my bones are out of joint. My heart is like wax; it is softened [with anguish] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' melted down within me.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' My strength is dried up like a fragment of clay pottery; [with thirst] my tongue cleaves to my jaws; and You have brought me into the dust of death. [John 19:28.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For [like a pack of] dogs they have encompassed me; a company of evildoers has encircled me, they pierced my hands and my feet. [Isa. 53:7; John 19:37.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I can count all my bones; [the evildoers] gaze at me. [Luke 23:27, 35.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' They part my clothing among them and cast lots for my raiment (a long, shirtlike garment, a seamless undertunic). [John 19:23, 24.])'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But be not far from me, O Lord; O my Help, hasten to aid me!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' O my God, I cry in the daytime, but You answer not; and by night I am not silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' find no rest.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Deliver my life from the sword, my dear life [my only one] from the power of the dog [the agent of execution].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Save me from the lion''s mouth; for You have answered me [kindly] from the horns of the wild oxen.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' I will declare Your name to my brethren; in the midst of the congregation will I praise You. [John 20:17; Rom. 8:29; Heb. 2:12.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' You who fear (revere and worship) the Lord, praise Him! All you offspring of Jacob, glorify Him. Fear (revere and worship) Him, all you offspring of Israel.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' For He has not despised or abhorred the affliction of the afflicted; neither has He hidden His face from him, but when he cried to Him, He heard.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' My praise shall be of You in the great congregation. I will pay to Him my vows [made in the time of trouble] before them who fear (revere and worship) Him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' The poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicted shall eat and be satisfied; they shall praise the Lord–they who [diligently] seek for, inquire of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for Him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require Him [as their greatest need]. May your hearts be quickened now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever!'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' All the ends of the earth shall remember and turn to the Lord, and all the families of the nations shall bow down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship before You,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For the kingship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the kingdom are the Lord''s, and He is the ruler over the nations.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' All the mighty ones upon earth shall eat [in thanksgiving] and worship; all they that go down to the dust shall bow before Him, even he who cannot keep himself alive.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But You are holy, O You Who dwell in [the holy place where] the praises of Israel [are offered].'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Posterity shall serve Him; they shall tell of the Lord to the next generation.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' They shall come and shall declare His righteousness to a people yet to be born–that He has done it [that it is finished]! [John 19:30.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Our fathers trusted in You; they trusted (leaned on, relied on You, and were confident) and You delivered them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They cried to You and were delivered; they trusted in, leaned on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently relied on You, and were not ashamed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' confounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disappointed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But I am a worm, and no man; I am the scorn of men, and despised by the people. [Matt. 27:39-44.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' All who see me laugh at me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mock me; they shoot out the lip, they shake the head, saying, [Matt. 27:43.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He trusted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rolled himself on the Lord, that He would deliver him. Let Him deliver him, seeing that He delights in him! [Matt. 27:39, 43; Mark 15:29, 30; Luke 23:35.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Yet You are He Who took me out of the womb; You made me hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust when I was on my mother''s breasts.'
