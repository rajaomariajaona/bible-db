document_id: JOB.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT NOW they who are younger than I have me in derision, whose fathers I disdained to set with the dogs of my flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Yes, how could the strength of their hands profit me? They were men whose ripe age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vigor had perished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They are gaunt with want and famine; they gnaw the dry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' barren ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' flee into the wilderness, into the gloom of wasteness and desolation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They pluck saltwort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mallows among the bushes, and roots of the broom for their food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to warm them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They are driven from among men, who shout after them as after a thief.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They must dwell in the clefts of frightful valleys (gullies made by torrents) and in holes of the earth and of the rocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Among the bushes they bray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' howl [like wild animals]; beneath the prickly scrub they fling themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' huddle together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Sons of the worthless and nameless, they have been scourged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed out of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And now I have become their song; yes, I am a byword to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They abhor me, they stand aloof from me, and do not refrain from spitting in my face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' at the sight of me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For God has loosed my bowstring and afflicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humbled me; they have cast off the bridle [of restraint] before me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' On my right hand rises the rabble brood; they jostle me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' push away my feet, and they cast up against me their ways of destruction [like an advancing army].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' They break up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clutter my path [embarrassing my plans]; they urge on my calamity, even though they have no helper [and are themselves helpless].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' As through a wide breach they come in; amid the crash [of falling walls] they roll themselves upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Terrors are turned upon me; my honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reputation they chase away like the wind, and my welfare has passed away as a cloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And now my life is poured out within me; the days of affliction have gripped me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' My bones are pierced [with aching] in the night season, and the pains that gnaw me take no rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' By the great force [of my disease] my garment is disguised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disfigured; it binds me about like the collar of my coat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [God] has cast me into the mire, and I have become like dust and ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' I cry to You, [Lord,] and You do not answer me; I stand up, but You [only] gaze [indifferently] at me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You have become harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruel to me; with the might of Your hand You [keep me alive only to] persecute me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You lift me up on the wind; You cause me to ride upon it, and You toss me about in the tempest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For I know that You will bring me to death and to the house [of meeting] appointed for all the living.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' However, does not one falling in a heap of ruins stretch out his hand? Or in his calamity will he not therefore cry for help?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Did not I weep for him who was in trouble? Was not my heart grieved for the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' needy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But when I looked for good, then evil came to me; and when I waited for light, there came darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' My heart is troubled and does not rest; days of affliction come to meet me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' I go about blackened, but not by the sun; I stand up in the congregation and cry for help.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I am a brother to jackals [which howl], and a companion to ostriches [which scream dismally].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' My skin falls from me in blackened flakes, and my bones are burned with heat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Therefore my lyre is turned to mourning, and my pipe into the voice of those who weep.'
