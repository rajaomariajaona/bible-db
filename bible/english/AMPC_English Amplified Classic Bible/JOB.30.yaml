document_id: JOB.30,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT NOW they who are younger than I have me in derision, whose fathers I disdained to set with the dogs of my flock.'
  '10':
  - type: text
    content: ' They abhor me, they stand aloof from me, and do not refrain from spitting in my face '
  - type: text
    content: or
  - type: text
    content: ' at the sight of me.'
  '11':
  - type: text
    content: ' For God has loosed my bowstring and afflicted '
  - type: text
    content: and
  - type: text
    content: ' humbled me; they have cast off the bridle [of restraint] before me.'
  '12':
  - type: text
    content: ' On my right hand rises the rabble brood; they jostle me '
  - type: text
    content: and
  - type: text
    content: ' push away my feet, and they cast up against me their ways of destruction [like an advancing army].'
  '13':
  - type: text
    content: ' They break up '
  - type: text
    content: and
  - type: text
    content: ' clutter my path [embarrassing my plans]; they urge on my calamity, even though they have no helper [and are themselves helpless].'
  '14':
  - type: text
    content: ' As through a wide breach they come in; amid the crash [of falling walls] they roll themselves upon me.'
  '15':
  - type: text
    content: ' Terrors are turned upon me; my honor '
  - type: text
    content: and
  - type: text
    content: ' reputation they chase away like the wind, and my welfare has passed away as a cloud.'
  '16':
  - type: text
    content: ' And now my life is poured out within me; the days of affliction have gripped me.'
  '17':
  - type: text
    content: ' My bones are pierced [with aching] in the night season, and the pains that gnaw me take no rest.'
  '18':
  - type: text
    content: ' By the great force [of my disease] my garment is disguised '
  - type: text
    content: and
  - type: text
    content: ' disfigured; it binds me about like the collar of my coat.'
  '19':
  - type: text
    content: ' [God] has cast me into the mire, and I have become like dust and ashes.'
  '2':
  - type: text
    content: ' Yes, how could the strength of their hands profit me? They were men whose ripe age '
  - type: text
    content: and
  - type: text
    content: ' vigor had perished.'
  '20':
  - type: text
    content: ' I cry to You, [Lord,] and You do not answer me; I stand up, but You [only] gaze [indifferently] at me.'
  '21':
  - type: text
    content: ' You have become harsh '
  - type: text
    content: and
  - type: text
    content: ' cruel to me; with the might of Your hand You [keep me alive only to] persecute me.'
  '22':
  - type: text
    content: ' You lift me up on the wind; You cause me to ride upon it, and You toss me about in the tempest.'
  '23':
  - type: text
    content: ' For I know that You will bring me to death and to the house [of meeting] appointed for all the living.'
  '24':
  - type: text
    content: ' However, does not one falling in a heap of ruins stretch out his hand? Or in his calamity will he not therefore cry for help?'
  '25':
  - type: text
    content: ' Did not I weep for him who was in trouble? Was not my heart grieved for the poor '
  - type: text
    content: and
  - type: text
    content: ' needy?'
  '26':
  - type: text
    content: ' But when I looked for good, then evil came to me; and when I waited for light, there came darkness.'
  '27':
  - type: text
    content: ' My heart is troubled and does not rest; days of affliction come to meet me.'
  '28':
  - type: text
    content: ' I go about blackened, but not by the sun; I stand up in the congregation and cry for help.'
  '29':
  - type: text
    content: ' I am a brother to jackals [which howl], and a companion to ostriches [which scream dismally].'
  '3':
  - type: text
    content: ' They are gaunt with want and famine; they gnaw the dry '
  - type: text
    content: and
  - type: text
    content: ' barren ground '
  - type: text
    content: or
  - type: text
    content: ' flee into the wilderness, into the gloom of wasteness and desolation.'
  '30':
  - type: text
    content: ' My skin falls from me in blackened flakes, and my bones are burned with heat.'
  '31':
  - type: text
    content: ' Therefore my lyre is turned to mourning, and my pipe into the voice of those who weep.'
  '4':
  - type: text
    content: ' They pluck saltwort '
  - type: text
    content: or
  - type: text
    content: ' mallows among the bushes, and roots of the broom for their food '
  - type: text
    content: or
  - type: text
    content: ' to warm them.'
  '5':
  - type: text
    content: ' They are driven from among men, who shout after them as after a thief.'
  '6':
  - type: text
    content: ' They must dwell in the clefts of frightful valleys (gullies made by torrents) and in holes of the earth and of the rocks.'
  '7':
  - type: text
    content: ' Among the bushes they bray '
  - type: text
    content: and
  - type: text
    content: ' howl [like wild animals]; beneath the prickly scrub they fling themselves '
  - type: text
    content: and
  - type: text
    content: ' huddle together.'
  '8':
  - type: text
    content: ' Sons of the worthless and nameless, they have been scourged '
  - type: text
    content: and
  - type: text
    content: ' crushed out of the land.'
  '9':
  - type: text
    content: ' And now I have become their song; yes, I am a byword to them.'
