document_id: GEN.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHEN ISAAC was old and his eyes were dim so that he could not see, he called Esau his elder son, and said to him, My son! And he answered him, Here I am.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall bring it to your father, that he may eat and declare his blessing upon you before his death.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jacob said to Rebekah his mother, Listen, Esau my brother is a hairy man and I am a smooth man.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Suppose my father feels me; I will seem to him to be a cheat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an imposter, and I will bring [his] curse on me and not [his] blessing.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But his mother said to him, On me be your curse, my son; only obey my word and go, fetch them to me.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So [Jacob] went, got [the kids], and brought them to his mother; and his mother prepared appetizing meat with a delightful odor, such as his father loved.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Rebekah took her elder son Esau''s best clothes which were with her in the house, and put them on Jacob her younger son.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And she put the skins of the kids on his hands and on the smooth part of his neck.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And she gave the savory meat and the bread which she had prepared into the hand of her son Jacob.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So he went to his father and said, My father. And he said, Here am I; who are you, my son?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jacob said to his father, I am Esau your firstborn; I have done what you told me to do. Now sit up and eat of my game, so that you may proceed to bless me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, See here now; I am old, I do not know when I may die.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Isaac said to his son, How is it that you have found the game so quickly, my son? And he said, Because the Lord your God caused it to come to me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Isaac said to Jacob, Come close to me, I beg of you, that I may feel you, my son, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know whether you really are my son Esau or not.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Jacob went near to Isaac, and his father felt him and said, The voice is Jacob''s voice, but the hands are the hands of Esau.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He could not identify him, because his hands were hairy like his brother Esau''s hands; so he blessed him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he said, Are you really my son Esau? He answered, I am.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then [Isaac] said, Bring it to me and I will eat of my son''s game, that I may bless you. He brought it to him and he ate; and he brought him wine and he drank.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then his father Isaac said, Come near and kiss me, my son.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So he came near and kissed him; and [Isaac] smelled his clothing and blessed him and said, The scent of my son is as the odor of a field which the Lord has blessed.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And may God give you of the dew of the heavens and of the fatness of the earth and abundance of grain and [new] wine;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let peoples serve you and nations bow down to you; be master over your brothers, and let your mother''s sons bow down to you. Let everyone be cursed who curses you and favored with blessings who blesses you.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now, I pray you, take your weapons, your [arrows in a] quiver and your bow, and go out into the open country and hunt game for me,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As soon as Isaac had finished blessing Jacob and Jacob was scarcely gone out from the presence of Isaac his father, Esau his brother came in from his hunting.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Esau had also prepared savory food and brought it to his father and said to him, Let my father arise and eat of his son''s game, that you may bless me.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Isaac his father said to him, Who are you? And he replied, I am your son, your firstborn, Esau.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Isaac trembled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shook violently, and he said, Who? Where is he who has hunted game and brought it to me, and I ate of it all before you came and I have blessed him? Yes, and he shall be blessed.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Esau heard the words of his father, he cried out with a great and bitter cry and said to his father, Bless me, even me also, O my father! [Heb. 12:16, 17.]'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Isaac] said, Your brother came with crafty cunning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherous deceit and has taken your blessing.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Esau] replied, Is he not rightly named Jacob [the supplanter]? For he has supplanted me these two times: he took away my birthright, and now he has taken away my blessing! Have you not still a blessing reserved for me?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Isaac answered Esau, Behold, I have made [Jacob] your lord and master; I have given all his brethren to him for servants, and with corn and [new] wine have I sustained him. What then can I do for you, my son?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Esau said to his father, Have you only one blessing, my father? Bless me, even me also, O my father! And Esau lifted up [could not control] his voice and wept aloud.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Isaac his father answered, Your [blessing and] dwelling shall all come from the fruitfulness of the earth and from the dew of the heavens above;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And prepare me appetizing meat, such as I love, and bring it to me, that I may eat of it, [preparatory] to giving you my blessing [as my firstborn] before I die.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By your sword you shall live and serve your brother. But [the time shall come] when you will grow restive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' break loose, and you shall tear his yoke from off your neck.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Esau hated Jacob because of the blessing with which his father blessed him; and Esau said in his heart, The days of mourning for my father are very near. When [he is gone] I will kill my brother Jacob.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These words of Esau her elder son were repeated to Rebekah. She sent for Jacob her younger son and said to him, See here, your brother Esau comforts himself concerning you [by intending] to kill you.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now, my son, do what I tell you; arise, flee to my brother Laban in Haran;'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Linger and dwell with him for a while until your brother''s fury is spent.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When your brother''s anger is diverted from you, he will forget [the wrong] that you have done him. Then I will send and bring you back from there. Why should I be deprived of both of you in one day?'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Rebekah said to Isaac, I am weary of my life because of the daughters of Heth [these wives of Esau]! If Jacob takes a wife of the daughters of Heth such as these Hittite girls around here, what good will my life be to me?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Rebekah heard what Isaac said to Esau his son; and when Esau had gone to the open country to hunt for game that he might bring it,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rebekah said to Jacob her younger son, See here, I heard your father say to Esau your brother,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bring me game and make me appetizing meat, so that I may eat and declare my blessing upon you before the Lord before my death.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now, my son, do exactly as I command you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go now to the flock, and from it bring me two good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suitable kids; and I will make them into appetizing meat for your father, such as he loves.'
