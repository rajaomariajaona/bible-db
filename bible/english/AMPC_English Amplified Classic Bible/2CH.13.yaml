document_id: 2CH.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE eighteenth year of King Jeroboam, Abijah began to reign over Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He reigned three years in Jerusalem. His mother was Micaiah daughter of Uriel of Gibeah. And there was war between Abijah and Jeroboam of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Abijah prepared for battle with an army of valiant men of war, 400,000 chosen men. Jeroboam set the battle in array against him with 800,000 chosen men, mighty men of valor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Abijah stood on Mount Zemaraim, in the hill country of Ephraim, and said, Hear me, O Jeroboam and all Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Ought you not to know that the Lord, the God of Israel, gave the kingship over Israel to David forever, even to him and to his sons by a covenant of salt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Yet Jeroboam son of Nebat, a servant of Solomon son of David, rose up and rebelled against his lord [the king].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And there gathered to him worthless men, base fellows, who strengthened themselves against Rehoboam son of Solomon when Rehoboam was young [as king], irresolute, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inexperienced and did not withstand them with firmness and strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And now you think to withstand the kingdom of the Lord which is in the hands of the sons of David, because you are a great multitude and you have with you the golden calves which Jeroboam made for you for gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Have you not driven out the priests of the Lord, the sons of Aaron, and the Levites, and made priests for yourselves like the peoples of other lands? So whoever comes to consecrate himself with a young bull and seven rams may be a priest of idols that are not gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But as for us, the Lord is our God, and we have not forsaken Him. We have priests ministering to the Lord who are sons of Aaron, and Levites for their service.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They offer to the Lord every morning and every evening burnt sacrifices and incense of sweet spices; they set in order the showbread on the table of pure gold and attend to the golden lampstand, that its lamps may be lighted every evening. For we keep the charge of the Lord our God, but you have forsaken Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Behold, God Himself is with us at our head, and His priests with their battle trumpets to sound an alarm against you. O Israelites, fight not against the Lord, the God of your fathers, for you cannot prosper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But Jeroboam caused an ambushment to come around them from behind, so his troops were before Judah and the ambush behind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When Judah looked, behold, the battle was before and behind; and they cried to the Lord, and the priests blew the trumpets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the men of Judah gave a shout; and as they shouted, God smote Jeroboam and all Israel before Abijah and Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Israelites fled before Judah, and God delivered them into their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Abijah and his people slew them with a great slaughter, so there fell of Israel 500,000 chosen men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Thus the Israelites were brought low at that time, and the people of Judah prevailed because they relied upon the Lord, the God of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Abijah pursued Jeroboam and took some cities from him, Bethel, Jeshanah, and Ephraim (Ephron), with their towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Jeroboam did not recover strength again in the days of Abijah. And the Lord smote him and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But Abijah became mighty. He married fourteen wives and had twenty-two sons and sixteen daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the rest of the acts of Abijah, his ways and his sayings, are written in the story of the prophet Iddo.'
