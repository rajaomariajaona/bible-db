document_id: JDG.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN SANG Deborah and Barak son of Abinoam on that day, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Tell of it–you who ride on white donkeys, you who sit on rich carpets, and you who walk by the way.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Far from the noise of archers in the places of drawing water, there shall they rehearse the righteous acts of the Lord, even the righteous acts toward His villagers in Israel. Then the people of the Lord went down to the gates.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Awake, awake, Deborah! Awake, awake, utter a song! Arise, Barak, and lead away your captives, you son of Abinoam.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then down marched the remnant of the nobles, the people of the Lord marched down for Me against the mighty.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Out of Ephraim they came down whose root is in Amalek, after you, Benjamin, with your kinsmen. Out of Machir came down commanders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lawgivers, and out of Zebulun those who handle the pen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' stylus of the writer.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the princes of Issachar came with Deborah, and Issachar was faithful to Barak; into the valley they rushed forth at his heels. [But] among the clans of Reuben were great searchings of heart.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Why [Reuben] did you linger among the sheepfolds listening to the piping for the flocks? Among the clans of Reuben there were great searchings of heart.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Gilead remained beyond the Jordan, and why did Dan stay with the ships? Asher sat still on the seacoast and remained by his creeks. [These came not forth to battle for God''s people.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But Zebulun was a people who endangered their lives to the death; Naphtali did also on the heights of the field.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The kings came and fought, then fought the kings of Canaan at Taanach by the waters of Megiddo. Gain of booty they did not obtain.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For the leaders who took the lead in Israel, for the people who offered themselves willingly, bless the Lord!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' From the heavens the stars fought, from their courses they fought against Sisera.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The torrent Kishon swept [the foe] away, the onrushing torrent, the torrent Kishon. O my soul, march on with strength!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Then the horses'' hoofs beat loudly because of the galloping of [fleeing] valiant riders.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Curse Meroz, said the messenger of the Lord. Curse bitterly its inhabitants, because they came not to the help of the Lord, to the help of the Lord against the mighty!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Blessed above women shall Jael, the wife of Heber the Kenite, be; blessed shall she be above women in the tent.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' [Sisera] asked for water, and she gave [him] milk; she brought him curds in a lordly dish.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' She put her [left] hand to the tent pin, and her right hand to the workmen''s hammer. And with the wooden hammer she smote Sisera, she smote his head, yes, she struck and pierced his temple.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' He sank, he fell, he lay still at her feet. At her feet he sank, he fell; where he sank, there he fell–dead!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The mother of Sisera looked out at a window and wailed through the lattice, Why is his chariot so long in coming? Why do the hoofbeats of his chariots tarry?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Her wise ladies answered her, yet she repeated her words to herself,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Hear, O kings; give ear, O princes; I will sing to the Lord. I will sing praise to the Lord, the God of Israel.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Have they not found and been dividing the spoil? A maiden or two for every man, a spoil of dyed garments for Sisera, a spoil of dyed stuffs embroidered, two pieces of dyed work embroidered for my neck as spoil?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' So let all Your enemies perish, O Lord! But let those who love Him be like the sun when it rises in its might. And the land had peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest for forty years.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Lord, when You went forth out of Seir, when You marched out of the field of Edom, the earth trembled and the heavens also dropped, yes, the clouds dropped water.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The mountains quaked at the presence of the Lord, yes, yonder Sinai at the presence of the Lord, the God of Israel.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' After the days of Shamgar son of Anath, after the days of Jael [meaning here Ehud] the caravans ceased, travelers walked through byways.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The villages were unoccupied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rulers ceased in Israel until you arose–you, Deborah, arose–a mother in Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' [Formerly] they chose new gods; then war was in the gates. Was there a shield or spear seen among 40,000 in Israel?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' My heart goes out to the commanders of Israel who offered themselves willingly among the people. Bless the Lord!'
