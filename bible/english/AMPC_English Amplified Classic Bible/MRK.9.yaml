document_id: MRK.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND JESUS said to them, Truly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' solemnly I say to you, there are some standing here who will in no way taste death before they see the kingdom of God come in [its] power.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' So they carefully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfully kept the matter to themselves, questioning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disputing with one another about what rising from among the dead meant.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And they asked Him, Why do the scribes say that it is necessary for Elijah to come first? [Mal. 4:5, 6.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And He said to them, Elijah, it is true, does come first to restore all things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set them to rights. And how is it written of the Son of Man that He will suffer many things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be utterly despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be treated with contempt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected? [Isa. 53:3.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But I tell you that Elijah has already come, and [people] did to him whatever they desired, as it is written of him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And when they came to the [nine] disciples, they saw a great crowd around them and scribes questioning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disputing with them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And immediately all the crowd, when they saw Jesus [returning from the holy mount, His face and person yet glistening], they were greatly amazed and ran up to Him [and] greeted Him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And He asked them, About what are you questioning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discussing with them?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And one of the throng replied to Him, Teacher, I brought my son to You, for he has a dumb spirit.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And wherever it lays hold of him [so as to make him its own], it dashes him down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convulses him, and he foams [at the mouth] and grinds his teeth, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he [falls into a motionless stupor and] is wasting away. And I asked Your disciples to drive it out, and they were not able [to do it].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And He answered them, O unbelieving generation [without any faith]! How long shall I [have to do] with you? How long am I to bear with you? Bring him to Me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Six days after this, Jesus took with Him Peter and James and John and led them up on a high mountain apart by themselves. And He was transfigured before them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' became resplendent with divine brightness.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So they brought [the boy] to Him, and when the spirit saw Him, at once it completely convulsed the boy, and he fell to the ground and kept rolling about, foaming [at the mouth].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And [Jesus] asked his father, How long has he had this? And he answered, From the time he was a little boy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And it has often thrown him both into fire and into water, intending to kill him. But if You can do anything, do have pity on us and help us.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And Jesus said, [You say to Me], If You can do anything? [Why,] all things can be (are possible) to him who believes!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' At once the father of the boy gave [an eager, piercing, inarticulate] cry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with tears,
    - type: text
      text: ' and he said, Lord, I believe! [Constantly] help my weakness of faith!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But when Jesus noticed that a crowd [of people] came running together, He rebuked the unclean spirit, saying to it, You dumb and deaf spirit, I charge you to come out of him and never go into him again.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And after giving a [hoarse, clamoring, fear-stricken] shriek of anguish and convulsing him terribly, it came out; and the boy lay [pale and motionless] like a corpse, so that many of them said, He is dead.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' But Jesus took [a strong grip of] his hand and began lifting him up, and he stood.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And when He had gone indoors, His disciples asked Him privately, Why could not we drive it out?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And He replied to them, This kind cannot be driven out by anything but prayer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and fasting.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And His garments became glistening, intensely white, as no fuller (cloth dresser, launderer) on earth could bleach them.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' They went on from there and passed along through Galilee. And He did not wish to have anyone know it,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For He was [engaged for the time being in] teaching His disciples. He said to them, The Son of Man is being delivered into the hands of men, and they will put Him to death; and when He has been killed, after three days He will rise [from death].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' But they did not comprehend what He was saying, and they were afraid to ask Him [what this statement meant].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And they arrived at Capernaum; and when [they were] in the house, He asked them, What were you discussing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arguing about on the road?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' But they kept still, for on the road they had discussed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disputed with one another as to who was the greatest.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And He sat down and called the Twelve [apostles], and He said to them, If anyone desires to be first, he must be last of all, and servant of all.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And He took a little child and put him in the center of their group; and taking him in [His] arms, He said to them,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Whoever in My name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for My sake accepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomes one such child also accepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomes Me; and whoever so receives Me receives not only Me but Him Who sent Me.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' John said to Him, Teacher, we saw a man who does not follow along with us driving out demons in Your name, and we forbade him to do it, because he is not one of our band [of Your disciples].'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' But Jesus said, Do not restrain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hinder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' forbid him; for no one who does a mighty work in My name will soon afterward be able to speak evil of Me.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And Elijah appeared [there] to them, accompanied by Moses, and they were holding [a protracted] conversation with Jesus.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' For he who is not against us is for us. [Num. 11:27-29.]'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' For I tell you truly, whoever gives you a cup of water to drink because you belong to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear the name of Christ will by no means fail to get his reward.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' And whoever causes one of these little ones (these believers) who acknowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleave to Me to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin, it would be better (more profitable and wholesome) for him if a [huge] millstone were hung about his neck, and he were thrown into the sea.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' And if your hand puts a stumbling block before you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' causes you to sin, cut it off! It is more profitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholesome for you to go into life [that is really worthwhile] maimed than with two hands to go to hell (Gehenna), into the fire that cannot be put out.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And if your foot is a cause of stumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin to you, cut it off! It is more profitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholesome for you to enter into life [that is really worthwhile] crippled than, having two feet, to be cast into hell (Gehenna).'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' And if your eye causes you to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin, pluck it out! It is more profitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholesome for you to enter the kingdom of God with one eye than with two eyes to be thrown into hell (Gehenna),'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' Where their worm [which preys on the inhabitants and is a symbol of the wounds inflicted on the man himself by his sins] does not die, and the fire is not put out. [Isa. 66:24.]'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' For everyone shall be salted with fire.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And Peter took up the conversation, saying, Master, it is good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beautiful for us to be here. Let us make three booths (tents)–one for You and one for Moses and one for Elijah.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' Salt is good (beneficial), but if salt has lost its saltness, how will you restore [the saltness to] it? Have salt within yourselves, and be at peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live in harmony with one another.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For he did not [really] know what to say, for they were in a violent fright (aghast with dread).'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And a cloud threw a shadow upon them, and a voice came out of the cloud, saying, This is My Son, the [most dearworthy] Beloved One. Be constantly listening to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obeying Him!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And looking around, they suddenly no longer saw anyone with them except Jesus only.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And as they were coming back down the mountain, He admonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expressly ordered them to tell no one what they had seen until the Son of Man should rise from among the dead.'
