document_id: DEU.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND MOSES called all Israel, and said to them, Hear, O Israel, the statutes and ordinances which I speak in your hearing this day, that you may learn them and take heed and do them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord our God made a covenant with us in Horeb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord made this covenant not with our fathers, but with us, who are all of us here alive this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The Lord spoke with you face to face at the mount out of the midst of the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I stood between the Lord and you at that time to show you the word of the Lord, for you were afraid because of the fire and went not up into the mount. He said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I am the Lord your God, Who brought you out of the land of Egypt, from the house of bondage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You shall have no other gods before Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' besides Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You shall not make for yourself [to worship] a graven image or any likeness of anything that is in the heavens above or that is in the earth beneath or that is in the water under the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You shall not bow down to them or serve them; for I, the Lord your God, am a jealous God, visiting the iniquity of the fathers upon the children to the third and fourth generations of those who hate Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And showing mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love to thousands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to a thousand generations of those who love Me and keep My commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You shall not take the name of the Lord your God in vain, for the Lord will not hold him guiltless who takes His name in falsehood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' without purpose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Observe the Sabbath day to keep it holy, as the Lord your God commanded you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Six days you shall labor and do all your work,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But the seventh day is a Sabbath to the Lord your God; in it you shall not do any work, you or your son or your daughter, or your manservant or your maidservant, or your ox or your donkey or any of your livestock, or the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sojourner who is within your gates, that your manservant and your maidservant may rest as well as you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And [earnestly] remember that you were a servant in the land of Egypt and that the Lord your God brought you out from there with a mighty hand and an outstretched arm; therefore the Lord your God commanded you to observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take heed to the Sabbath day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Honor your father and your mother, as the Lord your God commanded you, that your days may be prolonged and that it may go well with you in the land which the Lord your God gives you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall not murder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Neither shall you commit adultery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Neither shall you act slyly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' steal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Neither shall you witness falsely against your neighbor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Neither shall you covet your neighbor''s wife, nor desire your neighbor''s house, his field, his manservant or his maidservant, his ox or his donkey, or anything that is your neighbor''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' These words the Lord spoke to all your assembly at the mountain out of the midst of the fire, the cloud, and the thick darkness, with a loud voice; and He spoke not again [added no more]. He wrote them on two tables of stone and gave them to me [Moses].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when you heard the voice out of the midst of the darkness, while the mountain was burning with fire, you came near me, all the heads of your tribes and your elders;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And you said, Behold, the Lord our God has shown us His glory and His greatness, and we have heard His voice out of the midst of the fire; we have this day seen that God speaks with man and man still lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now therefore, why should we die? For this great fire will consume us; if we hear the voice of the Lord our God any longer, we shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For who is there of all flesh who has heard the voice of the living God speaking out of the midst of fire, as we have, and lived?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Go near [Moses] and hear all that the Lord our God will say. And speak to us all that the Lord our God will speak to you; and we will hear and do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the Lord heard your words when you spoke to me and the Lord said to me, I have heard the words of this people which they have spoken to you. They have said well all that they have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Oh, that they had such a [mind and] heart in them always [reverently] to fear Me and keep all My commandments, that it might go well with them and with their children forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Go and say to them, Return to your tents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But you [Moses], stand here by Me, and I will tell you all the commandments and the statutes and the precepts which you shall teach them, that they may do them in the land which I give them to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Therefore you people shall be watchful to do as the Lord your God has commanded you; you shall not turn aside to the right hand or to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' You shall walk in all the ways which the Lord your God has commanded you, that you may live and that it may go well with you and that you may live long in the land which you shall possess.'
