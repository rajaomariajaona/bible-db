document_id: PSA.84,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; set to a Philistine lute, or +[possibly+] a particular Gittite tune. A Psalm of the sons of Korah.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HOW LOVELY are Your tabernacles, O Lord of hosts!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For a day in Your courts is better than a thousand [anywhere else]; I would rather be a doorkeeper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stand at the threshold in the house of my God than to dwell [at ease] in the tents of wickedness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For the Lord God is a Sun and Shield; the Lord bestows [present] grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor and [future] glory (honor, splendor, and heavenly bliss)! No good thing will He withhold from those who walk uprightly.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' O Lord of hosts, blessed (happy, fortunate, to be envied) is the man who trusts in You [leaning and believing on You, committing all and confidently looking to You, and that without fear or misgiving]!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' My soul yearns, yes, even pines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is homesick for the courts of the Lord; my heart and my flesh cry out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sing for joy to the living God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Yes, the sparrow has found a house, and the swallow a nest for herself, where she may lay her young–even Your altars, O Lord of hosts, my King and my God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) are those who dwell in Your house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your presence; they will be singing Your praises all the day long. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man whose strength is in You, in whose heart are the highways to Zion.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Passing through the Valley of Weeping (Baca), they make it a place of springs; the early rain also fills [the pools] with blessings.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' They go from strength to strength [increasing in victorious power]; each of them appears before God in Zion.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' O Lord God of hosts, hear my prayer; give ear, O God of Jacob! Selah [pause, and calmly think of that]!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Behold our shield [the king as Your agent], O God, and look upon the face of Your anointed!'
