document_id: PSA.84,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; set to a Philistine lute, or +[possibly+] a particular Gittite tune. A Psalm of the sons of Korah.
  - type: text
    content: ' HOW LOVELY are Your tabernacles, O Lord of hosts!'
  '10':
  - type: text
    content: ' For a day in Your courts is better than a thousand [anywhere else]; I would rather be a doorkeeper '
  - type: text
    content: and
  - type: text
    content: ' stand at the threshold in the house of my God than to dwell [at ease] in the tents of wickedness.'
  '11':
  - type: text
    content: ' For the Lord God is a Sun and Shield; the Lord bestows [present] grace '
  - type: text
    content: and
  - type: text
    content: ' favor and [future] glory (honor, splendor, and heavenly bliss)! No good thing will He withhold from those who walk uprightly.'
  '12':
  - type: text
    content: ' O Lord of hosts, blessed (happy, fortunate, to be envied) is the man who trusts in You [leaning and believing on You, committing all and confidently looking to You, and that without fear or misgiving]!'
  '2':
  - type: text
    content: ' My soul yearns, yes, even pines '
  - type: text
    content: and
  - type: text
    content: ' is homesick for the courts of the Lord; my heart and my flesh cry out '
  - type: text
    content: and
  - type: text
    content: ' sing for joy to the living God.'
  '3':
  - type: text
    content: ' Yes, the sparrow has found a house, and the swallow a nest for herself, where she may lay her young–even Your altars, O Lord of hosts, my King and my God.'
  '4':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) are those who dwell in Your house '
  - type: text
    content: and
  - type: text
    content: ' Your presence; they will be singing Your praises all the day long. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) is the man whose strength is in You, in whose heart are the highways to Zion.'
  '6':
  - type: text
    content: ' Passing through the Valley of Weeping (Baca), they make it a place of springs; the early rain also fills [the pools] with blessings.'
  '7':
  - type: text
    content: ' They go from strength to strength [increasing in victorious power]; each of them appears before God in Zion.'
  '8':
  - type: text
    content: ' O Lord God of hosts, hear my prayer; give ear, O God of Jacob! Selah [pause, and calmly think of that]!'
  '9':
  - type: text
    content: ' Behold our shield [the king as Your agent], O God, and look upon the face of Your anointed!'
