document_id: JDG.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THOSE days there was no king in Israel. And in those days the tribe of the Danites sought for itself an inheritance to dwell in, for until then no [sufficient] inheritance had been acquired by them among the tribes of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So the Danites sent from the whole number of their tribe five brave men from Zorah and Eshtaol to spy out the land and to explore it, and they said to them, Go, explore the land. They came to the hill country of Ephraim, to the house of Micah, and lodged there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When they went by the house of Micah, they recognized the voice of the young Levite, and they turned aside there and said to him, Who brought you here? And what do you do in this place? And what have you here?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he said to them, Thus and thus Micah deals with me and has hired me, and I am his priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they said to him, Ask counsel, we pray you, of God that we may know whether our journey will be successful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the priest said to them, Go in peace. The way in which you go is before (under the eye of) the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the five men departed and came to Laish and saw the people who were there, how they dwelt securely after the manner of the Sidonians, quiet and feeling safe; and there was no magistrate in the land, who might put them to shame in anything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' injure them; and they were far from the Sidonians and had no dealings with anyone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The five men came back to their brethren at Zorah and Eshtaol, and their brethren said to them, What do you say?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They said, Arise, let us go up against them, for we have seen the land, and behold, it is very fertile. And will you do nothing? Do not be slow to go and enter in and possess the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When you go, you will come to people [feeling] safe and secure. The land is broad [widely extended on all sides]; and God has given it into your hands–a place where there is no want of anything that is in the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And there went from there of the tribe of the Danites, out of Zorah and Eshtaol, 600 men armed with weapons of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they went up and encamped at Kiriath-jearim in Judah. Therefore they called that place Mahaneh-dan [camp of Dan] to this day; it is west of Kiriath-jearim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they passed from there to the hill country of Ephraim and came to Micah''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the five men who had gone to spy out the country of Laish said to their brethren, Do you know that there are in these houses an ephod, teraphim, a graven image, and a molten image? Now therefore, consider what you have to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they turned in that direction and came to the house of the young Levite, at the home of Micah, and saluted him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now the 600 Danites with their weapons of war stood at Micah''s gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the five men who had gone to spy out the land went up and entered the house and took the graven image, the ephod, the teraphim, and the molten image, while the priest stood by the entrance of the gate with the 600 men armed with weapons of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when these went into Micah''s house and took the carved image, the ephod, the teraphim, and the molten image, the priest said to them, What are you doing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they said to him, Be still, put your hand over your mouth, and come with us, and be to us a father and a priest. Is it better for you to be a priest to the house of one man, or that you be a priest to a tribe and family in Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the priest''s heart was glad, and he took the ephod, the teraphim, and the graven image, and went in the midst of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So they turned and departed and put the little ones, the cattle, and the baggage in front of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When they were a good way from the house of Micah, the men who were Micah''s near neighbors were called out and overtook the Danites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' They shouted to the Danites, who turned and said to Micah, What ails you, that you come with such a company?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he said, You take away my gods which I made and the priest, and go away; and what have I left? How can you say to me, What ails you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the men of Dan said to him, Let not your voice be heard among us, lest angry fellows fall upon you and you lose your life with the lives of your household.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the Danites went their way; and when Micah saw that they were too strong for him, he turned and went back to his house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they took the things which Micah had made, and his priest, and came to Laish, to a people quiet and feeling secure, and they smote them with the sword and burned the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And there was no deliverer because it was far from Sidon, and they had no business with anyone. It was in the valley which belongs to Beth-rehob. And they rebuilt the city and dwelt in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' They named the city Dan, after Dan their forefather who was born to Israel; however, the name of the city was Laish at first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the Danites set up the graven image for themselves; and Jonathan son of Gershom, the son of Moses, and his sons were priests to the tribe of Dan until the day of the captivity of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So they set them up Micah''s graven image which he made, as long as the house of God was at Shiloh.'
