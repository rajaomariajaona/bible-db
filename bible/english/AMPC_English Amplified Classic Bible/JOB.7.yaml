document_id: JOB.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IS THERE not an [appointed] warfare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard labor to man upon earth? And are not his days like the days of a hireling?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As a servant earnestly longs for the shade '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the evening shadows, and as a hireling who looks for the reward of his work,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So am I allotted months of futile [suffering], and [long] nights of misery are appointed to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When I lie down I say, When shall I arise and the night be gone? And I am full of tossing to and fro till the dawning of the day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' My flesh is clothed with worms and clods of dust; my skin is broken and has become loathsome, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' it closes up and breaks out afresh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' My days are swifter than a weaver''s shuttle, and are spent without hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Oh, remember that my life is but wind (a puff, a breath, a sob); my eye shall see good no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The eye of him who sees me shall see me no more; while your eyes are upon me, I shall be gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' As the cloud is consumed and vanishes away, so he who goes down to Sheol (the place of the dead) shall come up no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He shall return no more to his house, neither shall his place know him any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore I will not restrain my mouth; I will speak in the anguish of my spirit, I will complain in the bitterness of my soul [O Lord]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Am I the sea, or the sea monster, that You set a watch over me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When I say, My bed shall comfort me, my couch shall ease my complaint,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then You scare me with dreams and terrify me through visions,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So that I would choose strangling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' death rather than these my bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I loathe my life; I would not live forever. Let me alone, for my days are a breath (futility).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' What is man that You should magnify him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' think him important? And that You should set Your mind upon him? [Ps. 8:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And that You should visit him every morning and try him every moment?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' How long will Your [plaguing] glance not look away from me, nor You let me alone till I swallow my spittle?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' If I have sinned, what [harm] have I done You, O You Watcher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Keeper of men? Why have You set me as a mark for You, so that I am a burden to myself [and You]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And why do You not pardon my transgression and take away my iniquity? For now shall I lie down in the dust; and [even if] You will seek me diligently, [it will be too late, for] I shall not be.'
