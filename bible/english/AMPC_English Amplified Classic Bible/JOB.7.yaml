document_id: JOB.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IS THERE not an [appointed] warfare '
  - type: text
    content: and
  - type: text
    content: ' hard labor to man upon earth? And are not his days like the days of a hireling?'
  '10':
  - type: text
    content: ' He shall return no more to his house, neither shall his place know him any more.'
  '11':
  - type: text
    content: ' Therefore I will not restrain my mouth; I will speak in the anguish of my spirit, I will complain in the bitterness of my soul [O Lord]!'
  '12':
  - type: text
    content: ' Am I the sea, or the sea monster, that You set a watch over me?'
  '13':
  - type: text
    content: ' When I say, My bed shall comfort me, my couch shall ease my complaint,'
  '14':
  - type: text
    content: ' Then You scare me with dreams and terrify me through visions,'
  '15':
  - type: text
    content: ' So that I would choose strangling '
  - type: text
    content: and
  - type: text
    content: ' death rather than these my bones.'
  '16':
  - type: text
    content: ' I loathe my life; I would not live forever. Let me alone, for my days are a breath (futility).'
  '17':
  - type: text
    content: ' What is man that You should magnify him '
  - type: text
    content: and
  - type: text
    content: ' think him important? And that You should set Your mind upon him? [Ps. 8:4.]'
  '18':
  - type: text
    content: ' And that You should visit him every morning and try him every moment?'
  '19':
  - type: text
    content: ' How long will Your [plaguing] glance not look away from me, nor You let me alone till I swallow my spittle?'
  '2':
  - type: text
    content: ' As a servant earnestly longs for the shade '
  - type: text
    content: and
  - type: text
    content: ' the evening shadows, and as a hireling who looks for the reward of his work,'
  '20':
  - type: text
    content: ' If I have sinned, what [harm] have I done You, O You Watcher '
  - type: text
    content: and
  - type: text
    content: ' Keeper of men? Why have You set me as a mark for You, so that I am a burden to myself [and You]?'
  '21':
  - type: text
    content: ' And why do You not pardon my transgression and take away my iniquity? For now shall I lie down in the dust; and [even if] You will seek me diligently, [it will be too late, for] I shall not be.'
  '3':
  - type: text
    content: ' So am I allotted months of futile [suffering], and [long] nights of misery are appointed to me.'
  '4':
  - type: text
    content: ' When I lie down I say, When shall I arise and the night be gone? And I am full of tossing to and fro till the dawning of the day.'
  '5':
  - type: text
    content: ' My flesh is clothed with worms and clods of dust; my skin is broken and has become loathsome, '
  - type: text
    content: and
  - type: text
    content: ' it closes up and breaks out afresh.'
  '6':
  - type: text
    content: ' My days are swifter than a weaver''s shuttle, and are spent without hope.'
  '7':
  - type: text
    content: ' Oh, remember that my life is but wind (a puff, a breath, a sob); my eye shall see good no more.'
  '8':
  - type: text
    content: ' The eye of him who sees me shall see me no more; while your eyes are upon me, I shall be gone.'
  '9':
  - type: text
    content: ' As the cloud is consumed and vanishes away, so he who goes down to Sheol (the place of the dead) shall come up no more.'
