document_id: PSA.147
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! For it is good to sing praises to our God, for He is gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovely; praise is becoming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord is building up Jerusalem; He is gathering together the exiles of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He heals the brokenhearted and binds up their wounds [curing their pains and their sorrows]. [Ps. 34:18; Isa. 57:15; 61:1; Luke 4:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He determines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counts the number of the stars; He calls them all by their names.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Great is our Lord and of great power; His understanding is inexhaustible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boundless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The Lord lifts up the humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' downtrodden; He casts the wicked down to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Sing to the Lord with thanksgiving; sing praises with the harp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the lyre to our God!–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who covers the heavens with clouds, Who prepares rain for the earth, Who makes grass to grow on the mountains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He gives to the beast his food, and to the young ravens that for which they cry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He delights not in the strength of the horse, nor does He take pleasure in the legs of a man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord takes pleasure in those who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear Him, in those who hope in His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness. [Ps. 145:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Praise the Lord, O Jerusalem! Praise your God, O Zion!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For He has strengthened and made hard the bars of your gates, and He has blessed your children within you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He makes peace in your borders; He fills you with the finest of the wheat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He sends forth His commandment to the earth; His word runs very swiftly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He gives [to the earth] snow like [a blanket of] wool; He scatters the hoarfrost like ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He casts forth His ice like crumbs; who can stand before His cold?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He sends out His word, and melts [ice and snow]; He causes His wind to blow, and the waters flow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He declares His word to Jacob, His statutes and His ordinances to Israel. [Mal. 4:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He has not dealt so with any [other] nation; they have not known (understood, appreciated, given heed to, and cherished) His ordinances. Praise the Lord! (Hallelujah!) [Ps. 79:6; Jer. 10:25.]'
