document_id: JOS.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JOSHUA SON of Nun sent two men secretly from Shittim as scouts, saying, Go, view the land, especially Jericho. And they went and came to the house of a harlot named Rahab and lodged there.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For we have heard how the Lord dried up the water of the Red Sea for you when you came out of Egypt, and what you did to the two kings of the Amorites who were on the [east] side of the Jordan, Sihon and Og, whom you utterly destroyed.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' When we heard it, our hearts melted, neither did spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' courage remain any more in any man because of you, for the Lord your God, He is God in heaven above and on earth beneath. [Heb. 11:31.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Now then, I pray you, swear to me by the Lord, since I have shown you kindness, that you also will show kindness to my father''s house, and give me a sure sign,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And save alive my father and mother, my brothers and sisters, and all they have, and deliver us from death.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the men said to her, Our lives for yours! If you do not tell this business of ours, then when the Lord gives us the land we will deal kindly and faithfully with you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then she let them down by a rope through the window, for her house was built into the [town] wall so that she dwelt in the wall.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And she said to them, Get to the mountain, lest the pursuers meet you; hide yourselves there three days until the pursuers have returned; and afterward you may go your way.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The men said to her, We will be blameless of this oath you have made us swear. [The responsibility is now yours.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Behold, when we come into the land, you shall bind this scarlet cord in the window through which you let us down, and you shall bring your father and mother, your brothers, and all your father''s household into your house.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And if anyone goes out of the doors of your house into the street, his blood shall be upon his head, and we will be guiltless; but if a hand is laid upon anyone who is with you in the house, his blood shall be on our head.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' It was told the king of Jericho, Behold, there came men in here tonight of the Israelites to search out the country.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But if you tell this business of ours, we shall be guiltless of your oath which you made us swear.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And she said, According to your words, so it is. Then she sent them away and they departed; and she bound the scarlet cord in the window.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' They left and went to the mountain and stayed there three days, until the pursuers returned, who had searched all along the way without finding them.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So the two men descended from the mountain, passed over [the Jordan], and came to Joshua son of Nun, and told him all that had befallen them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' They said to Joshua, Truly the Lord has given all the land into our hands; for all the inhabitants of the country are faint because of us.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the king of Jericho sent to Rahab, saying, Bring forth the men who have come to you, who entered your house, for they have come to search out the land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But the woman had taken the two men and hidden them. So she said, Yes, two men came to me, but I did not know from where they had come.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And at gate closing time, after dark, the men went out. Where they went I do not know. Pursue them quickly, for you will overtake them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But she had brought them up to the roof and hidden them under the stalks of flax which she had laid in order there.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So the men pursued them to the Jordan as far as the fords. As soon as the pursuers had gone, the city''s gate was shut.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Before the two men had lain down, Rahab came up to them on the roof,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And she said to the men, I know that the Lord has given you the land and that your terror is fallen upon us and that all the inhabitants of the land faint because of you.'
