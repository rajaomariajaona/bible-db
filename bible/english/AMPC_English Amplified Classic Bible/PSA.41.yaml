document_id: PSA.41,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' BLESSED (HAPPY, fortunate, to be envied) is he who considers the weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the poor; the Lord will deliver him in the time of evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trouble.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But You, O Lord, be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me, and raise me up, that I may requite them.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By this I know that You favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in me, because my enemy does not triumph over me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as for me, You have upheld me in my integrity and set me in Your presence forever.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed be the Lord, the God of Israel, from everlasting and to everlasting [from this age to the next, and forever]! Amen and Amen (so be it).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord will protect him and keep him alive; he shall be called blessed in the land; and You will not deliver him to the will of his enemies.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord will sustain, refresh, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen him on his bed of languishing; all his bed You [O Lord] will turn, change, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' transform in his illness.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I said, Lord, be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me; heal my inner self, for I have sinned against You.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My enemies speak evil of me, [saying], When will he die and his name perish?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when one comes to see me, he speaks falsehood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empty words, while his heart gathers mischievous gossip [against me]; when he goes away, he tells it abroad.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All who hate me whisper together about me; against me do they devise my hurt [imagining the worst for me].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' An evil disease, say they, is poured out upon him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleaves fast to him; and now that he is bedfast, he will not rise up again.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even my own familiar friend, in whom I trusted (relied on and was confident), who ate of my bread, has lifted up his heel against me. [John 13:18.]'
