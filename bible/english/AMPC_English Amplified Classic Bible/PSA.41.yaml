document_id: PSA.41,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' BLESSED (HAPPY, fortunate, to be envied) is he who considers the weak '
  - type: text
    content: and
  - type: text
    content: ' the poor; the Lord will deliver him in the time of evil '
  - type: text
    content: and
  - type: text
    content: ' trouble.'
  '10':
  - type: text
    content: ' But You, O Lord, be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me, and raise me up, that I may requite them.'
  '11':
  - type: text
    content: ' By this I know that You favor '
  - type: text
    content: and
  - type: text
    content: ' delight in me, because my enemy does not triumph over me.'
  '12':
  - type: text
    content: ' And as for me, You have upheld me in my integrity and set me in Your presence forever.'
  '13':
  - type: text
    content: ' Blessed be the Lord, the God of Israel, from everlasting and to everlasting [from this age to the next, and forever]! Amen and Amen (so be it).'
  '2':
  - type: text
    content: ' The Lord will protect him and keep him alive; he shall be called blessed in the land; and You will not deliver him to the will of his enemies.'
  '3':
  - type: text
    content: ' The Lord will sustain, refresh, '
  - type: text
    content: and
  - type: text
    content: ' strengthen him on his bed of languishing; all his bed You [O Lord] will turn, change, '
  - type: text
    content: and
  - type: text
    content: ' transform in his illness.'
  '4':
  - type: text
    content: ' I said, Lord, be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me; heal my inner self, for I have sinned against You.'
  '5':
  - type: text
    content: ' My enemies speak evil of me, [saying], When will he die and his name perish?'
  '6':
  - type: text
    content: ' And when one comes to see me, he speaks falsehood '
  - type: text
    content: and
  - type: text
    content: ' empty words, while his heart gathers mischievous gossip [against me]; when he goes away, he tells it abroad.'
  '7':
  - type: text
    content: ' All who hate me whisper together about me; against me do they devise my hurt [imagining the worst for me].'
  '8':
  - type: text
    content: ' An evil disease, say they, is poured out upon him '
  - type: text
    content: and
  - type: text
    content: ' cleaves fast to him; and now that he is bedfast, he will not rise up again.'
  '9':
  - type: text
    content: ' Even my own familiar friend, in whom I trusted (relied on and was confident), who ate of my bread, has lifted up his heel against me. [John 13:18.]'
