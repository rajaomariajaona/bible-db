document_id: JOS.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW JOSHUA was old and gone far in years [over 100], and the Lord said to him, You have grown old and are gone far in years, and very much of the land still remains to be possessed.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the cities of Sihon king of the Amorites, who ruled in Heshbon, as far as the boundary of the Ammonites;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Gilead, and the region of the Geshurites and Maacathites, and all Mount Hermon, and all Bashan to Salecah–'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the kingdom of Og in Bashan, who reigned in Ashtaroth and Edrei and alone was left of the Rephaim [giants]; for these Moses had defeated and driven out.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet the Israelites did not drive out the Geshurites or the Maacathites, but Geshur and Maacath dwell among [them] still.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Only to the tribe of Levi Moses gave no inheritance; the sacrifices made by fire to the Lord, the God of Israel, are their inheritance, as He said to him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses gave an inheritance to the tribe of the Reubenites according to their families:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their territory was from Aroer on the edge of the Valley of the [river] Arnon, and the city in the midst of the valley, and all the tableland by Medeba;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With Heshbon and all its cities which are on the plain; Dibon, Bamoth-baal, and Beth-baal-meon,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jahaz, Kedemoth, Mephaath,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Kiriathaim, Sibmah, and Zereth-shahar on the hill of the valley,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the land that remains: all the regions of the Philistines and all those of the Geshurites:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Beth-peor, Pisgah''s slopes, and Beth-jeshimoth,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the cities of the plain and all the kingdom of Sihon king of the Amorites, who ruled in Heshbon, whom Moses defeated along with the leaders of Midian, Evi, Rekem, Zur, Hur, and Reba, the princes of Sihon who lived in the land.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Balaam son of Beor, the soothsayer, the Israelites also killed with the sword among the rest of their slain. [Num. 31:16.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the border of the Reubenites was the Jordan. This was the inheritance of the Reubenites according to their families, with their cities and villages.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses gave an inheritance also to the tribe of the Gadites according to their families.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their territory was Jazer, and all the cities of Gilead, and half the land of the Ammonites as far as Aroer east of Rabbah;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And from Heshbon to Ramath-mizpeh and Betonim, and from Mahanaim to the territory of Debir;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in the valley, Beth-haram, Beth-nimrah, Succoth, and Zaphon, the rest of the realm of Sihon king of Heshbon, with the Jordan as a boundary, to the lower end of the Sea of Chinnereth east of the Jordan.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the Gadites according to their families, with their cities and villages.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses gave an inheritance to the half-tribe of Manasseh; it was allotted to them according to their families.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From the Shihor [River] which is east of Egypt, northward to the boundary of Ekron, all of it counted as Canaanite; there are five rulers of the Philistines, those of Gaza, Ashdod, Ashkelon, Gath, and Ekron, and those of the Avvites;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their region extended from Mahanaim through all Bashan, the entire kingdom of Og king of Bashan, and all the towns of Jair, which are in Bashan, sixty cities,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And half of Gilead, and Ashtaroth and Edrei, cities of the kingdom of Og in Bashan; these were allotted to the people of Machir son of Manasseh for half of the Machirites according to their families.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the inheritances which Moses distributed in the plains of Moab beyond the Jordan east of Jericho.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But to the tribe of Levi, Moses gave no inheritance; the Lord, the God of Israel, is their inheritance, as He told them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the south, all the land of the Canaanites, and Mearah, which belongs to the Sidonians, to Aphek, to the boundary of the Amorites,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the land of the Gebalites; and all Lebanon toward the east, from Baal-gad below Mount Hermon to the gate of Hamath.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for all the inhabitants of the hill country from Lebanon to Misrephoth-maim, even all the Sidonians, I will Myself drive them out from before the Israelites; only allot the land to Israel for an inheritance, as I have commanded you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now divide this land for an inheritance to the nine tribes and the half-tribe of Manasseh.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With the other half-tribe of Manasseh, the Reubenites and the Gadites received their inheritance beyond the Jordan eastward, as Moses the servant of the Lord gave them:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From Aroer on the edge of the Valley of the [river] Arnon, and the city in the midst of the valley, and all the tableland of Medeba as far as Dibon;'
