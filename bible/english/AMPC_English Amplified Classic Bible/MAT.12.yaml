document_id: MAT.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THAT particular time Jesus went through the fields of standing grain on the Sabbath; and His disciples were hungry, and they began to pick off the spikes of grain and to eat. [Deut. 23:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when the Pharisees saw it, they said to Him, See there! Your disciples are doing what is unlawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not permitted on the Sabbath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He said to them, Have you not even read what David did when he was hungry, and those who accompanied him–[Lev. 24:9; I Sam. 21:1-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' How he went into the house of God and ate the loaves of the showbread–which was not lawful for him to eat, nor for the men who accompanied him, but for the priests only?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Or have you never read in the Law that on the Sabbath the priests in the temple violate the sanctity of the Sabbath [breaking it] and yet are guiltless? [Num. 28:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But I tell you, Something greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more majestic than the temple is here!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And if you had only known what this saying means, I desire mercy [readiness to help, to spare, to forgive] rather than sacrifice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sacrificial victims, you would not have condemned the guiltless. [Hos. 6:6; Matt. 9:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For the Son of Man is Lord [even] of the Sabbath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And going on from there, He went into their synagogue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And behold, a man was there with one withered hand. And they said to Him, Is it lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' allowable to cure people on the Sabbath days?–that they might accuse Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But He said to them, What man is there among you, if he has only one sheep and it falls into a pit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ditch on the Sabbath, will not take hold of it and lift it out?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' How much better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of more value is a man than a sheep! So it is lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' allowable to do good on the Sabbath days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then He said to the man, Reach out your hand. And the man reached it out and it was restored, as sound as the other one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But the Pharisees went out and held a consultation against Him, how they might do away with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But being aware of this, Jesus went away from there. And many people joined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accompanied Him, and He cured all of them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And strictly charged them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharply warned them not to make Him publicly known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' This was in fulfillment of what was spoken by the prophet Isaiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold, My Servant Whom I have chosen, My Beloved in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with Whom My soul is well pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has found its delight. I will put My Spirit upon Him, and He shall proclaim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show forth justice to the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He will not strive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wrangle or cry out loudly; nor will anyone hear His voice in the streets;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' A bruised reed He will not break, and a smoldering (dimly burning) wick He will not quench, till He brings justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a just cause to victory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on His name will the Gentiles (the peoples outside of Israel) set their hopes. [Isa. 42:1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then a blind and dumb man under the power of a demon was brought to Jesus, and He cured him, so that the blind and dumb man both spoke and saw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And all the [crowds of] people were stunned with bewildered wonder and said, This cannot be the Son of David, can it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the Pharisees, hearing it, said, This Man drives out demons only by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with the help of Beelzebub, the prince of demons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And knowing their thoughts, He said to them, Any kingdom that is divided against itself is being brought to desolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid waste, and no city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' house divided against itself will last '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' continue to stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And if Satan drives out Satan, he has become divided against himself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disunified; how then will his kingdom last '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' continue to stand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And if I drive out the demons by [help of] Beelzebub, by whose [help] do your sons drive them out? For this reason they shall be your judges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But if it is by the Spirit of God that I drive out the demons, then the kingdom of God has come upon you [before you expected it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Or how can a person go into a strong man''s house and carry off his goods (the entire equipment of his house) without first binding the strong man? Then indeed he may plunder his house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' He who is not with Me [definitely on My side] is against Me, and he who does not [definitely] gather with Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for My side scatters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Therefore I tell you, every sin and blasphemy (every evil, abusive, injurious speaking, or indignity against sacred things) can be forgiven men, but blasphemy against the [Holy] Spirit shall not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cannot be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And whoever speaks a word against the Son of Man will be forgiven, but whoever speaks against the Spirit, the Holy One, will not be forgiven, either in this world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' age or in the world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' age to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Either make the tree sound (healthy and good), and its fruit sound (healthy and good), or make the tree rotten (diseased and bad), and its fruit rotten (diseased and bad); for the tree is known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judged by its fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' You offspring of vipers! How can you speak good things when you are evil (wicked)? For out of the fullness (the overflow, the superabundance) of the heart the mouth speaks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The good man from his inner good treasure flings forth good things, and the evil man out of his inner evil storehouse flings forth evil things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' But I tell you, on the day of judgment men will have to give account for every idle (inoperative, nonworking) word they speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For by your words you will be justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acquitted, and by your words you will be condemned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sentenced.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then some of the scribes and Pharisees said to Him, Teacher, we desire to see a sign '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' miracle from You [proving that You are what You claim to be].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But He replied to them, An evil and adulterous generation (a generation morally unfaithful to God) seeks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demands a sign; but no sign shall be given to it except the sign of the prophet Jonah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' For even as Jonah was three days and three nights in the belly of the sea monster, so will the Son of Man be three days and three nights in the heart of the earth. [Jonah 1:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The men of Nineveh will stand up at the judgment with this generation and condemn it; for they repented at the preaching of Jonah, and behold, Someone more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greater than Jonah is here! [Jonah 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' The queen of the South will stand up at the judgment with this generation and condemn it; for she came from the ends of the earth to listen to the wisdom of Solomon, and behold, Someone more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greater than Solomon is here. [I Kings 10:1; II Chron. 9:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' But when the unclean spirit has gone out of a man, it roams through dry [arid] places in search of rest, but it does not find any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Then it says, I will go back to my house from which I came out. And when it arrives, it finds the place unoccupied, swept, put in order, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decorated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Then it goes and brings with it seven other spirits more wicked than itself, and they go in and make their home there. And the last condition of that man becomes worse than the first. So also shall it be with this wicked generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Jesus was still speaking to the people when behold, His mother and brothers stood outside, seeking to speak to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Someone said to Him, Listen! Your mother and Your brothers are standing outside, seeking to speak to You.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' But He replied to the man who told Him, Who is My mother, and who are My brothers?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And stretching out His hand toward [not only the twelve disciples but all] His adherents, He said, Here are My mother and My brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' For whoever does the will of My Father in heaven is My brother and sister and mother!'
