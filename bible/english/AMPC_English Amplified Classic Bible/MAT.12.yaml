document_id: MAT.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AT THAT particular time Jesus went through the fields of standing grain on the Sabbath; and His disciples were hungry, and they began to pick off the spikes of grain and to eat. [Deut. 23:25.]'
  '10':
  - type: text
    content: ' And behold, a man was there with one withered hand. And they said to Him, Is it lawful '
  - type: text
    content: or
  - type: text
    content: ' allowable to cure people on the Sabbath days?–that they might accuse Him.'
  '11':
  - type: text
    content: ' But He said to them, What man is there among you, if he has only one sheep and it falls into a pit '
  - type: text
    content: or
  - type: text
    content: ' ditch on the Sabbath, will not take hold of it and lift it out?'
  '12':
  - type: text
    content: ' How much better '
  - type: text
    content: and
  - type: text
    content: ' of more value is a man than a sheep! So it is lawful '
  - type: text
    content: and
  - type: text
    content: ' allowable to do good on the Sabbath days.'
  '13':
  - type: text
    content: ' Then He said to the man, Reach out your hand. And the man reached it out and it was restored, as sound as the other one.'
  '14':
  - type: text
    content: ' But the Pharisees went out and held a consultation against Him, how they might do away with Him.'
  '15':
  - type: text
    content: ' But being aware of this, Jesus went away from there. And many people joined '
  - type: text
    content: and
  - type: text
    content: ' accompanied Him, and He cured all of them,'
  '16':
  - type: text
    content: ' And strictly charged them '
  - type: text
    content: and
  - type: text
    content: ' sharply warned them not to make Him publicly known.'
  '17':
  - type: text
    content: ' This was in fulfillment of what was spoken by the prophet Isaiah,'
  '18':
  - type: text
    content: ' Behold, My Servant Whom I have chosen, My Beloved in '
  - type: text
    content: and
  - type: text
    content: ' with Whom My soul is well pleased '
  - type: text
    content: and
  - type: text
    content: ' has found its delight. I will put My Spirit upon Him, and He shall proclaim '
  - type: text
    content: and
  - type: text
    content: ' show forth justice to the nations.'
  '19':
  - type: text
    content: ' He will not strive '
  - type: text
    content: or
  - type: text
    content: ' wrangle or cry out loudly; nor will anyone hear His voice in the streets;'
  '2':
  - type: text
    content: ' And when the Pharisees saw it, they said to Him, See there! Your disciples are doing what is unlawful '
  - type: text
    content: and
  - type: text
    content: ' not permitted on the Sabbath.'
  '20':
  - type: text
    content: ' A bruised reed He will not break, and a smoldering (dimly burning) wick He will not quench, till He brings justice '
  - type: text
    content: and
  - type: text
    content: ' a just cause to victory.'
  '21':
  - type: text
    content: ' And in '
  - type: text
    content: and
  - type: text
    content: ' on His name will the Gentiles (the peoples outside of Israel) set their hopes. [Isa. 42:1-4.]'
  '22':
  - type: text
    content: ' Then a blind and dumb man under the power of a demon was brought to Jesus, and He cured him, so that the blind and dumb man both spoke and saw.'
  '23':
  - type: text
    content: ' And all the [crowds of] people were stunned with bewildered wonder and said, This cannot be the Son of David, can it?'
  '24':
  - type: text
    content: ' But the Pharisees, hearing it, said, This Man drives out demons only by '
  - type: text
    content: and
  - type: text
    content: ' with the help of Beelzebub, the prince of demons.'
  '25':
  - type: text
    content: ' And knowing their thoughts, He said to them, Any kingdom that is divided against itself is being brought to desolation '
  - type: text
    content: and
  - type: text
    content: ' laid waste, and no city '
  - type: text
    content: or
  - type: text
    content: ' house divided against itself will last '
  - type: text
    content: or
  - type: text
    content: ' continue to stand.'
  '26':
  - type: text
    content: ' And if Satan drives out Satan, he has become divided against himself '
  - type: text
    content: and
  - type: text
    content: ' disunified; how then will his kingdom last '
  - type: text
    content: or
  - type: text
    content: ' continue to stand?'
  '27':
  - type: text
    content: ' And if I drive out the demons by [help of] Beelzebub, by whose [help] do your sons drive them out? For this reason they shall be your judges.'
  '28':
  - type: text
    content: ' But if it is by the Spirit of God that I drive out the demons, then the kingdom of God has come upon you [before you expected it].'
  '29':
  - type: text
    content: ' Or how can a person go into a strong man''s house and carry off his goods (the entire equipment of his house) without first binding the strong man? Then indeed he may plunder his house.'
  '3':
  - type: text
    content: ' He said to them, Have you not even read what David did when he was hungry, and those who accompanied him–[Lev. 24:9; I Sam. 21:1-6.]'
  '30':
  - type: text
    content: ' He who is not with Me [definitely on My side] is against Me, and he who does not [definitely] gather with Me '
  - type: text
    content: and
  - type: text
    content: ' for My side scatters.'
  '31':
  - type: text
    content: ' Therefore I tell you, every sin and blasphemy (every evil, abusive, injurious speaking, or indignity against sacred things) can be forgiven men, but blasphemy against the [Holy] Spirit shall not '
  - type: text
    content: and
  - type: text
    content: ' cannot be forgiven.'
  '32':
  - type: text
    content: ' And whoever speaks a word against the Son of Man will be forgiven, but whoever speaks against the Spirit, the Holy One, will not be forgiven, either in this world '
  - type: text
    content: and
  - type: text
    content: ' age or in the world '
  - type: text
    content: and
  - type: text
    content: ' age to come.'
  '33':
  - type: text
    content: ' Either make the tree sound (healthy and good), and its fruit sound (healthy and good), or make the tree rotten (diseased and bad), and its fruit rotten (diseased and bad); for the tree is known '
  - type: text
    content: and
  - type: text
    content: ' recognized '
  - type: text
    content: and
  - type: text
    content: ' judged by its fruit.'
  '34':
  - type: text
    content: ' You offspring of vipers! How can you speak good things when you are evil (wicked)? For out of the fullness (the overflow, the superabundance) of the heart the mouth speaks.'
  '35':
  - type: text
    content: ' The good man from his inner good treasure flings forth good things, and the evil man out of his inner evil storehouse flings forth evil things.'
  '36':
  - type: text
    content: ' But I tell you, on the day of judgment men will have to give account for every idle (inoperative, nonworking) word they speak.'
  '37':
  - type: text
    content: ' For by your words you will be justified '
  - type: text
    content: and
  - type: text
    content: ' acquitted, and by your words you will be condemned '
  - type: text
    content: and
  - type: text
    content: ' sentenced.'
  '38':
  - type: text
    content: ' Then some of the scribes and Pharisees said to Him, Teacher, we desire to see a sign '
  - type: text
    content: or
  - type: text
    content: ' miracle from You [proving that You are what You claim to be].'
  '39':
  - type: text
    content: ' But He replied to them, An evil and adulterous generation (a generation morally unfaithful to God) seeks '
  - type: text
    content: and
  - type: text
    content: ' demands a sign; but no sign shall be given to it except the sign of the prophet Jonah.'
  '4':
  - type: text
    content: ' How he went into the house of God and ate the loaves of the showbread–which was not lawful for him to eat, nor for the men who accompanied him, but for the priests only?'
  '40':
  - type: text
    content: ' For even as Jonah was three days and three nights in the belly of the sea monster, so will the Son of Man be three days and three nights in the heart of the earth. [Jonah 1:17.]'
  '41':
  - type: text
    content: ' The men of Nineveh will stand up at the judgment with this generation and condemn it; for they repented at the preaching of Jonah, and behold, Someone more '
  - type: text
    content: and
  - type: text
    content: ' greater than Jonah is here! [Jonah 3:5.]'
  '42':
  - type: text
    content: ' The queen of the South will stand up at the judgment with this generation and condemn it; for she came from the ends of the earth to listen to the wisdom of Solomon, and behold, Someone more '
  - type: text
    content: and
  - type: text
    content: ' greater than Solomon is here. [I Kings 10:1; II Chron. 9:1.]'
  '43':
  - type: text
    content: ' But when the unclean spirit has gone out of a man, it roams through dry [arid] places in search of rest, but it does not find any.'
  '44':
  - type: text
    content: ' Then it says, I will go back to my house from which I came out. And when it arrives, it finds the place unoccupied, swept, put in order, '
  - type: text
    content: and
  - type: text
    content: ' decorated.'
  '45':
  - type: text
    content: ' Then it goes and brings with it seven other spirits more wicked than itself, and they go in and make their home there. And the last condition of that man becomes worse than the first. So also shall it be with this wicked generation.'
  '46':
  - type: text
    content: ' Jesus was still speaking to the people when behold, His mother and brothers stood outside, seeking to speak to Him.'
  '47':
  - type: text
    content: ' '
  - type: text
    content: Someone said to Him, Listen! Your mother and Your brothers are standing outside, seeking to speak to You.
  '48':
  - type: text
    content: ' But He replied to the man who told Him, Who is My mother, and who are My brothers?'
  '49':
  - type: text
    content: ' And stretching out His hand toward [not only the twelve disciples but all] His adherents, He said, Here are My mother and My brothers.'
  '5':
  - type: text
    content: ' Or have you never read in the Law that on the Sabbath the priests in the temple violate the sanctity of the Sabbath [breaking it] and yet are guiltless? [Num. 28:9, 10.]'
  '50':
  - type: text
    content: ' For whoever does the will of My Father in heaven is My brother and sister and mother!'
  '6':
  - type: text
    content: ' But I tell you, Something greater '
  - type: text
    content: and
  - type: text
    content: ' more exalted '
  - type: text
    content: and
  - type: text
    content: ' more majestic than the temple is here!'
  '7':
  - type: text
    content: ' And if you had only known what this saying means, I desire mercy [readiness to help, to spare, to forgive] rather than sacrifice '
  - type: text
    content: and
  - type: text
    content: ' sacrificial victims, you would not have condemned the guiltless. [Hos. 6:6; Matt. 9:13.]'
  '8':
  - type: text
    content: ' For the Son of Man is Lord [even] of the Sabbath.'
  '9':
  - type: text
    content: ' And going on from there, He went into their synagogue.'
