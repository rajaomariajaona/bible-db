document_id: 1JN.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [WE ARE writing] about the Word of Life [in] Him Who existed from the beginning, Whom we have heard, Whom we have seen with our [own] eyes, Whom we have gazed upon [for ourselves] and have touched with our [own] hands.'
  '10':
  - type: text
    content: ' If we say (claim) we have not sinned, we contradict His Word '
  - type: text
    content: and
  - type: text
    content: ' make Him out to be false '
  - type: text
    content: and
  - type: text
    content: ' a liar, and His Word is not in us [the divine message of the Gospel is not in our hearts].'
  '2':
  - type: text
    content: ' And the Life [an aspect of His being] was revealed (made manifest, demonstrated), and we saw [as eyewitnesses] and are testifying to and declare to you the Life, the eternal Life [in Him] Who already existed with the Father and Who [actually] was made visible (was revealed) to us [His followers].'
  '3':
  - type: text
    content: ' What we have seen and [ourselves] heard, we are also telling you, so that you too may realize '
  - type: text
    content: and
  - type: text
    content: ' enjoy fellowship as partners '
  - type: text
    content: and
  - type: text
    content: ' partakers with us. And [this] fellowship that we have [which is a distinguishing mark of Christians] is with the Father and with His Son Jesus Christ (the Messiah).'
  '4':
  - type: text
    content: ' And we are now writing these things to you so that our joy [in seeing you included] may be full [and '
  - type: text
    content: your
  - type: text
    content: ' joy may be complete].'
  '5':
  - type: text
    content: ' And this is the message [the message of promise] which we have heard from Him and now are reporting to you: God is Light, and there is no darkness in Him at all [no, not in any way].'
  '6':
  - type: text
    content: ' [So] if we say we are partakers together '
  - type: text
    content: and
  - type: text
    content: ' enjoy fellowship with Him when we live '
  - type: text
    content: and
  - type: text
    content: ' move '
  - type: text
    content: and
  - type: text
    content: ' are walking about in darkness, we are [both] speaking falsely and do not live '
  - type: text
    content: and
  - type: text
    content: ' practice the Truth [which the Gospel presents].'
  '7':
  - type: text
    content: ' But if we [really] are living '
  - type: text
    content: and
  - type: text
    content: ' walking in the Light, as He [Himself] is in the Light, we have [true, unbroken] fellowship with one another, and the blood of Jesus '
  - type: text
    content: Christ
  - type: text
    content: ' His Son cleanses (removes) us from all sin '
  - type: text
    content: and
  - type: text
    content: ' guilt [keeps us cleansed from sin in all its forms and manifestations].'
  '8':
  - type: text
    content: ' If we say we have no sin [refusing to admit that we are sinners], we delude '
  - type: text
    content: and
  - type: text
    content: ' lead ourselves astray, and the Truth [which the Gospel presents] is not in us [does not dwell in our hearts].'
  '9':
  - type: text
    content: ' If we [freely] admit that we have sinned '
  - type: text
    content: and
  - type: text
    content: ' confess our sins, He is faithful and just (true to His own nature and promises) and will forgive our sins [dismiss our lawlessness] and [continuously] cleanse us from all unrighteousness [everything not in conformity to His will in purpose, thought, and action].'
