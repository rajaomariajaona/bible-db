document_id: 1JN.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' [WE ARE writing] about the Word of Life [in] Him Who existed from the beginning, Whom we have heard, Whom we have seen with our [own] eyes, Whom we have gazed upon [for ourselves] and have touched with our [own] hands.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' If we say (claim) we have not sinned, we contradict His Word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make Him out to be false '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a liar, and His Word is not in us [the divine message of the Gospel is not in our hearts].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the Life [an aspect of His being] was revealed (made manifest, demonstrated), and we saw [as eyewitnesses] and are testifying to and declare to you the Life, the eternal Life [in Him] Who already existed with the Father and Who [actually] was made visible (was revealed) to us [His followers].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' What we have seen and [ourselves] heard, we are also telling you, so that you too may realize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy fellowship as partners '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' partakers with us. And [this] fellowship that we have [which is a distinguishing mark of Christians] is with the Father and with His Son Jesus Christ (the Messiah).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And we are now writing these things to you so that our joy [in seeing you included] may be full [and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' joy may be complete].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And this is the message [the message of promise] which we have heard from Him and now are reporting to you: God is Light, and there is no darkness in Him at all [no, not in any way].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' [So] if we say we are partakers together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy fellowship with Him when we live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' move '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are walking about in darkness, we are [both] speaking falsely and do not live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practice the Truth [which the Gospel presents].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But if we [really] are living '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' walking in the Light, as He [Himself] is in the Light, we have [true, unbroken] fellowship with one another, and the blood of Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ
    - type: text
      text: ' His Son cleanses (removes) us from all sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt [keeps us cleansed from sin in all its forms and manifestations].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' If we say we have no sin [refusing to admit that we are sinners], we delude '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lead ourselves astray, and the Truth [which the Gospel presents] is not in us [does not dwell in our hearts].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' If we [freely] admit that we have sinned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confess our sins, He is faithful and just (true to His own nature and promises) and will forgive our sins [dismiss our lawlessness] and [continuously] cleanse us from all unrighteousness [everything not in conformity to His will in purpose, thought, and action].'
