document_id: NUM.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND ALL the congregation cried out with a loud voice, and [they] wept that night.'
  '10':
  - type: text
    content: ' But all the congregation said to stone [Joshua and Caleb] with stones. But the glory of the Lord appeared at the Tent of Meeting before all the Israelites.'
  '11':
  - type: text
    content: ' And the Lord said to Moses, How long will this people provoke (spurn, despise) Me? And how long will it be before they believe Me [trusting in, relying on, clinging to Me], for all the signs which I have performed among them?'
  '12':
  - type: text
    content: ' I will smite them with the pestilence and disinherit them, and will make of you [Moses] a nation greater and mightier than they.'
  '13':
  - type: text
    content: ' But Moses said to the Lord, Then the Egyptians will hear of it, for You brought up this people in Your might from among them.'
  '14':
  - type: text
    content: ' And they will tell it to the inhabitants of this land. They have heard that You, Lord, are in the midst of this people [of Israel], that You, Lord, are seen face to face, and that Your cloud stands over them, and that You go before them in a pillar of cloud by day and in a pillar of fire by night.'
  '15':
  - type: text
    content: ' Now if You kill all this people as one man, then the nations that have heard Your fame will say,'
  '16':
  - type: text
    content: ' Because the Lord was not able to bring this people into the land which He swore to give to them, therefore He has slain them in the wilderness.'
  '17':
  - type: text
    content: ' And now, I pray You, let the power of my Lord be great, as You have promised, saying,'
  '18':
  - type: text
    content: ' The Lord is long-suffering '
  - type: text
    content: and
  - type: text
    content: ' slow to anger, and abundant in mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, forgiving iniquity and transgression; but He will by no means clear the guilty, visiting the iniquity of the fathers upon the children, upon the third and fourth generation. [Exod. 34:6, 7.]'
  '19':
  - type: text
    content: ' Pardon, I pray You, the iniquity of this people according to the greatness of Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, just as You have forgiven [them] from Egypt until now.'
  '2':
  - type: text
    content: ' All the Israelites grumbled '
  - type: text
    content: and
  - type: text
    content: ' deplored their situation, accusing Moses and Aaron, to whom the whole congregation said, Would that we had died in Egypt! Or that we had died in this wilderness!'
  '20':
  - type: text
    content: ' And the Lord said, I have pardoned according to your word.'
  '21':
  - type: text
    content: ' But truly as I live and as all the earth shall be filled with the glory of the Lord, [Isa. 6:3; 11:9.]'
  '22':
  - type: text
    content: ' Because all those men who have seen My glory and My [miraculous] signs which I performed in Egypt and in the wilderness, yet have tested '
  - type: text
    content: and
  - type: text
    content: ' proved Me these ten times and have not heeded My voice,'
  '23':
  - type: text
    content: ' Surely they shall not see the land which I swore to give to their fathers; nor shall any who provoked (spurned, despised) Me see it. [Heb. 6:4-11.]'
  '24':
  - type: text
    content: ' But My servant Caleb, because he has a different spirit and has followed Me fully, I will bring into the land into which he went, and his descendants shall possess it.'
  '25':
  - type: text
    content: ' Now because the Amalekites and the Canaanites dwell in the valley, tomorrow turn and go into the wilderness by way of the Red Sea.'
  '26':
  - type: text
    content: ' And the Lord said to Moses and Aaron,'
  '27':
  - type: text
    content: ' How long will this evil congregation murmur against Me? I have heard the complaints the Israelites murmur against Me.'
  '28':
  - type: text
    content: ' Tell them, As I live, says the Lord, what you have said in My hearing I will do to you:'
  '29':
  - type: text
    content: ' Your dead bodies shall fall in this wilderness–of all who were numbered of you, from twenty years old and upward, who have murmured against Me, [Heb. 3:17-19.]'
  '3':
  - type: text
    content: ' Why does the Lord bring us to this land to fall by the sword? Our wives and little ones will be a prey. Is it not better for us to return to Egypt? [Acts 7:37-39.]'
  '30':
  - type: text
    content: ' Surely none shall come into the land in which I swore to make you dwell, except Caleb son of Jephunneh and Joshua son of Nun.'
  '31':
  - type: text
    content: ' But your little ones whom you said would be a prey, them will I bring in and they shall know the land which you have despised '
  - type: text
    content: and
  - type: text
    content: ' rejected.'
  '32':
  - type: text
    content: ' But as for you, your dead bodies shall fall in this wilderness.'
  '33':
  - type: text
    content: ' And your children shall be wanderers '
  - type: text
    content: and
  - type: text
    content: ' shepherds in the wilderness for forty years and shall suffer for your whoredoms (your infidelity to your espoused God), until your corpses are consumed in the wilderness.'
  '34':
  - type: text
    content: ' After the number of the days in which you spied out the land [of Canaan], even forty days, for each day a year shall you bear '
  - type: text
    content: and
  - type: text
    content: ' suffer for your iniquities, even for forty years, and you shall know My displeasure [the revoking of My promise and My estrangement].'
  '35':
  - type: text
    content: ' I the Lord have spoken; surely this will I do to all this evil congregation who is gathered together against Me. In this wilderness they shall be consumed [by war, disease, plagues], and here they shall die. [I Cor. 10:10, 11.]'
  '36':
  - type: text
    content: ' And the men whom Moses sent to search the land, who returned and made all the congregation grumble '
  - type: text
    content: and
  - type: text
    content: ' complain against him by bringing back a slanderous report of the land,'
  '37':
  - type: text
    content: ' Even those men who brought the evil report of the land died by a plague before the Lord. [Heb. 3:17-19; Jude 5-7.]'
  '38':
  - type: text
    content: ' But Joshua son of Nun and Caleb son of Jephunneh, who were among the men who went to search the land, lived still.'
  '39':
  - type: text
    content: ' Moses told [the Lord''s] words to all the Israelites, and [they] mourned greatly.'
  '4':
  - type: text
    content: ' And they said one to another, Let us choose a captain and return to Egypt.'
  '40':
  - type: text
    content: ' And they rose early in the morning and went up to the top of the mountain, saying, Behold, we are here, and we intend to go up to the place which the Lord has promised, for we have sinned.'
  '41':
  - type: text
    content: ' But Moses said, Why now do you transgress the command of the Lord [to turn back by way of the Red Sea], since it will not succeed?'
  '42':
  - type: text
    content: ' Go not up, for the Lord is not among you, that you be not struck down before your enemies.'
  '43':
  - type: text
    content: ' For the Amalekites and the Canaanites are there before you, and you shall fall by the sword. Because you have turned away from following after the Lord, therefore the Lord will not be with you.'
  '44':
  - type: text
    content: ' But they presumed to go up to the heights of the hill country; however, neither the ark of the covenant of the Lord nor Moses departed out of the camp.'
  '45':
  - type: text
    content: ' Then the Amalekites came down and the Canaanites who dwelt in that hill country and smote the Israelites and beat them back, even as far as Hormah.'
  '5':
  - type: text
    content: ' Then Moses and Aaron fell on their faces before all the assembly of Israelites.'
  '6':
  - type: text
    content: ' And Joshua son of Nun and Caleb son of Jephunneh, who were among the scouts who had searched the land, rent their clothes,'
  '7':
  - type: text
    content: ' And they said to all the company of Israelites, The land through which we passed as scouts is an exceedingly good land.'
  '8':
  - type: text
    content: ' If the Lord delights in us, then He will bring us into this land and give it to us, a land flowing with milk and honey.'
  '9':
  - type: text
    content: ' Only do not rebel against the Lord, neither fear the people of the land, for they are bread for us. Their defense '
  - type: text
    content: and
  - type: text
    content: ' the shadow [of protection] is removed from over them, but the Lord is with us. Fear them not.'
