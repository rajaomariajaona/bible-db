document_id: NUM.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND ALL the congregation cried out with a loud voice, and [they] wept that night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' All the Israelites grumbled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deplored their situation, accusing Moses and Aaron, to whom the whole congregation said, Would that we had died in Egypt! Or that we had died in this wilderness!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Why does the Lord bring us to this land to fall by the sword? Our wives and little ones will be a prey. Is it not better for us to return to Egypt? [Acts 7:37-39.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they said one to another, Let us choose a captain and return to Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Moses and Aaron fell on their faces before all the assembly of Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Joshua son of Nun and Caleb son of Jephunneh, who were among the scouts who had searched the land, rent their clothes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they said to all the company of Israelites, The land through which we passed as scouts is an exceedingly good land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' If the Lord delights in us, then He will bring us into this land and give it to us, a land flowing with milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Only do not rebel against the Lord, neither fear the people of the land, for they are bread for us. Their defense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the shadow [of protection] is removed from over them, but the Lord is with us. Fear them not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But all the congregation said to stone [Joshua and Caleb] with stones. But the glory of the Lord appeared at the Tent of Meeting before all the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the Lord said to Moses, How long will this people provoke (spurn, despise) Me? And how long will it be before they believe Me [trusting in, relying on, clinging to Me], for all the signs which I have performed among them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I will smite them with the pestilence and disinherit them, and will make of you [Moses] a nation greater and mightier than they.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But Moses said to the Lord, Then the Egyptians will hear of it, for You brought up this people in Your might from among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they will tell it to the inhabitants of this land. They have heard that You, Lord, are in the midst of this people [of Israel], that You, Lord, are seen face to face, and that Your cloud stands over them, and that You go before them in a pillar of cloud by day and in a pillar of fire by night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now if You kill all this people as one man, then the nations that have heard Your fame will say,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Because the Lord was not able to bring this people into the land which He swore to give to them, therefore He has slain them in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And now, I pray You, let the power of my Lord be great, as You have promised, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Lord is long-suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slow to anger, and abundant in mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, forgiving iniquity and transgression; but He will by no means clear the guilty, visiting the iniquity of the fathers upon the children, upon the third and fourth generation. [Exod. 34:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Pardon, I pray You, the iniquity of this people according to the greatness of Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, just as You have forgiven [them] from Egypt until now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the Lord said, I have pardoned according to your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But truly as I live and as all the earth shall be filled with the glory of the Lord, [Isa. 6:3; 11:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Because all those men who have seen My glory and My [miraculous] signs which I performed in Egypt and in the wilderness, yet have tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proved Me these ten times and have not heeded My voice,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Surely they shall not see the land which I swore to give to their fathers; nor shall any who provoked (spurned, despised) Me see it. [Heb. 6:4-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But My servant Caleb, because he has a different spirit and has followed Me fully, I will bring into the land into which he went, and his descendants shall possess it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now because the Amalekites and the Canaanites dwell in the valley, tomorrow turn and go into the wilderness by way of the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the Lord said to Moses and Aaron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' How long will this evil congregation murmur against Me? I have heard the complaints the Israelites murmur against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Tell them, As I live, says the Lord, what you have said in My hearing I will do to you:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Your dead bodies shall fall in this wilderness–of all who were numbered of you, from twenty years old and upward, who have murmured against Me, [Heb. 3:17-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Surely none shall come into the land in which I swore to make you dwell, except Caleb son of Jephunneh and Joshua son of Nun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But your little ones whom you said would be a prey, them will I bring in and they shall know the land which you have despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But as for you, your dead bodies shall fall in this wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And your children shall be wanderers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shepherds in the wilderness for forty years and shall suffer for your whoredoms (your infidelity to your espoused God), until your corpses are consumed in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' After the number of the days in which you spied out the land [of Canaan], even forty days, for each day a year shall you bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer for your iniquities, even for forty years, and you shall know My displeasure [the revoking of My promise and My estrangement].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' I the Lord have spoken; surely this will I do to all this evil congregation who is gathered together against Me. In this wilderness they shall be consumed [by war, disease, plagues], and here they shall die. [I Cor. 10:10, 11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And the men whom Moses sent to search the land, who returned and made all the congregation grumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complain against him by bringing back a slanderous report of the land,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Even those men who brought the evil report of the land died by a plague before the Lord. [Heb. 3:17-19; Jude 5-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But Joshua son of Nun and Caleb son of Jephunneh, who were among the men who went to search the land, lived still.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Moses told [the Lord''s] words to all the Israelites, and [they] mourned greatly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And they rose early in the morning and went up to the top of the mountain, saying, Behold, we are here, and we intend to go up to the place which the Lord has promised, for we have sinned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' But Moses said, Why now do you transgress the command of the Lord [to turn back by way of the Red Sea], since it will not succeed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Go not up, for the Lord is not among you, that you be not struck down before your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' For the Amalekites and the Canaanites are there before you, and you shall fall by the sword. Because you have turned away from following after the Lord, therefore the Lord will not be with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' But they presumed to go up to the heights of the hill country; however, neither the ark of the covenant of the Lord nor Moses departed out of the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Then the Amalekites came down and the Canaanites who dwelt in that hill country and smote the Israelites and beat them back, even as far as Hormah.'
