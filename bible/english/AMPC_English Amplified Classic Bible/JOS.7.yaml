document_id: JOS.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT THE Israelites committed a trespass in regard to the devoted things; for Achan son of Carmi, the son of Zabdi, the son of Zerah, of the tribe of Judah, took some of the things devoted [for destruction]. And the anger of the Lord burned against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Joshua sent men from Jericho to Ai, which is near Beth-aven, east of Bethel, and said to them, Go up and spy out the land. So the men went up and spied out Ai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they returned to Joshua and said to him, Let not all the men go up; but let about two thousand or three thousand go up and attack Ai; do not make the whole army toil up there, for they of Ai are few.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So about three thousand Israelites went up there, but they fled before the men of Ai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the men of Ai killed about thirty-six of them, for they chased them from before the gate as far as Shebarim, and slew them at the descent. And the hearts of the people melted and became as water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then Joshua rent his clothes and lay on the earth upon his face before the ark of the Lord until evening, he and the elders of Israel; and they put dust on their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Joshua said, Alas, O Lord God, why have You brought this people over the Jordan at all only to give us into the hands of the Amorites to destroy us? Would that we had been content to dwell beyond the Jordan!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' O Lord, what can I say, now that Israel has turned to flee before their enemies!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For the Canaanites and all the inhabitants of the land will hear of it and will surround us and cut off our name from the earth. And what will You do for Your great name?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord said to Joshua, Get up! Why do you lie thus upon your face?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Israel has sinned; they have transgressed My covenant which I commanded them. They have taken some of the things devoted [for destruction]; they have stolen, and lied, and put them among their own baggage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' That is why the Israelites could not stand before their enemies, but fled before them; they are accursed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have become devoted [for destruction]. I will cease to be with you unless you destroy the accursed [devoted] things among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Up, sanctify (set apart for a holy purpose) the people, and say, Sanctify yourselves for tomorrow; for thus says the Lord, the God of Israel: There are accursed things in the midst of you, O Israel. You can not stand before your enemies until you take away from among you the things devoted [to destruction].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the morning therefore, you shall present your tribes. And the tribe which the Lord takes shall come by families; and the family which the Lord takes shall come by households; and the household which the Lord takes shall come by persons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he who is taken with the devoted things shall be [killed and his body] burned with fire, he and all he has, because he has transgressed the covenant of the Lord and because he has done a shameful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked thing in Israel. [Josh. 7:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So Joshua rose up early in the morning and brought Israel near by their tribes, and the tribe of Judah was taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He brought near the family of Judah, and the family of the Zerahites was taken; and he brought near the family of the Zerahites man by man, and Zabdi was taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He brought near his household man by man, and Achan son of Carmi, the son of Zabdi, the son of Zerah, of the tribe of Judah, was taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Joshua said to Achan, My son, give glory to the Lord, the God of Israel, and make confession to Him. And tell me now what you have done; do not hide it from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Achan answered Joshua, In truth, I have sinned against the Lord, the God of Israel, and this have I done:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When I saw among the spoils an attractive mantle from Shinar and two hundred shekels of silver and a bar of gold weighing fifty shekels, I coveted them and took them. Behold, they are hidden in the earth inside my tent, with the silver underneath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So Joshua sent messengers, who ran to the tent, and behold, the spoil was hidden in his tent, with the silver underneath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they took them from the tent and brought them to Joshua and all the Israelites and laid them out before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Joshua and all Israel with him took Achan son of Zerah, and the silver, the garment, the wedge of gold, his sons, his daughters, his oxen, his donkeys, his sheep, his tent, and all that he had; and they brought them to the Valley of Achor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Joshua said, Why have you brought trouble on us? The Lord will trouble you this day. And all Israel stoned him and those with him with stones, and afterward burned their bodies with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they raised over him a great heap of stones that remains to this day. Then the Lord turned from the fierceness of His anger. Therefore the name of that place has been called the Valley of Achor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Troubling to this day.'
