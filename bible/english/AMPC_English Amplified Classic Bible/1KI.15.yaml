document_id: 1KI.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE eighteenth year of King Jeroboam son of Nebat, Abijam began to reign over Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He reigned three years in Jerusalem. His mother was Maacah (Micaiah) daughter [granddaughter] of Abishalom (Absalom).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He walked in all the sins of his father [Rehoboam] before him; and his heart was not blameless with the Lord his God, as the heart of David his father [forefather].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Nevertheless, for David''s sake the Lord his God gave him a lamp in Jerusalem, setting up his son after him and establishing Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Because David did what was right in the eyes of the Lord and turned not aside from anything that He commanded him all the days of his life, except in the matter of Uriah the Hittite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' There was war between [Abijam''s father] Rehoboam and Jeroboam all the days of [Rehoboam''s] life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The rest of the acts of Abijam, and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? And there was war between Abijam and Jeroboam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Abijam slept with his fathers and they buried him in the City of David. Asa his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In the twentieth year of Jeroboam king of Israel, Asa began to reign over Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Forty-one years he reigned in Jerusalem. His mother was [also named] Maacah (Micaiah) daughter of Abishalom (Absalom). [I Kings 15:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Asa did right in the eyes of the Lord, as did David his father [forefather].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He put away the sodomites (male cult prostitutes) out of the land and removed all the idols that his fathers [Solomon, Rehoboam, and Abijam] had made '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' promoted. [I Kings 11:5-11; 14:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Also Maacah his mother he removed from being queen mother, because she had an image made for [the goddess] Asherah. Asa destroyed her image, burning it by the brook Kidron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But the high places were not removed. Yet Asa''s heart was blameless with the Lord all his days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He brought the things which his father had dedicated and the things which he himself had dedicated into the house of the Lord–silver, gold, and vessels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' There was war between Asa and Baasha king of Israel all their days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Baasha king of Israel went up against Judah and built up Ramah, that he might allow no one to go out or come in to Asa king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then Asa took all the silver and gold left in the treasuries of the house of the Lord and of the king''s house and delivered them into the hands of his servants. And King Asa sent them to Ben-hadad son of Tabrimmon, the son of Hezion, king of Syria, who dwelt at Damascus, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Let there be a league between me and you, as was between my father and your father. Behold, I am sending you a present of silver and gold; go, break your league with Baasha king of Israel, that he may withdraw from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So Ben-hadad hearkened to king Asa and sent the commanders of his armies against the cities of Israel, and smote Ijon, Dan, Abel-beth-maacah, and all Chinneroth, with all the land of Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When Baasha heard of it, he quit building up Ramah and dwelt in Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then King Asa made a proclamation to all Judah–none was exempted. They carried away the stones of Ramah and its timber with which Baasha had been building. And King Asa built up with them Geba of Benjamin, and also Mizpah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The rest of all the acts of Asa, all his might, all that he did, and the cities which he built, are they not written in the Book of the Chronicles of the Kings of Judah? But in the time of his old age he was diseased in his feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Asa slept with his fathers and was buried with them in the city of David his father. Jehoshaphat his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Nadab son of Jeroboam began to reign over Israel in the second year of Asa king of Judah, and reigned two years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He did evil in the sight of the Lord and walked in the way of his father and in his sin, with which he made Israel sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Baasha son of Ahijah of the house of Issachar conspired against Nadab, and Baasha smote him at Gibbethon, which belonged to the Philistines, for Nadab and all Israel were laying siege to Gibbethon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' In the third year of Asa king of Judah Baasha slew Nadab and reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' As soon as he was king, Baasha killed all the household of Jeroboam. He left to [it] not one who breathed, until he had destroyed it, according to the word of the Lord which He spoke by His servant Ahijah the Shilonite–[I Kings 14:9-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Because of the sins of Jeroboam which he sinned and by which he made Israel to sin, and because of his provocation of the Lord, the God of Israel, to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The rest of Nadab''s acts, and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' There was war between Asa and Baasha king of Israel all their days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' In the third year of Asa king of Judah, Baasha son of Ahijah began his reign of twenty-four years over all Israel in Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' He did evil in the sight of the Lord and walked in the way of Jeroboam and in his sin, with which he made Israel sin.'
