document_id: PSA.103,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' BLESS (AFFECTIONATELY, gratefully praise) the Lord, O my soul; and all that is [deepest] within me, bless His holy name!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He has not dealt with us after our sins nor rewarded us according to our iniquities.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For as the heavens are high above the earth, so great are His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness toward those who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear Him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As far as the east is from the west, so far has He removed our transgressions from us.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As a father loves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pities his children, so the Lord loves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pities those who fear Him [with reverence, worship, and awe].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He knows our frame, He [earnestly] remembers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imprints [on His heart] that we are dust.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for man, his days are as grass; as a flower of the field, so he flourishes.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the wind passes over it and it is gone, and its place shall know it no more.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness of the Lord are from everlasting to everlasting upon those who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear Him, and His righteousness is to children''s children–[Deut. 10:12.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To such as keep His covenant [hearing, receiving, loving, and obeying it] and to those who [earnestly] remember His commandments to do them [imprinting them on their hearts].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord has established His throne in the heavens, and His kingdom rules over all.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bless (affectionately, gratefully praise) the Lord, O my soul, and forget not [one of] all His benefits–'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bless (affectionately, gratefully praise) the Lord, you His angels, you mighty ones who do His commandments, hearkening to the voice of His word.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bless (affectionately, gratefully praise) the Lord, all you His hosts, you His ministers who do His pleasure.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bless the Lord, all His works in all places of His dominion; bless (affectionately, gratefully praise) the Lord, O my soul!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who forgives [every one of] all your iniquities, Who heals [each one of] all your diseases,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who redeems your life from the pit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corruption, Who beautifies, dignifies, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crowns you with loving-kindness and tender mercy;'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who satisfies your mouth [your necessity and desire at your personal age and situation] with good so that your youth, renewed, is like the eagle''s [strong, overcoming, soaring]! [Isa. 40:31.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord executes righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice [not for me only, but] for all who are oppressed.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He made known His ways [of righteousness and justice] to Moses, His acts to the children of Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord is merciful and gracious, slow to anger and plenteous in mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness. [James 5:11.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He will not always chide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be contending, neither will He keep His anger forever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hold a grudge.'
