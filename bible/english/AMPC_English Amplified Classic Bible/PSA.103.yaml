document_id: PSA.103,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' BLESS (AFFECTIONATELY, gratefully praise) the Lord, O my soul; and all that is [deepest] within me, bless His holy name!'
  '10':
  - type: text
    content: ' He has not dealt with us after our sins nor rewarded us according to our iniquities.'
  '11':
  - type: text
    content: ' For as the heavens are high above the earth, so great are His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness toward those who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear Him.'
  '12':
  - type: text
    content: ' As far as the east is from the west, so far has He removed our transgressions from us.'
  '13':
  - type: text
    content: ' As a father loves '
  - type: text
    content: and
  - type: text
    content: ' pities his children, so the Lord loves '
  - type: text
    content: and
  - type: text
    content: ' pities those who fear Him [with reverence, worship, and awe].'
  '14':
  - type: text
    content: ' For He knows our frame, He [earnestly] remembers '
  - type: text
    content: and
  - type: text
    content: ' imprints [on His heart] that we are dust.'
  '15':
  - type: text
    content: ' As for man, his days are as grass; as a flower of the field, so he flourishes.'
  '16':
  - type: text
    content: ' For the wind passes over it and it is gone, and its place shall know it no more.'
  '17':
  - type: text
    content: ' But the mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness of the Lord are from everlasting to everlasting upon those who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear Him, and His righteousness is to children''s children–[Deut. 10:12.]'
  '18':
  - type: text
    content: ' To such as keep His covenant [hearing, receiving, loving, and obeying it] and to those who [earnestly] remember His commandments to do them [imprinting them on their hearts].'
  '19':
  - type: text
    content: ' The Lord has established His throne in the heavens, and His kingdom rules over all.'
  '2':
  - type: text
    content: ' Bless (affectionately, gratefully praise) the Lord, O my soul, and forget not [one of] all His benefits–'
  '20':
  - type: text
    content: ' Bless (affectionately, gratefully praise) the Lord, you His angels, you mighty ones who do His commandments, hearkening to the voice of His word.'
  '21':
  - type: text
    content: ' Bless (affectionately, gratefully praise) the Lord, all you His hosts, you His ministers who do His pleasure.'
  '22':
  - type: text
    content: ' Bless the Lord, all His works in all places of His dominion; bless (affectionately, gratefully praise) the Lord, O my soul!'
  '3':
  - type: text
    content: ' Who forgives [every one of] all your iniquities, Who heals [each one of] all your diseases,'
  '4':
  - type: text
    content: ' Who redeems your life from the pit '
  - type: text
    content: and
  - type: text
    content: ' corruption, Who beautifies, dignifies, '
  - type: text
    content: and
  - type: text
    content: ' crowns you with loving-kindness and tender mercy;'
  '5':
  - type: text
    content: ' Who satisfies your mouth [your necessity and desire at your personal age and situation] with good so that your youth, renewed, is like the eagle''s [strong, overcoming, soaring]! [Isa. 40:31.]'
  '6':
  - type: text
    content: ' The Lord executes righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice [not for me only, but] for all who are oppressed.'
  '7':
  - type: text
    content: ' He made known His ways [of righteousness and justice] to Moses, His acts to the children of Israel.'
  '8':
  - type: text
    content: ' The Lord is merciful and gracious, slow to anger and plenteous in mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness. [James 5:11.]'
  '9':
  - type: text
    content: ' He will not always chide '
  - type: text
    content: or
  - type: text
    content: ' be contending, neither will He keep His anger forever '
  - type: text
    content: or
  - type: text
    content: ' hold a grudge.'
