document_id: LUK.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE fifteenth year of Tiberius Caesar''s reign–when Pontius Pilate was governor of Judea, and Herod was tetrarch of Galilee, and his brother Philip tetrarch of the region of Ituraea and Trachonitis, and Lysanias tetrarch of Abilene–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In the high priesthood of Annas and Caiaphas, the Word of God [concerning the attainment through Christ of salvation in the kingdom of God] came to John son of Zachariah in the wilderness (desert).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he went into all the country round about the Jordan, preaching a baptism of repentance (of hearty amending of their ways, with abhorrence of past wrongdoing) unto the forgiveness of sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' As it is written in the book of the words of Isaiah the prophet, The voice of one crying in the wilderness [shouting in the desert]: Prepare the way of the Lord, make His beaten paths straight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Every valley '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ravine shall be filled up, and every mountain and hill shall be leveled; and the crooked places shall be made straight, and the rough roads shall be made smooth;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And all mankind shall see (behold and understand and at last acknowledge) the salvation of God (the deliverance from eternal death decreed by God). [Isa. 40:3-5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So he said to the crowds who came out to be baptized by him, You offspring of vipers! Who secretly warned you to flee from the coming wrath?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Bear fruits that are deserving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consistent with [your] repentance [that is, conduct worthy of a heart changed, a heart abhorring sin]. And do not begin to say to yourselves, We have Abraham as our father; for I tell you that God is able from these stones to raise up descendants for Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Even now the ax is laid to the root of the trees, so that every tree that does not bear good fruit is cut down and cast into the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the multitudes asked him, Then what shall we do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he replied to them, He who has two tunics (undergarments), let him share with him who has none; and he who has food, let him do it the same way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Even tax collectors came to be baptized, and they said to him, Teacher, what shall we do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And he said to them, Exact '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' collect no more than the fixed amount appointed you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Those serving as soldiers also asked him, And we, what shall we do? And he replied to them, Never demand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' enforce by terrifying people or by accusing wrongfully, and always be satisfied with your rations (supplies) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with your allowance (wages).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As the people were in suspense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waiting expectantly, and everybody reasoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' questioned in their hearts concerning John, whether he perhaps might be the Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' John answered them all by saying, I baptize you with water; but He Who is mightier than I is coming, the strap of Whose sandals I am not fit to unfasten. He will baptize you with the Holy Spirit and with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' His winnowing shovel (fork) is in His hand to thoroughly clear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleanse His [threshing] floor and to gather the wheat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' store it in His granary, but the chaff He will burn with fire that cannot be extinguished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So with many other [various] appeals and admonitions he preached the good news (the Gospel) to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But Herod the tetrarch, who had been [repeatedly] told about his fault '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' rebuke producing conviction by [John] for [having] Herodias, his brother''s wife, and for all the wicked things that Herod had done,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Added this to them all–that he shut up John in prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now when all the people were baptized, and when Jesus also had been baptized, and [while He was still] praying, the [visible] heaven was opened'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the Holy Spirit descended upon Him in bodily form like a dove, and a voice came from heaven, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' You are My Son, My Beloved! In You I am well pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find delight! [Ps. 2:7; Isa. 42:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Jesus Himself, when He began [His ministry], was about thirty years of age, being the Son, as was supposed, of Joseph, the son of Heli,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The son of Matthat, the son of Levi, the son of Melchi, the son of Jannai, the son of Joseph,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The son of Mattathias, the son of Amos, the son of Nahum, the son of Esli, the son of Naggai,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The son of Maath, the son of Mattathias, the son of Semein, the son of Josech, the son of Joda,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The son of Joanan, the son of Rhesa, the son of Zerubbabel, the son of Shealtiel, the son of Neri,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The son of Melchi, the son of Addi, the son of Cosam, the son of Elmadam, the son of Er,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The son of Jesus, the son of Eliezer, the son of Jorim, the son of Matthat, the son of Levi,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The son of Simeon, the son of Judah, the son of Joseph, the son of Jonam, the son of Eliakim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The son of Melea, the son of Menna, the son of Mattatha, the son of Nathan, the son of David,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The son of Jesse, the son of Obed, the son of Boaz, the son of Salmon (Sala), the son of Nahshon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The son of Aminadab, the son of Admin, the son of Arni, the son of Hezron, the son of Perez, the son of Judah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' The son of Jacob, the son of Isaac, the son of Abraham, the son of Terah, the son of Nahor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The son of Serug, the son of Reu, the son of Peleg, the son of Eber, the son of Shelah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The son of Cainan, the son of Arphaxad, the son of Shem, the son of Noah, the son of Lamech,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' The son of Methuselah, the son of Enoch, the son of Jared, the son of Mahalaleel, the son of Cainan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The son of Enos, the son of Seth, the son of Adam, the son of God. [Gen. 5:3-32; 11:10-26; Ruth 4:18-22; I Chron. 1:1-4, 24-28; 2:1-15.]'
