document_id: 1SA.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHEN David and his men came home to Ziklag on the third day, they found that the Amalekites had made a raid on the South (the Negeb) and on Ziklag, and had struck Ziklag and burned it with fire,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And had taken the women and all who were there, both great and small, captive. They killed no one, but carried them off and went on their way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So David and his men came to the town, and behold, it was burned, and their wives and sons and daughters were taken captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then David and the men with him lifted up their voices and wept until they had no more strength to weep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' David''s two wives also had been taken captive, Ahinoam the Jezreelitess and Abigail, the widow of Nabal the Carmelite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' David was greatly distressed, for the men spoke of stoning him because the souls of them all were bitterly grieved, each man for his sons and daughters. But David encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened himself in the Lord his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' David said to Abiathar the priest, Ahimelech''s son, I pray you, bring me the ephod. And Abiathar brought him the ephod.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And David inquired of the Lord, saying, Shall I pursue this troop? Shall I overtake them? The Lord answered him, Pursue, for you shall surely overtake them and without fail recover all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So David went, he and the 600 men with him, and came to the brook Besor; there those remained who were left behind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But David pursued, he and 400 men, for 200 stayed behind who were too exhausted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint to cross the brook Besor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They found an Egyptian in the field and brought him to David, and gave him bread and he ate, and water to drink,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And a piece of a cake of figs and two clusters of raisins; and when he had eaten, his spirit returned to him, for he had eaten no food or drunk any water for three days and three nights.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And David said to him, To whom do you belong? And from where have you come? He said, I am a young man of Egypt, servant to an Amalekite; and my master left me because three days ago I fell sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' We had made a raid on the South (Negeb) of the Cherethites and upon that which belongs to Judah and upon the South (Negeb) of Caleb. And we burned Ziklag with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And David said to him, Can you take me down to this band? And he said, Swear to me by God that you will neither kill me nor deliver me into the hands of my master, and I will bring you down to this band.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And when he had brought David down, behold, the raiders were spread abroad over all the land, eating and drinking and dancing because of all the great spoil they had taken from the land of the Philistines and from the land of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And David smote them from twilight even to the evening of the next day, and not a man of them escaped, except 400 youths who rode camels and fled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' David recovered all that the Amalekites had taken and rescued his two wives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Nothing was missing, small or great, sons or daughters, spoil or anything that had been taken; David recovered all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Also David captured all the flocks and herds [which the enemy had], and the people drove those animals before him and said, This is David''s spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And David came to the 200 men who were so exhausted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint that they could not follow [him] and had been left at the brook Besor [with the baggage]. They came to meet David and those with him, and when he came near to the men, he saluted them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then all the wicked and base men who went with David said, Because they did not go with us, we will give them nothing of the spoil we have recovered, except that every man may lead away his wife and children and depart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' David said, You shall not do so, my brethren, with what the Lord has given us. He has preserved us and has delivered into our hands the troop that came against us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Who would listen to you in this matter? For as is the share of him who goes into the battle, so shall his share be who stays by the baggage. They shall share alike.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And from that day to this he made it a statute and ordinance for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When David came to Ziklag, he sent part of the spoil to the elders of Judah, his friends, saying, Here is a gift for you of the spoil of the enemies of the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For those in Bethel, Ramoth of the Negeb, Jattir,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Aroer, Siphmoth, Eshtemoa,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Racal, the cities of the Jerahmeelites, the cities of the Kenites,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Hormah, Bor-ashan, Athach,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Hebron, and for those in all the places David and his men had habitually haunted.'
