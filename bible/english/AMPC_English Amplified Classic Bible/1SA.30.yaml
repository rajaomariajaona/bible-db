document_id: 1SA.30,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW WHEN David and his men came home to Ziklag on the third day, they found that the Amalekites had made a raid on the South (the Negeb) and on Ziklag, and had struck Ziklag and burned it with fire,'
  '10':
  - type: text
    content: ' But David pursued, he and 400 men, for 200 stayed behind who were too exhausted '
  - type: text
    content: and
  - type: text
    content: ' faint to cross the brook Besor.'
  '11':
  - type: text
    content: ' They found an Egyptian in the field and brought him to David, and gave him bread and he ate, and water to drink,'
  '12':
  - type: text
    content: ' And a piece of a cake of figs and two clusters of raisins; and when he had eaten, his spirit returned to him, for he had eaten no food or drunk any water for three days and three nights.'
  '13':
  - type: text
    content: ' And David said to him, To whom do you belong? And from where have you come? He said, I am a young man of Egypt, servant to an Amalekite; and my master left me because three days ago I fell sick.'
  '14':
  - type: text
    content: ' We had made a raid on the South (Negeb) of the Cherethites and upon that which belongs to Judah and upon the South (Negeb) of Caleb. And we burned Ziklag with fire.'
  '15':
  - type: text
    content: ' And David said to him, Can you take me down to this band? And he said, Swear to me by God that you will neither kill me nor deliver me into the hands of my master, and I will bring you down to this band.'
  '16':
  - type: text
    content: ' And when he had brought David down, behold, the raiders were spread abroad over all the land, eating and drinking and dancing because of all the great spoil they had taken from the land of the Philistines and from the land of Judah.'
  '17':
  - type: text
    content: ' And David smote them from twilight even to the evening of the next day, and not a man of them escaped, except 400 youths who rode camels and fled.'
  '18':
  - type: text
    content: ' David recovered all that the Amalekites had taken and rescued his two wives.'
  '19':
  - type: text
    content: ' Nothing was missing, small or great, sons or daughters, spoil or anything that had been taken; David recovered all.'
  '2':
  - type: text
    content: ' And had taken the women and all who were there, both great and small, captive. They killed no one, but carried them off and went on their way.'
  '20':
  - type: text
    content: ' Also David captured all the flocks and herds [which the enemy had], and the people drove those animals before him and said, This is David''s spoil.'
  '21':
  - type: text
    content: ' And David came to the 200 men who were so exhausted '
  - type: text
    content: and
  - type: text
    content: ' faint that they could not follow [him] and had been left at the brook Besor [with the baggage]. They came to meet David and those with him, and when he came near to the men, he saluted them.'
  '22':
  - type: text
    content: ' Then all the wicked and base men who went with David said, Because they did not go with us, we will give them nothing of the spoil we have recovered, except that every man may lead away his wife and children and depart.'
  '23':
  - type: text
    content: ' David said, You shall not do so, my brethren, with what the Lord has given us. He has preserved us and has delivered into our hands the troop that came against us.'
  '24':
  - type: text
    content: ' Who would listen to you in this matter? For as is the share of him who goes into the battle, so shall his share be who stays by the baggage. They shall share alike.'
  '25':
  - type: text
    content: ' And from that day to this he made it a statute and ordinance for Israel.'
  '26':
  - type: text
    content: ' When David came to Ziklag, he sent part of the spoil to the elders of Judah, his friends, saying, Here is a gift for you of the spoil of the enemies of the Lord:'
  '27':
  - type: text
    content: ' For those in Bethel, Ramoth of the Negeb, Jattir,'
  '28':
  - type: text
    content: ' Aroer, Siphmoth, Eshtemoa,'
  '29':
  - type: text
    content: ' Racal, the cities of the Jerahmeelites, the cities of the Kenites,'
  '3':
  - type: text
    content: ' So David and his men came to the town, and behold, it was burned, and their wives and sons and daughters were taken captive.'
  '30':
  - type: text
    content: ' Hormah, Bor-ashan, Athach,'
  '31':
  - type: text
    content: ' Hebron, and for those in all the places David and his men had habitually haunted.'
  '4':
  - type: text
    content: ' Then David and the men with him lifted up their voices and wept until they had no more strength to weep.'
  '5':
  - type: text
    content: ' David''s two wives also had been taken captive, Ahinoam the Jezreelitess and Abigail, the widow of Nabal the Carmelite.'
  '6':
  - type: text
    content: ' David was greatly distressed, for the men spoke of stoning him because the souls of them all were bitterly grieved, each man for his sons and daughters. But David encouraged '
  - type: text
    content: and
  - type: text
    content: ' strengthened himself in the Lord his God.'
  '7':
  - type: text
    content: ' David said to Abiathar the priest, Ahimelech''s son, I pray you, bring me the ephod. And Abiathar brought him the ephod.'
  '8':
  - type: text
    content: ' And David inquired of the Lord, saying, Shall I pursue this troop? Shall I overtake them? The Lord answered him, Pursue, for you shall surely overtake them and without fail recover all.'
  '9':
  - type: text
    content: ' So David went, he and the 600 men with him, and came to the brook Besor; there those remained who were left behind.'
