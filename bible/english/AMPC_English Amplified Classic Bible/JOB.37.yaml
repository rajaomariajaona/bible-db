document_id: JOB.37,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' INDEED, [at His thunderings] my heart also trembles and leaps out of its place.'
  '10':
  - type: text
    content: ' By the breath of God ice is given, and the breadth of the waters is frozen over. [Ps. 147:17, 18.]'
  '11':
  - type: text
    content: ' He loads the thick cloud with moisture; He scatters the cloud of His lightning.'
  '12':
  - type: text
    content: ' And it is turned round about by His guidance, that they may do whatever He commands them upon the face of the habitable earth.'
  '13':
  - type: text
    content: ' Whether it be for correction or for His earth [generally] or for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, He causes it to come. [Exod. 9:18, 23; I Sam. 12:18, 19.]'
  '14':
  - type: text
    content: ' Hear this, O Job; stand still and consider the wondrous works of God.'
  '15':
  - type: text
    content: ' Do you know how God lays His command upon them and causes the lightning of His [storm] cloud to shine?'
  '16':
  - type: text
    content: ' Do you know how the clouds are balanced [and poised in the heavens], the wonderful works of Him Who is perfect in knowledge?'
  '17':
  - type: text
    content: ' [Or] why your garments are hot when He quiets the earth [in sultry summer] with the [oppressive] south wind?'
  '18':
  - type: text
    content: ' Can you along with Him spread out the sky, [which is] strong as a molten mirror?'
  '19':
  - type: text
    content: ' Tell us [Job] with what words of man we may address such a Being; we cannot state our case because we are in the dark [in the presence of the unsearchable God].'
  '2':
  - type: text
    content: ' Hear, oh, hear the roar of His voice and the sound of rumbling that goes out of His mouth!'
  '20':
  - type: text
    content: ' So shall it be told Him that I wish to speak? If a man speaks, shall he be swallowed up?'
  '21':
  - type: text
    content: ' And now men cannot look upon the light when it is bright in the skies, when the wind has passed and cleared them.'
  '22':
  - type: text
    content: ' Golden brightness '
  - type: text
    content: and
  - type: text
    content: ' splendor come out of the north; [if men can scarcely look upon it, how much less upon the] terrible splendor '
  - type: text
    content: and
  - type: text
    content: ' majesty God has upon Himself!'
  '23':
  - type: text
    content: ' Touching the Almighty, we cannot find Him out; He is excellent in power; and to justice and plenteous righteousness He does no violence [He will disregard no right]. [I Tim. 6:16.]'
  '24':
  - type: text
    content: ' Men therefore [reverently] fear Him; He regards '
  - type: text
    content: and
  - type: text
    content: ' respects not any who are wise in heart [in their own understanding and conceit]. [Matt. 10:28.]'
  '3':
  - type: text
    content: ' Under the whole heaven He lets it loose, and His lightning to the ends of the earth.'
  '4':
  - type: text
    content: ' After it His voice roars; He thunders with the voice of His majesty, and He restrains not [His lightnings against His adversaries] when His voice is heard.'
  '5':
  - type: text
    content: ' God thunders marvelously with His voice; He does great things which we cannot comprehend.'
  '6':
  - type: text
    content: ' For He says to the snow, Fall on the earth; likewise He speaks to the showers and to the downpour of His mighty rains.'
  '7':
  - type: text
    content: ' God seals up (stops, brings to a standstill by severe weather) the hand of every man [and now under His seal their hands are forced to inactivity], that all men whom He has made may know His doings (His sovereign power and their subjection to it).'
  '8':
  - type: text
    content: ' Then the beasts go into dens and remain in their lairs.'
  '9':
  - type: text
    content: ' Out of its chamber comes the whirlwind, and cold from the scattering winds.'
