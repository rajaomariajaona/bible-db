document_id: 2CH.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JOTHAM WAS twenty-five years old when he began to reign, and he reigned sixteen years in Jerusalem. His mother was Jerushah daughter of Zadok.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He did right in the sight of the Lord, to the extent of all that his father Uzziah had done. However, he did not invade the temple of the Lord. But the people still did corruptly.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He built the Upper Gate of the Lord''s house and did much building on the wall of Ophel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Moreover, he built cities in the hill country of Judah, and in the forests he built forts and towers.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' He fought with the king of the Ammonites and prevailed against them. The Ammonites gave him that year 100 talents of silver and 10,000 measures each of wheat and of barley. That much the Ammonites paid to him also the second year and third year.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So Jotham grew mighty, for he ordered his ways in the sight of the Lord his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Now the rest of Jotham''s acts, and all his wars and his ways, behold, they are written in the Book of the Kings of Israel and Judah.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He was twenty-five years old when he began to reign, and he reigned sixteen years in Jerusalem.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And Jotham slept with his fathers, and they buried him in the City of David. Ahaz his son reigned in his stead.'
