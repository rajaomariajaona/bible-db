document_id: JER.46,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE WORD of the Lord that came to Jeremiah the prophet concerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against the [Gentile] nations.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But that day is a day of the Lord, the Lord of hosts–a day of vengeance, that He may avenge Himself on His adversaries. And the sword shall devour, and it shall be satiated and shall drink its fill of their blood; for the Lord, the Lord of hosts has a sacrifice [like that of a great sin offering] in the north country by the river Euphrates.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go up into Gilead and take [healing] balm, O Virgin Daughter of Egypt! In vain do you use many medicines; for you there is no healing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' remedy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The nations have heard of your disgrace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame, and your cry has filled the earth. For warrior has stumbled against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thrown down warrior, and they have fallen both of them together.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The word that the Lord spoke to Jeremiah the prophet concerning the coming of Nebuchadrezzar king of Babylon and his smiting of the land of Egypt:'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Declare in Egypt and proclaim in Migdol; and publish in Memphis and in Tahpanhes; say, Stand forth and get yourself ready, for the sword devours round about you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why is your strong one [the sacred bull-god Apis] swept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dragged away? He stood not, because the Lord drove him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thrust him down.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [The Lord] made many to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall; yes, they fell one upon another. And they said, Arise, and let us go back to our own people and to the land of our birth, away from the sword of the oppressor.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They cried there, Pharaoh king of Egypt is destroyed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is only a noise; he has let the appointed time [in which God had him on probation] pass by!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As I live, says the King, Whose name is the Lord of hosts, surely like Tabor among the mountains and like Carmel by the sea, so shall he [the king of Babylon, standing out above other rulers] come.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O you daughter who dwells in Egypt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' you who dwell with her, furnish yourselves [with all you will need] to go into exile, for Memphis will be waste, desolate, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burned up, without inhabitant.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Concerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against Egypt: against the army of Pharaoh Necho king of Egypt, which was by the river Euphrates at Carchemish, which Nebuchadrezzar king of Babylon smote '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defeated in the fourth year of Jehoiakim son of Josiah king of Judah: [Isa. 19-20; Ezek. 29-32;Zech. 14:18, 19.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Egypt is a very fair heifer [like Apis the bull-god, to which the country is, so to speak, espoused], but destruction [a gadfly] is coming–out of the north it is coming [against her]!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also her hired troops in the midst of her are like fatted calves [in the stall], for they also are turned back and are fleeing together; they do not stand, because the day of their calamity is coming upon them, the time of their visitation (their inspection and punishment).'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sound [of Egypt fleeing from the enemy] is like the rustling of an escaping serpent, for her foes advance with a mighty army and come against her with axes, like those who fell trees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cut wood.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They shall cut down her forest, says the Lord, though it is impenetrable, because they [the invading army] are more numerous than locusts and cannot be counted.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Daughter of Egypt shall be disgraced; she shall be delivered into the hands of the people of the north [the Chaldeans].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord of hosts, the God of Israel, says: Behold, I will visit punishment upon Amon [the chief god of the sacred city, the capital of Upper Egypt] of No '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Thebes, and upon Pharaoh and Egypt, with her gods and her kings–even Pharaoh and all those [Jews and others] who put their trust in [Pharaoh as a support against Babylon].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will deliver them into the hands of those who seek their lives, and into the hand of Nebuchadrezzar king of Babylon, and into the hands of his servants. Afterward [Egypt] will be inhabited as in the days of old, says the Lord.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But fear not, O My servant Jacob, and be not dismayed, O Israel. For behold, I will save you from afar, and your offspring from the land of their exile; and Jacob will return and be quiet and at ease, and none will make him afraid.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Fear not, O Jacob My servant, says the Lord, for I am with you. For I will make a full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete end of all the nations to which I have driven you; yet I will not make a full end of you. But I will chasten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correct you in just measure, and I will not hold you guiltless by any means '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leave you unpunished.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Put in order the buckler and shield, and advance for battle!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Harness the horses, and mount, you horsemen! Stand forth with your helmets! Polish the spears, put on the coats of mail!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why have I seen it? They are dismayed and have turned backward, and their mighty warriors are beaten down. They flee in haste and look not back; terror is on every side! says the Lord. [Ps. 31:13; Jer. 6:25; 20:3, 10; 49:29.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let not the swift flee nor the mighty man escape; in the north by the river Euphrates they stumble and fall.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who is this that rises up like the Nile [River], like the branches [of the Nile in the delta of Egypt] whose waters surge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' toss?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Egypt rises like the Nile, like the rivers whose waters surge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' toss. She says, I will rise, I will cover the earth; I will destroy cities and their inhabitants.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go up, you horses, and drive furiously, you chariots! Let the warriors go forth–men of Ethiopia and Put who handle the shield, men of Lud who are skilled in handling and stringing the bow.'
