document_id: LEV.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Moses took the anointing oil and anointed the tabernacle and all that was in it, and consecrated them.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And he sprinkled some of the oil on the altar seven times and anointed the altar and all its utensils, and the laver and its base, to consecrate them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And he poured some of the anointing oil upon Aaron''s head and anointed him to consecrate him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And Moses brought Aaron''s sons and put undertunics on them and girded them with sashes and wound turbans on them, as the Lord commanded Moses.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then he brought the bull of the sin offering, and Aaron and his sons laid their hands on the head of the bull of the sin offering.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Moses killed it and took the blood and put it on the horns of the altar round about with his finger and poured the blood at the base of the altar and purified and consecrated the altar to make atonement for it.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He took all the fat that was on the entrails, and the lobe of the liver, and the two kidneys with their fat, and Moses burned them on the altar.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But the bull [the sin offering] and its hide, its flesh, and its dung he burned with fire outside the camp, as the Lord commanded Moses.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He brought the ram for the burnt offering, and Aaron and his sons laid their hands on the head of the ram.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And Moses killed it and dashed the blood upon the altar round about.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Take Aaron and his sons with him, and the garments [symbols of their office], and the anointing oil, and the bull of the sin offering, and the two rams, and the basket of unleavened bread;'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He cut the ram into pieces and Moses burned the head, the pieces, and the fat.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And he washed the entrails and the legs in water; then Moses burned the whole ram on the altar; it was a burnt sacrifice, for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance, an offering made by fire to the Lord, as the Lord commanded Moses.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And he brought the other ram, the ram of consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination, and Aaron and his sons laid their hands upon the head of the ram.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And Moses killed it and took some of its blood and put it on the tip of Aaron''s right ear, and on the thumb of his right hand, and on the great toe of his right foot.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And he brought Aaron''s sons and Moses put some of the blood on the tips of their right ears, and the thumbs of their right hands, and the great toes of their right feet; and Moses dashed the blood upon the altar round about.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And he took the fat, the fat tail, all the fat that was on the entrails, the lobe of the liver, and the two kidneys and their fat, and the right thigh;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And out of the basket of unleavened bread, that was before the Lord, he took one unleavened cake, a cake of oiled bread, and one wafer and put them on the fat and on the right thigh;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And he put all these in Aaron''s hands and his sons'' hands and waved them for a wave offering before the Lord.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Then Moses took these things from their hands and burned them on the altar with the burnt offering as an ordination offering, for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance, an offering made by fire to the Lord.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And Moses took the breast and waved it for a wave offering before the Lord; for of the ram of consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination it was Moses'' portion, as the Lord commanded Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And assemble all the congregation at the door of the Tent of Meeting.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And Moses took some of the anointing oil and some of the blood which was on the altar and sprinkled it on Aaron and his garments, and upon his sons and their garments also; so Moses consecrated Aaron and his garments, and his sons and his sons'' garments.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And Moses said to Aaron and his sons, Boil the flesh at the door of the Tent of Meeting and there eat it with the bread that is in the basket of consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination, as I commanded, saying, Aaron and his sons shall eat it.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And what remains of the flesh and of the bread you shall burn with fire.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And you shall not go out of the door of the Tent of Meeting for seven days, until the days of your consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordination are ended; for it will take seven days to consecrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordain you.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' As has been done this day, so the Lord has commanded to do for your atonement.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' At the door of the Tent of Meeting you shall remain day and night for seven days, doing what the Lord has charged you to do, that you die not; for so I am commanded.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' So Aaron and his sons did all the things which the Lord commanded through Moses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Moses did as the Lord commanded him, and the congregation was assembled at the door of the Tent of Meeting.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Moses told the congregation, This is what the Lord has commanded to be done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Moses brought Aaron and his sons and washed them with water.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He put on Aaron the long undertunic, girded him with the long sash, clothed him with the robe, put the ephod (an upper vestment) upon him, and girded him with the skillfully woven cords attached to the ephod, binding it to him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And Moses put upon Aaron the breastplate; also he put in the breastplate the Urim and the Thummim [articles upon which the high priest put his hand when seeking the divine will concerning the nation].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And he put the turban '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' miter on his head; on it, in front, Moses put the shining gold plate, the holy diadem, as the Lord commanded him.'
