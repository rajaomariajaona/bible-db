document_id: 1CO.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW AS to the matters of which you wrote me. It is well [and by that I mean advantageous, expedient, profitable, and wholesome] for a man not to touch a woman [to cohabit with her] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' to remain unmarried.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But to the married people I give charge–not I but the Lord–that the wife is not to separate from her husband.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But if she does [separate from and divorce him], let her remain single or else be reconciled to her husband. And [I charge] the husband [also] that he should not put away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' divorce his wife.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' To the rest I declare–I, not the Lord [for Jesus did not discuss this]–that if any brother has a wife who does not believe [in Christ] and she consents to live with him, he should not leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' divorce her.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And if any woman has an unbelieving husband and he consents to live with her, she should not leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' divorce him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the unbelieving husband is set apart (separated, withdrawn from heathen contamination, and affiliated with the Christian people) by union with his consecrated (set-apart) wife, and the unbelieving wife is set apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' separated through union with her consecrated husband. Otherwise your children would be unclean (unblessed heathen, outside the Christian covenant), but as it is they are prepared for God [pure and clean].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if the unbelieving partner [actually] leaves, let him do so; in such [cases the remaining] brother or sister is not morally bound. But God has called us to peace.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For, wife, how can you be sure of converting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saving your husband? Husband, how can you be sure of converting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saving your wife?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Only, let each one [seek to conduct himself and regulate his affairs so as to] lead the life which the Lord has allotted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imparted to him and to which God has invited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' summoned him. This is my order in all the churches.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Was anyone at the time of his summons [from God] already circumcised? Let him not seek to remove the evidence of circumcision. Was anyone at the time [God] called him uncircumcised? Let him not be circumcised.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For circumcision is nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counts for nothing, neither does uncircumcision, but [what counts is] keeping the commandments of God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' But because of the temptation to impurity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to avoid immorality, let each [man] have his own wife and let each [woman] have her own husband.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Everyone should remain after God calls him in the station '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' condition of life in which the summons found him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Were you a slave when you were called? Do not let that trouble you. But if you are able to gain your freedom, avail yourself of the opportunity.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For he who as a slave was summoned in [to union with] the Lord is a freedman of the Lord, just so he who was free when he was called is a bond servant of Christ (the Messiah).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' You were bought with a price [purchased with a preciousness and paid for by Christ]; then do not yield yourselves up to become [in your own estimation] slaves to men [but consider yourselves slaves to Christ].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' So, brethren, in whatever station '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' state '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' condition of life each one was when he was called, there let him continue with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' close to God.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Now concerning the virgins (the marriageable maidens) I have no command of the Lord, but I give my opinion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advice as one who by the Lord''s mercy is rendered trustworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' I think then, because of the impending distress [that is even now setting in], it is well (expedient, profitable, and wholesome) for a person to remain as he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' she is.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Are you bound to a wife? Do not seek to be free. Are you free from a wife? Do not seek a wife.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' But if you do marry, you do not sin [in doing so], and if a virgin marries, she does not sin [in doing so]. Yet those who marry will have physical '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' earthly troubles, and I would like to spare you that.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' I mean, brethren, the appointed time has been winding down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' it has grown very short. From now on, let even those who have wives be as if they had none,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The husband should give to his wife her conjugal rights (goodwill, kindness, and what is due her as his wife), and likewise the wife to her husband.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And those who weep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mourn as though they were not weeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mourning, and those who rejoice as though they were not rejoicing, and those who buy as though they did not possess anything,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And those who deal with this world [overusing the enjoyments of this life] as though they were not absorbed by it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as if they had no dealings with it. For the outward form of this world (the present world order) is passing away.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' My desire is to have you free from all anxiety '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressing care. The unmarried man is anxious about the things of the Lord–how he may please the Lord;'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' But the married man is anxious about worldly matters–how he may please his wife–'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And he is drawn in diverging directions [his interests are divided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he is distracted from his devotion to God]. And the unmarried woman or girl is concerned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxious about the matters of the Lord, how to be wholly separated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart in body and spirit; but the married woman has her cares [centered] in earthly affairs–how she may please her husband.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Now I say this for your own welfare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profit, not to put [a halter of] restraint upon you, but to promote what is seemly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in good order and to secure your undistracted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undivided devotion to the Lord.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' But if any man thinks that he is not acting properly toward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in regard to his virgin [that he is preparing disgrace for her or incurring reproach], in case she is passing the bloom of her youth and if there is need for it, let him do what to him seems right; he does not sin; let them marry.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' But whoever is firmly established in his heart [strong in mind and purpose], not being forced by necessity but having control over his own will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desire, and has resolved this in his heart to keep his own virginity, he is doing well.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' So also then, he [the father] who gives his virgin (his daughter) in marriage does well, and he [the father] who does not give [her] in marriage does better.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' A wife is bound to her husband by law as long as he lives. If the husband dies, she is free to be married to whom she will, only [provided that he too is] in the Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For the wife does not have [exclusive] authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' control over her own body, but the husband [has his rights]; likewise also the husband does not have [exclusive] authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' control over his body, but the wife [has her rights].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But in my opinion [a widow] is happier (more blessed and to be envied) if she does not remarry. And also I think I have the Spirit of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Do not refuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deprive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defraud each other [of your due marital rights], except perhaps by mutual consent for a time, so that you may devote yourselves unhindered to prayer. But afterwards resume marital relations, lest Satan tempt you [to sin] through your lack of restraint of sexual desire. [Exod. 19:15.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But I am saying this more as a matter of permission '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' concession, not as a command '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' regulation.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I wish that all men were like I myself am [in this matter of self-control]. But each has his own special gift from God, one of this kind and one of another.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But to the unmarried people and to the widows, I declare that it is well (good, advantageous, expedient, and wholesome) for them to remain [single] even as I do.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But if they have not self-control (restraint of their passions), they should marry. For it is better to marry than to be aflame [with passion and tortured continually with ungratified desire].'
