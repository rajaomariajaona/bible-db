document_id: EZK.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND YOU, son of man, take a tile and lay it before you, and make upon it a drawing of a city, even Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And put siege works against it, build a siege wall against it, and cast up a mound against it; set camps also against it and set battering rams against it round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Moreover, take a plate of iron and place it for an iron wall between you and the city; and set your face toward it and it shall be besieged, and you shall press the siege against it. This is a sign to the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then [bound as you are] lie upon your left [and north] side to bear symbolically the iniquity of the house of the ten tribes of Israel upon that side. According to the number of days that you shall lie upon it you shall bear their iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For I have laid upon you the years of their iniquity, according to the number of the days, 390 days [representing 390 years]; so you shall bear the iniquity of the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And when you have fulfilled the days for Israel, lie again, but on your right [and south] side, and you shall bear the iniquity of the house of Judah forty days. I have appointed you one day for each year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore you shall set your face toward the siege of Jerusalem and your arm shall be uncovered [ready for battle], and you shall prophesy against [the city].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And, behold, I will lay bands upon you and you shall not turn yourself from one side to another till you have ended the days of your siege.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Also take wheat, barley, beans, lentils, millet, and spelt, and put them into one vessel and make bread of them. According to the number of the days that you shall lie upon your side, 390 days you shall eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the food you eat shall be by weight, twenty shekels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a full half pound a day, to be eaten at a fixed time each day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You shall drink water by measure also, about one quart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the sixth part of a hin; you shall drink at a fixed time each day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you shall eat your food as barley cakes and you shall bake it with human dung as fuel in the sight of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Lord said, Even thus shall the children of Israel eat their defiled bread among the nations to whom I will drive them. [Hos. 9:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then said I, Ah, Lord God! Behold, I have never defiled myself. From my youth up even till now have I not eaten of that which dies of itself or is torn in pieces; neither did there ever come abominable flesh into my mouth. [Acts 10:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then He said to me, Behold, I will let you use cow''s dung instead of human dung, and you shall prepare your food with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, He said to me, Son of man, behold, I will break the staff of bread [by which life is supported] in Jerusalem; and they shall eat bread rationed by weight and with fearfulness, and they shall drink water rationed by measure and with dismay (silent, speechless grief caused by the impending starvation), [Lev. 26:26; Ps. 105:16; Isa. 3:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' In order that they may lack bread and water and look at one another in dismay and waste away [in their punishment] for their iniquity.'
