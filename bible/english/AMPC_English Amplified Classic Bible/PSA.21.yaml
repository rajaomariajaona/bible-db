document_id: PSA.21,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE KING [David] shall joy in Your strength, O Lord; and in Your salvation how greatly shall he rejoice!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their offspring You will destroy from the earth, and their sons from among the children of men.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they planned evil against You; they conceived a mischievous plot which they are not able to perform.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You will make them turn their backs; You will aim Your bow [of divine justice] at their faces.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be exalted, Lord, in Your strength; we will sing and praise Your power.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have given him his heart''s desire and have not withheld the request of his lips. Selah [pause, and think of that]!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You send blessings of good things to meet him; You set a crown of pure gold on his head.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He asked life of You, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' You gave it to him–long life forever and evermore.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His glory is great because of Your aid; splendor and majesty You bestow upon him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You make him to be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a blessing forever; You make him exceedingly glad with the joy of Your presence. [Gen. 12:2.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the king trusts, relies on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is confident in the Lord, and through the mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast love of the Most High he will never be moved.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your hand shall find all Your enemies; Your right hand shall find all those who hate You.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will make them as if in a blazing oven in the time of Your anger; the Lord will swallow them up in His wrath, and the fire will utterly consume them.'
