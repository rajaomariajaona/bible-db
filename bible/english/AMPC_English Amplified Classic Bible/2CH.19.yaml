document_id: 2CH.19,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JEHOSHAPHAT THE king of Judah returned safely to his house in Jerusalem.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Whenever any controversy shall come to you from your brethren who dwell in their cities, between blood and blood, between law and commandment, statutes and judgments, you shall warn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruct them that they may not be guilty before the Lord; otherwise wrath will come upon you and your brethren. Do this and you will not be guilty.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And behold, Amariah the chief priest is over you in all matters of the Lord, and Zebadiah son of Ishmael, the governor of the house of Judah, in all the king''s matters; also the Levites will serve you as officers. Deal courageously [be strong and do], and may the Lord be with the good!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Jehu son of Hanani, the seer, went out to meet him and said to Jehoshaphat, Should you help the ungodly and love those who hate the Lord? Because of this, wrath has gone out against you from the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But there are good things found in you, for you have destroyed the Asherim out of the land and have set your heart to seek God [with all your soul''s desire].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Jehoshaphat dwelt at Jerusalem, and he went out again among the people from Beersheba to the hill country of Ephraim and brought them back to the Lord, the God of their fathers.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' He appointed judges throughout all the fortified cities of Judah, city by city,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And said to the judges, Be careful what you do, for you judge not for man but for the Lord, and He is with you in the matter of judgment.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So now let the reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear of the Lord be upon you; take heed what you do, for there is no injustice with the Lord our God, or partiality or taking of bribes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Also in Jerusalem, Jehoshaphat set certain Levites, priests, and heads of families of Israel to give judgment for the Lord and decide controversies. When they [of the commission] returned to Jerusalem,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The king charged them, Do this in the fear of the Lord, faithfully, with integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a blameless heart.'
