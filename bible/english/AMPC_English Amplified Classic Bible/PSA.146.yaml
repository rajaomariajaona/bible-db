document_id: PSA.146
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! (Hallelujah!) Praise the Lord, O my soul!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' While I live will I praise the Lord; I will sing praises to my God while I have any being.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Put not your trust in princes, in a son of man, in whom there is no help.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When his breath leaves him, he returns to his earth; in that very day his [previous] thoughts, plans, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposes perish. [I Cor. 2:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Happy (blessed, fortunate, enviable) is he who has the God of [special revelation to] Jacob for his help, whose hope is in the Lord his God, [Gen. 32:30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who made heaven and earth, the sea, and all that is in them, Who keeps truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is faithful forever,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Who executes justice for the oppressed, Who gives food to the hungry. The Lord sets free the prisoners,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord opens the eyes of the blind, the Lord lifts up those who are bowed down, the Lord loves the [uncompromisingly] righteous (those upright in heart and in right standing with Him). [Luke 13:13; John 9:7, 32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Lord protects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserves the strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' temporary residents, He upholds the fatherless and the widow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sets them upright, but the way of the wicked He makes crooked (turns upside down and brings to ruin).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord shall reign forever, even Your God, O Zion, from generation to generation. Praise the Lord! (Hallelujah!) [Ps. 10:16; Rev. 11:15.]'
