type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! (Hallelujah!) Praise the Lord, O my soul!'
  '10':
  - type: text
    content: ' The Lord shall reign forever, even Your God, O Zion, from generation to generation. Praise the Lord! (Hallelujah!) [Ps. 10:16; Rev. 11:15.]'
  '2':
  - type: text
    content: ' While I live will I praise the Lord; I will sing praises to my God while I have any being.'
  '3':
  - type: text
    content: ' Put not your trust in princes, in a son of man, in whom there is no help.'
  '4':
  - type: text
    content: ' When his breath leaves him, he returns to his earth; in that very day his [previous] thoughts, plans, '
  - type: text
    content: and
  - type: text
    content: ' purposes perish. [I Cor. 2:6.]'
  '5':
  - type: text
    content: ' Happy (blessed, fortunate, enviable) is he who has the God of [special revelation to] Jacob for his help, whose hope is in the Lord his God, [Gen. 32:30.]'
  '6':
  - type: text
    content: ' Who made heaven and earth, the sea, and all that is in them, Who keeps truth '
  - type: text
    content: and
  - type: text
    content: ' is faithful forever,'
  '7':
  - type: text
    content: ' Who executes justice for the oppressed, Who gives food to the hungry. The Lord sets free the prisoners,'
  '8':
  - type: text
    content: ' The Lord opens the eyes of the blind, the Lord lifts up those who are bowed down, the Lord loves the [uncompromisingly] righteous (those upright in heart and in right standing with Him). [Luke 13:13; John 9:7, 32.]'
  '9':
  - type: text
    content: ' The Lord protects '
  - type: text
    content: and
  - type: text
    content: ' preserves the strangers '
  - type: text
    content: and
  - type: text
    content: ' temporary residents, He upholds the fatherless and the widow '
  - type: text
    content: and
  - type: text
    content: ' sets them upright, but the way of the wicked He makes crooked (turns upside down and brings to ruin).'
