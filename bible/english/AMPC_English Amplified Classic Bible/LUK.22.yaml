document_id: LUK.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE Festival of Unleavened Bread was drawing near, which is called the Passover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the chief priests and the scribes were seeking how to do away with [Jesus], for they feared the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But [then] Satan entered into Judas, called Iscariot, who was one of the Twelve [apostles].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he went away and discussed with the chief priests and captains how he might betray Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliver Him up to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they were delighted and pledged [themselves] to give him money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So he agreed [to this], and sought an opportunity to betray Him to them [without an uprising] in the absence of the throng.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then came the day of Unleavened Bread on which the Passover [lamb] had to be slain. [Exod. 12:18-20; Deut. 16:5-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So Jesus sent Peter and John, saying, Go and prepare for us the Passover meal, that we may eat it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They said to Him, Where do You want us to prepare [it]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He said to them, Behold, when you have gone into the city, a man carrying an earthen jug '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pitcher of water will meet you; follow him into the house which he enters,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And say to the master of the house, The Teacher asks you, Where is the guest room, where I may eat the Passover [meal] with My disciples?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he will show you a large room upstairs, furnished [with carpets and with couches properly spread]; there make [your] preparations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they went and found it [just] as He had said to them; and they made ready the Passover [supper].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when the hour came, [Jesus] reclined at table, and the apostles with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And He said to them, I have earnestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intensely desired to eat this Passover with you before I suffer;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For I say to you, I shall eat it no more until it is fulfilled in the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And He took a cup, and when He had given thanks, He said, Take this and divide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distribute it among yourselves;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For I say to you that from now on I shall not drink of the fruit of the vine at all until the kingdom of God comes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then He took a loaf [of bread], and when He had given thanks, He broke [it] and gave it to them saying, This is My body which is given for you; do this in remembrance of Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And in like manner, He took the cup after supper, saying, This cup is the new testament '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' covenant [ratified] in My blood, which is shed (poured out) for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But, behold, the hand of him who is now engaged in betraying Me is with Me on the table. [Ps. 41:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For the Son of Man is going as it has been determined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appointed, but woe to that man by whom He is betrayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivered up!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they began to inquire among themselves which of them it was who was about to do this. [Ps. 41:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Now an eager contention arose among them [as to] which of them was considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reputed to be the greatest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But Jesus said to them, The kings of the Gentiles are deified by them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exercise lordship [ruling as emperor-gods] over them; and those in authority over them are called benefactors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well-doers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But this is not to be so with you; on the contrary, let him who is the greatest among you become like the youngest, and him who is the chief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leader like one who serves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For who is the greater, the one who reclines at table (the master), or the one who serves? Is it not the one who reclines at table? But I am in your midst as One Who serves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And you are those who have remained [throughout] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persevered with Me in My trials;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And as My Father has appointed a kingdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conferred it on Me, so do I confer on you [the privilege and decree],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' That you may eat and drink at My table in My kingdom and sit on thrones, judging the twelve tribes of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Simon, Simon (Peter), listen! Satan has asked excessively that [all of] you be given up to him [out of the power and keeping of God], that he might sift [all of] you like grain, [Job 1:6-12; Amos 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But I have prayed especially for you [Peter], that your [own] faith may not fail; and when you yourself have turned again, strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish your brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And [Simon Peter] said to Him, Lord, I am ready to go with You both to prison and to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But Jesus said, I tell you, Peter, before a [single] cock shall crow this day, you will three times [utterly] deny that you know Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And He said to them, When I sent you out with no purse or [provision] bag or sandals, did you lack anything? They answered, Nothing!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then He said to them, But now let him who has a purse take it, and also [his provision] bag; and let him who has no sword sell his mantle and buy a sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For I tell you that this Scripture must yet be fulfilled in Me: And He was counted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' classed among the wicked (the outlaws, the criminals); for what is written about Me has its fulfillment [has reached its end and is finally settled]. [Isa. 53:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And they said, Look, Lord! Here are two swords. And He said to them, It is enough.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And He came out and went, as was His habit, to the Mount of Olives, and the disciples also followed Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And when He came to the place, He said to them, Pray that you may not [at all] enter into temptation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And He withdrew from them about a stone''s throw and knelt down and prayed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Saying, Father, if You are willing, remove this cup from Me; yet not My will, but [always] Yours be done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And there appeared to Him an angel from heaven, strengthening Him in spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And being in an agony [of mind], He prayed [all the] more earnestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intently, and His sweat became like great clots of blood dropping down upon the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And when He got up from prayer, He came to the disciples and found them sleeping from grief,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And He said to them, Why do you sleep? Get up and pray that you may not enter [at all] into temptation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And while He was still speaking, behold, there came a crowd, and the man called Judas, one of the Twelve [apostles], was going before [leading] them. He drew near to Jesus to kiss Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' But Jesus said to him, Judas! Would you betray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliver up the Son of Man with a kiss?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And when those who were around Him saw what was about to happen, they said, Lord, shall we strike with the sword?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And one of them struck the bond servant of the high priest and cut off his ear, the right one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' But Jesus said, Permit them to go so far [as to seize Me]. And He touched the little (insignificant) ear and healed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Then Jesus said to those who had come out against Him–the chief priests and captains of the temple and elders [of the Sanhedrin]–Have you come out with swords and clubs as [you would] against a robber?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' When I was with you day after day in the temple [enclosure], you did not stretch forth [your] hands against Me. But this is your hour–and the power [which] darkness [gives you has its way].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' Then they seized Him and led Him away, bringing Him into the house of the high priest. Peter was following at a distance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' And when they had kindled a fire in the middle of the courtyard and were seated together, Peter sat among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' Then a servant girl, seeing him as he sat in the firelight and gazing [intently] at him, said, This man too was with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' But he denied it and said, Woman, I do not know Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' And a little later someone else saw him and said, You are one of them also. But Peter said, Man, I am not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' And when about an hour more had elapsed, still another emphatically insisted, It is the truth that this man also was with Him, for he too is a Galilean!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' But Peter said, Man, I do not know what you are talking about. And instantly, while he was still speaking, the cock crowed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' And the Lord turned and looked at Peter. And Peter recalled the Lord''s words, how He had told him, Before the cock crows today, you will deny Me thrice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' And he went out and wept bitterly [that is, with painfully moving grief].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' Now the men who had Jesus in custody treated Him with contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scoffed at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ridiculed Him and beat Him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' They blindfolded Him also and asked Him, Prophesy! Who is it that struck You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' And they said many other evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slanderous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insulting words against Him, reviling Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' As soon as it was day, the assembly of the elders of the people gathered together, both chief priests and scribes; and they led Him into their council (the Sanhedrin), and they said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' If You are the Christ (the Messiah), tell us. But He said to them, If I tell you, you will not believe (trust in, cleave to, and rely on what I say),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' And if I question you, you will not answer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' But hereafter (from this time on), the Son of Man shall be seated at the right hand of the power of God. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' And they all said, You are the Son of God, then? And He said to them, It is just as you say; I AM.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' And they said, What further evidence do we need? For we have heard [it] ourselves from His own mouth!'
