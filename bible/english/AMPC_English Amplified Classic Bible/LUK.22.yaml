document_id: LUK.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THE Festival of Unleavened Bread was drawing near, which is called the Passover.'
  '10':
  - type: text
    content: ' He said to them, Behold, when you have gone into the city, a man carrying an earthen jug '
  - type: text
    content: or
  - type: text
    content: ' pitcher of water will meet you; follow him into the house which he enters,'
  '11':
  - type: text
    content: ' And say to the master of the house, The Teacher asks you, Where is the guest room, where I may eat the Passover [meal] with My disciples?'
  '12':
  - type: text
    content: ' And he will show you a large room upstairs, furnished [with carpets and with couches properly spread]; there make [your] preparations.'
  '13':
  - type: text
    content: ' And they went and found it [just] as He had said to them; and they made ready the Passover [supper].'
  '14':
  - type: text
    content: ' And when the hour came, [Jesus] reclined at table, and the apostles with Him.'
  '15':
  - type: text
    content: ' And He said to them, I have earnestly '
  - type: text
    content: and
  - type: text
    content: ' intensely desired to eat this Passover with you before I suffer;'
  '16':
  - type: text
    content: ' For I say to you, I shall eat it no more until it is fulfilled in the kingdom of God.'
  '17':
  - type: text
    content: ' And He took a cup, and when He had given thanks, He said, Take this and divide '
  - type: text
    content: and
  - type: text
    content: ' distribute it among yourselves;'
  '18':
  - type: text
    content: ' For I say to you that from now on I shall not drink of the fruit of the vine at all until the kingdom of God comes.'
  '19':
  - type: text
    content: ' Then He took a loaf [of bread], and when He had given thanks, He broke [it] and gave it to them saying, This is My body which is given for you; do this in remembrance of Me.'
  '2':
  - type: text
    content: ' And the chief priests and the scribes were seeking how to do away with [Jesus], for they feared the people.'
  '20':
  - type: text
    content: ' And in like manner, He took the cup after supper, saying, This cup is the new testament '
  - type: text
    content: or
  - type: text
    content: ' covenant [ratified] in My blood, which is shed (poured out) for you.'
  '21':
  - type: text
    content: ' But, behold, the hand of him who is now engaged in betraying Me is with Me on the table. [Ps. 41:9.]'
  '22':
  - type: text
    content: ' For the Son of Man is going as it has been determined '
  - type: text
    content: and
  - type: text
    content: ' appointed, but woe to that man by whom He is betrayed '
  - type: text
    content: and
  - type: text
    content: ' delivered up!'
  '23':
  - type: text
    content: ' And they began to inquire among themselves which of them it was who was about to do this. [Ps. 41:9.]'
  '24':
  - type: text
    content: ' Now an eager contention arose among them [as to] which of them was considered '
  - type: text
    content: and
  - type: text
    content: ' reputed to be the greatest.'
  '25':
  - type: text
    content: ' But Jesus said to them, The kings of the Gentiles are deified by them '
  - type: text
    content: and
  - type: text
    content: ' exercise lordship [ruling as emperor-gods] over them; and those in authority over them are called benefactors '
  - type: text
    content: and
  - type: text
    content: ' well-doers.'
  '26':
  - type: text
    content: ' But this is not to be so with you; on the contrary, let him who is the greatest among you become like the youngest, and him who is the chief '
  - type: text
    content: and
  - type: text
    content: ' leader like one who serves.'
  '27':
  - type: text
    content: ' For who is the greater, the one who reclines at table (the master), or the one who serves? Is it not the one who reclines at table? But I am in your midst as One Who serves.'
  '28':
  - type: text
    content: ' And you are those who have remained [throughout] '
  - type: text
    content: and
  - type: text
    content: ' persevered with Me in My trials;'
  '29':
  - type: text
    content: ' And as My Father has appointed a kingdom '
  - type: text
    content: and
  - type: text
    content: ' conferred it on Me, so do I confer on you [the privilege and decree],'
  '3':
  - type: text
    content: ' But [then] Satan entered into Judas, called Iscariot, who was one of the Twelve [apostles].'
  '30':
  - type: text
    content: ' That you may eat and drink at My table in My kingdom and sit on thrones, judging the twelve tribes of Israel.'
  '31':
  - type: text
    content: ' Simon, Simon (Peter), listen! Satan has asked excessively that [all of] you be given up to him [out of the power and keeping of God], that he might sift [all of] you like grain, [Job 1:6-12; Amos 9:9.]'
  '32':
  - type: text
    content: ' But I have prayed especially for you [Peter], that your [own] faith may not fail; and when you yourself have turned again, strengthen '
  - type: text
    content: and
  - type: text
    content: ' establish your brethren.'
  '33':
  - type: text
    content: ' And [Simon Peter] said to Him, Lord, I am ready to go with You both to prison and to death.'
  '34':
  - type: text
    content: ' But Jesus said, I tell you, Peter, before a [single] cock shall crow this day, you will three times [utterly] deny that you know Me.'
  '35':
  - type: text
    content: ' And He said to them, When I sent you out with no purse or [provision] bag or sandals, did you lack anything? They answered, Nothing!'
  '36':
  - type: text
    content: ' Then He said to them, But now let him who has a purse take it, and also [his provision] bag; and let him who has no sword sell his mantle and buy a sword.'
  '37':
  - type: text
    content: ' For I tell you that this Scripture must yet be fulfilled in Me: And He was counted '
  - type: text
    content: and
  - type: text
    content: ' classed among the wicked (the outlaws, the criminals); for what is written about Me has its fulfillment [has reached its end and is finally settled]. [Isa. 53:12.]'
  '38':
  - type: text
    content: ' And they said, Look, Lord! Here are two swords. And He said to them, It is enough.'
  '39':
  - type: text
    content: ' And He came out and went, as was His habit, to the Mount of Olives, and the disciples also followed Him.'
  '4':
  - type: text
    content: ' And he went away and discussed with the chief priests and captains how he might betray Him '
  - type: text
    content: and
  - type: text
    content: ' deliver Him up to them.'
  '40':
  - type: text
    content: ' And when He came to the place, He said to them, Pray that you may not [at all] enter into temptation.'
  '41':
  - type: text
    content: ' And He withdrew from them about a stone''s throw and knelt down and prayed,'
  '42':
  - type: text
    content: ' Saying, Father, if You are willing, remove this cup from Me; yet not My will, but [always] Yours be done.'
  '43':
  - type: text
    content: ' And there appeared to Him an angel from heaven, strengthening Him in spirit.'
  '44':
  - type: text
    content: ' And being in an agony [of mind], He prayed [all the] more earnestly '
  - type: text
    content: and
  - type: text
    content: ' intently, and His sweat became like great clots of blood dropping down upon the ground.'
  '45':
  - type: text
    content: ' And when He got up from prayer, He came to the disciples and found them sleeping from grief,'
  '46':
  - type: text
    content: ' And He said to them, Why do you sleep? Get up and pray that you may not enter [at all] into temptation.'
  '47':
  - type: text
    content: ' And while He was still speaking, behold, there came a crowd, and the man called Judas, one of the Twelve [apostles], was going before [leading] them. He drew near to Jesus to kiss Him,'
  '48':
  - type: text
    content: ' But Jesus said to him, Judas! Would you betray '
  - type: text
    content: and
  - type: text
    content: ' deliver up the Son of Man with a kiss?'
  '49':
  - type: text
    content: ' And when those who were around Him saw what was about to happen, they said, Lord, shall we strike with the sword?'
  '5':
  - type: text
    content: ' And they were delighted and pledged [themselves] to give him money.'
  '50':
  - type: text
    content: ' And one of them struck the bond servant of the high priest and cut off his ear, the right one.'
  '51':
  - type: text
    content: ' But Jesus said, Permit them to go so far [as to seize Me]. And He touched the little (insignificant) ear and healed him.'
  '52':
  - type: text
    content: ' Then Jesus said to those who had come out against Him–the chief priests and captains of the temple and elders [of the Sanhedrin]–Have you come out with swords and clubs as [you would] against a robber?'
  '53':
  - type: text
    content: ' When I was with you day after day in the temple [enclosure], you did not stretch forth [your] hands against Me. But this is your hour–and the power [which] darkness [gives you has its way].'
  '54':
  - type: text
    content: ' Then they seized Him and led Him away, bringing Him into the house of the high priest. Peter was following at a distance.'
  '55':
  - type: text
    content: ' And when they had kindled a fire in the middle of the courtyard and were seated together, Peter sat among them.'
  '56':
  - type: text
    content: ' Then a servant girl, seeing him as he sat in the firelight and gazing [intently] at him, said, This man too was with Him.'
  '57':
  - type: text
    content: ' But he denied it and said, Woman, I do not know Him!'
  '58':
  - type: text
    content: ' And a little later someone else saw him and said, You are one of them also. But Peter said, Man, I am not!'
  '59':
  - type: text
    content: ' And when about an hour more had elapsed, still another emphatically insisted, It is the truth that this man also was with Him, for he too is a Galilean!'
  '6':
  - type: text
    content: ' So he agreed [to this], and sought an opportunity to betray Him to them [without an uprising] in the absence of the throng.'
  '60':
  - type: text
    content: ' But Peter said, Man, I do not know what you are talking about. And instantly, while he was still speaking, the cock crowed.'
  '61':
  - type: text
    content: ' And the Lord turned and looked at Peter. And Peter recalled the Lord''s words, how He had told him, Before the cock crows today, you will deny Me thrice.'
  '62':
  - type: text
    content: ' And he went out and wept bitterly [that is, with painfully moving grief].'
  '63':
  - type: text
    content: ' Now the men who had Jesus in custody treated Him with contempt '
  - type: text
    content: and
  - type: text
    content: ' scoffed at '
  - type: text
    content: and
  - type: text
    content: ' ridiculed Him and beat Him;'
  '64':
  - type: text
    content: ' They blindfolded Him also and asked Him, Prophesy! Who is it that struck You?'
  '65':
  - type: text
    content: ' And they said many other evil '
  - type: text
    content: and
  - type: text
    content: ' slanderous '
  - type: text
    content: and
  - type: text
    content: ' insulting words against Him, reviling Him.'
  '66':
  - type: text
    content: ' As soon as it was day, the assembly of the elders of the people gathered together, both chief priests and scribes; and they led Him into their council (the Sanhedrin), and they said,'
  '67':
  - type: text
    content: ' If You are the Christ (the Messiah), tell us. But He said to them, If I tell you, you will not believe (trust in, cleave to, and rely on what I say),'
  '68':
  - type: text
    content: ' And if I question you, you will not answer.'
  '69':
  - type: text
    content: ' But hereafter (from this time on), the Son of Man shall be seated at the right hand of the power of God. [Ps. 110:1.]'
  '7':
  - type: text
    content: ' Then came the day of Unleavened Bread on which the Passover [lamb] had to be slain. [Exod. 12:18-20; Deut. 16:5-8.]'
  '70':
  - type: text
    content: ' And they all said, You are the Son of God, then? And He said to them, It is just as you say; I AM.'
  '71':
  - type: text
    content: ' And they said, What further evidence do we need? For we have heard [it] ourselves from His own mouth!'
  '8':
  - type: text
    content: ' So Jesus sent Peter and John, saying, Go and prepare for us the Passover meal, that we may eat it.'
  '9':
  - type: text
    content: ' They said to Him, Where do You want us to prepare [it]?'
