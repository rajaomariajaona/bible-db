document_id: ROM.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I AM speaking the truth in Christ. I am not lying; my conscience [enlightened and prompted] by the Holy Spirit bearing witness with me'
  '10':
  - type: text
    content: ' And not only that, but this too: Rebecca conceived [two sons under exactly the same circumstances] by our forefather Isaac,'
  '11':
  - type: text
    content: ' And the children were yet unborn and had so far done nothing either good or evil. Even so, in order further to carry out God''s purpose of selection (election, choice), which depends not on works '
  - type: text
    content: or
  - type: text
    content: ' what men can do, but on Him Who calls [them],'
  '12':
  - type: text
    content: ' It was said to her that the elder [son] should serve the younger [son]. [Gen. 25:21-23.]'
  '13':
  - type: text
    content: ' As it is written, Jacob have I loved, but Esau have I hated (held in relative disregard in comparison with My feeling for Jacob). [Mal. 1:2, 3.]'
  '14':
  - type: text
    content: ' What shall we conclude then? Is there injustice upon God''s part? Certainly not!'
  '15':
  - type: text
    content: ' For He says to Moses, I will have mercy on whom I will have mercy and I will have compassion (pity) on whom I will have compassion. [Exod. 33:19.]'
  '16':
  - type: text
    content: ' So then [God''s gift] is not a question of human will and human effort, but of God''s mercy. [It depends not on one''s own willingness nor on his strenuous exertion as in running a race, but on God''s having mercy on him.]'
  '17':
  - type: text
    content: ' For the Scripture says to Pharaoh, I have raised you up for this very purpose of displaying My power in [dealing with] you, so that My name may be proclaimed the whole world over.'
  '18':
  - type: text
    content: ' So then He has mercy on whomever He wills (chooses) and He hardens (makes stubborn and unyielding the heart of) whomever He wills.'
  '19':
  - type: text
    content: ' You will say to me, Why then does He still find fault '
  - type: text
    content: and
  - type: text
    content: ' blame us [for sinning]? For who can resist '
  - type: text
    content: and
  - type: text
    content: ' withstand His will?'
  '2':
  - type: text
    content: ' That I have bitter grief and incessant anguish in my heart.'
  '20':
  - type: text
    content: ' But who are you, a mere man, to criticize '
  - type: text
    content: and
  - type: text
    content: ' contradict '
  - type: text
    content: and
  - type: text
    content: ' answer back to God? Will what is formed say to him that formed it, Why have you made me thus? [Isa. 29:16; 45:9.]'
  '21':
  - type: text
    content: ' Has the potter no right over the clay, to make out of the same mass (lump) one vessel for beauty '
  - type: text
    content: and
  - type: text
    content: ' distinction '
  - type: text
    content: and
  - type: text
    content: ' honorable use, and another for menial '
  - type: text
    content: or
  - type: text
    content: ' ignoble '
  - type: text
    content: and
  - type: text
    content: ' dishonorable use?'
  '22':
  - type: text
    content: ' What if God, although fully intending to show [the awfulness of] His wrath and to make known His power '
  - type: text
    content: and
  - type: text
    content: ' authority, has tolerated with much patience the vessels (objects) of [His] anger which are ripe for destruction? [Prov. 16:4.]'
  '23':
  - type: text
    content: ' And [what if] He thus purposes to make known '
  - type: text
    content: and
  - type: text
    content: ' show the wealth of His glory in [dealing with] the vessels (objects) of His mercy which He has prepared beforehand for glory,'
  '24':
  - type: text
    content: ' Even including ourselves whom He has called, not only from among the Jews but also from among the Gentiles (heathen)?'
  '25':
  - type: text
    content: ' Just as He says in Hosea, Those who were not My people I will call My people, and her who was not beloved [I will call] My beloved. [Hos. 2:23.]'
  '26':
  - type: text
    content: ' And it shall be that in the very place where it was said to them, You are not My people, they shall be called sons of the living God. [Hos. 1:10.]'
  '27':
  - type: text
    content: ' And Isaiah calls out (solemnly cries aloud) over Israel: Though the number of the sons of Israel be like the sand of the sea, only the remnant (a small part of them) will be saved [from perdition, condemnation, judgment]!'
  '28':
  - type: text
    content: ' For the Lord will execute His sentence upon the earth [He will conclude and close His account with men completely and without delay], rigorously cutting it short in His justice. [Isa. 10:22, 23.]'
  '29':
  - type: text
    content: ' It is as Isaiah predicted, If the Lord of hosts had not left us a seed [from which to propagate descendants], we [Israel] would have fared like Sodom and have been made like Gomorrah. [Isa. 1:9.]'
  '3':
  - type: text
    content: ' For I could wish that I myself were accursed '
  - type: text
    content: and
  - type: text
    content: ' cut off '
  - type: text
    content: and
  - type: text
    content: ' banished from Christ for the sake of my brethren '
  - type: text
    content: and
  - type: text
    content: ' instead of them, my natural kinsmen '
  - type: text
    content: and
  - type: text
    content: ' my fellow countrymen. [Exod. 32:32.]'
  '30':
  - type: text
    content: ' What shall we say then? That Gentiles who did not follow after righteousness [who did not seek salvation by right relationship to God] have attained it by faith [a righteousness imputed by God, based on and produced by faith],'
  '31':
  - type: text
    content: ' Whereas Israel, though ever in pursuit of a law [for the securing] of righteousness (right standing with God), actually did not succeed in fulfilling the Law. [Isa. 51:1.]'
  '32':
  - type: text
    content: ' For what reason? Because [they pursued it] not through faith, relying [instead] on the merit of their works [they did not depend on faith but on what they could do]. They have stumbled over the Stumbling Stone. [Isa. 8:14; 28:16.]'
  '33':
  - type: text
    content: ' As it is written, Behold I am laying in Zion a Stone that will make men stumble, a Rock that will make them fall; but he who believes in Him [who adheres to, trusts in, and relies on Him] shall not be put to shame '
  - type: text
    content: nor
  - type: text
    content: ' be disappointed in his expectations. [Isa. 28:16.]'
  '4':
  - type: text
    content: ' For they are Israelites, and to them belong God''s adoption [as a nation] and the glorious Presence (Shekinah). With them were the special covenants made, to them was the Law given. To them [the temple] worship was revealed and [God''s own] promises announced. [Exod. 4:22; Hos. 11:1.]'
  '5':
  - type: text
    content: ' To them belong the patriarchs, and as far as His natural descent was concerned, from them is the Christ, Who is exalted '
  - type: text
    content: and
  - type: text
    content: ' supreme over all, God, blessed forever! Amen (so let it be).'
  '6':
  - type: text
    content: ' However, it is not as though God''s Word had failed [coming to nothing]. For it is not everybody who is a descendant of Jacob (Israel) who belongs to [the true] Israel.'
  '7':
  - type: text
    content: ' And they are not all the children of Abraham because they are by blood his descendants. No, [the promise was] Your descendants will be called '
  - type: text
    content: and
  - type: text
    content: ' counted through the line of Isaac [though Abraham had an older son]. [Gen. 21:9-12.]'
  '8':
  - type: text
    content: ' That is to say, it is not the children of the body [of Abraham] who are made God''s children, but it is the offspring to whom the promise applies that shall be counted [as Abraham''s true] descendants.'
  '9':
  - type: text
    content: ' For this is what the promise said, About this time [next year] will I return and Sarah shall have a son. [Gen. 18:10.]'
