document_id: ROM.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I AM speaking the truth in Christ. I am not lying; my conscience [enlightened and prompted] by the Holy Spirit bearing witness with me'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And not only that, but this too: Rebecca conceived [two sons under exactly the same circumstances] by our forefather Isaac,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the children were yet unborn and had so far done nothing either good or evil. Even so, in order further to carry out God''s purpose of selection (election, choice), which depends not on works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' what men can do, but on Him Who calls [them],'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It was said to her that the elder [son] should serve the younger [son]. [Gen. 25:21-23.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As it is written, Jacob have I loved, but Esau have I hated (held in relative disregard in comparison with My feeling for Jacob). [Mal. 1:2, 3.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What shall we conclude then? Is there injustice upon God''s part? Certainly not!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He says to Moses, I will have mercy on whom I will have mercy and I will have compassion (pity) on whom I will have compassion. [Exod. 33:19.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then [God''s gift] is not a question of human will and human effort, but of God''s mercy. [It depends not on one''s own willingness nor on his strenuous exertion as in running a race, but on God''s having mercy on him.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Scripture says to Pharaoh, I have raised you up for this very purpose of displaying My power in [dealing with] you, so that My name may be proclaimed the whole world over.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then He has mercy on whomever He wills (chooses) and He hardens (makes stubborn and unyielding the heart of) whomever He wills.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will say to me, Why then does He still find fault '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blame us [for sinning]? For who can resist '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withstand His will?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That I have bitter grief and incessant anguish in my heart.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But who are you, a mere man, to criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contradict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' answer back to God? Will what is formed say to him that formed it, Why have you made me thus? [Isa. 29:16; 45:9.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Has the potter no right over the clay, to make out of the same mass (lump) one vessel for beauty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honorable use, and another for menial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ignoble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dishonorable use?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What if God, although fully intending to show [the awfulness of] His wrath and to make known His power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority, has tolerated with much patience the vessels (objects) of [His] anger which are ripe for destruction? [Prov. 16:4.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [what if] He thus purposes to make known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show the wealth of His glory in [dealing with] the vessels (objects) of His mercy which He has prepared beforehand for glory,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even including ourselves whom He has called, not only from among the Jews but also from among the Gentiles (heathen)?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Just as He says in Hosea, Those who were not My people I will call My people, and her who was not beloved [I will call] My beloved. [Hos. 2:23.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And it shall be that in the very place where it was said to them, You are not My people, they shall be called sons of the living God. [Hos. 1:10.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Isaiah calls out (solemnly cries aloud) over Israel: Though the number of the sons of Israel be like the sand of the sea, only the remnant (a small part of them) will be saved [from perdition, condemnation, judgment]!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord will execute His sentence upon the earth [He will conclude and close His account with men completely and without delay], rigorously cutting it short in His justice. [Isa. 10:22, 23.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is as Isaiah predicted, If the Lord of hosts had not left us a seed [from which to propagate descendants], we [Israel] would have fared like Sodom and have been made like Gomorrah. [Isa. 1:9.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I could wish that I myself were accursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' banished from Christ for the sake of my brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instead of them, my natural kinsmen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my fellow countrymen. [Exod. 32:32.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What shall we say then? That Gentiles who did not follow after righteousness [who did not seek salvation by right relationship to God] have attained it by faith [a righteousness imputed by God, based on and produced by faith],'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whereas Israel, though ever in pursuit of a law [for the securing] of righteousness (right standing with God), actually did not succeed in fulfilling the Law. [Isa. 51:1.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For what reason? Because [they pursued it] not through faith, relying [instead] on the merit of their works [they did not depend on faith but on what they could do]. They have stumbled over the Stumbling Stone. [Isa. 8:14; 28:16.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As it is written, Behold I am laying in Zion a Stone that will make men stumble, a Rock that will make them fall; but he who believes in Him [who adheres to, trusts in, and relies on Him] shall not be put to shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' be disappointed in his expectations. [Isa. 28:16.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they are Israelites, and to them belong God''s adoption [as a nation] and the glorious Presence (Shekinah). With them were the special covenants made, to them was the Law given. To them [the temple] worship was revealed and [God''s own] promises announced. [Exod. 4:22; Hos. 11:1.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To them belong the patriarchs, and as far as His natural descent was concerned, from them is the Christ, Who is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supreme over all, God, blessed forever! Amen (so let it be).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, it is not as though God''s Word had failed [coming to nothing]. For it is not everybody who is a descendant of Jacob (Israel) who belongs to [the true] Israel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they are not all the children of Abraham because they are by blood his descendants. No, [the promise was] Your descendants will be called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counted through the line of Isaac [though Abraham had an older son]. [Gen. 21:9-12.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That is to say, it is not the children of the body [of Abraham] who are made God''s children, but it is the offspring to whom the promise applies that shall be counted [as Abraham''s true] descendants.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this is what the promise said, About this time [next year] will I return and Sarah shall have a son. [Gen. 18:10.]'
