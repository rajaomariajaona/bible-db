document_id: JHN.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IN THE beginning [before all time] was the Word (Christ), and the Word was with God, and the Word was God Himself. [Isa. 9:6.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He came into the world, and though the world was made through Him, the world did not recognize Him [did not know Him].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He came to that which belonged to Him [to His own–His domain, creation, things, world], and they who were His own did not receive Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' did not welcome Him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But to as many as did receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome Him, He gave the authority (power, privilege, right) to become the children of God, that is, to those who believe in (adhere to, trust in, and rely on) His name–[Isa. 56:5.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who owe their birth neither to bloods nor to the will of the flesh [that of physical impulse] nor to the will of man [that of a natural father], but to God. [They are born of God!]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Word (Christ) became flesh (human, incarnate) and tabernacled (fixed His tent of flesh, lived awhile) among us; and we [actually] saw His glory (His honor, His majesty), such glory as an only begotten son receives from his father, full of grace (favor, loving-kindness) and truth. [Isa. 40:5.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' John testified about Him and cried out, This was He of Whom I said, He Who comes after me has priority over me, for He was before me. [He takes rank above me, for He existed before I did. He has advanced before me, because He is my Chief.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For out of His fullness (abundance) we have all received [all had a share and we were all supplied with] one grace after another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual blessing upon spiritual blessing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' even favor upon favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gift [heaped] upon gift.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For while the Law was given through Moses, grace (unearned, undeserved favor and spiritual blessing) and truth came through Jesus Christ. [Exod. 20:1.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No man has ever seen God at any time; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the only
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unique Son
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the only begotten God, Who is in the bosom [in the intimate presence] of the Father, He has declared Him [He has revealed Him and brought Him out where He can be seen; He has interpreted Him and He has made Him known]. [Prov. 8:30.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And this is the testimony of John when the Jews sent priests and Levites to him from Jerusalem to ask him, Who are you?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He was present originally with God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He confessed (admitted the truth) and did not try to conceal it, but acknowledged, I am not the Christ!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They asked him, What then? Are you Elijah? And he said, I am not! Are you the Prophet? And he answered, No! [Deut. 18:15, 18; Mal. 4:5.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they said to him, Who are you? Tell us, so that we may give an answer to those who sent us. What do you say about yourself?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, I am the voice of one crying aloud in the wilderness [the voice of one shouting in the desert], Prepare the way of the Lord [level, straighten out, the path of the Lord], as the prophet Isaiah said. [Isa. 40:3.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The messengers had been sent from the Pharisees.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they asked him, Why then are you baptizing if you are not the Christ, nor Elijah, nor the Prophet?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' John answered them, I [only] baptize in (with) water. Among you there stands One Whom you do not recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with Whom you are not acquainted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of Whom you know nothing. [Mal. 3:1.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is He Who, coming after me, is preferred before me, the string of Whose sandal I am not worthy to unloose.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These things occurred in Bethany (Bethabara) across the Jordan [at the Jordan crossing], where John was then baptizing.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The next day John saw Jesus coming to him and said, Look! There is the Lamb of God, Who takes away the sin of the world! [Exod. 12:3; Isa. 53:7.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All things were made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' came into existence through Him; and without Him was not even one thing made that has come into being.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is He of Whom I said, After me comes a Man Who has priority over me [Who takes rank above me] because He was before me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' existed before I did.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I did not know Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' did not recognize Him [myself]; but it is in order that He should be made manifest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be revealed to Israel [be brought out where we can see Him] that I came baptizing in (with) water.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' John gave further evidence, saying, I have seen the Spirit descending as a dove out of heaven, and it dwelt on Him [never to depart].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I did not know Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' recognize Him, but He Who sent me to baptize in (with) water said to me, Upon Him Whom you shall see the Spirit descend and remain, that One is He Who baptizes with the Holy Spirit.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I have seen [that happen–I actually did see it] and my testimony is that this is the Son of God!'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Again the next day John was standing with two of his disciples,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he looked at Jesus as He walked along, and said, Look! There is the Lamb of God!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The two disciples heard him say this, and they followed Him.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jesus turned, and as He saw them following Him, He said to them, What are you looking for? [And what is it you wish?] And they answered Him, Rabbi–which translated is Teacher–where are You staying?'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said to them, Come and see. So they went and saw where He was staying, and they remained with Him that day. It was then about the tenth hour (about four o''clock in the afternoon).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In Him was Life, and the Life was the Light of men.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One of the two who heard what John said and followed Jesus was Andrew, Simon Peter''s brother.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He first sought out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' found his own brother Simon and said to him, We have found (discovered) the Messiah!–which translated is the Christ (the Anointed One).'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Andrew then led (brought) Simon to Jesus. Jesus looked at him and said, You are Simon son of John. You shall be called Cephas–which translated is Peter [Stone].'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The next day Jesus desired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decided to go into Galilee; and He found Philip and said to him, Join Me as My attendant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow Me.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Philip was from Bethsaida, of the same city as Andrew and Peter.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Philip sought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' found Nathanael and told him, We have found (discovered) the One Moses in the Law and also the Prophets wrote about–Jesus from Nazareth, the [legal] son of Joseph!'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nathanael answered him, [Nazareth!] Can anything good come out of Nazareth? Philip replied, Come and see!'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus saw Nathanael coming toward Him and said concerning him, See! Here is an Israelite indeed [a true descendant of Jacob], in whom there is no guile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' deceit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' falsehood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' duplicity!'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nathanael said to Jesus, How do You know me? [How is it that You know these things about me?] Jesus answered him, Before [ever] Philip called you, when you were still under the fig tree, I saw you.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nathanael answered, Teacher, You are the Son of God! You are the King of Israel!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Light shines on in the darkness, for the darkness has never overpowered it [put it out or absorbed it or appropriated it, and is unreceptive to it].'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus replied, Because I said to you, I saw you beneath the fig tree, do you believe in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rely on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust in Me? You shall see greater things than this!'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He said to him, I assure you, most solemnly I tell you all, you shall see heaven opened, and the angels of God ascending and descending upon the Son of Man! [Gen. 28:12; Dan. 7:13.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There came a man sent from God, whose name was John. [Mal. 3:1.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This man came to witness, that he might testify of the Light, that all men might believe in it [adhere to it, trust it, and rely upon it] through him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He was not the Light himself, but came that he might bear witness regarding the Light.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There it was–the true Light [was then] coming into the world [the genuine, perfect, steadfast Light] that illumines every person. [Isa. 49:6.]'
