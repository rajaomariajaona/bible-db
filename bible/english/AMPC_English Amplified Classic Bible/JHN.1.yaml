document_id: JHN.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE beginning [before all time] was the Word (Christ), and the Word was with God, and the Word was God Himself. [Isa. 9:6.]'
  '10':
  - type: text
    content: ' He came into the world, and though the world was made through Him, the world did not recognize Him [did not know Him].'
  '11':
  - type: text
    content: ' He came to that which belonged to Him [to His own–His domain, creation, things, world], and they who were His own did not receive Him '
  - type: text
    content: and
  - type: text
    content: ' did not welcome Him.'
  '12':
  - type: text
    content: ' But to as many as did receive '
  - type: text
    content: and
  - type: text
    content: ' welcome Him, He gave the authority (power, privilege, right) to become the children of God, that is, to those who believe in (adhere to, trust in, and rely on) His name–[Isa. 56:5.]'
  '13':
  - type: text
    content: ' Who owe their birth neither to bloods nor to the will of the flesh [that of physical impulse] nor to the will of man [that of a natural father], but to God. [They are born of God!]'
  '14':
  - type: text
    content: ' And the Word (Christ) became flesh (human, incarnate) and tabernacled (fixed His tent of flesh, lived awhile) among us; and we [actually] saw His glory (His honor, His majesty), such glory as an only begotten son receives from his father, full of grace (favor, loving-kindness) and truth. [Isa. 40:5.]'
  '15':
  - type: text
    content: ' John testified about Him and cried out, This was He of Whom I said, He Who comes after me has priority over me, for He was before me. [He takes rank above me, for He existed before I did. He has advanced before me, because He is my Chief.]'
  '16':
  - type: text
    content: ' For out of His fullness (abundance) we have all received [all had a share and we were all supplied with] one grace after another '
  - type: text
    content: and
  - type: text
    content: ' spiritual blessing upon spiritual blessing '
  - type: text
    content: and
  - type: text
    content: ' even favor upon favor '
  - type: text
    content: and
  - type: text
    content: ' gift [heaped] upon gift.'
  '17':
  - type: text
    content: ' For while the Law was given through Moses, grace (unearned, undeserved favor and spiritual blessing) and truth came through Jesus Christ. [Exod. 20:1.]'
  '18':
  - type: text
    content: ' No man has ever seen God at any time; '
  - type: text
    content: the only
  - type: text
    content: ' '
  - type: text
    content: unique Son
  - type: text
    content: ', '
  - type: text
    content: or
  - type: text
    content: ' the only begotten God, Who is in the bosom [in the intimate presence] of the Father, He has declared Him [He has revealed Him and brought Him out where He can be seen; He has interpreted Him and He has made Him known]. [Prov. 8:30.]'
  '19':
  - type: text
    content: ' And this is the testimony of John when the Jews sent priests and Levites to him from Jerusalem to ask him, Who are you?'
  '2':
  - type: text
    content: ' He was present originally with God.'
  '20':
  - type: text
    content: ' He confessed (admitted the truth) and did not try to conceal it, but acknowledged, I am not the Christ!'
  '21':
  - type: text
    content: ' They asked him, What then? Are you Elijah? And he said, I am not! Are you the Prophet? And he answered, No! [Deut. 18:15, 18; Mal. 4:5.]'
  '22':
  - type: text
    content: ' Then they said to him, Who are you? Tell us, so that we may give an answer to those who sent us. What do you say about yourself?'
  '23':
  - type: text
    content: ' He said, I am the voice of one crying aloud in the wilderness [the voice of one shouting in the desert], Prepare the way of the Lord [level, straighten out, the path of the Lord], as the prophet Isaiah said. [Isa. 40:3.]'
  '24':
  - type: text
    content: ' The messengers had been sent from the Pharisees.'
  '25':
  - type: text
    content: ' And they asked him, Why then are you baptizing if you are not the Christ, nor Elijah, nor the Prophet?'
  '26':
  - type: text
    content: ' John answered them, I [only] baptize in (with) water. Among you there stands One Whom you do not recognize '
  - type: text
    content: and
  - type: text
    content: ' with Whom you are not acquainted '
  - type: text
    content: and
  - type: text
    content: ' of Whom you know nothing. [Mal. 3:1.]'
  '27':
  - type: text
    content: ' It is He Who, coming after me, is preferred before me, the string of Whose sandal I am not worthy to unloose.'
  '28':
  - type: text
    content: ' These things occurred in Bethany (Bethabara) across the Jordan [at the Jordan crossing], where John was then baptizing.'
  '29':
  - type: text
    content: ' The next day John saw Jesus coming to him and said, Look! There is the Lamb of God, Who takes away the sin of the world! [Exod. 12:3; Isa. 53:7.]'
  '3':
  - type: text
    content: ' All things were made '
  - type: text
    content: and
  - type: text
    content: ' came into existence through Him; and without Him was not even one thing made that has come into being.'
  '30':
  - type: text
    content: ' This is He of Whom I said, After me comes a Man Who has priority over me [Who takes rank above me] because He was before me '
  - type: text
    content: and
  - type: text
    content: ' existed before I did.'
  '31':
  - type: text
    content: ' And I did not know Him '
  - type: text
    content: and
  - type: text
    content: ' did not recognize Him [myself]; but it is in order that He should be made manifest '
  - type: text
    content: and
  - type: text
    content: ' be revealed to Israel [be brought out where we can see Him] that I came baptizing in (with) water.'
  '32':
  - type: text
    content: ' John gave further evidence, saying, I have seen the Spirit descending as a dove out of heaven, and it dwelt on Him [never to depart].'
  '33':
  - type: text
    content: ' And I did not know Him '
  - type: text
    content: nor
  - type: text
    content: ' recognize Him, but He Who sent me to baptize in (with) water said to me, Upon Him Whom you shall see the Spirit descend and remain, that One is He Who baptizes with the Holy Spirit.'
  '34':
  - type: text
    content: ' And I have seen [that happen–I actually did see it] and my testimony is that this is the Son of God!'
  '35':
  - type: text
    content: ' Again the next day John was standing with two of his disciples,'
  '36':
  - type: text
    content: ' And he looked at Jesus as He walked along, and said, Look! There is the Lamb of God!'
  '37':
  - type: text
    content: ' The two disciples heard him say this, and they followed Him.'
  '38':
  - type: text
    content: ' But Jesus turned, and as He saw them following Him, He said to them, What are you looking for? [And what is it you wish?] And they answered Him, Rabbi–which translated is Teacher–where are You staying?'
  '39':
  - type: text
    content: ' He said to them, Come and see. So they went and saw where He was staying, and they remained with Him that day. It was then about the tenth hour (about four o''clock in the afternoon).'
  '4':
  - type: text
    content: ' In Him was Life, and the Life was the Light of men.'
  '40':
  - type: text
    content: ' One of the two who heard what John said and followed Jesus was Andrew, Simon Peter''s brother.'
  '41':
  - type: text
    content: ' He first sought out '
  - type: text
    content: and
  - type: text
    content: ' found his own brother Simon and said to him, We have found (discovered) the Messiah!–which translated is the Christ (the Anointed One).'
  '42':
  - type: text
    content: ' Andrew then led (brought) Simon to Jesus. Jesus looked at him and said, You are Simon son of John. You shall be called Cephas–which translated is Peter [Stone].'
  '43':
  - type: text
    content: ' The next day Jesus desired '
  - type: text
    content: and
  - type: text
    content: ' decided to go into Galilee; and He found Philip and said to him, Join Me as My attendant '
  - type: text
    content: and
  - type: text
    content: ' follow Me.'
  '44':
  - type: text
    content: ' Now Philip was from Bethsaida, of the same city as Andrew and Peter.'
  '45':
  - type: text
    content: ' Philip sought '
  - type: text
    content: and
  - type: text
    content: ' found Nathanael and told him, We have found (discovered) the One Moses in the Law and also the Prophets wrote about–Jesus from Nazareth, the [legal] son of Joseph!'
  '46':
  - type: text
    content: ' Nathanael answered him, [Nazareth!] Can anything good come out of Nazareth? Philip replied, Come and see!'
  '47':
  - type: text
    content: ' Jesus saw Nathanael coming toward Him and said concerning him, See! Here is an Israelite indeed [a true descendant of Jacob], in whom there is no guile '
  - type: text
    content: nor
  - type: text
    content: ' deceit '
  - type: text
    content: nor
  - type: text
    content: ' falsehood '
  - type: text
    content: nor
  - type: text
    content: ' duplicity!'
  '48':
  - type: text
    content: ' Nathanael said to Jesus, How do You know me? [How is it that You know these things about me?] Jesus answered him, Before [ever] Philip called you, when you were still under the fig tree, I saw you.'
  '49':
  - type: text
    content: ' Nathanael answered, Teacher, You are the Son of God! You are the King of Israel!'
  '5':
  - type: text
    content: ' And the Light shines on in the darkness, for the darkness has never overpowered it [put it out or absorbed it or appropriated it, and is unreceptive to it].'
  '50':
  - type: text
    content: ' Jesus replied, Because I said to you, I saw you beneath the fig tree, do you believe in '
  - type: text
    content: and
  - type: text
    content: ' rely on '
  - type: text
    content: and
  - type: text
    content: ' trust in Me? You shall see greater things than this!'
  '51':
  - type: text
    content: ' Then He said to him, I assure you, most solemnly I tell you all, you shall see heaven opened, and the angels of God ascending and descending upon the Son of Man! [Gen. 28:12; Dan. 7:13.]'
  '6':
  - type: text
    content: ' There came a man sent from God, whose name was John. [Mal. 3:1.]'
  '7':
  - type: text
    content: ' This man came to witness, that he might testify of the Light, that all men might believe in it [adhere to it, trust it, and rely upon it] through him.'
  '8':
  - type: text
    content: ' He was not the Light himself, but came that he might bear witness regarding the Light.'
  '9':
  - type: text
    content: ' There it was–the true Light [was then] coming into the world [the genuine, perfect, steadfast Light] that illumines every person. [Isa. 49:6.]'
