document_id: GAL.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN [this] freedom Christ has made us free [and completely liberated us]; stand fast then, and do not be hampered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' held ensnared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' submit again to a yoke of slavery [which you have once put off].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [For my part] I have confidence [toward you] in the Lord that you will take no contrary view of the matter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' will come to think with me. But he who is unsettling you, whoever he is, will have to bear the penalty.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But, brethren, if I still preach circumcision [as some accuse me of doing, as necessary to salvation], why am I still suffering persecution? In that case the cross has ceased to be a stumbling block '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is made meaningless (done away).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I wish those who unsettle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confuse you would [go all the way and] cut themselves off!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For you, brethren, were [indeed] called to freedom; only [do not let your] freedom be an incentive to your flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an opportunity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' excuse [for selfishness], but through love you should serve one another.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the whole Law [concerning human relationships] is complied with in the one precept, You shall love your neighbor as [you do] yourself. [Lev. 19:18.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if you bite and devour one another [in partisan strife], be careful that you [and your whole fellowship] are not consumed by one another.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But I say, walk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live [habitually] in the [Holy] Spirit [responsive to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' controlled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guided by the Spirit]; then you will certainly not gratify the cravings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desires of the flesh (of human nature without God).'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For the desires of the flesh are opposed to the [Holy] Spirit, and the [desires of the] Spirit are opposed to the flesh (godless human nature); for these are antagonistic to each other [continually withstanding and in conflict with each other], so that you are not free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' are prevented from doing what you desire to do.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But if you are guided (led) by the [Holy] Spirit, you are not subject to the Law.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Now the doings (practices) of the flesh are clear (obvious): they are immorality, impurity, indecency,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Notice, it is I, Paul, who tells you that if you receive circumcision, Christ will be of no profit (advantage, avail) to you [for if you distrust Him, you can gain nothing from Him].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Idolatry, sorcery, enmity, strife, jealousy, anger (ill temper), selfishness, divisions (dissensions), party spirit (factions, sects with peculiar opinions, heresies),'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Envy, drunkenness, carousing, and the like. I warn you beforehand, just as I did previously, that those who do such things shall not inherit the kingdom of God.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But the fruit of the [Holy] Spirit [the work which His presence within accomplishes] is love, joy (gladness), peace, patience (an even temper, forbearance), kindness, goodness (benevolence), faithfulness,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Gentleness (meekness, humility), self-control (self-restraint, continence). Against such things there is no law [that can bring a charge].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And those who belong to Christ Jesus (the Messiah) have crucified the flesh (the godless human nature) with its passions and appetites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desires.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' If we live by the [Holy] Spirit, let us also walk by the Spirit. [If by the Holy Spirit we have our life in God, let us go forward walking in line, our conduct controlled by the Spirit.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Let us not become vainglorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-conceited, competitive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' challenging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irritating to one another, envying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' being jealous of one another.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I once more protest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testify to every man who receives circumcision that he is under obligation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bound to practice the whole of the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its ordinances.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' If you seek to be justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declared righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be given a right standing with God through the Law, you are brought to nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' so separated (severed) from Christ. You have fallen away from grace (from God''s gracious favor and unmerited blessing).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For we, [not relying on the Law but] through the [Holy] Spirit''s [help], by faith anticipate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait for the blessing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good for which our righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right standing with God [our conformity to His will in purpose, thought, and action, causes us] to hope.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For [if we are] in Christ Jesus, neither circumcision nor uncircumcision counts for anything, but only faith activated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' energized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' working through love.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You were running the race nobly. Who has interfered in (hindered and stopped you from) your heeding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' following the Truth?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' This [evil] persuasion is not from Him Who called you [Who invited you to freedom in Christ].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' A little leaven (a slight inclination to error, or a few false teachers) leavens the whole lump [it perverts the whole conception of faith or misleads the whole church].'
