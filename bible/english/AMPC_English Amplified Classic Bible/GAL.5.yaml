verses:
  '1':
  - type: text
    content: ' IN [this] freedom Christ has made us free [and completely liberated us]; stand fast then, and do not be hampered '
  - type: text
    content: and
  - type: text
    content: ' held ensnared '
  - type: text
    content: and
  - type: text
    content: ' submit again to a yoke of slavery [which you have once put off].'
  '10':
  - type: text
    content: ' [For my part] I have confidence [toward you] in the Lord that you will take no contrary view of the matter '
  - type: text
    content: but
  - type: text
    content: ' will come to think with me. But he who is unsettling you, whoever he is, will have to bear the penalty.'
  '11':
  - type: text
    content: ' But, brethren, if I still preach circumcision [as some accuse me of doing, as necessary to salvation], why am I still suffering persecution? In that case the cross has ceased to be a stumbling block '
  - type: text
    content: and
  - type: text
