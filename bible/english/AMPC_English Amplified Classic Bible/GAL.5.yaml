  - type: text
    content: ' I wish those who unsettle '
  - type: text
    content: and
  - type: text
    content: ' confuse you would [go all the way and] cut themselves off!'
  '13':
  - type: text
    content: ' For you, brethren, were [indeed] called to freedom; only [do not let your] freedom be an incentive to your flesh '
  - type: text
    content: and
  - type: text
    content: ' an opportunity '
  - type: text
    content: or
  - type: text
    content: ' excuse [for selfishness], but through love you should serve one another.'
  '14':
  - type: text
    content: ' For the whole Law [concerning human relationships] is complied with in the one precept, You shall love your neighbor as [you do] yourself. [Lev. 19:18.]'
  '15':
  - type: text
    content: ' But if you bite and devour one another [in partisan strife], be careful that you [and your whole fellowship] are not consumed by one another.'
  '16':
  - type: text
    content: ' But I say, walk '
  - type: text
    content: and
  - type: text
    content: ' live [habitually] in the [Holy] Spirit [responsive to '
  - type: text
    content: and
  - type: text
    content: ' controlled '
  - type: text
    content: and
  - type: text
    content: ' guided by the Spirit]; then you will certainly not gratify the cravings '
  - type: text
    content: and
  - type: text
    content: ' desires of the flesh (of human nature without God).'
  '17':
  - type: text
    content: ' For the desires of the flesh are opposed to the [Holy] Spirit, and the [desires of the] Spirit are opposed to the flesh (godless human nature); for these are antagonistic to each other [continually withstanding and in conflict with each other], so that you are not free '
  - type: text
    content: but
  - type: text
    content: ' are prevented from doing what you desire to do.'
  '18':
  - type: text
    content: ' But if you are guided (led) by the [Holy] Spirit, you are not subject to the Law.'
  '19':
  - type: text
    content: ' Now the doings (practices) of the flesh are clear (obvious): they are immorality, impurity, indecency,'
  '2':
  - type: text
    content: ' Notice, it is I, Paul, who tells you that if you receive circumcision, Christ will be of no profit (advantage, avail) to you [for if you distrust Him, you can gain nothing from Him].'
  '20':
  - type: text
    content: ' Idolatry, sorcery, enmity, strife, jealousy, anger (ill temper), selfishness, divisions (dissensions), party spirit (factions, sects with peculiar opinions, heresies),'
  '21':
  - type: text
    content: ' Envy, drunkenness, carousing, and the like. I warn you beforehand, just as I did previously, that those who do such things shall not inherit the kingdom of God.'
  '22':
  - type: text
    content: ' But the fruit of the [Holy] Spirit [the work which His presence within accomplishes] is love, joy (gladness), peace, patience (an even temper, forbearance), kindness, goodness (benevolence), faithfulness,'
  '23':
  - type: text
    content: ' Gentleness (meekness, humility), self-control (self-restraint, continence). Against such things there is no law [that can bring a charge].'
  '24':
  - type: text
    content: ' And those who belong to Christ Jesus (the Messiah) have crucified the flesh (the godless human nature) with its passions and appetites '
  - type: text
    content: and
  - type: text
    content: ' desires.'
  '25':
  - type: text
    content: ' If we live by the [Holy] Spirit, let us also walk by the Spirit. [If by the Holy Spirit we have our life in God, let us go forward walking in line, our conduct controlled by the Spirit.]'
  '26':
  - type: text
    content: ' Let us not become vainglorious '
  - type: text
    content: and
  - type: text
    content: ' self-conceited, competitive '
  - type: text
    content: and
  - type: text
    content: ' challenging '
  - type: text
    content: and
  - type: text
    content: ' provoking '
  - type: text
    content: and
  - type: text
    content: ' irritating to one another, envying '
  - type: text
    content: and
  - type: text
    content: ' being jealous of one another.'
  '3':
  - type: text
    content: ' I once more protest '
  - type: text
    content: and
  - type: text
    content: ' testify to every man who receives circumcision that he is under obligation '
  - type: text
    content: and
  - type: text
    content: ' bound to practice the whole of the Law '
  - type: text
    content: and
  - type: text
    content: ' its ordinances.'
  '4':
  - type: text
    content: ' If you seek to be justified '
  - type: text
    content: and
  - type: text
    content: ' declared righteous '
  - type: text
    content: and
  - type: text
    content: ' to be given a right standing with God through the Law, you are brought to nothing '
  - type: text
    content: and
  - type: text
    content: ' so separated (severed) from Christ. You have fallen away from grace (from God''s gracious favor and unmerited blessing).'
  '5':
  - type: text
    content: ' For we, [not relying on the Law but] through the [Holy] Spirit''s [help], by faith anticipate '
  - type: text
    content: and
  - type: text
    content: ' wait for the blessing '
  - type: text
    content: and
  - type: text
    content: ' good for which our righteousness '
  - type: text
    content: and
  - type: text
    content: ' right standing with God [our conformity to His will in purpose, thought, and action, causes us] to hope.'
  '6':
  - type: text
    content: ' For [if we are] in Christ Jesus, neither circumcision nor uncircumcision counts for anything, but only faith activated '
  - type: text
    content: and
  - type: text
    content: ' energized '
  - type: text
    content: and
  - type: text
    content: ' expressed '
  - type: text
    content: and
  - type: text
    content: ' working through love.'
  '7':
  - type: text
    content: ' You were running the race nobly. Who has interfered in (hindered and stopped you from) your heeding '
  - type: text
    content: and
  - type: text
    content: ' following the Truth?'
  '8':
  - type: text
    content: ' This [evil] persuasion is not from Him Who called you [Who invited you to freedom in Christ].'
  '9':
  - type: text
    content: ' A little leaven (a slight inclination to error, or a few false teachers) leavens the whole lump [it perverts the whole conception of faith or misleads the whole church].'
