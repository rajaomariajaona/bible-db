document_id: JER.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to me [Jeremiah], saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Go and cry in the ears of Jerusalem, saying, Thus says the Lord: I [earnestly] remember the kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devotion of your youth, your love after your betrothal [in Egypt] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marriage [at Sinai] when you followed Me in the wilderness, in a land not sown.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Israel was holiness [something set apart from ordinary purposes, dedicated] to the Lord, the firstfruits of His harvest [of which no stranger was allowed to partake]; all who ate of it [injuring Israel] offended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' became guilty; evil came upon them, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Hear the word of the Lord, O house of Jacob, and all the families of the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says the Lord: What unrighteousness did your fathers find in Me, that they went far from Me and [habitually] went after emptiness, falseness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility and themselves became fruitless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Nor did they say, Where is the Lord, Who brought us up out of the land of Egypt, Who led us through the wilderness, through a land of deserts and pits, through a land of drought and of the shadow of death '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deep darkness, through a land that no man passes through and where no man dwells?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I brought you into a plentiful land to enjoy its fruits and good things. But when you entered, you defiled My land and made My heritage an abomination [detestable and loathsome].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [Even] the priests did not say, Where is the Lord? And those who handle the law [given by God to Moses] knew Me not. The rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secular shepherds also transgressed against Me, and the prophets prophesied by [the authority and in the name of] Baal and followed after things that do not profit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore I will still contend with you [by inflicting further judgments on you], says the Lord, and with your children''s children will I contend.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For cross over to the coasts of Cyprus [to the west] and see, send also to Kedar [to the east] and carefully consider; and see whether there has been such a thing as this:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Has a nation [ever] changed its gods, even though they are not gods? But My people have changed their Glory [God] for that which does not profit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Be astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled, O heavens, at this; be shocked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shrivel up with horror, says the Lord [at the behavior of the people].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For My people have committed two evils: they have forsaken Me, the Fountain of living waters, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they have hewn for themselves cisterns, broken cisterns which cannot hold water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Is Israel a servant? Is he a homeborn slave? Why has he become a captive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a prey?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The young lions have roared over him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made their voices heard. And they have made his land a waste; his cities are burned ruins without inhabitant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, the children of Memphis and Tahpanhes (Egypt) [have in times past shown their power as a foe; they] have broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fed on the crown of your head [Israel]–so do not rely on them as an ally now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Have you not brought this upon yourself by forsaking the Lord your God when He led you in the way?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And now what have you to gain by allying yourself with Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' going her way, to drink the [black and roiled] waters of the Nile? Or what have you to gain in going the way of Assyria, to drink the waters of the Euphrates?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Your own wickedness shall chasten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correct you, and your backslidings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desertion of faith shall reprove you. Know therefore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize that this is an evil and bitter thing: [first,] you have forsaken the Lord your God; [second,] you are indifferent to Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the fear of Me is not in you, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For long ago [in Egypt] I broke your yoke and burst your bonds [not that you might be free, but that you might serve Me] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' long ago you shattered the yoke and snapped the bonds [of My law which I put upon you]; you said, I will not serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey You! For upon every high hill and under every green tree you [eagerly] prostrated yourself [in idolatrous worship], playing the harlot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Yet I had planted you [O house of Israel] a choice vine, wholly of pure seed. How then have you turned into degenerate shoots of wild vine alien to Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For though you wash yourself with lye and use much soap, yet your iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt are still [upon you; you are] spotted, dirty, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stained before Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' How can you say, I am not defiled; I have not gone after the Baals [other gods]? Look at your way in the valley; know what you have done. You are a restive young female camel [in the uncontrollable violence of her brute passion eagerly] running hither and thither,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Or [you have the untamed and reckless nature of] a wild donkey used to the desert, in her heat sniffing the wind [for the scent of a male]. In her mating season who can restrain her? No males seeking her need weary themselves; in her month they will find her [seeking them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' [Cease from your mad running after idols, from which you get nothing but bitter injury.] Keep your feet from being unshod and your throat from thirst. But you said, It is hopeless! For I have loved strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foreigners, and after them I will go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' As the thief is brought to shame when he is caught, so shall the house of Israel be brought to shame–they, their kings, their princes, their priests, and their prophets–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [Inasmuch as] they say to a tree, You are my father, and to a stone, You gave me birth. For they have turned their backs to Me and not their faces; but in the time of their trouble, they say, Arise [O Lord] and save us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But where are your gods that you made for yourself? Let them arise if they can save you in the time of your trouble! For [as many as] the number of your cities are your gods, O Judah. [Surely so many handmade idols should be able to help you!]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Why do you complain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remonstrate against My wrath? You all have rebelled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revolted against Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' In vain have I stricken your children (your people); they received no discipline (no correction). Your own sword devoured your prophets like a destroying lion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' O generation [that you are]! Behold, consider, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regard the word of the Lord: Have I been a wilderness to Israel [like a land without food]? A land of deep darkness [like a way without light]? Why do My people say, We have broken loose [we are free and will roam at large]; we will come no more to You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Can a maid forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' neglect [to wear] her ornaments, or a bride her [marriage] girdle [with its significance like that of a wedding ring]? Yet My people have forgotten Me, days without number.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' How you deck yourself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direct your way to procure [adulterous] love! Because of it even wicked women have learned [indecent] ways from you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Also on your skirts is found the lifeblood of the persons of the innocent poor; you did not find them housebreaking, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' have I found it out by secret search. But it is because of [your lust for idolatry that you have done] all these things–[that is everywhere evident.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Yet you keep saying, I am innocent; surely His anger has turned away from Me. Behold, I will bring you to judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will plead against you because you say, I have not sinned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Why do you gad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wander about so much to change your way? You shall be put to shame by Egypt as you were put to shame by Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' From [Egypt] also you will come away with your hands upon your head, for the Lord has rejected those in whom you confide, and you will not prosper with [respect to] them.'
