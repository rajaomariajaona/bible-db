document_id: PSA.90,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer of Moses the man of God.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', YOU have been our dwelling place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' our refuge in all generations [says Moses].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The days of our years are threescore years and ten (seventy years)–or even, if by reason of strength, fourscore years (eighty years); yet is their pride [in additional years] only labor and sorrow, for it is soon gone, and we fly away.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who knows the power of Your anger? [Who worthily connects this brevity of life with Your recognition of sin?] And Your wrath, who connects it with the reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear that is due You?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So teach us to number our days, that we may get us a heart of wisdom.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Turn, O Lord [from Your fierce anger]! How long–? Revoke Your sentence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be compassionate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at ease toward Your servants.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O satisfy us with Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness in the morning [now, before we are older], that we may rejoice and be glad all our days.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Make us glad in proportion to the days in which You have afflicted us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to the years in which we have suffered evil.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let Your work [the signs of Your power] be revealed to Your servants, and Your [glorious] majesty to their children.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let the beauty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delightfulness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor of the Lord our God be upon us; confirm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establish the work of our hands–yes, the work of our hands, confirm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establish it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Before the mountains were brought forth or ever You had formed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given birth to the earth and the world, even from everlasting to everlasting You are God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You turn man back to dust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corruption, and say, Return, O sons of the earthborn [to the earth]!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For a thousand years in Your sight are but as yesterday when it is past, or as a watch in the night. [II Pet. 3:8.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You carry away [these disobedient people, doomed to die within forty years] as with a flood; they are as a sleep [vague and forgotten as soon as they are gone]. In the morning they are like grass which grows up–'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the morning it flourishes and springs up; in the evening it is mown down and withers.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For we [the Israelites in the wilderness] are consumed by Your anger, and by Your wrath are we troubled, overwhelmed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' frightened away.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Our iniquities, our secret heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its sins [which we would so like to conceal even from ourselves], You have set in the [revealing] light of Your countenance.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For all our days [out here in this wilderness, says Moses] pass away in Your wrath; we spend our years as a tale that is told [for we adults know we are doomed to die soon, without reaching Canaan]. [Num. 14:26-35.]'
