document_id: PSA.90,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer of Moses the man of God.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', YOU have been our dwelling place '
  - type: text
    content: and
  - type: text
    content: ' our refuge in all generations [says Moses].'
  '10':
  - type: text
    content: ' The days of our years are threescore years and ten (seventy years)–or even, if by reason of strength, fourscore years (eighty years); yet is their pride [in additional years] only labor and sorrow, for it is soon gone, and we fly away.'
  '11':
  - type: text
    content: ' Who knows the power of Your anger? [Who worthily connects this brevity of life with Your recognition of sin?] And Your wrath, who connects it with the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear that is due You?'
  '12':
  - type: text
    content: ' So teach us to number our days, that we may get us a heart of wisdom.'
  '13':
  - type: text
    content: ' Turn, O Lord [from Your fierce anger]! How long–? Revoke Your sentence '
  - type: text
    content: and
  - type: text
    content: ' be compassionate '
  - type: text
    content: and
  - type: text
    content: ' at ease toward Your servants.'
  '14':
  - type: text
    content: ' O satisfy us with Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness in the morning [now, before we are older], that we may rejoice and be glad all our days.'
  '15':
  - type: text
    content: ' Make us glad in proportion to the days in which You have afflicted us '
  - type: text
    content: and
  - type: text
    content: ' to the years in which we have suffered evil.'
  '16':
  - type: text
    content: ' Let Your work [the signs of Your power] be revealed to Your servants, and Your [glorious] majesty to their children.'
  '17':
  - type: text
    content: ' And let the beauty '
  - type: text
    content: and
  - type: text
    content: ' delightfulness '
  - type: text
    content: and
  - type: text
    content: ' favor of the Lord our God be upon us; confirm '
  - type: text
    content: and
  - type: text
    content: ' establish the work of our hands–yes, the work of our hands, confirm '
  - type: text
    content: and
  - type: text
    content: ' establish it.'
  '2':
  - type: text
    content: ' Before the mountains were brought forth or ever You had formed '
  - type: text
    content: and
  - type: text
    content: ' given birth to the earth and the world, even from everlasting to everlasting You are God.'
  '3':
  - type: text
    content: ' You turn man back to dust '
  - type: text
    content: and
  - type: text
    content: ' corruption, and say, Return, O sons of the earthborn [to the earth]!'
  '4':
  - type: text
    content: ' For a thousand years in Your sight are but as yesterday when it is past, or as a watch in the night. [II Pet. 3:8.]'
  '5':
  - type: text
    content: ' You carry away [these disobedient people, doomed to die within forty years] as with a flood; they are as a sleep [vague and forgotten as soon as they are gone]. In the morning they are like grass which grows up–'
  '6':
  - type: text
    content: ' In the morning it flourishes and springs up; in the evening it is mown down and withers.'
  '7':
  - type: text
    content: ' For we [the Israelites in the wilderness] are consumed by Your anger, and by Your wrath are we troubled, overwhelmed, '
  - type: text
    content: and
  - type: text
    content: ' frightened away.'
  '8':
  - type: text
    content: ' Our iniquities, our secret heart '
  - type: text
    content: and
  - type: text
    content: ' its sins [which we would so like to conceal even from ourselves], You have set in the [revealing] light of Your countenance.'
  '9':
  - type: text
    content: ' For all our days [out here in this wilderness, says Moses] pass away in Your wrath; we spend our years as a tale that is told [for we adults know we are doomed to die soon, without reaching Canaan]. [Num. 14:26-35.]'
