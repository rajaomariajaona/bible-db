document_id: PSA.90
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prayer of Moses the man of God.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', YOU have been our dwelling place '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our refuge in all generations [says Moses].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Before the mountains were brought forth or ever You had formed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given birth to the earth and the world, even from everlasting to everlasting You are God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You turn man back to dust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corruption, and say, Return, O sons of the earthborn [to the earth]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For a thousand years in Your sight are but as yesterday when it is past, or as a watch in the night. [II Pet. 3:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You carry away [these disobedient people, doomed to die within forty years] as with a flood; they are as a sleep [vague and forgotten as soon as they are gone]. In the morning they are like grass which grows up–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In the morning it flourishes and springs up; in the evening it is mown down and withers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For we [the Israelites in the wilderness] are consumed by Your anger, and by Your wrath are we troubled, overwhelmed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frightened away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Our iniquities, our secret heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' its sins [which we would so like to conceal even from ourselves], You have set in the [revealing] light of Your countenance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For all our days [out here in this wilderness, says Moses] pass away in Your wrath; we spend our years as a tale that is told [for we adults know we are doomed to die soon, without reaching Canaan]. [Num. 14:26-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The days of our years are threescore years and ten (seventy years)–or even, if by reason of strength, fourscore years (eighty years); yet is their pride [in additional years] only labor and sorrow, for it is soon gone, and we fly away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Who knows the power of Your anger? [Who worthily connects this brevity of life with Your recognition of sin?] And Your wrath, who connects it with the reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear that is due You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So teach us to number our days, that we may get us a heart of wisdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Turn, O Lord [from Your fierce anger]! How long–? Revoke Your sentence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be compassionate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at ease toward Your servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' O satisfy us with Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness in the morning [now, before we are older], that we may rejoice and be glad all our days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Make us glad in proportion to the days in which You have afflicted us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the years in which we have suffered evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let Your work [the signs of Your power] be revealed to Your servants, and Your [glorious] majesty to their children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And let the beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delightfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor of the Lord our God be upon us; confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish the work of our hands–yes, the work of our hands, confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish it.'
