document_id: LEV.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' And you shall not glean your vineyard bare, neither shall you gather its fallen grapes; you shall leave them for the poor and the stranger. I am the Lord your God.'
  '11':
  - type: text
    content: ' You shall not steal, or deal falsely, or lie one to another. [Col. 3:9, 10.]'
  '12':
  - type: text
    content: ' And you shall not swear by My name falsely, neither shall you profane the name of your God. I am the Lord.'
  '13':
  - type: text
    content: ' You shall not defraud '
  - type: text
    content: or
  - type: text
    content: ' oppress your neighbor or rob him; the wages of a hired servant shall not remain with you all night until morning.'
  '14':
  - type: text
    content: ' You shall not curse the deaf or put a stumbling block before the blind, but you shall [reverently] fear your God. I am the Lord.'
  '15':
  - type: text
    content: ' You shall do no injustice in judging a case; you shall not be partial to the poor or show a preference for the mighty, but in righteousness '
  - type: text
    content: and
  - type: text
    content: ' according to the merits of the case judge your neighbor.'
  '16':
  - type: text
    content: ' You shall not go up and down as a dispenser of gossip '
  - type: text
    content: and
  - type: text
    content: ' scandal among your people, nor shall you [secure yourself by false testimony or by silence and] endanger the life of your neighbor. I am the Lord.'
  '17':
  - type: text
    content: ' You shall not hate your brother in your heart; but you shall surely rebuke your neighbor, lest you incur sin because of him. [Gal. 6:1; I John 2:9, 11; 3:15.]'
  '18':
  - type: text
    content: ' You shall not take revenge or bear any grudge against the sons of your people, but you shall love your neighbor as yourself. I am the Lord. [Matt. 5:43-46; Rom. 12:17, 19.]'
  '19':
  - type: text
    content: ' You shall keep My statutes. You shall not let your domestic animals breed with a different kind [of animal]; you shall not sow your field with mixed seed, neither wear a garment of linen mixed with wool.'
  '2':
  - type: text
    content: ' Say to all the assembly of the Israelites, You shall be holy, for I the Lord your God am holy. [I Pet. 1:15.]'
  '20':
  - type: text
    content: ' And if a man lies carnally with a woman who is a slave betrothed to a husband and not yet ransomed or given her freedom, they shall be punished [after investigation]; they shall not be put to death, because she was not free;'
  '21':
  - type: text
    content: ' But he shall bring his guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering to the Lord to the door of the Tent of Meeting, a ram for a guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering.'
  '22':
  - type: text
    content: ' The priest shall make atonement for him with the ram of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering before the Lord for his sin, and he shall be forgiven for committing the sin.'
  '23':
  - type: text
    content: ' And when you come into the land and have planted all kinds of trees for food, then you shall count the fruit of them as inedible '
  - type: text
    content: and
  - type: text
    content: ' forbidden to you for three years; it shall not be eaten.'
  '24':
  - type: text
    content: ' In the fourth year all their fruit shall be holy for giving praise to the Lord.'
  '25':
  - type: text
    content: ' But in the fifth year you may eat of the fruit [of the trees], that their produce may enrich you; I am the Lord your God.'
  '26':
  - type: text
    content: ' You shall not eat anything with the blood; neither shall you use magic, omens, '
  - type: text
    content: or
  - type: text
    content: ' witchcraft [or predict events by horoscope or signs and lucky days].'
  '27':
  - type: text
    content: ' You shall not round the corners of the hair of your heads nor trim the corners of your beard [as some idolaters do].'
  '28':
  - type: text
    content: ' You shall not make any cuttings in your flesh for the dead nor print '
  - type: text
    content: or
  - type: text
    content: ' tattoo any marks upon you; I am the Lord.'
  '29':
  - type: text
    content: ' Do not profane your daughter by causing her to be a harlot, lest the land fall into harlotry and become full of wickedness.'
  '3':
  - type: text
    content: ' Each of you shall give due respect to his mother and his father, and keep My Sabbaths holy. I the Lord am your God.'
  '30':
  - type: text
    content: ' You shall keep My Sabbaths and reverence My sanctuary. I am the Lord.'
  '31':
  - type: text
    content: ' Turn not to those [mediums] who have familiar spirits or to wizards; do not seek them out to be defiled by them. I am the Lord your God.'
  '32':
  - type: text
    content: ' You shall rise up before the hoary head and honor the face of the old man and [reverently] fear your God. I am the Lord.'
  '33':
  - type: text
    content: ' And if a stranger dwells temporarily with you in your land, you shall not suppress '
  - type: text
    content: and
  - type: text
    content: ' mistreat him.'
  '34':
  - type: text
    content: ' But the stranger who dwells with you shall be to you as one born among you; and you shall love him as yourself, for you were strangers in the land of Egypt. I am the Lord your God.'
  '35':
  - type: text
    content: ' You shall do no unrighteousness in judgment, in measures of length or weight or quantity.'
  '36':
  - type: text
    content: ' You shall have accurate '
  - type: text
    content: and
  - type: text
    content: ' just balances, just weights, just ephah and hin measures. I am the Lord your God, Who brought you out of the land of Egypt.'
  '37':
  - type: text
    content: ' You shall observe all My statutes and ordinances and do them. I am the Lord.'
  '4':
  - type: text
    content: ' Do not turn to idols '
  - type: text
    content: and
  - type: text
    content: ' things of nought or make for yourselves molten gods. I the Lord am your God.'
  '5':
  - type: text
    content: ' And when you offer a sacrifice of peace offering to the Lord, you shall offer it so that you may be accepted.'
  '6':
  - type: text
    content: ' It shall be eaten the same day you offer it and on the day following; and if anything remains until the third day, it shall be burned in the fire.'
  '7':
  - type: text
    content: ' If it is eaten at all the third day, it is loathsome; it will not be accepted.'
  '8':
  - type: text
    content: ' But everyone who eats it shall bear his iniquity, for he has profaned a holy thing of the Lord; and that soul shall be cut off from his people [and not be included in the atonement made for them].'
  '9':
  - type: text
    content: ' And when you reap the harvest of your land, you shall not reap your field to its very corners, neither shall you gather the fallen ears '
  - type: text
    content: or
  - type: text
    content: ' gleanings of your harvest.'
