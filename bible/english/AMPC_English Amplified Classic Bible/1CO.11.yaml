document_id: 1CO.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PATTERN YOURSELVES after me [follow my example], as I imitate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I appreciate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commend you because you always remember me in everything and keep firm possession of the traditions (the substance of my instructions), just as I have [verbally] passed them on to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But I want you to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that Christ is the Head of every man, the head of a woman is her husband, and the Head of Christ is God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Any man who prays or prophesies (teaches, refutes, reproves, admonishes, and comforts) with his head covered dishonors his Head (Christ).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And any woman who [publicly] prays or prophesies (teaches, refutes, reproves, admonishes, or comforts) when she is bareheaded dishonors her head (her husband); it is the same as [if her head were] shaved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For if a woman will not wear [a head] covering, then she should cut off her hair too; but if it is disgraceful for a woman to have her head shorn or shaven, let her cover [her head].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For a man ought not to wear anything on his head [in church], for he is the image and [reflected] glory of God [his function of government reflects the majesty of the divine Rule]; but woman is [the expression of] man''s glory (majesty, preeminence). [Gen. 1:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For man was not [created] from woman, but woman from man; [Gen. 2:21-23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Neither was man created on account of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' for the benefit of woman, but woman on account of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the benefit of man. [Gen. 2:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore she should [be subject to his authority and should] have a covering on her head [as a token, a symbol, of her submission to authority, that she may show reverence as do] the angels [and not displease them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Nevertheless, in [the plan of] the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from His point of view woman is not apart from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' independent of man, nor is man aloof from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' independent of woman;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For as woman was made from man, even so man is also born of woman; and all [whether male or female go forth] from God [as their Author].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Consider for yourselves; is it proper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decent [according to your customs] for a woman to offer prayer to God [publicly] with her head uncovered?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Does not the native sense of propriety (experience, common sense, reason) itself teach you that for a man to wear long hair is a dishonor [humiliating and degrading] to him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But if a woman has long hair, it is her ornament '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory? For her hair is given to her for a covering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now if anyone is disposed to be argumentative '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contentious about this, we hold to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize no other custom [in worship] than this, nor do the churches of God generally.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But in what I instruct [you] next I do not commend [you], because when you meet together, it is not for the better but for the worse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For in the first place, when you assemble as a congregation, I hear that there are cliques (divisions and factions) among you; and I in part believe it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For doubtless there have to be factions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' parties among you in order that they who are genuine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of approved fitness may become evident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plainly recognized among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So when you gather for your meetings, it is not the supper instituted by the Lord that you eat,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For in eating each one [hurries] to get his own supper first [not waiting for the poor], and one goes hungry while another gets drunk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' What! Do you have no houses in which to eat and drink? Or do you despise the church of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mean to show contempt for it, while you humiliate those who are poor (have no homes and have brought no food)? What shall I say to you? Shall I commend you in this? No, [most certainly] I will not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For I received from the Lord Himself that which I passed on to you [it was given to me personally], that the Lord Jesus on the night when He was treacherously delivered up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' while His betrayal was in progress took bread,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And when He had given thanks, He broke [it] and said, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Take, eat.
  - type: text
    text: ' This is My body, which is broken for you. Do this to call Me [affectionately] to remembrance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Similarly when supper was ended, He took the cup also, saying, This cup is the new covenant [ratified and established] in My blood. Do this, as often as you drink [it], to call Me [affectionately] to remembrance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For every time you eat this bread and drink this cup, you are representing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' signifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaiming the fact of the Lord''s death until He comes [again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So then whoever eats the bread or drinks the cup of the Lord in a way that is unworthy [of Him] will be guilty of [profaning and sinning against] the body and blood of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Let a man [thoroughly] examine himself, and [only when he has done] so should he eat of the bread and drink of the cup.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For anyone who eats and drinks without discriminating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognizing with due appreciation that [it is Christ''s] body, eats and drinks a sentence (a verdict of judgment) upon himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' That [careless and unworthy participation] is the reason many of you are weak and sickly, and quite enough of you have fallen into the sleep of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' For if we searchingly examined ourselves [detecting our shortcomings and recognizing our own condition], we should not be judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penalty decreed [by the divine judgment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But when we [fall short and] are judged by the Lord, we are disciplined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chastened, so that we may not [finally] be condemned [to eternal punishment along] with the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So then, my brothers, when you gather together to eat [the Lord''s Supper], wait for one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' If anyone is hungry, let him eat at home, lest you come together to bring judgment [on yourselves]. About the other matters, I will give you directions [personally] when I come.'
