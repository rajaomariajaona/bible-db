document_id: DEU.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' HE WHO is wounded in the testicles, or has been made a eunuch, shall not enter into the congregation of the Lord.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If there is among you any man who is not clean by reason of what happens to him at night, then he shall go outside the camp; he shall not come within the camp;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when evening comes he shall bathe himself in water, and when the sun is down he may return to the camp.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall have a place also outside the camp to which you shall go [as a comfort station];'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall have a paddle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' shovel among your weapons, and when you sit down outside [to relieve yourself], you shall dig a hole with it and turn back and cover up what has come from you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord your God walks in the midst of your camp to deliver you and to give up your enemies before you. Therefore shall your camp be holy, that He may see nothing indecent among you and turn away from you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall not give up to his master a servant who has escaped from his master to you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He shall dwell with you in your midst wherever he chooses in one of your towns where it pleases him best. You shall not defraud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' oppress him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There shall be no cult prostitute among the daughters of Israel, neither shall there be a cult prostitute (a sodomite) among the sons of Israel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall not bring the hire of a harlot or the price of a dog (a sodomite) into the house of the Lord your God as payment of a vow, for both of these [the gift and the giver] are an abomination to the Lord your God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall not lend on interest to your brother–interest on money, on victuals, on anything that is lent for interest.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A person begotten out of wedlock shall not enter into the assembly of the Lord; even to his tenth generation shall his descendants not enter into the congregation of the Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You may lend on interest to a foreigner, but to your brother you shall not lend on interest, that the Lord your God may bless you in all that you undertake in the land to which you go to possess it.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you make a vow to the Lord your God, you shall not be slack in paying it, for the Lord your God will surely require it of you, and slackness would be sin in you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you refrain from vowing, it will not be sin in you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The vow which has passed your lips you shall be watchful to perform, a voluntary offering which you have made to the Lord your God, which you have promised with your mouth.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you come into your neighbor''s vineyard, you may eat your fill of grapes, as many as you please, but you shall not put any in your vessel.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you come into the standing grain of your neighbor, you may pluck the ears with your hand, but you shall not put a sickle to your neighbor''s standing grain.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' An Ammonite or Moabite shall not enter into the congregation of the Lord; even to their tenth generation their descendants shall not enter into the assembly of the Lord forever,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because they did not meet you with food and water on the way when you came forth out of Egypt, and because they hired Balaam son of Beor of Pethor of Mesopotamia against you to curse you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nevertheless, the Lord your God would not listen to Balaam, but the Lord your God turned the curse into a blessing to you, because the Lord your God loves you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall not seek their peace or their prosperity all your days forever.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall not abhor an Edomite, for he is your brother [Esau''s descendant]. You shall not abhor an Egyptian, because you were a stranger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' temporary resident in his land.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their children may enter into the congregation of the Lord in their third generation.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you go forth against your enemies and are in camp, you shall keep yourselves from every evil thing.'
