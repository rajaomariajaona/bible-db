document_id: MAT.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND JESUS summoned to Him His twelve disciples and gave them power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority over unclean spirits, to drive them out, and to cure all kinds of disease and all kinds of weakness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infirmity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now these are the names of the twelve apostles (special messengers): first, Simon, who is called Peter, and Andrew his brother; James son of Zebedee, and John his brother;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Philip and Bartholomew [Nathaniel]; Thomas and Matthew the tax collector; James son of Alphaeus, and Thaddaeus [Judas, not Iscariot];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Simon the Cananaean, and Judas Iscariot, who also betrayed Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Jesus sent out these twelve, charging them, Go nowhere among the Gentiles and do not go into any town of the Samaritans;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But go rather to the lost sheep of the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And as you go, preach, saying, The kingdom of heaven is at hand!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Cure the sick, raise the dead, cleanse the lepers, drive out demons. Freely (without pay) you have received, freely (without charge) give.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Take no gold nor silver nor [even] copper money in your purses (belts);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And do not take a provision bag '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a wallet for a collection bag for your journey, nor two undergarments, nor sandals, nor a staff; for the workman deserves his support (his living, his food).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And into whatever town or village you go, inquire who in it is deserving, and stay there [at his house] until you leave [that vicinity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' As you go into the house, give your greetings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wish it well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then if indeed that house is deserving, let come upon it your peace [that is, freedom from all the distresses that are experienced as the result of sin]. But if it is not deserving, let your peace return to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And whoever will not receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome you nor listen to your message, as you leave that house or town, shake the dust [of it] from your feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Truly I tell you, it shall be more tolerable on the day of judgment for the land of Sodom and Gomorrah than for that town.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Behold, I am sending you out like sheep in the midst of wolves; be wary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise as serpents, and be innocent (harmless, guileless, and without falsity) as doves. [Gen. 3:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Be on guard against men [whose way or nature is to act in opposition to God]; for they will deliver you up to councils and flog you in their synagogues,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And you will be brought before governors and kings for My sake, as a witness to bear testimony before them and to the Gentiles (the nations).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But when they deliver you up, do not be anxious about how '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' what you are to speak; for what you are to say will be given you in that very hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For it is not you who are speaking, but the Spirit of your Father speaking through you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Brother will deliver up brother to death, and the father his child; and children will take a stand against their parents and will have them put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And you will be hated by all for My name''s sake, but he who perseveres '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endures to the end will be saved [from spiritual disease and death in the world to come].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When they persecute you in one town [that is, pursue you in a manner that would injure you and cause you to suffer because of your belief], flee to another town; for truly I tell you, you will not have gone through all the towns of Israel before the Son of Man comes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' A disciple is not above his teacher, nor is a servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' slave above his master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' It is sufficient for the disciple to be like his teacher, and the servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' slave like his master. If they have called the Master of the house Beelzebub [master of the dwelling], how much more will they speak evil of those of His household. [II Kings 1:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So have no fear of them; for nothing is concealed that will not be revealed, or kept secret that will not become known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' What I say to you in the dark, tell in the light; and what you hear whispered in the ear, proclaim upon the housetops.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And do not be afraid of those who kill the body but cannot kill the soul; but rather be afraid of Him who can destroy both soul and body in hell (Gehenna).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Are not two little sparrows sold for a penny? And yet not one of them will fall to the ground without your Father''s leave (consent) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' notice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But even the very hairs of your head are all numbered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Fear not, then; you are of more value than many sparrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Therefore, everyone who acknowledges Me before men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confesses Me [out of a state of oneness with Me], I will also acknowledge him before My Father Who is in heaven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess [that I am abiding in] him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But whoever denies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowns Me before men, I also will deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disown him before My Father Who is in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Do not think that I have come to bring peace upon the earth; I have not come to bring peace, but a sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' For I have come to part asunder a man from his father, and a daughter from her mother, and a newly married wife from her mother-in-law–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And a man''s foes will be they of his own household. [Mic. 7:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' He who loves [and takes more pleasure in] father or mother more than [in] Me is not worthy of Me; and he who loves [and takes more pleasure in] son or daughter more than [in] Me is not worthy of Me;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And he who does not take up his cross and follow Me [cleave steadfastly to Me, conforming wholly to My example in living and, if need be, in dying also] is not worthy of Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Whoever finds his [lower] life will lose it [the higher life], and whoever loses his [lower] life on My account will find it [the higher life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts you receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts Me, and he who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts Me receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts Him Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' He who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts a prophet because he is a prophet shall receive a prophet''s reward, and he who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts a righteous man because he is a righteous man shall receive a righteous man''s reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And whoever gives to one of these little ones [in rank or influence] even a cup of cold water because he is My disciple, surely I declare to you, he shall not lose his reward.'
