document_id: REV.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND I saw lying on the open hand of Him Who was seated on the throne a scroll (book) written within and on the back, closed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sealed with seven seals; [Isa. 29:11; Ezek. 2:9, 10; Dan. 12:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I saw a strong angel announcing in a loud voice, Who is worthy to open the scroll? And [who is entitled and deserves and is morally fit] to break its seals?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And no one in heaven or on earth or under the earth [in the realm of the dead, Hades] was able to open the scroll or to take a [single] look at its contents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And I wept audibly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bitterly because no one was found fit to open the scroll or to inspect it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then one of the elders [of the heavenly Sanhedrin] said to me, Stop weeping! See, the Lion of the tribe of Judah, the Root (Source) of David, has won (has overcome and conquered)! He can open the scroll and break its seven seals! [Gen. 49:9, 10; Isa. 11:1, 10; Rev. 22:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And there between the throne and the four living creatures (beings) and among the elders [of the heavenly Sanhedrin] I saw a Lamb standing, as though it had been slain, with seven horns and with seven eyes, which are the seven Spirits of God [the sevenfold Holy Spirit] Who have been sent [on duty far and wide] into all the earth. [Isa. 53:7; Zech. 3:8, 9; 4:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He then went and took the scroll from the right hand of Him Who sat on the throne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when He had taken the scroll, the four living creatures and the twenty-four elders [of the heavenly Sanhedrin] prostrated themselves before the Lamb. Each was holding a harp (lute or guitar), and they had golden bowls full of incense (fragrant spices and gums for burning), which are the prayers of God''s people (the saints).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And [now] they sing a new song, saying, You are worthy to take the scroll and to break the seals that are on it, for You were slain (sacrificed), and with Your blood You purchased men unto God from every tribe and language and people and nation. [Ps. 33:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And You have made them a kingdom (royal race) and priests to our God, and they shall reign [as kings] over the earth! [Exod. 19:6; Isa. 61:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then I looked, and I heard the voices of many angels on every side of the throne and of the living creatures and the elders [of the heavenly Sanhedrin], and they numbered ten thousand times ten thousand and thousands of thousands, [Dan. 7:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Saying in a loud voice, Deserving is the Lamb, Who was sacrificed, to receive all the power and riches and wisdom and might and honor and majesty (glory, splendor) and blessing!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I heard every created thing in heaven and on earth and under the earth [in Hades, the place of departed spirits] and on the sea and all that is in it, crying out together, To Him Who is seated on the throne and to the Lamb be ascribed the blessing and the honor and the majesty (glory, splendor) and the power (might and dominion) forever and ever (through the eternities of the eternities)! [Dan. 7:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the four living creatures (beings) said, Amen (so be it)! And the elders [of the heavenly Sanhedrin] prostrated themselves and worshiped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him Who lives forever and ever.
