document_id: HAB.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A PRAYER of Habakkuk the prophet, set to wild, enthusiastic, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' triumphal music.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The mountains saw You; they trembled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' writhed [as if in pain]. The overflowing of the water passed by [as at the deluge]; the deep uttered its voice and lifted its hands on high.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sun and moon stood back [as before Joshua] in their habitation at the light of Your arrows as they sped, at the flash of Your glittering spear. [Josh. 10:12, 13.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You marched through the land in indignation; You trampled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' threshed the nations in anger.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You went forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have come for the salvation of Your people, for the deliverance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' victory of Your anointed [people Israel]; You smote the head of the house of the wicked, laying bare the foundation even to the neck. Selah [pause, and calmly think of that]!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You pierced with his own arrows the head of [the enemy''s] hordes; they came out as a whirlwind to scatter me [the people], rejoicing as if to devour the poor [Israel] secretly.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have trodden the sea with Your horses, [beside] the heap of great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' surging waters. [Exod. 15:8.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I heard and my [whole inner self] trembled; my lips quivered at the sound. Rottenness enters into my bones and under me [down to my feet]; I tremble. I will wait quietly for the day of trouble and distress when there shall come up against [my] people him who is about to invade '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppress them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Though the fig tree does not blossom and there is no fruit on the vines, [though] the product of the olive fails and the fields yield no food, though the flock is cut off from the fold and there are no cattle in the stalls,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet I will rejoice in the Lord; I will exult in the [victorious] God of my salvation! [Rom. 8:37.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord God is my Strength, my personal bravery, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my invincible army; He makes my feet like hinds'' feet and will make me to walk [not to stand still in terror, but to walk] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make [spiritual] progress upon my high places [of trouble, suffering, or responsibility]! For the Chief Musician; with my stringed instruments.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O Lord, I have heard the report of You and was afraid. O Lord, revive Your work in the midst of the years, in the midst of the years make [Yourself] known! In wrath [earnestly] remember love, pity, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God [approaching from Sinai] came from Teman [which represents Edom] and the Holy One from Mount Paran [in the Sinai region]. Selah [pause, and calmly think of that]! His glory covered the heavens and the earth was full of His praise.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And His brightness was like the sunlight; rays streamed from His hand, and there [in the sunlike splendor] was the hiding place of His power.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Before Him went the pestilence [as in Egypt], and burning plague followed His feet [as in Sennacherib''s army]. [Exod. 7:2-4; II Kings 19:32-35.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He stood and measured the earth; He looked and shook the nations, and the eternal mountains were scattered and the perpetual hills bowed low. His ways are everlasting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His goings are of old.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I [Habakkuk, in vision] saw the tents of Cushan [probably Ethiopia] in affliction; the [tent] curtains of the land of Midian trembled.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Were You displeased with the rivers, O Lord? Or was Your anger against the rivers [You divided]? Was Your wrath against the [Red] Sea, that You rode [before] upon Your horses and Your chariots of victory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your bow was made quite bare; sworn to the tribes [of Israel] by Your sure word were the rods of chastisement, scourges, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' calamities. Selah [pause, and calmly think of that]! With rivers You cleaved the earth [bringing forth waters in dry places]. [Exod. 17:6; Num. 20:11.]'
