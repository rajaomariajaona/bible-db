document_id: ECC.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THERE IS an evil which I have seen under the sun, and it lies heavily upon men:'
  '10':
  - type: text
    content: ' Whatever [man] is, he has been named that long ago, and it is known that it is man [Adam]; nor can he contend with Him who is mightier than he [whether God or death].'
  '11':
  - type: text
    content: ' Seeing that there are [all these and] many other things '
  - type: text
    content: and
  - type: text
    content: ' words that increase the emptiness, falsity, vainglory, '
  - type: text
    content: and
  - type: text
    content: ' futility [of living], what profit '
  - type: text
    content: and
  - type: text
    content: ' what outcome is there for man?'
  '12':
  - type: text
    content: ' For who [limited to human wisdom] knows what is good for man in his life, all the days of his vain life which he spends as a shadow [going through the motions but accomplishing nothing]? For who can tell a man what will happen [to his work, his treasure, his plans] under the sun after he is gone?'
  '2':
  - type: text
    content: ' A man to whom God has given riches, possessions, and honor, so that he lacks nothing for his soul of all that he might desire, yet God does not give him the power '
  - type: text
    content: or
  - type: text
    content: ' capacity to enjoy them [things which are gifts from God], but a stranger [in whom he has no interest succeeds him and] consumes '
  - type: text
    content: and
  - type: text
    content: ' enjoys them. This is vanity (emptiness, falsity, and futility); it is a sore affliction! [Luke 12:20.]'
  '3':
  - type: text
    content: ' If a man begets a hundred children and lives many years so that the days of his years are many, but his life is not filled with good, and also he is given no burial [honors nor is laid to rest in the sepulcher of his fathers], I say that [he who had] an untimely birth [resulting in death] is better off than he, [Job 3:16.]'
  '4':
  - type: text
    content: ' For [the untimely one] comes in futility and goes into darkness, and in darkness his name is covered.'
  '5':
  - type: text
    content: ' Moreover, he has not seen the sun nor had any knowledge, yet he [the stillborn child] has rest rather than he [who is aware of all that he has missed and all that he would not have had to suffer].'
  '6':
  - type: text
    content: ' Even though he lives a thousand years twice over and yet has seen no good '
  - type: text
    content: and
  - type: text
    content: ' experienced no enjoyment–do not all go to one place [the place of the dead]?'
  '7':
  - type: text
    content: ' All the labor of man is for his mouth [for self-preservation and enjoyment], and yet his desire is not satisfied. [Prov. 16:26.]'
  '8':
  - type: text
    content: ' For what advantage has the wise man over the fool [being worldly-wise is not the secret to happiness]? What advantage has the poor man who has learned how to walk before the living [publicly, with men''s eyes upon him; being poor is not the secret to happiness either]?'
  '9':
  - type: text
    content: ' Better is the sight of the eyes [the enjoyment of what is available to one] than the cravings of wandering desire. This is also vanity (emptiness, falsity, and futility) and a striving after the wind '
  - type: text
    content: and
  - type: text
    content: ' a feeding on it!'
