document_id: GEN.15,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THESE things, the word of the Lord came to Abram in a vision, saying, Fear not, Abram, I am your Shield, your abundant compensation, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your reward shall be exceedingly great.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And he brought Him all these and cut them down the middle [into halves] and laid each half opposite the other; but the birds he did not divide.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And when the birds of prey swooped down upon the carcasses, Abram drove them away.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' When the sun was setting, a deep sleep overcame Abram, and a horror (a terror, a shuddering fear) of great darkness assailed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressed him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And [God] said to Abram, Know positively that your descendants will be strangers dwelling as temporary residents in a land that is not theirs [Egypt], and they will be slaves there and will be afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressed for 400 years. [Fulfilled in Exod. 12:40.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But I will bring judgment on that nation whom they will serve, and afterward they will come out with great possessions. [Acts 7:6, 7.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And you shall go to your fathers in peace; you shall be buried at a good old (hoary) age.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And in the fourth generation they [your descendants] shall come back here [to Canaan] again, for the iniquity of the Amorites is not yet full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete. [Josh. 24:15.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' When the sun had gone down and a [thick] darkness had come on, behold, a smoking oven and a flaming torch passed between those pieces.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' On the same day the Lord made a covenant (promise, pledge) with Abram, saying, To your descendants I have given this land, from the river of Egypt to the great river Euphrates–the land of'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The Kenites, the Kenizzites, the Kadmonites,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Abram said, Lord God, what can You give me, since I am going on [from this world] childless and he who shall be the owner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heir of my house is this [steward] Eliezer of Damascus?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The Hittites, the Perizzites, the Rephaim,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The Amorites, the Canaanites, the Girgashites, and the Jebusites.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And Abram continued, Look, You have given me no child; and [a servant] born in my house is my heir.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And behold, the word of the Lord came to him, saying, This man shall not be your heir, but he who shall come from your own body shall be your heir.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And He brought him outside [his tent into the starlight] and said, Look now toward the heavens and count the stars–if you are able to number them. Then He said to him, So shall your descendants be. [Heb. 11:12.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And he [Abram] believed in (trusted in, relied on, remained steadfast to) the Lord, and He counted it to him as righteousness (right standing with God). [Rom. 4:3, 18-22; Gal. 3:6; James 2:23.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And He said to him, I am the [same] Lord, Who brought you out of Ur of the Chaldees to give you this land as an inheritance.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But he [Abram] said, Lord God, by what shall I know that I shall inherit it?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And He said to him, Bring to Me a heifer three years old, a she-goat three years old, a ram three years old, a turtledove, and a young pigeon.'
