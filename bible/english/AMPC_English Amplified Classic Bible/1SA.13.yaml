document_id: 1SA.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SAUL WAS [forty] years old when he began to reign; and when he had reigned two years over Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Saul chose 3,000 men of Israel; 2,000 were with [him] in Michmash and the hill country of Bethel, and 1,000 with Jonathan in Gibeah of Benjamin. The rest of the men he sent away, each one to his home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Jonathan smote the Philistine garrison at Geba, and the Philistines heard of it. And Saul blew the trumpet throughout all the land, saying, Let the Hebrews hear!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' All Israel heard that Saul had defeated the Philistine garrison and also that Israel had become an abomination to the Philistines. And the people were called out to join Saul at Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Philistines gathered to fight with Israel, 30,000 chariots and 6,000 horsemen and troops like sand on the seashore in multitude. They came up and encamped at Michmash, east of Beth-aven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When the men of Israel saw that they were in a tight situation–for their troops were hard pressed–they hid in caves, holes, rocks, tombs, and pits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cisterns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Some Hebrews had gone over the Jordan to the land of Gad and Gilead. As for Saul, he was still in Gilgal, and all the people followed him trembling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Saul waited seven days, according to the set time Samuel had appointed. But Samuel had not come to Gilgal, and the people were scattering from Saul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Saul said, Bring me the burnt offering and the peace offerings. And he offered the burnt offering [which he was forbidden to do].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And just as he finished offering the burnt offering, behold, Samuel came! Saul went out to meet and greet him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Samuel said, What have you done? Saul said, Because I saw that the people were scattering from me, and that you did not come within the days appointed, and that the Philistines were assembled at Michmash,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I thought, The Philistines will come down now upon me to Gilgal, and I have not made supplication to the Lord. So I forced myself to offer a burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Samuel said to Saul, You have done foolishly! You have not kept the commandment of the Lord your God which He commanded you; for the Lord would have established your kingdom over Israel forever;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But now your kingdom shall not continue; the Lord has sought out [David] a man after His own heart, and the Lord has commanded him to be prince '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruler over His people, because you have not kept what the Lord commanded you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Samuel went up from Gilgal to Gibeah of Benjamin. And Saul numbered the people that were left with him, [only] about 600.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Saul and Jonathan his son and the people with them remained in Gibeah of Benjamin, but the Philistines encamped at Michmash.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And raiders came out of the Philistine camp in three companies; one company turned toward Ophrah, to the land of Shual,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Another turned toward Beth-horon, and another toward the border overlooking the Valley of Zeboim toward the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now there was no metal worker to be found throughout all the land of Israel, for the Philistines said, Lest the Hebrews make swords or spears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But each of the Israelites had to go down to the Philistines to get his plowshare, mattock, axe, or sickle sharpened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the price for plowshares and mattocks was a pim, and a third of a shekel for axes and for setting goads [with resulting blunt edges on the sickles, mattocks, forks, axes, and goads.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So on the day of battle neither sword nor spear was found in the hand of any of the men who were with Saul and Jonathan; but Saul and Jonathan his son had them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the garrison of the Philistines went out to the pass of Michmash.'
