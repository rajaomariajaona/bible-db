document_id: 1KI.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ABIJAH [the little] son of Jeroboam became sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Jeroboam said to his wife, Arise, I pray you, and disguise yourself, that you may not be recognized as Jeroboam''s wife, and go to Shiloh. Behold, Ahijah the prophet is there, who told me that I should be king over this people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Take ten loaves, some cakes, and a bottle of honey, and go to him. He will tell you what shall happen to the child.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Jeroboam''s wife did so. She arose and went [twenty miles] to Shiloh and came to the house of Ahijah. Ahijah could not see, for his eyes were dim because of his age.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Lord said to Ahijah, Behold, the wife of Jeroboam is coming to ask you concerning her son, for he is sick. Thus and thus shall you say to her. When she came, she pretended to be another woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But when Ahijah heard the sound of her feet as she came in at the door, he said, Come in, wife of Jeroboam. Why do you pretend to be another? For I am charged with heavy news for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Go, tell Jeroboam, Thus says the Lord, the God of Israel: Because I exalted you from among the people and made you leader over My people Israel'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And rent the kingdom away from the house of David and gave it to you–and yet you have not been as My servant David, who kept My commandments and followed Me with all his heart, to do only what was right in My eyes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But have done evil above all who were before you; for you have made yourself other gods, molten images, to provoke Me to anger and have cast Me behind your back–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore behold, I will bring evil upon the house of Jeroboam and will cut off from [him] every male, both bond and free, in Israel, and will utterly sweep away the house of Jeroboam as a man sweeps away dung, till it is all gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Anyone belonging to Jeroboam who dies in the city the dogs shall eat, and any who dies in the field the birds of the heavens shall eat. For the Lord has spoken it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Arise therefore [Ano, Jeroboam''s wife], get to your own house. When your feet enter the city, the child shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And all Israel shall mourn for him and bury him; for he only of Jeroboam''s family shall come to the grave, because in him there is found something good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to the Lord, the God of Israel, in the house of Jeroboam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Moreover, the Lord will raise up for Himself a king over Israel who shall cut off the house of Jeroboam this day. From now on'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The Lord will smite Israel, as a reed is shaken in the water; and He will root up Israel out of this good land which He gave to their fathers and will scatter them beyond the [Euphrates] River, because they have made their Asherim [idolatrous symbols of the goddess Asherah], provoking the Lord to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He will give Israel up because of the sins of Jeroboam which he has sinned and made Israel to sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Jeroboam''s wife departed and came to Tirzah. When she came to the threshold of the house, the child died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And all Israel buried him and mourned for him, according to the word of the Lord spoken by His servant Ahijah the prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The rest of the acts of Jeroboam, how he warred and how he reigned, behold, they are written in the Book of the Chronicles of the Kings of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Jeroboam reigned for twenty-two years, and he slept with his fathers; and Nadab his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Rehoboam son of Solomon reigned in Judah. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city the Lord chose out of all the tribes of Israel to put His Name [and the pledge of His presence] there. His mother''s name was Naamah the Ammonitess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Judah did evil in the sight of the Lord, Whom they provoked to jealousy with the sins they committed, above all that their fathers had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For they also built themselves [idolatrous] high places, pillars, and Asherim [idolatrous symbols of the goddess Asherah] on every high hill and under every green tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' There were also sodomites (male cult prostitutes) in the land. They did all the abominations of the nations whom the Lord cast out before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' In the fifth year of King Rehoboam, Shishak king of Egypt [Jeroboam''s brother-in-law] came up against Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He took away the treasures of the house of the Lord and of the king''s house; he took away all, including all the shields of gold which Solomon had made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' King Rehoboam made in their stead bronze shields and committed them to the hands of the captains of the guard who kept the door of the king''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And as often as the king went into the house of the Lord, the guards bore them and brought them back into the guardroom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The rest of the acts of Rehoboam, and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' There was war between Rehoboam and Jeroboam continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Rehoboam slept with his fathers and was buried with them in the City of David. His mother''s name was Naamah the Ammonitess. Abijam (Abijah) his son reigned in his stead.'
