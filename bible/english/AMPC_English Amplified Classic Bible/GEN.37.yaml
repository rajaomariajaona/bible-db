document_id: GEN.37,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SO JACOB dwelt in the land in which his father had been a stranger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sojourner, in the land of Canaan.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And he told it to his father [as well as] his brethren. But his father rebuked him and said to him, What is the meaning of this dream that you have dreamed? Shall I and your mother and your brothers actually come to bow down ourselves to the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do homage to you?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Joseph''s brothers envied him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were jealous of him, but his father observed the saying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pondered over it.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Joseph''s brothers went to shepherd '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feed their father''s flock near Shechem.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' [One day] Israel said to Joseph, Do not your brothers shepherd my flock at Shechem? Come, and I will send you to them. And he said, Here I am.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And [Jacob] said to him, Go, I pray you, see whether everything is all right with your brothers and with the flock; then come back and bring me word. So he sent him out of the Hebron Valley, and he came to Shechem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And a certain man found him, and behold, he had lost his way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was wandering in the open country. The man asked him, What are you trying to find?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And he said, I am looking for my brothers. Tell me, I pray you, where they are pasturing our flocks.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But the man said, [They were here, but] they have gone. I heard them say, Let us go to Dothan. And Joseph went after his brothers and found them at Dothan.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And when they saw him far off, even before he came near to them, they conspired to kill him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And they said one to another, See, here comes this dreamer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' master of dreams.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' This is the history of the descendants of Jacob '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' this is Jacob''s line. Joseph, when he was seventeen years old, was shepherding the flock with his brothers; the lad was with the sons of Bilhah and Zilpah, his father''s [secondary] wives; and Joseph brought to his father a bad report of them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So come on now, let us kill him and throw his body into some pit; then we will say [to our father], Some wild '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ferocious animal has devoured him; and we shall see what will become of his dreams!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Now Reuben heard it and he delivered him out of their hands by saying, Let us not kill him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And Reuben said to them, Shed no blood, but cast him into this pit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' well that is out here in the wilderness and lay no hand on him. He was trying to get Joseph out of their hands in order to rescue him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver him again to his father.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' When Joseph had come to his brothers, they stripped him of his [distinctive] long garment which he was wearing;'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Then they took him and cast him into the [well-like] pit which was empty; there was no water in it.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then they sat down to eat their lunch. When they looked up, behold, they saw a caravan of Ishmaelites [mixed Arabians] coming from Gilead, with their camels bearing gum [of the styrax tree], balm (balsam), and myrrh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ladanum, going on their way to carry them down to Egypt.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And Judah said to his brothers, What do we gain if we slay our brother and conceal his blood?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Come, let us sell him to the Ishmaelites [and Midianites, these mixed Arabians who are approaching], and let not our hand be upon him, for he is our brother and our flesh. And his brothers consented.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Then as the Midianite [and Ishmaelite] merchants were passing by, the brothers pulled Joseph up and lifted him out of the well. And they sold him for twenty pieces of silver to the Ishmaelites, who took Joseph [captive] into Egypt.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Then Reuben [who had not been there when the brothers plotted to sell the lad] returned to the pit; and behold, Joseph was not in the pit, and he rent his clothes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Now Israel loved Joseph more than all his children because he was the son of his old age, and he made him a [distinctive] long tunic with sleeves.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' He rejoined his brothers and said, The boy is not there! And I, where shall I go [to hide from my father]?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Then they took Joseph''s [distinctive] long garment, killed a young goat, and dipped the garment in the blood;'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And they sent the garment to their father, saying, We have found this! Examine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decide whether it is your son''s tunic or not.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' He said, My son''s long garment! An evil [wild] beast has devoured him; Joseph is without doubt rent in pieces.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And Jacob tore his clothes, put on sackcloth, and mourned many days for his son.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And all his sons and daughters attempted to console him, but he refused to be comforted and said, I will go down to Sheol (the place of the dead) to my son mourning. And his father wept for him.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And the Midianites [and Ishmaelites] sold [Joseph] in Egypt to Potiphar, an officer of Pharaoh and the captain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chief executioner of the [royal] guard.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But when his brothers saw that their father loved [Joseph] more than all of his brothers, they hated him and could not say, Peace [in friendly greeting] to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' speak peaceably to him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now Joseph had a dream and he told it to his brothers, and they hated him still more.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And he said to them, Listen now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear, I pray you, this dream that I have dreamed:'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' We [brothers] were binding sheaves in the field, and behold, my sheaf arose and stood upright, and behold, your sheaves stood round about my sheaf and bowed down!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' His brothers said to him, Shall you indeed reign over us? Or are you going to have us as your subjects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dominate us? And they hated him all the more for his dreams and for what he said.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But Joseph dreamed yet another dream and told it to his brothers [also]. He said, See here, I have dreamed again, and behold, [this time not only] eleven stars [but also] the sun and the moon bowed down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' did reverence to me!'
