document_id: GEN.37,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO JACOB dwelt in the land in which his father had been a stranger '
  - type: text
    content: and
  - type: text
    content: ' sojourner, in the land of Canaan.'
  '10':
  - type: text
    content: ' And he told it to his father [as well as] his brethren. But his father rebuked him and said to him, What is the meaning of this dream that you have dreamed? Shall I and your mother and your brothers actually come to bow down ourselves to the earth '
  - type: text
    content: and
  - type: text
    content: ' do homage to you?'
  '11':
  - type: text
    content: ' Joseph''s brothers envied him '
  - type: text
    content: and
  - type: text
    content: ' were jealous of him, but his father observed the saying '
  - type: text
    content: and
  - type: text
    content: ' pondered over it.'
  '12':
  - type: text
    content: ' Joseph''s brothers went to shepherd '
  - type: text
    content: and
  - type: text
    content: ' feed their father''s flock near Shechem.'
  '13':
  - type: text
    content: ' [One day] Israel said to Joseph, Do not your brothers shepherd my flock at Shechem? Come, and I will send you to them. And he said, Here I am.'
  '14':
  - type: text
    content: ' And [Jacob] said to him, Go, I pray you, see whether everything is all right with your brothers and with the flock; then come back and bring me word. So he sent him out of the Hebron Valley, and he came to Shechem.'
  '15':
  - type: text
    content: ' And a certain man found him, and behold, he had lost his way '
  - type: text
    content: and
  - type: text
    content: ' was wandering in the open country. The man asked him, What are you trying to find?'
  '16':
  - type: text
    content: ' And he said, I am looking for my brothers. Tell me, I pray you, where they are pasturing our flocks.'
  '17':
  - type: text
    content: ' But the man said, [They were here, but] they have gone. I heard them say, Let us go to Dothan. And Joseph went after his brothers and found them at Dothan.'
  '18':
  - type: text
    content: ' And when they saw him far off, even before he came near to them, they conspired to kill him.'
  '19':
  - type: text
    content: ' And they said one to another, See, here comes this dreamer '
  - type: text
    content: and
  - type: text
    content: ' master of dreams.'
  '2':
  - type: text
    content: ' This is the history of the descendants of Jacob '
  - type: text
    content: and
  - type: text
    content: ' this is Jacob''s line. Joseph, when he was seventeen years old, was shepherding the flock with his brothers; the lad was with the sons of Bilhah and Zilpah, his father''s [secondary] wives; and Joseph brought to his father a bad report of them.'
  '20':
  - type: text
    content: ' So come on now, let us kill him and throw his body into some pit; then we will say [to our father], Some wild '
  - type: text
    content: and
  - type: text
    content: ' ferocious animal has devoured him; and we shall see what will become of his dreams!'
  '21':
  - type: text
    content: ' Now Reuben heard it and he delivered him out of their hands by saying, Let us not kill him.'
  '22':
  - type: text
    content: ' And Reuben said to them, Shed no blood, but cast him into this pit '
  - type: text
    content: or
  - type: text
    content: ' well that is out here in the wilderness and lay no hand on him. He was trying to get Joseph out of their hands in order to rescue him '
  - type: text
    content: and
  - type: text
    content: ' deliver him again to his father.'
  '23':
  - type: text
    content: ' When Joseph had come to his brothers, they stripped him of his [distinctive] long garment which he was wearing;'
  '24':
  - type: text
    content: ' Then they took him and cast him into the [well-like] pit which was empty; there was no water in it.'
  '25':
  - type: text
    content: ' Then they sat down to eat their lunch. When they looked up, behold, they saw a caravan of Ishmaelites [mixed Arabians] coming from Gilead, with their camels bearing gum [of the styrax tree], balm (balsam), and myrrh '
  - type: text
    content: or
  - type: text
    content: ' ladanum, going on their way to carry them down to Egypt.'
  '26':
  - type: text
    content: ' And Judah said to his brothers, What do we gain if we slay our brother and conceal his blood?'
  '27':
  - type: text
    content: ' Come, let us sell him to the Ishmaelites [and Midianites, these mixed Arabians who are approaching], and let not our hand be upon him, for he is our brother and our flesh. And his brothers consented.'
  '28':
  - type: text
    content: ' Then as the Midianite [and Ishmaelite] merchants were passing by, the brothers pulled Joseph up and lifted him out of the well. And they sold him for twenty pieces of silver to the Ishmaelites, who took Joseph [captive] into Egypt.'
  '29':
  - type: text
    content: ' Then Reuben [who had not been there when the brothers plotted to sell the lad] returned to the pit; and behold, Joseph was not in the pit, and he rent his clothes.'
  '3':
  - type: text
    content: ' Now Israel loved Joseph more than all his children because he was the son of his old age, and he made him a [distinctive] long tunic with sleeves.'
  '30':
  - type: text
    content: ' He rejoined his brothers and said, The boy is not there! And I, where shall I go [to hide from my father]?'
  '31':
  - type: text
    content: ' Then they took Joseph''s [distinctive] long garment, killed a young goat, and dipped the garment in the blood;'
  '32':
  - type: text
    content: ' And they sent the garment to their father, saying, We have found this! Examine '
  - type: text
    content: and
  - type: text
    content: ' decide whether it is your son''s tunic or not.'
  '33':
  - type: text
    content: ' He said, My son''s long garment! An evil [wild] beast has devoured him; Joseph is without doubt rent in pieces.'
  '34':
  - type: text
    content: ' And Jacob tore his clothes, put on sackcloth, and mourned many days for his son.'
  '35':
  - type: text
    content: ' And all his sons and daughters attempted to console him, but he refused to be comforted and said, I will go down to Sheol (the place of the dead) to my son mourning. And his father wept for him.'
  '36':
  - type: text
    content: ' And the Midianites [and Ishmaelites] sold [Joseph] in Egypt to Potiphar, an officer of Pharaoh and the captain '
  - type: text
    content: and
  - type: text
    content: ' chief executioner of the [royal] guard.'
  '4':
  - type: text
    content: ' But when his brothers saw that their father loved [Joseph] more than all of his brothers, they hated him and could not say, Peace [in friendly greeting] to him '
  - type: text
    content: or
  - type: text
    content: ' speak peaceably to him.'
  '5':
  - type: text
    content: ' Now Joseph had a dream and he told it to his brothers, and they hated him still more.'
  '6':
  - type: text
    content: ' And he said to them, Listen now '
  - type: text
    content: and
  - type: text
    content: ' hear, I pray you, this dream that I have dreamed:'
  '7':
  - type: text
    content: ' We [brothers] were binding sheaves in the field, and behold, my sheaf arose and stood upright, and behold, your sheaves stood round about my sheaf and bowed down!'
  '8':
  - type: text
    content: ' His brothers said to him, Shall you indeed reign over us? Or are you going to have us as your subjects '
  - type: text
    content: and
  - type: text
    content: ' dominate us? And they hated him all the more for his dreams and for what he said.'
  '9':
  - type: text
    content: ' But Joseph dreamed yet another dream and told it to his brothers [also]. He said, See here, I have dreamed again, and behold, [this time not only] eleven stars [but also] the sun and the moon bowed down '
  - type: text
    content: and
  - type: text
    content: ' did reverence to me!'
