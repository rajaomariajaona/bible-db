document_id: 2TI.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' PAUL, AN apostle (special messenger) of Christ Jesus by the will of God, according to the promise of life that is in Christ Jesus,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [It is that purpose and grace] which He now has made known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has fully disclosed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made real [to us] through the appearing of our Savior Christ Jesus, Who annulled death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made it of no effect and brought life and immortality (immunity from eternal death) to light through the Gospel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [the proclaiming of] this [Gospel] I was appointed a herald (preacher) and an apostle (special messenger) and a teacher '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the Gentiles.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And this is why I am suffering as I do. Still I am not ashamed, for I know (perceive, have knowledge of, and am acquainted with) Him Whom I have believed (adhered to and trusted in and relied on), and I am [positively] persuaded that He is able to guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep that which has been entrusted to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' which I have committed [to Him] until that day.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hold fast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow the pattern of wholesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sound teaching which you have heard from me, in [all] the faith and love which are [for us] in Christ Jesus.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep [with the greatest care] the precious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excellently adapted [Truth] which has been entrusted [to you], by the [help of the] Holy Spirit Who makes His home in us.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You already know that all who are in Asia turned away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forsook me, Phygelus and Hermogenes among them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' May the Lord grant [His] mercy to the family of Onesiphorus, for he often showed me kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ministered to my needs [comforting and reviving and bracing me like fresh air]! He was not ashamed of my chains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imprisonment [for Christ''s sake].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No, rather when he reached Rome, he searched diligently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eagerly for me and found me.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' May the Lord grant to him that he may find mercy from the Lord on that [great] day! And you know how many things he did for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what a help he was at Ephesus [you know better than I can tell you].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To Timothy, [my] beloved child: Grace (favor and spiritual blessing), mercy, and [heart] peace from God the Father and Christ Jesus our Lord!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I thank God Whom I worship with a pure conscience, in the spirit of my fathers, when without ceasing I remember you night and day in my prayers,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when, as I recall your tears, I yearn to see you so that I may be filled with joy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I am calling up memories of your sincere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unqualified faith (the leaning of your entire personality on God in Christ in absolute trust and confidence in His power, wisdom, and goodness), [a faith] that first lived permanently in [the heart of] your grandmother Lois and your mother Eunice and now, I am [fully] persuaded, [dwells] in you also.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That is why I would remind you to stir up (rekindle the embers of, fan the flame of, and keep burning) the [gracious] gift of God, [the inner fire] that is in you by means of the laying on of my hands [with those of the elders at your ordination].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For God did not give us a spirit of timidity (of cowardice, of craven and cringing and fawning fear), but [He has given us a spirit] of power and of love and of calm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well-balanced mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-control.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not blush '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be ashamed then, to testify to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for our Lord, nor of me, a prisoner for His sake, but [with me] take your share of the suffering [to which the preaching] of the Gospel [may expose you, and do it] in the power of God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [For it is He] Who delivered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saved us and called us with a calling in itself holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leading to holiness [to a life of consecration, a vocation of holiness]; [He did it] not because of anything of merit that we have done, but because of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to further His own purpose and grace (unmerited favor) which was given us in Christ Jesus before the world began [eternal ages ago].'
