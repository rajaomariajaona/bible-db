document_id: 2TI.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, AN apostle (special messenger) of Christ Jesus by the will of God, according to the promise of life that is in Christ Jesus,'
  '10':
  - type: text
    content: ' [It is that purpose and grace] which He now has made known '
  - type: text
    content: and
  - type: text
    content: ' has fully disclosed '
  - type: text
    content: and
  - type: text
    content: ' made real [to us] through the appearing of our Savior Christ Jesus, Who annulled death '
  - type: text
    content: and
  - type: text
    content: ' made it of no effect and brought life and immortality (immunity from eternal death) to light through the Gospel.'
  '11':
  - type: text
    content: ' For [the proclaiming of] this [Gospel] I was appointed a herald (preacher) and an apostle (special messenger) and a teacher '
  - type: text
    content: of the Gentiles.
  '12':
  - type: text
    content: ' And this is why I am suffering as I do. Still I am not ashamed, for I know (perceive, have knowledge of, and am acquainted with) Him Whom I have believed (adhered to and trusted in and relied on), and I am [positively] persuaded that He is able to guard '
  - type: text
    content: and
  - type: text
    content: ' keep that which has been entrusted to me '
  - type: text
    content: and
  - type: text
    content: ' which I have committed [to Him] until that day.'
  '13':
  - type: text
    content: ' Hold fast '
  - type: text
    content: and
  - type: text
    content: ' follow the pattern of wholesome '
  - type: text
    content: and
  - type: text
    content: ' sound teaching which you have heard from me, in [all] the faith and love which are [for us] in Christ Jesus.'
  '14':
  - type: text
    content: ' Guard '
  - type: text
    content: and
  - type: text
    content: ' keep [with the greatest care] the precious '
  - type: text
    content: and
  - type: text
    content: ' excellently adapted [Truth] which has been entrusted [to you], by the [help of the] Holy Spirit Who makes His home in us.'
  '15':
  - type: text
    content: ' You already know that all who are in Asia turned away '
  - type: text
    content: and
  - type: text
    content: ' forsook me, Phygelus and Hermogenes among them.'
  '16':
  - type: text
    content: ' May the Lord grant [His] mercy to the family of Onesiphorus, for he often showed me kindness '
  - type: text
    content: and
  - type: text
    content: ' ministered to my needs [comforting and reviving and bracing me like fresh air]! He was not ashamed of my chains '
  - type: text
    content: and
  - type: text
    content: ' imprisonment [for Christ''s sake].'
  '17':
  - type: text
    content: ' No, rather when he reached Rome, he searched diligently '
  - type: text
    content: and
  - type: text
    content: ' eagerly for me and found me.'
  '18':
  - type: text
    content: ' May the Lord grant to him that he may find mercy from the Lord on that [great] day! And you know how many things he did for me '
  - type: text
    content: and
  - type: text
    content: ' what a help he was at Ephesus [you know better than I can tell you].'
  '2':
  - type: text
    content: ' To Timothy, [my] beloved child: Grace (favor and spiritual blessing), mercy, and [heart] peace from God the Father and Christ Jesus our Lord!'
  '3':
  - type: text
    content: ' I thank God Whom I worship with a pure conscience, in the spirit of my fathers, when without ceasing I remember you night and day in my prayers,'
  '4':
  - type: text
    content: ' And when, as I recall your tears, I yearn to see you so that I may be filled with joy.'
  '5':
  - type: text
    content: ' I am calling up memories of your sincere '
  - type: text
    content: and
  - type: text
    content: ' unqualified faith (the leaning of your entire personality on God in Christ in absolute trust and confidence in His power, wisdom, and goodness), [a faith] that first lived permanently in [the heart of] your grandmother Lois and your mother Eunice and now, I am [fully] persuaded, [dwells] in you also.'
  '6':
  - type: text
    content: ' That is why I would remind you to stir up (rekindle the embers of, fan the flame of, and keep burning) the [gracious] gift of God, [the inner fire] that is in you by means of the laying on of my hands [with those of the elders at your ordination].'
  '7':
  - type: text
    content: ' For God did not give us a spirit of timidity (of cowardice, of craven and cringing and fawning fear), but [He has given us a spirit] of power and of love and of calm '
  - type: text
    content: and
  - type: text
    content: ' well-balanced mind '
  - type: text
    content: and
  - type: text
    content: ' discipline '
  - type: text
    content: and
  - type: text
    content: ' self-control.'
  '8':
  - type: text
    content: ' Do not blush '
  - type: text
    content: or
  - type: text
    content: ' be ashamed then, to testify to '
  - type: text
    content: and
  - type: text
    content: ' for our Lord, nor of me, a prisoner for His sake, but [with me] take your share of the suffering [to which the preaching] of the Gospel [may expose you, and do it] in the power of God.'
  '9':
  - type: text
    content: ' [For it is He] Who delivered '
  - type: text
    content: and
  - type: text
    content: ' saved us and called us with a calling in itself holy '
  - type: text
    content: and
  - type: text
    content: ' leading to holiness [to a life of consecration, a vocation of holiness]; [He did it] not because of anything of merit that we have done, but because of '
  - type: text
    content: and
  - type: text
    content: ' to further His own purpose and grace (unmerited favor) which was given us in Christ Jesus before the world began [eternal ages ago].'
