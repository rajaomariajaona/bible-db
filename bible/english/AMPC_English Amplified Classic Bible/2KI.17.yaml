document_id: 2KI.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE twelfth year of Ahaz king of Judah, Hoshea son of Elah began his nine-year reign in Samaria over Israel.'
  '10':
  - type: text
    content: ' They set up for themselves pillars and Asherim [symbols of the goddess Asherah] on every high hill and under every green tree.'
  '11':
  - type: text
    content: ' There they burned incense on all the high places, as did the nations whom the Lord carried away before them; and they did wicked things provoking the Lord to anger.'
  '12':
  - type: text
    content: ' And they served idols, of which the Lord had said to them, You shall not do this thing.'
  '13':
  - type: text
    content: ' Yet the Lord warned Israel and Judah through all the prophets and all the seers, saying, Turn from your evil ways and keep My commandments and My statutes, according to all the Law which I commanded your fathers and which I sent to you by My servants the prophets.'
  '14':
  - type: text
    content: ' Yet they would not hear, but hardened their necks as did their fathers who did not believe (trust in, rely on, and remain steadfast to) the Lord their God.'
  '15':
  - type: text
    content: ' They despised '
  - type: text
    content: and
  - type: text
    content: ' rejected His statutes and His covenant which He made with their fathers and His warnings to them, and they followed vanity (false gods–falsehood, emptiness, and futility) and [they themselves and their prayers] became false (empty and futile). They went after the heathen round about them, of whom the Lord had charged them that they should not do as they did.'
  '16':
  - type: text
    content: ' And they forsook all the commandments of the Lord their God and made for themselves molten images, even two calves, and made an Asherah and worshiped all the [starry] hosts of the heavens and served Baal.'
  '17':
  - type: text
    content: ' They caused their sons and their daughters to pass through the fire and used divination and enchantments and sold themselves to do evil in the sight of the Lord, provoking Him to anger.'
  '18':
  - type: text
    content: ' Therefore the Lord was very angry with Israel and removed them out of His sight. None was left but the tribe of Judah.'
  '19':
  - type: text
    content: ' Judah also did not keep the commandments of the Lord their God, but walked in the customs which Israel introduced.'
  '2':
  - type: text
    content: ' He did evil in the sight of the Lord, but not as Israel''s kings before him did.'
  '20':
  - type: text
    content: ' The Lord rejected all the descendants of Israel and afflicted them and delivered them into the hands of spoilers, until He had cast them out of His sight.'
  '21':
  - type: text
    content: ' For He tore Israel from the house of David; and they made Jeroboam son of Nebat king. And Jeroboam drew '
  - type: text
    content: and
  - type: text
    content: ' drove Israel away from following the Lord and made them sin a great sin.'
  '22':
  - type: text
    content: ' For the Israelites walked in all the sins Jeroboam committed; they departed not from them'
  '23':
  - type: text
    content: ' Until the Lord removed Israel from His sight, as He had foretold by all His servants the prophets. So Israel was carried away from their own land to Assyria to this day.'
  '24':
  - type: text
    content: ' The king of Assyria brought men from Babylon, Cuthah, Avva, Hamath, and Sepharvaim and placed them in the cities of Samaria instead of the Israelites. They possessed Samaria and dwelt in its cities.'
  '25':
  - type: text
    content: ' At the beginning of their dwelling there, they did not fear '
  - type: text
    content: and
  - type: text
    content: ' revere the Lord. Therefore the Lord sent lions among them, which killed some of them.'
  '26':
  - type: text
    content: ' So the king of Assyria was told: The nations you removed and placed in the cities of Samaria do not know the manner in which the God of the land requires their worship. Therefore He has sent lions among them, and behold, they are killing them, because they do not know the manner of [worship demanded by] the God of the land.'
  '27':
  - type: text
    content: ' Then the king of Assyria commanded, Take to Samaria one of the priests you brought from there, and let him [and his helpers] go and live there and let him teach the people the law of the God of the land.'
  '28':
  - type: text
    content: ' So one of the priests whom they had carried away from Samaria came and dwelt in Bethel and taught them how they should fear '
  - type: text
    content: and
  - type: text
    content: ' revere the Lord.'
  '29':
  - type: text
    content: ' But every nationality still made gods of their own and put them in the shrines of the high places which the Samaritans had made, every nationality in the city in which they dwelt.'
  '3':
  - type: text
    content: ' Against him came up Shalmaneser king of Assyria, and Hoshea became his servant and brought him tribute.'
  '30':
  - type: text
    content: ' The men of Babylon made [and worshiped their deity] Succoth-benoth, the men of Cuth made Nergal, the men of Hamath made Ashima,'
  '31':
  - type: text
    content: ' The Avvites made Nibhaz and Tartak, and the Sepharvites burned their children in the fire to Adrammelech and Anammelech, the gods of Sepharvaim.'
  '32':
  - type: text
    content: ' So they feared the Lord, yet appointed from among themselves, whether high or low, priests of the high places, who sacrificed for them in the shrines of the high places.'
  '33':
  - type: text
    content: ' They feared the Lord, yet served their own gods, as did the nations from among whom they had been carried away.'
  '34':
  - type: text
    content: ' Unto this day they do after their former custom: they do not fear the Lord [as God sees it], neither do they obey the statutes or the ordinances or the law and commandment which the Lord commanded the children of Jacob, whom He named Israel,'
  '35':
  - type: text
    content: ' With whom the Lord had made a covenant and commanded them, You shall not fear other gods or bow yourselves to them or serve them or sacrifice to them.'
  '36':
  - type: text
    content: ' But you shall [reverently] fear, bow yourselves to, and sacrifice to the Lord, Who brought you out of the land of Egypt with great power and an outstretched arm.'
  '37':
  - type: text
    content: ' And the statutes, ordinances, law, and commandment which He wrote for you you shall observe and do forevermore; you shall not fear other gods.'
  '38':
  - type: text
    content: ' And the covenant that I have made with you you shall not forget; you shall not fear other gods.'
  '39':
  - type: text
    content: ' But the Lord your God you shall [reverently] fear; then He will deliver you out of the hands of all your enemies.'
  '4':
  - type: text
    content: ' But the king of Assyria found treachery in Hoshea, for he had sent messengers to So king of Egypt and offered no tribute to the king of Assyria, as he had done year by year; therefore the king of Assyria shut him up and bound him in prison.'
  '40':
  - type: text
    content: ' However, they did not listen, but they did as they had done formerly.'
  '41':
  - type: text
    content: ' So these nations [vainly] feared the Lord and also served their graven images, as did their children and their children''s children. As their fathers did, so do they to this day.'
  '5':
  - type: text
    content: ' Then the king of Assyria invaded all the land and went up to Samaria and besieged it for three years.'
  '6':
  - type: text
    content: ' In the ninth year of Hoshea, the king of Assyria took Samaria and carried the Israelites away into Assyria, and placed them in Halah and in Habor by the river of Gozan and in the cities of the Medes.'
  '7':
  - type: text
    content: ' This was so because the Israelites had sinned against the Lord their God, Who had brought them out of the land of Egypt, from under the hand of Pharaoh king of Egypt; and they had feared other gods'
  '8':
  - type: text
    content: ' And walked in the customs of the [heathen] nations whom the Lord drove out before the Israelites, customs the kings of Israel had introduced.'
  '9':
  - type: text
    content: ' The Israelites did secretly against the Lord their God things not right. They built for themselves high places in all their towns, from [lonely] watchtower to [populous] fortified city.'
