document_id: 2KI.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE twelfth year of Ahaz king of Judah, Hoshea son of Elah began his nine-year reign in Samaria over Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He did evil in the sight of the Lord, but not as Israel''s kings before him did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Against him came up Shalmaneser king of Assyria, and Hoshea became his servant and brought him tribute.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the king of Assyria found treachery in Hoshea, for he had sent messengers to So king of Egypt and offered no tribute to the king of Assyria, as he had done year by year; therefore the king of Assyria shut him up and bound him in prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the king of Assyria invaded all the land and went up to Samaria and besieged it for three years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In the ninth year of Hoshea, the king of Assyria took Samaria and carried the Israelites away into Assyria, and placed them in Halah and in Habor by the river of Gozan and in the cities of the Medes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' This was so because the Israelites had sinned against the Lord their God, Who had brought them out of the land of Egypt, from under the hand of Pharaoh king of Egypt; and they had feared other gods'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And walked in the customs of the [heathen] nations whom the Lord drove out before the Israelites, customs the kings of Israel had introduced.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Israelites did secretly against the Lord their God things not right. They built for themselves high places in all their towns, from [lonely] watchtower to [populous] fortified city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They set up for themselves pillars and Asherim [symbols of the goddess Asherah] on every high hill and under every green tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' There they burned incense on all the high places, as did the nations whom the Lord carried away before them; and they did wicked things provoking the Lord to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they served idols, of which the Lord had said to them, You shall not do this thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet the Lord warned Israel and Judah through all the prophets and all the seers, saying, Turn from your evil ways and keep My commandments and My statutes, according to all the Law which I commanded your fathers and which I sent to you by My servants the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Yet they would not hear, but hardened their necks as did their fathers who did not believe (trust in, rely on, and remain steadfast to) the Lord their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' They despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected His statutes and His covenant which He made with their fathers and His warnings to them, and they followed vanity (false gods–falsehood, emptiness, and futility) and [they themselves and their prayers] became false (empty and futile). They went after the heathen round about them, of whom the Lord had charged them that they should not do as they did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they forsook all the commandments of the Lord their God and made for themselves molten images, even two calves, and made an Asherah and worshiped all the [starry] hosts of the heavens and served Baal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They caused their sons and their daughters to pass through the fire and used divination and enchantments and sold themselves to do evil in the sight of the Lord, provoking Him to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Therefore the Lord was very angry with Israel and removed them out of His sight. None was left but the tribe of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Judah also did not keep the commandments of the Lord their God, but walked in the customs which Israel introduced.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The Lord rejected all the descendants of Israel and afflicted them and delivered them into the hands of spoilers, until He had cast them out of His sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For He tore Israel from the house of David; and they made Jeroboam son of Nebat king. And Jeroboam drew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drove Israel away from following the Lord and made them sin a great sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For the Israelites walked in all the sins Jeroboam committed; they departed not from them'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Until the Lord removed Israel from His sight, as He had foretold by all His servants the prophets. So Israel was carried away from their own land to Assyria to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The king of Assyria brought men from Babylon, Cuthah, Avva, Hamath, and Sepharvaim and placed them in the cities of Samaria instead of the Israelites. They possessed Samaria and dwelt in its cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' At the beginning of their dwelling there, they did not fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revere the Lord. Therefore the Lord sent lions among them, which killed some of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So the king of Assyria was told: The nations you removed and placed in the cities of Samaria do not know the manner in which the God of the land requires their worship. Therefore He has sent lions among them, and behold, they are killing them, because they do not know the manner of [worship demanded by] the God of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then the king of Assyria commanded, Take to Samaria one of the priests you brought from there, and let him [and his helpers] go and live there and let him teach the people the law of the God of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So one of the priests whom they had carried away from Samaria came and dwelt in Bethel and taught them how they should fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revere the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But every nationality still made gods of their own and put them in the shrines of the high places which the Samaritans had made, every nationality in the city in which they dwelt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The men of Babylon made [and worshiped their deity] Succoth-benoth, the men of Cuth made Nergal, the men of Hamath made Ashima,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The Avvites made Nibhaz and Tartak, and the Sepharvites burned their children in the fire to Adrammelech and Anammelech, the gods of Sepharvaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' So they feared the Lord, yet appointed from among themselves, whether high or low, priests of the high places, who sacrificed for them in the shrines of the high places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' They feared the Lord, yet served their own gods, as did the nations from among whom they had been carried away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Unto this day they do after their former custom: they do not fear the Lord [as God sees it], neither do they obey the statutes or the ordinances or the law and commandment which the Lord commanded the children of Jacob, whom He named Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' With whom the Lord had made a covenant and commanded them, You shall not fear other gods or bow yourselves to them or serve them or sacrifice to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' But you shall [reverently] fear, bow yourselves to, and sacrifice to the Lord, Who brought you out of the land of Egypt with great power and an outstretched arm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the statutes, ordinances, law, and commandment which He wrote for you you shall observe and do forevermore; you shall not fear other gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And the covenant that I have made with you you shall not forget; you shall not fear other gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But the Lord your God you shall [reverently] fear; then He will deliver you out of the hands of all your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' However, they did not listen, but they did as they had done formerly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' So these nations [vainly] feared the Lord and also served their graven images, as did their children and their children''s children. As their fathers did, so do they to this day.'
