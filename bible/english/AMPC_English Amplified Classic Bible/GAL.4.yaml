document_id: GAL.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHAT I mean is that as long as the inheritor (heir) is a child and under age, he does not differ from a slave, although he is the master of all the estate;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But he is under guardians and administrators '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trustees until the date fixed by his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So we [Jewish Christians] also, when we were minors, were kept like slaves under [the rules of the Hebrew ritual and subject to] the elementary teachings of a system of external observations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regulations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But when the proper time had fully come, God sent His Son, born of a woman, born subject to [the regulations of] the Law,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' To purchase the freedom of (to ransom, to redeem, to atone for) those who were subject to the Law, that we might be adopted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have sonship conferred upon us [and be recognized as God''s sons].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And because you [really] are [His] sons, God has sent the [Holy] Spirit of His Son into our hearts, crying, Abba (Father)! Father!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore, you are no longer a slave (bond servant) but a son; and if a son, then [it follows that you are] an heir by the aid of God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: through Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But at that previous time, when you had not come to be acquainted with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know the true God, you [Gentiles] were in bondage to gods who by their very nature could not be gods at all [gods that really did not exist].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now, however, that you have come to be acquainted with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know [the true] God, or rather to be understood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' known by God, how can you turn back again to the weak and beggarly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless elementary things [of all religions before Christ came], whose slaves you once more want to become?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You observe [particular] days and months and seasons and years!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I am alarmed [about you], lest I have labored among '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' over you to no purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in vain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Brethren, I beg of you, become as I am [free from the bondage of Jewish ritualism and ordinances], for I also have become as you are [a Gentile]. You did me no wrong [in the days when I first came to you; do not do it now].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' On the contrary, you know that it was on account of a bodily ailment that [I remained and] preached the Gospel to you the first time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And [yet] although my physical condition was [such] a trial to you, you did not regard it with contempt, or scorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject me; but you received me as an angel of God, [even] as Christ Jesus [Himself]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' What has become of that blessed enjoyment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfaction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-congratulation that once was yours [in what I taught you and in your regard for me]? For I bear you witness that you would have torn out your own eyes and have given them to me [to replace mine], if that were possible.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Have I then become your enemy by telling the truth to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dealing sincerely with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' These men [the Judaizing teachers] are zealously trying to dazzle you [paying court to you, making much of you], but their purpose is not honorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' worthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' for any good. What they want to do is to isolate you [from us who oppose them], so that they may win you over to their side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' get you to court their favor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' It is always a fine thing [of course] to be zealously sought after [as you are, provided that it is] for a good purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' done by reason of purity of heart and life, and not just when I am present with you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' My little children, for whom I am again suffering birth pangs until Christ is completely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' permanently formed (molded) within you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Would that I were with you now and could coax you vocally, for I am fearful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perplexed about you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Tell me, you who are bent on being under the Law, will you listen to what the Law [really] says?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For it is written that Abraham had two sons, one by the bondmaid and one by the free woman. [Gen. 16:15; 21:2, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But whereas the child of the slave woman was born according to the flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had an ordinary birth, the son of the free woman was born in fulfillment of the promise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Now all this is an allegory; these [two women] represent two covenants. One covenant originated from Mount Sinai [where the Law was given] and bears [children destined] for slavery; this is Hagar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now Hagar is (stands for) Mount Sinai in Arabia and she corresponds to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' belongs in the same category with the present Jerusalem, for she is in bondage together with her children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But the Jerusalem above (the Messianic kingdom of Christ) is free, and she is our mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For it is written in the Scriptures, Rejoice, O barren woman, who has not given birth to children; break forth into a joyful shout, you who are not feeling birth pangs, for the desolate woman has many more children than she who has a husband. [Isa. 54:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But we, brethren, are children [not by physical descent, as was Ishmael, but] like Isaac, born in virtue of promise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Yet [just] as at that time the child [of ordinary birth] born according to the flesh despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecuted him [who was born remarkably] according to [the promise and the working of] the [Holy] Spirit, so it is now also. [Gen. 21:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But what does the Scripture say? Cast out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' send away the slave woman and her son, for never shall the son of the slave woman be heir '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share the inheritance with the son of the free woman. [Gen. 21:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So, brethren, we [who are born again] are not children of a slave woman [the natural], but of the free [the supernatural].'
