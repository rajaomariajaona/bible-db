document_id: GAL.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW WHAT I mean is that as long as the inheritor (heir) is a child and under age, he does not differ from a slave, although he is the master of all the estate;'
  '10':
  - type: text
    content: ' You observe [particular] days and months and seasons and years!'
  '11':
  - type: text
    content: ' I am alarmed [about you], lest I have labored among '
  - type: text
    content: and
  - type: text
    content: ' over you to no purpose '
  - type: text
    content: and
  - type: text
    content: ' in vain.'
  '12':
  - type: text
    content: ' Brethren, I beg of you, become as I am [free from the bondage of Jewish ritualism and ordinances], for I also have become as you are [a Gentile]. You did me no wrong [in the days when I first came to you; do not do it now].'
  '13':
  - type: text
    content: ' On the contrary, you know that it was on account of a bodily ailment that [I remained and] preached the Gospel to you the first time.'
  '14':
  - type: text
    content: ' And [yet] although my physical condition was [such] a trial to you, you did not regard it with contempt, or scorn '
  - type: text
    content: and
  - type: text
    content: ' loathe '
  - type: text
    content: and
  - type: text
    content: ' reject me; but you received me as an angel of God, [even] as Christ Jesus [Himself]!'
  '15':
  - type: text
    content: ' What has become of that blessed enjoyment '
  - type: text
    content: and
  - type: text
    content: ' satisfaction '
  - type: text
    content: and
  - type: text
    content: ' self-congratulation that once was yours [in what I taught you and in your regard for me]? For I bear you witness that you would have torn out your own eyes and have given them to me [to replace mine], if that were possible.'
  '16':
  - type: text
    content: ' Have I then become your enemy by telling the truth to you '
  - type: text
    content: and
  - type: text
    content: ' dealing sincerely with you?'
  '17':
  - type: text
    content: ' These men [the Judaizing teachers] are zealously trying to dazzle you [paying court to you, making much of you], but their purpose is not honorable '
  - type: text
    content: or
  - type: text
    content: ' worthy '
  - type: text
    content: or
  - type: text
    content: ' for any good. What they want to do is to isolate you [from us who oppose them], so that they may win you over to their side '
  - type: text
    content: and
  - type: text
    content: ' get you to court their favor.'
  '18':
  - type: text
    content: ' It is always a fine thing [of course] to be zealously sought after [as you are, provided that it is] for a good purpose '
  - type: text
    content: and
  - type: text
    content: ' done by reason of purity of heart and life, and not just when I am present with you!'
  '19':
  - type: text
    content: ' My little children, for whom I am again suffering birth pangs until Christ is completely '
  - type: text
    content: and
  - type: text
    content: ' permanently formed (molded) within you,'
  '2':
  - type: text
    content: ' But he is under guardians and administrators '
  - type: text
    content: or
  - type: text
    content: ' trustees until the date fixed by his father.'
  '20':
  - type: text
    content: ' Would that I were with you now and could coax you vocally, for I am fearful '
  - type: text
    content: and
  - type: text
    content: ' perplexed about you!'
  '21':
  - type: text
    content: ' Tell me, you who are bent on being under the Law, will you listen to what the Law [really] says?'
  '22':
  - type: text
    content: ' For it is written that Abraham had two sons, one by the bondmaid and one by the free woman. [Gen. 16:15; 21:2, 9.]'
  '23':
  - type: text
    content: ' But whereas the child of the slave woman was born according to the flesh '
  - type: text
    content: and
  - type: text
    content: ' had an ordinary birth, the son of the free woman was born in fulfillment of the promise.'
  '24':
  - type: text
    content: ' Now all this is an allegory; these [two women] represent two covenants. One covenant originated from Mount Sinai [where the Law was given] and bears [children destined] for slavery; this is Hagar.'
  '25':
  - type: text
    content: ' Now Hagar is (stands for) Mount Sinai in Arabia and she corresponds to '
  - type: text
    content: and
  - type: text
    content: ' belongs in the same category with the present Jerusalem, for she is in bondage together with her children.'
  '26':
  - type: text
    content: ' But the Jerusalem above (the Messianic kingdom of Christ) is free, and she is our mother.'
  '27':
  - type: text
    content: ' For it is written in the Scriptures, Rejoice, O barren woman, who has not given birth to children; break forth into a joyful shout, you who are not feeling birth pangs, for the desolate woman has many more children than she who has a husband. [Isa. 54:1.]'
  '28':
  - type: text
    content: ' But we, brethren, are children [not by physical descent, as was Ishmael, but] like Isaac, born in virtue of promise.'
  '29':
  - type: text
    content: ' Yet [just] as at that time the child [of ordinary birth] born according to the flesh despised '
  - type: text
    content: and
  - type: text
    content: ' persecuted him [who was born remarkably] according to [the promise and the working of] the [Holy] Spirit, so it is now also. [Gen. 21:9.]'
  '3':
  - type: text
    content: ' So we [Jewish Christians] also, when we were minors, were kept like slaves under [the rules of the Hebrew ritual and subject to] the elementary teachings of a system of external observations '
  - type: text
    content: and
  - type: text
    content: ' regulations.'
  '30':
  - type: text
    content: ' But what does the Scripture say? Cast out '
  - type: text
    content: and
  - type: text
    content: ' send away the slave woman and her son, for never shall the son of the slave woman be heir '
  - type: text
    content: and
  - type: text
    content: ' share the inheritance with the son of the free woman. [Gen. 21:10.]'
  '31':
  - type: text
    content: ' So, brethren, we [who are born again] are not children of a slave woman [the natural], but of the free [the supernatural].'
  '4':
  - type: text
    content: ' But when the proper time had fully come, God sent His Son, born of a woman, born subject to [the regulations of] the Law,'
  '5':
  - type: text
    content: ' To purchase the freedom of (to ransom, to redeem, to atone for) those who were subject to the Law, that we might be adopted '
  - type: text
    content: and
  - type: text
    content: ' have sonship conferred upon us [and be recognized as God''s sons].'
  '6':
  - type: text
    content: ' And because you [really] are [His] sons, God has sent the [Holy] Spirit of His Son into our hearts, crying, Abba (Father)! Father!'
  '7':
  - type: text
    content: ' Therefore, you are no longer a slave (bond servant) but a son; and if a son, then [it follows that you are] an heir by the aid of God, '
  - type: text
    content: through Christ.
  '8':
  - type: text
    content: ' But at that previous time, when you had not come to be acquainted with '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' know the true God, you [Gentiles] were in bondage to gods who by their very nature could not be gods at all [gods that really did not exist].'
  '9':
  - type: text
    content: ' Now, however, that you have come to be acquainted with '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' know [the true] God, or rather to be understood '
  - type: text
    content: and
  - type: text
    content: ' known by God, how can you turn back again to the weak and beggarly '
  - type: text
    content: and
  - type: text
    content: ' worthless elementary things [of all religions before Christ came], whose slaves you once more want to become?'
