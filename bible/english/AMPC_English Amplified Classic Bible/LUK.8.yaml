document_id: LUK.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SOON AFTERWARD, [Jesus] went on through towns and villages, preaching and bringing the good news (the Gospel) of the kingdom of God. And the Twelve [apostles] were with Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And also some women who had been cured of evil spirits and diseases: Mary, called Magdalene, from whom seven demons had been expelled;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Joanna, the wife of Chuza, Herod''s household manager; and Susanna; and many others, who ministered to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provided for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him and
  - type: text
    text: ' them out of their property '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' personal belongings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when a very great throng was gathering together and people from town after town kept coming to Jesus, He said in a parable:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A sower went out to sow seed; and as he sowed, some fell along the traveled path and was trodden underfoot, and the birds of the air ate it up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And some [seed] fell on the rock, and as soon as it sprouted, it withered away because it had no moisture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And other [seed] fell in the midst of the thorns, and the thorns grew up with it and choked it [off].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And some seed fell into good soil, and grew up and yielded a crop a hundred times [as great]. As He said these things, He called out, He who has ears to hear, let him be listening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let him consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand by hearing!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when His disciples asked Him the meaning of this parable,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He said to them, To you it has been given to [come progressively to] know (to recognize and understand more strongly and clearly) the mysteries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secrets of the kingdom of God, but for others they are in parables, so that, [though] looking, they may not see; and hearing, they may not comprehend. [Isa. 6:9, 10; Jer. 5:21; Ezek. 12:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now the meaning of the parable is this: The seed is the Word of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Those along the traveled road are the people who have heard; then the devil comes and carries away the message out of their hearts, that they may not believe (acknowledge Me as their Savior and devote themselves to Me) and be saved [here and hereafter].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And those upon the rock [are the people] who, when they hear [the Word], receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome it with joy; but these have no root. They believe for a while, and in time of trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' temptation fall away (withdraw and stand aloof).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And as for what fell among the thorns, these are [the people] who hear, but as they go on their way they are choked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffocated with the anxieties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cares and riches and pleasures of life, and their fruit does not ripen (come to maturity and perfection).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But as for that [seed] in the good soil, these are [the people] who, hearing the Word, hold it fast in a just (noble, virtuous) and worthy heart, and steadily bring forth fruit with patience.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' No one after he has lighted a lamp covers it with a vessel or puts it under a [dining table] couch; but he puts it on a lampstand, that those who come in may see the light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For there is nothing hidden that shall not be disclosed, nor anything secret that shall not be known and come out into the open.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Be careful therefore how you listen. For to him who has [spiritual knowledge] will more be given; and from him who does not have [spiritual knowledge], even what he thinks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guesses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supposes that he has will be taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then Jesus'' mother and His brothers came along toward Him, but they could not get to Him because of the crowd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And it was told Him, Your mother and Your brothers are standing outside, desiring to have an interview with You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But He answered them, My mother and My brothers are those who listen to the Word of God and do it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' One of those days He and His disciples got into a boat, and He said to them, Let us go across to the other side of the lake. So they put out to sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But as they were sailing, He fell off to sleep. And a whirlwind revolving from below upwards swept down on the lake, and the boat was filling with water, and they were in great danger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the disciples came and woke Him, saying, Master, Master, we are perishing! And He, being thoroughly awakened, censured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rebuked the wind and the raging waves; and they ceased, and there came a calm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And He said to them, [Why are you so fearful?] Where is your faith (your trust, your confidence in Me–in My veracity and My integrity)? And they were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverent dread, and they marveled, saying to one another, Who then is this, that He commands even wind and sea, and they obey Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then they came to the country of the Gerasenes, which is opposite Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now when Jesus stepped out on land, there met Him a certain man out of the town who had [was possessed by] demons. For a long time he had worn no clothes, and he lived not in a house but in the tombs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And when he saw Jesus, he raised a deep (terrible) cry [from the depths of his throat] and fell down before Him [in terror] and shouted loudly, What have You [to do] with me, Jesus, Son of the Most High God? [What have we in common?] I beg You, do not torment me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For Jesus was already commanding the unclean spirit to come out of the man. For many times it had snatched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held him; he was kept under guard and bound with chains and fetters, but he would break the bonds and be driven by the demon into the wilderness (desert).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Jesus then asked him, What is your name? And he answered, Legion; for many demons had entered him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they begged [Jesus] not to command them to depart into the Abyss (bottomless pit). [Rev. 9:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Now a great herd of swine was there feeding on the hillside; and [the demons] begged Him to give them leave to enter these. And He allowed them [to do so].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then the demons came out of the man and entered into the swine, and the herd rushed down the steep cliff into the lake and were drowned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' When the herdsmen saw what had happened, they ran away and told it in the town and in the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And [people] went out to see what had occurred, and they came to Jesus and found the man from whom the demons had gone out, sitting at the feet of Jesus, clothed and in his right (sound) mind; and they were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And those [also] who had seen it told them how he who had been possessed with demons was restored [to health].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then all the people of the country surrounding the Gerasenes'' district asked [Jesus] to depart from them, for they were possessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering with dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror; so He entered a boat and returned [to the west side of the Sea of Galilee].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But the man from whom the demons had gone out kept begging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praying that he might accompany Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be with Him, but [Jesus] sent him away, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Return to your home, and recount [the story] of how many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great things God has done for you. And [the man] departed, proclaiming throughout the whole city how much Jesus had done for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Now when Jesus came back [to Galilee], the crowd received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed Him gladly, for they were all waiting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' looking for Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And there came a man named Jairus, who had [for a long time] been a director of the synagogue; and falling at the feet of Jesus, he begged Him to come to his house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' For he had an only daughter, about twelve years of age, and she was dying. As [Jesus] went, the people pressed together around Him [almost suffocating Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And a woman who had suffered from a flow of blood for twelve years '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and had spent all her living upon physicians
  - type: text
    text: ', and could not be healed by anyone,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Came up behind Him and touched the fringe of His garment, and immediately her flow of blood ceased.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And Jesus said, Who is it who touched Me? When all were denying it, Peter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and those who were with him
  - type: text
    text: ' said, Master, the multitudes surround You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' press You on every side!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' But Jesus said, Someone did touch Me; for I perceived that [healing] power has gone forth from Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And when the woman saw that she had not escaped notice, she came up trembling, and, falling down before Him, she declared in the presence of all the people for what reason she had touched Him and how she had been instantly cured.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And He said to her, Daughter, your faith (your confidence and trust in Me) has made you well! Go (enter) into peace (untroubled, undisturbed well-being).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' While He was still speaking, a man from the house of the director of the synagogue came and said [to Jairus], Your daughter is dead; do not weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble the Teacher any further.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' But Jesus, on hearing this, answered him, Do not be seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' struck with fear; simply believe [in Me as able to do this], and she shall be made well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And when He came to the house, He permitted no one to enter with Him except Peter and John and James, and the girl''s father and mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And all were weeping for and bewailing her; but He said, Do not weep, for she is not dead but sleeping.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And they laughed Him to scorn, knowing full well that she was dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And grasping her hand, He called, saying, Child, arise [from the sleep of death]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' And her spirit returned [from death], and she arose immediately; and He directed that she should be given something to eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' And her parents were amazed, but He charged them to tell no one what had occurred.'
