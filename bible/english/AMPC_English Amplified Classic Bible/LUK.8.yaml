verses:
  '1':
  - type: text
    content: ' SOON AFTERWARD, [Jesus] went on through towns and villages, preaching and bringing the good news (the Gospel) of the kingdom of God. And the Twelve [apostles] were with Him,'
  '10':
  - type: text
    content: ' He said to them, To you it has been given to [come progressively to] know (to recognize and understand more strongly and clearly) the mysteries '
  - type: text
    content: and
  - type: text
    content: ' secrets of the kingdom of God, but for others they are in parables, so that, [though] looking, they may not see; and hearing, they may not comprehend. [Isa. 6:9, 10; Jer. 5:21; Ezek. 12:2.]'
  '11':
  - type: text
    content: ' Now the meaning of the parable is this: The seed is the Word of God.'
  '12':
  - type: text
    content: ' Those along the traveled road are the people who have heard; then the devil comes and carries away the message out of their hearts, that they may not believe (acknowledge Me as their Savior and devote themselves to Me) and be saved [here and hereafter].'
  '13':
  - type: text
    content: ' And those upon the rock [are the people] who, when they hear [the Word], receive '
  - type: text
    content: and
  - type: text
    content: ' welcome it with joy; but these have no root. They believe for a while, and in time of trial '
  - type: text
    content: and
  - type: text
    content: ' temptation fall away (withdraw and stand aloof).'
  '14':
  - type: text
    content: ' And as for what fell among the thorns, these are [the people] who hear, but as they go on their way they are choked '
  - type: text
    content: and
  - type: text
    content: ' suffocated with the anxieties '
  - type: text
    content: and
  - type: text
    content: ' cares and riches and pleasures of life, and their fruit does not ripen (come to maturity and perfection).'
  '15':
  - type: text
    content: ' But as for that [seed] in the good soil, these are [the people] who, hearing the Word, hold it fast in a just (noble, virtuous) and worthy heart, and steadily bring forth fruit with patience.'
  '16':
  - type: text
    content: ' No one after he has lighted a lamp covers it with a vessel or puts it under a [dining table] couch; but he puts it on a lampstand, that those who come in may see the light.'
  '17':
  - type: text
    content: ' For there is nothing hidden that shall not be disclosed, nor anything secret that shall not be known and come out into the open.'
  '18':
  - type: text
    content: ' Be careful therefore how you listen. For to him who has [spiritual knowledge] will more be given; and from him who does not have [spiritual knowledge], even what he thinks '
  - type: text
    content: and
  - type: text
    content: ' guesses '
  - type: text
    content: and
  - type: text
    content: ' supposes that he has will be taken away.'
  '19':
  - type: text
    content: ' Then Jesus'' mother and His brothers came along toward Him, but they could not get to Him because of the crowd.'
  '2':
  - type: text
    content: ' And also some women who had been cured of evil spirits and diseases: Mary, called Magdalene, from whom seven demons had been expelled;'
  '20':
  - type: text
    content: ' And it was told Him, Your mother and Your brothers are standing outside, desiring to have an interview with You.'
  '21':
  - type: text
    content: ' But He answered them, My mother and My brothers are those who listen to the Word of God and do it!'
  '22':
  - type: text
    content: ' One of those days He and His disciples got into a boat, and He said to them, Let us go across to the other side of the lake. So they put out to sea.'
  '23':
  - type: text
    content: ' But as they were sailing, He fell off to sleep. And a whirlwind revolving from below upwards swept down on the lake, and the boat was filling with water, and they were in great danger.'
  '24':
  - type: text
    content: ' And the disciples came and woke Him, saying, Master, Master, we are perishing! And He, being thoroughly awakened, censured '
  - type: text
    content: and
  - type: text
    content: ' blamed '
  - type: text
    content: and
  - type: text
    content: ' rebuked the wind and the raging waves; and they ceased, and there came a calm.'
  '25':
  - type: text
    content: ' And He said to them, [Why are you so fearful?] Where is your faith (your trust, your confidence in Me–in My veracity and My integrity)? And they were seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' profound '
  - type: text
    content: and
  - type: text
    content: ' reverent dread, and they marveled, saying to one another, Who then is this, that He commands even wind and sea, and they obey Him?'
  '26':
  - type: text
    content: ' Then they came to the country of the Gerasenes, which is opposite Galilee.'
  '27':
  - type: text
    content: ' Now when Jesus stepped out on land, there met Him a certain man out of the town who had [was possessed by] demons. For a long time he had worn no clothes, and he lived not in a house but in the tombs.'
  '28':
  - type: text
    content: ' And when he saw Jesus, he raised a deep (terrible) cry [from the depths of his throat] and fell down before Him [in terror] and shouted loudly, What have You [to do] with me, Jesus, Son of the Most High God? [What have we in common?] I beg You, do not torment me!'
  '29':
  - type: text
    content: ' For Jesus was already commanding the unclean spirit to come out of the man. For many times it had snatched '
  - type: text
    content: and
  - type: text
    content: ' held him; he was kept under guard and bound with chains and fetters, but he would break the bonds and be driven by the demon into the wilderness (desert).'
  '3':
  - type: text
    content: ' And Joanna, the wife of Chuza, Herod''s household manager; and Susanna; and many others, who ministered to '
  - type: text
    content: and
  - type: text
    content: ' provided for '
  - type: text
    content: Him and
  - type: text
    content: ' them out of their property '
  - type: text
    content: and
  - type: text
    content: ' personal belongings.'
  '30':
  - type: text
    content: ' Jesus then asked him, What is your name? And he answered, Legion; for many demons had entered him.'
  '31':
  - type: text
    content: ' And they begged [Jesus] not to command them to depart into the Abyss (bottomless pit). [Rev. 9:1.]'
  '32':
  - type: text
    content: ' Now a great herd of swine was there feeding on the hillside; and [the demons] begged Him to give them leave to enter these. And He allowed them [to do so].'
  '33':
  - type: text
    content: ' Then the demons came out of the man and entered into the swine, and the herd rushed down the steep cliff into the lake and were drowned.'
  '34':
  - type: text
    content: ' When the herdsmen saw what had happened, they ran away and told it in the town and in the country.'
  '35':
  - type: text
    content: ' And [people] went out to see what had occurred, and they came to Jesus and found the man from whom the demons had gone out, sitting at the feet of Jesus, clothed and in his right (sound) mind; and they were seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' fear.'
  '36':
  - type: text
    content: ' And those [also] who had seen it told them how he who had been possessed with demons was restored [to health].'
  '37':
  - type: text
    content: ' Then all the people of the country surrounding the Gerasenes'' district asked [Jesus] to depart from them, for they were possessed '
  - type: text
    content: and
  - type: text
    content: ' suffering with dread '
  - type: text
    content: and
  - type: text
    content: ' terror; so He entered a boat and returned [to the west side of the Sea of Galilee].'
  '38':
  - type: text
    content: ' But the man from whom the demons had gone out kept begging '
  - type: text
    content: and
  - type: text
    content: ' praying that he might accompany Him '
  - type: text
    content: and
  - type: text
    content: ' be with Him, but [Jesus] sent him away, saying,'
  '39':
  - type: text
    content: ' Return to your home, and recount [the story] of how many '
  - type: text
    content: and
  - type: text
    content: ' great things God has done for you. And [the man] departed, proclaiming throughout the whole city how much Jesus had done for him.'
  '4':
  - type: text
    content: ' And when a very great throng was gathering together and people from town after town kept coming to Jesus, He said in a parable:'
  '40':
  - type: text
    content: ' Now when Jesus came back [to Galilee], the crowd received '
  - type: text
    content: and
  - type: text
    content: ' welcomed Him gladly, for they were all waiting '
  - type: text
    content: and
  - type: text
    content: ' looking for Him.'
  '41':
  - type: text
    content: ' And there came a man named Jairus, who had [for a long time] been a director of the synagogue; and falling at the feet of Jesus, he begged Him to come to his house,'
  '42':
  - type: text
    content: ' For he had an only daughter, about twelve years of age, and she was dying. As [Jesus] went, the people pressed together around Him [almost suffocating Him].'
  '43':
  - type: text
    content: ' And a woman who had suffered from a flow of blood for twelve years '
  - type: text
    content: and had spent all her living upon physicians
  - type: text
    content: ', and could not be healed by anyone,'
  '44':
  - type: text
    content: ' Came up behind Him and touched the fringe of His garment, and immediately her flow of blood ceased.'
  '45':
  - type: text
    content: ' And Jesus said, Who is it who touched Me? When all were denying it, Peter '
  - type: text
    content: and those who were with him
  - type: text
    content: ' said, Master, the multitudes surround You '
  - type: text
    content: and
  - type: text
    content: ' press You on every side!'
  '46':
  - type: text
    content: ' But Jesus said, Someone did touch Me; for I perceived that [healing] power has gone forth from Me.'
  '47':
  - type: text
    content: ' And when the woman saw that she had not escaped notice, she came up trembling, and, falling down before Him, she declared in the presence of all the people for what reason she had touched Him and how she had been instantly cured.'
  '48':
  - type: text
    content: ' And He said to her, Daughter, your faith (your confidence and trust in Me) has made you well! Go (enter) into peace (untroubled, undisturbed well-being).'
  '49':
  - type: text
    content: ' While He was still speaking, a man from the house of the director of the synagogue came and said [to Jairus], Your daughter is dead; do not weary '
  - type: text
    content: and
  - type: text
    content: ' trouble the Teacher any further.'
  '5':
  - type: text
    content: ' A sower went out to sow seed; and as he sowed, some fell along the traveled path and was trodden underfoot, and the birds of the air ate it up.'
  '50':
  - type: text
    content: ' But Jesus, on hearing this, answered him, Do not be seized with alarm '
  - type: text
    content: or
  - type: text
    content: ' struck with fear; simply believe [in Me as able to do this], and she shall be made well.'
  '51':
  - type: text
    content: ' And when He came to the house, He permitted no one to enter with Him except Peter and John and James, and the girl''s father and mother.'
  '52':
  - type: text
    content: ' And all were weeping for and bewailing her; but He said, Do not weep, for she is not dead but sleeping.'
  '53':
  - type: text
    content: ' And they laughed Him to scorn, knowing full well that she was dead.'
  '54':
  - type: text
    content: ' And grasping her hand, He called, saying, Child, arise [from the sleep of death]!'
  '55':
  - type: text
    content: ' And her spirit returned [from death], and she arose immediately; and He directed that she should be given something to eat.'
  '56':
  - type: text
    content: ' And her parents were amazed, but He charged them to tell no one what had occurred.'
  '6':
  - type: text
    content: ' And some [seed] fell on the rock, and as soon as it sprouted, it withered away because it had no moisture.'
  '7':
  - type: text
    content: ' And other [seed] fell in the midst of the thorns, and the thorns grew up with it and choked it [off].'
  '8':
  - type: text
    content: ' And some seed fell into good soil, and grew up and yielded a crop a hundred times [as great]. As He said these things, He called out, He who has ears to hear, let him be listening '
  - type: text
    content: and
  - type: text
    content: ' let him consider '
  - type: text
    content: and
  - type: text
    content: ' understand by hearing!'
  '9':
  - type: text
    content: ' And when His disciples asked Him the meaning of this parable,'
