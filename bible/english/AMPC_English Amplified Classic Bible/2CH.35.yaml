document_id: 2CH.35,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JOSIAH KEPT the Passover to the Lord in Jerusalem; they killed the Passover lamb on the fourteenth day of the first month.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When the service was ready, the priests stood in their place and the Levites in their divisions as the king commanded.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' They killed the Passover lambs, and the priests sprinkled the blood they received from the Levites who skinned the animals.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then they removed the burnt offerings, that they might distribute them according to the divisions of the lay families to offer to the Lord, as directed in the Book of Moses. And so they did with the bulls.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And they roasted the Passover lambs with fire according to the ordinance; and they cooked the holy offerings in pots, in caldrons, and in pans and carried them quickly to all the people.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Afterward [the Levites] prepared for themselves and the priests, because the priests, the sons of Aaron, were busy in offering the burnt offerings and the fat until night; so the Levites prepared for themselves and also for the priests, the sons of Aaron.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The singers, the sons of Asaph, were in their places according to the command of David, Asaph, Heman, and Jeduthun the king''s seer. And the gatekeepers were at every gate; they did not need to leave their service, for their brethren the Levites prepared for them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' So all the Lord''s service was prepared the same day to keep the Passover and to offer burnt offerings upon the Lord''s altar, as King Josiah commanded.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the Israelites who were present kept the Passover at that time, and the Feast of Unleavened Bread for seven days.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' No Passover like it had been kept in Israel since the days of Samuel the prophet, even by any of the kings of Israel, as was kept by Josiah and the priests, the Levites, and all Judah and Israel who were present, and the inhabitants of Jerusalem.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' In the eighteenth year of the reign of Josiah this Passover was kept.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He appointed the priests to their positions and encouraged them in the service of the house of the Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' After all this, when Josiah had prepared the temple, Neco king of Egypt went out to fight against Carchemish on the Euphrates, and Josiah went out against him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But [Neco] sent ambassadors to [Josiah], saying, What have I to do with you, you king of Judah? I come not against you this day, but against the house with which I am at war; and God has commanded me to make haste. Refrain from opposing God, Who is with me, lest He destroy you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Yet Josiah would not turn away from him, but disguised himself in order to fight with him. He did not heed the words of Neco from the mouth of God, but came to fight with him in the valley of Megiddo.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And the archers shot King Josiah, and the king said to his servants, Take me away, for I am severely wounded.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' So his servants took him out of the chariot and put him in his second chariot and brought him to Jerusalem. And he died and was buried in the tombs of his fathers. All Judah and Jerusalem mourned for Josiah.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Jeremiah gave a lament for Josiah, and all the singing men and women have spoken of Josiah in their laments to this day. They made them an ordinance in Israel; behold, they are written in the Laments. [Lam. 4:20.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Now the rest of the acts of Josiah and his deeds, according to what is written in the Law of the Lord,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And his acts, from first to last, behold, they are written in the Book of the Kings of Israel and Judah.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' To the Levites who taught all Israel and were holy to the Lord he said: Put the holy ark in the house which Solomon son of David king of Israel, built; it shall no longer be a burden carried on your shoulders. Now serve the Lord your God and His people Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Prepare yourselves according to your fathers'' houses by your divisions, after the directions of David king of Israel and of Solomon his son.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And stand in the holy court of the priests according to the sections of the fathers'' families of your kinsmen, the common people, and let there be a section of the Levites [to attend] to each division of the families of the people.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Kill the Passover lambs and sanctify yourselves and prepare for your brethren to do according to the word of the Lord by Moses.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then Josiah contributed to the lay people lambs and kids of the flock as Passover offerings for all who were present, to the number of 30,000, and 3,000 young bulls–all from the king''s possessions.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And his princes gave for a freewill offering to the people, to the priests, and the Levites. Hilkiah, Zechariah, and Jehiel, chief officers of God''s house, gave the priests for the Passover offerings 2,600 [lambs and kids] and 300 bulls.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Conaniah also, and Shemaiah and Nethanel his brothers, and Hashabiah, Jeiel, and Jozabad, chiefs of the Levites, gave to the Levites for Passover offerings 5,000 [lambs and kids] and 500 bulls.'
