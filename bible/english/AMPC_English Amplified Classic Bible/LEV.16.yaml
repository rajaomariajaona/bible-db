document_id: LEV.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THE death of Aaron''s two sons, when they drew near before the Lord [offered false fire] and died, [Lev. 10:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord said to Moses, Tell Aaron your brother he must not come at all times into the Holy of Holies within the veil before the mercy seat upon the ark, lest he die; for I will appear in the cloud on the mercy seat. [Heb. 9:7-15, 25-28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Aaron shall come into the holy enclosure in this way: with a young bull for a sin offering and a ram for a burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He shall put on the holy linen undergarment, and he shall have the linen breeches upon his body, and be girded with the linen girdle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sash, and with the linen turban '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' miter shall he be attired; these are the holy garments; he shall bathe his body in water and then put them on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He shall take [at the expense] of the congregation of the Israelites two male goats for a sin offering and one ram for a burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Aaron shall present the bull as the sin offering for himself and make atonement for himself and for his house [the other priests].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He shall take the two goats and present them before the Lord at the door of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Aaron shall cast lots on the two goats–one lot for the Lord, the other lot for Azazel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' removal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Aaron shall bring the goat on which the Lord''s lot fell and offer him as a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But the goat on which the lot fell for Azazel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' removal shall be presented alive before the Lord to make atonement over him, that he may be let go into the wilderness for Azazel (for dismissal).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Aaron shall present the bull as the sin offering for his own sins and shall make atonement for himself and for his house [the other priests], and shall kill the bull as the sin offering for himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He shall take a censer full of burning coals of fire from off the [bronze] altar before the Lord, and his two hands full of sweet incense beaten small, and bring it within the veil [into the Holy of Holies],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And put the incense on the fire [in the censer] before the Lord, that the cloud of the incense may cover the mercy seat that is upon [the ark of] the Testimony, lest he die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He shall take of the bull''s blood and sprinkle it with his finger on the front [the east side] of the mercy seat, and before the mercy seat he shall sprinkle of the blood with his finger seven times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then shall he kill the goat of the sin offering that is for [the sins of] the people and bring its blood within the veil [into the Holy of Holies] and do with that blood as he did with the blood of the bull, and sprinkle it on the mercy seat and before the mercy seat. [Heb. 2:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Thus he shall make atonement for the Holy Place because of the uncleanness of the Israelites and because of their transgressions, even all their sins; and so shall he do for the Tent of Meeting, that remains among them in the midst of their uncleanness. [Heb. 9:22-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' There shall be no man in the Tent of Meeting when the high priest goes in to make atonement in the Holy of Holies [within the veil] until he comes out and has made atonement for his own sins and those of his house [the other priests] and of all the congregation of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he shall go out to the altar [of burnt offering in the court] which is before the Lord and make atonement for it, and shall take some of the blood of the bull and of the goat and put it on the horns of the altar round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And he shall sprinkle some of the blood on it with his fingers seven times and cleanse it and hallow it from the uncleanness of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when he has finished atoning for the Holy of Holies and the Tent of Meeting and the altar [of burnt offering], he shall present the live goat;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Aaron shall lay both his hands upon the head of the live goat and confess over him all the iniquities of the Israelites and all their transgressions, all their sins; and he shall put them upon the head of the goat [the sin-bearer], and send him away into the wilderness by the hand of a man who is timely (ready, fit).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The goat shall bear upon himself all their iniquities, carrying them to a land cut off (a land of forgetfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' separation, not inhabited)! And the man leading it shall let the goat go in the wilderness. [Ps. 103:12; Isa. 53:11, 12; John 1:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Aaron shall come into the Tent of Meeting and put off the linen garments which he put on when he went into the Holy of Holies, and leave them there;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he shall bathe his body with water in a sacred place and put on his garments, and come forth and offer his burnt offering and that of the people, and make atonement for himself and for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the fat of the sin offering he shall burn upon the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The man who led the sin-bearing goat out and let him go for Azazel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' removal shall wash his clothes and bathe his body, and afterward he may come into the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The bull and the goat for the sin offering, whose blood was brought in to make atonement in the Holy of Holies, shall be carried forth without the camp; their skins, their flesh, and their dung shall be burned with fire. [Heb. 13:11-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he who burns them shall wash his clothes and bathe his body in water, and afterward he may come into the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' It shall be a statute to you forever that in the seventh month [nearly October] on the tenth day of the month you shall afflict yourselves [by fasting with penitence and humiliation] and do no work at all, either the native-born or the stranger who dwells temporarily among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For on this day atonement shall be made for you, to cleanse you; from all your sins you shall be clean before the Lord. [Heb. 10:1, 2; I John 1:7, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' It is a sabbath of [solemn] rest to you, and you shall afflict yourselves [by fasting with penitence and humiliation]; it is a statute forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the priest who shall be anointed and consecrated to minister in the priest''s office in his father''s stead shall make atonement, wearing the holy linen garments;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He shall make atonement for the Holy Sanctuary, for the Tent of Meeting, and for the altar [of burnt offering in the court], and shall make atonement for the priests and for all the people of the assembly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' This shall be an everlasting statute for you, that atonement may be made for the Israelites for all their sins once a year. And Moses did as the Lord commanded him.'
