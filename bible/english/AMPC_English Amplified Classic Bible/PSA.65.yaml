document_id: PSA.65,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David. A song.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' TO YOU belongs silence (the submissive wonder of reverence which bursts forth into praise) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise is due '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fitting to You, O God, in Zion; and to You shall the vow be performed.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' You water the field''s furrows abundantly, You settle the ridges of it; You make the soil soft with showers, blessing the sprouting of its vegetation.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You crown the year with Your bounty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goodness, and the tracks of Your [chariot wheels] drip with fatness.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The [luxuriant] pastures in the uncultivated country drip [with moisture], and the hills gird themselves with joy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The meadows are clothed with flocks, the valleys also are covered with grain; they shout for joy and sing together.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' O You Who hear prayer, to You shall all flesh come.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Iniquities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' much varied guilt prevail against me; [yet] as for our transgressions, You forgive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purge them away [make atonement for them and cover them out of Your sight]!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man whom You choose and cause to come near, that he may dwell in Your courts! We shall be satisfied with the goodness of Your house, Your holy temple.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' By fearful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorious things [that terrify the wicked but make the godly sing praises] do You answer us in righteousness (rightness and justice), O God of our salvation, You Who are the confidence and hope of all the ends of the earth and of those far off on the seas;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Who by [Your] might have founded the mountains, being girded with power,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Who still the roaring of the seas, the roaring of their waves, and the tumult of the peoples,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So that those who dwell in earth''s farthest parts are afraid of [nature''s] signs of Your presence. You make the places where morning and evening have birth to shout for joy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' You visit the earth and saturate it with water; You greatly enrich it; the river of God is full of water; You provide them with grain when You have so prepared the earth.'
