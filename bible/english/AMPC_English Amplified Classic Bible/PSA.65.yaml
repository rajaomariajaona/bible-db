document_id: PSA.65,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David. A song.
  - type: text
    content: ' TO YOU belongs silence (the submissive wonder of reverence which bursts forth into praise) '
  - type: text
    content: and
  - type: text
    content: ' praise is due '
  - type: text
    content: and
  - type: text
    content: ' fitting to You, O God, in Zion; and to You shall the vow be performed.'
  '10':
  - type: text
    content: ' You water the field''s furrows abundantly, You settle the ridges of it; You make the soil soft with showers, blessing the sprouting of its vegetation.'
  '11':
  - type: text
    content: ' You crown the year with Your bounty '
  - type: text
    content: and
  - type: text
    content: ' goodness, and the tracks of Your [chariot wheels] drip with fatness.'
  '12':
  - type: text
    content: ' The [luxuriant] pastures in the uncultivated country drip [with moisture], and the hills gird themselves with joy.'
  '13':
  - type: text
    content: ' The meadows are clothed with flocks, the valleys also are covered with grain; they shout for joy and sing together.'
  '2':
  - type: text
    content: ' O You Who hear prayer, to You shall all flesh come.'
  '3':
  - type: text
    content: ' Iniquities '
  - type: text
    content: and
  - type: text
    content: ' much varied guilt prevail against me; [yet] as for our transgressions, You forgive '
  - type: text
    content: and
  - type: text
    content: ' purge them away [make atonement for them and cover them out of Your sight]!'
  '4':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) is the man whom You choose and cause to come near, that he may dwell in Your courts! We shall be satisfied with the goodness of Your house, Your holy temple.'
  '5':
  - type: text
    content: ' By fearful '
  - type: text
    content: and
  - type: text
    content: ' glorious things [that terrify the wicked but make the godly sing praises] do You answer us in righteousness (rightness and justice), O God of our salvation, You Who are the confidence and hope of all the ends of the earth and of those far off on the seas;'
  '6':
  - type: text
    content: ' Who by [Your] might have founded the mountains, being girded with power,'
  '7':
  - type: text
    content: ' Who still the roaring of the seas, the roaring of their waves, and the tumult of the peoples,'
  '8':
  - type: text
    content: ' So that those who dwell in earth''s farthest parts are afraid of [nature''s] signs of Your presence. You make the places where morning and evening have birth to shout for joy.'
  '9':
  - type: text
    content: ' You visit the earth and saturate it with water; You greatly enrich it; the river of God is full of water; You provide them with grain when You have so prepared the earth.'
