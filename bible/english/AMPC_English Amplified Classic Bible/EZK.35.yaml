document_id: EZK.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MOREOVER, THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, set your face against the mountain [range of] Seir [in Edom] and prophesy against it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say to it, Thus says the Lord God: Behold, O Mount Seir, I am against you, and I will stretch out My hand against you and I will make you a desolation and an astonishment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will lay your cities waste and you shall be desolate, and you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Because you [of Esau] have had a perpetual enmity [for Jacob] and you gave over the sons of Israel to the power of the sword at the time of their calamity, when they were suffering their final punishment [the Babylonian conquest], [Ezek. 25:12-14; 36:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore, as I live, says the Lord God, I will expose you to slaughter and slaughter shall pursue you; since you could not bear to live without bloodshed, therefore bloodshed shall pursue you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Thus will I make Mount Seir an astonishment and a desolation, and I will cut off from it him who passes through it and him who returns [that way].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will fill [Edom''s] mountains with his slain men; on your hills and in your valleys and in all your ravines shall those fall who are slain with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will make you a perpetual desolation and your cities shall not be inhabited. Then you will know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Because you [Edom] said, These two nations [Israel and Judah] and these two countries shall be mine and we will take possession of them–although the Lord was there,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore, as I live, says the Lord God, I will deal with you according to the anger and envy you showed because of your enmity for them, and I will make Myself known among them [as He Who will judge and punish] when I judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service], and that I have heard all your revilings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scornful speeches that you have uttered against the mountains of Israel, saying, They are laid waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolate; they are given to us to devour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Thus you have boasted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnified yourselves against Me with your mouth, multiplying your words against Me; I have heard it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Thus says the Lord God: While the whole earth rejoices, I will make you a waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As you rejoiced over the inheritance of the house of Israel because it was desolate, so will I deal with you; you shall be a waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolation, O Mount Seir and all Edom, all of it. Then they shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
