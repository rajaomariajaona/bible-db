document_id: 1KI.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHEN THE queen of Sheba heard of [the constant connection of] the fame of Solomon with the name of the Lord, she came to prove him with hard questions (problems and riddles).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And she gave the king 120 talents of gold and of spices a very great store and precious stones. Never again came such abundance of spices as these the queen of Sheba gave King Solomon.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The navy also of Hiram brought from Ophir gold and a great plenty of almug (algum) wood and precious stones.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the almug wood the king made pillars for the house of the Lord and for the king''s house, and lyres also and harps for the singers. No such almug wood came again or has been seen to this day.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' King Solomon gave to the queen of Sheba all she wanted, whatever she asked, besides his gifts to her from his royal bounty. So she returned to her own country, she and her servants.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the weight of gold that came to Solomon in one [particular] year was 666 talents of gold,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Besides what the traders brought and the traffic of the merchants and from all the [tributary] kings and governors of the land of Arabia.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' King Solomon made 200 large shields of beaten gold; 600 shekels of gold went into each shield.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he made 300 shields of beaten gold; three minas of gold went into each shield. The king put them in the House of the Forest of Lebanon.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also the king made a great throne of ivory and overlaid it with the finest gold.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The throne had six steps, and attached at the rear of the top of the throne was a round covering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' canopy. On either side of the seat were armrests, and two lions stood beside the armrests.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' She came to Jerusalem with a very great train, with camels bearing spices, very much gold, and precious stones. When she had come to Solomon, she communed with him about all that was in her mind.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Twelve lions stood there, one on either end of each of the six steps; there was nothing like it ever made in any kingdom.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All King Solomon''s drinking vessels were of gold, and all vessels of the House of the Forest of Lebanon were of pure gold. None were of silver; it was accounted as nothing in the days of Solomon.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the king had a fleet of ships of Tarshish at sea with the fleet of Hiram. Once every three years the fleet of ships of Tarshish came bringing gold, silver, ivory, apes, and peacocks.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So King Solomon exceeded all the kings of the earth in riches and in wisdom (skill).'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the earth sought the presence of Solomon to hear his wisdom which God had put in his mind.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Every man brought tribute: vessels of silver and gold, garments, equipment, spices, horses, and mules, so much year by year.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon collected chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, which he stationed in the chariot cities and with the king in Jerusalem.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The king made silver as common in Jerusalem as stones, and cedars as plentiful as the sycamore trees in the lowlands.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon''s horses were brought out of Egypt, and the king''s merchants received them in droves, each at a price. [Deut. 17:15, 16.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A chariot could be brought out of Egypt for 600 shekels of silver, and a horse for 150. And so to all the kings of the Hittites and of Syria they were exported by the king''s merchants.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon answered all her questions; there was nothing hidden from the king which he failed to explain to her.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the queen of Sheba had seen all Solomon''s wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' skill, the house he had built,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The food of his table, the seating of his officials, the standing at attention of his servants, their apparel, his cupbearers, his ascent by which he went up to the house of the Lord [or the burnt offerings he sacrificed], she was breathless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overcome.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' She said to the king, It was a true report I heard in my own land of your acts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sayings and wisdom.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I did not believe it until I came and my eyes had seen. Behold, the half was not told me. You have added wisdom and goodness exceeding the fame I heard.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Happy are your men! Happy are these your servants who stand continually before you, hearing your wisdom!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed be the Lord your God, Who delighted in you and set you on the throne of Israel! Because the Lord loved Israel forever, He made you king to execute justice and righteousness.'
