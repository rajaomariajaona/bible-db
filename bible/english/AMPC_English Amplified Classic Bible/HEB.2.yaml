document_id: HEB.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SINCE ALL this is true, we ought to pay much closer attention than ever to the truths that we have heard, lest in any way we drift past [them] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slip away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For if the message given through angels [the Law spoken by them to Moses] was authentic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proved sure, and every violation and disobedience received an appropriate (just and adequate) penalty,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' How shall we escape [appropriate retribution] if we neglect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuse to pay attention to such a great salvation [as is now offered to us, letting it drift past us forever]? For it was declared at first by the Lord [Himself], and it was confirmed to us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proved to be real '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' genuine by those who personally heard [Him speak].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Besides this evidence] it was also established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plainly endorsed by God, Who showed His approval of it by signs and wonders and various miraculous manifestations of [His] power and by imparting the gifts of the Holy Spirit [to the believers] according to His own will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For it was not to angels that God subjected the habitable world of the future, of which we are speaking.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' It has been solemnly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earnestly said in a certain place, What is man that You are mindful of him, or the son of man that You graciously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' helpfully care for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look after him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For some little time You have ranked him lower than '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inferior to the angels; You have crowned him with glory and honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and set him over the works of Your hands,
  - type: text
    text: ' [Ps. 8:4-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For You have put everything in subjection under his feet. Now in putting everything in subjection to man, He left nothing outside [of man''s] control. But at present we do not yet see all things subjected to him [man].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But we are able to see Jesus, Who was ranked lower than the angels for a little while, crowned with glory and honor because of His having suffered death, in order that by the grace (unmerited favor) of God [to us sinners] He might experience death for every individual person.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For it was an act worthy [of God] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fitting [to the divine nature] that He, for Whose sake and by Whom all things have their existence, in bringing many sons into glory, should make the Pioneer of their salvation perfect [should bring to maturity the human experience necessary to be perfectly equipped for His office as High Priest] through suffering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For both He Who sanctifies [making men holy] and those who are sanctified all have one [Father]. For this reason He is not ashamed to call them brethren;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For He says, I will declare Your [the Father''s] name to My brethren; in the midst of the [worshiping] congregation I will sing hymns of praise to You. [Ps. 22:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And again He says, My trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' assured reliance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident hope shall be fixed in Him. And yet again, Here I am, I and the children whom God has given Me. [Isa. 8:17, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Since, therefore, [these His] children share in flesh and blood [in the physical nature of human beings], He [Himself] in a similar manner partook of the same [nature], that by [going through] death He might bring to nought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make of no effect him who had the power of death–that is, the devil–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And also that He might deliver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completely set free all those who through the [haunting] fear of death were held in bondage throughout the whole course of their lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For, as we all know, He [Christ] did not take hold of angels [the fallen angels, to give them a helping and delivering hand], but He did take hold of [the fallen] descendants of Abraham [to reach out to them a helping and delivering hand]. [Isa. 41:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So it is evident that it was essential that He be made like His brethren in every respect, in order that He might become a merciful (sympathetic) and faithful High Priest in the things related to God, to make atonement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' propitiation for the people''s sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For because He Himself [in His humanity] has suffered in being tempted (tested and tried), He is able [immediately] to run to the cry of (assist, relieve) those who are being tempted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried [and who therefore are being exposed to suffering].'
