document_id: 1CO.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR I do not want you to be ignorant, brethren, that our forefathers were all under '
  - type: text
    content: and
  - type: text
    content: ' protected by the cloud [in which God''s Presence went before them], and every one of them passed safely through the [Red] Sea, [Exod. 13:21; 14:22, 29.]'
  '10':
  - type: text
    content: ' Nor discontentedly complain as some of them did–and were put out of the way entirely by the destroyer (death). [Num. 16:41, 49.]'
  '11':
  - type: text
    content: ' Now these things befell them by way of a figure [as an example and warning to us]; they were written to admonish '
  - type: text
    content: and
  - type: text
    content: ' fit us for right action by good instruction, we in whose days the ages have reached their climax (their consummation and concluding period).'
  '12':
  - type: text
    content: ' Therefore let anyone who thinks he stands [who feels sure that he has a steadfast mind and is standing firm], take heed lest he fall [into sin].'
  '13':
  - type: text
    content: ' For no temptation (no trial regarded as enticing to sin), [no matter how it comes or where it leads] has overtaken you '
  - type: text
    content: and
  - type: text
    content: ' laid hold on you that is not common to man [that is, no temptation or trial has come to you that is beyond human resistance and that is not adjusted and adapted and belonging to human experience, and such as man can bear]. But God is faithful [to His Word and to His compassionate nature], and He [can be trusted] not to let you be tempted '
  - type: text
    content: and
  - type: text
    content: ' tried '
  - type: text
    content: and
  - type: text
    content: ' assayed beyond your ability '
  - type: text
    content: and
  - type: text
    content: ' strength of resistance '
  - type: text
    content: and
  - type: text
    content: ' power to endure, but with the temptation He will [always] also provide the way out (the means of escape to a landing place), that you may be capable '
  - type: text
    content: and
  - type: text
    content: ' strong '
  - type: text
    content: and
  - type: text
    content: ' powerful to bear up under it patiently.'
  '14':
  - type: text
    content: ' Therefore, my dearly beloved, shun (keep clear away from, avoid by flight if need be) any sort of idolatry (of loving or venerating anything more than God).'
  '15':
  - type: text
    content: ' I am speaking as to intelligent (sensible) men. Think over '
  - type: text
    content: and
  - type: text
    content: ' make up your minds [for yourselves] about what I say. [I appeal to your reason and your discernment in these matters.]'
  '16':
  - type: text
    content: ' The cup of blessing [of wine at the Lord''s Supper] upon which we ask [God''s] blessing, does it not mean [that in drinking it] we participate in '
  - type: text
    content: and
  - type: text
    content: ' share a fellowship (a communion) in the blood of Christ (the Messiah)? The bread which we break, does it not mean [that in eating it] we participate in '
  - type: text
    content: and
  - type: text
    content: ' share a fellowship (a communion) in the body of Christ?'
  '17':
  - type: text
    content: ' For we [no matter how] numerous we are, are one body, because we all partake of the one Bread [the One Whom the communion bread represents].'
  '18':
  - type: text
    content: ' Consider those [physically] people of Israel. Are not those who eat the sacrifices partners of the altar [united in their worship of the same God]? [Lev. 7:6.]'
  '19':
  - type: text
    content: ' What do I imply then? That food offered to idols is [intrinsically changed by the fact and amounts to] anything '
  - type: text
    content: or
  - type: text
    content: ' that an idol itself is a [living] thing?'
  '2':
  - type: text
    content: ' And each one of them [allowed himself also] to be baptized into Moses in the cloud and in the sea [they were thus brought under obligation to the Law, to Moses, and to the covenant, consecrated and set apart to the service of God];'
  '20':
  - type: text
    content: ' No, I am suggesting that what the pagans sacrifice they offer [in effect] to demons (to evil spiritual powers) and not to God [at all]. I do not want you to fellowship '
  - type: text
    content: and
  - type: text
    content: ' be partners with diabolical spirits [by eating at their feasts]. [Deut. 32:17.]'
  '21':
  - type: text
    content: ' You cannot drink the Lord''s cup and the demons'' cup. You cannot partake of the Lord''s table and the demons'' table.'
  '22':
  - type: text
    content: ' Shall we thus provoke the Lord to jealousy '
  - type: text
    content: and
  - type: text
    content: ' anger '
  - type: text
    content: and
  - type: text
    content: ' indignation? Are we stronger than He [that we should defy Him]? [Deut. 32:21; Eccl. 6:10; Isa. 45:9.]'
  '23':
  - type: text
    content: ' All things are legitimate [permissible–and we are free to do anything we please], but not all things are helpful (expedient, profitable, and wholesome). All things are legitimate, but not all things are constructive [to character] '
  - type: text
    content: and
  - type: text
    content: ' edifying [to spiritual life].'
  '24':
  - type: text
    content: ' Let no one then seek his own good '
  - type: text
    content: and
  - type: text
    content: ' advantage '
  - type: text
    content: and
  - type: text
    content: ' profit, but [rather] each one of the other [let him seek the welfare of his neighbor].'
  '25':
  - type: text
    content: ' [As to meat offered to idols] eat anything that is sold in the meat market without raising any question '
  - type: text
    content: or
  - type: text
    content: ' investigating on the grounds of conscientious scruples,'
  '26':
  - type: text
    content: ' For the [whole] earth is the Lord''s and everything that is in it. [Ps. 24:1; 50:12.]'
  '27':
  - type: text
    content: ' In case one of the unbelievers invites you to a meal and you want to go, eat whatever is served to you without examining into its source because of conscientious scruples.'
  '28':
  - type: text
    content: ' But if someone tells you, This has been offered in sacrifice to an idol, do not eat it, out of consideration for the person who informed you, and for conscience''s sake–'
  '29':
  - type: text
    content: ' I mean for the sake of his conscience, not yours, [do not eat it]. For why should another man''s scruples apply to me '
  - type: text
    content: and
  - type: text
    content: ' my liberty of action be determined by his conscience?'
  '3':
  - type: text
    content: ' And all [of them] ate the same spiritual (supernaturally given) food, [Exod. 16:4, 35.]'
  '30':
  - type: text
    content: ' If I partake [of my food] with thankfulness, why am I accused '
  - type: text
    content: and
  - type: text
    content: ' spoken evil of because of that for which I give thanks?'
  '31':
  - type: text
    content: ' So then, whether you eat or drink, or whatever you may do, do all for the honor '
  - type: text
    content: and
  - type: text
    content: ' glory of God.'
  '32':
  - type: text
    content: ' Do not let yourselves be [hindrances by giving] an offense to the Jews or to the Greeks or to the church of God [do not lead others into sin by your mode of life];'
  '33':
  - type: text
    content: ' Just as I myself strive to please [to accommodate myself to the opinions, desires, and interests of others, adapting myself to] all men in everything I do, not aiming at '
  - type: text
    content: or
  - type: text
    content: ' considering my own profit '
  - type: text
    content: and
  - type: text
    content: ' advantage, but that of the many in order that they may be saved.'
  '4':
  - type: text
    content: ' And they all drank the same spiritual (supernaturally given) drink. For they drank from a spiritual Rock which followed them [produced by the sole power of God Himself without natural instrumentality], and the Rock was Christ. [Exod. 17:6; Num. 20:11.]'
  '5':
  - type: text
    content: ' Nevertheless, God was not pleased with the great majority of them, for they were overthrown '
  - type: text
    content: and
  - type: text
    content: ' strewn down along [the ground] in the wilderness. [Num. 14:29, 30.]'
  '6':
  - type: text
    content: ' Now these things are examples (warnings and admonitions) for us not to desire '
  - type: text
    content: or
  - type: text
    content: ' crave '
  - type: text
    content: or
  - type: text
    content: ' covet '
  - type: text
    content: or
  - type: text
    content: ' lust after evil '
  - type: text
    content: and
  - type: text
    content: ' carnal things as they did. [Num. 11:4, 34.]'
  '7':
  - type: text
    content: ' Do not be worshipers of false gods as some of them were, as it is written, The people sat down to eat and drink [the sacrifices offered to the golden calf at Horeb] and rose to sport (to dance and give way to jesting and hilarity). [Exod. 32:4, 6.]'
  '8':
  - type: text
    content: ' We must not gratify evil desire '
  - type: text
    content: and
  - type: text
    content: ' indulge in immorality as some of them did–and twenty-three thousand [suddenly] fell '
  - type: text
    content: dead
  - type: text
    content: ' in a single day! [Num. 25:1-18.]'
  '9':
  - type: text
    content: ' We should not tempt the Lord [try His patience, become a trial to Him, critically appraise Him, and exploit His goodness] as some of them did–and were killed by poisonous serpents; [Num. 21:5, 6.]'
