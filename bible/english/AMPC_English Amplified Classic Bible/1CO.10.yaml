document_id: 1CO.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR I do not want you to be ignorant, brethren, that our forefathers were all under '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protected by the cloud [in which God''s Presence went before them], and every one of them passed safely through the [Red] Sea, [Exod. 13:21; 14:22, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And each one of them [allowed himself also] to be baptized into Moses in the cloud and in the sea [they were thus brought under obligation to the Law, to Moses, and to the covenant, consecrated and set apart to the service of God];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And all [of them] ate the same spiritual (supernaturally given) food, [Exod. 16:4, 35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they all drank the same spiritual (supernaturally given) drink. For they drank from a spiritual Rock which followed them [produced by the sole power of God Himself without natural instrumentality], and the Rock was Christ. [Exod. 17:6; Num. 20:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Nevertheless, God was not pleased with the great majority of them, for they were overthrown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strewn down along [the ground] in the wilderness. [Num. 14:29, 30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now these things are examples (warnings and admonitions) for us not to desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' crave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' covet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lust after evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carnal things as they did. [Num. 11:4, 34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Do not be worshipers of false gods as some of them were, as it is written, The people sat down to eat and drink [the sacrifices offered to the golden calf at Horeb] and rose to sport (to dance and give way to jesting and hilarity). [Exod. 32:4, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' We must not gratify evil desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indulge in immorality as some of them did–and twenty-three thousand [suddenly] fell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dead
  - type: text
    text: ' in a single day! [Num. 25:1-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' We should not tempt the Lord [try His patience, become a trial to Him, critically appraise Him, and exploit His goodness] as some of them did–and were killed by poisonous serpents; [Num. 21:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Nor discontentedly complain as some of them did–and were put out of the way entirely by the destroyer (death). [Num. 16:41, 49.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now these things befell them by way of a figure [as an example and warning to us]; they were written to admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fit us for right action by good instruction, we in whose days the ages have reached their climax (their consummation and concluding period).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore let anyone who thinks he stands [who feels sure that he has a steadfast mind and is standing firm], take heed lest he fall [into sin].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For no temptation (no trial regarded as enticing to sin), [no matter how it comes or where it leads] has overtaken you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid hold on you that is not common to man [that is, no temptation or trial has come to you that is beyond human resistance and that is not adjusted and adapted and belonging to human experience, and such as man can bear]. But God is faithful [to His Word and to His compassionate nature], and He [can be trusted] not to let you be tempted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' assayed beyond your ability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength of resistance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power to endure, but with the temptation He will [always] also provide the way out (the means of escape to a landing place), that you may be capable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful to bear up under it patiently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore, my dearly beloved, shun (keep clear away from, avoid by flight if need be) any sort of idolatry (of loving or venerating anything more than God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I am speaking as to intelligent (sensible) men. Think over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make up your minds [for yourselves] about what I say. [I appeal to your reason and your discernment in these matters.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The cup of blessing [of wine at the Lord''s Supper] upon which we ask [God''s] blessing, does it not mean [that in drinking it] we participate in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share a fellowship (a communion) in the blood of Christ (the Messiah)? The bread which we break, does it not mean [that in eating it] we participate in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share a fellowship (a communion) in the body of Christ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For we [no matter how] numerous we are, are one body, because we all partake of the one Bread [the One Whom the communion bread represents].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Consider those [physically] people of Israel. Are not those who eat the sacrifices partners of the altar [united in their worship of the same God]? [Lev. 7:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' What do I imply then? That food offered to idols is [intrinsically changed by the fact and amounts to] anything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' that an idol itself is a [living] thing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' No, I am suggesting that what the pagans sacrifice they offer [in effect] to demons (to evil spiritual powers) and not to God [at all]. I do not want you to fellowship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be partners with diabolical spirits [by eating at their feasts]. [Deut. 32:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You cannot drink the Lord''s cup and the demons'' cup. You cannot partake of the Lord''s table and the demons'' table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Shall we thus provoke the Lord to jealousy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation? Are we stronger than He [that we should defy Him]? [Deut. 32:21; Eccl. 6:10; Isa. 45:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' All things are legitimate [permissible–and we are free to do anything we please], but not all things are helpful (expedient, profitable, and wholesome). All things are legitimate, but not all things are constructive [to character] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' edifying [to spiritual life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Let no one then seek his own good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advantage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profit, but [rather] each one of the other [let him seek the welfare of his neighbor].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' [As to meat offered to idols] eat anything that is sold in the meat market without raising any question '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' investigating on the grounds of conscientious scruples,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For the [whole] earth is the Lord''s and everything that is in it. [Ps. 24:1; 50:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' In case one of the unbelievers invites you to a meal and you want to go, eat whatever is served to you without examining into its source because of conscientious scruples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But if someone tells you, This has been offered in sacrifice to an idol, do not eat it, out of consideration for the person who informed you, and for conscience''s sake–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I mean for the sake of his conscience, not yours, [do not eat it]. For why should another man''s scruples apply to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my liberty of action be determined by his conscience?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' If I partake [of my food] with thankfulness, why am I accused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spoken evil of because of that for which I give thanks?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So then, whether you eat or drink, or whatever you may do, do all for the honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Do not let yourselves be [hindrances by giving] an offense to the Jews or to the Greeks or to the church of God [do not lead others into sin by your mode of life];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Just as I myself strive to please [to accommodate myself to the opinions, desires, and interests of others, adapting myself to] all men in everything I do, not aiming at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' considering my own profit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advantage, but that of the many in order that they may be saved.'
