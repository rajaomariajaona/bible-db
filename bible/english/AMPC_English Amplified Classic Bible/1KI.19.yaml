document_id: 1KI.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AHAB TOLD Jezebel all that Elijah had done and how he had slain all the prophets [of Baal] with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Jezebel sent a messenger to Elijah, saying, So let the gods do to me, and more also, if I make not your life as the life of one of them by this time tomorrow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then he was afraid and arose and went for his life and came to Beersheba of Judah [over eighty miles, and out of Jezebel''s realm] and left his servant there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But he himself went a day''s journey into the wilderness and came and sat down under a lone broom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' juniper tree and asked that he might die. He said, It is enough; now, O Lord, take away my life; for I am no better than my fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' As he lay asleep under the broom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' juniper tree, behold, an angel touched him and said to him, Arise and eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He looked, and behold, there was a cake baked on the coals, and a bottle of water at his head. And he ate and drank and lay down again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The angel of the Lord came the second time and touched him and said, Arise and eat, for the journey is too great for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So he arose and ate and drank, and went in the strength of that food forty days and nights to Horeb, the mount of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' There he came to a cave and lodged in it; and behold, the word of the Lord came to him, and He said to him, What are you doing here, Elijah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He replied, I have been very jealous for the Lord God of hosts; for the Israelites have forsaken Your covenant, thrown down Your altars, and killed Your prophets with the sword. And I, I only, am left; and they seek my life, to take it away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And He said, Go out and stand on the mount before the Lord. And behold, the Lord passed by, and a great and strong wind rent the mountains and broke in pieces the rocks before the Lord, but the Lord was not in the wind; and after the wind an earthquake, but the Lord was not in the earthquake;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And after the earthquake a fire, but the Lord was not in the fire; and after the fire [a sound of gentle stillness and] a still, small voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When Elijah heard the voice, he wrapped his face in his mantle and went out and stood in the entrance of the cave. And behold, there came a voice to him and said, What are you doing here, Elijah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He said, I have been very jealous for the Lord God of hosts, because the Israelites have forsaken Your covenant, thrown down Your altars, and slain Your prophets with the sword. And I, I only, am left, and they seek my life, to destroy it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Lord said to him, Go, return on your way to the Wilderness of Damascus; and when you arrive, anoint Hazael to be king over Syria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And anoint Jehu son of Nimshi to be king over Israel, and anoint Elisha son of Shaphat of Abel-meholah to be prophet in your place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And him who escapes from the sword of Hazael Jehu shall slay, and him who escapes the sword of Jehu Elisha shall slay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Yet I will leave Myself 7,000 in Israel, all the knees that have not bowed to Baal and every mouth that has not kissed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Elijah left there and found Elisha son of Shaphat, whose plowing was being done with twelve yoke of oxen, and he drove the twelfth. Elijah crossed over to him and cast his mantle upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He left the oxen and ran after Elijah and said, Let me kiss my father and mother, and then I will follow you. And he [testing Elisha] said, Go on back. What have I done to you? [Settle it for yourself.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So Elisha went back from him. Then he took a yoke of oxen, slew them, boiled their flesh with the oxen''s yoke [as fuel], and gave to the people, and they ate. Then he arose, followed Elijah, and served him. [II Kings 3:11.]'
