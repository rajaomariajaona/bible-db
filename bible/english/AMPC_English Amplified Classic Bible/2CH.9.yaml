document_id: 2CH.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THE queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test him with hard questions, accompanied by very many attendants and camels bearing spices, much gold, and precious stones. And when she came to Solomon, she talked with him of all that was on her mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Solomon answered all her questions; there was nothing hidden from [him] which he was unable to make clear to her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when the queen of Sheba had seen Solomon''s wisdom, the house he had built,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The food of his table, the seating of his officials, the [standing at] attention of his servants, their apparel, his cupbearers also and their apparel, and his burnt offerings which he offered at the house of the Lord, there was no more spirit in her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' She said to the king, The report which I heard in my own land of your acts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sayings and of your wisdom was true,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But I did not believe their words until I came and my eyes had seen it. Behold, the half of the greatness of your wisdom was not told me; you surpass the fame that I heard of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Happy are your wives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' men, and happy are these your servants who stand continually before you and hear your wisdom!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Blessed be the Lord your God, Who delighted in you and set you on His throne to be king for the Lord your God! Because your God loved Israel and would establish them forever, He made you king over them, to do justice and righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' She gave the king 120 talents of gold, a very large quantity of spices, and precious stones; such spice was not anywhere as that which the queen of Sheba gave King Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The servants of Huram and [those] of Solomon, who brought gold from Ophir, also brought algum trees and precious stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The king made of the algum trees terraces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' walks to the house of the Lord and to the king''s palace, and lyres and harps for the singers; none such had ever been seen before in the land of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And King Solomon gave to the queen of Sheba all her desire, whatever she asked, besides what she had brought to the king. So she with her servants returned to her own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now the weight of gold that came to Solomon in one year was 666 talents,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Besides what traders and merchants brought; and all the kings of Arabia and governors of the country brought gold and silver to Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And King Solomon made 200 large shields '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bucklers of beaten gold; 600 shekels of beaten gold went into each shield.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he made 300 shields of beaten gold, with 300 shekels of gold spread on each shield. And the king put them in the House of the Forest of Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Moreover, [he] made a great throne of ivory and overlaid it with pure gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' There were six steps to the throne and a gold footstool attached to the throne, and arms on each side of the seat, with two lions standing beside the arms.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And twelve lions stood there one on either end of each of the six steps. The like of it was never made in any kingdom before.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' King Solomon''s drinking vessels were all of gold, and all the vessels of the House of the Forest of Lebanon were of pure gold; silver was not counted as anything in the days of Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the king''s ships went to Tarshish with Huram''s servants; once every three years the ships of Tarshish came bringing gold, silver, ivory, apes, and peacocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' King Solomon surpassed all the kings of the earth in riches and wisdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And all the kings of the earth sought the presence of Solomon to hear his wisdom which God had put into his mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And every man brought his tribute: silver and gold articles, robes, armor, spices, horses, and mules, so much year by year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Solomon had 4,000 stalls for horses and chariots, and 12,000 horsemen, stationed in chariot cities or at Jerusalem with the king. [Deut. 17:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And he ruled over all the kings from the [Euphrates] River to the land of Philistia and to the frontier of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The king made silver in Jerusalem as common as stones, and cedar wood as plentiful as sycamore trees in the lowlands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they imported horses for Solomon from Egypt and from all lands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Now the rest of the acts of Solomon, from first to last, are they not written in the history of Nathan the prophet and in the prophecy of Ahijah the Shilonite and in the visions of Iddo the seer concerning Jeroboam the son of Nebat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Solomon reigned in Jerusalem over all Israel forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then Solomon slept with his fathers; he was buried in the city of David his father. Rehoboam his son reigned in his stead.'
