document_id: JOS.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THE death of Moses the servant of the Lord, the Lord said to Joshua son of Nun, Moses'' minister, [Deut. 34:4-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moses My servant is dead. So now arise [take his place], go over this Jordan, you and all this people, into the land which I am giving to them, the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Every place upon which the sole of your foot shall tread, that have I given to you, as I promised Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' From the wilderness and this Lebanon to the great river Euphrates–all the land of the Hittites [Canaan]–and to the Great [Mediterranean] Sea on the west shall be your territory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' No man shall be able to stand before you all the days of your life. As I was with Moses, so I will be with you; I will not fail you or forsake you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Be strong (confident) and of good courage, for you shall cause this people to inherit the land which I swore to their fathers to give them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Only you be strong and very courageous, that you may do according to all the law which Moses My servant commanded you. Turn not from it to the right hand or to the left, that you may prosper wherever you go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' This Book of the Law shall not depart out of your mouth, but you shall meditate on it day and night, that you may observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do according to all that is written in it. For then you shall make your way prosperous, and then you shall deal wisely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have good success.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Have not I commanded you? Be strong, vigorous, and very courageous. Be not afraid, neither be dismayed, for the Lord your God is with you wherever you go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Joshua commanded the officers of the people, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Pass through the camp and command the people, Prepare your provisions, for within three days you shall pass over this Jordan to go in to take possession of the land which the Lord your God is giving you to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And to the Reubenites, the Gadites, and the half-tribe of Manasseh, Joshua said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Remember what Moses the servant of the Lord commanded you, saying, The Lord your God is giving you [of these two and a half tribes a place of] rest and will give you this land [east of the Jordan].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Your wives, your little ones, and your cattle shall dwell in the land which Moses gave you on this side of the Jordan, but all your mighty men of valor shall pass on before your brethren [of the other tribes] armed, and help them [possess their land]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Until the Lord gives your brethren rest, as He has given you, and they also possess the land the Lord your God is giving them. Then you shall return to the land of your possession and possess it, the land Moses the Lord''s servant gave you on the sunrise side of the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They answered Joshua, All you command us we will do, and wherever you send us we will go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' As we hearkened to Moses in all things, so will we hearken to you; only may the Lord your God be with you as He was with Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Whoever rebels against your commandment and will not hearken to all you command him shall be put to death. Only be strong, vigorous, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of good courage.'
