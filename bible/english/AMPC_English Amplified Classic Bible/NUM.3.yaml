document_id: NUM.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THESE are the generations of Aaron and Moses when the Lord spoke with Moses on Mount Sinai.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And you shall appoint Aaron and his sons, and they shall observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attend to their priest''s office; but the excluded [anyone daring to assume priestly duties or privileges who is not of the house of Aaron and called of God] who comes near [the holy things] shall be put to death.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the Lord said to Moses,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Behold, I have taken the Levites from among the Israelites instead of every firstborn who opens the womb among the Israelites; and the Levites shall be Mine,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For all the firstborn are Mine. On the day that I slew all the firstborn in the land of Egypt, I consecrated for Myself all the firstborn in Israel, both man and beast; Mine they shall be. I am the Lord.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the Lord said to Moses in the Wilderness of Sinai,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Number the sons of Levi by their fathers'' houses and by families. Every male from a month old and upward you shall number.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' So Moses numbered them as he was commanded by the word of the Lord.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' These were the sons of Levi by their names: Gershon, Kohath, and Merari.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And these are the names of the sons of Gershon by their families: Libni and Shimei.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The sons of Kohath by their families: Amram, Izhar, Hebron, and Uzziel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' These are the names of the sons of Aaron: Nadab the firstborn, Abihu, Eleazar, and Ithamar.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The sons of Merari by their families: Mahli and Mushi. These are the families of the Levites by their fathers'' houses.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Of Gershon were the families of the Libnites and of the Shimeites. These are the families of the Gershonites.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The males who were numbered of them from a month old and upward totaled 7,500.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' The families of the Gershonites were to encamp behind the tabernacle on the west,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The leader of the fathers'' houses of the Gershonites being Eliasaph son of Lael.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And the responsibility of the sons of Gershon in the Tent of Meeting was to be the tabernacle, the tent, its covering, and the hangings for the door of the Tent of Meeting,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And the hangings of the court, the curtain for the door of the court which is around the tabernacle and the altar, its cords, and all the service pertaining to them.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Of Kohath were the families of the Amramites, the Izharites, the Hebronites, and the Uzzielites; these are the families of the Kohathites.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The number of all the males from a month old and upward totaled 8,600, attending to the duties of the sanctuary.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The families of the sons of Kohath were to encamp on the south side of the tabernacle,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' These are the names of the sons of Aaron, the priests who were anointed, whom Aaron consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained to minister in the priest''s office.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' The chief of the fathers'' houses of the families of the Kohathites being Elizaphan son of Uzziel.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Their charge was to be the ark, the table, the lampstand, the altars, and the utensils of the sanctuary with which the priests minister, and the screen, and all the service having to do with these.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Eleazar son of Aaron the priest was to be chief over the leaders of the Levites, and have the oversight of those who had charge of the sanctuary.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Of Merari were the families of the Mahlites and the Mushites; these are the families of Merari.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Their number of all the males from a month old and upward totaled 6,200.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And the head of the fathers'' houses of the families of Merari was Zuriel son of Abihail; the Merarites were to encamp on the north side of the tabernacle.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And the appointed charge of the sons of Merari was the boards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' frames of the tabernacle, and its bars, pillars, sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, and all the accessories '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' instruments of it, and all the work connected with them,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And the pillars of the surrounding court and their sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, with their pegs and their cords.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But those to encamp before the tabernacle toward the east, before the Tent of Meeting, toward the sunrise, were to be Moses and Aaron and his sons, keeping the full charge of the rites of the sanctuary in whatever was required for the Israelites; and the excluded [one not a descendant of Aaron and called of God] who came near [the sanctuary] was to be put to death.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' All the Levites whom Moses and Aaron numbered at the command of the Lord, by their families, all the males from a month old and upward, were 22,000.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But Nadab and Abihu died before the Lord when they offered strange fire before the Lord in the Wilderness of Sinai; and they had no children. So Eleazar and Ithamar ministered in the priest''s office in the presence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under the supervision of Aaron their father. [Lev. 10:1-4.]'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And the Lord said to Moses, Number all the firstborn of the males of the Israelites from a month old and upward, and take the number of their names.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' You shall take the Levites for Me instead of all the firstborn among the Israelites. I am the Lord; and you shall take the cattle of the Levites for Me instead of all the firstlings among the cattle of the Israelites.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' So Moses numbered, as the Lord commanded him, all the firstborn Israelites.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' But all the firstborn males from a month old and upward as numbered were 22,273 [273 more than the Levites].'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And the Lord said to Moses,'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Take the Levites [for Me] instead of all the firstborn Israelites, and the Levites'' cattle instead of their cattle; and the Levites shall be Mine. I am the Lord.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And for those 273 who are to be redeemed of the firstborn of the Israelites who outnumber the Levites,'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' You shall take five shekels apiece, reckoning by the sanctuary shekel of twenty gerahs; you shall collect them,'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And you shall give the ransom silver from the excess number [over the Levites] to be redeemed to Aaron and his sons.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' So Moses took the redemption money from those who were left over from the number who were redeemed by the Levites.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the Lord said to Moses,'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' From the firstborn of the Israelites he took the money, 1,365 shekels, after the shekel of the sanctuary.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' And Moses gave the money from those who were ransomed to Aaron and his sons, as the Lord commanded Moses.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Bring the tribe of Levi near and set them before Aaron the priest, that they may minister to him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And they shall carry out his instructions and the duties connected with the whole assembly before the Tent of Meeting, doing the service of the tabernacle.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And they shall keep all the instruments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' furnishings of the Tent of Meeting and take charge of [attending] the Israelites, to serve in the tabernacle.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And you shall give the Levites [as servants and helpers] to Aaron and his sons; they are wholly given to him from among the Israelites.'
