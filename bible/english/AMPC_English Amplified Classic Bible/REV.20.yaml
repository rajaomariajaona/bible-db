document_id: REV.20,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN I saw an angel descending from heaven; he was holding the key of the Abyss (the bottomless pit) and a great chain was in his hand.'
  '10':
  - type: text
    content: ' Then the devil who had led them astray [deceiving and seducing them] was hurled into the fiery lake of burning brimstone, where the beast and false prophet were; and they will be tormented day and night forever and ever (through the ages of the ages).'
  '11':
  - type: text
    content: ' Then I saw a great white throne and the One Who was seated upon it, from Whose presence '
  - type: text
    content: and
  - type: text
    content: ' from the sight of Whose face earth and sky fled away, and no place was found for them.'
  '12':
  - type: text
    content: ' I [also] saw the dead, great and small; they stood before the throne, and books were opened. Then another book was opened, which is [the Book] of Life. And the dead were judged (sentenced) by what they had done [their whole way of feeling and acting, their aims and endeavors] in accordance with what was recorded in the books.'
  '13':
  - type: text
    content: ' And the sea delivered up the dead who were in it, death and Hades (the state of death or disembodied existence) surrendered the dead in them, and all were tried '
  - type: text
    content: and
  - type: text
    content: ' their cases determined by what they had done [according to their motives, aims, and works].'
  '14':
  - type: text
    content: ' Then death and Hades (the state of death or disembodied existence) were thrown into the lake of fire. This is the second death, the lake of fire.'
  '15':
  - type: text
    content: ' And if anyone''s [name] was not found recorded in the Book of Life, he was hurled into the lake of fire.'
  '2':
  - type: text
    content: ' And he gripped '
  - type: text
    content: and
  - type: text
    content: ' overpowered the dragon, that old serpent [of primeval times], who is the devil and Satan, and [securely] bound him for a thousand years.'
  '3':
  - type: text
    content: ' Then he hurled him into the Abyss (the bottomless pit) and closed it and sealed it above him, so that he should no longer lead astray '
  - type: text
    content: and
  - type: text
    content: ' deceive '
  - type: text
    content: and
  - type: text
    content: ' seduce the nations until the thousand years were at an end. After that he must be liberated for a short time.'
  '4':
  - type: text
    content: ' Then I saw thrones, and sitting on them were those to whom authority to act as judges '
  - type: text
    content: and
  - type: text
    content: ' to pass sentence was entrusted. Also I saw the souls of those who had been slain with axes [beheaded] for their witnessing to Jesus and [for preaching and testifying] for the Word of God, and who had refused to pay homage to the beast or his statue and had not accepted his mark '
  - type: text
    content: or
  - type: text
    content: ' permitted it to be stamped on their foreheads or on their hands. And they lived again and ruled with Christ (the Messiah) a thousand years. [Dan. 7:9, 22, 27.]'
  '5':
  - type: text
    content: ' The remainder of the dead were not restored to life again until the thousand years were completed. This is the first resurrection.'
  '6':
  - type: text
    content: ' Blessed (happy, to be envied) and holy (spiritually whole, of unimpaired innocence and proved virtue) is the person who takes part (shares) in the first resurrection! Over them the second death exerts no power '
  - type: text
    content: or
  - type: text
    content: ' authority, but they shall be ministers of God and of Christ (the Messiah), and they shall rule along with Him a thousand years.'
  '7':
  - type: text
    content: ' And when the thousand years are completed, Satan will be released from his place of confinement,'
  '8':
  - type: text
    content: ' And he will go forth to deceive '
  - type: text
    content: and
  - type: text
    content: ' seduce '
  - type: text
    content: and
  - type: text
    content: ' lead astray the nations which are in the four quarters of the earth–Gog and Magog–to muster them for war; their number is like the sand of the sea. [Ezek. 38:2, 9, 15, 22.]'
  '9':
  - type: text
    content: ' And they swarmed up over the broad plain of the earth and encircled the fortress (camp) of God''s people (the saints) and the beloved city; but fire descended from heaven and consumed them. [II Kings 1:10-12; Ezek. 38:2, 22.]'
