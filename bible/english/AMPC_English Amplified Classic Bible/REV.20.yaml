document_id: REV.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw an angel descending from heaven; he was holding the key of the Abyss (the bottomless pit) and a great chain was in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he gripped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overpowered the dragon, that old serpent [of primeval times], who is the devil and Satan, and [securely] bound him for a thousand years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then he hurled him into the Abyss (the bottomless pit) and closed it and sealed it above him, so that he should no longer lead astray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seduce the nations until the thousand years were at an end. After that he must be liberated for a short time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then I saw thrones, and sitting on them were those to whom authority to act as judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to pass sentence was entrusted. Also I saw the souls of those who had been slain with axes [beheaded] for their witnessing to Jesus and [for preaching and testifying] for the Word of God, and who had refused to pay homage to the beast or his statue and had not accepted his mark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' permitted it to be stamped on their foreheads or on their hands. And they lived again and ruled with Christ (the Messiah) a thousand years. [Dan. 7:9, 22, 27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The remainder of the dead were not restored to life again until the thousand years were completed. This is the first resurrection.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Blessed (happy, to be envied) and holy (spiritually whole, of unimpaired innocence and proved virtue) is the person who takes part (shares) in the first resurrection! Over them the second death exerts no power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' authority, but they shall be ministers of God and of Christ (the Messiah), and they shall rule along with Him a thousand years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when the thousand years are completed, Satan will be released from his place of confinement,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he will go forth to deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seduce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lead astray the nations which are in the four quarters of the earth–Gog and Magog–to muster them for war; their number is like the sand of the sea. [Ezek. 38:2, 9, 15, 22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And they swarmed up over the broad plain of the earth and encircled the fortress (camp) of God''s people (the saints) and the beloved city; but fire descended from heaven and consumed them. [II Kings 1:10-12; Ezek. 38:2, 22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the devil who had led them astray [deceiving and seducing them] was hurled into the fiery lake of burning brimstone, where the beast and false prophet were; and they will be tormented day and night forever and ever (through the ages of the ages).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then I saw a great white throne and the One Who was seated upon it, from Whose presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from the sight of Whose face earth and sky fled away, and no place was found for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I [also] saw the dead, great and small; they stood before the throne, and books were opened. Then another book was opened, which is [the Book] of Life. And the dead were judged (sentenced) by what they had done [their whole way of feeling and acting, their aims and endeavors] in accordance with what was recorded in the books.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the sea delivered up the dead who were in it, death and Hades (the state of death or disembodied existence) surrendered the dead in them, and all were tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their cases determined by what they had done [according to their motives, aims, and works].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then death and Hades (the state of death or disembodied existence) were thrown into the lake of fire. This is the second death, the lake of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And if anyone''s [name] was not found recorded in the Book of Life, he was hurled into the lake of fire.'
