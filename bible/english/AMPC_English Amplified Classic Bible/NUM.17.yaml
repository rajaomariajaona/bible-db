document_id: NUM.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the Lord told Moses, Put Aaron''s rod back before the Testimony [in the ark], to be kept as a [warning] sign for the rebels; and you shall make an end of their murmurings against Me, lest they die.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And Moses did so; as the Lord commanded him, so he did.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The Israelites said to Moses, Behold, we perish, we are undone, all undone!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Everyone who comes near, who comes near the tabernacle of the Lord, dies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' shall die! Are we all to perish?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Speak to the Israelites and get from them rods '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' staves, one for each father''s house, from all their leaders according to their father''s houses, twelve rods. Write every man''s name on his rod.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And you shall write Aaron''s name on the rod of Levi [his great-grandfather]. For there shall be one rod for the head of each father''s house.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You shall lay them up in the Tent of Meeting before [the ark of] the Testimony, where I meet with you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the rod of the man whom I choose shall bud, and I will make to cease from Me the murmurings of the Israelites, which they murmur against you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And Moses spoke to the Israelites, and every one of their leaders gave him a rod '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' staff, one for each leader according to their fathers'' houses, twelve rods, and the rod of Aaron was among their rods.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Moses deposited the rods before the Lord in the Tent of the Testimony.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the next day Moses went into the Tent of the Testimony, and behold, the rod of Aaron for the house of Levi had sprouted and brought forth buds and produced blossoms and yielded [ripe] almonds.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Moses brought out all the rods from before the Lord to all the Israelites; and they looked, and each man took his rod.'
