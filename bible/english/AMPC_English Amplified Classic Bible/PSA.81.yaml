document_id: PSA.81,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; set to Philistine lute, or +[possibly+] a particular Gittite tune. +[A Psalm+] of Asaph.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SING ALOUD to God our Strength! Shout for joy to the God of Jacob!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I am the Lord your God, Who brought you up out of the land of Egypt. Open your mouth wide and I will fill it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But My people would not hearken to My voice, and Israel would have none of Me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So I gave them up to their own hearts'' lust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let them go after their own stubborn will, that they might follow their own counsels. [Acts 7:42, 43; 14:16; Rom. 1:24, 26.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Oh, that My people would listen to Me, that Israel would walk in My ways!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Speedily then I would subdue their enemies and turn My hand against their adversaries.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [Had Israel listened to Me in Egypt, then] those who hated the Lord would have come cringing before Him, and their defeat would have lasted forever.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' [God] would feed [Israel now] also with the finest of the wheat; and with honey out of the rock would I satisfy you.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Raise a song, sound the timbrel, the sweet lyre with the harp.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Blow the trumpet at the New Moon, at the full moon, on our feast day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For this is a statute for Israel, an ordinance of the God of Jacob.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' This He ordained in Joseph [the savior] for a testimony when He went out over the land of Egypt. The speech of One Whom I knew not did I hear [saying],'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I removed his shoulder from the burden; his hands were freed from the basket.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You called in distress and I delivered you; I answered you in the secret place of thunder; I tested you at the waters of Meribah. Selah [pause, and calmly think of that]! [Num. 20:3, 13, 24.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Hear, O My people, and I will admonish you–O Israel, if you would listen to Me!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' There shall no strange god be among you, neither shall you worship any alien god.'
