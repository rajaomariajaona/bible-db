document_id: EXO.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' They shall make an ark of acacia wood: two and a half cubits long, a cubit and a half wide, and a cubit and a half high.'
  '11':
  - type: text
    content: ' You shall overlay the ark with pure gold, inside and out, and make a gold crown, a rim '
  - type: text
    content: or
  - type: text
    content: ' border, around its top.'
  '12':
  - type: text
    content: ' You shall cast four gold rings and attach them to the four lower corners of it, two rings on either side.'
  '13':
  - type: text
    content: ' You shall make poles of acacia wood and overlay them with gold,'
  '14':
  - type: text
    content: ' And put the poles through the rings on the ark''s sides, by which to carry it.'
  '15':
  - type: text
    content: ' The poles shall remain in the rings of the ark; they shall not be removed from it [that the ark be not touched].'
  '16':
  - type: text
    content: ' And you shall put inside the ark the Testimony [the Ten Commandments] which I will give you.'
  '17':
  - type: text
    content: ' And you shall make a mercy seat (a covering) of pure gold, two cubits and a half long and a cubit and a half wide.'
  '18':
  - type: text
    content: ' And you shall make two cherubim (winged angelic figures) of [solid] hammered gold on the two ends of the mercy seat.'
  '19':
  - type: text
    content: ' Make one cherub on each end, making the cherubim of one piece with the mercy seat, on the two ends of it.'
  '2':
  - type: text
    content: ' Speak to the Israelites, that they take for Me an offering. From every man who gives it willingly '
  - type: text
    content: and
  - type: text
    content: ' ungrudgingly with his heart you shall take My offering.'
  '20':
  - type: text
    content: ' And the cherubim shall spread out their wings above, covering the mercy seat with their wings, facing each other and looking down toward the mercy seat.'
  '21':
  - type: text
    content: ' You shall put the mercy seat on the top of the ark, and in the ark you shall put the Testimony [the Ten Commandments] that I will give you.'
  '22':
  - type: text
    content: ' There I will meet with you and, from above the mercy seat, from between the two cherubim that are upon the ark of the Testimony, I will speak intimately with you of all which I will give you in commandment to the Israelites.'
  '23':
  - type: text
    content: ' Also, make a table of acacia wood, two cubits long, one cubit wide, and a cubit and a half high [for the showbread].'
  '24':
  - type: text
    content: ' You shall overlay it with pure gold and make a crown, a rim '
  - type: text
    content: or
  - type: text
    content: ' molding, of gold around the top of it;'
  '25':
  - type: text
    content: ' And make a frame of a handbreadth around '
  - type: text
    content: and
  - type: text
    content: ' below the top of it and put around it a gold molding as a border.'
  '26':
  - type: text
    content: ' You shall make for it four rings of gold and fasten them at the four corners that are on the table''s four legs.'
  '27':
  - type: text
    content: ' Close against the frame shall the rings be as places for the poles to pass to carry the table [of showbread].'
  '28':
  - type: text
    content: ' You shall make the poles of acacia wood and overlay them with gold, that the table may be carried with them.'
  '29':
  - type: text
    content: ' And you shall make its plates [for showbread] and cups [for incense], and its flagons and bowls [for liquids in sacrifice]; make them of pure gold.'
  '3':
  - type: text
    content: ' This is the offering you shall receive from them: gold, silver, and bronze,'
  '30':
  - type: text
    content: ' And you shall set the showbread (the bread of the Presence) on the table before Me always. [John 6:58.]'
  '31':
  - type: text
    content: ' You shall make a lampstand of pure gold. Of beaten '
  - type: text
    content: and
  - type: text
    content: ' turned work shall the lampstand be made, both its base and its shaft; its cups, its knobs, and its flowers shall be of one piece with it.'
  '32':
  - type: text
    content: ' Six branches shall come out of the sides of it; three branches of the lampstand out of the one side and three branches out of its other side;'
  '33':
  - type: text
    content: ' Three cups made like almond blossoms, each with a knob and a flower on one branch, and three cups made like almond blossoms on the other branch with a knob and a flower; so for the six branches coming out of the lampstand;'
  '34':
  - type: text
    content: ' And on the [center shaft] itself you shall [make] four cups like almond blossoms with their knobs and their flowers.'
  '35':
  - type: text
    content: ' Also make a knob [on the shaft] under each pair of the six branches going out from the lampstand and one piece with it;'
  '36':
  - type: text
    content: ' Their knobs and their branches shall be of one piece with it; the whole of it one beaten work of pure gold.'
  '37':
  - type: text
    content: ' And you shall make the lamps of the [lampstand] to include a seventh one [at the top of the shaft]. [The priests] shall set up the [seven] lamps of it so they may give light in front of it.'
  '38':
  - type: text
    content: ' Its snuffers and its ashtrays shall be of pure gold.'
  '39':
  - type: text
    content: ' Use a talent of pure gold for it, including all these utensils.'
  '4':
  - type: text
    content: ' Blue, purple, and scarlet [stuff] and fine twined linen and goats'' hair,'
  '40':
  - type: text
    content: ' And see to it that you copy [exactly] their pattern which was shown you on the mountain. [Heb. 8:5, 6.]'
  '5':
  - type: text
    content: ' Rams'' skins tanned red, goatskins, dolphin '
  - type: text
    content: or
  - type: text
    content: ' porpoise skins, acacia wood,'
  '6':
  - type: text
    content: ' Oil for the light, spices for anointing oil and for sweet incense,'
  '7':
  - type: text
    content: ' Onyx stones, and stones for setting in the ephod and in the breastplate.'
  '8':
  - type: text
    content: ' Let them make Me a sanctuary, that I may dwell among them. [Heb. 8:1, 2; 10:1.]'
  '9':
  - type: text
    content: ' And you shall make it according to all that I show you, the pattern of the tabernacle '
  - type: text
    content: or
  - type: text
    content: ' dwelling and the pattern of all the furniture of it.'
