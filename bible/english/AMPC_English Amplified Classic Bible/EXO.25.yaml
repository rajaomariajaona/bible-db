document_id: EXO.25,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' They shall make an ark of acacia wood: two and a half cubits long, a cubit and a half wide, and a cubit and a half high.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You shall overlay the ark with pure gold, inside and out, and make a gold crown, a rim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' border, around its top.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' You shall cast four gold rings and attach them to the four lower corners of it, two rings on either side.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' You shall make poles of acacia wood and overlay them with gold,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And put the poles through the rings on the ark''s sides, by which to carry it.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The poles shall remain in the rings of the ark; they shall not be removed from it [that the ark be not touched].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And you shall put inside the ark the Testimony [the Ten Commandments] which I will give you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And you shall make a mercy seat (a covering) of pure gold, two cubits and a half long and a cubit and a half wide.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And you shall make two cherubim (winged angelic figures) of [solid] hammered gold on the two ends of the mercy seat.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Make one cherub on each end, making the cherubim of one piece with the mercy seat, on the two ends of it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Speak to the Israelites, that they take for Me an offering. From every man who gives it willingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ungrudgingly with his heart you shall take My offering.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the cherubim shall spread out their wings above, covering the mercy seat with their wings, facing each other and looking down toward the mercy seat.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You shall put the mercy seat on the top of the ark, and in the ark you shall put the Testimony [the Ten Commandments] that I will give you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' There I will meet with you and, from above the mercy seat, from between the two cherubim that are upon the ark of the Testimony, I will speak intimately with you of all which I will give you in commandment to the Israelites.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Also, make a table of acacia wood, two cubits long, one cubit wide, and a cubit and a half high [for the showbread].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' You shall overlay it with pure gold and make a crown, a rim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' molding, of gold around the top of it;'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And make a frame of a handbreadth around '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' below the top of it and put around it a gold molding as a border.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' You shall make for it four rings of gold and fasten them at the four corners that are on the table''s four legs.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Close against the frame shall the rings be as places for the poles to pass to carry the table [of showbread].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' You shall make the poles of acacia wood and overlay them with gold, that the table may be carried with them.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And you shall make its plates [for showbread] and cups [for incense], and its flagons and bowls [for liquids in sacrifice]; make them of pure gold.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' This is the offering you shall receive from them: gold, silver, and bronze,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And you shall set the showbread (the bread of the Presence) on the table before Me always. [John 6:58.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' You shall make a lampstand of pure gold. Of beaten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turned work shall the lampstand be made, both its base and its shaft; its cups, its knobs, and its flowers shall be of one piece with it.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Six branches shall come out of the sides of it; three branches of the lampstand out of the one side and three branches out of its other side;'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Three cups made like almond blossoms, each with a knob and a flower on one branch, and three cups made like almond blossoms on the other branch with a knob and a flower; so for the six branches coming out of the lampstand;'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And on the [center shaft] itself you shall [make] four cups like almond blossoms with their knobs and their flowers.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Also make a knob [on the shaft] under each pair of the six branches going out from the lampstand and one piece with it;'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Their knobs and their branches shall be of one piece with it; the whole of it one beaten work of pure gold.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And you shall make the lamps of the [lampstand] to include a seventh one [at the top of the shaft]. [The priests] shall set up the [seven] lamps of it so they may give light in front of it.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Its snuffers and its ashtrays shall be of pure gold.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Use a talent of pure gold for it, including all these utensils.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Blue, purple, and scarlet [stuff] and fine twined linen and goats'' hair,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And see to it that you copy [exactly] their pattern which was shown you on the mountain. [Heb. 8:5, 6.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Rams'' skins tanned red, goatskins, dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skins, acacia wood,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Oil for the light, spices for anointing oil and for sweet incense,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Onyx stones, and stones for setting in the ephod and in the breastplate.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Let them make Me a sanctuary, that I may dwell among them. [Heb. 8:1, 2; 10:1.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And you shall make it according to all that I show you, the pattern of the tabernacle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dwelling and the pattern of all the furniture of it.'
