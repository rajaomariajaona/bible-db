document_id: ISA.45
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord to His anointed, to Cyrus, whose right hand I have held to subdue nations before him, and I will unarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ungird the loins of kings to open doors before him, so that gates will not be shut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I will go before you and level the mountains [to make the crooked places straight]; I will break in pieces the doors of bronze and cut asunder the bars of iron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I will give you the treasures of darkness and hidden riches of secret places, that you may know that it is I, the Lord, the God of Israel, Who calls you by your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the sake of Jacob My servant, and of Israel My chosen, I have called you by your name. I have surnamed you, though you have not known Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I am the Lord, and there is no one else; there is no God besides Me. I will gird '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arm you, though you have not known Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That men may know from the east '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the rising of the sun and from the west '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the setting of the sun that there is no God besides Me. I am the Lord, and no one else [is He].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I form the light and create darkness, I make peace [national well-being] and I create [physical] evil (calamity); I am the Lord, Who does all these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let fall in showers, you heavens, from above, and let the skies rain down righteousness [the pure, spiritual, heaven-born possibilities that have their foundation in the holy being of God]; let the earth open, and let them [skies and earth] sprout forth salvation, and let righteousness germinate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spring up [as plants do] together; I the Lord have created it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Woe to him who strives with his Maker!–a worthless piece of broken pottery among other pieces equally worthless [and yet presuming to strive with his Maker]! Shall the clay say to him who fashions it, What do you think you are making? or, Your work has no handles? [Rom. 9:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Woe to him [who complains against his parents that they have begotten him] who says to a father, What are you begetting? or to a woman, With what are you in travail?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus says the Lord, the Holy One of Israel, and its Maker: Would you question Me about things to come concerning My children, and concerning the work of My hands [would you] command Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I made the earth and created man upon it. I, with My hands, stretched out the heavens, and I commanded all their host.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I will raise [Cyrus] up in righteousness [willing in every way that which is right and proper], and I will direct all his ways; he will build My city, and he will let My captives go, not for hire or for a bribe, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Thus says the Lord: The labor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wealth of Egypt and the merchandise of Ethiopia and the Sabeans, men of stature, shall come over to you and they shall be yours; they shall follow you; in chains [of subjection to you] they shall come over, and they shall fall down before you; they shall make supplication to you, saying, Surely God is with you, and there is no other, no God besides Him. [I Cor. 14:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Truly You are a God Who hides Himself, O God of Israel, the Savior.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They shall be put to shame, yes, confounded, all of them; they who are makers of idols shall go off into confusion together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But Israel shall be saved by the Lord with an everlasting salvation; you shall not be put to shame or confounded to all eternity. [Heb. 5:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For thus says the Lord–Who created the heavens, God Himself, Who formed the earth and made it, Who established it and did not create it to be a worthless waste; He formed it to be inhabited–I am the Lord, and there is no one else.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I have not spoken in secret, in a corner of the land of darkness; I did not call the descendants of Jacob [to a fruitless service], saying, Seek Me for nothing [but I promised them a just reward]. I, the Lord, speak righteousness (the truth–trustworthy, straightforward correspondence between deeds and words); I declare things that are right. [John 18:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Assemble yourselves and come; draw near together, you survivors of the nations! They have no knowledge who carry about [in religious processions or into battle] their wooden idols and keep on praying to a god that cannot save.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Declare and bring forward your strong arguments [for praying to gods that cannot save]; yes, take counsel together. Who announced this [the rise of Cyrus and his conquests] beforehand (long ago)? [What god] declared it of old? Was it not I, the Lord? And there is no other God besides Me, a rigidly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncompromisingly just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous God and Savior; there is none besides Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Look to Me and be saved, all the ends of the earth! For I am God, and there is no other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' I have sworn by Myself, the word is gone out of My mouth in righteousness and shall not return, that unto Me every knee shall bow, every tongue shall swear [allegiance]. [Rom. 14:11; Phil. 2:10, 11; Heb. 6:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Only in the Lord shall one say, I have righteousness (salvation and victory) and strength [to achieve]. To Him shall all come who were incensed against Him, and they shall be ashamed. [I Cor. 1:30, 31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' In the Lord shall all the offspring of Israel be justified (enjoy righteousness, salvation, and victory) and shall glory.'
