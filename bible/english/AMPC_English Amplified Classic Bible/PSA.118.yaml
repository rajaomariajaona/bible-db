document_id: PSA.118
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GIVE thanks to the Lord, for He is good; for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let Israel now say that His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let the house of Aaron [the priesthood] now say that His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Let those now who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear the Lord say that His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Out of my distress I called upon the Lord; the Lord answered me and set me free '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in a large place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The Lord is on my side; I will not fear. What can man do to me? [Heb. 13:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord is on my side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' takes my part, He is among those who help me; therefore shall I see my desire established upon those who hate me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' It is better to trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge in the Lord than to put confidence in man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' It is better to trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge in the Lord than to put confidence in princes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All nations (the surrounding tribes) compassed me about, but in the name of the Lord I will cut them off!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They compassed me about, yes, they surrounded me on every side; but in the name of the Lord I will cut them off!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They swarmed about me like bees, they blaze up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are extinguished like a fire of thorns; in the name of the Lord I will cut them off! [Deut. 1:44.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You [my adversary] thrust sorely at me that I might fall, but the Lord helped me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The Lord is my Strength and Song; and He has become my Salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The voice of rejoicing and salvation is in the tents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' private dwellings of the [uncompromisingly] righteous: the right hand of the Lord does valiantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' achieves strength!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The right hand of the Lord is exalted; the right hand of the Lord does valiantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' achieves strength!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I shall not die but live, and shall declare the works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recount the illustrious acts of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Lord has chastened me sorely, but He has not given me over to death. [II Cor. 6:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Open to me the [temple] gates of righteousness; I will enter through them, and I will confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' This is the gate of the Lord; the [uncompromisingly] righteous shall enter through it. [Ps. 24:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I will confess, praise, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to You, for You have heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answered me; and You have become my Salvation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Deliverer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The stone which the builders rejected has become the chief cornerstone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' This is from the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is His doing; it is marvelous in our eyes. [Matt. 21:42; Acts 4:11; I Pet. 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' This is the day which the Lord has brought about; we will rejoice and be glad in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Save now, we beseech You, O Lord; send now prosperity, O Lord, we beseech You, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give to us success!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Blessed is he who comes in the name of the Lord; we bless you from the house of the Lord [you who come into His sanctuary under His guardianship]. [Mark 11:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The Lord is God, Who has shown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given us light [He has illuminated us with grace, freedom, and joy]. Decorate the festival with leafy boughs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bind the sacrifices to be offered with thick cords [all over the priest''s court, right up] to the horns of the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' You are my God, and I will confess, praise, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to You; You are my God, I will extol You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' O give thanks to the Lord, for He is good; for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever.'
