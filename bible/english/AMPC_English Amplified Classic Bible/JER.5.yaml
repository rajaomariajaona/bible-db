document_id: JER.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' RUN TO and fro through the streets of Jerusalem, and see now and take notice! Seek in her broad squares to see if you can find a man [as Abraham sought in Sodom], one who does justice, who seeks truth, sincerity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness; and I will pardon [Jerusalem–for one uncompromisingly righteous person]. [Gen. 18:22-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And though they say, As the Lord lives, surely they swear falsely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' O Lord, do not your eyes look on the truth? [They have meant to please You outwardly, but You look on their hearts.] You have stricken them, but they have not grieved; You have consumed them, but they have refused to take correction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' instruction. They have made their faces harder than a rock, they have refused to repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then I said, Surely these are only the poor; they are [sinfully] foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have no understanding, for they know not the way of the Lord, the judgment (the just and righteous law) of their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I will go to the great men and will speak to them, for they must know the way of the Lord, the judgment (the just and righteous law) of their God. But [I found the very reverse to be true] these had all alike broken the yoke [of God''s law] and had burst the bonds [of obedience to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore a lion out of the forest shall slay them, a wolf of the desert shall destroy them, a leopard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' panther shall lie in wait against their cities. Everyone who goes out of them shall be torn in pieces, because their transgressions are many, their backslidings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' total desertion of faith are increased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have become great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Why should I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how can I pass over this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgive you for it? Your children have forsaken Me and sworn by those that are no gods. When I had fed them to the full '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bound them to Me by oath, they committed [spiritual] adultery, assembling themselves in troops at the houses of [idol] harlots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They were like fed stallions roaming at large; each one neighed after his neighbor''s wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Shall I not punish them for these things? says the Lord; and shall I not avenge Myself on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Go up within [Jerusalem''s] walls and destroy [her vines], but do not make a full '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete end. Trim away the tendrils [of her vines], for they are not the Lord''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the house of Israel and the house of Judah have dealt very faithlessly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherously against Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They have lied about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denied the Lord by saying, It is not He [Who speaks through His prophets]! Evil shall not come upon us; nor shall we see war or famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And [say they] the prophets will become wind [what they prophesy will not come to pass], and the word [of God] is not in them. Thus shall it be done to them [as they threatened would be done to us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore thus says the Lord God of hosts: Because you [the people] have spoken this word, behold, I will make My words fire in your mouth [Jeremiah] and this people wood, and it will devour them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, I am bringing a nation upon you from afar, O house of Israel, says the Lord. It is a mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enduring nation, it is an ancient nation, a nation whose language you do not know, nor can you understand what they say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Their quiver is [filled with deadly missiles] like an open sepulcher [filled with dead bodies; the foes] are all mighty men (heroes).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They shall consume your harvest and your food; they shall consume your sons and your daughters; they shall consume your flocks and your herds; they shall consume your vines and your fig trees. They shall break down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impoverish your fortified cities in which you trust, with the sword [they shall destroy them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But even in those days, says the Lord, I will not make a full '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete end of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when your people say, Why has the Lord our God done all these things to us? then you shall answer them, As you have forsaken Me, says the Lord, and have served strange gods in your land, so shall you serve strangers (gods) in a land that is not yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Declare this in the house of Jacob and publish it in Judah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Hear now this, O foolish people without understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heart, who have eyes and see not, who have ears and hear not: [Isa. 6:9, 10; Matt. 13:10-15; Mark 8:17, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Do you not fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverence Me? says the Lord. Do you not tremble before Me? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' placed the sand for the boundary of the sea, a perpetual barrier beyond which it cannot pass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by an everlasting ordinance beyond which it cannot go? And though the waves of the sea toss '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shake themselves, yet they cannot prevail [against the feeble grains of sand which God has ordained by nature to be sufficient for His purpose]; though [the billows] roar, yet they cannot pass over that [barrier]. [Is not such a God to be reverently feared and worshiped?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But these people have hearts that draw back from God and wills that rebel against Him; they have revolted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quit His service and have gone away [into idolatry].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Nor do they say in their hearts, Let us now reverently fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship the Lord our God, Who gives rain, both the autumn and the spring rain in its season, Who reserves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps for us the appointed weeks of the harvest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Your iniquities have turned these blessings away, and your sins have kept good [harvests] from you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For among My people are found wicked men; they watch like fowlers who lie in wait; they set a trap, they catch men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' As a cage is full of birds, so are their houses full of deceit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treachery; therefore they have become great and grown rich,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' They have grown fat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sleek. Yes, they surpass in deeds of wickedness; they do not judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plead with justice the cause of the fatherless, that they may prosper, and they do not defend the rights of the needy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Shall I not punish them for these things? says the Lord. Shall I not avenge Myself on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' An appalling and horrible thing [bringing desolation and destruction] has come to pass in the land:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The prophets prophesy falsely, and the priests exercise rule at their own hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by means of the prophets. And My people love to have it so! But what will you do when the end comes?'
