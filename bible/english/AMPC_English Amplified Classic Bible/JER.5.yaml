document_id: JER.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' RUN TO and fro through the streets of Jerusalem, and see now and take notice! Seek in her broad squares to see if you can find a man [as Abraham sought in Sodom], one who does justice, who seeks truth, sincerity, '
  - type: text
    content: and
  - type: text
    content: ' faithfulness; and I will pardon [Jerusalem–for one uncompromisingly righteous person]. [Gen. 18:22-32.]'
  '10':
  - type: text
    content: ' Go up within [Jerusalem''s] walls and destroy [her vines], but do not make a full '
  - type: text
    content: and
  - type: text
    content: ' complete end. Trim away the tendrils [of her vines], for they are not the Lord''s.'
  '11':
  - type: text
    content: ' For the house of Israel and the house of Judah have dealt very faithlessly '
  - type: text
    content: and
  - type: text
    content: ' treacherously against Me, says the Lord.'
  '12':
  - type: text
    content: ' They have lied about '
  - type: text
    content: and
  - type: text
    content: ' denied the Lord by saying, It is not He [Who speaks through His prophets]! Evil shall not come upon us; nor shall we see war or famine.'
  '13':
  - type: text
    content: ' And [say they] the prophets will become wind [what they prophesy will not come to pass], and the word [of God] is not in them. Thus shall it be done to them [as they threatened would be done to us].'
  '14':
  - type: text
    content: ' Therefore thus says the Lord God of hosts: Because you [the people] have spoken this word, behold, I will make My words fire in your mouth [Jeremiah] and this people wood, and it will devour them.'
  '15':
  - type: text
    content: ' Behold, I am bringing a nation upon you from afar, O house of Israel, says the Lord. It is a mighty '
  - type: text
    content: and
  - type: text
    content: ' enduring nation, it is an ancient nation, a nation whose language you do not know, nor can you understand what they say.'
  '16':
  - type: text
    content: ' Their quiver is [filled with deadly missiles] like an open sepulcher [filled with dead bodies; the foes] are all mighty men (heroes).'
  '17':
  - type: text
    content: ' They shall consume your harvest and your food; they shall consume your sons and your daughters; they shall consume your flocks and your herds; they shall consume your vines and your fig trees. They shall break down '
  - type: text
    content: and
  - type: text
    content: ' impoverish your fortified cities in which you trust, with the sword [they shall destroy them].'
  '18':
  - type: text
    content: ' But even in those days, says the Lord, I will not make a full '
  - type: text
    content: and
  - type: text
    content: ' complete end of you.'
  '19':
  - type: text
    content: ' And when your people say, Why has the Lord our God done all these things to us? then you shall answer them, As you have forsaken Me, says the Lord, and have served strange gods in your land, so shall you serve strangers (gods) in a land that is not yours.'
  '2':
  - type: text
    content: ' And though they say, As the Lord lives, surely they swear falsely.'
  '20':
  - type: text
    content: ' Declare this in the house of Jacob and publish it in Judah:'
  '21':
  - type: text
    content: ' Hear now this, O foolish people without understanding '
  - type: text
    content: or
  - type: text
    content: ' heart, who have eyes and see not, who have ears and hear not: [Isa. 6:9, 10; Matt. 13:10-15; Mark 8:17, 18.]'
  '22':
  - type: text
    content: ' Do you not fear '
  - type: text
    content: and
  - type: text
    content: ' reverence Me? says the Lord. Do you not tremble before Me? '
  - type: text
    content: I
  - type: text
    content: ' placed the sand for the boundary of the sea, a perpetual barrier beyond which it cannot pass '
  - type: text
    content: and
  - type: text
    content: ' by an everlasting ordinance beyond which it cannot go? And though the waves of the sea toss '
  - type: text
    content: and
  - type: text
    content: ' shake themselves, yet they cannot prevail [against the feeble grains of sand which God has ordained by nature to be sufficient for His purpose]; though [the billows] roar, yet they cannot pass over that [barrier]. [Is not such a God to be reverently feared and worshiped?]'
  '23':
  - type: text
    content: ' But these people have hearts that draw back from God and wills that rebel against Him; they have revolted '
  - type: text
    content: and
  - type: text
    content: ' quit His service and have gone away [into idolatry].'
  '24':
  - type: text
    content: ' Nor do they say in their hearts, Let us now reverently fear '
  - type: text
    content: and
  - type: text
    content: ' worship the Lord our God, Who gives rain, both the autumn and the spring rain in its season, Who reserves '
  - type: text
    content: and
  - type: text
    content: ' keeps for us the appointed weeks of the harvest.'
  '25':
  - type: text
    content: ' Your iniquities have turned these blessings away, and your sins have kept good [harvests] from you.'
  '26':
  - type: text
    content: ' For among My people are found wicked men; they watch like fowlers who lie in wait; they set a trap, they catch men.'
  '27':
  - type: text
    content: ' As a cage is full of birds, so are their houses full of deceit '
  - type: text
    content: and
  - type: text
    content: ' treachery; therefore they have become great and grown rich,'
  '28':
  - type: text
    content: ' They have grown fat '
  - type: text
    content: and
  - type: text
    content: ' sleek. Yes, they surpass in deeds of wickedness; they do not judge '
  - type: text
    content: and
  - type: text
    content: ' plead with justice the cause of the fatherless, that they may prosper, and they do not defend the rights of the needy.'
  '29':
  - type: text
    content: ' Shall I not punish them for these things? says the Lord. Shall I not avenge Myself on such a nation as this?'
  '3':
  - type: text
    content: ' O Lord, do not your eyes look on the truth? [They have meant to please You outwardly, but You look on their hearts.] You have stricken them, but they have not grieved; You have consumed them, but they have refused to take correction '
  - type: text
    content: or
  - type: text
    content: ' instruction. They have made their faces harder than a rock, they have refused to repent '
  - type: text
    content: and
  - type: text
    content: ' return to You.'
  '30':
  - type: text
    content: ' An appalling and horrible thing [bringing desolation and destruction] has come to pass in the land:'
  '31':
  - type: text
    content: ' The prophets prophesy falsely, and the priests exercise rule at their own hands '
  - type: text
    content: and
  - type: text
    content: ' by means of the prophets. And My people love to have it so! But what will you do when the end comes?'
  '4':
  - type: text
    content: ' Then I said, Surely these are only the poor; they are [sinfully] foolish '
  - type: text
    content: and
  - type: text
    content: ' have no understanding, for they know not the way of the Lord, the judgment (the just and righteous law) of their God.'
  '5':
  - type: text
    content: ' I will go to the great men and will speak to them, for they must know the way of the Lord, the judgment (the just and righteous law) of their God. But [I found the very reverse to be true] these had all alike broken the yoke [of God''s law] and had burst the bonds [of obedience to Him].'
  '6':
  - type: text
    content: ' Therefore a lion out of the forest shall slay them, a wolf of the desert shall destroy them, a leopard '
  - type: text
    content: or
  - type: text
    content: ' panther shall lie in wait against their cities. Everyone who goes out of them shall be torn in pieces, because their transgressions are many, their backslidings '
  - type: text
    content: and
  - type: text
    content: ' total desertion of faith are increased '
  - type: text
    content: and
  - type: text
    content: ' have become great '
  - type: text
    content: and
  - type: text
    content: ' mighty.'
  '7':
  - type: text
    content: ' Why should I '
  - type: text
    content: and
  - type: text
    content: ' how can I pass over this '
  - type: text
    content: and
  - type: text
    content: ' forgive you for it? Your children have forsaken Me and sworn by those that are no gods. When I had fed them to the full '
  - type: text
    content: and
  - type: text
    content: ' bound them to Me by oath, they committed [spiritual] adultery, assembling themselves in troops at the houses of [idol] harlots.'
  '8':
  - type: text
    content: ' They were like fed stallions roaming at large; each one neighed after his neighbor''s wife.'
  '9':
  - type: text
    content: ' Shall I not punish them for these things? says the Lord; and shall I not avenge Myself on such a nation as this?'
