document_id: NAM.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BURDEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oracle (the thing to be lifted up) concerning Nineveh [the capital of Assyria]. The book of the vision of Nahum of Elkosh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord is a jealous God and avenging; the Lord avenges and He is full of wrath. The Lord takes vengeance on His adversaries and reserves wrath for His enemies. [Exod. 20:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord is slow to anger and great in power and will by no means clear the guilty. The Lord has His way in the whirlwind and in the storm, and the clouds are the dust of His feet. [Exod. 34:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He rebukes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' threatens the sea and makes it dry, and dries up all the rivers. Bashan [on the east] and Mount Carmel [on the west] wither, and [in the north] the blossom of Lebanon fades.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The mountains tremble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quake before Him and the hills melt away, and the earth is upheaved at His presence–yes, the world and all that dwell in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who can stand before His indignation? And who can stand up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure the fierceness of His anger? His wrath is poured out like fire, and the rocks are broken asunder by Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord is good, a Strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Stronghold in the day of trouble; He knows (recognizes, has knowledge of, and understands) those who take refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in Him. [Ps. 1:6; Hos. 13:5; John 10:14, 27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But with an overrunning flood He will make a full end of [Nineveh''s very] site and pursue His enemies into darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' What do you devise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [how mad is your attempt to] plot against the Lord? He will make a full end [of Nineveh]; affliction [which My people shall suffer from Assyria] shall not rise up the second time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For [the Ninevites] are as bundles of thorn branches [for fuel], and even while drowned in their drunken [carousing] they shall be consumed like stubble fully dry [in the day of the Lord''s wrath]. [Mal. 4:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' There is one gone forth out of you [O Nineveh] who plots evil against the Lord, a villainous counselor [the king of Assyria, who counsels for wickedness and worthlessness]. [II Kings 19:20-23; Isa. 10:5-7; 36:15-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus says the Lord: Though they be in full strength and likewise many, even so shall [the Assyrians] be cut down when [their evil counselor] shall pass away. Though I have afflicted you [Jerusalem], I will not cause you to be afflicted [for your past sins] any more. [II Kings 19:35-37; John 5:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For now will I break his yoke from off you and will burst your bonds asunder. [Isa. 14:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Lord has given a commandment concerning you [evil Assyrian counselor], that no more of your name shall be born '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' shall your name be perpetuated. Out of the house of your gods I will cut off the graven and molten images; I will make [their temple] your tomb, for you are vile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised. [Isa. 37:38.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold! upon the mountains the feet of him who brings good tidings [telling of the Assyrian''s death], who publishes peace! Celebrate your feasts, O Judah; perform your vows. For the wicked counselor [the king of Assyria] shall no more come against you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pass through your land; he is utterly cut off. [Isa. 52:7; Rom. 10:15.] [Then the prophet Nahum sarcastically addresses his message to Nineveh:]'
