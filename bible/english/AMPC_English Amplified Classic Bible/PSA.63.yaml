document_id: PSA.63,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David; when he was in the Wilderness of Judah.
  - type: text
    content: ' O GOD, You are my God, earnestly will I seek You; my inner self thirsts for You, my flesh longs '
  - type: text
    content: and
  - type: text
    content: ' is faint for You, in a dry and weary land where no water is.'
  '10':
  - type: text
    content: ' They shall be given over to the power of the sword; they shall be a prey for foxes '
  - type: text
    content: and
  - type: text
    content: ' jackals.'
  '11':
  - type: text
    content: ' But the king shall rejoice in God; everyone who swears by Him [that is, who binds himself by God''s authority, acknowledging His supremacy, and devoting himself to His glory and service alone; every such one] shall glory, for the mouths of those who speak lies shall be stopped.'
  '2':
  - type: text
    content: ' So I have looked upon You in the sanctuary to see Your power and Your glory.'
  '3':
  - type: text
    content: ' Because Your loving-kindness is better than life, my lips shall praise You.'
  '4':
  - type: text
    content: ' So will I bless You while I live; I will lift up my hands in Your name.'
  '5':
  - type: text
    content: ' My whole being shall be satisfied as with marrow and fatness; and my mouth shall praise You with joyful lips'
  '6':
  - type: text
    content: ' When I remember You upon my bed and meditate on You in the night watches.'
  '7':
  - type: text
    content: ' For You have been my help, and in the shadow of Your wings will I rejoice.'
  '8':
  - type: text
    content: ' My whole being follows hard after You '
  - type: text
    content: and
  - type: text
    content: ' clings closely to You; Your right hand upholds me.'
  '9':
  - type: text
    content: ' But those who seek '
  - type: text
    content: and
  - type: text
    content: ' demand my life to ruin '
  - type: text
    content: and
  - type: text
    content: ' destroy it shall [themselves be destroyed and] go into the lower parts of the earth [into the underworld of the dead].'
