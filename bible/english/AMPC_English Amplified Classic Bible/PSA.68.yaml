document_id: PSA.68
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David. A song.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GOD IS [already] beginning to arise, and His enemies to scatter; let them also who hate Him flee before Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As smoke is driven away, so drive them away; as wax melts before the fire, so let the wicked perish before the presence of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But let the [uncompromisingly] righteous be glad; let them be in high spirits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory before God, yes, let them [jubilantly] rejoice!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Sing to God, sing praises to His name, cast up a highway for Him Who rides through the deserts–His name is the Lord–be in high spirits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory before Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A father of the fatherless and a judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protector of the widows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' God in His holy habitation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' God places the solitary in families '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gives the desolate a home in which to dwell; He leads the prisoners out to prosperity; but the rebellious dwell in a parched land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' O God, when You went forth before Your people, when You marched through the wilderness–Selah [pause, and calmly think of that]!–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The earth trembled, the heavens also poured down [rain] at the presence of God; yonder Sinai quaked at the presence of God, the God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You, O God, did send a plentiful rain; You did restore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirm Your heritage when it languished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was weary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Your flock found a dwelling place in it; You, O God, in Your goodness did provide for the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' needy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord gives the word [of power]; the women who bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publish [the news] are a great host.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The kings of the enemies'' armies, they flee, they flee! She who tarries at home divides the spoil [left behind].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Though you [the slackers] may lie among the sheepfolds [in slothful ease, yet for Israel] the wings of a dove are covered with silver, its pinions excessively green with gold [are trophies taken from the enemy].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When the Almighty scattered kings in [the land], it was as when it snows on Zalmon [a wooded hill near Shechem].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Is Mount Bashan the high mountain of summits, Mount Bashan [east of the Jordan] the mount of God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Why do you look with grudging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' envy, you many-peaked mountains, at the mountain [of the city called Zion] which God has desired for His dwelling place? Yes, the Lord will dwell in it forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The chariots of God are twenty thousand, even thousands upon thousands. The Lord is among them as He was in Sinai, [so also] in the Holy Place (the sanctuary in Jerusalem).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You have ascended on high. You have led away captive a train of vanquished foes; You have received gifts of men, yes, of the rebellious also, that the Lord God might dwell there with them. [Eph. 4:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Blessed be the Lord, Who bears our burdens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carries us day by day, even the God Who is our salvation! Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' God is to us a God of deliverances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' salvation; and to God the Lord belongs escape from death [setting us free].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But God will shatter the heads of His enemies, the hairy scalp of such a one as goes on still in his trespasses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilty ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The Lord said, I will bring back [your enemies] from Bashan; I will bring them back from the depths of the [Red] Sea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' That you may crush them, dipping your foot in blood, that the tongues of your dogs may have their share from the foe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' They see Your goings, O God, even the [solemn processions] of my God, my King, into the sanctuary [in holiness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The singers go in front, the players on instruments last; between them the maidens are playing on tambourines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Bless, give thanks, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gratefully praise God in full congregations, even the Lord, O you who are from [Jacob] the fountain of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' There is little Benjamin in the lead [in the procession], the princes of Judah and their company, the princes of Zebulun, and the princes of Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Your God has commanded your strength [your might in His service and impenetrable hardness to temptation]; O God, display Your might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen what You have wrought for us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' [Out of respect] for Your temple at Jerusalem kings shall bring gifts to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Rebuke the wild beasts dwelling among the reeds [in Egypt], the herd of bulls (the leaders) with the calves of the peoples; trample underfoot those who lust for tribute money; scatter the peoples who delight in war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Princes shall come out of Egypt; Ethiopia shall hasten to stretch out her hands [with the offerings of submission] to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Sing to God, O kingdoms of the earth, sing praises to the Lord! Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' [Sing praises] to Him Who rides upon the heavens, the ancient heavens; behold, He sends forth His voice, His mighty voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Ascribe power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength to God; His majesty is over Israel, and His strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' might are in the skies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' O God, awe-inspiring, profoundly impressive, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrible are You out of Your holy places; the God of Israel Himself gives strength and fullness of might to His people. Blessed be God!'
