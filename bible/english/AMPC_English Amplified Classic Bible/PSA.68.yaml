document_id: PSA.68,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David. A song.
  - type: text
    content: ' GOD IS [already] beginning to arise, and His enemies to scatter; let them also who hate Him flee before Him!'
  '10':
  - type: text
    content: ' Your flock found a dwelling place in it; You, O God, in Your goodness did provide for the poor '
  - type: text
    content: and
  - type: text
    content: ' needy.'
  '11':
  - type: text
    content: ' The Lord gives the word [of power]; the women who bear '
  - type: text
    content: and
  - type: text
    content: ' publish [the news] are a great host.'
  '12':
  - type: text
    content: ' The kings of the enemies'' armies, they flee, they flee! She who tarries at home divides the spoil [left behind].'
  '13':
  - type: text
    content: ' Though you [the slackers] may lie among the sheepfolds [in slothful ease, yet for Israel] the wings of a dove are covered with silver, its pinions excessively green with gold [are trophies taken from the enemy].'
  '14':
  - type: text
    content: ' When the Almighty scattered kings in [the land], it was as when it snows on Zalmon [a wooded hill near Shechem].'
  '15':
  - type: text
    content: ' Is Mount Bashan the high mountain of summits, Mount Bashan [east of the Jordan] the mount of God?'
  '16':
  - type: text
    content: ' Why do you look with grudging '
  - type: text
    content: and
  - type: text
    content: ' envy, you many-peaked mountains, at the mountain [of the city called Zion] which God has desired for His dwelling place? Yes, the Lord will dwell in it forever.'
  '17':
  - type: text
    content: ' The chariots of God are twenty thousand, even thousands upon thousands. The Lord is among them as He was in Sinai, [so also] in the Holy Place (the sanctuary in Jerusalem).'
  '18':
  - type: text
    content: ' You have ascended on high. You have led away captive a train of vanquished foes; You have received gifts of men, yes, of the rebellious also, that the Lord God might dwell there with them. [Eph. 4:8.]'
  '19':
  - type: text
    content: ' Blessed be the Lord, Who bears our burdens '
  - type: text
    content: and
  - type: text
    content: ' carries us day by day, even the God Who is our salvation! Selah [pause, and calmly think of that]!'
  '2':
  - type: text
    content: ' As smoke is driven away, so drive them away; as wax melts before the fire, so let the wicked perish before the presence of God.'
  '20':
  - type: text
    content: ' God is to us a God of deliverances '
  - type: text
    content: and
  - type: text
    content: ' salvation; and to God the Lord belongs escape from death [setting us free].'
  '21':
  - type: text
    content: ' But God will shatter the heads of His enemies, the hairy scalp of such a one as goes on still in his trespasses '
  - type: text
    content: and
  - type: text
    content: ' guilty ways.'
  '22':
  - type: text
    content: ' The Lord said, I will bring back [your enemies] from Bashan; I will bring them back from the depths of the [Red] Sea,'
  '23':
  - type: text
    content: ' That you may crush them, dipping your foot in blood, that the tongues of your dogs may have their share from the foe.'
  '24':
  - type: text
    content: ' They see Your goings, O God, even the [solemn processions] of my God, my King, into the sanctuary [in holiness].'
  '25':
  - type: text
    content: ' The singers go in front, the players on instruments last; between them the maidens are playing on tambourines.'
  '26':
  - type: text
    content: ' Bless, give thanks, '
  - type: text
    content: and
  - type: text
    content: ' gratefully praise God in full congregations, even the Lord, O you who are from [Jacob] the fountain of Israel.'
  '27':
  - type: text
    content: ' There is little Benjamin in the lead [in the procession], the princes of Judah and their company, the princes of Zebulun, and the princes of Naphtali.'
  '28':
  - type: text
    content: ' Your God has commanded your strength [your might in His service and impenetrable hardness to temptation]; O God, display Your might '
  - type: text
    content: and
  - type: text
    content: ' strengthen what You have wrought for us!'
  '29':
  - type: text
    content: ' [Out of respect] for Your temple at Jerusalem kings shall bring gifts to You.'
  '3':
  - type: text
    content: ' But let the [uncompromisingly] righteous be glad; let them be in high spirits '
  - type: text
    content: and
  - type: text
    content: ' glory before God, yes, let them [jubilantly] rejoice!'
  '30':
  - type: text
    content: ' Rebuke the wild beasts dwelling among the reeds [in Egypt], the herd of bulls (the leaders) with the calves of the peoples; trample underfoot those who lust for tribute money; scatter the peoples who delight in war.'
  '31':
  - type: text
    content: ' Princes shall come out of Egypt; Ethiopia shall hasten to stretch out her hands [with the offerings of submission] to God.'
  '32':
  - type: text
    content: ' Sing to God, O kingdoms of the earth, sing praises to the Lord! Selah [pause, and calmly think of that]!'
  '33':
  - type: text
    content: ' [Sing praises] to Him Who rides upon the heavens, the ancient heavens; behold, He sends forth His voice, His mighty voice.'
  '34':
  - type: text
    content: ' Ascribe power '
  - type: text
    content: and
  - type: text
    content: ' strength to God; His majesty is over Israel, and His strength '
  - type: text
    content: and
  - type: text
    content: ' might are in the skies.'
  '35':
  - type: text
    content: ' O God, awe-inspiring, profoundly impressive, '
  - type: text
    content: and
  - type: text
    content: ' terrible are You out of Your holy places; the God of Israel Himself gives strength and fullness of might to His people. Blessed be God!'
  '4':
  - type: text
    content: ' Sing to God, sing praises to His name, cast up a highway for Him Who rides through the deserts–His name is the Lord–be in high spirits '
  - type: text
    content: and
  - type: text
    content: ' glory before Him!'
  '5':
  - type: text
    content: ' A father of the fatherless and a judge '
  - type: text
    content: and
  - type: text
    content: ' protector of the widows '
  - type: text
    content: is
  - type: text
    content: ' God in His holy habitation.'
  '6':
  - type: text
    content: ' God places the solitary in families '
  - type: text
    content: and
  - type: text
    content: ' gives the desolate a home in which to dwell; He leads the prisoners out to prosperity; but the rebellious dwell in a parched land.'
  '7':
  - type: text
    content: ' O God, when You went forth before Your people, when You marched through the wilderness–Selah [pause, and calmly think of that]!–'
  '8':
  - type: text
    content: ' The earth trembled, the heavens also poured down [rain] at the presence of God; yonder Sinai quaked at the presence of God, the God of Israel.'
  '9':
  - type: text
    content: ' You, O God, did send a plentiful rain; You did restore '
  - type: text
    content: and
  - type: text
    content: ' confirm Your heritage when it languished '
  - type: text
    content: and
  - type: text
    content: ' was weary.'
