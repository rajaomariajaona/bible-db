verses:
  '1':
  - type: text
    content: ' JUDE, A servant of Jesus Christ (the Messiah), and brother of James, [writes this letter] to those who are called (chosen), dearly loved by God the Father '
  - type: text
    content: and separated (set apart)
  - type: text
    content: ' and kept for Jesus Christ:'
  '10':
  - type: text
    content: ' But these men revile (scoff and sneer at) anything they do not happen to be acquainted with '
  - type: text
    content: and
  - type: text
    content: ' do not understand; and whatever they do understand physically [that which they know by mere instinct], like irrational beasts–by these they corrupt themselves '
  - type: text
    content: and
  - type: text
    content: ' are destroyed (perish).'
  '11':
  - type: text
    content: ' Woe to them! For they have run riotously in the way of Cain, and have abandoned themselves for the sake of gain [it offers them, following] the error of Balaam, and have perished in rebellion [like that] of Korah! [Gen. 4:3-8; Num. 16; 22-24.]'
  '12':
  - type: text
    content: ' These are hidden reefs (elements of danger) in your love feasts, where they boldly feast sumptuously [carousing together in your midst], without scruples providing for themselves [alone]. They are clouds without water, swept along by the winds; trees, without fruit at the late autumn gathering time–twice (doubly) dead, [lifeless and] plucked up by the roots;'
  '13':
  - type: text
    content: ' Wild waves of the sea, flinging up the foam of their own shame '
  - type: text
    content: and
  - type: text
    content: ' disgrace; wandering stars, for whom the gloom of eternal darkness has been reserved forever.'
  '14':
  - type: text
    content: ' It was of these people, moreover, that Enoch in the seventh [generation] from Adam prophesied when he said, Behold, the Lord comes with His myriads of holy ones (ten thousands of His saints)'
  '15':
  - type: text
    content: ' To execute judgment upon all and to convict all the impious (unholy ones) of all their ungodly deeds which they have committed [in such an] ungodly [way], and of all the severe (abusive, jarring) things which ungodly sinners have spoken against Him.'
  '16':
  - type: text
    content: ' These are inveterate murmurers (grumblers) who complain [of their lot in life], going after their own desires [controlled by their passions]; their talk is boastful '
  - type: text
    content: and
  - type: text
    content: ' arrogant, [and they claim to] admire men''s persons '
  - type: text
    content: and
  - type: text
    content: ' pay people flattering compliments to gain advantage.'
  '17':
  - type: text
    content: ' But you must remember, beloved, the predictions which were made by the apostles (the special messengers) of our Lord Jesus Christ (the Messiah, the Anointed One).'
  '18':
  - type: text
    content: ' They told you beforehand, In the last days (in the end time) there will be scoffers [who seek to gratify their own unholy desires], following after their own ungodly passions.'
  '19':
  - type: text
    content: ' It is these who are [agitators] setting up distinctions '
  - type: text
    content: and
  - type: text
    content: ' causing divisions–merely sensual [creatures, carnal, worldly-minded people], devoid of the [Holy] Spirit '
  - type: text
    content: and
  - type: text
    content: ' destitute of any higher spiritual life.'
  '2':
  - type: text
    content: ' May mercy, [soul] peace, and love be multiplied to you.'
  '20':
  - type: text
    content: ' But you, beloved, build yourselves up [founded] on your most holy faith [make progress, rise like an edifice higher and higher], praying in the Holy Spirit;'
  '21':
  - type: text
    content: ' Guard '
  - type: text
    content: and
  - type: text
    content: ' keep yourselves in the love of God; expect '
  - type: text
    content: and
  - type: text
    content: ' patiently wait for the mercy of our Lord Jesus Christ (the Messiah)–[which will bring you] unto life eternal.'
  '22':
  - type: text
    content: ' And '
  - type: text
    content: refute [so as to] convict some who dispute with you, and
  - type: text
    content: ' on some have mercy who waver '
  - type: text
    content: and
  - type: text
    content: ' doubt.'
  '23':
  - type: text
    content: ' [Strive to] save others, snatching [them] out of [the] fire; on others take pity [but] with fear, loathing even the garment spotted by the flesh '
  - type: text
    content: and
  - type: text
    content: ' polluted by their sensuality. [Zech. 3:2-4.]'
  '24':
  - type: text
    content: ' Now to Him Who is able to keep you without stumbling '
  - type: text
    content: or
  - type: text
    content: ' slipping '
  - type: text
    content: or
  - type: text
    content: ' falling, and to present [you] unblemished (blameless and faultless) before the presence of His glory in triumphant joy '
  - type: text
    content: and
  - type: text
    content: ' exultation [with unspeakable, ecstatic delight]–'
  '25':
  - type: text
    content: ' To the one only God, our Savior through Jesus Christ our Lord, be glory (splendor), majesty, might '
  - type: text
    content: and
  - type: text
    content: ' dominion, and power '
  - type: text
    content: and
  - type: text
    content: ' authority, before all time and now and forever (unto all the ages of eternity). Amen (so be it).'
  '3':
  - type: text
    content: ' Beloved, my whole concern was to write to you in regard to our common salvation. [But] I found it necessary '
  - type: text
    content: and
  - type: text
    content: ' was impelled to write you and urgently appeal to '
  - type: text
    content: and
  - type: text
    content: ' exhort [you] to contend for the faith which was once for all handed down to the saints [the faith which is that sum of Christian belief which was delivered verbally to the holy people of God].'
  '4':
  - type: text
    content: ' For certain men have crept in stealthily [gaining entrance secretly by a side door]. Their doom was predicted long ago, ungodly (impious, profane) persons who pervert the grace (the spiritual blessing and favor) of our God into lawlessness '
  - type: text
    content: and
  - type: text
    content: ' wantonness '
  - type: text
    content: and
  - type: text
    content: ' immorality, and disown '
  - type: text
    content: and
  - type: text
    content: ' deny our sole Master and Lord, Jesus Christ (the Messiah, the Anointed One).'
  '5':
  - type: text
    content: ' Now I want to remind you, though you were fully informed once for all, that though the Lord [at one time] delivered a people out of the land of Egypt, He subsequently destroyed those [of them] who did not believe [who refused to adhere to, trust in, and rely upon Him].'
  '6':
  - type: text
    content: ' And angels who did not keep (care for, guard, and hold to) their own first place of power but abandoned their proper dwelling place–these He has reserved in custody in eternal chains (bonds) under the thick gloom of utter darkness until the judgment '
  - type: text
    content: and
  - type: text
    content: ' doom of the great day.'
  '7':
  - type: text
    content: ' [The wicked are sentenced to suffer] just as Sodom and Gomorrah and the adjacent towns–which likewise gave themselves over to impurity and indulged in unnatural vice '
  - type: text
    content: and
  - type: text
    content: ' sensual perversity–are laid out [in plain sight] as an exhibit of perpetual punishment [to warn] of everlasting fire. [Gen. 19.]'
  '8':
  - type: text
    content: ' Nevertheless in like manner, these dreamers also corrupt the body, scorn '
  - type: text
    content: and
  - type: text
    content: ' reject authority '
  - type: text
    content: and
  - type: text
    content: ' government, and revile '
  - type: text
    content: and
  - type: text
    content: ' libel '
  - type: text
    content: and
  - type: text
    content: ' scoff at [heavenly] glories (the glorious ones).'
  '9':
  - type: text
    content: ' But when [even] the archangel Michael, contending with the devil, judicially argued (disputed) about the body of Moses, he dared not [presume to] bring an abusive condemnation against him, but [simply] said, The Lord rebuke you! [Zech. 3:2.]'
