document_id: JUD.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JUDE, A servant of Jesus Christ (the Messiah), and brother of James, [writes this letter] to those who are called (chosen), dearly loved by God the Father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and separated (set apart)
  - type: text
    text: ' and kept for Jesus Christ:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' May mercy, [soul] peace, and love be multiplied to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Beloved, my whole concern was to write to you in regard to our common salvation. [But] I found it necessary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was impelled to write you and urgently appeal to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exhort [you] to contend for the faith which was once for all handed down to the saints [the faith which is that sum of Christian belief which was delivered verbally to the holy people of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For certain men have crept in stealthily [gaining entrance secretly by a side door]. Their doom was predicted long ago, ungodly (impious, profane) persons who pervert the grace (the spiritual blessing and favor) of our God into lawlessness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wantonness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' immorality, and disown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deny our sole Master and Lord, Jesus Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now I want to remind you, though you were fully informed once for all, that though the Lord [at one time] delivered a people out of the land of Egypt, He subsequently destroyed those [of them] who did not believe [who refused to adhere to, trust in, and rely upon Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And angels who did not keep (care for, guard, and hold to) their own first place of power but abandoned their proper dwelling place–these He has reserved in custody in eternal chains (bonds) under the thick gloom of utter darkness until the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doom of the great day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [The wicked are sentenced to suffer] just as Sodom and Gomorrah and the adjacent towns–which likewise gave themselves over to impurity and indulged in unnatural vice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sensual perversity–are laid out [in plain sight] as an exhibit of perpetual punishment [to warn] of everlasting fire. [Gen. 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Nevertheless in like manner, these dreamers also corrupt the body, scorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' government, and revile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' libel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scoff at [heavenly] glories (the glorious ones).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But when [even] the archangel Michael, contending with the devil, judicially argued (disputed) about the body of Moses, he dared not [presume to] bring an abusive condemnation against him, but [simply] said, The Lord rebuke you! [Zech. 3:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But these men revile (scoff and sneer at) anything they do not happen to be acquainted with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do not understand; and whatever they do understand physically [that which they know by mere instinct], like irrational beasts–by these they corrupt themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are destroyed (perish).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Woe to them! For they have run riotously in the way of Cain, and have abandoned themselves for the sake of gain [it offers them, following] the error of Balaam, and have perished in rebellion [like that] of Korah! [Gen. 4:3-8; Num. 16; 22-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' These are hidden reefs (elements of danger) in your love feasts, where they boldly feast sumptuously [carousing together in your midst], without scruples providing for themselves [alone]. They are clouds without water, swept along by the winds; trees, without fruit at the late autumn gathering time–twice (doubly) dead, [lifeless and] plucked up by the roots;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Wild waves of the sea, flinging up the foam of their own shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace; wandering stars, for whom the gloom of eternal darkness has been reserved forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' It was of these people, moreover, that Enoch in the seventh [generation] from Adam prophesied when he said, Behold, the Lord comes with His myriads of holy ones (ten thousands of His saints)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' To execute judgment upon all and to convict all the impious (unholy ones) of all their ungodly deeds which they have committed [in such an] ungodly [way], and of all the severe (abusive, jarring) things which ungodly sinners have spoken against Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are inveterate murmurers (grumblers) who complain [of their lot in life], going after their own desires [controlled by their passions]; their talk is boastful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant, [and they claim to] admire men''s persons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay people flattering compliments to gain advantage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But you must remember, beloved, the predictions which were made by the apostles (the special messengers) of our Lord Jesus Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They told you beforehand, In the last days (in the end time) there will be scoffers [who seek to gratify their own unholy desires], following after their own ungodly passions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' It is these who are [agitators] setting up distinctions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' causing divisions–merely sensual [creatures, carnal, worldly-minded people], devoid of the [Holy] Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destitute of any higher spiritual life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But you, beloved, build yourselves up [founded] on your most holy faith [make progress, rise like an edifice higher and higher], praying in the Holy Spirit;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep yourselves in the love of God; expect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patiently wait for the mercy of our Lord Jesus Christ (the Messiah)–[which will bring you] unto life eternal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: refute [so as to] convict some who dispute with you, and
  - type: text
    text: ' on some have mercy who waver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doubt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [Strive to] save others, snatching [them] out of [the] fire; on others take pity [but] with fear, loathing even the garment spotted by the flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' polluted by their sensuality. [Zech. 3:2-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Now to Him Who is able to keep you without stumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' slipping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' falling, and to present [you] unblemished (blameless and faultless) before the presence of His glory in triumphant joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exultation [with unspeakable, ecstatic delight]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' To the one only God, our Savior through Jesus Christ our Lord, be glory (splendor), majesty, might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dominion, and power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority, before all time and now and forever (unto all the ages of eternity). Amen (so be it).'
