document_id: EZK.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, set your face toward the mountains of Israel and prophesy against them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say, You mountains of Israel, hear the word of the Lord God! Thus says the Lord God to the mountains and the hills, to the river ravines and the valleys: Behold, I, even I, will bring a sword upon you, and I will destroy your high places [of idolatrous worship],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And your altars shall be made desolate and your sun-pillars shall be broken in pieces, and I will cast down your slain before your idols. [Lev. 26:30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I will lay the dead bodies of the children of Israel before their idols, and I will scatter your bones round about your altars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In all your dwelling places the cities shall be laid waste and the high places shall be made desolate, that your altars may bear their guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be laid waste and made desolate, your idols may be broken and destroyed, your sun-images may be hewn down, and your handiworks may be wiped away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blotted out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the slain shall fall in the midst of you, and you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Yet will I leave some of you alive. When you have some that shall escape the sword among the nations, when you shall be scattered through the countries,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then those of you who escape shall [earnestly] remember Me among the nations to which they shall be carried captive, how that I have been broken by their lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have Myself broken their wanton heart which has departed from Me and blinded their eyes which turn after their idols wantonly; and they shall be loathsome in their own sight for the evils which they have committed in all their abominations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord. I have not said in vain that I would bring this evil calamity [in punishment] upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus says the Lord God: Strike with your fist, stamp with your foot, and say, Alas! over all the vile abominations of the house of Israel for which [Israel] shall fall by sword, by famine, and by pestilence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He who is far off shall die of the pestilence, and he that is near shall fall by the sword, and he who remains and is preserved shall die by the famine. Thus will I accomplish My wrath upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then shall you know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord, when their slain shall lie among their idols round about their altars upon every high hill, on all the tops of the mountains, under every green tree, and under every thickly leafed oak, the places where they were accustomed to offer sweet incense to all their idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will stretch out My hand upon them and make the land desolate and waste, yes, more desolate than the wilderness toward Diblah [a Moabite city], throughout all their dwelling places; and they shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord.'
