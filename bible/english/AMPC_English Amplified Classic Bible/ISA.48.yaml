document_id: ISA.48
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR THIS, O house of Jacob, who are called by the name of Israel and who come forth from the seed of Judah, you who swear allegiance by the name of the Lord and make mention of the God of Israel–but not in truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sincerity, nor in righteousness (rightness and moral and spiritual rectitude in every area and relation)–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For they call themselves [citizens] of the holy city and depend on the God of Israel–the Lord of hosts is His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I have declared from the beginning the former things [which happened in times past to Israel]; they went forth from My mouth and I made them known; then suddenly I did them, and they came to pass [says the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Because I knew that you were obstinate, and your neck was an iron sinew and your brow was brass,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore I have declared things to come to you from of old; before they came to pass I announced them to you, so that you could not say, My idol has done them, and my graven image and my molten image have commanded them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You have heard [these things foretold], now you see this fulfillment. And will you not bear witness to it? I show you specified new things from this time forth, even hidden things [kept in reserve] which you have not known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They are created now [called into being by the prophetic word], and not long ago; and before today you have never heard of them, lest you should say, Behold, I knew them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Yes, you have never heard, yes, you have never known; yes, from of old your ear has not been opened. For I, the Lord, knew that you, O house of Israel, dealt very treacherously; you were called a transgressor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a rebel [in revolt] from your birth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For My name''s sake I defer My anger, and for the sake of My praise I restrain it for you, that I may not cut you off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Behold, I have refined you, but not as silver; I have tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chosen you in the furnace of affliction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For My own sake, for My own sake, I do it [I refrain and do not utterly destroy you]; for why should I permit My name to be polluted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profaned [which it would be if the Lord completely destroyed His chosen people]? And I will not give My glory to another [by permitting the worshipers of idols to triumph over you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Listen to Me, O Jacob, and Israel, My called [ones]: I am He; I am the First, I also am the Last. [Isa. 41:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yes, My hand has laid the foundation of the earth, and My right hand has spread out the heavens; when I call to them, they stand forth together [to execute My decrees].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Assemble yourselves, all of you, and hear! Who among them [the gods and Chaldean astrologers] has foretold these things? The Lord has loved him [Cyrus of Persia]; he will do His pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose on Babylon, and his arm will be against the Chaldeans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I, even I, have foretold it; yes, I have called him [Cyrus]; I have brought him, and [the Lord] shall make his way prosperous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Come near to me and listen to this: I have not spoken in secret from the beginning; from the time that it happened, I was there. And now the Lord God has sent His Spirit in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Thus says the Lord, your Redeemer, the Holy One of Israel: I am the Lord your God, Who teaches you to profit, Who leads you in the way that you should go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Oh, that you had hearkened to My commandments! Then your peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity would have been like a flowing river, and your righteousness [the holiness and purity of the nation] like the [abundant] waves of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Your offspring would have been like the sand, and your descendants like the offspring of the sea; their name would not be cut off or destroyed from before Me. [Gen. 13:16; Jer. 33:22; Luke 19:42.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Go forth out of Babylon, flee from the Chaldeans! With a voice of singing declare, tell this, cause it to go forth even to the end of the earth; say, The Lord has redeemed His servant Jacob!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they thirsted not when He led them through the deserts; He caused the waters to flow out of the rock for them; He split the rock also, and the waters gushed out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' There is no peace, says the Lord, for the wicked.'
