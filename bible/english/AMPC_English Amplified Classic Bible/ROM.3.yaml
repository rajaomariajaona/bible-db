document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN WHAT advantage remains to the Jew? [How is he favored?] Or what is the value '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' benefit of circumcision?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Much in every way. To begin with, to the Jews were entrusted the oracles (the brief communications, the intentions, the utterances) of God. [Ps. 147:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' What if some did not believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were without faith? Does their lack of faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their faithlessness nullify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make ineffective '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' void the faithfulness of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His fidelity [to His Word]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' By no means! Let God be found true though every human being is false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a liar, as it is written, That You may be justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shown to be upright in what You say, and prevail when You are judged [by sinful men]. [Ps. 51:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But if our unrighteousness thus establishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exhibits the righteousness of God, what shall we say? That God is unjust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrong to inflict His wrath upon us [Jews]? I speak in a [purely] human way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' By no means! Otherwise, how could God judge the world?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But [you say] if through my falsehood God''s integrity is magnified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advertised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abounds to His glory, why am I still being judged as a sinner?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And why should we not do evil that good may come?–as some slanderously charge us with teaching. Such [false teaching] is justly condemned by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Well then, are we [Jews] superior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' better off than they? No, not at all. We have already charged that all men, both Jews and Greeks (Gentiles), are under sin [held down by and subject to its power and control].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As it is written, None is righteous, just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truthful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conscientious, no, not one. [Ps. 14:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' No one understands [no one intelligently discerns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' comprehends]; no one seeks out God. [Ps. 14:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' All have turned aside; together they have gone wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have become unprofitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless; no one does right, not even one!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Their throat is a yawning grave; they use their tongues to deceive (to mislead and to deal treacherously). The venom of asps is beneath their lips. [Ps. 5:9; 140:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Their mouth is full of cursing and bitterness. [Ps. 10:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Their feet are swift to shed blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Destruction [as it dashes them to pieces] and misery mark their ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they have no experience of the way of peace [they know nothing about peace, for a peaceful way they do not even recognize]. [Isa. 59:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' There is no [reverential] fear of God before their eyes. [Ps. 36:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now we know that whatever the Law says, it speaks to those who are under the Law, so that [the murmurs and excuses of] every mouth may be hushed and all the world may be held accountable to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For no person will be justified (made righteous, acquitted, and judged acceptable) in His sight by observing the works prescribed by the Law. For [the real function of] the Law is to make men recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be conscious of sin [not mere perception, but an acquaintance with sin which works toward repentance, faith, and holy character].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But now the righteousness of God has been revealed independently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' altogether apart from the Law, although actually it is attested by the Law and the Prophets,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Namely, the righteousness of God which comes by believing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' personal trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident reliance on Jesus Christ (the Messiah). [And it is meant] for all who believe. For there is no distinction,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Since all have sinned and are falling short of the honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory which God bestows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' [All] are justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in right standing with God, freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gratuitously by His grace (His unmerited favor and mercy), through the redemption which is [provided] in Christ Jesus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Whom God put forward [before the eyes of all] as a mercy seat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' propitiation by His blood [the cleansing and life-giving sacrifice of atonement and reconciliation, to be received] through faith. This was to show God''s righteousness, because in His divine forbearance He had passed over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignored former sins without punishment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' It was to demonstrate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove at the present time (in the now season) that He Himself is righteous and that He justifies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts as righteous him who has [true] faith in Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then what becomes of [our] pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [our] boasting? It is excluded (banished, ruled out entirely). On what principle? [On the principle] of doing good deeds? No, but on the principle of faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For we hold that a man is justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made upright by faith independent of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distinctly apart from good deeds (works of the Law). [The observance of the Law has nothing to do with justification.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Or is God merely [the God] of Jews? Is He not the God of Gentiles also? Yes, of Gentiles also,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Since it is one and the same God Who will justify the circumcised by faith [which germinated from Abraham] and the uncircumcised through their [newly acquired] faith. [For it is the same trusting faith in both cases, a firmly relying faith in Jesus Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Do we then by [this] faith make the Law of no effect, overthrow it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make it a dead letter? Certainly not! On the contrary, we confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uphold the Law.'
