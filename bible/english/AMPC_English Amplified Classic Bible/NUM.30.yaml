document_id: NUM.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND MOSES said to the heads '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' leaders of the tribes of Israel, This is the thing which the Lord has commanded:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' If a man vows a vow to the Lord or swears an oath to bind himself by a pledge, he shall not break '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane his word; he shall do according to all that proceeds out of his mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Also when a woman vows a vow to the Lord and binds herself by a pledge, being in her father''s house in her youth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And her father hears her vow and her pledge with which she has bound herself and he offers no objection, then all her vows shall stand and every pledge with which she has bound herself shall stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But if her father refuses to allow her [to carry out her vow] on the day that he hears about it, not any of her vows or of her pledges with which she has bound herself shall stand. And the Lord will forgive her because her father refused to let her [carry out her purpose].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And if she is married to a husband while her vows are upon her or she has bound herself by a rash utterance'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And her husband hears of it and holds his peace concerning it on the day that he hears it, then her vows shall stand and her pledge with which she bound herself shall stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But if her husband refuses to allow her [to keep her vow or pledge] on the day that he hears of it, then he shall make void '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' annul her vow which is upon her and the rash utterance of her lips by which she bound herself, and the Lord will forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But the vow of a widow or of a divorced woman, with which she has bound herself, shall stand against her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And if she vowed in her husband''s house or bound herself by a pledge with an oath'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And her husband heard it and did not oppose or prohibit her, then all her vows and every pledge with which she bound herself shall stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But if her husband positively made them void on the day he heard them, then whatever proceeded out of her lips concerning her vows or concerning her pledge of herself shall not stand. Her husband has annulled them, and the Lord will forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Every vow and every binding oath to humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' afflict herself, her husband may establish it or her husband may annul it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But if her husband altogether holds his peace [concerning the matter] with her from day to day, then he establishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirms all her vows or all her pledges which are upon her. He establishes them because he said nothing to [restrain] her on the day he heard of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But if he shall nullify them after he hears of them, then he shall be responsible for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear her iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are the statutes which the Lord commanded Moses, between a man and his wife, and between a father and his daughter while in her youth in her father''s house.'
