document_id: NUM.30,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND MOSES said to the heads '
  - type: text
    content: or
  - type: text
    content: ' leaders of the tribes of Israel, This is the thing which the Lord has commanded:'
  '10':
  - type: text
    content: ' And if she vowed in her husband''s house or bound herself by a pledge with an oath'
  '11':
  - type: text
    content: ' And her husband heard it and did not oppose or prohibit her, then all her vows and every pledge with which she bound herself shall stand.'
  '12':
  - type: text
    content: ' But if her husband positively made them void on the day he heard them, then whatever proceeded out of her lips concerning her vows or concerning her pledge of herself shall not stand. Her husband has annulled them, and the Lord will forgive her.'
  '13':
  - type: text
    content: ' Every vow and every binding oath to humble '
  - type: text
    content: or
  - type: text
    content: ' afflict herself, her husband may establish it or her husband may annul it.'
  '14':
  - type: text
    content: ' But if her husband altogether holds his peace [concerning the matter] with her from day to day, then he establishes '
  - type: text
    content: and
  - type: text
    content: ' confirms all her vows or all her pledges which are upon her. He establishes them because he said nothing to [restrain] her on the day he heard of them.'
  '15':
  - type: text
    content: ' But if he shall nullify them after he hears of them, then he shall be responsible for '
  - type: text
    content: and
  - type: text
    content: ' bear her iniquity.'
  '16':
  - type: text
    content: ' These are the statutes which the Lord commanded Moses, between a man and his wife, and between a father and his daughter while in her youth in her father''s house.'
  '2':
  - type: text
    content: ' If a man vows a vow to the Lord or swears an oath to bind himself by a pledge, he shall not break '
  - type: text
    content: and
  - type: text
    content: ' profane his word; he shall do according to all that proceeds out of his mouth.'
  '3':
  - type: text
    content: ' Also when a woman vows a vow to the Lord and binds herself by a pledge, being in her father''s house in her youth,'
  '4':
  - type: text
    content: ' And her father hears her vow and her pledge with which she has bound herself and he offers no objection, then all her vows shall stand and every pledge with which she has bound herself shall stand.'
  '5':
  - type: text
    content: ' But if her father refuses to allow her [to carry out her vow] on the day that he hears about it, not any of her vows or of her pledges with which she has bound herself shall stand. And the Lord will forgive her because her father refused to let her [carry out her purpose].'
  '6':
  - type: text
    content: ' And if she is married to a husband while her vows are upon her or she has bound herself by a rash utterance'
  '7':
  - type: text
    content: ' And her husband hears of it and holds his peace concerning it on the day that he hears it, then her vows shall stand and her pledge with which she bound herself shall stand.'
  '8':
  - type: text
    content: ' But if her husband refuses to allow her [to keep her vow or pledge] on the day that he hears of it, then he shall make void '
  - type: text
    content: and
  - type: text
    content: ' annul her vow which is upon her and the rash utterance of her lips by which she bound herself, and the Lord will forgive her.'
  '9':
  - type: text
    content: ' But the vow of a widow or of a divorced woman, with which she has bound herself, shall stand against her.'
