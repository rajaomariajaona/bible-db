document_id: ISA.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD which Isaiah son of Amoz saw [revealed] concerning Judah and Jerusalem.'
  '10':
  - type: text
    content: ' Enter into the rock and hide yourself in the dust from before the terror of the Lord and from the glory of His majesty.'
  '11':
  - type: text
    content: ' The proud looks of man shall be brought low, and the haughtiness of men shall be humbled; and the Lord alone shall be exalted in that day.'
  '12':
  - type: text
    content: ' For there shall be a day of the Lord of hosts against all who are proud and haughty and against all who are lifted up–and they shall be brought low–[Zeph. 2:3; Mal. 4:1.]'
  '13':
  - type: text
    content: ' [The wrath of God will begin by coming down] against all the cedars of Lebanon [west of the Jordan] that are high and lifted up, and against all the oaks of Bashan [east of the Jordan],'
  '14':
  - type: text
    content: ' And [after that] against all the high mountains and all the hills that are lifted up,'
  '15':
  - type: text
    content: ' And against every high tower and every fenced wall,'
  '16':
  - type: text
    content: ' And against all the ships of Tarshish and all the picturesque '
  - type: text
    content: and
  - type: text
    content: ' desirable imagery [designed for mere ornament and luxury].'
  '17':
  - type: text
    content: ' Then the loftiness of man shall be bowed down, and the haughtiness of men shall be brought low; and the Lord alone shall be exalted in that day.'
  '18':
  - type: text
    content: ' And the idols shall utterly pass away (be abolished).'
  '19':
  - type: text
    content: ' Then shall [the stricken, deprived of all in which they had trusted] go into the caves of the rocks and into the holes of the earth from before the terror '
  - type: text
    content: and
  - type: text
    content: ' dread of the Lord and from before the glory of His majesty, when He arises to shake mightily '
  - type: text
    content: and
  - type: text
    content: ' terribly the earth. [Luke 23:30.]'
  '2':
  - type: text
    content: ' It shall come to pass in the latter days that the mountain of the Lord''s house shall be [firmly] established as the highest of the mountains and shall be exalted above the hills, and all nations shall flow to it.'
  '20':
  - type: text
    content: ' In that day men shall cast away to the moles and to the bats their idols of silver and their idols of gold, which they made for themselves to worship,'
  '21':
  - type: text
    content: ' To go into the caverns of the rocks and into the clefts of the ragged rocks from before the terror '
  - type: text
    content: and
  - type: text
    content: ' dread of the Lord and from before the glory of His majesty, when He rises to shake mightily '
  - type: text
    content: and
  - type: text
    content: ' terribly the earth.'
  '22':
  - type: text
    content: ' Cease to trust in [weak, frail, and dying] man, whose breath is in his nostrils [for so short a time]; in what sense can he be counted as having intrinsic worth?'
  '3':
  - type: text
    content: ' And many people shall come and say, Come, let us go up to the mountain of the Lord, to the house of the God of Jacob, that He may teach us His ways and that we may walk in His paths. For out of Zion shall go forth the law '
  - type: text
    content: and
  - type: text
    content: ' instruction, and the word of the Lord from Jerusalem.'
  '4':
  - type: text
    content: ' And He shall judge between the nations and shall decide [disputes] for many peoples; and they shall beat their swords into plowshares and their spears into pruning hooks. Nation shall not lift up sword against nation, neither shall they learn war any more. [Mic. 4:1-3.]'
  '5':
  - type: text
    content: ' O house of Jacob, come, let us walk in the light of the Lord.'
  '6':
  - type: text
    content: ' Surely [Lord] You have rejected '
  - type: text
    content: and
  - type: text
    content: ' forsaken your people, the house of Jacob, because they are filled [with customs] from the east and with soothsayers [who foretell] like the Philistines; also they strike hands '
  - type: text
    content: and
  - type: text
    content: ' make pledges '
  - type: text
    content: and
  - type: text
    content: ' agreements with the children of aliens. [Deut. 18:9-12.]'
  '7':
  - type: text
    content: ' Their land also is full of silver and gold; neither is there any end to their treasures. Their land is also full of horses; neither is there any end to their chariots. [Deut. 17:14-17.]'
  '8':
  - type: text
    content: ' Their land also is full of idols; they worship the work of their own hands, what their own fingers have made.'
  '9':
  - type: text
    content: ' And the common man is bowed down [before idols], also the great man is brought low '
  - type: text
    content: and
  - type: text
    content: ' humbles himself–therefore forgive them not [O Lord].'
