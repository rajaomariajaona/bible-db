document_id: ISA.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD which Isaiah son of Amoz saw [revealed] concerning Judah and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It shall come to pass in the latter days that the mountain of the Lord''s house shall be [firmly] established as the highest of the mountains and shall be exalted above the hills, and all nations shall flow to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And many people shall come and say, Come, let us go up to the mountain of the Lord, to the house of the God of Jacob, that He may teach us His ways and that we may walk in His paths. For out of Zion shall go forth the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction, and the word of the Lord from Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And He shall judge between the nations and shall decide [disputes] for many peoples; and they shall beat their swords into plowshares and their spears into pruning hooks. Nation shall not lift up sword against nation, neither shall they learn war any more. [Mic. 4:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' O house of Jacob, come, let us walk in the light of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Surely [Lord] You have rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forsaken your people, the house of Jacob, because they are filled [with customs] from the east and with soothsayers [who foretell] like the Philistines; also they strike hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make pledges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agreements with the children of aliens. [Deut. 18:9-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Their land also is full of silver and gold; neither is there any end to their treasures. Their land is also full of horses; neither is there any end to their chariots. [Deut. 17:14-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Their land also is full of idols; they worship the work of their own hands, what their own fingers have made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the common man is bowed down [before idols], also the great man is brought low '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humbles himself–therefore forgive them not [O Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Enter into the rock and hide yourself in the dust from before the terror of the Lord and from the glory of His majesty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The proud looks of man shall be brought low, and the haughtiness of men shall be humbled; and the Lord alone shall be exalted in that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For there shall be a day of the Lord of hosts against all who are proud and haughty and against all who are lifted up–and they shall be brought low–[Zeph. 2:3; Mal. 4:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [The wrath of God will begin by coming down] against all the cedars of Lebanon [west of the Jordan] that are high and lifted up, and against all the oaks of Bashan [east of the Jordan],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And [after that] against all the high mountains and all the hills that are lifted up,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And against every high tower and every fenced wall,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And against all the ships of Tarshish and all the picturesque '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desirable imagery [designed for mere ornament and luxury].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then the loftiness of man shall be bowed down, and the haughtiness of men shall be brought low; and the Lord alone shall be exalted in that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the idols shall utterly pass away (be abolished).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then shall [the stricken, deprived of all in which they had trusted] go into the caves of the rocks and into the holes of the earth from before the terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread of the Lord and from before the glory of His majesty, when He arises to shake mightily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terribly the earth. [Luke 23:30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' In that day men shall cast away to the moles and to the bats their idols of silver and their idols of gold, which they made for themselves to worship,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' To go into the caverns of the rocks and into the clefts of the ragged rocks from before the terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread of the Lord and from before the glory of His majesty, when He rises to shake mightily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terribly the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Cease to trust in [weak, frail, and dying] man, whose breath is in his nostrils [for so short a time]; in what sense can he be counted as having intrinsic worth?'
