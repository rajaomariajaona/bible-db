document_id: PSA.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN YOU, O Lord, do I put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek refuge; let me never be put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' [have my hope in You] disappointed; deliver me in Your righteousness!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Bow down Your ear to me, deliver me speedily! Be my Rock of refuge, a strong Fortress to save me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yes, You are my Rock and my Fortress; therefore for Your name''s sake lead me and guide me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Draw me out of the net that they have laid secretly for me, for You are my Strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my Stronghold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Into Your hands I commit my spirit; You have redeemed me, O Lord, the God of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness. [Luke 23:46; Acts 7:59.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [You and] I abhor those who pay regard to vain idols; but I trust in, rely on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently lean on the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I will be glad and rejoice in Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love, because You have seen my affliction, You have taken note of my life''s distresses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And You have not given me into the hand of the enemy; You have set my feet in a broad place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Have mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be gracious unto me, O Lord, for I am in trouble; with grief my eye is weakened, also my inner self and my body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For my life is spent with sorrow and my years with sighing; my strength has failed because of my iniquity, and even my bones have wasted away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' To all my enemies I have become a reproach, but especially to my neighbors, and a dread to my acquaintances, who flee from me on the street.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I am forgotten like a dead man, and out of mind; like a broken vessel am I.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For I have heard the slander of many; terror is on every side! While they schemed together against me, they plotted to take my life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But I trusted in, relied on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was confident in You, O Lord; I said, You are my God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My times are in Your hands; deliver me from the hands of my foes and those who pursue me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let Your face shine on Your servant; save me for Your mercy''s sake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in Your loving-kindness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let me not be put to shame, O Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disappointed, for I am calling upon You; let the wicked be put to shame, let them be silent in Sheol (the place of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Let the lying lips be silenced, which speak insolently against the [consistently] righteous with pride and contempt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Oh, how great is Your goodness, which You have laid up for those who fear, revere, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship You, goodness which You have wrought for those who trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge in You before the sons of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' In the secret place of Your presence You hide them from the plots of men; You keep them secretly in Your pavilion from the strife of tongues.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Blessed be the Lord! For He has shown me His marvelous loving favor when I was beset as in a besieged city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' As for me, I said in my haste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alarm, I am cut off from before Your eyes. But You heard the voice of my supplications when I cried to You for aid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' O love the Lord, all you His saints! The Lord preserves the faithful, and plentifully pays back him who deals haughtily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Be strong and let your heart take courage, all you who wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect the Lord!'
