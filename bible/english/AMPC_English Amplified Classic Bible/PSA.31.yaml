document_id: PSA.31,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' IN YOU, O Lord, do I put my trust '
  - type: text
    content: and
  - type: text
    content: ' seek refuge; let me never be put to shame '
  - type: text
    content: or
  - type: text
    content: ' [have my hope in You] disappointed; deliver me in Your righteousness!'
  '10':
  - type: text
    content: ' For my life is spent with sorrow and my years with sighing; my strength has failed because of my iniquity, and even my bones have wasted away.'
  '11':
  - type: text
    content: ' To all my enemies I have become a reproach, but especially to my neighbors, and a dread to my acquaintances, who flee from me on the street.'
  '12':
  - type: text
    content: ' I am forgotten like a dead man, and out of mind; like a broken vessel am I.'
  '13':
  - type: text
    content: ' For I have heard the slander of many; terror is on every side! While they schemed together against me, they plotted to take my life.'
  '14':
  - type: text
    content: ' But I trusted in, relied on, '
  - type: text
    content: and
  - type: text
    content: ' was confident in You, O Lord; I said, You are my God.'
  '15':
  - type: text
    content: ' My times are in Your hands; deliver me from the hands of my foes and those who pursue me '
  - type: text
    content: and
  - type: text
    content: ' persecute me.'
  '16':
  - type: text
    content: ' Let Your face shine on Your servant; save me for Your mercy''s sake '
  - type: text
    content: and
  - type: text
    content: ' in Your loving-kindness.'
  '17':
  - type: text
    content: ' Let me not be put to shame, O Lord, '
  - type: text
    content: or
  - type: text
    content: ' disappointed, for I am calling upon You; let the wicked be put to shame, let them be silent in Sheol (the place of the dead).'
  '18':
  - type: text
    content: ' Let the lying lips be silenced, which speak insolently against the [consistently] righteous with pride and contempt.'
  '19':
  - type: text
    content: ' Oh, how great is Your goodness, which You have laid up for those who fear, revere, '
  - type: text
    content: and
  - type: text
    content: ' worship You, goodness which You have wrought for those who trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in You before the sons of men!'
  '2':
  - type: text
    content: ' Bow down Your ear to me, deliver me speedily! Be my Rock of refuge, a strong Fortress to save me!'
  '20':
  - type: text
    content: ' In the secret place of Your presence You hide them from the plots of men; You keep them secretly in Your pavilion from the strife of tongues.'
  '21':
  - type: text
    content: ' Blessed be the Lord! For He has shown me His marvelous loving favor when I was beset as in a besieged city.'
  '22':
  - type: text
    content: ' As for me, I said in my haste '
  - type: text
    content: and
  - type: text
    content: ' alarm, I am cut off from before Your eyes. But You heard the voice of my supplications when I cried to You for aid.'
  '23':
  - type: text
    content: ' O love the Lord, all you His saints! The Lord preserves the faithful, and plentifully pays back him who deals haughtily.'
  '24':
  - type: text
    content: ' Be strong and let your heart take courage, all you who wait for '
  - type: text
    content: and
  - type: text
    content: ' hope for '
  - type: text
    content: and
  - type: text
    content: ' expect the Lord!'
  '3':
  - type: text
    content: ' Yes, You are my Rock and my Fortress; therefore for Your name''s sake lead me and guide me.'
  '4':
  - type: text
    content: ' Draw me out of the net that they have laid secretly for me, for You are my Strength '
  - type: text
    content: and
  - type: text
    content: ' my Stronghold.'
  '5':
  - type: text
    content: ' Into Your hands I commit my spirit; You have redeemed me, O Lord, the God of truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness. [Luke 23:46; Acts 7:59.]'
  '6':
  - type: text
    content: ' [You and] I abhor those who pay regard to vain idols; but I trust in, rely on, '
  - type: text
    content: and
  - type: text
    content: ' confidently lean on the Lord.'
  '7':
  - type: text
    content: ' I will be glad and rejoice in Your mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love, because You have seen my affliction, You have taken note of my life''s distresses,'
  '8':
  - type: text
    content: ' And You have not given me into the hand of the enemy; You have set my feet in a broad place.'
  '9':
  - type: text
    content: ' Have mercy '
  - type: text
    content: and
  - type: text
    content: ' be gracious unto me, O Lord, for I am in trouble; with grief my eye is weakened, also my inner self and my body.'
