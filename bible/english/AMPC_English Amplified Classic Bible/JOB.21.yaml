document_id: JOB.21,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JOB answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Their bull breeds and fails not; their cows calve and do not miscarry.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' They send forth their little ones like a flock, and their children skip about.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They themselves lift up their voices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sing to the tambourine and the lyre and rejoice to the sound of the pipe.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' They spend their days in prosperity and go down to Sheol (the unseen state) in a moment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peacefully.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yet they say to God, Depart from us, for we do not desire the knowledge of Your ways.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Who is the Almighty, that we should serve Him? And what profit do we have if we pray to Him? [Exod. 5:2.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But notice, [you say] the prosperity of the wicked is not in their power; the mystery [of God''s dealings] with the ungodly is far from my comprehension.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' How often [then] is it that the lamp of the wicked is put out? That their calamity comes upon them? That God distributes pains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrows to them in His anger? [Luke 12:46.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' That they are like stubble before the wind and like chaff that the storm steals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carries away?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' You say, God lays up [the punishment of the wicked man''s] iniquity for his children. Let Him recompense it to the man himself, that he may know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feel it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Hear diligently my speech, and let this [your attention] be your consolation [given me].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Let his own eyes see his destruction, and let him drink of the wrath of the Almighty.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For what pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' interest has a man in his house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' family after he is dead, when the number of his months is cut off?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Shall any teach God knowledge, seeing that He judges those who are on high? [Rom. 11:34; I Cor. 2:16.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' One dies in his full strength, being wholly at ease and quiet;'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' His pails are full of milk [his veins are filled with nourishment], and the marrow of his bones is fresh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moist,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Whereas another man dies in bitterness of soul and never tastes of pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' good fortune.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' They lie down alike in the dust, and the worm spreads a covering over them.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Behold, I know your thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans and the devices with which you would wrong me.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For you say, Where is the house of the rich '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' liberal prince [meaning me]? And where is the tent in which the wicked [Job] dwelt?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Have you not asked those who travel this way, and do you not accept their testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evidences–'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Allow me, and I also will speak; and after I have spoken, mock on.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' That the evil man is [now] spared in the day of calamity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction, and they are led forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' away on the day of [God''s] wrath?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' But who declares [a man''s] way [and rebukes] him to his face? And who pays him back for what he has done?'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' When he is borne to the grave, watch is kept over his tomb.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' The clods of the valley are sweet to him, and every man shall follow him to a grave, as innumerable people [have gone] before him.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' How then can you comfort me with empty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' futile words, since in your replies there lurks falsehood?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' As for me, is my complaint to man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of him? And why should I not be impatient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my spirit be troubled?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Look at me and be astonished (appalled); and lay your hand upon your mouth.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Even when I remember, I am troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afraid; horror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling take hold of my flesh.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Why do the wicked live, become old, and become mighty in power?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Their children are established with them in their sight, and their offspring before their eyes.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Their houses are safe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in peace, without fear; neither is the rod of God upon them.'
