document_id: JOB.21,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JOB answered,'
  '10':
  - type: text
    content: ' Their bull breeds and fails not; their cows calve and do not miscarry.'
  '11':
  - type: text
    content: ' They send forth their little ones like a flock, and their children skip about.'
  '12':
  - type: text
    content: ' They themselves lift up their voices '
  - type: text
    content: and
  - type: text
    content: ' sing to the tambourine and the lyre and rejoice to the sound of the pipe.'
  '13':
  - type: text
    content: ' They spend their days in prosperity and go down to Sheol (the unseen state) in a moment '
  - type: text
    content: and
  - type: text
    content: ' peacefully.'
  '14':
  - type: text
    content: ' Yet they say to God, Depart from us, for we do not desire the knowledge of Your ways.'
  '15':
  - type: text
    content: ' Who is the Almighty, that we should serve Him? And what profit do we have if we pray to Him? [Exod. 5:2.]'
  '16':
  - type: text
    content: ' But notice, [you say] the prosperity of the wicked is not in their power; the mystery [of God''s dealings] with the ungodly is far from my comprehension.'
  '17':
  - type: text
    content: ' How often [then] is it that the lamp of the wicked is put out? That their calamity comes upon them? That God distributes pains '
  - type: text
    content: and
  - type: text
    content: ' sorrows to them in His anger? [Luke 12:46.]'
  '18':
  - type: text
    content: ' That they are like stubble before the wind and like chaff that the storm steals '
  - type: text
    content: and
  - type: text
    content: ' carries away?'
  '19':
  - type: text
    content: ' You say, God lays up [the punishment of the wicked man''s] iniquity for his children. Let Him recompense it to the man himself, that he may know '
  - type: text
    content: and
  - type: text
    content: ' feel it.'
  '2':
  - type: text
    content: ' Hear diligently my speech, and let this [your attention] be your consolation [given me].'
  '20':
  - type: text
    content: ' Let his own eyes see his destruction, and let him drink of the wrath of the Almighty.'
  '21':
  - type: text
    content: ' For what pleasure '
  - type: text
    content: or
  - type: text
    content: ' interest has a man in his house '
  - type: text
    content: and
  - type: text
    content: ' family after he is dead, when the number of his months is cut off?'
  '22':
  - type: text
    content: ' Shall any teach God knowledge, seeing that He judges those who are on high? [Rom. 11:34; I Cor. 2:16.]'
  '23':
  - type: text
    content: ' One dies in his full strength, being wholly at ease and quiet;'
  '24':
  - type: text
    content: ' His pails are full of milk [his veins are filled with nourishment], and the marrow of his bones is fresh '
  - type: text
    content: and
  - type: text
    content: ' moist,'
  '25':
  - type: text
    content: ' Whereas another man dies in bitterness of soul and never tastes of pleasure '
  - type: text
    content: or
  - type: text
    content: ' good fortune.'
  '26':
  - type: text
    content: ' They lie down alike in the dust, and the worm spreads a covering over them.'
  '27':
  - type: text
    content: ' Behold, I know your thoughts '
  - type: text
    content: and
  - type: text
    content: ' plans and the devices with which you would wrong me.'
  '28':
  - type: text
    content: ' For you say, Where is the house of the rich '
  - type: text
    content: and
  - type: text
    content: ' liberal prince [meaning me]? And where is the tent in which the wicked [Job] dwelt?'
  '29':
  - type: text
    content: ' Have you not asked those who travel this way, and do you not accept their testimony '
  - type: text
    content: and
  - type: text
    content: ' evidences–'
  '3':
  - type: text
    content: ' Allow me, and I also will speak; and after I have spoken, mock on.'
  '30':
  - type: text
    content: ' That the evil man is [now] spared in the day of calamity '
  - type: text
    content: and
  - type: text
    content: ' destruction, and they are led forth '
  - type: text
    content: and
  - type: text
    content: ' away on the day of [God''s] wrath?'
  '31':
  - type: text
    content: ' But who declares [a man''s] way [and rebukes] him to his face? And who pays him back for what he has done?'
  '32':
  - type: text
    content: ' When he is borne to the grave, watch is kept over his tomb.'
  '33':
  - type: text
    content: ' The clods of the valley are sweet to him, and every man shall follow him to a grave, as innumerable people [have gone] before him.'
  '34':
  - type: text
    content: ' How then can you comfort me with empty '
  - type: text
    content: and
  - type: text
    content: ' futile words, since in your replies there lurks falsehood?'
  '4':
  - type: text
    content: ' As for me, is my complaint to man '
  - type: text
    content: or
  - type: text
    content: ' of him? And why should I not be impatient '
  - type: text
    content: and
  - type: text
    content: ' my spirit be troubled?'
  '5':
  - type: text
    content: ' Look at me and be astonished (appalled); and lay your hand upon your mouth.'
  '6':
  - type: text
    content: ' Even when I remember, I am troubled '
  - type: text
    content: and
  - type: text
    content: ' afraid; horror '
  - type: text
    content: and
  - type: text
    content: ' trembling take hold of my flesh.'
  '7':
  - type: text
    content: ' Why do the wicked live, become old, and become mighty in power?'
  '8':
  - type: text
    content: ' Their children are established with them in their sight, and their offspring before their eyes.'
  '9':
  - type: text
    content: ' Their houses are safe '
  - type: text
    content: and
  - type: text
    content: ' in peace, without fear; neither is the rod of God upon them.'
