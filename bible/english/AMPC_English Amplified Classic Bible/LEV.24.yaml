document_id: LEV.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Command the Israelites that they bring to you pure oil from beaten olives for the light [of the golden lampstand] to cause a lamp to burn continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Outside the veil of the Testimony [between the Holy and the Most Holy Places] in the Tent of Meeting, Aaron shall keep it in order from evening to morning before the Lord continually; it shall be a statute forever throughout your generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He shall keep the lamps in order upon the lampstand of pure gold before the Lord continually. [Rev. 1:12-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall take fine flour and bake twelve cakes with it; two-tenths of an ephah shall be in each cake [of the showbread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bread of the Presence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you shall set them in two rows, six in a row, upon the table of pure gold before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You shall put pure frankincense [in a bowl or spoon] beside each row, that it may be with the bread as a memorial portion, an offering to be made by fire to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Every Sabbath day Aaron shall set the showbread in order before the Lord continually; it is on behalf of the Israelites, an everlasting covenant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the bread shall be for Aaron and his sons, and they shall eat it in a sacred place, for it is for [Aaron] a most holy portion of the offerings to the Lord made by fire, a perpetual due [to the high priest].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now the son of an Israelite woman, whose father was an Egyptian, went out among the Israelites, and he and a man of Israel quarreled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strove together in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Israelite woman''s son blasphemed the Name [of the Lord] and cursed. They brought him to Moses–his mother was Shelomith, the daughter of Dibri, of the tribe of Dan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they put him in custody until the will of the Lord might be declared to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Bring him who has cursed out of the camp, and let all who heard him lay their hands upon his head; then let all the congregation stone him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you shall say to the Israelites, Whoever curses his God shall bear his sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he who blasphemes the Name of the Lord, he shall surely be put to death, and all the congregation shall certainly stone him; the stranger as well as he who was born in the land shall be put to death when he blasphemes the Name [of the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he who kills any man shall surely be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he who kills a beast shall make it good, beast for beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And if a man causes a blemish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disfigurement on his neighbor, it shall be done to him as he has done:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Fracture for fracture, eye for eye, tooth for tooth; as he has caused a blemish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disfigurement on a man, so shall it be done to him. [Matt. 5:38-42; 7:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He who kills a beast shall replace it; he who kills a man shall be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You shall have the same law for the sojourner among you as for one of your own nationality, for I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Moses spoke to the Israelites, and they brought him who had cursed out of the camp and stoned him with stones. Thus the Israelites did as the Lord commanded Moses.'
