document_id: PRO.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY SON, if you will receive my words and treasure up my commandments within you,'
  '10':
  - type: text
    content: ' For skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom shall enter into your heart, and knowledge shall be pleasant to you.'
  '11':
  - type: text
    content: ' Discretion shall watch over you, understanding shall keep you,'
  '12':
  - type: text
    content: ' To deliver you from the way of evil '
  - type: text
    content: and
  - type: text
    content: ' the evil men, from men who speak perverse things '
  - type: text
    content: and
  - type: text
    content: ' are liars,'
  '13':
  - type: text
    content: ' Men who forsake the paths of uprightness to walk in the ways of darkness,'
  '14':
  - type: text
    content: ' Who rejoice to do evil and delight in the perverseness of evil,'
  '15':
  - type: text
    content: ' Who are crooked in their ways, wayward '
  - type: text
    content: and
  - type: text
    content: ' devious in their paths.'
  '16':
  - type: text
    content: ' [Discretion shall watch over you, understanding shall keep you] to deliver you from the alien woman, from the outsider with her flattering words, [Prov. 2:11.]'
  '17':
  - type: text
    content: ' Who forsakes the husband '
  - type: text
    content: and
  - type: text
    content: ' guide of her youth and forgets the covenant of her God.'
  '18':
  - type: text
    content: ' For her house sinks down to death and her paths to the spirits [of the dead].'
  '19':
  - type: text
    content: ' None who go to her return again, neither do they attain '
  - type: text
    content: or
  - type: text
    content: ' regain the paths of life.'
  '2':
  - type: text
    content: ' Making your ear attentive to skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom '
  - type: text
    content: and
  - type: text
    content: ' inclining and directing your heart '
  - type: text
    content: and
  - type: text
    content: ' mind to understanding [applying all your powers to the quest for it];'
  '20':
  - type: text
    content: ' So may you walk in the way of good men, and keep to the paths of the [consistently] righteous (the upright, in right standing with God).'
  '21':
  - type: text
    content: ' For the upright shall dwell in the land, and the men of integrity, blameless '
  - type: text
    content: and
  - type: text
    content: ' complete [in God''s sight], shall remain in it;'
  '22':
  - type: text
    content: ' But the wicked shall be cut off from the earth, and the treacherous shall be rooted out of it.'
  '3':
  - type: text
    content: ' Yes, if you cry out for insight and raise your voice for understanding,'
  '4':
  - type: text
    content: ' If you seek [Wisdom] as for silver and search for skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom as for hidden treasures,'
  '5':
  - type: text
    content: ' Then you will understand the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord and find the knowledge of [our omniscient] God. [Prov. 1:7.]'
  '6':
  - type: text
    content: ' For the Lord gives skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom; from His mouth come knowledge and understanding.'
  '7':
  - type: text
    content: ' He hides away sound '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom '
  - type: text
    content: and
  - type: text
    content: ' stores it for the righteous (those who are upright and in right standing with Him); He is a shield to those who walk uprightly '
  - type: text
    content: and
  - type: text
    content: ' in integrity,'
  '8':
  - type: text
    content: ' That He may guard the paths of justice; yes, He preserves the way of His saints. [I Sam. 2:9; Ps. 66:8, 9.]'
  '9':
  - type: text
    content: ' Then you will understand righteousness, justice, and fair dealing [in every area and relation]; yes, you will understand every good path.'
