document_id: PRO.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MY SON, if you will receive my words and treasure up my commandments within you,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom shall enter into your heart, and knowledge shall be pleasant to you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Discretion shall watch over you, understanding shall keep you,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' To deliver you from the way of evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the evil men, from men who speak perverse things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are liars,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Men who forsake the paths of uprightness to walk in the ways of darkness,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Who rejoice to do evil and delight in the perverseness of evil,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Who are crooked in their ways, wayward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devious in their paths.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' [Discretion shall watch over you, understanding shall keep you] to deliver you from the alien woman, from the outsider with her flattering words, [Prov. 2:11.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Who forsakes the husband '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guide of her youth and forgets the covenant of her God.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For her house sinks down to death and her paths to the spirits [of the dead].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' None who go to her return again, neither do they attain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' regain the paths of life.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Making your ear attentive to skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inclining and directing your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind to understanding [applying all your powers to the quest for it];'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So may you walk in the way of good men, and keep to the paths of the [consistently] righteous (the upright, in right standing with God).'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For the upright shall dwell in the land, and the men of integrity, blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete [in God''s sight], shall remain in it;'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But the wicked shall be cut off from the earth, and the treacherous shall be rooted out of it.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Yes, if you cry out for insight and raise your voice for understanding,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' If you seek [Wisdom] as for silver and search for skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom as for hidden treasures,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then you will understand the reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear of the Lord and find the knowledge of [our omniscient] God. [Prov. 1:7.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For the Lord gives skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom; from His mouth come knowledge and understanding.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He hides away sound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stores it for the righteous (those who are upright and in right standing with Him); He is a shield to those who walk uprightly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in integrity,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' That He may guard the paths of justice; yes, He preserves the way of His saints. [I Sam. 2:9; Ps. 66:8, 9.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then you will understand righteousness, justice, and fair dealing [in every area and relation]; yes, you will understand every good path.'
