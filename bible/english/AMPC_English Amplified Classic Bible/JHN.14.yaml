document_id: JHN.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DO NOT let your hearts be troubled (distressed, agitated). You believe in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhere to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on God; believe in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhere to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely also on Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In My Father''s house there are many dwelling places (homes). If it were not so, I would have told you; for I am going away to prepare a place for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when (if) I go and make ready a place for you, I will come back again and will take you to Myself, that where I am you may be also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And [to the place] where I am going, you know the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thomas said to Him, Lord, we do not know where You are going, so how can we know the way?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Jesus said to him, I am the Way and the Truth and the Life; no one comes to the Father except by (through) Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If you had known Me [had learned to recognize Me], you would also have known My Father. From now on, you know Him and have seen Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Philip said to Him, Lord, show us the Father [cause us to see the Father–that is all we ask]; then we shall be satisfied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jesus replied, Have I been with all of you for so long a time, and do you not recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know Me yet, Philip? Anyone who has seen Me has seen the Father. How can you say then, Show us the Father?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Do you not believe that I am in the Father, and that the Father is in Me? What I am telling you I do not say on My own authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of My own accord; but the Father Who lives continually in Me does the ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ) works (His own miracles, deeds of power).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Believe Me that I am in the Father and the Father in Me; or else believe Me for the sake of the [very] works themselves. [If you cannot trust Me, at least let these works that I do in My Father''s name convince you.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I assure you, most solemnly I tell you, if anyone steadfastly believes in Me, he will himself be able to do the things that I do; and he will do even greater things than these, because I go to the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I will do [I Myself will grant] whatever you ask in My Name [as presenting all that I AM], so that the Father may be glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extolled in (through) the Son. [Exod. 3:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [Yes] I will grant [I Myself will do for you] whatever you shall ask in My Name [as presenting all that I AM].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' If you [really] love Me, you will keep (obey) My commands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I will ask the Father, and He will give you another Comforter (Counselor, Helper, Intercessor, Advocate, Strengthener, and Standby), that He may remain with you forever–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The Spirit of Truth, Whom the world cannot receive (welcome, take to its heart), because it does not see Him or know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize Him. But you know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize Him, for He lives with you [constantly] and will be in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I will not leave you as orphans [comfortless, desolate, bereaved, forlorn, helpless]; I will come [back] to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Just a little while now, and the world will not see Me any more, but you will see Me; because I live, you will live also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' At that time [when that day comes] you will know [for yourselves] that I am in My Father, and you [are] in Me, and I [am] in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The person who has My commands and keeps them is the one who [really] loves Me; and whoever [really] loves Me will be loved by My Father, and I [too] will love him and will show (reveal, manifest) Myself to him. [I will let Myself be clearly seen by him and make Myself real to him.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Judas, not Iscariot, asked Him, Lord, how is it that You will reveal Yourself [make Yourself real] to us and not to the world?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Jesus answered, If a person [really] loves Me, he will keep My word [obey My teaching]; and My Father will love him, and We will come to him and make Our home (abode, special dwelling place) with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Anyone who does not [really] love Me does not observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey My teaching. And the teaching which you hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed is not Mine, but [comes] from the Father Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I have told you these things while I am still with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But the Comforter (Counselor, Helper, Intercessor, Advocate, Strengthener, Standby), the Holy Spirit, Whom the Father will send in My name [in My place, to represent Me and act on My behalf], He will teach you all things. And He will cause you to recall (will remind you of, bring to your remembrance) everything I have told you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Peace I leave with you; My [own] peace I now give '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bequeath to you. Not as the world gives do I give to you. Do not let your hearts be troubled, neither let them be afraid. [Stop allowing yourselves to be agitated and disturbed; and do not permit yourselves to be fearful and intimidated and cowardly and unsettled.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' You heard Me tell you, I am going away and I am coming [back] to you. If you [really] loved Me, you would have been glad, because I am going to the Father; for the Father is greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mightier than I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And now I have told you [this] before it occurs, so that when it does take place you may believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have faith in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' I will not talk with you much more, for the prince (evil genius, ruler) of the world is coming. And he has no claim on Me. [He has nothing in common with Me; there is nothing in Me that belongs to him, and he has no power over Me.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But [Satan is coming and] I do as the Father has commanded Me, so that the world may know (be convinced) that I love the Father and that I do only what the Father has instructed Me to do. [I act in full agreement with His orders.] Rise, let us go away from here.'
