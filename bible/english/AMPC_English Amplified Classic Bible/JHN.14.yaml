  '11':
  - type: text
    content: ' Believe Me that I am in the Father and the Father in Me; or else believe Me for the sake of the [very] works themselves. [If you cannot trust Me, at least let these works that I do in My Father''s name convince you.]'
  '12':
  - type: text
    content: ' I assure you, most solemnly I tell you, if anyone steadfastly believes in Me, he will himself be able to do the things that I do; and he will do even greater things than these, because I go to the Father.'
  '13':
  - type: text
    content: ' And I will do [I Myself will grant] whatever you ask in My Name [as presenting all that I AM], so that the Father may be glorified '
  - type: text
    content: and
  - type: text
    content: ' extolled in (through) the Son. [Exod. 3:14.]'
  '14':
  - type: text
    content: ' [Yes] I will grant [I Myself will do for you] whatever you shall ask in My Name [as presenting all that I AM].'
  '15':
  - type: text
    content: ' If you [really] love Me, you will keep (obey) My commands.'
  '16':
  - type: text
    content: ' And I will ask the Father, and He will give you another Comforter (Counselor, Helper, Intercessor, Advocate, Strengthener, and Standby), that He may remain with you forever–'
  '17':
  - type: text
    content: ' The Spirit of Truth, Whom the world cannot receive (welcome, take to its heart), because it does not see Him or know '
  - type: text
    content: and
  - type: text
    content: ' recognize Him. But you know '
  - type: text
    content: and
  - type: text
    content: ' recognize Him, for He lives with you [constantly] and will be in you.'
  '18':
  - type: text
    content: ' I will not leave you as orphans [comfortless, desolate, bereaved, forlorn, helpless]; I will come [back] to you.'
  '19':
  - type: text
    content: ' Just a little while now, and the world will not see Me any more, but you will see Me; because I live, you will live also.'
  '2':
  - type: text
    content: ' In My Father''s house there are many dwelling places (homes). If it were not so, I would have told you; for I am going away to prepare a place for you.'
  '20':
  - type: text
    content: ' At that time [when that day comes] you will know [for yourselves] that I am in My Father, and you [are] in Me, and I [am] in you.'
  '21':
  - type: text
    content: ' The person who has My commands and keeps them is the one who [really] loves Me; and whoever [really] loves Me will be loved by My Father, and I [too] will love him and will show (reveal, manifest) Myself to him. [I will let Myself be clearly seen by him and make Myself real to him.]'
  '22':
  - type: text
    content: ' Judas, not Iscariot, asked Him, Lord, how is it that You will reveal Yourself [make Yourself real] to us and not to the world?'
  '23':
  - type: text
    content: ' Jesus answered, If a person [really] loves Me, he will keep My word [obey My teaching]; and My Father will love him, and We will come to him and make Our home (abode, special dwelling place) with him.'
  '24':
  - type: text
    content: ' Anyone who does not [really] love Me does not observe '
  - type: text
    content: and
  - type: text
    content: ' obey My teaching. And the teaching which you hear '
  - type: text
    content: and
  - type: text
    content: ' heed is not Mine, but [comes] from the Father Who sent Me.'
  '25':
  - type: text
    content: ' I have told you these things while I am still with you.'
  '26':
  - type: text
    content: ' But the Comforter (Counselor, Helper, Intercessor, Advocate, Strengthener, Standby), the Holy Spirit, Whom the Father will send in My name [in My place, to represent Me and act on My behalf], He will teach you all things. And He will cause you to recall (will remind you of, bring to your remembrance) everything I have told you.'
  '27':
  - type: text
    content: ' Peace I leave with you; My [own] peace I now give '
  - type: text
    content: and
  - type: text
    content: ' bequeath to you. Not as the world gives do I give to you. Do not let your hearts be troubled, neither let them be afraid. [Stop allowing yourselves to be agitated and disturbed; and do not permit yourselves to be fearful and intimidated and cowardly and unsettled.]'
  '28':
  - type: text
    content: ' You heard Me tell you, I am going away and I am coming [back] to you. If you [really] loved Me, you would have been glad, because I am going to the Father; for the Father is greater '
  - type: text
    content: and
  - type: text
    content: ' mightier than I am.'
  '29':
  - type: text
    content: ' And now I have told you [this] before it occurs, so that when it does take place you may believe '
  - type: text
    content: and
  - type: text
    content: ' have faith in '
  - type: text
    content: and
  - type: text
    content: ' rely on Me.'
  '3':
  - type: text
    content: ' And when (if) I go and make ready a place for you, I will come back again and will take you to Myself, that where I am you may be also.'
  '30':
  - type: text
    content: ' I will not talk with you much more, for the prince (evil genius, ruler) of the world is coming. And he has no claim on Me. [He has nothing in common with Me; there is nothing in Me that belongs to him, and he has no power over Me.]'
  '31':
  - type: text
    content: ' But [Satan is coming and] I do as the Father has commanded Me, so that the world may know (be convinced) that I love the Father and that I do only what the Father has instructed Me to do. [I act in full agreement with His orders.] Rise, let us go away from here.'
  '4':
  - type: text
    content: ' And [to the place] where I am going, you know the way.'
  '5':
  - type: text
    content: ' Thomas said to Him, Lord, we do not know where You are going, so how can we know the way?'
  '6':
  - type: text
    content: ' Jesus said to him, I am the Way and the Truth and the Life; no one comes to the Father except by (through) Me.'
  '7':
  - type: text
    content: ' If you had known Me [had learned to recognize Me], you would also have known My Father. From now on, you know Him and have seen Him.'
  '8':
  - type: text
    content: ' Philip said to Him, Lord, show us the Father [cause us to see the Father–that is all we ask]; then we shall be satisfied.'
  '9':
  - type: text
    content: ' Jesus replied, Have I been with all of you for so long a time, and do you not recognize '
  - type: text
    content: and
  - type: text
    content: ' know Me yet, Philip? Anyone who has seen Me has seen the Father. How can you say then, Show us the Father?'
