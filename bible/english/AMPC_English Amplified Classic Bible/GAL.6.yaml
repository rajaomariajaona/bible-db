document_id: GAL.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' BRETHREN, IF any person is overtaken in misconduct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sin of any sort, you who are spiritual [who are responsive to and controlled by the Spirit] should set him right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reinstate him, without any sense of superiority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with all gentleness, keeping an attentive eye on yourself, lest you should be tempted also.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then, as occasion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opportunity open up to us, let us do good [morally] to all people [not only being useful or profitable to them, but also doing what is for their spiritual good and advantage]. Be mindful to be a blessing, especially to those of the household of faith [those who belong to God''s family with you, the believers].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' See with what large letters I am writing with my own hand. [Mark carefully these closing words of mine.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those who want to make a good impression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a fine show in the flesh would try to compel you to receive circumcision, simply so that they may escape being persecuted for allegiance to the cross of Christ (the Messiah, the Anointed One).'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For even the circumcised [Jews] themselves do not [really] keep the Law, but they want to have you circumcised in order that they may glory in your flesh (your subjection to external rites).'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But far be it from me to glory [in anything or anyone] except in the cross of our Lord Jesus Christ (the Messiah) through Whom the world has been crucified to me, and I to the world!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For neither is circumcision [now] of any importance, nor uncircumcision, but [only] a new creation [the result of a new birth and a new nature in Christ Jesus, the Messiah].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Peace and mercy be upon all who walk by this rule [who discipline themselves and regulate their lives by this principle], even upon the [true] Israel of God! [Ps. 125:5.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From now on let no person trouble me [by making it necessary for me to vindicate my apostolic authority and the divine truth of my Gospel], for I bear on my body the [brand] marks of the Lord Jesus [the wounds, scars, and other outward evidence of persecutions–these testify to His ownership of me]!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The grace (spiritual favor, blessing) of our Lord Jesus Christ (the Anointed One, the Messiah) be with your spirit, brethren. Amen (so be it).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bear (endure, carry) one another''s burdens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' troublesome moral faults, and in this way fulfill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' observe perfectly the law of Christ (the Messiah) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete what is lacking [in your obedience to it].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if any person thinks himself to be somebody [too important to condescend to shoulder another''s load] when he is nobody [of superiority except in his own estimation], he deceives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deludes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheats himself.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But let every person carefully scrutinize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' test his own conduct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' his own work. He can then have the personal satisfaction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joy of doing something commendable [in itself alone] without [resorting to] boastful comparison with his neighbor.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For every person will have to bear (be equal to understanding and calmly receive) his own [little] load [of oppressive faults].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let him who receives instruction in the Word [of God] share all good things with his teacher [contributing to his support].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not be deceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deluded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misled; God will not allow Himself to be sneered at (scorned, disdained, or mocked by mere pretensions or professions, or by His precepts being set aside.) [He inevitably deludes himself who attempts to delude God.] For whatever a man sows, that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' that only is what he will reap.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For he who sows to his own flesh (lower nature, sensuality) will from the flesh reap decay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction, but he who sows to the Spirit will from the Spirit reap eternal life.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let us not lose heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grow weary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faint in acting nobly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doing right, for in due time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at the appointed season we shall reap, if we do not loosen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relax our courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faint.'
