document_id: GAL.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BRETHREN, IF any person is overtaken in misconduct '
  - type: text
    content: or
  - type: text
    content: ' sin of any sort, you who are spiritual [who are responsive to and controlled by the Spirit] should set him right '
  - type: text
    content: and
  - type: text
    content: ' restore '
  - type: text
    content: and
  - type: text
    content: ' reinstate him, without any sense of superiority '
  - type: text
    content: and
  - type: text
    content: ' with all gentleness, keeping an attentive eye on yourself, lest you should be tempted also.'
  '10':
  - type: text
    content: ' So then, as occasion '
  - type: text
    content: and
  - type: text
    content: ' opportunity open up to us, let us do good [morally] to all people [not only being useful or profitable to them, but also doing what is for their spiritual good and advantage]. Be mindful to be a blessing, especially to those of the household of faith [those who belong to God''s family with you, the believers].'
  '11':
  - type: text
    content: ' See with what large letters I am writing with my own hand. [Mark carefully these closing words of mine.]'
  '12':
  - type: text
    content: ' Those who want to make a good impression '
  - type: text
    content: and
  - type: text
    content: ' a fine show in the flesh would try to compel you to receive circumcision, simply so that they may escape being persecuted for allegiance to the cross of Christ (the Messiah, the Anointed One).'
  '13':
  - type: text
    content: ' For even the circumcised [Jews] themselves do not [really] keep the Law, but they want to have you circumcised in order that they may glory in your flesh (your subjection to external rites).'
  '14':
  - type: text
    content: ' But far be it from me to glory [in anything or anyone] except in the cross of our Lord Jesus Christ (the Messiah) through Whom the world has been crucified to me, and I to the world!'
  '15':
  - type: text
    content: ' For neither is circumcision [now] of any importance, nor uncircumcision, but [only] a new creation [the result of a new birth and a new nature in Christ Jesus, the Messiah].'
  '16':
  - type: text
    content: ' Peace and mercy be upon all who walk by this rule [who discipline themselves and regulate their lives by this principle], even upon the [true] Israel of God! [Ps. 125:5.]'
  '17':
  - type: text
    content: ' From now on let no person trouble me [by making it necessary for me to vindicate my apostolic authority and the divine truth of my Gospel], for I bear on my body the [brand] marks of the Lord Jesus [the wounds, scars, and other outward evidence of persecutions–these testify to His ownership of me]!'
  '18':
  - type: text
    content: ' The grace (spiritual favor, blessing) of our Lord Jesus Christ (the Anointed One, the Messiah) be with your spirit, brethren. Amen (so be it).'
  '2':
  - type: text
    content: ' Bear (endure, carry) one another''s burdens '
  - type: text
    content: and
  - type: text
    content: ' troublesome moral faults, and in this way fulfill '
  - type: text
    content: and
  - type: text
    content: ' observe perfectly the law of Christ (the Messiah) '
  - type: text
    content: and
  - type: text
    content: ' complete what is lacking [in your obedience to it].'
  '3':
  - type: text
    content: ' For if any person thinks himself to be somebody [too important to condescend to shoulder another''s load] when he is nobody [of superiority except in his own estimation], he deceives '
  - type: text
    content: and
  - type: text
    content: ' deludes '
  - type: text
    content: and
  - type: text
    content: ' cheats himself.'
  '4':
  - type: text
    content: ' But let every person carefully scrutinize '
  - type: text
    content: and
  - type: text
    content: ' examine '
  - type: text
    content: and
  - type: text
    content: ' test his own conduct '
  - type: text
    content: and
  - type: text
    content: ' his own work. He can then have the personal satisfaction '
  - type: text
    content: and
  - type: text
    content: ' joy of doing something commendable [in itself alone] without [resorting to] boastful comparison with his neighbor.'
  '5':
  - type: text
    content: ' For every person will have to bear (be equal to understanding and calmly receive) his own [little] load [of oppressive faults].'
  '6':
  - type: text
    content: ' Let him who receives instruction in the Word [of God] share all good things with his teacher [contributing to his support].'
  '7':
  - type: text
    content: ' Do not be deceived '
  - type: text
    content: and
  - type: text
    content: ' deluded '
  - type: text
    content: and
  - type: text
    content: ' misled; God will not allow Himself to be sneered at (scorned, disdained, or mocked by mere pretensions or professions, or by His precepts being set aside.) [He inevitably deludes himself who attempts to delude God.] For whatever a man sows, that '
  - type: text
    content: and
  - type: text
    content: ' that only is what he will reap.'
  '8':
  - type: text
    content: ' For he who sows to his own flesh (lower nature, sensuality) will from the flesh reap decay '
  - type: text
    content: and
  - type: text
    content: ' ruin '
  - type: text
    content: and
  - type: text
    content: ' destruction, but he who sows to the Spirit will from the Spirit reap eternal life.'
  '9':
  - type: text
    content: ' And let us not lose heart '
  - type: text
    content: and
  - type: text
    content: ' grow weary '
  - type: text
    content: and
  - type: text
    content: ' faint in acting nobly '
  - type: text
    content: and
  - type: text
    content: ' doing right, for in due time '
  - type: text
    content: and
  - type: text
    content: ' at the appointed season we shall reap, if we do not loosen '
  - type: text
    content: and
  - type: text
    content: ' relax our courage '
  - type: text
    content: and
  - type: text
    content: ' faint.'
