document_id: JOB.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JOB answered:'
  '10':
  - type: text
    content: ' He has broken me down on every side, and I am gone; my hope has He pulled up like a tree.'
  '11':
  - type: text
    content: ' He has also kindled His wrath against me, and He counts me as one of His adversaries.'
  '12':
  - type: text
    content: ' His troops come together and cast up their way '
  - type: text
    content: and
  - type: text
    content: ' siege works against me and encamp round about my tent.'
  '13':
  - type: text
    content: ' He has put my brethren far from me, and my acquaintances are wholly estranged from me.'
  '14':
  - type: text
    content: ' My kinsfolk have failed me, and my familiar friends have forgotten me.'
  '15':
  - type: text
    content: ' Those who live temporarily in my house and my maids count me as a stranger; I am an alien in their sight.'
  '16':
  - type: text
    content: ' I call to my servant, but he gives me no answer, though I beseech him with words.'
  '17':
  - type: text
    content: ' I am repulsive to my wife and loathsome to the children of my own mother.'
  '18':
  - type: text
    content: ' Even young children despise me; when I get up, they speak against me.'
  '19':
  - type: text
    content: ' All the men of my council '
  - type: text
    content: and
  - type: text
    content: ' my familiar friends abhor me; those whom I loved are turned against me.'
  '2':
  - type: text
    content: ' How long will you vex '
  - type: text
    content: and
  - type: text
    content: ' torment me and break me in pieces with words?'
  '20':
  - type: text
    content: ' My bone clings to my skin and to my flesh, and I have escaped with the skin '
  - type: text
    content: or
  - type: text
    content: ' gums of my teeth.'
  '21':
  - type: text
    content: ' Have pity on me! Have pity on me, O you my friends, for the hand of God has touched me!'
  '22':
  - type: text
    content: ' Why do you, as if you were God, pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute me? [Acting like wild beasts] why are you not satisfied with my flesh?'
  '23':
  - type: text
    content: ' Oh, that the words I now speak were written! Oh, that they were inscribed in a book [carved on a tablet of stone]!'
  '24':
  - type: text
    content: ' That with an iron pen and [molten] lead they were graven in the rock forever!'
  '25':
  - type: text
    content: ' For I know that my Redeemer '
  - type: text
    content: and
  - type: text
    content: ' Vindicator lives, and at last He [the Last One] will stand upon the earth. [Isa. 44:6; 48:12.]'
  '26':
  - type: text
    content: ' And after my skin, even this body, has been destroyed, then from my flesh '
  - type: text
    content: or
  - type: text
    content: ' without it I shall see God,'
  '27':
  - type: text
    content: ' Whom I, even I, shall see for myself '
  - type: text
    content: and
  - type: text
    content: ' on my side! And my eyes shall behold Him, and not as a stranger! My heart pines away '
  - type: text
    content: and
  - type: text
    content: ' is consumed within me.'
  '28':
  - type: text
    content: ' If you say, How we will pursue him! [and continue to persecute me with the claim] that the root [cause] of all these [afflictions] is found in me,'
  '29':
  - type: text
    content: ' Then beware '
  - type: text
    content: and
  - type: text
    content: ' be afraid of the sword [of divine vengeance], for wrathful are the punishments of that sword, that you may know there is a judgment.'
  '3':
  - type: text
    content: ' These ten times you have reproached me; you are not ashamed that you make yourselves strange [harden yourselves against me and deal severely with me].'
  '4':
  - type: text
    content: ' And if it were true that I have erred, my error would remain with me [I would be conscious of it].'
  '5':
  - type: text
    content: ' If indeed you magnify yourselves against me and plead against me my reproach '
  - type: text
    content: and
  - type: text
    content: ' humiliation,'
  '6':
  - type: text
    content: ' Know that God has overthrown '
  - type: text
    content: and
  - type: text
    content: ' put me in the wrong and has closed His net about me.'
  '7':
  - type: text
    content: ' Behold, I cry out, Violence! but I am not heard; I cry aloud for help, but there is no justice.'
  '8':
  - type: text
    content: ' He has walled up my way so that I cannot pass, and He has set darkness upon my paths.'
  '9':
  - type: text
    content: ' He has stripped me of my glory and taken the crown from my head.'
