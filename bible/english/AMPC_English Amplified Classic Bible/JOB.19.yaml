document_id: JOB.19,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JOB answered:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He has broken me down on every side, and I am gone; my hope has He pulled up like a tree.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' He has also kindled His wrath against me, and He counts me as one of His adversaries.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' His troops come together and cast up their way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' siege works against me and encamp round about my tent.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He has put my brethren far from me, and my acquaintances are wholly estranged from me.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' My kinsfolk have failed me, and my familiar friends have forgotten me.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Those who live temporarily in my house and my maids count me as a stranger; I am an alien in their sight.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' I call to my servant, but he gives me no answer, though I beseech him with words.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I am repulsive to my wife and loathsome to the children of my own mother.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Even young children despise me; when I get up, they speak against me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' All the men of my council '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my familiar friends abhor me; those whom I loved are turned against me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' How long will you vex '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torment me and break me in pieces with words?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' My bone clings to my skin and to my flesh, and I have escaped with the skin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' gums of my teeth.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Have pity on me! Have pity on me, O you my friends, for the hand of God has touched me!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Why do you, as if you were God, pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute me? [Acting like wild beasts] why are you not satisfied with my flesh?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Oh, that the words I now speak were written! Oh, that they were inscribed in a book [carved on a tablet of stone]!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' That with an iron pen and [molten] lead they were graven in the rock forever!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' For I know that my Redeemer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Vindicator lives, and at last He [the Last One] will stand upon the earth. [Isa. 44:6; 48:12.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And after my skin, even this body, has been destroyed, then from my flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' without it I shall see God,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Whom I, even I, shall see for myself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on my side! And my eyes shall behold Him, and not as a stranger! My heart pines away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is consumed within me.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' If you say, How we will pursue him! [and continue to persecute me with the claim] that the root [cause] of all these [afflictions] is found in me,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Then beware '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be afraid of the sword [of divine vengeance], for wrathful are the punishments of that sword, that you may know there is a judgment.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' These ten times you have reproached me; you are not ashamed that you make yourselves strange [harden yourselves against me and deal severely with me].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And if it were true that I have erred, my error would remain with me [I would be conscious of it].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' If indeed you magnify yourselves against me and plead against me my reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humiliation,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Know that God has overthrown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put me in the wrong and has closed His net about me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Behold, I cry out, Violence! but I am not heard; I cry aloud for help, but there is no justice.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He has walled up my way so that I cannot pass, and He has set darkness upon my paths.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He has stripped me of my glory and taken the crown from my head.'
