document_id: JOB.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOB answered:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' How long will you vex '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' torment me and break me in pieces with words?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' These ten times you have reproached me; you are not ashamed that you make yourselves strange [harden yourselves against me and deal severely with me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And if it were true that I have erred, my error would remain with me [I would be conscious of it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If indeed you magnify yourselves against me and plead against me my reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliation,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Know that God has overthrown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put me in the wrong and has closed His net about me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold, I cry out, Violence! but I am not heard; I cry aloud for help, but there is no justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He has walled up my way so that I cannot pass, and He has set darkness upon my paths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He has stripped me of my glory and taken the crown from my head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He has broken me down on every side, and I am gone; my hope has He pulled up like a tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He has also kindled His wrath against me, and He counts me as one of His adversaries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' His troops come together and cast up their way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' siege works against me and encamp round about my tent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He has put my brethren far from me, and my acquaintances are wholly estranged from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' My kinsfolk have failed me, and my familiar friends have forgotten me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Those who live temporarily in my house and my maids count me as a stranger; I am an alien in their sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I call to my servant, but he gives me no answer, though I beseech him with words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I am repulsive to my wife and loathsome to the children of my own mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Even young children despise me; when I get up, they speak against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' All the men of my council '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my familiar friends abhor me; those whom I loved are turned against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' My bone clings to my skin and to my flesh, and I have escaped with the skin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' gums of my teeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Have pity on me! Have pity on me, O you my friends, for the hand of God has touched me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Why do you, as if you were God, pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me? [Acting like wild beasts] why are you not satisfied with my flesh?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Oh, that the words I now speak were written! Oh, that they were inscribed in a book [carved on a tablet of stone]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' That with an iron pen and [molten] lead they were graven in the rock forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For I know that my Redeemer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Vindicator lives, and at last He [the Last One] will stand upon the earth. [Isa. 44:6; 48:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And after my skin, even this body, has been destroyed, then from my flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' without it I shall see God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Whom I, even I, shall see for myself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on my side! And my eyes shall behold Him, and not as a stranger! My heart pines away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is consumed within me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' If you say, How we will pursue him! [and continue to persecute me with the claim] that the root [cause] of all these [afflictions] is found in me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then beware '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be afraid of the sword [of divine vengeance], for wrathful are the punishments of that sword, that you may know there is a judgment.'
