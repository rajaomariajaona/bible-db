document_id: 2SA.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' LATER, THE king of the Ammonites died, and Hanun his son reigned in his stead.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The rest of the men Joab gave over to Abishai his brother, that he might put them in array against the Ammonites.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Joab said, If the Syrians are too strong for me, then you shall help me; but if the Ammonites are too strong for you, I will come and help you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Be of good courage; let us play the man for our people and the cities of our God. And may the Lord do what seems good to Him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And Joab and the people who were with him drew near to battle against the Syrians, and they fled before him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And when the Ammonites saw that the Syrians had fled, they also fled before Abishai and entered the city. So Joab returned from battling against the Ammonites and came to Jerusalem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When the Syrians saw that they were defeated by Israel, they gathered together.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Hadadezer sent and brought the Syrians who were beyond the river [Euphrates]; and they came to Helam, with Shobach commander of the army of Hadadezer leading them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' When David was told, he gathered all Israel, crossed the Jordan, and came to Helam. Then the Syrians set themselves in array against David and fought with him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The Syrians fled before Israel, and David slew of [them] the men of 700 chariots and 40,000 horsemen and smote Shobach captain of their army, who died there.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And when all the kings serving Hadadezer saw that they were defeated by Israel, they made peace with Israel and served them. So the Syrians were afraid to help the Ammonites any more.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' David said, I will show kindness to Hanun son of Nahash, as his father did to me. So David sent his servants to console him for his father''s death; and they came into the land of the Ammonites,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But the princes of the Ammonites said to Hanun their lord, Do you think that it is because David honors your father that he has sent comforters to you? Has he not rather sent his servants to you to search the city, spy it out, and overthrow it?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So Hanun took David''s servants and shaved off half their beards and cut off their garments in the middle at their hips and sent them away.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' When it was told David, he sent to meet them, for the men were greatly ashamed. And the king said, Tarry at Jericho until your beards are grown, and then return.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And when the Ammonites saw that they had made themselves obnoxious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgusting to David, they sent and hired the Syrians of Beth-rehob and of Zobah, 20,000 foot soldiers, and of the king of Maacah 1,000 men, and of Tob 12,000 men.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' When David heard of it, he sent Joab and all the army of the mighty men.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the Ammonites came out and put the battle in array at the entrance of the gate, but the Syrians of Zobah and of Rehob and the men of Tob and Maacah were stationed by themselves in the open country.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' When Joab saw that the battlefront was against him before and behind, he picked some of all the choice men of Israel and put them in array against the Syrians.'
