document_id: MIC.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW GATHER yourself in troops, O daughter of troops; a state of siege has been placed against us. They shall smite the ruler of Israel with a rod (a scepter) on the cheek.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And in that day, says the Lord, I will cut off your horses [on which you depend] from among you and will destroy your chariots. [Ps. 20:7, 8; Zech. 9:10.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And I will cut off the cities of your land and throw down all your strongholds.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And I will cut off witchcrafts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorceries from your hand, and you shall have no more soothsayers.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Your carved images also I will cut off and your statues '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars out of your midst, and you shall no more worship the work of your hands.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And I will root out your Asherim [symbols of the goddess Asherah] and I will destroy your cities [the seats of false worship]. [Deut. 16:21.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And in anger and wrath I will execute vengeance upon the nations which would not obey [vengeance such as they have not heard of before].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' But you, Bethlehem Ephratah, you are little to be among the clans of Judah; [yet] out of you shall One come forth for Me Who is to be Ruler in Israel, Whose goings forth have been from of old, from ancient days (eternity). [Gen. 49:10; Matt. 2:5-12; John 7:42.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Therefore shall He give them up until the time that she who travails has brought forth; then what is left of His brethren shall return to the children of Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And He shall stand and feed His flock in the strength of the Lord, in the majesty of the name of the Lord His God; and they shall dwell [secure], for then shall He be great [even] to the ends of the earth. [Ps. 72:8; Isa. 40:11; Zech. 9:10; Luke 1:32, 33.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And this [One] shall be our peace. When the Assyrian comes into our land and treads upon our soil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in our palaces, then will we raise against him seven shepherds and eight princes among men. [Isa. 9:6; Eph. 2:14.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And they shall rule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' waste the land of Assyria with the sword and the land of Nimrod within her [Assyria''s own] gates. Thus shall He [the Messiah] deliver us from the Assyrian [representing the opposing powers] when he comes into our land and when he treads on our borders.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then the remnant of Jacob shall be in the midst of many peoples like dew from the Lord, like showers upon the grass which [come suddenly and] tarry not for man nor wait for the sons of men. [Ps. 72:6; 110:3.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the remnant of Jacob shall be among the nations in the midst of many peoples like a lion among the beasts of the forest, like a young lion [suddenly appearing] among the flocks of sheep which, when it goes through, treads down and tears in pieces, and there is no deliverer.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Your hand will be lifted up above your adversaries, and all your enemies shall be cut off.'
