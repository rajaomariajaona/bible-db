document_id: 1CH.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' DAVID CONSULTED the captains of thousands and hundreds, even with every leader.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the anger of the Lord was kindled against Uzza, and He smote him because he touched the ark; and there he died before God. [Num. 4:15.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David was offended because the Lord had broken forth upon Uzza; that place to this day is called Perez-uzza [the breaking forth upon Uzza].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David was afraid of God that day, and he said, How can I bring the ark of God home to me?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David did not bring the ark home to the City of David, but carried it aside into the house of Obed-edom the Gittite [a Levitical porter born in Gath-rimmon]. [Josh. 21:20, 24; I Chron. 15:24.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the ark of God remained with the family of Obed-edom in his house three months. And the Lord blessed the house of Obed-edom and all that he had.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David said to all the assembly of Israel, If it seems good to you and if it is of the Lord our God, let us send abroad everywhere to our brethren who are left in all the land of Israel, and with them to the priests and Levites in their cities that have suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands, that they may gather together with us.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let us bring again the ark of our God to us, for we did not seek it during the days of Saul.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the assembly agreed to do so, for the thing seemed right in the eyes of all the people.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David gathered all Israel together, from the Shihor, the brook of Egypt [that marked the southeast border of Palestine], to the entrance of Hemath, to bring the ark of God from Kiriath-jearim.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David and all Israel went up to Baalah, that is, to Kiriath-jearim which belonged to Judah, to bring up from there the ark of God the Lord, which is called by the name of Him Who sits [enthroned] above the cherubim.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they carried the ark of God on a new cart and brought it out of the house of Abinadab, and Uzza and Ahio [his brother] drove the cart.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David and all Israel merrily celebrated before God with all their might, with songs and lyres and harps and tambourines and cymbals and trumpets.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when they came to the threshing floor of Chidon, Uzza put out his hand to steady the ark, for the oxen [that were drawing the cart] stumbled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were restive.'
