document_id: ISA.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' LISTEN IN silence before Me, O islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regions bordering on the sea! And let the people gather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renew their strength [for the argument; let them offer their strongest arguments]! Let them come near, then let them speak; let us come near together for judgment [and decide the point at issue between us concerning the enemy advancing from the east].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Who has roused up one [Cyrus] from the east, whom He calls in righteousness to His service '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whom victory meets at every step? He [the Lord] subdues nations before him and makes him ruler over kings. He turns them to dust with the sword [of Cyrus], and to driven straw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chaff with his bow. [Ezra 1:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He [Cyrus] pursues them and passes safely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unhindered, even by a way his feet had not trod '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' so swiftly that his feet do not touch the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Who has prepared and done this, calling forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guiding the destinies of the generations [of the nations] from the beginning? I, the Lord–the first [existing before history began] and with the last [an ever-present, unchanging God]–I am He.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands have seen and fear; the ends of the earth tremble. They draw near and come;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They help every one his neighbor and say to his brother [in his tiresome idol making], Be of good courage!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So the carpenter encourages the goldsmith, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' he who smooths [the metal] with the hammer [encourages] him who smites the anvil, saying of the soldering, That is good! And he fastens it with nails so that it cannot be moved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But you, Israel, My servant, Jacob, whom I have chosen, the offspring of Abraham My friend, [Heb. 2:16; James 2:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You whom I [the Lord] have taken from the ends of the earth and have called from the corners of it, and said to you, You are My servant–I have chosen you and not cast you off [even though you are exiled].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Fear not [there is nothing to fear], for I am with you; do not look around you in terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be dismayed, for I am your God. I will strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harden you to difficulties, yes, I will help you; yes, I will hold you up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' retain you with My [victorious] right hand of rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice. [Acts 18:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Behold, all they who are enraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inflamed against you shall be put to shame and confounded; they who strive against you shall be as nothing and shall perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You shall seek those who contend with you but shall not find them; they who war against you shall be as nothing, as nothing at all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For I the Lord your God hold your right hand; I am the Lord, Who says to you, Fear not; I will help you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Fear not, you worm Jacob, you men of Israel! I will help you, says the Lord; your Redeemer is the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, I will make you to be a new, sharp, threshing instrument which has teeth; you shall thresh the mountains and beat them small, and shall make the hills like chaff.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You shall winnow them, and the wind shall carry them away, and the tempest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' whirlwind shall scatter them. And you shall rejoice in the Lord, you shall glory in the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The poor and needy are seeking water when there is none; their tongues are parched with thirst. I the Lord will answer them; I, the God of Israel, will not forsake them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I will open rivers on the bare heights, and fountains in the midst of the valleys; I will make the wilderness a pool of water, and the dry land springs of water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I will plant in the wilderness the cedar, the acacia, the myrtle, and the wild olive; I will set the cypress in the desert, the plane [tree] and the pine [tree] together,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' That men may see and know and consider and understand together that the hand of the Lord has done this, that the Holy One of Israel has created it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [You idols made by men''s hands, prove your divinity!] Produce your cause [set forth your case], says the Lord. Bring forth your strong proofs, says the King of Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Let them bring them forth and tell us what is to happen. Let them tell us the former things, what they are, that we may consider them and know the outcome of them; or declare to us the things to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Tell us the things that are to come hereafter, that we may know that you are gods; yes, do good or do evil [something or other], that we may stare in astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be dismayed as we behold [the miracle] together!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Behold, you [idols] are nothing, and your work is nothing! The worshiper who chooses you is an abomination [extremely disgusting and shamefully vile in God''s sight]. [I Cor. 8:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I have raised up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impelled to action one from the north [Cyrus], and he comes; from the rising of the sun he calls upon My name [recognizing that his victories have been granted to him by Me]. And he shall tread upon rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deputies as upon mortar and as the potter treads clay. [He comes with the suddenness of a comet, but none of the idol oracles of the nations has anticipated it.] [II Chron. 36:23; Ezra 1:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' [What idol] has declared this from the beginning, that we could know? And beforetime, that we could say that he is [unquestionably] right? Yes, there is none who declares it, yes, there is none who proclaims it; yes, [for the truth is, O you dumb idols] there is none who hears you speak!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' I [the Lord] first gave to Zion the announcement, Behold, [the Jews will be restored to their own land, and the man Cyrus shall be raised up who will deliver them] behold them! And to Jerusalem I gave a herald [Isaiah] bringing the good news. [Isa. 40:9; 52:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For I look [upon the heathen prophets and the priests of pagan practices] and there is no man among them [who could predict these events], and among these [idols] there is no counselor who, when I ask of him, can answer a word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Behold, these [pagan prophets and priests] are all emptiness (falseness and futility)! Their works are worthless; their molten images are empty wind (confusion and waste).'
