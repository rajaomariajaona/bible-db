document_id: 1TI.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' DO NOT sharply censure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rebuke an older man, but entreat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plead with him as [you would with] a father. Treat younger men like brothers;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And she must have a reputation for good deeds, as one who has brought up children, who has practiced hospitality to strangers [of the brotherhood], washed the feet of the saints, helped to relieve the distressed, [and] devoted herself diligently to doing good in every way.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But refuse [to enroll on this list the] younger widows, for when they become restive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their natural desires grow strong, they withdraw themselves against Christ [and] wish to marry [again].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And so they incur condemnation for having set aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' slighted their previous pledge.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, as they go about from house to house, they learn to be idlers, and not only idlers, but gossips and busybodies, saying what they should not say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talking of things they should not mention.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So I would have younger [widows] marry, bear children, guide the household, [and] not give opponents of the faith occasion for slander or reproach.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For already some [widows] have turned aside after Satan.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If any believing woman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or believing man
    - type: text
      text: ' has [relatives or persons in the household who are] widows, let him relieve them; let the church not be burdened [with them], so that it may [be free to] assist those who are truly widows (those who are all alone and are dependent).'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the elders who perform the duties of their office well be considered doubly worthy of honor [and of adequate financial support], especially those who labor faithfully in preaching and teaching.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Scripture says, You shall not muzzle an ox when it is treading out the grain, and again, The laborer is worthy of his hire. [Deut. 25:4; Luke 10:7.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Listen to no accusation [presented before a judge] against an elder unless it is confirmed by the testimony of two or three witnesses. [Deut. 19:15.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Treat] older women like mothers [and] younger women like sisters, in all purity.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for those who are guilty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persist in sin, rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' admonish them in the presence of all, so that the rest may be warned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stand in wholesome awe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I solemnly charge you in the presence of God and of Christ Jesus and of the chosen angels that you guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep [these rules] without personal prejudice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' favor, doing nothing from partiality.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not be in a hurry in the laying on of hands [giving the sanction of the church too hastily in reinstating expelled offenders or in ordination in questionable cases], nor share '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' participate in another man''s sins; keep yourself pure.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Drink water no longer exclusively, but use a little wine for the sake of your stomach and your frequent illnesses.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sins of some men are conspicuous (openly evident to all eyes), going before them to the judgment [seat] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proclaiming their sentence in advance; but the sins of others appear later [following the offender to the bar of judgment and coming into view there].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So also, good deeds are evident '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conspicuous, and even when they are not, they cannot remain hidden [indefinitely].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Always] treat with great consideration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give aid to those who are truly widowed (solitary and without support).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if a widow has children or grandchildren, see to it that these are first made to understand that it is their religious duty [to defray their natural obligation to those] at home, and make return to their parents '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' grandparents [for all their care by contributing to their maintenance], for this is acceptable in the sight of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now [a woman] who is a real widow and is left entirely alone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desolate has fixed her hope on God and perseveres in supplications and prayers night and day,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whereas she who lives in pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-gratification [giving herself up to luxury and self-indulgence] is dead even while she [still] lives.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Charge [the people] thus, so that they may be without reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blameless.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If anyone fails to provide for his relatives, and especially for those of his own family, he has disowned the faith [by failing to accompany it with fruits] and is worse than an unbeliever [who performs his obligation in these matters].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let no one be put on the roll of widows [who are to receive church support] who is under sixty years of age or who has been the wife of more than one man;'
