document_id: NUM.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE people grumbled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deplored their hardships, which was evil in the ears of the Lord, and when the Lord heard it, His anger was kindled; and the fire of the Lord burned among them and devoured those in the outlying parts of the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The people cried to Moses, and when Moses prayed to the Lord, the fire subsided.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He called the name of the place Taberah [burning], because the fire of the Lord burned among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the mixed multitude among them [the rabble who followed Israel from Egypt] began to lust greatly [for familiar and dainty food], and the Israelites wept again and said, Who will give us meat to eat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' We remember the fish we ate freely in Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without cost, the cucumbers, melons, leeks, onions, and garlic.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But now our soul (our strength) is dried up; there is nothing at all [in the way of food] to be seen but this manna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The manna was like coriander seed and its appearance was like that of bdellium [perhaps a precious stone].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The people went about and gathered it, and ground it in mills or beat it in mortars, and boiled it in pots, and made cakes of it; and it tasted like cakes baked with fresh oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when the dew fell on the camp in the night, the manna fell with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Moses heard the people weeping throughout their families, every man at the door of his tent; and the anger of the Lord blazed hotly, and in the eyes of Moses it was evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Moses said to the Lord, Why have You dealt ill with Your servants? And why have I not found favor in Your sight, that You lay the burden of all this people on me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Have I conceived all this people? Have I brought them forth, that You should say to me, Carry them in your bosom, as a nursing father carries the sucking child, to the land which You swore to their fathers [to give them]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Where should I get meat to give to all these people? For they weep before me and say, Give us meat, that we may eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I am not able to carry all these people alone, because the burden is too heavy for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And if this is the way You deal with me, kill me, I pray You, at once, and be granting me a favor and let me not see my wretchedness [in the failure of all my efforts].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord said to Moses, Gather for Me seventy men of the elders of Israel whom you know to be the elders of the people and officers over them; and bring them to the Tent of Meeting and let them stand there with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I will come down and talk with you there; and I will take of the Spirit which is upon you and will put It upon them; and they shall bear the burden of the people with you, so that you may not have to bear it yourself alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And say to the people, Consecrate yourselves for tomorrow, and you shall eat meat; for you have wept in the hearing of the Lord, saying, Who will give us meat to eat? For it was well with us in Egypt. Therefore the Lord will give you meat, and you shall eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You shall not eat one day, or two, or five, or ten, or twenty days,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But a whole month–until [you are satiated and vomit it up violently and] it comes out at your nostrils and is disgusting to you–because you have rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised the Lord Who is among you, and have wept before Him, saying, Why did we come out of Egypt? [Ps. 106:13-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But Moses said, The people among whom I am are 600,000 footmen [besides all the women and children], and You have said, I will give them meat, that they may eat a whole month!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Shall flocks and herds be killed to suffice them? Or shall all the fish of the sea be collected to satisfy them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The Lord said to Moses, Has the Lord''s hand (His ability and power) become short (thwarted and inadequate)? You shall see now whether My word shall come to pass for you or not. [Isa. 50:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So Moses went out and told the people the words of the Lord, and he gathered seventy men of the elders of the people and set them round about the Tent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the Lord came down in the cloud and spoke to him, and took of the Spirit that was upon him and put It upon the seventy elders; and when the Spirit rested upon them, they prophesied [sounding forth the praises of God and declaring His will]. Then they did so no more. [Num. 11:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But there remained two men in the camp named Eldad and Medad. The Spirit rested upon them, and they were of those who were selected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listed, yet they did not go out to the Tent [as told to do], but they prophesied in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And a young man ran to Moses and said, Eldad and Medad are prophesying [sounding forth the praises of God and declaring His will] in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Joshua son of Nun, the minister of Moses, one of his chosen men, said, My lord Moses, forbid them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But Moses said to him, Are you envious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' jealous for my sake? Would that all the Lord''s people were prophets and that the Lord would put His Spirit upon them! [Luke 9:49, 50.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Moses went back into the camp, he and the elders of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And there went forth a wind from the Lord and brought quails from the sea, and let them fall [so they flew low] beside the camp, about a day''s journey on this side and on the other side, all around the camp, about two cubits above the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the people rose all that day and all night and all the next day and caught '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gathered the quails. He who gathered least gathered ten homers; and they spread them out for themselves round about the camp [to cure them by drying].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' While the meat was yet between their teeth, before it was consumed, the anger of the Lord was kindled against the people, and the Lord smote them with a very great plague.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' That place was called Kibroth-hattaavah [the graves of sensuous desire], because there they buried the people who lusted, whose physical appetite caused them to sin. [I Cor. 10:1-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The Israelites journeyed from Kibroth-hattaavah to Hazeroth, where they remained.'
