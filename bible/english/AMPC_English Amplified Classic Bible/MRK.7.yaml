document_id: MRK.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THERE gathered together to [Jesus] the Pharisees and some of the scribes who had come from Jerusalem,'
  '10':
  - type: text
    content: ' For Moses said, Honor (revere with tenderness of feeling and deference) your father and your mother, and, He who curses '
  - type: text
    content: or
  - type: text
    content: ' reviles '
  - type: text
    content: or
  - type: text
    content: ' speaks evil of '
  - type: text
    content: or
  - type: text
    content: ' abuses '
  - type: text
    content: or
  - type: text
    content: ' treats improperly his father or mother, let him surely die. [Exod. 20:12; 21:17; Lev. 20:9; Deut. 5:16.]'
  '11':
  - type: text
    content: ' But [as for you] you say, A man is exempt if he tells [his] father or [his] mother, What you would otherwise have gained from me [everything I have that would have been of use to you] is Corban, that is, is a gift [already given as an offering to God],'
  '12':
  - type: text
    content: ' Then you no longer are permitting him to do anything for [his] father or mother [but are letting him off from helping them].'
  '13':
  - type: text
    content: ' Thus you are nullifying '
  - type: text
    content: and
  - type: text
    content: ' making void '
  - type: text
    content: and
  - type: text
    content: ' of no effect [the authority of] the Word of God through your tradition, which you [in turn] hand on. And many things of this kind you are doing.'
  '14':
  - type: text
    content: ' And He called the people to [Him] again and said to them, Listen to Me, all of you, and understand [what I say].'
  '15':
  - type: text
    content: ' There is not [even] one thing outside a man which by going into him can pollute '
  - type: text
    content: and
  - type: text
    content: ' defile him; but the things which come out of a man are what defile him '
  - type: text
    content: and
  - type: text
    content: ' make him unhallowed '
  - type: text
    content: and
  - type: text
    content: ' unclean.'
  '16':
  - type: text
    content: ' If any man has ears to hear, let him be listening [and let him perceive and comprehend by hearing].'
  '17':
  - type: text
    content: ' And when He had left the crowd and had gone into the house, His disciples began asking Him about the parable.'
  '18':
  - type: text
    content: ' And He said to them, Then are you also unintelligent '
  - type: text
    content: and
  - type: text
    content: ' dull '
  - type: text
    content: and
  - type: text
    content: ' without understanding? Do you not discern '
  - type: text
    content: and
  - type: text
    content: ' see that whatever goes into a man from the outside cannot make him unhallowed '
  - type: text
    content: or
  - type: text
    content: ' unclean,'
  '19':
  - type: text
    content: ' Since it does not reach '
  - type: text
    content: and
  - type: text
    content: ' enter his heart but [only his] digestive tract, and so passes on [into the place designed to receive waste]? Thus He was making '
  - type: text
    content: and
  - type: text
    content: ' declaring all foods [ceremonially] clean [that is, abolishing the ceremonial distinctions of the Levitical Law].'
  '2':
  - type: text
    content: ' For they had seen that some of His disciples ate with common hands, that is, unwashed [with hands defiled and unhallowed, because they had not given them a ceremonial washing]–'
  '20':
  - type: text
    content: ' And He said, What comes out of a man is what makes a man unclean '
  - type: text
    content: and
  - type: text
    content: ' renders [him] unhallowed.'
  '21':
  - type: text
    content: ' For from within, [that is] out of the hearts of men, come base '
  - type: text
    content: and
  - type: text
    content: ' wicked thoughts, sexual immorality, stealing, murder, adultery,'
  '22':
  - type: text
    content: ' Coveting (a greedy desire to have more wealth), dangerous '
  - type: text
    content: and
  - type: text
    content: ' destructive wickedness, deceit; unrestrained (indecent) conduct; an evil eye (envy), slander (evil speaking, malicious misrepresentation, abusiveness), pride (the sin of an uplifted heart against God and man), foolishness (folly, lack of sense, recklessness, thoughtlessness).'
  '23':
  - type: text
    content: ' All these evil [purposes and desires] come from within, and they make the man unclean '
  - type: text
    content: and
  - type: text
    content: ' render him unhallowed.'
  '24':
  - type: text
    content: ' And Jesus arose and went away from there to the region of Tyre '
  - type: text
    content: and Sidon.
  - type: text
    content: ' And He went into a house and did not want anyone to know [that He was there]; but it was not possible for Him to be hidden [from public notice].'
  '25':
  - type: text
    content: ' Instead, at once, a woman whose little daughter had (was under the control of) an unclean spirit heard about Him and came and flung herself down at His feet.'
  '26':
  - type: text
    content: ' Now the woman was a Greek (Gentile), a Syrophoenician by nationality. And she kept begging Him to drive the demon out of her little daughter.'
  '27':
  - type: text
    content: ' And He said to her, First let the children be fed, for it is not becoming '
  - type: text
    content: or
  - type: text
    content: ' proper '
  - type: text
    content: or
  - type: text
    content: ' right to take the children''s bread and throw it to the [little house] dogs.'
  '28':
  - type: text
    content: ' But she answered Him, Yes, Lord, yet even the small pups under the table eat the little children''s scraps of food.'
  '29':
  - type: text
    content: ' And He said to her, Because of this saying, you may go your way; the demon has gone out of your daughter [permanently].'
  '3':
  - type: text
    content: ' For the Pharisees and all of the Jews do not eat unless [merely for ceremonial reasons] they wash their hands [diligently up to the elbow] with clenched fist, adhering [carefully and faithfully] to the tradition of [practices and customs handed down to them by] their forefathers [to be observed].'
  '30':
  - type: text
    content: ' And she went home and found the child thrown on the couch, and the demon departed.'
  '31':
  - type: text
    content: ' Soon after this, Jesus, coming back from the region of Tyre, passed through Sidon on to the Sea of Galilee, through the region of Decapolis [the ten cities].'
  '32':
  - type: text
    content: ' And they brought to Him a man who was deaf and had difficulty in speaking, and they begged Jesus to place His hand upon him.'
  '33':
  - type: text
    content: ' And taking him aside from the crowd [privately], He thrust His fingers into the man''s ears and spat and touched his tongue;'
  '34':
  - type: text
    content: ' And looking up to heaven, He sighed as He said, Ephphatha, which means, Be opened!'
  '35':
  - type: text
    content: ' And his ears were opened, his tongue was loosed, and he began to speak distinctly '
  - type: text
    content: and
  - type: text
    content: ' as he should.'
  '36':
  - type: text
    content: ' And Jesus [in His own interest] admonished '
  - type: text
    content: and
  - type: text
    content: ' ordered them sternly '
  - type: text
    content: and
  - type: text
    content: ' expressly to tell no one; but the more He commanded them, the more zealously they proclaimed it.'
  '37':
  - type: text
    content: ' And they were overwhelmingly astonished, saying, He has done everything excellently (commendably and nobly)! He even makes the deaf to hear and the dumb to speak!'
  '4':
  - type: text
    content: ' And [when they come] from the marketplace, they do not eat unless they purify themselves; and there are many other traditions [oral, man-made laws handed down to them, which they observe faithfully and diligently, such as], the washing of cups and wooden pitchers and widemouthed jugs and utensils of copper and beds–'
  '5':
  - type: text
    content: ' And the Pharisees and scribes kept asking [Jesus], Why do Your disciples not order their way of living according to the tradition handed down by the forefathers [to be observed], but eat with hands unwashed '
  - type: text
    content: and
  - type: text
    content: ' ceremonially not purified?'
  '6':
  - type: text
    content: ' But He said to them, Excellently '
  - type: text
    content: and
  - type: text
    content: ' truly [so that there will be no room for blame] did Isaiah prophesy of you, the pretenders '
  - type: text
    content: and
  - type: text
    content: ' hypocrites, as it stands written: These people [constantly] honor Me with their lips, but their hearts hold off '
  - type: text
    content: and
  - type: text
    content: ' are far distant from Me.'
  '7':
  - type: text
    content: ' In vain (fruitlessly and without profit) do they worship Me, ordering '
  - type: text
    content: and
  - type: text
    content: ' teaching [to be obeyed] as doctrines the commandments '
  - type: text
    content: and
  - type: text
    content: ' precepts of men. [Isa. 29:13.]'
  '8':
  - type: text
    content: ' You disregard '
  - type: text
    content: and
  - type: text
    content: ' give up '
  - type: text
    content: and
  - type: text
    content: ' ask to depart from you the commandment of God and cling to the tradition of men [keeping it carefully and faithfully].'
  '9':
  - type: text
    content: ' And He said to them, You have a fine way of rejecting [thus thwarting and nullifying and doing away with] the commandment of God in order to keep your tradition (your own human regulations)!'
