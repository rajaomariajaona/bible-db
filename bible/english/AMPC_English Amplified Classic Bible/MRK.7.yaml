document_id: MRK.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THERE gathered together to [Jesus] the Pharisees and some of the scribes who had come from Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For they had seen that some of His disciples ate with common hands, that is, unwashed [with hands defiled and unhallowed, because they had not given them a ceremonial washing]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the Pharisees and all of the Jews do not eat unless [merely for ceremonial reasons] they wash their hands [diligently up to the elbow] with clenched fist, adhering [carefully and faithfully] to the tradition of [practices and customs handed down to them by] their forefathers [to be observed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And [when they come] from the marketplace, they do not eat unless they purify themselves; and there are many other traditions [oral, man-made laws handed down to them, which they observe faithfully and diligently, such as], the washing of cups and wooden pitchers and widemouthed jugs and utensils of copper and beds–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Pharisees and scribes kept asking [Jesus], Why do Your disciples not order their way of living according to the tradition handed down by the forefathers [to be observed], but eat with hands unwashed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ceremonially not purified?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But He said to them, Excellently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truly [so that there will be no room for blame] did Isaiah prophesy of you, the pretenders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hypocrites, as it stands written: These people [constantly] honor Me with their lips, but their hearts hold off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are far distant from Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In vain (fruitlessly and without profit) do they worship Me, ordering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaching [to be obeyed] as doctrines the commandments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precepts of men. [Isa. 29:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You disregard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ask to depart from you the commandment of God and cling to the tradition of men [keeping it carefully and faithfully].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And He said to them, You have a fine way of rejecting [thus thwarting and nullifying and doing away with] the commandment of God in order to keep your tradition (your own human regulations)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For Moses said, Honor (revere with tenderness of feeling and deference) your father and your mother, and, He who curses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reviles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' speaks evil of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' abuses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treats improperly his father or mother, let him surely die. [Exod. 20:12; 21:17; Lev. 20:9; Deut. 5:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But [as for you] you say, A man is exempt if he tells [his] father or [his] mother, What you would otherwise have gained from me [everything I have that would have been of use to you] is Corban, that is, is a gift [already given as an offering to God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then you no longer are permitting him to do anything for [his] father or mother [but are letting him off from helping them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Thus you are nullifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' making void '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of no effect [the authority of] the Word of God through your tradition, which you [in turn] hand on. And many things of this kind you are doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And He called the people to [Him] again and said to them, Listen to Me, all of you, and understand [what I say].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' There is not [even] one thing outside a man which by going into him can pollute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defile him; but the things which come out of a man are what defile him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make him unhallowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If any man has ears to hear, let him be listening [and let him perceive and comprehend by hearing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when He had left the crowd and had gone into the house, His disciples began asking Him about the parable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And He said to them, Then are you also unintelligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dull '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without understanding? Do you not discern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' see that whatever goes into a man from the outside cannot make him unhallowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unclean,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Since it does not reach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enter his heart but [only his] digestive tract, and so passes on [into the place designed to receive waste]? Thus He was making '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declaring all foods [ceremonially] clean [that is, abolishing the ceremonial distinctions of the Levitical Law].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And He said, What comes out of a man is what makes a man unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renders [him] unhallowed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For from within, [that is] out of the hearts of men, come base '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked thoughts, sexual immorality, stealing, murder, adultery,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Coveting (a greedy desire to have more wealth), dangerous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destructive wickedness, deceit; unrestrained (indecent) conduct; an evil eye (envy), slander (evil speaking, malicious misrepresentation, abusiveness), pride (the sin of an uplifted heart against God and man), foolishness (folly, lack of sense, recklessness, thoughtlessness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' All these evil [purposes and desires] come from within, and they make the man unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' render him unhallowed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Jesus arose and went away from there to the region of Tyre '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and Sidon.
  - type: text
    text: ' And He went into a house and did not want anyone to know [that He was there]; but it was not possible for Him to be hidden [from public notice].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Instead, at once, a woman whose little daughter had (was under the control of) an unclean spirit heard about Him and came and flung herself down at His feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Now the woman was a Greek (Gentile), a Syrophoenician by nationality. And she kept begging Him to drive the demon out of her little daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And He said to her, First let the children be fed, for it is not becoming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' proper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right to take the children''s bread and throw it to the [little house] dogs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But she answered Him, Yes, Lord, yet even the small pups under the table eat the little children''s scraps of food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And He said to her, Because of this saying, you may go your way; the demon has gone out of your daughter [permanently].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And she went home and found the child thrown on the couch, and the demon departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Soon after this, Jesus, coming back from the region of Tyre, passed through Sidon on to the Sea of Galilee, through the region of Decapolis [the ten cities].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And they brought to Him a man who was deaf and had difficulty in speaking, and they begged Jesus to place His hand upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And taking him aside from the crowd [privately], He thrust His fingers into the man''s ears and spat and touched his tongue;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And looking up to heaven, He sighed as He said, Ephphatha, which means, Be opened!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And his ears were opened, his tongue was loosed, and he began to speak distinctly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' as he should.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And Jesus [in His own interest] admonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordered them sternly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expressly to tell no one; but the more He commanded them, the more zealously they proclaimed it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they were overwhelmingly astonished, saying, He has done everything excellently (commendably and nobly)! He even makes the deaf to hear and the dumb to speak!'
