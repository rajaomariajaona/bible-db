document_id: GEN.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW THE serpent was more subtle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crafty than any living creature of the field which the Lord God had made. And he [Satan] said to the woman, Can it really be that God has said, You shall not eat from every tree of the garden? [Rev. 12:9-11.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, I heard the sound of You [walking] in the garden, and I was afraid because I was naked; and I hid myself.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, Who told you that you were naked? Have you eaten of the tree of which I commanded you that you should not eat?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the man said, The woman whom You gave to be with me–she gave me [fruit] from the tree, and I ate.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord God said to the woman, What is this you have done? And the woman said, The serpent beguiled (cheated, outwitted, and deceived) me, and I ate.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord God said to the serpent, Because you have done this, you are cursed above all [domestic] animals and above every [wild] living thing of the field; upon your belly you shall go, and you shall eat dust [and what it contains] all the days of your life.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will put enmity between you and the woman, and between your offspring and her Offspring; He will bruise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tread your head underfoot, and you will lie in wait '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bruise His heel. [Gal. 4:4.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To the woman He said, I will greatly multiply your grief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your suffering in pregnancy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the pangs of childbearing; with spasms of distress you will bring forth children. Yet your desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' craving will be for your husband, and he will rule over you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And to Adam He said, Because you have listened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given heed to the voice of your wife and have eaten of the tree of which I commanded you, saying, You shall not eat of it, the ground is under a curse because of you; in sorrow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' toil shall you eat [of the fruits] of it all the days of your life.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thorns also and thistles shall it bring forth for you, and you shall eat the plants of the field.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the sweat of your face shall you eat bread until you return to the ground, for out of it you were taken; for dust you are and to dust you shall return.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the woman said to the serpent, We may eat the fruit from the trees of the garden,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The man called his wife''s name Eve [life spring], because she was the mother of all the living.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Adam also and for his wife the Lord God made long coats (tunics) of skins and clothed them.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord God said, Behold, the man has become like one of Us [the Father, Son, and Holy Spirit], to know [how to distinguish between] good and evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessing and calamity; and now, lest he put forth his hand and take also from the tree of life and eat, and live forever–'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore the Lord God sent him forth from the Garden of Eden to till the ground from which he was taken.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So [God] drove out the man; and He placed at the east of the Garden of Eden the cherubim and a flaming sword which turned every way, to keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guard the way to the tree of life. [Rev. 2:7; 22:2, 14, 19.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Except the fruit from the tree which is in the middle of the garden. God has said, You shall not eat of it, neither shall you touch it, lest you die.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the serpent said to the woman, You shall not surely die, [II Cor. 11:3.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For God knows that in the day you eat of it your eyes will be opened, and you will be like God, knowing the difference between good and evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessing and calamity.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the woman saw that the tree was good (suitable, pleasant) for food and that it was delightful to look at, and a tree to be desired in order to make one wise, she took of its fruit and ate; and she gave some also to her husband, and he ate.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the eyes of them both were opened, and they knew that they were naked; and they sewed fig leaves together and made themselves apronlike girdles.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they heard the sound of the Lord God walking in the garden in the cool of the day, and Adam and his wife hid themselves from the presence of the Lord God among the trees of the garden.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the Lord God called to Adam and said to him, Where are you?'
