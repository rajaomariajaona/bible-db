document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHOEVER LOVES instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction loves knowledge, but he who hates reproof is like a brute beast, stupid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indiscriminating.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A good man obtains favor from the Lord, but a man of wicked devices He condemns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A man shall not be established by wickedness, but the root of the [uncompromisingly] righteous shall never be moved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' A virtuous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthy wife [earnest and strong in character] is a crowning joy to her husband, but she who makes him ashamed is as rottenness in his bones. [Prov. 31:23; I Cor. 11:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposes of the [consistently] righteous are honest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reliable, but the counsels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' designs of the wicked are treacherous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The words of the wicked lie in wait for blood, but the mouth of the upright shall deliver them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the innocent ones [thus endangered].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The wicked are overthrown and are not, but the house of the [uncompromisingly] righteous shall stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' A man shall be commended according to his Wisdom [godly Wisdom, which is comprehensive insight into the ways and purposes of God], but he who is of a perverse heart shall be despised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Better is he who is lightly esteemed but works for his own support than he who assumes honor for himself and lacks bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' A [consistently] righteous man regards the life of his beast, but even the tender mercies of the wicked are cruel. [Deut. 25:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He who tills his land shall be satisfied with bread, but he who follows worthless pursuits is lacking in sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is without understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The wicked desire the booty of evil men, but the root of the [uncompromisingly] righteous yields [richer fruitage].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The wicked is [dangerously] snared by the transgression of his lips, but the [uncompromisingly] righteous shall come out of trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' From the fruit of his words a man shall be satisfied with good, and the work of a man''s hands shall come back to him [as a harvest].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The way of a fool is right in his own eyes, but he who listens to counsel is wise. [Prov. 3:7; 9:9; 21:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' A fool''s wrath is quickly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly known, but a prudent man ignores an insult.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He who breathes out truth shows forth righteousness (uprightness and right standing with God), but a false witness utters deceit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' There are those who speak rashly, like the piercing of a sword, but the tongue of the wise brings healing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Truthful lips shall be established forever, but a lying tongue is [credited] but for a moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Deceit is in the hearts of those who devise evil, but for the counselors of peace there is joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' No [actual] evil, misfortune, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' calamity shall come upon the righteous, but the wicked shall be filled with evil, misfortune, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity. [Job 5:19; Ps. 91:3; Prov. 12:13; Isa. 46:4; Jer. 1:8; Dan. 6:27; II Tim. 4:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Lying lips are extremely disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hateful to the Lord, but they who deal faithfully are His delight. [Prov. 6:17; 11:20; Rev. 22:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' A prudent man is reluctant to display his knowledge, but the heart of [self-confident] fools proclaims their folly. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The hand of the diligent will rule, but the slothful will be put to forced labor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Anxiety in a man''s heart weighs it down, but an encouraging word makes it glad. [Ps. 50:4; Prov. 15:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The [consistently] righteous man is a guide to his neighbor, but the way of the wicked causes others to go astray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The slothful man does not catch his game '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' roast it once he kills it, but the diligent man gets precious possessions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Life is in the way of righteousness (moral and spiritual rectitude in every area and relation), and in its pathway there is no death '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' immortality (perpetual, eternal life). [John 3:36; 4:36; 8:51; 11:26; I Cor. 15:54; Gal. 6:8.]'
