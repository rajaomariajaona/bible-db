document_id: PSA.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A song; a Psalm of the sons of Korah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GREAT IS the Lord, and highly to be praised in the city of our God! His holy mountain,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beautiful in elevation, is the joy of all the earth–Mount Zion [the City of David], to the northern side [Mount Moriah and the temple], the [whole] city of the Great King! [Matt. 5:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' God has made Himself known in her palaces as a Refuge (a High Tower and a Stronghold).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For, behold, the kings assembled, they came onward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they passed away together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They looked, they were amazed; they were stricken with terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' took to flight [affrighted and dismayed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Trembling took hold of them there, and pain as of a woman in childbirth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' With the east wind You shattered the ships of Tarshish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As we have heard, so have we seen in the city of the Lord of hosts, in the city of our God: God will establish it forever. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' We have thought of Your steadfast love, O God, in the midst of Your temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As is Your name, O God, so is Your praise to the ends of the earth; Your right hand is full of righteousness (rightness and justice).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let Mount Zion be glad! Let the daughters of Judah rejoice because of Your [righteous] judgments!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Walk about Zion, and go round about her, number her towers (her lofty and noble deeds of past days),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Consider well her ramparts, go through her palaces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' citadels, that you may tell the next generation [and cease recalling disappointments].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For this God is our God forever and ever; He will be our guide [even] until death.'
