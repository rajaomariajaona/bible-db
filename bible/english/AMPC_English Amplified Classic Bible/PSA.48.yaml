document_id: PSA.48,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A song; a Psalm of the sons of Korah.
  - type: text
    content: ' GREAT IS the Lord, and highly to be praised in the city of our God! His holy mountain,'
  '10':
  - type: text
    content: ' As is Your name, O God, so is Your praise to the ends of the earth; Your right hand is full of righteousness (rightness and justice).'
  '11':
  - type: text
    content: ' Let Mount Zion be glad! Let the daughters of Judah rejoice because of Your [righteous] judgments!'
  '12':
  - type: text
    content: ' Walk about Zion, and go round about her, number her towers (her lofty and noble deeds of past days),'
  '13':
  - type: text
    content: ' Consider well her ramparts, go through her palaces '
  - type: text
    content: and
  - type: text
    content: ' citadels, that you may tell the next generation [and cease recalling disappointments].'
  '14':
  - type: text
    content: ' For this God is our God forever and ever; He will be our guide [even] until death.'
  '2':
  - type: text
    content: ' Fair '
  - type: text
    content: and
  - type: text
    content: ' beautiful in elevation, is the joy of all the earth–Mount Zion [the City of David], to the northern side [Mount Moriah and the temple], the [whole] city of the Great King! [Matt. 5:35.]'
  '3':
  - type: text
    content: ' God has made Himself known in her palaces as a Refuge (a High Tower and a Stronghold).'
  '4':
  - type: text
    content: ' For, behold, the kings assembled, they came onward '
  - type: text
    content: and
  - type: text
    content: ' they passed away together.'
  '5':
  - type: text
    content: ' They looked, they were amazed; they were stricken with terror '
  - type: text
    content: and
  - type: text
    content: ' took to flight [affrighted and dismayed].'
  '6':
  - type: text
    content: ' Trembling took hold of them there, and pain as of a woman in childbirth.'
  '7':
  - type: text
    content: ' With the east wind You shattered the ships of Tarshish.'
  '8':
  - type: text
    content: ' As we have heard, so have we seen in the city of the Lord of hosts, in the city of our God: God will establish it forever. Selah [pause, and calmly think of that]!'
  '9':
  - type: text
    content: ' We have thought of Your steadfast love, O God, in the midst of Your temple.'
