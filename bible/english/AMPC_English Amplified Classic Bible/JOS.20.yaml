document_id: JOS.20,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' said also to Joshua,'
  '2':
  - type: text
    content: ' Say to the Israelites, Appoint among you cities of refuge, of which I spoke to you through Moses,'
  '3':
  - type: text
    content: ' That the slayer who kills anyone accidentally and unintentionally may flee there; and they shall be your refuge from the avenger of blood. [Num. 35:10ff.]'
  '4':
  - type: text
    content: ' He who flees to one of those cities shall stand at the entrance of the gate of the city and explain his case to the elders of that city; they shall receive him to [the protection of] that city and give him a place to dwell among them.'
  '5':
  - type: text
    content: ' If the avenger of blood pursues him, they shall not deliver the slayer into his hand, because he killed his neighbor unintentionally, having had no hatred for him previously.'
  '6':
  - type: text
    content: ' And he shall dwell in that city until he has been tried before the congregation and until the death of him who is the high priest in those days. Then the slayer shall return to his own city from which he fled and to his own house.'
  '7':
  - type: text
    content: ' And they set apart '
  - type: text
    content: and
  - type: text
    content: ' consecrated Kedesh in Galilee in the hill country of Naphtali and Shechem in the hill country of Ephraim and Kiriath-arba (that is, Hebron) in the hill country of Judah.'
  '8':
  - type: text
    content: ' Beyond the Jordan east of Jericho they appointed Bezer in the wilderness tableland from the tribe of Reuben, and Ramoth in Gilead from the tribe of Gad, and Golan in Bashan from the tribe of Manasseh.'
  '9':
  - type: text
    content: ' These cities were for all the Israelites and the stranger sojourning among them, that whoever killed a person unintentionally might flee there and not be slain by the avenger of blood until he had been tried before the congregation.'
