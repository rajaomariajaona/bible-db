document_id: JOS.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said also to Joshua,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites, Appoint among you cities of refuge, of which I spoke to you through Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' That the slayer who kills anyone accidentally and unintentionally may flee there; and they shall be your refuge from the avenger of blood. [Num. 35:10ff.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He who flees to one of those cities shall stand at the entrance of the gate of the city and explain his case to the elders of that city; they shall receive him to [the protection of] that city and give him a place to dwell among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If the avenger of blood pursues him, they shall not deliver the slayer into his hand, because he killed his neighbor unintentionally, having had no hatred for him previously.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he shall dwell in that city until he has been tried before the congregation and until the death of him who is the high priest in those days. Then the slayer shall return to his own city from which he fled and to his own house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrated Kedesh in Galilee in the hill country of Naphtali and Shechem in the hill country of Ephraim and Kiriath-arba (that is, Hebron) in the hill country of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Beyond the Jordan east of Jericho they appointed Bezer in the wilderness tableland from the tribe of Reuben, and Ramoth in Gilead from the tribe of Gad, and Golan in Bashan from the tribe of Manasseh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' These cities were for all the Israelites and the stranger sojourning among them, that whoever killed a person unintentionally might flee there and not be slain by the avenger of blood until he had been tried before the congregation.'
