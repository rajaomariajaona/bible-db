document_id: PSA.59
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." Of David, a record of memorable thoughts when Saul sent men to watch his house in order to kill him.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DELIVER ME from my enemies, O my God; defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect me from those who rise up against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Deliver me from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lift me above those who work evil and save me from bloodthirsty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For, behold, they lie in wait for my life; fierce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty men are banding together against me, not for my transgression nor for any sin of mine, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They run and prepare themselves, though there is no fault in me; rouse Yourself [O Lord] to meet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help me, and see!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You, O Lord God of hosts, the God of Israel, arise to visit all the nations; spare none '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be not merciful to any who treacherously plot evil. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They return at evening, they howl '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' snarl like dogs, and go [prowling] about the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold, they belch out [insults] with their mouths; swords [of sarcasm, ridicule, slander, and lies] are in their lips, for who, they think, hears us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But You, O Lord, will laugh at them [in scorn]; You will hold all the nations in derision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O my Strength, I will watch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give heed to You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sing praises; for God is my Defense (my Protector and High Tower).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' My God in His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love will meet me; God will let me look [triumphantly] on my enemies (those who lie in wait for me).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Slay them not, lest my people forget; scatter them by Your power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make them wander to and fro, and bring them down, O Lord our Shield!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For the sin of their mouths and the words of their lips, let them even be trapped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken in their pride, and for the cursing and lying which they utter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Consume them in wrath, consume them so that they shall be no more; and let them know unto the ends of the earth that God rules over Jacob (Israel). Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And at evening let them return; let them howl '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' snarl like dogs, and go prowling about the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Let them wander up and down for food and tarry all night if they are not satisfied (not getting their fill).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But I will sing of Your mighty strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; yes, I will sing aloud of Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness in the morning; for You have been to me a defense (a fortress and a high tower) and a refuge in the day of my distress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Unto You, O my Strength, I will sing praises; for God is my Defense, my Fortress, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' High Tower, the God Who shows me mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love.'
