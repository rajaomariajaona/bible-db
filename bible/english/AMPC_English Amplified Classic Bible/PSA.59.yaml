document_id: PSA.59,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." Of David, a record of memorable thoughts when Saul sent men to watch his house in order to kill him.
  - type: text
    content: ' DELIVER ME from my enemies, O my God; defend '
  - type: text
    content: and
  - type: text
    content: ' protect me from those who rise up against me.'
  '10':
  - type: text
    content: ' My God in His mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love will meet me; God will let me look [triumphantly] on my enemies (those who lie in wait for me).'
  '11':
  - type: text
    content: ' Slay them not, lest my people forget; scatter them by Your power '
  - type: text
    content: and
  - type: text
    content: ' make them wander to and fro, and bring them down, O Lord our Shield!'
  '12':
  - type: text
    content: ' For the sin of their mouths and the words of their lips, let them even be trapped '
  - type: text
    content: and
  - type: text
    content: ' taken in their pride, and for the cursing and lying which they utter.'
  '13':
  - type: text
    content: ' Consume them in wrath, consume them so that they shall be no more; and let them know unto the ends of the earth that God rules over Jacob (Israel). Selah [pause, and calmly think of that]!'
  '14':
  - type: text
    content: ' And at evening let them return; let them howl '
  - type: text
    content: and
  - type: text
    content: ' snarl like dogs, and go prowling about the city.'
  '15':
  - type: text
    content: ' Let them wander up and down for food and tarry all night if they are not satisfied (not getting their fill).'
  '16':
  - type: text
    content: ' But I will sing of Your mighty strength '
  - type: text
    content: and
  - type: text
    content: ' power; yes, I will sing aloud of Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness in the morning; for You have been to me a defense (a fortress and a high tower) and a refuge in the day of my distress.'
  '17':
  - type: text
    content: ' Unto You, O my Strength, I will sing praises; for God is my Defense, my Fortress, '
  - type: text
    content: and
  - type: text
    content: ' High Tower, the God Who shows me mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love.'
  '2':
  - type: text
    content: ' Deliver me from '
  - type: text
    content: and
  - type: text
    content: ' lift me above those who work evil and save me from bloodthirsty men.'
  '3':
  - type: text
    content: ' For, behold, they lie in wait for my life; fierce '
  - type: text
    content: and
  - type: text
    content: ' mighty men are banding together against me, not for my transgression nor for any sin of mine, O Lord.'
  '4':
  - type: text
    content: ' They run and prepare themselves, though there is no fault in me; rouse Yourself [O Lord] to meet '
  - type: text
    content: and
  - type: text
    content: ' help me, and see!'
  '5':
  - type: text
    content: ' You, O Lord God of hosts, the God of Israel, arise to visit all the nations; spare none '
  - type: text
    content: and
  - type: text
    content: ' be not merciful to any who treacherously plot evil. Selah [pause, and calmly think of that]!'
  '6':
  - type: text
    content: ' They return at evening, they howl '
  - type: text
    content: and
  - type: text
    content: ' snarl like dogs, and go [prowling] about the city.'
  '7':
  - type: text
    content: ' Behold, they belch out [insults] with their mouths; swords [of sarcasm, ridicule, slander, and lies] are in their lips, for who, they think, hears us?'
  '8':
  - type: text
    content: ' But You, O Lord, will laugh at them [in scorn]; You will hold all the nations in derision.'
  '9':
  - type: text
    content: ' O my Strength, I will watch '
  - type: text
    content: and
  - type: text
    content: ' give heed to You '
  - type: text
    content: and
  - type: text
    content: ' sing praises; for God is my Defense (my Protector and High Tower).'
