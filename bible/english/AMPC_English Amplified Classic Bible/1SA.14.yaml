document_id: 1SA.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ONE DAY Jonathan son of Saul said to his armor-bearer, Come, let us go over to the Philistine garrison on the other side. But he did not tell his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Saul was remaining in the outskirts of Gibeah under a pomegranate tree in Migron; and with him were about 600 men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Ahijah son of Ahitub, Ichabod''s brother, the son of Phinehas, the son of Eli, the Lord''s priest in Shiloh, was wearing the ephod. And the people did not know that Jonathan was gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Between the passes by which Jonathan sought to go over to the Philistine garrison there was a rocky crag on the one side and a rocky crag on the other side; one was named Bozez, and the other Seneh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The one crag rose on the north in front of Michmash, and the other on the south in front of Geba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Jonathan said to his young armor-bearer, Come, and let us go over to the garrison of these uncircumcised; it may be that the Lord will work for us. For there is nothing to prevent the Lord from saving by many or by few.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And his armor-bearer said to him, Do all that is in your mind; I am with you in whatever you think [best].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Jonathan said, We will pass over to these men and we will let them see us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If they say to us, Wait until we come to you, then we will stand still in our place and will not go up to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But if they say, Come up to us, we will go up, for the Lord has delivered them into our hand, and this will be our sign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So both of them let the Philistine garrison see them. And the Philistines said, Behold, the Hebrews are coming out of the holes where they have hidden themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The garrison men said to Jonathan and his armor-bearer, Come up to us and we will show you a thing. Jonathan said to his armor-bearer, Come up after me, for the Lord has given them into Israel''s hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Jonathan climbed up on his hands and feet, his armor-bearer after him; and the enemy fell before Jonathan, and his armor-bearer killed them after him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And that first slaughter which Jonathan and his armor-bearer made was about twenty men within about a half acre of land [which a yoke of oxen might plow].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And there was trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' panic in the [Philistine] camp, in the field, and among all the men; the garrison, and even the raiders trembled; the earth quaked, and it became a terror from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Saul''s watchmen in Gibeah of Benjamin looked, and behold, the multitude melted away and went hither and thither.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Saul said to the men with him, Number and see who is gone from us. When they numbered, behold, Jonathan and his armor-bearer were missing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Saul said to Ahijah, Bring here the ark of God–for at that time the ark of God was with the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' While Saul talked to the priest, the tumult in the Philistine camp kept increasing. Then Saul said to the priest, Withdraw your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Saul and all the people with him rallied and went into the battle, and behold, every [Philistine''s] sword was against his fellow in wild confusion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Moreover, the Hebrews who were with the Philistines before that time, who went up with them into the camp from the country round about, even they also turned to be with the Israelites who were with Saul and Jonathan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Likewise, all the men of Israel who had hid themselves in the hill country of Ephraim, when they heard that the Philistines fled, they also went after them in hot pursuit in the battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So the Lord delivered Israel that day, and the battle passed beyond Beth-aven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the men of Israel were distressed that day, for Saul had caused them to take an oath, saying, Cursed be the man who eats any food before evening and until I have taken vengeance on my enemies. So none of the men tasted any food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And all the people of the land came to a wood, and there was honey on the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When the men entered the wood, behold, the honey was dripping, but no man tasted it, for the men feared the oath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But Jonathan had not heard when his father charged the people with the oath. So he dipped the end of the rod in his hand into a honeycomb and put it to his mouth, and his [weary] eyes brightened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then one of the men told him, Your father strictly charged the men with an oath, saying, Cursed be the man who eats any food today. And the people were exhausted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then Jonathan said, My father has troubled the land. See how my eyes have brightened because I tasted a little of this honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' How much better if the men had eaten freely today of the spoil of their enemies which they found! For now the slaughter of the Philistines has not been great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' They smote the Philistines that day from Michmash to Aijalon. And the people were very faint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' [When night came and the oath expired] the men flew upon the spoil. They took sheep, oxen, and calves, slew them on the ground, and ate them [raw] with the blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then Saul was told, Behold, the men are sinning against the Lord by eating with the blood. And he said, You have transgressed; roll a great stone to me here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Saul said, Disperse yourselves among the people and tell them, Bring me every man his ox or his sheep, and butcher them here and eat; and sin not against the Lord by eating the blood. So all the men brought each one his ox that night and butchered it there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And Saul built an altar to the Lord; it was the first altar he built to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then Saul said, Let us go down after the Philistines by night and seize and plunder them until daylight, and let us not leave a man of them. They said, Do whatever seems good to you. Then the priest said, Let us draw near here to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And Saul asked counsel of God, Shall I go down after the Philistines? Will You deliver them into the hand of Israel? But He did not answer him that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then Saul said, Draw near, all the chiefs of the people, and let us see how this sin [causing God''s silence] arose today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' For as the Lord lives, Who delivers Israel, though it be in Jonathan my son, he shall surely die. But not a man among all the people answered him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Then he said to all Israel, You be on one side; and I and Jonathan my son will be on the other side. The people said to Saul, Do what seems good to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Therefore Saul said to the Lord, the God of Israel, Give a perfect lot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show the right. And Saul and Jonathan were taken [by lot], but the other men went free.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Saul said, Cast lots between me and Jonathan my son. And Jonathan was taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Saul said to Jonathan, Tell me what you have done. And Jonathan said, I tasted a little honey with the end of the rod that was in my hand. And behold, I must die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Saul answered, May God do so, and more also, for you shall surely die, Jonathan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' But the people said to Saul, Shall Jonathan, who has wrought this great deliverance to Israel, die? God forbid! As the Lord lives, there shall not one hair of his head perish, for he has wrought this great deliverance with God this day. So the people rescued Jonathan, and he did not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Then Saul ceased pursuing the Philistines, and they went to their own place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' When Saul took over the kingdom of Israel, he fought against all his enemies on every side: Moab, the Ammonites, Edom, the kings of Zobah, and the Philistines. Wherever he turned, he made it worse for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' He did valiantly and smote the Amalekites, and delivered Israel out of the hands of those who plundered them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Now Saul''s sons were Jonathan, Ishvi, and Malchi-shua; and the names of his two daughters were, of the firstborn, Merab; and of the younger, Michal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' The name of Saul''s wife was Ahinoam daughter of Ahimaaz. The commander of his army was Abner son of Ner, Saul''s uncle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Kish the father of Saul and Ner the father of Abner were sons of Abiel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' There was severe war against the Philistines all the days of Saul, and whenever Saul saw any mighty or [outstandingly] courageous man, he attached him to himself.'
