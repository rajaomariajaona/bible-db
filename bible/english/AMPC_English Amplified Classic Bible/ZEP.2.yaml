document_id: ZEP.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' COLLECT YOUR thoughts, yes, unbend yourselves [in submission and see if there is no sense of shame and no consciousness of sin left in you], O shameless nation [not desirous or desired]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [The time for repentance is speeding by like chaff whirled before the wind!] Therefore consider, before God''s decree brings forth [the curse upon you], before the time [to repent] is gone like the drifting chaff, before the fierce anger of the Lord comes upon you–yes, before the day of the wrath of the Lord comes upon you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Seek the Lord [inquire for Him, inquire of Him, and require Him as the foremost necessity of your life], all you humble of the land who have acted in compliance with His revealed will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have kept His commandments; seek righteousness, seek humility [inquire for them, require them as vital]. It may be you will be hidden in the day of the Lord''s anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For [hear the fate of the Philistines:] Gaza shall be forsaken and Ashkelon shall become a desolation; the people of Ashdod shall be driven out at noonday and Ekron shall be uprooted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Woe to the inhabitants of the seacoast, the nation of the Cherethites [in Philistia]! The word of the Lord is against you, O Canaan, land of the Philistines; I will destroy you until no inhabitant is left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the seacoast shall be pastures, with [deserted] dwelling places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' caves for shepherds and folds for flocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The seacoast shall belong to the remnant of the house of Judah; they shall pasture their flocks upon it; in the houses of [deserted Philistine] Ashkelon shall they of Judah lie down in the evening. For the Lord their [Judah''s] God shall visit them [for their relief] and restore them from their captivity. [Isa. 14:29-31; Amos 1:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I have heard the taunts of Moab and the revilings of the Ammonites by which they have reproached My people, and magnified themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made boasts against their territory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore, as I live, says the Lord of hosts, the God of Israel, Moab shall become like Sodom and the Ammonites like Gomorrah, a land possessed by nettles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wild vetches and salt pits, and a perpetual desolation. The remnant of My people shall make a prey of them and what is left of My nation shall possess them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' This shall they have for their pride, because they have taunted and boasted against the people of the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord will be terrible to them, for He will make lean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famish all the gods of the earth; and men shall worship Him, every one from his place, even all the isles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands of the nations. [Joel 2:11; Zeph. 1:4; 3:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You Ethiopians also, you shall be slain by My sword. [Isa. 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And [the Lord] will stretch out His hand against the north and destroy Assyria and will make Nineveh a desolation, dry as the desert. [Isa. 10:12; Nah. 1:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Herds shall lie down in the midst of [Nineveh], all the [wild] beasts of the nations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of every kind; both the pelican and the hedgehog shall lodge on the upper part of her [fallen] pillars; the voice [of the nesting bird] shall sing in the windows; desolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drought shall be on the thresholds, for her cedar paneling will He lay bare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' This is the joyous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exultant city that dwelt carelessly [feeling so secure], that said in her heart, I am and there is none beside me. What a desolation she has become, a lair for [wild] beasts! Everyone who passes by her shall hiss and wave his hand [indicating his gratification]. [Isa. 10:5-34; 47:8, 10.]'
