document_id: ZEP.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' COLLECT YOUR thoughts, yes, unbend yourselves [in submission and see if there is no sense of shame and no consciousness of sin left in you], O shameless nation [not desirous or desired]!'
  '10':
  - type: text
    content: ' This shall they have for their pride, because they have taunted and boasted against the people of the Lord of hosts.'
  '11':
  - type: text
    content: ' The Lord will be terrible to them, for He will make lean '
  - type: text
    content: and
  - type: text
    content: ' famish all the gods of the earth; and men shall worship Him, every one from his place, even all the isles '
  - type: text
    content: and
  - type: text
    content: ' coastlands of the nations. [Joel 2:11; Zeph. 1:4; 3:9.]'
  '12':
  - type: text
    content: ' You Ethiopians also, you shall be slain by My sword. [Isa. 18.]'
  '13':
  - type: text
    content: ' And [the Lord] will stretch out His hand against the north and destroy Assyria and will make Nineveh a desolation, dry as the desert. [Isa. 10:12; Nah. 1:1.]'
  '14':
  - type: text
    content: ' Herds shall lie down in the midst of [Nineveh], all the [wild] beasts of the nations '
  - type: text
    content: and
  - type: text
    content: ' of every kind; both the pelican and the hedgehog shall lodge on the upper part of her [fallen] pillars; the voice [of the nesting bird] shall sing in the windows; desolation '
  - type: text
    content: and
  - type: text
    content: ' drought shall be on the thresholds, for her cedar paneling will He lay bare.'
  '15':
  - type: text
    content: ' This is the joyous '
  - type: text
    content: and
  - type: text
    content: ' exultant city that dwelt carelessly [feeling so secure], that said in her heart, I am and there is none beside me. What a desolation she has become, a lair for [wild] beasts! Everyone who passes by her shall hiss and wave his hand [indicating his gratification]. [Isa. 10:5-34; 47:8, 10.]'
  '2':
  - type: text
    content: ' [The time for repentance is speeding by like chaff whirled before the wind!] Therefore consider, before God''s decree brings forth [the curse upon you], before the time [to repent] is gone like the drifting chaff, before the fierce anger of the Lord comes upon you–yes, before the day of the wrath of the Lord comes upon you!'
  '3':
  - type: text
    content: ' Seek the Lord [inquire for Him, inquire of Him, and require Him as the foremost necessity of your life], all you humble of the land who have acted in compliance with His revealed will '
  - type: text
    content: and
  - type: text
    content: ' have kept His commandments; seek righteousness, seek humility [inquire for them, require them as vital]. It may be you will be hidden in the day of the Lord''s anger.'
  '4':
  - type: text
    content: ' For [hear the fate of the Philistines:] Gaza shall be forsaken and Ashkelon shall become a desolation; the people of Ashdod shall be driven out at noonday and Ekron shall be uprooted.'
  '5':
  - type: text
    content: ' Woe to the inhabitants of the seacoast, the nation of the Cherethites [in Philistia]! The word of the Lord is against you, O Canaan, land of the Philistines; I will destroy you until no inhabitant is left.'
  '6':
  - type: text
    content: ' And the seacoast shall be pastures, with [deserted] dwelling places '
  - type: text
    content: and
  - type: text
    content: ' caves for shepherds and folds for flocks.'
  '7':
  - type: text
    content: ' The seacoast shall belong to the remnant of the house of Judah; they shall pasture their flocks upon it; in the houses of [deserted Philistine] Ashkelon shall they of Judah lie down in the evening. For the Lord their [Judah''s] God shall visit them [for their relief] and restore them from their captivity. [Isa. 14:29-31; Amos 1:6-8.]'
  '8':
  - type: text
    content: ' I have heard the taunts of Moab and the revilings of the Ammonites by which they have reproached My people, and magnified themselves '
  - type: text
    content: and
  - type: text
    content: ' made boasts against their territory.'
  '9':
  - type: text
    content: ' Therefore, as I live, says the Lord of hosts, the God of Israel, Moab shall become like Sodom and the Ammonites like Gomorrah, a land possessed by nettles '
  - type: text
    content: and
  - type: text
    content: ' wild vetches and salt pits, and a perpetual desolation. The remnant of My people shall make a prey of them and what is left of My nation shall possess them.'
