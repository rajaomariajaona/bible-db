document_id: ISA.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE VISION [seen by spiritual perception] of Isaiah son of Amoz, which he saw concerning Judah [the kingdom] and Jerusalem [its capital] in the days of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hear [O Jerusalem] the word of the Lord, you rulers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' judges of [another] Sodom! Give ear to the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the teaching of our God, you people of [another] Gomorrah!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To what purpose is the multitude of your sacrifices to Me [unless they are the offering of the heart]? says the Lord. I have had enough of the burnt offerings of rams and the fat of fed beasts [without obedience]; and I do not delight in the blood of bulls or of lambs or of he-goats [without righteousness].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you come to appear before Me, who requires of you that your [unholy feet] trample My courts?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bring no more offerings of vanity (emptiness, falsity, vainglory, and futility); [your hollow offering of] incense is an abomination to Me; the New Moons and Sabbaths, the calling of assemblies, I cannot endure–[it is] iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profanation, even the solemn meeting.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your New Moon festivals and your [hypocritical] appointed feasts My soul hates. They are an oppressive burden to Me; I am weary of bearing them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when you spread forth your hands [in prayer, imploring help], I will hide My eyes from you; even though you make many prayers, I will not hear. Your hands are full of blood!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wash yourselves, make yourselves clean; put away the evil of your doings from before My eyes! Cease to do evil,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Learn to do right! Seek justice, relieve the oppressed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correct the oppressor. Defend the fatherless, plead for the widow.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Come now, and let us reason together, says the Lord. Though your sins are like scarlet, they shall be as white as snow; though they are red like crimson, they shall be like wool.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If you are willing and obedient, you shall eat the good of the land;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hear, O heavens, and give ear, O earth! For the Lord has spoken: I have nourished and brought up sons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have made them great and exalted, but they have rebelled against Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken away from Me.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you refuse and rebel, you will be devoured by the sword. For the mouth of the Lord has spoken it.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How the faithful city has become an [idolatrous] harlot, she who was full of justice! Uprightness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right standing with God [once] lodged in her–but now murderers.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your silver has become dross, your wine is mixed with water.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your princes are rebels and companions of thieves; everyone loves bribes and runs after compensation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rewards. They judge not for the fatherless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' defend them, neither does the cause of the widow come to them [for they delay or turn a deaf ear].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore says the Lord, the Lord of hosts, the Mighty One of Israel, Ah, I will appease Myself on My adversaries and avenge Myself on My enemies.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will bring My hand again upon you and thoroughly purge away your dross [as with lye] and take away all your tin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' alloy.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will restore your judges as at the first, and your counselors as at the beginning; afterward you shall be called the City of Righteousness, the Faithful City.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Zion shall be redeemed with justice, and her [returned] converts with righteousness (uprightness and right standing with God).'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the crushing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction of rebels and sinners shall be together, and they who forsake the Lord shall be consumed.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For you will be ashamed [of the folly and degradation] of the oak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' terebinth trees in which you found [idolatrous] pleasure, and you will blush with shame for the [idolatrous worship which you practice in the passion-inflaming] gardens which you have chosen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The ox [instinctively] knows his owner, and the donkey his master''s crib, but Israel does not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' recognize Me [as Lord], My people do not consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understand.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For you shall be like an oak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' terebinth whose leaf withers, and like a garden that has no water.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the strong shall become like tow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become tinder, and his work like a spark, and they shall both burn together, with none to quench them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ah, sinful nation, a people loaded with iniquity, offspring of evildoers, sons who deal corruptly! They have forsaken the Lord, they have despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shown contempt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoked the Holy One of Israel to anger, they have become utterly estranged (alienated).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why should you be stricken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished any more [since it brings no correction]? You will revolt more and more. The whole head is sick, and the whole heart is faint (feeble, sick, and nauseated).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From the sole of the foot even to the head there is no soundness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' health in [the nation''s body]–but wounds and bruises and fresh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bleeding stripes; they have not been pressed out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' closed up or bound up or softened with oil. [No one has troubled to seek a remedy.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Because of your detestable disobedience] your country lies desolate, your cities are burned with fire; your land–strangers devour it in your very presence, and it is desolate, as overthrown by aliens.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Daughter of Zion [Jerusalem] is left like a [deserted] booth in a vineyard, like a lodge in a garden of cucumbers, like a besieged city [spared, but in the midst of desolation].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Except the Lord of hosts had left us a very small remnant [of survivors], we should have been like Sodom, and we should have been like Gomorrah. [Gen. 19:24, 25; Rom. 9:29.]'
