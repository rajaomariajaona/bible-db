document_id: PSA.123,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' UNTO YOU do I lift up my eyes, O You Who are enthroned in heaven.'
  '2':
  - type: text
    content: ' Behold, as the eyes of servants look to the hand of their master, and as the eyes of a maid to the hand of her mistress, so our eyes look to the Lord our God, until He has mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness for us.'
  '3':
  - type: text
    content: ' Have mercy on us, O Lord, have mercy on '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness for us, for we are exceedingly satiated with contempt.'
  '4':
  - type: text
    content: ' Our life is exceedingly filled with the scorning '
  - type: text
    content: and
  - type: text
    content: ' scoffing of those who are at ease and with the contempt of the proud (irresponsible tyrants who disregard God''s law).'
