document_id: JER.49
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' CONCERNING '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against the Ammonites: Thus says the Lord: Has Israel no sons [to return after their captivity and claim the territory of Gad east of the Jordan which the Ammonites have taken over]? Has [Israel''s Gad] no heir? Why then has Milcom [the god the Ammonites call their king] dispossessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inherited Gad, and [why do] his people dwell in Gad''s cities?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Therefore behold, the days are coming, says the Lord, when I will cause an alarm of war to be heard against Rabbah of the Ammonites; and it [the high ground on which it stands] will become a desolate heap, and its daughter [villages] will be burned with fire. Then will Israel dispossess those who dispossessed him, says the Lord. [Ezek. 21:28-32; 25:1-7, 11; Amos 1:13-15; Zeph. 2:8-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Wail, O Heshbon [in Moab, just south of Ammon], for Ai [in Ammon] is laid waste! Cry out, you daughter [villages] of Rabbah! Gird yourselves with sackcloth, lament, and run to and fro inside the [sheepfold] enclosures; for Milcom [the god-king] shall go into exile, together with his priests and his princes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Why do you boast of your valleys? Your valley flows away, O [Ammon] rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithless daughter, who trusted in her treasures, who said, Who can come against me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, I will bring terror upon you, says the Lord, the Lord of hosts, from all who are round about you; and you will be driven out, each man fleeing straight before him [without thought of his neighbor], and there will be no one to gather together the fugitives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And afterward I will reverse the captivity of the children of Ammon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore their fortunes, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against Edom: Thus says the Lord of hosts: Is there no longer wisdom in Teman [a district in Edom]? Has counsel vanished from the intelligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prudent? Is their wisdom all poured out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' used up? [Isa. 34; 63:1-6; Ezek. 25:12-14; 35; Amos 1:11, 12; Obad. 1-16; Mal. 1:2-5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Flee, turn back, dwell deep [in the deserts to escape the Chaldeans], O inhabitants of Dedan [neighbor of Edom]! For I will bring the calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction of Esau upon him [Edom] when I inspect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If grape gatherers came to you, would they not leave some ungleaned grapes? If thieves came by night, would they not destroy only what is enough [for them]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But I have stripped Esau (Edom) bare; I have uncovered his hiding places, and he cannot hide himself. His offspring will be destroyed, with his brethren and his neighbors; and he will be no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Leave your fatherless children; I will [do what is necessary to] preserve them alive. And let [those who have been made] your widows trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confide in Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For thus says the Lord: Behold, they [Israel] whose rule was not to drink the cup [of wrath] shall assuredly drink–and are you to remain unpunished? You shall not go unpunished, but you shall surely drink. [Jer. 25:28, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For I have sworn by Myself, says the Lord, that Bozrah [in Edom, between Petra and the Dead Sea] shall become a horror, a reproach, a waste, and a curse; and all its cities shall be perpetual wastes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I have heard a report from the Lord, and a messenger is sent to the nations, saying, Gather together and come against her! And rise up for the battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For, behold, I will make you [Edom] small among the nations and despised among men. [Ezek. 35:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Your [object of] horror (your idol) has deceived you, and the pride of your heart [has deceived you], O you who dwell in the clefts of the rock [Sela or Petra], who hold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' occupy the height of the hill. Though you make your nest as high as the eagle''s, I will bring you down from there, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Edom shall be an astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a horror; everyone who goes by it shall be astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shall hiss with horror at all its plagues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disasters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' As [it was] in the overthrow of Sodom and Gomorrah and their neighboring cities, says the Lord, no man shall dwell there; neither shall a son of man live in it temporarily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' See, there comes up one [Nebuchadnezzar] like a lion from [lurking in] the jungles (the pride) of the Jordan against the strong habitation [of Edom] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' into the permanent pastures; for in a twinkling I will drive him [Edom] from there. And I will appoint over him the one whom I choose. For who is like Me? And who will appoint for Me the time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosecute Me for this proceeding? And what [earthly, national] shepherd can stand before Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Therefore hear the plan of the Lord which He has made against Edom, and His purposes which He has formed against the inhabitants of Teman: Surely they shall be dragged away [by Nebuchadnezzar], even the little ones of the flock; surely He shall make their habitation desolate because of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their fold shocked at their fate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' At the sound of their fall the earth shall tremble; at their crying the sound shall be heard at the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Behold, one will come up and fly swiftly like an eagle and spread his wings against [the Edomite city of] Bozrah; and in that day the hearts of the mighty warriors of Edom will be like the heart of a woman in her pangs [in childbirth]. [Jer. 48:41.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against Damascus [in Syria]: Hamath and Arpad are confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put to shame, for they have heard bad news; they are fainthearted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wasting away; there is trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anxiety [like] on a [storm-tossed] sea which cannot rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Damascus has become feeble; she has turned to flee, and terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' panic have seized her; anguish and sorrow have taken hold of her, like a woman in childbirth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' How [remarkable that] the renowned city is not deserted, the city of my joy! [exclaims one from Damascus].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Therefore her young men shall fall in her streets, and all her soldiers shall be destroyed in that day, says the Lord of hosts. [Isa. 17:1-3; Amos 1:3-5; Zech. 9:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And I will kindle a fire in the wall of Damascus, and it will consume the palaces of Ben-hadad [title of several kings of Syria].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Concerning Kedar [a tribe of nomad Arabs] and concerning the kingdoms of Hazor, which Nebuchadrezzar king of Babylon shall smite: Thus says the Lord [to him]: Arise, go up against Kedar and destroy the sons of the east.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Their tents and their flocks shall they [the Chaldeans] take–their tent hangings and all their utensils and their camels. And men shall cry to them, Terror on every side! [Ps. 31:13; Jer. 6:25; 20:3, 10; 46:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Flee, wander far off, dwell deep [in the deserts], O you inhabitants of Hazor [in the Arabian Desert] says the Lord, for Nebuchadrezzar king of Babylon has planned a course against you and has conceived a purpose against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Arise [Nebuchadrezzar], get up into a nation which is at ease, which dwells without care, says the Lord, [a nation] which has neither gates nor bars, which dwells apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And their camels will be booty, and their herds of cattle a spoil; and I will scatter to all [the four] winds those who [as evidence of their idolatry] clip off the corners of their hair, and I will bring their calamity from every side, says the Lord. [Lev. 19:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And Hazor shall become a dwelling place of jackals, a desolation forever; no man shall dwell there; neither shall a son of man live in it temporarily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' The word of the Lord that came to Jeremiah the prophet concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against Elam, in the beginning of the reign of Zedekiah king of Judah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Thus says the Lord of hosts: Behold, I will break the bow of Elam, the chief [weapon and part] of their strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And upon Elam will I bring the four winds from the four corners of heaven; and I will scatter them toward all those winds, and there will be no nation to which the outcasts of Elam will not come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And I will cause Elam to be dismayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrified before their enemies and before those who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demand their lives; and I will bring evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disaster upon them, even My fierce anger, says the Lord. And I will send the sword after them until I have consumed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And I will set My throne [of judgment] in Elam [whose capital city was Shushan, from which God wrought wonders through Nehemiah, Esther, and Daniel]; and I will destroy from their king and princes, says the Lord. [Neh. 1:1; Esth. 1:2; Dan. 8:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But it shall be in the latter days (the end of days) that I will reverse the captivity and restore the fortunes of Elam, says the Lord.'
