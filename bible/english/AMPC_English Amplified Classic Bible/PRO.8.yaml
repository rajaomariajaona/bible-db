document_id: PRO.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' DOES NOT skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom cry out, and understanding raise her voice [in contrast to the loose woman]?'
  '10':
  - type: text
    content: ' Receive my instruction in preference to [striving for] silver, and knowledge rather than choice gold,'
  '11':
  - type: text
    content: ' For skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom is better than rubies '
  - type: text
    content: or
  - type: text
    content: ' pearls, and all the things that may be desired are not to be compared to it. [Job 28:15; Ps. 19:10; 119:127.]'
  '12':
  - type: text
    content: ' I, Wisdom [from God], make prudence my dwelling, and I find out knowledge and discretion. [James 1:5.]'
  '13':
  - type: text
    content: ' The reverent fear '
  - type: text
    content: and
  - type: text
    content: ' worshipful awe of the Lord [includes] the hatred of evil; pride, arrogance, the evil way, and perverted '
  - type: text
    content: and
  - type: text
    content: ' twisted speech I hate.'
  '14':
  - type: text
    content: ' I have counsel and sound knowledge, I have understanding, I have might '
  - type: text
    content: and
  - type: text
    content: ' power.'
  '15':
  - type: text
    content: ' By me kings reign and rulers decree justice. [Dan. 2:21; Rom. 13:1.]'
  '16':
  - type: text
    content: ' By me princes rule, and nobles, even all the judges '
  - type: text
    content: and
  - type: text
    content: ' governors of the earth.'
  '17':
  - type: text
    content: ' I love those who love me, and those who seek me early '
  - type: text
    content: and
  - type: text
    content: ' diligently shall find me. [I Sam. 2:30; Ps. 91:14; John 14:21; James 1:5.]'
  '18':
  - type: text
    content: ' Riches and honor are with me, enduring wealth and righteousness (uprightness in every area and relation, and right standing with God). [Prov. 3:16; Matt. 6:33.]'
  '19':
  - type: text
    content: ' My fruit is better than gold, yes, than refined gold, and my increase than choice silver.'
  '2':
  - type: text
    content: ' On the top of the heights beside the way, where the paths meet, stands Wisdom [skillful and godly];'
  '20':
  - type: text
    content: ' I [Wisdom] walk in the way of righteousness (moral and spiritual rectitude in every area and relation), in the midst of the paths of justice,'
  '21':
  - type: text
    content: ' That I may cause those who love me to inherit [true] riches and that I may fill their treasuries.'
  '22':
  - type: text
    content: ' The Lord formed '
  - type: text
    content: and
  - type: text
    content: ' brought me [Wisdom] forth at the beginning of His way, before His acts of old.'
  '23':
  - type: text
    content: ' I [Wisdom] was inaugurated '
  - type: text
    content: and
  - type: text
    content: ' ordained from everlasting, from the beginning, before ever the earth existed. [John 1:1; I Cor. 1:24.]'
  '24':
  - type: text
    content: ' When there were no deeps, I was brought forth, when there were no fountains laden with water.'
  '25':
  - type: text
    content: ' Before the mountains were settled, before the hills, I was brought forth, [Job 15:7, 8.]'
  '26':
  - type: text
    content: ' While as yet He had not made the land or the fields or the first of the dust of the earth.'
  '27':
  - type: text
    content: ' When He prepared the heavens, I [Wisdom] was there; when He drew a circle upon the face of the deep '
  - type: text
    content: and
  - type: text
    content: ' stretched out the firmament over it,'
  '28':
  - type: text
    content: ' When He made firm the skies above, when He established the fountains of the deep,'
  '29':
  - type: text
    content: ' When He gave to the sea its limit '
  - type: text
    content: and
  - type: text
    content: ' His decree that the waters should not transgress [across the boundaries set by] His command, when He appointed the foundations of the earth–[Job 38:10, 11; Ps. 104:6-9; Jer. 5:22.]'
  '3':
  - type: text
    content: ' At the gates at the entrance of the town, at the coming in at the doors, she cries out:'
  '30':
  - type: text
    content: ' Then I [Wisdom] was beside Him as a master '
  - type: text
    content: and
  - type: text
    content: ' director of the work; and I was daily His delight, rejoicing before Him always, [Matt. 3:17; John 1:2, 18.]'
  '31':
  - type: text
    content: ' Rejoicing in His inhabited earth and delighting in the sons of men. [Ps. 16:3.]'
  '32':
  - type: text
    content: ' Now therefore listen to me, O you sons; for blessed (happy, fortunate, to be envied) are those who keep my ways. [Ps. 119:1, 2; 128:1, 2; Luke 11:28.]'
  '33':
  - type: text
    content: ' Hear instruction and be wise, and do not refuse '
  - type: text
    content: or
  - type: text
    content: ' neglect it.'
  '34':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) is the man who listens to me, watching daily at my gates, waiting at the posts of my doors.'
  '35':
  - type: text
    content: ' For whoever finds me [Wisdom] finds life and draws forth '
  - type: text
    content: and
  - type: text
    content: ' obtains favor from the Lord.'
  '36':
  - type: text
    content: ' But he who misses me '
  - type: text
    content: or
  - type: text
    content: ' sins against me wrongs '
  - type: text
    content: and
  - type: text
    content: ' injures himself; all who hate me love '
  - type: text
    content: and
  - type: text
    content: ' court death.'
  '4':
  - type: text
    content: ' To you, O men, I call, and my voice is directed to the sons of men.'
  '5':
  - type: text
    content: ' O you simple '
  - type: text
    content: and
  - type: text
    content: ' thoughtless ones, understand prudence; you [self-confident] fools, be of an understanding heart. [Isa. 32:6.]'
  '6':
  - type: text
    content: ' Hear, for I will speak excellent '
  - type: text
    content: and
  - type: text
    content: ' princely things; and the opening of my lips shall be for right things.'
  '7':
  - type: text
    content: ' For my mouth shall utter truth, and wrongdoing is detestable '
  - type: text
    content: and
  - type: text
    content: ' loathsome to my lips.'
  '8':
  - type: text
    content: ' All the words of my mouth are righteous (upright and in right standing with God); there is nothing contrary to truth or crooked in them.'
  '9':
  - type: text
    content: ' They are all plain to him who understands [and opens his heart], and right to those who find knowledge [and live by it].'
