document_id: PRO.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' DOES NOT skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom cry out, and understanding raise her voice [in contrast to the loose woman]?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Receive my instruction in preference to [striving for] silver, and knowledge rather than choice gold,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is better than rubies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pearls, and all the things that may be desired are not to be compared to it. [Job 28:15; Ps. 19:10; 119:127.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I, Wisdom [from God], make prudence my dwelling, and I find out knowledge and discretion. [James 1:5.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The reverent fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful awe of the Lord [includes] the hatred of evil; pride, arrogance, the evil way, and perverted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' twisted speech I hate.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I have counsel and sound knowledge, I have understanding, I have might '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' By me kings reign and rulers decree justice. [Dan. 2:21; Rom. 13:1.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' By me princes rule, and nobles, even all the judges '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' governors of the earth.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I love those who love me, and those who seek me early '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diligently shall find me. [I Sam. 2:30; Ps. 91:14; John 14:21; James 1:5.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Riches and honor are with me, enduring wealth and righteousness (uprightness in every area and relation, and right standing with God). [Prov. 3:16; Matt. 6:33.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' My fruit is better than gold, yes, than refined gold, and my increase than choice silver.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' On the top of the heights beside the way, where the paths meet, stands Wisdom [skillful and godly];'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' I [Wisdom] walk in the way of righteousness (moral and spiritual rectitude in every area and relation), in the midst of the paths of justice,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' That I may cause those who love me to inherit [true] riches and that I may fill their treasuries.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The Lord formed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought me [Wisdom] forth at the beginning of His way, before His acts of old.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' I [Wisdom] was inaugurated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained from everlasting, from the beginning, before ever the earth existed. [John 1:1; I Cor. 1:24.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When there were no deeps, I was brought forth, when there were no fountains laden with water.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Before the mountains were settled, before the hills, I was brought forth, [Job 15:7, 8.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' While as yet He had not made the land or the fields or the first of the dust of the earth.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' When He prepared the heavens, I [Wisdom] was there; when He drew a circle upon the face of the deep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stretched out the firmament over it,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' When He made firm the skies above, when He established the fountains of the deep,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' When He gave to the sea its limit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His decree that the waters should not transgress [across the boundaries set by] His command, when He appointed the foundations of the earth–[Job 38:10, 11; Ps. 104:6-9; Jer. 5:22.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' At the gates at the entrance of the town, at the coming in at the doors, she cries out:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Then I [Wisdom] was beside Him as a master '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' director of the work; and I was daily His delight, rejoicing before Him always, [Matt. 3:17; John 1:2, 18.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Rejoicing in His inhabited earth and delighting in the sons of men. [Ps. 16:3.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now therefore listen to me, O you sons; for blessed (happy, fortunate, to be envied) are those who keep my ways. [Ps. 119:1, 2; 128:1, 2; Luke 11:28.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Hear instruction and be wise, and do not refuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' neglect it.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man who listens to me, watching daily at my gates, waiting at the posts of my doors.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' For whoever finds me [Wisdom] finds life and draws forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obtains favor from the Lord.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' But he who misses me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sins against me wrongs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' injures himself; all who hate me love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' court death.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' To you, O men, I call, and my voice is directed to the sons of men.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' O you simple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtless ones, understand prudence; you [self-confident] fools, be of an understanding heart. [Isa. 32:6.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Hear, for I will speak excellent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' princely things; and the opening of my lips shall be for right things.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For my mouth shall utter truth, and wrongdoing is detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathsome to my lips.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' All the words of my mouth are righteous (upright and in right standing with God); there is nothing contrary to truth or crooked in them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' They are all plain to him who understands [and opens his heart], and right to those who find knowledge [and live by it].'
