document_id: DEU.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN THE Lord your God brings you into the land which you are entering to possess and has plucked away many nations before you, the Hittites, the Girgashites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites, seven nations greater and mightier than you,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And repays those who hate Him to their face, by destroying them; He will not be slack to him who hates Him, but will requite him to his face.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You shall therefore keep and do the instruction, laws, and precepts which I command you this day.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And if you hearken to these precepts and keep and do them, the Lord your God will keep with you the covenant and the steadfast love which He swore to your fathers.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And He will love you, bless you, and multiply you; He will also bless the fruit of your body and the fruit of your land, your grain, your new wine, and your oil, the increase of your cattle and the young of your flock in the land which He swore to your fathers to give you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' You shall be blessed above all peoples; there shall not be male or female barren among you, or among your cattle.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the Lord will take away from you all sickness, and none of the evil diseases of Egypt which you knew will He put upon you, but will lay them upon all who hate you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And you shall consume all the peoples whom the Lord your God will give over to you; your eye shall not pity them, neither shall you serve their gods, for that would be a snare to you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If you say in your [minds and] hearts, These nations are greater than we are; how can we dispossess them?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' You shall not be afraid of them, but remember [earnestly] what the Lord your God did to Pharaoh and to all Egypt,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The great trials which your eyes saw, the signs, the wonders, the mighty hand and the outstretched arm by which the Lord your God brought you out. So shall the Lord your God do to all the people of whom you are afraid.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And when the Lord your God gives them over to you and you smite them, then you must utterly destroy them. You shall make no covenant with them, or show mercy to them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Moreover, the Lord your God will send the hornet among them until those who are left and hide themselves from you are destroyed.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You shall not dread them, for the Lord your God is among you, a mighty and terrible God.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And the Lord your God will clear out those nations before you, little by little; you may not consume them quickly, lest the beasts of the field increase among you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But the Lord your God will give them over to you and will confuse them with a mighty panic until they are destroyed.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And He will give their kings into your hand, and you shall make their name perish from under the heavens; there shall no man be able to stand before you, until you have destroyed them.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The graven images of their gods you shall burn with fire. You shall not desire the silver or gold that is on them, nor take it for yourselves, lest you be ensnared by it, for it is an abomination to the Lord your God.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Neither shall you bring an abomination (an idol) into your house, lest you become an accursed thing like it; but you shall utterly detest and abhor it, for it is an accursed thing.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall not make marriages with them; your daughter you shall not give to his son nor shall you take his daughter for your son,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For they will turn away your sons from following Me, that they may serve other gods; so will the anger of the Lord be kindled against you and He will destroy you quickly.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But thus shall you deal with them: you shall break down their altars and dash in pieces their pillars and hew down their Asherim [symbols of the goddess Asherah] and burn their graven images with fire.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For you are a holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set-apart people to the Lord your God; the Lord your God has chosen you to be a special people to Himself out of all the peoples on the face of the earth.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Lord did not set His love upon you and choose you because you were more in number than any other people, for you were the fewest of all people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But because the Lord loves you and because He would keep the oath which He had sworn to your fathers, the Lord has brought you out with a mighty hand and redeemed you out of the house of bondage, from the hand of Pharaoh king of Egypt.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Know, recognize, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand therefore that the Lord your God, He is God, the faithful God, Who keeps covenant and steadfast love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy with those who love Him and keep His commandments, to a thousand generations,'
