document_id: 1CH.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO ALL Israel was enrolled by genealogies; and they are written in the Book of the Kings of Israel. And Judah was carried away captive to Babylon for their unfaithfulness to God.'
  '10':
  - type: text
    content: ' Of the priests: Jedaiah; Jehoiarib; Jachin;'
  '11':
  - type: text
    content: ' Azariah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the chief officer of God''s house;'
  '12':
  - type: text
    content: ' And Adaiah son of Jeroham, the son of Pashhur, the son of Malchijah; Massai son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer;'
  '13':
  - type: text
    content: ' And their kinsmen, heads of their fathers'' houses, 1,760–very able men for the work of the service of the house of God.'
  '14':
  - type: text
    content: ' Of the Levites: Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari;'
  '15':
  - type: text
    content: ' And Bakbakkar, Heresh, Galal, and Mattaniah son of Mica, the son of Zichri, the son of Asaph;'
  '16':
  - type: text
    content: ' Obadiah son of Shemaiah, the son of Galal, the son of Jeduthun; and Berechiah son of Asa, the son of Elkanah, who dwelt in the villages of the Netophathites [near Jerusalem].'
  '17':
  - type: text
    content: ' The gatekeepers were: Shallum, Akkub, Talmon, Ahiman, and their kinsmen, Shallum being the chief'
  '18':
  - type: text
    content: ' Who hitherto was assigned to the king''s east side gate. They were the gatekeepers of the camp of the Levites.'
  '19':
  - type: text
    content: ' Shallum son of Kore, the son of Ebiasaph, the son of Korah, and his kinsmen of his father''s house, the Korahites, were in charge of the work of the service, keepers of the thresholds of the Tent, as their fathers had been in charge of the camp of the Lord, keepers of the entrance.'
  '2':
  - type: text
    content: ' Now the first [of the returned exiles] to dwell again in their possessions in the cities of Israel were the priests, Levites, and the Nethinim [the temple servants].'
  '20':
  - type: text
    content: ' Phinehas son of Eleazar was ruler over them in times past, and the Lord was with him.'
  '21':
  - type: text
    content: ' Zechariah son of Meshelemiah was gatekeeper at the entrance of the Tent of Meeting.'
  '22':
  - type: text
    content: ' All these chosen to be keepers at the thresholds were 212. These were enrolled by their genealogies in their villages [around Jerusalem], these men [whose grandfathers] David and Samuel the seer had established to their office of trust.'
  '23':
  - type: text
    content: ' So they and their sons had oversight of the gates of the Lord''s house, that is, the house of the tabernacle, by wards.'
  '24':
  - type: text
    content: ' The gatekeepers were stationed on the four sides [of the house of the Lord]–on the east, west, north, and south.'
  '25':
  - type: text
    content: ' Their brethren in their villages were to come in every seven days to be with them.'
  '26':
  - type: text
    content: ' But these Levites, the four chief gatekeepers, were in charge of the chambers and treasuries of the house of God.'
  '27':
  - type: text
    content: ' They lodged round about God''s house, for the duty [of watching] was theirs, as well as the opening of the house every morning.'
  '28':
  - type: text
    content: ' Some of them had charge of the serving utensils, being required to count them when they brought them in or took them out.'
  '29':
  - type: text
    content: ' Some of them also were appointed over the furniture and over all the sacred utensils, as well as over the fine flour, wine, oil, frankincense, and spices.'
  '3':
  - type: text
    content: ' In Jerusalem dwelt some of the people of Judah, Benjamin, Ephraim, and Manasseh:'
  '30':
  - type: text
    content: ' Other sons of the priests prepared the ointment of spices.'
  '31':
  - type: text
    content: ' Mattithiah, one of the Levites, the firstborn of Shallum the Korahite, was responsible for the things baked in pans.'
  '32':
  - type: text
    content: ' Of their Kohathite kinsmen, some were to prepare the showbread every Sabbath.'
  '33':
  - type: text
    content: ' These are the singers, heads of the fathers'' houses of the Levites, dwelling in the temple chambers, free from other service because they were on duty day and night.'
  '34':
  - type: text
    content: ' These were heads of fathers'' houses of the Levites, according to their generations, chief men, who lived in Jerusalem.'
  '35':
  - type: text
    content: ' In Gibeon dwelt the father of Gibeon, Jeiel, whose wife''s name was Maacah,'
  '36':
  - type: text
    content: ' His firstborn son Abdon, then Zur, Kish, Baal, Ner, Nadab,'
  '37':
  - type: text
    content: ' Gedor, Ahio, Zechariah, and Mikloth.'
  '38':
  - type: text
    content: ' Mikloth was the father of Shimeam. They also dwelt beside their brethren, opposite their kinsmen in Jerusalem.'
  '39':
  - type: text
    content: ' Ner was the father of Kish, Kish of [King] Saul, Saul of Jonathan, Malchi-shua, Abinadab, and Esh-baal.'
  '4':
  - type: text
    content: ' Uthai son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the sons of Pharez son of Judah.'
  '40':
  - type: text
    content: ' The son of Jonathan was Merib-baal (Mephibosheth); Merib-baal was the father of Micah.'
  '41':
  - type: text
    content: ' The sons of Micah: Pithon, Melech, Tahrea, and Ahaz.'
  '42':
  - type: text
    content: ' Ahaz was the father of Jarah, and Jarah of Alemeth, Azmaveth, and Zimri; Zimri was the father of Moza,'
  '43':
  - type: text
    content: ' Moza of Binea; Rephaiah was his son, Eleasah his son, Azel his son.'
  '44':
  - type: text
    content: ' Azel had six sons: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.'
  '5':
  - type: text
    content: ' Of the Shilonites: Asaiah the firstborn and his sons.'
  '6':
  - type: text
    content: ' Of the sons of Zerah: Jeuel and their kinsmen, 690.'
  '7':
  - type: text
    content: ' Of the Benjamites: Sallu son of Meshullam, the son of Hodaviah, the son of Hassenuah;'
  '8':
  - type: text
    content: ' Ibneiah son of Jeroham; Elah son of Uzzi, the son of Michri; and Meshullam son of Shephatiah, the son of Reuel, the son of Ibnijah;'
  '9':
  - type: text
    content: ' And their kinsmen, according to their generations, 956. All these were heads of fathers'' houses according to their fathers'' houses.'
