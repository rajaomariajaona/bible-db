document_id: LUK.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IT OCCURRED one Sabbath, when [Jesus] went for a meal at the house of one of the ruling Pharisees, that they were [engaged in] watching Him [closely].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And behold, [just] in front of Him there was a man who had dropsy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Jesus asked the lawyers and the Pharisees, Is it lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right to cure on the Sabbath or not?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But they kept silent. Then He took hold [of the man] and cured him and sent him away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He said to them, Which of you, having a son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or a donkey
  - type: text
    text: ' or an ox that has fallen into a well, will not at once pull him out on the Sabbath day?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they were unable to reply to this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now He told a parable to those who were invited, [when] He noticed how they were selecting the places of honor, saying to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When you are invited by anyone to a marriage feast, do not recline on the chief seat [in the place of honor], lest a more distinguished person than you has been invited by him, [Prov. 25:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he who invited both of you will come to you and say, Let this man have the place [you have taken]. Then, with humiliation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a guilty sense of impropriety, you will begin to take the lowest place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But when you are invited, go and recline in the lowest place, so that when your host comes in, he may say to you, Friend, go up higher! Then you will be honored in the presence of all who sit [at table] with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For everyone who exalts himself will be humbled (ranked below others who are honored or rewarded), and he who humbles himself (keeps a modest opinion of himself and behaves accordingly) will be exalted (elevated in rank).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jesus also said to the man who had invited Him, When you give a dinner or a supper, do not invite your friends or your brothers or your relatives or your wealthy neighbors, lest perhaps they also invite you in return, and so you are paid back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But when you give a banquet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a reception, invite the poor, the disabled, the lame, and the blind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then you will be blessed (happy, fortunate, and to be envied), because they have no way of repaying you, and you will be recompensed at the resurrection of the just (upright).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When one of those who reclined [at the table] with Him heard this, he said to Him, Blessed (happy, fortunate, and to be envied) is he who shall eat bread in the kingdom of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But Jesus said to him, A man was once giving a great supper and invited many;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And at the hour for the supper he sent his servant to say to those who had been invited, Come, for all is now ready.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But they all alike began to make excuses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to beg off. The first said to him, I have bought a piece of land, and I have to go out and see it; I beg you, have me excused.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And another said, I have bought five yoke of oxen, and I am going to examine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put my approval on them; I beg you, have me excused.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And another said, I have married a wife, and because of this I am unable to come. [Deut. 24:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So the servant came and reported these [answers] to his master. Then the master of the house said in wrath to his servant, Go quickly into the great streets and the small streets of the city and bring in here the poor and the disabled and the blind and the lame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the servant [returning] said, Sir, what you have commanded me to do has been done, and yet there is room.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then the master said to the servant, Go out into the highways and hedges and urge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' constrain [them] to yield '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come in, so that my house may be filled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For I tell you, not one of those who were invited shall taste my supper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now huge crowds were going along with [Jesus], and He turned and said to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' If anyone comes to Me and does not hate his [own] father and mother [in the sense of indifference to or relative disregard for them in comparison with his attitude toward God] and [likewise] his wife and children and brothers and sisters–[yes] and even his own life also–he cannot be My disciple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Whoever does not persevere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carry his own cross and come after (follow) Me cannot be My disciple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For which of you, wishing to build a farm building, does not first sit down and calculate the cost [to see] whether he has sufficient means to finish it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Otherwise, when he has laid the foundation and is unable to complete [the building], all who see it will begin to mock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jeer at him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Saying, This man began to build and was not able (worth enough) to finish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Or what king, going out to engage in conflict with another king, will not first sit down and consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take counsel whether he is able with ten thousand [men] to meet him who comes against him with twenty thousand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And if he cannot [do so], when the other king is still a great way off, he sends an envoy and asks the terms of peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So then, any of you who does not forsake (renounce, surrender claim to, give up, say good-bye to) all that he has cannot be My disciple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Salt is good [an excellent thing], but if salt has lost its strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has become saltless (insipid, flat), how shall its saltness be restored?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' It is fit neither for the land nor for the manure heap; men throw it away. He who has ears to hear, let him listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comprehend by hearing!'
