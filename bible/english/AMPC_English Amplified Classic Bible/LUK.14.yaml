document_id: LUK.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IT OCCURRED one Sabbath, when [Jesus] went for a meal at the house of one of the ruling Pharisees, that they were [engaged in] watching Him [closely].'
  '10':
  - type: text
    content: ' But when you are invited, go and recline in the lowest place, so that when your host comes in, he may say to you, Friend, go up higher! Then you will be honored in the presence of all who sit [at table] with you.'
  '11':
  - type: text
    content: ' For everyone who exalts himself will be humbled (ranked below others who are honored or rewarded), and he who humbles himself (keeps a modest opinion of himself and behaves accordingly) will be exalted (elevated in rank).'
  '12':
  - type: text
    content: ' Jesus also said to the man who had invited Him, When you give a dinner or a supper, do not invite your friends or your brothers or your relatives or your wealthy neighbors, lest perhaps they also invite you in return, and so you are paid back.'
  '13':
  - type: text
    content: ' But when you give a banquet '
  - type: text
    content: or
  - type: text
    content: ' a reception, invite the poor, the disabled, the lame, and the blind.'
  '14':
  - type: text
    content: ' Then you will be blessed (happy, fortunate, and to be envied), because they have no way of repaying you, and you will be recompensed at the resurrection of the just (upright).'
  '15':
  - type: text
    content: ' When one of those who reclined [at the table] with Him heard this, he said to Him, Blessed (happy, fortunate, and to be envied) is he who shall eat bread in the kingdom of God!'
  '16':
  - type: text
    content: ' But Jesus said to him, A man was once giving a great supper and invited many;'
  '17':
  - type: text
    content: ' And at the hour for the supper he sent his servant to say to those who had been invited, Come, for all is now ready.'
  '18':
  - type: text
    content: ' But they all alike began to make excuses '
  - type: text
    content: and
  - type: text
    content: ' to beg off. The first said to him, I have bought a piece of land, and I have to go out and see it; I beg you, have me excused.'
  '19':
  - type: text
    content: ' And another said, I have bought five yoke of oxen, and I am going to examine '
  - type: text
    content: and
  - type: text
    content: ' put my approval on them; I beg you, have me excused.'
  '2':
  - type: text
    content: ' And behold, [just] in front of Him there was a man who had dropsy.'
  '20':
  - type: text
    content: ' And another said, I have married a wife, and because of this I am unable to come. [Deut. 24:5.]'
  '21':
  - type: text
    content: ' So the servant came and reported these [answers] to his master. Then the master of the house said in wrath to his servant, Go quickly into the great streets and the small streets of the city and bring in here the poor and the disabled and the blind and the lame.'
  '22':
  - type: text
    content: ' And the servant [returning] said, Sir, what you have commanded me to do has been done, and yet there is room.'
  '23':
  - type: text
    content: ' Then the master said to the servant, Go out into the highways and hedges and urge '
  - type: text
    content: and
  - type: text
    content: ' constrain [them] to yield '
  - type: text
    content: and
  - type: text
    content: ' come in, so that my house may be filled.'
  '24':
  - type: text
    content: ' For I tell you, not one of those who were invited shall taste my supper.'
  '25':
  - type: text
    content: ' Now huge crowds were going along with [Jesus], and He turned and said to them,'
  '26':
  - type: text
    content: ' If anyone comes to Me and does not hate his [own] father and mother [in the sense of indifference to or relative disregard for them in comparison with his attitude toward God] and [likewise] his wife and children and brothers and sisters–[yes] and even his own life also–he cannot be My disciple.'
  '27':
  - type: text
    content: ' Whoever does not persevere '
  - type: text
    content: and
  - type: text
    content: ' carry his own cross and come after (follow) Me cannot be My disciple.'
  '28':
  - type: text
    content: ' For which of you, wishing to build a farm building, does not first sit down and calculate the cost [to see] whether he has sufficient means to finish it?'
  '29':
  - type: text
    content: ' Otherwise, when he has laid the foundation and is unable to complete [the building], all who see it will begin to mock '
  - type: text
    content: and
  - type: text
    content: ' jeer at him,'
  '3':
  - type: text
    content: ' And Jesus asked the lawyers and the Pharisees, Is it lawful '
  - type: text
    content: and
  - type: text
    content: ' right to cure on the Sabbath or not?'
  '30':
  - type: text
    content: ' Saying, This man began to build and was not able (worth enough) to finish.'
  '31':
  - type: text
    content: ' Or what king, going out to engage in conflict with another king, will not first sit down and consider '
  - type: text
    content: and
  - type: text
    content: ' take counsel whether he is able with ten thousand [men] to meet him who comes against him with twenty thousand?'
  '32':
  - type: text
    content: ' And if he cannot [do so], when the other king is still a great way off, he sends an envoy and asks the terms of peace.'
  '33':
  - type: text
    content: ' So then, any of you who does not forsake (renounce, surrender claim to, give up, say good-bye to) all that he has cannot be My disciple.'
  '34':
  - type: text
    content: ' Salt is good [an excellent thing], but if salt has lost its strength '
  - type: text
    content: and
  - type: text
    content: ' has become saltless (insipid, flat), how shall its saltness be restored?'
  '35':
  - type: text
    content: ' It is fit neither for the land nor for the manure heap; men throw it away. He who has ears to hear, let him listen '
  - type: text
    content: and
  - type: text
    content: ' consider '
  - type: text
    content: and
  - type: text
    content: ' comprehend by hearing!'
  '4':
  - type: text
    content: ' But they kept silent. Then He took hold [of the man] and cured him and sent him away.'
  '5':
  - type: text
    content: ' And He said to them, Which of you, having a son '
  - type: text
    content: or a donkey
  - type: text
    content: ' or an ox that has fallen into a well, will not at once pull him out on the Sabbath day?'
  '6':
  - type: text
    content: ' And they were unable to reply to this.'
  '7':
  - type: text
    content: ' Now He told a parable to those who were invited, [when] He noticed how they were selecting the places of honor, saying to them,'
  '8':
  - type: text
    content: ' When you are invited by anyone to a marriage feast, do not recline on the chief seat [in the place of honor], lest a more distinguished person than you has been invited by him, [Prov. 25:6, 7.]'
  '9':
  - type: text
    content: ' And he who invited both of you will come to you and say, Let this man have the place [you have taken]. Then, with humiliation '
  - type: text
    content: and
  - type: text
    content: ' a guilty sense of impropriety, you will begin to take the lowest place.'
