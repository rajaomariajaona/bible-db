document_id: JOB.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BE THAT as it may, Job, I beg of you to hear what I have to say and give heed to all my words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Behold, here I am with open mouth; here is my tongue talking.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' My words shall express the uprightness of my heart, and my lips shall speak what they know with utter sincerity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [It is] the Spirit of God that made me [which has stirred me up], and the breath of the Almighty that gives me life [which inspires me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Answer me now, if you can; set your words in order before me; take your stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Behold, I am toward God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' before Him even as you are; I also am formed out of the clay [though I speak with abnormal wisdom because of a divine illumination].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' See my terror [for I am only a fellow mortal, not God]; I shall not make you afraid, neither shall my pressure be heavy upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Surely you have spoken in my hearing, and I have heard the voice of your words, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I am clean, without transgression; I am innocent, neither is there iniquity in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But behold, God finds occasions against me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' causes of alienation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indifference; He counts me as His enemy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He puts my feet in the stocks; He [untrustingly] watches all my paths [you say].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I reply to you, Behold, in this you are not just; God is superior to man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Why do you contend against Him? For He does not give account of any of His actions. [Sufficient for us it should be to know that it is He Who does them.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For God [does reveal His will; He] speaks not only once, but more than once, even though men do not regard it [including you, Job].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [One may hear God''s voice] in a dream, in a vision of the night, when deep sleep falls on men while slumbering upon the bed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then He opens the ears of men and seals their instruction [terrifying them with warnings],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' That He may withdraw man from his purpose and cut off pride from him [disgusting him with his own disappointing self-sufficiency].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He holds him back from the pit [of destruction], and his life from perishing by the sword [of God''s destructive judgments].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [God''s voice may be heard by man when] he is chastened with pain upon his bed and with continual strife in his bones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' while all his bones are firmly set,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So that his desire makes him loathe food, and even dainty dishes [nauseate him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' His flesh is so wasted away that it cannot be seen, and his bones that were not seen stick out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Yes, his soul draws near to corruption, and his life to the inflicters of death (the destroyers).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [God''s voice may be heard] if there is for the hearer a messenger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an angel, an interpreter, one among a thousand, to show to man what is right for him [how to be upright and in right standing with God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then [God] is gracious to him and says, Deliver him from going down into the pit [of destruction]; I have found a ransom (a price of redemption, an atonement)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' [Then the man''s] flesh shall be restored; it becomes fresher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more tender than a child''s; he returns to the days of his youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He prays to God, and He is favorable to him, so that he sees His face with joy; for [God] restores to him his righteousness (his uprightness and right standing with God–with its joys).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He looks upon other men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sings out to them, I have sinned and perverted that which was right, and it did not profit me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' He did not requite me [according to my iniquity]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' [God] has redeemed my life from going down to the pit [of destruction], and my life shall see the light!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' [Elihu comments] Behold, God does all these things twice, yes, three times, with a man,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' To bring back his life from the pit [of destruction], that he may be enlightened with the light of the living.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Give heed, O Job, listen to me; hold your peace, and I will speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' If you have anything to say, answer me; speak, for I desire to justify you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' If [you do] not [have anything to say], listen to me; hold your peace, and I will teach you wisdom.'
