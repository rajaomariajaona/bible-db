document_id: JOB.33,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BE THAT as it may, Job, I beg of you to hear what I have to say and give heed to all my words.'
  '10':
  - type: text
    content: ' But behold, God finds occasions against me '
  - type: text
    content: and
  - type: text
    content: ' causes of alienation '
  - type: text
    content: and
  - type: text
    content: ' indifference; He counts me as His enemy.'
  '11':
  - type: text
    content: ' He puts my feet in the stocks; He [untrustingly] watches all my paths [you say].'
  '12':
  - type: text
    content: ' I reply to you, Behold, in this you are not just; God is superior to man.'
  '13':
  - type: text
    content: ' Why do you contend against Him? For He does not give account of any of His actions. [Sufficient for us it should be to know that it is He Who does them.]'
  '14':
  - type: text
    content: ' For God [does reveal His will; He] speaks not only once, but more than once, even though men do not regard it [including you, Job].'
  '15':
  - type: text
    content: ' [One may hear God''s voice] in a dream, in a vision of the night, when deep sleep falls on men while slumbering upon the bed,'
  '16':
  - type: text
    content: ' Then He opens the ears of men and seals their instruction [terrifying them with warnings],'
  '17':
  - type: text
    content: ' That He may withdraw man from his purpose and cut off pride from him [disgusting him with his own disappointing self-sufficiency].'
  '18':
  - type: text
    content: ' He holds him back from the pit [of destruction], and his life from perishing by the sword [of God''s destructive judgments].'
  '19':
  - type: text
    content: ' [God''s voice may be heard by man when] he is chastened with pain upon his bed and with continual strife in his bones '
  - type: text
    content: or
  - type: text
    content: ' while all his bones are firmly set,'
  '2':
  - type: text
    content: ' Behold, here I am with open mouth; here is my tongue talking.'
  '20':
  - type: text
    content: ' So that his desire makes him loathe food, and even dainty dishes [nauseate him].'
  '21':
  - type: text
    content: ' His flesh is so wasted away that it cannot be seen, and his bones that were not seen stick out.'
  '22':
  - type: text
    content: ' Yes, his soul draws near to corruption, and his life to the inflicters of death (the destroyers).'
  '23':
  - type: text
    content: ' [God''s voice may be heard] if there is for the hearer a messenger '
  - type: text
    content: or
  - type: text
    content: ' an angel, an interpreter, one among a thousand, to show to man what is right for him [how to be upright and in right standing with God],'
  '24':
  - type: text
    content: ' Then [God] is gracious to him and says, Deliver him from going down into the pit [of destruction]; I have found a ransom (a price of redemption, an atonement)!'
  '25':
  - type: text
    content: ' [Then the man''s] flesh shall be restored; it becomes fresher '
  - type: text
    content: and
  - type: text
    content: ' more tender than a child''s; he returns to the days of his youth.'
  '26':
  - type: text
    content: ' He prays to God, and He is favorable to him, so that he sees His face with joy; for [God] restores to him his righteousness (his uprightness and right standing with God–with its joys).'
  '27':
  - type: text
    content: ' He looks upon other men '
  - type: text
    content: or
  - type: text
    content: ' sings out to them, I have sinned and perverted that which was right, and it did not profit me, '
  - type: text
    content: or
  - type: text
    content: ' He did not requite me [according to my iniquity]!'
  '28':
  - type: text
    content: ' [God] has redeemed my life from going down to the pit [of destruction], and my life shall see the light!'
  '29':
  - type: text
    content: ' [Elihu comments] Behold, God does all these things twice, yes, three times, with a man,'
  '3':
  - type: text
    content: ' My words shall express the uprightness of my heart, and my lips shall speak what they know with utter sincerity.'
  '30':
  - type: text
    content: ' To bring back his life from the pit [of destruction], that he may be enlightened with the light of the living.'
  '31':
  - type: text
    content: ' Give heed, O Job, listen to me; hold your peace, and I will speak.'
  '32':
  - type: text
    content: ' If you have anything to say, answer me; speak, for I desire to justify you.'
  '33':
  - type: text
    content: ' If [you do] not [have anything to say], listen to me; hold your peace, and I will teach you wisdom.'
  '4':
  - type: text
    content: ' [It is] the Spirit of God that made me [which has stirred me up], and the breath of the Almighty that gives me life [which inspires me].'
  '5':
  - type: text
    content: ' Answer me now, if you can; set your words in order before me; take your stand.'
  '6':
  - type: text
    content: ' Behold, I am toward God '
  - type: text
    content: and
  - type: text
    content: ' before Him even as you are; I also am formed out of the clay [though I speak with abnormal wisdom because of a divine illumination].'
  '7':
  - type: text
    content: ' See my terror [for I am only a fellow mortal, not God]; I shall not make you afraid, neither shall my pressure be heavy upon you.'
  '8':
  - type: text
    content: ' Surely you have spoken in my hearing, and I have heard the voice of your words, saying,'
  '9':
  - type: text
    content: ' I am clean, without transgression; I am innocent, neither is there iniquity in me.'
