document_id: ISA.60,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' ARISE [from the depression and prostration in which circumstances have kept you–rise to a new life]! Shine (be radiant with the glory of the Lord), for your light has come, and the glory of the Lord has risen upon you! [Zech. 8:23.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Foreigners shall build up your walls, and their kings shall minister to you; for in My wrath I smote you, but in My favor, pleasure, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goodwill I have had mercy, love, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pity for you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And your gates shall be open continually, they shall not be shut day or night, that men may bring to you the wealth of the nations–and their kings led in procession [your voluntary captives]. [Rev. 21:24-27.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For the nation and kingdom that will not serve you in that day [Jerusalem] shall perish; yes, those nations shall be utterly laid waste.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The glory of Lebanon shall come to you, the cypress, the plane, and the pine [trees] together, to beautify the place of My sanctuary; and I will make the place of My feet glorious.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The sons of those who afflicted you shall come bending low to you, and all those who despised you shall bow down at your feet, and they shall call you the City of the Lord, the Zion of the Holy One of Israel. [Rev. 3:9.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Whereas you have been forsaken and hated, so that no man passed through you, I will make you [Jerusalem] an eternal glory, a joy from age to age.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' You shall suck the milk of the [Gentile] nations and shall suck the breast of kings; and you shall recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that I, the Lord, am your Savior and your Redeemer, the Mighty One of Jacob.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Instead of bronze I will bring gold, and instead of iron I will bring silver; and instead of wood, bronze, and instead of stones, iron. [Instead of the tyranny of the present] I will appoint peace as your officers and righteousness as your taskmasters.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Violence shall no more be heard in your land, nor devastation or destruction within your borders, but you shall call your walls Salvation and your gates Praise.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The sun shall no more be your light by day, nor for brightness shall the moon give light to you, but the Lord shall be to you an everlasting light, and your God your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your beauty. [Jer. 9:23, 24; Rev. 21:23.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For behold, darkness shall cover the earth, and dense darkness [all] peoples, but the Lord shall arise upon you [O Jerusalem], and His glory shall be seen on you. [Isa. 60:19-22; Mal. 4:2; Rev. 21:2, 3.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Your sun shall no more go down, nor shall your moon withdraw itself, for the Lord shall be your everlasting light, and the days of your mourning shall be ended.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Your people also shall all be [uncompromisingly and consistently] righteous; they shall possess the land forever, the branch of My planting, the work of My hands, that I may be glorified.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The least one shall become a thousand [a clan], and the small one a strong nation. I, the Lord, will hasten it in its [appointed] time.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And nations shall come to your light, and kings to the brightness of your rising. [Isa. 2:2, 3; Jer. 3:17.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Lift up your eyes round about you and see! They all gather themselves together, they come to you. Your sons shall come from afar, and your daughters shall be carried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nursed in the arms.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then you shall see and be radiant, and your heart shall thrill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tremble with joy [at the glorious deliverance] and be enlarged; because the abundant wealth of the [Dead] Sea shall be turned to you, unto you shall the nations come with their treasures. [Ps. 119:32.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' A multitude of camels [from the eastern trading tribes] shall cover you [Jerusalem], the young camels of Midian and Ephah; all the men from Sheba [who once came to trade] shall come, bringing gold and frankincense and proclaiming the praises of the Lord. [Matt. 2:11.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' All the flocks of Kedar shall be gathered to you [as the eastern pastoral tribes join the trading tribes], the rams of Nebaioth shall minister to you; they shall come up with acceptance on My altar, and My glorious house I will glorify.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Who are these who fly like a cloud, and like doves to their windows?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Surely the isles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distant coastlands shall wait for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expect Me; and the ships of Tarshish [shall come] first, to bring your sons from afar, their silver and gold with them, for the name of the Lord your God, for the Holy One of Israel, because He has beautified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorified you.'
