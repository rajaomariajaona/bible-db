document_id: ISA.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IN THAT day shall this song be sung in the land of Judah: We have a strong city; [the Lord] sets up salvation as walls and bulwarks.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Though favor is shown to the wicked, yet they do not learn righteousness; in the land of uprightness they deal perversely and refuse to see the majesty of the Lord.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Though Your hand is lifted high to strike, Lord, they do not see it. Let them see Your zeal for Your people and be ashamed; yes, let the fire reserved for Your enemies consume them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lord, You will ordain peace (God''s favor and blessings, both temporal and spiritual) for us, for You have also wrought in us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for us all our works.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O Lord, our God, other masters besides You have ruled over us, but we will acknowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mention Your name only.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They [the former tyrant masters] are dead, they shall not live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reappear; they are powerless ghosts, they shall not rise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' come back. Therefore You have visited and made an end of them and caused every memory of them [every trace of their supremacy] to perish.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have increased the nation, O Lord; You have increased the nation. You are glorified; You have enlarged all the borders of the land.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lord, when they were in trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress, they sought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' visited You; they poured out a prayerful whisper when Your chastening was upon them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As a woman with child drawing near the time of her delivery is in pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' writhes and cries out in her pangs, so we have been before You (at Your presence), O Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We have been with child, we have been writhing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in pain; we have, as it were, brought forth [only] wind. We have not wrought any deliverance in the earth, and the inhabitants of the world [of Israel] have not yet been born.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your dead shall live [O Lord]; the bodies of our dead [saints] shall rise. You who dwell in the dust, awake and sing for joy! For Your dew [O Lord] is a dew of [sparkling] light [heavenly, supernatural dew]; and the earth shall cast forth the dead [to life again; for on the land of the shades of the dead You will let Your dew fall]. [Ezek. 37:11-12.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Open the gates, that the [uncompromisingly] righteous nation which keeps her faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her troth [with God] may enter in.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Come, my people, enter your chambers and shut your doors behind you; hide yourselves for a little while until the [Lord''s] wrath is past.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For behold, the Lord is coming out of His place [heaven] to punish the inhabitants of the earth for their iniquity; the earth also will disclose the blood shed upon her and will no longer cover her slain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conceal her guilt.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will guard him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep him in perfect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' constant peace whose mind [both its inclination and its character] is stayed on You, because he commits himself to You, leans on You, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hopes confidently in You.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So trust in the Lord (commit yourself to Him, lean on Him, hope confidently in Him) forever; for the Lord God is an everlasting Rock [the Rock of Ages].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He has brought down the inhabitants of the height, the lofty city; He lays it low, lays it low to the ground; He brings it even to the dust.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The foot has trampled it down–even the feet of the poor, and the steps of the needy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The way of the [consistently] righteous (those living in moral and spiritual rectitude in every area and relationship of their lives) is level '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' straight; You, O [Lord], Who are upright, direct aright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make level the path of the [uncompromisingly] just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, in the path of Your judgments, O Lord, we wait [expectantly] for You; our heartfelt desire is for Your name and for the remembrance of You.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My soul yearns for You [O Lord] in the night, yes, my spirit within me seeks You earnestly; for [only] when Your judgments are in the earth will the inhabitants of the world learn righteousness (uprightness and right standing with God).'
