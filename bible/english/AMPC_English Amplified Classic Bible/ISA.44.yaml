document_id: ISA.44,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' YET NOW hear, O Jacob, My servant and Israel, whom I have chosen.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who is [such a fool as] to fashion a god or cast a graven image that is profitable for nothing?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, all his fellows shall be put to shame, and the craftsmen, [how can they make a god?] they are but men. Let them all be gathered together, let them stand forth; they shall be terrified, they shall be put to shame together.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The ironsmith sharpens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uses a chisel and works it over the coals; he shapes [the core of the idol] with hammers and forges it with his strong arm. He becomes hungry and his strength fails; he drinks no water and is faint.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The carpenter stretches out a line, he marks it out with a pencil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' red ocher; he fashions [an idol] with planes and marks it out with the compasses; and he shapes it to have the figure of a man, with the beauty of a man, that it may dwell in a house.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He hews for himself cedars, and takes the holm tree and the oak and lets them grow strong for himself among the trees of the forest; he plants a fir tree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an ash, and the rain nourishes it.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then it becomes fuel for a man to burn; a part of it he takes and warms himself, yes, he kindles a fire and bakes bread. [Then out of the remainder, the leavings] he also makes a god and worships it! He [with his own hands] makes it into a graven image and falls down and worships it!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He burns part of the wood in the fire; with part of it he [cooks and] eats flesh, he roasts meat and is satisfied. Also he warms himself and says, Aha! I am warm, I have seen the fire!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And from what is left [of the log] he makes a god, his graven idol. He falls down to it, he worships it and prays to it and says, Deliver me, for you are my god!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They do not know or understand, for their eyes God has let become besmeared so that they cannot see, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their minds as well so that they cannot understand.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And no one considers in his mind, nor has he knowledge and understanding [enough] to say [to himself], I have burned part of this log in the fire, and also I have baked bread on its coals and have roasted meat and eaten it. And shall I make the remainder of it into an abomination [the very essence of what is disgusting, detestable, and shamefully vile in the eyes of a jealous God]? Shall I fall down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the stock of a tree [a block of wood without consciousness or life]?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord, Who made you and formed you from the womb, Who will help you: Fear not, O Jacob, My servant, and you Jeshurun [the upright one–applied to Israel as a type of the Messiah], whom I have chosen.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That kind of man feeds on ashes [and finds his satisfaction in ashes]! A deluded mind has led him astray, so that he cannot release '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' save himself, or ask, Is not [this thing I am holding] in my right hand a lie?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Remember these things [earnestly], O Jacob, O Israel, for you are My servant! I formed you, you are My servant; O Israel, you shall not be forgotten by Me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have blotted out like a thick cloud your transgressions, and like a cloud your sins. Return to Me, for I have redeemed you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sing, O heavens, for the Lord has done it; shout, you depths of the earth; break forth into singing, you mountains, O forest and every tree in it! For the Lord has redeemed Jacob, and He glorifies Himself in Israel.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord, your Redeemer, and He Who formed you from the womb: I am the Lord, Who made all things, Who alone stretched out the heavens, Who spread out the earth by Myself [who was with Me]?–'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [I am the Lord] Who frustrates the signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounds the omens [upon which the false prophets'' forecasts of the future are based] of the [boasting] liars and makes fools of diviners, Who turns the wise backward and makes their knowledge foolishness, [I Cor. 1:20.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [The Lord] Who confirms the word of His servant and performs the counsel of His messengers, Who says of Jerusalem, She shall [again] be inhabited, and of the cities of Judah, They shall [again] be built, and I will raise up their ruins,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who says to the deep, Be dry, and I will dry up your rivers,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who says of Cyrus, He is My shepherd (ruler), and he shall perform all My pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fulfill all My purpose–even saying of Jerusalem, She shall [again] be built, and of the temple, Your foundation shall [again] be laid.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I will pour water upon him who is thirsty, and floods upon the dry ground. I will pour My Spirit upon your offspring, and My blessing upon your descendants. [Isa. 32:15; 35:6, 7; Joel 2:28; John 7:37-39.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall spring up among the grass like willows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' poplars by the watercourses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One will say, I am the Lord''s; and another will call himself by the name of Jacob; and another will write [even brand or tattoo] upon his hand, I am the Lord''s, and surname himself by the [honorable] name of Israel.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord, the King of Israel and his Redeemer, the Lord of hosts: I am the First and I am the Last; besides Me there is no God. [Rev. 1:17; 2:8; 22:13.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who is like Me? Let him [stand and] proclaim it, declare it, and set [his proofs] in order before Me, since I made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established the people of antiquity. [Who has announced from of old] the things that are coming? Then let them declare yet future things.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Fear not, nor be afraid [in the coming violent upheavals]; have I not told it to you from of old and declared it? And you are My witnesses! Is there a God besides Me? There is no [other] Rock; I know not any.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All who make graven idols are confusion, chaos, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthlessness. Their objects (idols) in which they delight do not profit them, and their own witnesses (worshipers) do not see or know, so that they are put to shame.'
