document_id: PSA.96,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O SING to the Lord a new song; sing to the Lord, all the earth!'
  '10':
  - type: text
    content: ' Say among the nations that the Lord reigns; the world also is established, so that it cannot be moved; He shall judge '
  - type: text
    content: and
  - type: text
    content: ' rule the people righteously '
  - type: text
    content: and
  - type: text
    content: ' with justice. [Rev. 11:15; 19:6.]'
  '11':
  - type: text
    content: ' Let the heavens be glad, and let the earth rejoice; let the sea roar, and all the things which fill it;'
  '12':
  - type: text
    content: ' Let the field be exultant, and all that is in it! Then shall all the trees of the wood sing for joy'
  '13':
  - type: text
    content: ' Before the Lord, for He comes, for He comes to judge '
  - type: text
    content: and
  - type: text
    content: ' govern the earth! He shall judge the world with righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice and the peoples with His faithfulness '
  - type: text
    content: and
  - type: text
    content: ' truth. [I Chron. 16:23-33; Rev. 19:11.]'
  '2':
  - type: text
    content: ' Sing to the Lord, bless (affectionately praise) His name; show forth His salvation from day to day.'
  '3':
  - type: text
    content: ' Declare His glory among the nations, His marvelous works among all the peoples.'
  '4':
  - type: text
    content: ' For great is the Lord and greatly to be praised; He is to be reverently feared '
  - type: text
    content: and
  - type: text
    content: ' worshiped above all [so-called] gods. [Deut. 6:5; Rev. 14:7.]'
  '5':
  - type: text
    content: ' For all the gods of the nations are [lifeless] idols, but the Lord made the heavens.'
  '6':
  - type: text
    content: ' Honor and majesty are before Him; strength and beauty are in His sanctuary.'
  '7':
  - type: text
    content: ' Ascribe to the Lord, O you families of the peoples, ascribe to the Lord glory and strength.'
  '8':
  - type: text
    content: ' Give to the Lord the glory due His name; bring an offering and come [before Him] into His courts.'
  '9':
  - type: text
    content: ' O worship the Lord in the beauty of holiness; tremble before '
  - type: text
    content: and
  - type: text
    content: ' reverently fear Him, all the earth.'
