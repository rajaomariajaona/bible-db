document_id: PSA.96,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O SING to the Lord a new song; sing to the Lord, all the earth!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Say among the nations that the Lord reigns; the world also is established, so that it cannot be moved; He shall judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rule the people righteously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with justice. [Rev. 11:15; 19:6.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Let the heavens be glad, and let the earth rejoice; let the sea roar, and all the things which fill it;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Let the field be exultant, and all that is in it! Then shall all the trees of the wood sing for joy'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Before the Lord, for He comes, for He comes to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' govern the earth! He shall judge the world with righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice and the peoples with His faithfulness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truth. [I Chron. 16:23-33; Rev. 19:11.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Sing to the Lord, bless (affectionately praise) His name; show forth His salvation from day to day.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Declare His glory among the nations, His marvelous works among all the peoples.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For great is the Lord and greatly to be praised; He is to be reverently feared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshiped above all [so-called] gods. [Deut. 6:5; Rev. 14:7.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For all the gods of the nations are [lifeless] idols, but the Lord made the heavens.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Honor and majesty are before Him; strength and beauty are in His sanctuary.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Ascribe to the Lord, O you families of the peoples, ascribe to the Lord glory and strength.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Give to the Lord the glory due His name; bring an offering and come [before Him] into His courts.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' O worship the Lord in the beauty of holiness; tremble before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverently fear Him, all the earth.'
