document_id: PSA.40,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' I WAITED patiently '
  - type: text
    content: and
  - type: text
    content: ' expectantly for the Lord; and He inclined to me and heard my cry.'
  '10':
  - type: text
    content: ' I have not concealed Your righteousness within my heart; I have proclaimed Your faithfulness and Your salvation. I have not hid away Your steadfast love and Your truth from the great assembly. [Acts 20:20, 27.]'
  '11':
  - type: text
    content: ' Withhold not Your tender mercy from me, O Lord; let Your loving-kindness and Your truth continually preserve me!'
  '12':
  - type: text
    content: ' For innumerable evils have compassed me about; my iniquities have taken such hold on me that I am not able to look up. They are more than the hairs of my head, and my heart has failed me '
  - type: text
    content: and
  - type: text
    content: ' forsaken me.'
  '13':
  - type: text
    content: ' Be pleased, O Lord, to deliver me; O Lord, make haste to help me!'
  '14':
  - type: text
    content: ' Let them be put to shame and confounded together who seek '
  - type: text
    content: and
  - type: text
    content: ' require my life to destroy it; let them be driven backward and brought to dishonor who wish me evil '
  - type: text
    content: and
  - type: text
    content: ' delight in my hurt!'
  '15':
  - type: text
    content: ' Let them be desolate by reason of their shame who say to me, Aha, aha!'
  '16':
  - type: text
    content: ' Let all those that seek '
  - type: text
    content: and
  - type: text
    content: ' require You rejoice and be glad in You; let such as love Your salvation say continually, The Lord be magnified!'
  '17':
  - type: text
    content: ' [As for me] I am poor and needy, yet the Lord takes thought '
  - type: text
    content: and
  - type: text
    content: ' plans for me. You are my Help and my Deliverer. O my God, do not tarry! [Ps. 70:1-5; I Pet. 5:7.]'
  '2':
  - type: text
    content: ' He drew me up out of a horrible pit [a pit of tumult and of destruction], out of the miry clay (froth and slime), and set my feet upon a rock, steadying my steps '
  - type: text
    content: and
  - type: text
    content: ' establishing my goings.'
  '3':
  - type: text
    content: ' And He has put a new song in my mouth, a song of praise to our God. Many shall see and fear (revere and worship) and put their trust '
  - type: text
    content: and
  - type: text
    content: ' confident reliance in the Lord. [Ps. 5:11.]'
  '4':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) is the man who makes the Lord his refuge '
  - type: text
    content: and
  - type: text
    content: ' trust, and turns not to the proud or to followers of false gods.'
  '5':
  - type: text
    content: ' Many, O Lord my God, are the wonderful works which You have done, and Your thoughts toward us; no one can compare with You! If I should declare and speak of them, they are too many to be numbered.'
  '6':
  - type: text
    content: ' Sacrifice and offering You do not desire, '
  - type: text
    content: nor
  - type: text
    content: ' have You delight in them; You have given me the capacity to hear '
  - type: text
    content: and
  - type: text
    content: ' obey [Your law, a more valuable service than] burnt offerings and sin offerings [which] You do not require.'
  '7':
  - type: text
    content: ' Then said I, Behold, I come; in the volume of the book it is written of me;'
  '8':
  - type: text
    content: ' I delight to do Your will, O my God; yes, Your law is within my heart. [Heb. 10:5-9.]'
  '9':
  - type: text
    content: ' I have proclaimed glad tidings of righteousness in the great assembly [tidings of uprightness and right standing with God]. Behold, I have not restrained my lips, as You know, O Lord.'
