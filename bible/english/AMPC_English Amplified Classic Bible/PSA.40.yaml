document_id: PSA.40,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I WAITED patiently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectantly for the Lord; and He inclined to me and heard my cry.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I have not concealed Your righteousness within my heart; I have proclaimed Your faithfulness and Your salvation. I have not hid away Your steadfast love and Your truth from the great assembly. [Acts 20:20, 27.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Withhold not Your tender mercy from me, O Lord; let Your loving-kindness and Your truth continually preserve me!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For innumerable evils have compassed me about; my iniquities have taken such hold on me that I am not able to look up. They are more than the hairs of my head, and my heart has failed me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forsaken me.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Be pleased, O Lord, to deliver me; O Lord, make haste to help me!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Let them be put to shame and confounded together who seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require my life to destroy it; let them be driven backward and brought to dishonor who wish me evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in my hurt!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Let them be desolate by reason of their shame who say to me, Aha, aha!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Let all those that seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require You rejoice and be glad in You; let such as love Your salvation say continually, The Lord be magnified!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' [As for me] I am poor and needy, yet the Lord takes thought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans for me. You are my Help and my Deliverer. O my God, do not tarry! [Ps. 70:1-5; I Pet. 5:7.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He drew me up out of a horrible pit [a pit of tumult and of destruction], out of the miry clay (froth and slime), and set my feet upon a rock, steadying my steps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establishing my goings.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And He has put a new song in my mouth, a song of praise to our God. Many shall see and fear (revere and worship) and put their trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident reliance in the Lord. [Ps. 5:11.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man who makes the Lord his refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust, and turns not to the proud or to followers of false gods.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Many, O Lord my God, are the wonderful works which You have done, and Your thoughts toward us; no one can compare with You! If I should declare and speak of them, they are too many to be numbered.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Sacrifice and offering You do not desire, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' have You delight in them; You have given me the capacity to hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey [Your law, a more valuable service than] burnt offerings and sin offerings [which] You do not require.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then said I, Behold, I come; in the volume of the book it is written of me;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I delight to do Your will, O my God; yes, Your law is within my heart. [Heb. 10:5-9.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I have proclaimed glad tidings of righteousness in the great assembly [tidings of uprightness and right standing with God]. Behold, I have not restrained my lips, as You know, O Lord.'
