document_id: EZK.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, speak to your people [the Israelite captives in Babylon] and say to them, When I bring the sword upon a land and the people of the land take a man from among them and make him their watchman,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If when he sees the sword coming upon the land, he blows the trumpet and warns the people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then whoever hears the sound of the trumpet and does not take warning, and the sword comes and takes him away, his blood shall be upon his own head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He heard the sound of the trumpet and did not take warning; his blood shall be upon himself. But he who takes warning shall save his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But if the watchman sees the sword coming and does not blow the trumpet and the people are not warned, and the sword comes and takes any one of them, he is taken away in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for his perversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity, but his blood will I require at the watchman''s hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So you, son of man, I have made you a watchman for the house of Israel; therefore hear the word at My mouth and give them warning from Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When I say to the wicked, O wicked man, you shall surely die, and you do not speak to warn the wicked from his way, that wicked man shall die in his perversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity, but his blood will I require at your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But if you warn the wicked to turn from his evil way and he does not turn from his evil way, he shall die in his iniquity, but you will have saved your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And you, son of man, say to the house of Israel, Thus you have said: Truly our transgressions and our sins are upon us, and we waste away because of them; how then can we live?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Say to them, As I live, says the Lord God, I have no pleasure in the death of the wicked, but rather that the wicked turn from his way and live. Turn back, turn back from your evil ways, for why will you die, O house of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you, son of man, say to your people, The uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice of the [uncompromisingly] righteous shall not deliver him in the day of his transgression; and as for the wicked lawlessness of the wicked lawless, he shall not fall because of it in the day that he turns from his wickedness, neither shall the rigidly upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just be able to live because of his past righteousness in the day that he sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misses the mark [in keeping in harmony and right standing with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When I shall say to the [uncompromisingly] righteous that he shall surely live, and he trusts to his own righteousness [to save him] and commits iniquity (heinous sin), all his righteous deeds shall not be [seriously] remembered; but for his perversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity that he has committed he shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Again, when I have said to the wicked, You shall surely die, if he turns from his sin and does that which is lawful and right–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' If the wicked restores [what he took in] pledge, gives back what he had taken in robbery, walks in the statutes of life [right relationship with God], without committing iniquity, he shall surely live; he shall not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' None of his sins that he has committed shall be [seriously] remembered against him; he has done that which is lawful and right; he shall surely live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Yet your people say, The way of the Lord is not perfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even just; but as for them, it is their own way that is not perfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even just.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When the righteous turns back from his [uncompromising] righteousness and commits perverseness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity, he shall even die in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' because of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But if the wicked turns back from his wickedness and does what is lawful and right, he shall live because of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Yet you say, The way of the Lord is not perfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' [even] just. O you house of Israel, I will judge you, every one according to his own ways!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' In the twelfth year of our captivity [in Babylon], in the tenth [month], on the fifth [day] of the month, a man who had escaped out of Jerusalem came to me [Ezekiel], saying, The city [Jerusalem] is taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Now the hand of the Lord had been upon me in the evening before this one who had escaped came, and He had opened my mouth [in readiness for the fugitives] coming to me in the morning, and my mouth was opened and I was no longer dumb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Son of man, those [back in Palestine] who inhabit those wastes of the ground of Israel are saying, Abraham was only one man and he inherited the land, but we are many; the land is surely given to us to possess as our inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Therefore say to them, Thus says the Lord God: You eat meat with the blood [as an idolatrous rite] and lift up your eyes to your [filthy] idols and shed blood; shall you then possess the land? [Gen. 9:4; Lev. 3:17; 7:27; Acts 15:28, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' You stand upon your sword [as your dependence]; you commit abominations and each of you defiles your neighbor''s wife; shall you then possess the land?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Say this to them, Thus says the Lord God: As I live, surely those who are in the waste places shall fall by the sword, and him that is in the open field will I give to the beasts to be devoured, and those who are in strongholds and in caves shall die by pestilence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And I will make the land [of Israel] a desolation and a waste, and her proud might shall cease, and the mountains of Israel shall be so desolate that no one will pass through them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then shall they know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord, when I have made the land a desolation and a waste because of all their abominations which they have committed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' As for you, son of man, your people who talk of you by the walls and in the doors of the houses say one to another, every one to his brother, Come and hear what the word is that comes forth from the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they come to you as people come, and they sit before you as My people, and they hear the words you say, but they will not do them; for with their mouths they show much love, but their hearts go after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are set on their [idolatrous greed for] gain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Behold, you are to them as a very lovely [love] song of one who has a pleasant voice and can play well on an instrument, for they hear your words but do not do them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' When this comes to pass–for behold, it will come!–then shall they know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that a prophet has been among them.'
