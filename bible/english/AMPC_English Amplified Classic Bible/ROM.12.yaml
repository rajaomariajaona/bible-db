document_id: ROM.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I APPEAL to you therefore, brethren, '
  - type: text
    content: and
  - type: text
    content: ' beg of you in view of [all] the mercies of God, to make a decisive dedication of your bodies [presenting all your members and faculties] as a living sacrifice, holy (devoted, consecrated) and well pleasing to God, which is your reasonable (rational, intelligent) service '
  - type: text
    content: and
  - type: text
    content: ' spiritual worship.'
  '10':
  - type: text
    content: ' Love one another with brotherly affection [as members of one family], giving precedence '
  - type: text
    content: and
  - type: text
    content: ' showing honor to one another.'
  '11':
  - type: text
    content: ' Never lag in zeal '
  - type: text
    content: and
  - type: text
    content: ' in earnest endeavor; be aglow '
  - type: text
    content: and
  - type: text
    content: ' burning with the Spirit, serving the Lord.'
  '12':
  - type: text
    content: ' Rejoice '
  - type: text
    content: and
  - type: text
    content: ' exult in hope; be steadfast and patient in suffering '
  - type: text
    content: and
  - type: text
    content: ' tribulation; be constant in prayer.'
  '13':
  - type: text
    content: ' Contribute to the needs of God''s people [sharing in the necessities of the saints]; pursue the practice of hospitality.'
  '14':
  - type: text
    content: ' Bless those who persecute you [who are cruel in their attitude toward you]; bless and do not curse them.'
  '15':
  - type: text
    content: ' Rejoice with those who rejoice [sharing others'' joy], and weep with those who weep [sharing others'' grief].'
  '16':
  - type: text
    content: ' Live in harmony with one another; do not be haughty (snobbish, high-minded, exclusive), but readily adjust yourself to [people, things] '
  - type: text
    content: and
  - type: text
    content: ' give yourselves to humble tasks. Never overestimate yourself '
  - type: text
    content: or
  - type: text
    content: ' be wise in your own conceits. [Prov. 3:7.]'
  '17':
  - type: text
    content: ' Repay no one evil for evil, but take thought for what is honest '
  - type: text
    content: and
  - type: text
    content: ' proper '
  - type: text
    content: and
  - type: text
    content: ' noble [aiming to be above reproach] in the sight of everyone. [Prov. 20:22.]'
  '18':
  - type: text
    content: ' If possible, as far as it depends on you, live at peace with everyone.'
  '19':
  - type: text
    content: ' Beloved, never avenge yourselves, but leave the way open for [God''s] wrath; for it is written, Vengeance is Mine, I will repay (requite), says the Lord. [Deut. 32:35.]'
  '2':
  - type: text
    content: ' Do not be conformed to this world (this age), [fashioned after and adapted to its external, superficial customs], but be transformed (changed) by the [entire] renewal of your mind [by its new ideals and its new attitude], so that you may prove [for yourselves] what is the good and acceptable and perfect will of God, '
  - type: text
    content: even
  - type: text
    content: ' the thing which is good and acceptable and perfect [in His sight for you].'
  '20':
  - type: text
    content: ' But if your enemy is hungry, feed him; if he is thirsty, give him drink; for by so doing you will heap burning coals upon his head. [Prov. 25:21, 22.]'
  '21':
  - type: text
    content: ' Do not let yourself be overcome by evil, but overcome (master) evil with good.'
  '3':
  - type: text
    content: ' For by the grace (unmerited favor of God) given to me I warn everyone among you not to estimate '
  - type: text
    content: and
  - type: text
    content: ' think of himself more highly than he ought [not to have an exaggerated opinion of his own importance], but to rate his ability with sober judgment, each according to the degree of faith apportioned by God to him.'
  '4':
  - type: text
    content: ' For as in one physical body we have many parts (organs, members) and all of these parts do not have the same function '
  - type: text
    content: or
  - type: text
    content: ' use,'
  '5':
  - type: text
    content: ' So we, numerous as we are, are one body in Christ (the Messiah) and individually we are parts one of another [mutually dependent on one another].'
  '6':
  - type: text
    content: ' Having gifts (faculties, talents, qualities) that differ according to the grace given us, let us use them: [He whose gift is] prophecy, [let him prophesy] according to the proportion of his faith;'
  '7':
  - type: text
    content: ' [He whose gift is] practical service, let him give himself to serving; he who teaches, to his teaching;'
  '8':
  - type: text
    content: ' He who exhorts (encourages), to his exhortation; he who contributes, let him do it in simplicity '
  - type: text
    content: and
  - type: text
    content: ' liberality; he who gives aid '
  - type: text
    content: and
  - type: text
    content: ' superintends, with zeal '
  - type: text
    content: and
  - type: text
    content: ' singleness of mind; he who does acts of mercy, with genuine cheerfulness '
  - type: text
    content: and
  - type: text
    content: ' joyful eagerness.'
  '9':
  - type: text
    content: ' [Let your] love be sincere (a real thing); hate what is evil [loathe all ungodliness, turn in horror from wickedness], but hold fast to that which is good.'
