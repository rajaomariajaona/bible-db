document_id: 1CO.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IF I [can] speak in the tongues of men and [even] of angels, but have not love (that reasoning, intentional, spiritual devotion such as is inspired by God''s love for and in us), I am only a noisy gong or a clanging cymbal.'
  '10':
  - type: text
    content: ' But when the complete '
  - type: text
    content: and
  - type: text
    content: ' perfect (total) comes, the incomplete '
  - type: text
    content: and
  - type: text
    content: ' imperfect will vanish away (become antiquated, void, and superseded).'
  '11':
  - type: text
    content: ' When I was a child, I talked like a child, I thought like a child, I reasoned like a child; now that I have become a man, I am done with childish ways '
  - type: text
    content: and
  - type: text
    content: ' have put them aside.'
  '12':
  - type: text
    content: ' For now we are looking in a mirror that gives only a dim (blurred) reflection [of reality as in a riddle or enigma], but then [when perfection comes] we shall see in reality '
  - type: text
    content: and
  - type: text
    content: ' face to face! Now I know in part (imperfectly), but then I shall know '
  - type: text
    content: and
  - type: text
    content: ' understand fully '
  - type: text
    content: and
  - type: text
    content: ' clearly, even in the same manner as I have been fully '
  - type: text
    content: and
  - type: text
    content: ' clearly known '
  - type: text
    content: and
  - type: text
    content: ' understood [by God].'
  '13':
  - type: text
    content: ' And so faith, hope, love abide [faith–conviction and belief respecting man''s relation to God and divine things; hope–joyful and confident expectation of eternal salvation; love–true affection for God and man, growing out of God''s love for and in us], these three; but the greatest of these is love.'
  '2':
  - type: text
    content: ' And if I have prophetic powers (the gift of interpreting the divine will and purpose), and understand all the secret truths '
  - type: text
    content: and
  - type: text
    content: ' mysteries and possess all knowledge, and if I have [sufficient] faith so that I can remove mountains, but have not love (God''s love in me) I am nothing (a useless nobody).'
  '3':
  - type: text
    content: ' Even if I dole out all that I have [to the poor in providing] food, and if I surrender my body to be burned '
  - type: text
    content: or in order that I may glory
  - type: text
    content: ', but have not love (God''s love in me), I gain nothing.'
  '4':
  - type: text
    content: ' Love endures long '
  - type: text
    content: and
  - type: text
    content: ' is patient and kind; love never is envious '
  - type: text
    content: nor
  - type: text
    content: ' boils over with jealousy, is not boastful '
  - type: text
    content: or
  - type: text
    content: ' vainglorious, does not display itself haughtily.'
  '5':
  - type: text
    content: ' It is not conceited (arrogant and inflated with pride); it is not rude (unmannerly) '
  - type: text
    content: and
  - type: text
    content: ' does not act unbecomingly. Love (God''s love in us) does not insist on its own rights '
  - type: text
    content: or
  - type: text
    content: ' its own way, '
  - type: text
    content: for
  - type: text
    content: ' it is not self-seeking; it is not touchy '
  - type: text
    content: or
  - type: text
    content: ' fretful '
  - type: text
    content: or
  - type: text
    content: ' resentful; it takes no account of the evil done to it [it pays no attention to a suffered wrong].'
  '6':
  - type: text
    content: ' It does not rejoice at injustice '
  - type: text
    content: and
  - type: text
    content: ' unrighteousness, but rejoices when right '
  - type: text
    content: and
  - type: text
    content: ' truth prevail.'
  '7':
  - type: text
    content: ' Love bears up under anything '
  - type: text
    content: and
  - type: text
    content: ' everything that comes, is ever ready to believe the best of every person, its hopes are fadeless under all circumstances, and it endures everything [without weakening].'
  '8':
  - type: text
    content: ' Love never fails [never fades out or becomes obsolete or comes to an end]. As for prophecy (the gift of interpreting the divine will and purpose), it will be fulfilled '
  - type: text
    content: and
  - type: text
    content: ' pass away; as for tongues, they will be destroyed '
  - type: text
    content: and
  - type: text
    content: ' cease; as for knowledge, it will pass away [it will lose its value and be superseded by truth].'
  '9':
  - type: text
    content: ' For our knowledge is fragmentary (incomplete and imperfect), and our prophecy (our teaching) is fragmentary (incomplete and imperfect).'
