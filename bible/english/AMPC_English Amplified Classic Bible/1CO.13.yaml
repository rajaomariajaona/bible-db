document_id: 1CO.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IF I [can] speak in the tongues of men and [even] of angels, but have not love (that reasoning, intentional, spiritual devotion such as is inspired by God''s love for and in us), I am only a noisy gong or a clanging cymbal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And if I have prophetic powers (the gift of interpreting the divine will and purpose), and understand all the secret truths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mysteries and possess all knowledge, and if I have [sufficient] faith so that I can remove mountains, but have not love (God''s love in me) I am nothing (a useless nobody).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Even if I dole out all that I have [to the poor in providing] food, and if I surrender my body to be burned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or in order that I may glory
  - type: text
    text: ', but have not love (God''s love in me), I gain nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Love endures long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is patient and kind; love never is envious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' boils over with jealousy, is not boastful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vainglorious, does not display itself haughtily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It is not conceited (arrogant and inflated with pride); it is not rude (unmannerly) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' does not act unbecomingly. Love (God''s love in us) does not insist on its own rights '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' its own way, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' it is not self-seeking; it is not touchy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fretful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' resentful; it takes no account of the evil done to it [it pays no attention to a suffered wrong].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' It does not rejoice at injustice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrighteousness, but rejoices when right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truth prevail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Love bears up under anything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' everything that comes, is ever ready to believe the best of every person, its hopes are fadeless under all circumstances, and it endures everything [without weakening].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Love never fails [never fades out or becomes obsolete or comes to an end]. As for prophecy (the gift of interpreting the divine will and purpose), it will be fulfilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pass away; as for tongues, they will be destroyed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cease; as for knowledge, it will pass away [it will lose its value and be superseded by truth].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For our knowledge is fragmentary (incomplete and imperfect), and our prophecy (our teaching) is fragmentary (incomplete and imperfect).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But when the complete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfect (total) comes, the incomplete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' imperfect will vanish away (become antiquated, void, and superseded).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When I was a child, I talked like a child, I thought like a child, I reasoned like a child; now that I have become a man, I am done with childish ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have put them aside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For now we are looking in a mirror that gives only a dim (blurred) reflection [of reality as in a riddle or enigma], but then [when perfection comes] we shall see in reality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' face to face! Now I know in part (imperfectly), but then I shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand fully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clearly, even in the same manner as I have been fully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clearly known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understood [by God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And so faith, hope, love abide [faith–conviction and belief respecting man''s relation to God and divine things; hope–joyful and confident expectation of eternal salvation; love–true affection for God and man, growing out of God''s love for and in us], these three; but the greatest of these is love.'
