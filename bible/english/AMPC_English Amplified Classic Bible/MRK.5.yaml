document_id: MRK.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEY CAME to the other side of the sea to the region of the Gerasenes.'
  '10':
  - type: text
    content: ' And he kept begging Him urgently not to send them [himself and the other demons] away out of that region.'
  '11':
  - type: text
    content: ' Now a great herd of hogs was grazing there on the hillside.'
  '12':
  - type: text
    content: ' And '
  - type: text
    content: the demons
  - type: text
    content: ' begged Him, saying, Send us to the hogs, that we may go into them!'
  '13':
  - type: text
    content: ' So He gave them permission. And the unclean spirits came out [of the man] and entered into the hogs; and the herd, numbering about 2,000, rushed headlong down the steep slope into the sea and were drowned in the sea.'
  '14':
  - type: text
    content: ' The hog feeders ran away, and told [it] in the town and in the country. And [the people] came to see what it was that had taken place.'
  '15':
  - type: text
    content: ' And they came to Jesus and looked intently '
  - type: text
    content: and
  - type: text
    content: ' searchingly at the man who had been a demoniac, sitting there, clothed and in his right mind, [the same man] who had had the legion [of demons]; and they were seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' struck with fear.'
  '16':
  - type: text
    content: ' And those who had seen it related in full what had happened to the man possessed by demons and to the hogs.'
  '17':
  - type: text
    content: ' And they began to beg [Jesus] to leave their neighborhood.'
  '18':
  - type: text
    content: ' And when He had stepped into the boat, the man who had been controlled by the unclean spirits kept begging Him that he might be with Him.'
  '19':
  - type: text
    content: ' But Jesus refused to permit him, but said to him, Go home to your own [family and relatives and friends] and bring back word to them of how much the Lord has done for you, and [how He has] had sympathy for you '
  - type: text
    content: and
  - type: text
    content: ' mercy on you.'
  '2':
  - type: text
    content: ' And as soon as He got out of the boat, there met Him out of the tombs a man [under the power] of an unclean spirit.'
  '20':
  - type: text
    content: ' And he departed and began to publicly proclaim in Decapolis [the region of the ten cities] how much Jesus had done for him, and all the people were astonished '
  - type: text
    content: and
  - type: text
    content: ' marveled. [Matt. 4:25.]'
  '21':
  - type: text
    content: ' And when Jesus had recrossed in the boat to the other side, a great throng gathered about Him, and He was at the lakeshore.'
  '22':
  - type: text
    content: ' Then one of the rulers of the synagogue came up, Jairus by name; and seeing Him, he prostrated himself at His feet'
  '23':
  - type: text
    content: ' And begged Him earnestly, saying, My little daughter is at the point of death. Come and lay Your hands on her, so that she may be healed '
  - type: text
    content: and
  - type: text
    content: ' live.'
  '24':
  - type: text
    content: ' And Jesus went with him; and a great crowd kept following Him and pressed Him from all sides [so as almost to suffocate Him].'
  '25':
  - type: text
    content: ' And there was a woman who had had a flow of blood for twelve years,'
  '26':
  - type: text
    content: ' And who had endured much suffering under [the hands of] many physicians and had spent all that she had, and was no better but instead grew worse.'
  '27':
  - type: text
    content: ' She had heard the reports concerning Jesus, and she came up behind Him in the throng and touched His garment,'
  '28':
  - type: text
    content: ' For she kept saying, If I only touch His garments, I shall be restored to health.'
  '29':
  - type: text
    content: ' And immediately her flow of blood was dried up at the source, and [suddenly] she felt in her body that she was healed of her [distressing] ailment.'
  '3':
  - type: text
    content: ' This man continually lived among the tombs, and no one could subdue him any more, even with a chain;'
  '30':
  - type: text
    content: ' And Jesus, recognizing in Himself that the power proceeding from Him had gone forth, turned around immediately in the crowd and said, Who touched My clothes?'
  '31':
  - type: text
    content: ' And the disciples kept saying to Him, You see the crowd pressing hard around You from all sides, and You ask, Who touched Me?'
  '32':
  - type: text
    content: ' Still He kept looking around to see her who had done it.'
  '33':
  - type: text
    content: ' But the woman, knowing what had been done for her, though alarmed '
  - type: text
    content: and
  - type: text
    content: ' frightened and trembling, fell down before Him and told Him the whole truth.'
  '34':
  - type: text
    content: ' And He said to her, Daughter, your faith (your trust and confidence in Me, springing from faith in God) has restored you to health. Go in (into) peace and be continually healed '
  - type: text
    content: and
  - type: text
    content: ' freed from your [distressing bodily] disease.'
  '35':
  - type: text
    content: ' While He was still speaking, there came some from the ruler''s house, who said [to Jairus], Your daughter has died. Why bother '
  - type: text
    content: and
  - type: text
    content: ' distress the Teacher any further?'
  '36':
  - type: text
    content: ' '
  - type: text
    content: Overhearing
  - type: text
    content: ' but ignoring what they said, Jesus said to the ruler of the synagogue, Do not be seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' struck with fear; only keep on believing.'
  '37':
  - type: text
    content: ' And He permitted no one to accompany Him except Peter and James and John the brother of James.'
  '38':
  - type: text
    content: ' When they arrived at the house of the ruler of the synagogue, He looked [carefully and with understanding] at [the] tumult and '
  - type: text
    content: the people
  - type: text
    content: ' weeping and wailing loudly.'
  '39':
  - type: text
    content: ' And when He had gone in, He said to them, Why do you make an uproar and weep? The little girl is not dead but is sleeping.'
  '4':
  - type: text
    content: ' For he had been bound often with shackles for the feet and handcuffs, but the handcuffs of [light] chains he wrenched apart, and the shackles he rubbed '
  - type: text
    content: and
  - type: text
    content: ' ground together '
  - type: text
    content: and
  - type: text
    content: ' broke in pieces; and no one had strength enough to restrain '
  - type: text
    content: or
  - type: text
    content: ' tame him.'
  '40':
  - type: text
    content: ' And they laughed '
  - type: text
    content: and
  - type: text
    content: ' jeered at Him. But He put them all out, and, taking the child''s father and mother and those who were with Him, He went in where the little girl was '
  - type: text
    content: lying.
  '41':
  - type: text
    content: ' Gripping her [firmly] by the hand, He said to her, Talitha cumi–which translated is, Little girl, I say to you, arise [from the sleep of death]!'
  '42':
  - type: text
    content: ' And instantly the girl got up and started walking around–for she was twelve years old. And they were utterly astonished '
  - type: text
    content: and
  - type: text
    content: ' overcome with amazement.'
  '43':
  - type: text
    content: ' And He strictly commanded '
  - type: text
    content: and
  - type: text
    content: ' warned them that no one should know this, and He [expressly] told them to give her [something] to eat.'
  '5':
  - type: text
    content: ' Night and day among the tombs and on the mountains he was always shrieking '
  - type: text
    content: and
  - type: text
    content: ' screaming and beating '
  - type: text
    content: and
  - type: text
    content: ' bruising '
  - type: text
    content: and
  - type: text
    content: ' cutting himself with stones.'
  '6':
  - type: text
    content: ' And when from a distance he saw Jesus, he ran and fell on his knees before Him in homage,'
  '7':
  - type: text
    content: ' And crying out with a loud voice, he said, What have You to do with me, Jesus, Son of the Most High God? [What is there in common between us?] I solemnly implore you by God, do not begin to torment me!'
  '8':
  - type: text
    content: ' For Jesus was commanding, Come out of the man, you unclean spirit!'
  '9':
  - type: text
    content: ' And He asked him, What is your name? He replied, My name is Legion, for we are many.'
