document_id: MRK.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEY CAME to the other side of the sea to the region of the Gerasenes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And as soon as He got out of the boat, there met Him out of the tombs a man [under the power] of an unclean spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' This man continually lived among the tombs, and no one could subdue him any more, even with a chain;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For he had been bound often with shackles for the feet and handcuffs, but the handcuffs of [light] chains he wrenched apart, and the shackles he rubbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ground together '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broke in pieces; and no one had strength enough to restrain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tame him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Night and day among the tombs and on the mountains he was always shrieking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' screaming and beating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bruising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cutting himself with stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And when from a distance he saw Jesus, he ran and fell on his knees before Him in homage,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And crying out with a loud voice, he said, What have You to do with me, Jesus, Son of the Most High God? [What is there in common between us?] I solemnly implore you by God, do not begin to torment me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For Jesus was commanding, Come out of the man, you unclean spirit!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And He asked him, What is your name? He replied, My name is Legion, for we are many.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And he kept begging Him urgently not to send them [himself and the other demons] away out of that region.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now a great herd of hogs was grazing there on the hillside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the demons
  - type: text
    text: ' begged Him, saying, Send us to the hogs, that we may go into them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So He gave them permission. And the unclean spirits came out [of the man] and entered into the hogs; and the herd, numbering about 2,000, rushed headlong down the steep slope into the sea and were drowned in the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The hog feeders ran away, and told [it] in the town and in the country. And [the people] came to see what it was that had taken place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they came to Jesus and looked intently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' searchingly at the man who had been a demoniac, sitting there, clothed and in his right mind, [the same man] who had had the legion [of demons]; and they were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struck with fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And those who had seen it related in full what had happened to the man possessed by demons and to the hogs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they began to beg [Jesus] to leave their neighborhood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when He had stepped into the boat, the man who had been controlled by the unclean spirits kept begging Him that he might be with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But Jesus refused to permit him, but said to him, Go home to your own [family and relatives and friends] and bring back word to them of how much the Lord has done for you, and [how He has] had sympathy for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he departed and began to publicly proclaim in Decapolis [the region of the ten cities] how much Jesus had done for him, and all the people were astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marveled. [Matt. 4:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And when Jesus had recrossed in the boat to the other side, a great throng gathered about Him, and He was at the lakeshore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then one of the rulers of the synagogue came up, Jairus by name; and seeing Him, he prostrated himself at His feet'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And begged Him earnestly, saying, My little daughter is at the point of death. Come and lay Your hands on her, so that she may be healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Jesus went with him; and a great crowd kept following Him and pressed Him from all sides [so as almost to suffocate Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And there was a woman who had had a flow of blood for twelve years,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And who had endured much suffering under [the hands of] many physicians and had spent all that she had, and was no better but instead grew worse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' She had heard the reports concerning Jesus, and she came up behind Him in the throng and touched His garment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For she kept saying, If I only touch His garments, I shall be restored to health.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And immediately her flow of blood was dried up at the source, and [suddenly] she felt in her body that she was healed of her [distressing] ailment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Jesus, recognizing in Himself that the power proceeding from Him had gone forth, turned around immediately in the crowd and said, Who touched My clothes?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And the disciples kept saying to Him, You see the crowd pressing hard around You from all sides, and You ask, Who touched Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Still He kept looking around to see her who had done it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But the woman, knowing what had been done for her, though alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frightened and trembling, fell down before Him and told Him the whole truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And He said to her, Daughter, your faith (your trust and confidence in Me, springing from faith in God) has restored you to health. Go in (into) peace and be continually healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' freed from your [distressing bodily] disease.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' While He was still speaking, there came some from the ruler''s house, who said [to Jairus], Your daughter has died. Why bother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress the Teacher any further?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Overhearing
  - type: text
    text: ' but ignoring what they said, Jesus said to the ruler of the synagogue, Do not be seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struck with fear; only keep on believing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And He permitted no one to accompany Him except Peter and James and John the brother of James.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' When they arrived at the house of the ruler of the synagogue, He looked [carefully and with understanding] at [the] tumult and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the people
  - type: text
    text: ' weeping and wailing loudly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And when He had gone in, He said to them, Why do you make an uproar and weep? The little girl is not dead but is sleeping.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And they laughed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jeered at Him. But He put them all out, and, taking the child''s father and mother and those who were with Him, He went in where the little girl was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lying.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Gripping her [firmly] by the hand, He said to her, Talitha cumi–which translated is, Little girl, I say to you, arise [from the sleep of death]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And instantly the girl got up and started walking around–for she was twelve years old. And they were utterly astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overcome with amazement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And He strictly commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned them that no one should know this, and He [expressly] told them to give her [something] to eat.'
