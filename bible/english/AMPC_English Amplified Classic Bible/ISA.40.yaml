document_id: ISA.40
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' COMFORT, COMFORT My people, says your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Speak tenderly to the heart of Jerusalem, and cry to her that her time of service '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' her warfare are ended, that [her punishment is accepted and] her iniquity is pardoned, that she has received [punishment] from the Lord''s hand double for all her sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A voice of one who cries: Prepare in the wilderness the way of the Lord [clear away the obstacles]; make straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smooth in the desert a highway for our God! [Mark 1:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Every valley shall be lifted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' filled up, and every mountain and hill shall be made low; and the crooked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uneven shall be made straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' level, and the rough places a plain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the glory (majesty and splendor) of the Lord shall be revealed, and all flesh shall see it together; for the mouth of the Lord has spoken it. [Luke 3:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' A voice says, Cry [prophesy]! And I said, What shall I cry? [The voice answered, Proclaim:] All flesh is as frail as grass, and all that makes it attractive [its kindness, its goodwill, its mercy from God, its glory and comeliness, however good] is transitory, like the flower of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The grass withers, the flower fades, when the breath of the Lord blows upon it; surely [all] the people are like grass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The grass withers, the flower fades, but the word of our God will stand forever. [James 1:10, 11; I Pet. 1:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O you who bring good tidings to Zion, get up to the high mountain. O you who bring good tidings to Jerusalem, lift up your voice with strength, lift it up, be not afraid; say to the cities of Judah, Behold your God! [Acts 10:36; Rom. 10:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Behold, the Lord God will come with might, and His arm will rule for Him. Behold, His reward is with Him, and His recompense before Him. [Rev. 22:7, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He will feed His flock like a shepherd: He will gather the lambs in His arm, He will carry them in His bosom and will gently lead those that have their young.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who has measured the waters in the hollow of his hand, marked off the heavens with a [nine-inch] span, enclosed the dust of the earth in a measure, and weighed the mountains in scales and the hills in a balance?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Who has directed the Spirit of the Lord, or as His counselor has taught Him? [Rom. 11:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' With whom did He take counsel, that instruction might be given Him? Who taught Him the path of justice and taught Him knowledge and showed Him the way of understanding?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, the nations are like a drop from a bucket and are counted as small dust on the scales; behold, He takes up the isles like a very little thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And all Lebanon''s [forests] cannot supply sufficient fuel, nor all its wild beasts furnish victims enough to burn sacrifices [worthy of the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All the nations are as nothing before Him; they are regarded by Him as less than nothing and emptiness (waste, futility, and worthlessness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' To whom then will you liken God? Or with what likeness will you compare Him? [Acts 17:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The graven image! A workman casts it, and a goldsmith overlays it with gold and casts silver chains for it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He who is so impoverished that he has no offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oblation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rich gift to give [to his god is constrained to make a wooden offering, an idol; so he] chooses a tree that will not rot; he seeks out a skillful craftsman to carve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set up an image that will not totter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deteriorate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [You worshipers of idols, you are without excuse.] Do you not know? Have you not heard? Has it not been told you from the beginning? [These things ought to convince you of God''s omnipotence and of the folly of bowing to idols.] Have you not understood from the foundations of the earth? [Rom. 1:20, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' It is God Who sits above the circle (the horizon) of the earth, and its inhabitants are like grasshoppers; it is He Who stretches out the heavens like [gauze] curtains and spreads them out like a tent to dwell in,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Who brings dignitaries to nothing, Who makes the judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rulers of the earth as chaos (emptiness, falsity, and futility).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Yes, these men are scarcely planted, scarcely are they sown, scarcely does their stock take root in the earth, when [the Lord] blows upon them and they wither, and the whirlwind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tempest takes them away like stubble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' To whom then will you liken Me, that I should be equal to him? says the Holy One.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Lift up your eyes on high and see! Who has created these? He Who brings out their host by number and calls them all by name; through the greatness of His might and because He is strong in power, not one is missing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lacks anything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Why, O Jacob, do you say, and declare, O Israel, My way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my lot are hidden from the Lord, and my right is passed over without regard from my God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Have you not known? Have you not heard? The everlasting God, the Lord, the Creator of the ends of the earth, does not faint or grow weary; there is no searching of His understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He gives power to the faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weary, and to him who has no might He increases strength [causing it to multiply and making it to abound]. [II Cor. 12:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Even youths shall faint and be weary, and [selected] young men shall feebly stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall exhausted;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But those who wait for the Lord [who expect, look for, and hope in Him] shall change '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renew their strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; they shall lift their wings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mount up [close to God] as eagles [mount up to the sun]; they shall run and not be weary, they shall walk and not faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become tired. [Heb. 12:1-3.]'
