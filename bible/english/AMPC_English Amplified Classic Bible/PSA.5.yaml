document_id: PSA.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; on wind instruments. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' LISTEN TO my words, O Lord, give heed to my sighing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groaning.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hold them guilty, O God; let them fall by their own designs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counsels; cast them out because of the multitude of their transgressions, for they have rebelled against You.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But let all those who take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put their trust in You rejoice; let them ever sing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shout for joy, because You make a covering over them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defend them; let those also who love Your name be joyful in You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be in high spirits.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You, Lord, will bless the [uncompromisingly] righteous [him who is upright and in right standing with You]; as with a shield You will surround him with goodwill (pleasure and favor).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hear the sound of my cry, my King and my God, for to You do I pray.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the morning You hear my voice, O Lord; in the morning I prepare [a prayer, a sacrifice] for You and watch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait [for You to speak to my heart].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You are not a God Who takes pleasure in wickedness; neither will the evil [man] so much as dwell [temporarily] with You.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Boasters can have no standing in Your sight; You abhor all evildoers.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will destroy those who speak lies; the Lord abhors [and rejects] the bloodthirsty and deceitful man.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as for me, I will enter Your house through the abundance of Your steadfast love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy; I will worship toward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at Your holy temple in reverent fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awe of You.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lead me, O Lord, in Your righteousness because of my enemies; make Your way level (straight and right) before my face.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For there is nothing trustworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' truthful in their talk; their heart is destruction [or a destructive chasm, a yawning gulf]; their throat is an open sepulcher; they flatter and make smooth with their tongue. [Rom. 3:13.]'
