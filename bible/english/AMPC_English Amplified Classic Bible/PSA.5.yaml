document_id: PSA.5,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; on wind instruments. A Psalm of David.
  - type: text
    content: ' LISTEN TO my words, O Lord, give heed to my sighing '
  - type: text
    content: and
  - type: text
    content: ' groaning.'
  '10':
  - type: text
    content: ' Hold them guilty, O God; let them fall by their own designs '
  - type: text
    content: and
  - type: text
    content: ' counsels; cast them out because of the multitude of their transgressions, for they have rebelled against You.'
  '11':
  - type: text
    content: ' But let all those who take refuge '
  - type: text
    content: and
  - type: text
    content: ' put their trust in You rejoice; let them ever sing '
  - type: text
    content: and
  - type: text
    content: ' shout for joy, because You make a covering over them '
  - type: text
    content: and
  - type: text
    content: ' defend them; let those also who love Your name be joyful in You '
  - type: text
    content: and
  - type: text
    content: ' be in high spirits.'
  '12':
  - type: text
    content: ' For You, Lord, will bless the [uncompromisingly] righteous [him who is upright and in right standing with You]; as with a shield You will surround him with goodwill (pleasure and favor).'
  '2':
  - type: text
    content: ' Hear the sound of my cry, my King and my God, for to You do I pray.'
  '3':
  - type: text
    content: ' In the morning You hear my voice, O Lord; in the morning I prepare [a prayer, a sacrifice] for You and watch '
  - type: text
    content: and
  - type: text
    content: ' wait [for You to speak to my heart].'
  '4':
  - type: text
    content: ' For You are not a God Who takes pleasure in wickedness; neither will the evil [man] so much as dwell [temporarily] with You.'
  '5':
  - type: text
    content: ' Boasters can have no standing in Your sight; You abhor all evildoers.'
  '6':
  - type: text
    content: ' You will destroy those who speak lies; the Lord abhors [and rejects] the bloodthirsty and deceitful man.'
  '7':
  - type: text
    content: ' But as for me, I will enter Your house through the abundance of Your steadfast love '
  - type: text
    content: and
  - type: text
    content: ' mercy; I will worship toward '
  - type: text
    content: and
  - type: text
    content: ' at Your holy temple in reverent fear '
  - type: text
    content: and
  - type: text
    content: ' awe of You.'
  '8':
  - type: text
    content: ' Lead me, O Lord, in Your righteousness because of my enemies; make Your way level (straight and right) before my face.'
  '9':
  - type: text
    content: ' For there is nothing trustworthy '
  - type: text
    content: or
  - type: text
    content: ' steadfast '
  - type: text
    content: or
  - type: text
    content: ' truthful in their talk; their heart is destruction [or a destructive chasm, a yawning gulf]; their throat is an open sepulcher; they flatter and make smooth with their tongue. [Rom. 3:13.]'
