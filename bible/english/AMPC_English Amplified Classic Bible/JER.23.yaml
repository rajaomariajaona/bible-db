document_id: JER.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WOE TO the shepherds (the civil leaders) who destroy and scatter the sheep of My pasturing! says the Lord.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For the land is full of adulterers (forsakers of God, Israel''s true Husband). Because of the curse [of God upon it] the land mourns, the pastures of the wilderness are dried up. They [both false prophets and people] rush into wickedness; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their course is evil, their might is not right.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For both [false] prophet and priest are ungodly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profane; even in My house have I found their wickedness, says the Lord.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Therefore their way will be to them like slippery paths in the dark; they will be driven on and fall into them. For I will bring evil upon them in the year of their punishment, says the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And I have seen folly in the prophets of Samaria: they prophesied by Baal and caused My people Israel to err '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go astray.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I have seen also in the prophets of Jerusalem a horrible thing: they commit adultery and walk in lies; they encourage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen the hands of evildoers, so that none returns from his wickedness. They have all of them become to Me like Sodom, and her inhabitants like Gomorrah.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Therefore thus says the Lord of hosts concerning the prophets: Behold, I will feed them with [the bitterness of] wormwood and make them drink the [poisonous] water of gall, for from the [false] prophets of Jerusalem profaneness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ungodliness have gone forth into all the land.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Thus says the Lord of hosts: Do not listen to the words of the [false] prophets who prophesy to you. They teach you vanity (emptiness, falsity, and futility) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fill you with vain hopes; they speak a vision of their own minds and not from the mouth of the Lord.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' They are continually saying to those who despise Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the word of the Lord, The Lord has said: You shall have peace; and they say to everyone who walks after the stubbornness of his own mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart, No evil shall come upon you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For who among them has stood in the council of the Lord, that he should perceive and hear His word? Who has marked His word [noticing and observing and giving attention to it] and has [actually] heard it?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Behold, the tempest of the Lord has gone forth in wrath, a whirling tempest; it shall whirl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burst upon the heads of the wicked.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Therefore thus says the Lord, the God of Israel, concerning the shepherds who care for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feed My people: You have scattered My flock and driven them away and have not visited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attended to them; behold, I will visit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attend to you for the evil of your doings, says the Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The anger of the Lord shall not turn back until He has executed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accomplished the thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intents of His mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart. In the latter days you shall consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand it perfectly.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' I did not send these [false] prophets, yet they ran; I did not speak to them, yet they prophesied.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But if they had stood in My council, then they would have caused My people to hear My words, then they would have turned them [My people] from their evil way and from the evil of their doings.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Am I a God at hand, says the Lord, and not a God afar off?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Can anyone hide himself in secret places so that I cannot see him? says the Lord. Do not I fill heaven and earth? says the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' I have heard what the prophets have said who prophesy lies in My name, saying, I have dreamed, I have dreamed [visions on my bed at night].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' [How long shall this state of things continue?] How long yet shall it be in the minds of the prophets who prophesy falsehood, even the prophets of the deceit of their own hearts,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Who think that they can cause My people to forget My name by their dreams which every man tells to his neighbor, just as their fathers forgot My name because of Baal?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The prophet who has a dream, let him tell his dream; but he who has My word, let him speak My word faithfully. What has straw in common with wheat [for nourishment]? says the Lord.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Is not My word like fire [that consumes all that cannot endure the test]? says the Lord, and like a hammer that breaks in pieces the rock [of most stubborn resistance]?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And I will gather the remnant of My flock out of all the countries to which I have driven them and will bring them again to their folds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pastures; and they will be fruitful and multiply.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Therefore behold, I am against the [false] prophets, says the Lord, [I am even now descending upon them with punishment, these prophets] who steal My words from one another [imitating the phrases of the true prophets].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Behold, I am against the prophets, says the Lord, who use their [own deceitful] tongues and say, Thus says the Lord.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Behold, I am against those who prophesy lying dreams, says the Lord, and tell them and cause My people to err '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go astray by their lies and by their vain boasting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recklessness–when I did not send them or command them; nor do they profit these people at all, says the Lord.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And when these people, or a prophet or a priest, ask you, What is the burden of the Lord [the thing to be lifted up now]? then you shall say to them, What burden [indeed]! [You are the burden!] And I will disburden Myself of you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I will cast you off, says the Lord.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And as for the prophet, the priest, or [any of these] the people, whoever [in mockery calls the word of the Lord a burden and] says, The burden of the Lord, I will even visit in wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish that man and his house.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' [For the future, in speaking of the utterances of the Lord] thus shall you say every one to his neighbor and every one to his brother: What has the Lord answered? or, What has the Lord spoken?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' But the burden of the Lord you must mention no more, for every man''s burden is his own response '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' word [for as they mockingly call all prophecies burdens, whether good or bad, so will it prove to be to them; God will take them at their own word]; for you pervert the words [not of a lifeless idol, but] of the living God, the Lord of hosts, our God!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Thus shall you [reverently] say to the prophet: What has the Lord answered you? Or, What has the Lord spoken?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But if you say, The burden of the Lord, therefore thus says the Lord: Because you said these words, The burden of the Lord, when I sent to you, saying, You shall not say, The burden of the Lord,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Therefore behold, I, even I, will assuredly take you up and cast you away from My presence, you and the city [Jerusalem] which I gave to you and to your fathers.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And I will set up shepherds over them who will feed them. And they will fear no more nor be dismayed, neither will any be missing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lost, says the Lord.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And I will bring an everlasting reproach upon you and a perpetual shame which will not be forgotten.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Behold, the days are coming, says the Lord, when I will raise up to David a righteous Branch (Sprout), and He will reign as King and do wisely and will execute justice and righteousness in the land.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' In His days Judah shall be saved and Israel shall dwell safely: and this is His name by which He shall be called: The Lord Our Righteousness. [Matt. 1:21-23; Rom. 3:22.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Therefore behold, the days are coming, says the Lord, when they shall no more say, As the Lord lives, Who brought up the children of Israel out of the land of Egypt,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But, As the Lord lives, Who brought up and led the offspring of the house of Israel from the north country and from all the countries to which I had driven them. And they shall dwell in their own land. [Jer. 16:14-15].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Concerning the prophets: My heart [says Jeremiah] is broken within me, all my bones shake; I am like a drunken man, a man whom wine has overcome, because of the Lord and because of His holy words [which He has pronounced against unfaithful leaders].'
