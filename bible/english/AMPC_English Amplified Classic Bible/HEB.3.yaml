document_id: HEB.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO THEN, brethren, consecrated '
  - type: text
    content: and
  - type: text
    content: ' set apart for God, who share in the heavenly calling, [thoughtfully and attentively] consider Jesus, the Apostle and High Priest Whom we confessed [as ours when we embraced the Christian faith].'
  '10':
  - type: text
    content: ' And so I was provoked (displeased and sorely grieved) with that generation, and said, They always err '
  - type: text
    content: and
  - type: text
    content: ' are led astray in their hearts, and they have not perceived '
  - type: text
    content: or
  - type: text
    content: ' recognized My ways '
  - type: text
    content: and
  - type: text
    content: ' become progressively better '
  - type: text
    content: and
  - type: text
    content: ' more experimentally '
  - type: text
    content: and
  - type: text
    content: ' intimately acquainted with them.'
  '11':
  - type: text
    content: ' Accordingly, I swore in My wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation, They shall not enter into My rest. [Ps. 95:7-11.]'
  '12':
  - type: text
    content: ' [Therefore beware] brethren, take care, lest there be in any one of you a wicked, unbelieving heart [which refuses to cleave to, trust in, and rely on Him], leading you to turn away '
  - type: text
    content: and
  - type: text
    content: ' desert '
  - type: text
    content: or
  - type: text
    content: ' stand aloof from the living God.'
  '13':
  - type: text
    content: ' But instead warn (admonish, urge, and encourage) one another every day, as long as it is called Today, that none of you may be hardened [into settled rebellion] by the deceitfulness of sin [by the fraudulence, the stratagem, the trickery which the delusive glamor of his sin may play on him].'
  '14':
  - type: text
    content: ' For we have become fellows with Christ (the Messiah) '
  - type: text
    content: and
  - type: text
    content: ' share in all He has for us, if only we hold our first newborn confidence '
  - type: text
    content: and
  - type: text
    content: ' original assured expectation [in virtue of which we are believers] firm '
  - type: text
    content: and
  - type: text
    content: ' unshaken to the end.'
  '15':
  - type: text
    content: ' Then while it is [still] called Today, if you would hear His voice '
  - type: text
    content: and
  - type: text
    content: ' when you hear it, do not harden your hearts as in the rebellion [in the desert, when the people provoked and irritated and embittered God against them]. [Ps. 95:7, 8.]'
  '16':
  - type: text
    content: ' For who were they who heard '
  - type: text
    content: and
  - type: text
    content: ' yet were rebellious '
  - type: text
    content: and
  - type: text
    content: ' provoked [Him]? Was it not all those who came out of Egypt led by Moses?'
  '17':
  - type: text
    content: ' And with whom was He irritated '
  - type: text
    content: and
  - type: text
    content: ' provoked '
  - type: text
    content: and
  - type: text
    content: ' grieved for forty years? Was it not with those who sinned, whose dismembered bodies were strewn '
  - type: text
    content: and
  - type: text
    content: ' left in the desert?'
  '18':
  - type: text
    content: ' And to whom did He swear that they should not enter His rest, but to those who disobeyed [who had not listened to His word and who refused to be compliant or be persuaded]?'
  '19':
  - type: text
    content: ' So we see that they were not able to enter [into His rest], because of their unwillingness to adhere to '
  - type: text
    content: and
  - type: text
    content: ' trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on God [unbelief had shut them out]. [Num. 14:1-35.]'
  '2':
  - type: text
    content: ' [See how] faithful He was to Him Who appointed Him [Apostle and High Priest], as Moses was also faithful in the whole house [of God]. [Num. 12:7.]'
  '3':
  - type: text
    content: ' Yet Jesus has been considered worthy of much greater honor '
  - type: text
    content: and
  - type: text
    content: ' glory than Moses, just as the builder of a house has more honor than the house [itself].'
  '4':
  - type: text
    content: ' For [of course] every house is built '
  - type: text
    content: and
  - type: text
    content: ' furnished by someone, but the Builder of all things '
  - type: text
    content: and
  - type: text
    content: ' the Furnisher [of the entire equipment of all things] is God.'
  '5':
  - type: text
    content: ' And Moses certainly was faithful in the administration of all God''s house [but it was only] as a ministering servant. [In his entire ministry he was but] a testimony to the things which were to be spoken [the revelations to be given afterward in Christ]. [Num. 12:7.]'
  '6':
  - type: text
    content: ' But Christ (the Messiah) was faithful over His [own Father''s] house as a Son [and Master of it]. And it is we who are [now members] of this house, if we hold '
  - type: text
    content: fast and firm to the end
  - type: text
    content: ' our joyful '
  - type: text
    content: and
  - type: text
    content: ' exultant confidence and sense of triumph in our hope [in Christ].'
  '7':
  - type: text
    content: ' Therefore, as the Holy Spirit says: Today, if you will hear His voice,'
  '8':
  - type: text
    content: ' Do not harden your hearts, as [happened] in the rebellion [of Israel] '
  - type: text
    content: and
  - type: text
    content: ' their provocation '
  - type: text
    content: and
  - type: text
    content: ' embitterment [of Me] in the day of testing in the wilderness,'
  '9':
  - type: text
    content: ' Where your fathers tried [My patience] '
  - type: text
    content: and
  - type: text
    content: ' tested [My forbearance] and found I stood their test, and they saw My works for forty years.'
