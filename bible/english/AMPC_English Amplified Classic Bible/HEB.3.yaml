document_id: HEB.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO THEN, brethren, consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart for God, who share in the heavenly calling, [thoughtfully and attentively] consider Jesus, the Apostle and High Priest Whom we confessed [as ours when we embraced the Christian faith].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [See how] faithful He was to Him Who appointed Him [Apostle and High Priest], as Moses was also faithful in the whole house [of God]. [Num. 12:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yet Jesus has been considered worthy of much greater honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory than Moses, just as the builder of a house has more honor than the house [itself].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For [of course] every house is built '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' furnished by someone, but the Builder of all things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the Furnisher [of the entire equipment of all things] is God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Moses certainly was faithful in the administration of all God''s house [but it was only] as a ministering servant. [In his entire ministry he was but] a testimony to the things which were to be spoken [the revelations to be given afterward in Christ]. [Num. 12:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But Christ (the Messiah) was faithful over His [own Father''s] house as a Son [and Master of it]. And it is we who are [now members] of this house, if we hold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fast and firm to the end
  - type: text
    text: ' our joyful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exultant confidence and sense of triumph in our hope [in Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore, as the Holy Spirit says: Today, if you will hear His voice,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Do not harden your hearts, as [happened] in the rebellion [of Israel] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their provocation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embitterment [of Me] in the day of testing in the wilderness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Where your fathers tried [My patience] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tested [My forbearance] and found I stood their test, and they saw My works for forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And so I was provoked (displeased and sorely grieved) with that generation, and said, They always err '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are led astray in their hearts, and they have not perceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' recognized My ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become progressively better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more experimentally '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intimately acquainted with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Accordingly, I swore in My wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation, They shall not enter into My rest. [Ps. 95:7-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' [Therefore beware] brethren, take care, lest there be in any one of you a wicked, unbelieving heart [which refuses to cleave to, trust in, and rely on Him], leading you to turn away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' stand aloof from the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But instead warn (admonish, urge, and encourage) one another every day, as long as it is called Today, that none of you may be hardened [into settled rebellion] by the deceitfulness of sin [by the fraudulence, the stratagem, the trickery which the delusive glamor of his sin may play on him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For we have become fellows with Christ (the Messiah) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share in all He has for us, if only we hold our first newborn confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' original assured expectation [in virtue of which we are believers] firm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unshaken to the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then while it is [still] called Today, if you would hear His voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' when you hear it, do not harden your hearts as in the rebellion [in the desert, when the people provoked and irritated and embittered God against them]. [Ps. 95:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For who were they who heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yet were rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoked [Him]? Was it not all those who came out of Egypt led by Moses?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And with whom was He irritated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grieved for forty years? Was it not with those who sinned, whose dismembered bodies were strewn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left in the desert?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And to whom did He swear that they should not enter His rest, but to those who disobeyed [who had not listened to His word and who refused to be compliant or be persuaded]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So we see that they were not able to enter [into His rest], because of their unwillingness to adhere to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on God [unbelief had shut them out]. [Num. 14:1-35.]'
