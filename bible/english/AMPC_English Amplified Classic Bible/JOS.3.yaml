document_id: JOS.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JOSHUA ROSE early in the morning and they removed from Shittim and came to the Jordan, he and all the Israelites, and lodged there before passing over.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Joshua said, Hereby you shall know that the living God is among you and that He will surely drive out from before you the Canaanites, Hittites, Hivites, Perizzites, Girgashites, Amorites, and Jebusites.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Behold, the ark of the covenant of the Lord of all the earth is passing over before you into the Jordan!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So now take twelve men from the tribes of Israel, one from each tribe.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' When the soles of the feet of the priests who bear the ark of the Lord of all the earth shall rest in the Jordan, the waters of the Jordan coming down from above shall be cut off and they shall stand in one heap.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So when the people set out from their tents to pass over the Jordan, with the priests bearing the ark of the covenant before the people,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And when those who bore the ark had come to the Jordan and the feet of the priests bearing the ark were in the brink of the water–for the Jordan overflows all its banks throughout the time of harvest–'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Then the waters which came down from above stood and rose up in a heap far off, at Adam, the city that is beside Zarethan; and those flowing down toward the Sea of the Arabah, the Salt [Dead] Sea, were wholly cut off. And the people passed over opposite Jericho. [Ps. 114.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And while all Israel passed over on dry ground, the priests who bore the ark of the covenant of the Lord stood firm on dry ground in the midst of the Jordan, until all the nation finished passing over the Jordan.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' After three days the officers went through the camp,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Commanding the people: When you see the ark of the covenant of the Lord your God being borne by the Levitical priests, set out from where you are and follow it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Yet a space must be kept between you and it, about 2,000 cubits by measure; come not near it, that you may [be able to see the ark and] know the way you must go, for you have not passed this way before.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And Joshua said to the people, Sanctify yourselves [that is, separate yourselves for a special holy purpose], for tomorrow the Lord will do wonders among you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Joshua said to the priests, Take up the ark of the covenant and pass over before the people. And they took it up and went on before the people.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Lord said to Joshua, This day I will begin to magnify you in the sight of all Israel, so they may know that as I was with Moses, so I will be with you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You shall command the priests who bear the ark of the covenant, When you come to the brink of the waters of the Jordan, you shall stand still in the Jordan.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Joshua said to the Israelites, Come near, hear the words of the Lord your God.'
