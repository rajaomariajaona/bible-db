document_id: REV.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw another mighty angel coming down from heaven, robed in a cloud, with a [halo like a] rainbow over his head; his face was like the sun, and his feet (legs) were like columns of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He had a little book (scroll) open in his hand. He set his right foot on the sea and his left foot on the land,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he shouted with a loud voice like the roaring of a lion; and when he had shouted, the seven thunders gave voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uttered their message in distinct words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when the seven thunders had spoken (sounded), I was going to write [it down], but I heard a voice from heaven saying, Seal up what the seven thunders have said! Do not write it down!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the [mighty] angel whom I had seen stationed on sea and land raised his right hand to heaven (the sky), [Deut. 32:40; Dan. 12:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And swore in the name of (by) Him Who lives forever and ever, Who created the heavens (sky) and all they contain, and the earth and all that it contains, and the sea and all that it contains. [He swore] that no more time should intervene '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' there should be no more waiting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' delay,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But that when the days come when the trumpet call of the seventh angel is about to be sounded, then God''s mystery (His secret design, His hidden purpose), as He had announced the glad tidings to His servants the prophets, should be fulfilled (accomplished, completed). [Dan. 12:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then the voice that I heard from heaven spoke again to me, saying, Go and take the little book (scroll) which is open on the hand of the angel who is standing on the sea and on the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So I went up to the angel and asked him to give me the little book. And he said to me, Take it and eat it. It will embitter your stomach, though in your mouth it will be as sweet as honey. [Ezek. 2:8, 9; 3:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So I took the little book from the angel''s hand and ate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swallowed it; it was as sweet as honey in my mouth, but once I had swallowed it, my stomach was embittered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then they said to me, You are to make a fresh prophecy concerning many peoples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' races and nations and languages and kings. [Jer. 1:10.]'
