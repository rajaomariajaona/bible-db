document_id: REV.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN I saw another mighty angel coming down from heaven, robed in a cloud, with a [halo like a] rainbow over his head; his face was like the sun, and his feet (legs) were like columns of fire.'
  '10':
  - type: text
    content: ' So I took the little book from the angel''s hand and ate '
  - type: text
    content: and
  - type: text
    content: ' swallowed it; it was as sweet as honey in my mouth, but once I had swallowed it, my stomach was embittered.'
  '11':
  - type: text
    content: ' Then they said to me, You are to make a fresh prophecy concerning many peoples '
  - type: text
    content: and
  - type: text
    content: ' races and nations and languages and kings. [Jer. 1:10.]'
  '2':
  - type: text
    content: ' He had a little book (scroll) open in his hand. He set his right foot on the sea and his left foot on the land,'
  '3':
  - type: text
    content: ' And he shouted with a loud voice like the roaring of a lion; and when he had shouted, the seven thunders gave voice '
  - type: text
    content: and
  - type: text
    content: ' uttered their message in distinct words.'
  '4':
  - type: text
    content: ' And when the seven thunders had spoken (sounded), I was going to write [it down], but I heard a voice from heaven saying, Seal up what the seven thunders have said! Do not write it down!'
  '5':
  - type: text
    content: ' Then the [mighty] angel whom I had seen stationed on sea and land raised his right hand to heaven (the sky), [Deut. 32:40; Dan. 12:6, 7.]'
  '6':
  - type: text
    content: ' And swore in the name of (by) Him Who lives forever and ever, Who created the heavens (sky) and all they contain, and the earth and all that it contains, and the sea and all that it contains. [He swore] that no more time should intervene '
  - type: text
    content: and
  - type: text
    content: ' there should be no more waiting '
  - type: text
    content: or
  - type: text
    content: ' delay,'
  '7':
  - type: text
    content: ' But that when the days come when the trumpet call of the seventh angel is about to be sounded, then God''s mystery (His secret design, His hidden purpose), as He had announced the glad tidings to His servants the prophets, should be fulfilled (accomplished, completed). [Dan. 12:6, 7.]'
  '8':
  - type: text
    content: ' Then the voice that I heard from heaven spoke again to me, saying, Go and take the little book (scroll) which is open on the hand of the angel who is standing on the sea and on the land.'
  '9':
  - type: text
    content: ' So I went up to the angel and asked him to give me the little book. And he said to me, Take it and eat it. It will embitter your stomach, though in your mouth it will be as sweet as honey. [Ezek. 2:8, 9; 3:1-3.]'
