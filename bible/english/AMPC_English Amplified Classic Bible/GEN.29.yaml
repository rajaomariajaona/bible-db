document_id: GEN.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JACOB went [briskly and cheerfully] on his way [400 miles] and came to the land of the people of the East.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As he looked, he saw a well in the field; and behold, there were three flocks of sheep lying by it, for out of that well the flocks were watered. The stone on the well''s mouth was a big one,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when all the flocks were gathered there, [the shepherds] would roll the stone from the well''s mouth, water the sheep, and replace the stone on the well''s mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Jacob said to them, My brothers, where are you from? And they said, We are from Haran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [Jacob] said to them, Do you know Laban the grandson of Nahor? And they said, We know him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He said to them, Is it well with him? And they said, He is doing well; and behold, here comes his daughter Rachel with [his] sheep!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He said, The sun is still high; it is a long time yet before the flocks need be gathered [in their folds]. [Why not] water the sheep and return them to their pasture?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But they said, We cannot until all the flocks are gathered together; then [the shepherds] roll the stone from the well''s mouth and we water the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' While he was still talking with them, Rachel came with her father''s sheep, for she shepherded them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When Jacob saw Rachel daughter of Laban, his mother''s brother, and the sheep of Laban his uncle, Jacob went near and rolled the stone from the well''s mouth and watered the flock of his uncle Laban.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Jacob kissed Rachel and he wept aloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jacob told Rachel he was her father''s relative, Rebekah''s son; and she ran and told her father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When Laban heard of the arrival of Jacob his sister''s son, he ran to meet him, and embraced and kissed him and brought him to his house. And [Jacob] told Laban all these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then Laban said to him, Surely you are my bone and my flesh. And [Jacob] stayed with him a month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Laban said to Jacob, Just because you are my relative, should you work for me for nothing? Tell me, what shall your wages be?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now Laban had two daughters; the name of the elder was Leah and the name of the younger was Rachel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Leah''s eyes were weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dull looking, but Rachel was beautiful and attractive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Jacob loved Rachel; so he said, I will work for you for seven years for Rachel your younger daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Laban said, It is better that I give her to you than to another man. Stay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Jacob served seven years for Rachel; and they seemed to him but a few days because of the love he had for her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Finally, Jacob said to Laban, Give me my wife, for my time is completed, so that I may take her to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Laban gathered together all the men of the place and made a feast [with drinking].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But when night came, he took Leah his daughter and brought her to [Jacob], who had intercourse with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Laban gave Zilpah his maid to his daughter Leah to be her maid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But in the morning [Jacob saw his wife, and] behold, it was Leah! And he said to Laban, What is this you have done to me? Did I not work for you [all those seven years] for Rachel? Why then have you deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thrown me down [like this]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And Laban said, It is not permitted in our country to give the younger [in marriage] before the elder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Finish the [wedding feast] week [for Leah]; then we will give you [Rachel] also, and you shall work for me yet seven more years in return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So Jacob complied and fulfilled [Leah''s] week; then [Laban] gave him Rachel his daughter as his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' (And Laban gave Bilhah his maid to Rachel his daughter to be her maid.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Jacob lived with Rachel also as his wife, and he loved Rachel more than Leah and served [Laban] another seven years [for her].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And when the Lord saw that Leah was despised, He made her able to bear children, but Rachel was barren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And Leah became pregnant and bore a son and named him Reuben [See, a son!]; for she said, Because the Lord has seen my humiliation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affliction; now my husband will love me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' [Leah] became pregnant again and bore a son and said, Because the Lord heard that I am despised, He has given me this son also; and she named him Simeon [God hears].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And she became pregnant again and bore a son and said, Now this time will my husband be a companion to me, for I have borne him three sons. Therefore he was named Levi [companion].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Again she conceived and bore a son, and she said, Now will I praise the Lord! So she called his name Judah [praise]; then [for a time] she ceased bearing.'
