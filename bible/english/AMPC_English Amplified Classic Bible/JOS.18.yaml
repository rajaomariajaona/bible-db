document_id: JOS.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE whole congregation of the Israelites assembled at Shiloh and set up the Tent of Meeting there; and the land was subdued before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And there remained among the Israelites seven tribes who had not yet divided their inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Joshua asked the Israelites, How long will you be slack to go in and possess the land which the Lord, the God of your fathers, has given you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Provide three men from each tribe, and I will send them to go through the land and write a description of it according to their [tribal] inheritances; then they shall return to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they shall divide it into seven parts. Judah shall remain in its territory on the south and the house of Joseph shall remain in its territory on the north.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall describe the land in seven divisions, and bring the description here to me, that I may cast lots for you here before the Lord our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the Levites have no portion among you, for the priesthood of the Lord is their inheritance. Gad and Reuben and half the tribe of Manasseh have received their inheritance east of the Jordan, which Moses the servant of the Lord gave them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So the men arose and went, and Joshua charged them saying, Go and walk through the land and describe it and come again to me, and I will cast lots for you here before the Lord in Shiloh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the men went and passed through the land and described it by cities in seven portions in a book; and they came again to Joshua to the camp at Shiloh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Joshua cast lots for them in Shiloh before the Lord, and there [he] divided the land to the Israelites, to each [tribe] his portion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the lot of the Benjamites came up according to their families; and the territory of their lot fell between the tribes of Judah and Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' On the north side their boundary began at the Jordan; then it went up to the shoulder of Jericho on the north and up through the hill country westward and ended at the Beth-aven wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the boundary passed over southward toward Luz, to the shoulder of Luz (that is, Bethel); then it went down to Ataroth-addar by the mountain that lies south of Lower Beth-horon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The boundary extended from there, and turning about on the western side southward from the mountain that lies to the south opposite Beth-horon, it ended at Kiriath-baal (that is, Kiriath-jearim), a city of the tribe of Judah. This formed the western side [of Benjamin''s territory].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The southern side began at the edge of Kiriath-jearim, and the boundary went on westward to the spring of the waters of Nephtoah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the boundary went down to the edge of the mountain overlooking the Valley of Ben-hinnom [son of Hinnom], which is at the north end of the Valley of Rephaim; and it descended to the Valley of Hinnom, south of the shoulder of the Jebusites, and went on down to En-rogel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then it bent toward the north and went on to En-shemesh and on to Geliloth, which was opposite the ascent of Adummim, and went down to the Stone of Bohan son of Reuben.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And it went on to the north of the shoulder [of Beth]-Arabah and down to the Arabah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the boundary passed along to the north of the shoulder of Beth-hoglah and ended at the northern bay of the Salt [Dead] Sea, at the south end of the Jordan. This was the southern border.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the Jordan was its boundary on the east side. This was the inheritance of the sons of Benjamin by their boundaries round about, according to their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now the cities of the tribe of Benjamin according to [their] families were: Jericho, Beth-hoglah, Emek-keziz,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Beth-arabah, Zemaraim, Bethel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Avvim, Parah, Ophrah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Chephar-ammoni, Ophni, and Geba; twelve cities with their villages;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Gibeon, Ramah, Beeroth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Mizpah, Chephirah, Mozah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Rekem, Irpeel, Taralah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Zelah, Haeleph, the Jebusite [city]–that is, Jerusalem–Gibeah, and Kiriath-[jearim]; fourteen cities with their villages. This is the inheritance of the tribe of Benjamin according to their families.'
