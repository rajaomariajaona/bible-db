document_id: GEN.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW SARAI, Abram''s wife, had borne him no children. She had an Egyptian maid whose name was Hagar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Sarai said to Abram, See here, the Lord has restrained me from bearing [children]. I am asking you to have intercourse with my maid; it may be that I can obtain children by her. And Abram listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeded what Sarai said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Sarai, Abram''s wife, took Hagar her Egyptian maid, after Abram had dwelt ten years in the land of Canaan, and gave her to her husband Abram to be his [secondary] wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he had intercourse with Hagar, and she became pregnant; and when she saw that she was with child, she looked with contempt upon her mistress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Sarai said to Abram, May [the responsibility for] my wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deprivation of rights be upon you! I gave my maid into your bosom, and when she saw that she was with child, I was contemptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised in her eyes. May the Lord be the judge between you and me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But Abram said to Sarai, See here, your maid is in your hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; do as you please with her. And when Sarai dealt severely with her, humbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicting her, she [Hagar] fled from her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the Angel of the Lord found her by a spring of water in the wilderness on the road to Shur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And He said, Hagar, Sarai''s maid, where did you come from, and where are you intending to go? And she said, I am running away from my mistress Sarai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Angel of the Lord said to her, Go back to your mistress and [humbly] submit to her control.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Also the Angel of the Lord said to her, I will multiply your descendants exceedingly, so that they shall not be numbered for multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the Angel of the Lord continued, See now, you are with child and shall bear a son, and shall call his name Ishmael [God hears], because the Lord has heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid attention to your affliction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he [Ishmael] will be as a wild ass among men; his hand will be against every man and every man''s hand against him, and he will live to the east '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on the borders of all his kinsmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So she called the name of the Lord Who spoke to her, You are a God of seeing, for she said, Have I [not] even here [in the wilderness] looked upon Him Who sees me [and lived]? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or
  - type: text
    text: ' have I here also seen [the future purposes or designs of] Him Who sees me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore the well was called Beer-lahai-roi [A well to the Living One Who sees me]; it is between Kadesh and Bered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Hagar bore Abram a son, and Abram called the name of his son whom Hagar bore Ishmael.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Abram was eighty-six years old when Hagar bore Ishmael.'
