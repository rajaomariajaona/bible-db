document_id: GEN.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW SARAI, Abram''s wife, had borne him no children. She had an Egyptian maid whose name was Hagar.'
  '10':
  - type: text
    content: ' Also the Angel of the Lord said to her, I will multiply your descendants exceedingly, so that they shall not be numbered for multitude.'
  '11':
  - type: text
    content: ' And the Angel of the Lord continued, See now, you are with child and shall bear a son, and shall call his name Ishmael [God hears], because the Lord has heard '
  - type: text
    content: and
  - type: text
    content: ' paid attention to your affliction.'
  '12':
  - type: text
    content: ' And he [Ishmael] will be as a wild ass among men; his hand will be against every man and every man''s hand against him, and he will live to the east '
  - type: text
    content: and
  - type: text
    content: ' on the borders of all his kinsmen.'
  '13':
  - type: text
    content: ' So she called the name of the Lord Who spoke to her, You are a God of seeing, for she said, Have I [not] even here [in the wilderness] looked upon Him Who sees me [and lived]? '
  - type: text
    content: Or
  - type: text
    content: ' have I here also seen [the future purposes or designs of] Him Who sees me?'
  '14':
  - type: text
    content: ' Therefore the well was called Beer-lahai-roi [A well to the Living One Who sees me]; it is between Kadesh and Bered.'
  '15':
  - type: text
    content: ' And Hagar bore Abram a son, and Abram called the name of his son whom Hagar bore Ishmael.'
  '16':
  - type: text
    content: ' Abram was eighty-six years old when Hagar bore Ishmael.'
  '2':
  - type: text
    content: ' And Sarai said to Abram, See here, the Lord has restrained me from bearing [children]. I am asking you to have intercourse with my maid; it may be that I can obtain children by her. And Abram listened to '
  - type: text
    content: and
  - type: text
    content: ' heeded what Sarai said.'
  '3':
  - type: text
    content: ' So Sarai, Abram''s wife, took Hagar her Egyptian maid, after Abram had dwelt ten years in the land of Canaan, and gave her to her husband Abram to be his [secondary] wife.'
  '4':
  - type: text
    content: ' And he had intercourse with Hagar, and she became pregnant; and when she saw that she was with child, she looked with contempt upon her mistress '
  - type: text
    content: and
  - type: text
    content: ' despised her.'
  '5':
  - type: text
    content: ' Then Sarai said to Abram, May [the responsibility for] my wrong '
  - type: text
    content: and
  - type: text
    content: ' deprivation of rights be upon you! I gave my maid into your bosom, and when she saw that she was with child, I was contemptible '
  - type: text
    content: and
  - type: text
    content: ' despised in her eyes. May the Lord be the judge between you and me.'
  '6':
  - type: text
    content: ' But Abram said to Sarai, See here, your maid is in your hands '
  - type: text
    content: and
  - type: text
    content: ' power; do as you please with her. And when Sarai dealt severely with her, humbling '
  - type: text
    content: and
  - type: text
    content: ' afflicting her, she [Hagar] fled from her.'
  '7':
  - type: text
    content: ' But the Angel of the Lord found her by a spring of water in the wilderness on the road to Shur.'
  '8':
  - type: text
    content: ' And He said, Hagar, Sarai''s maid, where did you come from, and where are you intending to go? And she said, I am running away from my mistress Sarai.'
  '9':
  - type: text
    content: ' The Angel of the Lord said to her, Go back to your mistress and [humbly] submit to her control.'
