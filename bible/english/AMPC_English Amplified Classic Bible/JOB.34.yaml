document_id: JOB.34,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ELIHU ANSWERED (continued his discourse) and said,'
  '10':
  - type: text
    content: ' Therefore hear me, you men of understanding. Far be it from God that He should do wickedness, and from the Almighty that He should commit iniquity.'
  '11':
  - type: text
    content: ' For according to the deeds of a man God will [exactly] proportion his pay, and He will cause every man to find [recompense] according to his ways.'
  '12':
  - type: text
    content: ' Truly God will not do wickedly, neither will the Almighty pervert justice.'
  '13':
  - type: text
    content: ' Who put [God] in charge over the earth? Or who laid on Him the whole world?'
  '14':
  - type: text
    content: ' If [God] should set His heart upon him [man] and withdraw His [life-giving] spirit and His breath [from man] to Himself,'
  '15':
  - type: text
    content: ' All flesh would perish together, and man would turn again to dust. [Ps. 104:29; Eccl. 12:7.]'
  '16':
  - type: text
    content: ' If now you have understanding, hear this; listen to my words.'
  '17':
  - type: text
    content: ' Is it possible that an enemy of right should govern? And will you condemn Him Who is just '
  - type: text
    content: and
  - type: text
    content: ' mighty?'
  '18':
  - type: text
    content: ' [God] Who says to a king, You are worthless '
  - type: text
    content: and
  - type: text
    content: ' vile, or to princes '
  - type: text
    content: and
  - type: text
    content: ' nobles, You are ungodly '
  - type: text
    content: and
  - type: text
    content: ' evil?'
  '19':
  - type: text
    content: ' [God] is not partial to princes, nor does He regard the rich more than the poor, for they all are the work of His hands.'
  '2':
  - type: text
    content: ' Hear my words, you wise men, and give ear to me, you who have [so much] knowledge.'
  '20':
  - type: text
    content: ' In a moment they die; even at midnight the people are shaken and pass away, and the mighty are taken away by no [human] hand.'
  '21':
  - type: text
    content: ' For [God''s] eyes are upon the ways of a man, and He sees all his steps. [Ps. 34:15; Prov. 5:21; Jer. 16:17.]'
  '22':
  - type: text
    content: ' There is no darkness nor thick gloom where the evildoers may hide themselves.'
  '23':
  - type: text
    content: ' [God] sets before man no appointed time, that he should appear before [Him] in judgment.'
  '24':
  - type: text
    content: ' He breaks in pieces mighty men without inquiry [before a jury] '
  - type: text
    content: and
  - type: text
    content: ' in ways past finding out and sets others in their stead. [Dan. 2:21.]'
  '25':
  - type: text
    content: ' Therefore He takes knowledge of their works, and He overturns them in the night, so that they are crushed '
  - type: text
    content: and
  - type: text
    content: ' destroyed.'
  '26':
  - type: text
    content: ' God strikes them down as wicked men in the open sight of beholders,'
  '27':
  - type: text
    content: ' Because they turned aside from Him and would not consider '
  - type: text
    content: or
  - type: text
    content: ' show regard for any of His ways, [I Sam. 15:11.]'
  '28':
  - type: text
    content: ' So that they caused the cry of the poor to come to Him, and He heard the cry of the afflicted. [Exod. 22:23; James 5:4.]'
  '29':
  - type: text
    content: ' When He gives quietness (peace and security from oppression), who then can condemn? When He hides His face [withdrawing His favor and help], who then can behold Him [and make Him gracious], whether it be a nation or a man by himself?–'
  '3':
  - type: text
    content: ' For the ear tries words as the palate tastes food.'
  '30':
  - type: text
    content: ' That the godless man may not reign, that there be no one to ensnare the people.'
  '31':
  - type: text
    content: ' For has anyone said to God, I have borne my chastisement; I will not offend any more;'
  '32':
  - type: text
    content: ' Teach me what I do not see [in regard to how I have sinned]; if I have done iniquity, I will do it no more?'
  '33':
  - type: text
    content: ' Should [God''s] recompense [for your sins] be as you will it, when you refuse to accept it? For you must do the choosing, and not I; therefore say what is your truthful conclusion.'
  '34':
  - type: text
    content: ' Men of understanding will tell me, indeed, every wise man who hears me [will agree],'
  '35':
  - type: text
    content: ' That Job speaks without knowledge, and his words are without wisdom '
  - type: text
    content: and
  - type: text
    content: ' insight.'
  '36':
  - type: text
    content: ' [Would that Job''s afflictions be continued and] he be tried to the end because of his answering like wicked men!'
  '37':
  - type: text
    content: ' For he adds rebellion [in his unsubmissive, defiant attitude toward God] to his unacknowledged sin; he claps his hands [in open mockery and contempt of God] among us, and he multiplies his words of accusation against God.'
  '4':
  - type: text
    content: ' Let us choose for ourselves that which is right; let us know among ourselves what is good.'
  '5':
  - type: text
    content: ' For Job has said, I am [innocent and uncompromisingly] righteous, but God has taken away my right; [Job 33:9.]'
  '6':
  - type: text
    content: ' Would I lie against my right? Yet, notwithstanding my right, I am counted a liar. My wound is incurable, though I am without transgression.'
  '7':
  - type: text
    content: ' What man is like Job, who drinks up scoffing '
  - type: text
    content: and
  - type: text
    content: ' scorning like water,'
  '8':
  - type: text
    content: ' Who goes in company with the workers of iniquity and walks with wicked men?'
  '9':
  - type: text
    content: ' For he has said, It profits a man nothing that he should delight himself with God '
  - type: text
    content: and
  - type: text
    content: ' consent to Him.'
