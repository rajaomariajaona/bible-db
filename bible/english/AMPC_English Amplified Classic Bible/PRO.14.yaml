document_id: PRO.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' EVERY WISE woman builds her house, but the foolish one tears it down with her own hands.'
  '10':
  - type: text
    content: ' The heart knows its own bitterness, and no stranger shares its joy.'
  '11':
  - type: text
    content: ' The house of the wicked shall be overthrown, but the tent of the upright shall flourish.'
  '12':
  - type: text
    content: ' There is a way which seems right to a man '
  - type: text
    content: and
  - type: text
    content: ' appears straight before him, but at the end of it is the way of death.'
  '13':
  - type: text
    content: ' Even in laughter the heart is sorrowful, and the end of mirth is heaviness '
  - type: text
    content: and
  - type: text
    content: ' grief.'
  '14':
  - type: text
    content: ' The backslider in heart [from God and from fearing God] shall be filled with [the fruit of] his own ways, and a good man shall be satisfied with [the fruit of] his ways [with the holy thoughts and actions which his heart prompts and in which he delights].'
  '15':
  - type: text
    content: ' The simpleton believes every word he hears, but the prudent man looks '
  - type: text
    content: and
  - type: text
    content: ' considers well where he is going.'
  '16':
  - type: text
    content: ' A wise man suspects danger and cautiously avoids evil, but the fool bears himself insolently and is [presumptuously] confident.'
  '17':
  - type: text
    content: ' He who foams up quickly '
  - type: text
    content: and
  - type: text
    content: ' flies into a passion deals foolishly, and a man of wicked plots '
  - type: text
    content: and
  - type: text
    content: ' plans is hated.'
  '18':
  - type: text
    content: ' The simple acquire folly, but the prudent are crowned with knowledge.'
  '19':
  - type: text
    content: ' The evil men bow before the good, and the wicked [stand suppliantly] at the gates of the [uncompromisingly] righteous.'
  '2':
  - type: text
    content: ' He who walks in uprightness reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fears the Lord, but he who is contrary '
  - type: text
    content: and
  - type: text
    content: ' devious in his ways despises Him.'
  '20':
  - type: text
    content: ' The poor is hated even by his own neighbor, but the rich has many friends.'
  '21':
  - type: text
    content: ' He who despises his neighbor sins [against God, his fellowman, and himself], but happy (blessed and fortunate) is he who is kind '
  - type: text
    content: and
  - type: text
    content: ' merciful to the poor.'
  '22':
  - type: text
    content: ' Do they not err who devise evil '
  - type: text
    content: and
  - type: text
    content: ' wander from the way of life? But loving-kindness '
  - type: text
    content: and
  - type: text
    content: ' mercy, loyalty '
  - type: text
    content: and
  - type: text
    content: ' faithfulness, shall be to those who devise good.'
  '23':
  - type: text
    content: ' In all labor there is profit, but idle talk leads only to poverty.'
  '24':
  - type: text
    content: ' The crown of the wise is their wealth of Wisdom, but the foolishness of [self-confident] fools is [nothing but] folly.'
  '25':
  - type: text
    content: ' A truthful witness saves lives, but a deceitful witness speaks lies [and endangers lives].'
  '26':
  - type: text
    content: ' In the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord there is strong confidence, and His children shall always have a place of refuge.'
  '27':
  - type: text
    content: ' Reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord is a fountain of life, that one may avoid the snares of death. [John 4:10, 14.]'
  '28':
  - type: text
    content: ' In a multitude of people is the king''s glory, but in a lack of people is the prince''s ruin.'
  '29':
  - type: text
    content: ' He who is slow to anger has great understanding, but he who is hasty of spirit exposes '
  - type: text
    content: and
  - type: text
    content: ' exalts his folly. [Prov. 16:32; James 1:19.]'
  '3':
  - type: text
    content: ' In the fool''s own mouth is a rod [to shame] his pride, but the wise men''s lips preserve them.'
  '30':
  - type: text
    content: ' A calm '
  - type: text
    content: and
  - type: text
    content: ' undisturbed mind '
  - type: text
    content: and
  - type: text
    content: ' heart are the life '
  - type: text
    content: and
  - type: text
    content: ' health of the body, but envy, jealousy, '
  - type: text
    content: and
  - type: text
    content: ' wrath are like rottenness of the bones.'
  '31':
  - type: text
    content: ' He who oppresses the poor reproaches, mocks, '
  - type: text
    content: and
  - type: text
    content: ' insults his Maker, but he who is kind '
  - type: text
    content: and
  - type: text
    content: ' merciful to the needy honors Him. [Prov. 17:5; Matt. 25:40, 45.]'
  '32':
  - type: text
    content: ' The wicked is overthrown through his wrongdoing '
  - type: text
    content: and
  - type: text
    content: ' calamity, but the [consistently] righteous has hope '
  - type: text
    content: and
  - type: text
    content: ' confidence even in death.'
  '33':
  - type: text
    content: ' Wisdom rests [silently] in the mind '
  - type: text
    content: and
  - type: text
    content: ' heart of him who has understanding, but that which is in the inward part of [self-confident] fools is made known. [Isa. 32:6.]'
  '34':
  - type: text
    content: ' Uprightness '
  - type: text
    content: and
  - type: text
    content: ' right standing with God (moral and spiritual rectitude in every area and relation) elevate a nation, but sin is a reproach to any people.'
  '35':
  - type: text
    content: ' The king''s favor is toward a wise '
  - type: text
    content: and
  - type: text
    content: ' discreet servant, but his wrath is against him who does shamefully. [Matt. 24:45, 47.]'
  '4':
  - type: text
    content: ' Where no oxen are, the grain crib is empty, but much increase [of crops] comes by the strength of the ox.'
  '5':
  - type: text
    content: ' A faithful witness will not lie, but a false witness breathes out falsehoods.'
  '6':
  - type: text
    content: ' A scoffer seeks Wisdom in vain [for his very attitude blinds and deafens him to it], but knowledge is easy to him who [being teachable] understands.'
  '7':
  - type: text
    content: ' Go from the presence of a foolish '
  - type: text
    content: and
  - type: text
    content: ' self-confident man, for you will not find knowledge on his lips.'
  '8':
  - type: text
    content: ' The Wisdom [godly Wisdom, which is comprehensive insight into the ways and purposes of God] of the prudent is to understand his way, but the folly of [self-confident] fools is to deceive.'
  '9':
  - type: text
    content: ' Fools make a mock of sin '
  - type: text
    content: and
  - type: text
    content: ' sin mocks the fools [who are its victims; a sin offering made by them only mocks them, bringing them disappointment and disfavor], but among the upright there is the favor of God. [Prov. 10:23.]'
