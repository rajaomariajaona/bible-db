document_id: PRO.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' EVERY WISE woman builds her house, but the foolish one tears it down with her own hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He who walks in uprightness reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fears the Lord, but he who is contrary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devious in his ways despises Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' In the fool''s own mouth is a rod [to shame] his pride, but the wise men''s lips preserve them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Where no oxen are, the grain crib is empty, but much increase [of crops] comes by the strength of the ox.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A faithful witness will not lie, but a false witness breathes out falsehoods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' A scoffer seeks Wisdom in vain [for his very attitude blinds and deafens him to it], but knowledge is easy to him who [being teachable] understands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Go from the presence of a foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-confident man, for you will not find knowledge on his lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Wisdom [godly Wisdom, which is comprehensive insight into the ways and purposes of God] of the prudent is to understand his way, but the folly of [self-confident] fools is to deceive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Fools make a mock of sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sin mocks the fools [who are its victims; a sin offering made by them only mocks them, bringing them disappointment and disfavor], but among the upright there is the favor of God. [Prov. 10:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The heart knows its own bitterness, and no stranger shares its joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The house of the wicked shall be overthrown, but the tent of the upright shall flourish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' There is a way which seems right to a man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appears straight before him, but at the end of it is the way of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Even in laughter the heart is sorrowful, and the end of mirth is heaviness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grief.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The backslider in heart [from God and from fearing God] shall be filled with [the fruit of] his own ways, and a good man shall be satisfied with [the fruit of] his ways [with the holy thoughts and actions which his heart prompts and in which he delights].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The simpleton believes every word he hears, but the prudent man looks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' considers well where he is going.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' A wise man suspects danger and cautiously avoids evil, but the fool bears himself insolently and is [presumptuously] confident.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He who foams up quickly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flies into a passion deals foolishly, and a man of wicked plots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans is hated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The simple acquire folly, but the prudent are crowned with knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The evil men bow before the good, and the wicked [stand suppliantly] at the gates of the [uncompromisingly] righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The poor is hated even by his own neighbor, but the rich has many friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He who despises his neighbor sins [against God, his fellowman, and himself], but happy (blessed and fortunate) is he who is kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' merciful to the poor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Do they not err who devise evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wander from the way of life? But loving-kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy, loyalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness, shall be to those who devise good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' In all labor there is profit, but idle talk leads only to poverty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The crown of the wise is their wealth of Wisdom, but the foolishness of [self-confident] fools is [nothing but] folly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' A truthful witness saves lives, but a deceitful witness speaks lies [and endangers lives].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' In the reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord there is strong confidence, and His children shall always have a place of refuge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord is a fountain of life, that one may avoid the snares of death. [John 4:10, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' In a multitude of people is the king''s glory, but in a lack of people is the prince''s ruin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He who is slow to anger has great understanding, but he who is hasty of spirit exposes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exalts his folly. [Prov. 16:32; James 1:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' A calm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undisturbed mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart are the life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' health of the body, but envy, jealousy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath are like rottenness of the bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' He who oppresses the poor reproaches, mocks, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insults his Maker, but he who is kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' merciful to the needy honors Him. [Prov. 17:5; Matt. 25:40, 45.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The wicked is overthrown through his wrongdoing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity, but the [consistently] righteous has hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence even in death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Wisdom rests [silently] in the mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart of him who has understanding, but that which is in the inward part of [self-confident] fools is made known. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right standing with God (moral and spiritual rectitude in every area and relation) elevate a nation, but sin is a reproach to any people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The king''s favor is toward a wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discreet servant, but his wrath is against him who does shamefully. [Matt. 24:45, 47.]'
