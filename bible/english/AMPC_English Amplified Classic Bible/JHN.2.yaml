document_id: JHN.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ON THE third day there was a wedding at Cana of Galilee, and the mother of Jesus was there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Jesus also was invited with His disciples to the wedding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when the wine was all gone, the mother of Jesus said to Him, They have no more wine!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Jesus said to her, [Dear] woman, what is that to you and to Me? [What do we have in common? Leave it to Me.] My time (hour to act) has not yet come. [Eccl. 3:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' His mother said to the servants, Whatever He says to you, do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now there were six waterpots of stone standing there, as the Jewish custom of purification (ceremonial washing) demanded, holding twenty to thirty gallons apiece.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Jesus said to them, Fill the waterpots with water. So they filled them up to the brim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then He said to them, Draw some out now and take it to the manager of the feast [to the one presiding, the superintendent of the banquet]. So they took him some.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when the manager tasted the water just now turned into wine, not knowing where it came from–though the servants who had drawn the water knew–he called the bridegroom'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And said to him, Everyone else serves his best wine first, and when people have drunk freely, then he serves that which is not so good; but you have kept back the good wine until now!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' This, the first of His signs (miracles, wonderworks), Jesus performed in Cana of Galilee, and manifested His glory [by it He displayed His greatness and His power openly], and His disciples believed in Him [adhered to, trusted in, and relied on Him]. [Deut. 5:24; Ps. 72:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' After that He went down to Capernaum with His mother and brothers and disciples, and they stayed there only a few days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now the Passover of the Jews was approaching, so Jesus went up to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' There He found in the temple [enclosure] those who were selling oxen and sheep and doves, and the money changers sitting there [also at their stands].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And having made a lash (a whip) of cords, He drove them all out of the temple [enclosure]–both the sheep and the oxen–spilling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scattering the brokers'' money and upsetting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tossing around their trays (their stands).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then to those who sold the doves He said, Take these things away (out of here)! Make not My Father''s house a house of merchandise (a marketplace, a sales shop)! [Ps. 93:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And His disciples remembered that it is written [in the Holy Scriptures], Zeal (the fervor of love) for Your house will eat Me up. [I will be consumed with jealousy for the honor of Your house.] [Ps. 69:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then the Jews retorted, What sign can You show us, seeing You do these things? [What sign, miracle, token, indication can You give us as evidence that You have authority and are commissioned to act in this way?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Jesus answered them, Destroy (undo) this temple, and in three days I will raise it up again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then the Jews replied, It took forty-six years to build this temple (sanctuary), and will You raise it up in three days?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But He had spoken of the temple which was His body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When therefore He had risen from the dead, His disciples remembered that He said this. And so they believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on the Scripture and the word (message) Jesus had spoken. [Ps. 16:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But when He was in Jerusalem during the Passover Feast, many believed in His name [identified themselves with His party] after seeing His signs (wonders, miracles) which He was doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But Jesus [for His part] did not trust Himself to them, because He knew all [men];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And He did not need anyone to bear witness concerning man [needed no evidence from anyone about men], for He Himself knew what was in human nature. [He could read men''s hearts.] [I Sam. 16:7.]'
