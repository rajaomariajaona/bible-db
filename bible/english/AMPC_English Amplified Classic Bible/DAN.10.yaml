document_id: DAN.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE third year of Cyrus king of Persia a word was revealed to Daniel, who was called Belteshazzar. And the word was true and it referred to great tribulation (conflict and wretchedness). And he understood the word and had understanding of the vision. [Dan. 8:26; Rev. 19:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In those days I, Daniel, was mourning for three whole weeks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I ate no pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' desirable food, nor did any meat or wine come into my mouth; and I did not anoint myself at all for the full three weeks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' On the twenty-fourth day of the first month, as I was on the bank of the great river Hiddekel [which is the Tigris],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I lifted up my eyes and looked, and behold, a man clothed in linen, whose loins were girded with pure gold of Uphaz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' His body also was [a golden luster] like beryl, his face had the appearance of lightning, his eyes were like flaming torches, his arms and his feet like glowing burnished bronze, and the sound of his words was like the noise of a multitude [of people or the roaring of the sea]. [Rev. 1:12-16; 19:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I, Daniel, alone saw the vision [of this heavenly being], for the men who were with me did not see the vision, but a great trembling fell upon them so that they fled to hide themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So I was left alone and saw this great vision, and no strength was left in me, for my fresh appearance was turned to pallor; I grew weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint [with fright].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then I heard the sound of his words; and when I heard the sound of his words, I fell on my face in a deep sleep, with my face [sunk] to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And behold, a hand touched me, which set me [unsteadily] upon my knees and upon the palms of my hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And [the angel] said to me, O Daniel, you greatly beloved man, understand the words that I speak to you and stand upright, for to you I am now sent. And while he was saying this word to me, I stood up trembling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then he said to me, Fear not, Daniel, for from the first day that you set your mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart to understand and to humble yourself before your God, your words were heard, and I have come as a consequence of [and in response to] your words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the prince of the kingdom of Persia withstood me for twenty-one days. Then Michael, one of the chief [of the celestial] princes, came to help me, for I remained there with the kings of Persia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now I have come to make you understand what is to befall your people in the latter days, for the vision is for [many] days yet to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When he had spoken to me according to these words, I turned my face toward the ground and was dumb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And behold, one in the likeness of the sons of men touched my lips. Then I opened my mouth and spoke. I said to him who stood before me, O my lord, by reason of the vision sorrows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pains have come upon me, and I retain no strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For how can my lord''s servant [who is so feeble] talk with this my lord? For now no strength remains in me, nor is there any breath left in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then there touched me again one whose appearance was like that of a man, and he strengthened me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And he said, O man greatly beloved, fear not! Peace be to you! Be strong, yes, be strong. And when he had spoken to me, I was strengthened and said, Let my lord speak, for you have strengthened me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then he said, Do you know why I have come to you? And now I will return to fight with the [hostile] prince of Persia; and when I have gone, behold, the [hostile] prince of Greece will come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But I will tell you what is inscribed in the writing of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the Book of Truth. There is no one who holds with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthens himself against these [hostile spirit forces] except Michael, your prince [national guardian angel].'
