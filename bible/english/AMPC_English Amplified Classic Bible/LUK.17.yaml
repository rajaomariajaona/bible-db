document_id: LUK.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND [Jesus] said to His disciples, Temptations (snares, traps set to entice to sin) are sure to come, but woe to him by '
  - type: text
    content: or
  - type: text
    content: ' through whom they come!'
  '10':
  - type: text
    content: ' Even so on your part, when you have done everything that was assigned '
  - type: text
    content: and
  - type: text
    content: ' commanded you, say, We are unworthy servants [possessing no merit, for we have not gone beyond our obligation]; we have [merely] done what was our duty to do.'
  '11':
  - type: text
    content: ' As He went on His way to Jerusalem, it occurred that [Jesus] was passing [along the border] between Samaria and Galilee.'
  '12':
  - type: text
    content: ' And as He was going into one village, He was met by ten lepers, who stood at a distance.'
  '13':
  - type: text
    content: ' And they raised up their voices and called, Jesus, Master, take pity '
  - type: text
    content: and
  - type: text
    content: ' have mercy on us!'
  '14':
  - type: text
    content: ' And when He saw them, He said to them, Go [at once] and show yourselves to the priests. And as they went, they were cured '
  - type: text
    content: and
  - type: text
    content: ' made clean. [Lev. 14:2-32.]'
  '15':
  - type: text
    content: ' Then one of them, upon seeing that he was cured, turned back, recognizing '
  - type: text
    content: and
  - type: text
    content: ' thanking '
  - type: text
    content: and
  - type: text
    content: ' praising God with a loud voice;'
  '16':
  - type: text
    content: ' And he fell prostrate at Jesus'' feet, thanking Him [over and over]. And he was a Samaritan.'
  '17':
  - type: text
    content: ' Then Jesus asked, Were not [all] ten cleansed? Where are the nine?'
  '18':
  - type: text
    content: ' Was there no one found to return and to recognize '
  - type: text
    content: and
  - type: text
    content: ' give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise to God except this alien?'
  '19':
  - type: text
    content: ' And He said to him, Get up and go on your way. Your faith (your trust and confidence that spring from your belief in God) has restored you to health.'
  '2':
  - type: text
    content: ' It would be more profitable for him if a millstone were hung around his neck and he were hurled into the sea than that he should cause to sin '
  - type: text
    content: or
  - type: text
    content: ' be a snare to one of these little ones [lowly in rank or influence].'
  '20':
  - type: text
    content: ' Asked by the Pharisees when the kingdom of God would come, He replied to them by saying, The kingdom of God does not come with signs to be observed '
  - type: text
    content: or
  - type: text
    content: ' with visible display,'
  '21':
  - type: text
    content: ' Nor will people say, Look! Here [it is]! or, See, [it is] there! For behold, the kingdom of God is within you [in your hearts] '
  - type: text
    content: and
  - type: text
    content: ' among you [surrounding you].'
  '22':
  - type: text
    content: ' And He said to the disciples, The time is coming when you will long to see [even] one of the days of the Son of Man, and you will not see [it].'
  '23':
  - type: text
    content: ' And they will say to you, Look! [He is] there! or, Look! [He is] here! But do not go out or follow [them].'
  '24':
  - type: text
    content: ' For like the lightning, that flashes and lights up the sky from one end to the other, so will the Son of Man be in His [own] day.'
  '25':
  - type: text
    content: ' But first He must suffer many things and be disapproved '
  - type: text
    content: and
  - type: text
    content: ' repudiated '
  - type: text
    content: and
  - type: text
    content: ' rejected by this age '
  - type: text
    content: and
  - type: text
    content: ' generation.'
  '26':
  - type: text
    content: ' And [just] as it was in the days of Noah, so will it be in the time of the Son of Man.'
  '27':
  - type: text
    content: ' [People] ate, they drank, they married, they were given in marriage, right up to the day when Noah went into the ark, and the flood came and destroyed them all. [Gen. 6:5-8; 7:6-24.]'
  '28':
  - type: text
    content: ' So also [it was the same] as it was in the days of Lot. [People] ate, they drank, they bought, they sold, they planted, they built;'
  '29':
  - type: text
    content: ' But on the [very] day that Lot went out of Sodom, it rained fire and brimstone from heaven and destroyed [them] all.'
  '3':
  - type: text
    content: ' Pay attention '
  - type: text
    content: and
  - type: text
    content: ' always be on your guard [looking out for one another]. If your brother sins (misses the mark), solemnly tell him so '
  - type: text
    content: and
  - type: text
    content: ' reprove him, and if he repents (feels sorry for having sinned), forgive him.'
  '30':
  - type: text
    content: ' That is the way it will be on the day that the Son of Man is revealed. [Gen. 18:20-33; 19:24, 25.]'
  '31':
  - type: text
    content: ' On that day let him who is on the housetop, with his belongings in the house, not come down [and go inside] to carry them away; and likewise let him who is in the field not turn back.'
  '32':
  - type: text
    content: ' Remember Lot''s wife! [Gen. 19:26.]'
  '33':
  - type: text
    content: ' Whoever tries to preserve his life will lose it, but whoever loses his life will preserve and quicken it.'
  '34':
  - type: text
    content: ' I tell you, in that night there will be two men in one bed; one will be taken and the other will be left.'
  '35':
  - type: text
    content: ' There will be two women grinding together; one will be taken and the other will be left.'
  '36':
  - type: text
    content: ' '
  - type: text
    content: Two men will be in the field; one will be taken and the other will be left.
  '37':
  - type: text
    content: ' Then they asked Him, Where, Lord? He said to them, Wherever the dead body is, there will the vultures '
  - type: text
    content: or
  - type: text
    content: ' eagles be gathered together.'
  '4':
  - type: text
    content: ' And even if he sins against you seven times in a day, and turns to you seven times and says, I repent [I am sorry], you must forgive him (give up resentment and consider the offense as recalled and annulled).'
  '5':
  - type: text
    content: ' The apostles said to the Lord, Increase our faith (that trust and confidence that spring from our belief in God).'
  '6':
  - type: text
    content: ' And the Lord answered, If you had faith (trust and confidence in God) even [so small] like a grain of mustard seed, you could say to this mulberry tree, Be pulled up by the roots, and be planted in the sea, and it would obey you.'
  '7':
  - type: text
    content: ' Will any man of you who has a servant plowing or tending sheep say to him when he has come in from the field, Come at once and take your place at the table?'
  '8':
  - type: text
    content: ' Will he not instead tell him, Get my supper ready and gird yourself and serve me while I eat and drink; then afterward you yourself shall eat and drink?'
  '9':
  - type: text
    content: ' Is he grateful '
  - type: text
    content: and
  - type: text
    content: ' does he praise the servant because he did what he was ordered to do?'
