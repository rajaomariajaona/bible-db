document_id: LUK.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND [Jesus] said to His disciples, Temptations (snares, traps set to entice to sin) are sure to come, but woe to him by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' through whom they come!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It would be more profitable for him if a millstone were hung around his neck and he were hurled into the sea than that he should cause to sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be a snare to one of these little ones [lowly in rank or influence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' always be on your guard [looking out for one another]. If your brother sins (misses the mark), solemnly tell him so '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reprove him, and if he repents (feels sorry for having sinned), forgive him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And even if he sins against you seven times in a day, and turns to you seven times and says, I repent [I am sorry], you must forgive him (give up resentment and consider the offense as recalled and annulled).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The apostles said to the Lord, Increase our faith (that trust and confidence that spring from our belief in God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord answered, If you had faith (trust and confidence in God) even [so small] like a grain of mustard seed, you could say to this mulberry tree, Be pulled up by the roots, and be planted in the sea, and it would obey you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Will any man of you who has a servant plowing or tending sheep say to him when he has come in from the field, Come at once and take your place at the table?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Will he not instead tell him, Get my supper ready and gird yourself and serve me while I eat and drink; then afterward you yourself shall eat and drink?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Is he grateful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' does he praise the servant because he did what he was ordered to do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Even so on your part, when you have done everything that was assigned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commanded you, say, We are unworthy servants [possessing no merit, for we have not gone beyond our obligation]; we have [merely] done what was our duty to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' As He went on His way to Jerusalem, it occurred that [Jesus] was passing [along the border] between Samaria and Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And as He was going into one village, He was met by ten lepers, who stood at a distance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they raised up their voices and called, Jesus, Master, take pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy on us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when He saw them, He said to them, Go [at once] and show yourselves to the priests. And as they went, they were cured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made clean. [Lev. 14:2-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then one of them, upon seeing that he was cured, turned back, recognizing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising God with a loud voice;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he fell prostrate at Jesus'' feet, thanking Him [over and over]. And he was a Samaritan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Jesus asked, Were not [all] ten cleansed? Where are the nine?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Was there no one found to return and to recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise to God except this alien?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And He said to him, Get up and go on your way. Your faith (your trust and confidence that spring from your belief in God) has restored you to health.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Asked by the Pharisees when the kingdom of God would come, He replied to them by saying, The kingdom of God does not come with signs to be observed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' with visible display,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Nor will people say, Look! Here [it is]! or, See, [it is] there! For behold, the kingdom of God is within you [in your hearts] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among you [surrounding you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And He said to the disciples, The time is coming when you will long to see [even] one of the days of the Son of Man, and you will not see [it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they will say to you, Look! [He is] there! or, Look! [He is] here! But do not go out or follow [them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For like the lightning, that flashes and lights up the sky from one end to the other, so will the Son of Man be in His [own] day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But first He must suffer many things and be disapproved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repudiated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected by this age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And [just] as it was in the days of Noah, so will it be in the time of the Son of Man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [People] ate, they drank, they married, they were given in marriage, right up to the day when Noah went into the ark, and the flood came and destroyed them all. [Gen. 6:5-8; 7:6-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So also [it was the same] as it was in the days of Lot. [People] ate, they drank, they bought, they sold, they planted, they built;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But on the [very] day that Lot went out of Sodom, it rained fire and brimstone from heaven and destroyed [them] all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' That is the way it will be on the day that the Son of Man is revealed. [Gen. 18:20-33; 19:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' On that day let him who is on the housetop, with his belongings in the house, not come down [and go inside] to carry them away; and likewise let him who is in the field not turn back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Remember Lot''s wife! [Gen. 19:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Whoever tries to preserve his life will lose it, but whoever loses his life will preserve and quicken it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' I tell you, in that night there will be two men in one bed; one will be taken and the other will be left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' There will be two women grinding together; one will be taken and the other will be left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Two men will be in the field; one will be taken and the other will be left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then they asked Him, Where, Lord? He said to them, Wherever the dead body is, there will the vultures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' eagles be gathered together.'
