document_id: LUK.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JESUS called together the Twelve [apostles] and gave them power and authority over all demons, and to cure diseases,'
  '10':
  - type: text
    content: ' Upon their return, the apostles reported to Jesus all that they had done. And He took them [along with Him] and withdrew into privacy near a town called Bethsaida.'
  '11':
  - type: text
    content: ' But when the crowds learned of it, [they] followed Him; and He welcomed them and talked to them about the kingdom of God, and healed those who needed restoration to health.'
  '12':
  - type: text
    content: ' Now the day began to decline, and the Twelve came and said to Him, Dismiss the crowds '
  - type: text
    content: and
  - type: text
    content: ' send them away, so that they may go to the neighboring hamlets '
  - type: text
    content: and
  - type: text
    content: ' villages and the surrounding country and find lodging and get a supply of provisions, for we are here in an uninhabited (barren, solitary) place.'
  '13':
  - type: text
    content: ' But He said to them, You [yourselves] give them [food] to eat. They said, We have no more than five loaves and two fish–unless we are to go and buy food for all this crowd, [II Kings 4:42-44.]'
  '14':
  - type: text
    content: ' For there were about 5,000 men. And [Jesus] said to His disciples, Have them [sit down] reclining in table groups (companies) of about fifty each.'
  '15':
  - type: text
    content: ' And they did so, and made them all recline.'
  '16':
  - type: text
    content: ' And taking the five loaves and the two fish, He looked up to heaven and [praising God] gave thanks '
  - type: text
    content: and
  - type: text
    content: ' asked Him to bless them [to their use]. Then He broke them and gave them to the disciples to place before the multitude.'
  '17':
  - type: text
    content: ' And all the people ate and were satisfied. And they gathered up what remained over–twelve [small hand] baskets of broken pieces.'
  '18':
  - type: text
    content: ' Now it occurred that as Jesus was praying privately, the disciples were with Him, and He asked them, Who do men say that I am?'
  '19':
  - type: text
    content: ' And they answered, John the Baptist; but some say, Elijah; and others, that one of the ancient prophets has come back to life.'
  '2':
  - type: text
    content: ' And He sent them out to announce '
  - type: text
    content: and
  - type: text
    content: ' preach the kingdom of God and to bring healing.'
  '20':
  - type: text
    content: ' And He said to them, But who do you [yourselves] say that I am? And Peter replied, The Christ of God!'
  '21':
  - type: text
    content: ' But He strictly charged and sharply commanded them [under penalty] to tell this to no one [no one, whoever he might be],'
  '22':
  - type: text
    content: ' Saying, The Son of Man must suffer many things and be [deliberately] disapproved '
  - type: text
    content: and
  - type: text
    content: ' repudiated '
  - type: text
    content: and
  - type: text
    content: ' rejected on the part of the elders and chief priests and scribes, and be put to death and on the third day be raised [again].'
  '23':
  - type: text
    content: ' And He said to all, If any person wills to come after Me, let him deny himself [disown himself, forget, lose sight of himself and his own interests, refuse and give up himself] and take up his cross daily and follow Me [cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying also].'
  '24':
  - type: text
    content: ' For whoever would preserve his life '
  - type: text
    content: and
  - type: text
    content: ' save it will lose '
  - type: text
    content: and
  - type: text
    content: ' destroy it, but whoever loses his life for My sake, he will preserve '
  - type: text
    content: and
  - type: text
    content: ' save it [from the penalty of eternal death].'
  '25':
  - type: text
    content: ' For what does it profit a man, if he gains the whole world and ruins or forfeits (loses) himself?'
  '26':
  - type: text
    content: ' Because whoever is ashamed of Me and of My teachings, of him will the Son of Man be ashamed when He comes in the [threefold] glory (the splendor and majesty) of Himself and of the Father and of the holy angels.'
  '27':
  - type: text
    content: ' However I tell you truly, there are some of those standing here who will not taste death before they see the kingdom of God.'
  '28':
  - type: text
    content: ' Now about eight days after these teachings, Jesus took with Him Peter and John and James and went up on the mountain to pray.'
  '29':
  - type: text
    content: ' And as He was praying, the appearance of His countenance became altered (different), and His raiment became dazzling white [flashing with the brilliance of lightning].'
  '3':
  - type: text
    content: ' And He said to them, Do not take anything for your journey–neither walking stick, nor wallet [for a collection bag], nor food of any kind, nor money, and do not have two undergarments (tunics).'
  '30':
  - type: text
    content: ' And behold, two men were conversing with Him–Moses and Elijah,'
  '31':
  - type: text
    content: ' Who appeared in splendor '
  - type: text
    content: and
  - type: text
    content: ' majesty '
  - type: text
    content: and
  - type: text
    content: ' brightness and were speaking of His exit [from life], which He was about to bring to realization at Jerusalem.'
  '32':
  - type: text
    content: ' Now Peter and those with him were weighed down with sleep, but when they fully awoke, they saw His glory (splendor and majesty and brightness) and the two men who stood with Him.'
  '33':
  - type: text
    content: ' And it occurred as the men were parting from Him that Peter said to Jesus, Master, it is delightful '
  - type: text
    content: and
  - type: text
    content: ' good that we are here; and let us construct three booths '
  - type: text
    content: or
  - type: text
    content: ' huts–one for You and one for Moses and one for Elijah! not noticing '
  - type: text
    content: or
  - type: text
    content: ' knowing what he was saying.'
  '34':
  - type: text
    content: ' But even as he was saying this, a cloud came and began to overshadow them, and they were seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' struck with fear as they entered into the cloud.'
  '35':
  - type: text
    content: ' Then there came a voice out of the cloud, saying, This is My Son, My Chosen One '
  - type: text
    content: or
  - type: text
    content: ' '
  - type: text
    content: My Beloved
  - type: text
    content: '; listen to '
  - type: text
    content: and
  - type: text
    content: ' yield to '
  - type: text
    content: and
  - type: text
    content: ' obey Him!'
  '36':
  - type: text
    content: ' And when the voice had died away, Jesus was found there alone. And they kept still, and told no one at that time any of these things that they had seen.'
  '37':
  - type: text
    content: ' Now it occurred the next day, when they had come down from the mountain, that a great multitude met Him.'
  '38':
  - type: text
    content: ' And behold, a man from the crowd shouted out, Master, I implore You to look at my son, for he is my only child;'
  '39':
  - type: text
    content: ' And behold, a spirit seizes him and suddenly he cries out; it convulses him so that he foams at the mouth; and he is sorely shattered, and it will scarcely leave him.'
  '4':
  - type: text
    content: ' And whatever house you enter, stay there until you go away [from that place].'
  '40':
  - type: text
    content: ' And I implored Your disciples to drive it out, but they could not.'
  '41':
  - type: text
    content: ' Jesus answered, O [faithless ones] unbelieving '
  - type: text
    content: and
  - type: text
    content: ' without trust in God, a perverse (wayward, crooked and warped) generation! Until when '
  - type: text
    content: and
  - type: text
    content: ' how long am I to be with you and bear with you? Bring your son here [to Me].'
  '42':
  - type: text
    content: ' And even while he was coming, the demon threw him down and [completely] convulsed him. But Jesus censured '
  - type: text
    content: and
  - type: text
    content: ' severely rebuked the unclean spirit and healed the child and restored him to his father.'
  '43':
  - type: text
    content: ' And all were astounded at the evidence of God''s mighty power '
  - type: text
    content: and
  - type: text
    content: ' His majesty '
  - type: text
    content: and
  - type: text
    content: ' magnificence. But [while] they were all marveling at everything Jesus was doing, He said to His disciples,'
  '44':
  - type: text
    content: ' Let these words sink into your ears: the Son of Man is about to be delivered into the hands of men [whose conduct is opposed to God].'
  '45':
  - type: text
    content: ' However, they did not comprehend this saying; and it was kept hidden from them, so that they should not grasp it '
  - type: text
    content: and
  - type: text
    content: ' understand, and they were afraid to ask Him about the statement.'
  '46':
  - type: text
    content: ' But a controversy arose among them as to which of them might be the greatest [surpassing the others in excellence, worth, and authority].'
  '47':
  - type: text
    content: ' But Jesus, as He perceived the thoughts of their hearts, took a little child and put him at His side'
  '48':
  - type: text
    content: ' And told them, Whoever receives '
  - type: text
    content: and
  - type: text
    content: ' accepts '
  - type: text
    content: and
  - type: text
    content: ' welcomes this child in My name '
  - type: text
    content: and
  - type: text
    content: ' for My sake receives '
  - type: text
    content: and
  - type: text
    content: ' accepts '
  - type: text
    content: and
  - type: text
    content: ' welcomes Me; and whoever so receives Me so also receives Him Who sent Me. For he who is least '
  - type: text
    content: and
  - type: text
    content: ' lowliest among you all–he is [the one who is truly] great.'
  '49':
  - type: text
    content: ' John said, Master, we saw a man driving out demons in Your name and we commanded him to stop it, for he does not follow along with us.'
  '5':
  - type: text
    content: ' And wherever they do not receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome you, when you leave that town shake off [even] the dust from your feet, as a testimony against them.'
  '50':
  - type: text
    content: ' But Jesus told him, Do not forbid [such people]; for whoever is not against you is for you.'
  '51':
  - type: text
    content: ' Now when the time was almost come for Jesus to be received up [to heaven], He steadfastly '
  - type: text
    content: and
  - type: text
    content: ' determinedly set His face to go to Jerusalem.'
  '52':
  - type: text
    content: ' And He sent messengers before Him; and they reached and entered a Samaritan village to make [things] ready for Him;'
  '53':
  - type: text
    content: ' But [the people] would not welcome '
  - type: text
    content: or
  - type: text
    content: ' receive '
  - type: text
    content: or
  - type: text
    content: ' accept Him, because His face was [set as if He was] going to Jerusalem.'
  '54':
  - type: text
    content: ' And when His disciples James and John observed this, they said, Lord, do You wish us to command fire to come down from heaven and consume them, '
  - type: text
    content: even as Elijah did
  - type: text
    content: ' ? [II Kings 1:9-16.]'
  '55':
  - type: text
    content: ' But He turned and rebuked '
  - type: text
    content: and
  - type: text
    content: ' severely censured them. '
  - type: text
    content: He said, You do not know of what sort of spirit you are,
  '56':
  - type: text
    content: ' For the Son of Man did not come to destroy men''s lives, but to save them [from the penalty of eternal death]. And they journeyed on to another village.'
  '57':
  - type: text
    content: ' And it occurred that as they were going along the road, a man said to Him, '
  - type: text
    content: Lord,
  - type: text
    content: ' I will follow You wherever You go.'
  '58':
  - type: text
    content: ' And Jesus told him, Foxes have lurking holes and the birds of the air have roosts '
  - type: text
    content: and
  - type: text
    content: ' nests, but the Son of Man has no place to lay His head.'
  '59':
  - type: text
    content: ' And He said to another, Become My disciple, side with My party, and accompany Me! But he replied, '
  - type: text
    content: Lord,
  - type: text
    content: ' permit me first to go and bury (await the death of) my father.'
  '6':
  - type: text
    content: ' And departing, they went about from village to village, preaching the Gospel and restoring the afflicted to health everywhere.'
  '60':
  - type: text
    content: ' But Jesus said to him, Allow the dead to bury their own dead; but as for you, go '
  - type: text
    content: and
  - type: text
    content: ' publish abroad throughout all regions the kingdom of God.'
  '61':
  - type: text
    content: ' Another also said, I will follow You, Lord, '
  - type: text
    content: and
  - type: text
    content: ' become Your disciple '
  - type: text
    content: and
  - type: text
    content: ' side with Your party; but let me first say good-bye to those at my home.'
  '62':
  - type: text
    content: ' Jesus said to him, No one who puts his hand to the plow and looks back [to the things behind] is fit for the kingdom of God.'
  '7':
  - type: text
    content: ' Now Herod the tetrarch heard of all that was being done by [Jesus], and he was [thoroughly] perplexed '
  - type: text
    content: and
  - type: text
    content: ' troubled, because it was said by some that John [the Baptist] had been raised from the dead,'
  '8':
  - type: text
    content: ' And by others that Elijah had appeared, and by others that one of the prophets of old had come back to life.'
  '9':
  - type: text
    content: ' But Herod said, John I beheaded; but Who is this about Whom I [learn] such things by hearsay? And he sought to see Him.'
