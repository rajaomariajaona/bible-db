document_id: LUK.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JESUS called together the Twelve [apostles] and gave them power and authority over all demons, and to cure diseases,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He sent them out to announce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preach the kingdom of God and to bring healing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to them, Do not take anything for your journey–neither walking stick, nor wallet [for a collection bag], nor food of any kind, nor money, and do not have two undergarments (tunics).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And whatever house you enter, stay there until you go away [from that place].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And wherever they do not receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome you, when you leave that town shake off [even] the dust from your feet, as a testimony against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And departing, they went about from village to village, preaching the Gospel and restoring the afflicted to health everywhere.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now Herod the tetrarch heard of all that was being done by [Jesus], and he was [thoroughly] perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled, because it was said by some that John [the Baptist] had been raised from the dead,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And by others that Elijah had appeared, and by others that one of the prophets of old had come back to life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But Herod said, John I beheaded; but Who is this about Whom I [learn] such things by hearsay? And he sought to see Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Upon their return, the apostles reported to Jesus all that they had done. And He took them [along with Him] and withdrew into privacy near a town called Bethsaida.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But when the crowds learned of it, [they] followed Him; and He welcomed them and talked to them about the kingdom of God, and healed those who needed restoration to health.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now the day began to decline, and the Twelve came and said to Him, Dismiss the crowds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' send them away, so that they may go to the neighboring hamlets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' villages and the surrounding country and find lodging and get a supply of provisions, for we are here in an uninhabited (barren, solitary) place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But He said to them, You [yourselves] give them [food] to eat. They said, We have no more than five loaves and two fish–unless we are to go and buy food for all this crowd, [II Kings 4:42-44.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For there were about 5,000 men. And [Jesus] said to His disciples, Have them [sit down] reclining in table groups (companies) of about fifty each.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they did so, and made them all recline.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And taking the five loaves and the two fish, He looked up to heaven and [praising God] gave thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' asked Him to bless them [to their use]. Then He broke them and gave them to the disciples to place before the multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And all the people ate and were satisfied. And they gathered up what remained over–twelve [small hand] baskets of broken pieces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now it occurred that as Jesus was praying privately, the disciples were with Him, and He asked them, Who do men say that I am?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they answered, John the Baptist; but some say, Elijah; and others, that one of the ancient prophets has come back to life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And He said to them, But who do you [yourselves] say that I am? And Peter replied, The Christ of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But He strictly charged and sharply commanded them [under penalty] to tell this to no one [no one, whoever he might be],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Saying, The Son of Man must suffer many things and be [deliberately] disapproved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repudiated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected on the part of the elders and chief priests and scribes, and be put to death and on the third day be raised [again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And He said to all, If any person wills to come after Me, let him deny himself [disown himself, forget, lose sight of himself and his own interests, refuse and give up himself] and take up his cross daily and follow Me [cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying also].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For whoever would preserve his life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save it will lose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy it, but whoever loses his life for My sake, he will preserve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save it [from the penalty of eternal death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For what does it profit a man, if he gains the whole world and ruins or forfeits (loses) himself?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Because whoever is ashamed of Me and of My teachings, of him will the Son of Man be ashamed when He comes in the [threefold] glory (the splendor and majesty) of Himself and of the Father and of the holy angels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' However I tell you truly, there are some of those standing here who will not taste death before they see the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Now about eight days after these teachings, Jesus took with Him Peter and John and James and went up on the mountain to pray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And as He was praying, the appearance of His countenance became altered (different), and His raiment became dazzling white [flashing with the brilliance of lightning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And behold, two men were conversing with Him–Moses and Elijah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Who appeared in splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brightness and were speaking of His exit [from life], which He was about to bring to realization at Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Now Peter and those with him were weighed down with sleep, but when they fully awoke, they saw His glory (splendor and majesty and brightness) and the two men who stood with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And it occurred as the men were parting from Him that Peter said to Jesus, Master, it is delightful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good that we are here; and let us construct three booths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' huts–one for You and one for Moses and one for Elijah! not noticing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' knowing what he was saying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But even as he was saying this, a cloud came and began to overshadow them, and they were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struck with fear as they entered into the cloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then there came a voice out of the cloud, saying, This is My Son, My Chosen One '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: My Beloved
  - type: text
    text: '; listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yield to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And when the voice had died away, Jesus was found there alone. And they kept still, and told no one at that time any of these things that they had seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Now it occurred the next day, when they had come down from the mountain, that a great multitude met Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And behold, a man from the crowd shouted out, Master, I implore You to look at my son, for he is my only child;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And behold, a spirit seizes him and suddenly he cries out; it convulses him so that he foams at the mouth; and he is sorely shattered, and it will scarcely leave him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And I implored Your disciples to drive it out, but they could not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Jesus answered, O [faithless ones] unbelieving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without trust in God, a perverse (wayward, crooked and warped) generation! Until when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how long am I to be with you and bear with you? Bring your son here [to Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And even while he was coming, the demon threw him down and [completely] convulsed him. But Jesus censured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severely rebuked the unclean spirit and healed the child and restored him to his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And all were astounded at the evidence of God''s mighty power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnificence. But [while] they were all marveling at everything Jesus was doing, He said to His disciples,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Let these words sink into your ears: the Son of Man is about to be delivered into the hands of men [whose conduct is opposed to God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' However, they did not comprehend this saying; and it was kept hidden from them, so that they should not grasp it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand, and they were afraid to ask Him about the statement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' But a controversy arose among them as to which of them might be the greatest [surpassing the others in excellence, worth, and authority].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' But Jesus, as He perceived the thoughts of their hearts, took a little child and put him at His side'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And told them, Whoever receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes this child in My name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for My sake receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes Me; and whoever so receives Me so also receives Him Who sent Me. For he who is least '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lowliest among you all–he is [the one who is truly] great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' John said, Master, we saw a man driving out demons in Your name and we commanded him to stop it, for he does not follow along with us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' But Jesus told him, Do not forbid [such people]; for whoever is not against you is for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Now when the time was almost come for Jesus to be received up [to heaven], He steadfastly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' determinedly set His face to go to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And He sent messengers before Him; and they reached and entered a Samaritan village to make [things] ready for Him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' But [the people] would not welcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' accept Him, because His face was [set as if He was] going to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And when His disciples James and John observed this, they said, Lord, do You wish us to command fire to come down from heaven and consume them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even as Elijah did
  - type: text
    text: ' ? [II Kings 1:9-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' But He turned and rebuked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severely censured them. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He said, You do not know of what sort of spirit you are,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' For the Son of Man did not come to destroy men''s lives, but to save them [from the penalty of eternal death]. And they journeyed on to another village.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' And it occurred that as they were going along the road, a man said to Him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lord,
  - type: text
    text: ' I will follow You wherever You go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' And Jesus told him, Foxes have lurking holes and the birds of the air have roosts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nests, but the Son of Man has no place to lay His head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' And He said to another, Become My disciple, side with My party, and accompany Me! But he replied, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lord,
  - type: text
    text: ' permit me first to go and bury (await the death of) my father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' But Jesus said to him, Allow the dead to bury their own dead; but as for you, go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publish abroad throughout all regions the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
