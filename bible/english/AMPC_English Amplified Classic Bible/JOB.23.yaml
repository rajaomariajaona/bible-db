document_id: JOB.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JOB answered,'
  '10':
  - type: text
    content: ' But He knows the way that I take [He has concern for it, appreciates, and pays attention to it]. When He has tried me, I shall come forth as refined gold [pure and luminous]. [Ps. 17:3; 66:10; James 1:12.]'
  '11':
  - type: text
    content: ' My foot has held fast to His steps; His ways have I kept and not turned aside.'
  '12':
  - type: text
    content: ' I have not gone back from the commandment of His lips; I have esteemed '
  - type: text
    content: and
  - type: text
    content: ' treasured the words of His mouth more than my necessary food.'
  '13':
  - type: text
    content: ' But He is unchangeable, and who can turn Him? And what He wants to do, that He does.'
  '14':
  - type: text
    content: ' For He performs [that which He has] planned for me, and of many such matters He is mindful.'
  '15':
  - type: text
    content: ' Therefore am I troubled '
  - type: text
    content: and
  - type: text
    content: ' terrified at His presence; when I consider, I am in dread '
  - type: text
    content: and
  - type: text
    content: ' afraid of Him.'
  '16':
  - type: text
    content: ' For God has made my heart faint, timid, '
  - type: text
    content: and
  - type: text
    content: ' broken, and the Almighty has terrified me,'
  '17':
  - type: text
    content: ' Because I was not cut off before the darkness [of these woes befell me], neither has He covered the thick darkness from my face.'
  '2':
  - type: text
    content: ' Even today is my complaint rebellious '
  - type: text
    content: and
  - type: text
    content: ' bitter; my stroke is heavier than my groaning.'
  '3':
  - type: text
    content: ' Oh, that I knew where I might find Him, that I might come even to His seat!'
  '4':
  - type: text
    content: ' I would lay my cause before Him and fill my mouth with arguments.'
  '5':
  - type: text
    content: ' I would learn what He would answer me, and understand what He would say to me.'
  '6':
  - type: text
    content: ' Would He plead against me with His great power? No, He would give heed to me. [Isa. 27:4, 5; 57:16.]'
  '7':
  - type: text
    content: ' There the righteous [one who is upright and in right standing with God] could reason with Him; so I should be acquitted by my Judge forever.'
  '8':
  - type: text
    content: ' Behold, I go forward [and to the east], but He is not there; I go backward [and to the west], but I cannot perceive Him;'
  '9':
  - type: text
    content: ' On the left hand [and to the north] where He works [I seek Him], but I cannot behold Him; He turns Himself to the right hand [and to the south], but I cannot see Him.'
