document_id: JOB.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JOB answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But He knows the way that I take [He has concern for it, appreciates, and pays attention to it]. When He has tried me, I shall come forth as refined gold [pure and luminous]. [Ps. 17:3; 66:10; James 1:12.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My foot has held fast to His steps; His ways have I kept and not turned aside.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I have not gone back from the commandment of His lips; I have esteemed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treasured the words of His mouth more than my necessary food.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But He is unchangeable, and who can turn Him? And what He wants to do, that He does.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For He performs [that which He has] planned for me, and of many such matters He is mindful.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Therefore am I troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified at His presence; when I consider, I am in dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afraid of Him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For God has made my heart faint, timid, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken, and the Almighty has terrified me,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Because I was not cut off before the darkness [of these woes befell me], neither has He covered the thick darkness from my face.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Even today is my complaint rebellious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bitter; my stroke is heavier than my groaning.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Oh, that I knew where I might find Him, that I might come even to His seat!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I would lay my cause before Him and fill my mouth with arguments.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I would learn what He would answer me, and understand what He would say to me.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Would He plead against me with His great power? No, He would give heed to me. [Isa. 27:4, 5; 57:16.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' There the righteous [one who is upright and in right standing with God] could reason with Him; so I should be acquitted by my Judge forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Behold, I go forward [and to the east], but He is not there; I go backward [and to the west], but I cannot perceive Him;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' On the left hand [and to the north] where He works [I seek Him], but I cannot behold Him; He turns Himself to the right hand [and to the south], but I cannot see Him.'
