document_id: PSA.71
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN YOU, O Lord, do I put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently take refuge; let me never be put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' confusion!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Deliver me in Your righteousness and cause me to escape; bow down Your ear to me and save me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Be to me a rock of refuge in which to dwell, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a sheltering stronghold to which I may continually resort, which You have appointed to save me, for You are my Rock and my Fortress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Rescue me, O my God, out of the hand of the wicked, out of the grasp of the unrighteous and ruthless man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For You are my hope; O Lord God, You are my trust from my youth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the source of my confidence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Upon You have I leaned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied from birth; You are He Who took me from my mother''s womb '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' You have been my benefactor from that day. My praise is continually of You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I am as a wonder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surprise to many, but You are my strong refuge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' My mouth shall be filled with Your praise and with Your honor all the day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Cast me not off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' send me away in the time of old age; forsake me not when my strength is spent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my powers fail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For my enemies talk against me; those who watch for my life consult together,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Saying, God has forsaken him; pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute and take him, for there is none to deliver him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' O God, be not far from me! O my God, make haste to help me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Let them be put to shame and consumed who are adversaries to my life; let them be covered with reproach, scorn, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonor who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require my hurt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But I will hope continually, and will praise You yet more and more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My mouth shall tell of Your righteous acts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of Your deeds of salvation all the day, for their number is more than I know.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will come in the strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with the mighty acts of the Lord God; I will mention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise Your righteousness, even Yours alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' O God, You have taught me from my youth, and hitherto have I declared Your wondrous works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Yes, even when I am old and gray-headed, O God, forsake me not, [but keep me alive] until I have declared Your mighty strength to [this] generation, and Your might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power to all that are to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Your righteousness also, O God, is very high [reaching to the heavens], You Who have done great things; O God, who is like You, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' who is Your equal?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You Who have shown us [all] troubles great and sore will quicken us again and will bring us up again from the depths of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Increase my greatness (my honor) and turn and comfort me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I will also praise You with the harp, even Your truth and faithfulness, O my God; unto You will I sing praises with the lyre, O Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' My lips shall shout for joy when I sing praises to You, and my inner being, which You have redeemed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' My tongue also shall talk of Your righteousness all the day long; for they are put to shame, for they are confounded, who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demand my hurt.'
