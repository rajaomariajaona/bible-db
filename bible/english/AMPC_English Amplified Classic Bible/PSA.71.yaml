verses:
  '1':
  - type: text
    content: ' IN YOU, O Lord, do I put my trust '
  - type: text
    content: and
  - type: text
    content: ' confidently take refuge; let me never be put to shame '
  - type: text
    content: or
  - type: text
    content: ' confusion!'
  '10':
  - type: text
    content: ' For my enemies talk against me; those who watch for my life consult together,'
  '11':
  - type: text
    content: ' Saying, God has forsaken him; pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute and take him, for there is none to deliver him.'
  '12':
  - type: text
    content: ' O God, be not far from me! O my God, make haste to help me!'
  '13':
  - type: text
    content: ' Let them be put to shame and consumed who are adversaries to my life; let them be covered with reproach, scorn, '
  - type: text
    content: and
  - type: text
    content: ' dishonor who seek '
  - type: text
    content: and
  - type: text
    content: ' require my hurt.'
  '14':
  - type: text
    content: ' But I will hope continually, and will praise You yet more and more.'
  '15':
  - type: text
    content: ' My mouth shall tell of Your righteous acts '
  - type: text
    content: and
  - type: text
    content: ' of Your deeds of salvation all the day, for their number is more than I know.'
  '16':
  - type: text
    content: ' I will come in the strength '
  - type: text
    content: and
  - type: text
    content: ' with the mighty acts of the Lord God; I will mention '
  - type: text
    content: and
  - type: text
    content: ' praise Your righteousness, even Yours alone.'
  '17':
  - type: text
    content: ' O God, You have taught me from my youth, and hitherto have I declared Your wondrous works.'
  '18':
  - type: text
    content: ' Yes, even when I am old and gray-headed, O God, forsake me not, [but keep me alive] until I have declared Your mighty strength to [this] generation, and Your might '
  - type: text
    content: and
  - type: text
    content: ' power to all that are to come.'
  '19':
  - type: text
    content: ' Your righteousness also, O God, is very high [reaching to the heavens], You Who have done great things; O God, who is like You, '
  - type: text
    content: or
  - type: text
    content: ' who is Your equal?'
  '2':
  - type: text
    content: ' Deliver me in Your righteousness and cause me to escape; bow down Your ear to me and save me!'
  '20':
  - type: text
    content: ' You Who have shown us [all] troubles great and sore will quicken us again and will bring us up again from the depths of the earth.'
  '21':
  - type: text
    content: ' Increase my greatness (my honor) and turn and comfort me.'
  '22':
  - type: text
    content: ' I will also praise You with the harp, even Your truth and faithfulness, O my God; unto You will I sing praises with the lyre, O Holy One of Israel.'
  '23':
  - type: text
    content: ' My lips shall shout for joy when I sing praises to You, and my inner being, which You have redeemed.'
  '24':
  - type: text
    content: ' My tongue also shall talk of Your righteousness all the day long; for they are put to shame, for they are confounded, who seek '
  - type: text
    content: and
  - type: text
    content: ' demand my hurt.'
  '3':
  - type: text
    content: ' Be to me a rock of refuge in which to dwell, '
  - type: text
    content: and
  - type: text
    content: ' a sheltering stronghold to which I may continually resort, which You have appointed to save me, for You are my Rock and my Fortress.'
  '4':
  - type: text
    content: ' Rescue me, O my God, out of the hand of the wicked, out of the grasp of the unrighteous and ruthless man.'
  '5':
  - type: text
    content: ' For You are my hope; O Lord God, You are my trust from my youth '
  - type: text
    content: and
  - type: text
    content: ' the source of my confidence.'
  '6':
  - type: text
    content: ' Upon You have I leaned '
  - type: text
    content: and
  - type: text
    content: ' relied from birth; You are He Who took me from my mother''s womb '
  - type: text
    content: and
  - type: text
    content: ' You have been my benefactor from that day. My praise is continually of You.'
  '7':
  - type: text
    content: ' I am as a wonder '
  - type: text
    content: and
  - type: text
    content: ' surprise to many, but You are my strong refuge.'
  '8':
  - type: text
    content: ' My mouth shall be filled with Your praise and with Your honor all the day.'
  '9':
  - type: text
    content: ' Cast me not off '
  - type: text
    content: nor
  - type: text
    content: ' send me away in the time of old age; forsake me not when my strength is spent '
  - type: text
    content: and
  - type: text
    content: ' my powers fail.'
