document_id: PSA.83,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A song. A Psalm of Asaph.
  - type: text
    content: ' KEEP NOT silence, O God; hold not Your peace or be still, O God.'
  '10':
  - type: text
    content: ' Who perished at Endor, who became like manure for the earth.'
  '11':
  - type: text
    content: ' Make their nobles like Oreb and Zeeb, yes, all their princes as Zebah and Zalmunna, [Judg. 7:23-25; 8:10-21.]'
  '12':
  - type: text
    content: ' Who say, Let us take possession for ourselves of the pastures of God.'
  '13':
  - type: text
    content: ' O my God, make them like whirling dust, like stubble '
  - type: text
    content: or
  - type: text
    content: ' chaff before the wind!'
  '14':
  - type: text
    content: ' As fire consumes the forest, and as the flame sets the mountains ablaze,'
  '15':
  - type: text
    content: ' So pursue '
  - type: text
    content: and
  - type: text
    content: ' afflict them with Your tempest and terrify them with Your tornado '
  - type: text
    content: or
  - type: text
    content: ' hurricane.'
  '16':
  - type: text
    content: ' Fill their faces with shame, that they may seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' insistently require Your name, O Lord.'
  '17':
  - type: text
    content: ' Let them be put to shame and dismayed forever; yes, let them be put to shame and perish,'
  '18':
  - type: text
    content: ' That they may know that You, Whose name alone is the Lord, are the Most High over all the earth.'
  '2':
  - type: text
    content: ' For, behold, Your enemies are in tumult, and those who hate You have raised their heads. [Acts 4:25, 26.]'
  '3':
  - type: text
    content: ' They lay crafty schemes against Your people and consult together against Your hidden '
  - type: text
    content: and
  - type: text
    content: ' precious ones.'
  '4':
  - type: text
    content: ' They have said, Come, and let us wipe them out as a nation; let the name of Israel be in remembrance no more.'
  '5':
  - type: text
    content: ' For they have consulted together with one accord '
  - type: text
    content: and
  - type: text
    content: ' one heart; against You they make a covenant–'
  '6':
  - type: text
    content: ' The tents of Edom and the Ishmaelites, of Moab and the Hagrites,'
  '7':
  - type: text
    content: ' Gebal and Ammon and Amalek, the Philistines, with the inhabitants of Tyre.'
  '8':
  - type: text
    content: ' Assyria also has joined with them; they have helped the children of Lot [the Ammonites and the Moabites] '
  - type: text
    content: and
  - type: text
    content: ' have been an arm to them. Selah [pause, and calmly think of that]!'
  '9':
  - type: text
    content: ' Do to them as [You did to] the Midianites, as to Sisera and Jabin at the brook of Kishon, [Judg. 4:12-24.]'
