document_id: PSA.83
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A song. A Psalm of Asaph.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' KEEP NOT silence, O God; hold not Your peace or be still, O God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For, behold, Your enemies are in tumult, and those who hate You have raised their heads. [Acts 4:25, 26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They lay crafty schemes against Your people and consult together against Your hidden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precious ones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They have said, Come, and let us wipe them out as a nation; let the name of Israel be in remembrance no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For they have consulted together with one accord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' one heart; against You they make a covenant–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The tents of Edom and the Ishmaelites, of Moab and the Hagrites,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Gebal and Ammon and Amalek, the Philistines, with the inhabitants of Tyre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Assyria also has joined with them; they have helped the children of Lot [the Ammonites and the Moabites] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have been an arm to them. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do to them as [You did to] the Midianites, as to Sisera and Jabin at the brook of Kishon, [Judg. 4:12-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who perished at Endor, who became like manure for the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Make their nobles like Oreb and Zeeb, yes, all their princes as Zebah and Zalmunna, [Judg. 7:23-25; 8:10-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who say, Let us take possession for ourselves of the pastures of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' O my God, make them like whirling dust, like stubble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' chaff before the wind!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' As fire consumes the forest, and as the flame sets the mountains ablaze,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflict them with Your tempest and terrify them with Your tornado '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hurricane.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Fill their faces with shame, that they may seek, inquire for, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insistently require Your name, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let them be put to shame and dismayed forever; yes, let them be put to shame and perish,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' That they may know that You, Whose name alone is the Lord, are the Most High over all the earth.'
