document_id: EXO.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTERWARD MOSES and Aaron went in and told Pharaoh, Thus says the Lord, the God of Israel, Let My people go, that they may hold a feast to Me in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But Pharaoh said, Who is the Lord, that I should obey His voice to let Israel go? I know not the Lord, neither will I let Israel go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they said, The God of the Hebrews has met with us; let us go, we pray you, three days'' journey into the desert and sacrifice to the Lord our God, lest He fall upon us with pestilence or with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The king of Egypt said to Moses and Aaron, Why do you take the people from their jobs? Get to your burdens!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Pharaoh said, Behold, the people of the land now are many, and you make them rest from their burdens!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The very same day Pharaoh commanded the taskmasters of the people and their officers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You shall no more give the people straw to make brick; let them go and gather straw for themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But the number of the bricks which they made before you shall still require of them; you shall not diminish it in the least. For they are idle; that is why they cry, Let us go and sacrifice to our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Let heavier work be laid upon the men that they may labor at it and pay no attention to lying words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The taskmasters of the people went out, and their officers, and they said to the people, Thus says Pharaoh, I will not give you straw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Go, get straw where you can find it; but your work shall not be diminished in the least.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So the people were scattered through all the land of Egypt to gather the short stubble instead of straw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the taskmasters were urgent, saying, Finish your work, your daily quotas, as when there was straw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Hebrew foremen, whom Pharaoh''s taskmasters had set over them, were beaten and were asked, Why have you not fulfilled all your quota of making bricks yesterday and today, as before?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the Hebrew foremen came to Pharaoh and cried, Why do you deal like this with your servants?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' No straw is given to your servants, yet they say to us, Make bricks! And behold, your servants are beaten, but the fault is in your own people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But [Pharaoh] said, You are idle, lazy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' idle! That is why you say, Let us go and sacrifice to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Get out now and get to work; for no straw shall be given you, yet you shall deliver the full quota of bricks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Hebrew foremen saw that they were in an evil situation when it was said, You shall not diminish in the least your full daily quota of bricks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the foremen met Moses and Aaron, who were standing in the way as they came forth from Pharaoh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the foremen said to them, The Lord look upon you and judge, because you have made us a rotten stench to be detested by Pharaoh and his servants and have put a sword in their hand to slay us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Moses turned again to the Lord and said, O Lord, why have You dealt evil to this people? Why did You ever send me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For since I came to Pharaoh to speak in Your name, he has done evil to this people, neither have You delivered Your people at all.'
