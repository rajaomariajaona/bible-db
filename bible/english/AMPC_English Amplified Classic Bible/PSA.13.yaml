document_id: PSA.13,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' HOW LONG will You forget me, O Lord? Forever? How long will You hide Your face from me?'
  '2':
  - type: text
    content: ' How long must I lay up cares within me and have sorrow in my heart day after day? How long shall my enemy exalt himself over me?'
  '3':
  - type: text
    content: ' Consider and answer me, O Lord my God; lighten the eyes [of my faith to behold Your face in the pitchlike darkness], lest I sleep the sleep of death,'
  '4':
  - type: text
    content: ' Lest my enemy say, I have prevailed over him, '
  - type: text
    content: and
  - type: text
    content: ' those that trouble me rejoice when I am shaken.'
  '5':
  - type: text
    content: ' But I have trusted, leaned on, '
  - type: text
    content: and
  - type: text
    content: ' been confident in Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness; my heart shall rejoice '
  - type: text
    content: and
  - type: text
    content: ' be in high spirits in Your salvation.'
  '6':
  - type: text
    content: ' I will sing to the Lord, because He has dealt bountifully with me.'
