document_id: PSA.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HOW LONG will You forget me, O Lord? Forever? How long will You hide Your face from me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' How long must I lay up cares within me and have sorrow in my heart day after day? How long shall my enemy exalt himself over me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Consider and answer me, O Lord my God; lighten the eyes [of my faith to behold Your face in the pitchlike darkness], lest I sleep the sleep of death,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Lest my enemy say, I have prevailed over him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' those that trouble me rejoice when I am shaken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But I have trusted, leaned on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been confident in Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness; my heart shall rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be in high spirits in Your salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I will sing to the Lord, because He has dealt bountifully with me.'
