document_id: PSA.99,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' reigns, let the peoples tremble [with reverential fear]! He sits [enthroned] above the cherubim, let the earth quake!'
  '2':
  - type: text
    content: ' The Lord is great in Zion, and He is high above all the peoples.'
  '3':
  - type: text
    content: ' Let them confess '
  - type: text
    content: and
  - type: text
    content: ' praise Your great name, awesome '
  - type: text
    content: and
  - type: text
    content: ' reverence inspiring! It is holy, '
  - type: text
    content: and
  - type: text
    content: ' holy is He! [Rev. 15:4.]'
  '4':
  - type: text
    content: ' The strength of the king who loves righteousness '
  - type: text
    content: and
  - type: text
    content: ' equity You establish in uprightness; You execute justice and righteousness in Jacob (Israel).'
  '5':
  - type: text
    content: ' Extol the Lord our God and worship at His footstool! Holy is He!'
  '6':
  - type: text
    content: ' Moses and Aaron were among His priests, and Samuel was among those who called upon His name; they called upon the Lord, and He answered them.'
  '7':
  - type: text
    content: ' He spoke to them in the pillar of cloud; they kept His testimonies and the statutes that He gave them. [Ps. 105:9, 10.]'
  '8':
  - type: text
    content: ' You answered them, O Lord our God; You were a forgiving God to them, although avenging their evildoing '
  - type: text
    content: and
  - type: text
    content: ' wicked practices.'
  '9':
  - type: text
    content: ' Extol the Lord our God and worship at His holy hill, for the Lord our God is holy!'
