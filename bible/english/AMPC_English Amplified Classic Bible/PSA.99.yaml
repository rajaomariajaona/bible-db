document_id: PSA.99
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' reigns, let the peoples tremble [with reverential fear]! He sits [enthroned] above the cherubim, let the earth quake!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord is great in Zion, and He is high above all the peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let them confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise Your great name, awesome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverence inspiring! It is holy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' holy is He! [Rev. 15:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The strength of the king who loves righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' equity You establish in uprightness; You execute justice and righteousness in Jacob (Israel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Extol the Lord our God and worship at His footstool! Holy is He!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Moses and Aaron were among His priests, and Samuel was among those who called upon His name; they called upon the Lord, and He answered them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He spoke to them in the pillar of cloud; they kept His testimonies and the statutes that He gave them. [Ps. 105:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You answered them, O Lord our God; You were a forgiving God to them, although avenging their evildoing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked practices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Extol the Lord our God and worship at His holy hill, for the Lord our God is holy!'
