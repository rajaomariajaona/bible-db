document_id: NUM.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND BALAAM said to Balak, Build me here seven altars, and prepare me here seven oxen and seven rams.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Balak did as Balaam had spoken, and Balak and Balaam offered on each altar a bull and a ram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Balaam said to Balak, Stand by your burnt offering and I will go. Perhaps the Lord will come to meet me; and whatever He shows me I will tell you. And he went to a bare height.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' God met Balaam, who said to Him, I have prepared seven altars, and I have offered on each altar a bull and a ram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Lord put a speech in Balaam''s mouth, and said, Return to Balak and thus shall you speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Balaam returned to Balak, who was standing by his burnt sacrifice, he and all the princes of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Balaam took up his [figurative] speech and said: Balak, the king of Moab, has brought me from Aram, out of the mountains of the east, saying, Come, curse Jacob for me; and come, violently denounce Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' How can I curse those God has not cursed? Or how can I [violently] denounce those the Lord has not denounced?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For from the top of the rocks I see Israel, and from the hills I behold him. Behold, the people [of Israel] shall dwell alone and shall not be reckoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' esteemed among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who can count the dust (the descendants) of Jacob and the number of the fourth part of Israel? Let me die the death of the righteous [those who are upright and in right standing with God], and let my last end be like theirs! [Ps. 37:37; Rev. 14:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Balak said to Balaam, What have you done to me? I brought you to curse my enemies, and here you have [thoroughly] blessed them instead!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Balaam answered, Must I not be obedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speak what the Lord has put in my mouth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Balak said to him, Come with me, I implore you, to another place from which you can see them, though you will see only the nearest and not all of them; and curse them for me from there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So he took Balaam into the field of Zophim to the top of [Mount] Pisgah, and built seven altars, and offered a bull and a ram on each altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Balaam said to Balak, Stand here by your burnt offering while I go to meet the Lord yonder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord met Balaam and put a speech in his mouth, and said, Go again to Balak and speak thus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when he returned to Balak, he was standing beside his burnt offering, and the princes of Moab with him. And Balak said to him, What has the Lord said?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Balaam took up his [figurative] discourse and said: Rise up, Balak, and hear; listen [closely] to me, son of Zippor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' God is not a man, that He should tell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' act a lie, neither the son of man, that He should feel repentance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' compunction [for what He has promised]. Has He said and shall He not do it? Or has He spoken and shall He not make it good?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You see, I have received His command to bless Israel. He has blessed, and I cannot reverse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' qualify it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [God] has not beheld iniquity in Jacob [for he is forgiven], neither has He seen mischief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perverseness in Israel [for the same reason]. The Lord their God is with Israel, and the shout of praise to their King is among the people. [Rom. 4:7, 8; I John 3:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' God brought them forth out of Egypt; they have as it were the strength of a wild ox.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Surely there is no enchantment with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' against Jacob, neither is there any divination with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' against Israel. [In due season and even] now it shall be said of Jacob and of Israel, What has God wrought!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Behold, a people! They rise up as a lioness and lift themselves up as a lion; he shall not lie down until he devours the prey and drinks the blood of the slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Balak said to Balaam, Neither curse them at all nor bless them at all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But Balaam answered Balak, Did I not say to you, All the Lord speaks, that I must do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Balak said to Balaam, Come, I implore you; I will take you to another place. Perhaps it will please God to let you curse them for me from there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So Balak brought Balaam to the top of [Mount] Peor, that overlooks [the wilderness or desert] Jeshimon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Balaam said to Balak, Build me here seven altars, and prepare me here seven bulls and seven rams.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Balak did as Balaam had said, and offered a bull and a ram on each altar.'
