document_id: ACT.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW PETER and John were going up to the temple at the hour of prayer, the ninth hour (three o''clock in the afternoon),'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And they recognized him as the man who usually sat [begging] for alms at the Beautiful Gate of the temple; and they were filled with wonder and amazement (bewilderment, consternation) over what had occurred to him.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now while he [still] firmly clung to Peter and John, all the people in utmost amazement ran together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crowded around them in the covered porch (walk) called Solomon''s.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And Peter, seeing it, answered the people, You men of Israel, why are you so surprised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wondering at this? Why do you keep staring at us, as though by our [own individual] power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' [active] piety we had made this man [able] to walk?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The God of Abraham and of Isaac and of Jacob, the God of our forefathers, has glorified His Servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Son Jesus [doing Him this honor], Whom you indeed delivered up and denied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disowned in the presence of Pilate, when he had determined to let Him go. [Exod. 3:6; Isa. 52:13.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But you denied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disowned the Pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Holy, the Just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Blameless One, and demanded [the pardon of] a murderer to be granted to you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But you killed the very Source (the Author) of life, Whom God raised from the dead. To this we are witnesses.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And His name, through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by faith in His name, has made this man whom you see and recognize well '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong. [Yes] the faith which is through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by Him [Jesus] has given the man this perfect soundness [of body] before all of you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And now, brethren, I know that you acted in ignorance [not aware of what you were doing], as did your rulers also.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Thus has God fulfilled what He foretold by the mouth of all the prophets, that His Christ (the Messiah) should undergo ill treatment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' So repent (change your mind and purpose); turn around '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' return [to God], that your sins may be erased (blotted out, wiped clean), that times of refreshing (of recovering from the effects of heat, of reviving with fresh air) may come from the presence of the Lord;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' [When] a certain man crippled from his birth was being carried along, who was laid each day at that gate of the temple [which is] called Beautiful, so that he might beg for charitable gifts from those who entered the temple.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And that He may send [to you] the Christ (the Messiah), Who before was designated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed for you–even Jesus,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Whom heaven must receive [and retain] until the time for the complete restoration of all that God spoke by the mouth of all His holy prophets for ages past [from the most ancient time in the memory of man].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Thus Moses said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the forefathers,
    - type: text
      text: ' The Lord God will raise up for you a Prophet from among your brethren as [He raised up] me; Him you shall listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand by hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed in all things whatever He tells you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And it shall be that every soul that does not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand by hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed that Prophet shall be utterly exterminated from among the people. [Deut. 18:15-19.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Indeed, all the prophets from Samuel and those who came afterwards, as many as have spoken, also promised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foretold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proclaimed these days.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' You are the descendants (sons) of the prophets and the heirs of the covenant which God made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gave to your forefathers, saying to Abraham, And in your Seed (Heir) shall all the families of the earth be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' benefited. [Gen. 22:18; Gal. 3:16.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' It was to you first that God sent His Servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus,
    - type: text
      text: ' when He raised Him up [provided and gave Him for us], to bless you in turning every one of you from your wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil ways. [Acts 2:24; 3:22.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So when he saw Peter and John about to go into the temple, he asked them to give him a gift.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And Peter directed his gaze intently at him, and so did John, and said, Look at us!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And [the man] paid attention to them, expecting that he was going to get something from them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But Peter said, Silver and gold (money) I do not have; but what I do have, that I give to you: in [the use of] the name of Jesus Christ of Nazareth, walk!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then he took hold of the man''s right hand with a firm grip and raised him up. And at once his feet and ankle bones became strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steady,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And leaping forth he stood and began to walk, and he went into the temple with them, walking and leaping and praising God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And all the people saw him walking about and praising God,'
