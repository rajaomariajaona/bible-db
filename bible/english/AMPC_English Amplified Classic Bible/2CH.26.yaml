document_id: 2CH.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEN ALL the people of Judah took Uzziah, who was sixteen years old, and made him king in place of his father Amaziah.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also he built towers in the wilderness and hewed out many cisterns, for he had much livestock, both in the lowlands and in the tableland. And he had farmers and vinedressers in the hills and in the fertile fields [of Carmel], for he loved farming.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Uzziah had a combat army for waging war by regiments according to the number as recorded by Jeiel the secretary and Maaseiah the officer under the direction of Hananiah, one of the king''s commanders.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The whole number of the heads of fathers'' houses of mighty men of valor was 2,600.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Under their command was an army of 307,500 who could fight with mighty power to help the king against the enemy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Uzziah prepared for all the army shields, spears, helmets, coats of mail, bows, and stones to sling.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In Jerusalem he made machines invented by skillful men to be on the towers and the [corner] bulwarks, with which to shoot arrows and great stones. And his fame spread far, for he was marvelously helped till he was strong.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when [King Uzziah] was strong, he became proud to his destruction; and he trespassed against the Lord his God, for he went into the temple of the Lord to burn incense on the altar of incense.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Azariah the priest went in after him and with him eighty priests of the Lord, men of courage.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They opposed King Uzziah and said to him, It is not for you, Uzziah, to burn incense to the Lord, but for the priests, the sons of Aaron, who are set apart to burn incense. Withdraw from the sanctuary; you have trespassed, and that will not be to your credit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor before the Lord God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Uzziah was enraged, and he had a censer in his hand to burn incense. And while he was enraged with the priests, leprosy broke out on his forehead before the priests in the house of the Lord, beside the incense altar.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He built Eloth and restored it to Judah after Amaziah slept with his fathers.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as Azariah the chief priest and all the priests looked upon him, behold, he was leprous on his forehead! So they forced him out of there; and he also made haste to get out, because the Lord had smitten him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And King Uzziah was a leper to the day of his death, and, being a leper, he dwelt in a separate house, for he was excluded from the Lord''s house. And Jotham his son took charge of the king''s household, ruling the people of the land.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the rest of the acts of Uzziah, from first to last, Isaiah the prophet, the son of Amoz, wrote. [Isa. 1:1.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Uzziah slept with his fathers, and they buried him in the burial field of the kings [outside the royal tombs], for they said, He is a leper. Jotham his son reigned in his stead.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Uzziah was sixteen years old when he began his fifty-two-year reign in Jerusalem. His mother was Jecoliah of Jerusalem.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He did right in the Lord''s sight, to the extent of all that his father Amaziah had done.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He set himself to seek God in the days of Zechariah, who instructed him in the things of God; and as long as he sought (inquired of, yearned for) the Lord, God made him prosper.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He went out against the Philistines and broke down the walls of Gath, of Jabneh, and of Ashdod, and built cities near Ashdod and elsewhere among the Philistines.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God helped him against the Philistines, and the Arabs who dwelt in Gur-baal and the Meunim.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Ammonites paid tribute to Uzziah, and his fame spread abroad even to the border of Egypt, for he became very strong.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also Uzziah built towers in Jerusalem at the Corner Gate, the Valley Gate, and at the angle of the wall, and fortified them.'
