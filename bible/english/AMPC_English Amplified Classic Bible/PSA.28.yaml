document_id: PSA.28,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' UNTO YOU do I cry, O Lord my Rock, be not deaf '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' silent to me, lest, if You be silent to me, I become like those going down to the pit [the grave].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Hear the voice of my supplication as I cry to You for help, as I lift up my hands toward Your innermost sanctuary (the Holy of Holies).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Drag me not away with the wicked, with the workers of iniquity, who speak peace with their neighbors, but malice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mischief are in their hearts.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Repay them according to their work and according to the wickedness of their doings; repay them according to the work of their hands; render to them what they deserve. [II Tim. 4:14; Rev. 18:6.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Because they regard not the works of the Lord nor the operations of His hands, He will break them down and not rebuild them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Blessed be the Lord, because He has heard the voice of my supplications.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Lord is my Strength and my [impenetrable] Shield; my heart trusts in, relies on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently leans on Him, and I am helped; therefore my heart greatly rejoices, and with my song will I praise Him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The Lord is their [unyielding] Strength, and He is the Stronghold of salvation to [me] His anointed.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Save Your people and bless Your heritage; nourish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shepherd them and carry them forever.'
