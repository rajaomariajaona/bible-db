document_id: PSA.28,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' UNTO YOU do I cry, O Lord my Rock, be not deaf '
  - type: text
    content: and
  - type: text
    content: ' silent to me, lest, if You be silent to me, I become like those going down to the pit [the grave].'
  '2':
  - type: text
    content: ' Hear the voice of my supplication as I cry to You for help, as I lift up my hands toward Your innermost sanctuary (the Holy of Holies).'
  '3':
  - type: text
    content: ' Drag me not away with the wicked, with the workers of iniquity, who speak peace with their neighbors, but malice '
  - type: text
    content: and
  - type: text
    content: ' mischief are in their hearts.'
  '4':
  - type: text
    content: ' Repay them according to their work and according to the wickedness of their doings; repay them according to the work of their hands; render to them what they deserve. [II Tim. 4:14; Rev. 18:6.]'
  '5':
  - type: text
    content: ' Because they regard not the works of the Lord nor the operations of His hands, He will break them down and not rebuild them.'
  '6':
  - type: text
    content: ' Blessed be the Lord, because He has heard the voice of my supplications.'
  '7':
  - type: text
    content: ' The Lord is my Strength and my [impenetrable] Shield; my heart trusts in, relies on, '
  - type: text
    content: and
  - type: text
    content: ' confidently leans on Him, and I am helped; therefore my heart greatly rejoices, and with my song will I praise Him.'
  '8':
  - type: text
    content: ' The Lord is their [unyielding] Strength, and He is the Stronghold of salvation to [me] His anointed.'
  '9':
  - type: text
    content: ' Save Your people and bless Your heritage; nourish '
  - type: text
    content: and
  - type: text
    content: ' shepherd them and carry them forever.'
