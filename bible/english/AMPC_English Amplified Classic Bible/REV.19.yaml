document_id: REV.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS I heard what sounded like a mighty shout of a great crowd in heaven, exclaiming, Hallelujah (praise the Lord)! Salvation and glory (splendor and majesty) and power (dominion and authority) [belong] to our God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Because His judgments (His condemnation and punishment, His sentences of doom) are true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sound and just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright. He has judged (convicted, pronounced sentence, and doomed) the great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' notorious harlot (idolatress) who corrupted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demoralized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poisoned the earth with her lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adultery (idolatry). And He has avenged (visited on her the penalty for) the blood of His servants at her hand. [Deut. 32:43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And again they shouted, Hallelujah (praise the Lord)! The smoke of her [burning] shall continue to ascend forever and ever (through the eternities of the eternities). [Isa. 34:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the twenty-four elders [of the heavenly Sanhedrin] and the four living creatures fell prostrate and worshiped [paying divine honors to] God, Who sits on the throne, saying, Amen! Hallelujah (praise the Lord)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then from the throne there came a voice, saying, Praise our God, all you servants of His, you who reverence Him, both small and great! [Ps. 115:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' After that I heard what sounded like the shout of a vast throng, like the boom of many pounding waves, and like the roar of terrific '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty peals of thunder, exclaiming, Hallelujah (praise the Lord)! For now the Lord our God the Omnipotent (the All-Ruler) reigns!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let us rejoice and shout for joy [exulting and triumphant]! Let us celebrate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ascribe to Him glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor, for the marriage of the Lamb [at last] has come, and His bride has prepared herself. [Ps. 118:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' She has been permitted to dress in fine (radiant) linen, dazzling and white–for the fine linen is (signifies, represents) the righteousness (the upright, just, and godly living, deeds, and conduct, and right standing with God) of the saints (God''s holy people).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then [the angel] said to me, Write this down: Blessed (happy, to be envied) are those who are summoned (invited, called) to the marriage supper of the Lamb. And he said to me [further], These are the true words (the genuine and exact declarations) of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then I fell prostrate at his feet to worship (to pay divine honors) to him, but he [restrained me] and said, Refrain! [You must not do that!] I am [only] another servant with you and your brethren who have [accepted and hold] the testimony borne by Jesus. Worship God! For the substance (essence) of the truth revealed by Jesus is the spirit of all prophecy [the vital breath, the inspiration of all inspired preaching and interpretation of the divine will and purpose, including both mine and yours].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' After that I saw heaven opened, and behold, a white horse [appeared]! The One Who was riding it is called Faithful (Trustworthy, Loyal, Incorruptible, Steady) and True, and He passes judgment and wages war in righteousness (holiness, justice, and uprightness). [Ezek. 1:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' His eyes [blaze] like a flame of fire, and on His head are many kingly crowns (diadems); and He has a title (name) inscribed which He alone knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' can understand. [Dan. 10:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He is dressed in a robe dyed by dipping in blood, and the title by which He is called is The Word of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the troops of heaven, clothed in fine linen, dazzling and clean, followed Him on white horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' From His mouth goes forth a sharp sword with which He can smite (afflict, strike) the nations; and He will shepherd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' control them with a staff (scepter, rod) of iron. He will tread the winepress of the fierceness of the wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation of God the All-Ruler (the Almighty, the Omnipotent). [Ps. 2:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And on His garment (robe) and on His thigh He has a name (title) inscribed, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: king of kings and lord of lords.
  - type: text
    text: ' [Deut. 10:17; Dan. 2:47.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then I saw a single angel stationed in the sun''s light, and with a mighty voice he shouted to all the birds that fly across the sky, Come, gather yourselves together for the great supper of God, [Ezek. 39:4, 17-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' That you may feast on the flesh of rulers, the flesh of generals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' captains, the flesh of powerful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty men, the flesh of horses and their riders, and the flesh of all humanity, both free and slave, both small and great!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then I saw the beast and the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders of the earth with their troops mustered to go into battle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make war against Him Who is mounted on the horse and against His troops.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the beast was seized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overpowered, and with him the false prophet who in his presence had worked wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' performed miracles by which he led astray those who had accepted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' permitted to be placed upon them the stamp (mark) of the beast and those who paid homage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave divine honors to his statue. Both of them were hurled alive into the fiery lake that burns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blazes with brimstone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the rest were killed with the sword that issues from the mouth of Him Who is mounted on the horse, and all the birds fed ravenously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glutted themselves with their flesh.'
