document_id: PRO.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MY SON, be attentive to my Wisdom [godly Wisdom learned by actual and costly experience], and incline your ear to my understanding [of what is becoming and prudent for you],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' That you may exercise proper discrimination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discretion and your lips may guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the wise answer [to temptation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the lips of a loose woman drip honey as a honeycomb, and her mouth is smoother than oil; [Ezek. 20:30; Col. 2:8-10; II Pet. 2:14-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But in the end she is bitter as wormwood, sharp as a two-edged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devouring sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Her feet go down to death; her steps take hold of Sheol (Hades, the place of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' She loses sight of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' walks not in the path of life; her ways wind about aimlessly, and you cannot know them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now therefore, my sons, listen to me, and depart not from the words of my mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let your way in life be far from her, and come not near the door of her house [avoid the very scenes of temptation], [Prov. 4:15; Rom. 16:17; I Thess. 5:19-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Lest you give your honor to others and your years to those without mercy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Lest strangers [and false teachings] take their fill of your strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wealth and your labors go to the house of an alien [from God]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And you groan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourn when your end comes, when your flesh and body are consumed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you say, How I hated instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline, and my heart despised reproof!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I have not obeyed the voice of my teachers nor submitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consented to those who instructed me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [The extent and boldness of] my sin involved almost all evil [in the estimation] of the congregation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the community.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Drink waters out of your own cistern [of a pure marriage relationship], and fresh running waters out of your own well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Should your offspring be dispersed abroad as water brooks in the streets?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' [Confine yourself to your own wife] let your children be for you alone, and not the children of strangers with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Let your fountain [of human life] be blessed [with the rewards of fidelity], and rejoice in the wife of your youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Let her be as the loving hind and pleasant doe [tender, gentle, attractive]–let her bosom satisfy you at all times, and always be transported with delight in her love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Why should you, my son, be infatuated with a loose woman, embrace the bosom of an outsider, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go astray?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the ways of man are directly before the eyes of the Lord, and He [Who would have us live soberly, chastely, and godly] carefully weighs all man''s goings. [II Chron. 16:9; Job 31:4; 34:21; Prov. 15:3; Jer. 16:17; Hos. 7:2; Heb. 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' His own iniquities shall ensnare the wicked man, and he shall be held with the cords of his sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He will die for lack of discipline '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction, and in the greatness of his folly he will go astray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be lost.'
