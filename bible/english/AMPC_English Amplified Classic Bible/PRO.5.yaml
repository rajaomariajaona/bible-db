document_id: PRO.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY SON, be attentive to my Wisdom [godly Wisdom learned by actual and costly experience], and incline your ear to my understanding [of what is becoming and prudent for you],'
  '10':
  - type: text
    content: ' Lest strangers [and false teachings] take their fill of your strength '
  - type: text
    content: and
  - type: text
    content: ' wealth and your labors go to the house of an alien [from God]–'
  '11':
  - type: text
    content: ' And you groan '
  - type: text
    content: and
  - type: text
    content: ' mourn when your end comes, when your flesh and body are consumed,'
  '12':
  - type: text
    content: ' And you say, How I hated instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline, and my heart despised reproof!'
  '13':
  - type: text
    content: ' I have not obeyed the voice of my teachers nor submitted '
  - type: text
    content: and
  - type: text
    content: ' consented to those who instructed me.'
  '14':
  - type: text
    content: ' [The extent and boldness of] my sin involved almost all evil [in the estimation] of the congregation '
  - type: text
    content: and
  - type: text
    content: ' the community.'
  '15':
  - type: text
    content: ' Drink waters out of your own cistern [of a pure marriage relationship], and fresh running waters out of your own well.'
  '16':
  - type: text
    content: ' Should your offspring be dispersed abroad as water brooks in the streets?'
  '17':
  - type: text
    content: ' [Confine yourself to your own wife] let your children be for you alone, and not the children of strangers with you.'
  '18':
  - type: text
    content: ' Let your fountain [of human life] be blessed [with the rewards of fidelity], and rejoice in the wife of your youth.'
  '19':
  - type: text
    content: ' Let her be as the loving hind and pleasant doe [tender, gentle, attractive]–let her bosom satisfy you at all times, and always be transported with delight in her love.'
  '2':
  - type: text
    content: ' That you may exercise proper discrimination '
  - type: text
    content: and
  - type: text
    content: ' discretion and your lips may guard '
  - type: text
    content: and
  - type: text
    content: ' keep knowledge '
  - type: text
    content: and
  - type: text
    content: ' the wise answer [to temptation].'
  '20':
  - type: text
    content: ' Why should you, my son, be infatuated with a loose woman, embrace the bosom of an outsider, '
  - type: text
    content: and
  - type: text
    content: ' go astray?'
  '21':
  - type: text
    content: ' For the ways of man are directly before the eyes of the Lord, and He [Who would have us live soberly, chastely, and godly] carefully weighs all man''s goings. [II Chron. 16:9; Job 31:4; 34:21; Prov. 15:3; Jer. 16:17; Hos. 7:2; Heb. 4:13.]'
  '22':
  - type: text
    content: ' His own iniquities shall ensnare the wicked man, and he shall be held with the cords of his sin.'
  '23':
  - type: text
    content: ' He will die for lack of discipline '
  - type: text
    content: and
  - type: text
    content: ' instruction, and in the greatness of his folly he will go astray '
  - type: text
    content: and
  - type: text
    content: ' be lost.'
  '3':
  - type: text
    content: ' For the lips of a loose woman drip honey as a honeycomb, and her mouth is smoother than oil; [Ezek. 20:30; Col. 2:8-10; II Pet. 2:14-17.]'
  '4':
  - type: text
    content: ' But in the end she is bitter as wormwood, sharp as a two-edged '
  - type: text
    content: and
  - type: text
    content: ' devouring sword.'
  '5':
  - type: text
    content: ' Her feet go down to death; her steps take hold of Sheol (Hades, the place of the dead).'
  '6':
  - type: text
    content: ' She loses sight of '
  - type: text
    content: and
  - type: text
    content: ' walks not in the path of life; her ways wind about aimlessly, and you cannot know them.'
  '7':
  - type: text
    content: ' Now therefore, my sons, listen to me, and depart not from the words of my mouth.'
  '8':
  - type: text
    content: ' Let your way in life be far from her, and come not near the door of her house [avoid the very scenes of temptation], [Prov. 4:15; Rom. 16:17; I Thess. 5:19-22.]'
  '9':
  - type: text
    content: ' Lest you give your honor to others and your years to those without mercy,'
