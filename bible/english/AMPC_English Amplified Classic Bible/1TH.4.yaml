document_id: 1TH.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' FURTHERMORE, BRETHREN, we beg and admonish you in [virtue of our union with] the Lord Jesus, that [you follow the instructions which] you learned from us about how you ought to walk so as to please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gratify God, as indeed you are doing, [and] that you do so even more and more abundantly [attaining yet greater perfection in living this life].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And indeed you already are [extending and displaying your love] to all the brethren throughout Macedonia. But we beseech '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' earnestly exhort you, brethren, that you excel [in this matter] more and more,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To make it your ambition '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' definitely endeavor to live quietly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peacefully, to mind your own affairs, and to work with your hands, as we charged you,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So that you may bear yourselves becomingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be correct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honorable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' command the respect of the outside world, being dependent on nobody [self-supporting] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' having need of nothing.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now also we would not have you ignorant, brethren, about those who fall asleep [in death], that you may not grieve [for them] as the rest do who have no hope [beyond the grave].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For since we believe that Jesus died and rose again, even so God will also bring with Him through Jesus those who have fallen asleep [in death].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this we declare to you by the Lord''s [own] word, that we who are alive and remain until the coming of the Lord shall in no way precede [into His presence] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' have any advantage at all over those who have previously fallen asleep [in Him in death].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord Himself will descend from heaven with a loud cry of summons, with the shout of an archangel, and with the blast of the trumpet of God. And those who have departed this life in Christ will rise first.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then we, the living ones who remain [on the earth], shall simultaneously be caught up along with [the resurrected dead] in the clouds to meet the Lord in the air; and so always (through the eternity of the eternities) we shall be with the Lord!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage one another with these words.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For you know what charges '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' precepts we gave you [on the authority and by the inspiration of] the Lord Jesus.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this is the will of God, that you should be consecrated (separated and set apart for pure and holy living): that you should abstain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shrink from all sexual vice,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That each one of you should know how to possess (control, manage) his own body in consecration (purity, separated from things profane) and honor,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Not [to be used] in the passion of lust like the heathen, who are ignorant of the true God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have no knowledge of His will,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That no man transgress and overreach his brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defraud him in this matter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' defraud his brother in business. For the Lord is an avenger in all these things, as we have already warned you solemnly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' told you plainly.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For God has not called us to impurity but to consecration [to dedicate ourselves to the most thorough purity].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore whoever disregards (sets aside and rejects this) disregards not man but God, Whose [very] Spirit [Whom] He gives to you is holy (chaste, pure).'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But concerning brotherly love [for all other Christians], you have no need to have anyone write you, for you yourselves have been [personally] taught by God to love one another.'
