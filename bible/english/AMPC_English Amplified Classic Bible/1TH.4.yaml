document_id: 1TH.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FURTHERMORE, BRETHREN, we beg and admonish you in [virtue of our union with] the Lord Jesus, that [you follow the instructions which] you learned from us about how you ought to walk so as to please '
  - type: text
    content: and
  - type: text
    content: ' gratify God, as indeed you are doing, [and] that you do so even more and more abundantly [attaining yet greater perfection in living this life].'
  '10':
  - type: text
    content: ' And indeed you already are [extending and displaying your love] to all the brethren throughout Macedonia. But we beseech '
  - type: text
    content: and
  - type: text
    content: ' earnestly exhort you, brethren, that you excel [in this matter] more and more,'
  '11':
  - type: text
    content: ' To make it your ambition '
  - type: text
    content: and
  - type: text
    content: ' definitely endeavor to live quietly '
  - type: text
    content: and
  - type: text
    content: ' peacefully, to mind your own affairs, and to work with your hands, as we charged you,'
  '12':
  - type: text
    content: ' So that you may bear yourselves becomingly '
  - type: text
    content: and
  - type: text
    content: ' be correct '
  - type: text
    content: and
  - type: text
    content: ' honorable '
  - type: text
    content: and
  - type: text
    content: ' command the respect of the outside world, being dependent on nobody [self-supporting] '
  - type: text
    content: and
  - type: text
    content: ' having need of nothing.'
  '13':
  - type: text
    content: ' Now also we would not have you ignorant, brethren, about those who fall asleep [in death], that you may not grieve [for them] as the rest do who have no hope [beyond the grave].'
  '14':
  - type: text
    content: ' For since we believe that Jesus died and rose again, even so God will also bring with Him through Jesus those who have fallen asleep [in death].'
  '15':
  - type: text
    content: ' For this we declare to you by the Lord''s [own] word, that we who are alive and remain until the coming of the Lord shall in no way precede [into His presence] '
  - type: text
    content: or
  - type: text
    content: ' have any advantage at all over those who have previously fallen asleep [in Him in death].'
  '16':
  - type: text
    content: ' For the Lord Himself will descend from heaven with a loud cry of summons, with the shout of an archangel, and with the blast of the trumpet of God. And those who have departed this life in Christ will rise first.'
  '17':
  - type: text
    content: ' Then we, the living ones who remain [on the earth], shall simultaneously be caught up along with [the resurrected dead] in the clouds to meet the Lord in the air; and so always (through the eternity of the eternities) we shall be with the Lord!'
  '18':
  - type: text
    content: ' Therefore comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage one another with these words.'
  '2':
  - type: text
    content: ' For you know what charges '
  - type: text
    content: and
  - type: text
    content: ' precepts we gave you [on the authority and by the inspiration of] the Lord Jesus.'
  '3':
  - type: text
    content: ' For this is the will of God, that you should be consecrated (separated and set apart for pure and holy living): that you should abstain '
  - type: text
    content: and
  - type: text
    content: ' shrink from all sexual vice,'
  '4':
  - type: text
    content: ' That each one of you should know how to possess (control, manage) his own body in consecration (purity, separated from things profane) and honor,'
  '5':
  - type: text
    content: ' Not [to be used] in the passion of lust like the heathen, who are ignorant of the true God '
  - type: text
    content: and
  - type: text
    content: ' have no knowledge of His will,'
  '6':
  - type: text
    content: ' That no man transgress and overreach his brother '
  - type: text
    content: and
  - type: text
    content: ' defraud him in this matter '
  - type: text
    content: or
  - type: text
    content: ' defraud his brother in business. For the Lord is an avenger in all these things, as we have already warned you solemnly '
  - type: text
    content: and
  - type: text
    content: ' told you plainly.'
  '7':
  - type: text
    content: ' For God has not called us to impurity but to consecration [to dedicate ourselves to the most thorough purity].'
  '8':
  - type: text
    content: ' Therefore whoever disregards (sets aside and rejects this) disregards not man but God, Whose [very] Spirit [Whom] He gives to you is holy (chaste, pure).'
  '9':
  - type: text
    content: ' But concerning brotherly love [for all other Christians], you have no need to have anyone write you, for you yourselves have been [personally] taught by God to love one another.'
