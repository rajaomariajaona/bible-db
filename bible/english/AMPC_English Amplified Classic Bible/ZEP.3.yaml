document_id: ZEP.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WOE TO her that is rebellious and polluted, the oppressing city [Jerusalem]!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' From beyond the rivers of Cush '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Ethiopia those who pray to Me, the daughter of My dispersed people, will bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' present My offering.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' In that day you [the congregation of Israel] shall not be put to shame for all your deeds by which you have rebelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' transgressed against Me, for then I will take away out of your midst those who exult in your majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pride; and you shall no more be haughty [and carry yourselves arrogantly on or] because of My holy mountain.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For I will leave in the midst of you a people afflicted and poor, and they shall trust, seek refuge, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be confident in the name of the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' What is left of Israel shall not do iniquity or speak lies, neither shall a deceitful tongue be found in their mouth, for they shall feed and lie down and none shall make them afraid.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Sing, O Daughter of Zion; shout, O Israel! Rejoice, be in high spirits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory with all your heart, O Daughter of Jerusalem [in that day].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [For then it will be that] the Lord has taken away the judgments against you; He has cast out your enemy. The King of Israel, even the Lord [Himself], is in the midst of you; [and after He has come to you] you shall not experience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' fear evil any more.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' In that day it shall be said to Jerusalem, Fear not, O Zion. Let not your hands sink down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be slow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listless.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The Lord your God is in the midst of you, a Mighty One, a Savior [Who saves]! He will rejoice over you with joy; He will rest [in silent satisfaction] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in His love He will be silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make no mention [of past sins, or even recall them]; He will exult over you with singing.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I will gather those belonging to you [those Israelites in captivity] who yearn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grieve for the solemn assembly [and the festivals], on whom [their exile and inability to attend services at Jerusalem have brought derision and] the reproach of it is a burden.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Behold, at that time I will deal with all those who afflict you; I will save the limping [ones] and gather the outcasts and will make them a praise and a name in every land of their shame. [Mic. 4:6, 7.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' She did not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed the voice [of God]; she accepted no correction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' instruction; she trusted not in the Lord [nor leaned on or was confident in Him, but was confident in her own wealth]; she drew not near to her God [but to the god of Baal or Molech].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' At that time I will bring you in; yes, at that time I will gather you, for I will make you a name and a praise among all the nations of the earth when I reverse your captivity before your eyes, says the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Her officials in the midst of her are roaring lions; her judges are evening wolves; they gnaw not the bones on the morrow, for nothing is left by morning.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Her prophets are light [lacking truth, gravity, and steadiness] and men of treachery; her priests have profaned the sanctuary; [defrauding God and man by pretending their own word is God''s word] they have done violence to the law. [Jer. 23:11; Ezek. 22:26; Hos. 9:7.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The Lord in the midst of her is [uncompromisingly] righteous; He will not do iniquity. Every morning He brings His justice to light; He fails not, but the unjust [person] knows no shame.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I [the Lord] have cut off nations; their battlements '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corner towers are desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in ruins. I laid their streets waste so that none passes over them; their cities are destroyed so that there is no man, there is no inhabitant.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I said, Only let her [reverently and worshipfully] fear Me, receive correction and instruction, and [Jerusalem''s] dwelling shall not be cut off. However, I have punished her [according to all that I have appointed concerning her in the way of punishment], but all the more they are eager to make all their doings corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' infamous.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore [earnestly] wait for Me, says the Lord, [waiting] for the day when I rise up to the attack [as a witness, accuser, or judge, and a testimony]. For My decision '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' determination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right it is to gather the nations together, to assemble the kingdoms, to pour upon them My indignation, even all [the heat of] My fierce anger; for [in that day] all the earth shall be consumed with the fire of My zeal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jealousy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For then [changing their impure language] I will give to the people a clear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pure speech from pure lips, that they may all call upon the name of the Lord, to serve Him with one unanimous consent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' one united shoulder [bearing the yoke of the Lord].'
