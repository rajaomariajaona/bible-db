document_id: EPH.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEREFORE BE imitators of God [copy Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow His example], as well-beloved children [imitate their father].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And try to learn [in your experience] what is pleasing to the Lord [let your lives be constant proofs of what is most acceptable to Him].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take no part in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have no fellowship with the fruitless deeds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enterprises of darkness, but instead [let your lives be so in contrast as to] expose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reprove '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convict them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For it is a shame even to speak of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mention the things that [such people] practice in secret.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when anything is exposed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproved by the light, it is made visible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear; and where everything is visible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear there is light.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore He says, Awake, O sleeper, and arise from the dead, and Christ shall shine (make day dawn) upon you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give you light. [Isa. 26:19; 60:1, 2.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Look carefully then how you walk! Live purposefully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthily '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately, not as the unwise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' witless, but as wise (sensible, intelligent people),'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Making the very most of the time [buying up each opportunity], because the days are evil.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore do not be vague '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish, but understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firmly grasping what the will of the Lord is.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And do not get drunk with wine, for that is debauchery; but ever be filled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stimulated with the [Holy] Spirit. [Prov. 23:20.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Speak out to one another in psalms and hymns and spiritual songs, offering praise with voices [and instruments] and making melody with all your heart to the Lord,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And walk in love, [esteeming and delighting in one another] as Christ loved us and gave Himself up for us, a slain offering and sacrifice to God [for you, so that it became] a sweet fragrance. [Ezek. 20:41.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At all times and for everything giving thanks in the name of our Lord Jesus Christ to God the Father.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be subject to one another out of reverence for Christ (the Messiah, the Anointed One).'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wives, be subject (be submissive and adapt yourselves) to your own husbands as [a service] to the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the husband is head of the wife as Christ is the Head of the church, Himself the Savior of [His] body.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As the church is subject to Christ, so let wives also be subject in everything to their husbands.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Husbands, love your wives, as Christ loved the church and gave Himself up for her,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So that He might sanctify her, having cleansed her by the washing of water with the Word,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That He might present the church to Himself in glorious splendor, without spot or wrinkle or any such things [that she might be holy and faultless].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even so husbands should love their wives as [being in a sense] their own bodies. He who loves his own wife loves himself.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For no man ever hated his own flesh, but nourishes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carefully protects and cherishes it, as Christ does the church,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But immorality (sexual vice) and all impurity [of lustful, rich, wasteful living] or greediness must not even be named among you, as is fitting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proper among saints (God''s consecrated people).'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because we are members (parts) of His body.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this reason a man shall leave his father and his mother and shall be joined to his wife, and the two shall become one flesh. [Gen. 2:24.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This mystery is very great, but I speak concerning [the relation of] Christ and the church.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, let each man of you [without exception] love his wife as [being in a sense] his very own self; and let the wife see that she respects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverences her husband [that she notices him, regards him, honors him, prefers him, venerates, and esteems him; and that she defers to him, praises him, and loves and admires him exceedingly]. [I Pet. 3:2.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let there be no filthiness (obscenity, indecency) nor foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sinful (silly and corrupt) talk, nor coarse jesting, which are not fitting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' becoming; but instead voice your thankfulness [to God].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For be sure of this: that no person practicing sexual vice or impurity in thought or in life, or one who is covetous [who has lustful desire for the property of others and is greedy for gain]–for he [in effect] is an idolater–has any inheritance in the kingdom of Christ and of God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let no one delude '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceive you with empty excuses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groundless arguments [for these sins], for through these things the wrath of God comes upon the sons of rebellion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disobedience.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So do not associate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be sharers with them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For once you were darkness, but now you are light in the Lord; walk as children of Light [lead the lives of those native-born to the Light].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the fruit (the effect, the product) of the Light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or the Spirit
    - type: text
      text: ' [consists] in every form of kindly goodness, uprightness of heart, and trueness of life.'
