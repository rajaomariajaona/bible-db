document_id: EZK.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MOREOVER, TAKE up a lamentation for the princes of Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And say, What a lioness was your mother [Jerusalem-Judah]! She couched among lions; in the midst of young lions she nourished her cubs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And she [the royal mother-city] brought up one of her cubs [Jehoahaz]; he became a young lion and he learned to catch the prey; he devoured men. [II Kings 23:30, 32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The nations also heard of him; he was taken in their pit, and they brought him with hooks to the land of Egypt. [II Chron. 36:1, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now when she had waited, she saw her hope was lost. Then she took another of her cubs [Jehoiachin] and made him a young lion. [II Kings 23:34; 24:1, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he [Jehoiachin] went up and down among the lions; he became a young lion and learned to catch prey, and he devoured men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he knew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ravaged their strongholds and he laid waste their cities, and the land was appalled and all who were in it by the noise of his roaring.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then the nations set against [the king] on every side from the provinces, and they spread their net over him [Jehoiachin]; he was taken in their pit. [II Kings 24:8-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' With hooks they put him in a cage and brought him to the king of Babylon; they brought him into custody '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put him in strongholds, that his voice should no more be heard upon the mountains of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Your mother [the mother-city Jerusalem] was like a vine [like you, Zedekiah, and in your blood] planted by the waters; it was fruitful and full of branches by reason of abundant water. [II Kings 24:17; Ezek. 17:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And it had strong rods for the scepters of those who bore rule and its height was exalted among the thick branches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' into the clouds, and it was seen in its height among the multitude of its branches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was conspicuous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But the vine was plucked up in God''s wrath [by His agent the Babylonian king] and it was cast down to the ground; the east wind dried up its fruit; its strong rods were broken off and withered; the fire [of God''s judgment] consumed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And now it is transplanted in the wilderness, in a dry and thirsty land [Babylon].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And fire went out of a rod [Zedekiah] of its branches which has consumed the vine''s fruit, so that it has in it no [longer a] strong rod to be a scepter for ruling. This is a lamentation and shall be for a lamentation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a dirge.'
