document_id: EZK.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MOREOVER, TAKE up a lamentation for the princes of Israel,'
  '10':
  - type: text
    content: ' Your mother [the mother-city Jerusalem] was like a vine [like you, Zedekiah, and in your blood] planted by the waters; it was fruitful and full of branches by reason of abundant water. [II Kings 24:17; Ezek. 17:7.]'
  '11':
  - type: text
    content: ' And it had strong rods for the scepters of those who bore rule and its height was exalted among the thick branches '
  - type: text
    content: and
  - type: text
    content: ' into the clouds, and it was seen in its height among the multitude of its branches '
  - type: text
    content: and
  - type: text
    content: ' was conspicuous.'
  '12':
  - type: text
    content: ' But the vine was plucked up in God''s wrath [by His agent the Babylonian king] and it was cast down to the ground; the east wind dried up its fruit; its strong rods were broken off and withered; the fire [of God''s judgment] consumed them.'
  '13':
  - type: text
    content: ' And now it is transplanted in the wilderness, in a dry and thirsty land [Babylon].'
  '14':
  - type: text
    content: ' And fire went out of a rod [Zedekiah] of its branches which has consumed the vine''s fruit, so that it has in it no [longer a] strong rod to be a scepter for ruling. This is a lamentation and shall be for a lamentation '
  - type: text
    content: and
  - type: text
    content: ' a dirge.'
  '2':
  - type: text
    content: ' And say, What a lioness was your mother [Jerusalem-Judah]! She couched among lions; in the midst of young lions she nourished her cubs.'
  '3':
  - type: text
    content: ' And she [the royal mother-city] brought up one of her cubs [Jehoahaz]; he became a young lion and he learned to catch the prey; he devoured men. [II Kings 23:30, 32.]'
  '4':
  - type: text
    content: ' The nations also heard of him; he was taken in their pit, and they brought him with hooks to the land of Egypt. [II Chron. 36:1, 4.]'
  '5':
  - type: text
    content: ' Now when she had waited, she saw her hope was lost. Then she took another of her cubs [Jehoiachin] and made him a young lion. [II Kings 23:34; 24:1, 6.]'
  '6':
  - type: text
    content: ' And he [Jehoiachin] went up and down among the lions; he became a young lion and learned to catch prey, and he devoured men.'
  '7':
  - type: text
    content: ' And he knew '
  - type: text
    content: and
  - type: text
    content: ' ravaged their strongholds and he laid waste their cities, and the land was appalled and all who were in it by the noise of his roaring.'
  '8':
  - type: text
    content: ' Then the nations set against [the king] on every side from the provinces, and they spread their net over him [Jehoiachin]; he was taken in their pit. [II Kings 24:8-15.]'
  '9':
  - type: text
    content: ' With hooks they put him in a cage and brought him to the king of Babylon; they brought him into custody '
  - type: text
    content: and
  - type: text
    content: ' put him in strongholds, that his voice should no more be heard upon the mountains of Israel.'
