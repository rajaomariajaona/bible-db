document_id: PSA.135,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! (Hallelujah!) Praise the name of the Lord; praise Him, O you servants of the Lord!'
  '10':
  - type: text
    content: ' Who smote nations many '
  - type: text
    content: and
  - type: text
    content: ' great and slew mighty kings–'
  '11':
  - type: text
    content: ' Sihon king of the Amorites, Og king of Bashan, and all the kingdoms of Canaan.'
  '12':
  - type: text
    content: ' [The Lord] gave their land as a heritage, a heritage to Israel His people.'
  '13':
  - type: text
    content: ' Your name, O Lord, endures forever, Your fame, O Lord, throughout all ages.'
  '14':
  - type: text
    content: ' For the Lord will judge '
  - type: text
    content: and
  - type: text
    content: ' vindicate His people, and He will delay His judgments [manifesting His righteousness and mercy] '
  - type: text
    content: and
  - type: text
    content: ' take into favor His servants [those who meet His terms of separation unto Him]. [Heb. 10:30.]'
  '15':
  - type: text
    content: ' The idols of the nations are silver and gold, the work of men''s hands.'
  '16':
  - type: text
    content: ' [Idols] have mouths, but they speak not; eyes have they, but they see not;'
  '17':
  - type: text
    content: ' They have ears, but they hear not, nor is there any breath in their mouths.'
  '18':
  - type: text
    content: ' Those who make [idols] are like them; so is everyone who trusts in '
  - type: text
    content: and
  - type: text
    content: ' relies on them. [Ps. 115:4-8.]'
  '19':
  - type: text
    content: ' Bless (affectionately and gratefully praise) the Lord, O house of Israel; bless the Lord, O house of Aaron [God''s ministers].'
  '2':
  - type: text
    content: ' You who stand in the house of the Lord, in the courts of the house of our God,'
  '20':
  - type: text
    content: ' Bless the Lord, O house of Levi [the dedicated tribe]; you who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear the Lord, bless the Lord [affectionately and gratefully praise Him]! [Deut. 6:5; Ps. 31:23.]'
  '21':
  - type: text
    content: ' Blessed out of Zion be the Lord, Who dwells [with us] at Jerusalem! Praise the Lord! (Hallelujah!)'
  '3':
  - type: text
    content: ' Praise the Lord! For the Lord is good; sing praises to His name, for He is gracious '
  - type: text
    content: and
  - type: text
    content: ' lovely!'
  '4':
  - type: text
    content: ' For the Lord has chosen [the descendants of] Jacob for Himself, Israel for His peculiar possession '
  - type: text
    content: and
  - type: text
    content: ' treasure. [Deut. 7:6.]'
  '5':
  - type: text
    content: ' For I know that the Lord is great and that our Lord is above all gods.'
  '6':
  - type: text
    content: ' Whatever the Lord pleases, that has He done in the heavens and on earth, in the seas and all deeps–'
  '7':
  - type: text
    content: ' Who causes the vapors to arise from the ends of the earth, Who makes lightnings for the rain, Who brings the wind out of His storehouses;'
  '8':
  - type: text
    content: ' Who smote the firstborn of Egypt, both of man and beast; [Exod. 12:12, 29; Ps. 78:51; 136:10.]'
  '9':
  - type: text
    content: ' Who sent signs and wonders into the midst of you, O Egypt, upon Pharaoh and all his servants;'
