document_id: PSA.135
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! (Hallelujah!) Praise the name of the Lord; praise Him, O you servants of the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You who stand in the house of the Lord, in the courts of the house of our God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Praise the Lord! For the Lord is good; sing praises to His name, for He is gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovely!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the Lord has chosen [the descendants of] Jacob for Himself, Israel for His peculiar possession '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treasure. [Deut. 7:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For I know that the Lord is great and that our Lord is above all gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Whatever the Lord pleases, that has He done in the heavens and on earth, in the seas and all deeps–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Who causes the vapors to arise from the ends of the earth, Who makes lightnings for the rain, Who brings the wind out of His storehouses;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who smote the firstborn of Egypt, both of man and beast; [Exod. 12:12, 29; Ps. 78:51; 136:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who sent signs and wonders into the midst of you, O Egypt, upon Pharaoh and all his servants;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who smote nations many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great and slew mighty kings–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Sihon king of the Amorites, Og king of Bashan, and all the kingdoms of Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' [The Lord] gave their land as a heritage, a heritage to Israel His people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Your name, O Lord, endures forever, Your fame, O Lord, throughout all ages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For the Lord will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindicate His people, and He will delay His judgments [manifesting His righteousness and mercy] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take into favor His servants [those who meet His terms of separation unto Him]. [Heb. 10:30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The idols of the nations are silver and gold, the work of men''s hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [Idols] have mouths, but they speak not; eyes have they, but they see not;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They have ears, but they hear not, nor is there any breath in their mouths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Those who make [idols] are like them; so is everyone who trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on them. [Ps. 115:4-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Bless (affectionately and gratefully praise) the Lord, O house of Israel; bless the Lord, O house of Aaron [God''s ministers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Bless the Lord, O house of Levi [the dedicated tribe]; you who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear the Lord, bless the Lord [affectionately and gratefully praise Him]! [Deut. 6:5; Ps. 31:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Blessed out of Zion be the Lord, Who dwells [with us] at Jerusalem! Praise the Lord! (Hallelujah!)'
