document_id: EST.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ON THE third day [of the fast] Esther put on her royal robes and stood in the royal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' inner court of the king''s palace opposite his [throne room]. The king was sitting on his throne, facing the main entrance of the palace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when the king saw Esther the queen standing in the court, she obtained favor in his sight, and he held out to [her] the golden scepter that was in his hand. So Esther drew near and touched the tip of the scepter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then the king said to her, What will you have, Queen Esther? What is your request? It shall be given you, even to the half of the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Esther said, If it seems good to the king, let the king and Haman come this day to the dinner that I have prepared for the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the king said, Cause Haman to come quickly, that what Esther has said may be done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So the king and Haman came to the dinner that Esther had prepared.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And during the serving of wine, the king said to Esther, What is your petition? It shall be granted you. And what is your request? Even to the half of the kingdom, it shall be performed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Esther said, My petition and my request is: If I have found favor in the sight of the king and if it pleases the king to grant my petition and to perform my request, let the king and Haman come tomorrow to the dinner that I shall prepare for them; and I will do tomorrow as the king has said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Haman went away that day joyful and elated in heart. But when he saw Mordecai at the king''s gate refusing to stand up or show fear before him, he was filled with wrath against Mordecai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Nevertheless, Haman restrained himself and went home. There he sent and called for his friends and Zeresh his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Haman recounted to them the glory of his riches, the abundance of his [ten] sons, all the things in which the king had promoted him, and how he had advanced him above the princes and servants of the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Haman added, Yes, and today Queen Esther did not let any man come with the king to the dinner she had prepared but myself; and tomorrow also I am invited by her together with the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet all this benefits me nothing as long as I see Mordecai the Jew sitting at the king''s gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then Zeresh his wife and all his friends said to him, Let a gallows be made, fifty cubits [seventy-five feet] high, and in the morning speak to the king, that Mordecai may be hanged on it; then you go in merrily with the king to the dinner. And the thing pleased Haman, and he caused the gallows to be made.'
