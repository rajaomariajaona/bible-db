document_id: EZK.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AGAIN THE word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I clothed you also with embroidered cloth and shod you with [fine seal] leather; and I girded you about with fine linen and covered you with silk.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I decked you also with ornaments and I put bracelets on your wrists and a chain on your neck.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I put a ring on your nostril and earrings in your ears and a beautiful crown upon your head!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus you were decked with gold and silver, and your raiment was of fine linen and silk and embroidered cloth; you ate fine flour and honey and oil. And you were exceedingly beautiful and you prospered into royal estate.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And your renown went forth among the nations for your beauty, for it was perfect through My majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor which I had put upon you, says the Lord God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But you trusted in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on your own beauty and were unfaithful to God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' played the harlot [in idolatry] because of your renown, and you poured out your fornications upon anyone who passed by [as you worshiped the idols of every nation which prevailed over you] and your beauty was his.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you took some of your garments and made for yourself gaily decorated high places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' shrines and played the harlot on them–things which should not come and that which should not take place.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You did also take your fair jewels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beautiful vessels of My gold and My silver which I had given you and made for yourself images of men, and you played the harlot with them;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you took your embroidered garments and covered them and set My oil and My incense before them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My bread also which I gave you–fine flour and oil and honey with which I fed you–you have even set it before the idols for a sweet odor. Thus it was, says the Lord God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, cause Jerusalem to know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize her [idolatrous] abominations [that they] are disgusting, detestable, and shamefully vile.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, you have taken your sons and your daughters whom you have borne to Me, and you have sacrificed them [to your idols] to be destroyed. Were your harlotries too little,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That you have slain My children and delivered them up, in setting them apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' causing them to pass through the fire for [your idols]?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in all your abominations and idolatrous whoredoms you have not [earnestly] remembered the days of your youth when you were naked and bare, rolling about in your natal blood.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after all your wickedness–Woe, woe to you! says the Lord God–'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have built also for yourself a vaulted chamber (brothel) and have made a high place [of idol worship] in every street.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At every crossway you built your high place [for idol worship] and have made your beauty an abomination [abhorrent, loathsome, extremely disgusting, and detestable]; and you have made your body available to every passerby and multiplied your [idolatry and spiritual] harlotry.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have also played the harlot with the Egyptians, your neighbors, [by adopting their idolatries] whose worship is thoroughly sensuous, and you have multiplied your harlotry to provoke Me to anger.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold therefore, I have stretched out My hand against you, diminished your ordinary allowance of food, and delivered you over to the will of those who hate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despise you, the daughters of the Philistines, who turned away in shame from your despicable policy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lewd behavior [for they are faithful to their gods]!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You played the harlot also with the Assyrians because you were unsatiable; yes, you played the harlot with them, and yet you were not satisfied.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, you multiplied your harlotry with the land of trade, with Chaldea, and yet even with this you were not satisfied.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say, Thus says the Lord God to Jerusalem [representing Israel]: Your [spiritual] origin and your birth are thoroughly Canaanitish; your [spiritual] father was an Amorite and your [spiritual] mother a Hittite. [Ezek. 16:45; John 8:44.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spent with longing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lust is your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind, says the Lord God, seeing you do all these things, the work of a bold, domineering harlot,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In that you build your vaulted place (brothel) at the head of every street and make your high place at every crossing. But you were not like a harlot because you scorned pay.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rather, you were as an adulterous wife who receives strangers instead of her husband!'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Men give gifts to all harlots, but you give your gifts to all your lovers and hire them, bribing [the nations to ally themselves with you], that they may come to you on every side for your harlotries (your idolatrous unfaithfulnesses to God).'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you are different [the reverse] from other women in your harlotries, in that nobody follows you to lure you into harlotry and in that you give hire when no hire is given you; and so you are different.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore, O harlot [Israel], hear the word of the Lord!'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord God: Because your brass [coins and gifts] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your filthiness were emptied out and your nakedness uncovered through your harlotries with your lovers, and because of all the [filthy] idols of your abominations, and the blood of your children that you gave to them,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore behold, I will gather all your lovers with whom you have taken pleasure, and all those whom you have loved with all those whom you have hated; I will even gather them [the allies you have courted] against you on every side and will uncover your nakedness to them, that they may see all your nakedness [making you, Israel, an object of loathing and of mockery, a spectacle among the nations].'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I the Lord will judge you as women who break wedlock and shed blood are judged, and I will bring upon you the blood of [your divine Husband''s] wrath and jealousy. [Num. 5:18.]'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will also give you into the hand of those [your enemies], and they shall throw down your vaulted place (brothel) and shall demolish your high places [of idolatry]; they shall strip you of your clothes and shall take your splendid jewels and leave you naked and bare.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as for your birth, on the day you were born your navel cord was not cut, nor were you washed with water to cleanse you, nor rubbed with salt or swaddled with bands at all.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They shall also bring up a company against you, and they shall stone you with stones and hew down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thrust you through with their swords.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall burn your houses with fire and execute judgments upon you before the eyes of many women spectators [the nations]. And I will cause you to cease playing the harlot, and you also shall give hire no more.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So will I make My wrath toward you to rest and My jealousy shall depart from you [My adulterous wife], and I will be quiet and will be no more angry.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because you have not [earnestly] remembered the days of your youth but have enraged Me with all these things, therefore behold, I also will bring your deeds down on your own head, says the Lord God. Did you not commit this lewdness above '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in addition to all your other abominations?'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, everyone who uses proverbs will use this proverb against you: As is the mother, so is her daughter.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You are your [spiritual] mother''s daughter who loathed her husband and her children, and you are the sister of your sisters who loathed their husbands and their children. Your mother was a Hittite and your father an Amorite.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And your elder sister is Samaria, she and her daughters who dwelt in the north '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at your left hand; and your younger sister who dwelt in the south '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at your right hand is Sodom and her daughters.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet you were not satisfied to walk after their ways or to do after their abominations, but very soon you were more corrupt in all your ways than they were [for your sin, as those taught of God, is far blacker than theirs]. [Matt. 11:20-24.]'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As I live, says the Lord God, Sodom your sister has not done, she nor her daughters, as you have done, you and your daughters.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, this was the iniquity of your sister Sodom: pride, overabundance of food, prosperous ease, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' idleness were hers and her daughters''; neither did she strengthen the hand of the poor and needy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No eye pitied you to do any of these things for you, to have compassion on you; but you were cast out in the open field, for your person was abhorrent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathsome on the day that you were born.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they were haughty and committed abominable offenses before Me; therefore I removed them when I saw it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I saw fit. [Gen. 13:13; 18:20; 19:5.]'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Neither has Samaria committed half of your sins, but you have multiplied your [idolatrous] abominations more than they and have seemed to justify your sisters [Samaria and Sodom] in all their wickedness by all the abominable things which you have done–you even make them appear righteous in comparison with you.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take upon you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear your own shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace [in your punishment], you also who called in question '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judged your sisters, for you have virtually absolved them by your sins in which you behaved more abominably than they; they are more right than you. Yes, be ashamed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounded and bear your shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace, you also, for you have seemed to justify your sisters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make them appear righteous.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will restore them again from their captivity, restore the fortunes of Sodom and her daughters and the fortunes of Samaria and her daughters, and I will restore your own fortunes in the midst of them [in the day of the Lord], [Isa. 1:9.]'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That you [Judah], amid your shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace, may be compelled to recognize your wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be thoroughly ashamed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounded at all you have done, becoming [converted and bringing] consolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comfort to [your sisters.]'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And your sisters, Sodom and her daughters shall return to their former estate, and Samaria and her daughters shall return to their former estate; then you and your daughters shall return to your former estate.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For was your sister Sodom not mentioned by you [except] as a byword in the day of your pride,'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Before your own wickedness was uncovered? Now you have become like her, an object of reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a byword for the daughters of Syria '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of Edom and for all who are round about them and for the daughters of the Philistines–those round about who despise you.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You bear the penalty of your lewdness and your [idolatrous] abominations, says the Lord.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, thus says the Lord God: I will even deal with you as you have done, who have despised the oath in breaking the covenant;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when I passed by you and saw you rolling about in your blood, I said to you in your blood, Live! Yes, I said to you still in your natal blood, Live!'
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nevertheless, I will [earnestly] remember My covenant with you in the days of your youth and I will establish with you an everlasting covenant. [Ps. 106:45.]'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then you will [earnestly] remember your ways and be ashamed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounded when you shall receive your sisters, both your elder and your younger; I will give them to you as daughters, but not on account of your covenant [with Me]. [John 10:16.]'
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will establish My covenant with you, and you shall know (understand and realize) that I am the Lord, [Hos. 2:19, 20.]'
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That you may [earnestly] remember and be ashamed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounded and never open your mouth again because of your shame, when I have forgiven you all that you have done, says the Lord God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I caused you [Israel] to multiply as the bud which grows in the field, and you increased and became tall and you came to full maidenhood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beauty; your breasts were formed and your hair had grown, yet you were naked and bare.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now I passed by you again and looked upon you; behold, you were maturing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at the time for love, and I spread My skirt over you and covered your nakedness. Yes, I plighted My troth to you and entered into a covenant with you, says the Lord, and you became Mine.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then I washed you with water; yes, I thoroughly washed away your [clinging] blood from you and I anointed you with oil.'
