document_id: ROM.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHAT SHALL we say [to all this]? Are we to remain in sin in order that God''s grace (favor and mercy) may multiply '
  - type: text
    content: and
  - type: text
    content: ' overflow?'
  '10':
  - type: text
    content: ' For by the death He died, He died to sin [ending His relation to it] once for all; and the life that He lives, He is living to God [in unbroken fellowship with Him].'
  '11':
  - type: text
    content: ' Even so consider yourselves also dead to sin '
  - type: text
    content: and
  - type: text
    content: ' your relation to it broken, but alive to God [living in unbroken fellowship with Him] in Christ Jesus.'
  '12':
  - type: text
    content: ' Let not sin therefore rule as king in your mortal (short-lived, perishable) bodies, to make you yield to its cravings '
  - type: text
    content: and
  - type: text
    content: ' be subject to its lusts '
  - type: text
    content: and
  - type: text
    content: ' evil passions.'
  '13':
  - type: text
    content: ' Do not continue offering or yielding your bodily members [and faculties] to sin as instruments (tools) of wickedness. But offer '
  - type: text
    content: and
  - type: text
    content: ' yield yourselves to God as though you have been raised from the dead to [perpetual] life, and your bodily members [and faculties] to God, presenting them as implements of righteousness.'
  '14':
  - type: text
    content: ' For sin shall not [any longer] exert dominion over you, since now you are not under Law [as slaves], but under grace [as subjects of God''s favor and mercy].'
  '15':
  - type: text
    content: ' What then [are we to conclude]? Shall we sin because we live not under Law but under God''s favor '
  - type: text
    content: and
  - type: text
    content: ' mercy? Certainly not!'
  '16':
  - type: text
    content: ' Do you not know that if you continually surrender yourselves to anyone to do his will, you are the slaves of him whom you obey, whether that be to sin, which leads to death, or to obedience which leads to righteousness (right doing and right standing with God)?'
  '17':
  - type: text
    content: ' But thank God, though you were once slaves of sin, you have become obedient with all your heart to the standard of teaching in which you were instructed '
  - type: text
    content: and
  - type: text
    content: ' to which you were committed.'
  '18':
  - type: text
    content: ' And having been set free from sin, you have become the servants of righteousness (of conformity to the divine will in thought, purpose, and action).'
  '19':
  - type: text
    content: ' I am speaking in familiar human terms because of your natural limitations. For as you yielded your bodily members [and faculties] as servants to impurity and ever increasing lawlessness, so now yield your bodily members [and faculties] once for all as servants to righteousness (right being and doing) [which leads] to sanctification.'
  '2':
  - type: text
    content: ' Certainly not! How can we who died to sin live in it any longer?'
  '20':
  - type: text
    content: ' For when you were slaves of sin, you were free in regard to righteousness.'
  '21':
  - type: text
    content: ' But then what benefit (return) did you get from the things of which you are now ashamed? [None] for the end of those things is death.'
  '22':
  - type: text
    content: ' But now since you have been set free from sin and have become the slaves of God, you have your present reward in holiness and its end is eternal life.'
  '23':
  - type: text
    content: ' For the wages which sin pays is death, but the [bountiful] free gift of God is eternal life through (in union with) Jesus Christ our Lord.'
  '3':
  - type: text
    content: ' Are you ignorant of the fact that all of us who have been baptized into Christ Jesus were baptized into His death?'
  '4':
  - type: text
    content: ' We were buried therefore with Him by the baptism into death, so that just as Christ was raised from the dead by the glorious [power] of the Father, so we too might [habitually] live '
  - type: text
    content: and
  - type: text
    content: ' behave in newness of life.'
  '5':
  - type: text
    content: ' For if we have become one with Him by sharing a death like His, we shall also be [one with Him in sharing] His resurrection [by a new life lived for God].'
  '6':
  - type: text
    content: ' We know that our old (unrenewed) self was nailed to the cross with Him in order that [our] body [which is the instrument] of sin might be made ineffective '
  - type: text
    content: and
  - type: text
    content: ' inactive for evil, that we might no longer be the slaves of sin.'
  '7':
  - type: text
    content: ' For when a man dies, he is freed (loosed, delivered) from [the power of] sin [among men].'
  '8':
  - type: text
    content: ' Now if we have died with Christ, we believe that we shall also live with Him,'
  '9':
  - type: text
    content: ' Because we know that Christ (the Anointed One), being once raised from the dead, will never die again; death no longer has power over Him.'
