document_id: ROM.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHAT SHALL we say [to all this]? Are we to remain in sin in order that God''s grace (favor and mercy) may multiply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflow?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Certainly not! How can we who died to sin live in it any longer?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Are you ignorant of the fact that all of us who have been baptized into Christ Jesus were baptized into His death?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' We were buried therefore with Him by the baptism into death, so that just as Christ was raised from the dead by the glorious [power] of the Father, so we too might [habitually] live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' behave in newness of life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For if we have become one with Him by sharing a death like His, we shall also be [one with Him in sharing] His resurrection [by a new life lived for God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' We know that our old (unrenewed) self was nailed to the cross with Him in order that [our] body [which is the instrument] of sin might be made ineffective '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inactive for evil, that we might no longer be the slaves of sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For when a man dies, he is freed (loosed, delivered) from [the power of] sin [among men].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now if we have died with Christ, we believe that we shall also live with Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Because we know that Christ (the Anointed One), being once raised from the dead, will never die again; death no longer has power over Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For by the death He died, He died to sin [ending His relation to it] once for all; and the life that He lives, He is living to God [in unbroken fellowship with Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Even so consider yourselves also dead to sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your relation to it broken, but alive to God [living in unbroken fellowship with Him] in Christ Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let not sin therefore rule as king in your mortal (short-lived, perishable) bodies, to make you yield to its cravings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be subject to its lusts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil passions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Do not continue offering or yielding your bodily members [and faculties] to sin as instruments (tools) of wickedness. But offer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yield yourselves to God as though you have been raised from the dead to [perpetual] life, and your bodily members [and faculties] to God, presenting them as implements of righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For sin shall not [any longer] exert dominion over you, since now you are not under Law [as slaves], but under grace [as subjects of God''s favor and mercy].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' What then [are we to conclude]? Shall we sin because we live not under Law but under God''s favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy? Certainly not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Do you not know that if you continually surrender yourselves to anyone to do his will, you are the slaves of him whom you obey, whether that be to sin, which leads to death, or to obedience which leads to righteousness (right doing and right standing with God)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But thank God, though you were once slaves of sin, you have become obedient with all your heart to the standard of teaching in which you were instructed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to which you were committed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And having been set free from sin, you have become the servants of righteousness (of conformity to the divine will in thought, purpose, and action).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I am speaking in familiar human terms because of your natural limitations. For as you yielded your bodily members [and faculties] as servants to impurity and ever increasing lawlessness, so now yield your bodily members [and faculties] once for all as servants to righteousness (right being and doing) [which leads] to sanctification.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For when you were slaves of sin, you were free in regard to righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But then what benefit (return) did you get from the things of which you are now ashamed? [None] for the end of those things is death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But now since you have been set free from sin and have become the slaves of God, you have your present reward in holiness and its end is eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For the wages which sin pays is death, but the [bountiful] free gift of God is eternal life through (in union with) Jesus Christ our Lord.'
