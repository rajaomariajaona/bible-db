document_id: 1CO.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND NOW let me remind you [since it seems to have escaped you], brethren, of the Gospel (the glad tidings of salvation) which I proclaimed to you, which you welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepted and upon which your faith rests,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And by which you are saved, if you hold fast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep firmly what I preached to you, unless you believed at first without effect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all for nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For I passed on to you first of all what I also had received, that Christ (the Messiah, the Anointed One) died for our sins in accordance with [what] the Scriptures [foretold], [Isa. 53:5-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' That He was buried, that He arose on the third day as the Scriptures foretold, [Ps. 16:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And [also] that He appeared to Cephas (Peter), then to the Twelve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then later He showed Himself to more than five hundred brethren at one time, the majority of whom are still alive, but some have fallen asleep [in death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Afterward He was seen by James, then by all the apostles (the special messengers),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And last of all He appeared to me also, as to one prematurely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' born dead [no better than an unperfected fetus among living men].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For I am the least [worthy] of the apostles, who am not fit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deserving to be called an apostle, because I once wronged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' molested the church of God [oppressing it with cruelty and violence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But by the grace (the unmerited favor and blessing) of God I am what I am, and His grace toward me was not [found to be] for nothing (fruitless and without effect). In fact, I worked harder than all of them [the apostles], though it was not really I, but the grace (the unmerited favor and blessing) of God which was with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So, whether then it was I or they, this is what we preach and this is what you believed [what you adhered to, trusted in, and relied on].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But now if Christ (the Messiah) is preached as raised from the dead, how is it that some of you say that there is no resurrection of the dead?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But if there is no resurrection of the dead, then Christ has not risen;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if Christ has not risen, then our preaching is in vain [it amounts to nothing] and your faith is devoid of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is fruitless (without effect, empty, imaginary, and unfounded).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' We are even discovered to be misrepresenting God, for we testified of Him that He raised Christ, Whom He did not raise in case it is true that the dead are not raised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For if the dead are not raised, then Christ has not been raised;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And if Christ has not been raised, your faith is mere delusion [futile, fruitless], and you are still in your sins [under the control and penalty of sin];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And further, those who have died in [spiritual fellowship and union with] Christ have perished (are lost)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If we who are [abiding] in Christ have hope only in this life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that is all, then we are of all people most miserable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be pitied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the fact is that Christ (the Messiah) has been raised from the dead, and He became the firstfruits of those who have fallen asleep [in death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For since [it was] through a man that death [came into the world, it is] also through a Man that the resurrection of the dead [has come].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For just as [because of their union of nature] in Adam all people die, so also [by virtue of their union of nature] shall all in Christ be made alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But each in his own rank '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn: Christ (the Messiah) [is] the firstfruits, then those who are Christ''s [own will be resurrected] at His coming.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' After that comes the end (the completion), when He delivers over the kingdom to God the Father after rendering inoperative '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abolishing every [other] rule and every authority and power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For [Christ] must be King '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reign until He has put all [His] enemies under His feet. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The last enemy to be subdued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abolished is death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For He [the Father] has put all things in subjection under His [Christ''s] feet. But when it says, All things are put in subjection [under Him], it is evident that He [Himself] is excepted Who does the subjecting of all things to Him. [Ps. 8:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' However, when everything is subjected to Him, then the Son Himself will also subject Himself to [the Father] Who put all things under Him, so that God may be all in all [be everything to everyone, supreme, the indwelling and controlling factor of life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Otherwise, what do people mean by being [themselves] baptized in behalf of the dead? If the dead are not raised at all, why are people baptized for them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' [For that matter], why do I live [dangerously as I do, running such risks that I am] in peril every hour?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' [I assure you] by the pride which I have in you in [your fellowship and union with] Christ Jesus our Lord, that I die daily [I face death every day and die to self].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' What do I gain if, merely from the human point of view, I fought with [wild] beasts at Ephesus? If the dead are not raised [at all], let us eat and drink, for tomorrow we will be dead. [Isa. 22:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Do not be so deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misled! Evil companionships (communion, associations) corrupt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deprave good manners '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' morals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' character.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Awake [from your drunken stupor and return] to sober sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your right minds, and sin no more. For some of you have not the knowledge of God [you are utterly and willfully and disgracefully ignorant, and continue to be so, lacking the sense of God''s presence and all true knowledge of Him]. I say this to your shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But someone will say, How can the dead be raised? With what [kind of] body will they come forth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' You foolish man! Every time you plant seed, you sow something that does not come to life [germinating, springing up, and growing] unless it dies first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Nor is the seed you sow then the body which it is going to have [later], but it is a naked kernel, perhaps of wheat or some of the rest of the grains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But God gives to it the body that He plans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sees fit, and to each kind of seed a body of its own. [Gen. 1:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' For all flesh is not the same, but there is one kind for humans, another for beasts, another for birds, and another for fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' There are heavenly bodies (sun, moon, and stars) and there are earthly bodies (men, animals, and plants), but the beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of the heavenly bodies is of one kind, while the beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of earthly bodies is a different kind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The sun is glorious in one way, the moon is glorious in another way, and the stars are glorious in their own [distinctive] way; for one star differs from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surpasses another in its beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' So it is with the resurrection of the dead. [The body] that is sown is perishable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decays, but [the body] that is resurrected is imperishable (immune to decay, immortal). [Dan. 12:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' It is sown in dishonor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliation; it is raised in honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory. It is sown in infirmity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weakness; it is resurrected in strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endued with power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' It is sown a natural (physical) body; it is raised a supernatural (a spiritual) body. [As surely as] there is a physical body, there is also a spiritual body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Thus it is written, The first man Adam became a living being (an individual personality); the last Adam (Christ) became a life-giving Spirit [restoring the dead to life]. [Gen. 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' But it is not the spiritual life which came first, but the physical and then the spiritual.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' The first man [was] from out of earth, made of dust (earthly-minded); the second Man [is] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Lord
  - type: text
    text: ' from out of heaven. [Gen. 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Now those who are made of the dust are like him who was first made of the dust (earthly-minded); and as is [the Man] from heaven, so also [are those] who are of heaven (heavenly-minded).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And just as we have borne the image [of the man] of dust, so shall we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and so
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: let us
  - type: text
    text: ' also bear the image [of the Man] of heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' But I tell you this, brethren, flesh and blood cannot [become partakers of eternal salvation and] inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' share in the kingdom of God; nor does the perishable (that which is decaying) inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' share in the imperishable (the immortal).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Take notice! I tell you a mystery (a secret truth, an event decreed by the hidden purpose or counsel of God). We shall not all fall asleep [in death], but we shall all be changed (transformed)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' In a moment, in the twinkling of an eye, at the [sound of the] last trumpet call. For a trumpet will sound, and the dead [in Christ] will be raised imperishable (free and immune from decay), and we shall be changed (transformed).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' For this perishable [part of us] must put on the imperishable [nature], and this mortal [part of us, this nature that is capable of dying] must put on immortality (freedom from death).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And when this perishable puts on the imperishable and this that was capable of dying puts on freedom from death, then shall be fulfilled the Scripture that says, Death is swallowed up (utterly vanquished forever) in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unto victory. [Isa. 25:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' O death, where is your victory? O death, where is your sting? [Hos. 13:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' Now sin is the sting of death, and sin exercises its power [upon the soul] through [the abuse of] the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' But thanks be to God, Who gives us the victory [making us conquerors] through our Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' Therefore, my beloved brethren, be firm (steadfast), immovable, always abounding in the work of the Lord [always being superior, excelling, doing more than enough in the service of the Lord], knowing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being continually aware that your labor in the Lord is not futile [it is never wasted or to no purpose].'
