document_id: 1CO.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND NOW let me remind you [since it seems to have escaped you], brethren, of the Gospel (the glad tidings of salvation) which I proclaimed to you, which you welcomed '
  - type: text
    content: and
  - type: text
    content: ' accepted and upon which your faith rests,'
  '10':
  - type: text
    content: ' But by the grace (the unmerited favor and blessing) of God I am what I am, and His grace toward me was not [found to be] for nothing (fruitless and without effect). In fact, I worked harder than all of them [the apostles], though it was not really I, but the grace (the unmerited favor and blessing) of God which was with me.'
  '11':
  - type: text
    content: ' So, whether then it was I or they, this is what we preach and this is what you believed [what you adhered to, trusted in, and relied on].'
  '12':
  - type: text
    content: ' But now if Christ (the Messiah) is preached as raised from the dead, how is it that some of you say that there is no resurrection of the dead?'
  '13':
  - type: text
    content: ' But if there is no resurrection of the dead, then Christ has not risen;'
  '14':
  - type: text
    content: ' And if Christ has not risen, then our preaching is in vain [it amounts to nothing] and your faith is devoid of truth '
  - type: text
    content: and
  - type: text
    content: ' is fruitless (without effect, empty, imaginary, and unfounded).'
  '15':
  - type: text
    content: ' We are even discovered to be misrepresenting God, for we testified of Him that He raised Christ, Whom He did not raise in case it is true that the dead are not raised.'
  '16':
  - type: text
    content: ' For if the dead are not raised, then Christ has not been raised;'
  '17':
  - type: text
    content: ' And if Christ has not been raised, your faith is mere delusion [futile, fruitless], and you are still in your sins [under the control and penalty of sin];'
  '18':
  - type: text
    content: ' And further, those who have died in [spiritual fellowship and union with] Christ have perished (are lost)!'
  '19':
  - type: text
    content: ' If we who are [abiding] in Christ have hope only in this life '
  - type: text
    content: and
  - type: text
    content: ' that is all, then we are of all people most miserable '
  - type: text
    content: and
  - type: text
    content: ' to be pitied.'
  '2':
  - type: text
    content: ' And by which you are saved, if you hold fast '
  - type: text
    content: and
  - type: text
    content: ' keep firmly what I preached to you, unless you believed at first without effect '
  - type: text
    content: and
  - type: text
    content: ' all for nothing.'
  '20':
  - type: text
    content: ' But the fact is that Christ (the Messiah) has been raised from the dead, and He became the firstfruits of those who have fallen asleep [in death].'
  '21':
  - type: text
    content: ' For since [it was] through a man that death [came into the world, it is] also through a Man that the resurrection of the dead [has come].'
  '22':
  - type: text
    content: ' For just as [because of their union of nature] in Adam all people die, so also [by virtue of their union of nature] shall all in Christ be made alive.'
  '23':
  - type: text
    content: ' But each in his own rank '
  - type: text
    content: and
  - type: text
    content: ' turn: Christ (the Messiah) [is] the firstfruits, then those who are Christ''s [own will be resurrected] at His coming.'
  '24':
  - type: text
    content: ' After that comes the end (the completion), when He delivers over the kingdom to God the Father after rendering inoperative '
  - type: text
    content: and
  - type: text
    content: ' abolishing every [other] rule and every authority and power.'
  '25':
  - type: text
    content: ' For [Christ] must be King '
  - type: text
    content: and
  - type: text
    content: ' reign until He has put all [His] enemies under His feet. [Ps. 110:1.]'
  '26':
  - type: text
    content: ' The last enemy to be subdued '
  - type: text
    content: and
  - type: text
    content: ' abolished is death.'
  '27':
  - type: text
    content: ' For He [the Father] has put all things in subjection under His [Christ''s] feet. But when it says, All things are put in subjection [under Him], it is evident that He [Himself] is excepted Who does the subjecting of all things to Him. [Ps. 8:6.]'
  '28':
  - type: text
    content: ' However, when everything is subjected to Him, then the Son Himself will also subject Himself to [the Father] Who put all things under Him, so that God may be all in all [be everything to everyone, supreme, the indwelling and controlling factor of life].'
  '29':
  - type: text
    content: ' Otherwise, what do people mean by being [themselves] baptized in behalf of the dead? If the dead are not raised at all, why are people baptized for them?'
  '3':
  - type: text
    content: ' For I passed on to you first of all what I also had received, that Christ (the Messiah, the Anointed One) died for our sins in accordance with [what] the Scriptures [foretold], [Isa. 53:5-12.]'
  '30':
  - type: text
    content: ' [For that matter], why do I live [dangerously as I do, running such risks that I am] in peril every hour?'
  '31':
  - type: text
    content: ' [I assure you] by the pride which I have in you in [your fellowship and union with] Christ Jesus our Lord, that I die daily [I face death every day and die to self].'
  '32':
  - type: text
    content: ' What do I gain if, merely from the human point of view, I fought with [wild] beasts at Ephesus? If the dead are not raised [at all], let us eat and drink, for tomorrow we will be dead. [Isa. 22:13.]'
  '33':
  - type: text
    content: ' Do not be so deceived '
  - type: text
    content: and
  - type: text
    content: ' misled! Evil companionships (communion, associations) corrupt '
  - type: text
    content: and
  - type: text
    content: ' deprave good manners '
  - type: text
    content: and
  - type: text
    content: ' morals '
  - type: text
    content: and
  - type: text
    content: ' character.'
  '34':
  - type: text
    content: ' Awake [from your drunken stupor and return] to sober sense '
  - type: text
    content: and
  - type: text
    content: ' your right minds, and sin no more. For some of you have not the knowledge of God [you are utterly and willfully and disgracefully ignorant, and continue to be so, lacking the sense of God''s presence and all true knowledge of Him]. I say this to your shame.'
  '35':
  - type: text
    content: ' But someone will say, How can the dead be raised? With what [kind of] body will they come forth?'
  '36':
  - type: text
    content: ' You foolish man! Every time you plant seed, you sow something that does not come to life [germinating, springing up, and growing] unless it dies first.'
  '37':
  - type: text
    content: ' Nor is the seed you sow then the body which it is going to have [later], but it is a naked kernel, perhaps of wheat or some of the rest of the grains.'
  '38':
  - type: text
    content: ' But God gives to it the body that He plans '
  - type: text
    content: and
  - type: text
    content: ' sees fit, and to each kind of seed a body of its own. [Gen. 1:11.]'
  '39':
  - type: text
    content: ' For all flesh is not the same, but there is one kind for humans, another for beasts, another for birds, and another for fish.'
  '4':
  - type: text
    content: ' That He was buried, that He arose on the third day as the Scriptures foretold, [Ps. 16:9, 10.]'
  '40':
  - type: text
    content: ' There are heavenly bodies (sun, moon, and stars) and there are earthly bodies (men, animals, and plants), but the beauty '
  - type: text
    content: and
  - type: text
    content: ' glory of the heavenly bodies is of one kind, while the beauty '
  - type: text
    content: and
  - type: text
    content: ' glory of earthly bodies is a different kind.'
  '41':
  - type: text
    content: ' The sun is glorious in one way, the moon is glorious in another way, and the stars are glorious in their own [distinctive] way; for one star differs from '
  - type: text
    content: and
  - type: text
    content: ' surpasses another in its beauty '
  - type: text
    content: and
  - type: text
    content: ' brilliance.'
  '42':
  - type: text
    content: ' So it is with the resurrection of the dead. [The body] that is sown is perishable '
  - type: text
    content: and
  - type: text
    content: ' decays, but [the body] that is resurrected is imperishable (immune to decay, immortal). [Dan. 12:3.]'
  '43':
  - type: text
    content: ' It is sown in dishonor '
  - type: text
    content: and
  - type: text
    content: ' humiliation; it is raised in honor '
  - type: text
    content: and
  - type: text
    content: ' glory. It is sown in infirmity '
  - type: text
    content: and
  - type: text
    content: ' weakness; it is resurrected in strength '
  - type: text
    content: and
  - type: text
    content: ' endued with power.'
  '44':
  - type: text
    content: ' It is sown a natural (physical) body; it is raised a supernatural (a spiritual) body. [As surely as] there is a physical body, there is also a spiritual body.'
  '45':
  - type: text
    content: ' Thus it is written, The first man Adam became a living being (an individual personality); the last Adam (Christ) became a life-giving Spirit [restoring the dead to life]. [Gen. 2:7.]'
  '46':
  - type: text
    content: ' But it is not the spiritual life which came first, but the physical and then the spiritual.'
  '47':
  - type: text
    content: ' The first man [was] from out of earth, made of dust (earthly-minded); the second Man [is] '
  - type: text
    content: the Lord
  - type: text
    content: ' from out of heaven. [Gen. 2:7.]'
  '48':
  - type: text
    content: ' Now those who are made of the dust are like him who was first made of the dust (earthly-minded); and as is [the Man] from heaven, so also [are those] who are of heaven (heavenly-minded).'
  '49':
  - type: text
    content: ' And just as we have borne the image [of the man] of dust, so shall we '
  - type: text
    content: and so
  - type: text
    content: ' '
  - type: text
    content: let us
  - type: text
    content: ' also bear the image [of the Man] of heaven.'
  '5':
  - type: text
    content: ' And [also] that He appeared to Cephas (Peter), then to the Twelve.'
  '50':
  - type: text
    content: ' But I tell you this, brethren, flesh and blood cannot [become partakers of eternal salvation and] inherit '
  - type: text
    content: or
  - type: text
    content: ' share in the kingdom of God; nor does the perishable (that which is decaying) inherit '
  - type: text
    content: or
  - type: text
    content: ' share in the imperishable (the immortal).'
  '51':
  - type: text
    content: ' Take notice! I tell you a mystery (a secret truth, an event decreed by the hidden purpose or counsel of God). We shall not all fall asleep [in death], but we shall all be changed (transformed)'
  '52':
  - type: text
    content: ' In a moment, in the twinkling of an eye, at the [sound of the] last trumpet call. For a trumpet will sound, and the dead [in Christ] will be raised imperishable (free and immune from decay), and we shall be changed (transformed).'
  '53':
  - type: text
    content: ' For this perishable [part of us] must put on the imperishable [nature], and this mortal [part of us, this nature that is capable of dying] must put on immortality (freedom from death).'
  '54':
  - type: text
    content: ' And when this perishable puts on the imperishable and this that was capable of dying puts on freedom from death, then shall be fulfilled the Scripture that says, Death is swallowed up (utterly vanquished forever) in '
  - type: text
    content: and
  - type: text
    content: ' unto victory. [Isa. 25:8.]'
  '55':
  - type: text
    content: ' O death, where is your victory? O death, where is your sting? [Hos. 13:14.]'
  '56':
  - type: text
    content: ' Now sin is the sting of death, and sin exercises its power [upon the soul] through [the abuse of] the Law.'
  '57':
  - type: text
    content: ' But thanks be to God, Who gives us the victory [making us conquerors] through our Lord Jesus Christ.'
  '58':
  - type: text
    content: ' Therefore, my beloved brethren, be firm (steadfast), immovable, always abounding in the work of the Lord [always being superior, excelling, doing more than enough in the service of the Lord], knowing '
  - type: text
    content: and
  - type: text
    content: ' being continually aware that your labor in the Lord is not futile [it is never wasted or to no purpose].'
  '6':
  - type: text
    content: ' Then later He showed Himself to more than five hundred brethren at one time, the majority of whom are still alive, but some have fallen asleep [in death].'
  '7':
  - type: text
    content: ' Afterward He was seen by James, then by all the apostles (the special messengers),'
  '8':
  - type: text
    content: ' And last of all He appeared to me also, as to one prematurely '
  - type: text
    content: and
  - type: text
    content: ' born dead [no better than an unperfected fetus among living men].'
  '9':
  - type: text
    content: ' For I am the least [worthy] of the apostles, who am not fit '
  - type: text
    content: or
  - type: text
    content: ' deserving to be called an apostle, because I once wronged '
  - type: text
    content: and
  - type: text
    content: ' pursued '
  - type: text
    content: and
  - type: text
    content: ' molested the church of God [oppressing it with cruelty and violence].'
