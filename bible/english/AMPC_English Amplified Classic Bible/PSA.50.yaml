document_id: PSA.50
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of Asaph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE MIGHTY One, God, the Lord, speaks and calls the earth from the rising of the sun to its setting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Out of Zion, the perfection of beauty, God shines forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Our God comes and does not keep silence; a fire devours before Him, and round about Him a mighty tempest rages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He calls to the heavens above and to the earth, that He may judge His people:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Gather together to Me My saints [those who have found grace in My sight], those who have made a covenant with Me by sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the heavens declare His righteousness (rightness and justice), for God, He is judge. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Hear, O My people, and I will speak; O Israel, I will testify to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' against you: I am God, your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I do not reprove you for your sacrifices; your burnt offerings are continually before Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will accept no bull from your house nor he-goat out of your folds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For every beast of the forest is Mine, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the cattle upon a thousand hills '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' upon the mountains where thousands are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am acquainted with all the birds of the mountains, and the wild animals of the field are Mine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are with Me, in My mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If I were hungry, I would not tell you, for the world and its fullness are Mine. [I Cor. 10:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Shall I eat the flesh of bulls or drink the blood of goats?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Offer to God the sacrifice of thanksgiving, and pay your vows to the Most High,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And call on Me in the day of trouble; I will deliver you, and you shall honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But to the wicked, God says: What right have you to recite My statutes or take My covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pledge on your lips,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Seeing that you hate instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction and cast My words behind you [discarding them]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When you see a thief, you associate with him, and you have taken part with adulterers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You give your mouth to evil, and your tongue frames deceit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You sit and speak against your brother; you slander your own mother''s son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' These things you have done and I kept silent; you thought I was once entirely like you. But [now] I will reprove you and put [the charge] in order before your eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Now consider this, you who forget God, lest I tear you in pieces, and there be none to deliver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He who brings an offering of praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanksgiving honors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorifies Me; and he who orders his way aright [who prepares the way that I may show him], to him I will demonstrate the salvation of God.'
