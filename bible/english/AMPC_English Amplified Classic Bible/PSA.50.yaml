document_id: PSA.50,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of Asaph
  - type: text
    content: ' THE MIGHTY One, God, the Lord, speaks and calls the earth from the rising of the sun to its setting.'
  '10':
  - type: text
    content: ' For every beast of the forest is Mine, '
  - type: text
    content: and
  - type: text
    content: ' the cattle upon a thousand hills '
  - type: text
    content: or
  - type: text
    content: ' upon the mountains where thousands are.'
  '11':
  - type: text
    content: ' I know '
  - type: text
    content: and
  - type: text
    content: ' am acquainted with all the birds of the mountains, and the wild animals of the field are Mine '
  - type: text
    content: and
  - type: text
    content: ' are with Me, in My mind.'
  '12':
  - type: text
    content: ' If I were hungry, I would not tell you, for the world and its fullness are Mine. [I Cor. 10:26.]'
  '13':
  - type: text
    content: ' Shall I eat the flesh of bulls or drink the blood of goats?'
  '14':
  - type: text
    content: ' Offer to God the sacrifice of thanksgiving, and pay your vows to the Most High,'
  '15':
  - type: text
    content: ' And call on Me in the day of trouble; I will deliver you, and you shall honor '
  - type: text
    content: and
  - type: text
    content: ' glorify Me.'
  '16':
  - type: text
    content: ' But to the wicked, God says: What right have you to recite My statutes or take My covenant '
  - type: text
    content: or
  - type: text
    content: ' pledge on your lips,'
  '17':
  - type: text
    content: ' Seeing that you hate instruction '
  - type: text
    content: and
  - type: text
    content: ' correction and cast My words behind you [discarding them]?'
  '18':
  - type: text
    content: ' When you see a thief, you associate with him, and you have taken part with adulterers.'
  '19':
  - type: text
    content: ' You give your mouth to evil, and your tongue frames deceit.'
  '2':
  - type: text
    content: ' Out of Zion, the perfection of beauty, God shines forth.'
  '20':
  - type: text
    content: ' You sit and speak against your brother; you slander your own mother''s son.'
  '21':
  - type: text
    content: ' These things you have done and I kept silent; you thought I was once entirely like you. But [now] I will reprove you and put [the charge] in order before your eyes.'
  '22':
  - type: text
    content: ' Now consider this, you who forget God, lest I tear you in pieces, and there be none to deliver.'
  '23':
  - type: text
    content: ' He who brings an offering of praise '
  - type: text
    content: and
  - type: text
    content: ' thanksgiving honors '
  - type: text
    content: and
  - type: text
    content: ' glorifies Me; and he who orders his way aright [who prepares the way that I may show him], to him I will demonstrate the salvation of God.'
  '3':
  - type: text
    content: ' Our God comes and does not keep silence; a fire devours before Him, and round about Him a mighty tempest rages.'
  '4':
  - type: text
    content: ' He calls to the heavens above and to the earth, that He may judge His people:'
  '5':
  - type: text
    content: ' Gather together to Me My saints [those who have found grace in My sight], those who have made a covenant with Me by sacrifice.'
  '6':
  - type: text
    content: ' And the heavens declare His righteousness (rightness and justice), for God, He is judge. Selah [pause, and calmly think of that]!'
  '7':
  - type: text
    content: ' Hear, O My people, and I will speak; O Israel, I will testify to you '
  - type: text
    content: and
  - type: text
    content: ' against you: I am God, your God.'
  '8':
  - type: text
    content: ' I do not reprove you for your sacrifices; your burnt offerings are continually before Me.'
  '9':
  - type: text
    content: ' I will accept no bull from your house nor he-goat out of your folds.'
