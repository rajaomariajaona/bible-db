document_id: 1CO.14,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' EAGERLY PURSUE '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek to acquire [this] love [make it your aim, your great quest]; and earnestly desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cultivate the spiritual endowments (gifts), especially that you may prophesy (interpret the divine will and purpose in inspired preaching and teaching).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' There are, I suppose, all these many [to us unknown] tongues in the world [somewhere], and none is destitute of [its own power of] expression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' meaning.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But if I do not know the force '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' significance of the speech (language), I shall seem to be a foreigner to the one who speaks [to me], and the speaker who addresses [me] will seem a foreigner to me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So it is with yourselves; since you are so eager '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ambitious to possess spiritual endowments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' manifestations of the [Holy] Spirit, [concentrate on] striving to excel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to abound [in them] in ways that will build up the church.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Therefore, the person who speaks in an [unknown] tongue should pray [for the power] to interpret '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain what he says.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For if I pray in an [unknown] tongue, my spirit [by the Holy Spirit within me] prays, but my mind is unproductive [it bears no fruit and helps nobody].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then what am I to do? I will pray with my spirit [by the Holy Spirit that is within me], but I will also pray [intelligently] with my mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding; I will sing with my spirit [by the Holy Spirit that is within me], but I will sing [intelligently] with my mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding also.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Otherwise, if you bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' render thanks with [your] spirit [thoroughly aroused by the Holy Spirit], how can anyone in the position of an outsider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' he who is not gifted with [interpreting of unknown] tongues, say the Amen to your thanksgiving, since he does not know what you are saying? [I Chron. 16:36; Ps. 106:48.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' To be sure, you may give thanks well (nobly), but the bystander is not edified [it does him no good].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I thank God that I speak in [strange] tongues (languages) more than any of you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' all of you put together;'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Nevertheless, in public worship, I would rather say five words with my understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intelligently in order to instruct others, than ten thousand words in a [strange] tongue (language).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For one who speaks in an [unknown] tongue speaks not to men but to God, for no one understands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' catches his meaning, because in the [Holy] Spirit he utters secret truths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hidden things [not obvious to the understanding].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Brethren, do not be children [immature] in your thinking; continue to be babes in [matters of] evil, but in your minds be mature [men].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' It is written in the Law, By men of strange languages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by the lips of foreigners will I speak to this people, and not even then will they listen to Me, says the Lord. [Isa. 28:11, 12.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Thus [unknown] tongues are meant for a [supernatural] sign, not for believers but for unbelievers [on the point of believing], while prophecy (inspired preaching and teaching, interpreting the divine will and purpose) is not for unbelievers [on the point of believing] but for believers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Therefore, if the whole church assembles and all of you speak in [unknown] tongues, and the ungifted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uninitiated or unbelievers come in, will they not say that you are demented?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' But if all prophesy [giving inspired testimony and interpreting the divine will and purpose] and an unbeliever or untaught outsider comes in, he is told of his sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convinced by all, and his defects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' needs are examined (estimated, determined) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he is called to account by all,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The secrets of his heart are laid bare; and so, falling on [his] face, he will worship God, declaring that God is among you in very truth.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' What then, brethren, is [the right course]? When you meet together, each one has a hymn, a teaching, a disclosure of special knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' information, an utterance in a [strange] tongue, or an interpretation of it. [But] let everything be constructive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' edifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for the good of all.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' If some speak in a [strange] tongue, let the number be limited to two or at the most three, and each one [taking his] turn, and let one interpret '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain [what is said].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' But if there is no one to do the interpreting, let each of them keep still in church and talk to himself and to God.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' So let two or three prophets speak [those inspired to preach or teach], while the rest pay attention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weigh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discern what is said.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But [on the other hand], the one who prophesies [who interprets the divine will and purpose in inspired preaching and teaching] speaks to men for their upbuilding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' constructive spiritual progress and encouragement and consolation.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But if an inspired revelation comes to another who is sitting by, then let the first one be silent.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For in this way you can give testimony [prophesying and thus interpreting the divine will and purpose] one by one, so that all may be instructed and all may be stimulated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraged;'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For the spirits of the prophets (the speakers in tongues) are under the speaker''s control [and subject to being silenced as may be necessary],'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' For He [Who is the source of their prophesying] is not a God of confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disorder but of peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' order. As [is the practice] in all the churches of the saints (God''s people),'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' The women should keep quiet in the churches, for they are not authorized to speak, but should take a secondary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' subordinate place, just as the Law also says. [Gen. 3:16.]'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' But if there is anything they want to learn, they should ask their own husbands at home, for it is disgraceful for a woman to talk in church [for her to usurp and exercise authority over men in the church].'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' What! Did the word of the Lord originate with you [Corinthians], or has it reached only you?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' If anyone thinks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' claims that he is a prophet [filled with and governed by the Holy Spirit of God and inspired to interpret the divine will and purpose in preaching or teaching] or has any other spiritual endowment, let him understand (recognize and acknowledge) that what I am writing to you is a command of the Lord.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But if anyone disregards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' does not recognize [that it is a command of the Lord], he is disregarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' not recognized [he is one whom God knows not].'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' So [to conclude], my brethren, earnestly desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set your hearts on prophesying (on being inspired to preach and teach and to interpret God''s will and purpose), and do not forbid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hinder speaking in [unknown] tongues.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He who speaks in a [strange] tongue edifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' improves himself, but he who prophesies [interpreting the divine will and purpose and teaching with inspiration] edifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' improves the church '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promotes growth [in Christian wisdom, piety, holiness, and happiness].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But all things should be done with regard to decency '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' propriety and in an orderly fashion.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now I wish that you might all speak in [unknown] tongues, but more especially [I want you] to prophesy (to be inspired to preach and interpret the divine will and purpose). He who prophesies [who is inspired to preach and teach] is greater (more useful and more important) than he who speaks in [unknown] tongues, unless he should interpret [what he says], so that the church may be edified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receive good [from it].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Now, brethren, if I come to you speaking in [unknown] tongues, how shall I make it to your advantage unless I speak to you either in revelation (disclosure of God''s will to man) in knowledge or in prophecy or in instruction?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' If even inanimate musical instruments, such as the flute or the harp, do not give distinct notes, how will anyone [listening] know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understand what is played?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And if the war bugle gives an uncertain (indistinct) call, who will prepare for battle?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Just so it is with you; if you in the [unknown] tongue speak words that are not intelligible, how will anyone understand what you are saying? For you will be talking into empty space!'
