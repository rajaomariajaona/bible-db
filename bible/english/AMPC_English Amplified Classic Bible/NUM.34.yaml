document_id: NUM.34
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Command the Israelites, When you come into the land of Canaan (which is the land that shall be yours for an inheritance, the land of Canaan according to its boundaries),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Your south side shall be from the Wilderness of Zin along the side of Edom, and your southern boundary from the end of the Salt [Dead] Sea eastward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Your boundary shall turn south of the ascent of Akrabbim, and pass on to Zin, and its end shall be south of Kadesh-barnea. Then it shall go on to Hazar-addar and pass on to Azmon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the boundary shall turn from Azmon to the Brook of Egypt, and it shall terminate at the [Mediterranean] Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For the western boundary you shall have the Great Sea and its coast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And this shall be your north border: from the Great Sea mark out your boundary line to Mount Hor;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' From Mount Hor you shall mark out your boundary to the entrance of Hamath, and its end shall be at Zedad;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the northern boundary shall go on to Ziphron, and the end of it shall be at Hazar-enan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You shall mark out your eastern boundary from Hazar-enan to Shepham;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The boundary shall go down from Shepham to Riblah on the east side of Ain and shall descend and reach to the shoulder of the Sea of Chinnereth [the Sea of Galilee] on the east;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the boundary shall go down to the Jordan, and the end shall be at the Salt Sea. This shall be your land with its boundaries all around.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Moses commanded the Israelites, This is the land you shall inherit by lot, which the Lord has commanded to give to the nine tribes and the half-tribe [of Manasseh],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For the tribes of the sons of Reuben and of Gad by their fathers'' houses have received their inheritance, and also the half-tribe of Manasseh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The two and a half tribes have received their inheritance east of the Jordan at Jericho, toward the sunrise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' These are the men who shall divide the land to you for inheritance: Eleazar the priest and Joshua son of Nun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And [with them] you shall take one head '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' prince of each tribe to divide the land for inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The names of the men are: Of the tribe of Judah, Caleb son of Jephunneh;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of the tribe of the sons of Simeon, Shemuel son of Ammihud;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Of the tribe of Benjamin, Elidad son of Chislon;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Of the tribe of the sons of Dan a leader, Bukki son of Jogli;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Of the sons of Joseph: of the tribe of the sons of Manasseh a leader, Hanniel son of Ephod;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And of the tribe of the sons of Ephraim a leader, Kemuel son of Shiphtan;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And of the tribe of the sons of Zebulun a leader, Elizaphan son of Parnach;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And of the tribe of the sons of Issachar a leader, Paltiel son of Azzan;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And of the tribe of the sons of Asher a leader, Ahihud son of Shelomi;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And of the tribe of the sons of Naphtali a leader, Pedahel son of Ammihud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' These are the men whom the Lord commanded to divide the inheritance to the Israelites in the land of Canaan.'
