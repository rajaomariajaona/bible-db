document_id: LEV.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses and Aaron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites: These are the animals which you may eat among all the beasts that are on the earth. [Mark 7:15-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Whatever parts the hoof and is cloven-footed and chews the cud, any of these animals you may eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Nevertheless these you shall not eat of those that chew the cud or divide the hoof: the camel, because it chews the cud but does not divide the hoof; it is unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the coney '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rock badger, because it chews the cud but does not divide the hoof; it is unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the hare, because it chews the cud but does not divide the hoof; it is unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the swine, because it divides the hoof and is cloven-footed but does not chew the cud; it is unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Of their flesh you shall not eat, and their carcasses you shall not touch; they are unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' These you may eat of all that are in the waters: whatever has fins and scales in the waters, in the seas, and in the rivers, these you may eat;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But all that have not fins and scales in the seas and in the rivers, of all the creeping things in the waters, and of all the living creatures which are in the waters, they are [to be considered] an abomination and abhorrence to you. [I Cor. 8:8-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They shall continue to be an abomination to you; you shall not eat of their flesh, but you shall detest their carcasses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Everything in the waters that has not fins or scales shall be abhorrent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' detestable to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' These you shall have in abomination among the birds; they shall not be eaten, for they are detestable: the eagle, the ossifrage, the ospray,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The kite, the whole species of falcon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Every kind of raven,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The ostrich, the nighthawk, the sea gull, every species of hawk,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The owl, the cormorant, the ibis,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The swan, the pelican, the vulture,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The stork, all kinds of heron, the hoopoe, and the bat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' All winged insects that go upon all fours are to be an abomination to you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Yet of all winged insects that go upon all fours you may eat those which have legs above their feet with which to leap on the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Of these you may eat: the whole species of locust, of bald locust, of cricket, and of grasshopper. [Matt. 3:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But all other winged insects which have four feet shall be detestable to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And by [contact with] these you shall become unclean; whoever touches the carcass of them shall be unclean until the evening,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And whoever carries any part of their carcass shall wash his clothes and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Every beast which parts the hoof but is not cloven-footed or does not chew the cud is unclean to you; everyone who touches them shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And all that go on their paws, among all kinds of four-footed beasts, are unclean to you; whoever touches their carcass shall be unclean until the evening,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he who carries their carcass shall wash his clothes and be unclean until the evening; they are unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' These also are unclean to you among the creeping things [that multiply greatly] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' creep upon the ground: the weasel, the mouse, any kind of great lizard,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The gecko, the land crocodile, the lizard, the sand lizard, and the chameleon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' These are unclean to you among all that creep; whoever touches them when they are dead shall be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And upon whatever they may fall when they are dead, it shall be unclean, whether it is an article of wood or clothing or skin (bottle) or sack, any vessel in which work is done; it must be put in water, and it shall be unclean until the evening; so it shall be cleansed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And every earthen vessel into which any of these [creeping things] falls, whatever may be in it shall be unclean, and you shall break the vessel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Of all the food [in one of these unclean vessels] which may be eaten, that on which such water comes shall be unclean, and all drink that may be drunk from every such vessel shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And everything upon which any part of their carcass falls shall be unclean; whether an oven, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pan with a lid, or hearth for pots, it shall be broken in pieces; they are unclean, and shall be unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Yet a spring or a cistern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reservoir of water shall be clean; but whoever touches their carcass shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' If a part of their carcass falls on seed which is to be sown, it shall be clean;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But if any water be put on the seed and any part of their carcass falls on it, it shall be unclean to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' If any animal of which you may eat dies [unslaughtered], he who touches its carcass shall be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And he who eats of its carcass [ignorantly] shall wash his clothes, and be unclean until the evening; he also who carries its carcass shall wash his clothes, and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And everything that creeps on the ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [multiplies in] swarms shall be an abomination; it shall not be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Whatever goes on its belly, and whatever goes on all fours, or whatever has more [than four] feet among all things that creep on the ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swarm you shall not eat; for they are detestable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' You shall not make yourselves loathsome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abominable [by eating] any swarming thing that [multiplies by] swarms, neither shall you make yourselves unclean with them, that you should be defiled by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' For I am the Lord your God; so consecrate yourselves and be holy, for I am holy; neither defile yourselves with any manner of thing that multiplies in large numbers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' swarms. [I Thess. 4:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' For I am the Lord Who brought you up out of the land of Egypt to be your God; therefore you shall be holy, for I am holy. [I Pet. 1:14-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' This is the law of the beast, and of the bird, and of every living creature that moves in the waters, and creeps on the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' multiplies in large numbers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' To make a difference (a distinction) between the unclean and the clean, and between the animal that may be eaten and the animal that may not be eaten.'
