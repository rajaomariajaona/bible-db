document_id: LEV.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses and Aaron,'
  '10':
  - type: text
    content: ' But all that have not fins and scales in the seas and in the rivers, of all the creeping things in the waters, and of all the living creatures which are in the waters, they are [to be considered] an abomination and abhorrence to you. [I Cor. 8:8-13.]'
  '11':
  - type: text
    content: ' They shall continue to be an abomination to you; you shall not eat of their flesh, but you shall detest their carcasses.'
  '12':
  - type: text
    content: ' Everything in the waters that has not fins or scales shall be abhorrent '
  - type: text
    content: and
  - type: text
    content: ' detestable to you.'
  '13':
  - type: text
    content: ' These you shall have in abomination among the birds; they shall not be eaten, for they are detestable: the eagle, the ossifrage, the ospray,'
  '14':
  - type: text
    content: ' The kite, the whole species of falcon,'
  '15':
  - type: text
    content: ' Every kind of raven,'
  '16':
  - type: text
    content: ' The ostrich, the nighthawk, the sea gull, every species of hawk,'
  '17':
  - type: text
    content: ' The owl, the cormorant, the ibis,'
  '18':
  - type: text
    content: ' The swan, the pelican, the vulture,'
  '19':
  - type: text
    content: ' The stork, all kinds of heron, the hoopoe, and the bat.'
  '2':
  - type: text
    content: ' Say to the Israelites: These are the animals which you may eat among all the beasts that are on the earth. [Mark 7:15-19.]'
  '20':
  - type: text
    content: ' All winged insects that go upon all fours are to be an abomination to you;'
  '21':
  - type: text
    content: ' Yet of all winged insects that go upon all fours you may eat those which have legs above their feet with which to leap on the ground.'
  '22':
  - type: text
    content: ' Of these you may eat: the whole species of locust, of bald locust, of cricket, and of grasshopper. [Matt. 3:4.]'
  '23':
  - type: text
    content: ' But all other winged insects which have four feet shall be detestable to you.'
  '24':
  - type: text
    content: ' And by [contact with] these you shall become unclean; whoever touches the carcass of them shall be unclean until the evening,'
  '25':
  - type: text
    content: ' And whoever carries any part of their carcass shall wash his clothes and be unclean until the evening.'
  '26':
  - type: text
    content: ' Every beast which parts the hoof but is not cloven-footed or does not chew the cud is unclean to you; everyone who touches them shall be unclean.'
  '27':
  - type: text
    content: ' And all that go on their paws, among all kinds of four-footed beasts, are unclean to you; whoever touches their carcass shall be unclean until the evening,'
  '28':
  - type: text
    content: ' And he who carries their carcass shall wash his clothes and be unclean until the evening; they are unclean to you.'
  '29':
  - type: text
    content: ' These also are unclean to you among the creeping things [that multiply greatly] '
  - type: text
    content: and
  - type: text
    content: ' creep upon the ground: the weasel, the mouse, any kind of great lizard,'
  '3':
  - type: text
    content: ' Whatever parts the hoof and is cloven-footed and chews the cud, any of these animals you may eat.'
  '30':
  - type: text
    content: ' The gecko, the land crocodile, the lizard, the sand lizard, and the chameleon.'
  '31':
  - type: text
    content: ' These are unclean to you among all that creep; whoever touches them when they are dead shall be unclean until the evening.'
  '32':
  - type: text
    content: ' And upon whatever they may fall when they are dead, it shall be unclean, whether it is an article of wood or clothing or skin (bottle) or sack, any vessel in which work is done; it must be put in water, and it shall be unclean until the evening; so it shall be cleansed.'
  '33':
  - type: text
    content: ' And every earthen vessel into which any of these [creeping things] falls, whatever may be in it shall be unclean, and you shall break the vessel.'
  '34':
  - type: text
    content: ' Of all the food [in one of these unclean vessels] which may be eaten, that on which such water comes shall be unclean, and all drink that may be drunk from every such vessel shall be unclean.'
  '35':
  - type: text
    content: ' And everything upon which any part of their carcass falls shall be unclean; whether an oven, '
  - type: text
    content: or
  - type: text
    content: ' pan with a lid, or hearth for pots, it shall be broken in pieces; they are unclean, and shall be unclean to you.'
  '36':
  - type: text
    content: ' Yet a spring or a cistern '
  - type: text
    content: or
  - type: text
    content: ' reservoir of water shall be clean; but whoever touches their carcass shall be unclean.'
  '37':
  - type: text
    content: ' If a part of their carcass falls on seed which is to be sown, it shall be clean;'
  '38':
  - type: text
    content: ' But if any water be put on the seed and any part of their carcass falls on it, it shall be unclean to you.'
  '39':
  - type: text
    content: ' If any animal of which you may eat dies [unslaughtered], he who touches its carcass shall be unclean until the evening.'
  '4':
  - type: text
    content: ' Nevertheless these you shall not eat of those that chew the cud or divide the hoof: the camel, because it chews the cud but does not divide the hoof; it is unclean to you.'
  '40':
  - type: text
    content: ' And he who eats of its carcass [ignorantly] shall wash his clothes, and be unclean until the evening; he also who carries its carcass shall wash his clothes, and be unclean until the evening.'
  '41':
  - type: text
    content: ' And everything that creeps on the ground '
  - type: text
    content: and
  - type: text
    content: ' [multiplies in] swarms shall be an abomination; it shall not be eaten.'
  '42':
  - type: text
    content: ' Whatever goes on its belly, and whatever goes on all fours, or whatever has more [than four] feet among all things that creep on the ground '
  - type: text
    content: and
  - type: text
    content: ' swarm you shall not eat; for they are detestable.'
  '43':
  - type: text
    content: ' You shall not make yourselves loathsome '
  - type: text
    content: and
  - type: text
    content: ' abominable [by eating] any swarming thing that [multiplies by] swarms, neither shall you make yourselves unclean with them, that you should be defiled by them.'
  '44':
  - type: text
    content: ' For I am the Lord your God; so consecrate yourselves and be holy, for I am holy; neither defile yourselves with any manner of thing that multiplies in large numbers '
  - type: text
    content: or
  - type: text
    content: ' swarms. [I Thess. 4:7, 8.]'
  '45':
  - type: text
    content: ' For I am the Lord Who brought you up out of the land of Egypt to be your God; therefore you shall be holy, for I am holy. [I Pet. 1:14-16.]'
  '46':
  - type: text
    content: ' This is the law of the beast, and of the bird, and of every living creature that moves in the waters, and creeps on the earth '
  - type: text
    content: and
  - type: text
    content: ' multiplies in large numbers,'
  '47':
  - type: text
    content: ' To make a difference (a distinction) between the unclean and the clean, and between the animal that may be eaten and the animal that may not be eaten.'
  '5':
  - type: text
    content: ' And the coney '
  - type: text
    content: or
  - type: text
    content: ' rock badger, because it chews the cud but does not divide the hoof; it is unclean to you.'
  '6':
  - type: text
    content: ' And the hare, because it chews the cud but does not divide the hoof; it is unclean to you.'
  '7':
  - type: text
    content: ' And the swine, because it divides the hoof and is cloven-footed but does not chew the cud; it is unclean to you.'
  '8':
  - type: text
    content: ' Of their flesh you shall not eat, and their carcasses you shall not touch; they are unclean to you.'
  '9':
  - type: text
    content: ' These you may eat of all that are in the waters: whatever has fins and scales in the waters, in the seas, and in the rivers, these you may eat;'
