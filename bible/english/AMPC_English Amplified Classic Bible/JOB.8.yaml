document_id: JOB.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ANSWERED Bildad the Shuhite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' How long will you say these things [Job]? And how long shall the words of your mouth be as a mighty wind?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Does God pervert justice? Or does the Almighty pervert righteousness?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If your children have sinned against Him, then He has delivered them into the power of their transgression.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If you will seek God diligently and make your supplication to the Almighty,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then, if you are pure and upright, surely He will bestir Himself for you and make your righteous dwelling prosperous again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And though your beginning was small, yet your latter end would greatly increase.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For inquire, I pray you, of the former age and apply yourself to that which their fathers have searched out,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For we are but of yesterday and know nothing, because our days upon earth are a shadow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Shall not [the forefathers] teach you and tell you and utter words out of their hearts (the deepest part of their nature)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Can the rush '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' papyrus grow up without marsh? Can the flag '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reed grass grow without water?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' While it is yet green, in flower, and not cut down, it withers before any other herb [when without water].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So are the ways of all who forget God; and the hope of the godless shall perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For his confidence breaks, and [the object of] his trust is a spider''s web.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He shall lean upon his house, but it shall not stand; he shall hold fast to it, but it shall not last.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He is green before the sun, and his shoots go forth over his garden.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' [Godless] his roots are wrapped about the [stone] heap, and see their way [promisingly] among the rocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But if [God] snatches him from his property, [then having passed into the hands of others] it [his property] will forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deny him, [saying,] I have never seen you [before, as if ashamed of him–like his former friends].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' See, this is the joy of going the way [of the ungodly]! And from the dust others will spring up [to take his place].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Behold, as surely as God will never uphold wrongdoers, He will never cast away a blameless man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He will yet fill your mouth with laughter [Job] and your lips with joyful shouting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Those who hate you will be clothed with shame, and the tents of the wicked shall be no more.'
