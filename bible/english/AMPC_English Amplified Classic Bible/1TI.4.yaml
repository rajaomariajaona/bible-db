document_id: 1TI.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT THE [Holy] Spirit distinctly '
  - type: text
    content: and
  - type: text
    content: ' expressly declares that in latter times some will turn away from the faith, giving attention to deluding '
  - type: text
    content: and
  - type: text
    content: ' seducing spirits and doctrines that demons teach,'
  '10':
  - type: text
    content: ' With a view to this we toil and strive, [yes and] '
  - type: text
    content: suffer reproach
  - type: text
    content: ', because we have [fixed our] hope on the living God, Who is the Savior (Preserver, Maintainer, Deliverer) of all men, especially of those who believe (trust in, rely on, and adhere to Him).'
  '11':
  - type: text
    content: ' Continue to command these things and to teach them.'
  '12':
  - type: text
    content: ' Let no one despise '
  - type: text
    content: or
  - type: text
    content: ' think less of you because of your youth, but be an example (pattern) for the believers in speech, in conduct, in love, in faith, and in purity.'
  '13':
  - type: text
    content: ' Till I come, devote yourself to [public and private] reading, to exhortation (preaching and personal appeals), and to teaching '
  - type: text
    content: and
  - type: text
    content: ' instilling doctrine.'
  '14':
  - type: text
    content: ' Do not neglect the gift which is in you, [that special inward endowment] which was directly imparted to you [by the Holy Spirit] by prophetic utterance when the elders laid their hands upon you [at your ordination].'
  '15':
  - type: text
    content: ' Practice '
  - type: text
    content: and
  - type: text
    content: ' cultivate '
  - type: text
    content: and
  - type: text
    content: ' meditate upon these duties; throw yourself wholly into them [as your ministry], so that your progress may be evident to everybody.'
  '16':
  - type: text
    content: ' Look well to yourself [to your own personality] and to [your] teaching; persevere in these things [hold to them], for by so doing you will save both yourself and those who hear you.'
  '2':
  - type: text
    content: ' Through the hypocrisy '
  - type: text
    content: and
  - type: text
    content: ' pretensions of liars whose consciences are seared (cauterized),'
  '3':
  - type: text
    content: ' Who forbid people to marry and [teach them] to abstain from [certain kinds of] foods which God created to be received with thanksgiving by those who believe '
  - type: text
    content: and
  - type: text
    content: ' have [an increasingly clear] knowledge of the truth.'
  '4':
  - type: text
    content: ' For everything God has created is good, and nothing is to be thrown away '
  - type: text
    content: or
  - type: text
    content: ' refused if it is received with thanksgiving.'
  '5':
  - type: text
    content: ' For it is hallowed '
  - type: text
    content: and
  - type: text
    content: ' consecrated by the Word of God and by prayer.'
  '6':
  - type: text
    content: ' If you lay all these instructions before the brethren, you will be a worthy steward '
  - type: text
    content: and
  - type: text
    content: ' a good minister of Christ Jesus, ever nourishing your own self on the truths of the faith and of the good [Christian] instruction which you have closely followed.'
  '7':
  - type: text
    content: ' But refuse '
  - type: text
    content: and
  - type: text
    content: ' avoid irreverent legends (profane and impure and godless fictions, mere grandmothers'' tales) and silly myths, '
  - type: text
    content: and
  - type: text
    content: ' express your disapproval of them. Train yourself toward godliness (piety), [keeping yourself spiritually fit].'
  '8':
  - type: text
    content: ' For physical training is of some value (useful for a little), but godliness (spiritual training) is useful '
  - type: text
    content: and
  - type: text
    content: ' of value in everything '
  - type: text
    content: and
  - type: text
    content: ' in every way, for it holds promise for the present life and also for the life which is to come.'
  '9':
  - type: text
    content: ' This saying is reliable '
  - type: text
    content: and
  - type: text
    content: ' worthy of complete acceptance by everybody.'
