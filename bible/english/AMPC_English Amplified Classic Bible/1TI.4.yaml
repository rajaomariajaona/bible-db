document_id: 1TI.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT THE [Holy] Spirit distinctly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expressly declares that in latter times some will turn away from the faith, giving attention to deluding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seducing spirits and doctrines that demons teach,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Through the hypocrisy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pretensions of liars whose consciences are seared (cauterized),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Who forbid people to marry and [teach them] to abstain from [certain kinds of] foods which God created to be received with thanksgiving by those who believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have [an increasingly clear] knowledge of the truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For everything God has created is good, and nothing is to be thrown away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' refused if it is received with thanksgiving.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For it is hallowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrated by the Word of God and by prayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If you lay all these instructions before the brethren, you will be a worthy steward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a good minister of Christ Jesus, ever nourishing your own self on the truths of the faith and of the good [Christian] instruction which you have closely followed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But refuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avoid irreverent legends (profane and impure and godless fictions, mere grandmothers'' tales) and silly myths, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' express your disapproval of them. Train yourself toward godliness (piety), [keeping yourself spiritually fit].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For physical training is of some value (useful for a little), but godliness (spiritual training) is useful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of value in everything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in every way, for it holds promise for the present life and also for the life which is to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' This saying is reliable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthy of complete acceptance by everybody.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' With a view to this we toil and strive, [yes and] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: suffer reproach
  - type: text
    text: ', because we have [fixed our] hope on the living God, Who is the Savior (Preserver, Maintainer, Deliverer) of all men, especially of those who believe (trust in, rely on, and adhere to Him).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Continue to command these things and to teach them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let no one despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' think less of you because of your youth, but be an example (pattern) for the believers in speech, in conduct, in love, in faith, and in purity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Till I come, devote yourself to [public and private] reading, to exhortation (preaching and personal appeals), and to teaching '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instilling doctrine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Do not neglect the gift which is in you, [that special inward endowment] which was directly imparted to you [by the Holy Spirit] by prophetic utterance when the elders laid their hands upon you [at your ordination].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Practice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cultivate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' meditate upon these duties; throw yourself wholly into them [as your ministry], so that your progress may be evident to everybody.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Look well to yourself [to your own personality] and to [your] teaching; persevere in these things [hold to them], for by so doing you will save both yourself and those who hear you.'
