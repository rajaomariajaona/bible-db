document_id: PRO.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE PLANS of the mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' orderly thinking belong to man, but from the Lord comes the [wise] answer of the tongue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' All the ways of a man are pure in his own eyes, but the Lord weighs the spirits (the thoughts and intents of the heart). [I Sam. 16:7; Heb. 4:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Roll your works upon the Lord [commit and trust them wholly to Him; He will cause your thoughts to become agreeable to His will, and] so shall your plans be established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' succeed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The Lord has made everything [to accommodate itself and contribute] to its own end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His own purpose–even the wicked [are fitted for their role] for the day of calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Everyone proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant in heart is disgusting, hateful, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly offensive to the Lord; be assured [I pledge it] they will not go unpunished. [Prov. 8:13; 11:20-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' By mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' love, truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fidelity [to God and man–not by sacrificial offerings], iniquity is purged out of the heart, and by the reverent, worshipful fear of the Lord men depart from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avoid evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When a man''s ways please the Lord, He makes even his enemies to be at peace with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Better is a little with righteousness (uprightness in every area and relation and right standing with God) than great revenues with injustice. [Ps. 37:16; Prov. 15:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' A man''s mind plans his way, but the Lord directs his steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes them sure. [Ps. 37:23; Prov. 20:24; Jer. 10:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Divinely directed decisions are on the lips of the king; his mouth should not transgress in judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' A just balance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scales are the Lord''s; all the weights of the bag are His work [established on His eternal principles].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' It is an abomination [to God and men] for kings to commit wickedness, for a throne is established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made secure by righteousness (moral and spiritual rectitude in every area and relation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just lips are the delight of a king, and he loves him who speaks what is right.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The wrath of a king is as messengers of death, but a wise man will pacify it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' In the light of the king''s countenance is life, and his favor is as a cloud bringing the spring rain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' How much better it is to get skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom than gold! And to get understanding is to be chosen rather than silver. [Prov. 8:10, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The highway of the upright turns aside from evil; he who guards his way preserves his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Pride goes before destruction, and a haughty spirit before a fall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Better it is to be of a humble spirit with the meek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poor than to divide the spoil with the proud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He who deals wisely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeds [God''s] word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel shall find good, and whoever leans on, trusts in, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is confident in the Lord–happy, blessed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortunate is he.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The wise in heart are called prudent, understanding, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knowing, and winsome speech increases learning [in both speaker and listener].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Understanding is a wellspring of life to those who have it, but to give instruction to fools is folly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The mind of the wise instructs his mouth, and adds learning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persuasiveness to his lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Pleasant words are as a honeycomb, sweet to the mind and healing to the body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' There is a way that seems right to a man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appears straight before him, but at the end of it is the way of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The appetite of the laborer works for him, for [the need of] his mouth urges him on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' A worthless man devises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' digs up mischief, and in his lips there is as a scorching fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' A perverse man sows strife, and a whisperer separates close friends. [Prov. 17:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The exceedingly grasping, covetous, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violent man entices his neighbor, leading him in a way that is not good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' He who shuts his eyes to devise perverse things and who compresses his lips [as if in concealment] brings evil to pass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The hoary head is a crown of beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory if it is found in the way of righteousness (moral and spiritual rectitude in every area and relation). [Prov. 20:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' He who is slow to anger is better than the mighty, he who rules his [own] spirit than he who takes a city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The lot is cast into the lap, but the decision is wholly of the Lord [even the events that seem accidental are really ordered by Him].'
