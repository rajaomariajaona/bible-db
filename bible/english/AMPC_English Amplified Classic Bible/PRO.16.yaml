document_id: PRO.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE PLANS of the mind '
  - type: text
    content: and
  - type: text
    content: ' orderly thinking belong to man, but from the Lord comes the [wise] answer of the tongue.'
  '10':
  - type: text
    content: ' Divinely directed decisions are on the lips of the king; his mouth should not transgress in judgment.'
  '11':
  - type: text
    content: ' A just balance '
  - type: text
    content: and
  - type: text
    content: ' scales are the Lord''s; all the weights of the bag are His work [established on His eternal principles].'
  '12':
  - type: text
    content: ' It is an abomination [to God and men] for kings to commit wickedness, for a throne is established '
  - type: text
    content: and
  - type: text
    content: ' made secure by righteousness (moral and spiritual rectitude in every area and relation).'
  '13':
  - type: text
    content: ' Right '
  - type: text
    content: and
  - type: text
    content: ' just lips are the delight of a king, and he loves him who speaks what is right.'
  '14':
  - type: text
    content: ' The wrath of a king is as messengers of death, but a wise man will pacify it.'
  '15':
  - type: text
    content: ' In the light of the king''s countenance is life, and his favor is as a cloud bringing the spring rain.'
  '16':
  - type: text
    content: ' How much better it is to get skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom than gold! And to get understanding is to be chosen rather than silver. [Prov. 8:10, 19.]'
  '17':
  - type: text
    content: ' The highway of the upright turns aside from evil; he who guards his way preserves his life.'
  '18':
  - type: text
    content: ' Pride goes before destruction, and a haughty spirit before a fall.'
  '19':
  - type: text
    content: ' Better it is to be of a humble spirit with the meek '
  - type: text
    content: and
  - type: text
    content: ' poor than to divide the spoil with the proud.'
  '2':
  - type: text
    content: ' All the ways of a man are pure in his own eyes, but the Lord weighs the spirits (the thoughts and intents of the heart). [I Sam. 16:7; Heb. 4:12.]'
  '20':
  - type: text
    content: ' He who deals wisely '
  - type: text
    content: and
  - type: text
    content: ' heeds [God''s] word '
  - type: text
    content: and
  - type: text
    content: ' counsel shall find good, and whoever leans on, trusts in, '
  - type: text
    content: and
  - type: text
    content: ' is confident in the Lord–happy, blessed, '
  - type: text
    content: and
  - type: text
    content: ' fortunate is he.'
  '21':
  - type: text
    content: ' The wise in heart are called prudent, understanding, '
  - type: text
    content: and
  - type: text
    content: ' knowing, and winsome speech increases learning [in both speaker and listener].'
  '22':
  - type: text
    content: ' Understanding is a wellspring of life to those who have it, but to give instruction to fools is folly.'
  '23':
  - type: text
    content: ' The mind of the wise instructs his mouth, and adds learning '
  - type: text
    content: and
  - type: text
    content: ' persuasiveness to his lips.'
  '24':
  - type: text
    content: ' Pleasant words are as a honeycomb, sweet to the mind and healing to the body.'
  '25':
  - type: text
    content: ' There is a way that seems right to a man '
  - type: text
    content: and
  - type: text
    content: ' appears straight before him, but at the end of it is the way of death.'
  '26':
  - type: text
    content: ' The appetite of the laborer works for him, for [the need of] his mouth urges him on.'
  '27':
  - type: text
    content: ' A worthless man devises '
  - type: text
    content: and
  - type: text
    content: ' digs up mischief, and in his lips there is as a scorching fire.'
  '28':
  - type: text
    content: ' A perverse man sows strife, and a whisperer separates close friends. [Prov. 17:9.]'
  '29':
  - type: text
    content: ' The exceedingly grasping, covetous, '
  - type: text
    content: and
  - type: text
    content: ' violent man entices his neighbor, leading him in a way that is not good.'
  '3':
  - type: text
    content: ' Roll your works upon the Lord [commit and trust them wholly to Him; He will cause your thoughts to become agreeable to His will, and] so shall your plans be established '
  - type: text
    content: and
  - type: text
    content: ' succeed.'
  '30':
  - type: text
    content: ' He who shuts his eyes to devise perverse things and who compresses his lips [as if in concealment] brings evil to pass.'
  '31':
  - type: text
    content: ' The hoary head is a crown of beauty '
  - type: text
    content: and
  - type: text
    content: ' glory if it is found in the way of righteousness (moral and spiritual rectitude in every area and relation). [Prov. 20:29.]'
  '32':
  - type: text
    content: ' He who is slow to anger is better than the mighty, he who rules his [own] spirit than he who takes a city.'
  '33':
  - type: text
    content: ' The lot is cast into the lap, but the decision is wholly of the Lord [even the events that seem accidental are really ordered by Him].'
  '4':
  - type: text
    content: ' The Lord has made everything [to accommodate itself and contribute] to its own end '
  - type: text
    content: and
  - type: text
    content: ' His own purpose–even the wicked [are fitted for their role] for the day of calamity '
  - type: text
    content: and
  - type: text
    content: ' evil.'
  '5':
  - type: text
    content: ' Everyone proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant in heart is disgusting, hateful, '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the Lord; be assured [I pledge it] they will not go unpunished. [Prov. 8:13; 11:20-21.]'
  '6':
  - type: text
    content: ' By mercy '
  - type: text
    content: and
  - type: text
    content: ' love, truth '
  - type: text
    content: and
  - type: text
    content: ' fidelity [to God and man–not by sacrificial offerings], iniquity is purged out of the heart, and by the reverent, worshipful fear of the Lord men depart from '
  - type: text
    content: and
  - type: text
    content: ' avoid evil.'
  '7':
  - type: text
    content: ' When a man''s ways please the Lord, He makes even his enemies to be at peace with him.'
  '8':
  - type: text
    content: ' Better is a little with righteousness (uprightness in every area and relation and right standing with God) than great revenues with injustice. [Ps. 37:16; Prov. 15:16.]'
  '9':
  - type: text
    content: ' A man''s mind plans his way, but the Lord directs his steps '
  - type: text
    content: and
  - type: text
    content: ' makes them sure. [Ps. 37:23; Prov. 20:24; Jer. 10:23.]'
