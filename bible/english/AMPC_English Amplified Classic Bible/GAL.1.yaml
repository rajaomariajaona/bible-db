document_id: GAL.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, AN apostle–[special messenger appointed and commissioned and sent out] not from [any body of] men nor by '
  - type: text
    content: or
  - type: text
    content: ' through any man, but by '
  - type: text
    content: and
  - type: text
    content: ' through Jesus Christ (the Messiah) and God the Father, Who raised Him from among the dead–'
  '10':
  - type: text
    content: ' Now am I trying to win the favor of men, or of God? Do I seek to please men? If I were still seeking popularity with men, I should not be a bond servant of Christ (the Messiah).'
  '11':
  - type: text
    content: ' For I want you to know, brethren, that the Gospel which was proclaimed '
  - type: text
    content: and
  - type: text
    content: ' made known by me is not man''s gospel [a human invention, according to or patterned after any human standard].'
  '12':
  - type: text
    content: ' For indeed I did not receive it from man, nor was I taught it, but [it came to me] through a [direct] revelation [given] by Jesus Christ (the Messiah).'
  '13':
  - type: text
    content: ' You have heard of my earlier career '
  - type: text
    content: and
  - type: text
    content: ' former manner of life in the Jewish religion (Judaism), how I persecuted '
  - type: text
    content: and
  - type: text
    content: ' abused the church of God furiously '
  - type: text
    content: and
  - type: text
    content: ' extensively, and [with fanatical zeal did my best] to make havoc of it '
  - type: text
    content: and
  - type: text
    content: ' destroy it.'
  '14':
  - type: text
    content: ' And [you have heard how] I outstripped many of the men of my own generation among the people of my race in [my advancement in study and observance of the laws of] Judaism, so extremely enthusiastic '
  - type: text
    content: and
  - type: text
    content: ' zealous I was for the traditions of my ancestors.'
  '15':
  - type: text
    content: ' But when He, Who had chosen '
  - type: text
    content: and
  - type: text
    content: ' set me apart [even] before I was born and had called me by His grace (His undeserved favor and blessing), saw fit '
  - type: text
    content: and
  - type: text
    content: ' was pleased [Isa. 49:1; Jer. 1:5.]'
  '16':
  - type: text
    content: ' To reveal (unveil, disclose) His Son within me so that I might proclaim Him among the Gentiles (the non-Jewish world) as the glad tidings (Gospel), immediately I did not confer with flesh and blood [did not consult or counsel with any frail human being or communicate with anyone].'
  '17':
  - type: text
    content: ' Nor did I [even] go up to Jerusalem to those who were apostles (special messengers of Christ) before I was, but I went away '
  - type: text
    content: and
  - type: text
    content: ' retired into Arabia, and afterward I came back again to Damascus.'
  '18':
  - type: text
    content: ' Then three years later, I did go up to Jerusalem to become [personally] acquainted with Cephas (Peter), and remained with him for fifteen days.'
  '19':
  - type: text
    content: ' But I did not see any of the other apostles (the special messengers of Christ) except James the brother of our Lord.'
  '2':
  - type: text
    content: ' And all the brethren who are with me, to the churches of Galatia:'
  '20':
  - type: text
    content: ' Now [note carefully what I am telling you, for it is the truth], I write this as if I were standing before the bar of God; I do not lie.'
  '21':
  - type: text
    content: ' Then I went into the districts (countries, regions) of Syria and Cilicia.'
  '22':
  - type: text
    content: ' And so far I was still unknown by sight to the churches of Christ in Judea (the country surrounding Jerusalem).'
  '23':
  - type: text
    content: ' They were only hearing it said, He who used to persecute us is now proclaiming the very faith he once reviled '
  - type: text
    content: and
  - type: text
    content: ' which he set out to ruin '
  - type: text
    content: and
  - type: text
    content: ' tried with all his might to destroy.'
  '24':
  - type: text
    content: ' And they glorified God [as the Author and Source of what had taken place] in me.'
  '3':
  - type: text
    content: ' Grace '
  - type: text
    content: and
  - type: text
    content: ' spiritual blessing be to you and [soul] peace from God the Father and our Lord Jesus Christ (the Messiah),'
  '4':
  - type: text
    content: ' Who gave (yielded) Himself up [to atone] for our sins [and to save and sanctify us], in order to rescue '
  - type: text
    content: and
  - type: text
    content: ' deliver us from this present wicked age '
  - type: text
    content: and
  - type: text
    content: ' world order, in accordance with the will '
  - type: text
    content: and
  - type: text
    content: ' purpose '
  - type: text
    content: and
  - type: text
    content: ' plan of our God and Father–'
  '5':
  - type: text
    content: ' To Him [be ascribed all] the glory through all the ages of the ages '
  - type: text
    content: and
  - type: text
    content: ' the eternities of the eternities! Amen (so be it).'
  '6':
  - type: text
    content: ' I am surprised '
  - type: text
    content: and
  - type: text
    content: ' astonished that you are so quickly turning renegade '
  - type: text
    content: and
  - type: text
    content: ' deserting Him Who invited '
  - type: text
    content: and
  - type: text
    content: ' called you by the grace (unmerited favor) of Christ (the Messiah) [and that you are transferring your allegiance] to a different [even an opposition] gospel.'
  '7':
  - type: text
    content: ' Not that there is [or could be] any other [genuine Gospel], but there are [obviously] some who are troubling '
  - type: text
    content: and
  - type: text
    content: ' disturbing '
  - type: text
    content: and
  - type: text
    content: ' bewildering you [with a different kind of teaching which they offer as a gospel] and want to pervert '
  - type: text
    content: and
  - type: text
    content: ' distort the Gospel of Christ (the Messiah) [into something which it absolutely is not].'
  '8':
  - type: text
    content: ' But even if we or an angel from heaven should preach to you a gospel contrary to '
  - type: text
    content: and
  - type: text
    content: ' different from that which we preached to you, let him be accursed (anathema, devoted to destruction, doomed to eternal punishment)!'
  '9':
  - type: text
    content: ' As we said before, so I now say again: If anyone is preaching to you a gospel different from '
  - type: text
    content: or
  - type: text
    content: ' contrary to that which you received [from us], let him be accursed (anathema, devoted to destruction, doomed to eternal punishment)!'
