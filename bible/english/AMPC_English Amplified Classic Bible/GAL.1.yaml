document_id: GAL.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PAUL, AN apostle–[special messenger appointed and commissioned and sent out] not from [any body of] men nor by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' through any man, but by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through Jesus Christ (the Messiah) and God the Father, Who raised Him from among the dead–'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now am I trying to win the favor of men, or of God? Do I seek to please men? If I were still seeking popularity with men, I should not be a bond servant of Christ (the Messiah).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For I want you to know, brethren, that the Gospel which was proclaimed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made known by me is not man''s gospel [a human invention, according to or patterned after any human standard].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For indeed I did not receive it from man, nor was I taught it, but [it came to me] through a [direct] revelation [given] by Jesus Christ (the Messiah).'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' You have heard of my earlier career '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' former manner of life in the Jewish religion (Judaism), how I persecuted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abused the church of God furiously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extensively, and [with fanatical zeal did my best] to make havoc of it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And [you have heard how] I outstripped many of the men of my own generation among the people of my race in [my advancement in study and observance of the laws of] Judaism, so extremely enthusiastic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' zealous I was for the traditions of my ancestors.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But when He, Who had chosen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set me apart [even] before I was born and had called me by His grace (His undeserved favor and blessing), saw fit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was pleased [Isa. 49:1; Jer. 1:5.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' To reveal (unveil, disclose) His Son within me so that I might proclaim Him among the Gentiles (the non-Jewish world) as the glad tidings (Gospel), immediately I did not confer with flesh and blood [did not consult or counsel with any frail human being or communicate with anyone].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Nor did I [even] go up to Jerusalem to those who were apostles (special messengers of Christ) before I was, but I went away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' retired into Arabia, and afterward I came back again to Damascus.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then three years later, I did go up to Jerusalem to become [personally] acquainted with Cephas (Peter), and remained with him for fifteen days.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But I did not see any of the other apostles (the special messengers of Christ) except James the brother of our Lord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And all the brethren who are with me, to the churches of Galatia:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Now [note carefully what I am telling you, for it is the truth], I write this as if I were standing before the bar of God; I do not lie.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then I went into the districts (countries, regions) of Syria and Cilicia.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And so far I was still unknown by sight to the churches of Christ in Judea (the country surrounding Jerusalem).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' They were only hearing it said, He who used to persecute us is now proclaiming the very faith he once reviled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' which he set out to ruin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tried with all his might to destroy.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And they glorified God [as the Author and Source of what had taken place] in me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual blessing be to you and [soul] peace from God the Father and our Lord Jesus Christ (the Messiah),'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Who gave (yielded) Himself up [to atone] for our sins [and to save and sanctify us], in order to rescue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver us from this present wicked age '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' world order, in accordance with the will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plan of our God and Father–'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' To Him [be ascribed all] the glory through all the ages of the ages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the eternities of the eternities! Amen (so be it).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I am surprised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' astonished that you are so quickly turning renegade '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deserting Him Who invited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' called you by the grace (unmerited favor) of Christ (the Messiah) [and that you are transferring your allegiance] to a different [even an opposition] gospel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Not that there is [or could be] any other [genuine Gospel], but there are [obviously] some who are troubling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disturbing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bewildering you [with a different kind of teaching which they offer as a gospel] and want to pervert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distort the Gospel of Christ (the Messiah) [into something which it absolutely is not].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But even if we or an angel from heaven should preach to you a gospel contrary to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' different from that which we preached to you, let him be accursed (anathema, devoted to destruction, doomed to eternal punishment)!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' As we said before, so I now say again: If anyone is preaching to you a gospel different from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' contrary to that which you received [from us], let him be accursed (anathema, devoted to destruction, doomed to eternal punishment)!'
