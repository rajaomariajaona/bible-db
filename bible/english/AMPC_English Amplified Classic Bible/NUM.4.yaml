document_id: NUM.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Moses and Aaron,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And they shall put the lampstand and all its utensils within a covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin and shall put it upon the frame [for carrying].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And upon the golden [incense] altar they shall spread a cloth of blue, and cover it with a covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin, and shall put in place its poles [for carrying].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And they shall take all the utensils of the service with which they minister in the sanctuary, and put them in a cloth of blue, and cover them with a covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin, and shall put them on the frame [for carrying].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And they shall take away the ashes from the altar [of burnt offering] and spread a purple cloth over it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And they shall put upon it all its vessels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utensils with which they minister there, the firepans, the fleshhooks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' forks, the shovels, the basins, and all the vessels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utensils of the altar, and they shall spread over it all a covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin, and shall put in its poles [for carrying].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When Aaron and his sons have finished covering the sanctuary and all its furniture, as the camp sets out, after all that [is done but not before], the sons of Kohath shall come to carry them. But they shall not touch the holy things, lest they die. These are the things of the Tent of Meeting which the sons of Kohath are to carry.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And Eleazar son of Aaron the priest shall have charge of the oil for the light, the fragrant incense, the continual cereal offering, and the anointing oil, with the oversight of all the tabernacle and of all that is in it, of the sanctuary and its utensils.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the Lord said to Moses and Aaron,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' [Since] the tribe of the families of the Kohathites [are only Levites and not priests], do not [by exposing them to the sin of touching the most holy things] cut them off from among the Levites.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But deal thus with them, that they may live and not die when they approach the most holy things: Aaron and his sons shall go in and appoint them each to his work and to his burden [to be carried on the march].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Take a census of the Kohathite division among the sons of Levi, by their families, by their fathers'' houses,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But [the Kohathites] shall not go in to see the sanctuary [the Holy Place and the Holy of Holies] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' its holy things, even for an instant, lest they die.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the Lord said to Moses,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Take a census of the sons of Gershon, by their fathers'' houses, by their families.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' From thirty years old and up to fifty years old you shall number them, all who enter for service to do the work in the Tent of Meeting.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' This is the service of the families of the Gershonites, in serving and in bearing burdens [when on the march]:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And they shall carry the curtains of the tabernacle, and the Tent of Meeting, its covering, and the covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin that is on top of it, and the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen for the door of the Tent of Meeting,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And the hangings of the court, and the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen for the entrance of the gate of the court which is around the tabernacle and the altar [of burnt offering], and their cords, and all the equipment for their service; whatever needs to be done with them, that they shall do.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Under the direction of Aaron and his sons shall be all the service of the sons of the Gershonites, in all they have to carry and in all they have to do; and you shall assign to their charge all that they are to carry [on the march].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' This is the service of the families of the sons of Gershon in the Tent of Meeting; and their work shall be under the direction of Ithamar son of Aaron, the [high] priest.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' As for the sons of Merari, you shall number them by their families and their fathers'' houses;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' From thirty years old and up to fifty years old, all who can enter the service to do the work in the Tent of Meeting.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' From thirty years old up to fifty years old you shall number them, everyone who enters the service to do the work of the Tent of Meeting.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And this is what they are assigned to carry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to guard [on the march], according to all their service in the Tent of Meeting: the boards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' frames of the tabernacle, and its bars, and its pillars, and its sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And the pillars of the court round about with their sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, and pegs, and cords, with all their equipment and all their accessories for service; and you shall assign to them by name the articles which they are to carry [on the march].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' This is the work of the families of the sons of Merari, according to all their tasks in the Tent of Meeting, under the direction of Ithamar son of Aaron, the [high] priest.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And Moses and Aaron and the leaders of the congregation numbered the sons of the Kohathites by their families and their fathers'' houses,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' From thirty years old up to fifty years old, everyone who enters the service to do the work of the Tent of Meeting;'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And those who were numbered of them by their families were 2,750.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' These were numbered of the families of the Kohathites, all who did service in the Tent of Meeting, whom Moses and Aaron numbered according to the command of the Lord through Moses.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' And those that were numbered of the sons of Gershon, by their families, and by their fathers'' houses,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' From thirty years old up to fifty years old, everyone who entered the service to do the work of the Tent of Meeting,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' This shall be the responsibility of the sons of Kohath in the Tent of Meeting: the most holy things.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Those who were enrolled of them, by their families, by their fathers'' houses, were 2,630.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' These were numbered of the families of the sons of Gershon, all who served in the Tent of Meeting, whom Moses and Aaron numbered as the Lord commanded.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' And those numbered of the families of the sons of Merari, by their families, by their fathers'' houses,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' From thirty years old up to fifty years old, everyone who entered into the service for work in the Tent of Meeting,'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' Even those who were numbered of them by their families, were 3,200.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' These are those who were numbered of the families of the sons of Merari, whom Moses and Aaron numbered according to the command of the Lord by Moses.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' All those who were numbered of the Levites, whom Moses and Aaron and the leaders of Israel counted by their families and by their fathers'' houses,'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' From thirty years old up to fifty years old, everyone who could enter to do the work of service and of burden bearing in the Tent of Meeting,'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' Those that were numbered of them were 8,580.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' According to the command of the Lord through Moses, they were assigned each to his work of serving and carrying. Thus they were numbered by him, as the Lord had commanded Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' When the camp prepares to set forward, Aaron and his sons shall take down the veil [screening the Holy of Holies] and cover the ark of the Testimony with it,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And shall put on it the covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin, and shall spread over that a cloth wholly of blue, and shall put in place the poles of the ark.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And upon the table of showbread they shall spread a cloth of blue and put on it the plates, the dishes for incense, the bowls, the flagons for the drink offering, and also the continual showbread.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And they shall spread over them a cloth of scarlet, and put over that a covering of dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skin, and put in place the poles [for carrying].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And they shall take a cloth of blue and cover the lampstand for the light and its lamps, its snuffers, its ashtrays, and all the oil vessels from which it is supplied.'
