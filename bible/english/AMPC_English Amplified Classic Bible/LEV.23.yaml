document_id: LEV.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Tell the Israelites, When you have come into the land I give you and reap its harvest, you shall bring the sheaf of the firstfruits of your harvest to the priest.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And he shall wave the sheaf before the Lord, that you may be accepted; on the next day after the Sabbath the priest shall wave it [before the Lord].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' You shall offer on the day when you wave the sheaf a male lamb a year old without blemish for a burnt offering to the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Its cereal offering shall be two-tenths of an ephah of fine flour mixed with oil, an offering made by fire to the Lord for a sweet, pleasing, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance; and the drink offering of it [to be poured out] shall be of wine, a fourth of a hin.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And you shall eat neither bread nor parched grain nor green ears, until this same day when you have brought the offering of your God; it is a statute forever throughout your generations in all your houses.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And you shall count from the day after the Sabbath, from the day that you brought the sheaf of the wave offering, seven Sabbaths; [seven full weeks] shall they be.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Count fifty days to the day after the seventh Sabbath; then you shall present a cereal offering of new grain to the Lord.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' You shall bring from your dwellings two loaves of bread to be waved, made from two-tenths of an ephah of fine flour; they shall be baked with leaven, for firstfruits to the Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And you shall offer with the bread seven lambs, a year old and without blemish, and one young bull and two rams. They shall be a burnt offering to the Lord, with their cereal offering and their drink offerings, an offering made by fire, of a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance to the Lord.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then you shall sacrifice one he-goat for a sin offering and two he-lambs, a year old, for a sacrifice of peace offering.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Say to the Israelites, The set feasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appointed seasons of the Lord which you shall proclaim as holy convocations, even My set feasts, are these:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The priest shall wave the two lambs, together with the bread of the firstfruits, for a wave offering before the Lord. They shall be holy to the Lord for the priest.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You shall make proclamation the same day, summoning a holy assembly; you shall do no servile work that day. It shall be a statute forever in all your dwellings throughout your generations.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And when you reap the harvest of your land, you shall not wholly reap the corners of your field, neither shall you gather the gleanings of your harvest; you shall leave them for the poor and the stranger. I am the Lord your God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And the Lord said to Moses,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Say to the Israelites, On the first day of the seventh month [almost October], you shall observe a day of solemn [sabbatical] rest, a memorial day announced by blowing of trumpets, a holy [called] assembly.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' You shall do no servile work on it, but you shall present an offering made by fire to the Lord.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And the Lord said to Moses,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Also the tenth day of this seventh month is the Day of Atonement; it shall be a holy [called] assembly, and you shall afflict yourselves [by fasting in penitence and humility] and present an offering made by fire to the Lord.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And you shall do no work on this day, for it is the Day of Atonement, to make atonement for you before the Lord your God.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' For whoever is not afflicted [by fasting in penitence and humility] on this day shall be cut off from among his people [that he may not be included in the atonement made for them].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Six days shall work be done, but the seventh day is the Sabbath of rest, a holy convocation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' assembly by summons. You shall do no work on that day; it is the Sabbath of the Lord in all your dwellings.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And whoever does any work on that same day I will destroy from among his people.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' You shall do no kind of work [on that day]. It is a statute forever throughout your generations in all your dwellings.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' It shall be to you a sabbath of rest, and you shall afflict yourselves [by fasting in penitence and humility]. On the ninth day of the month from evening to evening you shall keep your sabbath.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And the Lord said to Moses,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Say to the Israelites, The fifteenth day of this seventh month, and for seven days, is the Feast of Tabernacles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Booths to the Lord.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' On the first day shall be a holy convocation; you shall do no servile work on that day.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' For seven days you shall offer an offering made by fire to the Lord; on the eighth day shall be a holy convocation and you shall present an offering made by fire to the Lord. It is a solemn assembly; you shall do no laborious work on that day.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' These are the set feasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appointed seasons of the Lord, which you shall proclaim to be holy convocations, to present an offering made by fire to the Lord, a burnt offering and a cereal offering, sacrifices and drink offerings, each on its own day.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' This is in addition to the Sabbaths of the Lord and besides your gifts and all your vowed offerings and all your freewill offerings which you give to the Lord.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Also on the fifteenth day of the seventh month [nearly October], when you have gathered in the fruit of the land, you shall keep the feast of the Lord for seven days, the first day and the eighth day each a Sabbath.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' These are the set feasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appointed seasons of the Lord, holy convocations you shall proclaim at their stated times:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And on the first day you shall take the fruit of pleasing trees [and make booths of them], branches of palm trees, and boughs of thick (leafy) trees, and willows of the brook; and you shall rejoice before the Lord your God for seven days.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' You shall keep it as a feast to the Lord for seven days in the year, a statute forever throughout your generations; you shall keep it in the seventh month.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' You shall dwell in booths (shelters) for seven days: All native Israelites shall dwell in booths,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' That your generations may know that I made the Israelites dwell in booths when I brought them out of the land of Egypt. I am the Lord your God.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' Thus Moses declared to the Israelites the set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appointed feasts of the Lord.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' On the fourteenth day of the first month at twilight is the Lord''s Passover.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' On the fifteenth day of the same month is the Feast of Unleavened Bread to the Lord; for seven days you shall eat unleavened bread. [I Cor. 5:7, 8.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' On the first day you shall have a holy "calling together;" you shall do no servile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' laborious work on that day.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But you shall offer an offering made by fire to the Lord for seven days; on the seventh day is a holy convocation; you shall do no servile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' laborious work on that day.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And the Lord said to Moses,'
