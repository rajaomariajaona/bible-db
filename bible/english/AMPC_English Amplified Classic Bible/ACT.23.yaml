document_id: ACT.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEN PAUL, gazing earnestly at the council (Sanhedrin), said, Brethren, I have lived before God, doing my duty with a perfectly good conscience until this very day [as a citizen, a true and loyal Jew].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the strife became more and more tense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violent, the commandant, fearing that Paul would be torn in pieces by them, ordered the troops to go down and take him forcibly from among them and conduct him back into the barracks.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [that same] following night the Lord stood beside Paul and said, Take courage, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul,
    - type: text
      text: ' for as you have borne faithful witness concerning Me at Jerusalem, so you must also bear witness at Rome.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now when daylight came, the Jews formed a plot and bound themselves by an oath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under a curse neither to eat nor drink till they had done away with Paul.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There were more than forty [men of them], who formed this conspiracy [swearing together this oath and curse].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they went to the chief priests and elders, saying, We have strictly bound ourselves by an oath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under a curse not to taste any food until we have slain Paul.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now you, along with the council (Sanhedrin), give notice to the commandant to bring [Paul] down to you, as if you were going to investigate his case more accurately. But we [ourselves] are ready to slay him before he comes near.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the son of Paul''s sister heard of their intended attack, and he went and got into the barracks and told Paul.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Paul, calling in one of the centurions, said, Take this young man to the commandant, for he has something to report to him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So he took him and conducted him to the commandant and said, Paul the prisoner called me to him and requested me to conduct this young man to you, for he has something to report to you.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The commandant took him by the hand, and going aside with him, asked privately, What is it that you have to report to me?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At this the high priest Ananias ordered those who stood near him to strike him on the mouth.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he replied, The Jews have agreed to ask you to bring Paul down to the council (Sanhedrin) tomorrow, as if [they were] intending to examine him more exactly.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But do not yield to their persuasion, for more than forty of their men are lying in ambush waiting for him, having bound themselves by an oath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under a curse neither to eat nor drink till they have killed him; and even now they are all ready, [just] waiting for your promise.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the commandant sent the youth away, charging him, Do not disclose to anyone that you have given me this information.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then summoning two of the centurions, he said, Have two hundred footmen ready by the third hour of the night (about 9:00 p.m.) to go as far as Caesarea, with seventy horsemen and two hundred spearmen.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also provide beasts for mounts for Paul to ride, and bring him in safety to Felix the governor.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he wrote a letter having this message:'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Claudius Lysias sends greetings to His Excellency Felix the governor.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This man was seized [as prisoner] by the Jews, and was about to be killed by them when I came upon them with the troops and rescued him, because I learned that he is a Roman citizen.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And wishing to know the exact accusation which they were making against him, I brought him down before their council (Sanhedrin),'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Where] I found that he was charged in regard to questions of their own law, but he was accused of nothing that would call for death or [even] for imprisonment.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Paul said to him, God is about to strike you, you whitewashed wall! Do you sit as a judge to try me in accordance with the Law, and yet in defiance of the Law you order me to be struck?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [However] when it was pointed out to me that there would be a conspiracy against the man, I sent him to you immediately, directing his accusers also to present before you their charge against him.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the soldiers, in compliance with their instructions, took Paul and conducted him during the night to Antipatris.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the next day they returned to the barracks, leaving the mounted men to proceed with him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When these came to Caesarea and gave the letter to the governor, they also presented Paul before him.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Having read the letter, he asked to what province [Paul] belonged. When he discovered that he was from Cilicia [an imperial province],'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, I will hear your case fully when your accusers also have come. And he ordered that an eye be kept on him in Herod''s palace (the Praetorium).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those who stood near exclaimed, Do you rail at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insult the high priest of God?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Paul said, I was not conscious, brethren, that he was a high priest; for the Scripture says, You shall not speak ill of a ruler of your people. [Exod. 22:28.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Paul, when he perceived that one part of them were Sadducees and the other part Pharisees, cried out to the council (Sanhedrin), Brethren, I am a Pharisee, a son of Pharisees; it is with regard to the hope and the resurrection of the dead that I am indicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' being judged.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So when he had said this, an angry dispute arose between the Pharisees and the Sadducees; and the whole [crowded] assemblage was divided [into two factions].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Sadducees hold that there is no resurrection, nor angel nor spirit, but the Pharisees declare openly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' speak out freely, acknowledging [their belief in] them both.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then a great uproar ensued, and some of the scribes of the Pharisees'' party stood up and thoroughly fought the case, [contending fiercely] and declaring, We find nothing evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' wrong in this man. But if a spirit or an angel [really] spoke to him–? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let us not fight against God!
