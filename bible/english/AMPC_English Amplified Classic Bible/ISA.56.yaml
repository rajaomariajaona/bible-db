document_id: ISA.56
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord: Keep justice, do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' use righteousness (conformity to the will of God which brings salvation), for My salvation is soon to come and My righteousness (My rightness and justice) to be revealed. [Isa. 62:1, 11; Matt. 3:2; Luke 21:31; Rom. 13:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Blessed, happy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortunate is the man who does this, and the son of man who lays hold of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' binds himself fast to it, who keeps sacred the Sabbath so as not to profane it, and keeps his hand from doing any evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let not the foreigner who has joined himself to the Lord say, The Lord will surely separate me from His people. And let not the eunuch say, Behold, I am a dry tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For thus says the Lord: To the eunuchs who keep My Sabbaths and choose the things which please Me and hold firmly My covenant–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' To them I will give in My house and within My walls a memorial and a name better [and more enduring] than sons and daughters; I will give them an everlasting name that will not be cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Also the foreigners who join themselves to the Lord to minister to Him and to love the name of the Lord and to be His servants, everyone who keeps the Sabbath so as not to profane it and who holds fast My covenant [by conscientious obedience]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All these I will bring to My holy mountain and make them joyful in My house of prayer. Their burnt offerings and their sacrifices will be accepted on My altar; for My house will be called a house of prayer for all peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Thus says the Lord God, Who gathers the outcasts of Israel: I will gather yet others to [Israel] besides those already gathered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' All you beasts of the field, come to devour, all you beasts (hostile nations) in the forest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [Israel''s] watchmen are blind, they are all without knowledge; they are all dumb dogs, they cannot bark; dreaming, lying down, they love to slumber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Yes, the dogs are greedy; they never have enough. And such are the shepherds who cannot understand; they have all turned to their own way, each one to his own gain, from every quarter [one and all].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Come, say they, We will fetch wine, and we will fill ourselves with strong drink! And tomorrow shall be as this day, a day great beyond measure.'
