document_id: 1CH.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THESE ARE the sons of Israel: Reuben, Simeon, Levi, Judah, Issachar, Zebulun,'
  '10':
  - type: text
    content: ' Ram was the father of Amminadab, and Amminadab of Nahshon, prince of the sons of Judah.'
  '11':
  - type: text
    content: ' Nahshon was the father of Salma, Salma of Boaz,'
  '12':
  - type: text
    content: ' Boaz of Obed, and Obed of Jesse.'
  '13':
  - type: text
    content: ' Jesse was the father of Eliab his firstborn, Abinadab second, Shimea third,'
  '14':
  - type: text
    content: ' Nethanel fourth, Raddai fifth,'
  '15':
  - type: text
    content: ' Ozem sixth, David seventh.'
  '16':
  - type: text
    content: ' Their sisters were Zeruiah and Abigail. The sons of Zeruiah: Abishai, Joab, and Asahel, three.'
  '17':
  - type: text
    content: ' Abigail bore Amasa, and the father of Amasa was Jether the Ishmaelite.'
  '18':
  - type: text
    content: ' And Caleb son of Hezron had sons by his wife Azubah and by Jerioth. [Azubah''s] sons were: Jesher, Shobab, and Ardon.'
  '19':
  - type: text
    content: ' Azubah died, and Caleb married Ephrath, who bore him Hur.'
  '2':
  - type: text
    content: ' Dan, Joseph, Benjamin, Naphtali, Gad, and Asher.'
  '20':
  - type: text
    content: ' Hur was the father of Uri, and Uri of Bezalel [the skillful craftsman who made the furnishings of the tabernacle]. [Exod. 31:2-5.]'
  '21':
  - type: text
    content: ' Later, when Hezron was sixty years old, he married the daughter of Machir the father of Gilead, and she bore him Segub.'
  '22':
  - type: text
    content: ' Segub was the father of Jair, who had twenty-three cities in the land of Gilead.'
  '23':
  - type: text
    content: ' But Geshur and Aram took from them Havvoth-jair, with Kenath and its villages, sixty towns. All these were the descendants of Machir the father of Gilead.'
  '24':
  - type: text
    content: ' After Hezron died in Caleb-ephrathah, Abiah, Hezron''s wife, bore to him Ashhur the father of Tekoa.'
  '25':
  - type: text
    content: ' The sons of Jerahmeel the firstborn of Hezron: Ram the firstborn, Bunah, Oren, Ozem, and Ahijah.'
  '26':
  - type: text
    content: ' Jerahmeel had another wife, named Atarah; she was the mother of Onam.'
  '27':
  - type: text
    content: ' The sons of Ram the firstborn of Jerahmeel were: Maaz, Jamin, and Eker.'
  '28':
  - type: text
    content: ' The sons of Onam: Shammai and Jada. The sons of Shammai: Nadab and Abishur.'
  '29':
  - type: text
    content: ' Abishur''s wife was Abihail; she bore him Ahban and Molid.'
  '3':
  - type: text
    content: ' The sons of Judah: Er, Onan, and Shelah, whom Shua''s daughter the Canaanitess bore him. Er, Judah''s eldest, was evil in the Lord''s sight, and He slew him.'
  '30':
  - type: text
    content: ' The sons of Nadab: Seled and Appaim. Seled died childless.'
  '31':
  - type: text
    content: ' The son of Appaim: Ishi. The son of Ishi: Sheshan. The son of Sheshan: Ahlai.'
  '32':
  - type: text
    content: ' The sons of Jada the brother of Shammai: Jether and Jonathan. Jether died childless.'
  '33':
  - type: text
    content: ' The sons of Jonathan: Peleth and Zaza. These were the descendants of Jerahmeel.'
  '34':
  - type: text
    content: ' Sheshan had no sons–only daughters. But Sheshan had a servant, an Egyptian, whose name was Jarha.'
  '35':
  - type: text
    content: ' Sheshan gave his daughter to Jarha his servant as wife; she bore him Attai.'
  '36':
  - type: text
    content: ' Attai was the father of Nathan, and Nathan of Zabad.'
  '37':
  - type: text
    content: ' Zabad was the father of Ephlal, and Ephlal of Obed.'
  '38':
  - type: text
    content: ' Obed was the father of Jehu, and Jehu of Azariah.'
  '39':
  - type: text
    content: ' Azariah was the father of Helez, and Helez of Eleasah.'
  '4':
  - type: text
    content: ' Tamar, Judah''s daughter-in-law, bore him Pharez and Zerah. All Judah''s sons were five.'
  '40':
  - type: text
    content: ' Eleasah was the father of Sismai, and Sismai of Shallum.'
  '41':
  - type: text
    content: ' Shallum was the father of Jekamiah, and Jekamiah of Elishama.'
  '42':
  - type: text
    content: ' The sons of Caleb the brother of Jerahmeel: Mesha his firstborn was the father of Ziph; and his son Mareshah [he was] the father of Hebron.'
  '43':
  - type: text
    content: ' The sons of Hebron: Korah, Tappuah, Rekem, and Shema.'
  '44':
  - type: text
    content: ' Shema was the father of Raham, the father of Jorkeam. And Rekem was the father of Shammai.'
  '45':
  - type: text
    content: ' The son of Shammai was Maon; Maon''s son was Beth-zur.'
  '46':
  - type: text
    content: ' Ephah, Caleb''s concubine, bore Haran, Moza, and Gazez; Haran was the father of Gazez.'
  '47':
  - type: text
    content: ' The sons of Jahdai: Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph.'
  '48':
  - type: text
    content: ' Maacah, Caleb''s concubine, bore Sheber and Tirhanah, and also'
  '49':
  - type: text
    content: ' Shaaph the father of Madmannah and Sheva the father of Machbenah and of Gibea; and the daughter of Caleb was Achsah.'
  '5':
  - type: text
    content: ' The sons of Pharez: Hezron and Hamul.'
  '50':
  - type: text
    content: ' These were the descendants of Caleb. The sons of Hur the firstborn of Ephrathah: Shobal the father of Kiriath-jearim,'
  '51':
  - type: text
    content: ' Salma the father of Bethlehem, and Hareph the father of Beth-gader.'
  '52':
  - type: text
    content: ' Shobal the father of Kiriath-jearim had [other] descendants: Haroeh, half [of the inhabitants] of Menuhoth [in Judah],'
  '53':
  - type: text
    content: ' And the families of Kiriath-jearim: the Ithrites, Puthites, Shumathites, and Mishraites. From these came the Zorathites and the Eshtaolites.'
  '54':
  - type: text
    content: ' The descendants of Salma: Bethlehem, the Netophathites, Atroth-beth-joab, and half of the Manahathites, [and] the Zorites,'
  '55':
  - type: text
    content: ' And the families of scribes who dwelt at Jabez: the Tirathites, Shimeathites, and Sucathites. These are the Kenites who came from Hammath, the father of the house of Rechab.'
  '6':
  - type: text
    content: ' The sons of Zerah: Zimri, Ethan, Heman, Calcol, and Dara–five in all. [I Kings 4:31.]'
  '7':
  - type: text
    content: ' The son of Carmi: Achar, the troubler of Israel, who transgressed in the matter of the devoted things. [Josh. 7:1.]'
  '8':
  - type: text
    content: ' The son of Ethan: Azariah.'
  '9':
  - type: text
    content: ' The sons of Hezron who were born to him: Jerahmeel, Ram, and Chelubai (that is, Caleb).'
