document_id: SNG.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [SHE SAID] I am only a little rose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' autumn crocus of the plain of Sharon, or a [humble] lily of the valleys [that grows in deep and difficult places].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My beloved speaks and says to me, Rise up, my love, my fair one, and come away.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For, behold, the winter is past; the rain is over and gone.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The flowers appear on the earth; the time of the singing [of birds] has come, and the voice of the turtledove is heard in our land.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fig tree puts forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ripens her green figs, and the vines are in blossom and give forth their fragrance. Arise, my love, my fair one, and come away.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [So I went with him, and when we were climbing the rocky steps up the hillside, my beloved shepherd said to me] O my dove, [while you are here] in the seclusion of the clefts in the solid rock, in the sheltered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret place of the cliff, let me see your face, let me hear your voice; for your voice is sweet, and your face is lovely.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [My heart was touched and I fervently sang to him my desire] Take for us the foxes, the little foxes that spoil the vineyards [of our love], for our vineyards are in blossom.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [She said distinctly] My beloved is mine and I am his! He pastures his flocks among the lilies. [Matt. 10:32; Acts 4:12.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Then, longingly addressing her absent shepherd, she cried] Until the day breaks and the shadows flee away, return hastily, O my beloved, and be like a gazelle or a young hart as you cover the mountains [which separate us].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Solomon replied, Like the lily among thorns, so are you, my love, among the daughters.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Like an apple tree among the trees of the wood, so is my beloved [shepherd] among the sons [cried the girl]! Under his shadow I delighted to sit, and his fruit was sweet to my taste.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He brought me to the banqueting house, and his banner over me was love [for love waved as a protecting and comforting banner over my head when I was near him].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sustain me with raisins, refresh me with apples, for I am sick with love.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [I can feel] his left hand under my head and his right hand embraces me! [Deut. 33:27; Matt. 28:20.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [He said] I charge you, O you daughters of Jerusalem, by the gazelles or by the hinds of the field [which are free to follow their own instincts] that you not try to stir up or awaken [my] love until it pleases.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Vividly she pictured it] The voice of my beloved [shepherd]! Behold, he comes, leaping upon the mountains, bounding over the hills. [John 10:27.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My beloved is like a gazelle or a young hart. Behold, he stands behind the wall of our house, he looks in through the windows, he glances through the lattice.'
