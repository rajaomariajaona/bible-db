document_id: NUM.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN CAME the daughters of Zelophehad son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the families of Manasseh son of Joseph. The names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They stood before Moses, Eleazar the priest, and the leaders, and all the congregation at the door of the Tent of Meeting, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Our father died in the wilderness. He was not among those who assembled together against the Lord in the company of Korah, but died for his own sin [as did all those who rebelled at Kadesh], and he had no sons. [Num. 14:26-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Why should the name of our father be removed from his family because he had no son? Give to us a possession among our father''s brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Moses brought their case before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The daughters of Zelophehad are justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speak correctly. You shall surely give them an inheritance among their father''s brethren, and you shall cause their father''s inheritance to pass to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And say to the Israelites, If a man dies and has no son, you shall cause his inheritance to pass to his daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If he has no daughter, you shall give his inheritance to his brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' If he has no brethren, give his inheritance to his father''s brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And if his father has no brethren, then give his inheritance to his next of kin, and he shall possess it. It shall be to the Israelites a statute and ordinance, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord said to Moses, Go up into this mountain of Abarim and behold the land I have given to the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when you have seen it, you also shall be gathered to your [departed] people as Aaron your brother was gathered,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For you disobeyed My order in the Wilderness of Zin during the strife of the congregation to uphold My sanctity [by strict obedience to My authority] at the waters before their eyes. [These are the waters of Meribah in Kadesh in the Wilderness of Zin]. [Num. 20:10-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Moses said to the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let the Lord, the God of the spirits of all flesh, set a man over the congregation'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Who shall go out and come in before them, leading them out and bringing them in, that the congregation of the Lord may not be as sheep which have no shepherd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Lord said to Moses, Take Joshua son of Nun, a man in whom is the Spirit, and lay your hand upon him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And set him before Eleazar the priest and all the congregation and give him a charge in their sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And put some of your honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority upon him, that all the congregation of the Israelites may obey him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He shall stand before Eleazar the priest, who shall inquire for him before the Lord by the judgment of the Urim [one of two articles in the priest''s breastplate worn when asking counsel of the Lord for the people]. At Joshua''s word the people shall go out and come in, both he and all the Israelite congregation with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Moses did as the Lord commanded him. He took Joshua and set him before Eleazar the priest and all the congregation,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he laid his hands upon him and commissioned him, as the Lord commanded through Moses.'
