document_id: NUM.27,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN CAME the daughters of Zelophehad son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the families of Manasseh son of Joseph. The names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah.'
  '10':
  - type: text
    content: ' If he has no brethren, give his inheritance to his father''s brethren.'
  '11':
  - type: text
    content: ' And if his father has no brethren, then give his inheritance to his next of kin, and he shall possess it. It shall be to the Israelites a statute and ordinance, as the Lord commanded Moses.'
  '12':
  - type: text
    content: ' And the Lord said to Moses, Go up into this mountain of Abarim and behold the land I have given to the Israelites.'
  '13':
  - type: text
    content: ' And when you have seen it, you also shall be gathered to your [departed] people as Aaron your brother was gathered,'
  '14':
  - type: text
    content: ' For you disobeyed My order in the Wilderness of Zin during the strife of the congregation to uphold My sanctity [by strict obedience to My authority] at the waters before their eyes. [These are the waters of Meribah in Kadesh in the Wilderness of Zin]. [Num. 20:10-12.]'
  '15':
  - type: text
    content: ' And Moses said to the Lord,'
  '16':
  - type: text
    content: ' Let the Lord, the God of the spirits of all flesh, set a man over the congregation'
  '17':
  - type: text
    content: ' Who shall go out and come in before them, leading them out and bringing them in, that the congregation of the Lord may not be as sheep which have no shepherd.'
  '18':
  - type: text
    content: ' The Lord said to Moses, Take Joshua son of Nun, a man in whom is the Spirit, and lay your hand upon him;'
  '19':
  - type: text
    content: ' And set him before Eleazar the priest and all the congregation and give him a charge in their sight.'
  '2':
  - type: text
    content: ' They stood before Moses, Eleazar the priest, and the leaders, and all the congregation at the door of the Tent of Meeting, saying,'
  '20':
  - type: text
    content: ' And put some of your honor '
  - type: text
    content: and
  - type: text
    content: ' authority upon him, that all the congregation of the Israelites may obey him.'
  '21':
  - type: text
    content: ' He shall stand before Eleazar the priest, who shall inquire for him before the Lord by the judgment of the Urim [one of two articles in the priest''s breastplate worn when asking counsel of the Lord for the people]. At Joshua''s word the people shall go out and come in, both he and all the Israelite congregation with him.'
  '22':
  - type: text
    content: ' And Moses did as the Lord commanded him. He took Joshua and set him before Eleazar the priest and all the congregation,'
  '23':
  - type: text
    content: ' And he laid his hands upon him and commissioned him, as the Lord commanded through Moses.'
  '3':
  - type: text
    content: ' Our father died in the wilderness. He was not among those who assembled together against the Lord in the company of Korah, but died for his own sin [as did all those who rebelled at Kadesh], and he had no sons. [Num. 14:26-35.]'
  '4':
  - type: text
    content: ' Why should the name of our father be removed from his family because he had no son? Give to us a possession among our father''s brethren.'
  '5':
  - type: text
    content: ' Moses brought their case before the Lord.'
  '6':
  - type: text
    content: ' And the Lord said to Moses,'
  '7':
  - type: text
    content: ' The daughters of Zelophehad are justified '
  - type: text
    content: and
  - type: text
    content: ' speak correctly. You shall surely give them an inheritance among their father''s brethren, and you shall cause their father''s inheritance to pass to them.'
  '8':
  - type: text
    content: ' And say to the Israelites, If a man dies and has no son, you shall cause his inheritance to pass to his daughter.'
  '9':
  - type: text
    content: ' If he has no daughter, you shall give his inheritance to his brethren.'
