document_id: RUT.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN BOAZ went up to the city''s gate and sat down there, and behold, the kinsman of whom Boaz had spoken came by. He said to him, Ho! Turn aside and sit down here. So he turned aside and sat down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Boaz took ten men of the elders of the city and said, Sit down here. And they sat down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he said to the kinsman, Naomi, who has returned from the country of Moab, has sold the parcel of land which belonged to our brother Elimelech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And I thought to let you hear of it, saying, Buy it in the presence of those sitting here and before the elders of my people. If you will redeem it, redeem it; but if you will not redeem it, then say so, that I may know; for there is no one besides you to redeem it, and I am [next of kin] after you. And he said, I will redeem it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Boaz said, The day you buy the field of Naomi, you must buy also Ruth the Moabitess, the widow of the dead man, to restore the name of the dead to his inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the kinsman said, I cannot redeem it for myself, lest [by marrying a Moabitess] I endanger my own inheritance. Take my right of redemption yourself, for I cannot redeem it. [Deut. 23:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now formerly in Israel this was the custom concerning redeeming and exchanging. To confirm a transaction, a man pulled off his sandal and gave it to the other. This was the way of attesting in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore, when the kinsman said to Boaz, Buy it for yourself, he pulled off his sandal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Boaz said to the elders and to all the people, You are witnesses this day that I have bought all that was Elimelech''s and all that was Chilion''s and Mahlon''s from the hand of Naomi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Also Ruth the Moabitess, the widow of Mahlon, I have bought to be my wife to restore the name of the dead to his inheritance, that the name of the dead may not be cut off from among his brethren and from the gate of his birthplace. You are witnesses this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And all the people at the gate and the elders said, We are witnesses. May the Lord make the woman who is coming into your house like Rachel and Leah, the two who built the household of Israel. May you do worthily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' get wealth (power) in Ephratah and be famous in Bethlehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And let your house be like the house of Perez, whom Tamar bore to Judah, because of the offspring which the Lord will give you by this young woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So Boaz took Ruth and she became his wife. And he went in to her, and the Lord caused her to conceive, and she bore a son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the women said to Naomi, Blessed be the Lord, Who has not left you this day without a close kinsman, and may his name be famous in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And may he be to you a restorer of life and a nourisher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supporter in your old age, for your daughter-in-law who loves you, who is better to you than seven sons, has borne him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Naomi took the child and laid him in her bosom and became his nurse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And her neighbor women gave him a name, saying, A son is born to Naomi. They named him Obed. He was the father of Jesse, the father of David [the ancestor of Jesus Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now these are the descendants of Perez: Perez was the father of Hezron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Hezron of Ram, Ram of Amminadab,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Amminadab of Nahshon, Nahshon of Salmon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Salmon of Boaz, Boaz of Obed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Obed of Jesse, and Jesse of David [the ancestor of Jesus Christ].'
