document_id: LEV.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Just as these are taken off of the bull of the sacrifice of the peace offerings; and the priest shall burn them on the altar of burnt offering.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But the hide of the bull and all its flesh, its head, its legs, its entrails, and its dung,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Even the whole bull shall he carry forth without the camp to a clean place, where the ashes are poured out, and burn it on a fire of wood, there where the ashes are poured out. [Heb. 13:11-13.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' If the whole congregation of Israel sins unintentionally, and it be hidden from the eyes of the assembly, and they have done what the Lord has commanded not to be done and are guilty,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' When the sin which they have committed becomes known, then the congregation shall offer a young bull for a sin offering and bring it before the Tent of Meeting.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The elders of the congregation shall lay their hands upon the head of the bull before the Lord, and the bull shall be killed before the Lord.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The anointed priest shall bring some of the bull''s blood to the Tent of Meeting,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And shall dip his finger in the blood, and sprinkle it seven times before the Lord, before the veil [which screens the ark of the covenant].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He shall put some of the blood on the horns of the altar [of incense] which is before the Lord in the Tent of Meeting, and he shall pour out all the blood at the base of the altar of burnt offering near the door of the Tent of Meeting.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And he shall take all its fat from the bull and burn it on the altar.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Say to the Israelites, If anyone shall sin through error '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unwittingly in any of the things which the Lord has commanded not to be done, and shall do any one of them–'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Thus shall he do with the bull; as he did with the bull for a sin offering, so shall he do with this; and the priest shall make atonement for [the people], and they shall be forgiven.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And he shall carry forth the bull outside the camp and burn it as he burned the first bull; it is the sin offering for the congregation.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' When a ruler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leader sins and unwittingly does any one of the things the Lord his God has forbidden, and is guilty,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' If his sin which he has committed be known to him, he shall bring as his offering a goat, a male without blemish.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' He shall lay his hand on the head of the goat and kill it in the place where they kill the burnt offering before the Lord; it is a sin offering.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and pour the rest of its blood at the base of the altar of burnt offering.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And he shall burn all its fat upon the altar like the fat of the sacrifice of peace offerings; so the priest shall make atonement for him for his sin, and it shall be forgiven him.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' If any one of the common people sins unwittingly in doing anything the Lord has commanded not to be done, and is guilty,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' When the sin which he has committed is made known to him, he shall bring for his offering a goat, a female without blemish, for his sin which he has committed.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The offender shall lay his hand on the head of the sin offering and kill [it] at the place of the burnt offering.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' If it is the anointed priest who sins, thus bringing guilt on the people, then let him offer for his sin which he has committed a young bull without blemish to the Lord as a sin offering. [Heb. 7:27, 28.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And the priest shall take some of its blood with his finger and put it on the horns of the altar of burnt offering and shall pour out the rest of its blood at the base of the altar.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And all the fat of it he shall take away, as the fat is taken away from off the sacrifice of peace offerings; and the priest shall burn it on the altar for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance to the Lord; and the priest shall make atonement for [the man], and he shall be forgiven.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' If he brings a lamb as his sin offering, he shall bring a female without blemish.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' He shall lay his hand upon the head of the sin offering and kill it in the place where they kill the burnt offering.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And the priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and all the rest of the blood of the lamb he shall pour out at the base of the altar.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And he shall take away all the fat of it, just as the fat of the lamb is removed from the sacrifice of the peace offerings; and the priest shall burn it on the altar upon the offerings made by fire to the Lord; and the priest shall make atonement for the sin which the man has committed, and he shall be forgiven. [Heb. 9:13, 14.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He shall bring the bull to the door of the Tent of Meeting before the Lord, and shall lay [both] his hands on the bull''s head and kill [it] before the Lord.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the anointed priest shall take some of the bull''s blood and bring it into the Tent of Meeting;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And the priest shall dip his finger in the blood and sprinkle some of [it] seven times before the Lord before the veil of the sanctuary.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And the priest shall put some of the blood on the horns of the altar of sweet incense before the Lord which is in the Tent of Meeting; and all the rest of the blood of the bull shall he pour out at the base of the altar of the burnt offering at the door of the Tent of Meeting.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And all the fat of the bull for the sin offering he shall take off of it–the fat that covers and is on the entrails,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And the two kidneys and the fat that is on them at the loins, and the appendage of the liver, which he shall take away with the kidneys–'
