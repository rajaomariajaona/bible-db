document_id: NEH.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT WHEN Sanballat heard that we were building the wall, he was angry and in a great rage, and he ridiculed the Jews.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And [the leaders of] Judah said, The strength of the burden bearers is weakening, and there is much rubbish; we are not able to work on the wall.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And our enemies said, They will not know or see till we come into their midst and kill them and stop the work.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And when the Jews who lived near them came, they said to us ten times, You must return [to guard our little villages]; from all places where they dwell they will be upon us.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' So I set [armed men] behind the wall in places where it was least protected; I even thus used the people as families with their swords, spears, and bows.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I looked [them over] and rose up and said to the nobles and officials and the other people, Do not be afraid of the enemy; [earnestly] remember the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imprint Him [on your minds], great and terrible, and [take from Him courage to] fight for your brethren, your sons, your daughters, your wives, and your homes.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And when our enemies heard that their plot was known to us and that God had frustrated their purpose, we all returned to the wall, everyone to his work.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And from that time forth, half of my servants worked at the task, and the other half held the spears, shields, bows, and coats of mail; and the leaders stood behind all the house of Judah.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Those who built the wall and those who bore burdens loaded themselves so that everyone worked with one hand and held a weapon with the other hand,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And every builder had his sword girded by his side, and so worked. And he who sounded the trumpet was at my side.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And I said to the nobles and officials and the rest of the people, The work is great and scattered, and we are separated on the wall, one far from another.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And he said before his brethren and the army of Samaria, What are these feeble Jews doing? Will they restore things [at will and by themselves]? Will they [try to bribe their God] with sacrifices? Will they finish up in a day? Will they revive the stones out of the heaps of rubbish, seeing they are burned?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' In whatever place you hear the sound of the trumpet, rally to us there. Our God will fight for us.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' So we labored at the work while half of them held the spears from dawn until the stars came out.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' At that time also I said to the people, Let everyone with his servant lodge within Jerusalem, that at night they may be a guard to us and a laborer during the day.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So none of us–I, my kinsmen, my servants, nor the men of the guard who followed me–took off our clothes; each kept his weapon [in his hand for days].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Now Tobiah the Ammonite was near him, and he said, What they build–if a fox climbs upon it, he will break down their stone wall.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' [And Nehemiah prayed] Hear, O our God, for we are despised. Turn their taunts upon their own heads, and give them for a prey in a land of their captivity.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Cover not their iniquity and let not their sin be blotted out before You, for they have vexed [with alarm] the builders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoked You.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So we built the wall, and all [of it] was joined together to half its height, for the people had a heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind to work.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But when Sanballat, Tobiah, the Arabians, Ammonites, and Ashdodites heard that the walls of Jerusalem were going up and that the breaches were being closed, they were very angry.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And they all plotted together to come and fight against Jerusalem, to injure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cause confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' failure in it.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But because of them we made our prayer to our God and set a watch against them day and night.'
