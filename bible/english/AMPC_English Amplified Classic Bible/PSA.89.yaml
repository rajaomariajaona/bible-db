document_id: PSA.89,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A skillful song, {or} a didactic {or} reflective poem, of Ethan the Ezrahite.
  - type: text
    content: ' I WILL sing of the mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness of the Lord forever; with my mouth will I make known Your faithfulness from generation to generation.'
  '10':
  - type: text
    content: ' You have broken Rahab (Egypt) in pieces; with Your mighty arm You have scattered Your enemies.'
  '11':
  - type: text
    content: ' The heavens are Yours, the earth also is Yours; the world and all that is in it, You have founded them.'
  '12':
  - type: text
    content: ' The north and the south, You have created them; Mount Tabor and Mount Hermon joyously praise Your name.'
  '13':
  - type: text
    content: ' You have a mighty arm; strong is Your hand, Your right hand is soaring high.'
  '14':
  - type: text
    content: ' Righteousness and justice are the foundation of Your throne; mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and truth go before Your face.'
  '15':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) are the people who know the joyful sound [who understand and appreciate the spiritual blessings symbolized by the feasts]; they walk, O Lord, in the light '
  - type: text
    content: and
  - type: text
    content: ' favor of Your countenance!'
  '16':
  - type: text
    content: ' In Your name they rejoice all the day, and in Your righteousness they are exalted.'
  '17':
  - type: text
    content: ' For You are the glory of their strength [their proud adornment], and by Your favor our horn is exalted '
  - type: text
    content: and
  - type: text
    content: ' we walk with uplifted faces!'
  '18':
  - type: text
    content: ' For our shield belongs to the Lord, and our king to the Holy One of Israel.'
  '19':
  - type: text
    content: ' Once You spoke in a vision to Your devoted ones and said, I have endowed one who is mighty [a hero, giving him the power to help–to be a champion for Israel]; I have exalted one chosen from among the people.'
  '2':
  - type: text
    content: ' For I have said, Mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness shall be built up forever; Your faithfulness will You establish in the very heavens [unchangeable and perpetual].'
  '20':
  - type: text
    content: ' I have found David My servant; with My holy oil have I anointed him, [Acts 13:22.]'
  '21':
  - type: text
    content: ' With whom My hand shall be established '
  - type: text
    content: and
  - type: text
    content: ' ever abide; My arm also shall strengthen him.'
  '22':
  - type: text
    content: ' The enemy shall not exact from him '
  - type: text
    content: or
  - type: text
    content: ' do him violence '
  - type: text
    content: or
  - type: text
    content: ' outwit him, nor shall the wicked afflict '
  - type: text
    content: and
  - type: text
    content: ' humble him.'
  '23':
  - type: text
    content: ' I will beat down his foes before his face and smite those who hate him.'
  '24':
  - type: text
    content: ' My faithfulness and My mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness shall be with him, and in My name shall his horn be exalted [great power and prosperity shall be conferred upon him].'
  '25':
  - type: text
    content: ' I will set his hand in control also on the [Mediterranean] Sea, and his right hand on the rivers [Euphrates with its tributaries].'
  '26':
  - type: text
    content: ' He shall cry to Me, You are my Father, my God, and the Rock of my salvation!'
  '27':
  - type: text
    content: ' Also I will make him the firstborn, the highest of the kings of the earth. [Rev. 1:5.]'
  '28':
  - type: text
    content: ' My mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness will I keep for him forevermore, and My covenant shall stand fast '
  - type: text
    content: and
  - type: text
    content: ' be faithful with him.'
  '29':
  - type: text
    content: ' His Offspring also will I make to endure forever, and his throne as the days of heaven. [Isa. 9:7; Gal. 3:16.]'
  '3':
  - type: text
    content: ' [You have said] I have made a covenant with My chosen one, I have sworn to David My servant,'
  '30':
  - type: text
    content: ' If his children forsake My law and walk not in My ordinances,'
  '31':
  - type: text
    content: ' If they break '
  - type: text
    content: or
  - type: text
    content: ' profane My statutes and keep not My commandments,'
  '32':
  - type: text
    content: ' Then will I punish their transgression with the rod [of chastisement], and their iniquity with stripes. [II Sam. 7:14.]'
  '33':
  - type: text
    content: ' Nevertheless, My loving-kindness will I not break off from him, nor allow My faithfulness to fail [to lie and be false to him].'
  '34':
  - type: text
    content: ' My covenant will I not break '
  - type: text
    content: or
  - type: text
    content: ' profane, nor alter the thing that is gone out of My lips.'
  '35':
  - type: text
    content: ' Once [for all] have I sworn by My holiness, which cannot be violated; I will not lie to David:'
  '36':
  - type: text
    content: ' His Offspring shall endure forever, and his throne [shall continue] as the sun before Me. [Isa. 9:7; Gal. 3:16.]'
  '37':
  - type: text
    content: ' It shall be established forever as the moon, the faithful witness in the heavens. Selah [pause, and calmly think of that]! [Rev. 1:5; 3:14.]'
  '38':
  - type: text
    content: ' But [in apparent contradiction to all this] You [even You the faithful Lord] have cast off and rejected; You have been full of wrath against Your anointed.'
  '39':
  - type: text
    content: ' You have despised '
  - type: text
    content: and
  - type: text
    content: ' loathed and renounced the covenant with Your servant; You have profaned his crown by casting it to the ground.'
  '4':
  - type: text
    content: ' Your Seed I will establish forever, and I will build up your throne for all generations. Selah [pause, and calmly think of that]! [Isa. 9:7; Luke 1:32, 33; Gal. 3:16]'
  '40':
  - type: text
    content: ' You have broken down all his hedges '
  - type: text
    content: and
  - type: text
    content: ' his walls; You have brought his strongholds to ruin.'
  '41':
  - type: text
    content: ' All who pass along the road spoil '
  - type: text
    content: and
  - type: text
    content: ' rob him; he has become the scorn '
  - type: text
    content: and
  - type: text
    content: ' reproach of his neighbors.'
  '42':
  - type: text
    content: ' You have exalted the right hand of his foes; You have made all his enemies rejoice.'
  '43':
  - type: text
    content: ' Moreover, You have turned back the edge of his sword and have not made him to stand in battle.'
  '44':
  - type: text
    content: ' You have made his glory '
  - type: text
    content: and
  - type: text
    content: ' splendor to cease and have hurled to the ground his throne.'
  '45':
  - type: text
    content: ' The days of his youth have You shortened; You have covered him with shame. Selah [pause, and calmly think of that]!'
  '46':
  - type: text
    content: ' How long, O Lord? Will You hide Yourself forever? How long shall Your wrath burn like fire?'
  '47':
  - type: text
    content: ' O [earnestly] remember how short my time is '
  - type: text
    content: and
  - type: text
    content: ' what a mere fleeting life mine is. For what emptiness, falsity, futility, '
  - type: text
    content: and
  - type: text
    content: ' frailty You have created all men!'
  '48':
  - type: text
    content: ' What man can live and shall not see death, or can deliver himself from the [powerful] hand of Sheol (the place of the dead)? Selah [pause, and calmly consider that]!'
  '49':
  - type: text
    content: ' Lord, where are Your former loving-kindnesses [shown in the reigns of David and Solomon], which You swore to David in Your faithfulness?'
  '5':
  - type: text
    content: ' Let heaven (the angels) praise Your wonders, O Lord, Your faithfulness also in the assembly of the holy ones (the holy angels).'
  '50':
  - type: text
    content: ' Remember, Lord, '
  - type: text
    content: and
  - type: text
    content: ' earnestly imprint [on Your heart] the reproach of Your servants, scorned '
  - type: text
    content: and
  - type: text
    content: ' insulted, how I bear in my bosom the reproach of all the many '
  - type: text
    content: and
  - type: text
    content: ' mighty peoples,'
  '51':
  - type: text
    content: ' With which Your enemies have taunted, O Lord, with which they have mocked the footsteps of Your anointed.'
  '52':
  - type: text
    content: ' Blessed be the Lord forevermore! Amen and Amen.'
  '6':
  - type: text
    content: ' For who in the heavens can be compared to the Lord? Who among the mighty [heavenly beings] can be likened to the Lord,'
  '7':
  - type: text
    content: ' A God greatly feared '
  - type: text
    content: and
  - type: text
    content: ' revered in the council of the holy (angelic) ones, and to be feared '
  - type: text
    content: and
  - type: text
    content: ' worshipfully revered above all those who are round about Him?'
  '8':
  - type: text
    content: ' O Lord God of hosts, who is a mighty one like unto You, O Lord? And Your faithfulness is round about You [an essential part of You at all times].'
  '9':
  - type: text
    content: ' You rule the raging of the sea; when its waves arise, You still them.'
