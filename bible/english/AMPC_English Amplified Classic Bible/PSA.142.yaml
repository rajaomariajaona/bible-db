document_id: PSA.142
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A skillful song, {or} a didactic {or} reflective poem, of David; when he was in the cave. A Prayer.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I CRY to the Lord with my voice; with my voice to the Lord do I make supplication.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I pour out my complaint before Him; I tell before Him my trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When my spirit was overwhelmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fainted [throwing all its weight] upon me, then You knew my path. In the way where I walk they have hidden a snare for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Look on the right hand [the point of attack] and see; for there is no man who knows me [to appear for me]. Refuge has failed me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I have no way to flee; no man cares for my life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' my welfare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I cried to You, O Lord; I said, You are my refuge, my portion in the land of the living.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Attend to my loud cry, for I am brought very low; deliver me from my persecutors, for they are stronger than I.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Bring my life out of prison, that I may confess, praise, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to Your name; the righteous will surround me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crown themselves because of me, for You will deal bountifully with me.'
