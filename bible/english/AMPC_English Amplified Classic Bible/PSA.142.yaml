document_id: PSA.142,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A skillful song, {or} a didactic {or} reflective poem, of David; when he was in the cave. A Prayer.
  - type: text
    content: ' I CRY to the Lord with my voice; with my voice to the Lord do I make supplication.'
  '2':
  - type: text
    content: ' I pour out my complaint before Him; I tell before Him my trouble.'
  '3':
  - type: text
    content: ' When my spirit was overwhelmed '
  - type: text
    content: and
  - type: text
    content: ' fainted [throwing all its weight] upon me, then You knew my path. In the way where I walk they have hidden a snare for me.'
  '4':
  - type: text
    content: ' Look on the right hand [the point of attack] and see; for there is no man who knows me [to appear for me]. Refuge has failed me '
  - type: text
    content: and
  - type: text
    content: ' I have no way to flee; no man cares for my life '
  - type: text
    content: or
  - type: text
    content: ' my welfare.'
  '5':
  - type: text
    content: ' I cried to You, O Lord; I said, You are my refuge, my portion in the land of the living.'
  '6':
  - type: text
    content: ' Attend to my loud cry, for I am brought very low; deliver me from my persecutors, for they are stronger than I.'
  '7':
  - type: text
    content: ' Bring my life out of prison, that I may confess, praise, '
  - type: text
    content: and
  - type: text
    content: ' give thanks to Your name; the righteous will surround me '
  - type: text
    content: and
  - type: text
    content: ' crown themselves because of me, for You will deal bountifully with me.'
