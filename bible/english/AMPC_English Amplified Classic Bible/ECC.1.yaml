document_id: ECC.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORDS of the Preacher, the son of David and king in Jerusalem.'
  '10':
  - type: text
    content: ' Is there a thing of which it may be said, See, this is new? It has already been, in the vast ages of time [recorded or unrecorded] which were before us.'
  '11':
  - type: text
    content: ' There is no remembrance of former happenings '
  - type: text
    content: or
  - type: text
    content: ' men, neither will there be any remembrance of happenings of generations that are to come by those who are to come after them.'
  '12':
  - type: text
    content: ' I, the Preacher, have been king over Israel in Jerusalem.'
  '13':
  - type: text
    content: ' And I applied myself by heart '
  - type: text
    content: and
  - type: text
    content: ' mind to seek and search out by [human] wisdom all human activity under heaven. It is a miserable business which God has given to the sons of man with which to busy themselves.'
  '14':
  - type: text
    content: ' I have seen all the works that are done under the sun, and behold, all is vanity, a striving after the wind '
  - type: text
    content: and
  - type: text
    content: ' a feeding on wind.'
  '15':
  - type: text
    content: ' What is crooked cannot be made straight, and what is defective '
  - type: text
    content: and
  - type: text
    content: ' lacking cannot be counted.'
  '16':
  - type: text
    content: ' I entered into counsel with my own mind, saying, Behold, I have acquired great [human] wisdom, yes, more than all who have been over Jerusalem before me; and my mind has had great experience of [moral] wisdom and [scientific] knowledge.'
  '17':
  - type: text
    content: ' And I gave my mind to know [practical] wisdom and to discern [the character of] madness and folly [in which men seem to find satisfaction]; I perceived that this also is a searching after wind '
  - type: text
    content: and
  - type: text
    content: ' a feeding on it. [I Thess. 5:21.]'
  '18':
  - type: text
    content: ' For in much [human] wisdom is much vexation, and he who increases knowledge increases sorrow.'
  '2':
  - type: text
    content: ' Vapor of vapors '
  - type: text
    content: and
  - type: text
    content: ' futility of futilities, says the Preacher. Vapor of vapors '
  - type: text
    content: and
  - type: text
    content: ' futility of futilities! All is vanity (emptiness, falsity, and vainglory). [Rom. 8:20.]'
  '3':
  - type: text
    content: ' What profit does man have left from all his toil at which he toils under the sun? [Is life worth living?]'
  '4':
  - type: text
    content: ' One generation goes and another generation comes, but the earth remains forever. [Ps. 119:90.]'
  '5':
  - type: text
    content: ' The sun also rises and the sun goes down, and hastens to the place where it rises.'
  '6':
  - type: text
    content: ' The wind goes to the south and circles about to the north; it circles '
  - type: text
    content: and
  - type: text
    content: ' circles about continually, and on its circuit the wind returns again. [John 3:8.]'
  '7':
  - type: text
    content: ' All the rivers run into the sea, yet the sea is not full. To the place from which the rivers come, to there '
  - type: text
    content: and
  - type: text
    content: ' from there they return again.'
  '8':
  - type: text
    content: ' All things are weary with toil '
  - type: text
    content: and
  - type: text
    content: ' all words are feeble; man cannot utter it. The eye is not satisfied with seeing, nor the ear filled with hearing. [Prov. 27:20.]'
  '9':
  - type: text
    content: ' The thing that has been–it is what will be again, and that which has been done is that which will be done again; and there is nothing new under the sun.'
