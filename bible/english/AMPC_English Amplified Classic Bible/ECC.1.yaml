document_id: ECC.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORDS of the Preacher, the son of David and king in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Vapor of vapors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility of futilities, says the Preacher. Vapor of vapors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility of futilities! All is vanity (emptiness, falsity, and vainglory). [Rom. 8:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' What profit does man have left from all his toil at which he toils under the sun? [Is life worth living?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' One generation goes and another generation comes, but the earth remains forever. [Ps. 119:90.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The sun also rises and the sun goes down, and hastens to the place where it rises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The wind goes to the south and circles about to the north; it circles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' circles about continually, and on its circuit the wind returns again. [John 3:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All the rivers run into the sea, yet the sea is not full. To the place from which the rivers come, to there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from there they return again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' All things are weary with toil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all words are feeble; man cannot utter it. The eye is not satisfied with seeing, nor the ear filled with hearing. [Prov. 27:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The thing that has been–it is what will be again, and that which has been done is that which will be done again; and there is nothing new under the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Is there a thing of which it may be said, See, this is new? It has already been, in the vast ages of time [recorded or unrecorded] which were before us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' There is no remembrance of former happenings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' men, neither will there be any remembrance of happenings of generations that are to come by those who are to come after them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I, the Preacher, have been king over Israel in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I applied myself by heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind to seek and search out by [human] wisdom all human activity under heaven. It is a miserable business which God has given to the sons of man with which to busy themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I have seen all the works that are done under the sun, and behold, all is vanity, a striving after the wind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a feeding on wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' What is crooked cannot be made straight, and what is defective '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lacking cannot be counted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I entered into counsel with my own mind, saying, Behold, I have acquired great [human] wisdom, yes, more than all who have been over Jerusalem before me; and my mind has had great experience of [moral] wisdom and [scientific] knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I gave my mind to know [practical] wisdom and to discern [the character of] madness and folly [in which men seem to find satisfaction]; I perceived that this also is a searching after wind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a feeding on it. [I Thess. 5:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For in much [human] wisdom is much vexation, and he who increases knowledge increases sorrow.'
