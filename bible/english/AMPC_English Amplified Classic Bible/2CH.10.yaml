document_id: 2CH.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' REHOBOAM WENT to Shechem, for all Israel had gone to Shechem to make him king.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The young men who were brought up with him said to him, Tell the people who said to you, Your father made our yoke heavy, but you make it lighter: My little finger is thicker than my father''s loins.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For whereas my father put a heavy yoke upon you, I will add to your yoke. My father chastised you with whips, but I will chastise you with scorpions.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The third day Jeroboam and all the people returned to Rehoboam as he had said.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And the king answered them harshly, forsaking the counsel of the old men,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And answered them after the advice of the young men, saying, My father made your yoke heavy, but I will add to it; my father chastised you with whips, but I will chastise you with scorpions.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' So the king did not heed the people, for it was brought about of God, that the Lord might perform His word which He spoke by Ahijah the Shilonite to Jeroboam son of Nebat. [I Kings 11:29-39.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And when all Israel saw that the king would not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed them, they answered [him], What portion have we in David? We have no inheritance in the son of Jesse. Every man to your tents, O Israel! Now, David [tribe of Judah], see to your own house [under your tyrant King Rehoboam]! So all Israel went to their homes.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But as for the Israelites who dwelt in Judah''s cities, Rehoboam ruled over them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then King Rehoboam sent Hadoram, who was over the forced labor, and the Israelites stoned him and he died. But King Rehoboam hastened to get up to his royal chariot to flee to Jerusalem.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And Israel has rebelled against the house of David to this day.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Jeroboam the son of Nebat was in Egypt, where he had fled from the presence of King Solomon, when he heard about the new king; so Jeroboam returned from Egypt.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the people sent for him. So Jeroboam and all Israel came to Rehoboam, saying,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Your father [King Solomon] made our yoke grievous. So now make lighter the grievous service of your father and his heavy yoke that he put upon us, and we will serve you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Rehoboam replied, Come again to me after three days. And the people departed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' King Rehoboam took counsel with the old men who stood before Solomon his father while he was alive, saying, What counsel do you give me in reply to the people?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And they answered him, If you are kind to [these] people and please them and speak good words to them, they will be your servants forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But the king forsook the counsel which the old men gave him and took counsel with the young men who were brought up with him and stood before him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And he said to them, What answer do you advise that we give to the demand of [these] people, Make the yoke your father put upon us lighter?'
