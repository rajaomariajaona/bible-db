document_id: JOB.20,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN ZOPHAR the Naamathite answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The poor will oppress his children, and his hands will give back his [ill-gotten] wealth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' His bones are full of youthful energy, but it will lie down with him in the dust.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Though wickedness is sweet in his mouth, though he hides it under his tongue,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Though he is loath to let it go but keeps it still within his mouth,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yet his food turns [to poison] in his stomach; it is the venom of asps within him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He has swallowed down [his ill-gotten] riches, and he shall vomit them up again; God will cast them out of his belly.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He shall suck the poison of asps [which ill-gotten wealth contains]; the viper''s tongue shall slay him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He shall not look upon the rivers, the flowing streams of honey and butter [to enjoy his wealth].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' That which he labored for shall he give back and shall not swallow it down [to enjoy it]; according to his wealth shall the restitution be, and he shall not rejoice in it.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For he has oppressed and forsaken the poor; he has violently taken away a house which he did not build.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Therefore do my thoughts give me an answer, and I make haste [to offer it] for this reason.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Because his desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greed knew no quietness within him, he will not save anything of that in which he delights.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' There was nothing left that he did not devour; therefore his prosperity will not endure.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' In the fullness of his sufficiency [in the time of his great abundance] he shall be poor and in straits; every hand of everyone who is in misery shall come upon him [he is but a wretch on every side].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' When he is about to fill his belly [as in the wilderness when God sent the quails], God will cast the fierceness of His wrath upon him and will rain it upon him while he is eating. [Num. 11:33; Ps. 78:26-31.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' He will flee from the iron weapon, but the bow of bronze shall strike him through.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' [The arrow] is drawn forth and it comes out after passing through his body; yes, the glittering point comes out of his gall. Terrors march in upon him;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Every misfortune is laid up for his treasures. A fire not blown by man shall devour him; it shall consume what is left in his tent [and it shall go ill with him who remains there].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' The heavens shall reveal his iniquity, and the earth shall rise up against him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The produce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' increase of his house will go into exile [with the victors], dragged away in the day of [God''s] wrath.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' This is the wicked man''s portion from God, and the heritage appointed to him by God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I have heard the reproof which puts me to shame, but out of my understanding my spirit answers me.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Do you not know from of old, since the time that man was placed on the earth,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' That the triumphing of the wicked is short, and the joy of the godless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiled is but for a moment? [Ps. 37:35, 36.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Though his [proud] height mounts up to the heavens and his head reaches to the clouds,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Yet he will perish forever like his own dung; those who have seen him will say, Where is he?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He will fly away like a dream and will not be found; yes, he will be chased away as a vision of the night.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The eye which saw him will see him no more, neither will his [accustomed] place any more behold him.'
