document_id: EXO.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND YOU shall make an altar to burn incense upon; of acacia wood you shall make it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A cubit shall be its length and a cubit its breadth; its top shall be square and it shall be two cubits high. Its horns shall be of one piece with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall overlay it with pure gold, its top and its sides round about and its horns, and you shall make a crown (a rim or molding) of gold around it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You shall make two golden rings under the rim of it, on the two ribs on the two opposite sides of it; and they shall be holders for the poles with which to carry it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall make the poles of acacia wood, overlaid with gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall put the altar [of incense] in front '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' outside of the veil that screens the ark of the Testimony, before the mercy seat that is over the Testimony (the Law, the tables of stone), where I will meet with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Aaron shall burn on it incense of sweet spices; every morning when he trims '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fills the lamps he shall burn it. [Ps. 141:2; Rev. 5:8; 8:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when Aaron lights the lamps in the evening, he shall burn it, a perpetual incense before the Lord throughout your generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You shall offer no unholy incense on the altar nor burnt sacrifice nor cereal offering; and you shall pour no libation (drink offering) on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Aaron shall make atonement upon the horns of it once a year; with the blood of the sin offering of atonement once in the year shall he make atonement upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for it throughout your generations. It is most holy to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When you take the census of the Israelites, every man shall give a ransom for himself to the Lord when you number them, that no plague may fall upon them when you number them. [Rom. 8:1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' This is what everyone shall give as he joins those already numbered: a half shekel, in terms of the sanctuary shekel, a shekel being twenty gerahs; a half shekel as an offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Everyone from twenty years old and upward, as he joins those already numbered, shall give this offering to the Lord. [Matt. 10:24; I Pet. 1:18, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The rich shall not give more and the poor shall not give less than half a shekel when [you] give this offering to the Lord to make atonement for yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And you shall take the atonement money of the Israelites and use it [exclusively] for the service of the Tent of Meeting, that it may bring the Israelites to remembrance before the Lord, to make atonement for yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You shall also make a laver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' large basin of bronze, and its base of bronze, for washing; and you shall put it [outside in the court] between the Tent of Meeting and the altar [of burnt offering], and you shall put water in it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' There Aaron and his sons shall wash their hands and their feet. [Tit. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When they go into the Tent of Meeting, they shall wash with water, that they die not; or when they come near to the altar to minister, to burn an offering made by fire to the Lord, [John 13:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So they shall wash their hands and their feet, lest they die; it shall be a perpetual statute for [Aaron] and his descendants throughout their generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Moreover, the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Take the best spices: of liquid myrrh 500 shekels, of sweet-scented cinnamon half as much, 250 shekels, of fragrant calamus 250 shekels,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And of cassia 500 shekels, in terms of the sanctuary shekel, and of olive oil a hin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And you shall make of these a holy anointing oil, a perfume compounded after the art of the perfumer; it shall be a sacred anointing oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And you shall anoint the Tent of Meeting with it, and the ark of the Testimony,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the [showbread] table and all its utensils, and the lampstand and its utensils, and the altar of incense,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the altar of burnt offering with all its utensils, and the laver [for cleansing] and its base.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' You shall sanctify (separate) them, that they may be most holy; whoever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whatever touches them must be holy (set apart to God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And you shall anoint Aaron and his sons and sanctify (separate) them, that they may minister to Me as priests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And say to the Israelites, This is a holy anointing oil [symbol of the Holy Spirit], sacred to Me alone throughout your generations. [Rom. 8:9; I Cor. 12:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' It shall not be poured upon a layman''s body, nor shall you make any other like it in composition; it is holy, and you shall hold it sacred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Whoever compounds any like it or puts any of it upon an outsider shall be cut off from his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then the Lord said to Moses, Take sweet spices–stacte, onycha, and galbanum, sweet spices with pure frankincense, an equal amount of each–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And make of them incense, a perfume after the perfumer''s art, seasoned with salt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mixed, pure and sacred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' You shall beat some of it very small and put some of it before the Testimony in the Tent of Meeting, where I will meet with you; it shall be to you most holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the incense which you shall make according to its composition you shall not make for yourselves; it shall be to you holy to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Whoever makes any like it for perfume shall be cut off from his people.'
