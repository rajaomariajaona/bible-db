document_id: ISA.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THAT day [the Lord will deliver Israel from her enemies and also from the rebel powers of evil and darkness] His sharp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrelenting, great, and strong sword will visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish Leviathan the swiftly fleeing serpent, Leviathan the twisting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' winding serpent; and He will slay the monster that is in the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In that day [it will be said of the redeemed nation of Israel], A vineyard beloved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovely; sing a responsive song to it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' about it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I, the Lord, am its Keeper; I water it every moment; lest anyone harm it, I guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep it night and day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Wrath is not in Me. Would that the briers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thorns [the wicked internal foe] were lined up against Me in battle! I would stride in against them; I would burn them up together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Or else [if all Israel would escape being burned up together there is but one alternative], let them take hold of My strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make complete surrender to My protection, that they may make peace with Me! Yes, let them make peace with Me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In the days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generations to come Jacob shall take root; Israel shall blossom and send forth shoots and fill the whole world with fruit [of the knowledge of the true God]. [Hos. 14:1-6; Rom. 11:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Has [the Lord] smitten [Israel] as He smote those who smote them? Or have [the Israelites] been slain as their slayers were slain?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' By driving them out of Canaan, by exile, You contended with them in a measure [O Lord]–He removed them with His rough blast as in the day of the east wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Only on this condition shall the iniquity of Jacob (Israel) be forgiven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purged, and this shall be the full fruit [God requires] for taking away his sin: that [Israel] should make all the stones of the [idol] altars like chalk stones crushed to pieces, so that the Asherim and the sun-images shall not remain standing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rise again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For the fortified city is solitary, a habitation deserted and forsaken like the wilderness; there the calf grazes, and there he lies down; he strips its branches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eats its twigs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When its boughs are withered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dry, they are broken off; the women come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set them afire. For they are a people of no understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' discernment–'
  - type: usfm
    marker: it
    children:
    - type: text
      text: witless folk
  - type: text
    text: ; therefore He Who made them will not have compassion on them, and He Who formed them will show them no favor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And it shall be in that day that the Lord will thresh out His grain from the flood of the River [Euphrates] to the Brook of Egypt, and you will be gathered one by one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' one to another, O children of Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And it shall be in that day that a great trumpet will be blown; and they will come who were lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ready to perish in the land of Assyria and those who were driven out to the land of Egypt, and they will worship the Lord on the holy mountain at Jerusalem. [Zech. 14:16; Matt. 24:31; Rev. 11:15.]'
