document_id: ISA.27,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THAT day [the Lord will deliver Israel from her enemies and also from the rebel powers of evil and darkness] His sharp '
  - type: text
    content: and
  - type: text
    content: ' unrelenting, great, and strong sword will visit '
  - type: text
    content: and
  - type: text
    content: ' punish Leviathan the swiftly fleeing serpent, Leviathan the twisting '
  - type: text
    content: and
  - type: text
    content: ' winding serpent; and He will slay the monster that is in the sea.'
  '10':
  - type: text
    content: ' For the fortified city is solitary, a habitation deserted and forsaken like the wilderness; there the calf grazes, and there he lies down; he strips its branches '
  - type: text
    content: and
  - type: text
    content: ' eats its twigs.'
  '11':
  - type: text
    content: ' When its boughs are withered '
  - type: text
    content: and
  - type: text
    content: ' dry, they are broken off; the women come '
  - type: text
    content: and
  - type: text
    content: ' set them afire. For they are a people of no understanding '
  - type: text
    content: or
  - type: text
    content: ' discernment–'
  - type: text
    content: witless folk
  - type: text
    content: ; therefore He Who made them will not have compassion on them, and He Who formed them will show them no favor.
  '12':
  - type: text
    content: ' And it shall be in that day that the Lord will thresh out His grain from the flood of the River [Euphrates] to the Brook of Egypt, and you will be gathered one by one '
  - type: text
    content: and
  - type: text
    content: ' one to another, O children of Israel!'
  '13':
  - type: text
    content: ' And it shall be in that day that a great trumpet will be blown; and they will come who were lost '
  - type: text
    content: and
  - type: text
    content: ' ready to perish in the land of Assyria and those who were driven out to the land of Egypt, and they will worship the Lord on the holy mountain at Jerusalem. [Zech. 14:16; Matt. 24:31; Rev. 11:15.]'
  '2':
  - type: text
    content: ' In that day [it will be said of the redeemed nation of Israel], A vineyard beloved '
  - type: text
    content: and
  - type: text
    content: ' lovely; sing a responsive song to it '
  - type: text
    content: and
  - type: text
    content: ' about it!'
  '3':
  - type: text
    content: ' I, the Lord, am its Keeper; I water it every moment; lest anyone harm it, I guard '
  - type: text
    content: and
  - type: text
    content: ' keep it night and day.'
  '4':
  - type: text
    content: ' Wrath is not in Me. Would that the briers '
  - type: text
    content: and
  - type: text
    content: ' thorns [the wicked internal foe] were lined up against Me in battle! I would stride in against them; I would burn them up together.'
  '5':
  - type: text
    content: ' Or else [if all Israel would escape being burned up together there is but one alternative], let them take hold of My strength '
  - type: text
    content: and
  - type: text
    content: ' make complete surrender to My protection, that they may make peace with Me! Yes, let them make peace with Me!'
  '6':
  - type: text
    content: ' In the days '
  - type: text
    content: and
  - type: text
    content: ' generations to come Jacob shall take root; Israel shall blossom and send forth shoots and fill the whole world with fruit [of the knowledge of the true God]. [Hos. 14:1-6; Rom. 11:12.]'
  '7':
  - type: text
    content: ' Has [the Lord] smitten [Israel] as He smote those who smote them? Or have [the Israelites] been slain as their slayers were slain?'
  '8':
  - type: text
    content: ' By driving them out of Canaan, by exile, You contended with them in a measure [O Lord]–He removed them with His rough blast as in the day of the east wind.'
  '9':
  - type: text
    content: ' Only on this condition shall the iniquity of Jacob (Israel) be forgiven '
  - type: text
    content: and
  - type: text
    content: ' purged, and this shall be the full fruit [God requires] for taking away his sin: that [Israel] should make all the stones of the [idol] altars like chalk stones crushed to pieces, so that the Asherim and the sun-images shall not remain standing '
  - type: text
    content: or
  - type: text
    content: ' rise again.'
