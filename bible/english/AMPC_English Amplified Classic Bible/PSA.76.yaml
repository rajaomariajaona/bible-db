document_id: PSA.76,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; on stringed instruments. A Psalm of Asaph. A song.
  - type: text
    content: ' IN JUDAH God is known '
  - type: text
    content: and
  - type: text
    content: ' renowned; His name is highly praised '
  - type: text
    content: and
  - type: text
    content: ' is great in Israel.'
  '10':
  - type: text
    content: ' Surely the wrath of man shall praise You; the remainder of wrath shall You restrain '
  - type: text
    content: and
  - type: text
    content: ' gird '
  - type: text
    content: and
  - type: text
    content: ' arm Yourself with it.'
  '11':
  - type: text
    content: ' Vow and pay to the Lord your God; let all who are round about Him bring presents to Him Who ought to be [reverently] feared.'
  '12':
  - type: text
    content: ' He will cut off the spirit [of pride and fury] of princes; He is terrible to the [ungodly] kings of the earth.'
  '2':
  - type: text
    content: ' In [Jeru]Salem also is His tabernacle, and His dwelling place is in Zion.'
  '3':
  - type: text
    content: ' There He broke the bow''s flashing arrows, the shield, the sword, and the weapons of war. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' Glorious '
  - type: text
    content: and
  - type: text
    content: ' excellent are You from the mountains of prey [splendid and majestic, more than the everlasting mountains].'
  '5':
  - type: text
    content: ' The stouthearted are stripped of their spoil, they have slept the sleep [of death]; and none of the men of might could raise their hands.'
  '6':
  - type: text
    content: ' At Your rebuke, O God of Jacob, both chariot [rider] and horse are cast into a dead sleep [of death]. [Exod. 15:1, 21; Nah. 2:13; Zech. 12:4.]'
  '7':
  - type: text
    content: ' You, even You, are to be feared [with awe and reverence]! Who may stand in Your presence when once Your anger is roused?'
  '8':
  - type: text
    content: ' You caused sentence to be heard from heaven; the earth feared and was still–'
  '9':
  - type: text
    content: ' When God arose to [establish] judgment, to save all the meek '
  - type: text
    content: and
  - type: text
    content: ' oppressed of the earth. Selah [pause, and calmly think of that]!'
