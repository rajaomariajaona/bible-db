document_id: PSA.76,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; on stringed instruments. A Psalm of Asaph. A song.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN JUDAH God is known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renowned; His name is highly praised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is great in Israel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Surely the wrath of man shall praise You; the remainder of wrath shall You restrain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gird '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arm Yourself with it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Vow and pay to the Lord your God; let all who are round about Him bring presents to Him Who ought to be [reverently] feared.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' He will cut off the spirit [of pride and fury] of princes; He is terrible to the [ungodly] kings of the earth.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' In [Jeru]Salem also is His tabernacle, and His dwelling place is in Zion.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' There He broke the bow''s flashing arrows, the shield, the sword, and the weapons of war. Selah [pause, and calmly think of that]!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Glorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excellent are You from the mountains of prey [splendid and majestic, more than the everlasting mountains].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The stouthearted are stripped of their spoil, they have slept the sleep [of death]; and none of the men of might could raise their hands.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' At Your rebuke, O God of Jacob, both chariot [rider] and horse are cast into a dead sleep [of death]. [Exod. 15:1, 21; Nah. 2:13; Zech. 12:4.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You, even You, are to be feared [with awe and reverence]! Who may stand in Your presence when once Your anger is roused?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You caused sentence to be heard from heaven; the earth feared and was still–'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' When God arose to [establish] judgment, to save all the meek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressed of the earth. Selah [pause, and calmly think of that]!'
