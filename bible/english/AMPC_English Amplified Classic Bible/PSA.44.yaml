document_id: PSA.44,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. +[A Psalm+] of the sons of Korah. A skillful song, {or} a didactic {or} reflective poem.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WE HAVE heard with our ears, O God; our fathers have told us [what] work You did in their days, in the days of old.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You make us to turn back from the enemy, and they who hate us take spoil for themselves.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have made us like sheep intended for mutton and have scattered us in exile among the nations.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You sell Your people for nothing, and have not increased Your wealth by their price.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have made us the taunt of our neighbors, a scoffing and a derision to those who are round about us.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You make us a byword among the nations, a shaking of the heads among the people.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My dishonor is before me all day long, and shame has covered my face'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At the words of the taunter and reviler, by reason of the enemy and the revengeful.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All this is come upon us, yet have we not forgotten You, neither have we been false to Your covenant [which You made with our fathers].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Our hearts are not turned back, neither have our steps declined from Your path,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Though You have distressingly broken us in the place of jackals and covered us with deep darkness, even with the shadow of death.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You drove out the nations with Your hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' it was Your power that gave [Israel] a home by rooting out the [heathen] peoples, but [Israel] You spread out.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If we had forgotten the name of our God or stretched out our hands to a strange god,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Would not God discover this? For He knows the secrets of the heart.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No, but for Your sake we are killed all the day long; we are accounted as sheep for the slaughter. [Rom. 8:35-39.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Awake! Why do You sleep, O Lord? Arouse Yourself, cast us not off forever!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why do You hide Your face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forget our affliction and our oppression?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For our lives are bowed down to the dust; our bodies cleave to the ground.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rise up! Come to our help, and deliver us for Your mercy''s sake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' because of Your steadfast love!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they got not the land [of Canaan] in possession by their own sword, neither did their own arm save them; but Your right hand and Your arm and the light of Your countenance [did it], because You were favorable toward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' did delight in them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You are my King, O God; command victories '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance for Jacob (Israel).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Through You shall we push down our enemies; through Your name shall we tread them under who rise up against us.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I will not trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lean on my bow, neither shall my sword save me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But You have saved us from our foes and have put them to shame who hate us.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In God we have made our boast all the day long, and we will give thanks to Your name forever. Selah [pause, and calmly think of that]!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But now You have cast us off and brought us to dishonor, and You go not out with our armies.'
