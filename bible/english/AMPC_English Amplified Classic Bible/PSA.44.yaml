document_id: PSA.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. +[A Psalm+] of the sons of Korah. A skillful song, {or} a didactic {or} reflective poem.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WE HAVE heard with our ears, O God; our fathers have told us [what] work You did in their days, in the days of old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You drove out the nations with Your hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' it was Your power that gave [Israel] a home by rooting out the [heathen] peoples, but [Israel] You spread out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For they got not the land [of Canaan] in possession by their own sword, neither did their own arm save them; but Your right hand and Your arm and the light of Your countenance [did it], because You were favorable toward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' did delight in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You are my King, O God; command victories '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliverance for Jacob (Israel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Through You shall we push down our enemies; through Your name shall we tread them under who rise up against us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I will not trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lean on my bow, neither shall my sword save me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But You have saved us from our foes and have put them to shame who hate us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In God we have made our boast all the day long, and we will give thanks to Your name forever. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But now You have cast us off and brought us to dishonor, and You go not out with our armies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You make us to turn back from the enemy, and they who hate us take spoil for themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You have made us like sheep intended for mutton and have scattered us in exile among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You sell Your people for nothing, and have not increased Your wealth by their price.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You have made us the taunt of our neighbors, a scoffing and a derision to those who are round about us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You make us a byword among the nations, a shaking of the heads among the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My dishonor is before me all day long, and shame has covered my face'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' At the words of the taunter and reviler, by reason of the enemy and the revengeful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All this is come upon us, yet have we not forgotten You, neither have we been false to Your covenant [which You made with our fathers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Our hearts are not turned back, neither have our steps declined from Your path,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Though You have distressingly broken us in the place of jackals and covered us with deep darkness, even with the shadow of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' If we had forgotten the name of our God or stretched out our hands to a strange god,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Would not God discover this? For He knows the secrets of the heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' No, but for Your sake we are killed all the day long; we are accounted as sheep for the slaughter. [Rom. 8:35-39.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Awake! Why do You sleep, O Lord? Arouse Yourself, cast us not off forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Why do You hide Your face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forget our affliction and our oppression?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For our lives are bowed down to the dust; our bodies cleave to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Rise up! Come to our help, and deliver us for Your mercy''s sake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' because of Your steadfast love!'
