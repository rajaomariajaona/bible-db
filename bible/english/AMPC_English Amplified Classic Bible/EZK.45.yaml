document_id: EZK.45,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MOREOVER, WHEN you shall divide the land by apportioned '
  - type: text
    content: and
  - type: text
    content: ' assigned lots for inheritance, you shall set apart as an offering to the Lord a portion of the land to be used for holy purposes. The length shall be 25,000 '
  - type: text
    content: cubits,
  - type: text
    content: ' and the breadth 20,000. It shall be holy (set apart and consecrated to sacred use) in its every area. [Ezek. 48:9, 12, 13.]'
  '10':
  - type: text
    content: ' You shall have just weights on your scales and just measures–both a just ephah measure and a just bath measure.'
  '11':
  - type: text
    content: ' The ephah and the bath measures shall both be the same size, the bath containing one tenth of a homer and the ephah one tenth of a homer; the standard measure shall be the homer.'
  '12':
  - type: text
    content: ' And the shekel shall be twenty gerahs; twenty shekels and twenty-five shekels and fifteen shekels shall be your maneh.'
  '13':
  - type: text
    content: ' This is the offering which you shall make: a sixth of an ephah from each homer of wheat and a sixth of an ephah from each homer of barley.'
  '14':
  - type: text
    content: ' And as to the set portion of oil, you shall offer the tenth part of a bath of oil out of each cor, which is a homer of ten baths, for ten baths make [both a cor and] a homer.'
  '15':
  - type: text
    content: ' And [you shall offer] one lamb out of every flock of two hundred, out of the well-watered pastures of Israel '
  - type: text
    content: and
  - type: text
    content: ' from all the families of Israel, to provide for a meal offering and for a burnt offering and for peace offerings, to make atonement for those who brought them, says the Lord God.'
  '16':
  - type: text
    content: ' All the people of the land shall give this offering for the prince in Israel.'
  '17':
  - type: text
    content: ' And it shall be the prince''s part to furnish [from the contributions of the people] the burnt offerings, meal offerings, and drink offerings at the feasts and on the New Moons and on the Sabbaths, at all the appointed feasts of the house of Israel. He shall prepare '
  - type: text
    content: and
  - type: text
    content: ' make the sin offering, the meal offering, the burnt offering, and the peace offerings to make atonement for, bringing forgiveness '
  - type: text
    content: and
  - type: text
    content: ' reconciliation to, the house of Israel.'
  '18':
  - type: text
    content: ' Thus says the Lord God: In the first [month], on the first [day] of the month, you shall take a young bull without blemish and you shall cleanse the sanctuary.'
  '19':
  - type: text
    content: ' And the priest shall take some of the blood of the sin offering and put it upon the doorposts of the temple and upon the four corners of the ledge of the altar and upon the posts of the gate of the inner court.'
  '2':
  - type: text
    content: ' Of this there shall belong to the sanctuary a square plot 500 by 500, and 50 '
  - type: text
    content: cubits
  - type: text
    content: ' for the open space around it.'
  '20':
  - type: text
    content: ' You shall do this on the seventh day of the month for everyone who has sinned through error '
  - type: text
    content: or
  - type: text
    content: ' ignorance and for him who is simple-minded. So shall you make atonement for the temple.'
  '21':
  - type: text
    content: ' In the first month on the fourteenth day of the [month]; you shall have the Passover, a feast of seven days; unleavened bread shall be eaten.'
  '22':
  - type: text
    content: ' Upon that day the prince shall prepare for himself and for all the people of the land a bullock for a sin offering.'
  '23':
  - type: text
    content: ' And for the seven days of the feast he shall prepare a burnt offering to the Lord, seven bullocks and seven rams without blemish daily for the seven days, and a he-goat daily for a sin offering.'
  '24':
  - type: text
    content: ' And he shall prepare as a meal offering to be offered with each bullock an ephah of meal, an ephah for each ram, and a hin of oil for each ephah of meal.'
  '25':
  - type: text
    content: ' In the seventh [month], on the fifteenth day of the month, he shall make the same provision '
  - type: text
    content: and
  - type: text
    content: ' preparation for the seven days of the feast, for sin offerings, burnt offerings, bloodless '
  - type: text
    content: or
  - type: text
    content: ' meal offerings, and for the oil.'
  '3':
  - type: text
    content: ' And in this sacred section you shall measure off a portion 25,000 '
  - type: text
    content: cubits
  - type: text
    content: ' in length and 10,000 '
  - type: text
    content: cubits
  - type: text
    content: ' in breadth. And in it shall be the sanctuary which is most holy.'
  '4':
  - type: text
    content: ' It is a holy portion of the land; it shall be for the priests, the ministers of the sanctuary, who come near to minister to the Lord; and it shall be a place for their houses and a holy place (set apart as sacred) for the sanctuary.'
  '5':
  - type: text
    content: ' And another portion of land, 25,000 '
  - type: text
    content: cubits
  - type: text
    content: ' long and 10,000 '
  - type: text
    content: cubits
  - type: text
    content: ' wide, shall also be for the Levites, the ministers of the temple, and they shall possess it as a place in which to live.'
  '6':
  - type: text
    content: ' And you shall appoint for the possession of the city an area of 5,000 '
  - type: text
    content: cubits
  - type: text
    content: ' wide and 25,000 '
  - type: text
    content: cubits
  - type: text
    content: ' long, along beside the portion set aside as a holy section. It shall belong to the whole house of Israel.'
  '7':
  - type: text
    content: ' And to the prince shall belong the land on the one side and on the other side of the portion set aside as a holy section and the property of the city, in front of the holy section and the property of the city, from the west side westward and from the east side eastward; and the length shall be answerable to that of one of the tribal portions '
  - type: text
    content: and
  - type: text
    content: ' parallel to it from the western boundary to the eastern boundary of the land.'
  '8':
  - type: text
    content: ' It shall be for the prince–his possession in Israel. And My princes shall no more oppress My people, but they shall give the rest of the land to the house of Israel according to their tribes.'
  '9':
  - type: text
    content: ' Thus says the Lord God: That is enough for you, O princes of Israel! Stop the violence and plundering '
  - type: text
    content: and
  - type: text
    content: ' oppression [that you did when you were given no property], and do justice and righteousness, and take away your exactions '
  - type: text
    content: and
  - type: text
    content: ' cease your evictions of My people, says the Lord God.'
