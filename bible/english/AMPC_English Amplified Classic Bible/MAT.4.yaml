document_id: MAT.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JESUS was led (guided) by the [Holy] Spirit into the wilderness (desert) to be tempted (tested and tried) by the devil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He went without food for forty days and forty nights, and later He was hungry. [Exod. 34:28; I Kings 19:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the tempter came and said to Him, If You are God''s Son, command these stones to be made [loaves of] bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But He replied, It has been written, Man shall not live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be upheld '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sustained by bread alone, but by every word that comes forth from the mouth of God. [Deut. 8:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the devil took Him into the holy city and placed Him on a turret (pinnacle, gable) of the temple sanctuary. [Neh. 11:1; Dan. 9:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he said to Him, If You are the Son of God, throw Yourself down; for it is written, He will give His angels charge over you, and they will bear you up on their hands, lest you strike your foot against a stone. [Ps. 91:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Jesus said to him, On the other hand, it is written also, You shall not tempt, test thoroughly, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' try exceedingly the Lord your God. [Deut. 6:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Again, the devil took Him up on a very high mountain and showed Him all the kingdoms of the world and the glory (the splendor, magnificence, preeminence, and excellence) of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he said to Him, These things, all taken together, I will give You, if You will prostrate Yourself before me and do homage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Jesus said to him, Begone, Satan! For it has been written, You shall worship the Lord your God, and Him alone shall you serve. [Deut. 6:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then the devil departed from Him, and behold, angels came and ministered to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now when Jesus heard that John had been arrested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put in prison, He withdrew into Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And leaving Nazareth, He went '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelt in Capernaum by the sea, in the country of Zebulun and Naphtali–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' That what was spoken by the prophet Isaiah might be brought to pass:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The land of Zebulun and the land of Naphtali, in the way to the sea, beyond the Jordan, Galilee of the Gentiles [of the peoples who are not of Israel]–[Isa. 9:1-2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The people who sat (dwelt enveloped) in darkness have seen a great Light, and for those who sat in the land and shadow of death Light has dawned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' From that time Jesus began to preach, crying out, Repent (change your mind for the better, heartily amend your ways, with abhorrence of your past sins), for the kingdom of heaven is at hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' As He was walking by the Sea of Galilee, He noticed two brothers, Simon who is called Peter and Andrew his brother, throwing a dragnet into the sea, for they were fishermen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And He said to them, Come after Me [as disciples–letting Me be your Guide], follow Me, and I will make you fishers of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' At once they left their nets and became His disciples [sided with His party and followed Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And going on further from there He noticed two other brothers, James son of Zebedee and his brother John, in the boat with their father Zebedee, mending their nets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' putting them right; and He called them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' At once they left the boat and their father and joined Jesus as disciples [sided with His party and followed Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And He went about all Galilee, teaching in their synagogues and preaching the good news (Gospel) of the kingdom, and healing every disease and every weakness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infirmity among the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So the report of Him spread throughout all Syria, and they brought Him all who were sick, those afflicted with various diseases and torments, those under the power of demons, and epileptics, and paralyzed people, and He healed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And great crowds joined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accompanied Him about, coming from Galilee and Decapolis [the district of the ten cities east of the Sea of Galilee] and Jerusalem and Judea and from the other [the east] side of the Jordan.'
