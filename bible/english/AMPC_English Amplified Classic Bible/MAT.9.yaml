document_id: MAT.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND JESUS, getting into a boat, crossed to the other side and came to His own town [Capernaum].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And behold, they brought to Him a man paralyzed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prostrated by illness, lying on a sleeping pad; and when Jesus saw their faith, He said to the paralyzed man, Take courage, son; your sins are forgiven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the penalty remitted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And behold, some of the scribes said to themselves, This man blasphemes [He claims the rights and prerogatives of God]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But Jesus, knowing (seeing) their thoughts, said, Why do you think evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harbor malice in your hearts?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For which is easier: to say, Your sins are forgiven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the penalty remitted, or to say, Get up and walk?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But in order that you may know that the Son of Man has authority on earth to forgive sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remit the penalty, He then said to the paralyzed man, Get up! Pick up your sleeping pad and go to your own house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he got up and went away to his own house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When the crowds saw it, they were struck with fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awe; and they recognized God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanked Him, Who had given such power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority to men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' As Jesus passed on from there, He saw a man named Matthew sitting at the tax collector''s office; and He said to him, Be My disciple [side with My party and follow Me]. And he rose and followed Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And as Jesus reclined at table in the house, behold, many tax collectors and [especially wicked] sinners came and sat (reclined) with Him and His disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And when the Pharisees saw this, they said to His disciples, Why does your Master eat with tax collectors and those [preeminently] sinful?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But when Jesus heard it, He replied, Those who are strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well (healthy) have no need of a physician, but those who are weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Go and learn what this means: I desire mercy [that is, readiness to help those in trouble] and not sacrifice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sacrificial victims. For I came not to call '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' invite [to repentance] the righteous (those who are upright and in right standing with God), but sinners (the erring ones and all those not free from sin). [Hos. 6:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the disciples of John came to Jesus, inquiring, Why is it that we and the Pharisees fast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: often,
  - type: text
    text: ' [that is, abstain from food and drink as a religious exercise], but Your disciples do not fast?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Jesus replied to them, Can the wedding guests mourn while the bridegroom is still with them? The days will come when the bridegroom is taken away from them, and then they will fast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And no one puts a piece of cloth that has not been shrunk on an old garment, for such a patch tears away from the garment and a worse rent (tear) is made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Neither is new wine put in old wineskins; for if it is, the skins burst and are torn in pieces, and the wine is spilled and the skins are ruined. But new wine is put into fresh wineskins, and so both are preserved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' While He was talking this way to them, behold, a ruler entered and, kneeling down, worshiped Him, saying, My daughter has just now died; but come and lay Your hand on her, and she will come to life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Jesus got up and accompanied him, with His disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And behold, a woman who had suffered from a flow of blood for twelve years came up behind Him and touched the fringe of His garment; [Matt. 14:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For she kept saying to herself, If I only touch His garment, I shall be restored to health.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Jesus turned around and, seeing her, He said, Take courage, daughter! Your faith has made you well. And at once the woman was restored to health.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when Jesus came to the ruler''s house and saw the flute players and the crowd making an uproar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' din,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He said, Go away; for the girl is not dead but sleeping. And they laughed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jeered at Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But when the crowd had been ordered to go outside, He went in and took her by the hand, and the girl arose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the news about this spread through all that district.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' As Jesus passed on from there, two blind men followed Him, shouting loudly, Have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on us, Son of David!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' When He reached the house and went in, the blind men came to Him, and Jesus said to them, Do you believe that I am able to do this? They said to Him, Yes, Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then He touched their eyes, saying, According to your faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reliance [on the power invested in Me] be it done to you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And their eyes were opened. And Jesus earnestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sternly charged them, See that you let no one know about this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But they went off and blazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spread His fame abroad throughout that whole district.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And while they were going away, behold, a dumb man under the power of a demon was brought to Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And when the demon was driven out, the dumb man spoke; and the crowds were stunned with bewildered wonder, saying, Never before has anything like this been seen in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But the Pharisees said, He drives out demons through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with the help of the prince of demons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And Jesus went about all the cities and villages, teaching in their synagogues and proclaiming the good news (the Gospel) of the kingdom and curing all kinds of disease and every weakness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infirmity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' When He saw the throngs, He was moved with pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sympathy for them, because they were bewildered (harassed and distressed and dejected and helpless), like sheep without a shepherd. [Zech. 10:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then He said to His disciples, The harvest is indeed plentiful, but the laborers are few.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' So pray to the Lord of the harvest to force out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thrust laborers into His harvest.'
