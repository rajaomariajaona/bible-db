document_id: MAT.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND JESUS, getting into a boat, crossed to the other side and came to His own town [Capernaum].'
  '10':
  - type: text
    content: ' And as Jesus reclined at table in the house, behold, many tax collectors and [especially wicked] sinners came and sat (reclined) with Him and His disciples.'
  '11':
  - type: text
    content: ' And when the Pharisees saw this, they said to His disciples, Why does your Master eat with tax collectors and those [preeminently] sinful?'
  '12':
  - type: text
    content: ' But when Jesus heard it, He replied, Those who are strong '
  - type: text
    content: and
  - type: text
    content: ' well (healthy) have no need of a physician, but those who are weak '
  - type: text
    content: and
  - type: text
    content: ' sick.'
  '13':
  - type: text
    content: ' Go and learn what this means: I desire mercy [that is, readiness to help those in trouble] and not sacrifice '
  - type: text
    content: and
  - type: text
    content: ' sacrificial victims. For I came not to call '
  - type: text
    content: and
  - type: text
    content: ' invite [to repentance] the righteous (those who are upright and in right standing with God), but sinners (the erring ones and all those not free from sin). [Hos. 6:6.]'
  '14':
  - type: text
    content: ' Then the disciples of John came to Jesus, inquiring, Why is it that we and the Pharisees fast '
  - type: text
    content: often,
  - type: text
    content: ' [that is, abstain from food and drink as a religious exercise], but Your disciples do not fast?'
  '15':
  - type: text
    content: ' And Jesus replied to them, Can the wedding guests mourn while the bridegroom is still with them? The days will come when the bridegroom is taken away from them, and then they will fast.'
  '16':
  - type: text
    content: ' And no one puts a piece of cloth that has not been shrunk on an old garment, for such a patch tears away from the garment and a worse rent (tear) is made.'
  '17':
  - type: text
    content: ' Neither is new wine put in old wineskins; for if it is, the skins burst and are torn in pieces, and the wine is spilled and the skins are ruined. But new wine is put into fresh wineskins, and so both are preserved.'
  '18':
  - type: text
    content: ' While He was talking this way to them, behold, a ruler entered and, kneeling down, worshiped Him, saying, My daughter has just now died; but come and lay Your hand on her, and she will come to life.'
  '19':
  - type: text
    content: ' And Jesus got up and accompanied him, with His disciples.'
  '2':
  - type: text
    content: ' And behold, they brought to Him a man paralyzed '
  - type: text
    content: and
  - type: text
    content: ' prostrated by illness, lying on a sleeping pad; and when Jesus saw their faith, He said to the paralyzed man, Take courage, son; your sins are forgiven '
  - type: text
    content: and
  - type: text
    content: ' the penalty remitted.'
  '20':
  - type: text
    content: ' And behold, a woman who had suffered from a flow of blood for twelve years came up behind Him and touched the fringe of His garment; [Matt. 14:36.]'
  '21':
  - type: text
    content: ' For she kept saying to herself, If I only touch His garment, I shall be restored to health.'
  '22':
  - type: text
    content: ' Jesus turned around and, seeing her, He said, Take courage, daughter! Your faith has made you well. And at once the woman was restored to health.'
  '23':
  - type: text
    content: ' And when Jesus came to the ruler''s house and saw the flute players and the crowd making an uproar '
  - type: text
    content: and
  - type: text
    content: ' din,'
  '24':
  - type: text
    content: ' He said, Go away; for the girl is not dead but sleeping. And they laughed '
  - type: text
    content: and
  - type: text
    content: ' jeered at Him.'
  '25':
  - type: text
    content: ' But when the crowd had been ordered to go outside, He went in and took her by the hand, and the girl arose.'
  '26':
  - type: text
    content: ' And the news about this spread through all that district.'
  '27':
  - type: text
    content: ' As Jesus passed on from there, two blind men followed Him, shouting loudly, Have pity '
  - type: text
    content: and
  - type: text
    content: ' mercy on us, Son of David!'
  '28':
  - type: text
    content: ' When He reached the house and went in, the blind men came to Him, and Jesus said to them, Do you believe that I am able to do this? They said to Him, Yes, Lord.'
  '29':
  - type: text
    content: ' Then He touched their eyes, saying, According to your faith '
  - type: text
    content: and
  - type: text
    content: ' trust '
  - type: text
    content: and
  - type: text
    content: ' reliance [on the power invested in Me] be it done to you;'
  '3':
  - type: text
    content: ' And behold, some of the scribes said to themselves, This man blasphemes [He claims the rights and prerogatives of God]!'
  '30':
  - type: text
    content: ' And their eyes were opened. And Jesus earnestly '
  - type: text
    content: and
  - type: text
    content: ' sternly charged them, See that you let no one know about this.'
  '31':
  - type: text
    content: ' But they went off and blazed '
  - type: text
    content: and
  - type: text
    content: ' spread His fame abroad throughout that whole district.'
  '32':
  - type: text
    content: ' And while they were going away, behold, a dumb man under the power of a demon was brought to Jesus.'
  '33':
  - type: text
    content: ' And when the demon was driven out, the dumb man spoke; and the crowds were stunned with bewildered wonder, saying, Never before has anything like this been seen in Israel.'
  '34':
  - type: text
    content: ' But the Pharisees said, He drives out demons through '
  - type: text
    content: and
  - type: text
    content: ' with the help of the prince of demons.'
  '35':
  - type: text
    content: ' And Jesus went about all the cities and villages, teaching in their synagogues and proclaiming the good news (the Gospel) of the kingdom and curing all kinds of disease and every weakness '
  - type: text
    content: and
  - type: text
    content: ' infirmity.'
  '36':
  - type: text
    content: ' When He saw the throngs, He was moved with pity '
  - type: text
    content: and
  - type: text
    content: ' sympathy for them, because they were bewildered (harassed and distressed and dejected and helpless), like sheep without a shepherd. [Zech. 10:2.]'
  '37':
  - type: text
    content: ' Then He said to His disciples, The harvest is indeed plentiful, but the laborers are few.'
  '38':
  - type: text
    content: ' So pray to the Lord of the harvest to force out '
  - type: text
    content: and
  - type: text
    content: ' thrust laborers into His harvest.'
  '4':
  - type: text
    content: ' But Jesus, knowing (seeing) their thoughts, said, Why do you think evil '
  - type: text
    content: and
  - type: text
    content: ' harbor malice in your hearts?'
  '5':
  - type: text
    content: ' For which is easier: to say, Your sins are forgiven '
  - type: text
    content: and
  - type: text
    content: ' the penalty remitted, or to say, Get up and walk?'
  '6':
  - type: text
    content: ' But in order that you may know that the Son of Man has authority on earth to forgive sins '
  - type: text
    content: and
  - type: text
    content: ' remit the penalty, He then said to the paralyzed man, Get up! Pick up your sleeping pad and go to your own house.'
  '7':
  - type: text
    content: ' And he got up and went away to his own house.'
  '8':
  - type: text
    content: ' When the crowds saw it, they were struck with fear '
  - type: text
    content: and
  - type: text
    content: ' awe; and they recognized God '
  - type: text
    content: and
  - type: text
    content: ' praised '
  - type: text
    content: and
  - type: text
    content: ' thanked Him, Who had given such power '
  - type: text
    content: and
  - type: text
    content: ' authority to men.'
  '9':
  - type: text
    content: ' As Jesus passed on from there, He saw a man named Matthew sitting at the tax collector''s office; and He said to him, Be My disciple [side with My party and follow Me]. And he rose and followed Him.'
