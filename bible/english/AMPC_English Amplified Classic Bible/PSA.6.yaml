document_id: PSA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; on stringed instruments, set +[possibly+] an octave below. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', rebuke me not in Your anger nor discipline '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chasten me in Your hot displeasure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Have mercy on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be gracious to me, O Lord, for I am weak (faint and withered away); O Lord, heal me, for my bones are troubled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' My [inner] self [as well as my body] is also exceedingly disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled. But You, O Lord, how long [until You return and speak peace to me]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Return [to my relief], O Lord, deliver my life; save me for the sake of Your steadfast love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For in death there is no remembrance of You; in Sheol (the place of the dead) who will give You thanks?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I am weary with my groaning; all night I soak my pillow with tears, I drench my couch with my weeping.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' My eye grows dim because of grief; it grows old because of all my enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Depart from me, all you workers of iniquity, for the Lord has heard the voice of my weeping. [Matt. 7:23; Luke 13:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Lord has heard my supplication; the Lord receives my prayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let all my enemies be ashamed and sorely troubled; let them turn back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be put to shame suddenly.'
