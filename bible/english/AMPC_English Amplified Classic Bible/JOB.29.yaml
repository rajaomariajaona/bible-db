document_id: JOB.29,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND JOB again took up his discussion and said,'
  '10':
  - type: text
    content: ' The voices of the nobles were hushed, and their tongues cleaved to the roof of their mouths.'
  '11':
  - type: text
    content: ' For when the ear heard, it called me happy '
  - type: text
    content: and
  - type: text
    content: ' blessed me; and when the eye saw, it testified for me [approvingly],'
  '12':
  - type: text
    content: ' Because I delivered the poor who cried, the fatherless and him who had none to help him.'
  '13':
  - type: text
    content: ' The blessing of him who was about to perish came upon me, and I caused the widow''s heart to sing for joy.'
  '14':
  - type: text
    content: ' I put on righteousness, and it clothed me '
  - type: text
    content: or
  - type: text
    content: ' clothed itself with me; my justice was like a robe and a turban '
  - type: text
    content: or
  - type: text
    content: ' a diadem '
  - type: text
    content: or
  - type: text
    content: ' a crown!'
  '15':
  - type: text
    content: ' I was eyes to the blind, and feet was I to the lame.'
  '16':
  - type: text
    content: ' I was a father to the poor '
  - type: text
    content: and
  - type: text
    content: ' needy; the cause of him I did not know I searched out.'
  '17':
  - type: text
    content: ' And I broke the jaws '
  - type: text
    content: or
  - type: text
    content: ' the big teeth of the unrighteous and plucked the prey out of his teeth.'
  '18':
  - type: text
    content: ' Then I said, I shall die in '
  - type: text
    content: or
  - type: text
    content: ' beside my nest, and I shall multiply my days as the sand.'
  '19':
  - type: text
    content: ' My root is spread out '
  - type: text
    content: and
  - type: text
    content: ' open to the waters, and the dew lies all night upon my branch.'
  '2':
  - type: text
    content: ' Oh, that I were as in the months of old, as in the days when God watched over me, [Eccl. 7:10.]'
  '20':
  - type: text
    content: ' My glory '
  - type: text
    content: and
  - type: text
    content: ' honor are fresh in me [being constantly renewed], and my bow gains [ever] new strength in my hand.'
  '21':
  - type: text
    content: ' Men listened to me and waited and kept silence for my counsel.'
  '22':
  - type: text
    content: ' After I spoke, they did not speak again, and my speech dropped upon them [like a refreshing shower].'
  '23':
  - type: text
    content: ' And they waited for me as for the rain, and they opened their mouths wide as for the spring rain.'
  '24':
  - type: text
    content: ' I smiled on them when they had no confidence, and their depression did not cast down the light of my countenance.'
  '25':
  - type: text
    content: ' I chose their way [for them] and sat as [their] chief, and dwelt like a king among his soldiers, like one who comforts mourners.'
  '3':
  - type: text
    content: ' When His lamp shone above '
  - type: text
    content: and
  - type: text
    content: ' upon my head and by His light I walked through darkness;'
  '4':
  - type: text
    content: ' As I was in the [prime] ripeness of my days, when the friendship '
  - type: text
    content: and
  - type: text
    content: ' counsel of God were over my tent,'
  '5':
  - type: text
    content: ' When the Almighty was yet with me and my children were about me,'
  '6':
  - type: text
    content: ' When my steps [through rich pasturage] were washed with butter and the rock poured out for me streams of oil!'
  '7':
  - type: text
    content: ' When I went out to the gate of the city, when I prepared my seat in the street [the broad place for the council at the city''s gate],'
  '8':
  - type: text
    content: ' The young men saw me and hid themselves; the aged rose up '
  - type: text
    content: and
  - type: text
    content: ' stood;'
  '9':
  - type: text
    content: ' The princes refrained from talking and laid their hands on their mouths;'
