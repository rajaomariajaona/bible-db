document_id: EXO.32
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THE people saw that Moses delayed to come down from the mountain, [they] gathered together to Aaron, and said to him, Up, make us gods to go before us; as for this Moses, the man who brought us up out of the land of Egypt, we do not know what has become of him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So Aaron replied, Take the gold rings from the ears of your wives, your sons, and daughters, and bring them to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So all the people took the gold rings from their ears and brought them to Aaron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he received the gold at their hand and fashioned it with a graving tool and made it a molten calf; and they said, These are your gods, O Israel, which brought you up out of the land of Egypt!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when Aaron saw the molten calf, he built an altar before it; and Aaron made proclamation, and said, Tomorrow shall be a feast to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they rose up early the next day and offered burnt offerings and brought peace offerings; and the people sat down to eat and drink and rose up to play.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord said to Moses, Go down, for your people, whom you brought out of the land of Egypt, have corrupted themselves;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They have turned aside quickly out of the way which I commanded them; they have made them a molten calf and have worshiped it and sacrificed to it, and said, These are your gods, O Israel, that brought you up out of the land of Egypt!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said to Moses, I have seen this people, and behold, it is a stiff-necked people;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now therefore let Me alone, that My wrath may burn hot against them and that I may destroy them; but I will make of you a great nation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But Moses besought the Lord his God, and said, Lord, why does Your wrath blaze hot against Your people, whom You have brought forth out of the land of Egypt with great power and a mighty hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Why should the Egyptians say, For evil He brought them forth, to slay them in the mountains and consume them from the face of the earth? Turn from Your fierce wrath, and change Your mind concerning this evil against Your people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [Earnestly] remember Abraham, Isaac, and Israel, Your servants, to whom You swore by Your own self and said to them, I will multiply your seed as the stars of the heavens, and all this land that I have spoken of will I give to your seed, and they shall inherit it forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the Lord turned from the evil which He had thought to do to His people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Moses turned and went down from the mountain with the two tables of the Testimony in his hand, tables '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tablets that were written on both sides.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The tables were the work of God; the writing was the writing of God, graven upon the tables.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when Joshua heard the noise of the people as they shouted, he said to Moses, There is a noise of war in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But Moses said, It is not the sound of shouting for victory, neither is it the sound of the cry of the defeated, but the sound of singing that I hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And as soon as he came near to the camp he saw the calf and the dancing. And Moses'' anger blazed hot and he cast the tables out of his hands and broke them at the foot of the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he took the calf they had made and burned it in the fire, and ground it to powder and scattered it on the water and made the Israelites drink it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Moses said to Aaron, What did this people do to you, that you have brought so great a sin upon them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Aaron said, Let not the anger of my lord blaze hot; you know the people, that they are set on evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For they said to me, Make us gods which shall go before us; as for this Moses, the man who brought us up out of the land of Egypt, we do not know what has become of him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I said to them, Those who have any gold, let them take it off. So they gave it to me; then I cast it into the fire, and there came out this calf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when Moses saw that the people were unruly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrestrained (for Aaron had let them get out of control, so that they were a derision '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' object of shame among their enemies),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Moses stood in the gate of the camp, and said, Whoever is on the Lord''s side, let him come to me. And all the Levites [the priestly tribe] gathered together to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And he said to them, Thus says the Lord God of Israel, Every man put his sword on his side and go in and out from gate to gate throughout the camp and slay every man his brother, and every man his companion, and every man his neighbor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the sons of Levi did according to the word of Moses; and there fell of the people that day about 3000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Moses said [to the Levites, By your obedience to God''s command] you have consecrated yourselves today [as priests] to the Lord, each man [at the cost of being] against his own son and his own brother, that the Lord may restore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bestow His blessing upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The next day Moses said to the people, You have sinned a great sin. And now I will go up to the Lord; perhaps I can make atonement for your sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So Moses returned to the Lord, and said, Oh, these people have sinned a great sin and have made themselves gods of gold!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Yet now, if You will forgive their sin–and if not, blot me, I pray You, out of Your book which You have written!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But the Lord said to Moses, Whoever has sinned against Me, I will blot him [not you] out of My book. [Dan. 12:1; Phil. 4:3; Rev. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But now go, lead the people to the place of which I have told you. Behold, My Angel shall go before you. Nevertheless, in the day when I punish I will visit their sin upon them! [Exod. 23:20; 33:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And the Lord sent a plague upon the people because they made the calf which Aaron fashioned for them.'
