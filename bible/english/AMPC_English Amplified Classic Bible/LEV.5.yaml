document_id: LEV.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IF ANYONE sins in that he is sworn to testify and has knowledge of the matter, either by seeing or hearing of it, but fails to report it, then he shall bear his iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willfulness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Or if anyone touches an unclean thing, whether the carcass of an unclean wild beast or of an unclean domestic animal or of unclean creeping things that multiply prolifically, even if he is unaware of it, and he has become unclean, he is guilty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Or if he touches human uncleanness, of whatever kind the uncleanness may be with which he becomes defiled, and he is unaware of it, when he does know it, then he shall be guilty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Or if anyone unthinkingly swears he will do something, whether to do evil or good, whatever it may be that a man shall pronounce rashly taking an oath, then, when he becomes aware of it, he shall be guilty in either of these. [Mark 6:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When a man is guilty in one of these, he shall confess the sin he has committed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He shall bring his guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering to the Lord for the sin which he has committed, a female from the flock, a lamb or a goat, for a sin offering; and the priest shall make atonement for his sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But if he cannot afford a lamb, then he shall bring for his guilt offering to the Lord two turtledoves or two young pigeons, one for a sin offering and the other for a burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He shall bring them to the priest, who shall offer the one for the sin offering first, and wring its head from its neck, but shall not sever it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he shall sprinkle some of the blood of the sin offering on the side of the altar, and the rest of the blood shall be drained out at the base of the altar; it is a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And he shall prepare the second bird for a burnt offering, according to the ordinance; and the priest shall make atonement for him for his sin which he has committed, and he shall be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But if the offender cannot afford to bring two turtledoves or two young pigeons, then he shall bring for his offering the tenth part of an ephah of fine flour for a sin offering; he shall put no oil or frankincense on it, for it is a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He shall bring it to the priest, who shall take a handful of it as a memorial portion and burn it on the altar, on the offerings made by fire to the Lord; it is a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Thus the priest shall make atonement for him for the sin that he has committed in any of these things, and he shall be forgiven; and the remainder shall be for the priest, as in the cereal offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' If anyone commits a breach of faith and sins unwittingly in the holy things of the Lord, he shall bring his trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilt offering to the Lord, a ram without blemish out of the flock, valued by you in shekels of silver, that is, the shekel of the sanctuary, for a trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he shall make restitution for what he has done amiss in the holy thing, and shall add a fifth to it, and give it to the priest; and the priest shall make atonement for him with the ram of the trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilt offering, and he shall be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If anyone sins and does any of the things the Lord has forbidden, though he was not aware of it, yet he is guilty and shall bear his iniquity. [Luke 12:48.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He shall bring [to the priest] a ram without blemish out of the flock, estimated by you to the amount [of the trespass], for a guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering; and the priest shall make atonement for him for the error which he committed unknowingly, and he shall be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' It is a trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilt offering; he is certainly guilty before the Lord.'
