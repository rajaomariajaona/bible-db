document_id: EZR.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW IN the first year of Cyrus king of Persia [almost seventy years after the first Jewish captives were taken to Babylon], that the word of the Lord by the mouth of Jeremiah might begin to be accomplished, the Lord stirred up the spirit of Cyrus king of Persia so that he made a proclamation throughout all his kingdom and put it also in writing: [Jer. 29:10-14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says Cyrus king of Persia: The Lord, the God of heaven, has given me all the kingdoms of the earth, and He has charged me to build Him a house at Jerusalem in Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Whoever is among you of all His people, may his God be with him, and let him go up to Jerusalem in Judah and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: re
  - type: text
    text: ' build the house of the Lord, the God of Israel, in Jerusalem; He is God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And in any place where a survivor [of the Babylonian captivity of the Jews] sojourns, let the men of that place assist him with silver and gold, with goods and beasts, besides freewill offerings for the house of God in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then rose up the heads of the fathers'' houses of Judah and Benjamin, and the priests and Levites, with all those whose spirits God had stirred up, to go up to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: re
  - type: text
    text: ' build the house of the Lord in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And all those who were around them aided them with vessels of silver, with gold, goods, beasts, and precious things, besides all that was willingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' freely offered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Also Cyrus the king brought out the vessels of the house of the Lord, which Nebuchadnezzar had brought from Jerusalem [when he took that city] and had put in the house of his gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' These Cyrus king of Persia directed Mithredath the treasurer to bring forth and count out to Sheshbazzar [who is Zerubbabel, recognized as the legitimate heir to the throne of David] the prince of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And they numbered: 30 basins of gold; 1,000 basins of silver; 29 sacrificial dishes;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Of gold bowls, 30; another sort of silver bowl, 410; and other vessels, 1,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' All the vessels of gold and of silver were 5,400. All these Sheshbazzar [the governor] brought with the people of the captivity from Babylon to Jerusalem.'
