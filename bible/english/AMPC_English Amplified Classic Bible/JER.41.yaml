document_id: JER.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW IN the seventh month [of that year] Ishmael son of Nethaniah, the son of Elishama, of the royal descendants and one of the princes of the king, came [at the instigation of the Ammonites] with ten men to Gedaliah son of Ahikam in Mizpah. As they were eating a meal together there in Mizpah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Ishmael son of Nethaniah and the ten men who were with him arose and struck down Gedaliah son of Ahikam, the son of Shaphan, with the sword and killed him, the one whom the king of Babylon had made governor over the land. [II Kings 25:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Ishmael [manipulated by the Ammonites] also slew all the Jews who were with Gedaliah at Mizpah, and the Chaldean soldiers who were found there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the second day after the slaying of Gedaliah, before anyone knew about it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' There came eighty men from Shechem, from Shiloh, and from Samaria, having their beards shaved off and their clothes torn and having cut themselves, bringing cereal offerings and incense, going up [to Jerusalem] to present them in the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Ishmael son of Nethaniah went out from Mizpah to meet them, weeping all the way as he went. As he met them, he said to them, Come to Gedaliah son of Ahikam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when they came into the city, Ishmael son of Nethaniah slew them, and cast them into the midst of the [city] cistern pit–he and the men with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But ten men were among them who said to Ishmael, Do not kill us! For we have stores hidden in the field–of wheat and barley and oil and honey. So he refrained and did not slay them with their brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now the cistern pit into which Ishmael had cast all the dead bodies of the men whom he had slain in addition to Gedaliah was the one which Asa the king [of Judah] had once made for fear of Baasha king of Israel [should Baasha lay siege to Mizpah]. Ishmael son of Nethaniah filled it with those who were slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Ishmael carried away captive all the rest of the people who were in Mizpah–even the king''s daughters and all the people who remained in Mizpah, whom Nebuzaradan the captain of the guard had committed to Gedaliah son of Ahikam. Ishmael son of Nethaniah carried them away captive and departed to cross over [the Jordan] to the Ammonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But when Johanan son of Kareah and all the captains of the forces that were with him heard of all the evil that Ishmael son of Nethaniah had done,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They took all their men and went to fight with Ishmael son of Nethaniah and found him by the great pool that is in Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now when all the people who were [captives] with Ishmael saw Johanan son of Kareah and all the captains of the forces that were with him, they were glad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So all the people whom Ishmael had carried away captive from Mizpah turned around and came back, and went to Johanan son of Kareah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But Ishmael son of Nethaniah escaped from Johanan with eight men and went to the Ammonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Johanan son of Kareah and all the captains of the forces that were with him took from Mizpah all the remainder of the people whom he had recovered from Ishmael son of Nethaniah after he had slain Gedaliah son of Ahikam: [they were] the soldiers, the women, the children, and the eunuchs whom [Johanan] had brought back from Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they departed and stayed at the lodging place of Chimham, which is near Bethlehem, [intending] to go to Egypt'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Because of the Chaldeans; for they were afraid of them because Ishmael son of Nethaniah had slain Gedaliah son of Ahikam, whom the king of Babylon had made governor over the land [and whose death the king could avenge without much discrimination].'
