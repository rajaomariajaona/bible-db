document_id: HEB.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE LET us go on and get past the elementary stage in the teachings '
  - type: text
    content: and
  - type: text
    content: ' doctrine of Christ (the Messiah), advancing steadily toward the completeness '
  - type: text
    content: and
  - type: text
    content: ' perfection that belong to spiritual maturity. Let us not again be laying the foundation of repentance '
  - type: text
    content: and
  - type: text
    content: ' abandonment of dead works (dead formalism) and of the faith [by which you turned] to God,'
  '10':
  - type: text
    content: ' For God is not unrighteous to forget '
  - type: text
    content: or
  - type: text
    content: ' overlook your labor and the love which you have shown for His name''s sake in ministering to the needs of the saints (His own consecrated people), as you still do.'
  '11':
  - type: text
    content: ' But we do [strongly and earnestly] desire for each of you to show the same diligence '
  - type: text
    content: and
  - type: text
    content: ' sincerity [all the way through] in realizing '
  - type: text
    content: and
  - type: text
    content: ' enjoying the full assurance '
  - type: text
    content: and
  - type: text
    content: ' development of [your] hope until the end,'
  '12':
  - type: text
    content: ' In order that you may not grow disinterested '
  - type: text
    content: and
  - type: text
    content: ' become [spiritual] sluggards, but imitators, behaving as do those who through faith (by their leaning of the entire personality on God in Christ in absolute trust and confidence in His power, wisdom, and goodness) and by practice of patient endurance '
  - type: text
    content: and
  - type: text
    content: ' waiting are [now] inheriting the promises.'
  '13':
  - type: text
    content: ' For when God made [His] promise to Abraham, He swore by Himself, since He had no one greater by whom to swear,'
  '14':
  - type: text
    content: ' Saying, Blessing I certainly will bless you and multiplying I will multiply you. [Gen. 22:16, 17.]'
  '15':
  - type: text
    content: ' And so it was that he [Abraham], having waited long '
  - type: text
    content: and
  - type: text
    content: ' endured patiently, realized '
  - type: text
    content: and
  - type: text
    content: ' obtained [in the birth of Isaac as a pledge of what was to come] what God had promised him.'
  '16':
  - type: text
    content: ' Men indeed swear by a greater [than themselves], and with them in all disputes the oath taken for confirmation is final [ending strife].'
  '17':
  - type: text
    content: ' Accordingly God also, in His desire to show more convincingly '
  - type: text
    content: and
  - type: text
    content: ' beyond doubt to those who were to inherit the promise the unchangeableness of His purpose '
  - type: text
    content: and
  - type: text
    content: ' plan, intervened (mediated) with an oath.'
  '18':
  - type: text
    content: ' This was so that, by two unchangeable things [His promise and His oath] in which it is impossible for God ever to prove false '
  - type: text
    content: or
  - type: text
    content: ' deceive us, we who have fled [to Him] for refuge might have mighty indwelling strength '
  - type: text
    content: and
  - type: text
    content: ' strong encouragement to grasp '
  - type: text
    content: and
  - type: text
    content: ' hold fast the hope appointed for us '
  - type: text
    content: and
  - type: text
    content: ' set before [us].'
  '19':
  - type: text
    content: ' [Now] we have this [hope] as a sure and steadfast anchor of the soul [it cannot slip and it cannot break down under whoever steps out upon it–a hope] that reaches farther '
  - type: text
    content: and
  - type: text
    content: ' enters into [the very certainty of the Presence] within the veil, [Lev. 16:2.]'
  '2':
  - type: text
    content: ' With teachings about purifying, the laying on of hands, the resurrection from the dead, and eternal judgment '
  - type: text
    content: and
  - type: text
    content: ' punishment. [These are all matters of which you should have been fully aware long, long ago.]'
  '20':
  - type: text
    content: ' Where Jesus has entered in for us [in advance], a Forerunner having become a High Priest forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '3':
  - type: text
    content: ' If indeed God permits, we will [now] proceed [to advanced teaching].'
  '4':
  - type: text
    content: ' For it is impossible [to restore and bring again to repentance] those who have been once for all enlightened, who have consciously tasted the heavenly gift and have become sharers of the Holy Spirit,'
  '5':
  - type: text
    content: ' And have felt how good the Word of God is and the mighty powers of the age '
  - type: text
    content: and
  - type: text
    content: ' world to come,'
  '6':
  - type: text
    content: ' If they then deviate from the faith '
  - type: text
    content: and
  - type: text
    content: ' turn away from their allegiance–[it is impossible] to bring them back to repentance, for (because, while, as long as) they nail upon the cross the Son of God afresh [as far as they are concerned] and are holding [Him] up to contempt '
  - type: text
    content: and
  - type: text
    content: ' shame '
  - type: text
    content: and
  - type: text
    content: ' public disgrace.'
  '7':
  - type: text
    content: ' For the soil which has drunk the rain that repeatedly falls upon it and produces vegetation useful to those for whose benefit it is cultivated partakes of a blessing from God.'
  '8':
  - type: text
    content: ' But if [that same soil] persistently bears thorns and thistles, it is considered worthless and near to being cursed, whose end is to be burned. [Gen. 3:17, 18.]'
  '9':
  - type: text
    content: ' Even though we speak this way, yet in your case, beloved, we are now firmly convinced of better things that are near to salvation '
  - type: text
    content: and
  - type: text
    content: ' accompany it.'
