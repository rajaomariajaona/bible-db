document_id: HEB.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE LET us go on and get past the elementary stage in the teachings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doctrine of Christ (the Messiah), advancing steadily toward the completeness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfection that belong to spiritual maturity. Let us not again be laying the foundation of repentance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abandonment of dead works (dead formalism) and of the faith [by which you turned] to God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' With teachings about purifying, the laying on of hands, the resurrection from the dead, and eternal judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment. [These are all matters of which you should have been fully aware long, long ago.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If indeed God permits, we will [now] proceed [to advanced teaching].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For it is impossible [to restore and bring again to repentance] those who have been once for all enlightened, who have consciously tasted the heavenly gift and have become sharers of the Holy Spirit,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And have felt how good the Word of God is and the mighty powers of the age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' world to come,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If they then deviate from the faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn away from their allegiance–[it is impossible] to bring them back to repentance, for (because, while, as long as) they nail upon the cross the Son of God afresh [as far as they are concerned] and are holding [Him] up to contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' public disgrace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For the soil which has drunk the rain that repeatedly falls upon it and produces vegetation useful to those for whose benefit it is cultivated partakes of a blessing from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But if [that same soil] persistently bears thorns and thistles, it is considered worthless and near to being cursed, whose end is to be burned. [Gen. 3:17, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Even though we speak this way, yet in your case, beloved, we are now firmly convinced of better things that are near to salvation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accompany it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For God is not unrighteous to forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' overlook your labor and the love which you have shown for His name''s sake in ministering to the needs of the saints (His own consecrated people), as you still do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But we do [strongly and earnestly] desire for each of you to show the same diligence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sincerity [all the way through] in realizing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enjoying the full assurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' development of [your] hope until the end,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' In order that you may not grow disinterested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become [spiritual] sluggards, but imitators, behaving as do those who through faith (by their leaning of the entire personality on God in Christ in absolute trust and confidence in His power, wisdom, and goodness) and by practice of patient endurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waiting are [now] inheriting the promises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For when God made [His] promise to Abraham, He swore by Himself, since He had no one greater by whom to swear,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Saying, Blessing I certainly will bless you and multiplying I will multiply you. [Gen. 22:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And so it was that he [Abraham], having waited long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endured patiently, realized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obtained [in the birth of Isaac as a pledge of what was to come] what God had promised him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Men indeed swear by a greater [than themselves], and with them in all disputes the oath taken for confirmation is final [ending strife].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Accordingly God also, in His desire to show more convincingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beyond doubt to those who were to inherit the promise the unchangeableness of His purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plan, intervened (mediated) with an oath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' This was so that, by two unchangeable things [His promise and His oath] in which it is impossible for God ever to prove false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deceive us, we who have fled [to Him] for refuge might have mighty indwelling strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong encouragement to grasp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hold fast the hope appointed for us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set before [us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [Now] we have this [hope] as a sure and steadfast anchor of the soul [it cannot slip and it cannot break down under whoever steps out upon it–a hope] that reaches farther '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enters into [the very certainty of the Presence] within the veil, [Lev. 16:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Where Jesus has entered in for us [in advance], a Forerunner having become a High Priest forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
