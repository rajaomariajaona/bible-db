document_id: GEN.24,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW ABRAHAM was old, well advanced in years, and the Lord had blessed Abraham in all things.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the servant took ten of his master''s camels and departed, taking some of all his master''s treasures with him; thus he journeyed to Mesopotamia [between the Tigris and the Euphrates], to the city of Nahor [Abraham''s brother].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And he made his camels to kneel down outside the city by a well of water at the time of the evening when women go out to draw water.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And he said, O Lord, God of my master Abraham, I pray You, cause me to meet with good success today, and show kindness to my master Abraham.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' See, I stand here by the well of water, and the daughters of the men of the city are coming to draw water.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And let it so be that the girl to whom I say, I pray you, let down your jar that I may drink, and she replies, Drink, and I will give your camels drink also–let her be the one whom You have selected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indicated for Your servant Isaac [to be a wife to him]; and by it I shall know that You have shown kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness to my master.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Before he had finished speaking, behold, out came Rebekah, who was the daughter of Bethuel son of Milcah, who was the wife of Nahor the brother of Abraham, with her water jar on her shoulder.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And the girl was very beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attractive, chaste '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' modest, and unmarried. And she went down to the well, filled her water jar, and came up.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the servant ran to meet her, and said, I pray you, let me drink a little water from your water jar.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And she said, Drink, my lord; and she quickly let down her jar onto her hand and gave him a drink.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' When she had given him a drink, she said, I will draw water for your camels also, until they finish drinking.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Abraham said to the eldest servant of his house [Eliezer of Damascus], who ruled over all that he had, I beg of you, put your hand under my thigh; [Gen. 15:2.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So she quickly emptied her jar into the trough and ran again to the well and drew water for all his camels.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The man stood gazing at her in silence, waiting to know if the Lord had made his trip prosperous.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And when the camels had finished drinking, the man took a gold earring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nose ring of half a shekel in weight, and for her hands two bracelets of ten shekels in weight in gold,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And said, Whose daughter are you? I pray you, tell me: Is there room in your father''s house for us to lodge there?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And she said to him, I am the daughter of Bethuel son of Milcah and [her husband] Nahor.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' She said also to him, We have both straw and provender (fodder) enough, and also room in which to lodge.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' The man bowed down his head and worshiped the Lord'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And said, Blessed be the Lord, the God of my master Abraham, Who has not left my master bereft '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destitute of His loving-kindness and steadfastness. As for me, going on the way [of obedience and faith] the Lord led me to the house of my master''s kinsmen.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The girl related to her mother''s household what had happened.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Now Rebekah had a brother whose name was Laban, and Laban ran out to the man at the well.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And you shall swear by the Lord, the God of heaven and earth, that you will not take a wife for my son from the daughters of the Canaanites, among whom I have settled,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' For when he saw the earring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nose ring, and the bracelets on his sister''s arms, and when he heard Rebekah his sister saying, The man said this to me, he went to the man and found him standing by the camels at the well.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' He cried, Come in, you blessed of the Lord! Why do you stand outside? For I have made the house ready '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have prepared a place for the camels.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' So the man came into the house; and [Laban] ungirded his camels and gave straw and provender for the camels and water to bathe his feet and the feet of the men who were with him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' A meal was set before him, but he said, I will not eat until I have told of my errand. And [Laban] said, Speak on.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And he said, I am Abraham''s servant.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And the Lord has blessed my master mightily, and he has become great; and He has given him flocks, herds, silver, gold, menservants, maidservants, camels, and asses.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And Sarah my master''s wife bore a son to my master when she was old, and to him he has given all that he has.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And my master made me swear, saying, You must not take a wife for my son from the daughters of the Canaanites, in whose land I dwell,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But you shall go to my father''s house and to my family and take a wife for my son.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And I said to my master, But suppose the woman will not follow me.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But you shall go to my country and to my relatives and take a wife for my son Isaac.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And he said to me, The Lord, in Whose presence I walk [habitually], will send His Angel with you and prosper your way, and you will take a wife for my son from my kindred and from my father''s house.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Then you shall be clear from my oath, when you come to my kindred; and if they do not give her to you, you shall be free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innocent of my oath.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' I came today to the well and said, O Lord, God of my master Abraham, if You are now causing me to go on my way prosperously–'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' See, I am standing by the well of water; now let it be that when the maiden comes out to draw water and I say to her, I pray you, give me a little water from your [water] jar to drink,'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And if she says to me, You drink, and I will draw water for your camels also, let that same woman be the one whom the Lord has selected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indicated for my master''s son.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And before I had finished praying in my heart, behold, Rebekah came out with her [water] jar on her shoulder, and she went down to the well and drew water. And I said to her, I pray you, let me have a drink.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And she quickly let down her [water] jar from her shoulder and said, Drink, and I will water your camels also. So I drank, and she gave the camels drink also.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' I asked her, Whose daughter are you? She said, The daughter of Bethuel, Nahor''s son, whom Milcah bore to him. And I put the earring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nose ring on her face and the bracelets on her arms.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And I bowed down my head and worshiped the Lord and blessed the Lord, the God of my master Abraham, Who had led me in the right way to take my master''s brother''s daughter to his son.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' And now if you will deal kindly and truly with my master [showing faithfulness to him], tell me; and if not, tell me, that I may turn to the right or to the left.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The servant said to him, But perhaps the woman will not be willing to come along after me to this country. Must I take your son to the country from which you came?'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' Then Laban and Bethuel answered, The thing comes forth from the Lord; we cannot speak bad or good to you.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' Rebekah is before you; take her and go, and let her be the wife of your master''s son, as the Lord has said.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' And when Abraham''s servant heard their words, he bowed himself to the ground before the Lord.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' And the servant brought out jewels of silver, jewels of gold, and garments and gave them to Rebekah; he also gave precious things to her brother and her mother.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' Then they ate and drank, he and the men who were with him, and stayed there all night. And in the morning they arose, and he said. Send me away to my master.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' But [Rebekah''s] brother and mother said, Let the girl stay with us a few days–at least ten; then she may go.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' But [the servant] said to them, Do not hinder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delay me, seeing that the Lord has caused me to go prosperously on my way. Send me away, that I may go to my master.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' And they said, We will call the girl and ask her [what is] her desire.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' So they called Rebekah and said to her, Will you go with this man? And she said, I will go.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' So they sent away Rebekah their sister and her nurse [Deborah] and Abraham''s servant and his men.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Abraham said to him, See to it that you do not take my son back there.'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' And they blessed Rebekah and said to her, You are our sister; may you become the mother of thousands of ten thousands, and let your posterity possess the gate of their enemies.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' And Rebekah and her maids arose and followed the man upon their camels. Thus the servant took Rebekah and went on his way.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' Now Isaac had returned from going to the well Beer-lahai-roi [A well to the Living One Who sees me], for he [now] dwelt in the South country (the Negeb).'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' And Isaac went out to meditate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bow down [in prayer] in the open country in the evening; and he looked up and saw that, behold, the camels were coming.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' And Rebekah looked up, and when she saw Isaac, she dismounted from the camel.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' For she [had] said to the servant, Who is that man walking across the field to meet us? And the servant [had] said, He is my master. So she took a veil and concealed herself with it.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' And the servant told Isaac everything that he had done.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: ' And Isaac brought her into his mother Sarah''s tent, and he took Rebekah and she became his wife, and he loved her; thus Isaac was comforted after his mother''s death.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Lord, the God of heaven, Who took me from my father''s house, from the land of my family '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my birth, Who spoke to me and swore to me, saying, To your offspring I will give this land–He will send His Angel before you, and you will take a wife from there for my son.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And if the woman should not be willing to go along after you, then you will be clear from this oath; only you must not take my son back there.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So the servant put his hand under the thigh of Abraham his master and swore to him concerning this matter.'
