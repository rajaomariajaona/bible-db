document_id: ACT.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND SAUL was [not only] consenting to [Stephen''s] death [he was pleased and entirely approving]. On that day a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' severe persecution broke out against the church which was in Jerusalem; and they were all scattered throughout the regions of Judea and Samaria, except the apostles (special messengers).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' They all paid earnest attention to him, from the least to the greatest, saying, This man is that exhibition of the power of God which is called great (intense).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And they were attentive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made much of him, because for a long time he had amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bewildered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dazzled them with his skill in magic arts.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But when they believed the good news (the Gospel) about the kingdom of God and the name of Jesus Christ (the Messiah) as Philip preached it, they were baptized, both men and women.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Even Simon himself believed [he adhered to, trusted in, and relied on the teaching of Philip], and after being baptized, devoted himself constantly to him. And seeing signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miracles of great power which were being performed, he was utterly amazed.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Now when the apostles (special messengers) at Jerusalem heard that [the country of] Samaria had accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed the Word of God, they sent Peter and John to them,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And they came down and prayed for them that the Samaritans might receive the Holy Spirit;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For He had not yet fallen upon any of them, but they had only been baptized into the name of the Lord Jesus.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then [the apostles] laid their hands on them one by one, and they received the Holy Spirit.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' However, when Simon saw that the [Holy] Spirit was imparted through the laying on of the apostles'' hands, he brought money '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offered it to them,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Saying, Grant me also this power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority, in order that anyone on whom I place my hands may receive the Holy Spirit.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' [A party of] devout men with others helped to carry out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bury Stephen and made great lamentation over him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But Peter said to him, Destruction overtake your money and you, because you imagined you could obtain the [free] gift of God with money!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You have neither part nor lot in this matter, for your heart is all wrong in God''s sight [it is not straightforward or right or true before God]. [Ps. 78:37.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So repent of this depravity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wickedness of yours and pray to the Lord that, if possible, this contriving thought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose of your heart may be removed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disregarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forgiven you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For I see that you are in the gall of bitterness and in a bond forged by iniquity [to fetter souls]. [Isa. 58:6.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And Simon answered, Pray for me [beseech the Lord, both of you], that nothing of what you have said may befall me!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Now when [the apostles] had borne their testimony and preached the message of the Lord, they went back to Jerusalem, proclaiming the glad tidings (Gospel) to many villages of the Samaritans [on the way].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But an angel of the Lord said to Philip, Rise and proceed southward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' at midday on the road that runs from Jerusalem down to Gaza. This is the desert [route].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' So he got up and went. And behold, an Ethiopian, a eunuch of great authority under Candace the queen of the Ethiopians, who was in charge of all her treasure, had come to Jerusalem to worship.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And he was [now] returning, and sitting in his chariot he was reading the book of the prophet Isaiah.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Then the [Holy] Spirit said to Philip, Go forward and join yourself to this chariot.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But Saul shamefully treated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laid waste the church continuously [with cruelty and violence]; and entering house after house, he dragged out men and women and committed them to prison.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Accordingly Philip, running up to him, heard [the man] reading the prophet Isaiah and asked, Do you really understand what you are reading?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And he said, How is it possible for me to do so unless someone explains it to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guides me [in the right way]? And he earnestly requested Philip to come up and sit beside him.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now this was the passage of Scripture which he was reading: Like a sheep He was led to the slaughter, and as a lamb before its shearer is dumb, so He opens not His mouth.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' In His humiliation He was taken away by distressing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressive judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice was denied Him [caused to cease]. Who can describe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' relate in full the wickedness of His contemporaries (generation)? For His life is taken from the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a bloody death inflicted upon Him. [Isa. 53:7, 8.]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And the eunuch said to Philip, I beg of you, tell me about whom does the prophet say this, about himself or about someone else?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Then Philip opened his mouth, and beginning with this portion of Scripture he announced to him the glad tidings (Gospel) of Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' about Him.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And as they continued along on the way, they came to some water, and the eunuch exclaimed, See, [here is] water! What is to hinder my being baptized?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And Philip said, If you believe with all your heart [if you have a conviction, full of joyful trust, that Jesus is the Messiah and accept Him as the Author of your salvation in the kingdom of God, giving Him your obedience, then] you may. And he replied, I do believe that Jesus Christ is the Son of God.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' And he ordered that the chariot be stopped; and both Philip and the eunuch went down into the water, and [Philip] baptized him.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And when they came up out of the water, the Spirit of the Lord [suddenly] caught away Philip; and the eunuch saw him no more, and he went on his way rejoicing.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Now those who were scattered abroad went about [through the land from place to place] preaching the glad tidings, the Word [the doctrine concerning the attainment through Christ of salvation in the kingdom of God].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But Philip was found at Azotus, and passing on he preached the good news (Gospel) to all the towns until he reached Caesarea.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Philip [the deacon, not the apostle] went down to the city of Samaria and proclaimed the Christ (the Messiah) to them [the people]; [Acts 6:5.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And great crowds of people with one accord listened to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeded what was said by Philip, as they heard him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watched the miracles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonders which he kept performing [from time to time].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For foul spirits came out of many who were possessed by them, screaming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouting with a loud voice, and many who were suffering from palsy or were crippled were restored to health.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And there was great rejoicing in that city.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But there was a man named Simon, who had formerly practiced magic arts in the city to the utter amazement of the Samaritan nation, claiming that he himself was an extraordinary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinguished person.'
