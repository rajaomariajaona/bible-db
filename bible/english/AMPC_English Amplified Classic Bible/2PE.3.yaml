document_id: 2PE.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BELOVED, I am now writing you this second letter. In [both of] them I have stirred up your unsullied (sincere) mind by way of remembrance,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' That you should recall the predictions of the holy (consecrated, dedicated) prophets and the commandment of the Lord and Savior [given] through your apostles (His special messengers).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' To begin with, you must know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand this, that scoffers (mockers) will come in the last days with scoffing, [people who] walk after their own fleshly desires'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And say, Where is the promise of His coming? For since the forefathers fell asleep, all things have continued exactly as they did from the beginning of creation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For they willfully overlook '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forget this [fact], that the heavens [came into] existence long ago by the word of God, and the earth also which was formed out of water and by means of water,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Through which the world that then [existed] was deluged with water and perished. [Gen. 1:6-8; 7:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But by the same word the present heavens and earth have been stored up (reserved) for fire, being kept until the day of judgment and destruction of the ungodly people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Nevertheless, do not let this one fact escape you, beloved, that with the Lord one day is as a thousand years and a thousand years as one day. [Ps. 90:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Lord does not delay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not tardy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' slow about what He promises, according to some people''s conception of slowness, but He is long-suffering (extraordinarily patient) toward you, not desiring that any should perish, but that all should turn to repentance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But the day of the Lord will come like a thief, and then the heavens will vanish (pass away) with a thunderous crash, and the [material] elements [of the universe] will be dissolved with fire, and the earth and the works that are upon it will be burned up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Since all these things are thus in the process of being dissolved, what kind of person ought [each of] you to be [in the meanwhile] in consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' holy behavior and devout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly qualities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' While you wait and earnestly long for (expect and hasten) the coming of the day of God by reason of which the flaming heavens will be dissolved, and the [material] elements [of the universe] will flare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' melt with fire? [Isa. 34:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But we look for new heavens and a new earth according to His promise, in which righteousness (uprightness, freedom from sin, and right standing with God) is to abide. [Isa. 65:17; 66:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So, beloved, since you are expecting these things, be eager to be found by Him [at His coming] without spot or blemish and at peace [in serene confidence, free from fears and agitating passions and moral conflicts].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And consider that the long-suffering of our Lord [His slowness in avenging wrongs and judging the world] is salvation (that which is conducive to the soul''s safety), even as our beloved brother Paul also wrote to you according to the spiritual insight given him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Speaking of this as he does in all of his letters. There are some things in those [epistles of Paul] that are difficult to understand, which the ignorant and unstable twist '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misconstrue to their own utter destruction, just as [they distort and misinterpret] the rest of the Scriptures.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let me warn you therefore, beloved, that knowing these things beforehand, you should be on your guard, lest you be carried away by the error of lawless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked [persons and] fall from your own [present] firm condition [your own steadfastness of mind].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But grow in grace (undeserved favor, spiritual strength) and recognition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding of our Lord and Savior Jesus Christ (the Messiah). To Him [be] glory (honor, majesty, and splendor) both now and to the day of eternity. Amen (so be it)!'
