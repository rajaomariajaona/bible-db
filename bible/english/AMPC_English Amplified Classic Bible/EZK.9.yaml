document_id: EZK.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [THE SPIRIT] cried in my ears [in the vision] with a loud voice, saying, Cause those to draw near who have charge over the city [as executioners], every man with his destroying weapon in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And behold, six men came from the direction of the Upper Gate, which faces north, every man with his battle-ax in his hand; and one man among them was clothed in linen, with a writer''s ink bottle at his side. And they went in and stood beside the bronze altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the glory of the God of Israel [the Shekinah, cloud] had gone up from the cherubim upon which it had rested to [stand above] the threshold of the [Lord''s] house. And [the Lord] called to the man clothed with linen, who had the writer''s ink bottle at his side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the Lord said to him, Go through the midst of the city, through the midst of Jerusalem, and set a mark upon the foreheads of the men who sigh and groan over all the abominations that are committed in the midst of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And to the others He said in my hearing, Follow [the man with the ink bottle] through the city and smite; let not your eye spare, neither have any pity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Slay outright the elderly, the young man and the virgin, the infant and the women; but do not touch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go near anyone on whom is the mark. Begin at My sanctuary. So they began with the old men who were in front of the temple [who did not have the Lord''s mark on their foreheads]. [I Pet. 4:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And He said to [the executioners], Defile the temple and fill its courts with the slain. Go forth! And they went forth and slew in the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And while they were slaying them and I was left, I fell upon my face and cried, Ah, Lord God! Will You destroy all that is left of Israel in Your pouring out of Your wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation upon Jerusalem?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then said He to me, The iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt of the house of Israel and Judah are exceedingly great; the land is full of blood and the city full of injustice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perverseness; for they say, The Lord has forsaken the land; the Lord does not see [what we are doing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And as for Me, My eye will not spare, neither will I have pity, but I will recompense their wicked doings upon their own heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And behold, the man clothed in linen, who had the ink bottle at his side, reported the matter, saying, I have done as You have commanded me.'
