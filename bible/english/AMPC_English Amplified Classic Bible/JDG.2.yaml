document_id: JDG.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THE Angel of the Lord went up from Gilgal to Bochim. And He said, I brought you up from Egypt and have brought you to the land which I swore to give to your fathers, and I said, I will never break My covenant with you; [Exod. 20:2.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And also all that generation were gathered to their fathers, and there arose another generation after them who did not know (recognize, understand) the Lord, or even the work which He had done for Israel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the people of Israel did evil in the sight of the Lord and served the Baals.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And they forsook the Lord, the God of their fathers, Who brought them out of the land of Egypt. They went after other gods of the peoples round about them and bowed down to them, and provoked the Lord to anger.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And they forsook the Lord and served Baal [the god worshiped by the Canaanites] and the Ashtaroth [female deities such as Ashtoreth and Asherah].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So the anger of the Lord was kindled against Israel, and He gave them into the power of plunderers who robbed them; and He sold them into the hands of their enemies round about, so that they could no longer stand before their foes.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Whenever they went out, the hand of the Lord was against them for evil as the Lord had said, and as the Lord had sworn to them; and they were bitterly distressed. [Lev. 26:14-46.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But the Lord raised up judges, who delivered them out of the hands of those who robbed them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And yet they did not listen to their judges, for they played the harlot after other gods and bowed down to them. They turned quickly out of the way in which their fathers had walked, who had obeyed the commandments of the Lord, and they did not so.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' When the Lord raised them up judges, then He was with the judge and delivered them out of the hands of their enemies all the days of the judge; for the Lord was moved to relent because of their groanings by reason of those who oppressed and vexed them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But when the judge was dead, they turned back and corrupted themselves more than their fathers, following and serving other gods, and bowing down to them. They did not cease from their practices or their stubborn way.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And you shall make no covenant with the inhabitants of this land; but you shall break down their altars. But you have not obeyed My voice. Why have you done this?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So the anger of the Lord was kindled against Israel; and He said, Because this people have transgressed My covenant which I commanded their fathers and have not listened to My voice,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' I from now on will also not drive out from before them any of the nations which Joshua left when he died,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' That through them I may prove Israel, whether they will keep the way of the Lord to walk in it, as their fathers kept it, or not.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So the Lord left those nations, without driving them out at once, nor had He delivered them into Joshua''s power.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So now I say, I will not drive them out from before you; but they shall be as thorns in your sides, and their gods shall be a snare to you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' When the Angel of the Lord spoke these words to all the Israelites, the people lifted up their voice and wept.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They named that place Bochim [weepers], and they sacrificed there to the Lord.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And when Joshua had let the people go, the Israelites went every man to his inheritance to possess the land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And the people served the Lord all the days of Joshua and all the days of the elders who outlived Joshua, who had seen all the great works of the Lord which He did for Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And Joshua son of Nun, the servant of the Lord, died, being 110 years old.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And they buried him within the boundary of his inheritance in Timnath-heres in the hill country of Ephraim, north of Mount Gaash.'
