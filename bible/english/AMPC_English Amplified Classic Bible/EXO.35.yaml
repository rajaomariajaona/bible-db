document_id: EXO.35,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MOSES GATHERED all the congregation of the Israelites together and said to them, These are the things which the Lord has commanded that you do:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And let every able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisehearted man among you come and make all that the Lord has commanded:'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The tabernacle, its tent and its covering, its hooks, its boards, its bars, its pillars, and its sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The ark and its poles, with the mercy seat, and the veil of the screen;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The table and its poles and all its utensils, and the showbread (the bread of the Presence);'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The lampstand also for the light, and its utensils and its lamps, and the oil for the light;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the incense altar and its poles, the anointing oil and the fragrant incense, the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen for the door at the entrance of the tabernacle;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The altar of burnt offering, with its bronze grating, its poles and all its utensils, the laver and its base;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The court''s hangings, its pillars and their sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, and the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen for the gate of the court;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The pegs of the tabernacle and of the court, and their cords,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The finely wrought garments for ministering in the Holy Place, the holy garments for Aaron the [high] priest and for his sons to minister as priests.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Six days shall work be done, but the seventh day shall be to you a holy day, a Sabbath of rest to the Lord; whoever works [on that day] shall be put to death.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then all the congregation of the Israelites left Moses'' presence.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And they came, each one whose heart stirred him up and whose spirit made him willing, and brought the Lord''s offering to be used for the [new] Tent of Meeting, for all its service, and the holy garments.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' They came, both men and women, all who were willinghearted, and brought brooches, earrings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nose rings, signet rings, and armlets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' necklaces, all jewels of gold, everyone bringing an offering of gold to the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And everyone with whom was found blue or purple or scarlet [stuff], or fine linen, or goats'' hair, or rams'' skins made red [in tanning], or dolphin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoise skins brought them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Everyone who could make an offering of silver or bronze brought it as the Lord''s offering, and every man with whom was found any acacia wood for any work of the service brought it.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' All the women who had ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were wisehearted spun with their hands and brought what they had spun of blue and purple and scarlet [stuff] and fine linen;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And all the women who had ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' whose hearts stirred them up in wisdom spun the goats'' hair.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' The leaders brought onyx stones and stones to be set for the ephod and for the breastplate,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And spice, and oil for the light and for the anointing oil and for the fragrant incense.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The Israelites brought a freewill offering to the Lord, all men and women whose hearts made them willing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moved them to bring anything for any of the work which the Lord had commanded by Moses to be done.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall kindle no fire in all your dwellings on the Sabbath day.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And Moses said to the Israelites, See, the Lord called by name Bezalel son of Uri, the son of Hur, of the tribe of Judah;'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And He has filled him with the Spirit of God, with ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom, with intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding, and with knowledge and all craftsmanship,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' To devise artistic designs, to work in gold, silver, and bronze,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' In cutting of stones for setting, and in carving of wood, for work in every skilled craft.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And God has put in Bezalel''s heart that he may teach, both he and Aholiab son of Ahisamach, of the tribe of Dan.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' He has filled them with wisdom of heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability to do all manner of craftsmanship, of the engraver, of the skillful workman, of the embroiderer in blue, purple, and scarlet [stuff] and in fine linen, and of the weaver, even of those who do or design any skilled work.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And Moses said to all the congregation of the Israelites, This is what the Lord commanded:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Take from among you an offering to the Lord. Whoever is of a willing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' generous heart, let him bring the Lord''s offering: gold, silver, and bronze;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Blue, purple, and scarlet [stuff], fine linen; goats'' hair;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And rams'' skins tanned red, and skins of dolphins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' porpoises; and acacia wood;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And oil for the light; and spices for anointing oil and for fragrant incense;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And onyx stones and other stones to be set for the ephod and the breastplate.'
