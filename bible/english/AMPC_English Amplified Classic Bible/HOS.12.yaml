document_id: HOS.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' EPHRAIM HERDS '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feeds on the wind and pursues the [parching] east wind; every day he increases lies and violence, and a covenant is made with Assyria and oil is carried to Egypt. [Isa. 30:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord has also a controversy (a pleading contention) with Judah, and will punish Jacob by visiting upon him according to his ways; according to his doings will He recompense him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He took his brother by the heel in [their mother''s] womb, and in the strength [of his manhood] he contended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had power with God. [Gen. 25:26; 27:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yes, he had power over the Angel [of the Lord] and prevailed; he wept and sought His favor. He met Him in Bethel, and there [God] spoke with [him and through him with] us–[Gen. 28:12-19; 32:28; Gen. 35:1-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Even the Lord the God of hosts, the name of Him [Who spoke with Jacob] is the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore return to your God! Hold fast to love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy, to righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice, and wait [expectantly] for your God continually!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Canaan [Israel–whose ideals have sunk to those of Canaan] is a trader; the balances of deceit are in his hand; he loves to oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defraud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ephraim has said, Ah, but I have become rich; I have gained for myself wealth. All my profits shall bring on me no iniquity that would be sin. [But all his profits will never offset nor suffice to expiate the guilt which he has incurred.] [Rev. 3:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But I [Who] am the Lord your God from [when you became a nation in] the land of Egypt will yet make you to dwell in tents, as in the days of the appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solemn Feast [of Tabernacles]. [Lev. 23:39-43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I have also spoken to [you by] the prophets, and I have multiplied visions [for you] and [have appealed to you] through parables acted out by the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' If Gilead is given over to idolatry, they shall come to nought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be mere waste; if they [insult God by] sacrificing bullocks in Gilgal [on heathen altars], their altars shall be like heaps in the furrows of the fields.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jacob fled into the open country of Aram '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Padan-aram, and [there] Israel served for a wife, and for a wife he herded sheep. [Gen. 29:18-20; 30:31; 31:38-41.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And by a prophet the Lord brought Israel out of Egypt, and by a prophet was [Israel] preserved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Ephraim has provoked most bitter anger; therefore shall his blood [guilt] be left upon him, and his disgrace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach shall his Lord return upon him.'
