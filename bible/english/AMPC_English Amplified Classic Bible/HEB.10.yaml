document_id: HEB.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR SINCE the Law has merely a rude outline (foreshadowing) of the good things to come–instead of fully expressing those things–it can never by offering the same sacrifices continually year after year make perfect those who approach [its altars].'
  '10':
  - type: text
    content: ' And in accordance with this will [of God], we have been made holy (consecrated and sanctified) through the offering made once for all of the body of Jesus Christ (the Anointed One).'
  '11':
  - type: text
    content: ' Furthermore, every [human] priest stands [at his altar of service] ministering daily, offering the same sacrifices over and over again, which never are able to strip [from every side of us] the sins [that envelop us] '
  - type: text
    content: and
  - type: text
    content: ' take them away–'
  '12':
  - type: text
    content: ' Whereas this One [Christ], after He had offered a single sacrifice for our sins [that shall avail] for all time, sat down at the right hand of God,'
  '13':
  - type: text
    content: ' Then to wait until His enemies should be made a stool beneath His feet. [Ps. 110:1.]'
  '14':
  - type: text
    content: ' For by a single offering He has forever completely cleansed '
  - type: text
    content: and
  - type: text
    content: ' perfected those who are consecrated '
  - type: text
    content: and
  - type: text
    content: ' made holy.'
  '15':
  - type: text
    content: ' And also the Holy Spirit adds His testimony to us [in confirmation of this]. For having said,'
  '16':
  - type: text
    content: ' This is the agreement (testament, covenant) that I will set up '
  - type: text
    content: and
  - type: text
    content: ' conclude with them after those days, says the Lord: I will imprint My laws upon their hearts, and I will inscribe them on their minds (on their inmost thoughts and understanding),'
  '17':
  - type: text
    content: ' He then goes on to say, And their sins and their lawbreaking I will remember no more. [Jer. 31:33, 34.]'
  '18':
  - type: text
    content: ' Now where there is absolute remission (forgiveness and cancellation of the penalty) of these [sins and lawbreaking], there is no longer any offering made to atone for sin.'
  '19':
  - type: text
    content: ' Therefore, brethren, since we have full freedom '
  - type: text
    content: and
  - type: text
    content: ' confidence to enter into the [Holy of] Holies [by the power and virtue] in the blood of Jesus,'
  '2':
  - type: text
    content: ' For if it were otherwise, would [these sacrifices] not have stopped being offered? Since the worshipers had once for all been cleansed, they would no longer have any guilt '
  - type: text
    content: or
  - type: text
    content: ' consciousness of sin.'
  '20':
  - type: text
    content: ' By this fresh (new) and living way which He initiated '
  - type: text
    content: and
  - type: text
    content: ' dedicated '
  - type: text
    content: and
  - type: text
    content: ' opened for us through the separating curtain (veil of the Holy of Holies), that is, through His flesh,'
  '21':
  - type: text
    content: ' And since we have [such] a great '
  - type: text
    content: and
  - type: text
    content: ' wonderful '
  - type: text
    content: and
  - type: text
    content: ' noble Priest [Who rules] over the house of God,'
  '22':
  - type: text
    content: ' Let us all come forward '
  - type: text
    content: and
  - type: text
    content: ' draw near with true (honest and sincere) hearts in unqualified assurance '
  - type: text
    content: and
  - type: text
    content: ' absolute conviction engendered by faith (by that leaning of the entire human personality on God in absolute trust and confidence in His power, wisdom, and goodness), having our hearts sprinkled '
  - type: text
    content: and
  - type: text
    content: ' purified from a guilty (evil) conscience and our bodies cleansed with pure water.'
  '23':
  - type: text
    content: ' So let us seize '
  - type: text
    content: and
  - type: text
    content: ' hold fast '
  - type: text
    content: and
  - type: text
    content: ' retain without wavering the hope we cherish '
  - type: text
    content: and
  - type: text
    content: ' confess '
  - type: text
    content: and
  - type: text
    content: ' our acknowledgement of it, for He Who promised is reliable (sure) '
  - type: text
    content: and
  - type: text
    content: ' faithful to His word.'
  '24':
  - type: text
    content: ' And let us consider '
  - type: text
    content: and
  - type: text
    content: ' give attentive, continuous care to watching over one another, studying how we may stir up (stimulate and incite) to love '
  - type: text
    content: and
  - type: text
    content: ' helpful deeds '
  - type: text
    content: and
  - type: text
    content: ' noble activities,'
  '25':
  - type: text
    content: ' Not forsaking '
  - type: text
    content: or
  - type: text
    content: ' neglecting to assemble together [as believers], as is the habit of some people, but admonishing (warning, urging, and encouraging) one another, and all the more faithfully as you see the day approaching.'
  '26':
  - type: text
    content: ' For if we go on deliberately '
  - type: text
    content: and
  - type: text
    content: ' willingly sinning after once acquiring the knowledge of the Truth, there is no longer any sacrifice left to atone for [our] sins [no further offering to which to look forward].'
  '27':
  - type: text
    content: ' [There is nothing left for us then] but a kind of awful '
  - type: text
    content: and
  - type: text
    content: ' fearful prospect '
  - type: text
    content: and
  - type: text
    content: ' expectation of divine judgment and the fury of burning wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation which will consume those who put themselves in opposition [to God]. [Isa. 26:11.]'
  '28':
  - type: text
    content: ' Any person who has violated '
  - type: text
    content: and
  - type: text
    content: ' [thus] rejected '
  - type: text
    content: and
  - type: text
    content: ' set at naught the Law of Moses is put to death without pity '
  - type: text
    content: or
  - type: text
    content: ' mercy on the evidence of two or three witnesses. [Deut. 17:2-6.]'
  '29':
  - type: text
    content: ' How much worse (sterner and heavier) punishment do you suppose he will be judged to deserve who has spurned '
  - type: text
    content: and
  - type: text
    content: ' [thus] trampled underfoot the Son of God, and who has considered the covenant blood by which he was consecrated common '
  - type: text
    content: and
  - type: text
    content: ' unhallowed, thus profaning it '
  - type: text
    content: and
  - type: text
    content: ' insulting '
  - type: text
    content: and
  - type: text
    content: ' outraging the [Holy] Spirit [Who imparts] grace (the unmerited favor and blessing of God)? [Exod. 24:8.]'
  '3':
  - type: text
    content: ' But [as it is] these sacrifices annually bring a fresh remembrance of sins [to be atoned for],'
  '30':
  - type: text
    content: ' For we know Him Who said, Vengeance is Mine [retribution and the meting out of full justice rest with Me]; I will repay [I will exact the compensation], '
  - type: text
    content: says the Lord.
  - type: text
    content: ' And again, The Lord will judge '
  - type: text
    content: and
  - type: text
    content: ' determine '
  - type: text
    content: and
  - type: text
    content: ' solve '
  - type: text
    content: and
  - type: text
    content: ' settle the cause '
  - type: text
    content: and
  - type: text
    content: ' the cases of His people. [Deut. 32:35, 36.]'
  '31':
  - type: text
    content: ' It is a fearful (formidable and terrible) thing to incur the divine penalties '
  - type: text
    content: and
  - type: text
    content: ' be cast into the hands of the living God!'
  '32':
  - type: text
    content: ' But be ever mindful of the days gone by in which, after you were first spiritually enlightened, you endured a great '
  - type: text
    content: and
  - type: text
    content: ' painful struggle,'
  '33':
  - type: text
    content: ' Sometimes being yourselves a gazingstock, publicly exposed to insults '
  - type: text
    content: and
  - type: text
    content: ' abuse and distress, and sometimes claiming fellowship '
  - type: text
    content: and
  - type: text
    content: ' making common cause with others who were so treated.'
  '34':
  - type: text
    content: ' For you did sympathize '
  - type: text
    content: and
  - type: text
    content: ' suffer along with those who were imprisoned, and you bore cheerfully the plundering of your belongings '
  - type: text
    content: and
  - type: text
    content: ' the confiscation of your property, in the knowledge '
  - type: text
    content: and
  - type: text
    content: ' consciousness that you yourselves had a better and lasting possession.'
  '35':
  - type: text
    content: ' Do not, therefore, fling away your fearless confidence, for it carries a great '
  - type: text
    content: and
  - type: text
    content: ' glorious compensation of reward.'
  '36':
  - type: text
    content: ' For you have need of steadfast patience '
  - type: text
    content: and
  - type: text
    content: ' endurance, so that you may perform '
  - type: text
    content: and
  - type: text
    content: ' fully accomplish the will of God, and thus receive '
  - type: text
    content: and
  - type: text
    content: ' carry away [and enjoy to the full] what is promised.'
  '37':
  - type: text
    content: ' For still a little while (a very little while), and the Coming One will come and He will not delay.'
  '38':
  - type: text
    content: ' But the just shall live by faith [My righteous servant shall live by his conviction respecting man''s relationship to God and divine things, and holy fervor born of faith and conjoined with it]; and if he draws back '
  - type: text
    content: and
  - type: text
    content: ' shrinks in fear, My soul has no delight '
  - type: text
    content: or
  - type: text
    content: ' pleasure in him. [Hab. 2:3, 4.]'
  '39':
  - type: text
    content: ' But our way is not that of those who draw back to eternal misery (perdition) and are utterly destroyed, but we are of those who believe [who cleave to and trust in and rely on God through Jesus Christ, the Messiah] '
  - type: text
    content: and
  - type: text
    content: ' by faith preserve the soul.'
  '4':
  - type: text
    content: ' Because the blood of bulls and goats is powerless to take sins away.'
  '5':
  - type: text
    content: ' Hence, when He [Christ] entered into the world, He said, Sacrifices and offerings You have not desired, but instead You have made ready a body for Me [to offer];'
  '6':
  - type: text
    content: ' In burnt offerings and sin offerings You have taken no delight.'
  '7':
  - type: text
    content: ' Then I said, Behold, here I am, coming to do Your will, O God–[to fulfill] what is written of Me in the volume of the Book. [Ps. 40:6-8.]'
  '8':
  - type: text
    content: ' When He said just before, You have neither desired, nor have You taken delight in sacrifices and offerings and burnt offerings and sin offerings–all of which are offered according to the Law–'
  '9':
  - type: text
    content: ' He then went on to say, Behold, [here] I am, coming to do Your will. Thus He does away with '
  - type: text
    content: and
  - type: text
    content: ' annuls the first (former) order [as a means of expiating sin] so that He might inaugurate '
  - type: text
    content: and
  - type: text
    content: ' establish the second (latter) order. [Ps. 40:6-8.]'
