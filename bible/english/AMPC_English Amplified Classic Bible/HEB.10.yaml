document_id: HEB.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR SINCE the Law has merely a rude outline (foreshadowing) of the good things to come–instead of fully expressing those things–it can never by offering the same sacrifices continually year after year make perfect those who approach [its altars].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For if it were otherwise, would [these sacrifices] not have stopped being offered? Since the worshipers had once for all been cleansed, they would no longer have any guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consciousness of sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But [as it is] these sacrifices annually bring a fresh remembrance of sins [to be atoned for],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Because the blood of bulls and goats is powerless to take sins away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Hence, when He [Christ] entered into the world, He said, Sacrifices and offerings You have not desired, but instead You have made ready a body for Me [to offer];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In burnt offerings and sin offerings You have taken no delight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then I said, Behold, here I am, coming to do Your will, O God–[to fulfill] what is written of Me in the volume of the Book. [Ps. 40:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When He said just before, You have neither desired, nor have You taken delight in sacrifices and offerings and burnt offerings and sin offerings–all of which are offered according to the Law–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He then went on to say, Behold, [here] I am, coming to do Your will. Thus He does away with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' annuls the first (former) order [as a means of expiating sin] so that He might inaugurate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish the second (latter) order. [Ps. 40:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And in accordance with this will [of God], we have been made holy (consecrated and sanctified) through the offering made once for all of the body of Jesus Christ (the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Furthermore, every [human] priest stands [at his altar of service] ministering daily, offering the same sacrifices over and over again, which never are able to strip [from every side of us] the sins [that envelop us] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take them away–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Whereas this One [Christ], after He had offered a single sacrifice for our sins [that shall avail] for all time, sat down at the right hand of God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then to wait until His enemies should be made a stool beneath His feet. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For by a single offering He has forever completely cleansed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfected those who are consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And also the Holy Spirit adds His testimony to us [in confirmation of this]. For having said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' This is the agreement (testament, covenant) that I will set up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conclude with them after those days, says the Lord: I will imprint My laws upon their hearts, and I will inscribe them on their minds (on their inmost thoughts and understanding),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He then goes on to say, And their sins and their lawbreaking I will remember no more. [Jer. 31:33, 34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now where there is absolute remission (forgiveness and cancellation of the penalty) of these [sins and lawbreaking], there is no longer any offering made to atone for sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Therefore, brethren, since we have full freedom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence to enter into the [Holy of] Holies [by the power and virtue] in the blood of Jesus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' By this fresh (new) and living way which He initiated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' opened for us through the separating curtain (veil of the Holy of Holies), that is, through His flesh,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And since we have [such] a great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonderful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble Priest [Who rules] over the house of God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Let us all come forward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' draw near with true (honest and sincere) hearts in unqualified assurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' absolute conviction engendered by faith (by that leaning of the entire human personality on God in absolute trust and confidence in His power, wisdom, and goodness), having our hearts sprinkled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purified from a guilty (evil) conscience and our bodies cleansed with pure water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So let us seize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hold fast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' retain without wavering the hope we cherish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our acknowledgement of it, for He Who promised is reliable (sure) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful to His word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And let us consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give attentive, continuous care to watching over one another, studying how we may stir up (stimulate and incite) to love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' helpful deeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble activities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Not forsaking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' neglecting to assemble together [as believers], as is the habit of some people, but admonishing (warning, urging, and encouraging) one another, and all the more faithfully as you see the day approaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For if we go on deliberately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willingly sinning after once acquiring the knowledge of the Truth, there is no longer any sacrifice left to atone for [our] sins [no further offering to which to look forward].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [There is nothing left for us then] but a kind of awful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fearful prospect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation of divine judgment and the fury of burning wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation which will consume those who put themselves in opposition [to God]. [Isa. 26:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Any person who has violated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [thus] rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set at naught the Law of Moses is put to death without pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mercy on the evidence of two or three witnesses. [Deut. 17:2-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' How much worse (sterner and heavier) punishment do you suppose he will be judged to deserve who has spurned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [thus] trampled underfoot the Son of God, and who has considered the covenant blood by which he was consecrated common '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unhallowed, thus profaning it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insulting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' outraging the [Holy] Spirit [Who imparts] grace (the unmerited favor and blessing of God)? [Exod. 24:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For we know Him Who said, Vengeance is Mine [retribution and the meting out of full justice rest with Me]; I will repay [I will exact the compensation], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: says the Lord.
  - type: text
    text: ' And again, The Lord will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' determine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' settle the cause '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the cases of His people. [Deut. 32:35, 36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' It is a fearful (formidable and terrible) thing to incur the divine penalties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be cast into the hands of the living God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But be ever mindful of the days gone by in which, after you were first spiritually enlightened, you endured a great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' painful struggle,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Sometimes being yourselves a gazingstock, publicly exposed to insults '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuse and distress, and sometimes claiming fellowship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' making common cause with others who were so treated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For you did sympathize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer along with those who were imprisoned, and you bore cheerfully the plundering of your belongings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the confiscation of your property, in the knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consciousness that you yourselves had a better and lasting possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Do not, therefore, fling away your fearless confidence, for it carries a great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorious compensation of reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For you have need of steadfast patience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endurance, so that you may perform '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fully accomplish the will of God, and thus receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carry away [and enjoy to the full] what is promised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For still a little while (a very little while), and the Coming One will come and He will not delay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But the just shall live by faith [My righteous servant shall live by his conviction respecting man''s relationship to God and divine things, and holy fervor born of faith and conjoined with it]; and if he draws back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shrinks in fear, My soul has no delight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pleasure in him. [Hab. 2:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But our way is not that of those who draw back to eternal misery (perdition) and are utterly destroyed, but we are of those who believe [who cleave to and trust in and rely on God through Jesus Christ, the Messiah] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by faith preserve the soul.'
