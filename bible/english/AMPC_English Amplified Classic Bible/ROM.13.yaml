document_id: ROM.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LET EVERY person be loyally subject to the governing (civil) authorities. For there is no authority except from God [by His permission, His sanction], and those that exist do so by God''s appointment. [Prov. 8:15.]'
  '10':
  - type: text
    content: ' Love does no wrong to one''s neighbor [it never hurts anybody]. Therefore love meets all the requirements '
  - type: text
    content: and
  - type: text
    content: ' is the fulfilling of the Law.'
  '11':
  - type: text
    content: ' Besides this you know what [a critical] hour this is, how it is high time now for you to wake up out of your sleep (rouse to reality). For salvation (final deliverance) is nearer to us now than when we first believed (adhered to, trusted in, and relied on Christ, the Messiah).'
  '12':
  - type: text
    content: ' The night is far gone and the day is almost here. Let us then drop (fling away) the works '
  - type: text
    content: and
  - type: text
    content: ' deeds of darkness and put on the [full] armor of light.'
  '13':
  - type: text
    content: ' Let us live '
  - type: text
    content: and
  - type: text
    content: ' conduct ourselves honorably '
  - type: text
    content: and
  - type: text
    content: ' becomingly as in the [open light of] day, not in reveling (carousing) and drunkenness, not in immorality and debauchery (sensuality and licentiousness), not in quarreling and jealousy.'
  '14':
  - type: text
    content: ' But clothe yourself with the Lord Jesus Christ (the Messiah), and make no provision for [indulging] the flesh [put a stop to thinking about the evil cravings of your physical nature] to [gratify its] desires (lusts).'
  '2':
  - type: text
    content: ' Therefore he who resists '
  - type: text
    content: and
  - type: text
    content: ' sets himself up against the authorities resists what God has appointed '
  - type: text
    content: and
  - type: text
    content: ' arranged [in divine order]. And those who resist will bring down judgment upon themselves [receiving the penalty due them].'
  '3':
  - type: text
    content: ' For civil authorities are not a terror to [people of] good conduct, but to [those of] bad behavior. Would you have no dread of him who is in authority? Then do what is right and you will receive his approval '
  - type: text
    content: and
  - type: text
    content: ' commendation.'
  '4':
  - type: text
    content: ' For he is God''s servant for your good. But if you do wrong, [you should dread him and] be afraid, for he does not bear '
  - type: text
    content: and
  - type: text
    content: ' wear the sword for nothing. He is God''s servant to execute His wrath (punishment, vengeance) on the wrongdoer.'
  '5':
  - type: text
    content: ' Therefore one must be subject, not only to avoid God''s wrath '
  - type: text
    content: and
  - type: text
    content: ' escape punishment, but also as a matter of principle '
  - type: text
    content: and
  - type: text
    content: ' for the sake of conscience.'
  '6':
  - type: text
    content: ' For this same reason you pay taxes, for [the civil authorities] are official servants under God, devoting themselves to attending to this very service.'
  '7':
  - type: text
    content: ' Render to all men their dues. [Pay] taxes to whom taxes are due, revenue to whom revenue is due, respect to whom respect is due, and honor to whom honor is due.'
  '8':
  - type: text
    content: ' Keep out of debt '
  - type: text
    content: and
  - type: text
    content: ' owe no man anything, except to love one another; for he who loves his neighbor [who practices loving others] has fulfilled the Law [relating to one''s fellowmen, meeting all its requirements].'
  '9':
  - type: text
    content: ' The commandments, You shall not commit adultery, You shall not kill, You shall not steal, You shall not covet (have an evil desire), and any other commandment, are summed up in the single command, You shall love your neighbor as [you do] yourself. [Exod. 20:13-17; Lev. 19:18.]'
