document_id: PSA.94,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, You to Whom vengeance belongs, O God, You to Whom vengeance belongs, shine forth!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He Who disciplines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructs the nations, shall He not punish, He Who teaches man knowledge?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The Lord knows the thoughts of man, that they are vain (empty and futile–only a breath). [I Cor. 3:20.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man whom You discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruct, O Lord, and teach out of Your law,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' That You may give him power to keep himself calm in the days of adversity, until the [inevitable] pit of corruption is dug for the wicked.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the Lord will not cast off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' spurn His people, neither will He abandon His heritage.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' For justice will return to the [uncompromisingly] righteous, and all the upright in heart will follow it.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Who will rise up for me against the evildoers? Who will stand up for me against the workers of iniquity?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Unless the Lord had been my help, I would soon have dwelt in [the land where there is] silence.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' When I said, My foot is slipping, Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness, O Lord, held me up.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' In the multitude of my [anxious] thoughts within me, Your comforts cheer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight my soul!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Rise up, O Judge of the earth; render to the proud a fit compensation!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Shall the throne of iniquity have fellowship with You–they who frame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hide their unrighteous doings under [the sacred name of] law?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' They band themselves together against the life of the [consistently] righteous and condemn the innocent to death.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But the Lord has become my High Tower '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Defense, and my God the Rock of my refuge.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And He will turn back upon them their own iniquity and will wipe them out by means of their own wickedness; the Lord our God will wipe them out.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Lord, how long shall the wicked, how long shall the wicked triumph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exult?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' They pour out arrogant words, speaking hard things; all the evildoers boast loftily. [Jude 14, 15.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They crush Your people, O Lord, and afflict Your heritage.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' They slay the widow and the transient stranger and murder the unprotected orphan.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Yet they say, The Lord does not see, neither does the God of Jacob notice it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand, you stupid ones among the people! And you [self-confident] fools, when will you become wise?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He Who planted the ear, shall He not hear? He Who formed the eye, shall He not see?'
