document_id: PSA.94,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ' God, You to Whom vengeance belongs, O God, You to Whom vengeance belongs, shine forth!'
  '10':
  - type: text
    content: ' He Who disciplines '
  - type: text
    content: and
  - type: text
    content: ' instructs the nations, shall He not punish, He Who teaches man knowledge?'
  '11':
  - type: text
    content: ' The Lord knows the thoughts of man, that they are vain (empty and futile–only a breath). [I Cor. 3:20.]'
  '12':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) is the man whom You discipline '
  - type: text
    content: and
  - type: text
    content: ' instruct, O Lord, and teach out of Your law,'
  '13':
  - type: text
    content: ' That You may give him power to keep himself calm in the days of adversity, until the [inevitable] pit of corruption is dug for the wicked.'
  '14':
  - type: text
    content: ' For the Lord will not cast off '
  - type: text
    content: nor
  - type: text
    content: ' spurn His people, neither will He abandon His heritage.'
  '15':
  - type: text
    content: ' For justice will return to the [uncompromisingly] righteous, and all the upright in heart will follow it.'
  '16':
  - type: text
    content: ' Who will rise up for me against the evildoers? Who will stand up for me against the workers of iniquity?'
  '17':
  - type: text
    content: ' Unless the Lord had been my help, I would soon have dwelt in [the land where there is] silence.'
  '18':
  - type: text
    content: ' When I said, My foot is slipping, Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, O Lord, held me up.'
  '19':
  - type: text
    content: ' In the multitude of my [anxious] thoughts within me, Your comforts cheer '
  - type: text
    content: and
  - type: text
    content: ' delight my soul!'
  '2':
  - type: text
    content: ' Rise up, O Judge of the earth; render to the proud a fit compensation!'
  '20':
  - type: text
    content: ' Shall the throne of iniquity have fellowship with You–they who frame '
  - type: text
    content: and
  - type: text
    content: ' hide their unrighteous doings under [the sacred name of] law?'
  '21':
  - type: text
    content: ' They band themselves together against the life of the [consistently] righteous and condemn the innocent to death.'
  '22':
  - type: text
    content: ' But the Lord has become my High Tower '
  - type: text
    content: and
  - type: text
    content: ' Defense, and my God the Rock of my refuge.'
  '23':
  - type: text
    content: ' And He will turn back upon them their own iniquity and will wipe them out by means of their own wickedness; the Lord our God will wipe them out.'
  '3':
  - type: text
    content: ' Lord, how long shall the wicked, how long shall the wicked triumph '
  - type: text
    content: and
  - type: text
    content: ' exult?'
  '4':
  - type: text
    content: ' They pour out arrogant words, speaking hard things; all the evildoers boast loftily. [Jude 14, 15.]'
  '5':
  - type: text
    content: ' They crush Your people, O Lord, and afflict Your heritage.'
  '6':
  - type: text
    content: ' They slay the widow and the transient stranger and murder the unprotected orphan.'
  '7':
  - type: text
    content: ' Yet they say, The Lord does not see, neither does the God of Jacob notice it.'
  '8':
  - type: text
    content: ' Consider '
  - type: text
    content: and
  - type: text
    content: ' understand, you stupid ones among the people! And you [self-confident] fools, when will you become wise?'
  '9':
  - type: text
    content: ' He Who planted the ear, shall He not hear? He Who formed the eye, shall He not see?'
