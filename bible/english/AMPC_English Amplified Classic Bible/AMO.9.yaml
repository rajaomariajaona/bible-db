document_id: AMO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I SAW the Lord standing at the altar, and He said, Smite the tops of the pillars until the thresholds tremble, and shatter them on the heads of all of the people; and the remainder of them I will slay with the sword. He who flees of them shall not get away, and he who escapes of them shall not be delivered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Though they dig into Sheol (Hades, the dark abode of the gathered dead), from there shall My hand take them; though they climb up to heaven [the abode of light], from there will I bring them down;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And though they hide themselves on the top of [Mount] Carmel, from there I will search out and take them; and though they [try to] hide from My sight at the bottom of the sea, there I will command the serpent and it shall bite them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And though they go into captivity before their enemies, there will I command the sword and it shall slay them, and I will set My eyes upon them for evil and not for good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord God of hosts, it is He Who touches the earth and it melts, and all who dwell in it mourn; it shall rise like the [river] Nile, all of it, and it shall sink again like the Nile of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' It is He Who builds His upper chambers in the heavens and Who founds His vault over the earth, Who calls to the waters of the sea and pours them out on the face of the earth–The Lord is His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You [O degenerate children of Israel] are no more to Me than these [despised] Cushites, says the Lord. I brought up Israel out of the land of Egypt, but have I not [also] brought the Philistines out of Caphtor and the Syrians from Kir?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behold, the eyes of the Lord God are upon the sinful kingdom [of Israel''s ten tribes] and I will destroy it from the surface of the ground, except that I will not utterly destroy the house of Jacob, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For behold, I will command, and I will sift the house of Israel among all nations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause it to move to and fro as grain is sifted in a sieve, yet shall not the least kernel fall upon the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be lost [from My sight]. [Lev. 26:33; Deut. 28:64; Hos. 9:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All the sinners of My people shall die by the sword, who say, The evil shall not overtake or meet [and assail] us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' In that day will I raise up the tabernacle of David, the fallen hut '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' booth, and close up its breaches; and I will raise up its ruins, and I will build it as in the days of old,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' That they may possess the remnant of Edom and of all the nations that are called by My name, says the Lord Who does this. [Acts 15:15-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, the days are coming, says the Lord, that the plowman shall overtake the reaper, and the treader of grapes him who sows the seed; and the mountains shall drop sweet wine and all the hills shall melt [that is, everything heretofore barren and unfruitful shall overflow with spiritual blessing]. [Lev. 26:5; Joel 3:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will bring back the exiles of My people Israel, and they shall build the waste cities and inhabit them; and they shall plant vineyards and drink the wine from them; they shall also make gardens and eat the fruit of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And I will plant them upon their land, and they shall no more be torn up out of their land which I gave them, says the Lord your God.'
