document_id: PSA.148,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PRAISE THE Lord! Praise the Lord from the heavens, praise Him in the heights!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Beasts and all cattle, creeping things and flying birds!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Kings of the earth and all peoples, princes and all rulers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judges of the earth!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Both young men and maidens, old men and children!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Let them praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalt the name of the Lord, for His name alone is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supreme! His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty are above earth and heaven!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' He has lifted up a horn for His people [giving them power, prosperity, dignity, and preeminence], a song of praise for all His godly ones, for the people of Israel, who are near to Him. Praise the Lord! (Hallelujah!) [Ps. 75:10; Eph. 2:17.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Praise Him, all His angels, praise Him, all His hosts!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Praise Him, sun and moon, praise Him, all you stars of light!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Praise Him, you highest heavens and you waters above the heavens!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let them praise the name of the Lord, for He commanded and they were created.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He also established them forever and ever; He made a decree which shall not pass away [He fixed their bounds which cannot be passed over].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Praise the Lord from the earth, you sea monsters and all deeps!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You lightning, hail, fog, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' frost, you stormy wind fulfilling His orders!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Mountains and all hills, fruitful trees and all cedars!'
