document_id: PSA.148,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! Praise the Lord from the heavens, praise Him in the heights!'
  '10':
  - type: text
    content: ' Beasts and all cattle, creeping things and flying birds!'
  '11':
  - type: text
    content: ' Kings of the earth and all peoples, princes and all rulers '
  - type: text
    content: and
  - type: text
    content: ' judges of the earth!'
  '12':
  - type: text
    content: ' Both young men and maidens, old men and children!'
  '13':
  - type: text
    content: ' Let them praise '
  - type: text
    content: and
  - type: text
    content: ' exalt the name of the Lord, for His name alone is exalted '
  - type: text
    content: and
  - type: text
    content: ' supreme! His glory '
  - type: text
    content: and
  - type: text
    content: ' majesty are above earth and heaven!'
  '14':
  - type: text
    content: ' He has lifted up a horn for His people [giving them power, prosperity, dignity, and preeminence], a song of praise for all His godly ones, for the people of Israel, who are near to Him. Praise the Lord! (Hallelujah!) [Ps. 75:10; Eph. 2:17.]'
  '2':
  - type: text
    content: ' Praise Him, all His angels, praise Him, all His hosts!'
  '3':
  - type: text
    content: ' Praise Him, sun and moon, praise Him, all you stars of light!'
  '4':
  - type: text
    content: ' Praise Him, you highest heavens and you waters above the heavens!'
  '5':
  - type: text
    content: ' Let them praise the name of the Lord, for He commanded and they were created.'
  '6':
  - type: text
    content: ' He also established them forever and ever; He made a decree which shall not pass away [He fixed their bounds which cannot be passed over].'
  '7':
  - type: text
    content: ' Praise the Lord from the earth, you sea monsters and all deeps!'
  '8':
  - type: text
    content: ' You lightning, hail, fog, '
  - type: text
    content: and
  - type: text
    content: ' frost, you stormy wind fulfilling His orders!'
  '9':
  - type: text
    content: ' Mountains and all hills, fruitful trees and all cedars!'
