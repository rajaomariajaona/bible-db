document_id: MIC.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WOE IS me! For I am as when the summer fruits have been gathered, as when the vintage grapes have been gleaned and there is no cluster to eat, no first-ripe fig for which my appetite craves.'
  '10':
  - type: text
    content: ' Then my enemy will see it, and shame will cover her who said to me, Where is the Lord your God? My eyes will see my desire upon her; now she will be trodden down as the mire of the streets.'
  '11':
  - type: text
    content: ' In the day that your walls are to be built [a day for building], in that day shall the boundary [of Israel] be far extended '
  - type: text
    content: and
  - type: text
    content: ' the decree [against her] be far removed. [Isa. 33:17; Amos 9:11.]'
  '12':
  - type: text
    content: ' In that day they will come to you from Assyria and from the cities of Matzor [Egypt] and from Egypt even to the river [Euphrates], from sea to sea and from mountain to mountain.'
  '13':
  - type: text
    content: ' Yet shall the earth be desolate because of those who dwell in it, for the fruit of their doings.'
  '14':
  - type: text
    content: ' Rule '
  - type: text
    content: and
  - type: text
    content: ' feed Your people with Your rod '
  - type: text
    content: and
  - type: text
    content: ' scepter, the flock of Your inheritance who dwell alone in a forest in the midst of Carmel [a garden land]; they shall feed in Bashan and Gilead, as in the days of old.'
  '15':
  - type: text
    content: ' As in the days of your coming forth from the land of Egypt, I will show them marvelous things.'
  '16':
  - type: text
    content: ' The nations shall see [God''s deliverance] and be ashamed of all their might [which cannot be compared to His]. They shall lay their hands upon their mouths in consternation; their ears shall be deaf.'
  '17':
  - type: text
    content: ' They shall lick the dust like a serpent; like crawling things of the earth they shall come trembling out of their strongholds '
  - type: text
    content: and
  - type: text
    content: ' close places. They shall turn '
  - type: text
    content: and
  - type: text
    content: ' come with fear '
  - type: text
    content: and
  - type: text
    content: ' dread to the Lord our God and shall be afraid '
  - type: text
    content: and
  - type: text
    content: ' stand in awe because of You [O Lord]. [Jer. 33:9.]'
  '18':
  - type: text
    content: ' Who is a God like You, Who forgives iniquity and passes over the transgression of the remnant of His heritage? He retains not His anger forever, because He delights in mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness.'
  '19':
  - type: text
    content: ' He will again have compassion on us; He will subdue '
  - type: text
    content: and
  - type: text
    content: ' tread underfoot our iniquities. You will cast all '
  - type: text
    content: our
  - type: text
    content: ' sins into the depths of the sea. [Ps. 103:12.]'
  '2':
  - type: text
    content: ' The godly man has perished from the earth, and there is none upright among men. They all lie in wait for blood; each hunts his brother with a net.'
  '20':
  - type: text
    content: ' You will show Your faithfulness '
  - type: text
    content: and
  - type: text
    content: ' perform the sure promise to Jacob and loving-kindness '
  - type: text
    content: and
  - type: text
    content: ' mercy to Abraham, as You have sworn to our fathers from the days of old. [Luke 1:54, 55.]'
  '3':
  - type: text
    content: ' Both their hands are put forth '
  - type: text
    content: and
  - type: text
    content: ' are upon what is evil to do it diligently; the prince and the judge ask for a bribe, and the great man utters his evil desire. Thus they twist between them [the course of justice].'
  '4':
  - type: text
    content: ' The best of them is like a brier; the most upright '
  - type: text
    content: or
  - type: text
    content: ' the straightest is like a thorn hedge. The day of your watchmen, even of [God''s] judgment '
  - type: text
    content: and
  - type: text
    content: ' your punishment, has come; now shall be their perplexity '
  - type: text
    content: and
  - type: text
    content: ' confusion.'
  '5':
  - type: text
    content: ' Trust not in a neighbor; put no confidence in a friend. Keep the doors of your mouth from her who lies in your bosom. [Luke 12:51-53.]'
  '6':
  - type: text
    content: ' For the son dishonors the father, the daughter rises up against her mother, the daughter-in-law against her mother-in-law–a man''s enemies are the men (members) of his own house. [Matt. 10:21, 35, 36; Mark 13:12, 13.]'
  '7':
  - type: text
    content: ' But as for me, I will look to the Lord '
  - type: text
    content: and
  - type: text
    content: ' confident in Him I will keep watch; I will wait with hope '
  - type: text
    content: and
  - type: text
    content: ' expectancy for the God of my salvation; my God will hear me.'
  '8':
  - type: text
    content: ' Rejoice not against me, O my enemy! When I fall, I shall arise; when I sit in darkness, the Lord shall be a light to me.'
  '9':
  - type: text
    content: ' I will bear the indignation of the Lord because I have sinned against Him, until He pleads my cause and executes judgment for me. He will bring me forth to the light, and I shall behold His righteous deliverance. [Rom. 10:1-4; 11:23-27.]'
