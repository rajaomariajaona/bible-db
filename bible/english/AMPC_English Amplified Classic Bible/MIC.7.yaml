document_id: MIC.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WOE IS me! For I am as when the summer fruits have been gathered, as when the vintage grapes have been gleaned and there is no cluster to eat, no first-ripe fig for which my appetite craves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The godly man has perished from the earth, and there is none upright among men. They all lie in wait for blood; each hunts his brother with a net.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Both their hands are put forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are upon what is evil to do it diligently; the prince and the judge ask for a bribe, and the great man utters his evil desire. Thus they twist between them [the course of justice].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The best of them is like a brier; the most upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the straightest is like a thorn hedge. The day of your watchmen, even of [God''s] judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your punishment, has come; now shall be their perplexity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Trust not in a neighbor; put no confidence in a friend. Keep the doors of your mouth from her who lies in your bosom. [Luke 12:51-53.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For the son dishonors the father, the daughter rises up against her mother, the daughter-in-law against her mother-in-law–a man''s enemies are the men (members) of his own house. [Matt. 10:21, 35, 36; Mark 13:12, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But as for me, I will look to the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident in Him I will keep watch; I will wait with hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectancy for the God of my salvation; my God will hear me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Rejoice not against me, O my enemy! When I fall, I shall arise; when I sit in darkness, the Lord shall be a light to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will bear the indignation of the Lord because I have sinned against Him, until He pleads my cause and executes judgment for me. He will bring me forth to the light, and I shall behold His righteous deliverance. [Rom. 10:1-4; 11:23-27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then my enemy will see it, and shame will cover her who said to me, Where is the Lord your God? My eyes will see my desire upon her; now she will be trodden down as the mire of the streets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' In the day that your walls are to be built [a day for building], in that day shall the boundary [of Israel] be far extended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the decree [against her] be far removed. [Isa. 33:17; Amos 9:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' In that day they will come to you from Assyria and from the cities of Matzor [Egypt] and from Egypt even to the river [Euphrates], from sea to sea and from mountain to mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet shall the earth be desolate because of those who dwell in it, for the fruit of their doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feed Your people with Your rod '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scepter, the flock of Your inheritance who dwell alone in a forest in the midst of Carmel [a garden land]; they shall feed in Bashan and Gilead, as in the days of old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As in the days of your coming forth from the land of Egypt, I will show them marvelous things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The nations shall see [God''s deliverance] and be ashamed of all their might [which cannot be compared to His]. They shall lay their hands upon their mouths in consternation; their ears shall be deaf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They shall lick the dust like a serpent; like crawling things of the earth they shall come trembling out of their strongholds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' close places. They shall turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come with fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread to the Lord our God and shall be afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand in awe because of You [O Lord]. [Jer. 33:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Who is a God like You, Who forgives iniquity and passes over the transgression of the remnant of His heritage? He retains not His anger forever, because He delights in mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He will again have compassion on us; He will subdue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tread underfoot our iniquities. You will cast all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' sins into the depths of the sea. [Ps. 103:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You will show Your faithfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perform the sure promise to Jacob and loving-kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy to Abraham, as You have sworn to our fathers from the days of old. [Luke 1:54, 55.]'
