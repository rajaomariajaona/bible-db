document_id: GEN.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THERE was a famine in the land, other than the former famine that was in the days of Abraham. And Isaac went to Gerar, to Abimelech king of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Lord appeared to him and said, Do not go down to Egypt; live in the land of which I will tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Dwell temporarily in this land, and I will be with you and will favor you with blessings; for to you and to your descendants I will give all these lands, and I will perform the oath which I swore to Abraham your father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And I will make your descendants to multiply as the stars of the heavens, and will give to your posterity all these lands (kingdoms); and by your Offspring shall all the nations of the earth be blessed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' by Him bless themselves, [Gen. 22:18; Acts 3:25, 26; Gal. 3:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For Abraham listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed My voice and kept My charge, My commands, My statutes, and My laws.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Isaac stayed in Gerar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the men of the place asked him about his wife, and he said, She is my sister; for he was afraid to say, She is my wife–[thinking], Lest the men of the place should kill me for Rebekah, because she is attractive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is beautiful to look upon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When he had been there a long time, Abimelech king of the Philistines looked out of a window and saw Isaac caressing Rebekah his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Abimelech called Isaac and said, See here, she is certainly your wife! How did you [dare] say to me, She is my sister? And Isaac said to him, Because I thought, Lest I die on account of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Abimelech said, What is this you have done to us? One of the men might easily have lain with your wife, and you would have brought guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sin upon us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Abimelech charged all his people, He who touches this man or his wife shall surely be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Isaac sowed seed in that land and received in the same year a hundred times as much as he had planted, and the Lord favored him with blessings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the man became great and gained more and more until he became very wealthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distinguished;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He owned flocks, herds, and a great supply of servants, and the Philistines envied him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now all the wells which his father''s servants had dug in the days of Abraham his father, the Philistines had closed and filled with earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Abimelech said to Isaac, Go away from us, for you are much mightier than we are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Isaac went away from there and pitched his tent in the Valley of Gerar, and dwelt there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Isaac dug again the wells of water which had been dug in the days of Abraham his father, for the Philistines had stopped them after the death of Abraham; and he gave them the names by which his father had called them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now Isaac''s servants dug in the valley and found there a well of living [spring] water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the herdsmen of Gerar quarreled with Isaac''s herdsmen, saying, The water is ours. And he named the well Esek [contention] because they quarreled with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then [his servants] dug another well, and they quarreled over that also; so he named it Sitnah [enmity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And he moved away from there and dug another well, and for that one they did not quarrel. He named it Rehoboth [room], saying, For now the Lord has made room for us, and we shall be fruitful in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Now he went up from there to Beersheba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the Lord appeared to him the same night and said, I am the God of Abraham your father. Fear not, for I am with you and will favor you with blessings and multiply your descendants for the sake of My servant Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And [Isaac] built an altar there and called on the name of the Lord and pitched his tent there; and there Isaac''s servants were digging a well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Abimelech went to him from Gerar with Ahuzzah, one of his friends, and Phicol, his army''s commander.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Isaac said to them, Why have you come to me, seeing that you hate me and have sent me away from you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' They said, We saw that the Lord was certainly with you; so we said, Let there be now an oath between us [carrying a curse with it to befall the one who breaks it], even between you and us, and let us make a covenant with you'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' That you will do us no harm, inasmuch as we have not touched you and have done to you nothing but good and have sent you away in peace. You are now the blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' favored of the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And he made them a [formal] dinner, and they ate and drank.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they rose up early in the morning and took oaths [with a curse] with one another; and Isaac sent them on their way and they departed from him in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' That same day Isaac''s servants came and told him about the well they had dug, saying, We have found water!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And he named [the well] Shibah; therefore the name of the city is Beersheba [well of the oath] to this day. [Gen. 21:31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Now Esau was 40 years old when he took as wife Judith the daughter of Beeri the Hittite, and Basemath the daughter of Elon the Hittite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And they made life bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a grief of mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit for Isaac and Rebekah [their parents-in-law].'
