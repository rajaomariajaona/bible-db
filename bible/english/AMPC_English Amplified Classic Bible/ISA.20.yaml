document_id: ISA.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE year that the Tartan [Assyrian commander in chief] came to Ashdod in Philistia, sent by Sargon king of Assyria, he fought against Ashdod and took it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' At that time the Lord spoke by Isaiah son of Amoz, saying, Go, loose the sackcloth from off your loins and take your shoes off your feet. And he had done so, walking around stripped [to his loincloth] and barefoot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the Lord said, As My servant Isaiah has walked [comparatively] naked and barefoot for three years, as a sign and forewarning concerning Egypt and concerning Cush (Ethiopia),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So shall the king of Assyria lead away the Egyptian captives and the Ethiopian exiles, young and old, naked and barefoot, even with buttocks uncovered–to the shame of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they shall be dismayed and confounded because of Ethiopia their hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation and Egypt their glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the inhabitants of this coastland [the Israelites and their neighbors] will say in that day, See! This is what comes to those in whom we trusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hoped, to whom we fled for help to deliver us from the king of Assyria! But we, how shall we escape [captivity and exile]?'
