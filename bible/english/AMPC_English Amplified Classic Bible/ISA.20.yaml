document_id: ISA.20,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE year that the Tartan [Assyrian commander in chief] came to Ashdod in Philistia, sent by Sargon king of Assyria, he fought against Ashdod and took it.'
  '2':
  - type: text
    content: ' At that time the Lord spoke by Isaiah son of Amoz, saying, Go, loose the sackcloth from off your loins and take your shoes off your feet. And he had done so, walking around stripped [to his loincloth] and barefoot.'
  '3':
  - type: text
    content: ' And the Lord said, As My servant Isaiah has walked [comparatively] naked and barefoot for three years, as a sign and forewarning concerning Egypt and concerning Cush (Ethiopia),'
  '4':
  - type: text
    content: ' So shall the king of Assyria lead away the Egyptian captives and the Ethiopian exiles, young and old, naked and barefoot, even with buttocks uncovered–to the shame of Egypt.'
  '5':
  - type: text
    content: ' And they shall be dismayed and confounded because of Ethiopia their hope '
  - type: text
    content: and
  - type: text
    content: ' expectation and Egypt their glory '
  - type: text
    content: and
  - type: text
    content: ' boast.'
  '6':
  - type: text
    content: ' And the inhabitants of this coastland [the Israelites and their neighbors] will say in that day, See! This is what comes to those in whom we trusted '
  - type: text
    content: and
  - type: text
    content: ' hoped, to whom we fled for help to deliver us from the king of Assyria! But we, how shall we escape [captivity and exile]?'
