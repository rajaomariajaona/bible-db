document_id: MAL.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BEHOLD, I send My messenger, and he shall prepare the way before Me. And the Lord [the Messiah], Whom you seek, will suddenly come to His temple; the Messenger '
  - type: text
    content: or
  - type: text
    content: ' Angel of the covenant, Whom you desire, behold, He shall come, says the Lord of hosts. [Matt. 11:10; Luke 1:13-17, 76.]'
  '10':
  - type: text
    content: ' Bring all the tithes (the whole tenth of your income) into the storehouse, that there may be food in My house, and prove Me now by it, says the Lord of hosts, if I will not open the windows of heaven for you and pour you out a blessing, that there shall not be room enough to receive it. [Mal. 2:2.]'
  '11':
  - type: text
    content: ' And I will rebuke the devourer [insects and plagues] for your sakes and he shall not destroy the fruits of your ground, neither shall your vine drop its fruit before the time in the field, says the Lord of hosts.'
  '12':
  - type: text
    content: ' And all nations shall call you happy '
  - type: text
    content: and
  - type: text
    content: ' blessed, for you shall be a land of delight, says the Lord of hosts.'
  '13':
  - type: text
    content: ' Your words have been strong '
  - type: text
    content: and
  - type: text
    content: ' hard against Me, says the Lord. Yet you say, What have we spoken against You?'
  '14':
  - type: text
    content: ' You have said, It is useless to serve God, and what profit is it if we keep His ordinances and walk gloomily '
  - type: text
    content: and
  - type: text
    content: ' as if in mourning apparel before the Lord of hosts?'
  '15':
  - type: text
    content: ' And now we consider the proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant to be happy '
  - type: text
    content: and
  - type: text
    content: ' favored; evildoers are exalted '
  - type: text
    content: and
  - type: text
    content: ' prosper; yes, and when they test God, they escape [unpunished].'
  '16':
  - type: text
    content: ' Then those who feared the Lord talked often one to another; and the Lord listened and heard it, and a book of remembrance was written before Him of those who reverenced '
  - type: text
    content: and
  - type: text
    content: ' worshipfully feared the Lord and who thought on His name.'
  '17':
  - type: text
    content: ' And they shall be Mine, says the Lord of hosts, in that day when I publicly recognize '
  - type: text
    content: and
  - type: text
    content: ' openly declare them to be My jewels (My special possession, My peculiar treasure). And I will spare them, as a man spares his own son who serves him.'
  '18':
  - type: text
    content: ' Then shall you return and discern between the righteous and the wicked, between him who serves God and him who does not serve Him.'
  '2':
  - type: text
    content: ' But who can endure the day of His coming? And who can stand when He appears? For He is like a refiner''s fire and like fullers'' soap; [Rev. 6:12-17.]'
  '3':
  - type: text
    content: ' He will sit as a refiner and purifier of silver, and He will purify the priests, the sons of Levi, and refine them like gold and silver, that they may offer to the Lord offerings in righteousness.'
  '4':
  - type: text
    content: ' Then will the offering of Judah and Jerusalem be pleasing to the Lord as in the days of old and as in ancient years.'
  '5':
  - type: text
    content: ' Then I will draw near to you for judgment; I will be a swift witness against the sorcerers, against the adulterers, against the false swearers, and against those who oppress the hireling in his wages, the widow and the fatherless, and who turn aside the temporary resident from his right and fear not Me, says the Lord of hosts.'
  '6':
  - type: text
    content: ' For I am the Lord, I do not change; that is why you, O sons of Jacob, are not consumed.'
  '7':
  - type: text
    content: ' Even from the days of your fathers you have turned aside from My ordinances and have not kept them. Return to me, and I will return to you, says the Lord of hosts. But you say, How shall we return?'
  '8':
  - type: text
    content: ' Will a man rob '
  - type: text
    content: or
  - type: text
    content: ' defraud God? Yet you rob '
  - type: text
    content: and
  - type: text
    content: ' defraud Me. But you say, In what way do we rob '
  - type: text
    content: or
  - type: text
    content: ' defraud You? [You have withheld your] tithes and offerings.'
  '9':
  - type: text
    content: ' You are cursed with the curse, for you are robbing Me, even this whole nation. [Lev. 26:14-17.]'
