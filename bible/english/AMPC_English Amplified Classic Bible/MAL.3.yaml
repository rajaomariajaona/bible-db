document_id: MAL.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD, I send My messenger, and he shall prepare the way before Me. And the Lord [the Messiah], Whom you seek, will suddenly come to His temple; the Messenger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Angel of the covenant, Whom you desire, behold, He shall come, says the Lord of hosts. [Matt. 11:10; Luke 1:13-17, 76.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But who can endure the day of His coming? And who can stand when He appears? For He is like a refiner''s fire and like fullers'' soap; [Rev. 6:12-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He will sit as a refiner and purifier of silver, and He will purify the priests, the sons of Levi, and refine them like gold and silver, that they may offer to the Lord offerings in righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then will the offering of Judah and Jerusalem be pleasing to the Lord as in the days of old and as in ancient years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then I will draw near to you for judgment; I will be a swift witness against the sorcerers, against the adulterers, against the false swearers, and against those who oppress the hireling in his wages, the widow and the fatherless, and who turn aside the temporary resident from his right and fear not Me, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I am the Lord, I do not change; that is why you, O sons of Jacob, are not consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Even from the days of your fathers you have turned aside from My ordinances and have not kept them. Return to me, and I will return to you, says the Lord of hosts. But you say, How shall we return?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Will a man rob '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' defraud God? Yet you rob '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defraud Me. But you say, In what way do we rob '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' defraud You? [You have withheld your] tithes and offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You are cursed with the curse, for you are robbing Me, even this whole nation. [Lev. 26:14-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Bring all the tithes (the whole tenth of your income) into the storehouse, that there may be food in My house, and prove Me now by it, says the Lord of hosts, if I will not open the windows of heaven for you and pour you out a blessing, that there shall not be room enough to receive it. [Mal. 2:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And I will rebuke the devourer [insects and plagues] for your sakes and he shall not destroy the fruits of your ground, neither shall your vine drop its fruit before the time in the field, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And all nations shall call you happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed, for you shall be a land of delight, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Your words have been strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard against Me, says the Lord. Yet you say, What have we spoken against You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You have said, It is useless to serve God, and what profit is it if we keep His ordinances and walk gloomily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' as if in mourning apparel before the Lord of hosts?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And now we consider the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant to be happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored; evildoers are exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosper; yes, and when they test God, they escape [unpunished].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then those who feared the Lord talked often one to another; and the Lord listened and heard it, and a book of remembrance was written before Him of those who reverenced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully feared the Lord and who thought on His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they shall be Mine, says the Lord of hosts, in that day when I publicly recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly declare them to be My jewels (My special possession, My peculiar treasure). And I will spare them, as a man spares his own son who serves him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then shall you return and discern between the righteous and the wicked, between him who serves God and him who does not serve Him.'
