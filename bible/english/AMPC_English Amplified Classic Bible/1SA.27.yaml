document_id: 1SA.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT DAVID said in his heart, I shall now perish one day by the hand of Saul. There is nothing better for me than that I should escape into the land of the Philistines. Then Saul will despair of seeking me any more within the borders of Israel, and I shall escape out of his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So David arose and went over with the 600 men who were with him to Achish son of Maoch, king of Gath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And David dwelt with Achish at Gath, he and his men, every man with his household, and David with his two wives, Ahinoam the Jezreelitess and Abigail the Carmelitess, Nabal''s widow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When it was told Saul that David had fled to Gath, he sought for him no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And David said to Achish, If I have now found favor in your eyes, let me be given a place to dwell in some country town; for why should your servant live in the royal city with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then Achish gave David the town of Ziklag that day. Therefore Ziklag belongs to the kings of Judah to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The time David dwelt in the Philistines'' country was a year and four months.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now David and his men went up and made attacks on the Geshurites, Girzites, and Amalekites [enemies of Israel Joshua had failed to exterminate]. For from of old those nations inhabited the land, as one goes to Shur even to the land of Egypt. [Deut. 25:19; Josh. 13:1, 2, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And David smote the land and left neither man nor woman alive, and took away the sheep, oxen, donkeys, camels, and the apparel, and returned to Achish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Achish would ask, Against whom have you made a raid today? And David would reply, Against the South (Negeb) of Judah, or of the Jerahmeelites, or of the Kenites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And David saved neither man nor woman alive to bring tidings to Gath, thinking, Lest they should say about us, So did David, and so will he do as long as he dwells in the Philistines'' country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Achish believed David, saying, He has made his people Israel utterly abhor him; so he shall be my servant always.'
