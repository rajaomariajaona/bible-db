document_id: ECC.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN I returned and considered all the oppressions that are practiced under the sun: And I beheld the tears of the oppressed, and they had no comforter; and on the side of their oppressors was power, but they [too] had no comforter.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For if they fall, the one will lift up his fellow. But woe to him who is alone when he falls and has not another to lift him up!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Again, if two lie down together, then they have warmth; but how can one be warm alone?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And though a man might prevail against him who is alone, two will withstand him. A threefold cord is not quickly broken.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Better is a poor and wise youth than an old and foolish king who no longer knows how to receive counsel (friendly reproof and warning)–'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Even though [the youth] comes out of prison to reign, while the other, born a king, becomes needy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' I saw all the living who walk under the sun with the youth who was to stand up in the king''s stead.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' There was no end to all the people; he was over all of them. Yet those who come later will not rejoice in him. Surely this also is vanity (emptiness, falsity, vainglory) and a striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So I praised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thought more fortunate those who have been long dead than the living, who are still alive.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But better than them both [I thought] is he who has not yet been born, who has not seen the evil deeds that are done under the sun.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Then I saw that all painful effort in labor and all skill in work comes from man''s rivalry with his neighbor. This is also vanity, a vain striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The fool folds his hands together and eats his own flesh [destroying himself by indolence].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Better is a handful with quietness than both hands full with painful effort, a vain striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then I returned, and I saw vanity under the sun [in one of its peculiar forms].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Here is one alone–no one with him; he neither has child nor brother. Yet there is no end to all his labor, neither is his eye satisfied with riches, neither does he ask, For whom do I labor and deprive myself of good? This is also vanity (emptiness, falsity, and futility); yes, it is a painful effort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an unhappy business. [Prov. 27:20; I John 2:16.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Two are better than one, because they have a good [more satisfying] reward for their labor;'
