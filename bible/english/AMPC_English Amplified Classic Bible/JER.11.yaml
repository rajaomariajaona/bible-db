document_id: JER.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD that came to Jeremiah from the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Hear the words of this covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge, and speak to the men of Judah and the inhabitants of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Say to them, Thus says the Lord, the God of Israel: Cursed is the man who does not heed the words of this covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Which I commanded your fathers at the time that I brought them out of the land of Egypt, from the iron furnace, saying, Listen to My voice and do according to all that I command you. So will you be My people, and I will be your God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That I may perform the oath which I swore to your fathers, to give them a land flowing with milk and honey, as it is this day. Then I answered, Amen (so be it), O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord said to me, Proclaim all these words in the cities of Judah and in the streets of Jerusalem: Hear the words of this covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge and do them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For I earnestly protested to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned your fathers at the time that I brought them up out of the land of Egypt, even to this day, protesting to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warning them persistently, saying, Obey My voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Yet they did not obey or incline their ear [to Me], but everyone walked in the stubbornness of his own evil heart. Therefore I brought upon them all [the calamities threatened in] the words of this covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge, which I had commanded, but they did not do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said to me, A conspiracy is found among the men of Judah and among the inhabitants of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They have turned back to the iniquities of their forefathers, who refused to hear My words; they have gone after other gods to serve them. The house of Israel and the house of Judah have broken My covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge which I made with their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore thus says the Lord: Behold, I am bringing evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity upon them which they will not be able to escape; though they cry to Me, I will not listen to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the cities of Judah and the inhabitants of Jerusalem will go and cry out to the gods to whom they offer incense, but they cannot save them at all in the time of their evil trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For [as many as] the number of your cities are your gods, O Judah; and [as many as] the number of the streets of Jerusalem are the altars you have set up to the shameful thing, even altars to burn incense to Baal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore do not pray for this people or lift up a cry or prayer for them, for I will not listen when they cry out to Me in the time of their evil trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' What right has My beloved [to be] in My house when she has wrought lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' done treacherously many times? Can vows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the holy flesh [of your sacrifices] remove from you your wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avert your calamity? Can you by these [escape your doom and] rejoice exultantly?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The Lord [acknowledged you once to be worthy to be] called a green olive tree, fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of good fruit; but with the roar of a great tempest He will set fire to it, and its branches will be consumed. [Ps. 52:8; Jer. 21:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For the Lord of hosts, Who planted you, has pronounced evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity against you because of the evil which the house of Israel and the house of Judah have done against themselves in provoking Me to anger by offering incense to Baal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the Lord gave me [Jeremiah] knowledge of it [their plot], and I knew it; then You [O Lord] showed me their doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But I was like a tame lamb that is brought to the slaughter; I did not know that they had devised inventions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' schemes against me, saying, Let us destroy the tree with its fruit; let us cut him off from the land of the living, that his name may be no more remembered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But, O Lord of hosts, Who judges rightly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justly, Who tests the heart and the mind, let me see Your vengeance on them, for to You I have revealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' committed my cause [rolling it upon You].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Therefore thus says the Lord about the men of Anathoth [Jeremiah''s hometown], who seek your life [Jeremiah] and say, Prophesy not in the name of the Lord, that you die not by our hands–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Therefore thus says the Lord of hosts: Behold, I will punish them. Their young men will die by the sword, their sons and their daughters will die by famine;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And there will be no remnant [of the conspirators] left, for I will bring evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity upon the men of Anathoth in the year of their punishment.'
