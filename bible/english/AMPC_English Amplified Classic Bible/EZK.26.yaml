document_id: EZK.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND IN the eleventh year, on the first day of the month [after the carrying away of King Jehoiachin], the word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because of the great number of [Nebuchadrezzar''s] horses, their dust will cover you; your walls [O Tyre] will shake at the noise of the horsemen and of the wagon wheels and of the chariots, when he enters into your gates as men enter into the city in whose walls there has been made a breach.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With the hoofs of his horses [Nebuchadrezzar] will trample all your streets; he will slay your people with the sword and your strong pillars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' obelisks will fall to the ground.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [your adversaries] shall make a spoil of your riches and make booty of your merchandise. And they shall break down your walls and destroy your pleasant houses, and they shall lay the stones and the timber and the very dust from your demolished city out in the midst of the water [between the island and the mainland city site to make a causeway].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will cause the noise of your songs to cease, and the sound of your lyres shall be no more heard.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will make you [Tyre] a bare rock; you shall be a place upon which to spread nets; you shall never be rebuilt, for I the Lord have spoken it, says the Lord God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord God to Tyre: Shall not the isles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands shake at the sound of your fall when the wounded groan, when the slaughter is made in the midst of you?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then all the princes of the sea shall come down from their thrones and lay aside their robes and strip off their embroidered garments; they shall clothe themselves with tremblings; they shall sit upon the ground and shall tremble every moment and be astonished at you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They shall take up a lamentation over you and say to you, How you are destroyed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vanished, O renowned city that was won from the seas '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inhabited by seafaring men, renowned city that was mighty on the sea, she and her inhabitants who caused their terror to fall upon all who dwell there!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the isles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands tremble in the day of your fall; yes, the isles that are in the sea are troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dismayed at your departure.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord God: When I make you a desolate city like the cities that are not inhabited, when I bring up the deep over you and great waters cover you,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, because Tyre has said against Jerusalem, Aha! She is broken that has been the gate of the people; she is open to me [Tyre]; I shall become full now that she is desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a wasteland,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then I will thrust you down with those who descend into the pit (the place of the dead) to the people of olden times, and I will make you [Tyre] to dwell in the lower world like the places that were desolate of old, with those who go down to the pit, that you be not inhabited or shed forth your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renown in the land of the living.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will make you a terror [bring you to a dreadful end] and you shall be no more. Though you be sought, yet you shall never be found again, says the Lord God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore thus says the Lord God: Behold, I am against you, O Tyre, and will cause many nations to come up against you as the sea mounts up by its waves.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall destroy the walls of Tyre and break down her towers; I will also scrape her dust from her and make her bare like the top of a rock.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Her island in the midst of the sea shall become a place for the spreading of nets, for I have spoken it, says the Lord God; and she shall become a prey '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a spoil to the nations.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Tyre''s daughters [her towns and villages on the mainland] in the level place shall be slain by the sword, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord God: Behold, I will bring from the north upon Tyre Nebuchadrezzar king of Babylon, a king of kings, with horses and chariots and with horsemen and a host of many people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He shall slay with the sword your daughters [the towns and villages] in the level area [on the mainland], and he shall make a fortified wall against you and cast up a siege mound against you and raise up a roof of bucklers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shields as a defense against you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he shall set his battering engines in shock against your walls, and with his axes he will break down your towers.'
