document_id: JER.28,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IN THAT same year, in the beginning of the reign of Zedekiah king of Judah, in the fourth year and the fifth month, Hananiah son of Azzur, the [false] prophet, who was from Gibeon [one of the priests'' cities], said [falsely] to me in the house of the Lord in the presence of the priests and all the people:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Hananiah the prophet took the yoke bar off the prophet Jeremiah''s neck and smashed it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Hananiah said in the presence of all the people, Thus says the Lord: Even so will I break the yoke bars of Nebuchadnezzar king of Babylon from the neck of all the nations within the space of two [full] years. But the prophet Jeremiah went his way.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The word of the Lord came to Jeremiah the prophet [some time] after Hananiah the prophet had broken the yoke bar from the neck of the prophet Jeremiah:'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go, tell Hananiah, Thus says the Lord: You have broken yoke bars of wood, but you have made in their stead bars of iron.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord of hosts, the God of Israel: I have put upon the neck of all these nations the iron yoke of servitude of Nebuchadnezzar king of Babylon, and they shall serve him. For I have given him even the beasts of the field. [Jer. 27:6-7.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then said the prophet Jeremiah to Hananiah the prophet, Listen now, Hananiah, The Lord has not sent you, but you have made this people trust in a lie.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore thus says the Lord: Behold, I will cast you from the face of the earth. This year you will die, because you have uttered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' taught rebellion against the Lord.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Hananiah the prophet died [two months later], the same year, in the seventh month.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord of hosts, the God of Israel: I have broken the yoke of the king of Babylon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Within two [full] years will I bring back into this place all the vessels of the Lord''s house that Nebuchadnezzar king of Babylon took away from this place and carried to Babylon.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will also bring back to this place Jeconiah [also called Coniah and Jehoiachin] son of Jehoiakim king of Judah, with all the exiles from Judah who went to Babylon, says the Lord, for I will break the yoke of the king of Babylon. [Jer. 22:10, 24-27; 52:34]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the prophet Jeremiah spoke to the prophet Hananiah in the presence of the priests and all the people who stood in the house of the Lord.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The prophet Jeremiah said, Amen! May the Lord do so; may the Lord perform your words which you have prophesied to bring back to this place from Babylon the vessels of the Lord''s house and all who were carried away captive.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nevertheless, listen now to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear this word which I speak in your hearing and in the hearing of all the people:'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The prophets who were before me and before you from of old prophesied against many countries and against great kingdoms, of war, of evil, and of pestilence.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as for the prophet who [on the contrary] prophesies of peace, when that prophet''s word comes to pass, [only] then will it be known that the Lord has truly sent him.'
