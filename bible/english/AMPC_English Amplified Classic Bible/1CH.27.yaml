document_id: 1CH.27,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THIS IS the list of the Israelites, the heads of fathers'' houses, the commanders of thousands and hundreds, and their officers who served the king in all matters of the divisions that came and went, month by month throughout the year, each division numbering 24,000.'
  '10':
  - type: text
    content: ' The seventh, for the seventh month, Helez the Pelonite, of the Ephraimites. In his division were 24,000.'
  '11':
  - type: text
    content: ' The eighth, for the eighth month, Sibbecai the Hushathite, of the Zarahites. In his division were 24,000.'
  '12':
  - type: text
    content: ' The ninth, for the ninth month, Abiezer of Anathoth, a Benjamite. In his division were 24,000.'
  '13':
  - type: text
    content: ' The tenth, for the tenth month, Maharai from Netophah, of the Zerahites. In his division were 24,000.'
  '14':
  - type: text
    content: ' The eleventh, for the eleventh month, Benaiah the Pirathonite, of the sons of Ephraim. In his division were 24,000.'
  '15':
  - type: text
    content: ' The twelfth, for the twelfth month, Heldai the Netophathite, of Othniel. In his division were 24,000.'
  '16':
  - type: text
    content: ' Also over the tribes of Israel: of the Reubenites: Eliezer son of Zichri was chief officer; of the Simeonites: Shephatiah son of Maachah;'
  '17':
  - type: text
    content: ' Of Levi: Hashabiah son of Kemuel; of Aaron: Zadok;'
  '18':
  - type: text
    content: ' Of Judah: Elihu, one of David''s brothers; of Issachar: Omri son of Michael;'
  '19':
  - type: text
    content: ' Of Zebulun: Ishmaiah son of Obadiah; of Naphtali: Jerimoth son of Azriel;'
  '2':
  - type: text
    content: ' Over the first division for the first month was Jashobeam son of Zabdiel. In his division were 24,000.'
  '20':
  - type: text
    content: ' Of the Ephraimites: Hoshea son of Azaziah; of the half-tribe of Manasseh: Joel son of Pedaiah;'
  '21':
  - type: text
    content: ' Of the half-tribe of Manasseh in Gilead: Iddo son of Zechariah; of Benjamin: Jaasiel son of Abner;'
  '22':
  - type: text
    content: ' Of Dan: Azarel son of Jeroham. These were the leaders of the tribes of Israel.'
  '23':
  - type: text
    content: ' But David did not number those under twenty years of age, for the Lord had promised to make Israel as the stars of the heavens.'
  '24':
  - type: text
    content: ' Joab son of Zeruiah began a census but did not finish, because the census brought wrath upon Israel, and the number was not recorded in the chronicles of King David.'
  '25':
  - type: text
    content: ' Over the king''s treasuries was Azmaveth son of Adiel; and over the treasuries in the country, cities, villages, and towers '
  - type: text
    content: or
  - type: text
    content: ' forts was Jonathan son of Uzziah;'
  '26':
  - type: text
    content: ' Over those who did the work of the field of tilling the soil was Ezri son of Chelub;'
  '27':
  - type: text
    content: ' Over the vineyards was Shimei the Ramathite; over the produce of the vineyards for the wine cellars, Zabdi the Shiphmite;'
  '28':
  - type: text
    content: ' Over the olive and sycamore trees in the low plains, Baal-hanan the Gederite; over the stores of oil, Joash;'
  '29':
  - type: text
    content: ' Over the herds pasturing in Sharon, Shitrai the Sharonite; over the herds in the valleys, Shaphat son of Adlai;'
  '3':
  - type: text
    content: ' He was descended from Perez and was chief of all the commanders of the army for the first month.'
  '30':
  - type: text
    content: ' Over the camels, Obil the Ishmaelite; over the she-donkeys, Jehdeiah the Meronothite;'
  '31':
  - type: text
    content: ' And over the flocks, Jaziz the Hagrite. All these were stewards of King David''s property.'
  '32':
  - type: text
    content: ' Also Jonathan, David''s uncle, was a counselor, a wise man and a scribe; he and Jehiel son of Hachmoni attended the king''s sons [as tutors]. [II Kings 10:6.]'
  '33':
  - type: text
    content: ' Ahithophel was the king''s counselor; Hushai the Archite was the king''s companion '
  - type: text
    content: and
  - type: text
    content: ' friend.'
  '34':
  - type: text
    content: ' Ahithophel was succeeded by Jehoiada son of Benaiah and by Abiathar. Joab was the commander of the king''s army.'
  '4':
  - type: text
    content: ' Over the division for the second month was Dodai the Ahohite; and of his division Mikloth was the chief officer. In his division were 24,000.'
  '5':
  - type: text
    content: ' The third commander of the army for the third month was Benaiah son of Jehoiada the priest, as chief. In his division were 24,000.'
  '6':
  - type: text
    content: ' This is the Benaiah who was a mighty man of the Thirty and over the Thirty; and in his division was Ammizabad his son.'
  '7':
  - type: text
    content: ' The fourth, for the fourth month, Asahel brother of Joab, and Zebadiah his son after him. In his division were 24,000.'
  '8':
  - type: text
    content: ' The fifth, for the fifth month, Shamhuth the Izrahite. In his division were 24,000.'
  '9':
  - type: text
    content: ' The sixth, for the sixth month, Ira son of Ikkesh the Tekoite. In his division were 24,000.'
