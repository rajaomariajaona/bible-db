document_id: 1CH.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THIS IS the list of the Israelites, the heads of fathers'' houses, the commanders of thousands and hundreds, and their officers who served the king in all matters of the divisions that came and went, month by month throughout the year, each division numbering 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Over the first division for the first month was Jashobeam son of Zabdiel. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He was descended from Perez and was chief of all the commanders of the army for the first month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Over the division for the second month was Dodai the Ahohite; and of his division Mikloth was the chief officer. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The third commander of the army for the third month was Benaiah son of Jehoiada the priest, as chief. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' This is the Benaiah who was a mighty man of the Thirty and over the Thirty; and in his division was Ammizabad his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The fourth, for the fourth month, Asahel brother of Joab, and Zebadiah his son after him. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The fifth, for the fifth month, Shamhuth the Izrahite. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The sixth, for the sixth month, Ira son of Ikkesh the Tekoite. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The seventh, for the seventh month, Helez the Pelonite, of the Ephraimites. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The eighth, for the eighth month, Sibbecai the Hushathite, of the Zarahites. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The ninth, for the ninth month, Abiezer of Anathoth, a Benjamite. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The tenth, for the tenth month, Maharai from Netophah, of the Zerahites. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The eleventh, for the eleventh month, Benaiah the Pirathonite, of the sons of Ephraim. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The twelfth, for the twelfth month, Heldai the Netophathite, of Othniel. In his division were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Also over the tribes of Israel: of the Reubenites: Eliezer son of Zichri was chief officer; of the Simeonites: Shephatiah son of Maachah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Of Levi: Hashabiah son of Kemuel; of Aaron: Zadok;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Of Judah: Elihu, one of David''s brothers; of Issachar: Omri son of Michael;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Of Zebulun: Ishmaiah son of Obadiah; of Naphtali: Jerimoth son of Azriel;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of the Ephraimites: Hoshea son of Azaziah; of the half-tribe of Manasseh: Joel son of Pedaiah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Of the half-tribe of Manasseh in Gilead: Iddo son of Zechariah; of Benjamin: Jaasiel son of Abner;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Of Dan: Azarel son of Jeroham. These were the leaders of the tribes of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But David did not number those under twenty years of age, for the Lord had promised to make Israel as the stars of the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Joab son of Zeruiah began a census but did not finish, because the census brought wrath upon Israel, and the number was not recorded in the chronicles of King David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Over the king''s treasuries was Azmaveth son of Adiel; and over the treasuries in the country, cities, villages, and towers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' forts was Jonathan son of Uzziah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Over those who did the work of the field of tilling the soil was Ezri son of Chelub;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Over the vineyards was Shimei the Ramathite; over the produce of the vineyards for the wine cellars, Zabdi the Shiphmite;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Over the olive and sycamore trees in the low plains, Baal-hanan the Gederite; over the stores of oil, Joash;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Over the herds pasturing in Sharon, Shitrai the Sharonite; over the herds in the valleys, Shaphat son of Adlai;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Over the camels, Obil the Ishmaelite; over the she-donkeys, Jehdeiah the Meronothite;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And over the flocks, Jaziz the Hagrite. All these were stewards of King David''s property.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Also Jonathan, David''s uncle, was a counselor, a wise man and a scribe; he and Jehiel son of Hachmoni attended the king''s sons [as tutors]. [II Kings 10:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Ahithophel was the king''s counselor; Hushai the Archite was the king''s companion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' friend.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Ahithophel was succeeded by Jehoiada son of Benaiah and by Abiathar. Joab was the commander of the king''s army.'
