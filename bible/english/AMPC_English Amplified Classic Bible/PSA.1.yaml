document_id: PSA.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BLESSED (HAPPY, fortunate, prosperous, and enviable) is the man who walks '
  - type: text
    content: and
  - type: text
    content: ' lives not in the counsel of the ungodly [following their advice, their plans and purposes], nor stands [submissive and inactive] in the path where sinners walk, nor sits down [to relax and rest] where the scornful [and the mockers] gather.'
  '2':
  - type: text
    content: ' But his delight '
  - type: text
    content: and
  - type: text
    content: ' desire are in the law of the Lord, and on His law (the precepts, the instructions, the teachings of God) he habitually meditates (ponders and studies) by day and by night. [Rom. 13:8-10; Gal. 3:1-29; II Tim. 3:16.]'
  '3':
  - type: text
    content: ' And he shall be like a tree firmly planted [and tended] by the streams of water, ready to bring forth its fruit in its season; its leaf also shall not fade '
  - type: text
    content: or
  - type: text
    content: ' wither; and everything he does shall prosper [and come to maturity]. [Jer. 17:7, 8.]'
  '4':
  - type: text
    content: ' Not so the wicked [those disobedient and living without God are not so]. But they are like the chaff [worthless, dead, without substance] which the wind drives away.'
  '5':
  - type: text
    content: ' Therefore the wicked [those disobedient and living without God] shall not stand [justified] in the judgment, nor sinners in the congregation of the righteous [those who are upright and in right standing with God].'
  '6':
  - type: text
    content: ' For the Lord knows '
  - type: text
    content: and
  - type: text
    content: ' is fully acquainted with the way of the righteous, but the way of the ungodly [those living outside God''s will] shall perish (end in ruin and come to nought).'
