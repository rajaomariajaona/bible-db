document_id: ECC.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' CAST YOUR bread upon the waters, for you will find it after many days.'
  '10':
  - type: text
    content: ' Therefore remove [the lusts that end in] sorrow '
  - type: text
    content: and
  - type: text
    content: ' vexation from your heart '
  - type: text
    content: and
  - type: text
    content: ' mind and put away evil from your body, for youth and the dawn of life are vanity [transitory, idle, empty, and devoid of truth]. [II Cor. 7:1; II Tim. 2:22.]'
  '2':
  - type: text
    content: ' Give a portion to seven, yes, even [divide it] to eight, for you know not what evil may come upon the earth.'
  '3':
  - type: text
    content: ' If the clouds are full of rain, they empty themselves upon the earth; and if a tree falls toward the south or toward the north, in the place where the tree falls, there it will lie.'
  '4':
  - type: text
    content: ' He who observes the wind [and waits for all conditions to be favorable] will not sow, and he who regards the clouds will not reap.'
  '5':
  - type: text
    content: ' As you know not what is the way of the wind, or how the spirit comes to the bones in the womb of a pregnant woman, even so you know not the work of God, Who does all.'
  '6':
  - type: text
    content: ' In the morning sow your seed, and in the evening withhold not your hands, for you know not which shall prosper, whether this or that, or whether both alike will be good.'
  '7':
  - type: text
    content: ' Truly the light is sweet, and a pleasant thing it is for the eyes to behold the sun.'
  '8':
  - type: text
    content: ' Yes, if a man should live many years, let him rejoice in them all; yet let him [seriously] remember the days of darkness, for they will be many. All that comes is vanity (emptiness, falsity, vainglory, and futility)!'
  '9':
  - type: text
    content: ' Rejoice, O young man, in your adolescence, and let your heart cheer you in the days of your [full-grown] youth. And walk in the ways of your heart and in the sight of your eyes, but know that for all these things God will bring you into judgment.'
