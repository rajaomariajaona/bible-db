document_id: PSA.78,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A skillful song, {or} a didactic {or} reflective poem, of Asaph.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' GIVE EAR, O my people, to my teaching; incline your ears to the words of my mouth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' They kept not the covenant of God and refused to walk according to His law'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And forgot His works and His wonders that He had shown them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Marvelous things did He in the sight of their fathers in the land of Egypt, in the field of Zoan [where Pharaoh resided].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He divided the [Red] Sea and caused them to pass through it, and He made the waters stand like a heap. [Exod. 14:22.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' In the daytime also He led them with a [pillar of] cloud and all the night with a light of fire. [Exod. 13:21; 14:24.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He split rocks in the wilderness and gave them drink abundantly as out of the deep.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He brought streams also out of the rock [at Rephidim and Kadesh] and caused waters to run down like rivers. [Exod. 17:6; Num. 20:11.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Yet they still went on to sin against Him by provoking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebelling against the Most High in the wilderness (in the land of drought).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And they tempted God in their hearts by asking for food according to their [selfish] desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appetite.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Yes, they spoke against God; they said, Can God furnish [the food for] a table in the wilderness?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I will open my mouth in a parable (in instruction by numerous examples); I will utter dark sayings of old [that hide important truth]–[Matt. 13:34, 35.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Behold, He did smite the rock so that waters gushed out and the streams overflowed; but can He give bread also? Can He provide flesh for His people?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Therefore, when the Lord heard, He was [full of] wrath; a fire was kindled against Jacob, His anger mounted up against Israel,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Because in God they believed not [they relied not on Him, they adhered not to Him], and they trusted not in His salvation (His power to save).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Yet He commanded the clouds above and opened the doors of heaven;'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And He rained down upon them manna to eat and gave them heaven''s grain. [Exod. 16:14; John 6:31.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Everyone ate the bread of the mighty [man ate angels'' food]; God sent them meat in abundance.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' He let forth the east wind to blow in the heavens, and by His power He guided the south wind.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' He rained flesh also upon them like the dust, and winged birds [quails] like the sand of the seas. [Num. 11:31.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And He let [the birds] fall in the midst of their camp, round about their tents.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' So they ate and were well filled; He gave them what they craved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lusted after.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Which we have heard and known, and our fathers have told us.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But scarce had they stilled their craving, and while their meat was yet in their mouths, [Num. 11:33.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' The wrath of God came upon them and slew the strongest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sturdiest of them and smote down Israel''s chosen youth.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' In spite of all this, they sinned still more, for they believed not in (relied not on and adhered not to Him for) His wondrous works.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Therefore their days He consumed like a breath [in emptiness, falsity, and futility] and their years in terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sudden haste.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' When He slew [some of] them, [the remainder] inquired after Him diligently, and they repented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sincerely sought God [for a time].'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And they [earnestly] remembered that God was their Rock, and the Most High God their Redeemer.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Nevertheless they flattered Him with their mouths and lied to Him with their tongues.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' For their hearts were not right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sincere with Him, neither were they faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast to His covenant. [Acts 8:21.]'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But He, full of [merciful] compassion, forgave their iniquity and destroyed them not; yes, many a time He turned His anger away and did not stir up all His wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' For He [earnestly] remembered that they were but flesh, a wind that goes and does not return.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' We will not hide them from their children, but we will tell to the generation to come the praiseworthy deeds of the Lord, and His might, and the wonderful works that He has performed.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' How often they defied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebelled against Him in the wilderness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grieved Him in the desert!'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' And time and again they turned back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tempted God, provoking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incensing the Holy One of Israel.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' They remembered not [seriously the miracles of the working of] His hand, nor the day when He delivered them from the enemy,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' How He wrought His miracles in Egypt and His wonders in the field of Zoan [where Pharaoh resided]'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And turned their rivers into blood, and their streams, so that they could not drink from them.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' He sent swarms of [venomous] flies among them which devoured them, and frogs which destroyed them.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' He gave also their crops to the caterpillar and [the fruit of] their labor to the locust.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' He destroyed their vines with hail and their sycamore trees with frost '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [great chunks of] ice.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' He [caused them to shut up their cattle or] gave them up also to the hail and their flocks to hot thunderbolts. [Exod. 9:18-21.]'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' He let loose upon them the fierceness of His anger, His wrath and indignation and distress, by sending [a mission of] angels of calamity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' woe among them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For He established a testimony (an express precept) in Jacob and appointed a law in Israel, commanding our fathers that they should make [the great facts of God''s dealings with Israel] known to their children,'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' He leveled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made a straight path for His anger [to give it free course]; He did not spare [the Egyptian families] from death but gave their beasts over to the pestilence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the life [of their eldest] over to the plague.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' He smote all the firstborn in Egypt, the chief of their strength in the tents [of the land of the sons] of Ham.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' But [God] led His own people forth like sheep and guided them [with a shepherd''s care] like a flock in the wilderness.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' And He led them on safely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in confident trust, so that they feared not; but the sea overwhelmed their enemies. [Exod. 14:27, 28.]'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' And He brought them to His holy border, the border of [Canaan] His sanctuary, even to this mountain [Zion] which His right hand had acquired.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' He drove out the nations also before [Israel] and allotted their land as a heritage, measured out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' partitioned; and He made the tribes of Israel to dwell in the tents of those dispossessed.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' Yet they tempted and provoked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebelled against the Most High God and kept not His testimonies.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' But they turned back and dealt unfaithfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherously like their fathers; they were twisted like a warped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceitful bow [that will not respond to the archer''s aim].'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' For they provoked Him to [righteous] anger with their high places [for idol worship] and moved Him to jealousy with their graven images.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' When God heard this, He was full of [holy] wrath; and He utterly rejected Israel, greatly abhorring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathing [her ways],'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' That the generation to come might know them, that the children still to be born might arise and recount them to their children,'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' So that He forsook the tabernacle at Shiloh, the tent in which He had dwelt among men [and never returned to it again],'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' And delivered His strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power (the ark of the covenant) into captivity, and His glory into the hands of the foe (the Philistines). [I Sam. 4:21.]'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' He gave His people over also to the sword and was wroth with His heritage [Israel]. [I Sam. 4:10.]'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' The fire [of war] devoured their young men, and their bereaved virgins were not praised in a wedding song.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' Their priests [Hophni and Phinehas] fell by the sword, and their widows made no lamentation [for the bodies came not back from the scene of battle, and the widow of Phinehas also died that day]. [I Sam. 4:11, 19, 20.]'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' Then the Lord awakened as from sleep, as a strong man whose consciousness of power is heightened by wine.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' And He smote His adversaries in the back [as they fled]; He put them to lasting shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: ' Moreover, He rejected the tent of Joseph and chose not the tribe of Ephraim [in which the tabernacle had been accustomed to stand].'
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: ' But He chose the tribe of Judah [as Israel''s leader], Mount Zion, which He loved [to replace Shiloh as His capital].'
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: ' And He built His sanctuary [exalted] like the heights [of the heavens] and like the earth which He established forever.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' That they might set their hope in God and not forget the works of God, but might keep His commandments'
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
