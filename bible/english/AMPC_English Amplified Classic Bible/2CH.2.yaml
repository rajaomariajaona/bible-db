document_id: 2CH.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SOLOMON DETERMINED to build a temple for the Name of the Lord and a royal capitol.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Solomon counted out 70,000 men to bear burdens, 80,000 to be stonecutters in the hill country, and 3,600 overseers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Solomon sent to Hiram king of Tyre, saying, As you dealt with David my father and sent him cedars to build himself a house in which to dwell, even so deal with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, I am about to build a house for the Name of the Lord my God, dedicated to Him for the burning of incense of sweet spices before Him, for the continual showbread, and for the burnt offerings morning and evening, on the Sabbaths, New Moons, and on the solemn feasts of the Lord our God, as ordained forever for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The house which I am to build is great, for our God is greater than all gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But who is able to build Him a house, since heaven, even highest heaven, cannot contain Him? Who am I to build Him a house, except as a place to burn incense in worship before Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now therefore, send a man skilled to work in gold, silver, bronze, and iron, and in purple, crimson, and blue colors, who is a trained engraver, to work with the skilled men who are with me in Judah and Jerusalem, whom David my father provided.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Send me also from Lebanon cedar, cypress, and algum timber, for I know your servants can skillfully cut timber in Lebanon; and my servants will be with your servants,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' To prepare for me timber in abundance, for the house I am about to build shall be great and wonderful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I will give to your servants who cut timber 20,000 measures of crushed wheat and also of barley, and 20,000 baths of wine and also of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Hiram king of Tyre replied in writing sent to Solomon, Because the Lord loves His people, He has made you king over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Hiram said also, Blessed be the Lord, the God of Israel, Who made heaven and earth, Who has given to David the king a wise son, endued with prudence and understanding, who should build a house for the Lord and a royal palace as his capitol.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now I have sent a skilled man, endued with understanding, even Huram-abi, my trusted counselor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The son of a woman of the daughters of Dan; his father was a man of Tyre. He is a trained worker in gold, silver, bronze, iron, stone, and wood; in purple, blue, and crimson colors, and in fine linen; and also to engrave any type of engraving and to carry out any design given him, with your skilled men and those of my lord, David your father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now therefore, the wheat, barley, oil, and wine of which my lord has spoken, let him send them to his servants,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And we will cut whatever timber you need from Lebanon and bring it to you in rafts by sea to Joppa, so you may take it up to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Solomon took a census of all the aliens in the land of Israel, like the census of them which his father David had taken. They were found to be 153,600.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he assigned 70,000 of them to be burden bearers, 80,000 to work in the mountain quarries, and 3,600 as overseers to direct the people''s work.'
