document_id: JOB.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' CALL NOW–is there any who will answer you? And to which of the holy [angels] will you turn?'
  '10':
  - type: text
    content: ' Who gives rain upon the earth and sends waters upon the fields,'
  '11':
  - type: text
    content: ' So that He sets on high those who are lowly, and those who mourn He lifts to safety.'
  '12':
  - type: text
    content: ' He frustrates the devices of the crafty, so that their hands cannot perform their enterprise '
  - type: text
    content: or
  - type: text
    content: ' anything of [lasting] worth.'
  '13':
  - type: text
    content: ' He catches the [so-called] wise in their own trickiness, and the counsel of the schemers is brought to a quick end. [I Cor. 3:19, 20.]'
  '14':
  - type: text
    content: ' In the daytime they meet in darkness, and at noon they grope as in the night.'
  '15':
  - type: text
    content: ' But [God] saves [the fatherless] from the sword of their mouth, and the needy from the hand of the mighty.'
  '16':
  - type: text
    content: ' So the poor have hope, and iniquity shuts her mouth.'
  '17':
  - type: text
    content: ' Happy '
  - type: text
    content: and
  - type: text
    content: ' fortunate is the man whom God reproves; so do not despise '
  - type: text
    content: or
  - type: text
    content: ' reject the correction of the Almighty [subjecting you to trial and suffering].'
  '18':
  - type: text
    content: ' For He wounds, but He binds up; He smites, but His hands heal.'
  '19':
  - type: text
    content: ' He will rescue you in six troubles; in seven nothing that is evil [for you] will touch you.'
  '2':
  - type: text
    content: ' For vexation '
  - type: text
    content: and
  - type: text
    content: ' rage kill the foolish man; jealousy '
  - type: text
    content: and
  - type: text
    content: ' indignation slay the simple.'
  '20':
  - type: text
    content: ' In famine He will redeem you from death, and in war from the power of the sword.'
  '21':
  - type: text
    content: ' You shall be hidden from the scourge of the tongue, neither shall you be afraid of destruction when it comes.'
  '22':
  - type: text
    content: ' At destruction and famine you shall laugh, neither shall you be afraid of the living creatures of the earth.'
  '23':
  - type: text
    content: ' For you shall be in league with the stones of the field, and the beasts of the field shall be at peace with you.'
  '24':
  - type: text
    content: ' And you shall know that your tent shall be in peace, and you shall visit your fold '
  - type: text
    content: and
  - type: text
    content: ' your dwelling and miss nothing [from them].'
  '25':
  - type: text
    content: ' You shall know also that your children shall be many, and your offspring as the grass of the earth.'
  '26':
  - type: text
    content: ' You shall come to your grave in ripe old age, and as a shock of grain goes up [to the threshing floor] in its season.'
  '27':
  - type: text
    content: ' This is what we have searched out; it is true. Hear '
  - type: text
    content: and
  - type: text
    content: ' heed it and know for yourself [for your good].'
  '3':
  - type: text
    content: ' I have seen the foolish taking root [and outwardly prospering], but suddenly I saw that his dwelling was cursed [for his doom was certain].'
  '4':
  - type: text
    content: ' His children are far from safety; [involved in their father''s ruin] they are crushed in the [court of justice in the city''s] gate, and there is no one to deliver them.'
  '5':
  - type: text
    content: ' His harvest the hungry eat and take it even [when it grows] among the thorns; the snare opens for [his] wealth.'
  '6':
  - type: text
    content: ' For affliction comes not forth from the dust, neither does trouble spring forth out of the ground.'
  '7':
  - type: text
    content: ' But man is born to trouble as the sparks '
  - type: text
    content: and
  - type: text
    content: ' the flames fly upward.'
  '8':
  - type: text
    content: ' As for me, I would seek God '
  - type: text
    content: and
  - type: text
    content: ' inquire of '
  - type: text
    content: and
  - type: text
    content: ' require Him, and to God would I commit my cause–'
  '9':
  - type: text
    content: ' Who does great things and unsearchable, marvelous things without number,'
