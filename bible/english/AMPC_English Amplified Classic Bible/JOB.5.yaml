document_id: JOB.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' CALL NOW–is there any who will answer you? And to which of the holy [angels] will you turn?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For vexation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rage kill the foolish man; jealousy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation slay the simple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I have seen the foolish taking root [and outwardly prospering], but suddenly I saw that his dwelling was cursed [for his doom was certain].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' His children are far from safety; [involved in their father''s ruin] they are crushed in the [court of justice in the city''s] gate, and there is no one to deliver them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' His harvest the hungry eat and take it even [when it grows] among the thorns; the snare opens for [his] wealth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For affliction comes not forth from the dust, neither does trouble spring forth out of the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But man is born to trouble as the sparks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the flames fly upward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As for me, I would seek God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inquire of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require Him, and to God would I commit my cause–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who does great things and unsearchable, marvelous things without number,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who gives rain upon the earth and sends waters upon the fields,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So that He sets on high those who are lowly, and those who mourn He lifts to safety.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He frustrates the devices of the crafty, so that their hands cannot perform their enterprise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' anything of [lasting] worth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He catches the [so-called] wise in their own trickiness, and the counsel of the schemers is brought to a quick end. [I Cor. 3:19, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the daytime they meet in darkness, and at noon they grope as in the night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But [God] saves [the fatherless] from the sword of their mouth, and the needy from the hand of the mighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So the poor have hope, and iniquity shuts her mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortunate is the man whom God reproves; so do not despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reject the correction of the Almighty [subjecting you to trial and suffering].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For He wounds, but He binds up; He smites, but His hands heal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He will rescue you in six troubles; in seven nothing that is evil [for you] will touch you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' In famine He will redeem you from death, and in war from the power of the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You shall be hidden from the scourge of the tongue, neither shall you be afraid of destruction when it comes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' At destruction and famine you shall laugh, neither shall you be afraid of the living creatures of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For you shall be in league with the stones of the field, and the beasts of the field shall be at peace with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And you shall know that your tent shall be in peace, and you shall visit your fold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your dwelling and miss nothing [from them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' You shall know also that your children shall be many, and your offspring as the grass of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' You shall come to your grave in ripe old age, and as a shock of grain goes up [to the threshing floor] in its season.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' This is what we have searched out; it is true. Hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed it and know for yourself [for your good].'
