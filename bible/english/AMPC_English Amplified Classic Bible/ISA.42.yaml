document_id: ISA.42
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD MY Servant, Whom I uphold, My elect in Whom My soul delights! I have put My Spirit upon Him; He will bring forth justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reveal truth to the nations. [Matt. 3:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He will not cry or shout aloud or cause His voice to be heard in the street.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A bruised reed He will not break, and a dimly burning wick He will not quench; He will bring forth justice in truth. [Matt. 12:17-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He will not fail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become weak or be crushed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discouraged till He has established justice in the earth; and the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastal regions shall wait hopefully for Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect His direction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' law. [Rom. 8:22-25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says God the Lord–He Who created the heavens and stretched them forth, He Who spread abroad the earth and that which comes out of it, He Who gives breath to the people on it and spirit to those who walk in it:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I the Lord have called You [the Messiah] for a righteous purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in righteousness; I will take You by the hand and will keep You; I will give You for a covenant to the people [Israel], for a light to the nations [Gentiles],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' To open the eyes of the blind, to bring out prisoners from the dungeon, and those who sit in darkness from the prison. [Matt. 12:18-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I am the Lord; that is My name! And My glory I will not give to another, nor My praise to graven images.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Behold, the former things have come to pass, and new things I now declare; before they spring forth I tell you of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Sing to the Lord a new song, and His praise from the end of the earth! You who go down to the sea, and all that is in it, the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastal regions and the inhabitants of them [sing a song such as has never been heard in the heathen world]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let the wilderness and its cities lift up their voices, the villages that Kedar inhabits. Let the inhabitants of the rock [Sela or Petra] sing; let them shout from the tops of the mountains!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let them give glory to the Lord and declare His praise in the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastal regions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord will go forth like a mighty man, He will rouse up His zealous indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vengeance like a warrior; He will cry, yes, He will shout aloud, He will do mightily against His enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [Thus says the Lord] I have for a long time held My peace, I have been still and restrained Myself. Now I will cry out like a woman in travail, I will gasp and pant together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I will lay waste the mountains and hills and dry up all their herbage; I will turn the rivers into islands, and I will dry up the pools.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I will bring the blind by a way that they know not; I will lead them in paths that they have not known. I will make darkness into light before them and make uneven places into a plain. These things I have determined to do [for them]; and I will not leave them forsaken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They shall be turned back, they shall be utterly put to shame, who trust in graven images, who say to molten images, You are our gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Hear, you deaf! And look, you blind, that you may see!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Who is blind but My servant [Israel]? Or deaf like My messenger whom I send? Who is blind like the one who is at peace with Me [who has been admitted to covenant relationship with Me]? Yes, who is blind like the Lord''s servant?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You have seen many things, but you do not observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' apprehend their true meaning. His ears are open, but he hears not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' It was the Lord''s pleasure for His righteousness'' sake [in accordance with a steadfast and consistent purpose] to magnify instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revelation and glorify them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But this is a people robbed and plundered; they are all of them snared in holes and hidden in houses of bondage. They have become a prey, with no one to deliver them, a spoil, with no one to say, Restore them! [This shows the condition that will ensue as Israel''s punishment for not recognizing the Servant of the Lord and the day of His visit among them.] [Luke19:41-44.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Who is there among you who will give ear to this? Who will listen and hear in the time to come?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Who gave up Jacob [the kingdom of Judah] for spoil, and [the kingdom of] Israel to the robbers? Was it not the Lord, He against Whom we [of Judah] have sinned and in Whose ways they [of Israel] would not walk, neither were they obedient to His law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' His teaching?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Therefore He poured out upon [Israel] the fierceness of His anger and the strength of battle. And it set him on fire round about, yet he knew not [the lesson of repentance which the Assyrian conquest was intended to teach]; it burned him, but he did not lay it to heart.'
