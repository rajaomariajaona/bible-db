document_id: EXO.39
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND OF the blue and purple and scarlet [stuff] they made finely wrought garments for serving in the Holy Place; they made the holy garments for Aaron, as the Lord had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Bezalel made the ephod of gold, blue, purple, and scarlet [stuff], and fine twined linen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they beat the gold into thin sheets and cut it into wires to work into the blue, purple, and scarlet [stuff] and the fine linen, in skilled design.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They made shoulder pieces for the ephod, joined to it at its two edges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the skillfully woven band on it, to gird it on, was of the same piece and workmanship with it, of gold, blue, purple, and scarlet [stuff], and fine twined linen, as the Lord had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they prepared the onyx stones enclosed in settings of gold filigree and engraved as signets are engraved with the names of the sons of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he put them on the shoulder pieces of the ephod to be stones of memorial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' remembrance for the Israelites, as the Lord had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And [Bezalel] made the breastplate skillfully, like the work of the ephod, of gold, blue, purple, and scarlet [stuff], and fine twined linen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The breastplate was a [hand''s] span square when doubled over.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they set in it four rows of stones; a sardius, a topaz, and a carbuncle made the first row;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The second row an emerald, a sapphire, and a diamond;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The third row a jacinth, an agate, and an amethyst;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the fourth row a beryl, an onyx, and a jasper; they were enclosed in settings of gold filigree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' There were twelve stones with their names according to those of the sons of Israel, engraved like a signet, each with its name, according to the twelve tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they made [at the ends] of the breastplate twisted chains like cords, of pure gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they made two settings of gold filigree and two gold rings which they put on the two ends of the breastplate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they put the two twisted cords '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' woven chains of gold in the two rings on the end edges of the breastplate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the other two ends of the twisted cords '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' chains of gold they put on the two settings and put them on the shoulder pieces of the ephod, in front.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They made two rings of gold and put them on the two ends of the breastplate, on the inside edge of it next to the ephod.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And they made two [other] gold rings and attached them to the two shoulder pieces of the ephod underneath, in front, at its joining above the skillfully woven band of the ephod.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They bound the breastplate by its rings to those of the ephod with a blue lace, that it might lie upon the skillfully woven band of the ephod and that the breastplate might not be loosed from the ephod, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And he made the robe of the ephod of woven work all of blue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And there was an opening [for the head] in the middle of the robe like the hole in a coat of mail, with a binding around it, that it should not be torn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' On the skirts of the robe they made pomegranates of blue and purple and scarlet [stuff] and twined linen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they made bells of pure gold and put [them] between the pomegranates around the skirts of the robe;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' A bell and a pomegranate, a bell and a pomegranate, round about on the skirts of the robe for ministering, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they made the long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sleeved tunics woven of fine linen for Aaron and his sons,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the turban, and the ornamental caps of fine linen, and the breeches of fine twined linen,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The girdle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sash of fine twined linen, and blue, purple, and scarlet embroidery, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And they made the plate of the holy crown of pure gold and wrote upon it an inscription, like the engravings of a signet, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: holy to the lord.
  - type: text
    text: ' [Exod. 28:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' They tied to it a lace of blue to fasten it on the turban above, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Thus all the work of the tabernacle of the Tent of Meeting was finished; according to all that the Lord commanded Moses, so the Israelites had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And they brought the tabernacle to Moses: the tent and all its furnishings, its clasps, its [frame] boards, its bars, its pillars, its sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And the covering of rams'' skins made red, and the covering of dolphin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' porpoise skins, and the veil of the screen;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The ark of the Testimony, its poles, and the mercy seat;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The table and all its utensils, and the showbread (bread of the Presence);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' The pure [gold] lampstand and its lamps, with the lamps set in order, all its utensils, and the oil for the light;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The golden altar, the anointing oil, the fragrant incense, and the hanging for the door of the tent;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' The bronze altar and its grate of bronze, its poles and all its utensils; the laver and its base;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' The hangings of the court, its pillars and sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases, and the screen for the court gate, its cords, and pegs, and all the utensils for the service of the tabernacle, for the Tent of Meeting [of God with His people]; [Exod. 29:42, 43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The finely worked vestments for ministering in the Holy Place, the holy garments for Aaron the priest, and the garments of his sons to minister as priests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' According to all that the Lord had commanded Moses, so the Israelites had done all the work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And Moses inspected all the work, and behold, they had done it; as the Lord had commanded, so had they done it. And Moses blessed them.'
