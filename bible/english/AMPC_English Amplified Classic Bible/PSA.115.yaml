document_id: PSA.115,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOT TO us, O Lord, not to us but to Your name give glory, for Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and for the sake of Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness!'
  '10':
  - type: text
    content: ' O house of Aaron [the priesthood], trust in '
  - type: text
    content: and
  - type: text
    content: ' lean on the Lord! He is their Help and their Shield.'
  '11':
  - type: text
    content: ' You who [reverently] fear the Lord, trust in '
  - type: text
    content: and
  - type: text
    content: ' lean on the Lord! He is their Help and their Shield.'
  '12':
  - type: text
    content: ' The Lord has been mindful of us, He will bless us: He will bless the house of Israel, He will bless the house of Aaron [the priesthood],'
  '13':
  - type: text
    content: ' He will bless those who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear the Lord, both small and great. [Ps. 103:11; Rev. 11:18; 19:5.]'
  '14':
  - type: text
    content: ' May the Lord give you increase more and more, you and your children.'
  '15':
  - type: text
    content: ' May you be blessed of the Lord, Who made heaven and earth!'
  '16':
  - type: text
    content: ' The heavens are the Lord''s heavens, but the earth has He given to the children of men.'
  '17':
  - type: text
    content: ' The dead praise not the Lord, neither any who go down into silence.'
  '18':
  - type: text
    content: ' But we will bless (affectionately and gratefully praise) the Lord from this time forth and forever. Praise the Lord! (Hallelujah!)'
  '2':
  - type: text
    content: ' Why should the nations say, Where is now their God?'
  '3':
  - type: text
    content: ' But our God is in heaven; He does whatever He pleases.'
  '4':
  - type: text
    content: ' The idols of the nations are silver and gold, the work of men''s hands.'
  '5':
  - type: text
    content: ' They have mouths, but they speak not; eyes have they, but they see not;'
  '6':
  - type: text
    content: ' They have ears, but they hear not; noses have they, but they smell not;'
  '7':
  - type: text
    content: ' They have hands, but they handle not; feet have they, but they walk not; neither can they make a sound with their throats.'
  '8':
  - type: text
    content: ' They who make idols are like them; so are all who trust in '
  - type: text
    content: and
  - type: text
    content: ' lean on them. [Ps. 135:15-18.]'
  '9':
  - type: text
    content: ' O Israel, trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in the Lord! [Lean on, rely on, and be confident in Him!] He is their Help and their Shield.'
