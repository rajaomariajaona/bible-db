document_id: PSA.115,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOT TO us, O Lord, not to us but to Your name give glory, for Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness and for the sake of Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' O house of Aaron [the priesthood], trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lean on the Lord! He is their Help and their Shield.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You who [reverently] fear the Lord, trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lean on the Lord! He is their Help and their Shield.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The Lord has been mindful of us, He will bless us: He will bless the house of Israel, He will bless the house of Aaron [the priesthood],'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He will bless those who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear the Lord, both small and great. [Ps. 103:11; Rev. 11:18; 19:5.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' May the Lord give you increase more and more, you and your children.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' May you be blessed of the Lord, Who made heaven and earth!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The heavens are the Lord''s heavens, but the earth has He given to the children of men.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The dead praise not the Lord, neither any who go down into silence.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But we will bless (affectionately and gratefully praise) the Lord from this time forth and forever. Praise the Lord! (Hallelujah!)'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Why should the nations say, Where is now their God?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But our God is in heaven; He does whatever He pleases.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The idols of the nations are silver and gold, the work of men''s hands.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They have mouths, but they speak not; eyes have they, but they see not;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' They have ears, but they hear not; noses have they, but they smell not;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' They have hands, but they handle not; feet have they, but they walk not; neither can they make a sound with their throats.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' They who make idols are like them; so are all who trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lean on them. [Ps. 135:15-18.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' O Israel, trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in the Lord! [Lean on, rely on, and be confident in Him!] He is their Help and their Shield.'
