document_id: PRO.20,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WINE IS a mocker, strong drink a riotous brawler; and whoever errs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reels because of it is not wise. [Prov. 23:29, 30; Isa. 28:7; Hos. 4:11.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Diverse weights [one for buying and another for selling] and diverse measures–both of them are exceedingly offensive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abhorrent to the Lord. [Deut. 25:13; Mic. 6:10, 11.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Even a child is known by his acts, whether [or not] what he does is pure and right.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The hearing ear and the seeing eye–the Lord has made both of them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Love not sleep, lest you come to poverty; open your eyes and you will be satisfied with bread.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' It is worthless, it is worthless! says the buyer; but when he goes his way, then he boasts [about his bargain].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' There is gold, and a multitude of pearls, but the lips of knowledge are a vase of preciousness [the most precious of all]. [Job 28:12, 16-19; Prov. 3:15; 8:11.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' [The judge tells the creditor] Take the garment of one who is security for a stranger; and hold him in pledge when he is security for foreigners.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Food gained by deceit is sweet to a man, but afterward his mouth will be filled with gravel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Purposes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans are established by counsel; and [only] with good advice make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' carry on war.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' He who goes about as a talebearer reveals secrets; therefore associate not with him who talks too freely. [Rom. 16:17, 18.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The terror of a king is as the roaring of a lion; whoever provokes him to anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' angers himself against him sins against his own life.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Whoever curses his father or his mother, his lamp shall be put out in complete darkness.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' An inheritance hastily gotten [by greedy, unjust means] at the beginning, in the end it will not be blessed. [Prov. 28:20; Hab. 2:6.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Do not say, I will repay evil; wait [expectantly] for the Lord, and He will rescue you. [II Sam. 16:12; Rom. 12:17-19; I Thess. 5:15; I Pet. 3:9.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Diverse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceitful weights are shamefully vile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abhorrent to the Lord, and false scales are not good.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Man''s steps are ordered by the Lord. How then can a man understand his way?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' It is a snare to a man to utter a vow [of consecration] rashly and [not until] afterward inquire [whether he can fulfill it].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' A wise king winnows out the wicked [from among the good] and brings the threshing wheel over them [to separate the chaff from the grain].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' The spirit of man [that factor in human personality which proceeds immediately from God] is the lamp of the Lord, searching all his innermost parts. [I Cor. 2:11.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Loving-kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy, truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness, preserve the king, and his throne is upheld by [the people''s] loyalty.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The glory of young men is their strength, and the beauty of old men is their gray head [suggesting wisdom and experience].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' It is an honor for a man to cease from strife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep aloof from it, but every fool will quarrel.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Blows that wound cleanse away evil, and strokes [for correction] reach to the innermost parts.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The sluggard does not plow when winter sets in; therefore he begs in harvest and has nothing.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Counsel in the heart of man is like water in a deep well, but a man of understanding draws it out. [Prov. 18:4.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Many a man proclaims his own loving-kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goodness, but a faithful man who can find?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The righteous man walks in his integrity; blessed (happy, fortunate, enviable) are his children after him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' A king who sits on the throne of judgment winnows out all evil [like chaff] with his eyes.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Who can say, I have made my heart clean, I am pure from my sin? [I Kings 8:46; II Chron. 6:36; Job 9:30; 14:4; Ps. 51:5; I John 1:8.]'
