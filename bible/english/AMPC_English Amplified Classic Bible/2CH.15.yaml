document_id: 2CH.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE SPIRIT of God came upon Azariah son of Oded.'
  '10':
  - type: text
    content: ' So they gathered at Jerusalem in the third month of the fifteenth year of the reign of Asa.'
  '11':
  - type: text
    content: ' And they sacrificed to the Lord on that day from the spoil which they had brought–700 oxen and 7,000 sheep.'
  '12':
  - type: text
    content: ' And they entered into a covenant to seek the Lord, the God of their fathers, '
  - type: text
    content: and
  - type: text
    content: ' to yearn for Him with all their heart''s desire and with all their soul;'
  '13':
  - type: text
    content: ' And that whoever would not seek the Lord, the God of Israel, should be put to death, whether young or old, man or woman.'
  '14':
  - type: text
    content: ' They took an oath to the Lord with a loud voice, with shouting, with trumpets, and with cornets.'
  '15':
  - type: text
    content: ' And all Judah rejoiced at the oath, for they had sworn with all their heart and sought Him [yearning for Him] with their whole desire, and He was found by them. And the Lord gave them rest '
  - type: text
    content: and
  - type: text
    content: ' peace round about.'
  '16':
  - type: text
    content: ' Also Maacah, King Asa''s mother, he removed from being queen mother, because she had made an abominable image for [the goddess] Asherah. Asa cut down her idol, crushed it, and burned it at the brook Kidron.'
  '17':
  - type: text
    content: ' But the high places were not taken out of Israel. Nevertheless, the heart of Asa was blameless all his days.'
  '18':
  - type: text
    content: ' And he brought into the house of God the things that his father [Abijah] had dedicated and those he himself had dedicated–silver and gold and vessels.'
  '19':
  - type: text
    content: ' And there was no more war until the thirty-fifth year of the reign of Asa.'
  '2':
  - type: text
    content: ' And he went out to meet Asa and said to him, Hear me, Asa, and all Judah and Benjamin: the Lord is with you while you are with Him. If you seek Him [inquiring for and of Him, craving Him as your soul''s first necessity], He will be found by you; but if you [become indifferent and] forsake Him, He will forsake you.'
  '3':
  - type: text
    content: ' Now for a long time Israel was without the true God, without a teaching priest, and without law.'
  '4':
  - type: text
    content: ' But when they in their trouble turned to the Lord, the God of Israel, and [in desperation earnestly] sought Him, He was found by them.'
  '5':
  - type: text
    content: ' And in those times there was no peace to him who went out nor to him who came in, but great '
  - type: text
    content: and
  - type: text
    content: ' vexing afflictions '
  - type: text
    content: and
  - type: text
    content: ' disturbances were upon all the inhabitants of the countries.'
  '6':
  - type: text
    content: ' Nation was broke in pieces against nation, and city against city, for God vexed '
  - type: text
    content: and
  - type: text
    content: ' troubled them with all sorts of adversity.'
  '7':
  - type: text
    content: ' Be strong, therefore, and let not your hands be weak '
  - type: text
    content: and
  - type: text
    content: ' slack, for your work shall be rewarded.'
  '8':
  - type: text
    content: ' And when Asa heard these words, the prophecy of Oded the prophet, he took courage and put away the abominable idols from all the land of Judah and Benjamin and from the cities which he had taken in the hill country of Ephraim; and he repaired the altar [of burnt offering] of the Lord which was in front of the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule [of the house] of the Lord.'
  '9':
  - type: text
    content: ' And he gathered all Judah and Benjamin and the strangers with them out of Ephraim, Manasseh, and Simeon, for they came over to Asa out of Israel in large numbers when they saw that the Lord his God was with him.'
