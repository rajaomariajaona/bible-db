document_id: 2CH.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE SPIRIT of God came upon Azariah son of Oded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he went out to meet Asa and said to him, Hear me, Asa, and all Judah and Benjamin: the Lord is with you while you are with Him. If you seek Him [inquiring for and of Him, craving Him as your soul''s first necessity], He will be found by you; but if you [become indifferent and] forsake Him, He will forsake you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now for a long time Israel was without the true God, without a teaching priest, and without law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But when they in their trouble turned to the Lord, the God of Israel, and [in desperation earnestly] sought Him, He was found by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And in those times there was no peace to him who went out nor to him who came in, but great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexing afflictions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disturbances were upon all the inhabitants of the countries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Nation was broke in pieces against nation, and city against city, for God vexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled them with all sorts of adversity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Be strong, therefore, and let not your hands be weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slack, for your work shall be rewarded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when Asa heard these words, the prophecy of Oded the prophet, he took courage and put away the abominable idols from all the land of Judah and Benjamin and from the cities which he had taken in the hill country of Ephraim; and he repaired the altar [of burnt offering] of the Lord which was in front of the porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule [of the house] of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he gathered all Judah and Benjamin and the strangers with them out of Ephraim, Manasseh, and Simeon, for they came over to Asa out of Israel in large numbers when they saw that the Lord his God was with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So they gathered at Jerusalem in the third month of the fifteenth year of the reign of Asa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And they sacrificed to the Lord on that day from the spoil which they had brought–700 oxen and 7,000 sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they entered into a covenant to seek the Lord, the God of their fathers, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to yearn for Him with all their heart''s desire and with all their soul;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And that whoever would not seek the Lord, the God of Israel, should be put to death, whether young or old, man or woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They took an oath to the Lord with a loud voice, with shouting, with trumpets, and with cornets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And all Judah rejoiced at the oath, for they had sworn with all their heart and sought Him [yearning for Him] with their whole desire, and He was found by them. And the Lord gave them rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Also Maacah, King Asa''s mother, he removed from being queen mother, because she had made an abominable image for [the goddess] Asherah. Asa cut down her idol, crushed it, and burned it at the brook Kidron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the high places were not taken out of Israel. Nevertheless, the heart of Asa was blameless all his days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he brought into the house of God the things that his father [Abijah] had dedicated and those he himself had dedicated–silver and gold and vessels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And there was no more war until the thirty-fifth year of the reign of Asa.'
