document_id: LUK.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT ON the first day of the week, at early dawn, [the women] went to the tomb, taking the spices which they had made ready.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And they found the stone rolled back from the tomb,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But when they went inside, they did not find the body of the Lord Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And while they were perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondering what to do about this, behold, two men in dazzling raiment suddenly stood beside them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And as [the women] were frightened and were bowing their faces to the ground, the men said to them, Why do you look for the living among [those who are] dead?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He is not here, but has risen! Remember how He told you while He was still in Galilee'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' That the Son of Man must be given over into the hands of sinful men (men whose way or nature is to act in opposition to God) and be crucified and on the third day rise [from death]. [Ps. 16:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they remembered His words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And having returned from the tomb, they reported all these things [taken together] to the eleven apostles and to all the rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now it was Mary Magdalene and Joanna and Mary the mother of James, and the other women with them, who reported these things to the apostles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But these reports seemed to the men an idle tale (madness, feigned things, nonsense), and they did not believe the women.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But Peter got up and ran to the tomb; and stooping down and looking in, he saw the linen cloths alone by themselves, and he went away, wondering about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marveling at what had happened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And behold, that very day two of [the disciples] were going to a village called Emmaus, [which is] about seven miles from Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they were talking with each other about all these things that had occurred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And while they were conversing and discussing together, Jesus Himself caught up with them and was already accompanying them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But their eyes were held, so that they did not recognize Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And He said to them, What is this discussion that you are exchanging (throwing back and forth) between yourselves as you walk along? And they stood still, looking sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' downcast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then one of them, named Cleopas, answered Him, Do you alone dwell as a stranger in Jerusalem and not know the things that have occurred there in these days?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And He said to them, What [kind of] things? And they said to Him, About Jesus of Nazareth, Who was a Prophet mighty in work and word before God and all the people–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And how our chief priests and rulers gave Him up to be sentenced to death, and crucified Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But we were hoping that it was He Who would redeem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set Israel free. Yes, and besides all this, it is now the third day since these things occurred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And moreover, some women of our company astounded us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drove us out of our senses. They were at the tomb early [in the morning]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But did not find His body; and they returned saying that they had [even] seen a vision of angels, who said that He was alive!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So some of those [who were] with us went to the tomb and they found it just as the women had said, but Him they did not see.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And [Jesus] said to them, O foolish ones [sluggish in mind, dull of perception] and slow of heart to believe (adhere to and trust in and rely on) everything that the prophets have spoken!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Was it not necessary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' essentially fitting that the Christ (the Messiah) should suffer all these things before entering into His glory (His majesty and splendor)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then beginning with Moses and [throughout] all the Prophets, He went on explaining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpreting to them in all the Scriptures the things concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' referring to Himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then they drew near the village to which they were going, and He acted as if He would go further.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But they urged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insisted, saying to Him, Remain with us, for it is toward evening, and the day is now far spent. So He went in to stay with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And it occurred that as He reclined at table with them, He took [a loaf of] bread and praised [God] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' asked a blessing, and then broke it and was giving it to them'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When their eyes were [instantly] opened and they [clearly] recognized Him, and He vanished (departed invisibly).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And they said to one another, Were not our hearts greatly moved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burning within us while He was talking with us on the road and as He opened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' explained to us [the sense of] the Scriptures?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And rising up that very hour, they went back to Jerusalem, where they found the Eleven [apostles] gathered together and those who were with them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Who said, The Lord really has risen and has appeared to Simon (Peter)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then they [themselves] related [in full] what had happened on the road, and how He was known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized by them in the breaking of bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Now while they were talking about this, Jesus Himself took His stand among them and said to them, Peace (freedom from all the distresses that are experienced as the result of sin) be to you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' But they were so startled and terrified that they thought they saw a spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And He said to them, Why are you disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled, and why do such doubts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' questionings arise in your hearts?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' See My hands and My feet, that it is I Myself! Feel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handle Me and see, for a spirit does not have flesh and bones, as you see that I have.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And when He had said this, He showed them His hands and His feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And while [since] they still could not believe it for sheer joy and marveled, He said to them, Have you anything here to eat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' They gave Him a piece of broiled fish,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And He took [it] and ate [it] before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Then He said to them, This is what I told you while I was still with you: everything which is written concerning Me in the Law of Moses and the Prophets and the Psalms must be fulfilled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Then He [thoroughly] opened up their minds to understand the Scriptures,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And said to them, Thus it is written that the Christ (the Messiah) should suffer and on the third day rise from (among) the dead, [Hos. 6:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And that repentance [with a view to and as the condition of] forgiveness of sins should be preached in His name to all nations, beginning from Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' You are witnesses of these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And behold, I will send forth upon you what My Father has promised; but remain in the city [Jerusalem] until you are clothed with power from on high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Then He conducted them out as far as Bethany, and, lifting up His hands, He invoked a blessing on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And it occurred that while He was blessing them, He parted from them and was taken up into heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And they, worshiping Him, went back to Jerusalem with great joy;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And they were continually in the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: celebrating with praises and
  - type: text
    text: ' blessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extolling God. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
