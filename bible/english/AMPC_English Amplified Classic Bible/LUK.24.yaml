document_id: LUK.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT ON the first day of the week, at early dawn, [the women] went to the tomb, taking the spices which they had made ready.'
  '10':
  - type: text
    content: ' Now it was Mary Magdalene and Joanna and Mary the mother of James, and the other women with them, who reported these things to the apostles.'
  '11':
  - type: text
    content: ' But these reports seemed to the men an idle tale (madness, feigned things, nonsense), and they did not believe the women.'
  '12':
  - type: text
    content: ' But Peter got up and ran to the tomb; and stooping down and looking in, he saw the linen cloths alone by themselves, and he went away, wondering about '
  - type: text
    content: and
  - type: text
    content: ' marveling at what had happened.'
  '13':
  - type: text
    content: ' And behold, that very day two of [the disciples] were going to a village called Emmaus, [which is] about seven miles from Jerusalem.'
  '14':
  - type: text
    content: ' And they were talking with each other about all these things that had occurred.'
  '15':
  - type: text
    content: ' And while they were conversing and discussing together, Jesus Himself caught up with them and was already accompanying them.'
  '16':
  - type: text
    content: ' But their eyes were held, so that they did not recognize Him.'
  '17':
  - type: text
    content: ' And He said to them, What is this discussion that you are exchanging (throwing back and forth) between yourselves as you walk along? And they stood still, looking sad '
  - type: text
    content: and
  - type: text
    content: ' downcast.'
  '18':
  - type: text
    content: ' Then one of them, named Cleopas, answered Him, Do you alone dwell as a stranger in Jerusalem and not know the things that have occurred there in these days?'
  '19':
  - type: text
    content: ' And He said to them, What [kind of] things? And they said to Him, About Jesus of Nazareth, Who was a Prophet mighty in work and word before God and all the people–'
  '2':
  - type: text
    content: ' And they found the stone rolled back from the tomb,'
  '20':
  - type: text
    content: ' And how our chief priests and rulers gave Him up to be sentenced to death, and crucified Him.'
  '21':
  - type: text
    content: ' But we were hoping that it was He Who would redeem '
  - type: text
    content: and
  - type: text
    content: ' set Israel free. Yes, and besides all this, it is now the third day since these things occurred.'
  '22':
  - type: text
    content: ' And moreover, some women of our company astounded us '
  - type: text
    content: and
  - type: text
    content: ' drove us out of our senses. They were at the tomb early [in the morning]'
  '23':
  - type: text
    content: ' But did not find His body; and they returned saying that they had [even] seen a vision of angels, who said that He was alive!'
  '24':
  - type: text
    content: ' So some of those [who were] with us went to the tomb and they found it just as the women had said, but Him they did not see.'
  '25':
  - type: text
    content: ' And [Jesus] said to them, O foolish ones [sluggish in mind, dull of perception] and slow of heart to believe (adhere to and trust in and rely on) everything that the prophets have spoken!'
  '26':
  - type: text
    content: ' Was it not necessary '
  - type: text
    content: and
  - type: text
    content: ' essentially fitting that the Christ (the Messiah) should suffer all these things before entering into His glory (His majesty and splendor)?'
  '27':
  - type: text
    content: ' Then beginning with Moses and [throughout] all the Prophets, He went on explaining '
  - type: text
    content: and
  - type: text
    content: ' interpreting to them in all the Scriptures the things concerning '
  - type: text
    content: and
  - type: text
    content: ' referring to Himself.'
  '28':
  - type: text
    content: ' Then they drew near the village to which they were going, and He acted as if He would go further.'
  '29':
  - type: text
    content: ' But they urged '
  - type: text
    content: and
  - type: text
    content: ' insisted, saying to Him, Remain with us, for it is toward evening, and the day is now far spent. So He went in to stay with them.'
  '3':
  - type: text
    content: ' But when they went inside, they did not find the body of the Lord Jesus.'
  '30':
  - type: text
    content: ' And it occurred that as He reclined at table with them, He took [a loaf of] bread and praised [God] '
  - type: text
    content: and
  - type: text
    content: ' gave thanks '
  - type: text
    content: and
  - type: text
    content: ' asked a blessing, and then broke it and was giving it to them'
  '31':
  - type: text
    content: ' When their eyes were [instantly] opened and they [clearly] recognized Him, and He vanished (departed invisibly).'
  '32':
  - type: text
    content: ' And they said to one another, Were not our hearts greatly moved '
  - type: text
    content: and
  - type: text
    content: ' burning within us while He was talking with us on the road and as He opened '
  - type: text
    content: and
  - type: text
    content: ' explained to us [the sense of] the Scriptures?'
  '33':
  - type: text
    content: ' And rising up that very hour, they went back to Jerusalem, where they found the Eleven [apostles] gathered together and those who were with them,'
  '34':
  - type: text
    content: ' Who said, The Lord really has risen and has appeared to Simon (Peter)!'
  '35':
  - type: text
    content: ' Then they [themselves] related [in full] what had happened on the road, and how He was known '
  - type: text
    content: and
  - type: text
    content: ' recognized by them in the breaking of bread.'
  '36':
  - type: text
    content: ' Now while they were talking about this, Jesus Himself took His stand among them and said to them, Peace (freedom from all the distresses that are experienced as the result of sin) be to you!'
  '37':
  - type: text
    content: ' But they were so startled and terrified that they thought they saw a spirit.'
  '38':
  - type: text
    content: ' And He said to them, Why are you disturbed '
  - type: text
    content: and
  - type: text
    content: ' troubled, and why do such doubts '
  - type: text
    content: and
  - type: text
    content: ' questionings arise in your hearts?'
  '39':
  - type: text
    content: ' See My hands and My feet, that it is I Myself! Feel '
  - type: text
    content: and
  - type: text
    content: ' handle Me and see, for a spirit does not have flesh and bones, as you see that I have.'
  '4':
  - type: text
    content: ' And while they were perplexed '
  - type: text
    content: and
  - type: text
    content: ' wondering what to do about this, behold, two men in dazzling raiment suddenly stood beside them.'
  '40':
  - type: text
    content: ' And when He had said this, He showed them His hands and His feet.'
  '41':
  - type: text
    content: ' And while [since] they still could not believe it for sheer joy and marveled, He said to them, Have you anything here to eat?'
  '42':
  - type: text
    content: ' They gave Him a piece of broiled fish,'
  '43':
  - type: text
    content: ' And He took [it] and ate [it] before them.'
  '44':
  - type: text
    content: ' Then He said to them, This is what I told you while I was still with you: everything which is written concerning Me in the Law of Moses and the Prophets and the Psalms must be fulfilled.'
  '45':
  - type: text
    content: ' Then He [thoroughly] opened up their minds to understand the Scriptures,'
  '46':
  - type: text
    content: ' And said to them, Thus it is written that the Christ (the Messiah) should suffer and on the third day rise from (among) the dead, [Hos. 6:2.]'
  '47':
  - type: text
    content: ' And that repentance [with a view to and as the condition of] forgiveness of sins should be preached in His name to all nations, beginning from Jerusalem.'
  '48':
  - type: text
    content: ' You are witnesses of these things.'
  '49':
  - type: text
    content: ' And behold, I will send forth upon you what My Father has promised; but remain in the city [Jerusalem] until you are clothed with power from on high.'
  '5':
  - type: text
    content: ' And as [the women] were frightened and were bowing their faces to the ground, the men said to them, Why do you look for the living among [those who are] dead?'
  '50':
  - type: text
    content: ' Then He conducted them out as far as Bethany, and, lifting up His hands, He invoked a blessing on them.'
  '51':
  - type: text
    content: ' And it occurred that while He was blessing them, He parted from them and was taken up into heaven.'
  '52':
  - type: text
    content: ' And they, worshiping Him, went back to Jerusalem with great joy;'
  '53':
  - type: text
    content: ' And they were continually in the temple '
  - type: text
    content: celebrating with praises and
  - type: text
    content: ' blessing '
  - type: text
    content: and
  - type: text
    content: ' extolling God. '
  - type: text
    content: Amen (so be it).
  '6':
  - type: text
    content: ' He is not here, but has risen! Remember how He told you while He was still in Galilee'
  '7':
  - type: text
    content: ' That the Son of Man must be given over into the hands of sinful men (men whose way or nature is to act in opposition to God) and be crucified and on the third day rise [from death]. [Ps. 16:10.]'
  '8':
  - type: text
    content: ' And they remembered His words.'
  '9':
  - type: text
    content: ' And having returned from the tomb, they reported all these things [taken together] to the eleven apostles and to all the rest.'
