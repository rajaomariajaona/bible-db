document_id: PSA.113,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PRAISE THE Lord! (Hallelujah!) Praise, O servants of the Lord, praise the name of the Lord!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Blessed be the name of the Lord from this time forth and forever'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' From the rising of the sun to the going down of it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from east to west, the name of the Lord is to be praised!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The Lord is high above all nations, and His glory above the heavens!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Who is like the Lord our God, Who has His seat on high,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Who humbles Himself to regard the heavens and the earth! [Ps. 138:6; Isa. 57:15.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' [The Lord] raises the poor out of the dust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lifts the needy from the ash heap '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the dung hill,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' That He may seat them with princes, even with the princes of His people.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He makes the barren woman to be a homemaker '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a joyful mother of [spiritual] children. Praise the Lord! (Hallelujah!)'
