document_id: PSA.113,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! (Hallelujah!) Praise, O servants of the Lord, praise the name of the Lord!'
  '2':
  - type: text
    content: ' Blessed be the name of the Lord from this time forth and forever'
  '3':
  - type: text
    content: ' From the rising of the sun to the going down of it '
  - type: text
    content: and
  - type: text
    content: ' from east to west, the name of the Lord is to be praised!'
  '4':
  - type: text
    content: ' The Lord is high above all nations, and His glory above the heavens!'
  '5':
  - type: text
    content: ' Who is like the Lord our God, Who has His seat on high,'
  '6':
  - type: text
    content: ' Who humbles Himself to regard the heavens and the earth! [Ps. 138:6; Isa. 57:15.]'
  '7':
  - type: text
    content: ' [The Lord] raises the poor out of the dust '
  - type: text
    content: and
  - type: text
    content: ' lifts the needy from the ash heap '
  - type: text
    content: and
  - type: text
    content: ' the dung hill,'
  '8':
  - type: text
    content: ' That He may seat them with princes, even with the princes of His people.'
  '9':
  - type: text
    content: ' He makes the barren woman to be a homemaker '
  - type: text
    content: and
  - type: text
    content: ' a joyful mother of [spiritual] children. Praise the Lord! (Hallelujah!)'
