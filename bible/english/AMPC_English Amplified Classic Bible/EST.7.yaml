document_id: EST.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SO THE king and Haman came to dine with Esther the queen.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' So they hanged Haman on the gallows that he had prepared for Mordecai. Then the king''s wrath was pacified.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the king said again to Esther on the second day when wine was being served, What is your petition, Queen Esther? It shall be granted. And what is your request? Even to the half of the kingdom, it shall be performed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then Queen Esther said, If I have found favor in your sight, O king and if it pleases the king, let my life be given me at my petition and my people at my request.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For we are sold, I and my people, to be destroyed, slain, and wiped out of existence! But if we had been sold for bondmen and bondwomen, I would have held my tongue, for our affliction is not to be compared with the damage this will do to the king.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then King Ahasuerus said to Queen Esther, Who is he, and where is he who dares presume in his heart to do that?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And Esther said, An adversary and an enemy, even this wicked Haman. Then Haman was afraid before the king and queen.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And the king arose from the feast in his wrath and went into the palace garden; and Haman stood up to make request for his life to Queen Esther, for he saw that there was evil determined against him by the king.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' When the king returned out of the palace garden into the place of the drinking of wine, Haman was falling upon the couch where Esther was. Then said the king, Will he even forcibly assault the queen in my presence, in my own palace? As the king spoke the words, [the servants] covered Haman''s face.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then said Harbonah, one of the attendants serving the king, Behold, the gallows fifty cubits high, which Haman has made for Mordecai, whose warning saved the king, stands at the house of Haman. And the king said, Hang him on it!'
