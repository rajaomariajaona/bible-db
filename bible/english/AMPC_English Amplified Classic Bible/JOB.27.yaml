document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JOB AGAIN took up his discourse and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As God lives, Who has taken away my right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denied me justice, and the Almighty, Who has vexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embittered my life,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' As long as my life is still whole within me, and the breath of God is [yet] in my nostrils,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' My lips shall not speak untruth, nor shall my tongue utter deceit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' God forbid that I should justify you–saying you are right [in your accusations against me]; till I die, I will not put away my integrity from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' My uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my right standing with God I hold fast and will not let them go; my heart does not reproach me for any of my days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' it shall not reproach me as long as I live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let my enemy be as the wicked, and let him who rises up against me be as the unrighteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For what is the hope of the godless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' polluted, even though he has gained [in this world], when God cuts him off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' takes away his life?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Will God hear his cry when trouble comes upon him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Will he take delight in the Almighty? Will he call upon God at all times?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I will teach you regarding the hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handiwork of God; that which is with the Almighty [God''s actual treatment of the wicked man] will I not conceal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Behold, all of you have seen it yourselves; why then have you become altogether vain [cherishing foolish notions]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' This [which I am about to tell] is the portion of a wicked man with God, and the heritage which oppressors shall receive from the Almighty:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If his children are multiplied, it is for the sword; and his offspring will not have sufficient bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Those who survive him, [the pestilence] will bury, and [their] widows will make no lamentation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Though he heaps up silver like dust and piles up clothing like clay,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He may prepare it, but the just will wear it, and the innocent will divide the silver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He builds his house like a moth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a spider, like a booth which a watchman makes [to last for a season].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [The wicked] will lie down rich, but does it not again; he opens his eyes, and [his wealth] is gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Terrors overtake him like a [suddenly loosened] flood; a windstorm steals him away in the night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The east wind lifts him up, and he is gone; it sweeps him out of his place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For [God and the storm] hurl at him without pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unsparingly [their thunderbolts of wrath]; he flees in haste before His power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [God causes] men to clap their hands at him [in malignant joy] and hiss him out of his place.'
