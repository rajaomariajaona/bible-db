document_id: LEV.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, Speak to the priests [exclusive of the high priest], the sons of Aaron, and say to them that none of them shall defile himself for the dead among his people [by touching a corpse or assisting in preparing it for burial],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Except for his near [blood] kin, for his mother, father, son, daughter, brother,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And for his sister, a virgin, who is near to him because she has had no husband; for her he may be defiled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He shall not even defile himself, being a [bereaved] husband [his wife not being his blood kin] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' being a chief man among his people, and so profane himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The priests [like the other Israelite men] shall not shave the crown of their heads or clip off the corners of their beard or make any cuttings in their flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They shall be holy to their God and not profane the name of their God; for they offer the offerings made by fire to the Lord, the bread of their God; therefore they shall be holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They shall not take a wife who is a harlot or polluted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profane or divorced, for [the priest] is holy to his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You shall consecrate him therefore, for he offers the bread of your God; he shall be holy to you, for I the Lord Who sanctifies you am holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The daughter of any priest who profanes herself by playing the harlot profanes her father; she shall be burned with fire [after being stoned]. [Josh. 7:15, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But he who is the high priest among his brethren, upon whose head the anointing oil was poured and who is consecrated to put on the [sacred] garments, shall not let the hair of his head hang loose or rend his clothes [in mourning],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Neither shall he go in where any dead body lies nor defile himself [by doing so, even] for his father or for his mother;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Neither shall he go out of the sanctuary nor desecrate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make ceremonially unclean the sanctuary of his God, for the crown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consecration of the anointing oil of his God is upon him. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He shall take a wife in her virginity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' A widow or a divorced woman or a woman who is polluted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profane or a harlot, these he shall not marry, but he shall take as his wife a virgin of his own people, [I Tim. 3:2-7; Tit. 1:7-9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' That he may not profane '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dishonor his children among his people; for I the Lord do sanctify the high priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Say to Aaron, Any one of your sons in their successive generations who has any blemish, let him not come near to offer the bread of his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For no man who has a blemish shall approach [God''s altar to serve as priest], a man blind or lame, or he who has a disfigured face or a limb too long,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Or who has a fractured foot or hand,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Or is a hunchback, or a dwarf, or has a defect in his eye, or has scurvy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' itch, or scabs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' skin trouble, or has damaged testicles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' No man of the offspring of Aaron the priest who has a blemish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is disfigured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deformed shall come near [the altar] to offer the offerings of the Lord made by fire. He has a blemish; he shall not come near to offer the bread of his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He may eat the bread of his God, both of the most holy and of the holy things,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But he shall not come within the veil or come near the altar [of incense], because he has a blemish, that he may not desecrate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make unclean My sanctuaries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hallowed things; for I the Lord do sanctify them. [Heb. 7:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Moses told it to Aaron and to his sons and to all the Israelites.'
