document_id: JER.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THAT IS to say, If a man puts away his wife and she goes from him and becomes another man''s, will he return to her again? [Of course not!] Would not that land [where such a thing happened] be greatly polluted? But you have played the harlot [against Me] with many lovers–yet would you now return to Me? says the Lord [or do you even think to return to Me?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Lift up your eyes to the bare heights and see. Where have you not been adulterously lain with? By the wayside you have sat waiting for lovers [eager for idolatry], like an Arabian [desert tribesman who waits to plunder] in the wilderness; and you have polluted the land with your vile harlotry and your wickedness (unfaithfulness and disobedience to God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore the showers have been withheld, and there has been no spring rain. Yet you have the brow of a prostitute; you refuse to be ashamed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Have you not just now cried to Me: My Father, You were the guide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' companion of my youth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Will He retain His anger forever? Will He keep it to the end? Behold, you have so spoken, but you have done all the evil things you could '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have had your way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have carried them through.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Moreover, the Lord said to me [Jeremiah] in the days of Josiah the king [of Judah], Have you seen what that faithless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' backsliding Israel has done–how she went up on every high hill and under every green tree and there played the harlot?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I said, After she has done all these things, she will return to Me; but she did not return, and her faithless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherous sister Judah saw it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I saw, even though [Judah knew] that for this very cause of committing adultery (idolatry) I [the Lord] had put faithless Israel away and given her a bill of divorce; yet her faithless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherous sister Judah was not afraid, but she also went and played the harlot [following after idols].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And through the infamy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unseemly frivolity of Israel''s whoredom [because her immorality mattered little to her], she polluted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiled the land, [by her idolatry] committing adultery with [idols of] stones and trees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But in spite of all this, her faithless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherous sister Judah did not return to Me in sincerity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with her whole heart, but only in sheer hypocrisy [has she feigned obedience to King Josiah''s reforms], says the Lord. [II Chron. 34:33; Hos. 7:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the Lord said to me, Backsliding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithless Israel has shown herself less guilty than false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherous Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Go and proclaim these words toward the north [where the ten tribes have been taken as captives] and say, Return, faithless Israel, says the Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will not cause My countenance to fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look in anger upon you, for I am merciful, says the Lord; I will not keep My anger forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Only know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge your iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt–that you have rebelled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' transgressed against the Lord your God and have scattered your favors among strangers under every green tree, and you have not obeyed My voice, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Return, O faithless children [of the whole twelve tribes], says the Lord, for I am Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Master '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Husband to you, and I will take you [not as a nation, but individually]–one from a city and two from a tribal family–and I will bring you to Zion. [Luke 15:20-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And I will give you [spiritual] shepherds after My own heart [in the final time], who will feed you with knowledge and understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And it shall be that when you have multiplied and increased in the land in those days, says the Lord, they shall no more say, The ark of the covenant of the Lord. It shall not come to mind, nor shall they [seriously] remember it, nor shall they miss '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' visit it, nor shall it be repaired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' made again [for instead of the ark, which represented God''s presence, He will show Himself to be present throughout the city]. [Isa. 65:17; Rev. 21:3, 22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' At that time they shall call Jerusalem The Throne of the Lord, and all the nations shall be gathered to it, in the renown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' name of the Lord, to Jerusalem; nor shall they walk any more after the stubbornness of their own evil hearts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' In those days the house of Judah shall walk with the house of Israel, and together they shall come out of the land of the north to the land that I gave as an inheritance to your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I thought how [gloriously and honorably] I would set you among My children and give you a pleasant land, a goodly heritage, the most beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' best [inheritance] among all nations! And I thought you would call Me My Father and would not turn away from following Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Surely, as a wife treacherously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithlessly departs from her husband, so have you dealt treacherously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithlessly with Me, O house of Israel, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' A voice is heard on the bare heights, the weeping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleading of the sons of Israel, because they have perverted their ways, they have [eagerly] forgotten the Lord their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Return, O faithless sons, [says the Lord, and] I will heal your faithlessness. [And they answer] Behold, we come to You, for You are the Lord our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Truly in vain is the hope of salvation from the hills and from the tumult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noisy throng on the mountains; truly in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with the Lord our God rests the salvation of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' [We have been ruined as a nation by our faithlessness and idolatry] for the shameful thing has consumed all for which our fathers toiled from our youth–their flocks and their herds, their sons and their daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Let us lie prostrate in our shame, and let our dishonor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusion cover us; for we have sinned against the Lord our God, we and our fathers; from our youth even to this day we have not obeyed the voice of the Lord our God.'
