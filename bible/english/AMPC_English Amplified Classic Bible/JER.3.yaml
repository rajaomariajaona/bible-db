document_id: JER.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THAT IS to say, If a man puts away his wife and she goes from him and becomes another man''s, will he return to her again? [Of course not!] Would not that land [where such a thing happened] be greatly polluted? But you have played the harlot [against Me] with many lovers–yet would you now return to Me? says the Lord [or do you even think to return to Me?]'
  '10':
  - type: text
    content: ' But in spite of all this, her faithless '
  - type: text
    content: and
  - type: text
    content: ' treacherous sister Judah did not return to Me in sincerity '
  - type: text
    content: and
  - type: text
    content: ' with her whole heart, but only in sheer hypocrisy [has she feigned obedience to King Josiah''s reforms], says the Lord. [II Chron. 34:33; Hos. 7:13, 14.]'
  '11':
  - type: text
    content: ' And the Lord said to me, Backsliding '
  - type: text
    content: and
  - type: text
    content: ' faithless Israel has shown herself less guilty than false '
  - type: text
    content: and
  - type: text
    content: ' treacherous Judah.'
  '12':
  - type: text
    content: ' Go and proclaim these words toward the north [where the ten tribes have been taken as captives] and say, Return, faithless Israel, says the Lord, '
  - type: text
    content: and
  - type: text
    content: ' I will not cause My countenance to fall '
  - type: text
    content: and
  - type: text
    content: ' look in anger upon you, for I am merciful, says the Lord; I will not keep My anger forever.'
  '13':
  - type: text
    content: ' Only know, understand, '
  - type: text
    content: and
  - type: text
    content: ' acknowledge your iniquity '
  - type: text
    content: and
  - type: text
    content: ' guilt–that you have rebelled '
  - type: text
    content: and
  - type: text
    content: ' transgressed against the Lord your God and have scattered your favors among strangers under every green tree, and you have not obeyed My voice, says the Lord.'
  '14':
  - type: text
    content: ' Return, O faithless children [of the whole twelve tribes], says the Lord, for I am Lord '
  - type: text
    content: and
  - type: text
    content: ' Master '
  - type: text
    content: and
  - type: text
    content: ' Husband to you, and I will take you [not as a nation, but individually]–one from a city and two from a tribal family–and I will bring you to Zion. [Luke 15:20-22.]'
  '15':
  - type: text
    content: ' And I will give you [spiritual] shepherds after My own heart [in the final time], who will feed you with knowledge and understanding '
  - type: text
    content: and
  - type: text
    content: ' judgment.'
  '16':
  - type: text
    content: ' And it shall be that when you have multiplied and increased in the land in those days, says the Lord, they shall no more say, The ark of the covenant of the Lord. It shall not come to mind, nor shall they [seriously] remember it, nor shall they miss '
  - type: text
    content: or
  - type: text
    content: ' visit it, nor shall it be repaired '
  - type: text
    content: or
  - type: text
    content: ' made again [for instead of the ark, which represented God''s presence, He will show Himself to be present throughout the city]. [Isa. 65:17; Rev. 21:3, 22, 23.]'
  '17':
  - type: text
    content: ' At that time they shall call Jerusalem The Throne of the Lord, and all the nations shall be gathered to it, in the renown '
  - type: text
    content: and
  - type: text
    content: ' name of the Lord, to Jerusalem; nor shall they walk any more after the stubbornness of their own evil hearts.'
  '18':
  - type: text
    content: ' In those days the house of Judah shall walk with the house of Israel, and together they shall come out of the land of the north to the land that I gave as an inheritance to your fathers.'
  '19':
  - type: text
    content: ' And I thought how [gloriously and honorably] I would set you among My children and give you a pleasant land, a goodly heritage, the most beautiful '
  - type: text
    content: and
  - type: text
    content: ' best [inheritance] among all nations! And I thought you would call Me My Father and would not turn away from following Me.'
  '2':
  - type: text
    content: ' Lift up your eyes to the bare heights and see. Where have you not been adulterously lain with? By the wayside you have sat waiting for lovers [eager for idolatry], like an Arabian [desert tribesman who waits to plunder] in the wilderness; and you have polluted the land with your vile harlotry and your wickedness (unfaithfulness and disobedience to God).'
  '20':
  - type: text
    content: ' Surely, as a wife treacherously '
  - type: text
    content: and
  - type: text
    content: ' faithlessly departs from her husband, so have you dealt treacherously '
  - type: text
    content: and
  - type: text
    content: ' faithlessly with Me, O house of Israel, says the Lord.'
  '21':
  - type: text
    content: ' A voice is heard on the bare heights, the weeping '
  - type: text
    content: and
  - type: text
    content: ' pleading of the sons of Israel, because they have perverted their ways, they have [eagerly] forgotten the Lord their God.'
  '22':
  - type: text
    content: ' Return, O faithless sons, [says the Lord, and] I will heal your faithlessness. [And they answer] Behold, we come to You, for You are the Lord our God.'
  '23':
  - type: text
    content: ' Truly in vain is the hope of salvation from the hills and from the tumult '
  - type: text
    content: and
  - type: text
    content: ' noisy throng on the mountains; truly in '
  - type: text
    content: and
  - type: text
    content: ' with the Lord our God rests the salvation of Israel.'
  '24':
  - type: text
    content: ' [We have been ruined as a nation by our faithlessness and idolatry] for the shameful thing has consumed all for which our fathers toiled from our youth–their flocks and their herds, their sons and their daughters.'
  '25':
  - type: text
    content: ' Let us lie prostrate in our shame, and let our dishonor '
  - type: text
    content: and
  - type: text
    content: ' confusion cover us; for we have sinned against the Lord our God, we and our fathers; from our youth even to this day we have not obeyed the voice of the Lord our God.'
  '3':
  - type: text
    content: ' Therefore the showers have been withheld, and there has been no spring rain. Yet you have the brow of a prostitute; you refuse to be ashamed.'
  '4':
  - type: text
    content: ' Have you not just now cried to Me: My Father, You were the guide '
  - type: text
    content: and
  - type: text
    content: ' companion of my youth?'
  '5':
  - type: text
    content: ' Will He retain His anger forever? Will He keep it to the end? Behold, you have so spoken, but you have done all the evil things you could '
  - type: text
    content: and
  - type: text
    content: ' have had your way '
  - type: text
    content: and
  - type: text
    content: ' have carried them through.'
  '6':
  - type: text
    content: ' Moreover, the Lord said to me [Jeremiah] in the days of Josiah the king [of Judah], Have you seen what that faithless '
  - type: text
    content: and
  - type: text
    content: ' backsliding Israel has done–how she went up on every high hill and under every green tree and there played the harlot?'
  '7':
  - type: text
    content: ' And I said, After she has done all these things, she will return to Me; but she did not return, and her faithless '
  - type: text
    content: and
  - type: text
    content: ' treacherous sister Judah saw it.'
  '8':
  - type: text
    content: ' And I saw, even though [Judah knew] that for this very cause of committing adultery (idolatry) I [the Lord] had put faithless Israel away and given her a bill of divorce; yet her faithless '
  - type: text
    content: and
  - type: text
    content: ' treacherous sister Judah was not afraid, but she also went and played the harlot [following after idols].'
  '9':
  - type: text
    content: ' And through the infamy '
  - type: text
    content: and
  - type: text
    content: ' unseemly frivolity of Israel''s whoredom [because her immorality mattered little to her], she polluted '
  - type: text
    content: and
  - type: text
    content: ' defiled the land, [by her idolatry] committing adultery with [idols of] stones and trees.'
