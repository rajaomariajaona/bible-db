document_id: NEH.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW THE leaders of the people dwelt at Jerusalem; the rest of the people also cast lots to bring one of ten to dwell in Jerusalem, the holy city, while nine-tenths dwelt in other towns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' villages.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the priests: Jedaiah son of Joiarib; Jachin;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Seraiah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, ruler of the house of God,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their brethren, who did the work of the house, 822; and Adaiah son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And his brethren, chiefs of fathers'' houses, 242; and Amashsai son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their brethren, mighty men of valor, 128. Their overseer was Zabdiel son of Haggedolim [one of the great men].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And of the Levites: Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Shabbethai and Jozabad, of the chiefs of the Levites, who had charge of the outside work of the house of God;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Mattaniah son of Mica, the son of Zabdi, the son of Asaph, the leader to begin the thanksgiving in prayer; and Bakbukiah, second among his brethren; and Abda son of Shammua, the son of Galal, the son of Jeduthun.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Levites in the holy city were 284.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The gatekeepers: Akkub, Talmon, and their brethren, who kept watch, were 172.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the people blessed all the men who willingly offered to live in Jerusalem.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the rest of Israel, with the priests and the Levites, were in all the cities of Judah, each in his inheritance.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the temple servants dwelt on [the hill] Ophel; Ziha and Gishpa were over [them].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Overseer of the Levites in Jerusalem and the work of God''s house was Uzzi son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mica, of Asaph''s sons, the singers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the [Persian] king had ordered concerning them that a certain provision be made for the singers, as each day required.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Pethahiah son of Meshezabel, of the sons of Zerah son of Judah, was at the king''s hand in all matters concerning the people.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for the villages with their fields, some people of Judah dwelt in Kiriath-arba, Dibon, and Jekabzeel, and their villages,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In Jeshua, Moladah, Beth-pelet,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hazar-shual, Beersheba and its villages,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ziklag, Meconah and its villages,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' En-rimmon, Zorah, Jarmuth,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the province chiefs who dwelt in Jerusalem, but in the towns of Judah everyone lived on his property there–Israelites, the priests, the Levites, the temple servants, and the descendants of Solomon''s servants.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Zanoah, Adullam, and their villages, Lachish and its fields, Azekah and its villages. So they encamped from Beersheba to the Hinnom Valley.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The people of Benjamin also dwelt from Geba onward, at Michmash, Aija, Bethel and its villages,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At Anathoth, Nob, Ananiah,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hazor, Ramah, Gittaim,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hadid, Zeboim, Neballat,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lod, and Ono, the Valley of the Craftsmen.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And certain divisions of the Levites in Judah were joined to Benjamin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And at Jerusalem dwelt certain of the sons of Judah and Benjamin. Of Judah: Athaiah son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the sons of Perez;'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Maaseiah son of Baruch, the son of Col-hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of the Shilonite.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the sons of Perez who dwelt at Jerusalem were 468 valiant men.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the sons of Benjamin: Sallu son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, son of Jeshaiah,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after him Gabbai and Sallai, 928.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joel son of Zichri was overseer, and Judah son of Hassenuah was second over the city.'
