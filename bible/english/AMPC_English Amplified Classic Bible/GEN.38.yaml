document_id: GEN.38,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AT THAT time Judah withdrew from his brothers and went to [lodge with] a certain Adullamite named Hirah.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the thing which he did displeased the Lord; therefore He slew him also.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then Judah said to Tamar, his daughter-in-law, Remain a widow at your father''s house till Shelah my [youngest] son is grown; for he thought, Lest perhaps [if Shelah should marry her] he would die also, as his brothers did. So Tamar went and lived in her father''s house.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But later Judah''s wife, the daughter of Shuah, died; and when Judah was comforted, he went up to his sheepshearers at Timnath with his friend Hirah the Adullamite.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then it was told Tamar, Listen, your father-in-law is going up to Timnath to shear his sheep.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So she put off her widow''s garments and covered herself with a veil, wrapped herself up [in disguise], and sat in the entrance of Enaim, which is by the road to Timnath; for she saw that Shelah was grown and she was not given to him as his wife.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When Judah saw her, he thought she was a harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' devoted prostitute [under a vow to her goddess], for she had covered her face [as such women did].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He turned to her by the road and said, Come, let me have intercourse with you; for he did not know that she was his daughter-in-law. And she said, What will you give me that you may have intercourse with me?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He answered, I will send you a kid from the flock. And she said, Will you give me a pledge (deposit) until you send it?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And he said, What pledge shall I give you? She said, Your signet [seal], your [signet] cord, and your staff that is in your hand. And he gave them to her and came in to her, and she became pregnant by him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And she arose and went away and laid aside her veil and put on the garments of her widowhood.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' There Judah saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' met a daughter of Shuah, a Canaanite; he took her as wife and lived with her.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Judah sent the kid by the hand of his friend the Adullamite, to receive his pledge from the woman''s hand; but he was unable to find her.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' He asked the men of that place, Where is the harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cult prostitute who was openly by the roadside? They said, There was no harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' temple prostitute here.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So he returned to Judah and said, I cannot find her; and also the local men said, There was no harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' temple prostitute around here.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And Judah said, Let her keep [the pledge articles] for herself, lest we be made ashamed. I sent this kid, but you have not found her.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' But about three months later Judah was told, Tamar your daughter-in-law has played the harlot, and also she is with child by her lewdness. And Judah said, Bring her forth and let her be burned!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' When she was brought forth, she [took the things he had given her in pledge and] sent [them] to her father-in-law, saying, I am with child by the man to whom these articles belong. Then she added, Make out clearly, I pray you, to whom these belong, the signet [seal], [signet] cord, and staff.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And Judah acknowledged them and said, She has been more righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' just than I, because I did not give her to Shelah my son. And he did not cohabit with her again.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Now when the time came for her to be delivered, behold, there were twins in her womb.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And when she was in labor, one baby put out his hand; and the midwife took his hand and bound upon it a scarlet thread, saying, This baby was born first.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' But he drew back his hand, and behold, his brother was born first. And she said, What a breaking forth you have made for yourself! Therefore his name was called Perez [breaking forth]. [Matt. 1:3.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And she became pregnant and bore a son, and he called him Er.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And afterward his brother who had the scarlet thread on his hand was born and was named Zerah [scarlet].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And she conceived again and bore a son and named him Onan.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Again she conceived and bore a son and named him Shelah. [They were living] at Chezib when she bore him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Now Judah took a wife for Er, his firstborn; her name was Tamar.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Er, Judah''s firstborn, was wicked in the sight of the Lord, and the Lord slew him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Judah told Onan, Marry your brother''s widow; live with her and raise offspring for your brother.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But Onan knew that the family would not be his, so when he cohabited with his brother''s widow, he prevented conception, lest he should raise up a child for his brother.'
