document_id: 2CH.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AMAZIAH WAS twenty-five years old when he began to reign, and he reigned twenty-nine years in Jerusalem. His mother was Jehoaddan of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He did right in the Lord''s sight, but not with a perfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blameless heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When his kingdom was firmly established, he slew his servants who had killed the king his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But he did not slay their children; he did as it is written in the Law, in the Book of Moses, where the Lord commanded, The fathers shall not die for the children, or the children die for the fathers; but every man shall die for his own sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Amaziah assembled the men of Judah and set them by fathers'' houses under commanders of thousands and of hundreds for all Judah and Benjamin. He numbered them from twenty years old and over and found them to be 300,000 choice men fit for war and able to handle spear and shield.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He hired also 100,000 mighty men of valor from Israel for 100 talents of silver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But a man of God came to him, saying, O king, do not let all this army of Ephraimites of Israel go with you [of Judah], for the Lord is not with you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For if you go [in spite of warning], no matter how strong you are for battle, God will cast you down before the enemy, for God has power to help and to cast down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Amaziah said to the man of God, But what shall we do about the 100 talents which I have given to the army of Israel? The man of God answered, The Lord is able to give you much more than this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So Amaziah discharged the army that came to him from Ephraim to go home. So their anger was greatly kindled against Judah; they returned home in fierce wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Amaziah took courage and led forth his people to the Valley of Salt and smote 10,000 of the men of Seir [Edom].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Another 10,000 the men of Judah captured alive and brought them to the top of a crag and cast them down from it, and they were all dashed to pieces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the soldiers of the band which Amaziah sent back, not allowing them to go with him to battle, fell upon the cities of Judah, from Samaria even to Beth-horon, and smote 3,000 [men] and took much spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' After Amaziah came back from the slaughter of the Edomites, he brought their gods and set them up to be his gods and bowed before them and burned incense to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So the anger of the Lord was kindled against Amaziah, and He sent to him a prophet, who said, Why have you sought after the gods of the people, which could not deliver their own people out of your hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' As he was talking, the king said to him, Have we made you the king''s counselor? Stop it! Why should you be put to death? The prophet stopped but said, I know that God has determined to destroy you, because you have done this and ignored my counsel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Amaziah king of Judah took counsel and sent to Jehoash son of Jehoahaz, the son of Jehu, king of Israel, saying, Come [to battle], let us look one another in the face. [II Kings 14:8-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Jehoash king of Israel sent to Amaziah king of Judah, saying, A little thistle in Lebanon sent to a great cedar in Lebanon, saying, Give your daughter to my son as wife. And a wild beast of Lebanon passed by and trampled down the thistle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You say, See, [I] have smitten Edom! Your heart lifts you up to boast. Stay at home; why should you meddle [and court disaster], so you will fall and Judah with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Amaziah would not hear, for it came from God, that He might deliver Judah into the hands of their enemies, because they sought after the gods of Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So Jehoash king of Israel went up; and he and Amaziah king of Judah faced one another at Beth-shemesh of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Judah was defeated before Israel, and they fled every man to his tent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Jehoash king of Israel took Amaziah king of Judah, the son of Joash, the son of Jehoahaz, at Beth-shemesh and brought him to Jerusalem and broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, 400 cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he took all the gold, the silver, and all the vessels found in God''s house with [the doorkeeper] Obed-edom, and the treasures of the king''s house and hostages also, and returned to Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Amaziah son of Joash king of Judah lived after the death of Jehoash son of Jehoahaz king of Israel fifteen years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The rest of the acts of Amaziah, from first to last, are they not written in the Book of the Kings of Judah and Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now after Amaziah turned away from the Lord, they made a conspiracy against him in Jerusalem, and he fled to Lachish. But they sent to Lachish and slew him there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they brought him upon horses and buried him with his fathers in the City of [David in] Judah.'
