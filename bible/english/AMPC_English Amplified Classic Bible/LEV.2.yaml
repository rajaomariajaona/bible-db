document_id: LEV.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN ANYONE offers a cereal offering to the Lord, it shall be of fine flour; and he shall pour oil over it and lay frankincense on it.'
  '10':
  - type: text
    content: ' What is left of the cereal offering shall be Aaron''s and his sons''; it is a most holy part of the offerings made to the Lord by fire.'
  '11':
  - type: text
    content: ' No cereal offering that you bring to the Lord shall be made with leaven, for you shall burn no leaven or honey in any offering made by fire to the Lord. [I Cor. 5:8.]'
  '12':
  - type: text
    content: ' As an offering of firstfruits you may offer leaven and honey to the Lord, but they shall not be burned on the altar for a sweet odor [to the Lord, for their aid to fermentation is symbolic of corruption in the human heart].'
  '13':
  - type: text
    content: ' Every cereal offering you shall season with salt [symbol of preservation]; neither shall you allow the salt of the covenant of your God to be lacking from your cereal offering; with all your offerings you shall offer salt. [Mark 9:49, 50.]'
  '14':
  - type: text
    content: ' If you offer a cereal offering of your firstfruits to the Lord, you shall offer for it of your firstfruits grain in the ear parched with fire, bruised '
  - type: text
    content: and
  - type: text
    content: ' crushed grain out of the fresh '
  - type: text
    content: and
  - type: text
    content: ' fruitful ear.'
  '15':
  - type: text
    content: ' And you shall put oil on it and lay frankincense on it; it is a cereal offering.'
  '16':
  - type: text
    content: ' The priest shall burn as its memorial portion part of the bruised '
  - type: text
    content: and
  - type: text
    content: ' crushed grain of it and part of the oil of it, with all its frankincense; it is an offering made by fire to the Lord.'
  '2':
  - type: text
    content: ' And he shall bring it to Aaron''s sons the priests. Out of it he shall take a handful of the fine flour and oil, with all its frankincense, and the priest shall burn this on the altar as the memorial portion of it, an offering made by fire, of a sweet '
  - type: text
    content: and
  - type: text
    content: ' satisfying fragrance to the Lord.'
  '3':
  - type: text
    content: ' What is left of the cereal offering shall be Aaron''s and his sons''; it is a most holy part of the offerings made to the Lord by fire.'
  '4':
  - type: text
    content: ' When you bring as an offering cereal baked in the oven, it shall be unleavened cakes of fine flour mixed with oil, or unleavened wafers spread with oil.'
  '5':
  - type: text
    content: ' If your offering is cereal baked on a griddle, it shall be of fine flour unleavened, mixed with oil.'
  '6':
  - type: text
    content: ' You shall break it in pieces and pour oil on it; it is a cereal offering.'
  '7':
  - type: text
    content: ' And if your offering is cereal cooked in the frying pan, it shall be made of fine flour with oil.'
  '8':
  - type: text
    content: ' And you shall bring the cereal offering that is made of these things to the Lord; it shall be presented to the priest, and he shall bring it to the [bronze] altar.'
  '9':
  - type: text
    content: ' The priest shall take from the cereal offering its memorial portion and burn it on the altar, an offering made by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' satisfying fragrance to the Lord.'
