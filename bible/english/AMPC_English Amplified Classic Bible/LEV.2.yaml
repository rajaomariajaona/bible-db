document_id: LEV.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN ANYONE offers a cereal offering to the Lord, it shall be of fine flour; and he shall pour oil over it and lay frankincense on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he shall bring it to Aaron''s sons the priests. Out of it he shall take a handful of the fine flour and oil, with all its frankincense, and the priest shall burn this on the altar as the memorial portion of it, an offering made by fire, of a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfying fragrance to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' What is left of the cereal offering shall be Aaron''s and his sons''; it is a most holy part of the offerings made to the Lord by fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When you bring as an offering cereal baked in the oven, it shall be unleavened cakes of fine flour mixed with oil, or unleavened wafers spread with oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If your offering is cereal baked on a griddle, it shall be of fine flour unleavened, mixed with oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall break it in pieces and pour oil on it; it is a cereal offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And if your offering is cereal cooked in the frying pan, it shall be made of fine flour with oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall bring the cereal offering that is made of these things to the Lord; it shall be presented to the priest, and he shall bring it to the [bronze] altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The priest shall take from the cereal offering its memorial portion and burn it on the altar, an offering made by fire, a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfying fragrance to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' What is left of the cereal offering shall be Aaron''s and his sons''; it is a most holy part of the offerings made to the Lord by fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' No cereal offering that you bring to the Lord shall be made with leaven, for you shall burn no leaven or honey in any offering made by fire to the Lord. [I Cor. 5:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' As an offering of firstfruits you may offer leaven and honey to the Lord, but they shall not be burned on the altar for a sweet odor [to the Lord, for their aid to fermentation is symbolic of corruption in the human heart].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Every cereal offering you shall season with salt [symbol of preservation]; neither shall you allow the salt of the covenant of your God to be lacking from your cereal offering; with all your offerings you shall offer salt. [Mark 9:49, 50.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If you offer a cereal offering of your firstfruits to the Lord, you shall offer for it of your firstfruits grain in the ear parched with fire, bruised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed grain out of the fresh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fruitful ear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you shall put oil on it and lay frankincense on it; it is a cereal offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The priest shall burn as its memorial portion part of the bruised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed grain of it and part of the oil of it, with all its frankincense; it is an offering made by fire to the Lord.'
