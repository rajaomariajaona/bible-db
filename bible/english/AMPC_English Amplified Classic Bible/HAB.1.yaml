document_id: HAB.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE BURDEN '
  - type: text
    content: or
  - type: text
    content: ' oracle (the thing to be lifted up) which Habakkuk the prophet saw.'
  '10':
  - type: text
    content: ' They scoff at kings, and rulers are a derision to them; they ridicule every stronghold, for they heap up dust [for earth mounds] and take it.'
  '11':
  - type: text
    content: ' Then they sweep by like a wind and pass on, and they load themselves with guilt, [as do all men] whose own power is their god.'
  '12':
  - type: text
    content: ' Are not You from everlasting, O Lord my God, my Holy One? We shall not die. O Lord, You have appointed [the Chaldean] to execute [Your] judgment, and You, O Rock, have established him for chastisement '
  - type: text
    content: and
  - type: text
    content: ' correction. [Deut. 32:4.]'
  '13':
  - type: text
    content: ' You are of purer eyes than to behold evil and can not look [inactively] upon injustice. Why then do You look upon the plunderer? Why are you silent when the wicked one destroys him who is more righteous than [the Chaldean oppressor] is?'
  '14':
  - type: text
    content: ' Why do You make men like the fish of the sea, like reptiles '
  - type: text
    content: and
  - type: text
    content: ' creeping things that have no ruler [and are defenseless against their foes]?'
  '15':
  - type: text
    content: ' [The Chaldean] brings all of them up with his hook; he catches and drags them out with his net, he gathers them in his dragnet; so he rejoices and is in high spirits.'
  '16':
  - type: text
    content: ' Therefore he sacrifices [offerings] to his net and burns incense to his dragnet, because from them he lives luxuriously and his food is plentiful '
  - type: text
    content: and
  - type: text
    content: ' rich.'
  '17':
  - type: text
    content: ' Shall he therefore continue to empty his net and mercilessly go on slaying the nations forever?'
  '2':
  - type: text
    content: ' O Lord, how long shall I cry for help and You will not hear? Or cry out to You of violence and You will not save?'
  '3':
  - type: text
    content: ' Why do You show me iniquity '
  - type: text
    content: and
  - type: text
    content: ' wrong, and Yourself look upon '
  - type: text
    content: or
  - type: text
    content: ' cause me to see perverseness '
  - type: text
    content: and
  - type: text
    content: ' trouble? For destruction and violence are before me; and there is strife, and contention arises.'
  '4':
  - type: text
    content: ' Therefore the law is slackened and justice '
  - type: text
    content: and
  - type: text
    content: ' a righteous sentence never go forth, for the [hostility of the] wicked surrounds the [uncompromisingly] righteous; therefore justice goes forth perverted.'
  '5':
  - type: text
    content: ' Look around [you, Habakkuk, replied the Lord] among the nations and see! And be astonished! Astounded! For I am putting into effect a work in your days [such] that you would not believe it if it were told you. [Acts 13:40, 41.]'
  '6':
  - type: text
    content: ' For behold, I am rousing up the Chaldeans, that bitter and impetuous nation who march through the breadth of the earth to take possession of dwelling places that do not belong to them. [II Kings 24:2.]'
  '7':
  - type: text
    content: ' [The Chaldeans] are terrible and dreadful; their justice and dignity proceed [only] from themselves.'
  '8':
  - type: text
    content: ' Their horses also are swifter than leopards and are fiercer than the evening wolves, and their horsemen spread themselves '
  - type: text
    content: and
  - type: text
    content: ' press on proudly; yes, their horsemen come from afar; they fly like an eagle that hastens to devour.'
  '9':
  - type: text
    content: ' They all come for violence; their faces turn eagerly forward, and they gather prisoners together like sand.'
