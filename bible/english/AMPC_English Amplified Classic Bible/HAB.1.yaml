document_id: HAB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BURDEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oracle (the thing to be lifted up) which Habakkuk the prophet saw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' O Lord, how long shall I cry for help and You will not hear? Or cry out to You of violence and You will not save?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Why do You show me iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrong, and Yourself look upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cause me to see perverseness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble? For destruction and violence are before me; and there is strife, and contention arises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore the law is slackened and justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a righteous sentence never go forth, for the [hostility of the] wicked surrounds the [uncompromisingly] righteous; therefore justice goes forth perverted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Look around [you, Habakkuk, replied the Lord] among the nations and see! And be astonished! Astounded! For I am putting into effect a work in your days [such] that you would not believe it if it were told you. [Acts 13:40, 41.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For behold, I am rousing up the Chaldeans, that bitter and impetuous nation who march through the breadth of the earth to take possession of dwelling places that do not belong to them. [II Kings 24:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [The Chaldeans] are terrible and dreadful; their justice and dignity proceed [only] from themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Their horses also are swifter than leopards and are fiercer than the evening wolves, and their horsemen spread themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' press on proudly; yes, their horsemen come from afar; they fly like an eagle that hastens to devour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They all come for violence; their faces turn eagerly forward, and they gather prisoners together like sand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They scoff at kings, and rulers are a derision to them; they ridicule every stronghold, for they heap up dust [for earth mounds] and take it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then they sweep by like a wind and pass on, and they load themselves with guilt, [as do all men] whose own power is their god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Are not You from everlasting, O Lord my God, my Holy One? We shall not die. O Lord, You have appointed [the Chaldean] to execute [Your] judgment, and You, O Rock, have established him for chastisement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction. [Deut. 32:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You are of purer eyes than to behold evil and can not look [inactively] upon injustice. Why then do You look upon the plunderer? Why are you silent when the wicked one destroys him who is more righteous than [the Chaldean oppressor] is?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Why do You make men like the fish of the sea, like reptiles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' creeping things that have no ruler [and are defenseless against their foes]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [The Chaldean] brings all of them up with his hook; he catches and drags them out with his net, he gathers them in his dragnet; so he rejoices and is in high spirits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Therefore he sacrifices [offerings] to his net and burns incense to his dragnet, because from them he lives luxuriously and his food is plentiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rich.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Shall he therefore continue to empty his net and mercilessly go on slaying the nations forever?'
