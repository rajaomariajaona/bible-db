document_id: HOS.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN ISRAEL was a child, then I loved him and called My son out of Egypt. [Matt. 2:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The more [the prophets] called to them, the more they went from them; they kept sacrificing to the Baals and burning incense to the graven images.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yet I taught Ephraim to walk, taking them by their arms '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' taking them up in My arms, but they did not know that I healed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I drew them with cords of a man, with bands of love, and I was to them as one who lifts up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eases the yoke over their cheeks, and I bent down to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gently laid food before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They shall not [literally] return into [another bondage in] the land of Egypt, but the Assyrian shall be their king because they refused to return to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the sword shall rage against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall upon their cities and shall consume the bars of their gates and shall make an end [of their defenses], because of their own counsels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' My people are bent on backsliding from Me; though [the prophets] call them to Him Who is on high, none at all will exalt Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lift himself up [to come to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' How can I give you up, O Ephraim! How can I surrender you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cast you off, O Israel! How can I make you as Admah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' how can I treat you as Zeboiim [both destroyed with Sodom]! My heart recoils within Me; My compassions are kindled together. [Deut. 29:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will not execute the fierceness of My anger; I will not bring back Ephraim to nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' again destroy him. For I am God and not man, the Holy One in the midst of you, and I will not come in wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' enter into the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They shall walk after the Lord, Who will roar like a lion; He Himself will roar and [His] sons shall come trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eagerly from the west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They shall come trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' hurriedly like a bird out of Egypt and like a dove out of the land of Assyria, and I will cause them to dwell in their houses, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Ephraim surrounds Me with lies and the house of Israel with deceit, and Judah is not yet steadfast with God, with the faithful Holy One.'
