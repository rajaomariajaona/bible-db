document_id: HOS.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN ISRAEL was a child, then I loved him and called My son out of Egypt. [Matt. 2:15.]'
  '10':
  - type: text
    content: ' They shall walk after the Lord, Who will roar like a lion; He Himself will roar and [His] sons shall come trembling '
  - type: text
    content: and
  - type: text
    content: ' eagerly from the west.'
  '11':
  - type: text
    content: ' They shall come trembling '
  - type: text
    content: but
  - type: text
    content: ' hurriedly like a bird out of Egypt and like a dove out of the land of Assyria, and I will cause them to dwell in their houses, says the Lord.'
  '12':
  - type: text
    content: ' Ephraim surrounds Me with lies and the house of Israel with deceit, and Judah is not yet steadfast with God, with the faithful Holy One.'
  '2':
  - type: text
    content: ' The more [the prophets] called to them, the more they went from them; they kept sacrificing to the Baals and burning incense to the graven images.'
  '3':
  - type: text
    content: ' Yet I taught Ephraim to walk, taking them by their arms '
  - type: text
    content: or
  - type: text
    content: ' taking them up in My arms, but they did not know that I healed them.'
  '4':
  - type: text
    content: ' I drew them with cords of a man, with bands of love, and I was to them as one who lifts up '
  - type: text
    content: and
  - type: text
    content: ' eases the yoke over their cheeks, and I bent down to them '
  - type: text
    content: and
  - type: text
    content: ' gently laid food before them.'
  '5':
  - type: text
    content: ' They shall not [literally] return into [another bondage in] the land of Egypt, but the Assyrian shall be their king because they refused to return to Me.'
  '6':
  - type: text
    content: ' And the sword shall rage against '
  - type: text
    content: and
  - type: text
    content: ' fall upon their cities and shall consume the bars of their gates and shall make an end [of their defenses], because of their own counsels '
  - type: text
    content: and
  - type: text
    content: ' devices.'
  '7':
  - type: text
    content: ' My people are bent on backsliding from Me; though [the prophets] call them to Him Who is on high, none at all will exalt Him '
  - type: text
    content: or
  - type: text
    content: ' lift himself up [to come to Him].'
  '8':
  - type: text
    content: ' How can I give you up, O Ephraim! How can I surrender you '
  - type: text
    content: and
  - type: text
    content: ' cast you off, O Israel! How can I make you as Admah '
  - type: text
    content: or
  - type: text
    content: ' how can I treat you as Zeboiim [both destroyed with Sodom]! My heart recoils within Me; My compassions are kindled together. [Deut. 29:23.]'
  '9':
  - type: text
    content: ' I will not execute the fierceness of My anger; I will not bring back Ephraim to nothing '
  - type: text
    content: or
  - type: text
    content: ' again destroy him. For I am God and not man, the Holy One in the midst of you, and I will not come in wrath '
  - type: text
    content: or
  - type: text
    content: ' enter into the city.'
