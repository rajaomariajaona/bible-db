document_id: JOS.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE SECOND lot fell to Simeon, to the tribe of the Simeonites according to their families; and their inheritance lay within that of the people of Judah.'
  '10':
  - type: text
    content: ' The third lot came up for the tribe of Zebulun according to their families. The border of its inheritance extended to Sarid.'
  '11':
  - type: text
    content: ' Then its boundary went up westward and on to Maralah and reached to Dabbesheth and to the brook east of Jokneam.'
  '12':
  - type: text
    content: ' And it turned from Sarid eastward to the border of Chisloth-tabor and it went out to Daberath and on up to Japhia,'
  '13':
  - type: text
    content: ' Then passed eastward to Gath-hepher [Jonah''s birthplace] and to Eth-kazin, and went on to Rimmon bending toward Neah.'
  '14':
  - type: text
    content: ' The boundary circled on the north to Hannathon, ending at the Valley of Iphtah-el.'
  '15':
  - type: text
    content: ' Included were Kattath, Nahalal, Shimron, Idalah, and Bethlehem; twelve cities with their villages.'
  '16':
  - type: text
    content: ' This is the inheritance of the people of Zebulun according to their families, these cities with their villages.'
  '17':
  - type: text
    content: ' The fourth lot fell to Issachar, to its people according to their families.'
  '18':
  - type: text
    content: ' Their territory included: Jezreel, Chesulloth, Shunem,'
  '19':
  - type: text
    content: ' Hapharaim, Shion, Anaharath,'
  '2':
  - type: text
    content: ' And they had for their inheritance: Beersheba or Sheba, Moladah,'
  '20':
  - type: text
    content: ' Rabbith, Kishion, Ebez,'
  '21':
  - type: text
    content: ' Remeth, En-gannim, En-haddah, and Beth-pazzez.'
  '22':
  - type: text
    content: ' The boundary reached to Tabor, Shahazumah, and Beth-shemesh, and ended at the Jordan; sixteen cities with their villages.'
  '23':
  - type: text
    content: ' This is the inheritance of the tribe of Issachar according to their families, the cities and their villages.'
  '24':
  - type: text
    content: ' The fifth lot fell to the tribe of Asher according to their families.'
  '25':
  - type: text
    content: ' Their territory included: Helkath, Hali, Beten, Achshaph,'
  '26':
  - type: text
    content: ' Allammelech, Amad, and Mishal; and on the west it touched Carmel and Shihor-libnath.'
  '27':
  - type: text
    content: ' Then it turned eastward to Beth-dagon, touching Zebulun and the Valley of Iphtah-el northward to Beth-emek and Neiel, and continued in the north to Cabul,'
  '28':
  - type: text
    content: ' Ebron, Rehob, Hammon, and Kanah, even to populous Sidon.'
  '29':
  - type: text
    content: ' Then the boundary turned to Ramah, reaching to the fortified city of Tyre; and it turned to Hosah, and ended at the sea–Mahalab, Achzib,'
  '3':
  - type: text
    content: ' Hazarshual, Balah, Ezem,'
  '30':
  - type: text
    content: ' Ummah, Aphek, and Rehob; twenty-two cities with their villages.'
  '31':
  - type: text
    content: ' This is the inheritance of the tribe of Asher according to their families, these cities with their villages.'
  '32':
  - type: text
    content: ' The sixth lot fell to the tribe of Naphtali according to their families.'
  '33':
  - type: text
    content: ' Their boundary ran from Heleph, from the oak in Zaanannim and Adami-nekeb and Jabneel as far as Lakkum; and it ended at the Jordan.'
  '34':
  - type: text
    content: ' Then the boundary turned westward to Aznoth-tabor and went from there to Hukkok, touching Zebulun on the south, Asher on the west, and Judah on the east at the Jordan.'
  '35':
  - type: text
    content: ' The fortified cities included Ziddim, Zer, Hammath, Rakkath, Chinnereth,'
  '36':
  - type: text
    content: ' Adamah, Ramah, Hazor,'
  '37':
  - type: text
    content: ' Kedesh, Edrei, En-hazor,'
  '38':
  - type: text
    content: ' Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh; nineteen cities and their villages.'
  '39':
  - type: text
    content: ' This is the inheritance of the tribe of Naphtali according to their families, the cities and their villages.'
  '4':
  - type: text
    content: ' Eltolad, Bethul, Hormah,'
  '40':
  - type: text
    content: ' And the seventh lot fell to the tribe of Dan according to their families.'
  '41':
  - type: text
    content: ' The territory of their inheritance included: Zorah, Eshtaol, Ir-shemesh,'
  '42':
  - type: text
    content: ' Shaalabbin, Aijalon, Ithlah,'
  '43':
  - type: text
    content: ' Elon, Timnah, Ekron,'
  '44':
  - type: text
    content: ' Eltekeh, Gibbethon, Baalath,'
  '45':
  - type: text
    content: ' Jehud, Bene-berak, Gath-rimmon,'
  '46':
  - type: text
    content: ' Me-jarkon, and Rakkon, with the territory before Joppa.'
  '47':
  - type: text
    content: ' The territory of the tribe of Dan had to be extended [because of the crowding in of the Amorites and Philistines]; so the sons of Dan went up to fight against Leshem (Laish) and took it and smote it with the sword and possessed it and dwelt there, and they called Leshem (Laish) Dan after Dan their [forefather]. [Judg. 1:34; 18:7-10, 27.]'
  '48':
  - type: text
    content: ' This is the inheritance of the tribe of Dan according to their families, these cities with their villages.'
  '49':
  - type: text
    content: ' When they had finished dividing the land for inheritance by their boundaries, the Israelites gave an inheritance among them to Joshua son of Nun.'
  '5':
  - type: text
    content: ' Ziklag, Beth-marcaboth, Hazar-susah,'
  '50':
  - type: text
    content: ' According to the word of the Lord they gave him the city for which he asked–Timnath-serah in the hills of Ephraim. And he built the city and dwelt in it.'
  '51':
  - type: text
    content: ' These are the inheritances which Eleazar the priest, Joshua son of Nun, and the heads of the fathers'' houses of the tribes of Israel distributed by lot in Shiloh before the Lord at the door of the Tent of Meeting. So they finished dividing the land.'
  '6':
  - type: text
    content: ' Beth-lebaoth, and Sharuhen; [making] thirteen cities and their villages;'
  '7':
  - type: text
    content: ' Ain [with] Rimmon, Ether, and Ashan; [making] four cities and their villages;'
  '8':
  - type: text
    content: ' And all the villages around these cities as far as Baalath-beer, or Ramah of the Negeb. This was the possession of the Simeonites according to their families.'
  '9':
  - type: text
    content: ' Out of the part assigned to the Judahites was the inheritance of the tribe of Simeon, for the portion of the tribe of Judah was too large for them. Therefore the tribe of Simeon had its inheritance in the midst of Judah''s inheritance.'
