document_id: JOS.19,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE SECOND lot fell to Simeon, to the tribe of the Simeonites according to their families; and their inheritance lay within that of the people of Judah.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The third lot came up for the tribe of Zebulun according to their families. The border of its inheritance extended to Sarid.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then its boundary went up westward and on to Maralah and reached to Dabbesheth and to the brook east of Jokneam.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And it turned from Sarid eastward to the border of Chisloth-tabor and it went out to Daberath and on up to Japhia,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then passed eastward to Gath-hepher [Jonah''s birthplace] and to Eth-kazin, and went on to Rimmon bending toward Neah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The boundary circled on the north to Hannathon, ending at the Valley of Iphtah-el.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Included were Kattath, Nahalal, Shimron, Idalah, and Bethlehem; twelve cities with their villages.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the people of Zebulun according to their families, these cities with their villages.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fourth lot fell to Issachar, to its people according to their families.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their territory included: Jezreel, Chesulloth, Shunem,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hapharaim, Shion, Anaharath,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they had for their inheritance: Beersheba or Sheba, Moladah,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rabbith, Kishion, Ebez,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Remeth, En-gannim, En-haddah, and Beth-pazzez.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The boundary reached to Tabor, Shahazumah, and Beth-shemesh, and ended at the Jordan; sixteen cities with their villages.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the tribe of Issachar according to their families, the cities and their villages.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fifth lot fell to the tribe of Asher according to their families.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their territory included: Helkath, Hali, Beten, Achshaph,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Allammelech, Amad, and Mishal; and on the west it touched Carmel and Shihor-libnath.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then it turned eastward to Beth-dagon, touching Zebulun and the Valley of Iphtah-el northward to Beth-emek and Neiel, and continued in the north to Cabul,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ebron, Rehob, Hammon, and Kanah, even to populous Sidon.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the boundary turned to Ramah, reaching to the fortified city of Tyre; and it turned to Hosah, and ended at the sea–Mahalab, Achzib,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hazarshual, Balah, Ezem,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ummah, Aphek, and Rehob; twenty-two cities with their villages.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the tribe of Asher according to their families, these cities with their villages.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sixth lot fell to the tribe of Naphtali according to their families.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their boundary ran from Heleph, from the oak in Zaanannim and Adami-nekeb and Jabneel as far as Lakkum; and it ended at the Jordan.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the boundary turned westward to Aznoth-tabor and went from there to Hukkok, touching Zebulun on the south, Asher on the west, and Judah on the east at the Jordan.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fortified cities included Ziddim, Zer, Hammath, Rakkath, Chinnereth,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Adamah, Ramah, Hazor,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Kedesh, Edrei, En-hazor,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh; nineteen cities and their villages.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the tribe of Naphtali according to their families, the cities and their villages.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Eltolad, Bethul, Hormah,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the seventh lot fell to the tribe of Dan according to their families.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The territory of their inheritance included: Zorah, Eshtaol, Ir-shemesh,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Shaalabbin, Aijalon, Ithlah,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Elon, Timnah, Ekron,'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Eltekeh, Gibbethon, Baalath,'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jehud, Bene-berak, Gath-rimmon,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Me-jarkon, and Rakkon, with the territory before Joppa.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The territory of the tribe of Dan had to be extended [because of the crowding in of the Amorites and Philistines]; so the sons of Dan went up to fight against Leshem (Laish) and took it and smote it with the sword and possessed it and dwelt there, and they called Leshem (Laish) Dan after Dan their [forefather]. [Judg. 1:34; 18:7-10, 27.]'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the inheritance of the tribe of Dan according to their families, these cities with their villages.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they had finished dividing the land for inheritance by their boundaries, the Israelites gave an inheritance among them to Joshua son of Nun.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ziklag, Beth-marcaboth, Hazar-susah,'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' According to the word of the Lord they gave him the city for which he asked–Timnath-serah in the hills of Ephraim. And he built the city and dwelt in it.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the inheritances which Eleazar the priest, Joshua son of Nun, and the heads of the fathers'' houses of the tribes of Israel distributed by lot in Shiloh before the Lord at the door of the Tent of Meeting. So they finished dividing the land.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Beth-lebaoth, and Sharuhen; [making] thirteen cities and their villages;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ain [with] Rimmon, Ether, and Ashan; [making] four cities and their villages;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the villages around these cities as far as Baalath-beer, or Ramah of the Negeb. This was the possession of the Simeonites according to their families.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Out of the part assigned to the Judahites was the inheritance of the tribe of Simeon, for the portion of the tribe of Judah was too large for them. Therefore the tribe of Simeon had its inheritance in the midst of Judah''s inheritance.'
