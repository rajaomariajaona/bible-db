document_id: 1KI.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN DAVID''S time to die was near, he charged Solomon his son, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I go the way of all the earth. Be strong and show yourself a man;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Keep the charge of the Lord your God, walk in His ways, keep His statutes, His commandments, His precepts, and His testimonies, as it is written in the Law of Moses, that you may do wisely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosper in all that you do and wherever you turn,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' That the Lord may fulfill His promise to me, saying, If your sons take heed to their way, to walk before Me in truth with all their heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind and with all their soul, there shall not fail you [to have] a man on the throne of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You know also what Joab son of Zeruiah did to me, and what he did to the two captains of the hosts of Israel, Abner son of Ner and Amasa son of Jether, whom he murdered, avenging in time of peace blood shed in war, and putting innocent blood of war on the girdle on his loins and on the sandals of his feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Do therefore according to your wisdom, but let not his hoary head go down to Sheol (the place of the dead) in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But show kindness to the sons of Barzillai the Gileadite and let them be among those who eat at your table; for with such kindness they met me when I fled because of Absalom your brother. [II Sam. 17:27-29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you have with you Shimei son of Gera, the Benjamite of Bahurim, who cursed me with a grievous curse in the day when I went to Mahanaim. But he came down to meet me at the Jordan [on my return], and I swore to him by the Lord, saying, I will not put you to death with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So do not hold him guiltless; for you are a wise man and know what you should do to him. His hoary head bring down to the grave with blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So David slept with his fathers and was buried in the City of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' David reigned over Israel forty years–seven years in Hebron and thirty-three years in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Solomon sat on the throne of David his father, and his kingdom was firmly established.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Adonijah, the son of [David and] Haggith, came to Bathsheba, the mother of Solomon. She said, Do you come peaceably? And he said, Peaceably.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He said, I have something to say to you. And she said, Say on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He said, You know that the kingdom belonged to me [as the eldest living son], and all Israel looked to me to reign. However, the kingdom has passed from me to my brother; for it was his from the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now I make one request of you; do not deny me. And she said, Say on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He said, I pray you, ask King Solomon, for he will not refuse you, to give me Abishag the Shunammite to be my wife. [I Kings 1:1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Bathsheba said, Very well; I will speak for you to the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Bathsheba went to King Solomon to speak to him for Adonijah. The king rose to meet her, bowed to her, sat down on his throne, and caused a seat to be set at his right hand for her, the king''s mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then she said, I have one small request to make of you; do not refuse me. The king said to her, Ask on, my mother, for I will not refuse you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' She said, Give Abishag the Shunammite to Adonijah your brother to be his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' King Solomon answered his mother, And why do you ask Abishag the Shunammite for Adonijah? Ask for him the kingdom also–for he is my elder brother–[ask it] even for him and for [his supporters] Abiathar the priest and Joab son of Zeruiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then King Solomon swore by the Lord, saying, May God do so to me, and more also, if Adonijah has not requested this against his own life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore, as the Lord lives, Who has established me and set me on the throne of David my father and Who has made me a house as He promised, Adonijah shall be put to death this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So King Solomon sent Benaiah son of Jehoiada, who attacked [Adonijah] and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And to Abiathar the priest the king said, Get to Anathoth to your own estate; for you deserve death, but I will not put you to death now, because you bore the ark of the Lord God before my father David and were afflicted in all my father endured.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So Solomon expelled Abiathar [descendant of Eli] from being priest to the Lord, fulfilling the word of the Lord which He spoke concerning the house of Eli in Shiloh. [I Sam. 2:27-36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' When the news came to Joab, for Joab had followed Adonijah though he had not followed Absalom, [he] fled to the tent (tabernacle) of the Lord and caught hold of the horns of the altar [before it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' King Solomon was told that Joab had fled to the tent of the Lord and was at the altar. Then Solomon sent Benaiah son of Jehoiada, saying, Go, strike him down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' So Benaiah came to the tent of the Lord and told Joab, The king commands, Come forth. But Joab said, No, I will die here. Then Benaiah brought the king word again, Thus said Joab, and thus he answered me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The king said to him, Do as he has said. Strike him down and bury him, that you may take away from [me and from] my father''s house the innocent blood which Joab shed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The Lord shall return his bloody deeds upon his own head, for he fell upon two men more [uncompromisingly] righteous and honorable than he and slew them with the sword, without my father knowing of it: Abner son of Ner, captain of the host of Israel, and Amasa son of Jether, captain of the host of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So shall their blood return upon the head of Joab and of his descendants forever. But upon David, his descendants, his house, and his throne, there shall be peace from the Lord forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' So Benaiah son of Jehoiada went up and struck and killed Joab, and he was buried at his own house in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The king put Benaiah son of Jehoiada in Joab''s place over the army and put Zadok the priest in place of Abiathar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The king sent for Shimei and said to him, Build yourself a house in Jerusalem and dwell there, and do not leave there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For on the day you go out and pass over the brook Kidron, know with certainty that you shall die; your blood shall be upon your own head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Shimei said to the king, The saying is good. As my lord the king has said, so your servant will do. And Shimei dwelt in Jerusalem many days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But after three years, two of Shimei''s servants ran away to Achish son of Maacah, king of Gath. And Shimei was told, Behold, your [runaway] servants are in Gath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So Shimei arose, saddled his donkey, and went to Gath to King Achish to seek his servants, and brought them from Gath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' It was told Solomon that Shimei went from Jerusalem to Gath and had returned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the king sent for Shimei and said to him, Did I not make you swear by the Lord and warn you, saying, Know with certainty, on the day you go out and walk abroad anywhere, you shall surely die? And you said to me, I have heard your word. It is accepted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Why then have you not kept the oath of the Lord and the command with which I have charged you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' The king also said to Shimei, You are aware in your own heart of all the evil you did to my father David; so the Lord will return your evil upon your own head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' But King Solomon shall be blessed, and the throne of David shall be established before the Lord forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' So the king commanded Benaiah son of Jehoiada, who went out and struck down Shimei, and he died. And the kingdom was established in the hands of Solomon.'
