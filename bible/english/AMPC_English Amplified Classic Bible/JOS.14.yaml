document_id: JOS.14,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THESE ARE the inheritances in the land of Canaan distributed to the Israelites by Eleazar the priest, Joshua son of Nun, and the heads of the fathers'' houses of their tribes.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And now, behold, the Lord has kept me alive, as He said, these forty-five years since the Lord spoke this word to Moses, while the Israelites wandered in the wilderness; and now, behold, I am this day eighty-five years old.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Yet I am as strong today as I was the day Moses sent me; as my strength was then, so is my strength now for war and to go out and to come in.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So now give me this hill country of which the Lord spoke that day. For you heard then how the [giantlike] Anakim were there and that the cities were great and fortified; if the Lord will be with me, I shall drive them out just as the Lord said.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then Joshua blessed him and gave Hebron to Caleb son of Jephunneh for an inheritance.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So Hebron became the inheritance of Caleb son of Jephunneh the Kenizzite to this day, because he wholly followed the Lord, the God of Israel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The name of Hebron before was Kiriath-arba [city of Arba]. This Arba was the greatest of the Anakim. And the land had rest from war.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Their inheritance was by lot, as the Lord commanded Moses, for the nine and one-half tribes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For Moses had given an inheritance to the two and one-half tribes beyond the Jordan, but to the Levites he gave no inheritance among them,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For the people of Joseph were two tribes, Manasseh and Ephraim. And no part was given in the land to the Levites except cities in which to live, with their pasturelands for their livestock and for their possessions.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' As the Lord commanded Moses, so the Israelites did, and they divided the land.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then the people of Judah came to Joshua in Gilgal, and Caleb son of Jephunneh the Kenizzite said to him, You know what the Lord said to Moses the man of God concerning me and you in Kadesh-barnea.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Forty years old was I when Moses the servant of the Lord sent me from Kadesh-barnea to scout out the land. And I brought him a report as it was in my heart.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But my brethren who went up with me made the hearts of the people melt; yet I wholly followed the Lord my God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And Moses swore on that day, Surely the land on which your feet have walked shall be an inheritance to you and your children always, because you have wholly followed the Lord my God. [Deut. 1:35, 36.]'
