document_id: HAB.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [OH, I know, I have been rash to talk out plainly this way to God!] I will [in my thinking] stand upon my post of observation and station myself on the tower '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fortress, and will watch to see what He will say within me and what answer I will make [as His mouthpiece] to the perplexities of my complaint against Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Lord answered me and said, Write the vision and engrave it so plainly upon tablets that everyone who passes may [be able to] read [it easily and quickly] as he hastens by.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the vision is yet for an appointed time and it hastens to the end [fulfillment]; it will not deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disappoint. Though it tarry, wait [earnestly] for it, because it will surely come; it will not be behindhand on its appointed day. [Heb. 10:37, 38.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Look at the proud; his soul is not straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right within him, but the [rigidly] just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the [uncompromisingly] righteous man shall live by his faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in his faithfulness. [Rom. 1:17; Gal. 3:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Moreover, wine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wealth
  - type: text
    text: ' are treacherous; the proud man [the Chaldean invader] is restless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cannot stay at home. His appetite is large like that of Sheol and [his greed] is like death and cannot be satisfied; he gathers to himself all nations and collects all people as if he owned them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Shall not all these [victims of his greed] take up a taunt against him and in scoffing derision of him say, Woe to him who piles up that which is not his! [How long will he possess it?] And [woe to him] who loads himself with promissory notes for usury!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Shall [your debtors] not rise up suddenly who shall bite you, exacting usury of you, and those awake who will vex you [toss you to and fro and make you tremble violently]? Then you will be booty for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Because you [king of Babylon] have plundered many nations, all who are left of the people shall plunder you–because of men''s blood and for the violence done to the earth, to the city and all the people who live in each city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Woe to him who obtains wicked gain for his house, [who thinks by so doing] to set his nest on high that he may be preserved from calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivered from the power of evil!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You have devised shame to your house by cutting off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' putting an end to many peoples, and you have sinned against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forfeited your own life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the stone shall cry out of the wall [built in sin, to accuse you], and the beam out of the woodwork will answer it [agreeing with its charge against you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Woe to him who builds a town with blood and establishes a city by iniquity!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, is it not by appointment of the Lord of hosts that the nations toil only to satisfy the fire [that will consume their work], and the peoples weary themselves only for emptiness, falsity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But [the time is coming when] the earth shall be filled with the knowledge of the glory of the Lord as the waters cover the sea. [Isa. 11:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Woe to him who gives his neighbors drink, who pours out your bottle to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adds to it your poisonous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blighting wrath and also makes them drunk, that you may look on their stripped condition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pour out foul shame [on their glory]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You [yourself] will be filled with shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contempt instead of glory. Drink also and be like an uncircumcised [heathen]! The cup [of wrath] in the Lord''s right hand will come around to you [O destroyer], and foul shame shall be upon your own glory! [Rev. 16:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For the violence done to Lebanon will cover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overwhelm you; the destruction of the animals [which the violence frightened away] will terrify you on account of men''s blood and the violence done to the land, to the city and all its inhabitants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' What profit is the graven image when its maker has formed it? It is only a molten image and a teacher of lies. For the maker trusts in his own creations [as his gods] when he makes dumb idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Woe to him who says to the wooden image, Awake! and to the dumb stone, Arise, teach! [Yet, it cannot, for] behold, it is laid over with gold and silver and there is no breath at all inside it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the Lord is in His holy temple; let all the earth hush '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep silence before Him. [Zeph. 1:7; Zech. 2:13.]'
