document_id: NUM.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Israelites, the whole congregation, came into the Wilderness of Zin in the first month. And the people dwelt in Kadesh. Miriam died and was buried there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now there was no water for the congregation, and they assembled together against Moses and Aaron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the people contended with Moses, and said, Would that we had died when our brethren died [in the plague] before the Lord! [Num. 16:49.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And why have you brought up the congregation of the Lord into this wilderness, that we should die here, we and our livestock?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And why have you made us come up out of Egypt to bring us into this evil place? It is no place of grain or of figs or of vines or of pomegranates. And there is no water to drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then Moses and Aaron went from the presence of the assembly to the door of the Tent of Meeting and fell on their faces. Then the glory of the Lord appeared to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Take the rod, and assemble the congregation, you and Aaron your brother, and tell the rock before their eyes to give forth its water, and you shall bring forth to them water out of the rock; so you shall give the congregation and their livestock drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Moses took the rod from before the Lord, as He commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Moses and Aaron assembled the congregation before the rock and Moses said to them, Hear now, you rebels; must we bring you water out of this rock?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Moses lifted up his hand and with his rod he smote the rock twice. And the water came out abundantly, and the congregation drank, and their livestock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord said to Moses and Aaron, Because you did not believe in (rely on, cling to) Me to sanctify Me in the eyes of the Israelites, you therefore shall not bring this congregation into the land which I have given them. [Ps. 106:32, 33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' These are the waters of Meribah [strife], where the Israelites contended with the Lord and He showed Himself holy among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Moses sent messengers from Kadesh to the king of Edom, saying, Thus says your kinsman Israel: You know all the adversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' birth pangs that have come upon us [as a nation]:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' How our fathers went down to Egypt; we dwelt there a long time, and the Egyptians dealt evilly with us and our fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But when we cried to the Lord, He heard us and sent an angel and brought us forth out of Egypt. Now behold, we are in Kadesh, a city on your country''s edge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let us pass, I pray you, through your country. We will not pass through field or vineyard, or drink of the water of the wells. We will go along the king''s highway; we will not turn aside to the right hand or to the left until we have passed your borders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But Edom said to him, You shall not go through, lest I come out against you with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Israelites said to him, We will go by the highway, and if I and my livestock drink of your water, I will pay for it. Only let me pass through on foot, nothing else.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Edom said, You shall not go through. And Edom came out against Israel with many people and a strong hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Thus Edom refused to give Israel passage through his territory, so Israel turned away from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' They journeyed from Kadesh, and the Israelites, even the whole congregation, came to Mount Hor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the Lord said to Moses and Aaron at Mount Hor, on the border of the land of Edom,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Aaron shall be gathered to his people. For he shall not enter the land which I have given to the Israelites, because you both rebelled against My instructions at the waters of Meribah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Take Aaron and Eleazar his son and bring them up to Mount Hor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Strip Aaron of his vestments and put them on Eleazar his son, and Aaron shall be gathered to his people, and shall die there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Moses did as the Lord commanded; and they went up Mount Hor in the sight of all the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Moses stripped Aaron of his [priestly] garments and put them on Eleazar his son. And Aaron died there on the mountain top; and Moses and Eleazar came down from the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When all the congregation saw that Aaron was dead, they wept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourned for him thirty days, all the house of Israel.'
