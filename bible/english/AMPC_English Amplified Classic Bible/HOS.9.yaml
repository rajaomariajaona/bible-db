document_id: HOS.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' REJOICE NOT, O Israel, with exultation as do the peoples, for you have played the harlot, forsaking your God. You have loved [a harlot''s] hire upon every threshing floor [ascribing the harvest to the Baals instead of to God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The threshing floor and the winevat shall not feed them, and the new wine shall fail them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They shall not remain in the Lord''s land, but Ephraim shall return to [another] Egypt and they shall eat unclean food in Assyria. [Ezek. 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They shall not pour out wine offerings to the Lord, neither shall they be pleasing to Him. Their sacrifices shall be to them as the bread of mourners; all who eat of them shall be defiled, for their bread shall be [only] for their appetite; it shall not come into the house of the Lord [to be offered first to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' What will you do on the day of the appointed solemn assembly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' festival and on the day of the feast of the Lord [when you are in exile]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For behold, they are gone away from devastation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction; Egypt shall gather them in; Memphis shall bury them. Their precious things of silver shall be in the possession of nettles; thorns shall be [growing] in their tents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The days of visitation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment have come; the days of recompense have come; Israel shall know it. The prophet is [considered] a crazed fool and the man who is inspired is [treated as if] mad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a fanatic, because of the abundance of your iniquity and because the enmity, hostility, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecution are great. [Luke 21:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ephraim was [intended to be] a watchman with my God [and a prophet to the surrounding nations]; but he, that prophet, has become a fowler''s snare in all his ways. There is enmity, hostility, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecution in the house of his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They have deeply corrupted themselves as in the days of Gibeah. The Lord will [earnestly] remember their iniquity; He will punish their sins. [Judg. 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I found Israel like grapes in the wilderness; I saw your fathers as the first ripe fruit on the fig tree in its first season, but they went to Baal-peor and consecrated themselves to that shameful thing [Baal], and they became detestable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathsome like that which they loved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' As for Ephraim, their glory shall fly away like a bird; there shall be no birth, no being with child, and [because of their impurity] no becoming pregnant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Though they bring up their children, yet will I bereave them so that not a man shall be left; yes, woe also to them when I look away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depart from them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Ephraim, as I have seen with Tyre, is planted in a pleasant place, but Ephraim shall bring out his children to the slayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Give them [their due], O Lord! [But] what will You give? Give them a miscarrying womb and dry breasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' All their wickedness [says the Lord] is focused in Gilgal, for there I hated them; for the wickedness of their [idolatrous] doings I will drive them out of My house [the Holy Land]; I will love them no more; all their princes are rebels. [Hos. 4:15; 12:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Ephraim is smitten, their root is dried up, they shall bear no fruit. Yes, though they bring forth, yet will I slay even their beloved children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' My God will cast them away because they did not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Him, and they shall be wanderers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fugitives among the nations.'
