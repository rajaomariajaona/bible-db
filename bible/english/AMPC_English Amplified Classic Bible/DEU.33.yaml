document_id: DEU.33,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THIS IS the blessing with which Moses the man of God blessed the Israelites before his death.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [The priests] shall teach Jacob Your ordinances and Israel Your law. They shall put incense before You and whole burnt offerings upon Your altar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Bless, O Lord, [Levi''s] substance, and accept the work of his hands; crush the loins of his adversaries, and of those who hate him, that they arise no more.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Of Benjamin he said: The beloved of the Lord shall dwell in safety by Him; He covers him all the day long, and makes His dwelling between his shoulders.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And of Joseph he said: Blessed by the Lord be his land, with the precious gifts of heaven from the dew and from the deep that couches beneath,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' With the precious things of the fruits of the sun and with the precious yield of the months,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' With the chief products of the ancient mountains and with the precious things of the everlasting hills,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' With the precious things of the earth and its fullness and the favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goodwill of Him Who dwelt in the bush. Let these blessings come upon the head of Joseph, upon the crown of the head of him who was separate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prince among his brothers. [Exod. 3:4.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Like a firstling young bull his majesty is, and his horns like the horns of the wild ox; with them he shall push the peoples, all of them, to the ends of the earth. And they are the ten thousands of Ephraim, and they are the thousands of Manasseh.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And of Zebulun he said: Rejoice, Zebulun, in your interests abroad, and you, Issachar, in your tents [at home].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' They shall call the people unto Mount [Carmel]; there they shall offer sacrifices of righteousness, for they shall suck the abundance of the seas and the treasures hid in the sand.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He said, The Lord came from Sinai and beamed upon us from Seir; He flashed forth from Mount Paran, from among ten thousands of holy ones, a flaming fire, a law, at His right hand.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And of Gad he said: Blessed is He Who enlarges Gad! Gad lurks like a lioness, and tears the arm, yes, the crown of the head.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' He selected the best land for himself, for there was the leader''s portion reserved; yet he came with the chiefs of the nation, and the righteous will of the Lord he performed, and His ordinances with Israel. [Num. 32:29-33.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Of Dan he said: Dan is a lion''s whelp that leaps forth from Bashan.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Of Naphtali he said: O Naphtali, satisfied with favor and full of the blessing of the Lord, possess the Sea [of Galilee] and [its warm, sunny climate like] the south.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Of Asher he said: Blessed above sons is Asher; let him be acceptable to his brothers, and let him dip his foot in oil.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Your castles and strongholds shall have bars of iron and bronze, and as your day, so shall your strength, your rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' security, be.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' There is none like God, O Jeshurun [Israel], Who rides through the heavens to your help and in His majestic glory through the skies.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' The eternal God is your refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dwelling place, and underneath are the everlasting arms; He drove the enemy before you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thrust them out, saying, Destroy!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And Israel dwells in safety, the fountain of Jacob alone in a land of grain and new wine; yes, His heavens drop dew.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Happy are you, O Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessing is yours! Who is like you, a people saved by the Lord, the Shield of your help, the Sword that exalts you! Your enemies shall come fawning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cringing, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' submit feigned obedience to you, and you shall march on their high places.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Yes, He loves [the tribes] His people; all those consecrated to Him are in Your hand. They followed in Your steps; they [accepted Your word and] received direction from You,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' When Moses commanded us a law, as a possession for the assembly of Jacob.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [The Lord] was King in Jeshurun (Israel) when the heads of the people were gathered, all the tribes of Israel together.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let [the tribe of] Reuben live and not die out, but let his men be few.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And this he [Moses] said of Judah: Hear, O Lord, the voice of Judah, and bring him to his people! With his hands he contended for himself; but may You be a help against his enemies.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And of Levi he said: Your Thummim and Your Urim [by which the priest sought God''s will for the nation] are for Your pious one [Aaron on behalf of the tribe], whom You tried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proved at Massah, with whom You contended at the waters of Meribah; [Num. 20:1-13.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' [Aaron] who said of his father and mother, I do not regard them; nor did he acknowledge his brothers or openly recognize his own children. For the priests observed Your word and kept Your covenant [as to their limitations].'
