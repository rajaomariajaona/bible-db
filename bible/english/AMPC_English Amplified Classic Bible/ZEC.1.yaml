document_id: ZEC.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE eighth month, in the second year [of the reign] of Darius, came the word of the Lord to Zechariah son of Berechiah, the son of Iddo, the prophet, saying, [Ezra 5:1.]'
  '10':
  - type: text
    content: ' And the Man who stood among the myrtle trees answered and said, These are they whom the Lord has sent to walk to and fro through the earth '
  - type: text
    content: and
  - type: text
    content: ' patrol it.'
  '11':
  - type: text
    content: ' And the men on the horses answered the Angel of the Lord Who stood among the myrtle trees and said, We have walked to and fro through the earth [patrolling it] and behold, all the earth sits at rest [in peaceful security].'
  '12':
  - type: text
    content: ' Then the Angel of the Lord said, O Lord of hosts, how long will You not have mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness for Jerusalem and the cities of Judah, against which You have had indignation these seventy years [of the Babylonian captivity]?'
  '13':
  - type: text
    content: ' And the Lord answered the angel who talked with me with gracious and comforting words.'
  '14':
  - type: text
    content: ' So the angel who talked with me said to me, Cry out, Thus says the Lord of hosts: I am jealous for Jerusalem and for Zion with a great jealousy.'
  '15':
  - type: text
    content: ' And I am very angry with the nations that are at ease; for while I was but a little displeased, they helped forward the affliction '
  - type: text
    content: and
  - type: text
    content: ' disaster.'
  '16':
  - type: text
    content: ' Therefore thus says the Lord: I have returned to Jerusalem with compassion (lovingkindness and mercy). My house shall be built in it, says the Lord of hosts, and a measuring line shall be stretched out over Jerusalem [with a view to rebuilding its walls].'
  '17':
  - type: text
    content: ' Cry yet again, saying, Thus says the Lord of hosts: My cities shall yet again overflow with prosperity, and the Lord shall yet comfort Zion and shall yet choose Jerusalem.'
  '18':
  - type: text
    content: ' Then I lifted up my eyes and saw, and behold, four horns [symbols of strength].'
  '19':
  - type: text
    content: ' And I said to the angel who talked with me, What are these? And he answered me, These are the horns '
  - type: text
    content: or
  - type: text
    content: ' powers which have scattered Judah, Israel, and Jerusalem.'
  '2':
  - type: text
    content: ' The Lord was very angry with your fathers.'
  '20':
  - type: text
    content: ' Then the Lord showed me four smiths '
  - type: text
    content: or
  - type: text
    content: ' workmen [one for each enemy horn, to beat it down].'
  '21':
  - type: text
    content: ' Then said I, What are these [horns and smiths] coming to do? And he said, These are the horns '
  - type: text
    content: or
  - type: text
    content: ' powers that scattered Judah so that no man lifted up his head. But these smiths '
  - type: text
    content: or
  - type: text
    content: ' workmen have come to terrorize them '
  - type: text
    content: and
  - type: text
    content: ' cause them to be panic-stricken, to cast out the horns '
  - type: text
    content: or
  - type: text
    content: ' powers of the nations who lifted up their horn against the land of Judah to scatter it.'
  '3':
  - type: text
    content: ' Therefore say to them [the Jews of this day], Thus says the Lord of hosts: Return to Me, says the Lord of hosts, and I will return to you; it is the utterance of the Lord of hosts.'
  '4':
  - type: text
    content: ' Be not as your fathers to whom the former prophets cried, Thus says the Lord of hosts: Return now from your evil ways and your evil doings; but they would not hear or listen to Me, says the Lord. [II Kings 17:13; Isa. 45:22; Jer. 18:11; Ezek. 33:11.]'
  '5':
  - type: text
    content: ' Your fathers, where are they? And the prophets, do they live forever?'
  '6':
  - type: text
    content: ' But My words and My statutes, which I commanded My servants the prophets, did they not overtake '
  - type: text
    content: and
  - type: text
    content: ' take hold of your fathers? So they repented and said, As the Lord of hosts planned '
  - type: text
    content: and
  - type: text
    content: ' purposed to do to us, according to our ways and according to our doings, so has He dealt with us.'
  '7':
  - type: text
    content: ' Upon the twenty-fourth day of the eleventh month, which is the month of Shebat, in the second year of the reign of Darius, the word of the Lord came to Zechariah son of Berechiah, the son of Iddo, the prophet. Zechariah said,'
  '8':
  - type: text
    content: ' I saw in the night [vision] and behold, a Man riding upon a red horse, and He stood among the myrtle trees that were in a low valley '
  - type: text
    content: or
  - type: text
    content: ' bottom, and behind Him there were horses, red, bay '
  - type: text
    content: or
  - type: text
    content: ' flame-colored, and white.'
  '9':
  - type: text
    content: ' Then said I, O my lord, what are these? And the angel who talked with me said, I will show you what these are.'
