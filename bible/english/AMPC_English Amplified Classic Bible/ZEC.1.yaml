document_id: ZEC.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE eighth month, in the second year [of the reign] of Darius, came the word of the Lord to Zechariah son of Berechiah, the son of Iddo, the prophet, saying, [Ezra 5:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord was very angry with your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore say to them [the Jews of this day], Thus says the Lord of hosts: Return to Me, says the Lord of hosts, and I will return to you; it is the utterance of the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Be not as your fathers to whom the former prophets cried, Thus says the Lord of hosts: Return now from your evil ways and your evil doings; but they would not hear or listen to Me, says the Lord. [II Kings 17:13; Isa. 45:22; Jer. 18:11; Ezek. 33:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Your fathers, where are they? And the prophets, do they live forever?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But My words and My statutes, which I commanded My servants the prophets, did they not overtake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take hold of your fathers? So they repented and said, As the Lord of hosts planned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposed to do to us, according to our ways and according to our doings, so has He dealt with us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Upon the twenty-fourth day of the eleventh month, which is the month of Shebat, in the second year of the reign of Darius, the word of the Lord came to Zechariah son of Berechiah, the son of Iddo, the prophet. Zechariah said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I saw in the night [vision] and behold, a Man riding upon a red horse, and He stood among the myrtle trees that were in a low valley '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bottom, and behind Him there were horses, red, bay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' flame-colored, and white.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then said I, O my lord, what are these? And the angel who talked with me said, I will show you what these are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Man who stood among the myrtle trees answered and said, These are they whom the Lord has sent to walk to and fro through the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patrol it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the men on the horses answered the Angel of the Lord Who stood among the myrtle trees and said, We have walked to and fro through the earth [patrolling it] and behold, all the earth sits at rest [in peaceful security].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the Angel of the Lord said, O Lord of hosts, how long will You not have mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness for Jerusalem and the cities of Judah, against which You have had indignation these seventy years [of the Babylonian captivity]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Lord answered the angel who talked with me with gracious and comforting words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So the angel who talked with me said to me, Cry out, Thus says the Lord of hosts: I am jealous for Jerusalem and for Zion with a great jealousy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And I am very angry with the nations that are at ease; for while I was but a little displeased, they helped forward the affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disaster.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Therefore thus says the Lord: I have returned to Jerusalem with compassion (lovingkindness and mercy). My house shall be built in it, says the Lord of hosts, and a measuring line shall be stretched out over Jerusalem [with a view to rebuilding its walls].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Cry yet again, saying, Thus says the Lord of hosts: My cities shall yet again overflow with prosperity, and the Lord shall yet comfort Zion and shall yet choose Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then I lifted up my eyes and saw, and behold, four horns [symbols of strength].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I said to the angel who talked with me, What are these? And he answered me, These are the horns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' powers which have scattered Judah, Israel, and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then the Lord showed me four smiths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' workmen [one for each enemy horn, to beat it down].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then said I, What are these [horns and smiths] coming to do? And he said, These are the horns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' powers that scattered Judah so that no man lifted up his head. But these smiths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' workmen have come to terrorize them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause them to be panic-stricken, to cast out the horns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' powers of the nations who lifted up their horn against the land of Judah to scatter it.'
