document_id: EZR.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW WHILE Ezra prayed and made confession, weeping and casting himself down before the house of God, there gathered to him out of Israel a very great assembly of men, women, and children; for the people wept bitterly.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Ezra the priest stood up and said to them, You have acted wickedly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken faith [with God] and have married foreign (heathen) women, increasing the guilt of Israel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' So now make confession '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to the Lord, the God of your fathers [for not consuming you], and do His will. Separate yourselves from the peoples of the land and from [your] foreign (heathen) wives.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then all the assembly answered with a loud voice, As you have said, so must we do.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But the people are many and it is a time of heavy rain; we cannot stand outside. Nor can this work be done in a day or two, for we have greatly transgressed in this matter.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Let our officials stand for the whole assembly; let all in our cities who have foreign wives come by appointment, and with each group the elders of that city and its judges, until the fierce wrath of our God over this matter is turned away from us.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Only Jonathan son of Asahel and Jahzeiah son of Tikvah opposed this, and Meshullam and Shabbethai the Levite supported them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Then the returned exiles did so. Ezra the priest and certain heads of fathers'' houses were selected, according to their fathers'' houses, each of them by name; and they sat down on the first day of the tenth month to investigate the matter.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And by the first day of the first month they had come to the end of the cases of the men married to foreign wives.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Of the sons of the priests who had married non-Jewish women were found: of the sons of Jeshua [the high priest] son of Jozadak, and his brethren: Maaseiah, Eliezer, Jarib, and Gedaliah.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' They solemnly vowed to put away their [heathen] wives, and, being guilty, [each] offered a ram of the flock for [his] guilt.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Shecaniah [II] son of Jehiel [one of the congregation], of the sons of Elam, said to Ezra: We have broken faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dealt treacherously against our God and have married foreign women of the peoples of the land; yet now there is still hope for Israel in spite of this thing.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Of the sons of Immer: Hanani and Zebadiah.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Of the sons of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Of the sons of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Of the Levites: Jozabad, Shimei, Kelaiah (Kelita), Pethahiah, Judah, and Eliezer.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Of the singers: Eliashib. Of the gatekeepers: Shallum, Telem, and Uri.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And of Israel: of the sons of Parosh: Ramiah, Izziah, Malchijah, Mijamin, Eleazar, Malchijah (Hashabiah), and Benaiah.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Of the sons of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth, and Elijah.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Of the sons of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad, and Aziza.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Of the sons also of Bebai: Jehohanan, Hananiah, Zabbai, and Athlai.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Of the sons of Bani: Meshullam, Malluch, Adaiah, Jashub, Sheal, and Jeremoth.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Therefore let us make a covenant with our God to put away all the foreign wives and their children, according to the counsel of my lord and of those who tremble at the command of our God; and let it be done according to the Law.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Of the sons of Pahath-moab: Adna, Chelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui, and Manasseh.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Of the sons of Harim: Eliezer, Isshijah, Malchijah, Shemaiah, Shimeon,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Benjamin, Malluch, and Shemariah.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Of the sons of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh, and Shimei.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Of the sons of Bani: Maadai, Amram, Uel,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Benaiah, Bedeiah, Cheluhi (Cheluhu),'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Vaniah, Meremoth, Eliashib,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Mattaniah, Mattenai, Jaasu [Jaasai],'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Bani, Binnui, Shimei,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Shelemiah, Nathan, Adaiah,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Arise, for it is your duty, and we are with you. Be strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brave and do it.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Machnadebai, Shashai, Sharai,'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Azarel, Shelemiah, Shemariah,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' Shallum, Amariah, and Joseph.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Of the sons of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Iddo (Jaddai), Joel, and Benaiah.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' All these had married foreign women, and some of the wives had borne children.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then Ezra arose and made the chiefs of the priests, the Levites, and all Israel swear that they would do as had been said. So they took the oath.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then Ezra came from before the house of God and went into the lodging place of Jehohanan son of Eliashib [for the night]. There he ate no bread and drank no water, for he mourned over the returned exiles'' faithlessness [and violation of God''s law].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And proclamation was made throughout Judah and Jerusalem to all the returned exiles, that they should assemble in Jerusalem,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And that whoever did not come within three days, by order of the officials and the elders, all his property should be forfeited and he himself banned from the assembly of the exiles.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then all the men of Judah and Benjamin gathered at Jerusalem within three days. It was the twentieth day of the ninth month, and all the people sat in the open space before the house of God, trembling because of this matter and because of the heavy rain.'
