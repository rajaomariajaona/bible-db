document_id: EPH.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' CHILDREN, OBEY your parents in the Lord [as His representatives], for this is just and right.'
  '10':
  - type: text
    content: ' In conclusion, be strong in the Lord [be empowered through your union with Him]; draw your strength from Him [that strength which His boundless might provides].'
  '11':
  - type: text
    content: ' Put on God''s whole armor [the armor of a heavy-armed soldier which God supplies], that you may be able successfully to stand up against [all] the strategies '
  - type: text
    content: and
  - type: text
    content: ' the deceits of the devil.'
  '12':
  - type: text
    content: ' For we are not wrestling with flesh and blood [contending only with physical opponents], but against the despotisms, against the powers, against [the master spirits who are] the world rulers of this present darkness, against the spirit forces of wickedness in the heavenly (supernatural) sphere.'
  '13':
  - type: text
    content: ' Therefore put on God''s complete armor, that you may be able to resist '
  - type: text
    content: and
  - type: text
    content: ' stand your ground on the evil day [of danger], and, having done all [the crisis demands], to stand [firmly in your place].'
  '14':
  - type: text
    content: ' Stand therefore [hold your ground], having tightened the belt of truth around your loins and having put on the breastplate of integrity '
  - type: text
    content: and
  - type: text
    content: ' of moral rectitude '
  - type: text
    content: and
  - type: text
    content: ' right standing with God,'
  '15':
  - type: text
    content: ' And having shod your feet in preparation [to face the enemy with the firm-footed stability, the promptness, and the readiness produced by the good news] of the Gospel of peace. [Isa. 52:7.]'
  '16':
  - type: text
    content: ' Lift up over all the [covering] shield of saving faith, upon which you can quench all the flaming missiles of the wicked [one].'
  '17':
  - type: text
    content: ' And take the helmet of salvation and the sword that the Spirit wields, which is the Word of God.'
  '18':
  - type: text
    content: ' Pray at all times (on every occasion, in every season) in the Spirit, with all [manner of] prayer and entreaty. To that end keep alert and watch with strong purpose '
  - type: text
    content: and
  - type: text
    content: ' perseverance, interceding in behalf of all the saints (God''s consecrated people).'
  '19':
  - type: text
    content: ' And [pray] also for me, that [freedom of] utterance may be given me, that I may open my mouth to proclaim boldly the mystery of the good news (the Gospel),'
  '2':
  - type: text
    content: ' Honor (esteem and value as precious) your father and your mother–this is the first commandment with a promise–[Exod. 20:12.]'
  '20':
  - type: text
    content: ' For which I am an ambassador in a coupling chain [in prison. Pray] that I may declare it boldly '
  - type: text
    content: and
  - type: text
    content: ' courageously, as I ought to do.'
  '21':
  - type: text
    content: ' Now that you may know how I am and what I am doing, Tychicus, the beloved brother and faithful minister in the Lord [and His service], will tell you everything.'
  '22':
  - type: text
    content: ' I have sent him to you for this very purpose, that you may know how we are and that he may console '
  - type: text
    content: and
  - type: text
    content: ' cheer '
  - type: text
    content: and
  - type: text
    content: ' encourage '
  - type: text
    content: and
  - type: text
    content: ' strengthen your hearts.'
  '23':
  - type: text
    content: ' Peace be to the brethren, and love joined with faith, from God the Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
  '24':
  - type: text
    content: ' Grace (God''s undeserved favor) be with all who love our Lord Jesus Christ with undying '
  - type: text
    content: and
  - type: text
    content: ' incorruptible [love]. '
  - type: text
    content: Amen (so let it be).
  '3':
  - type: text
    content: ' That all may be well with you and that you may live long on the earth.'
  '4':
  - type: text
    content: ' Fathers, do not irritate '
  - type: text
    content: and
  - type: text
    content: ' provoke your children to anger [do not exasperate them to resentment], but rear them [tenderly] in the training '
  - type: text
    content: and
  - type: text
    content: ' discipline and the counsel '
  - type: text
    content: and
  - type: text
    content: ' admonition of the Lord.'
  '5':
  - type: text
    content: ' Servants (slaves), be obedient to those who are your physical masters, having respect for them and eager concern to please them, in singleness of motive '
  - type: text
    content: and
  - type: text
    content: ' with all your heart, as [service] to Christ [Himself]–'
  '6':
  - type: text
    content: ' Not in the way of eye-service [as if they were watching you] and only to please men, but as servants (slaves) of Christ, doing the will of God heartily '
  - type: text
    content: and
  - type: text
    content: ' with your whole soul;'
  '7':
  - type: text
    content: ' Rendering service readily with goodwill, as to the Lord and not to men,'
  '8':
  - type: text
    content: ' Knowing that for whatever good anyone does, he will receive his reward from the Lord, whether he is slave or free.'
  '9':
  - type: text
    content: ' You masters, act on the same [principle] toward them and give up threatening '
  - type: text
    content: and
  - type: text
    content: ' using violent '
  - type: text
    content: and
  - type: text
    content: ' abusive words, knowing that He Who is both their Master and yours is in heaven, and that there is no respect of persons (no partiality) with Him.'
