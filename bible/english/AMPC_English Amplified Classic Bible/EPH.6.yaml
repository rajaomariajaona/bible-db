document_id: EPH.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' CHILDREN, OBEY your parents in the Lord [as His representatives], for this is just and right.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Honor (esteem and value as precious) your father and your mother–this is the first commandment with a promise–[Exod. 20:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' That all may be well with you and that you may live long on the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Fathers, do not irritate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoke your children to anger [do not exasperate them to resentment], but rear them [tenderly] in the training '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline and the counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admonition of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Servants (slaves), be obedient to those who are your physical masters, having respect for them and eager concern to please them, in singleness of motive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with all your heart, as [service] to Christ [Himself]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Not in the way of eye-service [as if they were watching you] and only to please men, but as servants (slaves) of Christ, doing the will of God heartily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with your whole soul;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Rendering service readily with goodwill, as to the Lord and not to men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Knowing that for whatever good anyone does, he will receive his reward from the Lord, whether he is slave or free.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You masters, act on the same [principle] toward them and give up threatening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' using violent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abusive words, knowing that He Who is both their Master and yours is in heaven, and that there is no respect of persons (no partiality) with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In conclusion, be strong in the Lord [be empowered through your union with Him]; draw your strength from Him [that strength which His boundless might provides].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Put on God''s whole armor [the armor of a heavy-armed soldier which God supplies], that you may be able successfully to stand up against [all] the strategies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the deceits of the devil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For we are not wrestling with flesh and blood [contending only with physical opponents], but against the despotisms, against the powers, against [the master spirits who are] the world rulers of this present darkness, against the spirit forces of wickedness in the heavenly (supernatural) sphere.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Therefore put on God''s complete armor, that you may be able to resist '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand your ground on the evil day [of danger], and, having done all [the crisis demands], to stand [firmly in your place].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Stand therefore [hold your ground], having tightened the belt of truth around your loins and having put on the breastplate of integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of moral rectitude '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right standing with God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And having shod your feet in preparation [to face the enemy with the firm-footed stability, the promptness, and the readiness produced by the good news] of the Gospel of peace. [Isa. 52:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Lift up over all the [covering] shield of saving faith, upon which you can quench all the flaming missiles of the wicked [one].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And take the helmet of salvation and the sword that the Spirit wields, which is the Word of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Pray at all times (on every occasion, in every season) in the Spirit, with all [manner of] prayer and entreaty. To that end keep alert and watch with strong purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perseverance, interceding in behalf of all the saints (God''s consecrated people).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And [pray] also for me, that [freedom of] utterance may be given me, that I may open my mouth to proclaim boldly the mystery of the good news (the Gospel),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For which I am an ambassador in a coupling chain [in prison. Pray] that I may declare it boldly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courageously, as I ought to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now that you may know how I am and what I am doing, Tychicus, the beloved brother and faithful minister in the Lord [and His service], will tell you everything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I have sent him to you for this very purpose, that you may know how we are and that he may console '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen your hearts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Peace be to the brethren, and love joined with faith, from God the Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Grace (God''s undeserved favor) be with all who love our Lord Jesus Christ with undying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incorruptible [love]. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so let it be).
