document_id: JHN.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT JESUS went to the Mount of Olives.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When Jesus raised Himself up, He said to her, Woman, where are your accusers? Has no man condemned you?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' She answered, No one, Lord! And Jesus said, I do not condemn you either. Go on your way and from now on sin no more.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Once more Jesus addressed the crowd. He said, I am the Light of the world. He who follows Me will not be walking in the dark, but will have the Light which is Life.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Whereupon the Pharisees told Him, You are testifying on Your own behalf; Your testimony is not valid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is worthless.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Jesus answered, Even if I do testify on My own behalf, My testimony is true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' valid, for I know where I came from and where I am going; but you do not know where I come from or where I am going.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' You [set yourselves up to] judge according to the flesh (by what you see). [You condemn by external, human standards.] I do not [set Myself up to] judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' condemn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sentence anyone.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Yet even if I do judge, My judgment is true [My decision is right]; for I am not alone [in making it], but [there are two of Us] I and the Father, Who sent Me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' In your [own] Law it is written that the testimony (evidence) of two persons is reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' valid. [Deut. 19:15.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I am One [of the Two] bearing testimony concerning Myself; and My Father, Who sent Me, He also testifies about Me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then they said to Him, Where is this Father of Yours? Jesus answered, You know My Father as little as you know Me. If you knew Me, you would know My Father also.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Early in the morning (at dawn), He came back into the temple [court], and the people came to Him in crowds. He sat down and was teaching them,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Jesus said these things in the treasury while He was teaching in the temple [court]; but no one ventured to arrest Him, because His hour had not yet come.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Therefore He said again to them, I am going away, and you will be looking for Me, and you will die in (under the curse of) your sin. Where I am going, it is not possible for you to come.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' At this the Jews began to ask among themselves, Will He kill Himself? Is that why He says, Where I am going, it is not possible for you to come?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' He said to them, You are from below; I am from above. You are of this world (of this earthly order); I am not of this world.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' That is why I told you that you will die in (under the curse of) your sins; for if you do not believe that I am He [Whom I claim to be–if you do not adhere to, trust in, and rely on Me], you will die in your sins.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then they said to Him, Who are You anyway? Jesus replied, [Why do I even speak to you!] I am exactly what I have been telling you from the first.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' I have much to say about you and to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemn. But He Who sent Me is true (reliable), and I tell the world [only] the things that I have heard from Him.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' They did not perceive (know, understand) that He was speaking to them about the Father.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So Jesus added, When you have lifted up the Son of Man [on the cross], you will realize (know, understand) that I am He [for Whom you look] and that I do nothing of Myself (of My own accord or on My own authority), but I say [exactly] what My Father has taught Me.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And He Who sent Me is ever with Me; My Father has not left Me alone, for I always do what pleases Him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' When the scribes and Pharisees brought a woman who had been caught in adultery. They made her stand in the middle of the court and put the case before Him.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' As He said these things, many believed in Him [trusted, relied on, and adhered to Him].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' So Jesus said to those Jews who had believed in Him, If you abide in My word [hold fast to My teachings and live in accordance with them], you are truly My disciples.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And you will know the Truth, and the Truth will set you free.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' They answered Him, We are Abraham''s offspring (descendants) and have never been in bondage to anybody. What do You mean by saying, You will be set free?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Jesus answered them, I assure you, most solemnly I tell you, Whoever commits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practices sin is the slave of sin.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Now a slave does not remain in a household permanently (forever); the son [of the house] does remain forever.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' So if the Son liberates you [makes you free men], then you are really '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unquestionably free.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' [Yes] I know that you are Abraham''s offspring; yet you plan to kill Me, because My word has no entrance (makes no progress, does not find any place) in you.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' I tell the things which I have seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learned at My Father''s side, and your actions also reflect what you have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learned from your father.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' They retorted, Abraham is our father. Jesus said, If you were [truly] Abraham''s children, then you would do the works of Abraham [follow his example, do as Abraham did].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Teacher, they said, This woman has been caught in the very act of adultery.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But now [instead] you are wanting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seeking to kill Me, a Man Who has told you the truth which I have heard from God. This is not the way Abraham acted.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' You are doing the works of your [own] father. They said to Him, We are not illegitimate children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' born out of fornication; we have one Father, even God.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' Jesus said to them, If God were your Father, you would love Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respect Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome Me gladly, for I proceeded (came forth) from God [out of His very presence]. I did not even come on My own authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of My own accord (as self-appointed); but He sent Me.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Why do you misunderstand what I say? It is because you are unable to hear what I am saying. [You cannot bear to listen to My message; your ears are shut to My teaching.]'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' You are of your father, the devil, and it is your will to practice the lusts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gratify the desires [which are characteristic] of your father. He was a murderer from the beginning and does not stand in the truth, because there is no truth in him. When he speaks a falsehood, he speaks what is natural to him, for he is a liar [himself] and the father of lies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of all that is false.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' But because I speak the truth, you do not believe Me [do not trust Me, do not rely on Me, or adhere to Me].'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' Who of you convicts Me of wrongdoing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' finds Me guilty of sin? Then if I speak truth, why do you not believe Me [trust Me, rely on, and adhere to Me]?'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' Whoever is of God listens to God. [Those who belong to God hear the words of God.] This is the reason that you do not listen [to those words, to Me]: because you do not belong to God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are not of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' in harmony with Him.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' The Jews answered Him, Are we not right when we say You are a Samaritan and that You have a demon [that You are under the power of an evil spirit]?'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' Jesus answered, I am not possessed by a demon. On the contrary, I honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverence My Father and you dishonor (despise, vilify, and scorn) Me.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now Moses in the Law commanded us that such [women–offenders] shall be stoned to death. But what do You say [to do with her–what is Your sentence]? [Deut. 22:22-24.]'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' However, I am not in search of honor for Myself. [I do not seek and am not aiming for My own glory.] There is One Who [looks after that; He] seeks [My glory], and He is the Judge.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' I assure you, most solemnly I tell you, if anyone observes My teaching [lives in accordance with My message, keeps My word], he will by no means ever see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experience death.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' The Jews said to Him, Now we know that You are under the power of a demon (insane). Abraham died, and also the prophets, yet You say, If a man keeps My word, he will never taste of death into all eternity.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' Are You greater than our father Abraham? He died, and all the prophets died! Who do You make Yourself out to be?'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' Jesus answered, If I were to glorify Myself (magnify, praise, and honor Myself), I would have no real glory, for My glory would be nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless. [My honor must come to Me from My Father.] It is My Father Who glorifies Me [Who extols Me, magnifies, and praises Me], of Whom you say that He is your God.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' Yet you do not know Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' recognize Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are not acquainted with Him, but I know Him. If I should say that I do not know Him, I would be a liar like you. But I know Him and keep His word [obey His teachings, am faithful to His message].'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' Your forefather Abraham was extremely happy at the hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prospect of seeing My day (My incarnation); and he did see it and was delighted. [Heb. 11:13.]'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' Then the Jews said to Him, You are not yet fifty years old, and have You seen Abraham?'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' Jesus replied, I assure you, most solemnly I tell you, before Abraham was born, I AM. [Exod. 3:14.]'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' So they took up stones to throw at Him, but Jesus, by mixing with the crowd, concealed Himself and went out of the temple [enclosure].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' This they said to try (test) Him, hoping they might find a charge on which to accuse Him. But Jesus stooped down and wrote on the ground with His finger.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' However, when they persisted with their question, He raised Himself up and said, Let him who is without sin among you be the first to throw a stone at her.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then He bent down and went on writing on the ground with His finger.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' They listened to Him, and then they began going out, conscience-stricken, one by one, from the oldest down to the last one of them, till Jesus was left alone, with the woman standing there before Him in the center of the court.'
