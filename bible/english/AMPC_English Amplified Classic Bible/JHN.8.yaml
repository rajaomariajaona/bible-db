document_id: JHN.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT JESUS went to the Mount of Olives.'
  '10':
  - type: text
    content: ' When Jesus raised Himself up, He said to her, Woman, where are your accusers? Has no man condemned you?'
  '11':
  - type: text
    content: ' She answered, No one, Lord! And Jesus said, I do not condemn you either. Go on your way and from now on sin no more.'
  '12':
  - type: text
    content: ' Once more Jesus addressed the crowd. He said, I am the Light of the world. He who follows Me will not be walking in the dark, but will have the Light which is Life.'
  '13':
  - type: text
    content: ' Whereupon the Pharisees told Him, You are testifying on Your own behalf; Your testimony is not valid '
  - type: text
    content: and
  - type: text
    content: ' is worthless.'
  '14':
  - type: text
    content: ' Jesus answered, Even if I do testify on My own behalf, My testimony is true '
  - type: text
    content: and
  - type: text
    content: ' reliable '
  - type: text
    content: and
  - type: text
    content: ' valid, for I know where I came from and where I am going; but you do not know where I come from or where I am going.'
  '15':
  - type: text
    content: ' You [set yourselves up to] judge according to the flesh (by what you see). [You condemn by external, human standards.] I do not [set Myself up to] judge '
  - type: text
    content: or
  - type: text
    content: ' condemn '
  - type: text
    content: or
  - type: text
    content: ' sentence anyone.'
  '16':
  - type: text
    content: ' Yet even if I do judge, My judgment is true [My decision is right]; for I am not alone [in making it], but [there are two of Us] I and the Father, Who sent Me.'
  '17':
  - type: text
    content: ' In your [own] Law it is written that the testimony (evidence) of two persons is reliable '
  - type: text
    content: and
  - type: text
    content: ' valid. [Deut. 19:15.]'
  '18':
  - type: text
    content: ' I am One [of the Two] bearing testimony concerning Myself; and My Father, Who sent Me, He also testifies about Me.'
  '19':
  - type: text
    content: ' Then they said to Him, Where is this Father of Yours? Jesus answered, You know My Father as little as you know Me. If you knew Me, you would know My Father also.'
  '2':
  - type: text
    content: ' Early in the morning (at dawn), He came back into the temple [court], and the people came to Him in crowds. He sat down and was teaching them,'
  '20':
  - type: text
    content: ' Jesus said these things in the treasury while He was teaching in the temple [court]; but no one ventured to arrest Him, because His hour had not yet come.'
  '21':
  - type: text
    content: ' Therefore He said again to them, I am going away, and you will be looking for Me, and you will die in (under the curse of) your sin. Where I am going, it is not possible for you to come.'
  '22':
  - type: text
    content: ' At this the Jews began to ask among themselves, Will He kill Himself? Is that why He says, Where I am going, it is not possible for you to come?'
  '23':
  - type: text
    content: ' He said to them, You are from below; I am from above. You are of this world (of this earthly order); I am not of this world.'
  '24':
  - type: text
    content: ' That is why I told you that you will die in (under the curse of) your sins; for if you do not believe that I am He [Whom I claim to be–if you do not adhere to, trust in, and rely on Me], you will die in your sins.'
  '25':
  - type: text
    content: ' Then they said to Him, Who are You anyway? Jesus replied, [Why do I even speak to you!] I am exactly what I have been telling you from the first.'
  '26':
  - type: text
    content: ' I have much to say about you and to judge '
  - type: text
    content: and
  - type: text
    content: ' condemn. But He Who sent Me is true (reliable), and I tell the world [only] the things that I have heard from Him.'
  '27':
  - type: text
    content: ' They did not perceive (know, understand) that He was speaking to them about the Father.'
  '28':
  - type: text
    content: ' So Jesus added, When you have lifted up the Son of Man [on the cross], you will realize (know, understand) that I am He [for Whom you look] and that I do nothing of Myself (of My own accord or on My own authority), but I say [exactly] what My Father has taught Me.'
  '29':
  - type: text
    content: ' And He Who sent Me is ever with Me; My Father has not left Me alone, for I always do what pleases Him.'
  '3':
  - type: text
    content: ' When the scribes and Pharisees brought a woman who had been caught in adultery. They made her stand in the middle of the court and put the case before Him.'
  '30':
  - type: text
    content: ' As He said these things, many believed in Him [trusted, relied on, and adhered to Him].'
  '31':
  - type: text
    content: ' So Jesus said to those Jews who had believed in Him, If you abide in My word [hold fast to My teachings and live in accordance with them], you are truly My disciples.'
  '32':
  - type: text
    content: ' And you will know the Truth, and the Truth will set you free.'
  '33':
  - type: text
    content: ' They answered Him, We are Abraham''s offspring (descendants) and have never been in bondage to anybody. What do You mean by saying, You will be set free?'
  '34':
  - type: text
    content: ' Jesus answered them, I assure you, most solemnly I tell you, Whoever commits '
  - type: text
    content: and
  - type: text
    content: ' practices sin is the slave of sin.'
  '35':
  - type: text
    content: ' Now a slave does not remain in a household permanently (forever); the son [of the house] does remain forever.'
  '36':
  - type: text
    content: ' So if the Son liberates you [makes you free men], then you are really '
  - type: text
    content: and
  - type: text
    content: ' unquestionably free.'
  '37':
  - type: text
    content: ' [Yes] I know that you are Abraham''s offspring; yet you plan to kill Me, because My word has no entrance (makes no progress, does not find any place) in you.'
  '38':
  - type: text
    content: ' I tell the things which I have seen '
  - type: text
    content: and
  - type: text
    content: ' learned at My Father''s side, and your actions also reflect what you have heard '
  - type: text
    content: and
  - type: text
    content: ' learned from your father.'
  '39':
  - type: text
    content: ' They retorted, Abraham is our father. Jesus said, If you were [truly] Abraham''s children, then you would do the works of Abraham [follow his example, do as Abraham did].'
  '4':
  - type: text
    content: ' Teacher, they said, This woman has been caught in the very act of adultery.'
  '40':
  - type: text
    content: ' But now [instead] you are wanting '
  - type: text
    content: and
  - type: text
    content: ' seeking to kill Me, a Man Who has told you the truth which I have heard from God. This is not the way Abraham acted.'
  '41':
  - type: text
    content: ' You are doing the works of your [own] father. They said to Him, We are not illegitimate children '
  - type: text
    content: and
  - type: text
    content: ' born out of fornication; we have one Father, even God.'
  '42':
  - type: text
    content: ' Jesus said to them, If God were your Father, you would love Me '
  - type: text
    content: and
  - type: text
    content: ' respect Me '
  - type: text
    content: and
  - type: text
    content: ' welcome Me gladly, for I proceeded (came forth) from God [out of His very presence]. I did not even come on My own authority '
  - type: text
    content: or
  - type: text
    content: ' of My own accord (as self-appointed); but He sent Me.'
  '43':
  - type: text
    content: ' Why do you misunderstand what I say? It is because you are unable to hear what I am saying. [You cannot bear to listen to My message; your ears are shut to My teaching.]'
  '44':
  - type: text
    content: ' You are of your father, the devil, and it is your will to practice the lusts '
  - type: text
    content: and
  - type: text
    content: ' gratify the desires [which are characteristic] of your father. He was a murderer from the beginning and does not stand in the truth, because there is no truth in him. When he speaks a falsehood, he speaks what is natural to him, for he is a liar [himself] and the father of lies '
  - type: text
    content: and
  - type: text
    content: ' of all that is false.'
  '45':
  - type: text
    content: ' But because I speak the truth, you do not believe Me [do not trust Me, do not rely on Me, or adhere to Me].'
  '46':
  - type: text
    content: ' Who of you convicts Me of wrongdoing '
  - type: text
    content: or
  - type: text
    content: ' finds Me guilty of sin? Then if I speak truth, why do you not believe Me [trust Me, rely on, and adhere to Me]?'
  '47':
  - type: text
    content: ' Whoever is of God listens to God. [Those who belong to God hear the words of God.] This is the reason that you do not listen [to those words, to Me]: because you do not belong to God '
  - type: text
    content: and
  - type: text
    content: ' are not of God '
  - type: text
    content: or
  - type: text
    content: ' in harmony with Him.'
  '48':
  - type: text
    content: ' The Jews answered Him, Are we not right when we say You are a Samaritan and that You have a demon [that You are under the power of an evil spirit]?'
  '49':
  - type: text
    content: ' Jesus answered, I am not possessed by a demon. On the contrary, I honor '
  - type: text
    content: and
  - type: text
    content: ' reverence My Father and you dishonor (despise, vilify, and scorn) Me.'
  '5':
  - type: text
    content: ' Now Moses in the Law commanded us that such [women–offenders] shall be stoned to death. But what do You say [to do with her–what is Your sentence]? [Deut. 22:22-24.]'
  '50':
  - type: text
    content: ' However, I am not in search of honor for Myself. [I do not seek and am not aiming for My own glory.] There is One Who [looks after that; He] seeks [My glory], and He is the Judge.'
  '51':
  - type: text
    content: ' I assure you, most solemnly I tell you, if anyone observes My teaching [lives in accordance with My message, keeps My word], he will by no means ever see '
  - type: text
    content: and
  - type: text
    content: ' experience death.'
  '52':
  - type: text
    content: ' The Jews said to Him, Now we know that You are under the power of a demon (insane). Abraham died, and also the prophets, yet You say, If a man keeps My word, he will never taste of death into all eternity.'
  '53':
  - type: text
    content: ' Are You greater than our father Abraham? He died, and all the prophets died! Who do You make Yourself out to be?'
  '54':
  - type: text
    content: ' Jesus answered, If I were to glorify Myself (magnify, praise, and honor Myself), I would have no real glory, for My glory would be nothing '
  - type: text
    content: and
  - type: text
    content: ' worthless. [My honor must come to Me from My Father.] It is My Father Who glorifies Me [Who extols Me, magnifies, and praises Me], of Whom you say that He is your God.'
  '55':
  - type: text
    content: ' Yet you do not know Him '
  - type: text
    content: or
  - type: text
    content: ' recognize Him '
  - type: text
    content: and
  - type: text
    content: ' are not acquainted with Him, but I know Him. If I should say that I do not know Him, I would be a liar like you. But I know Him and keep His word [obey His teachings, am faithful to His message].'
  '56':
  - type: text
    content: ' Your forefather Abraham was extremely happy at the hope '
  - type: text
    content: and
  - type: text
    content: ' prospect of seeing My day (My incarnation); and he did see it and was delighted. [Heb. 11:13.]'
  '57':
  - type: text
    content: ' Then the Jews said to Him, You are not yet fifty years old, and have You seen Abraham?'
  '58':
  - type: text
    content: ' Jesus replied, I assure you, most solemnly I tell you, before Abraham was born, I AM. [Exod. 3:14.]'
  '59':
  - type: text
    content: ' So they took up stones to throw at Him, but Jesus, by mixing with the crowd, concealed Himself and went out of the temple [enclosure].'
  '6':
  - type: text
    content: ' This they said to try (test) Him, hoping they might find a charge on which to accuse Him. But Jesus stooped down and wrote on the ground with His finger.'
  '7':
  - type: text
    content: ' However, when they persisted with their question, He raised Himself up and said, Let him who is without sin among you be the first to throw a stone at her.'
  '8':
  - type: text
    content: ' Then He bent down and went on writing on the ground with His finger.'
  '9':
  - type: text
    content: ' They listened to Him, and then they began going out, conscience-stricken, one by one, from the oldest down to the last one of them, till Jesus was left alone, with the woman standing there before Him in the center of the court.'
