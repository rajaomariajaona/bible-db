document_id: PSA.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HEAR THE right (my righteous cause), O Lord; listen to my shrill, piercing cry! Give ear to my prayer, that comes from unfeigned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guileless lips.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' They are enclosed in their own prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have shut up their hearts to pity; with their mouths they make exorbitant claims '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proudly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogantly speak.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' They track us down in each step we take; now they surround us; they set their eyes to cast us to the ground,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Like a lion greedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eager to tear his prey, and as a young lion lurking in hidden places.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Arise, O Lord! Confront '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forestall them, cast them down! Deliver my life from the wicked by Your sword,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' From men by Your hand, O Lord, from men of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' world [these poor moths of the night] whose portion in life is idle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vain. Their bellies are filled with Your hidden treasure [what You have stored up]; their children are satiated, and they leave the rest [of their] wealth to their babes.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' As for me, I will continue beholding Your face in righteousness (rightness, justice, and right standing with You); I shall be fully satisfied, when I awake [to find myself] beholding Your form [and having sweet communion with You].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Let my sentence of vindication come from You! May Your eyes behold the things that are just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You have proved my heart; You have visited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' in the night; You have tried me and find nothing [no evil purpose in me]; I have purposed that my mouth shall not transgress.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Concerning the works of men, by the word of Your lips I have avoided the ways of the violent (the paths of the destroyer).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' My steps have held closely to Your paths [to the tracks of the One Who has gone on before]; my feet have not slipped.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I have called upon You, O God, for You will hear me; incline Your ear to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear my speech.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Show Your marvelous loving-kindness, O You Who save by Your right hand those who trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in You from those who rise up against them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guard me as the pupil of Your eye; hide me in the shadow of Your wings'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' From the wicked who despoil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppress me, my deadly adversaries who surround me.'
