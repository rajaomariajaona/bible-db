document_id: PSA.17,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer of David.
  - type: text
    content: ' HEAR THE right (my righteous cause), O Lord; listen to my shrill, piercing cry! Give ear to my prayer, that comes from unfeigned '
  - type: text
    content: and
  - type: text
    content: ' guileless lips.'
  '10':
  - type: text
    content: ' They are enclosed in their own prosperity '
  - type: text
    content: and
  - type: text
    content: ' have shut up their hearts to pity; with their mouths they make exorbitant claims '
  - type: text
    content: and
  - type: text
    content: ' proudly '
  - type: text
    content: and
  - type: text
    content: ' arrogantly speak.'
  '11':
  - type: text
    content: ' They track us down in each step we take; now they surround us; they set their eyes to cast us to the ground,'
  '12':
  - type: text
    content: ' Like a lion greedy '
  - type: text
    content: and
  - type: text
    content: ' eager to tear his prey, and as a young lion lurking in hidden places.'
  '13':
  - type: text
    content: ' Arise, O Lord! Confront '
  - type: text
    content: and
  - type: text
    content: ' forestall them, cast them down! Deliver my life from the wicked by Your sword,'
  '14':
  - type: text
    content: ' From men by Your hand, O Lord, from men of '
  - type: text
    content: this
  - type: text
    content: ' world [these poor moths of the night] whose portion in life is idle '
  - type: text
    content: and
  - type: text
    content: ' vain. Their bellies are filled with Your hidden treasure [what You have stored up]; their children are satiated, and they leave the rest [of their] wealth to their babes.'
  '15':
  - type: text
    content: ' As for me, I will continue beholding Your face in righteousness (rightness, justice, and right standing with You); I shall be fully satisfied, when I awake [to find myself] beholding Your form [and having sweet communion with You].'
  '2':
  - type: text
    content: ' Let my sentence of vindication come from You! May Your eyes behold the things that are just '
  - type: text
    content: and
  - type: text
    content: ' upright.'
  '3':
  - type: text
    content: ' You have proved my heart; You have visited '
  - type: text
    content: me
  - type: text
    content: ' in the night; You have tried me and find nothing [no evil purpose in me]; I have purposed that my mouth shall not transgress.'
  '4':
  - type: text
    content: ' Concerning the works of men, by the word of Your lips I have avoided the ways of the violent (the paths of the destroyer).'
  '5':
  - type: text
    content: ' My steps have held closely to Your paths [to the tracks of the One Who has gone on before]; my feet have not slipped.'
  '6':
  - type: text
    content: ' I have called upon You, O God, for You will hear me; incline Your ear to me '
  - type: text
    content: and
  - type: text
    content: ' hear my speech.'
  '7':
  - type: text
    content: ' Show Your marvelous loving-kindness, O You Who save by Your right hand those who trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in You from those who rise up against them.'
  '8':
  - type: text
    content: ' Keep '
  - type: text
    content: and
  - type: text
    content: ' guard me as the pupil of Your eye; hide me in the shadow of Your wings'
  '9':
  - type: text
    content: ' From the wicked who despoil '
  - type: text
    content: and
  - type: text
    content: ' oppress me, my deadly adversaries who surround me.'
