document_id: COL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, AN apostle (special messenger) of Christ Jesus (the Messiah), by the will of God, and Timothy [our] brother,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' To the saints (the consecrated people of God) and believing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful brethren in Christ who are at Colossae: Grace (spiritual favor and blessing) to you and [heart] peace from God our Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' We continually give thanks to God the Father of our Lord Jesus Christ (the Messiah), as we are praying for you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For we have heard of your faith in Christ Jesus [the leaning of your entire human personality on Him in absolute trust and confidence in His power, wisdom, and goodness] and of the love which you [have and show] for all the saints (God''s consecrated ones),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Because of the hope [of experiencing what is] laid up (reserved and waiting) for you in heaven. Of this [hope] you heard in the past in the message of the truth of the Gospel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Which has come to you. Indeed, in the whole world [that Gospel] is bearing fruit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' still is growing [by its own inherent power], even as it has done among yourselves ever since the day you first heard and came to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand the grace of God in truth. [You came to know the grace or undeserved favor of God in reality, deeply and clearly and thoroughly, becoming accurately and intimately acquainted with it.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You so learned it from Epaphras, our beloved fellow servant. He is a faithful minister of Christ in our stead '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' as our representative '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yours
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Also he has informed us of your love in the [Holy] Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For this reason we also, from the day we heard of it, have not ceased to pray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make [special] request for you, [asking] that you may be filled with the full (deep and clear) knowledge of His will in all spiritual wisdom [in comprehensive insight into the ways and purposes of God] and in understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discernment of spiritual things–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' That you may walk (live and conduct yourselves) in a manner worthy of the Lord, fully pleasing to Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desiring to please Him in all things, bearing fruit in every good work and steadily growing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' increasing in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by the knowledge of God [with fuller, deeper, and clearer insight, acquaintance, and recognition].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' [We pray] that you may be invigorated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened with all power according to the might of His glory, [to exercise] every kind of endurance and patience (perseverance and forbearance) with joy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Giving thanks to the Father, Who has qualified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made us fit to share the portion which is the inheritance of the saints (God''s holy people) in the Light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [The Father] has delivered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drawn us to Himself out of the control '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the dominion of darkness and has transferred us into the kingdom of the Son of His love,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In Whom we have our redemption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: through His blood,
  - type: text
    text: ' [which means] the forgiveness of our sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [Now] He is the exact likeness of the unseen God [the visible representation of the invisible]; He is the Firstborn of all creation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For it was in Him that all things were created, in heaven and on earth, things seen and things unseen, whether thrones, dominions, rulers, or authorities; all things were created '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exist through Him [by His service, intervention] and in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And He Himself existed before all things, and in Him all things consist (cohere, are held together). [Prov. 8:22-31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He also is the Head of [His] body, the church; seeing He is the Beginning, the Firstborn from among the dead, so that He alone in everything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in every respect might occupy the chief place [stand first and be preeminent].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For it has pleased [the Father] that all the divine fullness (the sum total of the divine perfection, powers, and attributes) should dwell in Him permanently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And God purposed that through (by the service, the intervention of) Him [the Son] all things should be completely reconciled back to Himself, whether on earth or in heaven, as through Him, [the Father] made peace by means of the blood of His cross.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And although you at one time were estranged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alienated from Him and were of hostile attitude of mind in your wicked activities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Yet now has [Christ, the Messiah] reconciled [you to God] in the body of His flesh through death, in order to present you holy and faultless and irreproachable in His [the Father''s] presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [And this He will do] provided that you continue to stay with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the faith [in Christ], well-grounded and settled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast, not shifting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' moving away from the hope [which rests on and is inspired by] the glad tidings (the Gospel), which you heard and which has been preached [as being designed for and offered without restrictions] to every person under heaven, and of which [Gospel] I, Paul, became a minister.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' [Even] now I rejoice in the midst of my sufferings on your behalf. And in my own person I am making up whatever is still lacking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remains to be completed [on our part] of Christ''s afflictions, for the sake of His body, which is the church.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' In it I became a minister in accordance with the divine stewardship which was entrusted to me for you [as its object and for your benefit], to make the Word of God fully known [among you]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The mystery of which was hidden for ages and generations [from angels and men], but is now revealed to His holy people (the saints),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' To whom God was pleased to make known how great for the Gentiles are the riches of the glory of this mystery, which is Christ within '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among you, the Hope of [realizing the] glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Him we preach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaim, warning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admonishing everyone and instructing everyone in all wisdom (comprehensive insight into the ways and purposes of God), that we may present every person mature (full-grown, fully initiated, complete, and perfect) in Christ (the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For this I labor [unto weariness], striving with all the superhuman energy which He so mightily enkindles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' works within me.'
