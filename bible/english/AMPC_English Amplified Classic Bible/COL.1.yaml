document_id: COL.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, AN apostle (special messenger) of Christ Jesus (the Messiah), by the will of God, and Timothy [our] brother,'
  '10':
  - type: text
    content: ' That you may walk (live and conduct yourselves) in a manner worthy of the Lord, fully pleasing to Him '
  - type: text
    content: and
  - type: text
    content: ' desiring to please Him in all things, bearing fruit in every good work and steadily growing '
  - type: text
    content: and
  - type: text
    content: ' increasing in '
  - type: text
    content: and
  - type: text
    content: ' by the knowledge of God [with fuller, deeper, and clearer insight, acquaintance, and recognition].'
  '11':
  - type: text
    content: ' [We pray] that you may be invigorated '
  - type: text
    content: and
  - type: text
    content: ' strengthened with all power according to the might of His glory, [to exercise] every kind of endurance and patience (perseverance and forbearance) with joy,'
  '12':
  - type: text
    content: ' Giving thanks to the Father, Who has qualified '
  - type: text
    content: and
  - type: text
    content: ' made us fit to share the portion which is the inheritance of the saints (God''s holy people) in the Light.'
  '13':
  - type: text
    content: ' [The Father] has delivered '
  - type: text
    content: and
  - type: text
    content: ' drawn us to Himself out of the control '
  - type: text
    content: and
  - type: text
    content: ' the dominion of darkness and has transferred us into the kingdom of the Son of His love,'
  '14':
  - type: text
    content: ' In Whom we have our redemption '
  - type: text
    content: through His blood,
  - type: text
    content: ' [which means] the forgiveness of our sins.'
  '15':
  - type: text
    content: ' [Now] He is the exact likeness of the unseen God [the visible representation of the invisible]; He is the Firstborn of all creation.'
  '16':
  - type: text
    content: ' For it was in Him that all things were created, in heaven and on earth, things seen and things unseen, whether thrones, dominions, rulers, or authorities; all things were created '
  - type: text
    content: and
  - type: text
    content: ' exist through Him [by His service, intervention] and in '
  - type: text
    content: and
  - type: text
    content: ' for Him.'
  '17':
  - type: text
    content: ' And He Himself existed before all things, and in Him all things consist (cohere, are held together). [Prov. 8:22-31.]'
  '18':
  - type: text
    content: ' He also is the Head of [His] body, the church; seeing He is the Beginning, the Firstborn from among the dead, so that He alone in everything '
  - type: text
    content: and
  - type: text
    content: ' in every respect might occupy the chief place [stand first and be preeminent].'
  '19':
  - type: text
    content: ' For it has pleased [the Father] that all the divine fullness (the sum total of the divine perfection, powers, and attributes) should dwell in Him permanently.'
  '2':
  - type: text
    content: ' To the saints (the consecrated people of God) and believing '
  - type: text
    content: and
  - type: text
    content: ' faithful brethren in Christ who are at Colossae: Grace (spiritual favor and blessing) to you and [heart] peace from God our Father.'
  '20':
  - type: text
    content: ' And God purposed that through (by the service, the intervention of) Him [the Son] all things should be completely reconciled back to Himself, whether on earth or in heaven, as through Him, [the Father] made peace by means of the blood of His cross.'
  '21':
  - type: text
    content: ' And although you at one time were estranged '
  - type: text
    content: and
  - type: text
    content: ' alienated from Him and were of hostile attitude of mind in your wicked activities,'
  '22':
  - type: text
    content: ' Yet now has [Christ, the Messiah] reconciled [you to God] in the body of His flesh through death, in order to present you holy and faultless and irreproachable in His [the Father''s] presence.'
  '23':
  - type: text
    content: ' [And this He will do] provided that you continue to stay with '
  - type: text
    content: and
  - type: text
    content: ' in the faith [in Christ], well-grounded and settled '
  - type: text
    content: and
  - type: text
    content: ' steadfast, not shifting '
  - type: text
    content: or
  - type: text
    content: ' moving away from the hope [which rests on and is inspired by] the glad tidings (the Gospel), which you heard and which has been preached [as being designed for and offered without restrictions] to every person under heaven, and of which [Gospel] I, Paul, became a minister.'
  '24':
  - type: text
    content: ' [Even] now I rejoice in the midst of my sufferings on your behalf. And in my own person I am making up whatever is still lacking '
  - type: text
    content: and
  - type: text
    content: ' remains to be completed [on our part] of Christ''s afflictions, for the sake of His body, which is the church.'
  '25':
  - type: text
    content: ' In it I became a minister in accordance with the divine stewardship which was entrusted to me for you [as its object and for your benefit], to make the Word of God fully known [among you]–'
  '26':
  - type: text
    content: ' The mystery of which was hidden for ages and generations [from angels and men], but is now revealed to His holy people (the saints),'
  '27':
  - type: text
    content: ' To whom God was pleased to make known how great for the Gentiles are the riches of the glory of this mystery, which is Christ within '
  - type: text
    content: and
  - type: text
    content: ' among you, the Hope of [realizing the] glory.'
  '28':
  - type: text
    content: ' Him we preach '
  - type: text
    content: and
  - type: text
    content: ' proclaim, warning '
  - type: text
    content: and
  - type: text
    content: ' admonishing everyone and instructing everyone in all wisdom (comprehensive insight into the ways and purposes of God), that we may present every person mature (full-grown, fully initiated, complete, and perfect) in Christ (the Anointed One).'
  '29':
  - type: text
    content: ' For this I labor [unto weariness], striving with all the superhuman energy which He so mightily enkindles '
  - type: text
    content: and
  - type: text
    content: ' works within me.'
  '3':
  - type: text
    content: ' We continually give thanks to God the Father of our Lord Jesus Christ (the Messiah), as we are praying for you,'
  '4':
  - type: text
    content: ' For we have heard of your faith in Christ Jesus [the leaning of your entire human personality on Him in absolute trust and confidence in His power, wisdom, and goodness] and of the love which you [have and show] for all the saints (God''s consecrated ones),'
  '5':
  - type: text
    content: ' Because of the hope [of experiencing what is] laid up (reserved and waiting) for you in heaven. Of this [hope] you heard in the past in the message of the truth of the Gospel,'
  '6':
  - type: text
    content: ' Which has come to you. Indeed, in the whole world [that Gospel] is bearing fruit '
  - type: text
    content: and
  - type: text
    content: ' still is growing [by its own inherent power], even as it has done among yourselves ever since the day you first heard and came to know '
  - type: text
    content: and
  - type: text
    content: ' understand the grace of God in truth. [You came to know the grace or undeserved favor of God in reality, deeply and clearly and thoroughly, becoming accurately and intimately acquainted with it.]'
  '7':
  - type: text
    content: ' You so learned it from Epaphras, our beloved fellow servant. He is a faithful minister of Christ in our stead '
  - type: text
    content: and
  - type: text
    content: ' as our representative '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: yours
  - type: text
    content: .
  '8':
  - type: text
    content: ' Also he has informed us of your love in the [Holy] Spirit.'
  '9':
  - type: text
    content: ' For this reason we also, from the day we heard of it, have not ceased to pray '
  - type: text
    content: and
  - type: text
    content: ' make [special] request for you, [asking] that you may be filled with the full (deep and clear) knowledge of His will in all spiritual wisdom [in comprehensive insight into the ways and purposes of God] and in understanding '
  - type: text
    content: and
  - type: text
    content: ' discernment of spiritual things–'
