document_id: 2CH.21,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JEHOSHAPHAT SLEPT with his fathers and was buried with [them] in the City of David. Jehoram his son reigned in his stead.'
  '10':
  - type: text
    content: ' So Edom revolted from the rule of Judah to this day. Then Libnah also revolted from Jehoram''s rule, because he had forsaken the Lord, the God of his fathers.'
  '11':
  - type: text
    content: ' Moreover, he made idolatrous high places in the hill country of Judah and debauched spiritually the inhabitants of Jerusalem and led Judah astray [compelling the people''s cooperation].'
  '12':
  - type: text
    content: ' And there came a letter to Jehoram from Elijah the prophet, saying, Thus says the Lord, the God of David your father [forefather]: Because you have not walked in the ways of Jehoshaphat your father nor in the ways of Asa king of Judah,'
  '13':
  - type: text
    content: ' But have walked in the ways of Israel''s kings, and made Judah and the inhabitants of Jerusalem play the harlot like the [spiritual] harlotry of Ahab''s house, and also have slain your brothers of your father''s house, who were better than you,'
  '14':
  - type: text
    content: ' Behold, the Lord will smite your people, and your children, your wives, and all your possessions with a great plague.'
  '15':
  - type: text
    content: ' And you yourself shall have a severe illness because of an intestinal disease, until your bowels fall out because of the sickness, day after day.'
  '16':
  - type: text
    content: ' And the Lord stirred up against Jehoram the anger of the Philistines and of the Arabs who were near the Ethiopians.'
  '17':
  - type: text
    content: ' They came against Judah, invaded it, and carried away all the possessions found in '
  - type: text
    content: and
  - type: text
    content: ' around the king''s house, together with his sons and his wives; so there was not a son left to him except Jehoahaz, the youngest.'
  '18':
  - type: text
    content: ' And after all this, the Lord smote [Jehoram] with an incurable intestinal disease.'
  '19':
  - type: text
    content: ' In process of time, after two years, his bowels fell out because of his disease. So he died in severe distress. And his people made no funeral fire to honor him, like the fires for his fathers.'
  '2':
  - type: text
    content: ' He had brothers: Azariah, Jehiel, Zechariah, Azariah, Michael, and Shephatiah, all the sons of Jehoshaphat king of Israel.'
  '20':
  - type: text
    content: ' Thirty-two years old was Jehoram when he began to reign, and he reigned in Jerusalem eight years, and departed without being wanted. Yet they buried him in the City of David, but not in the tombs of the kings.'
  '3':
  - type: text
    content: ' Their father gave them great gifts of silver, gold, and precious things, together with fortified cities in Judah, but the kingdom he gave to Jehoram, the firstborn.'
  '4':
  - type: text
    content: ' When Jehoram had ascended to the kingship of his father, he strengthened himself and slew all his brethren with the sword and also some of Israel''s princes.'
  '5':
  - type: text
    content: ' Jehoram at thirty-two years of age began his eight-year reign in Jerusalem.'
  '6':
  - type: text
    content: ' He walked in the ways of the kings of Israel, as did the house of Ahab, for he married the daughter of Ahab and did what was evil in the eyes of the Lord.'
  '7':
  - type: text
    content: ' But the Lord would not destroy the house of David, because He had made a covenant with David and promised to give a light to him and to his sons forever.'
  '8':
  - type: text
    content: ' In Jehoram''s days, the Edomites revolted from the rule of Judah and set up for themselves a king.'
  '9':
  - type: text
    content: ' Then Jehoram passed over [the Jordan] with his captains and all his chariots, and rose up by night and smote the Edomites who had surrounded him and his chariot captains.'
