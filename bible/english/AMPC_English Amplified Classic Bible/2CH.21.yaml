document_id: 2CH.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JEHOSHAPHAT SLEPT with his fathers and was buried with [them] in the City of David. Jehoram his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He had brothers: Azariah, Jehiel, Zechariah, Azariah, Michael, and Shephatiah, all the sons of Jehoshaphat king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Their father gave them great gifts of silver, gold, and precious things, together with fortified cities in Judah, but the kingdom he gave to Jehoram, the firstborn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When Jehoram had ascended to the kingship of his father, he strengthened himself and slew all his brethren with the sword and also some of Israel''s princes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Jehoram at thirty-two years of age began his eight-year reign in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He walked in the ways of the kings of Israel, as did the house of Ahab, for he married the daughter of Ahab and did what was evil in the eyes of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the Lord would not destroy the house of David, because He had made a covenant with David and promised to give a light to him and to his sons forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In Jehoram''s days, the Edomites revolted from the rule of Judah and set up for themselves a king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Jehoram passed over [the Jordan] with his captains and all his chariots, and rose up by night and smote the Edomites who had surrounded him and his chariot captains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So Edom revolted from the rule of Judah to this day. Then Libnah also revolted from Jehoram''s rule, because he had forsaken the Lord, the God of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Moreover, he made idolatrous high places in the hill country of Judah and debauched spiritually the inhabitants of Jerusalem and led Judah astray [compelling the people''s cooperation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And there came a letter to Jehoram from Elijah the prophet, saying, Thus says the Lord, the God of David your father [forefather]: Because you have not walked in the ways of Jehoshaphat your father nor in the ways of Asa king of Judah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But have walked in the ways of Israel''s kings, and made Judah and the inhabitants of Jerusalem play the harlot like the [spiritual] harlotry of Ahab''s house, and also have slain your brothers of your father''s house, who were better than you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Behold, the Lord will smite your people, and your children, your wives, and all your possessions with a great plague.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you yourself shall have a severe illness because of an intestinal disease, until your bowels fall out because of the sickness, day after day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord stirred up against Jehoram the anger of the Philistines and of the Arabs who were near the Ethiopians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They came against Judah, invaded it, and carried away all the possessions found in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' around the king''s house, together with his sons and his wives; so there was not a son left to him except Jehoahaz, the youngest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And after all this, the Lord smote [Jehoram] with an incurable intestinal disease.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' In process of time, after two years, his bowels fell out because of his disease. So he died in severe distress. And his people made no funeral fire to honor him, like the fires for his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Thirty-two years old was Jehoram when he began to reign, and he reigned in Jerusalem eight years, and departed without being wanted. Yet they buried him in the City of David, but not in the tombs of the kings.'
