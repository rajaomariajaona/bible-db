document_id: GEN.44,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND HE commanded the steward of his house, saying, Fill the men''s sacks with food, as much as they can carry, and put every man''s money in his sack''s mouth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the steward said, Now let it be as you say: he with whom [the cup] is found shall be my slave, but [the rest of] you shall be blameless.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then quickly every man lowered his sack to the ground and every man opened his sack.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [the steward] searched, beginning with the eldest and stopping with the youngest; and the cup was found in Benjamin''s sack.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they rent their clothes; and after each man had loaded his donkey again, they returned to the city.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Judah and his brethren came to Joseph''s house, for he was still there; and they fell prostrate before him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joseph said to them, What is this thing that you have done? Do you not realize that such a man as I can certainly detect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know by divination [everything you do without other knowledge of it]?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Judah said, What shall we say to my lord? What shall we reply? Or how shall we clear ourselves, since God has found out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exposed the iniquity of your servants? Behold, we are my lord''s slaves, the rest of us as well as he with whom the cup is found.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [Joseph] said, God forbid that I should do that; but the man in whose hand the cup is found, he shall be my servant; and as for [the rest of] you, arise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go in peace to your father.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Judah came close to [Joseph] and said, O my lord, let your servant, I pray you, speak a word to you in private, and let not your anger blaze against your servant, for you are as Pharaoh [so I will speak as if directly to him].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My lord asked his servants, saying, Have you a father or a brother?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And put my cup, the silver cup, in the sack''s mouth of the youngest, with his grain money. And [the steward] did according to what Joseph had said.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And we said to my lord, We have a father–an old man–and a young [brother, the] child of his old age; and his brother is dead, and he alone is left of his mother''s [offspring], and his father loves him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you said to your servants, Bring him down to me, that I may set my eyes on him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And we said to my lord, The lad cannot leave his father; for if he should do so, his father would die.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you told your servants, Unless your youngest brother comes with you, you shall not see my face again.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when we went back to your servant my father, we told him what my lord had said.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And our father said, Go again and buy us a little food.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But we said, We cannot go down. If our youngest brother is with us, then we will go down; for we may not see the man''s face except our youngest brother is with us.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And your servant my father said to us, You know that [Rachel] my wife bore me two sons:'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the one went out from me, and I said, Surely he is torn to pieces, and I have never seen him since.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if you take this son also from me, and harm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' accident should befall him, you will bring down my gray hairs with sorrow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil to Sheol (the place of the dead).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As soon as the morning was light, the men were sent away, they and their donkeys.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now therefore, when I come to your servant my father and the lad is not with us, since his life is bound up in the lad''s life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' his soul knit with the lad''s soul,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When he sees that the lad is not with us, he will die; and your servants will be responsible for his death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' will bring down the gray hairs of your servant our father with sorrow to Sheol.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For your servant became security for the lad to my father, saying, If I do not bring him to you, then I will bear the blame to my father forever.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now therefore, I pray you, let your servant remain instead of the youth [to be] a slave to my lord, and let the young man go home with his [half] brothers.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For how can I go up to my father if the lad is not with me?–lest I witness the woe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the evil that will come upon my father.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they had left the city and were not yet far away, Joseph said to his steward, Up, follow after the men; and when you overtake them, say to them, Why have you rewarded evil for good? [Why have you stolen the silver cup?]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Is it not my master''s drinking cup with which he divines [the future]? You have done wrong in doing this.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the steward overtook them, and he said to them these same words.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They said to him, Why does my lord say these things? Far be it from your servants to do such a thing!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Note that the money which we found in the mouths of our sacks we brought back to you from the land of Canaan. Is it likely then that we would steal from your master''s house silver or gold?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With whomever of your servants [your master''s cup] is found, not only let that one die, but the rest of us will be my lord''s slaves.'
