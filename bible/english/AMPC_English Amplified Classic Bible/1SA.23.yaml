document_id: 1SA.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THEY told David, Behold, the Philistines are fighting against Keilah and are robbing the threshing floors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So David inquired of the Lord, Shall I go and attack these Philistines? And the Lord said to David, Go, smite the Philistines and save Keilah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' David''s men said to him, Behold, we are afraid here in Judah. How much more, then, if we come to Keilah against the armies of the Philistines?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then David inquired of the Lord again. And the Lord answered him, Arise, go down to Keilah, for I will deliver the Philistines into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So David and his men went to Keilah and fought the Philistines with a great slaughter and brought away their cattle. So David delivered the people of Keilah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When Abiathar son of Ahimelech fled to David at Keilah, he came with an ephod in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now it was told Saul that David had come to Keilah. Saul said, God has delivered him into my hand, for he is shut in by going into a town that has gates and bars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Saul summoned all the men for war, to go to Keilah to besiege David and his men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' David knew that Saul was plotting evil against him; and he said to Abiathar the priest, Bring the ephod here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then David said, O Lord, the God of Israel, Your servant has surely heard that Saul intends to come and destroy the city of Keilah on my account.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Will the men of Keilah deliver me into his hand? Will Saul come down, as Your servant has heard? O Lord, God of Israel, I beseech You, tell Your servant. And the Lord said, He will come down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then David asked, Will the men of Keilah deliver me and my men into Saul''s hand? The Lord said, They will deliver you up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then David and his men, about 600, arose and left Keilah, going wherever they could go. When Saul was told that David had escaped from Keilah, he gave up going there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' David remained in the wilderness strongholds in the hill country of the Wilderness of Ziph. Saul sought him every day, but God did not give him into his hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' David saw that Saul had come out to seek his life. David was in the Wilderness of Ziph in the wood [at Horesh].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Jonathan, Saul''s son, rose and went into the wood to David [at Horesh] and strengthened his hand in God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He said to him, Fear not; the hand of Saul my father shall not find you. You shall be king over Israel, and I shall be next to you. Saul my father knows that too.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the two of them made a covenant before the Lord. And David remained in the wood [at Horesh], and Jonathan went to his house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the Ziphites came to Saul at Gibeah, saying, Does not David hide himself with us in strongholds in the wood [at Horesh], on the hill of Hachilah, which is south of Jeshimon?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now come down, O king, according to all your heart''s desire to come down, and our part shall be to deliver him into the king''s hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Saul said, The Lord bless you, for you have compassion on me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Go, make yet more sure; and know and see where his haunt is and who has seen him there; for I am told he deals very craftily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' See and take note of all his hiding places and come back to me with the certain facts, and I will go with you. If he is in the land, I will search him out among all the thousands of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So they arose and went to Ziph ahead of Saul. Now David and his men were in the Wilderness of Maon, in the Arabah south of Jeshimon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Saul and his men went to seek him. And David was told; so he went down to the rock in the Wilderness of Maon and stayed. When Saul heard that, he pursued David in the Wilderness of Maon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And Saul went on one side of the mountain, and David and his men on the other side of the mountain. And David made haste to get away for fear of Saul, for Saul and his men were surrounding [him] and his men to capture them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But a messenger came to Saul, saying, Make haste and come, for the Philistines have made a raid on the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So Saul returned from pursuing David and went against the Philistines. So they called that place the Rock of Escape.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' David went up from there and dwelt in the strongholds of En-gedi.'
