document_id: REV.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ONE OF the seven angels who had the seven bowls then came and spoke to me, saying, Come with me! I will show you the doom (sentence, judgment) of the great harlot (idolatress) who is seated on many waters, [Jer. 51:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [She] with whom the rulers of the earth have joined in prostitution (idolatry) and with the wine of whose immorality (idolatry) the inhabitants of the earth have become intoxicated. [Jer. 25:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And [the angel] bore me away [rapt] in the Spirit into a desert (wilderness), and I saw a woman seated on a scarlet beast that was all covered with blasphemous titles (names), and he had seven heads and ten horns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The woman was robed in purple and scarlet and bedecked with gold, precious stones, and pearls, [and she was] holding in her hand a golden cup full of the accursed offenses and the filth of her lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vice. [Jer. 51:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And on her forehead there was inscribed a name of mystery [with a secret symbolic meaning]: Babylon the great, the mother of prostitutes (idolatresses) and of the filth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' atrocities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abominations of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I also saw that the woman was drunk, [drunk] with the blood of the saints (God''s people) and the blood of the martyrs [who witnessed] for Jesus. And when I saw her, I was utterly amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondered greatly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the angel said to me, Why do you wonder? I will explain to you the [secret symbolic meaning of the] mystery of the woman, as well as of the beast having the seven heads and ten horns that carries her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The beast that you saw [once] was, but [now] is no more, and he is going to come up out of the Abyss (the bottomless pit) and proceed to go to perdition. And the inhabitants of the earth whose names have not been recorded in the Book of Life from the foundation of the world will be astonished when they look at the beast, because he [once] was, but [now] is no more, and he is [yet] to come. [Dan. 7:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' This calls for a mind [to consider that is packed] with wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intelligence [it is something for a particular mode of thinking and judging of thoughts, feelings, and purposes]. The seven heads are seven hills upon which the woman is sitting;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they are also seven kings, five of whom have fallen, one still exists [and is reigning]; the other [the seventh] has not yet appeared, and when he does arrive, he must stay [but] a brief time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And as for the beast that [once] was, but now is no more, he [himself] is an eighth ruler (king, head), but he is of the seven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' belongs to them, and he goes to perdition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Also the ten horns that you observed are ten rulers (kings) who have as yet received no royal dominion, but together they are to receive power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority as rulers for a single hour, along with the beast. [Dan. 7:20-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' These have one common policy (opinion, purpose), and they deliver their power and authority to the beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They will wage war against the Lamb, and the Lamb will triumph over them; for He is Lord of lords and King of kings–and those with Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on His side are chosen and called [elected] and loyal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful followers. [Dan. 2:47.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And [the angel further] said to me, The waters that you observed, where the harlot is seated, are races and multitudes and nations and dialects (languages).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the ten horns that you saw, they and the beast will [be the very ones to] hate the harlot (the idolatrous woman); they will make her cheerless (bereaved, desolate), and they will strip her and eat up her flesh and utterly consume her with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For God has put it into their hearts to carry out His own purpose by acting in harmony in surrendering their royal power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority to the beast, until the prophetic words (intentions and promises) of God shall be fulfilled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the woman that you saw is herself the great city which dominates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controls the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the leaders of the earth.'
