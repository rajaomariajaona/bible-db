document_id: REV.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ONE OF the seven angels who had the seven bowls then came and spoke to me, saying, Come with me! I will show you the doom (sentence, judgment) of the great harlot (idolatress) who is seated on many waters, [Jer. 51:13.]'
  '10':
  - type: text
    content: ' And they are also seven kings, five of whom have fallen, one still exists [and is reigning]; the other [the seventh] has not yet appeared, and when he does arrive, he must stay [but] a brief time.'
  '11':
  - type: text
    content: ' And as for the beast that [once] was, but now is no more, he [himself] is an eighth ruler (king, head), but he is of the seven '
  - type: text
    content: and
  - type: text
    content: ' belongs to them, and he goes to perdition.'
  '12':
  - type: text
    content: ' Also the ten horns that you observed are ten rulers (kings) who have as yet received no royal dominion, but together they are to receive power '
  - type: text
    content: and
  - type: text
    content: ' authority as rulers for a single hour, along with the beast. [Dan. 7:20-24.]'
  '13':
  - type: text
    content: ' These have one common policy (opinion, purpose), and they deliver their power and authority to the beast.'
  '14':
  - type: text
    content: ' They will wage war against the Lamb, and the Lamb will triumph over them; for He is Lord of lords and King of kings–and those with Him '
  - type: text
    content: and
  - type: text
    content: ' on His side are chosen and called [elected] and loyal '
  - type: text
    content: and
  - type: text
    content: ' faithful followers. [Dan. 2:47.]'
  '15':
  - type: text
    content: ' And [the angel further] said to me, The waters that you observed, where the harlot is seated, are races and multitudes and nations and dialects (languages).'
  '16':
  - type: text
    content: ' And the ten horns that you saw, they and the beast will [be the very ones to] hate the harlot (the idolatrous woman); they will make her cheerless (bereaved, desolate), and they will strip her and eat up her flesh and utterly consume her with fire.'
  '17':
  - type: text
    content: ' For God has put it into their hearts to carry out His own purpose by acting in harmony in surrendering their royal power '
  - type: text
    content: and
  - type: text
    content: ' authority to the beast, until the prophetic words (intentions and promises) of God shall be fulfilled.'
  '18':
  - type: text
    content: ' And the woman that you saw is herself the great city which dominates '
  - type: text
    content: and
  - type: text
    content: ' controls the rulers '
  - type: text
    content: and
  - type: text
    content: ' the leaders of the earth.'
  '2':
  - type: text
    content: ' [She] with whom the rulers of the earth have joined in prostitution (idolatry) and with the wine of whose immorality (idolatry) the inhabitants of the earth have become intoxicated. [Jer. 25:15, 16.]'
  '3':
  - type: text
    content: ' And [the angel] bore me away [rapt] in the Spirit into a desert (wilderness), and I saw a woman seated on a scarlet beast that was all covered with blasphemous titles (names), and he had seven heads and ten horns.'
  '4':
  - type: text
    content: ' The woman was robed in purple and scarlet and bedecked with gold, precious stones, and pearls, [and she was] holding in her hand a golden cup full of the accursed offenses and the filth of her lewdness '
  - type: text
    content: and
  - type: text
    content: ' vice. [Jer. 51:7.]'
  '5':
  - type: text
    content: ' And on her forehead there was inscribed a name of mystery [with a secret symbolic meaning]: Babylon the great, the mother of prostitutes (idolatresses) and of the filth '
  - type: text
    content: and
  - type: text
    content: ' atrocities '
  - type: text
    content: and
  - type: text
    content: ' abominations of the earth.'
  '6':
  - type: text
    content: ' I also saw that the woman was drunk, [drunk] with the blood of the saints (God''s people) and the blood of the martyrs [who witnessed] for Jesus. And when I saw her, I was utterly amazed '
  - type: text
    content: and
  - type: text
    content: ' wondered greatly.'
  '7':
  - type: text
    content: ' But the angel said to me, Why do you wonder? I will explain to you the [secret symbolic meaning of the] mystery of the woman, as well as of the beast having the seven heads and ten horns that carries her.'
  '8':
  - type: text
    content: ' The beast that you saw [once] was, but [now] is no more, and he is going to come up out of the Abyss (the bottomless pit) and proceed to go to perdition. And the inhabitants of the earth whose names have not been recorded in the Book of Life from the foundation of the world will be astonished when they look at the beast, because he [once] was, but [now] is no more, and he is [yet] to come. [Dan. 7:3.]'
  '9':
  - type: text
    content: ' This calls for a mind [to consider that is packed] with wisdom '
  - type: text
    content: and
  - type: text
    content: ' intelligence [it is something for a particular mode of thinking and judging of thoughts, feelings, and purposes]. The seven heads are seven hills upon which the woman is sitting;'
