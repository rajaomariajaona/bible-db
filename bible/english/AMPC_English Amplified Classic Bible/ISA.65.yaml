document_id: ISA.65,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I WAS [ready to be] inquired of by those who asked not; I was [ready to be] found by those who sought Me not. I said, Here I am, here I am [says I AM] to a nation [Israel] that has not called on My name. [Exod. 3:14; Isa. 58:9.]'
  '10':
  - type: text
    content: ' And [the plain of] Sharon shall be a pasture '
  - type: text
    content: and
  - type: text
    content: ' fold for flocks, and the Valley of Achor a place for herds to lie down, for My people who seek Me, inquire of Me, '
  - type: text
    content: and
  - type: text
    content: ' require Me [by right of their necessity and by right of My invitation].'
  '11':
  - type: text
    content: ' But you who forsake the Lord, who forget '
  - type: text
    content: and
  - type: text
    content: ' ignore My holy Mount [Zion], who prepare a table for Gad [the Babylonian god of fortune] and who furnish mixed drinks for Meni [the god of destiny]–'
  '12':
  - type: text
    content: ' I will destine you [says the Lord] for the sword, and you shall all bow down to the slaughter, because when I called, you did not answer; when I spoke, you did not listen '
  - type: text
    content: or
  - type: text
    content: ' obey. But you did what was evil in My eyes, and you chose that in which I did not delight.'
  '13':
  - type: text
    content: ' Therefore thus says the Lord God: Behold, My servants shall eat, but you shall be hungry; behold, My servants shall drink, but you shall be thirsty; behold, My servants shall rejoice, but you shall be put to shame.'
  '14':
  - type: text
    content: ' Behold, My servants shall sing for joy of heart, but you shall cry out for pain '
  - type: text
    content: and
  - type: text
    content: ' sorrow of heart and shall wail '
  - type: text
    content: and
  - type: text
    content: ' howl for anguish, vexation, '
  - type: text
    content: and
  - type: text
    content: ' breaking of spirit.'
  '15':
  - type: text
    content: ' And you will leave your name to My chosen [to those who will use it] for a curse; and the Lord God will slay you, but He will call His servants by another name [as much greater than the former name as the name Israel was greater than the name Jacob]. [Gen. 32:28; Jer. 29:22.]'
  '16':
  - type: text
    content: ' So [it shall be] that he who invokes a blessing on himself in the land shall do so by saying, May the God of truth '
  - type: text
    content: and
  - type: text
    content: ' fidelity [the Amen] bless me; and he who takes an oath in the land shall swear by the God of truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness to His promises [the Amen], because the former troubles are forgotten and because they are hidden from My eyes. [II Cor. 1:20; Rev. 3:14.]'
  '17':
  - type: text
    content: ' For behold, I create new heavens and a new earth. And the former things shall not be remembered or come into mind. [Isa. 66:22; II Pet. 3:13; Rev. 21:1.]'
  '18':
  - type: text
    content: ' But be glad and rejoice forever in that which I create; for behold, I create Jerusalem to be a rejoicing and her people a joy.'
  '19':
  - type: text
    content: ' And I will rejoice in Jerusalem and be glad in My people; and the sound of weeping will no more be heard in it, nor the cry of distress.'
  '2':
  - type: text
    content: ' I have spread out My hands all the day long to a rebellious people, who walk in a way that is not good, after their own thoughts–'
  '20':
  - type: text
    content: ' There shall no more be in it an infant who lives but a few days, or an old man who dies prematurely; for the child shall die a hundred years old, and the sinner who dies when only a hundred years old shall be [thought only a child, cut off because he is] accursed.'
  '21':
  - type: text
    content: ' They shall build houses and inhabit them, and they shall plant vineyards and eat the fruit of them.'
  '22':
  - type: text
    content: ' They shall not build and another inhabit; they shall not plant and another eat [the fruit]. For as the days of a tree, so shall be the days of My people, and My chosen '
  - type: text
    content: and
  - type: text
    content: ' elect shall long make use of '
  - type: text
    content: and
  - type: text
    content: ' enjoy the work of their hands.'
  '23':
  - type: text
    content: ' They shall not labor in vain or bring forth [children] for sudden terror '
  - type: text
    content: or
  - type: text
    content: ' calamity; for they shall be the descendants of the blessed of the Lord, and their offspring with them.'
  '24':
  - type: text
    content: ' And it shall be that before they call I will answer; and while they are yet speaking I will hear. [Isa. 30:19; 58:9; Matt. 6:8.]'
  '25':
  - type: text
    content: ' The wolf and the lamb shall feed together, and the lion shall eat straw like the ox; and dust shall be the serpent''s food. They shall not hurt or destroy in all My holy Mount [Zion], says the Lord.'
  '3':
  - type: text
    content: ' A people who provoke Me to My face continually, sacrificing [to idols] in gardens and burning incense upon bricks [instead of at God''s prescribed altar];'
  '4':
  - type: text
    content: ' Who sit among the graves [trying to talk with the dead] and lodge among the secret places [or caves where familiar spirits were thought to dwell]; who eat swine''s flesh, and the broth of abominable '
  - type: text
    content: and
  - type: text
    content: ' loathsome things is in their vessels;'
  '5':
  - type: text
    content: ' Who say, Keep to yourself; do not come near me, for I am set apart from you [and lest I sanctify you]! These are smoke in My nostrils, a fire that burns all the day.'
  '6':
  - type: text
    content: ' Behold, it is written before Me: I will not keep silence but will repay; yes, I will repay into their bosom'
  '7':
  - type: text
    content: ' Both your own iniquities and the iniquities of your fathers, says the Lord. Because they too burned incense upon the mountains and reviled '
  - type: text
    content: and
  - type: text
    content: ' blasphemed Me upon the hills, therefore will I measure '
  - type: text
    content: and
  - type: text
    content: ' stretch out their former doings into their own bosom.'
  '8':
  - type: text
    content: ' Thus says the Lord: As the juice [of the grape] is found in the cluster, and one says, Do not destroy it, for there is a blessing in it, so will I do for My servants'' sake, that I may not destroy them all.'
  '9':
  - type: text
    content: ' And I will bring forth an offspring from Jacob, and from Judah an inheritor of My mountains; My chosen '
  - type: text
    content: and
  - type: text
    content: ' elect will inherit it, and My servants will dwell there.'
