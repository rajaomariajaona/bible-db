document_id: PSA.131,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents. Of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', MY heart is not haughty, nor my eyes lofty; neither do I exercise myself in matters too great or in things too wonderful for me.'
  '2':
  - type: text
    content: ' Surely I have calmed and quieted my soul; like a weaned child with his mother, like a weaned child is my soul within me [ceased from fretting].'
  '3':
  - type: text
    content: ' O Israel, hope in the Lord from this time forth and forever.'
