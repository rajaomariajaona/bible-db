  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', MY heart is not haughty, nor my eyes lofty; neither do I exercise myself in matters too great or in things too wonderful for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Surely I have calmed and quieted my soul; like a weaned child with his mother, like a weaned child is my soul within me [ceased from fretting].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' O Israel, hope in the Lord from this time forth and forever.'
