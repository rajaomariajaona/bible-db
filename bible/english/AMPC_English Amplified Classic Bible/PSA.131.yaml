verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Song of Ascents. Of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', MY heart is not haughty, nor my eyes lofty; neither do I exercise myself in matters too great or in things too wonderful for me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Surely I have calmed and quieted my soul; like a weaned child with his mother, like a weaned child is my soul within me [ceased from fretting].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' O Israel, hope in the Lord from this time forth and forever.'
