document_id: PRO.30,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE WORDS of Agur son of Jakeh of Massa: The man says to Ithiel, to Ithiel and to Ucal:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not accuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hurt a servant before his master, lest he curse you, and you be held guilty [of adding to the burdens of the lowly].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is a class of people who curse their fathers and do not bless their mothers.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is a class of people who are pure in their own eyes, and yet are not washed from their own filth.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is a class of people–oh, how lofty are their eyes and their raised eyelids!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is a class of people whose teeth are as swords and whose fangs as knives, to devour the poor from the earth and the needy from among men.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The leech has two daughters, crying, Give, give! There are three things that are never satisfied, yes, four that do not say, It is enough:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sheol (the place of the dead), the barren womb, the earth that is not satisfied with water, and the fire that says not, It is enough.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The eye that mocks a father and scorns to obey a mother, the ravens of the valley will pick it out, and the young vultures will devour it. [Lev. 20:9; Prov. 20:20; 23:22.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There are three things which are too wonderful for me, yes, four which I do not understand:'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The way of an eagle in the air, the way of a serpent upon a rock, the way of a ship in the midst of the sea, and the way of a man with a maid.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Surely I am too brutish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stupid to be called a man, and I have not the understanding of a man [for all my secular learning is as nothing].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the way of an adulterous woman: she eats and wipes her mouth and says, I have done no wickedness.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Under three things the earth is disquieted, and under four it cannot bear up:'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Under a servant when he reigns, a [empty-headed] fool when he is filled with food,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' An unloved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repugnant woman when she is married, and a maidservant when she supplants her mistress.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There are four things which are little on the earth, but they are exceedingly wise:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The ants are a people not strong, yet they lay up their food in the summer; [Prov. 6:6.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The conies are but a feeble folk, yet they make their houses in the rocks; [Ps. 104:18.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The locusts have no king, yet they go forth all of them by bands;'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The lizard you can seize with your hands, yet it is in kings'' palaces.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There are three things which are stately in step, yes, four which are stately in their stride:'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have not learned skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom, that I should have the knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' burden of the Holy One.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The lion, which is mightiest among beasts and turns not back before any;'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The war horse [well-knit in the loins], the male goat also, and the king [when his army is with him and] against whom there is no uprising.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If you have done foolishly in exalting yourself, or if you have thought evil, lay your hand upon your mouth. [Job 21:5; 40:4.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Surely the churning of milk brings forth butter, and the wringing of the nose brings forth blood; so the forcing of wrath brings forth strife.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who has ascended into heaven and descended? Who has gathered the wind in His fists? Who has bound the waters in His garment? Who has established all the ends of the earth? What is His name, and what is His Son''s name, if you know? [John 3:13; Rev. 19:12.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Every word of God is tried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purified; He is a shield to those who trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in Him. [Ps. 18:30; 84:11; 115:9-11.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Add not to His words, lest He reprove you, and you be found a liar.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Two things have I asked of You [O Lord]; deny them not to me before I die:'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Remove far from me falsehood and lies; give me neither poverty nor riches; feed me with the food that is needful for me,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lest I be full and deny You and say, Who is the Lord? Or lest I be poor and steal, and so profane the name of my God. [Deut. 8:12, 14, 17; Neh. 9:25, 26; Job 31:24; Hos. 13:6.]'
