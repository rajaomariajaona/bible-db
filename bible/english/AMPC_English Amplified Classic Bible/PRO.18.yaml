document_id: PRO.18,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' HE WHO willfully separates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' estranges himself [from God and man] seeks his own desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pretext to break out against all wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sound judgment.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The name of the Lord is a strong tower; the [consistently] righteous man [upright and in right standing with God] runs into it and is safe, high [above evil] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The rich man''s wealth is his strong city, and as a high protecting wall in his own imagination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conceit.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Haughtiness comes before disaster, but humility before honor.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who answers a matter before he hears the facts–it is folly and shame to him. [John 7:51.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The strong spirit of a man sustains him in bodily pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' trouble, but a weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken spirit who can raise up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bear?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The mind of the prudent is ever getting knowledge, and the ear of the wise is ever seeking (inquiring for and craving) knowledge.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A man''s gift makes room for him and brings him before great men. [Gen. 32:20; I Sam. 25:27; Prov. 17:8; 21:14.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who states his case first seems right, until his rival comes and cross-examines him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To cast lots puts an end to disputes and decides between powerful contenders.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A brother offended is harder to be won over than a strong city, and [their] contentions separate them like the bars of a castle.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A [self-confident] fool has no delight in understanding but only in revealing his personal opinions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' himself.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A man''s [moral] self shall be filled with the fruit of his mouth; and with the consequence of his words he must be satisfied [whether good or evil].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Death and life are in the power of the tongue, and they who indulge in it shall eat the fruit of it [for death or life]. [Matt. 12:37.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who finds a [true] wife finds a good thing and obtains favor from the Lord. [Prov. 19:14; 31:10.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The poor man uses entreaties, but the rich answers roughly.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The man of many friends [a friend of all the world] will prove himself a bad friend, but there is a friend who sticks closer than a brother.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the wicked comes in [to the depth of evil], he becomes a contemptuous despiser [of all that is pure and good], and with inner baseness comes outer shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The words of a [discreet and wise] man''s mouth are like deep waters [plenteous and difficult to fathom], and the fountain of skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is like a gushing stream [sparkling, fresh, pure, and life-giving].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To respect the person of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be partial to him, so as to deprive the [consistently] righteous of justice, is not good.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A [self-confident] fool''s lips bring contention, and his mouth invites a beating.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A [self-confident] fool''s mouth is his ruin, and his lips are a snare to himself.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The words of a whisperer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' talebearer are as dainty morsels; they go down into the innermost parts of the body.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who is loose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' slack in his work is brother to him who is a destroyer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he who does not use his endeavors to heal himself is brother to him who commits suicide
    - type: text
      text: .
