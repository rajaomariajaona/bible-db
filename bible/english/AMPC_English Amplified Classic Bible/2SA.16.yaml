document_id: 2SA.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN DAVID was a little past the top [of Olivet], behold, Ziba, the servant of Mephibosheth, met him with a couple of donkeys saddled, and upon them 200 loaves of bread, 100 bunches of raisins, 100 summer fruits, and a skin of wine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The king said to Ziba, What do you mean by these? Ziba said, The donkeys are for the king''s household to ride on, the bread and summer fruit for the young men to eat, and the wine is for those to drink who become faint in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The king said, And where is your master''s son [grandson Mephibosheth]? Ziba said to the king, Behold, he remains in Jerusalem, for he said, Today the house of Israel will give me back the kingdom of my father [grandfather Saul].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the king said to Ziba, Behold, all that belonged to Mephibosheth is now yours. Ziba said, I do obeisance; let me ever find favor in your sight, my lord O king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When King David came to Bahurim, a man of the family of the house of Saul, Shimei son of Gera, came out and cursed continually as he came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he cast stones at David and at all the servants of King David; and all the people and all the mighty men were on his right hand and on his left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Shimei said as he cursed, Get out, get out, you man of blood, you base fellow!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord has avenged upon you all the blood of the house of Saul, in whose stead you have reigned; and the Lord has delivered the kingdom into the hands of Absalom your son. Behold, the calamity is upon you because you are a bloody man!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then said [David''s nephew] Abishai son of Zeruiah to the king, Why should this dead dog curse my lord the king? Let me go over and take off his head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The king said, What have I to do with you, you sons of Zeruiah? If he is cursing because the Lord said to him, Curse David, who then shall ask, Why have you done so?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And David said to Abishai and to all his servants, Behold, my son, who was born to me, seeks my life. With how much more reason now may this Benjamite do it? Let him alone; and let him curse, for the Lord has bidden him to do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' It may be that the Lord will look on the iniquity done me and will recompense me with good for his cursing this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So David and his men went by the road, and Shimei went along on the hillside opposite David and cursed as he went and threw stones and dust at him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the king and all the people who were with him came [to the Jordan] weary, and he refreshed himself there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Absalom and all the people, the men of Israel, came to Jerusalem, and Ahithophel with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And when Hushai the Archite, David''s friend, came to Absalom, Hushai said to [him], Long live the king! Long live the king!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Absalom said to Hushai, Is this your kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loyalty to your friend? Why did you not go with your friend?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Hushai said to Absalom, No, for whom the Lord and this people and all the men of Israel choose, his will I be, and with him I will remain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And again, whom should I serve? Should it not be his son? As I have served your father, so will I serve you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Absalom said to Ahithophel, Give your counsel. What shall we do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Ahithophel said to Absalom, Go in to your father''s concubines whom he has left to keep the house; and all Israel will hear that you are abhorred by your father. Then the hands of all who are with you will be made strong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So they spread for Absalom a tent on the top of the [king''s] house, and Absalom went in to his father''s harem in the sight of all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the counsel of Ahithophel in those days was as if a man had consulted the word of God; so was all Ahithophel''s counsel considered both by David and by Absalom.'
