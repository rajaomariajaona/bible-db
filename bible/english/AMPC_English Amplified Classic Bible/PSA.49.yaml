document_id: PSA.49
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of the sons of Korah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR THIS, all you peoples; give ear, all you inhabitants of the world,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Both low and high, rich and poor together:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' My mouth shall speak wisdom; and the meditation of my heart shall be understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will submit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consent to a parable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' proverb; to the music of a lyre I will unfold my riddle (my problem).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Why should I fear in the days of evil, when the iniquity of those who would supplant me surrounds me on every side,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Even of those who trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lean on their wealth and boast of the abundance of their riches?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' None of them can by any means redeem [either himself or] his brother, nor give to God a ransom for him–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For the ransom of a life is too costly, and [the price one can pay] can never suffice–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So that he should live on forever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' never see the pit (the grave) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corruption.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For he sees that even wise men die; the [self-confident] fool and the stupid alike perish and leave their wealth to others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Their inward thought is that their houses will continue forever, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their dwelling places to all generations; they call their lands their own [apart from God] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' after their own names.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But man, with all his honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pomp, does not remain; he is like the beasts that perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' This is the fate of those who are foolishly confident, yet after them men approve their sayings. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Like sheep they are appointed for Sheol (the place of the dead); death shall be their shepherd. And the upright shall have dominion over them in the morning; and their form '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beauty shall be consumed, for Sheol shall be their dwelling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But God will redeem me from the power of Sheol (the place of the dead); for He will receive me. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Be not afraid when [an ungodly] one is made rich, when the wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of his house are increased;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For when he dies he will carry nothing away; his glory will not descend after him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Though while he lives he counts himself happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperous, and though a man gets praise when he does well [for himself],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He will go to the generation of his fathers, who will nevermore see the light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' A man who is held in honor and understands not is like the beasts that perish.'
