document_id: PSA.49,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: ' HEAR THIS, all you peoples; give ear, all you inhabitants of the world,'
  '10':
  - type: text
    content: ' For he sees that even wise men die; the [self-confident] fool and the stupid alike perish and leave their wealth to others.'
  '11':
  - type: text
    content: ' Their inward thought is that their houses will continue forever, '
  - type: text
    content: and
  - type: text
    content: ' their dwelling places to all generations; they call their lands their own [apart from God] '
  - type: text
    content: and
  - type: text
    content: ' after their own names.'
  '12':
  - type: text
    content: ' But man, with all his honor '
  - type: text
    content: and
  - type: text
    content: ' pomp, does not remain; he is like the beasts that perish.'
  '13':
  - type: text
    content: ' This is the fate of those who are foolishly confident, yet after them men approve their sayings. Selah [pause, and calmly think of that]!'
  '14':
  - type: text
    content: ' Like sheep they are appointed for Sheol (the place of the dead); death shall be their shepherd. And the upright shall have dominion over them in the morning; and their form '
  - type: text
    content: and
  - type: text
    content: ' beauty shall be consumed, for Sheol shall be their dwelling.'
  '15':
  - type: text
    content: ' But God will redeem me from the power of Sheol (the place of the dead); for He will receive me. Selah [pause, and calmly think of that]!'
  '16':
  - type: text
    content: ' Be not afraid when [an ungodly] one is made rich, when the wealth '
  - type: text
    content: and
  - type: text
    content: ' glory of his house are increased;'
  '17':
  - type: text
    content: ' For when he dies he will carry nothing away; his glory will not descend after him.'
  '18':
  - type: text
    content: ' Though while he lives he counts himself happy '
  - type: text
    content: and
  - type: text
    content: ' prosperous, and though a man gets praise when he does well [for himself],'
  '19':
  - type: text
    content: ' He will go to the generation of his fathers, who will nevermore see the light.'
  '2':
  - type: text
    content: ' Both low and high, rich and poor together:'
  '20':
  - type: text
    content: ' A man who is held in honor and understands not is like the beasts that perish.'
  '3':
  - type: text
    content: ' My mouth shall speak wisdom; and the meditation of my heart shall be understanding.'
  '4':
  - type: text
    content: ' I will submit '
  - type: text
    content: and
  - type: text
    content: ' consent to a parable '
  - type: text
    content: or
  - type: text
    content: ' proverb; to the music of a lyre I will unfold my riddle (my problem).'
  '5':
  - type: text
    content: ' Why should I fear in the days of evil, when the iniquity of those who would supplant me surrounds me on every side,'
  '6':
  - type: text
    content: ' Even of those who trust in '
  - type: text
    content: and
  - type: text
    content: ' lean on their wealth and boast of the abundance of their riches?'
  '7':
  - type: text
    content: ' None of them can by any means redeem [either himself or] his brother, nor give to God a ransom for him–'
  '8':
  - type: text
    content: ' For the ransom of a life is too costly, and [the price one can pay] can never suffice–'
  '9':
  - type: text
    content: ' So that he should live on forever '
  - type: text
    content: and
  - type: text
    content: ' never see the pit (the grave) '
  - type: text
    content: and
  - type: text
    content: ' corruption.'
