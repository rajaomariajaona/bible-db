verses:
  '1':
  - type: text
    content: ' A FALSE balance '
  - type: text
    content: and
  - type: text
    content: ' unrighteous dealings are extremely offensive '
  - type: text
    content: and
  - type: text
    content: ' shamefully sinful to the Lord, but a just weight is His delight. [Lev. 19:35, 36; Prov. 16:11.]'
  '10':
  - type: text
    content: ' When it goes well with the [uncompromisingly] righteous, the city rejoices, but when the wicked perish, there are shouts of joy.'
  '11':
  - type: text
    content: ' By the blessing of the influence of the upright '
  - type: text
    content: and
  - type: text
    content: ' God''s favor [because of them] the city is exalted, but it is overthrown by the mouth of the wicked.'
  '12':
  - type: text
    content: ' He who belittles '
  - type: text
    content: and
  - type: text
    content: ' despises his neighbor lacks sense, but a man of understanding keeps silent.'
  '13':
  - type: text
    content: ' He who goes about as a talebearer reveals secrets, but he who is trustworthy '
  - type: text
    content: and
  - type: text
    content: ' faithful in spirit keeps the matter hidden.'
  '14':
  - type: text
    content: ' Where no wise guidance is, the people fall, but in the multitude of counselors there is safety.'
  '15':
  - type: text
    content: ' He who becomes security for an outsider shall smart for it, but he who hates suretyship is secure [from its penalties].'
  '16':
  - type: text
    content: ' A gracious '
  - type: text
    content: and
  - type: text
    content: ' good woman wins honor [for her husband], and violent men win riches '
  - type: text
    content: but
  - type: text
    content: ' '
  - type: text
    content: a woman who hates righteousness is a throne of dishonor for him
  - type: text
    content: .
  '17':
  - type: text
    content: ' The merciful, kind, '
  - type: text
    content: and
  - type: text
    content: ' generous man benefits himself [for his deeds return to bless him], but he who is cruel '
  - type: text
    content: and
  - type: text
    content: ' callous [to the wants of others] brings on himself retribution.'
  '18':
  - type: text
    content: ' The wicked man earns deceitful wages, but he who sows righteousness (moral and spiritual rectitude in every area and relation) shall have a sure reward [permanent and satisfying]. [Hos. 10:12; Gal. 6:8, 9; James 3:18.]'
  '19':
  - type: text
    content: ' He who is steadfast in righteousness (uprightness and right standing with God) attains to life, but he who pursues evil does it to his own death.'
  '2':
  - type: text
    content: ' When swelling '
  - type: text
    content: and
  - type: text
    content: ' pride come, then emptiness '
  - type: text
    content: and
  - type: text
    content: ' shame come also, but with the humble (those who are lowly, who have been pruned or chiseled by trial, and renounce self) are skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom '
  - type: text
    content: and
  - type: text
    content: ' soundness.'
  '20':
  - type: text
    content: ' They who are willfully contrary in heart are extremely disgusting '
  - type: text
    content: and
  - type: text
    content: ' shamefully vile in the eyes of the Lord, but such as are blameless '
  - type: text
    content: and
  - type: text
    content: ' wholehearted in their ways are His delight!'
  '21':
  - type: text
    content: ' Assuredly [I pledge it] the wicked shall not go unpunished, but the multitude of the [uncompromisingly] righteous shall be delivered.'
  '22':
  - type: text
    content: ' As a ring of gold in a swine''s snout, so is a fair woman who is without discretion.'
  '23':
  - type: text
    content: ' The desire of the [consistently] righteous brings only good, but the expectation of the wicked brings wrath.'
  '24':
  - type: text
    content: ' There are those who [generously] scatter abroad, and yet increase more; there are those who withhold more than is fitting '
  - type: text
    content: or
  - type: text
    content: ' what is justly due, but it results only in want.'
  '25':
  - type: text
    content: ' The liberal person shall be enriched, and he who waters shall himself be watered. [II Cor. 9:6-10.]'
  '26':
  - type: text
    content: ' The people curse him who holds back grain [when the public needs it], but a blessing [from God and man] is upon the head of him who sells it.'
  '27':
  - type: text
    content: ' He who diligently seeks good seeks [God''s] favor, but he who searches after evil, it shall come upon him.'
  '28':
  - type: text
    content: ' He who leans on, trusts in, '
  - type: text
    content: and
  - type: text
    content: ' is confident in his riches shall fall, but the [uncompromisingly] righteous shall flourish like a green bough.'
  '29':
  - type: text
    content: ' He who troubles his own house shall inherit the wind, and the foolish shall be servant to the wise of heart.'
  '3':
  - type: text
    content: ' The integrity of the upright shall guide them, but the willful contrariness '
  - type: text
    content: and
  - type: text
    content: ' crookedness of the treacherous shall destroy them.'
  '30':
  - type: text
    content: ' The fruit of the [uncompromisingly] righteous is a tree of life, and he who is wise captures human lives [for God, as a fisher of men–he gathers and receives them for eternity]. [Matt. 4:19; I Cor. 9:19; James 5:20.]'
  '31':
  - type: text
    content: ' Behold, the [uncompromisingly] righteous shall be recompensed on earth; how much more the wicked and the sinner! '
  - type: text
    content: And
  - type: text
    content: ' '
  - type: text
    content: if the righteous are barely saved, what will become of the ungodly and wicked?
  - type: text
    content: ' [I Pet. 4:18.]'
  '4':
  - type: text
    content: ' Riches provide no security in any day of wrath '
  - type: text
    content: and
  - type: text
    content: ' judgment, but righteousness (uprightness and right standing with God) delivers from death. [Prov. 10:2; Zeph. 1:18.]'
  '5':
  - type: text
    content: ' The righteousness of the blameless shall rectify '
  - type: text
    content: and
  - type: text
    content: ' make plain their way '
  - type: text
    content: and
  - type: text
    content: ' keep it straight, but the wicked shall fall by their own wickedness.'
  '6':
  - type: text
    content: ' The righteousness of the upright [their rectitude in every area and relation] shall deliver them, but the treacherous shall be taken in their own iniquity '
  - type: text
    content: and
  - type: text
    content: ' greedy desire.'
  '7':
  - type: text
    content: ' When the wicked man dies, his hope [for the future] perishes; and the expectation of the godless comes to nothing.'
  '8':
  - type: text
    content: ' The [uncompromisingly] righteous is delivered out of trouble, and the wicked gets into it instead.'
  '9':
  - type: text
    content: ' With his mouth the godless man destroys his neighbor, but through knowledge '
  - type: text
    content: and
  - type: text
    content: ' superior discernment shall the righteous be delivered.'
