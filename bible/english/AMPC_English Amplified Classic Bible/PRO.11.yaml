document_id: PRO.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A FALSE balance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unrighteous dealings are extremely offensive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shamefully sinful to the Lord, but a just weight is His delight. [Lev. 19:35, 36; Prov. 16:11.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When it goes well with the [uncompromisingly] righteous, the city rejoices, but when the wicked perish, there are shouts of joy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By the blessing of the influence of the upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' God''s favor [because of them] the city is exalted, but it is overthrown by the mouth of the wicked.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who belittles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despises his neighbor lacks sense, but a man of understanding keeps silent.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who goes about as a talebearer reveals secrets, but he who is trustworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful in spirit keeps the matter hidden.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Where no wise guidance is, the people fall, but in the multitude of counselors there is safety.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who becomes security for an outsider shall smart for it, but he who hates suretyship is secure [from its penalties].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good woman wins honor [for her husband], and violent men win riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a woman who hates righteousness is a throne of dishonor for him
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The merciful, kind, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' generous man benefits himself [for his deeds return to bless him], but he who is cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' callous [to the wants of others] brings on himself retribution.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The wicked man earns deceitful wages, but he who sows righteousness (moral and spiritual rectitude in every area and relation) shall have a sure reward [permanent and satisfying]. [Hos. 10:12; Gal. 6:8, 9; James 3:18.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who is steadfast in righteousness (uprightness and right standing with God) attains to life, but he who pursues evil does it to his own death.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When swelling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pride come, then emptiness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame come also, but with the humble (those who are lowly, who have been pruned or chiseled by trial, and renounce self) are skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soundness.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They who are willfully contrary in heart are extremely disgusting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shamefully vile in the eyes of the Lord, but such as are blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholehearted in their ways are His delight!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Assuredly [I pledge it] the wicked shall not go unpunished, but the multitude of the [uncompromisingly] righteous shall be delivered.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As a ring of gold in a swine''s snout, so is a fair woman who is without discretion.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The desire of the [consistently] righteous brings only good, but the expectation of the wicked brings wrath.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There are those who [generously] scatter abroad, and yet increase more; there are those who withhold more than is fitting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' what is justly due, but it results only in want.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The liberal person shall be enriched, and he who waters shall himself be watered. [II Cor. 9:6-10.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The people curse him who holds back grain [when the public needs it], but a blessing [from God and man] is upon the head of him who sells it.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who diligently seeks good seeks [God''s] favor, but he who searches after evil, it shall come upon him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who leans on, trusts in, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is confident in his riches shall fall, but the [uncompromisingly] righteous shall flourish like a green bough.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who troubles his own house shall inherit the wind, and the foolish shall be servant to the wise of heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The integrity of the upright shall guide them, but the willful contrariness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crookedness of the treacherous shall destroy them.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fruit of the [uncompromisingly] righteous is a tree of life, and he who is wise captures human lives [for God, as a fisher of men–he gathers and receives them for eternity]. [Matt. 4:19; I Cor. 9:19; James 5:20.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, the [uncompromisingly] righteous shall be recompensed on earth; how much more the wicked and the sinner! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if the righteous are barely saved, what will become of the ungodly and wicked?
    - type: text
      text: ' [I Pet. 4:18.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Riches provide no security in any day of wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judgment, but righteousness (uprightness and right standing with God) delivers from death. [Prov. 10:2; Zeph. 1:18.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The righteousness of the blameless shall rectify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make plain their way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep it straight, but the wicked shall fall by their own wickedness.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The righteousness of the upright [their rectitude in every area and relation] shall deliver them, but the treacherous shall be taken in their own iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greedy desire.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the wicked man dies, his hope [for the future] perishes; and the expectation of the godless comes to nothing.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The [uncompromisingly] righteous is delivered out of trouble, and the wicked gets into it instead.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With his mouth the godless man destroys his neighbor, but through knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' superior discernment shall the righteous be delivered.'
