document_id: ACT.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THE uproar had ceased, Paul sent for the disciples and warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged them; then he embraced them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' told them farewell and set forth on his journey to Macedonia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then after he had gone through those districts and had warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged the brethren with much discourse, he came to Greece.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Having spent three months there, when a plot was formed against him by the Jews as he was about to set sail for Syria, he resolved to go back through Macedonia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He was accompanied by Sopater the son of Pyrrhus from Beroea, and by the Thessalonians Aristarchus and Secundus, and Gaius of Derbe and Timothy, and the Asians Tychicus and Trophimus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' These went on ahead and were waiting for us [including Luke] at Troas,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But we [ourselves] sailed from Philippi after the days of Unleavened Bread [the Passover week], and in five days we joined them at Troas, where we remained for seven days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And on the first day of the week, when we were assembled together to break bread [the Lord''s Supper], Paul discoursed with them, intending to leave the next morning; and he kept on with his message until midnight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now there were numerous lights in the upper room where we were assembled,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And there was a young man named Eutychus sitting in the window. He was borne down with deep sleep as Paul kept on talking still longer, and [finally] completely overcome by sleep, he fell down from the third story and was picked up dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But Paul went down and bent over him and embraced him, saying, Make no ado; his life is within him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When Paul had gone back upstairs and had broken bread and eaten [with them], and after he had talked confidentially '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' communed with them for a considerable time–until daybreak [in fact]–he departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They took the youth home alive, and were not a little comforted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refreshed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But going on ahead to the ship, the rest of us set sail for Assos, intending to take Paul aboard there, for that was what he had directed, intending himself to go by land [on foot].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So when he met us at Assos, we took him aboard and sailed on to Mitylene.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And sailing from there, we arrived the day after at a point opposite Chios; the following day we struck across to Samos, and the next day we arrived at Miletus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For Paul had determined to sail on past Ephesus, lest he might have to spend time [unnecessarily] in [the province of] Asia; for he was hastening on so that he might reach Jerusalem, if at all possible, by the day of Pentecost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' However, from Miletus he sent to Ephesus and summoned the elders of the church [to come to him there].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when they arrived he said to them: You yourselves are well acquainted with my manner of living among you from the first day that I set foot in [the province of] Asia, and how I continued afterward,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Serving the Lord with all humility in tears and in the midst of adversity (affliction and trials) which befell me, due to the plots of the Jews [against me];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' How I did not shrink from telling you anything that was for your benefit and teaching you in public meetings and from house to house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But constantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earnestly I bore testimony both to Jews and Greeks, urging them to turn in repentance [that is due] to God and to have faith in our Lord Jesus Christ [that is due Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And now, you see, I am going to Jerusalem, bound by the [Holy] Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obligated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compelled by the [convictions of my own] spirit, not knowing what will befall me there–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Except that the Holy Spirit clearly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' emphatically affirms to me in city after city that imprisonment and suffering await me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: none of these things move me;
  - type: text
    text: ' neither do I esteem my life dear to myself, if only I may finish my course '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with joy
  - type: text
    text: ' and the ministry which I have obtained from [which was entrusted to me by] the Lord Jesus, faithfully to attest to the good news (Gospel) of God''s grace (His unmerited favor, spiritual blessing, and mercy).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And now, observe, I perceive that all of you, among whom I have gone in and out proclaiming the kingdom, will see my face no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Therefore I testify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protest to you on this [our parting] day that I am clean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not responsible for the blood of any of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For I never shrank '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' kept back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fell short from declaring to you the whole purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Take care '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be on guard for yourselves and the whole flock over which the Holy Spirit has appointed you bishops and guardians, to shepherd (tend and feed and guide) the church of the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God
  - type: text
    text: ' which He obtained for Himself [buying it and saving it for Himself] with His own blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I know that after I am gone, ferocious wolves will get in among you, not sparing the flock;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Even from among your own selves men will come to the front who, by saying perverse (distorted and corrupt) things, will endeavor to draw away the disciples after them [to their own party].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Therefore be always alert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on your guard, being mindful that for three years I never stopped night or day seriously to admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exhort you one by one with tears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And now [brethren], I commit you to God [I deposit you in His charge, entrusting you to His protection and care]. And I commend you to the Word of His grace [to the commands and counsels and promises of His unmerited favor]. It is able to build you up and to give you [your rightful] inheritance among all God''s set-apart ones (those consecrated, purified, and transformed of soul).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' I coveted no man''s silver or gold or [costly] garments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' You yourselves know personally that these hands ministered to my own needs and those [of the persons] who were with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' In everything I have pointed out to you [by example] that, by working diligently in this manner, we ought to assist the weak, being mindful of the words of the Lord Jesus, how He Himself said, It is more blessed (makes one happier and more to be envied) to give than to receive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Having spoken thus, he knelt down with them all and prayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they all wept freely and threw their arms around Paul''s neck and kissed him fervently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repeatedly,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Being especially distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrowful because he had stated that they were about to see his face no more. And they accompanied him to the ship.'
