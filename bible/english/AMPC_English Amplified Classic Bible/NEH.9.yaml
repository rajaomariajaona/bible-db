document_id: NEH.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW ON the twenty-fourth day of this month, the Israelites were assembled with fasting and in sackcloth and with earth upon their heads.'
  '10':
  - type: text
    content: ' You performed signs and wonders against Pharaoh and all his servants and all the people of his land, for You knew that they dealt insolently against the Israelites. And You got for Yourself a name, as it is today.'
  '11':
  - type: text
    content: ' You divided the sea before them, so that they went through its midst on dry land; their persecutors You threw into the depths, as a stone into mighty waters.'
  '12':
  - type: text
    content: ' Moreover, by a pillar of cloud You led them by day, and by a pillar of fire by night to light the way they should go.'
  '13':
  - type: text
    content: ' You came down also upon Mount Sinai and spoke with them from Heaven and gave them right ordinances and true laws, good statutes and commandments.'
  '14':
  - type: text
    content: ' And You made known to them Your holy Sabbath and gave them commandments, statutes, and a law through Moses Your servant.'
  '15':
  - type: text
    content: ' You gave them bread from heaven for their hunger and brought water for them out of the rock for their thirst; and You told them to go in and possess the land You had sworn to give them. [John 6:31-34.]'
  '16':
  - type: text
    content: ' But they and our fathers acted presumptuously and stiffened their necks, and did not heed Your commandments.'
  '17':
  - type: text
    content: ' They refused to obey, nor were they mindful of Your wonders '
  - type: text
    content: and
  - type: text
    content: ' miracles which You did among them; but they stiffened their necks and in their rebellion appointed a captain, that they might return to their bondage [in Egypt]. But You are a God ready to pardon, gracious and merciful, slow to anger, and of great steadfast love; and You did not forsake them.'
  '18':
  - type: text
    content: ' Even when they had made for themselves a molten calf and said, This is your god, who brought you out of Egypt, and had committed great '
  - type: text
    content: and
  - type: text
    content: ' contemptible blasphemies,'
  '19':
  - type: text
    content: ' You in Your great mercy forsook them not in the wilderness; the pillar of the cloud departed not from them by day to lead them in the way, nor the pillar of fire by night to light the way they should go.'
  '2':
  - type: text
    content: ' And the Israelites separated themselves from all foreigners and stood and confessed their sins and the iniquities of their fathers.'
  '20':
  - type: text
    content: ' You also gave Your good Spirit to instruct them, and withheld not Your manna from them, and gave water for their thirst.'
  '21':
  - type: text
    content: ' Forty years You sustained them in the wilderness; they lacked nothing, their clothes did not wear out, and their feet did not swell.'
  '22':
  - type: text
    content: ' Also You gave them kingdoms and peoples and allotted to them every corner. So they possessed the land of Sihon king of Heshbon and the land of Og king of Bashan.'
  '23':
  - type: text
    content: ' Their children You also multiplied as the stars of heaven and brought them into the land which You told their fathers they should go in and possess.'
  '24':
  - type: text
    content: ' So the descendants went in and possessed the land; and You subdued before them the inhabitants of the land, the Canaanites, and gave them into their hands, with their kings and the peoples of the land, that they might do with them as they would.'
  '25':
  - type: text
    content: ' And they captured fortified cities and a rich land and took possession of houses full of all good things, cisterns hewn out, vineyards, olive orchards, and fruit trees in abundance. So they ate and were filled and became fat and delighted themselves in Your great goodness.'
  '26':
  - type: text
    content: ' Yet they were disobedient and rebelled against You and cast Your law behind their back and killed Your prophets who accused '
  - type: text
    content: and
  - type: text
    content: ' warned them to turn to You again; and they committed great '
  - type: text
    content: and
  - type: text
    content: ' contemptible blasphemies.'
  '27':
  - type: text
    content: ' Therefore You delivered them into the hand of their enemies, who distressed them. In the time of their suffering when they cried to You, You heard them from heaven, and according to Your abundant mercy You gave them deliverers, who saved them from their enemies.'
  '28':
  - type: text
    content: ' But after they had rest, they did evil again before You; therefore You left them in the hand of their enemies, so that they had dominion over them. Yet when they turned and cried to You, You heard them from heaven, and many times You delivered them according to Your mercies,'
  '29':
  - type: text
    content: ' And reproved '
  - type: text
    content: and
  - type: text
    content: ' warned them, that You might bring them again to Your law. Yet they acted presumptuously and did not heed Your commandments, but sinned against Your ordinances, which by keeping, a man shall live. And they turned a stubborn shoulder, stiffened their neck, and would not listen.'
  '3':
  - type: text
    content: ' And they stood in their place and read from the Book of the Law of the Lord their God for a fourth of the day, and for another fourth of it they confessed and worshiped the Lord their God.'
  '30':
  - type: text
    content: ' Yet You bore with them many years more and reproved '
  - type: text
    content: and
  - type: text
    content: ' warned them by Your Spirit through Your prophets; still they would not listen. Therefore You gave them into the power of the peoples of the lands.'
  '31':
  - type: text
    content: ' Yet in Your great mercies You did not utterly consume them or forsake them, for You are a gracious and merciful God.'
  '32':
  - type: text
    content: ' Now therefore, our God, the great, mighty, and terrible God, Who keeps covenant and mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, let not all the trouble '
  - type: text
    content: and
  - type: text
    content: ' hardship seem little to You–the hardship that has come upon us, our kings, our princes, our priests, our prophets, our fathers, and on all Your people, since the time of the kings of Assyria to this day.'
  '33':
  - type: text
    content: ' However, You are just in all that has come upon us; for You have dealt faithfully, but we have done wickedly;'
  '34':
  - type: text
    content: ' Our kings, our princes, our priests, and our fathers have not kept Your law or hearkened to Your commandments and Your warnings '
  - type: text
    content: and
  - type: text
    content: ' reproofs which You gave them.'
  '35':
  - type: text
    content: ' They did not serve You in their kingdom, and in Your great goodness that You gave them and in the large and rich land You set before them, nor did they turn from their wicked works.'
  '36':
  - type: text
    content: ' Behold, we are slaves this day, and as for the land that You gave to our fathers to eat the fruit and the good of it, behold, we are slaves in it.'
  '37':
  - type: text
    content: ' And its rich yield goes to the kings whom You have set over us because of our sins; they have power also over our bodies and over our livestock at their pleasure. And we are in great distress.'
  '38':
  - type: text
    content: ' Because of all this, we make a firm '
  - type: text
    content: and
  - type: text
    content: ' sure written covenant, and our princes, Levites, and priests set their seal to it.'
  '4':
  - type: text
    content: ' On the stairs of the Levites stood Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Chenani, and they cried with a loud voice to the Lord their God.'
  '5':
  - type: text
    content: ' Then the Levites–Jeshua, Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah–said, Stand up and bless the Lord your God from everlasting to everlasting. Blessed be Your glorious name which is exalted above all blessing and praise.'
  '6':
  - type: text
    content: ' [And Ezra said], You are the Lord, You alone; You have made heaven, the heaven of heavens, with all their host, the earth, and all that is on it, the seas and all that is in them; and You preserve them all, and the hosts of heaven worship You.'
  '7':
  - type: text
    content: ' You are the Lord, the God Who chose Abram and brought him out of Ur of the Chaldees and gave him the name Abraham.'
  '8':
  - type: text
    content: ' You found his heart faithful before You, and You made the covenant with him to give his descendants the land of the Canaanite, Hittite, Amorite, Perizzite, Jebusite, and Girgashite. And You have fulfilled Your promise, for You are just '
  - type: text
    content: and
  - type: text
    content: ' righteous.'
  '9':
  - type: text
    content: ' You saw our fathers'' affliction in Egypt, and You heard their cry at the Red Sea.'
