document_id: REV.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN I saw as the Lamb broke open one of the seven seals, and as if in a voice of thunder I heard one of the four living creatures call out, Come!'
  '10':
  - type: text
    content: ' They cried in a loud voice, O [Sovereign] Lord, holy and true, how long now before You will sit in judgment and avenge our blood upon those who dwell on the earth? [Gen. 4:10; Ps. 79:5; Zech. 1:12.]'
  '11':
  - type: text
    content: ' Then they were each given a long '
  - type: text
    content: and
  - type: text
    content: ' flowing '
  - type: text
    content: and
  - type: text
    content: ' festive white robe and told to rest '
  - type: text
    content: and
  - type: text
    content: ' wait patiently a little while longer, until the number should be complete of their fellow servants and their brethren who were to be killed as they themselves had been.'
  '12':
  - type: text
    content: ' When He [the Lamb] broke open the sixth seal, I looked, and there was a great earthquake; and the sun grew black as sackcloth of hair, [the full disc of] the moon became like blood. [Joel 2:10, 31.]'
  '13':
  - type: text
    content: ' And the stars of the sky dropped to the earth like a fig tree shedding its unripe fruit out of season when shaken by a strong wind. [Isa. 34:4.]'
  '14':
  - type: text
    content: ' And the sky rolled up like a scroll '
  - type: text
    content: and
  - type: text
    content: ' vanished, and every mountain and island was dislodged from its place.'
  '15':
  - type: text
    content: ' Then the kings of the earth and their noblemen and their magnates and their military chiefs and the wealthy and the strong and [everyone, whether] slave or free hid themselves in the caves and among the rocks of the mountains, [Isa. 2:10.]'
  '16':
  - type: text
    content: ' And they called to the mountains and the rocks, Fall on (before) us and hide us from the face of Him Who sits on the throne and from the deep-seated indignation '
  - type: text
    content: and
  - type: text
    content: ' wrath of the Lamb. [Isa. 2:19-21; Hos. 10:8.]'
  '17':
  - type: text
    content: ' For the great day of His wrath (vengeance, retribution, indignation) has come, and who is able to stand before it? [Joel 2:11; Mal. 3:2.]'
  '2':
  - type: text
    content: ' And I looked, and saw there a white horse whose rider carried a bow. And a crown was given him, and he rode forth conquering and to conquer. [Ps. 45:4, 5; Zech. 1:8; 6:1-3.]'
  '3':
  - type: text
    content: ' And when He broke the second seal, I heard the second living creature call out, Come!'
  '4':
  - type: text
    content: ' And another horse came out, flaming red. And its rider was empowered to take the peace from the earth, so that men slaughtered one another; and he was given a huge sword.'
  '5':
  - type: text
    content: ' When He broke open the third seal, I heard the third living creature call out, Come '
  - type: text
    content: and look
  - type: text
    content: ' ! And I saw, and behold, a black horse, and in his hand the rider had a pair of scales (a balance).'
  '6':
  - type: text
    content: ' And I heard what seemed to be a voice from the midst of the four living creatures, saying, A quart of wheat for a denarius [a whole day''s wages], and three quarts of barley for a denarius; but do not harm the oil and the wine! [II Kings 6:25.]'
  '7':
  - type: text
    content: ' When the Lamb broke open the fourth seal, I heard the fourth living creature call out, Come!'
  '8':
  - type: text
    content: ' So I looked, and behold, an ashy pale horse [black and blue as if made so by bruising], and its rider''s name was Death, and Hades (the realm of the dead) followed him closely. And they were given authority '
  - type: text
    content: and
  - type: text
    content: ' power over a fourth part of the earth to kill with the sword and with famine and with plague (pestilence, disease) and with wild beasts of the earth. [Ezek. 5:12; Hos. 13:14.]'
  '9':
  - type: text
    content: ' When the Lamb broke open the fifth seal, I saw at the foot of the altar the souls of those whose lives had been sacrificed for [adhering to] the Word of God and for the testimony they had borne.'
