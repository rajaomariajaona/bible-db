document_id: REV.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw as the Lamb broke open one of the seven seals, and as if in a voice of thunder I heard one of the four living creatures call out, Come!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I looked, and saw there a white horse whose rider carried a bow. And a crown was given him, and he rode forth conquering and to conquer. [Ps. 45:4, 5; Zech. 1:8; 6:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when He broke the second seal, I heard the second living creature call out, Come!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And another horse came out, flaming red. And its rider was empowered to take the peace from the earth, so that men slaughtered one another; and he was given a huge sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When He broke open the third seal, I heard the third living creature call out, Come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and look
  - type: text
    text: ' ! And I saw, and behold, a black horse, and in his hand the rider had a pair of scales (a balance).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I heard what seemed to be a voice from the midst of the four living creatures, saying, A quart of wheat for a denarius [a whole day''s wages], and three quarts of barley for a denarius; but do not harm the oil and the wine! [II Kings 6:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When the Lamb broke open the fourth seal, I heard the fourth living creature call out, Come!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So I looked, and behold, an ashy pale horse [black and blue as if made so by bruising], and its rider''s name was Death, and Hades (the realm of the dead) followed him closely. And they were given authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power over a fourth part of the earth to kill with the sword and with famine and with plague (pestilence, disease) and with wild beasts of the earth. [Ezek. 5:12; Hos. 13:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When the Lamb broke open the fifth seal, I saw at the foot of the altar the souls of those whose lives had been sacrificed for [adhering to] the Word of God and for the testimony they had borne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They cried in a loud voice, O [Sovereign] Lord, holy and true, how long now before You will sit in judgment and avenge our blood upon those who dwell on the earth? [Gen. 4:10; Ps. 79:5; Zech. 1:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then they were each given a long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flowing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' festive white robe and told to rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait patiently a little while longer, until the number should be complete of their fellow servants and their brethren who were to be killed as they themselves had been.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When He [the Lamb] broke open the sixth seal, I looked, and there was a great earthquake; and the sun grew black as sackcloth of hair, [the full disc of] the moon became like blood. [Joel 2:10, 31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the stars of the sky dropped to the earth like a fig tree shedding its unripe fruit out of season when shaken by a strong wind. [Isa. 34:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the sky rolled up like a scroll '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vanished, and every mountain and island was dislodged from its place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the kings of the earth and their noblemen and their magnates and their military chiefs and the wealthy and the strong and [everyone, whether] slave or free hid themselves in the caves and among the rocks of the mountains, [Isa. 2:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they called to the mountains and the rocks, Fall on (before) us and hide us from the face of Him Who sits on the throne and from the deep-seated indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath of the Lamb. [Isa. 2:19-21; Hos. 10:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For the great day of His wrath (vengeance, retribution, indignation) has come, and who is able to stand before it? [Joel 2:11; Mal. 3:2.]'
