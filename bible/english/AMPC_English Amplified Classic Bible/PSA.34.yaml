document_id: PSA.34,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David; when he pretended to be insane before Abimelech, who drove him out, and he went away.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I WILL bless the Lord at all times; His praise shall continually be in my mouth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The young lions lack food and suffer hunger, but they who seek (inquire of and require) the Lord [by right of their need and on the authority of His Word], none of them shall lack any beneficial thing.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Come, you children, listen to me; I will teach you to revere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear the Lord.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' What man is he who desires life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' longs for many days, that he may see good?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Keep your tongue from evil and your lips from speaking deceit.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Depart from evil and do good; seek, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crave peace and pursue (go after) it!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The eyes of the Lord are toward the [uncompromisingly] righteous and His ears are open to their cry.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The face of the Lord is against those who do evil, to cut off the remembrance of them from the earth. [I Pet. 3:10-12.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' When the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: righteous
    - type: text
      text: ' cry for help, the Lord hears, and delivers them out of all their distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' troubles.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The Lord is close to those who are of a broken heart and saves such as are crushed with sorrow for sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are humbly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly penitent.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Many evils confront the [consistently] righteous, but the Lord delivers him out of them all.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' My life makes its boast in the Lord; let the humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicted hear and be glad.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He keeps all his bones; not one of them is broken.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Evil shall cause the death of the wicked; and they who hate the just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous shall be held guilty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall be condemned.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The Lord redeems the lives of His servants, and none of those who take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust in Him shall be condemned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' held guilty.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' O magnify the Lord with me, and let us exalt His name together.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I sought (inquired of) the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' required Him [of necessity and on the authority of His Word], and He heard me, and delivered me from all my fears. [Ps. 73:25; Matt. 7:7.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They looked to Him and were radiant; their faces shall never blush for shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be confused.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' This poor man cried, and the Lord heard him, and saved him out of all his troubles.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Angel of the Lord encamps around those who fear Him [who revere and worship Him with awe] and each of them He delivers. [Ps. 18:1; 145:20.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' O taste and see that the Lord [our God] is good! Blessed (happy, fortunate, to be envied) is the man who trusts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' takes refuge in Him. [I Pet. 2:2, 3.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' O fear the Lord, you His saints [revere and worship Him]! For there is no want to those who truly revere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' godly fear.'
