document_id: PSA.34,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David; when he pretended to be insane before Abimelech, who drove him out, and he went away.
  - type: text
    content: ' I WILL bless the Lord at all times; His praise shall continually be in my mouth.'
  '10':
  - type: text
    content: ' The young lions lack food and suffer hunger, but they who seek (inquire of and require) the Lord [by right of their need and on the authority of His Word], none of them shall lack any beneficial thing.'
  '11':
  - type: text
    content: ' Come, you children, listen to me; I will teach you to revere '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear the Lord.'
  '12':
  - type: text
    content: ' What man is he who desires life '
  - type: text
    content: and
  - type: text
    content: ' longs for many days, that he may see good?'
  '13':
  - type: text
    content: ' Keep your tongue from evil and your lips from speaking deceit.'
  '14':
  - type: text
    content: ' Depart from evil and do good; seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' crave peace and pursue (go after) it!'
  '15':
  - type: text
    content: ' The eyes of the Lord are toward the [uncompromisingly] righteous and His ears are open to their cry.'
  '16':
  - type: text
    content: ' The face of the Lord is against those who do evil, to cut off the remembrance of them from the earth. [I Pet. 3:10-12.]'
  '17':
  - type: text
    content: ' When the '
  - type: text
    content: righteous
  - type: text
    content: ' cry for help, the Lord hears, and delivers them out of all their distress '
  - type: text
    content: and
  - type: text
    content: ' troubles.'
  '18':
  - type: text
    content: ' The Lord is close to those who are of a broken heart and saves such as are crushed with sorrow for sin '
  - type: text
    content: and
  - type: text
    content: ' are humbly '
  - type: text
    content: and
  - type: text
    content: ' thoroughly penitent.'
  '19':
  - type: text
    content: ' Many evils confront the [consistently] righteous, but the Lord delivers him out of them all.'
  '2':
  - type: text
    content: ' My life makes its boast in the Lord; let the humble '
  - type: text
    content: and
  - type: text
    content: ' afflicted hear and be glad.'
  '20':
  - type: text
    content: ' He keeps all his bones; not one of them is broken.'
  '21':
  - type: text
    content: ' Evil shall cause the death of the wicked; and they who hate the just '
  - type: text
    content: and
  - type: text
    content: ' righteous shall be held guilty '
  - type: text
    content: and
  - type: text
    content: ' shall be condemned.'
  '22':
  - type: text
    content: ' The Lord redeems the lives of His servants, and none of those who take refuge '
  - type: text
    content: and
  - type: text
    content: ' trust in Him shall be condemned '
  - type: text
    content: or
  - type: text
    content: ' held guilty.'
  '3':
  - type: text
    content: ' O magnify the Lord with me, and let us exalt His name together.'
  '4':
  - type: text
    content: ' I sought (inquired of) the Lord '
  - type: text
    content: and
  - type: text
    content: ' required Him [of necessity and on the authority of His Word], and He heard me, and delivered me from all my fears. [Ps. 73:25; Matt. 7:7.]'
  '5':
  - type: text
    content: ' They looked to Him and were radiant; their faces shall never blush for shame '
  - type: text
    content: or
  - type: text
    content: ' be confused.'
  '6':
  - type: text
    content: ' This poor man cried, and the Lord heard him, and saved him out of all his troubles.'
  '7':
  - type: text
    content: ' The Angel of the Lord encamps around those who fear Him [who revere and worship Him with awe] and each of them He delivers. [Ps. 18:1; 145:20.]'
  '8':
  - type: text
    content: ' O taste and see that the Lord [our God] is good! Blessed (happy, fortunate, to be envied) is the man who trusts '
  - type: text
    content: and
  - type: text
    content: ' takes refuge in Him. [I Pet. 2:2, 3.]'
  '9':
  - type: text
    content: ' O fear the Lord, you His saints [revere and worship Him]! For there is no want to those who truly revere '
  - type: text
    content: and
  - type: text
    content: ' worship Him '
  - type: text
    content: with
  - type: text
    content: ' godly fear.'
