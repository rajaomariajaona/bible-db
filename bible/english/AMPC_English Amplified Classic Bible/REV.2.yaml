document_id: REV.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' TO THE angel (messenger) of the assembly (church) in Ephesus write: These are the words of Him Who holds the seven stars [which are the messengers of the seven churches] in His right hand, Who goes about among the seven golden lampstands [which are the seven churches]:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I know your industry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' activities, laborious toil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble, and your patient endurance, and how you cannot tolerate wicked [men] and have tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' critically appraised those who call [themselves] apostles (special messengers of Christ) and yet are not, and have found them to be impostors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' liars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I know you are enduring patiently and are bearing up for My name''s sake, and you have not fainted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become exhausted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' grown weary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But I have this [one charge to make] against you: that you have left (abandoned) the love that you had at first [you have deserted Me, your first love].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Remember then from what heights you have fallen. Repent (change the inner man to meet God''s will) and do the works you did previously [when first you knew the Lord], or else I will visit you and remove your lampstand from its place, unless you change your mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Yet you have this [in your favor and to your credit]: you hate the works of the Nicolaitans [what they are doing as corrupters of the people], which I Myself also detest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give heed to what the Spirit says to the assemblies (churches). To him who overcomes (is victorious), I will grant to eat [of the fruit] of the tree of life, which is in the paradise of God. [Gen. 2:9; 3:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And to the angel (messenger) of the assembly (church) in Smyrna write: These are the words of the First and the Last, Who died and came to life again: [Isa. 44:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I know your affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pressing trouble and your poverty–but you are rich! and how you are abused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slandered by those who say they are Jews and are not, but are a synagogue of Satan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Fear nothing that you are about to suffer. [Dismiss your dread and your fears!] Behold, the devil is indeed about to throw some of you into prison, that you may be tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' critically appraised, and for ten days you will have affliction. Be loyally faithful unto death [even if you must die for it], and I will give you the crown of life. [Rev. 3:10, 11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the Spirit says to the assemblies (churches). He who overcomes (is victorious) shall in no way be injured by the second death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then to the angel (messenger) of the assembly (church) in Pergamum write: These are the words of Him Who has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wields the sharp two-edged sword:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I know where you live–a place where Satan sits enthroned. [Yet] you are clinging to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' holding fast My name, and you did not deny My faith, even in the days of Antipas, My witness, My faithful one, who was killed (martyred) in your midst–where Satan dwells.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Nevertheless, I have a few things against you: you have some people there who are clinging to the teaching of Balaam, who taught Balak to set a trap '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a stumbling block before the sons of Israel, [to entice them] to eat food that had been sacrificed to idols and to practice lewdness [giving themselves up to sexual vice]. [Num. 25:1, 2; 31:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You also have some who in a similar way are clinging to the teaching of the Nicolaitans [those corrupters of the people] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which thing I hate
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Repent [then]! Or else I will come to you quickly and fight against them with the sword of My mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the Spirit says to the assemblies (churches). To him who overcomes (conquers), I will give to eat of the manna that is hidden, and I will give him a white stone with a new name engraved on the stone, which no one knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understands except he who receives it. [Ps. 78:24; Isa. 62:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And to the angel (messenger) of the assembly (church) in Thyatira write: These are the words of the Son of God, Who has eyes that flash like a flame of fire, and Whose feet glow like bright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burnished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' white-hot bronze: [Dan. 10:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I know your record '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what you are doing, your love and faith and service and patient endurance, and that your recent works are more numerous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greater than your first ones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But I have this against you: that you tolerate the woman Jezebel, who calls herself a prophetess [claiming to be inspired], and who is teaching and leading astray my servants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beguiling them into practicing sexual vice and eating food sacrificed to idols. [I Kings 16:31; II Kings 9:22, 30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I gave her time to repent, but she has no desire to repent of her immorality [symbolic of idolatry] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuses to do so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Take note: I will throw her on a bed [of anguish], and those who commit adultery with her [her paramours] I will bring down to pressing distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severe affliction, unless they turn away their minds from conduct [such as] hers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repent of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And I will strike her children (her proper followers) dead [thoroughly exterminating them]. And all the assemblies (churches) shall recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that I am He Who searches minds (the thoughts, feelings, and purposes) and the [inmost] hearts, and I will give to each of you [the reward for what you have done] as your work deserves. [Ps. 62:12; Jer. 17:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But to the rest of you in Thyatira, who do not hold this teaching, who have not explored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' known the depths of Satan, as they say–I tell you that I do not lay upon you any other [fresh] burden:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Only hold fast to what you have until I come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And he who overcomes (is victorious) and who obeys My commands to the [very] end [doing the works that please Me], I will give him authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power over the nations;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And he shall rule them with a sceptre (rod) of iron, as when earthen pots are broken in pieces, and [his power over them shall be] like that which I Myself have received from My Father; [Ps. 2:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And I will give him the Morning Star.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the [Holy] Spirit says to the assemblies (churches).'
