document_id: REV.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' TO THE angel (messenger) of the assembly (church) in Ephesus write: These are the words of Him Who holds the seven stars [which are the messengers of the seven churches] in His right hand, Who goes about among the seven golden lampstands [which are the seven churches]:'
  '10':
  - type: text
    content: ' Fear nothing that you are about to suffer. [Dismiss your dread and your fears!] Behold, the devil is indeed about to throw some of you into prison, that you may be tested '
  - type: text
    content: and
  - type: text
    content: ' proved '
  - type: text
    content: and
  - type: text
    content: ' critically appraised, and for ten days you will have affliction. Be loyally faithful unto death [even if you must die for it], and I will give you the crown of life. [Rev. 3:10, 11.]'
  '11':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the Spirit says to the assemblies (churches). He who overcomes (is victorious) shall in no way be injured by the second death.'
  '12':
  - type: text
    content: ' Then to the angel (messenger) of the assembly (church) in Pergamum write: These are the words of Him Who has '
  - type: text
    content: and
  - type: text
    content: ' wields the sharp two-edged sword:'
  '13':
  - type: text
    content: ' I know where you live–a place where Satan sits enthroned. [Yet] you are clinging to '
  - type: text
    content: and
  - type: text
    content: ' holding fast My name, and you did not deny My faith, even in the days of Antipas, My witness, My faithful one, who was killed (martyred) in your midst–where Satan dwells.'
  '14':
  - type: text
    content: ' Nevertheless, I have a few things against you: you have some people there who are clinging to the teaching of Balaam, who taught Balak to set a trap '
  - type: text
    content: and
  - type: text
    content: ' a stumbling block before the sons of Israel, [to entice them] to eat food that had been sacrificed to idols and to practice lewdness [giving themselves up to sexual vice]. [Num. 25:1, 2; 31:16.]'
  '15':
  - type: text
    content: ' You also have some who in a similar way are clinging to the teaching of the Nicolaitans [those corrupters of the people] '
  - type: text
    content: which thing I hate
  - type: text
    content: .
  '16':
  - type: text
    content: ' Repent [then]! Or else I will come to you quickly and fight against them with the sword of My mouth.'
  '17':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the Spirit says to the assemblies (churches). To him who overcomes (conquers), I will give to eat of the manna that is hidden, and I will give him a white stone with a new name engraved on the stone, which no one knows '
  - type: text
    content: or
  - type: text
    content: ' understands except he who receives it. [Ps. 78:24; Isa. 62:2.]'
  '18':
  - type: text
    content: ' And to the angel (messenger) of the assembly (church) in Thyatira write: These are the words of the Son of God, Who has eyes that flash like a flame of fire, and Whose feet glow like bright '
  - type: text
    content: and
  - type: text
    content: ' burnished '
  - type: text
    content: and
  - type: text
    content: ' white-hot bronze: [Dan. 10:6.]'
  '19':
  - type: text
    content: ' I know your record '
  - type: text
    content: and
  - type: text
    content: ' what you are doing, your love and faith and service and patient endurance, and that your recent works are more numerous '
  - type: text
    content: and
  - type: text
    content: ' greater than your first ones.'
  '2':
  - type: text
    content: ' I know your industry '
  - type: text
    content: and
  - type: text
    content: ' activities, laborious toil '
  - type: text
    content: and
  - type: text
    content: ' trouble, and your patient endurance, and how you cannot tolerate wicked [men] and have tested '
  - type: text
    content: and
  - type: text
    content: ' critically appraised those who call [themselves] apostles (special messengers of Christ) and yet are not, and have found them to be impostors '
  - type: text
    content: and
  - type: text
    content: ' liars.'
  '20':
  - type: text
    content: ' But I have this against you: that you tolerate the woman Jezebel, who calls herself a prophetess [claiming to be inspired], and who is teaching and leading astray my servants '
  - type: text
    content: and
  - type: text
    content: ' beguiling them into practicing sexual vice and eating food sacrificed to idols. [I Kings 16:31; II Kings 9:22, 30.]'
  '21':
  - type: text
    content: ' I gave her time to repent, but she has no desire to repent of her immorality [symbolic of idolatry] '
  - type: text
    content: and
  - type: text
    content: ' refuses to do so.'
  '22':
  - type: text
    content: ' Take note: I will throw her on a bed [of anguish], and those who commit adultery with her [her paramours] I will bring down to pressing distress '
  - type: text
    content: and
  - type: text
    content: ' severe affliction, unless they turn away their minds from conduct [such as] hers '
  - type: text
    content: and
  - type: text
    content: ' repent of '
  - type: text
    content: their
  - type: text
    content: ' doings.'
  '23':
  - type: text
    content: ' And I will strike her children (her proper followers) dead [thoroughly exterminating them]. And all the assemblies (churches) shall recognize '
  - type: text
    content: and
  - type: text
    content: ' understand that I am He Who searches minds (the thoughts, feelings, and purposes) and the [inmost] hearts, and I will give to each of you [the reward for what you have done] as your work deserves. [Ps. 62:12; Jer. 17:10.]'
  '24':
  - type: text
    content: ' But to the rest of you in Thyatira, who do not hold this teaching, who have not explored '
  - type: text
    content: and
  - type: text
    content: ' known the depths of Satan, as they say–I tell you that I do not lay upon you any other [fresh] burden:'
  '25':
  - type: text
    content: ' Only hold fast to what you have until I come.'
  '26':
  - type: text
    content: ' And he who overcomes (is victorious) and who obeys My commands to the [very] end [doing the works that please Me], I will give him authority '
  - type: text
    content: and
  - type: text
    content: ' power over the nations;'
  '27':
  - type: text
    content: ' And he shall rule them with a sceptre (rod) of iron, as when earthen pots are broken in pieces, and [his power over them shall be] like that which I Myself have received from My Father; [Ps. 2:8, 9.]'
  '28':
  - type: text
    content: ' And I will give him the Morning Star.'
  '29':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the [Holy] Spirit says to the assemblies (churches).'
  '3':
  - type: text
    content: ' I know you are enduring patiently and are bearing up for My name''s sake, and you have not fainted '
  - type: text
    content: or
  - type: text
    content: ' become exhausted '
  - type: text
    content: or
  - type: text
    content: ' grown weary.'
  '4':
  - type: text
    content: ' But I have this [one charge to make] against you: that you have left (abandoned) the love that you had at first [you have deserted Me, your first love].'
  '5':
  - type: text
    content: ' Remember then from what heights you have fallen. Repent (change the inner man to meet God''s will) and do the works you did previously [when first you knew the Lord], or else I will visit you and remove your lampstand from its place, unless you change your mind '
  - type: text
    content: and
  - type: text
    content: ' repent.'
  '6':
  - type: text
    content: ' Yet you have this [in your favor and to your credit]: you hate the works of the Nicolaitans [what they are doing as corrupters of the people], which I Myself also detest.'
  '7':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' give heed to what the Spirit says to the assemblies (churches). To him who overcomes (is victorious), I will grant to eat [of the fruit] of the tree of life, which is in the paradise of God. [Gen. 2:9; 3:24.]'
  '8':
  - type: text
    content: ' And to the angel (messenger) of the assembly (church) in Smyrna write: These are the words of the First and the Last, Who died and came to life again: [Isa. 44:6.]'
  '9':
  - type: text
    content: ' I know your affliction '
  - type: text
    content: and
  - type: text
    content: ' distress '
  - type: text
    content: and
  - type: text
    content: ' pressing trouble and your poverty–but you are rich! and how you are abused '
  - type: text
    content: and
  - type: text
    content: ' reviled '
  - type: text
    content: and
  - type: text
    content: ' slandered by those who say they are Jews and are not, but are a synagogue of Satan.'
