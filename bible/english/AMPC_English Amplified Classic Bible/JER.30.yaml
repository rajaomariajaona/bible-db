document_id: JER.30,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE WORD that came to Jeremiah from the Lord:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Therefore fear not, O My servant Jacob, says the Lord, nor be dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cast down, O Israel; for behold, I will save you out of a distant land [of exile] and your posterity from the land of their captivity. Jacob will return and will be quiet and at ease, and none will make him afraid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cause him to be terrorized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to tremble.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For I am with you, says the Lord, to save you; for I will make a full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete end of all the nations to which I have scattered you, but I will not make a full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete end of you. But I will correct you in measure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with judgment and will in no sense hold you guiltless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leave you unpunished.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For thus says the Lord: Your hurt is incurable and your wound is grievous.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' There is none to plead your cause; for [the pressing together of] your wound you have no healing [device], no binding plaster.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' All your lovers (allies) have forgotten you; they neither seek, inquire of, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' require you. For I have hurt you with the wound of an enemy, with the chastisement of a cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciless foe, because of the greatness of your perversity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, because your sins are glaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innumerable.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Why do you cry out because of your hurt [the natural result of your sins]? Your pain is deadly (incurable). Because of the greatness of your perversity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, because your sins are glaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innumerable, I have done these things to you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Therefore all who devour you will be devoured; and all your adversaries, every one of them, will go into captivity. And they who despoil you will become a spoil, and all who prey upon you will I give for a prey.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For I will restore health to you, and I will heal your wounds, says the Lord, because they have called you an outcast, saying, This is Zion, whom no one seeks after '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for whom no one cares!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Thus says the Lord: Behold, I will release from captivity the tents of Jacob and have mercy on his dwelling places; the city will be rebuilt on its own [old] moundlike site, and the palace will be dwelt in after its former fashion.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Out of them [city and palace] will come songs of thanksgiving and the voices of those who make merry. And I will multiply them, and they will not be few; I will also glorify them, and they will not be small.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Thus says the Lord, the God of Israel: Write all the words that I have spoken to you in a book.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Their children too shall be as in former times, and their congregation shall be established before Me, and I will punish all who oppress them.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And their prince will be one of them, and their ruler will come from the midst of them. I will cause him to draw near and he will approach Me, for who is he who would have the boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' would dare [on his own initiative] to approach Me? says the Lord.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Then you will be My people, and I will be your God. [Jer. 7:23.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Behold, the tempest of the Lord has gone forth with wrath, a sweeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gathering tempest; it shall whirl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burst upon the heads of the wicked.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The fierce anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation of the Lord shall not turn back until He has executed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accomplished the thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intents of His mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart. In the latter days you shall understand this.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For, note well, the days are coming, says the Lord, when I will release from captivity My people Israel and Judah, says the Lord, and I will cause them to return to the land that I gave to their fathers, and they will possess it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And these are the words the Lord spoke concerning Israel and Judah:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Thus says the Lord: We have heard a voice of trembling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic–of terror, and not peace.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Ask now and see whether a man can give birth to a child? Why then do I see every man with his hands on his loins like a woman in labor? Why are all faces turned pale?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Alas! for that day will be great, so that none will be like it; it will be the time of Jacob''s [unequaled] trouble, but he will be saved out of it. [Matt. 24:29, 30; Rev. 7:14.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For it will come to pass in that day, says the Lord of hosts, that I will break [the oppressor''s] yoke from your neck, and I will burst your bonds; and strangers will no more make slaves of [the people of Israel].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But they will serve the Lord their God and David''s [descendant] their King, Whom I will raise up for them. [Jer. 23:5.]'
