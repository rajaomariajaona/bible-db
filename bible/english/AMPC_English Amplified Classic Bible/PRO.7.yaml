document_id: PRO.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MY SON, keep my words; lay up within you my commandments [for use when needed] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treasure them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Keep my commandments and live, and keep my law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaching as the apple (the pupil) of your eye.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Bind them on your fingers; write them on the tablet of your heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Say to skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom, You are my sister, and regard understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' insight as your intimate friend–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That they may keep you from the loose woman, from the adventuress who flatters with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes smooth her words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For at the window of my house I looked out through my lattice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And among the simple (empty-headed and emptyhearted) ones, I perceived among the youths a young man void of good sense,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Sauntering through the street near the [loose woman''s] corner; and he went the way to her house'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In the twilight, in the evening; night black and dense was falling [over the young man''s life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And behold, there met him a woman, dressed as a harlot and sly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cunning of heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' She is turbulent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willful; her feet stay not in her house;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now in the streets, now in the marketplaces, she sets her ambush at every corner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So she caught him and kissed him and with impudent face she said to him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Sacrifices of peace offerings were due from me; this day I paid my vows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So I came forth to meet you [that you might share with me the feast from my offering]; diligently I sought your face, and I have found you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I have spread my couch with rugs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cushions of tapestry, with striped sheets of fine linen of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I have perfumed my bed with myrrh, aloes, and cinnamon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Come, let us take our fill of love until morning; let us console '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight ourselves with love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the man is not at home; he is gone on a long journey;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He has taken a bag of money with him and will come home at the day appointed [at the full moon].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' With much justifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enticing argument she persuades him, with the allurements of her lips she leads him [to overcome his conscience and his fears] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forces him along.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Suddenly he [yields and] follows her reluctantly like an ox moving to the slaughter, like one in fetters going to the correction [to be given] to a fool '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like a dog enticed by food to the muzzle
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Till a dart [of passion] pierces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inflames his vitals; then like a bird fluttering straight into the net [he hastens], not knowing that it will cost him his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Listen to me now therefore, O you sons, and be attentive to the words of my mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Let not your heart incline toward her ways, do not stray into her paths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For she has cast down many wounded; indeed, all her slain are a mighty host. [Neh. 13:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Her house is the way to Sheol (Hades, the place of the dead), going down to the chambers of death.'
