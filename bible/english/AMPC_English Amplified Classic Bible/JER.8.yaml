document_id: JER.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THAT time, says the Lord, [the Babylonian army will break open the sepulchers, and] they shall bring out the bones of the kings of Judah, the bones of its princes, the bones of the priests, the bones of the prophets, and the bones of the inhabitants of Jerusalem from their graves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And they will [carelessly] scatter [the corpses] before the sun and the moon and all the host of heaven, which [the dead] have loved and which they have served and after which they have walked and which they have sought, inquired of, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' required and which they have worshiped. They shall not be gathered, or be buried; they shall be like dung upon the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And death shall be chosen rather than life by all the residue of those who remain of this evil family (nation), who remain in all the places to which I have driven them, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Moreover, you [Jeremiah] shall say to them, Thus says the Lord: Shall men fall and not rise up again? Shall one turn away [from God] and not repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return [to Him]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Why then is this people of Jerusalem turned away with a perpetual turning away [from Me]? They hold fast to deceit (idolatry); they refuse to repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return [to God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I have listened and heard, but they have not spoken aright; no man repents of his wickedness, saying, What have I done? Everyone turns to his [individual] course, as the horse rushes like a torrent into battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [Even the migratory birds are punctual to their seasons.] Yes, the stork [excelling in the great height of her flight] in the heavens knows her appointed times [of migration], and the turtledove, the swallow, and the crane observe the time of their return. But My people do not know the law of the Lord [which the lower animals instinctively recognize in so far as it applies to them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' How can you say, We are wise, and we have the written law of the Lord [and are learned in its language and teachings]? Behold, the truth is, the lying pen of the scribes has made of the law a falsehood (a mere code of ceremonial observances). [Mark 7:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The wise men shall be put to shame; they shall be dismayed and taken [captive]. Behold, they have rejected the word of the Lord, and what wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broad, full intelligence is in them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore will I give their wives to others and their fields to those who gain possession of them; for everyone, from the least even to the greatest, is given to covetousness (is greedy for unjust gain); from the prophet even to the priest, everyone deals falsely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For they have healed the wound of the daughter of My people only lightly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slightingly, saying, Peace, peace, when there is no peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They are brought to shame because they have committed abominations (extremely disgusting and shamefully vile things). And yet they were not at all ashamed, nor could they blush. Therefore they shall fall among those who fall; at the time of their punishment they shall be overthrown, says the Lord. [Jer. 6:12-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I will gather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sweep them away, utterly consuming them, says the Lord. [I will find] no grapes on the vine, nor figs on the fig tree, and even the leaf is withered; and the things that I have given them shall pass away from them [for I have appointed to them those who shall pass over them]. [Matt. 21:18, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [Then say the people to each other] Why do we sit still? Assemble yourselves, and let us enter into the fortified cities and be silent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perish there! For the Lord our God has decreed our ruin and given us bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poisonous water to drink, because we have sinned against the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' We looked for peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completeness, but no good came, and for a time of healing, but behold, dismay, trouble, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The snorting of [Nebuchadnezzar''s] horses is heard from Dan [on the northern border of Palestine]. At the sound of the neighing of his strong war-horses the whole land quakes; for they come and devour the land and all that is in it, the city and those who dwell in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For behold, I am sending among you serpents, adders which cannot be charmed, and they shall bite you, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Oh, that I [Jeremiah] could comfort myself against sorrow, [for my grief is beyond healing], my heart is sick '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint within me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Behold [says the prophet, listen to the voice of] the cry of the daughter of my people [for help] because of those who dwell in a far country: Is not the Lord in Zion? Is not her King in her? [But the Lord answers] Why have they provoked Me to anger with their carved images and with foreign idols?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The harvest is past, the summer has ended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the gathering of fruit is over, yet we are not saved! [comes again the voice of the people.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the hurt of the daughter of my people am I [Jeremiah] hurt; I go around mourning; dismay has taken hold on me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Is there no balm in Gilead? Is there no physician there? Why then is not the health of the daughter of my people restored? [Because Zion no longer enjoyed the presence of the Great Physician!] [Exod. 15:26.]'
