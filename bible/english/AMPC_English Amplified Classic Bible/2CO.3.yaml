document_id: 2CO.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ARE WE starting to commend ourselves again? Or we do not, like some [false teachers], need written credentials '
  - type: text
    content: or
  - type: text
    content: ' letters of recommendation to you or from you, [do we]?'
  '10':
  - type: text
    content: ' Indeed, in view of this fact, what once had splendor [the glory of the Law in the face of Moses] has come to have no splendor at all, because of the overwhelming glory that exceeds '
  - type: text
    content: and
  - type: text
    content: ' excels it [the glory of the Gospel in the face of Jesus Christ].'
  '11':
  - type: text
    content: ' For if that which was but passing '
  - type: text
    content: and
  - type: text
    content: ' fading away came with splendor, how much more must that which remains '
  - type: text
    content: and
  - type: text
    content: ' is permanent abide in glory '
  - type: text
    content: and
  - type: text
    content: ' splendor!'
  '12':
  - type: text
    content: ' Since we have such [glorious] hope (such joyful and confident expectation), we speak very freely '
  - type: text
    content: and
  - type: text
    content: ' openly '
  - type: text
    content: and
  - type: text
    content: ' fearlessly.'
  '13':
  - type: text
    content: ' Nor [do we act] like Moses, who put a veil over his face so that the Israelites might not gaze upon the finish of the vanishing [splendor which had been upon it].'
  '14':
  - type: text
    content: ' In fact, their minds were grown hard '
  - type: text
    content: and
  - type: text
    content: ' calloused [they had become dull and had lost the power of understanding]; for until this present day, when the Old Testament (the old covenant) is being read, that same veil still lies [on their hearts], not being lifted [to reveal] that in Christ it is made void '
  - type: text
    content: and
  - type: text
    content: ' done away.'
  '15':
  - type: text
    content: ' Yes, down to this [very] day whenever Moses is read, a veil lies upon their minds '
  - type: text
    content: and
  - type: text
    content: ' hearts.'
  '16':
  - type: text
    content: ' But whenever a person turns [in repentance] to the Lord, the veil is stripped off '
  - type: text
    content: and
  - type: text
    content: ' taken away.'
  '17':
  - type: text
    content: ' Now the Lord is the Spirit, and where the Spirit of the Lord is, there is liberty (emancipation from bondage, freedom). [Isa. 61:1, 2.]'
  '18':
  - type: text
    content: ' And all of us, as with unveiled face, [because we] continued to behold [in the Word of God] as in a mirror the glory of the Lord, are constantly being transfigured into His '
  - type: text
    content: very own
  - type: text
    content: ' image in ever increasing splendor '
  - type: text
    content: and
  - type: text
    content: ' from one degree of glory to another; [for this comes] from the Lord [Who is] the Spirit.'
  '2':
  - type: text
    content: ' [No] you yourselves are our letter of recommendation (our credentials), written in your hearts, to be known (perceived, recognized) and read by everybody.'
  '3':
  - type: text
    content: ' You show '
  - type: text
    content: and
  - type: text
    content: ' make obvious that you are a letter from Christ delivered by us, not written with ink but with [the] Spirit of [the] living God, not on tablets of stone but on tablets of human hearts. [Exod. 24:12; 31:18; 32:15, 16; Jer. 31:33.]'
  '4':
  - type: text
    content: ' Such is the reliance '
  - type: text
    content: and
  - type: text
    content: ' confidence that we have through Christ toward '
  - type: text
    content: and
  - type: text
    content: ' with reference to God.'
  '5':
  - type: text
    content: ' Not that we are fit (qualified and sufficient in ability) of ourselves to form personal judgments '
  - type: text
    content: or
  - type: text
    content: ' to claim '
  - type: text
    content: or
  - type: text
    content: ' count anything as coming from us, but our power '
  - type: text
    content: and
  - type: text
    content: ' ability '
  - type: text
    content: and
  - type: text
    content: ' sufficiency are from God.'
  '6':
  - type: text
    content: ' [It is He] Who has qualified us [making us to be fit and worthy and sufficient] as ministers '
  - type: text
    content: and
  - type: text
    content: ' dispensers of a new covenant [of salvation through Christ], not [ministers] of the letter (of legally written code) but of the Spirit; for the code [of the Law] kills, but the [Holy] Spirit makes alive. [Jer. 31:31.]'
  '7':
  - type: text
    content: ' Now if the dispensation of death engraved in letters on stone [the ministration of the Law], was inaugurated with such glory '
  - type: text
    content: and
  - type: text
    content: ' splendor that the Israelites were not able to look steadily at the face of Moses because of its brilliance, [a glory] that was to fade '
  - type: text
    content: and
  - type: text
    content: ' pass away, [Exod. 34:29-35.]'
  '8':
  - type: text
    content: ' Why should not the dispensation of the Spirit [this spiritual ministry whose task it is to cause men to obtain and be governed by the Holy Spirit] be attended with much greater '
  - type: text
    content: and
  - type: text
    content: ' more splendid glory?'
  '9':
  - type: text
    content: ' For if the service that condemns [the ministration of doom] had glory, how infinitely more abounding in splendor '
  - type: text
    content: and
  - type: text
    content: ' glory must be the service that makes righteous [the ministry that produces and fosters righteous living and right standing with God]!'
