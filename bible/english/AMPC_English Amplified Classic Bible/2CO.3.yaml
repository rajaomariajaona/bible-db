document_id: 2CO.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ARE WE starting to commend ourselves again? Or we do not, like some [false teachers], need written credentials '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' letters of recommendation to you or from you, [do we]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [No] you yourselves are our letter of recommendation (our credentials), written in your hearts, to be known (perceived, recognized) and read by everybody.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You show '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make obvious that you are a letter from Christ delivered by us, not written with ink but with [the] Spirit of [the] living God, not on tablets of stone but on tablets of human hearts. [Exod. 24:12; 31:18; 32:15, 16; Jer. 31:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Such is the reliance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence that we have through Christ toward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with reference to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Not that we are fit (qualified and sufficient in ability) of ourselves to form personal judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to claim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' count anything as coming from us, but our power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sufficiency are from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [It is He] Who has qualified us [making us to be fit and worthy and sufficient] as ministers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dispensers of a new covenant [of salvation through Christ], not [ministers] of the letter (of legally written code) but of the Spirit; for the code [of the Law] kills, but the [Holy] Spirit makes alive. [Jer. 31:31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now if the dispensation of death engraved in letters on stone [the ministration of the Law], was inaugurated with such glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor that the Israelites were not able to look steadily at the face of Moses because of its brilliance, [a glory] that was to fade '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pass away, [Exod. 34:29-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Why should not the dispensation of the Spirit [this spiritual ministry whose task it is to cause men to obtain and be governed by the Holy Spirit] be attended with much greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more splendid glory?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For if the service that condemns [the ministration of doom] had glory, how infinitely more abounding in splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory must be the service that makes righteous [the ministry that produces and fosters righteous living and right standing with God]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Indeed, in view of this fact, what once had splendor [the glory of the Law in the face of Moses] has come to have no splendor at all, because of the overwhelming glory that exceeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excels it [the glory of the Gospel in the face of Jesus Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For if that which was but passing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fading away came with splendor, how much more must that which remains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is permanent abide in glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Since we have such [glorious] hope (such joyful and confident expectation), we speak very freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fearlessly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Nor [do we act] like Moses, who put a veil over his face so that the Israelites might not gaze upon the finish of the vanishing [splendor which had been upon it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In fact, their minds were grown hard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calloused [they had become dull and had lost the power of understanding]; for until this present day, when the Old Testament (the old covenant) is being read, that same veil still lies [on their hearts], not being lifted [to reveal] that in Christ it is made void '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' done away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Yes, down to this [very] day whenever Moses is read, a veil lies upon their minds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But whenever a person turns [in repentance] to the Lord, the veil is stripped off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now the Lord is the Spirit, and where the Spirit of the Lord is, there is liberty (emancipation from bondage, freedom). [Isa. 61:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And all of us, as with unveiled face, [because we] continued to behold [in the Word of God] as in a mirror the glory of the Lord, are constantly being transfigured into His '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very own
  - type: text
    text: ' image in ever increasing splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from one degree of glory to another; [for this comes] from the Lord [Who is] the Spirit.'
