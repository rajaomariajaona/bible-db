document_id: JOB.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN BILDAD the Shuhite answered,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Dominion and fear are with [God]; He makes peace in His high places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Is there any number to His armies? And upon whom does not His light arise?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' How then can man be justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous before God? Or how can he who is born of a woman be pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clean? [Ps. 130:3; 143:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, even the moon has no brightness [compared to God''s glory] and the stars are not pure in His sight–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' How much less man, who is a maggot! And a son of man, who is a worm!'
