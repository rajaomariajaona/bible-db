document_id: JOB.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN BILDAD the Shuhite answered,'
  '2':
  - type: text
    content: ' Dominion and fear are with [God]; He makes peace in His high places.'
  '3':
  - type: text
    content: ' Is there any number to His armies? And upon whom does not His light arise?'
  '4':
  - type: text
    content: ' How then can man be justified '
  - type: text
    content: and
  - type: text
    content: ' righteous before God? Or how can he who is born of a woman be pure '
  - type: text
    content: and
  - type: text
    content: ' clean? [Ps. 130:3; 143:2.]'
  '5':
  - type: text
    content: ' Behold, even the moon has no brightness [compared to God''s glory] and the stars are not pure in His sight–'
  '6':
  - type: text
    content: ' How much less man, who is a maggot! And a son of man, who is a worm!'
