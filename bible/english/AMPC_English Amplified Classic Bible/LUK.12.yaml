verses:
  '1':
  - type: text
    content: ' IN THE meanwhile, when so many thousands of the people had gathered that they were trampling on one another, Jesus commenced by saying primarily to His disciples, Be on your guard against the leaven (ferment) of the Pharisees, which is hypocrisy [producing unrest and violent agitation].'
  '10':
  - type: text
    content: ' And everyone who makes a statement '
  - type: text
    content: or
  - type: text
    content: ' speaks a word against the Son of Man, it will be forgiven him; but he who blasphemes against the Holy Spirit [that is, whoever intentionally comes short of the reverence due the Holy Spirit], it will not be forgiven him [for him there is no forgiveness].'
  '11':
  - type: text
    content: ' And when they bring you before the synagogues and the magistrates and the authorities, do not be anxious [beforehand] how you shall reply in defense or what you are to say.'
  '12':
