    content: ' For from now on in one house there will be five divided [among themselves], three against two and two against three.'
  '53':
  - type: text
    content: ' They will be divided, father against son and son against father, mother against daughter and daughter against mother, mother-in-law against her daughter-in-law and daughter-in-law against her mother-in-law. [Mic. 7:6.]'
  '54':
  - type: text
    content: ' He also said to the crowds of people, When you see a cloud rising in the west, at once you say, It is going to rain! And so it does.'
  '55':
  - type: text
    content: ' And when [you see that] a south wind is blowing, you say, There will be severe heat! And it occurs.'
  '56':
