    content: ' If he comes in the second watch (before midnight) or the third watch (after midnight), and finds them so, blessed (happy, fortunate, and to be envied) are those servants!'
  '39':
  - type: text
    content: ' But of this be assured: if the householder had known at what time the burglar was coming, he would have been awake '
  - type: text
    content: and
  - type: text
    content: ' alert '
  - type: text
    content: and
  - type: text
    content: ' watching and would not have permitted his house to be dug through '
  - type: text
    content: and
  - type: text
    content: ' broken into.'
  '4':
  - type: text
    content: ' I tell you, My friends, do not dread '
  - type: text
    content: and
  - type: text
    content: ' be afraid of those who kill the body and after that have nothing more that they can do.'
  '40':
  - type: text
    content: ' You also must be ready, for the Son of Man is coming at an hour '
  - type: text
    content: and
  - type: text
    content: ' a moment when you do not anticipate it.'
  '41':
  - type: text
    content: ' Peter said, Lord, are You telling this parable for us, or for all alike?'
  '42':
  - type: text
    content: ' And the Lord said, Who then is that faithful steward, the wise man whom his master will set over those in his household service to supply them their allowance of food at the appointed time?'
  '43':
  - type: text
    content: ' Blessed (happy and to be envied) is that servant whom his master finds so doing when he arrives.'
  '44':
  - type: text
    content: ' Truly I tell you, he will set him in charge over all his possessions.'
  '45':
  - type: text
    content: ' But if that servant says in his heart, My master is late in coming, and begins to strike the menservants and the maids and to eat and drink and get drunk,'
  '46':
  - type: text
    content: ' The master of that servant will come on a day when he does not expect him and at an hour of which he does not know, and will punish him '
  - type: text
    content: and
  - type: text
    content: ' cut him off and assign his lot with the unfaithful.'
  '47':
  - type: text
    content: ' And that servant who knew his master''s will but did not get ready or act as he would wish him to act shall be beaten with many [lashes].'
  '48':
  - type: text
    content: ' But he who did not know and did things worthy of a beating shall be beaten with few [lashes]. For everyone to whom much is given, of him shall much be required; and of him to whom men entrust much, they will require '
  - type: text
    content: and
  - type: text
    content: ' demand all the more. [Num. 15:29, 30; Deut. 25:2, 3.]'
  '49':
  - type: text
    content: ' I have come to cast fire upon the earth, and how I wish that it were already kindled!'
  '5':
  - type: text
    content: ' But I will warn you whom you should fear: fear Him Who, after killing, has power to hurl into hell (Gehenna); yes, I say to you, fear Him!'
  '50':
  - type: text
    content: ' I have a baptism with which to be baptized, and how greatly '
  - type: text
    content: and
  - type: text
    content: ' sorely I am urged on (impelled, constrained) until it is accomplished!'
  '51':
  - type: text
    content: ' Do you suppose that I have come to give peace upon earth? No, I say to you, but rather division;'
  '52':
