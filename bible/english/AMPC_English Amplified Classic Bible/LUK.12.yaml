  '28':
  - type: text
    content: ' But if God so clothes the grass in the field, which is alive today, and tomorrow is thrown into the furnace, how much more will He clothe you, O you [people] of little faith?'
  '29':
  - type: text
    content: ' And you, do not seek [by meditating and reasoning to inquire into] what you are to eat and what you are to drink; nor be of anxious (troubled) mind [unsettled, excited, worried, and in suspense];'
  '3':
  - type: text
    content: ' Whatever you have spoken in the darkness shall be heard '
  - type: text
    content: and
  - type: text
    content: ' listened to in the light, and what you have whispered in [people''s] ears and behind closed doors will be proclaimed upon the housetops.'
  '30':
  - type: text
    content: ' For all the pagan world is [greedily] seeking these things, and your Father knows that you need them.'
  '31':
  - type: text
    content: ' Only aim at '
  - type: text
    content: and
  - type: text
    content: ' strive for '
  - type: text
    content: and
  - type: text
    content: ' seek His kingdom, and all these things shall be supplied to you also.'
  '32':
  - type: text
    content: ' Do not be seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' struck with fear, little flock, for it is your Father''s good pleasure to give you the kingdom!'
  '33':
  - type: text
    content: ' Sell what you possess and give donations to the poor; provide yourselves with purses '
  - type: text
