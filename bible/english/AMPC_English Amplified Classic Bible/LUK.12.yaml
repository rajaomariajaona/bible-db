    content: ' And be like men who are waiting for their master to return home from the marriage feast, so that when he returns from the wedding and comes and knocks, they may open to him immediately.'
  '37':
  - type: text
    content: ' Blessed (happy, fortunate, and to be envied) are those servants whom the master finds awake '
  - type: text
    content: and
  - type: text
    content: ' alert '
  - type: text
    content: and
  - type: text
    content: ' watching when he comes. Truly I say to you, he will gird himself and have them recline at table and will come and serve them!'
  '38':
