document_id: LUK.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE meanwhile, when so many thousands of the people had gathered that they were trampling on one another, Jesus commenced by saying primarily to His disciples, Be on your guard against the leaven (ferment) of the Pharisees, which is hypocrisy [producing unrest and violent agitation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Nothing is [so closely] covered up that it will not be revealed, or hidden that it will not be known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Whatever you have spoken in the darkness shall be heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listened to in the light, and what you have whispered in [people''s] ears and behind closed doors will be proclaimed upon the housetops.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I tell you, My friends, do not dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be afraid of those who kill the body and after that have nothing more that they can do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But I will warn you whom you should fear: fear Him Who, after killing, has power to hurl into hell (Gehenna); yes, I say to you, fear Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Are not five sparrows sold for two pennies? And [yet] not one of them is forgotten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' uncared for in the presence of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But [even] the very hairs of your head are all numbered. Do not be struck with fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' seized with alarm; you are of greater worth than many [flocks] of sparrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I tell you, Whoever declares openly [speaking out freely] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confesses that he is My worshiper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledges Me before men, the Son of Man also will declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge him before the angels of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But he who disowns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuses to acknowledge Me before men will be disowned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refused acknowledgement in the presence of the angels of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And everyone who makes a statement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' speaks a word against the Son of Man, it will be forgiven him; but he who blasphemes against the Holy Spirit [that is, whoever intentionally comes short of the reverence due the Holy Spirit], it will not be forgiven him [for him there is no forgiveness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And when they bring you before the synagogues and the magistrates and the authorities, do not be anxious [beforehand] how you shall reply in defense or what you are to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For the Holy Spirit will teach you in that very hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moment what [you] ought to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Someone from the crowd said to Him, Master, order my brother to divide the inheritance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share it with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But He told him, Man, who has appointed Me a judge or umpire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' divider over you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And He said to them, Guard yourselves and keep free from all covetousness (the immoderate desire for wealth, the greedy longing to have more); for a man''s life does not consist in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not derived from possessing overflowing abundance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' that which is over and above his needs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then He told them a parable, saying, The land of a rich man was fertile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yielded plentifully.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' debated within himself, What shall I do? I have no place [in which] to gather together my harvest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he said, I will do this: I will pull down my storehouses and build larger ones, and there I will store all my grain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or produce
  - type: text
    text: ' and my goods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I will say to my soul, Soul, you have many good things laid up, [enough] for many years. Take your ease; eat, drink, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enjoy yourself merrily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But God said to him, You fool! This very night they [the messengers of God] will demand your soul of you; and all the things that you have prepared, whose will they be? [Job 27:8; Jer. 17:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So it is with the one who continues to lay up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hoard possessions for himself and is not rich [in his relation] to God [this is how he fares].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And [Jesus] said to His disciples, Therefore I tell you, do not be anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled [with cares] about your life, as to what you will [have to] eat; or about your body, as to what you will [have to] wear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For life is more than food, and the body [more] than clothes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider the ravens; for they neither sow nor reap, they have neither storehouse nor barn; and [yet] God feeds them. Of how much more worth are you than the birds!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And which of you by being overly anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled with cares can add a cubit to his stature '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a moment [unit] of time to his age [the length of his life]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' If then you are not able to do such a little thing as that, why are you anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled with cares about the rest?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Consider the lilies, how they grow. They neither [wearily] toil nor spin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: weave;
  - type: text
    text: ' yet I tell you, even Solomon in all his glory (his splendor and magnificence) was not arrayed like one of these. [I Kings 10:4-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But if God so clothes the grass in the field, which is alive today, and tomorrow is thrown into the furnace, how much more will He clothe you, O you [people] of little faith?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And you, do not seek [by meditating and reasoning to inquire into] what you are to eat and what you are to drink; nor be of anxious (troubled) mind [unsettled, excited, worried, and in suspense];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For all the pagan world is [greedily] seeking these things, and your Father knows that you need them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Only aim at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strive for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek His kingdom, and all these things shall be supplied to you also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Do not be seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struck with fear, little flock, for it is your Father''s good pleasure to give you the kingdom!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Sell what you possess and give donations to the poor; provide yourselves with purses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handbags that do not grow old, an unfailing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inexhaustible treasure in the heavens, where no thief comes near and no moth destroys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For where your treasure is, there will your heart be also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Keep your loins girded and your lamps burning,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And be like men who are waiting for their master to return home from the marriage feast, so that when he returns from the wedding and comes and knocks, they may open to him immediately.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Blessed (happy, fortunate, and to be envied) are those servants whom the master finds awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watching when he comes. Truly I say to you, he will gird himself and have them recline at table and will come and serve them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' If he comes in the second watch (before midnight) or the third watch (after midnight), and finds them so, blessed (happy, fortunate, and to be envied) are those servants!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But of this be assured: if the householder had known at what time the burglar was coming, he would have been awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watching and would not have permitted his house to be dug through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broken into.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' You also must be ready, for the Son of Man is coming at an hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a moment when you do not anticipate it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Peter said, Lord, are You telling this parable for us, or for all alike?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the Lord said, Who then is that faithful steward, the wise man whom his master will set over those in his household service to supply them their allowance of food at the appointed time?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Blessed (happy and to be envied) is that servant whom his master finds so doing when he arrives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Truly I tell you, he will set him in charge over all his possessions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' But if that servant says in his heart, My master is late in coming, and begins to strike the menservants and the maids and to eat and drink and get drunk,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' The master of that servant will come on a day when he does not expect him and at an hour of which he does not know, and will punish him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut him off and assign his lot with the unfaithful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And that servant who knew his master''s will but did not get ready or act as he would wish him to act shall be beaten with many [lashes].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' But he who did not know and did things worthy of a beating shall be beaten with few [lashes]. For everyone to whom much is given, of him shall much be required; and of him to whom men entrust much, they will require '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demand all the more. [Num. 15:29, 30; Deut. 25:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' I have come to cast fire upon the earth, and how I wish that it were already kindled!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' I have a baptism with which to be baptized, and how greatly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorely I am urged on (impelled, constrained) until it is accomplished!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Do you suppose that I have come to give peace upon earth? No, I say to you, but rather division;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' For from now on in one house there will be five divided [among themselves], three against two and two against three.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' They will be divided, father against son and son against father, mother against daughter and daughter against mother, mother-in-law against her daughter-in-law and daughter-in-law against her mother-in-law. [Mic. 7:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' He also said to the crowds of people, When you see a cloud rising in the west, at once you say, It is going to rain! And so it does.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' And when [you see that] a south wind is blowing, you say, There will be severe heat! And it occurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' You playactors (hypocrites)! You know how [intelligently] to discern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove the looks of the earth and sky; but how is it that you do not know how to discern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apply the proof to this present time?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' And why do you not judge what is just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
