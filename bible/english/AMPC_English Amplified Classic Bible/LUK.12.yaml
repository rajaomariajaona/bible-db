    content: ' But God said to him, You fool! This very night they [the messengers of God] will demand your soul of you; and all the things that you have prepared, whose will they be? [Job 27:8; Jer. 17:11.]'
  '21':
  - type: text
    content: ' So it is with the one who continues to lay up '
  - type: text
    content: and
  - type: text
    content: ' hoard possessions for himself and is not rich [in his relation] to God [this is how he fares].'
  '22':
  - type: text
    content: ' And [Jesus] said to His disciples, Therefore I tell you, do not be anxious '
  - type: text
    content: and
  - type: text
    content: ' troubled [with cares] about your life, as to what you will [have to] eat; or about your body, as to what you will [have to] wear.'
  '23':
  - type: text
    content: ' For life is more than food, and the body [more] than clothes.'
  '24':
  - type: text
    content: ' Observe '
  - type: text
