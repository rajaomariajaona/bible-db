document_id: NUM.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in the Wilderness of Sinai in the Tent of Meeting on the first day of the second month in the second year after they came out of the land of Egypt, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Joseph: of Ephraim, Elishama son of Ammihud; of Manasseh, Gamaliel son of Pedahzur;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Benjamin, Abidan son of Gideoni;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Dan, Ahiezer son of Ammishaddai;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Asher, Pagiel son of Ochran;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Gad, Eliasaph son of Deuel;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Naphtali, Ahira son of Enan.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These were those chosen from the congregation, the leaders of their ancestral tribes, heads of thousands [the highest class of officers] in Israel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses and Aaron took these men who have been named,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And assembled all the congregation on the first day of the second month, and they declared their ancestry after their families, by their fathers'' houses, according to the number of names from twenty years old and upward, head by head,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As the Lord commanded Moses. So he numbered them in the Wilderness of Sinai.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take a census of all the males of the congregation of the Israelites by families, by their fathers'' houses, according to the number of names, head by head.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Reuben, Israel''s firstborn, their generations, by their families, by their fathers'' houses, according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Reuben numbered 46,500.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Simeon, their generations, by their families, by their fathers'' houses, those numbered of them according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war:'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Simeon numbered 59,300.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Gad, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all who were able to go to war:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Gad numbered 45,650.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Judah, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Judah numbered 74,600.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Issachar, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Issachar numbered 54,400.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From twenty years old and upward, all in Israel who are able to go forth to war you and Aaron shall number, company by company.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Zebulun, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Zebulun numbered 57,400.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Joseph: the sons of Ephraim, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Ephraim numbered 40,500.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Manasseh, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Manasseh numbered 32,200.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Benjamin, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Benjamin numbered 35,400.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Dan, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Dan numbered 62,700.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And with you there shall be a man [to assist you] from each tribe, each being the head of his father''s house.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Asher, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Asher numbered 41,500.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of the sons of Naphtali, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those of the tribe of Naphtali numbered 53,400.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These were numbered by Moses and Aaron, and the leaders of Israel, twelve men, each representing his father''s house.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So all those numbered of the Israelites, by their fathers'' houses, from twenty years old and upward, able to go to war in Israel,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All who were numbered were 603,550.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the Levites by their fathers'' tribe were not numbered with them.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord had said to Moses,'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Only the tribe of Levi you shall not number in the census of the Israelites.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And these are the names of the men who shall attend you: Of Reuben, Elizur son of Shedeur;'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But appoint the Levites over the tabernacle of the Testimony, and over all its vessels and furnishings and all things that belong to it. They shall carry the tabernacle [when journeying] and all its furnishings, and they shall minister to it and encamp around it.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the tabernacle is to go forward, the Levites shall take it down, and when the tabernacle is to be pitched, the Levites shall set it up. And the excluded [any not of the tribe of Levi] who approach the tabernacle shall be put to death.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Israelites shall pitch their tents by their companies, every man by his own camp and every man by his own [tribal] standard.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the Levites shall encamp around the tabernacle of the Testimony, that there may be no wrath upon the congregation of the Israelites; and the Levites shall keep charge of the tabernacle of the Testimony.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus did the Israelites; according to all that the Lord commanded Moses, so they did.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Simeon, Shelumiel son of Zurishaddai;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Judah, Nahshon son of Amminadab;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Issachar, Nethanel son of Zuar;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of Zebulun, Eliab son of Helon;'
