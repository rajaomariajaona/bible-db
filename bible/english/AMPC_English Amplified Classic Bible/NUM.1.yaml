document_id: NUM.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the Wilderness of Sinai in the Tent of Meeting on the first day of the second month in the second year after they came out of the land of Egypt, saying,'
  '10':
  - type: text
    content: ' Of the sons of Joseph: of Ephraim, Elishama son of Ammihud; of Manasseh, Gamaliel son of Pedahzur;'
  '11':
  - type: text
    content: ' Of Benjamin, Abidan son of Gideoni;'
  '12':
  - type: text
    content: ' Of Dan, Ahiezer son of Ammishaddai;'
  '13':
  - type: text
    content: ' Of Asher, Pagiel son of Ochran;'
  '14':
  - type: text
    content: ' Of Gad, Eliasaph son of Deuel;'
  '15':
  - type: text
    content: ' Of Naphtali, Ahira son of Enan.'
  '16':
  - type: text
    content: ' These were those chosen from the congregation, the leaders of their ancestral tribes, heads of thousands [the highest class of officers] in Israel.'
  '17':
  - type: text
    content: ' And Moses and Aaron took these men who have been named,'
  '18':
  - type: text
    content: ' And assembled all the congregation on the first day of the second month, and they declared their ancestry after their families, by their fathers'' houses, according to the number of names from twenty years old and upward, head by head,'
  '19':
  - type: text
    content: ' As the Lord commanded Moses. So he numbered them in the Wilderness of Sinai.'
  '2':
  - type: text
    content: ' Take a census of all the males of the congregation of the Israelites by families, by their fathers'' houses, according to the number of names, head by head.'
  '20':
  - type: text
    content: ' The sons of Reuben, Israel''s firstborn, their generations, by their families, by their fathers'' houses, according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war:'
  '21':
  - type: text
    content: ' Those of the tribe of Reuben numbered 46,500.'
  '22':
  - type: text
    content: ' Of the sons of Simeon, their generations, by their families, by their fathers'' houses, those numbered of them according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war:'
  '23':
  - type: text
    content: ' Those of the tribe of Simeon numbered 59,300.'
  '24':
  - type: text
    content: ' Of the sons of Gad, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all who were able to go to war:'
  '25':
  - type: text
    content: ' Those of the tribe of Gad numbered 45,650.'
  '26':
  - type: text
    content: ' Of the sons of Judah, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '27':
  - type: text
    content: ' Those of the tribe of Judah numbered 74,600.'
  '28':
  - type: text
    content: ' Of the sons of Issachar, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '29':
  - type: text
    content: ' Those of the tribe of Issachar numbered 54,400.'
  '3':
  - type: text
    content: ' From twenty years old and upward, all in Israel who are able to go forth to war you and Aaron shall number, company by company.'
  '30':
  - type: text
    content: ' Of the sons of Zebulun, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '31':
  - type: text
    content: ' Those of the tribe of Zebulun numbered 57,400.'
  '32':
  - type: text
    content: ' Of the sons of Joseph: the sons of Ephraim, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '33':
  - type: text
    content: ' Those of the tribe of Ephraim numbered 40,500.'
  '34':
  - type: text
    content: ' Of the sons of Manasseh, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '35':
  - type: text
    content: ' Those of the tribe of Manasseh numbered 32,200.'
  '36':
  - type: text
    content: ' Of the sons of Benjamin, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '37':
  - type: text
    content: ' Those of the tribe of Benjamin numbered 35,400.'
  '38':
  - type: text
    content: ' Of the sons of Dan, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '39':
  - type: text
    content: ' Those of the tribe of Dan numbered 62,700.'
  '4':
  - type: text
    content: ' And with you there shall be a man [to assist you] from each tribe, each being the head of his father''s house.'
  '40':
  - type: text
    content: ' Of the sons of Asher, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '41':
  - type: text
    content: ' Those of the tribe of Asher numbered 41,500.'
  '42':
  - type: text
    content: ' Of the sons of Naphtali, their generations, by their families, by their fathers'' houses, according to the number of names, from twenty years old and upward, all able to go to war:'
  '43':
  - type: text
    content: ' Those of the tribe of Naphtali numbered 53,400.'
  '44':
  - type: text
    content: ' These were numbered by Moses and Aaron, and the leaders of Israel, twelve men, each representing his father''s house.'
  '45':
  - type: text
    content: ' So all those numbered of the Israelites, by their fathers'' houses, from twenty years old and upward, able to go to war in Israel,'
  '46':
  - type: text
    content: ' All who were numbered were 603,550.'
  '47':
  - type: text
    content: ' But the Levites by their fathers'' tribe were not numbered with them.'
  '48':
  - type: text
    content: ' For the Lord had said to Moses,'
  '49':
  - type: text
    content: ' Only the tribe of Levi you shall not number in the census of the Israelites.'
  '5':
  - type: text
    content: ' And these are the names of the men who shall attend you: Of Reuben, Elizur son of Shedeur;'
  '50':
  - type: text
    content: ' But appoint the Levites over the tabernacle of the Testimony, and over all its vessels and furnishings and all things that belong to it. They shall carry the tabernacle [when journeying] and all its furnishings, and they shall minister to it and encamp around it.'
  '51':
  - type: text
    content: ' When the tabernacle is to go forward, the Levites shall take it down, and when the tabernacle is to be pitched, the Levites shall set it up. And the excluded [any not of the tribe of Levi] who approach the tabernacle shall be put to death.'
  '52':
  - type: text
    content: ' The Israelites shall pitch their tents by their companies, every man by his own camp and every man by his own [tribal] standard.'
  '53':
  - type: text
    content: ' But the Levites shall encamp around the tabernacle of the Testimony, that there may be no wrath upon the congregation of the Israelites; and the Levites shall keep charge of the tabernacle of the Testimony.'
  '54':
  - type: text
    content: ' Thus did the Israelites; according to all that the Lord commanded Moses, so they did.'
  '6':
  - type: text
    content: ' Of Simeon, Shelumiel son of Zurishaddai;'
  '7':
  - type: text
    content: ' Of Judah, Nahshon son of Amminadab;'
  '8':
  - type: text
    content: ' Of Issachar, Nethanel son of Zuar;'
  '9':
  - type: text
    content: ' Of Zebulun, Eliab son of Helon;'
