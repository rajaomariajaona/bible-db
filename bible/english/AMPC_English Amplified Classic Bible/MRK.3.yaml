document_id: MRK.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AGAIN JESUS went into a synagogue, and a man was there who had one withered hand [as the result of accident or disease].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And [the Pharisees] kept watching Jesus [closely] to see whether He would cure him on the Sabbath, so that they might get a charge to bring against Him [formally].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to the man who had the withered hand, Get up [and stand here] in the midst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And He said to them, Is it lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right on the Sabbath to do good or to do evil, to save life or to take it? But they kept silence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He glanced around at them with vexation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anger, grieved at the hardening of their hearts, and said to the man, Hold out your hand. He held it out, and his hand was [completely] restored.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the Pharisees went out and immediately held a consultation with the Herodians against Him, how they might [devise some means to] put Him to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Jesus retired with His disciples to the lake, and a great throng from Galilee followed Him. Also from Judea'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And from Jerusalem and Idumea and from beyond the Jordan and from about Tyre and Sidon–a vast multitude, hearing all the many things that He was doing, came to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And He told His disciples to have a little boat in [constant] readiness for Him because of the crowd, lest they press hard upon Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crush Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For He had healed so many that all who had distressing bodily diseases kept falling upon Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pressing upon Him in order that they might touch Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the spirits, the unclean ones, as often as they might see Him, fell down before Him and kept screaming out, You are the Son of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And He charged them strictly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severely under penalty again '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' again that they should not make Him known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And He went up on the hillside and called to Him [for Himself] those whom He wanted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chose, and they came to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And He appointed twelve to continue to be with Him, and that He might send them out to preach [as apostles or special messengers]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And to have authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heal the sick and to
  - type: text
    text: ' drive out demons:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [They were] Simon, and He surnamed [him] Peter;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' James son of Zebedee and John the brother of James, and He surnamed them Boanerges, that is, Sons of Thunder;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Andrew, and Philip, and Bartholomew (Nathaniel), and Matthew, and Thomas, and James son of Alphaeus, and Thaddaeus (Judas, not Iscariot), and Simon the Cananaean [also called Zelotes],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Judas Iscariot, he who betrayed Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then He went to a house [probably Peter''s], but a throng came together again, so that Jesus and His disciples could not even take food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And when those who belonged to Him (His kinsmen) heard it, they went out to take Him by force, for they kept saying, He is out of His mind (beside Himself, deranged)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the scribes who came down from Jerusalem said, He is possessed by Beelzebub, and, By [the help of] the prince of demons He is casting out demons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And He summoned them to Him and said to them in parables (illustrations or comparisons put beside truths to explain them), How can Satan drive out Satan?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And if a kingdom is divided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rebelling against itself, that kingdom cannot stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And if a house is divided (split into factions and rebelling) against itself, that house will not be able to last.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And if Satan has raised an insurrection against himself and is divided, he cannot stand but is [surely] coming to an end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But no one can go into a strong man''s house and ransack his household goods right and left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seize them as plunder unless he first binds the strong man; then indeed he may [thoroughly] plunder his house. [Isa. 49:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Truly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solemnly I say to you, all sins will be forgiven the sons of men, and whatever abusive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemous things they utter;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But whoever speaks abusively against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' maliciously misrepresents the Holy Spirit can never get forgiveness, but is guilty of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is in the grasp of an everlasting trespass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For they persisted in saying, He has an unclean spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then His mother and His brothers came and, standing outside, they sent word to Him, calling [for] Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And a crowd was sitting around Him, and they said to Him, Your mother and Your brothers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and Your sisters
  - type: text
    text: ' are outside asking for You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And He replied, Who are My mother and My brothers?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And looking around on those who sat in a circle about Him, He said, See! Here are My mother and My brothers;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' For whoever does the things God wills is My brother and sister and mother!'
