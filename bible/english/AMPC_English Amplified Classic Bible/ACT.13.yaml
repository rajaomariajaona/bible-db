document_id: ACT.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW IN the church (assembly) at Antioch there were prophets (inspired interpreters of the will and purposes of God) and teachers: Barnabas, Symeon who was called Niger [Black], Lucius of Cyrene, Manaen a member of the court of Herod the tetrarch, and Saul.'
  '10':
  - type: text
    content: ' And said, You master in every form of deception '
  - type: text
    content: and
  - type: text
    content: ' recklessness, unscrupulousness, '
  - type: text
    content: and
  - type: text
    content: ' wickedness, you son of the devil, you enemy of everything that is upright '
  - type: text
    content: and
  - type: text
    content: ' good, will you never stop perverting '
  - type: text
    content: and
  - type: text
    content: ' making crooked the straight paths of the Lord '
  - type: text
    content: and
  - type: text
    content: ' plotting against His saving purposes? [Hos. 14:9.]'
  '11':
  - type: text
    content: ' And now, behold, the hand of the Lord is upon you, and you will be blind, [so blind that you will be] unable to see the sun for a time. Instantly there fell upon him a mist and a darkness, and he groped about seeking persons who would lead him by the hand.'
  '12':
  - type: text
    content: ' Then the proconsul believed (became a Christian) when he saw what had occurred, for he was astonished '
  - type: text
    content: and
  - type: text
    content: ' deeply touched at the teaching concerning the Lord '
  - type: text
    content: and
  - type: text
    content: ' from Him.'
  '13':
  - type: text
    content: ' Now Paul and his companions sailed from Paphos and came to Perga in Pamphylia. And John [Mark] separated himself from them and went back to Jerusalem,'
  '14':
  - type: text
    content: ' But they [themselves] came on from Perga and arrived at Antioch in Pisidia. And on the Sabbath day they went into the synagogue there and sat down.'
  '15':
  - type: text
    content: ' After the reading of the Law and the Prophets, the leaders [of the worship] of the synagogue sent to them saying, Brethren, if you have any word of exhortation '
  - type: text
    content: or
  - type: text
    content: ' consolation '
  - type: text
    content: or
  - type: text
    content: ' encouragement for the people, say it.'
  '16':
  - type: text
    content: ' So Paul arose, and motioning with his hand said, Men of Israel and you who reverence '
  - type: text
    content: and
  - type: text
    content: ' fear God, listen!'
  '17':
  - type: text
    content: ' The God of this people Israel selected our forefathers and made this people great '
  - type: text
    content: and
  - type: text
    content: ' important during their stay in the land of Egypt, and then with an uplifted arm He led them out from there. [Exod. 6:1, 6.]'
  '18':
  - type: text
    content: ' And for about forty years '
  - type: text
    content: like a fatherly nurse
  - type: text
    content: ' He cared for them in the wilderness '
  - type: text
    content: and
  - type: text
    content: ' endured their behavior. [Deut. 1:31.]'
  '19':
  - type: text
    content: ' When He had destroyed seven nations in the land of Canaan, He gave them [the Hebrews] their land as an inheritance [distributing it to them by lot; all of which took] about 450 years. [Deut. 7:1; Josh. 14:1.]'
  '2':
  - type: text
    content: ' While they were worshiping the Lord and fasting, the Holy Spirit said, Separate now for Me Barnabas and Saul for the work to which I have called them.'
  '20':
  - type: text
    content: ' After that, He gave them judges until the prophet Samuel.'
  '21':
  - type: text
    content: ' Then they asked for a king; and God gave them Saul son of Kish, a man of the tribe of Benjamin, for forty years.'
  '22':
  - type: text
    content: ' And when He had deposed him, He raised up David to be their king; of him He bore witness and said, I have found David son of Jesse a man after My own heart, who will do all My will '
  - type: text
    content: and
  - type: text
    content: ' carry out My program fully. [I Sam. 13:14; Ps. 89:20; Isa. 44:28.]'
  '23':
  - type: text
    content: ' Of this man''s descendants God has brought to Israel a Savior [in the person of Jesus], according to His promise.'
  '24':
  - type: text
    content: ' Before His coming John had [already] preached baptism of repentance to all the people of Israel.'
  '25':
  - type: text
    content: ' And as John was ending his course, he asked, What '
  - type: text
    content: or
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' do you secretly think that I am? I am not He [the Christ. No], but note that after me One is coming, the sandals of Whose feet I am not worthy to untie!'
  '26':
  - type: text
    content: ' Brethren, sons of the family of Abraham, and all those others among you who reverence '
  - type: text
    content: and
  - type: text
    content: ' fear God, to us has been sent the message of this salvation [the salvation obtained through Jesus Christ]. [Ps. 107:20.]'
  '27':
  - type: text
    content: ' For those who dwell in Jerusalem and their rulers, because they did not know '
  - type: text
    content: or
  - type: text
    content: ' recognize Him or understand the utterances of the prophets which are read every Sabbath, have actually fulfilled these very predictions by condemning '
  - type: text
    content: and
  - type: text
    content: ' sentencing [Him].'
  '28':
  - type: text
    content: ' And although they could find no cause deserving death with which to charge Him, yet they asked Pilate to have Him executed '
  - type: text
    content: and
  - type: text
    content: ' put out of the way.'
  '29':
  - type: text
    content: ' And when they had finished '
  - type: text
    content: and
  - type: text
    content: ' fulfilled everything that was written about Him, they took Him down from the tree and laid Him in a tomb.'
  '3':
  - type: text
    content: ' Then after fasting and praying, they put their hands on them and sent them away.'
  '30':
  - type: text
    content: ' But God raised Him from the dead.'
  '31':
  - type: text
    content: ' And for many days He appeared to those who came up with Him from Galilee to Jerusalem, and they are His witnesses to the people.'
  '32':
  - type: text
    content: ' So now we are bringing you the good news (Gospel) that what God promised to our forefathers,'
  '33':
  - type: text
    content: ' This He has completely fulfilled for us, their children, by raising up Jesus, as it is written in the second psalm, You are My Son; today I have begotten You [caused You to arise, to be born; formally shown You to be the Messiah by the resurrection]. [Ps. 2:7.]'
  '34':
  - type: text
    content: ' And as to His having raised Him from among the dead, now no more to return to [undergo] putrefaction '
  - type: text
    content: and
  - type: text
    content: ' dissolution [of the grave], He spoke in this way, I will fulfill '
  - type: text
    content: and
  - type: text
    content: ' give to you the holy and sure mercy '
  - type: text
    content: and
  - type: text
    content: ' blessings [that were promised and assured] to David. [Isa. 55:3.]'
  '35':
  - type: text
    content: ' For this reason He says also in another psalm, You will not allow Your Holy One to see corruption [to undergo putrefaction and dissolution of the grave]. [Ps. 16:10.]'
  '36':
  - type: text
    content: ' For David, after he had served God''s will '
  - type: text
    content: and
  - type: text
    content: ' purpose '
  - type: text
    content: and
  - type: text
    content: ' counsel in his own generation, fell asleep [in death] and was buried among his forefathers, and he did see corruption '
  - type: text
    content: and
  - type: text
    content: ' undergo putrefaction '
  - type: text
    content: and
  - type: text
    content: ' dissolution [of the grave].'
  '37':
  - type: text
    content: ' But He Whom God raised up [to life] saw no corruption [did not experience putrefaction and dissolution of the grave].'
  '38':
  - type: text
    content: ' So let it be clearly known '
  - type: text
    content: and
  - type: text
    content: ' understood by you, brethren, that through this Man forgiveness '
  - type: text
    content: and
  - type: text
    content: ' removal of sins is now proclaimed to you;'
  '39':
  - type: text
    content: ' And that through Him everyone who believes [who acknowledges Jesus as his Savior and devotes himself to Him] is absolved (cleared and freed) from every charge from which he could not be justified '
  - type: text
    content: and
  - type: text
    content: ' freed by the Law of Moses '
  - type: text
    content: and
  - type: text
    content: ' given right standing with God.'
  '4':
  - type: text
    content: ' So then, being sent out by the Holy Spirit, they went down to Seleucia, and from [that port] they sailed away to Cyprus.'
  '40':
  - type: text
    content: ' Take care, therefore, lest there come upon you what is spoken in the prophets:'
  '41':
  - type: text
    content: ' Look, you scoffers '
  - type: text
    content: and
  - type: text
    content: ' scorners, and marvel and perish '
  - type: text
    content: and
  - type: text
    content: ' vanish away; for I am doing a deed in your days, a deed which you will never have confidence in '
  - type: text
    content: or
  - type: text
    content: ' believe, [even] if someone [clearly describing it in detail] declares it to you. [Hab. 1:5.]'
  '42':
  - type: text
    content: ' As they [Paul and Barnabas] went out [of the synagogue], the people earnestly begged that these things might be told to them [further] the next Sabbath.'
  '43':
  - type: text
    content: ' And when the congregation of the synagogue dispersed, many of the Jews and the devout converts to Judaism followed Paul and Barnabas, who talked to them and urged them to continue [to trust themselves to and to stand fast] in the grace (the unmerited favor and blessing) of God.'
  '44':
  - type: text
    content: ' The next Sabbath almost the entire city gathered together to hear the Word of God [concerning the attainment through Christ of salvation in the kingdom of God].'
  '45':
  - type: text
    content: ' But when the Jews saw the crowds, filled with envy '
  - type: text
    content: and
  - type: text
    content: ' jealousy they contradicted what was said by Paul and talked abusively [reviling and slandering him].'
  '46':
  - type: text
    content: ' And Paul and Barnabas spoke out plainly '
  - type: text
    content: and
  - type: text
    content: ' boldly, saying, It was necessary that God''s message [concerning salvation through Christ] should be spoken to you first. But since you thrust it from you, you pass this judgment on yourselves that you are unworthy of eternal life '
  - type: text
    content: and
  - type: text
    content: ' out of your own mouth you will be judged. [Now] behold, we turn to the Gentiles (the heathen).'
  '47':
  - type: text
    content: ' For so the Lord has charged us, saying, I have set you to be a light for the Gentiles (the heathen), that you may bring [eternal] salvation to the uttermost parts of the earth. [Isa. 49:6.]'
  '48':
  - type: text
    content: ' And when the Gentiles heard this, they rejoiced and glorified (praised and gave thanks for) the Word of God; and as many as were destined (appointed and ordained) to eternal life believed (adhered to, trusted in, and relied on Jesus as the Christ and their Savior).'
  '49':
  - type: text
    content: ' And so the Word of the Lord [concerning eternal salvation through Christ] scattered '
  - type: text
    content: and
  - type: text
    content: ' spread throughout the whole region.'
  '5':
  - type: text
    content: ' When they arrived at Salamis, they preached the Word of God [concerning the attainment through Christ of salvation in the kingdom of God] in the synagogues of the Jews. And they had John [Mark] as an attendant to assist them.'
  '50':
  - type: text
    content: ' But the Jews stirred up the devout women of high rank and the outstanding men of the town, and instigated persecution against Paul and Barnabas and drove them out of their boundaries.'
  '51':
  - type: text
    content: ' But [the apostles] shook off the dust from their feet against them and went to Iconium.'
  '52':
  - type: text
    content: ' And the disciples were continually filled [throughout their souls] with joy and the Holy Spirit.'
  '6':
  - type: text
    content: ' When they had passed through the entire island of Cyprus as far as Paphos, they came upon a certain Jewish wizard '
  - type: text
    content: or
  - type: text
    content: ' sorcerer, a false prophet named Bar-Jesus.'
  '7':
  - type: text
    content: ' He was closely associated with the proconsul, Sergius Paulus, who was an intelligent '
  - type: text
    content: and
  - type: text
    content: ' sensible man of sound understanding; he summoned to him Barnabas and Saul and sought to hear the Word of God [concerning salvation in the kingdom of God attained through Christ].'
  '8':
  - type: text
    content: ' But Elymas the wise man–for that is the translation of his name [which he had given himself]–opposed them, seeking to keep the proconsul from accepting the faith.'
  '9':
  - type: text
    content: ' But Saul, who is also called Paul, filled with '
  - type: text
    content: and
  - type: text
    content: ' controlled by the Holy Spirit, looked steadily at [Elymas]'
