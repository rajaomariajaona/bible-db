document_id: ACT.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW IN the church (assembly) at Antioch there were prophets (inspired interpreters of the will and purposes of God) and teachers: Barnabas, Symeon who was called Niger [Black], Lucius of Cyrene, Manaen a member of the court of Herod the tetrarch, and Saul.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And said, You master in every form of deception '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recklessness, unscrupulousness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wickedness, you son of the devil, you enemy of everything that is upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good, will you never stop perverting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' making crooked the straight paths of the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plotting against His saving purposes? [Hos. 14:9.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And now, behold, the hand of the Lord is upon you, and you will be blind, [so blind that you will be] unable to see the sun for a time. Instantly there fell upon him a mist and a darkness, and he groped about seeking persons who would lead him by the hand.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then the proconsul believed (became a Christian) when he saw what had occurred, for he was astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deeply touched at the teaching concerning the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from Him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Now Paul and his companions sailed from Paphos and came to Perga in Pamphylia. And John [Mark] separated himself from them and went back to Jerusalem,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But they [themselves] came on from Perga and arrived at Antioch in Pisidia. And on the Sabbath day they went into the synagogue there and sat down.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' After the reading of the Law and the Prophets, the leaders [of the worship] of the synagogue sent to them saying, Brethren, if you have any word of exhortation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' consolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' encouragement for the people, say it.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' So Paul arose, and motioning with his hand said, Men of Israel and you who reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear God, listen!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The God of this people Israel selected our forefathers and made this people great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' important during their stay in the land of Egypt, and then with an uplifted arm He led them out from there. [Exod. 6:1, 6.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And for about forty years '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like a fatherly nurse
    - type: text
      text: ' He cared for them in the wilderness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endured their behavior. [Deut. 1:31.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' When He had destroyed seven nations in the land of Canaan, He gave them [the Hebrews] their land as an inheritance [distributing it to them by lot; all of which took] about 450 years. [Deut. 7:1; Josh. 14:1.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' While they were worshiping the Lord and fasting, the Holy Spirit said, Separate now for Me Barnabas and Saul for the work to which I have called them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' After that, He gave them judges until the prophet Samuel.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then they asked for a king; and God gave them Saul son of Kish, a man of the tribe of Benjamin, for forty years.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And when He had deposed him, He raised up David to be their king; of him He bore witness and said, I have found David son of Jesse a man after My own heart, who will do all My will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carry out My program fully. [I Sam. 13:14; Ps. 89:20; Isa. 44:28.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Of this man''s descendants God has brought to Israel a Savior [in the person of Jesus], according to His promise.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Before His coming John had [already] preached baptism of repentance to all the people of Israel.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And as John was ending his course, he asked, What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' do you secretly think that I am? I am not He [the Christ. No], but note that after me One is coming, the sandals of Whose feet I am not worthy to untie!'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Brethren, sons of the family of Abraham, and all those others among you who reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear God, to us has been sent the message of this salvation [the salvation obtained through Jesus Christ]. [Ps. 107:20.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For those who dwell in Jerusalem and their rulers, because they did not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' recognize Him or understand the utterances of the prophets which are read every Sabbath, have actually fulfilled these very predictions by condemning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sentencing [Him].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And although they could find no cause deserving death with which to charge Him, yet they asked Pilate to have Him executed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put out of the way.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And when they had finished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fulfilled everything that was written about Him, they took Him down from the tree and laid Him in a tomb.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then after fasting and praying, they put their hands on them and sent them away.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But God raised Him from the dead.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And for many days He appeared to those who came up with Him from Galilee to Jerusalem, and they are His witnesses to the people.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' So now we are bringing you the good news (Gospel) that what God promised to our forefathers,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' This He has completely fulfilled for us, their children, by raising up Jesus, as it is written in the second psalm, You are My Son; today I have begotten You [caused You to arise, to be born; formally shown You to be the Messiah by the resurrection]. [Ps. 2:7.]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And as to His having raised Him from among the dead, now no more to return to [undergo] putrefaction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dissolution [of the grave], He spoke in this way, I will fulfill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give to you the holy and sure mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessings [that were promised and assured] to David. [Isa. 55:3.]'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' For this reason He says also in another psalm, You will not allow Your Holy One to see corruption [to undergo putrefaction and dissolution of the grave]. [Ps. 16:10.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' For David, after he had served God''s will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counsel in his own generation, fell asleep [in death] and was buried among his forefathers, and he did see corruption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undergo putrefaction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dissolution [of the grave].'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' But He Whom God raised up [to life] saw no corruption [did not experience putrefaction and dissolution of the grave].'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' So let it be clearly known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understood by you, brethren, that through this Man forgiveness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' removal of sins is now proclaimed to you;'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And that through Him everyone who believes [who acknowledges Jesus as his Savior and devotes himself to Him] is absolved (cleared and freed) from every charge from which he could not be justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' freed by the Law of Moses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given right standing with God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So then, being sent out by the Holy Spirit, they went down to Seleucia, and from [that port] they sailed away to Cyprus.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Take care, therefore, lest there come upon you what is spoken in the prophets:'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Look, you scoffers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorners, and marvel and perish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vanish away; for I am doing a deed in your days, a deed which you will never have confidence in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' believe, [even] if someone [clearly describing it in detail] declares it to you. [Hab. 1:5.]'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' As they [Paul and Barnabas] went out [of the synagogue], the people earnestly begged that these things might be told to them [further] the next Sabbath.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' And when the congregation of the synagogue dispersed, many of the Jews and the devout converts to Judaism followed Paul and Barnabas, who talked to them and urged them to continue [to trust themselves to and to stand fast] in the grace (the unmerited favor and blessing) of God.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' The next Sabbath almost the entire city gathered together to hear the Word of God [concerning the attainment through Christ of salvation in the kingdom of God].'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' But when the Jews saw the crowds, filled with envy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jealousy they contradicted what was said by Paul and talked abusively [reviling and slandering him].'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And Paul and Barnabas spoke out plainly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldly, saying, It was necessary that God''s message [concerning salvation through Christ] should be spoken to you first. But since you thrust it from you, you pass this judgment on yourselves that you are unworthy of eternal life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out of your own mouth you will be judged. [Now] behold, we turn to the Gentiles (the heathen).'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' For so the Lord has charged us, saying, I have set you to be a light for the Gentiles (the heathen), that you may bring [eternal] salvation to the uttermost parts of the earth. [Isa. 49:6.]'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And when the Gentiles heard this, they rejoiced and glorified (praised and gave thanks for) the Word of God; and as many as were destined (appointed and ordained) to eternal life believed (adhered to, trusted in, and relied on Jesus as the Christ and their Savior).'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' And so the Word of the Lord [concerning eternal salvation through Christ] scattered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spread throughout the whole region.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' When they arrived at Salamis, they preached the Word of God [concerning the attainment through Christ of salvation in the kingdom of God] in the synagogues of the Jews. And they had John [Mark] as an attendant to assist them.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' But the Jews stirred up the devout women of high rank and the outstanding men of the town, and instigated persecution against Paul and Barnabas and drove them out of their boundaries.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' But [the apostles] shook off the dust from their feet against them and went to Iconium.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' And the disciples were continually filled [throughout their souls] with joy and the Holy Spirit.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' When they had passed through the entire island of Cyprus as far as Paphos, they came upon a certain Jewish wizard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sorcerer, a false prophet named Bar-Jesus.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He was closely associated with the proconsul, Sergius Paulus, who was an intelligent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sensible man of sound understanding; he summoned to him Barnabas and Saul and sought to hear the Word of God [concerning salvation in the kingdom of God attained through Christ].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But Elymas the wise man–for that is the translation of his name [which he had given himself]–opposed them, seeking to keep the proconsul from accepting the faith.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But Saul, who is also called Paul, filled with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' controlled by the Holy Spirit, looked steadily at [Elymas]'
