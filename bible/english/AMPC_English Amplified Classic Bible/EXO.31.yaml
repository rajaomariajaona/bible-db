document_id: EXO.31,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' The finely worked garments, the holy garments for Aaron the [high] priest and for his sons to minister as priests,'
  '11':
  - type: text
    content: ' And the anointing oil and incense of sweet spices for the Holy Place. According to all that I have commanded you shall they do.'
  '12':
  - type: text
    content: ' And the Lord said to Moses,'
  '13':
  - type: text
    content: ' Say to the Israelites, Truly you shall keep My Sabbaths, for it is a sign between Me and you throughout your generations, that you may know that I, the Lord, sanctify you [set you apart for Myself].'
  '14':
  - type: text
    content: ' You shall keep the Sabbath therefore, for it is holy to you; everyone who profanes it shall surely be put to death; for whoever does work on the Sabbath shall be cut off from among his people.'
  '15':
  - type: text
    content: ' Six days may work be done, but the seventh is the Sabbath of rest, sacred to the Lord; whoever does work on the Sabbath day shall surely be put to death.'
  '16':
  - type: text
    content: ' Wherefore the Israelites shall keep the Sabbath to observe it throughout their generations, a perpetual covenant.'
  '17':
  - type: text
    content: ' It is a sign between Me and the Israelites forever; for in six days the Lord made the heavens and earth, and on the seventh day He ceased and was refreshed.'
  '18':
  - type: text
    content: ' And He gave to Moses, when He had ceased communing with him on Mount Sinai, the two tables of the Testimony, tables of stone, written with the finger of God.'
  '2':
  - type: text
    content: ' See, I have called by name Bezalel son of Uri, the son of Hur, of the tribe of Judah.'
  '3':
  - type: text
    content: ' And I have filled him with the Spirit of God, in wisdom '
  - type: text
    content: and
  - type: text
    content: ' ability, in understanding '
  - type: text
    content: and
  - type: text
    content: ' intelligence, and in knowledge, and in all kinds of craftsmanship,'
  '4':
  - type: text
    content: ' To devise skillful works, to work in gold, and in silver, and in bronze,'
  '5':
  - type: text
    content: ' And in cutting of stones for setting, and in carving of wood, to work in all kinds of craftsmanship.'
  '6':
  - type: text
    content: ' And behold, I have appointed with him Aholiab son of Ahisamach, of the tribe of Dan; and to all who are wisehearted I have given wisdom '
  - type: text
    content: and
  - type: text
    content: ' ability to make all that I have commanded you:'
  '7':
  - type: text
    content: ' The Tent of Meeting, the ark of the Testimony, the mercy seat that is on it, all the furnishings of the tent–'
  '8':
  - type: text
    content: ' The table [of the showbread] and its utensils, the pure lampstand with all its utensils, the altar of incense,'
  '9':
  - type: text
    content: ' The altar of burnt offering with all its utensils, the laver and its base–'
