document_id: EXO.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' See, I have called by name Bezalel son of Uri, the son of Hur, of the tribe of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I have filled him with the Spirit of God, in wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability, in understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intelligence, and in knowledge, and in all kinds of craftsmanship,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' To devise skillful works, to work in gold, and in silver, and in bronze,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And in cutting of stones for setting, and in carving of wood, to work in all kinds of craftsmanship.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And behold, I have appointed with him Aholiab son of Ahisamach, of the tribe of Dan; and to all who are wisehearted I have given wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability to make all that I have commanded you:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Tent of Meeting, the ark of the Testimony, the mercy seat that is on it, all the furnishings of the tent–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The table [of the showbread] and its utensils, the pure lampstand with all its utensils, the altar of incense,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The altar of burnt offering with all its utensils, the laver and its base–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The finely worked garments, the holy garments for Aaron the [high] priest and for his sons to minister as priests,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the anointing oil and incense of sweet spices for the Holy Place. According to all that I have commanded you shall they do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Say to the Israelites, Truly you shall keep My Sabbaths, for it is a sign between Me and you throughout your generations, that you may know that I, the Lord, sanctify you [set you apart for Myself].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall keep the Sabbath therefore, for it is holy to you; everyone who profanes it shall surely be put to death; for whoever does work on the Sabbath shall be cut off from among his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Six days may work be done, but the seventh is the Sabbath of rest, sacred to the Lord; whoever does work on the Sabbath day shall surely be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Wherefore the Israelites shall keep the Sabbath to observe it throughout their generations, a perpetual covenant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' It is a sign between Me and the Israelites forever; for in six days the Lord made the heavens and earth, and on the seventh day He ceased and was refreshed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And He gave to Moses, when He had ceased communing with him on Mount Sinai, the two tables of the Testimony, tables of stone, written with the finger of God.'
