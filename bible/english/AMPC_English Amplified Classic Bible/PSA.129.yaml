document_id: PSA.129
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MANY A time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' much have they afflicted me from my youth up–let Israel now say–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Many a time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' much have they afflicted me from my youth up, yet they have not prevailed against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The plowers plowed upon my back; they made long their furrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The Lord is [uncompromisingly] righteous; He has cut asunder the thick cords by which the wicked [enslaved us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Let them all be put to shame and turned backward who hate Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Let them be as the grass upon the housetops, which withers before it grows up,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' With which the mower fills not his hand, nor the binder of sheaves his bosom–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' While those who go by do not say, The blessing of the Lord be upon you! We bless you in the name of the Lord!'
