document_id: PSA.129,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Song of Ascents.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MANY A time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' much have they afflicted me from my youth up–let Israel now say–'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Many a time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' much have they afflicted me from my youth up, yet they have not prevailed against me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The plowers plowed upon my back; they made long their furrows.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The Lord is [uncompromisingly] righteous; He has cut asunder the thick cords by which the wicked [enslaved us].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let them all be put to shame and turned backward who hate Zion.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let them be as the grass upon the housetops, which withers before it grows up,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' With which the mower fills not his hand, nor the binder of sheaves his bosom–'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' While those who go by do not say, The blessing of the Lord be upon you! We bless you in the name of the Lord!'
