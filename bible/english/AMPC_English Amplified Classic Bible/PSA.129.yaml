document_id: PSA.129,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' MANY A time '
  - type: text
    content: and
  - type: text
    content: ' much have they afflicted me from my youth up–let Israel now say–'
  '2':
  - type: text
    content: ' Many a time '
  - type: text
    content: and
  - type: text
    content: ' much have they afflicted me from my youth up, yet they have not prevailed against me.'
  '3':
  - type: text
    content: ' The plowers plowed upon my back; they made long their furrows.'
  '4':
  - type: text
    content: ' The Lord is [uncompromisingly] righteous; He has cut asunder the thick cords by which the wicked [enslaved us].'
  '5':
  - type: text
    content: ' Let them all be put to shame and turned backward who hate Zion.'
  '6':
  - type: text
    content: ' Let them be as the grass upon the housetops, which withers before it grows up,'
  '7':
  - type: text
    content: ' With which the mower fills not his hand, nor the binder of sheaves his bosom–'
  '8':
  - type: text
    content: ' While those who go by do not say, The blessing of the Lord be upon you! We bless you in the name of the Lord!'
