document_id: EXO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE Lord said to Moses, Now you shall see what I will do to Pharaoh; for [compelled] by a strong hand he will [not only] let them go, but he will drive them out of his land with a strong hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And God said to Moses, I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I appeared to Abraham, to Isaac, and to Jacob as God Almighty [El-Shaddai], but by My name the Lord [Yahweh–the redemptive name of God] I did not make Myself known to them [in acts and great miracles]. [Gen. 17:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I have also established My covenant with them to give them the land of Canaan, the land of their temporary residence in which they were strangers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I have also heard the groaning of the Israelites whom the Egyptians have enslaved; and I have [earnestly] remembered My covenant [with Abraham, Isaac, and Jacob].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Accordingly, say to the Israelites, I am the Lord, and I will bring you out from under the burdens of the Egyptians, and I will free you from their bondage, and I will rescue you with an outstretched arm [with special and vigorous action] and by mighty acts of judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will take you to Me for a people, and I will be to you a God; and you shall know that it is I, the Lord your God, Who brings you out from under the burdens of the Egyptians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will bring you into the land concerning which I lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swore that I would give it to Abraham, Isaac, and Jacob; and I will give it to you for a heritage. I am the Lord [you have the pledge of My changeless omnipotence and faithfulness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Moses told this to the Israelites, but they refused to listen to Moses because of their impatience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish of spirit and because of their cruel bondage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Go in, tell Pharaoh king of Egypt to let the Israelites go out of his land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But Moses said to the Lord, Behold, [my own people] the Israelites have not listened to me; how then shall Pharaoh give heed to me, who am of deficient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impeded speech?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the Lord spoke to Moses and Aaron, and gave them a command for the Israelites and for Pharaoh king of Egypt, to bring the Israelites out of the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' These are the heads of their clans. The sons of Reuben, Israel''s firstborn: Hanoch, Pallu, Hezron, and Carmi; these are the families of Reuben.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman; these are the families of Simeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are the names of the sons of Levi according to their births: Gershon, Kohath, and Merari; and Levi lived 137 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The sons of Gershon: Libni and Shimi, by their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel; and Kohath lived 133 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The sons of Merari: Mahli and Mushi. These are the families of Levi according to their generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Amram took Jochebed his father''s sister as wife, and she bore him Aaron and Moses; and Amram lived 137 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The sons of Izhar: Korah, Nepheg, and Zichri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The sons of Uzziel: Mishael, Elzaphan, and Sithri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Aaron took Elisheba, daughter of Amminadab and sister of Nahshon, as wife; she bore him Nadab, Abihu, Eleazar, and Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The sons of Korah: Assir, Elkanah, and Abiasaph. These are the families of the Korahites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Eleazar, Aaron''s son, took one of the daughters of Putiel as wife; and she bore him Phinehas. These are the heads of the fathers'' houses of the Levites by their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' These are the [same] Aaron and Moses to whom the Lord said, Bring out the Israelites from the land of Egypt by their hosts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And who spoke to [the] Pharaoh king of Egypt about bringing the Israelites out of Egypt; these are that Moses and Aaron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' On the day when the Lord spoke to Moses in Egypt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The Lord said to Moses, I am the Lord; tell Pharaoh king of Egypt all that I say to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But Moses said to the Lord, Behold, I am of deficient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impeded speech; how then shall Pharaoh listen to me?'
