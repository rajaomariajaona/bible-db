document_id: EXO.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN THE Lord said to Moses, Now you shall see what I will do to Pharaoh; for [compelled] by a strong hand he will [not only] let them go, but he will drive them out of his land with a strong hand.'
  '10':
  - type: text
    content: ' The Lord said to Moses,'
  '11':
  - type: text
    content: ' Go in, tell Pharaoh king of Egypt to let the Israelites go out of his land.'
  '12':
  - type: text
    content: ' But Moses said to the Lord, Behold, [my own people] the Israelites have not listened to me; how then shall Pharaoh give heed to me, who am of deficient '
  - type: text
    content: and
  - type: text
    content: ' impeded speech?'
  '13':
  - type: text
    content: ' But the Lord spoke to Moses and Aaron, and gave them a command for the Israelites and for Pharaoh king of Egypt, to bring the Israelites out of the land of Egypt.'
  '14':
  - type: text
    content: ' These are the heads of their clans. The sons of Reuben, Israel''s firstborn: Hanoch, Pallu, Hezron, and Carmi; these are the families of Reuben.'
  '15':
  - type: text
    content: ' The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman; these are the families of Simeon.'
  '16':
  - type: text
    content: ' These are the names of the sons of Levi according to their births: Gershon, Kohath, and Merari; and Levi lived 137 years.'
  '17':
  - type: text
    content: ' The sons of Gershon: Libni and Shimi, by their families.'
  '18':
  - type: text
    content: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel; and Kohath lived 133 years.'
  '19':
  - type: text
    content: ' The sons of Merari: Mahli and Mushi. These are the families of Levi according to their generations.'
  '2':
  - type: text
    content: ' And God said to Moses, I am the Lord.'
  '20':
  - type: text
    content: ' Amram took Jochebed his father''s sister as wife, and she bore him Aaron and Moses; and Amram lived 137 years.'
  '21':
  - type: text
    content: ' The sons of Izhar: Korah, Nepheg, and Zichri.'
  '22':
  - type: text
    content: ' The sons of Uzziel: Mishael, Elzaphan, and Sithri.'
  '23':
  - type: text
    content: ' Aaron took Elisheba, daughter of Amminadab and sister of Nahshon, as wife; she bore him Nadab, Abihu, Eleazar, and Ithamar.'
  '24':
  - type: text
    content: ' The sons of Korah: Assir, Elkanah, and Abiasaph. These are the families of the Korahites.'
  '25':
  - type: text
    content: ' Eleazar, Aaron''s son, took one of the daughters of Putiel as wife; and she bore him Phinehas. These are the heads of the fathers'' houses of the Levites by their families.'
  '26':
  - type: text
    content: ' These are the [same] Aaron and Moses to whom the Lord said, Bring out the Israelites from the land of Egypt by their hosts,'
  '27':
  - type: text
    content: ' And who spoke to [the] Pharaoh king of Egypt about bringing the Israelites out of Egypt; these are that Moses and Aaron.'
  '28':
  - type: text
    content: ' On the day when the Lord spoke to Moses in Egypt,'
  '29':
  - type: text
    content: ' The Lord said to Moses, I am the Lord; tell Pharaoh king of Egypt all that I say to you.'
  '3':
  - type: text
    content: ' I appeared to Abraham, to Isaac, and to Jacob as God Almighty [El-Shaddai], but by My name the Lord [Yahweh–the redemptive name of God] I did not make Myself known to them [in acts and great miracles]. [Gen. 17:1.]'
  '30':
  - type: text
    content: ' But Moses said to the Lord, Behold, I am of deficient '
  - type: text
    content: and
  - type: text
    content: ' impeded speech; how then shall Pharaoh listen to me?'
  '4':
  - type: text
    content: ' I have also established My covenant with them to give them the land of Canaan, the land of their temporary residence in which they were strangers.'
  '5':
  - type: text
    content: ' I have also heard the groaning of the Israelites whom the Egyptians have enslaved; and I have [earnestly] remembered My covenant [with Abraham, Isaac, and Jacob].'
  '6':
  - type: text
    content: ' Accordingly, say to the Israelites, I am the Lord, and I will bring you out from under the burdens of the Egyptians, and I will free you from their bondage, and I will rescue you with an outstretched arm [with special and vigorous action] and by mighty acts of judgment.'
  '7':
  - type: text
    content: ' And I will take you to Me for a people, and I will be to you a God; and you shall know that it is I, the Lord your God, Who brings you out from under the burdens of the Egyptians.'
  '8':
  - type: text
    content: ' And I will bring you into the land concerning which I lifted up My hand '
  - type: text
    content: and
  - type: text
    content: ' swore that I would give it to Abraham, Isaac, and Jacob; and I will give it to you for a heritage. I am the Lord [you have the pledge of My changeless omnipotence and faithfulness].'
  '9':
  - type: text
    content: ' Moses told this to the Israelites, but they refused to listen to Moses because of their impatience '
  - type: text
    content: and
  - type: text
    content: ' anguish of spirit and because of their cruel bondage.'
