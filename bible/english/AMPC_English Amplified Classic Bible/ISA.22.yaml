document_id: ISA.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning the Valley of Vision: What do you mean [I wonder] that you have all gone up to the housetops,'
  '10':
  - type: text
    content: ' And you numbered the houses of Jerusalem, and you broke down the houses [to get materials] to fortify the [city] wall.'
  '11':
  - type: text
    content: ' You also made a reservoir between the two walls for the water of the Old Pool, but you did not look to the Maker of it, nor did you recognize Him Who planned it long ago.'
  '12':
  - type: text
    content: ' And in that day the Lord God of hosts called you to weeping and mourning, to the shaving off of all your hair [in humiliation] and to the girding with sackcloth.'
  '13':
  - type: text
    content: ' But instead, see the pleasure and mirth, slaying oxen and killing sheep, eating flesh and drinking wine, [with the idea] Let us eat and drink, for tomorrow we die!'
  '14':
  - type: text
    content: ' And the Lord of hosts revealed Himself in my ears [as He said], Surely this unatoned sin shall not be purged from you until [you are punished–and the punishment will be] death, says the Lord God of hosts.'
  '15':
  - type: text
    content: ' Come, go to this [contemptible] steward '
  - type: text
    content: and
  - type: text
    content: ' treasurer, to Shebna, who is over the house [but who is presumptuous enough to be building himself a tomb among those of the mighty, a tomb worthy of a king], and say to him,'
  '16':
  - type: text
    content: ' What business have you here? And whom have you entombed here, that you have the right to hew out for yourself a tomb here? He hews out a sepulcher for himself on the height! He carves out a dwelling for himself in the rock!'
  '17':
  - type: text
    content: ' Behold, the Lord will hurl you away violently, O you strong man; yes, He will take tight hold of you '
  - type: text
    content: and
  - type: text
    content: ' He will surely cover you [with shame].'
  '18':
  - type: text
    content: ' He will surely roll you up in a bundle [Shebna] and toss you like a ball into a large country; there you will die and there will be your splendid chariots, you disgrace to your master''s house!'
  '19':
  - type: text
    content: ' And I will thrust you from your office, and from your station will you be pulled down.'
  '2':
  - type: text
    content: ' You who are full of shouting, a tumultuous city, a joyous '
  - type: text
    content: and
  - type: text
    content: ' exultant city? [O Jerusalem] your slain warriors have not met [a glorious] death with the sword or in battle.'
  '20':
  - type: text
    content: ' And in that day I will call My servant, Eliakim son of Hilkiah.'
  '21':
  - type: text
    content: ' And I will clothe him with your robe and will bind your girdle on him and will commit your authority to his hand; he shall be a father to the inhabitants of Jerusalem and to the house of Judah.'
  '22':
  - type: text
    content: ' And the key of the house of David I will lay upon his shoulder; he shall open and no one shall shut, he shall shut and no one shall open.'
  '23':
  - type: text
    content: ' And I will fasten him like a peg '
  - type: text
    content: or
  - type: text
    content: ' nail in a firm place; and he will become a throne of honor '
  - type: text
    content: and
  - type: text
    content: ' glory to his father''s house.'
  '24':
  - type: text
    content: ' And they will hang on him the honor '
  - type: text
    content: and
  - type: text
    content: ' the whole weight of [responsibility for] his father''s house: the offspring and issue [of the family, high and low], every small vessel, from the cups even to all the flasks '
  - type: text
    content: and
  - type: text
    content: ' big bulging bottles.'
  '25':
  - type: text
    content: ' In that day, says the Lord of hosts, the nail '
  - type: text
    content: or
  - type: text
    content: ' peg that was fastened into the sure place shall give way '
  - type: text
    content: and
  - type: text
    content: ' be moved and be hewn down and fall, and the burden that was upon it shall be cut off; for the Lord has spoken it.'
  '3':
  - type: text
    content: ' All your [military] leaders have fled together; without the bow [which they had thrown away] they have been taken captive '
  - type: text
    content: and
  - type: text
    content: ' bound by the archers. All of you who were found were bound together [as captives], though they had fled far away.'
  '4':
  - type: text
    content: ' Therefore I [Isaiah] said, Look away from me; I will weep bitterly. Do not hasten '
  - type: text
    content: and
  - type: text
    content: ' try to comfort me over the destruction of the daughter of my people.'
  '5':
  - type: text
    content: ' For it is a day of discomfiture '
  - type: text
    content: and
  - type: text
    content: ' of tumult, of treading down, of confusion '
  - type: text
    content: and
  - type: text
    content: ' perplexity from the Lord God of hosts in the Valley of Vision, a day of breaking down the walls and of crying to the mountains.'
  '6':
  - type: text
    content: ' And [in my vision I saw] Elam take up the quiver, with troops in chariots, infantry, '
  - type: text
    content: and
  - type: text
    content: ' horsemen; and Kir [with Elam subject to Assyria] uncovered the shield.'
  '7':
  - type: text
    content: ' And it came to pass that your choicest valleys were full of chariots, and the horsemen took their station [and set themselves in offensive array at the gate of Jerusalem]. [Fulfilled in II Chron. 32; Isa. 36.]'
  '8':
  - type: text
    content: ' Then [God] removed the protective covering of Judah; and you looked to the weapons in the House of the Forest [the king''s armory] in that day. [I Kings 7:2; 10:17, 21.]'
  '9':
  - type: text
    content: ' You saw that the breaches [in the walls] of the City of David [the citadel of Zion] were many; [since the water supply was still defective] you collected [within the city''s walls] the waters of the Lower Pool.'
