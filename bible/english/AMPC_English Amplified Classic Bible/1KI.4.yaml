document_id: 1KI.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' KING SOLOMON was king over all Israel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Ben-hesed, in Arubboth (to him belonged Socoh and all the land of Hepher);'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Ben-abinadab, in Naphoth-dor (he had Taphath, Solomon''s daughter, as wife);'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Baana son of Ahilud, in Taanach, Megiddo, and all Beth-shean which is beside Zarethan below Jezreel, from Beth-shean to Abel-meholah as far as beyond Jokmeam;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Ben-geber, in Ramoth-gilead (to him belonged the villages of Jair son of Manasseh which are in Gilead, also the region of Argob which is in Bashan, sixty great cities with walls and bronze bars);'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Ahinadab son of Iddo, in Mahanaim;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Ahimaaz, in Naphtali (he had taken Basemath, Solomon''s daughter, as his wife);'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Baana son of Hushai, in Asher and Bealoth;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Jehoshaphat son of Paruah, in Issachar;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Shimei son of Ela, in Benjamin;'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Geber son of Uri, in Gilead, the country of Sihon king of the Amorites and of Og king of Bashan; only one officer was over all the country [at one time, each serving for one month].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' These were his chief officials: Azariah son of Zadok was the [high] priest;'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Judah and Israel were many, like the sand which is by the sea in multitude; they ate, drank, and rejoiced.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Solomon reigned over all the kingdoms from the [Euphrates] River to the land of the Philistines and to the border of Egypt; they brought tribute and served Solomon all the days of his life.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Solomon''s provision for one day was thirty measures of fine flour, sixty measures of meal,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Ten fat oxen, twenty pasture-fed cattle, a hundred sheep, besides harts, gazelles, roebucks, and fatted fowl of choice kinds.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' For he had dominion over all the region west of the [Euphrates] River, from Tiphsah to Gaza, over all the kings west of the River, and he had peace on all sides around him.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Judah and Israel dwelt safely, every man under his vine and fig tree, from Dan to Beersheba, all of Solomon''s days.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Solomon also had 40,000 stalls of horses for his chariots, and 12,000 horsemen.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And those officers provided food for King Solomon and for all who came to his table, every man in his month; they let nothing be lacking.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Barley also and straw for the horses and swift steeds they brought to the place where it was needed, each according to his assignment.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And God gave Solomon exceptionally much wisdom and understanding, and breadth of mind like the sand of the seashore.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Elihoreph and Ahijah, sons of Shisha, were secretaries; Jehoshaphat son of Ahilud was recorder;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Solomon''s wisdom excelled the wisdom of all the people of the East and all the wisdom of Egypt.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For he was wiser than all other men–than Ethan the Ezrahite, and Heman, Calcol, and Darda, the sons of Mahol. His fame was in all the nations round about.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' He also originated 3,000 proverbs, and his songs were 1,005.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' He spoke of trees, from the cedar that is in Lebanon to the hyssop that grows out of the wall; he spoke also of beasts, of birds, of creeping things, and of fish.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Men came from all peoples to hear the wisdom of Solomon, and from all kings of the earth who had heard of his wisdom.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Benaiah son of Jehoiada commanded the army; Zadok and Abiathar were priests;'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Azariah son of Nathan was over the officers; Zabud son of Nathan was priest and the king''s friend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' private advisor;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Ahishar was in charge of the palace; and Adoniram son of Abda was in charge of the forced labor.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Solomon had twelve officers over all Israel, who secured provisions for the king and his household; each man had to provide for a month in a year.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' These were their names: Ben-hur, in the hill country of Ephraim;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Ben-deker, in Makaz, Shaalbim, Beth-shemesh, and Elon-beth-hanan;'
