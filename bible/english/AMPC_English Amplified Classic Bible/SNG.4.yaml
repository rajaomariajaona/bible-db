document_id: SNG.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HOW FAIR you are, my love [he said], how very fair! Your eyes behind your veil [remind me] of those of a dove; your hair [makes me think of the black, wavy fleece] of a flock of [the Arabian] goats which one sees trailing down Mount Gilead [beyond the Jordan on the frontiers of the desert].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Your teeth are like a flock of shorn ewes which have come up from the washing, of which all are in pairs, and none is missing among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Your lips are like a thread of scarlet, and your mouth is lovely. Your cheeks are like halves of a pomegranate behind your veil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Your neck is like the tower of David, built for an arsenal, whereon hang a thousand bucklers, all of them shields of warriors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Your two breasts are like two fawns, like twins of a gazelle that feed among the lilies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Until the day breaks and the shadows flee away, [in my thoughts] I will get to the mountain of myrrh and the hill of frankincense [to him whom my soul adores].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [He exclaimed] O my love, how beautiful you are! There is no flaw in you! [John 14:18; Eph. 5:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Come away with me from Lebanon, my [promised] bride, come with me from Lebanon. Depart from the top of Amana, from the peak of Senir and Hermon, from the lions'' dens, from the mountains of the leopards. [II Cor. 11:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You have ravished my heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given me courage, my sister, my [promised] bride; you have ravished my heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given me courage with one look from your eyes, with one jewel of your necklace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' How beautiful is your love, my sister, my [promised] bride! How much better is your love than wine! And the fragrance of your ointments than all spices! [John 15:9; Rom. 8:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Your lips, O my [promised] bride, drop honey as the honeycomb; honey and milk are under your tongue. And the odor of your garments is like the odor of Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A garden enclosed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' barred is my sister, my [promised] bride–a spring shut up, a fountain sealed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Your shoots are an orchard of pomegranates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a paradise with precious fruits, henna with spikenard plants, [John 15:5; Eph. 5:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Spikenard and saffron, calamus and cinnamon, with all trees of frankincense, myrrh, and aloes, with all the chief spices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You are a fountain [springing up] in a garden, a well of living waters, and flowing streams from Lebanon. [John 4:10; 7:37, 38.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [You have called me a garden, she said] Oh, I pray that the [cold] north wind and the [soft] south wind may blow upon my garden, that its spices may flow out [in abundance for you in whom my soul delights]. Let my beloved come into his garden and eat its choicest fruits.'
