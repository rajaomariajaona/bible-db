document_id: 2CH.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THESE things and this loyalty, Sennacherib king of Assyria came, invaded Judah, and encamped against the fortified cities, thinking to take them.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Thus says Sennacherib king of Assyria: On what do you trust, that you remain in the strongholds in Jerusalem?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Is not Hezekiah leading you on in order to let you die by famine and thirst, saying, The Lord our God will deliver us out of the hand of the king of Assyria?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Has not the same Hezekiah taken away his high places and his altars, and commanded Judah and Jerusalem, You shall worship before one altar and burn incense upon it?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Do you not know what I and my fathers have done to all the peoples of other lands? Were the gods of the nations of those lands in any way able to deliver their lands out of my hand?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Who among all the gods of those nations that my fathers utterly destroyed was able to deliver his people out of my hand, that your God should be able to deliver you out of my hand?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' So now, do not let Hezekiah deceive or mislead you in this way, and do not believe him, for no god of any nation or kingdom was able to deliver his people out of my hand or the hand of my fathers. How much less will your God deliver you out of my hand!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And his servants said still more against the Lord God and against His servant Hezekiah.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The Assyrian king also wrote letters insulting the Lord, the God of Israel, and speaking against Him, saying, As the gods of the nations of other lands have not delivered their people out of my hand, so shall not the God of Hezekiah deliver His people out of my hand.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And they shouted it loudly in the Jewish language to the people of Jerusalem who were on the wall, to frighten and terrify them, that they might take the city.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And they spoke of the God of Jerusalem as they spoke of the gods of the peoples of the earth, which are the work of the hands of men.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' When Hezekiah saw that Sennacherib had come and intended to fight against Jerusalem,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For this cause Hezekiah the king and the prophet Isaiah son of Amoz prayed and cried to heaven.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the Lord sent an angel, who cut off all the mighty warriors and commanders and officers in the camp of the king of Assyria. So the Assyrian king returned with shamed face to his own land. And when he came into the house of his god, they who were his own offspring slew him there with the sword. [II Kings 19:35-37.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Thus the Lord saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib the king of Assyria and from the hand of all his enemies, and He guided them on every side.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And many brought gifts to Jerusalem to the Lord and presents to Hezekiah king of Judah; so from then on he was magnified in the sight of all nations.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' In those days Hezekiah was sick to the point of death; and he prayed to the Lord and He answered him and gave him a sign.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But Hezekiah did not make return [to the Lord] according to the benefit done to him, for his heart became proud [at such a spectacular response to his prayer]; therefore there was wrath upon him and upon Judah and Jerusalem.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But Hezekiah humbled himself for the pride of his heart, both he and the inhabitants of Jerusalem, so that the wrath of the Lord came not upon them in the days of Hezekiah.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And Hezekiah had very great wealth and honor, and he made for himself treasuries for silver, gold, precious stones, spices, shields, and all kinds of attractive vessels,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Storehouses also for the increase of grain, vintage fruits, and oil, and stalls for all kinds of cattle, and sheepfolds.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Moreover, he provided for himself cities and flocks and herds in abundance, for God had given him very great possessions.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He decided with his officers and his mighty men to stop up the waters of the fountains which were outside the city [by enclosing them with masonry and concealing them], and they helped him.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' This same Hezekiah also closed the upper springs of Gihon and directed the waters down to the west side of the City of David. And Hezekiah prospered in all his works.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And so in the matter of the ambassadors of the princes of Babylon who were sent to him to inquire about the wonder that was done in the land, God left him to himself to try him, that He might know all that was in his heart. [Isa. 39:1-7.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now the rest of the acts of Hezekiah and his good deeds, behold, they are written in the vision of Isaiah the prophet, the son of Amoz, and in the Book of the Kings of Judah and Israel.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And Hezekiah slept with his fathers and was buried in the ascent of the tombs of the descendants of David; and all Judah and the inhabitants of Jerusalem did him honor at his death. Manasseh his son reigned in his stead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So many people gathered, and they stopped up all the springs and the brook which flowed through the land, saying, Why should the kings of Assyria come and find much water?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Also Hezekiah took courage and built up all the wall that was broken, and raised towers upon it, and he built another wall outside and strengthened the Millo in the City of David and made weapons and shields in abundance.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And he set captains of war over the people and gathered them together to him in the street of the gate of the city and spoke encouragingly to them, saying,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Be strong and courageous. Be not afraid or dismayed before the king of Assyria and all the horde that is with him, for there is Another with us greater than [all those] with him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' With him is an arm of flesh, but with us is the Lord our God to help us and to fight our battles. And the people relied on the words of Hezekiah king of Judah.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And this Sennacherib king of Assyria, while he himself with all his forces was before Lachish, sent his servants to Jerusalem, to Hezekiah king of Judah, and to all Judah who were at Jerusalem, saying,'
