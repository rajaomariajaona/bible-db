document_id: PSA.58,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A record of memorable thoughts of David.
  - type: text
    content: ' DO YOU indeed in silence speak righteousness, O you mighty ones? [Or is the righteousness, rightness, and justice you should speak quite dumb?] Do you judge fairly '
  - type: text
    content: and
  - type: text
    content: ' uprightly, O you sons of men?'
  '10':
  - type: text
    content: ' The [unyieldingly] righteous shall rejoice when he sees the vengeance; he will bathe his feet in the blood of the wicked.'
  '11':
  - type: text
    content: ' Men will say, Surely there is a reward for the [uncompromisingly] righteous; surely there is a God Who judges on the earth.'
  '2':
  - type: text
    content: ' No, in your heart you devise wickedness; you deal out in the land the violence of your hands.'
  '3':
  - type: text
    content: ' The ungodly are perverse '
  - type: text
    content: and
  - type: text
    content: ' estranged from the womb; they go astray as soon as they are born, speaking lies.'
  '4':
  - type: text
    content: ' Their poison is like the venom of a serpent; they are like the deaf adder '
  - type: text
    content: or
  - type: text
    content: ' asp that stops its ear,'
  '5':
  - type: text
    content: ' Which listens not to the voice of charmers '
  - type: text
    content: or
  - type: text
    content: ' of the enchanter never casting spells so cunningly.'
  '6':
  - type: text
    content: ' Break their teeth, O God, in their mouths; break out the fangs of the young lions, O Lord.'
  '7':
  - type: text
    content: ' Let them melt away as water which runs on apace; when he aims his arrows, let them be as if they were headless '
  - type: text
    content: or
  - type: text
    content: ' split apart.'
  '8':
  - type: text
    content: ' Let them be as a snail dissolving slime as it passes on '
  - type: text
    content: or
  - type: text
    content: ' as a festering sore which wastes away, like [the child to which] a woman gives untimely birth that has not seen the sun.'
  '9':
  - type: text
    content: ' Before your pots can feel the thorns [that are placed under them for fuel], He will take them away as with a whirlwind, the green and the burning ones alike.'
