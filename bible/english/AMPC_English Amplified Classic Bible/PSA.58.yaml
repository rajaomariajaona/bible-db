document_id: PSA.58,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A record of memorable thoughts of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' DO YOU indeed in silence speak righteousness, O you mighty ones? [Or is the righteousness, rightness, and justice you should speak quite dumb?] Do you judge fairly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uprightly, O you sons of men?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The [unyieldingly] righteous shall rejoice when he sees the vengeance; he will bathe his feet in the blood of the wicked.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Men will say, Surely there is a reward for the [uncompromisingly] righteous; surely there is a God Who judges on the earth.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' No, in your heart you devise wickedness; you deal out in the land the violence of your hands.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The ungodly are perverse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' estranged from the womb; they go astray as soon as they are born, speaking lies.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Their poison is like the venom of a serpent; they are like the deaf adder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' asp that stops its ear,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Which listens not to the voice of charmers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of the enchanter never casting spells so cunningly.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Break their teeth, O God, in their mouths; break out the fangs of the young lions, O Lord.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Let them melt away as water which runs on apace; when he aims his arrows, let them be as if they were headless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' split apart.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Let them be as a snail dissolving slime as it passes on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' as a festering sore which wastes away, like [the child to which] a woman gives untimely birth that has not seen the sun.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Before your pots can feel the thorns [that are placed under them for fuel], He will take them away as with a whirlwind, the green and the burning ones alike.'
