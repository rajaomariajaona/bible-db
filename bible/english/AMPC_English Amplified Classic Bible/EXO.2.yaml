document_id: EXO.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW [Amram] a man of the house of Levi [the priestly tribe] went and took as his wife [Jochebed] a daughter of Levi. [Exod. 6:18, 20; Num. 26:59.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the woman became pregnant and bore a son; and when she saw that he was [exceedingly] beautiful, she hid him three months. [Acts 7:20; Heb. 11:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when she could no longer hide him, she took for him an ark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' basket made of bulrushes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' papyrus [making it watertight by] daubing it with bitumen and pitch. Then she put the child in it and laid it among the rushes by the brink of the river [Nile].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And his sister [Miriam] stood some distance away to learn what would be done to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now the daughter of Pharaoh came down to bathe at the river, and her maidens walked along the bank; she saw the ark among the rushes and sent her maid to fetch it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When she opened it, she saw the child; and behold, the baby cried. And she took pity on him and said, This is one of the Hebrews'' children!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then his sister said to Pharaoh''s daughter, Shall I go and call a nurse of the Hebrew women to nurse the child for you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Pharaoh''s daughter said to her, Go. And the girl went and called the child''s mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Pharaoh''s daughter said to her, Take this child away and nurse it for me, and I will give you your wages. So the woman took the child and nursed it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the child grew, and she brought him to Pharaoh''s daughter and he became her son. And she called him Moses, for she said, Because I drew him out of the water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' One day, after Moses was grown, it happened that he went out to his brethren and looked at their burdens; and he saw an Egyptian beating a Hebrew, one of [Moses''] brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He looked this way and that way, and when he saw no one, he killed the Egyptian and hid him in the sand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He went out the second day and saw two Hebrew men quarreling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fighting; and he said to the unjust aggressor, Why are you striking your comrade?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the man said, Who made you a prince and a judge over us? Do you intend to kill me as you killed the Egyptian? Then Moses was afraid and thought, Surely this thing is known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When Pharaoh heard of it, he sought to slay Moses. But Moses fled from Pharaoh''s presence and took refuge in the land of Midian, where he sat down by a well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now the priest of Midian had seven daughters, and they came and drew water and filled the troughs to water their father''s flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The shepherds came and drove them away; but Moses stood up and helped them and watered their flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when they came to Reuel [Jethro] their father, he said, How is it that you have come so soon today?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They said, An Egyptian delivered us from the shepherds; also he drew water for us and watered the flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He said to his daughters, Where is he? Why have you left the man? Call him, that he may eat bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Moses was content to dwell with the man; and he gave Moses Zipporah his daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And she bore a son, and he called his name Gershom [expulsion, or a stranger there]; for he said, I have been a stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a sojourner in a foreign land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' However, after a long time [nearly forty years] the king of Egypt died; and the Israelites were sighing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groaning because of the bondage. They kept crying, and their cry because of slavery ascended to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And God heard their sighing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groaning and [earnestly] remembered His covenant with Abraham, with Isaac, and with Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' God saw the Israelites and took knowledge of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' concerned Himself about them [knowing all, understanding, remembering all]. [Ps. 56:8, 9; 139:2.]'
