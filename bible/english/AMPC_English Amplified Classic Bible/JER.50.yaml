document_id: JER.50,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE WORD that the Lord spoke concerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against Babylon and concerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against the land of the Chaldeans through Jeremiah the prophet: [Isa. 13:1-14:23; 47; Hab. 1, 2.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Chaldea shall become plunder; all who plunder her shall be satisfied, says the Lord.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Though you are glad, though you rejoice, O you who plunder My heritage, though you are wanton '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' skip about like a heifer at grass and neigh like strong stallions,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Your mother [Babylon] shall be put to great shame; she who bore you shall blush '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be disgraced. Behold, she shall be at the rear of the nations [least of the nations]–a wilderness, waste, and desert.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Because of the wrath of the Lord she shall not be inhabited but shall be wholly desolate; everyone who goes by Babylon shall be appalled and hiss '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mock at all her wounds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plagues.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Set yourselves in array against Babylon round about, all you archers. Shoot at her! Spare not the arrows, for she has sinned against the Lord.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Raise the battle cry against her round about! She gives her hand [in agreement] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' surrenders; her supports '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' battlements fall, her walls are thrown down. For this is the vengeance of the Lord: take vengeance on her; as she has done [to others], do to her.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Exterminate the sower from Babylon, and the one who handles the sickle in the time of harvest. For fear of the sword of the oppressor everyone shall return to his people, and everyone shall flee to his own land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Israel is a hunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scattered sheep [driven hither and thither and preyed upon by savage beasts]; the lions have chased him. First the king of Assyria devoured him, and now at last Nebuchadrezzar king of Babylon has broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gnawed his bones.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Therefore thus says the Lord of hosts, the God of Israel: Behold, I will visit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish the king of Babylon and his land, just as I visited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished the king of Assyria.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And I will bring Israel [home] again to his fold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturage, and he will feed on Carmel and Bashan [in the most fertile districts both west and east], and his soul will be satisfied upon the hills of Ephraim and Gilead.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Declare it among the nations and publish it and set up a signal [to spread the news]–publish and conceal it not; say, Babylon has been taken; Bel [the patron god] is put to shame, Merodach (Bel) is dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken down. [Babylon''s] images are put to shame, her [senseless] idols are thrown down!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' In those days and at that time, says the Lord, the iniquity of Israel will be sought, but there will be none, and the sins of Judah [will be sought], but none will be found, for I will pardon those whom I cause to remain as a remnant (the preserved ones who come forth after a long tribulation). [Isa. 1:9; 43:25; Jer. 31:34; 33:8; Rom. 9:27.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Go up against [Babylon] the land of Merathaim [two rebellions, double or intense defiance], even against it and against the inhabitants of Pekod [visitation and punishment]. Slay and utterly destroy them, says the Lord, and do according to all that I have commanded you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The cry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noise of battle is in the land, and [the noise] of great destruction.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' How the hammer of the whole earth is crushed and broken! How Babylon has become a horror of desolation among the nations!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' I set a trap for you, and you also were taken, O Babylon, and you did not know it; you were found and also caught because you have struggled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contended against the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The Lord has opened His armory and has brought forth [the nations who unknowingly are] the weapons of His indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath, for the Lord God of hosts has work to do in the land of the Chaldeans.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Come against her from every quarter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from the utmost border. Open her granaries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' storehouses; pile up [their contents] like heaps of rubbish. Burn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy her utterly; let nothing be left of her.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Slay all her bullocks (her choice youths, the strength of her army); let them go down to the slaughter! Woe to [the Chaldeans]! For their day has come, the time of their visitation (their inspection and punishment).'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Listen! The voice of those [Jews] who flee and escape out of the land of Babylon proclaiming in Zion the vengeance of the Lord our God, the vengeance [of the Lord upon the Chaldeans] for [the plundering and destruction of] His temple.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Call together [many] archers against Babylon, all those who bend the bow. Encamp against her round about; let none from there escape. Recompense her according to her deeds; just as she has done, do to her. For against the Lord, against the Holy One of Israel, has she been proudly defiant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' presumptuous.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For out of the north there has come up a nation [Media] against her which will make her land desolate, and none will dwell there. They will have fled, they will be gone–from man even to beast.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Therefore shall her young men fall in her streets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' squares, and all her soldiers shall be destroyed on that day, says the Lord.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Behold, I am against you, O Babylon [you who are pride and presumption personified], says the Lord, the Lord of hosts, for your day has come, the time when I will visit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish you.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And Pride (the arrogant one) shall stumble (totter) and fall, and none shall raise him up. And I will kindle a fire in his cities, and it shall devour all who are round about him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Thus says the Lord of hosts: The children of Israel and the children of Judah are oppressed together; all who took them captive have held them fast; they refuse to let them go.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Their Redeemer is strong; the Lord of hosts is His name. He will surely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly plead their case '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defend their cause, that He may give rest to [the land of Israel and to the Babylonian-enslaved nations of] the earth, but unrest to the inhabitants of Babylon.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' A sword upon the Chaldeans, says the Lord–upon the inhabitants of Babylon and upon her princes (rulers in civic matters) and upon her wise men (the astrologers and rulers in religious affairs)!'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' A sword upon the babbling liars (the diviners), that they may become fools! A sword upon her mighty warriors, that they may be dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' A sword upon their horses and upon their chariots and upon all the mixed foreign troops that are in the midst of her, that they may become [as weak and defenseless as] women! A sword upon her treasures, that they may be plundered!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' A sword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a drought upon her waters, that they may be dried up! For it is a land of images, and they are mad over idols (objects of terror in which they foolishly trust).'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Therefore wild beasts of the desert shall dwell [in Babylon] with the jackals, and ostriches shall dwell there. And it shall never again be inhabited with people, even from generation to generation. [Isa. 13:20-22.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' In those days and at that time, says the Lord, the children of Israel shall come, they and the children of Judah together; they shall come up weeping as they come and seek the Lord their God [inquiring for and of Him and requiring Him, both by right of necessity and of the promises of God''s Word].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' As when God overthrew Sodom and Gomorrah and their neighboring cities, says the Lord, so no man shall dwell there; neither shall any son of man live there temporarily. [Jer. 49:18.]'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Behold, a people is coming from the north; and a great nation and many kings are stirring from the uttermost parts of the earth.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' They lay hold of bow, lance, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spear; they are cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have no mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' compassion. They sound like the roaring of the sea; they ride upon horses, every man equipped like a man [ready] for the battle against you, O Daughter of Babylon!'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' The king of Babylon has heard the news about them, and his hands fall feeble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' helpless; anguish has seized him, and pangs like that of a woman in childbirth.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' See, there comes up one like a lion from the jungles (the pride) of the Jordan against the strong habitation [of Babylon] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' into the permanent pasturage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sheepfold; for in a twinkling I will drive him [Babylon] from there. And I will appoint over him the one whom I choose. For who is like Me? And who will challenge Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosecute Me for this proceeding? And what [earthly, national] shepherd can stand before Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defy Me? [Jer. 49:19.]'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Therefore hear the plan of the Lord which He has made against Babylon, and His purposes which He has formed against the land of the Chaldeans: Surely they shall be dragged away, even the little ones of the flock; surely He shall make their habitation desolate because of them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their fold amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled at their fate.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' At the cry, Babylon has been taken! the earth shall tremble, and the cry shall be heard among the nations.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They shall ask the way to Zion, with their faces in that direction, saying, Come, let us join ourselves to the Lord in a perpetual covenant that shall not be forgotten.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' My people have been lost sheep; their shepherds have led them astray [to favorite places of idolatry] on mountains [that seduce]. They have gone from [one sin to another] mountain to hill; they have forgotten their [own] resting-place. [Isa. 53:6; I Pet. 2:25.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' All who found them devoured them; and their adversaries said, We are not guilty, because they have sinned against the Lord [and are no longer holy to Him], their true habitation of righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice, even the Lord, the hope of their fathers.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Flee out of the midst of Babylon, and go forth out of the land of the Chaldeans; and be as the he-goats [who serve as examples and as leaders in the flight] before the flocks. [Jer. 51:6, 9, 45; II Cor. 6:17; Rev. 18:4.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For behold, I will raise and cause to come up against Babylon an assembly of great nations from the north country. They will equip '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set themselves against her; from there she will be taken. Their arrows will be like [both] an expert, mighty warrior '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' like his arrows–none [of them] will return in vain.'
