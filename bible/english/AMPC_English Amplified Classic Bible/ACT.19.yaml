document_id: ACT.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHILE APOLLOS was in Corinth, Paul went through the upper inland districts and came down to Ephesus. There he found some disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he asked them, Did you receive the Holy Spirit when you believed [on Jesus as the Christ]? And they said, No, we have not even heard that there is a Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he asked, Into what [baptism] then were you baptized? They said, Into John''s baptism.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Paul said, John baptized with the baptism of repentance, continually telling the people that they should believe in the One Who was to come after him, that is, in Jesus [having a conviction full of joyful trust that He is Christ, the Messiah, and being obedient to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' On hearing this they were baptized [again, this time] in the name of the Lord Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And as Paul laid his hands upon them, the Holy Spirit came on them; and they spoke in [foreign, unknown] tongues (languages) and prophesied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' There were about twelve of them in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he went into the synagogue and for three months spoke boldly, persuading '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arguing and pleading about the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But when some became more and more stubborn (hardened and unbelieving), discrediting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reviling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speaking evil of the Way [of the Lord] before the congregation, he separated himself from them, taking the disciples with him, and went on holding daily discussions in the lecture room of Tyrannus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from about ten o'clock till three
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' This continued for two years, so that all the inhabitants of [the province of] Asia, Jews as well as Greeks, heard the Word of the Lord [concerning the attainment through Christ of eternal salvation in the kingdom of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And God did unusual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extraordinary miracles by the hands of Paul,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So that handkerchiefs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' towels or aprons which had touched his skin were carried away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put upon the sick, and their diseases left them and the evil spirits came out of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then some of the traveling Jewish exorcists (men who adjure evil spirits) also undertook to call the name of the Lord Jesus over those who had evil spirits, saying, I solemnly implore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' charge you by the Jesus Whom Paul preaches!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Seven sons of a certain Jewish chief priest named Sceva were doing this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But [one] evil spirit retorted, Jesus I know, and Paul I know about, but who are you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the man in whom the evil spirit dwelt leaped upon them, mastering two of them, and was so violent against them that they dashed out of that house [in fear], stripped naked and wounded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' This became known to all who lived in Ephesus, both Jews and Greeks, and alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror fell upon them all; and the name of the Lord Jesus was extolled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Many also of those who were now believers came making full confession '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly exposing their [former deceptive and evil] practices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And many of those who had practiced curious, magical arts collected their books and [throwing them, book after book, on the pile] burned them in the sight of everybody. When they counted the value of them, they found it amounted to 50,000 pieces of silver (about $9,300).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Thus the Word of the Lord [concerning the attainment through Christ of eternal salvation in the kingdom of God] grew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intensified, prevailing mightily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now after these events Paul determined in the [Holy] Spirit that he would travel through Macedonia and Achaia (most of Greece) and go to Jerusalem, saying, After I have been there, I must visit Rome also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And having sent two of his assistants, Timothy and Erastus, into Macedonia, he himself stayed on in [the province of] Asia for a while.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But as time went on, there arose no little disturbance concerning the Way [of the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For a man named Demetrius, a silversmith, who made silver shrines of [the goddess] Artemis [Diana], brought no small income to his craftsmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' These he called together, along with the workmen of similar trades, and said, Men, you are acquainted with the facts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that from this business we derive our wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' livelihood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Now you notice and hear that not only at Ephesus but almost all over [the province of] Asia this Paul has persuaded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' induced people to believe his teaching and has alienated a considerable company of them, saying that gods that are made with human hands are not really gods at all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now there is danger not merely that this trade of ours may be discredited, but also that the temple of the great goddess Artemis may come into disrepute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' count for nothing, and that her glorious magnificence may be degraded and fall into contempt–she whom all [the province of] Asia and the wide world worship.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' As they listened to this, they were filled with rage and they continued to shout, Great is Artemis of the Ephesians!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then the city was filled with confusion; and they rushed together into the amphitheater, dragging along with them Gaius and Aristarchus, Macedonians who were fellow travelers with Paul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Paul wished to go in among the crowd, but the disciples would not permit him to do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Even some of the Asiarchs (political or religious officials in Asia) who were his friends also sent to him and warned him not to risk venturing into the theater.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Now some shouted one thing and some another, for the gathering was in a tumult and most of them did not know why they had come together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Some of the crowd called upon Alexander [to speak], since the Jews had pushed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urged him forward. And Alexander motioned with his hand, wishing to make a defense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [planning] to apologize to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But as soon as they saw him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized that he was a Jew, a shout went up from them as the voice of one man, as for about two hours they cried, Great is Artemis of the Ephesians!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And when the town clerk had calmed the crowd down, he said, Men of Ephesus, what man is there who does not know that the city of the Ephesians is guardian of the temple of the great Artemis and of the sacred stone [image of her] that fell from the sky?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Seeing then that these things cannot be denied, you ought to be quiet (keep yourselves in check) and do nothing rashly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For you have brought these men here, who are [guilty of] neither temple robberies nor blasphemous speech about our goddess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Now then, if Demetrius and his fellow tradesmen who are with him have a grievance against anyone, the courts are open and proconsuls are [available]; let them bring charges against one another [legally].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But if you require anything further about this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about other matters
  - type: text
    text: ', it must be decided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleared up in the regular assembly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' For we are in danger of being called to render an account '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of being accused of rioting because of [this commotion] today, there being no reason that we can offer to justify this disorder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And when he had said these things, he dismissed the assembly.'
