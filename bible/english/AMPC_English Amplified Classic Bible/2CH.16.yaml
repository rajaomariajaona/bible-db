document_id: 2CH.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE thirty-sixth year of Asa''s reign, Baasha king of Israel came up against Judah, and built (fortified) Ramah intending to intercept anyone going out or coming in to Asa king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Asa brought silver and gold out of the treasuries of the house of the Lord and of the king''s house and sent them to Ben-hadad king of Syria, who dwelt at Damascus, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let there be a league between me and you, as was between my father and your father. Behold, I am sending you silver and gold; go, break your league with Baasha king of Israel, that he may withdraw from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Ben-hadad hearkened to King Asa and sent the captains of his armies against the cities of Israel; and they smote Ijon, Dan, Abel-maim, and all the store cities of Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when Baasha heard it, he stopped building Ramah and let his work cease.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then King Asa took all Judah, and they carried away the stones of Ramah and its timber with which Baasha had been building, and with them he built Geba and Mizpah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' At that time Hanani the seer came to Asa king of Judah and said to him, Because you relied on the king of Syria and not on the Lord your God, the army of the king of Syria has escaped you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Were not the Ethiopians and Libyans a huge host with very many chariots and horsemen? Yet because you relied then on the Lord, He gave them into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For the eyes of the Lord run to and fro throughout the whole earth to show Himself strong in behalf of those whose hearts are blameless toward Him. You have done foolishly in this; therefore, from now on you shall have wars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Asa was angry with the seer and put him in prison [in the stocks], for he was enraged with him because of this. Asa oppressed some of the people at the same time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The acts of Asa, from first to last, are written in the Book of the Kings of Judah and Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' In the thirty-ninth year of his reign Asa was diseased in his feet–until his disease became very severe; yet in his disease he did not seek the Lord, but relied on the physicians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Asa slept with his fathers, dying in the forty-first year of his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they buried him in his own tomb which he had hewn out for himself in the City of David, and they laid him on a bier which was filled with sweet odors and various kinds [of spices] prepared by the perfumers'' art; and they made a very great burning [of spices] in his honor.'
