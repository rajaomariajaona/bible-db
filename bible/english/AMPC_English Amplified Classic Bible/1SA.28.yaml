document_id: 1SA.28,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THOSE days the Philistines gathered their forces for war against Israel. Achish said to David, Understand that you and your men shall go with me to battle.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Saul swore to her by the Lord, saying, As the Lord lives, there shall no punishment come to you for this.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The woman said, Whom shall I bring up for you? He said, Bring up Samuel for me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And when the woman saw Samuel, she screamed and she said to Saul, Why have you deceived me? For you are Saul!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The king said to her, Be not afraid; what do you see? The woman said to Saul, I see a god [terrifying superhuman being] coming up out of the earth!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' He said to her, In what form is he? And she said, An old man comes up, covered with a mantle. And Saul perceived that it was Samuel, and he stooped with his face to the ground and made obeisance.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And Samuel said to Saul, Why have you disturbed me to bring me up? Saul answered, I am bitterly distressed; for the Philistines make war against me, and God has departed from me and answers me no more, either by prophets or by dreams. Therefore I have called you, that you may make known to me what I should do.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Samuel said, Why then do you ask me, seeing that the Lord has turned from you and has become your enemy?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The Lord has done to you as He said through me He would do; for [He] has torn the kingdom out of your hands and given it to your neighbor David. [I Sam. 15:22-28.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Because you did not obey the voice of the Lord or execute His fierce wrath upon Amalek, therefore the Lord has done this thing to you this day.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Moreover, the Lord will also give Israel with you into the hands of the Philistines, and tomorrow you and your sons shall be with me [among the dead]. The Lord also will give the army of Israel into the hands of the Philistines.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' David said to Achish, All right, you shall know what your servant can do. Achish said to David, Therefore I will make you my bodyguard always.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then immediately Saul fell full length upon the earth floor [of the medium''s house], and was exceedingly afraid because of Samuel''s words. There was no strength in him, for he had eaten nothing all day and all night.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The woman came to Saul, and seeing that he was greatly troubled, she said to him, Behold, your handmaid has obeyed you, and I have put my life in my hands and have listened to what you said to me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So now, I pray you, listen also to the voice of your handmaid and let me set a morsel of food before you, and eat, so you may have strength when you go on your way.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But he said, I will not eat. But his servants, together with the woman, urged him, and he heeded their words. So he arose from the ground and sat upon the bed.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The woman had a fat calf in the house; she hurried and killed it, and took flour, kneaded it, and baked unleavened bread.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then she brought it before Saul and his servants, and they ate. Then they rose up and went away that night.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Now Samuel was dead, and all Israel had mourned for him and buried him in Ramah, his own city. And Saul had put the mediums and the wizards out of the land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the Philistines assembled and came and encamped at Shunem; and Saul gathered all Israel and they encamped at Gilboa.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' When Saul saw the Philistine host, he was afraid; his heart trembled greatly.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' When Saul inquired of the Lord, He refused to answer him, either by dreams or by Urim [a symbol worn by the priest when seeking the will of God for Israel] or by the prophets. [Prov. 1:24-30.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then Saul said to his servants, Find me a woman who is a medium [between the living and the dead], that I may go and inquire of her. His servants said, Behold, there is a woman who is a medium at Endor.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So Saul disguised himself, put on other raiment, and he and two men with him went and came to the woman at night. He said to her, Perceive for me by the familiar spirit and bring up for me the dead person whom I shall name to you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The woman said, See here, you know what Saul has done, how he has cut off those who are mediums and wizards out of the land. Why then do you lay a trap for my life to cause my death?'
