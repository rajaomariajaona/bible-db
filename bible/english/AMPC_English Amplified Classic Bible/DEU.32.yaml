document_id: DEU.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' GIVE EAR, O heavens, and I [Moses] will speak; and let the earth hear the words of my mouth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He found him in a desert land, in the howling void of the wilderness; He kept circling around him, He scanned him [penetratingly], He kept him as the pupil of His eye.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' As an eagle that stirs up her nest, that flutters over her young, He spread abroad His wings and He took them, He bore them on His pinions. [Luke 13:34.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So the Lord alone led him; there was no foreign god with Him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He made Israel ride on the high places of the earth, and he ate the increase of the field; and He made him suck honey out of the rock and oil out of the flinty rock,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Butter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' curds of the herd and milk of the flock, with fat of lambs, and rams of the breed of Bashan, and he-goats, with the finest of the wheat; and you drank wine of the blood of the grape.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But Jeshurun (Israel) grew fat and kicked. You became fat, you grew thick, you were gorged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleek! Then he forsook God Who made him and forsook '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despised the Rock of his salvation.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' They provoked Him to jealousy with strange gods, with abominations they provoked Him to anger.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' They sacrificed to demons, not to God–to gods whom they knew not, to new gods lately come up, whom your fathers never knew or feared.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Of the Rock Who bore you you were unmindful; you forgot the God Who travailed in your birth.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And the Lord saw it and He spurned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected them, out of indignation with His sons and His daughters.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' My message shall drop as the rain, my speech shall distil as the dew, as the light rain upon the tender grass, and as the showers upon the herb.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And He said, I will hide My face from them, I will see what their end will be; for they are a perverse generation, children in whom is no faithfulness.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' They have moved Me to jealousy with what is not God; they have angered Me with their idols. So I will move them to jealousy with those who are not a people; I will anger them with a foolish nation.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For a fire is kindled by My anger, and it burns to the depths of Sheol, devours the earth with its increase, and sets on fire the foundations of the mountains.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And I will heap evils upon them; I will spend My arrows upon them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' They shall be wasted with hunger and devoured with burning heat and poisonous pestilence; and the teeth of beasts will I send against them, with the poison of crawling things of the dust.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' From without the sword shall bereave, and in the chambers shall be terror, destroying both young man and virgin, the sucking child with the man of gray hairs.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' I said, I would scatter them afar and I would have made the remembrance of them to cease from among men,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Had I not feared the provocation of the foe, lest their enemies misconstrue it and lest they should say, Our own hand has prevailed; all this was not the work of the Lord.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For they are a nation void of counsel, and there is no understanding in them.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' O that they were wise and would see through this [present triumph] to their ultimate fate!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For I will proclaim the name [and presence] of the Lord. Concede '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ascribe greatness to our God.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' How could one have chased a thousand, and two put ten thousand to flight, except their Rock had sold them, and the Lord had delivered them up?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For their rock is not like our Rock, even our enemies themselves judge this.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For their vine comes from the vine of Sodom and from the fields of Gomorrah; their grapes are grapes of [poisonous] gall, their clusters are bitter.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Their wine is the [furious] venom of serpents, and the pitiless poison of vipers.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Is not this laid up in store with Me, sealed up in My treasuries?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Vengeance is Mine, and recompense, in the time when their foot shall slide; for the day of their disaster is at hand and their doom comes speedily.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' For the Lord will revoke sentence for His people and relent for His servants'' sake when He sees that their power is gone and none remains, whether bond or free.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And He will say, Where are their gods, the rock in which they took refuge,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Who ate the fat of their sacrifices and drank the wine of their drink offering? Let them rise up and help you, let them be your protection!'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' See now that I, I am He, and there is no god beside Me; I kill and I make alive, I wound and I heal, and there is none who can deliver out of My hand.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He is the Rock, His work is perfect, for all His ways are law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice. A God of faithfulness without breach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' deviation, just and right is He.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' For I lift up My hand to heaven and swear, As I live forever,'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' If I whet My lightning sword and My hand takes hold on judgment, I will wreak vengeance on My foes and recompense those who hate Me.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' I will make My arrows drunk with blood, and My sword shall devour flesh, with the blood of the slain and the captives, from the long-haired heads of the foe.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Rejoice [with] His people, O you nations, for He avenges the blood of His servants, and vengeance He inflicts on His foes and clears guilt from the land of His people.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And Moses came and spoke all the words of this song in the ears of the people, he and Hoshea (Joshua) son of Nun.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And when Moses had finished speaking all these words to all Israel,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' He said to them, Set your [minds and] hearts on all the words which I command you this day, that you may command them to your children, that they may be watchful to do all the words of this law.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' For it is not an empty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless trifle for you; it is your [very] life. By it you shall live long in the land which you are going over the Jordan to possess.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And the Lord said to Moses that same day,'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' Get up into this mountain of the Abarim, Mount Nebo, which is in the land of Moab, opposite Jericho, and look at the land of Canaan which I give to the Israelites for a possession.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They [Israel] have spoiled themselves. They are not sons to Him, and that is their blemish–a perverse and crooked generation!'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' And die on the mountain which you ascend and be gathered to your people, as Aaron your brother died on Mount Hor and was gathered to his people,'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' Because you broke faith with Me in the midst of the Israelites at the waters of Meribah-kadesh in the Wilderness of Zin and because you did not set Me apart as holy in the midst of the Israelites.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' For you shall see the land opposite you at a distance, but you shall not go there, into the land which I give the Israelites.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Do you thus repay the Lord, you foolish and senseless people? Is not He your Father Who acquired you for His own, Who made and established you [as a nation]?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Remember the days of old; consider the years of many generations. Ask your father and he will show you, your elders, and they will tell you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' When the Most High gave to the nations their inheritance, when He separated the children of men, He set the bounds of the peoples according to the number of the Israelites.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For the Lord''s portion is His people; Jacob (Israel) is the lot of His inheritance.'
