document_id: JOB.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MY SPIRIT is broken, my days are spent (snuffed out); the grave is ready for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Surely there are mockers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mockery around me, and my eye dwells on their obstinacy, insults, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resistance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Give me a pledge with Yourself [acknowledge my innocence before my death]; who is there that will give security for me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But their hearts [Lord] You have closed to understanding; therefore You will not let them triumph [by giving them a verdict against me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He who denounces his friends [in order to make them] a prey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' get a share, the eyes of his children shall fail [to find food].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But He has made me a byword among the people, and they spit before my face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' My eye has grown dim because of grief, and all my members are [wasted away] like a shadow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Upright men shall be astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled at this, and the innocent shall stir himself up against the godless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' polluted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Yet shall the righteous (those upright and in right standing with God) hold to their ways, and he who has clean hands shall grow stronger and stronger. [Ps. 24:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But as for you, come on again, all of you, though I find not a wise man among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' My days are past, my purposes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans are frustrated; even the thoughts (desires and possessions) of my heart [are broken off].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' These [thoughts] extend from the night into the day, [so that] the light is short because of darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But if I look to Sheol (the unseen state) as my abode, if I spread my couch in the darkness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If I say to the grave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corruption, You are my father, and to the worm [that feeds on decay], You are my mother and my sister [because I will soon be closest to you],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Where then is my hope? And if I have hope, who will see [its fulfillment]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [My hope] shall go down to the bars of Sheol (the unseen state) when once there is rest in the dust.'
