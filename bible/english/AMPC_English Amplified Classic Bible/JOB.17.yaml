document_id: JOB.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY SPIRIT is broken, my days are spent (snuffed out); the grave is ready for me.'
  '10':
  - type: text
    content: ' But as for you, come on again, all of you, though I find not a wise man among you.'
  '11':
  - type: text
    content: ' My days are past, my purposes '
  - type: text
    content: and
  - type: text
    content: ' plans are frustrated; even the thoughts (desires and possessions) of my heart [are broken off].'
  '12':
  - type: text
    content: ' These [thoughts] extend from the night into the day, [so that] the light is short because of darkness.'
  '13':
  - type: text
    content: ' But if I look to Sheol (the unseen state) as my abode, if I spread my couch in the darkness,'
  '14':
  - type: text
    content: ' If I say to the grave '
  - type: text
    content: and
  - type: text
    content: ' corruption, You are my father, and to the worm [that feeds on decay], You are my mother and my sister [because I will soon be closest to you],'
  '15':
  - type: text
    content: ' Where then is my hope? And if I have hope, who will see [its fulfillment]?'
  '16':
  - type: text
    content: ' [My hope] shall go down to the bars of Sheol (the unseen state) when once there is rest in the dust.'
  '2':
  - type: text
    content: ' Surely there are mockers '
  - type: text
    content: and
  - type: text
    content: ' mockery around me, and my eye dwells on their obstinacy, insults, '
  - type: text
    content: and
  - type: text
    content: ' resistance.'
  '3':
  - type: text
    content: ' Give me a pledge with Yourself [acknowledge my innocence before my death]; who is there that will give security for me?'
  '4':
  - type: text
    content: ' But their hearts [Lord] You have closed to understanding; therefore You will not let them triumph [by giving them a verdict against me].'
  '5':
  - type: text
    content: ' He who denounces his friends [in order to make them] a prey '
  - type: text
    content: and
  - type: text
    content: ' get a share, the eyes of his children shall fail [to find food].'
  '6':
  - type: text
    content: ' But He has made me a byword among the people, and they spit before my face.'
  '7':
  - type: text
    content: ' My eye has grown dim because of grief, and all my members are [wasted away] like a shadow.'
  '8':
  - type: text
    content: ' Upright men shall be astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled at this, and the innocent shall stir himself up against the godless '
  - type: text
    content: and
  - type: text
    content: ' polluted.'
  '9':
  - type: text
    content: ' Yet shall the righteous (those upright and in right standing with God) hold to their ways, and he who has clean hands shall grow stronger and stronger. [Ps. 24:4.]'
