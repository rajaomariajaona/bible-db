document_id: PSA.82,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of Asaph.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' GOD STANDS in the assembly [of the representatives] of God; in the midst of the magistrates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' judges He gives judgment [as] among the gods.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' How long will you [magistrates or judges] judge unjustly and show partiality to the wicked? Selah [pause, and calmly think of that]!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Do justice to the weak (poor) and fatherless; maintain the rights of the afflicted and needy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Deliver the poor and needy; rescue them out of the hand of the wicked.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [The magistrates and judges] know not, neither will they understand; they walk on in the darkness [of complacent satisfaction]; all the foundations of the earth [the fundamental principles upon which rests the administration of justice] are shaking.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I said, You are gods [since you judge on My behalf, as My representatives]; indeed, all of you are children of the Most High. [John 10:34-36; Rom. 13:1, 2.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But you shall die as men and fall as one of the princes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Arise, O God, judge the earth! For to You belong all the nations. [Rev. 11:15.]'
