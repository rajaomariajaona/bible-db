document_id: EZK.30,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord came again to me, saying,'
  '10':
  - type: text
    content: ' Thus says the Lord God: I will also make the tumult '
  - type: text
    content: and
  - type: text
    content: ' the wealth '
  - type: text
    content: and
  - type: text
    content: ' the large population of Egypt to cease by the hand of Nebuchadrezzar king of Babylon.'
  '11':
  - type: text
    content: ' He and his people with him, the [most] terrible of the nations, shall be brought in to destroy the land, and they shall draw their swords against Egypt and fill the land with the slain.'
  '12':
  - type: text
    content: ' And I will make the [artificial] streams [of the Nile delta] dry and will sell the land into the hand of evil men, and I will make the land desolate, and all that is in it, by the hand of strangers. I the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service] have spoken it.'
  '13':
  - type: text
    content: ' Thus says the Lord God: I will also destroy the idols and I will put an end to the images in Noph '
  - type: text
    content: or
  - type: text
    content: ' Memphis, and there shall be no longer a prince of the land of Egypt. And I will put fear in the land of Egypt.'
  '14':
  - type: text
    content: ' And I will make Pathros desolate and will set fire to Zoan and will execute judgments '
  - type: text
    content: and
  - type: text
    content: ' punishments upon No '
  - type: text
    content: or
  - type: text
    content: ' Thebes.'
  '15':
  - type: text
    content: ' And I will pour My wrath upon Pelusium, the stronghold of Egypt, and I will cut off the tumult, the prosperity '
  - type: text
    content: and
  - type: text
    content: ' the population of No '
  - type: text
    content: or
  - type: text
    content: ' Thebes.'
  '16':
  - type: text
    content: ' And I will set fire to Egypt; Pelusium shall have great anguish and No '
  - type: text
    content: or
  - type: text
    content: ' Thebes shall be torn open and Noph '
  - type: text
    content: or
  - type: text
    content: ' Memphis shall have adversaries in the daytime '
  - type: text
    content: and
  - type: text
    content: ' all the day long.'
  '17':
  - type: text
    content: ' The young men of Aven '
  - type: text
    content: or
  - type: text
    content: ' On and of Pibeseth shall fall by the sword, and the [women and children] shall go into captivity.'
  '18':
  - type: text
    content: ' At Tehaphnehes also the day shall withdraw itself '
  - type: text
    content: and
  - type: text
    content: ' be dark when I break there the yokes '
  - type: text
    content: and
  - type: text
    content: ' dominion of Egypt, and the pride of her power shall come to an end. As for her, a cloud [of calamities] shall cover her and her daughters shall go into captivity.'
  '19':
  - type: text
    content: ' Thus will I execute judgments '
  - type: text
    content: and
  - type: text
    content: ' punishments upon Egypt. Then shall they know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '2':
  - type: text
    content: ' Son of man, prophesy and say, Thus says the Lord God: Wail, Alas for the day!'
  '20':
  - type: text
    content: ' And in the eleventh year [after King Jehoiachin was taken to Babylon], in the first month, on the seventh day of the month, the word of the Lord came to me, saying,'
  '21':
  - type: text
    content: ' Son of man, I have broken the arm of Pharaoh king of Egypt, and behold, it has not been bound up to heal it by binding it with a bandage, to make it strong to hold '
  - type: text
    content: and
  - type: text
    content: ' wield the sword.'
  '22':
  - type: text
    content: ' Therefore thus says the Lord God: Behold, I am against Pharaoh king of Egypt and will break his arms, both the strong one and the one which was broken, and I will cause the sword to fall from his hand.'
  '23':
  - type: text
    content: ' And I will scatter the Egyptians among the nations and will disperse them throughout the countries.'
  '24':
  - type: text
    content: ' And I will strengthen the arms of the king of Babylon and put My sword in his hand, but I will break Pharaoh''s arms and he will groan before [Nebuchadrezzar] with the groanings of a mortally wounded man.'
  '25':
  - type: text
    content: ' But I will strengthen '
  - type: text
    content: and
  - type: text
    content: ' hold up the arms of the king of Babylon and the arms of Pharaoh shall fall down, and they [of Egypt] shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service], when I put My sword into the hand of the king of Babylon and he shall stretch it out upon the land of Egypt.'
  '26':
  - type: text
    content: ' And I will scatter the Egyptians among the nations and disperse them through the countries, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '3':
  - type: text
    content: ' For the day is near, even the day of the Lord is near, a cloudy day; it shall be the time [of doom] for the nations.'
  '4':
  - type: text
    content: ' And a sword shall come upon Egypt, and anguish '
  - type: text
    content: and
  - type: text
    content: ' great sorrow shall be in Ethiopia (Cush), when the slain fall in Egypt and they [of Babylon] carry away her great mass of people '
  - type: text
    content: and
  - type: text
    content: ' of things and her foundations are broken down.'
  '5':
  - type: text
    content: ' Ethiopia (Cush) and Put, Lud and all the mingled people [foreigners living in Egypt], Cub (Lub, Libya) and the children of the land of the covenant [the Jews who had taken refuge in Egypt] shall fall with [the Egyptians] by the sword.'
  '6':
  - type: text
    content: ' Thus says the Lord: They also who uphold '
  - type: text
    content: or
  - type: text
    content: ' lean upon '
  - type: text
    content: and
  - type: text
    content: ' are supported by Egypt shall fall, and the pride of her power shall come down; from Migdol [in the north] to Syene [in the south] they shall fall within her by the sword, says the Lord God.'
  '7':
  - type: text
    content: ' And they shall be desolated in the midst of countries that are desolated, and her cities shall be in the midst of cities that are wasted [by plunder and subjection].'
  '8':
  - type: text
    content: ' And they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service], when I have set a fire in Egypt and all her helpers are broken '
  - type: text
    content: and
  - type: text
    content: ' destroyed.'
  '9':
  - type: text
    content: ' In that day shall [swift] messengers go forth from Me in ships to terrify the careless '
  - type: text
    content: and
  - type: text
    content: ' unsuspecting Ethiopians, and there shall be anguish '
  - type: text
    content: and
  - type: text
    content: ' great sorrow upon them as in the day of Egypt''s [doom], for behold, [their day] comes!'
