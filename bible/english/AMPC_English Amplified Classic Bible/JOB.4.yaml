document_id: JOB.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN ELIPHAZ the Temanite answered and said,'
  '10':
  - type: text
    content: ' The roaring of the lion and the voice of the fierce lion, and the teeth of the young lions are broken.'
  '11':
  - type: text
    content: ' The old '
  - type: text
    content: and
  - type: text
    content: ' strong lion perishes for lack of prey, and the whelps of the lioness are scattered abroad.'
  '12':
  - type: text
    content: ' Now a thing was secretly brought to me, and my ear received a whisper of it.'
  '13':
  - type: text
    content: ' In thoughts from the visions of the night, when deep sleep falls on men,'
  '14':
  - type: text
    content: ' Fear came upon me and trembling, which made all my bones shake.'
  '15':
  - type: text
    content: ' Then a spirit passed before my face; the hair of my flesh stood up!'
  '16':
  - type: text
    content: ' [The spirit] stood still, but I could not discern the appearance of it. A form was before my eyes; there was silence, and then I heard a voice, saying,'
  '17':
  - type: text
    content: ' Can mortal man be just before God, '
  - type: text
    content: or
  - type: text
    content: ' be more right than He is? Can a man be pure before his Maker, '
  - type: text
    content: or
  - type: text
    content: ' be more cleansed than He is? [I John 1:7; Rev. 1:5.]'
  '18':
  - type: text
    content: ' Even in His [heavenly] servants He puts no trust '
  - type: text
    content: or
  - type: text
    content: ' confidence, and His angels He charges with folly '
  - type: text
    content: and
  - type: text
    content: ' error–'
  '19':
  - type: text
    content: ' How much more those who dwell in houses (bodies) of clay, whose foundations are in the dust, who are crushed like the moth.'
  '2':
  - type: text
    content: ' If we venture to converse with you, will you be offended? Yet who can restrain himself from speaking?'
  '20':
  - type: text
    content: ' Between morning and evening they are destroyed; without anyone noticing it they perish forever.'
  '21':
  - type: text
    content: ' Is not their tent cord plucked up within them [so that the tent falls]? Do they not die, and that without [acquiring] wisdom?'
  '3':
  - type: text
    content: ' Behold, you have instructed many, and you have strengthened the weak hands.'
  '4':
  - type: text
    content: ' Your words have held firm him who was falling, and you have strengthened the feeble knees.'
  '5':
  - type: text
    content: ' But now it is come upon you, and you faint '
  - type: text
    content: and
  - type: text
    content: ' are grieved; it touches you, and you are troubled '
  - type: text
    content: and
  - type: text
    content: ' dismayed.'
  '6':
  - type: text
    content: ' Is not your [reverent] fear of God your confidence and the integrity '
  - type: text
    content: and
  - type: text
    content: ' uprightness of your ways your hope?'
  '7':
  - type: text
    content: ' Think [earnestly], I beg of you: who, being innocent, ever perished? Or where were those upright '
  - type: text
    content: and
  - type: text
    content: ' in right standing with God cut off?'
  '8':
  - type: text
    content: ' As I myself have seen, those who plow iniquity and sow trouble '
  - type: text
    content: and
  - type: text
    content: ' mischief reap the same.'
  '9':
  - type: text
    content: ' By the breath of God they perish, and by the blast of His anger they are consumed.'
