document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ELIPHAZ the Temanite answered and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' If we venture to converse with you, will you be offended? Yet who can restrain himself from speaking?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Behold, you have instructed many, and you have strengthened the weak hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Your words have held firm him who was falling, and you have strengthened the feeble knees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But now it is come upon you, and you faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are grieved; it touches you, and you are troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Is not your [reverent] fear of God your confidence and the integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uprightness of your ways your hope?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Think [earnestly], I beg of you: who, being innocent, ever perished? Or where were those upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in right standing with God cut off?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As I myself have seen, those who plow iniquity and sow trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mischief reap the same.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' By the breath of God they perish, and by the blast of His anger they are consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The roaring of the lion and the voice of the fierce lion, and the teeth of the young lions are broken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The old '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong lion perishes for lack of prey, and the whelps of the lioness are scattered abroad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now a thing was secretly brought to me, and my ear received a whisper of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In thoughts from the visions of the night, when deep sleep falls on men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Fear came upon me and trembling, which made all my bones shake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then a spirit passed before my face; the hair of my flesh stood up!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [The spirit] stood still, but I could not discern the appearance of it. A form was before my eyes; there was silence, and then I heard a voice, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Can mortal man be just before God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be more right than He is? Can a man be pure before his Maker, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be more cleansed than He is? [I John 1:7; Rev. 1:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Even in His [heavenly] servants He puts no trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' confidence, and His angels He charges with folly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' error–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' How much more those who dwell in houses (bodies) of clay, whose foundations are in the dust, who are crushed like the moth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Between morning and evening they are destroyed; without anyone noticing it they perish forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Is not their tent cord plucked up within them [so that the tent falls]? Do they not die, and that without [acquiring] wisdom?'
