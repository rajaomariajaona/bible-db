document_id: EXO.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, Behold, I make you as God to Pharaoh [to declare My will and purpose to him]; and Aaron your brother shall be your prophet.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Moses and Aaron went to Pharaoh and did as the Lord had commanded; Aaron threw down his rod before Pharaoh and his servants, and it became a serpent.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Pharaoh called for the wise men [skilled in magic and divination] and the sorcerers (wizards and jugglers). And they also, these magicians of Egypt, did similar things with their enchantments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret arts.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they cast down every man his rod and they became serpents; but Aaron''s rod swallowed up their rods.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Pharaoh''s heart was hardened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stubborn and he would not listen to them, just as the Lord had said.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the Lord said to Moses, Pharaoh''s heart is hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stubborn; he refuses to let the people go.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go to Pharaoh in the morning; he will be going out to the water; wait for him by the river''s brink; and the rod which was turned to a serpent you shall take in your hand.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say to him, The Lord, the God of the Hebrews has sent me to you, saying, Let My people go, that they may serve Me in the wilderness; and behold, heretofore you have not listened.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord, In this you shall know, recognize, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that I am the Lord: behold, I will smite with the rod in my hand the waters in the [Nile] River, and they shall be turned to blood.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fish in the river shall die, the river shall become foul smelling, and the Egyptians shall loathe to drink from it.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, Say to Aaron, Take your rod and stretch out your hand over the waters of Egypt, over their streams, rivers, pools, and ponds of water, that they may become blood; and there shall be blood throughout all the land of Egypt, in containers both of wood and of stone.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall speak all that I command you, and Aaron your brother shall tell Pharaoh to let the Israelites go out of his land.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses and Aaron did as the Lord commanded; [Aaron] lifted up the rod and smote the waters in the river in the sight of Pharaoh and his servants, and all the waters in the river were turned to blood.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the fish in the river died; and the river became foul smelling, and the Egyptians could not drink its water, and there was blood throughout all the land of Egypt.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the magicians of Egypt did the same by their enchantments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret arts; and Pharaoh''s heart was made hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obstinate, and he did not listen to Moses and Aaron, just as the Lord had said.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Pharaoh turned and went into his house; neither did he take even this to heart.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the Egyptians dug round about the river for water to drink, for they could not drink the water of the [Nile].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Seven days passed after the Lord had smitten the river.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will make Pharaoh''s heart stubborn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hard, and multiply My signs, My wonders, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miracles in the land of Egypt.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Pharaoh will not listen to you, and I will lay My hand upon Egypt and bring forth My hosts, My people the Israelites, out of the land of Egypt by great acts of judgment.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Egyptians shall know that I am the Lord when I stretch forth My hand upon Egypt and bring out the Israelites from among them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses and Aaron did so, as the Lord commanded them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Moses was 80 years old and Aaron 83 years old when they spoke to Pharaoh.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses and Aaron,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Pharaoh says to you, Prove [your authority] by a miracle, then tell Aaron, Throw your rod down before Pharaoh, that it may become a serpent.'
