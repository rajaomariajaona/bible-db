document_id: JOB.32
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO THESE three men ceased to answer Job, because he was [rigidly] righteous (upright and in right standing with God) in his own eyes. [But there was a fifth man there also.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Elihu son of Barachel the Buzite, of the family of Ram, became indignant. His indignation was kindled against Job because he justified himself rather than God [even made himself out to be better than God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Also against [Job''s] three friends was [Elihu''s] anger kindled, because they had found no answer [were unable to show his real error], and yet they had declared him to be in the wrong [and responsible for his own afflictions].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Now Elihu had waited to speak to Job because the others were older than he.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But when Elihu saw that there was no answer in the mouths of these three men, he became angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then Elihu son of Barachel the Buzite said, I am young, and you are aged; for that reason I was timid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restrained and dared not declare my opinion to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I said, Age should speak, and a multitude of years should teach wisdom [so let it be heard].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But there is [a vital force] a spirit [of intelligence] in man, and the breath of the Almighty gives men understanding. [Prov. 2:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' It is not the great [necessarily] who are wise, nor [always] the aged who understand justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So I say, Listen to me; I also will give you my opinion [about Job''s situation] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You see, I waited for your words, I listened to your wise reasons, while you searched out what to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yes, I paid attention to what you said, and behold, not one of you convinced Job or made [satisfactory] replies to his words [you could not refute him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Beware lest you say, We have found wisdom; God thrusts [Job] down [justly], not man [God alone is dealing with him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now [Job] has not directed his words against me [therefore I have no cause for irritation], neither will I answer him with speeches like yours. [I speak for truth, not for revenge.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [Job''s friends] are amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embarrassed, they answer no more; they have not a thing to say [reports Elihu].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And shall I wait, because they say nothing but stand still and answer no more?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I also will answer my [God-assigned] part; I also will declare my opinion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For I am full of words; the spirit within me constrains me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' My breast is as wine that has no vent; like new wineskins, it is ready to burst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' I must speak, that I may get relief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be refreshed; I will open my lips and answer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I will not [I warn you] be influenced by respect for any man''s person '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show partiality, neither will I flatter any man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For I know not how to flatter, [wasting my time in mere formalities, for then] my Maker would soon take me away.'
