document_id: 1CH.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN DAVID said, Here shall be the house of the Lord God, and here the altar of the burnt offering for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' David commanded to gather together the strangers who were in the land of Israel, and he set stonecutters to hew out stones to build the house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' David prepared iron in abundance for nails for the doors of the gates and for the couplings, and bronze in abundance without weighing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Also cedar trees without number, for the Sidonians and they of Tyre brought much cedar timber to David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' David said, Solomon my son is young and inexperienced, and the house that is to be built for the Lord must be exceedingly magnificent, of fame and glory throughout all lands. I will therefore make preparation for it. So David prepared abundantly before his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then he called for Solomon his son and charged him to build a house for the Lord, the God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' David said to Solomon, My son, it was in my heart to build a house to the Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [for the symbol of] the Presence of the Lord my God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But the word of the Lord came to me, saying, You have shed much blood and have waged great wars; you shall not build a house to My Name, because you have shed much blood on the earth in My sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Behold, a son shall be born to you who shall be a man of peace. I will give him rest from all his enemies round about; for his name shall be Solomon [peaceable], and I will give peace and quiet to Israel in his days. [II Sam. 12:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He shall build a house for My Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [the symbol of My] Presence. He shall be My son, and I will be his father; and I will establish his royal throne over Israel forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now, my son, the Lord be with and prosper you in building the house of the Lord your God, as He has spoken concerning you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Only may the Lord give you wisdom and understanding as you are put in charge of Israel, that you may keep the law of the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then you will prosper if you are careful to keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfill the statutes and ordinances with which the Lord charged Moses concerning Israel. Be strong and of good courage. Dread not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear not; be not dismayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In my affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble I have provided for the house of the Lord 100,000 talents of gold, 1,000,000 talents of silver, and bronze and iron without weighing. I have also provided timber and stone; you must add to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You have workmen in abundance: hewers, workers of stone and timber, and all kinds of craftsmen without number, skillful in doing every kind of work'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' With gold, silver, bronze, and iron. So arise and be doing, and the Lord be with you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' David also commanded all the princes of Israel to help Solomon his son, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Is not the Lord your God with you? And has He not given you peace on every side? For He has given the inhabitants of the land into my hand, and the land is subdued before the Lord and His people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now set your mind and heart to seek (inquire of and require as your vital necessity) the Lord your God. Arise and build the sanctuary of the Lord God, so that the ark of the covenant of the Lord and the holy vessels of God may be brought into the house built to the Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renown of the Lord.'
