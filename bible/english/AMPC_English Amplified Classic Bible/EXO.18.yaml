document_id: EXO.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW JETHRO [Reuel], the priest of Midian, Moses'' father-in-law, heard of all that God had done for Moses and for Israel His people, and that the Lord had brought Israel out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Jethro, Moses'' father-in-law, took Zipporah, Moses'' wife, after Moses had sent her back [to her father],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And her two sons, of whom the name of the one was Gershom [ expulsion, or a stranger there], for Moses said, I have been an alien in a strange land;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the name of the other was Eliezer [God is help], for the God of my father, said Moses, was my help, and delivered me from the sword of Pharaoh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Jethro, Moses'' father-in-law, came with Moses'' sons and his wife to the wilderness where he was encamped at the mount of God [Horeb, or Sinai].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he said [in a message] to Moses, I, your father-in-law Jethro, am come to you and your wife and her two sons with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Moses went out to meet his father-in-law and bowed in homage and kissed him; and each asked the other of his welfare and they came into the tent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Moses told his father-in-law all the Lord had done to Pharaoh and the Egyptians for Israel''s sake and all the hardships that had come upon them by the way and how the Lord delivered them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jethro rejoiced for all the goodness the Lord had done to Israel in that He had delivered them out of the hand of the Egyptians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jethro said, Blessed be the Lord, Who has delivered you out of the hand of the Egyptians and out of the hand of Pharaoh, Who has delivered the people [Israel] from under the hand of the Egyptians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now I know that the Lord is greater than all gods. Yes, in the [very] thing in which they dealt proudly [He showed Himself infinitely superior to all their gods].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Jethro, Moses'' father-in-law, took a burnt offering and sacrifices [to offer] to God, and Aaron came with all the elders of Israel to eat bread with Moses'' father-in-law before God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Next day Moses sat to judge the people, and the people stood around Moses from morning till evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When Moses'' father-in-law saw all that he was doing for the people, he said, What is this that you do for the people? Why do you sit alone, and all the people stand around you from morning till evening?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Moses said to his father-in-law, Because the people come to me to inquire of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When they have a dispute they come to me, and I judge between a man and his neighbor, and I make them know the statutes of God and His laws.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Moses'' father-in-law said to him, The thing that you are doing is not good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You will surely wear out both yourself and this people with you, for the thing is too heavy for you; you are not able to perform it all by yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Listen now to [me]; I will counsel you, and God will be with you. You shall represent the people before God, bringing their cases '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' causes to Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Teaching them the decrees and laws, showing them the way they must walk and the work they must do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Moreover, you shall choose able men from all the people–God-fearing men of truth who hate unjust gain–and place them over thousands, hundreds, fifties, and tens, to be their rulers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And let them judge the people at all times; every great matter they shall bring to you, but every small matter they shall judge. So it will be easier for you, and they will bear the burden with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' If you will do this, and God so commands you, you will be able to endure [the strain], and all these people also will go to their [tents] in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So Moses listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeded the voice of his father-in-law and did all that he had said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Moses chose able men out of all Israel and made them heads over the people, rulers of thousands, of hundreds, of fifties, and of tens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they judged the people at all times; the hard cases they brought to Moses, but every small matter they decided themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then Moses let his father-in-law depart, and he went his way into his own land.'
