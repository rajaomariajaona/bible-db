document_id: ACT.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW [living] at Caesarea there was a man whose name was Cornelius, a centurion (captain) of what was known as the Italian Regiment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A devout man who venerated God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treated Him with reverential obedience, as did all his household; and he gave much alms to the people and prayed continually to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' About the ninth hour (about 3:00 p.m.) of the day he saw clearly in a vision an angel of God entering and saying to him, Cornelius!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he, gazing intently at him, became frightened and said, What is it, Lord? And the angel said to him, Your prayers and your [generous] gifts to the poor have come up [as a sacrifice] to God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have been remembered by Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And now send men to Joppa and have them call for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' invite here a certain Simon whose surname is Peter;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He is lodging with Simon a tanner, whose house is by the seaside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When the angel who spoke to him had left, Cornelius called two of his servants and a God-fearing soldier from among his own personal attendants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And having rehearsed everything to them, he sent them to Joppa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The next day as they were still on their way and were approaching the town, Peter went up to the roof of the house to pray, about the sixth hour (noon).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But he became very hungry, and wanted something to eat; and while the meal was being prepared a trance came over him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he saw the sky opened and something like a great sheet lowered by the four corners, descending to the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' It contained all kinds of quadrupeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and wild beasts
  - type: text
    text: ' and creeping things of the earth and birds of the air.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And there came a voice to him, saying, Rise up, Peter, kill and eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But Peter said, No, by no means, Lord; for I have never eaten anything that is common '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unhallowed or [ceremonially] unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the voice came to him again a second time, What God has cleansed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pronounced clean, do not you defile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane by regarding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calling common '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unhallowed or unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' This occurred three times; then immediately the sheet was taken up to heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now Peter was still inwardly perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doubted as to what the vision which he had seen could mean, when [just then] behold the messengers that were sent by Cornelius, who had made inquiry for Simon''s house, stopped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stood before the gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And they called out to inquire whether Simon who was surnamed Peter was staying there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And while Peter was earnestly revolving the vision in his mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' meditating on it, the [Holy] Spirit said to him, Behold, three men are looking for you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Get up and go below and accompany them without any doubt [about its legality] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' any discrimination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hesitation, for I have sent them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Peter went down to the men and said, I am the man you seek; what is the purpose of your coming?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they said, Cornelius, a centurion (captain) who is just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in right standing with God, being God-fearing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obedient and well spoken of by the whole Jewish nation, has been instructed by a holy angel to send for you to come to his house; and he has received in answer [to prayer] a warning to listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' act upon what you have to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So Peter invited them in to be his guests [for the night]. The next day he arose and went away with them, and some of the brethren from Joppa accompanied him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And on the following day they entered Caesarea. Cornelius was waiting for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expecting them, and he had invited together his relatives and his intimate friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' As Peter arrived, Cornelius met him, and falling down at his feet he made obeisance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid worshipful reverence to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But Peter raised him up, saying, Get up; I myself am also a man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And as [Peter] spoke with him, he entered the house and found a large group of persons assembled;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he said to them, You yourselves are aware how it is not lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' permissible for a Jew to keep company with or to visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' [even] to come near '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to speak first to anyone of another nationality, but God has shown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taught me by words that I should not call any human being common '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unhallowed or [ceremonially] unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Therefore when I was sent for, I came without hesitation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' objection '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' misgivings. So now I ask for what reason you sent for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Cornelius said, This is now the fourth day since about this time I was observing the ninth hour (three o''clock in the afternoon) of prayer in my lodging place; [suddenly] a man stood before me in dazzling apparel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And he said, Cornelius, your prayer has been heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harkened to, and your donations to the poor have been known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserved before God [so that He heeds and is about to help you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Send therefore to Joppa and ask for Simon who is surnamed Peter; he is staying in the house of Simon the tanner by the seaside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So at once I sent for you, and you [being a Jew] have done a kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handsome thing in coming. Now then, we are all present in the sight of God to listen to all that you have been instructed by the Lord to say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Peter opened his mouth and said: Most certainly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly I now perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that God shows no partiality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is no respecter of persons,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But in every nation he who venerates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has a reverential fear for God, treating Him with worshipful obedience and living uprightly, is acceptable to Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sure of being received and welcomed [by Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' You know the contents of the message which He sent to Israel, announcing the good news (Gospel) of peace by Jesus Christ, Who is Lord of all–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' The [same] message which was proclaimed throughout all Judea, starting from Galilee after the baptism preached by John–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' How God anointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrated Jesus of Nazareth with the [Holy] Spirit and with strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; how He went about doing good and, in particular, curing all who were harassed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressed by [the power of] the devil, for God was with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And we are [eye and ear] witnesses of everything that He did both in the land of the Jews and in Jerusalem. And [yet] they put Him out of the way (murdered Him) by hanging Him on a tree;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But God raised Him to life on the third day and caused Him to be manifest (to be plainly seen),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Not by all the people but to us who were chosen (designated) beforehand by God as witnesses, who ate and drank with Him after He arose from the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And He charged us to preach to the people and to bear solemn testimony that He is the God-appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' God-ordained Judge of the living and the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' To Him all the prophets testify (bear witness) that everyone who believes in Him [who adheres to, trusts in, and relies on Him, giving himself up to Him] receives forgiveness of sins through His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' While Peter was still speaking these words, the Holy Spirit fell on all who were listening to the message.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And the believers from among the circumcised [the Jews] who came with Peter were surprised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' amazed, because the free gift of the Holy Spirit had been bestowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poured out largely even on the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' For they heard them talking in [unknown] tongues (languages) and extolling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnifying God. Then Peter asked,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Can anyone forbid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' refuse water for baptizing these people, seeing that they have received the Holy Spirit just as we have?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And he ordered that they be baptized in the name of Jesus Christ (the Messiah). Then they begged him to stay on there for some days.'
