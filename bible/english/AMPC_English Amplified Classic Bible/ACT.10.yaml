document_id: ACT.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW [living] at Caesarea there was a man whose name was Cornelius, a centurion (captain) of what was known as the Italian Regiment,'
  '10':
  - type: text
    content: ' But he became very hungry, and wanted something to eat; and while the meal was being prepared a trance came over him,'
  '11':
  - type: text
    content: ' And he saw the sky opened and something like a great sheet lowered by the four corners, descending to the earth.'
  '12':
  - type: text
    content: ' It contained all kinds of quadrupeds '
  - type: text
    content: and wild beasts
  - type: text
    content: ' and creeping things of the earth and birds of the air.'
  '13':
  - type: text
    content: ' And there came a voice to him, saying, Rise up, Peter, kill and eat.'
  '14':
  - type: text
    content: ' But Peter said, No, by no means, Lord; for I have never eaten anything that is common '
  - type: text
    content: and
  - type: text
    content: ' unhallowed or [ceremonially] unclean.'
  '15':
  - type: text
    content: ' And the voice came to him again a second time, What God has cleansed '
  - type: text
    content: and
  - type: text
    content: ' pronounced clean, do not you defile '
  - type: text
    content: and
  - type: text
    content: ' profane by regarding '
  - type: text
    content: and
  - type: text
    content: ' calling common '
  - type: text
    content: and
  - type: text
    content: ' unhallowed or unclean.'
  '16':
  - type: text
    content: ' This occurred three times; then immediately the sheet was taken up to heaven.'
  '17':
  - type: text
    content: ' Now Peter was still inwardly perplexed '
  - type: text
    content: and
  - type: text
    content: ' doubted as to what the vision which he had seen could mean, when [just then] behold the messengers that were sent by Cornelius, who had made inquiry for Simon''s house, stopped '
  - type: text
    content: and
  - type: text
    content: ' stood before the gate.'
  '18':
  - type: text
    content: ' And they called out to inquire whether Simon who was surnamed Peter was staying there.'
  '19':
  - type: text
    content: ' And while Peter was earnestly revolving the vision in his mind '
  - type: text
    content: and
  - type: text
    content: ' meditating on it, the [Holy] Spirit said to him, Behold, three men are looking for you!'
  '2':
  - type: text
    content: ' A devout man who venerated God '
  - type: text
    content: and
  - type: text
    content: ' treated Him with reverential obedience, as did all his household; and he gave much alms to the people and prayed continually to God.'
  '20':
  - type: text
    content: ' Get up and go below and accompany them without any doubt [about its legality] '
  - type: text
    content: or
  - type: text
    content: ' any discrimination '
  - type: text
    content: or
  - type: text
    content: ' hesitation, for I have sent them.'
  '21':
  - type: text
    content: ' Then Peter went down to the men and said, I am the man you seek; what is the purpose of your coming?'
  '22':
  - type: text
    content: ' And they said, Cornelius, a centurion (captain) who is just '
  - type: text
    content: and
  - type: text
    content: ' upright '
  - type: text
    content: and
  - type: text
    content: ' in right standing with God, being God-fearing '
  - type: text
    content: and
  - type: text
    content: ' obedient and well spoken of by the whole Jewish nation, has been instructed by a holy angel to send for you to come to his house; and he has received in answer [to prayer] a warning to listen to '
  - type: text
    content: and
  - type: text
    content: ' act upon what you have to say.'
  '23':
  - type: text
    content: ' So Peter invited them in to be his guests [for the night]. The next day he arose and went away with them, and some of the brethren from Joppa accompanied him.'
  '24':
  - type: text
    content: ' And on the following day they entered Caesarea. Cornelius was waiting for '
  - type: text
    content: and
  - type: text
    content: ' expecting them, and he had invited together his relatives and his intimate friends.'
  '25':
  - type: text
    content: ' As Peter arrived, Cornelius met him, and falling down at his feet he made obeisance '
  - type: text
    content: and
  - type: text
    content: ' paid worshipful reverence to him.'
  '26':
  - type: text
    content: ' But Peter raised him up, saying, Get up; I myself am also a man.'
  '27':
  - type: text
    content: ' And as [Peter] spoke with him, he entered the house and found a large group of persons assembled;'
  '28':
  - type: text
    content: ' And he said to them, You yourselves are aware how it is not lawful '
  - type: text
    content: or
  - type: text
    content: ' permissible for a Jew to keep company with or to visit '
  - type: text
    content: or
  - type: text
    content: ' [even] to come near '
  - type: text
    content: or
  - type: text
    content: ' to speak first to anyone of another nationality, but God has shown '
  - type: text
    content: and
  - type: text
    content: ' taught me by words that I should not call any human being common '
  - type: text
    content: or
  - type: text
    content: ' unhallowed or [ceremonially] unclean.'
  '29':
  - type: text
    content: ' Therefore when I was sent for, I came without hesitation '
  - type: text
    content: or
  - type: text
    content: ' objection '
  - type: text
    content: or
  - type: text
    content: ' misgivings. So now I ask for what reason you sent for me.'
  '3':
  - type: text
    content: ' About the ninth hour (about 3:00 p.m.) of the day he saw clearly in a vision an angel of God entering and saying to him, Cornelius!'
  '30':
  - type: text
    content: ' And Cornelius said, This is now the fourth day since about this time I was observing the ninth hour (three o''clock in the afternoon) of prayer in my lodging place; [suddenly] a man stood before me in dazzling apparel,'
  '31':
  - type: text
    content: ' And he said, Cornelius, your prayer has been heard '
  - type: text
    content: and
  - type: text
    content: ' harkened to, and your donations to the poor have been known '
  - type: text
    content: and
  - type: text
    content: ' preserved before God [so that He heeds and is about to help you].'
  '32':
  - type: text
    content: ' Send therefore to Joppa and ask for Simon who is surnamed Peter; he is staying in the house of Simon the tanner by the seaside.'
  '33':
  - type: text
    content: ' So at once I sent for you, and you [being a Jew] have done a kind '
  - type: text
    content: and
  - type: text
    content: ' courteous '
  - type: text
    content: and
  - type: text
    content: ' handsome thing in coming. Now then, we are all present in the sight of God to listen to all that you have been instructed by the Lord to say.'
  '34':
  - type: text
    content: ' And Peter opened his mouth and said: Most certainly '
  - type: text
    content: and
  - type: text
    content: ' thoroughly I now perceive '
  - type: text
    content: and
  - type: text
    content: ' understand that God shows no partiality '
  - type: text
    content: and
  - type: text
    content: ' is no respecter of persons,'
  '35':
  - type: text
    content: ' But in every nation he who venerates '
  - type: text
    content: and
  - type: text
    content: ' has a reverential fear for God, treating Him with worshipful obedience and living uprightly, is acceptable to Him '
  - type: text
    content: and
  - type: text
    content: ' sure of being received and welcomed [by Him].'
  '36':
  - type: text
    content: ' You know the contents of the message which He sent to Israel, announcing the good news (Gospel) of peace by Jesus Christ, Who is Lord of all–'
  '37':
  - type: text
    content: ' The [same] message which was proclaimed throughout all Judea, starting from Galilee after the baptism preached by John–'
  '38':
  - type: text
    content: ' How God anointed '
  - type: text
    content: and
  - type: text
    content: ' consecrated Jesus of Nazareth with the [Holy] Spirit and with strength '
  - type: text
    content: and
  - type: text
    content: ' ability '
  - type: text
    content: and
  - type: text
    content: ' power; how He went about doing good and, in particular, curing all who were harassed '
  - type: text
    content: and
  - type: text
    content: ' oppressed by [the power of] the devil, for God was with Him.'
  '39':
  - type: text
    content: ' And we are [eye and ear] witnesses of everything that He did both in the land of the Jews and in Jerusalem. And [yet] they put Him out of the way (murdered Him) by hanging Him on a tree;'
  '4':
  - type: text
    content: ' And he, gazing intently at him, became frightened and said, What is it, Lord? And the angel said to him, Your prayers and your [generous] gifts to the poor have come up [as a sacrifice] to God '
  - type: text
    content: and
  - type: text
    content: ' have been remembered by Him.'
  '40':
  - type: text
    content: ' But God raised Him to life on the third day and caused Him to be manifest (to be plainly seen),'
  '41':
  - type: text
    content: ' Not by all the people but to us who were chosen (designated) beforehand by God as witnesses, who ate and drank with Him after He arose from the dead.'
  '42':
  - type: text
    content: ' And He charged us to preach to the people and to bear solemn testimony that He is the God-appointed '
  - type: text
    content: and
  - type: text
    content: ' God-ordained Judge of the living and the dead.'
  '43':
  - type: text
    content: ' To Him all the prophets testify (bear witness) that everyone who believes in Him [who adheres to, trusts in, and relies on Him, giving himself up to Him] receives forgiveness of sins through His name.'
  '44':
  - type: text
    content: ' While Peter was still speaking these words, the Holy Spirit fell on all who were listening to the message.'
  '45':
  - type: text
    content: ' And the believers from among the circumcised [the Jews] who came with Peter were surprised '
  - type: text
    content: and
  - type: text
    content: ' amazed, because the free gift of the Holy Spirit had been bestowed '
  - type: text
    content: and
  - type: text
    content: ' poured out largely even on the Gentiles.'
  '46':
  - type: text
    content: ' For they heard them talking in [unknown] tongues (languages) and extolling '
  - type: text
    content: and
  - type: text
    content: ' magnifying God. Then Peter asked,'
  '47':
  - type: text
    content: ' Can anyone forbid '
  - type: text
    content: or
  - type: text
    content: ' refuse water for baptizing these people, seeing that they have received the Holy Spirit just as we have?'
  '48':
  - type: text
    content: ' And he ordered that they be baptized in the name of Jesus Christ (the Messiah). Then they begged him to stay on there for some days.'
  '5':
  - type: text
    content: ' And now send men to Joppa and have them call for '
  - type: text
    content: and
  - type: text
    content: ' invite here a certain Simon whose surname is Peter;'
  '6':
  - type: text
    content: ' He is lodging with Simon a tanner, whose house is by the seaside.'
  '7':
  - type: text
    content: ' When the angel who spoke to him had left, Cornelius called two of his servants and a God-fearing soldier from among his own personal attendants.'
  '8':
  - type: text
    content: ' And having rehearsed everything to them, he sent them to Joppa.'
  '9':
  - type: text
    content: ' The next day as they were still on their way and were approaching the town, Peter went up to the roof of the house to pray, about the sixth hour (noon).'
