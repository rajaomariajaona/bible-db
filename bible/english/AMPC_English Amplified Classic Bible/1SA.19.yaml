document_id: 1SA.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW SAUL told Jonathan his son and all his servants that they must kill David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But Jonathan, Saul''s son, delighted much in David, and he told David, Saul my father is seeking to kill you. Now therefore, take heed to yourself in the morning, and stay in a secret place and hide yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I will go out and stand beside my father in the field where you are; and I will converse with my father about you and if I learn anything, I will tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Jonathan spoke well of David to Saul his father and said to him, Let not the king sin against his servant David, for he has not sinned against you, and his deeds have been of good service to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For he took his life in his hands and slew the Philistine, and the Lord wrought a great deliverance for all Israel; you saw it and rejoiced. Why then will you sin against innocent blood and kill David without a cause?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Saul heeded Jonathan and swore, As the Lord lives, David shall not be slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So Jonathan called David and told him all these things. And Jonathan brought David to Saul, and he was in his presence as in times past.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then there was war again, and David went out and fought with the Philistines, and made a great slaughter among them and they fled before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then an evil spirit from the Lord came upon Saul as he sat in his house with his spear in his hand; and David was playing [the lyre] with his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Saul sought to pin David to the wall with the spear, but he slipped away, so that Saul struck the spear into the wall. Then David fled and escaped that night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Saul sent messengers that night to David''s house to watch him, that he might kill him in the morning. But Michal, David''s wife, told him, If you do not save your life tonight, tomorrow you will be killed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So Michal let David down through the window, and he fled and escaped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Michal took the teraph (household good luck image) and laid it in the bed, put a pillow of goats'' hair at its head, and covered it with a bedspread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when Saul sent messengers to take David, she said, He is sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Saul sent the messengers again to see David, saying, Bring him up to me in the bed, that I may slay him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And when the messengers came in, behold, there was an image in the bed, with a pillow of goats'' hair at its head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Saul said to Michal, Why have you deceived me so and sent away my enemy so that he has escaped? Michal answered Saul, He said to me, Let me go. Why should I kill you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So David fled and escaped and came to Samuel at Ramah and told him all that Saul had done to him. And he and Samuel went and dwelt in Naioth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And it was told Saul, Behold, David is at Naioth in Ramah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Saul sent messengers to take David; and when they saw the company of the prophets prophesying, and Samuel standing as appointed head over them, the Spirit of God came upon the messengers of Saul and they also prophesied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When it was told Saul, he sent other messengers, and they also prophesied. And Saul sent messengers again the third time, and they also prophesied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Saul himself went to Ramah and came to a great well that is in Secu; and he asked, Where are Samuel and David? And he was told, They are at Naioth in Ramah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So he went on to Naioth in Ramah; and the Spirit of God came upon him also, and as he went on he prophesied until he came to Naioth in Ramah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He took off his royal robes and prophesied before Samuel and lay down stripped thus all that day and night. So they say, Is Saul also among the prophets? [I Sam. 10:10.]'
