document_id: JER.39
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadrezzar king of Babylon and all his army came against Jerusalem and besieged it. [Jer. 52:4-27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And in the eleventh year of Zedekiah, in the fourth month, on the ninth day of the month, they broke into the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [When Jerusalem was taken] all the princes of the king of Babylon came in and sat in the Middle Gate: Nergal-sharezer, Samgar-nebo, Sarsechim [the Rabsaris] a chief of the eunuchs, and Nergal-sharezer [II, the Rabmag] a chief of the magicians, with all the rest of the officials of the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when Zedekiah king of Judah and all the men of war saw them, they fled and went forth out of the city at night by way of the king''s garden, through the gate between the two walls, and [the king] went out toward the Arabah (the Jordan Valley).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But the Chaldean army pursued them and overtook Zedekiah in the plains of Jericho. And when they had taken him, they brought him up to Nebuchadrezzar king of Babylon at Riblah in the [Syrian] land of Hamath, where he pronounced sentence upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the king of Babylon slew the sons of Zedekiah at Riblah before his eyes; also the king of Babylon slew all the nobles of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Moreover, he put out Zedekiah''s eyes and bound him with shackles to take him to Babylon. [Ezek. 12:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Chaldeans burned the king''s house and the houses of the people and broke down the walls of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Nebuzaradan the [chief executioner and] captain of the guard carried away captive to Babylon the rest of the people who remained in the city, along with those who deserted to him, and the remainder of the [so-called better class of] people who were left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But Nebuzaradan the [Babylonian] captain of the guard left in the land of Judah some of the poor of the people who had nothing, giving them vineyards and fields at the same time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Nebuchadrezzar king of Babylon gave command concerning Jeremiah to Nebuzaradan the captain of the guard, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Take him and look after him well; do him no harm but deal with him as he may ask of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So Nebuzaradan the captain of the guard, Nebushasban [the Rabsaris] a chief of the eunuchs, Nergal-sharezer [II, the Rabmag] a chief of the magicians, and all the chief officers of the king of Babylon'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Sent and took Jeremiah out of the court of the guard and entrusted him to Gedaliah [a prominent man whose father had once saved the prophet''s life] son of Ahikam, the son of Shaphan, that he should take him home [with him to Mizpah]. So Jeremiah was released '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelt among the people. [Jer. 26:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now the word of the Lord came to Jeremiah while he was [still] shut up in the court of the guard, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Go and say to Ebed-melech the Ethiopian, Thus says the Lord of hosts, the God of Israel: Behold, I will bring to pass My words against this city for evil and not for good; and they will be accomplished before you on that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But I will deliver you [Ebed-melech] on that day, says the Lord, and you will not be given into the hands of the men of whom you are afraid. [Jer. 38:7-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For I will surely deliver you; and you will not fall by the sword, but your life will be [as your only booty and] as a reward of battle to you, because you have put your trust in Me, says the Lord.'
