document_id: PSA.109,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O GOD of my praise! Keep not silence,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let his children be continual vagabonds [as was Cain] and beg; let them seek their bread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be driven far from their ruined homes. [Gen. 4:12.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the creditor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extortioner seize all that he has; and let strangers (barbarians and foreigners) plunder the fruits of his labor.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let there be none to extend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' continue mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindness to him, neither let there be any to have pity on his fatherless children.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let his posterity be cut off, and in the generation following let their names be blotted out.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the iniquity of his fathers be remembered by the Lord; and let not the sin of his mother be blotted out.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let them be before the Lord continually, that He may cut off the memory of them from the earth!–'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because the man did not [earnestly] remember to show mercy, but pursued '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecuted the poor and needy man, and the broken in heart [he was ready] to slay.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, he loved cursing, and it came [back] upon him; he delighted not in blessing, and it was far from him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He clothed himself also with cursing as with his garment, and it seeped into his inward [life] like water, and like oil into his bones.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let it be to him as the raiment with which he covers himself and as the girdle with which he is girded continually.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the mouths of the wicked and the mouth of deceit are opened against me; they have spoken to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against me with lying tongues.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let this be the reward of my adversaries from the Lord, and of those who speak evil against my life.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But You deal with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' act for me, O God the Lord, for Your name''s sake; because Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness are good, O deliver me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I am poor and needy, and my heart is wounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stricken within me.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I am gone like the shadow when it lengthens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declines; I toss up and down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' am shaken off as the locust.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My knees are weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' totter from fasting; and my body is gaunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has no fatness.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have become also a reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a taunt to others; when they see me, they shake their heads. [Matt. 26:39.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Help me, O Lord my God; O save me according to Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness!–'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That they may know that this is Your hand, that You, Lord, have done it.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let them curse, but do You bless. When adversaries arise, let them be put to shame, but let Your servant rejoice.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let my adversaries be clothed with shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dishonor, and let them cover themselves with their own disgrace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confusion as with a robe.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They have compassed me about also with words of hatred and have fought against me without a cause.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will give great praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanks to the Lord with my mouth; yes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I will praise Him among the multitude.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He will stand at the right hand of the poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' needy, to save him from those who condemn his life.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In return for my love they are my adversaries, but I resort to prayer.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they have rewarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laid upon me evil for good, and hatred for my love.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Set a wicked man over him [as a judge], and let [a malicious] accuser stand at his right hand.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When [the wicked] is judged, let him be condemned, and let his prayer [for leniency] be turned into a sin.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let his days be few; and let another take his office '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charge. [Acts 1:20.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let his children be fatherless and his wife a widow.'
