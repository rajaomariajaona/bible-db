document_id: EZK.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MOREOVER, THE Spirit lifted me up and brought me to the East Gate of the Lord''s house, which faces east. And behold, at the door of the gateway there were twenty-five men; and I saw in the midst of them Jaazaniah the son of Azzur and Pelatiah the son of Benaiah, princes of the people.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' You shall fall by the sword; I will judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish you [before your neighbors] at the border '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' outside the land of Israel, and you shall know (understand and realize) that I am the Lord.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' This city shall not be your boiling pot, neither shall you be the flesh in the midst of it; I will judge you at the border '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' outside of Israel;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And you shall know (understand and realize) that I am the Lord; for you have not walked in My statutes nor executed My ordinances, but have acted according to the ordinances of the nations around you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And while I was prophesying, Pelatiah the son of Benaiah died. Then I fell down upon my face and cried with a loud voice, Ah, Lord God! Will You make a complete end of the remnant of Israel?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the word of the Lord came to me, saying,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Son of man, your brethren, even your kindred, your fellow exiles, and all the house of Israel, all of them, are they of whom the [present] inhabitants of Jerusalem have said, They have gone far from the Lord [and from this land]; therefore this land is given to us for a possession.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Therefore say, Thus says the Lord God: Whereas I have removed [Israel] far off among the nations, and whereas I have scattered them among the countries, yet I have been to them a sanctuary for a little while in the countries to which they have come.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Therefore say, Thus says the Lord God: I will gather you from the peoples and assemble you out of the countries where you have been scattered, and I will give back to you the land of Israel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And when they return there, they shall take away from it all traces of its detestable things and all its abominations (sex impurities and heathen religious practices).'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And I will give them one heart [a new heart] and I will put a new spirit within them; and I will take the stony [unnaturally hardened] heart out of their flesh, and will give them a heart of flesh [sensitive and responsive to the touch of their God], [Ezek. 18:31; 36:26; II Cor. 3:3.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Then [the Spirit] said to me, Son of man, these are the men who devise iniquity and give wicked counsel in this city,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' That they may walk in My statutes and keep My ordinances, and do them. And they shall be My people, and I will be their God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But as for those whose heart yearns for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goes after their detestable things and their loathsome abominations [associated with idolatry], I will repay their deeds upon their own heads, says the Lord God.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Then the cherubim lifted up their wings with the wheels which were beside them, and the glory of the God of Israel [the Shekinah, cloud] was over them.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then the glory of the Lord rose up from over the midst of the city and stood over the mountain which is on the east side of the city.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And the Spirit lifted me up and brought me in a vision by the Spirit of God into Chaldea, to the exiles. Then the vision that I had seen went up from me.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And I told the exiles everything that the Lord had shown me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Who say, [The time] is not near to build houses; this city is the boiling pot and we are the flesh.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Therefore prophesy against them; prophesy, O son of man!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the Spirit of the Lord fell upon me, and He said to me, Speak. Say, Thus says the Lord: This is what you thought, O house of Israel, for I know the things that come into your mind.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' You have multiplied your slain in this city and you have filled its streets with the slain.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Therefore thus says the Lord God: Your slain whom you have laid in your midst; they are the flesh and this city is the boiling pot, but you shall be brought forth out of the midst of it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You have feared the sword, and I will bring a sword upon you, says the Lord God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And I will bring you forth out of the midst of it and deliver you into the hands of foreigners and execute judgments among you.'
