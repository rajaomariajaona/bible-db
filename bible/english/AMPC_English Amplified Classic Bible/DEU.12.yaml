document_id: DEU.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THESE ARE the statutes and ordinances which you shall be watchful to do in the land which the Lord, the God of your fathers, gives you to possess all the days you live on the earth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But when you go over the Jordan and dwell in the land which the Lord your God causes you to inherit, and He gives you rest from all your enemies round about so that you dwell in safety,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then there shall be a place which the Lord your God shall choose to cause His Name [and His Presence] to dwell there; to it you shall bring all that I command you: your burnt offerings, your sacrifices, your tithes and what the hand presents [as a first gift from the fruits of the ground], and all your choicest offerings which you vow to the Lord.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And you shall rejoice before the Lord your God, you and your sons and your daughters, and your menservants and your maidservants, and the Levite that is within your towns, since he has no part or inheritance with you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Be watchful not to offer your burnt offerings in every place you see.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But in the place which the Lord shall choose in one of your tribes, there you shall offer your burnt offerings, and there you shall do all I command you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' However, you may kill and eat flesh in any of your towns whenever you desire, according to the provision for the support of life with which the Lord your God has blessed you; those [ceremonially] unclean and the clean may eat of it, as of the gazelle and the hart.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Only you shall not eat the blood; you shall pour it upon the ground as water.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' You may not eat within your towns the tithe of your grain or of your new wine or of your oil, or the firstlings of your herd or flock, or anything you have vowed, or your freewill offerings, or the offerings from your hand [of garden products].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But you shall eat them before the Lord your God in the place which the Lord your God shall choose, you and your son and your daughter, your manservant and your maidservant, and the Levite that is within your towns; and you shall rejoice before the Lord your God in all that you undertake.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Take heed not to forsake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' neglect the Levite [God''s minister] as long as you live in your land.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' You shall surely destroy all the places where the nations you dispossess served their gods, upon the high mountains and the hills and under every green tree.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' When the Lord your God enlarges your territory, as He promised you, and you say, I will eat flesh, because you crave flesh, you may eat flesh whenever you desire.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' If the place where the Lord your God has chosen to put His Name [and Presence] is too far from you, then you shall kill from your herd or flock which the Lord has given you, as I [Moses] have commanded you; eat in your towns as much as you desire.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Just as the roebuck and the hart is eaten, so you may eat of it [but not offer it]; the unclean and the clean alike may eat of it.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Only be sure that you do not eat the blood, for the blood is the life, and you may not eat the life with the flesh.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' You shall not eat it; you shall pour it out on the earth like water.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' You shall not eat it, that all may go well with you and with your children after you, when you do what is right in the sight of the Lord.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Only your holy things which you have [to offer] and what you have vowed you shall take, and go to the place [before the sanctuary] which the Lord shall choose.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And offer your burnt offerings, the flesh and the blood, upon the altar of the Lord your God; and the blood of your sacrifices shall be poured out on the altar of the Lord your God, and you may eat the flesh.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Be watchful and obey all these words which I command you, that it may go well with you and with your children after you forever, when you do what is good and right in the sight of the Lord your God.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' When the Lord your God cuts off before you the nations whom you go to dispossess, and you dispossess them and live in their land,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall break down their altars and dash in pieces their pillars and burn their Asherim with fire; you shall hew down the graven images of their gods and destroy their name out of that place.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Be watchful that you are not ensnared into following them after they have been destroyed before you and that you do not inquire after their gods, saying, How did these nations serve their gods? We will do likewise.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' You shall not do so to the Lord your God, for every abominable thing which the Lord hates they have done for their gods. For even their sons and their daughters they have burned in the fire to their gods.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Whatever I command you, be watchful to do it; you shall not add to it or diminish it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You shall not behave so toward the Lord your God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But you shall seek the place which the Lord your God shall choose out of all your tribes to put His Name and make His dwelling place, and there shall you come;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And there you shall bring your burnt offerings and your sacrifices, your tithes and the offering of your hands, and your vows and your freewill offerings, and the firstlings of your herd and of your flock.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And there you shall eat before the Lord your God, and you shall rejoice in all to which you put your hand, you and your households, in which the Lord your God has blessed you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You shall not do according to all we do here [in the camp] this day, every man doing whatever looks right in his own eyes.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For you have not yet come to the rest and to the inheritance which the Lord your God gives you.'
