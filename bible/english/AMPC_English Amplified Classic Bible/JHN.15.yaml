document_id: JHN.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I AM the True Vine, and My Father is the Vinedresser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Any branch in Me that does not bear fruit [that stops bearing] He cuts away (trims off, takes away); and He cleanses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repeatedly prunes every branch that continues to bear fruit, to make it bear more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' richer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more excellent fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You are cleansed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pruned already, because of the word which I have given you [the teachings I have discussed with you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Dwell in Me, and I will dwell in you. [Live in Me, and I will live in you.] Just as no branch can bear fruit of itself without abiding in (being vitally united to) the vine, neither can you bear fruit unless you abide in Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I am the Vine; you are the branches. Whoever lives in Me and I in him bears much (abundant) fruit. However, apart from Me [cut off from vital union with Me] you can do nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If a person does not dwell in Me, he is thrown out like a [broken-off] branch, and withers; such branches are gathered up and thrown into the fire, and they are burned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If you live in Me [abide vitally united to Me] and My words remain in you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue to live in your hearts, ask whatever you will, and it shall be done for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When you bear (produce) much fruit, My Father is honored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified, and you show '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove yourselves to be true followers of Mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I have loved you, [just] as the Father has loved Me; abide in My love [continue in His love with Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' If you keep My commandments [if you continue to obey My instructions], you will abide in My love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live on in it, just as I have obeyed My Father''s commandments and live on in His love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I have told you these things, that My joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight may be in you, and that your joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gladness may be of full measure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflowing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' This is My commandment: that you love one another [just] as I have loved you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' No one has greater love [no one has shown stronger affection] than to lay down (give up) his own life for his friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You are My friends if you keep on doing the things which I command you to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I do not call you servants (slaves) any longer, for the servant does not know what his master is doing (working out). But I have called you My friends, because I have made known to you everything that I have heard from My Father. [I have revealed to you everything that I have learned from Him.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You have not chosen Me, but I have chosen you and I have appointed you [I have planted you], that you might go and bear fruit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep on bearing, and that your fruit may be lasting [that it may remain, abide], so that whatever you ask the Father in My Name [as presenting all that I AM], He may give it to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' This is what I command you: that you love one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' If the world hates you, know that it hated Me before it hated you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If you belonged to the world, the world would treat you with affection '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' would love you as its own. But because you are not of the world [no longer one with it], but I have chosen (selected) you out of the world, the world hates (detests) you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Remember that I told you, A servant is not greater than his master [is not superior to him]. If they persecuted Me, they will also persecute you; if they kept My word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed My teachings, they will also keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But they will do all this to you [inflict all this suffering on you] because of [your bearing] My name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on My account, for they do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understand the One Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' If I had not come and spoken to them, they would not be guilty of sin [would be blameless]; but now they have no excuse for their sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Whoever hates Me also hates My Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' If I had not done (accomplished) among them the works which no one else ever did, they would not be guilty of sin. But [the fact is] now they have both seen [these works] and have hated both Me and My Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But [this is so] that the word written in their Law might be fulfilled, They hated Me without a cause. [Ps. 35:19; 69:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But when the Comforter (Counselor, Helper, Advocate, Intercessor, Strengthener, Standby) comes, Whom I will send to you from the Father, the Spirit of Truth Who comes (proceeds) from the Father, He [Himself] will testify regarding Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But you also will testify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be My witnesses, because you have been with Me from the beginning.'
