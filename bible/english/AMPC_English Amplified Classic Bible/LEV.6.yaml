document_id: LEV.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the priest shall put on his linen garment and put his linen breeches on his body, and take up the ashes of what the fire has consumed with the burnt offering on the altar and put them beside the altar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he shall put off his garments and put on other garments, and carry the ashes outside the camp to a clean place.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the fire upon the altar shall be kept burning on it; it shall not be allowed to go out. The priest shall burn wood on it every morning and lay the burnt offering in order upon it and he shall burn on it the fat of the peace offerings.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fire shall be burning continually upon the altar; it shall not go out.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And this is the law of the cereal offering: The sons of Aaron shall offer it before the Lord, in front of the altar.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One of them shall take his handful of the fine flour of the cereal offering, the oil of it, and all the frankincense which is upon the cereal offering, and burn it on the altar as the memorial of it, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance to the Lord.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the remainder of it shall Aaron and his sons eat, without leaven in a holy place; in the court of the Tent of Meeting shall they eat it. [I Cor. 9:13, 14.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It shall not be baked with leaven. I have given it as their portion of My offerings made by fire; it is most holy, like the sin offering and the guilt offering.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Every male among the children of Aaron may eat of it, as his portion forever throughout your generations, from the Lord''s offerings made by fire; whoever touches them shall [first] be holy (consecrated and ceremonially clean).'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If anyone sins and commits a trespass against the Lord and deals falsely with his neighbor in a matter of deposit given him to keep, or of bargain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pledge, or of robbery, or has oppressed his neighbor,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the offering which Aaron and his sons shall offer to the Lord on the day when one is anointed (and consecrated): the tenth of an ephah of fine flour for a regular cereal offering, half of it in the morning and half of it at night.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On a griddle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' baking pan it shall be made with oil; and when it is fried you shall bring it in; in broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fried pieces shall you offer the cereal offering as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying odor to the Lord.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the priest among Aaron''s sons who is consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anointed in his stead shall offer it; by a statute forever it shall be entirely burned to the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For every cereal offering of the priest shall be wholly burned, and not be eaten.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Say to Aaron and his sons: This is the law of the sin offering: In the place where the burnt offering is killed shall the sin offering be killed before the Lord; it is most holy.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The priest who offers it for sin shall eat it; in a sacred place shall it be eaten, in the court of the Tent of Meeting.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whoever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' whatever touches its flesh shall [first] be dedicated and made clean, and when any of its blood is sprinkled on a garment, you shall wash that garment in a place set apart to God''s worship.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the earthen vessel in which it is boiled shall be broken, and if it is boiled in a bronze vessel, that vessel shall be scoured and rinsed in water.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Every male among the priests may eat of this offering; it is most holy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or has found what was lost and lied about it, or swears falsely, in any of all the things which men do and sin in so doing,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But no sin offering shall be eaten of which any of the blood is brought into the Tent of Meeting to make atonement in the Holy Place; it shall be [wholly] burned with fire. [Heb. 13:11-13.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then if he has sinned and is guilty, he shall restore what he took by robbery, or what he secured by oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' extortion, or what was delivered him to keep in trust, or the lost thing which he found,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or anything about which he has sworn falsely; he shall not only restore it in full, but shall add to it one fifth more and give it to him to whom it belongs on the day of his trespass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' guilt offering.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he shall bring to the priest his trespass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' guilt offering to the Lord, a ram without blemish out of the flock, valued by you to the amount of his trespass;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the priest shall make atonement for him before the Lord, and he shall be forgiven for anything of all that he may have done by which he has become guilty.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Command Aaron and his sons, saying, This is the law of the burnt offering: The burnt offering shall remain on the altar all night until morning; the fire shall be kept burning on the altar.'
