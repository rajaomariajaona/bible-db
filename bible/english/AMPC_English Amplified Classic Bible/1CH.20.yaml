document_id: 1CH.20,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THE end of the year, when kings go out to battle, Joab led forth the army and devastated the land of the Ammonites, and came and besieged Rabbah. But David tarried at Jerusalem. Joab smote Rabbah and overthrew it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' David took their king''s crown from off his head and found that it weighed a talent of gold and that precious stones were in it. It was set upon David''s head. He brought also very much spoil out of the city of Rabbah.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He brought out the people who were in it and set them at cutting with saws, iron wedges, and axes. So David dealt with all the Ammonite cities. And David and all the army returned to Jerusalem.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' After this, there arose war at Gezer with the Philistines; then Sibbecai the Hushathite slew Sippai, of the sons of the giant, and they were subdued.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' There was war again with the Philistines, and Elhanan son of Jair slew Lahmi the brother of Goliath the Gittite, the staff of whose spear was like a weaver''s beam.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And again there was war at Gath, where was a man of great stature who had twenty-four fingers and toes, six on each hand and each foot. He also was born to the giant.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And when he reproached '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defied Israel, Jonathan son of Shimea, David''s brother, slew him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' These were born to the giant [clan] in Gath, and they fell by the hands of David and his servants.'
