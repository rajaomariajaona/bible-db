document_id: DEU.21,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IF ONE is found slain in the land which the Lord your God gives you to possess, lying in the field, and it is not known who has killed him,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you go forth to battle against your enemies and the Lord your God has given them into your hands and you carry them away captive,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you see among the captives a beautiful woman and desire her, that you may have her as your wife,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then you shall bring her home to your house, and she shall shave her head and pare her nails [in purification from heathenism]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And put off her prisoner''s garb, and shall remain in your house and bewail her father and her mother a full month. After that you may go in to her and be her husband and she shall be your wife.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if you have no delight in her, then you shall let her go absolutely free. You shall not sell her at all for money; you shall not deal with her as a slave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a servant, because you have humbled her.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If a man has two wives, one loved and the other disliked, and they both have borne him children, and if the firstborn son is the son of the one who is disliked,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then on the day when he wills his possessions to his sons, he shall not put the firstborn of his loved wife in place of the [actual] firstborn of the disliked wife–her firstborn being older.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he shall acknowledge the son of the disliked as the firstborn by giving him a double portion of all that he has, for he was the first issue of his strength; the right of the firstborn is his.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If a man has a stubborn and rebellious son who will not obey the voice of his father or his mother and though they chasten him will not listen to them,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then his father and mother shall take hold of him and bring him out to the elders of his city at the gate of the place where he lives,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then your elders and judges shall come forth and measure the distance to the cities around him who is slain.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall say to the elders of his city, This son of ours is stubborn and rebellious. He will not obey our voice. He is a glutton and a drunkard. [Prov. 23:20-22.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then all the men of his city shall stone him to death; so you shall cleanse out the evil from your midst, and all Israel shall hear and [reverently] fear.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if a man has committed a sin worthy of death and he is put to death and [afterward] you hang him on a tree, [Josh. 10:26, 27.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His body shall not remain all night upon the tree, but you shall surely bury him on the same day, for a hanged man is accursed by God. Thus you shall not defile your land which the Lord your God gives you for an inheritance. [Gal. 3:13.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the city which is nearest to the slain man, the elders of that city shall take a heifer which has never been worked, never pulled in the yoke,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the elders of that city shall bring the heifer down to a valley with running water which is neither plowed nor sown, and shall break the heifer''s neck there in the valley.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the priests, the sons of Levi, shall come near, for the Lord your God has chosen them to minister to Him and to bless in the name [and presence] of the Lord, and by their word shall every controversy and every assault be settled.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the elders of that city nearest to the slain man shall wash their hands over the heifer whose neck was broken in the valley,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall testify, Our hands have not shed this blood, neither have our eyes seen it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Forgive, O Lord, Your people Israel, whom You have redeemed, and do not allow the shedding of innocent blood to be charged to Your people Israel. And the guilt of blood shall be forgiven them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So shall you purge the guilt of innocent blood from among you, when you do what is right in the sight of the Lord.'
