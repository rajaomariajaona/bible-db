document_id: PSA.67,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; on stringed instruments. A Psalm. A song.
  - type: text
    content: ' GOD BE merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to us and bless us and cause His face to shine upon us '
  - type: text
    content: and
  - type: text
    content: ' among us–Selah [pause, and calmly think of that]!–'
  '2':
  - type: text
    content: ' That Your way may be known upon earth, Your saving power (Your deliverances and Your salvation) among all nations.'
  '3':
  - type: text
    content: ' Let the peoples praise You [turn away from their idols] '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O God; let all the peoples praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You.'
  '4':
  - type: text
    content: ' O let the nations be glad and sing for joy, for You will judge the peoples fairly and guide, lead, '
  - type: text
    content: or
  - type: text
    content: ' drive the nations upon earth. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' Let the peoples praise You [turn away from their idols] '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O God; let all the peoples praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You!'
  '6':
  - type: text
    content: ' The earth has yielded its harvest [in evidence of God''s approval]; God, even our own God, will bless us.'
  '7':
  - type: text
    content: ' God will bless us, and all the ends of the earth shall reverently fear Him.'
