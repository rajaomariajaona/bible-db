document_id: PSA.67,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; on stringed instruments. A Psalm. A song.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' GOD BE merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to us and bless us and cause His face to shine upon us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' among us–Selah [pause, and calmly think of that]!–'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That Your way may be known upon earth, Your saving power (Your deliverances and Your salvation) among all nations.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the peoples praise You [turn away from their idols] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You, O God; let all the peoples praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O let the nations be glad and sing for joy, for You will judge the peoples fairly and guide, lead, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' drive the nations upon earth. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the peoples praise You [turn away from their idols] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You, O God; let all the peoples praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The earth has yielded its harvest [in evidence of God''s approval]; God, even our own God, will bless us.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God will bless us, and all the ends of the earth shall reverently fear Him.'
