document_id: MIC.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND I [Micah] said, Hear, I pray you, you heads of Jacob and rulers of the house of Israel! Is it not for you to know justice?–'
  '10':
  - type: text
    content: ' Who build up Zion with blood and Jerusalem with iniquity.'
  '11':
  - type: text
    content: ' Its heads judge for reward '
  - type: text
    content: and
  - type: text
    content: ' a bribe and its priests teach for hire and its prophets divine for money; yet they lean on the Lord and say, Is not the Lord among us? No evil can come upon us. [Isa. 1:10-15.]'
  '12':
  - type: text
    content: ' Therefore shall Zion on your account be plowed like a field, Jerusalem shall become heaps [of ruins], and the mountain of the house [of the Lord] like a densely wooded height. [Jer. 26:17-19.]'
  '2':
  - type: text
    content: ' You who hate the good and love the evil, who pluck '
  - type: text
    content: and
  - type: text
    content: ' steal the skin from off [My people] and their flesh from off their bones;'
  '3':
  - type: text
    content: ' Yes, you who eat the flesh of my people and strip their skin from off them, who break their bones and chop them in pieces as for the pot, like meat in a big kettle.'
  '4':
  - type: text
    content: ' Then will they cry to the Lord, but He will not answer them; He will even hide His face from them at that time, because they have made their deeds evil. [Isa. 1:15.]'
  '5':
  - type: text
    content: ' Thus says the Lord: Concerning the false prophets who make My people err, when they have anything good to bite with their teeth they cry, Peace; and whoever gives them nothing to chew, against him they declare a sanctified war.'
  '6':
  - type: text
    content: ' Therefore it shall be night to you, so that you shall have no vision; yes, it shall be dark to you without divination. And the sun shall go down over the false prophets, and the day shall be black over them.'
  '7':
  - type: text
    content: ' And the seers shall be put to shame and the diviners shall blush '
  - type: text
    content: and
  - type: text
    content: ' be confounded; yes, they shall all cover their lips, for there is no answer from God.'
  '8':
  - type: text
    content: ' But truly I [Micah] am full of power, of the Spirit of the Lord, and of justice and might, to declare to Jacob his transgression and to Israel his sin.'
  '9':
  - type: text
    content: ' Hear this, I pray you, you heads of the house of Jacob and rulers of the house of Israel, who abhor '
  - type: text
    content: and
  - type: text
    content: ' reject justice and pervert all equity,'
