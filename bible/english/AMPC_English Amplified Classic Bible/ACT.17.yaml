document_id: ACT.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW AFTER [Paul and Silas] had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a synagogue of the Jews.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now the brethren at once sent Paul and Silas away by night to Beroea; and when they arrived, they entered the synagogue of the Jews.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now these [Jews] were better disposed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' more noble than those in Thessalonica, for they were entirely ready '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed the message [concerning the attainment through Christ of eternal salvation in the kingdom of God] with inclination of mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eagerness, searching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examining the Scriptures daily to see if these things were so.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Many of them therefore became believers, together with not a few prominent Greeks, women as well as men.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But when the Jews of Thessalonica learned that the Word of God [concerning the attainment through Christ of eternal salvation in the kingdom of God] was also preached by Paul at Beroea, they came there too, disturbing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inciting the masses.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' At once the brethren sent Paul off on his way to the sea, but Silas and Timothy remained behind.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Those who escorted Paul brought him as far as Athens; and receiving instructions for Silas and Timothy that they should come to him as soon as possible, they departed.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Now while Paul was awaiting them at Athens, his spirit was grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' roused to anger as he saw that the city was full of idols.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So he reasoned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argued in the synagogue with the Jews and those who worshiped there, and in the marketplace [where assemblies are held] day after day with any who chanced to be there.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And some also of the Epicurean and Stoic philosophers encountered him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' began to engage in discussion. And some said, What is this babbler with his scrap-heap learning trying to say? Others said, He seems to be an announcer of foreign deities–because he preached Jesus and the resurrection.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And they took hold of him and brought him to the Areopagus [Mars Hill meeting place], saying, May we know what this novel (unheard of and unprecedented) teaching is which you are openly declaring?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Paul entered, as he usually did, and for three Sabbaths he reasoned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argued with them from the Scriptures,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For you set forth some startling things, foreign '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strange to our ears; we wish to know therefore just what these things mean–'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For the Athenians, all of them, and the foreign residents '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' visitors among them spent all their leisure time in nothing except telling or hearing something newer than the last–'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So Paul, standing in the center of the Areopagus [Mars Hill meeting place], said: Men of Athens, I perceive in every way [on every hand and with every turn I make] that you are most religious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' very reverent to demons.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For as I passed along and carefully observed your objects of worship, I came also upon an altar with this inscription, To the unknown god. Now what you are already worshiping as unknown, this I set forth to you.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The God Who produced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' formed the world and all things in it, being Lord of heaven and earth, does not dwell in handmade shrines.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Neither is He served by human hands, as though He lacked anything, for it is He Himself Who gives life and breath and all things to all [people]. [Isa. 42:5.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And He made from one [common origin, one source, one blood] all nations of men to settle on the face of the earth, having definitely determined [their] allotted periods of time and the fixed boundaries of their habitation (their settlements, lands, and abodes),'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' So that they should seek God, in the hope that they might feel after Him and find Him, although He is not far from each one of us.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For in Him we live and move and have our being; as even some of your [own] poets have said, For we are also His offspring.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Since then we are God''s offspring, we ought not to suppose that Deity (the Godhead) is like gold or silver or stone, [of the nature of] a representation by human art and imagination, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' anything constructed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' invented.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Explaining [them] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [quoting passages] setting forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proving that it was necessary for the Christ to suffer and to rise from the dead, and saying, This Jesus, Whom I proclaim to you, is the Christ (the Messiah).'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Such [former] ages of ignorance God, it is true, ignored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' allowed to pass unnoticed; but now He charges all people everywhere to repent (to change their minds for the better and heartily to amend their ways, with abhorrence of their past sins),'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Because He has fixed a day when He will judge the world righteously (justly) by a Man Whom He has destined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed for that task, and He has made this credible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given conviction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assurance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evidence to everyone by raising Him from the dead. [Ps. 9:8; 96:13; 98:9.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now when they had heard [that there had been] a resurrection from the dead, some scoffed; but others said, We will hear you again about this matter.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' So Paul went out from among them.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' But some men were on his side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joined him and believed (became Christians); among them were Dionysius, a judge of the Areopagus, and a woman named Damaris, and some others with them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And some of them [accordingly] were induced to believe and associated themselves with Paul and Silas, as did a great number of the devout Greeks and not a few of the leading women.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But the unbelieving Jews were aroused to jealousy, and, getting hold of some wicked men (ruffians and rascals) and loungers in the marketplace, they gathered together a mob, set the town in an uproar, and attacked the house of Jason, seeking to bring [Paul and Silas] out to the people.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But when they failed to find them, they dragged Jason and some of the brethren before the city authorities, crying, These men who have turned the world upside down have come here also,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Jason has received them to his house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' privately protected them! And they are all ignoring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acting contrary to the decrees of Caesar, [actually] asserting that there is another king, one Jesus!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And both the crowd and the city authorities, on hearing this, were irritated (stirred up and troubled).'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And when they had taken security [bail] from Jason and the others, they let them go.'
