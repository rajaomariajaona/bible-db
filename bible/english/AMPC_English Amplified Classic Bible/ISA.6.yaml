document_id: ISA.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE year that King Uzziah died, [in a vision] I saw the Lord sitting upon a throne, high and lifted up, and the skirts of His train filled the [most holy part of the] temple. [John 12:41.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Make the heart of this people fat; and make their ears heavy and shut their eyes, lest they see with their eyes and hear with their ears and understand with their hearts and turn again and be healed.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then said I, Lord, how long? And He answered, Until cities lie waste without inhabitant and houses without man, and the land is utterly desolate,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the Lord removes [His] people far away, and the forsaken places are many in the midst of the land.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And though a tenth [of the people] remain in the land, it will be for their destruction [eaten up and burned] like a terebinth tree or like an oak whose stump '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' substance remain when they are felled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' have cast their leaves. The holy seed [the elect remnant] is the stump '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' substance [of Israel].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Above Him stood the seraphim; each had six wings: with two [each] covered his [own] face, and with two [each] covered his feet, and with two [each] flew.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And one cried to another and said, Holy, holy, holy is the Lord of hosts; the whole earth is full of His glory!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the foundations of the thresholds shook at the voice of him who cried, and the house was filled with smoke.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then said I, Woe is me! For I am undone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined, because I am a man of unclean lips, and I dwell in the midst of a people of unclean lips; for my eyes have seen the King, the Lord of hosts!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then flew one of the seraphim [heavenly beings] to me, having a live coal in his hand which he had taken with tongs from off the altar;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And with it he touched my mouth and said, Behold, this has touched your lips; your iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt are taken away, and your sin is completely atoned for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forgiven.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Also I heard the voice of the Lord, saying, Whom shall I send? And who will go for Us? Then said I, Here am I; send me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And He said, Go and tell this people, Hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear continually, but understand not; and see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' see continually, but do not apprehend with your mind.'
