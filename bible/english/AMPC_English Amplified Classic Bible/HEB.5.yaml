document_id: HEB.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR EVERY high priest chosen from among men is appointed to act on behalf of men in things relating to God, to offer both gifts and sacrifices for sins.'
  '10':
  - type: text
    content: ' Being designated '
  - type: text
    content: and
  - type: text
    content: ' recognized '
  - type: text
    content: and
  - type: text
    content: ' saluted by God as High Priest after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '11':
  - type: text
    content: ' Concerning this we have much to say which is hard to explain, since you have become dull in your [spiritual] hearing '
  - type: text
    content: and
  - type: text
    content: ' sluggish [even slothful in achieving spiritual insight].'
  '12':
  - type: text
    content: ' For even though by this time you ought to be teaching others, you actually need someone to teach you over again the very first principles of God''s Word. You have come to need milk, not solid food.'
  '13':
  - type: text
    content: ' For everyone who continues to feed on milk is obviously inexperienced '
  - type: text
    content: and
  - type: text
    content: ' unskilled in the doctrine of righteousness (of conformity to the divine will in purpose, thought, and action), for he is a mere infant [not able to talk yet]!'
  '14':
  - type: text
    content: ' But solid food is for full-grown men, for those whose senses '
  - type: text
    content: and
  - type: text
    content: ' mental faculties are trained by practice to discriminate '
  - type: text
    content: and
  - type: text
    content: ' distinguish between what is morally good '
  - type: text
    content: and
  - type: text
    content: ' noble and what is evil '
  - type: text
    content: and
  - type: text
    content: ' contrary either to divine or human law.'
  '2':
  - type: text
    content: ' He is able to exercise gentleness '
  - type: text
    content: and
  - type: text
    content: ' forbearance toward the ignorant and erring, since he himself also is liable to moral weakness '
  - type: text
    content: and
  - type: text
    content: ' physical infirmity.'
  '3':
  - type: text
    content: ' And because of this he is obliged to offer sacrifice for his own sins, as well as for those of the people.'
  '4':
  - type: text
    content: ' Besides, one does not appropriate for himself the honor [of being high priest], but he is called by God '
  - type: text
    content: and
  - type: text
    content: ' receives it of Him, just as Aaron did.'
  '5':
  - type: text
    content: ' So too Christ (the Messiah) did not exalt Himself to be made a high priest, but was appointed '
  - type: text
    content: and
  - type: text
    content: ' exalted by Him Who said to Him, You are My Son; today I have begotten You; [Ps. 2:7.]'
  '6':
  - type: text
    content: ' As He says also in another place, You are a Priest [appointed] forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '7':
  - type: text
    content: ' In the days of His flesh [Jesus] offered up definite, special petitions [for that which He not only wanted but needed] and supplications with strong crying and tears to Him Who was [always] able to save Him [out] from death, and He was heard because of His reverence toward God [His godly fear, His piety, in that He shrank from the horrors of separation from the bright presence of the Father].'
  '8':
  - type: text
    content: ' Although He was a Son, He learned [active, special] obedience through what He suffered'
  '9':
  - type: text
    content: ' And, [His completed experience] making Him perfectly [equipped], He became the Author '
  - type: text
    content: and
  - type: text
    content: ' Source of eternal salvation to all those who give heed '
  - type: text
    content: and
  - type: text
    content: ' obey Him, [Isa. 45:17.]'
