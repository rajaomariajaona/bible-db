document_id: HEB.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' FOR EVERY high priest chosen from among men is appointed to act on behalf of men in things relating to God, to offer both gifts and sacrifices for sins.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Being designated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saluted by God as High Priest after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Concerning this we have much to say which is hard to explain, since you have become dull in your [spiritual] hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sluggish [even slothful in achieving spiritual insight].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For even though by this time you ought to be teaching others, you actually need someone to teach you over again the very first principles of God''s Word. You have come to need milk, not solid food.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For everyone who continues to feed on milk is obviously inexperienced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unskilled in the doctrine of righteousness (of conformity to the divine will in purpose, thought, and action), for he is a mere infant [not able to talk yet]!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But solid food is for full-grown men, for those whose senses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mental faculties are trained by practice to discriminate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinguish between what is morally good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble and what is evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contrary either to divine or human law.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He is able to exercise gentleness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forbearance toward the ignorant and erring, since he himself also is liable to moral weakness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' physical infirmity.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And because of this he is obliged to offer sacrifice for his own sins, as well as for those of the people.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Besides, one does not appropriate for himself the honor [of being high priest], but he is called by God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receives it of Him, just as Aaron did.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So too Christ (the Messiah) did not exalt Himself to be made a high priest, but was appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalted by Him Who said to Him, You are My Son; today I have begotten You; [Ps. 2:7.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As He says also in another place, You are a Priest [appointed] forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the days of His flesh [Jesus] offered up definite, special petitions [for that which He not only wanted but needed] and supplications with strong crying and tears to Him Who was [always] able to save Him [out] from death, and He was heard because of His reverence toward God [His godly fear, His piety, in that He shrank from the horrors of separation from the bright presence of the Father].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Although He was a Son, He learned [active, special] obedience through what He suffered'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And, [His completed experience] making Him perfectly [equipped], He became the Author '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Source of eternal salvation to all those who give heed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey Him, [Isa. 45:17.]'
