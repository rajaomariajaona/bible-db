document_id: HEB.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW EVEN the first covenant had its own rules '
  - type: text
    content: and
  - type: text
    content: ' regulations for divine worship, and it had a sanctuary [but one] of this world. [Exod. 25:10-40.]'
  '10':
  - type: text
    content: ' For [the ceremonies] deal only with clean and unclean meats and drinks and different washings, [mere] external rules '
  - type: text
    content: and
  - type: text
    content: ' regulations for the body imposed to tide the worshipers over until the time of setting things straight [of reformation, of the complete new order when Christ, the Messiah, shall establish the reality of what these things foreshadow–a better covenant].'
  '11':
  - type: text
    content: ' But [that appointed time came] when Christ (the Messiah) appeared as a High Priest of the better things that have come '
  - type: text
    content: and
  - type: text
    content: ' are to come. [Then] through the greater and more perfect tabernacle not made with [human] hands, that is, not a part of this material creation,'
  '12':
  - type: text
    content: ' He went once for all into the [Holy of] Holies [of heaven], not by virtue of the blood of goats and calves [by which to make reconciliation between God and man], but His own blood, having found '
  - type: text
    content: and
  - type: text
    content: ' secured a complete redemption (an everlasting release for us).'
  '13':
  - type: text
    content: ' For if [the mere] sprinkling of unholy '
  - type: text
    content: and
  - type: text
    content: ' defiled persons with blood of goats and bulls and with the ashes of a burnt heifer is sufficient for the purification of the body, [Lev. 16:6, 16; Num. 19:9, 17, 18.]'
  '14':
  - type: text
    content: ' How much more surely shall the blood of Christ, Who by virtue of [His] eternal Spirit [His own preexistent divine personality] has offered Himself as an unblemished sacrifice to God, purify our consciences from dead works '
  - type: text
    content: and
  - type: text
    content: ' lifeless observances to serve the [ever] living God?'
  '15':
  - type: text
    content: ' [Christ, the Messiah] is therefore the Negotiator '
  - type: text
    content: and
  - type: text
    content: ' Mediator of an [entirely] new agreement (testament, covenant), so that those who are called '
  - type: text
    content: and
  - type: text
    content: ' offered it may receive the fulfillment of the promised everlasting inheritance–since a death has taken place which rescues '
  - type: text
    content: and
  - type: text
    content: ' delivers '
  - type: text
    content: and
  - type: text
    content: ' redeems them from the transgressions committed under the [old] first agreement.'
  '16':
  - type: text
    content: ' For where there is a [last] will '
  - type: text
    content: and
  - type: text
    content: ' testament involved, the death of the one who made it must be established,'
  '17':
  - type: text
    content: ' For a will '
  - type: text
    content: and
  - type: text
    content: ' testament is valid and takes effect only at death, since it has no force '
  - type: text
    content: or
  - type: text
    content: ' legal power as long as the one who made it is alive.'
  '18':
  - type: text
    content: ' So even the [old] first covenant (God''s will) was not inaugurated '
  - type: text
    content: and
  - type: text
    content: ' ratified '
  - type: text
    content: and
  - type: text
    content: ' put in force without the shedding of blood.'
  '19':
  - type: text
    content: ' For when every command of the Law had been read out by Moses to all the people, he took the blood of slain calves and goats, together with water and scarlet wool and with a bunch of hyssop, and sprinkled both the Book (the roll of the Law and covenant) itself and all the people,'
  '2':
  - type: text
    content: ' For a tabernacle (tent) was erected, in the outer division '
  - type: text
    content: or
  - type: text
    content: ' compartment of which were the lampstand and the table with [its loaves of] the showbread set forth. [This portion] is called the Holy Place. [Lev. 24:5, 6.]'
  '20':
  - type: text
    content: ' Saying these words: This is the blood that seals '
  - type: text
    content: and
  - type: text
    content: ' ratifies the agreement (the testament, the covenant) which God commanded [me to deliver to] you. [Exod. 24:6-8.]'
  '21':
  - type: text
    content: ' And in the same way he sprinkled with the blood both the tabernacle and all the [sacred] vessels '
  - type: text
    content: and
  - type: text
    content: ' appliances used in [divine] worship.'
  '22':
  - type: text
    content: ' [In fact] under the Law almost everything is purified by means of blood, and without the shedding of blood there is neither release from sin '
  - type: text
    content: and
  - type: text
    content: ' its guilt '
  - type: text
    content: nor
  - type: text
    content: ' the remission of the due '
  - type: text
    content: and
  - type: text
    content: ' merited punishment for sins.'
  '23':
  - type: text
    content: ' By such means, therefore, it was necessary for the [earthly] copies of the heavenly things to be purified, but the actual heavenly things themselves [required far] better '
  - type: text
    content: and
  - type: text
    content: ' nobler sacrifices than these.'
  '24':
  - type: text
    content: ' For Christ (the Messiah) has not entered into a sanctuary made with [human] hands, only a copy '
  - type: text
    content: and
  - type: text
    content: ' pattern '
  - type: text
    content: and
  - type: text
    content: ' type of the true one, but [He has entered] into heaven itself, now to appear in the [very] presence of God on our behalf.'
  '25':
  - type: text
    content: ' Nor did He [enter into the heavenly sanctuary to] offer Himself regularly again and again, as the high priest enters the [Holy of] Holies every year with blood not his own.'
  '26':
  - type: text
    content: ' For then would He often have had to suffer [over and over again] since the foundation of the world. But as it now is, He has once for all at the consummation '
  - type: text
    content: and
  - type: text
    content: ' close of the ages appeared to put away '
  - type: text
    content: and
  - type: text
    content: ' abolish sin by His sacrifice [of Himself].'
  '27':
  - type: text
    content: ' And just as it is appointed for [all] men once to die, and after that the [certain] judgment,'
  '28':
  - type: text
    content: ' Even so it is that Christ, having been offered to take upon Himself '
  - type: text
    content: and
  - type: text
    content: ' bear as a burden the sins of many once '
  - type: text
    content: and
  - type: text
    content: ' once for all, will appear a second time, not to carry any burden of sin '
  - type: text
    content: nor
  - type: text
    content: ' to deal with sin, but to bring to full salvation those who are [eagerly, constantly, and patiently] waiting for '
  - type: text
    content: and
  - type: text
    content: ' expecting Him.'
  '3':
  - type: text
    content: ' But [inside] beyond the second curtain '
  - type: text
    content: or
  - type: text
    content: ' veil, [there stood another] tabernacle [division] known as the Holy of Holies. [Exod. 26:31-33.]'
  '4':
  - type: text
    content: ' It had the golden altar of incense and the ark (chest) of the covenant, covered over with wrought gold. This [ark] contained a golden jar which held the manna and the rod of Aaron that sprouted and the [two stone] slabs of the covenant [bearing the Ten Commandments]. [Exod. 16:32-34; 30:1-6; Num. 17:8-10.]'
  '5':
  - type: text
    content: ' Above [the ark] and overshadowing the mercy seat were the representations of the cherubim [winged creatures which were the symbols] of glory. We cannot now go into detail about these things.'
  '6':
  - type: text
    content: ' These arrangements having thus been made, the priests enter [habitually] into the outer division of the tabernacle in performance of their ritual acts of worship.'
  '7':
  - type: text
    content: ' But into the second [division of the tabernacle] none but the high priest goes, and he only once a year, and never without taking a sacrifice of blood with him, which he offers for himself and for the errors '
  - type: text
    content: and
  - type: text
    content: ' sins of ignorance '
  - type: text
    content: and
  - type: text
    content: ' thoughtlessness which the people have committed. [Lev. 16:15.]'
  '8':
  - type: text
    content: ' By this the Holy Spirit points out that the way into the [true Holy of] Holies is not yet thrown open as long as the former [the outer portion of the] tabernacle remains a recognized institution '
  - type: text
    content: and
  - type: text
    content: ' is still standing,'
  '9':
  - type: text
    content: ' Seeing that that first [outer portion of the] tabernacle was a parable (a visible symbol or type or picture of the present age). In it gifts and sacrifices are offered, and yet are incapable of perfecting the conscience '
  - type: text
    content: or
  - type: text
    content: ' of cleansing '
  - type: text
    content: and
  - type: text
    content: ' renewing the inner man of the worshiper.'
