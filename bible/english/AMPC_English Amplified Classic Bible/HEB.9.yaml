document_id: HEB.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW EVEN the first covenant had its own rules '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regulations for divine worship, and it had a sanctuary [but one] of this world. [Exod. 25:10-40.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [the ceremonies] deal only with clean and unclean meats and drinks and different washings, [mere] external rules '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regulations for the body imposed to tide the worshipers over until the time of setting things straight [of reformation, of the complete new order when Christ, the Messiah, shall establish the reality of what these things foreshadow–a better covenant].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [that appointed time came] when Christ (the Messiah) appeared as a High Priest of the better things that have come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are to come. [Then] through the greater and more perfect tabernacle not made with [human] hands, that is, not a part of this material creation,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He went once for all into the [Holy of] Holies [of heaven], not by virtue of the blood of goats and calves [by which to make reconciliation between God and man], but His own blood, having found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secured a complete redemption (an everlasting release for us).'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if [the mere] sprinkling of unholy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiled persons with blood of goats and bulls and with the ashes of a burnt heifer is sufficient for the purification of the body, [Lev. 16:6, 16; Num. 19:9, 17, 18.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How much more surely shall the blood of Christ, Who by virtue of [His] eternal Spirit [His own preexistent divine personality] has offered Himself as an unblemished sacrifice to God, purify our consciences from dead works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lifeless observances to serve the [ever] living God?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Christ, the Messiah] is therefore the Negotiator '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Mediator of an [entirely] new agreement (testament, covenant), so that those who are called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offered it may receive the fulfillment of the promised everlasting inheritance–since a death has taken place which rescues '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delivers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' redeems them from the transgressions committed under the [old] first agreement.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For where there is a [last] will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testament involved, the death of the one who made it must be established,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For a will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testament is valid and takes effect only at death, since it has no force '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' legal power as long as the one who made it is alive.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So even the [old] first covenant (God''s will) was not inaugurated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ratified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put in force without the shedding of blood.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when every command of the Law had been read out by Moses to all the people, he took the blood of slain calves and goats, together with water and scarlet wool and with a bunch of hyssop, and sprinkled both the Book (the roll of the Law and covenant) itself and all the people,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For a tabernacle (tent) was erected, in the outer division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' compartment of which were the lampstand and the table with [its loaves of] the showbread set forth. [This portion] is called the Holy Place. [Lev. 24:5, 6.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Saying these words: This is the blood that seals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ratifies the agreement (the testament, the covenant) which God commanded [me to deliver to] you. [Exod. 24:6-8.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in the same way he sprinkled with the blood both the tabernacle and all the [sacred] vessels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appliances used in [divine] worship.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [In fact] under the Law almost everything is purified by means of blood, and without the shedding of blood there is neither release from sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' the remission of the due '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merited punishment for sins.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By such means, therefore, it was necessary for the [earthly] copies of the heavenly things to be purified, but the actual heavenly things themselves [required far] better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nobler sacrifices than these.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Christ (the Messiah) has not entered into a sanctuary made with [human] hands, only a copy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pattern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' type of the true one, but [He has entered] into heaven itself, now to appear in the [very] presence of God on our behalf.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nor did He [enter into the heavenly sanctuary to] offer Himself regularly again and again, as the high priest enters the [Holy of] Holies every year with blood not his own.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For then would He often have had to suffer [over and over again] since the foundation of the world. But as it now is, He has once for all at the consummation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' close of the ages appeared to put away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abolish sin by His sacrifice [of Himself].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And just as it is appointed for [all] men once to die, and after that the [certain] judgment,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even so it is that Christ, having been offered to take upon Himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear as a burden the sins of many once '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' once for all, will appear a second time, not to carry any burden of sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' to deal with sin, but to bring to full salvation those who are [eagerly, constantly, and patiently] waiting for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expecting Him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [inside] beyond the second curtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' veil, [there stood another] tabernacle [division] known as the Holy of Holies. [Exod. 26:31-33.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It had the golden altar of incense and the ark (chest) of the covenant, covered over with wrought gold. This [ark] contained a golden jar which held the manna and the rod of Aaron that sprouted and the [two stone] slabs of the covenant [bearing the Ten Commandments]. [Exod. 16:32-34; 30:1-6; Num. 17:8-10.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Above [the ark] and overshadowing the mercy seat were the representations of the cherubim [winged creatures which were the symbols] of glory. We cannot now go into detail about these things.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These arrangements having thus been made, the priests enter [habitually] into the outer division of the tabernacle in performance of their ritual acts of worship.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But into the second [division of the tabernacle] none but the high priest goes, and he only once a year, and never without taking a sacrifice of blood with him, which he offers for himself and for the errors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sins of ignorance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtlessness which the people have committed. [Lev. 16:15.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By this the Holy Spirit points out that the way into the [true Holy of] Holies is not yet thrown open as long as the former [the outer portion of the] tabernacle remains a recognized institution '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is still standing,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Seeing that that first [outer portion of the] tabernacle was a parable (a visible symbol or type or picture of the present age). In it gifts and sacrifices are offered, and yet are incapable of perfecting the conscience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of cleansing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renewing the inner man of the worshiper.'
