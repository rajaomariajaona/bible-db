document_id: ISA.30,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WOE TO the rebellious children, says the Lord, who take counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carry out a plan, but not Mine, and who make a league '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pour out a drink offering, but not of My Spirit, thus adding sin to sin;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who [virtually] say to the seers [by their conduct], See not! and to the prophets, Prophesy not to us what is right! Speak to us smooth things, prophesy deceitful illusions.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Get out of the true way, turn aside out of the path, cease holding up before us the Holy One of Israel.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore thus says the Holy One of Israel: Because you despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spurn this [My] word and trust in cunning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppression, in crookedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perverseness, and rely on them,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore this iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt will be to you like a broken section of a high wall, bulging out and ready [at some distant day] to fall, whose crash will [then] come suddenly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swiftly, in an instant.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he shall break it as a potter''s vessel is broken, breaking it in pieces without sparing so that there cannot be found among its pieces one large enough to carry coals of fire from the hearth or to dip water out of the cistern.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus said the Lord God, the Holy One of Israel: In returning [to Me] and resting [in Me] you shall be saved; in quietness and in [trusting] confidence shall be your strength. But you would not,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you said, No! We will speed [our own course] on horses! Therefore you will speed [in flight from your enemies]! You said, We will ride upon swift steeds [doing our own way]! Therefore will they who pursue you be swift, [so swift that]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One thousand of you will flee at the threat of one of them; at the threat of five you will flee till you are left like a beacon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a flagpole on the top of a mountain, and like a signal on a hill.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And therefore the Lord [earnestly] waits [expecting, looking, and longing] to be gracious to you; and therefore He lifts Himself up, that He may have mercy on you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show loving-kindness to you. For the Lord is a God of justice. Blessed (happy, fortunate, to be envied) are all those who [earnestly] wait for Him, who expect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' long for Him [for His victory, His favor, His love, His peace, His joy, and His matchless, unbroken companionship]! [John 14:3, 27; II Cor. 12:9; Heb. 12:2; I John 3:16; Rev. 3:5.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O people who dwell in Zion at Jerusalem, you will weep no more. He will surely be gracious to you at the sound of your cry; when He hears it, He will answer you.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who set out to go down into Egypt, and have not asked Me–to flee to the stronghold of Pharaoh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to strengthen themselves in his strength and to trust in the shadow of Egypt!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And though the Lord gives you the bread of adversity and the water of affliction, yet your Teacher will not hide Himself any more, but your eyes will constantly behold your Teacher.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And your ears will hear a word behind you, saying, This is the way; walk in it, when you turn to the right hand and when you turn to the left.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then you will defile your carved images overlaid with silver and your molten images plated with gold; you will cast them away as a filthy bloodstained cloth, and you will say to them, Be gone!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then will He give you rain for the seed with which you sow the soil, and bread grain from the produce of the ground, and it will be rich and plentiful. In that day your cattle will feed in large pastures.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The oxen likewise and the young donkeys that till the ground will eat savory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' salted fodder, which has been winnowed with shovel and with fork.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And upon every high mountain and upon every high hill there will be brooks and streams of water in the day of the great slaughter [the day of the Lord], when the towers fall [and all His enemies are destroyed].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, the light of the moon will be like the light of the sun, and the light of the sun will be sevenfold, like the light of seven days [concentrated in one], in the day that the Lord binds up the hurt of His people, and heals their wound [inflicted by Him because of their sins].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, the Name of the Lord comes from afar, burning with His anger, and in thick, rising smoke. His lips are full of indignation, and His tongue is like a consuming fire.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And His breath is like an overflowing stream that reaches even to the neck, to sift the nations with the sieve of destruction; and a bridle that causes them to err will be in the jaws of the people.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall have a song as in the night when a holy feast is kept, and gladness of heart as when one marches in procession with a flute to go to the temple on the mountain of the Lord, to the Rock of Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore shall the strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protection of Pharaoh turn to your shame, and the refuge in the shadow of Egypt be to your humiliation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confusion.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord shall cause His glorious voice to be heard and the descending blow of His arm to be seen, coming down with indignant anger and with the flame of a devouring fire, amid crashing blast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cloudburst, tempest, and hailstones.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At the voice of the Lord the Assyrians will be stricken with dismay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror, when He smites them with His rod.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And every passing stroke of the staff of punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doom which the Lord lays upon them shall be to the sound of [Israel''s] timbrels and lyres, when in battle He attacks [Assyria] with swinging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' menacing arms.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Topheth [a place of burning and abomination] has already been laid out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' long ago prepared; yes, for the [Assyrian] king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [the god] Molech it has been made ready, its pyre made deep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' large, with fire and much wood; the breath of the Lord, like a stream of brimstone, kindles it. [Jer. 7:31, 32; Matt. 5:22; 25:41.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For though [Pharaoh''s] officials are at Zoan and his ambassadors arrive at Hanes [in Egypt],'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet will all be ashamed because of a people [the Egyptians] who cannot profit them, who are not a help or benefit, but a shame and disgrace.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A mournful, inspired prediction (a burden to be lifted up) concerning the beasts of the South (the Negeb): Oh, the heavy burden, the load of treasures going to Egypt! Through a land of trouble and anguish, in which are lioness and lion, viper and fiery flying serpent, they carry their riches upon the shoulders of young donkeys, and their treasures upon the humps of camels, to a people that will not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cannot profit them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Egypt''s help is worthless and toward no purpose. Therefore I have called her Rahab Who Sits Still.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now, go, write it before them on a tablet and inscribe it in a book, that it may be as a witness for the time to come forevermore.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this is a rebellious people, faithless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lying sons, children who will not hear the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruction of the Lord;'
