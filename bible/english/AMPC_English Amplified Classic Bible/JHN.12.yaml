document_id: JHN.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO SIX days before the Passover Feast, Jesus came to Bethany, where Lazarus was, who had died and whom He had raised from the dead.'
  '10':
  - type: text
    content: ' So the chief priests planned to put Lazarus to death also,'
  '11':
  - type: text
    content: ' Because on account of him many of the Jews were going away [were withdrawing from and leaving the Judeans] and believing in '
  - type: text
    content: and
  - type: text
    content: ' adhering to Jesus.'
  '12':
  - type: text
    content: ' The next day a vast crowd of those who had come to the Passover Feast heard that Jesus was coming to Jerusalem.'
  '13':
  - type: text
    content: ' So they took branches of palm trees and went out to meet Him. And as they went, they kept shouting, Hosanna! Blessed is He '
  - type: text
    content: and
  - type: text
    content: ' praise to Him Who comes in the name of the Lord, even the King of Israel! [Ps. 118:26.]'
  '14':
  - type: text
    content: ' And Jesus, having found a young donkey, rode upon it, [just] as it is written in the Scriptures,'
  '15':
  - type: text
    content: ' Do not fear, O Daughter of Zion! Look! Your King is coming, sitting on a donkey''s colt! [Zech. 9:9.]'
  '16':
  - type: text
    content: ' His disciples did not understand '
  - type: text
    content: and
  - type: text
    content: ' could not comprehend the meaning of these things at first; but when Jesus was glorified '
  - type: text
    content: and
  - type: text
    content: ' exalted, they remembered that these things had been written about Him and had been done to Him.'
  '17':
  - type: text
    content: ' The group that had been with Jesus when He called Lazarus out of the tomb and raised him from among the dead kept telling it [bearing witness] to others.'
  '18':
  - type: text
    content: ' It was for this reason that the crowd went out to meet Him, because they had heard that He had performed this sign (proof, miracle).'
  '19':
  - type: text
    content: ' Then the Pharisees said among themselves, You see how futile your efforts are '
  - type: text
    content: and
  - type: text
    content: ' how you accomplish nothing. See! The whole world is running after Him!'
  '2':
  - type: text
    content: ' So they made Him a supper; and Martha served, but Lazarus was one of those at the table with Him.'
  '20':
  - type: text
    content: ' Now among those who went up to worship at the Feast were some Greeks.'
  '21':
  - type: text
    content: ' These came to Philip, who was from Bethsaida in Galilee, and they made this request, Sir, we desire to see Jesus.'
  '22':
  - type: text
    content: ' Philip came and told Andrew; then Andrew and Philip together [went] and told Jesus.'
  '23':
  - type: text
    content: ' And Jesus answered them, The time has come for the Son of Man to be glorified '
  - type: text
    content: and
  - type: text
    content: ' exalted.'
  '24':
  - type: text
    content: ' I assure you, most solemnly I tell you, Unless a grain of wheat falls into the earth and dies, it remains [just one grain; it never becomes more but lives] by itself alone. But if it dies, it produces many others '
  - type: text
    content: and
  - type: text
    content: ' yields a rich harvest.'
  '25':
  - type: text
    content: ' Anyone who loves his life loses it, but anyone who hates his life in this world will keep it to life eternal. [Whoever has no love for, no concern for, no regard for his life here on earth, but despises it, preserves his life forever and ever.]'
  '26':
  - type: text
    content: ' If anyone serves Me, he must continue to follow Me [to cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying] and wherever I am, there will My servant be also. If anyone serves Me, the Father will honor him.'
  '27':
  - type: text
    content: ' Now My soul is troubled '
  - type: text
    content: and
  - type: text
    content: ' distressed, and what shall I say? Father, save Me from this hour [of trial and agony]? But it was for this very purpose that I have come to this hour [that I might undergo it].'
  '28':
  - type: text
    content: ' [Rather, I will say,] Father, glorify (honor and extol) Your [own] name! Then there came a voice out of heaven saying, I have already glorified it, and I will glorify it again.'
  '29':
  - type: text
    content: ' The crowd of bystanders heard the sound and said that it had thundered; others said, An angel has spoken to Him!'
  '3':
  - type: text
    content: ' Mary took a pound of ointment of pure liquid nard [a rare perfume] that was very expensive, and she poured it on Jesus'' feet and wiped them with her hair. And the whole house was filled with the fragrance of the perfume.'
  '30':
  - type: text
    content: ' Jesus answered, This voice has not come for My sake, but for your sake.'
  '31':
  - type: text
    content: ' Now the judgment (crisis) of this world is coming on [sentence is now being passed on this world]. Now the ruler (evil genius, prince) of this world shall be cast out (expelled).'
  '32':
  - type: text
    content: ' And I, if '
  - type: text
    content: and
  - type: text
    content: ' when I am lifted up from the earth [on the cross], will draw '
  - type: text
    content: and
  - type: text
    content: ' attract all men [Gentiles as well as Jews] to Myself.'
  '33':
  - type: text
    content: ' He said this to signify in what manner He would die.'
  '34':
  - type: text
    content: ' At this the people answered Him, We have learned from the Law that the Christ is to remain forever; how then can You say, The Son of Man must be lifted up [on the cross]? Who is this Son of Man? [Ps. 110:4.]'
  '35':
  - type: text
    content: ' So Jesus said to them, You will have the Light only a little while longer. Walk while you have the Light [keep on living by it], so that darkness may not overtake '
  - type: text
    content: and
  - type: text
    content: ' overcome you. He who walks about in the dark does not know where he goes [he is drifting].'
  '36':
  - type: text
    content: ' While you have the Light, believe in the Light [have faith in it, hold to it, rely on it], that you may become sons of the Light '
  - type: text
    content: and
  - type: text
    content: ' be filled with Light. Jesus said these things, and then He went away and hid Himself from them [was lost to their view].'
  '37':
  - type: text
    content: ' Even though He had done so many miracles before them (right before their eyes), yet they still did not trust in Him '
  - type: text
    content: and
  - type: text
    content: ' failed to believe in Him–'
  '38':
  - type: text
    content: ' So that what Isaiah the prophet said was fulfilled: Lord, who has believed our report '
  - type: text
    content: and
  - type: text
    content: ' our message? And to whom has the arm (the power) of the Lord been shown (unveiled and revealed)? [Isa. 53:1.]'
  '39':
  - type: text
    content: ' Therefore they could not believe [they were unable to believe]. For Isaiah has also said,'
  '4':
  - type: text
    content: ' But Judas Iscariot, the one of His disciples who was about to betray Him, said,'
  '40':
  - type: text
    content: ' He has blinded their eyes and hardened '
  - type: text
    content: and
  - type: text
    content: ' benumbed their [callous, degenerated] hearts [He has made their minds dull], to keep them from seeing with their eyes and understanding with their hearts '
  - type: text
    content: and
  - type: text
    content: ' minds and repenting '
  - type: text
    content: and
  - type: text
    content: ' turning to Me to heal them.'
  '41':
  - type: text
    content: ' Isaiah said this because he saw His glory and spoke of Him. [Isa. 6:9, 10.]'
  '42':
  - type: text
    content: ' And yet [in spite of all this] many even of the leading men (the authorities and the nobles) believed '
  - type: text
    content: and
  - type: text
    content: ' trusted in Him. But because of the Pharisees they did not confess it, for fear that [if they should acknowledge Him] they would be expelled from the synagogue;'
  '43':
  - type: text
    content: ' For they loved the approval '
  - type: text
    content: and
  - type: text
    content: ' the praise '
  - type: text
    content: and
  - type: text
    content: ' the glory that come from men [instead of and] more than the glory that comes from God. [They valued their credit with men more than their credit with God.]'
  '44':
  - type: text
    content: ' But Jesus loudly declared, The one who believes in Me does not [only] believe in '
  - type: text
    content: and
  - type: text
    content: ' trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on Me, but [in believing in Me he believes] in Him Who sent Me.'
  '45':
  - type: text
    content: ' And whoever sees Me sees Him Who sent Me.'
  '46':
  - type: text
    content: ' I have come as a Light into the world, so that whoever believes in Me [whoever cleaves to '
  - type: text
    content: and
  - type: text
    content: ' trusts in '
  - type: text
    content: and
  - type: text
    content: ' relies on Me] may not continue to live in darkness.'
  '47':
  - type: text
    content: ' If anyone hears My teachings and fails to observe them [does not keep them, but disregards them], it is not I who judges him. For I have not come to judge '
  - type: text
    content: and
  - type: text
    content: ' to condemn '
  - type: text
    content: and
  - type: text
    content: ' to pass sentence '
  - type: text
    content: and
  - type: text
    content: ' to inflict penalty on the world, but to save the world.'
  '48':
  - type: text
    content: ' Anyone who rejects Me '
  - type: text
    content: and
  - type: text
    content: ' persistently sets Me at naught, refusing to accept My teachings, has his judge [however]; for the [very] message that I have spoken will itself judge '
  - type: text
    content: and
  - type: text
    content: ' convict him at the last day.'
  '49':
  - type: text
    content: ' This is because I have never spoken on My own authority '
  - type: text
    content: or
  - type: text
    content: ' of My own accord '
  - type: text
    content: or
  - type: text
    content: ' as self-appointed, but the Father Who sent Me has Himself given Me orders [concerning] what to say and what to tell. [Deut. 18:18, 19.]'
  '5':
  - type: text
    content: ' Why was this perfume not sold for 300 denarii [a year''s wages for an ordinary workman] and that [money] given to the poor (the destitute)?'
  '50':
  - type: text
    content: ' And I know that His commandment is (means) eternal life. So whatever I speak, I am saying [exactly] what My Father has told Me to say '
  - type: text
    content: and
  - type: text
    content: ' in accordance with His instructions.'
  '6':
  - type: text
    content: ' Now he did not say this because he cared for the poor but because he was a thief; and having the bag (the money box, the purse of the Twelve), he took for himself what was put into it [pilfering the collections].'
  '7':
  - type: text
    content: ' But Jesus said, Let her alone. It was [intended] that she should keep it for the time of My preparation for burial. [She has kept it that she might have it for the time of My embalming.]'
  '8':
  - type: text
    content: ' You always have the poor with you, but you do not always have Me.'
  '9':
  - type: text
    content: ' Now a great crowd of the Jews heard that He was at Bethany, and they came there, not only because of Jesus but that they also might see Lazarus, whom He had raised from the dead.'
