document_id: JHN.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO SIX days before the Passover Feast, Jesus came to Bethany, where Lazarus was, who had died and whom He had raised from the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So they made Him a supper; and Martha served, but Lazarus was one of those at the table with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Mary took a pound of ointment of pure liquid nard [a rare perfume] that was very expensive, and she poured it on Jesus'' feet and wiped them with her hair. And the whole house was filled with the fragrance of the perfume.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But Judas Iscariot, the one of His disciples who was about to betray Him, said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Why was this perfume not sold for 300 denarii [a year''s wages for an ordinary workman] and that [money] given to the poor (the destitute)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now he did not say this because he cared for the poor but because he was a thief; and having the bag (the money box, the purse of the Twelve), he took for himself what was put into it [pilfering the collections].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But Jesus said, Let her alone. It was [intended] that she should keep it for the time of My preparation for burial. [She has kept it that she might have it for the time of My embalming.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You always have the poor with you, but you do not always have Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now a great crowd of the Jews heard that He was at Bethany, and they came there, not only because of Jesus but that they also might see Lazarus, whom He had raised from the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So the chief priests planned to put Lazarus to death also,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Because on account of him many of the Jews were going away [were withdrawing from and leaving the Judeans] and believing in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhering to Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The next day a vast crowd of those who had come to the Passover Feast heard that Jesus was coming to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So they took branches of palm trees and went out to meet Him. And as they went, they kept shouting, Hosanna! Blessed is He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise to Him Who comes in the name of the Lord, even the King of Israel! [Ps. 118:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Jesus, having found a young donkey, rode upon it, [just] as it is written in the Scriptures,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Do not fear, O Daughter of Zion! Look! Your King is coming, sitting on a donkey''s colt! [Zech. 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' His disciples did not understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' could not comprehend the meaning of these things at first; but when Jesus was glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exalted, they remembered that these things had been written about Him and had been done to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The group that had been with Jesus when He called Lazarus out of the tomb and raised him from among the dead kept telling it [bearing witness] to others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' It was for this reason that the crowd went out to meet Him, because they had heard that He had performed this sign (proof, miracle).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the Pharisees said among themselves, You see how futile your efforts are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how you accomplish nothing. See! The whole world is running after Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now among those who went up to worship at the Feast were some Greeks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' These came to Philip, who was from Bethsaida in Galilee, and they made this request, Sir, we desire to see Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Philip came and told Andrew; then Andrew and Philip together [went] and told Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Jesus answered them, The time has come for the Son of Man to be glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exalted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I assure you, most solemnly I tell you, Unless a grain of wheat falls into the earth and dies, it remains [just one grain; it never becomes more but lives] by itself alone. But if it dies, it produces many others '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yields a rich harvest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Anyone who loves his life loses it, but anyone who hates his life in this world will keep it to life eternal. [Whoever has no love for, no concern for, no regard for his life here on earth, but despises it, preserves his life forever and ever.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' If anyone serves Me, he must continue to follow Me [to cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying] and wherever I am, there will My servant be also. If anyone serves Me, the Father will honor him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now My soul is troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed, and what shall I say? Father, save Me from this hour [of trial and agony]? But it was for this very purpose that I have come to this hour [that I might undergo it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' [Rather, I will say,] Father, glorify (honor and extol) Your [own] name! Then there came a voice out of heaven saying, I have already glorified it, and I will glorify it again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The crowd of bystanders heard the sound and said that it had thundered; others said, An angel has spoken to Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Jesus answered, This voice has not come for My sake, but for your sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Now the judgment (crisis) of this world is coming on [sentence is now being passed on this world]. Now the ruler (evil genius, prince) of this world shall be cast out (expelled).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And I, if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' when I am lifted up from the earth [on the cross], will draw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attract all men [Gentiles as well as Jews] to Myself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He said this to signify in what manner He would die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' At this the people answered Him, We have learned from the Law that the Christ is to remain forever; how then can You say, The Son of Man must be lifted up [on the cross]? Who is this Son of Man? [Ps. 110:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' So Jesus said to them, You will have the Light only a little while longer. Walk while you have the Light [keep on living by it], so that darkness may not overtake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overcome you. He who walks about in the dark does not know where he goes [he is drifting].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' While you have the Light, believe in the Light [have faith in it, hold to it, rely on it], that you may become sons of the Light '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be filled with Light. Jesus said these things, and then He went away and hid Himself from them [was lost to their view].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Even though He had done so many miracles before them (right before their eyes), yet they still did not trust in Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' failed to believe in Him–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' So that what Isaiah the prophet said was fulfilled: Lord, who has believed our report '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our message? And to whom has the arm (the power) of the Lord been shown (unveiled and revealed)? [Isa. 53:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Therefore they could not believe [they were unable to believe]. For Isaiah has also said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He has blinded their eyes and hardened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benumbed their [callous, degenerated] hearts [He has made their minds dull], to keep them from seeing with their eyes and understanding with their hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minds and repenting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turning to Me to heal them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Isaiah said this because he saw His glory and spoke of Him. [Isa. 6:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And yet [in spite of all this] many even of the leading men (the authorities and the nobles) believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted in Him. But because of the Pharisees they did not confess it, for fear that [if they should acknowledge Him] they would be expelled from the synagogue;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' For they loved the approval '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the glory that come from men [instead of and] more than the glory that comes from God. [They valued their credit with men more than their credit with God.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' But Jesus loudly declared, The one who believes in Me does not [only] believe in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Me, but [in believing in Me he believes] in Him Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And whoever sees Me sees Him Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' I have come as a Light into the world, so that whoever believes in Me [whoever cleaves to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on Me] may not continue to live in darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' If anyone hears My teachings and fails to observe them [does not keep them, but disregards them], it is not I who judges him. For I have not come to judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to condemn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to pass sentence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to inflict penalty on the world, but to save the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Anyone who rejects Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persistently sets Me at naught, refusing to accept My teachings, has his judge [however]; for the [very] message that I have spoken will itself judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' convict him at the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' This is because I have never spoken on My own authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' of My own accord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' as self-appointed, but the Father Who sent Me has Himself given Me orders [concerning] what to say and what to tell. [Deut. 18:18, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And I know that His commandment is (means) eternal life. So whatever I speak, I am saying [exactly] what My Father has told Me to say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in accordance with His instructions.'
