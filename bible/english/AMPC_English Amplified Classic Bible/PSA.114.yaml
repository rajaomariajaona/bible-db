document_id: PSA.114,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHEN ISRAEL came forth out of Egypt, the house of Jacob from a people of strange language,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Judah became [God''s] sanctuary (the Holy Place of His habitation), and Israel His dominion. [Exod. 29:45, 46; Deut. 27:9.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The [Red] Sea looked and fled; the Jordan [River] was turned back. [Exod. 14:21; Josh. 3:13, 16; Ps. 77:16.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The mountains skipped like rams, the little hills like lambs.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What ails you, O [Red] Sea, that you flee? O Jordan, that you turn back?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You mountains, that you skip like rams, and you little hills, like lambs?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Tremble, O earth, at the presence of the Lord, at the presence of the God of Jacob,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who turned the rock into a pool of water, the flint into a fountain of waters. [Exod. 17:6; Num. 20:11.]'
