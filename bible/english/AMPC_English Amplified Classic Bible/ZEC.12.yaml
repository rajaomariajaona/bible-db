document_id: ZEC.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE BURDEN '
  - type: text
    content: or
  - type: text
    content: ' oracle (the thing to be lifted up) of the word of the Lord concerning Israel: Thus says the Lord, Who stretches out the heavens and lays the foundation of the earth and forms the spirit of man within him:'
  '10':
  - type: text
    content: ' And I will pour out upon the house of David and upon the inhabitants of Jerusalem the Spirit of grace '
  - type: text
    content: or
  - type: text
    content: ' unmerited favor and supplication. And they shall look [earnestly] upon Me Whom they have pierced, and they shall mourn for Him as one mourns for his only son, and shall be in bitterness for Him as one who is in bitterness for his firstborn. [John 19:37; Rev. 1:7.]'
  '11':
  - type: text
    content: ' In that day shall there be a great mourning in Jerusalem, as the mourning of [the city of] Hadadrimmon in the Valley of Megiddo [over beloved King Josiah]. [II Chron. 35:22-25.]'
  '12':
  - type: text
    content: ' And the land shall mourn, every family apart: the [kingly] family of the house of David apart and their wives apart; the family of the house of Nathan [David''s son] apart and their wives apart;'
  '13':
  - type: text
    content: ' The [priestly] family of the house of Levi apart and their wives apart; the family of Shimei [grandson of Levi] apart and their wives apart;'
  '14':
  - type: text
    content: ' All the families that are left, each by itself, and their wives by themselves [each with an overwhelming individual sorrow over having blindly rejected their unrecognized Messiah].'
  '2':
  - type: text
    content: ' Behold, I am about to make Jerusalem a cup '
  - type: text
    content: or
  - type: text
    content: ' bowl of reeling to all the peoples round about, and in the siege against Jerusalem will there also be a siege against '
  - type: text
    content: and
  - type: text
    content: ' upon Judah.'
  '3':
  - type: text
    content: ' And in that day I will make Jerusalem a burdensome stone for all peoples; all who lift it '
  - type: text
    content: or
  - type: text
    content: ' burden themselves with it shall be sorely wounded. And all the nations of the earth shall come '
  - type: text
    content: and
  - type: text
    content: ' gather together against it.'
  '4':
  - type: text
    content: ' In that day, says the Lord, I will smite every horse [of the armies that contend against Jerusalem] with terror '
  - type: text
    content: and
  - type: text
    content: ' panic and his rider with madness; and I will open My eyes '
  - type: text
    content: and
  - type: text
    content: ' regard with favor the house of Judah and will smite every horse of the opposing nations with blindness.'
  '5':
  - type: text
    content: ' And the chiefs of Judah shall say in their hearts, The inhabitants of Jerusalem are our strength in the Lord of hosts, their God.'
  '6':
  - type: text
    content: ' In that day will I make the chiefs of Judah like a big, blazing pot among [sticks of] wood and like a flaming torch among sheaves [of grain], and they shall devour all the peoples round about, on the right hand and on the left; and they of Jerusalem shall yet again dwell '
  - type: text
    content: and
  - type: text
    content: ' sit securely in their own place, in Jerusalem.'
  '7':
  - type: text
    content: ' And the Lord shall save '
  - type: text
    content: and
  - type: text
    content: ' give victory to the tents of Judah first, that the glory of the house of David and the glory of the inhabitants of Jerusalem may not be magnified '
  - type: text
    content: and
  - type: text
    content: ' exalted above Judah.'
  '8':
  - type: text
    content: ' In that day will the Lord guard '
  - type: text
    content: and
  - type: text
    content: ' defend the inhabitants of Jerusalem, and he who is [spiritually] feeble '
  - type: text
    content: and
  - type: text
    content: ' stumbles among them in that day [of persecution] shall become [strong and noble] like David; and the house of David [shall maintain its supremacy] like God, like the Angel of the Lord Who is before them.'
  '9':
  - type: text
    content: ' And it shall be in that day that I will make it My aim to destroy all the nations that come against Jerusalem.'
