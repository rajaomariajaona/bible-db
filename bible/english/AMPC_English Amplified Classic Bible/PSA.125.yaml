document_id: PSA.125,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Song of Ascents.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THOSE WHO trust in, lean on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently hope in the Lord are like Mount Zion, which cannot be moved but abides '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stands fast forever.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' As the mountains are round about Jerusalem, so the Lord is round about His people from this time forth and forever.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For the scepter of wickedness shall not rest upon the land of the [uncompromisingly] righteous, lest the righteous (God''s people) stretch forth their hands to iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' apostasy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Do good, O Lord, to those who are good, and to those who are right [with You and all people] in their hearts.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' As for such as turn aside to their crooked ways [of indifference to God], the Lord will lead them forth with the workers of iniquity. Peace be upon Israel!'
