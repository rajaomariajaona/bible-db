document_id: PSA.125,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' THOSE WHO trust in, lean on, '
  - type: text
    content: and
  - type: text
    content: ' confidently hope in the Lord are like Mount Zion, which cannot be moved but abides '
  - type: text
    content: and
  - type: text
    content: ' stands fast forever.'
  '2':
  - type: text
    content: ' As the mountains are round about Jerusalem, so the Lord is round about His people from this time forth and forever.'
  '3':
  - type: text
    content: ' For the scepter of wickedness shall not rest upon the land of the [uncompromisingly] righteous, lest the righteous (God''s people) stretch forth their hands to iniquity '
  - type: text
    content: and
  - type: text
    content: ' apostasy.'
  '4':
  - type: text
    content: ' Do good, O Lord, to those who are good, and to those who are right [with You and all people] in their hearts.'
  '5':
  - type: text
    content: ' As for such as turn aside to their crooked ways [of indifference to God], the Lord will lead them forth with the workers of iniquity. Peace be upon Israel!'
