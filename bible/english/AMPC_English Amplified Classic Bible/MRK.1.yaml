document_id: MRK.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BEGINNING [of the facts] of the good news (the Gospel) of Jesus Christ, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Son of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Just as it is written in the prophet Isaiah: Behold, I send My messenger before Your face, who will make ready Your way–[Mal. 3:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A voice of one crying in the wilderness [shouting in the desert], Prepare the way of the Lord, make His beaten tracks straight (level and passable)! [Isa. 40:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' John the Baptist appeared in the wilderness (desert), preaching a baptism [obligating] repentance (a change of one''s mind for the better, heartily amending one''s ways, with abhorrence of his past sins) in order to obtain forgiveness of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' release from sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And there kept going out to him [continuously] all the country of Judea and all the inhabitants of Jerusalem; and they were baptized by him in the river Jordan, as they were confessing their sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And John wore clothing woven of camel''s hair and had a leather girdle around his loins and ate locusts and wild honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he preached, saying, After me comes He Who is stronger (more powerful and more valiant) than I, the strap of Whose sandals I am not worthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fit to stoop down and unloose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I have baptized you with water, but He will baptize you with the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In those days Jesus came from Nazareth of Galilee and was baptized by John in the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And when He came up out of the water, at once he [John] saw the heavens torn open and the [Holy] Spirit like a dove coming down [to enter] into Him. [John 1:32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And there came a voice out from within heaven, You are My Beloved Son; in You I am well pleased. [Ps. 2:7; Isa. 42:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Immediately the [Holy] Spirit [from within] drove Him out into the wilderness (desert),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And He stayed in the wilderness (desert) forty days, being tempted [all the while] by Satan; and He was with the wild beasts, and the angels ministered to Him [continually].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now after John was arrested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put in prison, Jesus came into Galilee, preaching the good news (the Gospel) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the kingdom
  - type: text
    text: ' of God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And saying, The [appointed period of] time is fulfilled (completed), and the kingdom of God is at hand; repent (have a change of mind which issues in regret for past sins and in change of conduct for the better) and believe (trust in, rely on, and adhere to) the good news (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And passing along the shore of the Sea of Galilee, He saw Simon [Peter] and Andrew the brother of Simon casting a net [to and fro] in the sea, for they were fishermen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Jesus said to them, Come after Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be My disciples, and I will make you to become fishers of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And at once they left their nets and [yielding up all claim to them] followed [with] Him [joining Him as disciples and siding with His party].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He went on a little farther and saw James the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son
  - type: text
    text: ' of Zebedee, and John his brother, who were in [their] boat putting their nets in order.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And immediately He called out to them, and [abandoning all mutual claims] they left their father Zebedee in the boat with the hired men and went off after Him [to be His disciples, side with His party, and follow Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they entered into Capernaum, and immediately on the Sabbath He went into the synagogue and began to teach.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they were completely astonished at His teaching, for He was teaching as One Who possessed authority, and not as the scribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Just at that time there was in their synagogue a man [who was in the power] of an unclean spirit; and now [immediately] he raised a deep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrible cry from the depths of his throat, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' What have You to do with us, Jesus of Nazareth? Have You come to destroy us? I know who You are–the Holy One of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Jesus rebuked him, saying, Hush up (be muzzled, gagged), and come out of him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the unclean spirit, throwing the man into convulsions and screeching with a loud voice, came out of him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they were all so amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' almost terrified that they kept questioning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demanding one of another, saying, What is this? What new (fresh) teaching! With authority He gives orders even to the unclean spirits and they obey Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And immediately rumors concerning Him spread [everywhere] throughout all the region surrounding Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And at once He left the synagogue and went into the house of Simon [Peter] and Andrew, accompanied by James and John.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Now Simon''s mother-in-law had for some time been lying sick with a fever, and at once they told Him about her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And He went up to her and took her by the hand and raised her up; and the fever left her, and she began to wait on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Now when it was evening, after the sun had set, they brought to Him all who were sick and those under the power of demons,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Until the whole town was gathered together about the door.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And He cured many who were afflicted with various diseases; and He drove out many demons, but would not allow the demons to talk because they knew Him [intuitively].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And in the morning, long before daylight, He got up and went out to a deserted place, and there He prayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And Simon [Peter] and those who were with him followed Him [pursuing Him eagerly and hunting Him out],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they found Him and said to Him, Everybody is looking for You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And He said to them, Let us be going on into the neighboring country towns, that I may preach there also; for that is why I came out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' [So] He went throughout the whole of Galilee, preaching in their synagogues and driving out demons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And a leper came to Him, begging Him on his knees and saying to Him, If You are willing, You are able to make me clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And being moved with pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sympathy, Jesus reached out His hand and touched him, and said to him, I am willing; be made clean!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And at once the leprosy [completely] left him and he was made clean [by being healed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And Jesus charged him sternly (sharply and threateningly, and with earnest admonition) and [acting with deep feeling thrust him forth and] sent him away at once,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And said to him, See that you tell nothing [of this] to anyone; but begone, show yourself to the priest, and offer for your purification what Moses commanded, as a proof (an evidence and witness) to the people [that you are really healed]. [Lev. 13:49; 14:2-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' But he went out and began to talk so freely about it and blaze abroad the news [spreading it everywhere] that [Jesus] could no longer openly go into a town but was outside in [lonely] desert places. But the people kept on coming to Him from all sides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' every quarter.'
