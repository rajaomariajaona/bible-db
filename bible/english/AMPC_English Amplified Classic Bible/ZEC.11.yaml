document_id: ZEC.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' OPEN YOUR doors, O Lebanon, that the fire may devour your cedars!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Wail, O fir tree '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cypress, for the cedar has fallen, because the glorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lofty trees are laid waste! Wail, O you oaks of Bashan, for the thick '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inaccessible forest [on the steep mountainside] has in flames been felled!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A voice of the wailing of the shepherds, for their glory, the broad pasturage, is laid waste! A voice of the roaring of young lions, for the pride of the Jordan [the jungle or thickets] is ruined!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Thus says the Lord my God: Shepherd the flock [destined] for slaughter,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Whose buyers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' possessors slay them and hold themselves not guilty; and they who sell them say, Blessed be the Lord, for I have become rich! And their own shepherds neither pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' spare them [from the wolves].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I will no more pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spare the inhabitants of the land, says the Lord; but behold, I will deliver every man into his neighbor''s hand and into the hand of his [foreign] king. And [the enemy] shall lay waste the land, and I will not deliver [the people] out of the hand [of the foreign oppressor].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So I [Zechariah] shepherded the flock of slaughter, truly [as the name implies] the most miserable of sheep. And I took two [shepherd''s] staffs, the one I called Beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Grace and the other I called Bands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Union; and I fed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shepherded the flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I cut off the three shepherds [the civil authorities, the priests, and the prophets] in one month, for I was weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impatient with them, and they also loathed me. [Jer. 2:8, 26; 18:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So I [Zechariah] said, I will not be your shepherd. What is to die, let it die, and what is to be destroyed, let it be destroyed; and let the survivors devour one another''s flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I took my staff, Beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Grace, and broke it in pieces to show that I was annulling the covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' agreement which I had made with all the peoples [not to molest them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So the covenant was annulled on that day, and thus the most wretched of the flock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the traffickers in the sheep who were watching me knew (recognized and understood) that it was truly the word of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I said to them, If it seems just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right to you, give me my wages; but if not, withhold them. So they weighed out for my price thirty pieces of silver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Lord said to me, Cast it to the potter [as if He said, To the dogs!]–the munificently [miserable] sum at which I [and My shepherd] am priced by them! And I [Zechariah] took the thirty pieces of silver and cast them to the potter in the house of the Lord. [Matt. 26:14, 15; 27:3-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then I broke into pieces my other staff, Bands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Union, indicating that I was annulling the brotherhood between Judah and Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Lord said to me, Take up once more the implements [the staff and rod of a shepherd, but this time] of a worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked shepherd. [Ezek. 34:2-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For behold, I will raise up a false shepherd in the land; the lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perishing he will not miss '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' visit, the young '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scattered he will not go to seek, the wounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broken he will not heal, nor will he feed those that are sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong; but he will eat the flesh of the fat ones and break off their hoofs [to consume all the flesh].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Woe to the worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish shepherd who deserts the flock! The sword shall smite his arm and his right eye; his arm shall be utterly withered and his right eye utterly blinded. [Jer. 23:1; John 10:12, 13.]'
