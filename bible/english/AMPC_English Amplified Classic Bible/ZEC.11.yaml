document_id: ZEC.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' OPEN YOUR doors, O Lebanon, that the fire may devour your cedars!'
  '10':
  - type: text
    content: ' And I took my staff, Beauty '
  - type: text
    content: or
  - type: text
    content: ' Grace, and broke it in pieces to show that I was annulling the covenant '
  - type: text
    content: or
  - type: text
    content: ' agreement which I had made with all the peoples [not to molest them].'
  '11':
  - type: text
    content: ' So the covenant was annulled on that day, and thus the most wretched of the flock '
  - type: text
    content: and
  - type: text
    content: ' the traffickers in the sheep who were watching me knew (recognized and understood) that it was truly the word of the Lord.'
  '12':
  - type: text
    content: ' And I said to them, If it seems just '
  - type: text
    content: and
  - type: text
    content: ' right to you, give me my wages; but if not, withhold them. So they weighed out for my price thirty pieces of silver.'
  '13':
  - type: text
    content: ' And the Lord said to me, Cast it to the potter [as if He said, To the dogs!]–the munificently [miserable] sum at which I [and My shepherd] am priced by them! And I [Zechariah] took the thirty pieces of silver and cast them to the potter in the house of the Lord. [Matt. 26:14, 15; 27:3-10.]'
  '14':
  - type: text
    content: ' Then I broke into pieces my other staff, Bands '
  - type: text
    content: or
  - type: text
    content: ' Union, indicating that I was annulling the brotherhood between Judah and Israel.'
  '15':
  - type: text
    content: ' And the Lord said to me, Take up once more the implements [the staff and rod of a shepherd, but this time] of a worthless '
  - type: text
    content: and
  - type: text
    content: ' wicked shepherd. [Ezek. 34:2-6.]'
  '16':
  - type: text
    content: ' For behold, I will raise up a false shepherd in the land; the lost '
  - type: text
    content: and
  - type: text
    content: ' perishing he will not miss '
  - type: text
    content: or
  - type: text
    content: ' visit, the young '
  - type: text
    content: and
  - type: text
    content: ' scattered he will not go to seek, the wounded '
  - type: text
    content: and
  - type: text
    content: ' broken he will not heal, nor will he feed those that are sound '
  - type: text
    content: and
  - type: text
    content: ' strong; but he will eat the flesh of the fat ones and break off their hoofs [to consume all the flesh].'
  '17':
  - type: text
    content: ' Woe to the worthless '
  - type: text
    content: and
  - type: text
    content: ' foolish shepherd who deserts the flock! The sword shall smite his arm and his right eye; his arm shall be utterly withered and his right eye utterly blinded. [Jer. 23:1; John 10:12, 13.]'
  '2':
  - type: text
    content: ' Wail, O fir tree '
  - type: text
    content: and
  - type: text
    content: ' cypress, for the cedar has fallen, because the glorious '
  - type: text
    content: and
  - type: text
    content: ' lofty trees are laid waste! Wail, O you oaks of Bashan, for the thick '
  - type: text
    content: and
  - type: text
    content: ' inaccessible forest [on the steep mountainside] has in flames been felled!'
  '3':
  - type: text
    content: ' A voice of the wailing of the shepherds, for their glory, the broad pasturage, is laid waste! A voice of the roaring of young lions, for the pride of the Jordan [the jungle or thickets] is ruined!'
  '4':
  - type: text
    content: ' Thus says the Lord my God: Shepherd the flock [destined] for slaughter,'
  '5':
  - type: text
    content: ' Whose buyers '
  - type: text
    content: or
  - type: text
    content: ' possessors slay them and hold themselves not guilty; and they who sell them say, Blessed be the Lord, for I have become rich! And their own shepherds neither pity '
  - type: text
    content: nor
  - type: text
    content: ' spare them [from the wolves].'
  '6':
  - type: text
    content: ' For I will no more pity '
  - type: text
    content: or
  - type: text
    content: ' spare the inhabitants of the land, says the Lord; but behold, I will deliver every man into his neighbor''s hand and into the hand of his [foreign] king. And [the enemy] shall lay waste the land, and I will not deliver [the people] out of the hand [of the foreign oppressor].'
  '7':
  - type: text
    content: ' So I [Zechariah] shepherded the flock of slaughter, truly [as the name implies] the most miserable of sheep. And I took two [shepherd''s] staffs, the one I called Beauty '
  - type: text
    content: or
  - type: text
    content: ' Grace and the other I called Bands '
  - type: text
    content: or
  - type: text
    content: ' Union; and I fed '
  - type: text
    content: and
  - type: text
    content: ' shepherded the flock.'
  '8':
  - type: text
    content: ' And I cut off the three shepherds [the civil authorities, the priests, and the prophets] in one month, for I was weary '
  - type: text
    content: and
  - type: text
    content: ' impatient with them, and they also loathed me. [Jer. 2:8, 26; 18:18.]'
  '9':
  - type: text
    content: ' So I [Zechariah] said, I will not be your shepherd. What is to die, let it die, and what is to be destroyed, let it be destroyed; and let the survivors devour one another''s flesh.'
