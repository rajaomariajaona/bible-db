document_id: PSA.66,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A song. A Psalm.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' MAKE A joyful noise unto God, all the earth;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For You, O God, have proved us; You have tried us as silver is tried, refined, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purified.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You brought us into the net (the prison fortress, the dungeon); You laid a heavy burden upon our loins.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You caused men to ride over our heads [when we were prostrate]; we went through fire and through water, but You brought us out into a broad, moist place [to abundance and refreshment and the open air].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will come into Your house with burnt offerings [of entire consecration]; I will pay You my vows,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Which my lips uttered and my mouth promised when I was in distress.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will offer to You burnt offerings of fat lambs, with rams consumed in sweet-smelling smoke; I will offer bullocks and he-goats. Selah [pause, and calmly think of that]!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Come and hear, all you who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear God, and I will declare what He has done for me!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I cried aloud to Him; He was extolled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' high praise was under my tongue.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If I regard iniquity in my heart, the Lord will not hear me; [Prov. 15:29; 28:9; Isa. 1:15; John 9:31; James 4:3.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But certainly God has heard me; He has given heed to the voice of my prayer.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sing forth the honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of His name; make His praise glorious!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed be God, Who has not rejected my prayer nor removed His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness from being [as it always is] with me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Say to God, How awesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fearfully glorious are Your works! Through the greatness of Your power shall Your enemies submit themselves to You [with feigned and reluctant obedience].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the earth shall bow down to You and sing [praises] to You; they shall praise Your name in song. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Come and see the works of God; see how [to save His people He smites their foes; He is] terrible in His doings toward the children of men.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He turned the sea into dry land, they crossed through the river on foot; there did we rejoice in Him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He rules by His might forever, His eyes observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep watch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' the nations; let not the rebellious exalt themselves. Selah [pause, and calmly think of that]!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Bless our God, O peoples, give Him grateful thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make the voice of His praise be heard,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kept us among the living, and has not allowed our feet to slip.'
