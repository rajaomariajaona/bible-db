document_id: PSA.66,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A song. A Psalm.
  - type: text
    content: ' MAKE A joyful noise unto God, all the earth;'
  '10':
  - type: text
    content: ' For You, O God, have proved us; You have tried us as silver is tried, refined, '
  - type: text
    content: and
  - type: text
    content: ' purified.'
  '11':
  - type: text
    content: ' You brought us into the net (the prison fortress, the dungeon); You laid a heavy burden upon our loins.'
  '12':
  - type: text
    content: ' You caused men to ride over our heads [when we were prostrate]; we went through fire and through water, but You brought us out into a broad, moist place [to abundance and refreshment and the open air].'
  '13':
  - type: text
    content: ' I will come into Your house with burnt offerings [of entire consecration]; I will pay You my vows,'
  '14':
  - type: text
    content: ' Which my lips uttered and my mouth promised when I was in distress.'
  '15':
  - type: text
    content: ' I will offer to You burnt offerings of fat lambs, with rams consumed in sweet-smelling smoke; I will offer bullocks and he-goats. Selah [pause, and calmly think of that]!'
  '16':
  - type: text
    content: ' Come and hear, all you who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear God, and I will declare what He has done for me!'
  '17':
  - type: text
    content: ' I cried aloud to Him; He was extolled '
  - type: text
    content: and
  - type: text
    content: ' high praise was under my tongue.'
  '18':
  - type: text
    content: ' If I regard iniquity in my heart, the Lord will not hear me; [Prov. 15:29; 28:9; Isa. 1:15; John 9:31; James 4:3.]'
  '19':
  - type: text
    content: ' But certainly God has heard me; He has given heed to the voice of my prayer.'
  '2':
  - type: text
    content: ' Sing forth the honor '
  - type: text
    content: and
  - type: text
    content: ' glory of His name; make His praise glorious!'
  '20':
  - type: text
    content: ' Blessed be God, Who has not rejected my prayer nor removed His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness from being [as it always is] with me.'
  '3':
  - type: text
    content: ' Say to God, How awesome '
  - type: text
    content: and
  - type: text
    content: ' fearfully glorious are Your works! Through the greatness of Your power shall Your enemies submit themselves to You [with feigned and reluctant obedience].'
  '4':
  - type: text
    content: ' All the earth shall bow down to You and sing [praises] to You; they shall praise Your name in song. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' Come and see the works of God; see how [to save His people He smites their foes; He is] terrible in His doings toward the children of men.'
  '6':
  - type: text
    content: ' He turned the sea into dry land, they crossed through the river on foot; there did we rejoice in Him.'
  '7':
  - type: text
    content: ' He rules by His might forever, His eyes observe '
  - type: text
    content: and
  - type: text
    content: ' keep watch '
  - type: text
    content: over
  - type: text
    content: ' the nations; let not the rebellious exalt themselves. Selah [pause, and calmly think of that]!'
  '8':
  - type: text
    content: ' Bless our God, O peoples, give Him grateful thanks '
  - type: text
    content: and
  - type: text
    content: ' make the voice of His praise be heard,'
  '9':
  - type: text
    content: ' Who put '
  - type: text
    content: and
  - type: text
    content: ' kept us among the living, and has not allowed our feet to slip.'
