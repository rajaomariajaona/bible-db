document_id: DAN.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE third year of the reign of Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it.'
  '10':
  - type: text
    content: ' And the chief of the eunuchs said to Daniel, I fear, lest my lord the king, who has appointed your food and your drink, should see your faces worse looking '
  - type: text
    content: or
  - type: text
    content: ' more sad than the other youths of your age. Then you would endanger my head with the king.'
  '11':
  - type: text
    content: ' Then said Daniel to the steward whom the chief of the eunuchs had set over Daniel, Hananiah, Mishael, and Azariah,'
  '12':
  - type: text
    content: ' Prove your servants, I beseech you, for ten days and let us be given a vegetable diet and water to drink.'
  '13':
  - type: text
    content: ' Then let our appearance and the appearance of the youths who eat of the king''s [rich] dainties be observed '
  - type: text
    content: and
  - type: text
    content: ' compared by you, and deal with us your servants according to what you see.'
  '14':
  - type: text
    content: ' So [the man] consented to them in this matter and proved them ten days.'
  '15':
  - type: text
    content: ' And at the end of ten days it was seen that they were looking better and had taken on more flesh than all the youths who ate of the king''s rich dainties.'
  '16':
  - type: text
    content: ' So the steward took away their [rich] dainties and the wine they were to drink and gave them vegetables.'
  '17':
  - type: text
    content: ' As for these four youths, God gave them knowledge and skill in all learning and wisdom, and Daniel had understanding in all [kinds of] visions and dreams. [Luke 21:15; James 1:5-7.]'
  '18':
  - type: text
    content: ' Now at the end of the time which the king had set for bringing [all the young men in], the chief of the eunuchs brought them before Nebuchadnezzar.'
  '19':
  - type: text
    content: ' And the king conversed with them, and among them all none was found like Daniel, Hananiah, Mishael, and Azariah; therefore they were assigned to stand before the king.'
  '2':
  - type: text
    content: ' And the Lord gave Jehoiakim king of Judah into his hand, along with a part of the vessels of the house of God; and he carried them into the land of Shinar [Babylonia] to the house of his god and placed the vessels in the treasury of his god. [II Chron. 36:5-7; Jer. 27:19, 20; Dan. 5:1-3.]'
  '20':
  - type: text
    content: ' And in all matters of wisdom and understanding concerning which the king asked them, he found them ten times better than all the [learned] magicians and enchanters who were in his whole realm.'
  '21':
  - type: text
    content: ' And Daniel continued there even to the first year of King Cyrus [at the close of the seventy years'' exile of Judah in Babylonia, which Jeremiah had foretold]. [Ezra 1:1-3; Jer. 25:11, 12; 29:10.]'
  '3':
  - type: text
    content: ' And the [Babylonian] king told Ashpenaz, the master of his eunuchs, to bring in some of the children of Israel, both of the royal family and of the nobility–[II Kings 20:17, 18.]'
  '4':
  - type: text
    content: ' Youths without blemish, well-favored in appearance and skillful in all wisdom, discernment, '
  - type: text
    content: and
  - type: text
    content: ' understanding, apt in learning knowledge, competent to stand '
  - type: text
    content: and
  - type: text
    content: ' serve in the king''s palace–and to teach them the literature and language of the Chaldeans.'
  '5':
  - type: text
    content: ' And the king assigned for them a daily portion of his own rich '
  - type: text
    content: and
  - type: text
    content: ' dainty food and of the wine which he drank. They were to be so educated '
  - type: text
    content: and
  - type: text
    content: ' so nourished for three years that at the end of that time they might stand before the king.'
  '6':
  - type: text
    content: ' Among these were of the children of Judah: Daniel, Hananiah, Mishael, and Azariah.'
  '7':
  - type: text
    content: ' The chief of the eunuchs gave them names: Daniel he called Belteshazzar [the king''s attendant], Hananiah he called Shadrach, Mishael he called Meshach, and Azariah he called Abednego.'
  '8':
  - type: text
    content: ' But Daniel determined in his heart that he would not defile himself by [eating his portion of] the king''s rich '
  - type: text
    content: and
  - type: text
    content: ' dainty food or by [drinking] the wine which he drank; therefore he requested of the chief of the eunuchs that he might [be allowed] not to defile himself. [Num. 6:1-4; I Cor. 10:21.]'
  '9':
  - type: text
    content: ' Now God made Daniel to find favor, compassion, '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness with the chief of the eunuchs.'
