document_id: DAN.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE third year of the reign of Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Lord gave Jehoiakim king of Judah into his hand, along with a part of the vessels of the house of God; and he carried them into the land of Shinar [Babylonia] to the house of his god and placed the vessels in the treasury of his god. [II Chron. 36:5-7; Jer. 27:19, 20; Dan. 5:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the [Babylonian] king told Ashpenaz, the master of his eunuchs, to bring in some of the children of Israel, both of the royal family and of the nobility–[II Kings 20:17, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Youths without blemish, well-favored in appearance and skillful in all wisdom, discernment, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding, apt in learning knowledge, competent to stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' serve in the king''s palace–and to teach them the literature and language of the Chaldeans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the king assigned for them a daily portion of his own rich '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dainty food and of the wine which he drank. They were to be so educated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' so nourished for three years that at the end of that time they might stand before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Among these were of the children of Judah: Daniel, Hananiah, Mishael, and Azariah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The chief of the eunuchs gave them names: Daniel he called Belteshazzar [the king''s attendant], Hananiah he called Shadrach, Mishael he called Meshach, and Azariah he called Abednego.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But Daniel determined in his heart that he would not defile himself by [eating his portion of] the king''s rich '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dainty food or by [drinking] the wine which he drank; therefore he requested of the chief of the eunuchs that he might [be allowed] not to defile himself. [Num. 6:1-4; I Cor. 10:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now God made Daniel to find favor, compassion, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness with the chief of the eunuchs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the chief of the eunuchs said to Daniel, I fear, lest my lord the king, who has appointed your food and your drink, should see your faces worse looking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' more sad than the other youths of your age. Then you would endanger my head with the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then said Daniel to the steward whom the chief of the eunuchs had set over Daniel, Hananiah, Mishael, and Azariah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Prove your servants, I beseech you, for ten days and let us be given a vegetable diet and water to drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then let our appearance and the appearance of the youths who eat of the king''s [rich] dainties be observed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compared by you, and deal with us your servants according to what you see.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So [the man] consented to them in this matter and proved them ten days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And at the end of ten days it was seen that they were looking better and had taken on more flesh than all the youths who ate of the king''s rich dainties.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So the steward took away their [rich] dainties and the wine they were to drink and gave them vegetables.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' As for these four youths, God gave them knowledge and skill in all learning and wisdom, and Daniel had understanding in all [kinds of] visions and dreams. [Luke 21:15; James 1:5-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now at the end of the time which the king had set for bringing [all the young men in], the chief of the eunuchs brought them before Nebuchadnezzar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the king conversed with them, and among them all none was found like Daniel, Hananiah, Mishael, and Azariah; therefore they were assigned to stand before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And in all matters of wisdom and understanding concerning which the king asked them, he found them ten times better than all the [learned] magicians and enchanters who were in his whole realm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Daniel continued there even to the first year of King Cyrus [at the close of the seventy years'' exile of Judah in Babylonia, which Jeremiah had foretold]. [Ezra 1:1-3; Jer. 25:11, 12; 29:10.]'
