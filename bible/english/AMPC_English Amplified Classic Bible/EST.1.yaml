document_id: EST.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IT WAS in the days of Ahasuerus [Xerxes], the Ahasuerus who reigned from India to Ethiopia over 127 provinces.'
  '10':
  - type: text
    content: ' On the seventh day, when the king''s heart was merry with wine, he commanded Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Carkas, the seven eunuchs who ministered to King Ahasuerus as attendants,'
  '11':
  - type: text
    content: ' To bring Queen Vashti before the king, with her royal crown, to show the peoples and the princes her beauty, for she was fair to behold.'
  '12':
  - type: text
    content: ' But Queen Vashti refused to come at the king''s command conveyed by the eunuchs. Therefore the king was enraged, and his anger burned within him.'
  '13':
  - type: text
    content: ' Then the king spoke to the wise men who knew the times–for this was the king''s procedure toward all who were familiar with law and judgment–'
  '14':
  - type: text
    content: ' Those next to him being Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan, the seven princes of Persia and Media who were in the king''s presence and held first place in the kingdom.'
  '15':
  - type: text
    content: ' [He said] According to the law, what is to be done to Queen Vashti because she has not done the bidding of King Ahasuerus conveyed by the eunuchs?'
  '16':
  - type: text
    content: ' And Memucan answered before the king and the princes, Vashti the queen has not only done wrong to the king but also to all the princes and to all the peoples who are in all the provinces of King Ahasuerus.'
  '17':
  - type: text
    content: ' For this deed of the queen will become known to all women, making their husbands contemptible in their eyes, since they will say, King Ahasuerus commanded Queen Vashti to be brought before him, but she did not come.'
  '18':
  - type: text
    content: ' This very day the ladies of Persia and Media who have heard of the queen''s behavior will be telling it to all the king''s princes. So contempt and wrath in plenty will arise.'
  '19':
  - type: text
    content: ' If it pleases the king, let a royal command go forth from him and let it be written among the laws of the Persians and Medes, so that it may not be changed, that Vashti is to [be divorced and] come no more before King Ahasuerus; and let the king give her royal position to another who is better than she.'
  '2':
  - type: text
    content: ' In those days when King Ahasuerus sat on his royal throne which was in Shushan '
  - type: text
    content: or
  - type: text
    content: ' Susa [the capital of the Persian Empire] in the palace '
  - type: text
    content: or
  - type: text
    content: ' castle,'
  '20':
  - type: text
    content: ' So when the king''s decree is made and proclaimed throughout all his kingdom, extensive as it is, all wives will give honor to their husbands, high and low.'
  '21':
  - type: text
    content: ' This advice pleased the king and the princes, and the king did what Memucan proposed.'
  '22':
  - type: text
    content: ' He sent letters to all the royal provinces, to each in its own script and to every people in their own language, saying that every man should rule in his own house and speak there in the language of his own people. [If he had foreign wives, let them learn his language.]'
  '3':
  - type: text
    content: ' In the third year of his reign he made a feast for all his princes and his courtiers. The chief officers of the Persian and Median army and the nobles and governors of the provinces were there before him'
  '4':
  - type: text
    content: ' While he showed the riches of his glorious kingdom and the splendor and excellence of his majesty for many days, even 180 days.'
  '5':
  - type: text
    content: ' And when these days were completed, the king made a feast for all the people present in Shushan the capital, both great and small, a seven-day feast in the court of the garden of the king''s palace.'
  '6':
  - type: text
    content: ' There were hangings of fine white cloth, of green and of blue [cotton], fastened with cords of fine linen and purple to silver rings '
  - type: text
    content: or
  - type: text
    content: ' rods and marble pillars. The couches of gold and silver rested on a [mosaic] pavement of porphyry, white marble, mother-of-pearl, and [precious] colored stones.'
  '7':
  - type: text
    content: ' Drinks were served in different kinds of golden goblets, and there was royal wine in abundance, according to the liberality of the king.'
  '8':
  - type: text
    content: ' And drinking was according to the law; no one was compelled to drink, for the king had directed all the officials of his palace to serve only as each guest desired.'
  '9':
  - type: text
    content: ' Also Queen Vashti gave a banquet for the women in the royal house which belonged to King Ahasuerus.'
