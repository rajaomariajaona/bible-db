document_id: PSA.110,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' (God) says to my Lord (the Messiah), Sit at My right hand, until I make Your adversaries Your footstool. [Matt. 26:64; Acts 2:34; I Cor. 15:25; Col. 3:1; Heb. 12:2.]'
  '2':
  - type: text
    content: ' The Lord will send forth from Zion the scepter of Your strength; rule, then, in the midst of Your foes. [Rom. 11:26, 27.]'
  '3':
  - type: text
    content: ' Your people will offer themselves willingly in the day of Your power, in the beauty of holiness '
  - type: text
    content: and
  - type: text
    content: ' in holy array out of the womb of the morning; to You [will spring forth] Your young men, who are as the dew.'
  '4':
  - type: text
    content: ' The Lord has sworn and will not revoke '
  - type: text
    content: or
  - type: text
    content: ' change it: You are a priest forever, after the manner '
  - type: text
    content: and
  - type: text
    content: ' order of Melchizedek. [Heb. 5:10; 7:11, 15, 21.]'
  '5':
  - type: text
    content: ' The Lord at Your right hand will shatter kings in the day of His indignation.'
  '6':
  - type: text
    content: ' He will execute judgment [in overwhelming punishment] upon the nations; He will fill the valleys with the dead bodies, He will crush the [chief] heads over lands many '
  - type: text
    content: and
  - type: text
    content: ' far extended. [Ezek. 38:21, 22; 39:11, 12.]'
  '7':
  - type: text
    content: ' He will drink of the brook by the way; therefore will He lift up His head [triumphantly].'
