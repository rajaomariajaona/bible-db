document_id: PSA.110
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' (God) says to my Lord (the Messiah), Sit at My right hand, until I make Your adversaries Your footstool. [Matt. 26:64; Acts 2:34; I Cor. 15:25; Col. 3:1; Heb. 12:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord will send forth from Zion the scepter of Your strength; rule, then, in the midst of Your foes. [Rom. 11:26, 27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Your people will offer themselves willingly in the day of Your power, in the beauty of holiness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in holy array out of the womb of the morning; to You [will spring forth] Your young men, who are as the dew.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The Lord has sworn and will not revoke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' change it: You are a priest forever, after the manner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' order of Melchizedek. [Heb. 5:10; 7:11, 15, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord at Your right hand will shatter kings in the day of His indignation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He will execute judgment [in overwhelming punishment] upon the nations; He will fill the valleys with the dead bodies, He will crush the [chief] heads over lands many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' far extended. [Ezek. 38:21, 22; 39:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He will drink of the brook by the way; therefore will He lift up His head [triumphantly].'
