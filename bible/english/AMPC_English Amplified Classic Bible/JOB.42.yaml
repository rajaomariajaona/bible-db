document_id: JOB.42
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOB said to the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I know that You can do all things, and that no thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purpose of Yours can be restrained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' thwarted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [You said to me] Who is this that darkens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obscures counsel [by words] without knowledge? Therefore [I now see] I have [rashly] uttered what I did not understand, things too wonderful for me, which I did not know. [Job 38:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [I had virtually said to You what You have said to me:] Hear, I beseech You, and I will speak; I will demand of You, and You declare to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I had heard of You [only] by the hearing of the ear, but now my [spiritual] eye sees You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore I loathe [my words] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abhor myself and repent in dust and ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' After the Lord had spoken the previous words to Job, the Lord said to Eliphaz the Temanite, My wrath is kindled against you and against your two friends, for you have not spoken of Me the thing that is right, as My servant Job has.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now therefore take seven bullocks and seven rams and go to My servant Job and offer up for yourselves a burnt offering; and My servant Job shall pray for you, for I will accept [his prayer] that I deal not with you after your folly, in that you have not spoken of Me the thing that is right, as My servant Job has.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Eliphaz the Temanite and Bildad the Shuhite and Zophar the Naamathite went and did as the Lord commanded them; and the Lord accepted [Job''s prayer].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord turned the captivity of Job '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restored his fortunes, when he prayed for his friends; also the Lord gave Job twice as much as he had before. [Deut. 30:1-3; Ps. 126:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then there came to him all his brothers and sisters and all who had known him before, and they ate bread with him in his house; and they sympathized with him and comforted him over all the [distressing] calamities that the Lord had brought upon him. Every man also gave him a piece of money, and every man an earring of gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord blessed the latter days of Job more than his beginning; for he had 14,000 sheep, 6,000 camels, 1,000 yoke of oxen, and 1,000 female donkeys. [Job 1:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He had also seven sons and three daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he called the name of the first Jemimah, and the name of the second Keziah, and the name of the third Keren-happuch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And in all the land there were no women so fair as the daughters of Job, and their father gave them inheritance among their brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' After this, Job lived 140 years, and saw his sons and his sons'' sons, even to four generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Job died, an old man and full of days. [James 5:11.]'
