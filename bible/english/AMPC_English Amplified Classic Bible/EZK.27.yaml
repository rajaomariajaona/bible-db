document_id: EZK.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord came again to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now you, son of man, take up a lamentation over Tyre,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say to Tyre, O you who dwell at the entrance to the sea, who are merchant of the peoples of many islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands, thus says the Lord God: O Tyre, you have thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' said, I am perfect in beauty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Your borders are in the heart of the seas; your builders have perfected your beauty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They have made all your planks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boards of fir trees from Senir [a peak of Mount Hermon]; they have taken a cedar from Lebanon to make a mast for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Of the oaks of Bashan they have made your oars; they have made your deck '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benches of boxwood from the coasts of Cyprus, inlaid with ivory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Of fine linen with embroidered work from Egypt was your sail, that it might be an ensign for you; blue and purple from the coasts of Elishah [of Asia Minor] was the [ship''s] awning which covered you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The inhabitants of Sidon and [the island] of Arvad were your oarsmen; your skilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise men, O Tyre, were in you; they were your pilots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The old men of Gebal [a city north of Sidon] and its skilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise men in you were your calkers; all the ships of the sea with their mariners were in you to deal in your merchandise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trading.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Persia and Lud and Put were in your army as your men of war; they hung the shield and helmet in you; they gave you beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The men of Arvad with your army were upon your walls round about and valorous men [of Gamad] were in your towers; they hung their shields upon your walls round about; they have perfected your beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Tarshish [in Spain] carried on traffic with you because of the abundance of your riches of all kinds; with silver, iron, tin, and lead they traded for your wares.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Javan (Greece), Tubal, and Meshech [in the mountainous region between the Black and Caspian Seas] traded with you. They exchanged the lives of men [taken as slaves] and vessels of bronze for your merchandise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They of the house of Togarmah (Armenia) traded for your wares with [chariot] horses, cavalry horses, and mules.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The men of Dedan [in Arabia] traded with you; many islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands were your own markets; they brought you in payment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' as presents ivory tusks and ebony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Aram (Syria or Mesopotamia) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and Edom
  - type: text
    text: ' traded with you because of the multitude of the wares of your making. They exchanged for your merchandise emeralds, purple, embroidered work, fine linen, coral, and agate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rubies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Judah and the land of Israel, they were your traders; they exchanged in your market wheat of Minnith [in Ammon], olives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' early figs, honey, oil, and balm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Damascus traded with you because of the abundance of supplies of your handiworks and the immense wealth of every kind, with wine of Helbon [Aleppo] and white wool [of Sachar in Syria].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Vedan also and [Arabic] Javan traded with yarn from Uzal [in Arabia] for your wares; wrought iron, cassia, and calamus were exchanged for your merchandise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Dedan supplied you with precious [saddle] cloths for riding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Arabia and all the princes of Kedar, they were the merchants in lambs, rams, and goats favored by you; in these they traded with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The merchants of Sheba and Raamah [in Arabia] traded with you; they exchanged for your wares the choicest of all kinds of spices and all precious stones and gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Haran and Canneh and Eden [in Mesopotamia], the merchants of Sheba [on the Euphrates], Asshur, and Chilmad [near Bagdad] were your traders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' These traded with you in choice fabrics, in bales of garments of blue and embroidered work, and in treasures of many colored rich damask '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carpets bound with cords and made firm; in these they traded with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The ships of Tarshish were your caravans for your merchandise, and you were replenished [Tyre] and were heavily loaded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made an imposing fleet [in your location] in the heart of the seas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Your rowers have brought you out into great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deep waters; the east wind has broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrecked you in the heart of the seas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Your riches, your wares, your merchandise, your oarsmen and your pilots, your caulkers, your dealers in merchandise, and all your men of war who are in you, with all your company which is in your midst, sink in the heart of the seas on the day of your ruin!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The waves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the countryside shake at the [piercing] sound of the [hopeless, wailing] cry of your pilots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And down from their ships come all who handle the oar. The mariners and all the pilots of the sea stand upon the shore'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And are heard wailing loudly over you, and they cry bitterly. They cast up dust on their heads; they wallow in ashes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they make themselves [utterly] bald for you and gird themselves with sackcloth, and they weep over you in bitterness of heart and with bitter mourning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wailing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And in their wailing they take up a lamentation for you and lament over you, saying, Who was ever like Tyre, the destroyed (the annihilated), [who has become so still] in the heart of the sea?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' When your wares came forth from the seas, you met the desire, the demand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the necessities of many people; you enriched the kings of the earth with your abundant wealth and merchandise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Now you are shattered by the seas in the depths of the waters; your merchandise and all your crew have gone down with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' All the inhabitants of the isles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands are astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled at you, and their kings are horribly frightened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudder greatly; their faces quiver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The merchants among the people hiss over you [with malicious joy]; you have become a horror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a source of terrors. You shall be no more [forever].'
