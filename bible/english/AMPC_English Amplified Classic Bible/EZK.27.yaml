document_id: EZK.27,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord came again to me, saying,'
  '10':
  - type: text
    content: ' Persia and Lud and Put were in your army as your men of war; they hung the shield and helmet in you; they gave you beauty '
  - type: text
    content: and
  - type: text
    content: ' splendor.'
  '11':
  - type: text
    content: ' The men of Arvad with your army were upon your walls round about and valorous men [of Gamad] were in your towers; they hung their shields upon your walls round about; they have perfected your beauty '
  - type: text
    content: and
  - type: text
    content: ' splendor.'
  '12':
  - type: text
    content: ' Tarshish [in Spain] carried on traffic with you because of the abundance of your riches of all kinds; with silver, iron, tin, and lead they traded for your wares.'
  '13':
  - type: text
    content: ' Javan (Greece), Tubal, and Meshech [in the mountainous region between the Black and Caspian Seas] traded with you. They exchanged the lives of men [taken as slaves] and vessels of bronze for your merchandise.'
  '14':
  - type: text
    content: ' They of the house of Togarmah (Armenia) traded for your wares with [chariot] horses, cavalry horses, and mules.'
  '15':
  - type: text
    content: ' The men of Dedan [in Arabia] traded with you; many islands '
  - type: text
    content: and
  - type: text
    content: ' coastlands were your own markets; they brought you in payment '
  - type: text
    content: or
  - type: text
    content: ' as presents ivory tusks and ebony.'
  '16':
  - type: text
    content: ' Aram (Syria or Mesopotamia) '
  - type: text
    content: and Edom
  - type: text
    content: ' traded with you because of the multitude of the wares of your making. They exchanged for your merchandise emeralds, purple, embroidered work, fine linen, coral, and agate '
  - type: text
    content: or
  - type: text
    content: ' rubies.'
  '17':
  - type: text
    content: ' Judah and the land of Israel, they were your traders; they exchanged in your market wheat of Minnith [in Ammon], olives '
  - type: text
    content: or
  - type: text
    content: ' early figs, honey, oil, and balm.'
  '18':
  - type: text
    content: ' Damascus traded with you because of the abundance of supplies of your handiworks and the immense wealth of every kind, with wine of Helbon [Aleppo] and white wool [of Sachar in Syria].'
  '19':
  - type: text
    content: ' Vedan also and [Arabic] Javan traded with yarn from Uzal [in Arabia] for your wares; wrought iron, cassia, and calamus were exchanged for your merchandise.'
  '2':
  - type: text
    content: ' Now you, son of man, take up a lamentation over Tyre,'
  '20':
  - type: text
    content: ' Dedan supplied you with precious [saddle] cloths for riding.'
  '21':
  - type: text
    content: ' Arabia and all the princes of Kedar, they were the merchants in lambs, rams, and goats favored by you; in these they traded with you.'
  '22':
  - type: text
    content: ' The merchants of Sheba and Raamah [in Arabia] traded with you; they exchanged for your wares the choicest of all kinds of spices and all precious stones and gold.'
  '23':
  - type: text
    content: ' Haran and Canneh and Eden [in Mesopotamia], the merchants of Sheba [on the Euphrates], Asshur, and Chilmad [near Bagdad] were your traders.'
  '24':
  - type: text
    content: ' These traded with you in choice fabrics, in bales of garments of blue and embroidered work, and in treasures of many colored rich damask '
  - type: text
    content: and
  - type: text
    content: ' carpets bound with cords and made firm; in these they traded with you.'
  '25':
  - type: text
    content: ' The ships of Tarshish were your caravans for your merchandise, and you were replenished [Tyre] and were heavily loaded '
  - type: text
    content: and
  - type: text
    content: ' made an imposing fleet [in your location] in the heart of the seas.'
  '26':
  - type: text
    content: ' Your rowers have brought you out into great '
  - type: text
    content: and
  - type: text
    content: ' deep waters; the east wind has broken '
  - type: text
    content: and
  - type: text
    content: ' wrecked you in the heart of the seas.'
  '27':
  - type: text
    content: ' Your riches, your wares, your merchandise, your oarsmen and your pilots, your caulkers, your dealers in merchandise, and all your men of war who are in you, with all your company which is in your midst, sink in the heart of the seas on the day of your ruin!'
  '28':
  - type: text
    content: ' The waves '
  - type: text
    content: and
  - type: text
    content: ' the countryside shake at the [piercing] sound of the [hopeless, wailing] cry of your pilots.'
  '29':
  - type: text
    content: ' And down from their ships come all who handle the oar. The mariners and all the pilots of the sea stand upon the shore'
  '3':
  - type: text
    content: ' And say to Tyre, O you who dwell at the entrance to the sea, who are merchant of the peoples of many islands '
  - type: text
    content: and
  - type: text
    content: ' coastlands, thus says the Lord God: O Tyre, you have thought '
  - type: text
    content: and
  - type: text
    content: ' said, I am perfect in beauty.'
  '30':
  - type: text
    content: ' And are heard wailing loudly over you, and they cry bitterly. They cast up dust on their heads; they wallow in ashes,'
  '31':
  - type: text
    content: ' And they make themselves [utterly] bald for you and gird themselves with sackcloth, and they weep over you in bitterness of heart and with bitter mourning '
  - type: text
    content: and
  - type: text
    content: ' wailing.'
  '32':
  - type: text
    content: ' And in their wailing they take up a lamentation for you and lament over you, saying, Who was ever like Tyre, the destroyed (the annihilated), [who has become so still] in the heart of the sea?'
  '33':
  - type: text
    content: ' When your wares came forth from the seas, you met the desire, the demand, '
  - type: text
    content: and
  - type: text
    content: ' the necessities of many people; you enriched the kings of the earth with your abundant wealth and merchandise.'
  '34':
  - type: text
    content: ' Now you are shattered by the seas in the depths of the waters; your merchandise and all your crew have gone down with you.'
  '35':
  - type: text
    content: ' All the inhabitants of the isles '
  - type: text
    content: and
  - type: text
    content: ' coastlands are astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled at you, and their kings are horribly frightened '
  - type: text
    content: and
  - type: text
    content: ' shudder greatly; their faces quiver.'
  '36':
  - type: text
    content: ' The merchants among the people hiss over you [with malicious joy]; you have become a horror '
  - type: text
    content: and
  - type: text
    content: ' a source of terrors. You shall be no more [forever].'
  '4':
  - type: text
    content: ' Your borders are in the heart of the seas; your builders have perfected your beauty.'
  '5':
  - type: text
    content: ' They have made all your planks '
  - type: text
    content: and
  - type: text
    content: ' boards of fir trees from Senir [a peak of Mount Hermon]; they have taken a cedar from Lebanon to make a mast for you.'
  '6':
  - type: text
    content: ' Of the oaks of Bashan they have made your oars; they have made your deck '
  - type: text
    content: and
  - type: text
    content: ' benches of boxwood from the coasts of Cyprus, inlaid with ivory.'
  '7':
  - type: text
    content: ' Of fine linen with embroidered work from Egypt was your sail, that it might be an ensign for you; blue and purple from the coasts of Elishah [of Asia Minor] was the [ship''s] awning which covered you.'
  '8':
  - type: text
    content: ' The inhabitants of Sidon and [the island] of Arvad were your oarsmen; your skilled '
  - type: text
    content: and
  - type: text
    content: ' wise men, O Tyre, were in you; they were your pilots.'
  '9':
  - type: text
    content: ' The old men of Gebal [a city north of Sidon] and its skilled '
  - type: text
    content: and
  - type: text
    content: ' wise men in you were your calkers; all the ships of the sea with their mariners were in you to deal in your merchandise '
  - type: text
    content: and
  - type: text
    content: ' trading.'
