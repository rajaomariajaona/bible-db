document_id: PSA.74,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A skillful song, or a didactic or reflective poem, of Asaph.
  - type: text
    content: ' O GOD, why do You cast us off forever? Why does Your anger burn '
  - type: text
    content: and
  - type: text
    content: ' smoke against the sheep of Your pasture?'
  '10':
  - type: text
    content: ' O God, how long is the adversary to scoff '
  - type: text
    content: and
  - type: text
    content: ' reproach? Is the enemy to blaspheme '
  - type: text
    content: and
  - type: text
    content: ' revile Your name forever?'
  '11':
  - type: text
    content: ' Why do You hold back Your hand, even Your right hand? Draw it out of Your bosom '
  - type: text
    content: and
  - type: text
    content: ' consume them [make an end of them]!'
  '12':
  - type: text
    content: ' Yet God is my King of old, working salvation in the midst of the earth.'
  '13':
  - type: text
    content: ' You did divide the [Red] Sea by Your might; You broke the heads of the [Egyptian] dragons in the waters. [Exod. 14:21.]'
  '14':
  - type: text
    content: ' You crushed the heads of Leviathan (Egypt); You did give him as food for the creatures inhabiting the wilderness.'
  '15':
  - type: text
    content: ' You did cleave open [the rock bringing forth] fountains and streams; You dried up mighty, ever-flowing rivers (the Jordan). [Exod. 17:6; Num. 20:11; Josh. 3:13.]'
  '16':
  - type: text
    content: ' The day is Yours, the night also is Yours; You have established the [starry] light and the sun.'
  '17':
  - type: text
    content: ' You have fixed all the borders of the earth [the divisions of land and sea and of the nations]; You have made summer and winter. [Acts17:26.]'
  '18':
  - type: text
    content: ' [Earnestly] remember how the enemy has scoffed, O Lord, '
  - type: text
    content: and
  - type: text
    content: ' reproached You, and how a foolish '
  - type: text
    content: and
  - type: text
    content: ' impious people has blasphemed Your name.'
  '19':
  - type: text
    content: ' Oh, do not deliver the life of your turtledove to the wild beast (to the greedy multitude); forget not the life [of the multitude] of Your poor forever.'
  '2':
  - type: text
    content: ' [Earnestly] remember Your congregation which You have acquired of old, which You have redeemed to be the tribe of Your heritage; remember Mount Zion, where You have dwelt.'
  '20':
  - type: text
    content: ' Have regard for the covenant [You made with Abraham], for the dark places of the land are full of the habitations of violence.'
  '21':
  - type: text
    content: ' Oh, let not the downtrodden return in shame; let the oppressed and needy praise Your name.'
  '22':
  - type: text
    content: ' Arise, O God, plead Your own cause; remember [earnestly] how the foolish '
  - type: text
    content: and
  - type: text
    content: ' impious man scoffs '
  - type: text
    content: and
  - type: text
    content: ' reproaches You day after day '
  - type: text
    content: and
  - type: text
    content: ' all day long.'
  '23':
  - type: text
    content: ' Do not forget the [clamoring] voices of Your adversaries, the tumult of those who rise up against You, which ascends continually.'
  '3':
  - type: text
    content: ' Direct Your feet [quickly] to the perpetual ruins '
  - type: text
    content: and
  - type: text
    content: ' desolations; the foe has devastated '
  - type: text
    content: and
  - type: text
    content: ' desecrated everything in the sanctuary.'
  '4':
  - type: text
    content: ' In the midst of Your Holy Place Your enemies have roared [with their battle cry]; they set up their own [idol] emblems for signs [of victory].'
  '5':
  - type: text
    content: ' They seemed like men who lifted up axes upon a thicket of trees to make themselves a record.'
  '6':
  - type: text
    content: ' And then all the carved wood of the Holy Place they broke down with hatchets and hammers.'
  '7':
  - type: text
    content: ' They have set Your sanctuary on fire; they have profaned the dwelling place of Your Name by casting it to the ground.'
  '8':
  - type: text
    content: ' They said in their hearts, Let us make havoc [of such places] altogether. They have burned up all God''s meetinghouses in the land.'
  '9':
  - type: text
    content: ' We do not see our symbols; there is no longer any prophet, neither does any among us know for how long.'
