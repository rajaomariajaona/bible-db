document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A skillful song, or a didactic or reflective poem, of Asaph.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GOD, why do You cast us off forever? Why does Your anger burn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smoke against the sheep of Your pasture?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [Earnestly] remember Your congregation which You have acquired of old, which You have redeemed to be the tribe of Your heritage; remember Mount Zion, where You have dwelt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Direct Your feet [quickly] to the perpetual ruins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolations; the foe has devastated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desecrated everything in the sanctuary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' In the midst of Your Holy Place Your enemies have roared [with their battle cry]; they set up their own [idol] emblems for signs [of victory].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They seemed like men who lifted up axes upon a thicket of trees to make themselves a record.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And then all the carved wood of the Holy Place they broke down with hatchets and hammers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They have set Your sanctuary on fire; they have profaned the dwelling place of Your Name by casting it to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They said in their hearts, Let us make havoc [of such places] altogether. They have burned up all God''s meetinghouses in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' We do not see our symbols; there is no longer any prophet, neither does any among us know for how long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' O God, how long is the adversary to scoff '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach? Is the enemy to blaspheme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revile Your name forever?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Why do You hold back Your hand, even Your right hand? Draw it out of Your bosom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consume them [make an end of them]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yet God is my King of old, working salvation in the midst of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You did divide the [Red] Sea by Your might; You broke the heads of the [Egyptian] dragons in the waters. [Exod. 14:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You crushed the heads of Leviathan (Egypt); You did give him as food for the creatures inhabiting the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You did cleave open [the rock bringing forth] fountains and streams; You dried up mighty, ever-flowing rivers (the Jordan). [Exod. 17:6; Num. 20:11; Josh. 3:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The day is Yours, the night also is Yours; You have established the [starry] light and the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You have fixed all the borders of the earth [the divisions of land and sea and of the nations]; You have made summer and winter. [Acts17:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [Earnestly] remember how the enemy has scoffed, O Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproached You, and how a foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impious people has blasphemed Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Oh, do not deliver the life of your turtledove to the wild beast (to the greedy multitude); forget not the life [of the multitude] of Your poor forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Have regard for the covenant [You made with Abraham], for the dark places of the land are full of the habitations of violence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Oh, let not the downtrodden return in shame; let the oppressed and needy praise Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Arise, O God, plead Your own cause; remember [earnestly] how the foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impious man scoffs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproaches You day after day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all day long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Do not forget the [clamoring] voices of Your adversaries, the tumult of those who rise up against You, which ascends continually.'
