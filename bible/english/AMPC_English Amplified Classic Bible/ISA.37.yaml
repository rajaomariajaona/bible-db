document_id: ISA.37
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND WHEN King Hezekiah heard it, he rent his clothes and covered himself with sackcloth and went into the house of the Lord. [II Kings 19:1-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he sent Eliakim, who was over the [royal] household, and Shebna the secretary, and the older priests, clothed with sackcloth, to Isaiah the prophet, the son of Amoz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they said to him, Thus says Hezekiah: This day is a day of trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress and of rebuke and of disgrace; for children have come to the birth, and there is no strength to bring them forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' It may be that the Lord your God will hear the words of the Rabshakeh, whom the king of Assyria, his master, has sent to mock, reproach, insult, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God, and will rebuke the words which the Lord your God has heard. Therefore lift up your prayer for the remnant [of His people] that is left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So the servants of King Hezekiah came to Isaiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Isaiah said to them, You shall say to your master, Thus says the Lord: Do not be afraid because of the words which you have heard, with which the servants of the king of Assyria have reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemed Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold, I will put a spirit in him so that he will hear a rumor and return to his own land, and I will cause him to fall by the sword in his own land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So the Rabshakeh returned and found the king of Assyria fighting against Libnah [a fortified city of Judah]; for he had heard that the king had departed from Lachish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And [Sennacherib king of Assyria] heard concerning Tirhakah king of Ethiopia, He has come forth to make war with you. And when he heard it, he sent messengers to Hezekiah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Thus shall you speak to Hezekiah king of Judah: Let not your God in Whom you trust deceive you by saying, Jerusalem shall not be given into the hand of the king of Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Behold, you have heard what the kings of Assyria have done to all lands, destroying them utterly. And shall you be delivered?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Have the gods of the nations delivered those whom my predecessors have destroyed, as Gozan, Haran [of Mesopotamia], Rezeph, and the children of Eden who were in Telassar?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Where is the king of Hamath, and the king of Arpad [of northern Syria], and the king of the city of Sepharvaim, the king of Hena, or the king of Ivvah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Hezekiah received the letter from the hand of the messengers and read it. And Hezekiah went up to the house of the Lord and spread it before the Lord. [II Kings 19:14-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Hezekiah prayed to the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' O Lord of hosts, God of Israel, Who [in symbol] are enthroned above the cherubim [of the ark in the temple], You are the God, You alone, of all the kingdoms of the earth. You have made heaven and earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Incline Your ear, O Lord, and hear; open Your eyes, O Lord, and see; and hear all the words of Sennacherib which he has sent to mock, reproach, insult, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' It is true, Lord, that the kings of Assyria have laid waste all the nations and their lands'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And have cast the gods of those peoples into the fire, for they were not gods but the work of men''s hands, wood and stone. Therefore they have destroyed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now therefore, O Lord our God, save us from his hand, that all the kingdoms of the earth may know (understand and realize) that You are the Lord, even You only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Isaiah son of Amoz sent to Hezekiah, saying, Thus says the Lord, the God of Israel: Because you have prayed to Me against Sennacherib king of Assyria, [II Kings 19:20-37; II Chron. 32:20-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' This is the word which the Lord has spoken concerning him: The Virgin Daughter of Zion has despised you and laughed you to scorn; the Daughter of Jerusalem has shaken her head behind you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Whom have you mocked and reviled [insulted and blasphemed]? And against Whom have you raised your voice and haughtily lifted your eyes? Against the Holy One of Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' By your servants you have mocked, reproached, insulted, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defied the Lord, and you have said, With my many chariots I have gone up to the height of the mountains, to the inner recesses of Lebanon. I cut down its tallest cedars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' its choicest cypress trees; I came to its remotest height, its most luxuriant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dense forest;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I dug wells and drank foreign waters, and with the sole of my feet I have dried up all the rivers [the Nile streams] of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' [But, says the God of Israel] have you not heard that I purposed to do it long ago, that I planned it in ancient times? Now I have brought it to pass, that you [king of Assyria] should [be My instrument to] lay waste fortified cities, making them ruinous heaps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Therefore their inhabitants had little power, they were dismayed and confounded; they were like the grass of the field and like the green herb, like the grass on the housetops and like a field of grain blasted before it is grown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' is in stalk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But I [the Lord] know your sitting down and your going out and your coming in and your raging against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Because your raging against Me and your arrogance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' careless ease have come to My ears, therefore will I put My hook in your nose and My bridle in your lips, and I will turn you back by the way you came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And [now, Hezekiah, says the Lord] this shall be the sign [of these things] to you: you shall eat this year what grows of itself, and in the second year that which springs from the same. And in the third year sow and reap, and plant vineyards and eat the fruit of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And the remnant that has survived of the house of Judah shall again take root downward and bear fruit upward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For out of Jerusalem will go forth a remnant, and a band that survives out of Mount Zion. The zeal of the Lord of hosts will perform this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Therefore thus says the Lord concerning the king of Assyria: He shall not come into this city or shoot an arrow here or come before it with shield or cast up a siege mound against it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' By the way that he came, by the same way he shall return, and he shall not come into this city, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' For I will defend this city to save it, for My own sake and for the sake of My servant David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And the Angel of the Lord went forth, and slew 185,000 in the camp of the Assyrians; and when [the living] arose early in the morning, behold, all these were dead bodies. [II Kings 19:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' So Sennacherib king of Assyria departed and returned and dwelt at Nineveh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And as he was worshiping in the house of Nisroch his god, Adrammelech and Sharezer his sons killed him with the sword, and they escaped into the land of Armenia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Ararat. And Esarhaddon his son reigned in his stead.'
