document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JACOB went on his way, and God''s angels met him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When Jacob saw them, he said, This is God''s army! So he named that place Mahanaim [two armies]. [Gen. 32:7, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Jacob sent messengers before him to Esau his brother in the land of Seir, the country of Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he commanded them, Say this to my lord Esau: Your servant Jacob says this: I have been living temporarily with Laban and have stayed there till now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I have oxen, donkeys, flocks, menservants, and women servants; and I have sent to tell my lord, that I may find mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness in your sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the messengers returned to Jacob, saying, We came to your brother Esau; and now he is [on the way] to meet you, and four hundred men are with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then Jacob was greatly afraid and distressed; and he divided the people who were with him, and the flocks and herds and camels, into two groups,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Thinking, If Esau comes to the one group and smites it, then the other group which is left will escape.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jacob said, O God of my father Abraham and God of my father Isaac, the Lord Who said to me, Return to your country and to your people and I will do you good,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I am not worthy of the least of all the mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and all the faithfulness which You have shown to Your servant, for with [only] my staff I passed over this Jordan [long ago], and now I have become two companies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Deliver me, I pray You, from the hand of my brother, from the hand of Esau; for I fear him, lest he come and smite [us all], the mothers with the children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And You said, I will surely do you good and make your descendants as the sand of the sea, which cannot be numbered for multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Jacob lodged there that night and took from what he had with him as a present for his brother Esau:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Two hundred she-goats, 20 he-goats, 200 ewes, 20 rams,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Thirty milk camels with their colts, 40 cows, 10 bulls, 20 she-donkeys, and 10 [donkey] colts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he put them into the charge of his servants, every drove by itself, and said to his servants, Pass over before me and put a space between drove and drove.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he commanded the first, When Esau my brother meets you and asks to whom you belong, where you are going, and whose are the animals before you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then you shall say, They are your servant Jacob''s; it is a present sent to my lord Esau; and moreover, he is behind us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And so he commanded the second and the third and all that followed the droves, saying, This is what you are to say to Esau when you meet him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And say, Moreover, your servant Jacob is behind us. For he said, I will appease him with the present that goes before me, and afterward I will see his face; perhaps he will accept me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So the present went on before him, and he himself lodged that night in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But he rose up that [same] night and took his two wives, his two women servants, and his eleven sons and passed over the ford [of the] Jabbok.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he took them and sent them across the brook; also he sent over all that he had.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Jacob was left alone, and a Man wrestled with him until daybreak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when [the Man] saw that He did not prevail against [Jacob], He touched the hollow of his thigh; and Jacob''s thigh was put out of joint as he wrestled with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then He said, Let Me go, for day is breaking. But [Jacob] said, I will not let You go unless You declare a blessing upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [The Man] asked him, What is your name? And [in shock of realization, whispering] he said, Jacob [supplanter, schemer, trickster, swindler]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And He said, Your name shall be called no more Jacob [supplanter], but Israel [contender with God]; for you have contended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have power with God and with men and have prevailed. [Hos. 12:3-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then Jacob asked Him, Tell me, I pray You, what [in contrast] is Your name? But He said, Why is it that you ask My name? And [the Angel of God declared] a blessing on [Jacob] there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Jacob called the name of the place Peniel [the face of God], saying, For I have seen God face to face, and my life is spared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not snatched away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And as he passed Penuel [Peniel], the sun rose upon him, and he was limping because of his thigh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' That is why to this day the Israelites do not eat the sinew of the hip which is on the hollow of the thigh, because [the Angel of the Lord] touched the hollow of Jacob''s thigh on the sinew of the hip.'
