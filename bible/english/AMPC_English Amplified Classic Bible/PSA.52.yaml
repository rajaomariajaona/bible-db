verses:
  '1':
  - type: heading
    content: To the Chief Musician. A skillful song, {or} a didactic {or} reflective poem. +[A Psalm+] of David, when Doeg the Edomite came and told Saul, David has come to the house of Ahimelech.
  - type: text
    content: ' WHY BOAST you of mischief done against the loving-kindness of God [and the godly], O mighty [sinful] man, day after day?'
  '2':
  - type: text
    content: ' Your tongue devises wickedness; it is like a sharp razor, working deceitfully.'
  '3':
  - type: text
    content: ' You love evil more than good, and lying rather than to speak righteousness, justice, '
  - type: text
    content: and
  - type: text
    content: ' right. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' You love all destroying '
  - type: text
    content: and
  - type: text
    content: ' devouring words, O deceitful tongue.'
  '5':
  - type: text
    content: ' God will likewise break you down '
  - type: text
    content: and
  - type: text
    content: ' destroy you forever; He will lay hold of you and pluck you out of your tent and uproot you from the land of the living. Selah [pause, and calmly think of that]!'
  '6':
  - type: text
    content: ' The [uncompromisingly] righteous also shall see [it] and be in reverent fear '
  - type: text
    content: and
  - type: text
    content: ' awe, but about you they will [scoffingly] laugh, saying,'
  '7':
  - type: text
    content: ' See, this is the man who made not God his strength (his stronghold and high tower) but trusted in '
  - type: text
    content: and
  - type: text
    content: ' confidently relied on the abundance of his riches, seeking refuge '
  - type: text
    content: and
  - type: text
    content: ' security for himself through his wickedness.'
  '8':
  - type: text
    content: ' But I am like a green olive tree in the house of God; I trust in '
  - type: text
    content: and
  - type: text
    content: ' confidently rely on the loving-kindness '
  - type: text
    content: and
  - type: text
    content: ' the mercy of God forever and ever.'
  '9':
  - type: text
    content: ' I will thank You '
  - type: text
    content: and
  - type: text
    content: ' confide in You forever, because You have done it [delivered me and kept me safe]. I will wait on, hope in '
  - type: text
    content: and
  - type: text
    content: ' expect in Your name, for it is good, in the presence of Your saints (Your kind and pious ones).'
