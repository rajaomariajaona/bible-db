document_id: PSA.52,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A skillful song, {or} a didactic {or} reflective poem. +[A Psalm+] of David, when Doeg the Edomite came and told Saul, David has come to the house of Ahimelech.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHY BOAST you of mischief done against the loving-kindness of God [and the godly], O mighty [sinful] man, day after day?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Your tongue devises wickedness; it is like a sharp razor, working deceitfully.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You love evil more than good, and lying rather than to speak righteousness, justice, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right. Selah [pause, and calmly think of that]!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You love all destroying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devouring words, O deceitful tongue.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' God will likewise break you down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy you forever; He will lay hold of you and pluck you out of your tent and uproot you from the land of the living. Selah [pause, and calmly think of that]!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The [uncompromisingly] righteous also shall see [it] and be in reverent fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awe, but about you they will [scoffingly] laugh, saying,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' See, this is the man who made not God his strength (his stronghold and high tower) but trusted in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently relied on the abundance of his riches, seeking refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' security for himself through his wickedness.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But I am like a green olive tree in the house of God; I trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently rely on the loving-kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the mercy of God forever and ever.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I will thank You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confide in You forever, because You have done it [delivered me and kept me safe]. I will wait on, hope in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expect in Your name, for it is good, in the presence of Your saints (Your kind and pious ones).'
