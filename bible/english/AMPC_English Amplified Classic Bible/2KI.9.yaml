document_id: 2KI.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND ELISHA the prophet called one of the sons of the prophets and said to him, Gird up your loins, take this flask of oil in your hand, and go to Ramoth-gilead.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the dogs shall eat Jezebel in the portion of Jezreel, and none shall bury her. And he opened the door and fled. [Fulfilled in II Kings 9:33-37.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jehu came out to the servants of his master, one said to him, Is all well? Why did this mad fellow come to you? And he said to them, You know that class of man and what he would say.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they said, That is false; tell us now. And he said, Thus and thus he spoke to me, saying, Thus says the Lord: I have anointed you king over Israel.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they hastily took every man his garment and put it [for a cushion] under Jehu on the top of the [outside] stairs, and blew with trumpets, saying, Jehu is king!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Jehu son of Jehoshaphat, the son of Nimshi, conspired against Joram [to dethrone and slay him]. Now Joram was holding Ramoth-gilead, he and all Israel, against Hazael king of Syria,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But King Joram had returned to be healed in Jezreel of the wounds which the Syrians had given him when he fought with Hazael king of Syria. And Jehu said, If this is your mind, let no one make his escape from the city [Ramoth-gilead] to go and tell it in Jezreel [the capital].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Jehu rode in a chariot and went to Jezreel, for Joram lay there. And Ahaziah king of Judah had come down to see Joram.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A watchman on the tower in Jezreel spied the company of Jehu as he came, and said, I see a company. And Joram said, Send a horseman to meet them and have him ask, Do you come in peace?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So one on horseback went to meet him and said, Thus says the king: Is it peace? And Jehu said, What have you to do with peace? Rein in behind me. And the watchman reported, The messenger came to them, but he does not return.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Joram sent out a second man on horseback, who came to them and said, Thus says the king: Is it peace? Jehu replied, What have you to do with peace? Ride behind me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When you arrive, look there for Jehu son of Jehoshaphat son of Nimshi; and go in and have him arise from among his brethren and lead him to an inner chamber.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the watchman reported, He came to them, but does not return; also the driving is like the driving of Jehu son of Nimshi, for he drives furiously.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joram said, Make ready. When his chariot was made ready, Joram king of Israel and Ahaziah king of Judah went out, each in his chariot. Thus they went out to meet Jehu and met him in the field of Naboth the Jezreelite.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Joram saw Jehu, he said, Is it peace, Jehu? And he answered, How can peace exist as long as the fornications of your mother Jezebel and her witchcrafts are so many?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Joram reined about and fled, and he said to Ahaziah, Treachery, Ahaziah!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jehu drew his bow with his full strength and shot Joram between his shoulders; and the arrow went out through his heart, and he sank down in his chariot.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then said Jehu to Bidkar his captain, Take [Joram] up and cast him in the plot of Naboth the Jezreelite''s field; for remember how, when I and you rode together after Ahab his father, the Lord uttered this prophecy against him:'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As surely as I saw yesterday the blood of Naboth and the blood of his sons, says the Lord, I will repay you on this plot of ground, says the Lord. Now therefore, take and cast Joram into the plot of ground [of Naboth], as the word of the Lord said. [I Kings 21:15-29.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Ahaziah king of Judah saw this, he fled by the way of the garden house. Jehu followed him and said, Smite him also in the chariot. And they did so at the ascent to Gur, which is by Ibleam. And [Ahaziah] fled to Megiddo and died there.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His servants took him in a chariot to Jerusalem, and buried him in his sepulcher with his fathers in the City of David.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the eleventh year of Joram son of Ahab, Ahaziah''s reign over Judah began.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then take the cruse of oil and pour it on his head and say, Thus says the Lord: I have anointed you king over Israel. Then open the door and flee; do not tarry.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now when Jehu came to Jezreel, Jezebel heard of it, and she painted her eyes and beautified her head and looked out of [an upper] window.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as Jehu entered in at the gate, she said, [Have you come in] peace, you Zimri, who slew his master? [I Kings 16:9, 10.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jehu lifted up his face to the window and said, Who is on my side? Who? And two or three eunuchs looked out at him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said, Throw her down! So they threw her down, and some of her blood splattered on the wall and on the horses, and he drove over her.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When he came in, he ate and drank, and said, See now to this cursed woman and bury her, for she is a king''s daughter.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They went to bury her, but they found nothing left of her except the skull, feet, and palms of her hands.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They came again and told Jehu. He said, This is the word of the Lord which He spoke by His servant Elijah the Tishbite, In the portion of Jezreel shall dogs eat the flesh of Jezebel. [I Kings 21:23.]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The corpse of Jezebel shall be like dung upon the face of the field in the portion of Jezreel, so that they shall not say, This is Jezebel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the young man, the young prophet, went to Ramoth-gilead.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when he came, the captains of the army were sitting outside; and he said, I have a message for you, O captain. Jehu said, To which of us? And he said, To you, O captain.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jehu arose, and they went into the house. And the prophet poured the oil on Jehu''s head and said to him, Thus says the Lord, the God of Israel: I have anointed you king over the people of the Lord, even over Israel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall strike down the house of Ahab your master, that I may avenge the blood of My servants the prophets and of all the servants of the Lord [who have died] at the hands of Jezebel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the whole house of Ahab shall perish, and I will cut off from Ahab every male, bond or free, in Israel.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will make the house of Ahab like the house of Jeroboam son of Nebat and like the house of Baasha son of Ahijah. [I Kings 21:22.]'
