document_id: AMO.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THUS SAYS the Lord: For three transgressions of Moab [descendants of Lot] and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: text
    content: or
  - type: text
    content: ' revoke My word concerning it, because he burned the bones of the king of Edom [Esau''s descendant] into lime.'
  '10':
  - type: text
    content: ' Also I brought you up out of the land of Egypt and led you forty years through the wilderness to possess the land of the Amorite.'
  '11':
  - type: text
    content: ' And I raised up some of your sons for prophets and some of your young men for dedicated ones [Nazirites]. Is this not true, O you children of Israel? says the Lord. [Num. 6:1-8.]'
  '12':
  - type: text
    content: ' But you gave the dedicated ones [the Nazirites] wine to drink and commanded the prophets, saying, Prophesy not.'
  '13':
  - type: text
    content: ' Behold, I am pressed under you '
  - type: text
    content: and
  - type: text
    content: ' I will press you down in your place as a cart presses that is full of sheaves.'
  '14':
  - type: text
    content: ' And flight shall be lost to the swift '
  - type: text
    content: and
  - type: text
    content: ' refuge shall fail him; the strong shall not retain '
  - type: text
    content: and
  - type: text
    content: ' confirm his strength, neither shall the mighty deliver himself.'
  '15':
  - type: text
    content: ' Neither shall he stand who handles the bow, and he who is swift of foot shall not deliver himself; neither shall he who rides the horse deliver his life.'
  '16':
  - type: text
    content: ' And he who is courageous among the mighty shall flee away naked on that day, says the Lord.'
  '2':
  - type: text
    content: ' So I will send a fire upon Moab and it shall devour the strongholds of Kerioth, and Moab shall die amid uproar, shouting, and the sound of the trumpet.'
  '3':
  - type: text
    content: ' And I will cut off the ruler from its midst and will slay all its princes with him, says the Lord.'
  '4':
  - type: text
    content: ' Thus says the Lord: For three transgressions of Judah and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: text
    content: or
  - type: text
    content: ' revoke My word concerning it, because they have despised '
  - type: text
    content: and
  - type: text
    content: ' rejected the law of the Lord and have not kept His commandments, but their lies, after which their fathers have walked, caused them to err '
  - type: text
    content: and
  - type: text
    content: ' go astray.'
  '5':
  - type: text
    content: ' So I will send a fire upon Judah and it shall devour the strongholds of Jerusalem.'
  '6':
  - type: text
    content: ' Thus says the Lord: For three transgressions of Israel and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: text
    content: or
  - type: text
    content: ' revoke My word concerning it, because they have sold the [strictly] just '
  - type: text
    content: and
  - type: text
    content: ' uncompromisingly righteous for silver and the needy for a pair of sandals;'
  '7':
  - type: text
    content: ' They pant after [the sight of] the poor [reduced to such misery that they will be throwing] dust of the earth on their heads [in token of their grief]; they defraud '
  - type: text
    content: and
  - type: text
    content: ' turn aside the humble [who are too meek to defend themselves]; and a man and his father will have sexual relations with the same maiden, so that My holy name is profaned.'
  '8':
  - type: text
    content: ' And they lay themselves down beside every [pagan] altar upon clothes they have taken in pledge [for indebtedness], and in the house of their God [in daring contempt of Him] they frivolously drink the wine which has been exacted from those [unjustly] fined.'
  '9':
  - type: text
    content: ' Yet I destroyed the Amorite before them, whose height was like the height of the cedars and he was strong as the oaks; yet I destroyed his fruit from above and his roots from beneath.'
