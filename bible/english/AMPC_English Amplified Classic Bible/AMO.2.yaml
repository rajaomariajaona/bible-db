document_id: AMO.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord: For three transgressions of Moab [descendants of Lot] and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' revoke My word concerning it, because he burned the bones of the king of Edom [Esau''s descendant] into lime.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So I will send a fire upon Moab and it shall devour the strongholds of Kerioth, and Moab shall die amid uproar, shouting, and the sound of the trumpet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I will cut off the ruler from its midst and will slay all its princes with him, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Thus says the Lord: For three transgressions of Judah and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' revoke My word concerning it, because they have despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected the law of the Lord and have not kept His commandments, but their lies, after which their fathers have walked, caused them to err '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go astray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So I will send a fire upon Judah and it shall devour the strongholds of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Thus says the Lord: For three transgressions of Israel and for four [for multiplied delinquencies], I will not reverse the punishment of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' revoke My word concerning it, because they have sold the [strictly] just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncompromisingly righteous for silver and the needy for a pair of sandals;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They pant after [the sight of] the poor [reduced to such misery that they will be throwing] dust of the earth on their heads [in token of their grief]; they defraud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn aside the humble [who are too meek to defend themselves]; and a man and his father will have sexual relations with the same maiden, so that My holy name is profaned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they lay themselves down beside every [pagan] altar upon clothes they have taken in pledge [for indebtedness], and in the house of their God [in daring contempt of Him] they frivolously drink the wine which has been exacted from those [unjustly] fined.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Yet I destroyed the Amorite before them, whose height was like the height of the cedars and he was strong as the oaks; yet I destroyed his fruit from above and his roots from beneath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Also I brought you up out of the land of Egypt and led you forty years through the wilderness to possess the land of the Amorite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And I raised up some of your sons for prophets and some of your young men for dedicated ones [Nazirites]. Is this not true, O you children of Israel? says the Lord. [Num. 6:1-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But you gave the dedicated ones [the Nazirites] wine to drink and commanded the prophets, saying, Prophesy not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, I am pressed under you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will press you down in your place as a cart presses that is full of sheaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And flight shall be lost to the swift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuge shall fail him; the strong shall not retain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirm his strength, neither shall the mighty deliver himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Neither shall he stand who handles the bow, and he who is swift of foot shall not deliver himself; neither shall he who rides the horse deliver his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he who is courageous among the mighty shall flee away naked on that day, says the Lord.'
