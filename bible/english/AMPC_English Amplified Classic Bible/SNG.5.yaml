document_id: SNG.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I HAVE come into my garden, my sister, my [promised] bride; I have gathered my myrrh with my balsam '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spice [from your sweet words I have gathered the richest perfumes and spices]. I have eaten my honeycomb with my honey; I have drunk my wine with my milk. Eat, O friends [feast on, O revelers of the palace; you can never make my lover disloyal to me]! Drink, yes, drink abundantly of love, O precious one [for now I know you are mine, irrevocably mine! With his confident words still thrilling her heart, through the lattice she saw her shepherd turn away and disappear into the night]. [John 16:33.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [She said] My beloved is fair and ruddy, the chief among ten thousand! [Ps. 45:2; John 1:14.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' His head is [as precious as] the finest gold; his locks are curly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bushy and black as a raven.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' His eyes are like doves beside the water brooks, bathed in milk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fitly set.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' His cheeks are like a bed of spices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' balsam, like banks of sweet herbs yielding fragrance. His lips are like bloodred anemones or lilies distilling liquid [sweet-scented] myrrh.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' His hands are like rods of gold set with [nails of] beryl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' topaz. His body is a figure of bright ivory overlaid with [veins of] sapphires.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' His legs are like strong and steady pillars of marble set upon bases of fine gold. His appearance is like Lebanon, excellent, stately, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majestic as the cedars.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' His voice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' speech are exceedingly sweet; yes, he is altogether lovely [the whole of him delights and is precious]. This is my beloved, and this is my friend, O daughters of Jerusalem! [Ps. 92:15; Col. 1:15.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I went to sleep, but my heart stayed awake. [I dreamed that I heard] the voice of my beloved as he knocked [at the door of my mother''s cottage]. Open to me, my sister, my love, my dove, my spotless one [he said], for I am wet with the [heavy] night dew; my hair is covered with it. [Job 11:13-15.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' [But weary from a day in the vineyards, I had already sought my rest] I had put off my garment–how could I [again] put it on? I had washed my feet–how could I [again] soil them? [Isa. 32:9; Heb. 3:15.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' My beloved put in his hand by the hole of the door, and my heart was moved for him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I rose up to open for my beloved, and my hands dripped with myrrh, and my fingers with liquid [sweet-scented] myrrh, [which he had left] upon the handles of the bolt.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I opened for my beloved, but my beloved had turned away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withdrawn himself, and was gone! My soul went forth [to him] when he spoke, but it failed me [and now he was gone]! I sought him, but I could not find him; I called him, but he gave me no answer.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The watchmen who go about the city found me. They struck me, they wounded me; the keepers of the walls took my veil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my mantle from me.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I charge you, O daughters of Jerusalem, if you find my beloved, that you tell him that I am sick from love [simply sick to be with him]. [Ps. 63:1.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' What is your beloved more than another beloved, O you fairest among women [taunted the ladies]? What is your beloved more than another beloved, that you should give us such a charge? [John 10:26.]'
