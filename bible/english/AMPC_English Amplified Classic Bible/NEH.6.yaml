document_id: NEH.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW WHEN Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies heard that I had built the wall and that there was no breach left in it, although at that time I had not set up the doors in the gates,'
  '10':
  - type: text
    content: ' I went into the house of Shemaiah son of Delaiah, the son of Mehetabel, who was shut up. He said, Let us meet together in the house of God, within the temple, and let us shut the doors of the temple, for they are coming to kill you–at night they are coming to kill you.'
  '11':
  - type: text
    content: ' But I said, Should such a man as I flee? And what man such as I could go into the temple [where only the priests are allowed to go] and yet live? I will not go in.'
  '12':
  - type: text
    content: ' And behold, I saw that God had not sent him, but he made this prophecy against me because Tobiah and Sanballat had hired him.'
  '13':
  - type: text
    content: ' He was hired that I should be made afraid and do as he said and sin, that they might have matter for an evil report with which to taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach me.'
  '14':
  - type: text
    content: ' My God, think on Tobiah and Sanballat according to these their works, and on the prophetess Noadiah and the rest of the prophets who would have put me in fear.'
  '15':
  - type: text
    content: ' So the wall was finished on the twenty-fifth day of the month Elul, in fifty-two days.'
  '16':
  - type: text
    content: ' When all our enemies heard of it, all the nations around us feared and fell far in their own esteem, for they saw that this work was done by our God.'
  '17':
  - type: text
    content: ' Moreover, in those days the nobles of Judah sent many letters to Tobiah, and Tobiah''s letters came to them.'
  '18':
  - type: text
    content: ' For many in Judah were bound by oath to him, because he was the son-in-law of Shecaniah son of Arah, and his son Jehohanan had married the daughter of Meshullam son of Berechiah.'
  '19':
  - type: text
    content: ' Also they spoke of [Tobiah''s] good deeds before me and told him what I said. And Tobiah sent letters to frighten me.'
  '2':
  - type: text
    content: ' Sanballat and Geshem sent to me, saying, Come, let us meet together in one of the villages in the plain of Ono. But they intended to do me harm.'
  '3':
  - type: text
    content: ' And I sent messengers to them, saying, I am doing a great work and cannot come down. Why should the work stop while I leave to come down to you?'
  '4':
  - type: text
    content: ' They sent to me four times this way, and I answered them as before.'
  '5':
  - type: text
    content: ' Then Sanballat sent his servant to me again the fifth time with an open letter.'
  '6':
  - type: text
    content: ' In it was written: It is reported among the neighboring nations, and Gashmu says it, that you and the Jews plan to rebel; therefore you are building the wall, that you may be their king, according to the report.'
  '7':
  - type: text
    content: ' Also you have set up prophets to announce concerning you in Jerusalem, There is a king in Judah. And now this will be reported to the [Persian] king. So, come now and let us take counsel together.'
  '8':
  - type: text
    content: ' I replied to him, No such things as you say have been done; you are inventing them out of your own heart '
  - type: text
    content: and
  - type: text
    content: ' mind.'
  '9':
  - type: text
    content: ' For they all wanted to frighten us, thinking, Their hands will be so weak that the work will not be done. But now strengthen my hands!'
