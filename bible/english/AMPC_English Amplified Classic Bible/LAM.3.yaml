document_id: LAM.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I AM [Jeremiah] the man who has seen affliction under the rod of His wrath.'
  '10':
  - type: text
    content: ' He is to me like a bear lying in wait, and like a lion [hiding] in secret places.'
  '11':
  - type: text
    content: ' He has turned me off my ways and pulled me in pieces; He has made me desolate.'
  '12':
  - type: text
    content: ' He has bent His bow and set me as a mark for the arrow.'
  '13':
  - type: text
    content: ' He has caused the arrows of His quiver to enter into my heart [the seat of my affections and desires].'
  '14':
  - type: text
    content: ' I have become a derision to all my people, and [the subject of] their singsong all the day.'
  '15':
  - type: text
    content: ' He has filled me with bitterness; He has made me drink to excess '
  - type: text
    content: and
  - type: text
    content: ' until drunken with wormwood [bitterness].'
  '16':
  - type: text
    content: ' He has also broken my teeth with gravel (stones); He has covered me with ashes.'
  '17':
  - type: text
    content: ' And You have bereaved my soul '
  - type: text
    content: and
  - type: text
    content: ' cast it off far from peace; I have forgotten what good '
  - type: text
    content: and
  - type: text
    content: ' happiness '
  - type: text
    content: are.
  '18':
  - type: text
    content: ' And I say, Perished is my strength and my expectation from the Lord.'
  '19':
  - type: text
    content: ' [O Lord] remember [earnestly] my affliction and my misery, my wandering '
  - type: text
    content: and
  - type: text
    content: ' my outcast state, the wormwood and the gall.'
  '2':
  - type: text
    content: ' He has led me and brought me into darkness and not light.'
  '20':
  - type: text
    content: ' My soul has them continually in remembrance and is bowed down within me.'
  '21':
  - type: text
    content: ' But this I recall and therefore have I hope '
  - type: text
    content: and
  - type: text
    content: ' expectation:'
  '22':
  - type: text
    content: ' It is because of the Lord''s mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness that we are not consumed, because His [tender] compassions fail not. [Mal. 3:6.]'
  '23':
  - type: text
    content: ' They are new every morning; great '
  - type: text
    content: and
  - type: text
    content: ' abundant is Your stability '
  - type: text
    content: and
  - type: text
    content: ' faithfulness. [Isa. 33:2.]'
  '24':
  - type: text
    content: ' The Lord is my portion '
  - type: text
    content: or
  - type: text
    content: ' share, says my living being (my inner self); therefore will I hope in Him '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him. [Num. 18:20.]'
  '25':
  - type: text
    content: ' The Lord is good to those who wait hopefully '
  - type: text
    content: and
  - type: text
    content: ' expectantly for Him, to those who seek Him [inquire of and for Him and require Him by right of necessity and on the authority of God''s word].'
  '26':
  - type: text
    content: ' It is good that one should hope in '
  - type: text
    content: and
  - type: text
    content: ' wait quietly for the salvation (the safety and ease) of the Lord.'
  '27':
  - type: text
    content: ' It is good for a man that he should bear the yoke [of divine disciplinary dealings] in his youth.'
  '28':
  - type: text
    content: ' Let him sit alone uncomplaining '
  - type: text
    content: and
  - type: text
    content: ' keeping silent [in hope], because [God] has laid [the yoke] upon him [for his benefit]. [Rom. 8:28.]'
  '29':
  - type: text
    content: ' Let him put his mouth in the dust [in abject recognition of his unworthiness]–there may yet be hope. [Mic. 7:17.]'
  '3':
  - type: text
    content: ' Surely He has turned away from me; His hand is against me all the day.'
  '30':
  - type: text
    content: ' Let him give his cheek to the One Who smites him [even through His human agents]; let him be filled [full] with [men''s] reproach [in meekness].'
  '31':
  - type: text
    content: ' For the Lord will not cast off forever! [Ps. 94:14.]'
  '32':
  - type: text
    content: ' But though He causes grief, yet will He be moved to compassion according to the multitude of His loving-kindness '
  - type: text
    content: and
  - type: text
    content: ' tender mercy.'
  '33':
  - type: text
    content: ' For He does not willingly '
  - type: text
    content: and
  - type: text
    content: ' from His heart afflict or grieve the children of men. [Ezek. 18:23, 32; Hos. 11:8; Heb. 12:5-10; II Pet. 3:9.]'
  '34':
  - type: text
    content: ' To trample '
  - type: text
    content: and
  - type: text
    content: ' crush underfoot all the prisoners of the earth,'
  '35':
  - type: text
    content: ' To turn aside '
  - type: text
    content: and
  - type: text
    content: ' deprive a man of his rights before the face of the Most High '
  - type: text
    content: or
  - type: text
    content: ' a superior [acting as God''s representative],'
  '36':
  - type: text
    content: ' To subvert a man in his cause–[of these things] the Lord does not approve.'
  '37':
  - type: text
    content: ' Who is he who speaks and it comes to pass, if the Lord has not authorized '
  - type: text
    content: and
  - type: text
    content: ' commanded it?'
  '38':
  - type: text
    content: ' Is it not out of the mouth of the Most High that evil and good both proceed [adversity and prosperity, physical evil or misfortune and physical good or happiness]?'
  '39':
  - type: text
    content: ' Why does a living man sigh [one who is still in this life''s school of discipline]? [And why does] a man complain for the punishment of his sins?'
  '4':
  - type: text
    content: ' My flesh and my skin has He worn out '
  - type: text
    content: and
  - type: text
    content: ' made old; He has shattered my bones.'
  '40':
  - type: text
    content: ' Let us test and examine our ways, and let us return to the Lord!'
  '41':
  - type: text
    content: ' Let us lift up our hearts and our hands [and then with them mount up in prayer] to God in heaven:'
  '42':
  - type: text
    content: ' We have transgressed and rebelled and You have not pardoned.'
  '43':
  - type: text
    content: ' You have covered Yourself with wrath and pursued '
  - type: text
    content: and
  - type: text
    content: ' afflicted us; You have slain without pity.'
  '44':
  - type: text
    content: ' You have covered Yourself with a cloud so that no prayer can pass through.'
  '45':
  - type: text
    content: ' You have made us offscouring and refuse among the nations.'
  '46':
  - type: text
    content: ' All our enemies have gaped at us '
  - type: text
    content: and
  - type: text
    content: ' railed against us.'
  '47':
  - type: text
    content: ' Fear and pitfall have come upon us, devastation and destruction.'
  '48':
  - type: text
    content: ' My eyes overflow with streams of tears because of the destruction of the daughter of my people.'
  '49':
  - type: text
    content: ' My eyes overflow continually and will not cease'
  '5':
  - type: text
    content: ' He has built up [siege mounds] against me and surrounded me with bitterness, tribulation, '
  - type: text
    content: and
  - type: text
    content: ' anguish.'
  '50':
  - type: text
    content: ' Until the Lord looks down and sees from heaven.'
  '51':
  - type: text
    content: ' My eyes cause me grief at the fate of all the maidens [and the daughter-towns] of my city [Jerusalem].'
  '52':
  - type: text
    content: ' I have been hunted down like a bird by those who were my enemies without cause.'
  '53':
  - type: text
    content: ' They [thought they had] destroyed my life in the dungeon (pit) and cast a stone [over it] above me. [Jer. 38.]'
  '54':
  - type: text
    content: ' The waters ran down on my head; I said, I am gone.'
  '55':
  - type: text
    content: ' I called upon Your name, O Lord, out of the depths [of the mire] of the dungeon. [Jer. 38:6.]'
  '56':
  - type: text
    content: ' You heard my voice [then]: [Oh] hide not Your ear [now] at my prayer for relief.'
  '57':
  - type: text
    content: ' You drew near on the day I called to You; You said, Fear not. [James 4:8.]'
  '58':
  - type: text
    content: ' O Lord, You have pleaded the causes of my soul [You have managed my affairs and You have protected my person and my rights]; You have rescued '
  - type: text
    content: and
  - type: text
    content: ' redeemed my life!'
  '59':
  - type: text
    content: ' O Lord, You have seen my wrong [done to me]; judge '
  - type: text
    content: and
  - type: text
    content: ' maintain my cause.'
  '6':
  - type: text
    content: ' He has caused me to dwell in dark places like those long dead.'
  '60':
  - type: text
    content: ' You have seen all their vengeance, all their devices against me.'
  '61':
  - type: text
    content: ' You have heard their reproach '
  - type: text
    content: and
  - type: text
    content: ' revilings, O Lord, and all their devices against me–'
  '62':
  - type: text
    content: ' The lips '
  - type: text
    content: and
  - type: text
    content: ' thoughts of my assailants are against me all day long.'
  '63':
  - type: text
    content: ' Look at their sitting down and their rising up [their movements, doings, and secret counsels]; I am their singsong [the subject of their derision and merriment]. [Ps. 139:2; Isa. 37:28.]'
  '64':
  - type: text
    content: ' Render to them a recompense, O Lord, according to the work of their hands.'
  '65':
  - type: text
    content: ' You will give them hardness '
  - type: text
    content: and
  - type: text
    content: ' blindness of heart; Your curse will be upon them.'
  '66':
  - type: text
    content: ' You will pursue '
  - type: text
    content: and
  - type: text
    content: ' afflict them in anger and destroy them from under Your heavens, O Lord.'
  '7':
  - type: text
    content: ' He walled me in so that I cannot get out; He has weighted down my chain.'
  '8':
  - type: text
    content: ' Even when I cry and shout for help, He shuts out my prayer.'
  '9':
  - type: text
    content: ' He has enclosed my ways with hewn stone; He has made my paths crooked.'
