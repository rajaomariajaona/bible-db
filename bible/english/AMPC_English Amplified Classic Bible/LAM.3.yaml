document_id: LAM.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I AM [Jeremiah] the man who has seen affliction under the rod of His wrath.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He is to me like a bear lying in wait, and like a lion [hiding] in secret places.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' He has turned me off my ways and pulled me in pieces; He has made me desolate.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' He has bent His bow and set me as a mark for the arrow.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He has caused the arrows of His quiver to enter into my heart [the seat of my affections and desires].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I have become a derision to all my people, and [the subject of] their singsong all the day.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He has filled me with bitterness; He has made me drink to excess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' until drunken with wormwood [bitterness].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He has also broken my teeth with gravel (stones); He has covered me with ashes.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And You have bereaved my soul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast it off far from peace; I have forgotten what good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happiness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And I say, Perished is my strength and my expectation from the Lord.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' [O Lord] remember [earnestly] my affliction and my misery, my wandering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my outcast state, the wormwood and the gall.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He has led me and brought me into darkness and not light.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' My soul has them continually in remembrance and is bowed down within me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But this I recall and therefore have I hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectation:'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' It is because of the Lord''s mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness that we are not consumed, because His [tender] compassions fail not. [Mal. 3:6.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' They are new every morning; great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abundant is Your stability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness. [Isa. 33:2.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The Lord is my portion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' share, says my living being (my inner self); therefore will I hope in Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait expectantly for Him. [Num. 18:20.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The Lord is good to those who wait hopefully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectantly for Him, to those who seek Him [inquire of and for Him and require Him by right of necessity and on the authority of God''s word].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' It is good that one should hope in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait quietly for the salvation (the safety and ease) of the Lord.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' It is good for a man that he should bear the yoke [of divine disciplinary dealings] in his youth.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Let him sit alone uncomplaining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeping silent [in hope], because [God] has laid [the yoke] upon him [for his benefit]. [Rom. 8:28.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Let him put his mouth in the dust [in abject recognition of his unworthiness]–there may yet be hope. [Mic. 7:17.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Surely He has turned away from me; His hand is against me all the day.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Let him give his cheek to the One Who smites him [even through His human agents]; let him be filled [full] with [men''s] reproach [in meekness].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For the Lord will not cast off forever! [Ps. 94:14.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' But though He causes grief, yet will He be moved to compassion according to the multitude of His loving-kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tender mercy.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' For He does not willingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from His heart afflict or grieve the children of men. [Ezek. 18:23, 32; Hos. 11:8; Heb. 12:5-10; II Pet. 3:9.]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' To trample '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crush underfoot all the prisoners of the earth,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' To turn aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deprive a man of his rights before the face of the Most High '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a superior [acting as God''s representative],'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' To subvert a man in his cause–[of these things] the Lord does not approve.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Who is he who speaks and it comes to pass, if the Lord has not authorized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commanded it?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Is it not out of the mouth of the Most High that evil and good both proceed [adversity and prosperity, physical evil or misfortune and physical good or happiness]?'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Why does a living man sigh [one who is still in this life''s school of discipline]? [And why does] a man complain for the punishment of his sins?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' My flesh and my skin has He worn out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made old; He has shattered my bones.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Let us test and examine our ways, and let us return to the Lord!'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Let us lift up our hearts and our hands [and then with them mount up in prayer] to God in heaven:'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' We have transgressed and rebelled and You have not pardoned.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' You have covered Yourself with wrath and pursued '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicted us; You have slain without pity.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' You have covered Yourself with a cloud so that no prayer can pass through.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' You have made us offscouring and refuse among the nations.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' All our enemies have gaped at us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' railed against us.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' Fear and pitfall have come upon us, devastation and destruction.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' My eyes overflow with streams of tears because of the destruction of the daughter of my people.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' My eyes overflow continually and will not cease'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' He has built up [siege mounds] against me and surrounded me with bitterness, tribulation, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' Until the Lord looks down and sees from heaven.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' My eyes cause me grief at the fate of all the maidens [and the daughter-towns] of my city [Jerusalem].'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' I have been hunted down like a bird by those who were my enemies without cause.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' They [thought they had] destroyed my life in the dungeon (pit) and cast a stone [over it] above me. [Jer. 38.]'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' The waters ran down on my head; I said, I am gone.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' I called upon Your name, O Lord, out of the depths [of the mire] of the dungeon. [Jer. 38:6.]'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' You heard my voice [then]: [Oh] hide not Your ear [now] at my prayer for relief.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' You drew near on the day I called to You; You said, Fear not. [James 4:8.]'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' O Lord, You have pleaded the causes of my soul [You have managed my affairs and You have protected my person and my rights]; You have rescued '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' redeemed my life!'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' O Lord, You have seen my wrong [done to me]; judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintain my cause.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He has caused me to dwell in dark places like those long dead.'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' You have seen all their vengeance, all their devices against me.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' You have heard their reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revilings, O Lord, and all their devices against me–'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' The lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughts of my assailants are against me all day long.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' Look at their sitting down and their rising up [their movements, doings, and secret counsels]; I am their singsong [the subject of their derision and merriment]. [Ps. 139:2; Isa. 37:28.]'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' Render to them a recompense, O Lord, according to the work of their hands.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' You will give them hardness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blindness of heart; Your curse will be upon them.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' You will pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflict them in anger and destroy them from under Your heavens, O Lord.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He walled me in so that I cannot get out; He has weighted down my chain.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Even when I cry and shout for help, He shuts out my prayer.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He has enclosed my ways with hewn stone; He has made my paths crooked.'
