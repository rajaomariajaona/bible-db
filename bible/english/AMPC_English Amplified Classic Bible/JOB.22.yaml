document_id: JOB.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ELIPHAZ the Temanite answered [Job],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Can a man be profitable to God? Surely he that is wise is profitable to himself. [Ps. 16:2; Luke 17:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Is it any pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' advantage to the Almighty that you are righteous (upright and in right standing with Him)? Or is it gain to Him that you make your ways perfect? [Isa. 62:3; Zech. 2:8; Mal. 3:17; Acts 20:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Is it for your [reverential] fear of Him that He [thus] reproves you, that He enters with you into judgment?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Is not your wickedness great? There is no end to your iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For you have taken pledges of your brother for nothing, and stripped the naked of their clothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You have not given water to the weary to drink, and you have withheld bread from the hungry. [Matt. 25:42.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But [you, Job] the man with power possessed the land, and the favored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepted man dwelt in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You have sent widows away empty-handed, and the arms of the fatherless have been broken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore snares are round about you, and sudden fear troubles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overwhelms you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Your light is darkened, so that you cannot see, and a flood of water covers you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Is not God in the height of heaven? And behold the height of the stars, how high they are!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Therefore you say, How '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what does God know [about me]? Can He judge through the thick darkness?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Thick clouds are a covering to Him, so that He does not see, and He walks on the vault of the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Will you pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep to the old way that wicked men trod [in Noah''s time], [II Pet. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Men who were snatched away before their time, whose foundations were poured out like a stream [during the flood]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They said to God, Depart from us, and, What can the Almighty do for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Yet He filled their houses with good [things]. But the counsel of the ungodly is far from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The righteous see it and are glad; and the innocent laugh them to scorn [saying],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Surely those who rose up against us are cut off, and that which remained to them the fire has consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Acquaint now yourself with Him [agree with God and show yourself to be conformed to His will] and be at peace; by that [you shall prosper and great] good shall come to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Receive, I pray you, the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction from His mouth and lay up His words in your heart. [Ps. 119:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' If you return to the Almighty [and submit and humble yourself before Him], you will be built up; if you put away unrighteousness far from your tents,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' If you lay gold in the dust, and the gold of Ophir among the stones of the brook [considering them of little worth],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And make the Almighty your gold and [the Lord] your precious silver treasure,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then you will have delight in the Almighty, and you will lift up your face to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' You will make your prayer to Him, and He will hear you, and you will pay your vows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' You shall also decide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decree a thing, and it shall be established for you; and the light [of God''s favor] shall shine upon your ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When they make [you] low, you will say, [There is] a lifting up; and the humble person He lifts up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' He will even deliver the one [for whom you intercede] who is not innocent; yes, he will be delivered through the cleanness of your hands. [Job 42:7, 8.]'
