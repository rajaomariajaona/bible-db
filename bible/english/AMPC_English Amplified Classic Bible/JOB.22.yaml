document_id: JOB.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN ELIPHAZ the Temanite answered [Job],'
  '10':
  - type: text
    content: ' Therefore snares are round about you, and sudden fear troubles '
  - type: text
    content: and
  - type: text
    content: ' overwhelms you;'
  '11':
  - type: text
    content: ' Your light is darkened, so that you cannot see, and a flood of water covers you.'
  '12':
  - type: text
    content: ' Is not God in the height of heaven? And behold the height of the stars, how high they are!'
  '13':
  - type: text
    content: ' Therefore you say, How '
  - type: text
    content: and
  - type: text
    content: ' what does God know [about me]? Can He judge through the thick darkness?'
  '14':
  - type: text
    content: ' Thick clouds are a covering to Him, so that He does not see, and He walks on the vault of the heavens.'
  '15':
  - type: text
    content: ' Will you pay attention '
  - type: text
    content: and
  - type: text
    content: ' keep to the old way that wicked men trod [in Noah''s time], [II Pet. 2:5.]'
  '16':
  - type: text
    content: ' Men who were snatched away before their time, whose foundations were poured out like a stream [during the flood]?'
  '17':
  - type: text
    content: ' They said to God, Depart from us, and, What can the Almighty do for '
  - type: text
    content: or
  - type: text
    content: ' to us?'
  '18':
  - type: text
    content: ' Yet He filled their houses with good [things]. But the counsel of the ungodly is far from me.'
  '19':
  - type: text
    content: ' The righteous see it and are glad; and the innocent laugh them to scorn [saying],'
  '2':
  - type: text
    content: ' Can a man be profitable to God? Surely he that is wise is profitable to himself. [Ps. 16:2; Luke 17:10.]'
  '20':
  - type: text
    content: ' Surely those who rose up against us are cut off, and that which remained to them the fire has consumed.'
  '21':
  - type: text
    content: ' Acquaint now yourself with Him [agree with God and show yourself to be conformed to His will] and be at peace; by that [you shall prosper and great] good shall come to you.'
  '22':
  - type: text
    content: ' Receive, I pray you, the law '
  - type: text
    content: and
  - type: text
    content: ' instruction from His mouth and lay up His words in your heart. [Ps. 119:11.]'
  '23':
  - type: text
    content: ' If you return to the Almighty [and submit and humble yourself before Him], you will be built up; if you put away unrighteousness far from your tents,'
  '24':
  - type: text
    content: ' If you lay gold in the dust, and the gold of Ophir among the stones of the brook [considering them of little worth],'
  '25':
  - type: text
    content: ' And make the Almighty your gold and [the Lord] your precious silver treasure,'
  '26':
  - type: text
    content: ' Then you will have delight in the Almighty, and you will lift up your face to God.'
  '27':
  - type: text
    content: ' You will make your prayer to Him, and He will hear you, and you will pay your vows.'
  '28':
  - type: text
    content: ' You shall also decide '
  - type: text
    content: and
  - type: text
    content: ' decree a thing, and it shall be established for you; and the light [of God''s favor] shall shine upon your ways.'
  '29':
  - type: text
    content: ' When they make [you] low, you will say, [There is] a lifting up; and the humble person He lifts up '
  - type: text
    content: and
  - type: text
    content: ' saves.'
  '3':
  - type: text
    content: ' Is it any pleasure '
  - type: text
    content: or
  - type: text
    content: ' advantage to the Almighty that you are righteous (upright and in right standing with Him)? Or is it gain to Him that you make your ways perfect? [Isa. 62:3; Zech. 2:8; Mal. 3:17; Acts 20:28.]'
  '30':
  - type: text
    content: ' He will even deliver the one [for whom you intercede] who is not innocent; yes, he will be delivered through the cleanness of your hands. [Job 42:7, 8.]'
  '4':
  - type: text
    content: ' Is it for your [reverential] fear of Him that He [thus] reproves you, that He enters with you into judgment?'
  '5':
  - type: text
    content: ' Is not your wickedness great? There is no end to your iniquities.'
  '6':
  - type: text
    content: ' For you have taken pledges of your brother for nothing, and stripped the naked of their clothing.'
  '7':
  - type: text
    content: ' You have not given water to the weary to drink, and you have withheld bread from the hungry. [Matt. 25:42.]'
  '8':
  - type: text
    content: ' But [you, Job] the man with power possessed the land, and the favored '
  - type: text
    content: and
  - type: text
    content: ' accepted man dwelt in it.'
  '9':
  - type: text
    content: ' You have sent widows away empty-handed, and the arms of the fatherless have been broken.'
