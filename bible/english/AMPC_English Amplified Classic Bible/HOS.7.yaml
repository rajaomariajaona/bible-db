verses:
  '1':
  - type: text
    content: ' WHEN I would heal Israel, then Ephraim''s guilt is uncovered, and the wickedness of Samaria; how they practice falsehood, and the thief enters and the troop of bandits ravage '
  - type: text
    content: and
  - type: text
    content: ' raid without.'
  '10':
  - type: text
    content: ' And the pride of Israel testifies against him '
  - type: text
    content: and
  - type: text
    content: ' to his face. But they do not return to the Lord their God, nor seek '
  - type: text
    content: nor
  - type: text
    content: ' inquire of '
  - type: text
    content: nor
  - type: text
    content: ' require Him in spite of all this.'
  '11':
  - type: text
    content: ' Ephraim also is like a silly dove without heart '
  - type: text
    content: or
  - type: text
    content: ' understanding; they call to Egypt; they go to Assyria.'
  '12':
  - type: text
    content: ' As they go, I will spread My net over them; I will bring them down like birds of the heavens. I will chastise them according to the announcement [or prediction made] to their congregation [in the Scriptures]. [Lev. 26:14-39.]'
  '13':
  - type: text
    content: ' Woe to them, for they have wandered from Me! Destruction to them, because they have rebelled '
  - type: text
    content: and
  - type: text
    content: ' trespassed against Me! Though I would redeem them, yet they have spoken lies against Me.'
  '14':
  - type: text
    content: ' They do not cry to Me from their heart, but they wail upon their beds; they gash '
  - type: text
    content: and
  - type: text
    content: ' distress '
  - type: text
    content: and
  - type: text
    content: ' assemble themselves [in mourning] for grain and new wine; they rebel against Me.'
  '15':
  - type: text
    content: ' Although I have chastened them '
  - type: text
    content: and
  - type: text
    content: ' trained and strengthened their arms, yet they think '
  - type: text
    content: and
  - type: text
    content: ' devise evil against Me.'
  '16':
  - type: text
    content: ' They turn back, shift, '
  - type: text
    content: or
  - type: text
    content: ' change, but not upwards [to the Most High]. They are like a deceitful bow; their princes shall fall by the sword for the insolence '
  - type: text
    content: and
  - type: text
    content: ' rage of their tongue. This shall be [cause for] their derision '
  - type: text
    content: and
  - type: text
    content: ' scorning in the land of Egypt.'
  '2':
  - type: text
    content: ' But they do not consider '
  - type: text
    content: and
  - type: text
    content: ' say to their minds '
  - type: text
    content: and
  - type: text
    content: ' hearts that I [earnestly] remember all their wickedness. Now their own doings surround and entangle them; they are before My face.'
  '3':
  - type: text
    content: ' They make the king glad with their wickedness, and the princes with their lies.'
  '4':
  - type: text
    content: ' They are all [idolatrous] adulterers; their passion smolders like heat of an oven when the baker ceases to stir the fire from the kneading of the dough until it is leavened.'
  '5':
  - type: text
    content: ' On the [special] day of our king the princes made themselves '
  - type: text
    content: and
  - type: text
    content: ' him sick with the heat of wine; [the king] stretched out his hand with scoffers '
  - type: text
    content: and
  - type: text
    content: ' lawless men.'
  '6':
  - type: text
    content: ' For they have made ready their heart, '
  - type: text
    content: and
  - type: text
    content: ' their mind burns [with intrigue] like an oven while they lie in wait. Their anger smolders all night; in the morning it blazes forth as a flaming fire.'
  '7':
  - type: text
    content: ' They are all hot as an oven and devour their judges; all their kings are fallen; there is none among them who calls to Me.'
  '8':
  - type: text
    content: ' Ephraim mixes himself among the peoples [courting the favor of first one country, then another]; Ephraim is a cake not turned.'
  '9':
  - type: text
    content: ' Strangers have devoured his strength, and he knows it not; yes, gray hairs are sprinkled here and there upon him, and he does not know it.'
