document_id: HOS.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN I would heal Israel, then Ephraim''s guilt is uncovered, and the wickedness of Samaria; how they practice falsehood, and the thief enters and the troop of bandits ravage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' raid without.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But they do not consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' say to their minds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearts that I [earnestly] remember all their wickedness. Now their own doings surround and entangle them; they are before My face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They make the king glad with their wickedness, and the princes with their lies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They are all [idolatrous] adulterers; their passion smolders like heat of an oven when the baker ceases to stir the fire from the kneading of the dough until it is leavened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' On the [special] day of our king the princes made themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' him sick with the heat of wine; [the king] stretched out his hand with scoffers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawless men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For they have made ready their heart, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their mind burns [with intrigue] like an oven while they lie in wait. Their anger smolders all night; in the morning it blazes forth as a flaming fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They are all hot as an oven and devour their judges; all their kings are fallen; there is none among them who calls to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ephraim mixes himself among the peoples [courting the favor of first one country, then another]; Ephraim is a cake not turned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Strangers have devoured his strength, and he knows it not; yes, gray hairs are sprinkled here and there upon him, and he does not know it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the pride of Israel testifies against him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to his face. But they do not return to the Lord their God, nor seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' inquire of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' require Him in spite of all this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Ephraim also is like a silly dove without heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understanding; they call to Egypt; they go to Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' As they go, I will spread My net over them; I will bring them down like birds of the heavens. I will chastise them according to the announcement [or prediction made] to their congregation [in the Scriptures]. [Lev. 26:14-39.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Woe to them, for they have wandered from Me! Destruction to them, because they have rebelled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trespassed against Me! Though I would redeem them, yet they have spoken lies against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They do not cry to Me from their heart, but they wail upon their beds; they gash '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' assemble themselves [in mourning] for grain and new wine; they rebel against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Although I have chastened them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trained and strengthened their arms, yet they think '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devise evil against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They turn back, shift, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' change, but not upwards [to the Most High]. They are like a deceitful bow; their princes shall fall by the sword for the insolence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rage of their tongue. This shall be [cause for] their derision '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scorning in the land of Egypt.'
