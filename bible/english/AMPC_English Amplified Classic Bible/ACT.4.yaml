document_id: ACT.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND WHILE they [Peter and John] were talking to the people, the high priests and the military commander of the temple and the Sadducees came upon them,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Let it be known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understood by all of you, and by the whole house of Israel, that in the name and through the power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority of Jesus Christ of Nazareth, Whom you crucified, [but] Whom God raised from the dead, in Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by means of Him this man is standing here before you well '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sound in body.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' This [Jesus] is the Stone which was despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected by you, the builders, but which has become the Head of the corner [the Cornerstone]. [Ps. 118:22.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And there is salvation in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through no one else, for there is no other name under heaven given among men by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in which we must be saved.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Now when they saw the boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfettered eloquence of Peter and John and perceived that they were unlearned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' untrained in the schools [common men with no educational advantages], they marveled; and they recognized that they had been with Jesus.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And since they saw the man who had been cured standing there beside them, they could not contradict the fact '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' say anything in opposition.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But having ordered [the prisoners] to go aside out of the council [chamber], they conferred (debated) among themselves,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Saying, What are we to do with these men? For that an extraordinary miracle has been performed by (through) them is plain to all the residents of Jerusalem, and we cannot deny it.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But in order that it may not spread further among the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the nation, let us warn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forbid them with a stern threat to speak any more to anyone in this name [or about this Person].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' [So] they summoned them and imperatively instructed them not to converse in any way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' teach at all in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' about the name of Jesus.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But Peter and John replied to them, Whether it is right in the sight of God to listen to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey you rather than God, you must decide (judge).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Being vexed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignant through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through because they were teaching the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proclaiming in [the case of] Jesus the resurrection from the dead.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But we [ourselves] cannot help telling what we have seen and heard.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then when [the rulers and council members] had further threatened them, they let them go, not seeing how they could secure a conviction against them because of the people; for everybody was praising '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorifying God for what had occurred.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For the man on whom this sign (miracle) of healing was performed was more than forty years old.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' After they were permitted to go, [the apostles] returned to their own [company] and told all that the chief priests and elders had said to them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And when they heard it, lifted their voices together with one united mind to God and said, O Sovereign Lord, You are He Who made the heaven and the earth and the sea and everything that is in them, [Exod. 20:11; Ps. 146:6.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Who by the mouth of our forefather David, Your servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' child, said through the Holy Spirit, Why did the heathen (Gentiles) become wanton '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rage, and the people imagine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' study '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plan vain (fruitless) things [that will not succeed]?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' The kings of the earth took their stand in array [for attack] and the rulers were assembled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' combined together against the Lord and against His Anointed (Christ, the Messiah). [Ps. 2:1, 2.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For in this city there actually met and plotted together against Your holy Child '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Servant Jesus, Whom You consecrated by anointing, both Herod and Pontius Pilate with the Gentiles and peoples of Israel, [Ps. 2:1, 2.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' To carry out all that Your hand and Your will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose had predestined (predetermined) should occur.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And now, Lord, observe their threats and grant to Your bond servants [full freedom] to declare Your message fearlessly,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So they laid hands on them (arrested them) and put them in prison until the following day, for it was already evening.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' While You stretch out Your hand to cure and to perform signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonders through the authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by the power of the name of Your holy Child '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Servant Jesus.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And when they had prayed, the place in which they were assembled was shaken; and they were all filled with the Holy Spirit, and they continued to speak the Word of God with freedom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courage.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now the company of believers was of one heart and soul, and not one of them claimed that anything which he possessed was [exclusively] his own, but everything they had was in common '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for the use of all.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And with great strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power the apostles delivered their testimony to the resurrection of the Lord Jesus, and great grace (loving-kindness and favor and goodwill) rested richly upon them all.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Nor was there a destitute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' needy person among them, for as many as were owners of lands or houses proceeded to sell them, and one by one they brought (gave back) the amount received from the sales'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And laid it at the feet of the apostles (special messengers). Then distribution was made according as anyone had need.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Now Joseph, a Levite and native of Cyprus who was surnamed Barnabas by the apostles, which interpreted means Son of Encouragement,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Sold a field which belonged to him and brought the sum of money and laid it at the feet of the apostles.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But many of those who heard the message believed (adhered to and trusted in and relied on Jesus as the Christ). And their number grew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' came to about 5,000.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then on the following day, their magistrates and elders and scribes were assembled in Jerusalem,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Including Annas the high priest and Caiaphas and John and Alexander and all others who belonged to the high priestly relationship.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And they set the men in their midst and repeatedly demanded, By what sort of power or by what kind of authority did [such people as] you do this [healing]?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Peter, [because he was] filled with [and controlled by] the Holy Spirit, said to them, Rulers of the people and members of the council (the Sanhedrin),'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' If we are being put on trial [here] today '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examined concerning a good deed done to benefit a feeble (helpless) cripple, by what means this man has been restored to health,'
