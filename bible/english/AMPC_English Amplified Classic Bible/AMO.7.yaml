document_id: AMO.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THUS THE Lord God showed me [Amos], and behold, He formed locusts in the beginning of the shooting up of the second crop, and behold, it was the second crop after the king''s mowings.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Then Amaziah the priest of [the golden calf shrine at] Bethel sent to Jeroboam king of Israel, saying, Amos has conspired against you in the midst of the house of Israel; the land is not able to bear all his words. [I Kings 12:31, 32.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For thus Amos has said, Jeroboam shall die by the sword and Israel shall surely be led away captive out of his land.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Also Amaziah said to Amos, O you seer, go! Flee back to the land of Judah [your own country], and eat your bread and live out your profession as a prophet there [as I perform my duties here].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But do not prophesy any more at Bethel, for it is the king''s sanctuary and a seat of his kingdom. [Luke 10:10-12.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then Amos said to Amaziah, I was no prophet [by profession]! Neither was I a prophet''s son; [but I had my occupation] I was a herdsman and a dresser of sycamore trees and a gatherer of sycamore figs.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the Lord took me as I followed the flock and the Lord said to me, Go, prophesy to My people Israel.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Now therefore listen to the word of the Lord: You say, Do not prophesy against Israel and drop no statements not complimentary to the house of Isaac.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Therefore thus says the Lord: Your wife shall be a harlot in the city and your sons and your daughters shall fall by the sword, and your land shall be divided up by line; you yourself shall die in an unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiled land, and Israel shall surely go forth out of his land into exile.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And when [the locusts] had finished eating the plants of the land, then I said, O Lord God, forgive, I pray You. How can Jacob stand? For he is so small!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The Lord relented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revoked this sentence: It shall not take place, said the Lord [and He was eased and comforted concerning it].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Thus the Lord God showed me, and behold, the Lord God called for punishment with fire, and it devoured the great deep and would have eaten up the land.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then said I, O Lord God, cease, I pray You! How can Jacob stand? He is so little!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The Lord relented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revoked this sentence: This also shall not be, said the Lord [and He was eased and comforted concerning it].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Thus He showed me, and behold, the Lord stood upon a wall with a plumb line, with a plumb line in His hand. [II Kings 21:13; Isa. 34:11.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the Lord said to me, Amos, what do you see? And I said, A plumb line. Then said the Lord, Behold, I am setting a plumb line as a standard in the midst of My people Israel. I will not pass by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spare them any more [the door of mercy is shut].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And the [idolatrous] high places of Isaac (Israel) shall be desolate and the sanctuaries of Israel shall be laid waste, and I will rise with the sword against the house of King Jeroboam [who set up the golden calf shrines].'
