  '1':
  - type: text
    content: ' TAKE CARE not to do your good deeds publicly '
  - type: text
    content: or
  - type: text
    content: ' before men, in order to be seen by them; otherwise you will have no reward [reserved for and awaiting you] with '
  - type: text
