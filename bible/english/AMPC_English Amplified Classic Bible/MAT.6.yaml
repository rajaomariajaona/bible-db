  - type: text
    content: ' from your Father Who is in heaven.'
  '10':
  - type: text
    content: ' Your kingdom come, Your will be done on earth as it is in heaven.'
  '11':
  - type: text
    content: ' Give us this day our daily bread.'
  '12':
  - type: text
    content: ' And forgive us our debts, as we also have forgiven (left, remitted, and let go of the debts, and have given up resentment against) our debtors.'
  '13':
  - type: text
    content: ' And lead (bring) us not into temptation, but deliver us from the evil one. '
  - type: text
    content: For Yours is the kingdom and the power and the glory forever. Amen.
  '14':
  - type: text
    content: ' For if you forgive people their trespasses [their reckless and willful sins, leaving them, letting them go, and giving up resentment], your heavenly Father will also forgive you.'
  '15':
  - type: text
    content: ' But if you do not forgive others their trespasses [their reckless and willful sins, leaving them, letting them go, and giving up resentment], neither will your Father forgive you your trespasses.'
  '16':
  - type: text
    content: ' And whenever you are fasting, do not look gloomy '
  - type: text
    content: and
  - type: text
    content: ' sour '
  - type: text
    content: and
  - type: text
    content: ' dreary like the hypocrites, for they put on a dismal countenance, that their fasting may be apparent to '
  - type: text
    content: and
  - type: text
    content: ' seen by men. Truly I say to you, they have their reward in full already. [Isa. 58:5.]'
  '17':
  - type: text
    content: ' But when you fast, perfume your head and wash your face,'
  '18':
  - type: text
    content: ' So that your fasting may not be noticed by men but by your Father, Who sees in secret; and your Father, Who sees in secret, will reward you '
  - type: text
    content: in the open.
  '19':
  - type: text
    content: ' Do not gather '
  - type: text
    content: and
  - type: text
    content: ' heap up '
  - type: text
    content: and
  - type: text
    content: ' store up for yourselves treasures on earth, where moth and rust '
  - type: text
    content: and
  - type: text
    content: ' worm consume '
  - type: text
    content: and
  - type: text
    content: ' destroy, and where thieves break through and steal.'
  '2':
  - type: text
    content: ' Thus, whenever you give to the poor, do not blow a trumpet before you, as the hypocrites in the synagogues and in the streets like to do, that they may be recognized '
  - type: text
    content: and
  - type: text
    content: ' honored '
  - type: text
    content: and
  - type: text
    content: ' praised by men. Truly I tell you, they have their reward in full already.'
  '20':
  - type: text
    content: ' But gather '
  - type: text
    content: and
  - type: text
    content: ' heap up '
  - type: text
    content: and
  - type: text
    content: ' store for yourselves treasures in heaven, where neither moth nor rust '
  - type: text
    content: nor
  - type: text
    content: ' worm consume '
  - type: text
    content: and
  - type: text
    content: ' destroy, and where thieves do not break through and steal;'
  '21':
  - type: text
    content: ' For where your treasure is, there will your heart be also.'
  '22':
  - type: text
    content: ' The eye is the lamp of the body. So if your eye is sound, your entire body will be full of light.'
  '23':
  - type: text
    content: ' But if your eye is unsound, your whole body will be full of darkness. If then the very light in you [your conscience] is darkened, how dense is that darkness!'
  '24':
  - type: text
    content: ' No one can serve two masters; for either he will hate the one and love the other, or he will stand by '
  - type: text
    content: and
  - type: text
    content: ' be devoted to the one and despise and be against the other. You cannot serve God and mammon (deceitful riches, money, possessions, or whatever is trusted in).'
  '25':
  - type: text
    content: ' Therefore I tell you, stop being perpetually uneasy (anxious and worried) about your life, what you shall eat '
  - type: text
    content: or what you shall drink;
  - type: text
    content: ' or about your body, what you shall put on. Is not life greater [in quality] than food, and the body [far above and more excellent] than clothing?'
  '26':
  - type: text
    content: ' Look at the birds of the air; they neither sow nor reap nor gather into barns, and yet your heavenly Father keeps feeding them. Are you not worth much more than they?'
  '27':
  - type: text
    content: ' And who of you by worrying '
  - type: text
    content: and
  - type: text
    content: ' being anxious can add one unit of measure (cubit) to his stature '
  - type: text
    content: or
  - type: text
    content: ' to the span of his life? [Ps. 39:5-7.]'
  '28':
  - type: text
    content: ' And why should you be anxious about clothes? Consider the lilies of the field '
  - type: text
    content: and
  - type: text
    content: ' learn thoroughly how they grow; they neither toil nor spin.'
  '29':
  - type: text
    content: ' Yet I tell you, even Solomon in all his magnificence (excellence, dignity, and grace) was not arrayed like one of these. [I Kings 10:4-7.]'
  '3':
  - type: text
    content: ' But when you give to charity, do not let your left hand know what your right hand is doing,'
  '30':
  - type: text
    content: ' But if God so clothes the grass of the field, which today is alive '
  - type: text
    content: and
  - type: text
    content: ' green and tomorrow is tossed into the furnace, will He not much more surely clothe you, O you of little faith?'
  '31':
  - type: text
    content: ' Therefore do not worry '
  - type: text
    content: and
  - type: text
    content: ' be anxious, saying, What are we going to have to eat? or, What are we going to have to drink? or, What are we going to have to wear?'
  '32':
  - type: text
    content: ' For the Gentiles (heathen) wish for '
  - type: text
    content: and
  - type: text
    content: ' crave '
  - type: text
    content: and
  - type: text
    content: ' diligently seek all these things, and your heavenly Father knows well that you need them all.'
  '33':
  - type: text
    content: ' But seek (aim at and strive after) first of all His kingdom and His righteousness (His way of doing and being right), and then all these things taken together will be given you besides.'
  '34':
  - type: text
    content: ' So do not worry '
  - type: text
    content: or
  - type: text
    content: ' be anxious about tomorrow, for tomorrow will have worries '
  - type: text
    content: and
  - type: text
    content: ' anxieties of its own. Sufficient for each day is its own trouble.'
  '4':
  - type: text
    content: ' So that your deeds of charity may be in secret; and your Father Who sees in secret will reward you '
  - type: text
    content: openly.
  '5':
  - type: text
    content: ' Also when you pray, you must not be like the hypocrites, for they love to pray standing in the synagogues and on the corners of the streets, that they may be seen by people. Truly I tell you, they have their reward in full already.'
  '6':
  - type: text
    content: ' But when you pray, go into your [most] private room, and, closing the door, pray to your Father, Who is in secret; and your Father, Who sees in secret, will reward you '
  - type: text
    content: in the open
  - type: text
    content: .
  '7':
  - type: text
    content: ' And when you pray, do not heap up phrases (multiply words, repeating the same ones over and over) as the Gentiles do, for they think they will be heard for their much speaking. [I Kings 18:25-29.]'
  '8':
  - type: text
    content: ' Do not be like them, for your Father knows what you need before you ask Him.'
  '9':
  - type: text
    content: ' Pray, therefore, like this: Our Father Who is in heaven, hallowed (kept holy) be Your name.'
