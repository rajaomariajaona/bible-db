document_id: MAT.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' TAKE CARE not to do your good deeds publicly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' before men, in order to be seen by them; otherwise you will have no reward [reserved for and awaiting you] with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from your Father Who is in heaven.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Your kingdom come, Your will be done on earth as it is in heaven.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Give us this day our daily bread.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And forgive us our debts, as we also have forgiven (left, remitted, and let go of the debts, and have given up resentment against) our debtors.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And lead (bring) us not into temptation, but deliver us from the evil one. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: For Yours is the kingdom and the power and the glory forever. Amen.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For if you forgive people their trespasses [their reckless and willful sins, leaving them, letting them go, and giving up resentment], your heavenly Father will also forgive you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if you do not forgive others their trespasses [their reckless and willful sins, leaving them, letting them go, and giving up resentment], neither will your Father forgive you your trespasses.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And whenever you are fasting, do not look gloomy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sour '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dreary like the hypocrites, for they put on a dismal countenance, that their fasting may be apparent to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seen by men. Truly I say to you, they have their reward in full already. [Isa. 58:5.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But when you fast, perfume your head and wash your face,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' So that your fasting may not be noticed by men but by your Father, Who sees in secret; and your Father, Who sees in secret, will reward you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the open.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Do not gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heap up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' store up for yourselves treasures on earth, where moth and rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worm consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy, and where thieves break through and steal.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Thus, whenever you give to the poor, do not blow a trumpet before you, as the hypocrites in the synagogues and in the streets like to do, that they may be recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised by men. Truly I tell you, they have their reward in full already.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heap up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' store for yourselves treasures in heaven, where neither moth nor rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' worm consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy, and where thieves do not break through and steal;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For where your treasure is, there will your heart be also.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The eye is the lamp of the body. So if your eye is sound, your entire body will be full of light.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But if your eye is unsound, your whole body will be full of darkness. If then the very light in you [your conscience] is darkened, how dense is that darkness!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' No one can serve two masters; for either he will hate the one and love the other, or he will stand by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be devoted to the one and despise and be against the other. You cannot serve God and mammon (deceitful riches, money, possessions, or whatever is trusted in).'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Therefore I tell you, stop being perpetually uneasy (anxious and worried) about your life, what you shall eat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or what you shall drink;
    - type: text
      text: ' or about your body, what you shall put on. Is not life greater [in quality] than food, and the body [far above and more excellent] than clothing?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Look at the birds of the air; they neither sow nor reap nor gather into barns, and yet your heavenly Father keeps feeding them. Are you not worth much more than they?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And who of you by worrying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' being anxious can add one unit of measure (cubit) to his stature '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to the span of his life? [Ps. 39:5-7.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And why should you be anxious about clothes? Consider the lilies of the field '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learn thoroughly how they grow; they neither toil nor spin.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Yet I tell you, even Solomon in all his magnificence (excellence, dignity, and grace) was not arrayed like one of these. [I Kings 10:4-7.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But when you give to charity, do not let your left hand know what your right hand is doing,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But if God so clothes the grass of the field, which today is alive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' green and tomorrow is tossed into the furnace, will He not much more surely clothe you, O you of little faith?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Therefore do not worry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be anxious, saying, What are we going to have to eat? or, What are we going to have to drink? or, What are we going to have to wear?'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For the Gentiles (heathen) wish for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diligently seek all these things, and your heavenly Father knows well that you need them all.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' But seek (aim at and strive after) first of all His kingdom and His righteousness (His way of doing and being right), and then all these things taken together will be given you besides.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' So do not worry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be anxious about tomorrow, for tomorrow will have worries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxieties of its own. Sufficient for each day is its own trouble.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So that your deeds of charity may be in secret; and your Father Who sees in secret will reward you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: openly.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Also when you pray, you must not be like the hypocrites, for they love to pray standing in the synagogues and on the corners of the streets, that they may be seen by people. Truly I tell you, they have their reward in full already.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But when you pray, go into your [most] private room, and, closing the door, pray to your Father, Who is in secret; and your Father, Who sees in secret, will reward you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the open
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And when you pray, do not heap up phrases (multiply words, repeating the same ones over and over) as the Gentiles do, for they think they will be heard for their much speaking. [I Kings 18:25-29.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Do not be like them, for your Father knows what you need before you ask Him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Pray, therefore, like this: Our Father Who is in heaven, hallowed (kept holy) be Your name.'
