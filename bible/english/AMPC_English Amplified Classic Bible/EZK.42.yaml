document_id: EZK.42,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] brought me forth into the outer court northward, and he brought me to the attached chambers that were opposite the temple yard and were opposite the building on the north.'
  '10':
  - type: text
    content: ' In the breadth of the wall of the court going toward the east, before the yard and before the building, were the chambers'
  '11':
  - type: text
    content: ' With a passage before them that gave the appearance of the attached chambers on the north, of the same length and breadth, with similar exits and arrangements and doors.'
  '12':
  - type: text
    content: ' And like the doors of the chambers that were toward the south there was an entrance at the head of the way, the way before the dividing wall toward the east, as one enters them.'
  '13':
  - type: text
    content: ' Then said '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] to me, The north chambers and the south chambers, which are opposite the yard, are the holy chambers where the priests who approach the Lord shall eat the most holy offerings; there shall they lay the most holy things–the meal offering, the sin offering, and the trespass '
  - type: text
    content: or
  - type: text
    content: ' guilt offering–for the place is holy.'
  '14':
  - type: text
    content: ' When the priests enter the Holy Place, they shall not go out of it into the outer court unless they lay aside there the garments in which they minister, for these are holy, separate, '
  - type: text
    content: and
  - type: text
    content: ' set apart. They shall put on other garments before they approach that which is for the people.'
  '15':
  - type: text
    content: ' Now when he had finished measuring the inner temple area, he brought me forth toward the gate which faces east and measured it [the outer area] round about.'
  '16':
  - type: text
    content: ' He measured the east side with the measuring reed, five hundred reeds with the measuring reed round about.'
  '17':
  - type: text
    content: ' He measured the north side, five hundred reeds with the measuring reed round about.'
  '18':
  - type: text
    content: ' He measured the south side, five hundred reeds with the measuring reed.'
  '19':
  - type: text
    content: ' He turned about to the west side and measured five hundred reeds with the measuring reed.'
  '2':
  - type: text
    content: ' Before the long side of one hundred cubits was the door toward the north, and the breadth was fifty cubits.'
  '20':
  - type: text
    content: ' He measured it on the four sides; it had a wall round about, the length five hundred reeds and the breadth five hundred, to make a separation between that which was holy [the temple proper] and that which was common [the outer area].'
  '3':
  - type: text
    content: ' Adjoining the twenty cubits which belonged to the inner court, and opposite the pavement which belonged to the outer court, was balcony facing balcony in three stories.'
  '4':
  - type: text
    content: ' And before the attached chambers was a walk inward of ten cubits breadth and a hundred cubits long, and their doors were on the north.'
  '5':
  - type: text
    content: ' Now the upper chambers were shorter, for the balconies took off from these more than from the lower and middle chambers of the building.'
  '6':
  - type: text
    content: ' For they were in three stories, but did not have pillars as the pillars of the [outer] court; therefore the upper chambers were set back more than the lower and the middle ones from the ground.'
  '7':
  - type: text
    content: ' And the wall '
  - type: text
    content: or
  - type: text
    content: ' fence that was outside, opposite '
  - type: text
    content: and
  - type: text
    content: ' parallel to the chambers, toward the outer court before the chambers, was fifty cubits long,'
  '8':
  - type: text
    content: ' For the length of the [combined] chambers that were on the outer court was fifty cubits, while [the length] of those opposite the temple was a hundred cubits.'
  '9':
  - type: text
    content: ' And under these chambers was the entrance on the east side, as one approached them from the outer court.'
