document_id: EZK.42
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the man
  - type: text
    text: ' [an angel] brought me forth into the outer court northward, and he brought me to the attached chambers that were opposite the temple yard and were opposite the building on the north.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Before the long side of one hundred cubits was the door toward the north, and the breadth was fifty cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Adjoining the twenty cubits which belonged to the inner court, and opposite the pavement which belonged to the outer court, was balcony facing balcony in three stories.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And before the attached chambers was a walk inward of ten cubits breadth and a hundred cubits long, and their doors were on the north.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now the upper chambers were shorter, for the balconies took off from these more than from the lower and middle chambers of the building.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For they were in three stories, but did not have pillars as the pillars of the [outer] court; therefore the upper chambers were set back more than the lower and the middle ones from the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the wall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fence that was outside, opposite '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' parallel to the chambers, toward the outer court before the chambers, was fifty cubits long,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For the length of the [combined] chambers that were on the outer court was fifty cubits, while [the length] of those opposite the temple was a hundred cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And under these chambers was the entrance on the east side, as one approached them from the outer court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In the breadth of the wall of the court going toward the east, before the yard and before the building, were the chambers'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' With a passage before them that gave the appearance of the attached chambers on the north, of the same length and breadth, with similar exits and arrangements and doors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And like the doors of the chambers that were toward the south there was an entrance at the head of the way, the way before the dividing wall toward the east, as one enters them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then said '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the man
  - type: text
    text: ' [an angel] to me, The north chambers and the south chambers, which are opposite the yard, are the holy chambers where the priests who approach the Lord shall eat the most holy offerings; there shall they lay the most holy things–the meal offering, the sin offering, and the trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilt offering–for the place is holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When the priests enter the Holy Place, they shall not go out of it into the outer court unless they lay aside there the garments in which they minister, for these are holy, separate, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart. They shall put on other garments before they approach that which is for the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now when he had finished measuring the inner temple area, he brought me forth toward the gate which faces east and measured it [the outer area] round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He measured the east side with the measuring reed, five hundred reeds with the measuring reed round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He measured the north side, five hundred reeds with the measuring reed round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He measured the south side, five hundred reeds with the measuring reed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He turned about to the west side and measured five hundred reeds with the measuring reed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He measured it on the four sides; it had a wall round about, the length five hundred reeds and the breadth five hundred, to make a separation between that which was holy [the temple proper] and that which was common [the outer area].'
