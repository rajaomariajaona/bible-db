document_id: NUM.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN BALAAM saw that it pleased the Lord to bless Israel, he did not go as he had done each time before [superstitiously] to meet with omens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' signs in the natural world, but he set his face toward the wilderness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Balaam lifted up his eyes and he saw Israel abiding in their tents according to their tribes. And the Spirit of God came upon him'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he took up his [figurative] discourse and said: Balaam son of Beor, the man whose eye is opened [at last, to see clearly the purposes and will of God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He [Balaam] who hears the words of God, who sees the vision of the Almighty, falling down, but having his eyes open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncovered, he says:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' How attractive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' considerable are your tents, O Jacob, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your tabernacles, O Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' As valleys are they spread forth, as gardens by the riverside, as [rare spice] of lignaloes which the Lord has planted, and as cedar trees beside the waters. [Ps. 1:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [Israel] shall pour water out of his own buckets [have his own sources of rich blessing and plenty], and his offspring shall dwell by many waters, and his king shall be higher than Agag, and his kingdom shall be exalted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' God brought [Israel] forth out of Egypt; [Israel] has strength like the wild ox; he shall eat up the nations, his enemies, crushing their bones and piercing them through with his arrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He couched, he lay down as a lion; and as a lioness, who shall rouse him? Blessed [of God] is he who blesses you [who prays for and contributes to your welfare] and cursed [of God] is he who curses you [who in word, thought, or deed would bring harm upon you]. [Matt. 25:40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Balak''s anger was kindled against Balaam, and he smote his hands together; and Balak said to Balaam, I called you to curse my enemies, and, behold, you have done nothing but bless them these three times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore now go back where you belong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do it in a hurry! I had intended to promote you to great honor, but behold, the Lord has held you back from honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Balaam said to Balak, Did I not say to your messengers whom you sent to me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If Balak would give me his house full of silver and gold, I cannot go beyond the command of the Lord, to do either good or bad of my own will, but what the Lord says, that will I speak?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And now, behold, I am going to my people; come, I will tell you what this people [Israel] will do to your people [Moab] in the latter days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he took up his [figurative] discourse, and said: Balaam son of Beor speaks, the man whose eye is opened speaks,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He speaks, who heard the words of God and knew the knowledge of the Most High, who saw the vision of the Almighty, falling down, but having his eyes open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncovered:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I see Him, but not now; I behold Him, but He is not near. A star (Star) shall come forth out of Jacob, and a scepter (Scepter) shall rise out of Israel and shall crush all the corners of Moab and break down all the sons of Sheth [Moab''s sons of tumult]. [Matt. 2:2; Rom. 15:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Edom shall be [taken as] a possession, [Mount] Seir also shall be dispossessed, who were Israel''s enemies, while Israel does valiantly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Out of Jacob shall one (One) come having dominion and shall destroy the remnant from the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [Balaam] looked at Amalek and took up his [prophetic] utterance, and said: Amalek is the foremost of the [neighboring] nations, but in his latter end he shall come to destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he looked at the Kenites and took up his [prophetic] utterance, and said: Strong is your dwelling place, and you set your nest in the rock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Nevertheless the Kenites shall be wasted. How long shall Asshur (Assyria) take you away captive?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he took up his [prophetic] speech, and said: Alas, who shall live when God does this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establishes [Assyria]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But ships shall come from Kittim [Cyprus and the greater part of the Mediterranean''s east coast] and shall afflict Assyria and Eber [the Hebrews, certain Arabs, and descendants of Nahor], and he [the victor] also shall come to destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Balaam rose up, returned to his place, and Balak also went his way.'
