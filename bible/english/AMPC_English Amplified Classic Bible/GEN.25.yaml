document_id: GEN.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ABRAHAM TOOK another wife, and her name was Keturah.'
  '10':
  - type: text
    content: ' The field which Abraham purchased from the Hittites. There Abraham was buried with Sarah his wife.'
  '11':
  - type: text
    content: ' After the death of Abraham, God blessed his son Isaac, and Isaac dwelt at Beer-lahai-roi [A well to the Living One Who sees me].'
  '12':
  - type: text
    content: ' Now this is the history of the descendants of Ishmael, Abraham''s son, whom Hagar the Egyptian, Sarah''s handmaid, bore to Abraham.'
  '13':
  - type: text
    content: ' These are the names of the sons of Ishmael, named in the order of their births: Nebaioth, the firstborn of Ishmael, and Kedar, Adbeel, Mibsam,'
  '14':
  - type: text
    content: ' Mishma, Dumah, Massa,'
  '15':
  - type: text
    content: ' Hadad, Tema, Jetur, Naphish, and Kedemah.'
  '16':
  - type: text
    content: ' These are the sons of Ishmael, and these are their names, by their villages and by their encampments (sheepfolds)–twelve princes according to their tribes. [Foretold in Gen. 17:20.]'
  '17':
  - type: text
    content: ' And Ishmael lived 137 years; then his spirit left him, and he died and was gathered to his kindred.'
  '18':
  - type: text
    content: ' And [Ishmael''s sons] dwelt from Havilah to Shur, which is before Egypt in the direction of Assyria. [Ishmael] dwelt close [to the lands] of all his brethren.'
  '19':
  - type: text
    content: ' And this is the history of the descendants of Isaac, Abraham''s son: Abraham was the father of Isaac.'
  '2':
  - type: text
    content: ' And she bore him Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.'
  '20':
  - type: text
    content: ' Isaac was forty years old when he married Rebekah, the daughter of Bethuel the Aramean of Padan-aram, the sister of Laban the Aramean.'
  '21':
  - type: text
    content: ' And Isaac prayed much to the Lord for his wife because she was unable to bear children; and the Lord granted his prayer, and Rebekah his wife became pregnant.'
  '22':
  - type: text
    content: ' [Two] children struggled together within her; and she said, If it is so [that the Lord has heard our prayer], why am I like this? And she went to inquire of the Lord.'
  '23':
  - type: text
    content: ' The Lord said to her, [The founders of] two nations are in your womb, and the separation of two peoples has begun in your body; the one people shall be stronger than the other, and the elder shall serve the younger.'
  '24':
  - type: text
    content: ' When her days to be delivered were fulfilled, behold, there were twins in her womb.'
  '25':
  - type: text
    content: ' The first came out red all over like a hairy garment, and they named him Esau [hairy].'
  '26':
  - type: text
    content: ' Afterward his brother came forth, and his hand grasped Esau''s heel; so he was named Jacob [supplanter]. Isaac was sixty years old when she gave birth to them.'
  '27':
  - type: text
    content: ' When the boys grew up, Esau was a cunning '
  - type: text
    content: and
  - type: text
    content: ' skilled hunter, a man of the outdoors; but Jacob was a plain '
  - type: text
    content: and
  - type: text
    content: ' quiet man, dwelling in tents.'
  '28':
  - type: text
    content: ' And Isaac loved [and was partial to] Esau, because he ate of Esau''s game; but Rebekah loved Jacob.'
  '29':
  - type: text
    content: ' Jacob was boiling pottage (lentil stew) one day, when Esau came from the field and was faint [with hunger].'
  '3':
  - type: text
    content: ' Jokshan was the father of Sheba and Dedan. The sons of Dedan were Asshurim, Letushim, and Leummim.'
  '30':
  - type: text
    content: ' And Esau said to Jacob, I beg of you, let me have some of that red lentil stew to eat, for I am faint '
  - type: text
    content: and
  - type: text
    content: ' famished! That is why his name was called Edom [red].'
  '31':
  - type: text
    content: ' Jacob answered, Then sell me today your birthright (the rights of a firstborn).'
  '32':
  - type: text
    content: ' Esau said, See here, I am at the point of death; what good can this birthright do me?'
  '33':
  - type: text
    content: ' Jacob said, Swear to me today [that you are selling it to me]; and he swore to [Jacob] and sold him his birthright.'
  '34':
  - type: text
    content: ' Then Jacob gave Esau bread and stew of lentils, and he ate and drank and rose up and went his way. Thus Esau scorned his birthright as beneath his notice.'
  '4':
  - type: text
    content: ' The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the children of Keturah.'
  '5':
  - type: text
    content: ' And Abraham gave all that he had to Isaac.'
  '6':
  - type: text
    content: ' But to the sons of his concubines [Hagar and Keturah] Abraham gave gifts, and while he was still living he sent them to the east country, away from Isaac his son [of promise].'
  '7':
  - type: text
    content: ' The days of Abraham''s life were 175 years.'
  '8':
  - type: text
    content: ' Then Abraham''s spirit was released, and he died at a good (ample, full) old age, an old man, satisfied '
  - type: text
    content: and
  - type: text
    content: ' satiated, and was gathered to his people. [Gen. 15:15.]'
  '9':
  - type: text
    content: ' And his sons Isaac and Ishmael buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, which is east of Mamre,'
