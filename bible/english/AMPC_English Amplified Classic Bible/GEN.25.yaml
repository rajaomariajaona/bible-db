document_id: GEN.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ABRAHAM TOOK another wife, and her name was Keturah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And she bore him Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Jokshan was the father of Sheba and Dedan. The sons of Dedan were Asshurim, Letushim, and Leummim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the children of Keturah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Abraham gave all that he had to Isaac.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But to the sons of his concubines [Hagar and Keturah] Abraham gave gifts, and while he was still living he sent them to the east country, away from Isaac his son [of promise].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The days of Abraham''s life were 175 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Abraham''s spirit was released, and he died at a good (ample, full) old age, an old man, satisfied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satiated, and was gathered to his people. [Gen. 15:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And his sons Isaac and Ishmael buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, which is east of Mamre,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The field which Abraham purchased from the Hittites. There Abraham was buried with Sarah his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' After the death of Abraham, God blessed his son Isaac, and Isaac dwelt at Beer-lahai-roi [A well to the Living One Who sees me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now this is the history of the descendants of Ishmael, Abraham''s son, whom Hagar the Egyptian, Sarah''s handmaid, bore to Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' These are the names of the sons of Ishmael, named in the order of their births: Nebaioth, the firstborn of Ishmael, and Kedar, Adbeel, Mibsam,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Mishma, Dumah, Massa,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Hadad, Tema, Jetur, Naphish, and Kedemah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are the sons of Ishmael, and these are their names, by their villages and by their encampments (sheepfolds)–twelve princes according to their tribes. [Foretold in Gen. 17:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Ishmael lived 137 years; then his spirit left him, and he died and was gathered to his kindred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And [Ishmael''s sons] dwelt from Havilah to Shur, which is before Egypt in the direction of Assyria. [Ishmael] dwelt close [to the lands] of all his brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And this is the history of the descendants of Isaac, Abraham''s son: Abraham was the father of Isaac.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Isaac was forty years old when he married Rebekah, the daughter of Bethuel the Aramean of Padan-aram, the sister of Laban the Aramean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Isaac prayed much to the Lord for his wife because she was unable to bear children; and the Lord granted his prayer, and Rebekah his wife became pregnant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' [Two] children struggled together within her; and she said, If it is so [that the Lord has heard our prayer], why am I like this? And she went to inquire of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The Lord said to her, [The founders of] two nations are in your womb, and the separation of two peoples has begun in your body; the one people shall be stronger than the other, and the elder shall serve the younger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When her days to be delivered were fulfilled, behold, there were twins in her womb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The first came out red all over like a hairy garment, and they named him Esau [hairy].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Afterward his brother came forth, and his hand grasped Esau''s heel; so he was named Jacob [supplanter]. Isaac was sixty years old when she gave birth to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' When the boys grew up, Esau was a cunning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skilled hunter, a man of the outdoors; but Jacob was a plain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quiet man, dwelling in tents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Isaac loved [and was partial to] Esau, because he ate of Esau''s game; but Rebekah loved Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jacob was boiling pottage (lentil stew) one day, when Esau came from the field and was faint [with hunger].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Esau said to Jacob, I beg of you, let me have some of that red lentil stew to eat, for I am faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famished! That is why his name was called Edom [red].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Jacob answered, Then sell me today your birthright (the rights of a firstborn).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Esau said, See here, I am at the point of death; what good can this birthright do me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Jacob said, Swear to me today [that you are selling it to me]; and he swore to [Jacob] and sold him his birthright.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then Jacob gave Esau bread and stew of lentils, and he ate and drank and rose up and went his way. Thus Esau scorned his birthright as beneath his notice.'
