document_id: ZEC.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN [the guiding angel] showed me Joshua the high priest standing before the Angel of the Lord, and Satan standing at Joshua''s right hand to be his adversary '
  - type: text
    content: and
  - type: text
    content: ' to accuse him.'
  '10':
  - type: text
    content: ' In that day, says the Lord of hosts, you shall invite each man his neighbor under his own vine and his own fig tree. [Mic. 4:1-4.]'
  '2':
  - type: text
    content: ' And the Lord said to Satan, The Lord rebuke you, O Satan! Even the Lord, Who [now and habitually] chooses Jerusalem, rebuke you! Is not this [returned captive Joshua] a brand plucked out of the fire? [Jude 9.]'
  '3':
  - type: text
    content: ' Now Joshua was clothed with filthy garments and was standing before the Angel [of the Lord].'
  '4':
  - type: text
    content: ' And He spoke to those who stood before Him, saying, Take away the filthy garments from him. And He said to [Joshua], Behold, I have caused your iniquity to pass from you, and I will clothe you with rich apparel.'
  '5':
  - type: text
    content: ' And I [Zechariah] said, Let them put a clean turban on his head. So they put a clean turban on his head and clothed him with [rich] garments. And the Angel of the Lord stood by.'
  '6':
  - type: text
    content: ' And the Angel of the Lord [solemnly and earnestly] protested '
  - type: text
    content: and
  - type: text
    content: ' affirmed to Joshua, saying,'
  '7':
  - type: text
    content: ' Thus says the Lord of hosts: If you will walk in My ways and keep My charge, then also you shall rule My house and have charge of My courts, and I will give you access [to My presence] '
  - type: text
    content: and
  - type: text
    content: ' places to walk among these who stand here.'
  '8':
  - type: text
    content: ' Hear now, O Joshua the high priest, you and your colleagues who [usually] sit before you–for they are men who are a sign '
  - type: text
    content: or
  - type: text
    content: ' omen [types of what is to come]–for behold, I will bring forth My servant the Branch. [Isa. 4:2; Jer. 23:5; 33:15; Zech. 6:12.]'
  '9':
  - type: text
    content: ' For behold, upon the stone which I have set before Joshua, upon that one stone are seven eyes '
  - type: text
    content: or
  - type: text
    content: ' facets [the all-embracing providence of God and the sevenfold radiations of the Spirit of God]. Behold, I will carve upon it its inscription, says the Lord of hosts, and I will remove the iniquity '
  - type: text
    content: and
  - type: text
    content: ' guilt of this land in a single day. [II Chron. 16:9; Jer. 50:20; Zech. 4:10.]'
