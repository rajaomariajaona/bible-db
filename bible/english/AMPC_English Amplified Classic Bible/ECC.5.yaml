document_id: ECC.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' KEEP YOUR foot [give your mind to what you are doing] when you go [as Jacob to sacred Bethel] to the house of God. For to draw near to hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey is better than to give the sacrifice of fools [carelessly, irreverently] too ignorant to know that they are doing evil. [Gen. 35:1-4; Exod. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Be not rash with your mouth, and let not your heart be hasty to utter a word before God. For God is in heaven, and you are on earth; therefore let your words be few.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For a dream comes with much business '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' painful effort, and a fool''s voice with many words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When you vow a vow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make a pledge to God, do not put off paying it; for God has no pleasure in fools (those who witlessly mock Him). Pay what you vow. [Ps. 50:14; 66:13, 14; 76:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It is better that you should not vow than that you should vow and not pay. [Prov. 20:25; Acts 5:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Do not allow your mouth to cause your body to sin, and do not say before the messenger [the priest] that it was an error '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mistake. Why should God be [made] angry at your voice and destroy the work of your hands? [Mal. 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For in a multitude of dreams there is futility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthlessness, and ruin in a flood of words. But [reverently] fear God [revere and worship Him, knowing that He is].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' If you see the oppression of the poor and the violent taking away of justice and righteousness in the state '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' province, do not marvel at the matter. [Be sure that there are those who will attend to it] for a higher [official] than the high is observing, and higher ones are over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Moreover, the profit of the earth is for all; the king himself is served by the field '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in all, a king is an advantage to a land with cultivated fields.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He who loves silver will not be satisfied with silver, nor he who loves abundance with gain. This also is vanity (emptiness, falsity, and futility)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When goods increase, they who eat them increase also. And what gain is there to their owner except to see them with his eyes?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The sleep of a laboring man is sweet, whether he eats little or much, but the fullness of the rich will not let him sleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' There is a serious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severe evil which I have seen under the sun: riches were kept by their owner to his hurt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But those riches are lost in a bad venture; and he becomes the father of a son, and there is nothing in his hand [with which to support the child].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As [the man] came forth from his mother''s womb, so he will go again, naked as he came; and he will take away nothing for all his labor which he can carry in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And this also is a serious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severe evil–that in all points as he came, so shall he go; and what gain has he who labors for the wind? [I Tim. 6:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All his days also he eats in darkness [cheerlessly, with no sweetness and light in them], and much sorrow and sickness and wrath are his.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold, what I have seen to be good and fitting is for one to eat and drink, and to find enjoyment in all the labor in which he labors under the sun all the days which God gives him–for this is his [allotted] part. [I Tim. 6:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Also, every man to whom God has given riches and possessions, and the power to enjoy them and to accept his appointed lot and to rejoice in his toil–this is the gift of God [to him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For he shall not much remember [seriously] the days of his life, because God [Himself] answers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corresponds to the joy of his heart [the tranquillity of God is mirrored in him].'
