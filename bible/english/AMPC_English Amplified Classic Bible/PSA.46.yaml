document_id: PSA.46,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. +[A Psalm+] of the sons of Korah, set to treble voices. A song.
  - type: text
    content: ' GOD IS our Refuge and Strength [mighty '
  - type: text
    content: and
  - type: text
    content: ' impenetrable to temptation], a very present '
  - type: text
    content: and
  - type: text
    content: ' well-proved help in trouble.'
  '10':
  - type: text
    content: ' Let be '
  - type: text
    content: and
  - type: text
    content: ' be still, and know (recognize and understand) that I am God. I will be exalted among the nations! I will be exalted in the earth!'
  '11':
  - type: text
    content: ' The Lord of hosts is with us; the God of Jacob is our Refuge (our High Tower and Stronghold). Selah [pause, and calmly think of that]!'
  '2':
  - type: text
    content: ' Therefore we will not fear, though the earth should change and though the mountains be shaken into the midst of the seas,'
  '3':
  - type: text
    content: ' Though its waters roar and foam, though the mountains tremble at its swelling '
  - type: text
    content: and
  - type: text
    content: ' tumult. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' There is a river whose streams shall make glad the city of God, the holy place of the tabernacles of the Most High.'
  '5':
  - type: text
    content: ' God is in the midst of her, she shall not be moved; God will help her right early [at the dawn of the morning].'
  '6':
  - type: text
    content: ' The nations raged, the kingdoms tottered '
  - type: text
    content: and
  - type: text
    content: ' were moved; He uttered His voice, the earth melted.'
  '7':
  - type: text
    content: ' The Lord of hosts is with us; the God of Jacob is our Refuge (our Fortress and High Tower). Selah [pause, and calmly think of that]!'
  '8':
  - type: text
    content: ' Come, behold the works of the Lord, Who has wrought desolations '
  - type: text
    content: and
  - type: text
    content: ' wonders in the earth.'
  '9':
  - type: text
    content: ' He makes wars to cease to the end of the earth; He breaks the bow into pieces and snaps the spear in two; He burns the chariots in the fire.'
