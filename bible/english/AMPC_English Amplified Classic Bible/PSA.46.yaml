document_id: PSA.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. +[A Psalm+] of the sons of Korah, set to treble voices. A song.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GOD IS our Refuge and Strength [mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impenetrable to temptation], a very present '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well-proved help in trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Therefore we will not fear, though the earth should change and though the mountains be shaken into the midst of the seas,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Though its waters roar and foam, though the mountains tremble at its swelling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tumult. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' There is a river whose streams shall make glad the city of God, the holy place of the tabernacles of the Most High.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' God is in the midst of her, she shall not be moved; God will help her right early [at the dawn of the morning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The nations raged, the kingdoms tottered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were moved; He uttered His voice, the earth melted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord of hosts is with us; the God of Jacob is our Refuge (our Fortress and High Tower). Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Come, behold the works of the Lord, Who has wrought desolations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonders in the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He makes wars to cease to the end of the earth; He breaks the bow into pieces and snaps the spear in two; He burns the chariots in the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be still, and know (recognize and understand) that I am God. I will be exalted among the nations! I will be exalted in the earth!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord of hosts is with us; the God of Jacob is our Refuge (our High Tower and Stronghold). Selah [pause, and calmly think of that]!'
