document_id: ROM.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEREFORE, [there is] now no condemnation (no adjudging guilty of wrong) for those who are in Christ Jesus, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who live [and] walk not after the dictates of the flesh, but after the dictates of the Spirit.
    - type: text
      text: ' [John 3:18.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if Christ lives in you, [then although] your [natural] body is dead by reason of sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, the spirit is alive because of [the] righteousness [that He imputes to you].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if the Spirit of Him Who raised up Jesus from the dead dwells in you, [then] He Who raised up Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus
    - type: text
      text: ' from the dead will also restore to life your mortal (short-lived, perishable) bodies through His Spirit Who dwells in you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then, brethren, we are debtors, but not to the flesh [we are not obligated to our carnal nature], to live [a life ruled by the standards set up by the dictates] of the flesh.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if you live according to [the dictates of] the flesh, you will surely die. But if through the power of the [Holy] Spirit you are [habitually] putting to death (making extinct, deadening) the [evil] deeds prompted by the body, you shall [really and genuinely] live forever.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For all who are led by the Spirit of God are sons of God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [the Spirit which] you have now received [is] not a spirit of slavery to put you once more in bondage to fear, but you have received the Spirit of adoption [the Spirit producing sonship] in [the bliss of] which we cry, Abba (Father)! Father!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Spirit Himself [thus] testifies together with our own spirit, [assuring us] that we are children of God.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if we are [His] children, then we are [His] heirs also: heirs of God and fellow heirs with Christ [sharing His inheritance with Him]; only we must share His suffering if we are to share His glory.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [But what of that?] For I consider that the sufferings of this present time (this present life) are not worth being compared with the glory that is about to be revealed to us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conferred on us!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [even the whole] creation (all nature) waits expectantly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' longs earnestly for God''s sons to be made known [waits for the revealing, the disclosing of their sonship].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the law of the Spirit of life [which is] in Christ Jesus [the law of our new being] has freed me from the law of sin and of death.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the creation (nature) was subjected to frailty (to futility, condemned to frustration), not because of some intentional fault on its part, but by the will of Him Who so subjected it–[yet] with the hope [Eccl. 1:2.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That nature (creation) itself will be set free from its bondage to decay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corruption [and gain an entrance] into the glorious freedom of God''s children.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We know that the whole creation [of irrational creatures] has been moaning together in the pains of labor until now. [Jer. 12:4, 11.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And not only the creation, but we ourselves too, who have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy the firstfruits of the [Holy] Spirit [a foretaste of the blissful things to come] groan inwardly as we wait for the redemption of our bodies [from sensuality and the grave, which will reveal] our adoption (our manifestation as God''s sons).'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For in [this] hope we were saved. But hope [the object of] which is seen is not hope. For how can one hope for what he already sees?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if we hope for what is still unseen by us, we wait for it with patience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' composure.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So too the [Holy] Spirit comes to our aid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bears us up in our weakness; for we do not know what prayer to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' how to offer it worthily as we ought, but the Spirit Himself goes to meet our supplication '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleads in our behalf with unspeakable yearnings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groanings too deep for utterance.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He Who searches the hearts of men knows what is in the mind of the [Holy] Spirit [what His intent is], because the Spirit intercedes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleads [before God] in behalf of the saints according to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in harmony with God''s will. [Ps. 139:1, 2.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We are assured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that [God being a partner in their labor] all things work together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are [fitting into a plan] for good to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for those who love God and are called according to [His] design '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For those whom He foreknew [of whom He was aware and loved beforehand], He also destined from the beginning [foreordaining them] to be molded into the image of His Son [and share inwardly His likeness], that He might become the firstborn among many brethren.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For God has done what the Law could not do, [its power] being weakened by the flesh [the entire nature of man without the Holy Spirit]. Sending His own Son in the guise of sinful flesh and as an offering for sin, [God] condemned sin in the flesh [subdued, overcame, deprived it of its power over all who accept that sacrifice], [Lev. 7:37.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those whom He thus foreordained, He also called; and those whom He called, He also justified (acquitted, made righteous, putting them into right standing with Himself). And those whom He justified, He also glorified [raising them to a heavenly dignity and condition or state of being].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What then shall we say to [all] this? If God is for us, who [can be] against us? [Who can be our foe, if God is on our side?] [Ps. 118:6.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who did not withhold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' spare [even] His own Son but gave Him up for us all, will He not also with Him freely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graciously give us all [other] things?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who shall bring any charge against God''s elect [when it is] God Who justifies [that is, Who puts us in right relation to Himself? Who shall come forward and accuse or impeach those whom God has chosen? Will God, Who acquits us?]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who is there to condemn [us]? Will Christ Jesus (the Messiah), Who died, or rather Who was raised from the dead, Who is at the right hand of God actually pleading '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' He intercedes for us?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who shall ever separate us from Christ''s love? Shall suffering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affliction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tribulation? Or calamity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress? Or persecution or hunger or destitution or peril or sword?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even as it is written, For Thy sake we are put to death all the day long; we are regarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counted as sheep for the slaughter. [Ps. 44:22.]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet amid all these things we are more than conquerors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gain a surpassing victory through Him Who loved us.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I am persuaded beyond doubt (am sure) that neither death nor life, nor angels nor principalities, nor things impending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' threatening nor things to come, nor powers,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nor height nor depth, nor anything else in all creation will be able to separate us from the love of God which is in Christ Jesus our Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So that the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' just requirement of the Law might be fully met in us who live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' move not in the ways of the flesh but in the ways of the Spirit [our lives governed not by the standards and according to the dictates of the flesh, but controlled by the Holy Spirit].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For those who are according to the flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are controlled by its unholy desires set their minds on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursue those things which gratify the flesh, but those who are according to the Spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are controlled by the desires of the Spirit set their minds on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek those things which gratify the [Holy] Spirit.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the mind of the flesh [which is sense and reason without the Holy Spirit] is death [death that comprises all the miseries arising from sin, both here and hereafter]. But the mind of the [Holy] Spirit is life and [soul] peace [both now and forever].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [That is] because the mind of the flesh [with its carnal thoughts and purposes] is hostile to God, for it does not submit itself to God''s Law; indeed it cannot.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then those who are living the life of the flesh [catering to the appetites and impulses of their carnal nature] cannot please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' satisfy God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be acceptable to Him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But you are not living the life of the flesh, you are living the life of the Spirit, if the [Holy] Spirit of God [really] dwells within you [directs and controls you]. But if anyone does not possess the [Holy] Spirit of Christ, he is none of His [he does not belong to Christ, is not truly a child of God]. [Rom. 8:14.]'
