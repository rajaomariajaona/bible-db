document_id: PSA.120,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' IN MY distress I cried to the Lord, and He answered me.'
  '2':
  - type: text
    content: ' Deliver me, O Lord, from lying lips and from deceitful tongues.'
  '3':
  - type: text
    content: ' What shall be given to you? Or what more shall be done to you, you deceitful tongue?–'
  '4':
  - type: text
    content: ' Sharp arrows of a [mighty] warrior, with [glowing] coals of the broom tree!'
  '5':
  - type: text
    content: ' Woe is me that I sojourn with Meshech, that I dwell beside the tents of Kedar [as if among notoriously barbarous people]! [Gen. 10:2; 25:13; Jer. 49:28, 29.]'
  '6':
  - type: text
    content: ' My life has too long had its dwelling with him who hates peace.'
  '7':
  - type: text
    content: ' I am for peace; but when I speak, they are for war.'
