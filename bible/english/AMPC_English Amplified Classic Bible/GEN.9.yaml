document_id: GEN.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND GOD pronounced a blessing upon Noah and his sons and said to them, Be fruitful and multiply and fill the earth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And with every living creature that is with you–whether the birds, the livestock, or the wild beasts of the earth along with you, as many as came out of the ark–every animal of the earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' I will establish My covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pledge with you: Never again shall all flesh be cut off by the waters of a flood; neither shall there ever again be a flood to destroy the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make it corrupt.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And God said, This is the token of the covenant (solemn pledge) which I am making between Me and you and every living creature that is with you, for all future generations:'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I set My bow [rainbow] in the cloud, and it shall be a token '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sign of a covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' solemn pledge between Me and the earth.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And it shall be that when I bring clouds over the earth and the bow [rainbow] is seen in the clouds,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' I will [earnestly] remember My covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' solemn pledge which is between Me and you and every living creature of all flesh; and the waters will no more become a flood to destroy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make all flesh corrupt.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' When the bow [rainbow] is in the clouds and I look upon it, I will [earnestly] remember the everlasting covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pledge between God and every living creature of all flesh that is upon the earth.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And God said to Noah, This [rainbow] is the token '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sign of the covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' solemn pledge which I have established between Me and all flesh upon the earth.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The sons of Noah who went forth from the ark were Shem, Ham, and Japheth. Ham was the father of Canaan [born later].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' These are the three sons of Noah, and from them the whole earth was overspread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stocked with inhabitants.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the fear of you and the dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror of you shall be upon every beast of the land, every bird of the air, all that creeps upon the ground, and upon all the fish of the sea; they are delivered into your hand.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Noah began to cultivate the ground, and he planted a vineyard.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And he drank of the wine and became drunk, and he was uncovered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lay naked in his tent.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And Ham, the father of Canaan, glanced at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saw the nakedness of his father and told his two brothers outside.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So Shem and Japheth took a garment, laid it upon the shoulders of both, and went backward and covered the nakedness of their father; and their faces were backward, and they did not see their father''s nakedness.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When Noah awoke from his wine, and knew the thing which his youngest son had done to him,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' He exclaimed, Cursed be Canaan! He shall be the servant of servants to his brethren! [Deut. 27:16.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' He also said, Blessed be the Lord, the God of Shem! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' blessed by the Lord my God be Shem! And let Canaan be his servant.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' May God enlarge Japheth; and let him dwell in the tents of Shem, and let Canaan be his servant.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And Noah lived after the flood 350 years.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' All the days of Noah were 950 years, and he died.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Every moving thing that lives shall be food for you; and as I gave you the green vegetables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plants, I give you everything.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But you shall not eat flesh with the life of it, which is its blood.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And surely for your lifeblood I will require an accounting; from every beast I will require it; and from man, from every man [who spills another''s lifeblood] I will require a reckoning.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Whoever sheds man''s blood, by man shall his blood be shed; for in the image of God He made man.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And you, be fruitful and multiply; bring forth abundantly on the earth and multiply on it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then God spoke to Noah and to his sons with him, saying,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Behold, I establish My covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pledge with you and with your descendants after you'
