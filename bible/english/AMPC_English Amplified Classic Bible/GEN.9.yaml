document_id: GEN.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND GOD pronounced a blessing upon Noah and his sons and said to them, Be fruitful and multiply and fill the earth.'
  '10':
  - type: text
    content: ' And with every living creature that is with you–whether the birds, the livestock, or the wild beasts of the earth along with you, as many as came out of the ark–every animal of the earth.'
  '11':
  - type: text
    content: ' I will establish My covenant '
  - type: text
    content: or
  - type: text
    content: ' pledge with you: Never again shall all flesh be cut off by the waters of a flood; neither shall there ever again be a flood to destroy the earth '
  - type: text
    content: and
  - type: text
    content: ' make it corrupt.'
  '12':
  - type: text
    content: ' And God said, This is the token of the covenant (solemn pledge) which I am making between Me and you and every living creature that is with you, for all future generations:'
  '13':
  - type: text
    content: ' I set My bow [rainbow] in the cloud, and it shall be a token '
  - type: text
    content: or
  - type: text
    content: ' sign of a covenant '
  - type: text
    content: or
  - type: text
    content: ' solemn pledge between Me and the earth.'
  '14':
  - type: text
    content: ' And it shall be that when I bring clouds over the earth and the bow [rainbow] is seen in the clouds,'
  '15':
  - type: text
    content: ' I will [earnestly] remember My covenant '
  - type: text
    content: or
  - type: text
    content: ' solemn pledge which is between Me and you and every living creature of all flesh; and the waters will no more become a flood to destroy '
  - type: text
    content: and
  - type: text
    content: ' make all flesh corrupt.'
  '16':
  - type: text
    content: ' When the bow [rainbow] is in the clouds and I look upon it, I will [earnestly] remember the everlasting covenant '
  - type: text
    content: or
  - type: text
    content: ' pledge between God and every living creature of all flesh that is upon the earth.'
  '17':
  - type: text
    content: ' And God said to Noah, This [rainbow] is the token '
  - type: text
    content: or
  - type: text
    content: ' sign of the covenant '
  - type: text
    content: or
  - type: text
    content: ' solemn pledge which I have established between Me and all flesh upon the earth.'
  '18':
  - type: text
    content: ' The sons of Noah who went forth from the ark were Shem, Ham, and Japheth. Ham was the father of Canaan [born later].'
  '19':
  - type: text
    content: ' These are the three sons of Noah, and from them the whole earth was overspread '
  - type: text
    content: and
  - type: text
    content: ' stocked with inhabitants.'
  '2':
  - type: text
    content: ' And the fear of you and the dread '
  - type: text
    content: and
  - type: text
    content: ' terror of you shall be upon every beast of the land, every bird of the air, all that creeps upon the ground, and upon all the fish of the sea; they are delivered into your hand.'
  '20':
  - type: text
    content: ' And Noah began to cultivate the ground, and he planted a vineyard.'
  '21':
  - type: text
    content: ' And he drank of the wine and became drunk, and he was uncovered '
  - type: text
    content: and
  - type: text
    content: ' lay naked in his tent.'
  '22':
  - type: text
    content: ' And Ham, the father of Canaan, glanced at '
  - type: text
    content: and
  - type: text
    content: ' saw the nakedness of his father and told his two brothers outside.'
  '23':
  - type: text
    content: ' So Shem and Japheth took a garment, laid it upon the shoulders of both, and went backward and covered the nakedness of their father; and their faces were backward, and they did not see their father''s nakedness.'
  '24':
  - type: text
    content: ' When Noah awoke from his wine, and knew the thing which his youngest son had done to him,'
  '25':
  - type: text
    content: ' He exclaimed, Cursed be Canaan! He shall be the servant of servants to his brethren! [Deut. 27:16.]'
  '26':
  - type: text
    content: ' He also said, Blessed be the Lord, the God of Shem! '
  - type: text
    content: And
  - type: text
    content: ' blessed by the Lord my God be Shem! And let Canaan be his servant.'
  '27':
  - type: text
    content: ' May God enlarge Japheth; and let him dwell in the tents of Shem, and let Canaan be his servant.'
  '28':
  - type: text
    content: ' And Noah lived after the flood 350 years.'
  '29':
  - type: text
    content: ' All the days of Noah were 950 years, and he died.'
  '3':
  - type: text
    content: ' Every moving thing that lives shall be food for you; and as I gave you the green vegetables '
  - type: text
    content: and
  - type: text
    content: ' plants, I give you everything.'
  '4':
  - type: text
    content: ' But you shall not eat flesh with the life of it, which is its blood.'
  '5':
  - type: text
    content: ' And surely for your lifeblood I will require an accounting; from every beast I will require it; and from man, from every man [who spills another''s lifeblood] I will require a reckoning.'
  '6':
  - type: text
    content: ' Whoever sheds man''s blood, by man shall his blood be shed; for in the image of God He made man.'
  '7':
  - type: text
    content: ' And you, be fruitful and multiply; bring forth abundantly on the earth and multiply on it.'
  '8':
  - type: text
    content: ' Then God spoke to Noah and to his sons with him, saying,'
  '9':
  - type: text
    content: ' Behold, I establish My covenant '
  - type: text
    content: or
  - type: text
    content: ' pledge with you and with your descendants after you'
