document_id: PRO.24,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BE NOT envious of evil men, nor desire to be with them;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' If you faint in the day of adversity, your strength is small.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Deliver those who are drawn away to death, and those who totter to the slaughter, hold them back [from their doom].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' If you [profess ignorance and] say, Behold, we did not know this, does not He Who weighs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ponders the heart perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consider it? And He Who guards your life, does not He know it? And shall not He render to [you and] every man according to his works?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' My son, eat honey, because it is good, and the drippings of the honeycomb are sweet to your taste.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So shall you know skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom to be thus to your life; if you find it, then shall there be a future '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a reward, and your hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectation shall not be cut off.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Lie not in wait as a wicked man against the dwelling of the [uncompromisingly] righteous (the upright, in right standing with God); destroy not his resting-place;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For a righteous man falls seven times and rises again, but the wicked are overthrown by calamity. [Job 5:19; Ps. 34:19; 37:24; Mic. 7:8.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Rejoice not when your enemy falls, and let not your heart be glad when he stumbles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' is overthrown,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Lest the Lord see it and it be evil in His eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' displease Him, and He turn away His wrath from him [to expend it upon you, the worse offender].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Fret not because of evildoers, neither be envious of the wicked,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For their minds plot oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devise violence, and their lips talk of causing trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vexation.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For there shall be no reward for the evil man; the lamp of the wicked shall be put out.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' My son, [reverently] fear the Lord and the king, and do not associate with those who are given to change [of allegiance, and are revolutionary],'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For their calamity shall rise suddenly, and who knows the punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruin which both [the Lord and the king] will bring upon [the rebellious]?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' These also are sayings of the wise: To discriminate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show partiality, having respect of persons in judging, is not good.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' He who says to the wicked, You are righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innocent–peoples will curse him, nations will defy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abhor him.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But to those [upright judges] who rebuke the wicked, it will go well with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' they will find delight, and a good blessing will be upon them.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' He kisses the lips [and wins the hearts of men] who give a right answer.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' [Put first things first.] Prepare your work outside and get it ready for yourself in the field; and afterward build your house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establish a home.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Be not a witness against your neighbor without cause, and deceive not with your lips. [Eph. 4:25.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Say not, I will do to him as he has done to me; I will pay the man back for his deed. [Prov. 20:22; Matt. 5:39, 44; Rom. 12:17, 19.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Through skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is a house (a life, a home, a family) built, and by understanding it is established [on a sound and good foundation],'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' I went by the field of the lazy man, and by the vineyard of the man void of understanding;'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And, behold, it was all grown over with thorns, and nettles were covering its face, and its stone wall was broken down.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Then I beheld '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' considered it well; I looked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' received instruction.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Yet a little sleep, a little slumber, a little folding of the hands to sleep–'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' So shall your poverty come as a robber, and your want as an armed man.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And by knowledge shall its chambers [of every area] be filled with all precious and pleasant riches.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' A wise man is strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is better than a strong man
    - type: text
      text: ', and a man of knowledge increases '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthens his power; [Prov. 21:22; Eccl. 9:16.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For by wise counsel you can wage your war, and in an abundance of counselors there is victory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' safety.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Wisdom is too high for a fool; he opens not his mouth in the gate [where the city''s rulers sit in judgment].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He who plans to do evil will be called a mischief-maker.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The plans of the foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the thought of foolishness are sin, and the scoffer is an abomination to men.'
