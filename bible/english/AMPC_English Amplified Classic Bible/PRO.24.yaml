document_id: PRO.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BE NOT envious of evil men, nor desire to be with them;'
  '10':
  - type: text
    content: ' If you faint in the day of adversity, your strength is small.'
  '11':
  - type: text
    content: ' Deliver those who are drawn away to death, and those who totter to the slaughter, hold them back [from their doom].'
  '12':
  - type: text
    content: ' If you [profess ignorance and] say, Behold, we did not know this, does not He Who weighs '
  - type: text
    content: and
  - type: text
    content: ' ponders the heart perceive '
  - type: text
    content: and
  - type: text
    content: ' consider it? And He Who guards your life, does not He know it? And shall not He render to [you and] every man according to his works?'
  '13':
  - type: text
    content: ' My son, eat honey, because it is good, and the drippings of the honeycomb are sweet to your taste.'
  '14':
  - type: text
    content: ' So shall you know skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom to be thus to your life; if you find it, then shall there be a future '
  - type: text
    content: and
  - type: text
    content: ' a reward, and your hope '
  - type: text
    content: and
  - type: text
    content: ' expectation shall not be cut off.'
  '15':
  - type: text
    content: ' Lie not in wait as a wicked man against the dwelling of the [uncompromisingly] righteous (the upright, in right standing with God); destroy not his resting-place;'
  '16':
  - type: text
    content: ' For a righteous man falls seven times and rises again, but the wicked are overthrown by calamity. [Job 5:19; Ps. 34:19; 37:24; Mic. 7:8.]'
  '17':
  - type: text
    content: ' Rejoice not when your enemy falls, and let not your heart be glad when he stumbles '
  - type: text
    content: or
  - type: text
    content: ' is overthrown,'
  '18':
  - type: text
    content: ' Lest the Lord see it and it be evil in His eyes '
  - type: text
    content: and
  - type: text
    content: ' displease Him, and He turn away His wrath from him [to expend it upon you, the worse offender].'
  '19':
  - type: text
    content: ' Fret not because of evildoers, neither be envious of the wicked,'
  '2':
  - type: text
    content: ' For their minds plot oppression '
  - type: text
    content: and
  - type: text
    content: ' devise violence, and their lips talk of causing trouble '
  - type: text
    content: and
  - type: text
    content: ' vexation.'
  '20':
  - type: text
    content: ' For there shall be no reward for the evil man; the lamp of the wicked shall be put out.'
  '21':
  - type: text
    content: ' My son, [reverently] fear the Lord and the king, and do not associate with those who are given to change [of allegiance, and are revolutionary],'
  '22':
  - type: text
    content: ' For their calamity shall rise suddenly, and who knows the punishment '
  - type: text
    content: and
  - type: text
    content: ' ruin which both [the Lord and the king] will bring upon [the rebellious]?'
  '23':
  - type: text
    content: ' These also are sayings of the wise: To discriminate '
  - type: text
    content: and
  - type: text
    content: ' show partiality, having respect of persons in judging, is not good.'
  '24':
  - type: text
    content: ' He who says to the wicked, You are righteous '
  - type: text
    content: and
  - type: text
    content: ' innocent–peoples will curse him, nations will defy '
  - type: text
    content: and
  - type: text
    content: ' abhor him.'
  '25':
  - type: text
    content: ' But to those [upright judges] who rebuke the wicked, it will go well with them '
  - type: text
    content: and
  - type: text
    content: ' they will find delight, and a good blessing will be upon them.'
  '26':
  - type: text
    content: ' He kisses the lips [and wins the hearts of men] who give a right answer.'
  '27':
  - type: text
    content: ' [Put first things first.] Prepare your work outside and get it ready for yourself in the field; and afterward build your house '
  - type: text
    content: and
  - type: text
    content: ' establish a home.'
  '28':
  - type: text
    content: ' Be not a witness against your neighbor without cause, and deceive not with your lips. [Eph. 4:25.]'
  '29':
  - type: text
    content: ' Say not, I will do to him as he has done to me; I will pay the man back for his deed. [Prov. 20:22; Matt. 5:39, 44; Rom. 12:17, 19.]'
  '3':
  - type: text
    content: ' Through skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom is a house (a life, a home, a family) built, and by understanding it is established [on a sound and good foundation],'
  '30':
  - type: text
    content: ' I went by the field of the lazy man, and by the vineyard of the man void of understanding;'
  '31':
  - type: text
    content: ' And, behold, it was all grown over with thorns, and nettles were covering its face, and its stone wall was broken down.'
  '32':
  - type: text
    content: ' Then I beheld '
  - type: text
    content: and
  - type: text
    content: ' considered it well; I looked '
  - type: text
    content: and
  - type: text
    content: ' received instruction.'
  '33':
  - type: text
    content: ' Yet a little sleep, a little slumber, a little folding of the hands to sleep–'
  '34':
  - type: text
    content: ' So shall your poverty come as a robber, and your want as an armed man.'
  '4':
  - type: text
    content: ' And by knowledge shall its chambers [of every area] be filled with all precious and pleasant riches.'
  '5':
  - type: text
    content: ' A wise man is strong '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: is better than a strong man
  - type: text
    content: ', and a man of knowledge increases '
  - type: text
    content: and
  - type: text
    content: ' strengthens his power; [Prov. 21:22; Eccl. 9:16.]'
  '6':
  - type: text
    content: ' For by wise counsel you can wage your war, and in an abundance of counselors there is victory '
  - type: text
    content: and
  - type: text
    content: ' safety.'
  '7':
  - type: text
    content: ' Wisdom is too high for a fool; he opens not his mouth in the gate [where the city''s rulers sit in judgment].'
  '8':
  - type: text
    content: ' He who plans to do evil will be called a mischief-maker.'
  '9':
  - type: text
    content: ' The plans of the foolish '
  - type: text
    content: and
  - type: text
    content: ' the thought of foolishness are sin, and the scoffer is an abomination to men.'
