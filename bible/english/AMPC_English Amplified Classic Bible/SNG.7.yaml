document_id: SNG.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [THEN HER companions began noticing and commenting on the attractiveness of her person] How beautiful are your feet in sandals, O queenly maiden! Your rounded limbs are like jeweled chains, the work of a master hand.'
  '10':
  - type: text
    content: ' [She proudly said] I am my beloved''s, and his desire is toward me! [John 10:28.]'
  '11':
  - type: text
    content: ' [She said] Come, my beloved! Let us go forth into the field, let us lodge in the villages. [Luke 14:33.]'
  '12':
  - type: text
    content: ' Let us go out early to the vineyards and see whether the vines have budded, whether the grape blossoms have opened, and whether the pomegranates are in bloom. There I will give you my love.'
  '13':
  - type: text
    content: ' The mandrakes give forth fragrance, and over our doors are all manner of choice fruits, new and old, which I have laid up for you, O my beloved!'
  '2':
  - type: text
    content: ' Your body is like a round goblet in which no mixed wine is wanting. Your abdomen is like a heap of wheat set about with lilies.'
  '3':
  - type: text
    content: ' Your two breasts are like two fawns, the twins of a gazelle.'
  '4':
  - type: text
    content: ' Your neck is like a tower of ivory, your eyes like the pools of Heshbon by the gate of Bath-rabbim. Your nose is like the tower of Lebanon which looks toward Damascus.'
  '5':
  - type: text
    content: ' Your head crowns you like Mount Carmel, and the hair of your head like purple. [Then seeing the king watching the girl in absorbed admiration, the speaker added] The king is held captive by its tresses.'
  '6':
  - type: text
    content: ' [The king came forward, saying] How fair and how pleasant you are, O love, with your delights!'
  '7':
  - type: text
    content: ' Your stature is like that of a palm tree, and your bosom like its clusters [of dates, declared the king].'
  '8':
  - type: text
    content: ' I resolve that I will climb the palm tree; I will grasp its branches. Let your breasts be like clusters of the grapevine, and the scent of your breath like apples,'
  '9':
  - type: text
    content: ' And your kisses like the best wine–[then the Shulammite interrupted] that goes down smoothly '
  - type: text
    content: and
  - type: text
    content: ' sweetly for my beloved [shepherd, kisses] gliding over his lips while he sleeps!'
