document_id: MRK.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THOSE days when [again] an immense crowd had gathered and they had nothing to eat, Jesus called His disciples to Him and told them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sympathy for the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My heart goes out to them, for they have been with Me now three days and have nothing [left] to eat;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And if I send them away to their homes hungry, they will be feeble through exhaustion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint along the road; and some of them have come a long way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And His disciples replied to Him, How can anyone fill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfy [these people] with loaves of bread here in [this] desolate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uninhabited region?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He asked them, How many loaves have you? They said, Seven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He commanded the multitude to recline upon the ground, and He [then] took the seven loaves [of bread] and, having given thanks, He broke them and kept on giving them to His disciples to put before [the people], and they placed them before the crowd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they had a few small fish; and when He had praised God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' asked Him to bless them [to their use], He ordered that these also should be set before [them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they ate and were satisfied; and they took up seven [large provision] baskets full of the broken pieces left over.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And there were about 4,000 people. And He dismissed them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And at once He got into the boat with His disciples and went to the district of Dalmanutha (or Magdala).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Pharisees came and began to argue with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' question Him, demanding from Him a sign (an attesting miracle from heaven) [maliciously] to test Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And He groaned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sighed deeply in His spirit and said, Why does this generation demand a sign? Positively I say to you, no sign shall be given this generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And He went away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left them and, getting into the boat again, He departed to the other side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now they had [completely] forgotten to bring bread, and they had only one loaf with them in the boat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Jesus [repeatedly and expressly] charged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admonished them, saying, Look out; keep on your guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beware of the leaven of the Pharisees and the leaven of Herod '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and the Herodians
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they discussed it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reasoned with one another, It is because we have no bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And being aware [of it], Jesus said to them, Why are you reasoning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saying it is because you have no bread? Do you not yet discern or understand? Are your hearts in [a settled state of] hardness? [Isa. 6:9, 10; Jer. 5:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Having eyes, do you not see [with them], and having ears, do you not hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand the sense of what is said? And do you not remember?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' When I broke the five loaves for the 5,000, how many [small hand] baskets full of broken pieces did you take up? They said to Him, Twelve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And [when I broke] the seven loaves for the 4,000, how many [large provision] baskets full of broken pieces did you take up? And they said to Him, Seven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And He kept repeating, Do you not yet understand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they came to Bethsaida. And [people] brought to Him a blind man and begged Him to touch him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And He caught the blind man by the hand and led him out of the village; and when He had spit on his eyes and put His hands upon him, He asked him, Do you [possibly] see anything?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he looked up and said, I see people, but [they look] like trees, walking.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then He put His hands on his eyes again; and the man looked intently [that is, fixed his eyes on definite objects], and he was restored and saw everything distinctly [even what was at a distance].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And He sent him away to his house, telling [him], Do not [even] enter the village '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or tell anyone there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Jesus went on with His disciples to the villages of Caesarea Philippi; and on the way He asked His disciples, Who do people say that I am?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they answered [Him], John the Baptist; and others [say], Elijah; but others, one of the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And He asked them, But who do you yourselves say that I am? Peter replied to Him, You are the Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And He charged them sharply to tell no one about Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And He began to teach them that the Son of Man must of necessity suffer many things and be tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disapproved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected by the elders and the chief priests and the scribes, and be put to death, and after three days rise again [from death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And He said this freely (frankly, plainly, and explicitly, making it unmistakable). And Peter took Him by the hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led Him aside and then [facing Him] began to rebuke Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But turning around [His back to Peter] and seeing His disciples, He rebuked Peter, saying, Get behind Me, Satan! For you do not have a mind intent on promoting what God wills, but what pleases men [you are not on God''s side, but that of men].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Jesus called [to Him] the throng with His disciples and said to them, If anyone intends to come after Me, let him deny himself [forget, ignore, disown, and lose sight of himself and his own interests] and take up his cross, and [joining Me as a disciple and siding with My party] follow with Me [continually, cleaving steadfastly to Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' For whoever wants to save his [higher, spiritual, eternal] life, will lose it [the lower, natural, temporal life which is lived only on earth]; and whoever gives up his life [which is lived only on earth] for My sake and the Gospel''s will save it [his higher, spiritual life in the eternal kingdom of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For what does it profit a man to gain the whole world, and forfeit his life [in the eternal kingdom of God]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For what can a man give as an exchange (a compensation, a ransom, in return) for his [blessed] life [in the eternal kingdom of God]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' For whoever is ashamed [here and now] of Me and My words in this adulterous (unfaithful) and [preeminently] sinful generation, of him will the Son of Man also be ashamed when He comes in the glory (splendor and majesty) of His Father with the holy angels.'
