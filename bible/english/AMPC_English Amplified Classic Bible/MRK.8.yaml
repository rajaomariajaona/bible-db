document_id: MRK.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THOSE days when [again] an immense crowd had gathered and they had nothing to eat, Jesus called His disciples to Him and told them,'
  '10':
  - type: text
    content: ' And at once He got into the boat with His disciples and went to the district of Dalmanutha (or Magdala).'
  '11':
  - type: text
    content: ' The Pharisees came and began to argue with '
  - type: text
    content: and
  - type: text
    content: ' question Him, demanding from Him a sign (an attesting miracle from heaven) [maliciously] to test Him.'
  '12':
  - type: text
    content: ' And He groaned '
  - type: text
    content: and
  - type: text
    content: ' sighed deeply in His spirit and said, Why does this generation demand a sign? Positively I say to you, no sign shall be given this generation.'
  '13':
  - type: text
    content: ' And He went away '
  - type: text
    content: and
  - type: text
    content: ' left them and, getting into the boat again, He departed to the other side.'
  '14':
  - type: text
    content: ' Now they had [completely] forgotten to bring bread, and they had only one loaf with them in the boat.'
  '15':
  - type: text
    content: ' And Jesus [repeatedly and expressly] charged '
  - type: text
    content: and
  - type: text
    content: ' admonished them, saying, Look out; keep on your guard '
  - type: text
    content: and
  - type: text
    content: ' beware of the leaven of the Pharisees and the leaven of Herod '
  - type: text
    content: and the Herodians
  - type: text
    content: .
  '16':
  - type: text
    content: ' And they discussed it '
  - type: text
    content: and
  - type: text
    content: ' reasoned with one another, It is because we have no bread.'
  '17':
  - type: text
    content: ' And being aware [of it], Jesus said to them, Why are you reasoning '
  - type: text
    content: and
  - type: text
    content: ' saying it is because you have no bread? Do you not yet discern or understand? Are your hearts in [a settled state of] hardness? [Isa. 6:9, 10; Jer. 5:21.]'
  '18':
  - type: text
    content: ' Having eyes, do you not see [with them], and having ears, do you not hear '
  - type: text
    content: and
  - type: text
    content: ' perceive '
  - type: text
    content: and
  - type: text
    content: ' understand the sense of what is said? And do you not remember?'
  '19':
  - type: text
    content: ' When I broke the five loaves for the 5,000, how many [small hand] baskets full of broken pieces did you take up? They said to Him, Twelve.'
  '2':
  - type: text
    content: ' I have pity '
  - type: text
    content: and
  - type: text
    content: ' sympathy for the people '
  - type: text
    content: and
  - type: text
    content: ' My heart goes out to them, for they have been with Me now three days and have nothing [left] to eat;'
  '20':
  - type: text
    content: ' And [when I broke] the seven loaves for the 4,000, how many [large provision] baskets full of broken pieces did you take up? And they said to Him, Seven.'
  '21':
  - type: text
    content: ' And He kept repeating, Do you not yet understand?'
  '22':
  - type: text
    content: ' And they came to Bethsaida. And [people] brought to Him a blind man and begged Him to touch him.'
  '23':
  - type: text
    content: ' And He caught the blind man by the hand and led him out of the village; and when He had spit on his eyes and put His hands upon him, He asked him, Do you [possibly] see anything?'
  '24':
  - type: text
    content: ' And he looked up and said, I see people, but [they look] like trees, walking.'
  '25':
  - type: text
    content: ' Then He put His hands on his eyes again; and the man looked intently [that is, fixed his eyes on definite objects], and he was restored and saw everything distinctly [even what was at a distance].'
  '26':
  - type: text
    content: ' And He sent him away to his house, telling [him], Do not [even] enter the village '
  - type: text
    content: or tell anyone there.
  '27':
  - type: text
    content: ' And Jesus went on with His disciples to the villages of Caesarea Philippi; and on the way He asked His disciples, Who do people say that I am?'
  '28':
  - type: text
    content: ' And they answered [Him], John the Baptist; and others [say], Elijah; but others, one of the prophets.'
  '29':
  - type: text
    content: ' And He asked them, But who do you yourselves say that I am? Peter replied to Him, You are the Christ (the Messiah, the Anointed One).'
  '3':
  - type: text
    content: ' And if I send them away to their homes hungry, they will be feeble through exhaustion '
  - type: text
    content: and
  - type: text
    content: ' faint along the road; and some of them have come a long way.'
  '30':
  - type: text
    content: ' And He charged them sharply to tell no one about Him.'
  '31':
  - type: text
    content: ' And He began to teach them that the Son of Man must of necessity suffer many things and be tested '
  - type: text
    content: and
  - type: text
    content: ' disapproved '
  - type: text
    content: and
  - type: text
    content: ' rejected by the elders and the chief priests and the scribes, and be put to death, and after three days rise again [from death].'
  '32':
  - type: text
    content: ' And He said this freely (frankly, plainly, and explicitly, making it unmistakable). And Peter took Him by the hand '
  - type: text
    content: and
  - type: text
    content: ' led Him aside and then [facing Him] began to rebuke Him.'
  '33':
  - type: text
    content: ' But turning around [His back to Peter] and seeing His disciples, He rebuked Peter, saying, Get behind Me, Satan! For you do not have a mind intent on promoting what God wills, but what pleases men [you are not on God''s side, but that of men].'
  '34':
  - type: text
    content: ' And Jesus called [to Him] the throng with His disciples and said to them, If anyone intends to come after Me, let him deny himself [forget, ignore, disown, and lose sight of himself and his own interests] and take up his cross, and [joining Me as a disciple and siding with My party] follow with Me [continually, cleaving steadfastly to Me].'
  '35':
  - type: text
    content: ' For whoever wants to save his [higher, spiritual, eternal] life, will lose it [the lower, natural, temporal life which is lived only on earth]; and whoever gives up his life [which is lived only on earth] for My sake and the Gospel''s will save it [his higher, spiritual life in the eternal kingdom of God].'
  '36':
  - type: text
    content: ' For what does it profit a man to gain the whole world, and forfeit his life [in the eternal kingdom of God]?'
  '37':
  - type: text
    content: ' For what can a man give as an exchange (a compensation, a ransom, in return) for his [blessed] life [in the eternal kingdom of God]?'
  '38':
  - type: text
    content: ' For whoever is ashamed [here and now] of Me and My words in this adulterous (unfaithful) and [preeminently] sinful generation, of him will the Son of Man also be ashamed when He comes in the glory (splendor and majesty) of His Father with the holy angels.'
  '4':
  - type: text
    content: ' And His disciples replied to Him, How can anyone fill '
  - type: text
    content: and
  - type: text
    content: ' satisfy [these people] with loaves of bread here in [this] desolate '
  - type: text
    content: and
  - type: text
    content: ' uninhabited region?'
  '5':
  - type: text
    content: ' And He asked them, How many loaves have you? They said, Seven.'
  '6':
  - type: text
    content: ' And He commanded the multitude to recline upon the ground, and He [then] took the seven loaves [of bread] and, having given thanks, He broke them and kept on giving them to His disciples to put before [the people], and they placed them before the crowd.'
  '7':
  - type: text
    content: ' And they had a few small fish; and when He had praised God '
  - type: text
    content: and
  - type: text
    content: ' given thanks '
  - type: text
    content: and
  - type: text
    content: ' asked Him to bless them [to their use], He ordered that these also should be set before [them].'
  '8':
  - type: text
    content: ' And they ate and were satisfied; and they took up seven [large provision] baskets full of the broken pieces left over.'
  '9':
  - type: text
    content: ' And there were about 4,000 people. And He dismissed them,'
