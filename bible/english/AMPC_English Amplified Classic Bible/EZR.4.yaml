document_id: EZR.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW WHEN [the Samaritans] the adversaries of Judah and Benjamin heard that the exiles from the captivity were building a temple to the Lord, the God of Israel,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the rest of the nations whom the great and noble Osnappar deported and settled in the city of Samaria and the rest of the country beyond [west of] the Euphrates River, and so forth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is a copy of the letter which they sent to King Artaxerxes: Your servants, the men beyond [that is, west of] the River [Euphrates], and so forth.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be it known to the king that the Jews who came up from you to us have come to Jerusalem. This rebellious and bad city they are rebuilding, and have restored its walls and repaired the foundations.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be it known now to the king that if this city is rebuilt and the walls finished, then they will not pay tribute, custom, or toll, and the royal revenue will be diminished.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now because we eat the salt of the king''s palace and it is not proper for us to witness the king''s discredit, therefore we send to inform the king,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In order that a search may be made in the book of the records of your fathers, in which you will learn that this is a rebellious city, hurtful to kings and provinces, and that sedition was stirred up in it of old. That is why [it] was laid waste.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We declare to the king that if this city is rebuilt and its walls finished, it will mean that you will have no portion on this side of the [Euphrates] River.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the king sent an answer: To Rehum the [Persian] official, to Shimshai the scribe, to the rest of their companions who dwell in Samaria and in the rest of the country beyond the River: Greetings.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The letter which you sent to us has been plainly read before me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I commanded and search has been made, and it is found that this city [Jerusalem] of old time has made insurrection against kings and that rebellion and sedition have been made in it.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They came to Zerubbabel [now governor] and to the heads of the fathers'' houses and said, Let us build with you, for we seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship your God as you do, and we have sacrificed to Him since the days of Esarhaddon king of Assyria, who brought us here. [II Kings 17:24-29.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There have been mighty kings also over Jerusalem who have ruled over all countries beyond [west of] the [Euphrates] River, and tribute, custom, and toll were paid to them.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore give a decree to make these men stop, that this city not be rebuilt, until a command is given by me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be sure that you do this. Why should damage grow, to the hurt of the kings?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the copy of King Artaxerxes'' letter was read before Rehum, Shimshai the scribe, and their companions, they went up in haste to Jerusalem to the Jews and by force and power made them cease.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the work on the house of God in Jerusalem stopped. It stopped until the second year of Darius [I] king of Persia.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Zerubbabel and Jeshua and the rest of the heads of fathers'' houses of Israel said to them, You have nothing to do with us in building a house to our God; but we ourselves will together build to the Lord, the God of Israel, as King Cyrus, the king of Persia, has commanded us.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then [the Samaritans] the people of the land [continually] weakened the hands of the people of Judah and troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified them in building'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And hired counselors against them to frustrate their purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans all the days of Cyrus king of Persia, even until the reign of Darius [II] king of Persia.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in the reign of Ahasuerus [or Xerxes], in the beginning of his reign, [the Samaritans] wrote to him an accusation against the [returned] inhabitants of Judah and Jerusalem.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Later, in the days of King Artaxerxes, Bishlam, Mithredath, Tabeel, and the rest of their associates wrote to Artaxerxes king of Persia; and the letter was written in the Syrian '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Aramaic script and interpreted in that language.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rehum the [Persian] commander [of the Samaritans] and Shimshai the scribe wrote a letter against Jerusalem to Artaxerxes the king of this sort–'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then wrote Rehum the [Persian] commander, Shimshai the scribe, and the rest of their associates–the Dinaites, the Apharsathchites, the Tarpelites, the Apharsites, the Archevites, the Babylonians, the Susanchites, the Dehaites, the Elamites,'
