document_id: JER.26,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE beginning of the reign of Jehoiakim son of Josiah king of Judah came this word from the Lord:'
  '10':
  - type: text
    content: ' When the princes of Judah heard these things, they came up from the king''s house to the house of the Lord and sat down in the entry of the New Gate of the house of the Lord.'
  '11':
  - type: text
    content: ' Then the priests and the prophets said to the princes and to all the people, This man is deserving of death, for he has prophesied against this city, as you have heard with your own ears.'
  '12':
  - type: text
    content: ' Then Jeremiah said to all the princes and to all the people: The Lord sent me to prophesy against this house and against this city all the words that you have heard.'
  '13':
  - type: text
    content: ' Therefore now amend your ways and your doings and obey the voice of the Lord your God; then the Lord will relent '
  - type: text
    content: and
  - type: text
    content: ' reverse the decision concerning the evil which He has pronounced against you.'
  '14':
  - type: text
    content: ' As for me, behold, I am in your hands; do with me as seems good and suitable to you.'
  '15':
  - type: text
    content: ' But know for certain that if you put me to death, you will bring innocent blood upon yourselves and upon this city and upon its inhabitants, for in truth the Lord has sent me to you to speak all these words in your hearing.'
  '16':
  - type: text
    content: ' Then said the princes and all the people to the priests and to the prophets: This man is not deserving of death, for he has spoken to us in the name of the Lord our God.'
  '17':
  - type: text
    content: ' Then certain of the elders of the land arose and said to all the assembly of the people,'
  '18':
  - type: text
    content: ' Micah of Moresheth prophesied in the days of Hezekiah king of Judah and said to all the people of Judah, Thus says the Lord of hosts: Zion shall be plowed like a field, and Jerusalem shall become heaps [of ruins], and the mountain of the house [of the Lord–Mount Moriah, on which stands the temple, shall become covered not with buildings, but] like a densely wooded height. [Mic. 3:12.]'
  '19':
  - type: text
    content: ' Did Hezekiah king of Judah and all Judah put [Micah] to death? Did he not [reverently] fear the Lord and entreat the Lord? And did not the Lord relent '
  - type: text
    content: and
  - type: text
    content: ' reverse the decision concerning the evil which He had pronounced against them? But [here] we are thinking of committing what will be a great evil against ourselves.'
  '2':
  - type: text
    content: ' Thus says the Lord: Stand in the court of the Lord''s house [Jeremiah] and speak to all [the people of] the cities of Judah who come to worship in the Lord''s house all the words that I command you to speak to them; subtract not a word.'
  '20':
  - type: text
    content: ' And there was also a man who prophesied in the name of the Lord, Uriah son of Shemaiah of Kiriath-jearim, who prophesied against this city and against this land in words similar to those of Jeremiah.'
  '21':
  - type: text
    content: ' And when Jehoiakim the king, with all his mighty men and all the princes, heard his words, the king sought to put [Uriah] to death; but when Uriah heard of it, he was afraid and fled and escaped to Egypt.'
  '22':
  - type: text
    content: ' And Jehoiakim the king sent men into Egypt, namely, Elnathan son of Achbor and certain other men [who went] with him into Egypt.'
  '23':
  - type: text
    content: ' And they fetched Uriah from Egypt and brought him to Jehoiakim the king, who slew him [God''s spokesman] with the sword and cast his dead body among the graves of the common people.'
  '24':
  - type: text
    content: ' But the hand of Ahikam son of Shaphan was with Jeremiah, that he might not be given into the hands of the people to put him [also] to death.'
  '3':
  - type: text
    content: ' It may be that they will listen and turn every man from his evil way, that I may relent '
  - type: text
    content: and
  - type: text
    content: ' reverse My decision concerning the evil which I purpose to do to them because of their evil doings.'
  '4':
  - type: text
    content: ' And you will say to them, Thus says the Lord: If you will not listen to '
  - type: text
    content: and
  - type: text
    content: ' obey Me, to walk in My law, which I have set before you,'
  '5':
  - type: text
    content: ' And to hear '
  - type: text
    content: and
  - type: text
    content: ' obey the words of My servants the prophets, whom I have sent to you urgently '
  - type: text
    content: and
  - type: text
    content: ' persistently–though you have not listened '
  - type: text
    content: and
  - type: text
    content: ' obeyed–'
  '6':
  - type: text
    content: ' Then will I make this house [the temple] like Shiloh [the home of the Tent of Meeting, abandoned and later destroyed after the ark was captured by the Philistines], and I will make this city subject to the curses of all nations of the earth [so vile in their sight will it be]. [I Sam. 4; Jer. 7:12.]'
  '7':
  - type: text
    content: ' And the priests and the [false] prophets and all the people heard Jeremiah speaking these words in the house of the Lord.'
  '8':
  - type: text
    content: ' Now when Jeremiah had finished speaking all that the Lord had commanded him to speak to all the people, the priests and the [false] prophets and all the people seized him, saying, You shall surely die!'
  '9':
  - type: text
    content: ' Why have you prophesied in the name of the Lord, saying, This house shall be like Shiloh [after the ark of the Lord had been taken by our enemies] and this city [Jerusalem] shall be desolate, without inhabitant? And all the people were gathered around Jeremiah in the [outer area of the] house of the Lord.'
