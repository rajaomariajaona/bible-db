document_id: PSA.92,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm. A song for the Sabbath day.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IT IS a good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delightful thing to give thanks to the Lord, to sing praises [with musical accompaniment] to Your name, O Most High,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But my horn (emblem of excessive strength and stately grace) You have exalted like that of a wild ox; I am anointed with fresh oil.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My eye looks upon those who lie in wait for me; my ears hear the evildoers that rise up against me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The [uncompromisingly] righteous shall flourish like the palm tree [be long-lived, stately, upright, useful, and fruitful]; they shall grow like a cedar in Lebanon [majestic, stable, durable, and incorruptible].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Planted in the house of the Lord, they shall flourish in the courts of our God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' [Growing in grace] they shall still bring forth fruit in old age; they shall be full of sap [of spiritual vitality] and [rich in the] verdure [of trust, love, and contentment].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [They are living memorials] to show that the Lord is upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful to His promises; He is my Rock, and there is no unrighteousness in Him. [Rom. 9:14.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' To show forth Your loving-kindness in the morning and Your faithfulness by night,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' With an instrument of ten strings and with the lute, with a solemn sound upon the lyre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For You, O Lord, have made me glad by Your works; at the deeds of Your hands I joyfully sing.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' How great are Your doings, O Lord! Your thoughts are very deep.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' A man in his rude '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uncultivated state knows not, neither does a [self-confident] fool understand this:'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' That though the wicked spring up like grass and all evildoers flourish, they are doomed to be destroyed forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But You, Lord, are on high forever.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For behold, Your adversaries, O Lord, for behold, Your enemies shall perish; all the evildoers shall be scattered.'
