document_id: PSA.92,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm. A song for the Sabbath day.
  - type: text
    content: ' IT IS a good '
  - type: text
    content: and
  - type: text
    content: ' delightful thing to give thanks to the Lord, to sing praises [with musical accompaniment] to Your name, O Most High,'
  '10':
  - type: text
    content: ' But my horn (emblem of excessive strength and stately grace) You have exalted like that of a wild ox; I am anointed with fresh oil.'
  '11':
  - type: text
    content: ' My eye looks upon those who lie in wait for me; my ears hear the evildoers that rise up against me.'
  '12':
  - type: text
    content: ' The [uncompromisingly] righteous shall flourish like the palm tree [be long-lived, stately, upright, useful, and fruitful]; they shall grow like a cedar in Lebanon [majestic, stable, durable, and incorruptible].'
  '13':
  - type: text
    content: ' Planted in the house of the Lord, they shall flourish in the courts of our God.'
  '14':
  - type: text
    content: ' [Growing in grace] they shall still bring forth fruit in old age; they shall be full of sap [of spiritual vitality] and [rich in the] verdure [of trust, love, and contentment].'
  '15':
  - type: text
    content: ' [They are living memorials] to show that the Lord is upright '
  - type: text
    content: and
  - type: text
    content: ' faithful to His promises; He is my Rock, and there is no unrighteousness in Him. [Rom. 9:14.]'
  '2':
  - type: text
    content: ' To show forth Your loving-kindness in the morning and Your faithfulness by night,'
  '3':
  - type: text
    content: ' With an instrument of ten strings and with the lute, with a solemn sound upon the lyre.'
  '4':
  - type: text
    content: ' For You, O Lord, have made me glad by Your works; at the deeds of Your hands I joyfully sing.'
  '5':
  - type: text
    content: ' How great are Your doings, O Lord! Your thoughts are very deep.'
  '6':
  - type: text
    content: ' A man in his rude '
  - type: text
    content: and
  - type: text
    content: ' uncultivated state knows not, neither does a [self-confident] fool understand this:'
  '7':
  - type: text
    content: ' That though the wicked spring up like grass and all evildoers flourish, they are doomed to be destroyed forever.'
  '8':
  - type: text
    content: ' But You, Lord, are on high forever.'
  '9':
  - type: text
    content: ' For behold, Your adversaries, O Lord, for behold, Your enemies shall perish; all the evildoers shall be scattered.'
