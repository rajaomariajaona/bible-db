  '1':
  - type: heading
    content: The Master You’ve Been Looking For
  - type: text
    content: '“Look! I’m sending my messenger on ahead to clear the way for me. Suddenly, out of the blue, the Leader you’ve been looking for will enter his Temple—yes, the Messenger of the Covenant, the one you’ve been waiting for. Look! He’s on his way!” A Message from the mouth of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '12':
  - type: text
    content: '“You’ll be voted ‘Happiest Nation.’ You’ll experience what it’s like to be a country of grace.” '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies says so.
  - type: heading
    content: The Difference Between Serving God and Not Serving Him
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' says, “You have spoken hard, rude words to me.'
  - type: text
    content: “You ask, ‘When did we ever do that?’
  '14':
  - type: text
    content: '“When you said, ‘It doesn’t pay to serve God. What do we ever get out of it? When we did what he said and went around with long faces, serious about '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, what difference did it make? Those who take life into their own hands are the lucky ones. They break all the rules and get ahead anyway. They push God to the limit and get by with it.’”
  '16':
  - type: text
    content: 'Then those whose lives honored '
  - type: text
    content: God
  - type: text
    content: ' got together and talked it over. '
  - type: text
    content: God
  - type: text
    content: ' saw what they were doing and listened in. A book was opened in God’s presence and minutes were taken of the meeting, with the names of the '
  - type: text
    content: God
  - type: text
    content: '-fearers written down, all the names of those who honored '
  - type: text
    content: God
  - type: text
    content: ’s name.
  '17':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies said, “They’re mine, all mine. They’ll get special treatment when I go into action. I treat them with the same consideration and kindness that parents give the child who honors them. Once more you’ll see the difference it makes between being a person who does the right thing and one who doesn’t, between serving God and not serving him.”
  '2':
  - type: text
    content: But who will be able to stand up to that coming? Who can survive his appearance?
  - type: text
    content: 'He’ll be like white-hot fire from the smelter’s furnace. He’ll be like the strongest lye soap at the laundry. He’ll take his place as a refiner of silver, as a cleanser of dirty clothes. He’ll scrub the Levite priests clean, refine them like gold and silver, until they’re fit for '
  - type: text
    content: God
  - type: text
    content: ', fit to present offerings of righteousness. Then, and only then, will Judah and Jerusalem be fit and pleasing to '
  - type: text
    content: God
  - type: text
    content: ', as they used to be in the years long ago.'
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: '“Yes, I’m on my way to visit you with Judgment. I’ll present compelling evidence against sorcerers, adulterers, liars, those who exploit workers, those who take advantage of widows and orphans, those who are inhospitable to the homeless—anyone and everyone who doesn’t honor me.” A Message from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: '“I am '
  - type: text
    content: God
  - type: text
    content: '—yes, I '
  - type: text
    content: Am
  - type: text
    content: '. I haven’t changed. And because I haven’t changed, you, the descendants of Jacob, haven’t been destroyed. You have a long history of ignoring my commands. You haven’t done a thing I’ve told you. Return to me so I can return to you,” says '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: “You ask, ‘But how do we return?’
  '8':
  - type: text
    content: “Begin by being honest. Do honest people rob God? But you rob me day after day.
  - type: text
    content: “You ask, ‘How have we robbed you?’
  - type: text
    content: '“The tithe and the offering—that’s how! And now you’re under a curse—the whole lot of you—because you’re robbing me. Bring your full tithe to the Temple treasury so there will be ample provisions in my Temple. Test me in this and see if I don’t open up heaven itself to you and pour out blessings beyond your wildest dreams. For my part, I will defend you against marauders, protect your wheat fields and vegetable gardens against plunderers.” The Message of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
