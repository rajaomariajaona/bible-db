document_id: MAL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Master You’ve Been Looking For
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Look! I’m sending my messenger on ahead to clear the way for me. Suddenly, out of the blue, the Leader you’ve been looking for will enter his Temple—yes, the Messenger of the Covenant, the one you’ve been waiting for. Look! He’s on his way!” A Message from the mouth of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: But who will be able to stand up to that coming? Who can survive his appearance?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He’ll be like white-hot fire from the smelter’s furnace. He’ll be like the strongest lye soap at the laundry. He’ll take his place as a refiner of silver, as a cleanser of dirty clothes. He’ll scrub the Levite priests clean, refine them like gold and silver, until they’re fit for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', fit to present offerings of righteousness. Then, and only then, will Judah and Jerusalem be fit and pleasing to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', as they used to be in the years long ago.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Yes, I’m on my way to visit you with Judgment. I’ll present compelling evidence against sorcerers, adulterers, liars, those who exploit workers, those who take advantage of widows and orphans, those who are inhospitable to the homeless—anyone and everyone who doesn’t honor me.” A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: '“I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—yes, I '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Am
  - type: text
    text: '. I haven’t changed. And because I haven’t changed, you, the descendants of Jacob, haven’t been destroyed. You have a long history of ignoring my commands. You haven’t done a thing I’ve told you. Return to me so I can return to you,” says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: p
  children:
  - type: text
    text: “You ask, ‘But how do we return?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: “Begin by being honest. Do honest people rob God? But you rob me day after day.
- type: usfm
  marker: p
  children:
  - type: text
    text: “You ask, ‘How have we robbed you?’
- type: usfm
  marker: p
  children:
  - type: text
    text: '“The tithe and the offering—that’s how! And now you’re under a curse—the whole lot of you—because you’re robbing me. Bring your full tithe to the Temple treasury so there will be ample provisions in my Temple. Test me in this and see if I don’t open up heaven itself to you and pour out blessings beyond your wildest dreams. For my part, I will defend you against marauders, protect your wheat fields and vegetable gardens against plunderers.” The Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“You’ll be voted ‘Happiest Nation.’ You’ll experience what it’s like to be a country of grace.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies says so.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Difference Between Serving God and Not Serving Him
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, “You have spoken hard, rude words to me.'
- type: usfm
  marker: p
  children:
  - type: text
    text: “You ask, ‘When did we ever do that?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: '“When you said, ‘It doesn’t pay to serve God. What do we ever get out of it? When we did what he said and went around with long faces, serious about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, what difference did it make? Those who take life into their own hands are the lucky ones. They break all the rules and get ahead anyway. They push God to the limit and get by with it.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then those whose lives honored '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' got together and talked it over. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saw what they were doing and listened in. A book was opened in God’s presence and minutes were taken of the meeting, with the names of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-fearers written down, all the names of those who honored '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies said, “They’re mine, all mine. They’ll get special treatment when I go into action. I treat them with the same consideration and kindness that parents give the child who honors them. Once more you’ll see the difference it makes between being a person who does the right thing and one who doesn’t, between serving God and not serving him.”
