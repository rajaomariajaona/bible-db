document_id: JER.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Time and Again We’ve Betrayed God
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message that came to Jeremiah regarding the drought:'
  - type: text
    content: “Judah weeps,
  - type: text
    content: her cities mourn.
  - type: text
    content: The people fall to the ground, moaning,
  - type: text
    content: while sounds of Jerusalem’s sobs rise up, up.
  - type: text
    content: The rich people sent their servants for water.
  - type: text
    content: They went to the cisterns, but the cisterns were dry.
  - type: text
    content: They came back with empty buckets,
  - type: text
    content: wringing their hands, shaking their heads.
  - type: text
    content: All the farm work has stopped.
  - type: text
    content: Not a drop of rain has fallen.
  - type: text
    content: The farmers don’t know what to do.
  - type: text
    content: They wring their hands, they shake their heads.
  - type: text
    content: Even the doe abandons her fawn in the field
  - type: text
    content: because there is no grass—
  - type: text
    content: Eyes glazed over, on her last legs,
  - type: text
    content: nothing but skin and bones.”
  '10':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' said of these people:'
  - type: text
    content: “Since they loved to wander this way and that,
  - type: text
    content: never giving a thought to where they were going,
  - type: text
    content: I will now have nothing more to do with them—
  - type: text
    content: except to note their guilt and punish their sins.”
  - type: heading
    content: The Killing Fields
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to me, “Don’t pray that everything will turn out all right for this people. When they skip their meals in order to pray, I won’t listen to a thing they say. When they redouble their prayers, bringing all kinds of offerings from their herds and crops, I’ll not accept them. I’m finishing them off with war and famine and disease.”'
  '13':
  - type: text
    content: 'I said, “But Master, '
  - type: text
    content: God
  - type: text
    content: '! Their preachers have been telling them that everything is going to be all right—no war and no famine—that there’s nothing to worry about.”'
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' said, “These preachers are liars, and they use my name to cover their lies. I never sent them, I never commanded them, and I don’t talk with them. The sermons they’ve been handing out are sheer illusion, tissues of lies, whistlings in the dark.'
  '15':
  - type: text
    content: '“So this is my verdict on them: All the preachers who preach using my name as their text, preachers I never sent in the first place, preachers who say, ‘War and famine will never come here’—these preachers will die in war and by starvation. And the people to whom they’ve been preaching will end up as corpses, victims of war and starvation, thrown out in the streets of Jerusalem unburied—no funerals for them or their wives or their children! I’ll make sure they get the full brunt of all their evil.'
  '17':
  - type: text
    content: '“And you, Jeremiah, will say this to them:'
  - type: text
    content: “‘My eyes pour out tears.
  - type: text
    content: Day and night, the tears never quit.
  - type: text
    content: My dear, dear people are battered and bruised,
  - type: text
    content: hopelessly and cruelly wounded.
  - type: text
    content: I walk out into the fields,
  - type: text
    content: shocked by the killing fields strewn with corpses.
  - type: text
    content: I walk into the city,
  - type: text
    content: shocked by the sight of starving bodies.
  - type: text
    content: And I watch the preachers and priests
  - type: text
    content: going about their business as if nothing’s happened!’”
  '19':
  - type: text
    content: God, have you said your final No to Judah?
  - type: text
    content: Can you simply not stand Zion any longer?
  - type: text
    content: If not, why have you treated us like this,
  - type: text
    content: beaten us nearly to death?
  - type: text
    content: We hoped for peace—
  - type: text
    content: nothing good came from it;
  - type: text
    content: We looked for healing—
  - type: text
    content: and got kicked in the stomach.
  - type: text
    content: 'We admit, O '
  - type: text
    content: God
  - type: text
    content: ', how badly we’ve lived,'
  - type: text
    content: and our ancestors, how bad they were.
  - type: text
    content: We’ve sinned, they’ve sinned,
  - type: text
    content: we’ve all sinned against you!
  - type: text
    content: Your reputation is at stake! Don’t quit on us!
  - type: text
    content: Don’t walk out and abandon your glorious Temple!
  - type: text
    content: Remember your covenant.
  - type: text
    content: Don’t break faith with us!
  - type: text
    content: Can the no-gods of the godless nations cause rain?
  - type: text
    content: Can the sky water the earth by itself?
  - type: text
    content: 'You’re the one, O '
  - type: text
    content: God
  - type: text
    content: ', who does this.'
  - type: text
    content: So you’re the one for whom we wait.
  - type: text
    content: You made it all,
  - type: text
    content: you do it all.
  '7':
  - type: text
    content: We know we’re guilty. We’ve lived bad lives—
  - type: text
    content: 'but do something, '
  - type: text
    content: God
  - type: text
    content: '. Do it for '
  - type: text
    content: your
  - type: text
    content: ' sake!'
  - type: text
    content: Time and time again we’ve betrayed you.
  - type: text
    content: No doubt about it—we’ve sinned against you.
  - type: text
    content: Hope of Israel! Our only hope!
  - type: text
    content: Israel’s last chance in this trouble!
  - type: text
    content: Why are you acting like a tourist,
  - type: text
    content: taking in the sights, here today and gone tomorrow?
  - type: text
    content: Why do you just stand there and stare,
  - type: text
    content: like someone who doesn’t know what to do in a crisis?
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ', you are, in fact, '
  - type: text
    content: here
  - type: text
    content: ', here '
  - type: text
    content: with us
  - type: text
    content: '!'
  - type: text
    content: You know who we are—you named us!
  - type: text
    content: Don’t leave us without a leg to stand on.
