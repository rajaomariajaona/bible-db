document_id: JER.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Time and Again We’ve Betrayed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message that came to Jeremiah regarding the drought:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Judah weeps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her cities mourn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people fall to the ground, moaning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while sounds of Jerusalem’s sobs rise up, up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rich people sent their servants for water.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They went to the cisterns, but the cisterns were dry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They came back with empty buckets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wringing their hands, shaking their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the farm work has stopped.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not a drop of rain has fallen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The farmers don’t know what to do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They wring their hands, they shake their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the doe abandons her fawn in the field
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there is no grass—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eyes glazed over, on her last legs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing but skin and bones.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: We know we’re guilty. We’ve lived bad lives—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but do something, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Do it for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' sake!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Time and time again we’ve betrayed you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No doubt about it—we’ve sinned against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hope of Israel! Our only hope!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s last chance in this trouble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are you acting like a tourist,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking in the sights, here today and gone tomorrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you just stand there and stare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like someone who doesn’t know what to do in a crisis?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you are, in fact, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: here
  - type: text
    text: ', here '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with us
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You know who we are—you named us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t leave us without a leg to stand on.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said of these people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Since they loved to wander this way and that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never giving a thought to where they were going,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will now have nothing more to do with them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: except to note their guilt and punish their sins.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Killing Fields
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to me, “Don’t pray that everything will turn out all right for this people. When they skip their meals in order to pray, I won’t listen to a thing they say. When they redouble their prayers, bringing all kinds of offerings from their herds and crops, I’ll not accept them. I’m finishing them off with war and famine and disease.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I said, “But Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Their preachers have been telling them that everything is going to be all right—no war and no famine—that there’s nothing to worry about.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “These preachers are liars, and they use my name to cover their lies. I never sent them, I never commanded them, and I don’t talk with them. The sermons they’ve been handing out are sheer illusion, tissues of lies, whistlings in the dark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: '“So this is my verdict on them: All the preachers who preach using my name as their text, preachers I never sent in the first place, preachers who say, ‘War and famine will never come here’—these preachers will die in war and by starvation. And the people to whom they’ve been preaching will end up as corpses, victims of war and starvation, thrown out in the streets of Jerusalem unburied—no funerals for them or their wives or their children! I’ll make sure they get the full brunt of all their evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: '“And you, Jeremiah, will say this to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘My eyes pour out tears.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Day and night, the tears never quit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My dear, dear people are battered and bruised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hopelessly and cruelly wounded.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I walk out into the fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shocked by the killing fields strewn with corpses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I walk into the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shocked by the sight of starving bodies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I watch the preachers and priests
- type: usfm
  marker: q2
  children:
  - type: text
    text: going about their business as if nothing’s happened!’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: God, have you said your final No to Judah?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you simply not stand Zion any longer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: If not, why have you treated us like this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beaten us nearly to death?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We hoped for peace—
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing good came from it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We looked for healing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and got kicked in the stomach.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We admit, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', how badly we’ve lived,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our ancestors, how bad they were.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ve sinned, they’ve sinned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ve all sinned against you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your reputation is at stake! Don’t quit on us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t walk out and abandon your glorious Temple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember your covenant.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t break faith with us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can the no-gods of the godless nations cause rain?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can the sky water the earth by itself?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’re the one, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who does this.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So you’re the one for whom we wait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made it all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you do it all.
