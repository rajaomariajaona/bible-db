document_id: 1SA.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “Don’t Chase After Ghost-Gods”
  - type: text
    content: 'Samuel addressed all Israel: “I’ve listened to everything you’ve said to me, listened carefully to every word, and I’ve given you a king. See for yourself: Your king among you, leading you! But now look at me: I’m old and gray, and my sons are still here. I’ve led you faithfully from my youth until this very day. Look at me! Do you have any complaints to bring before '
  - type: text
    content: God
  - type: text
    content: ' and his anointed? Have I ever stolen so much as an ox or a donkey? Have I ever taken advantage of you or exploited you? Have I ever taken a bribe or played fast and loose with the law? Bring your complaint and I’ll make it right.”'
  '10':
  - type: text
    content: '“Then they cried for help to '
  - type: text
    content: God
  - type: text
    content: '. They confessed, ‘We’ve sinned! We’ve gone off and left '
  - type: text
    content: God
  - type: text
    content: ' and worshiped the fertility gods and goddesses of Canaan. Oh, deliver us from the brutalities of our enemies and we’ll worship you alone.’'
  '11':
  - type: text
    content: '“So '
  - type: text
    content: God
  - type: text
    content: ' sent Jerub-Baal (Gideon), Bedan (Barak), Jephthah, and Samuel. He saved you from that hard life surrounded by enemies, and you lived in peace.'
  '12':
  - type: text
    content: '“But when you saw Nahash, king of the Ammonites, preparing to attack you, you said to me, ‘No more of this. We want a king to lead us.’ And '
  - type: text
    content: God
  - type: text
    content: ' was already your king!'
  '13':
  - type: text
    content: '“So here’s the king you wanted, the king you asked for. '
  - type: text
    content: God
  - type: text
    content: ' has let you have your own way, given you a king. If you fear '
  - type: text
    content: God
  - type: text
    content: ', worship and obey him, and don’t rebel against what he tells you. If both you and your king follow '
  - type: text
    content: God
  - type: text
    content: ', no problem. '
  - type: text
    content: God
  - type: text
    content: ' will be sure to save you. But if you don’t obey him and rebel against what he tells you, king or no king, you will fare no better than your fathers.'
  '16':
  - type: text
    content: '“Pay attention! Watch this wonder that '
  - type: text
    content: God
  - type: text
    content: ' is going to perform before you now! It’s summer, as you well know, and the rainy season is over. But I’m going to pray to '
  - type: text
    content: God
  - type: text
    content: '. He’ll send thunder and rain, a sign to convince you of the great wrong you have done to '
  - type: text
    content: God
  - type: text
    content: ' by asking for a king.”'
  '18':
  - type: text
    content: 'Samuel prayed to '
  - type: text
    content: God
  - type: text
    content: ', and '
  - type: text
    content: God
  - type: text
    content: ' sent thunder and rain that same day. The people were greatly afraid and in awe of '
  - type: text
    content: God
  - type: text
    content: ' and of Samuel.'
  '19':
  - type: text
    content: 'Then all the people begged Samuel, “Pray to your '
  - type: text
    content: God
  - type: text
    content: ' for us, your servants. Pray that we won’t die! On top of all our other sins, we’ve piled on one more—asking for a king!”'
  '20':
  - type: text
    content: 'Samuel said to them, “Don’t be fearful. It’s true that you have done something very wrong. All the same, don’t turn your back on '
  - type: text
    content: God
  - type: text
    content: '. Worship and serve him heart and soul! Don’t chase after ghost-gods. There’s nothing to them. They can’t help you. They’re nothing but ghost-gods! '
  - type: text
    content: God
  - type: text
    content: ', simply because of who he is, is not going to walk off and leave his people. '
  - type: text
    content: God
  - type: text
    content: ' took delight in making you into his very own people.'
  '23':
  - type: text
    content: '“And neither will I walk off and leave you. That would be a sin against '
  - type: text
    content: God
  - type: text
    content: '! I’m staying right here at my post praying for you and teaching you the good and right way to live. But I beg of you, fear '
  - type: text
    content: God
  - type: text
    content: ' and worship him honestly and heartily. You’ve seen how greatly he has worked among you! Be warned: If you live badly, both you and your king will be thrown out.”'
  '4':
  - type: text
    content: “Oh no,” they said, “never. You’ve never done any of that—never abused us, never lined your own pockets.”
  '5':
  - type: text
    content: “That settles it then,” said Samuel. “
  - type: text
    content: God
  - type: text
    content: ' is witness, and his anointed is witness that you find nothing against me—no faults, no complaints.”'
  '6':
  - type: text
    content: And the people said, “He is witness.”
  - type: text
    content: 'Samuel continued, “This is the '
  - type: text
    content: God
  - type: text
    content: ' who made Moses and Aaron your leaders and brought your ancestors out of Egypt. Take your stand before him now as I review your case before '
  - type: text
    content: God
  - type: text
    content: ' in the light of all the righteous ways in which '
  - type: text
    content: God
  - type: text
    content: ' has worked with you and your ancestors. When Jacob’s sons entered Egypt, the Egyptians made life hard for them and they cried for help to '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: text
    content: God
  - type: text
    content: ' sent Moses and Aaron, who led your ancestors out of Egypt and settled them here in this place.'
  '9':
  - type: text
    content: '“They soon forgot their '
  - type: text
    content: God
  - type: text
    content: ', so he sold them off to Sisera, commander of Hazor’s army, later to a hard life under the Philistines, and still later to the king of Moab. They had to fight for their lives.'
