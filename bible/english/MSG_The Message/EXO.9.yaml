document_id: EXO.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Five: Animals'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Go to Pharaoh and tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of the Hebrews, says: Release my people so they can worship me. If you refuse to release them and continue to hold on to them, I’m giving you fair warning: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will come down hard on your livestock out in the fields—horses, donkeys, camels, cattle, sheep—striking them with a severe disease. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will draw a sharp line between the livestock of Israel and the livestock of Egypt. Not one animal that belongs to the Israelites will die.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' set the time: “Tomorrow '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will do this thing.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'And the next day '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did it. All the livestock of Egypt died, but not one animal of the Israelites died. Pharaoh sent men to find out what had happened and there it was: none of the livestock of the Israelites had died—not one death. But Pharaoh stayed stubborn. He wouldn’t release the people.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Six: Boils'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses and Aaron, “Take fistfuls of soot from a furnace and have Moses throw it into the air right before Pharaoh’s eyes; it will become a film of fine dust all over Egypt and cause sores, an eruption of boils on people and animals throughout Egypt.” So they took soot from a furnace, stood in front of Pharaoh, and threw it up into the air. It caused boils to erupt on people and animals. The magicians weren’t able to compete with Moses this time because of the boils—they were covered with boils just like everyone else in Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hardened Pharaoh in his stubbornness. He wouldn’t listen, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had said to Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Seven: Hail'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-19
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Get up early in the morning and confront Pharaoh. Tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of the Hebrews, says: Release my people so they can worship me. This time I am going to strike you and your servants and your people with the full force of my power so you’ll get it into your head that there’s no one like me anywhere in all the Earth. You know that by now I could have struck you and your people with deadly disease and there would be nothing left of you, not a trace. But for one reason only I’ve kept you on your feet: To make you recognize my power so that my reputation spreads in all the Earth. You are still building yourself up at my people’s expense. You are not letting them go. So here’s what’s going to happen: At this time tomorrow I’m sending a terrific hailstorm—there’s never been a storm like this in Egypt from the day of its founding until now. So get your livestock under roof—everything exposed in the open fields, people and animals, will die when the hail comes down.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'All of Pharaoh’s servants who had respect for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word got their workers and animals under cover as fast as they could, but those who didn’t take '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word seriously left their workers and animals out in the field.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses: “Stretch your hands to the skies. Signal the hail to fall all over Egypt on people and animals and crops exposed in the fields of Egypt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: 'Moses lifted his staff to the skies and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent cracks of thunder and hail shot through with lightning strikes. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rained hail down on the land of Egypt. The hail came, hail and lightning—a fierce hailstorm. There had been nothing like it in Egypt in its entire history. The hail hit hard all over Egypt. Everything exposed out in the fields, people and animals and crops, was smashed. Even the trees in the fields were shattered. Except for Goshen where the Israelites lived; there was no hail in Goshen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: Pharaoh summoned Moses and Aaron. He said, “I’ve sinned for sure this time—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is in the right and I and my people are in the wrong. Pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. We’ve had enough of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s thunder and hail. I’ll let you go. The sooner you’re out of here the better.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'Moses said, “As soon as I’m out of the city, I’ll stretch out my arms to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. The thunder will stop and the hail end so you’ll know that the land is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s land. Still, I know that you and your servants have no respect for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: (The flax and the barley were ruined, for they were just ripening, but the wheat and spelt weren’t hurt—they ripen later.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moses left Pharaoh and the city and stretched out his arms to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . The thunder and hail stopped; the storm cleared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: 'But when Pharaoh saw that the rain and hail and thunder had stopped, he kept right on sinning, stubborn as ever, both he and his servants. Pharaoh’s heart turned rock-hard. He refused to release the Israelites, as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had ordered through Moses.'
