document_id: EXO.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Strike Five: Animals'
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Go to Pharaoh and tell him, ‘'
  - type: text
    content: God
  - type: text
    content: ', the God of the Hebrews, says: Release my people so they can worship me. If you refuse to release them and continue to hold on to them, I’m giving you fair warning: '
  - type: text
    content: God
  - type: text
    content: ' will come down hard on your livestock out in the fields—horses, donkeys, camels, cattle, sheep—striking them with a severe disease. '
  - type: text
    content: God
  - type: text
    content: ' will draw a sharp line between the livestock of Israel and the livestock of Egypt. Not one animal that belongs to the Israelites will die.’”'
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' hardened Pharaoh in his stubbornness. He wouldn’t listen, just as '
  - type: text
    content: God
  - type: text
    content: ' had said to Moses.'
  - type: heading
    content: 'Strike Seven: Hail'
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Get up early in the morning and confront Pharaoh. Tell him, ‘'
  - type: text
    content: God
  - type: text
    content: ', the God of the Hebrews, says: Release my people so they can worship me. This time I am going to strike you and your servants and your people with the full force of my power so you’ll get it into your head that there’s no one like me anywhere in all the Earth. You know that by now I could have struck you and your people with deadly disease and there would be nothing left of you, not a trace. But for one reason only I’ve kept you on your feet: To make you recognize my power so that my reputation spreads in all the Earth. You are still building yourself up at my people’s expense. You are not letting them go. So here’s what’s going to happen: At this time tomorrow I’m sending a terrific hailstorm—there’s never been a storm like this in Egypt from the day of its founding until now. So get your livestock under roof—everything exposed in the open fields, people and animals, will die when the hail comes down.’”'
  '20':
  - type: text
    content: 'All of Pharaoh’s servants who had respect for '
  - type: text
    content: God
  - type: text
    content: '’s word got their workers and animals under cover as fast as they could, but those who didn’t take '
  - type: text
    content: God
  - type: text
    content: ’s word seriously left their workers and animals out in the field.
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses: “Stretch your hands to the skies. Signal the hail to fall all over Egypt on people and animals and crops exposed in the fields of Egypt.”'
  '23':
  - type: text
    content: 'Moses lifted his staff to the skies and '
  - type: text
    content: God
  - type: text
    content: ' sent cracks of thunder and hail shot through with lightning strikes. '
  - type: text
    content: God
  - type: text
    content: ' rained hail down on the land of Egypt. The hail came, hail and lightning—a fierce hailstorm. There had been nothing like it in Egypt in its entire history. The hail hit hard all over Egypt. Everything exposed out in the fields, people and animals and crops, was smashed. Even the trees in the fields were shattered. Except for Goshen where the Israelites lived; there was no hail in Goshen.'
  '27':
  - type: text
    content: Pharaoh summoned Moses and Aaron. He said, “I’ve sinned for sure this time—
  - type: text
    content: God
  - type: text
    content: ' is in the right and I and my people are in the wrong. Pray to '
  - type: text
    content: God
  - type: text
    content: '. We’ve had enough of '
  - type: text
    content: God
  - type: text
    content: ’s thunder and hail. I’ll let you go. The sooner you’re out of here the better.”
  '29':
  - type: text
    content: 'Moses said, “As soon as I’m out of the city, I’ll stretch out my arms to '
  - type: text
    content: God
  - type: text
    content: '. The thunder will stop and the hail end so you’ll know that the land is '
  - type: text
    content: God
  - type: text
    content: '’s land. Still, I know that you and your servants have no respect for '
  - type: text
    content: God
  - type: text
    content: .”
  '31':
  - type: text
    content: (The flax and the barley were ruined, for they were just ripening, but the wheat and spelt weren’t hurt—they ripen later.)
  '33':
  - type: text
    content: 'Moses left Pharaoh and the city and stretched out his arms to '
  - type: text
    content: God
  - type: text
    content: . The thunder and hail stopped; the storm cleared.
  '34':
  - type: text
    content: 'But when Pharaoh saw that the rain and hail and thunder had stopped, he kept right on sinning, stubborn as ever, both he and his servants. Pharaoh’s heart turned rock-hard. He refused to release the Israelites, as '
  - type: text
    content: God
  - type: text
    content: ' had ordered through Moses.'
  '5':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' set the time: “Tomorrow '
  - type: text
    content: God
  - type: text
    content: ' will do this thing.”'
  '6':
  - type: text
    content: 'And the next day '
  - type: text
    content: God
  - type: text
    content: ' did it. All the livestock of Egypt died, but not one animal of the Israelites died. Pharaoh sent men to find out what had happened and there it was: none of the livestock of the Israelites had died—not one death. But Pharaoh stayed stubborn. He wouldn’t release the people.'
  - type: heading
    content: 'Strike Six: Boils'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses and Aaron, “Take fistfuls of soot from a furnace and have Moses throw it into the air right before Pharaoh’s eyes; it will become a film of fine dust all over Egypt and cause sores, an eruption of boils on people and animals throughout Egypt.” So they took soot from a furnace, stood in front of Pharaoh, and threw it up into the air. It caused boils to erupt on people and animals. The magicians weren’t able to compete with Moses this time because of the boils—they were covered with boils just like everyone else in Egypt.'
