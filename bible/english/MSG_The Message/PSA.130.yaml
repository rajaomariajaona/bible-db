verses:
  '1':
  - type: text
    content: 'Help, '
  - type: text
    content: God
  - type: text
    content: —I’ve hit rock bottom!
  - type: text
    content: Master, hear my cry for help!
  - type: text
    content: Listen hard! Open your ears!
  - type: text
    content: Listen to my cries for mercy.
  '3':
  - type: text
    content: 'If you, '
  - type: text
    content: God
  - type: text
    content: ', kept records on wrongdoings,'
  - type: text
    content: who would stand a chance?
  - type: text
    content: As it turns out, forgiveness is your habit,
  - type: text
    content: and that’s why you’re worshiped.
  '5':
  - type: text
    content: 'I pray to '
  - type: text
    content: God
  - type: text
    content: —my life a prayer—
  - type: text
    content: and wait for what he’ll say and do.
  - type: text
    content: My life’s on the line before God, my Lord,
  - type: text
    content: waiting and watching till morning,
  - type: text
    content: waiting and watching till morning.
  '7':
  - type: text
    content: 'O Israel, wait and watch for '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: 'with '
  - type: text
    content: God
  - type: text
    content: ’s arrival comes love,
  - type: text
    content: 'with '
  - type: text
    content: God
  - type: text
    content: ’s arrival comes generous redemption.
  - type: text
    content: No doubt about it—he’ll redeem Israel,
  - type: text
    content: buy back Israel from captivity to sin.
