document_id: JDG.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Samson went to Gaza and saw a prostitute. He went to her. The news got around: “Samson’s here.” They gathered around in hiding, waiting all night for him at the city gate, quiet as mice, thinking, “At sunrise we’ll kill him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samson was in bed with the woman until midnight. Then he got up, seized the doors of the city gate and the two gateposts, bolts and all, hefted them on his shoulder, and carried them to the top of the hill that faces Hebron.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Some time later he fell in love with a woman in the Valley of Sorek (Grapes). Her name was Delilah. The Philistine tyrants approached her and said, “Seduce him. Discover what’s behind his great strength and how we can tie him up and humble him. Each man’s company will give you a hundred shekels of silver.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Delilah said to Samson, “Tell me, dear, the secret of your great strength, and how you can be tied up and humbled.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samson told her, “If they were to tie me up with seven bowstrings—the kind made from fresh animal tendons, not dried out—then I would become weak, just like anyone else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: The Philistine tyrants brought her seven bowstrings, not dried out, and she tied him up with them. The men were waiting in ambush in her room. Then she said, “The Philistines are on you, Samson!” He snapped the cords as though they were mere threads. The secret of his strength was still a secret.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Delilah said, “Come now, Samson—you’re playing with me, making up stories. Be serious; tell me how you can be tied up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He told her, “If you were to tie me up tight with new ropes, ropes never used for work, then I would be helpless, just like anybody else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Delilah got some new ropes and tied him up. She said, “The Philistines are on you, Samson!” The men were hidden in the next room. He snapped the ropes from his arms like threads.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Delilah said to Samson, “You’re still playing games with me, teasing me with lies. Tell me how you can be tied up.”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said to her, “If you wove the seven braids of my hair into the fabric on the loom and drew it tight, then I would be as helpless as any other mortal.”
- type: usfm
  marker: p
  children:
  - type: text
    text: When she had him fast asleep, Delilah took the seven braids of his hair and wove them into the fabric on the loom and drew it tight. Then she said, “The Philistines are on you, Samson!” He woke from his sleep and ripped loose from both the loom and fabric!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She said, “How can you say ‘I love you’ when you won’t even trust me? Three times now you’ve toyed with me, like a cat with a mouse, refusing to tell me the secret of your great strength.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: She kept at it day after day, nagging and tormenting him. Finally, he was fed up—he couldn’t take another minute of it. He spilled it.
- type: usfm
  marker: p
  children:
  - type: text
    text: He told her, “A razor has never touched my head. I’ve been God’s Nazirite from conception. If I were shaved, my strength would leave me; I would be as helpless as any other mortal.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When Delilah realized that he had told her his secret, she sent for the Philistine tyrants, telling them, “Come quickly—this time he’s told me the truth.” They came, bringing the bribe money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When she got him to sleep, his head on her lap, she motioned to a man to cut off the seven braids of his hair. Immediately he began to grow weak. His strength drained from him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then she said, “The Philistines are on you, Samson!” He woke up, thinking, “I’ll go out, like always, and shake free.” He didn’t realize that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had abandoned him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: The Philistines grabbed him, gouged out his eyes, and took him down to Gaza. They shackled him in irons and put him to the work of grinding in the prison. But his hair, though cut off, began to grow again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: The Philistine tyrants got together to offer a great sacrifice to their god Dagon. They celebrated, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our god has given us
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samson our enemy!
- type: usfm
  marker: m
  children:
  - type: text
    text: And when the people saw him, they joined in, cheering their god,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our god has given
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our enemy to us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who ravaged our country,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Piling high the corpses among us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: 'Then this: Everyone was feeling high and someone said, “Get Samson! Let him show us his stuff!” They got Samson from the prison and he put on a show for them.'
- type: usfm
  marker: p
  children:
  - type: text
    text: They had him standing between the pillars. Samson said to the young man who was acting as his guide, “Put me where I can touch the pillars that hold up the temple so I can rest against them.” The building was packed with men and women, including all the Philistine tyrants. And there were at least three thousand in the stands watching Samson’s performance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Samson cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, please, look on me again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, please, give strength yet once more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: With one avenging blow let me be avenged
- type: usfm
  marker: q2
  children:
  - type: text
    text: On the Philistines for my two eyes!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: Then Samson reached out to the two central pillars that held up the building and pushed against them, one with his right arm, the other with his left. Saying, “Let me die with the Philistines,” Samson pushed hard with all his might. The building crashed on the tyrants and all the people in it. He killed more people in his death than he had killed in his life.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: His brothers and all his relatives went down to get his body. They carried him back and buried him in the tomb of Manoah his father, between Zorah and Eshtaol.
- type: usfm
  marker: p
  children:
  - type: text
    text: He judged Israel for twenty years.
