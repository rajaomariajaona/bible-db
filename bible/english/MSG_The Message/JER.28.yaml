document_id: JER.28,97
type_code: eng
verses:
  '1':
  - type: heading
    content: From a Wooden to an Iron Yoke
  - type: text
    content: ' Later that same year (it was in the fifth month of King Zedekiah’s fourth year) Hananiah son of Azzur, a prophet from Gibeon, confronted Jeremiah in the Temple of '
  - type: text
    content: God
  - type: text
    content: ' in front of the priests and all the people who were there. Hananiah said:'
  '10':
  - type: text
    content: 'At that, Hananiah grabbed the yoke from Jeremiah’s shoulders and smashed it. And then he addressed the people: “This is '
  - type: text
    content: God
  - type: text
    content: '’s Message: In just this way I will smash the yoke of the king of Babylon and get him off the neck of all the nations—and within two years.”'
  - type: text
    content: Jeremiah walked out.
  '12':
  - type: text
    content: 'Later, sometime after Hananiah had smashed the yoke from off his shoulders, Jeremiah received this Message from '
  - type: text
    content: God
  - type: text
    content: ': “Go back to Hananiah and tell him, ‘This is '
  - type: text
    content: God
  - type: text
    content: '’s Message: You smashed the wooden yoke-bars; now you’ve got iron yoke-bars. This is a Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, Israel’s own God: I’ve put an iron yoke on all these nations. They’re harnessed to Nebuchadnezzar king of Babylon. They’ll do just what he tells them. Why, I’m even putting him in charge of the wild animals.’”'
  '15':
  - type: text
    content: 'So prophet Jeremiah told prophet Hananiah, “Hold it, Hananiah! '
  - type: text
    content: God
  - type: text
    content: ' never sent you. You’ve talked the whole country into believing a pack of lies! And so '
  - type: text
    content: God
  - type: text
    content: ' says, ‘You claim to be sent? I’ll send you all right—right off the face of the earth! Before the year is out, you’ll be dead because you instigated sedition against '
  - type: text
    content: God
  - type: text
    content: .’”
  '17':
  - type: text
    content: Prophet Hananiah died that very year, in the seventh month.
  '2':
  - type: text
    content: ' “This Message is straight from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel: ‘I will most certainly break the yoke of the king of Babylon. Before two years are out I’ll have all the furnishings of '
  - type: text
    content: God
  - type: text
    content: '’s Temple back here, all the things that Nebuchadnezzar king of Babylon plundered and hauled off to Babylon. I’ll also bring back Jehoiachin son of Jehoiakim king of Judah and all the exiles who were taken off to Babylon.’ '
  - type: text
    content: God
  - type: text
    content: ’s Decree. ‘Yes, I will break the king of Babylon’s yoke. You’ll no longer be in harness to him.’”
  '5':
  - type: text
    content: 'Prophet Jeremiah stood up to prophet Hananiah in front of the priests and all the people who were in '
  - type: text
    content: God
  - type: text
    content: '’s Temple that day. Prophet Jeremiah said, “Wonderful! Would that it were true—that '
  - type: text
    content: God
  - type: text
    content: ' would validate your preaching by bringing the Temple furnishings and all the exiles back from Babylon. But listen to me, listen closely. Listen to what I tell both you and all the people here today: The old prophets, the ones before our time, preached judgment against many countries and kingdoms, warning of war and disaster and plague. So any prophet who preaches that everything is just fine and there’s nothing to worry about stands out like a sore thumb. We’ll wait and see. If it happens, it happens—and then we’ll know that '
  - type: text
    content: God
  - type: text
    content: ' sent him.”'
