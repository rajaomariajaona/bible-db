document_id: JER.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: From a Wooden to an Iron Yoke
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' Later that same year (it was in the fifth month of King Zedekiah’s fourth year) Hananiah son of Azzur, a prophet from Gibeon, confronted Jeremiah in the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in front of the priests and all the people who were there. Hananiah said:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-4
  - type: text
    text: ' “This Message is straight from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel: ‘I will most certainly break the yoke of the king of Babylon. Before two years are out I’ll have all the furnishings of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Temple back here, all the things that Nebuchadnezzar king of Babylon plundered and hauled off to Babylon. I’ll also bring back Jehoiachin son of Jehoiakim king of Judah and all the exiles who were taken off to Babylon.’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree. ‘Yes, I will break the king of Babylon’s yoke. You’ll no longer be in harness to him.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9
  - type: text
    text: 'Prophet Jeremiah stood up to prophet Hananiah in front of the priests and all the people who were in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Temple that day. Prophet Jeremiah said, “Wonderful! Would that it were true—that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' would validate your preaching by bringing the Temple furnishings and all the exiles back from Babylon. But listen to me, listen closely. Listen to what I tell both you and all the people here today: The old prophets, the ones before our time, preached judgment against many countries and kingdoms, warning of war and disaster and plague. So any prophet who preaches that everything is just fine and there’s nothing to worry about stands out like a sore thumb. We’ll wait and see. If it happens, it happens—and then we’ll know that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'At that, Hananiah grabbed the yoke from Jeremiah’s shoulders and smashed it. And then he addressed the people: “This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: In just this way I will smash the yoke of the king of Babylon and get him off the neck of all the nations—and within two years.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Jeremiah walked out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: 'Later, sometime after Hananiah had smashed the yoke from off his shoulders, Jeremiah received this Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “Go back to Hananiah and tell him, ‘This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: You smashed the wooden yoke-bars; now you’ve got iron yoke-bars. This is a Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, Israel’s own God: I’ve put an iron yoke on all these nations. They’re harnessed to Nebuchadnezzar king of Babylon. They’ll do just what he tells them. Why, I’m even putting him in charge of the wild animals.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'So prophet Jeremiah told prophet Hananiah, “Hold it, Hananiah! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' never sent you. You’ve talked the whole country into believing a pack of lies! And so '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, ‘You claim to be sent? I’ll send you all right—right off the face of the earth! Before the year is out, you’ll be dead because you instigated sedition against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Prophet Hananiah died that very year, in the seventh month.
