document_id: ISA.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Child Has Been Born—for Us!
  - type: text
    content: But there’ll be no darkness for those who were in trouble. Earlier he did bring the lands of Zebulun and Naphtali into disrepute, but the time is coming when he’ll make that whole area glorious—the road along the Sea, the country past the Jordan, international Galilee.
  '11':
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ' incited their adversaries against them,'
  - type: text
    content: 'stirred up their enemies to attack:'
  - type: text
    content: From the east, Arameans; from the west, Philistines.
  - type: text
    content: They made hash of Israel.
  - type: text
    content: But even after that, he was still angry,
  - type: text
    content: his fist still raised, ready to hit them again.
  '13':
  - type: text
    content: But the people paid no mind to him who hit them,
  - type: text
    content: 'didn’t seek '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ' hacked off Israel’s head and tail,'
  - type: text
    content: palm branch and reed, both on the same day.
  - type: text
    content: The bigheaded elders were the head,
  - type: text
    content: the lying prophets were the tail.
  - type: text
    content: Those who were supposed to lead this people
  - type: text
    content: led them down blind alleys,
  - type: text
    content: And those who followed the leaders
  - type: text
    content: ended up lost and confused.
  - type: text
    content: That’s why the Master lost interest in the young men,
  - type: text
    content: had no feeling for their orphans and widows.
  - type: text
    content: All of them were godless and evil,
  - type: text
    content: talking filth and folly.
  - type: text
    content: And even after that, he was still angry,
  - type: text
    content: his fist still raised, ready to hit them again.
  '18':
  - type: text
    content: Their wicked lives raged like an out-of-control fire,
  - type: text
    content: the kind that burns everything in its path—
  - type: text
    content: Trees and bushes, weeds and grasses—
  - type: text
    content: filling the skies with smoke.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies answered fire with fire,
  - type: text
    content: set the whole country on fire,
  - type: text
    content: Turned the people into consuming fires,
  - type: text
    content: consuming one another in their lusts—
  - type: text
    content: Appetites insatiable, stuffing and gorging
  - type: text
    content: themselves left and right with people and things.
  - type: text
    content: But still they starved. Not even their children
  - type: text
    content: were safe from their greedy hunger.
  - type: text
    content: Manasseh ate Ephraim, and Ephraim Manasseh,
  - type: text
    content: and then the two ganged up against Judah.
  - type: text
    content: And after that, he was still angry,
  - type: text
    content: his fist still raised, ready to hit them again.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: The people who walked in darkness
  - type: text
    content: have seen a great light.
  - type: text
    content: For those who lived in a land of deep shadows—
  - type: text
    content: light! sunbursts of light!
  - type: text
    content: You repopulated the nation,
  - type: text
    content: you expanded its joy.
  - type: text
    content: Oh, they’re so glad in your presence!
  - type: text
    content: Festival joy!
  - type: text
    content: The joy of a great celebration,
  - type: text
    content: sharing rich gifts and warm greetings.
  - type: text
    content: The abuse of oppressors and cruelty of tyrants—
  - type: text
    content: all their whips and clubs and curses—
  - type: text
    content: Is gone, done away with, a deliverance
  - type: text
    content: as surprising and sudden as Gideon’s old victory over Midian.
  - type: text
    content: The boots of all those invading troops,
  - type: text
    content: along with their shirts soaked with innocent blood,
  - type: text
    content: Will be piled in a heap and burned,
  - type: text
    content: a fire that will burn for days!
  - type: text
    content: For a child has been born—for us!
  - type: text
    content: the gift of a son—for us!
  - type: text
    content: He’ll take over
  - type: text
    content: the running of the world.
  - type: text
    content: 'His names will be: Amazing Counselor,'
  - type: text
    content: Strong God,
  - type: text
    content: Eternal Father,
  - type: text
    content: Prince of Wholeness.
  - type: text
    content: His ruling authority will grow,
  - type: text
    content: and there’ll be no limits to the wholeness he brings.
  - type: text
    content: He’ll rule from the historic David throne
  - type: text
    content: over that promised kingdom.
  - type: text
    content: He’ll put that kingdom on a firm footing
  - type: text
    content: and keep it going
  - type: text
    content: With fair dealing and right living,
  - type: text
    content: beginning now and lasting always.
  - type: text
    content: 'The zeal of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies
  - type: text
    content: will do all this.
  - type: heading
    content: God Answered Fire with Fire
  '8':
  - type: text
    content: The Master sent a message against Jacob.
  - type: text
    content: It landed right on Israel’s doorstep.
  - type: text
    content: All the people soon heard the message,
  - type: text
    content: Ephraim and the citizens of Samaria.
  - type: text
    content: But they were a proud and arrogant bunch.
  - type: text
    content: They dismissed the message, saying,
  - type: text
    content: “Things aren’t that bad.
  - type: text
    content: We can handle anything that comes.
  - type: text
    content: If our buildings are knocked down,
  - type: text
    content: we’ll rebuild them bigger and finer.
  - type: text
    content: If our forests are cut down,
  - type: text
    content: we’ll replant them with finer trees.”
