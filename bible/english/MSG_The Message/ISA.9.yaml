document_id: ISA.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Child Has Been Born—for Us!
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But there’ll be no darkness for those who were in trouble. Earlier he did bring the lands of Zebulun and Naphtali into disrepute, but the time is coming when he’ll make that whole area glorious—the road along the Sea, the country past the Jordan, international Galilee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-7
  - type: text
    text: The people who walked in darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: have seen a great light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For those who lived in a land of deep shadows—
- type: usfm
  marker: q2
  children:
  - type: text
    text: light! sunbursts of light!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You repopulated the nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you expanded its joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, they’re so glad in your presence!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Festival joy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The joy of a great celebration,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sharing rich gifts and warm greetings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The abuse of oppressors and cruelty of tyrants—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all their whips and clubs and curses—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is gone, done away with, a deliverance
- type: usfm
  marker: q2
  children:
  - type: text
    text: as surprising and sudden as Gideon’s old victory over Midian.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The boots of all those invading troops,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with their shirts soaked with innocent blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be piled in a heap and burned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fire that will burn for days!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a child has been born—for us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: the gift of a son—for us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll take over
- type: usfm
  marker: q2
  children:
  - type: text
    text: the running of the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His names will be: Amazing Counselor,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Strong God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternal Father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prince of Wholeness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His ruling authority will grow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there’ll be no limits to the wholeness he brings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll rule from the historic David throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: over that promised kingdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll put that kingdom on a firm footing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep it going
- type: usfm
  marker: q1
  children:
  - type: text
    text: With fair dealing and right living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beginning now and lasting always.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The zeal of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: will do all this.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Answered Fire with Fire'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: The Master sent a message against Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It landed right on Israel’s doorstep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the people soon heard the message,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim and the citizens of Samaria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they were a proud and arrogant bunch.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They dismissed the message, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Things aren’t that bad.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We can handle anything that comes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If our buildings are knocked down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ll rebuild them bigger and finer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If our forests are cut down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ll replant them with finer trees.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' incited their adversaries against them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'stirred up their enemies to attack:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the east, Arameans; from the west, Philistines.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They made hash of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even after that, he was still angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fist still raised, ready to hit them again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: But the people paid no mind to him who hit them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'didn’t seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hacked off Israel’s head and tail,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: palm branch and reed, both on the same day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The bigheaded elders were the head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lying prophets were the tail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who were supposed to lead this people
- type: usfm
  marker: q2
  children:
  - type: text
    text: led them down blind alleys,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who followed the leaders
- type: usfm
  marker: q2
  children:
  - type: text
    text: ended up lost and confused.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s why the Master lost interest in the young men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: had no feeling for their orphans and widows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them were godless and evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: talking filth and folly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even after that, he was still angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fist still raised, ready to hit them again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: Their wicked lives raged like an out-of-control fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the kind that burns everything in its path—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trees and bushes, weeds and grasses—
- type: usfm
  marker: q2
  children:
  - type: text
    text: filling the skies with smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies answered fire with fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set the whole country on fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turned the people into consuming fires,
- type: usfm
  marker: q2
  children:
  - type: text
    text: consuming one another in their lusts—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Appetites insatiable, stuffing and gorging
- type: usfm
  marker: q2
  children:
  - type: text
    text: themselves left and right with people and things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still they starved. Not even their children
- type: usfm
  marker: q2
  children:
  - type: text
    text: were safe from their greedy hunger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manasseh ate Ephraim, and Ephraim Manasseh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then the two ganged up against Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And after that, he was still angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fist still raised, ready to hit them again.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
