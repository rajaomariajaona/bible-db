document_id: PSA.30,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I give you all the credit, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: you got me out of that mess,
  - type: text
    content: you didn’t let my foes gloat.
  '11':
  - type: text
    content: 'You did it: you changed wild lament'
  - type: text
    content: into whirling dance;
  - type: text
    content: You ripped off my black mourning band
  - type: text
    content: and decked me with wildflowers.
  - type: text
    content: I’m about to burst with song;
  - type: text
    content: I can’t keep quiet about you.
  - type: text
    content: God
  - type: text
    content: ', my God,'
  - type: text
    content: I can’t thank you enough.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', my God, I yelled for help'
  - type: text
    content: and you put me together.
  - type: text
    content: God
  - type: text
    content: ', you pulled me out of the grave,'
  - type: text
    content: gave me another chance at life
  - type: text
    content: when I was down-and-out.
  '4':
  - type: text
    content: 'All you saints! Sing your hearts out to '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Thank him to his face!
  - type: text
    content: He gets angry once in a while, but across
  - type: text
    content: a lifetime there is only love.
  - type: text
    content: The nights of crying your eyes out
  - type: text
    content: give way to days of laughter.
  '6':
  - type: text
    content: When things were going great
  - type: text
    content: I crowed, “I’ve got it made.
  - type: text
    content: 'I’m '
  - type: text
    content: God
  - type: text
    content: ’s favorite.
  - type: text
    content: He made me king of the mountain.”
  - type: text
    content: Then you looked the other way
  - type: text
    content: and I fell to pieces.
  '8':
  - type: text
    content: 'I called out to you, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: 'I laid my case before you:'
  - type: text
    content: “Can you sell me for a profit when I’m dead?
  - type: text
    content: auction me off at a cemetery yard sale?
  - type: text
    content: When I’m ‘dust to dust’ my songs
  - type: text
    content: and stories of you won’t sell.
  - type: text
    content: So listen! and be kind!
  - type: text
    content: Help me out of this!”
