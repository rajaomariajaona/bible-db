segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I give you all the credit, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: you got me out of that mess,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you didn’t let my foes gloat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God, I yelled for help'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you put me together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you pulled me out of the grave,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: gave me another chance at life
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I was down-and-out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'All you saints! Sing your hearts out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thank him to his face!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gets angry once in a while, but across
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lifetime there is only love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nights of crying your eyes out
- type: usfm
  marker: q2
  children:
  - type: text
    text: give way to days of laughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: When things were going great
- type: usfm
  marker: q2
  children:
  - type: text
    text: I crowed, “I’ve got it made.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’m '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s favorite.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He made me king of the mountain.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you looked the other way
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I fell to pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'I called out to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I laid my case before you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Can you sell me for a profit when I’m dead?
- type: usfm
  marker: q2
  children:
  - type: text
    text: auction me off at a cemetery yard sale?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I’m ‘dust to dust’ my songs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stories of you won’t sell.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So listen! and be kind!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Help me out of this!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'You did it: you changed wild lament'
- type: usfm
  marker: q2
  children:
  - type: text
    text: into whirling dance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You ripped off my black mourning band
- type: usfm
  marker: q2
  children:
  - type: text
    text: and decked me with wildflowers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m about to burst with song;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t keep quiet about you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t thank you enough.
