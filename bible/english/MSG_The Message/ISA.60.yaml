document_id: ISA.60,97
type_code: eng
verses:
  '1':
  - type: heading
    content: People Returning for the Reunion
  - type: text
    content: “Get out of bed, Jerusalem!
  - type: text
    content: Wake up. Put your face in the sunlight.
  - type: text
    content: God
  - type: text
    content: ’s bright glory has risen for you.
  - type: text
    content: The whole earth is wrapped in darkness,
  - type: text
    content: all people sunk in deep darkness,
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' rises on you,'
  - type: text
    content: his sunrise glory breaks over you.
  - type: text
    content: Nations will come to your light,
  - type: text
    content: kings to your sunburst brightness.
  - type: text
    content: Look up! Look around!
  - type: text
    content: 'Watch as they gather, watch as they approach you:'
  - type: text
    content: Your sons coming from great distances,
  - type: text
    content: your daughters carried by their nannies.
  - type: text
    content: When you see them coming you’ll smile—big smiles!
  - type: text
    content: Your heart will swell and, yes, burst!
  - type: text
    content: All those people returning by sea for the reunion,
  - type: text
    content: a rich harvest of exiles gathered in from the nations!
  - type: text
    content: And then streams of camel caravans as far as the eye can see,
  - type: text
    content: young camels of nomads in Midian and Ephah,
  - type: text
    content: Pouring in from the south from Sheba,
  - type: text
    content: loaded with gold and frankincense,
  - type: text
    content: 'preaching the praises of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: And yes, a great roundup
  - type: text
    content: of flocks from the nomads in Kedar and Nebaioth,
  - type: text
    content: Welcome gifts for worship at my altar
  - type: text
    content: as I bathe my glorious Temple in splendor.
  - type: heading
    content: What’s That We See in the Distance?
  '8':
  - type: text
    content: “What’s that we see in the distance,
  - type: text
    content: a cloud on the horizon, like doves darkening the sky?
  - type: text
    content: It’s ships from the distant islands,
  - type: text
    content: the famous Tarshish ships
  - type: text
    content: Returning your children from faraway places,
  - type: text
    content: loaded with riches, with silver and gold,
  - type: text
    content: 'And backed by the name of your '
  - type: text
    content: God
  - type: text
    content: ', The Holy of Israel,'
  - type: text
    content: showering you with splendor.
  - type: text
    content: Foreigners will rebuild your walls,
  - type: text
    content: and their kings assist you in the conduct of worship.
  - type: text
    content: When I was angry I hit you hard.
  - type: text
    content: It’s my desire now to be tender.
  - type: text
    content: Your Jerusalem gates will always be open
  - type: text
    content: —open house day and night!—
  - type: text
    content: Receiving deliveries of wealth from all nations,
  - type: text
    content: and their kings, the delivery boys!
  - type: text
    content: Any nation or kingdom that doesn’t deliver will perish;
  - type: text
    content: those nations will be totally wasted.
  - type: text
    content: The rich woods of Lebanon will be delivered
  - type: text
    content: —all that cypress and oak and pine—
  - type: text
    content: To give a splendid elegance to my Sanctuary,
  - type: text
    content: as I make my footstool glorious.
  - type: text
    content: The descendants of your oppressor
  - type: text
    content: will come bowing and scraping to you.
  - type: text
    content: All who looked down at you in contempt
  - type: text
    content: will lick your boots.
  - type: text
    content: 'They’ll confer a title on you: City of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Zion of The Holy of Israel.
  - type: text
    content: Not long ago you were despised refuse—
  - type: text
    content: out-of-the-way, unvisited, ignored.
  - type: text
    content: But now I’ve put you on your feet,
  - type: text
    content: towering and grand forever, a joy to look at!
  - type: text
    content: When you suck the milk of nations
  - type: text
    content: and the breasts of royalty,
  - type: text
    content: 'You’ll know that I, '
  - type: text
    content: God
  - type: text
    content: ', am your Savior,'
  - type: text
    content: your Redeemer, Champion of Jacob.
  - type: text
    content: I’ll give you only the best—no more hand-me-downs!
  - type: text
    content: Gold instead of bronze, silver instead of iron,
  - type: text
    content: bronze instead of wood, iron instead of stones.
  - type: text
    content: I’ll install Peace to run your country,
  - type: text
    content: make Righteousness your boss.
  - type: text
    content: There’ll be no more stories of crime in your land,
  - type: text
    content: no more robberies, no more vandalism.
  - type: text
    content: You’ll name your main street Salvation Way,
  - type: text
    content: and install Praise Park at the center of town.
  - type: text
    content: You’ll have no more need of the sun by day
  - type: text
    content: nor the brightness of the moon at night.
  - type: text
    content: God
  - type: text
    content: ' will be your eternal light,'
  - type: text
    content: your God will bathe you in splendor.
  - type: text
    content: Your sun will never go down,
  - type: text
    content: your moon will never fade.
  - type: text
    content: I will be your eternal light.
  - type: text
    content: Your days of grieving are over.
  - type: text
    content: All your people will live right and well,
  - type: text
    content: in permanent possession of the land.
  - type: text
    content: They’re the green shoot that I planted,
  - type: text
    content: planted with my own hands to display my glory.
  - type: text
    content: The runt will become a great tribe,
  - type: text
    content: the weakling become a strong nation.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: At the right time I’ll make it happen.”
