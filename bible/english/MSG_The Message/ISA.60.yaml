document_id: ISA.60
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: People Returning for the Reunion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: “Get out of bed, Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up. Put your face in the sunlight.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s bright glory has risen for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole earth is wrapped in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all people sunk in deep darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rises on you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his sunrise glory breaks over you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nations will come to your light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: kings to your sunburst brightness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look up! Look around!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Watch as they gather, watch as they approach you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons coming from great distances,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your daughters carried by their nannies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you see them coming you’ll smile—big smiles!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your heart will swell and, yes, burst!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All those people returning by sea for the reunion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a rich harvest of exiles gathered in from the nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then streams of camel caravans as far as the eye can see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: young camels of nomads in Midian and Ephah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pouring in from the south from Sheba,
- type: usfm
  marker: q2
  children:
  - type: text
    text: loaded with gold and frankincense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'preaching the praises of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: And yes, a great roundup
- type: usfm
  marker: q2
  children:
  - type: text
    text: of flocks from the nomads in Kedar and Nebaioth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Welcome gifts for worship at my altar
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I bathe my glorious Temple in splendor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: What’s That We See in the Distance?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-22
  - type: text
    text: “What’s that we see in the distance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cloud on the horizon, like doves darkening the sky?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s ships from the distant islands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the famous Tarshish ships
- type: usfm
  marker: q1
  children:
  - type: text
    text: Returning your children from faraway places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: loaded with riches, with silver and gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And backed by the name of your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', The Holy of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: showering you with splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreigners will rebuild your walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their kings assist you in the conduct of worship.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I was angry I hit you hard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s my desire now to be tender.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your Jerusalem gates will always be open
- type: usfm
  marker: q2
  children:
  - type: text
    text: —open house day and night!—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Receiving deliveries of wealth from all nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their kings, the delivery boys!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any nation or kingdom that doesn’t deliver will perish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those nations will be totally wasted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rich woods of Lebanon will be delivered
- type: usfm
  marker: q2
  children:
  - type: text
    text: —all that cypress and oak and pine—
- type: usfm
  marker: q1
  children:
  - type: text
    text: To give a splendid elegance to my Sanctuary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I make my footstool glorious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The descendants of your oppressor
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come bowing and scraping to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who looked down at you in contempt
- type: usfm
  marker: q2
  children:
  - type: text
    text: will lick your boots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They’ll confer a title on you: City of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion of The Holy of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not long ago you were despised refuse—
- type: usfm
  marker: q2
  children:
  - type: text
    text: out-of-the-way, unvisited, ignored.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now I’ve put you on your feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: towering and grand forever, a joy to look at!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you suck the milk of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the breasts of royalty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’ll know that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', am your Savior,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your Redeemer, Champion of Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll give you only the best—no more hand-me-downs!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gold instead of bronze, silver instead of iron,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bronze instead of wood, iron instead of stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll install Peace to run your country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make Righteousness your boss.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’ll be no more stories of crime in your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more robberies, no more vandalism.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll name your main street Salvation Way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and install Praise Park at the center of town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll have no more need of the sun by day
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the brightness of the moon at night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will be your eternal light,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your God will bathe you in splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sun will never go down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your moon will never fade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be your eternal light.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your days of grieving are over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your people will live right and well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in permanent possession of the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re the green shoot that I planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: planted with my own hands to display my glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The runt will become a great tribe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the weakling become a strong nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: At the right time I’ll make it happen.”
