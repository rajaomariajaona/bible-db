document_id: EXO.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses and the Israelites sang this song to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', giving voice together,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m singing my heart out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —what a victory!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He pitched horse and rider into the sea.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is my strength, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is my song,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and, yes! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is my salvation.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: This
    - type: text
      text: ' is the kind of God I have'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m telling the world!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: This
    - type: text
      text: ' is the God of my father—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m spreading the news far and wide!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is a fighter,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'pure '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', through and through.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pharaoh’s chariots and army
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he dumped in the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The elite of his officers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he drowned in the Red Sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild ocean waters poured over them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sank like a rock in the deep blue sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your strong right hand, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', shimmers with power;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your strong right hand shatters the enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your mighty majesty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you smash your upstart enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You let loose your hot anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn them to a crisp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At a blast from your nostrils
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waters piled up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tumbling streams dammed up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild oceans curdled into a swamp.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You blew with all your might
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sea covered them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sank like a lead weight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the majestic waters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who compares with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'among gods, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who compares with you in power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in holy majesty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In awesome praises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wonder-working God?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You stretched out your right hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Earth swallowed them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the people you redeemed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you led in merciful love;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You guided them under your protection
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your holy pasture.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When people heard, they were scared;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Philistines writhed and trembled;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, even the head men in Edom were shaken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the big bosses in Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everybody in Canaan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: panicked and fell faint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dread and terror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sent them reeling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before your brandished right arm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were struck dumb like a stone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until your people crossed over and entered, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the people you made crossed over and entered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You brought them and planted them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the mountain of your heritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The place where you live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the place you made,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sanctuary, Master,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you established with your own hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' rule'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forever, for eternity!
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, Pharaoh’s horses and chariots and riders went into the sea and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' turned the waters back on them; but the Israelites walked on dry land right through the middle of the sea.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miriam the prophetess, Aaron’s sister, took a tambourine, and all the women followed her with tambourines, dancing. Miriam led them in singing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what a victory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pitched horse and rider
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the sea!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Traveling Through the Wilderness
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Moses led Israel from the Red Sea on to the Wilderness of Shur. They traveled for three days through the wilderness without finding any water. They got to Marah, but they couldn’t drink the water at Marah; it was bitter. That’s why they called the place Marah (Bitter). And the people complained to Moses, “So what are we supposed to drink?”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses cried out in prayer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' pointed him to a stick of wood. Moses threw it into the water and the water turned sweet.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That’s the place where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' set up rules and procedures; that’s where he started testing them.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “If you listen, listen obediently to how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' tells you to live in his presence, obeying his commandments and keeping all his laws, then I won’t strike you with all the diseases that I inflicted on the Egyptians; I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' your healer.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came to Elim where there were twelve springs of water and seventy palm trees. They set up camp there by the water.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’ll pursue, I’ll hunt them down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll divide up the plunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll glut myself on them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll pull out my sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my fist will send them reeling.”
