type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Moses and the Israelites sang this song to '
  - type: text
    content: God
  - type: text
    content: ', giving voice together,'
  - type: text
    content: 'I’m singing my heart out to '
  - type: text
    content: God
  - type: text
    content: —what a victory!
  - type: text
    content: He pitched horse and rider into the sea.
  - type: text
    content: God
  - type: text
    content: ' is my strength, '
  - type: text
    content: God
  - type: text
    content: ' is my song,'
  - type: text
    content: 'and, yes! '
  - type: text
    content: God
  - type: text
    content: ' is my salvation.'
  - type: text
    content: This
  - type: text
    content: ' is the kind of God I have'
  - type: text
    content: and I’m telling the world!
  - type: text
    content: This
  - type: text
    content: ' is the God of my father—'
  - type: text
    content: I’m spreading the news far and wide!
  - type: text
    content: God
  - type: text
    content: ' is a fighter,'
  - type: text
    content: 'pure '
  - type: text
    content: God
  - type: text
    content: ', through and through.'
  - type: text
    content: Pharaoh’s chariots and army
  - type: text
    content: he dumped in the sea,
  - type: text
    content: The elite of his officers
  - type: text
    content: he drowned in the Red Sea.
  - type: text
    content: Wild ocean waters poured over them;
  - type: text
    content: they sank like a rock in the deep blue sea.
  - type: text
    content: 'Your strong right hand, '
  - type: text
    content: God
  - type: text
    content: ', shimmers with power;'
  - type: text
    content: your strong right hand shatters the enemy.
  - type: text
    content: In your mighty majesty
  - type: text
    content: you smash your upstart enemies,
  - type: text
    content: You let loose your hot anger
  - type: text
    content: and burn them to a crisp.
  - type: text
    content: At a blast from your nostrils
  - type: text
    content: the waters piled up;
  - type: text
    content: Tumbling streams dammed up,
  - type: text
    content: wild oceans curdled into a swamp.
  '10':
  - type: text
    content: You blew with all your might
  - type: text
    content: and the sea covered them.
  - type: text
    content: They sank like a lead weight
  - type: text
    content: in the majestic waters.
  - type: text
    content: Who compares with you
  - type: text
    content: 'among gods, O '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Who compares with you in power,
  - type: text
    content: in holy majesty,
  - type: text
    content: In awesome praises,
  - type: text
    content: wonder-working God?
  '12':
  - type: text
    content: You stretched out your right hand
  - type: text
    content: and the Earth swallowed them up.
  - type: text
    content: But the people you redeemed,
  - type: text
    content: you led in merciful love;
  - type: text
    content: You guided them under your protection
  - type: text
    content: to your holy pasture.
  '14':
  - type: text
    content: When people heard, they were scared;
  - type: text
    content: Philistines writhed and trembled;
  - type: text
    content: Yes, even the head men in Edom were shaken,
  - type: text
    content: and the big bosses in Moab.
  - type: text
    content: Everybody in Canaan
  - type: text
    content: panicked and fell faint.
  - type: text
    content: Dread and terror
  - type: text
    content: sent them reeling.
  - type: text
    content: Before your brandished right arm
  - type: text
    content: they were struck dumb like a stone,
  - type: text
    content: 'Until your people crossed over and entered, O '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: until the people you made crossed over and entered.
  - type: text
    content: You brought them and planted them
  - type: text
    content: on the mountain of your heritage,
  - type: text
    content: The place where you live,
  - type: text
    content: the place you made,
  - type: text
    content: Your sanctuary, Master,
  - type: text
    content: that you established with your own hands.
  - type: text
    content: 'Let '
  - type: text
    content: God
  - type: text
    content: ' rule'
  - type: text
    content: forever, for eternity!
  '19':
  - type: text
    content: 'Yes, Pharaoh’s horses and chariots and riders went into the sea and '
  - type: text
    content: God
  - type: text
    content: ' turned the waters back on them; but the Israelites walked on dry land right through the middle of the sea.'
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: Miriam the prophetess, Aaron’s sister, took a tambourine, and all the women followed her with tambourines, dancing. Miriam led them in singing,
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: what a victory!
  - type: text
    content: He pitched horse and rider
  - type: text
    content: into the sea!
  - type: heading
    content: Traveling Through the Wilderness
  '22':
  - type: text
    content: Moses led Israel from the Red Sea on to the Wilderness of Shur. They traveled for three days through the wilderness without finding any water. They got to Marah, but they couldn’t drink the water at Marah; it was bitter. That’s why they called the place Marah (Bitter). And the people complained to Moses, “So what are we supposed to drink?”
  '25':
  - type: text
    content: 'So Moses cried out in prayer to '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: text
    content: God
  - type: text
    content: ' pointed him to a stick of wood. Moses threw it into the water and the water turned sweet.'
  '26':
  - type: text
    content: 'That’s the place where '
  - type: text
    content: God
  - type: text
    content: ' set up rules and procedures; that’s where he started testing them.'
  - type: text
    content: God
  - type: text
    content: ' said, “If you listen, listen obediently to how '
  - type: text
    content: God
  - type: text
    content: ' tells you to live in his presence, obeying his commandments and keeping all his laws, then I won’t strike you with all the diseases that I inflicted on the Egyptians; I am '
  - type: text
    content: God
  - type: text
    content: ' your healer.”'
  '27':
  - type: text
    content: They came to Elim where there were twelve springs of water and seventy palm trees. They set up camp there by the water.
  '9':
  - type: text
    content: The enemy spoke,
  - type: text
    content: “I’ll pursue, I’ll hunt them down,
  - type: text
    content: I’ll divide up the plunder,
  - type: text
    content: I’ll glut myself on them;
  - type: text
    content: I’ll pull out my sword,
  - type: text
    content: my fist will send them reeling.”
