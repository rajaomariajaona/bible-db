document_id: GEN.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Abraham married a second time; his new wife was named Keturah. She gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jokshan had Sheba and Dedan.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dedan’s descendants were the Asshurim, the Letushim, and the Leummim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Midian had Ephah, Epher, Hanoch, Abida, and Eldaah—all from the line of Keturah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: But Abraham gave everything he possessed to Isaac. While he was still living, he gave gifts to the sons he had by his concubines, but then sent them away to the country of the east, putting a good distance between them and his son Isaac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-11
  - type: text
    text: Abraham lived 175 years. Then he took his final breath. He died happy at a ripe old age, full of years, and was buried with his family. His sons Isaac and Ishmael buried him in the cave of Machpelah in the field of Ephron son of Zohar the Hittite, next to Mamre. It was the field that Abraham had bought from the Hittites. Abraham was buried next to his wife Sarah. After Abraham’s death, God blessed his son Isaac. Isaac lived at Beer Lahai Roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family Tree of Ishmael
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This is the family tree of Ishmael son of Abraham, the son that Hagar the Egyptian, Sarah’s maid, bore to Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: 'These are the names of Ishmael’s sons in the order of their births: Nebaioth, Ishmael’s firstborn, Kedar, Adbeel, Mibsam, Mishma, Dumah, Massa, Hadad, Tema, Jetur, Naphish, and Kedemah—all the sons of Ishmael. Their settlements and encampments were named after them. Twelve princes with their twelve tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Ishmael lived 137 years. When he breathed his last and died he was buried with his family. His children settled down all the way from Havilah near Egypt eastward to Shur in the direction of Assyria. The Ishmaelites didn’t get along with any of their kin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob and Esau
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'This is the family tree of Isaac son of Abraham: Abraham had Isaac. Isaac was forty years old when he married Rebekah daughter of Bethuel the Aramean of Paddan Aram. She was the sister of Laban the Aramean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'Isaac prayed hard to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for his wife because she was barren. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered his prayer and Rebekah became pregnant. But the children tumbled and kicked inside her so much that she said, “If this is the way it’s going to be, why go on living?” She went to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to find out what was going on. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told her,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Two nations are in your womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: two peoples butting heads while still in your body.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One people will overpower the other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the older will serve the younger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: When her time to give birth came, sure enough, there were twins in her womb. The first came out reddish, as if snugly wrapped in a hairy blanket; they named him Esau (Hairy). His brother followed, his fist clutched tight to Esau’s heel; they named him Jacob (Heel). Isaac was sixty years old when they were born.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: The boys grew up. Esau became an expert hunter, an outdoorsman. Jacob was a quiet man preferring life indoors among the tents. Isaac loved Esau because he loved his game, but Rebekah loved Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: One day Jacob was cooking a stew. Esau came in from the field, starved. Esau said to Jacob, “Give me some of that red stew—I’m starved!” That’s how he came to be called Edom (Red).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob said, “Make me a trade: my stew for your rights as the firstborn.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Esau said, “I’m starving! What good is a birthright if I’m dead?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: Jacob said, “First, swear to me.” And he did it. On oath Esau traded away his rights as the firstborn. Jacob gave him bread and the stew of lentils. He ate and drank, got up and left. That’s how Esau shrugged off his rights as the firstborn.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
