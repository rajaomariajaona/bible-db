document_id: DEU.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'If you listen obediently to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and heartily obey all his commandments that I command you today, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will place you on high, high above all the nations of the world. All these blessings will come down on you and spread out beyond you because you have responded to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing inside the city,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing in the country;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing on your children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the crops of your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young of your livestock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the calves of your herds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lambs of your flocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing on your basket and bread bowl;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing in your coming in,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessing in your going out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will defeat your enemies who attack you. They’ll come at you on one road and run away on seven roads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will order a blessing on your barns and workplaces; he’ll bless you in the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will form you as a people holy to him, just as he promised you, if you keep the commandments of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and live the way he has shown you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'All the peoples on Earth will see you living under the Name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and hold you in respectful awe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will lavish you with good things: children from your womb, offspring from your animals, and crops from your land, the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised your ancestors that he would give you. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will throw open the doors of his sky vaults and pour rain on your land on schedule and bless the work you take in hand. You will lend to many nations but you yourself won’t have to take out a loan. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will make you the head, not the tail; you’ll always be the top dog, never the underdog, as you obediently listen to and diligently keep the commands of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, that I am commanding you today. Don’t swerve an inch to the right or left from the words that I command you today by going off following and worshiping other gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19
  - type: text
    text: 'Here’s what will happen if you don’t obediently listen to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and diligently keep all the commandments and guidelines that I’m commanding you today. All these curses will come down hard on you:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse in the city,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse in the country;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on your basket and bread bowl;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on your children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the crops of your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young of your livestock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the calves of your herds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lambs of your flocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse in your coming in,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse in your going out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will send The Curse, The Confusion, The Contrariness down on everything you try to do until you’ve been destroyed and there’s nothing left of you—all because of your evil pursuits that led you to abandon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will infect you with The Disease, wiping you right off the land that you’re going in to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will set consumption and fever and rash and seizures and dehydration and blight and jaundice on you. They’ll hunt you down until they kill you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'The sky over your head will become an iron roof, the ground under your feet, a slab of concrete. From out of the skies '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will rain ash and dust down on you until you suffocate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will defeat you by enemy attack. You’ll come at your enemies on one road and run away on seven roads. All the kingdoms of Earth will see you as a horror. Carrion birds and animals will boldly feast on your dead body with no one to chase them away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will hit you hard with the boils of Egypt, hemorrhoids, scabs, and an incurable itch. He’ll make you go crazy and blind and senile. You’ll grope around in the middle of the day like a blind person feeling his way through a lifetime of darkness; you’ll never get to where you’re going. Not a day will go by that you’re not abused and robbed. And no one is going to help you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: You’ll get engaged to a woman and another man will take her for his mistress; you’ll build a house and never live in it; you’ll plant a garden and never eat so much as a carrot; you’ll watch your ox get butchered and not get a single steak from it; your donkey will be stolen from in front of you and you’ll never see it again; your sheep will be sent off to your enemies and no one will lift a hand to help you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-34
  - type: text
    text: Your sons and daughters will be shipped off to foreigners; you’ll wear your eyes out looking vainly for them, helpless to do a thing. Your crops and everything you work for will be eaten and used by foreigners; you’ll spend the rest of your lives abused and knocked around. What you see will drive you crazy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will hit you with painful boils on your knees and legs and no healing or relief from head to foot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will lead you and the king you set over you to a country neither you nor your ancestors have heard of; there you’ll worship other gods, no-gods of wood and stone. Among all the peoples where '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will take you, you’ll be treated as a lesson or a proverb—a horror!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-42
  - type: text
    text: You’ll plant sacks and sacks of seed in the field but get almost nothing—the grasshoppers will devour it. You’ll plant and hoe and prune vineyards but won’t drink or put up any wine—the worms will devour them. You’ll have groves of olive trees everywhere, but you’ll have no oil to rub on your face or hands—the olives will have fallen off. You’ll have sons and daughters but they won’t be yours for long—they’ll go off to captivity. Locusts will take over all your trees and crops.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-44
  - type: text
    text: The foreigner who lives among you will climb the ladder, higher and higher, while you go deeper and deeper into the hole. He’ll lend to you; you won’t lend to him. He’ll be the head; you’ll be the tail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: 'All these curses are going to come on you. They’re going to hunt you down and get you until there’s nothing left of you because you didn’t obediently listen to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and diligently keep his commandments and guidelines that I commanded you. The curses will serve as signposts, warnings to your children ever after.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-48a
  - type: text
    text: ' Because you didn’t serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, out of the joy and goodness of your heart in the great abundance, you’ll have to serve your enemies whom '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will send against you. Life will be famine and drought, rags and wretchedness; then he’ll put an iron yoke on your neck until he’s destroyed you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 48b-52
  - type: text
    text: ' Yes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will raise up a faraway nation against you, swooping down on you like an eagle, a nation whose language you can’t understand, a mean-faced people, cruel to grandmothers and babies alike. They’ll ravage the young of your animals and the crops from your fields until you’re destroyed. They’ll leave nothing behind: no grain, no wine, no oil, no calves, no lambs—and finally, no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: '. They’ll lay siege to you while you’re huddled behind your town gates. They’ll knock those high, proud walls flat, those walls behind which you felt so safe. They’ll lay siege to your fortified cities all over the country, this country that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 53-55
  - type: text
    text: 'And you’ll end up cannibalizing your own sons and daughters that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has given you. When the suffering from the siege gets extreme, you’re going to eat your own babies. The most gentle and caring man among you will turn hard, his eye evil, against his own brother, his cherished wife, and even the rest of his children who are still alive, refusing to share with them a scrap of meat from the cannibal child-stew he is eating. He’s lost everything, even his humanity, in the suffering of the siege that your enemy mounts against your fortified towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 56-57
  - type: text
    text: And the most gentle and caring woman among you, a woman who wouldn’t step on a wildflower, will turn hard, her eye evil, against her cherished husband, against her son, against her daughter, against even the afterbirth of her newborn infants; she plans to eat them in secret—she does eat them!—because she has lost everything, even her humanity, in the suffering of the siege that your enemy mounts against your fortified towns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 58-61
  - type: text
    text: 'If you don’t diligently keep all the words of this Revelation written in this book, living in holy awe before This Name glorious and terrible, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will pound you with catastrophes, you and your children, huge interminable catastrophes, hideous interminable illnesses. He’ll bring back and stick you with every old Egyptian malady that once terrorized you. And yes, every disease and catastrophe imaginable—things not even written in the Book of this Revelation—'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will bring on you until you’re destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Because you didn’t listen obediently to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, you’ll be left with a few pitiful stragglers in place of the dazzling stars-in-the-heavens multitude you had become.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 63-66
  - type: text
    text: 'And this is how things will end up: Just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' once enjoyed you, took pleasure in making life good for you, giving you many children, so '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will enjoy getting rid of you, clearing you off the Earth. He’ll weed you out of the very soil that you are entering in to possess. He’ll scatter you to the four winds, from one end of the Earth to the other. You’ll worship all kinds of other gods, gods neither you nor your parents ever heard of, wood and stone no-gods. But you won’t find a home there, you’ll not be able to settle down. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will give you a restless heart, longing eyes, a homesick soul. You will live in constant jeopardy, terrified of every shadow, never knowing what you’ll meet around the next corner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: In the morning you’ll say, “I wish it were evening.” In the evening you’ll say, “I wish it were morning.” Afraid, terrorized at what’s coming next, afraid of the unknown, because of the sights you’ve witnessed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will ship you back to Egypt by a road I promised you’d never see again. There you’ll offer yourselves for sale, both men and women, as slaves to your enemies. And not a buyer to be found.'
