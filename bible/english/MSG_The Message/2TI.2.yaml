document_id: 2TI.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Doing Your Best for God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: So, my son, throw yourself into this work for Christ. Pass on what you heard from me—the whole congregation saying Amen!—to reliable leaders who are competent to teach others. When the going gets rough, take it on the chin with the rest of us, the way Jesus did. A soldier on duty doesn’t get caught up in making deals at the marketplace. He concentrates on carrying out orders. An athlete who refuses to play by the rules will never get anywhere. It’s the diligent farmer who gets the produce. Think it over. God will make it all plain.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-18
    - type: text
      text: Repeat these basic essentials over and over to God’s people. Warn them before God against pious nitpicking, which chips away at the faith. It just wears everyone out. Concentrate on doing your best for God, work you won’t be ashamed of, laying out the truth plain and simple. Stay clear of pious talk that is only talk. Words are not mere words, you know. If they’re not backed by a godly life, they accumulate as poison in the soul. Hymenaeus and Philetus are examples, throwing believers off stride and missing the truth by a mile by saying the resurrection is over and done with.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Meanwhile, God’s firm foundation is as firm as ever, these sentences engraved on the stones:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: god knows who belongs to him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: steer clear of evil, all you who name god as god.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: In a well-furnished kitchen there are not only crystal goblets and silver platters, but waste cans and compost buckets—some containers used to serve fine meals, others to take out the garbage. Become the kind of container God can use to present any and every kind of gift to his guests for their blessing.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-26
    - type: text
      text: Run away from childish indulgence. Run after mature righteousness—faith, love, peace—joining those who are in honest and serious prayer before God. Refuse to get involved in inane discussions; they always end up in fights. God’s servant must not be argumentative, but a gentle listener and a teacher who keeps cool, working firmly but patiently with those who refuse to obey. You never know how or when God might sober them up with a change of heart and a turning to the truth, enabling them to escape the Devil’s trap, where they are caught and held captive, forced to run his errands.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-13
    - type: text
      text: 'Fix this picture firmly in your mind: Jesus, descended from the line of David, raised from the dead. It’s what you’ve heard from me all along. It’s what I’m sitting in jail for right now—but God’s Word isn’t in jail! That’s why I stick it out here—so that everyone God calls will get in on the salvation of Christ in all its glory. This is a sure thing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we die with him, we’ll live with him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we stick it out with him, we’ll rule with him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we turn our backs on him, he’ll turn his back on us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we give up on him, he does not give up—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for there’s no way he can be false to himself.
