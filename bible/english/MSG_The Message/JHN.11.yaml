document_id: JHN.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Lazarus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: A man was sick, Lazarus of Bethany, the town of Mary and her sister Martha. This was the same Mary who massaged the Lord’s feet with aromatic oils and then wiped them with her hair. It was her brother Lazarus who was sick. So the sisters sent word to Jesus, “Master, the one you love so very much is sick.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When Jesus got the message, he said, “This sickness is not fatal. It will become an occasion to show God’s glory by glorifying God’s Son.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: Jesus loved Martha and her sister and Lazarus, but oddly, when he heard that Lazarus was sick, he stayed on where he was for two more days. After the two days, he said to his disciples, “Let’s go back to Judea.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They said, “Rabbi, you can’t do that. The Jews are out to kill you, and you’re going back?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Jesus replied, “Are there not twelve hours of daylight? Anyone who walks in daylight doesn’t stumble because there’s plenty of light from the sun. Walking at night, he might very well stumble because he can’t see where he’s going.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He said these things, and then announced, “Our friend Lazarus has fallen asleep. I’m going to wake him up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: The disciples said, “Master, if he’s gone to sleep, he’ll get a good rest and wake up feeling fine.” Jesus was talking about death, while his disciples thought he was talking about taking a nap.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'Then Jesus became explicit: “Lazarus died. And I am glad for your sakes that I wasn’t there. You’re about to be given new grounds for believing. Now let’s go to him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: That’s when Thomas, the one called the Twin, said to his companions, “Come along. We might as well die with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: When Jesus finally got there, he found Lazarus already four days dead. Bethany was near Jerusalem, only a couple of miles away, and many of the Jews were visiting Martha and Mary, sympathizing with them over their brother. Martha heard Jesus was coming and went out to meet him. Mary remained in the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Martha said, “Master, if you’d been here, my brother wouldn’t have died. Even now, I know that whatever you ask God he will give you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jesus said, “Your brother will be raised up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Martha replied, “I know that he will be raised up in the resurrection at the end of time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: “You don’t have to wait for the End. I am, right now, Resurrection and Life. The one who believes in me, even though he or she dies, will live. And everyone who lives believing in me does not ultimately die at all. Do you believe this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Yes, Master. All along I have believed that you are the Messiah, the Son of God who comes into the world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: After saying this, she went to her sister Mary and whispered in her ear, “The Teacher is here and is asking for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-32
  - type: text
    text: The moment she heard that, she jumped up and ran out to him. Jesus had not yet entered the town but was still at the place where Martha had met him. When her sympathizing Jewish friends saw Mary run off, they followed her, thinking she was on her way to the tomb to weep there. Mary came to where Jesus was waiting and fell at his feet, saying, “Master, if only you had been here, my brother would not have died.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34a
  - type: text
    text: ' When Jesus saw her sobbing and the Jews with her sobbing, a deep anger welled up within him. He said, “Where did you put him?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34b-35
  - type: text
    text: ' “Master, come and see,” they said. Now Jesus wept.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The Jews said, “Look how deeply he loved him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Others among them said, “Well, if he loved him so much, why didn’t he do something to keep him from dying? After all, he opened the eyes of a blind man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: Then Jesus, the anger again welling up within him, arrived at the tomb. It was a simple cave in the hillside with a slab of stone laid against it. Jesus said, “Remove the stone.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The sister of the dead man, Martha, said, “Master, by this time there’s a stench. He’s been dead four days!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Jesus looked her in the eye. “Didn’t I tell you that if you believed, you would see the glory of God?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: Then, to the others, “Go ahead, take away the stone.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They removed the stone. Jesus raised his eyes to heaven and prayed, “Father, I’m grateful that you have listened to me. I know you always do listen, but on account of this crowd standing here I’ve spoken so that they might believe that you sent me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-44
  - type: text
    text: Then he shouted, “Lazarus, come out!” And he came out, a cadaver, wrapped from head to toe, and with a kerchief over his face.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus told them, “Unwrap him and let him loose.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man Who Creates God-Signs
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-48
  - type: text
    text: That was a turning point for many of the Jews who were with Mary. They saw what Jesus did, and believed in him. But some went back to the Pharisees and told on Jesus. The high priests and Pharisees called a meeting of the Jewish ruling body. “What do we do now?” they asked. “This man keeps on doing things, creating God-signs. If we let him go on, pretty soon everyone will be believing in him and the Romans will come and remove what little power and privilege we still have.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-52
  - type: text
    text: Then one of them—it was Caiaphas, the designated Chief Priest that year—spoke up, “Don’t you know anything? Can’t you see that it’s to our advantage that one man dies for the people rather than the whole nation be destroyed?” He didn’t say this of his own accord, but as Chief Priest that year he unwittingly prophesied that Jesus was about to die sacrificially for the nation, and not only for the nation but so that all God’s exile-scattered children might be gathered together into one people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 53-54
  - type: text
    text: From that day on, they plotted to kill him. So Jesus no longer went out in public among the Jews. He withdrew into the country bordering the desert to a town called Ephraim and secluded himself there with his disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 55-56
  - type: text
    text: 'The Jewish Passover was coming up. Crowds of people were making their way from the country up to Jerusalem to get themselves ready for the Feast. They were curious about Jesus. There was a lot of talk of him among those standing around in the Temple: “What do you think? Do you think he’ll show up at the Feast or not?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Meanwhile, the high priests and Pharisees gave out the word that anyone who knew his whereabouts should inform them. They were all set to arrest him.
