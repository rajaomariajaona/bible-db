document_id: 2TI.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: I can’t impress this on you too strongly. God is looking over your shoulder. Christ himself is the Judge, with the final say on everyone, living and dead. He is about to break into the open with his rule, so proclaim the Message with intensity; keep on your watch. Challenge, warn, and urge your people. Don’t ever quit. Just keep it simple.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: Watch out for Alexander the coppersmith. Fiercely opposed to our Message, he caused no end of trouble. God will give him what he’s got coming.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: At my preliminary hearing no one stood by me. They all ran like scared rabbits. But it doesn’t matter—the Master stood by me and helped me spread the Message loud and clear to those who had never heard it. I was snatched from the jaws of the lion! God’s looking after me, keeping me safe in the kingdom of heaven. All praise to him, praise forever! Oh, yes!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: Say hello to Priscilla and Aquila; also, the family of Onesiphorus. Erastus stayed behind in Corinth. I had to leave Trophimus sick in Miletus.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Try hard to get here before winter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eubulus, Pudens, Linus, Claudia, and all your friends here send greetings.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: God be with you. Grace be with you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: 'You’re going to find that there will be times when people will have no stomach for solid teaching, but will fill up on spiritual junk food—catchy opinions that tickle their fancy. They’ll turn their backs on truth and chase mirages. But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: —keep your eye on what you’re doing; accept the hard times along with the good; keep the Message alive; do a thorough job as God’s servant.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: You take over. I’m about to die, my life an offering on God’s altar. This is the only race worth running. I’ve run hard right to the finish, believed all the way. All that’s left now is the shouting—God’s applause! Depend on it, he’s an honest judge. He’ll do right not only by me, but by everyone eager for his coming.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-13
    - type: text
      text: Get here as fast as you can. Demas, chasing fads, went off to Thessalonica and left me here. Crescens is in Galatia province, Titus in Dalmatia. Luke is the only one here with me. Bring Mark with you; he’ll be my right-hand man since I’m sending Tychicus to Ephesus. Bring the winter coat I left in Troas with Carpus; also the books and parchment notebooks.
