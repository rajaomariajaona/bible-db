  marker: s1
  children:
  - type: text
    text: Moses and Aaron and Pharaoh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After that Moses and Aaron approached Pharaoh. They said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, says, ‘Free my people so that they can hold a festival for me in the wilderness.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pharaoh said, “And who is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that I should listen to him and send Israel off? I know nothing of this so-called ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’ and I’m certainly not going to send Israel off.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They said, “The God of the Hebrews has met with us. Let us take a three-day journey into the wilderness so we can worship our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lest he strike us with either disease or death.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: But the king of Egypt said, “Why on earth, Moses and Aaron, would you suggest the people be given a holiday? Back to work!” Pharaoh went on, “Look, I’ve got all these people freeloading, and now you want to reward them with time off?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: 'Pharaoh took immediate action. He sent down orders to the slave-drivers and their underlings: “Don’t provide straw for the people for making bricks as you have been doing. Make them get their own straw. And make them produce the same number of bricks—no reduction in their daily quotas! They’re getting lazy. They’re going around saying, ‘Give us time off so we can worship our God.’ Crack down on them. That’ll cure them of their whining, their god-fantasies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'The slave-drivers and their underlings went out to the people with their new instructions. “Pharaoh’s orders: No more straw provided. Get your own straw wherever you can find it. And not one brick less in your daily work quota!” The people scattered all over Egypt scrambling for straw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The slave-drivers were merciless, saying, “Complete your daily quota of bricks—the same number as when you were given straw.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The Israelite foremen whom the slave-drivers had appointed were beaten and badgered. “Why didn’t you finish your quota of bricks yesterday or the day before—and now again today?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'The Israelite foremen came to Pharaoh and cried out for relief: “Why are you treating your servants like this? Nobody gives us any straw and they tell us, ‘Make bricks!’ Look at us—we’re being beaten. And it’s not our fault.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'But Pharaoh said, “Lazy! That’s what you are! Lazy! That’s why you whine, ‘Let us go so we can worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’ Well then, go—go back to work. Nobody’s going to give you straw, and at the end of the day you better bring in your full quota of bricks.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The Israelite foremen saw that they were in a bad way, having to go back and tell their workers, “Not one brick short in your daily quota.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'As they left Pharaoh, they found Moses and Aaron waiting to meet them. The foremen said to them, “May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' see what you’ve done and judge you—you’ve made us stink before Pharaoh and his servants! You’ve put a weapon in his hand that’s going to kill us!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'Moses went back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and said, “My Master, why are you treating this people so badly? And why did you ever send me? From the moment I came to Pharaoh to speak in your name, things have only gotten worse for this people. And rescue? Does this look like rescue to you?”'
