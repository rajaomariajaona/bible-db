document_id: PSA.62,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: God, the one and only—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll wait as long as he says.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything I need comes from him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so why not?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s solid rock under my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: breathing room for my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'An impregnable castle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m set for life.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And a windfall, if it comes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t make too much of it.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God said this once and for all;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how many times
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have I heard it repeated?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Strength comes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Straight from God.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Love to you, Lord God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You pay a fair wage for a good day’s work!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: How long will you gang up on me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you run with the bullies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing to you, any of you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rotten floorboards, worm-eaten rafters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anthills plotting to bring down mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far gone in make-believe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You talk a good line,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but every “blessing” breathes a curse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: God, the one and only—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll wait as long as he says.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything I hope for comes from him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so why not?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s solid rock under my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: breathing room for my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'An impregnable castle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m set for life.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: My help and glory are in God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —granite-strength and safe-harbor-God—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So trust him absolutely, people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lay your lives on the line for him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God is a safe place to be.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Man as such is smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: woman as such, a mirage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put them together, they’re nothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: two times nothing is nothing.
