document_id: PSA.62,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, the one and only—
  - type: text
    content: I’ll wait as long as he says.
  - type: text
    content: Everything I need comes from him,
  - type: text
    content: so why not?
  - type: text
    content: He’s solid rock under my feet,
  - type: text
    content: breathing room for my soul,
  - type: text
    content: 'An impregnable castle:'
  - type: text
    content: I’m set for life.
  '10':
  - type: text
    content: And a windfall, if it comes—
  - type: text
    content: don’t make too much of it.
  '11':
  - type: text
    content: God said this once and for all;
  - type: text
    content: how many times
  - type: text
    content: Have I heard it repeated?
  - type: text
    content: “Strength comes
  - type: text
    content: Straight from God.”
  '12':
  - type: text
    content: Love to you, Lord God!
  - type: text
    content: You pay a fair wage for a good day’s work!
  '3':
  - type: text
    content: How long will you gang up on me?
  - type: text
    content: How long will you run with the bullies?
  - type: text
    content: There’s nothing to you, any of you—
  - type: text
    content: rotten floorboards, worm-eaten rafters,
  - type: text
    content: Anthills plotting to bring down mountains,
  - type: text
    content: far gone in make-believe.
  - type: text
    content: You talk a good line,
  - type: text
    content: but every “blessing” breathes a curse.
  '5':
  - type: text
    content: God, the one and only—
  - type: text
    content: I’ll wait as long as he says.
  - type: text
    content: Everything I hope for comes from him,
  - type: text
    content: so why not?
  - type: text
    content: He’s solid rock under my feet,
  - type: text
    content: breathing room for my soul,
  - type: text
    content: 'An impregnable castle:'
  - type: text
    content: I’m set for life.
  '7':
  - type: text
    content: My help and glory are in God
  - type: text
    content: —granite-strength and safe-harbor-God—
  - type: text
    content: So trust him absolutely, people;
  - type: text
    content: lay your lives on the line for him.
  - type: text
    content: God is a safe place to be.
  '9':
  - type: text
    content: Man as such is smoke,
  - type: text
    content: woman as such, a mirage.
  - type: text
    content: Put them together, they’re nothing;
  - type: text
    content: two times nothing is nothing.
