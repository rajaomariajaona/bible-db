document_id: PSA.124,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'If '
  - type: text
    content: God
  - type: text
    content: ' hadn’t been for us'
  - type: text
    content: —all together now, Israel, sing out!—
  - type: text
    content: 'If '
  - type: text
    content: God
  - type: text
    content: ' hadn’t been for us'
  - type: text
    content: when everyone went against us,
  - type: text
    content: We would have been swallowed alive
  - type: text
    content: by their violent anger,
  - type: text
    content: Swept away by the flood of rage,
  - type: text
    content: drowned in the torrent;
  - type: text
    content: We would have lost our lives
  - type: text
    content: in the wild, raging water.
  '6':
  - type: text
    content: 'Oh, blessed be '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: He didn’t go off and leave us.
  - type: text
    content: He didn’t abandon us defenseless,
  - type: text
    content: helpless as a rabbit in a pack of snarling dogs.
  '7':
  - type: text
    content: We’ve flown free from their fangs,
  - type: text
    content: free of their traps, free as a bird.
  - type: text
    content: Their grip is broken;
  - type: text
    content: we’re free as a bird in flight.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s strong name is our help,
  - type: text
    content: 'the same '
  - type: text
    content: God
  - type: text
    content: ' who made heaven and earth.'
