  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: 'If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hadn’t been for us'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —all together now, Israel, sing out!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hadn’t been for us'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when everyone went against us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We would have been swallowed alive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by their violent anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swept away by the flood of rage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drowned in the torrent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We would have lost our lives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the wild, raging water.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Oh, blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He didn’t go off and leave us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He didn’t abandon us defenseless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: helpless as a rabbit in a pack of snarling dogs.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: We’ve flown free from their fangs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: free of their traps, free as a bird.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their grip is broken;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’re free as a bird in flight.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s strong name is our help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the same '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who made heaven and earth.'
