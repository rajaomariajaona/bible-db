document_id: PSA.56,97
type_code: eng
verses:
  '1':
  - type: text
    content: Take my side, God—I’m getting kicked around,
  - type: text
    content: stomped on every day.
  - type: text
    content: Not a day goes by
  - type: text
    content: but somebody beats me up;
  - type: text
    content: They make it their duty
  - type: text
    content: to beat me up.
  - type: text
    content: When I get really afraid
  - type: text
    content: I come to you in trust.
  - type: text
    content: I’m proud to praise God;
  - type: text
    content: fearless now, I trust in God.
  - type: text
    content: What can mere mortals do?
  '10':
  - type: text
    content: I’m proud to praise God,
  - type: text
    content: 'proud to praise '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Fearless now, I trust in God;
  - type: text
    content: what can mere mortals do to me?
  '12':
  - type: text
    content: God, you did everything you promised,
  - type: text
    content: and I’m thanking you with all my heart.
  - type: text
    content: You pulled me from the brink of death,
  - type: text
    content: my feet from the cliff-edge of doom.
  - type: text
    content: Now I stroll at leisure with God
  - type: text
    content: in the sunlit fields of life.
  '5':
  - type: text
    content: They don’t let up—
  - type: text
    content: they smear my reputation
  - type: text
    content: and huddle to plot my collapse.
  - type: text
    content: They gang up,
  - type: text
    content: sneak together through the alleys
  - type: text
    content: To take me by surprise,
  - type: text
    content: wait their chance to get me.
  '7':
  - type: text
    content: Pay them back in evil!
  - type: text
    content: Get angry, God!
  - type: text
    content: Down with these people!
  '8':
  - type: text
    content: You’ve kept track of my every toss and turn
  - type: text
    content: through the sleepless nights,
  - type: text
    content: Each tear entered in your ledger,
  - type: text
    content: each ache written in your book.
  '9':
  - type: text
    content: If my enemies run away,
  - type: text
    content: turn tail when I yell at them,
  - type: text
    content: Then I’ll know
  - type: text
    content: that God is on my side.
