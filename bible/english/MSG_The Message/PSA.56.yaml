document_id: PSA.56,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take my side, God—I’m getting kicked around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stomped on every day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a day goes by
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but somebody beats me up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They make it their duty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to beat me up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I get really afraid
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I come to you in trust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m proud to praise God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fearless now, I trust in God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can mere mortals do?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m proud to praise God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'proud to praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fearless now, I trust in God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what can mere mortals do to me?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, you did everything you promised,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m thanking you with all my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You pulled me from the brink of death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my feet from the cliff-edge of doom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I stroll at leisure with God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sunlit fields of life.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They don’t let up—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they smear my reputation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and huddle to plot my collapse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gang up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sneak together through the alleys
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To take me by surprise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wait their chance to get me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay them back in evil!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get angry, God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Down with these people!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve kept track of my every toss and turn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through the sleepless nights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each tear entered in your ledger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each ache written in your book.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If my enemies run away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn tail when I yell at them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God is on my side.
