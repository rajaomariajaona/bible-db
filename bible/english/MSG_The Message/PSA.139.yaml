document_id: PSA.139,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', investigate my life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get all the facts firsthand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m an open book to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even from a distance, you know what I’m thinking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know when I leave and when I get back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m never out of your sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know everything I’m going to say
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before I start the first sentence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I look behind me and you’re there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then up ahead and you’re there, too—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your reassuring presence, coming and going.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is too much, too wonderful—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can’t take it all in!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh yes, you shaped me first inside, then out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you formed me in my mother’s womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thank you, High God—you’re breathtaking!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Body and soul, I am marvelously made!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I worship in adoration—what a creation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know me inside and out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you know every bone in my body;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know exactly how I was made, bit by bit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how I was sculpted from nothing into something.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an open book, you watched me grow from conception to birth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the stages of my life were spread out before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days of my life all prepared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before I’d even lived one day.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your thoughts—how rare, how beautiful!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God, I’ll never comprehend them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I couldn’t even begin to count them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: any more than I could count the sand of the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, let me rise in the morning and live always with you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And please, God, do away with wickedness for good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you murderers—out of here!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the men and women who belittle you, God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: infatuated with cheap god-imitations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See how I hate those who hate you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: see how I loathe all this godless arrogance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate it with pure, unadulterated hatred.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your enemies are my enemies!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Investigate my life, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: find out everything about me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cross-examine and test me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get a clear picture of what I’m about;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See for yourself whether I’ve done anything wrong—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then guide me on the road to eternal life.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there anyplace I can go to avoid your Spirit?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be out of your sight?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I climb to the sky, you’re there!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I go underground, you’re there!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I flew on morning’s wings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the far western horizon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d find me in a minute—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re already there waiting!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said to myself, “Oh, he even sees me in the dark!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At night I’m immersed in the light!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s a fact: darkness isn’t dark to you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: night and day, darkness and light, they’re all the same to you.
