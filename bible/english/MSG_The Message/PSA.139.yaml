document_id: PSA.139,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', investigate my life;'
  - type: text
    content: get all the facts firsthand.
  - type: text
    content: I’m an open book to you;
  - type: text
    content: even from a distance, you know what I’m thinking.
  - type: text
    content: You know when I leave and when I get back;
  - type: text
    content: I’m never out of your sight.
  - type: text
    content: You know everything I’m going to say
  - type: text
    content: before I start the first sentence.
  - type: text
    content: I look behind me and you’re there,
  - type: text
    content: then up ahead and you’re there, too—
  - type: text
    content: your reassuring presence, coming and going.
  - type: text
    content: This is too much, too wonderful—
  - type: text
    content: I can’t take it all in!
  '13':
  - type: text
    content: Oh yes, you shaped me first inside, then out;
  - type: text
    content: you formed me in my mother’s womb.
  - type: text
    content: I thank you, High God—you’re breathtaking!
  - type: text
    content: Body and soul, I am marvelously made!
  - type: text
    content: I worship in adoration—what a creation!
  - type: text
    content: You know me inside and out,
  - type: text
    content: you know every bone in my body;
  - type: text
    content: You know exactly how I was made, bit by bit,
  - type: text
    content: how I was sculpted from nothing into something.
  - type: text
    content: Like an open book, you watched me grow from conception to birth;
  - type: text
    content: all the stages of my life were spread out before you,
  - type: text
    content: The days of my life all prepared
  - type: text
    content: before I’d even lived one day.
  '17':
  - type: text
    content: Your thoughts—how rare, how beautiful!
  - type: text
    content: God, I’ll never comprehend them!
  - type: text
    content: I couldn’t even begin to count them—
  - type: text
    content: any more than I could count the sand of the sea.
  - type: text
    content: Oh, let me rise in the morning and live always with you!
  - type: text
    content: And please, God, do away with wickedness for good!
  - type: text
    content: And you murderers—out of here!—
  - type: text
    content: all the men and women who belittle you, God,
  - type: text
    content: infatuated with cheap god-imitations.
  - type: text
    content: 'See how I hate those who hate you, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: see how I loathe all this godless arrogance;
  - type: text
    content: I hate it with pure, unadulterated hatred.
  - type: text
    content: Your enemies are my enemies!
  '23':
  - type: text
    content: Investigate my life, O God,
  - type: text
    content: find out everything about me;
  - type: text
    content: Cross-examine and test me,
  - type: text
    content: get a clear picture of what I’m about;
  - type: text
    content: See for yourself whether I’ve done anything wrong—
  - type: text
    content: then guide me on the road to eternal life.
  '7':
  - type: text
    content: Is there anyplace I can go to avoid your Spirit?
  - type: text
    content: to be out of your sight?
  - type: text
    content: If I climb to the sky, you’re there!
  - type: text
    content: If I go underground, you’re there!
  - type: text
    content: If I flew on morning’s wings
  - type: text
    content: to the far western horizon,
  - type: text
    content: You’d find me in a minute—
  - type: text
    content: you’re already there waiting!
  - type: text
    content: Then I said to myself, “Oh, he even sees me in the dark!
  - type: text
    content: At night I’m immersed in the light!”
  - type: text
    content: 'It’s a fact: darkness isn’t dark to you;'
  - type: text
    content: night and day, darkness and light, they’re all the same to you.
