document_id: PSA.57,97
type_code: eng
verses:
  '1':
  - type: text
    content: Be good to me, God—and now!
  - type: text
    content: I’ve run to you for dear life.
  - type: text
    content: I’m hiding out under your wings
  - type: text
    content: until the hurricane blows over.
  - type: text
    content: I call out to High God,
  - type: text
    content: the God who holds me together.
  - type: text
    content: He sends orders from heaven and saves me,
  - type: text
    content: he humiliates those who kick me around.
  - type: text
    content: God delivers generous love,
  - type: text
    content: he makes good on his word.
  '11':
  - type: text
    content: Soar high in the skies, O God!
  - type: text
    content: Cover the whole earth with your glory!
  '4':
  - type: text
    content: I find myself in a pride of lions
  - type: text
    content: who are wild for a taste of human flesh;
  - type: text
    content: Their teeth are lances and arrows,
  - type: text
    content: their tongues are sharp daggers.
  '5':
  - type: text
    content: Soar high in the skies, O God!
  - type: text
    content: Cover the whole earth with your glory!
  '6':
  - type: text
    content: They booby-trapped my path;
  - type: text
    content: I thought I was dead and done for.
  - type: text
    content: They dug a mantrap to catch me,
  - type: text
    content: and fell in headlong themselves.
  '7':
  - type: text
    content: I’m ready, God, so ready,
  - type: text
    content: ready from head to toe,
  - type: text
    content: 'Ready to sing, ready to raise a tune:'
  - type: text
    content: “Wake up, soul!
  - type: text
    content: Wake up, harp! wake up, lute!
  - type: text
    content: Wake up, you sleepyhead sun!”
  '9':
  - type: text
    content: 'I’m thanking you, '
  - type: text
    content: God
  - type: text
    content: ', out loud in the streets,'
  - type: text
    content: singing your praises in town and country.
  - type: text
    content: The deeper your love, the higher it goes;
  - type: text
    content: every cloud is a flag to your faithfulness.
