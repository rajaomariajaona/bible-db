document_id: PSA.57,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be good to me, God—and now!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve run to you for dear life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m hiding out under your wings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the hurricane blows over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I call out to High God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God who holds me together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends orders from heaven and saves me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he humiliates those who kick me around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God delivers generous love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes good on his word.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soar high in the skies, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cover the whole earth with your glory!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I find myself in a pride of lions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are wild for a taste of human flesh;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their teeth are lances and arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their tongues are sharp daggers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soar high in the skies, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cover the whole earth with your glory!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They booby-trapped my path;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I thought I was dead and done for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dug a mantrap to catch me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fell in headlong themselves.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m ready, God, so ready,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready from head to toe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ready to sing, ready to raise a tune:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Wake up, soul!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, harp! wake up, lute!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up, you sleepyhead sun!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m thanking you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', out loud in the streets,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: singing your praises in town and country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The deeper your love, the higher it goes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every cloud is a flag to your faithfulness.
