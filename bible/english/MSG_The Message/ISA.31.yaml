document_id: ISA.31,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Impressed by Military Mathematics
  - type: text
    content: Doom to those who go off to Egypt
  - type: text
    content: thinking that horses can help them,
  - type: text
    content: Impressed by military mathematics,
  - type: text
    content: awed by sheer numbers of chariots and riders—
  - type: text
    content: And to The Holy of Israel, not even a glance,
  - type: text
    content: 'not so much as a prayer to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Still, he must be reckoned with,
  - type: text
    content: a most wise God who knows what he’s doing.
  - type: text
    content: He can call down catastrophe.
  - type: text
    content: He’s a God who does what he says.
  - type: text
    content: He intervenes in the work of those who do wrong,
  - type: text
    content: stands up against interfering evildoers.
  - type: text
    content: Egyptians are mortal, not God,
  - type: text
    content: and their horses are flesh, not Spirit.
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' gives the signal, helpers and helped alike'
  - type: text
    content: will fall in a heap and share the same dirt grave.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: 'This is what '
  - type: text
    content: God
  - type: text
    content: ' told me:'
  - type: text
    content: “Like a lion, king of the beasts,
  - type: text
    content: that gnaws and chews and worries its prey,
  - type: text
    content: Not fazed in the least by a bunch of shepherds
  - type: text
    content: who arrive to chase it off,
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies comes down
  - type: text
    content: to fight on Mount Zion, to make war from its heights.
  - type: text
    content: And like a huge eagle hovering in the sky,
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies protects Jerusalem.
  - type: text
    content: I’ll protect and rescue it.
  - type: text
    content: Yes, I’ll hover and deliver.”
  '6':
  - type: text
    content: Repent, return, dear Israel, to the One you so cruelly abandoned. On the day you return, you’ll throw away—every last one of you—the no-gods your sinful hands made from metal and wood.
  '8':
  - type: text
    content: “Assyrians will fall dead,
  - type: text
    content: killed by a sword-thrust but not by a soldier,
  - type: text
    content: laid low by a sword not swung by a mortal.
  - type: text
    content: Assyrians will run from that sword, run for their lives,
  - type: text
    content: and their prize young men made slaves.
  - type: text
    content: Terrorized, that rock-solid people will fall to pieces,
  - type: text
    content: their leaders scatter hysterically.”
  - type: text
    content: God
  - type: text
    content: ’s Decree on Assyria.
  - type: text
    content: His fire blazes in Zion,
  - type: text
    content: his furnace burns hot in Jerusalem.
