document_id: ISA.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impressed by Military Mathematics
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Doom to those who go off to Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: thinking that horses can help them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Impressed by military mathematics,
- type: usfm
  marker: q2
  children:
  - type: text
    text: awed by sheer numbers of chariots and riders—
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to The Holy of Israel, not even a glance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'not so much as a prayer to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, he must be reckoned with,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a most wise God who knows what he’s doing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He can call down catastrophe.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s a God who does what he says.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He intervenes in the work of those who do wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stands up against interfering evildoers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Egyptians are mortal, not God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their horses are flesh, not Spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gives the signal, helpers and helped alike'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall in a heap and share the same dirt grave.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Like a lion, king of the beasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that gnaws and chews and worries its prey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not fazed in the least by a bunch of shepherds
- type: usfm
  marker: q2
  children:
  - type: text
    text: who arrive to chase it off,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies comes down
- type: usfm
  marker: q2
  children:
  - type: text
    text: to fight on Mount Zion, to make war from its heights.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a huge eagle hovering in the sky,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies protects Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll protect and rescue it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, I’ll hover and deliver.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Repent, return, dear Israel, to the One you so cruelly abandoned. On the day you return, you’ll throw away—every last one of you—the no-gods your sinful hands made from metal and wood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: “Assyrians will fall dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: killed by a sword-thrust but not by a soldier,
- type: usfm
  marker: q2
  children:
  - type: text
    text: laid low by a sword not swung by a mortal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assyrians will run from that sword, run for their lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their prize young men made slaves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terrorized, that rock-solid people will fall to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their leaders scatter hysterically.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree on Assyria.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His fire blazes in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his furnace burns hot in Jerusalem.
