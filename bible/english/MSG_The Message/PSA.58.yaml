document_id: PSA.58,97
type_code: eng
verses:
  '1':
  - type: text
    content: Is this any way to run a country?
  - type: text
    content: Is there an honest politician in the house?
  - type: text
    content: Behind the scenes you weave webs of deceit,
  - type: text
    content: behind closed doors you make deals with demons.
  '10':
  - type: text
    content: The righteous will call up their friends
  - type: text
    content: when they see the wicked get their reward,
  - type: text
    content: Serve up their blood in goblets
  - type: text
    content: as they toast one another,
  - type: text
    content: Everyone cheering, “It’s worth it to play by the rules!
  - type: text
    content: God’s handing out trophies and tending the earth!”
  '3':
  - type: text
    content: The wicked crawl from the wrong side of the cradle;
  - type: text
    content: their first words out of the womb are lies.
  - type: text
    content: Poison, lethal rattlesnake poison,
  - type: text
    content: drips from their forked tongues—
  - type: text
    content: Deaf to threats, deaf to charm,
  - type: text
    content: decades of wax built up in their ears.
  '6':
  - type: text
    content: God, smash their teeth to bits,
  - type: text
    content: leave them toothless tigers.
  - type: text
    content: Let their lives be buckets of water spilled,
  - type: text
    content: all that’s left, a damp stain in the sand.
  - type: text
    content: Let them be trampled grass
  - type: text
    content: worn smooth by the traffic.
  - type: text
    content: Let them dissolve into snail slime,
  - type: text
    content: be a miscarried fetus that never sees sunlight.
  - type: text
    content: Before what they cook up is half-done, God,
  - type: text
    content: throw it out with the garbage!
