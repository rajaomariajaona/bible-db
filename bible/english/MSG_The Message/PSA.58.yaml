document_id: PSA.58
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Is this any way to run a country?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is there an honest politician in the house?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behind the scenes you weave webs of deceit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind closed doors you make deals with demons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: The wicked crawl from the wrong side of the cradle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their first words out of the womb are lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poison, lethal rattlesnake poison,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drips from their forked tongues—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deaf to threats, deaf to charm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: decades of wax built up in their ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: God, smash their teeth to bits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave them toothless tigers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let their lives be buckets of water spilled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all that’s left, a damp stain in the sand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be trampled grass
- type: usfm
  marker: q2
  children:
  - type: text
    text: worn smooth by the traffic.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them dissolve into snail slime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: be a miscarried fetus that never sees sunlight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before what they cook up is half-done, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: throw it out with the garbage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: The righteous will call up their friends
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they see the wicked get their reward,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serve up their blood in goblets
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they toast one another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone cheering, “It’s worth it to play by the rules!
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s handing out trophies and tending the earth!”
