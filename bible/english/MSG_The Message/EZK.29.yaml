document_id: EZK.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Never a World Power Again
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6a
  - type: text
    text: ' In the tenth year, in the tenth month, on the twelfth day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, confront Pharaoh king of Egypt. Preach against him and all the Egyptians. Tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Watch yourself, Pharaoh, king of Egypt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m dead set against you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You lumbering old dragon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lolling and flaccid in the Nile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, “It’s my Nile.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I made it. It’s mine.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll set hooks in your jaw;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll make the fish of the Nile stick to your scales.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll pull you out of the Nile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with all the fish stuck to your scales.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll drag you out into the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you and all the Nile fish sticking to your scales.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll lie there in the open, rotting in the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: meat to the wild animals and carrion birds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everybody living in Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6b-9a
  - type: text
    text: ' “‘Because you’ve been a flimsy reed crutch to Israel so that when they gripped you, you splintered and cut their hand, and when they leaned on you, you broke and sent them sprawling—Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master—I’ll bring war against you, do away with people and animals alike, and turn the country into an empty desert so they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9b-11
  - type: text
    text: ' “‘Because you said, “It’s my Nile. I made it. It’s all mine,” therefore I am against you and your rivers. I’ll reduce Egypt to an empty, desolate wasteland all the way from Migdol in the north to Syene and the border of Ethiopia in the south. Not a human will be seen in it, nor will an animal move through it. It’ll be just empty desert, empty for forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “‘I’ll make Egypt the most desolate of all desolations. For forty years I’ll make her cities the most wasted of all wasted cities. I’ll scatter Egyptians to the four winds, send them off every which way into exile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: '“‘But,’ says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, ‘that’s not the end of it. After the forty years, I’ll gather up the Egyptians from all the places where they’ve been scattered. I’ll put things back together again for Egypt. I’ll bring her back to Pathros where she got her start long ago. There she’ll start over again from scratch. She’ll take her place at the bottom of the ladder and there she’ll stay, never to climb that ladder again, never to be a world power again. Never again will Israel be tempted to rely on Egypt. All she’ll be to Israel is a reminder of old sin. Then Egypt will realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'In the twenty-seventh year, in the first month, on the first day of the month, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, Nebuchadnezzar, king of Babylon, has worn out his army against Tyre. They’ve worked their fingers to the bone and have nothing to show for it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: '“Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, ‘I’m giving Egypt to Nebuchadnezzar king of Babylon. He’ll haul away its wealth, pick the place clean. He’ll pay his army with Egyptian plunder. He’s been working for me all these years without pay. This is his pay: Egypt. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“‘And then I’ll stir up fresh hope in Israel—the dawn of deliverance!—and I’ll give you, Ezekiel, bold and confident words to speak. And they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’”
