document_id: ISA.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Babylon Is Doomed!
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Message on Babylon. Isaiah son of Amoz saw it:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: “Run up a flag on an open hill.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yell loud. Get their attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wave them into formation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Direct them to the nerve center of power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve taken charge of my special forces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: called up my crack troops.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re bursting with pride and passion
- type: usfm
  marker: q2
  children:
  - type: text
    text: to carry out my angry judgment.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Thunder rolls off the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a mob huge and noisy—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thunder of kingdoms in an uproar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nations assembling for war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies is calling
- type: usfm
  marker: q2
  children:
  - type: text
    text: his army into battle formation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They come from far-off countries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they pour in across the horizon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' on the move with the weapons of his wrath,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to destroy the whole country.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'Wail! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Day of Judgment is near—
- type: usfm
  marker: q2
  children:
  - type: text
    text: an avalanche crashing down from the Strong God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone paralyzed in the panic,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hysterical and unstrung,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doubled up in pain
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman giving birth to a baby.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horrified—everyone they see
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like a face out of a nightmare.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-16
  - type: text
    text: '“Watch now. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment Day comes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cruel it is, a day of wrath and anger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A day to waste the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and clean out all the sinners.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stars in the sky, the great parade of constellations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be nothing but black holes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sun will come up as a black disk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon a blank nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll put a full stop to the evil on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: terminate the dark acts of the wicked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll gag all braggarts and boasters—not a peep anymore from them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trip strutting tyrants, leave them flat on their faces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proud humanity will disappear from the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll make mortals rarer than hens’ teeth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And yes, I’ll even make the sky shake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the earth quake to its roots
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Under the wrath of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Judgment Day of his raging anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a hunted white-tailed deer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like lost sheep with no shepherd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: People will huddle with a few of their own kind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: run off to some makeshift shelter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But tough luck to stragglers—they’ll be killed on the spot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: throats cut, bellies ripped open,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babies smashed on the rocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: while mothers and fathers watch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Houses looted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wives raped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-22
  - type: text
    text: '“And now watch this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Against Babylon, I’m inciting the Medes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ruthless bunch indifferent to bribes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the kind of brutality that no one can blunt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They massacre the young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wantonly kick and kill even babies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Babylon, most glorious of all kingdoms,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pride and joy of Chaldeans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will end up smoking and stinking like Sodom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and, yes, like Gomorrah, when God had finished with them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will live there anymore,
- type: usfm
  marker: q2
  children:
  - type: text
    text: generation after generation a ghost town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not even Bedouins will pitch tents there.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shepherds will give it a wide berth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But strange and wild animals will like it just fine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filling the vacant houses with eerie night sounds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Skunks will make it their home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and unspeakable night hags will haunt it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hyenas will curdle your blood with their laughing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the howling of coyotes will give you the shivers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Babylon is doomed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It won’t be long now.”
