document_id: ISA.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Babylon Is Doomed!
  - type: text
    content: 'The Message on Babylon. Isaiah son of Amoz saw it:'
  '17':
  - type: text
    content: '“And now watch this:'
  - type: text
    content: Against Babylon, I’m inciting the Medes,
  - type: text
    content: A ruthless bunch indifferent to bribes,
  - type: text
    content: the kind of brutality that no one can blunt.
  - type: text
    content: They massacre the young,
  - type: text
    content: wantonly kick and kill even babies.
  - type: text
    content: And Babylon, most glorious of all kingdoms,
  - type: text
    content: the pride and joy of Chaldeans,
  - type: text
    content: Will end up smoking and stinking like Sodom,
  - type: text
    content: and, yes, like Gomorrah, when God had finished with them.
  - type: text
    content: No one will live there anymore,
  - type: text
    content: generation after generation a ghost town.
  - type: text
    content: Not even Bedouins will pitch tents there.
  - type: text
    content: Shepherds will give it a wide berth.
  - type: text
    content: But strange and wild animals will like it just fine,
  - type: text
    content: filling the vacant houses with eerie night sounds.
  - type: text
    content: Skunks will make it their home,
  - type: text
    content: and unspeakable night hags will haunt it.
  - type: text
    content: Hyenas will curdle your blood with their laughing,
  - type: text
    content: and the howling of coyotes will give you the shivers.
  - type: text
    content: “Babylon is doomed.
  - type: text
    content: It won’t be long now.”
  '2':
  - type: text
    content: “Run up a flag on an open hill.
  - type: text
    content: Yell loud. Get their attention.
  - type: text
    content: Wave them into formation.
  - type: text
    content: Direct them to the nerve center of power.
  - type: text
    content: I’ve taken charge of my special forces,
  - type: text
    content: called up my crack troops.
  - type: text
    content: They’re bursting with pride and passion
  - type: text
    content: to carry out my angry judgment.”
  '4':
  - type: text
    content: Thunder rolls off the mountains
  - type: text
    content: like a mob huge and noisy—
  - type: text
    content: Thunder of kingdoms in an uproar,
  - type: text
    content: nations assembling for war.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies is calling
  - type: text
    content: his army into battle formation.
  - type: text
    content: They come from far-off countries,
  - type: text
    content: they pour in across the horizon.
  - type: text
    content: 'It’s '
  - type: text
    content: God
  - type: text
    content: ' on the move with the weapons of his wrath,'
  - type: text
    content: ready to destroy the whole country.
  '6':
  - type: text
    content: 'Wail! '
  - type: text
    content: God
  - type: text
    content: ’s Day of Judgment is near—
  - type: text
    content: an avalanche crashing down from the Strong God!
  - type: text
    content: Everyone paralyzed in the panic,
  - type: text
    content: hysterical and unstrung,
  - type: text
    content: Doubled up in pain
  - type: text
    content: like a woman giving birth to a baby.
  - type: text
    content: Horrified—everyone they see
  - type: text
    content: is like a face out of a nightmare.
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: '“Watch now. '
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day comes.
  - type: text
    content: Cruel it is, a day of wrath and anger,
  - type: text
    content: A day to waste the earth
  - type: text
    content: and clean out all the sinners.
  - type: text
    content: The stars in the sky, the great parade of constellations,
  - type: text
    content: will be nothing but black holes.
  - type: text
    content: The sun will come up as a black disk,
  - type: text
    content: and the moon a blank nothing.
  - type: text
    content: I’ll put a full stop to the evil on earth,
  - type: text
    content: terminate the dark acts of the wicked.
  - type: text
    content: I’ll gag all braggarts and boasters—not a peep anymore from them—
  - type: text
    content: and trip strutting tyrants, leave them flat on their faces.
  - type: text
    content: Proud humanity will disappear from the earth.
  - type: text
    content: I’ll make mortals rarer than hens’ teeth.
  - type: text
    content: And yes, I’ll even make the sky shake,
  - type: text
    content: and the earth quake to its roots
  - type: text
    content: 'Under the wrath of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: the Judgment Day of his raging anger.
  - type: text
    content: Like a hunted white-tailed deer,
  - type: text
    content: like lost sheep with no shepherd,
  - type: text
    content: People will huddle with a few of their own kind,
  - type: text
    content: run off to some makeshift shelter.
  - type: text
    content: But tough luck to stragglers—they’ll be killed on the spot,
  - type: text
    content: throats cut, bellies ripped open,
  - type: text
    content: Babies smashed on the rocks
  - type: text
    content: while mothers and fathers watch,
  - type: text
    content: Houses looted,
  - type: text
    content: wives raped.
