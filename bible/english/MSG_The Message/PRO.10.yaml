document_id: PRO.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: The Wise Sayings of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: An Honest Life Is Immortal
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise son, glad father;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stupid son, sad mother.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An evasive eye is a sign of trouble ahead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but an open, face-to-face meeting results in peace.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mouth of a good person is a deep, life-giving well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the mouth of the wicked is a dark cave of abuse.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatred starts fights,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but love pulls a quilt over the bickering.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll find wisdom on the lips of a person of insight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the shortsighted needs a slap in the face.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wise accumulate knowledge—a true treasure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: know-it-alls talk too much—a sheer waste.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Road to Life Is a Disciplined Life
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wealth of the rich is their security;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the poverty of the indigent is their ruin.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wage of a good person is exuberant life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an evil person ends up with nothing but sin.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The road to life is a disciplined life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignore correction and you’re lost for good.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Liars secretly hoard hatred;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools openly spread slander.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The more talk, the less truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wise measure their words.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ill-gotten gain gets you nowhere;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an honest life is immortal.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The speech of a good person is worth waiting for;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blabber of the wicked is worthless.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The talk of a good person is rich fare for many,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but chatterboxes die of an empty heart.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Expands Your Life'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s blessing makes life rich;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing we do can improve on God.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An empty-head thinks mischief is fun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a mindful person relishes wisdom.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nightmares of the wicked come true;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what the good people desire, they get.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the storm is over, there’s nothing left of the wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good people, firm on their rock foundation, aren’t even fazed.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lazy employee will give you nothing but trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s vinegar in the mouth, smoke in the eyes.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' expands your life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wicked life is a puny life.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The aspirations of good people end in celebration;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ambitions of bad people crash.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is solid backing to a well-lived life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he calls into question a shabby performance.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' won’t starve an honest soul,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he frustrates the appetites of the wicked.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Good people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: last
    - type: text
      text: —they can’t be moved;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked are here today, gone tomorrow.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good person’s mouth is a clear fountain of wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a foul mouth is a stagnant swamp.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The speech of a good person clears the air;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the words of the wicked pollute it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sloth makes you poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: diligence brings wealth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make hay while the sun shines—that’s smart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go fishing during harvest—that’s stupid.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessings accrue on a good and honest life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the mouth of the wicked is a dark cave of abuse.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good and honest life is a blessed memorial;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wicked life leaves a rotten stench.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise heart takes orders;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an empty head will come unglued.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honesty lives confident and carefree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but Shifty is sure to be exposed.
