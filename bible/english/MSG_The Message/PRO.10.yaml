document_id: PRO.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wise Sayings of Solomon
  - type: heading
    content: An Honest Life Is Immortal
  - type: text
    content: Wise son, glad father;
  - type: text
    content: stupid son, sad mother.
  '10':
  - type: text
    content: An evasive eye is a sign of trouble ahead,
  - type: text
    content: but an open, face-to-face meeting results in peace.
  '11':
  - type: text
    content: The mouth of a good person is a deep, life-giving well,
  - type: text
    content: but the mouth of the wicked is a dark cave of abuse.
  '12':
  - type: text
    content: Hatred starts fights,
  - type: text
    content: but love pulls a quilt over the bickering.
  '13':
  - type: text
    content: You’ll find wisdom on the lips of a person of insight,
  - type: text
    content: but the shortsighted needs a slap in the face.
  '14':
  - type: text
    content: The wise accumulate knowledge—a true treasure;
  - type: text
    content: know-it-alls talk too much—a sheer waste.
  - type: heading
    content: The Road to Life Is a Disciplined Life
  '15':
  - type: text
    content: The wealth of the rich is their security;
  - type: text
    content: the poverty of the indigent is their ruin.
  '16':
  - type: text
    content: The wage of a good person is exuberant life;
  - type: text
    content: an evil person ends up with nothing but sin.
  '17':
  - type: text
    content: The road to life is a disciplined life;
  - type: text
    content: ignore correction and you’re lost for good.
  '18':
  - type: text
    content: Liars secretly hoard hatred;
  - type: text
    content: fools openly spread slander.
  '19':
  - type: text
    content: The more talk, the less truth;
  - type: text
    content: the wise measure their words.
  '2':
  - type: text
    content: Ill-gotten gain gets you nowhere;
  - type: text
    content: an honest life is immortal.
  '20':
  - type: text
    content: The speech of a good person is worth waiting for;
  - type: text
    content: the blabber of the wicked is worthless.
  '21':
  - type: text
    content: The talk of a good person is rich fare for many,
  - type: text
    content: but chatterboxes die of an empty heart.
  - type: heading
    content: Fear-of-God Expands Your Life
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s blessing makes life rich;
  - type: text
    content: nothing we do can improve on God.
  '23':
  - type: text
    content: An empty-head thinks mischief is fun,
  - type: text
    content: but a mindful person relishes wisdom.
  '24':
  - type: text
    content: The nightmares of the wicked come true;
  - type: text
    content: what the good people desire, they get.
  '25':
  - type: text
    content: When the storm is over, there’s nothing left of the wicked;
  - type: text
    content: good people, firm on their rock foundation, aren’t even fazed.
  '26':
  - type: text
    content: A lazy employee will give you nothing but trouble;
  - type: text
    content: it’s vinegar in the mouth, smoke in the eyes.
  '27':
  - type: text
    content: The Fear-of-
  - type: text
    content: God
  - type: text
    content: ' expands your life;'
  - type: text
    content: a wicked life is a puny life.
  '28':
  - type: text
    content: The aspirations of good people end in celebration;
  - type: text
    content: the ambitions of bad people crash.
  '29':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is solid backing to a well-lived life,'
  - type: text
    content: but he calls into question a shabby performance.
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' won’t starve an honest soul,'
  - type: text
    content: but he frustrates the appetites of the wicked.
  '30':
  - type: text
    content: 'Good people '
  - type: text
    content: last
  - type: text
    content: —they can’t be moved;
  - type: text
    content: the wicked are here today, gone tomorrow.
  '31':
  - type: text
    content: A good person’s mouth is a clear fountain of wisdom;
  - type: text
    content: a foul mouth is a stagnant swamp.
  '32':
  - type: text
    content: The speech of a good person clears the air;
  - type: text
    content: the words of the wicked pollute it.
  '4':
  - type: text
    content: Sloth makes you poor;
  - type: text
    content: diligence brings wealth.
  '5':
  - type: text
    content: Make hay while the sun shines—that’s smart;
  - type: text
    content: go fishing during harvest—that’s stupid.
  '6':
  - type: text
    content: Blessings accrue on a good and honest life,
  - type: text
    content: but the mouth of the wicked is a dark cave of abuse.
  '7':
  - type: text
    content: A good and honest life is a blessed memorial;
  - type: text
    content: a wicked life leaves a rotten stench.
  '8':
  - type: text
    content: A wise heart takes orders;
  - type: text
    content: an empty head will come unglued.
  '9':
  - type: text
    content: Honesty lives confident and carefree,
  - type: text
    content: but Shifty is sure to be exposed.
