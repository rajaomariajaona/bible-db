document_id: PRO.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Speak Out for Justice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The words of King Lemuel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the strong advice his mother gave him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: “Oh, son of mine, what can you be thinking of!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Child whom I bore! The son I dedicated to God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t dilute your strength on fortune-hunting women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: promiscuous women who shipwreck leaders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: “Leaders can’t afford to make fools of themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gulping wine and swilling beer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lest, hung over, they don’t know right from wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people who depend on them are hurt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Use wine and beer only as sedatives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to kill the pain and dull the ache
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of the terminally ill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for whom life is a living death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: “Speak up for the people who have no voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the rights of all the misfits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Speak out for justice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Stand up for the poor and destitute!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hymn to a Good Wife
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-31
  - type: text
    text: A good woman is hard to find,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and worth far more than diamonds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her husband trusts her without reserve,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never has reason to regret it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never spiteful, she treats him generously
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her life long.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She shops around for the best yarns and cottons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and enjoys knitting and sewing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s like a trading ship that sails to faraway places
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brings back exotic surprises.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s up before dawn, preparing breakfast
- type: usfm
  marker: q2
  children:
  - type: text
    text: for her family and organizing her day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She looks over a field and buys it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then, with money she’s put aside, plants a garden.
- type: usfm
  marker: q1
  children:
  - type: text
    text: First thing in the morning, she dresses for work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rolls up her sleeves, eager to get started.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She senses the worth of her work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is in no hurry to call it quits for the day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s skilled in the crafts of home and hearth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: diligent in homemaking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s quick to assist anyone in need,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reaches out to help the poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She doesn’t worry about her family when it snows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their winter clothes are all mended and ready to wear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She makes her own clothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dresses in colorful linens and silks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her husband is greatly respected
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he deliberates with the city fathers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She designs gowns and sells them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brings the sweaters she knits to the dress shops.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her clothes are well-made and elegant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and she always faces tomorrow with a smile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When she speaks she has something worthwhile to say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and she always says it kindly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She keeps an eye on everyone in her household,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keeps them all busy and productive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her children respect and bless her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'her husband joins in with words of praise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Many women have done wonderful things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’ve outclassed them all!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Charm can mislead and beauty soon fades.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The woman to be admired and praised
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the woman who lives in the Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give her everything she deserves!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Adorn her life with praises!
