document_id: PRO.31,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Speak Out for Justice
  - type: text
    content: The words of King Lemuel,
  - type: text
    content: 'the strong advice his mother gave him:'
  '10':
  - type: text
    content: A good woman is hard to find,
  - type: text
    content: and worth far more than diamonds.
  - type: text
    content: Her husband trusts her without reserve,
  - type: text
    content: and never has reason to regret it.
  - type: text
    content: Never spiteful, she treats him generously
  - type: text
    content: all her life long.
  - type: text
    content: She shops around for the best yarns and cottons,
  - type: text
    content: and enjoys knitting and sewing.
  - type: text
    content: She’s like a trading ship that sails to faraway places
  - type: text
    content: and brings back exotic surprises.
  - type: text
    content: She’s up before dawn, preparing breakfast
  - type: text
    content: for her family and organizing her day.
  - type: text
    content: She looks over a field and buys it,
  - type: text
    content: then, with money she’s put aside, plants a garden.
  - type: text
    content: First thing in the morning, she dresses for work,
  - type: text
    content: rolls up her sleeves, eager to get started.
  - type: text
    content: She senses the worth of her work,
  - type: text
    content: is in no hurry to call it quits for the day.
  - type: text
    content: She’s skilled in the crafts of home and hearth,
  - type: text
    content: diligent in homemaking.
  - type: text
    content: She’s quick to assist anyone in need,
  - type: text
    content: reaches out to help the poor.
  - type: text
    content: She doesn’t worry about her family when it snows;
  - type: text
    content: their winter clothes are all mended and ready to wear.
  - type: text
    content: She makes her own clothing,
  - type: text
    content: and dresses in colorful linens and silks.
  - type: text
    content: Her husband is greatly respected
  - type: text
    content: when he deliberates with the city fathers.
  - type: text
    content: She designs gowns and sells them,
  - type: text
    content: brings the sweaters she knits to the dress shops.
  - type: text
    content: Her clothes are well-made and elegant,
  - type: text
    content: and she always faces tomorrow with a smile.
  - type: text
    content: When she speaks she has something worthwhile to say,
  - type: text
    content: and she always says it kindly.
  - type: text
    content: She keeps an eye on everyone in her household,
  - type: text
    content: and keeps them all busy and productive.
  - type: text
    content: Her children respect and bless her;
  - type: text
    content: 'her husband joins in with words of praise:'
  - type: text
    content: “Many women have done wonderful things,
  - type: text
    content: but you’ve outclassed them all!”
  - type: text
    content: Charm can mislead and beauty soon fades.
  - type: text
    content: The woman to be admired and praised
  - type: text
    content: is the woman who lives in the Fear-of-
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Give her everything she deserves!
  - type: text
    content: Adorn her life with praises!
  '2':
  - type: text
    content: “Oh, son of mine, what can you be thinking of!
  - type: text
    content: Child whom I bore! The son I dedicated to God!
  - type: text
    content: Don’t dilute your strength on fortune-hunting women,
  - type: text
    content: promiscuous women who shipwreck leaders.
  '4':
  - type: text
    content: “Leaders can’t afford to make fools of themselves,
  - type: text
    content: gulping wine and swilling beer,
  - type: text
    content: Lest, hung over, they don’t know right from wrong,
  - type: text
    content: and the people who depend on them are hurt.
  - type: text
    content: Use wine and beer only as sedatives,
  - type: text
    content: to kill the pain and dull the ache
  - type: text
    content: Of the terminally ill,
  - type: text
    content: for whom life is a living death.
  '8':
  - type: text
    content: “Speak up for the people who have no voice,
  - type: text
    content: for the rights of all the misfits.
  - type: text
    content: Speak out for justice!
  - type: text
    content: Stand up for the poor and destitute!”
  - type: heading
    content: Hymn to a Good Wife
