document_id: NEH.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: “I Stationed Armed Guards”
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'When Sanballat heard that we were rebuilding the wall he exploded in anger, vilifying the Jews. In the company of his Samaritan cronies and military he let loose: “What are these miserable Jews doing? Do they think they can get everything back to normal overnight? Make building stones out of make-believe?”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But soon word was going around in Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The builders are pooped,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rubbish piles up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re in over our heads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we can’t build this wall.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'And all this time our enemies were saying, “They won’t know what hit them. Before they know it we’ll be at their throats, killing them right and left. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'That '
    - type: text
      text: will put a stop to the work!” The Jews who were their neighbors kept reporting, “They have us surrounded; they’re going to attack!” If we heard it once, we heard it ten times.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'So I stationed armed guards at the most vulnerable places of the wall and assigned people by families with their swords, lances, and bows. After looking things over I stood up and spoke to the nobles, officials, and everyone else: “Don’t be afraid of them. Put your minds on the Master, great and awesome, and then fight for your brothers, your sons, your daughters, your wives, and your homes.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: Our enemies learned that we knew all about their plan and that God had frustrated it. And we went back to the wall and went to work. From then on half of my young men worked while the other half stood guard with lances, shields, bows, and mail armor. Military officers served as backup for everyone in Judah who was at work rebuilding the wall. The common laborers held a tool in one hand and a spear in the other. Each of the builders had a sword strapped to his side as he worked. I kept the trumpeter at my side to sound the alert.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: 'Then I spoke to the nobles and officials and everyone else: “There’s a lot of work going on and we are spread out all along the wall, separated from each other. When you hear the trumpet call, join us there; our God will fight for us.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And so we kept working, from first light until the stars came out, half of us holding lances.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I also instructed the people, “Each person and his helper is to stay inside Jerusalem—guards by night and workmen by day.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: We all slept in our clothes—I, my brothers, my workmen, and the guards backing me up. And each one kept his spear in his hand, even when getting water.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: At his side, Tobiah the Ammonite jumped in and said, “That’s right! What do they think they’re building? Why, if a fox climbed that wall, it would fall to pieces under his weight.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'Nehemiah prayed, “Oh listen to us, dear God. We’re so despised: Boomerang their ridicule on their heads; have their enemies cart them off as war trophies to a land of no return; don’t forgive their iniquity, don’t wipe away their sin—they’ve insulted the builders!”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We kept at it, repairing and rebuilding the wall. The whole wall was soon joined together and halfway to its intended height because the people had a heart for the work.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: When Sanballat, Tobiah, the Arabs, the Ammonites, and the Ashdodites heard that the repairs of the walls of Jerusalem were going so well—that the breaks in the wall were being fixed—they were absolutely furious. They put their heads together and decided to fight against Jerusalem and create as much trouble as they could. We countered with prayer to our God and set a round-the-clock guard against them.
