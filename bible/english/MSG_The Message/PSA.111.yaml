document_id: PSA.111,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'I give thanks to '
  - type: text
    content: God
  - type: text
    content: ' with everything I’ve got—'
  - type: text
    content: Wherever good people gather, and in the congregation.
  - type: text
    content: God
  - type: text
    content: ’s works are so great, worth
  - type: text
    content: A lifetime of study—endless enjoyment!
  - type: text
    content: Splendor and beauty mark his craft;
  - type: text
    content: His generosity never gives out.
  - type: text
    content: His miracles are his memorial—
  - type: text
    content: 'This '
  - type: text
    content: God
  - type: text
    content: ' of Grace, this '
  - type: text
    content: God
  - type: text
    content: ' of Love.'
  - type: text
    content: He gave food to those who fear him,
  - type: text
    content: He remembered to keep his ancient promise.
  - type: text
    content: 'He proved to his people that he could do what he said:'
  - type: text
    content: Hand them the nations on a platter—a gift!
  - type: text
    content: He manufactures truth and justice;
  - type: text
    content: All his products are guaranteed to last—
  - type: text
    content: Never out-of-date, never obsolete, rust-proof.
  - type: text
    content: 'All that he makes and does is honest and true:'
  - type: text
    content: He paid the ransom for his people,
  - type: text
    content: He ordered his Covenant kept forever.
  - type: text
    content: He’s so personal and holy, worthy of our respect.
  - type: text
    content: 'The good life begins in the fear of '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: 'Do that and you’ll know the blessing of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: His Hallelujah lasts forever!
