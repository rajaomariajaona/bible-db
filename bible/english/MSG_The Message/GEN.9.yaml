document_id: GEN.9,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'God blessed Noah and his sons: He said, “Prosper! Reproduce! Fill the Earth! Every living creature—birds, animals, fish—will fall under your spell and be afraid of you. You’re responsible for them. All living creatures are yours for food; just as I gave you the plants, now I give you everything else. Except for meat with its lifeblood still in it—don’t eat that.'
  '12':
  - type: text
    content: God continued, “This is the sign of the covenant I am making between me and you and everything living around you and everyone living after you. I’m putting my rainbow in the clouds, a sign of the covenant between me and the Earth. From now on, when I form a cloud over the Earth and the rainbow appears in the cloud, I’ll remember my covenant between me and you and everything living, that never again will floodwaters destroy all life. When the rainbow appears in the cloud, I’ll see it and remember the eternal covenant between God and everything living, every last living creature on Earth.”
  '17':
  - type: text
    content: And God said, “This is the sign of the covenant that I’ve set up between me and everything living on the Earth.”
  '18':
  - type: text
    content: The sons of Noah who came out of the ship were Shem, Ham, and Japheth. Ham was the father of Canaan. These are the three sons of Noah; from these three the whole Earth was populated.
  '20':
  - type: text
    content: Noah, a farmer, was the first to plant a vineyard. He drank from its wine, got drunk and passed out, naked in his tent. Ham, the father of Canaan, saw that his father was naked and told his two brothers who were outside the tent. Shem and Japheth took a cloak, held it between them from their shoulders, walked backward and covered their father’s nakedness, keeping their faces turned away so they did not see their father’s exposed body.
  '24':
  - type: text
    content: When Noah woke up with his hangover, he learned what his youngest son had done. He said,
  - type: text
    content: Cursed be Canaan! A slave of slaves,
  - type: text
    content: a slave to his brothers!
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: ', the God of Shem,'
  - type: text
    content: but Canaan shall be his slave.
  - type: text
    content: God prosper Japheth,
  - type: text
    content: living spaciously in the tents of Shem.
  - type: text
    content: But Canaan shall be his slave.
  '28':
  - type: text
    content: Noah lived another 350 years following the flood. He lived a total of 950 years. And he died.
  '5':
  - type: text
    content: “But your own lifeblood I will avenge; I will avenge it against both animals and other humans.
  '6':
  - type: text
    content: Whoever sheds human blood,
  - type: text
    content: by humans let his blood be shed,
  - type: text
    content: Because God made humans in his image
  - type: text
    content: reflecting God’s very nature.
  - type: text
    content: You’re here to bear fruit, reproduce,
  - type: text
    content: lavish life on the Earth, live bountifully!”
  '8':
  - type: text
    content: 'Then God spoke to Noah and his sons: “I’m setting up my covenant with you including your children who will come after you, along with everything alive around you—birds, farm animals, wild animals—that came out of the ship with you. I’m setting up my covenant with you that never again will everything living be destroyed by floodwaters; no, never again will a flood destroy the Earth.”'
