document_id: 1CH.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Builds
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'King Hiram of Tyre sent an envoy to David, along with cedar lumber, masons, and carpenters to build him a royal palace. Then David knew for sure that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had confirmed him as king over Israel, because of the rising reputation that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was giving his kingdom for the benefit of his people Israel. David married more wives and had more children in Jerusalem. His children born in Jerusalem were Shammua, Shobab, Nathan, Solomon, Ibhar, Elishua, Elpelet, Nogah, Nepheg, Japhia, Elishama, Beeliada, and Eliphelet.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'David prayed to God: “Is this the right time to attack the Philistines? Will you give me the victory?”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' answered, “Attack; I’ll give you the victory.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: David attacked at Baal Perazim and slaughtered them. David said, “God exploded my enemies, as water explodes from a burst pipe.” That’s how the place got its name, Baal Perazim (Baal-Explosion). The Philistines left their gods behind and David ordered that they be burned up.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: And then the Philistines were back at it again, plundering in the valley. David again prayed to God. God answered, “This time don’t attack head-on; circle around and come at them out of the balsam grove. When you hear a sound like shuffling feet in the tops of the balsams, attack; God will be two steps ahead of you, slaughtering the Philistines.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: David did exactly as God commanded, slaughtering Philistines all the way from Gibeon to Gezer.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'David was soon famous all over the place, far and near; and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put the fear of God into the godless nations.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: The minute the Philistines heard that David had been made king over a united Israel, they went out in force to capture David. When David got the report, he marched out to confront them. On their way, the Philistines stopped off to plunder the Valley of Rephaim.
