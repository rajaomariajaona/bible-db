  - type: text
    content: ' topples the northern cedars.'
  '6':
  - type: text
    content: The mountain ranges skip like spring colts,
  - type: text
    content: The high ridges jump like wild kid goats.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s thunder spits fire.
  - type: text
    content: God
  - type: text
    content: ' thunders, the wilderness quakes;'
  - type: text
    content: He makes the desert of Kadesh shake.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s thunder sets the oak trees dancing
  - type: text
    content: A wild dance, whirling; the pelting rain strips their branches.
  - type: text
    content: We fall to our knees—we call out, “Glory!”
