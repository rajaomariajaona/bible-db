document_id: PSA.29,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bravo, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', bravo!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gods and all angels shout, “Encore!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In awe before the glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in awe before God’s visible power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand at attention!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dress your best to honor him!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Above the floodwaters is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from which his power flows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from which he rules the world.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' makes his people strong.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives his people peace.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' thunders across the waters,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brilliant, his voice and his face, streaming brightness—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', across the flood waters.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s thunder tympanic,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s thunder symphonic.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s thunder smashes cedars,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' topples the northern cedars.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountain ranges skip like spring colts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The high ridges jump like wild kid goats.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s thunder spits fire.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' thunders, the wilderness quakes;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the desert of Kadesh shake.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s thunder sets the oak trees dancing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wild dance, whirling; the pelting rain strips their branches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We fall to our knees—we call out, “Glory!”
