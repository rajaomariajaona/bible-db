  - type: text
    content: ', bravo!'
  - type: text
    content: Gods and all angels shout, “Encore!”
  - type: text
    content: In awe before the glory,
  - type: text
    content: in awe before God’s visible power.
  - type: text
    content: Stand at attention!
  - type: text
    content: Dress your best to honor him!
  '10':
  - type: text
    content: 'Above the floodwaters is '
  - type: text
    content: God
  - type: text
    content: ’s throne
  - type: text
    content: from which his power flows,
  - type: text
    content: from which he rules the world.
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' makes his people strong.'
  - type: text
    content: God
  - type: text
    content: ' gives his people peace.'
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' thunders across the waters,'
  - type: text
    content: Brilliant, his voice and his face, streaming brightness—
  - type: text
    content: God
  - type: text
    content: ', across the flood waters.'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s thunder tympanic,
  - type: text
    content: God
  - type: text
    content: ’s thunder symphonic.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s thunder smashes cedars,
  - type: text
