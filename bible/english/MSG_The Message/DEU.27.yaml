document_id: DEU.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Moses commanded the leaders of Israel and charged the people: Keep every commandment that I command you today. On the day you cross the Jordan into the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you, erect large stones and coat them with plaster. As soon as you cross over the river, write on the stones all the words of this Revelation so that you’ll enter the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you, that land flowing with milk and honey that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-Your-Fathers, promised you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: 'So when you’ve crossed the Jordan, erect these stones on Mount Ebal. Then coat them with plaster. Build an Altar of stones for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, there on the mountain. Don’t use an iron tool on the stones; build the Altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, with uncut stones and offer your Whole-Burnt-Offerings on it to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. When you sacrifice your Peace-Offerings you will also eat them there, rejoicing in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Write all the words of this Revelation on the stones. Incise them sharply.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Moses and the Levitical priests addressed all Israel: Quiet. Listen obediently, Israel. This very day you have become the people of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Listen to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Keep his commandments and regulations that I’m commanding you today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: 'That day Moses commanded: After you’ve crossed the Jordan, these tribes will stand on Mount Gerizim to bless the people: Simeon, Levi, Judah, Issachar, Joseph, and Benjamin. And these will stand on Mount Ebal for the curse: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-26
  - type: text
    text: 'The Levites, acting as spokesmen and speaking loudly, will address Israel:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s curse on anyone who carves or casts a god-image—an abomination to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made by a craftsman—and sets it up in secret.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who demeans a parent.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who moves his neighbor’s boundary marker.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who misdirects a blind man on the road.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who interferes with justice due the foreigner, orphan, or widow.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who has sex with his father’s wife; he has violated the woman who belongs to his father.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who has sex with an animal.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who has sex with his sister, the daughter of his father or mother.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who has sex with his mother-in-law.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who kills his neighbor in secret.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on anyone who takes a bribe to kill an innocent person.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse on whoever does not give substance to the words of this Revelation by living them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All respond: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes. Absolutely.
- type: usfm
