document_id: PSA.76,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: God is well-known in Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Israel, he’s a household name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps a house in Salem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his own suite of rooms in Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s where, using arrows for kindling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he made a bonfire of weapons of war.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'Do for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' what you said you’d do—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is, after all, your God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let everyone in town bring offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the One Who Watches our every move.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody gets by with anything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one plays fast and loose with him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: Oh, how bright you shine!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Outshining their huge piles of loot!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The warriors were plundered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and left there impotent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now there’s nothing to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing to show for their swagger and threats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sudden roar, God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knocked the wind out of horse and rider.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: Fierce you are, and fearsome!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can stand up to your rising anger?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From heaven you thunder judgment;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earth falls to her knees and holds her breath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God stands tall and makes things right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he saves all the wretched on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of smoldering rage—God-praise!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All that sputtering rage—now a garland for God!
