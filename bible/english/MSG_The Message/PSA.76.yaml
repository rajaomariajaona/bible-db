document_id: PSA.76,97
type_code: eng
verses:
  '1':
  - type: text
    content: God is well-known in Judah;
  - type: text
    content: in Israel, he’s a household name.
  - type: text
    content: He keeps a house in Salem,
  - type: text
    content: his own suite of rooms in Zion.
  - type: text
    content: That’s where, using arrows for kindling,
  - type: text
    content: he made a bonfire of weapons of war.
  '11':
  - type: text
    content: 'Do for '
  - type: text
    content: God
  - type: text
    content: ' what you said you’d do—'
  - type: text
    content: he is, after all, your God.
  - type: text
    content: Let everyone in town bring offerings
  - type: text
    content: to the One Who Watches our every move.
  - type: text
    content: Nobody gets by with anything,
  - type: text
    content: no one plays fast and loose with him.
  '4':
  - type: text
    content: Oh, how bright you shine!
  - type: text
    content: Outshining their huge piles of loot!
  - type: text
    content: The warriors were plundered
  - type: text
    content: and left there impotent.
  - type: text
    content: And now there’s nothing to them,
  - type: text
    content: nothing to show for their swagger and threats.
  - type: text
    content: Your sudden roar, God of Jacob,
  - type: text
    content: knocked the wind out of horse and rider.
  '7':
  - type: text
    content: Fierce you are, and fearsome!
  - type: text
    content: Who can stand up to your rising anger?
  - type: text
    content: From heaven you thunder judgment;
  - type: text
    content: earth falls to her knees and holds her breath.
  - type: text
    content: God stands tall and makes things right,
  - type: text
    content: he saves all the wretched on earth.
  - type: text
    content: Instead of smoldering rage—God-praise!
  - type: text
    content: All that sputtering rage—now a garland for God!
