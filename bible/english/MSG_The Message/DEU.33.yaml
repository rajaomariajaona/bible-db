document_id: DEU.33,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Blessing
  - type: text
    content: Moses, man of God, blessed the People of Israel with this blessing before his death. He said,
  - type: text
    content: God
  - type: text
    content: ' came down from Sinai,'
  - type: text
    content: he dawned from Seir upon them;
  - type: text
    content: He radiated light from Mount Paran,
  - type: text
    content: coming with ten thousand holy angels
  - type: text
    content: And tongues of fire
  - type: text
    content: streaming from his right hand.
  - type: text
    content: Oh, how you love the people,
  - type: text
    content: all his holy ones are palmed in your left hand.
  - type: text
    content: They sit at your feet,
  - type: text
    content: honoring your teaching,
  - type: text
    content: The Revelation commanded by Moses,
  - type: text
    content: as the assembly of Jacob’s inheritance.
  - type: text
    content: 'Thus '
  - type: text
    content: God
  - type: text
    content: ' became king in Jeshurun'
  - type: text
    content: as the leaders and tribes of Israel gathered.
  '12':
  - type: text
    content: 'Benjamin:'
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ’s beloved;
  - type: text
    content: God
  - type: text
    content: ’s permanent residence.
  - type: text
    content: 'Encircled by '
  - type: text
    content: God
  - type: text
    content: ' all day long,'
  - type: text
    content: 'within whom '
  - type: text
    content: God
  - type: text
    content: ' is at home.”'
  '13':
  - type: text
    content: 'Joseph:'
  - type: text
    content: '“Blessed by '
  - type: text
    content: God
  - type: text
    content: ' be his land:'
  - type: text
    content: The best fresh dew from high heaven,
  - type: text
    content: and fountains springing from the depths;
  - type: text
    content: The best radiance streaming from the sun
  - type: text
    content: and the best the moon has to offer;
  - type: text
    content: Beauty pouring off the tops of the mountains
  - type: text
    content: and the best from the everlasting hills;
  - type: text
    content: The best of Earth’s exuberant gifts,
  - type: text
    content: the smile of the Burning-Bush Dweller.
  - type: text
    content: All this on the head of Joseph,
  - type: text
    content: on the brow of the set-apart one among his brothers.
  - type: text
    content: In splendor he’s like a firstborn bull,
  - type: text
    content: his horns the horns of a wild ox;
  - type: text
    content: He’ll gore the nations with those horns,
  - type: text
    content: push them all to the ends of the Earth.
  - type: text
    content: Ephraim by the ten thousands will do this,
  - type: text
    content: Manasseh by the thousands will do this.”
  '18':
  - type: text
    content: 'Zebulun and Issachar:'
  - type: text
    content: “Celebrate, Zebulun, as you go out,
  - type: text
    content: and Issachar, as you stay home.
  - type: text
    content: They’ll invite people to the Mountain
  - type: text
    content: and offer sacrifices of right worship,
  - type: text
    content: For they will have hauled riches in from the sea
  - type: text
    content: and gleaned treasures from the beaches.”
  '20':
  - type: text
    content: 'Gad:'
  - type: text
    content: “Blessed is he who makes Gad large.
  - type: text
    content: Gad roams like a lion,
  - type: text
    content: tears off an arm, rips open a skull.
  - type: text
    content: He took one look and grabbed the best place for himself,
  - type: text
    content: the portion just made for someone in charge.
  - type: text
    content: He took his place at the head,
  - type: text
    content: 'carried out '
  - type: text
    content: God
  - type: text
    content: ’s right ways
  - type: text
    content: and his rules for life in Israel.”
  '22':
  - type: text
    content: 'Dan:'
  - type: text
    content: “Dan is a lion’s cub
  - type: text
    content: leaping out of Bashan.”
  '23':
  - type: text
    content: 'Naphtali:'
  - type: text
    content: “Naphtali brims with blessings,
  - type: text
    content: 'spills over with '
  - type: text
    content: God
  - type: text
    content: ’s blessings
  - type: text
    content: As he takes possession
  - type: text
    content: of the sea and southland.”
  '24':
  - type: text
    content: 'Asher:'
  - type: text
    content: “Asher, best blessed of the sons!
  - type: text
    content: May he be the favorite of his brothers,
  - type: text
    content: his feet massaged in oil.
  - type: text
    content: Safe behind iron-clad doors and gates,
  - type: text
    content: your strength like iron as long as you live.”
  - type: text
    content: '* * *'
  '26':
  - type: text
    content: There is none like God, Jeshurun,
  - type: text
    content: riding to your rescue through the skies,
  - type: text
    content: his dignity haloed by clouds.
  - type: text
    content: The ancient God is home
  - type: text
    content: on a foundation of everlasting arms.
  - type: text
    content: He drove out the enemy before you
  - type: text
    content: and commanded, “Destroy!”
  - type: text
    content: Israel lived securely,
  - type: text
    content: the fountain of Jacob undisturbed
  - type: text
    content: In grain and wine country
  - type: text
    content: and, oh yes, his heavens drip dew.
  '29':
  - type: text
    content: Lucky Israel! Who has it as good as you?
  - type: text
    content: 'A people '
  - type: text
    content: saved
  - type: text
    content: ' by '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: The Shield who defends you,
  - type: text
    content: the Sword who brings triumph.
  - type: text
    content: Your enemies will come crawling on their bellies
  - type: text
    content: and you’ll march on their backs.
  '6':
  - type: text
    content: 'Reuben:'
  - type: text
    content: “Let Reuben live and not die,
  - type: text
    content: but just barely, in diminishing numbers.”
  '7':
  - type: text
    content: 'Judah:'
  - type: text
    content: '“Listen, '
  - type: text
    content: God
  - type: text
    content: ', to the Voice of Judah,'
  - type: text
    content: bring him to his people;
  - type: text
    content: Strengthen his grip,
  - type: text
    content: be his helper against his foes.”
  '8':
  - type: text
    content: 'Levi:'
  - type: text
    content: “Let your Thummim and Urim
  - type: text
    content: belong to your loyal saint;
  - type: text
    content: The one you tested at Massah,
  - type: text
    content: whom you fought with at the Waters of Meribah,
  - type: text
    content: Who said of his father and mother,
  - type: text
    content: ‘I no longer recognize them.’
  - type: text
    content: He turned his back on his brothers
  - type: text
    content: and neglected his children,
  - type: text
    content: Because he was guarding your sayings
  - type: text
    content: and watching over your Covenant.
  - type: text
    content: Let him teach your rules to Jacob
  - type: text
    content: and your Revelation to Israel,
  - type: text
    content: Let him keep the incense rising to your nostrils
  - type: text
    content: and the Whole-Burnt-Offerings on your Altar.
  - type: text
    content: God
  - type: text
    content: ' bless his commitment,'
  - type: text
    content: stamp your seal of approval on what he does;
  - type: text
    content: Disable the loins of those who defy him,
  - type: text
    content: make sure we’ve heard the last from those who hate him.”
