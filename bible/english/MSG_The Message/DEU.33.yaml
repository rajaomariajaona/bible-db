document_id: DEU.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Blessing
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: Moses, man of God, blessed the People of Israel with this blessing before his death. He said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came down from Sinai,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he dawned from Seir upon them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He radiated light from Mount Paran,
- type: usfm
  marker: q2
  children:
  - type: text
    text: coming with ten thousand holy angels
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tongues of fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: streaming from his right hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, how you love the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all his holy ones are palmed in your left hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sit at your feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: honoring your teaching,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Revelation commanded by Moses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the assembly of Jacob’s inheritance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thus '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' became king in Jeshurun'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the leaders and tribes of Israel gathered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Reuben:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let Reuben live and not die,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but just barely, in diminishing numbers.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Judah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Listen, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', to the Voice of Judah,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: bring him to his people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strengthen his grip,
- type: usfm
  marker: q2
  children:
  - type: text
    text: be his helper against his foes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: 'Levi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let your Thummim and Urim
- type: usfm
  marker: q2
  children:
  - type: text
    text: belong to your loyal saint;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one you tested at Massah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whom you fought with at the Waters of Meribah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who said of his father and mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I no longer recognize them.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turned his back on his brothers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and neglected his children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because he was guarding your sayings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and watching over your Covenant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him teach your rules to Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your Revelation to Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him keep the incense rising to your nostrils
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the Whole-Burnt-Offerings on your Altar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' bless his commitment,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: stamp your seal of approval on what he does;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disable the loins of those who defy him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make sure we’ve heard the last from those who hate him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Benjamin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s beloved;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s permanent residence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Encircled by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' all day long,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'within whom '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is at home.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: 'Joseph:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Blessed by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' be his land:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The best fresh dew from high heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fountains springing from the depths;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The best radiance streaming from the sun
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the best the moon has to offer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beauty pouring off the tops of the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the best from the everlasting hills;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The best of Earth’s exuberant gifts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the smile of the Burning-Bush Dweller.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All this on the head of Joseph,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the brow of the set-apart one among his brothers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In splendor he’s like a firstborn bull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his horns the horns of a wild ox;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll gore the nations with those horns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: push them all to the ends of the Earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim by the ten thousands will do this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Manasseh by the thousands will do this.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'Zebulun and Issachar:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Celebrate, Zebulun, as you go out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Issachar, as you stay home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll invite people to the Mountain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and offer sacrifices of right worship,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they will have hauled riches in from the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gleaned treasures from the beaches.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'Gad:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed is he who makes Gad large.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gad roams like a lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tears off an arm, rips open a skull.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took one look and grabbed the best place for himself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the portion just made for someone in charge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took his place at the head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'carried out '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s right ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his rules for life in Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dan:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Dan is a lion’s cub
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaping out of Bashan.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Naphtali:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Naphtali brims with blessings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'spills over with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s blessings
- type: usfm
  marker: q1
  children:
  - type: text
    text: As he takes possession
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the sea and southland.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'Asher:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Asher, best blessed of the sons!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May he be the favorite of his brothers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his feet massaged in oil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Safe behind iron-clad doors and gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your strength like iron as long as you live.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: There is none like God, Jeshurun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: riding to your rescue through the skies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his dignity haloed by clouds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ancient God is home
- type: usfm
  marker: q2
  children:
  - type: text
    text: on a foundation of everlasting arms.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He drove out the enemy before you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commanded, “Destroy!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel lived securely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fountain of Jacob undisturbed
- type: usfm
  marker: q1
  children:
  - type: text
    text: In grain and wine country
- type: usfm
  marker: q2
  children:
  - type: text
    text: and, oh yes, his heavens drip dew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lucky Israel! Who has it as good as you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saved
  - type: text
    text: ' by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Shield who defends you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Sword who brings triumph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your enemies will come crawling on their bellies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll march on their backs.
