document_id: ACT.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Ends of the World
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear Theophilus, in the first volume of this book I wrote on everything that Jesus began to do and teach until the day he said good-bye to the apostles, the ones he had chosen through the Holy Spirit, and was taken up to heaven. After his death, he presented himself alive to them in many different settings over a period of forty days. In face-to-face meetings, he talked to them about things concerning the kingdom of God. As they met and ate meals together, he told them that they were on no account to leave Jerusalem but “must wait for what the Father promised: the promise you heard from me. John baptized in water; you will be baptized in the Holy Spirit. And soon.”'
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So they left the mountain called Olives and returned to Jerusalem. It was a little over half a mile. They went to the upper room they had been using as a meeting place:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Peter,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: John,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: James,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Andrew,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Philip,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Thomas,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Bartholomew,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Matthew,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: James, son of Alphaeus,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Simon the Zealot,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Judas, son of James.
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They agreed they were in this for good, completely together in prayer, the women included. Also Jesus’ mother, Mary, and his brothers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Replacing Judas
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: During this time, Peter stood up in the company—there were about 120 of them in the room at the time—and said, “Friends, long ago the Holy Spirit spoke through David regarding Judas, who became the guide to those who arrested Jesus. That Scripture had to be fulfilled, and now has been. Judas was one of us and had his assigned place in this ministry.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As you know, he took the evil bribe money and bought a small farm. There he came to a bad end, rupturing his belly and spilling his guts. Everybody in Jerusalem knows this by now; they call the place Murder Meadow. It’s exactly what we find written in the Psalms:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let his farm become haunted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So no one can ever live there.
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“And also what was written later:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let someone else take over his post.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Judas must now be replaced. The replacement must come from the company of men who stayed together with us from the time Jesus was baptized by John up to the day of his ascension, designated along with us as a witness to his resurrection.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They nominated two: Joseph Barsabbas, nicknamed Justus, and Matthias. Then they prayed, “You, O God, know every one of us inside and out. Make plain which of these two men you choose to take the place in this ministry and leadership that Judas threw away in order to go his own way.” They then drew straws. Matthias won and was counted in with the eleven apostles.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they were together for the last time they asked, “Master, are you going to restore the kingdom to Israel now? Is this the time?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He told them, “You don’t get to know the time. Timing is the Father’s business. What you’ll get is the Holy Spirit. And when the Holy Spirit comes on you, you will be able to be my witnesses in Jerusalem, all over Judea and Samaria, even to the ends of the world.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were his last words. As they watched, he was taken up and disappeared in a cloud. They stood there, staring into the empty sky. Suddenly two men appeared—in white robes! They said, “You Galileans!—why do you just stand here looking up at an empty sky? This very Jesus who was taken up from among you to heaven will come as certainly—and mysteriously—as he left.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Returning to Jerusalem
    marker-yv: yv-h
