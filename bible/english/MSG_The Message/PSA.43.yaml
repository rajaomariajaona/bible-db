document_id: PSA.43,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Clear my name, God; stick up for me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against these loveless, immoral people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get me out of here, away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from these lying degenerates.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I counted on you, God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why did you walk out on me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why am I pacing the floor, wringing my hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over these outrageous people?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Give me your lantern and compass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give me a map,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I can find my way to the sacred mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the place of your presence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To enter the place of worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: meet my exuberant God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing my thanks with a harp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: magnificent God, my God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Why are you down in the dumps, dear soul?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why are you crying the blues?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fix my eyes on God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soon I’ll be praising again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He puts a smile on my face.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s my God.
