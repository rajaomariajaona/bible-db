document_id: PSA.43,97
type_code: eng
verses:
  '1':
  - type: text
    content: Clear my name, God; stick up for me
  - type: text
    content: against these loveless, immoral people.
  - type: text
    content: Get me out of here, away
  - type: text
    content: from these lying degenerates.
  - type: text
    content: I counted on you, God.
  - type: text
    content: Why did you walk out on me?
  - type: text
    content: Why am I pacing the floor, wringing my hands
  - type: text
    content: over these outrageous people?
  '3':
  - type: text
    content: Give me your lantern and compass,
  - type: text
    content: give me a map,
  - type: text
    content: So I can find my way to the sacred mountain,
  - type: text
    content: to the place of your presence,
  - type: text
    content: To enter the place of worship,
  - type: text
    content: meet my exuberant God,
  - type: text
    content: Sing my thanks with a harp,
  - type: text
    content: magnificent God, my God.
  '5':
  - type: text
    content: Why are you down in the dumps, dear soul?
  - type: text
    content: Why are you crying the blues?
  - type: text
    content: Fix my eyes on God—
  - type: text
    content: soon I’ll be praising again.
  - type: text
    content: He puts a smile on my face.
  - type: text
    content: He’s my God.
