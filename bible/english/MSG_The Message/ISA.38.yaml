document_id: ISA.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Time Spent in Death’s Waiting Room
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: At that time, Hezekiah got sick. He was about to die. The prophet Isaiah son of Amoz visited him and said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, ‘Prepare your affairs and your family. This is it: You’re going to die. You’re not going to get well.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Hezekiah turned away from Isaiah and, facing the wall, prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', please, I beg you: Remember how I’ve lived my life. I’ve lived faithfully in your presence, lived out of a heart that was totally yours. You’ve seen how I’ve lived, the good that I have done.” And Hezekiah wept as he prayed—painful tears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told Isaiah, “Go and speak with Hezekiah. Give him this Message from me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of your ancestor David: ‘I’ve heard your prayer. I have seen your tears. Here’s what I’ll do: I’ll add fifteen years to your life. And I’ll save both you and this city from the king of Assyria. I have my hand on this city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: '“‘And this is your confirming sign, confirming that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will do exactly what I have promised. Watch for this: As the sun goes down and the shadow lengthens on the sundial of Ahaz, I’m going to reverse the shadow ten notches on the dial.’” And that’s what happened: The declining sun’s shadow reversed ten notches on the dial.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-15
  - type: text
    text: 'This is what Hezekiah king of Judah wrote after he’d been sick and then recovered from his sickness:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the very prime of life
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have to leave.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whatever time I have left
- type: usfm
  marker: q2
  children:
  - type: text
    text: is spent in death’s waiting room.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No more glimpses of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the land of the living,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more meetings with my neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more rubbing shoulders with friends.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This body I inhabit is taken down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and packed away like a camper’s tent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a weaver, I’ve rolled up the carpet of my life
- type: usfm
  marker: q2
  children:
  - type: text
    text: as God cuts me free of the loom
- type: usfm
  marker: q1
  children:
  - type: text
    text: And at day’s end sweeps up the scraps and pieces.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry for help until morning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a lion, God pummels and pounds me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: relentlessly finishing me off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I squawk like a doomed hen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: moan like a dove.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My eyes ache from looking up for help:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Master, I’m in trouble! Get me out of this!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But what’s the use? God himself gave me the word.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s done it to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I can’t sleep—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m that upset, that troubled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: O Master, these are the conditions in which people live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and yes, in these very conditions my spirit is still alive—
- type: usfm
  marker: q2
  children:
  - type: text
    text: fully recovered with a fresh infusion of life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It seems it was good for me
- type: usfm
  marker: q2
  children:
  - type: text
    text: to go through all those troubles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Throughout them all you held tight to my lifeline.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You never let me tumble over the edge into nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my sins you let go of,
- type: usfm
  marker: q2
  children:
  - type: text
    text: threw them over your shoulder—good riddance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The dead don’t thank you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and choirs don’t sing praises from the morgue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those buried six feet under
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t witness to your faithful ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s the living—live men, live women—who thank you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as I’m doing right now.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parents give their children
- type: usfm
  marker: q2
  children:
  - type: text
    text: full reports on your faithful ways.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saves and will save me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: As fiddles and mandolins strike up the tunes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll sing, oh we’ll sing, sing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the rest of our lives in the Sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Isaiah had said, “Prepare a poultice of figs and put it on the boil so he may recover.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hezekiah had said, “What is my cue that it’s all right to enter again the Sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ?”
