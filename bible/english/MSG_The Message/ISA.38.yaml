document_id: ISA.38,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Time Spent in Death’s Waiting Room
  - type: text
    content: At that time, Hezekiah got sick. He was about to die. The prophet Isaiah son of Amoz visited him and said, “
  - type: text
    content: God
  - type: text
    content: ' says, ‘Prepare your affairs and your family. This is it: You’re going to die. You’re not going to get well.’”'
  '16':
  - type: text
    content: O Master, these are the conditions in which people live,
  - type: text
    content: and yes, in these very conditions my spirit is still alive—
  - type: text
    content: fully recovered with a fresh infusion of life!
  - type: text
    content: It seems it was good for me
  - type: text
    content: to go through all those troubles.
  - type: text
    content: Throughout them all you held tight to my lifeline.
  - type: text
    content: You never let me tumble over the edge into nothing.
  - type: text
    content: But my sins you let go of,
  - type: text
    content: threw them over your shoulder—good riddance!
  - type: text
    content: The dead don’t thank you,
  - type: text
    content: and choirs don’t sing praises from the morgue.
  - type: text
    content: Those buried six feet under
  - type: text
    content: don’t witness to your faithful ways.
  - type: text
    content: It’s the living—live men, live women—who thank you,
  - type: text
    content: just as I’m doing right now.
  - type: text
    content: Parents give their children
  - type: text
    content: full reports on your faithful ways.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: 'Hezekiah turned away from Isaiah and, facing the wall, prayed to '
  - type: text
    content: God
  - type: text
    content: ': “'
  - type: text
    content: God
  - type: text
    content: ', please, I beg you: Remember how I’ve lived my life. I’ve lived faithfully in your presence, lived out of a heart that was totally yours. You’ve seen how I’ve lived, the good that I have done.” And Hezekiah wept as he prayed—painful tears.'
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' saves and will save me.'
  - type: text
    content: As fiddles and mandolins strike up the tunes,
  - type: text
    content: We’ll sing, oh we’ll sing, sing,
  - type: text
    content: 'for the rest of our lives in the Sanctuary of '
  - type: text
    content: God
  - type: text
    content: .
  '21':
  - type: text
    content: Isaiah had said, “Prepare a poultice of figs and put it on the boil so he may recover.”
  - type: text
    content: 'Hezekiah had said, “What is my cue that it’s all right to enter again the Sanctuary of '
  - type: text
    content: God
  - type: text
    content: ?”
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told Isaiah, “Go and speak with Hezekiah. Give him this Message from me, '
  - type: text
    content: God
  - type: text
    content: ', the God of your ancestor David: ‘I’ve heard your prayer. I have seen your tears. Here’s what I’ll do: I’ll add fifteen years to your life. And I’ll save both you and this city from the king of Assyria. I have my hand on this city.'
  '7':
  - type: text
    content: '“‘And this is your confirming sign, confirming that I, '
  - type: text
    content: God
  - type: text
    content: ', will do exactly what I have promised. Watch for this: As the sun goes down and the shadow lengthens on the sundial of Ahaz, I’m going to reverse the shadow ten notches on the dial.’” And that’s what happened: The declining sun’s shadow reversed ten notches on the dial.'
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: 'This is what Hezekiah king of Judah wrote after he’d been sick and then recovered from his sickness:'
  - type: text
    content: In the very prime of life
  - type: text
    content: I have to leave.
  - type: text
    content: Whatever time I have left
  - type: text
    content: is spent in death’s waiting room.
  - type: text
    content: 'No more glimpses of '
  - type: text
    content: God
  - type: text
    content: in the land of the living,
  - type: text
    content: No more meetings with my neighbors,
  - type: text
    content: no more rubbing shoulders with friends.
  - type: text
    content: This body I inhabit is taken down
  - type: text
    content: and packed away like a camper’s tent.
  - type: text
    content: Like a weaver, I’ve rolled up the carpet of my life
  - type: text
    content: as God cuts me free of the loom
  - type: text
    content: And at day’s end sweeps up the scraps and pieces.
  - type: text
    content: I cry for help until morning.
  - type: text
    content: Like a lion, God pummels and pounds me,
  - type: text
    content: relentlessly finishing me off.
  - type: text
    content: I squawk like a doomed hen,
  - type: text
    content: moan like a dove.
  - type: text
    content: 'My eyes ache from looking up for help:'
  - type: text
    content: “Master, I’m in trouble! Get me out of this!”
  - type: text
    content: But what’s the use? God himself gave me the word.
  - type: text
    content: He’s done it to me.
  - type: text
    content: I can’t sleep—
  - type: text
    content: I’m that upset, that troubled.
