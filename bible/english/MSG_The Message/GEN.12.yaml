document_id: GEN.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram and Sarai
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told Abram: “Leave your country, your family, and your father’s home for a land that I will show you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: I’ll make you a great nation
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bless you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make you famous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be a blessing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll bless those who bless you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who curse you I’ll curse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the families of the Earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be blessed through you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'So Abram left just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, and Lot left with him. Abram was seventy-five years old when he left Haran. Abram took his wife Sarai and his nephew Lot with him, along with all the possessions and people they had gotten in Haran, and set out for the land of Canaan and arrived safe and sound.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Abram passed through the country as far as Shechem and the Oak of Moreh. At that time the Canaanites occupied the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' appeared to Abram and said, “I will give this land to your children.” Abram built an altar at the place '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had appeared to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He moved on from there to the hill country east of Bethel and pitched his tent between Bethel to the west and Ai to the east. He built an altar there and prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Abram kept moving, steadily making his way south, to the Negev.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-13
  - type: text
    text: 'Then a famine came to the land. Abram went down to Egypt to live; it was a hard famine. As he drew near to Egypt, he said to his wife, Sarai, “Look. We both know that you’re a beautiful woman. When the Egyptians see you they’re going to say, ‘Aha! That’s his wife!’ and kill me. But they’ll let you live. Do me a favor: tell them you’re my sister. Because of you, they’ll welcome me and let me live.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: When Abram arrived in Egypt, the Egyptians took one look and saw that his wife was stunningly beautiful. Pharaoh’s princes raved over her to Pharaoh. She was taken to live with Pharaoh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'Because of her, Abram got along very well: he accumulated sheep and cattle, male and female donkeys, men and women servants, and camels. But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hit Pharaoh hard because of Abram’s wife Sarai; everybody in the palace got seriously sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Pharaoh called for Abram, “What’s this that you’ve done to me? Why didn’t you tell me that she’s your wife? Why did you say, ‘She’s my sister’ so that I’d take her as my wife? Here’s your wife back—take her and get out!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pharaoh ordered his men to get Abram out of the country. They sent him and his wife and everything he owned on their way.
