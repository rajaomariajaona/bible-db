document_id: GEN.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram and Sarai
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told Abram: “Leave your country, your family, and your father’s home for a land that I will show you.'
  '10':
  - type: text
    content: 'Then a famine came to the land. Abram went down to Egypt to live; it was a hard famine. As he drew near to Egypt, he said to his wife, Sarai, “Look. We both know that you’re a beautiful woman. When the Egyptians see you they’re going to say, ‘Aha! That’s his wife!’ and kill me. But they’ll let you live. Do me a favor: tell them you’re my sister. Because of you, they’ll welcome me and let me live.”'
  '14':
  - type: text
    content: When Abram arrived in Egypt, the Egyptians took one look and saw that his wife was stunningly beautiful. Pharaoh’s princes raved over her to Pharaoh. She was taken to live with Pharaoh.
  '16':
  - type: text
    content: 'Because of her, Abram got along very well: he accumulated sheep and cattle, male and female donkeys, men and women servants, and camels. But '
  - type: text
    content: God
  - type: text
    content: ' hit Pharaoh hard because of Abram’s wife Sarai; everybody in the palace got seriously sick.'
  '18':
  - type: text
    content: Pharaoh called for Abram, “What’s this that you’ve done to me? Why didn’t you tell me that she’s your wife? Why did you say, ‘She’s my sister’ so that I’d take her as my wife? Here’s your wife back—take her and get out!”
  '2':
  - type: text
    content: I’ll make you a great nation
  - type: text
    content: and bless you.
  - type: text
    content: I’ll make you famous;
  - type: text
    content: you’ll be a blessing.
  - type: text
    content: I’ll bless those who bless you;
  - type: text
    content: those who curse you I’ll curse.
  - type: text
    content: All the families of the Earth
  - type: text
    content: will be blessed through you.”
  '20':
  - type: text
    content: Pharaoh ordered his men to get Abram out of the country. They sent him and his wife and everything he owned on their way.
  '4':
  - type: text
    content: 'So Abram left just as '
  - type: text
    content: God
  - type: text
    content: ' said, and Lot left with him. Abram was seventy-five years old when he left Haran. Abram took his wife Sarai and his nephew Lot with him, along with all the possessions and people they had gotten in Haran, and set out for the land of Canaan and arrived safe and sound.'
  - type: text
    content: Abram passed through the country as far as Shechem and the Oak of Moreh. At that time the Canaanites occupied the land.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' appeared to Abram and said, “I will give this land to your children.” Abram built an altar at the place '
  - type: text
    content: God
  - type: text
    content: ' had appeared to him.'
  '8':
  - type: text
    content: 'He moved on from there to the hill country east of Bethel and pitched his tent between Bethel to the west and Ai to the east. He built an altar there and prayed to '
  - type: text
    content: God
  - type: text
    content: .
  '9':
  - type: text
    content: Abram kept moving, steadily making his way south, to the Negev.
