document_id: NAM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Been to Hell and Back
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The juggernaut’s coming!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Post guards, lay in supplies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get yourselves together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get ready for the big battle.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has restored the Pride of Jacob,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Pride of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel’s lived through hard times.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s been to hell and back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-12
  - type: text
    text: Weapons flash in the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the soldiers splendid in battle dress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chariots burnished and glistening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to charge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A spiked forest of brandished spears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lethal on the horizon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The chariots pour into the streets.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They fill the public squares,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flaming like torches in the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like lightning darting and flashing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Assyrian king rallies his men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they stagger and stumble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They run to the ramparts
- type: usfm
  marker: q2
  children:
  - type: text
    text: to stem the tide, but it’s too late.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soldiers pour through the gates.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The palace is demolished.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Soon it’s all over:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nineveh stripped, Nineveh doomed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maids and slaves moaning like doves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beating their breasts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nineveh is a tub
- type: usfm
  marker: q2
  children:
  - type: text
    text: from which they’ve pulled the plug.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cries go up, “Do something! Do something!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it’s too late. Nineveh’s soon empty—nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Other cries come: “Plunder the silver!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Plunder the gold!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A bonanza of plunder!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take everything you want!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doom! Damnation! Desolation!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hearts sink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knees fold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stomachs retch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: faces blanch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So, what happened to the famous
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fierce Assyrian lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all those cute Assyrian cubs?
- type: usfm
  marker: q2
  children:
  - type: text
    text: To the lion and lioness
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cozy with their cubs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fierce and fearless?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the lion who always returned from the hunt
- type: usfm
  marker: q2
  children:
  - type: text
    text: with fresh kills for lioness and cubs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lion lair heaped with bloody meat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blood and bones for the royal lion feast?
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Assyria, I’m your enemy,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll torch your chariots. They’ll go up in smoke.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Lion Country’ will be strewn with carcasses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The war business is over—you’re out of work:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll have no more wars to report,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more victories to announce.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re out of war work forever.”
