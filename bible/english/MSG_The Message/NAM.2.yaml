document_id: NAM.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Been to Hell and Back
  - type: text
    content: The juggernaut’s coming!
  - type: text
    content: Post guards, lay in supplies.
  - type: text
    content: Get yourselves together,
  - type: text
    content: get ready for the big battle.
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: “Assyria, I’m your enemy,”
  - type: text
    content: 'says '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: “I’ll torch your chariots. They’ll go up in smoke.
  - type: text
    content: ‘Lion Country’ will be strewn with carcasses.
  - type: text
    content: 'The war business is over—you’re out of work:'
  - type: text
    content: You’ll have no more wars to report,
  - type: text
    content: No more victories to announce.
  - type: text
    content: You’re out of war work forever.”
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' has restored the Pride of Jacob,'
  - type: text
    content: the Pride of Israel.
  - type: text
    content: Israel’s lived through hard times.
  - type: text
    content: He’s been to hell and back.
  '3':
  - type: text
    content: Weapons flash in the sun,
  - type: text
    content: the soldiers splendid in battle dress,
  - type: text
    content: Chariots burnished and glistening,
  - type: text
    content: ready to charge,
  - type: text
    content: A spiked forest of brandished spears,
  - type: text
    content: lethal on the horizon.
  - type: text
    content: The chariots pour into the streets.
  - type: text
    content: They fill the public squares,
  - type: text
    content: Flaming like torches in the sun,
  - type: text
    content: like lightning darting and flashing.
  - type: text
    content: The Assyrian king rallies his men,
  - type: text
    content: but they stagger and stumble.
  - type: text
    content: They run to the ramparts
  - type: text
    content: to stem the tide, but it’s too late.
  - type: text
    content: Soldiers pour through the gates.
  - type: text
    content: The palace is demolished.
  - type: text
    content: 'Soon it’s all over:'
  - type: text
    content: Nineveh stripped, Nineveh doomed,
  - type: text
    content: Maids and slaves moaning like doves,
  - type: text
    content: beating their breasts.
  - type: text
    content: Nineveh is a tub
  - type: text
    content: from which they’ve pulled the plug.
  - type: text
    content: Cries go up, “Do something! Do something!”
  - type: text
    content: but it’s too late. Nineveh’s soon empty—nothing.
  - type: text
    content: 'Other cries come: “Plunder the silver!'
  - type: text
    content: Plunder the gold!
  - type: text
    content: A bonanza of plunder!
  - type: text
    content: Take everything you want!”
  - type: text
    content: Doom! Damnation! Desolation!
  - type: text
    content: Hearts sink,
  - type: text
    content: knees fold,
  - type: text
    content: stomachs retch,
  - type: text
    content: faces blanch.
  - type: text
    content: So, what happened to the famous
  - type: text
    content: and fierce Assyrian lion
  - type: text
    content: And all those cute Assyrian cubs?
  - type: text
    content: To the lion and lioness
  - type: text
    content: Cozy with their cubs,
  - type: text
    content: fierce and fearless?
  - type: text
    content: To the lion who always returned from the hunt
  - type: text
    content: with fresh kills for lioness and cubs,
  - type: text
    content: The lion lair heaped with bloody meat,
  - type: text
    content: blood and bones for the royal lion feast?
  - type: text
    content: '* * *'
