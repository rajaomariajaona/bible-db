document_id: MAT.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Divorce
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: When Jesus had completed these teachings, he left Galilee and crossed the region of Judea on the other side of the Jordan. Great crowds followed him there, and he healed them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'One day the Pharisees were badgering him: “Is it legal for a man to divorce his wife for any reason?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: He answered, “Haven’t you read in your Bible that the Creator originally made man and woman for each other, male and female? And because of this, a man leaves father and mother and is firmly bonded to his wife, becoming one flesh—no longer two bodies but one. Because God created this organic union of the two sexes, no one should desecrate his art by cutting them apart.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They shot back in rebuttal, “If that’s so, why did Moses give instructions for divorce papers and divorce procedures?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Jesus said, “Moses provided for divorce as a concession to your hard heartedness, but it is not part of God’s original plan. I’m holding you to the original plan, and holding you liable for adultery if you divorce your faithful wife and then marry someone else. I make an exception in cases where the spouse has committed adultery.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jesus’ disciples objected, “If those are the terms of marriage, we haven’t got a chance. Why get married?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: But Jesus said, “Not everyone is mature enough to live a married life. It requires a certain aptitude and grace. Marriage isn’t for everyone. Some, from birth seemingly, never give marriage a thought. Others never get asked—or accepted. And some decide not to get married for kingdom reasons. But if you’re capable of growing into the largeness of marriage, do it.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Enter God’s Kingdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'One day children were brought to Jesus in the hope that he would lay hands on them and pray over them. The disciples shooed them off. But Jesus intervened: “Let the children alone, don’t prevent them from coming to me. God’s kingdom is made up of people like these.” After laying hands on them, he left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Another day, a man stopped Jesus and asked, “Teacher, what good thing must I do to get eternal life?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus said, “Why do you question me about what’s good? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' is the One who is good. If you want to enter the life of God, just do what he tells you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: The man asked, “What in particular?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus said, “Don’t murder, don’t commit adultery, don’t steal, don’t lie, honor your father and mother, and love your neighbor as you do yourself.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The young man said, “I’ve done all that. What’s left?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “If you want to give it all you’ve got,” Jesus replied, “go sell your possessions; give everything to the poor. All your wealth will then be in heaven. Then come follow me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: That was the last thing the young man expected to hear. And so, crestfallen, he walked away. He was holding on tight to a lot of things, and he couldn’t bear to let go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: As he watched him go, Jesus told his disciples, “Do you have any idea how difficult it is for the rich to enter God’s kingdom? Let me tell you, it’s easier to gallop a camel through a needle’s eye than for the rich to enter God’s kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The disciples were staggered. “Then who has any chance at all?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Jesus looked hard at them and said, “No chance at all if you think you can pull it off yourself. Every chance in the world if you trust God to do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then Peter chimed in, “We left everything and followed you. What do we get out of it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: 'Jesus replied, “Yes, you have followed me. In the re-creation of the world, when the Son of Man will rule gloriously, you who have followed me will also rule, starting with the twelve tribes of Israel. And not only you, but anyone who sacrifices home, family, fields—whatever—because of me will get it all back a hundred times over, not to mention the considerable bonus of eternal life. This is the Great Reversal: many of the first ending up last, and the last first.”'
