document_id: PRO.30
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: The Words of Agur Ben Yakeh
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: God? Who Needs Him?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: The skeptic swore, “There is no God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: No God!—I can do anything I want!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m more animal than human;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so-called human intelligence escapes me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: “I flunked ‘wisdom.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see no evidence of a holy God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has anyone ever seen Anyone
- type: usfm
  marker: q2
  children:
  - type: text
    text: climb into Heaven and take charge?
- type: usfm
  marker: q2
  children:
  - type: text
    text: grab the winds and control them?
- type: usfm
  marker: q2
  children:
  - type: text
    text: gather the rains in his bucket?
- type: usfm
  marker: q2
  children:
  - type: text
    text: stake out the ends of the earth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just tell me his name, tell me the names of his sons.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come on now—tell me!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: The believer replied, “Every promise of God proves true;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he protects everyone who runs to him for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So don’t second-guess him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he might take you to task and show up your lies.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: And then he prayed, “God, I’m asking for two things
- type: usfm
  marker: q2
  children:
  - type: text
    text: before I die; don’t refuse me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Banish lies from my lips
- type: usfm
  marker: q2
  children:
  - type: text
    text: and liars from my presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me enough food to live on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: neither too much nor too little.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I’m too full, I might get independent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, ‘God? Who needs him?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I’m poor, I might steal
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dishonor the name of my God.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t blow the whistle on your fellow workers
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind their backs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll accuse you of being underhanded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you’ll
  - type: text
    text: ' be the guilty one!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Don’t curse your father
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fail to bless your mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Don’t imagine yourself to be quite presentable
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you haven’t had a bath in weeks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t be stuck-up
- type: usfm
  marker: q2
  children:
  - type: text
    text: and think you’re better than everyone else.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Don’t be greedy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: merciless and cruel as wolves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tearing into the poor and feasting on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shredding the needy to pieces only to discard them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: A freeloader has twin daughters
- type: usfm
  marker: q2
  children:
  - type: text
    text: named “Gimme” and “Gimme more.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Four Insatiables
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Three things are never satisfied,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no, there are four that never say, “That’s enough, thank you!”—
- type: usfm
  marker: q3
  children:
  - type: text
    text: hell,
- type: usfm
  marker: q3
  children:
  - type: text
    text: a barren womb,
- type: usfm
  marker: q3
  children:
  - type: text
    text: a parched land,
- type: usfm
  marker: q3
  children:
  - type: text
    text: a forest fire.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: An eye that disdains a father
- type: usfm
  marker: q2
  children:
  - type: text
    text: and despises a mother—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that eye will be plucked out by wild vultures
- type: usfm
  marker: q2
  children:
  - type: text
    text: and consumed by young eagles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Four Mysteries
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Three things amaze me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no, four things I’ll never understand—
- type: usfm
  marker: q3
  children:
  - type: text
    text: how an eagle flies so high in the sky,
- type: usfm
  marker: q3
  children:
  - type: text
    text: how a snake glides over a rock,
- type: usfm
  marker: q3
  children:
  - type: text
    text: how a ship navigates the ocean,
- type: usfm
  marker: q3
  children:
  - type: text
    text: why adolescents act the way they do.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Here’s how a prostitute operates:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has sex with her client,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Takes a bath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then asks, “Who’s next?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Four Intolerables
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Three things are too much for even the earth to bear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, four things shake its foundations—
- type: usfm
  marker: q3
  children:
  - type: text
    text: when the janitor becomes the boss,
- type: usfm
  marker: q3
  children:
  - type: text
    text: when a fool gets rich,
- type: usfm
  marker: q3
  children:
  - type: text
    text: when a prostitute is voted “woman of the year,”
- type: usfm
  marker: q3
  children:
  - type: text
    text: when a “girlfriend” replaces a faithful wife.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Four Small Wonders
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-28
  - type: text
    text: There are four small creatures,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wisest of the wise they are—
- type: usfm
  marker: q3
  children:
  - type: text
    text: ants—frail as they are,
- type: usfm
  marker: q4
  children:
  - type: text
    text: get plenty of food in for the winter;
- type: usfm
  marker: q3
  children:
  - type: text
    text: marmots—vulnerable as they are,
- type: usfm
  marker: q4
  children:
  - type: text
    text: manage to arrange for rock-solid homes;
- type: usfm
  marker: q3
  children:
  - type: text
    text: locusts—leaderless insects,
- type: usfm
  marker: q4
  children:
  - type: text
    text: yet they strip the field like an army regiment;
- type: usfm
  marker: q3
  children:
  - type: text
    text: lizards—easy enough to catch,
- type: usfm
  marker: q4
  children:
  - type: text
    text: but they sneak past vigilant palace guards.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Four Dignitaries
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: There are three solemn dignitaries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: four that are impressive in their bearing—
- type: usfm
  marker: q3
  children:
  - type: text
    text: a lion, king of the beasts, deferring to none;
- type: usfm
  marker: q3
  children:
  - type: text
    text: a rooster, proud and strutting;
- type: usfm
  marker: q3
  children:
  - type: text
    text: a billy goat;
- type: usfm
  marker: q3
  children:
  - type: text
    text: a head of state in stately procession.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: If you’re dumb enough to call attention to yourself
- type: usfm
  marker: q2
  children:
  - type: text
    text: by offending people and making rude gestures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t be surprised if someone bloodies your nose.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Churned milk turns into butter;
- type: usfm
  marker: q2
  children:
  - type: text
    text: riled emotions turn into fist fights.
