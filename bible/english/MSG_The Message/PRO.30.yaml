document_id: PRO.30,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Words of Agur Ben Yakeh
  - type: heading
    content: God? Who Needs Him?
  - type: text
    content: The skeptic swore, “There is no God!
  - type: text
    content: No God!—I can do anything I want!
  - type: text
    content: I’m more animal than human;
  - type: text
    content: so-called human intelligence escapes me.
  '10':
  - type: text
    content: Don’t blow the whistle on your fellow workers
  - type: text
    content: behind their backs;
  - type: text
    content: They’ll accuse you of being underhanded,
  - type: text
    content: 'and then '
  - type: text
    content: you’ll
  - type: text
    content: ' be the guilty one!'
  '11':
  - type: text
    content: Don’t curse your father
  - type: text
    content: or fail to bless your mother.
  '12':
  - type: text
    content: Don’t imagine yourself to be quite presentable
  - type: text
    content: when you haven’t had a bath in weeks.
  '13':
  - type: text
    content: Don’t be stuck-up
  - type: text
    content: and think you’re better than everyone else.
  '14':
  - type: text
    content: Don’t be greedy,
  - type: text
    content: merciless and cruel as wolves,
  - type: text
    content: Tearing into the poor and feasting on them,
  - type: text
    content: shredding the needy to pieces only to discard them.
  '15':
  - type: text
    content: A freeloader has twin daughters
  - type: text
    content: named “Gimme” and “Gimme more.”
  - type: heading
    content: Four Insatiables
  - type: text
    content: Three things are never satisfied,
  - type: text
    content: no, there are four that never say, “That’s enough, thank you!”—
  - type: text
    content: hell,
  - type: text
    content: a barren womb,
  - type: text
    content: a parched land,
  - type: text
    content: a forest fire.
  - type: text
    content: '* * *'
  '17':
  - type: text
    content: An eye that disdains a father
  - type: text
    content: and despises a mother—
  - type: text
    content: that eye will be plucked out by wild vultures
  - type: text
    content: and consumed by young eagles.
  - type: heading
    content: Four Mysteries
  '18':
  - type: text
    content: Three things amaze me,
  - type: text
    content: no, four things I’ll never understand—
  - type: text
    content: how an eagle flies so high in the sky,
  - type: text
    content: how a snake glides over a rock,
  - type: text
    content: how a ship navigates the ocean,
  - type: text
    content: why adolescents act the way they do.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: 'Here’s how a prostitute operates:'
  - type: text
    content: she has sex with her client,
  - type: text
    content: Takes a bath,
  - type: text
    content: then asks, “Who’s next?”
  - type: heading
    content: Four Intolerables
  '21':
  - type: text
    content: Three things are too much for even the earth to bear,
  - type: text
    content: yes, four things shake its foundations—
  - type: text
    content: when the janitor becomes the boss,
  - type: text
    content: when a fool gets rich,
  - type: text
    content: when a prostitute is voted “woman of the year,”
  - type: text
    content: when a “girlfriend” replaces a faithful wife.
  - type: heading
    content: Four Small Wonders
  '24':
  - type: text
    content: There are four small creatures,
  - type: text
    content: wisest of the wise they are—
  - type: text
    content: ants—frail as they are,
  - type: text
    content: get plenty of food in for the winter;
  - type: text
    content: marmots—vulnerable as they are,
  - type: text
    content: manage to arrange for rock-solid homes;
  - type: text
    content: locusts—leaderless insects,
  - type: text
    content: yet they strip the field like an army regiment;
  - type: text
    content: lizards—easy enough to catch,
  - type: text
    content: but they sneak past vigilant palace guards.
  - type: heading
    content: Four Dignitaries
  '29':
  - type: text
    content: There are three solemn dignitaries,
  - type: text
    content: four that are impressive in their bearing—
  - type: text
    content: a lion, king of the beasts, deferring to none;
  - type: text
    content: a rooster, proud and strutting;
  - type: text
    content: a billy goat;
  - type: text
    content: a head of state in stately procession.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: “I flunked ‘wisdom.’
  - type: text
    content: I see no evidence of a holy God.
  - type: text
    content: Has anyone ever seen Anyone
  - type: text
    content: climb into Heaven and take charge?
  - type: text
    content: grab the winds and control them?
  - type: text
    content: gather the rains in his bucket?
  - type: text
    content: stake out the ends of the earth?
  - type: text
    content: Just tell me his name, tell me the names of his sons.
  - type: text
    content: Come on now—tell me!”
  '32':
  - type: text
    content: If you’re dumb enough to call attention to yourself
  - type: text
    content: by offending people and making rude gestures,
  - type: text
    content: Don’t be surprised if someone bloodies your nose.
  - type: text
    content: Churned milk turns into butter;
  - type: text
    content: riled emotions turn into fist fights.
  '5':
  - type: text
    content: The believer replied, “Every promise of God proves true;
  - type: text
    content: he protects everyone who runs to him for help.
  - type: text
    content: So don’t second-guess him;
  - type: text
    content: he might take you to task and show up your lies.”
  '7':
  - type: text
    content: And then he prayed, “God, I’m asking for two things
  - type: text
    content: before I die; don’t refuse me—
  - type: text
    content: Banish lies from my lips
  - type: text
    content: and liars from my presence.
  - type: text
    content: Give me enough food to live on,
  - type: text
    content: neither too much nor too little.
  - type: text
    content: If I’m too full, I might get independent,
  - type: text
    content: saying, ‘God? Who needs him?’
  - type: text
    content: If I’m poor, I might steal
  - type: text
    content: and dishonor the name of my God.”
  - type: text
    content: '* * *'
