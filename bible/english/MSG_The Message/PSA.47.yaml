    children:
    - type: text
      text: 1-9
  - type: text
    text: Applause, everyone. Bravo, bravissimo!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout God-songs at the top of your lungs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Most High is stunning,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: astride land and ocean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He crushes hostile people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: puts nations at our feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He set us at the head of the line,
- type: usfm
  marker: q2
  children:
  - type: text
    text: prize-winning Jacob, his favorite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loud cheers as God climbs the mountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a ram’s horn blast at the summit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing songs to God, sing out!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sing to our King, sing praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s Lord over earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so sing your best songs to God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God is Lord of godless nations—
- type: usfm
  marker: q2
  children:
  - type: text
    text: sovereign, he’s King of the mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Princes from all over are gathered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people of Abraham’s God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The powers of earth are God’s—
- type: usfm
  marker: q2
  children:
  - type: text
    text: he soars over all.
