document_id: PSA.47,97
type_code: eng
verses:
  '1':
  - type: text
    content: Applause, everyone. Bravo, bravissimo!
  - type: text
    content: Shout God-songs at the top of your lungs!
  - type: text
    content: God
  - type: text
    content: ' Most High is stunning,'
  - type: text
    content: astride land and ocean.
  - type: text
    content: He crushes hostile people,
  - type: text
    content: puts nations at our feet.
  - type: text
    content: He set us at the head of the line,
  - type: text
    content: prize-winning Jacob, his favorite.
  - type: text
    content: Loud cheers as God climbs the mountain,
  - type: text
    content: a ram’s horn blast at the summit.
  - type: text
    content: Sing songs to God, sing out!
  - type: text
    content: Sing to our King, sing praise!
  - type: text
    content: He’s Lord over earth,
  - type: text
    content: so sing your best songs to God.
  - type: text
    content: God is Lord of godless nations—
  - type: text
    content: sovereign, he’s King of the mountain.
  - type: text
    content: Princes from all over are gathered,
  - type: text
    content: people of Abraham’s God.
  - type: text
    content: The powers of earth are God’s—
  - type: text
    content: he soars over all.
