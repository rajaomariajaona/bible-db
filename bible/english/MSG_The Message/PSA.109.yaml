document_id: PSA.109
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: My God, don’t turn a deaf ear to my hallelujah prayer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Liars are pouring out invective on me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their lying tongues are like a pack of dogs out to get me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: barking their hate, nipping my heels—and for no reason!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I loved them and now they slander me—yes, me!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treat my prayer like a crime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They return my good with evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they return my love with hate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-20
  - type: text
    text: Send the Evil One to accuse my accusing judge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dispatch Satan to prosecute him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he’s judged, let the verdict be “Guilty,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when he prays, let his prayer turn to sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give him a short life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give his job to somebody else.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make orphans of his children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dress his wife in widow’s black;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn his children into begging street urchins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: evicted from their homes—homeless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May the bank foreclose and wipe him out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strangers, like vultures, pick him clean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May there be no one around to help him out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one willing to give his orphans a break.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chop down his family tree
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that nobody even remembers his name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But erect a memorial to the sin of his father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make sure his mother’s name is there, too—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their sins recorded forever before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they themselves sunk in oblivion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s all he deserves since he was never once kind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hounded the afflicted and heartbroken to their graves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since he loved cursing so much,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let curses rain down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since he had no taste for blessing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let blessings flee far from him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He dressed up in curses like a fine suit of clothes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drank curses, took his baths in curses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So give him a gift—a costume of curses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he can wear curses every day of the week!
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s what they’ll get, those out to get me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'an avalanche of just deserts from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: 'Oh, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my Lord, step in;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: work a miracle for me—you can do it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get me out of here—your love is so great!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m at the end of my rope, my life in ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m fading away to nothing, passing away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my youth gone, old before my time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m weak from hunger and can hardly stand up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body a rack of skin and bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m a joke in poor taste to those who see me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they take one look and shake their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-29
  - type: text
    text: 'Help me, oh help me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me through your wonderful love;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they’ll know that your hand is in this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have been at work.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them curse all they want;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' do the blessing.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be jeered by the crowd when they stand up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: followed by cheers for me, your servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dress my accusers in clothes dirty with shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: discarded and humiliating old ragbag clothes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: 'My mouth’s full of great praise for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m singing his hallelujahs surrounded by crowds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he’s always at hand to take the side of the needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rescue a life from the unjust judge.
