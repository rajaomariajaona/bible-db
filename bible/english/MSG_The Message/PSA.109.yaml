document_id: PSA.109,97
type_code: eng
verses:
  '1':
  - type: text
    content: My God, don’t turn a deaf ear to my hallelujah prayer.
  - type: text
    content: Liars are pouring out invective on me;
  - type: text
    content: Their lying tongues are like a pack of dogs out to get me,
  - type: text
    content: barking their hate, nipping my heels—and for no reason!
  - type: text
    content: I loved them and now they slander me—yes, me!—
  - type: text
    content: and treat my prayer like a crime;
  - type: text
    content: They return my good with evil,
  - type: text
    content: they return my love with hate.
  '21':
  - type: text
    content: 'Oh, '
  - type: text
    content: God
  - type: text
    content: ', my Lord, step in;'
  - type: text
    content: work a miracle for me—you can do it!
  - type: text
    content: Get me out of here—your love is so great!—
  - type: text
    content: I’m at the end of my rope, my life in ruins.
  - type: text
    content: I’m fading away to nothing, passing away,
  - type: text
    content: my youth gone, old before my time.
  - type: text
    content: I’m weak from hunger and can hardly stand up,
  - type: text
    content: my body a rack of skin and bones.
  - type: text
    content: I’m a joke in poor taste to those who see me;
  - type: text
    content: they take one look and shake their heads.
  '26':
  - type: text
    content: 'Help me, oh help me, '
  - type: text
    content: God
  - type: text
    content: ', my God,'
  - type: text
    content: save me through your wonderful love;
  - type: text
    content: Then they’ll know that your hand is in this,
  - type: text
    content: 'that you, '
  - type: text
    content: God
  - type: text
    content: ', have been at work.'
  - type: text
    content: Let them curse all they want;
  - type: text
    content: you
  - type: text
    content: ' do the blessing.'
  - type: text
    content: Let them be jeered by the crowd when they stand up,
  - type: text
    content: followed by cheers for me, your servant.
  - type: text
    content: Dress my accusers in clothes dirty with shame,
  - type: text
    content: discarded and humiliating old ragbag clothes.
  '30':
  - type: text
    content: 'My mouth’s full of great praise for '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I’m singing his hallelujahs surrounded by crowds,
  - type: text
    content: For he’s always at hand to take the side of the needy,
  - type: text
    content: to rescue a life from the unjust judge.
  '6':
  - type: text
    content: Send the Evil One to accuse my accusing judge;
  - type: text
    content: dispatch Satan to prosecute him.
  - type: text
    content: When he’s judged, let the verdict be “Guilty,”
  - type: text
    content: and when he prays, let his prayer turn to sin.
  - type: text
    content: Give him a short life,
  - type: text
    content: and give his job to somebody else.
  - type: text
    content: Make orphans of his children,
  - type: text
    content: dress his wife in widow’s black;
  - type: text
    content: Turn his children into begging street urchins,
  - type: text
    content: evicted from their homes—homeless.
  - type: text
    content: May the bank foreclose and wipe him out,
  - type: text
    content: and strangers, like vultures, pick him clean.
  - type: text
    content: May there be no one around to help him out,
  - type: text
    content: no one willing to give his orphans a break.
  - type: text
    content: Chop down his family tree
  - type: text
    content: so that nobody even remembers his name.
  - type: text
    content: But erect a memorial to the sin of his father,
  - type: text
    content: and make sure his mother’s name is there, too—
  - type: text
    content: 'Their sins recorded forever before '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: but they themselves sunk in oblivion.
  - type: text
    content: That’s all he deserves since he was never once kind,
  - type: text
    content: hounded the afflicted and heartbroken to their graves.
  - type: text
    content: Since he loved cursing so much,
  - type: text
    content: let curses rain down;
  - type: text
    content: Since he had no taste for blessing,
  - type: text
    content: let blessings flee far from him.
  - type: text
    content: He dressed up in curses like a fine suit of clothes;
  - type: text
    content: he drank curses, took his baths in curses.
  - type: text
    content: So give him a gift—a costume of curses;
  - type: text
    content: he can wear curses every day of the week!
  - type: text
    content: That’s what they’ll get, those out to get me—
  - type: text
    content: 'an avalanche of just deserts from '
  - type: text
    content: God.
