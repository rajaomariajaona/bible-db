document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: No Place to Hide
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'Having waited for Zophar, Job now resumed his defense:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God-Alive! He’s denied me justice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: God Almighty! He’s ruined my life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But for as long as I draw breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for as long as God breathes life into me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I refuse to say one word that isn’t true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I refuse to confess to any charge that’s false.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no way I’ll ever agree to your accusations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll not deny my integrity even if it costs me my life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m holding fast to my integrity and not loosening my grip—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and, believe me, I’ll never regret it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: “Let my enemy be exposed as wicked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let my adversary be proven guilty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: What hope do people without God have when life is cut short?
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God puts an end to life?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think God will listen to their cry for help
- type: usfm
  marker: q2
  children:
  - type: text
    text: when disaster hits?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What interest have they ever shown in the Almighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have they ever been known to pray before?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: “I’ve given you a clear account of God in action,
- type: usfm
  marker: q2
  children:
  - type: text
    text: suppressed nothing regarding God Almighty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The evidence is right before you. You can all see it for yourselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so why do you keep talking nonsense?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-23
  - type: text
    text: '“I’ll quote your own words back to you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘This is how God treats the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'this is what evil people can expect from God Almighty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their children—all of them—will die violent deaths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll never have enough bread to put on the table.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll be wiped out by the plague,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and none of the widows will shed a tear when they’re gone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if they make a lot of money
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are resplendent in the latest fashions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s the good who will end up wearing the clothes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the decent who will divide up the money.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They build elaborate houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: that won’t survive a single winter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go to bed wealthy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wake up poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terrors pour in on them like flash floods—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a tornado snatches them away in the middle of the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cyclone sweeps them up—gone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not a trace of them left, not even a footprint.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Catastrophes relentlessly pursue them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they run this way and that, but there’s no place to hide—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pummeled by the weather,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blown to smithereens by the storm.’”
