document_id: JOB.27,97
type_code: eng
verses:
  '1':
  - type: heading
    content: No Place to Hide
  - type: text
    content: 'Having waited for Zophar, Job now resumed his defense:'
  - type: text
    content: “God-Alive! He’s denied me justice!
  - type: text
    content: God Almighty! He’s ruined my life!
  - type: text
    content: But for as long as I draw breath,
  - type: text
    content: and for as long as God breathes life into me,
  - type: text
    content: I refuse to say one word that isn’t true.
  - type: text
    content: I refuse to confess to any charge that’s false.
  - type: text
    content: There is no way I’ll ever agree to your accusations.
  - type: text
    content: I’ll not deny my integrity even if it costs me my life.
  - type: text
    content: I’m holding fast to my integrity and not loosening my grip—
  - type: text
    content: and, believe me, I’ll never regret it.
  '11':
  - type: text
    content: “I’ve given you a clear account of God in action,
  - type: text
    content: suppressed nothing regarding God Almighty.
  - type: text
    content: The evidence is right before you. You can all see it for yourselves,
  - type: text
    content: so why do you keep talking nonsense?
  '13':
  - type: text
    content: '“I’ll quote your own words back to you:'
  - type: text
    content: “‘This is how God treats the wicked,
  - type: text
    content: 'this is what evil people can expect from God Almighty:'
  - type: text
    content: Their children—all of them—will die violent deaths;
  - type: text
    content: they’ll never have enough bread to put on the table.
  - type: text
    content: They’ll be wiped out by the plague,
  - type: text
    content: and none of the widows will shed a tear when they’re gone.
  - type: text
    content: Even if they make a lot of money
  - type: text
    content: and are resplendent in the latest fashions,
  - type: text
    content: It’s the good who will end up wearing the clothes
  - type: text
    content: and the decent who will divide up the money.
  - type: text
    content: They build elaborate houses
  - type: text
    content: that won’t survive a single winter.
  - type: text
    content: They go to bed wealthy
  - type: text
    content: and wake up poor.
  - type: text
    content: Terrors pour in on them like flash floods—
  - type: text
    content: a tornado snatches them away in the middle of the night,
  - type: text
    content: A cyclone sweeps them up—gone!
  - type: text
    content: Not a trace of them left, not even a footprint.
  - type: text
    content: Catastrophes relentlessly pursue them;
  - type: text
    content: they run this way and that, but there’s no place to hide—
  - type: text
    content: Pummeled by the weather,
  - type: text
    content: blown to smithereens by the storm.’”
  '7':
  - type: text
    content: “Let my enemy be exposed as wicked!
  - type: text
    content: Let my adversary be proven guilty!
  - type: text
    content: What hope do people without God have when life is cut short?
  - type: text
    content: when God puts an end to life?
  - type: text
    content: Do you think God will listen to their cry for help
  - type: text
    content: when disaster hits?
  - type: text
    content: What interest have they ever shown in the Almighty?
  - type: text
    content: Have they ever been known to pray before?
