document_id: JOB.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Answers Zophar
  - type: heading
    content: Put Your Ear to the Earth
  - type: text
    content: 'Job answered:'
  - type: text
    content: “I’m sure you speak for all the experts,
  - type: text
    content: and when you die there’ll be no one left to tell us how to live.
  - type: text
    content: But don’t forget that I also have a brain—
  - type: text
    content: I don’t intend to play second fiddle to you.
  - type: text
    content: It doesn’t take an expert to know these things.
  '13':
  - type: text
    content: “True wisdom and real power belong to God;
  - type: text
    content: from him we learn how to live,
  - type: text
    content: and also what to live for.
  - type: text
    content: If he tears something down, it’s down for good;
  - type: text
    content: if he locks people up, they’re locked up for good.
  - type: text
    content: If he holds back the rain, there’s a drought;
  - type: text
    content: if he lets it loose, there’s a flood.
  - type: text
    content: Strength and success belong to God;
  - type: text
    content: both deceived and deceiver must answer to him.
  - type: text
    content: He strips experts of their vaunted credentials,
  - type: text
    content: exposes judges as witless fools.
  - type: text
    content: He divests kings of their royal garments,
  - type: text
    content: then ties a rag around their waists.
  - type: text
    content: He strips priests of their robes,
  - type: text
    content: and fires high officials from their jobs.
  - type: text
    content: He forces trusted sages to keep silence,
  - type: text
    content: deprives elders of their good sense and wisdom.
  - type: text
    content: He dumps contempt on famous people,
  - type: text
    content: disarms the strong and mighty.
  - type: text
    content: He shines a spotlight into caves of darkness,
  - type: text
    content: hauls deepest darkness into the noonday sun.
  - type: text
    content: He makes nations rise and then fall,
  - type: text
    content: builds up some and abandons others.
  - type: text
    content: He robs world leaders of their reason,
  - type: text
    content: and sends them off into no-man’s-land.
  - type: text
    content: They grope in the dark without a clue,
  - type: text
    content: lurching and staggering like drunks.”
  '4':
  - type: text
    content: '“I’m ridiculed by my friends:'
  - type: text
    content: ‘So that’s the man who had conversations with God!’
  - type: text
    content: 'Ridiculed without mercy:'
  - type: text
    content: ‘Look at the man who never did wrong!’
  - type: text
    content: It’s easy for the well-to-do to point their fingers in blame,
  - type: text
    content: for the well-fixed to pour scorn on the strugglers.
  - type: text
    content: Crooks reside safely in high-security houses,
  - type: text
    content: insolent blasphemers live in luxury;
  - type: text
    content: they’ve bought and paid for a god who’ll protect them.
  '7':
  - type: text
    content: “But ask the animals what they think—let them teach you;
  - type: text
    content: let the birds tell you what’s going on.
  - type: text
    content: Put your ear to the earth—learn the basics.
  - type: text
    content: Listen—the fish in the ocean will tell you their stories.
  - type: text
    content: Isn’t it clear that they all know and agree
  - type: text
    content: 'that '
  - type: text
    content: God
  - type: text
    content: ' is sovereign, that he holds all things in his hand—'
  - type: text
    content: Every living soul, yes,
  - type: text
    content: every breathing creature?
  - type: text
    content: Isn’t this all just common sense,
  - type: text
    content: as common as the sense of taste?
  - type: text
    content: Do you think the elderly have a corner on wisdom,
  - type: text
    content: that you have to grow old before you understand life?
  - type: heading
    content: From God We Learn How to Live
