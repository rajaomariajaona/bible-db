document_id: JOB.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job Answers Zophar
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Put Your Ear to the Earth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Job answered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m sure you speak for all the experts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when you die there’ll be no one left to tell us how to live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t forget that I also have a brain—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t intend to play second fiddle to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It doesn’t take an expert to know these things.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “True wisdom and real power belong to God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from him we learn how to live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and also what to live for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he tears something down, it’s down for good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if he locks people up, they’re locked up for good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he holds back the rain, there’s a drought;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if he lets it loose, there’s a flood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strength and success belong to God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both deceived and deceiver must answer to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He strips experts of their vaunted credentials,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exposes judges as witless fools.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He divests kings of their royal garments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then ties a rag around their waists.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He strips priests of their robes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fires high officials from their jobs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He forces trusted sages to keep silence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deprives elders of their good sense and wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He dumps contempt on famous people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disarms the strong and mighty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shines a spotlight into caves of darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hauls deepest darkness into the noonday sun.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes nations rise and then fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: builds up some and abandons others.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He robs world leaders of their reason,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sends them off into no-man’s-land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They grope in the dark without a clue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lurching and staggering like drunks.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I’m ridiculed by my friends:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘So that’s the man who had conversations with God!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ridiculed without mercy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Look at the man who never did wrong!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s easy for the well-to-do to point their fingers in blame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the well-fixed to pour scorn on the strugglers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crooks reside safely in high-security houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insolent blasphemers live in luxury;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ve bought and paid for a god who’ll protect them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But ask the animals what they think—let them teach you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the birds tell you what’s going on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put your ear to the earth—learn the basics.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen—the fish in the ocean will tell you their stories.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t it clear that they all know and agree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is sovereign, that he holds all things in his hand—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every living soul, yes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every breathing creature?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t this all just common sense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as common as the sense of taste?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think the elderly have a corner on wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have to grow old before you understand life?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: From God We Learn How to Live
    marker-yv: yv-h
