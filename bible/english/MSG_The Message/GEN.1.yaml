document_id: GEN.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Heaven and Earth
  - type: text
    content: 'First this: God created the Heavens and Earth—all you see, all you don’t see. Earth was a soup of nothingness, a bottomless emptiness, an inky blackness. God’s Spirit brooded like a bird above the watery abyss.'
  '11':
  - type: text
    content: 'God spoke: “Earth, green up! Grow all varieties'
  - type: text
    content: of seed-bearing plants,
  - type: text
    content: Every sort of fruit-bearing tree.”
  - type: text
    content: And there it was.
  - type: text
    content: Earth produced green seed-bearing plants,
  - type: text
    content: all varieties,
  - type: text
    content: And fruit-bearing trees of all sorts.
  - type: text
    content: God saw that it was good.
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day Three.
  '14':
  - type: text
    content: 'God spoke: “Lights! Come out!'
  - type: text
    content: Shine in Heaven’s sky!
  - type: text
    content: Separate Day from Night.
  - type: text
    content: Mark seasons and days and years,
  - type: text
    content: Lights in Heaven’s sky to give light to Earth.”
  - type: text
    content: And there it was.
  '16':
  - type: text
    content: God made two big lights, the larger
  - type: text
    content: to take charge of Day,
  - type: text
    content: The smaller to be in charge of Night;
  - type: text
    content: and he made the stars.
  - type: text
    content: God placed them in the heavenly sky
  - type: text
    content: to light up Earth
  - type: text
    content: And oversee Day and Night,
  - type: text
    content: to separate light and dark.
  - type: text
    content: God saw that it was good.
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day Four.
  '20':
  - type: text
    content: 'God spoke: “Swarm, Ocean, with fish and all sea life!'
  - type: text
    content: Birds, fly through the sky over Earth!”
  - type: text
    content: God created the huge whales,
  - type: text
    content: all the swarm of life in the waters,
  - type: text
    content: And every kind and species of flying birds.
  - type: text
    content: God saw that it was good.
  - type: text
    content: 'God blessed them: “Prosper! Reproduce! Fill Ocean!'
  - type: text
    content: Birds, reproduce on Earth!”
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day Five.
  '24':
  - type: text
    content: 'God spoke: “Earth, generate life! Every sort and kind:'
  - type: text
    content: cattle and reptiles and wild animals—all kinds.”
  - type: text
    content: 'And there it was:'
  - type: text
    content: wild animals of every kind,
  - type: text
    content: Cattle of all kinds, every sort of reptile and bug.
  - type: text
    content: God saw that it was good.
  '26':
  - type: text
    content: 'God spoke: “Let us make human beings in our image, make them'
  - type: text
    content: reflecting our nature
  - type: text
    content: So they can be responsible for the fish in the sea,
  - type: text
    content: the birds in the air, the cattle,
  - type: text
    content: And, yes, Earth itself,
  - type: text
    content: and every animal that moves on the face of Earth.”
  - type: text
    content: God created human beings;
  - type: text
    content: he created them godlike,
  - type: text
    content: Reflecting God’s nature.
  - type: text
    content: He created them male and female.
  - type: text
    content: 'God blessed them:'
  - type: text
    content: “Prosper! Reproduce! Fill Earth! Take charge!
  - type: text
    content: Be responsible for fish in the sea and birds in the air,
  - type: text
    content: for every living thing that moves on the face of Earth.”
  '29':
  - type: text
    content: Then God said, “I’ve given you
  - type: text
    content: every sort of seed-bearing plant on Earth
  - type: text
    content: And every kind of fruit-bearing tree,
  - type: text
    content: given them to you for food.
  - type: text
    content: To all animals and all birds,
  - type: text
    content: everything that moves and breathes,
  - type: text
    content: I give whatever grows out of the ground for food.”
  - type: text
    content: And there it was.
  '3':
  - type: text
    content: 'God spoke: “Light!”'
  - type: text
    content: And light appeared.
  - type: text
    content: God saw that light was good
  - type: text
    content: and separated light from dark.
  - type: text
    content: God named the light Day,
  - type: text
    content: he named the dark Night.
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day One.
  '31':
  - type: text
    content: God looked over everything he had made;
  - type: text
    content: it was so good, so very good!
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day Six.
  '6':
  - type: text
    content: 'God spoke: “Sky! In the middle of the waters;'
  - type: text
    content: separate water from water!”
  - type: text
    content: God made sky.
  - type: text
    content: He separated the water under sky
  - type: text
    content: from the water above sky.
  - type: text
    content: 'And there it was:'
  - type: text
    content: he named sky the Heavens;
  - type: text
    content: It was evening, it was morning—
  - type: text
    content: Day Two.
  '9':
  - type: text
    content: 'God spoke: “Separate!'
  - type: text
    content: Water-beneath-Heaven, gather into one place;
  - type: text
    content: Land, appear!”
  - type: text
    content: And there it was.
  - type: text
    content: God named the land Earth.
  - type: text
    content: He named the pooled water Ocean.
  - type: text
    content: God saw that it was good.
