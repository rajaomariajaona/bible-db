document_id: GEN.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Heaven and Earth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'First this: God created the Heavens and Earth—all you see, all you don’t see. Earth was a soup of nothingness, a bottomless emptiness, an inky blackness. God’s Spirit brooded like a bird above the watery abyss.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Earth, green up! Grow all varieties'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of seed-bearing plants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every sort of fruit-bearing tree.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there it was.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth produced green seed-bearing plants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all varieties,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fruit-bearing trees of all sorts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God saw that it was good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day Three.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Lights! Come out!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shine in Heaven’s sky!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Separate Day from Night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mark seasons and days and years,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lights in Heaven’s sky to give light to Earth.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there it was.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God made two big lights, the larger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take charge of Day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The smaller to be in charge of Night;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he made the stars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God placed them in the heavenly sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to light up Earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And oversee Day and Night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to separate light and dark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God saw that it was good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day Four.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Swarm, Ocean, with fish and all sea life!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Birds, fly through the sky over Earth!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God created the huge whales,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the swarm of life in the waters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every kind and species of flying birds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God saw that it was good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God blessed them: “Prosper! Reproduce! Fill Ocean!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Birds, reproduce on Earth!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day Five.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Earth, generate life! Every sort and kind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cattle and reptiles and wild animals—all kinds.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there it was:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild animals of every kind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cattle of all kinds, every sort of reptile and bug.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God saw that it was good.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Let us make human beings in our image, make them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reflecting our nature
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they can be responsible for the fish in the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the birds in the air, the cattle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, yes, Earth itself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every animal that moves on the face of Earth.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God created human beings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he created them godlike,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reflecting God’s nature.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He created them male and female.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God blessed them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Prosper! Reproduce! Fill Earth! Take charge!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be responsible for fish in the sea and birds in the air,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for every living thing that moves on the face of Earth.”
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then God said, “I’ve given you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every sort of seed-bearing plant on Earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every kind of fruit-bearing tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: given them to you for food.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To all animals and all birds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything that moves and breathes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I give whatever grows out of the ground for food.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there it was.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Light!”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And light appeared.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God saw that light was good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and separated light from dark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God named the light Day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he named the dark Night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day One.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God looked over everything he had made;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was so good, so very good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day Six.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Sky! In the middle of the waters;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: separate water from water!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God made sky.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He separated the water under sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the water above sky.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there it was:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he named sky the Heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was evening, it was morning—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day Two.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God spoke: “Separate!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Water-beneath-Heaven, gather into one place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Land, appear!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there it was.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God named the land Earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He named the pooled water Ocean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God saw that it was good.
