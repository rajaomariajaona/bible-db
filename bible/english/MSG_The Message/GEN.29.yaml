type_code: eng
verses:
  '1':
  - type: text
    content: Jacob set out again on his way to the people of the east. He noticed a well out in an open field with three flocks of sheep bedded down around it. This was the common well from which the flocks were watered. The stone over the mouth of the well was huge. When all the flocks were gathered, the shepherds would roll the stone from the well and water the sheep; then they would return the stone, covering the well.
  '14':
  - type: text
    content: Laban said, “You’re family! My flesh and blood!”
  - type: text
    content: When Jacob had been with him for a month, Laban said, “Just because you’re my nephew, you shouldn’t work for me for nothing. Tell me what you want to be paid. What’s a fair wage?”
  '16':
  - type: text
    content: Now Laban had two daughters; Leah was the older and Rachel the younger. Leah had nice eyes, but Rachel was stunningly beautiful. And it was Rachel that Jacob loved.
  - type: text
    content: So Jacob answered, “I will work for you seven years for your younger daughter Rachel.”
  '19':
  - type: text
    content: “It is far better,” said Laban, “that I give her to you than marry her to some outsider. Yes. Stay here with me.”
  '20':
  - type: text
    content: So Jacob worked seven years for Rachel. But it only seemed like a few days, he loved her so much.
  '21':
  - type: text
    content: Then Jacob said to Laban, “Give me my wife; I’ve completed what we agreed I’d do. I’m ready to consummate my marriage.” Laban invited everyone around and threw a big feast. At evening, though, he got his daughter Leah and brought her to the marriage bed, and Jacob slept with her. (Laban gave his maid Zilpah to his daughter Leah as her maid.)
  '25':
  - type: text
    content: 'Morning came: There was Leah in the marriage bed!'
  - type: text
    content: Jacob confronted Laban, “What have you done to me? Didn’t I work all this time for the hand of Rachel? Why did you cheat me?”
  '26':
  - type: text
    content: “We don’t do it that way in our country,” said Laban. “We don’t marry off the younger daughter before the older. Enjoy your week of honeymoon, and then we’ll give you the other one also. But it will cost you another seven years of work.”
  '28':
  - type: text
    content: Jacob agreed. When he’d completed the honeymoon week, Laban gave him his daughter Rachel to be his wife. (Laban gave his maid Bilhah to his daughter Rachel as her maid.) Jacob then slept with her. And he loved Rachel more than Leah. He worked for Laban another seven years.
  '31':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' realized that Leah was unloved, he opened her womb. But Rachel was barren. Leah became pregnant and had a son. She named him Reuben (Look-It’s-a-Boy!). “This is a sign,” she said, “that '
  - type: text
    content: God
  - type: text
    content: ' has seen my misery; and a sign that now my husband will love me.”'
  '33':
  - type: text
    content: She became pregnant again and had another son. “
  - type: text
    content: God
  - type: text
    content: ' heard,” she said, “that I was unloved and so he gave me this son also.” She named this one Simeon ('
  - type: text
    content: God
  - type: text
    content: '-Heard). She became pregnant yet again—another son. She said, “Now maybe my husband will connect with me—I’ve given him three sons!” That’s why she named him Levi (Connect). She became pregnant a final time and had a fourth son. She said, “This time I’ll praise '
  - type: text
    content: God
  - type: text
    content: .” So she named him Judah (Praise-
  - type: text
