  - type: text
    content: '* * *'
  '4':
  - type: text
    content: Jacob said, “Hello friends. Where are you from?”
  - type: text
    content: They said, “We’re from Haran.”
  '5':
  - type: text
    content: Jacob asked, “Do you know Laban son of Nahor?”
  - type: text
    content: “We do.”
  '6':
  - type: text
    content: “Are things well with him?” Jacob continued.
  - type: text
    content: “Very well,” they said. “And here is his daughter Rachel coming with the flock.”
  '7':
  - type: text
    content: Jacob said, “There’s a lot of daylight still left; it isn’t time to round up the sheep yet, is it? So why not water the flocks and go back to grazing?”
  '8':
  - type: text
    content: “We can’t,” they said. “Not until all the shepherds get here. It takes all of us to roll the stone from the well. Not until then can we water the flocks.”
  '9':
  - type: text
    content: While Jacob was in conversation with them, Rachel came up with her father’s sheep. She was the shepherd. The moment Jacob spotted Rachel, daughter of Laban his mother’s brother, saw her arriving with his uncle Laban’s sheep, he went and single-handedly rolled the stone from the mouth of the well and watered the sheep of his uncle Laban. Then he kissed Rachel and broke into tears. He told Rachel that he was related to her father, that he was Rebekah’s son. She ran and told her father. When Laban heard the news—Jacob, his sister’s son!—he ran out to meet him, embraced and kissed him and brought him home. Jacob told Laban the story of everything that had happened.
