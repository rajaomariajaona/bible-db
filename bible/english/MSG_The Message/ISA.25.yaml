document_id: ISA.25,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Hand Rests on This Mountain
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I celebrate you. I praise you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve done your share of miracle-wonders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: well-thought-out plans, solid and sure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here you’ve reduced the city to rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the strong city to a pile of stones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy Big City is a non-city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to be a city again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Superpowers will see it and honor you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brutal oppressors bow in worshipful reverence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll see that you take care of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you take care of poor people in trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Provide a warm, dry place in bad weather,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provide a cool place when it’s hot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brutal oppressors are like a winter blizzard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and vicious foreigners like high noon in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, shelter from the storm and shade from the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shut the mouths of the big-mouthed bullies.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10b-12
    - type: text
      text: ' As for the Moabites, they’ll be treated like trash,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: waste shoveled into a cesspool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thrash away as they will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like swimmers trying to stay afloat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll sink in the sewage.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their pride will pull them under.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their famous fortifications will crumble to nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those mighty walls reduced to dust.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: 'But here on this mountain, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will throw a feast for all the people of the world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A feast of the finest foods, a feast with vintage wines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a feast of seven courses, a feast lavish with gourmet desserts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And here on this mountain, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will banish'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pall of doom hanging over all peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shadow of doom darkening all nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, he’ll banish death forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will wipe the tears from every face.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll remove every sign of disgrace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From his people, wherever they are.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10a
    - type: text
      text: ' Also at that time, people will say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Look at what’s happened! This is our God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We waited for him and he showed up and saved us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the one we waited for!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s celebrate, sing the joys of his salvation.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s hand rests on this mountain!”
