  - type: heading
    content: God’s Hand Rests on This Mountain
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', you are '
  - type: text
    content: my
  - type: text
    content: ' God.'
  - type: text
    content: I celebrate you. I praise you.
  - type: text
    content: You’ve done your share of miracle-wonders,
  - type: text
    content: well-thought-out plans, solid and sure.
  - type: text
    content: Here you’ve reduced the city to rubble,
  - type: text
    content: the strong city to a pile of stones.
  - type: text
    content: The enemy Big City is a non-city,
  - type: text
    content: never to be a city again.
  - type: text
    content: Superpowers will see it and honor you,
  - type: text
    content: brutal oppressors bow in worshipful reverence.
  - type: text
    content: They’ll see that you take care of the poor,
  - type: text
    content: that you take care of poor people in trouble,
  - type: text
    content: Provide a warm, dry place in bad weather,
  - type: text
    content: provide a cool place when it’s hot.
  - type: text
    content: Brutal oppressors are like a winter blizzard
  - type: text
    content: and vicious foreigners like high noon in the desert.
  - type: text
    content: But you, shelter from the storm and shade from the sun,
  - type: text
    content: shut the mouths of the big-mouthed bullies.
  '10':
  - type: text
    content: ' As for the Moabites, they’ll be treated like trash,'
  - type: text
    content: waste shoveled into a cesspool.
  - type: text
    content: Thrash away as they will,
  - type: text
    content: like swimmers trying to stay afloat,
  - type: text
    content: They’ll sink in the sewage.
  - type: text
    content: Their pride will pull them under.
  - type: text
    content: Their famous fortifications will crumble to nothing,
  - type: text
    content: those mighty walls reduced to dust.
  '6':
  - type: text
    content: 'But here on this mountain, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies
  - type: text
    content: will throw a feast for all the people of the world,
  - type: text
    content: A feast of the finest foods, a feast with vintage wines,
  - type: text
    content: a feast of seven courses, a feast lavish with gourmet desserts.
  - type: text
    content: 'And here on this mountain, '
  - type: text
    content: God
  - type: text
    content: ' will banish'
  - type: text
    content: the pall of doom hanging over all peoples,
  - type: text
    content: The shadow of doom darkening all nations.
  - type: text
    content: Yes, he’ll banish death forever.
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' will wipe the tears from every face.'
  - type: text
    content: He’ll remove every sign of disgrace
  - type: text
    content: From his people, wherever they are.
  - type: text
    content: 'Yes! '
  - type: text
    content: God
  - type: text
    content: ' says so!'
  '9':
  - type: text
    content: ' Also at that time, people will say,'
  - type: text
    content: “Look at what’s happened! This is our God!
  - type: text
    content: We waited for him and he showed up and saved us!
  - type: text
    content: 'This '
  - type: text
    content: God
  - type: text
    content: ', the one we waited for!'
  - type: text
    content: Let’s celebrate, sing the joys of his salvation.
  - type: text
    content: God
  - type: text
