document_id: 2CO.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: He’s Alive Now!
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: Well, this is my third visit coming up. Remember the Scripture that says, “A matter becomes clear after two or three witnesses give evidence”? On my second visit I warned that bunch that keeps sinning over and over in the same old ways that when I came back I wouldn’t go easy on them. Now, preparing for the third, I’m saying it again from a distance. If you haven’t changed your ways by the time I get there, look out. You who have been demanding proof that Christ speaks through me will get more than you bargained for. You’ll get the full force of Christ, don’t think you won’t. He was sheer weakness and humiliation when he was killed on the cross, but oh, he’s alive now—in the mighty power of God! We weren’t much to look at, either, when we were humiliated among you, but when we deal with you this next time, we’ll be alive in Christ, strengthened by God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I’m writing this to you now so that when I come I won’t have to say another word on the subject. The authority the Master gave me is for putting people together, not taking them apart. I want to get on with it, and not have to spend time on reprimands.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: And that’s about it, friends. Be cheerful. Keep things in good repair. Keep your spirits up. Think in harmony. Be agreeable. Do all that, and the God of love and peace will be with you for sure. Greet one another with a holy embrace. All the brothers and sisters here say hello.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The amazing grace of the Master, Jesus Christ, the extravagant love of God, the intimate friendship of the Holy Spirit, be with all of you.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: Test yourselves to make sure you are solid in the faith. Don’t drift along taking everything for granted. Give yourselves regular checkups. You need firsthand evidence, not mere hearsay, that Jesus Christ is in you. Test it out. If you fail the test, do something about it. I hope the test won’t show that we have failed. But if it comes to that, we’d rather the test showed our failure than yours. We’re rooting for the truth to win out in you. We couldn’t possibly do otherwise.
  - type: usfm
    marker: p
    children:
    - type: text
      text: We don’t just put up with our limitations; we celebrate them, and then go on to celebrate every strength, every triumph of the truth in you. We pray hard that it will all come together in your lives.
