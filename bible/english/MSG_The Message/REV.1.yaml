document_id: REV.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'A revealing of Jesus, the Messiah. God gave it to make plain to his servants what is about to happen. He published and delivered it by Angel to his servant John. And John told everything he saw: God’s Word—the witness of Jesus Christ!'
  '17':
  - type: text
    content: ' “Don’t fear: I am First, I am Last, I’m Alive. I died, but I came to life, and my life is now forever. See these keys in my hand? They open and lock Death’s doors, they open and lock Hell’s gates. Now write down everything you see: things that are, things about to be. The Seven Stars you saw in my right hand and the seven-branched gold menorah—do you want to know what’s behind them? The Seven Stars are the Angels of the seven churches; the menorah’s seven branches are the seven churches.”'
  '3':
  - type: text
    content: How blessed the reader! How blessed the hearers and keepers of these oracle words, all the words written in this book!
  - type: text
    content: Time is just about up.
  - type: heading
    content: His Eyes Pouring Fire-Blaze
  '4':
  - type: text
    content: 'I, John, am writing this to the seven churches in Asia province: All the best to you from '
  - type: text
    content: The God Who Is, The God Who Was, and The God About to Arrive
  - type: text
    content: ', and from the Seven Spirits assembled before his throne, and from Jesus Christ—Loyal Witness, Firstborn from the dead, Ruler of all earthly kings.'
  - type: text
    content: Glory and strength to Christ, who loves us,
  - type: text
    content: who blood-washed our sins from our lives,
  - type: text
    content: Who made us a Kingdom, Priests for his Father,
  - type: text
    content: forever—and yes, he’s on his way!
  - type: text
    content: Riding the clouds, he’ll be seen by every eye,
  - type: text
    content: those who mocked and killed him will see him,
  - type: text
    content: People from all nations and all times
  - type: text
    content: will tear their clothes in lament.
  - type: text
    content: Oh, Yes.
  '8':
  - type: text
    content: 'The Master declares, “I’m A to Z. I’m '
  - type: text
    content: The God Who Is, The God Who Was, and The God About to Arrive
  - type: text
    content: . I’m the Sovereign-Strong.”
  '9':
  - type: text
    content: ' I, John, with you all the way in the trial and the Kingdom and the passion of patience in Jesus, was on the island called Patmos because of God’s Word, the witness of Jesus. It was Sunday and I was in the Spirit, praying. I heard a loud voice behind me, trumpet-clear and piercing: “Write what you see into a book. Send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, Laodicea.” I turned and saw the voice.'
  - type: text
    content: I saw a gold menorah
  - type: text
    content: with seven branches,
  - type: text
    content: And in the center, the Son of Man,
  - type: text
    content: in a robe and gold breastplate,
  - type: text
    content: hair a blizzard of white,
  - type: text
    content: Eyes pouring fire-blaze,
  - type: text
    content: both feet furnace-fired bronze,
  - type: text
    content: His voice a roar,
  - type: text
    content: right hand holding the Seven Stars,
  - type: text
    content: His mouth a sharp-biting sword,
  - type: text
    content: his face a blinding sun.
  - type: text
    content: 'I saw this and fainted dead at his feet. His right hand pulled me upright, his voice reassured me:'
