document_id: REV.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'A revealing of Jesus, the Messiah. God gave it to make plain to his servants what is about to happen. He published and delivered it by Angel to his servant John. And John told everything he saw: God’s Word—the witness of Jesus Christ!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17b-20
    - type: text
      text: ' “Don’t fear: I am First, I am Last, I’m Alive. I died, but I came to life, and my life is now forever. See these keys in my hand? They open and lock Death’s doors, they open and lock Hell’s gates. Now write down everything you see: things that are, things about to be. The Seven Stars you saw in my right hand and the seven-branched gold menorah—do you want to know what’s behind them? The Seven Stars are the Angels of the seven churches; the menorah’s seven branches are the seven churches.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: How blessed the reader! How blessed the hearers and keepers of these oracle words, all the words written in this book!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Time is just about up.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: His Eyes Pouring Fire-Blaze
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: 'I, John, am writing this to the seven churches in Asia province: All the best to you from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: The God Who Is, The God Who Was, and The God About to Arrive
    - type: text
      text: ', and from the Seven Spirits assembled before his throne, and from Jesus Christ—Loyal Witness, Firstborn from the dead, Ruler of all earthly kings.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Glory and strength to Christ, who loves us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who blood-washed our sins from our lives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who made us a Kingdom, Priests for his Father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forever—and yes, he’s on his way!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Riding the clouds, he’ll be seen by every eye,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who mocked and killed him will see him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People from all nations and all times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will tear their clothes in lament.
  - type: usfm
    marker: q3
    children:
    - type: text
      text: Oh, Yes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The Master declares, “I’m A to Z. I’m '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: The God Who Is, The God Who Was, and The God About to Arrive
    - type: text
      text: . I’m the Sovereign-Strong.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-17a
    - type: text
      text: ' I, John, with you all the way in the trial and the Kingdom and the passion of patience in Jesus, was on the island called Patmos because of God’s Word, the witness of Jesus. It was Sunday and I was in the Spirit, praying. I heard a loud voice behind me, trumpet-clear and piercing: “Write what you see into a book. Send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, Laodicea.” I turned and saw the voice.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I saw a gold menorah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with seven branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the center, the Son of Man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a robe and gold breastplate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hair a blizzard of white,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eyes pouring fire-blaze,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both feet furnace-fired bronze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His voice a roar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right hand holding the Seven Stars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His mouth a sharp-biting sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his face a blinding sun.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I saw this and fainted dead at his feet. His right hand pulled me upright, his voice reassured me:'
