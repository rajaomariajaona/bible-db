document_id: 1CH.23,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Worship
  - type: text
    content: When David got to be an old man, he made his son Solomon king over Israel.
  '12':
  - type: text
    content: 'The four sons of Kohath: Amram, Izhar, Hebron, and Uzziel. The sons of Amram: Aaron and Moses. Aaron was especially ordained to work in the Holy of Holies, to burn incense before '
  - type: text
    content: God
  - type: text
    content: ', to serve God and bless his Name always. This was a permanent appointment for Aaron and his sons. Moses and his sons were counted in the tribe of Levi.'
  '15':
  - type: text
    content: 'The sons of Moses: Gershom and Eliezer. Shubael was the first son of Gershom. Rehabiah was the first and only son of Eliezer; but though Eliezer had no other sons, Rehabiah had many sons.'
  '18':
  - type: text
    content: 'Shelomith was the first son of Izhar. Hebron had four sons: Jeriah, Amariah, Jahaziel, and Jekameam. Uzziel had two sons: Micah and Isshiah. The sons of Merari: Mahli and Mushi. The sons of Mahli: Eleazar and Kish. Eleazar died without any sons, only daughters. Their cousins, the sons of Kish, married the daughters. Mushi had three sons: Mahli, Eder, and Jerimoth.'
  '2':
  - type: text
    content: 'At the same time he brought together all the leaders of Israel, the priests, and the Levites. The Levites thirty years and older were counted; the total was thirty-eight thousand. David sorted them into work groups: “Twenty-four thousand are in charge of administering worship in the sanctuary; six thousand are officials and judges; four thousand are security guards; and four thousand are to serve in the orchestra, praising '
  - type: text
    content: God
  - type: text
    content: ' with instruments that I have provided for praise.”'
  '24':
  - type: text
    content: 'These are the sons of Levi twenty years and older, divided up according to families and heads of families and listed in the work groups that took care of the worship in the sanctuary of '
  - type: text
    content: God
  - type: text
    content: .
  '25':
  - type: text
    content: 'David said, “Now that the '
  - type: text
    content: God
  - type: text
    content: ' of Israel has given rest to his people and made Jerusalem his permanent home, the Levites no longer have to carry the Tabernacle and all the furniture required for the work of worship.” These last words of David referred only to Levites twenty years old and above.'
  '28':
  - type: text
    content: 'From now on the assigned work of the Levites was to assist Aaron’s sons in the work of worship in '
  - type: text
    content: God
  - type: text
    content: '’s house: maintain courtyards and closets, keep the furniture and utensils of worship clean, take care of any extra work needed in the work of worship, and provide bread for the table and flour for the Meal Offerings and the unraised wafers—all baking and mixing, all measuring and weighing. Also they were to be present for morning prayers, thanking and praising '
  - type: text
    content: God
  - type: text
    content: ', for evening prayers, and at the service of Whole-Burnt-Offerings to '
  - type: text
    content: God
  - type: text
    content: ' on Sabbath, at New Moons, and at all festivals. They were on regular duty to serve '
  - type: text
    content: God
  - type: text
    content: ' according to their assignment and the required number.'
  '32':
  - type: text
    content: 'In short, the Levites, with the sons of Aaron as their companions in the ministry of holy worship, were responsible for everything that had to do with worship: the place and times and ordering of worship.'
  '6':
  - type: text
    content: 'David then divided the Levites into groupings named after the sons of Levi: Gershon, Kohath, and Merari.'
  '7':
  - type: text
    content: 'The Gershonites: Ladan and Shimei. The three sons of Ladan: Jehiel, Zetham, and Joel. The three sons of Shimei: Shelomoth, Haziel, and Haran, all heads of the families of Ladan. The four sons of Shimei: Jahath, Ziza, Jeush, and Beriah. Jahath came first, followed by Ziza. Jeush and Beriah did not have many sons so they were counted as one family with one task.'
