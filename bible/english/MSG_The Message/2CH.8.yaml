document_id: 2CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: More on Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'At the end of twenty years, Solomon had quite a list of accomplishments. He had:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'built The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and his own palace;'
- type: usfm
  marker: li2
  children:
  - type: text
    text: rebuilt the cities that Hiram had given him and colonized them with Israelites;
- type: usfm
  marker: li2
  children:
  - type: text
    text: marched on Hamath Zobah and took it;
- type: usfm
  marker: li2
  children:
  - type: text
    text: fortified Tadmor in the desert and all the store-cities he had founded in Hamath;
- type: usfm
  marker: li2
  children:
  - type: text
    text: built the fortress cities Upper Beth Horon and Lower Beth Horon, complete with walls, gates, and bars;
- type: usfm
  marker: li2
  children:
  - type: text
    text: built Baalath and store-cities;
- type: usfm
  marker: li2
  children:
  - type: text
    text: built chariot-cities for his horses.
- type: usfm
  marker: p
  children:
  - type: text
    text: Solomon built impulsively and extravagantly—whenever a whim took him. And in Jerusalem, in Lebanon—wherever he fancied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: The remnants from the original inhabitants of the land (Hittites, Amorites, Perizzites, Hivites, Jebusites—all non-Israelites), survivors of the holy wars, were rounded up by Solomon for his gangs of slave labor. The policy is in effect today. But true Israelites were not treated this way; they were used in his army and administration—government leaders and commanders of his chariots and charioteers. They were also the project managers responsible for Solomon’s building operations—250 in all in charge of the workforce.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Solomon brought Pharaoh’s daughter from the City of David to a house built especially for her, “Because,” he said, “my wife cannot live in the house of David king of Israel, for the areas in which the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has entered are sacred.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'Then Solomon offered Whole-Burnt-Offerings to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' on the Altar of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that he had built in front of The Temple porch. He kept to the regular schedule of worship set down by Moses: Sabbaths, New Moons, and the three annual feasts of Unraised Bread (Passover), Weeks (Pentecost), and Booths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: He followed the practice of his father David in setting up groups of priests carrying out the work of worship, with the Levites assigned to lead the sacred music for praising God and to assist the priests in the daily worship; he assigned security guards to be on duty at each gate—that’s what David the man of God had ordered. The king’s directions to the priests and Levites and financial stewards were kept right down to the fine print—no innovations—including the treasuries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All that Solomon set out to do, from the groundbreaking of The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to its finish, was now complete.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Then Solomon went to Ezion Geber and Elath on the coast of Edom. Hiram sent him ships and with them veteran sailors. Joined by Solomon’s men they sailed to Ophir (in east Africa), loaded on fifteen tons of gold, and brought it back to King Solomon.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
