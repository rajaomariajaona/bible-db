document_id: PSA.44,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: We’ve been hearing about this, God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all our lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our fathers told us the stories
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their fathers told them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How single-handedly you weeded out the godless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the fields and planted us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you sent those people packing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but gave us a fresh start.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We didn’t fight for this land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we didn’t work for it—it was a gift!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave it, smiling as you gave it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: delighting as you gave it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: You made people on the street,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people we know, poke fun and call us names.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made us a joke among the godless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a cheap joke among the rabble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day I’m up against it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my nose rubbed in my shame—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gossip and ridicule fill the air,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people out to get me crowd the street.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-19
    - type: text
      text: All this came down on us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we’ve done nothing to deserve it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We never betrayed your Covenant: our hearts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were never false, our feet never left your path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do we deserve torture in a den of jackals?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or lockup in a black hole?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: If we had forgotten to pray to our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or made fools of ourselves with store-bought gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wouldn’t God have figured this out?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We can’t hide things from him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, you decided to make us martyrs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lambs assigned for sacrifice each day.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-26
    - type: text
      text: 'Get up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Are you going to sleep all day?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up! Don’t you care what happens to us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you bury your face in the pillow?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why pretend things are just fine with us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And here we are—flat on our faces in the dirt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: held down with a boot on our necks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get up and come to our rescue.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If you love us so much, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Help us!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-8
    - type: text
      text: You’re my King, O God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: command victories for Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your help we’ll wipe out our enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your name we’ll stomp them to dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I don’t trust in weapons;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sword won’t save me—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it’s you, you who saved us from the enemy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made those who hate us lose face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day we parade God’s praise—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we thank you by name over and over.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: But now you’ve walked off and left us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve disgraced us and won’t fight for us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made us turn tail and run;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who hate us have cleaned us out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You delivered us as sheep to the butcher,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you scattered us to the four winds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sold your people at a discount—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made nothing on the sale.
