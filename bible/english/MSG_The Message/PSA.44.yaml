document_id: PSA.44,97
type_code: eng
verses:
  '1':
  - type: text
    content: We’ve been hearing about this, God,
  - type: text
    content: all our lives.
  - type: text
    content: Our fathers told us the stories
  - type: text
    content: their fathers told them,
  - type: text
    content: How single-handedly you weeded out the godless
  - type: text
    content: from the fields and planted us,
  - type: text
    content: How you sent those people packing
  - type: text
    content: but gave us a fresh start.
  - type: text
    content: We didn’t fight for this land;
  - type: text
    content: we didn’t work for it—it was a gift!
  - type: text
    content: You gave it, smiling as you gave it,
  - type: text
    content: delighting as you gave it.
  '13':
  - type: text
    content: You made people on the street,
  - type: text
    content: people we know, poke fun and call us names.
  - type: text
    content: You made us a joke among the godless,
  - type: text
    content: a cheap joke among the rabble.
  - type: text
    content: Every day I’m up against it,
  - type: text
    content: my nose rubbed in my shame—
  - type: text
    content: Gossip and ridicule fill the air,
  - type: text
    content: people out to get me crowd the street.
  '17':
  - type: text
    content: All this came down on us,
  - type: text
    content: and we’ve done nothing to deserve it.
  - type: text
    content: 'We never betrayed your Covenant: our hearts'
  - type: text
    content: were never false, our feet never left your path.
  - type: text
    content: Do we deserve torture in a den of jackals?
  - type: text
    content: or lockup in a black hole?
  '20':
  - type: text
    content: If we had forgotten to pray to our God
  - type: text
    content: or made fools of ourselves with store-bought gods,
  - type: text
    content: Wouldn’t God have figured this out?
  - type: text
    content: We can’t hide things from him.
  - type: text
    content: No, you decided to make us martyrs,
  - type: text
    content: lambs assigned for sacrifice each day.
  '23':
  - type: text
    content: 'Get up, '
  - type: text
    content: God
  - type: text
    content: '! Are you going to sleep all day?'
  - type: text
    content: Wake up! Don’t you care what happens to us?
  - type: text
    content: Why do you bury your face in the pillow?
  - type: text
    content: Why pretend things are just fine with us?
  - type: text
    content: And here we are—flat on our faces in the dirt,
  - type: text
    content: held down with a boot on our necks.
  - type: text
    content: Get up and come to our rescue.
  - type: text
    content: 'If you love us so much, '
  - type: text
    content: Help us!
  '4':
  - type: text
    content: You’re my King, O God—
  - type: text
    content: command victories for Jacob!
  - type: text
    content: With your help we’ll wipe out our enemies,
  - type: text
    content: in your name we’ll stomp them to dust.
  - type: text
    content: I don’t trust in weapons;
  - type: text
    content: my sword won’t save me—
  - type: text
    content: But it’s you, you who saved us from the enemy;
  - type: text
    content: you made those who hate us lose face.
  - type: text
    content: All day we parade God’s praise—
  - type: text
    content: we thank you by name over and over.
  '9':
  - type: text
    content: But now you’ve walked off and left us,
  - type: text
    content: you’ve disgraced us and won’t fight for us.
  - type: text
    content: You made us turn tail and run;
  - type: text
    content: those who hate us have cleaned us out.
  - type: text
    content: You delivered us as sheep to the butcher,
  - type: text
    content: you scattered us to the four winds.
  - type: text
    content: You sold your people at a discount—
  - type: text
    content: you made nothing on the sale.
