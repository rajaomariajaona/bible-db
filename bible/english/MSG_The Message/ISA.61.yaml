document_id: ISA.61
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Announce Freedom to All Captives
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: 'The Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, is on me'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' anointed me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He sent me to preach good news to the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: heal the heartbroken,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Announce freedom to all captives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pardon all prisoners.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent me to announce the year of his grace—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a celebration of God’s destruction of our enemies—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to comfort all who mourn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To care for the needs of all who mourn in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give them bouquets of roses instead of ashes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Messages of joy instead of news of doom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a praising heart instead of a languid spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rename them “Oaks of Righteousness”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'planted by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to display his glory.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll rebuild the old ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: raise a new city out of the wreckage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll start over on the ruined cities,
- type: usfm
  marker: q2
  children:
  - type: text
    text: take the rubble left behind and make it new.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll hire outsiders to herd your flocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and foreigners to work your fields,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But you’ll have the title “Priests of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ',”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: honored as ministers of our God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll feast on the bounty of nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll bask in their glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you got a double dose of trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and more than your share of contempt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your inheritance in the land will be doubled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your joy go on forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: '“Because I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', love fair dealing'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hate thievery and crime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll pay your wages on time and in full,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and establish my eternal covenant with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your descendants will become well-known all over.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your children in foreign countries
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be recognized at once
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the people I have blessed.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'I will sing for joy in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: explode in praise from deep in my soul!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He dressed me up in a suit of salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he outfitted me in a robe of righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a bridegroom who puts on a tuxedo
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a bride a jeweled tiara.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For as the earth bursts with spring wildflowers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as a garden cascades with blossoms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', brings righteousness into full bloom'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and puts praise on display before the nations.
