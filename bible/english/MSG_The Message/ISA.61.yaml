document_id: ISA.61,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Announce Freedom to All Captives
  - type: text
    content: 'The Spirit of '
  - type: text
    content: God
  - type: text
    content: ', the Master, is on me'
  - type: text
    content: 'because '
  - type: text
    content: God
  - type: text
    content: ' anointed me.'
  - type: text
    content: He sent me to preach good news to the poor,
  - type: text
    content: heal the heartbroken,
  - type: text
    content: Announce freedom to all captives,
  - type: text
    content: pardon all prisoners.
  - type: text
    content: God
  - type: text
    content: ' sent me to announce the year of his grace—'
  - type: text
    content: a celebration of God’s destruction of our enemies—
  - type: text
    content: and to comfort all who mourn,
  - type: text
    content: To care for the needs of all who mourn in Zion,
  - type: text
    content: give them bouquets of roses instead of ashes,
  - type: text
    content: Messages of joy instead of news of doom,
  - type: text
    content: a praising heart instead of a languid spirit.
  - type: text
    content: Rename them “Oaks of Righteousness”
  - type: text
    content: 'planted by '
  - type: text
    content: God
  - type: text
    content: ' to display his glory.'
  - type: text
    content: They’ll rebuild the old ruins,
  - type: text
    content: raise a new city out of the wreckage.
  - type: text
    content: They’ll start over on the ruined cities,
  - type: text
    content: take the rubble left behind and make it new.
  - type: text
    content: You’ll hire outsiders to herd your flocks
  - type: text
    content: and foreigners to work your fields,
  - type: text
    content: 'But you’ll have the title “Priests of '
  - type: text
    content: God
  - type: text
    content: ',”'
  - type: text
    content: honored as ministers of our God.
  - type: text
    content: You’ll feast on the bounty of nations,
  - type: text
    content: you’ll bask in their glory.
  - type: text
    content: Because you got a double dose of trouble
  - type: text
    content: and more than your share of contempt,
  - type: text
    content: Your inheritance in the land will be doubled
  - type: text
    content: and your joy go on forever.
  '10':
  - type: text
    content: 'I will sing for joy in '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: explode in praise from deep in my soul!
  - type: text
    content: He dressed me up in a suit of salvation,
  - type: text
    content: he outfitted me in a robe of righteousness,
  - type: text
    content: As a bridegroom who puts on a tuxedo
  - type: text
    content: and a bride a jeweled tiara.
  - type: text
    content: For as the earth bursts with spring wildflowers,
  - type: text
    content: and as a garden cascades with blossoms,
  - type: text
    content: 'So the Master, '
  - type: text
    content: God
  - type: text
    content: ', brings righteousness into full bloom'
  - type: text
    content: and puts praise on display before the nations.
  '8':
  - type: text
    content: '“Because I, '
  - type: text
    content: God
  - type: text
    content: ', love fair dealing'
  - type: text
    content: and hate thievery and crime,
  - type: text
    content: I’ll pay your wages on time and in full,
  - type: text
    content: and establish my eternal covenant with you.
  - type: text
    content: Your descendants will become well-known all over.
  - type: text
    content: Your children in foreign countries
  - type: text
    content: Will be recognized at once
  - type: text
    content: as the people I have blessed.”
