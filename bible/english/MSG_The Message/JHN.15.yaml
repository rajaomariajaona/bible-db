document_id: JHN.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Vine and the Branches
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: “I am the Real Vine and my Father is the Farmer. He cuts off every branch of me that doesn’t bear grapes. And every branch that is grape-bearing he prunes back so it will bear even more. You are already pruned back by the message I have spoken.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Live in me. Make your home in me just as I do in you. In the same way that a branch can’t bear grapes by itself but only by being joined to the vine, you can’t bear fruit unless you are joined with me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: “I am the Vine, you are the branches. When you’re joined with me and I with you, the relation intimate and organic, the harvest is sure to be abundant. Separated, you can’t produce a thing. Anyone who separates from me is deadwood, gathered up and thrown on the bonfire. But if you make yourselves at home with me and my words are at home in you, you can be sure that whatever you ask will be listened to and acted upon. This is how my Father shows who he is—when you produce grapes, when you mature as my disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “I’ve loved you the way my Father has loved me. Make yourselves at home in my love. If you keep my commands, you’ll remain intimately at home in my love. That’s what I’ve done—kept my Father’s commands and made myself at home in his love.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: '“I’ve told you these things for a purpose: that my joy might be your joy, and your joy wholly mature. This is my command: Love one another the way I loved you. This is the very best way to love. Put your life on the line for your friends. You are my friends when you do the things I command you. I’m no longer calling you servants because servants don’t understand what their master is thinking and planning. No, I’ve named you friends because I’ve let you in on everything I’ve heard from the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “You didn’t choose me, remember; I chose you, and put you in the world to bear fruit, fruit that won’t spoil. As fruit bearers, whatever you ask the Father in relation to me, he gives you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“But remember the root command: Love one another.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hated by the World
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: “If you find the godless world is hating you, remember it got its start hating me. If you lived on the world’s terms, the world would love you as one of its own. But since I picked you to live on God’s terms and no longer on the world’s terms, the world is going to hate you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“When that happens, remember this: Servants don’t get better treatment than their masters. If they beat on me, they will certainly beat on you. If they did what I told them, they will do what you tell them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: '“They are going to do all these things to you because of the way they treated me, because they don’t know the One who sent me. If I hadn’t come and told them all this in plain language, it wouldn’t be so bad. As it is, they have no excuse. Hate me, hate my Father—it’s all the same. If I hadn’t done what I have done among them, works no one has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ever
  - type: text
    text: ' done, they wouldn’t be to blame. But they saw the God-signs and hated anyway, both me and my Father. Interesting—they have verified the truth of their own Scriptures where it is written, ‘They hated me for no good reason.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: “When the Friend I plan to send you from the Father comes—the Spirit of Truth issuing from the Father—he will confirm everything about me. You, too, from your side must give your confirming evidence, since you are in this with me from the start.”
