document_id: JER.9,97
type_code: eng
verses:
  '1':
  - type: text
    content: I wish my head were a well of water
  - type: text
    content: and my eyes fountains of tears
  - type: text
    content: So I could weep day and night
  - type: text
    content: for casualties among my dear, dear people.
  - type: text
    content: At times I wish I had a wilderness hut,
  - type: text
    content: a backwoods cabin,
  - type: text
    content: Where I could get away from my people
  - type: text
    content: and never see them again.
  - type: text
    content: They’re a faithless, feckless bunch,
  - type: text
    content: a congregation of degenerates.
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: “I’m lamenting the loss of the mountain pastures.
  - type: text
    content: I’m chanting dirges for the old grazing grounds.
  - type: text
    content: They’ve become deserted wastelands too dangerous for travelers.
  - type: text
    content: No sounds of sheep bleating or cattle mooing.
  - type: text
    content: Birds and wild animals, all gone.
  - type: text
    content: Nothing stirring, no sounds of life.
  - type: text
    content: I’m going to make Jerusalem a pile of rubble,
  - type: text
    content: fit for nothing but stray cats and dogs.
  - type: text
    content: I’m going to reduce Judah’s towns to piles of ruins
  - type: text
    content: where no one lives!”
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: 'I asked, “Is there anyone around bright enough to tell us what’s going on here? Anyone who has the inside story from '
  - type: text
    content: God
  - type: text
    content: ' and can let us in on it?'
  - type: text
    content: “Why is the country wasted?
  - type: text
    content: “Why no travelers in this desert?”
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s answer: “Because they abandoned my plain teaching. They wouldn’t listen to anything I said, refused to live the way I told them to. Instead they lived any way they wanted and took up with the Baal gods, who they thought would give them what they wanted—following the example of their parents.” And this is the consequence. '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies says so:'
  - type: text
    content: “I’ll feed them with pig slop.
  - type: text
    content: “I’ll give them poison to drink.
  '16':
  - type: text
    content: “Then I’ll scatter them far and wide among godless peoples that neither they nor their parents have ever heard of, and I’ll send Death in pursuit until there’s nothing left of them.”
  - type: heading
    content: A Life That Is All Outside but No Inside
  '17':
  - type: text
    content: 'A Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “Look over the trouble we’re in and call for help.
  - type: text
    content: Send for some singers who can help us mourn our loss.
  - type: text
    content: Tell them to hurry—
  - type: text
    content: to help us express our loss and lament,
  - type: text
    content: Help us get our tears flowing,
  - type: text
    content: make tearful music of our crying.
  - type: text
    content: Listen to it!
  - type: text
    content: 'Listen to that torrent of tears out of Zion:'
  - type: text
    content: ‘We’re a ruined people,
  - type: text
    content: we’re a shamed people!
  - type: text
    content: We’ve been driven from our homes
  - type: text
    content: and must leave our land!’”
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: 'Mourning women! Oh, listen to '
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: text
    content: Open your ears. Take in what he says.
  - type: text
    content: Teach your daughters songs for the dead
  - type: text
    content: and your friends the songs of heartbreak.
  - type: text
    content: Death has climbed in through the window,
  - type: text
    content: broken into our bedrooms.
  - type: text
    content: Children on the playgrounds drop dead,
  - type: text
    content: and young men and women collapse at their games.
  '22':
  - type: text
    content: Speak up! “
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “‘Dead bodies everywhere, scattered at random
  - type: text
    content: like sheep and goat dung in the fields,
  - type: text
    content: Like wheat cut down by reapers
  - type: text
    content: and left to rot where it falls.’”
  '23':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Don’t let the wise brag of their wisdom.
  - type: text
    content: Don’t let heroes brag of their exploits.
  - type: text
    content: Don’t let the rich brag of their riches.
  - type: text
    content: 'If you brag, brag of this and this only:'
  - type: text
    content: That you understand and know me.
  - type: text
    content: 'I’m '
  - type: text
    content: God
  - type: text
    content: ', and I act in loyal love.'
  - type: text
    content: I do what’s right and set things right and fair,
  - type: text
    content: and delight in those who do the same things.
  - type: text
    content: These are my trademarks.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '25':
  - type: text
    content: “Stay alert! It won’t be long now”—
  - type: text
    content: God
  - type: text
    content: '’s Decree!—“when I will personally deal with everyone whose life is all outside but no inside: Egypt, Judah, Edom, Ammon, Moab. All these nations are big on performance religion—including Israel, who is no better.”'
  '3':
  - type: text
    content: “Their tongues shoot out lies
  - type: text
    content: like a bow shoots arrows—
  - type: text
    content: A mighty army of liars,
  - type: text
    content: the sworn enemies of truth.
  - type: text
    content: They advance from one evil to the next,
  - type: text
    content: ignorant of me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Be wary of even longtime neighbors.
  - type: text
    content: Don’t even trust your grandmother!
  - type: text
    content: Brother schemes against brother,
  - type: text
    content: like old cheating Jacob.
  - type: text
    content: Friend against friend
  - type: text
    content: spreads malicious gossip.
  - type: text
    content: Neighbors gyp neighbors,
  - type: text
    content: never telling the truth.
  - type: text
    content: They’ve trained their tongues to tell lies,
  - type: text
    content: and now they can’t tell the truth.
  - type: text
    content: They pile wrong upon wrong, stack lie upon lie,
  - type: text
    content: and refuse to know me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '7':
  - type: text
    content: 'Therefore, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies says:'
  - type: text
    content: “Watch this! I’ll melt them down
  - type: text
    content: and see what they’re made of.
  - type: text
    content: What else can I do
  - type: text
    content: with a people this wicked?
  - type: text
    content: Their tongues are poison arrows!
  - type: text
    content: Deadly lies stream from their mouths.
  - type: text
    content: Neighbor greets neighbor with a smile,
  - type: text
    content: ‘Good morning! How’re things?’
  - type: text
    content: while scheming to do away with him.
  - type: text
    content: Do you think I’m going to stand around and do nothing?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Don’t you think I’ll take serious measures
  - type: text
    content: against a people like this?
