document_id: JER.9
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I wish my head were a well of water
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my eyes fountains of tears
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I could weep day and night
- type: usfm
  marker: q2
  children:
  - type: text
    text: for casualties among my dear, dear people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At times I wish I had a wilderness hut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a backwoods cabin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where I could get away from my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never see them again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re a faithless, feckless bunch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a congregation of degenerates.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: “Their tongues shoot out lies
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a bow shoots arrows—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mighty army of liars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sworn enemies of truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They advance from one evil to the next,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ignorant of me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Be wary of even longtime neighbors.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t even trust your grandmother!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brother schemes against brother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like old cheating Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Friend against friend
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreads malicious gossip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neighbors gyp neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never telling the truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ve trained their tongues to tell lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now they can’t tell the truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They pile wrong upon wrong, stack lie upon lie,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refuse to know me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Watch this! I’ll melt them down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see what they’re made of.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What else can I do
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a people this wicked?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their tongues are poison arrows!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deadly lies stream from their mouths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neighbor greets neighbor with a smile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Good morning! How’re things?’
- type: usfm
  marker: q2
  children:
  - type: text
    text: while scheming to do away with him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I’m going to stand around and do nothing?”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t you think I’ll take serious measures
- type: usfm
  marker: q2
  children:
  - type: text
    text: against a people like this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “I’m lamenting the loss of the mountain pastures.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m chanting dirges for the old grazing grounds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ve become deserted wastelands too dangerous for travelers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No sounds of sheep bleating or cattle mooing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Birds and wild animals, all gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nothing stirring, no sounds of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going to make Jerusalem a pile of rubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fit for nothing but stray cats and dogs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going to reduce Judah’s towns to piles of ruins
- type: usfm
  marker: q2
  children:
  - type: text
    text: where no one lives!”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I asked, “Is there anyone around bright enough to tell us what’s going on here? Anyone who has the inside story from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and can let us in on it?'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Why is the country wasted?
- type: usfm
  marker: p
  children:
  - type: text
    text: “Why no travelers in this desert?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s answer: “Because they abandoned my plain teaching. They wouldn’t listen to anything I said, refused to live the way I told them to. Instead they lived any way they wanted and took up with the Baal gods, who they thought would give them what they wanted—following the example of their parents.” And this is the consequence. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies says so:'
- type: usfm
  marker: p
  children:
  - type: text
    text: “I’ll feed them with pig slop.
- type: usfm
  marker: p
  children:
  - type: text
    text: “I’ll give them poison to drink.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Then I’ll scatter them far and wide among godless peoples that neither they nor their parents have ever heard of, and I’ll send Death in pursuit until there’s nothing left of them.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Life That Is All Outside but No Inside
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look over the trouble we’re in and call for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Send for some singers who can help us mourn our loss.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell them to hurry—
- type: usfm
  marker: q2
  children:
  - type: text
    text: to help us express our loss and lament,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Help us get our tears flowing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make tearful music of our crying.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Listen to that torrent of tears out of Zion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘We’re a ruined people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’re a shamed people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ve been driven from our homes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and must leave our land!’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'Mourning women! Oh, listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Open your ears. Take in what he says.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach your daughters songs for the dead
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your friends the songs of heartbreak.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Death has climbed in through the window,
- type: usfm
  marker: q2
  children:
  - type: text
    text: broken into our bedrooms.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Children on the playgrounds drop dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and young men and women collapse at their games.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Speak up! “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Dead bodies everywhere, scattered at random
- type: usfm
  marker: q2
  children:
  - type: text
    text: like sheep and goat dung in the fields,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like wheat cut down by reapers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and left to rot where it falls.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t let the wise brag of their wisdom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let heroes brag of their exploits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let the rich brag of their riches.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'If you brag, brag of this and this only:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you understand and know me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I’m '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and I act in loyal love.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I do what’s right and set things right and fair,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delight in those who do the same things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These are my trademarks.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: “Stay alert! It won’t be long now”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree!—“when I will personally deal with everyone whose life is all outside but no inside: Egypt, Judah, Edom, Ammon, Moab. All these nations are big on performance religion—including Israel, who is no better.”'
