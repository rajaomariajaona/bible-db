document_id: HOS.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Played at Religion with Toy Gods
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-9
  - type: text
    text: “When Israel was only a child, I loved him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I called out, ‘My son!’—called him out of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when others called him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he ran off and left me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He worshiped the popular sex gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he played at religion with toy gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, I stuck with him. I led Ephraim.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I rescued him from human bondage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he never acknowledged my help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never admitted that I was the one pulling his wagon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I lifted him, like a baby, to my cheek,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I bent down to feed him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now he wants to go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: back
  - type: text
    text: ' to Egypt or go over to Assyria—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: anything but return to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s why his cities are unsafe—the murder rate skyrockets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every plan to improve things falls to pieces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people are hell-bent on leaving me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They pray to god Baal for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He doesn’t lift a finger to help them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But how can I give up on you, Ephraim?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can I turn you loose, Israel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I leave you to be ruined like Admah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devastated like luckless Zeboim?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I can’t bear to even think such thoughts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My insides churn in protest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so I’m not going to act on my anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m not going to destroy Ephraim.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why? Because I am God and not a human.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m The Holy One and I’m here—in your very midst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: '“The people will end up following '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will roar like a lion—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, how I’ll roar!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My frightened children will come running from the west.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like frightened birds they’ll come from Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Assyria like scared doves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll move them back into their homes.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Word!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Soul-Destroying Lies
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim tells lies right and left.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not a word of Israel can be trusted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah, meanwhile, is no better,
- type: usfm
  marker: q2
  children:
  - type: text
    text: addicted to cheap gods.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
