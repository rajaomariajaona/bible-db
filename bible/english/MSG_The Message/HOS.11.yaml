document_id: HOS.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Played at Religion with Toy Gods
  - type: text
    content: “When Israel was only a child, I loved him.
  - type: text
    content: I called out, ‘My son!’—called him out of Egypt.
  - type: text
    content: But when others called him,
  - type: text
    content: he ran off and left me.
  - type: text
    content: He worshiped the popular sex gods,
  - type: text
    content: he played at religion with toy gods.
  - type: text
    content: Still, I stuck with him. I led Ephraim.
  - type: text
    content: I rescued him from human bondage,
  - type: text
    content: But he never acknowledged my help,
  - type: text
    content: never admitted that I was the one pulling his wagon,
  - type: text
    content: That I lifted him, like a baby, to my cheek,
  - type: text
    content: that I bent down to feed him.
  - type: text
    content: 'Now he wants to go '
  - type: text
    content: back
  - type: text
    content: ' to Egypt or go over to Assyria—'
  - type: text
    content: anything but return to me!
  - type: text
    content: That’s why his cities are unsafe—the murder rate skyrockets
  - type: text
    content: and every plan to improve things falls to pieces.
  - type: text
    content: My people are hell-bent on leaving me.
  - type: text
    content: They pray to god Baal for help.
  - type: text
    content: He doesn’t lift a finger to help them.
  - type: text
    content: But how can I give up on you, Ephraim?
  - type: text
    content: How can I turn you loose, Israel?
  - type: text
    content: How can I leave you to be ruined like Admah,
  - type: text
    content: devastated like luckless Zeboim?
  - type: text
    content: I can’t bear to even think such thoughts.
  - type: text
    content: My insides churn in protest.
  - type: text
    content: And so I’m not going to act on my anger.
  - type: text
    content: I’m not going to destroy Ephraim.
  - type: text
    content: And why? Because I am God and not a human.
  - type: text
    content: I’m The Holy One and I’m here—in your very midst.
  '10':
  - type: text
    content: '“The people will end up following '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I will roar like a lion—
  - type: text
    content: Oh, how I’ll roar!
  - type: text
    content: My frightened children will come running from the west.
  - type: text
    content: Like frightened birds they’ll come from Egypt,
  - type: text
    content: from Assyria like scared doves.
  - type: text
    content: I’ll move them back into their homes.”
  - type: text
    content: God
  - type: text
    content: ’s Word!
  - type: heading
    content: Soul-Destroying Lies
  - type: text
    content: Ephraim tells lies right and left.
  - type: text
    content: Not a word of Israel can be trusted.
  - type: text
    content: Judah, meanwhile, is no better,
  - type: text
    content: addicted to cheap gods.
