document_id: PSA.35
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Harass these hecklers, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: punch these bullies in the nose.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grab a weapon, anything at hand;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand up for me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get ready to throw the spear, aim the javelin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the people who are out to get me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reassure me; let me hear you say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’ll save you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: When those thugs try to knife me in the back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make them look foolish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frustrate all those
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are plotting my downfall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make them like cinders in a high wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel working the bellows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make their road lightless and mud-slick,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel on their tails.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of sheer cussedness they set a trap to catch me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for no good reason they dug a ditch to stop me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surprise them with your ambush—
- type: usfm
  marker: q2
  children:
  - type: text
    text: catch them in the very trap they set,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the disaster they planned for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: But let me run loose and free,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'celebrating '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s great work,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every bone in my body laughing, singing, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: there’s no one like you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put the down-and-out on their feet
- type: usfm
  marker: q2
  children:
  - type: text
    text: and protect the unprotected from bullies!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Hostile accusers appear out of nowhere,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they stand up and badger me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They pay me back misery for mercy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaving my soul empty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: When they were sick, I dressed in black;
- type: usfm
  marker: q2
  children:
  - type: text
    text: instead of eating, I prayed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My prayers were like lead in my gut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like I’d lost my best friend, my brother.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I paced, distraught as a motherless child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hunched and heavyhearted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: But when I was down
- type: usfm
  marker: q2
  children:
  - type: text
    text: they threw a party!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the nameless misfits of the town came
- type: usfm
  marker: q2
  children:
  - type: text
    text: chanting insults about me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like barbarians desecrating a shrine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they destroyed my reputation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', how long are you going'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to stand there doing nothing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me from their brutalities;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything I’ve got is being thrown to the lions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give you full credit
- type: usfm
  marker: q2
  children:
  - type: text
    text: when everyone gathers for worship;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the people turn out in force
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will say my Hallelujahs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: Don’t let these liars, my enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: have a party at my expense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who hate me for no reason,
- type: usfm
  marker: q2
  children:
  - type: text
    text: winking and rolling their eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No good is going to come
- type: usfm
  marker: q2
  children:
  - type: text
    text: from that crowd;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They spend all their time cooking up gossip
- type: usfm
  marker: q2
  children:
  - type: text
    text: against those who mind their own business.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They open their mouths
- type: usfm
  marker: q2
  children:
  - type: text
    text: in ugly grins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mocking, “Ha-ha, ha-ha, thought you’d get away with it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve caught you hands down!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Don’t you see what they’re doing, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re not going to let them
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get by with it, are you? Not going to walk off
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'without '
  - type: usfm
    marker: it
    children:
    - type: text
      text: doing
  - type: text
    text: ' something, are you?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: Please get up—wake up! Tend to my case.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My God, my Lord—my life is on the line.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do what you think is right, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but don’t make me pay for their good time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let them say to themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Ha-ha, we got what we wanted.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let them say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “We’ve chewed him up and spit him out.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let those who are being hilarious
- type: usfm
  marker: q2
  children:
  - type: text
    text: at my expense
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be made to look ridiculous.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make them wear donkey’s ears;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pin them with the donkey’s tail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who made themselves so high and mighty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: But those who want
- type: usfm
  marker: q2
  children:
  - type: text
    text: the best for me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them have the last word—a glad shout!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and say, over and over and over,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is great—everything works'
- type: usfm
  marker: q2
  children:
  - type: text
    text: together for good for his servant.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll tell the world how great and good you are,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll shout Hallelujah all day, every day.
