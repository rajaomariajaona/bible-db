document_id: PSA.35,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Harass these hecklers, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: punch these bullies in the nose.
  - type: text
    content: Grab a weapon, anything at hand;
  - type: text
    content: stand up for me!
  - type: text
    content: Get ready to throw the spear, aim the javelin,
  - type: text
    content: at the people who are out to get me.
  - type: text
    content: Reassure me; let me hear you say,
  - type: text
    content: “I’ll save you.”
  '11':
  - type: text
    content: Hostile accusers appear out of nowhere,
  - type: text
    content: they stand up and badger me.
  - type: text
    content: They pay me back misery for mercy,
  - type: text
    content: leaving my soul empty.
  '13':
  - type: text
    content: When they were sick, I dressed in black;
  - type: text
    content: instead of eating, I prayed.
  - type: text
    content: My prayers were like lead in my gut,
  - type: text
    content: like I’d lost my best friend, my brother.
  - type: text
    content: I paced, distraught as a motherless child,
  - type: text
    content: hunched and heavyhearted.
  '15':
  - type: text
    content: But when I was down
  - type: text
    content: they threw a party!
  - type: text
    content: All the nameless misfits of the town came
  - type: text
    content: chanting insults about me.
  - type: text
    content: Like barbarians desecrating a shrine,
  - type: text
    content: they destroyed my reputation.
  '17':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', how long are you going'
  - type: text
    content: to stand there doing nothing?
  - type: text
    content: Save me from their brutalities;
  - type: text
    content: everything I’ve got is being thrown to the lions.
  - type: text
    content: I will give you full credit
  - type: text
    content: when everyone gathers for worship;
  - type: text
    content: When the people turn out in force
  - type: text
    content: I will say my Hallelujahs.
  '19':
  - type: text
    content: Don’t let these liars, my enemies,
  - type: text
    content: have a party at my expense,
  - type: text
    content: Those who hate me for no reason,
  - type: text
    content: winking and rolling their eyes.
  - type: text
    content: No good is going to come
  - type: text
    content: from that crowd;
  - type: text
    content: They spend all their time cooking up gossip
  - type: text
    content: against those who mind their own business.
  - type: text
    content: They open their mouths
  - type: text
    content: in ugly grins,
  - type: text
    content: Mocking, “Ha-ha, ha-ha, thought you’d get away with it?
  - type: text
    content: We’ve caught you hands down!”
  '22':
  - type: text
    content: 'Don’t you see what they’re doing, '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: You’re not going to let them
  - type: text
    content: Get by with it, are you? Not going to walk off
  - type: text
    content: 'without '
  - type: text
    content: doing
  - type: text
    content: ' something, are you?'
  '23':
  - type: text
    content: Please get up—wake up! Tend to my case.
  - type: text
    content: My God, my Lord—my life is on the line.
  - type: text
    content: 'Do what you think is right, '
  - type: text
    content: God
  - type: text
    content: ', my God,'
  - type: text
    content: but don’t make me pay for their good time.
  - type: text
    content: Don’t let them say to themselves,
  - type: text
    content: “Ha-ha, we got what we wanted.”
  - type: text
    content: Don’t let them say,
  - type: text
    content: “We’ve chewed him up and spit him out.”
  - type: text
    content: Let those who are being hilarious
  - type: text
    content: at my expense
  - type: text
    content: Be made to look ridiculous.
  - type: text
    content: Make them wear donkey’s ears;
  - type: text
    content: Pin them with the donkey’s tail,
  - type: text
    content: who made themselves so high and mighty!
  '27':
  - type: text
    content: But those who want
  - type: text
    content: the best for me,
  - type: text
    content: Let them have the last word—a glad shout!—
  - type: text
    content: and say, over and over and over,
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' is great—everything works'
  - type: text
    content: together for good for his servant.”
  - type: text
    content: I’ll tell the world how great and good you are,
  - type: text
    content: I’ll shout Hallelujah all day, every day.
  '4':
  - type: text
    content: When those thugs try to knife me in the back,
  - type: text
    content: make them look foolish.
  - type: text
    content: Frustrate all those
  - type: text
    content: who are plotting my downfall.
  - type: text
    content: Make them like cinders in a high wind,
  - type: text
    content: 'with '
  - type: text
    content: God
  - type: text
    content: ’s angel working the bellows.
  - type: text
    content: Make their road lightless and mud-slick,
  - type: text
    content: 'with '
  - type: text
    content: God
  - type: text
    content: ’s angel on their tails.
  - type: text
    content: Out of sheer cussedness they set a trap to catch me;
  - type: text
    content: for no good reason they dug a ditch to stop me.
  - type: text
    content: Surprise them with your ambush—
  - type: text
    content: catch them in the very trap they set,
  - type: text
    content: the disaster they planned for me.
  '9':
  - type: text
    content: But let me run loose and free,
  - type: text
    content: 'celebrating '
  - type: text
    content: God
  - type: text
    content: ’s great work,
  - type: text
    content: Every bone in my body laughing, singing, “
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: there’s no one like you.
  - type: text
    content: You put the down-and-out on their feet
  - type: text
    content: and protect the unprotected from bullies!”
