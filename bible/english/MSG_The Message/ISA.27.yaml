document_id: ISA.27,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Selected Grain by Grain
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At that time '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will unsheathe his sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his merciless, massive, mighty sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll punish the serpent Leviathan as it flees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the serpent Leviathan thrashing in flight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll kill that old dragon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that lives in the sea.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At that time '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will thresh'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the River Euphrates to the Brook of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, people of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be selected grain by grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At that same time a great trumpet will be blown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calling home the exiles from Assyria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Welcoming home the refugees from Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to come and worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' on the holy mountain, Jerusalem.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At that same time, a fine vineyard will appear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s something to sing about!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', tend it.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I keep it well-watered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I keep careful watch over it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no one can damage it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m not angry. I care.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even if it gives me thistles and thornbushes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll just pull them out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let that vine cling to me for safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let it find a good and whole life with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let it hold on for a good and whole life.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days are coming when Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shall put down roots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel blossom and grow fresh branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill the world with its fruit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Has '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' knocked them to the ground'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he knocked down those who hit them? Oh, no.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Were they killed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as their killers were killed? Again, no.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was hard on them all right. The exile was a harsh sentence.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He blew them away on a fierce blast of wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the good news is that through this experience
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob’s guilt was taken away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The evidence that his sin is removed will be this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will tear down the alien altars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take them apart stone by stone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then crush the stones into gravel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clean out all the sex-and-religion shrines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there’s nothing left of that pretentious grandeur.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nobody lives there anymore. It’s unlivable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But animals do just fine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: browsing and bedding down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it’s not a bad place to get firewood.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dry twigs and dead branches are plentiful.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s the remains of a people with no sense of God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So, the God who made them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will have nothing to do with them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He who formed them will turn his back on them.
