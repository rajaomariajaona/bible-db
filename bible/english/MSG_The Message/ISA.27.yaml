document_id: ISA.27,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Selected Grain by Grain
  - type: text
    content: 'At that time '
  - type: text
    content: God
  - type: text
    content: ' will unsheathe his sword,'
  - type: text
    content: his merciless, massive, mighty sword.
  - type: text
    content: He’ll punish the serpent Leviathan as it flees,
  - type: text
    content: the serpent Leviathan thrashing in flight.
  - type: text
    content: He’ll kill that old dragon
  - type: text
    content: that lives in the sea.
  '12':
  - type: text
    content: 'At that time '
  - type: text
    content: God
  - type: text
    content: ' will thresh'
  - type: text
    content: from the River Euphrates to the Brook of Egypt,
  - type: text
    content: And you, people of Israel,
  - type: text
    content: will be selected grain by grain.
  - type: text
    content: At that same time a great trumpet will be blown,
  - type: text
    content: calling home the exiles from Assyria,
  - type: text
    content: Welcoming home the refugees from Egypt
  - type: text
    content: 'to come and worship '
  - type: text
    content: God
  - type: text
    content: ' on the holy mountain, Jerusalem.'
  '2':
  - type: text
    content: “At that same time, a fine vineyard will appear.
  - type: text
    content: There’s something to sing about!
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', tend it.'
  - type: text
    content: I keep it well-watered.
  - type: text
    content: I keep careful watch over it
  - type: text
    content: so that no one can damage it.
  - type: text
    content: I’m not angry. I care.
  - type: text
    content: Even if it gives me thistles and thornbushes,
  - type: text
    content: I’ll just pull them out
  - type: text
    content: and burn them up.
  - type: text
    content: Let that vine cling to me for safety,
  - type: text
    content: let it find a good and whole life with me,
  - type: text
    content: let it hold on for a good and whole life.”
  '6':
  - type: text
    content: The days are coming when Jacob
  - type: text
    content: shall put down roots,
  - type: text
    content: Israel blossom and grow fresh branches,
  - type: text
    content: and fill the world with its fruit.
  '7':
  - type: text
    content: 'Has '
  - type: text
    content: God
  - type: text
    content: ' knocked them to the ground'
  - type: text
    content: as he knocked down those who hit them? Oh, no.
  - type: text
    content: Were they killed
  - type: text
    content: as their killers were killed? Again, no.
  - type: text
    content: He was hard on them all right. The exile was a harsh sentence.
  - type: text
    content: He blew them away on a fierce blast of wind.
  - type: text
    content: But the good news is that through this experience
  - type: text
    content: Jacob’s guilt was taken away.
  - type: text
    content: 'The evidence that his sin is removed will be this:'
  - type: text
    content: He will tear down the alien altars,
  - type: text
    content: take them apart stone by stone,
  - type: text
    content: And then crush the stones into gravel
  - type: text
    content: and clean out all the sex-and-religion shrines.
  - type: text
    content: For there’s nothing left of that pretentious grandeur.
  - type: text
    content: Nobody lives there anymore. It’s unlivable.
  - type: text
    content: But animals do just fine,
  - type: text
    content: browsing and bedding down.
  - type: text
    content: And it’s not a bad place to get firewood.
  - type: text
    content: Dry twigs and dead branches are plentiful.
  - type: text
    content: It’s the remains of a people with no sense of God.
  - type: text
    content: So, the God who made them
  - type: text
    content: Will have nothing to do with them.
  - type: text
    content: He who formed them will turn his back on them.
