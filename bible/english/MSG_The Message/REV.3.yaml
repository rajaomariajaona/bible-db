document_id: REV.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Sardis
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Write this to Sardis, to the Angel of the church. The One holding the Seven Spirits of God in one hand, a firm grip on the Seven Stars with the other, speaks:'
- type: usfm
  marker: p
  children:
  - type: text
    text: “I see right through your work. You have a reputation for vigor and zest, but you’re dead, stone-dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“Up on your feet! Take a deep breath! Maybe there’s life in you yet. But I wouldn’t know it by looking at your busywork; nothing of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' work has been completed. Your condition is desperate. Think of the gift you once had in your hands, the Message you heard with your ears—grasp it again and turn back to God.'
- type: usfm
  marker: p
  children:
  - type: text
    text: “If you pull the covers back over your head and sleep on, oblivious to God, I’ll return when you least expect it, break into your life like a thief in the night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “You still have a few followers of Jesus in Sardis who haven’t ruined themselves wallowing in the muck of the world’s ways. They’ll walk with me on parade! They’ve proved their worth!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Conquerors will march in the victory parade, their names indelible in the Book of Life. I’ll lead them up and present them by name to my Father and his Angels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Are your ears awake? Listen. Listen to the Wind Words, the Spirit blowing through the churches.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Philadelphia
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Write this to Philadelphia, to the Angel of the church. The Holy, the True—David’s key in his hand, opening doors no one can lock, locking doors no one can open—speaks:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“I see what you’ve done. Now see what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I’ve
  - type: text
    text: ' done. I’ve opened a door before you that no one can slam shut. You don’t have much strength, I know that; you used what you had to keep my Word. You didn’t deny me when times were rough.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “And watch as I take those who call themselves true believers but are nothing of the kind, pretenders whose true membership is in the club of Satan—watch as I strip off their pretensions and they’re forced to acknowledge it’s you that I’ve loved.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Because you kept my Word in passionate patience, I’ll keep you safe in the time of testing that will be here soon, and all over the earth, every man, woman, and child put to the test.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I’m on my way; I’ll be there soon. Keep a tight grip on what you have so no one distracts you and steals your crown.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“I’ll make each conqueror a pillar in the sanctuary of my God, a permanent position of honor. Then I’ll write names on you, the pillars: the Name of my God, the Name of God’s City—the new Jerusalem coming down out of Heaven—and my new Name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Are your ears awake? Listen. Listen to the Wind Words, the Spirit blowing through the churches.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Laodicea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Write to Laodicea, to the Angel of the church. God’s Yes, the Faithful and Accurate Witness, the First of God’s creation, says:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: “I know you inside and out, and find little to my liking. You’re not cold, you’re not hot—far better to be either cold or hot! You’re stale. You’re stagnant. You make me want to vomit. You brag, ‘I’m rich, I’ve got it made, I need nothing from anyone,’ oblivious that in fact you’re a pitiful, blind beggar, threadbare and homeless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Here’s what I want you to do: Buy your gold from me, gold that’s been through the refiner’s fire. Then you’ll be rich. Buy your clothes from me, clothes designed in Heaven. You’ve gone around half-naked long enough. And buy medicine for your eyes from me so you can see, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: really
  - type: text
    text: ' see.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “The people I love, I call to account—prod and correct and guide so that they’ll live at their best. Up on your feet, then! About face! Run after God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: “Look at me. I stand at the door. I knock. If you hear me call and open the door, I’ll come right in and sit down to supper with you. Conquerors will sit alongside me at the head table, just as I, having conquered, took the place of honor at the side of my Father. That’s my gift to the conquerors!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Are your ears awake? Listen. Listen to the Wind Words, the Spirit blowing through the churches.”
