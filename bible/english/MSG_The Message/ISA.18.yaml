document_id: ISA.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: People Mighty and Merciless
  - type: text
    content: Doom to the land of flies and mosquitoes
  - type: text
    content: beyond the Ethiopian rivers,
  - type: text
    content: Shipping emissaries all over the world,
  - type: text
    content: down rivers and across seas.
  - type: text
    content: Go, swift messengers,
  - type: text
    content: go to this people tall and handsome,
  - type: text
    content: This people held in respect everywhere,
  - type: text
    content: this people mighty and merciless,
  - type: text
    content: from the land crisscrossed with rivers.
  '3':
  - type: text
    content: Everybody everywhere,
  - type: text
    content: 'all earth-dwellers:'
  - type: text
    content: When you see a flag flying on the mountain, look!
  - type: text
    content: When you hear the trumpet blown, listen!
  '4':
  - type: text
    content: 'For here’s what '
  - type: text
    content: God
  - type: text
    content: ' told me:'
  - type: text
    content: “I’m not going to say anything,
  - type: text
    content: but simply look on from where I live,
  - type: text
    content: Quiet as warmth that comes from the sun,
  - type: text
    content: silent as dew during harvest.”
  - type: text
    content: And then, just before harvest, after the blossom
  - type: text
    content: has turned into a maturing grape,
  - type: text
    content: He’ll step in and prune back the new shoots,
  - type: text
    content: ruthlessly hack off all the growing branches.
  - type: text
    content: He’ll leave them piled on the ground
  - type: text
    content: for birds and animals to feed on—
  - type: text
    content: Fodder for the summering birds,
  - type: text
    content: fodder for the wintering animals.
  '7':
  - type: text
    content: 'Then tribute will be brought to '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: brought from this people tall and handsome,
  - type: text
    content: This people once held in respect everywhere,
  - type: text
    content: this people once mighty and merciless,
  - type: text
    content: From the land crisscrossed with rivers,
  - type: text
    content: 'to Mount Zion, '
  - type: text
    content: God
  - type: text
    content: ’s place.
