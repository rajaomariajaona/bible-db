document_id: ISA.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: People Mighty and Merciless
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom to the land of flies and mosquitoes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beyond the Ethiopian rivers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shipping emissaries all over the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down rivers and across seas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go, swift messengers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go to this people tall and handsome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This people held in respect everywhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this people mighty and merciless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the land crisscrossed with rivers.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everybody everywhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'all earth-dwellers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you see a flag flying on the mountain, look!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When you hear the trumpet blown, listen!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For here’s what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m not going to say anything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but simply look on from where I live,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiet as warmth that comes from the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: silent as dew during harvest.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then, just before harvest, after the blossom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has turned into a maturing grape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll step in and prune back the new shoots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ruthlessly hack off all the growing branches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll leave them piled on the ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for birds and animals to feed on—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fodder for the summering birds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fodder for the wintering animals.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then tribute will be brought to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brought from this people tall and handsome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This people once held in respect everywhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this people once mighty and merciless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the land crisscrossed with rivers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to Mount Zion, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s place.
