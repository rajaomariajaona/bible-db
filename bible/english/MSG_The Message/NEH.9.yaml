document_id: NEH.9,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then on the twenty-fourth day of this month, the People of Israel gathered for a fast, wearing burlap and faces smudged with dirt as signs of repentance. The Israelites broke off all relations with foreigners, stood up, and confessed their sins and the iniquities of their parents. While they stood there in their places, they read from the Book of The Revelation of '
  - type: text
    content: God
  - type: text
    content: ', their God, for a quarter of the day. For another quarter of the day they confessed and worshiped their '
  - type: text
    content: God
  - type: text
    content: .
  '16':
  - type: text
    content: But they, our ancestors, were arrogant;
  - type: text
    content: bullheaded, they wouldn’t obey your commands.
  - type: text
    content: They turned a deaf ear, they refused
  - type: text
    content: to remember the miracles you had done for them;
  - type: text
    content: They turned stubborn, got it into their heads
  - type: text
    content: to return to their Egyptian slavery.
  - type: text
    content: And you, a forgiving God,
  - type: text
    content: gracious and compassionate,
  - type: text
    content: Incredibly patient, with tons of love—
  - type: text
    content: you didn’t dump them.
  - type: text
    content: Yes, even when they cast a sculpted calf
  - type: text
    content: and said, “This is your god
  - type: text
    content: Who brought you out of Egypt,”
  - type: text
    content: and continued from bad to worse,
  - type: text
    content: You in your amazing compassion
  - type: text
    content: didn’t walk off and leave them in the desert.
  - type: text
    content: The Pillar of Cloud didn’t leave them;
  - type: text
    content: daily it continued to show them their route;
  - type: text
    content: The Pillar of Fire did the same by night,
  - type: text
    content: showed them the right way to go.
  '20':
  - type: text
    content: You gave them your good Spirit
  - type: text
    content: to teach them to live wisely.
  - type: text
    content: You were never miserly with your manna,
  - type: text
    content: gave them plenty of water to drink.
  - type: text
    content: You supported them forty years in that desert;
  - type: text
    content: they had everything they needed;
  - type: text
    content: Their clothes didn’t wear out
  - type: text
    content: and their feet never blistered.
  - type: text
    content: You gave them kingdoms and peoples,
  - type: text
    content: establishing generous boundaries.
  - type: text
    content: They took over the country of Sihon king of Heshbon
  - type: text
    content: and the country of Og king of Bashan.
  - type: text
    content: You multiplied children for them,
  - type: text
    content: rivaling the stars in the night skies,
  - type: text
    content: And you brought them into the land
  - type: text
    content: that you promised their ancestors
  - type: text
    content: they would get and own.
  '24':
  - type: text
    content: Well, they entered all right,
  - type: text
    content: they took it and settled in.
  - type: text
    content: The Canaanites who lived there
  - type: text
    content: you brought to their knees before them.
  - type: text
    content: You turned over their land, kings, and peoples
  - type: text
    content: to do with as they pleased.
  - type: text
    content: They took strong cities and fertile fields,
  - type: text
    content: they took over well-furnished houses,
  - type: text
    content: Cisterns, vineyards, olive groves,
  - type: text
    content: and lush, extensive orchards.
  - type: text
    content: And they ate, grew fat on the fat of the land;
  - type: text
    content: they reveled in your bountiful goodness.
  '26':
  - type: text
    content: But then they mutinied, rebelled against you,
  - type: text
    content: threw out your laws and killed your prophets,
  - type: text
    content: The very prophets who tried to get them back on your side—
  - type: text
    content: and then things went from bad to worse.
  - type: text
    content: You turned them over to their enemies,
  - type: text
    content: who made life rough for them.
  - type: text
    content: But when they called out for help in their troubles
  - type: text
    content: you listened from heaven;
  - type: text
    content: And in keeping with your bottomless compassion
  - type: text
    content: 'you gave them saviors:'
  - type: text
    content: Saviors who saved them
  - type: text
    content: from the cruel abuse of their enemies.
  - type: text
    content: But as soon as they had it easy again
  - type: text
    content: they were right back at it—more evil.
  - type: text
    content: So you turned away and left them again to their fate,
  - type: text
    content: to the enemies who came right back.
  - type: text
    content: They cried out to you again; in your great compassion
  - type: text
    content: you heard and helped them again.
  - type: text
    content: This went on over and over and over.
  - type: text
    content: You warned them to return to your Revelation,
  - type: text
    content: 'they responded with haughty arrogance:'
  - type: text
    content: They brushed off your commands, spurned your rules
  - type: text
    content: —the very words by which men and women live!
  - type: text
    content: They set their jaws in defiance,
  - type: text
    content: they turned their backs on you and didn’t listen.
  - type: text
    content: You put up with them year after year
  - type: text
    content: and warned them by your spirit through your prophets;
  - type: text
    content: But when they refused to listen
  - type: text
    content: you abandoned them to foreigners.
  - type: text
    content: Still, because of your great compassion,
  - type: text
    content: you didn’t make a total end to them.
  - type: text
    content: You didn’t walk out and leave them for good;
  - type: text
    content: 'yes, you '
  - type: text
    content: are
  - type: text
    content: ' a God of grace and compassion.'
  '32':
  - type: text
    content: And now, our God, the great God,
  - type: text
    content: God majestic and terrible, loyal in covenant and love,
  - type: text
    content: Don’t treat lightly the trouble that has come to us,
  - type: text
    content: to our kings and princes, our priests and prophets,
  - type: text
    content: Our ancestors, and all your people from the time
  - type: text
    content: of the Assyrian kings right down to today.
  - type: text
    content: You are not to blame
  - type: text
    content: for all that has come down on us;
  - type: text
    content: You did everything right,
  - type: text
    content: we did everything wrong.
  - type: text
    content: None of our kings, princes, priests, or ancestors
  - type: text
    content: followed your Revelation;
  - type: text
    content: They ignored your commands,
  - type: text
    content: dismissed the warnings you gave them.
  - type: text
    content: Even when they had their own kingdom
  - type: text
    content: and were enjoying your generous goodness,
  - type: text
    content: Living in that spacious and fertile land
  - type: text
    content: that you spread out before them,
  - type: text
    content: They didn’t serve you
  - type: text
    content: or turn their backs on the practice of evil.
  - type: text
    content: And here we are, slaves again today;
  - type: text
    content: and here’s the land you gave our ancestors
  - type: text
    content: So they could eat well and enjoy a good life,
  - type: text
    content: and now look at us—no better than slaves on this land.
  - type: text
    content: Its wonderful crops go to the kings
  - type: text
    content: you put over us because of our sins;
  - type: text
    content: They act like they own our bodies
  - type: text
    content: and do whatever they like with our cattle.
  - type: text
    content: We’re in deep trouble.
  '38':
  - type: text
    content: “Because of all this we are drawing up a binding pledge, a sealed document signed by our princes, our Levites, and our priests.”
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: ' A group of Levites—Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Kenani—stood on the platform and cried out to '
  - type: text
    content: God
  - type: text
    content: ', their God, in a loud voice. The Levites Jeshua, Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah said, “On your feet! Bless '
  - type: text
    content: God
  - type: text
    content: ', your God, for ever and ever!”'
  '5':
  - type: text
    content: ' Blessed be your glorious name,'
  - type: text
    content: exalted above all blessing and praise!
  - type: text
    content: You’re the one,
  - type: text
    content: God
  - type: text
    content: ', you alone;'
  - type: text
    content: You made the heavens,
  - type: text
    content: the heavens of heavens, and all angels;
  - type: text
    content: The earth and everything on it,
  - type: text
    content: the seas and everything in them;
  - type: text
    content: You keep them all alive;
  - type: text
    content: heaven’s angels worship you!
  '7':
  - type: text
    content: 'You’re the one, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the
  - type: text
    content: ' God'
  - type: text
    content: who chose Abram
  - type: text
    content: And brought him from Ur of the Chaldees
  - type: text
    content: and changed his name to Abraham.
  - type: text
    content: You found his heart to be steady and true to you
  - type: text
    content: and signed a covenant with him,
  - type: text
    content: A covenant to give him the land of the Canaanites,
  - type: text
    content: the Hittites, and the Amorites,
  - type: text
    content: The Perizzites, Jebusites, and Girgashites,
  - type: text
    content: —to give it to his descendants.
  - type: text
    content: And you kept your word
  - type: text
    content: because you are righteous.
  '9':
  - type: text
    content: You saw the anguish of our parents in Egypt.
  - type: text
    content: You heard their cries at the Red Sea;
  - type: text
    content: You amazed Pharaoh, his servants, and the people of his land
  - type: text
    content: with wonders and miracle-signs.
  - type: text
    content: You knew their bullying arrogance against your people;
  - type: text
    content: you made a name for yourself that lasts to this day.
  - type: text
    content: You split the sea before them;
  - type: text
    content: they crossed through and never got their feet wet;
  - type: text
    content: You pitched their pursuers into the deep;
  - type: text
    content: they sank like a rock in the storm-tossed sea.
  - type: text
    content: By day you led them with a Pillar of Cloud,
  - type: text
    content: and by night with a Pillar of Fire
  - type: text
    content: To show them the way
  - type: text
    content: they were to travel.
  - type: text
    content: You came down onto Mount Sinai,
  - type: text
    content: you spoke to them out of heaven;
  - type: text
    content: You gave them instructions on how to live well,
  - type: text
    content: true teaching, sound rules and commands;
  - type: text
    content: You introduced them
  - type: text
    content: to your Holy Sabbath;
  - type: text
    content: Through your servant Moses you decreed
  - type: text
    content: commands, rules, and instruction.
  - type: text
    content: You gave bread from heaven for their hunger,
  - type: text
    content: you sent water from the rock for their thirst.
  - type: text
    content: You told them to enter and take the land,
  - type: text
    content: which you promised to give them.
