document_id: NEH.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then on the twenty-fourth day of this month, the People of Israel gathered for a fast, wearing burlap and faces smudged with dirt as signs of repentance. The Israelites broke off all relations with foreigners, stood up, and confessed their sins and the iniquities of their parents. While they stood there in their places, they read from the Book of The Revelation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', their God, for a quarter of the day. For another quarter of the day they confessed and worshiped their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they, our ancestors, were arrogant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bullheaded, they wouldn’t obey your commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They turned a deaf ear, they refused
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to remember the miracles you had done for them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They turned stubborn, got it into their heads
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to return to their Egyptian slavery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, a forgiving God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gracious and compassionate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incredibly patient, with tons of love—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you didn’t dump them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, even when they cast a sculpted calf
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and said, “This is your god
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who brought you out of Egypt,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and continued from bad to worse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You in your amazing compassion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: didn’t walk off and leave them in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Pillar of Cloud didn’t leave them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: daily it continued to show them their route;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Pillar of Fire did the same by night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: showed them the right way to go.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave them your good Spirit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to teach them to live wisely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were never miserly with your manna,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave them plenty of water to drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You supported them forty years in that desert;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they had everything they needed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their clothes didn’t wear out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their feet never blistered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave them kingdoms and peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: establishing generous boundaries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They took over the country of Sihon king of Heshbon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the country of Og king of Bashan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You multiplied children for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rivaling the stars in the night skies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you brought them into the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you promised their ancestors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they would get and own.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, they entered all right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they took it and settled in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Canaanites who lived there
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you brought to their knees before them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turned over their land, kings, and peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do with as they pleased.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They took strong cities and fertile fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they took over well-furnished houses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cisterns, vineyards, olive groves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lush, extensive orchards.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they ate, grew fat on the fat of the land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they reveled in your bountiful goodness.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But then they mutinied, rebelled against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: threw out your laws and killed your prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The very prophets who tried to get them back on your side—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then things went from bad to worse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turned them over to their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who made life rough for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they called out for help in their troubles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you listened from heaven;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in keeping with your bottomless compassion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you gave them saviors:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saviors who saved them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the cruel abuse of their enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as soon as they had it easy again
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were right back at it—more evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you turned away and left them again to their fate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the enemies who came right back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cried out to you again; in your great compassion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you heard and helped them again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This went on over and over and over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You warned them to return to your Revelation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they responded with haughty arrogance:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They brushed off your commands, spurned your rules
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —the very words by which men and women live!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set their jaws in defiance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they turned their backs on you and didn’t listen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You put up with them year after year
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and warned them by your spirit through your prophets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they refused to listen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you abandoned them to foreigners.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Still, because of your great compassion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you didn’t make a total end to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You didn’t walk out and leave them for good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'yes, you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a God of grace and compassion.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now, our God, the great God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God majestic and terrible, loyal in covenant and love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t treat lightly the trouble that has come to us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to our kings and princes, our priests and prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our ancestors, and all your people from the time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the Assyrian kings right down to today.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are not to blame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all that has come down on us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You did everything right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we did everything wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: None of our kings, princes, priests, or ancestors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: followed your Revelation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ignored your commands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dismissed the warnings you gave them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when they had their own kingdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and were enjoying your generous goodness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Living in that spacious and fertile land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you spread out before them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They didn’t serve you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or turn their backs on the practice of evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And here we are, slaves again today;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and here’s the land you gave our ancestors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they could eat well and enjoy a good life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now look at us—no better than slaves on this land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its wonderful crops go to the kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you put over us because of our sins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They act like they own our bodies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do whatever they like with our cattle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’re in deep trouble.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Because of all this we are drawing up a binding pledge, a sealed document signed by our princes, our Levites, and our priests.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A group of Levites—Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Kenani—stood on the platform and cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', their God, in a loud voice. The Levites Jeshua, Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah said, “On your feet! Bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, for ever and ever!”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' Blessed be your glorious name,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exalted above all blessing and praise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re the one,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you alone;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the heavens of heavens, and all angels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth and everything on it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the seas and everything in them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You keep them all alive;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heaven’s angels worship you!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’re the one, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who chose Abram
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brought him from Ur of the Chaldees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and changed his name to Abraham.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You found his heart to be steady and true to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and signed a covenant with him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A covenant to give him the land of the Canaanites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Hittites, and the Amorites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Perizzites, Jebusites, and Girgashites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —to give it to his descendants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you kept your word
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you are righteous.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You saw the anguish of our parents in Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You heard their cries at the Red Sea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You amazed Pharaoh, his servants, and the people of his land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with wonders and miracle-signs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You knew their bullying arrogance against your people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made a name for yourself that lasts to this day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You split the sea before them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they crossed through and never got their feet wet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You pitched their pursuers into the deep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sank like a rock in the storm-tossed sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By day you led them with a Pillar of Cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by night with a Pillar of Fire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To show them the way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were to travel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came down onto Mount Sinai,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you spoke to them out of heaven;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave them instructions on how to live well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: true teaching, sound rules and commands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You introduced them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your Holy Sabbath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through your servant Moses you decreed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: commands, rules, and instruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave bread from heaven for their hunger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you sent water from the rock for their thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You told them to enter and take the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which you promised to give them.
