  '1':
  - type: heading
    content: Elihu Speaks
  - type: heading
    content: God’s Spirit Makes Wisdom Possible
  - type: text
    content: Job’s three friends now fell silent. They were talked out, stymied because Job wouldn’t budge an inch—wouldn’t admit to an ounce of guilt. Then Elihu lost his temper. (Elihu was the son of Barakel the Buzite from the clan of Ram.) He blazed out in anger against Job for pitting his righteousness against God’s. He was also angry with the three friends because they had neither come up with an answer nor proved Job wrong. Elihu had waited with Job while they spoke because they were all older than he. But when he saw that the three other men had exhausted their arguments, he exploded with pent-up anger.
  '11':
  - type: text
    content: “I hung on your words while you spoke,
  - type: text
    content: listened carefully to your arguments.
  - type: text
    content: While you searched for the right words,
  - type: text
    content: I was all ears.
  - type: text
    content: And now what have you proved? Nothing.
  - type: text
    content: Nothing you say has even touched Job.
  - type: text
    content: And don’t excuse yourselves by saying, ‘We’ve done our best.
  - type: text
    content: Now it’s up to God to talk sense into him.’
  - type: text
    content: Job has yet to contend with me.
  - type: text
    content: 'And rest assured, I won’t be using '
  - type: text
    content: your
  - type: text
    content: ' arguments!'
  '15':
  - type: text
    content: “Do you three have nothing else to say?
  - type: text
    content: 'Of '
  - type: text
    content: course
  - type: text
    content: ' you don’t! You’re total frauds!'
  - type: text
    content: Why should I wait any longer,
  - type: text
    content: now that you’re stopped dead in your tracks?
  - type: text
    content: I’m ready to speak my piece. That’s right!
  - type: text
    content: It’s my turn—and it’s about time!
  - type: text
    content: I’ve got a lot to say,
  - type: text
    content: and I’m bursting to say it.
  - type: text
    content: The pressure has built up, like lava beneath the earth.
  - type: text
    content: I’m a volcano ready to blow.
  - type: text
    content: 'I '
  - type: text
    content: have
  - type: text
    content: ' to speak—I have no choice.'
  - type: text
    content: I have to say what’s on my heart,
  - type: text
    content: And I’m going to say it straight—
  - type: text
    content: the truth, the whole truth, and nothing but the truth.
  - type: text
    content: I was never any good at bootlicking;
  - type: text
    content: my Maker would make short work of me if I started in now!”
  '6':
  - type: text
    content: 'This is what Elihu, son of Barakel the Buzite, said:'
  - type: text
    content: “I’m a young man,
  - type: text
    content: and you are all old and experienced.
  - type: text
    content: That’s why I kept quiet
  - type: text
    content: and held back from joining the discussion.
  - type: text
    content: I kept thinking, ‘Experience will tell.
  - type: text
    content: The longer you live, the wiser you become.’
  - type: text
    content: But I see I was wrong—it’s God’s Spirit in a person,
  - type: text
    content: the breath of the Almighty One, that makes wise human insight possible.
  - type: text
    content: The experts have no corner on wisdom;
  - type: text
    content: getting old doesn’t guarantee good sense.
  - type: text
    content: So I’ve decided to speak up. Listen well!
  - type: text
    content: I’m going to tell you exactly what I think.
