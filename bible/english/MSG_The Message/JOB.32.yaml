    - type: text
      text: Elihu Speaks
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: God’s Spirit Makes Wisdom Possible
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: Job’s three friends now fell silent. They were talked out, stymied because Job wouldn’t budge an inch—wouldn’t admit to an ounce of guilt. Then Elihu lost his temper. (Elihu was the son of Barakel the Buzite from the clan of Ram.) He blazed out in anger against Job for pitting his righteousness against God’s. He was also angry with the three friends because they had neither come up with an answer nor proved Job wrong. Elihu had waited with Job while they spoke because they were all older than he. But when he saw that the three other men had exhausted their arguments, he exploded with pent-up anger.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-14
    - type: text
      text: “I hung on your words while you spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listened carefully to your arguments.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While you searched for the right words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was all ears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now what have you proved? Nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing you say has even touched Job.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t excuse yourselves by saying, ‘We’ve done our best.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now it’s up to God to talk sense into him.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Job has yet to contend with me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And rest assured, I won’t be using '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' arguments!'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-22
    - type: text
      text: “Do you three have nothing else to say?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: course
    - type: text
      text: ' you don’t! You’re total frauds!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should I wait any longer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now that you’re stopped dead in your tracks?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m ready to speak my piece. That’s right!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s my turn—and it’s about time!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve got a lot to say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m bursting to say it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pressure has built up, like lava beneath the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m a volcano ready to blow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' to speak—I have no choice.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have to say what’s on my heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’m going to say it straight—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the truth, the whole truth, and nothing but the truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was never any good at bootlicking;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Maker would make short work of me if I started in now!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: 'This is what Elihu, son of Barakel the Buzite, said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m a young man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you are all old and experienced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I kept quiet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and held back from joining the discussion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I kept thinking, ‘Experience will tell.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The longer you live, the wiser you become.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I see I was wrong—it’s God’s Spirit in a person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the breath of the Almighty One, that makes wise human insight possible.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The experts have no corner on wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: getting old doesn’t guarantee good sense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I’ve decided to speak up. Listen well!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m going to tell you exactly what I think.
