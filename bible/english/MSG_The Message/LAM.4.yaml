document_id: LAM.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Waking Up with Nothing
  - type: text
    content: Oh, oh, oh . . . 
  - type: text
    content: How gold is treated like dirt,
  - type: text
    content: the finest gold thrown out with the garbage,
  - type: text
    content: Priceless jewels scattered all over,
  - type: text
    content: jewels loose in the gutters.
  '10':
  - type: text
    content: Nice and kindly women
  - type: text
    content: boiled their own children for supper.
  - type: text
    content: This was the only food in town
  - type: text
    content: when my dear people were broken.
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' let all his anger loose, held nothing back.'
  - type: text
    content: He poured out his raging wrath.
  - type: text
    content: He set a fire in Zion
  - type: text
    content: that burned it to the ground.
  '12':
  - type: text
    content: The kings of the earth couldn’t believe it.
  - type: text
    content: World rulers were in shock,
  - type: text
    content: Watching old enemies march in big as you please,
  - type: text
    content: right through Jerusalem’s gates.
  '13':
  - type: text
    content: Because of the sins of her prophets
  - type: text
    content: and the evil of her priests,
  - type: text
    content: Who exploited good and trusting people,
  - type: text
    content: robbing them of their lives,
  '14':
  - type: text
    content: These prophets and priests blindly grope their way through the streets,
  - type: text
    content: grimy and stained from their dirty lives,
  - type: text
    content: Wasted by their wasted lives,
  - type: text
    content: shuffling from fatigue, dressed in rags.
  '15':
  - type: text
    content: People yell at them, “Get out of here, dirty old men!
  - type: text
    content: Get lost, don’t touch us, don’t infect us!”
  - type: text
    content: They have to leave town. They wander off.
  - type: text
    content: Nobody wants them to stay here.
  - type: text
    content: Everyone knows, wherever they wander,
  - type: text
    content: that they’ve been kicked out of their own hometown.
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' himself scattered them.'
  - type: text
    content: No longer does he look out for them.
  - type: text
    content: He has nothing to do with the priests;
  - type: text
    content: he cares nothing for the elders.
  '17':
  - type: text
    content: We watched and watched,
  - type: text
    content: wore our eyes out looking for help. And nothing.
  - type: text
    content: We mounted our lookouts and looked
  - type: text
    content: for the help that never showed up.
  '18':
  - type: text
    content: They tracked us down, those hunters.
  - type: text
    content: It wasn’t safe to go out in the street.
  - type: text
    content: Our end was near, our days numbered.
  - type: text
    content: We were doomed.
  '19':
  - type: text
    content: They came after us faster than eagles in flight,
  - type: text
    content: pressed us hard in the mountains, ambushed us in the desert.
  '2':
  - type: text
    content: And the people of Zion, once prized,
  - type: text
    content: far surpassing their weight in gold,
  - type: text
    content: Are now treated like cheap pottery,
  - type: text
    content: like everyday pots and bowls mass-produced by a potter.
  '20':
  - type: text
    content: 'Our king, our life’s breath, the anointed of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: was caught in their traps—
  - type: text
    content: Our king under whose protection
  - type: text
    content: we always said we’d live.
  '21':
  - type: text
    content: Celebrate while you can, O Edom!
  - type: text
    content: Live it up in Uz!
  - type: text
    content: For it won’t be long before you drink this cup, too.
  - type: text
    content: You’ll find out what it’s like to drink God’s wrath,
  - type: text
    content: Get drunk on God’s wrath
  - type: text
    content: and wake up with nothing, stripped naked.
  '22':
  - type: text
    content: And that’s it for you, Zion. The punishment’s complete.
  - type: text
    content: You won’t have to go through this exile again.
  - type: text
    content: 'But Edom, your time is coming:'
  - type: text
    content: He’ll punish your evil life, put all your sins on display.
  '3':
  - type: text
    content: Even wild jackals nurture their babies,
  - type: text
    content: give them their breasts to suckle.
  - type: text
    content: But my people have turned cruel to their babies,
  - type: text
    content: like an ostrich in the wilderness.
  '4':
  - type: text
    content: Babies have nothing to drink.
  - type: text
    content: Their tongues stick to the roofs of their mouths.
  - type: text
    content: Little children ask for bread
  - type: text
    content: but no one gives them so much as a crust.
  '5':
  - type: text
    content: People used to the finest cuisine
  - type: text
    content: forage for food in the streets.
  - type: text
    content: People used to the latest in fashions
  - type: text
    content: pick through the trash for something to wear.
  '6':
  - type: text
    content: The evil guilt of my dear people
  - type: text
    content: was worse than the sin of Sodom—
  - type: text
    content: The city was destroyed in a flash,
  - type: text
    content: and no one around to help.
  '7':
  - type: text
    content: The splendid and sacred nobles
  - type: text
    content: once glowed with health.
  - type: text
    content: Their bodies were robust and ruddy,
  - type: text
    content: their beards like carved stone.
  '8':
  - type: text
    content: But now they are smeared with soot,
  - type: text
    content: unrecognizable in the street,
  - type: text
    content: Their bones sticking out,
  - type: text
    content: their skin dried out like old leather.
  '9':
  - type: text
    content: Better to have been killed in battle
  - type: text
    content: than killed by starvation.
  - type: text
    content: Better to have died of battle wounds
  - type: text
    content: than to slowly starve to death.
