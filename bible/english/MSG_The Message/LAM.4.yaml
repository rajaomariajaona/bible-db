document_id: LAM.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Waking Up with Nothing
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oh, oh, oh . . . 
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How gold is treated like dirt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the finest gold thrown out with the garbage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Priceless jewels scattered all over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: jewels loose in the gutters.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nice and kindly women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: boiled their own children for supper.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This was the only food in town
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when my dear people were broken.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' let all his anger loose, held nothing back.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He poured out his raging wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He set a fire in Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that burned it to the ground.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The kings of the earth couldn’t believe it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: World rulers were in shock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watching old enemies march in big as you please,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right through Jerusalem’s gates.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Because of the sins of her prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the evil of her priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who exploited good and trusting people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: robbing them of their lives,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: These prophets and priests blindly grope their way through the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grimy and stained from their dirty lives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wasted by their wasted lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shuffling from fatigue, dressed in rags.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: People yell at them, “Get out of here, dirty old men!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get lost, don’t touch us, don’t infect us!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have to leave town. They wander off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nobody wants them to stay here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone knows, wherever they wander,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they’ve been kicked out of their own hometown.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' himself scattered them.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No longer does he look out for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has nothing to do with the priests;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he cares nothing for the elders.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: We watched and watched,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wore our eyes out looking for help. And nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We mounted our lookouts and looked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the help that never showed up.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They tracked us down, those hunters.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It wasn’t safe to go out in the street.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our end was near, our days numbered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We were doomed.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They came after us faster than eagles in flight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pressed us hard in the mountains, ambushed us in the desert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And the people of Zion, once prized,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far surpassing their weight in gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are now treated like cheap pottery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like everyday pots and bowls mass-produced by a potter.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Our king, our life’s breath, the anointed of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was caught in their traps—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our king under whose protection
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we always said we’d live.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Celebrate while you can, O Edom!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Live it up in Uz!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it won’t be long before you drink this cup, too.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll find out what it’s like to drink God’s wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get drunk on God’s wrath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wake up with nothing, stripped naked.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And that’s it for you, Zion. The punishment’s complete.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You won’t have to go through this exile again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But Edom, your time is coming:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll punish your evil life, put all your sins on display.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even wild jackals nurture their babies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give them their breasts to suckle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people have turned cruel to their babies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an ostrich in the wilderness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Babies have nothing to drink.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their tongues stick to the roofs of their mouths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Little children ask for bread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but no one gives them so much as a crust.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: People used to the finest cuisine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forage for food in the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People used to the latest in fashions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pick through the trash for something to wear.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The evil guilt of my dear people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was worse than the sin of Sodom—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city was destroyed in a flash,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one around to help.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The splendid and sacred nobles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once glowed with health.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their bodies were robust and ruddy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their beards like carved stone.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But now they are smeared with soot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unrecognizable in the street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their bones sticking out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their skin dried out like old leather.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Better to have been killed in battle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than killed by starvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better to have died of battle wounds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to slowly starve to death.
