document_id: PRO.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Make Insight Your Priority
  - type: text
    content: Good friend, take to heart what I’m telling you;
  - type: text
    content: collect my counsels and guard them with your life.
  - type: text
    content: Tune your ears to the world of Wisdom;
  - type: text
    content: set your heart on a life of Understanding.
  - type: text
    content: That’s right—if you make Insight your priority,
  - type: text
    content: and won’t take no for an answer,
  - type: text
    content: Searching for it like a prospector panning for gold,
  - type: text
    content: like an adventurer on a treasure hunt,
  - type: text
    content: Believe me, before you know it Fear-of-
  - type: text
    content: God
  - type: text
    content: ' will be yours;'
  - type: text
    content: you’ll have come upon the Knowledge of God.
  '16':
  - type: text
    content: Wise friends will rescue you from the Temptress—
  - type: text
    content: that smooth-talking Seductress
  - type: text
    content: Who’s faithless to the husband she married years ago,
  - type: text
    content: never gave a second thought to her promises before God.
  - type: text
    content: Her whole way of life is doomed;
  - type: text
    content: every step she takes brings her closer to hell.
  - type: text
    content: No one who joins her company ever comes back,
  - type: text
    content: ever sets foot on the path to real living.
  '20':
  - type: text
    content: So—join the company of good men and women,
  - type: text
    content: keep your feet on the tried-and-true paths.
  - type: text
    content: It’s the men who walk straight who will settle this land,
  - type: text
    content: the women with integrity who will last here.
  - type: text
    content: The corrupt will lose their lives;
  - type: text
    content: the dishonest will be gone for good.
  '6':
  - type: text
    content: 'And here’s why: '
  - type: text
    content: God
  - type: text
    content: ' gives out Wisdom free,'
  - type: text
    content: is plainspoken in Knowledge and Understanding.
  - type: text
    content: He’s a rich mine of Common Sense for those who live well,
  - type: text
    content: a personal bodyguard to the candid and sincere.
  - type: text
    content: He keeps his eye on all who live honestly,
  - type: text
    content: and pays special attention to his loyally committed ones.
  '9':
  - type: text
    content: So now you can pick out what’s true and fair,
  - type: text
    content: find all the good trails!
  - type: text
    content: Lady Wisdom will be your close friend,
  - type: text
    content: and Brother Knowledge your pleasant companion.
  - type: text
    content: Good Sense will scout ahead for danger,
  - type: text
    content: Insight will keep an eye out for you.
  - type: text
    content: They’ll keep you from making wrong turns,
  - type: text
    content: or following the bad directions
  - type: text
    content: Of those who are lost themselves
  - type: text
    content: and can’t tell a trail from a tumbleweed,
  - type: text
    content: These losers who make a game of evil
  - type: text
    content: and throw parties to celebrate perversity,
  - type: text
    content: Traveling paths that go nowhere,
  - type: text
    content: wandering in a maze of detours and dead ends.
