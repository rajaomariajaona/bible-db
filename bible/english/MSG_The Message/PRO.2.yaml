document_id: PRO.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Make Insight Your Priority
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: Good friend, take to heart what I’m telling you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: collect my counsels and guard them with your life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tune your ears to the world of Wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set your heart on a life of Understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s right—if you make Insight your priority,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and won’t take no for an answer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Searching for it like a prospector panning for gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an adventurer on a treasure hunt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Believe me, before you know it Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will be yours;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll have come upon the Knowledge of God.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: Wise friends will rescue you from the Temptress—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that smooth-talking Seductress
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who’s faithless to the husband she married years ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never gave a second thought to her promises before God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her whole way of life is doomed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every step she takes brings her closer to hell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one who joins her company ever comes back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever sets foot on the path to real living.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: So—join the company of good men and women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep your feet on the tried-and-true paths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s the men who walk straight who will settle this land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the women with integrity who will last here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The corrupt will lose their lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dishonest will be gone for good.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: 'And here’s why: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives out Wisdom free,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is plainspoken in Knowledge and Understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s a rich mine of Common Sense for those who live well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a personal bodyguard to the candid and sincere.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps his eye on all who live honestly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pays special attention to his loyally committed ones.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-15
    - type: text
      text: So now you can pick out what’s true and fair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: find all the good trails!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lady Wisdom will be your close friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Brother Knowledge your pleasant companion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good Sense will scout ahead for danger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Insight will keep an eye out for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll keep you from making wrong turns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or following the bad directions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of those who are lost themselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and can’t tell a trail from a tumbleweed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These losers who make a game of evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw parties to celebrate perversity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traveling paths that go nowhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wandering in a maze of detours and dead ends.
