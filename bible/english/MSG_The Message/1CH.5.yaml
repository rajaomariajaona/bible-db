document_id: 1CH.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Reuben
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'The family of Reuben the firstborn of Israel: Though Reuben was Israel’s firstborn, after he slept with his father’s concubine, a defiling act, his rights as the firstborn were passed on to the sons of Joseph son of Israel. He lost his “firstborn” place in the family tree. And even though Judah became the strongest of his brothers and King David eventually came from that family, the firstborn rights stayed with Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Reuben, firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'The descendants of Joel: Shemaiah his son, Gog his son, Shimei his son, Micah his son, Reaiah his son, Baal his son, and Beerah his son, whom Tiglath-Pileser king of Assyria took into exile. Beerah was the prince of the Reubenites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: 'Beerah’s brothers are listed in the family tree by families: first Jeiel, followed by Zechariah: then Bela son of Azaz, the son of Shema, the son of Joel. Joel lived in the area from Aroer to Nebo and Baal Meon. His family occupied the land up to the edge of the desert that goes all the way to the Euphrates River, since their growing herds of livestock spilled out of Gilead. During Saul’s reign they fought and defeated the Hagrites; they then took over their tents and lived in them on the eastern frontier of Gilead.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'The family of Gad were their neighbors in Bashan, as far as Salecah: Joel was the chief, Shapham the second-in-command, and then Janai, the judge in Bashan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: Their brothers, by families, were Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber—seven in all. These were the sons of Abihail son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz. Ahi son of Abdiel, the son of Guni, was head of their family.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The family of Gad lived in Gilead and Bashan, including the outlying villages and extending as far as the pastures of Sharon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They were all written into the official family tree during the reigns of Jotham king of Judah and Jeroboam king of Israel.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-22
  - type: text
    text: 'The families of Reuben, Gad, and the half-tribe of Manasseh had 44,760 men trained for war—physically fit and skilled in handling shield, sword, and bow. They fought against the Hagrites, Jetur, Naphish, and Nodab. God helped them as they fought. God handed the Hagrites and all their allies over to them, because they cried out to him during the battle. God answered their prayers because they trusted him. They plundered the Hagrite herds and flocks: 50,000 camels, 250,000 sheep, and 2,000 donkeys. They also captured 100,000 people. Many were killed, because the battle was God’s. They lived in that country until the exile.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: The half-tribe of Manasseh had a large population. They occupied the land from Bashan to Baal Hermon, that is, to Senir (Mount Hermon). The heads of their families were Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel—brave warriors, famous, and heads of their families. But they were not faithful to the God of their ancestors. They took up with the ungodly gods of the peoples of the land whom God had gotten rid of before they arrived. So the God of Israel stirred up the spirit of Pul king of Assyria (Tiglath-Pileser king of Assyria) to take the families of Reuben, Gad, and the half-tribe of Manasseh into exile. He deported them to Halah, Habor, Hara, and the river of Gozan. They’ve been there ever since.
