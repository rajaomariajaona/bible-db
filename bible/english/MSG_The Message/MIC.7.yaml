document_id: MIC.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Stick Around to See What God Will Do
  - type: text
    content: I’m overwhelmed with sorrow!
  - type: text
    content: sunk in a swamp of despair!
  - type: text
    content: I’m like someone who goes to the garden
  - type: text
    content: to pick cabbages and carrots and corn
  - type: text
    content: And returns empty-handed,
  - type: text
    content: finds nothing for soup or sandwich or salad.
  - type: text
    content: There’s not a decent person in sight.
  - type: text
    content: Right-living humans are extinct.
  - type: text
    content: They’re all out for one another’s blood,
  - type: text
    content: animals preying on each other.
  - type: text
    content: They’ve all become experts in evil.
  - type: text
    content: Corrupt leaders demand bribes.
  - type: text
    content: The powerful rich
  - type: text
    content: make sure they get what they want.
  - type: text
    content: The best and brightest are thistles.
  - type: text
    content: The top of the line is crabgrass.
  - type: text
    content: 'But no longer: It’s exam time.'
  - type: text
    content: Look at them slinking away in disgrace!
  - type: text
    content: Don’t trust your neighbor,
  - type: text
    content: don’t confide in your friend.
  - type: text
    content: Watch your words,
  - type: text
    content: even with your spouse.
  - type: text
    content: Neighborhoods and families are falling to pieces.
  - type: text
    content: The closer they are—sons, daughters, in-laws—
  - type: text
    content: The worse they can be.
  - type: text
    content: Your own family is the enemy.
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: Oh, that will be a day! A day for rebuilding your city,
  - type: text
    content: a day for stretching your arms, spreading your wings!
  - type: text
    content: All your dispersed and scattered people will come back,
  - type: text
    content: old friends and family from faraway places,
  - type: text
    content: From Assyria in the east to Egypt in the west,
  - type: text
    content: from across the seas and out of the mountains.
  - type: text
    content: But there’ll be a reversal for everyone else—massive depopulation—
  - type: text
    content: because of the way they lived, the things they did.
  '14':
  - type: text
    content: 'Shepherd, O '
  - type: text
    content: God
  - type: text
    content: ', your people with your staff,'
  - type: text
    content: your dear and precious flock.
  - type: text
    content: Uniquely yours in a grove of trees,
  - type: text
    content: centered in lotus land.
  - type: text
    content: Let them graze in lush Bashan
  - type: text
    content: as in the old days in green Gilead.
  - type: text
    content: Reproduce the miracle-wonders
  - type: text
    content: of our exodus from Egypt.
  - type: text
    content: 'And the godless nations: Put them in their place—'
  - type: text
    content: humiliated in their arrogance, speechless and clueless.
  - type: text
    content: Make them slink like snakes, crawl like cockroaches,
  - type: text
    content: come out of their holes from under their rocks
  - type: text
    content: 'And face our '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Fill them with holy fear and trembling.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: Where is the god who can compare with you—
  - type: text
    content: wiping the slate clean of guilt,
  - type: text
    content: Turning a blind eye, a deaf ear,
  - type: text
    content: to the past sins of your purged and precious people?
  - type: text
    content: You don’t nurse your anger and don’t stay angry long,
  - type: text
    content: for mercy is your specialty. That’s what you love most.
  - type: text
    content: And compassion is on its way to us.
  - type: text
    content: You’ll stamp out our wrongdoing.
  - type: text
    content: You’ll sink our sins
  - type: text
    content: to the bottom of the ocean.
  - type: text
    content: You’ll stay true to your word to Father Jacob
  - type: text
    content: and continue the compassion you showed Grandfather Abraham—
  - type: text
    content: Everything you promised our ancestors
  - type: text
    content: from a long time ago.
  '7':
  - type: text
    content: But me, I’m not giving up.
  - type: text
    content: 'I’m sticking around to see what '
  - type: text
    content: God
  - type: text
    content: ' will do.'
  - type: text
    content: I’m waiting for God to make things right.
  - type: text
    content: I’m counting on God to listen to me.
  - type: heading
    content: Spreading Your Wings
  '8':
  - type: text
    content: Don’t, enemy, crow over me.
  - type: text
    content: I’m down, but I’m not out.
  - type: text
    content: I’m sitting in the dark right now,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ' is my light.'
  - type: text
    content: 'I can take '
  - type: text
    content: God
  - type: text
    content: ’s punishing rage.
  - type: text
    content: I deserve it—I sinned.
  - type: text
    content: But it’s not forever. He’s on my side
  - type: text
    content: and is going to get me out of this.
  - type: text
    content: He’ll turn on the lights and show me his ways.
  - type: text
    content: I’ll see the whole picture and how right he is.
  - type: text
    content: And my enemy will see it, too,
  - type: text
    content: and be discredited—yes, disgraced!
  - type: text
    content: This enemy who kept taunting,
  - type: text
    content: '“So where is this '
  - type: text
    content: God
  - type: text
    content: ' of yours?”'
  - type: text
    content: I’m going to see it with these, my own eyes—
  - type: text
    content: my enemy disgraced, trash in the gutter.
  - type: text
    content: '* * *'
