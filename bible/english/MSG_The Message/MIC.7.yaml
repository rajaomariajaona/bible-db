document_id: MIC.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Stick Around to See What '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Will Do'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: I’m overwhelmed with sorrow!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sunk in a swamp of despair!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m like someone who goes to the garden
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pick cabbages and carrots and corn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And returns empty-handed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: finds nothing for soup or sandwich or salad.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s not a decent person in sight.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Right-living humans are extinct.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re all out for one another’s blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: animals preying on each other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve all become experts in evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Corrupt leaders demand bribes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The powerful rich
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make sure they get what they want.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The best and brightest are thistles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The top of the line is crabgrass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But no longer: It’s exam time.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look at them slinking away in disgrace!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t trust your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t confide in your friend.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch your words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even with your spouse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neighborhoods and families are falling to pieces.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The closer they are—sons, daughters, in-laws—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The worse they can be.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your own family is the enemy.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: Oh, that will be a day! A day for rebuilding your city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day for stretching your arms, spreading your wings!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your dispersed and scattered people will come back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: old friends and family from faraway places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Assyria in the east to Egypt in the west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from across the seas and out of the mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there’ll be a reversal for everyone else—massive depopulation—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the way they lived, the things they did.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-17
    - type: text
      text: 'Shepherd, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your people with your staff,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your dear and precious flock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Uniquely yours in a grove of trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: centered in lotus land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them graze in lush Bashan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as in the old days in green Gilead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reproduce the miracle-wonders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of our exodus from Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the godless nations: Put them in their place—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: humiliated in their arrogance, speechless and clueless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them slink like snakes, crawl like cockroaches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come out of their holes from under their rocks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And face our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fill them with holy fear and trembling.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: Where is the god who can compare with you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wiping the slate clean of guilt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turning a blind eye, a deaf ear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the past sins of your purged and precious people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You don’t nurse your anger and don’t stay angry long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for mercy is your specialty. That’s what you love most.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And compassion is on its way to us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll stamp out our wrongdoing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll sink our sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the bottom of the ocean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll stay true to your word to Father Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and continue the compassion you showed Grandfather Abraham—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you promised our ancestors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from a long time ago.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But me, I’m not giving up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’m sticking around to see what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will do.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m waiting for God to make things right.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m counting on God to listen to me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spreading Your Wings
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: Don’t, enemy, crow over me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m down, but I’m not out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m sitting in the dark right now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is my light.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I can take '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s punishing rage.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I deserve it—I sinned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it’s not forever. He’s on my side
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is going to get me out of this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll turn on the lights and show me his ways.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll see the whole picture and how right he is.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my enemy will see it, too,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be discredited—yes, disgraced!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This enemy who kept taunting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“So where is this '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of yours?”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going to see it with these, my own eyes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my enemy disgraced, trash in the gutter.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
