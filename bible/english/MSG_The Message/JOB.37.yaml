document_id: JOB.37,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-13
    - type: text
      text: “Whenever this happens, my heart stops—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m stunned, I can’t catch my breath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to it! Listen to his thunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rolling, rumbling thunder of his voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lets loose his lightnings from horizon to horizon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lighting up the earth from pole to pole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In their wake, the thunder echoes his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: powerful and majestic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lets out all the stops, he holds nothing back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one can mistake that voice—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His word thundering so wondrously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his mighty acts staggering our understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He orders the snow, ‘Blanket the earth!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rain, ‘Soak the whole countryside!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one can escape the weather—it’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And no one can escape from God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild animals take shelter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crawling into their dens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When blizzards roar out of the north
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and freezing rain crusts the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s God’s breath that forms the ice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s God’s breath that turns lakes and rivers solid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And yes, it’s God who fills clouds with rainwater
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hurls lightning from them every which way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He puts them through their paces—first this way, then that—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: commands them to do what he says all over the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whether for discipline or grace or extravagant love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes sure they make their mark.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Terrible Beauty Streams from God
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-18
    - type: text
      text: “Job, are you listening? Have you noticed all this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stop in your tracks! Take in God’s miracle-wonders!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you have any idea how God does it all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how he makes bright lightning from dark storms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How he piles up the cumulus clouds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all these miracle-wonders of a perfect Mind?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, you don’t even know how to keep cool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a sweltering hot day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how could you even dream
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of making a dent in that hot-tin-roof sky?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-22
    - type: text
      text: “If you’re so smart, give us a lesson in how to address God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’re in the dark and can’t figure it out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I’m dumb enough to challenge God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wouldn’t that just be asking for trouble?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one in his right mind stares straight at the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a clear and cloudless day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As gold comes from the northern mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a terrible beauty streams from God.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: “Mighty God! Far beyond our reach!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unsurpassable in power and justice!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s unthinkable that he’d treat anyone unfairly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So bow to him in deep reverence, one and all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you’re wise, you’ll most certainly worship him.”
