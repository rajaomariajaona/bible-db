document_id: JOB.37,97
type_code: eng
verses:
  '1':
  - type: text
    content: “Whenever this happens, my heart stops—
  - type: text
    content: I’m stunned, I can’t catch my breath.
  - type: text
    content: Listen to it! Listen to his thunder,
  - type: text
    content: the rolling, rumbling thunder of his voice.
  - type: text
    content: He lets loose his lightnings from horizon to horizon,
  - type: text
    content: lighting up the earth from pole to pole.
  - type: text
    content: In their wake, the thunder echoes his voice,
  - type: text
    content: powerful and majestic.
  - type: text
    content: He lets out all the stops, he holds nothing back.
  - type: text
    content: No one can mistake that voice—
  - type: text
    content: His word thundering so wondrously,
  - type: text
    content: his mighty acts staggering our understanding.
  - type: text
    content: He orders the snow, ‘Blanket the earth!’
  - type: text
    content: and the rain, ‘Soak the whole countryside!’
  - type: text
    content: 'No one can escape the weather—it’s '
  - type: text
    content: there.
  - type: text
    content: And no one can escape from God.
  - type: text
    content: Wild animals take shelter,
  - type: text
    content: crawling into their dens,
  - type: text
    content: When blizzards roar out of the north
  - type: text
    content: and freezing rain crusts the land.
  - type: text
    content: It’s God’s breath that forms the ice,
  - type: text
    content: it’s God’s breath that turns lakes and rivers solid.
  - type: text
    content: And yes, it’s God who fills clouds with rainwater
  - type: text
    content: and hurls lightning from them every which way.
  - type: text
    content: He puts them through their paces—first this way, then that—
  - type: text
    content: commands them to do what he says all over the world.
  - type: text
    content: Whether for discipline or grace or extravagant love,
  - type: text
    content: he makes sure they make their mark.
  - type: heading
    content: A Terrible Beauty Streams from God
  '14':
  - type: text
    content: “Job, are you listening? Have you noticed all this?
  - type: text
    content: Stop in your tracks! Take in God’s miracle-wonders!
  - type: text
    content: Do you have any idea how God does it all,
  - type: text
    content: how he makes bright lightning from dark storms,
  - type: text
    content: How he piles up the cumulus clouds—
  - type: text
    content: all these miracle-wonders of a perfect Mind?
  - type: text
    content: Why, you don’t even know how to keep cool
  - type: text
    content: on a sweltering hot day,
  - type: text
    content: So how could you even dream
  - type: text
    content: of making a dent in that hot-tin-roof sky?
  '19':
  - type: text
    content: “If you’re so smart, give us a lesson in how to address God.
  - type: text
    content: We’re in the dark and can’t figure it out.
  - type: text
    content: Do you think I’m dumb enough to challenge God?
  - type: text
    content: Wouldn’t that just be asking for trouble?
  - type: text
    content: No one in his right mind stares straight at the sun
  - type: text
    content: on a clear and cloudless day.
  - type: text
    content: As gold comes from the northern mountains,
  - type: text
    content: so a terrible beauty streams from God.
  '23':
  - type: text
    content: “Mighty God! Far beyond our reach!
  - type: text
    content: Unsurpassable in power and justice!
  - type: text
    content: It’s unthinkable that he’d treat anyone unfairly.
  - type: text
    content: So bow to him in deep reverence, one and all!
  - type: text
    content: If you’re wise, you’ll most certainly worship him.”
