document_id: HAB.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Racing on the Crest of the Waves
  - type: text
    content: 'A prayer of the prophet Habakkuk, with orchestra:'
  - type: text
    content: God
  - type: text
    content: ', I’ve heard what our ancestors say about you,'
  - type: text
    content: and I’m stopped in my tracks, down on my knees.
  - type: text
    content: Do among us what you did among them.
  - type: text
    content: Work among us as you worked among them.
  - type: text
    content: And as you bring judgment, as you surely must,
  - type: text
    content: remember mercy.
  - type: text
    content: '* * *'
  '17':
  - type: text
    content: Though the cherry trees don’t blossom
  - type: text
    content: and the strawberries don’t ripen,
  - type: text
    content: Though the apples are worm-eaten
  - type: text
    content: and the wheat fields stunted,
  - type: text
    content: Though the sheep pens are sheepless
  - type: text
    content: and the cattle barns empty,
  - type: text
    content: 'I’m singing joyful praise to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I’m turning cartwheels of joy to my Savior God.
  - type: text
    content: 'Counting on '
  - type: text
    content: God
  - type: text
    content: ’s Rule to prevail,
  - type: text
    content: I take heart and gain strength.
  - type: text
    content: I run like a deer.
  - type: text
    content: I feel like I’m king of the mountain!
  - type: text
    content: (For congregational use, with a full orchestra.)
  '3':
  - type: text
    content: God’s on his way again,
  - type: text
    content: retracing the old salvation route,
  - type: text
    content: Coming up from the south through Teman,
  - type: text
    content: the Holy One from Mount Paran.
  - type: text
    content: Skies are blazing with his splendor,
  - type: text
    content: his praises sounding through the earth,
  - type: text
    content: His cloud-brightness like dawn, exploding, spreading,
  - type: text
    content: forked-lightning shooting from his hand—
  - type: text
    content: what power hidden in that fist!
  - type: text
    content: Plague marches before him,
  - type: text
    content: pestilence at his heels!
  - type: text
    content: He stops. He shakes Earth.
  - type: text
    content: He looks around. Nations tremble.
  - type: text
    content: The age-old mountains fall to pieces;
  - type: text
    content: ancient hills collapse like a spent balloon.
  - type: text
    content: The paths God takes are older
  - type: text
    content: than the oldest mountains and hills.
  - type: text
    content: 'I saw everyone worried, in a panic:'
  - type: text
    content: Old wilderness adversaries,
  - type: text
    content: Cushan and Midian, were terrified,
  - type: text
    content: hoping he wouldn’t notice them.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', is it River you’re mad at?'
  - type: text
    content: Angry at old River?
  - type: text
    content: Were you raging at Sea when you rode
  - type: text
    content: horse and chariot through to salvation?
  - type: text
    content: You unfurled your bow
  - type: text
    content: and let loose a volley of arrows.
  - type: text
    content: You split Earth with rivers.
  - type: text
    content: Mountains saw what was coming.
  - type: text
    content: They twisted in pain.
  - type: text
    content: Flood Waters poured in.
  - type: text
    content: Ocean roared and reared huge waves.
  - type: text
    content: Sun and Moon stopped in their tracks.
  - type: text
    content: Your flashing arrows stopped them,
  - type: text
    content: your lightning-strike spears impaled them.
  - type: text
    content: Angry, you stomped through Earth.
  - type: text
    content: Furious, you crushed the godless nations.
  - type: text
    content: You were out to save your people,
  - type: text
    content: to save your specially chosen people.
  - type: text
    content: You beat the stuffing
  - type: text
    content: out of King Wicked,
  - type: text
    content: Stripped him naked
  - type: text
    content: from head to toe,
  - type: text
    content: Set his severed head on his own spear
  - type: text
    content: and blew away his army.
  - type: text
    content: Scattered they were to the four winds—
  - type: text
    content: and ended up food for the sharks!
  - type: text
    content: You galloped through the Sea on your horses,
  - type: text
    content: racing on the crest of the waves.
  - type: text
    content: When I heard it, my stomach did flips.
  - type: text
    content: I stammered and stuttered.
  - type: text
    content: My bones turned to water.
  - type: text
    content: I staggered and stumbled.
  - type: text
    content: I sit back and wait for Doomsday
  - type: text
    content: to descend on our attackers.
  - type: text
    content: '* * *'
