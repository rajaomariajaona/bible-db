document_id: HAB.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Racing on the Crest of the Waves'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'A prayer of the prophet Habakkuk, with orchestra:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', I’ve heard what our ancestors say about you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m stopped in my tracks, down on my knees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do among us what you did among them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Work among us as you worked among them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as you bring judgment, as you surely must,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remember mercy.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-19
    - type: text
      text: Though the cherry trees don’t blossom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the strawberries don’t ripen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the apples are worm-eaten
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the wheat fields stunted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the sheep pens are sheepless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cattle barns empty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m singing joyful praise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m turning cartwheels of joy to my Savior God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Counting on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Rule to prevail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I take heart and gain strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I run like a deer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I feel like I’m king of the mountain!
  - type: usfm
    marker: m
    children:
    - type: text
      text: (For congregational use, with a full orchestra.)
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-7
    - type: text
      text: God’s on his way again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: retracing the old salvation route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Coming up from the south through Teman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One from Mount Paran.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Skies are blazing with his splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his praises sounding through the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His cloud-brightness like dawn, exploding, spreading,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forked-lightning shooting from his hand—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what power hidden in that fist!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plague marches before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pestilence at his heels!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stops. He shakes Earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He looks around. Nations tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The age-old mountains fall to pieces;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ancient hills collapse like a spent balloon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The paths God takes are older
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the oldest mountains and hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I saw everyone worried, in a panic:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Old wilderness adversaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cushan and Midian, were terrified,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hoping he wouldn’t notice them.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-16
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', is it River you’re mad at?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Angry at old River?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Were you raging at Sea when you rode
  - type: usfm
    marker: q2
    children:
    - type: text
      text: horse and chariot through to salvation?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You unfurled your bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let loose a volley of arrows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You split Earth with rivers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains saw what was coming.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They twisted in pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flood Waters poured in.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ocean roared and reared huge waves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sun and Moon stopped in their tracks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your flashing arrows stopped them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your lightning-strike spears impaled them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Angry, you stomped through Earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Furious, you crushed the godless nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were out to save your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to save your specially chosen people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You beat the stuffing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of King Wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stripped him naked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from head to toe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set his severed head on his own spear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and blew away his army.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scattered they were to the four winds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ended up food for the sharks!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You galloped through the Sea on your horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: racing on the crest of the waves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I heard it, my stomach did flips.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stammered and stuttered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My bones turned to water.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I staggered and stumbled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sit back and wait for Doomsday
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to descend on our attackers.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
