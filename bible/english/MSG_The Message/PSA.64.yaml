type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen and help, O God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m reduced to a whine
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a whimper, obsessed
- type: usfm
  marker: q2
  children:
  - type: text
    text: with feelings of doomsday.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-6
  - type: text
    text: Don’t let them find me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the conspirators out to get me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Using their tongues as weapons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flinging poison words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: poison-tipped arrow-words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shoot from ambush,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shoot without warning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not caring who they hit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They keep fit doing calisthenics
- type: usfm
  marker: q2
  children:
  - type: text
    text: of evil purpose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They keep lists of the traps
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ve secretly set.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say to each other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “No one can catch us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one can detect our perfect crime.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Detective detects the mystery
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the dark of the cellar heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: The God of the Arrow shoots!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They double up in pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fall flat on their faces
- type: usfm
  marker: q2
  children:
  - type: text
    text: in full view of the grinning crowd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Everyone sees it. God’s
- type: usfm
  marker: q2
  children:
  - type: text
    text: work is the talk of the town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Be glad, good people! Fly to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Good-hearted people, make praise your habit.
