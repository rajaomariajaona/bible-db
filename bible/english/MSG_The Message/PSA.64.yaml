document_id: PSA.64,97
type_code: eng
verses:
  '1':
  - type: text
    content: Listen and help, O God.
  - type: text
    content: I’m reduced to a whine
  - type: text
    content: And a whimper, obsessed
  - type: text
    content: with feelings of doomsday.
  '2':
  - type: text
    content: Don’t let them find me—
  - type: text
    content: the conspirators out to get me,
  - type: text
    content: Using their tongues as weapons,
  - type: text
    content: flinging poison words,
  - type: text
    content: poison-tipped arrow-words.
  - type: text
    content: They shoot from ambush,
  - type: text
    content: shoot without warning,
  - type: text
    content: not caring who they hit.
  - type: text
    content: They keep fit doing calisthenics
  - type: text
    content: of evil purpose,
  - type: text
    content: They keep lists of the traps
  - type: text
    content: they’ve secretly set.
  - type: text
    content: They say to each other,
  - type: text
    content: “No one can catch us,
  - type: text
    content: no one can detect our perfect crime.”
  - type: text
    content: The Detective detects the mystery
  - type: text
    content: in the dark of the cellar heart.
  '7':
  - type: text
    content: The God of the Arrow shoots!
  - type: text
    content: They double up in pain,
  - type: text
    content: Fall flat on their faces
  - type: text
    content: in full view of the grinning crowd.
  '9':
  - type: text
    content: Everyone sees it. God’s
  - type: text
    content: work is the talk of the town.
  - type: text
    content: 'Be glad, good people! Fly to '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Good-hearted people, make praise your habit.
