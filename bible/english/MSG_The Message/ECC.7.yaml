document_id: ECC.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Take Anything for Granted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A good reputation is better than a fat bank account.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your death date tells more than your birth date.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You learn more at a funeral than at a feast—
- type: usfm
  marker: q1
  children:
  - type: text
    text: After all, that’s where we’ll end up. We might discover
- type: usfm
  marker: q2
  children:
  - type: text
    text: something from it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Crying is better than laughing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It blotches the face but it scours the heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sages invest themselves in hurt and grieving.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fools waste their lives in fun and games.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You’ll get more from the rebuke of a sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than from the song and dance of fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The giggles of fools are like the crackling of twigs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Under the cooking pot. And like smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Brutality stupefies even the wise
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroys the strongest heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Endings are better than beginnings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sticking to it is better than standing out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Don’t be quick to fly off the handle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anger boomerangs. You can spot a fool by the lumps on his head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t always be asking, “Where are the good old days?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wise folks don’t ask questions like that.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Wisdom is better when it’s paired with money,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Especially if you get both while you’re still living.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Double protection: wisdom and wealth!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Plus this bonus: Wisdom energizes its owner.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Take a good look at God’s work.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who could simplify and reduce Creation’s curves and angles
- type: usfm
  marker: q1
  children:
  - type: text
    text: To a plain straight line?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On a good day, enjoy yourself;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On a bad day, examine your conscience.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God arranges for both kinds of days
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that we won’t take anything for granted.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Stay in Touch with Both Sides
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: I’ve seen it all in my brief and pointless life—here a good person cut down in the middle of doing good, there a bad person living a long life of sheer evil. So don’t knock yourself out being good, and don’t go overboard being wise. Believe me, you won’t get anything out of it. But don’t press your luck by being bad, either. And don’t be reckless. Why die needlessly?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It’s best to stay in touch with both sides of an issue. A person who fears God deals responsibly with all of reality, not just a piece of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Wisdom puts more strength in one wise person
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than ten strong men give to a city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: There’s not one totally good person on earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one who is truly pure and sinless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Don’t eavesdrop on the conversation of others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What if the gossip’s about you and you’d rather not hear it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve done that a few times, haven’t you—said things
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behind someone’s back you wouldn’t say to his face?
- type: usfm
  marker: s1
  children:
  - type: text
    text: How to Interpret the Meaning of Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: I tested everything in my search for wisdom. I set out to be wise, but it was beyond me, far beyond me, and deep—oh so deep! Does anyone ever find it? I concentrated with all my might, studying and exploring and seeking wisdom—the meaning of life. I also wanted to identify evil and stupidity, foolishness and craziness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-29
  - type: text
    text: 'One discovery: A woman can be a bitter pill to swallow, full of seductive scheming and grasping. The lucky escape her; the undiscerning get caught. At least this is my experience—what I, the Quester, have pieced together as I’ve tried to make sense of life. But the wisdom I’ve looked for I haven’t found. I didn’t find one man or woman in a thousand worth my while. Yet I did spot one ray of light in this murk: God made men and women true and upright; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we’re
  - type: text
    text: ' the ones who’ve made a mess of things.'
