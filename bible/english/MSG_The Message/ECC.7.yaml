document_id: ECC.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Take Anything for Granted
  - type: text
    content: A good reputation is better than a fat bank account.
  - type: text
    content: Your death date tells more than your birth date.
  '10':
  - type: text
    content: Don’t always be asking, “Where are the good old days?”
  - type: text
    content: Wise folks don’t ask questions like that.
  '11':
  - type: text
    content: Wisdom is better when it’s paired with money,
  - type: text
    content: Especially if you get both while you’re still living.
  - type: text
    content: 'Double protection: wisdom and wealth!'
  - type: text
    content: 'Plus this bonus: Wisdom energizes its owner.'
  '13':
  - type: text
    content: Take a good look at God’s work.
  - type: text
    content: Who could simplify and reduce Creation’s curves and angles
  - type: text
    content: To a plain straight line?
  '14':
  - type: text
    content: On a good day, enjoy yourself;
  - type: text
    content: On a bad day, examine your conscience.
  - type: text
    content: God arranges for both kinds of days
  - type: text
    content: So that we won’t take anything for granted.
  - type: heading
    content: Stay in Touch with Both Sides
  '15':
  - type: text
    content: I’ve seen it all in my brief and pointless life—here a good person cut down in the middle of doing good, there a bad person living a long life of sheer evil. So don’t knock yourself out being good, and don’t go overboard being wise. Believe me, you won’t get anything out of it. But don’t press your luck by being bad, either. And don’t be reckless. Why die needlessly?
  '18':
  - type: text
    content: It’s best to stay in touch with both sides of an issue. A person who fears God deals responsibly with all of reality, not just a piece of it.
  '19':
  - type: text
    content: Wisdom puts more strength in one wise person
  - type: text
    content: Than ten strong men give to a city.
  '2':
  - type: text
    content: You learn more at a funeral than at a feast—
  - type: text
    content: After all, that’s where we’ll end up. We might discover
  - type: text
    content: something from it.
  '20':
  - type: text
    content: There’s not one totally good person on earth,
  - type: text
    content: Not one who is truly pure and sinless.
  '21':
  - type: text
    content: Don’t eavesdrop on the conversation of others.
  - type: text
    content: What if the gossip’s about you and you’d rather not hear it?
  - type: text
    content: You’ve done that a few times, haven’t you—said things
  - type: text
    content: Behind someone’s back you wouldn’t say to his face?
  - type: heading
    content: How to Interpret the Meaning of Life
  '23':
  - type: text
    content: I tested everything in my search for wisdom. I set out to be wise, but it was beyond me, far beyond me, and deep—oh so deep! Does anyone ever find it? I concentrated with all my might, studying and exploring and seeking wisdom—the meaning of life. I also wanted to identify evil and stupidity, foolishness and craziness.
  '26':
  - type: text
    content: 'One discovery: A woman can be a bitter pill to swallow, full of seductive scheming and grasping. The lucky escape her; the undiscerning get caught. At least this is my experience—what I, the Quester, have pieced together as I’ve tried to make sense of life. But the wisdom I’ve looked for I haven’t found. I didn’t find one man or woman in a thousand worth my while. Yet I did spot one ray of light in this murk: God made men and women true and upright; '
  - type: text
    content: we’re
  - type: text
    content: ' the ones who’ve made a mess of things.'
  '3':
  - type: text
    content: Crying is better than laughing.
  - type: text
    content: It blotches the face but it scours the heart.
  '4':
  - type: text
    content: Sages invest themselves in hurt and grieving.
  - type: text
    content: Fools waste their lives in fun and games.
  '5':
  - type: text
    content: You’ll get more from the rebuke of a sage
  - type: text
    content: Than from the song and dance of fools.
  '6':
  - type: text
    content: The giggles of fools are like the crackling of twigs
  - type: text
    content: Under the cooking pot. And like smoke.
  '7':
  - type: text
    content: Brutality stupefies even the wise
  - type: text
    content: And destroys the strongest heart.
  '8':
  - type: text
    content: Endings are better than beginnings.
  - type: text
    content: Sticking to it is better than standing out.
  '9':
  - type: text
    content: Don’t be quick to fly off the handle.
  - type: text
    content: Anger boomerangs. You can spot a fool by the lumps on his head.
