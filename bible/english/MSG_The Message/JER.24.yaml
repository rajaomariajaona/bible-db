document_id: JER.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Two Baskets of Figs
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' showed me two baskets of figs placed in front of the Temple of '
  - type: text
    content: God
  - type: text
    content: . This was after Nebuchadnezzar king of Babylon had taken Jehoiachin son of Jehoiakim king of Judah from Jerusalem into exile in Babylon, along with the leaders of Judah, the craftsmen, and the skilled laborers. In one basket the figs were of the finest quality, ripe and ready to eat. In the other basket the figs were rotten, so rotten they couldn’t be eaten.
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to me, “Jeremiah, what do you see?”'
  - type: text
    content: “Figs,” I said. “Excellent figs of the finest quality, and also rotten figs, so rotten they can’t be eaten.”
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told me, “This is the Message from the '
  - type: text
    content: God
  - type: text
    content: ' of Israel: The exiles from here that I’ve sent off to the land of the Babylonians are like the good figs, and I’ll make sure they get good treatment. I’ll keep my eye on them so that their lives are good, and I’ll bring them back to this land. I’ll build them up, not tear them down; I’ll plant them, not uproot them.'
  '7':
  - type: text
    content: '“And I’ll give them a heart to know me, '
  - type: text
    content: God
  - type: text
    content: . They’ll be my people and I’ll be their God, for they’ll have returned to me with all their hearts.
  '8':
  - type: text
    content: “But like the rotten figs, so rotten they can’t be eaten, is Zedekiah king of Judah. Rotten figs—that’s how I’ll treat him and his leaders, along with the survivors here and those down in Egypt. I’ll make them something that the whole world will look on as disgusting—repugnant outcasts, their names used as curse words wherever in the world I drive them. And I’ll make sure they die like flies—from war, starvation, disease, whatever—until the land I once gave to them and their ancestors is completely rid of them.”
