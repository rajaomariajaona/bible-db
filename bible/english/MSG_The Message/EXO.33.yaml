document_id: EXO.33,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “Now go. Get on your way from here, you and the people you brought up from the land of Egypt. Head for the land which I promised to Abraham, Isaac, and Jacob, saying ‘I will give it to your descendants.’ I will send an angel ahead of you and I’ll drive out the Canaanites, Amorites, Hittites, Perizzites, Hivites, and Jebusites. It’s a land flowing with milk and honey. But I won’t be with you in person—you’re such a stubborn, hard-headed people!—lest I destroy you on the journey.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke with Moses face-to-face, as neighbors speak to one another. When he would return to the camp, his attendant, the young man Joshua, stayed—he didn’t leave the Tent.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “Look, you tell me, ‘Lead this people,’ but you don’t let me know whom you’re going to send with me. You tell me, ‘I know you well and you are special to me.’ If I am so special to you, let me in on your plans. That way, I will continue being special to you. Don’t forget, this is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' people, your responsibility.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “My presence will go with you. I’ll see the journey to the end.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said, “If your presence doesn’t take the lead here, call this trip off right now. How else will it be known that you’re with me in this, with me and your people? Are you traveling with us or not? How else will we know that we’re special, I and your people, among all other people on this planet Earth?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “All right. Just as you say; this also I will do, for I know you well and you are special to me. I know you by name.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said, “Please. Let me see your Glory.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “I will make my Goodness pass right in front of you; I’ll call out the name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', right before you. I’ll treat well whomever I want to treat well and I’ll be kind to whomever I want to be kind.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' continued, “But you may not see my face. No one can see me and live.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Look, here is a place right beside me. Put yourself on this rock. When my Glory passes by, I’ll put you in the cleft of the rock and cover you with my hand until I’ve passed by. Then I’ll take my hand away and you’ll see my back. But you won’t see my face.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the people heard this harsh verdict, they were plunged into gloom and wore long faces. No one put on jewelry.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Tell the Israelites, ‘You’re one hard-headed people. I couldn’t stand being with you for even a moment—I’d destroy you. So take off all your jewelry until I figure out what to do with you.’” So the Israelites stripped themselves of their jewelry from Mount Horeb on.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses used to take the Tent and set it up outside the camp, some distance away. He called it the Tent of Meeting. Anyone who sought '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' would go to the Tent of Meeting outside the camp. It went like this: When Moses would go to the Tent, all the people would stand at attention; each man would take his position at the entrance to his tent with his eyes on Moses until he entered the Tent; whenever Moses entered the Tent, the Pillar of Cloud descended to the entrance to the Tent and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke with Moses. All the people would see the Pillar of Cloud at the entrance to the Tent, stand at attention, and then bow down in worship, each man at the entrance to his tent.'
