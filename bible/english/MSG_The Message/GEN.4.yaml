document_id: GEN.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Adam slept with Eve his wife. She conceived and had Cain. She said, “I’ve gotten a man, with '
  - type: text
    content: God
  - type: text
    content: ’s help!”
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “What have you done! The voice of your brother’s blood is calling to me from the ground. From now on you’ll get nothing but curses from this ground; you’ll be driven from this ground that has opened its arms to receive the blood of your murdered brother. You’ll farm this ground, but it will no longer give you its best. You’ll be a homeless wanderer on Earth.”'
  '13':
  - type: text
    content: 'Cain said to '
  - type: text
    content: God
  - type: text
    content: ', “My punishment is too much. I can’t take it! You’ve thrown me off the land and I can never again face you. I’m a homeless wanderer on Earth and whoever finds me will kill me.”'
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told him, “No. Anyone who kills Cain will pay for it seven times over.” '
  - type: text
    content: God
  - type: text
    content: ' put a mark on Cain to protect him so that no one who met him would kill him.'
  '16':
  - type: text
    content: 'Cain left the presence of '
  - type: text
    content: God
  - type: text
    content: ' and lived in No-Man’s-Land, east of Eden.'
  '17':
  - type: text
    content: Cain slept with his wife. She conceived and had Enoch. He then built a city and named it after his son, Enoch.
  - type: text
    content: Enoch had Irad,
  - type: text
    content: Irad had Mehujael,
  - type: text
    content: Mehujael had Methushael,
  - type: text
    content: Methushael had Lamech.
  '19':
  - type: text
    content: Lamech married two wives, Adah and Zillah. Adah gave birth to Jabal, the ancestor of all who live in tents and herd cattle. His brother’s name was Jubal, the ancestor of all who play the lyre and flute. Zillah gave birth to Tubal-Cain, who worked at the forge making bronze and iron tools. Tubal-Cain’s sister was Naamah.
  '2':
  - type: text
    content: Then she had another baby, Abel. Abel was a herdsman and Cain a farmer.
  '23':
  - type: text
    content: Lamech said to his wives,
  - type: text
    content: Adah and Zillah, listen to me;
  - type: text
    content: 'you wives of Lamech, hear me out:'
  - type: text
    content: I killed a man for wounding me,
  - type: text
    content: a young man who attacked me.
  - type: text
    content: If Cain is avenged seven times,
  - type: text
    content: for Lamech it’s seventy-seven!
  '25':
  - type: text
    content: Adam slept with his wife again. She had a son whom she named Seth. She said, “God has given me another child in place of Abel whom Cain killed.” And then Seth had a son whom he named Enosh.
  - type: text
    content: 'That’s when men and women began praying and worshiping in the name of '
  - type: text
    content: God
  - type: text
    content: .
  '3':
  - type: text
    content: 'Time passed. Cain brought an offering to '
  - type: text
    content: God
  - type: text
    content: ' from the produce of his farm. Abel also brought an offering, but from the firstborn animals of his herd, choice cuts of meat. '
  - type: text
    content: God
  - type: text
    content: ' liked Abel and his offering, but Cain and his offering didn’t get his approval. Cain lost his temper and went into a sulk.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Cain: “Why this tantrum? Why the sulking? If you do well, won’t you be accepted? And if you don’t do well, sin is lying in wait for you, ready to pounce; it’s out to get you, you’ve got to master it.”'
  '8':
  - type: text
    content: Cain had words with his brother. They were out in the field; Cain came at Abel his brother and killed him.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Cain, “Where is Abel your brother?”'
  - type: text
    content: He said, “How should I know? Am I his babysitter?”
