document_id: GEN.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Adam slept with Eve his wife. She conceived and had Cain. She said, “I’ve gotten a man, with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s help!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then she had another baby, Abel. Abel was a herdsman and Cain a farmer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'Time passed. Cain brought an offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from the produce of his farm. Abel also brought an offering, but from the firstborn animals of his herd, choice cuts of meat. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' liked Abel and his offering, but Cain and his offering didn’t get his approval. Cain lost his temper and went into a sulk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Cain: “Why this tantrum? Why the sulking? If you do well, won’t you be accepted? And if you don’t do well, sin is lying in wait for you, ready to pounce; it’s out to get you, you’ve got to master it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Cain had words with his brother. They were out in the field; Cain came at Abel his brother and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Cain, “Where is Abel your brother?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “How should I know? Am I his babysitter?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “What have you done! The voice of your brother’s blood is calling to me from the ground. From now on you’ll get nothing but curses from this ground; you’ll be driven from this ground that has opened its arms to receive the blood of your murdered brother. You’ll farm this ground, but it will no longer give you its best. You’ll be a homeless wanderer on Earth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Cain said to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “My punishment is too much. I can’t take it! You’ve thrown me off the land and I can never again face you. I’m a homeless wanderer on Earth and whoever finds me will kill me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told him, “No. Anyone who kills Cain will pay for it seven times over.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' put a mark on Cain to protect him so that no one who met him would kill him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cain left the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and lived in No-Man’s-Land, east of Eden.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Cain slept with his wife. She conceived and had Enoch. He then built a city and named it after his son, Enoch.
- type: usfm
  marker: p
  children:
  - type: text
    text: Enoch had Irad,
- type: usfm
  marker: p
  children:
  - type: text
    text: Irad had Mehujael,
- type: usfm
  marker: p
  children:
  - type: text
    text: Mehujael had Methushael,
- type: usfm
  marker: p
  children:
  - type: text
    text: Methushael had Lamech.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: Lamech married two wives, Adah and Zillah. Adah gave birth to Jabal, the ancestor of all who live in tents and herd cattle. His brother’s name was Jubal, the ancestor of all who play the lyre and flute. Zillah gave birth to Tubal-Cain, who worked at the forge making bronze and iron tools. Tubal-Cain’s sister was Naamah.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: Lamech said to his wives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adah and Zillah, listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you wives of Lamech, hear me out:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I killed a man for wounding me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a young man who attacked me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If Cain is avenged seven times,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for Lamech it’s seventy-seven!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: Adam slept with his wife again. She had a son whom she named Seth. She said, “God has given me another child in place of Abel whom Cain killed.” And then Seth had a son whom he named Enosh.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'That’s when men and women began praying and worshiping in the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
