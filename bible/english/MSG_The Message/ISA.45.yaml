type_code: eng
verses:
  '1':
  - type: heading
    content: The God Who Forms Light and Darkness
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Message to his anointed,
  - type: text
    content: to Cyrus, whom he took by the hand
  - type: text
    content: To give the task of taming the nations,
  - type: text
    content: of terrifying their kings—
  - type: text
    content: He gave him free rein,
  - type: text
    content: 'no restrictions:'
  - type: text
    content: “I’ll go ahead of you,
  - type: text
    content: clearing and paving the road.
  - type: text
    content: I’ll break down bronze city gates,
  - type: text
    content: smash padlocks, kick down barred entrances.
  - type: text
    content: I’ll lead you to buried treasures,
  - type: text
    content: secret caches of valuables—
  - type: text
    content: 'Confirmations that it is, in fact, I, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the God of Israel, who calls you by your name.
  - type: text
    content: It’s because of my dear servant Jacob,
  - type: text
    content: Israel my chosen,
  - type: text
    content: That I’ve singled you out, called you by name,
  - type: text
    content: and given you this privileged work.
  - type: text
    content: And you don’t even know me!
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', the only God there is.'
  - type: text
    content: Besides me there are no real gods.
  - type: text
    content: I’m the one who armed you for this work,
  - type: text
    content: though you don’t even know me,
  - type: text
    content: So that everyone, from east to west, will know
  - type: text
    content: that I have no god-rivals.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', the only God there is.'
  - type: text
    content: I form light and create darkness,
  - type: text
    content: I make harmonies and create discords.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', do all these things.'
  '11':
  - type: text
    content: 'Thus '
  - type: text
    content: God
  - type: text
    content: ', The Holy of Israel, Israel’s Maker, says:'
  - type: text
    content: “Do you question who or what I’m making?
  - type: text
    content: Are you telling me what I can or cannot do?
  - type: text
    content: I made earth,
  - type: text
    content: and I created man and woman to live on it.
  - type: text
    content: I handcrafted the skies
  - type: text
    content: and direct all the constellations in their turnings.
  - type: text
    content: And now I’ve got Cyrus on the move.
  - type: text
    content: I’ve rolled out the red carpet before him.
  - type: text
    content: He will build my city.
  - type: text
    content: He will bring home my exiles.
  - type: text
    content: 'I didn’t hire him to do this. I '
  - type: text
    content: told
  - type: text
    content: ' him.'
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.”
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “The workers of Egypt, the merchants of Ethiopia,
  - type: text
    content: and those statuesque Sabeans
  - type: text
    content: Will all come over to you—all yours.
  - type: text
    content: Docile in chains, they’ll follow you,
  - type: text
    content: 'Hands folded in reverence, praying before you:'
  - type: text
    content: ‘Amazing! God is with you!
  - type: text
    content: There is no other God—none.’”
  - type: heading
    content: Look at the Evidence
  '15':
  - type: text
    content: Clearly, you are a God who works behind the scenes,
  - type: text
    content: God of Israel, Savior God.
  - type: text
    content: Humiliated, all those others
  - type: text
    content: will be ashamed to show their faces in public.
  - type: text
    content: Out of work and at loose ends, the makers of no-god idols
  - type: text
    content: won’t know what to do with themselves.
  - type: text
    content: 'The people of Israel, though, are saved by you, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: saved with an eternal salvation.
  - type: text
    content: They won’t be ashamed,
  - type: text
    content: they won’t be at loose ends, ever.
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', Creator of the heavens—'
  - type: text
    content: 'he is, remember, '
  - type: text
    content: God.
  - type: text
    content: Maker of earth—
  - type: text
    content: he put it on its foundations, built it from scratch.
  - type: text
    content: He didn’t go to all that trouble
  - type: text
    content: to just leave it empty, nothing in it.
  - type: text
    content: He made it to be lived in.
  - type: text
    content: 'This '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: '“I am '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the one and only.
  - type: text
    content: I don’t just talk to myself
  - type: text
    content: or mumble under my breath.
  - type: text
    content: I never told Jacob,
  - type: text
    content: ‘Seek me in emptiness, in dark nothingness.’
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: . I work out in the open,
  - type: text
    content: saying what’s right, setting things right.
  - type: text
    content: So gather around, come on in,
  - type: text
    content: all you refugees and castoffs.
  - type: text
    content: They don’t seem to know much, do they—
  - type: text
    content: those who carry around their no-god blocks of wood,
  - type: text
    content: praying for help to a dead stick?
  - type: text
    content: So tell me what you think. Look at the evidence.
  - type: text
    content: Put your heads together. Make your case.
  - type: text
    content: Who told you, and a long time ago, what’s going on here?
  - type: text
    content: Who made sense of things for you?
  - type: text
    content: 'Wasn’t I the one? '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: It had to be me. I’m the only God there is—
  - type: text
    content: The only God who does things right
  - type: text
    content: and knows how to help.
  - type: text
    content: So turn to me and be helped—saved!—
  - type: text
    content: everyone, whoever and wherever you are.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the only God there is, the one and only.
  - type: text
    content: 'I promise in my own name:'
  - type: text
    content: Every word out of my mouth does what it says.
  - type: text
    content: I never take back what I say.
  - type: text
    content: Everyone is going to end up kneeling before me.
  - type: text
    content: Everyone is going to end up saying of me,
  - type: text
    content: '‘Yes! Salvation and strength are in '
  - type: text
    content: God
  - type: text
    content: '!’”'
  '24':
  - type: text
    content: ' All who have raged against him'
  - type: text
    content: will be brought before him,
  - type: text
    content: disgraced by their unbelief.
  - type: text
    content: And all who are connected with Israel
  - type: text
    content: 'will have a robust, praising, good life in '
  - type: text
    content: God
  - type: text
    content: '!'
  '8':
  - type: text
    content: “Open up, heavens, and rain.
  - type: text
    content: Clouds, pour out buckets of my goodness!
  - type: text
    content: Loosen up, earth, and bloom salvation;
  - type: text
    content: sprout right living.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', generate all this.'
  - type: text
    content: But doom to you who fight your Maker—
  - type: text
    content: you’re a pot at odds with the potter!
  - type: text
    content: 'Does clay talk back to the potter:'
  - type: text
    content: ‘What are you doing? What clumsy fingers!’
  - type: text
    content: Would a sperm say to a father,
  - type: text
    content: ‘Who gave you permission to use me to make a baby?’
  - type: text
    content: Or a fetus to a mother,
  - type: text
    content: ‘Why have you cooped me up in this belly?’”
