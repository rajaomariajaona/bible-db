document_id: ISA.45
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The God Who Forms Light and Darkness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message to his anointed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to Cyrus, whom he took by the hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: To give the task of taming the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of terrifying their kings—
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gave him free rein,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no restrictions:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll go ahead of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clearing and paving the road.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll break down bronze city gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: smash padlocks, kick down barred entrances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll lead you to buried treasures,
- type: usfm
  marker: q2
  children:
  - type: text
    text: secret caches of valuables—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Confirmations that it is, in fact, I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God of Israel, who calls you by your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s because of my dear servant Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel my chosen,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I’ve singled you out, called you by name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and given you this privileged work.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And you don’t even know me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the only God there is.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Besides me there are no real gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m the one who armed you for this work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though you don’t even know me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that everyone, from east to west, will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I have no god-rivals.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the only God there is.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I form light and create darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I make harmonies and create discords.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', do all these things.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: “Open up, heavens, and rain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clouds, pour out buckets of my goodness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loosen up, earth, and bloom salvation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sprout right living.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', generate all this.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But doom to you who fight your Maker—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’re a pot at odds with the potter!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does clay talk back to the potter:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘What are you doing? What clumsy fingers!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would a sperm say to a father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Who gave you permission to use me to make a baby?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or a fetus to a mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Why have you cooped me up in this belly?’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: 'Thus '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', The Holy of Israel, Israel’s Maker, says:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Do you question who or what I’m making?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you telling me what I can or cannot do?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I made earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I created man and woman to live on it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I handcrafted the skies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and direct all the constellations in their turnings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now I’ve got Cyrus on the move.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve rolled out the red carpet before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will build my city.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will bring home my exiles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I didn’t hire him to do this. I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: told
  - type: text
    text: ' him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The workers of Egypt, the merchants of Ethiopia,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those statuesque Sabeans
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will all come over to you—all yours.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Docile in chains, they’ll follow you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hands folded in reverence, praying before you:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Amazing! God is with you!
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is no other God—none.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Look at the Evidence
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: Clearly, you are a God who works behind the scenes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God of Israel, Savior God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Humiliated, all those others
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be ashamed to show their faces in public.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of work and at loose ends, the makers of no-god idols
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t know what to do with themselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The people of Israel, though, are saved by you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: saved with an eternal salvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They won’t be ashamed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they won’t be at loose ends, ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-24a
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Creator of the heavens—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he is, remember, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maker of earth—
- type: usfm
  marker: q2
  children:
  - type: text
    text: he put it on its foundations, built it from scratch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He didn’t go to all that trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: to just leave it empty, nothing in it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He made it to be lived in.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'This '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one and only.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t just talk to myself
- type: usfm
  marker: q2
  children:
  - type: text
    text: or mumble under my breath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I never told Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Seek me in emptiness, in dark nothingness.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . I work out in the open,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying what’s right, setting things right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So gather around, come on in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you refugees and castoffs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They don’t seem to know much, do they—
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who carry around their no-god blocks of wood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: praying for help to a dead stick?
- type: usfm
  marker: q1
  children:
  - type: text
    text: So tell me what you think. Look at the evidence.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put your heads together. Make your case.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who told you, and a long time ago, what’s going on here?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who made sense of things for you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Wasn’t I the one? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It had to be me. I’m the only God there is—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The only God who does things right
- type: usfm
  marker: q2
  children:
  - type: text
    text: and knows how to help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So turn to me and be helped—saved!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone, whoever and wherever you are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the only God there is, the one and only.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I promise in my own name:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every word out of my mouth does what it says.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I never take back what I say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone is going to end up kneeling before me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone is going to end up saying of me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘Yes! Salvation and strength are in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!’”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24b-25
  - type: text
    text: ' All who have raged against him'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be brought before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: disgraced by their unbelief.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all who are connected with Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will have a robust, praising, good life in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
