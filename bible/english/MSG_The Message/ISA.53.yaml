document_id: ISA.53,97
type_code: eng
verses:
  '1':
  - type: text
    content: Who believes what we’ve heard and seen?
  - type: text
    content: 'Who would have thought '
  - type: text
    content: God
  - type: text
    content: ’s saving power would look like this?
  '10':
  - type: text
    content: 'Still, it’s what '
  - type: text
    content: God
  - type: text
    content: ' had in mind all along,'
  - type: text
    content: to crush him with pain.
  - type: text
    content: The plan was that he give himself as an offering for sin
  - type: text
    content: so that he’d see life come from it—life, life, and more life.
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ’s plan will deeply prosper through him.
  '11':
  - type: text
    content: Out of that terrible travail of soul,
  - type: text
    content: he’ll see that it’s worth it and be glad he did it.
  - type: text
    content: Through what he experienced, my righteous one, my servant,
  - type: text
    content: will make many “righteous ones,”
  - type: text
    content: as he himself carries the burden of their sins.
  - type: text
    content: Therefore I’ll reward him extravagantly—
  - type: text
    content: the best of everything, the highest honors—
  - type: text
    content: Because he looked death in the face and didn’t flinch,
  - type: text
    content: because he embraced the company of the lowest.
  - type: text
    content: He took on his own shoulders the sin of the many,
  - type: text
    content: he took up the cause of all the black sheep.
  '2':
  - type: text
    content: The servant grew up before God—a scrawny seedling,
  - type: text
    content: a scrubby plant in a parched field.
  - type: text
    content: There was nothing attractive about him,
  - type: text
    content: nothing to cause us to take a second look.
  - type: text
    content: He was looked down on and passed over,
  - type: text
    content: a man who suffered, who knew pain firsthand.
  - type: text
    content: One look at him and people turned away.
  - type: text
    content: We looked down on him, thought he was scum.
  - type: text
    content: 'But the fact is, it was '
  - type: text
    content: our
  - type: text
    content: ' pains he carried—'
  - type: text
    content: our
  - type: text
    content: ' disfigurements, all the things wrong with '
  - type: text
    content: us.
  - type: text
    content: We thought he brought it on himself,
  - type: text
    content: that God was punishing him for his own failures.
  - type: text
    content: But it was our sins that did that to him,
  - type: text
    content: that ripped and tore and crushed him—
  - type: text
    content: our sins
  - type: text
    content: '!'
  - type: text
    content: He took the punishment, and that made us whole.
  - type: text
    content: Through his bruises we get healed.
  - type: text
    content: We’re all like sheep who’ve wandered off and gotten lost.
  - type: text
    content: We’ve all done our own thing, gone our own way.
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' has piled all our sins, everything we’ve done wrong,'
  - type: text
    content: on him, on him.
  '7':
  - type: text
    content: He was beaten, he was tortured,
  - type: text
    content: but he didn’t say a word.
  - type: text
    content: Like a lamb taken to be slaughtered
  - type: text
    content: and like a sheep being sheared,
  - type: text
    content: he took it all in silence.
  - type: text
    content: Justice miscarried, and he was led off—
  - type: text
    content: and did anyone really know what was happening?
  - type: text
    content: He died without a thought for his own welfare,
  - type: text
    content: beaten bloody for the sins of my people.
  - type: text
    content: They buried him with the wicked,
  - type: text
    content: threw him in a grave with a rich man,
  - type: text
    content: Even though he’d never hurt a soul
  - type: text
    content: or said one word that wasn’t true.
