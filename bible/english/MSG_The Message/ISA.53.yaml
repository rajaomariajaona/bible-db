document_id: ISA.53
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who believes what we’ve heard and seen?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who would have thought '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s saving power would look like this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-6
  - type: text
    text: The servant grew up before God—a scrawny seedling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scrubby plant in a parched field.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There was nothing attractive about him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing to cause us to take a second look.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was looked down on and passed over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man who suffered, who knew pain firsthand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One look at him and people turned away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We looked down on him, thought he was scum.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the fact is, it was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' pains he carried—'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' disfigurements, all the things wrong with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We thought he brought it on himself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God was punishing him for his own failures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it was our sins that did that to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that ripped and tore and crushed him—
  - type: usfm
    marker: it
    children:
    - type: text
      text: our sins
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took the punishment, and that made us whole.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Through his bruises we get healed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re all like sheep who’ve wandered off and gotten lost.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve all done our own thing, gone our own way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has piled all our sins, everything we’ve done wrong,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on him, on him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: He was beaten, he was tortured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he didn’t say a word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a lamb taken to be slaughtered
- type: usfm
  marker: q2
  children:
  - type: text
    text: and like a sheep being sheared,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he took it all in silence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Justice miscarried, and he was led off—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and did anyone really know what was happening?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He died without a thought for his own welfare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beaten bloody for the sins of my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They buried him with the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: threw him in a grave with a rich man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though he’d never hurt a soul
- type: usfm
  marker: q2
  children:
  - type: text
    text: or said one word that wasn’t true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Still, it’s what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had in mind all along,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to crush him with pain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The plan was that he give himself as an offering for sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that he’d see life come from it—life, life, and more life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s plan will deeply prosper through him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Out of that terrible travail of soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll see that it’s worth it and be glad he did it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through what he experienced, my righteous one, my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will make many “righteous ones,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he himself carries the burden of their sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore I’ll reward him extravagantly—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the best of everything, the highest honors—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because he looked death in the face and didn’t flinch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he embraced the company of the lowest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took on his own shoulders the sin of the many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he took up the cause of all the black sheep.
