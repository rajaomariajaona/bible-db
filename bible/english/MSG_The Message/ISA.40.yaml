document_id: ISA.40,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Messages of Comfort
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Prepare for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Arrival
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Comfort, oh comfort my people,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: says your God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Speak softly and tenderly to Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but also make it very clear
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That she has served her sentence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that her sin is taken care of—forgiven!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s been punished enough and more than enough,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now it’s over and done with.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has scooped up the ocean
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in his two hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or measured the sky between his thumb and little finger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has put all the earth’s dirt in one of his baskets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: weighed each mountain and hill?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who could ever have told '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' what to do'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or taught him his business?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What expert would he have gone to for advice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what school would he attend to learn justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What god do you suppose might have taught him what he knows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: showed him how things work?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, the nations are but a drop in a bucket,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mere smudge on a window.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch him sweep up the islands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like so much dust off the floor!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There aren’t enough trees in Lebanon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor enough animals in those vast forests
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to furnish adequate fuel and offerings for his worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations add up to simply nothing before him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: less than nothing is more like it. A minus.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So who even comes close to being like God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To whom or what can you compare him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some no-god idol? Ridiculous!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s made in a workshop, cast in bronze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Given a thin veneer of gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and draped with silver filigree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, perhaps someone will select a fine wood—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: olive wood, say—that won’t rot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then hire a woodcarver to make a no-god,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: giving special care to its base so it won’t tip over!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you not been paying attention?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you not been listening?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haven’t you heard these stories all your life?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you understand the foundation of all things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sits high above the round ball of earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The people look like mere ants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stretches out the skies like a canvas—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, like a tent canvas to live under.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He ignores what all the princes say and do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The rulers of the earth count for nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Princes and rulers don’t amount to much.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like seeds barely rooted, just sprouted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shrivel when God blows on them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like flecks of chaff, they’re gone with the wind.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So—who is like me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who holds a candle to me?” says The Holy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look at the night skies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who do you think made all this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who marches this army of stars out each night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: counts them off, calls each by name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: —so magnificent! so powerful!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never overlooks a single one?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you ever complain, O Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or, whine, Israel, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has lost track of me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He doesn’t care what happens to me”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you know anything? Haven’t you been listening?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' doesn’t come and go. God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lasts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s Creator of all you can see or imagine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He doesn’t get tired out, doesn’t pause to catch his breath.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he knows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: everything
    - type: text
      text: ', inside and out.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He energizes those who get tired,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gives fresh strength to dropouts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For even young people tire and drop out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young folk in their prime stumble and fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But those who wait upon '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' get fresh strength.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They spread their wings and soar like eagles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They run and don’t get tired,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they walk and don’t lag behind.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thunder in the desert!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Prepare for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s arrival!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the road straight and smooth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a highway fit for our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fill in the valleys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: level off the hills,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smooth out the ruts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clear out the rocks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s bright glory will shine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone will see it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes. Just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has said.”'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A voice says, “Shout!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I said, “What shall I shout?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “These people are nothing but grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their love fragile as wildflowers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grass withers, the wildflowers fade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'if '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' so much as puffs on them.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Aren’t these people just so much grass?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True, the grass withers and the wildflowers fade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but our God’s Word stands firm and forever.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Climb a high mountain, Zion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re the preacher of good news.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise your voice. Make it good and loud, Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re the preacher of good news.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Speak loud and clear. Don’t be timid!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the cities of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Look! Your God!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look at him! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, comes in power,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to go into action.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is going to pay back his enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reward those who have loved him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a shepherd, he will care for his flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gathering the lambs in his arms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hugging them as he carries them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leading the nursing ewes to good pasture.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Creator of All You Can See or Imagine
    marker-yv: yv-h
