document_id: ISA.40,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Messages of Comfort
  - type: heading
    content: Prepare for God’s Arrival
  - type: text
    content: “Comfort, oh comfort my people,”
  - type: text
    content: says your God.
  - type: text
    content: “Speak softly and tenderly to Jerusalem,
  - type: text
    content: but also make it very clear
  - type: text
    content: That she has served her sentence,
  - type: text
    content: that her sin is taken care of—forgiven!
  - type: text
    content: She’s been punished enough and more than enough,
  - type: text
    content: and now it’s over and done with.”
  '12':
  - type: text
    content: Who has scooped up the ocean
  - type: text
    content: in his two hands,
  - type: text
    content: or measured the sky between his thumb and little finger,
  - type: text
    content: Who has put all the earth’s dirt in one of his baskets,
  - type: text
    content: weighed each mountain and hill?
  - type: text
    content: 'Who could ever have told '
  - type: text
    content: God
  - type: text
    content: ' what to do'
  - type: text
    content: or taught him his business?
  - type: text
    content: What expert would he have gone to for advice,
  - type: text
    content: what school would he attend to learn justice?
  - type: text
    content: What god do you suppose might have taught him what he knows,
  - type: text
    content: showed him how things work?
  - type: text
    content: Why, the nations are but a drop in a bucket,
  - type: text
    content: a mere smudge on a window.
  - type: text
    content: Watch him sweep up the islands
  - type: text
    content: like so much dust off the floor!
  - type: text
    content: There aren’t enough trees in Lebanon
  - type: text
    content: nor enough animals in those vast forests
  - type: text
    content: to furnish adequate fuel and offerings for his worship.
  - type: text
    content: All the nations add up to simply nothing before him—
  - type: text
    content: less than nothing is more like it. A minus.
  '18':
  - type: text
    content: So who even comes close to being like God?
  - type: text
    content: To whom or what can you compare him?
  - type: text
    content: Some no-god idol? Ridiculous!
  - type: text
    content: It’s made in a workshop, cast in bronze,
  - type: text
    content: Given a thin veneer of gold,
  - type: text
    content: and draped with silver filigree.
  - type: text
    content: Or, perhaps someone will select a fine wood—
  - type: text
    content: olive wood, say—that won’t rot,
  - type: text
    content: Then hire a woodcarver to make a no-god,
  - type: text
    content: giving special care to its base so it won’t tip over!
  '21':
  - type: text
    content: Have you not been paying attention?
  - type: text
    content: Have you not been listening?
  - type: text
    content: Haven’t you heard these stories all your life?
  - type: text
    content: Don’t you understand the foundation of all things?
  - type: text
    content: God sits high above the round ball of earth.
  - type: text
    content: The people look like mere ants.
  - type: text
    content: He stretches out the skies like a canvas—
  - type: text
    content: yes, like a tent canvas to live under.
  - type: text
    content: He ignores what all the princes say and do.
  - type: text
    content: The rulers of the earth count for nothing.
  - type: text
    content: Princes and rulers don’t amount to much.
  - type: text
    content: Like seeds barely rooted, just sprouted,
  - type: text
    content: They shrivel when God blows on them.
  - type: text
    content: Like flecks of chaff, they’re gone with the wind.
  '25':
  - type: text
    content: “So—who is like me?
  - type: text
    content: Who holds a candle to me?” says The Holy.
  - type: text
    content: 'Look at the night skies:'
  - type: text
    content: Who do you think made all this?
  - type: text
    content: Who marches this army of stars out each night,
  - type: text
    content: counts them off, calls each by name
  - type: text
    content: —so magnificent! so powerful!—
  - type: text
    content: and never overlooks a single one?
  '27':
  - type: text
    content: Why would you ever complain, O Jacob,
  - type: text
    content: or, whine, Israel, saying,
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' has lost track of me.'
  - type: text
    content: He doesn’t care what happens to me”?
  - type: text
    content: Don’t you know anything? Haven’t you been listening?
  - type: text
    content: God
  - type: text
    content: ' doesn’t come and go. God '
  - type: text
    content: lasts.
  - type: text
    content: He’s Creator of all you can see or imagine.
  - type: text
    content: He doesn’t get tired out, doesn’t pause to catch his breath.
  - type: text
    content: 'And he knows '
  - type: text
    content: everything
  - type: text
    content: ', inside and out.'
  - type: text
    content: He energizes those who get tired,
  - type: text
    content: gives fresh strength to dropouts.
  - type: text
    content: For even young people tire and drop out,
  - type: text
    content: young folk in their prime stumble and fall.
  - type: text
    content: 'But those who wait upon '
  - type: text
    content: God
  - type: text
    content: ' get fresh strength.'
  - type: text
    content: They spread their wings and soar like eagles,
  - type: text
    content: They run and don’t get tired,
  - type: text
    content: they walk and don’t lag behind.
  '3':
  - type: text
    content: Thunder in the desert!
  - type: text
    content: '“Prepare for '
  - type: text
    content: God
  - type: text
    content: ’s arrival!
  - type: text
    content: Make the road straight and smooth,
  - type: text
    content: a highway fit for our God.
  - type: text
    content: Fill in the valleys,
  - type: text
    content: level off the hills,
  - type: text
    content: Smooth out the ruts,
  - type: text
    content: clear out the rocks.
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ’s bright glory will shine
  - type: text
    content: and everyone will see it.
  - type: text
    content: 'Yes. Just as '
  - type: text
    content: God
  - type: text
    content: ' has said.”'
  '6':
  - type: text
    content: A voice says, “Shout!”
  - type: text
    content: I said, “What shall I shout?”
  - type: text
    content: “These people are nothing but grass,
  - type: text
    content: their love fragile as wildflowers.
  - type: text
    content: The grass withers, the wildflowers fade,
  - type: text
    content: 'if '
  - type: text
    content: God
  - type: text
    content: ' so much as puffs on them.'
  - type: text
    content: Aren’t these people just so much grass?
  - type: text
    content: True, the grass withers and the wildflowers fade,
  - type: text
    content: but our God’s Word stands firm and forever.”
  '9':
  - type: text
    content: Climb a high mountain, Zion.
  - type: text
    content: You’re the preacher of good news.
  - type: text
    content: Raise your voice. Make it good and loud, Jerusalem.
  - type: text
    content: You’re the preacher of good news.
  - type: text
    content: Speak loud and clear. Don’t be timid!
  - type: text
    content: Tell the cities of Judah,
  - type: text
    content: “Look! Your God!”
  - type: text
    content: 'Look at him! '
  - type: text
    content: God
  - type: text
    content: ', the Master, comes in power,'
  - type: text
    content: ready to go into action.
  - type: text
    content: He is going to pay back his enemies
  - type: text
    content: and reward those who have loved him.
  - type: text
    content: Like a shepherd, he will care for his flock,
  - type: text
    content: gathering the lambs in his arms,
  - type: text
    content: Hugging them as he carries them,
  - type: text
    content: leading the nursing ewes to good pasture.
  - type: heading
    content: The Creator of All You Can See or Imagine
