document_id: JER.45,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Piling On the Pain
  - type: text
    content: 'This is what Jeremiah told Baruch one day in the fourth year of Jehoiakim’s reign as he was taking dictation from the prophet:'
  '2':
  - type: text
    content: '“These are the words of '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, to you, Baruch. You say, ‘These are bad times for me! It’s one thing after another. '
  - type: text
    content: God
  - type: text
    content: ' is piling on the pain. I’m worn out and there’s no end in sight.’'
  '4':
  - type: text
    content: '“But '
  - type: text
    content: God
  - type: text
    content: ' says, ‘Look around. What I’ve built I’m about to wreck, and what I’ve planted I’m about to rip up. And I’m doing it everywhere—all over the whole earth! So forget about making any big plans for yourself. Things are going to get worse before they get better. But don’t worry. I’ll keep you alive through the whole business.’”'
