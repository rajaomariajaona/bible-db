      text: God
  - type: text
    text: ’s Piling On the Pain
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what Jeremiah told Baruch one day in the fourth year of Jehoiakim’s reign as he was taking dictation from the prophet:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“These are the words of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, to you, Baruch. You say, ‘These are bad times for me! It’s one thing after another. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is piling on the pain. I’m worn out and there’s no end in sight.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: '“But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, ‘Look around. What I’ve built I’m about to wreck, and what I’ve planted I’m about to rip up. And I’m doing it everywhere—all over the whole earth! So forget about making any big plans for yourself. Things are going to get worse before they get better. But don’t worry. I’ll keep you alive through the whole business.’”'
