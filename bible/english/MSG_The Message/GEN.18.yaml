document_id: GEN.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' appeared to Abraham at the Oaks of Mamre while he was sitting at the entrance of his tent. It was the hottest part of the day. He looked up and saw three men standing. He ran from his tent to greet them and bowed before them.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: One of them said, “I’m coming back about this time next year. When I arrive, your wife Sarah will have a son.” Sarah was listening at the tent opening, just behind the man.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: Abraham and Sarah were old by this time, very old. Sarah was far past the age for having babies. Sarah laughed within herself, “An old woman like me? Get pregnant? With this old man of a husband?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Abraham, “Why did Sarah laugh saying, ‘Me? Have a baby? An old woman like me?’ Is anything too hard for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '? I’ll be back about this time next year and Sarah will have a baby.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sarah lied. She said, “I didn’t laugh,” because she was afraid.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he said, “Yes you did; you laughed.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When the men got up to leave, they set off for Sodom. Abraham walked with them to say good-bye.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-19
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Shall I keep back from Abraham what I’m about to do? Abraham is going to become a large and strong nation; all the nations of the world are going to find themselves blessed through him. Yes, I’ve settled on him as the one to train his children and future family to observe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s way of life, live kindly and generously and fairly, so that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' can complete in Abraham what he promised him.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' continued, “The cries of the victims in Sodom and Gomorrah are deafening; the sin of those cities is immense. I’m going down to see for myself, see if what they’re doing is as bad as it sounds. Then I’ll know.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The men set out for Sodom, but Abraham stood in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s path, blocking his way.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: Abraham confronted him, “Are you serious? Are you planning on getting rid of the good people right along with the bad? What if there are fifty decent people left in the city; will you lump the good with the bad and get rid of the lot? Wouldn’t you spare the city for the sake of those fifty innocents? I can’t believe you’d do that, kill off the good and the bad alike as if there were no difference between them. Doesn’t the Judge of all the Earth judge with justice?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “If I find fifty decent people in the city of Sodom, I’ll spare the place just for them.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: Abraham came back, “Do I, a mere mortal made from a handful of dirt, dare open my mouth again to my Master? What if the fifty fall short by five—would you destroy the city because of those missing five?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “I won’t destroy it if there are forty-five.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Abraham spoke up again, “What if you only find forty?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Neither will I destroy it if for forty.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: He said, “Master, if it please you, stop for a while with your servant. I’ll get some water so you can wash your feet. Rest under this tree. I’ll get some food to refresh you on your way, since your travels have brought you across my path.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Certainly. Go ahead.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: He said, “Master, don’t be irritated with me, but what if only thirty are found?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, I won’t do it if I find thirty.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: He pushed on, “I know I’m trying your patience, Master, but how about for twenty?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I won’t destroy it for twenty.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He wouldn’t quit, “Don’t get angry, Master—this is the last time. What if you only come up with ten?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For the sake of only ten, I won’t destroy the city.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' finished talking with Abraham, he left. And Abraham went home.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Abraham hurried into the tent to Sarah. He said, “Hurry. Get three cups of our best flour; knead it and make bread.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: Then Abraham ran to the cattle pen and picked out a nice plump calf and gave it to the servant who lost no time getting it ready. Then he got curds and milk, brought them with the calf that had been roasted, set the meal before the men, and stood there under the tree while they ate.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The men said to him, “Where is Sarah your wife?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “In the tent.”
