document_id: ISA.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Holy, Holy, Holy!
  - type: text
    content: In the year that King Uzziah died, I saw the Master sitting on a throne—high, exalted!—and the train of his robes filled the Temple. Angel-seraphs hovered above him, each with six wings. With two wings they covered their faces, with two their feet, and with two they flew. And they called back and forth one to the other,
  - type: text
    content: 'Holy, Holy, Holy is '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: His bright glory fills the whole earth.
  - type: text
    content: The foundations trembled at the sound of the angel voices, and then the whole house filled with smoke. I said,
  - type: text
    content: “Doom! It’s Doomsday!
  - type: text
    content: I’m as good as dead!
  - type: text
    content: Every word I’ve ever spoken is tainted—
  - type: text
    content: blasphemous even!
  - type: text
    content: And the people I live with talk the same way,
  - type: text
    content: using words that corrupt and desecrate.
  - type: text
    content: And here I’ve looked God in the face!
  - type: text
    content: 'The King! '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!”
  - type: text
    content: Then one of the angel-seraphs flew to me. He held a live coal that he had taken with tongs from the altar. He touched my mouth with the coal and said,
  - type: text
    content: “Look. This coal has touched your lips.
  - type: text
    content: Gone your guilt,
  - type: text
    content: your sins wiped out.”
  - type: text
    content: 'And then I heard the voice of the Master:'
  - type: text
    content: “Whom shall I send?
  - type: text
    content: Who will go for us?”
  - type: text
    content: I spoke up,
  - type: text
    content: “I’ll go.
  - type: text
    content: Send me!”
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: Astonished, I said,
  - type: text
    content: “And Master, how long is this to go on?”
  - type: text
    content: He said, “Until the cities are emptied out,
  - type: text
    content: not a soul left in the cities—
  - type: text
    content: Houses empty of people,
  - type: text
    content: countryside empty of people.
  - type: text
    content: 'Until I, '
  - type: text
    content: God
  - type: text
    content: ', get rid of everyone, sending them off,'
  - type: text
    content: the land totally empty.
  - type: text
    content: And even if some should survive, say a tenth,
  - type: text
    content: the devastation will start up again.
  - type: text
    content: The country will look like pine and oak forest
  - type: text
    content: with every tree cut down—
  - type: text
    content: Every tree a stump, a huge field of stumps.
  - type: text
    content: But there’s a holy seed in those stumps.”
  '9':
  - type: text
    content: 'He said, “Go and tell this people:'
  - type: text
    content: “‘Listen hard, but you aren’t going to get it;
  - type: text
    content: look hard, but you won’t catch on.’
  - type: text
    content: Make these people blockheads,
  - type: text
    content: with fingers in their ears and blindfolds on their eyes,
  - type: text
    content: So they won’t see a thing,
  - type: text
    content: won’t hear a word,
  - type: text
    content: So they won’t have a clue about what’s going on
  - type: text
    content: and, yes, so they won’t turn around and be made whole.”
