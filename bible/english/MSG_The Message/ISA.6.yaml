document_id: ISA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Holy, Holy, Holy!
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-8
  - type: text
    text: In the year that King Uzziah died, I saw the Master sitting on a throne—high, exalted!—and the train of his robes filled the Temple. Angel-seraphs hovered above him, each with six wings. With two wings they covered their faces, with two their feet, and with two they flew. And they called back and forth one to the other,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Holy, Holy, Holy is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His bright glory fills the whole earth.
- type: usfm
  marker: m
  children:
  - type: text
    text: The foundations trembled at the sound of the angel voices, and then the whole house filled with smoke. I said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Doom! It’s Doomsday!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m as good as dead!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every word I’ve ever spoken is tainted—
- type: usfm
  marker: q2
  children:
  - type: text
    text: blasphemous even!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people I live with talk the same way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: using words that corrupt and desecrate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And here I’ve looked God in the face!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The King! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!”
- type: usfm
  marker: m
  children:
  - type: text
    text: Then one of the angel-seraphs flew to me. He held a live coal that he had taken with tongs from the altar. He touched my mouth with the coal and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look. This coal has touched your lips.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gone your guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your sins wiped out.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And then I heard the voice of the Master:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Whom shall I send?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will go for us?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: I spoke up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’ll go.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Send me!”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'He said, “Go and tell this people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Listen hard, but you aren’t going to get it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: look hard, but you won’t catch on.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make these people blockheads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with fingers in their ears and blindfolds on their eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they won’t see a thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t hear a word,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they won’t have a clue about what’s going on
- type: usfm
  marker: q2
  children:
  - type: text
    text: and, yes, so they won’t turn around and be made whole.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: Astonished, I said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “And Master, how long is this to go on?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: He said, “Until the cities are emptied out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a soul left in the cities—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Houses empty of people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: countryside empty of people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', get rid of everyone, sending them off,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land totally empty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even if some should survive, say a tenth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the devastation will start up again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The country will look like pine and oak forest
- type: usfm
  marker: q2
  children:
  - type: text
    text: with every tree cut down—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every tree a stump, a huge field of stumps.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But there’s a holy seed in those stumps.”
