document_id: EXO.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Ten: Death'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses: “I’m going to hit Pharaoh and Egypt one final time, and then he’ll let you go. When he releases you, that will be the end of Egypt for you; he won’t be able to get rid of you fast enough.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“So here’s what you do. Tell the people to ask, each man from his neighbor and each woman from her neighbor, for things made of silver and gold.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saw to it that the Egyptians liked the people. Also, Moses was greatly admired by the Egyptians, a respected public figure among both Pharaoh’s servants and the people at large.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: 'Then Moses confronted Pharaoh: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: ‘At midnight I will go through Egypt and every firstborn child in Egypt will die, from the firstborn of Pharaoh, who sits on his throne, to the firstborn of the slave girl working at her hand mill. Also the firstborn of animals. Widespread wailing will erupt all over the country, lament such as has never been and never will be again. But against the Israelites—man, woman, or animal—there won’t be so much as a dog’s bark, so that you’ll know that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' makes a clear distinction between Egypt and Israel.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Then all these servants of yours will grovel before me, begging me to leave, ‘Leave! You and all the people who follow you!’ And I will most certainly leave.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Moses, seething with anger, left Pharaoh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Pharaoh’s not going to listen to a thing you say so that the signs of my presence and work are going to multiply in the land of Egypt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moses and Aaron had performed all these signs in Pharaoh’s presence, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turned Pharaoh more stubborn than ever—yet again he refused to release the Israelites from his land.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
