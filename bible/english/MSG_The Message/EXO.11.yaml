document_id: EXO.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Strike Ten: Death'
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses: “I’m going to hit Pharaoh and Egypt one final time, and then he’ll let you go. When he releases you, that will be the end of Egypt for you; he won’t be able to get rid of you fast enough.'
  '10':
  - type: text
    content: 'Moses and Aaron had performed all these signs in Pharaoh’s presence, but '
  - type: text
    content: God
  - type: text
    content: ' turned Pharaoh more stubborn than ever—yet again he refused to release the Israelites from his land.'
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: '“So here’s what you do. Tell the people to ask, each man from his neighbor and each woman from her neighbor, for things made of silver and gold.” '
  - type: text
    content: God
  - type: text
    content: ' saw to it that the Egyptians liked the people. Also, Moses was greatly admired by the Egyptians, a respected public figure among both Pharaoh’s servants and the people at large.'
  '4':
  - type: text
    content: 'Then Moses confronted Pharaoh: “'
  - type: text
    content: God
  - type: text
    content: '’s Message: ‘At midnight I will go through Egypt and every firstborn child in Egypt will die, from the firstborn of Pharaoh, who sits on his throne, to the firstborn of the slave girl working at her hand mill. Also the firstborn of animals. Widespread wailing will erupt all over the country, lament such as has never been and never will be again. But against the Israelites—man, woman, or animal—there won’t be so much as a dog’s bark, so that you’ll know that '
  - type: text
    content: God
  - type: text
    content: ' makes a clear distinction between Egypt and Israel.’'
  '8':
  - type: text
    content: “Then all these servants of yours will grovel before me, begging me to leave, ‘Leave! You and all the people who follow you!’ And I will most certainly leave.”
  - type: text
    content: Moses, seething with anger, left Pharaoh.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Pharaoh’s not going to listen to a thing you say so that the signs of my presence and work are going to multiply in the land of Egypt.”'
