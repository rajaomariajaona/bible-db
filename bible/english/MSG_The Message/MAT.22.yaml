type_code: eng
verses:
  '1':
  - type: heading
    content: The Story of the Wedding Banquet
  - type: text
    content: Jesus responded by telling still more stories. “God’s kingdom,” he said, “is like a king who threw a wedding banquet for his son. He sent out servants to call in all the invited guests. And they wouldn’t come!
  '11':
  - type: text
    content: “When the king entered and looked over the scene, he spotted a man who wasn’t properly dressed. He said to him, ‘Friend, how dare you come in here looking like that!’ The man was speechless. Then the king told his servants, ‘Get him out of here—fast. Tie him up and ship him to hell. And make sure he doesn’t get back in.’
  '14':
  - type: text
    content: “That’s what I mean when I say, ‘Many get invited; only a few make it.’”
  - type: heading
    content: Paying Taxes
  '15':
  - type: text
    content: 'That’s when the Pharisees plotted a way to trap him into saying something damaging. They sent their disciples, with a few of Herod’s followers mixed in, to ask, “Teacher, we know you have integrity, teach the way of God accurately, are indifferent to popular opinion, and don’t pander to your students. So tell us honestly: Is it right to pay taxes to Caesar or not?”'
  '18':
  - type: text
    content: Jesus knew they were up to no good. He said, “Why are you playing these games with me? Why are you trying to trap me? Do you have a coin? Let me see it.” They handed him a silver piece.
  '20':
  - type: text
    content: “This engraving—who does it look like? And whose name is on it?”
  '21':
  - type: text
    content: They said, “Caesar.”
  - type: text
    content: “Then give Caesar what is his, and give God what is his.”
  '22':
  - type: text
    content: The Pharisees were speechless. They went off shaking their heads.
  - type: heading
    content: Marriage and Resurrection
  '23':
  - type: text
    content: 'That same day, Sadducees approached him. This is the party that denies any possibility of resurrection. They asked, “Teacher, Moses said that if a man dies childless, his brother is obligated to marry his widow and father a child with her. Here’s a case where there were seven brothers. The first brother married and died, leaving no child, and his wife passed to his brother. The second brother also left her childless, then the third—and on and on, all seven. Eventually the wife died. Now here’s our question: At the resurrection, whose wife is she? She was a wife to each of them.”'
  '29':
  - type: text
    content: 'Jesus answered, “You’re off base on two counts: You don’t know what God said, and you don’t know how God works. At the resurrection we’re beyond marriage. As with the angels, all our ecstasies and intimacies then will be with God. And regarding your speculation on whether the dead are raised or not, don’t you read your Bibles? The grammar is clear: God says, ‘I am—not '
  - type: text
    content: was—
  - type: text
    content: 'the God of Abraham, the God of Isaac, the God of Jacob.’ The living God defines himself not as the God of dead men, but of the '
  - type: text
    content: living
  - type: text
    content: .” Hearing this exchange the crowd was much impressed.
  - type: heading
    content: The Most Important Command
  '34':
  - type: text
    content: 'When the Pharisees heard how he had bested the Sadducees, they gathered their forces for an assault. One of their religion scholars spoke for them, posing a question they hoped would show him up: “Teacher, which command in God’s Law is the most important?”'
  '37':
  - type: text
    content: 'Jesus said, “‘Love the Lord your God with all your passion and prayer and intelligence.’ This is the most important, the first on any list. But there is a second to set alongside it: ‘Love others as well as you love yourself.’ These two commands are pegs; everything in God’s Law and the Prophets hangs from them.”'
  - type: heading
    content: David’s Son and Master
  '4':
  - type: text
    content: “He sent out another round of servants, instructing them to tell the guests, ‘Look, everything is on the table, the prime rib is ready for carving. Come to the feast!’
  '41':
  - type: text
    content: 'As the Pharisees were regrouping, Jesus caught them off balance with his own test question: “What do you think about the Christ? Whose son is he?” They said, “David’s son.”'
  '43':
  - type: text
    content: Jesus replied, “Well, if the Christ is David’s son, how do you explain that David, under inspiration, named Christ his ‘Master’?
  - type: text
    content: God said to my Master,
  - type: text
    content: “Sit here at my right hand
  - type: text
    content: until I make your enemies your footstool.”
  - type: text
    content: “Now if David calls him ‘Master,’ how can he at the same time be his son?”
  '46':
  - type: text
    content: That stumped them, literalists that they were. Unwilling to risk losing face again in one of these public verbal exchanges, they quit asking questions for good.
  '5':
  - type: text
    content: “They only shrugged their shoulders and went off, one to weed his garden, another to work in his shop. The rest, with nothing better to do, beat up on the messengers and then killed them. The king was outraged and sent his soldiers to destroy those thugs and level their city.
  '8':
  - type: text
    content: “Then he told his servants, ‘We have a wedding banquet all prepared but no guests. The ones I invited weren’t up to it. Go out into the busiest intersections in town and invite anyone you find to the banquet.’ The servants went out on the streets and rounded up everyone they laid eyes on, good and bad, regardless. And so the banquet was on—every place filled.
