document_id: MAT.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Story of the Wedding Banquet
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Jesus responded by telling still more stories. “God’s kingdom,” he said, “is like a king who threw a wedding banquet for his son. He sent out servants to call in all the invited guests. And they wouldn’t come!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “He sent out another round of servants, instructing them to tell the guests, ‘Look, everything is on the table, the prime rib is ready for carving. Come to the feast!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: “They only shrugged their shoulders and went off, one to weed his garden, another to work in his shop. The rest, with nothing better to do, beat up on the messengers and then killed them. The king was outraged and sent his soldiers to destroy those thugs and level their city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: “Then he told his servants, ‘We have a wedding banquet all prepared but no guests. The ones I invited weren’t up to it. Go out into the busiest intersections in town and invite anyone you find to the banquet.’ The servants went out on the streets and rounded up everyone they laid eyes on, good and bad, regardless. And so the banquet was on—every place filled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: “When the king entered and looked over the scene, he spotted a man who wasn’t properly dressed. He said to him, ‘Friend, how dare you come in here looking like that!’ The man was speechless. Then the king told his servants, ‘Get him out of here—fast. Tie him up and ship him to hell. And make sure he doesn’t get back in.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “That’s what I mean when I say, ‘Many get invited; only a few make it.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paying Taxes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: 'That’s when the Pharisees plotted a way to trap him into saying something damaging. They sent their disciples, with a few of Herod’s followers mixed in, to ask, “Teacher, we know you have integrity, teach the way of God accurately, are indifferent to popular opinion, and don’t pander to your students. So tell us honestly: Is it right to pay taxes to Caesar or not?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Jesus knew they were up to no good. He said, “Why are you playing these games with me? Why are you trying to trap me? Do you have a coin? Let me see it.” They handed him a silver piece.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “This engraving—who does it look like? And whose name is on it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They said, “Caesar.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Then give Caesar what is his, and give God what is his.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The Pharisees were speechless. They went off shaking their heads.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marriage and Resurrection
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-28
  - type: text
    text: 'That same day, Sadducees approached him. This is the party that denies any possibility of resurrection. They asked, “Teacher, Moses said that if a man dies childless, his brother is obligated to marry his widow and father a child with her. Here’s a case where there were seven brothers. The first brother married and died, leaving no child, and his wife passed to his brother. The second brother also left her childless, then the third—and on and on, all seven. Eventually the wife died. Now here’s our question: At the resurrection, whose wife is she? She was a wife to each of them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: 'Jesus answered, “You’re off base on two counts: You don’t know what God said, and you don’t know how God works. At the resurrection we’re beyond marriage. As with the angels, all our ecstasies and intimacies then will be with God. And regarding your speculation on whether the dead are raised or not, don’t you read your Bibles? The grammar is clear: God says, ‘I am—not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was—
  - type: text
    text: 'the God of Abraham, the God of Isaac, the God of Jacob.’ The living God defines himself not as the God of dead men, but of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: .” Hearing this exchange the crowd was much impressed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Most Important Command
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-36
  - type: text
    text: 'When the Pharisees heard how he had bested the Sadducees, they gathered their forces for an assault. One of their religion scholars spoke for them, posing a question they hoped would show him up: “Teacher, which command in God’s Law is the most important?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-40
  - type: text
    text: 'Jesus said, “‘Love the Lord your God with all your passion and prayer and intelligence.’ This is the most important, the first on any list. But there is a second to set alongside it: ‘Love others as well as you love yourself.’ These two commands are pegs; everything in God’s Law and the Prophets hangs from them.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Son and Master
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: 'As the Pharisees were regrouping, Jesus caught them off balance with his own test question: “What do you think about the Christ? Whose son is he?” They said, “David’s son.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-45
  - type: text
    text: Jesus replied, “Well, if the Christ is David’s son, how do you explain that David, under inspiration, named Christ his ‘Master’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: God said to my Master,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Sit here at my right hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: until I make your enemies your footstool.”
- type: usfm
  marker: m
  children:
  - type: text
    text: “Now if David calls him ‘Master,’ how can he at the same time be his son?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: That stumped them, literalists that they were. Unwilling to risk losing face again in one of these public verbal exchanges, they quit asking questions for good.
