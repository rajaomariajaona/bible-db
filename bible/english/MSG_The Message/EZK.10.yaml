document_id: EZK.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Temple, Filled with the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When I next looked, oh! Above the dome over the heads of the cherubim-angels was what looked like a throne, sky-blue, like a sapphire!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to the man dressed in linen, “Enter the place of the wheels under the cherubim-angels. Fill your hands with burning coals from beneath the cherubim and scatter them over the city.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I watched as he entered. The cherubim were standing on the south side of the Temple when the man entered. A cloud filled the inside courtyard. Then the Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' ascended from the cherubim and moved to the threshold of the Temple. The cloud filled the Temple. Court and Temple were both filled with the blazing presence of the Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . And the sound! The wings of the cherubim were audible all the way to the outer court—the sound of the voice was like The Strong God in thunder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded the man dressed in linen, “Take fire from among the wheels, from between the cherubim,” he went in and stood beside a wheel. One of the cherubim reached into the fire, took some coals, and put them in the hands of the man dressed in linen. He took them and went out. Something that looked like a human hand could be seen under the wings of the cherubim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-13
  - type: text
    text: And then I saw four wheels beside the cherubim, one beside each cherub. The wheels radiating were sparkling like diamonds in the sun. All four wheels looked alike, each like a wheel within a wheel. When they moved, they went in any of the four directions but in a perfectly straight line. Where the cherubim went, the wheels went straight ahead. The cherubim were full of eyes in their backs, hands, and wings. The wheels likewise were full of eyes. I heard the wheels called “wheels within wheels.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Each of the cherubim had four faces: the first, of an angel; the second, a human; the third, a lion; the fourth, an eagle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: Then the cherubim ascended. They were the same living creatures I had seen at the Kebar River. When the cherubim moved, the wheels beside them moved. When the cherubim spread their wings to take off from the ground, the wheels stayed right with them. When the cherubim stopped, the wheels stopped. When the cherubim rose, the wheels rose, because the spirit of the living creatures was also in the wheels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'Then the Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' left the Temple entrance and hovered over the cherubim. I watched as the cherubim spread their wings and left the ground, the wheels right with them. They stopped at the entrance of the east gate of the Temple. The Glory of the God of Israel was above them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: These were the same living creatures I had seen previously beneath the God of Israel at the Kebar River. I recognized them as cherubim. Each had four faces and four wings. Under their wings were what looked like human hands. Their faces looked exactly like those I had seen at the Kebar River. Each went straight ahead.
