document_id: JOB.41,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Run This Universe
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-11
    - type: text
      text: “Or can you pull in the sea beast, Leviathan, with a fly rod
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stuff him in your creel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you lasso him with a rope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or snag him with an anchor?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he beg you over and over for mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or flatter you with flowery speech?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he apply for a job with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to run errands and serve you the rest of your life?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you play with him as if he were a pet goldfish?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you make him the mascot of the neighborhood children?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you put him on display in the market
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have shoppers haggle over the price?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Could you shoot him full of arrows like a pin cushion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or drive harpoons into his huge head?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you so much as lay a hand on him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you won’t live to tell the story.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What hope would you have with such a creature?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why, one look at him would do you in!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you can’t hold your own against his glowering visage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'how, then, do you expect to stand up to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who could confront me and get by with it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’m '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in charge
    - type: text
      text: ' of all this—I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: run
    - type: text
      text: ' this universe!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-17
    - type: text
      text: “But I’ve more to say about Leviathan, the sea beast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his enormous bulk, his beautiful shape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who would even dream of piercing that tough skin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or putting those jaws into bit and bridle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who would dare knock at the door of his mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filled with row upon row of fierce teeth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His pride is invincible;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing can make a dent in that pride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing can get through that proud skin—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: impervious to weapons and weather,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The thickest and toughest of hides,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: impenetrable!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-34
    - type: text
      text: “He snorts and the world lights up with fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he blinks and the dawn breaks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comets pour out of his mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fireworks arc and branch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smoke erupts from his nostrils
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like steam from a boiling pot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He blows and fires blaze;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flames of fire stream from his mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All muscle he is—sheer and seamless muscle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To meet him is to dance with death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinewy and lithe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there’s not a soft spot in his entire body—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As tough inside as out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rock-hard, invulnerable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even angels run for cover when he surfaces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cowering before his tail-thrashing turbulence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Javelins bounce harmlessly off his hide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: harpoons ricochet wildly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iron bars are so much straw to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bronze weapons beneath notice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrows don’t even make him blink;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bullets make no more impression than raindrops.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A battle ax is nothing but a splinter of kindling;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he treats a brandished harpoon as a joke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His belly is armor-plated, inexorable—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unstoppable as a barge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He roils deep ocean the way you’d boil water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he whips the sea like you’d whip an egg into batter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a luminous trail stretching out behind him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you might think Ocean had grown a gray beard!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing on this earth quite like him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'not an ounce of fear in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' creature!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He surveys all the high and mighty—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: king of the ocean, king of the deep!”
