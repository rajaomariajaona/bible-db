document_id: JOB.41,97
type_code: eng
verses:
  '1':
  - type: heading
    content: I Run This Universe
  - type: text
    content: “Or can you pull in the sea beast, Leviathan, with a fly rod
  - type: text
    content: and stuff him in your creel?
  - type: text
    content: Can you lasso him with a rope,
  - type: text
    content: or snag him with an anchor?
  - type: text
    content: Will he beg you over and over for mercy,
  - type: text
    content: or flatter you with flowery speech?
  - type: text
    content: Will he apply for a job with you
  - type: text
    content: to run errands and serve you the rest of your life?
  - type: text
    content: Will you play with him as if he were a pet goldfish?
  - type: text
    content: Will you make him the mascot of the neighborhood children?
  - type: text
    content: Will you put him on display in the market
  - type: text
    content: and have shoppers haggle over the price?
  - type: text
    content: Could you shoot him full of arrows like a pin cushion,
  - type: text
    content: or drive harpoons into his huge head?
  - type: text
    content: If you so much as lay a hand on him,
  - type: text
    content: you won’t live to tell the story.
  - type: text
    content: What hope would you have with such a creature?
  - type: text
    content: Why, one look at him would do you in!
  - type: text
    content: If you can’t hold your own against his glowering visage,
  - type: text
    content: 'how, then, do you expect to stand up to '
  - type: text
    content: me
  - type: text
    content: '?'
  - type: text
    content: Who could confront me and get by with it?
  - type: text
    content: 'I’m '
  - type: text
    content: in charge
  - type: text
    content: ' of all this—I '
  - type: text
    content: run
  - type: text
    content: ' this universe!'
  '12':
  - type: text
    content: “But I’ve more to say about Leviathan, the sea beast,
  - type: text
    content: his enormous bulk, his beautiful shape.
  - type: text
    content: Who would even dream of piercing that tough skin
  - type: text
    content: or putting those jaws into bit and bridle?
  - type: text
    content: And who would dare knock at the door of his mouth
  - type: text
    content: filled with row upon row of fierce teeth?
  - type: text
    content: His pride is invincible;
  - type: text
    content: nothing can make a dent in that pride.
  - type: text
    content: Nothing can get through that proud skin—
  - type: text
    content: impervious to weapons and weather,
  - type: text
    content: The thickest and toughest of hides,
  - type: text
    content: impenetrable!
  '18':
  - type: text
    content: “He snorts and the world lights up with fire,
  - type: text
    content: he blinks and the dawn breaks.
  - type: text
    content: Comets pour out of his mouth,
  - type: text
    content: fireworks arc and branch.
  - type: text
    content: Smoke erupts from his nostrils
  - type: text
    content: like steam from a boiling pot.
  - type: text
    content: He blows and fires blaze;
  - type: text
    content: flames of fire stream from his mouth.
  - type: text
    content: All muscle he is—sheer and seamless muscle.
  - type: text
    content: To meet him is to dance with death.
  - type: text
    content: Sinewy and lithe,
  - type: text
    content: there’s not a soft spot in his entire body—
  - type: text
    content: As tough inside as out,
  - type: text
    content: rock-hard, invulnerable.
  - type: text
    content: Even angels run for cover when he surfaces,
  - type: text
    content: cowering before his tail-thrashing turbulence.
  - type: text
    content: Javelins bounce harmlessly off his hide,
  - type: text
    content: harpoons ricochet wildly.
  - type: text
    content: Iron bars are so much straw to him,
  - type: text
    content: bronze weapons beneath notice.
  - type: text
    content: Arrows don’t even make him blink;
  - type: text
    content: bullets make no more impression than raindrops.
  - type: text
    content: A battle ax is nothing but a splinter of kindling;
  - type: text
    content: he treats a brandished harpoon as a joke.
  - type: text
    content: His belly is armor-plated, inexorable—
  - type: text
    content: unstoppable as a barge.
  - type: text
    content: He roils deep ocean the way you’d boil water,
  - type: text
    content: he whips the sea like you’d whip an egg into batter.
  - type: text
    content: With a luminous trail stretching out behind him,
  - type: text
    content: you might think Ocean had grown a gray beard!
  - type: text
    content: There’s nothing on this earth quite like him,
  - type: text
    content: 'not an ounce of fear in '
  - type: text
    content: that
  - type: text
    content: ' creature!'
  - type: text
    content: He surveys all the high and mighty—
  - type: text
    content: king of the ocean, king of the deep!”
