type_code: eng
verses:
  '1':
  - type: text
    content: Sarai, Abram’s wife, hadn’t yet produced a child.
  - type: text
    content: She had an Egyptian maid named Hagar. Sarai said to Abram, “
  - type: text
    content: God
  - type: text
    content: ' has not seen fit to let me have a child. Sleep with my maid. Maybe I can get a family from her.” Abram agreed to do what Sarai said.'
  '13':
  - type: text
    content: 'She answered '
  - type: text
    content: God
  - type: text
    content: ' by name, praying to the God who spoke to her, “You’re the God who sees me!'
  - type: text
    content: “Yes! He saw me; and then I saw him!”
  '14':
  - type: text
    content: That’s how that desert spring got named “God-Alive-Sees-Me Spring.” That spring is still there, between Kadesh and Bered.
  '15':
  - type: text
    content: Hagar gave Abram a son. Abram named him Ishmael. Abram was eighty-six years old when Hagar gave him his son, Ishmael.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: So Sarai, Abram’s wife, took her Egyptian maid Hagar and gave her to her husband Abram as a wife. Abram had been living ten years in Canaan when this took place. He slept with Hagar and she got pregnant. When Hagar learned she was pregnant, she looked down on her mistress.
  '5':
  - type: text
    content: 'Sarai told Abram, “It’s all your fault that I’m suffering this abuse. I put my maid in bed with you and the minute she knows she’s pregnant, she treats me like I’m nothing. May '
  - type: text
    content: God
  - type: text
    content: ' decide which of us is right.”'
  '6':
  - type: text
    content: “You decide,” said Abram. “Your maid is your business.”
  - type: text
    content: Sarai was abusive to Hagar and Hagar ran away.
  '7':
  - type: text
    content: 'An angel of '
  - type: text
    content: God
  - type: text
    content: ' found her beside a spring in the desert; it was the spring on the road to Shur. He said, “Hagar, maid of Sarai, what are you doing here?”'
  - type: text
    content: She said, “I’m running away from Sarai my mistress.”
  '9':
  - type: text
    content: 'The angel of '
  - type: text
    content: God
  - type: text
    content: ' said, “Go back to your mistress. Put up with her abuse.” He continued, “I’m going to give you a big family, children past counting.'
  - type: text
    content: 'From this pregnancy, you’ll get a son: Name him Ishmael;'
  - type: text
    content: 'for '
  - type: text
    content: God
  - type: text
    content: ' heard you, '
  - type: text
    content: God
  - type: text
    content: ' answered you.'
  - type: text
    content: He’ll be a bucking bronco of a man,
  - type: text
    content: a real fighter, fighting and being fought,
  - type: text
    content: Always stirring up trouble,
  - type: text
    content: always at odds with his family.”
