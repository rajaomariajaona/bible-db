document_id: GEN.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Sarai, Abram’s wife, hadn’t yet produced a child.
- type: usfm
  marker: p
  children:
  - type: text
    text: She had an Egyptian maid named Hagar. Sarai said to Abram, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has not seen fit to let me have a child. Sleep with my maid. Maybe I can get a family from her.” Abram agreed to do what Sarai said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: So Sarai, Abram’s wife, took her Egyptian maid Hagar and gave her to her husband Abram as a wife. Abram had been living ten years in Canaan when this took place. He slept with Hagar and she got pregnant. When Hagar learned she was pregnant, she looked down on her mistress.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sarai told Abram, “It’s all your fault that I’m suffering this abuse. I put my maid in bed with you and the minute she knows she’s pregnant, she treats me like I’m nothing. May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' decide which of us is right.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “You decide,” said Abram. “Your maid is your business.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Sarai was abusive to Hagar and Hagar ran away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'An angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' found her beside a spring in the desert; it was the spring on the road to Shur. He said, “Hagar, maid of Sarai, what are you doing here?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: She said, “I’m running away from Sarai my mistress.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: 'The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Go back to your mistress. Put up with her abuse.” He continued, “I’m going to give you a big family, children past counting.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From this pregnancy, you’ll get a son: Name him Ishmael;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' heard you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll be a bucking bronco of a man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a real fighter, fighting and being fought,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Always stirring up trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always at odds with his family.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'She answered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' by name, praying to the God who spoke to her, “You’re the God who sees me!'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes! He saw me; and then I saw him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: That’s how that desert spring got named “God-Alive-Sees-Me Spring.” That spring is still there, between Kadesh and Bered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: Hagar gave Abram a son. Abram named him Ishmael. Abram was eighty-six years old when Hagar gave him his son, Ishmael.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
