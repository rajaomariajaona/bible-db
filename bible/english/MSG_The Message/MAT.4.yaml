document_id: MAT.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Test
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Next Jesus was taken into the wild by the Spirit for the Test. The Devil was ready to give it. Jesus prepared for the Test by fasting forty days and forty nights. That left him, of course, in a state of extreme hunger, which the Devil took advantage of in the first test: “Since you are God’s Son, speak the word that will turn these stones into loaves of bread.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus answered by quoting Deuteronomy: “It takes more than bread to stay alive. It takes a steady stream of words from God’s mouth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'For the second test the Devil took him to the Holy City. He sat him on top of the Temple and said, “Since you are God’s Son, jump.” The Devil goaded him by quoting Psalm 91: “He has placed you in the care of angels. They will catch you so that you won’t so much as stub your toe on a stone.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus countered with another citation from Deuteronomy: “Don’t you dare test the Lord your God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: For the third test, the Devil took him to the peak of a huge mountain. He gestured expansively, pointing out all the earth’s kingdoms, how glorious they all were. Then he said, “They’re yours—lock, stock, and barrel. Just go down on your knees and worship me, and they’re yours.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus’ refusal was curt: “Beat it, Satan!” He backed his rebuke with a third quotation from Deuteronomy: “Worship the Lord your God, and only him. Serve him with absolute single-heartedness.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The Test was over. The Devil left. And in his place, angels! Angels came and took care of Jesus’ needs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teaching and Healing
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-17
  - type: text
    text: 'When Jesus got word that John had been arrested, he returned to Galilee. He moved from his hometown, Nazareth, to the lakeside village Capernaum, nestled at the base of the Zebulun and Naphtali hills. This move completed Isaiah’s revelation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Land of Zebulun, land of Naphtali,
- type: usfm
  marker: q2
  children:
  - type: text
    text: road to the sea, over Jordan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Galilee, crossroads for the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People sitting out their lives in the dark
- type: usfm
  marker: q2
  children:
  - type: text
    text: saw a huge light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sitting in that dark, dark country of death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they watched the sun come up.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'This Isaiah-prophesied revelation came to life in Galilee the moment Jesus started preaching. He picked up where John left off: “Change your life. God’s kingdom is here.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: 'Walking along the beach of Lake Galilee, Jesus saw two brothers: Simon (later called Peter) and Andrew. They were fishing, throwing their nets into the lake. It was their regular work. Jesus said to them, “Come with me. I’ll make a new kind of fisherman out of you. I’ll show you how to catch men and women instead of perch and bass.” They didn’t ask questions, but simply dropped their nets and followed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: A short distance down the beach they came upon another pair of brothers, James and John, Zebedee’s sons. These two were sitting in a boat with their father, Zebedee, mending their fishnets. Jesus made the same offer to them, and they were just as quick to follow, abandoning boat and father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: From there he went all over Galilee. He used synagogues for meeting places and taught people the truth of God. God’s kingdom was his theme—that beginning right now they were under God’s government, a good government! He also healed people of their diseases and of the bad effects of their bad lives. Word got around the entire Roman province of Syria. People brought anybody with a sickness, whether mental, emotional, or physical. Jesus healed them, one and all. More and more people came, the momentum gathering. Besides those from Galilee, crowds came from the “Ten Towns” across the lake, others up from Jerusalem and Judea, still others from across the Jordan.
