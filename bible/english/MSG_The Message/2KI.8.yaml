document_id: 2KI.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'Years before, Elisha had told the woman whose son he had brought to life, “Leave here and go, you and your family, and live someplace else. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has ordered a famine in the land; it will last for seven years.” The woman did what the Holy Man told her and left. She and her family lived as aliens in the country of Philistia for seven years. Then, when the seven years were up, the woman and her family came back. She went directly to the king and asked for her home and farm.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Elisha answered, “Go and tell him, ‘Don’t worry; you’ll live.’ The fact is, though—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' showed me—that he’s doomed to die.” Elisha then stared hard at Hazael, reading his heart. Hazael felt exposed and dropped his eyes. Then the Holy Man wept.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hazael said, “Why does my master weep?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Because,” said Elisha, “I know what you’re going to do to the children of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: burn down their forts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: murder their youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: smash their babies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rip open their pregnant women.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hazael said, “Am I a mongrel dog that I’d do such a horrible thing?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' showed me,” said Elisha, “that you’ll be king of Aram.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hazael left Elisha and returned to his master, who asked, “So, what did Elisha tell you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He told me, ‘Don’t worry; you’ll live.’”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But the very next day, someone took a heavy quilt, soaked it in water, covered the king’s face, and suffocated him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Hazael was king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoram of Judah
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: 'In the fifth year of the reign of Joram son of Ahab king of Israel, Jehoram son of Jehoshaphat king of Judah became king. He was thirty-two years old when he began his rule, and was king for eight years in Jerusalem. He copied the way of life of the kings of Israel, marrying into the Ahab family and continuing the Ahab line of sin—from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s point of view, an evil man living an evil life. But despite that, because of his servant David, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was not ready to destroy Judah. He had, after all, promised to keep a lamp burning through David’s descendants.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: During Jehoram’s reign, Edom revolted against Judah’s rule and set up their own king. Jehoram responded by taking his army of chariots to Zair.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Edom surrounded him, but in the middle of the night he and his charioteers broke through the lines and hit Edom hard. But his infantry deserted him.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Edom continues in revolt against Judah right up to the present. Even little Libnah revolted at that time.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'The rest of the life and times of Jehoram, the record of his rule, is written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Judah
    - type: text
      text: . Jehoram died and was buried in the family grave in the City of David. His son Ahaziah succeeded him as king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaziah of Judah
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-27
    - type: text
      text: In the twelfth year of the reign of Joram son of Ahab king of Israel, Ahaziah son of Jehoram king of Judah began his reign. Ahaziah was twenty-two years old when he became king; he ruled only a year in Jerusalem. His mother was Athaliah, granddaughter of Omri king of Israel. He lived and ruled just like the Ahab family had done, continuing the same evil-in-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s-sight line of sin, related by both marriage and sin to the Ahab clan.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: He joined Joram son of Ahab king of Israel in a war against Hazael king of Aram at Ramoth Gilead. The archers wounded Joram. Joram pulled back to Jezreel to convalesce from the injuries he had received in the fight with Hazael. Ahaziah son of Jehoram king of Judah paid a visit to Joram son of Ahab on his sickbed in Jezreel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: The king was talking with Gehazi, servant to the Holy Man, saying, “Tell me some stories of the great things Elisha did.” It so happened that as he was telling the king the story of the dead person brought back to life, the woman whose son was brought to life showed up asking for her home and farm.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gehazi said, “My master the king, this is the woman! And this is her son whom Elisha brought back to life!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The king wanted to know all about it, and so she told him the story. The king assigned an officer to take care of her, saying, “Make sure she gets everything back that’s hers, plus all profits from the farm from the time she left until now.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Elisha traveled to Damascus. Ben-Hadad, king of Aram, was sick at the time. He was told, “The Holy Man is in town.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The king ordered Hazael, “Take a gift with you and go meet the Holy Man. Ask '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' through him, ‘Am I going to recover from this sickness?’”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hazael went and met with Elisha. He brought with him every choice thing he could think of from Damascus—forty camel-loads of items! When he arrived he stood before Elisha and said, “Your son Ben-Hadad, king of Aram, sent me here to ask you, ‘Am I going to recover from this sickness?’”
