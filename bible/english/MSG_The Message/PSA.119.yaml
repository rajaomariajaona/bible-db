document_id: PSA.119,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-8
    - type: text
      text: You’re blessed when you stay on course,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'walking steadily on the road revealed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re blessed when you follow his directions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doing your best to find him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s right—you don’t go off on your own;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you walk straight along the road he set.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', prescribed the right way to live;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now you expect us to live it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that my steps might be steady,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keeping to the course you set;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’d never have any regrets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in comparing my life with your counsel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thank you for speaking straight from your heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I learn the pattern of your righteous ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going to do what you tell me to do;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t ever walk off and leave me.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 105-112
    - type: text
      text: By your words I can see where I’m going;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they throw a beam of light on my dark path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve committed myself and I’ll never turn back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from living by your righteous order.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Everything’s falling apart on me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put me together again with your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Adorn me with your finest sayings, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your holy rules.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My life is as close as my own hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t forget what you have revealed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked do their best to throw me off track,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t swerve an inch from your course.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I inherited your book on living; it’s mine forever—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what a gift! And how happy it makes me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I concentrate on doing exactly what you say—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I always have and always will.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 113-120
    - type: text
      text: I hate the two-faced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I love your clear-cut revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re my place of quiet retreat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wait for your Word to renew me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get out of my life, evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can keep my God’s commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take my side as you promised; I’ll live then for sure.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t disappoint all my grand hopes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stick with me and I’ll be all right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll give total allegiance to your definitions of life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Expose all who drift away from your sayings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their casual idolatry is lethal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You reject earth’s wicked as so much rubbish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I lovingly embrace everything you say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shiver in awe before you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your decisions leave me speechless with reverence.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 121-128
    - type: text
      text: I stood up for justice and the right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t leave me to the mercy of my oppressors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take the side of your servant, good God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t let the godless take advantage of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can’t keep my eyes open any longer, waiting for you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep your promise to set everything right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your love dictate how you deal with me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me from your textbook on life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m your servant—help me understand what that means,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the inner meaning of your instructions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s time to act, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ve made a shambles of your revelation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea-Saying God, I love what you command,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I love it better than gold and gemstones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea-Saying God, I honor everything you tell me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I despise every deceitful detour.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 129-136
    - type: text
      text: Every word you give me is a miracle word—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how could I help but obey?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break open your words, let the light shine out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let ordinary people see the meaning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mouth open and panting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wanted your commands more than anything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn my way, look kindly on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you always do to those who personally love you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Steady my steps with your Word of promise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so nothing malign gets the better of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from the grip of bad men and women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can live life your way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smile on me, your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me the right way to live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cry rivers of tears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because nobody’s living by your book!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 137-144
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' right and you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' right, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your decisions are right on target.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rightly instruct us in how to live
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever faithful to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My rivals nearly did me in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they persistently ignored your commandments.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your promise has been tested through and through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I, your servant, love it dearly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m too young to be important,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t forget what you tell me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness is eternally right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your revelation is the only truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though troubles came down on me hard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your commands always gave me delight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way you tell me to live is always right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: help me understand it so I can live to the fullest.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 145-152
    - type: text
      text: I call out at the top of my lungs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Answer! I’ll do whatever you say.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I called to you, “Save me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can carry out all your instructions.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was up before sunrise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crying for help, hoping for a word from you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stayed awake all night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prayerfully pondering your promise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your love, listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in your justice, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', keep me alive.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As those out to get me come closer and closer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they go farther and farther from the truth you reveal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you’re the closest of all to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your judgments true.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve known all along from the evidence of your words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you meant them to last forever.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '153':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 153-160
    - type: text
      text: Take a good look at my trouble, and help me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I haven’t forgotten your revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take my side and get me out of this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give me back my life, just as you promised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Salvation” is only gibberish to the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they’ve never looked it up in your dictionary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your mercies, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', run into the billions;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: following your guidelines, revive me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My antagonists are too many to count,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t swerve from the directions you gave.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I took one look at the quitters and was filled with loathing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they walked away from your promises so casually!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take note of how I love what you tell me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of your life of love, prolong my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your words all add up to the sum total: Truth.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your righteous decisions are eternal.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '161':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 161-168
    - type: text
      text: I’ve been slandered unmercifully by the politicians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but my awe at your words keeps me stable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m ecstatic over what you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like one who strikes it rich.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate lies—can’t stand them!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I love what you have revealed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seven times each day I stop and shout praises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the way you keep everything running right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For those who love what you reveal, everything fits—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no stumbling around in the dark for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wait expectantly for your salvation;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', I do what you tell me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul guards and keeps all your instructions—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oh, how much I love them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I follow your directions, abide by your counsel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my life’s an open book before you.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '169':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 169-176
    - type: text
      text: 'Let my cry come right into your presence, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provide me with the insight that comes only from your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give my request your personal attention,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue me on the terms of your promise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let praise cascade off my lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after all, you’ve taught me the truth about life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let your promises ring from my tongue;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every order you’ve given is right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put your hand out and steady me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since I’ve chosen to live by your counsel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m homesick, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', for your salvation;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I love it when you show yourself!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invigorate my soul so I can praise you well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: use your decrees to put iron in my soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And should I wander off like a lost sheep—seek me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll recognize the sound of your voice.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-24
    - type: text
      text: Be generous with me and I’ll live a full life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not for a minute will I take my eyes off your road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open my eyes so I can see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what you show me of your miracle-wonders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m a stranger in these parts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give me clear directions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul is starved and hungry, ravenous!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insatiable for your nourishing commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who think they know so much,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignoring everything you tell them—let them have it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let them mock and humiliate me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve been careful to do just what you said.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While bad neighbors maliciously gossip about me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m absorbed in pondering your wise counsel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, your sayings on life are what give me delight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I listen to them as to good neighbors!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-32
    - type: text
      text: I’m feeling terrible—I couldn’t feel worse!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get me on my feet again. You promised, remember?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I told my story, you responded;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: train me well in your deep wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help me understand these things inside and out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can ponder your miracle-wonders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My sad life’s dilapidated, a falling-down barn;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: build me up again by your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Barricade the road that goes Nowhere;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grace me with your clear revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I choose the true road to Somewhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I post your road signs at every curve and corner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I grasp and cling to whatever you tell me;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', don’t let me down!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll run the course you lay out for me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you’ll just show me how.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-40
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', teach me lessons for living'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can stay the course.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me insight so I can do what you tell me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my whole life one long, obedient response.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guide me down the road of your commandments;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I love traveling this freeway!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me an appetite for your words of wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not for piling up loot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Divert my eyes from toys and trinkets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invigorate me on the pilgrim way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affirm your promises to me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: promises made to all who fear you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deflect the harsh words of my critics—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but what you say is always so good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how hungry I am for your counsel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preserve my life through your righteous ways!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-48
    - type: text
      text: 'Let your love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', shape my life'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with salvation, exactly as you promised;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll be able to stand up to mockery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I trusted your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t ever deprive me of truth, not ever—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your commandments are what I depend on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, I’ll guard with my life what you’ve revealed to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guard it now, guard it ever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’ll stride freely through wide open spaces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I look for your truth and your wisdom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll tell the world what I find,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: speak out boldly in public, unembarrassed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cherish your commandments—oh, how I love them!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: relishing every fragment of your counsel.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-56
    - type: text
      text: Remember what you said to me, your servant—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hang on to these words for dear life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These words hold me up in bad times;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, your promises rejuvenate me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The haters hate me without mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I don’t budge from your revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I watch for your ancient landmark words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and know I’m on the right track.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when I see the wicked ignore your directions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m beside myself with anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I set your instructions to music
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sing them as I walk this pilgrim way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I meditate on your name all night, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'treasuring your revelation, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Still, I walk through a rain of derision
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I live by your Word and counsel.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 57-64
    - type: text
      text: 'Because you have satisfied me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', I promise'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do everything you say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I beg you from the bottom of my heart: smile,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be gracious to me just as you promised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I took a long, careful look at your ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I got my feet back on the trail you blazed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was up at once, didn’t drag my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was quick to follow your orders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked hemmed me in—there was no way out—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not for a minute did I forget your plan for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I get up in the middle of the night to thank you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your decisions are so right, so true—I can’t wait till morning!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m a friend and companion of all who fear you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those committed to living by your rules.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', fills the earth!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Train me to live by your counsel.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 65-72
    - type: text
      text: 'Be good to your servant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be as good as your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Train me in good common sense;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m thoroughly committed to living your way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before I learned to answer you, I wandered all over the place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now I’m in step with your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are good, and the source of good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: train me in your goodness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godless spread lies about me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I focus my attention on what you are saying;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re bland as a bucket of lard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I dance to the tune of your revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My troubles turned out all for the best—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they forced me to learn from your textbook.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truth from your mouth means more to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than striking it rich in a gold mine.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '73':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 73-80
    - type: text
      text: With your very own hands you formed me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now breathe your wisdom over me so I can understand you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they see me waiting, expecting your Word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who fear you will take heart and be glad.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I can see now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', that your decisions are right;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your testing has taught me what’s true and right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, love me—and right now!—hold me tight!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just the way you promised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now comfort me so I can live, really live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your revelation is the tune I dance to.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the fast-talking tricksters be exposed as frauds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they tried to sell me a bill of goods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I kept my mind fixed on your counsel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those who fear you turn to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for evidence of your wise guidance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let me live whole and holy, soul and body,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can always walk with my head held high.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '81':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 81-88
    - type: text
      text: I’m homesick—longing for your salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m waiting for your word of hope.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes grow heavy watching for some sign of your promise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how long must I wait for your comfort?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s smoke in my eyes—they burn and water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I keep a steady gaze on the instructions you post.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long do I have to put up with all this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long till you haul my tormentors into court?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arrogant godless try to throw me off track,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignorant as they are of God and his ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you command is a sure thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they harass me with lies. Help!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve pushed and pushed—they never let up—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I haven’t relaxed my grip on your counsel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your great love revive me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can alertly obey your every word.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '89':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 89-96
    - type: text
      text: 'What you say goes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stays
    - type: text
      text: ', as permanent as the heavens.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your truth never goes out of fashion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s as relevant as the earth when the sun comes up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your Word and truth are dependable as ever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s what you ordered—you set the earth going.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your revelation hadn’t delighted me so,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would have given up when the hard times came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I’ll never forget the advice you gave me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you saved my life with those wise words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me! I’m all yours.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I look high and low for your words of wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked lie in ambush to destroy me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I’m only concerned with your plans for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see the limits to everything human,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the horizons can’t contain your commands!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-16
    - type: text
      text: How can a young person live a clean life?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By carefully reading the map of your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m single-minded in pursuit of you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t let me miss the road signs you’ve posted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve banked your promises in the vault of my heart
  - type: usfm
    marker: q2
    children:
