document_id: PSA.119,97
type_code: eng
verses:
  '1':
  - type: text
    content: You’re blessed when you stay on course,
  - type: text
    content: 'walking steadily on the road revealed by '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: You’re blessed when you follow his directions,
  - type: text
    content: doing your best to find him.
  - type: text
    content: That’s right—you don’t go off on your own;
  - type: text
    content: you walk straight along the road he set.
  - type: text
    content: 'You, '
  - type: text
    content: God
  - type: text
    content: ', prescribed the right way to live;'
  - type: text
    content: now you expect us to live it.
  - type: text
    content: Oh, that my steps might be steady,
  - type: text
    content: keeping to the course you set;
  - type: text
    content: Then I’d never have any regrets
  - type: text
    content: in comparing my life with your counsel.
  - type: text
    content: I thank you for speaking straight from your heart;
  - type: text
    content: I learn the pattern of your righteous ways.
  - type: text
    content: I’m going to do what you tell me to do;
  - type: text
    content: don’t ever walk off and leave me.
  - type: text
    content: '* * *'
  '105':
  - type: text
    content: By your words I can see where I’m going;
  - type: text
    content: they throw a beam of light on my dark path.
  - type: text
    content: I’ve committed myself and I’ll never turn back
  - type: text
    content: from living by your righteous order.
  - type: text
    content: 'Everything’s falling apart on me, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: put me together again with your Word.
  - type: text
    content: 'Adorn me with your finest sayings, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: teach me your holy rules.
  - type: text
    content: My life is as close as my own hands,
  - type: text
    content: but I don’t forget what you have revealed.
  - type: text
    content: The wicked do their best to throw me off track,
  - type: text
    content: but I don’t swerve an inch from your course.
  - type: text
    content: I inherited your book on living; it’s mine forever—
  - type: text
    content: what a gift! And how happy it makes me!
  - type: text
    content: I concentrate on doing exactly what you say—
  - type: text
    content: I always have and always will.
  - type: text
    content: '* * *'
  '113':
  - type: text
    content: I hate the two-faced,
  - type: text
    content: but I love your clear-cut revelation.
  - type: text
    content: You’re my place of quiet retreat;
  - type: text
    content: I wait for your Word to renew me.
  - type: text
    content: Get out of my life, evildoers,
  - type: text
    content: so I can keep my God’s commands.
  - type: text
    content: Take my side as you promised; I’ll live then for sure.
  - type: text
    content: Don’t disappoint all my grand hopes.
  - type: text
    content: Stick with me and I’ll be all right;
  - type: text
    content: I’ll give total allegiance to your definitions of life.
  - type: text
    content: Expose all who drift away from your sayings;
  - type: text
    content: their casual idolatry is lethal.
  - type: text
    content: You reject earth’s wicked as so much rubbish;
  - type: text
    content: therefore I lovingly embrace everything you say.
  - type: text
    content: I shiver in awe before you;
  - type: text
    content: your decisions leave me speechless with reverence.
  - type: text
    content: '* * *'
  '121':
  - type: text
    content: I stood up for justice and the right;
  - type: text
    content: don’t leave me to the mercy of my oppressors.
  - type: text
    content: Take the side of your servant, good God;
  - type: text
    content: don’t let the godless take advantage of me.
  - type: text
    content: I can’t keep my eyes open any longer, waiting for you
  - type: text
    content: to keep your promise to set everything right.
  - type: text
    content: Let your love dictate how you deal with me;
  - type: text
    content: teach me from your textbook on life.
  - type: text
    content: I’m your servant—help me understand what that means,
  - type: text
    content: the inner meaning of your instructions.
  - type: text
    content: 'It’s time to act, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: they’ve made a shambles of your revelation!
  - type: text
    content: Yea-Saying God, I love what you command,
  - type: text
    content: I love it better than gold and gemstones;
  - type: text
    content: Yea-Saying God, I honor everything you tell me,
  - type: text
    content: I despise every deceitful detour.
  - type: text
    content: '* * *'
  '129':
  - type: text
    content: Every word you give me is a miracle word—
  - type: text
    content: how could I help but obey?
  - type: text
    content: Break open your words, let the light shine out,
  - type: text
    content: let ordinary people see the meaning.
  - type: text
    content: Mouth open and panting,
  - type: text
    content: I wanted your commands more than anything.
  - type: text
    content: Turn my way, look kindly on me,
  - type: text
    content: as you always do to those who personally love you.
  - type: text
    content: Steady my steps with your Word of promise
  - type: text
    content: so nothing malign gets the better of me.
  - type: text
    content: Rescue me from the grip of bad men and women
  - type: text
    content: so I can live life your way.
  - type: text
    content: Smile on me, your servant;
  - type: text
    content: teach me the right way to live.
  - type: text
    content: I cry rivers of tears
  - type: text
    content: because nobody’s living by your book!
  - type: text
    content: '* * *'
  '137':
  - type: text
    content: 'You '
  - type: text
    content: are
  - type: text
    content: ' right and you '
  - type: text
    content: do
  - type: text
    content: ' right, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: your decisions are right on target.
  - type: text
    content: You rightly instruct us in how to live
  - type: text
    content: ever faithful to you.
  - type: text
    content: My rivals nearly did me in,
  - type: text
    content: they persistently ignored your commandments.
  - type: text
    content: Your promise has been tested through and through,
  - type: text
    content: and I, your servant, love it dearly.
  - type: text
    content: I’m too young to be important,
  - type: text
    content: but I don’t forget what you tell me.
  - type: text
    content: Your righteousness is eternally right,
  - type: text
    content: your revelation is the only truth.
  - type: text
    content: Even though troubles came down on me hard,
  - type: text
    content: your commands always gave me delight.
  - type: text
    content: The way you tell me to live is always right;
  - type: text
    content: help me understand it so I can live to the fullest.
  - type: text
    content: '* * *'
  '145':
  - type: text
    content: I call out at the top of my lungs,
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: '! Answer! I’ll do whatever you say.”'
  - type: text
    content: I called to you, “Save me
  - type: text
    content: so I can carry out all your instructions.”
  - type: text
    content: I was up before sunrise,
  - type: text
    content: crying for help, hoping for a word from you.
  - type: text
    content: I stayed awake all night,
  - type: text
    content: prayerfully pondering your promise.
  - type: text
    content: In your love, listen to me;
  - type: text
    content: 'in your justice, '
  - type: text
    content: God
  - type: text
    content: ', keep me alive.'
  - type: text
    content: As those out to get me come closer and closer,
  - type: text
    content: they go farther and farther from the truth you reveal;
  - type: text
    content: 'But you’re the closest of all to me, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: and all your judgments true.
  - type: text
    content: I’ve known all along from the evidence of your words
  - type: text
    content: that you meant them to last forever.
  - type: text
    content: '* * *'
  '153':
  - type: text
    content: Take a good look at my trouble, and help me—
  - type: text
    content: I haven’t forgotten your revelation.
  - type: text
    content: Take my side and get me out of this;
  - type: text
    content: give me back my life, just as you promised.
  - type: text
    content: “Salvation” is only gibberish to the wicked
  - type: text
    content: because they’ve never looked it up in your dictionary.
  - type: text
    content: 'Your mercies, '
  - type: text
    content: God
  - type: text
    content: ', run into the billions;'
  - type: text
    content: following your guidelines, revive me.
  - type: text
    content: My antagonists are too many to count,
  - type: text
    content: but I don’t swerve from the directions you gave.
  - type: text
    content: I took one look at the quitters and was filled with loathing;
  - type: text
    content: they walked away from your promises so casually!
  - type: text
    content: Take note of how I love what you tell me;
  - type: text
    content: out of your life of love, prolong my life.
  - type: text
    content: 'Your words all add up to the sum total: Truth.'
  - type: text
    content: Your righteous decisions are eternal.
  - type: text
    content: '* * *'
  '161':
  - type: text
    content: I’ve been slandered unmercifully by the politicians,
  - type: text
    content: but my awe at your words keeps me stable.
  - type: text
    content: I’m ecstatic over what you say,
  - type: text
    content: like one who strikes it rich.
  - type: text
    content: I hate lies—can’t stand them!—
  - type: text
    content: but I love what you have revealed.
  - type: text
    content: Seven times each day I stop and shout praises
  - type: text
    content: for the way you keep everything running right.
  - type: text
    content: For those who love what you reveal, everything fits—
  - type: text
    content: no stumbling around in the dark for them.
  - type: text
    content: I wait expectantly for your salvation;
  - type: text
    content: God
  - type: text
    content: ', I do what you tell me.'
  - type: text
    content: My soul guards and keeps all your instructions—
  - type: text
    content: oh, how much I love them!
  - type: text
    content: I follow your directions, abide by your counsel;
  - type: text
    content: my life’s an open book before you.
  - type: text
    content: '* * *'
  '169':
  - type: text
    content: 'Let my cry come right into your presence, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: provide me with the insight that comes only from your Word.
  - type: text
    content: Give my request your personal attention,
  - type: text
    content: rescue me on the terms of your promise.
  - type: text
    content: Let praise cascade off my lips;
  - type: text
    content: after all, you’ve taught me the truth about life!
  - type: text
    content: And let your promises ring from my tongue;
  - type: text
    content: every order you’ve given is right.
  - type: text
    content: Put your hand out and steady me
  - type: text
    content: since I’ve chosen to live by your counsel.
  - type: text
    content: 'I’m homesick, '
  - type: text
    content: God
  - type: text
    content: ', for your salvation;'
  - type: text
    content: I love it when you show yourself!
  - type: text
    content: Invigorate my soul so I can praise you well,
  - type: text
    content: use your decrees to put iron in my soul.
  - type: text
    content: And should I wander off like a lost sheep—seek me!
  - type: text
    content: I’ll recognize the sound of your voice.
  '17':
  - type: text
    content: Be generous with me and I’ll live a full life;
  - type: text
    content: not for a minute will I take my eyes off your road.
  - type: text
    content: Open my eyes so I can see
  - type: text
    content: what you show me of your miracle-wonders.
  - type: text
    content: I’m a stranger in these parts;
  - type: text
    content: give me clear directions.
  - type: text
    content: My soul is starved and hungry, ravenous!—
  - type: text
    content: insatiable for your nourishing commands.
  - type: text
    content: And those who think they know so much,
  - type: text
    content: ignoring everything you tell them—let them have it!
  - type: text
    content: Don’t let them mock and humiliate me;
  - type: text
    content: I’ve been careful to do just what you said.
  - type: text
    content: While bad neighbors maliciously gossip about me,
  - type: text
    content: I’m absorbed in pondering your wise counsel.
  - type: text
    content: Yes, your sayings on life are what give me delight;
  - type: text
    content: I listen to them as to good neighbors!
  - type: text
    content: '* * *'
  '25':
  - type: text
    content: I’m feeling terrible—I couldn’t feel worse!
  - type: text
    content: Get me on my feet again. You promised, remember?
  - type: text
    content: When I told my story, you responded;
  - type: text
    content: train me well in your deep wisdom.
  - type: text
    content: Help me understand these things inside and out
  - type: text
    content: so I can ponder your miracle-wonders.
  - type: text
    content: My sad life’s dilapidated, a falling-down barn;
  - type: text
    content: build me up again by your Word.
  - type: text
    content: Barricade the road that goes Nowhere;
  - type: text
    content: grace me with your clear revelation.
  - type: text
    content: I choose the true road to Somewhere,
  - type: text
    content: I post your road signs at every curve and corner.
  - type: text
    content: I grasp and cling to whatever you tell me;
  - type: text
    content: God
  - type: text
    content: ', don’t let me down!'
  - type: text
    content: I’ll run the course you lay out for me
  - type: text
    content: if you’ll just show me how.
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', teach me lessons for living'
  - type: text
    content: so I can stay the course.
  - type: text
    content: Give me insight so I can do what you tell me—
  - type: text
    content: my whole life one long, obedient response.
  - type: text
    content: Guide me down the road of your commandments;
  - type: text
    content: I love traveling this freeway!
  - type: text
    content: Give me an appetite for your words of wisdom,
  - type: text
    content: and not for piling up loot.
  - type: text
    content: Divert my eyes from toys and trinkets,
  - type: text
    content: invigorate me on the pilgrim way.
  - type: text
    content: Affirm your promises to me—
  - type: text
    content: promises made to all who fear you.
  - type: text
    content: Deflect the harsh words of my critics—
  - type: text
    content: but what you say is always so good.
  - type: text
    content: See how hungry I am for your counsel;
  - type: text
    content: preserve my life through your righteous ways!
  - type: text
    content: '* * *'
  '41':
  - type: text
    content: 'Let your love, '
  - type: text
    content: God
  - type: text
    content: ', shape my life'
  - type: text
    content: with salvation, exactly as you promised;
  - type: text
    content: Then I’ll be able to stand up to mockery
  - type: text
    content: because I trusted your Word.
  - type: text
    content: Don’t ever deprive me of truth, not ever—
  - type: text
    content: your commandments are what I depend on.
  - type: text
    content: Oh, I’ll guard with my life what you’ve revealed to me,
  - type: text
    content: guard it now, guard it ever;
  - type: text
    content: And I’ll stride freely through wide open spaces
  - type: text
    content: as I look for your truth and your wisdom;
  - type: text
    content: Then I’ll tell the world what I find,
  - type: text
    content: speak out boldly in public, unembarrassed.
  - type: text
    content: I cherish your commandments—oh, how I love them!—
  - type: text
    content: relishing every fragment of your counsel.
  - type: text
    content: '* * *'
  '49':
  - type: text
    content: Remember what you said to me, your servant—
  - type: text
    content: I hang on to these words for dear life!
  - type: text
    content: These words hold me up in bad times;
  - type: text
    content: yes, your promises rejuvenate me.
  - type: text
    content: The haters hate me without mercy,
  - type: text
    content: but I don’t budge from your revelation.
  - type: text
    content: I watch for your ancient landmark words,
  - type: text
    content: and know I’m on the right track.
  - type: text
    content: But when I see the wicked ignore your directions,
  - type: text
    content: I’m beside myself with anger.
  - type: text
    content: I set your instructions to music
  - type: text
    content: and sing them as I walk this pilgrim way.
  - type: text
    content: 'I meditate on your name all night, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'treasuring your revelation, O '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Still, I walk through a rain of derision
  - type: text
    content: because I live by your Word and counsel.
  - type: text
    content: '* * *'
  '57':
  - type: text
    content: 'Because you have satisfied me, '
  - type: text
    content: God
  - type: text
    content: ', I promise'
  - type: text
    content: to do everything you say.
  - type: text
    content: 'I beg you from the bottom of my heart: smile,'
  - type: text
    content: be gracious to me just as you promised.
  - type: text
    content: When I took a long, careful look at your ways,
  - type: text
    content: I got my feet back on the trail you blazed.
  - type: text
    content: I was up at once, didn’t drag my feet,
  - type: text
    content: was quick to follow your orders.
  - type: text
    content: The wicked hemmed me in—there was no way out—
  - type: text
    content: but not for a minute did I forget your plan for me.
  - type: text
    content: I get up in the middle of the night to thank you;
  - type: text
    content: your decisions are so right, so true—I can’t wait till morning!
  - type: text
    content: I’m a friend and companion of all who fear you,
  - type: text
    content: of those committed to living by your rules.
  - type: text
    content: 'Your love, '
  - type: text
    content: God
  - type: text
    content: ', fills the earth!'
  - type: text
    content: Train me to live by your counsel.
  - type: text
    content: '* * *'
  '65':
  - type: text
    content: 'Be good to your servant, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: be as good as your Word.
  - type: text
    content: Train me in good common sense;
  - type: text
    content: I’m thoroughly committed to living your way.
  - type: text
    content: Before I learned to answer you, I wandered all over the place,
  - type: text
    content: but now I’m in step with your Word.
  - type: text
    content: You are good, and the source of good;
  - type: text
    content: train me in your goodness.
  - type: text
    content: The godless spread lies about me,
  - type: text
    content: but I focus my attention on what you are saying;
  - type: text
    content: They’re bland as a bucket of lard,
  - type: text
    content: while I dance to the tune of your revelation.
  - type: text
    content: My troubles turned out all for the best—
  - type: text
    content: they forced me to learn from your textbook.
  - type: text
    content: Truth from your mouth means more to me
  - type: text
    content: than striking it rich in a gold mine.
  - type: text
    content: '* * *'
  '73':
  - type: text
    content: With your very own hands you formed me;
  - type: text
    content: now breathe your wisdom over me so I can understand you.
  - type: text
    content: When they see me waiting, expecting your Word,
  - type: text
    content: those who fear you will take heart and be glad.
  - type: text
    content: 'I can see now, '
  - type: text
    content: God
  - type: text
    content: ', that your decisions are right;'
  - type: text
    content: your testing has taught me what’s true and right.
  - type: text
    content: Oh, love me—and right now!—hold me tight!
  - type: text
    content: just the way you promised.
  - type: text
    content: Now comfort me so I can live, really live;
  - type: text
    content: your revelation is the tune I dance to.
  - type: text
    content: Let the fast-talking tricksters be exposed as frauds;
  - type: text
    content: they tried to sell me a bill of goods,
  - type: text
    content: but I kept my mind fixed on your counsel.
  - type: text
    content: Let those who fear you turn to me
  - type: text
    content: for evidence of your wise guidance.
  - type: text
    content: And let me live whole and holy, soul and body,
  - type: text
    content: so I can always walk with my head held high.
  - type: text
    content: '* * *'
  '81':
  - type: text
    content: I’m homesick—longing for your salvation;
  - type: text
    content: I’m waiting for your word of hope.
  - type: text
    content: My eyes grow heavy watching for some sign of your promise;
  - type: text
    content: how long must I wait for your comfort?
  - type: text
    content: There’s smoke in my eyes—they burn and water,
  - type: text
    content: but I keep a steady gaze on the instructions you post.
  - type: text
    content: How long do I have to put up with all this?
  - type: text
    content: How long till you haul my tormentors into court?
  - type: text
    content: The arrogant godless try to throw me off track,
  - type: text
    content: ignorant as they are of God and his ways.
  - type: text
    content: Everything you command is a sure thing,
  - type: text
    content: but they harass me with lies. Help!
  - type: text
    content: They’ve pushed and pushed—they never let up—
  - type: text
    content: but I haven’t relaxed my grip on your counsel.
  - type: text
    content: In your great love revive me
  - type: text
    content: so I can alertly obey your every word.
  - type: text
    content: '* * *'
  '89':
  - type: text
    content: 'What you say goes, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'and '
  - type: text
    content: stays
  - type: text
    content: ', as permanent as the heavens.'
  - type: text
    content: Your truth never goes out of fashion;
  - type: text
    content: it’s as relevant as the earth when the sun comes up.
  - type: text
    content: Your Word and truth are dependable as ever;
  - type: text
    content: that’s what you ordered—you set the earth going.
  - type: text
    content: If your revelation hadn’t delighted me so,
  - type: text
    content: I would have given up when the hard times came.
  - type: text
    content: But I’ll never forget the advice you gave me;
  - type: text
    content: you saved my life with those wise words.
  - type: text
    content: Save me! I’m all yours.
  - type: text
    content: I look high and low for your words of wisdom.
  - type: text
    content: The wicked lie in ambush to destroy me,
  - type: text
    content: but I’m only concerned with your plans for me.
  - type: text
    content: I see the limits to everything human,
  - type: text
    content: but the horizons can’t contain your commands!
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: How can a young person live a clean life?
  - type: text
    content: By carefully reading the map of your Word.
  - type: text
    content: I’m single-minded in pursuit of you;
