document_id: SNG.3,97
type_code: eng
verses:
  '1':
  - type: text
    content: Restless in bed and sleepless through the night,
  - type: text
    content: I longed for my lover.
  - type: text
    content: I wanted him desperately. His absence was painful.
  - type: text
    content: So I got up, went out and roved the city,
  - type: text
    content: hunting through streets and down alleys.
  - type: text
    content: I wanted my lover in the worst way!
  - type: text
    content: I looked high and low, and didn’t find him.
  - type: text
    content: And then the night watchmen found me
  - type: text
    content: as they patrolled the darkened city.
  - type: text
    content: “Have you seen my dear lost love?” I asked.
  - type: text
    content: No sooner had I left them than I found him,
  - type: text
    content: found my dear lost love.
  - type: text
    content: I threw my arms around him and held him tight,
  - type: text
    content: wouldn’t let him go until I had him home again,
  - type: text
    content: safe at home beside the fire.
  '11':
  - type: text
    content: Come and look, sisters in Jerusalem.
  - type: text
    content: Oh, sisters of Zion, don’t miss this!
  - type: text
    content: My King-Lover,
  - type: text
    content: dressed and garlanded for his wedding,
  - type: text
    content: his heart full, bursting with joy!
  '5':
  - type: text
    content: Oh, let me warn you, sisters in Jerusalem,
  - type: text
    content: 'by the gazelles, yes, by all the wild deer:'
  - type: text
    content: Don’t excite love, don’t stir it up,
  - type: text
    content: until the time is ripe—and you’re ready.
  '6':
  - type: text
    content: What’s this I see, approaching from the desert,
  - type: text
    content: raising clouds of dust,
  - type: text
    content: Filling the air with sweet smells
  - type: text
    content: and pungent aromatics?
  - type: text
    content: Look! It’s Solomon’s carriage,
  - type: text
    content: carried and guarded by sixty soldiers,
  - type: text
    content: sixty of Israel’s finest,
  - type: text
    content: All of them armed to the teeth,
  - type: text
    content: trained for battle,
  - type: text
    content: ready for anything, anytime.
  - type: text
    content: King Solomon once had a carriage built
  - type: text
    content: from fine-grained Lebanon cedar.
  - type: text
    content: He had it framed with silver and roofed with gold.
  - type: text
    content: The cushions were covered with a purple fabric,
  - type: text
    content: the interior lined with tooled leather.
