document_id: SNG.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restless in bed and sleepless through the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I longed for my lover.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wanted him desperately. His absence was painful.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I got up, went out and roved the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hunting through streets and down alleys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wanted my lover in the worst way!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I looked high and low, and didn’t find him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then the night watchmen found me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they patrolled the darkened city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Have you seen my dear lost love?” I asked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No sooner had I left them than I found him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: found my dear lost love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I threw my arms around him and held him tight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wouldn’t let him go until I had him home again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: safe at home beside the fire.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and look, sisters in Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, sisters of Zion, don’t miss this!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My King-Lover,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dressed and garlanded for his wedding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his heart full, bursting with joy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, let me warn you, sisters in Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by the gazelles, yes, by all the wild deer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t excite love, don’t stir it up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the time is ripe—and you’re ready.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s this I see, approaching from the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raising clouds of dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filling the air with sweet smells
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pungent aromatics?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! It’s Solomon’s carriage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carried and guarded by sixty soldiers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sixty of Israel’s finest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of them armed to the teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trained for battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready for anything, anytime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: King Solomon once had a carriage built
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from fine-grained Lebanon cedar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He had it framed with silver and roofed with gold.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cushions were covered with a purple fabric,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the interior lined with tooled leather.
