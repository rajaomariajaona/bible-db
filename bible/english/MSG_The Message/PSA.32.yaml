verses:
  '1':
  - type: text
    content: Count yourself lucky, how happy you must be—
  - type: text
    content: you get a fresh start,
  - type: text
    content: your slate’s wiped clean.
  '10':
  - type: text
    content: God-defiers are always in trouble;
  - type: text
    content: God
  - type: text
    content: -affirmers find themselves loved
  - type: text
    content: every time they turn around.
  '11':
  - type: text
    content: 'Celebrate '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Sing together—everyone!
  - type: text
    content: All you honest hearts, raise the roof!
  '2':
  - type: text
    content: Count yourself lucky—
  - type: text
    content: God
  - type: text
    content: ' holds nothing against you'
  - type: text
    content: and you’re holding nothing back from him.
  '3':
  - type: text
    content: When I kept it all inside,
  - type: text
    content: my bones turned to powder,
  - type: text
    content: my words became daylong groans.
  '4':
  - type: text
    content: The pressure never let up;
  - type: text
    content: all the juices of my life dried up.
  '5':
  - type: text
    content: Then I let it all out;
  - type: text
    content: 'I said, “I’ll come clean about my failures to '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: Suddenly the pressure was gone—
  - type: text
    content: my guilt dissolved,
  - type: text
    content: my sin disappeared.
  '6':
  - type: text
    content: These things add up. Every one of us needs to pray;
  - type: text
    content: when all hell breaks loose and the dam bursts
  - type: text
    content: we’ll be on high ground, untouched.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s my island hideaway,
  - type: text
    content: keeps danger far from the shore,
  - type: text
    content: throws garlands of hosannas around my neck.
  '8':
  - type: text
    content: Let me give you some good advice;
  - type: text
    content: I’m looking you in the eye
  - type: text
    content: 'and giving it to you straight:'
  '9':
  - type: text
    content: “Don’t be ornery like a horse or mule
  - type: text
    content: that needs bit and bridle
  - type: text
    content: to stay on track.”
