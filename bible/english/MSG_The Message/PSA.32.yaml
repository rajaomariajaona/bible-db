document_id: PSA.32,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Count yourself lucky, how happy you must be—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you get a fresh start,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your slate’s wiped clean.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: God-defiers are always in trouble;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -affirmers find themselves loved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every time they turn around.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Celebrate '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing together—everyone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All you honest hearts, raise the roof!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Count yourself lucky—
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' holds nothing against you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’re holding nothing back from him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When I kept it all inside,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my bones turned to powder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my words became daylong groans.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The pressure never let up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the juices of my life dried up.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then I let it all out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I said, “I’ll come clean about my failures to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suddenly the pressure was gone—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my guilt dissolved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sin disappeared.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: These things add up. Every one of us needs to pray;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when all hell breaks loose and the dam bursts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’ll be on high ground, untouched.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s my island hideaway,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keeps danger far from the shore,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throws garlands of hosannas around my neck.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let me give you some good advice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m looking you in the eye
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and giving it to you straight:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Don’t be ornery like a horse or mule
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that needs bit and bridle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to stay on track.”
