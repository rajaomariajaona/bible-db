document_id: 1SA.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obsessed with a Single Flea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3a
  - type: text
    text: ' Some Ziphites came to Saul at Gibeah and said, “Did you know that David is hiding out on the Hakilah Hill just opposite Jeshimon?” Saul was on his feet in a minute and on his way to the wilderness of Ziph, taking three thousand of his best men, the pick of the crop, to hunt for David in that wild desert. He camped just off the road at the Hakilah Hill, opposite Jeshimon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3b-5
  - type: text
    text: ' David, still out in the backcountry, knew Saul had come after him. He sent scouts to determine his precise location. Then David set out and came to the place where Saul had set up camp and saw for himself where Saul and Abner, son of Ner, his general, were staying. Saul was safely inside the camp, encircled by the army.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Taking charge, David spoke to Ahimelech the Hittite and to Abishai son of Zeruiah, Joab’s brother: “Who will go down with me and enter Saul’s camp?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Abishai whispered, “I’ll go with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So David and Abishai entered the encampment by night, and there he was—Saul, stretched out asleep at the center of the camp, his spear stuck in the ground near his head, with Abner and the troops sound asleep on all sides.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Abishai said, “This is the moment! God has put your enemy in your grasp. Let me nail him to the ground with his spear. One hit will do it, believe me; I won’t need a second!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But David said to Abishai, “Don’t you dare hurt him! Who could lay a hand on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anointed and even think of getting away with it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'He went on, “As '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, either '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will strike him, or his time will come and he’ll die in bed, or he’ll fall in battle, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' forbid that I should lay a finger on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anointed. Now, grab the spear at his head and the water jug and let’s get out of here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David took the spear and water jug that were right beside Saul’s head, and they slipped away. Not a soul saw. Not a soul knew. No one woke up! They all slept through the whole thing. A blanket of deep sleep from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had fallen on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Then David went across to the opposite hill and stood far away on the top of the mountain. With this safe distance between them, he shouted across to the army and Abner son of Ner, “Hey, Abner! How long do I have to wait for you to wake up and answer me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Abner said, “Who’s calling?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: '“Aren’t you in charge there?” said David. “Why aren’t you minding the store? Why weren’t you standing guard over your master the king, when a soldier came to kill the king your master? Bad form! As '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, your life should be forfeit, you and the entire bodyguard. Look what I have—the king’s spear and water jug that were right beside his head!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: By now, Saul had recognized David’s voice and said, “Is that you, my son David?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'David said, “Yes, it’s me, O King, my master. Why are you after me, hunting me down? What have I done? What crime have I committed? Oh, my master, my king, listen to this from your servant: If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has stirred you up against me, then I gladly offer my life as a sacrifice. But if it’s men who have done it, let them be banished from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s presence! They’ve expelled me from my rightful place in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s heritage, sneering, ‘Out of here! Go get a job with some other god!’ But you’re not getting rid of me that easily; you’ll not separate me from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in life or death. The absurdity! The king of Israel obsessed with a single flea! Hunting me down—a mere partridge—out in the hills!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Saul confessed, “I’ve sinned! Oh, come back, my dear son David! I won’t hurt you anymore. You’ve honored me this day, treating my life as most precious. And I’ve acted the fool—a moral dunce, a real clown.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: 'David answered, “See what I have here? The king’s spear. Let one of your servants come and get it. It’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s business to decide what to do with each of us in regard to what’s right and who’s loyal. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' put your life in my hands today, but I wasn’t willing to lift a finger against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s anointed. Just as I honored your life today, may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' honor my life and rescue me from all trouble.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Saul said to David, “Bless you, dear son David! Yes, do what you have to do! And, yes, succeed in all you attempt!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then David went on his way, and Saul went home.
