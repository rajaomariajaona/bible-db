document_id: 1SA.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Obsessed with a Single Flea
  - type: text
    content: ' Some Ziphites came to Saul at Gibeah and said, “Did you know that David is hiding out on the Hakilah Hill just opposite Jeshimon?” Saul was on his feet in a minute and on his way to the wilderness of Ziph, taking three thousand of his best men, the pick of the crop, to hunt for David in that wild desert. He camped just off the road at the Hakilah Hill, opposite Jeshimon.'
  '10':
  - type: text
    content: 'He went on, “As '
  - type: text
    content: God
  - type: text
    content: ' lives, either '
  - type: text
    content: God
  - type: text
    content: ' will strike him, or his time will come and he’ll die in bed, or he’ll fall in battle, but '
  - type: text
    content: God
  - type: text
    content: ' forbid that I should lay a finger on '
  - type: text
    content: God
  - type: text
    content: ’s anointed. Now, grab the spear at his head and the water jug and let’s get out of here.”
  '12':
  - type: text
    content: 'David took the spear and water jug that were right beside Saul’s head, and they slipped away. Not a soul saw. Not a soul knew. No one woke up! They all slept through the whole thing. A blanket of deep sleep from '
  - type: text
    content: God
  - type: text
    content: ' had fallen on them.'
  '13':
  - type: text
    content: Then David went across to the opposite hill and stood far away on the top of the mountain. With this safe distance between them, he shouted across to the army and Abner son of Ner, “Hey, Abner! How long do I have to wait for you to wake up and answer me?”
  - type: text
    content: Abner said, “Who’s calling?”
  '15':
  - type: text
    content: '“Aren’t you in charge there?” said David. “Why aren’t you minding the store? Why weren’t you standing guard over your master the king, when a soldier came to kill the king your master? Bad form! As '
  - type: text
    content: God
  - type: text
    content: ' lives, your life should be forfeit, you and the entire bodyguard. Look what I have—the king’s spear and water jug that were right beside his head!”'
  '17':
  - type: text
    content: By now, Saul had recognized David’s voice and said, “Is that you, my son David?”
  - type: text
    content: 'David said, “Yes, it’s me, O King, my master. Why are you after me, hunting me down? What have I done? What crime have I committed? Oh, my master, my king, listen to this from your servant: If '
  - type: text
    content: God
  - type: text
    content: ' has stirred you up against me, then I gladly offer my life as a sacrifice. But if it’s men who have done it, let them be banished from '
  - type: text
    content: God
  - type: text
    content: '’s presence! They’ve expelled me from my rightful place in '
  - type: text
    content: God
  - type: text
    content: '’s heritage, sneering, ‘Out of here! Go get a job with some other god!’ But you’re not getting rid of me that easily; you’ll not separate me from '
  - type: text
    content: God
  - type: text
    content: ' in life or death. The absurdity! The king of Israel obsessed with a single flea! Hunting me down—a mere partridge—out in the hills!”'
  '21':
  - type: text
    content: Saul confessed, “I’ve sinned! Oh, come back, my dear son David! I won’t hurt you anymore. You’ve honored me this day, treating my life as most precious. And I’ve acted the fool—a moral dunce, a real clown.”
  '22':
  - type: text
    content: 'David answered, “See what I have here? The king’s spear. Let one of your servants come and get it. It’s '
  - type: text
    content: God
  - type: text
    content: '’s business to decide what to do with each of us in regard to what’s right and who’s loyal. '
  - type: text
    content: God
  - type: text
    content: ' put your life in my hands today, but I wasn’t willing to lift a finger against '
  - type: text
    content: God
  - type: text
    content: '’s anointed. Just as I honored your life today, may '
  - type: text
    content: God
  - type: text
    content: ' honor my life and rescue me from all trouble.”'
  '25':
  - type: text
    content: Saul said to David, “Bless you, dear son David! Yes, do what you have to do! And, yes, succeed in all you attempt!”
  - type: text
    content: Then David went on his way, and Saul went home.
  '3':
  - type: text
    content: ' David, still out in the backcountry, knew Saul had come after him. He sent scouts to determine his precise location. Then David set out and came to the place where Saul had set up camp and saw for himself where Saul and Abner, son of Ner, his general, were staying. Saul was safely inside the camp, encircled by the army.'
  '6':
  - type: text
    content: 'Taking charge, David spoke to Ahimelech the Hittite and to Abishai son of Zeruiah, Joab’s brother: “Who will go down with me and enter Saul’s camp?”'
  - type: text
    content: Abishai whispered, “I’ll go with you.”
  '7':
  - type: text
    content: So David and Abishai entered the encampment by night, and there he was—Saul, stretched out asleep at the center of the camp, his spear stuck in the ground near his head, with Abner and the troops sound asleep on all sides.
  '8':
  - type: text
    content: Abishai said, “This is the moment! God has put your enemy in your grasp. Let me nail him to the ground with his spear. One hit will do it, believe me; I won’t need a second!”
  '9':
  - type: text
    content: 'But David said to Abishai, “Don’t you dare hurt him! Who could lay a hand on '
  - type: text
    content: God
  - type: text
    content: ’s anointed and even think of getting away with it?”
