document_id: DEU.10,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' responded. He said, “Shape two slabs of stone similar to the first ones. Climb the mountain and meet me. Also make yourself a wooden chest. I will engrave the stone slabs with the words that were on the first ones, the ones you smashed. Then you will put them in the Chest.”'
  '10':
  - type: text
    content: 'I stayed there on the mountain forty days and nights, just as I did the first time. And '
  - type: text
    content: God
  - type: text
    content: ' listened to me, just as he did the first time: '
  - type: text
    content: God
  - type: text
    content: ' decided not to destroy you.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me, “Now get going. Lead your people as they resume the journey to take possession of the land that I promised their ancestors that I’d give to them.”'
  '12':
  - type: text
    content: 'So now Israel, what do you think '
  - type: text
    content: God
  - type: text
    content: ' expects from you? Just this: Live in his presence in holy reverence, follow the road he sets out for you, love him, serve '
  - type: text
    content: God
  - type: text
    content: ', your God, with everything you have in you, obey the commandments and regulations of '
  - type: text
    content: God
  - type: text
    content: ' that I’m commanding you today—live a good life.'
  '14':
  - type: text
    content: 'Look around you: Everything you see is '
  - type: text
    content: God
  - type: text
    content: '’s—the heavens above and beyond, the Earth, and everything on it. But it was your ancestors who '
  - type: text
    content: God
  - type: text
    content: ' fell in love with; he picked their children—that’s '
  - type: text
    content: you
  - type: text
    content: '!—out of all the other peoples. That’s where we are right now. So cut away the thick calluses from your heart and stop being so willfully hardheaded. '
  - type: text
    content: God
  - type: text
    content: ', your God, is the God of all gods, he’s the Master of all masters, a God immense and powerful and awesome. He doesn’t play favorites, takes no bribes, makes sure orphans and widows are treated fairly, takes loving care of foreigners by seeing that they get food and clothing.'
  '19':
  - type: text
    content: You must treat foreigners with the same loving care—
  - type: text
    content: remember, you were once foreigners in Egypt.
  - type: text
    content: 'Reverently respect '
  - type: text
    content: God
  - type: text
    content: ', your God, serve him, hold tight to him,'
  - type: text
    content: back up your promises with the authority of his name.
  - type: text
    content: He’s your praise! He’s your God!
  - type: text
    content: He did all these tremendous, these staggering things
  - type: text
    content: that you saw with your own eyes.
  '22':
  - type: text
    content: 'When your ancestors entered Egypt, they numbered a mere seventy souls. And now look at you—you look more like the stars in the night skies in number. And your '
  - type: text
    content: God
  - type: text
    content: ' did it.'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'So I made a chest out of acacia wood, shaped two slabs of stone, just like the first ones, and climbed the mountain with the two slabs in my arms. He engraved the stone slabs the same as he had the first ones, the Ten Words that he addressed to you on the mountain out of the fire on the day of the assembly. Then '
  - type: text
    content: God
  - type: text
    content: ' gave them to me. I turned around and came down the mountain. I put the stone slabs in the Chest that I made and they’ve been there ever since, just as '
  - type: text
    content: God
  - type: text
    content: ' commanded me.'
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: The People of Israel went from the wells of the Jaakanites to Moserah. Aaron died there and was buried. His son Eleazar succeeded him as priest. From there they went to Gudgodah, and then to Jotbathah, a land of streams of water.
  '8':
  - type: text
    content: 'That’s when '
  - type: text
    content: God
  - type: text
    content: ' set apart the tribe of Levi to carry '
  - type: text
    content: God
  - type: text
    content: '’s Covenant Chest, to be on duty in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', to serve him, and to bless in his name, as they continue to do today. And that’s why Levites don’t have a piece of inherited land as their kinsmen do. '
  - type: text
    content: God
  - type: text
    content: ' is their inheritance, as '
  - type: text
    content: God
  - type: text
    content: ', your God, promised them.'
