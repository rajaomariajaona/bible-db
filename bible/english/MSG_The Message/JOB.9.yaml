document_id: JOB.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Continues
  - type: heading
    content: How Can Mere Mortals Get Right with God?
  - type: text
    content: 'Job continued by saying:'
  - type: text
    content: “So what’s new? I know all this.
  - type: text
    content: The question is, ‘How can mere mortals get right with God?’
  - type: text
    content: If we wanted to bring our case before him,
  - type: text
    content: what chance would we have? Not one in a thousand!
  - type: text
    content: God’s wisdom is so deep, God’s power so immense,
  - type: text
    content: who could take him on and come out in one piece?
  - type: text
    content: He moves mountains before they know what’s happened,
  - type: text
    content: flips them on their heads on a whim.
  - type: text
    content: He gives the earth a good shaking up,
  - type: text
    content: rocks it down to its very foundations.
  - type: text
    content: He tells the sun, ‘Don’t shine,’ and it doesn’t;
  - type: text
    content: he pulls the blinds on the stars.
  - type: text
    content: All by himself he stretches out the heavens
  - type: text
    content: and strides on the waves of the sea.
  - type: text
    content: He designed the Big Dipper and Orion,
  - type: text
    content: the Pleiades and Alpha Centauri.
  - type: text
    content: We’ll never comprehend all the great things he does;
  - type: text
    content: his miracle-surprises can’t be counted.
  - type: text
    content: Somehow, though he moves right in front of me, I don’t see him;
  - type: text
    content: quietly but surely he’s active, and I miss it.
  - type: text
    content: If he steals you blind, who can stop him?
  - type: text
    content: Who’s going to say, ‘Hey, what are you doing?’
  - type: text
    content: God doesn’t hold back on his anger;
  - type: text
    content: even dragon-bred monsters cringe before him.
  '14':
  - type: text
    content: “So how could I ever argue with him,
  - type: text
    content: construct a defense that would influence God?
  - type: text
    content: Even though I’m innocent I could never prove it;
  - type: text
    content: I can only throw myself on the Judge’s mercy.
  - type: text
    content: If I called on God and he himself answered me,
  - type: text
    content: then, and only then, would I believe that he’d heard me.
  - type: text
    content: As it is, he knocks me about from pillar to post,
  - type: text
    content: beating me up, black-and-blue, for no good reason.
  - type: text
    content: He won’t even let me catch my breath,
  - type: text
    content: piles bitterness upon bitterness.
  - type: text
    content: If it’s a question of who’s stronger, he wins, hands down!
  - type: text
    content: If it’s a question of justice, who’ll serve him the subpoena?
  - type: text
    content: Even though innocent, anything I say incriminates me;
  - type: text
    content: blameless as I am, my defense just makes me sound worse.
  - type: heading
    content: If God’s Not Responsible, Who Is?
  '21':
  - type: text
    content: “Believe me, I’m blameless.
  - type: text
    content: I don’t understand what’s going on.
  - type: text
    content: I hate my life!
  - type: text
    content: Since either way it ends up the same, I can only conclude
  - type: text
    content: that God destroys the good right along with the bad.
  - type: text
    content: When calamity hits and brings sudden death,
  - type: text
    content: he folds his arms, aloof from the despair of the innocent.
  - type: text
    content: He lets the wicked take over running the world,
  - type: text
    content: he installs judges who can’t tell right from wrong.
  - type: text
    content: If he’s not responsible, who is?
  '25':
  - type: text
    content: “My time is short—what’s left of my life races off
  - type: text
    content: too fast for me to even glimpse the good.
  - type: text
    content: My life is going fast, like a ship under full sail,
  - type: text
    content: like an eagle plummeting to its prey.
  - type: text
    content: Even if I say, ‘I’ll put all this behind me,
  - type: text
    content: I’ll look on the bright side and force a smile,’
  - type: text
    content: All these troubles would still be like grit in my gut
  - type: text
    content: since it’s clear you’re not going to let up.
  - type: text
    content: The verdict has already been handed down—‘Guilty!’—
  - type: text
    content: so what’s the use of protests or appeals?
  - type: text
    content: Even if I scrub myself all over
  - type: text
    content: and wash myself with the strongest soap I can find,
  - type: text
    content: It wouldn’t last—you’d push me into a pigpen, or worse,
  - type: text
    content: so nobody could stand me for the stink.
  '32':
  - type: text
    content: “God and I are not equals; I can’t bring a case against him.
  - type: text
    content: We’ll never enter a courtroom as peers.
  - type: text
    content: How I wish we had an arbitrator
  - type: text
    content: to step in and let me get on with life—
  - type: text
    content: To break God’s death grip on me,
  - type: text
    content: to free me from this terror so I could breathe again.
  - type: text
    content: Then I’d speak up and state my case boldly.
  - type: text
    content: As things stand, there is no way I can do it.”
