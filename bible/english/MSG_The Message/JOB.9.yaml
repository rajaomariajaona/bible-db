document_id: JOB.9
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Job Continues
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: How Can Mere Mortals Get Right with God?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-13
  - type: text
    text: 'Job continued by saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “So what’s new? I know all this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The question is, ‘How can mere mortals get right with God?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: If we wanted to bring our case before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what chance would we have? Not one in a thousand!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s wisdom is so deep, God’s power so immense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who could take him on and come out in one piece?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He moves mountains before they know what’s happened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flips them on their heads on a whim.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gives the earth a good shaking up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rocks it down to its very foundations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He tells the sun, ‘Don’t shine,’ and it doesn’t;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he pulls the blinds on the stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All by himself he stretches out the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strides on the waves of the sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He designed the Big Dipper and Orion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Pleiades and Alpha Centauri.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll never comprehend all the great things he does;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his miracle-surprises can’t be counted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Somehow, though he moves right in front of me, I don’t see him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: quietly but surely he’s active, and I miss it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If he steals you blind, who can stop him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who’s going to say, ‘Hey, what are you doing?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: God doesn’t hold back on his anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even dragon-bred monsters cringe before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-20
  - type: text
    text: “So how could I ever argue with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: construct a defense that would influence God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though I’m innocent I could never prove it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can only throw myself on the Judge’s mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I called on God and he himself answered me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then, and only then, would I believe that he’d heard me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As it is, he knocks me about from pillar to post,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beating me up, black-and-blue, for no good reason.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He won’t even let me catch my breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: piles bitterness upon bitterness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If it’s a question of who’s stronger, he wins, hands down!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it’s a question of justice, who’ll serve him the subpoena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though innocent, anything I say incriminates me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: blameless as I am, my defense just makes me sound worse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: If God’s Not Responsible, Who Is?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: “Believe me, I’m blameless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I don’t understand what’s going on.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I hate my life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since either way it ends up the same, I can only conclude
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God destroys the good right along with the bad.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When calamity hits and brings sudden death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he folds his arms, aloof from the despair of the innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He lets the wicked take over running the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he installs judges who can’t tell right from wrong.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If he’s not responsible, who is?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-31
  - type: text
    text: “My time is short—what’s left of my life races off
- type: usfm
  marker: q2
  children:
  - type: text
    text: too fast for me to even glimpse the good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My life is going fast, like a ship under full sail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an eagle plummeting to its prey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if I say, ‘I’ll put all this behind me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll look on the bright side and force a smile,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: All these troubles would still be like grit in my gut
- type: usfm
  marker: q2
  children:
  - type: text
    text: since it’s clear you’re not going to let up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The verdict has already been handed down—‘Guilty!’—
- type: usfm
  marker: q2
  children:
  - type: text
    text: so what’s the use of protests or appeals?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if I scrub myself all over
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wash myself with the strongest soap I can find,
- type: usfm
  marker: q1
  children:
  - type: text
    text: It wouldn’t last—you’d push me into a pigpen, or worse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so nobody could stand me for the stink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-35
  - type: text
    text: “God and I are not equals; I can’t bring a case against him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ll never enter a courtroom as peers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How I wish we had an arbitrator
- type: usfm
  marker: q2
  children:
  - type: text
    text: to step in and let me get on with life—
- type: usfm
  marker: q1
  children:
  - type: text
    text: To break God’s death grip on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to free me from this terror so I could breathe again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’d speak up and state my case boldly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: As things stand, there is no way I can do it.”
