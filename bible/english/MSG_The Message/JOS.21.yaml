document_id: JOS.21,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cities for the Levites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: The ancestral heads of the Levites came to Eleazar the priest and Joshua son of Nun and to the heads of the other tribes of the People of Israel. This took place at Shiloh in the land of Canaan. They said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded through Moses that you give us cities to live in with access to pastures for our cattle.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kiriath Arba (Arba was the ancestor of Anak), that is, Hebron, in the hills of Judah, with access to the pastures around it. The fields of the city and its open lands they had already given to Caleb son of Jephunneh as his possession.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the descendants of Aaron the priest they gave Hebron (the asylum-city for the unconvicted killers), Libnah, Jattir, Eshtemoa, Holon, Debir, Ain, Juttah, and Beth Shemesh, all with their accompanying pastures—nine towns from these two tribes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from the tribe of Benjamin: Gibeon, Geba, Anathoth, and Almon, together with their pastures—four towns.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total for the cities and pastures for the priests descended from Aaron came to thirteen.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the Kohathite families from the tribe of Levi were assigned their cities by lot from the tribe of Ephraim: Shechem (the asylum-city for the unconvicted killer) in the hills of Ephraim, Gezer, Kibzaim, and Beth Horon, with their pastures—four towns.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the tribe of Dan they received Eltekeh, Gibbethon, Aijalon, and Gath Rimmon, all with their pastures—four towns.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And from the half-tribe of Manasseh they received Taanach and Gath Rimmon with their pastures—two towns.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All told, ten cities with their pastures went to the remaining Kohathite families.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gershonite families of the tribe of Levi were given from the half-tribe of Manasseh: Golan in Bashan (an asylum-city for the unconvicted killer), and Be Eshtarah, with their pastures—two cities.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from the tribe of Issachar: Kishion, Daberath, Jarmuth, and En Gannim, with their pastures—four towns.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the People of Israel, out of their own inheritance, gave the Levites, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded, the following cities and pastures:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the tribe of Asher: Mishal, Abdon, Helkath, and Rehob, with their pastures—four towns.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the tribe of Naphtali: Kedesh in Galilee (an asylum-city for the unconvicted killer), Hammoth Dor, and Kartan, with their pastures—three towns.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Gershonites and their families: thirteen towns with their pastures.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Merari families, the remaining Levites, were given from the tribe of Zebulun: Jokneam, Kartah, Dimnah, and Nahalal, with their pastures—four cities.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the tribe of Reuben: Bezer, Jahaz, Kedemoth, and Mephaath, with their pastures—four towns.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the tribe of Gad: Ramoth in Gilead (an asylum-city for the unconvicted killer), Mahanaim, Heshbon, and Jazer, with their pastures—a total of four towns.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lot came out for the families of the Kohathites this way: Levites descended from Aaron the priest received by lot thirteen cities out of the tribes of Judah, Simeon, and Benjamin. The rest of the Kohathites received by lot ten cities from the families of the tribes of Ephraim, Dan, and the half-tribe of Manasseh.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these towns were assigned by lot to the Merarites, the remaining Levites—twelve towns.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Levites held forty-eight towns with their accompanying pastures within the territory of the People of Israel. Each of these towns had pastures surrounding it—this was the case for all these towns.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave Israel the entire land that he had solemnly vowed to give to their ancestors. They took possession of it and made themselves at home in it. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave them rest on all sides, as he had also solemnly vowed to their ancestors. Not a single one of their enemies was able to stand up to them—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' handed over all their enemies to them.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not one word failed from all the good words '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to the house of Israel. Everything came out right.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Gershonites received by lot thirteen cities from the families of the tribes of Issachar, Asher, Naphtali, and the half-tribe of Manasseh in Bashan.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The families of the Merarites received twelve towns from the tribes of Reuben, Gad, and Zebulun.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the People of Israel gave these cities with their pastures to the Levites just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had ordered through Moses, that is, by lot.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cities for the Descendants of Aaron
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They assigned from the tribes of Judah, Simeon, and Benjamin the following towns, here named individually (these were for the descendants of Aaron who were from the families of the Kohathite branch of Levi because the first lot fell to them):'
