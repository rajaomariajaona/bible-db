document_id: PSA.73,97
type_code: eng
verses:
  '1':
  - type: text
    content: No doubt about it! God is good—
  - type: text
    content: good to good people, good to the good-hearted.
  - type: text
    content: But I nearly missed it,
  - type: text
    content: missed seeing his goodness.
  - type: text
    content: I was looking the other way,
  - type: text
    content: looking up to the people
  - type: text
    content: At the top,
  - type: text
    content: envying the wicked who have it made,
  - type: text
    content: Who have nothing to worry about,
  - type: text
    content: not a care in the whole wide world.
  '11':
  - type: text
    content: What’s going on here? Is God out to lunch?
  - type: text
    content: Nobody’s tending the store.
  - type: text
    content: The wicked get by with everything;
  - type: text
    content: they have it made, piling up riches.
  - type: text
    content: I’ve been stupid to play by the rules;
  - type: text
    content: what has it gotten me?
  - type: text
    content: A long run of bad luck, that’s what—
  - type: text
    content: a slap in the face every time I walk out the door.
  '15':
  - type: text
    content: If I’d have given in and talked like this,
  - type: text
    content: I would have betrayed your dear children.
  - type: text
    content: Still, when I tried to figure it out,
  - type: text
    content: all I got was a splitting headache . . .
  - type: text
    content: Until I entered the sanctuary of God.
  - type: text
    content: 'Then I saw the whole picture:'
  - type: text
    content: The slippery road you’ve put them on,
  - type: text
    content: with a final crash in a ditch of delusions.
  - type: text
    content: In the blink of an eye, disaster!
  - type: text
    content: A blind curve in the dark, and—nightmare!
  - type: text
    content: We wake up and rub our eyes. . . . Nothing.
  - type: text
    content: There’s nothing to them. And there never was.
  '21':
  - type: text
    content: When I was beleaguered and bitter,
  - type: text
    content: totally consumed by envy,
  - type: text
    content: I was totally ignorant, a dumb ox
  - type: text
    content: in your very presence.
  - type: text
    content: I’m still in your presence,
  - type: text
    content: but you’ve taken my hand.
  - type: text
    content: You wisely and tenderly lead me,
  - type: text
    content: and then you bless me.
  '25':
  - type: text
    content: You’re all I want in heaven!
  - type: text
    content: You’re all I want on earth!
  - type: text
    content: When my skin sags and my bones get brittle,
  - type: text
    content: God
  - type: text
    content: ' is rock-firm and faithful.'
  - type: text
    content: Look! Those who left you are falling apart!
  - type: text
    content: Deserters, they’ll never be heard from again.
  - type: text
    content: But I’m in the very presence of God—
  - type: text
    content: oh, how refreshing it is!
  - type: text
    content: 'I’ve made Lord '
  - type: text
    content: God
  - type: text
    content: ' my home.'
  - type: text
    content: God, I’m telling the world what you do!
  '6':
  - type: text
    content: Pretentious with arrogance,
  - type: text
    content: they wear the latest fashions in violence,
  - type: text
    content: Pampered and overfed,
  - type: text
    content: decked out in silk bows of silliness.
  - type: text
    content: They jeer, using words to kill;
  - type: text
    content: they bully their way with words.
  - type: text
    content: They’re full of hot air,
  - type: text
    content: loudmouths disturbing the peace.
  - type: text
    content: People actually listen to them—can you believe it?
  - type: text
    content: Like thirsty puppies, they lap up their words.
