document_id: PSA.73
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: No doubt about it! God is good—
- type: usfm
  marker: q2
  children:
  - type: text
    text: good to good people, good to the good-hearted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I nearly missed it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: missed seeing his goodness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was looking the other way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking up to the people
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the top,
- type: usfm
  marker: q2
  children:
  - type: text
    text: envying the wicked who have it made,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have nothing to worry about,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a care in the whole wide world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-10
  - type: text
    text: Pretentious with arrogance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they wear the latest fashions in violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pampered and overfed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: decked out in silk bows of silliness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They jeer, using words to kill;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they bully their way with words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re full of hot air,
- type: usfm
  marker: q2
  children:
  - type: text
    text: loudmouths disturbing the peace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People actually listen to them—can you believe it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like thirsty puppies, they lap up their words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: What’s going on here? Is God out to lunch?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nobody’s tending the store.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wicked get by with everything;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have it made, piling up riches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve been stupid to play by the rules;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what has it gotten me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A long run of bad luck, that’s what—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a slap in the face every time I walk out the door.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-20
  - type: text
    text: If I’d have given in and talked like this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would have betrayed your dear children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, when I tried to figure it out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all I got was a splitting headache . . .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I entered the sanctuary of God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Then I saw the whole picture:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The slippery road you’ve put them on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a final crash in a ditch of delusions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the blink of an eye, disaster!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A blind curve in the dark, and—nightmare!
- type: usfm
  marker: q1
  children:
  - type: text
    text: We wake up and rub our eyes. . . . Nothing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There’s nothing to them. And there never was.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: When I was beleaguered and bitter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: totally consumed by envy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was totally ignorant, a dumb ox
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your very presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m still in your presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’ve taken my hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You wisely and tenderly lead me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then you bless me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-28
  - type: text
    text: You’re all I want in heaven!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re all I want on earth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When my skin sags and my bones get brittle,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is rock-firm and faithful.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look! Those who left you are falling apart!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deserters, they’ll never be heard from again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’m in the very presence of God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: oh, how refreshing it is!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’ve made Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' my home.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: God, I’m telling the world what you do!
