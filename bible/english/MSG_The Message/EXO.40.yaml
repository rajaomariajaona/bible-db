document_id: EXO.40,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “Moses Finished the Work”
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “On the first day of the first month, set up The Dwelling, the Tent of Meeting. Place the Chest of The Testimony in it and screen the Chest with the curtain.'
  '12':
  - type: text
    content: “Finally, bring Aaron and his sons to the entrance of the Tent of Meeting and wash them with water. Dress Aaron in the sacred vestments. Anoint him. Set him apart to serve me as priest. Bring his sons and put tunics on them. Anoint them, just as you anointed their father, to serve me as priests. Their anointing will bring them into a perpetual priesthood, down through the generations.”
  '16':
  - type: text
    content: 'Moses did everything '
  - type: text
    content: God
  - type: text
    content: ' commanded. He did it all.'
  '17':
  - type: text
    content: 'On the first day of the first month of the second year, The Dwelling was set up. Moses set it up: He laid its bases, erected the frames, placed the crossbars, set the posts, spread the tent over The Dwelling, and put the covering over the tent, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '20':
  - type: text
    content: 'He placed The Testimony in the Chest, inserted the poles for carrying the Chest, and placed the lid, the Atonement-Cover, on it. He brought the Chest into The Dwelling and set up the curtain, screening off the Chest of The Testimony, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: 'He placed the Table in the Tent of Meeting on the north side of The Dwelling, outside the curtain, and arranged the Bread there before '
  - type: text
    content: God
  - type: text
    content: ', just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded him.'
  '24':
  - type: text
    content: 'He placed the Lampstand in the Tent of Meeting opposite the Table on the south side of The Dwelling and set up the lamps before '
  - type: text
    content: God
  - type: text
    content: ', just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded him.'
  '26':
  - type: text
    content: 'Moses placed the Gold Altar in the Tent of Meeting in front of the curtain and burned fragrant incense on it, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded him.'
  '28':
  - type: text
    content: He placed the screen at the entrance to The Dwelling.
  '29':
  - type: text
    content: 'He set the Altar of Whole-Burnt-Offering at the door of The Dwelling, the Tent of Meeting, and offered up the Whole-Burnt-Offerings and the Grain-Offerings, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '30':
  - type: text
    content: 'He placed the Washbasin between the Tent of Meeting and the Altar, and filled it with water for washing. Moses and Aaron and his sons washed their hands and feet there. When they entered the Tent of Meeting and when they served at the Altar, they washed, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '33':
  - type: text
    content: Finally, he erected the Courtyard all around The Dwelling and the Altar, and put up the screen for the Courtyard entrance.
  - type: text
    content: Moses finished the work.
  '34':
  - type: text
    content: 'The Cloud covered the Tent of Meeting, and the Glory of '
  - type: text
    content: God
  - type: text
    content: ' filled The Dwelling. Moses couldn’t enter the Tent of Meeting because the Cloud was upon it, and the Glory of '
  - type: text
    content: God
  - type: text
    content: ' filled The Dwelling.'
  '36':
  - type: text
    content: 'Whenever the Cloud lifted from The Dwelling, the People of Israel set out on their travels, but if the Cloud did not lift, they wouldn’t set out until it did lift. The Cloud of '
  - type: text
    content: God
  - type: text
    content: ' was over The Dwelling during the day and the fire was in it at night, visible to all the Israelites in all their travels.'
  '4':
  - type: text
    content: “Bring in the Table and set it, arranging its Lampstand and lamps.
  '5':
  - type: text
    content: “Place the Gold Altar of Incense before the Chest of The Testimony and hang the curtain at the door of The Dwelling.
  '6':
  - type: text
    content: “Place the Altar of Whole-Burnt-Offering at the door of The Dwelling, the Tent of Meeting.
  '7':
  - type: text
    content: “Place the Washbasin between the Tent of Meeting and the Altar and fill it with water.
  '8':
  - type: text
    content: “Set up the Courtyard on all sides and hang the curtain at the entrance to the Courtyard.
  '9':
  - type: text
    content: '“Then take the anointing oil and anoint The Dwelling and everything in it; consecrate it and all its furnishings so that it becomes holy. Anoint the Altar of Whole-Burnt-Offering and all its utensils, consecrating the Altar so that it is completely holy. Anoint the Washbasin and its base: consecrate it.'
