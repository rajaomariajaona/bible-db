document_id: EXO.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: “Moses Finished the Work”
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “On the first day of the first month, set up The Dwelling, the Tent of Meeting. Place the Chest of The Testimony in it and screen the Chest with the curtain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Bring in the Table and set it, arranging its Lampstand and lamps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Place the Gold Altar of Incense before the Chest of The Testimony and hang the curtain at the door of The Dwelling.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Place the Altar of Whole-Burnt-Offering at the door of The Dwelling, the Tent of Meeting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Place the Washbasin between the Tent of Meeting and the Altar and fill it with water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Set up the Courtyard on all sides and hang the curtain at the entrance to the Courtyard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: '“Then take the anointing oil and anoint The Dwelling and everything in it; consecrate it and all its furnishings so that it becomes holy. Anoint the Altar of Whole-Burnt-Offering and all its utensils, consecrating the Altar so that it is completely holy. Anoint the Washbasin and its base: consecrate it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: “Finally, bring Aaron and his sons to the entrance of the Tent of Meeting and wash them with water. Dress Aaron in the sacred vestments. Anoint him. Set him apart to serve me as priest. Bring his sons and put tunics on them. Anoint them, just as you anointed their father, to serve me as priests. Their anointing will bring them into a perpetual priesthood, down through the generations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moses did everything '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded. He did it all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'On the first day of the first month of the second year, The Dwelling was set up. Moses set it up: He laid its bases, erected the frames, placed the crossbars, set the posts, spread the tent over The Dwelling, and put the covering over the tent, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'He placed The Testimony in the Chest, inserted the poles for carrying the Chest, and placed the lid, the Atonement-Cover, on it. He brought the Chest into The Dwelling and set up the curtain, screening off the Chest of The Testimony, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'He placed the Table in the Tent of Meeting on the north side of The Dwelling, outside the curtain, and arranged the Bread there before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'He placed the Lampstand in the Tent of Meeting opposite the Table on the south side of The Dwelling and set up the lamps before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'Moses placed the Gold Altar in the Tent of Meeting in front of the curtain and burned fragrant incense on it, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He placed the screen at the entrance to The Dwelling.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He set the Altar of Whole-Burnt-Offering at the door of The Dwelling, the Tent of Meeting, and offered up the Whole-Burnt-Offerings and the Grain-Offerings, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-32
  - type: text
    text: 'He placed the Washbasin between the Tent of Meeting and the Altar, and filled it with water for washing. Moses and Aaron and his sons washed their hands and feet there. When they entered the Tent of Meeting and when they served at the Altar, they washed, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Finally, he erected the Courtyard all around The Dwelling and the Altar, and put up the screen for the Courtyard entrance.
- type: usfm
  marker: p
  children:
  - type: text
    text: Moses finished the work.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: 'The Cloud covered the Tent of Meeting, and the Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled The Dwelling. Moses couldn’t enter the Tent of Meeting because the Cloud was upon it, and the Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled The Dwelling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: 'Whenever the Cloud lifted from The Dwelling, the People of Israel set out on their travels, but if the Cloud did not lift, they wouldn’t set out until it did lift. The Cloud of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was over The Dwelling during the day and the fire was in it at night, visible to all the Israelites in all their travels.'
