document_id: REV.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Moses, the Song of the Lamb
  - type: text
    content: 'I saw another Sign in Heaven, huge and breathtaking: seven Angels with seven disasters. These are the final disasters, the wrap-up of God’s wrath.'
  '2':
  - type: text
    content: 'I saw something like a sea made of glass, the glass all shot through with fire. Carrying harps of God, triumphant over the Beast, its image, and the number of its name, the saved ones stood on the sea of glass. They sang the Song of Moses, servant of God; they sang the Song of the Lamb:'
  - type: text
    content: Mighty your acts and marvelous,
  - type: text
    content: O God, the Sovereign-Strong!
  - type: text
    content: Righteous your ways and true,
  - type: text
    content: King of the nations!
  - type: text
    content: Who can fail to fear you, God,
  - type: text
    content: give glory to your Name?
  - type: text
    content: Because you and you only are holy,
  - type: text
    content: all nations will come and worship you,
  - type: text
    content: because they see your judgments are right.
  '5':
  - type: text
    content: Then I saw the doors of the Temple, the Tent of Witness in Heaven, open wide. The Seven Angels carrying the seven disasters came out of the Temple. They were dressed in clean, bright linen and wore gold vests. One of the Four Animals handed the Seven Angels seven gold bowls, brimming with the wrath of God, who lives forever and ever. Smoke from God’s glory and power poured out of the Temple. No one was permitted to enter the Temple until the seven disasters of the Seven Angels were finished.
