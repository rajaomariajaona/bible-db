document_id: REV.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Song of Moses, the Song of the Lamb
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I saw another Sign in Heaven, huge and breathtaking: seven Angels with seven disasters. These are the final disasters, the wrap-up of God’s wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: 'I saw something like a sea made of glass, the glass all shot through with fire. Carrying harps of God, triumphant over the Beast, its image, and the number of its name, the saved ones stood on the sea of glass. They sang the Song of Moses, servant of God; they sang the Song of the Lamb:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mighty your acts and marvelous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God, the Sovereign-Strong!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Righteous your ways and true,
- type: usfm
  marker: q2
  children:
  - type: text
    text: King of the nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can fail to fear you, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give glory to your Name?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you and you only are holy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all nations will come and worship you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they see your judgments are right.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: Then I saw the doors of the Temple, the Tent of Witness in Heaven, open wide. The Seven Angels carrying the seven disasters came out of the Temple. They were dressed in clean, bright linen and wore gold vests. One of the Four Animals handed the Seven Angels seven gold bowls, brimming with the wrath of God, who lives forever and ever. Smoke from God’s glory and power poured out of the Temple. No one was permitted to enter the Temple until the seven disasters of the Seven Angels were finished.
