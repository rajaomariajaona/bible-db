document_id: HEB.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Going through a long line of prophets, God has been addressing our ancestors in different ways for centuries. Recently he spoke to us directly through his Son. By his Son, God created the world in the beginning, and it will all belong to the Son at the end. This Son perfectly mirrors God, and is stamped with God’s nature. He holds everything together by what he says—powerful words!'
  - type: heading
    content: The Son Is Higher than Angels
  '10':
  - type: text
    content: And again to the Son,
  - type: text
    content: You, Master, started it all, laid earth’s foundations,
  - type: text
    content: then crafted the stars in the sky.
  - type: text
    content: Earth and sky will wear out, but not you;
  - type: text
    content: they become threadbare like an old coat;
  - type: text
    content: You’ll fold them up like a worn-out cloak,
  - type: text
    content: and lay them away on the shelf.
  - type: text
    content: But you’ll stay the same, year after year;
  - type: text
    content: you’ll never fade, you’ll never wear out.
  '13':
  - type: text
    content: And did he ever say anything like this to an angel?
  - type: text
    content: Sit alongside me here on my throne
  - type: text
    content: Until I make your enemies a stool for your feet.
  '14':
  - type: text
    content: Isn’t it obvious that all angels are sent to help out with those lined up to receive salvation?
  '3':
  - type: text
    content: ' After he finished the sacrifice for sins, the Son took his honored place high in the heavens right alongside God, far higher than any angel in rank and rule. Did God ever say to an angel, “You’re my Son; today I celebrate you” or “I’m his Father, he’s my Son”? When he presents his honored Son to the world, he says, “All angels must worship him.”'
  '7':
  - type: text
    content: Regarding angels he says,
  - type: text
    content: The messengers are winds,
  - type: text
    content: the servants are tongues of fire.
  '8':
  - type: text
    content: But he says to the Son,
  - type: text
    content: You’re God, and on the throne for good;
  - type: text
    content: your rule makes everything right.
  - type: text
    content: You love it when things are right;
  - type: text
    content: you hate it when things are wrong.
  - type: text
    content: That is why God, your God,
  - type: text
    content: poured fragrant oil on your head,
  - type: text
    content: Marking you out as king,
  - type: text
    content: far above your dear companions.
