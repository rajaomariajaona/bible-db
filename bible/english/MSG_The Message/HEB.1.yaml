document_id: HEB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3a
  - type: text
    text: ' Going through a long line of prophets, God has been addressing our ancestors in different ways for centuries. Recently he spoke to us directly through his Son. By his Son, God created the world in the beginning, and it will all belong to the Son at the end. This Son perfectly mirrors God, and is stamped with God’s nature. He holds everything together by what he says—powerful words!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Son Is Higher than Angels
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3b-6
  - type: text
    text: ' After he finished the sacrifice for sins, the Son took his honored place high in the heavens right alongside God, far higher than any angel in rank and rule. Did God ever say to an angel, “You’re my Son; today I celebrate you” or “I’m his Father, he’s my Son”? When he presents his honored Son to the world, he says, “All angels must worship him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Regarding angels he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The messengers are winds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the servants are tongues of fire.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: But he says to the Son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re God, and on the throne for good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your rule makes everything right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You love it when things are right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you hate it when things are wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That is why God, your God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: poured fragrant oil on your head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marking you out as king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: far above your dear companions.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: And again to the Son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You, Master, started it all, laid earth’s foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then crafted the stars in the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth and sky will wear out, but not you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they become threadbare like an old coat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll fold them up like a worn-out cloak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lay them away on the shelf.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you’ll stay the same, year after year;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll never fade, you’ll never wear out.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And did he ever say anything like this to an angel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sit alongside me here on my throne
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I make your enemies a stool for your feet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Isn’t it obvious that all angels are sent to help out with those lined up to receive salvation?
