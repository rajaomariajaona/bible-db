    content: ' '
  - type: text
    content: God
  - type: text
    content: ', put an end to evil;'
  - type: text
    content: avenging God, show your colors!
  - type: text
    content: Judge of the earth, take your stand;
  - type: text
    content: throw the book at the arrogant.
  '12':
  - type: text
    content: 'How blessed the man you train, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the woman you instruct in your Word,
  - type: text
    content: Providing a circle of quiet within the clamor of evil,
  - type: text
    content: while a jail is being built for the wicked.
  - type: text
    content: God
  - type: text
    content: ' will never walk away from his people,'
  - type: text
    content: never desert his precious people.
  - type: text
    content: Rest assured that justice is on its way
  - type: text
    content: and every good heart put right.
  '16':
  - type: text
    content: Who stood up for me against the wicked?
  - type: text
    content: Who took my side against evil workers?
  - type: text
    content: 'If '
  - type: text
    content: 'God '
  - type: text
    content: hadn’t been there for me,
  - type: text
    content: I never would have made it.
  - type: text
    content: The minute I said, “I’m slipping, I’m falling,”
  - type: text
    content: 'your love, '
  - type: text
    content: God
  - type: text
    content: ', took hold and held me fast.'
  - type: text
    content: When I was upset and beside myself,
  - type: text
    content: you calmed me down and cheered me up.
  '20':
  - type: text
    content: Can Misrule have anything in common with you?
  - type: text
    content: Can Troublemaker pretend to be on your side?
  - type: text
    content: They ganged up on good people,
  - type: text
    content: plotted behind the backs of the innocent.
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' became my hideout,'
  - type: text
    content: God was my high mountain retreat,
  - type: text
    content: 'Then boomeranged their evil back on them:'
  - type: text
    content: for their evil ways he wiped them out,
  - type: text
    content: 'our '
  - type: text
    content: God
  - type: text
    content: ' cleaned them out for good.'
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the wicked get away with murder—'
  - type: text
    content: how long will you let this go on?
  - type: text
    content: They brag and boast
  - type: text
    content: and crow about their crimes!
  '5':
  - type: text
    content: 'They walk all over your people, '
  - type: text
    content: God,
  - type: text
    content: exploit and abuse your precious people.
  - type: text
    content: They take out anyone who gets in their way;
  - type: text
    content: if they can’t use them, they kill them.
  - type: text
    content: They think, “
  - type: text
    content: God
  - type: text
    content: ' isn’t looking,'
  - type: text
    content: Jacob’s God is out to lunch.”
  '8':
  - type: text
    content: Well, think again, you idiots,
  - type: text
    content: fools—how long before you get smart?
  - type: text
    content: Do you think Ear-Maker doesn’t hear,
  - type: text
    content: Eye-Shaper doesn’t see?
  - type: text
    content: Do you think the trainer of nations doesn’t correct,
  - type: text
    content: the teacher of Adam doesn’t know?
  - type: text
    content: God
  - type: text
    content: ' knows, all right—'
  - type: text
    content: knows your stupidity,
  - type: text
    content: sees your shallowness.
