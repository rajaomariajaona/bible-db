document_id: PSA.94,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', put an end to evil;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: avenging God, show your colors!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judge of the earth, take your stand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throw the book at the arrogant.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How blessed the man you train, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the woman you instruct in your Word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Providing a circle of quiet within the clamor of evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while a jail is being built for the wicked.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will never walk away from his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never desert his precious people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rest assured that justice is on its way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every good heart put right.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who stood up for me against the wicked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who took my side against evil workers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: hadn’t been there for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I never would have made it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The minute I said, “I’m slipping, I’m falling,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', took hold and held me fast.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I was upset and beside myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you calmed me down and cheered me up.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can Misrule have anything in common with you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can Troublemaker pretend to be on your side?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ganged up on good people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plotted behind the backs of the innocent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' became my hideout,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God was my high mountain retreat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then boomeranged their evil back on them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their evil ways he wiped them out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' cleaned them out for good.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the wicked get away with murder—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how long will you let this go on?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They brag and boast
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crow about their crimes!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They walk all over your people, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exploit and abuse your precious people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They take out anyone who gets in their way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if they can’t use them, they kill them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They think, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' isn’t looking,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob’s God is out to lunch.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, think again, you idiots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools—how long before you get smart?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think Ear-Maker doesn’t hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Eye-Shaper doesn’t see?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think the trainer of nations doesn’t correct,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the teacher of Adam doesn’t know?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' knows, all right—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knows your stupidity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sees your shallowness.
