document_id: 1TI.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' Whoever is a slave must make the best of it, giving respect to his master so that outsiders don’t blame God and our teaching for his behavior. Slaves with Christian masters all the more so—their masters are really their beloved brothers!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lust for Money
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-5
  - type: text
    text: ' These are the things I want you to teach and preach. If you have leaders there who teach otherwise, who refuse the solid words of our Master Jesus and this godly instruction, tag them for what they are: ignorant windbags who infect the air with germs of envy, controversy, bad-mouthing, suspicious rumors. Eventually there’s an epidemic of backstabbing, and truth is but a distant memory. They think religion is a way to make a fast buck.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: A devout life does bring wealth, but it’s the rich simplicity of being yourself before God. Since we entered the world penniless and will leave it penniless, if we have bread on the table and shoes on our feet, that’s enough.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: But if it’s only money these leaders are after, they’ll self-destruct in no time. Lust for money brings trouble and nothing but trouble. Going down that path, some lose their footing in the faith completely and live to regret it bitterly ever after.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Running Hard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'But you, Timothy, man of God: Run for your life from all this. Pursue a righteous life—a life of wonder, faith, love, steadiness, courtesy. Run hard and fast in the faith. Seize the eternal life, the life you were called to, the life you so fervently embraced in the presence of so many witnesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: 'I’m charging you before the life-giving God and before Christ, who took his stand before Pontius Pilate and didn’t give an inch: Keep this command to the letter, and don’t slack off. Our Master, Jesus Christ, is on his way. He’ll show up right on time, his arrival guaranteed by the Blessed and Undisputed Ruler, High King, High God. He’s the only one death can’t touch, his light so bright no one can get close. He’s never been seen by human eyes—human eyes can’t take him in! Honor to him, and eternal rule! Oh, yes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: Tell those rich in this world’s wealth to quit being so full of themselves and so obsessed with money, which is here today and gone tomorrow. Tell them to go after God, who piles on all the riches we could ever manage—to do good, to be rich in helping others, to be extravagantly generous. If they do that, they’ll build a treasury that will last, gaining life that is truly life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: And oh, my dear Timothy, guard the treasure you were given! Guard it with your life. Avoid the talk-show religion and the practiced confusion of the so-called experts. People caught up in a lot of talk can miss the whole point of faith.
- type: usfm
  marker: p
  children:
  - type: text
    text: Overwhelming grace keep you!
