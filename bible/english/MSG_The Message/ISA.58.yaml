document_id: ISA.58,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Your Prayers Won’t Get Off the Ground
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “Shout! A full-throated shout!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hold nothing back—a trumpet-blast shout!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell my people what’s wrong with their lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: face my family Jacob with their sins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re busy, busy, busy at worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and love studying all about me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To all appearances they’re a nation of right-living people—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: law-abiding, God-honoring.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ask me, ‘What’s the right thing to do?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and love having me on their side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they also complain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Why do we fast and you don’t look our way?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do we humble ourselves and you don’t even notice?’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you watch your step on the Sabbath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t use my holy day for personal advantage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you treat the Sabbath as a day of joy,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s holy day as a celebration,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you honor it by refusing ‘business as usual,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making money, running here and there—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you’ll be free to enjoy '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, I’ll make you ride high and soar above it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make you feast on the inheritance of your ancestor Jacob.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so!'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ' “Well, here’s why:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The bottom line on your ‘fast days’ is profit.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You drive your employees much too hard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You fast, but at the same time you bicker and fight.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You fast, but you swing a mean fist.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kind of fasting you do
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t get your prayers off the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do you think this is the kind of fast day I’m after:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day to show off humility?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To put on a pious long face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and parade around solemnly in black?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do you call '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' fasting,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a fast day that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', would like?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “This is the kind of fast day I’m after:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to break the chains of injustice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get rid of exploitation in the workplace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: free the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cancel debts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What I’m interested in seeing you do is:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sharing your food with the hungry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inviting the homeless poor into your homes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting clothes on the shivering ill-clad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: being available to your own families.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do this and the lights will turn on,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lives will turn around at once.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness will pave your way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of glory will secure your passage.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then when you pray, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will answer.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll call out for help and I’ll say, ‘Here I am.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Full Life in the Emptiest of Places
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “If you get rid of unfair practices,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quit blaming victims,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quit gossiping about other people’s sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you are generous with the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and start giving yourselves to the down-and-out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lives will begin to glow in the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your shadowed lives will be bathed in sunlight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will always show you where to go.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll give you a full life in the emptiest of places—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: firm muscles, strong bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be like a well-watered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a gurgling spring that never runs dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll use the old rubble of past lives to build anew,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebuild the foundations from out of your past.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be known as those who can fix anything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: restore old ruins, rebuild and renovate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make the community livable again.
