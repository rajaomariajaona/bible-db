document_id: ISA.58,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Your Prayers Won’t Get Off the Ground
  - type: text
    content: ' “Shout! A full-throated shout!'
  - type: text
    content: Hold nothing back—a trumpet-blast shout!
  - type: text
    content: Tell my people what’s wrong with their lives,
  - type: text
    content: face my family Jacob with their sins!
  - type: text
    content: They’re busy, busy, busy at worship,
  - type: text
    content: and love studying all about me.
  - type: text
    content: To all appearances they’re a nation of right-living people—
  - type: text
    content: law-abiding, God-honoring.
  - type: text
    content: They ask me, ‘What’s the right thing to do?’
  - type: text
    content: and love having me on their side.
  - type: text
    content: But they also complain,
  - type: text
    content: ‘Why do we fast and you don’t look our way?
  - type: text
    content: Why do we humble ourselves and you don’t even notice?’
  '13':
  - type: text
    content: “If you watch your step on the Sabbath
  - type: text
    content: and don’t use my holy day for personal advantage,
  - type: text
    content: If you treat the Sabbath as a day of joy,
  - type: text
    content: God
  - type: text
    content: ’s holy day as a celebration,
  - type: text
    content: If you honor it by refusing ‘business as usual,’
  - type: text
    content: making money, running here and there—
  - type: text
    content: 'Then you’ll be free to enjoy '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Oh, I’ll make you ride high and soar above it all.
  - type: text
    content: I’ll make you feast on the inheritance of your ancestor Jacob.”
  - type: text
    content: 'Yes! '
  - type: text
    content: God
  - type: text
    content: ' says so!'
  '3':
  - type: text
    content: ' “Well, here’s why:'
  - type: text
    content: “The bottom line on your ‘fast days’ is profit.
  - type: text
    content: You drive your employees much too hard.
  - type: text
    content: You fast, but at the same time you bicker and fight.
  - type: text
    content: You fast, but you swing a mean fist.
  - type: text
    content: The kind of fasting you do
  - type: text
    content: won’t get your prayers off the ground.
  - type: text
    content: 'Do you think this is the kind of fast day I’m after:'
  - type: text
    content: a day to show off humility?
  - type: text
    content: To put on a pious long face
  - type: text
    content: and parade around solemnly in black?
  - type: text
    content: 'Do you call '
  - type: text
    content: that
  - type: text
    content: ' fasting,'
  - type: text
    content: 'a fast day that I, '
  - type: text
    content: God
  - type: text
    content: ', would like?'
  '6':
  - type: text
    content: ' “This is the kind of fast day I’m after:'
  - type: text
    content: to break the chains of injustice,
  - type: text
    content: get rid of exploitation in the workplace,
  - type: text
    content: free the oppressed,
  - type: text
    content: cancel debts.
  - type: text
    content: 'What I’m interested in seeing you do is:'
  - type: text
    content: sharing your food with the hungry,
  - type: text
    content: inviting the homeless poor into your homes,
  - type: text
    content: putting clothes on the shivering ill-clad,
  - type: text
    content: being available to your own families.
  - type: text
    content: Do this and the lights will turn on,
  - type: text
    content: and your lives will turn around at once.
  - type: text
    content: Your righteousness will pave your way.
  - type: text
    content: 'The '
  - type: text
    content: God
  - type: text
    content: ' of glory will secure your passage.'
  - type: text
    content: 'Then when you pray, '
  - type: text
    content: God
  - type: text
    content: ' will answer.'
  - type: text
    content: You’ll call out for help and I’ll say, ‘Here I am.’
  - type: heading
    content: A Full Life in the Emptiest of Places
  '9':
  - type: text
    content: ' “If you get rid of unfair practices,'
  - type: text
    content: quit blaming victims,
  - type: text
    content: quit gossiping about other people’s sins,
  - type: text
    content: If you are generous with the hungry
  - type: text
    content: and start giving yourselves to the down-and-out,
  - type: text
    content: Your lives will begin to glow in the darkness,
  - type: text
    content: your shadowed lives will be bathed in sunlight.
  - type: text
    content: I will always show you where to go.
  - type: text
    content: I’ll give you a full life in the emptiest of places—
  - type: text
    content: firm muscles, strong bones.
  - type: text
    content: You’ll be like a well-watered garden,
  - type: text
    content: a gurgling spring that never runs dry.
  - type: text
    content: You’ll use the old rubble of past lives to build anew,
  - type: text
    content: rebuild the foundations from out of your past.
  - type: text
    content: You’ll be known as those who can fix anything,
  - type: text
    content: restore old ruins, rebuild and renovate,
  - type: text
    content: make the community livable again.
