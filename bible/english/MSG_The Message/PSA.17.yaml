document_id: PSA.17,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Listen while I build my case, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the most honest prayer you’ll ever hear.
  - type: text
    content: Show the world I’m innocent—
  - type: text
    content: in your heart you know I am.
  '10':
  - type: text
    content: Their hearts are hard as nails,
  - type: text
    content: their mouths blast hot air.
  - type: text
    content: They are after me, nipping my heels,
  - type: text
    content: determined to bring me down,
  - type: text
    content: Lions ready to rip me apart,
  - type: text
    content: young lions poised to pounce.
  - type: text
    content: 'Up, '
  - type: text
    content: God
  - type: text
    content: ': beard them! break them!'
  - type: text
    content: By your sword, free me from their clutches;
  - type: text
    content: 'Barehanded, '
  - type: text
    content: God
  - type: text
    content: ', break these mortals,'
  - type: text
    content: these flat-earth people who can’t think beyond today.
  - type: text
    content: I’d like to see their bellies
  - type: text
    content: swollen with famine food,
  - type: text
    content: The weeds they’ve sown
  - type: text
    content: harvested and baked into famine bread,
  - type: text
    content: With second helpings for their children
  - type: text
    content: and crusts for their babies to chew on.
  '15':
  - type: text
    content: And me? I plan on looking
  - type: text
    content: you full in the face. When I get up,
  - type: text
    content: I’ll see your full stature
  - type: text
    content: and live heaven on earth.
  '3':
  - type: text
    content: Go ahead, examine me from inside out,
  - type: text
    content: surprise me in the middle of the night—
  - type: text
    content: You’ll find I’m just what I say I am.
  - type: text
    content: My words don’t run loose.
  '4':
  - type: text
    content: I’m not trying to get my way
  - type: text
    content: in the world’s way.
  - type: text
    content: 'I’m trying to get '
  - type: text
    content: your
  - type: text
    content: ' way,'
  - type: text
    content: your Word’s way.
  - type: text
    content: I’m staying on your trail;
  - type: text
    content: I’m putting one foot
  - type: text
    content: In front of the other.
  - type: text
    content: I’m not giving up.
  '6':
  - type: text
    content: I call to you, God, because I’m sure of an answer.
  - type: text
    content: So—answer! bend your ear! listen sharp!
  - type: text
    content: Paint grace-graffiti on the fences;
  - type: text
    content: take in your frightened children who
  - type: text
    content: Are running from the neighborhood bullies
  - type: text
    content: straight to you.
  '8':
  - type: text
    content: Keep your eye on me;
  - type: text
    content: hide me under your cool wing feathers
  - type: text
    content: From the wicked who are out to get me,
  - type: text
    content: from mortal enemies closing in.
