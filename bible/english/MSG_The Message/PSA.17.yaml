document_id: PSA.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Listen while I build my case, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most honest prayer you’ll ever hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show the world I’m innocent—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your heart you know I am.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-14
    - type: text
      text: Their hearts are hard as nails,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their mouths blast hot air.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are after me, nipping my heels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: determined to bring me down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lions ready to rip me apart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young lions poised to pounce.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': beard them! break them!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By your sword, free me from their clutches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Barehanded, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', break these mortals,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these flat-earth people who can’t think beyond today.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’d like to see their bellies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swollen with famine food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The weeds they’ve sown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: harvested and baked into famine bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With second helpings for their children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crusts for their babies to chew on.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And me? I plan on looking
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you full in the face. When I get up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll see your full stature
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and live heaven on earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Go ahead, examine me from inside out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surprise me in the middle of the night—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll find I’m just what I say I am.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My words don’t run loose.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: I’m not trying to get my way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the world’s way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m trying to get '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' way,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your Word’s way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m staying on your trail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m putting one foot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In front of the other.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m not giving up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: I call to you, God, because I’m sure of an answer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So—answer! bend your ear! listen sharp!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paint grace-graffiti on the fences;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take in your frightened children who
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are running from the neighborhood bullies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: straight to you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: Keep your eye on me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hide me under your cool wing feathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the wicked who are out to get me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from mortal enemies closing in.
