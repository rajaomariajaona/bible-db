- type: usfm
  marker: s1
  children:
  - type: text
    text: David Pretends to Go Crazy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David went on his way and Jonathan returned to town.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'David went to Nob, to Ahimelech the Priest. Ahimelech was alarmed as he went out to greet David: “What are you doing here all by yourself—and not a soul with you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'David answered Ahimelech the Priest, “The king sent me on a mission and gave strict orders: ‘This is top secret—not a word of this to a soul.’ I’ve arranged to meet up with my men in a certain place. Now, what’s there here to eat? Do you have five loaves of bread? Give me whatever you can scrounge up!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I don’t have any regular bread on hand,” said the priest. “I only have holy bread. If your men have not slept with women recently, it’s yours.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David said, “None of us has touched a woman. I always do it this way when I’m on a mission: My men abstain from sex. Even when it is an ordinary mission we do that—how much more on this holy mission.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the priest gave them the holy bread. It was the only bread he had, Bread of the Presence that had been removed from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s presence and replaced by fresh bread at the same time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: One of Saul’s officials was present that day keeping a religious vow. His name was Doeg the Edomite. He was chief of Saul’s shepherds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: David asked Ahimelech, “Do you have a spear or sword of any kind around here? I didn’t have a chance to grab my weapons. The king’s mission was urgent and I left in a hurry.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The priest said, “The sword of Goliath, the Philistine you killed at Oak Valley—that’s here! It’s behind the Ephod wrapped in a cloth. If you want it, take it. There’s nothing else here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “Oh,” said David, “there’s no sword like that! Give it to me!”
- type: usfm
  marker: p
  children:
  - type: text
    text: And at that, David shot out of there, running for his life from Saul. He went to Achish, king of Gath. When the servants of Achish saw him, they said, “Can this be David, the famous David? Is this the one they sing of at their dances?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saul kills by the thousand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: David by the ten thousand!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: When David realized that he had been recognized, he panicked, fearing the worst from Achish, king of Gath. So right there, while they were looking at him, he pretended to go crazy, pounding his head on the city gate and foaming at the mouth, spit dripping from his beard. Achish took one look at him and said to his servants, “Can’t you see he’s crazy? Why did you let him in here? Don’t you think I have enough crazy people to put up with as it is without adding another? Get him out of here!”
