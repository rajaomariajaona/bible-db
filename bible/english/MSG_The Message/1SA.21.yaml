type_code: eng
verses:
  '1':
  - type: heading
    content: David Pretends to Go Crazy
  - type: text
    content: David went on his way and Jonathan returned to town.
  - type: text
    content: 'David went to Nob, to Ahimelech the Priest. Ahimelech was alarmed as he went out to greet David: “What are you doing here all by yourself—and not a soul with you?”'
  '10':
  - type: text
    content: “Oh,” said David, “there’s no sword like that! Give it to me!”
  - type: text
    content: And at that, David shot out of there, running for his life from Saul. He went to Achish, king of Gath. When the servants of Achish saw him, they said, “Can this be David, the famous David? Is this the one they sing of at their dances?
  - type: text
    content: Saul kills by the thousand,
  - type: text
    content: David by the ten thousand!”
  '12':
  - type: text
    content: When David realized that he had been recognized, he panicked, fearing the worst from Achish, king of Gath. So right there, while they were looking at him, he pretended to go crazy, pounding his head on the city gate and foaming at the mouth, spit dripping from his beard. Achish took one look at him and said to his servants, “Can’t you see he’s crazy? Why did you let him in here? Don’t you think I have enough crazy people to put up with as it is without adding another? Get him out of here!”
  '2':
  - type: text
    content: 'David answered Ahimelech the Priest, “The king sent me on a mission and gave strict orders: ‘This is top secret—not a word of this to a soul.’ I’ve arranged to meet up with my men in a certain place. Now, what’s there here to eat? Do you have five loaves of bread? Give me whatever you can scrounge up!”'
  '4':
  - type: text
    content: “I don’t have any regular bread on hand,” said the priest. “I only have holy bread. If your men have not slept with women recently, it’s yours.”
  '5':
  - type: text
    content: 'David said, “None of us has touched a woman. I always do it this way when I’m on a mission: My men abstain from sex. Even when it is an ordinary mission we do that—how much more on this holy mission.”'
  '6':
  - type: text
    content: 'So the priest gave them the holy bread. It was the only bread he had, Bread of the Presence that had been removed from '
  - type: text
    content: God
  - type: text
    content: ’s presence and replaced by fresh bread at the same time.
  '7':
  - type: text
    content: One of Saul’s officials was present that day keeping a religious vow. His name was Doeg the Edomite. He was chief of Saul’s shepherds.
  '8':
  - type: text
    content: David asked Ahimelech, “Do you have a spear or sword of any kind around here? I didn’t have a chance to grab my weapons. The king’s mission was urgent and I left in a hurry.”
  '9':
  - type: text
    content: The priest said, “The sword of Goliath, the Philistine you killed at Oak Valley—that’s here! It’s behind the Ephod wrapped in a cloth. If you want it, take it. There’s nothing else here.”
