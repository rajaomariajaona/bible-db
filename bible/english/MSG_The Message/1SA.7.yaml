document_id: 1SA.7,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'And they did. The men of Kiriath Jearim came and got the Chest of '
  - type: text
    content: God
  - type: text
    content: ' and delivered it to the house of Abinadab on the hill. They ordained his son, Eleazar, to take responsibility for the Chest of '
  - type: text
    content: God
  - type: text
    content: .
  '10':
  - type: text
    content: 'While Samuel was offering the sacrifice, the Philistines came within range to fight Israel. Just then '
  - type: text
    content: God
  - type: text
    content: ' thundered, a huge thunderclap exploding among the Philistines. They panicked—mass confusion!—and scattered before Israel. Israel poured out of Mizpah and gave chase, killing Philistines right and left, to a point just beyond Beth Car. Samuel took a single rock and set it upright between Mizpah and Shen. He named it “Ebenezer” (Rock of Help), saying, “This marks the place where '
  - type: text
    content: God
  - type: text
    content: ' helped us.”'
  '13':
  - type: text
    content: 'The Philistines learned their lesson and stayed home—no more border crossings. '
  - type: text
    content: God
  - type: text
    content: ' was hard on the Philistines all through Samuel’s lifetime. All the cities from Ekron to Gath that the Philistines had taken from Israel were restored. Israel also freed the surrounding countryside from Philistine control. And there was peace between Israel and the Amorites.'
  '15':
  - type: text
    content: 'Samuel gave solid leadership to Israel his entire life. Every year he went on a circuit from Bethel to Gilgal to Mizpah. He gave leadership to Israel in each of these places. But always he would return to Ramah, where he lived, and preside from there. That is where he built an altar to '
  - type: text
    content: God
  - type: text
    content: .
  '2':
  - type: text
    content: 'From the time that the Chest came to rest in Kiriath Jearim, a long time passed—twenty years it was—and throughout Israel there was a widespread, fearful movement toward '
  - type: text
    content: God
  - type: text
    content: .
  '3':
  - type: text
    content: 'Then Samuel addressed the house of Israel: “If you are truly serious about coming back to '
  - type: text
    content: God
  - type: text
    content: ', clean house. Get rid of the foreign gods and fertility goddesses, ground yourselves firmly in '
  - type: text
    content: God
  - type: text
    content: ', worship him and him alone, and he’ll save you from Philistine oppression.”'
  '4':
  - type: text
    content: 'They did it. They got rid of the gods and goddesses, the images of Baal and Ashtoreth, and gave their exclusive attention and service to '
  - type: text
    content: God
  - type: text
    content: .
  '5':
  - type: text
    content: Next Samuel said, “Get everybody together at Mizpah and I’ll pray for you.”
  '6':
  - type: text
    content: 'So everyone assembled at Mizpah. They drew water from the wells and poured it out before '
  - type: text
    content: God
  - type: text
    content: ' in a ritual of cleansing. They fasted all day and prayed, “We have sinned against '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: So Samuel prepared the Israelites for holy war there at Mizpah.
  - type: heading
    content: The Place Where God Helped Us
  '7':
  - type: text
    content: When the Philistines heard that Israel was meeting at Mizpah, the Philistine leaders went on the offensive. Israel got the report and became frightened—Philistines on the move again!
  '8':
  - type: text
    content: 'They pleaded with Samuel, “Pray with all your might! And don’t let up! Pray to '
  - type: text
    content: God
  - type: text
    content: ', our God, that he’ll save us from the boot of the Philistines.”'
  '9':
  - type: text
    content: 'Samuel took a young lamb not yet weaned and offered it whole as a Whole-Burnt-Offering to '
  - type: text
    content: God
  - type: text
    content: '. He prayed fervently to '
  - type: text
    content: God
  - type: text
    content: ', interceding for Israel. And '
  - type: text
    content: God
  - type: text
    content: ' answered.'
