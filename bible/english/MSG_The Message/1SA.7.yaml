document_id: 1SA.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they did. The men of Kiriath Jearim came and got the Chest of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and delivered it to the house of Abinadab on the hill. They ordained his son, Eleazar, to take responsibility for the Chest of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Samuel was offering the sacrifice, the Philistines came within range to fight Israel. Just then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' thundered, a huge thunderclap exploding among the Philistines. They panicked—mass confusion!—and scattered before Israel. Israel poured out of Mizpah and gave chase, killing Philistines right and left, to a point just beyond Beth Car. Samuel took a single rock and set it upright between Mizpah and Shen. He named it “Ebenezer” (Rock of Help), saying, “This marks the place where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' helped us.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines learned their lesson and stayed home—no more border crossings. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was hard on the Philistines all through Samuel’s lifetime. All the cities from Ekron to Gath that the Philistines had taken from Israel were restored. Israel also freed the surrounding countryside from Philistine control. And there was peace between Israel and the Amorites.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel gave solid leadership to Israel his entire life. Every year he went on a circuit from Bethel to Gilgal to Mizpah. He gave leadership to Israel in each of these places. But always he would return to Ramah, where he lived, and preside from there. That is where he built an altar to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the time that the Chest came to rest in Kiriath Jearim, a long time passed—twenty years it was—and throughout Israel there was a widespread, fearful movement toward '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel addressed the house of Israel: “If you are truly serious about coming back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', clean house. Get rid of the foreign gods and fertility goddesses, ground yourselves firmly in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', worship him and him alone, and he’ll save you from Philistine oppression.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did it. They got rid of the gods and goddesses, the images of Baal and Ashtoreth, and gave their exclusive attention and service to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next Samuel said, “Get everybody together at Mizpah and I’ll pray for you.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So everyone assembled at Mizpah. They drew water from the wells and poured it out before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in a ritual of cleansing. They fasted all day and prayed, “We have sinned against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Samuel prepared the Israelites for holy war there at Mizpah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Place Where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Helped Us'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When the Philistines heard that Israel was meeting at Mizpah, the Philistine leaders went on the offensive. Israel got the report and became frightened—Philistines on the move again!
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They pleaded with Samuel, “Pray with all your might! And don’t let up! Pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God, that he’ll save us from the boot of the Philistines.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel took a young lamb not yet weaned and offered it whole as a Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. He prayed fervently to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', interceding for Israel. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' answered.'
