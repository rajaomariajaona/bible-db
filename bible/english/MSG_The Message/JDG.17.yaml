  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: There was a man from the hill country of Ephraim named Micah. He said to his mother, “Remember that 1,100 pieces of silver that were taken from you? I overheard you when you pronounced your curse. Well, I have the money; I stole it. But now I’ve brought it back to you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: His mother said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' bless you, my son!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'As he returned the 1,100 silver pieces to his mother, she said, “I had totally consecrated this money to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for my son to make a statue, a cast god.” Then she took 200 pieces of the silver and gave it to a sculptor and he cast them into the form of a god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This man, Micah, had a private chapel. He had made an ephod and some teraphim-idols and had ordained one of his sons to be his priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In those days there was no king in Israel. People did whatever they felt like doing.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Meanwhile there was a young man from Bethlehem in Judah and from a family of Judah. He was a Levite but was a stranger there. He left that town, Bethlehem in Judah, seeking his fortune. He got as far as the hill country of Ephraim and showed up at Micah’s house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Micah asked him, “So where are you from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “I’m a Levite from Bethlehem in Judah. I’m on the road, looking for a place to settle down.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Micah said, “Stay here with me. Be my father and priest. I’ll pay you ten pieces of silver a year, whatever clothes you need, and your meals.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: The Levite agreed and moved in with Micah. The young man fit right in and became one of the family. Micah appointed the young Levite as his priest. This all took place in Micah’s home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Micah said, “Now I know that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will make things go well for me—why, I’ve got a Levite for a priest!”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
