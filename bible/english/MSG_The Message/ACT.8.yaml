document_id: ACT.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Simon the Wizard
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: That set off a terrific persecution of the church in Jerusalem. The believers were all scattered throughout Judea and Samaria. All, that is, but the apostles. Good and brave men buried Stephen, giving him a solemn funeral—not many dry eyes that day!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: But when Philip came to town announcing the news of God’s kingdom and proclaiming the name of Jesus Christ, they forgot Simon and were baptized, becoming believers right and left! Even Simon himself believed and was baptized. From that moment he was like Philip’s shadow, so fascinated with all the God-signs and miracles that he wouldn’t leave Philip’s side.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-17
    - type: text
      text: When the apostles in Jerusalem received the report that Samaria had accepted God’s Message, they sent Peter and John down to pray for them to receive the Holy Spirit. Up to this point they had only been baptized in the name of the Master Jesus; the Holy Spirit hadn’t yet fallen on them. Then the apostles laid their hands on them and they did receive the Holy Spirit.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: When Simon saw that the apostles by merely laying on hands conferred the Spirit, he pulled out his money, excited, and said, “Sell me your secret! Show me how you did that! How much do you want? Name your price!”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-23
    - type: text
      text: Peter said, “To hell with your money! And you along with it. Why, that’s unthinkable—trying to buy God’s gift! You’ll never be part of what God is doing by striking bargains and offering bribes. Change your ways—and now! Ask the Master to forgive you for trying to use God to make money. I can see this is an old habit with you; you reek with money-lust.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Oh!” said Simon, “pray for me! Pray to the Master that nothing like that will ever happen to me!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And with that, the apostles were on their way, continuing to witness and spread the Message of God’s salvation, preaching in every Samaritan town they passed through on their return to Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ethiopian Eunuch
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-28
    - type: text
      text: 'Later God’s angel spoke to Philip: “At noon today I want you to walk over to that desolate road that goes from Jerusalem down to Gaza.” He got up and went. He met an Ethiopian eunuch coming down the road. The eunuch had been on a pilgrimage to Jerusalem and was returning to Ethiopia, where he was minister in charge of all the finances of Candace, queen of the Ethiopians. He was riding in a chariot and reading the prophet Isaiah.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: The Spirit told Philip, “Climb into the chariot.” Running up alongside, Philip heard the eunuch reading Isaiah and asked, “Do you understand what you’re reading?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-8
    - type: text
      text: And Saul just went wild, devastating the church, entering house after house after house, dragging men and women off to jail. Forced to leave home base, the followers of Jesus all became missionaries. Wherever they were scattered, they preached the Message about Jesus. Going down to a Samaritan city, Philip proclaimed the Message of the Messiah. When the people heard what he had to say and saw the miracles, the clear signs of God’s action, they hung on his every word. Many who could neither stand nor walk were healed that day. The evil spirits protested loudly as they were sent on their way. And what joy in the city!
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-33
    - type: text
      text: 'He answered, “How can I without some help?” and invited Philip into the chariot with him. The passage he was reading was this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a sheep led to slaughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and quiet as a lamb being sheared,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was silent, saying nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He was mocked and put down, never got a fair trial.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But who now can count his kin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since he’s been taken from the earth?
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: 'The eunuch said, “Tell me, who is the prophet talking about: himself or some other?” Philip grabbed his chance. Using this passage as his text, he preached Jesus to him.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-39
    - type: text
      text: As they continued down the road, they came to a stream of water. The eunuch said, “Here’s water. Why can’t I be baptized?” He ordered the chariot to stop. They both went down to the water, and Philip baptized him on the spot. When they came up out of the water, the Spirit of God suddenly took Philip off, and that was the last the eunuch saw of him. But he didn’t mind. He had what he’d come for and went on down the road as happy as he could be.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Philip showed up in Azotus and continued north, preaching the Message in all the villages along that route until he arrived at Caesarea.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: Previous to Philip’s arrival, a certain Simon had practiced magic in the city, posing as a famous man and dazzling all the Samaritans with his wizardry. He had them all, from little children to old men, eating out of his hand. They all thought he had supernatural powers, and called him “the Great Wizard.” He had been around a long time and everyone was more or less in awe of him.
