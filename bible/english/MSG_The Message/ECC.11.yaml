document_id: ECC.11,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Be generous: Invest in acts of charity.'
  - type: text
    content: Charity yields high returns.
  '10':
  - type: text
    content: Live footloose and fancy-free—
  - type: text
    content: You won’t be young forever.
  - type: text
    content: Youth lasts about as long as smoke.
  '2':
  - type: text
    content: Don’t hoard your goods; spread them around.
  - type: text
    content: Be a blessing to others. This could be your last night.
  '3':
  - type: text
    content: When the clouds are full of water, it rains.
  - type: text
    content: When the wind blows down a tree, it lies where it falls.
  - type: text
    content: Don’t sit there watching the wind. Do your own work.
  - type: text
    content: Don’t stare at the clouds. Get on with your life.
  '5':
  - type: text
    content: Just as you’ll never understand
  - type: text
    content: the mystery of life forming in a pregnant woman,
  - type: text
    content: So you’ll never understand
  - type: text
    content: the mystery at work in all that God does.
  '6':
  - type: text
    content: Go to work in the morning
  - type: text
    content: and stick to it until evening without watching the clock.
  - type: text
    content: You never know from moment to moment
  - type: text
    content: how your work will turn out in the end.
  - type: heading
    content: Before the Years Take Their Toll
  '7':
  - type: text
    content: Oh, how sweet the light of day,
  - type: text
    content: And how wonderful to live in the sunshine!
  - type: text
    content: Even if you live a long time, don’t take a single day for granted.
  - type: text
    content: Take delight in each light-filled hour,
  - type: text
    content: Remembering that there will also be many dark days
  - type: text
    content: And that most of what comes your way is smoke.
  '9':
  - type: text
    content: You who are young, make the most of your youth.
  - type: text
    content: Relish your youthful vigor.
  - type: text
    content: Follow the impulses of your heart.
  - type: text
    content: If something looks good to you, pursue it.
  - type: text
    content: But know also that not just anything goes;
  - type: text
    content: You have to answer to God for every last bit of it.
