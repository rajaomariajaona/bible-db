document_id: ECC.11
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Be generous: Invest in acts of charity.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Charity yields high returns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Don’t hoard your goods; spread them around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be a blessing to others. This could be your last night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: When the clouds are full of water, it rains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the wind blows down a tree, it lies where it falls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t sit there watching the wind. Do your own work.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t stare at the clouds. Get on with your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Just as you’ll never understand
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mystery of life forming in a pregnant woman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So you’ll never understand
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mystery at work in all that God does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Go to work in the morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stick to it until evening without watching the clock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You never know from moment to moment
- type: usfm
  marker: q2
  children:
  - type: text
    text: how your work will turn out in the end.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Before the Years Take Their Toll
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Oh, how sweet the light of day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And how wonderful to live in the sunshine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if you live a long time, don’t take a single day for granted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take delight in each light-filled hour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remembering that there will also be many dark days
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that most of what comes your way is smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You who are young, make the most of your youth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Relish your youthful vigor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Follow the impulses of your heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If something looks good to you, pursue it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But know also that not just anything goes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have to answer to God for every last bit of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Live footloose and fancy-free—
- type: usfm
  marker: q1
  children:
  - type: text
    text: You won’t be young forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Youth lasts about as long as smoke.
