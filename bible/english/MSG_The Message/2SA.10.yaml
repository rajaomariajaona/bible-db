document_id: 2SA.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' Sometime after this, the king of the Ammonites died and Hanun, his son, succeeded him as king. David said, “I’d like to show some kindness to Hanun, the son of Nahash—treat him as well and as kindly as his father treated me.” So David sent Hanun condolences regarding his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-3
  - type: text
    text: ' But when David’s servants got to the land of the Ammonites, the Ammonite leaders warned Hanun, their head delegate, “Do you for a minute suppose that David is honoring your father by sending you comforters? Don’t you think it’s because he wants to snoop around the city and size it up that David has sent his emissaries to you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Hanun seized David’s men, shaved off half their beards, cut off their robes halfway up their buttocks, and sent them packing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When all this was reported to David, he sent someone to meet them, for they were seriously humiliated. The king told them, “Stay in Jericho until your beards grow out. Only then come back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When it dawned on the Ammonites that as far as David was concerned they stunk to high heaven, they hired Aramean soldiers from Beth-Rehob and Zobah—twenty thousand infantry—and a thousand men from the king of Maacah, and twelve thousand men from Tob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When David heard of this, he dispatched Joab with his strongest fighters in full force.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: 'The Ammonites marched out and arranged themselves in battle formation at the city gate. The Arameans of Zobah and Rehob and the men of Tob and Maacah took up a position out in the open fields. When Joab saw that he had two fronts to fight, before and behind, he took his pick of the best of Israel and deployed them to confront the Arameans. The rest of the army he put under the command of Abishai, his brother, and deployed them to confront the Ammonites. Then he said, “If the Arameans are too much for me, you help me. And if the Ammonites prove too much for you, I’ll come and help you. Courage! We’ll fight tooth and nail for our people and for the cities of our God. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will do whatever he sees needs doing!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: But when Joab and his soldiers moved in to fight the Arameans, they ran off in full retreat. Then the Ammonites, seeing the Arameans run for dear life, took to their heels from Abishai and went into the city.
- type: usfm
  marker: p
  children:
  - type: text
    text: So Joab left off fighting the Ammonites and returned to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17a
  - type: text
    text: ' When the Arameans saw how badly they’d been beaten by Israel, they picked up the pieces and regrouped. Hadadezer sent for the Arameans who were across the River. They came to Helam. Shobach, commander of Hadadezer’s army, led them. All this was reported to David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17b-19
  - type: text
    text: ' So David mustered Israel, crossed the Jordan, and came to Helam. The Arameans went into battle formation, ready for David, and the fight was on. But the Arameans again scattered before Israel. David killed seven hundred chariot drivers and forty thousand cavalry. And he mortally wounded Shobach, the army commander, who died on the battlefield. When all the kings who were vassals of Hadadezer saw that they had been routed by Israel, they made peace and became Israel’s vassals. The Arameans were afraid to help the Ammonites ever again.'
