document_id: ROM.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trusting God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'So how do we fit what we know of Abraham, our first father in the faith, into this new way of looking at things? If Abraham, by what he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' for God, got God to approve him, he could certainly have taken credit for it. But the story we’re given is a God-story, not an Abraham-story. What we read in Scripture is, “Abraham entered into what God was doing for him, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' was the turning point. He trusted God to set him right instead of trying to be right on his own.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: think
    - type: text
      text: ': Was that declaration made before or after he was marked by the covenant rite of circumcision? That’s right, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before
    - type: text
      text: ' he was marked. That means that he underwent circumcision as evidence and confirmation of what God had done long before to bring him into this acceptable standing with himself, an act of God he had embraced with his whole life.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And it means further that Abraham is father of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' people who embrace what God does for them while they are still on the “outs” with God, as yet unidentified as God’s, in an “uncircumcised” condition. It is precisely these people in this condition who are called “set right by God and with God”! Abraham is also, of course, father of those who have undergone the religious rite of circumcision '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' just because of the ritual but because they were willing to live in the risky faith-embrace of God’s action for them, the way Abraham lived long before he was marked by circumcision.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: 'That famous promise God gave Abraham—that he and his children would possess the earth—was not given because of something Abraham did or would do. It was based on God’s decision to put everything together for him, which Abraham then entered when he believed. If those who get what God gives them only get it by doing everything they are told to do and filling out all the right forms properly signed, that eliminates personal trust completely and turns the promise into an ironclad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: contract
    - type: text
      text: '! That’s not a holy promise; that’s a business deal. A contract drawn up by a hard-nosed lawyer and with plenty of fine print only makes sure that you will never be able to collect. But if there is no contract in the first place, simply a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: promise
    - type: text
      text: —and God’s promise at that—you can’t break it.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This is why the fulfillment of God’s promise depends entirely on trusting God and his way, and then simply embracing him and what he does. God’s promise arrives as pure gift. That’s the only way everyone can be sure to get in on it, those who keep the religious traditions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' those who have never heard of them. For Abraham is father of us all. He is not our racial father—that’s reading the story backward. He is our '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faith
    - type: text
      text: ' father.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'We call Abraham “father” not because he got God’s attention by living like a saint, but because God made something out of Abraham when he was a nobody. Isn’t that what we’ve always read in Scripture, God saying to Abraham, “I set you up as father of many peoples”? Abraham was first named “father” and then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: became
    - type: text
      text: ' a father because he dared to trust God to do what only God could do: raise the dead to life, with a word make something out of nothing. When everything was hopeless, Abraham believed anyway, deciding to live not on the basis of what he saw he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: couldn’t
    - type: text
      text: ' do but on what God said he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' do. And so he was made father of a multitude of peoples. God himself said to him, “You’re going to have a big family, Abraham!”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-25
    - type: text
      text: 'Abraham didn’t focus on his own impotence and say, “It’s hopeless. This hundred-year-old body could never father a child.” Nor did he survey Sarah’s decades of infertility and give up. He didn’t tiptoe around God’s promise asking cautiously skeptical questions. He plunged into the promise and came up strong, ready for God, sure that God would make good on what he had said. That’s why it is said, “Abraham was declared fit before God by trusting God to set him right.” But it’s not just Abraham; it’s also us! The same thing gets said about us when we embrace and believe the One who brought Jesus to life when the conditions were equally hopeless. The sacrificed Jesus made us fit for God, set us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: right with God
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'If you’re a hard worker and do a good job, you deserve your pay; we don’t call your wages a gift. But if you see that the job is too big for you, that it’s something only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' can do, and you trust him to do it—you could never do it for yourself no matter how hard and long you worked—well, that trusting-him-to-do-it is what gets you set right with God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: ' God. Sheer gift.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-9
    - type: text
      text: 'David confirms this way of looking at it, saying that the one who trusts God to do the putting-everything-right without insisting on having a say in it is one fortunate man:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fortunate those whose crimes are whisked away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose sins are wiped clean from the slate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fortunate the person against
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom the Lord does not keep score.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Do you think for a minute that this blessing is only pronounced over those of us who keep our religious ways and are circumcised? Or do you think it possible that the blessing could be given to those who never even heard of our ways, who were never brought up in the disciplines of God? We all agree, don’t we, that it was by embracing what God did for him that Abraham was declared fit before God?
