document_id: AMO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'You Never Got Hungry for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen to this, you cows of Bashan
- type: usfm
  marker: q2
  children:
  - type: text
    text: grazing on the slopes of Samaria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You women! Mean to the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cruel to the down-and-out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indolent and pampered, you demand of your husbands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Bring us a tall, cool drink!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“This is serious—I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have sworn by my holiness!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Be well warned: Judgment Day is coming!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re going to rope you up and haul you off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: keep the stragglers in line with cattle prods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll drag you through the ruined city walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: forcing you out single file,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And kick you to kingdom come.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: “Come along to Bethel and sin!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And then to Gilgal and sin some more!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring your sacrifices for morning worship.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every third day bring your tithe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burn pure sacrifices—thank offerings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Speak up—announce freewill offerings!
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s the sort of religious show
- type: usfm
  marker: q2
  children:
  - type: text
    text: you Israelites just love.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “You know, don’t you, that I’m the One
- type: usfm
  marker: q2
  children:
  - type: text
    text: who emptied your pantries and cleaned out your cupboards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who left you hungry and standing in bread lines?
- type: usfm
  marker: q2
  children:
  - type: text
    text: But you never got hungry for me. You continued to ignore me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “Yes, and I’m the One who stopped the rains
- type: usfm
  marker: q2
  children:
  - type: text
    text: three months short of harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’d make it rain on one village
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not on another.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’d make it rain on one field
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not on another—and that one would dry up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People would stagger from village to village
- type: usfm
  marker: q2
  children:
  - type: text
    text: crazed for water and never quenching their thirst.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you never got thirsty for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You ignored me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I hit your crops with disease
- type: usfm
  marker: q2
  children:
  - type: text
    text: and withered your orchards and gardens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Locusts devoured your olive and fig trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you continued to ignore me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “I revisited you with the old Egyptian plagues,
- type: usfm
  marker: q2
  children:
  - type: text
    text: killed your choice young men and prize horses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stink of rot in your camps was so strong
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you held your noses—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you didn’t notice me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You continued to ignore me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I hit you with earthquake and fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: left you devastated like Sodom and Gomorrah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were like a burning stick
- type: usfm
  marker: q2
  children:
  - type: text
    text: snatched from the flames.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you never looked my way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You continued to ignore me.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “All this I have done to you, Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and this is why I have done it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Time’s up, O Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prepare to meet your God!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Look who’s here: Mountain-Shaper! Wind-Maker!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He laid out the whole plot before Adam.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He brings everything out of nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like dawn out of darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He strides across the alpine ridges.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His name is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God-of-the-Angel-Armies.'
