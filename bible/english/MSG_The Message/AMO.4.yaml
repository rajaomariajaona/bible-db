document_id: AMO.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: You Never Got Hungry for God
  - type: text
    content: “Listen to this, you cows of Bashan
  - type: text
    content: grazing on the slopes of Samaria.
  - type: text
    content: You women! Mean to the poor,
  - type: text
    content: cruel to the down-and-out!
  - type: text
    content: Indolent and pampered, you demand of your husbands,
  - type: text
    content: ‘Bring us a tall, cool drink!’
  '10':
  - type: text
    content: “I revisited you with the old Egyptian plagues,
  - type: text
    content: killed your choice young men and prize horses.
  - type: text
    content: The stink of rot in your camps was so strong
  - type: text
    content: that you held your noses—
  - type: text
    content: But you didn’t notice me.
  - type: text
    content: You continued to ignore me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '11':
  - type: text
    content: “I hit you with earthquake and fire,
  - type: text
    content: left you devastated like Sodom and Gomorrah.
  - type: text
    content: You were like a burning stick
  - type: text
    content: snatched from the flames.
  - type: text
    content: But you never looked my way.
  - type: text
    content: You continued to ignore me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '12':
  - type: text
    content: “All this I have done to you, Israel,
  - type: text
    content: and this is why I have done it.
  - type: text
    content: Time’s up, O Israel!
  - type: text
    content: Prepare to meet your God!”
  '13':
  - type: text
    content: 'Look who’s here: Mountain-Shaper! Wind-Maker!'
  - type: text
    content: He laid out the whole plot before Adam.
  - type: text
    content: He brings everything out of nothing,
  - type: text
    content: like dawn out of darkness.
  - type: text
    content: He strides across the alpine ridges.
  - type: text
    content: 'His name is '
  - type: text
    content: God
  - type: text
    content: ', God-of-the-Angel-Armies.'
  '2':
  - type: text
    content: '“This is serious—I, '
  - type: text
    content: God
  - type: text
    content: ', have sworn by my holiness!'
  - type: text
    content: 'Be well warned: Judgment Day is coming!'
  - type: text
    content: They’re going to rope you up and haul you off,
  - type: text
    content: keep the stragglers in line with cattle prods.
  - type: text
    content: They’ll drag you through the ruined city walls,
  - type: text
    content: forcing you out single file,
  - type: text
    content: And kick you to kingdom come.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '4':
  - type: text
    content: “Come along to Bethel and sin!
  - type: text
    content: And then to Gilgal and sin some more!
  - type: text
    content: Bring your sacrifices for morning worship.
  - type: text
    content: Every third day bring your tithe.
  - type: text
    content: Burn pure sacrifices—thank offerings.
  - type: text
    content: Speak up—announce freewill offerings!
  - type: text
    content: That’s the sort of religious show
  - type: text
    content: you Israelites just love.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '6':
  - type: text
    content: “You know, don’t you, that I’m the One
  - type: text
    content: who emptied your pantries and cleaned out your cupboards,
  - type: text
    content: Who left you hungry and standing in bread lines?
  - type: text
    content: But you never got hungry for me. You continued to ignore me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '7':
  - type: text
    content: “Yes, and I’m the One who stopped the rains
  - type: text
    content: three months short of harvest.
  - type: text
    content: I’d make it rain on one village
  - type: text
    content: but not on another.
  - type: text
    content: I’d make it rain on one field
  - type: text
    content: but not on another—and that one would dry up.
  - type: text
    content: People would stagger from village to village
  - type: text
    content: crazed for water and never quenching their thirst.
  - type: text
    content: But you never got thirsty for me.
  - type: text
    content: You ignored me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '9':
  - type: text
    content: “I hit your crops with disease
  - type: text
    content: and withered your orchards and gardens.
  - type: text
    content: Locusts devoured your olive and fig trees,
  - type: text
    content: but you continued to ignore me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
