document_id: REV.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pouring Out the Seven Disasters
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I heard a shout of command from the Temple to the Seven Angels: “Begin! Pour out the seven bowls of God’s wrath on earth!”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: 'The fifth Angel poured his bowl on the throne of the Beast: Its kingdom fell into sudden eclipse. Mad with pain, men and women bit and chewed their tongues, cursed the God-of-Heaven for their torment and sores, and refused to repent and change their ways.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'The sixth Angel poured his bowl on the great Euphrates River: It dried up to nothing. The dry riverbed became a fine roadbed for the kings from the East. From the mouths of the Dragon, the Beast, and the False Prophet I saw three foul demons crawl out—they looked like frogs. These are demon spirits performing signs. They’re after the kings of the whole world to get them gathered for battle on the Great Day of God, the Sovereign-Strong.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Keep watch! I come unannounced, like a thief. You’re blessed if, awake and dressed, you’re ready for me. Too bad if you’re found running through the streets, naked and ashamed.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The frog-demons gathered the kings together at the place called in Hebrew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Armageddon
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-21
    - type: text
      text: 'The seventh Angel poured his bowl into the air: From the Throne in the Temple came a shout, “Done!” followed by lightning flashes and shouts, thunder crashes and a colossal earthquake—a huge and devastating earthquake, never an earthquake like it since time began. The Great City split three ways, the cities of the nations toppled to ruin. Great Babylon had to drink the wine of God’s raging anger—God remembered to give her the cup! Every island fled and not a mountain was to be found. Hailstones weighing close to a hundred pounds plummeted, crushing and smashing men and women as they cursed God for the hail, the epic disaster of hail.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The first Angel stepped up and poured his bowl out on earth: Loathsome, stinking sores erupted on all who had taken the mark of the Beast and worshiped its image.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The second Angel poured his bowl on the sea: The sea coagulated into blood, and everything in it died.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: 'The third Angel poured his bowl on rivers and springs: The waters turned to blood. I heard the Angel of Waters say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteous you are, and your judgments are righteous,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: The Is, The Was, The Holy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They poured out the blood of saints and prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you’ve given them blood to drink—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ve gotten what they deserve!
  - type: usfm
    marker: m
    children:
    - type: text
      text: Just then I heard the Altar chime in,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, O God, the Sovereign-Strong!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your judgments are true and just!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: 'The fourth Angel poured his bowl on the sun: Fire blazed from the sun and scorched men and women. Burned and blistered, they cursed God’s Name, the God behind these disasters. They refused to repent, refused to honor God.'
