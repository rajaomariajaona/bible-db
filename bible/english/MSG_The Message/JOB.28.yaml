document_id: JOB.28,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Where Does Wisdom Come From?
  - type: text
    content: “We all know how silver seams the rocks,
  - type: text
    content: we’ve seen the stuff from which gold is refined,
  - type: text
    content: We’re aware of how iron is dug out of the ground
  - type: text
    content: and copper is smelted from rock.
  - type: text
    content: Miners penetrate the earth’s darkness,
  - type: text
    content: searching the roots of the mountains for ore,
  - type: text
    content: digging away in the suffocating darkness.
  - type: text
    content: Far from civilization, far from the traffic,
  - type: text
    content: they cut a shaft,
  - type: text
    content: and are lowered into it by ropes.
  - type: text
    content: Earth’s surface is a field for grain,
  - type: text
    content: but its depths are a forge
  - type: text
    content: Firing sapphires from stones
  - type: text
    content: and chiseling gold from rocks.
  - type: text
    content: Vultures are blind to its riches,
  - type: text
    content: hawks never lay eyes on it.
  - type: text
    content: Wild animals are oblivious to it,
  - type: text
    content: lions don’t know it’s there.
  - type: text
    content: Miners hammer away at the rock,
  - type: text
    content: they uproot the mountains.
  - type: text
    content: They tunnel through the rock
  - type: text
    content: and find all kinds of beautiful gems.
  - type: text
    content: They discover the origins of rivers,
  - type: text
    content: and bring earth’s secrets to light.
  '12':
  - type: text
    content: “But where, oh where, will they find Wisdom?
  - type: text
    content: Where does Insight hide?
  - type: text
    content: Mortals don’t have a clue,
  - type: text
    content: haven’t the slightest idea where to look.
  - type: text
    content: Earth’s depths say, ‘It’s not here’;
  - type: text
    content: ocean deeps echo, ‘Never heard of it.’
  - type: text
    content: It can’t be bought with the finest gold;
  - type: text
    content: no amount of silver can get it.
  - type: text
    content: Even famous Ophir gold can’t buy it,
  - type: text
    content: not even diamonds and sapphires.
  - type: text
    content: Neither gold nor emeralds are comparable;
  - type: text
    content: extravagant jewelry can’t touch it.
  - type: text
    content: Pearl necklaces and ruby bracelets—why bother?
  - type: text
    content: None of this is even a down payment on Wisdom!
  - type: text
    content: Pile gold and African diamonds as high as you will,
  - type: text
    content: they can’t hold a candle to Wisdom.
  '20':
  - type: text
    content: “So where does Wisdom come from?
  - type: text
    content: And where does Insight live?
  - type: text
    content: It can’t be found by looking, no matter
  - type: text
    content: how deep you dig, no matter how high you fly.
  - type: text
    content: If you search through the graveyard and question the dead,
  - type: text
    content: they say, ‘We’ve only heard rumors of it.’
  '23':
  - type: text
    content: “God alone knows the way to Wisdom,
  - type: text
    content: he knows the exact place to find it.
  - type: text
    content: He knows where everything is on earth,
  - type: text
    content: he sees everything under heaven.
  - type: text
    content: After he commanded the winds to blow
  - type: text
    content: and measured out the waters,
  - type: text
    content: Arranged for the rain
  - type: text
    content: and set off explosions of thunder and lightning,
  - type: text
    content: He focused on Wisdom,
  - type: text
    content: made sure it was all set and tested and ready.
  - type: text
    content: 'Then he addressed the human race: ‘Here it is!'
  - type: text
    content: Fear-of-the-Lord—that’s Wisdom,
  - type: text
    content: and Insight means shunning evil.’”
