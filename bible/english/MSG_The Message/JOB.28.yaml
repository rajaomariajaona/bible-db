document_id: JOB.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Where Does Wisdom Come From?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-11
  - type: text
    text: “We all know how silver seams the rocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ve seen the stuff from which gold is refined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re aware of how iron is dug out of the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and copper is smelted from rock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miners penetrate the earth’s darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: searching the roots of the mountains for ore,
- type: usfm
  marker: q2
  children:
  - type: text
    text: digging away in the suffocating darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Far from civilization, far from the traffic,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cut a shaft,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are lowered into it by ropes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth’s surface is a field for grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but its depths are a forge
- type: usfm
  marker: q1
  children:
  - type: text
    text: Firing sapphires from stones
- type: usfm
  marker: q2
  children:
  - type: text
    text: and chiseling gold from rocks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vultures are blind to its riches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hawks never lay eyes on it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wild animals are oblivious to it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lions don’t know it’s there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miners hammer away at the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they uproot the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They tunnel through the rock
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find all kinds of beautiful gems.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They discover the origins of rivers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring earth’s secrets to light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-19
  - type: text
    text: “But where, oh where, will they find Wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where does Insight hide?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mortals don’t have a clue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: haven’t the slightest idea where to look.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth’s depths say, ‘It’s not here’;
- type: usfm
  marker: q2
  children:
  - type: text
    text: ocean deeps echo, ‘Never heard of it.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: It can’t be bought with the finest gold;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no amount of silver can get it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even famous Ophir gold can’t buy it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even diamonds and sapphires.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither gold nor emeralds are comparable;
- type: usfm
  marker: q2
  children:
  - type: text
    text: extravagant jewelry can’t touch it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pearl necklaces and ruby bracelets—why bother?
- type: usfm
  marker: q2
  children:
  - type: text
    text: None of this is even a down payment on Wisdom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pile gold and African diamonds as high as you will,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they can’t hold a candle to Wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: “So where does Wisdom come from?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And where does Insight live?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It can’t be found by looking, no matter
- type: usfm
  marker: q2
  children:
  - type: text
    text: how deep you dig, no matter how high you fly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you search through the graveyard and question the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they say, ‘We’ve only heard rumors of it.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-28
  - type: text
    text: “God alone knows the way to Wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows the exact place to find it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He knows where everything is on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sees everything under heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: After he commanded the winds to blow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and measured out the waters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arranged for the rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set off explosions of thunder and lightning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He focused on Wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made sure it was all set and tested and ready.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then he addressed the human race: ‘Here it is!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fear-of-the-Lord—that’s Wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Insight means shunning evil.’”
