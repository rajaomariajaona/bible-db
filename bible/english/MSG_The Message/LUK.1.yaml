document_id: LUK.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: So many others have tried their hand at putting together a story of the wonderful harvest of Scripture and history that took place among us, using reports handed down by the original eyewitnesses who served this Word with their very lives. Since I have investigated all the reports in close detail, starting from the story’s beginning, I decided to write it all out for you, most honorable Theophilus, so you can know beyond the shadow of a doubt the reliability of what you were taught.
  - type: heading
    content: A Childless Couple Conceives
  '13':
  - type: text
    content: ' But the angel reassured him, “Don’t fear, Zachariah. Your prayer has been heard. Elizabeth, your wife, will bear a son by you. You are to name him John. You’re going to leap like a gazelle for joy, and not only you—many will delight in his birth. He’ll achieve great stature with God.'
  '15':
  - type: text
    content: ' “He’ll drink neither wine nor beer. He’ll be filled with the Holy Spirit from the moment he leaves his mother’s womb. He will turn many sons and daughters of Israel back to their God. He will herald God’s arrival in the style and strength of Elijah, soften the hearts of parents to children, and kindle devout understanding among hardened skeptics—he’ll get the people ready for God.”'
  '18':
  - type: text
    content: Zachariah said to the angel, “Do you expect me to believe this? I’m an old man and my wife is an old woman.”
  '19':
  - type: text
    content: But the angel said, “I am Gabriel, the sentinel of God, sent especially to bring you this glad news. But because you won’t believe me, you’ll be unable to say a word until the day of your son’s birth. Every word I’ve spoken to you will come true on time—
  - type: text
    content: God’s
  - type: text
    content: ' time.”'
  '21':
  - type: text
    content: Meanwhile, the congregation waiting for Zachariah was getting restless, wondering what was keeping him so long in the sanctuary. When he came out and couldn’t speak, they knew he had seen a vision. He continued speechless and had to use sign language with the people.
  '23':
  - type: text
    content: When the course of his priestly assignment was completed, he went back home. It wasn’t long before his wife, Elizabeth, conceived. She went off by herself for five months, relishing her pregnancy. “So, this is how God acts to remedy my unfortunate condition!” she said.
  - type: heading
    content: A Virgin Conceives
  '26':
  - type: text
    content: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to the Galilean village of Nazareth to a virgin engaged to be married to a man descended from David. His name was Joseph, and the virgin’s name, Mary. Upon entering, Gabriel greeted her:'
  - type: text
    content: Good morning!
  - type: text
    content: You’re beautiful with God’s beauty,
  - type: text
    content: Beautiful inside and out!
  - type: text
    content: God be with you.
  '29':
  - type: text
    content: 'She was thoroughly shaken, wondering what was behind a greeting like that. But the angel assured her, “Mary, you have nothing to fear. God has a surprise for you: You will become pregnant and give birth to a son and call his name Jesus.'
  - type: text
    content: He will be great,
  - type: text
    content: be called ‘Son of the Highest.’
  - type: text
    content: The Lord God will give him
  - type: text
    content: the throne of his father David;
  - type: text
    content: He will rule Jacob’s house forever—
  - type: text
    content: no end, ever, to his kingdom.”
  '34':
  - type: text
    content: Mary said to the angel, “But how? I’ve never slept with a man.”
  '35':
  - type: text
    content: The angel answered,
  - type: text
    content: The Holy Spirit will come upon you,
  - type: text
    content: the power of the Highest hover over you;
  - type: text
    content: Therefore, the child you bring to birth
  - type: text
    content: will be called Holy, Son of God.
  '36':
  - type: text
    content: “And did you know that your cousin Elizabeth conceived a son, old as she is? Everyone called her barren, and here she is six months pregnant! Nothing, you see, is impossible with God.”
  - type: text
    content: And Mary said,
  - type: text
    content: 'Yes, I see it all now:'
  - type: text
    content: I’m the Lord’s maid, ready to serve.
  - type: text
    content: Let it be with me
  - type: text
    content: just as you say.
  - type: text
    content: Then the angel left her.
  - type: heading
    content: Blessed Among Women
  '39':
  - type: text
    content: Mary didn’t waste a minute. She got up and traveled to a town in Judah in the hill country, straight to Zachariah’s house, and greeted Elizabeth. When Elizabeth heard Mary’s greeting, the baby in her womb leaped. She was filled with the Holy Spirit, and sang out exuberantly,
  - type: text
    content: You’re so blessed among women,
  - type: text
    content: and the babe in your womb, also blessed!
  - type: text
    content: And why am I so blessed that
  - type: text
    content: the mother of my Lord visits me?
  - type: text
    content: The moment the sound of your
  - type: text
    content: greeting entered my ears,
  - type: text
    content: The babe in my womb
  - type: text
    content: skipped like a lamb for sheer joy.
  - type: text
    content: Blessed woman, who believed what God said,
  - type: text
    content: believed every word would come true!
  '46':
  - type: text
    content: And Mary said,
  - type: text
    content: I’m bursting with God-news;
  - type: text
    content: I’m dancing the song of my Savior God.
  - type: text
    content: God took one good look at me, and look what happened—
  - type: text
    content: I’m the most fortunate woman on earth!
  - type: text
    content: What God has done for me will never be forgotten,
  - type: text
    content: the God whose very name is holy, set apart from all others.
  - type: text
    content: His mercy flows in wave after wave
  - type: text
    content: on those who are in awe before him.
  - type: text
    content: He bared his arm and showed his strength,
  - type: text
    content: scattered the bluffing braggarts.
  - type: text
    content: He knocked tyrants off their high horses,
  - type: text
    content: pulled victims out of the mud.
  - type: text
    content: The starving poor sat down to a banquet;
  - type: text
    content: the callous rich were left out in the cold.
  - type: text
    content: He embraced his chosen child, Israel;
  - type: text
    content: he remembered and piled on the mercies, piled them high.
  - type: text
    content: It’s exactly what he promised,
  - type: text
    content: beginning with Abraham and right up to now.
  '5':
  - type: text
    content: During the rule of Herod, King of Judea, there was a priest assigned service in the regiment of Abijah. His name was Zachariah. His wife was descended from the daughters of Aaron. Her name was Elizabeth. Together they lived honorably before God, careful in keeping to the ways of the commandments and enjoying a clear conscience before God. But they were childless because Elizabeth could never conceive, and now they were quite old.
  '56':
  - type: text
    content: Mary stayed with Elizabeth for three months and then went back to her own home.
  - type: heading
    content: The Birth of John
  '57':
  - type: text
    content: When Elizabeth was full-term in her pregnancy, she gave birth to a son. Her neighbors and relatives, seeing that God had overwhelmed her with mercy, celebrated with her.
  '59':
  - type: text
    content: 'On the eighth day, they came to circumcise the child and were calling him Zachariah after his father. But his mother intervened: “No. He is to be called John.”'
  '61':
  - type: text
    content: “But,” they said, “no one in your family is named that.” They used sign language to ask Zachariah what he wanted him named.
  '63':
  - type: text
    content: Asking for a tablet, Zachariah wrote, “His name is to be John.” That took everyone by surprise. Surprise followed surprise—Zachariah’s mouth was now open, his tongue loose, and he was talking, praising God!
  '65':
  - type: text
    content: A deep, reverential fear settled over the neighborhood, and in all that Judean hill country people talked about nothing else. Everyone who heard about it took it to heart, wondering, “What will become of this child? Clearly, God has his hand in this.”
  '67':
  - type: text
    content: Then Zachariah was filled with the Holy Spirit and prophesied,
  - type: text
    content: Blessed be the Lord, the God of Israel;
  - type: text
    content: he came and set his people free.
  - type: text
    content: He set the power of salvation in the center of our lives,
  - type: text
    content: and in the very house of David his servant,
  - type: text
    content: Just as he promised long ago
  - type: text
    content: 'through the preaching of his holy prophets:'
  - type: text
    content: Deliverance from our enemies
  - type: text
    content: and every hateful hand;
  - type: text
    content: Mercy to our fathers,
  - type: text
    content: as he remembers to do what he said he’d do,
  - type: text
    content: What he swore to our father Abraham—
  - type: text
    content: a clean rescue from the enemy camp,
  - type: text
    content: So we can worship him without a care in the world,
  - type: text
    content: made holy before him as long as we live.
  - type: text
    content: And you, my child, “Prophet of the Highest,”
  - type: text
    content: will go ahead of the Master to prepare his ways,
  - type: text
    content: Present the offer of salvation to his people,
  - type: text
    content: the forgiveness of their sins.
  - type: text
    content: Through the heartfelt mercies of our God,
  - type: text
    content: God’s Sunrise will break in upon us,
  - type: text
    content: Shining on those in the darkness,
  - type: text
    content: those sitting in the shadow of death,
  - type: text
    content: Then showing us the way, one foot at a time,
  - type: text
    content: down the path of peace.
  '8':
  - type: text
    content: It so happened that as Zachariah was carrying out his priestly duties before God, working the shift assigned to his regiment, it came his one turn in life to enter the sanctuary of God and burn incense. The congregation was gathered and praying outside the Temple at the hour of the incense offering. Unannounced, an angel of God appeared just to the right of the altar of incense. Zachariah was paralyzed in fear.
  '80':
  - type: text
    content: The child grew up, healthy and spirited. He lived out in the desert until the day he made his prophetic debut in Israel.
