document_id: LUK.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: So many others have tried their hand at putting together a story of the wonderful harvest of Scripture and history that took place among us, using reports handed down by the original eyewitnesses who served this Word with their very lives. Since I have investigated all the reports in close detail, starting from the story’s beginning, I decided to write it all out for you, most honorable Theophilus, so you can know beyond the shadow of a doubt the reliability of what you were taught.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Childless Couple Conceives
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: During the rule of Herod, King of Judea, there was a priest assigned service in the regiment of Abijah. His name was Zachariah. His wife was descended from the daughters of Aaron. Her name was Elizabeth. Together they lived honorably before God, careful in keeping to the ways of the commandments and enjoying a clear conscience before God. But they were childless because Elizabeth could never conceive, and now they were quite old.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: It so happened that as Zachariah was carrying out his priestly duties before God, working the shift assigned to his regiment, it came his one turn in life to enter the sanctuary of God and burn incense. The congregation was gathered and praying outside the Temple at the hour of the incense offering. Unannounced, an angel of God appeared just to the right of the altar of incense. Zachariah was paralyzed in fear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15a
  - type: text
    text: ' But the angel reassured him, “Don’t fear, Zachariah. Your prayer has been heard. Elizabeth, your wife, will bear a son by you. You are to name him John. You’re going to leap like a gazelle for joy, and not only you—many will delight in his birth. He’ll achieve great stature with God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-17
  - type: text
    text: ' “He’ll drink neither wine nor beer. He’ll be filled with the Holy Spirit from the moment he leaves his mother’s womb. He will turn many sons and daughters of Israel back to their God. He will herald God’s arrival in the style and strength of Elijah, soften the hearts of parents to children, and kindle devout understanding among hardened skeptics—he’ll get the people ready for God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zachariah said to the angel, “Do you expect me to believe this? I’m an old man and my wife is an old woman.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: But the angel said, “I am Gabriel, the sentinel of God, sent especially to bring you this glad news. But because you won’t believe me, you’ll be unable to say a word until the day of your son’s birth. Every word I’ve spoken to you will come true on time—
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' time.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Meanwhile, the congregation waiting for Zachariah was getting restless, wondering what was keeping him so long in the sanctuary. When he came out and couldn’t speak, they knew he had seen a vision. He continued speechless and had to use sign language with the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: When the course of his priestly assignment was completed, he went back home. It wasn’t long before his wife, Elizabeth, conceived. She went off by herself for five months, relishing her pregnancy. “So, this is how God acts to remedy my unfortunate condition!” she said.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Virgin Conceives
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to the Galilean village of Nazareth to a virgin engaged to be married to a man descended from David. His name was Joseph, and the virgin’s name, Mary. Upon entering, Gabriel greeted her:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Good morning!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re beautiful with God’s beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beautiful inside and out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God be with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: 'She was thoroughly shaken, wondering what was behind a greeting like that. But the angel assured her, “Mary, you have nothing to fear. God has a surprise for you: You will become pregnant and give birth to a son and call his name Jesus.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will be great,
- type: usfm
  marker: q2
  children:
  - type: text
    text: be called ‘Son of the Highest.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord God will give him
- type: usfm
  marker: q2
  children:
  - type: text
    text: the throne of his father David;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will rule Jacob’s house forever—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no end, ever, to his kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mary said to the angel, “But how? I’ve never slept with a man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The angel answered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Holy Spirit will come upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the power of the Highest hover over you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, the child you bring to birth
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be called Holy, Son of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: “And did you know that your cousin Elizabeth conceived a son, old as she is? Everyone called her barren, and here she is six months pregnant! Nothing, you see, is impossible with God.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Mary said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes, I see it all now:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m the Lord’s maid, ready to serve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let it be with me
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as you say.
- type: usfm
  marker: m
  children:
  - type: text
    text: Then the angel left her.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blessed Among Women
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-45
  - type: text
    text: Mary didn’t waste a minute. She got up and traveled to a town in Judah in the hill country, straight to Zachariah’s house, and greeted Elizabeth. When Elizabeth heard Mary’s greeting, the baby in her womb leaped. She was filled with the Holy Spirit, and sang out exuberantly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re so blessed among women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the babe in your womb, also blessed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why am I so blessed that
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mother of my Lord visits me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The moment the sound of your
- type: usfm
  marker: q2
  children:
  - type: text
    text: greeting entered my ears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The babe in my womb
- type: usfm
  marker: q2
  children:
  - type: text
    text: skipped like a lamb for sheer joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed woman, who believed what God said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: believed every word would come true!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 46-55
  - type: text
    text: And Mary said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m bursting with God-news;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m dancing the song of my Savior God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God took one good look at me, and look what happened—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m the most fortunate woman on earth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: What God has done for me will never be forgotten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God whose very name is holy, set apart from all others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His mercy flows in wave after wave
- type: usfm
  marker: q2
  children:
  - type: text
    text: on those who are in awe before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He bared his arm and showed his strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scattered the bluffing braggarts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He knocked tyrants off their high horses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pulled victims out of the mud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The starving poor sat down to a banquet;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the callous rich were left out in the cold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He embraced his chosen child, Israel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he remembered and piled on the mercies, piled them high.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s exactly what he promised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beginning with Abraham and right up to now.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Mary stayed with Elizabeth for three months and then went back to her own home.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of John
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 57-58
  - type: text
    text: When Elizabeth was full-term in her pregnancy, she gave birth to a son. Her neighbors and relatives, seeing that God had overwhelmed her with mercy, celebrated with her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 59-60
  - type: text
    text: 'On the eighth day, they came to circumcise the child and were calling him Zachariah after his father. But his mother intervened: “No. He is to be called John.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 61-62
  - type: text
    text: “But,” they said, “no one in your family is named that.” They used sign language to ask Zachariah what he wanted him named.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 63-64
  - type: text
    text: Asking for a tablet, Zachariah wrote, “His name is to be John.” That took everyone by surprise. Surprise followed surprise—Zachariah’s mouth was now open, his tongue loose, and he was talking, praising God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 65-66
  - type: text
    text: A deep, reverential fear settled over the neighborhood, and in all that Judean hill country people talked about nothing else. Everyone who heard about it took it to heart, wondering, “What will become of this child? Clearly, God has his hand in this.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 67-79
  - type: text
    text: Then Zachariah was filled with the Holy Spirit and prophesied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed be the Lord, the God of Israel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he came and set his people free.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He set the power of salvation in the center of our lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the very house of David his servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as he promised long ago
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'through the preaching of his holy prophets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deliverance from our enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every hateful hand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mercy to our fathers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he remembers to do what he said he’d do,
- type: usfm
  marker: q1
  children:
  - type: text
    text: What he swore to our father Abraham—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a clean rescue from the enemy camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So we can worship him without a care in the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made holy before him as long as we live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you, my child, “Prophet of the Highest,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: will go ahead of the Master to prepare his ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Present the offer of salvation to his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the forgiveness of their sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through the heartfelt mercies of our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s Sunrise will break in upon us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shining on those in the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those sitting in the shadow of death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then showing us the way, one foot at a time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: down the path of peace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: The child grew up, healthy and spirited. He lived out in the desert until the day he made his prophetic debut in Israel.
