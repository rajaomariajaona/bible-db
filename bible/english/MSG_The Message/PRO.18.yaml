document_id: PRO.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Words Kill, Words Give Life
  - type: text
    content: Loners who care only for themselves
  - type: text
    content: spit on the common good.
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s name is a place of protection—
  - type: text
    content: good people can run there and be safe.
  '11':
  - type: text
    content: The rich think their wealth protects them;
  - type: text
    content: they imagine themselves safe behind it.
  '12':
  - type: text
    content: Pride first, then the crash,
  - type: text
    content: but humility is precursor to honor.
  '13':
  - type: text
    content: Answering before listening
  - type: text
    content: is both stupid and rude.
  '14':
  - type: text
    content: A healthy spirit conquers adversity,
  - type: text
    content: but what can you do when the spirit is crushed?
  '15':
  - type: text
    content: Wise men and women are always learning,
  - type: text
    content: always listening for fresh insights.
  '16':
  - type: text
    content: A gift gets attention;
  - type: text
    content: it buys the attention of eminent people.
  '17':
  - type: text
    content: The first speech in a court case is always convincing—
  - type: text
    content: until the cross-examination starts!
  '18':
  - type: text
    content: You may have to draw straws
  - type: text
    content: when faced with a tough decision.
  '19':
  - type: text
    content: Do a favor and win a friend forever;
  - type: text
    content: nothing can untie that bond.
  '2':
  - type: text
    content: Fools care nothing for thoughtful discourse;
  - type: text
    content: all they do is run off at the mouth.
  '20':
  - type: text
    content: Words satisfy the mind as much as fruit does the stomach;
  - type: text
    content: good talk is as gratifying as a good harvest.
  '21':
  - type: text
    content: Words kill, words give life;
  - type: text
    content: they’re either poison or fruit—you choose.
  '22':
  - type: text
    content: Find a good spouse, you find a good life—
  - type: text
    content: 'and even more: the favor of '
  - type: text
    content: God
  - type: text
    content: '!'
  '23':
  - type: text
    content: The poor speak in soft supplications;
  - type: text
    content: the rich bark out answers.
  '24':
  - type: text
    content: Friends come and friends go,
  - type: text
    content: but a true friend sticks by you like family.
  '3':
  - type: text
    content: When wickedness arrives, shame’s not far behind;
  - type: text
    content: contempt for life is contemptible.
  '4':
  - type: text
    content: Many words rush along like rivers in flood,
  - type: text
    content: but deep wisdom flows up from artesian springs.
  '5':
  - type: text
    content: It’s not right to go easy on the guilty,
  - type: text
    content: or come down hard on the innocent.
  '6':
  - type: text
    content: The words of a fool start fights;
  - type: text
    content: do him a favor and gag him.
  '7':
  - type: text
    content: Fools are undone by their big mouths;
  - type: text
    content: their souls are crushed by their words.
  '8':
  - type: text
    content: Listening to gossip is like eating cheap candy;
  - type: text
    content: do you really want junk like that in your belly?
  '9':
  - type: text
    content: Slack habits and sloppy work
  - type: text
    content: are as bad as vandalism.
