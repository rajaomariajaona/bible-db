document_id: PRO.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Words Kill, Words Give Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Loners who care only for themselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: spit on the common good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fools care nothing for thoughtful discourse;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all they do is run off at the mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When wickedness arrives, shame’s not far behind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: contempt for life is contemptible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Many words rush along like rivers in flood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but deep wisdom flows up from artesian springs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It’s not right to go easy on the guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or come down hard on the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The words of a fool start fights;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do him a favor and gag him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fools are undone by their big mouths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their souls are crushed by their words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Listening to gossip is like eating cheap candy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do you really want junk like that in your belly?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Slack habits and sloppy work
- type: usfm
  marker: q2
  children:
  - type: text
    text: are as bad as vandalism.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s name is a place of protection—
- type: usfm
  marker: q2
  children:
  - type: text
    text: good people can run there and be safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich think their wealth protects them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they imagine themselves safe behind it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pride first, then the crash,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but humility is precursor to honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Answering before listening
- type: usfm
  marker: q2
  children:
  - type: text
    text: is both stupid and rude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A healthy spirit conquers adversity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but what can you do when the spirit is crushed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Wise men and women are always learning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always listening for fresh insights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A gift gets attention;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it buys the attention of eminent people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The first speech in a court case is always convincing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: until the cross-examination starts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You may have to draw straws
- type: usfm
  marker: q2
  children:
  - type: text
    text: when faced with a tough decision.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Do a favor and win a friend forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing can untie that bond.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Words satisfy the mind as much as fruit does the stomach;
- type: usfm
  marker: q2
  children:
  - type: text
    text: good talk is as gratifying as a good harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Words kill, words give life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re either poison or fruit—you choose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Find a good spouse, you find a good life—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and even more: the favor of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The poor speak in soft supplications;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rich bark out answers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Friends come and friends go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a true friend sticks by you like family.
