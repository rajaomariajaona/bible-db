document_id: PRO.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words Kill, Words Give Life
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loners who care only for themselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spit on the common good.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name is a place of protection—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good people can run there and be safe.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rich think their wealth protects them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they imagine themselves safe behind it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pride first, then the crash,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but humility is precursor to honor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answering before listening
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is both stupid and rude.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A healthy spirit conquers adversity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but what can you do when the spirit is crushed?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise men and women are always learning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: always listening for fresh insights.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gift gets attention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it buys the attention of eminent people.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The first speech in a court case is always convincing—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the cross-examination starts!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You may have to draw straws
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when faced with a tough decision.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do a favor and win a friend forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing can untie that bond.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools care nothing for thoughtful discourse;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all they do is run off at the mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Words satisfy the mind as much as fruit does the stomach;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good talk is as gratifying as a good harvest.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Words kill, words give life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re either poison or fruit—you choose.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Find a good spouse, you find a good life—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and even more: the favor of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor speak in soft supplications;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rich bark out answers.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Friends come and friends go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a true friend sticks by you like family.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When wickedness arrives, shame’s not far behind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: contempt for life is contemptible.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many words rush along like rivers in flood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but deep wisdom flows up from artesian springs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s not right to go easy on the guilty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or come down hard on the innocent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of a fool start fights;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do him a favor and gag him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools are undone by their big mouths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their souls are crushed by their words.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listening to gossip is like eating cheap candy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do you really want junk like that in your belly?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slack habits and sloppy work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are as bad as vandalism.
