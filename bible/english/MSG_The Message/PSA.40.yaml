document_id: PSA.40,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I waited and waited and waited for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At last he looked; finally he listened.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lifted me out of the ditch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pulled me from deep mud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stood me up on a solid rock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to make sure I wouldn’t slip.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He taught me how to sing the latest God-song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a praise-song to our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'More and more people are seeing this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they enter the mystery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'abandoning themselves to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', don’t hold out on me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t hold back your passion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your love and truth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are all that keeps me together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When troubles ganged up on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mob of sins past counting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was so swamped by guilt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I couldn’t see my way clear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: More guilt in my heart than hair on my head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so heavy the guilt that my heart gave out.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Soften up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and intervene;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hurry and get me some help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So those who are trying to kidnap my soul
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be embarrassed and lose face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So anyone who gets a kick out of making me miserable
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be heckled and disgraced,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So those who pray for my ruin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be booed and jeered without mercy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But all who are hunting for you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oh, let them sing and be happy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those who know what you’re all about
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tell the world you’re great and not quitting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And me? I’m a mess. I’m nothing and have nothing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make something of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can do it; you’ve got what it takes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but God, don’t put it off.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed are you who give yourselves over to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your backs on the world’s “sure thing,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignore what the world worships;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The world’s a huge stockpile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -wonders and God-thoughts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing and no one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: compares to you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I start talking about you, telling what I know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and quickly run out of words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither numbers nor words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: account for you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doing something for you, bringing something to you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s not what you’re after.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Being religious, acting pious—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s not what you’re asking for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve opened my ears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can listen.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I answered, “I’m coming.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I read in your letter what you wrote about me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’m coming to the party
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re throwing for me.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s when God’s Word entered my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: became part of my very being.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve preached you to the whole congregation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’ve kept back nothing, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —you know that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I didn’t keep the news of your ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a secret, didn’t keep it to myself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I told it all, how dependable you are, how thorough.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I didn’t hold back pieces of love and truth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For myself alone. I told it all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the congregation know the whole story.
