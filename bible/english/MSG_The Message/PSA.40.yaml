document_id: PSA.40,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I waited and waited and waited for '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: At last he looked; finally he listened.
  - type: text
    content: He lifted me out of the ditch,
  - type: text
    content: pulled me from deep mud.
  - type: text
    content: He stood me up on a solid rock
  - type: text
    content: to make sure I wouldn’t slip.
  - type: text
    content: He taught me how to sing the latest God-song,
  - type: text
    content: a praise-song to our God.
  - type: text
    content: 'More and more people are seeing this:'
  - type: text
    content: they enter the mystery,
  - type: text
    content: 'abandoning themselves to '
  - type: text
    content: God
  - type: text
    content: .
  '11':
  - type: text
    content: 'Now '
  - type: text
    content: God
  - type: text
    content: ', don’t hold out on me,'
  - type: text
    content: don’t hold back your passion.
  - type: text
    content: Your love and truth
  - type: text
    content: are all that keeps me together.
  - type: text
    content: When troubles ganged up on me,
  - type: text
    content: a mob of sins past counting,
  - type: text
    content: I was so swamped by guilt
  - type: text
    content: I couldn’t see my way clear.
  - type: text
    content: More guilt in my heart than hair on my head,
  - type: text
    content: so heavy the guilt that my heart gave out.
  '13':
  - type: text
    content: 'Soften up, '
  - type: text
    content: God
  - type: text
    content: ', and intervene;'
  - type: text
    content: hurry and get me some help,
  - type: text
    content: So those who are trying to kidnap my soul
  - type: text
    content: will be embarrassed and lose face,
  - type: text
    content: So anyone who gets a kick out of making me miserable
  - type: text
    content: will be heckled and disgraced,
  - type: text
    content: So those who pray for my ruin
  - type: text
    content: will be booed and jeered without mercy.
  '16':
  - type: text
    content: But all who are hunting for you—
  - type: text
    content: oh, let them sing and be happy.
  - type: text
    content: Let those who know what you’re all about
  - type: text
    content: tell the world you’re great and not quitting.
  - type: text
    content: 'And me? I’m a mess. I’m nothing and have nothing:'
  - type: text
    content: make something of me.
  - type: text
    content: You can do it; you’ve got what it takes—
  - type: text
    content: but God, don’t put it off.
  '4':
  - type: text
    content: 'Blessed are you who give yourselves over to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: turn your backs on the world’s “sure thing,”
  - type: text
    content: ignore what the world worships;
  - type: text
    content: The world’s a huge stockpile
  - type: text
    content: 'of '
  - type: text
    content: God
  - type: text
    content: -wonders and God-thoughts.
  - type: text
    content: Nothing and no one
  - type: text
    content: compares to you!
  - type: text
    content: I start talking about you, telling what I know,
  - type: text
    content: and quickly run out of words.
  - type: text
    content: Neither numbers nor words
  - type: text
    content: account for you.
  '6':
  - type: text
    content: Doing something for you, bringing something to you—
  - type: text
    content: that’s not what you’re after.
  - type: text
    content: Being religious, acting pious—
  - type: text
    content: that’s not what you’re asking for.
  - type: text
    content: You’ve opened my ears
  - type: text
    content: so I can listen.
  '7':
  - type: text
    content: So I answered, “I’m coming.
  - type: text
    content: I read in your letter what you wrote about me,
  - type: text
    content: And I’m coming to the party
  - type: text
    content: you’re throwing for me.”
  - type: text
    content: That’s when God’s Word entered my life,
  - type: text
    content: became part of my very being.
  '9':
  - type: text
    content: I’ve preached you to the whole congregation,
  - type: text
    content: 'I’ve kept back nothing, '
  - type: text
    content: God
  - type: text
    content: —you know that.
  - type: text
    content: I didn’t keep the news of your ways
  - type: text
    content: a secret, didn’t keep it to myself.
  - type: text
    content: I told it all, how dependable you are, how thorough.
  - type: text
    content: I didn’t hold back pieces of love and truth
  - type: text
    content: For myself alone. I told it all,
  - type: text
    content: let the congregation know the whole story.
