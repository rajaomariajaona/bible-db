document_id: JER.42,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What You Fear Will Catch Up with You
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'All the army officers, led by Johanan son of Kareah and Jezaniah son of Hoshaiah, accompanied by all the people, small and great, came to Jeremiah the prophet and said, “We have a request. Please listen. Pray to your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for us, what’s left of us. You can see for yourself how few we are! Pray that your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will tell us the way we should go and what we should do.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-17
    - type: text
      text: '“But do not say, ‘We’re not staying around this place,’ refusing to obey the command of your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and saying instead, ‘No! We’re off to Egypt, where things are peaceful—no wars, no attacking armies, plenty of food. We’re going to live there.’ If what’s left of Judah is headed down that road, then listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message. This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies says: ‘If you have determined to go to Egypt and make that your home, then the very wars you fear will catch up with you in Egypt and the starvation you dread will track you down in Egypt. You’ll die there! Every last one of you who is determined to go to Egypt and make it your home will either be killed, starve, or get sick and die. No survivors, not one! No one will escape the doom that I’ll bring upon you.’'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“This is the Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, the God of Israel: ‘In the same way that I swept the citizens of Jerusalem away with my anger and wrath, I’ll do the same thing all over again in Egypt. You’ll end up being cursed, reviled, ridiculed, and mocked. And you’ll never see your homeland again.’'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has plainly told you, you leftovers from Judah, ‘Don’t go to Egypt.’ Could anything be plainer? I warn you this day that you are living out a fantasy. You’re making a fatal mistake.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Didn’t you just now send me to your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', saying, ‘Pray for us to our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Tell us everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says and we’ll do it all’?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: '“Well, now I’ve told you, told you everything he said, and you haven’t obeyed a word of it, not a single word of what your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent me to tell you. So now let me tell you what will happen next: You’ll be killed, you’ll starve to death, you’ll get sick and die in the wonderful country where you’ve determined to go and live.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jeremiah the prophet said, “I hear your request. And I will pray to your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as you have asked. Whatever '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, I’ll pass on to you. I’ll tell you everything, holding nothing back.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'They said to Jeremiah, “Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' be our witness, a true and faithful witness against us, if we don’t do everything that your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' directs you to tell us. Whether we like it or not, we’ll do it. We’ll obey whatever our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' tells us. Yes, count on us. We’ll do it.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'Ten days later '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message came to Jeremiah. He called together Johanan son of Kareah and all the army officers with him, including all the people, regardless of how much clout they had.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: 'He then spoke: “This is the Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, to whom you sent me to present your prayer. He says, ‘If you are ready to stick it out in this land, I will build you up and not drag you down, I will plant you and not pull you up like a weed. I feel deep compassion on account of the doom I have visited on you. You don’t have to fear the king of Babylon. Your fears are for nothing. I’m on your side, ready to save and deliver you from anything he might do. I’ll pour mercy on you. What’s more, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' will show you mercy! He’ll let you come back to your very own land.’'
