document_id: JER.42,97
type_code: eng
verses:
  '1':
  - type: heading
    content: What You Fear Will Catch Up with You
  - type: text
    content: 'All the army officers, led by Johanan son of Kareah and Jezaniah son of Hoshaiah, accompanied by all the people, small and great, came to Jeremiah the prophet and said, “We have a request. Please listen. Pray to your '
  - type: text
    content: God
  - type: text
    content: ' for us, what’s left of us. You can see for yourself how few we are! Pray that your '
  - type: text
    content: God
  - type: text
    content: ' will tell us the way we should go and what we should do.”'
  '13':
  - type: text
    content: '“But do not say, ‘We’re not staying around this place,’ refusing to obey the command of your '
  - type: text
    content: God
  - type: text
    content: ' and saying instead, ‘No! We’re off to Egypt, where things are peaceful—no wars, no attacking armies, plenty of food. We’re going to live there.’ If what’s left of Judah is headed down that road, then listen to '
  - type: text
    content: God
  - type: text
    content: '’s Message. This is what '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies says: ‘If you have determined to go to Egypt and make that your home, then the very wars you fear will catch up with you in Egypt and the starvation you dread will track you down in Egypt. You’ll die there! Every last one of you who is determined to go to Egypt and make it your home will either be killed, starve, or get sick and die. No survivors, not one! No one will escape the doom that I’ll bring upon you.’'
  '18':
  - type: text
    content: '“This is the Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel: ‘In the same way that I swept the citizens of Jerusalem away with my anger and wrath, I’ll do the same thing all over again in Egypt. You’ll end up being cursed, reviled, ridiculed, and mocked. And you’ll never see your homeland again.’'
  '19':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' has plainly told you, you leftovers from Judah, ‘Don’t go to Egypt.’ Could anything be plainer? I warn you this day that you are living out a fantasy. You’re making a fatal mistake.'
  - type: text
    content: '“Didn’t you just now send me to your '
  - type: text
    content: God
  - type: text
    content: ', saying, ‘Pray for us to our '
  - type: text
    content: God
  - type: text
    content: '. Tell us everything that '
  - type: text
    content: God
  - type: text
    content: ' says and we’ll do it all’?'
  '21':
  - type: text
    content: '“Well, now I’ve told you, told you everything he said, and you haven’t obeyed a word of it, not a single word of what your '
  - type: text
    content: God
  - type: text
    content: ' sent me to tell you. So now let me tell you what will happen next: You’ll be killed, you’ll starve to death, you’ll get sick and die in the wonderful country where you’ve determined to go and live.”'
  '4':
  - type: text
    content: 'Jeremiah the prophet said, “I hear your request. And I will pray to your '
  - type: text
    content: God
  - type: text
    content: ' as you have asked. Whatever '
  - type: text
    content: God
  - type: text
    content: ' says, I’ll pass on to you. I’ll tell you everything, holding nothing back.”'
  '5':
  - type: text
    content: 'They said to Jeremiah, “Let '
  - type: text
    content: God
  - type: text
    content: ' be our witness, a true and faithful witness against us, if we don’t do everything that your '
  - type: text
    content: God
  - type: text
    content: ' directs you to tell us. Whether we like it or not, we’ll do it. We’ll obey whatever our '
  - type: text
    content: God
  - type: text
    content: ' tells us. Yes, count on us. We’ll do it.”'
  '7':
  - type: text
    content: 'Ten days later '
  - type: text
    content: God
  - type: text
    content: ’s Message came to Jeremiah. He called together Johanan son of Kareah and all the army officers with him, including all the people, regardless of how much clout they had.
  '9':
  - type: text
    content: 'He then spoke: “This is the Message from '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, to whom you sent me to present your prayer. He says, ‘If you are ready to stick it out in this land, I will build you up and not drag you down, I will plant you and not pull you up like a weed. I feel deep compassion on account of the doom I have visited on you. You don’t have to fear the king of Babylon. Your fears are for nothing. I’m on your side, ready to save and deliver you from anything he might do. I’ll pour mercy on you. What’s more, '
  - type: text
    content: he
  - type: text
    content: ' will show you mercy! He’ll let you come back to your very own land.’'
