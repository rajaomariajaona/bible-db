document_id: TIT.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: He Put Our Lives Together
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Remind the people to respect the government and be law-abiding, always ready to lend a helping hand. No insults, no fights. God’s people should be bighearted and courteous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-8a
  - type: text
    text: ' It wasn’t so long ago that we ourselves were stupid and stubborn, easy marks for sin, ordered every which way by our glands, going around with a chip on our shoulder, hated and hating back. But when God, our kind and loving Savior God, stepped in, he saved us from all that. It was all his doing; we had nothing to do with it. He gave us a good bath, and we came out of it new people, washed inside and out by the Holy Spirit. Our Savior Jesus poured out new life so generously. God’s gift has restored our relationship with him and given us back our lives. And there’s more life to come—an eternity of life! You can count on this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8b-11
  - type: text
    text: ' I want you to put your foot down. Take a firm stand on these matters so that those who have put their trust in God will concentrate on the essentials that are good for everyone. Stay away from mindless, pointless quarreling over genealogies and fine print in the law code. That gets you nowhere. Warn a quarrelsome person once or twice, but then be done with him. It’s obvious that such a person is out of line, rebellious against God. By persisting in divisiveness he cuts himself off.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: As soon as I send either Artemas or Tychicus to you, come immediately and meet me in Nicopolis. I’ve decided to spend the winter there. Give Zenas the lawyer and Apollos a hearty send-off. Take good care of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Our people have to learn to be diligent in their work so that all necessities are met (especially among the needy) and they don’t end up with nothing to show for their lives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All here want to be remembered to you. Say hello to our friends in the faith. Grace to all of you.
