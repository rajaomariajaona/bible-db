document_id: ISA.56,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Messages of Hope
  - type: heading
    content: Salvation Is Just Around the Corner
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: '“Guard my common good:'
  - type: text
    content: Do what’s right and do it in the right way,
  - type: text
    content: For salvation is just around the corner,
  - type: text
    content: my setting-things-right is about to go into action.
  - type: text
    content: How fortunate are you who enter into these things,
  - type: text
    content: you men and women who embrace them,
  - type: text
    content: Who keep Sabbath and don’t defile it,
  - type: text
    content: who watch your step and don’t do anything evil!
  - type: text
    content: 'Make sure no outsider who now follows '
  - type: text
    content: God
  - type: text
    content: ever has occasion to say, ‘
  - type: text
    content: God
  - type: text
    content: ' put me in second-class.'
  - type: text
    content: I don’t really belong.’
  - type: text
    content: And make sure no physically mutilated person
  - type: text
    content: is ever made to think, ‘I’m damaged goods.
  - type: text
    content: I don’t really belong.’”
  '4':
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “To the mutilated who keep my Sabbaths
  - type: text
    content: and choose what delights me
  - type: text
    content: and keep a firm grip on my covenant,
  - type: text
    content: I’ll provide them an honored place
  - type: text
    content: in my family and within my city,
  - type: text
    content: even more honored than that of sons and daughters.
  - type: text
    content: I’ll confer permanent honors on them
  - type: text
    content: that will never be revoked.
  '6':
  - type: text
    content: “And as for the outsiders who now follow me,
  - type: text
    content: working for me, loving my name,
  - type: text
    content: and wanting to be my servants—
  - type: text
    content: All who keep Sabbath and don’t defile it,
  - type: text
    content: holding fast to my covenant—
  - type: text
    content: I’ll bring them to my holy mountain
  - type: text
    content: and give them joy in my house of prayer.
  - type: text
    content: They’ll be welcome to worship the same as the ‘insiders,’
  - type: text
    content: to bring burnt offerings and sacrifices to my altar.
  - type: text
    content: Oh yes, my house of worship
  - type: text
    content: will be known as a house of prayer for all people.”
  - type: text
    content: 'The Decree of the Master, '
  - type: text
    content: God
  - type: text
    content: ' himself,'
  - type: text
    content: 'who gathers in the exiles of Israel:'
  - type: text
    content: “I will gather others also,
  - type: text
    content: gather them in with those already gathered.”
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: 'A call to the savage beasts: Come on the run.'
  - type: text
    content: Come, devour, beast barbarians!
  - type: text
    content: For Israel’s watchmen are blind, the whole lot of them.
  - type: text
    content: They have no idea what’s going on.
  - type: text
    content: They’re dogs without sense enough to bark,
  - type: text
    content: lazy dogs, dreaming in the sun—
  - type: text
    content: But hungry dogs, they do know how to eat,
  - type: text
    content: voracious dogs, with never enough.
  - type: text
    content: And these are Israel’s shepherds!
  - type: text
    content: They know nothing, understand nothing.
  - type: text
    content: They all look after themselves,
  - type: text
    content: grabbing whatever’s not nailed down.
  - type: text
    content: “Come,” they say, “let’s have a party.
  - type: text
    content: Let’s go out and get drunk!”
  - type: text
    content: 'And tomorrow, more of the same:'
  - type: text
    content: “Let’s live it up!”
