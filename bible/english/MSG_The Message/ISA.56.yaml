document_id: ISA.56,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Messages of Hope
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salvation Is Just Around the Corner
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Guard my common good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do what’s right and do it in the right way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For salvation is just around the corner,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my setting-things-right is about to go into action.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How fortunate are you who enter into these things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you men and women who embrace them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who keep Sabbath and don’t defile it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who watch your step and don’t do anything evil!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make sure no outsider who now follows '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever has occasion to say, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put me in second-class.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t really belong.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make sure no physically mutilated person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is ever made to think, ‘I’m damaged goods.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t really belong.’”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To the mutilated who keep my Sabbaths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and choose what delights me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep a firm grip on my covenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll provide them an honored place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in my family and within my city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even more honored than that of sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll confer permanent honors on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will never be revoked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: “And as for the outsiders who now follow me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: working for me, loving my name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wanting to be my servants—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who keep Sabbath and don’t defile it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: holding fast to my covenant—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring them to my holy mountain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give them joy in my house of prayer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll be welcome to worship the same as the ‘insiders,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to bring burnt offerings and sacrifices to my altar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh yes, my house of worship
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be known as a house of prayer for all people.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Decree of the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' himself,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who gathers in the exiles of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will gather others also,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather them in with those already gathered.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: 'A call to the savage beasts: Come on the run.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come, devour, beast barbarians!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Israel’s watchmen are blind, the whole lot of them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no idea what’s going on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re dogs without sense enough to bark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lazy dogs, dreaming in the sun—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But hungry dogs, they do know how to eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: voracious dogs, with never enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And these are Israel’s shepherds!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They know nothing, understand nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all look after themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grabbing whatever’s not nailed down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come,” they say, “let’s have a party.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s go out and get drunk!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And tomorrow, more of the same:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Let’s live it up!”
