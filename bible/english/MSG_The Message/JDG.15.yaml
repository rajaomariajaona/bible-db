document_id: JDG.15,97
type_code: eng
verses:
  '1':
  - type: text
    content: Later on—it was during the wheat harvest—Samson visited his bride, bringing a young goat. He said, “Let me see my wife—show me her bedroom.”
  - type: text
    content: But her father wouldn’t let him in. He said, “I concluded that by now you hated her with a passion, so I gave her to your best man. But her little sister is even more beautiful. Why not take her instead?”
  '11':
  - type: text
    content: Three companies of men from Judah went down to the cave at Etam Rock and said to Samson, “Don’t you realize that the Philistines already bully and lord it over us? So what’s going on with you, making things even worse?”
  - type: text
    content: He said, “It was tit for tat. I only did to them what they did to me.”
  '12':
  - type: text
    content: They said, “Well, we’ve come down here to tie you up and turn you over to the Philistines.”
  - type: text
    content: Samson said, “Just promise not to hurt me.”
  '13':
  - type: text
    content: “We promise,” they said. “We will tie you up and surrender you to them but, believe us, we won’t kill you.” They proceeded to tie him with new ropes and led him up from the Rock.
  '14':
  - type: text
    content: 'As he approached Lehi, the Philistines came to meet him, shouting in triumph. And then the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' came on him with great power. The ropes on his arms fell apart like flax on fire; the strips of leather slipped off his hands. He spotted a fresh donkey jawbone, reached down and grabbed it, and with it killed the whole company. And Samson said,'
  - type: text
    content: With a donkey’s jawbone
  - type: text
    content: I made heaps of donkeys of them.
  - type: text
    content: With a donkey’s jawbone
  - type: text
    content: I killed an entire company.
  '17':
  - type: text
    content: When he finished speaking, he threw away the jawbone. He named that place Ramath Lehi (Jawbone Hill).
  '18':
  - type: text
    content: 'Now he was suddenly very thirsty. He called out to '
  - type: text
    content: God
  - type: text
    content: ', “You have given your servant this great victory. Are you going to abandon me to die of thirst and fall into the hands of the uncircumcised?” So God split open the rock basin in Lehi; water gushed out and Samson drank. His spirit revived—he was alive again! That’s why it’s called En Hakkore (Caller’s Spring). It’s still there at Lehi today.'
  '20':
  - type: text
    content: Samson judged Israel for twenty years in the days of the Philistines.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: Samson said, “That does it. This time when I wreak havoc on the Philistines, I’m blameless.”
  '4':
  - type: text
    content: Samson then went out and caught three hundred jackals. He lashed the jackals’ tails together in pairs and tied a torch between each pair of tails. He then set fire to the torches and let them loose in the Philistine fields of ripe grain. Everything burned, both stacked and standing grain, vineyards and olive orchards—everything.
  '6':
  - type: text
    content: The Philistines said, “Who did this?”
  - type: text
    content: They were told, “Samson, son-in-law of the Timnite who took his bride and gave her to his best man.”
  - type: text
    content: The Philistines went up and burned both her and her father to death.
  '7':
  - type: text
    content: Samson then said, “If this is the way you’re going to act, I swear I’ll get even with you. And I’m not quitting till the job’s done!”
  '8':
  - type: text
    content: With that he tore into them, ripping them limb from limb—a huge slaughter. Then he went down and stayed in a cave at Etam Rock.
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: The Philistines set out and made camp in Judah, preparing to attack Lehi (Jawbone). When the men of Judah asked, “Why have you come up against us?” they said, “We’re out to get Samson. We’re going after Samson to do to him what he did to us.”
