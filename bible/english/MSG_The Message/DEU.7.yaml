document_id: DEU.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, brings you into the country that you are about to enter and take over, he will clear out the superpowers that were there before you: the Hittite, the Girgashite, the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite. Those seven nations are all bigger and stronger than you are. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will turn them over to you and you will conquer them. You must completely destroy them, offering them up as a holy destruction to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Don’t make a treaty with them.
- type: usfm
  marker: p
  children:
  - type: text
    text: Don’t let them off in any way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Don’t marry them: Don’t give your daughters to their sons and don’t take their daughters for your sons—before you know it they’d involve you in worshiping their gods, and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' would explode in anger, putting a quick end to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Here’s what you are to do:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tear apart their altars stone by stone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: smash their phallic pillars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: chop down their sex-and-religion Asherah groves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set fire to their carved god-images.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Do this because you are a people set apart as holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, chose you out of all the people on Earth for himself as a cherished, personal treasure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t attracted to you and didn’t choose you because you were big and important—the fact is, there was almost nothing to you. He did it out of sheer love, keeping the promise he made to your ancestors. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stepped in and mightily bought you back out of that world of slavery, freed you from the iron grip of Pharaoh king of Egypt. Know this: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is God indeed, a God you can depend upon. He keeps his covenant of loyal love with those who love him and observe his commandments for a thousand generations. But he also pays back those who hate him, pays them the wages of death; he isn’t slow to pay them off—those who hate him, he pays right on time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So keep the command and the rules and regulations that I command you today. Do them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13a
  - type: text
    text: ' And this is what will happen: When you, on your part, will obey these directives, keeping and following them, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', on his part, will keep the covenant of loyal love that he made with your ancestors:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will love you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will bless you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will increase you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13b-15
  - type: text
    text: ' He will bless the babies from your womb and the harvest of grain, new wine, and oil from your fields; he’ll bless the calves from your herds and lambs from your flocks in the country he promised your ancestors that he’d give you. You’ll be blessed beyond all other peoples: no sterility or barrenness in you or your animals. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will get rid of all sickness. And all the evil afflictions you experienced in Egypt he’ll put not on you but on those who hate you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'You’ll make mincemeat of all the peoples that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, hands over to you. Don’t feel sorry for them. And don’t worship their gods—they’ll trap you for sure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'You’re going to think to yourselves, “Oh! We’re outnumbered ten to one by these nations! We’ll never even make a dent in them!” But I’m telling you, Don’t be afraid. Remember, yes, remember in detail what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, did to Pharaoh and all Egypt. Remember the great contests to which you were eyewitnesses: the miracle-signs, the wonders, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s mighty hand as he stretched out his arm and took you out of there. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is going to do the same thing to these people you’re now so afraid of.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And to top it off, the Hornet. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will unleash the Hornet on them until every survivor-in-hiding is dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: 'So don’t be intimidated by them. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is among you—majestic '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', awesome '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will get rid of these nations, bit by bit. You won’t be permitted to wipe them out all at once lest the wild animals take over and overwhelm you. But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will move them out of your way—he’ll throw them into a huge panic until there’s nothing left of them. He’ll turn their kings over to you and you’ll remove all trace of them under Heaven. Not one person will be able to stand up to you; you’ll put an end to them all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'Make sure you set fire to their carved gods. Don’t get greedy for the veneer of silver and gold on them and take it for yourselves—you’ll get trapped by it for sure. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hates it; it’s an abomination to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. And don’t dare bring one of these abominations home or you’ll end up just like it, burned up as a holy destruction. No: It is forbidden! Hate it. Abominate it. Destroy it and preserve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s holiness.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
