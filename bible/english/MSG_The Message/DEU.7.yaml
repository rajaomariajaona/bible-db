document_id: DEU.7,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ', your God, brings you into the country that you are about to enter and take over, he will clear out the superpowers that were there before you: the Hittite, the Girgashite, the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite. Those seven nations are all bigger and stronger than you are. '
  - type: text
    content: God
  - type: text
    content: ', your God, will turn them over to you and you will conquer them. You must completely destroy them, offering them up as a holy destruction to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Don’t make a treaty with them.
  - type: text
    content: Don’t let them off in any way.
  '11':
  - type: text
    content: So keep the command and the rules and regulations that I command you today. Do them.
  '12':
  - type: text
    content: ' And this is what will happen: When you, on your part, will obey these directives, keeping and following them, '
  - type: text
    content: God
  - type: text
    content: ', on his part, will keep the covenant of loyal love that he made with your ancestors:'
  - type: text
    content: He will love you,
  - type: text
    content: he will bless you,
  - type: text
    content: he will increase you.
  '13':
  - type: text
    content: ' He will bless the babies from your womb and the harvest of grain, new wine, and oil from your fields; he’ll bless the calves from your herds and lambs from your flocks in the country he promised your ancestors that he’d give you. You’ll be blessed beyond all other peoples: no sterility or barrenness in you or your animals. '
  - type: text
    content: God
  - type: text
    content: ' will get rid of all sickness. And all the evil afflictions you experienced in Egypt he’ll put not on you but on those who hate you.'
  '16':
  - type: text
    content: 'You’ll make mincemeat of all the peoples that '
  - type: text
    content: God
  - type: text
    content: ', your God, hands over to you. Don’t feel sorry for them. And don’t worship their gods—they’ll trap you for sure.'
  '17':
  - type: text
    content: 'You’re going to think to yourselves, “Oh! We’re outnumbered ten to one by these nations! We’ll never even make a dent in them!” But I’m telling you, Don’t be afraid. Remember, yes, remember in detail what '
  - type: text
    content: God
  - type: text
    content: ', your God, did to Pharaoh and all Egypt. Remember the great contests to which you were eyewitnesses: the miracle-signs, the wonders, '
  - type: text
    content: God
  - type: text
    content: '’s mighty hand as he stretched out his arm and took you out of there. '
  - type: text
    content: God
  - type: text
    content: ', your God, is going to do the same thing to these people you’re now so afraid of.'
  '20':
  - type: text
    content: 'And to top it off, the Hornet. '
  - type: text
    content: God
  - type: text
    content: ' will unleash the Hornet on them until every survivor-in-hiding is dead.'
  '21':
  - type: text
    content: 'So don’t be intimidated by them. '
  - type: text
    content: God
  - type: text
    content: ', your God, is among you—majestic '
  - type: text
    content: God
  - type: text
    content: ', awesome '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: text
    content: God
  - type: text
    content: ', your God, will get rid of these nations, bit by bit. You won’t be permitted to wipe them out all at once lest the wild animals take over and overwhelm you. But '
  - type: text
    content: God
  - type: text
    content: ', your God, will move them out of your way—he’ll throw them into a huge panic until there’s nothing left of them. He’ll turn their kings over to you and you’ll remove all trace of them under Heaven. Not one person will be able to stand up to you; you’ll put an end to them all.'
  '25':
  - type: text
    content: 'Make sure you set fire to their carved gods. Don’t get greedy for the veneer of silver and gold on them and take it for yourselves—you’ll get trapped by it for sure. '
  - type: text
    content: God
  - type: text
    content: ' hates it; it’s an abomination to '
  - type: text
    content: God
  - type: text
    content: ', your God. And don’t dare bring one of these abominations home or you’ll end up just like it, burned up as a holy destruction. No: It is forbidden! Hate it. Abominate it. Destroy it and preserve '
  - type: text
    content: God
  - type: text
    content: ’s holiness.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'Don’t marry them: Don’t give your daughters to their sons and don’t take their daughters for your sons—before you know it they’d involve you in worshiping their gods, and '
  - type: text
    content: God
  - type: text
    content: ' would explode in anger, putting a quick end to you.'
  '5':
  - type: text
    content: 'Here’s what you are to do:'
  - type: text
    content: Tear apart their altars stone by stone,
  - type: text
    content: smash their phallic pillars,
  - type: text
    content: chop down their sex-and-religion Asherah groves,
  - type: text
    content: set fire to their carved god-images.
  '6':
  - type: text
    content: 'Do this because you are a people set apart as holy to '
  - type: text
    content: God
  - type: text
    content: ', your God. '
  - type: text
    content: God
  - type: text
    content: ', your God, chose you out of all the people on Earth for himself as a cherished, personal treasure.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' wasn’t attracted to you and didn’t choose you because you were big and important—the fact is, there was almost nothing to you. He did it out of sheer love, keeping the promise he made to your ancestors. '
  - type: text
    content: God
  - type: text
    content: ' stepped in and mightily bought you back out of that world of slavery, freed you from the iron grip of Pharaoh king of Egypt. Know this: '
  - type: text
    content: God
  - type: text
    content: ', your God, is God indeed, a God you can depend upon. He keeps his covenant of loyal love with those who love him and observe his commandments for a thousand generations. But he also pays back those who hate him, pays them the wages of death; he isn’t slow to pay them off—those who hate him, he pays right on time.'
