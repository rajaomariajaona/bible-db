document_id: JOB.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: If We Die, Will We Live Again?
  - type: text
    content: '“We’re all adrift in the same boat:'
  - type: text
    content: too few days, too many troubles.
  - type: text
    content: We spring up like wildflowers in the desert and then wilt,
  - type: text
    content: transient as the shadow of a cloud.
  - type: text
    content: Do you occupy your time with such fragile wisps?
  - type: text
    content: Why even bother hauling me into court?
  - type: text
    content: There’s nothing much to us to start with;
  - type: text
    content: how do you expect us to amount to anything?
  - type: text
    content: Mortals have a limited life span.
  - type: text
    content: You’ve already decided how long we’ll live—
  - type: text
    content: you set the boundary and no one can cross it.
  - type: text
    content: So why not give us a break? Ease up!
  - type: text
    content: Even ditchdiggers get occasional days off.
  - type: text
    content: For a tree there is always hope.
  - type: text
    content: Chop it down and it still has a chance—
  - type: text
    content: its roots can put out fresh sprouts.
  - type: text
    content: Even if its roots are old and gnarled,
  - type: text
    content: its stump long dormant,
  - type: text
    content: At the first whiff of water it comes to life,
  - type: text
    content: buds and grows like a sapling.
  - type: text
    content: But men and women? They die and stay dead.
  - type: text
    content: They breathe their last, and that’s it.
  - type: text
    content: Like lakes and rivers that have dried up,
  - type: text
    content: parched reminders of what once was,
  - type: text
    content: So mortals lie down and never get up,
  - type: text
    content: never wake up again—never.
  - type: text
    content: Why don’t you just bury me alive,
  - type: text
    content: get me out of the way until your anger cools?
  - type: text
    content: But don’t leave me there!
  - type: text
    content: Set a date when you’ll see me again.
  - type: text
    content: If we humans die, will we live again? That’s my question.
  - type: text
    content: All through these difficult days I keep hoping,
  - type: text
    content: waiting for the final change—for resurrection!
  - type: text
    content: Homesick with longing for the creature you made,
  - type: text
    content: you’ll call—and I’ll answer!
  - type: text
    content: You’ll watch over every step I take,
  - type: text
    content: but you won’t keep track of my missteps.
  - type: text
    content: My sins will be stuffed in a sack
  - type: text
    content: and thrown into the sea—sunk in deep ocean.
  '18':
  - type: text
    content: “Meanwhile, mountains wear down
  - type: text
    content: and boulders break up,
  - type: text
    content: Stones wear smooth
  - type: text
    content: and soil erodes,
  - type: text
    content: as you relentlessly grind down our hope.
  - type: text
    content: You’re too much for us.
  - type: text
    content: As always, you get the last word.
  - type: text
    content: We don’t like it and our faces show it,
  - type: text
    content: but you send us off anyway.
  - type: text
    content: If our children do well for themselves, we never know it;
  - type: text
    content: if they do badly, we’re spared the hurt.
  - type: text
    content: Body and soul, that’s it for us—
  - type: text
    content: a lifetime of pain, a lifetime of sorrow.”
