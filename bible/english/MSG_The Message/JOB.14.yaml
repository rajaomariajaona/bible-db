document_id: JOB.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If We Die, Will We Live Again?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-17
    - type: text
      text: '“We’re all adrift in the same boat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: too few days, too many troubles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We spring up like wildflowers in the desert and then wilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: transient as the shadow of a cloud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you occupy your time with such fragile wisps?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why even bother hauling me into court?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing much to us to start with;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how do you expect us to amount to anything?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mortals have a limited life span.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve already decided how long we’ll live—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you set the boundary and no one can cross it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why not give us a break? Ease up!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even ditchdiggers get occasional days off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a tree there is always hope.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Chop it down and it still has a chance—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its roots can put out fresh sprouts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if its roots are old and gnarled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its stump long dormant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the first whiff of water it comes to life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buds and grows like a sapling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But men and women? They die and stay dead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They breathe their last, and that’s it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like lakes and rivers that have dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: parched reminders of what once was,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So mortals lie down and never get up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never wake up again—never.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why don’t you just bury me alive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get me out of the way until your anger cools?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t leave me there!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Set a date when you’ll see me again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we humans die, will we live again? That’s my question.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All through these difficult days I keep hoping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: waiting for the final change—for resurrection!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homesick with longing for the creature you made,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll call—and I’ll answer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll watch over every step I take,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you won’t keep track of my missteps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My sins will be stuffed in a sack
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thrown into the sea—sunk in deep ocean.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-22
    - type: text
      text: “Meanwhile, mountains wear down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and boulders break up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stones wear smooth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and soil erodes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you relentlessly grind down our hope.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re too much for us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As always, you get the last word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We don’t like it and our faces show it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you send us off anyway.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If our children do well for themselves, we never know it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if they do badly, we’re spared the hurt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Body and soul, that’s it for us—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a lifetime of pain, a lifetime of sorrow.”
