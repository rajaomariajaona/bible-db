verses:
  '1':
  - type: text
    content: When Isaac had become an old man and was nearly blind, he called his eldest son, Esau, and said, “My son.”
  - type: text
    content: “Yes, Father?”
  '11':
  - type: text
    content: “But Mother,” Jacob said, “my brother Esau is a hairy man and I have smooth skin. What happens if my father touches me? He’ll think I’m playing games with him. I’ll bring down a curse on myself instead of a blessing.”
  '13':
  - type: text
    content: “If it comes to that,” said his mother, “I’ll take the curse on myself. Now, just do what I say. Go and get the goats.”
  '14':
  - type: text
    content: So he went and got them and brought them to his mother and she cooked a hearty meal, the kind his father loved so much.
  '15':
  - type: text
    content: Rebekah took the dress-up clothes of her older son Esau and put them on her younger son Jacob. She took the goatskins and covered his hands and the smooth nape of his neck. Then she placed the hearty meal she had fixed and fresh bread she’d baked into the hands of her son Jacob.
  '18':
  - type: text
    content: He went to his father and said, “My father!”
  - type: text
    content: “Yes?” he said. “Which son are you?”
  '19':
  - type: text
    content: Jacob answered his father, “I’m your firstborn son Esau. I did what you told me. Come now; sit up and eat of my game so you can give me your personal blessing.”
  '2':
  - type: text
    content: '“I’m an old man,” he said; “I might die any day now. Do me a favor: Get your quiver of arrows and your bow and go out in the country and hunt me some game. Then fix me a hearty meal, the kind that you know I like, and bring it to me to eat so that I can give you my personal blessing before I die.”'
  '20':
  - type: text
    content: Isaac said, “So soon? How did you get it so quickly?”
  - type: text
    content: '“Because your '
  - type: text
