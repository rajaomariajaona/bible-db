  '21':
  - type: text
    content: Isaac said, “Come close, son; let me touch you—are you really my son Esau?”
  '22':
  - type: text
    content: ' So Jacob moved close to his father Isaac. Isaac felt him and said, “The voice is Jacob’s voice but the hands are the hands of Esau.” He didn’t recognize him because his hands were hairy, like his brother Esau’s.'
