  '30':
  - type: text
    content: And then right after Isaac had blessed Jacob and Jacob had left, Esau showed up from the hunt. He also had prepared a hearty meal. He came to his father and said, “Let my father get up and eat of his son’s game, that he may give me his personal blessing.”
  '32':
  - type: text
    content: His father Isaac said, “And who are you?”
  - type: text
    content: “I am your son, your firstborn, Esau.”
  '33':
  - type: text
    content: Isaac started to tremble, shaking violently. He said, “Then who hunted game and brought it to me? I finished the meal just now, before you walked in. And I blessed him—he’s blessed for good!”
  '34':
  - type: text
    content: Esau, hearing his father’s words, sobbed violently and most bitterly, and cried to his father, “My father! Can’t you also bless me?”
  '35':
  - type: text
    content: “Your brother,” he said, “came here falsely and took your blessing.”
  '36':
  - type: text
    content: 'Esau said, “Not for nothing was he named Jacob, the Heel. Twice now he’s tricked me: first he took my birthright and now he’s taken my blessing.”'
  - type: text
    content: He begged, “Haven’t you kept back any blessing for me?”
  '37':
  - type: text
    content: Isaac answered Esau, “I’ve made him your master, and all his brothers his servants, and lavished grain and wine on him. I’ve given it all away. What’s left for you, my son?”
  '38':
  - type: text
    content: “But don’t you have just one blessing for me, Father? Oh, bless me my father! Bless me!” Esau sobbed inconsolably.
  '39':
  - type: text
    content: Isaac said to him,
  - type: text
    content: You’ll live far from Earth’s bounty,
  - type: text
    content: remote from Heaven’s dew.
  - type: text
    content: You’ll live by your sword, hand-to-mouth,
  - type: text
    content: and you’ll serve your brother.
  - type: text
    content: But when you can’t take it any more
  - type: text
    content: you’ll break loose and run free.
  '41':
  - type: text
    content: Esau seethed in anger against Jacob because of the blessing his father had given him; he brooded, “The time for mourning my father’s death is close. And then I’ll kill my brother Jacob.”
  '42':
  - type: text
    content: When these words of her older son Esau were reported to Rebekah, she called her younger son Jacob and said, “Your brother Esau is plotting vengeance against you. He’s going to kill you. Son, listen to me. Get out of here. Run for your life to Haran, to my brother Laban. Live with him for a while until your brother cools down, until his anger subsides and he forgets what you did to him. I’ll then send for you and bring you back. Why should I lose both of you the same day?”
  '46':
  - type: text
    content: Rebekah spoke to Isaac, “I’m sick to death of these Hittite women. If Jacob also marries a native Hittite woman, why live?”
  '5':
  - type: text
    content: 'Rebekah was eavesdropping as Isaac spoke to his son Esau. As soon as Esau had gone off to the country to hunt game for his father, Rebekah spoke to her son Jacob. “I just overheard your father talking with your brother, Esau. He said, ‘Bring me some game and fix me a hearty meal so that I can eat and bless you with '
  - type: text
    content: God
  - type: text
    content: ’s blessing before I die.’
  '8':
  - type: text
    content: “Now, my son, listen to me. Do what I tell you. Go to the flock and get me two young goats. Pick the best; I’ll prepare them into a hearty meal, the kind that your father loves. Then you’ll take it to your father, he’ll eat and bless you before he dies.”
