verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Isaac had become an old man and was nearly blind, he called his eldest son, Esau, and said, “My son.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Father?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But Mother,” Jacob said, “my brother Esau is a hairy man and I have smooth skin. What happens if my father touches me? He’ll think I’m playing games with him. I’ll bring down a curse on myself instead of a blessing.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If it comes to that,” said his mother, “I’ll take the curse on myself. Now, just do what I say. Go and get the goats.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went and got them and brought them to his mother and she cooked a hearty meal, the kind his father loved so much.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rebekah took the dress-up clothes of her older son Esau and put them on her younger son Jacob. She took the goatskins and covered his hands and the smooth nape of his neck. Then she placed the hearty meal she had fixed and fresh bread she’d baked into the hands of her son Jacob.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He went to his father and said, “My father!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes?” he said. “Which son are you?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob answered his father, “I’m your firstborn son Esau. I did what you told me. Come now; sit up and eat of my game so you can give me your personal blessing.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I’m an old man,” he said; “I might die any day now. Do me a favor: Get your quiver of arrows and your bow and go out in the country and hunt me some game. Then fix me a hearty meal, the kind that you know I like, and bring it to me to eat so that I can give you my personal blessing before I die.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac said, “So soon? How did you get it so quickly?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Because your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' cleared the way for me.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac said, “Come close, son; let me touch you—are you really my son Esau?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Jacob moved close to his father Isaac. Isaac felt him and said, “The voice is Jacob’s voice but the hands are the hands of Esau.” He didn’t recognize him because his hands were hairy, like his brother Esau’s.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as he was about to bless him he pressed him, “You’re sure? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' are my son Esau?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes. I am.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac said, “Bring the food so I can eat of my son’s game and give you my personal blessing.” Jacob brought it to him and he ate. He also brought him wine and he drank.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Isaac said, “Come close, son, and kiss me.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He came close and kissed him and Isaac smelled the smell of his clothes. Finally, he blessed him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahhh. The smell of my son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like the smell of the open country
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'blessed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May God give you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of Heaven’s dew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Earth’s bounty of grain and wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May peoples serve you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nations honor you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will master your brothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your mother’s sons will honor you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who curse you will be cursed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who bless you will be blessed.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And then right after Isaac had blessed Jacob and Jacob had left, Esau showed up from the hunt. He also had prepared a hearty meal. He came to his father and said, “Let my father get up and eat of his son’s game, that he may give me his personal blessing.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His father Isaac said, “And who are you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am your son, your firstborn, Esau.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac started to tremble, shaking violently. He said, “Then who hunted game and brought it to me? I finished the meal just now, before you walked in. And I blessed him—he’s blessed for good!”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Esau, hearing his father’s words, sobbed violently and most bitterly, and cried to his father, “My father! Can’t you also bless me?”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Your brother,” he said, “came here falsely and took your blessing.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esau said, “Not for nothing was he named Jacob, the Heel. Twice now he’s tricked me: first he took my birthright and now he’s taken my blessing.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: He begged, “Haven’t you kept back any blessing for me?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac answered Esau, “I’ve made him your master, and all his brothers his servants, and lavished grain and wine on him. I’ve given it all away. What’s left for you, my son?”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But don’t you have just one blessing for me, Father? Oh, bless me my father! Bless me!” Esau sobbed inconsolably.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac said to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll live far from Earth’s bounty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remote from Heaven’s dew.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll live by your sword, hand-to-mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’ll serve your brother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you can’t take it any more
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll break loose and run free.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Esau seethed in anger against Jacob because of the blessing his father had given him; he brooded, “The time for mourning my father’s death is close. And then I’ll kill my brother Jacob.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When these words of her older son Esau were reported to Rebekah, she called her younger son Jacob and said, “Your brother Esau is plotting vengeance against you. He’s going to kill you. Son, listen to me. Get out of here. Run for your life to Haran, to my brother Laban. Live with him for a while until your brother cools down, until his anger subsides and he forgets what you did to him. I’ll then send for you and bring you back. Why should I lose both of you the same day?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rebekah spoke to Isaac, “I’m sick to death of these Hittite women. If Jacob also marries a native Hittite woman, why live?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rebekah was eavesdropping as Isaac spoke to his son Esau. As soon as Esau had gone off to the country to hunt game for his father, Rebekah spoke to her son Jacob. “I just overheard your father talking with your brother, Esau. He said, ‘Bring me some game and fix me a hearty meal so that I can eat and bless you with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s blessing before I die.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now, my son, listen to me. Do what I tell you. Go to the flock and get me two young goats. Pick the best; I’ll prepare them into a hearty meal, the kind that your father loves. Then you’ll take it to your father, he’ll eat and bless you before he dies.”
