type_code: eng
verses:
  '1':
  - type: heading
    content: The Money Has Gone to Your Head
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me, “Son of man, tell the prince of Tyre, ‘This is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘Your heart is proud,
  - type: text
    content: going around saying, “I’m a god.
  - type: text
    content: I sit on God’s divine throne,
  - type: text
    content: ruling the sea”—
  - type: text
    content: You, a mere mortal,
  - type: text
    content: not even close to being a god,
  - type: text
    content: A mere mortal
  - type: text
    content: trying to be a god.
  - type: text
    content: Look, you think you’re smarter than Daniel.
  - type: text
    content: No enigmas can stump you.
  - type: text
    content: Your sharp intelligence
  - type: text
    content: made you world-wealthy.
  - type: text
    content: You piled up gold and silver
  - type: text
    content: in your banks.
  - type: text
    content: You used your head well,
  - type: text
    content: worked good deals, made a lot of money.
  - type: text
    content: But the money has gone to your head,
  - type: text
    content: swelled your head—what a big head!
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, raise a funeral song over the king of Tyre. Tell him, A Message from '
  - type: text
    content: God
  - type: text
    content: ', the Master:'
  - type: text
    content: “You had everything going for you.
  - type: text
    content: You were in Eden, God’s garden.
  - type: text
    content: You were dressed in splendor,
  - type: text
    content: 'your robe studded with jewels:'
  - type: text
    content: Carnelian, peridot, and moonstone,
  - type: text
    content: beryl, onyx, and jasper,
  - type: text
    content: Sapphire, turquoise, and emerald,
  - type: text
    content: all in settings of engraved gold.
  - type: text
    content: A robe was prepared for you
  - type: text
    content: the same day you were created.
  - type: text
    content: You were the anointed cherub.
  - type: text
    content: I placed you on the mountain of God.
  - type: text
    content: You strolled in magnificence
  - type: text
    content: among the stones of fire.
  - type: text
    content: From the day of your creation
  - type: text
    content: you were sheer perfection . . . 
  - type: text
    content: and then imperfection—evil!—was detected in you.
  - type: text
    content: In much buying and selling
  - type: text
    content: you turned violent, you sinned!
  - type: text
    content: I threw you, disgraced, off the mountain of God.
  - type: text
    content: I threw you out—you, the anointed angel-cherub.
  - type: text
    content: No more strolling among the gems of fire for you!
  - type: text
    content: Your beauty went to your head.
  - type: text
    content: You corrupted wisdom
  - type: text
    content: by using it to get worldly fame.
  - type: text
    content: I threw you to the ground,
  - type: text
    content: sent you sprawling before an audience of kings
  - type: text
    content: and let them gloat over your demise.
  - type: text
    content: By sin after sin after sin,
  - type: text
    content: by your corrupt ways of doing business,
  - type: text
    content: you defiled your holy places of worship.
  - type: text
    content: So I set a fire around and within you.
  - type: text
    content: It burned you up. I reduced you to ashes.
  - type: text
    content: All anyone sees now
  - type: text
    content: when they look for you is ashes,
  - type: text
    content: a pitiful mound of ashes.
  - type: text
    content: All who once knew you
  - type: text
    content: 'now throw up their hands:'
  - type: text
    content: ‘This can’t have happened!
  - type: text
    content: 'This '
  - type: text
    content: has
  - type: text
    content: ' happened!’”'
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, confront Sidon. Preach against it. Say, ‘Message from '
  - type: text
    content: God
  - type: text
    content: ', the Master:'
  - type: text
    content: “‘Look! I’m against you, Sidon.
  - type: text
    content: I intend to be known for who I truly am among you.’
  - type: text
    content: 'They’ll know that I am '
  - type: text
    content: God
  - type: text
    content: when I set things right
  - type: text
    content: and reveal my holy presence.
  - type: text
    content: I’ll order an epidemic of disease there,
  - type: text
    content: along with murder and mayhem in the streets.
  - type: text
    content: People will drop dead right and left,
  - type: text
    content: as war presses in from every side.
  - type: text
    content: Then they’ll realize that I mean business,
  - type: text
    content: 'that I am '
  - type: text
    content: God
  - type: text
    content: .
  '24':
  - type: text
    content: “No longer will Israel have to put up with
  - type: text
    content: their thistle-and-thorn neighbors
  - type: text
    content: Who have treated them so contemptuously.
  - type: text
    content: 'And they also will realize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the Master, says, “When I gather Israel from the peoples among whom they’ve been scattered and put my holiness on display among them with all the nations looking on, then they’ll live in their own land that I gave to my servant Jacob. They’ll live there in safety. They’ll build houses. They’ll plant vineyards, living in safety. Meanwhile, I’ll bring judgment on all the neighbors who have treated them with such contempt. And they’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  '6':
  - type: text
    content: ' “‘Therefore, '
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘Because you’re acting like a god,
  - type: text
    content: 'pretending to '
  - type: text
    content: be
  - type: text
    content: ' a god,'
  - type: text
    content: 'I’m giving fair warning: I’m bringing strangers down on you,'
  - type: text
    content: the most vicious of all nations.
  - type: text
    content: They’ll pull their swords and make hash
  - type: text
    content: of your reputation for knowing it all.
  - type: text
    content: They’ll puncture the balloon
  - type: text
    content: of your god-pretensions.
  - type: text
    content: They’ll bring you down from your self-made pedestal
  - type: text
    content: and bury you in the deep blue sea.
  - type: text
    content: Will you protest to your assassins,
  - type: text
    content: “You can’t do that! I’m a god”?
  - type: text
    content: To them you’re a mere mortal.
  - type: text
    content: They’re killing a man, not a god.
  - type: text
    content: You’ll die like a stray dog,
  - type: text
    content: killed by strangers—
  - type: text
    content: Because I said so.
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
