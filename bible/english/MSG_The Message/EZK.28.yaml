  children:
  - type: text
    text: The Money Has Gone to Your Head
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me, “Son of man, tell the prince of Tyre, ‘This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Your heart is proud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: going around saying, “I’m a god.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sit on God’s divine throne,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ruling the sea”—
- type: usfm
  marker: q1
  children:
  - type: text
    text: You, a mere mortal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even close to being a god,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mere mortal
- type: usfm
  marker: q2
  children:
  - type: text
    text: trying to be a god.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look, you think you’re smarter than Daniel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No enigmas can stump you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sharp intelligence
- type: usfm
  marker: q2
  children:
  - type: text
    text: made you world-wealthy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You piled up gold and silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your banks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You used your head well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: worked good deals, made a lot of money.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the money has gone to your head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swelled your head—what a big head!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-11a
  - type: text
    text: ' “‘Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Because you’re acting like a god,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'pretending to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' a god,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’m giving fair warning: I’m bringing strangers down on you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the most vicious of all nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll pull their swords and make hash
- type: usfm
  marker: q2
  children:
  - type: text
    text: of your reputation for knowing it all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll puncture the balloon
- type: usfm
  marker: q2
  children:
  - type: text
    text: of your god-pretensions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll bring you down from your self-made pedestal
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bury you in the deep blue sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will you protest to your assassins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You can’t do that! I’m a god”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To them you’re a mere mortal.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’re killing a man, not a god.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll die like a stray dog,
- type: usfm
  marker: q2
  children:
  - type: text
    text: killed by strangers—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I said so.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11b-19
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, raise a funeral song over the king of Tyre. Tell him, A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You had everything going for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You were in Eden, God’s garden.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were dressed in splendor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your robe studded with jewels:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Carnelian, peridot, and moonstone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beryl, onyx, and jasper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sapphire, turquoise, and emerald,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all in settings of engraved gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A robe was prepared for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: the same day you were created.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were the anointed cherub.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I placed you on the mountain of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You strolled in magnificence
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the stones of fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the day of your creation
- type: usfm
  marker: q2
  children:
  - type: text
    text: you were sheer perfection . . . 
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then imperfection—evil!—was detected in you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In much buying and selling
- type: usfm
  marker: q2
  children:
  - type: text
    text: you turned violent, you sinned!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I threw you, disgraced, off the mountain of God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I threw you out—you, the anointed angel-cherub.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No more strolling among the gems of fire for you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your beauty went to your head.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You corrupted wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: by using it to get worldly fame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I threw you to the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sent you sprawling before an audience of kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let them gloat over your demise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By sin after sin after sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by your corrupt ways of doing business,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you defiled your holy places of worship.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I set a fire around and within you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It burned you up. I reduced you to ashes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All anyone sees now
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they look for you is ashes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a pitiful mound of ashes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who once knew you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'now throw up their hands:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘This can’t have happened!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' happened!’”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, confront Sidon. Preach against it. Say, ‘Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Look! I’m against you, Sidon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I intend to be known for who I truly am among you.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They’ll know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I set things right
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reveal my holy presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll order an epidemic of disease there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with murder and mayhem in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People will drop dead right and left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as war presses in from every side.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they’ll realize that I mean business,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “No longer will Israel have to put up with
- type: usfm
  marker: q2
  children:
  - type: text
    text: their thistle-and-thorn neighbors
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have treated them so contemptuously.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And they also will realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, “When I gather Israel from the peoples among whom they’ve been scattered and put my holiness on display among them with all the nations looking on, then they’ll live in their own land that I gave to my servant Jacob. They’ll live there in safety. They’ll build houses. They’ll plant vineyards, living in safety. Meanwhile, I’ll bring judgment on all the neighbors who have treated them with such contempt. And they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
