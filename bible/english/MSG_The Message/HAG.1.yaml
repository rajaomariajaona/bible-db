document_id: HAG.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caught Up with Taking Care of Your Own Houses
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the first day of the sixth month of the second year in the reign of King Darius of Persia, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message was delivered by the prophet Haggai to the governor of Judah, Zerubbabel son of Shealtiel, and to the high priest, Joshua son of Jehozadak:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies: “The people procrastinate. They say this isn’t the right time to rebuild my Temple, the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Shortly after that, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said more and Haggai spoke it: “How is it that it’s the ‘right time’ for you to live in your fine new homes while the Home, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Temple, is in ruins?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'And then a little later, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies spoke out again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Take a good, hard look at your life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Think it over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have spent a lot of money,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you haven’t much to show for it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You keep filling your plates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you never get filled up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You keep drinking and drinking and drinking,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’re always thirsty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put on layer after layer of clothes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you can’t get warm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people who work for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what are they getting out of it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not much—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a leaky, rusted-out bucket, that’s what.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'That’s why '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Take a good, hard look at your life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Think it over.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9a
  - type: text
    text: ' Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Here’s what I want you to do:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Climb into the hills and cut some timber.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring it down and rebuild the Temple.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do it just for me. Honor me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve had great ambitions for yourselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but nothing has come of it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The little you have brought to my Temple
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve blown away—there was nothing to it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9b-11
  - type: text
    text: ' “And why?” (This is a Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, remember.) “Because while you’ve run around, caught up with taking care of your own houses, my Home is in ruins. That’s why. Because of your stinginess. And so I’ve given you a dry summer and a meager crop. I’ve matched your tight-fisted stinginess by decreeing a season of drought, drying up fields and hills, withering gardens and orchards, stunting vegetables and fruit. Nothing—not man or woman, not animal or crop—is going to thrive.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the governor, Zerubbabel son of Shealtiel, and the high priest, Joshua son of Jehozadak, and all the people with them listened, really listened, to the voice of their '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent the prophet Haggai to them, they paid attention to him. In listening to Haggai, they honored '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Haggai, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s messenger, preached '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to the people: “I am with you!” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Word.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'This is how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' got Zerubbabel, Joshua, and all the people moving—got them working on the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies. This happened on the twenty-fourth day of the sixth month in the second year of King Darius.
