type_code: eng
verses:
  '1':
  - type: heading
    content: Caught Up with Taking Care of Your Own Houses
  - type: text
    content: 'On the first day of the sixth month of the second year in the reign of King Darius of Persia, '
  - type: text
    content: God
  - type: text
    content: '’s Message was delivered by the prophet Haggai to the governor of Judah, Zerubbabel son of Shealtiel, and to the high priest, Joshua son of Jehozadak:'
  '12':
  - type: text
    content: 'Then the governor, Zerubbabel son of Shealtiel, and the high priest, Joshua son of Jehozadak, and all the people with them listened, really listened, to the voice of their '
  - type: text
    content: God
  - type: text
    content: '. When '
  - type: text
    content: God
  - type: text
    content: ' sent the prophet Haggai to them, they paid attention to him. In listening to Haggai, they honored '
  - type: text
    content: God
  - type: text
    content: .
  '13':
  - type: text
    content: 'Then Haggai, '
  - type: text
    content: God
  - type: text
    content: '’s messenger, preached '
  - type: text
    content: God
  - type: text
    content: '’s Message to the people: “I am with you!” '
  - type: text
    content: God
  - type: text
    content: ’s Word.
  '14':
  - type: text
    content: 'This is how '
  - type: text
    content: God
  - type: text
    content: ' got Zerubbabel, Joshua, and all the people moving—got them working on the Temple of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies. This happened on the twenty-fourth day of the sixth month in the second year of King Darius.
  '2':
  - type: text
    content: 'A Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies: “The people procrastinate. They say this isn’t the right time to rebuild my Temple, the Temple of '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Shortly after that, '
  - type: text
    content: God
  - type: text
    content: ' said more and Haggai spoke it: “How is it that it’s the ‘right time’ for you to live in your fine new homes while the Home, '
  - type: text
    content: God
  - type: text
    content: ’s Temple, is in ruins?”
  '5':
  - type: text
    content: 'And then a little later, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies spoke out again:'
  - type: text
    content: “Take a good, hard look at your life.
  - type: text
    content: Think it over.
  - type: text
    content: You have spent a lot of money,
  - type: text
    content: but you haven’t much to show for it.
  - type: text
    content: You keep filling your plates,
  - type: text
    content: but you never get filled up.
  - type: text
    content: You keep drinking and drinking and drinking,
  - type: text
    content: but you’re always thirsty.
  - type: text
    content: You put on layer after layer of clothes,
  - type: text
    content: but you can’t get warm.
  - type: text
    content: And the people who work for you,
  - type: text
    content: what are they getting out of it?
  - type: text
    content: Not much—
  - type: text
    content: a leaky, rusted-out bucket, that’s what.”
  '7':
  - type: text
    content: 'That’s why '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies said:'
  - type: text
    content: “Take a good, hard look at your life.
  - type: text
    content: Think it over.”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: ' Then '
  - type: text
    content: God
  - type: text
    content: ' said:'
  - type: text
    content: '“Here’s what I want you to do:'
  - type: text
    content: Climb into the hills and cut some timber.
  - type: text
    content: Bring it down and rebuild the Temple.
  - type: text
    content: Do it just for me. Honor me.
  - type: text
    content: You’ve had great ambitions for yourselves,
  - type: text
    content: but nothing has come of it.
  - type: text
    content: The little you have brought to my Temple
  - type: text
    content: I’ve blown away—there was nothing to it.
  '9':
  - type: text
    content: ' “And why?” (This is a Message from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, remember.) “Because while you’ve run around, caught up with taking care of your own houses, my Home is in ruins. That’s why. Because of your stinginess. And so I’ve given you a dry summer and a meager crop. I’ve matched your tight-fisted stinginess by decreeing a season of drought, drying up fields and hills, withering gardens and orchards, stunting vegetables and fruit. Nothing—not man or woman, not animal or crop—is going to thrive.”
  - type: text
    content: '* * *'
