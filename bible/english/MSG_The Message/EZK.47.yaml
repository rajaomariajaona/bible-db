document_id: EZK.47,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trees on Both Sides of the River
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Now he brought me back to the entrance to the Temple. I saw water pouring out from under the Temple porch to the east (the Temple faced east). The water poured from the south side of the Temple, south of the altar. He then took me out through the north gate and led me around the outside to the gate complex on the east. The water was gushing from under the south front of the Temple.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “The swamps and marshes won’t become fresh. They’ll stay salty.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “But the river itself, on both banks, will grow fruit trees of all kinds. Their leaves won’t wither, the fruit won’t fail. Every month they’ll bear fresh fruit because the river from the Sanctuary flows to them. Their fruit will be for food and their leaves for healing.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divide Up This Land
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master: “These are the boundaries by which you are to divide up the inheritance of the land for the twelve tribes of Israel, with Joseph getting two parcels. It is to be divided up equally. I swore in a solemn oath to give it to your ancestors, swore that this land would be your inheritance.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: '“These are the boundaries of the land:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The northern boundary runs from the Great Mediterranean Sea along the Hethlon road to where you turn off to the entrance of Hamath, Zedad, Berothah, and Sibraim, which lies between the territory of Damascus and the territory of Hamath, and on to Hazor-hatticon on the border of Hauran. The boundary runs from the Sea to Hazor-enon, with the territories of Damascus and Hamath to the north. That is the northern boundary.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “The eastern boundary runs between Damascus and Hauran, down along the Jordan between Gilead and the land of Israel to the Eastern Sea as far as Tamar. This is the eastern boundary.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The southern boundary runs west from Tamar to the waters of Meribah-kadesh, along the Brook of Egypt, and out to the Great Mediterranean Sea. This is the southern boundary.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The western boundary is formed by the Great Mediterranean Sea north to where the road turns east toward the entrance to Hamath. This is the western boundary.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: '“Divide up this land among the twelve tribes of Israel. Divide it up as your inheritance, and include in it the resident aliens who have made themselves at home among you and now have children. Treat them as if they were born there, just like yourselves. They also get an inheritance among the tribes of Israel. In whatever tribe the resident alien lives, there he gets his inheritance. Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: He walked to the east with a measuring tape and measured off fifteen hundred feet, leading me through water that was ankle-deep. He measured off another fifteen hundred feet, leading me through water that was knee-deep. He measured off another fifteen hundred feet, leading me through water waist-deep. He measured off another fifteen hundred feet. By now it was a river over my head, water to swim in, water no one could possibly walk through.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: He said, “Son of man, have you had a good look?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he took me back to the riverbank. While sitting on the bank, I noticed a lot of trees on both sides of the river.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: He told me, “This water flows east, descends to the Arabah and then into the sea, the sea of stagnant waters. When it empties into those waters, the sea will become fresh. Wherever the river flows, life will flourish—great schools of fish—because the river is turning the salt sea into fresh water. Where the river flows, life abounds. Fishermen will stand shoulder to shoulder along the shore from En Gedi all the way north to En-eglaim, casting their nets. The sea will teem with fish of all kinds, like the fish of the Great Mediterranean.
