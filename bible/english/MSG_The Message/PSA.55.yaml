document_id: PSA.55,97
type_code: eng
verses:
  '1':
  - type: text
    content: Open your ears, God, to my prayer;
  - type: text
    content: don’t pretend you don’t hear me knocking.
  - type: text
    content: Come close and whisper your answer.
  - type: text
    content: I really need you.
  - type: text
    content: I shudder at the mean voice,
  - type: text
    content: quail before the evil eye,
  - type: text
    content: As they pile on the guilt,
  - type: text
    content: stockpile angry slander.
  '12':
  - type: text
    content: This isn’t the neighborhood bully
  - type: text
    content: mocking me—I could take that.
  - type: text
    content: This isn’t a foreign devil spitting
  - type: text
    content: invective—I could tune that out.
  - type: text
    content: 'It’s '
  - type: text
    content: you
  - type: text
    content: '! We grew up together!'
  - type: text
    content: You!
  - type: text
    content: ' My best friend!'
  - type: text
    content: Those long hours of leisure as we walked
  - type: text
    content: arm in arm, God a third party to our conversation.
  '15':
  - type: text
    content: Haul my betrayers off alive to hell—let them
  - type: text
    content: experience the horror, let them
  - type: text
    content: feel every desolate detail of a damned life.
  '16':
  - type: text
    content: I call to God;
  - type: text
    content: God
  - type: text
    content: ' will help me.'
  - type: text
    content: At dusk, dawn, and noon I sigh
  - type: text
    content: deep sighs—he hears, he rescues.
  - type: text
    content: My life is well and whole, secure
  - type: text
    content: in the middle of danger
  - type: text
    content: Even while thousands
  - type: text
    content: are lined up against me.
  - type: text
    content: God hears it all, and from his judge’s bench
  - type: text
    content: puts them in their place.
  - type: text
    content: But, set in their ways, they won’t change;
  - type: text
    content: they pay him no mind.
  '20':
  - type: text
    content: And this, my best friend, betrayed his best friends;
  - type: text
    content: his life betrayed his word.
  - type: text
    content: All my life I’ve been charmed by his speech,
  - type: text
    content: never dreaming he’d turn on me.
  - type: text
    content: His words, which were music to my ears,
  - type: text
    content: turned to daggers in my heart.
  '22':
  - type: text
    content: 'Pile your troubles on '
  - type: text
    content: God
  - type: text
    content: ’s shoulders—
  - type: text
    content: he’ll carry your load, he’ll help you out.
  - type: text
    content: He’ll never let good people
  - type: text
    content: topple into ruin.
  - type: text
    content: But you, God, will throw the others
  - type: text
    content: into a muddy bog,
  - type: text
    content: Cut the lifespan of assassins
  - type: text
    content: and traitors in half.
  - type: text
    content: And I trust in you.
  '4':
  - type: text
    content: My insides are turned inside out;
  - type: text
    content: specters of death have me down.
  - type: text
    content: I shake with fear,
  - type: text
    content: I shudder from head to foot.
  - type: text
    content: “Who will give me wings,” I ask—
  - type: text
    content: “wings like a dove?”
  - type: text
    content: Get me out of here on dove wings;
  - type: text
    content: I want some peace and quiet.
  - type: text
    content: I want a walk in the country,
  - type: text
    content: I want a cabin in the woods.
  - type: text
    content: I’m desperate for a change
  - type: text
    content: from rage and stormy weather.
  '9':
  - type: text
    content: Come down hard, Lord—slit their tongues.
  - type: text
    content: I’m appalled how they’ve split the city
  - type: text
    content: Into rival gangs
  - type: text
    content: prowling the alleys
  - type: text
    content: Day and night spoiling for a fight,
  - type: text
    content: trash piled in the streets,
  - type: text
    content: Even shopkeepers gouging and cheating
  - type: text
    content: in broad daylight.
