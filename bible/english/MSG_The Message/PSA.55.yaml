document_id: PSA.55,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Open your ears, God, to my prayer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t pretend you don’t hear me knocking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come close and whisper your answer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I really need you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shudder at the mean voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quail before the evil eye,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As they pile on the guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stockpile angry slander.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: This isn’t the neighborhood bully
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mocking me—I could take that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This isn’t a foreign devil spitting
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invective—I could tune that out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: '! We grew up together!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You!
    - type: text
      text: ' My best friend!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those long hours of leisure as we walked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: arm in arm, God a third party to our conversation.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Haul my betrayers off alive to hell—let them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: experience the horror, let them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feel every desolate detail of a damned life.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: I call to God;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will help me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At dusk, dawn, and noon I sigh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deep sighs—he hears, he rescues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My life is well and whole, secure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the middle of danger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even while thousands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are lined up against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God hears it all, and from his judge’s bench
  - type: usfm
    marker: q2
    children:
    - type: text
      text: puts them in their place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But, set in their ways, they won’t change;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they pay him no mind.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: And this, my best friend, betrayed his best friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his life betrayed his word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my life I’ve been charmed by his speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never dreaming he’d turn on me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His words, which were music to my ears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned to daggers in my heart.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'Pile your troubles on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s shoulders—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’ll carry your load, he’ll help you out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll never let good people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: topple into ruin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, God, will throw the others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into a muddy bog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cut the lifespan of assassins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and traitors in half.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I trust in you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-8
    - type: text
      text: My insides are turned inside out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: specters of death have me down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shake with fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shudder from head to foot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who will give me wings,” I ask—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “wings like a dove?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get me out of here on dove wings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want some peace and quiet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want a walk in the country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want a cabin in the woods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m desperate for a change
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from rage and stormy weather.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: Come down hard, Lord—slit their tongues.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m appalled how they’ve split the city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into rival gangs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prowling the alleys
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day and night spoiling for a fight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trash piled in the streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even shopkeepers gouging and cheating
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in broad daylight.
