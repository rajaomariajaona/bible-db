document_id: HEB.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Doesn’t Change
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Stay on good terms with each other, held together by love. Be ready with a meal or a bed when it’s needed. Why, some have extended hospitality to angels without ever knowing it! Regard prisoners as if you were in prison with them. Look on victims of abuse as if what happened to them had happened to you. Honor marriage, and guard the sacredness of sexual intimacy between wife and husband. God draws a firm line against casual and illicit sex.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The altar from which God gives us the gift of himself is not for exploitation by insiders who grab and loot. In the old system, the animals are killed and the bodies disposed of outside the camp. The blood is then brought inside to the altar as a sacrifice for sin. It’s the same with Jesus. He was crucified outside the city gates—
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' is where he poured out the sacrificial blood that was brought to God’s altar to cleanse his people.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So let’s go outside, where Jesus is, where the action is—not trying to be privileged insiders, but taking our share in the abuse of Jesus. This “insider world” is not our home. We have our eyes peeled for the City about to come. Let’s take our place outside with Jesus, no longer pouring out the sacrificial blood of animals but pouring out sacrificial praises from our lips to God in Jesus’ name.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Make sure you don’t take things for granted and go slack in working for the common good; share what you have with others. God takes particular pleasure in acts of worship—a different kind of “sacrifice”—that take place in kitchen and workplace and on the streets.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be responsive to your pastoral leaders. Listen to their counsel. They are alert to the condition of your lives and work under the strict supervision of God. Contribute to the joy of their leadership, not its drudgery. Why would you want to make things harder for them?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pray for us. We have no doubts about what we’re doing or why, but it’s hard going and we need your prayers. All we care about is living well before God. Pray that we may be together soon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May God, who puts all things together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: makes all things whole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who made a lasting mark through the sacrifice of Jesus,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sacrifice of blood that sealed the eternal covenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who led Jesus, our Great Shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: up and alive from the dead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now put you together, provide you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with everything you need to please him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make us into what gives him most pleasure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by means of the sacrifice of Jesus, the Messiah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All glory to Jesus forever and always!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, yes, yes, yes.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Friends, please take what I’ve written most seriously. I’ve kept this as brief as possible; I haven’t piled on a lot of extras. You’ll be glad to know that Timothy has been let out of prison. If he leaves soon, I’ll come with him and get to see you myself.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Say hello to your pastoral leaders and all the congregations. Everyone here in Italy wants to be remembered to you.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace be with you, every one.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t be obsessed with getting more material things. Be relaxed with what you have. Since God assured us, “I’ll never let you down, never walk off and leave you,” we can boldly quote,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is there, ready to help;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m fearless no matter what.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who or what can get to me?
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Appreciate your pastoral leaders who gave you the Word of God. Take a good look at the way they live, and let their faithfulness instruct you, as well as their truthfulness. There should be a consistency that runs through us all. For Jesus doesn’t change—yesterday, today, tomorrow, he’s always totally himself.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t be lured away from him by the latest speculations about him. The grace of Christ is the only good ground for life. Products named after Christ don’t seem to do much for those who buy them.
