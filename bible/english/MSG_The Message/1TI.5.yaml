document_id: 1TI.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Faith
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Don’t be harsh or impatient with an older man. Talk to him as you would your own father, and to the younger men as your brothers. Reverently honor an older woman as you would your mother, and the younger women as sisters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-8
  - type: text
    text: Take care of widows who are destitute. If a widow has family members to take care of her, let them learn that religion begins at their own doorstep and that they should pay back with gratitude some of what they have received. This pleases God immensely. You can tell a legitimate widow by the way she has put all her hope in God, praying to him constantly for the needs of others as well as her own. But a widow who exploits people’s emotions and pocketbooks—well, there’s nothing to her. Tell these things to the people so that they will do the right thing in their extended family. Anyone who neglects to care for family members in need repudiates the faith. That’s worse than refusing to believe in the first place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Sign some widows up for the special ministry of offering assistance. They will in turn receive support from the church. They must be over sixty, married only once, and have a reputation for helping out with children, strangers, tired Christians, the hurt and troubled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: Don’t put young widows on this list. No sooner will they get on than they’ll want to get off, obsessed with wanting to get a husband rather than serving Christ in this way. By breaking their word, they’re liable to go from bad to worse, frittering away their days on empty talk, gossip, and trivialities. No, I’d rather the young widows go ahead and get married in the first place, have children, manage their homes, and not give critics any foothold for finding fault. Some of them have already left and gone after Satan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Any Christian woman who has widows in her family is responsible for them. They shouldn’t be dumped on the church. The church has its hands full already with widows who need help.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Give a bonus to leaders who do a good job, especially the ones who work hard at preaching and teaching. Scripture tells us, “Don’t muzzle a working ox” and “A worker deserves his pay.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Don’t listen to a complaint against a leader that isn’t backed up by two or three responsible witnesses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If anyone falls into sin, call that person on the carpet. Those who are inclined that way will know right off they can’t get by with it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: God and Jesus and angels all back me up in these instructions. Carry them out without favoritism, without taking sides. Don’t appoint people to church leadership positions too hastily. If a person is involved in some serious sins, you don’t want to become an unwitting accomplice. In any event, keep a close check on yourself. And don’t worry too much about what the critics will say. Go ahead and drink a little wine, for instance; it’s good for your digestion, good medicine for what ails you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: The sins of some people are blatant and march them right into court. The sins of others don’t show up until much later. The same with good deeds. Some you see right off, but none are hidden forever.
