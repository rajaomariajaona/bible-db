type_code: eng
verses:
  '1':
  - type: heading
    content: King Josiah
  - type: text
    content: 'Josiah was eight years old when he became king. He ruled for thirty-one years in Jerusalem. He behaved well before '
  - type: text
    content: God
  - type: text
    content: . He kept straight on the path blazed by his ancestor David, not one step to the left or right.
  '14':
  - type: text
    content: 'While the money that had been given for The Temple of '
  - type: text
    content: God
  - type: text
    content: ' was being received and dispersed, Hilkiah the high priest found a copy of The Revelation of Moses. He reported to Shaphan the royal secretary, “I’ve just found the Book of '
  - type: text
    content: God
  - type: text
    content: '’s Revelation, instructing us in '
  - type: text
    content: God
  - type: text
    content: '’s way—found it in The Temple!” He gave it to Shaphan, who then gave it to the king. And along with the book, he gave this report: “The job is complete—everything you ordered done is done. They took all the money that was collected in The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and handed it over to the managers and workers.”'
  '18':
  - type: text
    content: And then Shaphan told the king, “Hilkiah the priest gave me a book.” Shaphan proceeded to read it out to the king.
  '19':
  - type: text
    content: 'When the king heard what was written in the book, '
  - type: text
    content: God
  - type: text
    content: '’s Revelation, he ripped his robes in dismay. And then he called for Hilkiah, Ahikam son of Shaphan, Abdon son of Micah, Shaphan the royal secretary, and Asaiah the king’s personal aide. He ordered them all: “Go and pray to '
  - type: text
    content: God
  - type: text
    content: ' for me and what’s left of Israel and Judah. Find out what we must do in response to what is written in this book that has just been found! '
  - type: text
    content: God
  - type: text
    content: '’s anger must be burning furiously against us—our ancestors haven’t obeyed a thing written in this book of '
  - type: text
    content: God
  - type: text
    content: ', followed none of the instructions directed to us.”'
  '22':
  - type: text
    content: Hilkiah and those picked by the king went straight to Huldah the prophetess. She was the wife of Shallum son of Tokhath, the son of Hasrah, who was in charge of the palace wardrobe. She lived in Jerusalem in the Second Quarter. The men consulted with her. In response to them she said, “
  - type: text
    content: God
  - type: text
    content: '’s word, the God of Israel: Tell the man who sent you here, ‘'
  - type: text
    content: God
  - type: text
    content: ' has spoken, I’m on my way to bring the doom of judgment on this place and this people. Every word written in the book read by the king of Judah will happen. And why? Because they’ve deserted me and taken up with other gods; they’ve made me thoroughly angry by setting up their god-making businesses. My anger is raging white-hot against this place and nobody is going to put it out.’'
  '26':
  - type: text
    content: '“And also tell the king of Judah, since he sent you to ask '
  - type: text
    content: God
  - type: text
    content: ' for direction, '
  - type: text
    content: God
  - type: text
    content: '’s comment on what he read in the book: ‘Because you took seriously the doom of judgment I spoke against this place and people, and because you responded in humble repentance, tearing your robe in dismay and weeping before me, I’m taking you seriously. '
  - type: text
    content: God
  - type: text
    content: ’s word. I’ll take care of you; you’ll have a quiet death and be buried in peace. You won’t be around to see the doom that I’m going to bring upon this place and people.’”
  - type: text
    content: The men took her message back to the king.
  '29':
  - type: text
    content: 'The king acted immediately, assembling all the elders of Judah and Jerusalem, and then proceeding to The Temple of '
  - type: text
    content: God
  - type: text
    content: ' bringing everyone in his train—priests and prophets and people ranging from the least to the greatest. Then he read out publicly everything written in the Book of the Covenant that was found in The Temple of '
  - type: text
    content: God
  - type: text
    content: '. The king stood by his pillar and before '
  - type: text
    content: God
  - type: text
    content: ' solemnly committed himself to the covenant: to follow '
  - type: text
    content: God
  - type: text
    content: ' believingly and obediently; to follow his instructions, heart and soul, on what to believe and do; to confirm with his life the entire covenant, all that was written in the book.'
  '3':
  - type: text
    content: When he had been king for eight years—he was still only a teenager—he began to seek the God of David his ancestor. Four years later, the twelfth year of his reign, he set out to cleanse the neighborhood of sex-and-religion shrines, and get rid of the sacred Asherah groves and the god and goddess figurines, whether carved or cast, from Judah. He wrecked the Baal shrines, tore down the altars connected with them, and scattered the debris and ashes over the graves of those who had worshiped at them. He burned the bones of the priests on the same altars they had used when alive. He scrubbed the place clean, Judah and Jerusalem, clean inside and out. The cleanup campaign ranged outward to the cities of Manasseh, Ephraim, Simeon, and the surrounding neighborhoods—as far north as Naphtali. Throughout Israel he demolished the altars and Asherah groves, pulverized the god and goddess figures, chopped up the neighborhood shrines into firewood. With Israel once more intact, he returned to Jerusalem.
  '32':
  - type: text
    content: Then he made everyone in Jerusalem and Benjamin commit themselves. And they did it. They committed themselves to the covenant of God, the God of their ancestors.
  '33':
  - type: text
    content: 'Josiah did a thorough job of cleaning up the pollution that had spread throughout Israelite territory and got everyone started fresh again, serving and worshiping their '
  - type: text
    content: God
  - type: text
    content: '. All through Josiah’s life the people kept to the straight and narrow, obediently following '
  - type: text
    content: God
  - type: text
    content: ', the God of their ancestors.'
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'One day in the eighteenth year of his kingship, with the cleanup of country and Temple complete, King Josiah sent Shaphan son of Azaliah, Maaseiah the mayor of the city, and Joah son of Joahaz the historian to renovate The Temple of '
  - type: text
    content: God
  - type: text
    content: '. First they turned over to Hilkiah the high priest all the money collected by the Levitical security guards from Manasseh and Ephraim and the rest of Israel, and from Judah and Benjamin and the citizens of Jerusalem. It was then put into the hands of the foremen managing the work on The Temple of '
  - type: text
    content: God
  - type: text
    content: ' who then passed it on to the workers repairing '
  - type: text
    content: God
  - type: text
    content: ’s Temple—the carpenters, construction workers, and masons—so they could buy the lumber and dressed stone for rebuilding the foundations the kings of Judah had allowed to fall to pieces. The workmen were honest and diligent. Their foremen were Jahath and Obadiah, the Merarite Levites, and Zechariah and Meshullam from the Kohathites—these managed the project. The Levites—they were all skilled musicians—were in charge of the common laborers and supervised the workers as they went from job to job. The Levites also served as accountants, managers, and security guards.
