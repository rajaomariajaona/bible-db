document_id: 2KI.10,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Ahab had seventy sons still living in Samaria. Jehu wrote letters addressed to the officers of Jezreel, the city elders, and those in charge of Ahab’s sons, and posted them to Samaria. The letters read:'
  '11':
  - type: text
    content: Then Jehu proceeded to kill everyone who had anything to do with Ahab’s family in Jezreel—leaders, friends, priests. He wiped out the entire lot.
  '12':
  - type: text
    content: That done, he brushed himself off and set out for Samaria. Along the way, at Beth Eked (Binding House) of the Shepherds, he met up with some relatives of Ahaziah king of Judah.
  - type: text
    content: Jehu said, “Who are you?”
  - type: text
    content: They said, “We’re relatives of Ahaziah and we’ve come down to a reunion of the royal family.”
  '14':
  - type: text
    content: “Grab them!” ordered Jehu. They were taken and then massacred at the well of Beth Eked. Forty-two of them—no survivors.
  '15':
  - type: text
    content: He went on from there and came upon Jehonadab the Recabite who was on his way to meet him. Greeting him, he said, “Are we together and of one mind in this?”
  - type: text
    content: Jehonadab said, “We are—count on me.”
  - type: text
    content: “Then give me your hand,” said Jehu.
  - type: text
    content: They shook hands on it and Jehonadab stepped up into the chariot with Jehu.
  '16':
  - type: text
    content: '“Come along with me,” said Jehu, “and witness my zeal for '
  - type: text
    content: God
  - type: text
    content: .” Together they proceeded in the chariot.
  '17':
  - type: text
    content: 'When they arrived in Samaria, Jehu massacred everyone left in Samaria who was in any way connected with Ahab—a mass execution, just as '
  - type: text
    content: God
  - type: text
    content: ' had told Elijah.'
  '18':
  - type: text
    content: 'Next, Jehu got all the people together and addressed them:'
  - type: text
    content: Ahab served Baal small-time;
  - type: text
    content: Jehu will serve him big-time.
  - type: text
    content: “Get all the prophets of Baal here—everyone who served him, all his priests. Get everyone here; don’t leave anyone out. I have a great sacrifice to offer Baal. If you don’t show up, you won’t live to tell about it.” (Jehu was lying, of course. He planned to destroy all the worshipers of Baal.)
  '2':
  - type: text
    content: ' This letter is fair warning. You’re in charge of your master’s children, chariots, horses, fortifications, and weapons. Pick the best and most capable of your master’s sons and put him on the throne. Prepare to fight for your master’s position.'
  '20':
  - type: text
    content: Jehu ordered, “Make preparation for a holy convocation for Baal.” They did and posted the date.
  '21':
  - type: text
    content: Jehu then summoned everyone in Israel. They came in droves—every worshiper of Baal in the country. Nobody stayed home. They came and packed the temple of Baal to capacity.
  '22':
  - type: text
    content: Jehu directed the keeper of the wardrobe, “Get robes for all the servants of Baal.” He brought out their robes.
  '23':
  - type: text
    content: 'Jehu and Jehonadab the Recabite now entered the temple of Baal and said, “Double-check and make sure that there are no worshipers of '
  - type: text
    content: God
  - type: text
    content: ' in here; only Baal-worshipers are allowed.” Then they launched the worship, making the sacrifices and burnt offerings.'
  - type: text
    content: 'Meanwhile, Jehu had stationed eighty men outside with orders: “Don’t let a single person escape; if you do, it’s your life for his life.”'
  '25':
  - type: text
    content: When Jehu had finished with the sacrificial solemnities, he signaled to the officers and guards, “Enter and kill! No survivors!”
  - type: text
    content: And the bloody slaughter began. The officers and guards threw the corpses outside and cleared the way to enter the inner shrine of Baal. They hauled out the sacred phallic stone from the temple of Baal and pulverized it. They smashed the Baal altars and tore down the Baal temple. It’s been a public toilet ever since.
  '28':
  - type: text
    content: And that’s the story of Jehu’s wasting of Baal in Israel.
  '29':
  - type: text
    content: But for all that, Jehu didn’t turn back from the sins of Jeroboam son of Nebat, the sins that had dragged Israel into a life of sin—the golden calves in Bethel and Dan stayed.
  '30':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' commended Jehu: “You did well to do what I saw was best. You did what I ordered against the family of Ahab. As reward, your sons will occupy the throne of Israel for four generations.”'
  '31':
  - type: text
    content: 'Even then, though, Jehu wasn’t careful to walk in '
  - type: text
    content: God
  - type: text
    content: ’s ways and honor the God of Israel from an undivided heart. He didn’t turn back from the sins of Jeroboam son of Nebat, who led Israel into a life of sin.
  '32':
  - type: text
    content: 'It was about this time that '
  - type: text
    content: God
  - type: text
    content: ' began to shrink Israel. Hazael hacked away at the borders of Israel from the Jordan to the east—all the territory of Gilead, Gad, Reuben, and Manasseh from Aroer near the Brook Arnon. In effect, all Gilead and Bashan.'
  '34':
  - type: text
    content: 'The rest of the life and times of Jehu, his accomplishments and fame, are written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . Jehu died and was buried in the family plot in Samaria. His son Jehoahaz was the next king. Jehu ruled Israel from Samaria for twenty-eight years.
  '4':
  - type: text
    content: They were absolutely terrified at the letter. They said, “Two kings have already been wiped out by him; what hope do we have?”
  '5':
  - type: text
    content: 'So they sent the warden of the palace, the mayor of the city, the elders, and the guardians to Jehu with this message: “We are your servants. Whatever you say, we’ll do. We’re not making anyone king here. You’re in charge—do what you think best.”'
  '6':
  - type: text
    content: 'Then Jehu wrote a second letter:'
  - type: text
    content: 'If you are on my side and are willing to follow my orders, here’s what you do: Decapitate the sons of your master and bring the heads to me by this time tomorrow in Jezreel.'
  - type: text
    content: The king’s sons numbered seventy. The leaders of the city had taken responsibility for them. When they got the letter, they took the king’s sons and killed all seventy. Then they put the heads in baskets and sent them to Jehu in Jezreel.
  '8':
  - type: text
    content: 'A messenger reported to Jehu: “They’ve delivered the heads of the king’s sons.”'
  - type: text
    content: He said, “Stack them in two piles at the city gate until morning.”
  '9':
  - type: text
    content: 'In the morning Jehu came out, stood before the people, and addressed them formally: “Do you realize that this very day you are participants in '
  - type: text
    content: God
  - type: text
    content: '’s righteous workings? True, I am the one who conspired against my master and assassinated him. But who, do you suppose, is responsible for this pile of skulls? Know this for certain: Not a single syllable that '
  - type: text
    content: God
  - type: text
    content: ' spoke in judgment on the family of Ahab is canceled; you’re seeing it with your own eyes—'
  - type: text
    content: God
  - type: text
    content: ' doing what, through Elijah, he said he’d do.”'
