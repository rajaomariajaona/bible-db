document_id: GEN.3,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The serpent was clever, more clever than any wild animal '
  - type: text
    content: God
  - type: text
    content: ' had made. He spoke to the Woman: “Do I understand that God told you not to eat from any tree in the garden?”'
  '10':
  - type: text
    content: He said, “I heard you in the garden and I was afraid because I was naked. And I hid.”
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “Who told you that you were naked? Did you eat from that tree I told you not to eat from?”'
  '12':
  - type: text
    content: The Man said, “The Woman you gave me as a companion, she gave me fruit from the tree, and, yes, I ate it.”
  - type: text
    content: God
  - type: text
    content: ' said to the Woman, “What is this that you’ve done?”'
  '13':
  - type: text
    content: “The serpent seduced me,” she said, “and I ate.”
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told the serpent:'
  - type: text
    content: “Because you’ve done this, you’re cursed,
  - type: text
    content: cursed beyond all cattle and wild animals,
  - type: text
    content: Cursed to slink on your belly
  - type: text
    content: and eat dirt all your life.
  - type: text
    content: I’m declaring war between you and the Woman,
  - type: text
    content: between your offspring and hers.
  - type: text
    content: He’ll wound your head,
  - type: text
    content: you’ll wound his heel.”
  '16':
  - type: text
    content: 'He told the Woman:'
  - type: text
    content: “I’ll multiply your pains in childbirth;
  - type: text
    content: you’ll give birth to your babies in pain.
  - type: text
    content: You’ll want to please your husband,
  - type: text
    content: but he’ll lord it over you.”
  '17':
  - type: text
    content: 'He told the Man:'
  - type: text
    content: “Because you listened to your wife
  - type: text
    content: and ate from the tree
  - type: text
    content: That I commanded you not to eat from,
  - type: text
    content: ‘Don’t eat from this tree,’
  - type: text
    content: The very ground is cursed because of you;
  - type: text
    content: getting food from the ground
  - type: text
    content: Will be as painful as having babies is for your wife;
  - type: text
    content: you’ll be working in pain all your life long.
  - type: text
    content: The ground will sprout thorns and weeds,
  - type: text
    content: you’ll get your food the hard way,
  - type: text
    content: Planting and tilling and harvesting,
  - type: text
    content: sweating in the fields from dawn to dusk,
  - type: text
    content: Until you return to that ground yourself, dead and buried;
  - type: text
    content: you started out as dirt, you’ll end up dirt.”
  '2':
  - type: text
    content: The Woman said to the serpent, “Not at all. We can eat from the trees in the garden. It’s only about the tree in the middle of the garden that God said, ‘Don’t eat from it; don’t even touch it or you’ll die.’”
  '20':
  - type: text
    content: The Man, known as Adam, named his wife Eve because she was the mother of all the living.
  '21':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' made leather clothing for Adam and his wife and dressed them.'
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “The Man has become like one of us, capable of knowing everything, ranging from good to evil. What if he now should reach out and take fruit from the Tree-of-Life and eat, and live forever? Never—this cannot happen!”'
  '23':
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ' expelled them from the Garden of Eden and sent them to work the ground, the same dirt out of which they’d been made. He threw them out of the garden and stationed angel-cherubim and a revolving sword of fire east of it, guarding the path to the Tree-of-Life.'
  '4':
  - type: text
    content: The serpent told the Woman, “You won’t die. God knows that the moment you eat from that tree, you’ll see what’s really going on. You’ll be just like God, knowing everything, ranging all the way from good to evil.”
  '6':
  - type: text
    content: When the Woman saw that the tree looked like good eating and realized what she would get out of it—she’d know everything!—she took and ate the fruit and then gave some to her husband, and he ate.
  '7':
  - type: text
    content: Immediately the two of them did “see what’s really going on”—saw themselves naked! They sewed fig leaves together as makeshift clothes for themselves.
  '8':
  - type: text
    content: 'When they heard the sound of '
  - type: text
    content: God
  - type: text
    content: ' strolling in the garden in the evening breeze, the Man and his Wife hid in the trees of the garden, hid from '
  - type: text
    content: God
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' called to the Man: “Where are you?”'
