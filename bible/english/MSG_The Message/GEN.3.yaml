document_id: GEN.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The serpent was clever, more clever than any wild animal '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had made. He spoke to the Woman: “Do I understand that God told you not to eat from any tree in the garden?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: The Woman said to the serpent, “Not at all. We can eat from the trees in the garden. It’s only about the tree in the middle of the garden that God said, ‘Don’t eat from it; don’t even touch it or you’ll die.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: The serpent told the Woman, “You won’t die. God knows that the moment you eat from that tree, you’ll see what’s really going on. You’ll be just like God, knowing everything, ranging all the way from good to evil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the Woman saw that the tree looked like good eating and realized what she would get out of it—she’d know everything!—she took and ate the fruit and then gave some to her husband, and he ate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Immediately the two of them did “see what’s really going on”—saw themselves naked! They sewed fig leaves together as makeshift clothes for themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When they heard the sound of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' strolling in the garden in the evening breeze, the Man and his Wife hid in the trees of the garden, hid from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' called to the Man: “Where are you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He said, “I heard you in the garden and I was afraid because I was naked. And I hid.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Who told you that you were naked? Did you eat from that tree I told you not to eat from?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Man said, “The Woman you gave me as a companion, she gave me fruit from the tree, and, yes, I ate it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to the Woman, “What is this that you’ve done?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The serpent seduced me,” she said, “and I ate.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told the serpent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because you’ve done this, you’re cursed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cursed beyond all cattle and wild animals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cursed to slink on your belly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eat dirt all your life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m declaring war between you and the Woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: between your offspring and hers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll wound your head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll wound his heel.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He told the Woman:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll multiply your pains in childbirth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll give birth to your babies in pain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll want to please your husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he’ll lord it over you.”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'He told the Man:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because you listened to your wife
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ate from the tree
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I commanded you not to eat from,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Don’t eat from this tree,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very ground is cursed because of you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: getting food from the ground
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be as painful as having babies is for your wife;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be working in pain all your life long.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ground will sprout thorns and weeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll get your food the hard way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Planting and tilling and harvesting,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweating in the fields from dawn to dusk,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until you return to that ground yourself, dead and buried;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you started out as dirt, you’ll end up dirt.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The Man, known as Adam, named his wife Eve because she was the mother of all the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made leather clothing for Adam and his wife and dressed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “The Man has become like one of us, capable of knowing everything, ranging from good to evil. What if he now should reach out and take fruit from the Tree-of-Life and eat, and live forever? Never—this cannot happen!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' expelled them from the Garden of Eden and sent them to work the ground, the same dirt out of which they’d been made. He threw them out of the garden and stationed angel-cherubim and a revolving sword of fire east of it, guarding the path to the Tree-of-Life.'
