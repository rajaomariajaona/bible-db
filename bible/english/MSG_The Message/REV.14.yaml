document_id: REV.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Perfect Offering
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' I saw—it took my breath away!—the Lamb standing on Mount Zion, 144,000 standing there with him, his Name and the Name of his Father inscribed on their foreheads. And I heard a voice out of Heaven, the sound like rapids, like the crash of thunder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-5
  - type: text
    text: ' And then I heard music, harp music and the harpists singing a new song before the Throne and the Four Animals and the Elders. Only the 144,000 could learn to sing the song. They were bought from earth, lived without compromise, virgin-fresh before God. Wherever the Lamb went, they followed. They were bought from humankind, firstfruits of the harvest for God and the Lamb. Not a false word in their mouths. A perfect offering.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voices from Heaven
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I saw another Angel soaring in Middle-Heaven. He had an Eternal Message to preach to all who were still on earth, every nation and tribe, every tongue and people. He preached in a loud voice, “Fear God and give him glory! His hour of judgment has come! Worship the Maker of Heaven and earth, salt sea and fresh water!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A second Angel followed, calling out, “Ruined, ruined, Great Babylon ruined! She made all the nations drunk on the wine of her whoring!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: A third Angel followed, shouting, warning, “If anyone worships the Beast and its image and takes the mark on forehead or hand, that person will drink the wine of God’s wrath, prepared unmixed in his chalice of anger, and suffer torment from fire and brimstone in the presence of Holy Angels, in the presence of the Lamb. Smoke from their torment will rise age after age. No respite for those who worship the Beast and its image, who take the mark of its name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Meanwhile, the saints stand passionately patient, keeping God’s commands, staying faithful to Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I heard a voice out of Heaven, “Write this: Blessed are those who die in the Master from now on; how blessed to die that way!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes,” says the Spirit, “and blessed rest from their hard, hard work. None of what they’ve done is wasted; God blesses them for it all in the end.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Harvest Time
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: I looked up, I caught my breath!—a white cloud and one like the Son of Man sitting on it. He wore a gold crown and held a sharp sickle. Another Angel came out of the Temple, shouting to the Cloud-Enthroned, “Swing your sickle and reap. It’s harvest time. Earth’s harvest is ripe for reaping.” The Cloud-Enthroned gave a mighty sweep of his sickle, began harvesting earth in a stroke.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Then another Angel came out of the Temple in Heaven. He also had a sharp sickle. Yet another Angel, the one in charge of tending the fire, came from the Altar. He thundered to the Angel who held the sharp sickle, “Swing your sharp sickle. Harvest earth’s vineyard. The grapes are bursting with ripeness.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: The Angel swung his sickle, harvested earth’s vintage, and heaved it into the winepress, the giant winepress of God’s wrath. The winepress was outside the City. As the vintage was trodden, blood poured from the winepress as high as a horse’s bridle, a river of blood for two hundred miles.
