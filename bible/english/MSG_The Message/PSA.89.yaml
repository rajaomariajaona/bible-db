document_id: PSA.89,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Your love, '
  - type: text
    content: God
  - type: text
    content: ', is my song, and I’ll sing it!'
  - type: text
    content: I’m forever telling everyone how faithful you are.
  - type: text
    content: I’ll never quit telling the story of your love—
  - type: text
    content: how you built the cosmos
  - type: text
    content: and guaranteed everything in it.
  - type: text
    content: Your love has always been our lives’ foundation,
  - type: text
    content: your fidelity has been the roof over our world.
  - type: text
    content: You once said, “I joined forces with my chosen leader,
  - type: text
    content: I pledged my word to my servant, David, saying,
  - type: text
    content: ‘Everyone descending from you is guaranteed life;
  - type: text
    content: I’ll make your rule as solid and lasting as rock.’”
  '19':
  - type: text
    content: A long time ago you spoke in a vision,
  - type: text
    content: 'you spoke to your faithful beloved:'
  - type: text
    content: “I’ve crowned a hero,
  - type: text
    content: I chose the best I could find;
  - type: text
    content: I found David, my servant,
  - type: text
    content: poured holy oil on his head,
  - type: text
    content: And I’ll keep my hand steadily on him,
  - type: text
    content: yes, I’ll stick with him through thick and thin.
  - type: text
    content: No enemy will get the best of him,
  - type: text
    content: no scoundrel will do him in.
  - type: text
    content: I’ll weed out all who oppose him,
  - type: text
    content: I’ll clean out all who hate him.
  - type: text
    content: I’m with him for good and I’ll love him forever;
  - type: text
    content: I’ve set him on high—he’s riding high!
  - type: text
    content: I’ve put Ocean in his one hand, River in the other;
  - type: text
    content: he’ll call out, ‘Oh, my Father—my God, my Rock of Salvation!’
  - type: text
    content: Yes, I’m setting him apart as the First of the royal line,
  - type: text
    content: High King over all of earth’s kings.
  - type: text
    content: I’ll preserve him eternally in my love,
  - type: text
    content: I’ll faithfully do all I so solemnly promised.
  - type: text
    content: I’ll guarantee his family tree
  - type: text
    content: and underwrite his rule.
  - type: text
    content: If his children refuse to do what I tell them,
  - type: text
    content: if they refuse to walk in the way I show them,
  - type: text
    content: If they spit on the directions I give them
  - type: text
    content: and tear up the rules I post for them—
  - type: text
    content: I’ll rub their faces in the dirt of their rebellion
  - type: text
    content: and make them face the music.
  - type: text
    content: But I’ll never throw them out,
  - type: text
    content: never abandon or disown them.
  - type: text
    content: Do you think I’d withdraw my holy promise?
  - type: text
    content: or take back words I’d already spoken?
  - type: text
    content: I’ve given my word, my whole and holy word;
  - type: text
    content: do you think I would lie to David?
  - type: text
    content: His family tree is here for good,
  - type: text
    content: his sovereignty as sure as the sun,
  - type: text
    content: Dependable as the phases of the moon,
  - type: text
    content: inescapable as weather.”
  '38':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ', you did walk off and leave us,'
  - type: text
    content: you lost your temper with the one you anointed.
  - type: text
    content: You tore up the promise you made to your servant,
  - type: text
    content: you stomped his crown in the mud.
  - type: text
    content: You blasted his home to kingdom come,
  - type: text
    content: reduced his city to a pile of rubble
  - type: text
    content: Picked clean by wayfaring strangers,
  - type: text
    content: a joke to all the neighbors.
  - type: text
    content: You declared a holiday for all his enemies,
  - type: text
    content: and they’re celebrating for all they’re worth.
  - type: text
    content: Angry, you opposed him in battle,
  - type: text
    content: refused to fight on his side;
  - type: text
    content: You robbed him of his splendor, humiliated this warrior,
  - type: text
    content: ground his kingly honor in the dirt.
  - type: text
    content: You took the best years of his life
  - type: text
    content: and left him an impotent, ruined husk.
  - type: text
    content: 'How long do we put up with this, '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Are you gone for good? Will you hold this grudge forever?
  - type: text
    content: Remember my sorrow and how short life is.
  - type: text
    content: Did you create men and women for nothing but this?
  - type: text
    content: We’ll see death soon enough. Everyone does.
  - type: text
    content: And there’s no back door out of hell.
  - type: text
    content: So where is the love you’re so famous for, Lord?
  - type: text
    content: What happened to your promise to David?
  - type: text
    content: Take a good look at your servant, dear Lord;
  - type: text
    content: I’m the butt of the jokes of all nations,
  - type: text
    content: 'The taunting jokes of your enemies, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: as they dog the steps of your dear anointed.
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: ' forever and always!'
  - type: text
    content: Yes. Oh, yes.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '! Let the cosmos praise your wonderful ways,'
  - type: text
    content: the choir of holy angels sing anthems to your faithful ways!
  - type: text
    content: Search high and low, scan skies and land,
  - type: text
    content: 'you’ll find nothing and no one quite like '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: The holy angels are in awe before him;
  - type: text
    content: he looms immense and august over everyone around him.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, who is like you,
  - type: text
    content: powerful and faithful from every angle?
  - type: text
    content: You put the arrogant ocean in its place
  - type: text
    content: and calm its waves when they turn unruly.
  - type: text
    content: You gave that old hag Egypt the back of your hand,
  - type: text
    content: you brushed off your enemies with a flick of your wrist.
  - type: text
    content: You own the cosmos—you made everything in it,
  - type: text
    content: everything from atom to archangel.
  - type: text
    content: You positioned the North and South Poles;
  - type: text
    content: the mountains Tabor and Hermon sing duets to you.
  - type: text
    content: With your well-muscled arm and your grip of steel—
  - type: text
    content: nobody messes with you!
  - type: text
    content: The Right and Justice are the roots of your rule;
  - type: text
    content: Love and Truth are its fruits.
  - type: text
    content: Blessed are the people who know the passwords of praise,
  - type: text
    content: 'who shout on parade in the bright presence of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Delighted, they dance all day long; they know
  - type: text
    content: who you are, what you do—they can’t keep it quiet!
  - type: text
    content: Your vibrant beauty has gotten inside us—
  - type: text
    content: you’ve been so good to us! We’re walking on air!
  - type: text
    content: 'All we are and have we owe to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Holy God of Israel, our King!
