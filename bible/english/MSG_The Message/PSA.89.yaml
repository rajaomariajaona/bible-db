document_id: PSA.89
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'Your love, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', is my song, and I’ll sing it!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m forever telling everyone how faithful you are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll never quit telling the story of your love—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how you built the cosmos
- type: usfm
  marker: q2
  children:
  - type: text
    text: and guaranteed everything in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your love has always been our lives’ foundation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your fidelity has been the roof over our world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You once said, “I joined forces with my chosen leader,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I pledged my word to my servant, David, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Everyone descending from you is guaranteed life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll make your rule as solid and lasting as rock.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Let the cosmos praise your wonderful ways,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the choir of holy angels sing anthems to your faithful ways!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Search high and low, scan skies and land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you’ll find nothing and no one quite like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: The holy angels are in awe before him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he looms immense and august over everyone around him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, who is like you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: powerful and faithful from every angle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put the arrogant ocean in its place
- type: usfm
  marker: q2
  children:
  - type: text
    text: and calm its waves when they turn unruly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You gave that old hag Egypt the back of your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you brushed off your enemies with a flick of your wrist.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You own the cosmos—you made everything in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything from atom to archangel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You positioned the North and South Poles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mountains Tabor and Hermon sing duets to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With your well-muscled arm and your grip of steel—
- type: usfm
  marker: q2
  children:
  - type: text
    text: nobody messes with you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Right and Justice are the roots of your rule;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Love and Truth are its fruits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed are the people who know the passwords of praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who shout on parade in the bright presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Delighted, they dance all day long; they know
- type: usfm
  marker: q2
  children:
  - type: text
    text: who you are, what you do—they can’t keep it quiet!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your vibrant beauty has gotten inside us—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve been so good to us! We’re walking on air!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All we are and have we owe to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Holy God of Israel, our King!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-37
  - type: text
    text: A long time ago you spoke in a vision,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you spoke to your faithful beloved:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve crowned a hero,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I chose the best I could find;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I found David, my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: poured holy oil on his head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll keep my hand steadily on him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I’ll stick with him through thick and thin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No enemy will get the best of him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no scoundrel will do him in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll weed out all who oppose him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll clean out all who hate him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m with him for good and I’ll love him forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve set him on high—he’s riding high!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve put Ocean in his one hand, River in the other;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll call out, ‘Oh, my Father—my God, my Rock of Salvation!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, I’m setting him apart as the First of the royal line,
- type: usfm
  marker: q2
  children:
  - type: text
    text: High King over all of earth’s kings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll preserve him eternally in my love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll faithfully do all I so solemnly promised.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll guarantee his family tree
- type: usfm
  marker: q2
  children:
  - type: text
    text: and underwrite his rule.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If his children refuse to do what I tell them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if they refuse to walk in the way I show them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If they spit on the directions I give them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tear up the rules I post for them—
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll rub their faces in the dirt of their rebellion
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make them face the music.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’ll never throw them out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never abandon or disown them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I’d withdraw my holy promise?
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take back words I’d already spoken?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve given my word, my whole and holy word;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do you think I would lie to David?
- type: usfm
  marker: q1
  children:
  - type: text
    text: His family tree is here for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his sovereignty as sure as the sun,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dependable as the phases of the moon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: inescapable as weather.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-52
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you did walk off and leave us,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you lost your temper with the one you anointed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You tore up the promise you made to your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you stomped his crown in the mud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You blasted his home to kingdom come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reduced his city to a pile of rubble
- type: usfm
  marker: q1
  children:
  - type: text
    text: Picked clean by wayfaring strangers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a joke to all the neighbors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You declared a holiday for all his enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they’re celebrating for all they’re worth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angry, you opposed him in battle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: refused to fight on his side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You robbed him of his splendor, humiliated this warrior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ground his kingly honor in the dirt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You took the best years of his life
- type: usfm
  marker: q2
  children:
  - type: text
    text: and left him an impotent, ruined husk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How long do we put up with this, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you gone for good? Will you hold this grudge forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember my sorrow and how short life is.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Did you create men and women for nothing but this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll see death soon enough. Everyone does.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And there’s no back door out of hell.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So where is the love you’re so famous for, Lord?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What happened to your promise to David?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take a good look at your servant, dear Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m the butt of the jokes of all nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The taunting jokes of your enemies, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they dog the steps of your dear anointed.
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Blessed be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' forever and always!'
- type: usfm
  marker: q4
  children:
  - type: text
    text: Yes. Oh, yes.
