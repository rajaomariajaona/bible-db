document_id: DEU.32,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: Listen, Heavens, I have something to tell you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attention, Earth, I’ve got a mouth full of words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My teaching, let it fall like a gentle rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my words arrive like morning dew,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a sprinkling rain on new grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like spring showers on the garden.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For it’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Name I’m preaching—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: respond to the greatness of our God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Rock: His works are perfect,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the way he works is fair and just;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A God you can depend upon, no exceptions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a straight-arrow God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His messed-up, mixed-up children, his non-children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throw mud at him but none of it sticks.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-14
    - type: text
      text: He found him out in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in an empty, windswept wasteland.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He threw his arms around him, lavished attention on him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guarding him as the apple of his eye.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was like an eagle hovering over its nest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: overshadowing its young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then spreading its wings, lifting them into the air,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teaching them to fly.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' alone led him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was not a foreign god in sight.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lifted him onto the hilltops,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he could feast on the crops in the fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He fed him honey from the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oil from granite crags,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Curds of cattle and the milk of sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the choice cuts of lambs and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fine Bashan rams, high-quality wheat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the blood of grapes: you drank good wine!'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: Jeshurun put on weight and bucked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you got fat, became obese, a tub of lard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He abandoned the God who made him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he mocked the Rock of his salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made him jealous with their foreign trendy gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with obscenities they vexed him no end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrificed to no-god demons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gods they knew nothing about,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The latest in gods, fresh from the market,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gods your ancestors would never call “gods.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You walked out on the Rock who gave you your life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgot the birth-God who brought you into the world.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-25
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' saw it and spun around,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: angered and hurt by his sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said, “From now on I’m looking the other way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wait and see what happens to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, they’re a turned-around, upside-down generation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who knows what they’ll do from one moment to the next?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve goaded me with their no-gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: infuriated me with their hot-air gods;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going to goad them with a no-people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a hollow nation incense them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My anger started a fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wildfire burning deep down in Sheol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then shooting up and devouring the Earth and its crops,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: setting all the mountains, from bottom to top, on fire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll pile catastrophes on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’ll shoot my arrows at them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Starvation, blistering heat, killing disease;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll send snarling wild animals to attack from the forest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and venomous creatures to strike from the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Killing in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: terror in the houses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young men and virgins alike struck down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and yes, breast-feeding babies and gray-haired old men.”
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: I could have said, “I’ll hack them to pieces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wipe out all trace of them from the Earth,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Except that I feared the enemy would grab the chance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take credit for all of it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crowing, “Look what we did!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had nothing to do with this.”'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-33
    - type: text
      text: They are a nation of idiots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they don’t know enough to come in out of the rain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they had any sense at all, they’d know this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they would see what’s coming down the road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could one soldier chase a thousand enemies off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or two men run off two thousand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unless their Rock had sold them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'unless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had given them away?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their rock is nothing compared to our Rock;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even our enemies say that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re a vine that comes right out of Sodom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who they are is rooted in Gomorrah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their grapes are poison grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their grape-clusters bitter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their wine is rattlesnake venom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mixed with lethal cobra poison.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: Don’t you realize that I have my shelves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: well stocked, locked behind iron doors?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m in charge of vengeance and payback,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just waiting for them to slip up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the day of their doom is just around the corner,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sudden and swift and sure.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-38
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will judge his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but oh how compassionately he’ll do it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he sees their weakened plight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no one left, slave or free,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll say, “So where are their gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rock in which they sought refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gods who feasted on the fat of their sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drank the wine of their drink-offerings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them show their stuff and help you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them give you a hand!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-42
    - type: text
      text: “Do you see it now? Do you see that I’m the one?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you see that there’s no other god beside me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bring death and I give life, I wound and I heal—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no getting away from or around me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I raise my hand in solemn oath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I say, ‘I’m always around. By that very life I promise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I sharpen my lightning sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and execute judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I take vengeance on my enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pay back those who hate me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make my arrows drunk with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sword will gorge itself on flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feasting on slain and captive alike,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the proud and vain enemy corpses.’”
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Celebrate, nations, join the praise of his people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He avenges the deaths of his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pays back his enemies with vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cleanses his land for his people.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-47
    - type: text
      text: Moses came and recited all the words of this song in the hearing of the people, he and Joshua son of Nun. When Moses had finished saying all these words to all Israel, he said, “Take to heart all these words to which I give witness today and urgently command your children to put them into practice, every single word of this Revelation. Yes. This is no small matter for you; it’s your life. In keeping this word you’ll have a good and long life in this land that you’re crossing the Jordan to possess.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 48-50
    - type: text
      text: 'That same day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Climb the Abarim Mountains to Mount Nebo in the land of Moab, overlooking Jericho, and view the land of Canaan that I’m giving the People of Israel to have and hold. Die on the mountain that you climb and join your people in the ground, just as your brother Aaron died on Mount Hor and joined his people.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 51-52
    - type: text
      text: “This is because you broke faith with me in the company of the People of Israel at the Waters of Meribah Kadesh in the Wilderness of Zin—you didn’t honor my Holy Presence in the company of the People of Israel. You’ll look at the land spread out before you but you won’t enter it, this land that I am giving to the People of Israel.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'Don’t you realize it is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' you are treating like this?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is crazy; don’t you have any sense of reverence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t this your father who created you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who made you and gave you a place on Earth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Read up on what happened before you were born;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dig into the past, understand your roots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask your parents what it was like before you were born;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ask the old-ones, they’ll tell you a thing or two.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: When the High God gave the nations their stake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave them their place on Earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He put each of the peoples within boundaries
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under the care of divine guardians.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' himself took charge of his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: took Jacob on as his personal concern.
