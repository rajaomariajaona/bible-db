document_id: DEU.32,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song
  - type: text
    content: Listen, Heavens, I have something to tell you.
  - type: text
    content: Attention, Earth, I’ve got a mouth full of words.
  - type: text
    content: My teaching, let it fall like a gentle rain,
  - type: text
    content: my words arrive like morning dew,
  - type: text
    content: Like a sprinkling rain on new grass,
  - type: text
    content: like spring showers on the garden.
  - type: text
    content: 'For it’s '
  - type: text
    content: God
  - type: text
    content: ’s Name I’m preaching—
  - type: text
    content: respond to the greatness of our God!
  - type: text
    content: 'The Rock: His works are perfect,'
  - type: text
    content: and the way he works is fair and just;
  - type: text
    content: A God you can depend upon, no exceptions,
  - type: text
    content: a straight-arrow God.
  - type: text
    content: His messed-up, mixed-up children, his non-children,
  - type: text
    content: throw mud at him but none of it sticks.
  '10':
  - type: text
    content: He found him out in the wilderness,
  - type: text
    content: in an empty, windswept wasteland.
  - type: text
    content: He threw his arms around him, lavished attention on him,
  - type: text
    content: guarding him as the apple of his eye.
  - type: text
    content: He was like an eagle hovering over its nest,
  - type: text
    content: overshadowing its young,
  - type: text
    content: Then spreading its wings, lifting them into the air,
  - type: text
    content: teaching them to fly.
  - type: text
    content: God
  - type: text
    content: ' alone led him;'
  - type: text
    content: there was not a foreign god in sight.
  - type: text
    content: God
  - type: text
    content: ' lifted him onto the hilltops,'
  - type: text
    content: so he could feast on the crops in the fields.
  - type: text
    content: He fed him honey from the rock,
  - type: text
    content: oil from granite crags,
  - type: text
    content: Curds of cattle and the milk of sheep,
  - type: text
    content: the choice cuts of lambs and goats,
  - type: text
    content: Fine Bashan rams, high-quality wheat,
  - type: text
    content: 'and the blood of grapes: you drank good wine!'
  '15':
  - type: text
    content: Jeshurun put on weight and bucked;
  - type: text
    content: you got fat, became obese, a tub of lard.
  - type: text
    content: He abandoned the God who made him,
  - type: text
    content: he mocked the Rock of his salvation.
  - type: text
    content: They made him jealous with their foreign trendy gods,
  - type: text
    content: and with obscenities they vexed him no end.
  - type: text
    content: They sacrificed to no-god demons,
  - type: text
    content: gods they knew nothing about,
  - type: text
    content: The latest in gods, fresh from the market,
  - type: text
    content: gods your ancestors would never call “gods.”
  - type: text
    content: You walked out on the Rock who gave you your life,
  - type: text
    content: forgot the birth-God who brought you into the world.
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' saw it and spun around,'
  - type: text
    content: angered and hurt by his sons and daughters.
  - type: text
    content: He said, “From now on I’m looking the other way.
  - type: text
    content: Wait and see what happens to them.
  - type: text
    content: Oh, they’re a turned-around, upside-down generation!
  - type: text
    content: Who knows what they’ll do from one moment to the next?
  - type: text
    content: They’ve goaded me with their no-gods,
  - type: text
    content: infuriated me with their hot-air gods;
  - type: text
    content: I’m going to goad them with a no-people,
  - type: text
    content: with a hollow nation incense them.
  - type: text
    content: My anger started a fire,
  - type: text
    content: a wildfire burning deep down in Sheol,
  - type: text
    content: Then shooting up and devouring the Earth and its crops,
  - type: text
    content: setting all the mountains, from bottom to top, on fire.
  - type: text
    content: I’ll pile catastrophes on them,
  - type: text
    content: 'I’ll shoot my arrows at them:'
  - type: text
    content: Starvation, blistering heat, killing disease;
  - type: text
    content: I’ll send snarling wild animals to attack from the forest
  - type: text
    content: and venomous creatures to strike from the dust.
  - type: text
    content: Killing in the streets,
  - type: text
    content: terror in the houses,
  - type: text
    content: Young men and virgins alike struck down,
  - type: text
    content: and yes, breast-feeding babies and gray-haired old men.”
  '26':
  - type: text
    content: I could have said, “I’ll hack them to pieces,
  - type: text
    content: wipe out all trace of them from the Earth,”
  - type: text
    content: Except that I feared the enemy would grab the chance
  - type: text
    content: to take credit for all of it,
  - type: text
    content: Crowing, “Look what we did!
  - type: text
    content: God
  - type: text
    content: ' had nothing to do with this.”'
  '28':
  - type: text
    content: They are a nation of idiots,
  - type: text
    content: they don’t know enough to come in out of the rain.
  - type: text
    content: If they had any sense at all, they’d know this;
  - type: text
    content: they would see what’s coming down the road.
  - type: text
    content: How could one soldier chase a thousand enemies off,
  - type: text
    content: or two men run off two thousand,
  - type: text
    content: Unless their Rock had sold them,
  - type: text
    content: 'unless '
  - type: text
    content: God
  - type: text
    content: ' had given them away?'
  - type: text
    content: For their rock is nothing compared to our Rock;
  - type: text
    content: even our enemies say that.
  - type: text
    content: They’re a vine that comes right out of Sodom,
  - type: text
    content: who they are is rooted in Gomorrah;
  - type: text
    content: Their grapes are poison grapes,
  - type: text
    content: their grape-clusters bitter.
  - type: text
    content: Their wine is rattlesnake venom,
  - type: text
    content: mixed with lethal cobra poison.
  '34':
  - type: text
    content: Don’t you realize that I have my shelves
  - type: text
    content: well stocked, locked behind iron doors?
  - type: text
    content: I’m in charge of vengeance and payback,
  - type: text
    content: just waiting for them to slip up;
  - type: text
    content: And the day of their doom is just around the corner,
  - type: text
    content: sudden and swift and sure.
  '36':
  - type: text
    content: 'Yes, '
  - type: text
    content: God
  - type: text
    content: ' will judge his people,'
  - type: text
    content: but oh how compassionately he’ll do it.
  - type: text
    content: When he sees their weakened plight
  - type: text
    content: and there is no one left, slave or free,
  - type: text
    content: He’ll say, “So where are their gods,
  - type: text
    content: the rock in which they sought refuge,
  - type: text
    content: The gods who feasted on the fat of their sacrifices
  - type: text
    content: and drank the wine of their drink-offerings?
  - type: text
    content: Let them show their stuff and help you,
  - type: text
    content: let them give you a hand!
  '39':
  - type: text
    content: “Do you see it now? Do you see that I’m the one?
  - type: text
    content: Do you see that there’s no other god beside me?
  - type: text
    content: I bring death and I give life, I wound and I heal—
  - type: text
    content: there is no getting away from or around me!
  - type: text
    content: I raise my hand in solemn oath;
  - type: text
    content: 'I say, ‘I’m always around. By that very life I promise:'
  - type: text
    content: When I sharpen my lightning sword
  - type: text
    content: and execute judgment,
  - type: text
    content: I take vengeance on my enemies
  - type: text
    content: and pay back those who hate me.
  - type: text
    content: I’ll make my arrows drunk with blood,
  - type: text
    content: my sword will gorge itself on flesh,
  - type: text
    content: Feasting on slain and captive alike,
  - type: text
    content: the proud and vain enemy corpses.’”
  '43':
  - type: text
    content: Celebrate, nations, join the praise of his people.
  - type: text
    content: He avenges the deaths of his servants,
  - type: text
    content: Pays back his enemies with vengeance,
  - type: text
    content: and cleanses his land for his people.
  '44':
  - type: text
    content: Moses came and recited all the words of this song in the hearing of the people, he and Joshua son of Nun. When Moses had finished saying all these words to all Israel, he said, “Take to heart all these words to which I give witness today and urgently command your children to put them into practice, every single word of this Revelation. Yes. This is no small matter for you; it’s your life. In keeping this word you’ll have a good and long life in this land that you’re crossing the Jordan to possess.”
  '48':
  - type: text
    content: 'That same day '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Climb the Abarim Mountains to Mount Nebo in the land of Moab, overlooking Jericho, and view the land of Canaan that I’m giving the People of Israel to have and hold. Die on the mountain that you climb and join your people in the ground, just as your brother Aaron died on Mount Hor and joined his people.'
  '51':
  - type: text
    content: “This is because you broke faith with me in the company of the People of Israel at the Waters of Meribah Kadesh in the Wilderness of Zin—you didn’t honor my Holy Presence in the company of the People of Israel. You’ll look at the land spread out before you but you won’t enter it, this land that I am giving to the People of Israel.”
  '6':
  - type: text
    content: 'Don’t you realize it is '
  - type: text
    content: God
  - type: text
    content: ' you are treating like this?'
  - type: text
    content: This is crazy; don’t you have any sense of reverence?
  - type: text
    content: Isn’t this your father who created you,
  - type: text
    content: who made you and gave you a place on Earth?
  - type: text
    content: Read up on what happened before you were born;
  - type: text
    content: dig into the past, understand your roots.
  - type: text
    content: Ask your parents what it was like before you were born;
  - type: text
    content: ask the old-ones, they’ll tell you a thing or two.
  '8':
  - type: text
    content: When the High God gave the nations their stake,
  - type: text
    content: gave them their place on Earth,
  - type: text
    content: He put each of the peoples within boundaries
  - type: text
    content: under the care of divine guardians.
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' himself took charge of his people,'
  - type: text
    content: took Jacob on as his personal concern.
