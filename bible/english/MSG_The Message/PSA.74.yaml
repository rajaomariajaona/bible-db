document_id: PSA.74,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You walked off and left us, and never looked back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God, how could you do that?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re your very own sheep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how can you stomp off in anger?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mark and remember, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', all the enemy'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: taunts, each idiot desecration.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t throw your lambs to the wolves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after all we’ve been through, don’t forget us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember your promises;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the city is in darkness, the countryside violent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t leave the victims to rot in the street;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make them a choir that sings your praises.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refresh your memory of us—you bought us a long time ago.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your most precious tribe—you paid a good price for us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your very own Mount Zion—you actually lived here once!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and visit the site of disaster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: see how they’ve wrecked the sanctuary.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On your feet, O God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stand up for yourself!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you hear what they’re saying about you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the vile obscenities?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t tune out their malicious filth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the brawling invective that never lets up.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While your people were at worship, your enemies barged in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brawling and scrawling graffiti.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set fire to the porch;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: axes swinging, they chopped up the woodwork,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beat down the doors with sledgehammers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then split them into kindling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They burned your holy place to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: violated the place of worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They said to themselves, “We’ll wipe them all out,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burned down all the places of worship.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s not a sign or symbol of God in sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor anyone to speak in his name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who knows what’s going on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long, God, will barbarians blaspheme,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enemies curse and get by with it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why don’t you do something? How long are you going
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to sit there with your hands folded in your lap?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is my King from the very start;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he works salvation in the womb of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With one blow you split the sea in two,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made mincemeat of the dragon Tannin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You lopped off the heads of Leviathan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then served them up in a stew for the animals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your finger you opened up springs and creeks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dried up the wild floodwaters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You own the day, you own the night;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you put stars and sun in place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You laid out the four corners of earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shaped the seasons of summer and winter.
