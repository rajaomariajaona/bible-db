document_id: PSA.74,97
type_code: eng
verses:
  '1':
  - type: text
    content: You walked off and left us, and never looked back.
  - type: text
    content: God, how could you do that?
  - type: text
    content: We’re your very own sheep;
  - type: text
    content: how can you stomp off in anger?
  '18':
  - type: text
    content: 'Mark and remember, '
  - type: text
    content: God
  - type: text
    content: ', all the enemy'
  - type: text
    content: taunts, each idiot desecration.
  - type: text
    content: Don’t throw your lambs to the wolves;
  - type: text
    content: after all we’ve been through, don’t forget us.
  - type: text
    content: Remember your promises;
  - type: text
    content: the city is in darkness, the countryside violent.
  - type: text
    content: Don’t leave the victims to rot in the street;
  - type: text
    content: make them a choir that sings your praises.
  '2':
  - type: text
    content: Refresh your memory of us—you bought us a long time ago.
  - type: text
    content: Your most precious tribe—you paid a good price for us!
  - type: text
    content: Your very own Mount Zion—you actually lived here once!
  - type: text
    content: Come and visit the site of disaster,
  - type: text
    content: see how they’ve wrecked the sanctuary.
  '22':
  - type: text
    content: On your feet, O God—
  - type: text
    content: stand up for yourself!
  - type: text
    content: Do you hear what they’re saying about you,
  - type: text
    content: all the vile obscenities?
  - type: text
    content: Don’t tune out their malicious filth,
  - type: text
    content: the brawling invective that never lets up.
  '4':
  - type: text
    content: While your people were at worship, your enemies barged in,
  - type: text
    content: brawling and scrawling graffiti.
  - type: text
    content: They set fire to the porch;
  - type: text
    content: axes swinging, they chopped up the woodwork,
  - type: text
    content: Beat down the doors with sledgehammers,
  - type: text
    content: then split them into kindling.
  - type: text
    content: They burned your holy place to the ground,
  - type: text
    content: violated the place of worship.
  - type: text
    content: They said to themselves, “We’ll wipe them all out,”
  - type: text
    content: and burned down all the places of worship.
  '9':
  - type: text
    content: There’s not a sign or symbol of God in sight,
  - type: text
    content: nor anyone to speak in his name,
  - type: text
    content: no one who knows what’s going on.
  - type: text
    content: How long, God, will barbarians blaspheme,
  - type: text
    content: enemies curse and get by with it?
  - type: text
    content: Why don’t you do something? How long are you going
  - type: text
    content: to sit there with your hands folded in your lap?
  - type: text
    content: God is my King from the very start;
  - type: text
    content: he works salvation in the womb of the earth.
  - type: text
    content: With one blow you split the sea in two,
  - type: text
    content: you made mincemeat of the dragon Tannin.
  - type: text
    content: You lopped off the heads of Leviathan,
  - type: text
    content: then served them up in a stew for the animals.
  - type: text
    content: With your finger you opened up springs and creeks,
  - type: text
    content: and dried up the wild floodwaters.
  - type: text
    content: You own the day, you own the night;
  - type: text
    content: you put stars and sun in place.
  - type: text
    content: You laid out the four corners of earth,
  - type: text
    content: shaped the seasons of summer and winter.
