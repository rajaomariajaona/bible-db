document_id: EZR.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Building Begun
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: When the seventh month came and the Israelites had settled into their towns, the people assembled together in Jerusalem. Jeshua son of Jozadak and his brother priests, along with Zerubbabel, the son of Shealtiel, and his relatives, went to work and built the Altar of the God of Israel to offer Whole-Burnt-Offerings on it as written in The Revelation of Moses the man of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'Even though they were afraid of what their non-Israelite neighbors might do, they went ahead anyway and set up the Altar on its foundations and offered Whole-Burnt-Offerings on it morning and evening. They also celebrated the Festival of Booths as prescribed and the daily Whole-Burnt-Offerings set for each day. And they presented the regular Whole-Burnt-Offerings for Sabbaths, New Moons, and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Holy Festivals, as well as Freewill-Offerings for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They began offering Whole-Burnt-Offerings to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from the very first day of the seventh month, even though The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s foundation had not yet been laid.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They gave money to hire masons and carpenters. They gave food, drink, and oil to the Sidonians and Tyrians in exchange for the cedar lumber they had brought by sea from Lebanon to Joppa, a shipment authorized by Cyrus the king of Persia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'In the second month of the second year after their arrival at The Temple of God in Jerusalem, Zerubbabel son of Shealtiel, and Jeshua son of Jozadak, in company with their brother priests and Levites and everyone else who had come back to Jerusalem from captivity, got started. They appointed the Levites twenty years of age and older to direct the rebuilding of The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Jeshua and his family joined Kadmiel, Binnui, and Hodaviah, along with the extended family of Henadad—all Levites—to direct the work crew on The Temple of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11a
  - type: text
    text: ' When the workers laid the foundation of The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the priests in their robes stood up with trumpets, and the Levites, sons of Asaph, with cymbals, to praise '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the tradition of David king of Israel. They sang antiphonally praise and thanksgiving to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is good!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh yes—he’ll never quit loving Israel!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11b-13
  - type: text
    text: ' All the people boomed out hurrahs, praising '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' as the foundation of The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was laid. As many were noisily shouting with joy, many of the older priests, Levites, and family heads who had seen the first Temple, when they saw the foundations of this Temple laid, wept loudly for joy. People couldn’t distinguish the shouting from the weeping. The sound of their voices reverberated for miles around.'
