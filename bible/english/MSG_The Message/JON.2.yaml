document_id: JON.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: At the Bottom of the Sea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-9
  - type: text
    text: Then Jonah prayed to his God from the belly of the fish.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He prayed:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“In trouble, deep trouble, I prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: He answered me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the belly of the grave I cried, ‘Help!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: You heard my cry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You threw me into ocean’s depths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: into a watery grave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With ocean waves, ocean breakers
- type: usfm
  marker: q2
  children:
  - type: text
    text: crashing over me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, ‘I’ve been thrown away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thrown out, out of your sight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll never again lay eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: on your Holy Temple.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ocean gripped me by the throat.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The ancient Abyss grabbed me and held tight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My head was all tangled in seaweed
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the bottom of the sea where the mountains take root.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was as far down as a body can go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the gates were slamming shut behind me forever—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet you pulled me up from that grave alive,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When my life was slipping away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I remembered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my prayer got through to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made it all the way to your Holy Temple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who worship hollow gods, god-frauds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: walk away from their only true love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I’m worshiping you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: calling out in thanksgiving!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll do what I promised I’d do!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Salvation belongs to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to the fish, and it vomited up Jonah on the seashore.'
