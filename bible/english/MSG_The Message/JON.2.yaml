document_id: JON.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: At the Bottom of the Sea
  - type: text
    content: Then Jonah prayed to his God from the belly of the fish.
  - type: text
    content: 'He prayed:'
  - type: text
    content: '“In trouble, deep trouble, I prayed to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He answered me.
  - type: text
    content: From the belly of the grave I cried, ‘Help!’
  - type: text
    content: You heard my cry.
  - type: text
    content: You threw me into ocean’s depths,
  - type: text
    content: into a watery grave,
  - type: text
    content: With ocean waves, ocean breakers
  - type: text
    content: crashing over me.
  - type: text
    content: I said, ‘I’ve been thrown away,
  - type: text
    content: thrown out, out of your sight.
  - type: text
    content: I’ll never again lay eyes
  - type: text
    content: on your Holy Temple.’
  - type: text
    content: Ocean gripped me by the throat.
  - type: text
    content: The ancient Abyss grabbed me and held tight.
  - type: text
    content: My head was all tangled in seaweed
  - type: text
    content: at the bottom of the sea where the mountains take root.
  - type: text
    content: I was as far down as a body can go,
  - type: text
    content: and the gates were slamming shut behind me forever—
  - type: text
    content: Yet you pulled me up from that grave alive,
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', my God!'
  - type: text
    content: When my life was slipping away,
  - type: text
    content: 'I remembered '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: And my prayer got through to you,
  - type: text
    content: made it all the way to your Holy Temple.
  - type: text
    content: Those who worship hollow gods, god-frauds,
  - type: text
    content: walk away from their only true love.
  - type: text
    content: 'But I’m worshiping you, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: calling out in thanksgiving!
  - type: text
    content: And I’ll do what I promised I’d do!
  - type: text
    content: 'Salvation belongs to '
  - type: text
    content: God
  - type: text
    content: '!”'
  '10':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' spoke to the fish, and it vomited up Jonah on the seashore.'
