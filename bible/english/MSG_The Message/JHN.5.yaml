document_id: JHN.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Even on the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: 'Soon another Feast came around and Jesus was back in Jerusalem. Near the Sheep Gate in Jerusalem there was a pool, in Hebrew called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bethesda
    - type: text
      text: ', with five alcoves. Hundreds of sick people—blind, crippled, paralyzed—were in these alcoves. One man had been an invalid there for thirty-eight years. When Jesus saw him stretched out by the pool and knew how long he had been there, he said, “Do you want to get well?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But he told them, “The man who made me well told me to. He said, ‘Take your bedroll and start walking.’”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: They asked, “Who gave you the order to take it up and start walking?” But the healed man didn’t know, for Jesus had slipped away into the crowd.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: A little later Jesus found him in the Temple and said, “You look wonderful! You’re well! Don’t return to a sinning life or something worse might happen.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: The man went back and told the Jews that it was Jesus who had made him well. That is why the Jews were out to get Jesus—because he did this kind of thing on the Sabbath.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But Jesus defended himself. “My Father is working straight through, even on the Sabbath. So am I.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'That really set them off. The Jews were now not only out to expose him; they were out to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kill
    - type: text
      text: ' him. Not only was he breaking the Sabbath, but he was calling God his own Father, putting himself on a level with God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What the Father Does, the Son Does
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20a
    - type: text
      text: ' So Jesus explained himself at length. “I’m telling you this straight. The Son can’t independently do a thing, only what he sees the Father doing. What the Father does, the Son does. The Father loves the Son and includes him in everything he is doing.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20b-23
    - type: text
      text: ' “But you haven’t seen the half of it yet, for in the same way that the Father raises the dead and creates life, so does the Son. The Son gives life to anyone he chooses. Neither he nor the Father shuts anyone out. The Father handed all authority to judge over to the Son so that the Son will be honored equally with the Father. Anyone who dishonors the Son, dishonors the Father, for it was the Father’s decision to put the Son in the place of honor.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“It’s urgent that you listen carefully to this: Anyone here who believes what I am saying right now and aligns himself with the Father, who has in fact put me in charge, has at this very moment the real, lasting life and is no longer condemned to be an outsider. This person has taken a giant step from the world of the dead to the world of the living.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-27
    - type: text
      text: '“It’s urgent that you get this right: The time has arrived—I mean right now!—when dead men and women will hear the voice of the Son of God and, hearing, will come alive. Just as the Father has life in himself, he has conferred on the Son life in himself. And he has given him the authority, simply because he is the Son of Man, to decide and carry out matters of Judgment.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: “Don’t act so surprised at all this. The time is coming when everyone dead and buried will hear his voice. Those who have lived the right way will walk out into a resurrection Life; those who have lived the wrong way, into a resurrection Judgment.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-33
    - type: text
      text: '“I can’t do a solitary thing on my own: I listen, then I decide. You can trust my decision because I’m not out to get my own way but only to carry out orders. If I were simply speaking on my own account, it would be an empty, self-serving witness. But an independent witness confirms me, the most reliable Witness of all. Furthermore, you all saw and heard John, and he gave expert and reliable testimony about me, didn’t he?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-38
    - type: text
      text: “But my purpose is not to get your vote, and not to appeal to mere human testimony. I’m speaking to you this way so that you will be saved. John was a torch, blazing and bright, and you were glad enough to dance for an hour or so in his bright light. But the witness that really confirms me far exceeds John’s witness. It’s the work the Father gave me to complete. These very tasks, as I go about completing them, confirm that the Father, in fact, sent me. The Father who sent me, confirmed me. And you missed it. You never heard his voice, you never saw his appearance. There is nothing left in your memory of his Message because you do not take his Messenger seriously.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-40
    - type: text
      text: '“You have your heads in your Bibles constantly because you think you’ll find eternal life there. But you miss the forest for the trees. These Scriptures are all about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: '! And here I am, standing right before you, and you aren’t willing to receive from me the life you say you want.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-44
    - type: text
      text: “I’m not interested in crowd approval. And do you know why? Because I know you and your crowds. I know that love, especially God’s love, is not on your working agenda. I came with the authority of my Father, and you either dismiss me or avoid me. If another came, acting self-important, you would welcome him with open arms. How do you expect to get anywhere with God when you spend all your time jockeying for position with each other, ranking your rivals and ignoring God?
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 45-47
    - type: text
      text: '“But don’t think I’m going to accuse you before my Father. Moses, in whom you put so much stock, is your accuser. If you believed, really believed, what Moses said, you would believe me. He wrote of me. If you won’t take seriously what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' wrote, how can I expect you to take seriously what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' speak?”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The sick man said, “Sir, when the water is stirred, I don’t have anybody to put me in the pool. By the time I get there, somebody else is already in.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9a
    - type: text
      text: ' Jesus said, “Get up, take your bedroll, start walking.” The man was healed on the spot. He picked up his bedroll and walked off.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9b-10
    - type: text
      text: ' That day happened to be the Sabbath. The Jews stopped the healed man and said, “It’s the Sabbath. You can’t carry your bedroll around. It’s against the rules.”'
