document_id: PRO.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Your Life Is at Stake
  - type: text
    content: Listen, friends, to some fatherly advice;
  - type: text
    content: sit up and take notice so you’ll know how to live.
  - type: text
    content: I’m giving you good counsel;
  - type: text
    content: don’t let it go in one ear and out the other.
  '10':
  - type: text
    content: Dear friend, take my advice;
  - type: text
    content: it will add years to your life.
  - type: text
    content: I’m writing out clear directions to Wisdom Way,
  - type: text
    content: I’m drawing a map to Righteous Road.
  - type: text
    content: I don’t want you ending up in blind alleys,
  - type: text
    content: or wasting time making wrong turns.
  - type: text
    content: Hold tight to good advice; don’t relax your grip.
  - type: text
    content: Guard it well—your life is at stake!
  - type: text
    content: Don’t take Wicked Bypass;
  - type: text
    content: don’t so much as set foot on that road.
  - type: text
    content: Stay clear of it; give it a wide berth.
  - type: text
    content: Make a detour and be on your way.
  '16':
  - type: text
    content: Evil people are restless
  - type: text
    content: unless they’re making trouble;
  - type: text
    content: They can’t get a good night’s sleep
  - type: text
    content: unless they’ve made life miserable for somebody.
  - type: text
    content: Perversity is their food and drink,
  - type: text
    content: violence their drug of choice.
  '18':
  - type: text
    content: The ways of right-living people glow with light;
  - type: text
    content: the longer they live, the brighter they shine.
  - type: text
    content: But the road of wrongdoing gets darker and darker—
  - type: text
    content: travelers can’t see a thing; they fall flat on their faces.
  - type: heading
    content: Learn It by Heart
  '20':
  - type: text
    content: Dear friend, listen well to my words;
  - type: text
    content: tune your ears to my voice.
  - type: text
    content: Keep my message in plain view at all times.
  - type: text
    content: Concentrate! Learn it by heart!
  - type: text
    content: Those who discover these words live, really live;
  - type: text
    content: body and soul, they’re bursting with health.
  '23':
  - type: text
    content: Keep vigilant watch over your heart;
  - type: text
    content: that’s
  - type: text
    content: ' where life starts.'
  - type: text
    content: Don’t talk out of both sides of your mouth;
  - type: text
    content: avoid careless banter, white lies, and gossip.
  - type: text
    content: Keep your eyes straight ahead;
  - type: text
    content: ignore all sideshow distractions.
  - type: text
    content: Watch your step,
  - type: text
    content: and the road will stretch out smooth before you.
  - type: text
    content: Look neither right nor left;
  - type: text
    content: leave evil in the dust.
  '3':
  - type: text
    content: When I was a boy at my father’s knee,
  - type: text
    content: the pride and joy of my mother,
  - type: text
    content: 'He would sit me down and drill me:'
  - type: text
    content: “Take this to heart. Do what I tell you—live!
  - type: text
    content: Sell everything and buy Wisdom! Forage for Understanding!
  - type: text
    content: Don’t forget one word! Don’t deviate an inch!
  - type: text
    content: Never walk away from Wisdom—she guards your life;
  - type: text
    content: love her—she keeps her eye on you.
  - type: text
    content: 'Above all and before all, do this: Get Wisdom!'
  - type: text
    content: 'Write this at the top of your list: Get Understanding!'
  - type: text
    content: Throw your arms around her—believe me, you won’t regret it;
  - type: text
    content: never let her go—she’ll make your life glorious.
  - type: text
    content: She’ll garland your life with grace,
  - type: text
    content: she’ll festoon your days with beauty.”
