document_id: PRO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Your Life Is at Stake
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Listen, friends, to some fatherly advice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sit up and take notice so you’ll know how to live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m giving you good counsel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let it go in one ear and out the other.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-9
  - type: text
    text: When I was a boy at my father’s knee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pride and joy of my mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He would sit me down and drill me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Take this to heart. Do what I tell you—live!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sell everything and buy Wisdom! Forage for Understanding!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t forget one word! Don’t deviate an inch!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never walk away from Wisdom—she guards your life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: love her—she keeps her eye on you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Above all and before all, do this: Get Wisdom!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Write this at the top of your list: Get Understanding!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Throw your arms around her—believe me, you won’t regret it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: never let her go—she’ll make your life glorious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’ll garland your life with grace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she’ll festoon your days with beauty.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-15
  - type: text
    text: Dear friend, take my advice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will add years to your life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m writing out clear directions to Wisdom Way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m drawing a map to Righteous Road.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t want you ending up in blind alleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or wasting time making wrong turns.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hold tight to good advice; don’t relax your grip.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Guard it well—your life is at stake!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t take Wicked Bypass;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t so much as set foot on that road.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stay clear of it; give it a wide berth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make a detour and be on your way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Evil people are restless
- type: usfm
  marker: q2
  children:
  - type: text
    text: unless they’re making trouble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They can’t get a good night’s sleep
- type: usfm
  marker: q2
  children:
  - type: text
    text: unless they’ve made life miserable for somebody.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perversity is their food and drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: violence their drug of choice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: The ways of right-living people glow with light;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the longer they live, the brighter they shine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the road of wrongdoing gets darker and darker—
- type: usfm
  marker: q2
  children:
  - type: text
    text: travelers can’t see a thing; they fall flat on their faces.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Learn It by Heart
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: Dear friend, listen well to my words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: tune your ears to my voice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep my message in plain view at all times.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Concentrate! Learn it by heart!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who discover these words live, really live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: body and soul, they’re bursting with health.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-27
  - type: text
    text: Keep vigilant watch over your heart;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: that’s
  - type: text
    text: ' where life starts.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t talk out of both sides of your mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: avoid careless banter, white lies, and gossip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep your eyes straight ahead;
- type: usfm
  marker: q2
  children:
  - type: text
    text: ignore all sideshow distractions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Watch your step,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the road will stretch out smooth before you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look neither right nor left;
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave evil in the dust.
