type_code: eng
verses:
  '1':
  - type: heading
    content: The Story About a Vineyard
  - type: text
    content: Then Jesus started telling them stories. “A man planted a vineyard. He fenced it, dug a winepress, erected a watchtower, turned it over to the farmhands, and went off on a trip. At the time for harvest, he sent a servant back to the farmhands to collect his profits.
  '12':
  - type: text
    content: They wanted to lynch him then and there but, intimidated by public opinion, held back. They knew the story was about them. They got away from there as fast as they could.
  - type: heading
    content: Paying Taxes to Caesar
  '13':
  - type: text
    content: 'They sent some Pharisees and followers of Herod to bait him, hoping to catch him saying something incriminating. They came up and said, “Teacher, we know you have integrity, that you are indifferent to public opinion, don’t pander to your students, and teach the way of God accurately. Tell us: Is it lawful to pay taxes to Caesar or not?”'
  '15':
  - type: text
    content: He knew it was a trick question, and said, “Why are you playing these games with me? Bring me a coin and let me look at it.” They handed him one.
  - type: text
    content: “This engraving—who does it look like? And whose name is on it?”
  - type: text
    content: “Caesar,” they said.
  '17':
  - type: text
    content: Jesus said, “Give Caesar what is his, and give God what is his.”
  - type: text
    content: Their mouths hung open, speechless.
  - type: heading
    content: Our Intimacies Will Be with God
  '18':
  - type: text
    content: Some Sadducees, the party that denies any possibility of resurrection, came up and asked, “Teacher, Moses wrote that if a man dies and leaves a wife but no child, his brother is obligated to marry the widow and have children. Well, there once were seven brothers. The first took a wife. He died childless. The second married her. He died, and still no child. The same with the third. All seven took their turn, but no child. Finally the wife died. When they are raised at the resurrection, whose wife is she? All seven were her husband.”
  '24':
  - type: text
    content: 'Jesus said, “You’re way off base, and here’s why: One, you don’t know what God said; two, you don’t know how God works. After the dead are raised up, we’re past the marriage business. As it is with angels now, all our ecstasies and intimacies then will be with God. And regarding the dead, whether or not they are raised, don’t you ever read the Bible? How God at the bush said to Moses, ‘I am—not '
  - type: text
    content: was
  - type: text
    content: '—the God of Abraham, the God of Isaac, and the God of Jacob’? The living God is God of the '
  - type: text
    content: living
  - type: text
    content: ', not the dead. You’re way, way off base.”'
  - type: heading
    content: The Most Important Commandment
  '28':
  - type: text
    content: 'One of the religion scholars came up. Hearing the lively exchanges of question and answer and seeing how sharp Jesus was in his answers, he put in his question: “Which is most important of all the commandments?”'
  '29':
  - type: text
    content: 'Jesus said, “The first in importance is, ‘Listen, Israel: The Lord your God is one; so love the Lord God with all your passion and prayer and intelligence and energy.’ And here is the second: ‘Love others as well as you love yourself.’ There is no other commandment that ranks with these.”'
  '3':
  - type: text
    content: “They grabbed him, beat him up, and sent him off empty-handed. So he sent another servant. That one they tarred and feathered. He sent another and that one they killed. And on and on, many others. Some they beat up, some they killed.
  '32':
  - type: text
    content: The religion scholar said, “A wonderful answer, Teacher! So clear-cut and accurate—that God is one and there is no other. And loving him with all passion and intelligence and energy, and loving others as well as you love yourself. Why, that’s better than all offerings and sacrifices put together!”
  '34':
  - type: text
    content: When Jesus realized how insightful he was, he said, “You’re almost there, right on the border of God’s kingdom.”
  - type: text
    content: After that, no one else dared ask a question.
  - type: text
    content: '* * *'
  '35':
  - type: text
    content: While he was teaching in the Temple, Jesus asked, “How is it that the religion scholars say that the Messiah is David’s ‘son,’ when we all know that David, inspired by the Holy Spirit, said,
  - type: text
    content: God said to my Master,
  - type: text
    content: “Sit here at my right hand
  - type: text
    content: until I put your enemies under your feet.”
  - type: text
    content: “David here designates the Messiah ‘my Master’—so how can the Messiah also be his ‘son’?”
  - type: text
    content: The large crowd was delighted with what they heard.
  '38':
  - type: text
    content: He continued teaching. “Watch out for the religion scholars. They love to walk around in academic gowns, preening in the radiance of public flattery, basking in prominent positions, sitting at the head table at every church function. And all the time they are exploiting the weak and helpless. The longer their prayers, the worse they get. But they’ll pay for it in the end.”
  '41':
  - type: text
    content: Sitting across from the offering box, he was observing how the crowd tossed money in for the collection. Many of the rich were making large contributions. One poor widow came up and put in two small coins—a measly two cents. Jesus called his disciples over and said, “The truth is that this poor widow gave more to the collection than all the others put together. All the others gave what they’ll never miss; she gave extravagantly what she couldn’t afford—she gave her all.”
  '6':
  - type: text
    content: '“Finally there was only one left: a beloved son. In a last-ditch effort, he sent him, thinking, ‘Surely they will respect my son.’'
  '7':
  - type: text
    content: “But those farmhands saw their chance. They rubbed their hands together in greed and said, ‘This is the heir! Let’s kill him and have it all for ourselves.’ They grabbed him, killed him, and threw him over the fence.
  '9':
  - type: text
    content: '“What do you think the owner of the vineyard will do? Right. He’ll come and get rid of everyone. Then he’ll assign the care of the vineyard to others. Read it for yourselves in Scripture:'
  - type: text
    content: That stone the masons threw out
  - type: text
    content: is now the cornerstone!
  - type: text
    content: This is God’s work;
  - type: text
    content: we rub our eyes—we can hardly believe it!”
