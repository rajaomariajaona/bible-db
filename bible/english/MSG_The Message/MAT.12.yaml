document_id: MAT.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: In Charge of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'One Sabbath, Jesus was strolling with his disciples through a field of ripe grain. Hungry, the disciples were pulling off the heads of grain and munching on them. Some Pharisees reported them to Jesus: “Your disciples are breaking the Sabbath rules!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: Jesus said, “Really? Didn’t you ever read what David and his companions did when they were hungry, how they entered the sanctuary and ate fresh bread off the altar, bread that no one but priests were allowed to eat? And didn’t you ever read in God’s Law that priests carrying out their Temple duties break Sabbath rules all the time and it’s not held against them?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: “There is far more at stake here than religion. If you had any idea what this Scripture meant—‘I prefer a flexible heart to an inflexible ritual’—you wouldn’t be nitpicking like this. The Son of Man is no yes-man to the Sabbath; he’s in charge.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: When Jesus left the field, he entered their meeting place. There was a man there with a crippled hand. They said to Jesus, “Is it legal to heal on the Sabbath?” They were baiting him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: He replied, “Is there a person here who, finding one of your lambs fallen into a ravine, wouldn’t, even though it was a Sabbath, pull it out? Surely kindness to people is as legal as kindness to animals!” Then he said to the man, “Hold out your hand.” He held it out and it was healed. The Pharisees walked out furious, sputtering about how they were going to ruin Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: In Charge of Everything
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-21
  - type: text
    text: 'Jesus, knowing they were out to get him, moved on. A lot of people followed him, and he healed them all. He also cautioned them to keep it quiet, following guidelines set down by Isaiah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look well at my handpicked servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I love him so much, take such delight in him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve placed my Spirit on him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll decree justice to the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he won’t yell, won’t raise his voice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there’ll be no commotion in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He won’t walk over anyone’s feelings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t push you into a corner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before you know it, his justice will triumph;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mere sound of his name will signal hope, even
- type: usfm
  marker: q3
  children:
  - type: text
    text: among far-off unbelievers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: No Neutral Ground
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Next a poor demon-afflicted wretch, both blind and deaf, was set down before him. Jesus healed him, gave him his sight and hearing. The people who saw it were impressed—“This has to be the Son of David!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But the Pharisees, when they heard the report, were cynical. “Black magic,” they said. “Some devil trick he’s pulled from his sleeve.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: Jesus confronted their slander. “A judge who gives opposite verdicts on the same person cancels himself out; a family that’s in a constant squabble disintegrates; if Satan banishes Satan, is there any Satan left? If you’re slinging devil mud at me, calling me a devil kicking out devils, doesn’t the same mud stick to your own exorcists?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: '“But if it’s by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' power that I am sending the evil spirits packing, then God’s kingdom is here for sure. How in the world do you think it’s possible in broad daylight to enter the house of an awake, able-bodied man and walk off with his possessions unless you tie him up first? Tie him up, though, and you can clean him out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “This is war, and there is no neutral ground. If you’re not on my side, you’re the enemy; if you’re not helping, you’re making things worse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: “There’s nothing done or said that can’t be forgiven. But if you deliberately persist in your slanders against God’s Spirit, you are repudiating the very One who forgives. If you reject the Son of Man out of some misunderstanding, the Holy Spirit can forgive you, but when you reject the Holy Spirit, you’re sawing off the branch on which you’re sitting, severing by your own perversity all connection with the One who forgives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “If you grow a healthy tree, you’ll pick healthy fruit. If you grow a diseased tree, you’ll pick worm-eaten fruit. The fruit tells you about the tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-37
  - type: text
    text: '“You have minds like a snake pit! How do you suppose what you say is worth anything when you are so foul-minded? It’s your heart, not the dictionary, that gives meaning to your words. A good person produces good deeds and words season after season. An evil person is a blight on the orchard. Let me tell you something: Every one of these careless words is going to come back to haunt you. There will be a time of Reckoning. Words are powerful; take them seriously. Words can be your salvation. Words can also be your damnation.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonah-Evidence
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Later a few religion scholars and Pharisees cornered him. “Teacher, we want to see your credentials. Give us some hard evidence that God is in this. How about a miracle?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: 'Jesus said, “You’re looking for proof, but you’re looking for the wrong kind. All you want is something to titillate your curiosity, satisfy your lust for miracles. The only proof you’re going to get is what looks like the absence of proof: Jonah-evidence. Like Jonah, three days and nights in the fish’s belly, the Son of Man will be gone three days and nights in a deep grave.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: “On Judgment Day, the Ninevites will stand up and give evidence that will condemn this generation, because when Jonah preached to them they changed their lives. A far greater preacher than Jonah is here, and you squabble about ‘proofs.’ On Judgment Day, the Queen of Sheba will come forward and bring evidence that will condemn this generation, because she traveled from a far corner of the earth to listen to wise Solomon. Wisdom far greater than Solomon’s is right in front of you, and you quibble over ‘evidence.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-45
  - type: text
    text: “When a defiling evil spirit is expelled from someone, it drifts along through the desert looking for an oasis, some unsuspecting soul it can bedevil. When it doesn’t find anyone, it says, ‘I’ll go back to my old haunt.’ On return it finds the person spotlessly clean, but vacant. It then runs out and rounds up seven other spirits more evil than itself and they all move in, whooping it up. That person ends up far worse off than if he’d never gotten cleaned up in the first place.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“That’s what this generation is like: You may think you have cleaned out the junk from your lives and gotten ready for God, but you weren’t hospitable to my kingdom message, and now all the devils are moving back in.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obedience Is Thicker than Blood
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 46-47
  - type: text
    text: While he was still talking to the crowd, his mother and brothers showed up. They were outside trying to get a message to him. Someone told Jesus, “Your mother and brothers are out here, wanting to speak with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 48-50
  - type: text
    text: Jesus didn’t respond directly, but said, “Who do you think my mother and brothers are?” He then stretched out his hand toward his disciples. “Look closely. These are my mother and brothers. Obedience is thicker than blood. The person who obeys my heavenly Father’s will is my brother and sister and mother.”
