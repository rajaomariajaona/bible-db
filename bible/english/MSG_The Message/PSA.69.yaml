document_id: PSA.69,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, God, save me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m in over my head,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I poured myself out in prayer and fasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All it got me was more contempt.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I put on a sad face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They treated me like a clown.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now drunks and gluttons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make up drinking songs about me.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And me? I pray.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', it’s time for a break!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, answer in love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer with your sure salvation!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from the swamp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let me go under for good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pull me out of the clutch of the enemy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This whirlpool is sucking me down.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let the swamp be my grave, the Black Hole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swallow me, its jaws clenched around me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now answer me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', because you love me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me see your great mercy full-face.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t look the other way; your servant can’t take it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m in trouble. Answer right now!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come close, God; get me out of here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from this deathtrap.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know how they kick me around—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pin on me the donkey’s ears, the dunce’s cap.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quicksand under me, swamp water over me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going down for the third time.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m broken by their taunts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flat on my face, reduced to a nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked in vain for one friendly face. Not one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I couldn’t find one shoulder to cry on.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They put poison in my soup,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vinegar in my drink.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their supper be bait in a trap that snaps shut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their best friends be trappers who’ll skin them alive.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them become blind as bats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them the shakes from morning to night.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them know what you think of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blast them with your red-hot anger.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Burn down their houses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave them desolate with nobody at home.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gossiped about the one you disciplined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Made up stories about anyone wounded by God.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pile on the guilt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let them off the hook.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strike their names from the list of the living;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No rock-carved honor for them among the righteous.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m hurt and in pain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me space for healing, and mountain air.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m hoarse from calling for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bleary-eyed from searching the sky for God.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me shout God’s name with a praising song,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me tell his greatness in a prayer of thanks.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', this is better than oxen on the altar,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far better than blue-ribbon bulls.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor in spirit see and are glad—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, you God-seekers, take heart!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' listens to the poor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He doesn’t walk out on the wretched.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You heavens, praise him; praise him, earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also ocean and all things that swim in it.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God is out to help Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rebuilding the wrecked towns of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guess who will live there—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The proud owners of the land?
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, the children of his servants will get it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lovers of his name will live in it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve got more enemies than hairs on my head;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Liars and cheats are out to knife me in the back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What I never stole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must I now give back?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, you know every sin I’ve committed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My life’s a wide-open book before you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let those who look to you in hope
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be discouraged by what happens to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dear Lord! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of the armies!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let those out looking for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come to a dead end by following me—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please, dear God of Israel!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of you I look like an idiot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I walk around ashamed to show my face.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My brothers shun me like a bum off the street;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My family treats me like an unwanted guest.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I love you more than I can say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I’m madly in love with you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They blame me for everything they dislike about you.
