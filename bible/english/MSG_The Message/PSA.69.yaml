document_id: PSA.69
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, God, save me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m in over my head,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quicksand under me, swamp water over me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going down for the third time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I’m hoarse from calling for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bleary-eyed from searching the sky for God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I’ve got more enemies than hairs on my head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Liars and cheats are out to knife me in the back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What I never stole
- type: usfm
  marker: q1
  children:
  - type: text
    text: Must I now give back?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God, you know every sin I’ve committed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My life’s a wide-open book before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t let those who look to you in hope
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be discouraged by what happens to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dear Lord! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of the armies!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let those out looking for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come to a dead end by following me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Please, dear God of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because of you I look like an idiot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I walk around ashamed to show my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My brothers shun me like a bum off the street;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My family treats me like an unwanted guest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I love you more than I can say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I’m madly in love with you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They blame me for everything they dislike about you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When I poured myself out in prayer and fasting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All it got me was more contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When I put on a sad face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They treated me like a clown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now drunks and gluttons
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make up drinking songs about me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And me? I pray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', it’s time for a break!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, answer in love!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Answer with your sure salvation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rescue me from the swamp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let me go under for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pull me out of the clutch of the enemy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: This whirlpool is sucking me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Don’t let the swamp be my grave, the Black Hole
- type: usfm
  marker: q1
  children:
  - type: text
    text: Swallow me, its jaws clenched around me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now answer me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', because you love me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me see your great mercy full-face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t look the other way; your servant can’t take it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m in trouble. Answer right now!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Come close, God; get me out of here.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rescue me from this deathtrap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You know how they kick me around—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pin on me the donkey’s ears, the dunce’s cap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I’m broken by their taunts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flat on my face, reduced to a nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I looked in vain for one friendly face. Not one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I couldn’t find one shoulder to cry on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They put poison in my soup,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vinegar in my drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Let their supper be bait in a trap that snaps shut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: May their best friends be trappers who’ll skin them alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Make them become blind as bats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give them the shakes from morning to night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Let them know what you think of them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blast them with your red-hot anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Burn down their houses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leave them desolate with nobody at home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They gossiped about the one you disciplined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Made up stories about anyone wounded by God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pile on the guilt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let them off the hook.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Strike their names from the list of the living;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No rock-carved honor for them among the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I’m hurt and in pain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me space for healing, and mountain air.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Let me shout God’s name with a praising song,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me tell his greatness in a prayer of thanks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', this is better than oxen on the altar,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Far better than blue-ribbon bulls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The poor in spirit see and are glad—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, you God-seekers, take heart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' listens to the poor,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He doesn’t walk out on the wretched.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: You heavens, praise him; praise him, earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Also ocean and all things that swim in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For God is out to help Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rebuilding the wrecked towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Guess who will live there—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The proud owners of the land?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: No, the children of his servants will get it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lovers of his name will live in it.
