document_id: PSA.69,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, God, save me!
  - type: text
    content: I’m in over my head,
  '10':
  - type: text
    content: When I poured myself out in prayer and fasting,
  - type: text
    content: All it got me was more contempt.
  '11':
  - type: text
    content: When I put on a sad face,
  - type: text
    content: They treated me like a clown.
  '12':
  - type: text
    content: Now drunks and gluttons
  - type: text
    content: Make up drinking songs about me.
  '13':
  - type: text
    content: And me? I pray.
  - type: text
    content: God
  - type: text
    content: ', it’s time for a break!'
  - type: text
    content: God, answer in love!
  - type: text
    content: Answer with your sure salvation!
  '14':
  - type: text
    content: Rescue me from the swamp,
  - type: text
    content: Don’t let me go under for good,
  - type: text
    content: Pull me out of the clutch of the enemy;
  - type: text
    content: This whirlpool is sucking me down.
  '15':
  - type: text
    content: Don’t let the swamp be my grave, the Black Hole
  - type: text
    content: Swallow me, its jaws clenched around me.
  '16':
  - type: text
    content: 'Now answer me, '
  - type: text
    content: God
  - type: text
    content: ', because you love me;'
  - type: text
    content: Let me see your great mercy full-face.
  '17':
  - type: text
    content: Don’t look the other way; your servant can’t take it.
  - type: text
    content: I’m in trouble. Answer right now!
  '18':
  - type: text
    content: Come close, God; get me out of here.
  - type: text
    content: Rescue me from this deathtrap.
  '19':
  - type: text
    content: You know how they kick me around—
  - type: text
    content: Pin on me the donkey’s ears, the dunce’s cap.
  '2':
  - type: text
    content: Quicksand under me, swamp water over me;
  - type: text
    content: I’m going down for the third time.
  '20':
  - type: text
    content: I’m broken by their taunts,
  - type: text
    content: Flat on my face, reduced to a nothing.
  - type: text
    content: I looked in vain for one friendly face. Not one.
  - type: text
    content: I couldn’t find one shoulder to cry on.
  '21':
  - type: text
    content: They put poison in my soup,
  - type: text
    content: Vinegar in my drink.
  '22':
  - type: text
    content: Let their supper be bait in a trap that snaps shut;
  - type: text
    content: May their best friends be trappers who’ll skin them alive.
  '23':
  - type: text
    content: Make them become blind as bats,
  - type: text
    content: Give them the shakes from morning to night.
  '24':
  - type: text
    content: Let them know what you think of them,
  - type: text
    content: Blast them with your red-hot anger.
  '25':
  - type: text
    content: Burn down their houses,
  - type: text
    content: Leave them desolate with nobody at home.
  '26':
  - type: text
    content: They gossiped about the one you disciplined,
  - type: text
    content: Made up stories about anyone wounded by God.
  '27':
  - type: text
    content: Pile on the guilt,
  - type: text
    content: Don’t let them off the hook.
  '28':
  - type: text
    content: Strike their names from the list of the living;
  - type: text
    content: No rock-carved honor for them among the righteous.
  '29':
  - type: text
    content: I’m hurt and in pain;
  - type: text
    content: Give me space for healing, and mountain air.
  '3':
  - type: text
    content: I’m hoarse from calling for help,
  - type: text
    content: Bleary-eyed from searching the sky for God.
  '30':
  - type: text
    content: Let me shout God’s name with a praising song,
  - type: text
    content: Let me tell his greatness in a prayer of thanks.
  '31':
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ', this is better than oxen on the altar,'
  - type: text
    content: Far better than blue-ribbon bulls.
  '32':
  - type: text
    content: The poor in spirit see and are glad—
  - type: text
    content: Oh, you God-seekers, take heart!
  '33':
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' listens to the poor,'
  - type: text
    content: He doesn’t walk out on the wretched.
  '34':
  - type: text
    content: You heavens, praise him; praise him, earth;
  - type: text
    content: Also ocean and all things that swim in it.
  '35':
  - type: text
    content: For God is out to help Zion,
  - type: text
    content: Rebuilding the wrecked towns of Judah.
  - type: text
    content: Guess who will live there—
  - type: text
    content: The proud owners of the land?
  '36':
  - type: text
    content: No, the children of his servants will get it,
  - type: text
    content: The lovers of his name will live in it.
  '4':
  - type: text
    content: I’ve got more enemies than hairs on my head;
  - type: text
    content: Liars and cheats are out to knife me in the back.
  - type: text
    content: What I never stole
  - type: text
    content: Must I now give back?
  '5':
  - type: text
    content: God, you know every sin I’ve committed;
  - type: text
    content: My life’s a wide-open book before you.
  '6':
  - type: text
    content: Don’t let those who look to you in hope
  - type: text
    content: Be discouraged by what happens to me,
  - type: text
    content: 'Dear Lord! '
  - type: text
    content: God
  - type: text
    content: ' of the armies!'
  - type: text
    content: Don’t let those out looking for you
  - type: text
    content: Come to a dead end by following me—
  - type: text
    content: Please, dear God of Israel!
  '7':
  - type: text
    content: Because of you I look like an idiot,
  - type: text
    content: I walk around ashamed to show my face.
  '8':
  - type: text
    content: My brothers shun me like a bum off the street;
  - type: text
    content: My family treats me like an unwanted guest.
  '9':
  - type: text
    content: I love you more than I can say.
  - type: text
    content: Because I’m madly in love with you,
  - type: text
    content: They blame me for everything they dislike about you.
