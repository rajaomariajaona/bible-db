document_id: MIC.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message as it came to Micah of Moresheth. It came during the reigns of Jotham, Ahaz, and Hezekiah, kings of Judah. It had to do with what was going on in Samaria and Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Takes the Witness Stand'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t gossip about this in Telltown.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t waste your tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Dustville,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roll in the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Alarmtown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the alarm is sounded.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The citizens of Exitburgh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never get out alive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lament, Last-Stand City:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s nothing in you left standing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The villagers of Bittertown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wait in vain for sweet peace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Harsh judgment has come from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and entered Peace City.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you who live in Chariotville,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get in your chariots for flight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You led the daughter of Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into trusting not God but chariots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Similar sins in Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: also got their start in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead and give your good-bye gifts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Good-byeville.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miragetown beckoned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but disappointed Israel’s kings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inheritance City
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has lost its inheritance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Glorytown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has seen its last of glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shave your heads in mourning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over the loss of your precious towns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go bald as a goose egg—they’ve gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into exile and aren’t coming back.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, people—all of you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Listen, earth, and everyone in it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', takes the witness stand against you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Master from his Holy Temple.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look, here he comes! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', from his place!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He comes down and strides across mountains and hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains sink under his feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: valleys split apart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rock mountains crumble into gravel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the river valleys leak like sieves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All this because of Jacob’s sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because Israel’s family did wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You ask, “So what is Jacob’s sin?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Just look at Samaria—isn’t it obvious?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the sex-and-religion shrines in Judah—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: isn’t Jerusalem responsible?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m turning Samaria into a heap of rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a vacant lot littered with garbage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll dump the stones from her buildings in the valley
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave her abandoned foundations exposed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her carved and cast gods and goddesses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be sold for stove wood and scrap metal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her sacred fertility groves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burned to the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the sticks and stones she worshiped as gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These were her earnings from her life as a whore.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is what happens to the fees of a whore.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is why I lament and mourn.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is why I go around in rags and barefoot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is why I howl like a pack of coyotes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and moan like a mournful owl in the night.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has inflicted punishing wounds;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah has been wounded with no healing in sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judgment has marched through the city gates.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem must face the charges.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
