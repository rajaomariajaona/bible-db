document_id: MIC.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Message as it came to Micah of Moresheth. It came during the reigns of Jotham, Ahaz, and Hezekiah, kings of Judah. It had to do with what was going on in Samaria and Jerusalem.
  - type: heading
    content: God Takes the Witness Stand
  '10':
  - type: text
    content: Don’t gossip about this in Telltown.
  - type: text
    content: Don’t waste your tears.
  - type: text
    content: In Dustville,
  - type: text
    content: roll in the dust.
  - type: text
    content: In Alarmtown,
  - type: text
    content: the alarm is sounded.
  - type: text
    content: The citizens of Exitburgh
  - type: text
    content: will never get out alive.
  - type: text
    content: 'Lament, Last-Stand City:'
  - type: text
    content: There’s nothing in you left standing.
  - type: text
    content: The villagers of Bittertown
  - type: text
    content: wait in vain for sweet peace.
  - type: text
    content: 'Harsh judgment has come from '
  - type: text
    content: God
  - type: text
    content: and entered Peace City.
  - type: text
    content: All you who live in Chariotville,
  - type: text
    content: get in your chariots for flight.
  - type: text
    content: You led the daughter of Zion
  - type: text
    content: into trusting not God but chariots.
  - type: text
    content: Similar sins in Israel
  - type: text
    content: also got their start in you.
  - type: text
    content: Go ahead and give your good-bye gifts
  - type: text
    content: to Good-byeville.
  - type: text
    content: Miragetown beckoned
  - type: text
    content: but disappointed Israel’s kings.
  - type: text
    content: Inheritance City
  - type: text
    content: has lost its inheritance.
  - type: text
    content: Glorytown
  - type: text
    content: has seen its last of glory.
  - type: text
    content: Shave your heads in mourning
  - type: text
    content: over the loss of your precious towns.
  - type: text
    content: Go bald as a goose egg—they’ve gone
  - type: text
    content: into exile and aren’t coming back.
  '2':
  - type: text
    content: Listen, people—all of you.
  - type: text
    content: 'Listen, earth, and everyone in it:'
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: ', takes the witness stand against you,'
  - type: text
    content: the Master from his Holy Temple.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'Look, here he comes! '
  - type: text
    content: God
  - type: text
    content: ', from his place!'
  - type: text
    content: He comes down and strides across mountains and hills.
  - type: text
    content: Mountains sink under his feet,
  - type: text
    content: valleys split apart;
  - type: text
    content: The rock mountains crumble into gravel,
  - type: text
    content: the river valleys leak like sieves.
  - type: text
    content: All this because of Jacob’s sin,
  - type: text
    content: because Israel’s family did wrong.
  - type: text
    content: You ask, “So what is Jacob’s sin?”
  - type: text
    content: Just look at Samaria—isn’t it obvious?
  - type: text
    content: And all the sex-and-religion shrines in Judah—
  - type: text
    content: isn’t Jerusalem responsible?
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: “I’m turning Samaria into a heap of rubble,
  - type: text
    content: a vacant lot littered with garbage.
  - type: text
    content: I’ll dump the stones from her buildings in the valley
  - type: text
    content: and leave her abandoned foundations exposed.
  - type: text
    content: All her carved and cast gods and goddesses
  - type: text
    content: will be sold for stove wood and scrap metal,
  - type: text
    content: All her sacred fertility groves
  - type: text
    content: burned to the ground,
  - type: text
    content: All the sticks and stones she worshiped as gods,
  - type: text
    content: destroyed.
  - type: text
    content: These were her earnings from her life as a whore.
  - type: text
    content: This is what happens to the fees of a whore.”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: This is why I lament and mourn.
  - type: text
    content: This is why I go around in rags and barefoot.
  - type: text
    content: This is why I howl like a pack of coyotes,
  - type: text
    content: and moan like a mournful owl in the night.
  - type: text
    content: God
  - type: text
    content: ' has inflicted punishing wounds;'
  - type: text
    content: Judah has been wounded with no healing in sight.
  - type: text
    content: Judgment has marched through the city gates.
  - type: text
    content: Jerusalem must face the charges.
  - type: text
    content: '* * *'
