  - type: text
    text: Shem, Ham, and Japheth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Japheth Branch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Japheth had Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Gomer had Ashkenaz, Riphath, and Togarmah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Javan had Elisha, Tarshish, Kittim, and Rodanim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ham Branch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ham had Cush, Mizraim, Put, and Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Cush had Seba, Havilah, Sabta, Raamah, and Sabteca.
- type: usfm
  marker: p
  children:
  - type: text
    text: Raamah had Sheba and Dedan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cush had Nimrod, the first great hero on earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Mizraim was ancestor to the Ludim, the Anamim, the Lehabim, the Naphtuhim, the Pathrusim, the Casluhim, and the Caphtorim from whom the Philistines descended.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: Canaan had Sidon (his firstborn) and Heth, and was ancestor to the Jebusites, the Amorites, the Girgashites, the Hivites, the Arkites, the Sinites, the Arvadites, the Zemarites, and the Hamathites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shem Branch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Shem had Elam, Asshur, Arphaxad, Lud, Aram, Uz, Hul, Gether, and Meshech.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'Arphaxad had Shelah and Shelah had Eber. Eber had two sons: Peleg (Division) because in his time the earth was divided up; his brother was Joktan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: Joktan had Almodad, Sheleph, Hazarmaveth, Jerah, Hadoram, Uzal, Diklah, Ebal, Abimael, Sheba, Ophir, Havilah, and Jobab—all sons of Joktan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-28
  - type: text
    text: 'The three main branches in summary: Shem, Arphaxad, Shelah, Eber, Peleg, Reu, Serug, Nahor, Terah, and Abram (Abraham). And Abraham had Isaac and Ishmael.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Abraham
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: 'Abraham’s family tree developed along these lines: Ishmael had Nebaioth (his firstborn), then Kedar, Adbeel, Mibsam, Mishma, Dumah, Massa, Hadad, Tema, Jetur, Naphish, and Kedemah—the Ishmael branch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: Keturah, Abraham’s concubine, gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. Then Jokshan had Sheba and Dedan. And Midian had Ephah, Epher, Hanoch, Abida, and Eldaah. These made up the Keturah branch.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-37
  - type: text
    text: Abraham had Isaac, and Isaac had Esau and Israel (Jacob). Esau had Eliphaz, Reuel, Jeush, Jalam, and Korah. Eliphaz had Teman, Omar, Zepho, Gatam, Kenaz, Timna, and Amalek. And Reuel had Nahath, Zerah, Shammah, and Mizzah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-42
  - type: text
    text: Seir then had Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. Lotan had Hori and Homam. Timna was Lotan’s sister. Shobal had Alian, Manahath, Ebal, Shepho, and Onam. Zibeon had Aiah and Anah. Anah had Dishon. Dishon had Hemdan, Eshban, Ithran, and Keran. Ezer had Bilhan, Zaavan, and Akan. And Dishan had Uz and Aran.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Edomite King List
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-51a
  - type: text
    text: ' A list of the kings who ruled in the country of Edom before Israel had a king:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Bela son of Beor; his city was Dinhabah.
- type: usfm
  marker: p
  children:
  - type: text
    text: Bela died; Jobab son of Zerah from Bozrah was the next king.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jobab died; Husham from the country of the Temanites was the next king.
- type: usfm
  marker: p
  children:
  - type: text
    text: Husham died; Hadad son of Bedad, who defeated Midian in the country of Moab, was the next king; his city was Avith.
- type: usfm
  marker: p
  children:
  - type: text
    text: Hadad died; Samlah from Masrekah was the next king.
- type: usfm
  marker: p
  children:
  - type: text
    text: Samlah died; Shaul from Rehoboth-by-the-River was the next king.
- type: usfm
  marker: p
  children:
  - type: text
    text: Shaul died; Baal-Hanan son of Acbor was the next king.
- type: usfm
  marker: p
  children:
  - type: text
    text: Baal-Hanan died; Hadad was the next king; his city was Pau and his wife was Mehetabel daughter of Matred, the daughter of Me-Zahab.
- type: usfm
  marker: p
  children:
  - type: text
    text: Last of all Hadad died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 51b-54
  - type: text
    text: ' The chieftains of Edom after that were Chief Timna, Chief Alvah, Chief Jetheth, Chief Oholibamah, Chief Elah, Chief Pinon, Chief Kenaz, Chief Teman, Chief Mibzar, Chief Magdiel, and Chief Iram. These were the chieftains of Edom.'
