  - type: text
    content: Shem, Ham, and Japheth.
  - type: heading
    content: The Japheth Branch
  '10':
  - type: text
    content: Cush had Nimrod, the first great hero on earth.
  '11':
  - type: text
    content: Mizraim was ancestor to the Ludim, the Anamim, the Lehabim, the Naphtuhim, the Pathrusim, the Casluhim, and the Caphtorim from whom the Philistines descended.
  '13':
  - type: text
    content: Canaan had Sidon (his firstborn) and Heth, and was ancestor to the Jebusites, the Amorites, the Girgashites, the Hivites, the Arkites, the Sinites, the Arvadites, the Zemarites, and the Hamathites.
  - type: heading
    content: The Shem Branch
  '17':
  - type: text
    content: Shem had Elam, Asshur, Arphaxad, Lud, Aram, Uz, Hul, Gether, and Meshech.
  '18':
  - type: text
    content: 'Arphaxad had Shelah and Shelah had Eber. Eber had two sons: Peleg (Division) because in his time the earth was divided up; his brother was Joktan.'
  '20':
  - type: text
    content: Joktan had Almodad, Sheleph, Hazarmaveth, Jerah, Hadoram, Uzal, Diklah, Ebal, Abimael, Sheba, Ophir, Havilah, and Jobab—all sons of Joktan.
  '24':
  - type: text
    content: 'The three main branches in summary: Shem, Arphaxad, Shelah, Eber, Peleg, Reu, Serug, Nahor, Terah, and Abram (Abraham). And Abraham had Isaac and Ishmael.'
  - type: heading
    content: The Family of Abraham
  '29':
  - type: text
    content: 'Abraham’s family tree developed along these lines: Ishmael had Nebaioth (his firstborn), then Kedar, Adbeel, Mibsam, Mishma, Dumah, Massa, Hadad, Tema, Jetur, Naphish, and Kedemah—the Ishmael branch.'
  '32':
  - type: text
    content: Keturah, Abraham’s concubine, gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. Then Jokshan had Sheba and Dedan. And Midian had Ephah, Epher, Hanoch, Abida, and Eldaah. These made up the Keturah branch.
  '34':
  - type: text
    content: Abraham had Isaac, and Isaac had Esau and Israel (Jacob). Esau had Eliphaz, Reuel, Jeush, Jalam, and Korah. Eliphaz had Teman, Omar, Zepho, Gatam, Kenaz, Timna, and Amalek. And Reuel had Nahath, Zerah, Shammah, and Mizzah.
  '38':
  - type: text
    content: Seir then had Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. Lotan had Hori and Homam. Timna was Lotan’s sister. Shobal had Alian, Manahath, Ebal, Shepho, and Onam. Zibeon had Aiah and Anah. Anah had Dishon. Dishon had Hemdan, Eshban, Ithran, and Keran. Ezer had Bilhan, Zaavan, and Akan. And Dishan had Uz and Aran.
  - type: heading
    content: The Edomite King List
  '43':
  - type: text
    content: ' A list of the kings who ruled in the country of Edom before Israel had a king:'
  - type: text
    content: Bela son of Beor; his city was Dinhabah.
  - type: text
    content: Bela died; Jobab son of Zerah from Bozrah was the next king.
  - type: text
    content: Jobab died; Husham from the country of the Temanites was the next king.
  - type: text
    content: Husham died; Hadad son of Bedad, who defeated Midian in the country of Moab, was the next king; his city was Avith.
  - type: text
    content: Hadad died; Samlah from Masrekah was the next king.
  - type: text
    content: Samlah died; Shaul from Rehoboth-by-the-River was the next king.
  - type: text
    content: Shaul died; Baal-Hanan son of Acbor was the next king.
  - type: text
    content: Baal-Hanan died; Hadad was the next king; his city was Pau and his wife was Mehetabel daughter of Matred, the daughter of Me-Zahab.
  - type: text
    content: Last of all Hadad died.
  '5':
  - type: text
    content: Japheth had Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
  '51':
  - type: text
    content: ' The chieftains of Edom after that were Chief Timna, Chief Alvah, Chief Jetheth, Chief Oholibamah, Chief Elah, Chief Pinon, Chief Kenaz, Chief Teman, Chief Mibzar, Chief Magdiel, and Chief Iram. These were the chieftains of Edom.'
  '6':
  - type: text
    content: Gomer had Ashkenaz, Riphath, and Togarmah.
  '7':
  - type: text
    content: Javan had Elisha, Tarshish, Kittim, and Rodanim.
  - type: heading
    content: The Ham Branch
  '8':
  - type: text
    content: Ham had Cush, Mizraim, Put, and Canaan.
  '9':
  - type: text
    content: Cush had Seba, Havilah, Sabta, Raamah, and Sabteca.
  - type: text
    content: Raamah had Sheba and Dedan.
