document_id: JOB.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Bildad’s Second Attack
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Plunged from Light into Darkness
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Bildad from Shuhah chimed in:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How monotonous these word games are getting!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get serious! We need to get down to business.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you treat your friends like slow-witted animals?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You look down on us as if we don’t know anything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are you working yourself up like this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you want the world redesigned to suit you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should reality be suspended to accommodate you?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Here’s the rule: The light of the wicked is put out.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their flame dies down and is extinguished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their house goes dark—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every lamp in the place goes out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their strong strides weaken, falter;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble into their own traps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They get all tangled up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their own red tape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their feet are grabbed and caught,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their necks in a noose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trip on ropes they’ve hidden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fall into pits they’ve dug themselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrors come at them from all sides.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They run dazed and confused.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hungry grave is ready
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to gobble them up for supper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To lay them out for a gourmet meal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a treat for ravenous Death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are snatched from their home sweet home
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and marched straight to the death house.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lives go up in smoke;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: acid rain soaks their ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their roots rot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their branches wither.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll never again be remembered—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nameless in unmarked graves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are plunged from light into darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: banished from the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they leave empty-handed—not one single child—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing to show for their life on this earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Westerners are aghast at their fate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'easterners are horrified:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Oh no! So this is what happens to perverse people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is how the God-ignorant end up!’”
