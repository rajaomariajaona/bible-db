document_id: JOB.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s Second Attack
  - type: heading
    content: Plunged from Light into Darkness
  - type: text
    content: 'Bildad from Shuhah chimed in:'
  - type: text
    content: “How monotonous these word games are getting!
  - type: text
    content: Get serious! We need to get down to business.
  - type: text
    content: Why do you treat your friends like slow-witted animals?
  - type: text
    content: You look down on us as if we don’t know anything.
  - type: text
    content: Why are you working yourself up like this?
  - type: text
    content: Do you want the world redesigned to suit you?
  - type: text
    content: Should reality be suspended to accommodate you?
  '5':
  - type: text
    content: '“Here’s the rule: The light of the wicked is put out.'
  - type: text
    content: Their flame dies down and is extinguished.
  - type: text
    content: Their house goes dark—
  - type: text
    content: every lamp in the place goes out.
  - type: text
    content: Their strong strides weaken, falter;
  - type: text
    content: they stumble into their own traps.
  - type: text
    content: They get all tangled up
  - type: text
    content: in their own red tape,
  - type: text
    content: Their feet are grabbed and caught,
  - type: text
    content: their necks in a noose.
  - type: text
    content: They trip on ropes they’ve hidden,
  - type: text
    content: and fall into pits they’ve dug themselves.
  - type: text
    content: Terrors come at them from all sides.
  - type: text
    content: They run dazed and confused.
  - type: text
    content: The hungry grave is ready
  - type: text
    content: to gobble them up for supper,
  - type: text
    content: To lay them out for a gourmet meal,
  - type: text
    content: a treat for ravenous Death.
  - type: text
    content: They are snatched from their home sweet home
  - type: text
    content: and marched straight to the death house.
  - type: text
    content: Their lives go up in smoke;
  - type: text
    content: acid rain soaks their ruins.
  - type: text
    content: Their roots rot
  - type: text
    content: and their branches wither.
  - type: text
    content: They’ll never again be remembered—
  - type: text
    content: nameless in unmarked graves.
  - type: text
    content: They are plunged from light into darkness,
  - type: text
    content: banished from the world.
  - type: text
    content: And they leave empty-handed—not one single child—
  - type: text
    content: nothing to show for their life on this earth.
  - type: text
    content: Westerners are aghast at their fate,
  - type: text
    content: 'easterners are horrified:'
  - type: text
    content: ‘Oh no! So this is what happens to perverse people.
  - type: text
    content: This is how the God-ignorant end up!’”
