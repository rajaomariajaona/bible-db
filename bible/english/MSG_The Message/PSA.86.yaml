document_id: PSA.86,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Bend an ear, '
  - type: text
    content: God
  - type: text
    content: ; answer me.
  - type: text
    content: I’m one miserable wretch!
  - type: text
    content: Keep me safe—haven’t I lived a good life?
  - type: text
    content: Help your servant—I’m depending on you!
  - type: text
    content: You’re my God; have mercy on me.
  - type: text
    content: I count on you from morning to night.
  - type: text
    content: Give your servant a happy life;
  - type: text
    content: I put myself in your hands!
  - type: text
    content: You’re well-known as good and forgiving,
  - type: text
    content: bighearted to all who ask for help.
  - type: text
    content: 'Pay attention, '
  - type: text
    content: God
  - type: text
    content: ', to my prayer;'
  - type: text
    content: bend down and listen to my cry for help.
  - type: text
    content: Every time I’m in trouble I call on you,
  - type: text
    content: confident that you’ll answer.
  '11':
  - type: text
    content: 'Train me, '
  - type: text
    content: God
  - type: text
    content: ', to walk straight;'
  - type: text
    content: then I’ll follow your true path.
  - type: text
    content: Put me together, one heart and mind;
  - type: text
    content: then, undivided, I’ll worship in joyful fear.
  - type: text
    content: From the bottom of my heart I thank you, dear Lord;
  - type: text
    content: I’ve never kept secret what you’re up to.
  - type: text
    content: You’ve always been great toward me—what love!
  - type: text
    content: You snatched me from the brink of disaster!
  - type: text
    content: God, these bullies have reared their heads!
  - type: text
    content: A gang of thugs is after me—
  - type: text
    content: and they don’t care a thing about you.
  - type: text
    content: But you, O God, are both tender and kind,
  - type: text
    content: not easily angered, immense in love,
  - type: text
    content: and you never, never quit.
  - type: text
    content: So look me in the eye and show kindness,
  - type: text
    content: give your servant the strength to go on,
  - type: text
    content: save your dear, dear child!
  - type: text
    content: Make a show of how much you love me
  - type: text
    content: so the bullies who hate me will stand there slack-jawed,
  - type: text
    content: 'As you, '
  - type: text
    content: God
  - type: text
    content: ', gently and powerfully'
  - type: text
    content: put me back on my feet.
  '8':
  - type: text
    content: There’s no one quite like you among the gods, O Lord,
  - type: text
    content: and nothing to compare with your works.
  - type: text
    content: All the nations you made are on their way,
  - type: text
    content: ready to give honor to you, O Lord,
  - type: text
    content: Ready to put your beauty on display,
  - type: text
    content: parading your greatness,
  - type: text
    content: And the great things you do—
  - type: text
    content: God, you’re the one, there’s no one but you!
