document_id: PSA.86
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: 'Bend an ear, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; answer me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m one miserable wretch!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep me safe—haven’t I lived a good life?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Help your servant—I’m depending on you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re my God; have mercy on me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I count on you from morning to night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give your servant a happy life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I put myself in your hands!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re well-known as good and forgiving,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bighearted to all who ask for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pay attention, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', to my prayer;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: bend down and listen to my cry for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every time I’m in trouble I call on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: confident that you’ll answer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: There’s no one quite like you among the gods, O Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nothing to compare with your works.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the nations you made are on their way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to give honor to you, O Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ready to put your beauty on display,
- type: usfm
  marker: q2
  children:
  - type: text
    text: parading your greatness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the great things you do—
- type: usfm
  marker: q2
  children:
  - type: text
    text: God, you’re the one, there’s no one but you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-17
  - type: text
    text: 'Train me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', to walk straight;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I’ll follow your true path.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put me together, one heart and mind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then, undivided, I’ll worship in joyful fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the bottom of my heart I thank you, dear Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve never kept secret what you’re up to.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve always been great toward me—what love!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You snatched me from the brink of disaster!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, these bullies have reared their heads!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A gang of thugs is after me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they don’t care a thing about you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you, O God, are both tender and kind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not easily angered, immense in love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you never, never quit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So look me in the eye and show kindness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give your servant the strength to go on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: save your dear, dear child!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make a show of how much you love me
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the bullies who hate me will stand there slack-jawed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', gently and powerfully'
- type: usfm
  marker: q2
  children:
  - type: text
    text: put me back on my feet.
