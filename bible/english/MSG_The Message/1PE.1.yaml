document_id: 1PE.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I, Peter, am an apostle on assignment by Jesus, the Messiah, writing to exiles scattered to the four winds. Not one is missing, not one forgotten. God the Father has his eye on each of you, and has determined by the work of the Spirit to keep you obedient through the sacrifice of Jesus. May everything good from God be yours!
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: What a God we have! And how fortunate we are to have him, this Father of our Master Jesus! Because Jesus was raised from the dead, we’ve been given a brand-new life and have everything to live for, including a future in heaven—and the future starts now! God is keeping careful watch over us and the future. The Day is coming when you’ll have it all—life healed and whole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'I know how great this makes you feel, even though you have to put up with every kind of aggravation in the meantime. Pure gold put in the fire comes out of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proved
  - type: text
    text: ' pure; genuine faith put through this suffering comes out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proved
  - type: text
    text: ' genuine. When Jesus wraps this all up, it’s your faith, not your gold, that God will have on display as evidence of his victory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'You never saw him, yet you love him. You still don’t see him, yet you trust him—with laughter and singing. Because you kept on believing, you’ll get what you’re looking forward to: total salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: The prophets who told us this was coming asked a lot of questions about this gift of life God was preparing. The Messiah’s Spirit let them in on some of it—that the Messiah would experience suffering, followed by glory. They clamored to know who and when. All they were told was that they were serving you, you who by orders from heaven have now heard for yourselves—through the Holy Spirit—the Message of those prophecies fulfilled. Do you realize how fortunate you are? Angels would have given anything to be in on this!
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Future in God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: So roll up your sleeves, get your head in the game, be totally ready to receive the gift that’s coming when Jesus arrives. Don’t lazily slip back into those old grooves of evil, doing just what you feel like doing. You didn’t know any better then; you do now. As obedient children, let yourselves be pulled into a way of life shaped by God’s life, a life energetic and blazing with holiness. God said, “I am holy; you be holy.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You call out to God for help and he helps—he’s a good Father that way. But don’t forget, he’s also a responsible Father, and won’t let you get by with sloppy living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: Your life is a journey you must travel with a deep consciousness of God. It cost God plenty to get you out of that dead-end, empty-headed life you grew up in. He paid with Christ’s sacred blood, you know. He died like an unblemished, sacrificial lamb. And this was no afterthought. Even though it has only lately—at the end of the ages—become public knowledge, God always knew he was going to do this for you. It’s because of this sacrificed Messiah, whom God then raised from the dead and glorified, that you trust God, that you know you have a future in God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25
  - type: text
    text: 'Now that you’ve cleaned up your lives by following the truth, love one another as if your lives depended on it. Your new life is not like your old life. Your old birth came from mortal sperm; your new birth comes from God’s living Word. Just think: a life conceived by God himself! That’s why the prophet said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The old life is a grass life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its beauty as short-lived as wildflowers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grass dries up, flowers wilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s Word goes on and on forever.
- type: usfm
  marker: m
  children:
  - type: text
    text: This is the Word that conceived the new life in you.
