document_id: PSA.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why the big noise, nations?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why the mean plots, peoples?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth-leaders push for position,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demagogues and delegates meet for summit talks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The God-deniers, the Messiah-defiers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let’s get free of God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cast loose from Messiah!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heaven-throned God breaks out laughing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At first he’s amused at their presumption;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he gets good and angry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Furiously, he shuts them up:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t you know there’s a King in Zion? A coronation banquet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is spread for him on the holy summit.”
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So, rebel-kings, use your heads;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Upstart-judges, learn your lesson:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in adoring embrace,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celebrate in trembling awe. Kiss Messiah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your very lives are in danger, you know;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His anger is about to explode,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you make a run for God—you won’t regret it!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let me tell you what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said next.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said, “You’re my son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And today is your birthday.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What do you want? Name it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations as a present? continents as a prize?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can command them all to dance for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or throw them out with tomorrow’s trash.”
