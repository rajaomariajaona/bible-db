document_id: PSA.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: Why the big noise, nations?
  - type: text
    content: Why the mean plots, peoples?
  - type: text
    content: Earth-leaders push for position,
  - type: text
    content: Demagogues and delegates meet for summit talks,
  - type: text
    content: 'The God-deniers, the Messiah-defiers:'
  - type: text
    content: “Let’s get free of God!
  - type: text
    content: Cast loose from Messiah!”
  - type: text
    content: Heaven-throned God breaks out laughing.
  - type: text
    content: At first he’s amused at their presumption;
  - type: text
    content: Then he gets good and angry.
  - type: text
    content: 'Furiously, he shuts them up:'
  - type: text
    content: “Don’t you know there’s a King in Zion? A coronation banquet
  - type: text
    content: Is spread for him on the holy summit.”
  '10':
  - type: text
    content: So, rebel-kings, use your heads;
  - type: text
    content: 'Upstart-judges, learn your lesson:'
  - type: text
    content: 'Worship '
  - type: text
    content: God
  - type: text
    content: ' in adoring embrace,'
  - type: text
    content: Celebrate in trembling awe. Kiss Messiah!
  - type: text
    content: Your very lives are in danger, you know;
  - type: text
    content: His anger is about to explode,
  - type: text
    content: But if you make a run for God—you won’t regret it!
  '7':
  - type: text
    content: 'Let me tell you what '
  - type: text
    content: God
  - type: text
    content: ' said next.'
  - type: text
    content: He said, “You’re my son,
  - type: text
    content: And today is your birthday.
  - type: text
    content: 'What do you want? Name it:'
  - type: text
    content: Nations as a present? continents as a prize?
  - type: text
    content: You can command them all to dance for you,
  - type: text
    content: Or throw them out with tomorrow’s trash.”
