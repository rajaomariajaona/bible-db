document_id: PSA.75
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We thank you, God, we thank you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: your Name is our favorite word;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your mighty works are all we talk about.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: You say, “I’m calling this meeting to order,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m ready to set things right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the earth goes topsy-turvy
- type: usfm
  marker: q2
  children:
  - type: text
    text: And nobody knows which end is up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I nail it all down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I put everything in place again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I say to the smart alecks, ‘That’s enough,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the bullies, ‘Not so fast.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Don’t raise your fist against High God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t raise your voice against Rock of Ages.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s the One from east to west;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from desert to mountains, he’s the One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'God rules: he brings this one down to his knees,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: pulls that one up on her feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has a cup in his hand,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bowl of wine, full to the brim.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He draws from it and pours;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s drained to the dregs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth’s wicked ones drink it all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drink it down to the last bitter drop!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: And I’m telling the story of God Eternal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: singing the praises of Jacob’s God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fists of the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: are bloody stumps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The arms of the righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: are lofty green branches.
