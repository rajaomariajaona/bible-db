document_id: PSA.75,97
type_code: eng
verses:
  '1':
  - type: text
    content: We thank you, God, we thank you—
  - type: text
    content: your Name is our favorite word;
  - type: text
    content: your mighty works are all we talk about.
  '2':
  - type: text
    content: You say, “I’m calling this meeting to order,
  - type: text
    content: I’m ready to set things right.
  - type: text
    content: When the earth goes topsy-turvy
  - type: text
    content: And nobody knows which end is up,
  - type: text
    content: I nail it all down,
  - type: text
    content: I put everything in place again.
  - type: text
    content: I say to the smart alecks, ‘That’s enough,’
  - type: text
    content: to the bullies, ‘Not so fast.’”
  '5':
  - type: text
    content: Don’t raise your fist against High God.
  - type: text
    content: Don’t raise your voice against Rock of Ages.
  - type: text
    content: He’s the One from east to west;
  - type: text
    content: from desert to mountains, he’s the One.
  '7':
  - type: text
    content: 'God rules: he brings this one down to his knees,'
  - type: text
    content: pulls that one up on her feet.
  - type: text
    content: God
  - type: text
    content: ' has a cup in his hand,'
  - type: text
    content: a bowl of wine, full to the brim.
  - type: text
    content: He draws from it and pours;
  - type: text
    content: it’s drained to the dregs.
  - type: text
    content: Earth’s wicked ones drink it all,
  - type: text
    content: drink it down to the last bitter drop!
  '9':
  - type: text
    content: And I’m telling the story of God Eternal,
  - type: text
    content: singing the praises of Jacob’s God.
  - type: text
    content: The fists of the wicked
  - type: text
    content: are bloody stumps,
  - type: text
    content: The arms of the righteous
  - type: text
    content: are lofty green branches.
