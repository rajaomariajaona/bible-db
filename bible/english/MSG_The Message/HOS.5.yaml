document_id: HOS.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: They Wouldn’t Recognize God If They Saw Him
  - type: text
    content: “Listen to this, priests!
  - type: text
    content: Attention, people of Israel!
  - type: text
    content: Royal family—all ears!
  - type: text
    content: You’re in charge of justice around here.
  - type: text
    content: But what have you done? Exploited people at Mizpah,
  - type: text
    content: ripped them off on Tabor,
  - type: text
    content: Victimized them at Shittim.
  - type: text
    content: I’m going to punish the lot of you.
  '10':
  - type: text
    content: “Israel’s rulers are crooks and thieves,
  - type: text
    content: cheating the people of their land,
  - type: text
    content: And I’m angry, good and angry.
  - type: text
    content: Every inch of their bodies is going to feel my anger.
  '11':
  - type: text
    content: “Brutal Ephraim is himself brutalized—
  - type: text
    content: a taste of his own medicine!
  - type: text
    content: He was so determined
  - type: text
    content: to do it his own worthless way.
  - type: text
    content: Therefore I’m pus to Ephraim,
  - type: text
    content: dry rot in the house of Judah.
  '13':
  - type: text
    content: “When Ephraim saw he was sick
  - type: text
    content: and Judah saw his pus-filled sores,
  - type: text
    content: Ephraim went running to Assyria,
  - type: text
    content: went for help to the big king.
  - type: text
    content: But he can’t heal you.
  - type: text
    content: He can’t cure your oozing sores.
  '14':
  - type: text
    content: “I’m a grizzly charging Ephraim,
  - type: text
    content: a grizzly with cubs charging Judah.
  - type: text
    content: I’ll rip them to pieces—yes, I will!
  - type: text
    content: No one can stop me now.
  - type: text
    content: I’ll drag them off.
  - type: text
    content: No one can help them.
  - type: text
    content: Then I’ll go back to where I came from
  - type: text
    content: until they come to their senses.
  - type: text
    content: When they finally hit rock bottom,
  - type: text
    content: maybe they’ll come looking for me.”
  '3':
  - type: text
    content: “I know you, Ephraim, inside and out.
  - type: text
    content: Yes, Israel, I see right through you!
  - type: text
    content: Ephraim, you’ve played your sex-and-religion games long enough.
  - type: text
    content: All Israel is thoroughly polluted.
  - type: text
    content: They couldn’t turn to God if they wanted to.
  - type: text
    content: Their evil life is a bad habit.
  - type: text
    content: Every breath they take is a whore’s breath.
  - type: text
    content: 'They wouldn’t recognize '
  - type: text
    content: God
  - type: text
    content: ' if they saw me.'
  '5':
  - type: text
    content: “Bloated by arrogance, big as a house,
  - type: text
    content: they’re a public disgrace,
  - type: text
    content: The lot of them—Israel, Ephraim, Judah—
  - type: text
    content: lurching and weaving down their guilty streets.
  - type: text
    content: When they decide to get their lives together
  - type: text
    content: 'and go off looking for '
  - type: text
    content: God
  - type: text
    content: ' once again,'
  - type: text
    content: They’ll find it’s too late.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', will be long gone.'
  - type: text
    content: They’ve played fast and loose with me for too long,
  - type: text
    content: filling the country with their bastard offspring.
  - type: text
    content: A plague of locusts will
  - type: text
    content: devastate their violated land.
  '8':
  - type: text
    content: “Blow the ram’s horn shofar in Gibeah,
  - type: text
    content: the bugle in Ramah!
  - type: text
    content: Signal the invasion of Sin City!
  - type: text
    content: Scare the daylights out of Benjamin!
  - type: text
    content: Ephraim will be left wasted,
  - type: text
    content: a lifeless moonscape.
  - type: text
    content: I’m telling it straight, the unvarnished truth,
  - type: text
    content: to the tribes of Israel.
