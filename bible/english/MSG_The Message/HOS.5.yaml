document_id: HOS.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'They Wouldn’t Recognize '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' If They Saw Him'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: “Listen to this, priests!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attention, people of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Royal family—all ears!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re in charge of justice around here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what have you done? Exploited people at Mizpah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ripped them off on Tabor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Victimized them at Shittim.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m going to punish the lot of you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Israel’s rulers are crooks and thieves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cheating the people of their land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’m angry, good and angry.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every inch of their bodies is going to feel my anger.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: “Brutal Ephraim is himself brutalized—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a taste of his own medicine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was so determined
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do it his own worthless way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I’m pus to Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dry rot in the house of Judah.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “When Ephraim saw he was sick
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Judah saw his pus-filled sores,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim went running to Assyria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: went for help to the big king.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he can’t heal you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He can’t cure your oozing sores.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: “I’m a grizzly charging Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a grizzly with cubs charging Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll rip them to pieces—yes, I will!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one can stop me now.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll drag them off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one can help them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll go back to where I came from
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until they come to their senses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they finally hit rock bottom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maybe they’ll come looking for me.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: “I know you, Ephraim, inside and out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, Israel, I see right through you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim, you’ve played your sex-and-religion games long enough.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All Israel is thoroughly polluted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They couldn’t turn to God if they wanted to.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their evil life is a bad habit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every breath they take is a whore’s breath.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They wouldn’t recognize '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' if they saw me.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: “Bloated by arrogance, big as a house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re a public disgrace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lot of them—Israel, Ephraim, Judah—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lurching and weaving down their guilty streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they decide to get their lives together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and go off looking for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' once again,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll find it’s too late.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', will be long gone.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve played fast and loose with me for too long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filling the country with their bastard offspring.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A plague of locusts will
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devastate their violated land.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: “Blow the ram’s horn shofar in Gibeah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bugle in Ramah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Signal the invasion of Sin City!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scare the daylights out of Benjamin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim will be left wasted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a lifeless moonscape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m telling it straight, the unvarnished truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the tribes of Israel.
