document_id: EZK.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Tree Is Made Small and the Small Tree Great
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, make a riddle for the house of Israel. Tell them a story. Say, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘A great eagle
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a huge wingspan and long feathers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In full plumage and bright colors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: came to Lebanon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And took the top off a cedar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: broke off the top branch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Took it to a land of traders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set it down in a city of shopkeepers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he took a cutting from the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted it in good, well-watered soil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a willow on a riverbank.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It sprouted into a flourishing vine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: low to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its branches grew toward the eagle
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the roots became established—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A vine putting out shoots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: developing branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “‘There was another great eagle
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a huge wingspan and thickly feathered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This vine sent out its roots toward him
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the place where it was planted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its branches reached out to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: so he could water it
- type: usfm
  marker: q2
  children:
  - type: text
    text: from a long distance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It had been planted
- type: usfm
  marker: q2
  children:
  - type: text
    text: in good, well-watered soil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it put out branches and bore fruit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and became a noble vine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it thrive?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Won’t he just pull it up by the roots
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave the grapes to rot
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the branches to shrivel up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a withered, dead vine?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It won’t take much strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: or many hands to pull it up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if it’s transplanted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will it thrive?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the hot east wind strikes it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t it shrivel up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Won’t it dry up and blow away
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the place where it was planted?’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12a
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Tell this house of rebels, ‘Do you get it? Do you know what this means?’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12b-14
  - type: text
    text: ' “Tell them, ‘The king of Babylon came to Jerusalem and took its king and its leaders back to Babylon. He took one of the royal family and made a covenant with him, making him swear his loyalty. The king of Babylon took all the top leaders into exile to make sure that this kingdom stayed weak—didn’t get any big ideas of itself—and kept the covenant with him so that it would have a future.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “‘But he rebelled and sent emissaries to Egypt to recruit horses and a big army. Do you think that’s going to work? Are they going to get by with this? Does anyone break a covenant and get off scot-free?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: “‘As sure as I am the living God, this king who broke his pledge of loyalty and his covenant will die in that country, in Babylon. Pharaoh with his big army—all those soldiers!—won’t lift a finger to fight for him when Babylon sets siege to the city and kills everyone inside. Because he broke his word and broke the covenant, even though he gave his solemn promise, because he went ahead and did all these things anyway, he won’t escape.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: '“‘Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, As sure as I am the living God, because the king despised my oath and broke my covenant, I’ll bring the consequences crashing down on his head. I’ll send out a search party and catch him. I’ll take him to Babylon and have him brought to trial because of his total disregard for me. All his elite soldiers, along with the rest of the army, will be killed in battle, and whoever is left will be scattered to the four winds. Then you’ll realize that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, I personally will take a shoot from the top of the towering cedar, a cutting from the crown of the tree, and plant it on a high and towering mountain, on the high mountain of Israel. It will grow, putting out branches and fruit—a majestic cedar. Birds of every sort and kind will live under it. They’ll build nests in the shade of its branches. All the trees of the field will recognize that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', made the great tree small and the small tree great, made the green tree turn dry and the dry tree sprout green branches. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', said it—and I did it.’”'
