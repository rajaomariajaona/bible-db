document_id: EZK.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Tree Is Made Small and the Small Tree Great
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, make a riddle for the house of Israel. Tell them a story. Say, ‘'
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘A great eagle
  - type: text
    content: with a huge wingspan and long feathers,
  - type: text
    content: In full plumage and bright colors,
  - type: text
    content: came to Lebanon
  - type: text
    content: And took the top off a cedar,
  - type: text
    content: broke off the top branch,
  - type: text
    content: Took it to a land of traders,
  - type: text
    content: and set it down in a city of shopkeepers.
  - type: text
    content: Then he took a cutting from the land
  - type: text
    content: and planted it in good, well-watered soil,
  - type: text
    content: like a willow on a riverbank.
  - type: text
    content: It sprouted into a flourishing vine,
  - type: text
    content: low to the ground.
  - type: text
    content: Its branches grew toward the eagle
  - type: text
    content: and the roots became established—
  - type: text
    content: A vine putting out shoots,
  - type: text
    content: developing branches.
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Tell this house of rebels, ‘Do you get it? Do you know what this means?’'
  '12':
  - type: text
    content: ' “Tell them, ‘The king of Babylon came to Jerusalem and took its king and its leaders back to Babylon. He took one of the royal family and made a covenant with him, making him swear his loyalty. The king of Babylon took all the top leaders into exile to make sure that this kingdom stayed weak—didn’t get any big ideas of itself—and kept the covenant with him so that it would have a future.'
  '15':
  - type: text
    content: “‘But he rebelled and sent emissaries to Egypt to recruit horses and a big army. Do you think that’s going to work? Are they going to get by with this? Does anyone break a covenant and get off scot-free?
  '16':
  - type: text
    content: “‘As sure as I am the living God, this king who broke his pledge of loyalty and his covenant will die in that country, in Babylon. Pharaoh with his big army—all those soldiers!—won’t lift a finger to fight for him when Babylon sets siege to the city and kills everyone inside. Because he broke his word and broke the covenant, even though he gave his solemn promise, because he went ahead and did all these things anyway, he won’t escape.
  '19':
  - type: text
    content: '“‘Therefore, '
  - type: text
    content: God
  - type: text
    content: ', the Master, says, As sure as I am the living God, because the king despised my oath and broke my covenant, I’ll bring the consequences crashing down on his head. I’ll send out a search party and catch him. I’ll take him to Babylon and have him brought to trial because of his total disregard for me. All his elite soldiers, along with the rest of the army, will be killed in battle, and whoever is left will be scattered to the four winds. Then you’ll realize that I, '
  - type: text
    content: God
  - type: text
    content: ', have spoken.'
  '22':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says, I personally will take a shoot from the top of the towering cedar, a cutting from the crown of the tree, and plant it on a high and towering mountain, on the high mountain of Israel. It will grow, putting out branches and fruit—a majestic cedar. Birds of every sort and kind will live under it. They’ll build nests in the shade of its branches. All the trees of the field will recognize that I, '
  - type: text
    content: God
  - type: text
    content: ', made the great tree small and the small tree great, made the green tree turn dry and the dry tree sprout green branches. I, '
  - type: text
    content: God
  - type: text
    content: ', said it—and I did it.’”'
  '7':
  - type: text
    content: “‘There was another great eagle
  - type: text
    content: with a huge wingspan and thickly feathered.
  - type: text
    content: This vine sent out its roots toward him
  - type: text
    content: from the place where it was planted.
  - type: text
    content: Its branches reached out to him
  - type: text
    content: so he could water it
  - type: text
    content: from a long distance.
  - type: text
    content: It had been planted
  - type: text
    content: in good, well-watered soil,
  - type: text
    content: And it put out branches and bore fruit,
  - type: text
    content: and became a noble vine.
  '9':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says,'
  - type: text
    content: Will it thrive?
  - type: text
    content: Won’t he just pull it up by the roots
  - type: text
    content: and leave the grapes to rot
  - type: text
    content: And the branches to shrivel up,
  - type: text
    content: a withered, dead vine?
  - type: text
    content: It won’t take much strength
  - type: text
    content: or many hands to pull it up.
  - type: text
    content: Even if it’s transplanted,
  - type: text
    content: will it thrive?
  - type: text
    content: When the hot east wind strikes it,
  - type: text
    content: won’t it shrivel up?
  - type: text
    content: Won’t it dry up and blow away
  - type: text
    content: from the place where it was planted?’”
  - type: text
    content: '* * *'
