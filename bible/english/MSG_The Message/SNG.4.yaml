document_id: SNG.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Man
  - type: text
    content: You’re so beautiful, my darling,
  - type: text
    content: so beautiful, and your dove eyes are veiled
  - type: text
    content: By your hair as it flows and shimmers,
  - type: text
    content: like a flock of goats in the distance
  - type: text
    content: streaming down a hillside in the sunshine.
  - type: text
    content: Your smile is generous and full—
  - type: text
    content: expressive and strong and clean.
  - type: text
    content: Your lips are jewel red,
  - type: text
    content: your mouth elegant and inviting,
  - type: text
    content: your veiled cheeks soft and radiant.
  - type: text
    content: The smooth, lithe lines of your neck
  - type: text
    content: command notice—all heads turn in awe and admiration!
  - type: text
    content: Your breasts are like fawns,
  - type: text
    content: twins of a gazelle, grazing among the first spring flowers.
  '16':
  - type: text
    content: Wake up, North Wind,
  - type: text
    content: get moving, South Wind!
  - type: text
    content: Breathe on my garden,
  - type: text
    content: fill the air with spice fragrance.
  - type: text
    content: Oh, let my lover enter his garden!
  - type: text
    content: Yes, let him eat the fine, ripe fruits.
  '6':
  - type: text
    content: The sweet, fragrant curves of your body,
  - type: text
    content: the soft, spiced contours of your flesh
  - type: text
    content: Invite me, and I come. I stay
  - type: text
    content: until dawn breathes its light and night slips away.
  - type: text
    content: You’re beautiful from head to toe, my dear love,
  - type: text
    content: beautiful beyond compare, absolutely flawless.
  '8':
  - type: text
    content: Come with me from Lebanon, my bride.
  - type: text
    content: Leave Lebanon behind, and come.
  - type: text
    content: Leave your high mountain hideaway.
  - type: text
    content: Abandon your wilderness seclusion,
  - type: text
    content: Where you keep company with lions
  - type: text
    content: and panthers guard your safety.
  - type: text
    content: You’ve captured my heart, dear friend.
  - type: text
    content: You looked at me, and I fell in love.
  - type: text
    content: One look my way and I was hopelessly in love!
  - type: text
    content: How beautiful your love, dear, dear friend—
  - type: text
    content: far more pleasing than a fine, rare wine,
  - type: text
    content: your fragrance more exotic than select spices.
  - type: text
    content: The kisses of your lips are honey, my love,
  - type: text
    content: every syllable you speak a delicacy to savor.
  - type: text
    content: Your clothes smell like the wild outdoors,
  - type: text
    content: the fresh scent of high mountains.
  - type: text
    content: Dear lover and friend, you’re a secret garden,
  - type: text
    content: a private and pure fountain.
  - type: text
    content: Body and soul, you are paradise,
  - type: text
    content: a whole orchard of succulent fruits—
  - type: text
    content: Ripe apricots and peaches,
  - type: text
    content: oranges and pears;
  - type: text
    content: Nut trees and cinnamon,
  - type: text
    content: and all scented woods;
  - type: text
    content: Mint and lavender,
  - type: text
    content: and all herbs aromatic;
  - type: text
    content: A garden fountain, sparkling and splashing,
  - type: text
    content: fed by spring waters from the Lebanon mountains.
  - type: heading
    content: The Woman
