document_id: SNG.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: You’re so beautiful, my darling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so beautiful, and your dove eyes are veiled
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By your hair as it flows and shimmers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a flock of goats in the distance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: streaming down a hillside in the sunshine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your smile is generous and full—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: expressive and strong and clean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lips are jewel red,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your mouth elegant and inviting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your veiled cheeks soft and radiant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The smooth, lithe lines of your neck
  - type: usfm
    marker: q2
    children:
    - type: text
      text: command notice—all heads turn in awe and admiration!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your breasts are like fawns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twins of a gazelle, grazing among the first spring flowers.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Wake up, North Wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get moving, South Wind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Breathe on my garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fill the air with spice fragrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, let my lover enter his garden!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, let him eat the fine, ripe fruits.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: The sweet, fragrant curves of your body,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the soft, spiced contours of your flesh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invite me, and I come. I stay
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until dawn breathes its light and night slips away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re beautiful from head to toe, my dear love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beautiful beyond compare, absolutely flawless.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-15
    - type: text
      text: Come with me from Lebanon, my bride.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave Lebanon behind, and come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave your high mountain hideaway.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Abandon your wilderness seclusion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where you keep company with lions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and panthers guard your safety.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve captured my heart, dear friend.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You looked at me, and I fell in love.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: One look my way and I was hopelessly in love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How beautiful your love, dear, dear friend—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far more pleasing than a fine, rare wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your fragrance more exotic than select spices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kisses of your lips are honey, my love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every syllable you speak a delicacy to savor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your clothes smell like the wild outdoors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fresh scent of high mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dear lover and friend, you’re a secret garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a private and pure fountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Body and soul, you are paradise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a whole orchard of succulent fruits—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ripe apricots and peaches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oranges and pears;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nut trees and cinnamon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all scented woods;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mint and lavender,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all herbs aromatic;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A garden fountain, sparkling and splashing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fed by spring waters from the Lebanon mountains.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
