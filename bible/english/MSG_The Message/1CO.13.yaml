document_id: 1CO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Way of Love
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: If I speak with human eloquence and angelic ecstasy but don’t love, I’m nothing but the creaking of a rusty gate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If I speak God’s Word with power, revealing all his mysteries and making everything plain as day, and if I have faith that says to a mountain, “Jump,” and it jumps, but I don’t love, I’m nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: If I give everything I own to the poor and even go to the stake to be burned as a martyr, but I don’t love, I’ve gotten nowhere. So, no matter what I say, what I believe, and what I do, I’m bankrupt without love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Love never gives up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Love cares more for others than for self.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Love doesn’t want what it doesn’t have.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Love doesn’t strut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t have a swelled head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t force itself on others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t always “me first,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t fly off the handle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t keep score of the sins of others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t revel when others grovel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Takes pleasure in the flowering of truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puts up with anything,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trusts God always,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Always looks for the best,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never looks back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But keeps going to the end.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: Love never dies. Inspired speech will be over some day; praying in tongues will end; understanding will reach its limit. We know only a portion of the truth, and what we say about God is always incomplete. But when the Complete arrives, our incompletes will be canceled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When I was an infant at my mother’s breast, I gurgled and cooed like any infant. When I grew up, I left those infant ways for good.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: We don’t yet see things clearly. We’re squinting in a fog, peering through a mist. But it won’t be long before the weather clears and the sun shines bright! We’ll see it all then, see it all as clearly as God sees us, knowing him directly just as he knows us!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But for right now, until that completeness, we have three things to do to lead us toward that consummation: Trust steadily in God, hope unswervingly, love extravagantly. And the best of the three is love.'
