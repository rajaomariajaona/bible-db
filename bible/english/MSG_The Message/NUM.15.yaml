document_id: NUM.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Matters of Worship
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Speak to the People of Israel. Tell them, When you enter your homeland that I am giving to you and sacrifice a Fire-Gift to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a Whole-Burnt-Offering or any sacrifice from the herd or flock for a Vow-Offering or Freewill-Offering at one of the appointed feasts, as a pleasing fragrance for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the one bringing the offering shall present to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' a Grain-Offering of two quarts of fine flour mixed with a quart of oil. With each lamb for the Whole-Burnt-Offering or other sacrifice, prepare a quart of oil and a quart of wine as a Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: '“For a ram prepare a Grain-Offering of four quarts of fine flour mixed with one and a quarter quarts of oil and one and a quarter quarts of wine as a Drink-Offering. Present it as a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: '“When you prepare a young bull as a Whole-Burnt-Offering or sacrifice for a special vow or a Peace-Offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', bring with the bull a Grain-Offering of six quarts of fine flour and two quarts of oil. Also bring two quarts of wine as a Drink-Offering. It will be a Fire-Gift, a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: “Each bull or ram, each lamb or young goat, is to be prepared in this same way. Carry out this procedure for each one, no matter how many you have to prepare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: '“Every native-born Israelite is to follow this procedure when he brings a Fire-Gift as a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. In future generations, when a foreigner or visitor living at length among you presents a Fire-Gift as a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the same procedures must be followed. The community has the same rules for you and the foreigner living among you. This is the regular rule for future generations. You and the foreigner are the same before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . The same laws and regulations apply to both you and the foreigner who lives with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Speak to the People of Israel. Tell them, When you enter the land into which I’m bringing you, and you eat the food of that country, set some aside as an offering for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. From the first batch of bread dough make a round loaf for an offering—an offering from the threshing floor. Down through the future generations make this offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from each first batch of dough.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-26
  - type: text
    text: '“But if you should get off the beaten track and not keep the commands which '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses, any of the things that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded you under the authority of Moses from the time that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' first commanded you right up to this present time, and if it happened more or less by mistake, with the congregation unaware of it, then the whole congregation is to sacrifice one young bull as a Whole-Burnt-Offering, a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', accompanied by its Grain-Offering and Drink-Offering as stipulated in the rules, and a he-goat as an Absolution-Offering. The priest is to atone for the entire community of the People of Israel and they will stand forgiven. The sin was not deliberate, and they offered to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the Fire-Gift and Absolution-Offering for their inadvertence. The whole community of Israel including the foreigners living there will be absolved, because everyone was involved in the error.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: '“But if it’s just one person who sins by mistake, not realizing what he’s doing, he is to bring a yearling she-goat as an Absolution-Offering. The priest then is to atone for the person who accidentally sinned, to make atonement before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' so that it won’t be held against him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “The same standard holds for everyone who sins by mistake; the native-born Israelites and the foreigners go by the same rules.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '“But the person, native or foreigner, who sins defiantly, deliberately blaspheming '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', must be cut off from his people: He has despised '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word, he has violated '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s command; that person must be kicked out of the community, ostracized, left alone in his wrongdoing.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-35
  - type: text
    text: 'Once, during those wilderness years of the People of Israel, a man was caught gathering wood on the Sabbath. The ones who caught him hauled him before Moses and Aaron and the entire congregation. They put him in custody until it became clear what to do with him. Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Give the man the death penalty. Yes, kill him, the whole community hurling stones at him outside the camp.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So the whole community took him outside the camp and threw stones at him, an execution commanded by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and given through Moses.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-41
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Speak to the People of Israel. Tell them that from now on they are to make tassels on the corners of their garments and to mark each corner tassel with a blue thread. When you look at these tassels you’ll remember and keep all the commandments of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and not get distracted by everything you feel or see that seduces you into infidelities. The tassels will signal remembrance and observance of all my commandments, to live a holy life to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. I am your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who rescued you from the land of Egypt to be your personal God. Yes, I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' God.”'
