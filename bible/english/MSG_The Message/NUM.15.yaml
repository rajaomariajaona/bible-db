document_id: NUM.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Matters of Worship
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Speak to the People of Israel. Tell them, When you enter your homeland that I am giving to you and sacrifice a Fire-Gift to '
  - type: text
    content: God
  - type: text
    content: ', a Whole-Burnt-Offering or any sacrifice from the herd or flock for a Vow-Offering or Freewill-Offering at one of the appointed feasts, as a pleasing fragrance for '
  - type: text
    content: God
  - type: text
    content: ', the one bringing the offering shall present to '
  - type: text
    content: God
  - type: text
    content: ' a Grain-Offering of two quarts of fine flour mixed with a quart of oil. With each lamb for the Whole-Burnt-Offering or other sacrifice, prepare a quart of oil and a quart of wine as a Drink-Offering.'
  '11':
  - type: text
    content: “Each bull or ram, each lamb or young goat, is to be prepared in this same way. Carry out this procedure for each one, no matter how many you have to prepare.
  '13':
  - type: text
    content: '“Every native-born Israelite is to follow this procedure when he brings a Fire-Gift as a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: '. In future generations, when a foreigner or visitor living at length among you presents a Fire-Gift as a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: ', the same procedures must be followed. The community has the same rules for you and the foreigner living among you. This is the regular rule for future generations. You and the foreigner are the same before '
  - type: text
    content: God
  - type: text
    content: . The same laws and regulations apply to both you and the foreigner who lives with you.”
  '17':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Speak to the People of Israel. Tell them, When you enter the land into which I’m bringing you, and you eat the food of that country, set some aside as an offering for '
  - type: text
    content: God
  - type: text
    content: '. From the first batch of bread dough make a round loaf for an offering—an offering from the threshing floor. Down through the future generations make this offering to '
  - type: text
    content: God
  - type: text
    content: ' from each first batch of dough.'
  - type: text
    content: '* * *'
  '22':
  - type: text
    content: '“But if you should get off the beaten track and not keep the commands which '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses, any of the things that '
  - type: text
    content: God
  - type: text
    content: ' commanded you under the authority of Moses from the time that '
  - type: text
    content: God
  - type: text
    content: ' first commanded you right up to this present time, and if it happened more or less by mistake, with the congregation unaware of it, then the whole congregation is to sacrifice one young bull as a Whole-Burnt-Offering, a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: ', accompanied by its Grain-Offering and Drink-Offering as stipulated in the rules, and a he-goat as an Absolution-Offering. The priest is to atone for the entire community of the People of Israel and they will stand forgiven. The sin was not deliberate, and they offered to '
  - type: text
    content: God
  - type: text
    content: ' the Fire-Gift and Absolution-Offering for their inadvertence. The whole community of Israel including the foreigners living there will be absolved, because everyone was involved in the error.'
  '27':
  - type: text
    content: '“But if it’s just one person who sins by mistake, not realizing what he’s doing, he is to bring a yearling she-goat as an Absolution-Offering. The priest then is to atone for the person who accidentally sinned, to make atonement before '
  - type: text
    content: God
  - type: text
    content: ' so that it won’t be held against him.'
  '29':
  - type: text
    content: “The same standard holds for everyone who sins by mistake; the native-born Israelites and the foreigners go by the same rules.
  '30':
  - type: text
    content: '“But the person, native or foreigner, who sins defiantly, deliberately blaspheming '
  - type: text
    content: God
  - type: text
    content: ', must be cut off from his people: He has despised '
  - type: text
    content: God
  - type: text
    content: '’s word, he has violated '
  - type: text
    content: God
  - type: text
    content: ’s command; that person must be kicked out of the community, ostracized, left alone in his wrongdoing.”
  - type: text
    content: '* * *'
  '32':
  - type: text
    content: 'Once, during those wilderness years of the People of Israel, a man was caught gathering wood on the Sabbath. The ones who caught him hauled him before Moses and Aaron and the entire congregation. They put him in custody until it became clear what to do with him. Then '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Give the man the death penalty. Yes, kill him, the whole community hurling stones at him outside the camp.”'
  '36':
  - type: text
    content: 'So the whole community took him outside the camp and threw stones at him, an execution commanded by '
  - type: text
    content: God
  - type: text
    content: ' and given through Moses.'
  - type: text
    content: '* * *'
  '37':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Speak to the People of Israel. Tell them that from now on they are to make tassels on the corners of their garments and to mark each corner tassel with a blue thread. When you look at these tassels you’ll remember and keep all the commandments of '
  - type: text
    content: God
  - type: text
    content: ', and not get distracted by everything you feel or see that seduces you into infidelities. The tassels will signal remembrance and observance of all my commandments, to live a holy life to '
  - type: text
    content: God
  - type: text
    content: '. I am your '
  - type: text
    content: God
  - type: text
    content: ' who rescued you from the land of Egypt to be your personal God. Yes, I am '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: text
    content: your
  - type: text
    content: ' God.”'
  '6':
  - type: text
    content: '“For a ram prepare a Grain-Offering of four quarts of fine flour mixed with one and a quarter quarts of oil and one and a quarter quarts of wine as a Drink-Offering. Present it as a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: .
  '8':
  - type: text
    content: '“When you prepare a young bull as a Whole-Burnt-Offering or sacrifice for a special vow or a Peace-Offering to '
  - type: text
    content: God
  - type: text
    content: ', bring with the bull a Grain-Offering of six quarts of fine flour and two quarts of oil. Also bring two quarts of wine as a Drink-Offering. It will be a Fire-Gift, a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: .
