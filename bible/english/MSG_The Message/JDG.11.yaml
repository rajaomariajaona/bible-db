document_id: JDG.11,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Jephthah the Gileadite was one tough warrior. He was the son of a prostitute, but Gilead was his father. Meanwhile Gilead’s legal wife had given him other sons, and when they grew up, his wife’s sons threw Jephthah out. They told him: “You’re not getting any of our family inheritance—you’re the son of another woman.” So Jephthah fled from his brothers and went to live in the land of Tob. Some riffraff joined him and went around with him.'
  '10':
  - type: text
    content: They said, “
  - type: text
    content: God
  - type: text
    content: ' is witness between us; whatever you say, we’ll do.” Jephthah went along with the elders of Gilead. The people made him their top man and general. And Jephthah repeated what he had said before '
  - type: text
    content: God
  - type: text
    content: ' at Mizpah.'
  '12':
  - type: text
    content: 'Then Jephthah sent messengers to the king of the Ammonites with a message: “What’s going on here that you have come into my country picking a fight?”'
  '13':
  - type: text
    content: 'The king of the Ammonites told Jephthah’s messengers: “Because Israel took my land when they came up out of Egypt—from the Arnon all the way to the Jabbok and to the Jordan. Give it back peaceably and I’ll go.”'
  '14':
  - type: text
    content: 'Jephthah again sent messengers to the king of the Ammonites with the message: “Jephthah’s word: Israel took no Moabite land and no Ammonite land. When they came up from Egypt, Israel went through the desert as far as the Red Sea, arriving at Kadesh. There Israel sent messengers to the king of Edom saying, ‘Let us pass through your land, please.’ But the king of Edom wouldn’t let them. Israel also requested permission from the king of Moab, but he wouldn’t let them cross either. They were stopped in their tracks at Kadesh. So they traveled across the desert and circled around the lands of Edom and Moab. They came out east of the land of Moab and set camp on the other side of the Arnon—they didn’t set foot in Moabite territory, for Arnon was the Moabite border. Israel then sent messengers to Sihon king of the Amorites at Heshbon the capital. Israel asked, ‘Let us pass, please, through your land on the way to our country.’ But Sihon didn’t trust Israel to cut across his land; he got his entire army together, set up camp at Jahaz, and fought Israel. But '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, gave Sihon and all his troops to Israel. Israel defeated them. Israel took all the Amorite land, all Amorite land from Arnon to the Jabbok and from the desert to the Jordan. It was '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, who pushed out the Amorites in favor of Israel; so who do you think you are to try to take it over? Why don’t you just be satisfied with what your god Chemosh gives you and we’ll settle for what '
  - type: text
    content: God
  - type: text
    content: ', our God, gives us? Do you think you’re going to come off better than Balak son of Zippor, the king of Moab? Did he get anywhere in opposing Israel? Did he risk war? All this time—it’s been three hundred years now!—that Israel has lived in Heshbon and its villages, in Aroer and its villages, and in all the towns along the Arnon, why didn’t you try to snatch them away then? No, I haven’t wronged you. But this is an evil thing that you are doing to me by starting a fight. Today '
  - type: text
    content: God
  - type: text
    content: ' the Judge will decide between the People of Israel and the people of Ammon.”'
  '28':
  - type: text
    content: But the king of the Ammonites refused to listen to a word that Jephthah had sent him.
  '29':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Spirit came upon Jephthah. He went across Gilead and Manasseh, went through Mizpah of Gilead, and from there approached the Ammonites. Jephthah made a vow before '
  - type: text
    content: God
  - type: text
    content: ': “If you give me a clear victory over the Ammonites, then I’ll give to '
  - type: text
    content: God
  - type: text
    content: ' whatever comes out of the door of my house to meet me when I return in one piece from among the Ammonites—I’ll offer it up in a sacrificial burnt offering.”'
  '32':
  - type: text
    content: 'Then Jephthah was off to fight the Ammonites. And '
  - type: text
    content: God
  - type: text
    content: ' gave them to him. He beat them soundly, all the way from Aroer to the area around Minnith as far as Abel Keramim—twenty cities! A massacre! Ammonites brought to their knees by the People of Israel.'
  '34':
  - type: text
    content: 'Jephthah came home to Mizpah. His daughter ran from the house to welcome him home—dancing to tambourines! She was his only child. He had no son or daughter except her. When he realized who it was, he ripped his clothes, saying, “Ah, dearest daughter—I’m dirt. I’m despicable. My heart is torn to shreds. I made a vow to '
  - type: text
    content: God
  - type: text
    content: ' and I can’t take it back!”'
  '36':
  - type: text
    content: 'She said, “Dear father, if you made a vow to '
  - type: text
    content: God
  - type: text
    content: ', do to me what you vowed; '
  - type: text
    content: God
  - type: text
    content: ' did his part and saved you from your Ammonite enemies.”'
  '37':
  - type: text
    content: And then she said to her father, “But let this one thing be done for me. Give me two months to wander through the hills and lament my virginity since I will never marry, I and my dear friends.”
  '38':
  - type: text
    content: ' “Oh yes, go,” he said. He sent her off for two months. She and her dear girlfriends went among the hills, lamenting that she would never marry. At the end of the two months, she came back to her father. He fulfilled the vow with her that he had made. She had never slept with a man.'
  '39':
  - type: text
    content: ' It became a custom in Israel that for four days every year the young women of Israel went out to mourn for the daughter of Jephthah the Gileadite.'
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: 'Some time passed. And then the Ammonites started fighting Israel. With the Ammonites at war with them, the elders of Gilead went to get Jephthah from the land of Tob. They said to Jephthah: “Come. Be our general and we’ll fight the Ammonites.”'
  '7':
  - type: text
    content: 'But Jephthah said to the elders of Gilead: “But you hate me. You kicked me out of my family home. So why are you coming to me now? Because you are in trouble. Right?”'
  '8':
  - type: text
    content: The elders of Gilead replied, “That’s it exactly. We’ve come to you to get you to go with us and fight the Ammonites. You’ll be the head of all of us, all the Gileadites.”
  '9':
  - type: text
    content: 'Jephthah addressed the elders of Gilead, “So if you bring me back home to fight the Ammonites and '
  - type: text
    content: God
  - type: text
    content: ' gives them to me, I’ll be your head—is that right?”'
