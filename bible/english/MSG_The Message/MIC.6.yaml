document_id: MIC.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: What God Is Looking For
  - type: text
    content: 'Listen now, listen to '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “Take your stand in court.
  - type: text
    content: If you have a complaint, tell the mountains;
  - type: text
    content: make your case to the hills.
  - type: text
    content: 'And now, Mountains, hear '
  - type: text
    content: God
  - type: text
    content: ’s case;
  - type: text
    content: listen, Jury Earth—
  - type: text
    content: For I am bringing charges against my people.
  - type: text
    content: I am building a case against Israel.
  '10':
  - type: text
    content: “Do you expect me to overlook obscene wealth
  - type: text
    content: you’ve piled up by cheating and fraud?
  - type: text
    content: Do you think I’ll tolerate shady deals
  - type: text
    content: and shifty scheming?
  - type: text
    content: I’m tired of the violent rich
  - type: text
    content: bullying their way with bluffs and lies.
  - type: text
    content: I’m fed up. Beginning now, you’re finished.
  - type: text
    content: You’ll pay for your sins down to your last cent.
  - type: text
    content: No matter how much you get, it will never be enough—
  - type: text
    content: hollow stomachs, empty hearts.
  - type: text
    content: No matter how hard you work, you’ll have nothing to show for it—
  - type: text
    content: bankrupt lives, wasted souls.
  - type: text
    content: You’ll plant grass
  - type: text
    content: but never get a lawn.
  - type: text
    content: You’ll make jelly
  - type: text
    content: but never spread it on your bread.
  - type: text
    content: You’ll press apples
  - type: text
    content: but never drink the cider.
  - type: text
    content: You have lived by the standards of your king, Omri,
  - type: text
    content: the decadent lifestyle of the family of Ahab.
  - type: text
    content: Because you’ve slavishly followed their fashions,
  - type: text
    content: I’m forcing you into bankruptcy.
  - type: text
    content: Your way of life will be laughed at, a tasteless joke.
  - type: text
    content: Your lives will be derided as futile and fake.”
  '3':
  - type: text
    content: “Dear people, how have I done you wrong?
  - type: text
    content: Have I burdened you, worn you out? Answer!
  - type: text
    content: I delivered you from a bad life in Egypt;
  - type: text
    content: I paid a good price to get you out of slavery.
  - type: text
    content: I sent Moses to lead you—
  - type: text
    content: and Aaron and Miriam to boot!
  - type: text
    content: Remember what Balak king of Moab tried to pull,
  - type: text
    content: and how Balaam son of Beor turned the tables on him.
  - type: text
    content: Remember all those stories about Shittim and Gilgal.
  - type: text
    content: 'Keep all '
  - type: text
    content: God
  - type: text
    content: ’s salvation stories fresh and present.”
  '6':
  - type: text
    content: 'How can I stand up before '
  - type: text
    content: God
  - type: text
    content: and show proper respect to the high God?
  - type: text
    content: Should I bring an armload of offerings
  - type: text
    content: topped off with yearling calves?
  - type: text
    content: 'Would '
  - type: text
    content: God
  - type: text
    content: ' be impressed with thousands of rams,'
  - type: text
    content: with buckets and barrels of olive oil?
  - type: text
    content: Would he be moved if I sacrificed my firstborn child,
  - type: text
    content: my precious baby, to cancel my sin?
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: But he’s already made it plain how to live, what to do,
  - type: text
    content: 'what '
  - type: text
    content: God
  - type: text
    content: ' is looking for in men and women.'
  - type: text
    content: 'It’s quite simple: Do what is fair and just to your neighbor,'
  - type: text
    content: be compassionate and loyal in your love,
  - type: text
    content: And don’t take yourself too seriously—
  - type: text
    content: take God seriously.
  '9':
  - type: text
    content: 'Attention! '
  - type: text
    content: God
  - type: text
    content: ' calls out to the city!'
  - type: text
    content: If you know what’s good for you, you’ll listen.
  - type: text
    content: So listen, all of you!
  - type: text
    content: This is serious business.
  - type: text
    content: '* * *'
