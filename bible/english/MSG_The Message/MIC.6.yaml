document_id: MIC.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'What '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Is Looking For'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Listen now, listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Take your stand in court.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you have a complaint, tell the mountains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make your case to the hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And now, Mountains, hear '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s case;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen, Jury Earth—
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am bringing charges against my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am building a case against Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: “Dear people, how have I done you wrong?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have I burdened you, worn you out? Answer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I delivered you from a bad life in Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I paid a good price to get you out of slavery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sent Moses to lead you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Aaron and Miriam to boot!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember what Balak king of Moab tried to pull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how Balaam son of Beor turned the tables on him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember all those stories about Shittim and Gilgal.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Keep all '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s salvation stories fresh and present.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'How can I stand up before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and show proper respect to the high God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Should I bring an armload of offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: topped off with yearling calves?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Would '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' be impressed with thousands of rams,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with buckets and barrels of olive oil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would he be moved if I sacrificed my firstborn child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my precious baby, to cancel my sin?
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But he’s already made it plain how to live, what to do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is looking for in men and women.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It’s quite simple: Do what is fair and just to your neighbor,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: be compassionate and loyal in your love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And don’t take yourself too seriously—
- type: usfm
  marker: q2
  children:
  - type: text
    text: take God seriously.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Attention! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' calls out to the city!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you know what’s good for you, you’ll listen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So listen, all of you!
- type: usfm
  marker: q2
  children:
  - type: text
    text: This is serious business.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-16
  - type: text
    text: “Do you expect me to overlook obscene wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve piled up by cheating and fraud?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I’ll tolerate shady deals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shifty scheming?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m tired of the violent rich
- type: usfm
  marker: q2
  children:
  - type: text
    text: bullying their way with bluffs and lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m fed up. Beginning now, you’re finished.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll pay for your sins down to your last cent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No matter how much you get, it will never be enough—
- type: usfm
  marker: q2
  children:
  - type: text
    text: hollow stomachs, empty hearts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No matter how hard you work, you’ll have nothing to show for it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: bankrupt lives, wasted souls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll plant grass
- type: usfm
  marker: q2
  children:
  - type: text
    text: but never get a lawn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll make jelly
- type: usfm
  marker: q2
  children:
  - type: text
    text: but never spread it on your bread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll press apples
- type: usfm
  marker: q2
  children:
  - type: text
    text: but never drink the cider.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have lived by the standards of your king, Omri,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the decadent lifestyle of the family of Ahab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you’ve slavishly followed their fashions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m forcing you into bankruptcy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your way of life will be laughed at, a tasteless joke.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your lives will be derided as futile and fake.”
