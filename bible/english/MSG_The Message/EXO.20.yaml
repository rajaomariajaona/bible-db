document_id: EXO.20,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke all these words:'
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', your God,'
  - type: text
    content: who brought you out of the land of Egypt,
  - type: text
    content: out of a life of slavery.
  '12':
  - type: text
    content: 'Honor your father and mother so that you’ll live a long time in the land that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you.'
  '13':
  - type: text
    content: No murder.
  '14':
  - type: text
    content: No adultery.
  '15':
  - type: text
    content: No stealing.
  '16':
  - type: text
    content: No lies about your neighbor.
  '17':
  - type: text
    content: No lusting after your neighbor’s house—or wife or servant or maid or ox or donkey. Don’t set your heart on anything that is your neighbor’s.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: All the people, experiencing the thunder and lightning, the trumpet blast and the smoking mountain, were afraid—they pulled back and stood at a distance. They said to Moses, “You speak to us and we’ll listen, but don’t have God speak to us or we’ll die.”
  '20':
  - type: text
    content: 'Moses spoke to the people: “Don’t be afraid. God has come to test you and instill a deep and reverent awe within you so that you won’t sin.”'
  '21':
  - type: text
    content: The people kept their distance while Moses approached the thick cloud where God was.
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Give this Message to the People of Israel: ‘You’ve experienced firsthand how I spoke with you from Heaven. Don’t make gods of silver and gods of gold and then set them alongside me. Make me an earthen Altar. Sacrifice your Whole-Burnt-Offerings, your Peace-Offerings, your sheep, and your cattle on it. Every place where I cause my name to be honored in your worship, I’ll be there myself and bless you. If you use stones to make my Altar, don’t use dressed stones. If you use a chisel on the stones you’ll profane the Altar. Don’t use steps to climb to my Altar because that will expose your nakedness.’”'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: No other gods, only me.
  '4':
  - type: text
    content: 'No carved gods of any size, shape, or form of anything whatever, whether of things that fly or walk or swim. Don’t bow down to them and don’t serve them because '
  - type: text
    content: I
  - type: text
    content: ' am '
  - type: text
    content: God
  - type: text
    content: ', your God, and I’m a most jealous God, punishing the children for any sins their parents pass on to them to the third, and yes, even to the fourth generation of those who hate me. But I’m unswervingly loyal to the thousands who love me and keep my commandments.'
  '7':
  - type: text
    content: 'No using the name of '
  - type: text
    content: God
  - type: text
    content: ', your God, in curses or silly banter; '
  - type: text
    content: God
  - type: text
    content: ' won’t put up with the irreverent use of his name.'
  '8':
  - type: text
    content: 'Observe the Sabbath day, to keep it holy. Work six days and do everything you need to do. But the seventh day is a Sabbath to '
  - type: text
    content: God
  - type: text
    content: ', your God. Don’t do any work—not you, nor your son, nor your daughter, nor your servant, nor your maid, nor your animals, not even the foreign guest visiting in your town. For in six days '
  - type: text
    content: God
  - type: text
    content: ' made Heaven, Earth, and sea, and everything in them; he rested on the seventh day. Therefore '
  - type: text
    content: God
  - type: text
    content: ' blessed the Sabbath day; he set it apart as a holy day.'
