document_id: 1KI.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Revenge from Jezebel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Ahab reported to Jezebel everything that Elijah had done, including the massacre of the prophets. Jezebel immediately sent a messenger to Elijah with her threat: “The gods will get you for this and I’ll get even with you! By this time tomorrow you’ll be as dead as any one of those prophets.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'When Elijah saw how things were, he ran for dear life to Beersheba, far in the south of Judah. He left his young servant there and then went on into the desert another day’s journey. He came to a lone broom bush and collapsed in its shade, wanting in the worst way to be done with it all—to just die: “Enough of this, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Take my life—I’m ready to join my ancestors in the grave!” Exhausted, he fell asleep under the lone broom bush.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Suddenly an angel shook him awake and said, “Get up and eat!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He looked around and, to his surprise, right by his head were a loaf of bread baked on some coals and a jug of water. He ate the meal and went back to sleep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came back, shook him awake again, and said, “Get up and eat some more—you’ve got a long journey ahead of you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: He got up, ate and drank his fill, and set out. Nourished by that meal, he walked forty days and nights, all the way to the mountain of God, to Horeb. When he got there, he crawled into a cave and went to sleep.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came to him: “So Elijah, what are you doing here?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“I’ve been working my heart out for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,” said Elijah. “The people of Israel have abandoned your covenant, destroyed the places of worship, and murdered your prophets. I’m the only one left, and now they’re trying to kill me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Then he was told, “Go, stand on the mountain at attention before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will pass by.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A hurricane wind ripped through the mountains and shattered the rocks before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t to be found in the wind; after the wind an earthquake, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t in the earthquake; and after the earthquake fire, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t in the fire; and after the fire a gentle and quiet whisper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'When Elijah heard the quiet voice, he muffled his face with his great cloak, went to the mouth of the cave, and stood there. A quiet voice asked, “So Elijah, now tell me, what are you doing here?” Elijah said it again, “I’ve been working my heart out for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, because the people of Israel have abandoned your covenant, destroyed your places of worship, and murdered your prophets. I’m the only one left, and now they’re trying to kill me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Go back the way you came through the desert to Damascus. When you get there anoint Hazael; make him king over Aram. Then anoint Jehu son of Nimshi; make him king over Israel. Finally, anoint Elisha son of Shaphat from Abel Meholah to succeed you as prophet. Anyone who escapes death by Hazael will be killed by Jehu; and anyone who escapes death by Jehu will be killed by Elisha. Meanwhile, I’m preserving for myself seven thousand souls: the knees that haven’t bowed to the god Baal, the mouths that haven’t kissed his image.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elijah went straight out and found Elisha son of Shaphat in a field where there were twelve pairs of yoked oxen at work plowing; Elisha was in charge of the twelfth pair. Elijah went up to him and threw his cloak over him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elisha deserted the oxen, ran after Elijah, and said, “Please! Let me kiss my father and mother good-bye—then I’ll follow you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go ahead,” said Elijah, “but, mind you, don’t forget what I’ve just done to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So Elisha left; he took his yoke of oxen and butchered them. He made a fire with the plow and tackle and then boiled the meat—a true farewell meal for the family. Then he left and followed Elijah, becoming his right-hand man.
