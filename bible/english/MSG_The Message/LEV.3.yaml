document_id: LEV.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Peace-Offering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“If your offering is a Peace-Offering and you present an animal from the herd, either male or female, it must be an animal without any defect. Lay your hand on the head of your offering and slaughter it at the entrance of the Tent of Meeting. Aaron’s sons, the priests, will throw the blood on all sides of the Altar. As a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from the Peace-Offering, present all the fat that covers or is connected to the entrails, the two kidneys and the fat around them at the loins, and the lobe of the liver that is removed along with the kidneys. Aaron and his sons will burn it on the Altar along with the Whole-Burnt-Offering that is on the wood prepared for the fire: a Fire-Gift, a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “If the offering is a goat, bring it into the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', lay your hand on its head, and slaughter it in front of the Tent of Meeting. Aaron’s sons will throw the blood on all sides of the Altar. As a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' present the fat that covers and is connected to the entrails, the two kidneys and the fat which is around them on the loins, and the lobe of the liver which is removed along with the kidneys. The priest will burn them on the Altar: a meal, a Fire-Gift, a pleasing fragrance.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “All the fat belongs to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. This is the fixed rule down through the generations, wherever you happen to live: Don’t eat the fat; don’t eat the blood. None of it.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If your Peace-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' comes from the flock, bring a male or female without defect. If you offer a lamb, offer it to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Lay your hand on the head of your offering and slaughter it at the Tent of Meeting. The sons of Aaron will throw its blood on all sides of the Altar. As a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from the Peace-Offering, present its fat, the entire fat tail cut off close to the backbone, all the fat on and connected to the entrails, the two kidneys and the fat around them on the loins, and the lobe of the liver which is removed along with the kidneys. The priest will burn it on the Altar: a meal, a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
