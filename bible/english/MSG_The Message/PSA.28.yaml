document_id: PSA.28,97
type_code: eng
verses:
  '1':
  - type: text
    content: Don’t turn a deaf ear
  - type: text
    content: 'when I call you, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: If all I get from you is
  - type: text
    content: deafening silence,
  - type: text
    content: I’d be better off
  - type: text
    content: in the Black Hole.
  '2':
  - type: text
    content: I’m letting you know what I need,
  - type: text
    content: calling out for help
  - type: text
    content: And lifting my arms
  - type: text
    content: toward your inner sanctuary.
  '3':
  - type: text
    content: Don’t shove me into
  - type: text
    content: the same jail cell with those crooks,
  - type: text
    content: With those who are
  - type: text
    content: full-time employees of evil.
  - type: text
    content: They talk a good line of “peace,”
  - type: text
    content: then moonlight for the Devil.
  - type: text
    content: Pay them back for what they’ve done,
  - type: text
    content: for how bad they’ve been.
  - type: text
    content: Pay them back for their long hours
  - type: text
    content: in the Devil’s workshop;
  - type: text
    content: Then cap it with a huge bonus.
  '5':
  - type: text
    content: Because they have no idea how God works
  - type: text
    content: or what he is up to,
  - type: text
    content: God will smash them to smithereens
  - type: text
    content: and walk away from the ruins.
  '6':
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: he heard me praying.
  - type: text
    content: He proved he’s on my side;
  - type: text
    content: I’ve thrown my lot in with him.
  - type: text
    content: Now I’m jumping for joy,
  - type: text
    content: and shouting and singing my thanks to him.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is all strength for his people,'
  - type: text
    content: ample refuge for his chosen leader;
  - type: text
    content: Save your people
  - type: text
    content: and bless your heritage.
  - type: text
    content: Care for them;
  - type: text
    content: carry them like a good shepherd.
