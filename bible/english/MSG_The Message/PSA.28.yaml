  children:
  - type: text
    text: the same jail cell with those crooks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With those who are
- type: usfm
  marker: q2
  children:
  - type: text
    text: full-time employees of evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They talk a good line of “peace,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: then moonlight for the Devil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pay them back for what they’ve done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for how bad they’ve been.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pay them back for their long hours
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the Devil’s workshop;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then cap it with a huge bonus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Because they have no idea how God works
