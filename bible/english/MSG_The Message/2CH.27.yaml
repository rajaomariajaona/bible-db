type_code: eng
verses:
  '1':
  - type: heading
    content: King Jotham
  - type: text
    content: 'Jotham was twenty-five years old when he became king; he reigned sixteen years at Jerusalem. His mother was Jerusha the daughter of Zadok. In '
  - type: text
    content: God
  - type: text
    content: '’s eyes he lived a good life, following the path marked out by his father Uzziah. Unlike his father, though, he didn’t desecrate The Temple of '
  - type: text
    content: God
  - type: text
    content: . But the people pushed right on in their lives of corruption.
  '3':
  - type: text
    content: 'Jotham constructed the Upper Gate of The Temple of '
  - type: text
    content: God
  - type: text
    content: ', considerably extended the Wall of the Ophel, and built cities in the high country of Judah and forts and towers down in the forests. He fought and beat the king of the Ammonites—that year the Ammonites turned over three and a quarter tons of silver and about 65,000 bushels of wheat, and another 65,000 bushels of barley. They repeated this for the next two years. Jotham’s strength was rooted in his steady and determined life of obedience to '
  - type: text
    content: God
  - type: text
    content: .
  '7':
  - type: text
    content: 'The rest of the history of Jotham, including his wars and achievements, are all written in the '
  - type: text
    content: Royal Annals of the Kings of Israel and Judah
  - type: text
    content: . He was twenty-five years old when he became king; he reigned for sixteen years at Jerusalem. Jotham died and was buried in the City of David. His son Ahaz became the next king.
