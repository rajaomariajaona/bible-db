document_id: JHN.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Life-Light
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: The Word was first,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Word present to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God present to the Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Word was God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in readiness for God from day one.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The Word became flesh and blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and moved into the neighborhood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We saw the glory with our own eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one-of-a-kind glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like Father, like Son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Generous inside and out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: true from start to finish.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: John pointed him out and called, “This is the One! The One I told you was coming after me but in fact was ahead of me. He has always been ahead of me, has always had the first word.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: We all live off his generous abundance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gift after gift after gift.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We got the basics from Moses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then this exuberant giving and receiving,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This endless knowing and understanding—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all this came through Jesus, the Messiah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one has ever seen God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not so much as a glimpse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This one-of-a-kind God-Expression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who exists at the very heart of the Father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has made him plain as day.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thunder in the Desert
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: 'When Jews from Jerusalem sent a group of priests and officials to ask John who he was, he was completely honest. He didn’t evade the question. He told the plain truth: “I am not the Messiah.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They pressed him, “Who, then? Elijah?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am not.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The Prophet?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Exasperated, they said, “Who, then? We need an answer for those who sent us. Tell us something—anything!—about yourself.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“I’m thunder in the desert: ‘Make the road straight for God!’ I’m doing what the prophet Isaiah preached.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: 'Those sent to question him were from the Pharisee party. Now they had a question of their own: “If you’re neither the Messiah, nor Elijah, nor the Prophet, why do you baptize?”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: John answered, “I only baptize using water. A person you don’t recognize has taken his stand in your midst. He comes after me, but he is not in second place to me. I’m not even worthy to hold his coat for him.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: These conversations took place in Bethany on the other side of the Jordan, where John was baptizing at the time.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The God-Revealer
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-31
    - type: text
      text: 'The very next day John saw Jesus coming toward him and yelled out, “Here he is, God’s Passover Lamb! He forgives the sins of the world! This is the man I’ve been talking about, ‘the One who comes after me but is really ahead of me.’ I knew nothing about who he was—only this: that my task has been to get Israel ready to recognize him as the God-Revealer. That is why I came here baptizing with water, giving you a good bath and scrubbing sins from your life so you can get a fresh start with God.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: Everything was created through him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing—not one thing!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: came into being without him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What came into existence was Life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Life was Light to live by.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Life-Light blazed out of the darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the darkness couldn’t put it out.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-34
    - type: text
      text: 'John clinched his witness with this: “I watched the Spirit, like a dove flying down out of the sky, making himself at home in him. I repeat, I know nothing about him except this: The One who authorized me to baptize with water told me, ‘The One on whom you see the Spirit come down and stay, this One will baptize with the Holy Spirit.’ That’s exactly what I saw happen, and I’m telling you, there’s no question about it: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: This
    - type: text
      text: ' is the Son of God.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Come, See for Yourself
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-36
    - type: text
      text: The next day John was back at his post with two disciples, who were watching. He looked up, saw Jesus walking nearby, and said, “Here he is, God’s Passover Lamb.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-38
    - type: text
      text: The two disciples heard him and went after Jesus. Jesus looked over his shoulder and said to them, “What are you after?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Rabbi” (which means “Teacher”), “where are you staying?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: He replied, “Come along and see for yourself.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came, saw where he was living, and ended up staying with him for the day. It was late afternoon when this happened.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-42
    - type: text
      text: Andrew, Simon Peter’s brother, was one of the two who heard John’s witness and followed Jesus. The first thing he did after finding where Jesus lived was find his own brother, Simon, telling him, “We’ve found the Messiah” (that is, “Christ”). He immediately led him to Jesus.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus took one look up and said, “You’re John’s son, Simon? From now on your name is Cephas” (or Peter, which means “Rock”).
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 43-44
    - type: text
      text: The next day Jesus decided to go to Galilee. When he got there, he ran across Philip and said, “Come, follow me.” (Philip’s hometown was Bethsaida, the same as Andrew and Peter.)
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 45-46
    - type: text
      text: 'Philip went and found Nathanael and told him, “We’ve found the One Moses wrote of in the Law, the One preached by the prophets. It’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus
    - type: text
      text: ', Joseph’s son, the one from Nazareth!” Nathanael said, “Nazareth? You’ve got to be kidding.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Philip said, “Come, see for yourself.”
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: When Jesus saw him coming he said, “There’s a real Israelite, not a false bone in his body.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Nathanael said, “Where did you get that idea? You don’t know me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus answered, “One day, long before Philip called you here, I saw you under the fig tree.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Nathanael exclaimed, “Rabbi! You are the Son of God, the King of Israel!”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 50-51
    - type: text
      text: Jesus said, “You’ve become a believer simply because I say I saw you one day sitting under the fig tree? You haven’t seen anything yet! Before this is over you’re going to see heaven open and God’s angels descending to the Son of Man and ascending again.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: There once was a man, his name John, sent by God to point out the way to the Life-Light. He came to show everyone where to look, who to believe in. John was not himself the Light; he was there to show the way to the Light.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-13
    - type: text
      text: 'The Life-Light was the real thing:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every person entering Life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings into Light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was in the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the world was there through him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and yet the world didn’t even notice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He came to his own people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they didn’t want him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But whoever did want him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who believed he was who he claimed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and would do what he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made to be their true selves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their child-of-God selves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the God-begotten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not blood-begotten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not flesh-begotten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not sex-begotten.
