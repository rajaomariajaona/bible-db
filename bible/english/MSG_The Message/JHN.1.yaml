document_id: JHN.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Life-Light
  - type: text
    content: The Word was first,
  - type: text
    content: the Word present to God,
  - type: text
    content: God present to the Word.
  - type: text
    content: The Word was God,
  - type: text
    content: in readiness for God from day one.
  '14':
  - type: text
    content: The Word became flesh and blood,
  - type: text
    content: and moved into the neighborhood.
  - type: text
    content: We saw the glory with our own eyes,
  - type: text
    content: the one-of-a-kind glory,
  - type: text
    content: like Father, like Son,
  - type: text
    content: Generous inside and out,
  - type: text
    content: true from start to finish.
  '15':
  - type: text
    content: John pointed him out and called, “This is the One! The One I told you was coming after me but in fact was ahead of me. He has always been ahead of me, has always had the first word.”
  '16':
  - type: text
    content: We all live off his generous abundance,
  - type: text
    content: gift after gift after gift.
  - type: text
    content: We got the basics from Moses,
  - type: text
    content: and then this exuberant giving and receiving,
  - type: text
    content: This endless knowing and understanding—
  - type: text
    content: all this came through Jesus, the Messiah.
  - type: text
    content: No one has ever seen God,
  - type: text
    content: not so much as a glimpse.
  - type: text
    content: This one-of-a-kind God-Expression,
  - type: text
    content: who exists at the very heart of the Father,
  - type: text
    content: has made him plain as day.
  - type: heading
    content: Thunder in the Desert
  '19':
  - type: text
    content: 'When Jews from Jerusalem sent a group of priests and officials to ask John who he was, he was completely honest. He didn’t evade the question. He told the plain truth: “I am not the Messiah.”'
  '21':
  - type: text
    content: They pressed him, “Who, then? Elijah?”
  - type: text
    content: “I am not.”
  - type: text
    content: “The Prophet?”
  - type: text
    content: “No.”
  '22':
  - type: text
    content: Exasperated, they said, “Who, then? We need an answer for those who sent us. Tell us something—anything!—about yourself.”
  '23':
  - type: text
    content: '“I’m thunder in the desert: ‘Make the road straight for God!’ I’m doing what the prophet Isaiah preached.”'
  '24':
  - type: text
    content: 'Those sent to question him were from the Pharisee party. Now they had a question of their own: “If you’re neither the Messiah, nor Elijah, nor the Prophet, why do you baptize?”'
  '26':
  - type: text
    content: John answered, “I only baptize using water. A person you don’t recognize has taken his stand in your midst. He comes after me, but he is not in second place to me. I’m not even worthy to hold his coat for him.”
  '28':
  - type: text
    content: These conversations took place in Bethany on the other side of the Jordan, where John was baptizing at the time.
  - type: heading
    content: The God-Revealer
  '29':
  - type: text
    content: 'The very next day John saw Jesus coming toward him and yelled out, “Here he is, God’s Passover Lamb! He forgives the sins of the world! This is the man I’ve been talking about, ‘the One who comes after me but is really ahead of me.’ I knew nothing about who he was—only this: that my task has been to get Israel ready to recognize him as the God-Revealer. That is why I came here baptizing with water, giving you a good bath and scrubbing sins from your life so you can get a fresh start with God.”'
  '3':
  - type: text
    content: Everything was created through him;
  - type: text
    content: nothing—not one thing!—
  - type: text
    content: came into being without him.
  - type: text
    content: What came into existence was Life,
  - type: text
    content: and the Life was Light to live by.
  - type: text
    content: The Life-Light blazed out of the darkness;
  - type: text
    content: the darkness couldn’t put it out.
  '32':
  - type: text
    content: 'John clinched his witness with this: “I watched the Spirit, like a dove flying down out of the sky, making himself at home in him. I repeat, I know nothing about him except this: The One who authorized me to baptize with water told me, ‘The One on whom you see the Spirit come down and stay, this One will baptize with the Holy Spirit.’ That’s exactly what I saw happen, and I’m telling you, there’s no question about it: '
  - type: text
    content: This
  - type: text
    content: ' is the Son of God.”'
  - type: heading
    content: Come, See for Yourself
  '35':
  - type: text
    content: The next day John was back at his post with two disciples, who were watching. He looked up, saw Jesus walking nearby, and said, “Here he is, God’s Passover Lamb.”
  '37':
  - type: text
    content: The two disciples heard him and went after Jesus. Jesus looked over his shoulder and said to them, “What are you after?”
  - type: text
    content: They said, “Rabbi” (which means “Teacher”), “where are you staying?”
  '39':
  - type: text
    content: He replied, “Come along and see for yourself.”
  - type: text
    content: They came, saw where he was living, and ended up staying with him for the day. It was late afternoon when this happened.
  '40':
  - type: text
    content: Andrew, Simon Peter’s brother, was one of the two who heard John’s witness and followed Jesus. The first thing he did after finding where Jesus lived was find his own brother, Simon, telling him, “We’ve found the Messiah” (that is, “Christ”). He immediately led him to Jesus.
  - type: text
    content: Jesus took one look up and said, “You’re John’s son, Simon? From now on your name is Cephas” (or Peter, which means “Rock”).
  '43':
  - type: text
    content: The next day Jesus decided to go to Galilee. When he got there, he ran across Philip and said, “Come, follow me.” (Philip’s hometown was Bethsaida, the same as Andrew and Peter.)
  '45':
  - type: text
    content: 'Philip went and found Nathanael and told him, “We’ve found the One Moses wrote of in the Law, the One preached by the prophets. It’s '
  - type: text
    content: Jesus
  - type: text
    content: ', Joseph’s son, the one from Nazareth!” Nathanael said, “Nazareth? You’ve got to be kidding.”'
  - type: text
    content: But Philip said, “Come, see for yourself.”
  '47':
  - type: text
    content: When Jesus saw him coming he said, “There’s a real Israelite, not a false bone in his body.”
  '48':
  - type: text
    content: Nathanael said, “Where did you get that idea? You don’t know me.”
  - type: text
    content: Jesus answered, “One day, long before Philip called you here, I saw you under the fig tree.”
  '49':
  - type: text
    content: Nathanael exclaimed, “Rabbi! You are the Son of God, the King of Israel!”
  '50':
  - type: text
    content: Jesus said, “You’ve become a believer simply because I say I saw you one day sitting under the fig tree? You haven’t seen anything yet! Before this is over you’re going to see heaven open and God’s angels descending to the Son of Man and ascending again.”
  '6':
  - type: text
    content: There once was a man, his name John, sent by God to point out the way to the Life-Light. He came to show everyone where to look, who to believe in. John was not himself the Light; he was there to show the way to the Light.
  '9':
  - type: text
    content: 'The Life-Light was the real thing:'
  - type: text
    content: Every person entering Life
  - type: text
    content: he brings into Light.
  - type: text
    content: He was in the world,
  - type: text
    content: the world was there through him,
  - type: text
    content: and yet the world didn’t even notice.
  - type: text
    content: He came to his own people,
  - type: text
    content: but they didn’t want him.
  - type: text
    content: But whoever did want him,
  - type: text
    content: who believed he was who he claimed
  - type: text
    content: and would do what he said,
  - type: text
    content: He made to be their true selves,
  - type: text
    content: their child-of-God selves.
  - type: text
    content: These are the God-begotten,
  - type: text
    content: not blood-begotten,
  - type: text
    content: not flesh-begotten,
  - type: text
    content: not sex-begotten.
