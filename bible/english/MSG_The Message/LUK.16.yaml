  '1':
  - type: heading
    content: The Story of the Crooked Manager
  - type: text
    content: Jesus said to his disciples, “There was once a rich man who had a manager. He got reports that the manager had been taking advantage of his position by running up huge personal expenses. So he called him in and said, ‘What’s this I hear about you? You’re fired. And I want a complete audit of your books.’
  '10':
  - type: text
    content: 'Jesus went on to make these comments:'
  - type: text
    content: If you’re honest in small things,
  - type: text
    content: you’ll be honest in big things;
  - type: text
    content: If you’re a crook in small things,
  - type: text
    content: you’ll be a crook in big things.
  - type: text
    content: If you’re not honest in small jobs,
  - type: text
    content: who will put you in charge of the store?
  - type: text
    content: 'No worker can serve two bosses:'
  - type: text
    content: He’ll either hate the first and love the second
  - type: text
    content: Or adore the first and despise the second.
  - type: text
    content: You can’t serve both God and the Bank.
  '14':
  - type: text
    content: 'When the Pharisees, a money-obsessed bunch, heard him say these things, they rolled their eyes, dismissing him as hopelessly out of touch. So Jesus spoke to them: “You are masters at making yourselves look good in front of others, but God knows what’s behind the appearance.'
  - type: text
    content: What society sees and calls monumental,
  - type: text
    content: God sees through and calls monstrous.
  - type: text
    content: God’s Law and the Prophets climaxed in John;
  - type: text
    content: Now it’s all kingdom of God—the glad news
  - type: text
    content: and compelling invitation to every man and woman.
  - type: text
    content: The sky will disintegrate and the earth dissolve
  - type: text
    content: before a single letter of God’s Law wears out.
  - type: text
    content: Using the legalities of divorce
  - type: text
    content: as a cover for lust is adultery;
  - type: text
    content: Using the legalities of marriage
  - type: text
    content: as a cover for lust is adultery.
  - type: heading
    content: The Rich Man and Lazarus
  '19':
  - type: text
    content: “There once was a rich man, expensively dressed in the latest fashions, wasting his days in conspicuous consumption. A poor man named Lazarus, covered with sores, had been dumped on his doorstep. All he lived for was to get a meal from scraps off the rich man’s table. His best friends were the dogs who came and licked his sores.
  '22':
  - type: text
    content: “Then he died, this poor man, and was taken up by the angels to the lap of Abraham. The rich man also died and was buried. In hell and in torment, he looked up and saw Abraham in the distance and Lazarus in his lap. He called out, ‘Father Abraham, mercy! Have mercy! Send Lazarus to dip his finger in water to cool my tongue. I’m in agony in this fire.’
  '25':
  - type: text
    content: “But Abraham said, ‘Child, remember that in your lifetime you got the good things and Lazarus the bad things. It’s not like that here. Here he’s consoled and you’re tormented. Besides, in all these matters there is a huge chasm set between us so that no one can go from us to you even if he wanted to, nor can anyone cross over from you to us.’
  '27':
  - type: text
    content: '“The rich man said, ‘Then let me ask you, Father: Send him to the house of my father where I have five brothers, so he can tell them the score and warn them so they won’t end up here in this place of torment.’'
  '29':
  - type: text
    content: “Abraham answered, ‘They have Moses and the Prophets to tell them the score. Let them listen to them.’
  '3':
  - type: text
    content: “The manager said to himself, ‘What am I going to do? I’ve lost my job as manager. I’m not strong enough for a laboring job, and I’m too proud to beg. . . . Ah, I’ve got a plan. Here’s what I’ll do . . . then when I’m turned out into the street, people will take me into their houses.’
  '30':
  - type: text
    content: “‘I know, Father Abraham,’ he said, ‘but they’re not listening. If someone came back to them from the dead, they would change their ways.’
  '31':
  - type: text
    content: “Abraham replied, ‘If they won’t listen to Moses and the Prophets, they’re not going to be convinced by someone who rises from the dead.’”
  '5':
  - type: text
    content: “Then he went at it. One after another, he called in the people who were in debt to his master. He said to the first, ‘How much do you owe my master?’
  '6':
  - type: text
    content: “He replied, ‘A hundred jugs of olive oil.’
  - type: text
    content: “The manager said, ‘Here, take your bill, sit down here—quick now—write fifty.’
  '7':
  - type: text
    content: “To the next he said, ‘And you, what do you owe?’
  - type: text
    content: “He answered, ‘A hundred sacks of wheat.’
  - type: text
    content: “He said, ‘Take your bill, write in eighty.’
  '8':
  - type: text
    content: '“Now here’s a surprise: The master praised the crooked manager! And why? Because he knew how to look after himself. Streetwise people are smarter in this regard than law-abiding citizens. They are on constant alert, looking for angles, surviving by their wits. I want you to be smart in the same way—but for what is '
  - type: text
    content: right
  - type: text
    content: —using every adversity to stimulate you to creative survival, to concentrate your attention on the bare essentials, so you’ll live, really live, and not complacently just get by on good behavior.”
  - type: heading
    content: God Sees Behind Appearances
