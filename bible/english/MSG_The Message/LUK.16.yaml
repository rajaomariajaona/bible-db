document_id: LUK.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Story of the Crooked Manager
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Jesus said to his disciples, “There was once a rich man who had a manager. He got reports that the manager had been taking advantage of his position by running up huge personal expenses. So he called him in and said, ‘What’s this I hear about you? You’re fired. And I want a complete audit of your books.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: “The manager said to himself, ‘What am I going to do? I’ve lost my job as manager. I’m not strong enough for a laboring job, and I’m too proud to beg. . . . Ah, I’ve got a plan. Here’s what I’ll do . . . then when I’m turned out into the street, people will take me into their houses.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Then he went at it. One after another, he called in the people who were in debt to his master. He said to the first, ‘How much do you owe my master?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “He replied, ‘A hundred jugs of olive oil.’
- type: usfm
  marker: p
  children:
  - type: text
    text: “The manager said, ‘Here, take your bill, sit down here—quick now—write fifty.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “To the next he said, ‘And you, what do you owe?’
- type: usfm
  marker: p
  children:
  - type: text
    text: “He answered, ‘A hundred sacks of wheat.’
- type: usfm
  marker: p
  children:
  - type: text
    text: “He said, ‘Take your bill, write in eighty.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: '“Now here’s a surprise: The master praised the crooked manager! And why? Because he knew how to look after himself. Streetwise people are smarter in this regard than law-abiding citizens. They are on constant alert, looking for angles, surviving by their wits. I want you to be smart in the same way—but for what is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: right
  - type: text
    text: —using every adversity to stimulate you to creative survival, to concentrate your attention on the bare essentials, so you’ll live, really live, and not complacently just get by on good behavior.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Sees Behind Appearances
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-13
  - type: text
    text: 'Jesus went on to make these comments:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you’re honest in small things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be honest in big things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you’re a crook in small things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be a crook in big things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you’re not honest in small jobs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will put you in charge of the store?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No worker can serve two bosses:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll either hate the first and love the second
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or adore the first and despise the second.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You can’t serve both God and the Bank.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-18
  - type: text
    text: 'When the Pharisees, a money-obsessed bunch, heard him say these things, they rolled their eyes, dismissing him as hopelessly out of touch. So Jesus spoke to them: “You are masters at making yourselves look good in front of others, but God knows what’s behind the appearance.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What society sees and calls monumental,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God sees through and calls monstrous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s Law and the Prophets climaxed in John;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now it’s all kingdom of God—the glad news
- type: usfm
  marker: q2
  children:
  - type: text
    text: and compelling invitation to every man and woman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sky will disintegrate and the earth dissolve
- type: usfm
  marker: q2
  children:
  - type: text
    text: before a single letter of God’s Law wears out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Using the legalities of divorce
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a cover for lust is adultery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Using the legalities of marriage
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a cover for lust is adultery.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rich Man and Lazarus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: “There once was a rich man, expensively dressed in the latest fashions, wasting his days in conspicuous consumption. A poor man named Lazarus, covered with sores, had been dumped on his doorstep. All he lived for was to get a meal from scraps off the rich man’s table. His best friends were the dogs who came and licked his sores.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: “Then he died, this poor man, and was taken up by the angels to the lap of Abraham. The rich man also died and was buried. In hell and in torment, he looked up and saw Abraham in the distance and Lazarus in his lap. He called out, ‘Father Abraham, mercy! Have mercy! Send Lazarus to dip his finger in water to cool my tongue. I’m in agony in this fire.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: “But Abraham said, ‘Child, remember that in your lifetime you got the good things and Lazarus the bad things. It’s not like that here. Here he’s consoled and you’re tormented. Besides, in all these matters there is a huge chasm set between us so that no one can go from us to you even if he wanted to, nor can anyone cross over from you to us.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: '“The rich man said, ‘Then let me ask you, Father: Send him to the house of my father where I have five brothers, so he can tell them the score and warn them so they won’t end up here in this place of torment.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Abraham answered, ‘They have Moses and the Prophets to tell them the score. Let them listen to them.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “‘I know, Father Abraham,’ he said, ‘but they’re not listening. If someone came back to them from the dead, they would change their ways.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Abraham replied, ‘If they won’t listen to Moses and the Prophets, they’re not going to be convinced by someone who rises from the dead.’”
