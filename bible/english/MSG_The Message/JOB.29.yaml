document_id: JOB.29,97
type_code: eng
verses:
  '1':
  - type: heading
    content: When God Was Still by My Side
  - type: text
    content: 'Job now resumed his response:'
  - type: text
    content: “Oh, how I long for the good old days,
  - type: text
    content: when God took such very good care of me.
  - type: text
    content: He always held a lamp before me
  - type: text
    content: and I walked through the dark by its light.
  - type: text
    content: Oh, how I miss those golden years
  - type: text
    content: when God’s friendship graced my home,
  - type: text
    content: When the Mighty One was still by my side
  - type: text
    content: and my children were all around me,
  - type: text
    content: When everything was going my way,
  - type: text
    content: and nothing seemed too difficult.
  '21':
  - type: text
    content: “Men and women listened when I spoke,
  - type: text
    content: hung expectantly on my every word.
  - type: text
    content: After I spoke, they’d be quiet,
  - type: text
    content: taking it all in.
  - type: text
    content: They welcomed my counsel like spring rain,
  - type: text
    content: drinking it all in.
  - type: text
    content: When I smiled at them, they could hardly believe it;
  - type: text
    content: their faces lit up, their troubles took wing!
  - type: text
    content: I was their leader, establishing the mood
  - type: text
    content: and setting the pace by which they lived.
  - type: text
    content: Where I led, they followed.”
  '7':
  - type: text
    content: “When I walked downtown
  - type: text
    content: and sat with my friends in the public square,
  - type: text
    content: Young and old greeted me with respect;
  - type: text
    content: I was honored by everyone in town.
  - type: text
    content: When I spoke, everyone listened;
  - type: text
    content: they hung on my every word.
  - type: text
    content: People who knew me spoke well of me;
  - type: text
    content: my reputation went ahead of me.
  - type: text
    content: I was known for helping people in trouble
  - type: text
    content: and standing up for those who were down on their luck.
  - type: text
    content: The dying blessed me,
  - type: text
    content: and the bereaved were cheered by my visits.
  - type: text
    content: All my dealings with people were good.
  - type: text
    content: I was known for being fair to everyone I met.
  - type: text
    content: I was eyes to the blind
  - type: text
    content: and feet to the lame,
  - type: text
    content: Father to the needy,
  - type: text
    content: and champion of abused aliens.
  - type: text
    content: I grabbed street thieves by the scruff of the neck
  - type: text
    content: and made them give back what they’d stolen.
  - type: text
    content: I thought, ‘I’ll die peacefully in my own bed,
  - type: text
    content: grateful for a long and full life,
  - type: text
    content: A life deep-rooted and well-watered,
  - type: text
    content: a life limber and dew-fresh,
  - type: text
    content: My soul soaked through with glory
  - type: text
    content: and my body robust until the day I die.’
