document_id: JOB.29,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: When God Was Still by My Side
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: 'Job now resumed his response:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, how I long for the good old days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when God took such very good care of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He always held a lamp before me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I walked through the dark by its light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, how I miss those golden years
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when God’s friendship graced my home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Mighty One was still by my side
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my children were all around me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When everything was going my way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nothing seemed too difficult.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-25
    - type: text
      text: “Men and women listened when I spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hung expectantly on my every word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After I spoke, they’d be quiet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: taking it all in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They welcomed my counsel like spring rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drinking it all in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I smiled at them, they could hardly believe it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their faces lit up, their troubles took wing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was their leader, establishing the mood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and setting the pace by which they lived.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where I led, they followed.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-20
    - type: text
      text: “When I walked downtown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sat with my friends in the public square,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young and old greeted me with respect;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was honored by everyone in town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I spoke, everyone listened;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they hung on my every word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People who knew me spoke well of me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my reputation went ahead of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was known for helping people in trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and standing up for those who were down on their luck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The dying blessed me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the bereaved were cheered by my visits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my dealings with people were good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was known for being fair to everyone I met.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was eyes to the blind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and feet to the lame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Father to the needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and champion of abused aliens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I grabbed street thieves by the scruff of the neck
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made them give back what they’d stolen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought, ‘I’ll die peacefully in my own bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grateful for a long and full life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A life deep-rooted and well-watered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a life limber and dew-fresh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul soaked through with glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my body robust until the day I die.’
