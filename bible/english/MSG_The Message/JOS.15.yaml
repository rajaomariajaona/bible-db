document_id: JOS.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah
  - type: text
    content: The lot for the people of Judah, their clans, extended south to the border of Edom, to the wilderness of Zin in the extreme south.
  '12':
  - type: text
    content: 'The western border: the coastline of the Great Sea.'
  - type: text
    content: This is the boundary around the people of Judah for their clans.
  '13':
  - type: text
    content: 'Joshua gave Caleb son of Jephunneh a section among the people of Judah, according to '
  - type: text
    content: God
  - type: text
    content: ’s command. He gave him Kiriath Arba, that is, Hebron. Arba was the ancestor of Anak.
  '14':
  - type: text
    content: 'Caleb drove out three Anakim from Hebron: Sheshai, Ahiman, and Talmai, all descendants of Anak. He marched up from there against the people of Debir. Debir used to be called Kiriath Sepher.'
  '16':
  - type: text
    content: Caleb said, “Whoever attacks Kiriath Sepher and takes it, I’ll give my daughter Acsah to him as his wife.” Othniel son of Kenaz, Caleb’s brother, took it; so Caleb gave him his daughter Acsah as his wife.
  '18':
  - type: text
    content: When she arrived she got him
  - type: text
    content: to ask for farmland from her father.
  - type: text
    content: As she dismounted from her donkey
  - type: text
    content: Caleb asked her, “What would you like?”
  - type: text
    content: She said, “Give me a marriage gift.
  - type: text
    content: You’ve given me desert land;
  - type: text
    content: Now give me pools of water!”
  - type: text
    content: And he gave her the upper and the lower pools.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: The southern border ran from the tip of the Salt Sea south of The Tongue; it ran southward from Scorpions Pass, went around Zin and just south of Kadesh Barnea; then it ran past Hezron, ascended to Addar, and curved around to Karka; from there it passed along to Azmon, came out at the Brook of Egypt, ending at the Sea. This is the southern boundary.
  '20':
  - type: text
    content: This is the inheritance of the tribe of the people of Judah, clan by clan.
  - type: text
    content: 'The southern towns of the tribe of Judah in the Negev were near the boundary of Edom:'
  - type: text
    content: Kabzeel, Eder, Jagur,
  - type: text
    content: Kinah, Dimonah, Adadah,
  - type: text
    content: Kedesh, Hazor, Ithnan,
  - type: text
    content: Ziph, Telem, Bealoth,
  - type: text
    content: Hazor Hadattah, Kerioth Hezron (that is, Hazor),
  - type: text
    content: Amam, Shema, Moladah,
  - type: text
    content: Hazar Gaddah, Heshmon, Beth Pelet,
  - type: text
    content: Hazar Shual, Beersheba, Biziothiah,
  - type: text
    content: Baalah, Iim, Ezem,
  - type: text
    content: Eltolad, Kesil, Hormah,
  - type: text
    content: Ziklag, Madmannah, Sansannah,
  - type: text
    content: Lebaoth, Shilhim, Ain, and Rimmon—
  - type: text
    content: a total of twenty-nine towns and their villages.
  '33':
  - type: text
    content: 'In the Shephelah (the western foothills) there were:'
  - type: text
    content: Eshtaol, Zorah, Ashnah,
  - type: text
    content: Zanoah, En Gannim, Tappuah, Enam,
  - type: text
    content: Jarmuth, Adullam, Socoh, Azekah,
  - type: text
    content: Shaaraim, Adithaim, and Gederah (or Gederothaim)—
  - type: text
    content: fourteen towns and their villages.
  - type: text
    content: Zenan, Hadashah, Migdal Gad,
  - type: text
    content: Dilean, Mizpah, Joktheel,
  - type: text
    content: Lachish, Bozkath, Eglon,
  - type: text
    content: Cabbon, Lahmas, Kitlish,
  - type: text
    content: Gederoth, Beth Dagon, Naamah, and Makkedah—
  - type: text
    content: sixteen towns and their villages.
  - type: text
    content: Libnah, Ether, Ashan,
  - type: text
    content: Iphtah, Ashnah, Nezib,
  - type: text
    content: Keilah, Aczib, and Mareshah—
  - type: text
    content: nine towns and their villages.
  - type: text
    content: Ekron with its towns and villages;
  - type: text
    content: From Ekron, west to the sea, all that bordered Ashdod with its villages;
  - type: text
    content: Ashdod with its towns and villages;
  - type: text
    content: Gaza with its towns and villages all the way to the Brook of Egypt.
  - type: text
    content: The Great Sea is the western border.
  '48':
  - type: text
    content: 'In the hill country:'
  - type: text
    content: Shamir, Jattir, Socoh,
  - type: text
    content: Dannah, Kiriath Sannah (that is, Debir),
  - type: text
    content: Anab, Eshtemoh, Anim,
  - type: text
    content: Goshen, Holon, and Giloh—
  - type: text
    content: eleven towns and their villages.
  - type: text
    content: Arab, Dumah, Eshan,
  - type: text
    content: Janim, Beth Tappuah, Aphekah,
  - type: text
    content: Humtah, Kiriath Arba (that is, Hebron), and Zior—
  - type: text
    content: nine towns and their villages.
  - type: text
    content: Maon, Carmel, Ziph, Juttah,
  - type: text
    content: Jezreel, Jokdeam, Zanoah,
  - type: text
    content: Kain, Gibeah, and Timnah—
  - type: text
    content: ten towns and their villages.
  - type: text
    content: Halhul, Beth Zur, Gedor,
  - type: text
    content: Maarath, Beth Anoth, and Eltekon—
  - type: text
    content: six towns and their villages.
  - type: text
    content: Kiriath Baal (that is, Kiriath Jearim) and Rabbah—
  - type: text
    content: two towns and their villages.
  '5':
  - type: text
    content: 'The eastern boundary: the Salt Sea up to the mouth of the Jordan.'
  - type: text
    content: The northern boundary started at the shallows of the Sea at the mouth of the Jordan, went up to Beth Hoglah and around to the north of Beth Arabah and to the Stone of Bohan son of Reuben. The border then ascended to Debir from Trouble Valley and turned north toward Gilgal, which lies opposite Red Pass, just south of the gorge. The border then followed the Waters of En Shemesh and ended at En Rogel. The border followed the Valley of Ben Hinnom along the southern slope of the Jebusite ridge (that is, Jerusalem). It ascended to the top of the mountain opposite Hinnom Valley on the west, at the northern end of Rephaim Valley; the border then took a turn at the top of the mountain to the spring, the Waters of Nephtoah, and followed the valley out to Mount Ephron, turned toward Baalah (that is, Kiriath Jearim), took another turn west of Baalah to Mount Seir, curved around to the northern shoulder of Mount Jearim (that is, Kesalon), descended to Beth Shemesh, and crossed to Timnah. The border then went north to the ridge of Ekron, turned toward Shikkeron, passed along to Mount Baalah, and came out at Jabneel. The border ended at the Sea.
  '61':
  - type: text
    content: 'In the wilderness:'
  - type: text
    content: Beth Arabah, Middin, Secacah,
  - type: text
    content: Nibshan, the City of Salt, and En Gedi—
  - type: text
    content: six towns and their villages.
  '63':
  - type: text
    content: The people of Judah couldn’t get rid of the Jebusites who lived in Jerusalem. The Jebusites stayed put, living alongside the people of Judah. They are still living there in Jerusalem.
