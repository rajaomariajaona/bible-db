document_id: JOS.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The lot for the people of Judah, their clans, extended south to the border of Edom, to the wilderness of Zin in the extreme south.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The western border: the coastline of the Great Sea.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the boundary around the people of Judah for their clans.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Joshua gave Caleb son of Jephunneh a section among the people of Judah, according to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s command. He gave him Kiriath Arba, that is, Hebron. Arba was the ancestor of Anak.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'Caleb drove out three Anakim from Hebron: Sheshai, Ahiman, and Talmai, all descendants of Anak. He marched up from there against the people of Debir. Debir used to be called Kiriath Sepher.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Caleb said, “Whoever attacks Kiriath Sepher and takes it, I’ll give my daughter Acsah to him as his wife.” Othniel son of Kenaz, Caleb’s brother, took it; so Caleb gave him his daughter Acsah as his wife.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: When she arrived she got him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to ask for farmland from her father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As she dismounted from her donkey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Caleb asked her, “What would you like?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She said, “Give me a marriage gift.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve given me desert land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now give me pools of water!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he gave her the upper and the lower pools.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: The southern border ran from the tip of the Salt Sea south of The Tongue; it ran southward from Scorpions Pass, went around Zin and just south of Kadesh Barnea; then it ran past Hezron, ascended to Addar, and curved around to Karka; from there it passed along to Azmon, came out at the Brook of Egypt, ending at the Sea. This is the southern boundary.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-32
    - type: text
      text: This is the inheritance of the tribe of the people of Judah, clan by clan.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The southern towns of the tribe of Judah in the Negev were near the boundary of Edom:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kabzeel, Eder, Jagur,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kinah, Dimonah, Adadah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kedesh, Hazor, Ithnan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ziph, Telem, Bealoth,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hazor Hadattah, Kerioth Hezron (that is, Hazor),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amam, Shema, Moladah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hazar Gaddah, Heshmon, Beth Pelet,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hazar Shual, Beersheba, Biziothiah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Baalah, Iim, Ezem,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eltolad, Kesil, Hormah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ziklag, Madmannah, Sansannah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Lebaoth, Shilhim, Ain, and Rimmon—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: a total of twenty-nine towns and their villages.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-47
    - type: text
      text: 'In the Shephelah (the western foothills) there were:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eshtaol, Zorah, Ashnah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zanoah, En Gannim, Tappuah, Enam,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jarmuth, Adullam, Socoh, Azekah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shaaraim, Adithaim, and Gederah (or Gederothaim)—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: fourteen towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zenan, Hadashah, Migdal Gad,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Dilean, Mizpah, Joktheel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Lachish, Bozkath, Eglon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Cabbon, Lahmas, Kitlish,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gederoth, Beth Dagon, Naamah, and Makkedah—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: sixteen towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Libnah, Ether, Ashan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iphtah, Ashnah, Nezib,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Keilah, Aczib, and Mareshah—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: nine towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ekron with its towns and villages;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From Ekron, west to the sea, all that bordered Ashdod with its villages;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ashdod with its towns and villages;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gaza with its towns and villages all the way to the Brook of Egypt.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The Great Sea is the western border.
  '48':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 48-60
    - type: text
      text: 'In the hill country:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shamir, Jattir, Socoh,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Dannah, Kiriath Sannah (that is, Debir),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Anab, Eshtemoh, Anim,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Goshen, Holon, and Giloh—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: eleven towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Arab, Dumah, Eshan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Janim, Beth Tappuah, Aphekah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Humtah, Kiriath Arba (that is, Hebron), and Zior—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: nine towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Maon, Carmel, Ziph, Juttah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jezreel, Jokdeam, Zanoah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kain, Gibeah, and Timnah—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: ten towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Halhul, Beth Zur, Gedor,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Maarath, Beth Anoth, and Eltekon—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: six towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kiriath Baal (that is, Kiriath Jearim) and Rabbah—
  - type: usfm
    marker: li1
    children:
    - type: text
      text: two towns and their villages.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-11
    - type: text
      text: 'The eastern boundary: the Salt Sea up to the mouth of the Jordan.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The northern boundary started at the shallows of the Sea at the mouth of the Jordan, went up to Beth Hoglah and around to the north of Beth Arabah and to the Stone of Bohan son of Reuben. The border then ascended to Debir from Trouble Valley and turned north toward Gilgal, which lies opposite Red Pass, just south of the gorge. The border then followed the Waters of En Shemesh and ended at En Rogel. The border followed the Valley of Ben Hinnom along the southern slope of the Jebusite ridge (that is, Jerusalem). It ascended to the top of the mountain opposite Hinnom Valley on the west, at the northern end of Rephaim Valley; the border then took a turn at the top of the mountain to the spring, the Waters of Nephtoah, and followed the valley out to Mount Ephron, turned toward Baalah (that is, Kiriath Jearim), took another turn west of Baalah to Mount Seir, curved around to the northern shoulder of Mount Jearim (that is, Kesalon), descended to Beth Shemesh, and crossed to Timnah. The border then went north to the ridge of Ekron, turned toward Shikkeron, passed along to Mount Baalah, and came out at Jabneel. The border ended at the Sea.
  '61':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 61-62
    - type: text
      text: 'In the wilderness:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beth Arabah, Middin, Secacah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nibshan, the City of Salt, and En Gedi—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: six towns and their villages.
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: The people of Judah couldn’t get rid of the Jebusites who lived in Jerusalem. The Jebusites stayed put, living alongside the people of Judah. They are still living there in Jerusalem.
