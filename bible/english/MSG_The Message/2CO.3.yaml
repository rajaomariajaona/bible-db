document_id: 2CO.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Does it sound like we’re patting ourselves on the back, insisting on our credentials, asserting our authority? Well, we’re not. Neither do we need letters of endorsement, either to you or from you. You yourselves are all the endorsement we need. Your very lives are a letter that anyone can read by just looking at you. Christ himself wrote it—not with ink, but with God’s living Spirit; not chiseled into stone, but carved into human lives—and we publish it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'We couldn’t be more sure of ourselves in this—that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ', written by Christ himself for God, are our letter of recommendation. We wouldn’t think of writing this kind of letter about ourselves. Only God can write such a letter. His letter authorizes us to help carry out this new plan of action. The plan wasn’t written out with ink on paper, with pages and pages of legal footnotes, killing your spirit. It’s written with Spirit on spirit, his life on our lives!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lifting the Veil
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: The Government of Death, its constitution chiseled on stone tablets, had a dazzling inaugural. Moses’ face as he delivered the tablets was so bright that day (even though it would fade soon enough) that the people of Israel could no more look right at him than stare into the sun. How much more dazzling, then, the Government of Living Spirit?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: If the Government of Condemnation was impressive, how about this Government of Affirmation? Bright as that old government was, it would look downright dull alongside this new one. If that makeshift arrangement impressed us, how much more this brightly shining government installed for eternity?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: 'With that kind of hope to excite us, nothing holds us back. Unlike Moses, we have nothing to hide. Everything is out in the open with us. He wore a veil so the children of Israel wouldn’t notice that the glory was fading away—and they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: didn’t
  - type: text
    text: ' notice. They didn’t notice it then and they don’t notice it now, don’t notice that there’s nothing left behind that veil. Even today when the proclamations of that old, bankrupt government are read out, they can’t see through it. Only Christ can get rid of the veil so they can see for themselves that there’s nothing there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: Whenever, though, they turn to face God as Moses did, God removes the veil and there they are—face-to-face! They suddenly recognize that God is a living, personal presence, not a piece of chiseled stone. And when God is personally present, a living Spirit, that old, constricting legislation is recognized as obsolete. We’re free of it! All of us! Nothing between us and God, our faces shining with the brightness of his face. And so we are transfigured much like the Messiah, our lives gradually becoming brighter and more beautiful as God enters our lives and we become like him.
