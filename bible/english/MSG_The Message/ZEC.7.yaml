document_id: ZEC.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: “You’re Interested in Religion, I’m Interested in People”
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the fourth day of the ninth month, in the fourth year of the reign of King Darius, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message again came to Zechariah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'The town of Bethel had sent a delegation headed by Sarezer and Regem-Melech to pray for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s blessing and to confer with the priests of the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, and also with the prophets. They posed this question: “Should we plan for a day of mourning and abstinence next August, the seventieth anniversary of Jerusalem’s fall, as we have been doing all these years?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies gave me this Message for them, for all the people and for the priests: “When you held days of fasting every fifth and seventh month all these seventy years, were you doing it for me? And when you held feasts, was that for me? Hardly. You’re interested in religion, I’m interested in people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: '“There’s nothing new to say on the subject. Don’t you still have the message of the earlier prophets from the time when Jerusalem was still a thriving, bustling city and the outlying countryside, the Negev and Shephelah, was populated? [This is the message that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave Zechariah.] Well, the message hasn’t changed. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies said then and says now:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “‘Treat one another justly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Love your neighbors.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be compassionate with each other.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t take advantage of widows, orphans, visitors, and the poor.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t plot and scheme against one another—that’s evil.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13a
  - type: text
    text: ' “But did your ancestors listen? No, they set their jaws in defiance. They shut their ears. They steeled themselves against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s revelation and the Spirit-filled sermons preached by the earlier prophets by order of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' became angry, really angry, because he told them everything plainly and they wouldn’t listen to a word he said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13b-14
  - type: text
    text: ' “So [this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies said] if they won’t listen to me, I won’t listen to them. I scattered them to the four winds. They ended up strangers wherever they were. Their ‘promised land’ became a vacant lot—weeds and tin cans and thistles. Not a sign of life. They turned a dreamland into a wasteland.”
