document_id: ZEC.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “You’re Interested in Religion, I’m Interested in People”
  - type: text
    content: 'On the fourth day of the ninth month, in the fourth year of the reign of King Darius, '
  - type: text
    content: God
  - type: text
    content: ’s Message again came to Zechariah.
  '11':
  - type: text
    content: ' “But did your ancestors listen? No, they set their jaws in defiance. They shut their ears. They steeled themselves against '
  - type: text
    content: God
  - type: text
    content: '’s revelation and the Spirit-filled sermons preached by the earlier prophets by order of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies. And '
  - type: text
    content: God
  - type: text
    content: ' became angry, really angry, because he told them everything plainly and they wouldn’t listen to a word he said.'
  '13':
  - type: text
    content: ' “So [this is what '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies said] if they won’t listen to me, I won’t listen to them. I scattered them to the four winds. They ended up strangers wherever they were. Their ‘promised land’ became a vacant lot—weeds and tin cans and thistles. Not a sign of life. They turned a dreamland into a wasteland.”
  '2':
  - type: text
    content: 'The town of Bethel had sent a delegation headed by Sarezer and Regem-Melech to pray for '
  - type: text
    content: God
  - type: text
    content: '’s blessing and to confer with the priests of the Temple of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, and also with the prophets. They posed this question: “Should we plan for a day of mourning and abstinence next August, the seventieth anniversary of Jerusalem’s fall, as we have been doing all these years?”'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies gave me this Message for them, for all the people and for the priests: “When you held days of fasting every fifth and seventh month all these seventy years, were you doing it for me? And when you held feasts, was that for me? Hardly. You’re interested in religion, I’m interested in people.'
  '7':
  - type: text
    content: '“There’s nothing new to say on the subject. Don’t you still have the message of the earlier prophets from the time when Jerusalem was still a thriving, bustling city and the outlying countryside, the Negev and Shephelah, was populated? [This is the message that '
  - type: text
    content: God
  - type: text
    content: ' gave Zechariah.] Well, the message hasn’t changed. '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies said then and says now:'
  - type: text
    content: “‘Treat one another justly.
  - type: text
    content: Love your neighbors.
  - type: text
    content: Be compassionate with each other.
  - type: text
    content: Don’t take advantage of widows, orphans, visitors, and the poor.
  - type: text
    content: Don’t plot and scheme against one another—that’s evil.’
