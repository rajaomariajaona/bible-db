document_id: LUK.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Jesus
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: About that time Caesar Augustus ordered a census to be taken throughout the Empire. This was the first census when Quirinius was governor of Syria. Everyone had to travel to his own ancestral hometown to be accounted for. So Joseph went from the Galilean town of Nazareth up to Bethlehem in Judah, David’s town, for the census. As a descendant of David, he had to go there. He went with Mary, his fiancée, who was pregnant.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At once the angel was joined by a huge angelic choir singing God’s praises:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Glory to God in the heavenly heights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peace to all men and women on earth who please him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the angel choir withdrew into heaven, the shepherds talked it over. “Let’s get over to Bethlehem as fast as we can and see for ourselves what God has revealed to us.” They left, running, and found Mary and Joseph, and the baby lying in the manger. Seeing was believing. They told everyone they met what the angels had said about this child. All who heard the shepherds were impressed.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mary kept all these things to herself, holding them dear, deep within herself. The shepherds returned and let loose, glorifying and praising God for everything they had heard and seen. It turned out exactly the way they’d been told!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When the eighth day arrived, the day of circumcision, the child was named Jesus, the name given by the angel before he was conceived.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then when the days stipulated by Moses for purification were complete, they took him up to Jerusalem to offer him to God as commanded in God’s Law: “Every male who opens the womb shall be a holy offering to God,” and also to sacrifice the “pair of doves or two young pigeons” prescribed in God’s Law.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Jerusalem at the time, there was a man, Simeon by name, a good man, a man who lived in the prayerful expectancy of help for Israel. And the Holy Spirit was on him. The Holy Spirit had shown him that he would see the Messiah of God before he died. Led by the Spirit, he entered the Temple. As the parents of the child Jesus brought him in to carry out the rituals of the Law, Simeon took him into his arms and blessed God:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, you can now release your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: release me in peace as you promised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my own eyes I’ve seen your salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'it’s now out in the open for everyone to see:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A God-revealing light to the non-Jewish nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and of glory for your people Israel.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus’ father and mother were speechless with surprise at these words. Simeon went on to bless them, and said to Mary his mother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This child marks both the failure and
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the recovery of many in Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A figure misunderstood and contradicted—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pain of a sword-thrust through you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the rejection will force honesty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as God reveals who they really are.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anna the prophetess was also there, a daughter of Phanuel from the tribe of Asher. She was by now a very old woman. She had been married seven years and a widow for eighty-four. She never left the Temple area, worshiping night and day with her fastings and prayers. At the very time Simeon was praying, she showed up, broke into an anthem of praise to God, and talked about the child to all who were waiting expectantly for the freeing of Jerusalem.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they finished everything required by God in the Law, they returned to Galilee and their own town, Nazareth. There the child grew strong in body and wise in spirit. And the grace of God was on him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: They Found Him in the Temple
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Every year Jesus’ parents traveled to Jerusalem for the Feast of Passover. When he was twelve years old, they went up as they always did for the Feast. When it was over and they left for home, the child Jesus stayed behind in Jerusalem, but his parents didn’t know it. Thinking he was somewhere in the company of pilgrims, they journeyed for a whole day and then began looking for him among relatives and neighbors. When they didn’t find him, they went back to Jerusalem looking for him.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day they found him in the Temple seated among the teachers, listening to them and asking questions. The teachers were all quite taken with him, impressed with the sharpness of his answers. But his parents were not impressed; they were upset and hurt.
  - type: usfm
    marker: p
    children:
    - type: text
      text: His mother said, “Young man, why have you done this to us? Your father and I have been half out of our minds looking for you.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Why were you looking for me? Didn’t you know that I had to be here, dealing with the things of my Father?” But they had no idea what he was talking about.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went back to Nazareth with them, and lived obediently with them. His mother held these things dearly, deep within herself. And Jesus matured, growing up in both body and spirit, blessed by both God and people.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While they were there, the time came for her to give birth. She gave birth to a son, her firstborn. She wrapped him in a blanket and laid him in a manger, because there was no room in the hostel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Event for Everyone
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There were shepherds camping in the neighborhood. They had set night watches over their sheep. Suddenly, God’s angel stood among them and God’s glory blazed around them. They were terrified. The angel said, “Don’t be afraid. I’m here to announce a great and joyful event that is meant for everybody, worldwide: A Savior has just been born in David’s town, a Savior who is Messiah and Master. This is what you’re to look for: a baby wrapped in a blanket and lying in a manger.”'
