verses:
  '1':
  - type: text
    content: 'O my soul, bless '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: From head to toe, I’ll bless his holy name!
  - type: text
    content: 'O my soul, bless '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: don’t forget a single blessing!
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' has set his throne in heaven;'
  - type: text
    content: he rules over us all. He’s the King!
  - type: text
    content: 'So bless '
  - type: text
    content: God
  - type: text
    content: ', you angels,'
  - type: text
    content: ready and able to fly at his bidding,
  - type: text
    content: quick to hear and do what he says.
  - type: text
    content: 'Bless '
  - type: text
    content: God,
  - type: text
    content: ' all you armies of angels,'
  - type: text
    content: alert to respond to whatever he wills.
  - type: text
    content: 'Bless '
  - type: text
    content: God
  - type: text
    content: ', all creatures, wherever you are—'
  - type: text
    content: 'everything and everyone made by '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: 'And you, O my soul, bless '
  - type: text
    content: God
  - type: text
    content: '!'
  '3':
  - type: text
    content: He forgives your sins—every one.
  - type: text
    content: He heals your diseases—every one.
  - type: text
    content: He redeems you from hell—saves your life!
  - type: text
    content: He crowns you with love and mercy—a paradise crown.
  - type: text
    content: He wraps you in goodness—beauty eternal.
  - type: text
    content: He renews your youth—you’re always young in his presence.
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'God '
  - type: text
    content: makes everything come out right;
  - type: text
    content: he puts victims back on their feet.
  - type: text
    content: He showed Moses how he went about his work,
  - type: text
    content: opened up his plans to all Israel.
  - type: text
    content: God
  - type: text
    content: ' is sheer mercy and grace;'
  - type: text
    content: not easily angered, he’s rich in love.
  - type: text
    content: He doesn’t endlessly nag and scold,
  - type: text
    content: nor hold grudges forever.
  - type: text
    content: He doesn’t treat us as our sins deserve,
  - type: text
    content: nor pay us back in full for our wrongs.
  - type: text
    content: As high as heaven is over the earth,
  - type: text
    content: so strong is his love to those who fear him.
  - type: text
    content: And as far as sunrise is from sunset,
  - type: text
    content: he has separated us from our sins.
  - type: text
    content: As parents feel for their children,
  - type: text
    content: God
  - type: text
    content: ' feels for those who fear him.'
  - type: text
    content: He knows us inside and out,
  - type: text
    content: keeps in mind that we’re made of mud.
  - type: text
    content: Men and women don’t live very long;
  - type: text
    content: like wildflowers they spring up and blossom,
  - type: text
    content: But a storm snuffs them out just as quickly,
  - type: text
    content: leaving nothing to show they were here.
  - type: text
    content: God
  - type: text
    content: ’s love, though, is ever and always,
  - type: text
    content: eternally present to all who fear him,
  - type: text
    content: Making everything right for them and their children
  - type: text
    content: as they follow his Covenant ways
  - type: text
    content: and remember to do whatever he said.
