    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From head to toe, I’ll bless his holy name!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O my soul, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t forget a single blessing!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has set his throne in heaven;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he rules over us all. He’s the King!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you angels,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready and able to fly at his bidding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quick to hear and do what he says.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God,
    - type: text
      text: ' all you armies of angels,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: alert to respond to whatever he wills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', all creatures, wherever you are—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'everything and everyone made by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you, O my soul, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He forgives your sins—every one.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He heals your diseases—every one.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He redeems you from hell—saves your life!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He crowns you with love and mercy—a paradise crown.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He wraps you in goodness—beauty eternal.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He renews your youth—you’re always young in his presence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: makes everything come out right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he puts victims back on their feet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He showed Moses how he went about his work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: opened up his plans to all Israel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is sheer mercy and grace;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not easily angered, he’s rich in love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He doesn’t endlessly nag and scold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor hold grudges forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He doesn’t treat us as our sins deserve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor pay us back in full for our wrongs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As high as heaven is over the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so strong is his love to those who fear him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as far as sunrise is from sunset,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has separated us from our sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As parents feel for their children,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' feels for those who fear him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He knows us inside and out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keeps in mind that we’re made of mud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men and women don’t live very long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like wildflowers they spring up and blossom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a storm snuffs them out just as quickly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving nothing to show they were here.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s love, though, is ever and always,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eternally present to all who fear him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making everything right for them and their children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they follow his Covenant ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and remember to do whatever he said.
