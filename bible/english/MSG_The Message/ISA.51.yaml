document_id: ISA.51
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Committed to Seeking '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: “Listen to me, all you who are serious about right living
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and committed to seeking '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ponder the rock from which you were cut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the quarry from which you were dug.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, ponder Abraham, your father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Sarah, who bore you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Think of it! One solitary man when I called him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but once I blessed him, he multiplied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Likewise I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will comfort Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: comfort all her mounds of ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll transform her dead ground into Eden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'her moonscape into the garden of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place filled with exuberance and laughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thankful voices and melodic songs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: “Pay attention, my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to me, nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revelation flows from me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My decisions light up the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My deliverance arrives on the run,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my salvation right on time.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll bring justice to the peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even faraway islands will look to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take hope in my saving power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look up at the skies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ponder the earth under your feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The skies will fade out like smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will wear out like work pants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people will die off like flies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my salvation will last forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my setting-things-right will never be obsolete.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “Listen now, you who know right from wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you who hold my teaching inside you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pay no attention to insults, and when mocked
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let it get you down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those insults and mockeries are moth-eaten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from brains that are termite-ridden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my setting-things-right lasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my salvation goes on and on and on.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: 'Wake up, wake up, flex your muscles, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up as in the old days, in the long ago.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Didn’t you once make mincemeat of Rahab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dispatch the old chaos-dragon?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And didn’t you once dry up the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the powerful waters of the deep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then made the bottom of the ocean a road
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the redeemed to walk across?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the same way '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s ransomed will come back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: come back to Zion cheering, shouting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joy eternal wreathing their heads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: exuberant ecstasies transporting them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not a sign of moans or groans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: What Are You Afraid of—or Who?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16
  - type: text
    text: “I, I’m the One comforting you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What are you afraid of—or who?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some man or woman who’ll soon be dead?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Some poor wretch destined for dust?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’ve forgotten me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who made you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who unfurled the skies, who founded the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And here you are, quaking like an aspen
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the tantrums of a tyrant
- type: usfm
  marker: q2
  children:
  - type: text
    text: who thinks he can kick down the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But what will come of the tantrums?
- type: usfm
  marker: q2
  children:
  - type: text
    text: The victims will be released before you know it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re not going to die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’re not even going to go hungry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your very own God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who stirs up the sea and whips up the waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'named '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I teach you how to talk, word by word,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and personally watch over you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even while I’m unfurling the skies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: setting earth on solid foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and greeting Zion: ‘Welcome, my people!’”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: So wake up! Rub the sleep from your eyes!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Up on your feet, Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’ve drunk the cup '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' handed you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the strong drink of his anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You drank it down to the last drop,
- type: usfm
  marker: q2
  children:
  - type: text
    text: staggered and collapsed, dead-drunk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And nobody to help you home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one among your friends or children
- type: usfm
  marker: q2
  children:
  - type: text
    text: to take you by the hand and put you in bed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve been hit with a double dose of trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: —does anyone care?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assault and battery, hunger and death
- type: usfm
  marker: q2
  children:
  - type: text
    text: —will anyone comfort?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons and daughters have passed out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strewn in the streets like stunned rabbits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sleeping off the strong drink of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rage of your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Therefore listen, please,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you with your splitting headaches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who are nursing the hangovers
- type: usfm
  marker: q2
  children:
  - type: text
    text: that didn’t come from drinking wine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Your Master, your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', has something to say,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your God has taken up his people’s case:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look, I’ve taken back the drink that sent you reeling.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No more drinking from that jug of my anger!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve passed it over to your abusers to drink, those who ordered you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Down on the ground so we can walk all over you!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you had to do it. Flat on the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you were the dirt under their feet.”
