document_id: ISA.51,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Committed to Seeking God
  - type: text
    content: “Listen to me, all you who are serious about right living
  - type: text
    content: 'and committed to seeking '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Ponder the rock from which you were cut,
  - type: text
    content: the quarry from which you were dug.
  - type: text
    content: Yes, ponder Abraham, your father,
  - type: text
    content: and Sarah, who bore you.
  - type: text
    content: Think of it! One solitary man when I called him,
  - type: text
    content: but once I blessed him, he multiplied.
  - type: text
    content: 'Likewise I, '
  - type: text
    content: God
  - type: text
    content: ', will comfort Zion,'
  - type: text
    content: comfort all her mounds of ruins.
  - type: text
    content: I’ll transform her dead ground into Eden,
  - type: text
    content: 'her moonscape into the garden of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: A place filled with exuberance and laughter,
  - type: text
    content: thankful voices and melodic songs.
  '12':
  - type: text
    content: “I, I’m the One comforting you.
  - type: text
    content: What are you afraid of—or who?
  - type: text
    content: Some man or woman who’ll soon be dead?
  - type: text
    content: Some poor wretch destined for dust?
  - type: text
    content: 'You’ve forgotten me, '
  - type: text
    content: God
  - type: text
    content: ', who made you,'
  - type: text
    content: who unfurled the skies, who founded the earth.
  - type: text
    content: And here you are, quaking like an aspen
  - type: text
    content: before the tantrums of a tyrant
  - type: text
    content: who thinks he can kick down the world.
  - type: text
    content: But what will come of the tantrums?
  - type: text
    content: The victims will be released before you know it.
  - type: text
    content: They’re not going to die.
  - type: text
    content: They’re not even going to go hungry.
  - type: text
    content: 'For I am '
  - type: text
    content: God
  - type: text
    content: ', your very own God,'
  - type: text
    content: who stirs up the sea and whips up the waves,
  - type: text
    content: 'named '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: I teach you how to talk, word by word,
  - type: text
    content: and personally watch over you,
  - type: text
    content: Even while I’m unfurling the skies,
  - type: text
    content: setting earth on solid foundations,
  - type: text
    content: 'and greeting Zion: ‘Welcome, my people!’”'
  '17':
  - type: text
    content: So wake up! Rub the sleep from your eyes!
  - type: text
    content: Up on your feet, Jerusalem!
  - type: text
    content: 'You’ve drunk the cup '
  - type: text
    content: God
  - type: text
    content: ' handed you,'
  - type: text
    content: the strong drink of his anger.
  - type: text
    content: You drank it down to the last drop,
  - type: text
    content: staggered and collapsed, dead-drunk.
  - type: text
    content: And nobody to help you home,
  - type: text
    content: no one among your friends or children
  - type: text
    content: to take you by the hand and put you in bed.
  - type: text
    content: You’ve been hit with a double dose of trouble
  - type: text
    content: —does anyone care?
  - type: text
    content: Assault and battery, hunger and death
  - type: text
    content: —will anyone comfort?
  - type: text
    content: Your sons and daughters have passed out,
  - type: text
    content: strewn in the streets like stunned rabbits,
  - type: text
    content: 'Sleeping off the strong drink of '
  - type: text
    content: God
  - type: text
    content: ’s anger,
  - type: text
    content: the rage of your God.
  '21':
  - type: text
    content: Therefore listen, please,
  - type: text
    content: you with your splitting headaches,
  - type: text
    content: You who are nursing the hangovers
  - type: text
    content: that didn’t come from drinking wine.
  - type: text
    content: 'Your Master, your '
  - type: text
    content: God
  - type: text
    content: ', has something to say,'
  - type: text
    content: 'your God has taken up his people’s case:'
  - type: text
    content: “Look, I’ve taken back the drink that sent you reeling.
  - type: text
    content: No more drinking from that jug of my anger!
  - type: text
    content: I’ve passed it over to your abusers to drink, those who ordered you,
  - type: text
    content: ‘Down on the ground so we can walk all over you!’
  - type: text
    content: And you had to do it. Flat on the ground,
  - type: text
    content: you were the dirt under their feet.”
  '4':
  - type: text
    content: “Pay attention, my people.
  - type: text
    content: Listen to me, nations.
  - type: text
    content: Revelation flows from me.
  - type: text
    content: My decisions light up the world.
  - type: text
    content: My deliverance arrives on the run,
  - type: text
    content: my salvation right on time.
  - type: text
    content: I’ll bring justice to the peoples.
  - type: text
    content: Even faraway islands will look to me
  - type: text
    content: and take hope in my saving power.
  - type: text
    content: Look up at the skies,
  - type: text
    content: ponder the earth under your feet.
  - type: text
    content: The skies will fade out like smoke,
  - type: text
    content: the earth will wear out like work pants,
  - type: text
    content: and the people will die off like flies.
  - type: text
    content: But my salvation will last forever,
  - type: text
    content: my setting-things-right will never be obsolete.
  '7':
  - type: text
    content: “Listen now, you who know right from wrong,
  - type: text
    content: 'you who hold my teaching inside you:'
  - type: text
    content: Pay no attention to insults, and when mocked
  - type: text
    content: don’t let it get you down.
  - type: text
    content: Those insults and mockeries are moth-eaten,
  - type: text
    content: from brains that are termite-ridden,
  - type: text
    content: But my setting-things-right lasts,
  - type: text
    content: my salvation goes on and on and on.”
  '9':
  - type: text
    content: 'Wake up, wake up, flex your muscles, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Wake up as in the old days, in the long ago.
  - type: text
    content: Didn’t you once make mincemeat of Rahab,
  - type: text
    content: dispatch the old chaos-dragon?
  - type: text
    content: And didn’t you once dry up the sea,
  - type: text
    content: the powerful waters of the deep,
  - type: text
    content: And then made the bottom of the ocean a road
  - type: text
    content: for the redeemed to walk across?
  - type: text
    content: 'In the same way '
  - type: text
    content: God
  - type: text
    content: ’s ransomed will come back,
  - type: text
    content: come back to Zion cheering, shouting,
  - type: text
    content: Joy eternal wreathing their heads,
  - type: text
    content: exuberant ecstasies transporting them—
  - type: text
    content: and not a sign of moans or groans.
  - type: heading
    content: What Are You Afraid of—or Who?
