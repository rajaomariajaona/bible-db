document_id: PRO.25,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Further Wise Sayings of Solomon
  - type: heading
    content: The Right Word at the Right Time
  - type: text
    content: There are also these proverbs of Solomon,
  - type: text
    content: collected by scribes of Hezekiah, king of Judah.
  '11':
  - type: text
    content: The right word at the right time
  - type: text
    content: is like a custom-made piece of jewelry,
  - type: text
    content: And a wise friend’s timely reprimand
  - type: text
    content: is like a gold ring slipped on your finger.
  '13':
  - type: text
    content: Reliable friends who do what they say
  - type: text
    content: are like cool drinks in sweltering heat—refreshing!
  '14':
  - type: text
    content: Like billowing clouds that bring no rain
  - type: text
    content: is the person who talks big but never produces.
  '15':
  - type: text
    content: Patient persistence pierces through indifference;
  - type: text
    content: gentle speech breaks down rigid defenses.
  - type: heading
    content: A Person Without Self-Control
  '16':
  - type: text
    content: When you’re given a box of candy, don’t gulp it all down;
  - type: text
    content: eat too much chocolate and you’ll make yourself sick;
  - type: text
    content: And when you find a friend, don’t outwear your welcome;
  - type: text
    content: show up at all hours and he’ll soon get fed up.
  '18':
  - type: text
    content: Anyone who tells lies against the neighbors
  - type: text
    content: in court or on the street is a loose cannon.
  '19':
  - type: text
    content: Trusting a double-crosser when you’re in trouble
  - type: text
    content: is like biting down on an abscessed tooth.
  '2':
  - type: text
    content: God delights in concealing things;
  - type: text
    content: scientists delight in discovering things.
  '20':
  - type: text
    content: Singing light songs to the heavyhearted
  - type: text
    content: is like pouring salt in their wounds.
  '21':
  - type: text
    content: If you see your enemy hungry, go buy him lunch;
  - type: text
    content: if he’s thirsty, bring him a drink.
  - type: text
    content: Your generosity will surprise him with goodness,
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' will look after you.'
  '23':
  - type: text
    content: A north wind brings stormy weather,
  - type: text
    content: and a gossipy tongue stormy looks.
  '24':
  - type: text
    content: Better to live alone in a tumbledown shack
  - type: text
    content: than share a mansion with a nagging spouse.
  '25':
  - type: text
    content: Like a cool drink of water when you’re worn out and weary
  - type: text
    content: is a letter from a long-lost friend.
  '26':
  - type: text
    content: A good person who gives in to a bad person
  - type: text
    content: is a muddied spring, a polluted well.
  '27':
  - type: text
    content: It’s not smart to stuff yourself with sweets,
  - type: text
    content: nor is glory piled on glory good for you.
  '28':
  - type: text
    content: A person without self-control
  - type: text
    content: is like a house with its doors and windows knocked out.
  '3':
  - type: text
    content: Like the horizons for breadth and the ocean for depth,
  - type: text
    content: the understanding of a good leader is broad and deep.
  '4':
  - type: text
    content: Remove impurities from the silver
  - type: text
    content: and the silversmith can craft a fine chalice;
  - type: text
    content: Remove the wicked from leadership
  - type: text
    content: and authority will be credible and God-honoring.
  '6':
  - type: text
    content: Don’t work yourself into the spotlight;
  - type: text
    content: don’t push your way into the place of prominence.
  - type: text
    content: It’s better to be promoted to a place of honor
  - type: text
    content: than face humiliation by being demoted.
  '8':
  - type: text
    content: Don’t jump to conclusions—there may be
  - type: text
    content: a perfectly good explanation for what you just saw.
  '9':
  - type: text
    content: In the heat of an argument,
  - type: text
    content: don’t betray confidences;
  - type: text
    content: Word is sure to get around,
  - type: text
    content: and no one will trust you.
