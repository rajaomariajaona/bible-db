document_id: PRO.25,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Further Wise Sayings of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Right Word at the Right Time
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: There are also these proverbs of Solomon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: collected by scribes of Hezekiah, king of Judah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: The right word at the right time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a custom-made piece of jewelry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a wise friend’s timely reprimand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a gold ring slipped on your finger.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Reliable friends who do what they say
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like cool drinks in sweltering heat—refreshing!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Like billowing clouds that bring no rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the person who talks big but never produces.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Patient persistence pierces through indifference;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gentle speech breaks down rigid defenses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Person Without Self-Control
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: When you’re given a box of candy, don’t gulp it all down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eat too much chocolate and you’ll make yourself sick;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when you find a friend, don’t outwear your welcome;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show up at all hours and he’ll soon get fed up.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Anyone who tells lies against the neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in court or on the street is a loose cannon.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Trusting a double-crosser when you’re in trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like biting down on an abscessed tooth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: God delights in concealing things;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scientists delight in discovering things.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Singing light songs to the heavyhearted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like pouring salt in their wounds.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: If you see your enemy hungry, go buy him lunch;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if he’s thirsty, bring him a drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your generosity will surprise him with goodness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will look after you.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: A north wind brings stormy weather,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a gossipy tongue stormy looks.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Better to live alone in a tumbledown shack
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than share a mansion with a nagging spouse.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Like a cool drink of water when you’re worn out and weary
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is a letter from a long-lost friend.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: A good person who gives in to a bad person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is a muddied spring, a polluted well.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: It’s not smart to stuff yourself with sweets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor is glory piled on glory good for you.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A person without self-control
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a house with its doors and windows knocked out.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Like the horizons for breadth and the ocean for depth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the understanding of a good leader is broad and deep.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: Remove impurities from the silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the silversmith can craft a fine chalice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove the wicked from leadership
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and authority will be credible and God-honoring.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: Don’t work yourself into the spotlight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t push your way into the place of prominence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to be promoted to a place of honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than face humiliation by being demoted.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Don’t jump to conclusions—there may be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a perfectly good explanation for what you just saw.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: In the heat of an argument,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t betray confidences;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Word is sure to get around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will trust you.
