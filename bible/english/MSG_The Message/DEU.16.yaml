document_id: DEU.16,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Observe the month of Abib by celebrating the Passover to '
  - type: text
    content: God
  - type: text
    content: ', your God. It was in the month of Abib that '
  - type: text
    content: God
  - type: text
    content: ', your God, delivered you by night from Egypt. Offer the Passover-Sacrifice to '
  - type: text
    content: God
  - type: text
    content: ', your God, at the place '
  - type: text
    content: God
  - type: text
    content: ' chooses to be worshiped by establishing his name there. Don’t eat yeast bread with it; for seven days eat it with unraised bread, hard-times bread, because you left Egypt in a hurry—that bread will keep the memory fresh of how you left Egypt for as long as you live. There is to be no sign of yeast anywhere for seven days. And don’t let any of the meat that you sacrifice in the evening be left over until morning.'
  '12':
  - type: text
    content: Don’t forget that you were once a slave in Egypt. So be diligent in observing these regulations.
  '13':
  - type: text
    content: 'Observe the Feast-of-Booths for seven days when you gather the harvest from your threshing-floor and your wine-vat. Rejoice at your festival: you, your son, your daughter, your servant, your maid, the Levite, the foreigner, and the orphans and widows who live in your neighborhood. Celebrate the Feast to '
  - type: text
    content: God
  - type: text
    content: ', your God, for seven days at the place '
  - type: text
    content: God
  - type: text
    content: ' designates. '
  - type: text
    content: God
  - type: text
    content: ', your God, has been blessing you in your harvest and in all your work, so make a day of it—really celebrate!'
  '16':
  - type: text
    content: 'All your men must appear before '
  - type: text
    content: God
  - type: text
    content: ', your God, three times each year at the place he designates: at the Feast-of-Unraised-Bread (Passover), at the Feast-of-Weeks, and at the Feast-of-Booths. No one is to show up in the Presence of '
  - type: text
    content: God
  - type: text
    content: ' empty-handed; each man must bring as much as he can manage, giving generously in response to the blessings of '
  - type: text
    content: God
  - type: text
    content: ', your God.'
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: 'Appoint judges and officers, organized by tribes, in all the towns that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you. They are to judge the people fairly and honestly. Don’t twist the law. Don’t play favorites. Don’t take a bribe—a bribe blinds even a wise person; it undermines the intentions of the best of people.'
  '20':
  - type: text
    content: 'The right! The right! Pursue only what’s right! It’s the only way you can really live and possess the land that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you.'
  - type: text
    content: '* * *'
  '21':
  - type: text
    content: 'Don’t plant fertility Asherah trees alongside the Altar of '
  - type: text
    content: God
  - type: text
    content: ', your God, that you build. Don’t set up phallic sex pillars—'
  - type: text
    content: God
  - type: text
    content: ', your God, hates them.'
  '5':
  - type: text
    content: 'Don’t sacrifice the Passover in any of the towns that '
  - type: text
    content: God
  - type: text
    content: ', your God, gives you other than the one '
  - type: text
    content: God
  - type: text
    content: ', your God, designates for worship; there and there only you will offer the Passover-Sacrifice at evening as the sun goes down, marking the time that you left Egypt. Boil and eat it at the place designated by '
  - type: text
    content: God
  - type: text
    content: ', your God. Then, at daybreak, turn around and go home.'
  '8':
  - type: text
    content: Eat unraised bread for six days. Set aside the seventh day as a holiday; don’t do any work.
  '9':
  - type: text
    content: 'Starting from the day you put the sickle to the ripe grain, count out seven weeks. Celebrate the Feast-of-Weeks to '
  - type: text
    content: God
  - type: text
    content: ', your God, by bringing your Freewill-Offering—give as generously as '
  - type: text
    content: God
  - type: text
    content: ', your God, has blessed you. Rejoice in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', your God: you, your son, your daughter, your servant, your maid, the Levite who lives in your neighborhood, the foreigner, the orphan and widow among you; rejoice at the place '
  - type: text
    content: God
  - type: text
    content: ', your God, will set aside to be worshiped.'
