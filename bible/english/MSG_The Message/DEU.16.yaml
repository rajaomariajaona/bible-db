document_id: DEU.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Observe the month of Abib by celebrating the Passover to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. It was in the month of Abib that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, delivered you by night from Egypt. Offer the Passover-Sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, at the place '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' chooses to be worshiped by establishing his name there. Don’t eat yeast bread with it; for seven days eat it with unraised bread, hard-times bread, because you left Egypt in a hurry—that bread will keep the memory fresh of how you left Egypt for as long as you live. There is to be no sign of yeast anywhere for seven days. And don’t let any of the meat that you sacrifice in the evening be left over until morning.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t forget that you were once a slave in Egypt. So be diligent in observing these regulations.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Observe the Feast-of-Booths for seven days when you gather the harvest from your threshing-floor and your wine-vat. Rejoice at your festival: you, your son, your daughter, your servant, your maid, the Levite, the foreigner, and the orphans and widows who live in your neighborhood. Celebrate the Feast to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, for seven days at the place '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' designates. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, has been blessing you in your harvest and in all your work, so make a day of it—really celebrate!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All your men must appear before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, three times each year at the place he designates: at the Feast-of-Unraised-Bread (Passover), at the Feast-of-Weeks, and at the Feast-of-Booths. No one is to show up in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' empty-handed; each man must bring as much as he can manage, giving generously in response to the blessings of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Appoint judges and officers, organized by tribes, in all the towns that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is giving you. They are to judge the people fairly and honestly. Don’t twist the law. Don’t play favorites. Don’t take a bribe—a bribe blinds even a wise person; it undermines the intentions of the best of people.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The right! The right! Pursue only what’s right! It’s the only way you can really live and possess the land that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is giving you.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t plant fertility Asherah trees alongside the Altar of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, that you build. Don’t set up phallic sex pillars—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, hates them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t sacrifice the Passover in any of the towns that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, gives you other than the one '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, designates for worship; there and there only you will offer the Passover-Sacrifice at evening as the sun goes down, marking the time that you left Egypt. Boil and eat it at the place designated by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. Then, at daybreak, turn around and go home.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eat unraised bread for six days. Set aside the seventh day as a holiday; don’t do any work.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Starting from the day you put the sickle to the ripe grain, count out seven weeks. Celebrate the Feast-of-Weeks to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, by bringing your Freewill-Offering—give as generously as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, has blessed you. Rejoice in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God: you, your son, your daughter, your servant, your maid, the Levite who lives in your neighborhood, the foreigner, the orphan and widow among you; rejoice at the place '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, will set aside to be worshiped.'
