document_id: 1PE.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Learn to Think Like Him
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Since Jesus went through everything you’re going through and more, learn to think like him. Think of your sufferings as a weaning from that old sinful habit of always expecting to get your own way. Then you’ll be able to live out your days free to pursue what God wants instead of being tyrannized by what you want.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: You’ve already put in your time in that God-ignorant way of life, partying night after night, a drunken and profligate life. Now it’s time to be done with it for good. Of course, your old friends don’t understand why you don’t join in with the old gang anymore. But you don’t have to give an account to them. They’re the ones who will be called on the carpet—and before God himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Listen to the Message. It was preached to those believers who are now dead, and yet even though they died (just as all people must), they will still get in on the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: life
  - type: text
    text: ' that God has given in Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-11
  - type: text
    text: 'Everything in the world is about to be wrapped up, so take nothing for granted. Stay wide-awake in prayer. Most of all, love each other as if your life depended on it. Love makes up for practically anything. Be quick to give a meal to the hungry, a bed to the homeless—cheerfully. Be generous with the different things God gave you, passing them around so all get in on it: if words, let it be God’s words; if help, let it be God’s hearty help. That way, God’s bright presence will be evident in everything through Jesus, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he’ll
  - type: text
    text: ' get all the credit as the One mighty in everything—encores to the end of time. Oh, yes!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Glory Just Around the Corner
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Friends, when life gets really difficult, don’t jump to the conclusion that God isn’t on the job. Instead, be glad that you are in the very thick of what Christ experienced. This is a spiritual refining process, with glory just around the corner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: If you’re abused because of Christ, count yourself fortunate. It’s the Spirit of God and his glory in you that brought you to the notice of others. If they’re on you because you broke the law or disturbed the peace, that’s a different matter. But if it’s because you’re a Christian, don’t give it a second thought. Be proud of the distinguished status reflected in that name!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: It’s judgment time for God’s own family. We’re first in line. If it starts with us, think what it’s going to be like for those who refuse God’s Message!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If good people barely make it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s in store for the bad?
- type: usfm
  marker: m
  children:
  - type: text
    text: So if you find life difficult because you’re doing what God said, take it in stride. Trust him. He knows what he’s doing, and he’ll keep on doing it.
