document_id: MIC.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Haters of Good, Lovers of Evil
  - type: text
    content: 'Then I said:'
  - type: text
    content: '“Listen, leaders of Jacob, leaders of Israel:'
  - type: text
    content: Don’t you know anything of justice?
  - type: text
    content: 'Haters of good, lovers of evil:'
  - type: text
    content: Isn’t justice in your job description?
  - type: text
    content: But you skin my people alive.
  - type: text
    content: You rip the meat off their bones.
  - type: text
    content: You break up the bones, chop the meat,
  - type: text
    content: and throw it in a pot for cannibal stew.”
  '4':
  - type: text
    content: The time’s coming, though, when these same leaders
  - type: text
    content: 'will cry out for help to '
  - type: text
    content: God
  - type: text
    content: ', but he won’t listen.'
  - type: text
    content: He’ll turn his face the other way
  - type: text
    content: because of their history of evil.
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: 'Here is '
  - type: text
    content: God
  - type: text
    content: ’s Message to the prophets,
  - type: text
    content: 'the preachers who lie to my people:'
  - type: text
    content: “For as long as they’re well paid and well fed,
  - type: text
    content: the prophets preach, ‘Isn’t life wonderful! Peace to all!’
  - type: text
    content: But if you don’t pay up and jump on their bandwagon,
  - type: text
    content: their ‘God bless you’ turns into ‘God damn you.’
  - type: text
    content: Therefore, you’re going blind. You’ll see nothing.
  - type: text
    content: You’ll live in deep shadows and know nothing.
  - type: text
    content: The sun has set on the prophets.
  - type: text
    content: They’ve had their day; from now on it’s night.
  - type: text
    content: Visionaries will be confused,
  - type: text
    content: experts will be all mixed up.
  - type: text
    content: They’ll hide behind their reputations and make lame excuses
  - type: text
    content: to cover up their God-ignorance.”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'But me—I’m filled with '
  - type: text
    content: God
  - type: text
    content: ’s power,
  - type: text
    content: 'filled with '
  - type: text
    content: God
  - type: text
    content: ’s Spirit of justice and strength,
  - type: text
    content: Ready to confront Jacob’s crime
  - type: text
    content: and Israel’s sin.
  '9':
  - type: text
    content: The leaders of Jacob and
  - type: text
    content: the leaders of Israel are
  - type: text
    content: Leaders contemptuous of justice,
  - type: text
    content: who twist and distort right living,
  - type: text
    content: Leaders who build Zion by killing people,
  - type: text
    content: who expand Jerusalem by committing crimes.
  - type: text
    content: Judges sell verdicts to the highest bidder,
  - type: text
    content: priests mass-market their teaching,
  - type: text
    content: prophets preach for high fees,
  - type: text
    content: All the while posturing and pretending
  - type: text
    content: 'dependence on '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“We’ve got '
  - type: text
    content: God
  - type: text
    content: ' on our side.'
  - type: text
    content: He’ll protect us from disaster.”
  - type: text
    content: Because of people like you,
  - type: text
    content: Zion will be turned back into farmland,
  - type: text
    content: Jerusalem end up as a pile of rubble,
  - type: text
    content: and instead of the Temple on the mountain,
  - type: text
    content: a few scraggly scrub pines.
