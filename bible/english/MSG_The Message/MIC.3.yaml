document_id: MIC.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haters of Good, Lovers of Evil
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'Then I said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Listen, leaders of Jacob, leaders of Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you know anything of justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Haters of good, lovers of evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Isn’t justice in your job description?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you skin my people alive.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You rip the meat off their bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You break up the bones, chop the meat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw it in a pot for cannibal stew.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The time’s coming, though, when these same leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will cry out for help to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', but he won’t listen.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll turn his face the other way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of their history of evil.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: 'Here is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message to the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the preachers who lie to my people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For as long as they’re well paid and well fed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the prophets preach, ‘Isn’t life wonderful! Peace to all!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you don’t pay up and jump on their bandwagon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their ‘God bless you’ turns into ‘God damn you.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, you’re going blind. You’ll see nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll live in deep shadows and know nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun has set on the prophets.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ve had their day; from now on it’s night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Visionaries will be confused,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: experts will be all mixed up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll hide behind their reputations and make lame excuses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to cover up their God-ignorance.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But me—I’m filled with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'filled with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Spirit of justice and strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ready to confront Jacob’s crime
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel’s sin.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: The leaders of Jacob and
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leaders of Israel are
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leaders contemptuous of justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who twist and distort right living,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leaders who build Zion by killing people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who expand Jerusalem by committing crimes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judges sell verdicts to the highest bidder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: priests mass-market their teaching,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prophets preach for high fees,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the while posturing and pretending
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'dependence on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“We’ve got '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' on our side.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll protect us from disaster.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of people like you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion will be turned back into farmland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem end up as a pile of rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and instead of the Temple on the mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a few scraggly scrub pines.
