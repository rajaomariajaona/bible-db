type_code: eng
verses:
  '1':
  - type: heading
    content: Who Out There Fears God?
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “Can you produce your mother’s divorce papers
  - type: text
    content: proving I got rid of her?
  - type: text
    content: Can you produce a receipt
  - type: text
    content: proving I sold you?
  - type: text
    content: Of course you can’t.
  - type: text
    content: It’s your sins that put you here,
  - type: text
    content: your wrongs that got you shipped out.
  - type: text
    content: So why didn’t anyone come when I knocked?
  - type: text
    content: Why didn’t anyone answer when I called?
  - type: text
    content: Do you think I’ve forgotten how to help?
  - type: text
    content: Am I so decrepit that I can’t deliver?
  - type: text
    content: I’m as powerful as ever,
  - type: text
    content: 'and can reverse what I once did:'
  - type: text
    content: I can dry up the sea with a word,
  - type: text
    content: turn river water into desert sand,
  - type: text
    content: And leave the fish stinking in the sun,
  - type: text
    content: stranded on dry land . . .
  - type: text
    content: Turn all the lights out in the sky
  - type: text
    content: and pull down the curtain.”
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: 'Who out there fears '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: actually listens to the voice of his servant?
  - type: text
    content: For anyone out there who doesn’t know where you’re going,
  - type: text
    content: anyone groping in the dark,
  - type: text
    content: 'Here’s what: Trust in '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Lean
  - type: text
    content: ' on your God!'
  - type: text
    content: But if all you’re after is making trouble,
  - type: text
    content: playing with fire,
  - type: text
    content: Go ahead and see where it gets you.
  - type: text
    content: Set your fires, stir people up, blow on the flames,
  - type: text
    content: But don’t expect me to just stand there and watch.
  - type: text
    content: I’ll hold your feet to those flames.
  '4':
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: ', has given me'
  - type: text
    content: a well-taught tongue,
  - type: text
    content: So I know how to encourage tired people.
  - type: text
    content: He wakes me up in the morning,
  - type: text
    content: Wakes me up, opens my ears
  - type: text
    content: to listen as one ready to take orders.
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: ', opened my ears,'
  - type: text
    content: and I didn’t go back to sleep,
  - type: text
    content: didn’t pull the covers back over my head.
  - type: text
    content: I followed orders,
  - type: text
    content: stood there and took it while they beat me,
  - type: text
    content: held steady while they pulled out my beard,
  - type: text
    content: Didn’t dodge their insults,
  - type: text
    content: faced them as they spit in my face.
  - type: text
    content: 'And the Master, '
  - type: text
    content: God
  - type: text
    content: ', stays right there and helps me,'
  - type: text
    content: so I’m not disgraced.
  - type: text
    content: Therefore I set my face like flint,
  - type: text
    content: confident that I’ll never regret this.
  - type: text
    content: My champion is right here.
  - type: text
    content: Let’s take our stand together!
  - type: text
    content: Who dares bring suit against me?
  - type: text
    content: Let him try!
  - type: text
    content: 'Look! the Master, '
  - type: text
    content: God
  - type: text
    content: ', is right here.'
  - type: text
    content: Who would dare call me guilty?
  - type: text
    content: Look! My accusers are a clothes bin of threadbare
  - type: text
    content: socks and shirts, fodder for moths!
  - type: text
    content: '* * *'
