document_id: ISA.50,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Who Out There Fears '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can you produce your mother’s divorce papers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proving I got rid of her?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you produce a receipt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proving I sold you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of course you can’t.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s your sins that put you here,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your wrongs that got you shipped out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why didn’t anyone come when I knocked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why didn’t anyone answer when I called?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I’ve forgotten how to help?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Am I so decrepit that I can’t deliver?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m as powerful as ever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and can reverse what I once did:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can dry up the sea with a word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn river water into desert sand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leave the fish stinking in the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stranded on dry land . . .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn all the lights out in the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pull down the curtain.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who out there fears '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: actually listens to the voice of his servant?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For anyone out there who doesn’t know where you’re going,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anyone groping in the dark,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here’s what: Trust in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lean
    - type: text
      text: ' on your God!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if all you’re after is making trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: playing with fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead and see where it gets you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Set your fires, stir people up, blow on the flames,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t expect me to just stand there and watch.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll hold your feet to those flames.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', has given me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a well-taught tongue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I know how to encourage tired people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He wakes me up in the morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wakes me up, opens my ears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to listen as one ready to take orders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', opened my ears,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I didn’t go back to sleep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: didn’t pull the covers back over my head.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I followed orders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stood there and took it while they beat me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: held steady while they pulled out my beard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Didn’t dodge their insults,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: faced them as they spit in my face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', stays right there and helps me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I’m not disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I set my face like flint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: confident that I’ll never regret this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My champion is right here.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s take our stand together!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who dares bring suit against me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him try!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look! the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', is right here.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who would dare call me guilty?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! My accusers are a clothes bin of threadbare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: socks and shirts, fodder for moths!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
