document_id: HOS.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Despite All the Signs, Israel Ignores '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: “Every time I gave Israel a fresh start,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wiped the slate clean and got them going again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim soon filled the slate with new sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the treachery of Samaria written out in bold print.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Two-faced and double-tongued,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they steal you blind, pick you clean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It never crosses their mind
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I keep account of their every crime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re mud-spattered head to toe with the residue of sin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see who they are and what they’ve done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: “They entertain the king with their evil circus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: delight the princes with their acrobatic lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re a bunch of overheated adulterers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an oven that holds its heat
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the kneading of the dough
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the rising of the bread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the royal holiday the princes get drunk
- type: usfm
  marker: q2
  children:
  - type: text
    text: on wine and the frenzy of the mocking mob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re like wood stoves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: red-hot with lust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through the night their passion is banked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the morning it blazes up, flames hungrily licking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Murderous and volcanic,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they incinerate their rulers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their kings fall one by one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one pays any attention to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: “Ephraim mingles with the pagans, dissipating himself.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim is half-baked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strangers suck him dry
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he doesn’t even notice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His hair has turned gray—
- type: usfm
  marker: q2
  children:
  - type: text
    text: he doesn’t notice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bloated by arrogance, big as a house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s a public disgrace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Israel lumbers along oblivious to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'despite all the signs, ignoring '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-16
  - type: text
    text: “Ephraim is bird-brained,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mindless, clueless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: First chirping after Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then fluttering after Assyria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll throw my net over them. I’ll clip their wings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll teach them to mind me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doom! They’ve run away from home.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Now they’re '
  - type: usfm
    marker: it
    children:
    - type: text
      text: really
  - type: text
    text: ' in trouble! They’ve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: defied
  - type: text
    text: ' me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’m supposed to help them
- type: usfm
  marker: q2
  children:
  - type: text
    text: while they feed me a line of lies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead of crying out to me in heartfelt prayer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they whoop it up in bed with their whores,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gash themselves bloody in their sex-and-religion orgies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but turn their backs on me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m the one who gave them good minds and healthy bodies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how am I repaid? With evil scheming!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They turn, but not to me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn here, then there, like a weather vane.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their rulers will be cut down, murdered—
- type: usfm
  marker: q2
  children:
  - type: text
    text: just deserts for their mocking blasphemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the final sentence?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ridicule in the court of world opinion.”
