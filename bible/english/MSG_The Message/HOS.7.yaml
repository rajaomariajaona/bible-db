verses:
  '1':
  - type: heading
    content: Despite All the Signs, Israel Ignores God
  - type: text
    content: “Every time I gave Israel a fresh start,
  - type: text
    content: wiped the slate clean and got them going again,
  - type: text
    content: Ephraim soon filled the slate with new sins,
  - type: text
    content: the treachery of Samaria written out in bold print.
  - type: text
    content: Two-faced and double-tongued,
  - type: text
    content: they steal you blind, pick you clean.
  - type: text
    content: It never crosses their mind
  - type: text
    content: that I keep account of their every crime.
  - type: text
    content: They’re mud-spattered head to toe with the residue of sin.
  - type: text
    content: I see who they are and what they’ve done.
  '11':
  - type: text
    content: “Ephraim is bird-brained,
  - type: text
    content: mindless, clueless,
  - type: text
    content: First chirping after Egypt,
  - type: text
    content: then fluttering after Assyria.
  - type: text
    content: I’ll throw my net over them. I’ll clip their wings.
  - type: text
    content: I’ll teach them to mind me!
  - type: text
    content: Doom! They’ve run away from home.
  - type: text
    content: 'Now they’re '
  - type: text
    content: really
  - type: text
    content: ' in trouble! They’ve '
  - type: text
    content: defied
  - type: text
    content: ' me.'
  - type: text
    content: And I’m supposed to help them
  - type: text
    content: while they feed me a line of lies?
  - type: text
    content: Instead of crying out to me in heartfelt prayer,
  - type: text
    content: they whoop it up in bed with their whores,
  - type: text
    content: Gash themselves bloody in their sex-and-religion orgies,
  - type: text
    content: but turn their backs on me.
  - type: text
    content: I’m the one who gave them good minds and healthy bodies,
  - type: text
    content: and how am I repaid? With evil scheming!
  - type: text
    content: They turn, but not to me—
  - type: text
    content: turn here, then there, like a weather vane.
  - type: text
    content: Their rulers will be cut down, murdered—
  - type: text
    content: just deserts for their mocking blasphemies.
  - type: text
    content: And the final sentence?
  - type: text
    content: Ridicule in the court of world opinion.”
  '3':
  - type: text
    content: “They entertain the king with their evil circus,
  - type: text
    content: delight the princes with their acrobatic lies.
  - type: text
    content: They’re a bunch of overheated adulterers,
  - type: text
    content: like an oven that holds its heat
  - type: text
    content: From the kneading of the dough
  - type: text
    content: to the rising of the bread.
  - type: text
    content: On the royal holiday the princes get drunk
  - type: text
    content: on wine and the frenzy of the mocking mob.
  - type: text
    content: They’re like wood stoves,
  - type: text
    content: red-hot with lust.
  - type: text
    content: Through the night their passion is banked;
  - type: text
    content: in the morning it blazes up, flames hungrily licking.
  - type: text
    content: Murderous and volcanic,
  - type: text
    content: they incinerate their rulers.
  - type: text
    content: Their kings fall one by one,
  - type: text
    content: and no one pays any attention to me.
  '8':
  - type: text
    content: “Ephraim mingles with the pagans, dissipating himself.
  - type: text
    content: Ephraim is half-baked.
  - type: text
    content: Strangers suck him dry
  - type: text
    content: but he doesn’t even notice.
  - type: text
    content: His hair has turned gray—
  - type: text
    content: he doesn’t notice.
  - type: text
    content: Bloated by arrogance, big as a house,
  - type: text
    content: Israel’s a public disgrace.
  - type: text
    content: 'Israel lumbers along oblivious to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'despite all the signs, ignoring '
  - type: text
    content: God
