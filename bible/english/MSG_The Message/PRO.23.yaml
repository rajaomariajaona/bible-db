document_id: PRO.23,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Restrain Yourself
  - type: heading
    content: '6'
  - type: text
    content: When you go out to dinner with an influential person,
  - type: text
    content: 'mind your manners:'
  - type: text
    content: Don’t gobble your food,
  - type: text
    content: don’t talk with your mouth full.
  - type: text
    content: And don’t stuff yourself;
  - type: text
    content: bridle your appetite.
  - type: heading
    content: '7'
  '10':
  - type: text
    content: Don’t stealthily move back the boundary lines
  - type: text
    content: or cheat orphans out of their property,
  - type: text
    content: For they have a powerful Advocate
  - type: text
    content: who will go to bat for them.
  - type: heading
    content: '11'
  '12':
  - type: text
    content: Give yourselves to disciplined instruction;
  - type: text
    content: open your ears to tested knowledge.
  - type: heading
    content: '12'
  '13':
  - type: text
    content: Don’t be afraid to correct your young ones;
  - type: text
    content: a spanking won’t kill them.
  - type: text
    content: A good spanking, in fact, might save them
  - type: text
    content: from something worse than death.
  - type: heading
    content: '13'
  '15':
  - type: text
    content: Dear child, if you become wise,
  - type: text
    content: I’ll be one happy parent.
  - type: text
    content: My heart will dance and sing
  - type: text
    content: to the tuneful truth you’ll speak.
  - type: heading
    content: '14'
  '17':
  - type: text
    content: Don’t for a minute envy careless rebels;
  - type: text
    content: soak yourself in the Fear-of-
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: That’s
  - type: text
    content: ' where your future lies.'
  - type: text
    content: Then
  - type: text
    content: ' you won’t be left with an armload of nothing.'
  - type: heading
    content: '15'
  '19':
  - type: text
    content: Oh listen, dear child—become wise;
  - type: text
    content: point your life in the right direction.
  - type: text
    content: Don’t drink too much wine and get drunk;
  - type: text
    content: don’t eat too much food and get fat.
  - type: text
    content: Drunks and gluttons will end up on skid row,
  - type: text
    content: in a stupor and dressed in rags.
  - type: heading
    content: Buy Wisdom, Education, Insight
  - type: heading
    content: '16'
  '22':
  - type: text
    content: Listen with respect to the father who raised you,
  - type: text
    content: and when your mother grows old, don’t neglect her.
  - type: text
    content: Buy truth—don’t sell it for love or money;
  - type: text
    content: buy wisdom, buy education, buy insight.
  - type: text
    content: Parents rejoice when their children turn out well;
  - type: text
    content: wise children become proud parents.
  - type: text
    content: So make your father happy!
  - type: text
    content: Make your mother proud!
  - type: heading
    content: '17'
  '26':
  - type: text
    content: Dear child, I want your full attention;
  - type: text
    content: please do what I show you.
  '27':
  - type: text
    content: A prostitute is a bottomless pit;
  - type: text
    content: a loose woman can get you in deep trouble fast.
  - type: text
    content: She’ll take you for all you’ve got;
  - type: text
    content: she’s worse than a pack of thieves.
  - type: heading
    content: '18'
  '29':
  - type: text
    content: Who are the people who are always crying the blues?
  - type: text
    content: Who do you know who reeks of self-pity?
  - type: text
    content: Who keeps getting beaten up for no reason at all?
  - type: text
    content: Whose eyes are bleary and bloodshot?
  - type: text
    content: It’s those who spend the night with a bottle,
  - type: text
    content: for whom drinking is serious business.
  - type: text
    content: Don’t judge wine by its label,
  - type: text
    content: or its bouquet, or its full-bodied flavor.
  - type: text
    content: Judge it rather by the hangover it leaves you with—
  - type: text
    content: the splitting headache, the queasy stomach.
  - type: text
    content: Do you really prefer seeing double,
  - type: text
    content: with your speech all slurred,
  - type: text
    content: Reeling and seasick,
  - type: text
    content: drunk as a sailor?
  - type: text
    content: “They hit me,” you’ll say, “but it didn’t hurt;
  - type: text
    content: they beat on me, but I didn’t feel a thing.
  - type: text
    content: When I’m sober enough to manage it,
  - type: text
    content: bring me another drink!”
  '4':
  - type: text
    content: Don’t wear yourself out trying to get rich;
  - type: text
    content: restrain yourself!
  - type: text
    content: Riches disappear in the blink of an eye;
  - type: text
    content: wealth sprouts wings
  - type: text
    content: and flies off into the wild blue yonder.
  - type: heading
    content: '8'
  '6':
  - type: text
    content: Don’t accept a meal from a tightwad;
  - type: text
    content: don’t expect anything special.
  - type: text
    content: He’ll be as stingy with you as he is with himself;
  - type: text
    content: he’ll say, “Eat! Drink!” but won’t mean a word of it.
  - type: text
    content: His miserly serving will turn your stomach
  - type: text
    content: when you realize the meal’s a sham.
  - type: heading
    content: '9'
  '9':
  - type: text
    content: Don’t bother talking sense to fools;
  - type: text
    content: they’ll only poke fun at your words.
  - type: heading
    content: '10'
