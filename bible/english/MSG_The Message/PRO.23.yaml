document_id: PRO.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restrain Yourself
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '6'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: When you go out to dinner with an influential person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'mind your manners:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t gobble your food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t talk with your mouth full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t stuff yourself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bridle your appetite.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '7'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Don’t stealthily move back the boundary lines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or cheat orphans out of their property,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have a powerful Advocate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will go to bat for them.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '11'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Give yourselves to disciplined instruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: open your ears to tested knowledge.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '12'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: Don’t be afraid to correct your young ones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a spanking won’t kill them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good spanking, in fact, might save them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from something worse than death.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '13'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: Dear child, if you become wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll be one happy parent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart will dance and sing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the tuneful truth you’ll speak.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '14'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: Don’t for a minute envy careless rebels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soak yourself in the Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That’s
    - type: text
      text: ' where your future lies.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' you won’t be left with an armload of nothing.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '15'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: Oh listen, dear child—become wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: point your life in the right direction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t drink too much wine and get drunk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t eat too much food and get fat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drunks and gluttons will end up on skid row,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a stupor and dressed in rags.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Buy Wisdom, Education, Insight
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '16'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-25
    - type: text
      text: Listen with respect to the father who raised you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when your mother grows old, don’t neglect her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Buy truth—don’t sell it for love or money;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buy wisdom, buy education, buy insight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parents rejoice when their children turn out well;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wise children become proud parents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So make your father happy!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make your mother proud!
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '17'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dear child, I want your full attention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: please do what I show you.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: A prostitute is a bottomless pit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a loose woman can get you in deep trouble fast.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’ll take you for all you’ve got;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she’s worse than a pack of thieves.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '18'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-35
    - type: text
      text: Who are the people who are always crying the blues?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who do you know who reeks of self-pity?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who keeps getting beaten up for no reason at all?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose eyes are bleary and bloodshot?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s those who spend the night with a bottle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for whom drinking is serious business.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t judge wine by its label,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or its bouquet, or its full-bodied flavor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judge it rather by the hangover it leaves you with—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the splitting headache, the queasy stomach.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you really prefer seeing double,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your speech all slurred,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reeling and seasick,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drunk as a sailor?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They hit me,” you’ll say, “but it didn’t hurt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they beat on me, but I didn’t feel a thing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I’m sober enough to manage it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring me another drink!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: Don’t wear yourself out trying to get rich;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: restrain yourself!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Riches disappear in the blink of an eye;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wealth sprouts wings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flies off into the wild blue yonder.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '8'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: Don’t accept a meal from a tightwad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t expect anything special.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll be as stingy with you as he is with himself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’ll say, “Eat! Drink!” but won’t mean a word of it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His miserly serving will turn your stomach
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you realize the meal’s a sham.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '9'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Don’t bother talking sense to fools;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll only poke fun at your words.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '10'
    marker-yv: yv-h
