document_id: 2SA.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'Some time later, this happened: Absalom, David’s son, had a sister who was very attractive. Her name was Tamar. Amnon, also David’s son, was in love with her. Amnon was obsessed with his sister Tamar to the point of making himself sick over her. She was a virgin, so he couldn’t see how he could get his hands on her. Amnon had a good friend, Jonadab, the son of David’s brother Shimeah. Jonadab was exceptionally streetwise. He said to Amnon, “Why are you moping around like this, day after day—you, the son of the king! Tell me what’s eating at you.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “In a word, Tamar,” said Amnon. “My brother Absalom’s sister. I’m in love with her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Here’s what you do,” said Jonadab. “Go to bed and pretend you’re sick. When your father comes to visit you, say, ‘Have my sister Tamar come and prepare some supper for me here where I can watch her and she can feed me.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Amnon took to his bed and acted sick. When the king came to visit, Amnon said, “Would you do me a favor? Have my sister Tamar come and make some nourishing dumplings here where I can watch her and be fed by her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David sent word to Tamar who was home at the time: “Go to the house of your brother Amnon and prepare a meal for him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9a
  - type: text
    text: ' So Tamar went to her brother Amnon’s house. She took dough, kneaded it, formed it into dumplings, and cooked them while he watched from his bed. But when she took the cooking pot and served him, he wouldn’t eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9b-11
  - type: text
    text: ' Amnon said, “Clear everyone out of the house,” and they all cleared out. Then he said to Tamar, “Bring the food into my bedroom, where we can eat in privacy.” She took the nourishing dumplings she had prepared and brought them to her brother Amnon in his bedroom. But when she got ready to feed him, he grabbed her and said, “Come to bed with me, sister!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: “No, brother!” she said, “Don’t hurt me! This kind of thing isn’t done in Israel! Don’t do this terrible thing! Where could I ever show my face? And you—you’ll be out on the street in disgrace. Oh, please! Speak to the king—he’ll let you marry me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But he wouldn’t listen. Being much stronger than she, he raped her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: No sooner had Amnon raped her than he hated her—an immense hatred. The hatred that he felt for her was greater than the love he’d had for her. “Get up,” he said, “and get out!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18a
  - type: text
    text: ' “Oh no, brother,” she said. “Please! This is an even worse evil than what you just did to me!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: But he wouldn’t listen to her. He called for his valet. “Get rid of this woman. Get her out of my sight! And lock the door after her.” The valet threw her out and locked the door behind her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18b-19
  - type: text
    text: ' She was wearing a long-sleeved gown. (That’s how virgin princesses used to dress from early adolescence on.) Tamar poured ashes on her head, then she ripped the long-sleeved gown, held her head in her hands, and walked away, sobbing as she went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Her brother Absalom said to her, “Has your brother Amnon had his way with you? Now, my dear sister, let’s keep it quiet—a family matter. He is, after all, your brother. Don’t take this so hard.” Tamar lived in her brother Absalom’s home, bitter and desolate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: King David heard the whole story and was enraged, but he didn’t discipline Amnon. David doted on him because he was his firstborn. Absalom quit speaking to Amnon—not a word, whether good or bad—because he hated him for violating his sister Tamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: Two years went by. One day Absalom threw a sheep-shearing party in Baal Hazor in the vicinity of Ephraim and invited all the king’s sons. He also went to the king and invited him. “Look, I’m throwing a sheep-shearing party. Come, and bring your servants.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But the king said, “No, son—not this time, and not the whole household. We’d just be a burden to you.” Absalom pushed, but David wouldn’t budge. But he did give him his blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: Then Absalom said, “Well, if you won’t come, at least let my brother Amnon come.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “And why,” said the king, “should he go with you?” But Absalom was so insistent that he gave in and let Amnon and all the rest of the king’s sons go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Absalom prepared a banquet fit for a king. Then he instructed his servants, “Look sharp, now. When Amnon is well into the sauce and feeling no pain, and I give the order ‘Strike Amnon,’ kill him. And don’t be afraid—I’m the one giving the command. Courage! You can do it!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: 'Absalom’s servants did to Amnon exactly what their master ordered. All the king’s sons got out as fast as they could, jumped on their mules, and rode off. While they were still on the road, a rumor came to the king: “Absalom just killed all the king’s sons—not one is left!” The king stood up, ripped his clothes to shreds, and threw himself on the floor. All his servants who were standing around at the time did the same.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: Just then, Jonadab, his brother Shimeah’s son, stepped up. “My master must not think that all the young men, the king’s sons, are dead. Only Amnon is dead. This happened because of Absalom’s outrage since the day that Amnon violated his sister Tamar. So my master, the king, mustn’t make things worse than they are, thinking that all your sons are dead. Only Amnon is dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Absalom fled.
- type: usfm
  marker: p
  children:
  - type: text
    text: Just then the sentry on duty looked up and saw a cloud of dust on the road from Horonaim alongside the mountain. He came and told the king, “I’ve just seen a bunch of men on the Horonaim road, coming around the mountain.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-37a
  - type: text
    text: ' Then Jonadab exclaimed to the king, “See! It’s the king’s sons coming, just as I said!” He had no sooner said the words than the king’s sons burst in—loud laments and weeping! The king joined in, along with all the servants—loud weeping, many tears. David mourned the death of his son a long time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37b-39
  - type: text
    text: ' When Absalom fled, he went to Talmai son of Ammihud, king of Geshur. He was there three years. The king finally gave up trying to get back at Absalom. He had come to terms with Amnon’s death.'
