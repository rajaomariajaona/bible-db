document_id: GEN.21,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' visited Sarah exactly as he said he would; '
  - type: text
    content: God
  - type: text
    content: ' did to Sarah what he promised: Sarah became pregnant and gave Abraham a son in his old age, and at the very time God had set. Abraham named him Isaac. When his son was eight days old, Abraham circumcised him just as God had commanded.'
  '11':
  - type: text
    content: The matter gave great pain to Abraham—after all, Ishmael was his son. But God spoke to Abraham, “Don’t feel badly about the boy and your maid. Do whatever Sarah tells you. Your descendants will come through Isaac. Regarding your maid’s son, be assured that I’ll also develop a great nation from him—he’s your son, too.”
  '14':
  - type: text
    content: Abraham got up early the next morning, got some food together and a canteen of water for Hagar, put them on her back and sent her away with the child. She wandered off into the desert of Beersheba. When the water was gone, she left the child under a shrub and went off, fifty yards or so. She said, “I can’t watch my son die.” As she sat, she broke into sobs.
  '17':
  - type: text
    content: Meanwhile, God heard the boy crying. The angel of God called from Heaven to Hagar, “What’s wrong, Hagar? Don’t be afraid. God has heard the boy and knows the fix he’s in. Up now; go get the boy. Hold him tight. I’m going to make of him a great nation.”
  '19':
  - type: text
    content: Just then God opened her eyes. She looked. She saw a well of water. She went to it and filled her canteen and gave the boy a long, cool drink.
  '20':
  - type: text
    content: God was on the boy’s side as he grew up. He lived out in the desert and became a skilled archer. He lived in the Paran wilderness. And his mother got him a wife from Egypt.
  '22':
  - type: text
    content: 'At about that same time, Abimelech and the captain of his troops, Phicol, spoke to Abraham: “No matter what you do, God is on your side. So swear to me that you won’t do anything underhanded to me or any of my family. For as long as you live here, swear that you’ll treat me and my land as well as I’ve treated you.”'
  '24':
  - type: text
    content: Abraham said, “I swear it.”
  '25':
  - type: text
    content: At the same time, Abraham confronted Abimelech over the matter of a well of water that Abimelech’s servants had taken. Abimelech said, “I have no idea who did this; you never told me about it; this is the first I’ve heard of it.”
  '27':
  - type: text
    content: So the two of them made a covenant. Abraham took sheep and cattle and gave them to Abimelech. Abraham set aside seven sheep from his flock.
  '29':
  - type: text
    content: Abimelech said, “What does this mean? These seven sheep you’ve set aside.”
  '30':
  - type: text
    content: Abraham said, “It means that when you accept these seven sheep, you take it as proof that I dug this well, that it’s my well.”
  '31':
  - type: text
    content: That’s how the place got named Beersheba (the Oath-Well), because the two of them swore a covenant oath there. After they had made the covenant at Beersheba, Abimelech and his commander, Phicol, left and went back to Philistine territory.
  '33':
  - type: text
    content: 'Abraham planted a tamarisk tree in Beersheba and worshiped '
  - type: text
    content: God
  - type: text
    content: ' there, praying to the Eternal God. Abraham lived in Philistine country for a long time.'
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: Abraham was a hundred years old when his son Isaac was born.
  - type: text
    content: Sarah said,
  - type: text
    content: God has blessed me with laughter
  - type: text
    content: and all who get the news will laugh with me!
  '7':
  - type: text
    content: She also said,
  - type: text
    content: Whoever would have suggested to Abraham
  - type: text
    content: that Sarah would one day nurse a baby!
  - type: text
    content: Yet here I am! I’ve given the old man a son!
  '8':
  - type: text
    content: The baby grew and was weaned. Abraham threw a big party on the day Isaac was weaned.
  '9':
  - type: text
    content: One day Sarah saw the son that Hagar the Egyptian had borne to Abraham, poking fun at her son Isaac. She told Abraham, “Get rid of this slave woman and her son. No child of this slave is going to share inheritance with my son Isaac!”
