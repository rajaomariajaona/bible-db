document_id: HOS.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Come Back! Return to Your God!
  - type: text
    content: 'O Israel, come back! Return to your '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: You’re down but you’re not out.
  - type: text
    content: Prepare your confession
  - type: text
    content: 'and come back to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Pray to him, “Take away our sin,
  - type: text
    content: accept our confession.
  - type: text
    content: Receive as restitution
  - type: text
    content: our repentant prayers.
  - type: text
    content: Assyria won’t save us;
  - type: text
    content: horses won’t get us where we want to go.
  - type: text
    content: We’ll never again say ‘our god’
  - type: text
    content: to something we’ve made or made up.
  - type: text
    content: You’re our last hope. Is it not true
  - type: text
    content: that in you the orphan finds mercy?”
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: “I will heal their waywardness.
  - type: text
    content: I will love them lavishly. My anger is played out.
  - type: text
    content: I will make a fresh start with Israel.
  - type: text
    content: He’ll burst into bloom like a crocus in the spring.
  - type: text
    content: He’ll put down deep oak tree roots,
  - type: text
    content: he’ll become a forest of oaks!
  - type: text
    content: He’ll become splendid—like a giant sequoia,
  - type: text
    content: his fragrance like a grove of cedars!
  - type: text
    content: Those who live near him will be blessed by him,
  - type: text
    content: be blessed and prosper like golden grain.
  - type: text
    content: Everyone will be talking about them,
  - type: text
    content: spreading their fame as the vintage children of God.
  - type: text
    content: Ephraim is finished with gods that are no-gods.
  - type: text
    content: From now on I’m the one who answers and satisfies him.
  - type: text
    content: I am like a luxuriant fruit tree.
  - type: text
    content: Everything you need is to be found in me.”
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: If you want to live well,
  - type: text
    content: make sure you understand all of this.
  - type: text
    content: If you know what’s good for you,
  - type: text
    content: you’ll learn this inside and out.
  - type: text
    content: God
  - type: text
    content: ’s paths get you where you want to go.
  - type: text
    content: Right-living people walk them easily;
  - type: text
    content: wrong-living people are always tripping and stumbling.
