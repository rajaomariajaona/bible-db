    - type: text
      text: 1-3
  - type: text
    text: 'O Israel, come back! Return to your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re down but you’re not out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prepare your confession
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and come back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pray to him, “Take away our sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: accept our confession.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Receive as restitution
- type: usfm
  marker: q2
  children:
  - type: text
    text: our repentant prayers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assyria won’t save us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: horses won’t get us where we want to go.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll never again say ‘our god’
- type: usfm
  marker: q2
  children:
  - type: text
    text: to something we’ve made or made up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re our last hope. Is it not true
- type: usfm
  marker: q2
  children:
  - type: text
    text: that in you the orphan finds mercy?”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: “I will heal their waywardness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will love them lavishly. My anger is played out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make a fresh start with Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll burst into bloom like a crocus in the spring.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll put down deep oak tree roots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll become a forest of oaks!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll become splendid—like a giant sequoia,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fragrance like a grove of cedars!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who live near him will be blessed by him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: be blessed and prosper like golden grain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone will be talking about them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreading their fame as the vintage children of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim is finished with gods that are no-gods.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From now on I’m the one who answers and satisfies him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like a luxuriant fruit tree.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything you need is to be found in me.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If you want to live well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make sure you understand all of this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you know what’s good for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll learn this inside and out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s paths get you where you want to go.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Right-living people walk them easily;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wrong-living people are always tripping and stumbling.
