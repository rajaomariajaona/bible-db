verses:
  '1':
  - type: heading
    content: You’re a Broken-Down Has-Been
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message on the Ammonites:'
  - type: text
    content: “Doesn’t Israel have any children,
  - type: text
    content: no one to step into her inheritance?
  - type: text
    content: So why is the god Milcom taking over Gad’s land,
  - type: text
    content: his followers moving into its towns?
  - type: text
    content: But not for long! The time’s coming”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “When I’ll fill the ears of Rabbah, Ammon’s big city,
  - type: text
    content: with battle cries.
  - type: text
    content: She’ll end up a pile of rubble,
  - type: text
    content: all her towns burned to the ground.
  - type: text
    content: Then Israel will kick out the invaders.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', say so, and it will '
  - type: text
    content: be
  - type: text
    content: ' so.'
  - type: text
    content: Wail Heshbon, Ai is in ruins.
  - type: text
    content: Villages of Rabbah, wring your hands!
  - type: text
    content: Dress in mourning, weep buckets of tears.
  - type: text
    content: Go into hysterics, run around in circles!
  - type: text
    content: Your god Milcom will be hauled off to exile,
  - type: text
    content: and all his priests and managers right with him.
  - type: text
    content: Why do you brag of your once-famous strength?
  - type: text
    content: You’re a broken-down has-been, a castoff
  - type: text
    content: Who fondles his trophies and dreams of glory days
  - type: text
    content: and vainly thinks, ‘No one can lay a hand on me.’
  - type: text
    content: Well, think again. I’ll face you with terror from all sides.”
  - type: text
    content: 'Word of the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: “You’ll be stampeded headlong,
  - type: text
    content: with no one to round up the runaways.
  - type: text
    content: Still, the time will come
  - type: text
    content: 'when I will make things right with Ammon.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: Strutting Across the Stage of History
  '12':
  - type: text
    content: 'Indeed. '
  - type: text
    content: God
  - type: text
    content: ' says, “I tell you, if there are people who have to drink the cup of God’s wrath even though they don’t deserve it, why would you think you’d get off? You won’t get off. You’ll drink it. Oh yes, you’ll drink every drop. And as for Bozrah, your capital, I swear by all that I am”—'
  - type: text
    content: God
  - type: text
    content: ’s Decree—“that that city will end up a pile of charred ruins, a stinking garbage dump, an obscenity—and all her daughter-cities with her.”
  '14':
  - type: text
    content: 'I’ve just heard the latest from '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: 'He’s sent an envoy to the nations:'
  - type: text
    content: “Muster your troops and attack Edom.
  - type: text
    content: Present arms! Go to war!”
  '15':
  - type: text
    content: “Ah, Edom, I’m dropping you to last place among nations,
  - type: text
    content: the bottom of the heap, kicked around.
  - type: text
    content: You think you’re so great—
  - type: text
    content: strutting across the stage of history,
  - type: text
    content: Living high in the impregnable rocks,
  - type: text
    content: acting like king of the mountain.
  - type: text
    content: You think you’re above it all, don’t you,
  - type: text
    content: like an eagle in its aerie?
  - type: text
    content: Well, you’re headed for a fall.
  - type: text
    content: 'I’ll bring you crashing to the ground.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '17':
  - type: text
    content: '“Edom will end up trash. Stinking, despicable trash. A wonder of the world in reverse. She’ll join Sodom and Gomorrah and their neighbors in the sewers of history.” '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  - type: text
    content: “No one will live there,
  - type: text
    content: no mortal soul move in there.
  '19':
  - type: text
    content: '“Watch this: Like a lion coming up'
  - type: text
    content: from the thick jungle of the Jordan
  - type: text
    content: Looking for prey in the mountain pastures,
  - type: text
    content: I will come upon Edom and pounce.
  - type: text
    content: I’ll take my pick of the flock—and who’s to stop me?
  - type: text
    content: The shepherds of Edom are helpless before me.”
  '20':
  - type: text
    content: 'So, listen to this plan that '
  - type: text
    content: God
  - type: text
    content: ' has worked out against Edom, the blueprint of what he’s prepared for those who live in Teman:'
  - type: text
    content: “Believe it or not, the young, the vulnerable—
  - type: text
    content: mere lambs and kids—will be dragged off.
  - type: text
    content: Believe it or not, the flock
  - type: text
    content: in shock, helpless to help, will watch it happen.
  - type: text
    content: The very earth will shudder because of their cries,
  - type: text
    content: cries of anguish heard at the distant Red Sea.
  - type: text
    content: Look! An eagle soars, swoops down,
  - type: text
    content: spreads its wings over Bozrah.
  - type: text
    content: Brave warriors will double up in pain, helpless to fight,
  - type: text
    content: like a woman giving birth to a baby.”
  - type: heading
    content: The Blood Will Drain from the Face of Damascus
  '23':
  - type: text
    content: 'The Message on Damascus:'
  - type: text
    content: “Hamath and Arpad will be in shock
  - type: text
    content: when they hear the bad news.
  - type: text
    content: Their hearts will melt in fear
  - type: text
    content: as they pace back and forth in worry.
  - type: text
    content: The blood will drain from the face of Damascus
  - type: text
    content: as she turns to flee.
  - type: text
    content: Hysterical, she’ll fall to pieces,
  - type: text
    content: disabled, like a woman in childbirth.
  - type: text
    content: And now how lonely—bereft, abandoned!
  - type: text
    content: The once famous city, the once happy city.
  - type: text
    content: Her bright young men dead in the streets,
  - type: text
    content: her brave warriors silent as death.
  - type: text
    content: 'On that day”—Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies—
  - type: text
    content: “I’ll start a fire at the wall of Damascus
  - type: text
    content: that will burn down all of Ben-hadad’s forts.”
  - type: heading
    content: Find a Safe Place to Hide
  '28':
  - type: text
    content: 'The Message on Kedar and the sheikdoms of Hazor who were attacked by Nebuchadnezzar king of Babylon. This is '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “On your feet! Attack Kedar!
  - type: text
    content: Plunder the Bedouin nomads from the east.
  - type: text
    content: Grab their blankets and pots and pans.
  - type: text
    content: Steal their camels.
  - type: text
    content: Traumatize them, shouting, ‘Terror! Death! Doom!
  - type: text
    content: Danger everywhere!’
  - type: text
    content: Oh, run for your lives,
  - type: text
    content: 'You nomads from Hazor.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Find a safe place to hide.
  - type: text
    content: Nebuchadnezzar king of Babylon
  - type: text
    content: has plans to wipe you out,
  - type: text
    content: 'to go after you with a vengeance:'
  - type: text
    content: ‘After them,’ he says. ‘Go after these relaxed nomads
  - type: text
    content: who live free and easy in the desert,
  - type: text
    content: Who live in the open with no doors to lock,
  - type: text
    content: who live off by themselves.’
  - type: text
    content: Their camels are there for the taking,
  - type: text
    content: their herds and flocks, easy picking.
  - type: text
    content: I’ll scatter them to the four winds,
  - type: text
    content: these defenseless nomads on the fringes of the desert.
  - type: text
    content: I’ll bring terror from every direction.
  - type: text
    content: 'They won’t know what hit them.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Jackals will take over the camps of Hazor,
  - type: text
    content: camps abandoned to wind and sand.
  - type: text
    content: No one will live there,
  - type: text
    content: no mortal soul move in there.”
  - type: heading
    content: The Winds Will Blow Away Elam
  '34':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to the prophet Jeremiah on Elam at the outset of the reign of Zedekiah king of Judah. This is what '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies says:'
  - type: text
    content: “Watch this! I’ll break Elam’s bow,
  - type: text
    content: her weapon of choice, across my knee.
  - type: text
    content: Then I’ll let four winds loose on Elam,
  - type: text
    content: winds from the four corners of earth.
  - type: text
    content: I’ll blow them away in all directions,
  - type: text
    content: landing homeless Elamites in every country on earth.
  - type: text
    content: They’ll live in constant fear and terror
  - type: text
    content: among enemies who want to kill them.
  - type: text
    content: I’ll bring doom on them,
  - type: text
    content: my anger-fueled doom.
  - type: text
    content: I’ll set murderous hounds on their heels
  - type: text
    content: until there’s nothing left of them.
  - type: text
    content: And then I’ll set up my throne in Elam,
  - type: text
    content: having thrown out the king and his henchmen.
  - type: text
    content: But the time will come when I make
  - type: text
    content: 'everything right for Elam again.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '7':
  - type: text
    content: 'The Message of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies on Edom:'
  - type: text
    content: “Is there nobody wise left in famous Teman?
  - type: text
    content: no one with a sense of reality?
  - type: text
    content: Has their wisdom gone wormy and rotten?
  - type: text
    content: Run for your lives! Get out while you can!
  - type: text
    content: Find a good place to hide,
  - type: text
    content: you who live in Dedan!
  - type: text
    content: I’m bringing doom to Esau.
  - type: text
    content: It’s time to settle accounts.
  - type: text
    content: When harvesters work your fields,
  - type: text
    content: don’t they leave gleanings?
  - type: text
    content: When burglars break into your house,
  - type: text
    content: don’t they take only what they want?
  - type: text
    content: But I’ll strip Esau clean.
  - type: text
    content: I’ll search out every nook and cranny.
  - type: text
    content: I’ll destroy everything connected with him,
  - type: text
    content: children and relatives and neighbors.
  - type: text
    content: There’ll be no one left who will be able to say,
  - type: text
    content: ‘I’ll take care of your orphans.
  - type: text
    content: Your widows can depend on me.’”
