document_id: JER.49
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: You’re a Broken-Down Has-Been
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message on the Ammonites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Doesn’t Israel have any children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one to step into her inheritance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why is the god Milcom taking over Gad’s land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his followers moving into its towns?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But not for long! The time’s coming”
- type: usfm
  marker: q2
  children:
  - type: text
    text: —
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I’ll fill the ears of Rabbah, Ammon’s big city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with battle cries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’ll end up a pile of rubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her towns burned to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Israel will kick out the invaders.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', say so, and it will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' so.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail Heshbon, Ai is in ruins.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Villages of Rabbah, wring your hands!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dress in mourning, weep buckets of tears.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Go into hysterics, run around in circles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your god Milcom will be hauled off to exile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all his priests and managers right with him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you brag of your once-famous strength?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re a broken-down has-been, a castoff
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who fondles his trophies and dreams of glory days
- type: usfm
  marker: q2
  children:
  - type: text
    text: and vainly thinks, ‘No one can lay a hand on me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, think again. I’ll face you with terror from all sides.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Word of the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You’ll be stampeded headlong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one to round up the runaways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, the time will come
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when I will make things right with Ammon.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Strutting Across the Stage of History
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-11
  - type: text
    text: 'The Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies on Edom:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is there nobody wise left in famous Teman?
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one with a sense of reality?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has their wisdom gone wormy and rotten?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Run for your lives! Get out while you can!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Find a good place to hide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in Dedan!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m bringing doom to Esau.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s time to settle accounts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When harvesters work your fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t they leave gleanings?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When burglars break into your house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t they take only what they want?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’ll strip Esau clean.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll search out every nook and cranny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll destroy everything connected with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: children and relatives and neighbors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’ll be no one left who will be able to say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I’ll take care of your orphans.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your widows can depend on me.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'Indeed. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, “I tell you, if there are people who have to drink the cup of God’s wrath even though they don’t deserve it, why would you think you’d get off? You won’t get off. You’ll drink it. Oh yes, you’ll drink every drop. And as for Bozrah, your capital, I swear by all that I am”—'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—“that that city will end up a pile of charred ruins, a stinking garbage dump, an obscenity—and all her daughter-cities with her.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I’ve just heard the latest from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He’s sent an envoy to the nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Muster your troops and attack Edom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Present arms! Go to war!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: “Ah, Edom, I’m dropping you to last place among nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bottom of the heap, kicked around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You think you’re so great—
- type: usfm
  marker: q2
  children:
  - type: text
    text: strutting across the stage of history,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Living high in the impregnable rocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: acting like king of the mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You think you’re above it all, don’t you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an eagle in its aerie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, you’re headed for a fall.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I’ll bring you crashing to the ground.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: '“Edom will end up trash. Stinking, despicable trash. A wonder of the world in reverse. She’ll join Sodom and Gomorrah and their neighbors in the sewers of history.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says so.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No one will live there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no mortal soul move in there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Watch this: Like a lion coming up'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the thick jungle of the Jordan
- type: usfm
  marker: q1
  children:
  - type: text
    text: Looking for prey in the mountain pastures,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will come upon Edom and pounce.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll take my pick of the flock—and who’s to stop me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: The shepherds of Edom are helpless before me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'So, listen to this plan that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has worked out against Edom, the blueprint of what he’s prepared for those who live in Teman:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Believe it or not, the young, the vulnerable—
- type: usfm
  marker: q2
  children:
  - type: text
    text: mere lambs and kids—will be dragged off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Believe it or not, the flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: in shock, helpless to help, will watch it happen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very earth will shudder because of their cries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cries of anguish heard at the distant Red Sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look! An eagle soars, swoops down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreads its wings over Bozrah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brave warriors will double up in pain, helpless to fight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman giving birth to a baby.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Blood Will Drain from the Face of Damascus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-27
  - type: text
    text: 'The Message on Damascus:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hamath and Arpad will be in shock
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they hear the bad news.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their hearts will melt in fear
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they pace back and forth in worry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The blood will drain from the face of Damascus
- type: usfm
  marker: q2
  children:
  - type: text
    text: as she turns to flee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hysterical, she’ll fall to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: disabled, like a woman in childbirth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now how lonely—bereft, abandoned!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The once famous city, the once happy city.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her bright young men dead in the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her brave warriors silent as death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On that day”—Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’ll start a fire at the wall of Damascus
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will burn down all of Ben-hadad’s forts.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Find a Safe Place to Hide
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-33
  - type: text
    text: 'The Message on Kedar and the sheikdoms of Hazor who were attacked by Nebuchadnezzar king of Babylon. This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “On your feet! Attack Kedar!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Plunder the Bedouin nomads from the east.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Grab their blankets and pots and pans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Steal their camels.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Traumatize them, shouting, ‘Terror! Death! Doom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Danger everywhere!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, run for your lives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You nomads from Hazor.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Find a safe place to hide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nebuchadnezzar king of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: has plans to wipe you out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to go after you with a vengeance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘After them,’ he says. ‘Go after these relaxed nomads
- type: usfm
  marker: q2
  children:
  - type: text
    text: who live free and easy in the desert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who live in the open with no doors to lock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who live off by themselves.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their camels are there for the taking,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their herds and flocks, easy picking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll scatter them to the four winds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: these defenseless nomads on the fringes of the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll bring terror from every direction.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They won’t know what hit them.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Jackals will take over the camps of Hazor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: camps abandoned to wind and sand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will live there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no mortal soul move in there.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Winds Will Blow Away Elam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-39
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to the prophet Jeremiah on Elam at the outset of the reign of Zedekiah king of Judah. This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Watch this! I’ll break Elam’s bow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her weapon of choice, across my knee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll let four winds loose on Elam,
- type: usfm
  marker: q2
  children:
  - type: text
    text: winds from the four corners of earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll blow them away in all directions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: landing homeless Elamites in every country on earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll live in constant fear and terror
- type: usfm
  marker: q2
  children:
  - type: text
    text: among enemies who want to kill them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll bring doom on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my anger-fueled doom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll set murderous hounds on their heels
- type: usfm
  marker: q2
  children:
  - type: text
    text: until there’s nothing left of them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then I’ll set up my throne in Elam,
- type: usfm
  marker: q2
  children:
  - type: text
    text: having thrown out the king and his henchmen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the time will come when I make
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'everything right for Elam again.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
