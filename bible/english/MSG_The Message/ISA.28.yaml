document_id: ISA.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Will Speak in Baby Talk
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Doom to the pretentious drunks of Ephraim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shabby and washed out and seedy—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tipsy, sloppy-fat, beer-bellied parodies
- type: usfm
  marker: q2
  children:
  - type: text
    text: of a proud and handsome past.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Watch closely: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has someone picked out,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: someone tough and strong to flatten them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a hailstorm, like a hurricane, like a flash flood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one-handed he’ll throw them to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samaria, the party hat on Israel’s head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be knocked off with one blow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will disappear quicker than
- type: usfm
  marker: q2
  children:
  - type: text
    text: a piece of meat tossed to a dog.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'At that time, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies will be
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the beautiful crown on the head of what’s left of his people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Energy and insights of justice to those who guide and decide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strength and prowess to those who guard and protect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: These also, the priest and prophet, stagger from drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weaving, falling-down drunks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Besotted with wine and whiskey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: can’t see straight, can’t talk sense.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every table is covered with vomit.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: live
  - type: text
    text: ' in vomit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “Is that so? And who do you think you are to teach us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who are you to lord it over us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re not babies in diapers
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be talked down to by such as you—
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Da, da, da, da,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blah, blah, blah, blah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s a good little girl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that’s a good little boy.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: But that’s exactly how you will be addressed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will speak to this people
- type: usfm
  marker: q1
  children:
  - type: text
    text: In baby talk, one syllable at a time—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he’ll do it through foreign oppressors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He said before, “This is the time and place to rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to give rest to the weary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the place to lay down your burden.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: But they won’t listen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will start over with the simple basics'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and address them in baby talk, one syllable at a time—
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Da, da, da, da,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blah, blah, blah, blah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s a good little girl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that’s a good little boy.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like toddlers, they will get up and fall down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get bruised and confused and lost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'Now listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message, you scoffers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who rule this people in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You say, “We’ve taken out good life insurance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve hedged all our bets, covered all our bases.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No disaster can touch us. We’ve thought of everything.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’re advised by the experts. We’re set.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Meaning of the Stone
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'But the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', has something to say to this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Watch closely. I’m laying a foundation in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a solid granite foundation, squared and true.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And this is the meaning of the stone:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: a trusting life won’t topple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make justice the measuring stick
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteousness the plumb line for the building.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A hailstorm will knock down the shantytown of lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a flash flood will wash out the rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-22
  - type: text
    text: “Then you’ll see that your precious life insurance policy
- type: usfm
  marker: q2
  children:
  - type: text
    text: wasn’t worth the paper it was written on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your careful precautions against death
- type: usfm
  marker: q2
  children:
  - type: text
    text: were a pack of illusions and lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the disaster happens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be crushed by it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every time disaster comes, you’ll be in on it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: disaster in the morning, disaster at night.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every report of disaster
- type: usfm
  marker: q2
  children:
  - type: text
    text: will send you cowering in terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be no place where you can rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing to hide under.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will rise to full stature,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: raging as he did long ago on Mount Perazim
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the valley of Gibeon against the Philistines.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But this time it’s against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hard to believe, but true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not what you’d expect, but it’s coming.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sober up, friends, and don’t scoff.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Scoffing will just make it worse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve heard the orders issued for destruction, orders from
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies—ending up in an international disaster.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: Listen to me now.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give me your closest attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do farmers plow and plow and do nothing but plow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or harrow and harrow and do nothing but harrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: After they’ve prepared the ground, don’t they plant?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t they scatter dill and spread cumin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plant wheat and barley in the fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: and raspberries along the borders?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They know exactly what to do and when to do it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their God is their teacher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: And at the harvest, the delicate herbs and spices,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the dill and cumin, are treated delicately.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the other hand, wheat is threshed and milled, but still not endlessly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The farmer knows how to treat each kind of grain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He’s learned it all from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who knows everything about when and how and where.
