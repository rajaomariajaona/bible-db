document_id: ISA.28,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Will Speak in Baby Talk
  - type: text
    content: Doom to the pretentious drunks of Ephraim,
  - type: text
    content: shabby and washed out and seedy—
  - type: text
    content: Tipsy, sloppy-fat, beer-bellied parodies
  - type: text
    content: of a proud and handsome past.
  - type: text
    content: 'Watch closely: '
  - type: text
    content: God
  - type: text
    content: ' has someone picked out,'
  - type: text
    content: someone tough and strong to flatten them.
  - type: text
    content: Like a hailstorm, like a hurricane, like a flash flood,
  - type: text
    content: one-handed he’ll throw them to the ground.
  - type: text
    content: Samaria, the party hat on Israel’s head,
  - type: text
    content: will be knocked off with one blow.
  - type: text
    content: It will disappear quicker than
  - type: text
    content: a piece of meat tossed to a dog.
  '11':
  - type: text
    content: But that’s exactly how you will be addressed.
  - type: text
    content: God will speak to this people
  - type: text
    content: In baby talk, one syllable at a time—
  - type: text
    content: and he’ll do it through foreign oppressors.
  - type: text
    content: He said before, “This is the time and place to rest,
  - type: text
    content: to give rest to the weary.
  - type: text
    content: This is the place to lay down your burden.”
  - type: text
    content: But they won’t listen.
  '13':
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ' will start over with the simple basics'
  - type: text
    content: and address them in baby talk, one syllable at a time—
  - type: text
    content: “Da, da, da, da,
  - type: text
    content: blah, blah, blah, blah.
  - type: text
    content: That’s a good little girl,
  - type: text
    content: that’s a good little boy.”
  - type: text
    content: And like toddlers, they will get up and fall down,
  - type: text
    content: get bruised and confused and lost.
  '14':
  - type: text
    content: 'Now listen to '
  - type: text
    content: God
  - type: text
    content: ’s Message, you scoffers,
  - type: text
    content: you who rule this people in Jerusalem.
  - type: text
    content: You say, “We’ve taken out good life insurance.
  - type: text
    content: We’ve hedged all our bets, covered all our bases.
  - type: text
    content: No disaster can touch us. We’ve thought of everything.
  - type: text
    content: We’re advised by the experts. We’re set.”
  - type: heading
    content: The Meaning of the Stone
  '16':
  - type: text
    content: 'But the Master, '
  - type: text
    content: God
  - type: text
    content: ', has something to say to this:'
  - type: text
    content: “Watch closely. I’m laying a foundation in Zion,
  - type: text
    content: a solid granite foundation, squared and true.
  - type: text
    content: 'And this is the meaning of the stone:'
  - type: text
    content: a trusting life won’t topple.
  - type: text
    content: I’ll make justice the measuring stick
  - type: text
    content: and righteousness the plumb line for the building.
  - type: text
    content: A hailstorm will knock down the shantytown of lies,
  - type: text
    content: and a flash flood will wash out the rubble.
  '18':
  - type: text
    content: “Then you’ll see that your precious life insurance policy
  - type: text
    content: wasn’t worth the paper it was written on.
  - type: text
    content: Your careful precautions against death
  - type: text
    content: were a pack of illusions and lies.
  - type: text
    content: When the disaster happens,
  - type: text
    content: you’ll be crushed by it.
  - type: text
    content: Every time disaster comes, you’ll be in on it—
  - type: text
    content: disaster in the morning, disaster at night.”
  - type: text
    content: Every report of disaster
  - type: text
    content: will send you cowering in terror.
  - type: text
    content: There will be no place where you can rest,
  - type: text
    content: nothing to hide under.
  - type: text
    content: God
  - type: text
    content: ' will rise to full stature,'
  - type: text
    content: raging as he did long ago on Mount Perazim
  - type: text
    content: And in the valley of Gibeon against the Philistines.
  - type: text
    content: 'But this time it’s against '
  - type: text
    content: you
  - type: text
    content: .
  - type: text
    content: Hard to believe, but true.
  - type: text
    content: Not what you’d expect, but it’s coming.
  - type: text
    content: Sober up, friends, and don’t scoff.
  - type: text
    content: Scoffing will just make it worse.
  - type: text
    content: I’ve heard the orders issued for destruction, orders from
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies—ending up in an international disaster.
  - type: text
    content: '* * *'
  '23':
  - type: text
    content: Listen to me now.
  - type: text
    content: Give me your closest attention.
  - type: text
    content: Do farmers plow and plow and do nothing but plow?
  - type: text
    content: Or harrow and harrow and do nothing but harrow?
  - type: text
    content: After they’ve prepared the ground, don’t they plant?
  - type: text
    content: Don’t they scatter dill and spread cumin,
  - type: text
    content: Plant wheat and barley in the fields
  - type: text
    content: and raspberries along the borders?
  - type: text
    content: They know exactly what to do and when to do it.
  - type: text
    content: Their God is their teacher.
  '27':
  - type: text
    content: And at the harvest, the delicate herbs and spices,
  - type: text
    content: the dill and cumin, are treated delicately.
  - type: text
    content: On the other hand, wheat is threshed and milled, but still not endlessly.
  - type: text
    content: The farmer knows how to treat each kind of grain.
  - type: text
    content: 'He’s learned it all from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: who knows everything about when and how and where.
  '5':
  - type: text
    content: 'At that time, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will be
  - type: text
    content: 'the beautiful crown on the head of what’s left of his people:'
  - type: text
    content: Energy and insights of justice to those who guide and decide,
  - type: text
    content: strength and prowess to those who guard and protect.
  '7':
  - type: text
    content: These also, the priest and prophet, stagger from drink,
  - type: text
    content: weaving, falling-down drunks,
  - type: text
    content: Besotted with wine and whiskey,
  - type: text
    content: can’t see straight, can’t talk sense.
  - type: text
    content: Every table is covered with vomit.
  - type: text
    content: 'They '
  - type: text
    content: live
  - type: text
    content: ' in vomit.'
  '9':
  - type: text
    content: “Is that so? And who do you think you are to teach us?
  - type: text
    content: Who are you to lord it over us?
  - type: text
    content: We’re not babies in diapers
  - type: text
    content: to be talked down to by such as you—
  - type: text
    content: ‘Da, da, da, da,
  - type: text
    content: blah, blah, blah, blah.
  - type: text
    content: That’s a good little girl,
  - type: text
    content: that’s a good little boy.’”
