document_id: EZR.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-14
    - type: text
      text: 'These are the family heads and those who signed up to go up with me from Babylon in the reign of Artaxerxes the king:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Phinehas: Gershom'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Ithamar: Daniel'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of David: Hattush'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Family of Shecaniah
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Parosh: Zechariah, and with him 150 men signed up'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Pahath-Moab: Eliehoenai son of Zerahiah, and 200 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Zattu: Shecaniah son of Jahaziel, and 300 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Adin: Ebed son of Jonathan, and 50 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Elam: Jeshaiah son of Athaliah, and 70 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Shephatiah: Zebadiah son of Michael, and 80 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Joab: Obadiah son of Jehiel, and 218 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Bani: Shelomith son of Josiphiah, and 160 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Bebai: Zechariah son of Bebai, and 28 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Azgad: Johanan son of Hakkatan, and 110 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Adonikam (bringing up the rear): their names were Eliphelet, Jeuel, Shemaiah, and 60 men'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Family of Bigvai: Uthai and Zaccur, and 70 men.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: 'I gathered them together at the canal that runs to Ahava. We camped there three days. I looked them over and found that they were all laymen and priests but no Levites. So I sent for the leaders Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, and for the teachers Joiarib and Elnathan. I then sent them to Iddo, who is head of the town of Casiphia, and told them what to say to Iddo and his relatives who lived there in Casiphia: “Send us ministers for The Temple of God.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: Well, the generous hand of our God was on us, and they brought back to us a wise man from the family of Mahli son of Levi, the son of Israel. His name was Sherebiah. With sons and brothers they numbered eighteen. They also brought Hashabiah and Jeshaiah of the family of Merari, with brothers and their sons, another twenty. And then there were 220 temple servants, descendants of the temple servants that David and the princes had assigned to help the Levites in their work. They were all signed up by name.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: I proclaimed a fast there beside the Ahava Canal, a fast to humble ourselves before our God and pray for wise guidance for our journey—all our people and possessions. I was embarrassed to ask the king for a cavalry bodyguard to protect us from bandits on the road. We had just told the king, “Our God lovingly looks after all those who seek him, but turns away in disgust from those who leave him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So we fasted and prayed about these concerns. And he listened.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-27
    - type: text
      text: 'Then I picked twelve of the leading priests—Sherebiah and Hashabiah with ten of their brothers. I weighed out for them the silver, the gold, the vessels, and the offerings for The Temple of our God that the king, his advisors, and all the Israelites had given:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 25 tons of silver
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 100 vessels of silver valued at three and three-quarter tons of gold
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 20 gold bowls weighing eighteen and a half pounds
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 2 vessels of bright red copper, as valuable as gold.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: 'I said to them, “You are holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and these vessels are holy. The silver and gold are Freewill-Offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of your ancestors. Guard them with your lives until you’re able to weigh them out in a secure place in The Temple of our God for the priests and Levites and family heads who are in charge in Jerusalem.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The priests and Levites took charge of all that had been weighed out to them, and prepared to deliver it to Jerusalem to The Temple of our God.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: We left the Ahava Canal on the twelfth day of the first month to travel to Jerusalem. God was with us all the way and kept us safe from bandits and highwaymen.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-34
    - type: text
      text: We arrived in Jerusalem and waited there three days. On the fourth day the silver and gold and vessels were weighed out in The Temple of our God into the hands of Meremoth son of Uriah, the priest. Eleazar son of Phinehas was there with him, also the Levites Jozabad son of Jeshua and Noadiah son of Binnui. Everything was counted and weighed and the totals recorded.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When they arrived, the exiles, now returned from captivity, offered Whole-Burnt-Offerings to the God of Israel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 12 bulls, representing all Israel
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 96 rams
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 77 lambs
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 12 he-goats as an Absolution-Offering.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All of this was sacrificed as a Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: They also delivered the king’s orders to the king’s provincial administration assigned to the land beyond the Euphrates. They, in turn, gave their support to the people and The Temple of God.
