document_id: EZR.8,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'These are the family heads and those who signed up to go up with me from Babylon in the reign of Artaxerxes the king:'
  - type: text
    content: 'From the family of Phinehas: Gershom'
  - type: text
    content: 'Family of Ithamar: Daniel'
  - type: text
    content: 'Family of David: Hattush'
  - type: text
    content: Family of Shecaniah
  - type: text
    content: 'Family of Parosh: Zechariah, and with him 150 men signed up'
  - type: text
    content: 'Family of Pahath-Moab: Eliehoenai son of Zerahiah, and 200 men'
  - type: text
    content: 'Family of Zattu: Shecaniah son of Jahaziel, and 300 men'
  - type: text
    content: 'Family of Adin: Ebed son of Jonathan, and 50 men'
  - type: text
    content: 'Family of Elam: Jeshaiah son of Athaliah, and 70 men'
  - type: text
    content: 'Family of Shephatiah: Zebadiah son of Michael, and 80 men'
  - type: text
    content: 'Family of Joab: Obadiah son of Jehiel, and 218 men'
  - type: text
    content: 'Family of Bani: Shelomith son of Josiphiah, and 160 men'
  - type: text
    content: 'Family of Bebai: Zechariah son of Bebai, and 28 men'
  - type: text
    content: 'Family of Azgad: Johanan son of Hakkatan, and 110 men'
  - type: text
    content: 'Family of Adonikam (bringing up the rear): their names were Eliphelet, Jeuel, Shemaiah, and 60 men'
  - type: text
    content: 'Family of Bigvai: Uthai and Zaccur, and 70 men.'
  '15':
  - type: text
    content: 'I gathered them together at the canal that runs to Ahava. We camped there three days. I looked them over and found that they were all laymen and priests but no Levites. So I sent for the leaders Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, and for the teachers Joiarib and Elnathan. I then sent them to Iddo, who is head of the town of Casiphia, and told them what to say to Iddo and his relatives who lived there in Casiphia: “Send us ministers for The Temple of God.”'
  '18':
  - type: text
    content: Well, the generous hand of our God was on us, and they brought back to us a wise man from the family of Mahli son of Levi, the son of Israel. His name was Sherebiah. With sons and brothers they numbered eighteen. They also brought Hashabiah and Jeshaiah of the family of Merari, with brothers and their sons, another twenty. And then there were 220 temple servants, descendants of the temple servants that David and the princes had assigned to help the Levites in their work. They were all signed up by name.
  '21':
  - type: text
    content: I proclaimed a fast there beside the Ahava Canal, a fast to humble ourselves before our God and pray for wise guidance for our journey—all our people and possessions. I was embarrassed to ask the king for a cavalry bodyguard to protect us from bandits on the road. We had just told the king, “Our God lovingly looks after all those who seek him, but turns away in disgust from those who leave him.”
  '23':
  - type: text
    content: So we fasted and prayed about these concerns. And he listened.
  '24':
  - type: text
    content: 'Then I picked twelve of the leading priests—Sherebiah and Hashabiah with ten of their brothers. I weighed out for them the silver, the gold, the vessels, and the offerings for The Temple of our God that the king, his advisors, and all the Israelites had given:'
  - type: text
    content: 25 tons of silver
  - type: text
    content: 100 vessels of silver valued at three and three-quarter tons of gold
  - type: text
    content: 20 gold bowls weighing eighteen and a half pounds
  - type: text
    content: 2 vessels of bright red copper, as valuable as gold.
  '28':
  - type: text
    content: 'I said to them, “You are holy to '
  - type: text
    content: God
  - type: text
    content: ' and these vessels are holy. The silver and gold are Freewill-Offerings to the '
  - type: text
    content: God
  - type: text
    content: ' of your ancestors. Guard them with your lives until you’re able to weigh them out in a secure place in The Temple of our God for the priests and Levites and family heads who are in charge in Jerusalem.”'
  '30':
  - type: text
    content: The priests and Levites took charge of all that had been weighed out to them, and prepared to deliver it to Jerusalem to The Temple of our God.
  '31':
  - type: text
    content: We left the Ahava Canal on the twelfth day of the first month to travel to Jerusalem. God was with us all the way and kept us safe from bandits and highwaymen.
  '32':
  - type: text
    content: We arrived in Jerusalem and waited there three days. On the fourth day the silver and gold and vessels were weighed out in The Temple of our God into the hands of Meremoth son of Uriah, the priest. Eleazar son of Phinehas was there with him, also the Levites Jozabad son of Jeshua and Noadiah son of Binnui. Everything was counted and weighed and the totals recorded.
  '35':
  - type: text
    content: 'When they arrived, the exiles, now returned from captivity, offered Whole-Burnt-Offerings to the God of Israel:'
  - type: text
    content: 12 bulls, representing all Israel
  - type: text
    content: 96 rams
  - type: text
    content: 77 lambs
  - type: text
    content: 12 he-goats as an Absolution-Offering.
  - type: text
    content: 'All of this was sacrificed as a Whole-Burnt-Offering to '
  - type: text
    content: God
  - type: text
    content: .
  '36':
  - type: text
    content: They also delivered the king’s orders to the king’s provincial administration assigned to the land beyond the Euphrates. They, in turn, gave their support to the people and The Temple of God.
