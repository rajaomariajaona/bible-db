type_code: eng
verses:
  '1':
  - type: heading
    content: Lady Wisdom Calls Out
  - type: text
    content: Do you hear Lady Wisdom calling?
  - type: text
    content: Can you hear Madame Insight raising her voice?
  - type: text
    content: She’s taken her stand at First and Main,
  - type: text
    content: at the busiest intersection.
  - type: text
    content: Right in the city square
  - type: text
    content: where the traffic is thickest, she shouts,
  - type: text
    content: “You—I’m talking to all of you,
  - type: text
    content: everyone out here on the streets!
  - type: text
    content: Listen, you idiots—learn good sense!
  - type: text
    content: You blockheads—shape up!
  - type: text
    content: Don’t miss a word of this—I’m telling you how to live well,
  - type: text
    content: I’m telling you how to live at your best.
  - type: text
    content: My mouth chews and savors and relishes truth—
  - type: text
    content: I can’t stand the taste of evil!
  - type: text
    content: You’ll only hear true and right words from my mouth;
  - type: text
    content: not one syllable will be twisted or skewed.
  - type: text
    content: You’ll recognize this as true—you with open minds;
  - type: text
    content: truth-ready minds will see it at once.
  - type: text
    content: Prefer my life-disciplines over chasing after money,
  - type: text
    content: and God-knowledge over a lucrative career.
  - type: text
    content: For Wisdom is better than all the trappings of wealth;
  - type: text
    content: nothing you could wish for holds a candle to her.
  '12':
  - type: text
    content: “I am Lady Wisdom, and I live next to Sanity;
  - type: text
    content: Knowledge and Discretion live just down the street.
  - type: text
    content: The Fear-of-
  - type: text
    content: God
  - type: text
    content: ' means hating Evil,'
  - type: text
    content: whose ways I hate with a passion—
  - type: text
    content: pride and arrogance and crooked talk.
  - type: text
    content: Good counsel and common sense are my characteristics;
  - type: text
    content: I am both Insight and the Virtue to live it out.
  - type: text
    content: With my help, leaders rule,
  - type: text
    content: and lawmakers legislate fairly;
  - type: text
    content: With my help, governors govern,
  - type: text
    content: along with all in legitimate authority.
  - type: text
    content: I love those who love me;
  - type: text
    content: those who look for me find me.
  - type: text
    content: Wealth and Glory accompany me—
  - type: text
    content: also substantial Honor and a Good Name.
  - type: text
    content: 'My benefits are worth more than a big salary, even a '
  - type: text
    content: very
  - type: text
    content: ' big salary;'
  - type: text
    content: the returns on me exceed any imaginable bonus.
  - type: text
    content: You can find me on Righteous Road—that’s where I walk—
  - type: text
    content: at the intersection of Justice Avenue,
  - type: text
    content: Handing out life to those who love me,
  - type: text
    content: filling their arms with life—armloads of life!
  '22':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' sovereignly made me—the first, the basic—'
  - type: text
    content: before he did anything else.
  - type: text
    content: I was brought into being a long time ago,
  - type: text
    content: well before Earth got its start.
  - type: text
    content: I arrived on the scene before Ocean,
  - type: text
    content: yes, even before Springs and Rivers and Lakes.
  - type: text
    content: Before Mountains were sculpted and Hills took shape,
  - type: text
    content: I was already there, newborn;
  - type: text
    content: 'Long before '
  - type: text
    content: God
  - type: text
    content: ' stretched out Earth’s Horizons,'
  - type: text
    content: and tended to the minute details of Soil and Weather,
  - type: text
    content: And set Sky firmly in place,
  - type: text
    content: I was there.
  - type: text
    content: When he mapped and gave borders to wild Ocean,
  - type: text
    content: built the vast vault of Heaven,
  - type: text
    content: and installed the fountains that fed Ocean,
  - type: text
    content: When he drew a boundary for Sea,
  - type: text
    content: 'posted a sign that said '
  - type: text
    content: no trespassing
  - type: text
    content: ','
  - type: text
    content: And then staked out Earth’s Foundations,
  - type: text
    content: I was right there with him, making sure everything fit.
  - type: text
    content: Day after day I was there, with my joyful applause,
  - type: text
    content: always enjoying his company,
  - type: text
    content: Delighted with the world of things and creatures,
  - type: text
    content: happily celebrating the human family.
  '32':
  - type: text
    content: “So, my dear friends, listen carefully;
  - type: text
    content: those who embrace these my ways are most blessed.
  - type: text
    content: Mark a life of discipline and live wisely;
  - type: text
    content: don’t squander your precious life.
  - type: text
    content: Blessed the man, blessed the woman, who listens to me,
  - type: text
    content: awake and ready for me each morning,
  - type: text
    content: alert and responsive as I start my day’s work.
  - type: text
    content: When you find me, you find life, real life,
  - type: text
    content: 'to say nothing of '
  - type: text
    content: God
  - type: text
    content: ’s good pleasure.
  - type: text
    content: But if you wrong me, you damage your very soul;
  - type: text
    content: when you reject me, you’re flirting with death.”
