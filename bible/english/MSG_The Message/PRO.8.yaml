document_id: PRO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lady Wisdom Calls Out
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-11
  - type: text
    text: Do you hear Lady Wisdom calling?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you hear Madame Insight raising her voice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s taken her stand at First and Main,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the busiest intersection.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Right in the city square
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the traffic is thickest, she shouts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You—I’m talking to all of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone out here on the streets!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen, you idiots—learn good sense!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You blockheads—shape up!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t miss a word of this—I’m telling you how to live well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m telling you how to live at your best.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My mouth chews and savors and relishes truth—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t stand the taste of evil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll only hear true and right words from my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one syllable will be twisted or skewed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll recognize this as true—you with open minds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: truth-ready minds will see it at once.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prefer my life-disciplines over chasing after money,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God-knowledge over a lucrative career.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Wisdom is better than all the trappings of wealth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing you could wish for holds a candle to her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-21
  - type: text
    text: “I am Lady Wisdom, and I live next to Sanity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Knowledge and Discretion live just down the street.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' means hating Evil,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose ways I hate with a passion—
- type: usfm
  marker: q2
  children:
  - type: text
    text: pride and arrogance and crooked talk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Good counsel and common sense are my characteristics;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am both Insight and the Virtue to live it out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With my help, leaders rule,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lawmakers legislate fairly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: With my help, governors govern,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with all in legitimate authority.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I love those who love me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who look for me find me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wealth and Glory accompany me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: also substantial Honor and a Good Name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My benefits are worth more than a big salary, even a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' big salary;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the returns on me exceed any imaginable bonus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can find me on Righteous Road—that’s where I walk—
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the intersection of Justice Avenue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handing out life to those who love me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filling their arms with life—armloads of life!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-31
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sovereignly made me—the first, the basic—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: before he did anything else.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was brought into being a long time ago,
- type: usfm
  marker: q2
  children:
  - type: text
    text: well before Earth got its start.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I arrived on the scene before Ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, even before Springs and Rivers and Lakes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before Mountains were sculpted and Hills took shape,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was already there, newborn;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Long before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stretched out Earth’s Horizons,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tended to the minute details of Soil and Weather,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And set Sky firmly in place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he mapped and gave borders to wild Ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: built the vast vault of Heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and installed the fountains that fed Ocean,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he drew a boundary for Sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'posted a sign that said '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: no trespassing
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then staked out Earth’s Foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was right there with him, making sure everything fit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Day after day I was there, with my joyful applause,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always enjoying his company,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Delighted with the world of things and creatures,
- type: usfm
  marker: q2
  children:
  - type: text
    text: happily celebrating the human family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-36
  - type: text
    text: “So, my dear friends, listen carefully;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who embrace these my ways are most blessed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mark a life of discipline and live wisely;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t squander your precious life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed the man, blessed the woman, who listens to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: awake and ready for me each morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: alert and responsive as I start my day’s work.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you find me, you find life, real life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to say nothing of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s good pleasure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if you wrong me, you damage your very soul;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you reject me, you’re flirting with death.”
