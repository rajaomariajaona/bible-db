document_id: JOB.22
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Eliphaz Attacks Job—The Third Round
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Come to Terms with God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-11
  - type: text
    text: 'Once again Eliphaz the Temanite took up his theme:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Are any of us strong enough to give God a hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or smart enough to give him advice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: So what if you were righteous—would God Almighty even notice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even if you gave a perfect performance, do you think
- type: usfm
  marker: q3
  children:
  - type: text
    text: he’d applaud?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think it’s because he cares about your purity
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he’s disciplining you, putting you on the spot?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hardly! It’s because you’re a first-class moral failure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there’s no end to your sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When people came to you for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you took the shirts off their backs, exploited their helplessness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You wouldn’t so much as give a drink to the thirsty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or food, not even a scrap, to the hungry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there you sat, strong and honored by everyone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrounded by immense wealth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You turned poor widows away from your door;
- type: usfm
  marker: q2
  children:
  - type: text
    text: heartless, you crushed orphans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'you’re '
  - type: text
    text: the one trapped in terror, paralyzed by fear.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Suddenly the tables have turned!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How do you like living in the dark, sightless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: up to your neck in flood waters?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: “You agree, don’t you, that God is in charge?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He runs the universe—just look at the stars!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet you dare raise questions: ‘What does God know?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: From that distance and darkness, how can he judge?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He roams the heavens wrapped in clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so how can he see us?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: “Are you going to persist in that tired old line
- type: usfm
  marker: q2
  children:
  - type: text
    text: that wicked men and women have always used?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where did it get them? They died young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flash floods sweeping them off to their doom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They told God, ‘Get lost!
- type: usfm
  marker: q2
  children:
  - type: text
    text: What good is God Almighty to us?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And yet it was God who gave them everything they had.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s beyond me how they can carry on like this!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: “Good people see bad people crash, and call for a celebration.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Relieved, they crow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘At last! Our enemies—wiped out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything they had and stood for is up in smoke!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: “Give in to God, come to terms with him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everything will turn out just fine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him tell you what to do;
- type: usfm
  marker: q2
  children:
  - type: text
    text: take his words to heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come back to God Almighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he’ll rebuild your life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clean house of everything evil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Relax your grip on your money
- type: usfm
  marker: q2
  children:
  - type: text
    text: and abandon your gold-plated luxury.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God Almighty will be your treasure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: more wealth than you can imagine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-30
  - type: text
    text: “You’ll take delight in God, the Mighty One,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and look to him joyfully, boldly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll pray to him and he’ll listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll help you do what you’ve promised.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll decide what you want and it will happen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your life will be bathed in light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To those who feel low you’ll say, ‘Chin up! Be brave!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God will save them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, even the guilty will escape,
- type: usfm
  marker: q2
  children:
  - type: text
    text: escape through God’s grace in your life.”
