document_id: JOB.22,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz Attacks Job—The Third Round
  - type: heading
    content: Come to Terms with God
  - type: text
    content: 'Once again Eliphaz the Temanite took up his theme:'
  - type: text
    content: “Are any of us strong enough to give God a hand,
  - type: text
    content: or smart enough to give him advice?
  - type: text
    content: So what if you were righteous—would God Almighty even notice?
  - type: text
    content: Even if you gave a perfect performance, do you think
  - type: text
    content: he’d applaud?
  - type: text
    content: Do you think it’s because he cares about your purity
  - type: text
    content: that he’s disciplining you, putting you on the spot?
  - type: text
    content: Hardly! It’s because you’re a first-class moral failure,
  - type: text
    content: because there’s no end to your sins.
  - type: text
    content: When people came to you for help,
  - type: text
    content: you took the shirts off their backs, exploited their helplessness.
  - type: text
    content: You wouldn’t so much as give a drink to the thirsty,
  - type: text
    content: or food, not even a scrap, to the hungry.
  - type: text
    content: And there you sat, strong and honored by everyone,
  - type: text
    content: surrounded by immense wealth!
  - type: text
    content: You turned poor widows away from your door;
  - type: text
    content: heartless, you crushed orphans.
  - type: text
    content: 'Now '
  - type: text
    content: 'you’re '
  - type: text
    content: the one trapped in terror, paralyzed by fear.
  - type: text
    content: Suddenly the tables have turned!
  - type: text
    content: How do you like living in the dark, sightless,
  - type: text
    content: up to your neck in flood waters?
  '12':
  - type: text
    content: “You agree, don’t you, that God is in charge?
  - type: text
    content: He runs the universe—just look at the stars!
  - type: text
    content: 'Yet you dare raise questions: ‘What does God know?'
  - type: text
    content: From that distance and darkness, how can he judge?
  - type: text
    content: He roams the heavens wrapped in clouds,
  - type: text
    content: so how can he see us?’
  '15':
  - type: text
    content: “Are you going to persist in that tired old line
  - type: text
    content: that wicked men and women have always used?
  - type: text
    content: Where did it get them? They died young,
  - type: text
    content: flash floods sweeping them off to their doom.
  - type: text
    content: They told God, ‘Get lost!
  - type: text
    content: What good is God Almighty to us?’
  - type: text
    content: And yet it was God who gave them everything they had.
  - type: text
    content: It’s beyond me how they can carry on like this!
  '19':
  - type: text
    content: “Good people see bad people crash, and call for a celebration.
  - type: text
    content: Relieved, they crow,
  - type: text
    content: ‘At last! Our enemies—wiped out.
  - type: text
    content: Everything they had and stood for is up in smoke!’
  '21':
  - type: text
    content: “Give in to God, come to terms with him
  - type: text
    content: and everything will turn out just fine.
  - type: text
    content: Let him tell you what to do;
  - type: text
    content: take his words to heart.
  - type: text
    content: Come back to God Almighty
  - type: text
    content: and he’ll rebuild your life.
  - type: text
    content: Clean house of everything evil.
  - type: text
    content: Relax your grip on your money
  - type: text
    content: and abandon your gold-plated luxury.
  - type: text
    content: God Almighty will be your treasure,
  - type: text
    content: more wealth than you can imagine.
  '26':
  - type: text
    content: “You’ll take delight in God, the Mighty One,
  - type: text
    content: and look to him joyfully, boldly.
  - type: text
    content: You’ll pray to him and he’ll listen;
  - type: text
    content: he’ll help you do what you’ve promised.
  - type: text
    content: You’ll decide what you want and it will happen;
  - type: text
    content: your life will be bathed in light.
  - type: text
    content: To those who feel low you’ll say, ‘Chin up! Be brave!’
  - type: text
    content: and God will save them.
  - type: text
    content: Yes, even the guilty will escape,
  - type: text
    content: escape through God’s grace in your life.”
