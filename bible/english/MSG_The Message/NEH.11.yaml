document_id: NEH.11,97
type_code: eng
verses:
  '1':
  - type: text
    content: The leaders of the people were already living in Jerusalem, so the rest of the people drew lots to get one out of ten to move to Jerusalem, the holy city, while the other nine remained in their towns. The people applauded those who voluntarily offered to live in Jerusalem.
  '10':
  - type: text
    content: 'From the priests:'
  - type: text
    content: 'Jedaiah son of Joiarib; Jakin; Seraiah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, supervisor of The Temple of God, along with their associates responsible for work in The Temple: 822 men. Also Adaiah son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malkijah, and his associates who were heads of families: 242 men; Amashsai son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, and his associates, all valiant men: 128 men. Their commander was Zabdiel son of Haggedolim.'
  '15':
  - type: text
    content: 'From the Levites:'
  - type: text
    content: Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; Shabbethai and Jozabad, two of the leaders of the Levites who were in charge of the outside work of The Temple of God; Mattaniah son of Mica, the son of Zabdi, the son of Asaph, the director who led in thanksgiving and prayer; Bakbukiah, second among his associates; and Abda son of Shammua, the son of Galal, the son of Jeduthun. The Levites in the holy city totaled 284.
  '19':
  - type: text
    content: 'From the security guards:'
  - type: text
    content: 'Akkub, Talmon, and their associates who kept watch over the gates: 172 men.'
  '20':
  - type: text
    content: The rest of the Israelites, priests, and Levites were in all the towns of Judah, each on his own family property.
  '21':
  - type: text
    content: The Temple staff lived on the hill Ophel. Ziha and Gishpa were responsible for them.
  '22':
  - type: text
    content: The chief officer over the Levites in Jerusalem was Uzzi son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mica. Uzzi was one of Asaph’s descendants, singers who led worship in The Temple of God. The singers got their orders from the king, who drew up their daily schedule.
  '24':
  - type: text
    content: Pethahiah son of Meshezabel, a descendant of Zerah son of Judah, represented the people’s concerns at the royal court.
  '25':
  - type: text
    content: 'Some of the Judeans lived in the villages near their farms:'
  - type: text
    content: Kiriath Arba (Hebron) and suburbs
  - type: text
    content: Dibon and suburbs
  - type: text
    content: Jekabzeel and suburbs
  - type: text
    content: Jeshua
  - type: text
    content: Moladah
  - type: text
    content: Beth Pelet
  - type: text
    content: Hazar Shual
  - type: text
    content: Beersheba and suburbs
  - type: text
    content: Ziklag
  - type: text
    content: Meconah and suburbs
  - type: text
    content: En Rimmon
  - type: text
    content: Zorah
  - type: text
    content: Jarmuth
  - type: text
    content: Zanoah
  - type: text
    content: Adullam and their towns
  - type: text
    content: Lachish and its fields
  - type: text
    content: Azekah and suburbs.
  - type: text
    content: They were living all the way from Beersheba to the Valley of Hinnom.
  '3':
  - type: text
    content: ' These are the leaders in the province who resided in Jerusalem (some Israelites, priests, Levites, Temple staff, and descendants of Solomon’s slaves lived in the towns of Judah on their own property in various towns; others from both Judah and Benjamin lived in Jerusalem):'
  '31':
  - type: text
    content: 'The Benjaminites from Geba lived in:'
  - type: text
    content: Micmash
  - type: text
    content: Aijah
  - type: text
    content: Bethel and its suburbs
  - type: text
    content: Anathoth
  - type: text
    content: Nob and Ananiah
  - type: text
    content: Hazor
  - type: text
    content: Ramah and Gittaim
  - type: text
    content: Hadid, Zeboim, and Neballat
  - type: text
    content: Lod and Ono and the Valley of the Craftsmen.
  - type: text
    content: Also some of the Levitical groups of Judah were assigned to Benjamin.
  '4':
  - type: text
    content: ' From the family of Judah:'
  - type: text
    content: Athaiah son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, from the family line of Perez; Maaseiah son of Baruch, the son of Col-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of the Shilonite. The descendants of Perez who lived in Jerusalem numbered 468 valiant men.
  '7':
  - type: text
    content: 'From the family of Benjamin:'
  - type: text
    content: 'Sallu son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah, and his brothers Gabbai and Sallai: 928 men. Joel son of Zicri was their chief and Judah son of Hassenuah was second in command over the city.'
