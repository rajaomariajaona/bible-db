document_id: NEH.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: The leaders of the people were already living in Jerusalem, so the rest of the people drew lots to get one out of ten to move to Jerusalem, the holy city, while the other nine remained in their towns. The people applauded those who voluntarily offered to live in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4a
  - type: text
    text: ' These are the leaders in the province who resided in Jerusalem (some Israelites, priests, Levites, Temple staff, and descendants of Solomon’s slaves lived in the towns of Judah on their own property in various towns; others from both Judah and Benjamin lived in Jerusalem):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4b-6
  - type: text
    text: ' From the family of Judah:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Athaiah son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, from the family line of Perez; Maaseiah son of Baruch, the son of Col-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of the Shilonite. The descendants of Perez who lived in Jerusalem numbered 468 valiant men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'From the family of Benjamin:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sallu son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah, and his brothers Gabbai and Sallai: 928 men. Joel son of Zicri was their chief and Judah son of Hassenuah was second in command over the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: 'From the priests:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jedaiah son of Joiarib; Jakin; Seraiah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, supervisor of The Temple of God, along with their associates responsible for work in The Temple: 822 men. Also Adaiah son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malkijah, and his associates who were heads of families: 242 men; Amashsai son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, and his associates, all valiant men: 128 men. Their commander was Zabdiel son of Haggedolim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: 'From the Levites:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; Shabbethai and Jozabad, two of the leaders of the Levites who were in charge of the outside work of The Temple of God; Mattaniah son of Mica, the son of Zabdi, the son of Asaph, the director who led in thanksgiving and prayer; Bakbukiah, second among his associates; and Abda son of Shammua, the son of Galal, the son of Jeduthun. The Levites in the holy city totaled 284.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'From the security guards:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Akkub, Talmon, and their associates who kept watch over the gates: 172 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The rest of the Israelites, priests, and Levites were in all the towns of Judah, each on his own family property.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The Temple staff lived on the hill Ophel. Ziha and Gishpa were responsible for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: The chief officer over the Levites in Jerusalem was Uzzi son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mica. Uzzi was one of Asaph’s descendants, singers who led worship in The Temple of God. The singers got their orders from the king, who drew up their daily schedule.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pethahiah son of Meshezabel, a descendant of Zerah son of Judah, represented the people’s concerns at the royal court.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-30
  - type: text
    text: 'Some of the Judeans lived in the villages near their farms:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Kiriath Arba (Hebron) and suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: Dibon and suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jekabzeel and suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jeshua
- type: usfm
  marker: li2
  children:
  - type: text
    text: Moladah
- type: usfm
  marker: li2
  children:
  - type: text
    text: Beth Pelet
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hazar Shual
- type: usfm
  marker: li2
  children:
  - type: text
    text: Beersheba and suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ziklag
- type: usfm
  marker: li2
  children:
  - type: text
    text: Meconah and suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: En Rimmon
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zorah
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jarmuth
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zanoah
- type: usfm
  marker: li2
  children:
  - type: text
    text: Adullam and their towns
- type: usfm
  marker: li2
  children:
  - type: text
    text: Lachish and its fields
- type: usfm
  marker: li2
  children:
  - type: text
    text: Azekah and suburbs.
- type: usfm
  marker: m
  children:
  - type: text
    text: They were living all the way from Beersheba to the Valley of Hinnom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-36
  - type: text
    text: 'The Benjaminites from Geba lived in:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Micmash
- type: usfm
  marker: li2
  children:
  - type: text
    text: Aijah
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bethel and its suburbs
- type: usfm
  marker: li2
  children:
  - type: text
    text: Anathoth
- type: usfm
  marker: li2
  children:
  - type: text
    text: Nob and Ananiah
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hazor
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ramah and Gittaim
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hadid, Zeboim, and Neballat
- type: usfm
  marker: li2
  children:
  - type: text
    text: Lod and Ono and the Valley of the Craftsmen.
- type: usfm
  marker: m
  children:
  - type: text
    text: Also some of the Levitical groups of Judah were assigned to Benjamin.
