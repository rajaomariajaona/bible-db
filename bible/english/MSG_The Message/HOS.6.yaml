type_code: eng
verses:
  '1':
  - type: heading
    content: Gangs of Priests Assaulting Worshipers
  - type: text
    content: '“Come on, let’s go back to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He hurt us, but he’ll heal us.
  - type: text
    content: He hit us hard,
  - type: text
    content: but he’ll put us right again.
  - type: text
    content: In a couple of days we’ll feel better.
  - type: text
    content: By the third day he’ll have made us brand-new,
  - type: text
    content: Alive and on our feet,
  - type: text
    content: fit to face him.
  - type: text
    content: 'We’re ready to study '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: eager for God-knowledge.
  - type: text
    content: As sure as dawn breaks,
  - type: text
    content: so sure is his daily arrival.
  - type: text
    content: He comes as rain comes,
  - type: text
    content: as spring rain refreshing the ground.”
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: '“I saw a shocking thing in the country of Israel:'
  - type: text
    content: Ephraim worshiping in a religious whorehouse,
  - type: text
    content: and Israel in the mud right there with him.
  '11':
  - type: text
    content: “You’re as bad as the worst of them, Judah.
  - type: text
    content: You’ve been sowing wild oats. Now it’s harvest time.”
  '4':
  - type: text
    content: “What am I to do with you, Ephraim?
  - type: text
    content: What do I make of you, Judah?
  - type: text
    content: Your declarations of love last no longer
  - type: text
    content: than morning mist and predawn dew.
  - type: text
    content: That’s why I use prophets to shake you to attention,
  - type: text
    content: 'why my words cut you to the quick:'
  - type: text
    content: To wake you up to my judgment
  - type: text
    content: blazing like light.
  - type: text
    content: I’m after love that lasts, not more religion.
  - type: text
    content: 'I want you to know '
  - type: text
    content: God
  - type: text
    content: ', not go to more prayer meetings.'
  - type: text
    content: You broke the covenant—just like Adam!
  - type: text
    content: You broke faith with me—ungrateful wretches!
  '8':
  - type: text
    content: “Gilead has become Crime City—
  - type: text
    content: blood on the sidewalks, blood on the streets.
  - type: text
    content: It used to be robbers who mugged pedestrians.
  - type: text
    content: Now it’s gangs of priests
  - type: text
    content: Assaulting worshipers on their way to Shechem.
  - type: text
    content: Nothing is sacred to them.
