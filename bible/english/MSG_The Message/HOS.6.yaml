document_id: HOS.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gangs of Priests Assaulting Worshipers
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Come on, let’s go back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hurt us, but he’ll heal us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hit us hard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he’ll put us right again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a couple of days we’ll feel better.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the third day he’ll have made us brand-new,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alive and on our feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit to face him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We’re ready to study '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eager for God-knowledge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As sure as dawn breaks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so sure is his daily arrival.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He comes as rain comes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as spring rain refreshing the ground.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I saw a shocking thing in the country of Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim worshiping in a religious whorehouse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel in the mud right there with him.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You’re as bad as the worst of them, Judah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve been sowing wild oats. Now it’s harvest time.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What am I to do with you, Ephraim?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What do I make of you, Judah?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your declarations of love last no longer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than morning mist and predawn dew.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I use prophets to shake you to attention,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'why my words cut you to the quick:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To wake you up to my judgment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blazing like light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m after love that lasts, not more religion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I want you to know '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', not go to more prayer meetings.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You broke the covenant—just like Adam!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You broke faith with me—ungrateful wretches!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gilead has become Crime City—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blood on the sidewalks, blood on the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It used to be robbers who mugged pedestrians.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now it’s gangs of priests
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assaulting worshipers on their way to Shechem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing is sacred to them.
