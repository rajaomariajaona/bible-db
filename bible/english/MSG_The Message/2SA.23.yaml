document_id: 2SA.23,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'These are David’s last words:'
  - type: text
    content: The voice of the son of Jesse,
  - type: text
    content: the voice of the man God took to the top,
  - type: text
    content: Whom the God of Jacob made king,
  - type: text
    content: and Israel’s most popular singer!
  '11':
  - type: text
    content: 'Shammah son of Agee the Hararite was the third of the Three. The Philistines had mustered for battle at Lehi, where there was a field full of lentils. Israel fled before the Philistines, but Shammah took his stand at the center of the field, successfully defended it, and routed the Philistines. Another great victory for '
  - type: text
    content: God
  - type: text
    content: '!'
  '13':
  - type: text
    content: 'One day during harvest, the Three parted from the Thirty and joined David at the Cave of Adullam. A squad of Philistines had set up camp in the Valley of Rephaim. While David was holed up in the Cave, the Philistines had their base camp in Bethlehem. David had a sudden craving and said, “Would I ever like a drink of water from the well at the gate of Bethlehem!” So the Three penetrated the Philistine lines, drew water from the well at the gate of Bethlehem, and brought it back to David. But David wouldn’t drink it; he poured it out as an offering to '
  - type: text
    content: God
  - type: text
    content: ', saying, “There is no way, '
  - type: text
    content: God
  - type: text
    content: ', that I’ll drink this! This isn’t mere water, it’s their life-blood—they risked their very lives to bring it!” So David refused to drink it.'
  - type: text
    content: This is the sort of thing that the Three did.
  '18':
  - type: text
    content: Abishai brother of Joab and son of Zeruiah was the head of the Thirty. He once got credit for killing three hundred with his spear, but he was never named in the same breath as the Three. He was the most respected of the Thirty and was their captain, but never got included among the Three.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Spirit spoke through me,
  - type: text
    content: his words took shape on my tongue.
  - type: text
    content: The God of Israel spoke to me,
  - type: text
    content: Israel’s Rock-Mountain said,
  - type: text
    content: “Whoever governs fairly and well,
  - type: text
    content: who rules in the Fear-of-God,
  - type: text
    content: Is like first light at daybreak
  - type: text
    content: without a cloud in the sky,
  - type: text
    content: Like green grass carpeting earth,
  - type: text
    content: glistening under fresh rain.”
  - type: text
    content: And this is just how my regime has been,
  - type: text
    content: for God guaranteed his covenant with me,
  - type: text
    content: Spelled it out plainly
  - type: text
    content: and kept every promised word—
  - type: text
    content: My entire salvation,
  - type: text
    content: my every desire.
  - type: text
    content: But the devil’s henchmen are like thorns
  - type: text
    content: culled and piled as trash;
  - type: text
    content: Better not try to touch them;
  - type: text
    content: keep your distance with a rake or hoe.
  - type: text
    content: They’ll make a glorious bonfire!
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: Benaiah son of Jehoiada from Kabzeel was a vigorous man who accomplished a great deal. He once killed two lion cubs in Moab. Another time, on a snowy day, he climbed down into a pit and killed a lion. Another time he killed a formidable Egyptian. The Egyptian was armed with a spear and Benaiah went against him with nothing but a walking stick; he seized the spear from his grip and killed him with his own spear.
  '22':
  - type: text
    content: These are the things that Benaiah son of Jehoiada is famous for. But neither did he ever get ranked with the Three. He was held in greatest respect among the Thirty, but he never got included with the Three. David put him in charge of his bodyguard.
  - type: heading
    content: The Thirty
  '24':
  - type: text
    content: '“The Thirty” consisted of:'
  - type: text
    content: Asahel brother of Joab;
  - type: text
    content: Elhanan son of Dodo of Bethlehem;
  - type: text
    content: Shammah the Harodite;
  - type: text
    content: Elika the Harodite;
  - type: text
    content: Helez the Paltite;
  - type: text
    content: Ira son of Ikkesh the Tekoite;
  - type: text
    content: Abiezer the Anathothite;
  - type: text
    content: Sibbecai the Hushathite;
  - type: text
    content: Zalmon the Ahohite;
  - type: text
    content: Maharai the Netophathite;
  - type: text
    content: Heled son of Baanah the Netophathite;
  - type: text
    content: Ithai son of Ribai from Gibeah of the Benjaminites;
  - type: text
    content: Benaiah the Pirathonite;
  - type: text
    content: Hiddai from the badlands of Gaash;
  - type: text
    content: Abi-Albon the Arbathite;
  - type: text
    content: Azmaveth the Barhumite;
  - type: text
    content: Eliahba the Shaalbonite;
  - type: text
    content: Jashen the Gizonite;
  - type: text
    content: Jonathan son of Shammah the Hararite;
  - type: text
    content: Ahiam son of Sharar the Urite;
  - type: text
    content: Eliphelet son of Ahasbai the Maacathite;
  - type: text
    content: Eliam son of Ahithophel the Gilonite;
  - type: text
    content: Hezro the Carmelite;
  - type: text
    content: Paarai the Arbite;
  - type: text
    content: Igal son of Nathan, commander of the army of Hagrites;
  - type: text
    content: Zelek the Ammonite;
  - type: text
    content: Naharai the Beerothite, weapon bearer of Joab son of Zeruiah;
  - type: text
    content: Ira the Ithrite;
  - type: text
    content: Gareb the Ithrite;
  - type: text
    content: Uriah the Hittite.
  - type: text
    content: Thirty-seven, all told.
  '8':
  - type: text
    content: This is the listing of David’s top men.
  - type: text
    content: Josheb-Basshebeth, the Tahkemonite. He was chief of the Three. He once put his spear to work against eight hundred—killed them all in a day.
  '9':
  - type: text
    content: 'Eleazar son of Dodai the Ahohite was the next of the elite Three. He was with David when the Philistines poked fun at them at Pas Dammim. When the Philistines drew up for battle, Israel retreated. But Eleazar stood his ground and killed Philistines right and left until he was exhausted—but he never let go of his sword! A big win for '
  - type: text
    content: God
  - type: text
    content: ' that day. The army then rejoined Eleazar, but all there was left to do was the cleanup.'
