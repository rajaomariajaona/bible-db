document_id: 2SA.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are David’s last words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voice of the son of Jesse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the voice of the man God took to the top,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom the God of Jacob made king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Israel’s most popular singer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Spirit spoke through me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his words took shape on my tongue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God of Israel spoke to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s Rock-Mountain said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Whoever governs fairly and well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who rules in the Fear-of-God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is like first light at daybreak
- type: usfm
  marker: q2
  children:
  - type: text
    text: without a cloud in the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like green grass carpeting earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: glistening under fresh rain.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And this is just how my regime has been,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for God guaranteed his covenant with me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spelled it out plainly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and kept every promised word—
- type: usfm
  marker: q1
  children:
  - type: text
    text: My entire salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my every desire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the devil’s henchmen are like thorns
- type: usfm
  marker: q2
  children:
  - type: text
    text: culled and piled as trash;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Better not try to touch them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: keep your distance with a rake or hoe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll make a glorious bonfire!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: This is the listing of David’s top men.
- type: usfm
  marker: p
  children:
  - type: text
    text: Josheb-Basshebeth, the Tahkemonite. He was chief of the Three. He once put his spear to work against eight hundred—killed them all in a day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Eleazar son of Dodai the Ahohite was the next of the elite Three. He was with David when the Philistines poked fun at them at Pas Dammim. When the Philistines drew up for battle, Israel retreated. But Eleazar stood his ground and killed Philistines right and left until he was exhausted—but he never let go of his sword! A big win for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that day. The army then rejoined Eleazar, but all there was left to do was the cleanup.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Shammah son of Agee the Hararite was the third of the Three. The Philistines had mustered for battle at Lehi, where there was a field full of lentils. Israel fled before the Philistines, but Shammah took his stand at the center of the field, successfully defended it, and routed the Philistines. Another great victory for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: 'One day during harvest, the Three parted from the Thirty and joined David at the Cave of Adullam. A squad of Philistines had set up camp in the Valley of Rephaim. While David was holed up in the Cave, the Philistines had their base camp in Bethlehem. David had a sudden craving and said, “Would I ever like a drink of water from the well at the gate of Bethlehem!” So the Three penetrated the Philistine lines, drew water from the well at the gate of Bethlehem, and brought it back to David. But David wouldn’t drink it; he poured it out as an offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', saying, “There is no way, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', that I’ll drink this! This isn’t mere water, it’s their life-blood—they risked their very lives to bring it!” So David refused to drink it.'
- type: usfm
  marker: p
  children:
  - type: text
    text: This is the sort of thing that the Three did.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Abishai brother of Joab and son of Zeruiah was the head of the Thirty. He once got credit for killing three hundred with his spear, but he was never named in the same breath as the Three. He was the most respected of the Thirty and was their captain, but never got included among the Three.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Benaiah son of Jehoiada from Kabzeel was a vigorous man who accomplished a great deal. He once killed two lion cubs in Moab. Another time, on a snowy day, he climbed down into a pit and killed a lion. Another time he killed a formidable Egyptian. The Egyptian was armed with a spear and Benaiah went against him with nothing but a walking stick; he seized the spear from his grip and killed him with his own spear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: These are the things that Benaiah son of Jehoiada is famous for. But neither did he ever get ranked with the Three. He was held in greatest respect among the Thirty, but he never got included with the Three. David put him in charge of his bodyguard.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Thirty
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-39
  - type: text
    text: '“The Thirty” consisted of:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Asahel brother of Joab;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elhanan son of Dodo of Bethlehem;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shammah the Harodite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elika the Harodite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Helez the Paltite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ira son of Ikkesh the Tekoite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Abiezer the Anathothite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Sibbecai the Hushathite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zalmon the Ahohite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Maharai the Netophathite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Heled son of Baanah the Netophathite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ithai son of Ribai from Gibeah of the Benjaminites;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Benaiah the Pirathonite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hiddai from the badlands of Gaash;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Abi-Albon the Arbathite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Azmaveth the Barhumite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliahba the Shaalbonite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jashen the Gizonite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jonathan son of Shammah the Hararite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahiam son of Sharar the Urite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliphelet son of Ahasbai the Maacathite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliam son of Ahithophel the Gilonite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hezro the Carmelite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Paarai the Arbite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Igal son of Nathan, commander of the army of Hagrites;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zelek the Ammonite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Naharai the Beerothite, weapon bearer of Joab son of Zeruiah;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ira the Ithrite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Gareb the Ithrite;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Uriah the Hittite.
- type: usfm
  marker: m
  children:
  - type: text
    text: Thirty-seven, all told.
