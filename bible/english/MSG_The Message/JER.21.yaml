document_id: JER.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Start Each Day with a Sense of Justice
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to Jeremiah when King Zedekiah sent Pashur son of Malkijah and the priest Zephaniah son of Maaseiah to him with this request: “Nebuchadnezzar, king of Babylon, has waged war against us. Pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for us. Ask him for help. Maybe '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will intervene with one of his famous miracles and make him leave.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: 'But Jeremiah said, “Tell Zedekiah: ‘This is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel’s Message to you: You can say good-bye to your army, watch morale and weapons flushed down the drain. I’m going to personally lead the king of Babylon and the Chaldeans, against whom you’re fighting so hard, right into the city itself. I’m joining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' side and fighting against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ', fighting all-out, holding nothing back. And in fierce anger. I’m prepared to wipe out the population of this city, people and animals alike, in a raging epidemic. And then I will personally deliver Zedekiah king of Judah, his princes, and any survivors left in the city who haven’t died from disease, been killed, or starved. I’ll deliver them to Nebuchadnezzar, king of Babylon—yes, hand them over to their enemies, who have come to kill them. He’ll kill them ruthlessly, showing no mercy.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: “And then tell the people at large, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to you is this: Listen carefully. I’m giving you a choice: life or death. Whoever stays in this city will die—either in battle or by starvation or disease. But whoever goes out and surrenders to the Chaldeans who have surrounded the city will live. You’ll lose everything—but not your life. I’m determined to see this city destroyed. I’m that angry with this place! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree. I’m going to give it to the king of Babylon, and he’s going to burn it to the ground.’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: '“To the royal house of Judah, listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message!
- type: usfm
  marker: q2
  children:
  - type: text
    text: House of David, listen—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Start each day by dealing with justice.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rescue victims from their exploiters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prevent fire—the fire of my anger—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for once it starts, it can’t be put out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your evil regime
- type: usfm
  marker: q2
  children:
  - type: text
    text: is fuel for my anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you realize that I’m against you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against
  - type: text
    text: ' you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You think you’ve got it made,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all snug and secure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You say, “Who can possibly get to us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can crash our party?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, I can—and will!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll punish your evil regime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll start a fire that will rage unchecked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: burn everything in sight to cinders.’”
