    content: Start Each Day with a Sense of Justice
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to Jeremiah when King Zedekiah sent Pashur son of Malkijah and the priest Zephaniah son of Maaseiah to him with this request: “Nebuchadnezzar, king of Babylon, has waged war against us. Pray to '
  - type: text
    content: God
  - type: text
    content: ' for us. Ask him for help. Maybe '
  - type: text
    content: God
  - type: text
    content: ' will intervene with one of his famous miracles and make him leave.”'
  '11':
  - type: text
    content: '“To the royal house of Judah, listen to '
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: text
    content: House of David, listen—
  - type: text
    content: God
  - type: text
    content: '’s Message to you:'
  - type: text
    content: ‘Start each day by dealing with justice.
  - type: text
    content: Rescue victims from their exploiters.
  - type: text
    content: Prevent fire—the fire of my anger—
  - type: text
    content: for once it starts, it can’t be put out.
  - type: text
    content: Your evil regime
  - type: text
    content: is fuel for my anger.
  - type: text
    content: Don’t you realize that I’m against you,
  - type: text
    content: 'yes, '
  - type: text
    content: against
  - type: text
    content: ' you.'
  - type: text
    content: You think you’ve got it made,
  - type: text
    content: all snug and secure.
  - type: text
    content: You say, “Who can possibly get to us?
  - type: text
    content: Who can crash our party?”
  - type: text
    content: Well, I can—and will!
  - type: text
    content: I’ll punish your evil regime.
  - type: text
    content: I’ll start a fire that will rage unchecked,
  - type: text
    content: burn everything in sight to cinders.’”
  '3':
  - type: text
    content: 'But Jeremiah said, “Tell Zedekiah: ‘This is the '
  - type: text
    content: God
  - type: text
    content: ' of Israel’s Message to you: You can say good-bye to your army, watch morale and weapons flushed down the drain. I’m going to personally lead the king of Babylon and the Chaldeans, against whom you’re fighting so hard, right into the city itself. I’m joining '
  - type: text
    content: their
  - type: text
    content: ' side and fighting against '
  - type: text
    content: you
  - type: text
    content: ', fighting all-out, holding nothing back. And in fierce anger. I’m prepared to wipe out the population of this city, people and animals alike, in a raging epidemic. And then I will personally deliver Zedekiah king of Judah, his princes, and any survivors left in the city who haven’t died from disease, been killed, or starved. I’ll deliver them to Nebuchadnezzar, king of Babylon—yes, hand them over to their enemies, who have come to kill them. He’ll kill them ruthlessly, showing no mercy.’'
  '8':
  - type: text
    content: “And then tell the people at large, ‘
  - type: text
    content: God
  - type: text
    content: '’s Message to you is this: Listen carefully. I’m giving you a choice: life or death. Whoever stays in this city will die—either in battle or by starvation or disease. But whoever goes out and surrenders to the Chaldeans who have surrounded the city will live. You’ll lose everything—but not your life. I’m determined to see this city destroyed. I’m that angry with this place! '
  - type: text
    content: God
  - type: text
    content: ’s Decree. I’m going to give it to the king of Babylon, and he’s going to burn it to the ground.’
