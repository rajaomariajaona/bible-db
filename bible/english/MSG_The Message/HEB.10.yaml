document_id: HEB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sacrifice of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-10
  - type: text
    text: 'The old plan was only a hint of the good things in the new plan. Since that old “law plan” wasn’t complete in itself, it couldn’t complete those who followed it. No matter how many sacrifices were offered year after year, they never added up to a complete solution. If they had, the worshipers would have gone blissfully on their way, no longer dragged down by their sins. But instead of removing awareness of sin, when those animal sacrifices were repeated over and over they actually heightened awareness and guilt. The plain fact is that bull and goat blood can’t get rid of sin. That is what is meant by this prophecy, put in the mouth of Christ:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You don’t want sacrifices and offerings year after year;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve prepared a body for me for a sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s not fragrance and smoke from the altar
- type: usfm
  marker: q2
  children:
  - type: text
    text: that whet your appetite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I said, “I’m here to do it your way, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the way it’s described in your Book.”
- type: usfm
  marker: m
  children:
  - type: text
    text: When he said, “You don’t want sacrifices and offerings,” he was referring to practices according to the old plan. When he added, “I’m here to do it your way,” he set aside the first in order to enact the new plan—
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' way—by which we are made fit for God by the once-for-all sacrifice of Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-18
  - type: text
    text: 'Every priest goes to work at the altar each day, offers the same old sacrifices year in, year out, and never makes a dent in the sin problem. As a priest, Christ made a single sacrifice for sins, and that was it! Then he sat down right beside God and waited for his enemies to cave in. It was a perfect sacrifice by a perfect person to perfect some very imperfect people. By that single offering, he did everything that needed to be done for everyone who takes part in the purifying process. The Holy Spirit confirms this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: This new plan I’m making with Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: isn’t going to be written on paper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: isn’t going to be chiseled in stone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This time “I’m writing out the plan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: carving it on the lining of their hearts.”
- type: usfm
  marker: m
  children:
  - type: text
    text: He concludes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll forever wipe the slate clean of their sins.
- type: usfm
  marker: m
  children:
  - type: text
    text: Once sins are taken care of for good, there’s no longer any need to offer sacrifices for them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Throw It All Away
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: So, friends, we can now—without hesitation—walk right up to God, into “the Holy Place.” Jesus has cleared the way by the blood of his sacrifice, acting as our priest before God. The “curtain” into God’s presence is his body.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25
  - type: text
    text: 'So let’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' it—full of belief, confident that we’re presentable inside and out. Let’s keep a firm grip on the promises that keep us going. He always keeps his word. Let’s see how inventive we can be in encouraging love and helping out, not avoiding worshiping together as some do but spurring each other on, especially as we see the big Day approaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-31
  - type: text
    text: 'If we give up and turn our backs on all we’ve learned, all we’ve been given, all the truth we now know, we repudiate Christ’s sacrifice and are left on our own to face the Judgment—and a mighty fierce judgment it will be! If the penalty for breaking the law of Moses is physical death, what do you think will happen if you turn on God’s Son, spit on the sacrifice that made you whole, and insult this most gracious Spirit? This is no light matter. God has warned us that he’ll hold us to account and make us pay. He was quite explicit: “Vengeance is mine, and I won’t overlook a thing” and “God will judge his people.” Nobody’s getting by with anything, believe me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-39
  - type: text
    text: 'Remember those early days after you first saw the light? Those were the hard times! Kicked around in public, targets of every kind of abuse—some days it was you, other days your friends. If some friends went to prison, you stuck by them. If some enemies broke in and seized your goods, you let them go with a smile, knowing they couldn’t touch your real treasure. Nothing they did bothered you, nothing set you back. So don’t throw it all away now. You were sure of yourselves then. It’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still
  - type: text
    text: ' a sure thing! But you need to stick it out, staying with God’s plan so you’ll be there for the promised completion.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It won’t be long now, he’s on the way;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll show up most any minute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But anyone who is right with me thrives on loyal trust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if he cuts and runs, I won’t be very happy.
- type: usfm
  marker: m
  children:
  - type: text
    text: But we’re not quitters who lose out. Oh, no! We’ll stay with it and survive, trusting all the way.
