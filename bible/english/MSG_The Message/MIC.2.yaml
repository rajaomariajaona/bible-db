document_id: MIC.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Has Had Enough
  - type: text
    content: Doom to those who plot evil,
  - type: text
    content: who go to bed dreaming up crimes!
  - type: text
    content: As soon as it’s morning,
  - type: text
    content: they’re off, full of energy, doing what they’ve planned.
  - type: text
    content: They covet fields and grab them,
  - type: text
    content: find homes and take them.
  - type: text
    content: They bully the neighbor and his family,
  - type: text
    content: see people only for what they can get out of them.
  - type: text
    content: God
  - type: text
    content: ' has had enough. He says,'
  - type: text
    content: '“I have some plans of my own:'
  - type: text
    content: Disaster because of this interbreeding evil!
  - type: text
    content: Your necks are on the line.
  - type: text
    content: You’re not walking away from this.
  - type: text
    content: It’s doomsday for you.
  - type: text
    content: Mocking ballads will be sung of you,
  - type: text
    content: 'and you yourselves will sing the blues:'
  - type: text
    content: ‘Our lives are ruined,
  - type: text
    content: our homes and lands auctioned off.
  - type: text
    content: They take everything, leave us nothing!
  - type: text
    content: All is sold to the highest bidder.’”
  - type: text
    content: And there’ll be no one to stand up for you,
  - type: text
    content: 'no one to speak for you before '
  - type: text
    content: God
  - type: text
    content: ' and his jury.'
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: “I’m calling a meeting, Jacob.
  - type: text
    content: I want everyone back—all the survivors of Israel.
  - type: text
    content: I’ll get them together in one place—
  - type: text
    content: like sheep in a fold, like cattle in a corral—
  - type: text
    content: a milling throng of homebound people!
  - type: text
    content: 'Then I, '
  - type: text
    content: God
  - type: text
    content: ', will burst all confinements'
  - type: text
    content: and lead them out into the open.
  - type: text
    content: They’ll follow their King.
  - type: text
    content: I will be out in front leading them.”
  '6':
  - type: text
    content: “Don’t preach,” say the preachers.
  - type: text
    content: “Don’t preach such stuff.
  - type: text
    content: Nothing bad will happen to us.
  - type: text
    content: 'Talk like '
  - type: text
    content: this
  - type: text
    content: ' to the family of Jacob?'
  - type: text
    content: 'Does '
  - type: text
    content: God
  - type: text
    content: ' lose his temper?'
  - type: text
    content: Is this the way he acts?
  - type: text
    content: Isn’t he on the side of good people?
  - type: text
    content: Doesn’t he help those who help themselves?”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: “What do you mean, ‘good people’!
  - type: text
    content: You’re the enemy of my people!
  - type: text
    content: You rob unsuspecting people
  - type: text
    content: out for an evening stroll.
  - type: text
    content: You take their coats off their backs
  - type: text
    content: like soldiers who plunder the defenseless.
  - type: text
    content: You drive the women of my people
  - type: text
    content: out of their ample homes.
  - type: text
    content: You make victims of the children
  - type: text
    content: and leave them vulnerable to violence and vice.
  - type: text
    content: Get out of here, the lot of you.
  - type: text
    content: You can’t take it easy here!
  - type: text
    content: You’ve polluted this place,
  - type: text
    content: 'and now '
  - type: text
    content: you’re
  - type: text
    content: ' polluted—ruined!'
  - type: text
    content: If someone showed up with a good smile and glib tongue
  - type: text
    content: and told lies from morning to night—
  - type: text
    content: ‘I’ll preach sermons that will tell you
  - type: text
    content: 'how you can get anything you want from God:'
  - type: text
    content: More money, the best wines . . . you name it’—
  - type: text
    content: you’d hire him on the spot as your preacher!
  - type: text
    content: '* * *'
