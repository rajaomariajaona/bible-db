document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Has Had Enough
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: Doom to those who plot evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who go to bed dreaming up crimes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: As soon as it’s morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re off, full of energy, doing what they’ve planned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They covet fields and grab them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: find homes and take them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They bully the neighbor and his family,
- type: usfm
  marker: q2
  children:
  - type: text
    text: see people only for what they can get out of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has had enough. He says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“I have some plans of my own:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disaster because of this interbreeding evil!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your necks are on the line.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re not walking away from this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s doomsday for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mocking ballads will be sung of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and you yourselves will sing the blues:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Our lives are ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our homes and lands auctioned off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They take everything, leave us nothing!
- type: usfm
  marker: q2
  children:
  - type: text
    text: All is sold to the highest bidder.’”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there’ll be no one to stand up for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no one to speak for you before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and his jury.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: “Don’t preach,” say the preachers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Don’t preach such stuff.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing bad will happen to us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Talk like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' to the family of Jacob?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lose his temper?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is this the way he acts?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t he on the side of good people?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Doesn’t he help those who help themselves?”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: “What do you mean, ‘good people’!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re the enemy of my people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You rob unsuspecting people
- type: usfm
  marker: q2
  children:
  - type: text
    text: out for an evening stroll.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You take their coats off their backs
- type: usfm
  marker: q2
  children:
  - type: text
    text: like soldiers who plunder the defenseless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You drive the women of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of their ample homes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You make victims of the children
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave them vulnerable to violence and vice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get out of here, the lot of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You can’t take it easy here!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve polluted this place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you’re
  - type: text
    text: ' polluted—ruined!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If someone showed up with a good smile and glib tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: and told lies from morning to night—
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I’ll preach sermons that will tell you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'how you can get anything you want from God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: More money, the best wines . . . you name it’—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’d hire him on the spot as your preacher!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: “I’m calling a meeting, Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want everyone back—all the survivors of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll get them together in one place—
- type: usfm
  marker: q2
  children:
  - type: text
    text: like sheep in a fold, like cattle in a corral—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a milling throng of homebound people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will burst all confinements'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lead them out into the open.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll follow their King.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be out in front leading them.”
