document_id: NUM.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Passover
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses in the Wilderness of Sinai in the first month of the second year after leaving Egypt: “Have the People of Israel celebrate Passover at the set time. Celebrate it on schedule, on the evening of the fourteenth day of this month, following all the rules and procedures.”'
  '13':
  - type: text
    content: '“But a man who is ritually clean and is not off on a trip and still fails to celebrate the Passover must be cut off from his people because he did not present '
  - type: text
    content: God
  - type: text
    content: ’s offering at the set time. That man will pay for his sin.
  '14':
  - type: text
    content: '“Any foreigner living among you who wants to celebrate '
  - type: text
    content: God
  - type: text
    content: ’s Passover is welcome to do it, but he must follow all the rules and procedures. The same procedures go for both foreigner and native-born.”
  - type: heading
    content: The Cloud
  '15':
  - type: text
    content: The day The Dwelling was set up, the Cloud covered The Dwelling of the Tent of Testimony. From sunset until daybreak it was over The Dwelling. It looked like fire. It was like that all the time, the Cloud over The Dwelling and at night looking like fire.
  '17':
  - type: text
    content: 'When the Cloud lifted above the Tent, the People of Israel marched out; and when the Cloud descended the people camped. The People of Israel marched at '
  - type: text
    content: God
  - type: text
    content: '’s command and they camped at his command. As long as the Cloud was over The Dwelling, they camped. Even when the Cloud hovered over The Dwelling for many days, they honored '
  - type: text
    content: God
  - type: text
    content: '’s command and wouldn’t march. They stayed in camp, obedient to '
  - type: text
    content: God
  - type: text
    content: '’s command, as long as the Cloud was over The Dwelling, but the moment '
  - type: text
    content: God
  - type: text
    content: ' issued orders they marched. If the Cloud stayed only from sunset to daybreak and then lifted at daybreak, they marched. Night or day, it made no difference—when the Cloud lifted, they marched. It made no difference whether the Cloud hovered over The Dwelling for two days or a month or a year, as long as the Cloud was there, they were there. And when the Cloud went up, they got up and marched. They camped at '
  - type: text
    content: God
  - type: text
    content: '’s command and they marched at '
  - type: text
    content: God
  - type: text
    content: '’s command. They lived obediently by '
  - type: text
    content: God
  - type: text
    content: ’s orders as delivered by Moses.
  '4':
  - type: text
    content: 'Moses told the People of Israel to celebrate the Passover and they did—in the Wilderness of Sinai at evening of the fourteenth day of the first month. The People of Israel did it all just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '6':
  - type: text
    content: 'But some of them couldn’t celebrate the Passover on the assigned day because they were ritually unclean on account of a corpse. So they presented themselves before Moses and Aaron on Passover and told Moses, “We have become ritually unclean because of a corpse, but why should we be barred from bringing '
  - type: text
    content: God
  - type: text
    content: ’s offering along with other Israelites on the day set for Passover?”
  '8':
  - type: text
    content: 'Moses said, “Give me some time; I’ll find out what '
  - type: text
    content: God
  - type: text
    content: ' says in your circumstances.”'
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Tell the People of Israel, If one or another of you is ritually unclean because of a corpse, or you happen to be off on a long trip, you may still celebrate '
  - type: text
    content: God
  - type: text
    content: ’s Passover. But celebrate it on the fourteenth day of the second month at evening. Eat the lamb together with unraised bread and bitter herbs. Don’t leave any of it until morning. Don’t break any of its bones. Follow all the procedures.
