document_id: 1CH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of David
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'These are the sons that David had while he lived at Hebron:'
- type: usfm
  marker: p
  children:
  - type: text
    text: His firstborn was Amnon by Ahinoam of Jezreel;
- type: usfm
  marker: p
  children:
  - type: text
    text: second, Daniel by Abigail of Carmel;
- type: usfm
  marker: p
  children:
  - type: text
    text: third, Absalom born of Maacah, daughter of Talmai king of Geshur;
- type: usfm
  marker: p
  children:
  - type: text
    text: fourth, Adonijah born of Haggith;
- type: usfm
  marker: p
  children:
  - type: text
    text: fifth, Shephatiah born of Abital;
- type: usfm
  marker: p
  children:
  - type: text
    text: sixth, Ithream born of his wife Eglah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-9
  - type: text
    text: He had these six sons while he was in Hebron; he was king there for seven years and six months.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He went on to be king in Jerusalem for another thirty-three years. These are the sons he had in Jerusalem: first Shammua, then Shobab, Nathan, and Solomon. Bathsheba daughter of Ammiel was the mother of these four. And then there were another nine sons: Ibhar, Elishua, Eliphelet, Nogah, Nepheg, Japhia, Elishama, Eliada, Eliphelet—David’s sons, plus Tamar their sister. There were other sons by his concubines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: In the next generation Solomon had Rehoboam, who had Abijah, who had Asa, who had Jehoshaphat, who had Jehoram, who had Ahaziah, who had Joash, who had Amaziah, who had Azariah, who had Jotham, who had Ahaz, who had Hezekiah, who had Manasseh, who had Amon, who had Josiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Josiah’s firstborn was Johanan, followed by Jehoiakim, then Zedekiah, and finally Shallum.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jehoiakim’s sons were Jeconiah (Jehoiachin) and Zedekiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'The sons of Jeconiah born while he was captive in Babylon: Shealtiel, Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: Pedaiah had Zerubbabel and Shimei; Zerubbabel had Meshullam and Hananiah. Shelomith was their sister. And then five more—Hashubah, Ohel, Berekiah, Hasadiah, and Jushab-Hesed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hananiah’s sons were Pelatiah and Jeshaiah. There were also sons of Rephaiah, sons of Arnan, sons of Obadiah, and sons of Shecaniah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Shecaniah had Shemaiah who in his turn had Hattush, Igal, Bariah, Neariah, and Shaphat—six of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Neariah had three sons: Elioenai, Hizkiah, and Azrikam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Elioenai had seven sons: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani.'
