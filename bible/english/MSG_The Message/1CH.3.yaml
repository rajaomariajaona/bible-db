document_id: 1CH.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family of David
  - type: text
    content: 'These are the sons that David had while he lived at Hebron:'
  - type: text
    content: His firstborn was Amnon by Ahinoam of Jezreel;
  - type: text
    content: second, Daniel by Abigail of Carmel;
  - type: text
    content: third, Absalom born of Maacah, daughter of Talmai king of Geshur;
  - type: text
    content: fourth, Adonijah born of Haggith;
  - type: text
    content: fifth, Shephatiah born of Abital;
  - type: text
    content: sixth, Ithream born of his wife Eglah.
  '10':
  - type: text
    content: In the next generation Solomon had Rehoboam, who had Abijah, who had Asa, who had Jehoshaphat, who had Jehoram, who had Ahaziah, who had Joash, who had Amaziah, who had Azariah, who had Jotham, who had Ahaz, who had Hezekiah, who had Manasseh, who had Amon, who had Josiah.
  '15':
  - type: text
    content: Josiah’s firstborn was Johanan, followed by Jehoiakim, then Zedekiah, and finally Shallum.
  '16':
  - type: text
    content: Jehoiakim’s sons were Jeconiah (Jehoiachin) and Zedekiah.
  '17':
  - type: text
    content: 'The sons of Jeconiah born while he was captive in Babylon: Shealtiel, Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.'
  '19':
  - type: text
    content: Pedaiah had Zerubbabel and Shimei; Zerubbabel had Meshullam and Hananiah. Shelomith was their sister. And then five more—Hashubah, Ohel, Berekiah, Hasadiah, and Jushab-Hesed.
  '21':
  - type: text
    content: Hananiah’s sons were Pelatiah and Jeshaiah. There were also sons of Rephaiah, sons of Arnan, sons of Obadiah, and sons of Shecaniah.
  '22':
  - type: text
    content: Shecaniah had Shemaiah who in his turn had Hattush, Igal, Bariah, Neariah, and Shaphat—six of them.
  '23':
  - type: text
    content: 'Neariah had three sons: Elioenai, Hizkiah, and Azrikam.'
  '24':
  - type: text
    content: 'And Elioenai had seven sons: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani.'
  '4':
  - type: text
    content: He had these six sons while he was in Hebron; he was king there for seven years and six months.
  - type: text
    content: 'He went on to be king in Jerusalem for another thirty-three years. These are the sons he had in Jerusalem: first Shammua, then Shobab, Nathan, and Solomon. Bathsheba daughter of Ammiel was the mother of these four. And then there were another nine sons: Ibhar, Elishua, Eliphelet, Nogah, Nepheg, Japhia, Elishama, Eliada, Eliphelet—David’s sons, plus Tamar their sister. There were other sons by his concubines.'
