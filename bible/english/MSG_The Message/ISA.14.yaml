document_id: ISA.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Now You Are Nothing
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But not so with Jacob. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will have compassion on Jacob. Once again he’ll choose Israel. He’ll establish them in their own country. Outsiders will be attracted and throw their lot in with Jacob. The nations among whom they lived will actually escort them back home, and then Israel will pay them back by making slaves of them, men and women alike, possessing them as slaves in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s country, capturing those who had captured them, ruling over those who had abused them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is where your pomp and fine music led you, Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your underworld private chambers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A king-size mattress of maggots for repose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a quilt of crawling worms for warmth.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a comedown this, O Babylon!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Daystar! Son of Dawn!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flat on your face in the underworld mud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you, famous for flattening nations!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said to yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’ll climb to heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll set my throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over the stars of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll run the assembly of angels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that meets on sacred Mount Zaphon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll climb to the top of the clouds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll take over as King of the Universe!”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you didn’t make it, did you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Instead of climbing up, you came down—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Down with the underground dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down to the abyss of the Pit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'People will stare and muse:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Can this be the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who terrorized earth and its kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned earth to a moonscape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wasted its cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shut up his prisoners to a living death?”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Other kings get a decent burial,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honored with eulogies and placed in a tomb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you’re dumped in a ditch unburied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a stray dog or cat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Covered with rotting bodies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: murdered and indigent corpses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your dead body desecrated, mutilated—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no state funeral for you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve left your land in ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left a legacy of massacre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The progeny of your evil life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be named. Oblivion!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get a place ready to slaughter the sons of the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wipe out their father’s line.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unthinkable that they should own a square foot of land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or desecrate the face of the world with their cities!
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I will confront them”—Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies—“and strip Babylon of name and survivors, children and grandchildren.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Decree. “I’ll make it a worthless swamp and give it as a prize to the hedgehog. And then I’ll bulldoze it out of existence.” Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Who Could Ever Cancel Such Plans?
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies speaks:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Exactly as I planned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will happen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Following my blueprints,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will take shape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will shatter the Assyrian who trespasses my land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stomp him into the dirt on my mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will ban his taking and making of slaves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lift the weight of oppression from all shoulders.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the plan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planned for the whole earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this is the hand that will do it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reaching into every nation.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies has planned it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who could ever cancel such plans?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His is the hand that’s reached out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who could brush it aside?
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the year King Ahaz died, this Message came:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold it, Philistines! It’s too soon to celebrate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the defeat of your cruel oppressor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the death throes of that snake a worse snake will come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from that, one even worse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor won’t have to worry.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The needy will escape the terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you Philistines will be plunged into famine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who don’t starve, God will kill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail and howl, proud city!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fall prostrate in fear, Philistia!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the northern horizon, smoke from burned cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wake of a brutal, disciplined destroyer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given you time to recover from the abuse and trouble and harsh servitude that you had to endure, you can amuse yourselves by taking up this satire, a taunt against the king of Babylon:'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What does one say to
  - type: usfm
    marker: q2
    children:
    - type: text
      text: outsiders who ask questions?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell them, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has established Zion.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those in need and in trouble find refuge in her.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' Can you believe it? The tyrant is gone!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The tyranny is over!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has broken the rule of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the power of the bully-rulers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That crushed many people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A relentless rain of cruel outrage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Established a violent rule of anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rife with torture and persecution.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now it’s over, the whole earth quietly at rest.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Burst into song! Make the rafters ring!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ponderosa pine trees are happy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: giant Lebanon cedars are relieved, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Since you’ve been cut down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there’s no one around to cut us down.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the underworld dead are all excited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preparing to welcome you when you come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Getting ready to greet you are the ghostly dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the famous names of earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the buried kings of the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will stand up on their thrones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With well-prepared speeches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'royal invitations to death:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now you are as nothing as we are!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make yourselves at home with us dead folks!”
