document_id: ISA.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Now You Are Nothing
  - type: text
    content: 'But not so with Jacob. '
  - type: text
    content: God
  - type: text
    content: ' will have compassion on Jacob. Once again he’ll choose Israel. He’ll establish them in their own country. Outsiders will be attracted and throw their lot in with Jacob. The nations among whom they lived will actually escort them back home, and then Israel will pay them back by making slaves of them, men and women alike, possessing them as slaves in '
  - type: text
    content: God
  - type: text
    content: ’s country, capturing those who had captured them, ruling over those who had abused them.
  '11':
  - type: text
    content: This is where your pomp and fine music led you, Babylon,
  - type: text
    content: to your underworld private chambers,
  - type: text
    content: A king-size mattress of maggots for repose
  - type: text
    content: and a quilt of crawling worms for warmth.
  '12':
  - type: text
    content: What a comedown this, O Babylon!
  - type: text
    content: Daystar! Son of Dawn!
  - type: text
    content: Flat on your face in the underworld mud,
  - type: text
    content: you, famous for flattening nations!
  '13':
  - type: text
    content: You said to yourself,
  - type: text
    content: “I’ll climb to heaven.
  - type: text
    content: I’ll set my throne
  - type: text
    content: over the stars of God.
  - type: text
    content: I’ll run the assembly of angels
  - type: text
    content: that meets on sacred Mount Zaphon.
  - type: text
    content: I’ll climb to the top of the clouds.
  - type: text
    content: I’ll take over as King of the Universe!”
  '15':
  - type: text
    content: But you didn’t make it, did you?
  - type: text
    content: Instead of climbing up, you came down—
  - type: text
    content: Down with the underground dead,
  - type: text
    content: down to the abyss of the Pit.
  - type: text
    content: 'People will stare and muse:'
  - type: text
    content: “Can this be the one
  - type: text
    content: Who terrorized earth and its kingdoms,
  - type: text
    content: turned earth to a moonscape,
  - type: text
    content: Wasted its cities,
  - type: text
    content: shut up his prisoners to a living death?”
  '18':
  - type: text
    content: Other kings get a decent burial,
  - type: text
    content: honored with eulogies and placed in a tomb.
  - type: text
    content: But you’re dumped in a ditch unburied,
  - type: text
    content: like a stray dog or cat,
  - type: text
    content: Covered with rotting bodies,
  - type: text
    content: murdered and indigent corpses.
  - type: text
    content: Your dead body desecrated, mutilated—
  - type: text
    content: no state funeral for you!
  - type: text
    content: You’ve left your land in ruins,
  - type: text
    content: left a legacy of massacre.
  - type: text
    content: The progeny of your evil life
  - type: text
    content: will never be named. Oblivion!
  '21':
  - type: text
    content: Get a place ready to slaughter the sons of the wicked
  - type: text
    content: and wipe out their father’s line.
  - type: text
    content: Unthinkable that they should own a square foot of land
  - type: text
    content: or desecrate the face of the world with their cities!
  '22':
  - type: text
    content: '“I will confront them”—Decree of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies—“and strip Babylon of name and survivors, children and grandchildren.” '
  - type: text
    content: God
  - type: text
    content: '’s Decree. “I’ll make it a worthless swamp and give it as a prize to the hedgehog. And then I’ll bulldoze it out of existence.” Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: heading
    content: Who Could Ever Cancel Such Plans?
  '24':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaks:'
  - type: text
    content: “Exactly as I planned,
  - type: text
    content: it will happen.
  - type: text
    content: Following my blueprints,
  - type: text
    content: it will take shape.
  - type: text
    content: I will shatter the Assyrian who trespasses my land
  - type: text
    content: and stomp him into the dirt on my mountains.
  - type: text
    content: I will ban his taking and making of slaves
  - type: text
    content: and lift the weight of oppression from all shoulders.”
  - type: text
    content: This is the plan,
  - type: text
    content: planned for the whole earth,
  - type: text
    content: And this is the hand that will do it,
  - type: text
    content: reaching into every nation.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies has planned it.
  - type: text
    content: Who could ever cancel such plans?
  - type: text
    content: His is the hand that’s reached out.
  - type: text
    content: Who could brush it aside?
  '28':
  - type: text
    content: 'In the year King Ahaz died, this Message came:'
  - type: text
    content: Hold it, Philistines! It’s too soon to celebrate
  - type: text
    content: the defeat of your cruel oppressor.
  - type: text
    content: From the death throes of that snake a worse snake will come,
  - type: text
    content: and from that, one even worse.
  - type: text
    content: The poor won’t have to worry.
  - type: text
    content: The needy will escape the terror.
  - type: text
    content: But you Philistines will be plunged into famine,
  - type: text
    content: and those who don’t starve, God will kill.
  - type: text
    content: Wail and howl, proud city!
  - type: text
    content: Fall prostrate in fear, Philistia!
  - type: text
    content: On the northern horizon, smoke from burned cities,
  - type: text
    content: the wake of a brutal, disciplined destroyer.
  '3':
  - type: text
    content: ' When '
  - type: text
    content: God
  - type: text
    content: ' has given you time to recover from the abuse and trouble and harsh servitude that you had to endure, you can amuse yourselves by taking up this satire, a taunt against the king of Babylon:'
  '32':
  - type: text
    content: What does one say to
  - type: text
    content: outsiders who ask questions?
  - type: text
    content: Tell them, “
  - type: text
    content: God
  - type: text
    content: ' has established Zion.'
  - type: text
    content: Those in need and in trouble find refuge in her.”
  '4':
  - type: text
    content: ' Can you believe it? The tyrant is gone!'
  - type: text
    content: The tyranny is over!
  - type: text
    content: God
  - type: text
    content: ' has broken the rule of the wicked,'
  - type: text
    content: the power of the bully-rulers
  - type: text
    content: That crushed many people.
  - type: text
    content: A relentless rain of cruel outrage
  - type: text
    content: Established a violent rule of anger
  - type: text
    content: rife with torture and persecution.
  '7':
  - type: text
    content: And now it’s over, the whole earth quietly at rest.
  - type: text
    content: Burst into song! Make the rafters ring!
  - type: text
    content: Ponderosa pine trees are happy,
  - type: text
    content: giant Lebanon cedars are relieved, saying,
  - type: text
    content: “Since you’ve been cut down,
  - type: text
    content: there’s no one around to cut us down.”
  - type: text
    content: And the underworld dead are all excited,
  - type: text
    content: preparing to welcome you when you come.
  - type: text
    content: Getting ready to greet you are the ghostly dead,
  - type: text
    content: all the famous names of earth.
  - type: text
    content: All the buried kings of the nations
  - type: text
    content: will stand up on their thrones
  - type: text
    content: With well-prepared speeches,
  - type: text
    content: 'royal invitations to death:'
  - type: text
    content: “Now you are as nothing as we are!
  - type: text
    content: Make yourselves at home with us dead folks!”
