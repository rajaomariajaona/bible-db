document_id: EZK.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Put the Bundle on Your Shoulder and Walk into the Night
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, you’re living with a bunch of rebellious people. They have eyes but don’t see a thing, they have ears but don’t hear a thing. They’re rebels all. So, son of man, pack up your exile duffel bags. Leave in broad daylight with everyone watching and go off, as if into exile. Maybe then they’ll understand what’s going on, rebels though they are. You’ll take up your baggage while they watch, a bundle of the bare necessities of someone going into exile, and toward evening leave, just like a person going off into exile. As they watch, dig through the wall of the house and carry your bundle through it. In full sight of the people, put the bundle on your shoulder and walk out into the night. Cover your face so you won’t have to look at what you’ll never see again. I’m using you as a sign for the family of Israel.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Also tell them, ‘I am drawing a picture for you. As I am now doing, it will be done to all the people of Israel. They will go into exile as captives.’
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The prince will put his bundle on his shoulders in the dark and leave. He’ll dig through the wall of the house, covering his face so he won’t have to look at the land he’ll never see again. But I’ll make sure he gets caught and is taken to Babylon. Blinded, he’ll never see that land in which he’ll die. I’ll scatter to the four winds those who helped him escape, along with his troops, and many will die in battle. They’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' when I scatter them among foreign countries.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I’ll permit a few of them to escape the killing, starvation, and deadly sickness so that they can confess among the foreign countries all the disgusting obscenities they’ve been involved in. They will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, eat your meals shaking in your boots, drink your water trembling with fear. Tell the people of this land, everyone living in Jerusalem and Israel, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: ‘You’ll eat your meals shaking in your boots and drink your water in terror because your land is going to be stripped bare as punishment for the brutality rampant in it. All the cities and villages will be emptied out and the fields destroyed. Then you’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, what’s this proverb making the rounds in the land of Israel that says, ‘Everything goes on the same as ever; all the prophetic warnings are false alarms’?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tell them, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says, This proverb’s going to have a short life!’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell them, ‘Time’s about up. Every warning is about to come true. False alarms and easygoing preaching are a thing of the past in the life of Israel. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', am doing the speaking. What I say happens. None of what I say is on hold. What I say, I’ll do—and soon, you rebels!’ Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' the Master.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, do you hear what Israel is saying: that the alarm the prophet raises is for a long time off, that he’s preaching about the far-off future? Well, tell them, ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says, “Nothing of what I say is on hold. What I say happens.”’ Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I did exactly as he commanded me. I got my stuff together and brought it out in the street where everyone could see me, bundled it up the way someone being taken off into exile would, and then, as the sun went down, made a hole in the wall of the house with my hands. As it grew dark and as they watched, I left, throwing my bundle across my shoulders.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next morning '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to me: “Son of man, when anyone in Israel, that bunch of rebels, asks you, ‘What are you doing?’ Tell them, ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says that this Message especially concerns the prince in Jerusalem—Zedekiah—but includes all the people of Israel.’'
