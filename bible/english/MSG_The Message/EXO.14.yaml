document_id: EXO.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story and Song of Salvation
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell the Israelites to turn around and make camp at Pi Hahiroth, between Migdol and the sea. Camp on the shore of the sea opposite Baal Zephon.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: As Pharaoh approached, the Israelites looked up and saw them—Egyptians! Coming at them!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were totally afraid. They cried out in terror to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . They told Moses, “Weren’t the cemeteries large enough in Egypt so that you had to take us out here in the wilderness to die? What have you done to us, taking us out of Egypt? Back in Egypt didn’t we tell you this would happen? Didn’t we tell you, ‘Leave us alone here in Egypt—we’re better off as slaves in Egypt than as corpses in the wilderness.’”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moses spoke to the people: “Don’t be afraid. Stand firm and watch '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' do his work of salvation for you today. Take a good look at the Egyptians today for you’re never going to see them again.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will fight the battle for you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you? You keep your mouths shut!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “Why cry out to me? Speak to the Israelites. Order them to get moving. Hold your staff high and stretch your hand out over the sea: Split the sea! The Israelites will walk through the sea on dry ground.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: '“Meanwhile I’ll make sure the Egyptians keep up their stubborn chase—I’ll use Pharaoh and his entire army, his chariots and horsemen, to put my Glory on display so that the Egyptians will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: The angel of God that had been leading the camp of Israel now shifted and got behind them. And the Pillar of Cloud that had been in front also shifted to the rear. The Cloud was now between the camp of Egypt and the camp of Israel. The Cloud enshrouded one camp in darkness and flooded the other with light. The two camps didn’t come near each other all night.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Moses stretched out his hand over the sea and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', with a terrific east wind all night long, made the sea go back. He made the sea dry ground. The seawaters split.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-25
    - type: text
      text: 'The Israelites walked through the sea on dry ground with the waters a wall to the right and to the left. The Egyptians came after them in full pursuit, every horse and chariot and driver of Pharaoh racing into the middle of the sea. It was now the morning watch. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' looked down from the Pillar of Fire and Cloud on the Egyptian army and threw them into a panic. He clogged the wheels of their chariots; they were stuck in the mud.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Egyptians said, “Run from Israel! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is fighting on their side and against Egypt!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Stretch out your hand over the sea and the waters will come back over the Egyptians, over their chariots, over their horsemen.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: 'Moses stretched his hand out over the sea: As the day broke and the Egyptians were running, the sea returned to its place as before. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' dumped the Egyptians in the middle of the sea. The waters returned, drowning the chariots and riders of Pharaoh’s army that had chased after Israel into the sea. Not one of them survived.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-31
    - type: text
      text: 'But the Israelites walked right through the middle of the sea on dry ground, the waters forming a wall to the right and to the left. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' delivered Israel that day from the oppression of the Egyptians. And Israel looked at the Egyptian dead, washed up on the shore of the sea, and realized the tremendous power that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought against the Egyptians. The people were in reverent awe before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and trusted in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and his servant Moses.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: '“Pharaoh will think, ‘The Israelites are lost; they’re confused. The wilderness has closed in on them.’ Then I’ll make Pharaoh’s heart stubborn again and he’ll chase after them. And I’ll use Pharaoh and his army to put my Glory on display. Then the Egyptians will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And that’s what happened.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: When the king of Egypt was told that the people were gone, he and his servants changed their minds. They said, “What have we done, letting Israel, our slave labor, go free?” So he had his chariots harnessed up and got his army together. He took six hundred of his best chariots, with the rest of the Egyptian chariots and their drivers coming along.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made Pharaoh king of Egypt stubborn, determined to chase the Israelites as they walked out on him without even looking back. The Egyptians gave chase and caught up with them where they had made camp by the sea—all Pharaoh’s horse-drawn chariots and their riders, all his foot soldiers there at Pi Hahiroth opposite Baal Zephon.'
