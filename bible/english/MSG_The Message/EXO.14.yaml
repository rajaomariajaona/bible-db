document_id: EXO.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Story and Song of Salvation
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Tell the Israelites to turn around and make camp at Pi Hahiroth, between Migdol and the sea. Camp on the shore of the sea opposite Baal Zephon.'
  '10':
  - type: text
    content: As Pharaoh approached, the Israelites looked up and saw them—Egyptians! Coming at them!
  - type: text
    content: 'They were totally afraid. They cried out in terror to '
  - type: text
    content: God
  - type: text
    content: . They told Moses, “Weren’t the cemeteries large enough in Egypt so that you had to take us out here in the wilderness to die? What have you done to us, taking us out of Egypt? Back in Egypt didn’t we tell you this would happen? Didn’t we tell you, ‘Leave us alone here in Egypt—we’re better off as slaves in Egypt than as corpses in the wilderness.’”
  '13':
  - type: text
    content: 'Moses spoke to the people: “Don’t be afraid. Stand firm and watch '
  - type: text
    content: God
  - type: text
    content: ' do his work of salvation for you today. Take a good look at the Egyptians today for you’re never going to see them again.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' will fight the battle for you.'
  - type: text
    content: And you? You keep your mouths shut!”
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses: “Why cry out to me? Speak to the Israelites. Order them to get moving. Hold your staff high and stretch your hand out over the sea: Split the sea! The Israelites will walk through the sea on dry ground.'
  '17':
  - type: text
    content: '“Meanwhile I’ll make sure the Egyptians keep up their stubborn chase—I’ll use Pharaoh and his entire army, his chariots and horsemen, to put my Glory on display so that the Egyptians will realize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  '19':
  - type: text
    content: The angel of God that had been leading the camp of Israel now shifted and got behind them. And the Pillar of Cloud that had been in front also shifted to the rear. The Cloud was now between the camp of Egypt and the camp of Israel. The Cloud enshrouded one camp in darkness and flooded the other with light. The two camps didn’t come near each other all night.
  '21':
  - type: text
    content: 'Then Moses stretched out his hand over the sea and '
  - type: text
    content: God
  - type: text
    content: ', with a terrific east wind all night long, made the sea go back. He made the sea dry ground. The seawaters split.'
  '22':
  - type: text
    content: 'The Israelites walked through the sea on dry ground with the waters a wall to the right and to the left. The Egyptians came after them in full pursuit, every horse and chariot and driver of Pharaoh racing into the middle of the sea. It was now the morning watch. '
  - type: text
    content: God
  - type: text
    content: ' looked down from the Pillar of Fire and Cloud on the Egyptian army and threw them into a panic. He clogged the wheels of their chariots; they were stuck in the mud.'
  - type: text
    content: 'The Egyptians said, “Run from Israel! '
  - type: text
    content: God
  - type: text
    content: ' is fighting on their side and against Egypt!”'
  '26':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Stretch out your hand over the sea and the waters will come back over the Egyptians, over their chariots, over their horsemen.”'
  '27':
  - type: text
    content: 'Moses stretched his hand out over the sea: As the day broke and the Egyptians were running, the sea returned to its place as before. '
  - type: text
    content: God
  - type: text
    content: ' dumped the Egyptians in the middle of the sea. The waters returned, drowning the chariots and riders of Pharaoh’s army that had chased after Israel into the sea. Not one of them survived.'
  '29':
  - type: text
    content: 'But the Israelites walked right through the middle of the sea on dry ground, the waters forming a wall to the right and to the left. '
  - type: text
    content: God
  - type: text
    content: ' delivered Israel that day from the oppression of the Egyptians. And Israel looked at the Egyptian dead, washed up on the shore of the sea, and realized the tremendous power that '
  - type: text
    content: God
  - type: text
    content: ' brought against the Egyptians. The people were in reverent awe before '
  - type: text
    content: God
  - type: text
    content: ' and trusted in '
  - type: text
    content: God
  - type: text
    content: ' and his servant Moses.'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: '“Pharaoh will think, ‘The Israelites are lost; they’re confused. The wilderness has closed in on them.’ Then I’ll make Pharaoh’s heart stubborn again and he’ll chase after them. And I’ll use Pharaoh and his army to put my Glory on display. Then the Egyptians will realize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: And that’s what happened.
  '5':
  - type: text
    content: When the king of Egypt was told that the people were gone, he and his servants changed their minds. They said, “What have we done, letting Israel, our slave labor, go free?” So he had his chariots harnessed up and got his army together. He took six hundred of his best chariots, with the rest of the Egyptian chariots and their drivers coming along.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' made Pharaoh king of Egypt stubborn, determined to chase the Israelites as they walked out on him without even looking back. The Egyptians gave chase and caught up with them where they had made camp by the sea—all Pharaoh’s horse-drawn chariots and their riders, all his foot soldiers there at Pi Hahiroth opposite Baal Zephon.'
