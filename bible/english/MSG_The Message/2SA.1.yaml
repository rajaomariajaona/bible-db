document_id: 2SA.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Shortly after Saul died, David returned to Ziklag from his rout of the Amalekites. Three days later a man showed up unannounced from Saul’s army camp.'
  '10':
  - type: text
    content: “So I did what he asked—I killed him. I knew he wouldn’t last much longer anyway. I removed his royal headband and bracelet, and have brought them to my master. Here they are.”
  '11':
  - type: text
    content: 'In lament, David ripped his clothes to ribbons. All the men with him did the same. They wept and fasted the rest of the day, grieving the death of Saul and his son Jonathan, and also the army of '
  - type: text
    content: God
  - type: text
    content: ' and the nation Israel, victims in a failed battle.'
  '13':
  - type: text
    content: 'Then David spoke to the young soldier who had brought the report: “Who are you, anyway?”'
  - type: text
    content: “I’m from an immigrant family—an Amalekite.”
  '14':
  - type: text
    content: '“Do you mean to say,” said David, “that you weren’t afraid to up and kill '
  - type: text
    content: God
  - type: text
    content: ’s anointed king?” Right then he ordered one of his soldiers, “Strike him dead!” The soldier struck him, and he died.
  '16':
  - type: text
    content: '“You asked for it,” David told him. “You sealed your death sentence when you said you killed '
  - type: text
    content: God
  - type: text
    content: ’s anointed king.”
  '17':
  - type: text
    content: Then David sang this lament over Saul and his son Jonathan, and gave orders that everyone in Judah learn it by heart. Yes, it’s even inscribed in The Book of Jashar.
  '19':
  - type: text
    content: Oh, oh, Gazelles of Israel, struck down on your hills,
  - type: text
    content: the mighty warriors—fallen, fallen!
  - type: text
    content: Don’t announce it in the city of Gath,
  - type: text
    content: don’t post the news in the streets of Ashkelon.
  - type: text
    content: Don’t give those coarse Philistine girls
  - type: text
    content: one more excuse for a drunken party!
  - type: text
    content: No more dew or rain for you, hills of Gilboa,
  - type: text
    content: and not a drop from springs and wells,
  - type: text
    content: For there the warriors’ shields were dragged through the mud,
  - type: text
    content: Saul’s shield left there to rot.
  '2':
  - type: text
    content: ' Disheveled and obviously in mourning, he fell to his knees in respect before David. David asked, “What brings you here?”'
  - type: text
    content: He answered, “I’ve just escaped from the camp of Israel.”
  '22':
  - type: text
    content: Jonathan’s bow was bold—
  - type: text
    content: the bigger they were the harder they fell.
  - type: text
    content: Saul’s sword was fearless—
  - type: text
    content: once out of the scabbard, nothing could stop it.
  '23':
  - type: text
    content: Saul and Jonathan—beloved, beautiful!
  - type: text
    content: Together in life, together in death.
  - type: text
    content: Swifter than plummeting eagles,
  - type: text
    content: stronger than proud lions.
  '24':
  - type: text
    content: Women of Israel, weep for Saul.
  - type: text
    content: He dressed you in finest cottons and silks,
  - type: text
    content: spared no expense in making you elegant.
  - type: text
    content: The mighty warriors—fallen, fallen
  - type: text
    content: in the middle of the fight!
  - type: text
    content: Jonathan—struck down on your hills!
  '26':
  - type: text
    content: O my dear brother Jonathan,
  - type: text
    content: I’m crushed by your death.
  - type: text
    content: Your friendship was a miracle-wonder,
  - type: text
    content: love far exceeding anything I’ve known—
  - type: text
    content: or ever hope to know.
  '27':
  - type: text
    content: The mighty warriors—fallen, fallen.
  - type: text
    content: And the arms of war broken to bits.
  '4':
  - type: text
    content: “So what happened?” said David. “What’s the news?”
  - type: text
    content: He said, “The Israelites have fled the battlefield, leaving a lot of their dead comrades behind. And Saul and his son Jonathan are dead.”
  '5':
  - type: text
    content: 'David pressed the young soldier for details: “How do you know for sure that Saul and Jonathan are dead?”'
  '6':
  - type: text
    content: “I just happened by Mount Gilboa and came on Saul, badly wounded and leaning on his spear, with enemy chariots and horsemen bearing down hard on him. He looked behind him, saw me, and called me to him. ‘Yes sir,’ I said, ‘at your service.’ He asked me who I was, and I told him, ‘I’m an Amalekite.’”
  '9':
  - type: text
    content: “Come here,” he said, “and put me out of my misery. I’m nearly dead already, but my life hangs on.”
