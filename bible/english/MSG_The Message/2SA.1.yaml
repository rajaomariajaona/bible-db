document_id: 2SA.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Shortly after Saul died, David returned to Ziklag from his rout of the Amalekites. Three days later a man showed up unannounced from Saul’s army camp.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “So I did what he asked—I killed him. I knew he wouldn’t last much longer anyway. I removed his royal headband and bracelet, and have brought them to my master. Here they are.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In lament, David ripped his clothes to ribbons. All the men with him did the same. They wept and fasted the rest of the day, grieving the death of Saul and his son Jonathan, and also the army of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and the nation Israel, victims in a failed battle.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David spoke to the young soldier who had brought the report: “Who are you, anyway?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m from an immigrant family—an Amalekite.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do you mean to say,” said David, “that you weren’t afraid to up and kill '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s anointed king?” Right then he ordered one of his soldiers, “Strike him dead!” The soldier struck him, and he died.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You asked for it,” David told him. “You sealed your death sentence when you said you killed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s anointed king.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David sang this lament over Saul and his son Jonathan, and gave orders that everyone in Judah learn it by heart. Yes, it’s even inscribed in The Book of Jashar.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, oh, Gazelles of Israel, struck down on your hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mighty warriors—fallen, fallen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t announce it in the city of Gath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t post the news in the streets of Ashkelon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t give those coarse Philistine girls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one more excuse for a drunken party!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more dew or rain for you, hills of Gilboa,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not a drop from springs and wells,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there the warriors’ shields were dragged through the mud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Saul’s shield left there to rot.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Disheveled and obviously in mourning, he fell to his knees in respect before David. David asked, “What brings you here?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “I’ve just escaped from the camp of Israel.”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jonathan’s bow was bold—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bigger they were the harder they fell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saul’s sword was fearless—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once out of the scabbard, nothing could stop it.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saul and Jonathan—beloved, beautiful!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together in life, together in death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swifter than plummeting eagles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stronger than proud lions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Women of Israel, weep for Saul.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He dressed you in finest cottons and silks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spared no expense in making you elegant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty warriors—fallen, fallen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the middle of the fight!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jonathan—struck down on your hills!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my dear brother Jonathan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m crushed by your death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your friendship was a miracle-wonder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: love far exceeding anything I’ve known—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or ever hope to know.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty warriors—fallen, fallen.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the arms of war broken to bits.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “So what happened?” said David. “What’s the news?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “The Israelites have fled the battlefield, leaving a lot of their dead comrades behind. And Saul and his son Jonathan are dead.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David pressed the young soldier for details: “How do you know for sure that Saul and Jonathan are dead?”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I just happened by Mount Gilboa and came on Saul, badly wounded and leaning on his spear, with enemy chariots and horsemen bearing down hard on him. He looked behind him, saw me, and called me to him. ‘Yes sir,’ I said, ‘at your service.’ He asked me who I was, and I told him, ‘I’m an Amalekite.’”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Come here,” he said, “and put me out of my misery. I’m nearly dead already, but my life hangs on.”
