document_id: GEN.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Then God turned his attention to Noah and all the wild animals and farm animals with him on the ship. God caused the wind to blow and the floodwaters began to go down. The underground springs were shut off, the windows of Heaven closed and the rain quit. Inch by inch the water lowered. After 150 days the worst was over.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: He waited seven more days and sent out the dove again. It came back in the evening with a freshly picked olive leaf in its beak. Noah knew that the flood was about finished.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He waited another seven days and sent the dove out a third time. This time it didn’t come back.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: In the six-hundred-first year of Noah’s life, on the first day of the first month, the flood had dried up. Noah opened the hatch of the ship and saw dry ground. By the twenty-seventh day of the second month, the Earth was completely dry.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: 'God spoke to Noah: “Leave the ship, you and your wife and your sons and your sons’ wives. And take all the animals with you, the whole menagerie of birds and mammals and crawling creatures, all that swarming extravagance of life, so they can reproduce and flourish on the Earth.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Noah disembarked with his sons and wife and his sons’ wives. Then all the animals, crawling creatures, birds—every creature on the face of the Earth—left the ship family by family.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: 'Noah built an altar to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. He selected clean animals and birds from every species and offered them as burnt offerings on the altar. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' smelled the sweet fragrance and thought to himself, “I’ll never again curse the ground because of people. I know they have this bent toward evil from an early age, but I’ll never again kill off everything living as I’ve just done.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For as long as Earth lasts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planting and harvest, cold and heat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Summer and winter, day and night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never stop.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: On the seventeenth day of the seventh month, the ship landed on the Ararat mountain range. The water kept going down until the tenth month. On the first day of the tenth month the tops of the mountains came into view. After forty days Noah opened the window that he had built into the ship.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: He sent out a raven; it flew back and forth waiting for the floodwaters to dry up. Then he sent a dove to check on the flood conditions, but it couldn’t even find a place to perch—water still covered the Earth. Noah reached out and caught it, brought it back into the ship.
