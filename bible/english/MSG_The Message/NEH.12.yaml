document_id: NEH.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'These are the priests and Levites who came up with Zerubbabel son of Shealtiel and with Jeshua:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Seraiah, Jeremiah, Ezra,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amariah, Malluch, Hattush,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shecaniah, Rehum, Meremoth,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Iddo, Ginnethon, Abijah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mijamin, Moadiah, Bilgah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shemaiah, Joiarib, Jedaiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sallu, Amok, Hilkiah, and Jedaiah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the leaders of the priests during the time of Jeshua.
  '10':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Jeshua fathered Joiakim,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joiakim fathered Eliashib,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliashib fathered Joiada,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joiada fathered Jonathan,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Jonathan fathered Jaddua.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-21
    - type: text
      text: 'During the time of Joiakim, these were the heads of the priestly families:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of the family of Seraiah, Meraiah;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Jeremiah, Hananiah;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Ezra, Meshullam;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Amariah, Jehohanan;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Malluch, Jonathan;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Shecaniah, Joseph;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Harim, Adna;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Meremoth, Helkai;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Iddo, Zechariah;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Ginnethon, Meshullam;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Abijah, Zicri;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Miniamin and Moadiah, Piltai;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Bilgah, Shammua;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Shemaiah, Jehonathan;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Joiarib, Mattenai;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Jedaiah, Uzzi;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Sallu, Kallai;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Amok, Eber;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: of Hilkiah, Hashabiah;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and of Jedaiah, Nethanel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: During the time of Eliashib, Joiada, Johanan, and Jaddua, the Levites were registered as heads of families. During the reign of Darius the Persian, the priests were registered.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'The Levites who were heads of families were registered in the Book of the Chronicles until the time of Johanan son of Eliashib. These were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hashabiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sherebiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Jeshua son of Kadmiel.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Their brothers stood opposite them to give praise and thanksgiving, one side responding to the other, as had been directed by David the man of God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'The security guards included:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mattaniah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bakbukiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Obadiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Meshullam,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Talmon,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Akkub.
  - type: usfm
    marker: m
    children:
    - type: text
      text: They guarded the storerooms at the gates. They lived during the time of Joiakim son of Jeshua, the son of Jozadak, the time of Nehemiah the governor and of Ezra the priest and scholar.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dedication of the Wall
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-29
    - type: text
      text: 'When it came time for the dedication of the wall, they tracked down and brought in the Levites from all their homes in Jerusalem to carry out the dedication with exuberance: thanksgiving hymns, songs, cymbals, harps, and lutes. The singers assembled from all around Jerusalem, from the villages of the Netophathites, from Beth Gilgal, from the farms at Geba and Azmaveth—the singers had built villages for themselves all around Jerusalem.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The priests and Levites ceremonially purified themselves; then they did the same for the people, the gates, and the wall.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-36
    - type: text
      text: I had the leaders of Judah come up on the wall, and I appointed two large choirs. One proceeded on the wall to the right toward the Dung Gate. Hashaiah and half the leaders of Judah followed them, including Azariah, Ezra, Meshullam, Judah, Benjamin, Shemaiah, and Jeremiah. Some of the young priests had trumpets. Next, playing the musical instruments of David the man of God, came Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph, and his brothers Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani. Ezra the scholar led them.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: At the Fountain Gate they went straight ahead, up the steps of the City of David using the wall stairway above the house of David to the Water Gate on the east.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-39
    - type: text
      text: The other choir proceeded to the left. I and half of the people followed them on the wall from the Tower of Furnaces to the Broad Wall, over the Ephraim Gate, the Jeshanah Gate, the Fish Gate, the Tower of Hananel, and the Tower of the Hundred as far as the Sheep Gate, stopping at the Prison Gate.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-42
    - type: text
      text: The two choirs then took their places in The Temple of God. I was there with half of the officials, along with the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah with their trumpets. Also Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer. The singers, directed by Jezrahiah, made the rafters ring.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: That day they offered great sacrifices, an exuberant celebration because God had filled them with great joy. The women and children raised their happy voices with all the rest. Jerusalem’s jubilation was heard far and wide.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-46
    - type: text
      text: That same day men were appointed to be responsible for the storerooms for the offerings, the firstfruits, and the tithes. They saw to it that the portion directed by The Revelation for the priests and Levites was brought in from the farms connected to the towns. Judah was so appreciative of the priests and Levites and their service; they, along with the singers and security guards, had done everything so well, conducted the worship of their God and the ritual of ceremonial cleansing in a way that would have made David and his son Solomon proud. That’s the way it was done in the olden days, the days of David and Asaph, when they had choir directors for singing songs of praise and thanksgiving to God.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: During the time of Zerubbabel and Nehemiah, all Israel contributed the daily allowances for the singers and security guards. They also set aside what was dedicated to the Levites, and the Levites did the same for the Aaronites.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: 'And the Levites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jeshua, Binnui, Kadmiel, Sherebiah, Judah;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mattaniah, with his brothers, was in charge of songs of praise, and their brothers Bakbukiah and Unni stood opposite them in the services of worship.
