document_id: NEH.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'These are the priests and Levites who came up with Zerubbabel son of Shealtiel and with Jeshua:'
  - type: text
    content: Seraiah, Jeremiah, Ezra,
  - type: text
    content: Amariah, Malluch, Hattush,
  - type: text
    content: Shecaniah, Rehum, Meremoth,
  - type: text
    content: Iddo, Ginnethon, Abijah,
  - type: text
    content: Mijamin, Moadiah, Bilgah,
  - type: text
    content: Shemaiah, Joiarib, Jedaiah,
  - type: text
    content: Sallu, Amok, Hilkiah, and Jedaiah.
  - type: text
    content: These were the leaders of the priests during the time of Jeshua.
  '10':
  - type: text
    content: Jeshua fathered Joiakim,
  - type: text
    content: Joiakim fathered Eliashib,
  - type: text
    content: Eliashib fathered Joiada,
  - type: text
    content: Joiada fathered Jonathan,
  - type: text
    content: and Jonathan fathered Jaddua.
  '12':
  - type: text
    content: 'During the time of Joiakim, these were the heads of the priestly families:'
  - type: text
    content: of the family of Seraiah, Meraiah;
  - type: text
    content: of Jeremiah, Hananiah;
  - type: text
    content: of Ezra, Meshullam;
  - type: text
    content: of Amariah, Jehohanan;
  - type: text
    content: of Malluch, Jonathan;
  - type: text
    content: of Shecaniah, Joseph;
  - type: text
    content: of Harim, Adna;
  - type: text
    content: of Meremoth, Helkai;
  - type: text
    content: of Iddo, Zechariah;
  - type: text
    content: of Ginnethon, Meshullam;
  - type: text
    content: of Abijah, Zicri;
  - type: text
    content: of Miniamin and Moadiah, Piltai;
  - type: text
    content: of Bilgah, Shammua;
  - type: text
    content: of Shemaiah, Jehonathan;
  - type: text
    content: of Joiarib, Mattenai;
  - type: text
    content: of Jedaiah, Uzzi;
  - type: text
    content: of Sallu, Kallai;
  - type: text
    content: of Amok, Eber;
  - type: text
    content: of Hilkiah, Hashabiah;
  - type: text
    content: and of Jedaiah, Nethanel.
  '22':
  - type: text
    content: During the time of Eliashib, Joiada, Johanan, and Jaddua, the Levites were registered as heads of families. During the reign of Darius the Persian, the priests were registered.
  '23':
  - type: text
    content: 'The Levites who were heads of families were registered in the Book of the Chronicles until the time of Johanan son of Eliashib. These were:'
  - type: text
    content: Hashabiah,
  - type: text
    content: Sherebiah,
  - type: text
    content: and Jeshua son of Kadmiel.
  - type: text
    content: Their brothers stood opposite them to give praise and thanksgiving, one side responding to the other, as had been directed by David the man of God.
  '25':
  - type: text
    content: 'The security guards included:'
  - type: text
    content: Mattaniah,
  - type: text
    content: Bakbukiah,
  - type: text
    content: Obadiah,
  - type: text
    content: Meshullam,
  - type: text
    content: Talmon,
  - type: text
    content: and Akkub.
  - type: text
    content: They guarded the storerooms at the gates. They lived during the time of Joiakim son of Jeshua, the son of Jozadak, the time of Nehemiah the governor and of Ezra the priest and scholar.
  - type: heading
    content: Dedication of the Wall
  '27':
  - type: text
    content: 'When it came time for the dedication of the wall, they tracked down and brought in the Levites from all their homes in Jerusalem to carry out the dedication with exuberance: thanksgiving hymns, songs, cymbals, harps, and lutes. The singers assembled from all around Jerusalem, from the villages of the Netophathites, from Beth Gilgal, from the farms at Geba and Azmaveth—the singers had built villages for themselves all around Jerusalem.'
  '30':
  - type: text
    content: The priests and Levites ceremonially purified themselves; then they did the same for the people, the gates, and the wall.
  '31':
  - type: text
    content: I had the leaders of Judah come up on the wall, and I appointed two large choirs. One proceeded on the wall to the right toward the Dung Gate. Hashaiah and half the leaders of Judah followed them, including Azariah, Ezra, Meshullam, Judah, Benjamin, Shemaiah, and Jeremiah. Some of the young priests had trumpets. Next, playing the musical instruments of David the man of God, came Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph, and his brothers Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani. Ezra the scholar led them.
  '37':
  - type: text
    content: At the Fountain Gate they went straight ahead, up the steps of the City of David using the wall stairway above the house of David to the Water Gate on the east.
  '38':
  - type: text
    content: The other choir proceeded to the left. I and half of the people followed them on the wall from the Tower of Furnaces to the Broad Wall, over the Ephraim Gate, the Jeshanah Gate, the Fish Gate, the Tower of Hananel, and the Tower of the Hundred as far as the Sheep Gate, stopping at the Prison Gate.
  '40':
  - type: text
    content: The two choirs then took their places in The Temple of God. I was there with half of the officials, along with the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah with their trumpets. Also Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer. The singers, directed by Jezrahiah, made the rafters ring.
  '43':
  - type: text
    content: That day they offered great sacrifices, an exuberant celebration because God had filled them with great joy. The women and children raised their happy voices with all the rest. Jerusalem’s jubilation was heard far and wide.
  - type: text
    content: '* * *'
  '44':
  - type: text
    content: That same day men were appointed to be responsible for the storerooms for the offerings, the firstfruits, and the tithes. They saw to it that the portion directed by The Revelation for the priests and Levites was brought in from the farms connected to the towns. Judah was so appreciative of the priests and Levites and their service; they, along with the singers and security guards, had done everything so well, conducted the worship of their God and the ritual of ceremonial cleansing in a way that would have made David and his son Solomon proud. That’s the way it was done in the olden days, the days of David and Asaph, when they had choir directors for singing songs of praise and thanksgiving to God.
  '47':
  - type: text
    content: During the time of Zerubbabel and Nehemiah, all Israel contributed the daily allowances for the singers and security guards. They also set aside what was dedicated to the Levites, and the Levites did the same for the Aaronites.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'And the Levites:'
  - type: text
    content: Jeshua, Binnui, Kadmiel, Sherebiah, Judah;
  - type: text
    content: Mattaniah, with his brothers, was in charge of songs of praise, and their brothers Bakbukiah and Unni stood opposite them in the services of worship.
