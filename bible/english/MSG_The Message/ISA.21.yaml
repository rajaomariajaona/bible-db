document_id: ISA.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Betrayer Betrayed
  - type: text
    content: 'A Message concerning the desert at the sea:'
  - type: text
    content: As tempests drive through the Negev Desert,
  - type: text
    content: coming out of the desert, that terror-filled place,
  - type: text
    content: 'A hard vision is given me:'
  - type: text
    content: The betrayer betrayed, the plunderer plundered.
  - type: text
    content: Attack, Elam!
  - type: text
    content: Lay siege, Media!
  - type: text
    content: Persians, attack!
  - type: text
    content: Attack, Babylon!
  - type: text
    content: I’ll put an end to
  - type: text
    content: all the moaning and groaning.
  - type: text
    content: Because of this news I’m doubled up in pain,
  - type: text
    content: writhing in pain like a woman having a baby,
  - type: text
    content: Baffled by what I hear,
  - type: text
    content: undone by what I see.
  - type: text
    content: Absolutely stunned,
  - type: text
    content: horror-stricken,
  - type: text
    content: I had hoped for a relaxed evening,
  - type: text
    content: but it has turned into a nightmare.
  '10':
  - type: text
    content: Dear Israel, you’ve been through a lot,
  - type: text
    content: you’ve been put through the mill.
  - type: text
    content: 'The good news I get from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: the God of Israel, I now pass on to you.
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: 'A Message concerning Edom:'
  - type: text
    content: A voice calls to me
  - type: text
    content: from the Seir mountains in Edom,
  - type: text
    content: “Night watchman! How long till daybreak?
  - type: text
    content: How long will this night last?”
  - type: text
    content: The night watchman calls back,
  - type: text
    content: “Morning’s coming,
  - type: text
    content: But for now it’s still night.
  - type: text
    content: If you ask me again, I’ll give the same answer.”
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: 'A Message concerning Arabia:'
  - type: text
    content: You’ll have to camp out in the desert badlands,
  - type: text
    content: you caravans of Dedanites.
  - type: text
    content: Haul water to the thirsty,
  - type: text
    content: greet fugitives with bread.
  - type: text
    content: Show your desert hospitality,
  - type: text
    content: you who live in Tema.
  - type: text
    content: The desert’s swarming with refugees
  - type: text
    content: escaping the horrors of war.
  '16':
  - type: text
    content: 'The Master told me, “Hang on. Within one year—I’ll sign a contract on it!—the arrogant brutality of Kedar, those hooligans of the desert, will be over, nothing much left of the Kedar toughs.” The '
  - type: text
    content: God
  - type: text
    content: ' of Israel says so.'
  '5':
  - type: text
    content: The banquet is spread,
  - type: text
    content: the guests reclining in luxurious ease,
  - type: text
    content: Eating and drinking, having a good time,
  - type: text
    content: and then, “To arms, princes! The fight is on!”
  '6':
  - type: text
    content: The Master told me, “Go, post a lookout.
  - type: text
    content: Have him report whatever he spots.
  - type: text
    content: When he sees horses and wagons in battle formation,
  - type: text
    content: lines of donkeys and columns of camels,
  - type: text
    content: Tell him to keep his ear to the ground,
  - type: text
    content: note every whisper, every rumor.”
  - type: text
    content: Just then, the lookout shouted,
  - type: text
    content: “I’m at my post, Master,
  - type: text
    content: Sticking to my post day after day
  - type: text
    content: and all through the night!
  - type: text
    content: I watched them come,
  - type: text
    content: the horses and wagons in battle formation.
  - type: text
    content: 'I heard them call out the war news in headlines:'
  - type: text
    content: ‘Babylon fallen! Fallen!
  - type: text
    content: And all its precious god-idols
  - type: text
    content: smashed to pieces on the ground.’”
