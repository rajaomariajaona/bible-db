document_id: ISA.21,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Betrayer Betrayed
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A Message concerning the desert at the sea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As tempests drive through the Negev Desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming out of the desert, that terror-filled place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A hard vision is given me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The betrayer betrayed, the plunderer plundered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attack, Elam!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lay siege, Media!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Persians, attack!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Attack, Babylon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll put an end to
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the moaning and groaning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of this news I’m doubled up in pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: writhing in pain like a woman having a baby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Baffled by what I hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: undone by what I see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Absolutely stunned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: horror-stricken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I had hoped for a relaxed evening,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it has turned into a nightmare.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dear Israel, you’ve been through a lot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve been put through the mill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The good news I get from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel, I now pass on to you.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message concerning Edom:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A voice calls to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the Seir mountains in Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Night watchman! How long till daybreak?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will this night last?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The night watchman calls back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Morning’s coming,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But for now it’s still night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you ask me again, I’ll give the same answer.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message concerning Arabia:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll have to camp out in the desert badlands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you caravans of Dedanites.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haul water to the thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: greet fugitives with bread.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show your desert hospitality,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live in Tema.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The desert’s swarming with refugees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: escaping the horrors of war.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Master told me, “Hang on. Within one year—I’ll sign a contract on it!—the arrogant brutality of Kedar, those hooligans of the desert, will be over, nothing much left of the Kedar toughs.” The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of Israel says so.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The banquet is spread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the guests reclining in luxurious ease,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eating and drinking, having a good time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then, “To arms, princes! The fight is on!”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Master told me, “Go, post a lookout.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have him report whatever he spots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he sees horses and wagons in battle formation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lines of donkeys and columns of camels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell him to keep his ear to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: note every whisper, every rumor.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just then, the lookout shouted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’m at my post, Master,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sticking to my post day after day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all through the night!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I watched them come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the horses and wagons in battle formation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I heard them call out the war news in headlines:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Babylon fallen! Fallen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all its precious god-idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: smashed to pieces on the ground.’”
