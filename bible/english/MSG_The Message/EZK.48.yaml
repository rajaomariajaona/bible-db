document_id: EZK.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at the Center'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“These are the tribes:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Dan: one portion, along the northern boundary, following the Hethlon road that turns off to the entrance of Hamath as far as Hazor-enon so that the territory of Damascus lies to the north alongside Hamath, the northern border stretching from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Asher: one portion, bordering Dan from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Naphtali: one portion, bordering Asher from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Manasseh: one portion, bordering Naphtali from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Ephraim: one portion, bordering Manasseh from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Reuben: one portion, bordering Ephraim from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Judah: one portion, bordering Reuben from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: '“Bordering Judah from east to west is the consecrated area that you will set aside as holy: a square approximately seven by seven miles, with the Sanctuary set at the center. The consecrated area reserved for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is to be seven miles long and a little less than three miles wide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: '“This is how it will be parceled out. The priest will get the area measuring seven miles on the north and south boundaries, with a width of a little more than three miles at the east and west boundaries. The Sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will be at the center. This is for the consecrated priests, the Zadokites who stayed true in their service to me and didn’t get off track as the Levites did when Israel wandered off the main road. This is their special gift, a gift from the land itself, most holy ground, bordering the section of the Levites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: '“The Levites get a section equal in size to that of the priests, roughly seven by three miles. They are not permitted to sell or trade any of it. It’s the choice part of the land, to say nothing of being holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19
  - type: text
    text: '“What’s left of the ‘sacred square’—each side measures out at seven miles by a mile and a half—is for ordinary use: the city and its buildings with open country around it, but the city at the center. The north, south, east, and west sides of the city are each about a mile and a half in length. A strip of pasture, one hundred twenty-five yards wide, will border the city on all sides. The remainder of this portion, three miles of countryside to the east and to the west of the sacred precinct, is for farming. It will supply food for the city. Workers from all the tribes of Israel will serve as field hands to farm the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “This dedicated area, set apart for holy purposes, will be a square, seven miles by seven miles, a ‘holy square,’ which includes the part set aside for the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “The rest of this land, the country stretching east to the Jordan and west to the Mediterranean from the seven-mile sides of the ‘holy square,’ belongs to the prince. His land is sandwiched between the tribal portions north and south, and goes out both east and west from the ‘sacred square’ with its Temple at the center. The land set aside for the Levites on one side and the city on the other is in the middle of the territory assigned to the prince. The ‘sacred square’ is flanked east and west by the prince’s land and bordered on the north and south by the territories of Judah and Benjamin, respectively.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“And then the rest of the tribes:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Benjamin: one portion, stretching from the eastern to the western boundary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Simeon: one portion, bordering Benjamin from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Issachar: one portion, bordering Simeon from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Zebulun: one portion, bordering Issachar from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Gad: one portion, bordering Zebulun from east to west.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “The southern boundary of Gad will run south from Tamar to the waters of Meribah-kadesh, along the Brook of Egypt and then out to the Great Mediterranean Sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“This is the land that you are to divide up among the tribes of Israel as their inheritance. These are their portions.” Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '“These are the gates of the city. On the north side, which is 2,250 yards long (the gates of the city are named after the tribes of Israel), three gates: the gate of Reuben, the gate of Judah, the gate of Levi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“On the east side, measuring 2,250 yards, three gates: the gate of Joseph, the gate of Benjamin, the gate of Dan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“On the south side, measuring 2,250 yards, three gates: the gate of Simeon, the gate of Issachar, the gate of Zebulun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“On the west side, measuring 2,250 yards, three gates: the gate of Gad, the gate of Asher, the gate of Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “The four sides of the city measure to a total of nearly six miles.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“From now on the name of the city will be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Ya
  - type: usfm
    marker: nd
    children:
    - type: text
      text: h
  - type: usfm
    marker: nd
    children:
    - type: text
      text: weh-Shammah
  - type: text
    text: ':'
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: “
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God-Is-There.”
