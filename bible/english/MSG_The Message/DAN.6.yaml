document_id: DAN.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel in the Lions’ Den
  - type: text
    content: Darius reorganized his kingdom. He appointed one hundred twenty governors to administer all the parts of his realm. Over them were three vice-regents, one of whom was Daniel. The governors reported to the vice-regents, who made sure that everything was in order for the king. But Daniel, brimming with spirit and intelligence, so completely outclassed the other vice-regents and governors that the king decided to put him in charge of the whole kingdom.
  '10':
  - type: text
    content: When Daniel learned that the decree had been signed and posted, he continued to pray just as he had always done. His house had windows in the upstairs that opened toward Jerusalem. Three times a day he knelt there in prayer, thanking and praising his God.
  '11':
  - type: text
    content: The conspirators came and found him praying, asking God for help. They went straight to the king and reminded him of the royal decree that he had signed. “Did you not,” they said, “sign a decree forbidding anyone to pray to any god or man except you for the next thirty days? And anyone caught doing it would be thrown into the lions’ den?”
  - type: text
    content: “Absolutely,” said the king. “Written in stone, like all the laws of the Medes and Persians.”
  '13':
  - type: text
    content: Then they said, “Daniel, one of the Jewish exiles, ignores you, O king, and defies your decree. Three times a day he prays.”
  '14':
  - type: text
    content: At this, the king was very upset and tried his best to get Daniel out of the fix he’d put him in. He worked at it the whole day long.
  '15':
  - type: text
    content: 'But then the conspirators were back: “Remember, O king, it’s the law of the Medes and Persians that the king’s decree can never be changed.”'
  '16':
  - type: text
    content: The king caved in and ordered Daniel brought and thrown into the lions’ den. But he said to Daniel, “Your God, to whom you are so loyal, is going to get you out of this.”
  '17':
  - type: text
    content: A stone slab was placed over the opening of the den. The king sealed the cover with his signet ring and the signet rings of all his nobles, fixing Daniel’s fate.
  '18':
  - type: text
    content: The king then went back to his palace. He refused supper. He couldn’t sleep. He spent the night fasting.
  '19':
  - type: text
    content: At daybreak the king got up and hurried to the lions’ den. As he approached the den, he called out anxiously, “Daniel, servant of the living God, has your God, whom you serve so loyally, saved you from the lions?”
  '21':
  - type: text
    content: “O king, live forever!” said Daniel. “My God sent his angel, who closed the mouths of the lions so that they would not hurt me. I’ve been found innocent before God and also before you, O king. I’ve done nothing to harm you.”
  '23':
  - type: text
    content: When the king heard these words, he was happy. He ordered Daniel taken up out of the den. When he was hauled up, there wasn’t a scratch on him. He had trusted his God.
  '24':
  - type: text
    content: Then the king commanded that the conspirators who had informed on Daniel be thrown into the lions’ den, along with their wives and children. Before they hit the floor, the lions had them in their jaws, tearing them to pieces.
  '25':
  - type: text
    content: 'King Darius published this proclamation to every race, color, and creed on earth:'
  - type: text
    content: Peace to you! Abundant peace!
  - type: text
    content: I decree that Daniel’s God shall be worshiped and feared
  - type: text
    content: in all parts of my kingdom.
  - type: text
    content: He is the living God, world without end. His kingdom
  - type: text
    content: never falls.
  - type: text
    content: His rule continues eternally.
  - type: text
    content: He is a savior and rescuer.
  - type: text
    content: He performs astonishing miracles in heaven and on earth.
  - type: text
    content: He saved Daniel from the power of the lions.
  - type: text
    content: '* * *'
  '28':
  - type: text
    content: From then on, Daniel was treated well during the reign of Darius, and also in the following reign of Cyrus the Persian.
  '4':
  - type: text
    content: The vice-regents and governors got together to find some old scandal or skeleton in Daniel’s life that they could use against him, but they couldn’t dig up anything. He was totally exemplary and trustworthy. They could find no evidence of negligence or misconduct. So they finally gave up and said, “We’re never going to find anything against this Daniel unless we can scheme up something religious.”
  '6':
  - type: text
    content: 'The vice-regents and governors conspired together and then went to the king and said, “King Darius, live forever! We’ve convened your vice-regents, governors, and all your leading officials, and have agreed that the king should issue the following decree:'
  - type: text
    content: For the next thirty days no one is to pray to any god or mortal except you, O king. Anyone who disobeys will be thrown into the lions’ den.
  '8':
  - type: text
    content: “Issue this decree, O king, and make it unconditional, as if written in stone like all the laws of the Medes and the Persians.”
  '9':
  - type: text
    content: King Darius signed the decree.
