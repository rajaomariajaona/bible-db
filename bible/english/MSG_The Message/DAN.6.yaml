document_id: DAN.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel in the Lions’ Den
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Darius reorganized his kingdom. He appointed one hundred twenty governors to administer all the parts of his realm. Over them were three vice-regents, one of whom was Daniel. The governors reported to the vice-regents, who made sure that everything was in order for the king. But Daniel, brimming with spirit and intelligence, so completely outclassed the other vice-regents and governors that the king decided to put him in charge of the whole kingdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: The vice-regents and governors got together to find some old scandal or skeleton in Daniel’s life that they could use against him, but they couldn’t dig up anything. He was totally exemplary and trustworthy. They could find no evidence of negligence or misconduct. So they finally gave up and said, “We’re never going to find anything against this Daniel unless we can scheme up something religious.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'The vice-regents and governors conspired together and then went to the king and said, “King Darius, live forever! We’ve convened your vice-regents, governors, and all your leading officials, and have agreed that the king should issue the following decree:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: For the next thirty days no one is to pray to any god or mortal except you, O king. Anyone who disobeys will be thrown into the lions’ den.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Issue this decree, O king, and make it unconditional, as if written in stone like all the laws of the Medes and the Persians.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: King Darius signed the decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When Daniel learned that the decree had been signed and posted, he continued to pray just as he had always done. His house had windows in the upstairs that opened toward Jerusalem. Three times a day he knelt there in prayer, thanking and praising his God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: The conspirators came and found him praying, asking God for help. They went straight to the king and reminded him of the royal decree that he had signed. “Did you not,” they said, “sign a decree forbidding anyone to pray to any god or man except you for the next thirty days? And anyone caught doing it would be thrown into the lions’ den?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Absolutely,” said the king. “Written in stone, like all the laws of the Medes and Persians.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they said, “Daniel, one of the Jewish exiles, ignores you, O king, and defies your decree. Three times a day he prays.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: At this, the king was very upset and tried his best to get Daniel out of the fix he’d put him in. He worked at it the whole day long.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But then the conspirators were back: “Remember, O king, it’s the law of the Medes and Persians that the king’s decree can never be changed.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The king caved in and ordered Daniel brought and thrown into the lions’ den. But he said to Daniel, “Your God, to whom you are so loyal, is going to get you out of this.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A stone slab was placed over the opening of the den. The king sealed the cover with his signet ring and the signet rings of all his nobles, fixing Daniel’s fate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The king then went back to his palace. He refused supper. He couldn’t sleep. He spent the night fasting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: At daybreak the king got up and hurried to the lions’ den. As he approached the den, he called out anxiously, “Daniel, servant of the living God, has your God, whom you serve so loyally, saved you from the lions?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “O king, live forever!” said Daniel. “My God sent his angel, who closed the mouths of the lions so that they would not hurt me. I’ve been found innocent before God and also before you, O king. I’ve done nothing to harm you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When the king heard these words, he was happy. He ordered Daniel taken up out of the den. When he was hauled up, there wasn’t a scratch on him. He had trusted his God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then the king commanded that the conspirators who had informed on Daniel be thrown into the lions’ den, along with their wives and children. Before they hit the floor, the lions had them in their jaws, tearing them to pieces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: 'King Darius published this proclamation to every race, color, and creed on earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Peace to you! Abundant peace!
- type: usfm
  marker: q3
  children:
  - type: text
    text: I decree that Daniel’s God shall be worshiped and feared
- type: usfm
  marker: q2
  children:
  - type: text
    text: in all parts of my kingdom.
- type: usfm
  marker: q3
  children:
  - type: text
    text: He is the living God, world without end. His kingdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: never falls.
- type: usfm
  marker: q3
  children:
  - type: text
    text: His rule continues eternally.
- type: usfm
  marker: q3
  children:
  - type: text
    text: He is a savior and rescuer.
- type: usfm
  marker: q3
  children:
  - type: text
    text: He performs astonishing miracles in heaven and on earth.
- type: usfm
  marker: q3
  children:
  - type: text
    text: He saved Daniel from the power of the lions.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: From then on, Daniel was treated well during the reign of Darius, and also in the following reign of Cyrus the Persian.
