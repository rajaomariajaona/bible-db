  - type: text
    text: -news!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m walking on air.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m laughing at my rivals.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m dancing my salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
