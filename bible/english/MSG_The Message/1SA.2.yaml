      text: 2-5
  - type: text
    text: 'Nothing and no one is holy like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: no rock mountain like our God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t dare talk pretentiously—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a word of boasting, ever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' knows what’s going on.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He takes the measure of everything that happens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The weapons of the strong are smashed to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the weak are infused with fresh strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The well-fed are out begging in the streets for crusts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the hungry are getting second helpings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The barren woman has a houseful of children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the mother of many is bereft.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings death and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: brings down to the grave and raises up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings poverty and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings wealth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he lowers, he also lifts up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He puts poor people on their feet again;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rekindles burned-out lives with fresh hope,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Restoring dignity and respect to their lives—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place in the sun!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the very structures of earth are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has laid out his operations on a firm foundation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He protectively cares for his faithful friends, step by step,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but leaves the wicked to stumble in the dark.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one makes it in this life by sheer muscle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s enemies will be blasted out of the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crashed in a heap and burned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will set things right all over the earth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll give strength to his king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll set his anointed on top of the world!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elkanah went home to Ramah. The boy stayed and served '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the company of Eli the priest.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Samuel Serves '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-17
  - type: text
    text: 'Eli’s own sons were nothing but trouble. They didn’t know '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and could not have cared less about the customs of priests among the people. Ordinarily, when someone offered a sacrifice, the priest’s servant was supposed to come up and, while the meat was boiling, stab a three-pronged fork into the cooking pot. The priest then got whatever came up on the fork. But this is how Eli’s sons treated all the Israelites who came to Shiloh to offer sacrifices to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Before they had even burned the fat to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the priest’s servant would interrupt whoever was sacrificing and say, “Hand over some of that meat for the priest to roast. He doesn’t like boiled meat; he likes his rare.” If the man objected, “First let the fat be burned—God’s portion!—then take all you want,” the servant would demand, “No, I want it now. If you won’t give it, I’ll take it.” It was a horrible sin these young servants were committing—and right in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!—desecrating the holy offerings to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: 'In the midst of all this, Samuel, a boy dressed in a priestly linen tunic, served '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Additionally, every year his mother would make him a little robe cut to his size and bring it to him when she and her husband came for the annual sacrifice. Eli would bless Elkanah and his wife, saying, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' give you children to replace this child you have dedicated to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .” Then they would go home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was most especially kind to Hannah. She had three more sons and two daughters! The boy Samuel stayed at the sanctuary and grew up with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Hard Life with Many Tears
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25a
  - type: text
    text: ' By this time Eli was very old. He kept getting reports on how his sons were ripping off the people and sleeping with the women who helped out at the sanctuary. Eli called them out: “What’s going on here? Why are you doing these things? I hear story after story of your corrupt and evil carrying on. Oh, my sons, this is not right! These are terrible reports I’m getting, stories spreading right and left among '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s people! If you sin against another person, there’s help—God’s help. But if you sin against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who is around to help?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25b-26
  - type: text
    text: ' But they were far gone in disobedience and refused to listen to a thing their father said. So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who was fed up with them, decreed their death. But the boy Samuel was very much alive, growing up, blessed by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and popular with the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-30
  - type: text
    text: 'A holy man came to Eli and said: “This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s message: I revealed myself openly to your ancestors when they were Pharaoh’s slaves in Egypt. Out of all the tribes of Israel, I chose your family to be my priests: to preside at the Altar, to burn incense, to wear the priestly robes in my presence. I put your ancestral family in charge of all the sacrificial offerings of Israel. So why do you now treat as mere loot these very sacrificial offerings that I commanded for my worship? Why do you treat your sons better than me, turning them loose to get fat on these offerings, and ignoring me? Therefore—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word, the God of Israel speaking—I once said that you and your ancestral family would be my priests indefinitely, but now—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word, remember!—there is no way this can continue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I honor those who honor me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who scorn me I demean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-36
  - type: text
    text: '“Be well warned: It won’t be long before I wipe out both your family and your future family. No one in your family will make it to old age! You’ll see good things that I’m doing in Israel, but you’ll see it and weep, for no one in your family will live to enjoy it. I will leave one person to serve at my Altar, but it will be a hard life, with many tears. Everyone else in your family will die before their time. What happens to your two sons, Hophni and Phinehas, will be the proof: Both will die the same day. Then I’ll establish for myself a true priest. He’ll do what I want him to do, be what I want him to be. I’ll make his position secure and he’ll do his work freely in the service of my anointed one. Survivors from your family will come to him begging for handouts, saying, ‘Please, give me some priest work, just enough to put some food on the table.’”'
