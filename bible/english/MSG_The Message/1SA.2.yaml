verses:
  '1':
  - type: text
    content: 'Hannah prayed:'
  - type: text
    content: 'I’m bursting with '
  - type: text
    content: God
  - type: text
    content: -news!
  - type: text
    content: I’m walking on air.
  - type: text
    content: I’m laughing at my rivals.
  - type: text
    content: I’m dancing my salvation.
  '11':
  - type: text
    content: 'Elkanah went home to Ramah. The boy stayed and served '
  - type: text
    content: God
  - type: text
    content: ' in the company of Eli the priest.'
  - type: heading
    content: Samuel Serves God
  '12':
  - type: text
    content: 'Eli’s own sons were nothing but trouble. They didn’t know '
  - type: text
    content: God
  - type: text
    content: ' and could not have cared less about the customs of priests among the people. Ordinarily, when someone offered a sacrifice, the priest’s servant was supposed to come up and, while the meat was boiling, stab a three-pronged fork into the cooking pot. The priest then got whatever came up on the fork. But this is how Eli’s sons treated all the Israelites who came to Shiloh to offer sacrifices to '
  - type: text
    content: God
  - type: text
    content: '. Before they had even burned the fat to '
  - type: text
    content: God
  - type: text
    content: ', the priest’s servant would interrupt whoever was sacrificing and say, “Hand over some of that meat for the priest to roast. He doesn’t like boiled meat; he likes his rare.” If the man objected, “First let the fat be burned—God’s portion!—then take all you want,” the servant would demand, “No, I want it now. If you won’t give it, I’ll take it.” It was a horrible sin these young servants were committing—and right in the presence of '
  - type: text
    content: God
  - type: text
    content: '!—desecrating the holy offerings to '
  - type: text
    content: God
  - type: text
    content: .
  '18':
  - type: text
    content: 'In the midst of all this, Samuel, a boy dressed in a priestly linen tunic, served '
  - type: text
    content: God
  - type: text
    content: . Additionally, every year his mother would make him a little robe cut to his size and bring it to him when she and her husband came for the annual sacrifice. Eli would bless Elkanah and his wife, saying, “
  - type: text
    content: God
  - type: text
    content: ' give you children to replace this child you have dedicated to '
  - type: text
    content: God
  - type: text
    content: .” Then they would go home.
  '2':
  - type: text
    content: 'Nothing and no one is holy like '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: no rock mountain like our God.
  - type: text
    content: Don’t dare talk pretentiously—
  - type: text
    content: not a word of boasting, ever!
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' knows what’s going on.'
  - type: text
    content: He takes the measure of everything that happens.
  - type: text
    content: The weapons of the strong are smashed to pieces,
  - type: text
    content: while the weak are infused with fresh strength.
  - type: text
    content: The well-fed are out begging in the streets for crusts,
  - type: text
    content: while the hungry are getting second helpings.
  - type: text
    content: The barren woman has a houseful of children,
  - type: text
    content: while the mother of many is bereft.
  '21':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' was most especially kind to Hannah. She had three more sons and two daughters! The boy Samuel stayed at the sanctuary and grew up with '
  - type: text
    content: God
  - type: text
    content: .
  - type: heading
    content: A Hard Life with Many Tears
  '22':
  - type: text
    content: ' By this time Eli was very old. He kept getting reports on how his sons were ripping off the people and sleeping with the women who helped out at the sanctuary. Eli called them out: “What’s going on here? Why are you doing these things? I hear story after story of your corrupt and evil carrying on. Oh, my sons, this is not right! These are terrible reports I’m getting, stories spreading right and left among '
  - type: text
    content: God
  - type: text
    content: '’s people! If you sin against another person, there’s help—God’s help. But if you sin against '
  - type: text
    content: God
  - type: text
    content: ', who is around to help?”'
  '25':
  - type: text
    content: ' But they were far gone in disobedience and refused to listen to a thing their father said. So '
  - type: text
    content: God
  - type: text
    content: ', who was fed up with them, decreed their death. But the boy Samuel was very much alive, growing up, blessed by '
  - type: text
    content: God
  - type: text
    content: ' and popular with the people.'
  '27':
  - type: text
    content: 'A holy man came to Eli and said: “This is '
  - type: text
    content: God
  - type: text
    content: '’s message: I revealed myself openly to your ancestors when they were Pharaoh’s slaves in Egypt. Out of all the tribes of Israel, I chose your family to be my priests: to preside at the Altar, to burn incense, to wear the priestly robes in my presence. I put your ancestral family in charge of all the sacrificial offerings of Israel. So why do you now treat as mere loot these very sacrificial offerings that I commanded for my worship? Why do you treat your sons better than me, turning them loose to get fat on these offerings, and ignoring me? Therefore—this is '
  - type: text
    content: God
  - type: text
    content: ’s word, the God of Israel speaking—I once said that you and your ancestral family would be my priests indefinitely, but now—
  - type: text
    content: God
  - type: text
    content: ’s word, remember!—there is no way this can continue.
  - type: text
    content: I honor those who honor me;
  - type: text
    content: those who scorn me I demean.
  '31':
  - type: text
    content: '“Be well warned: It won’t be long before I wipe out both your family and your future family. No one in your family will make it to old age! You’ll see good things that I’m doing in Israel, but you’ll see it and weep, for no one in your family will live to enjoy it. I will leave one person to serve at my Altar, but it will be a hard life, with many tears. Everyone else in your family will die before their time. What happens to your two sons, Hophni and Phinehas, will be the proof: Both will die the same day. Then I’ll establish for myself a true priest. He’ll do what I want him to do, be what I want him to be. I’ll make his position secure and he’ll do his work freely in the service of my anointed one. Survivors from your family will come to him begging for handouts, saying, ‘Please, give me some priest work, just enough to put some food on the table.’”'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' brings death and '
  - type: text
    content: God
  - type: text
    content: ' brings life,'
  - type: text
    content: brings down to the grave and raises up.
  - type: text
    content: God
  - type: text
    content: ' brings poverty and '
  - type: text
    content: God
  - type: text
    content: ' brings wealth;'
  - type: text
    content: he lowers, he also lifts up.
  - type: text
    content: He puts poor people on their feet again;
  - type: text
    content: he rekindles burned-out lives with fresh hope,
  - type: text
    content: Restoring dignity and respect to their lives—
  - type: text
    content: a place in the sun!
  - type: text
    content: 'For the very structures of earth are '
  - type: text
    content: God
  - type: text
    content: ’s;
  - type: text
    content: he has laid out his operations on a firm foundation.
  - type: text
    content: He protectively cares for his faithful friends, step by step,
  - type: text
    content: but leaves the wicked to stumble in the dark.
  - type: text
    content: No one makes it in this life by sheer muscle!
  - type: text
    content: God
  - type: text
    content: ’s enemies will be blasted out of the sky,
  - type: text
    content: crashed in a heap and burned.
  - type: text
    content: God
  - type: text
    content: ' will set things right all over the earth,'
  - type: text
    content: he’ll give strength to his king,
  - type: text
    content: he’ll set his anointed on top of the world!
