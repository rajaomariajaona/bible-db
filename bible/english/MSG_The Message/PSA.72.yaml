document_id: PSA.72,97
type_code: eng
verses:
  '1':
  - type: text
    content: Give the gift of wise rule to the king, O God,
  - type: text
    content: the gift of just rule to the crown prince.
  - type: text
    content: May he judge your people rightly,
  - type: text
    content: be honorable to your meek and lowly.
  - type: text
    content: Let the mountains give exuberant witness;
  - type: text
    content: shape the hills with the contours of right living.
  - type: text
    content: Please stand up for the poor,
  - type: text
    content: help the children of the needy,
  - type: text
    content: come down hard on the cruel tyrants.
  - type: text
    content: Outlast the sun, outlive the moon—
  - type: text
    content: age after age after age.
  - type: text
    content: Be rainfall on cut grass,
  - type: text
    content: earth-refreshing rain showers.
  - type: text
    content: Let righteousness burst into blossom
  - type: text
    content: and peace abound until the moon fades to nothing.
  - type: text
    content: Rule from sea to sea,
  - type: text
    content: from the River to the Rim.
  '15':
  - type: text
    content: And live! Oh, let him live!
  - type: text
    content: Deck him out in Sheba gold.
  - type: text
    content: Offer prayers unceasing to him,
  - type: text
    content: bless him from morning to night.
  - type: text
    content: Fields of golden grain in the land,
  - type: text
    content: cresting the mountains in wild exuberance,
  - type: text
    content: Cornucopias of praise, praises
  - type: text
    content: springing from the city like grass from the earth.
  - type: text
    content: May he never be forgotten,
  - type: text
    content: his fame shine on like sunshine.
  - type: text
    content: May all godless people enter his circle of blessing
  - type: text
    content: and bless the One who blessed them.
  '18':
  - type: text
    content: 'Blessed '
  - type: text
    content: God
  - type: text
    content: ', Israel’s God,'
  - type: text
    content: the one and only wonder-working God!
  - type: text
    content: Blessed always his blazing glory!
  - type: text
    content: All earth brims with his glory.
  - type: text
    content: Yes and Yes and Yes.
  '9':
  - type: text
    content: Foes will fall on their knees before God,
  - type: text
    content: his enemies lick the dust.
  - type: text
    content: Kings remote and legendary will pay homage,
  - type: text
    content: kings rich and resplendent will turn over their wealth.
  - type: text
    content: All kings will fall down and worship,
  - type: text
    content: and godless nations sign up to serve him,
  - type: text
    content: Because he rescues the poor at the first sign of need,
  - type: text
    content: the destitute who have run out of luck.
  - type: text
    content: He opens a place in his heart for the down-and-out,
  - type: text
    content: he restores the wretched of the earth.
  - type: text
    content: He frees them from tyranny and torture—
  - type: text
    content: when they bleed, he bleeds;
  - type: text
    content: when they die, he dies.
