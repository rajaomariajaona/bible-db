document_id: PSA.72,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give the gift of wise rule to the king, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the gift of just rule to the crown prince.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he judge your people rightly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be honorable to your meek and lowly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the mountains give exuberant witness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shape the hills with the contours of right living.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please stand up for the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: help the children of the needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come down hard on the cruel tyrants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Outlast the sun, outlive the moon—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: age after age after age.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be rainfall on cut grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earth-refreshing rain showers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let righteousness burst into blossom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and peace abound until the moon fades to nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rule from sea to sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the River to the Rim.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And live! Oh, let him live!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deck him out in Sheba gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offer prayers unceasing to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bless him from morning to night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fields of golden grain in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cresting the mountains in wild exuberance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cornucopias of praise, praises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: springing from the city like grass from the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he never be forgotten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his fame shine on like sunshine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all godless people enter his circle of blessing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bless the One who blessed them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', Israel’s God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one and only wonder-working God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed always his blazing glory!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All earth brims with his glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes and Yes and Yes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foes will fall on their knees before God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his enemies lick the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings remote and legendary will pay homage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kings rich and resplendent will turn over their wealth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All kings will fall down and worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and godless nations sign up to serve him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he rescues the poor at the first sign of need,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the destitute who have run out of luck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He opens a place in his heart for the down-and-out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he restores the wretched of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He frees them from tyranny and torture—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they bleed, he bleeds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they die, he dies.
