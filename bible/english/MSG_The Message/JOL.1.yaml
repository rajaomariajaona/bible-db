document_id: JOL.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Get in Touch with Reality—and Weep!
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message to Joel son of Pethuel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attention, elder statesmen! Listen closely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone, whoever and wherever you are!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you ever heard of anything like this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has anything like this ever happened before—ever?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make sure you tell your children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your children tell their children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' children.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let this message die out.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dirt farmers, despair!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Grape growers, wring your hands!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lament the loss of wheat and barley.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All crops have failed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vineyards dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fig trees withered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pomegranates, date palms, and apple trees—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deadwood everywhere!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And joy is dried up and withered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the hearts of the people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nothing’s Going On in the Place of Worship
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And also you priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put on your robes and join the outcry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who lead people in worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lead them in lament.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spend the night dressed in gunnysacks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you servants of my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing’s going on in the place of worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no offerings, no prayers—nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare a holy fast, call a special meeting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get the leaders together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Round up everyone in the country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Get them into '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Sanctuary for serious prayer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a day! Doomsday!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Judgment Day has come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Strong God has arrived.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is serious business!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Food is just a memory at our tables,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as are joy and singing from God’s Sanctuary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The seeds in the field are dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: barns deserted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grain silos abandoned.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who needs them? The crops have failed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The farm animals groan—oh, how they groan!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cattle mill around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing for them to eat.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not even the sheep find anything.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! I pray, I cry out to you!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The fields are burning up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The country is a dust bowl,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forest and prairie fires rage unchecked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild animals, dying of thirst,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look to you for a drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Springs and streams are dried up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The whole country is burning up.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What the chewing locust left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the gobbling locust ate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What the gobbling locust left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the munching locust ate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What the munching locust left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the chomping locust ate.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sober up, you drunks!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get in touch with reality—and weep!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your supply of booze is cut off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re on the wagon, like it or not.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My country’s being invaded
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by an army invincible, past numbering,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teeth like those of a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fangs like those of a tiger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has ruined my vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stripped my orchards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And clear-cut the country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The landscape’s a moonscape.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep like a young virgin dressed in black,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mourning the loss of her fiancé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without grain and grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worship has been brought to a standstill
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the Sanctuary of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The priests are at a loss.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s ministers don’t know what to do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fields are sterile.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The very ground grieves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wheat fields are lifeless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vineyards dried up, olive oil gone.
