  '1':
  - type: heading
    content: Get in Touch with Reality—and Weep!
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to Joel son of Pethuel:'
  - type: text
    content: Attention, elder statesmen! Listen closely,
  - type: text
    content: everyone, whoever and wherever you are!
  - type: text
    content: Have you ever heard of anything like this?
  - type: text
    content: Has anything like this ever happened before—ever?
  - type: text
    content: Make sure you tell your children,
  - type: text
    content: and your children tell their children,
  - type: text
    content: 'And their children '
  - type: text
    content: their
  - type: text
    content: ' children.'
  - type: text
    content: Don’t let this message die out.
  '11':
  - type: text
    content: Dirt farmers, despair!
  - type: text
    content: Grape growers, wring your hands!
  - type: text
    content: Lament the loss of wheat and barley.
  - type: text
    content: All crops have failed.
  - type: text
    content: Vineyards dried up,
  - type: text
    content: fig trees withered,
  - type: text
    content: Pomegranates, date palms, and apple trees—
  - type: text
    content: deadwood everywhere!
  - type: text
    content: And joy is dried up and withered
  - type: text
    content: in the hearts of the people.
  - type: heading
    content: Nothing’s Going On in the Place of Worship
  '13':
  - type: text
    content: And also you priests,
  - type: text
    content: put on your robes and join the outcry.
  - type: text
    content: You who lead people in worship,
  - type: text
    content: lead them in lament.
  - type: text
    content: Spend the night dressed in gunnysacks,
  - type: text
    content: you servants of my God.
  - type: text
    content: Nothing’s going on in the place of worship,
  - type: text
    content: no offerings, no prayers—nothing.
  - type: text
    content: Declare a holy fast, call a special meeting,
  - type: text
    content: get the leaders together,
  - type: text
    content: Round up everyone in the country.
  - type: text
    content: 'Get them into '
  - type: text
    content: God
  - type: text
    content: '’s Sanctuary for serious prayer to '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: What a day! Doomsday!
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day has come.
  - type: text
    content: The Strong God has arrived.
  - type: text
    content: This is serious business!
  - type: text
    content: Food is just a memory at our tables,
  - type: text
    content: as are joy and singing from God’s Sanctuary.
  - type: text
    content: The seeds in the field are dead,
  - type: text
    content: barns deserted,
  - type: text
    content: Grain silos abandoned.
  - type: text
    content: Who needs them? The crops have failed!
  - type: text
    content: The farm animals groan—oh, how they groan!
  - type: text
    content: The cattle mill around.
  - type: text
    content: There’s nothing for them to eat.
  - type: text
    content: Not even the sheep find anything.
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '! I pray, I cry out to you!'
  - type: text
    content: The fields are burning up,
  - type: text
    content: The country is a dust bowl,
  - type: text
    content: forest and prairie fires rage unchecked.
  - type: text
    content: Wild animals, dying of thirst,
  - type: text
    content: look to you for a drink.
  - type: text
    content: Springs and streams are dried up.
  - type: text
    content: The whole country is burning up.
  '4':
  - type: text
    content: What the chewing locust left,
  - type: text
    content: the gobbling locust ate;
  - type: text
    content: What the gobbling locust left,
  - type: text
    content: the munching locust ate;
  - type: text
    content: What the munching locust left,
  - type: text
    content: the chomping locust ate.
  '5':
  - type: text
    content: Sober up, you drunks!
  - type: text
    content: Get in touch with reality—and weep!
  - type: text
    content: Your supply of booze is cut off.
  - type: text
    content: You’re on the wagon, like it or not.
  - type: text
    content: My country’s being invaded
  - type: text
    content: by an army invincible, past numbering,
  - type: text
    content: Teeth like those of a lion,
  - type: text
    content: fangs like those of a tiger.
  - type: text
    content: It has ruined my vineyards,
  - type: text
    content: stripped my orchards,
  - type: text
    content: And clear-cut the country.
  - type: text
    content: The landscape’s a moonscape.
  '8':
  - type: text
    content: Weep like a young virgin dressed in black,
  - type: text
    content: mourning the loss of her fiancé.
  - type: text
    content: Without grain and grapes,
  - type: text
    content: worship has been brought to a standstill
  - type: text
    content: 'in the Sanctuary of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: The priests are at a loss.
  - type: text
    content: God
  - type: text
    content: ’s ministers don’t know what to do.
  - type: text
    content: The fields are sterile.
  - type: text
    content: The very ground grieves.
  - type: text
    content: The wheat fields are lifeless,
  - type: text
    content: vineyards dried up, olive oil gone.
