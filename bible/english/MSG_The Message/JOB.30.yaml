document_id: JOB.30,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Pain Never Lets Up
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-8
    - type: text
      text: “But no longer. Now I’m the butt of their jokes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young thugs! whippersnappers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, I considered their fathers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mere inexperienced pups.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they are worse than dogs—good for nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stray, mangy animals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Half-starved, scavenging the back alleys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: howling at the moon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homeless ragamuffins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chewing on old bones and licking old tin cans;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Outcasts from the community,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cursed as dangerous delinquents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody would put up with them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were driven from the neighborhood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You could hear them out there at the edge of town,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yelping and barking, huddled in junkyards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gang of beggars and no-names,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thrown out on their ears.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: “And now my life drains out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as suffering seizes and grips me hard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Night gnaws at my bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pain never lets up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am tied hand and foot, my neck in a noose.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I twist and turn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thrown facedown in the muck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m a muddy mess, inside and out.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What Did I Do to Deserve This?
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-23
    - type: text
      text: “I shout for help, God, and get nothing, no answer!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand to face you in protest, and you give me a blank stare!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve turned into my tormenter—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you slap me around, knock me about.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You raised me up so I was riding high
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then dropped me, and I crashed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you’re determined to kill me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to put me six feet under.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-31
    - type: text
      text: “What did I do to deserve this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Did I ever hit anyone who was calling for help?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haven’t I wept for those who live a hard life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: been heartsick over the lot of the poor?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But where did it get me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I expected good but evil showed up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I looked for light but darkness fell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My stomach’s in a constant churning, never settles down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Each day confronts me with more suffering.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I walk under a black cloud. The sun is gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand in the congregation and protest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I howl with the jackals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hoot with the owls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m black-and-blue all over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning up with fever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My fiddle plays nothing but the blues;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my mouth harp wails laments.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-15
    - type: text
      text: “But now I’m the one they’re after,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mistreating me, taunting and mocking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They abhor me, they abuse me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How dare those scoundrels—they spit in my face!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now that God has undone me and left me in a heap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they hold nothing back. Anything goes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They come at me from my blind side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trip me up, then jump on me while I’m down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They throw every kind of obstacle in my path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: determined to ruin me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one lifts a finger to help me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They violate my broken body,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trample through the rubble of my ruined life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrors assault me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my dignity in shreds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: salvation up in smoke.
