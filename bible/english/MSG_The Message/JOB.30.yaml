document_id: JOB.30,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Pain Never Lets Up
  - type: text
    content: “But no longer. Now I’m the butt of their jokes—
  - type: text
    content: young thugs! whippersnappers!
  - type: text
    content: Why, I considered their fathers
  - type: text
    content: mere inexperienced pups.
  - type: text
    content: But they are worse than dogs—good for nothing,
  - type: text
    content: stray, mangy animals,
  - type: text
    content: Half-starved, scavenging the back alleys,
  - type: text
    content: howling at the moon;
  - type: text
    content: Homeless ragamuffins
  - type: text
    content: chewing on old bones and licking old tin cans;
  - type: text
    content: Outcasts from the community,
  - type: text
    content: cursed as dangerous delinquents.
  - type: text
    content: Nobody would put up with them;
  - type: text
    content: they were driven from the neighborhood.
  - type: text
    content: You could hear them out there at the edge of town,
  - type: text
    content: yelping and barking, huddled in junkyards,
  - type: text
    content: A gang of beggars and no-names,
  - type: text
    content: thrown out on their ears.
  '16':
  - type: text
    content: “And now my life drains out,
  - type: text
    content: as suffering seizes and grips me hard.
  - type: text
    content: Night gnaws at my bones;
  - type: text
    content: the pain never lets up.
  - type: text
    content: I am tied hand and foot, my neck in a noose.
  - type: text
    content: I twist and turn.
  - type: text
    content: Thrown facedown in the muck,
  - type: text
    content: I’m a muddy mess, inside and out.
  - type: heading
    content: What Did I Do to Deserve This?
  '20':
  - type: text
    content: “I shout for help, God, and get nothing, no answer!
  - type: text
    content: I stand to face you in protest, and you give me a blank stare!
  - type: text
    content: You’ve turned into my tormenter—
  - type: text
    content: you slap me around, knock me about.
  - type: text
    content: You raised me up so I was riding high
  - type: text
    content: and then dropped me, and I crashed.
  - type: text
    content: I know you’re determined to kill me,
  - type: text
    content: to put me six feet under.
  '24':
  - type: text
    content: “What did I do to deserve this?
  - type: text
    content: Did I ever hit anyone who was calling for help?
  - type: text
    content: Haven’t I wept for those who live a hard life,
  - type: text
    content: been heartsick over the lot of the poor?
  - type: text
    content: But where did it get me?
  - type: text
    content: I expected good but evil showed up.
  - type: text
    content: I looked for light but darkness fell.
  - type: text
    content: My stomach’s in a constant churning, never settles down.
  - type: text
    content: Each day confronts me with more suffering.
  - type: text
    content: I walk under a black cloud. The sun is gone.
  - type: text
    content: I stand in the congregation and protest.
  - type: text
    content: I howl with the jackals,
  - type: text
    content: I hoot with the owls.
  - type: text
    content: I’m black-and-blue all over,
  - type: text
    content: burning up with fever.
  - type: text
    content: My fiddle plays nothing but the blues;
  - type: text
    content: my mouth harp wails laments.”
  '9':
  - type: text
    content: “But now I’m the one they’re after,
  - type: text
    content: mistreating me, taunting and mocking.
  - type: text
    content: They abhor me, they abuse me.
  - type: text
    content: How dare those scoundrels—they spit in my face!
  - type: text
    content: Now that God has undone me and left me in a heap,
  - type: text
    content: they hold nothing back. Anything goes.
  - type: text
    content: They come at me from my blind side,
  - type: text
    content: trip me up, then jump on me while I’m down.
  - type: text
    content: They throw every kind of obstacle in my path,
  - type: text
    content: determined to ruin me—
  - type: text
    content: and no one lifts a finger to help me!
  - type: text
    content: They violate my broken body,
  - type: text
    content: trample through the rubble of my ruined life.
  - type: text
    content: Terrors assault me—
  - type: text
    content: my dignity in shreds,
  - type: text
    content: salvation up in smoke.
