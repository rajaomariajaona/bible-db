document_id: SNG.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: I’m just a wildflower picked from the plains of Sharon,
  - type: text
    content: a lotus blossom from the valley pools.
  - type: heading
    content: The Man
  '10':
  - type: text
    content: ' Get up, my dear friend,'
  - type: text
    content: fair and beautiful lover—come to me!
  - type: text
    content: 'Look around you: Winter is over;'
  - type: text
    content: the winter rains are over, gone!
  - type: text
    content: Spring flowers are in blossom all over.
  - type: text
    content: The whole world’s a choir—and singing!
  - type: text
    content: Spring warblers are filling the forest
  - type: text
    content: with sweet strains.
  - type: text
    content: Lilacs are exuberantly purple and perfumed,
  - type: text
    content: and cherry trees fragrant with blossoms.
  - type: text
    content: Oh, get up, dear friend,
  - type: text
    content: my fair and beautiful lover—come to me!
  - type: text
    content: Come, my shy and modest dove—
  - type: text
    content: leave your seclusion, come out in the open.
  - type: text
    content: Let me see your face,
  - type: text
    content: let me hear your voice.
  - type: text
    content: For your voice is soothing
  - type: text
    content: and your face is ravishing.
  - type: heading
    content: The Woman
  '15':
  - type: text
    content: Then you must protect me from the foxes,
  - type: text
    content: foxes on the prowl,
  - type: text
    content: Foxes who would like nothing better
  - type: text
    content: than to get into our flowering garden.
  '16':
  - type: text
    content: My lover is mine, and I am his.
  - type: text
    content: Nightly he strolls in our garden,
  - type: text
    content: Delighting in the flowers
  - type: text
    content: until dawn breathes its light and night slips away.
  - type: text
    content: Turn to me, dear lover.
  - type: text
    content: Come like a gazelle.
  - type: text
    content: Leap like a wild stag
  - type: text
    content: on delectable mountains!
  '2':
  - type: text
    content: A lotus blossoming in a swamp of weeds—
  - type: text
    content: that’s my dear friend among the girls in the village.
  - type: heading
    content: The Woman
  '3':
  - type: text
    content: As an apricot tree stands out in the forest,
  - type: text
    content: my lover stands above the young men in town.
  - type: text
    content: All I want is to sit in his shade,
  - type: text
    content: to taste and savor his delicious love.
  - type: text
    content: He took me home with him for a festive meal,
  - type: text
    content: 'but his eyes feasted on '
  - type: text
    content: me
  - type: text
    content: '!'
  '5':
  - type: text
    content: Oh! Give me something refreshing to eat—and quickly!
  - type: text
    content: Apricots, raisins—anything. I’m about to faint with love!
  - type: text
    content: His left hand cradles my head,
  - type: text
    content: and his right arm encircles my waist!
  '7':
  - type: text
    content: Oh, let me warn you, sisters in Jerusalem,
  - type: text
    content: 'by the gazelles, yes, by all the wild deer:'
  - type: text
    content: Don’t excite love, don’t stir it up,
  - type: text
    content: until the time is ripe—and you’re ready.
  '8':
  - type: text
    content: ' Look! Listen! There’s my lover!'
  - type: text
    content: Do you see him coming?
  - type: text
    content: Vaulting the mountains,
  - type: text
    content: leaping the hills.
  - type: text
    content: My lover is like a gazelle, graceful;
  - type: text
    content: like a young stag, virile.
  - type: text
    content: Look at him there, on tiptoe at the gate,
  - type: text
    content: all ears, all eyes—ready!
  - type: text
    content: My lover has arrived
  - type: text
    content: and he’s speaking to me!
  - type: heading
    content: The Man
