document_id: SNG.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I’m just a wildflower picked from the plains of Sharon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a lotus blossom from the valley pools.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10b-14
    - type: text
      text: ' Get up, my dear friend,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fair and beautiful lover—come to me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look around you: Winter is over;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the winter rains are over, gone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spring flowers are in blossom all over.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The whole world’s a choir—and singing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spring warblers are filling the forest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with sweet strains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lilacs are exuberantly purple and perfumed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cherry trees fragrant with blossoms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, get up, dear friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my fair and beautiful lover—come to me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, my shy and modest dove—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave your seclusion, come out in the open.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me see your face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me hear your voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your voice is soothing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your face is ravishing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then you must protect me from the foxes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foxes on the prowl,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foxes who would like nothing better
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to get into our flowering garden.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: My lover is mine, and I am his.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nightly he strolls in our garden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Delighting in the flowers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until dawn breathes its light and night slips away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn to me, dear lover.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come like a gazelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leap like a wild stag
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on delectable mountains!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A lotus blossoming in a swamp of weeds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s my dear friend among the girls in the village.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: As an apricot tree stands out in the forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my lover stands above the young men in town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All I want is to sit in his shade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to taste and savor his delicious love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He took me home with him for a festive meal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but his eyes feasted on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: Oh! Give me something refreshing to eat—and quickly!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Apricots, raisins—anything. I’m about to faint with love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His left hand cradles my head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his right arm encircles my waist!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Oh, let me warn you, sisters in Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by the gazelles, yes, by all the wild deer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t excite love, don’t stir it up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the time is ripe—and you’re ready.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10a
    - type: text
      text: ' Look! Listen! There’s my lover!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you see him coming?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vaulting the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaping the hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My lover is like a gazelle, graceful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a young stag, virile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at him there, on tiptoe at the gate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all ears, all eyes—ready!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My lover has arrived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he’s speaking to me!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
