type_code: eng
verses:
  '1':
  - type: heading
    content: A Light for the Nations
  - type: text
    content: Listen, far-flung islands,
  - type: text
    content: 'pay attention, faraway people:'
  - type: text
    content: God
  - type: text
    content: ' put me to work from the day I was born.'
  - type: text
    content: The moment I entered the world he named me.
  - type: text
    content: He gave me speech that would cut and penetrate.
  - type: text
    content: He kept his hand on me to protect me.
  - type: text
    content: He made me his straight arrow
  - type: text
    content: and hid me in his quiver.
  - type: text
    content: He said to me, “You’re my dear servant,
  - type: text
    content: Israel, through whom I’ll shine.”
  '13':
  - type: text
    content: Heavens, raise the roof! Earth, wake the dead!
  - type: text
    content: Mountains, send up cheers!
  - type: text
    content: God
  - type: text
    content: ' has comforted his people.'
  - type: text
    content: He has tenderly nursed his beaten-up, beaten-down people.
  '14':
  - type: text
    content: 'But Zion said, “I don’t get it. '
  - type: text
    content: God
  - type: text
    content: ' has left me.'
  - type: text
    content: My Master has forgotten I even exist.”
  '15':
  - type: text
    content: “Can a mother forget the infant at her breast,
  - type: text
    content: walk away from the baby she bore?
  - type: text
    content: But even if mothers forget,
  - type: text
    content: I’d never forget you—never.
  - type: text
    content: Look, I’ve written your names on the backs of my hands.
  - type: text
    content: The walls you’re rebuilding are never out of my sight.
  - type: text
    content: Your builders are faster than your wreckers.
  - type: text
    content: The demolition crews are gone for good.
  - type: text
    content: Look up, look around, look well!
  - type: text
    content: See them all gathering, coming to you?
  - type: text
    content: As sure as I am the living God”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “you’re going to put them on like so much jewelry,
  - type: text
    content: you’re going to use them to dress up like a bride.
  '19':
  - type: text
    content: “And your ruined land?
  - type: text
    content: Your devastated, decimated land?
  - type: text
    content: Filled with more people than you know what to do with!
  - type: text
    content: And your barbarian enemies, a fading memory.
  - type: text
    content: The children born in your exile will be saying,
  - type: text
    content: ‘It’s getting too crowded here. I need more room.’
  - type: text
    content: And you’ll say to yourself,
  - type: text
    content: ‘Where on earth did these children come from?
  - type: text
    content: I lost everything, had nothing, was exiled and penniless.
  - type: text
    content: So who reared these children?
  - type: text
    content: How did these children get here?’”
  '22':
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: ', says:'
  - type: text
    content: “Look! I signal to the nations,
  - type: text
    content: I raise my flag to summon the people.
  - type: text
    content: 'Here they’ll come: women carrying your little boys in their arms,'
  - type: text
    content: men carrying your little girls on their shoulders.
  - type: text
    content: Kings will be your babysitters,
  - type: text
    content: princesses will be your nursemaids.
  - type: text
    content: They’ll offer to do all your drudge work—
  - type: text
    content: scrub your floors, do your laundry.
  - type: text
    content: 'You’ll know then that I am '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: No one who hopes in me ever regrets it.”
  '24':
  - type: text
    content: Can plunder be retrieved from a giant,
  - type: text
    content: prisoners of war gotten back from a tyrant?
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' says, “Even if a giant grips the plunder'
  - type: text
    content: and a tyrant holds my people prisoner,
  - type: text
    content: I’m the one who’s on your side,
  - type: text
    content: defending your cause, rescuing your children.
  - type: text
    content: And your enemies, crazed and desperate, will turn on themselves,
  - type: text
    content: killing each other in a frenzy of self-destruction.
  - type: text
    content: 'Then everyone will know that I, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: have saved you—I, the Mighty One of Jacob.”
  '4':
  - type: text
    content: But I said, “I’ve worked for nothing.
  - type: text
    content: I’ve nothing to show for a life of hard work.
  - type: text
    content: 'Nevertheless, I’ll let '
  - type: text
    content: God
  - type: text
    content: ' have the last word.'
  - type: text
    content: I’ll let him pronounce his verdict.”
  '5':
  - type: text
    content: '“And now,” '
  - type: text
    content: God
  - type: text
    content: ' says,'
  - type: text
    content: this God who took me in hand
  - type: text
    content: from the moment of birth to be his servant,
  - type: text
    content: To bring Jacob back home to him,
  - type: text
    content: to set a reunion for Israel—
  - type: text
    content: 'What an honor for me in '
  - type: text
    content: God
  - type: text
    content: ’s eyes!
  - type: text
    content: That God should be my strength!
  - type: text
    content: He says, “But that’s not a big enough job for my servant—
  - type: text
    content: just to recover the tribes of Jacob,
  - type: text
    content: merely to round up the strays of Israel.
  - type: text
    content: 'I’m setting you up as a light for the '
  - type: text
    content: nations
  - type: text
    content: 'so that my salvation becomes '
  - type: text
    content: global
  - type: text
    content: '!”'
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', Redeemer of Israel, The Holy of Israel,'
  - type: text
    content: says to the despised one, kicked around by the nations,
  - type: text
    content: 'slave labor to the ruling class:'
  - type: text
    content: “Kings will see, get to their feet—the princes, too—
  - type: text
    content: and then fall on their faces in homage
  - type: text
    content: 'Because of '
  - type: text
    content: God
  - type: text
    content: ', who has faithfully kept his word,'
  - type: text
    content: The Holy of Israel, who has chosen you.”
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' also says:'
  - type: text
    content: “When the time’s ripe, I answer you.
  - type: text
    content: When victory’s due, I help you.
  - type: text
    content: I form you and use you
  - type: text
    content: to reconnect the people with me,
  - type: text
    content: To put the land in order,
  - type: text
    content: to resettle families on the ruined properties.
  - type: text
    content: I tell prisoners, ‘Come on out. You’re free!’
  - type: text
    content: and those huddled in fear, ‘It’s all right. It’s safe now.’
  - type: text
    content: There’ll be foodstands along all the roads,
  - type: text
    content: picnics on all the hills—
  - type: text
    content: Nobody hungry, nobody thirsty,
  - type: text
    content: shade from the sun, shelter from the wind,
  - type: text
    content: For the Compassionate One guides them,
  - type: text
    content: takes them to the best springs.
  - type: text
    content: I’ll make all my mountains into roads,
  - type: text
    content: turn them into a superhighway.
  - type: text
    content: 'Look: These coming from far countries,'
  - type: text
    content: and those, out of the north,
  - type: text
    content: These streaming in from the west,
  - type: text
    content: and those from all the way down the Nile!”
