document_id: ISA.49,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Light for the Nations
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Listen, far-flung islands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'pay attention, faraway people:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put me to work from the day I was born.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The moment I entered the world he named me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave me speech that would cut and penetrate.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He kept his hand on me to protect me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made me his straight arrow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hid me in his quiver.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said to me, “You’re my dear servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel, through whom I’ll shine.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Heavens, raise the roof! Earth, wake the dead!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mountains, send up cheers!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has comforted his people.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has tenderly nursed his beaten-up, beaten-down people.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But Zion said, “I don’t get it. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has left me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My Master has forgotten I even exist.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: “Can a mother forget the infant at her breast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walk away from the baby she bore?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even if mothers forget,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’d never forget you—never.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, I’ve written your names on the backs of my hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The walls you’re rebuilding are never out of my sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your builders are faster than your wreckers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The demolition crews are gone for good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look up, look around, look well!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See them all gathering, coming to you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As sure as I am the living God”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “you’re going to put them on like so much jewelry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re going to use them to dress up like a bride.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: “And your ruined land?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your devastated, decimated land?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filled with more people than you know what to do with!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your barbarian enemies, a fading memory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The children born in your exile will be saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘It’s getting too crowded here. I need more room.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you’ll say to yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Where on earth did these children come from?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lost everything, had nothing, was exiled and penniless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So who reared these children?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How did these children get here?’”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! I signal to the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I raise my flag to summon the people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here they’ll come: women carrying your little boys in their arms,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: men carrying your little girls on their shoulders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings will be your babysitters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: princesses will be your nursemaids.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll offer to do all your drudge work—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scrub your floors, do your laundry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’ll know then that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one who hopes in me ever regrets it.”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-26
    - type: text
      text: Can plunder be retrieved from a giant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prisoners of war gotten back from a tyrant?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, “Even if a giant grips the plunder'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a tyrant holds my people prisoner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m the one who’s on your side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: defending your cause, rescuing your children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your enemies, crazed and desperate, will turn on themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: killing each other in a frenzy of self-destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then everyone will know that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have saved you—I, the Mighty One of Jacob.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But I said, “I’ve worked for nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve nothing to show for a life of hard work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nevertheless, I’ll let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' have the last word.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll let him pronounce his verdict.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: '“And now,” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this God who took me in hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the moment of birth to be his servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To bring Jacob back home to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to set a reunion for Israel—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What an honor for me in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s eyes!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That God should be my strength!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says, “But that’s not a big enough job for my servant—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just to recover the tribes of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: merely to round up the strays of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m setting you up as a light for the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so that my salvation becomes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: global
    - type: text
      text: '!”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', Redeemer of Israel, The Holy of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: says to the despised one, kicked around by the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'slave labor to the ruling class:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Kings will see, get to their feet—the princes, too—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then fall on their faces in homage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', who has faithfully kept his word,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Holy of Israel, who has chosen you.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-12
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' also says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When the time’s ripe, I answer you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When victory’s due, I help you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I form you and use you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to reconnect the people with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To put the land in order,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to resettle families on the ruined properties.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I tell prisoners, ‘Come on out. You’re free!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those huddled in fear, ‘It’s all right. It’s safe now.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’ll be foodstands along all the roads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: picnics on all the hills—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody hungry, nobody thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shade from the sun, shelter from the wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Compassionate One guides them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: takes them to the best springs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make all my mountains into roads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn them into a superhighway.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look: These coming from far countries,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those, out of the north,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These streaming in from the west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those from all the way down the Nile!”
