document_id: COL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I, Paul, have been sent on special assignment by Christ as part of God’s master plan. Together with my friend Timothy, I greet the Christians and stalwart followers of Christ who live in Colosse. May everything good from God our Father be yours!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Working in His Orchard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5a
  - type: text
    text: ' Our prayers for you are always spilling over into thanksgivings. We can’t quit thanking God our Father and Jesus our Messiah for you! We keep getting reports on your steady faith in Christ, our Jesus, and the love you continuously extend to all Christians. The lines of purpose in your lives never grow slack, tightly tied as they are to your future in heaven, kept taut by hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5b-8
  - type: text
    text: ' The Message is as true among you today as when you first heard it. It doesn’t diminish or weaken over time. It’s the same all over the world. The Message bears fruit and gets larger and stronger, just as it has in you. From the very first day you heard and recognized the truth of what God is doing, you’ve been hungry for more. It’s as vigorous in you now as when you learned it from our friend and close associate Epaphras. He is one reliable worker for Christ! I could always depend on him. He’s the one who told us how thoroughly love had been worked into your lives by the Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: 'Be assured that from the first day we heard of you, we haven’t stopped praying for you, asking God to give you wise minds and spirits attuned to his will, and so acquire a thorough understanding of the ways in which God works. We pray that you’ll live well for the Master, making him proud of you as you work hard in his orchard. As you learn more and more how God works, you will learn how to do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' work. We pray that you’ll have the strength to stick it out over the long haul—not the grim strength of gritting your teeth but the glory-strength God gives. It is strength that endures the unendurable and spills over into joy, thanking the Father who makes us strong enough to take part in everything bright and beautiful that he has for us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: God rescued us from dead-end alleys and dark dungeons. He’s set us up in the kingdom of the Son he loves so much, the Son who got us out of the pit we were in, got rid of the sins we were doomed to keep repeating.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ Holds It All Together
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18a
  - type: text
    text: ' We look at this Son and see the God who cannot be seen. We look at this Son and see God’s original purpose in everything created. For everything, absolutely everything, above and below, visible and invisible, rank after rank after rank of angels—'
  - type: usfm
    marker: it
    children:
    - type: text
      text: everything
  - type: text
    text: ' got started in him and finds its purpose in him. He was there before any of it came into existence and holds it all together right up to this moment. And when it comes to the church, he organizes and holds it together, like a head does a body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18b-20
  - type: text
    text: ' He was supreme in the beginning and—leading the resurrection parade—he is supreme in the end. From beginning to end he’s there, towering far above everything, everyone. So spacious is he, so expansive, that everything of God finds its proper place in him without crowding. Not only that, but all the broken and dislocated pieces of the universe—people and things, animals and atoms—get properly fixed and fit together in vibrant harmonies, all because of his death, his blood that poured down from the cross.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'You yourselves are a case study of what he does. At one time you all had your backs turned to God, thinking rebellious thoughts of him, giving him trouble every chance you got. But now, by giving himself completely at the Cross, actually '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dying
  - type: text
    text: ' for you, Christ brought you over to God’s side and put your lives together, whole and holy in his presence. You don’t walk away from a gift like that! You stay grounded and steady in that bond of trust, constantly tuned in to the Message, careful not to be distracted or diverted. There is no other Message—just this one. Every creature under heaven gets this same Message. I, Paul, am a messenger of this Message.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: I want you to know how glad I am that it’s me sitting here in this jail and not you. There’s a lot of suffering to be entered into in this world—the kind of suffering Christ takes on. I welcome the chance to take my share in the church’s part of that suffering. When I became a servant in this church, I experienced this suffering as a sheer gift, God’s way of helping me serve you, laying out the whole truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-29
  - type: text
    text: 'This mystery has been kept in the dark for a long time, but now it’s out in the open. God wanted everyone, not just Jews, to know this rich and glorious secret inside and out, regardless of their background, regardless of their religious standing. The mystery in a nutshell is just this: Christ is in you, so therefore you can look forward to sharing in God’s glory. It’s that simple. That is the substance of our Message. We preach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: ', warning people not to add to the Message. We teach in a spirit of profound common sense so that we can bring each person to maturity. To be mature is to be basic. Christ! No more, no less. That’s what I’m working so hard at day after day, year after year, doing my best with the energy God so generously gives me.'
