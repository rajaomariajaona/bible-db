document_id: PSA.10,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', are you avoiding me?'
  - type: text
    content: Where are you when I need you?
  - type: text
    content: Full of hot air, the wicked
  - type: text
    content: are hot on the trail of the poor.
  - type: text
    content: Trip them up, tangle them up
  - type: text
    content: in their fine-tuned plots.
  '10':
  - type: text
    content: The hapless fool is kicked to the ground,
  - type: text
    content: the unlucky victim is brutally axed.
  - type: text
    content: He thinks God has dumped him,
  - type: text
    content: he’s sure that God is indifferent to his plight.
  '12':
  - type: text
    content: 'Time to get up, '
  - type: text
    content: God
  - type: text
    content: —get moving.
  - type: text
    content: The luckless think they’re Godforsaken.
  - type: text
    content: They wonder why the wicked scorn God
  - type: text
    content: and get away with it,
  - type: text
    content: Why the wicked are so cocksure
  - type: text
    content: they’ll never come up for audit.
  '14':
  - type: text
    content: But you know all about it—
  - type: text
    content: the contempt, the abuse.
  - type: text
    content: I dare to believe that the luckless
  - type: text
    content: will get lucky someday in you.
  - type: text
    content: 'You won’t let them down:'
  - type: text
    content: orphans won’t be orphans forever.
  '15':
  - type: text
    content: Break the wicked right arms,
  - type: text
    content: break all the evil left arms.
  - type: text
    content: Search and destroy
  - type: text
    content: every sign of crime.
  - type: text
    content: God
  - type: text
    content: ’s grace and order wins;
  - type: text
    content: godlessness loses.
  '17':
  - type: text
    content: The victim’s faint pulse picks up;
  - type: text
    content: the hearts of the hopeless pump red blood
  - type: text
    content: as you put your ear to their lips.
  - type: text
    content: Orphans get parents,
  - type: text
    content: the homeless get homes.
  - type: text
    content: The reign of terror is over,
  - type: text
    content: the rule of the gang lords is ended.
  '3':
  - type: text
    content: The wicked are windbags,
  - type: text
    content: the swindlers have foul breath.
  - type: text
    content: 'The wicked snub '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: their noses stuck high in the air.
  - type: text
    content: 'Their graffiti are scrawled on the walls:'
  - type: text
    content: “Catch us if you can!” “God is dead.”
  '5':
  - type: text
    content: They care nothing for what you think;
  - type: text
    content: if you get in their way, they blow you off.
  - type: text
    content: 'They live (they think) a charmed life:'
  - type: text
    content: “We can’t go wrong. This is our lucky year!”
  '7':
  - type: text
    content: They carry a mouthful of spells,
  - type: text
    content: their tongues spit venom like adders.
  - type: text
    content: They hide behind ordinary people,
  - type: text
    content: then pounce on their victims.
  '9':
  - type: text
    content: They mark the luckless,
  - type: text
    content: then wait like a hunter in a blind;
  - type: text
    content: When the poor wretch wanders too close,
  - type: text
    content: they stab him in the back.
