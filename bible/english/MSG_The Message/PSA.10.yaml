document_id: PSA.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', are you avoiding me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where are you when I need you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Full of hot air, the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are hot on the trail of the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trip them up, tangle them up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their fine-tuned plots.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hapless fool is kicked to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the unlucky victim is brutally axed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He thinks God has dumped him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s sure that God is indifferent to his plight.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Time to get up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —get moving.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The luckless think they’re Godforsaken.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wonder why the wicked scorn God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and get away with it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why the wicked are so cocksure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll never come up for audit.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you know all about it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the contempt, the abuse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I dare to believe that the luckless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will get lucky someday in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You won’t let them down:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: orphans won’t be orphans forever.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break the wicked right arms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: break all the evil left arms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Search and destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every sign of crime.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s grace and order wins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: godlessness loses.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The victim’s faint pulse picks up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hearts of the hopeless pump red blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you put your ear to their lips.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Orphans get parents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the homeless get homes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The reign of terror is over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rule of the gang lords is ended.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked are windbags,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the swindlers have foul breath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked snub '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their noses stuck high in the air.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their graffiti are scrawled on the walls:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Catch us if you can!” “God is dead.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They care nothing for what you think;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you get in their way, they blow you off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They live (they think) a charmed life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “We can’t go wrong. This is our lucky year!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They carry a mouthful of spells,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their tongues spit venom like adders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hide behind ordinary people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then pounce on their victims.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They mark the luckless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then wait like a hunter in a blind;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the poor wretch wanders too close,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stab him in the back.
