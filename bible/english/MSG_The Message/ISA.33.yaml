document_id: ISA.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ground Under Our Feet Mourns
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Doom to you, Destroyer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not yet destroyed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And doom to you, Betrayer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not yet betrayed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you finish destroying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your turn will come—destroyed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you quit betraying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your turn will come—betrayed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', treat us kindly. You’re our only hope.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: First thing in the morning, be there for us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: When things go bad, help us out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You spoke in thunder and everyone ran.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You showed up and nations scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' people, for a change, got in on the loot,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: picking the field clean of the enemy spoils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is supremely esteemed. His center holds.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion brims over with all that is just and right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' keeps your days stable and secure—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: salvation, wisdom, and knowledge in surplus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and best of all, Zion’s treasure, Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: But look! Listen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tough men weep openly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Peacemaking diplomats are in bitter tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The roads are empty—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a soul out on the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The peace treaty is broken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its conditions violated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its signers reviled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very ground under our feet mourns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lebanon mountains hang their heads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flowering Sharon is a weed-choked gully,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the forests of Bashan and Carmel? Bare branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: '“Now I’m stepping in,” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “From now on, I’m taking over.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The gloves come off. Now see how mighty I am.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s nothing to you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pregnant with chaff, you produce straw babies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: full of hot air, you self-destruct.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re good for nothing but fertilizer and fuel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Earth to earth—and the sooner the better.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: “If you’re far away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get the reports on what I’ve done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if you’re in the neighborhood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention to my record.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sinners in Zion are rightly terrified;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the godless are at their wit’s end:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who among us can survive this firestorm?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who of us can get out of this purge with our lives?’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'The answer’s simple:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Live right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: speak the truth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: despise exploitation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: refuse bribes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reject violence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: avoid evil amusements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is how you raise your standard of living!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A safe and stable way to live.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A nourishing, satisfying way to live.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Makes All the Decisions Here'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: Oh, you’ll see the king—a beautiful sight!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And you’ll take in the wide vistas of land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In your mind you’ll go over the old terrors:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “What happened to that Assyrian inspector who condemned and confiscated?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the one who gouged us of taxes?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And that cheating moneychanger?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gone! Out of sight forever! Their insolence
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing now but a fading stain on the carpet!
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more putting up with a language you can’t understand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more sounds of gibberish in your ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: Just take a look at Zion, will you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Centering our worship in festival feasts!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feast your eyes on Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a quiet and permanent place to live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more pulling up stakes and moving on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more patched-together lean-tos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Instead, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' majestic, God himself the place'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a country of broad rivers and streams,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But rivers blocked to invading ships,
- type: usfm
  marker: q2
  children:
  - type: text
    text: off-limits to predatory pirates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' makes all the decisions here. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is our king.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' runs this place and he’ll keep us safe.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ha! Your sails are in shreds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your mast wobbling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your hold leaking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The plunder is free for the taking, free for all—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for weak and strong, insiders and outsiders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: No one in Zion will say, “I’m sick.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: Best of all, they’ll all live guilt-free.
