document_id: ISA.33,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ground Under Our Feet Mourns
  - type: text
    content: Doom to you, Destroyer,
  - type: text
    content: not yet destroyed;
  - type: text
    content: And doom to you, Betrayer,
  - type: text
    content: not yet betrayed.
  - type: text
    content: When you finish destroying,
  - type: text
    content: your turn will come—destroyed!
  - type: text
    content: When you quit betraying,
  - type: text
    content: your turn will come—betrayed!
  '10':
  - type: text
    content: '“Now I’m stepping in,” '
  - type: text
    content: God
  - type: text
    content: ' says.'
  - type: text
    content: “From now on, I’m taking over.
  - type: text
    content: The gloves come off. Now see how mighty I am.
  - type: text
    content: There’s nothing to you.
  - type: text
    content: Pregnant with chaff, you produce straw babies;
  - type: text
    content: full of hot air, you self-destruct.
  - type: text
    content: You’re good for nothing but fertilizer and fuel.
  - type: text
    content: Earth to earth—and the sooner the better.
  '13':
  - type: text
    content: “If you’re far away,
  - type: text
    content: get the reports on what I’ve done,
  - type: text
    content: And if you’re in the neighborhood,
  - type: text
    content: pay attention to my record.
  - type: text
    content: The sinners in Zion are rightly terrified;
  - type: text
    content: 'the godless are at their wit’s end:'
  - type: text
    content: ‘Who among us can survive this firestorm?
  - type: text
    content: Who of us can get out of this purge with our lives?’”
  '15':
  - type: text
    content: 'The answer’s simple:'
  - type: text
    content: Live right,
  - type: text
    content: speak the truth,
  - type: text
    content: despise exploitation,
  - type: text
    content: refuse bribes,
  - type: text
    content: reject violence,
  - type: text
    content: avoid evil amusements.
  - type: text
    content: This is how you raise your standard of living!
  - type: text
    content: A safe and stable way to live.
  - type: text
    content: A nourishing, satisfying way to live.
  - type: heading
    content: God Makes All the Decisions Here
  '17':
  - type: text
    content: Oh, you’ll see the king—a beautiful sight!
  - type: text
    content: And you’ll take in the wide vistas of land.
  - type: text
    content: 'In your mind you’ll go over the old terrors:'
  - type: text
    content: “What happened to that Assyrian inspector who condemned and confiscated?
  - type: text
    content: And the one who gouged us of taxes?
  - type: text
    content: And that cheating moneychanger?”
  - type: text
    content: Gone! Out of sight forever! Their insolence
  - type: text
    content: nothing now but a fading stain on the carpet!
  - type: text
    content: No more putting up with a language you can’t understand,
  - type: text
    content: no more sounds of gibberish in your ears.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', treat us kindly. You’re our only hope.'
  - type: text
    content: First thing in the morning, be there for us!
  - type: text
    content: When things go bad, help us out!
  - type: text
    content: You spoke in thunder and everyone ran.
  - type: text
    content: You showed up and nations scattered.
  - type: text
    content: Your
  - type: text
    content: ' people, for a change, got in on the loot,'
  - type: text
    content: picking the field clean of the enemy spoils.
  '20':
  - type: text
    content: Just take a look at Zion, will you?
  - type: text
    content: Centering our worship in festival feasts!
  - type: text
    content: Feast your eyes on Jerusalem,
  - type: text
    content: a quiet and permanent place to live.
  - type: text
    content: No more pulling up stakes and moving on,
  - type: text
    content: no more patched-together lean-tos.
  - type: text
    content: 'Instead, '
  - type: text
    content: 'God! '
  - type: text
    content: God
  - type: text
    content: ' majestic, God himself the place'
  - type: text
    content: in a country of broad rivers and streams,
  - type: text
    content: But rivers blocked to invading ships,
  - type: text
    content: off-limits to predatory pirates.
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' makes all the decisions here. '
  - type: text
    content: God
  - type: text
    content: ' is our king.'
  - type: text
    content: God
  - type: text
    content: ' runs this place and he’ll keep us safe.'
  '23':
  - type: text
    content: Ha! Your sails are in shreds,
  - type: text
    content: your mast wobbling,
  - type: text
    content: your hold leaking.
  - type: text
    content: The plunder is free for the taking, free for all—
  - type: text
    content: for weak and strong, insiders and outsiders.
  '24':
  - type: text
    content: No one in Zion will say, “I’m sick.”
  - type: text
    content: Best of all, they’ll all live guilt-free.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is supremely esteemed. His center holds.'
  - type: text
    content: Zion brims over with all that is just and right.
  - type: text
    content: God
  - type: text
    content: ' keeps your days stable and secure—'
  - type: text
    content: salvation, wisdom, and knowledge in surplus,
  - type: text
    content: and best of all, Zion’s treasure, Fear-of-
  - type: text
    content: God
  - type: text
    content: .
  '7':
  - type: text
    content: But look! Listen!
  - type: text
    content: Tough men weep openly.
  - type: text
    content: Peacemaking diplomats are in bitter tears.
  - type: text
    content: The roads are empty—
  - type: text
    content: not a soul out on the streets.
  - type: text
    content: The peace treaty is broken,
  - type: text
    content: its conditions violated,
  - type: text
    content: its signers reviled.
  - type: text
    content: The very ground under our feet mourns,
  - type: text
    content: the Lebanon mountains hang their heads,
  - type: text
    content: Flowering Sharon is a weed-choked gully,
  - type: text
    content: and the forests of Bashan and Carmel? Bare branches.
