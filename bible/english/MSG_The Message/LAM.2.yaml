document_id: LAM.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Walked Away from His Holy Temple
  - type: text
    content: Oh, oh, oh . . . 
  - type: text
    content: How the Master has cut down Daughter Zion
  - type: text
    content: from the skies, dashed Israel’s glorious city to earth,
  - type: text
    content: in his anger treated his favorite as throwaway junk.
  '10':
  - type: text
    content: The elders of Daughter Zion sit silent on the ground.
  - type: text
    content: They throw dust on their heads, dress in rough penitential burlap—
  - type: text
    content: the young virgins of Jerusalem, their faces creased with the dirt.
  '11':
  - type: text
    content: My eyes are blind with tears, my stomach in a knot.
  - type: text
    content: My insides have turned to jelly over my people’s fate.
  - type: text
    content: Babies and children are fainting all over the place,
  '12':
  - type: text
    content: Calling to their mothers, “I’m hungry! I’m thirsty!”
  - type: text
    content: then fainting like dying soldiers in the streets,
  - type: text
    content: breathing their last in their mothers’ laps.
  '13':
  - type: text
    content: How can I understand your plight, dear Jerusalem?
  - type: text
    content: What can I say to give you comfort, dear Zion?
  - type: text
    content: Who can put you together again? This bust-up is past understanding.
  '14':
  - type: text
    content: Your prophets courted you with sweet talk.
  - type: text
    content: They didn’t face you with your sin so that you could repent.
  - type: text
    content: Their sermons were all wishful thinking, deceptive illusions.
  '15':
  - type: text
    content: Astonished, passersby can’t believe what they see.
  - type: text
    content: They rub their eyes, they shake their heads over Jerusalem.
  - type: text
    content: Is this the city voted “Most Beautiful” and “Best Place to Live”?
  '16':
  - type: text
    content: But now your enemies gape, slack-jawed.
  - type: text
    content: 'Then they rub their hands in glee: “We’ve got them!'
  - type: text
    content: We’ve been waiting for this! Here it is!”
  '17':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' did carry out, item by item, exactly what he said he’d do.'
  - type: text
    content: He always said he’d do this. Now he’s done it—torn the place down.
  - type: text
    content: He’s let your enemies walk all over you, declared them world champions!
  '18':
  - type: text
    content: Give out heart-cries to the Master, dear repentant Zion.
  - type: text
    content: Let the tears roll like a river, day and night,
  - type: text
    content: and keep at it—no time-outs. Keep those tears flowing!
  '19':
  - type: text
    content: As each night watch begins, get up and cry out in prayer.
  - type: text
    content: Pour your heart out face-to-face with the Master.
  - type: text
    content: Lift high your hands. Beg for the lives of your children
  - type: text
    content: who are starving to death out on the streets.
  '2':
  - type: text
    content: The Master, without a second thought, took Israel in one gulp.
  - type: text
    content: Raging, he smashed Judah’s defenses,
  - type: text
    content: ground her king and princes to a pulp.
  '20':
  - type: text
    content: '“Look at us, '
  - type: text
    content: God
  - type: text
    content: '. Think it over. Have you ever treated '
  - type: text
    content: anyone
  - type: text
    content: ' like this?'
  - type: text
    content: Should women eat their own babies, the very children they raised?
  - type: text
    content: Should priests and prophets be murdered in the Master’s own Sanctuary?
  '21':
  - type: text
    content: “Boys and old men lie in the gutters of the streets,
  - type: text
    content: my young men and women killed in their prime.
  - type: text
    content: Angry, you killed them in cold blood, cut them down without mercy.
  '22':
  - type: text
    content: “You invited, like friends to a party, men to swoop down in attack
  - type: text
    content: 'so that on the big day of '
  - type: text
    content: God
  - type: text
    content: ’s wrath no one would get away.
  - type: text
    content: The children I loved and reared—gone, gone, gone.”
  '3':
  - type: text
    content: His anger blazing, he knocked Israel flat,
  - type: text
    content: broke Israel’s arm and turned his back just as the enemy approached,
  - type: text
    content: came on Jacob like a wildfire from every direction.
  '4':
  - type: text
    content: Like an enemy, he aimed his bow, bared his sword,
  - type: text
    content: and killed our young men, our pride and joy.
  - type: text
    content: His anger, like fire, burned down the homes in Zion.
  '5':
  - type: text
    content: The Master became the enemy. He had Israel for supper.
  - type: text
    content: He chewed up and spit out all the defenses.
  - type: text
    content: He left Daughter Judah moaning and groaning.
  '6':
  - type: text
    content: He plowed up his old trysting place, trashed his favorite rendezvous.
  - type: text
    content: God
  - type: text
    content: ' wiped out Zion’s memories of feast days and Sabbaths,'
  - type: text
    content: angrily sacked king and priest alike.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' abandoned his altar, walked away from his holy Temple'
  - type: text
    content: and turned the fortifications over to the enemy.
  - type: text
    content: 'As they cheered in '
  - type: text
    content: God
  - type: text
    content: ’s Temple, you’d have thought it was a feast day!
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' drew up plans to tear down the walls of Daughter Zion.'
  - type: text
    content: He assembled his crew, set to work and went at it.
  - type: text
    content: Total demolition! The stones wept!
  '9':
  - type: text
    content: 'Her city gates, iron bars and all, disappeared in the rubble:'
  - type: text
    content: her kings and princes off to exile—no one left to instruct or lead;
  - type: text
    content: 'her prophets useless—they neither saw nor heard anything from '
  - type: text
    content: God
  - type: text
    content: .
