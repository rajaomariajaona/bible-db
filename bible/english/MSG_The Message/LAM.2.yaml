document_id: LAM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Walked Away from His Holy Temple'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, oh, oh . . . 
- type: usfm
  marker: q1
  children:
  - type: text
    text: How the Master has cut down Daughter Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the skies, dashed Israel’s glorious city to earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in his anger treated his favorite as throwaway junk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The Master, without a second thought, took Israel in one gulp.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Raging, he smashed Judah’s defenses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ground her king and princes to a pulp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: His anger blazing, he knocked Israel flat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: broke Israel’s arm and turned his back just as the enemy approached,
- type: usfm
  marker: q2
  children:
  - type: text
    text: came on Jacob like a wildfire from every direction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Like an enemy, he aimed his bow, bared his sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and killed our young men, our pride and joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His anger, like fire, burned down the homes in Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Master became the enemy. He had Israel for supper.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He chewed up and spit out all the defenses.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He left Daughter Judah moaning and groaning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He plowed up his old trysting place, trashed his favorite rendezvous.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wiped out Zion’s memories of feast days and Sabbaths,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: angrily sacked king and priest alike.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' abandoned his altar, walked away from his holy Temple'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turned the fortifications over to the enemy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As they cheered in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Temple, you’d have thought it was a feast day!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' drew up plans to tear down the walls of Daughter Zion.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He assembled his crew, set to work and went at it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Total demolition! The stones wept!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Her city gates, iron bars and all, disappeared in the rubble:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: her kings and princes off to exile—no one left to instruct or lead;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'her prophets useless—they neither saw nor heard anything from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The elders of Daughter Zion sit silent on the ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They throw dust on their heads, dress in rough penitential burlap—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young virgins of Jerusalem, their faces creased with the dirt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My eyes are blind with tears, my stomach in a knot.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My insides have turned to jelly over my people’s fate.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Babies and children are fainting all over the place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Calling to their mothers, “I’m hungry! I’m thirsty!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: then fainting like dying soldiers in the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breathing their last in their mothers’ laps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: How can I understand your plight, dear Jerusalem?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What can I say to give you comfort, dear Zion?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can put you together again? This bust-up is past understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Your prophets courted you with sweet talk.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They didn’t face you with your sin so that you could repent.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their sermons were all wishful thinking, deceptive illusions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Astonished, passersby can’t believe what they see.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They rub their eyes, they shake their heads over Jerusalem.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is this the city voted “Most Beautiful” and “Best Place to Live”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But now your enemies gape, slack-jawed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Then they rub their hands in glee: “We’ve got them!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve been waiting for this! Here it is!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did carry out, item by item, exactly what he said he’d do.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He always said he’d do this. Now he’s done it—torn the place down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s let your enemies walk all over you, declared them world champions!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Give out heart-cries to the Master, dear repentant Zion.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the tears roll like a river, day and night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep at it—no time-outs. Keep those tears flowing!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As each night watch begins, get up and cry out in prayer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pour your heart out face-to-face with the Master.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lift high your hands. Beg for the lives of your children
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are starving to death out on the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Look at us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Think it over. Have you ever treated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone
  - type: text
    text: ' like this?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Should women eat their own babies, the very children they raised?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Should priests and prophets be murdered in the Master’s own Sanctuary?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Boys and old men lie in the gutters of the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my young men and women killed in their prime.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Angry, you killed them in cold blood, cut them down without mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “You invited, like friends to a party, men to swoop down in attack
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so that on the big day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s wrath no one would get away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The children I loved and reared—gone, gone, gone.”
