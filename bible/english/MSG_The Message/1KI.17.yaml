document_id: 1KI.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And then this happened: Elijah the Tishbite, from among the settlers of Gilead, confronted Ahab: “As surely as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God of Israel before whom I stand in obedient service, the next years are going to see a total drought—not a drop of dew or rain unless I say otherwise.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' then told Elijah, “Get out of here, and fast. Head east and hide out at the Kerith Ravine on the other side of the Jordan River. You can drink fresh water from the brook; I’ve ordered the ravens to feed you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Elijah obeyed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s orders. He went and camped in the Kerith canyon on the other side of the Jordan. And sure enough, ravens brought him his meals, both breakfast and supper, and he drank from the brook.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'Eventually the brook dried up because of the drought. Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to him: “Get up and go to Zarephath in Sidon and live there. I’ve instructed a woman who lives there, a widow, to feed you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: So he got up and went to Zarephath. As he came to the entrance of the village he met a woman, a widow, gathering firewood. He asked her, “Please, would you bring me a little water in a jug? I need a drink.” As she went to get it, he called out, “And while you’re at it, would you bring me something to eat?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'She said, “I swear, as surely as your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, I don’t have so much as a biscuit. I have a handful of flour in a jar and a little oil in a bottle; you found me scratching together just enough firewood to make a last meal for my son and me. After we eat it, we’ll die.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Elijah said to her, “Don’t worry about a thing. Go ahead and do what you’ve said. But first make a small biscuit for me and bring it back here. Then go ahead and make a meal from what’s left for you and your son. This is the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel: ‘The jar of flour will not run out and the bottle of oil will not become empty before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sends rain on the land and ends this drought.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'And she went right off and did it, did just as Elijah asked. And it turned out as he said—daily food for her and her family. The jar of meal didn’t run out and the bottle of oil didn’t become empty: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s promise fulfilled to the letter, exactly as Elijah had delivered it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Later on the woman’s son became sick. The sickness took a turn for the worse—and then he stopped breathing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The woman said to Elijah, “Why did you ever show up here in the first place—a holy man barging in, exposing my sins, and killing my son?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: Elijah said, “Hand me your son.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He then took him from her bosom, carried him up to the loft where he was staying, and laid him on his bed. Then he prayed, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God, why have you brought this terrible thing on this widow who has opened her home to me? Why have you killed her son?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Three times he stretched himself out full-length on the boy, praying with all his might, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God, put breath back into this boy’s body!” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' listened to Elijah’s prayer and put breath back into his body—he was alive! Elijah picked the boy up, carried him downstairs from the loft, and gave him to his mother. “Here’s your son,” said Elijah, “alive!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The woman said to Elijah, “I see it all now—you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' a holy man. When you speak, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' speaks—a true word!”'
