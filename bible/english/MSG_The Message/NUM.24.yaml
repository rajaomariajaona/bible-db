document_id: NUM.24,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' By now Balaam realized that '
  - type: text
    content: God
  - type: text
    content: ' wanted to bless Israel. So he didn’t work in any sorcery as he had done earlier. He turned and looked out over the wilderness. As Balaam looked, he saw Israel camped tribe by tribe. The Spirit of God came on him, and he spoke his oracle-message:'
  '10':
  - type: text
    content: 'Balak lost his temper with Balaam. He shook his fist. He said to Balaam: “I got you in here to curse my enemies and what have you done? Blessed them! Blessed them three times! Get out of here! Go home! I told you I would pay you well, but you’re getting nothing. You can blame '
  - type: text
    content: God
  - type: text
    content: .”
  '12':
  - type: text
    content: ' Balaam said to Balak, “Didn’t I tell you up front when you sent your emissaries, ‘Even if Balak gave me his palace stuffed with silver and gold, I couldn’t do anything on my own, whether good or bad, that went against '
  - type: text
    content: God
  - type: text
    content: '’s command’? I’m leaving for home and my people, but I warn you of what this people will do to your people in the days to come.” Then he spoke his oracle-message:'
  '15':
  - type: text
    content: ' Decree of Balaam son of Beor,'
  - type: text
    content: decree of the man with 20/20 vision,
  - type: text
    content: Decree of the man who hears godly speech,
  - type: text
    content: who knows what’s going on with the High God,
  - type: text
    content: Who sees what The Strong God reveals,
  - type: text
    content: who bows in worship and sees what’s real.
  - type: text
    content: I see him, but not right now,
  - type: text
    content: I perceive him, but not right here;
  - type: text
    content: A star rises from Jacob
  - type: text
    content: a scepter from Israel,
  - type: text
    content: Crushing the heads of Moab,
  - type: text
    content: the skulls of all the noisy windbags;
  - type: text
    content: I see Edom sold off at auction,
  - type: text
    content: enemy Seir marked down at the flea market,
  - type: text
    content: while Israel walks off with the trophies.
  - type: text
    content: A ruler is coming from Jacob
  - type: text
    content: who’ll destroy what’s left in the city.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: Then Balaam spotted Amalek and delivered an oracle-message. He said,
  - type: text
    content: Amalek, you’re in first place among nations right now,
  - type: text
    content: but you’re going to come in last, ruined.
  - type: text
    content: '* * *'
  '21':
  - type: text
    content: 'He saw the Kenites and delivered his oracle-message to them:'
  - type: text
    content: Your home is in a nice secure place,
  - type: text
    content: like a nest high on the face of a cliff.
  - type: text
    content: Still, you Kenites will look stupid
  - type: text
    content: when Asshur takes you prisoner.
  - type: text
    content: '* * *'
  '23':
  - type: text
    content: 'Balaam spoke his final oracle-message:'
  - type: text
    content: Doom! Who stands a chance
  - type: text
    content: when God starts in?
  - type: text
    content: Sea-Peoples, raiders from across the sea,
  - type: text
    content: will harass Asshur and Eber,
  - type: text
    content: But they’ll also come to nothing,
  - type: text
    content: just like all the rest.
  '25':
  - type: text
    content: Balaam got up and went home. Balak also went on his way.
  '3':
  - type: text
    content: ' Decree of Balaam son of Beor,'
  - type: text
    content: yes, decree of a man with 20/20 vision;
  - type: text
    content: Decree of a man who hears God speak,
  - type: text
    content: who sees what The Strong God shows him,
  - type: text
    content: Who falls on his face in worship,
  - type: text
    content: who sees what’s really going on.
  - type: text
    content: What beautiful tents, Jacob,
  - type: text
    content: oh, your homes, Israel!
  - type: text
    content: Like valleys stretching out in the distance,
  - type: text
    content: like gardens planted by rivers,
  - type: text
    content: 'Like sweet herbs planted by the gardener '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: like red cedars by pools and springs,
  - type: text
    content: Their buckets will brim with water,
  - type: text
    content: their seed will spread life everywhere.
  - type: text
    content: Their king will tower over Agag and his ilk,
  - type: text
    content: their kingdom surpassingly majestic.
  - type: text
    content: God brought them out of Egypt,
  - type: text
    content: rampaging like a wild ox,
  - type: text
    content: Gulping enemies like morsels of meat,
  - type: text
    content: crushing their bones, snapping their arrows.
  - type: text
    content: Israel crouches like a lion and naps,
  - type: text
    content: king-of-the-beasts—who dares disturb him?
  - type: text
    content: Whoever blesses you is blessed,
  - type: text
    content: whoever curses you is cursed.
