document_id: NUM.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3a
  - type: text
    text: ' By now Balaam realized that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wanted to bless Israel. So he didn’t work in any sorcery as he had done earlier. He turned and looked out over the wilderness. As Balaam looked, he saw Israel camped tribe by tribe. The Spirit of God came on him, and he spoke his oracle-message:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3b-9
  - type: text
    text: ' Decree of Balaam son of Beor,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, decree of a man with 20/20 vision;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Decree of a man who hears God speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who sees what The Strong God shows him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who falls on his face in worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who sees what’s really going on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What beautiful tents, Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oh, your homes, Israel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like valleys stretching out in the distance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like gardens planted by rivers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like sweet herbs planted by the gardener '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: like red cedars by pools and springs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their buckets will brim with water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their seed will spread life everywhere.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their king will tower over Agag and his ilk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their kingdom surpassingly majestic.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God brought them out of Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rampaging like a wild ox,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gulping enemies like morsels of meat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crushing their bones, snapping their arrows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel crouches like a lion and naps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: king-of-the-beasts—who dares disturb him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever blesses you is blessed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever curses you is cursed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Balak lost his temper with Balaam. He shook his fist. He said to Balaam: “I got you in here to curse my enemies and what have you done? Blessed them! Blessed them three times! Get out of here! Go home! I told you I would pay you well, but you’re getting nothing. You can blame '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15a
  - type: text
    text: ' Balaam said to Balak, “Didn’t I tell you up front when you sent your emissaries, ‘Even if Balak gave me his palace stuffed with silver and gold, I couldn’t do anything on my own, whether good or bad, that went against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s command’? I’m leaving for home and my people, but I warn you of what this people will do to your people in the days to come.” Then he spoke his oracle-message:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-19
  - type: text
    text: ' Decree of Balaam son of Beor,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: decree of the man with 20/20 vision,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Decree of the man who hears godly speech,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who knows what’s going on with the High God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who sees what The Strong God reveals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who bows in worship and sees what’s real.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I see him, but not right now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I perceive him, but not right here;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A star rises from Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scepter from Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Crushing the heads of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the skulls of all the noisy windbags;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I see Edom sold off at auction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enemy Seir marked down at the flea market,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while Israel walks off with the trophies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ruler is coming from Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: who’ll destroy what’s left in the city.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then Balaam spotted Amalek and delivered an oracle-message. He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amalek, you’re in first place among nations right now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’re going to come in last, ruined.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'He saw the Kenites and delivered his oracle-message to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your home is in a nice secure place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a nest high on the face of a cliff.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, you Kenites will look stupid
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Asshur takes you prisoner.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'Balaam spoke his final oracle-message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doom! Who stands a chance
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God starts in?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sea-Peoples, raiders from across the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will harass Asshur and Eber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they’ll also come to nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just like all the rest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Balaam got up and went home. Balak also went on his way.
