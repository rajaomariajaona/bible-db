document_id: PSA.81,97
type_code: eng
verses:
  '1':
  - type: text
    content: A song to our strong God!
  - type: text
    content: a shout to the God of Jacob!
  - type: text
    content: Anthems from the choir, music from the band,
  - type: text
    content: sweet sounds from lute and harp,
  - type: text
    content: 'Trumpets and trombones and horns:'
  - type: text
    content: it’s festival day, a feast to God!
  - type: text
    content: A day decreed by God,
  - type: text
    content: solemnly ordered by the God of Jacob.
  - type: text
    content: He commanded Joseph to keep this day
  - type: text
    content: so we’d never forget what he did in Egypt.
  - type: text
    content: I hear this most gentle whisper from One
  - type: text
    content: 'I never guessed would speak to me:'
  '11':
  - type: text
    content: “But my people didn’t listen,
  - type: text
    content: Israel paid no attention;
  - type: text
    content: So I let go of the reins and told them, ‘Run!
  - type: text
    content: Do it your own way!’
  '13':
  - type: text
    content: “Oh, dear people, will you listen to me now?
  - type: text
    content: Israel, will you follow my map?
  - type: text
    content: I’ll make short work of your enemies,
  - type: text
    content: give your foes the back of my hand.
  - type: text
    content: 'I’ll send the '
  - type: text
    content: God
  - type: text
    content: -haters cringing like dogs,
  - type: text
    content: never to be heard from again.
  - type: text
    content: You’ll feast on my fresh-baked bread
  - type: text
    content: spread with butter and rock-pure honey.”
  '6':
  - type: text
    content: “I took the world off your shoulders,
  - type: text
    content: freed you from a life of hard labor.
  - type: text
    content: You called to me in your pain;
  - type: text
    content: I got you out of a bad place.
  - type: text
    content: I answered you from where the thunder hides,
  - type: text
    content: I proved you at Meribah Fountain.
  '8':
  - type: text
    content: “Listen, dear ones—get this straight;
  - type: text
    content: O Israel, don’t take this lightly.
  - type: text
    content: Don’t take up with strange gods,
  - type: text
    content: don’t worship the popular gods.
  - type: text
    content: 'I’m '
  - type: text
    content: God
  - type: text
    content: ', your God, the very God'
  - type: text
    content: who rescued you from doom in Egypt,
  - type: text
    content: Then fed you all you could eat,
  - type: text
    content: filled your hungry stomachs.
