document_id: PSA.81,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: A song to our strong God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a shout to the God of Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anthems from the choir, music from the band,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sweet sounds from lute and harp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trumpets and trombones and horns:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s festival day, a feast to God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A day decreed by God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: solemnly ordered by the God of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He commanded Joseph to keep this day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we’d never forget what he did in Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hear this most gentle whisper from One
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I never guessed would speak to me:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: “But my people didn’t listen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel paid no attention;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I let go of the reins and told them, ‘Run!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do it your own way!’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: “Oh, dear people, will you listen to me now?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel, will you follow my map?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make short work of your enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give your foes the back of my hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll send the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -haters cringing like dogs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to be heard from again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll feast on my fresh-baked bread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spread with butter and rock-pure honey.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: “I took the world off your shoulders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: freed you from a life of hard labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You called to me in your pain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I got you out of a bad place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I answered you from where the thunder hides,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I proved you at Meribah Fountain.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: “Listen, dear ones—get this straight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Israel, don’t take this lightly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t take up with strange gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t worship the popular gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, the very God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rescued you from doom in Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then fed you all you could eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filled your hungry stomachs.
