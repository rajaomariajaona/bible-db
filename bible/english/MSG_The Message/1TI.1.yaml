document_id: 1TI.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I, Paul, am an apostle on special assignment for Christ, our living hope. Under God our Savior’s command, I’m writing this to you, Timothy, my son in the faith. All the best from our God and Christ be yours!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Self-Appointed Experts on Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: On my way to the province of Macedonia, I advised you to stay in Ephesus. Well, I haven’t changed my mind. Stay right there on top of things so that the teaching stays on track. Apparently some people have been introducing fantasy stories and fanciful family trees that digress into silliness instead of pulling the people back into the center, deepening faith and obedience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: 'The whole point of what we’re urging is simply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: love
  - type: text
    text: —love uncontaminated by self-interest and counterfeit faith, a life open to God. Those who fail to keep to this point soon wander off into dead ends of gossip. They set themselves up as experts on religious issues, but haven’t the remotest idea of what they’re holding forth with such imposing eloquence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: It’s true that moral guidance and counsel need to be given, but the way you say it and to whom you say it are as important as what you say. It’s obvious, isn’t it, that the law code isn’t primarily for people who live responsibly, but for the irresponsible, who defy all authority, riding roughshod over God, life, sex, truth, whatever! They are cynical toward this great Message I’ve been put in charge of by this great God.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: I’m so grateful to Christ Jesus for making me adequate to do this work. He went out on a limb, you know, in trusting me with this ministry. The only credentials I brought to it were violence and witch hunts and arrogance. But I was treated mercifully because I didn’t know what I was doing—didn’t know Who I was doing it against! Grace mixed with faith and love poured over me and into me. And all because of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19a
  - type: text
    text: ' Here’s a word you can take to heart and depend on: Jesus Christ came into the world to save sinners. I’m proof—Public Sinner Number One—of someone who could never have made it apart from sheer mercy. And now he shows me off—evidence of his endless patience—to those who are right on the edge of trusting him forever.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deep honor and bright glory
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the King of All Time—
- type: usfm
  marker: q1
  children:
  - type: text
    text: One God, Immortal, Invisible,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ever and always. Oh, yes!
- type: usfm
  marker: m
  children:
  - type: text
    text: I’m passing this work on to you, my son Timothy. The prophetic word that was directed to you prepared us for this. All those prayers are coming together now so you will do this well, fearless in your struggle, keeping a firm grip on your faith and on yourself. After all, this is a fight we’re in.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19b-20
  - type: text
    text: ' There are some, you know, who by relaxing their grip and thinking anything goes have made a thorough mess of their faith. Hymenaeus and Alexander are two of them. I let them wander off to Satan to be taught a lesson or two about not blaspheming.'
