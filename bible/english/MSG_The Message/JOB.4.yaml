document_id: JOB.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz Speaks Out
  - type: heading
    content: Now You’re the One in Trouble
  - type: text
    content: 'Then Eliphaz from Teman spoke up:'
  - type: text
    content: “Would you mind if I said something to you?
  - type: text
    content: Under the circumstances it’s hard to keep quiet.
  - type: text
    content: You yourself have done this plenty of times, spoken words
  - type: text
    content: that clarify, encouraged those who were about to quit.
  - type: text
    content: Your words have put stumbling people on their feet,
  - type: text
    content: put fresh hope in people about to collapse.
  - type: text
    content: 'But now '
  - type: text
    content: you’re
  - type: text
    content: ' the one in trouble—you’re hurting!'
  - type: text
    content: You’ve been hit hard and you’re reeling from the blow.
  - type: text
    content: But shouldn’t your devout life give you confidence now?
  - type: text
    content: Shouldn’t your exemplary life give you hope?
  '12':
  - type: text
    content: “A word came to me in secret—
  - type: text
    content: a mere whisper of a word, but I heard it clearly.
  - type: text
    content: It came in a scary dream one night,
  - type: text
    content: after I had fallen into a deep, deep sleep.
  - type: text
    content: Dread stared me in the face, and Terror.
  - type: text
    content: I was scared to death—I shook from head to foot.
  - type: text
    content: A spirit glided right in front of me—
  - type: text
    content: the hair on my head stood on end.
  - type: text
    content: I couldn’t tell what it was that appeared there—
  - type: text
    content: 'a blur . . . and then I heard a muffled voice:'
  '17':
  - type: text
    content: “‘How can mere mortals be more righteous than God?
  - type: text
    content: How can humans be purer than their Creator?
  - type: text
    content: Why, God doesn’t even trust his own servants,
  - type: text
    content: doesn’t even cheer his angels,
  - type: text
    content: So how much less these bodies composed of mud,
  - type: text
    content: fragile as moths?
  - type: text
    content: These bodies of ours are here today and gone tomorrow,
  - type: text
    content: and no one even notices—gone without a trace.
  - type: text
    content: When the tent stakes are ripped up, the tent collapses—
  - type: text
    content: we die and are never the wiser for having lived.’”
  '7':
  - type: text
    content: “Think! Has a truly innocent person ever ended up on the scrap heap?
  - type: text
    content: Do genuinely upright people ever lose out in the end?
  - type: text
    content: It’s my observation that those who plow evil
  - type: text
    content: and sow trouble reap evil and trouble.
  - type: text
    content: One breath from God and they fall apart,
  - type: text
    content: one blast of his anger and there’s nothing left of them.
  - type: text
    content: The mighty lion, king of the beasts, roars mightily,
  - type: text
    content: but when he’s toothless he’s useless—
  - type: text
    content: No teeth, no prey—and the cubs
  - type: text
    content: wander off to fend for themselves.
