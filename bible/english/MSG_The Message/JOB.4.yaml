document_id: JOB.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Eliphaz Speaks Out
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You’re
    - type: text
      text: ' the One in Trouble'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Eliphaz from Teman spoke up:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Would you mind if I said something to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Under the circumstances it’s hard to keep quiet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You yourself have done this plenty of times, spoken words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that clarify, encouraged those who were about to quit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your words have put stumbling people on their feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put fresh hope in people about to collapse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you’re
    - type: text
      text: ' the one in trouble—you’re hurting!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve been hit hard and you’re reeling from the blow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But shouldn’t your devout life give you confidence now?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shouldn’t your exemplary life give you hope?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A word came to me in secret—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mere whisper of a word, but I heard it clearly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It came in a scary dream one night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after I had fallen into a deep, deep sleep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dread stared me in the face, and Terror.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was scared to death—I shook from head to foot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A spirit glided right in front of me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hair on my head stood on end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I couldn’t tell what it was that appeared there—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a blur . . . and then I heard a muffled voice:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘How can mere mortals be more righteous than God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How can humans be purer than their Creator?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, God doesn’t even trust his own servants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doesn’t even cheer his angels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how much less these bodies composed of mud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fragile as moths?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These bodies of ours are here today and gone tomorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one even notices—gone without a trace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the tent stakes are ripped up, the tent collapses—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we die and are never the wiser for having lived.’”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Think! Has a truly innocent person ever ended up on the scrap heap?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do genuinely upright people ever lose out in the end?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s my observation that those who plow evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sow trouble reap evil and trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One breath from God and they fall apart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one blast of his anger and there’s nothing left of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty lion, king of the beasts, roars mightily,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but when he’s toothless he’s useless—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No teeth, no prey—and the cubs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wander off to fend for themselves.
