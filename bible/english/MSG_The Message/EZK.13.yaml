document_id: EZK.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: People Who Love Listening to Lies
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, preach against the prophets of Israel who are making things up out of their own heads and calling it ‘prophesying.’'
  '10':
  - type: text
    content: “The fact is that they’ve lied to my people. They’ve said, ‘No problem; everything’s just fine,’ when things are not at all fine. When people build a wall, they’re right behind them slapping on whitewash. Tell those who are slapping on the whitewash, ‘When a torrent of rain comes and the hailstones crash down and the hurricane sweeps in and the wall collapses, what’s the good of the whitewash that you slapped on so liberally, making it look so good?’
  '13':
  - type: text
    content: '“And that’s exactly what will happen. I, '
  - type: text
    content: God
  - type: text
    content: ', the Master, say so: ‘I’ll let the hurricane of my wrath loose, a torrent of my hailstone-anger. I’ll make that wall you’ve slapped with whitewash collapse. I’ll level it to the ground so that only the foundation stones will be left. And in the ruin you’ll all die. You’ll realize then that I am '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: '“‘I’ll dump my wrath on that wall, all of it, and on those who plastered it with whitewash. I will say to them, There is no wall, and those who did such a good job of whitewashing it wasted their time, those prophets of Israel who preached to Jerusalem and announced all their visions telling us things were just fine when they weren’t at all fine. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’'
  '17':
  - type: text
    content: “And the women prophets—son of man, take your stand against the women prophets who make up stuff out of their own minds. Oppose them. Say ‘Doom’ to the women who sew magic bracelets and head scarves to suit every taste, devices to trap souls. Say, ‘Will you kill the souls of my people, use living souls to make yourselves rich and popular? You have profaned me among my people just to get ahead yourselves, used me to make yourselves look good—killing souls who should never have died and coddling souls who shouldn’t live. You’ve lied to people who love listening to lies.’
  '2':
  - type: text
    content: ' “Preach to them the real thing. Tell them, ‘Listen to '
  - type: text
    content: God
  - type: text
    content: ’s
  - type: text
    content: ' Message!’ '
  - type: text
    content: God
  - type: text
    content: ', the Master, pronounces doom on the empty-headed prophets who do their own thing and know nothing of what’s going on! Your prophets, Israel, are like jackals scavenging through the ruins. They haven’t lifted a finger to repair the defenses of the city and have risked nothing to help Israel stand on '
  - type: text
    content: God
  - type: text
    content: ’s Day of Judgment. All they do is fantasize comforting illusions and preach lying sermons. They say ‘
  - type: text
    content: God
  - type: text
    content: ' says . . .’ when '
  - type: text
    content: God
  - type: text
    content: ' hasn’t so much as breathed in their direction. And yet they stand around thinking that something they said is going to happen.'
  '20':
  - type: text
    content: '“Therefore '
  - type: text
    content: God
  - type: text
    content: ' says, ‘I am against all the devices and techniques you use to hunt down souls. I’ll rip them out of your hands. I’ll free the souls you’re trying to catch. I’ll rip your magic bracelets and scarves to shreds and deliver my people from your influence so they’ll no longer be victimized by you. That’s how you’ll come to realize that I am '
  - type: text
    content: God
  - type: text
    content: .
  '22':
  - type: text
    content: '“‘Because you’ve confounded and confused good people, unsuspecting and innocent people, with your lies, and because you’ve made it easy for others to persist in evil so that it wouldn’t even dawn on them to turn to me so I could save them, as of now you’re finished. No more delusion-mongering from you, no more sermonic lies. I’m going to rescue my people from your clutches. And you’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .’”
  '7':
  - type: text
    content: “Haven’t you fantasized sheer nonsense? Aren’t your sermons tissues of lies, saying ‘
  - type: text
    content: God
  - type: text
    content: ' says . . .’ when I’ve done nothing of the kind? Therefore—and this is the Message of '
  - type: text
    content: God
  - type: text
    content: ', the Master, remember—I’m dead set against prophets who substitute illusions for visions and use sermons to tell lies. I’m going to ban them from the council of my people, remove them from membership in Israel, and outlaw them from the land of Israel. Then you’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
