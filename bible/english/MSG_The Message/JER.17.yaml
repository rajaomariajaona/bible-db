    content: The Heart Is Hopelessly Dark and Deceitful
  - type: text
    content: “Judah’s sin is engraved
  - type: text
    content: with a steel chisel,
  - type: text
    content: A steel chisel with a diamond point—
  - type: text
    content: engraved on their granite hearts,
  - type: text
    content: engraved on the stone corners of their altars.
  - type: text
    content: 'The evidence against them is plain to see:'
  - type: text
    content: sex-and-religion altars and sacred sex shrines
  - type: text
    content: Anywhere there’s a grove of trees,
  - type: text
    content: anywhere there’s an available hill.
  '11':
  - type: text
    content: Like a cowbird that cheats by laying its eggs
  - type: text
