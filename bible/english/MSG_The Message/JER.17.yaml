document_id: JER.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Heart Is Hopelessly Dark and Deceitful
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Judah’s sin is engraved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a steel chisel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A steel chisel with a diamond point—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: engraved on their granite hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: engraved on the stone corners of their altars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The evidence against them is plain to see:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sex-and-religion altars and sacred sex shrines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anywhere there’s a grove of trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anywhere there’s an available hill.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a cowbird that cheats by laying its eggs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in another bird’s nest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is the person who gets rich by cheating.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the eggs hatch, the deceit is exposed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a fool he’ll look like then!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From early on your Sanctuary was set high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a throne of glory, exalted!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you’re the hope of Israel.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who leave you end up as fools,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deserters with nothing to show for their lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who walk off from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', fountain of living waters—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wind up dead!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', pick up the pieces.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put me back together again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are my praise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to how they talk about me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“So where’s this ‘Word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’d like to see something happen!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it wasn’t my idea to call for Doomsday.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I never wanted trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know what I’ve said.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s all out in the open before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t add to my troubles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give me some relief!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those who harass me be harassed, not me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' be disgraced, not me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring down upon them the day of doom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lower the boom. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Boom
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Keep the Sabbath Day Holy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message to me: “Go stand in the People’s Gate, the one used by Judah’s kings as they come and go, and then proceed in turn to all the gates of Jerusalem. Tell them, ‘Listen, you kings of Judah, listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message—and all you people who go in and out of these gates, you listen!
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message. Be careful, if you care about your lives, not to desecrate the Sabbath by turning it into just another workday, lugging stuff here and there. Don’t use the Sabbath to do business as usual. Keep the Sabbath day holy, as I commanded your ancestors. They never did it, as you know. They paid no attention to what I said and went about their own business, refusing to be guided or instructed by me.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘But now, take seriously what I tell you. Quit desecrating the Sabbath by busily going about your own work, and keep the Sabbath day holy by not doing business as usual. Then kings from the time of David and their officials will continue to ride through these gates on horses or in chariots. The people of Judah and citizens of Jerusalem will continue to pass through them, too. Jerusalem will always be filled with people. People will stream in from all over Judah, from the province of Benjamin, from the Jerusalem suburbs, from foothills and mountains and deserts. They’ll come to worship, bringing all kinds of offerings—animals, grains, incense, expressions of thanks—into the Sanctuary of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘But if you won’t listen to me, won’t keep the Sabbath holy, won’t quit using the Sabbath for doing your own work, busily going in and out of the city gates on your self-important business, then I’ll burn the gates down. In fact, I’ll burn the whole city down, palaces and all, with a fire nobody will be able to put out!’”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ll use your mountains as roadside stands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for giving away everything you have.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your ‘things’ will serve as reparations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your sins all over the country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll lose your gift of land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The inheritance I gave you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make you slaves of your enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a far-off and strange land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My anger is hot and blazing and fierce,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will put it out.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cursed is the strong one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who depends on mere humans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who thinks he can make it on muscle alone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and sets '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' aside as dead weight.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s like a tumbleweed on the prairie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of touch with the good earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lives rootless and aimless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a land where nothing grows.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But blessed is the man who trusts me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the woman who sticks with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re like trees replanted in Eden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting down roots near the rivers—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never a worry through the hottest of summers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never dropping a leaf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Serene and calm through droughts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bearing fresh fruit every season.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The heart is hopelessly dark and deceitful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a puzzle that no one can figure out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', search the heart'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and examine the mind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I get to the heart of the human.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I get to the root of things.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I treat them as they really are,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not as they pretend to be.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
