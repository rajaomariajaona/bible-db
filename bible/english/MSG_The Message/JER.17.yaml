  - type: heading
    content: Keep the Sabbath Day Holy
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to me: “Go stand in the People’s Gate, the one used by Judah’s kings as they come and go, and then proceed in turn to all the gates of Jerusalem. Tell them, ‘Listen, you kings of Judah, listen to '
  - type: text
    content: God
  - type: text
    content: ’s Message—and all you people who go in and out of these gates, you listen!
  '21':
  - type: text
    content: '“‘This is '
  - type: text
    content: God
  - type: text
    content: ’s Message. Be careful, if you care about your lives, not to desecrate the Sabbath by turning it into just another workday, lugging stuff here and there. Don’t use the Sabbath to do business as usual. Keep the Sabbath day holy, as I commanded your ancestors. They never did it, as you know. They paid no attention to what I said and went about their own business, refusing to be guided or instructed by me.
  '24':
  - type: text
    content: '“‘But now, take seriously what I tell you. Quit desecrating the Sabbath by busily going about your own work, and keep the Sabbath day holy by not doing business as usual. Then kings from the time of David and their officials will continue to ride through these gates on horses or in chariots. The people of Judah and citizens of Jerusalem will continue to pass through them, too. Jerusalem will always be filled with people. People will stream in from all over Judah, from the province of Benjamin, from the Jerusalem suburbs, from foothills and mountains and deserts. They’ll come to worship, bringing all kinds of offerings—animals, grains, incense, expressions of thanks—into the Sanctuary of '
  - type: text
    content: God
  - type: text
    content: .
  '27':
  - type: text
    content: “‘But if you won’t listen to me, won’t keep the Sabbath holy, won’t quit using the Sabbath for doing your own work, busily going in and out of the city gates on your self-important business, then I’ll burn the gates down. In fact, I’ll burn the whole city down, palaces and all, with a fire nobody will be able to put out!’”
  '3':
  - type: text
    content: “I’ll use your mountains as roadside stands
  - type: text
    content: for giving away everything you have.
  - type: text
    content: All your ‘things’ will serve as reparations
  - type: text
    content: for your sins all over the country.
  - type: text
    content: You’ll lose your gift of land,
  - type: text
    content: The inheritance I gave you.
  - type: text
    content: I’ll make you slaves of your enemies
  - type: text
    content: in a far-off and strange land.
  - type: text
    content: My anger is hot and blazing and fierce,
  - type: text
    content: and no one will put it out.”
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Cursed is the strong one
  - type: text
    content: who depends on mere humans,
  - type: text
    content: Who thinks he can make it on muscle alone
  - type: text
    content: 'and sets '
  - type: text
    content: God
  - type: text
    content: ' aside as dead weight.'
  - type: text
    content: He’s like a tumbleweed on the prairie,
  - type: text
    content: out of touch with the good earth.
  - type: text
    content: He lives rootless and aimless
  - type: text
    content: in a land where nothing grows.
  '7':
  - type: text
    content: '“But blessed is the man who trusts me, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'the woman who sticks with '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They’re like trees replanted in Eden,
  - type: text
    content: putting down roots near the rivers—
  - type: text
    content: Never a worry through the hottest of summers,
  - type: text
    content: never dropping a leaf,
  - type: text
    content: Serene and calm through droughts,
  - type: text
    content: bearing fresh fruit every season.
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: “The heart is hopelessly dark and deceitful,
  - type: text
    content: a puzzle that no one can figure out.
  - type: text
    content: 'But I, '
  - type: text
    content: God
  - type: text
    content: ', search the heart'
  - type: text
    content: and examine the mind.
  - type: text
    content: I get to the heart of the human.
  - type: text
    content: I get to the root of things.
  - type: text
    content: I treat them as they really are,
  - type: text
    content: not as they pretend to be.”
