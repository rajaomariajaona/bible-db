document_id: DEU.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Charge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Moses went on and addressed these words to all Israel. He said, “I’m 120 years old today. I can’t get about as I used to. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me, ‘You’re not going to cross this Jordan River.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will cross the river ahead of you and destroy the nations in your path so that you may oust them. (And Joshua will cross the river before you, as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said he would.) '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will give the nations the same treatment he gave the kings of the Amorites, Sihon and Og, and their land; he’ll destroy them. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will hand the nations over to you, and you’ll treat them exactly as I have commanded you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Be strong. Take courage. Don’t be intimidated. Don’t give them a second thought because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is striding ahead of you. He’s right there with you. He won’t let you down; he won’t leave you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'Then Moses summoned Joshua. He said to him with all Israel watching, “Be strong. Take courage. You will enter the land with this people, this land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised their ancestors that he’d give them. You will make them the proud possessors of it. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is striding ahead of you. He’s right there with you. He won’t let you down; he won’t leave you. Don’t be intimidated. Don’t worry.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-13
  - type: text
    text: 'Moses wrote out this Revelation and gave it to the priests, the sons of Levi, who carried the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and to all the leaders of Israel. And he gave these orders: “At the end of every seven years, the Year-All-Debts-Are-Canceled, during the pilgrim Festival of Booths when everyone in Israel comes to appear in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, at the place he designates, read out this Revelation to all Israel, with everyone listening. Gather the people together—men, women, children, and the foreigners living among you—so they can listen well, so they may learn to live in holy awe before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and diligently keep everything in this Revelation. And do this so that their children, who don’t yet know all this, will also listen and learn to live in holy awe before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, for as long as you live on the land that you are crossing over the Jordan to possess.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “You are about to die. So call Joshua. Meet me in the Tent of Meeting so that I can commission him.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Moses and Joshua went and stationed themselves in the Tent of Meeting. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' appeared in the Tent in a Pillar of Cloud. The Cloud was near the entrance of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “You’re about to die and be buried with your ancestors. You’ll no sooner be in the grave than this people will be up and lusting after the foreign gods of this country that they are entering. They will abandon me and violate my Covenant that I’ve made with them. I’ll get angry, oh so angry! I’ll walk off and leave them on their own, won’t so much as look back at them. Then many calamities and disasters will devastate them because they are defenseless. They’ll say, ‘Isn’t it because our God wasn’t here that all this evil has come upon us?’ But I’ll stay out of their lives, keep looking the other way because of all their evil: they took up with other gods!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: “But for right now, copy down this song and teach the People of Israel to sing it by heart. They’ll have it then as my witness against them. When I bring them into the land that I promised to their ancestors, a land flowing with milk and honey, and they eat and become full and get fat and then begin fooling around with other gods and worshiping them, and then things start falling apart, many terrible things happening, this song will be there with them as a witness to who they are and what went wrong. Their children won’t forget this song; they’ll be singing it. Don’t think I don’t know what they are already scheming to do, and they’re not even in the land yet, this land I promised them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So Moses wrote down this song that very day and taught it to the People of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded Joshua son of Nun saying, “Be strong. Take courage. You will lead the People of Israel into the land I promised to give them. And I’ll be right there with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: 'After Moses had finished writing down the words of this Revelation in a book, right down to the last word, he ordered the Levites who were responsible for carrying the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', saying, “Take this Book of Revelation and place it alongside the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Keep it there as a witness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: '“I know what rebels you are, how stubborn and willful you can be. Even today, while I’m still alive and present with you, you’re rebellious against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. How much worse when I’ve died! So gather the leaders of the tribes and the officials here. I have something I need to say directly to them with Heaven and Earth as witnesses. I know that after I die you’re going to make a mess of things, abandoning the way I commanded, inviting all kinds of evil consequences in the days ahead. You’re determined to do evil in defiance of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —I know you are—deliberately provoking his anger by what you do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So with everyone in Israel gathered and listening, Moses taught them the words of this song, from start to finish.
