document_id: 1CH.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought the Chest of God and placed it right in the center of the tent that David had pitched for it; then they worshiped by presenting burnt offerings and peace offerings to God. When David had completed the offerings of worship, he blessed the people in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Then he passed around to every one there, men and women alike, a loaf of bread, a slice of barbecue, and a raisin cake.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wandered from country to country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: camped out in one kingdom after another;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he didn’t let anyone push them around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he stood up for them against bully-kings:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t you dare touch my anointed ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t lay a hand on my prophets.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', everyone and everything!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get out his salvation news every day!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publish his glory among the godless nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his wonders to all races and religions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why? Because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is great—well worth praising!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No god or goddess comes close in honor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the popular gods are stuff and nonsense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made the cosmos!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Splendor and majesty flow out of him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strength and joy fill his place.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout Bravo! to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', families of the peoples,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in awe of the Glory, in awe of the Strength: Bravo!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout Bravo! to his famous Name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lift high an offering and enter his presence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand resplendent in his robes of holiness!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is serious business, take him seriously;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s put the earth in place and it’s not moving.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So let Heaven rejoice, let Earth be jubilant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pass the word among the nations, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' reigns!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Ocean, all teeming with life, bellow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Field and all its creatures shake the rafters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the trees in the forest will add their applause
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to all who are pleased and present before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —he’s on his way to set things right!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —he is good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his love never quits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say, “Save us, Savior God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: round us up and get us out of these godless places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So we can give thanks to your holy Name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bask in your life of praise.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then everybody said, “Yes! Amen!” and “Praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David left Asaph and his coworkers with the Chest of the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and in charge of the work of worship; they were responsible for the needs of worship around the clock. He also assigned Obed-Edom and his sixty-eight relatives to help them. Obed-Edom son of Jeduthun and Hosah were in charge of the security guards. The priest Zadok and his family of priests were assigned to the Tent of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at the sacred mound at Gibeon to make sure that the services of morning and evening worship were conducted daily, complete with Whole-Burnt-Offerings offered on the Altar of Burnt Offering, as ordered in the Law of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', which was the norm for Israel. With them were Heman, Jeduthun, and others specifically named, with the job description: “Give thanks to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', for his love never quits!” Heman and Jeduthun were also well equipped with trumpets, cymbals, and other instruments for accompanying sacred songs. The sons of Jeduthun formed the security guard.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David assigned some of the Levites to the Chest of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to lead worship—to intercede, give thanks, and praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of Israel. Asaph was in charge; under him were Zechariah, Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-Edom, and Jeiel, who played the musical instruments. Asaph was on percussion. The priests Benaiah and Jahaziel blew the trumpets before the Chest of the Covenant of God at set times through the day.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Arrangements completed, the people all left for home. And David went home to bless his family.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That was the day that David inaugurated regular worship of praise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', led by Asaph and his company.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thank '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Call out his Name!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell the whole world who he is and what he’s done!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to him! Play songs for him!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Broadcast all his wonders!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revel in his holy Name,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -seekers, be jubilant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Study '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and his strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seek his presence day and night;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember all the wonders he performed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the miracles and judgments that came out of his mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seed of Israel his servant!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Children of Jacob, his first choice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wherever you go you come on his judgments and decisions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps his commitments across thousands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of generations, the covenant he commanded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The same one he made with Abraham,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very one he swore to Isaac;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He posted it in big block letters to Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'this eternal covenant with Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I give you the land of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this is your inheritance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though you’re not much to look at,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a few straggling strangers.”
