document_id: 1CH.16,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'They brought the Chest of God and placed it right in the center of the tent that David had pitched for it; then they worshiped by presenting burnt offerings and peace offerings to God. When David had completed the offerings of worship, he blessed the people in the name of '
  - type: text
    content: God
  - type: text
    content: . Then he passed around to every one there, men and women alike, a loaf of bread, a slice of barbecue, and a raisin cake.
  '20':
  - type: text
    content: They wandered from country to country,
  - type: text
    content: camped out in one kingdom after another;
  - type: text
    content: But he didn’t let anyone push them around,
  - type: text
    content: 'he stood up for them against bully-kings:'
  - type: text
    content: “Don’t you dare touch my anointed ones,
  - type: text
    content: don’t lay a hand on my prophets.”
  '23':
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: ', everyone and everything!'
  - type: text
    content: Get out his salvation news every day!
  - type: text
    content: Publish his glory among the godless nations,
  - type: text
    content: his wonders to all races and religions.
  - type: text
    content: 'And why? Because '
  - type: text
    content: God
  - type: text
    content: ' is great—well worth praising!'
  - type: text
    content: No god or goddess comes close in honor.
  - type: text
    content: All the popular gods are stuff and nonsense,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ' made the cosmos!'
  - type: text
    content: Splendor and majesty flow out of him,
  - type: text
    content: strength and joy fill his place.
  '28':
  - type: text
    content: 'Shout Bravo! to '
  - type: text
    content: God
  - type: text
    content: ', families of the peoples,'
  - type: text
    content: 'in awe of the Glory, in awe of the Strength: Bravo!'
  - type: text
    content: Shout Bravo! to his famous Name,
  - type: text
    content: lift high an offering and enter his presence!
  - type: text
    content: Stand resplendent in his robes of holiness!
  '30':
  - type: text
    content: God is serious business, take him seriously;
  - type: text
    content: he’s put the earth in place and it’s not moving.
  - type: text
    content: So let Heaven rejoice, let Earth be jubilant,
  - type: text
    content: and pass the word among the nations, “
  - type: text
    content: God
  - type: text
    content: ' reigns!”'
  - type: text
    content: Let Ocean, all teeming with life, bellow,
  - type: text
    content: let Field and all its creatures shake the rafters;
  - type: text
    content: Then the trees in the forest will add their applause
  - type: text
    content: 'to all who are pleased and present before '
  - type: text
    content: God
  - type: text
    content: —he’s on his way to set things right!
  '34':
  - type: text
    content: 'Give thanks to '
  - type: text
    content: God
  - type: text
    content: —he is good
  - type: text
    content: and his love never quits.
  - type: text
    content: Say, “Save us, Savior God,
  - type: text
    content: round us up and get us out of these godless places,
  - type: text
    content: So we can give thanks to your holy Name,
  - type: text
    content: and bask in your life of praise.”
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: from everlasting to everlasting.
  - type: text
    content: 'Then everybody said, “Yes! Amen!” and “Praise '
  - type: text
    content: God
  - type: text
    content: '!”'
  - type: text
    content: '* * *'
  '37':
  - type: text
    content: 'David left Asaph and his coworkers with the Chest of the Covenant of '
  - type: text
    content: God
  - type: text
    content: ' and in charge of the work of worship; they were responsible for the needs of worship around the clock. He also assigned Obed-Edom and his sixty-eight relatives to help them. Obed-Edom son of Jeduthun and Hosah were in charge of the security guards. The priest Zadok and his family of priests were assigned to the Tent of '
  - type: text
    content: God
  - type: text
    content: ' at the sacred mound at Gibeon to make sure that the services of morning and evening worship were conducted daily, complete with Whole-Burnt-Offerings offered on the Altar of Burnt Offering, as ordered in the Law of '
  - type: text
    content: God
  - type: text
    content: ', which was the norm for Israel. With them were Heman, Jeduthun, and others specifically named, with the job description: “Give thanks to '
  - type: text
    content: God
  - type: text
    content: ', for his love never quits!” Heman and Jeduthun were also well equipped with trumpets, cymbals, and other instruments for accompanying sacred songs. The sons of Jeduthun formed the security guard.'
  '4':
  - type: text
    content: 'Then David assigned some of the Levites to the Chest of '
  - type: text
    content: God
  - type: text
    content: ' to lead worship—to intercede, give thanks, and praise the '
  - type: text
    content: God
  - type: text
    content: ' of Israel. Asaph was in charge; under him were Zechariah, Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-Edom, and Jeiel, who played the musical instruments. Asaph was on percussion. The priests Benaiah and Jahaziel blew the trumpets before the Chest of the Covenant of God at set times through the day.'
  '43':
  - type: text
    content: Arrangements completed, the people all left for home. And David went home to bless his family.
  '7':
  - type: text
    content: 'That was the day that David inaugurated regular worship of praise to '
  - type: text
    content: God
  - type: text
    content: ', led by Asaph and his company.'
  '8':
  - type: text
    content: 'Thank '
  - type: text
    content: God
  - type: text
    content: '! Call out his Name!'
  - type: text
    content: Tell the whole world who he is and what he’s done!
  - type: text
    content: Sing to him! Play songs for him!
  - type: text
    content: Broadcast all his wonders!
  - type: text
    content: Revel in his holy Name,
  - type: text
    content: God
  - type: text
    content: -seekers, be jubilant!
  - type: text
    content: 'Study '
  - type: text
    content: God
  - type: text
    content: ' and his strength,'
  - type: text
    content: seek his presence day and night;
  - type: text
    content: Remember all the wonders he performed,
  - type: text
    content: the miracles and judgments that came out of his mouth.
  - type: text
    content: Seed of Israel his servant!
  - type: text
    content: Children of Jacob, his first choice!
  - type: text
    content: 'He is '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: text
    content: our
  - type: text
    content: ' God;'
  - type: text
    content: wherever you go you come on his judgments and decisions.
  - type: text
    content: He keeps his commitments across thousands
  - type: text
    content: of generations, the covenant he commanded,
  - type: text
    content: The same one he made with Abraham,
  - type: text
    content: the very one he swore to Isaac;
  - type: text
    content: He posted it in big block letters to Jacob,
  - type: text
    content: 'this eternal covenant with Israel:'
  - type: text
    content: “I give you the land of Canaan,
  - type: text
    content: this is your inheritance;
  - type: text
    content: Even though you’re not much to look at,
  - type: text
    content: a few straggling strangers.”
