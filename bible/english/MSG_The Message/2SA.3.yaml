document_id: 2SA.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The war between the house of Saul and the house of David dragged on and on. The longer it went on the stronger David became, with the house of Saul getting weaker.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-5
  - type: text
    text: 'During the Hebron years, sons were born to David:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Amnon, born of Ahinoam of Jezreel—the firstborn;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Kileab, born of Abigail of Carmel, Nabal’s widow—his second;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Absalom, born of Maacah, daughter of Talmai, king of Geshur—the third;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Adonijah, born of Haggith—the fourth;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shephatiah, born of Abital—the fifth;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ithream, born of Eglah—the sixth.
- type: usfm
  marker: m
  children:
  - type: text
    text: These six sons of David were born in Hebron.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Abner took advantage of the continuing war between the house of Saul and the house of David to gain power for himself. Saul had had a concubine, Rizpah, the daughter of Aiah. One day Ish-Bosheth confronted Abner: “What business do you have sleeping with my father’s concubine?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'Abner lost his temper with Ish-Bosheth, “Treat me like a dog, will you! Is this the thanks I get for sticking by the house of your father, Saul, and all his family and friends? I personally saved you from certain capture by David, and you make an issue out of my going to bed with a woman! What '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised David, I’ll help accomplish—transfer the kingdom from the house of Saul and make David ruler over the whole country, both Israel and Judah, from Dan to Beersheba. If not, may God do his worst to me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ish-Bosheth, cowed by Abner’s outburst, couldn’t say another word.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abner went ahead and sent personal messengers to David: “Make a deal with me and I’ll help bring the whole country of Israel over to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Great,” said David. “It’s a deal. But only on one condition: You’re not welcome here unless you bring Michal, Saul’s daughter, with you when you come to meet me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David then sent messengers to Ish-Bosheth son of Saul: “Give me back Michal, whom I won as my wife at the cost of a hundred Philistine foreskins.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: Ish-Bosheth ordered that she be taken from her husband Paltiel son of Laish. But Paltiel followed her, weeping all the way, to Bahurim. There Abner told him, “Go home.” And he went home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'Abner got the elders of Israel together and said, “Only yesterday, it seems, you were looking for a way to make David your king. So do it—now! For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given the go-ahead on David: ‘By my servant David’s hand, I’ll save my people Israel from the oppression of the Philistines and all their other enemies.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abner took the Benjaminites aside and spoke to them. Then he went to Hebron for a private talk with David, telling him everything that Israel in general and Benjamin in particular were planning to do.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When Abner and the twenty men who were with him met with David in Hebron, David laid out a feast for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Abner then said, “I’m ready. Let me go now to rally everyone in Israel for my master, the king. They’ll make a treaty with you, authorizing you to rule them however you see fit.” Abner was sent off with David’s blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Soon after that, David’s men, led by Joab, came back from a field assignment. Abner was no longer in Hebron with David, having just been dismissed with David’s blessing. As Joab and his raiding party arrived, they were told that Abner the son of Ner had been there with David and had been sent off with David’s blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'Joab went straight to the king: “What’s this you’ve done? Abner shows up, and you let him walk away scot-free? You know Abner son of Ner better than that. This was no friendly visit. He was here to spy on you, figure out your comings and goings, find out what you’re up to.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: Joab left David and went into action. He sent messengers after Abner; they caught up with him at the well at Sirah and brought him back. David knew nothing of all this. When Abner got back to Hebron, Joab steered him aside at the gate for a personal word with him. There he stabbed him in the belly, killed him in cold blood for the murder of his brother Asahel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: 'Later on, when David heard what happened, he said, “Before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' I and my kingdom are totally innocent of this murder of Abner son of Ner. Joab and his entire family will always be under the curse of this bloodguilt. May they forever be victims of crippling diseases, violence, and famine.” (Joab and his brother, Abishai, murdered Abner because he had killed their brother Asahel at the battle of Gibeon.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: David ordered Joab and all the men under him, “Rip your cloaks into rags! Wear mourning clothes! Lead Abner’s funeral procession with loud lament!” King David followed the coffin. They buried Abner in Hebron. The king’s voice was loud in lament as he wept at the side of Abner’s grave. All the people wept, too.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: 'Then the king sang this tribute to Abner:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can this be? Abner dead like a nameless bum?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were a free man, free to go and do as you wished—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet you fell as a victim in a street brawl.
- type: usfm
  marker: m
  children:
  - type: text
    text: And all the people wept—a crescendo of crying!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-37
  - type: text
    text: They all came then to David, trying to get him to eat something before dark. But David solemnly swore, “I’ll not so much as taste a piece of bread, or anything else for that matter, before sunset, so help me God!” Everyone at the funeral took notice—and liked what they saw. In fact everything the king did was applauded by the people. It was clear to everyone that day, including all Israel, that the king had nothing to do with the death of Abner son of Ner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: 'The king spoke to his servants: “You realize, don’t you, that today a prince and hero fell victim of foul play in Israel? And I, though anointed king, was helpless to do anything about it. These sons of Zeruiah are too much for me. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', requite the criminal for his crime!”'
