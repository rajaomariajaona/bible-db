document_id: NUM.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Two Bugles
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Make two bugles of hammered silver. Use them to call the congregation together and give marching orders to the camps. When you blow them, the whole community will meet you at the entrance of the Tent of Meeting.'
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the second year, on the twentieth day of the second month, the Cloud went up from over The Dwelling of The Testimony. At that the People of Israel set out on their travels from the Wilderness of Sinai until the Cloud finally settled in the Wilderness of Paran. They began their march at the command of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' through Moses.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The flag of the camp of Judah led the way, rank after rank under the command of Nahshon son of Amminadab. Nethanel son of Zuar commanded the forces of the tribe of Issachar, and Eliab son of Helon commanded the forces of the tribe of Zebulun. As soon as The Dwelling was taken down, the Gershonites and the Merarites set out, carrying The Dwelling.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The flag of the camp of Reuben was next with Elizur son of Shedeur in command. Shelumiel son of Zurishaddai commanded the forces of the tribe of Simeon; Eliasaph son of Deuel commanded the forces of the tribe of Gad. Then the Kohathites left, carrying the holy things. By the time they arrived The Dwelling would be set up.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The flag of the tribe of Ephraim moved out next, commanded by Elishama son of Ammihud. Gamaliel son of Pedahzur commanded the forces of the tribe of Manasseh; Abidan son of Gideoni commanded the forces of the tribe of Benjamin.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finally, under the flag of the tribe of Dan, the rear guard of all the camps marched out with Ahiezer son of Ammishaddai in command. Pagiel son of Ocran commanded the forces of the tribe of Asher; Ahira son of Enan commanded the forces of the tribe of Naphtali.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the marching units of the People of Israel. They were on their way.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to his brother-in-law Hobab son of Reuel the Midianite, Moses’ father-in-law, “We’re marching to the place about which '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' promised, ‘I’ll give it to you.’ Come with us; we’ll treat you well. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has promised good things for Israel.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Hobab said, “I’m not coming; I’m going back home to my own country, to my own family.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses countered, “Don’t leave us. You know all the best places to camp in the wilderness. We need your eyes. If you come with us, we’ll make sure that you share in all the good things '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will do for us.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so off they marched. From the Mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' they marched three days with the Chest of the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in the lead to scout out a campsite. The Cloud of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was above them by day when they marched from the camp. With the Chest leading the way, Moses would say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Get up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put down your enemies!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Chase those who hate you to the hills!
  - type: usfm
    marker: m
    children:
    - type: text
      text: And when the Chest was set down, he would say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Rest with us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stay with the many,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Many thousands of Israel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When a bugle gives a single, short blast, that’s the signal for the leaders, the heads of the clans, to assemble. When it gives a long blast, that’s the signal to march. At the first blast the tribes who were camped on the east set out. At the second blast the camps on the south set out. The long blasts are the signals to march. The bugle call that gathers the assembly is different from the signal to march.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The sons of Aaron, the priests, are in charge of blowing the bugles; it’s their assigned duty down through the generations. When you go to war against an aggressor, blow a long blast on the bugle so that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will notice you and deliver you from your enemies. Also at times of celebration, at the appointed feasts and New Moon festivals, blow the bugles over your Whole-Burnt-Offerings and Peace-Offerings: they will keep your attention on God. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The March from Sinai to Paran
    marker-yv: yv-h
