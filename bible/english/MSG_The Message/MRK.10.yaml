document_id: MRK.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divorce
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: From there he went to the area of Judea across the Jordan. A crowd of people, as was so often the case, went along, and he, as he so often did, taught them. Pharisees came up, intending to give him a hard time. They asked, “Is it legal for a man to divorce his wife?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: 'When they were back home, the disciples brought it up again. Jesus gave it to them straight: “A man who divorces his wife so he can marry someone else commits adultery against her. And a woman who divorces her husband so she can marry someone else commits adultery.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: 'The people brought children to Jesus, hoping he might touch them. The disciples shooed them off. But Jesus was irate and let them know it: “Don’t push these children away. Don’t ever get between them and me. These children are at the very center of life in the kingdom. Mark this: Unless you accept God’s kingdom in the simplicity of a child, you’ll never get in.” Then, gathering the children up in his arms, he laid his hands of blessing on them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Enter God’s Kingdom
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: As he went out into the street, a man came running up, greeted him with great reverence, and asked, “Good Teacher, what must I do to get eternal life?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'Jesus said, “Why are you calling me good? No one is good, only God. You know the commandments: Don’t murder, don’t commit adultery, don’t steal, don’t lie, don’t cheat, honor your father and mother.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He said, “Teacher, I have—from my youth—kept them all!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus looked him hard in the eye—and loved him! He said, “There’s one thing left: Go sell whatever you own and give it to the poor. All your wealth will then be heavenly wealth. And come follow me.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The man’s face clouded over. This was the last thing he expected to hear, and he walked off with a heavy heart. He was holding on tight to a lot of things, and not about to let go.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: 'Looking at his disciples, Jesus said, “Do you have any idea how difficult it is for people who ‘have it all’ to enter God’s kingdom?” The disciples couldn’t believe what they were hearing, but Jesus kept on: “You can’t imagine how difficult. I’d say it’s easier for a camel to go through a needle’s eye than for the rich to get into God’s kingdom.”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' got their attention. “Then who has any chance at all?” they asked.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jesus was blunt: “No chance at all if you think you can pull it off by yourself. Every chance in the world if you let God do it.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Peter tried another angle: “We left everything and followed you.”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-31
    - type: text
      text: 'Jesus said, “Mark my words, no one who sacrifices house, brothers, sisters, mother, father, children, land—whatever—because of me and the Message will lose out. They’ll get it all back, but multiplied many times in homes, brothers, sisters, mothers, children, and land—but also in troubles. And then the bonus of eternal life! This is once again the Great Reversal: Many who are first will end up last, and the last first.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jesus said, “What did Moses command?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-34
    - type: text
      text: Back on the road, they set out for Jerusalem. Jesus had a head start on them, and they were following, puzzled and not just a little afraid. He took the Twelve and began again to go over what to expect next. “Listen to me carefully. We’re on our way up to Jerusalem. When we get there, the Son of Man will be betrayed to the religious leaders and scholars. They will sentence him to death. Then they will hand him over to the Romans, who will mock and spit on him, give him the third degree, and kill him. After three days he will rise alive.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Highest Places of Honor
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: James and John, Zebedee’s sons, came up to him. “Teacher, we have something we want you to do for us.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “What is it? I’ll see what I can do.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: “Arrange it,” they said, “so that we will be awarded the highest places of honor in your glory—one of us at your right, the other at your left.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Jesus said, “You have no idea what you’re asking. Are you capable of drinking the cup I drink, of being baptized in the baptism I’m about to be plunged into?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-40
    - type: text
      text: “Sure,” they said. “Why not?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, “Come to think of it, you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' drink the cup I drink, and be baptized in my baptism. But as to awarding places of honor, that’s not my business. There are other arrangements for that.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They answered, “Moses gave permission to fill out a certificate of dismissal and divorce her.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-45
    - type: text
      text: 'When the other ten heard of this conversation, they lost their tempers with James and John. Jesus got them together to settle things down. “You’ve observed how godless rulers throw their weight around,” he said, “and when people get a little power how quickly it goes to their heads. It’s not going to be that way with you. Whoever wants to be great must become a servant. Whoever wants to be first among you must be your slave. That is what the Son of Man has done: He came to serve, not to be served—and then to give away his life in exchange for many who are held hostage.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 46-48
    - type: text
      text: They spent some time in Jericho. As Jesus was leaving town, trailed by his disciples and a parade of people, a blind beggar by the name of Bartimaeus, son of Timaeus, was sitting alongside the road. When he heard that Jesus the Nazarene was passing by, he began to cry out, “Son of David, Jesus! Mercy, have mercy on me!” Many tried to hush him up, but he yelled all the louder, “Son of David! Mercy, have mercy on me!”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-50
    - type: text
      text: Jesus stopped in his tracks. “Call him over.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They called him. “It’s your lucky day! Get up! He’s calling you to come!” Throwing off his coat, he was on his feet at once and came to Jesus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: Jesus said, “Moses wrote this command only as a concession to your hardhearted ways. In the original creation, God made male and female to be together. Because of this, a man leaves father and mother, and in marriage he becomes one flesh with a woman—no longer two individuals, but forming a new unity. Because God created this organic union of the two sexes, no one should desecrate his art by cutting them apart.”
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Jesus said, “What can I do for you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The blind man said, “Rabbi, I want to see.”
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: “On your way,” said Jesus. “Your faith has saved and healed you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that very instant he recovered his sight and followed Jesus down the road.
