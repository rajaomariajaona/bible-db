document_id: REV.11,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Two Witnesses
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: I was given a stick for a measuring rod and told, “Get up and measure God’s Temple and Altar and everyone worshiping in it. Exclude the outside court; don’t measure it. It’s been handed over to non-Jewish outsiders. They’ll desecrate the Holy City for forty-two months.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Then, after three and a half days, the Living Spirit of God will enter them—they’re on their feet!—and all those gloating spectators will be scared to death.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: I heard a strong voice out of Heaven calling, “Come up here!” and up they went to Heaven, wrapped in a cloud, their enemies watching it all. At that moment there was a gigantic earthquake—a tenth of the city fell to ruin, seven thousand perished in the earthquake, the rest frightened to the core of their being, frightened into giving honor to the God-of-Heaven.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The second doom is past, the third doom coming right on its heels.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Last Trumpet Sounds
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: The seventh Angel trumpeted. A crescendo of voices in Heaven sang out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kingdom of the world is now
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Kingdom of our God and his Messiah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rule forever and ever!
  - type: usfm
    marker: m
    children:
    - type: text
      text: The Twenty-four Elders seated before God on their thrones fell to their knees, worshiped, and sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We thank you, O God, Sovereign-Strong,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Who Is and Who Was
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You took your great power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and took over—reigned!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The angry nations now
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'get a taste of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' anger.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The time has come to judge the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to reward your servants, all prophets and saints,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reward small and great who fear your Name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy the destroyers of earth.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The doors of God’s Temple in Heaven flew open, and the Ark of his Covenant was clearly seen surrounded by flashes of lightning, loud shouts, peals of thunder, an earthquake, and a fierce hailstorm.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-6
    - type: text
      text: “Meanwhile, I’ll provide my two Witnesses. Dressed in sackcloth, they’ll prophesy for 1,260 days. These are the two Olive Trees, the two Lampstands, standing at attention before God on earth. If anyone tries to hurt them, a blast of fire from their mouths will incinerate them—burn them to a crisp just like that. They’ll have power to seal the sky so that it doesn’t rain for the time of their prophesying, power to turn rivers and springs to blood, power to hit earth with any and every disaster as often as they want.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: “When they’ve completed their witness, the Beast from the Abyss will emerge and fight them, conquer and kill them, leaving their corpses exposed on the street of the Great City spiritually called Sodom and Egypt, the same City where their Master was crucified. For three and a half days they’ll be there—exposed, prevented from getting a decent burial, stared at by the curious from all over the world. Those people will cheer at the spectacle, shouting ‘Good riddance!’ and calling for a celebration, for these two prophets pricked the conscience of all the people on earth, made it impossible for them to enjoy their sins.
