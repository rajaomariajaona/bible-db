document_id: REV.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Two Witnesses
  - type: text
    content: I was given a stick for a measuring rod and told, “Get up and measure God’s Temple and Altar and everyone worshiping in it. Exclude the outside court; don’t measure it. It’s been handed over to non-Jewish outsiders. They’ll desecrate the Holy City for forty-two months.
  '11':
  - type: text
    content: “Then, after three and a half days, the Living Spirit of God will enter them—they’re on their feet!—and all those gloating spectators will be scared to death.”
  '12':
  - type: text
    content: I heard a strong voice out of Heaven calling, “Come up here!” and up they went to Heaven, wrapped in a cloud, their enemies watching it all. At that moment there was a gigantic earthquake—a tenth of the city fell to ruin, seven thousand perished in the earthquake, the rest frightened to the core of their being, frightened into giving honor to the God-of-Heaven.
  '14':
  - type: text
    content: The second doom is past, the third doom coming right on its heels.
  - type: heading
    content: The Last Trumpet Sounds
  '15':
  - type: text
    content: The seventh Angel trumpeted. A crescendo of voices in Heaven sang out,
  - type: text
    content: The kingdom of the world is now
  - type: text
    content: the Kingdom of our God and his Messiah!
  - type: text
    content: He will rule forever and ever!
  - type: text
    content: The Twenty-four Elders seated before God on their thrones fell to their knees, worshiped, and sang,
  - type: text
    content: We thank you, O God, Sovereign-Strong,
  - type: text
    content: Who Is and Who Was
  - type: text
    content: .
  - type: text
    content: You took your great power
  - type: text
    content: and took over—reigned!
  - type: text
    content: The angry nations now
  - type: text
    content: 'get a taste of '
  - type: text
    content: your
  - type: text
    content: ' anger.'
  - type: text
    content: The time has come to judge the dead,
  - type: text
    content: to reward your servants, all prophets and saints,
  - type: text
    content: Reward small and great who fear your Name,
  - type: text
    content: and destroy the destroyers of earth.
  '19':
  - type: text
    content: The doors of God’s Temple in Heaven flew open, and the Ark of his Covenant was clearly seen surrounded by flashes of lightning, loud shouts, peals of thunder, an earthquake, and a fierce hailstorm.
  '3':
  - type: text
    content: “Meanwhile, I’ll provide my two Witnesses. Dressed in sackcloth, they’ll prophesy for 1,260 days. These are the two Olive Trees, the two Lampstands, standing at attention before God on earth. If anyone tries to hurt them, a blast of fire from their mouths will incinerate them—burn them to a crisp just like that. They’ll have power to seal the sky so that it doesn’t rain for the time of their prophesying, power to turn rivers and springs to blood, power to hit earth with any and every disaster as often as they want.
  '7':
  - type: text
    content: “When they’ve completed their witness, the Beast from the Abyss will emerge and fight them, conquer and kill them, leaving their corpses exposed on the street of the Great City spiritually called Sodom and Egypt, the same City where their Master was crucified. For three and a half days they’ll be there—exposed, prevented from getting a decent burial, stared at by the curious from all over the world. Those people will cheer at the spectacle, shouting ‘Good riddance!’ and calling for a celebration, for these two prophets pricked the conscience of all the people on earth, made it impossible for them to enjoy their sins.
