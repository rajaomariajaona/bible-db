document_id: ISA.59,97
type_code: eng
verses:
  '1':
  - type: heading
    content: We Long for Light but Sink into Darkness
  - type: text
    content: Look! Listen!
  - type: text
    content: God
  - type: text
    content: ’s arm is not amputated—he can still save.
  - type: text
    content: God
  - type: text
    content: ’s ears are not stopped up—he can still hear.
  - type: text
    content: 'There’s nothing wrong with God; the wrong is in '
  - type: text
    content: you.
  - type: text
    content: Your wrongheaded lives caused the split between you and God.
  - type: text
    content: Your sins got between you so that he doesn’t hear.
  - type: text
    content: Your hands are drenched in blood,
  - type: text
    content: your fingers dripping with guilt,
  - type: text
    content: Your lips smeared with lies,
  - type: text
    content: your tongue swollen from muttering obscenities.
  - type: text
    content: No one speaks up for the right,
  - type: text
    content: no one deals fairly.
  - type: text
    content: They trust in illusion, they tell lies,
  - type: text
    content: they get pregnant with mischief and have sin-babies.
  - type: text
    content: They hatch snake eggs and weave spider webs.
  - type: text
    content: Eat an egg and die; break an egg and get a snake!
  - type: text
    content: The spider webs are no good for shirts or shawls.
  - type: text
    content: No one can wear these weavings!
  - type: text
    content: They weave wickedness,
  - type: text
    content: they hatch violence.
  - type: text
    content: They compete in the race to do evil
  - type: text
    content: and run to be the first to murder.
  - type: text
    content: They plan and plot evil, think and breathe evil,
  - type: text
    content: and leave a trail of wrecked lives behind them.
  - type: text
    content: They know nothing about peace
  - type: text
    content: and less than nothing about justice.
  - type: text
    content: They make tortuously twisted roads.
  - type: text
    content: No peace for the wretch who walks down those roads!
  '12':
  - type: text
    content: ' Our wrongdoings pile up before you, God,'
  - type: text
    content: our sins stand up and accuse us.
  - type: text
    content: Our wrongdoings stare us down;
  - type: text
    content: 'we know in detail what we’ve done:'
  - type: text
    content: 'Mocking and denying '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: not following our God,
  - type: text
    content: Spreading false rumors, whipping up revolt,
  - type: text
    content: pregnant with lies, muttering malice.
  - type: text
    content: Justice is beaten back,
  - type: text
    content: Righteousness is banished to the sidelines,
  - type: text
    content: Truth staggers down the street,
  - type: text
    content: Honesty is nowhere to be found,
  - type: text
    content: Good is missing in action.
  - type: text
    content: Anyone renouncing evil is beaten and robbed.
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' looked and saw evil looming on the horizon—'
  - type: text
    content: so much evil and no sign of Justice.
  - type: text
    content: 'He couldn’t believe what he saw:'
  - type: text
    content: not a soul around to correct this awful situation.
  - type: text
    content: So he did it himself, took on the work of Salvation,
  - type: text
    content: fueled by his own Righteousness.
  - type: text
    content: He dressed in Righteousness, put it on like a suit of armor,
  - type: text
    content: with Salvation on his head like a helmet,
  - type: text
    content: Put on Judgment like an overcoat,
  - type: text
    content: and threw a cloak of Passion across his shoulders.
  - type: text
    content: 'He’ll make everyone pay for what they’ve done:'
  - type: text
    content: fury for his foes, just deserts for his enemies.
  - type: text
    content: Even the far-off islands will get paid off in full.
  - type: text
    content: 'In the west they’ll fear the name of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'in the east they’ll fear the glory of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: For he’ll arrive like a river in flood stage,
  - type: text
    content: 'whipped to a torrent by the wind of '
  - type: text
    content: God
  - type: text
    content: .
  '20':
  - type: text
    content: “I’ll arrive in Zion as Redeemer,
  - type: text
    content: to those in Jacob who leave their sins.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '21':
  - type: text
    content: '“As for me,” '
  - type: text
    content: God
  - type: text
    content: ' says, “this is my covenant with them: My Spirit that I’ve placed upon you and the words that I’ve given you to speak, they’re not going to leave your mouths nor the mouths of your children nor the mouths of your grandchildren. You will keep repeating these words and won’t ever stop.” '
  - type: text
    content: God
  - type: text
    content: ’s orders.
  '9':
  - type: text
    content: Which means that we’re a far cry from fair dealing,
  - type: text
    content: and we’re not even close to right living.
  - type: text
    content: We long for light but sink into darkness,
  - type: text
    content: long for brightness but stumble through the night.
  - type: text
    content: Like the blind, we inch along a wall,
  - type: text
    content: groping eyeless in the dark.
  - type: text
    content: We shuffle our way in broad daylight,
  - type: text
    content: like the dead, but somehow walking.
  - type: text
    content: We’re no better off than bears, groaning,
  - type: text
    content: and no worse off than doves, moaning.
  - type: text
    content: We look for justice—not a sign of it;
  - type: text
    content: for salvation—not so much as a hint.
