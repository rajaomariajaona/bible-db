document_id: ISA.59
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: We Long for Light but Sink into Darkness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-8
  - type: text
    text: Look! Listen!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s arm is not amputated—he can still save.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s ears are not stopped up—he can still hear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There’s nothing wrong with God; the wrong is in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your wrongheaded lives caused the split between you and God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your sins got between you so that he doesn’t hear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your hands are drenched in blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your fingers dripping with guilt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your lips smeared with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your tongue swollen from muttering obscenities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one speaks up for the right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one deals fairly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They trust in illusion, they tell lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they get pregnant with mischief and have sin-babies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hatch snake eggs and weave spider webs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Eat an egg and die; break an egg and get a snake!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The spider webs are no good for shirts or shawls.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one can wear these weavings!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They weave wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they hatch violence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They compete in the race to do evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and run to be the first to murder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They plan and plot evil, think and breathe evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave a trail of wrecked lives behind them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They know nothing about peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: and less than nothing about justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They make tortuously twisted roads.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No peace for the wretch who walks down those roads!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: Which means that we’re a far cry from fair dealing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we’re not even close to right living.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We long for light but sink into darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: long for brightness but stumble through the night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like the blind, we inch along a wall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: groping eyeless in the dark.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We shuffle our way in broad daylight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the dead, but somehow walking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re no better off than bears, groaning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no worse off than doves, moaning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We look for justice—not a sign of it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for salvation—not so much as a hint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15a
  - type: text
    text: ' Our wrongdoings pile up before you, God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: our sins stand up and accuse us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our wrongdoings stare us down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'we know in detail what we’ve done:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mocking and denying '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: not following our God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spreading false rumors, whipping up revolt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pregnant with lies, muttering malice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Justice is beaten back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Righteousness is banished to the sidelines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Truth staggers down the street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Honesty is nowhere to be found,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Good is missing in action.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Anyone renouncing evil is beaten and robbed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-19
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' looked and saw evil looming on the horizon—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so much evil and no sign of Justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He couldn’t believe what he saw:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a soul around to correct this awful situation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he did it himself, took on the work of Salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fueled by his own Righteousness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He dressed in Righteousness, put it on like a suit of armor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with Salvation on his head like a helmet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put on Judgment like an overcoat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and threw a cloak of Passion across his shoulders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He’ll make everyone pay for what they’ve done:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: fury for his foes, just deserts for his enemies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even the far-off islands will get paid off in full.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the west they’ll fear the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'in the east they’ll fear the glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he’ll arrive like a river in flood stage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'whipped to a torrent by the wind of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I’ll arrive in Zion as Redeemer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those in Jacob who leave their sins.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“As for me,” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, “this is my covenant with them: My Spirit that I’ve placed upon you and the words that I’ve given you to speak, they’re not going to leave your mouths nor the mouths of your children nor the mouths of your grandchildren. You will keep repeating these words and won’t ever stop.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s orders.
