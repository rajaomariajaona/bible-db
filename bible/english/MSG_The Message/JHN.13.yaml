      text: Washing His Disciples’ Feet
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Just before the Passover Feast, Jesus knew that the time had come to leave this world to go to the Father. Having loved his dear companions, he continued to love them right to the end. It was suppertime. The Devil by now had Judas, son of Simon the Iscariot, firmly in his grip, all set for the betrayal.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said, “If you’ve had a bath in the morning, you only need your feet washed now and you’re clean from head to toe. My concern, you understand, is holiness, not hygiene. So now you’re clean. But not every one of you.” (He knew who was betraying him. That’s why he said, “Not every one of you.”) After he had finished washing their feet, he took his robe, put it back on, and went back to his place at the table.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he said, “Do you understand what I have done to you? You address me as ‘Teacher’ and ‘Master,’ and rightly so. That is what I am. So if I, the Master and Teacher, washed your feet, you must now wash each other’s feet. I’ve laid down a pattern for you. What I’ve done, you do. I’m only pointing out the obvious. A servant is not ranked above his master; an employee doesn’t give orders to the employer. If you understand what I’m telling you, act like it—and live a blessed life.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The One Who Ate Bread at My Table
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“I’m not including all of you in this. I know precisely whom I’ve selected, so as not to interfere with the fulfillment of this Scripture:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one who ate bread at my table
  - type: usfm
    marker: p
    children:
    - type: text
      text: Will stab me in the back.
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“I’m telling you all this ahead of time so that when it happens you will believe that I am who I say I am. Make sure you get this right: Receiving someone I send is the same as receiving me, just as receiving me is the same as receiving the One who sent me.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he said these things, Jesus became visibly upset, and then he told them why. “One of you is going to betray me.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples looked around at one another, wondering who on earth he was talking about. One of the disciples, the one Jesus loved dearly, was reclining against him, his head on his shoulder. Peter motioned to him to ask who Jesus might be talking about. So, being the closest, he said, “Master, who?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “The one to whom I give this crust of bread after I’ve dipped it.” Then he dipped the crust and gave it to Judas, son of Simon the Iscariot. As soon as the bread was in his hand, Satan entered him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What you must do,” said Jesus, “do. Do it and get it over with.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one around the supper table knew why he said this to him. Some thought that since Judas was their treasurer, Jesus was telling him to buy what they needed for the Feast, or that he should give something to the poor.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus knew that the Father had put him in complete charge of everything, that he came from God and was on his way back to God. So he got up from the supper table, set aside his robe, and put on an apron. Then he poured water into a basin and began to wash the feet of the disciples, drying them with his apron. When he got to Simon Peter, Peter said, “Master, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' wash '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' feet?”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judas, with the piece of bread, left. It was night.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Command
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When he had left, Jesus said, “Now the Son of Man is seen for who he is, and God seen for who he is in him. The moment God is seen in him, God’s glory will be on display. In glorifying him, he himself is glorified—glory all around!
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Children, I am with you for only a short time longer. You are going to look high and low for me. But just as I told the Jews, I’m telling you: ‘Where I go, you are not able to come.’'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Let me give you a new command: Love one another. In the same way I loved you, you love one another. This is how everyone will recognize that you are my disciples—when they see the love you have for each other.”'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon Peter asked, “Master, just where are you going?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus answered, “You can’t now follow me where I’m going. You will follow later.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Master,” said Peter, “why can’t I follow now? I’ll lay down my life for you!”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Really? You’ll lay down your life for me? The truth is that before the rooster crows, you’ll deny me three times.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus answered, “You don’t understand now what I’m doing, but it will be clear enough to you later.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter persisted, “You’re not going to wash my feet—ever!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “If I don’t wash you, you can’t be part of what I’m doing.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Master!” said Peter. “Not only my feet, then. Wash my hands! Wash my head!”
