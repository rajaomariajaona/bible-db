document_id: JHN.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: True Blindness
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Walking down the street, Jesus saw a man blind from birth. His disciples asked, “Rabbi, who sinned: this man or his parents, causing him to be born blind?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: Jesus said, “You’re asking the wrong question. You’re looking for someone to blame. There is no such cause-effect here. Look instead for what God can do. We need to be energetically at work for the One who sent me here, working while the sun shines. When night falls, the workday is over. For as long as I am in the world, there is plenty of light. I am the world’s Light.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: He said this and then spit in the dust, made a clay paste with the saliva, rubbed the paste on the blind man’s eyes, and said, “Go, wash at the Pool of Siloam” (Siloam means “Sent”). The man went and washed—and saw.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Soon the town was buzzing. His relatives and those who year after year had seen him as a blind man begging were saying, “Why, isn’t this the man we knew, who sat here and begged?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Others said, “It’s him all right!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But others objected, “It’s not the same man at all. It just looks like him.”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “It’s me, the very one.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They said, “How did your eyes get opened?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “A man named Jesus made a paste and rubbed it on my eyes and told me, ‘Go to Siloam and wash.’ I did what he said. When I washed, I saw.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “So where is he?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I don’t know.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: They marched the man to the Pharisees. This day when Jesus made the paste and healed his blindness was the Sabbath. The Pharisees grilled him again on how he had come to see. He said, “He put a clay paste on my eyes, and I washed, and now I see.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Some of the Pharisees said, “Obviously, this man can’t be from God. He doesn’t keep the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Others countered, “How can a bad man do miraculous, God-revealing things like this?” There was a split in their ranks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They came back at the blind man, “You’re the expert. He opened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' eyes. What do you say about him?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “He is a prophet.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: The Jews didn’t believe it, didn’t believe the man was blind to begin with. So they called the parents of the man now bright-eyed with sight. They asked them, “Is this your son, the one you say was born blind? So how is it that he now sees?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: His parents said, “We know he is our son, and we know he was born blind. But we don’t know how he came to see—haven’t a clue about who opened his eyes. Why don’t you ask him? He’s a grown man and can speak for himself.” (His parents were talking like this because they were intimidated by the Jewish leaders, who had already decided that anyone who took a stand that this was the Messiah would be kicked out of the meeting place. That’s why his parents said, “Ask him. He’s a grown man.”)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They called the man back a second time—the man who had been blind—and told him, “Give credit to God. We know this man is an impostor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He replied, “I know nothing about that one way or the other. But I know one thing for sure: I was blind . . . I now see.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They said, “What did he do to you? How did he open your eyes?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I’ve told you over and over and you haven’t listened. Why do you want to hear it again? Are you so eager to become his disciples?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: With that they jumped all over him. “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' might be a disciple of that man, but we’re disciples of Moses. We know for sure that God spoke to Moses, but we have no idea where this man even comes from.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-33
  - type: text
    text: The man replied, “This is amazing! You claim to know nothing about him, but the fact is, he opened my eyes! It’s well known that God isn’t at the beck and call of sinners, but listens carefully to anyone who lives in reverence and does his will. That someone opened the eyes of a man born blind has never been heard of—ever. If this man didn’t come from God, he wouldn’t be able to do anything.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: They said, “You’re nothing but dirt! How dare you take that tone with us!” Then they threw him out in the street.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jesus heard that they had thrown him out, and went and found him. He asked him, “Do you believe in the Son of Man?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The man said, “Point him out to me, sir, so that I can believe in him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Jesus said, “You’re looking right at him. Don’t you recognize my voice?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “Master, I believe,” the man said, and worshiped him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Jesus then said, “I came into the world to bring everything into the clear light of day, making all the distinctions clear, so that those who have never seen will see, and those who have made a great pretense of seeing will be exposed as blind.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Some Pharisees overheard him and said, “Does that mean you’re calling us blind?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Jesus said, “If you were really blind, you would be blameless, but since you claim to see everything so well, you’re accountable for every fault and failure.”
