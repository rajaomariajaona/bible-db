document_id: PRO.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Whack on the Head of a Fool
  - type: text
    content: A meal of bread and water in contented peace
  - type: text
    content: is better than a banquet spiced with quarrels.
  '10':
  - type: text
    content: A quiet rebuke to a person of good sense
  - type: text
    content: does more than a whack on the head of a fool.
  '11':
  - type: text
    content: Criminals out looking for nothing but trouble
  - type: text
    content: won’t have to wait long—they’ll meet it coming and going!
  '12':
  - type: text
    content: Better to meet a grizzly robbed of her cubs
  - type: text
    content: than a fool hellbent on folly.
  '13':
  - type: text
    content: Those who return evil for good
  - type: text
    content: will meet their own evil returning.
  '14':
  - type: text
    content: The start of a quarrel is like a leak in a dam,
  - type: text
    content: so stop it before it bursts.
  '15':
  - type: text
    content: Whitewashing bad people and throwing mud on good people
  - type: text
    content: 'are equally abhorrent to '
  - type: text
    content: God
  - type: text
    content: .
  '16':
  - type: text
    content: What’s this? Fools out shopping for wisdom!
  - type: text
    content: They wouldn’t recognize it if they saw it!
  - type: heading
    content: One Who Knows Much Says Little
  '17':
  - type: text
    content: Friends love through all kinds of weather,
  - type: text
    content: and families stick together in all kinds of trouble.
  '18':
  - type: text
    content: It’s stupid to try to get something for nothing,
  - type: text
    content: or run up huge bills you can never pay.
  '19':
  - type: text
    content: The person who courts sin marries trouble;
  - type: text
    content: build a wall, invite a burglar.
  '2':
  - type: text
    content: A wise servant takes charge of an unruly child
  - type: text
    content: and is honored as one of the family.
  '20':
  - type: text
    content: A bad motive can’t achieve a good end;
  - type: text
    content: double-talk brings you double trouble.
  '21':
  - type: text
    content: Having a fool for a child is misery;
  - type: text
    content: it’s no fun being the parent of a dolt.
  '22':
  - type: text
    content: A cheerful disposition is good for your health;
  - type: text
    content: gloom and doom leave you bone-tired.
  '23':
  - type: text
    content: The wicked take bribes under the table;
  - type: text
    content: they show nothing but contempt for justice.
  '24':
  - type: text
    content: The perceptive find wisdom in their own front yard;
  - type: text
    content: fools look for it everywhere but right here.
  '25':
  - type: text
    content: A surly, stupid child is sheer pain to a father,
  - type: text
    content: a bitter pill for a mother to swallow.
  '26':
  - type: text
    content: It’s wrong to penalize good behavior,
  - type: text
    content: or make good citizens pay for the crimes of others.
  '27':
  - type: text
    content: The one who knows much says little;
  - type: text
    content: an understanding person remains calm.
  '28':
  - type: text
    content: Even dunces who keep quiet are thought to be wise;
  - type: text
    content: as long as they keep their mouths shut, they’re smart.
  '3':
  - type: text
    content: As silver in a crucible and gold in a pan,
  - type: text
    content: 'so our lives are refined by '
  - type: text
    content: God
  - type: text
    content: .
  '4':
  - type: text
    content: Evil people relish malicious conversation;
  - type: text
    content: the ears of liars itch for dirty gossip.
  '5':
  - type: text
    content: Whoever mocks poor people insults their Creator;
  - type: text
    content: gloating over misfortune is a punishable crime.
  '6':
  - type: text
    content: Old people are distinguished by grandchildren;
  - type: text
    content: children take pride in their parents.
  '7':
  - type: text
    content: We don’t expect eloquence from fools,
  - type: text
    content: nor do we expect lies from our leaders.
  '8':
  - type: text
    content: Receiving a gift is like getting a rare gemstone;
  - type: text
    content: any way you look at it, you see beauty refracted.
  '9':
  - type: text
    content: Overlook an offense and bond a friendship;
  - type: text
    content: fasten on to a slight and—good-bye, friend!
