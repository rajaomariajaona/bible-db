document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Whack on the Head of a Fool
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A meal of bread and water in contented peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: is better than a banquet spiced with quarrels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A wise servant takes charge of an unruly child
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is honored as one of the family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As silver in a crucible and gold in a pan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so our lives are refined by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Evil people relish malicious conversation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ears of liars itch for dirty gossip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Whoever mocks poor people insults their Creator;
- type: usfm
  marker: q2
  children:
  - type: text
    text: gloating over misfortune is a punishable crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Old people are distinguished by grandchildren;
- type: usfm
  marker: q2
  children:
  - type: text
    text: children take pride in their parents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: We don’t expect eloquence from fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor do we expect lies from our leaders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Receiving a gift is like getting a rare gemstone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: any way you look at it, you see beauty refracted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Overlook an offense and bond a friendship;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fasten on to a slight and—good-bye, friend!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A quiet rebuke to a person of good sense
- type: usfm
  marker: q2
  children:
  - type: text
    text: does more than a whack on the head of a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Criminals out looking for nothing but trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t have to wait long—they’ll meet it coming and going!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Better to meet a grizzly robbed of her cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a fool hellbent on folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Those who return evil for good
- type: usfm
  marker: q2
  children:
  - type: text
    text: will meet their own evil returning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The start of a quarrel is like a leak in a dam,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so stop it before it bursts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Whitewashing bad people and throwing mud on good people
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are equally abhorrent to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: What’s this? Fools out shopping for wisdom!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They wouldn’t recognize it if they saw it!
- type: usfm
  marker: s1
  children:
  - type: text
    text: One Who Knows Much Says Little
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Friends love through all kinds of weather,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and families stick together in all kinds of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It’s stupid to try to get something for nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or run up huge bills you can never pay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The person who courts sin marries trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: build a wall, invite a burglar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A bad motive can’t achieve a good end;
- type: usfm
  marker: q2
  children:
  - type: text
    text: double-talk brings you double trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Having a fool for a child is misery;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s no fun being the parent of a dolt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A cheerful disposition is good for your health;
- type: usfm
  marker: q2
  children:
  - type: text
    text: gloom and doom leave you bone-tired.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The wicked take bribes under the table;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they show nothing but contempt for justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The perceptive find wisdom in their own front yard;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools look for it everywhere but right here.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A surly, stupid child is sheer pain to a father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bitter pill for a mother to swallow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It’s wrong to penalize good behavior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or make good citizens pay for the crimes of others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The one who knows much says little;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an understanding person remains calm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Even dunces who keep quiet are thought to be wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: as long as they keep their mouths shut, they’re smart.
