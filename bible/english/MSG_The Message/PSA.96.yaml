  - type: text
    content: Get out the message—
  - type: text
    content: God
  - type: text
    content: ' Rules!'
  - type: text
    content: He put the world on a firm foundation;
  - type: text
    content: He treats everyone fair and square.
  '11':
  - type: text
    content: Let’s hear it from Sky,
  - type: text
    content: With Earth joining in,
  - type: text
    content: And a huge round of applause from Sea.
  '12':
  - type: text
    content: Let Wilderness turn cartwheels,
  - type: text
    content: Animals, come dance,
  - type: text
    content: Put every tree of the forest in the choir—
  '13':
  - type: text
    content: 'An extravaganza before '
  - type: text
    content: 'God '
  - type: text
    content: as he comes,
  - type: text
    content: As he comes to set everything right on earth,
  - type: text
    content: Set everything right, treat everyone fair.
  '2':
  - type: text
    content: ' Shout the news of his victory from sea to sea,'
  - type: text
    content: Take the news of his glory to the lost,
  - type: text
    content: News of his wonders to one and all!
  '4':
  - type: text
    content: ' For '
  - type: text
    content: God
  - type: text
    content: ' is great, and worth a thousand Hallelujahs.'
  - type: text
    content: His furious beauty puts the other gods to shame;
  - type: text
    content: Pagan gods are mere tatters and rags.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' made the heavens—'
  - type: text
    content: Royal splendor radiates from him,
  - type: text
    content: A powerful beauty sets him apart.
  '7':
  - type: text
    content: 'Bravo, '
  - type: text
