  marker: q1
  children:
  - type: text
    text: 'Bow before the beauty of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then to your knees—everyone worship!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Get out the message—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Rules!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He put the world on a firm foundation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He treats everyone fair and square.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let’s hear it from Sky,
