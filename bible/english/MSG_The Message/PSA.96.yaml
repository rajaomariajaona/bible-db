    - type: text
      text: 4-5a
  - type: text
    text: ' For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is great, and worth a thousand Hallelujahs.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His furious beauty puts the other gods to shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pagan gods are mere tatters and rags.
- type: usfm
  marker: q1
  children:
  - type: usfm
