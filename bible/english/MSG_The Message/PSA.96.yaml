    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made the heavens—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Royal splendor radiates from him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A powerful beauty sets him apart.
- type: usfm
  marker: q1
  children:
  - type: usfm
