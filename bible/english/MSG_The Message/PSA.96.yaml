  - type: text
    text: ', Bravo!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Everyone join in the great shout: Encore!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In awe before the beauty, in awe before the might.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
