document_id: ISA.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Safe Houses, Quiet Gardens
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-8
  - type: text
    text: But look! A king will rule in the right way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his leaders will carry out justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each one will stand as a shelter from high winds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: provide safe cover in stormy weather.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each will be cool running water in parched land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a huge granite outcrop giving shade in the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anyone who looks will see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: anyone who listens will hear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The impulsive will make sound decisions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tongue-tied will speak with eloquence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more will fools become celebrities,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor crooks be rewarded with fame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For fools are fools and that’s that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thinking up new ways to do mischief.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They leave a wake of wrecked lives
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and lies about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turning their backs on the homeless hungry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ignoring those dying of thirst in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the crooks? Underhanded sneaks they are,
- type: usfm
  marker: q2
  children:
  - type: text
    text: inventive in sin and scandal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exploiting the poor with scams and lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: unmoved by the victimized poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But those who are noble make noble plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stand for what is noble.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-14
  - type: text
    text: Take your stand, idle women!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indulgent, idle women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen closely to what I have to say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In just a little over a year from now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be shaken out of your lazy lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The grape harvest will fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there’ll be no fruit on the trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh tremble, you idle women.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get serious, you pampered dolls!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strip down and discard your silk fineries.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put on funeral clothes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shed honest tears for the lost harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the failed vintage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep for my people’s gardens and farms
- type: usfm
  marker: q2
  children:
  - type: text
    text: that grow nothing but thistles and thornbushes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cry tears, real tears, for the happy homes no longer happy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the merry city no longer merry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The royal palace is deserted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bustling city quiet as a morgue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The emptied parks and playgrounds
- type: usfm
  marker: q2
  children:
  - type: text
    text: taken over by wild animals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: delighted with their new home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-20
  - type: text
    text: Yes, weep and grieve until the Spirit is poured
- type: usfm
  marker: q2
  children:
  - type: text
    text: down on us from above
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the badlands desert grows crops
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fertile fields become forests.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Justice will move into the badlands desert.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Right will build a home in the fertile field.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where there’s Right, there’ll be Peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the progeny of Right: quiet lives and endless trust.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people will live in a peaceful neighborhood—
- type: usfm
  marker: q2
  children:
  - type: text
    text: in safe houses, in quiet gardens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The forest of your pride will be clear-cut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city showing off your power leveled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you will enjoy a fortunate life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: planting well-watered fields and gardens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your farm animals grazing freely.
