document_id: ISA.32,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Safe Houses, Quiet Gardens
  - type: text
    content: But look! A king will rule in the right way,
  - type: text
    content: and his leaders will carry out justice.
  - type: text
    content: Each one will stand as a shelter from high winds,
  - type: text
    content: provide safe cover in stormy weather.
  - type: text
    content: Each will be cool running water in parched land,
  - type: text
    content: a huge granite outcrop giving shade in the desert.
  - type: text
    content: Anyone who looks will see,
  - type: text
    content: anyone who listens will hear.
  - type: text
    content: The impulsive will make sound decisions,
  - type: text
    content: the tongue-tied will speak with eloquence.
  - type: text
    content: No more will fools become celebrities,
  - type: text
    content: nor crooks be rewarded with fame.
  - type: text
    content: For fools are fools and that’s that,
  - type: text
    content: thinking up new ways to do mischief.
  - type: text
    content: They leave a wake of wrecked lives
  - type: text
    content: 'and lies about '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Turning their backs on the homeless hungry,
  - type: text
    content: ignoring those dying of thirst in the streets.
  - type: text
    content: And the crooks? Underhanded sneaks they are,
  - type: text
    content: inventive in sin and scandal,
  - type: text
    content: Exploiting the poor with scams and lies,
  - type: text
    content: unmoved by the victimized poor.
  - type: text
    content: But those who are noble make noble plans,
  - type: text
    content: and stand for what is noble.
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: Yes, weep and grieve until the Spirit is poured
  - type: text
    content: down on us from above
  - type: text
    content: And the badlands desert grows crops
  - type: text
    content: and the fertile fields become forests.
  - type: text
    content: Justice will move into the badlands desert.
  - type: text
    content: Right will build a home in the fertile field.
  - type: text
    content: And where there’s Right, there’ll be Peace
  - type: text
    content: 'and the progeny of Right: quiet lives and endless trust.'
  - type: text
    content: My people will live in a peaceful neighborhood—
  - type: text
    content: in safe houses, in quiet gardens.
  - type: text
    content: The forest of your pride will be clear-cut,
  - type: text
    content: the city showing off your power leveled.
  - type: text
    content: But you will enjoy a fortunate life,
  - type: text
    content: planting well-watered fields and gardens,
  - type: text
    content: with your farm animals grazing freely.
  '9':
  - type: text
    content: Take your stand, idle women!
  - type: text
    content: Listen to me!
  - type: text
    content: Indulgent, idle women,
  - type: text
    content: listen closely to what I have to say.
  - type: text
    content: In just a little over a year from now,
  - type: text
    content: you’ll be shaken out of your lazy lives.
  - type: text
    content: The grape harvest will fail,
  - type: text
    content: and there’ll be no fruit on the trees.
  - type: text
    content: Oh tremble, you idle women.
  - type: text
    content: Get serious, you pampered dolls!
  - type: text
    content: Strip down and discard your silk fineries.
  - type: text
    content: Put on funeral clothes.
  - type: text
    content: Shed honest tears for the lost harvest,
  - type: text
    content: the failed vintage.
  - type: text
    content: Weep for my people’s gardens and farms
  - type: text
    content: that grow nothing but thistles and thornbushes.
  - type: text
    content: Cry tears, real tears, for the happy homes no longer happy,
  - type: text
    content: the merry city no longer merry.
  - type: text
    content: The royal palace is deserted,
  - type: text
    content: the bustling city quiet as a morgue,
  - type: text
    content: The emptied parks and playgrounds
  - type: text
    content: taken over by wild animals,
  - type: text
    content: delighted with their new home.
