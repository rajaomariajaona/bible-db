document_id: ISA.39,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: There Will Be Nothing Left
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Sometime later, King Merodach-baladan son of Baladan of Babylon sent messengers with greetings and a gift to Hezekiah. He had heard that Hezekiah had been sick and was now well.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah received the messengers warmly. He took them on a tour of his royal precincts, proudly showing them all his treasures: silver, gold, spices, expensive oils, all his weapons—everything out on display. There was nothing in his house or kingdom that Hezekiah didn’t show them.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later the prophet Isaiah showed up. He asked Hezekiah, “What were these men up to? What did they say? And where did they come from?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hezekiah said, “They came from a long way off, from Babylon.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And what did they see in your palace?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Everything,” said Hezekiah. “I showed them the works, opened all the doors and impressed them with it all.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Isaiah said to Hezekiah, “Now listen to this Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies: I have to warn you, the time is coming when everything in this palace, along with everything your ancestors accumulated before you, will be hauled off to Babylon. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says that there will be nothing left. Nothing. And not only your things but your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sons
    - type: text
      text: . Some of your sons will be taken into exile, ending up as eunuchs in the palace of the king of Babylon.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah replied to Isaiah, “Good. If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so, it’s good.” Within himself he was thinking, “But surely nothing bad will happen in my lifetime. I’ll enjoy peace and stability as long as I live.”'
