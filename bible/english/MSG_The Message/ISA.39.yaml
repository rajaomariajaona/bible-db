document_id: ISA.39,97
type_code: eng
verses:
  '1':
  - type: heading
    content: There Will Be Nothing Left
  - type: text
    content: Sometime later, King Merodach-baladan son of Baladan of Babylon sent messengers with greetings and a gift to Hezekiah. He had heard that Hezekiah had been sick and was now well.
  '2':
  - type: text
    content: 'Hezekiah received the messengers warmly. He took them on a tour of his royal precincts, proudly showing them all his treasures: silver, gold, spices, expensive oils, all his weapons—everything out on display. There was nothing in his house or kingdom that Hezekiah didn’t show them.'
  '3':
  - type: text
    content: Later the prophet Isaiah showed up. He asked Hezekiah, “What were these men up to? What did they say? And where did they come from?”
  - type: text
    content: Hezekiah said, “They came from a long way off, from Babylon.”
  '4':
  - type: text
    content: “And what did they see in your palace?”
  - type: text
    content: “Everything,” said Hezekiah. “I showed them the works, opened all the doors and impressed them with it all.”
  '5':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Now listen to this Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies: I have to warn you, the time is coming when everything in this palace, along with everything your ancestors accumulated before you, will be hauled off to Babylon. '
  - type: text
    content: God
  - type: text
    content: ' says that there will be nothing left. Nothing. And not only your things but your '
  - type: text
    content: sons
  - type: text
    content: . Some of your sons will be taken into exile, ending up as eunuchs in the palace of the king of Babylon.”
  '8':
  - type: text
    content: 'Hezekiah replied to Isaiah, “Good. If '
  - type: text
    content: God
  - type: text
    content: ' says so, it’s good.” Within himself he was thinking, “But surely nothing bad will happen in my lifetime. I’ll enjoy peace and stability as long as I live.”'
