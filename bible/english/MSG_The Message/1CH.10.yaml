    children:
    - type: text
      text: 1-5
  - type: text
    text: The Philistines went to war against Israel; the Israelites ran for their lives from the Philistines but fell, slaughtered on Mount Gilboa. The Philistines zeroed in on Saul and his sons and killed his sons Jonathan, Abinadab, and Malki-Shua. The battle went hard against Saul—the archers found him and wounded him. Saul said to his armor bearer, “Draw your sword and finish me off before these pagan pigs get to me and make a sport of my body.” But his armor bearer, restrained by both reverence and fear, wouldn’t do it. So Saul took his own sword and killed himself. The armor bearer, panicked because Saul was dead, then killed himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: So Saul and his three sons—all four the same day—died. When all the Israelites in the valley saw that the army had fled and that Saul and his sons were dead, they abandoned their cities and ran off; the Philistines came and moved in.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: The next day the Philistines came to plunder the dead bodies and found Saul and his sons dead on Mount Gilboa. They stripped Saul, removed his head and his armor, and put them on exhibit throughout Philistia, reporting the victory news to their idols and the people. Then they put Saul’s armor on display in the temple of their gods and placed his skull as a trophy in the temple of their god Dagon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: The people of Jabesh Gilead heard what the Philistines had done to Saul. All of their fighting men went into action—retrieved the bodies of Saul and his sons and brought them to Jabesh, gave them a dignified burial under the oak at Jabesh, and mourned their deaths for seven days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Saul died in disobedience, disobedient to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. He didn’t obey '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s words. Instead of praying, he went to a witch to seek guidance. Because he didn’t go to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for help, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' took his life and turned the kingdom over to David son of Jesse.'
