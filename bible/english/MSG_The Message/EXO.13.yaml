document_id: EXO.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses, saying, “Set apart every firstborn to me—the first one to come from the womb among the Israelites, whether person or animal, is mine.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13a
    - type: text
      text: ' “When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brings you into the land of the Canaanites, as he promised you and your fathers, and turns it over to you, you are to set aside the first birth out of every womb to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Every first birth from your livestock belongs to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . You can redeem every first birth of a donkey if you want to by substituting a lamb; if you decide not to redeem it, you must break its neck.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13b-16
    - type: text
      text: ' “Redeem every firstborn child among your sons. When the time comes and your son asks you, ‘What does this mean?’ you tell him, ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought us out of Egypt, out of a house of slavery, with a powerful hand. When Pharaoh stubbornly refused to let us go, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' killed every firstborn in Egypt, the firstborn of both humans and animals. That’s why I make a sacrifice for every first male birth from the womb to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and redeem every firstborn son.’ The observance functions like a sign on your hands or a symbol on the middle of your forehead: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought us out of Egypt with a powerful hand.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: It so happened that after Pharaoh released the people, God didn’t lead them by the road through the land of the Philistines, which was the shortest route, for God thought, “If the people encounter war, they’ll change their minds and go back to Egypt.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So God led the people on the wilderness road, looping around to the Red Sea. The Israelites left Egypt in military formation.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moses took the bones of Joseph with him, for Joseph had made the Israelites solemnly swear to do it, saying, “God will surely hold you accountable, so make sure you bring my bones from here with you.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: 'They moved on from Succoth and then camped at Etham at the edge of the wilderness. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' went ahead of them in a Pillar of Cloud during the day to guide them on the way, and at night in a Pillar of Fire to give them light; thus they could travel both day and night. The Pillar of Cloud by day and the Pillar of Fire by night never left the people.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Moses said to the people, “Always remember this day. This is the day when you came out of Egypt from a house of slavery. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought you out of here with a powerful hand. Don’t eat any raised bread.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: '“You are leaving in the spring month of Abib. When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brings you into the land of the Canaanite, the Hittite, the Amorite, the Hivite, and the Jebusite, which he promised to your fathers to give you, a land lavish with milk and honey, you are to observe this service during this month:'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“You are to eat unraised bread for seven days; on the seventh day there is a festival celebration to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Only unraised bread is to be eaten for seven days. There is not to be a trace of anything fermented—no yeast anywhere.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Tell your child on that day: ‘This is because of what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' did for me when I came out of Egypt.’'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: '“The day of observance will be like a sign on your hand, a memorial between your eyes, and the teaching of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in your mouth. It was with a powerful hand that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought you out of Egypt. Follow these instructions at the set time, year after year after year.'
