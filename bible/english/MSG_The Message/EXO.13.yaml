document_id: EXO.13,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses, saying, “Set apart every firstborn to me—the first one to come from the womb among the Israelites, whether person or animal, is mine.”'
  '11':
  - type: text
    content: ' “When '
  - type: text
    content: God
  - type: text
    content: ' brings you into the land of the Canaanites, as he promised you and your fathers, and turns it over to you, you are to set aside the first birth out of every womb to '
  - type: text
    content: God
  - type: text
    content: '. Every first birth from your livestock belongs to '
  - type: text
    content: God
  - type: text
    content: . You can redeem every first birth of a donkey if you want to by substituting a lamb; if you decide not to redeem it, you must break its neck.
  '13':
  - type: text
    content: ' “Redeem every firstborn child among your sons. When the time comes and your son asks you, ‘What does this mean?’ you tell him, ‘'
  - type: text
    content: God
  - type: text
    content: ' brought us out of Egypt, out of a house of slavery, with a powerful hand. When Pharaoh stubbornly refused to let us go, '
  - type: text
    content: God
  - type: text
    content: ' killed every firstborn in Egypt, the firstborn of both humans and animals. That’s why I make a sacrifice for every first male birth from the womb to '
  - type: text
    content: God
  - type: text
    content: ' and redeem every firstborn son.’ The observance functions like a sign on your hands or a symbol on the middle of your forehead: '
  - type: text
    content: God
  - type: text
    content: ' brought us out of Egypt with a powerful hand.”'
  '17':
  - type: text
    content: It so happened that after Pharaoh released the people, God didn’t lead them by the road through the land of the Philistines, which was the shortest route, for God thought, “If the people encounter war, they’ll change their minds and go back to Egypt.”
  '18':
  - type: text
    content: So God led the people on the wilderness road, looping around to the Red Sea. The Israelites left Egypt in military formation.
  '19':
  - type: text
    content: Moses took the bones of Joseph with him, for Joseph had made the Israelites solemnly swear to do it, saying, “God will surely hold you accountable, so make sure you bring my bones from here with you.”
  '20':
  - type: text
    content: 'They moved on from Succoth and then camped at Etham at the edge of the wilderness. '
  - type: text
    content: God
  - type: text
    content: ' went ahead of them in a Pillar of Cloud during the day to guide them on the way, and at night in a Pillar of Fire to give them light; thus they could travel both day and night. The Pillar of Cloud by day and the Pillar of Fire by night never left the people.'
  '3':
  - type: text
    content: 'Moses said to the people, “Always remember this day. This is the day when you came out of Egypt from a house of slavery. '
  - type: text
    content: God
  - type: text
    content: ' brought you out of here with a powerful hand. Don’t eat any raised bread.'
  '4':
  - type: text
    content: '“You are leaving in the spring month of Abib. When '
  - type: text
    content: God
  - type: text
    content: ' brings you into the land of the Canaanite, the Hittite, the Amorite, the Hivite, and the Jebusite, which he promised to your fathers to give you, a land lavish with milk and honey, you are to observe this service during this month:'
  '6':
  - type: text
    content: '“You are to eat unraised bread for seven days; on the seventh day there is a festival celebration to '
  - type: text
    content: God
  - type: text
    content: .
  '7':
  - type: text
    content: “Only unraised bread is to be eaten for seven days. There is not to be a trace of anything fermented—no yeast anywhere.
  '8':
  - type: text
    content: '“Tell your child on that day: ‘This is because of what '
  - type: text
    content: God
  - type: text
    content: ' did for me when I came out of Egypt.’'
  '9':
  - type: text
    content: '“The day of observance will be like a sign on your hand, a memorial between your eyes, and the teaching of '
  - type: text
    content: God
  - type: text
    content: ' in your mouth. It was with a powerful hand that '
  - type: text
    content: God
  - type: text
    content: ' brought you out of Egypt. Follow these instructions at the set time, year after year after year.'
