document_id: JOS.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Five Kings
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'It wasn’t long before My-Master-Zedek king of Jerusalem heard that Joshua had taken Ai and destroyed it and its king under a holy curse, just as he had done to Jericho and its king. He also learned that the people of Gibeon had come to terms with Israel and were living as neighbors. He and his people were alarmed: Gibeon was a big city—as big as any with a king and bigger than Ai—and all its men were seasoned fighters.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13a
    - type: text
      text: ' The day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave the Amorites up to Israel, Joshua spoke to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', with all Israel listening:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop, Sun, over Gibeon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halt, Moon, over Aijalon Valley.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Sun stopped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moon stood stock still
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until he defeated his enemies.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13b-14
    - type: text
      text: ' (You can find this written in the Book of Jashar.) The sun stopped in its tracks in mid sky; just sat there all day. There’s never been a day like that before or since—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' took orders from a human voice! Truly, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' fought for Israel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then Joshua returned, all Israel with him, to the camp at Gilgal.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Meanwhile the five kings had hidden in the cave at Makkedah. Joshua was told, “The five kings have been found, hidden in the cave at Makkedah.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'Joshua said, “Roll big stones against the mouth of the cave and post guards to keep watch. But don’t you hang around—go after your enemies. Cut off their retreat. Don’t let them back into their cities. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given them to you.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: Joshua and the People of Israel then finished them off, total devastation. Only a few got away to the fortified towns. The whole army then returned intact to the camp and to Joshua at Makkedah. There was no criticism that day from the People of Israel!
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then Joshua said, “Open the mouth of the cave and bring me those five kings.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'They did it. They brought him the five kings from the cave: the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: When they had them all there in front of Joshua, he called up the army and told the field commanders who had been with him, “Come here. Put your feet on the necks of these kings.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They stepped up and put their feet on their necks.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Joshua told them, “Don’t hold back. Don’t be timid. Be strong! Be confident! This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will do to all your enemies when you fight them.”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: Then Joshua struck and killed the kings. He hung them on five trees where they remained until evening. At sunset Joshua gave the command. They took them down from the trees and threw them into the cave where they had hidden. They put large stones at the mouth of the cave. The kings are still in there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Survivors
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: That same day Joshua captured Makkedah, a massacre that included the king. He carried out the holy curse. No survivors. Makkedah’s king got the same treatment as Jericho’s king.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: 'Joshua, all Israel with him, moved on from Makkedah to Libnah and fought against Libnah. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave Libnah to Israel. They captured city and king and massacred the lot. No survivors. Libnah’s king got the same treatment as Jericho’s king.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Adoni-Zedek king of Jerusalem sent word to Hoham king of Hebron, Piram king of Jarmuth, Japhia king of Lachish, and Debir king of Eglon: “Come and help me. Let’s attack Gibeon; they’ve joined up with Joshua and the People of Israel.”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: 'Joshua, all Israel with him, moved on from Libnah to Lachish. He set up camp nearby and attacked. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave Lachish to Israel. Israel took it in two days and killed everyone. He carried out the holy curse, the same as with Libnah.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Horam, king of Gezer, arrived to help Lachish. Joshua attacked him and his army until there was nothing left of them. No survivors.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: Joshua, all Israel with him, moved on from Lachish to Eglon. They set up camp and attacked. They captured it and killed everyone, carrying out the holy curse, the same as they had done with Lachish.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-37
    - type: text
      text: Joshua, all Israel with him, went up from Eglon to Hebron. He attacked and captured it. They killed everyone, including its king, its villages, and their people. No survivors, the same as with Eglon. They carried out the holy curse on city and people.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-39
    - type: text
      text: Then Joshua, all Israel with him, turned toward Debir and attacked it. He captured it, its king, and its villages. They killed everyone. They put everyone and everything under the holy curse. No survivors. Debir and its king got the same treatment as Hebron and its king, and Libnah and its king.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-42
    - type: text
      text: 'Joshua took the whole country: hills, desert, foothills, and mountain slopes, including all kings. He left no survivors. He carried out the holy curse on everything that breathed, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, had commanded. Joshua’s conquest stretched from Kadesh Barnea to Gaza and from the entire region of Goshen to Gibeon. Joshua took all these kings and their lands in a single campaign because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, fought for Israel.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Then Joshua, all Israel with him, went back to the camp at Gilgal.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So the five Amorite (Western) kings—the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon—combined their armies and set out to attack Gibeon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The men of Gibeon sent word to Joshua camped at Gilgal, “Don’t let us down now! Come up here quickly! Save us! Help us! All the Amorite kings who live up in the hills have ganged up on us.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'So Joshua set out from Gilgal, his whole army with him—all those tough soldiers! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told him, “Don’t give them a second thought. I’ve put them under your thumb—not one of them will stand up to you.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'Joshua marched all night from Gilgal and took them by total surprise. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' threw them into total confusion before Israel, a major victory at Gibeon. Israel chased them along the ridge to Beth Horon and fought them all the way down to Azekah and Makkedah. As they ran from the People of Israel, down from the Beth Horon ridge and all the way to Azekah, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' pitched huge stones on them out of the sky and many died. More died from the hailstones than the People of Israel killed with the sword.'
