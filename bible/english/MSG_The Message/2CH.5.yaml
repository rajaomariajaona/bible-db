document_id: 2CH.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'That completed the work King Solomon did on The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He then brought in the holy offerings of his father David, the silver and the gold and the artifacts. He placed them all in the treasury of God’s Temple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Installing the Chest
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13a
    - type: text
      text: ' The priests then left the Holy Place. All the priests there were consecrated, regardless of rank or assignment; and all the Levites who were musicians were there—Asaph, Heman, Jeduthun, and their families, dressed in their worship robes; the choir and orchestra assembled on the east side of the Altar and were joined by 120 priests blowing trumpets. The choir and trumpets made one voice of praise and thanks to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '—orchestra and choir in perfect harmony singing and playing praise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes! God is good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His loyal love goes on forever!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13b-14
    - type: text
      text: ' Then a billowing cloud filled The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. The priests couldn’t even carry out their duties because of the cloud—the glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!—that filled The Temple of God.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: 'Bringing all this to a climax, Solomon got all the leaders together in Jerusalem—all the chiefs of tribes and the family patriarchs—to move the Chest of the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from Zion and install it in The Temple. All the men of Israel assembled before the king on the feast day of the seventh month, the Feast of Booths.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: When all the leaders of Israel were ready, the Levites took up the Chest. They carried the Chest, the Tent of Meeting, and all the sacred things in the Tent used in worship. The priests, all Levites, carried them. King Solomon and the entire congregation of Israel were there before the Chest, worshiping and sacrificing huge numbers of sheep and cattle—so many that no one could keep track.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: 'The priests brought the Chest of the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to its place in the Inner Sanctuary, the Holy of Holies, under the wings of the cherubim. The outspread wings of the cherubim formed a canopy over the Chest and its poles. The ends of the poles were so long that they stuck out from the entrance of the Inner Sanctuary, but were not noticeable further out—they’re still there today. There was nothing in the Chest itself but the two stone tablets that Moses had placed in it at Horeb where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made a covenant with Israel after bringing them up from Egypt.'
