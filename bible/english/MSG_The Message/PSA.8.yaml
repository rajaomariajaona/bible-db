  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', brilliant Lord,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: yours is a household name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nursing infants gurgle choruses about you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: toddlers shout the songs
- type: usfm
  marker: q1
  children:
  - type: text
    text: That drown out enemy talk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and silence atheist babble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: I look up at your macro-skies, dark and enormous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your handmade sky-jewelry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moon and stars mounted in their settings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then I look at my micro-self and wonder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you bother with us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why take a second look our way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: Yet we’ve so narrowly missed being gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bright with Eden’s dawn light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put us in charge of your handcrafted world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: repeated to us your Genesis-charge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Made us stewards of sheep and cattle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even animals out in the wild,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Birds flying and fish swimming,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whales singing in the ocean deeps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God,
  - type: text
    text: ' brilliant Lord,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your name echoes around the world.
