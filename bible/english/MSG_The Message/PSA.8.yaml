type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', brilliant Lord,'
  - type: text
    content: yours is a household name.
  '2':
  - type: text
    content: Nursing infants gurgle choruses about you;
  - type: text
    content: toddlers shout the songs
  - type: text
    content: That drown out enemy talk,
  - type: text
    content: and silence atheist babble.
  '3':
  - type: text
    content: I look up at your macro-skies, dark and enormous,
  - type: text
    content: your handmade sky-jewelry,
  - type: text
    content: Moon and stars mounted in their settings.
  - type: text
    content: Then I look at my micro-self and wonder,
  - type: text
    content: Why do you bother with us?
  - type: text
    content: Why take a second look our way?
  '5':
  - type: text
    content: Yet we’ve so narrowly missed being gods,
  - type: text
    content: bright with Eden’s dawn light.
  - type: text
    content: You put us in charge of your handcrafted world,
  - type: text
    content: repeated to us your Genesis-charge,
  - type: text
    content: Made us stewards of sheep and cattle,
  - type: text
    content: even animals out in the wild,
  - type: text
    content: Birds flying and fish swimming,
  - type: text
    content: whales singing in the ocean deeps.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God,
  - type: text
    content: ' brilliant Lord,'
  - type: text
    content: your name echoes around the world.
