document_id: PSA.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Clear my name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve kept an honest shop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ve thrown in my lot with you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m not budging.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: You know I’ve been aboveboard with you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now be aboveboard with me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m on the level with you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I bless you every chance I get.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Examine me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', from head to foot,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: order your battery of tests.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make sure I’m fit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inside and out
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So I never lose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sight of your love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But keep in step with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never missing a beat.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: I don’t hang out with tricksters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t pal around with thugs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate that pack of gangsters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t deal with double-dealers.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: I scrub my hands with purest soap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then join hands with the others in the great circle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'dancing around your altar, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Singing God-songs at the top of my lungs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: telling God-stories.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', I love living with you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your house glows with your glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When it’s time for spring cleaning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t sweep me out with the quacks and crooks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men with bags of dirty tricks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: women with purses stuffed with bribe-money.
