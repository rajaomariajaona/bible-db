document_id: PSA.26,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Clear my name, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: I’ve kept an honest shop.
  - type: text
    content: 'I’ve thrown in my lot with you, '
  - type: text
    content: God
  - type: text
    content: ', and'
  - type: text
    content: I’m not budging.
  '11':
  - type: text
    content: You know I’ve been aboveboard with you;
  - type: text
    content: now be aboveboard with me.
  - type: text
    content: 'I’m on the level with you, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: I bless you every chance I get.
  '2':
  - type: text
    content: 'Examine me, '
  - type: text
    content: God
  - type: text
    content: ', from head to foot,'
  - type: text
    content: order your battery of tests.
  - type: text
    content: Make sure I’m fit
  - type: text
    content: inside and out
  '3':
  - type: text
    content: So I never lose
  - type: text
    content: sight of your love,
  - type: text
    content: But keep in step with you,
  - type: text
    content: never missing a beat.
  '4':
  - type: text
    content: I don’t hang out with tricksters,
  - type: text
    content: I don’t pal around with thugs;
  - type: text
    content: I hate that pack of gangsters,
  - type: text
    content: I don’t deal with double-dealers.
  '6':
  - type: text
    content: I scrub my hands with purest soap,
  - type: text
    content: then join hands with the others in the great circle,
  - type: text
    content: 'dancing around your altar, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Singing God-songs at the top of my lungs,
  - type: text
    content: telling God-stories.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', I love living with you;'
  - type: text
    content: your house glows with your glory.
  - type: text
    content: When it’s time for spring cleaning,
  - type: text
    content: don’t sweep me out with the quacks and crooks,
  - type: text
    content: Men with bags of dirty tricks,
  - type: text
    content: women with purses stuffed with bribe-money.
