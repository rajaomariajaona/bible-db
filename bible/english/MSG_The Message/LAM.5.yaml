document_id: LAM.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Give Us a Fresh Start
  - type: text
    content: '“Remember, '
  - type: text
    content: God
  - type: text
    content: ', all we’ve been through.'
  - type: text
    content: Study our plight, the black mark we’ve made in history.
  - type: text
    content: Our precious land has been given to outsiders,
  - type: text
    content: our homes to strangers.
  - type: text
    content: Orphans we are, not a father in sight,
  - type: text
    content: and our mothers no better than widows.
  - type: text
    content: We have to pay to drink our own water.
  - type: text
    content: Even our firewood comes at a price.
  - type: text
    content: We’re nothing but slaves, bullied and bowed,
  - type: text
    content: worn out and without any rest.
  - type: text
    content: We sold ourselves to Assyria and Egypt
  - type: text
    content: just to get something to eat.
  - type: text
    content: Our parents sinned and are no more,
  - type: text
    content: and now we’re paying for the wrongs they did.
  - type: text
    content: Slaves rule over us;
  - type: text
    content: there’s no escape from their grip.
  - type: text
    content: We risk our lives to gather food
  - type: text
    content: in the bandit-infested desert.
  - type: text
    content: Our skin has turned black as an oven,
  - type: text
    content: dried out like old leather from the famine.
  - type: text
    content: Our wives were raped in the streets in Zion,
  - type: text
    content: and our virgins in the cities of Judah.
  - type: text
    content: They hanged our princes by their hands,
  - type: text
    content: dishonored our elders.
  - type: text
    content: Strapping young men were put to women’s work,
  - type: text
    content: mere boys forced to do men’s work.
  - type: text
    content: The city gate is empty of wise elders.
  - type: text
    content: Music from the young is heard no more.
  - type: text
    content: All the joy is gone from our hearts.
  - type: text
    content: Our dances have turned into dirges.
  - type: text
    content: The crown of glory has toppled from our head.
  - type: text
    content: Woe! Woe! Would that we’d never sinned!
  - type: text
    content: Because of all this we’re heartsick;
  - type: text
    content: we can’t see through the tears.
  - type: text
    content: On Mount Zion, wrecked and ruined,
  - type: text
    content: jackals pace and prowl.
  - type: text
    content: 'And yet, '
  - type: text
    content: God
  - type: text
    content: ', you’re sovereign still,'
  - type: text
    content: your throne intact and eternal.
  - type: text
    content: So why do you keep forgetting us?
  - type: text
    content: Why dump us and leave us like this?
  - type: text
    content: 'Bring us back to you, '
  - type: text
    content: God
  - type: text
    content: —we’re ready to come back.
  - type: text
    content: Give us a fresh start.
  - type: text
    content: As it is, you’ve cruelly disowned us.
  - type: text
    content: You’ve been so very angry with us.”
