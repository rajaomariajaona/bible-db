document_id: LAM.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Give Us a Fresh Start
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-22
  - type: text
    text: '“Remember, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', all we’ve been through.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Study our plight, the black mark we’ve made in history.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our precious land has been given to outsiders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our homes to strangers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Orphans we are, not a father in sight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our mothers no better than widows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have to pay to drink our own water.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even our firewood comes at a price.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re nothing but slaves, bullied and bowed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: worn out and without any rest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We sold ourselves to Assyria and Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: just to get something to eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our parents sinned and are no more,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now we’re paying for the wrongs they did.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Slaves rule over us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there’s no escape from their grip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We risk our lives to gather food
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the bandit-infested desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our skin has turned black as an oven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dried out like old leather from the famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our wives were raped in the streets in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our virgins in the cities of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hanged our princes by their hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dishonored our elders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strapping young men were put to women’s work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mere boys forced to do men’s work.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city gate is empty of wise elders.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Music from the young is heard no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the joy is gone from our hearts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our dances have turned into dirges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The crown of glory has toppled from our head.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Woe! Woe! Would that we’d never sinned!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of all this we’re heartsick;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we can’t see through the tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On Mount Zion, wrecked and ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: jackals pace and prowl.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And yet, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you’re sovereign still,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your throne intact and eternal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why do you keep forgetting us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why dump us and leave us like this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Bring us back to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —we’re ready to come back.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give us a fresh start.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As it is, you’ve cruelly disowned us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ve been so very angry with us.”
