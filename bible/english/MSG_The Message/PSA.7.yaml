document_id: PSA.7,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '! God! I am running to you for dear life;'
  - type: text
    content: the chase is wild.
  - type: text
    content: 'If they catch me, I’m finished:'
  - type: text
    content: ripped to shreds by foes fierce as lions,
  - type: text
    content: dragged into the forest and left
  - type: text
    content: unlooked for, unremembered.
  '11':
  - type: text
    content: ' Nobody gets by with anything.'
  - type: text
    content: God is already in action—
  - type: text
    content: Sword honed on his whetstone,
  - type: text
    content: bow strung, arrow on the string,
  - type: text
    content: Lethal weapons in hand,
  - type: text
    content: each arrow a flaming missile.
  '14':
  - type: text
    content: Look at that guy!
  - type: text
    content: He had sex with sin,
  - type: text
    content: he’s pregnant with evil.
  - type: text
    content: Oh, look! He’s having
  - type: text
    content: the baby—a Lie-Baby!
  '15':
  - type: text
    content: See that man shoveling day after day,
  - type: text
    content: digging, then concealing, his man-trap
  - type: text
    content: down that lonely stretch of road?
  - type: text
    content: Go back and look again—you’ll see him in it headfirst,
  - type: text
    content: legs waving in the breeze.
  - type: text
    content: 'That’s what happens:'
  - type: text
    content: mischief backfires;
  - type: text
    content: violence boomerangs.
  '17':
  - type: text
    content: I’m thanking God, who makes things right.
  - type: text
    content: 'I’m singing the fame of heaven-high '
  - type: text
    content: God
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', if I’ve done what they say—'
  - type: text
    content: betrayed my friends,
  - type: text
    content: ripped off my enemies—
  - type: text
    content: If my hands are really that dirty,
  - type: text
    content: let them get me, walk all over me,
  - type: text
    content: leave me flat on my face in the dirt.
  '6':
  - type: text
    content: 'Stand up, '
  - type: text
    content: God
  - type: text
    content: ; pit your holy fury
  - type: text
    content: against my furious enemies.
  - type: text
    content: Wake up, God. My accusers have packed
  - type: text
    content: the courtroom; it’s judgment time.
  - type: text
    content: Take your place on the bench, reach for your gavel,
  - type: text
    content: throw out the false charges against me.
  - type: text
    content: 'I’m ready, confident in your verdict:'
  - type: text
    content: “Innocent.”
  '9':
  - type: text
    content: ' Close the book on Evil, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: but publish your mandate for us.
  - type: text
    content: 'You get us ready for life:'
  - type: text
    content: you probe for our soft spots,
  - type: text
    content: you knock off our rough edges.
  - type: text
    content: 'And I’m feeling so fit, so safe:'
  - type: text
    content: made right, kept right.
  - type: text
    content: God in solemn honor does things right,
  - type: text
    content: but his nerves are sandpapered raw.
