document_id: PSA.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! God! I am running to you for dear life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the chase is wild.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If they catch me, I’m finished:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ripped to shreds by foes fierce as lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dragged into the forest and left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unlooked for, unremembered.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11b-13
    - type: text
      text: ' Nobody gets by with anything.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God is already in action—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sword honed on his whetstone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bow strung, arrow on the string,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lethal weapons in hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each arrow a flaming missile.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Look at that guy!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He had sex with sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s pregnant with evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, look! He’s having
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the baby—a Lie-Baby!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: See that man shoveling day after day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: digging, then concealing, his man-trap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down that lonely stretch of road?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go back and look again—you’ll see him in it headfirst,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: legs waving in the breeze.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That’s what happens:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mischief backfires;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: violence boomerangs.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I’m thanking God, who makes things right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m singing the fame of heaven-high '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', if I’ve done what they say—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: betrayed my friends,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ripped off my enemies—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If my hands are really that dirty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them get me, walk all over me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave me flat on my face in the dirt.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: 'Stand up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ; pit your holy fury
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against my furious enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, God. My accusers have packed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the courtroom; it’s judgment time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take your place on the bench, reach for your gavel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throw out the false charges against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m ready, confident in your verdict:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Innocent.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11a
    - type: text
      text: ' Close the book on Evil, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but publish your mandate for us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You get us ready for life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you probe for our soft spots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you knock off our rough edges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I’m feeling so fit, so safe:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made right, kept right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God in solemn honor does things right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but his nerves are sandpapered raw.
