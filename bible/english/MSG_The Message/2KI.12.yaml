document_id: 2KI.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joash of Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the seventh year of Jehu, Joash began his kingly rule. He was king for forty years in Jerusalem. His mother’s name was Gazelle. She was from Beersheba.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: Around this time Hazael king of Aram ventured out and attacked Gath, and he captured it. Then he decided to try for Jerusalem. Joash king of Judah countered by gathering up all the sacred memorials—gifts dedicated for holy use by his ancestors, the kings of Judah, Jehoshaphat, Jehoram, and Ahaziah, along with the holy memorials he himself had received, plus all the gold that he could find in the temple and palace storerooms—and sent it to Hazael king of Aram. Appeased, Hazael went on his way and didn’t bother Jerusalem.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: 'The rest of the life and times of Joash and all that he did are written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Judah
    - type: text
      text: . At the last his palace staff formed a conspiracy and assassinated Joash as he was strolling along the ramp of the fortified outside city wall. Jozabad son of Shimeath and Jehozabad son of Shomer were the assassins. And so Joash died and was buried in the family plot in the City of David. His son Amaziah was king after him.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: 'Taught and trained by Jehoiada the priest, Joash did what pleased '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for as long as he lived. (Even so, he didn’t get rid of the sacred fertility shrines—people still frequented them, sacrificing and burning incense.)'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'Joash instructed the priests: “Take the money that is brought into The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for holy offerings—both mandatory offerings and freewill offerings—and, keeping a careful accounting, use them to renovate The Temple wherever it has fallen into disrepair.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But by the twenty-third year of Joash’s rule, the priests hadn’t done one thing—The Temple was as dilapidated as ever.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: King Joash called Jehoiada the priest and the company of priests and said, “Why haven’t you renovated this sorry-looking Temple? You are forbidden to take any more money for Temple repairs—from now on, hand over everything you get.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The priests agreed not to take any more money or to be involved in The Temple renovation.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-16
    - type: text
      text: 'Then Jehoiada took a single chest and bored a hole in the lid and placed it to the right of the main entrance into The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. All the offerings that were brought to The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' were placed in the chest by the priests who guarded the entrance. When they saw that a large sum of money had accumulated in the chest, the king’s secretary and the chief priest would empty the chest and count the offerings. They would give the money accounted for to the managers of The Temple project; they in turn would pay the carpenters, construction workers, masons, stoneworkers, and the buyers of timber and quarried stone for the repair and renovation of The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '—any expenses connected with fixing up The Temple. But none of the money brought into The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was used for liturgical “extras” (silver chalices, candle snuffers, trumpets, various gold and silver vessels, etc.). It was given to the workmen to pay for their repairing '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple. And no one even had to check on the men who handled the money given for the project—they were honest men. Offerings designated for Compensation Offerings and Absolution Offerings didn’t go into the building project—those went directly to the priests.
