document_id: ECC.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dead flies in perfume make it stink,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a little foolishness decomposes much wisdom.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Remember: The duller the ax the harder the work;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Use your head: The more brains, the less muscle.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If the snake bites before it’s been charmed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s the point in then sending for the charmer?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: The words of a wise person are gracious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The talk of a fool self-destructs—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He starts out talking nonsense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ends up spouting insanity and evil.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fools talk way too much,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chattering stuff they know nothing about.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A decent day’s work so fatigues fools
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they can’t find their way back to town.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Unlucky the land whose king is a young pup,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose princes party all night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lucky the land whose king is mature,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where the princes behave themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t drink themselves silly.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A shiftless man lives in a tumbledown shack;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lazy woman ends up with a leaky roof.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Laughter and bread go together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wine gives sparkle to life—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it’s money that makes the world go around.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Wise thinking leads to right living;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stupid thinking leads to wrong living.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Don’t bad-mouth your leaders, not even under your breath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t abuse your betters, even in the privacy of your home.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loose talk has a way of getting picked up and spread around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Little birds drop the crumbs of your gossip far and wide.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fools on the road have no sense of direction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The way they walk tells the story: “There goes the fool again!”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If a ruler loses his temper against you, don’t panic;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A calm disposition quiets intemperate rage.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: Here’s a piece of bad business I’ve seen on this earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'An error that can be blamed on whoever is in charge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Immaturity is given a place of prominence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While maturity is made to take a backseat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve seen unproven upstarts riding in style,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While experienced veterans are put out to pasture.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Caution: The trap you set might catch you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Warning: Your accomplice in crime might double-cross you.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Safety first: Quarrying stones is dangerous.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be alert: Felling trees is hazardous.'
