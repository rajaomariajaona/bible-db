document_id: ECC.10,97
type_code: eng
verses:
  '1':
  - type: text
    content: Dead flies in perfume make it stink,
  - type: text
    content: And a little foolishness decomposes much wisdom.
  '10':
  - type: text
    content: 'Remember: The duller the ax the harder the work;'
  - type: text
    content: 'Use your head: The more brains, the less muscle.'
  '11':
  - type: text
    content: If the snake bites before it’s been charmed,
  - type: text
    content: What’s the point in then sending for the charmer?
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: The words of a wise person are gracious.
  - type: text
    content: The talk of a fool self-destructs—
  - type: text
    content: He starts out talking nonsense
  - type: text
    content: And ends up spouting insanity and evil.
  '14':
  - type: text
    content: Fools talk way too much,
  - type: text
    content: Chattering stuff they know nothing about.
  '15':
  - type: text
    content: A decent day’s work so fatigues fools
  - type: text
    content: That they can’t find their way back to town.
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: Unlucky the land whose king is a young pup,
  - type: text
    content: And whose princes party all night.
  - type: text
    content: Lucky the land whose king is mature,
  - type: text
    content: Where the princes behave themselves
  - type: text
    content: And don’t drink themselves silly.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: A shiftless man lives in a tumbledown shack;
  - type: text
    content: A lazy woman ends up with a leaky roof.
  '19':
  - type: text
    content: Laughter and bread go together,
  - type: text
    content: And wine gives sparkle to life—
  - type: text
    content: But it’s money that makes the world go around.
  '2':
  - type: text
    content: Wise thinking leads to right living;
  - type: text
    content: Stupid thinking leads to wrong living.
  '20':
  - type: text
    content: Don’t bad-mouth your leaders, not even under your breath,
  - type: text
    content: And don’t abuse your betters, even in the privacy of your home.
  - type: text
    content: Loose talk has a way of getting picked up and spread around.
  - type: text
    content: Little birds drop the crumbs of your gossip far and wide.
  '3':
  - type: text
    content: Fools on the road have no sense of direction.
  - type: text
    content: 'The way they walk tells the story: “There goes the fool again!”'
  '4':
  - type: text
    content: If a ruler loses his temper against you, don’t panic;
  - type: text
    content: A calm disposition quiets intemperate rage.
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: Here’s a piece of bad business I’ve seen on this earth,
  - type: text
    content: 'An error that can be blamed on whoever is in charge:'
  - type: text
    content: Immaturity is given a place of prominence,
  - type: text
    content: While maturity is made to take a backseat.
  - type: text
    content: I’ve seen unproven upstarts riding in style,
  - type: text
    content: While experienced veterans are put out to pasture.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'Caution: The trap you set might catch you.'
  - type: text
    content: 'Warning: Your accomplice in crime might double-cross you.'
  '9':
  - type: text
    content: 'Safety first: Quarrying stones is dangerous.'
  - type: text
    content: 'Be alert: Felling trees is hazardous.'
