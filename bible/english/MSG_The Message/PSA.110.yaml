document_id: PSA.110,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of '
  - type: text
    content: God
  - type: text
    content: ' to my Lord:'
  - type: text
    content: “Sit alongside me here on my throne
  - type: text
    content: until I make your enemies a stool for your feet.”
  - type: text
    content: 'You were forged a strong scepter by '
  - type: text
    content: God
  - type: text
    content: ' of Zion;'
  - type: text
    content: now rule, though surrounded by enemies!
  - type: text
    content: Your people will freely join you, resplendent in holy armor
  - type: text
    content: on the great day of your conquest,
  - type: text
    content: Join you at the fresh break of day,
  - type: text
    content: join you with all the vigor of youth.
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gave his word and he won’t take it back:'
  - type: text
    content: you’re the permanent priest, the Melchizedek priest.
  - type: text
    content: The Lord stands true at your side,
  - type: text
    content: crushing kings in his terrible wrath,
  - type: text
    content: Bringing judgment on the nations,
  - type: text
    content: handing out convictions wholesale,
  - type: text
    content: crushing opposition across the wide earth.
  - type: text
    content: The King-Maker put his King on the throne;
  - type: text
    content: the True King rules with head held high!
