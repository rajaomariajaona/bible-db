document_id: HAB.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s God going to say to my questions? I’m braced for the worst.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll climb to the lookout tower and scan the horizon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll wait to see what God says,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how he’ll answer my complaint.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Full of Self, but Soul-Empty
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who do you think you are—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: building a town by murder, a city with crime?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Don’t you know that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: makes sure nothing comes of that but ashes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Makes sure the harder you work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at that kind of thing, the less you are?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile the earth fills up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with awareness of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the waters cover the sea.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who do you think you are—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inviting your neighbors to your drunken parties,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Giving them too much to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roping them into your sexual orgies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You thought you were having the time of your life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wrong! It’s a time of disgrace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the time you were drinking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you were drinking from the cup of God’s wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll wake up holding your throbbing head, hung over—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hung over from Lebanon violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hung over from animal massacres,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hung over from murder and mayhem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From multiple violations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of place and people.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What’s the use of a carved god
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so skillfully carved by its sculptor?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What good is a fancy cast god
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when all it tells is lies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sense does it make to be a pious god-maker
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who makes gods that can’t even talk?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who do you think you are—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying to a stick of wood, ‘Wake up,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or to a dumb stone, ‘Get up’?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can they teach you anything about anything?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing to them but surface.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s nothing on the inside.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' answered: “Write this.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Write what you see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Write it out in big block letters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that it can be read on the run.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This vision-message is a witness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pointing to what’s coming.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It aches for the coming—it can hardly wait!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it doesn’t lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it seems slow in coming, wait.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s on its way. It will come right on time.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But oh! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is in his holy Temple!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Quiet everyone—a holy silence. Listen!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look at that man, bloated by self-importance—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: full of himself but soul-empty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the person in right standing before God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through loyal and steady believing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'is fully alive, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: really
    - type: text
      text: ' alive.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “Note well: Money deceives.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The arrogant rich don’t last.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are more hungry for wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the grave is for cadavers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like death, they always want more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the ‘more’ they get is dead bodies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are cemeteries filled with dead nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: graveyards filled with corpses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t give people like this a second thought.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Soon the whole world will be taunting them:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “‘Who do you think you are—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: getting rich by stealing and extortion?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long do you think
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you can get away with this?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, how long before your victims wake up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'stand up and make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' the victim?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve plundered nation after nation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now you’ll get a taste of your own medicine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the survivors are out to plunder you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a payback for all your murders and massacres.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who do you think you are—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: recklessly grabbing and looting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Living it up, acting like king of the mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: acting above it all, above trials and troubles?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve engineered the ruin of your own house.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In ruining others you’ve ruined yourself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve undermined your foundations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rotted out your own soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bricks of your house will speak up and accuse you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The woodwork will step forward with evidence.
