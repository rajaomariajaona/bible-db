document_id: HAB.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: What’s God going to say to my questions? I’m braced for the worst.
  - type: text
    content: I’ll climb to the lookout tower and scan the horizon.
  - type: text
    content: I’ll wait to see what God says,
  - type: text
    content: how he’ll answer my complaint.
  - type: heading
    content: Full of Self, but Soul-Empty
  '12':
  - type: text
    content: “Who do you think you are—
  - type: text
    content: building a town by murder, a city with crime?
  - type: text
    content: 'Don’t you know that '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies
  - type: text
    content: makes sure nothing comes of that but ashes,
  - type: text
    content: Makes sure the harder you work
  - type: text
    content: at that kind of thing, the less you are?
  - type: text
    content: Meanwhile the earth fills up
  - type: text
    content: 'with awareness of '
  - type: text
    content: God
  - type: text
    content: ’s glory
  - type: text
    content: as the waters cover the sea.
  '15':
  - type: text
    content: “Who do you think you are—
  - type: text
    content: inviting your neighbors to your drunken parties,
  - type: text
    content: Giving them too much to drink,
  - type: text
    content: roping them into your sexual orgies?
  - type: text
    content: You thought you were having the time of your life.
  - type: text
    content: Wrong! It’s a time of disgrace.
  - type: text
    content: All the time you were drinking,
  - type: text
    content: you were drinking from the cup of God’s wrath.
  - type: text
    content: You’ll wake up holding your throbbing head, hung over—
  - type: text
    content: hung over from Lebanon violence,
  - type: text
    content: Hung over from animal massacres,
  - type: text
    content: hung over from murder and mayhem,
  - type: text
    content: From multiple violations
  - type: text
    content: of place and people.
  '18':
  - type: text
    content: “What’s the use of a carved god
  - type: text
    content: so skillfully carved by its sculptor?
  - type: text
    content: What good is a fancy cast god
  - type: text
    content: when all it tells is lies?
  - type: text
    content: What sense does it make to be a pious god-maker
  - type: text
    content: who makes gods that can’t even talk?
  - type: text
    content: Who do you think you are—
  - type: text
    content: saying to a stick of wood, ‘Wake up,’
  - type: text
    content: Or to a dumb stone, ‘Get up’?
  - type: text
    content: Can they teach you anything about anything?
  - type: text
    content: There’s nothing to them but surface.
  - type: text
    content: There’s nothing on the inside.
  '2':
  - type: text
    content: 'And then '
  - type: text
    content: God
  - type: text
    content: ' answered: “Write this.'
  - type: text
    content: Write what you see.
  - type: text
    content: Write it out in big block letters
  - type: text
    content: so that it can be read on the run.
  - type: text
    content: This vision-message is a witness
  - type: text
    content: pointing to what’s coming.
  - type: text
    content: It aches for the coming—it can hardly wait!
  - type: text
    content: And it doesn’t lie.
  - type: text
    content: If it seems slow in coming, wait.
  - type: text
    content: It’s on its way. It will come right on time.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: '“But oh! '
  - type: text
    content: God
  - type: text
    content: ' is in his holy Temple!'
  - type: text
    content: Quiet everyone—a holy silence. Listen!”
  '4':
  - type: text
    content: “Look at that man, bloated by self-importance—
  - type: text
    content: full of himself but soul-empty.
  - type: text
    content: But the person in right standing before God
  - type: text
    content: through loyal and steady believing
  - type: text
    content: 'is fully alive, '
  - type: text
    content: really
  - type: text
    content: ' alive.'
  '5':
  - type: text
    content: ' “Note well: Money deceives.'
  - type: text
    content: The arrogant rich don’t last.
  - type: text
    content: They are more hungry for wealth
  - type: text
    content: than the grave is for cadavers.
  - type: text
    content: Like death, they always want more,
  - type: text
    content: but the ‘more’ they get is dead bodies.
  - type: text
    content: They are cemeteries filled with dead nations,
  - type: text
    content: graveyards filled with corpses.
  - type: text
    content: Don’t give people like this a second thought.
  - type: text
    content: 'Soon the whole world will be taunting them:'
  '6':
  - type: text
    content: ' “‘Who do you think you are—'
  - type: text
    content: getting rich by stealing and extortion?
  - type: text
    content: How long do you think
  - type: text
    content: you can get away with this?’
  - type: text
    content: Indeed, how long before your victims wake up,
  - type: text
    content: 'stand up and make '
  - type: text
    content: you
  - type: text
    content: ' the victim?'
  - type: text
    content: You’ve plundered nation after nation.
  - type: text
    content: Now you’ll get a taste of your own medicine.
  - type: text
    content: All the survivors are out to plunder you,
  - type: text
    content: a payback for all your murders and massacres.
  '9':
  - type: text
    content: “Who do you think you are—
  - type: text
    content: recklessly grabbing and looting,
  - type: text
    content: Living it up, acting like king of the mountain,
  - type: text
    content: acting above it all, above trials and troubles?
  - type: text
    content: You’ve engineered the ruin of your own house.
  - type: text
    content: In ruining others you’ve ruined yourself.
  - type: text
    content: You’ve undermined your foundations,
  - type: text
    content: rotted out your own soul.
  - type: text
    content: The bricks of your house will speak up and accuse you.
  - type: text
    content: The woodwork will step forward with evidence.
