document_id: HEB.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Plan with Israel
  - type: text
    content: 'In essence, we have just such a high priest: authoritative right alongside God, conducting worship in the one true sanctuary built by God.'
  '3':
  - type: text
    content: The assigned task of a high priest is to offer both gifts and sacrifices, and it’s no different with the priesthood of Jesus. If he were limited to earth, he wouldn’t even be a priest. We wouldn’t need him since there are plenty of priests who offer the gifts designated in the law. These priests provide only a hint of what goes on in the true sanctuary of heaven, which Moses caught a glimpse of as he was about to set up the tent-shrine. It was then that God said, “Be careful to do it exactly as you saw it on the Mountain.”
  '6':
  - type: text
    content: But Jesus’ priestly work far surpasses what these other priests do, since he’s working from a far better plan. If the first plan—the old covenant—had worked out, a second wouldn’t have been needed. But we know the first was found wanting, because God said,
  - type: text
    content: Heads up! The days are coming
  - type: text
    content: when I’ll set up a new plan
  - type: text
    content: for dealing with Israel and Judah.
  - type: text
    content: I’ll throw out the old plan
  - type: text
    content: I set up with their ancestors
  - type: text
    content: when I led them by the hand out of Egypt.
  - type: text
    content: They didn’t keep their part of the bargain,
  - type: text
    content: so I looked away and let it go.
  - type: text
    content: This new plan I’m making with Israel
  - type: text
    content: isn’t going to be written on paper,
  - type: text
    content: isn’t going to be chiseled in stone;
  - type: text
    content: 'This time I’m writing out the plan '
  - type: text
    content: in
  - type: text
    content: ' them,'
  - type: text
    content: carving it on the lining of their hearts.
  - type: text
    content: I’ll be their God,
  - type: text
    content: they’ll be my people.
  - type: text
    content: They won’t go to school to learn about me,
  - type: text
    content: 'or buy a book called '
  - type: text
    content: God in Five Easy Lessons
  - type: text
    content: .
  - type: text
    content: They’ll all get to know me firsthand,
  - type: text
    content: the little and the big, the small and the great.
  - type: text
    content: They’ll get to know me by being kindly forgiven,
  - type: text
    content: with the slate of their sins forever wiped clean.
  - type: text
    content: By coming up with a new plan, a new covenant between God and his people, God put the old plan on the shelf. And there it stays, gathering dust.
