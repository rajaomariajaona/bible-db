document_id: HEB.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Plan with Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'In essence, we have just such a high priest: authoritative right alongside God, conducting worship in the one true sanctuary built by God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: The assigned task of a high priest is to offer both gifts and sacrifices, and it’s no different with the priesthood of Jesus. If he were limited to earth, he wouldn’t even be a priest. We wouldn’t need him since there are plenty of priests who offer the gifts designated in the law. These priests provide only a hint of what goes on in the true sanctuary of heaven, which Moses caught a glimpse of as he was about to set up the tent-shrine. It was then that God said, “Be careful to do it exactly as you saw it on the Mountain.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-13
  - type: text
    text: But Jesus’ priestly work far surpasses what these other priests do, since he’s working from a far better plan. If the first plan—the old covenant—had worked out, a second wouldn’t have been needed. But we know the first was found wanting, because God said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heads up! The days are coming
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I’ll set up a new plan
- type: usfm
  marker: q2
  children:
  - type: text
    text: for dealing with Israel and Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll throw out the old plan
- type: usfm
  marker: q2
  children:
  - type: text
    text: I set up with their ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I led them by the hand out of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They didn’t keep their part of the bargain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I looked away and let it go.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This new plan I’m making with Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: isn’t going to be written on paper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: isn’t going to be chiseled in stone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This time I’m writing out the plan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: carving it on the lining of their hearts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll be their God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll be my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They won’t go to school to learn about me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'or buy a book called '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God in Five Easy Lessons
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll all get to know me firsthand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the little and the big, the small and the great.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll get to know me by being kindly forgiven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the slate of their sins forever wiped clean.
- type: usfm
  marker: m
  children:
  - type: text
    text: By coming up with a new plan, a new covenant between God and his people, God put the old plan on the shelf. And there it stays, gathering dust.
