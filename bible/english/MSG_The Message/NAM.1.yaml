- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Is Serious Business'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A report on the problem of Nineveh, the way God gave Nahum of Elkosh to see it:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is serious business.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He won’t be trifled with.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He avenges his foes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He stands up against his enemies, fierce and raging.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t lose his temper.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s powerful, but it’s a patient power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Still, no one gets by with anything.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sooner or later, everyone pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tornadoes and hurricanes
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the wake of his passage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Storm clouds are the dust
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shakes off his feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He yells at the sea: It dries up.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the rivers run dry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Bashan and Carmel mountains shrivel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lebanon orchards shrivel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mountains quake in their roots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hills dissolve into mud flats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Earth shakes in fear of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: The whole world’s in a panic.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can face such towering anger?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can stand up to this fierce rage?
- type: usfm
  marker: q1
  children:
  - type: text
    text: His anger spills out like a river of lava,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fury shatters boulders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is good,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hiding place in tough times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He recognizes and welcomes
- type: usfm
  marker: q2
  children:
  - type: text
    text: anyone looking for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No matter how desperate the trouble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But cozy islands of escape
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wipes right off the map.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one gets away from God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why waste time conniving against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s putting an end to all such scheming.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For troublemakers, no second chances.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like a pile of dry brush,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soaked in oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll go up in flames.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Think Tank for Lies
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nineveh’s an anthill
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'of evil plots against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A think tank for lies
- type: usfm
  marker: q2
  children:
  - type: text
    text: that seduce and betray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has something to say about all this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Even though you’re on top of the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With all the applause and all the votes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be mowed down flat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve afflicted you, Judah, true,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I won’t afflict you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From now on I’m taking the yoke from your neck
- type: usfm
  marker: q2
  children:
  - type: text
    text: and splitting it up for kindling.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m cutting you free
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the ropes of your bondage.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s orders on Nineveh:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You’re the end of the line.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s all over with Nineveh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m gutting your temple.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your gods and goddesses go in the trash.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m digging your grave. It’s an unmarked grave.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You’re nothing—no, you’re '
  - type: usfm
    marker: it
    children:
    - type: text
      text: less
  - type: text
    text: ' than nothing!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Look! Striding across the mountains—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a messenger bringing the latest good news: peace!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A holiday, Judah! Celebrate!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Worship and recommit to God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No more worries about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' enemy.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: This one is history. Close the books.
