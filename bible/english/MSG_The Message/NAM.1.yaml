type_code: eng
verses:
  '1':
  - type: heading
    content: God Is Serious Business
  - type: text
    content: 'A report on the problem of Nineveh, the way God gave Nahum of Elkosh to see it:'
  '11':
  - type: text
    content: Nineveh’s an anthill
  - type: text
    content: 'of evil plots against '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: A think tank for lies
  - type: text
    content: that seduce and betray.
  '12':
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' has something to say about all this:'
  - type: text
    content: “Even though you’re on top of the world,
  - type: text
    content: With all the applause and all the votes,
  - type: text
    content: you’ll be mowed down flat.
  - type: text
    content: “I’ve afflicted you, Judah, true,
  - type: text
    content: but I won’t afflict you again.
  - type: text
    content: From now on I’m taking the yoke from your neck
  - type: text
    content: and splitting it up for kindling.
  - type: text
    content: I’m cutting you free
  - type: text
    content: from the ropes of your bondage.”
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s orders on Nineveh:'
  - type: text
    content: “You’re the end of the line.
  - type: text
    content: It’s all over with Nineveh.
  - type: text
    content: I’m gutting your temple.
  - type: text
    content: Your gods and goddesses go in the trash.
  - type: text
    content: I’m digging your grave. It’s an unmarked grave.
  - type: text
    content: 'You’re nothing—no, you’re '
  - type: text
    content: less
  - type: text
    content: ' than nothing!”'
  '15':
  - type: text
    content: Look! Striding across the mountains—
  - type: text
    content: 'a messenger bringing the latest good news: peace!'
  - type: text
    content: A holiday, Judah! Celebrate!
  - type: text
    content: Worship and recommit to God!
  - type: text
    content: 'No more worries about '
  - type: text
    content: this
  - type: text
    content: ' enemy.'
  - type: text
    content: This one is history. Close the books.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is serious business.'
  - type: text
    content: He won’t be trifled with.
  - type: text
    content: He avenges his foes.
  - type: text
    content: He stands up against his enemies, fierce and raging.
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' doesn’t lose his temper.'
  - type: text
    content: He’s powerful, but it’s a patient power.
  - type: text
    content: Still, no one gets by with anything.
  - type: text
    content: Sooner or later, everyone pays.
  - type: text
    content: Tornadoes and hurricanes
  - type: text
    content: are the wake of his passage,
  - type: text
    content: Storm clouds are the dust
  - type: text
    content: he shakes off his feet.
  - type: text
    content: 'He yells at the sea: It dries up.'
  - type: text
    content: All the rivers run dry.
  - type: text
    content: The Bashan and Carmel mountains shrivel,
  - type: text
    content: the Lebanon orchards shrivel.
  - type: text
    content: Mountains quake in their roots,
  - type: text
    content: hills dissolve into mud flats.
  - type: text
    content: 'Earth shakes in fear of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: The whole world’s in a panic.
  - type: text
    content: Who can face such towering anger?
  - type: text
    content: Who can stand up to this fierce rage?
  - type: text
    content: His anger spills out like a river of lava,
  - type: text
    content: his fury shatters boulders.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is good,'
  - type: text
    content: a hiding place in tough times.
  - type: text
    content: He recognizes and welcomes
  - type: text
    content: anyone looking for help,
  - type: text
    content: No matter how desperate the trouble.
  - type: text
    content: But cozy islands of escape
  - type: text
    content: He wipes right off the map.
  - type: text
    content: No one gets away from God.
  - type: text
    content: 'Why waste time conniving against '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: He’s putting an end to all such scheming.
  - type: text
    content: For troublemakers, no second chances.
  - type: text
    content: Like a pile of dry brush,
  - type: text
    content: Soaked in oil,
  - type: text
    content: they’ll go up in flames.
  - type: heading
    content: A Think Tank for Lies
