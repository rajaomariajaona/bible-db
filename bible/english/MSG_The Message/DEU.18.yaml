document_id: DEU.18,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The Levitical priests—that’s the entire tribe of Levi—don’t get any land-inheritance with the rest of Israel. They get the Fire-Gift-Offerings of '
  - type: text
    content: God
  - type: text
    content: '—they will live on that inheritance. But they don’t get land-inheritance like the rest of their kinsmen. '
  - type: text
    content: God
  - type: text
    content: ' is their inheritance.'
  '13':
  - type: text
    content: 'Be completely loyal to '
  - type: text
    content: God
  - type: text
    content: ', your God. These nations that you’re about to run out of the country consort with sorcerers and witches. But not you. '
  - type: text
    content: God
  - type: text
    content: ', your God, forbids it.'
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', your God, is going to raise up a prophet for you. '
  - type: text
    content: God
  - type: text
    content: ' will raise him up from among your kinsmen, a prophet like me. Listen obediently to him. This is what you asked '
  - type: text
    content: God
  - type: text
    content: ', your God, for at Horeb on the day you were all gathered at the mountain and said, “We can’t hear any more from '
  - type: text
    content: God
  - type: text
    content: ', our God; we can’t stand seeing any more fire. We’ll die!”'
  '17':
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' said to me, “They’re right; they’ve spoken the truth. I’ll raise up for them a prophet like you from their kinsmen. I’ll tell him what to say and he will pass on to them everything I command him. And anyone who won’t listen to my words spoken by him, I will personally hold responsible.'
  '20':
  - type: text
    content: “But any prophet who fakes it, who claims to speak in my name something I haven’t commanded him to say, or speaks in the name of other gods, that prophet must die.”
  '21':
  - type: text
    content: 'You may be wondering among yourselves, “How can we tell the difference, whether it was '
  - type: text
    content: God
  - type: text
    content: ' who spoke or not?” Here’s how: If what the prophet spoke in '
  - type: text
    content: God
  - type: text
    content: '’s name doesn’t happen, then obviously '
  - type: text
    content: God
  - type: text
    content: ' wasn’t behind it; the prophet made it up. Forget about him.'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'This is what the priests get from the people from any offering of an ox or a sheep: the shoulder, the two cheeks, and the stomach. You must also give them the firstfruits of your grain, wine, and oil and the first fleece of your sheep, because '
  - type: text
    content: God
  - type: text
    content: ', your God, has chosen only them and their children out of all your tribes to be present and serve always in the name of '
  - type: text
    content: God
  - type: text
    content: ', your God.'
  '6':
  - type: text
    content: 'If a Levite moves from any town in Israel—and he is quite free to move wherever he desires—and comes to the place '
  - type: text
    content: God
  - type: text
    content: ' designates for worship, he may serve there in the name of '
  - type: text
    content: God
  - type: text
    content: ' along with all his brother Levites who are present and serving in the Presence of '
  - type: text
    content: God
  - type: text
    content: . And he will get an equal share to eat, even though he has money from the sale of his parents’ possessions.
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: 'When you enter the land that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you, don’t take on the abominable ways of life of the nations there. Don’t you dare sacrifice your son or daughter in the fire. Don’t practice divination, sorcery, fortunetelling, witchery, casting spells, holding séances, or channeling with the dead. People who do these things are an abomination to '
  - type: text
    content: God
  - type: text
    content: '. It’s because of just such abominable practices that '
  - type: text
    content: God
  - type: text
    content: ', your God, is driving these nations out before you.'
