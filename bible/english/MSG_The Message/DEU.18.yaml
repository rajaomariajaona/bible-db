document_id: DEU.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'The Levitical priests—that’s the entire tribe of Levi—don’t get any land-inheritance with the rest of Israel. They get the Fire-Gift-Offerings of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—they will live on that inheritance. But they don’t get land-inheritance like the rest of their kinsmen. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is their inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'This is what the priests get from the people from any offering of an ox or a sheep: the shoulder, the two cheeks, and the stomach. You must also give them the firstfruits of your grain, wine, and oil and the first fleece of your sheep, because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has chosen only them and their children out of all your tribes to be present and serve always in the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'If a Levite moves from any town in Israel—and he is quite free to move wherever he desires—and comes to the place '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' designates for worship, he may serve there in the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' along with all his brother Levites who are present and serving in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . And he will get an equal share to eat, even though he has money from the sale of his parents’ possessions.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: 'When you enter the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you, don’t take on the abominable ways of life of the nations there. Don’t you dare sacrifice your son or daughter in the fire. Don’t practice divination, sorcery, fortunetelling, witchery, casting spells, holding séances, or channeling with the dead. People who do these things are an abomination to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. It’s because of just such abominable practices that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is driving these nations out before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Be completely loyal to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. These nations that you’re about to run out of the country consort with sorcerers and witches. But not you. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, forbids it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is going to raise up a prophet for you. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will raise him up from among your kinsmen, a prophet like me. Listen obediently to him. This is what you asked '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, for at Horeb on the day you were all gathered at the mountain and said, “We can’t hear any more from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God; we can’t stand seeing any more fire. We’ll die!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to me, “They’re right; they’ve spoken the truth. I’ll raise up for them a prophet like you from their kinsmen. I’ll tell him what to say and he will pass on to them everything I command him. And anyone who won’t listen to my words spoken by him, I will personally hold responsible.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “But any prophet who fakes it, who claims to speak in my name something I haven’t commanded him to say, or speaks in the name of other gods, that prophet must die.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'You may be wondering among yourselves, “How can we tell the difference, whether it was '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who spoke or not?” Here’s how: If what the prophet spoke in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s name doesn’t happen, then obviously '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t behind it; the prophet made it up. Forget about him.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
