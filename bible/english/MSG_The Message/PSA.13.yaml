      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Take a good look at me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want to look life in the eye,
  - type: usfm
