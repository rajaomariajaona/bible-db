    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: I’ve thrown myself headlong into your arms—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m celebrating your rescue.
  - type: usfm
    marker: q1
    children:
