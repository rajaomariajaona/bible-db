document_id: PSA.13,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Long enough, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: you’ve ignored me long enough.
  - type: text
    content: I’ve looked at the back of your head
  - type: text
    content: long enough. Long enough
  - type: text
    content: I’ve carried this ton of trouble,
  - type: text
    content: lived with a stomach full of pain.
  - type: text
    content: Long enough my arrogant enemies
  - type: text
    content: have looked down their noses at me.
  '3':
  - type: text
    content: 'Take a good look at me, '
  - type: text
    content: God
  - type: text
    content: ', my God;'
  - type: text
    content: I want to look life in the eye,
  - type: text
    content: So no enemy can get the best of me
  - type: text
    content: or laugh when I fall on my face.
  '5':
  - type: text
    content: I’ve thrown myself headlong into your arms—
  - type: text
    content: I’m celebrating your rescue.
  - type: text
    content: I’m singing at the top of my lungs,
  - type: text
    content: I’m so full of answered prayers.
