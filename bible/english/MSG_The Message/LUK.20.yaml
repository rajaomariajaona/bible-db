document_id: LUK.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: One day he was teaching the people in the Temple, proclaiming the Message. The high priests, religion scholars, and leaders confronted him and demanded, “Show us your credentials. Who authorized you to speak and act like this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Jesus answered, “First, let me ask you a question: About the baptism of John—who authorized it, heaven or humans?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: They were on the spot, and knew it. They pulled back into a huddle and whispered, “If we say ‘heaven,’ he’ll ask us why we didn’t believe him; if we say ‘humans,’ the people will tear us limb from limb, convinced as they are that John was God’s prophet.” They agreed to concede that round to Jesus and said they didn’t know.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jesus said, “Then neither will I answer your question.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Story of Corrupt Farmhands
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: 'Jesus told another story to the people: “A man planted a vineyard. He handed it over to farmhands and went off on a trip. He was gone a long time. In time he sent a servant back to the farmhands to collect the profits, but they beat him up and sent him off empty-handed. He decided to try again and sent another servant. That one they beat black-and-blue, and sent him off empty-handed. He tried a third time. They worked that servant over from head to foot and dumped him in the street.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Then the owner of the vineyard said, ‘I know what I’ll do: I’ll send my beloved son. They’re bound to respect my son.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15a
  - type: text
    text: ' “But when the farmhands saw him coming, they quickly put their heads together. ‘This is our chance—this is the heir! Let’s kill him and have it all to ourselves.’ They killed him and threw him over the fence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-16
  - type: text
    text: ' “What do you think the owner of the vineyard will do? Right. He’ll come and get rid of everyone. Then he’ll assign the care of the vineyard to others.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Those who were listening said, “Oh, no! He’d never do that!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'But Jesus didn’t back down. “Why, then, do you think this was written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That stone the masons threw out—
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s now the cornerstone!?
- type: usfm
  marker: m
  children:
  - type: text
    text: “Anyone falling over that stone will break every bone in his body; if the stone falls on anyone, he’ll be smashed to smithereens.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The religion scholars and high priests wanted to lynch him on the spot, but they were intimidated by public opinion. They knew the story was about them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paying Taxes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'Watching for a chance to get him, they sent spies who posed as honest inquirers, hoping to trick him into saying something that would get him in trouble with the law. So they asked him, “Teacher, we know that you’re honest and straightforward when you teach, that you don’t pander to anyone but teach the way of God accurately. Tell us: Is it lawful to pay taxes to Caesar or not?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: He knew they were laying for him and said, “Show me a coin. Now, this engraving, who does it look like and what does it say?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Caesar,” they said.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus said, “Then give Caesar what is his and give God what is his.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Try as they might, they couldn’t trap him into saying anything incriminating. His answer caught them off guard and left them speechless.
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Intimacies Will Be with God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-33
  - type: text
    text: Some Sadducees came up. This is the Jewish party that denies any possibility of resurrection. They asked, “Teacher, Moses wrote us that if a man dies and leaves a wife but no child, his brother is obligated to marry her and give her children. Well, there once were seven brothers. The first took a wife. He died childless. The second married her and died, then the third, and eventually all seven had their turn, but no child. After all that, the wife died. That wife, now—in the resurrection whose wife is she? All seven married her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-38
  - type: text
    text: 'Jesus said, “Marriage is a major preoccupation here, but not there. Those who are included in the resurrection of the dead will no longer be concerned with marriage nor, of course, with death. They will have better things to think about, if you can believe it. All ecstasies and intimacies then will be with God. Even Moses exclaimed about resurrection at the burning bush, saying, ‘God: God of Abraham, God of Isaac, God of Jacob!’ God isn’t the God of dead men, but of the living. To him all are alive.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: Some of the religion scholars said, “Teacher, that’s a great answer!” For a while, anyway, no one dared put questions to him.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-44
  - type: text
    text: 'Then he put a question to them: “How is it that they say that the Messiah is David’s son? In the Book of Psalms, David clearly says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God said to my Master,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Sit here at my right hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: until I put your enemies under your feet.”
- type: usfm
  marker: m
  children:
  - type: text
    text: “David here designates the Messiah as ‘my Master’—so how can the Messiah also be his ‘son’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-47
  - type: text
    text: With everybody listening, Jesus spoke to his disciples. “Watch out for the religion scholars. They love to walk around in academic gowns, preen in the radiance of public flattery, bask in prominent positions, sit at the head table at every church function. And all the time they are exploiting the weak and helpless. The longer their prayers, the worse they get. But they’ll pay for it in the end.”
