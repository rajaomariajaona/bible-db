document_id: EZK.32,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cloud Across the Sun
  - type: text
    content: 'In the twelfth year, on the first day of the twelfth month, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, sing a funeral lament over Pharaoh king of Egypt. Tell him:'
  - type: text
    content: “‘You think you’re a young lion
  - type: text
    content: prowling through the nations.
  - type: text
    content: You’re more like a dragon in the ocean,
  - type: text
    content: snorting and thrashing about.
  '11':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘The sword of the king of Babylon
  - type: text
    content: is coming against you.
  - type: text
    content: I’ll use the swords of champions
  - type: text
    content: to lay your pride low,
  - type: text
    content: Use the most brutal of nations
  - type: text
    content: to knock Egypt off her high horse,
  - type: text
    content: to puncture that hot-air pomposity.
  - type: text
    content: I’ll destroy all their livestock
  - type: text
    content: that graze along the river.
  - type: text
    content: Neither human foot nor animal hoof
  - type: text
    content: will muddy those waters anymore.
  - type: text
    content: I’ll clear their springs and streams,
  - type: text
    content: make their rivers flow clean and smooth.
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: When I turn Egypt back to the wild
  - type: text
    content: and strip her clean of all her abundant produce,
  - type: text
    content: When I strike dead all who live there,
  - type: text
    content: 'then they’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .’
  '16':
  - type: text
    content: “This is a funeral song. Chant it.
  - type: text
    content: Daughters of the nations, chant it.
  - type: text
    content: Chant it over Egypt for the death of its pomp.”
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  '17':
  - type: text
    content: 'In the twelfth year, on the fifteenth day of the first month, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me:'
  - type: text
    content: “Son of man, lament over Egypt’s pompous ways.
  - type: text
    content: Send her on her way.
  - type: text
    content: Dispatch Egypt
  - type: text
    content: and her proud daughter nations
  - type: text
    content: To the underworld,
  - type: text
    content: down to the country of the dead and buried.
  - type: text
    content: Say, ‘You think you’re so high and mighty?
  - type: text
    content: Down! Take your place with the heathen in that unhallowed grave!’
  '20':
  - type: text
    content: '“She’ll be dumped in with those killed in battle. The sword is bared. Drag her off in all her proud pomp! All the big men and their helpers down among the dead and buried will greet them: ‘Welcome to the grave of the heathen! Join the ranks of the victims of war!’'
  '22':
  - type: text
    content: “Assyria is there and its congregation, the whole nation a cemetery. Their graves are in the deepest part of the underworld, a congregation of graves, all killed in battle, these people who terrorized the land of the living.
  '24':
  - type: text
    content: “Elam is there in all her pride, a cemetery—all killed in battle, dumped in her heathen grave with the dead and buried, these people who terrorized the land of the living. They carry their shame with them, along with the others in the grave. They turned Elam into a resort for the pompous dead, landscaped with heathen graves, slaughtered in battle. They once terrorized the land of the living. Now they carry their shame down with the others in deep earth. They’re in the section set aside for the slain in battle.
  '26':
  - type: text
    content: “Meshech-tubal is there in all her pride, a cemetery in uncircumcised ground, dumped in with those slaughtered in battle—just deserts for terrorizing the land of the living. Now they carry their shame down with the others in deep earth. They’re in the section set aside for the slain. They’re segregated from the heroes, the old-time giants who entered the grave in full battle dress, their swords placed under their heads and their shields covering their bones, those heroes who spread terror through the land of the living.
  '28':
  - type: text
    content: “And you, Egypt, will be dumped in a heathen grave, along with all the rest, in the section set aside for the slain.
  '29':
  - type: text
    content: “Edom is there, with her kings and princes. In spite of her vaunted greatness, she is dumped in a heathen grave with the others headed for the grave.
  '3':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘I’m going to throw my net over you
  - type: text
    content: —many nations will get in on this operation—
  - type: text
    content: and haul you out with my dragnet.
  - type: text
    content: I’ll dump you on the ground
  - type: text
    content: out in an open field
  - type: text
    content: And bring in all the crows and vultures
  - type: text
    content: for a sumptuous carrion lunch.
  - type: text
    content: I’ll invite wild animals from all over the world
  - type: text
    content: to gorge on your guts.
  - type: text
    content: I’ll scatter hunks of your meat in the mountains
  - type: text
    content: and strew your bones in the valleys.
  - type: text
    content: The country, right up to the mountains,
  - type: text
    content: will be drenched with your blood,
  - type: text
    content: your blood filling every ditch and channel.
  - type: text
    content: When I blot you out,
  - type: text
    content: I’ll pull the curtain on the skies
  - type: text
    content: and shut out the stars.
  - type: text
    content: I’ll throw a cloud across the sun
  - type: text
    content: and turn off the moonlight.
  - type: text
    content: I’ll turn out every light in the sky above you
  - type: text
    content: and put your land in the dark.
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: I’ll shake up everyone worldwide
  - type: text
    content: when I take you off captive to strange and far-off countries.
  - type: text
    content: I’ll shock people with you.
  - type: text
    content: Kings will take one look and shudder.
  - type: text
    content: I’ll shake my sword
  - type: text
    content: and they’ll shake in their boots.
  - type: text
    content: On the day you crash, they’ll tremble,
  - type: text
    content: thinking, “That could be me!”
  - type: heading
    content: To Lay Your Pride Low
  '30':
  - type: text
    content: “The princes of the north are there, the whole lot of them, and all the Sidonians who carry their shame to their graves—all that terror they spread with their brute power!—dumped in unhallowed ground with those killed in battle, carrying their shame with the others headed for deep earth.
  '31':
  - type: text
    content: '“Pharaoh will see them all and, pompous old goat that he is, take comfort in the company he’ll keep—Pharaoh and his slaughtered army. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  '32':
  - type: text
    content: '“I used him to spread terror in the land of the living and now I’m dumping him in heathen ground with those killed by the sword—Pharaoh and all his pomp. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.”'
