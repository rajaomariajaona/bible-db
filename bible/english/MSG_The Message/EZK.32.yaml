document_id: EZK.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Cloud Across the Sun
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'In the twelfth year, on the first day of the twelfth month, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, sing a funeral lament over Pharaoh king of Egypt. Tell him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘You think you’re a young lion
- type: usfm
  marker: q2
  children:
  - type: text
    text: prowling through the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re more like a dragon in the ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snorting and thrashing about.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-10
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘I’m going to throw my net over you
- type: usfm
  marker: q2
  children:
  - type: text
    text: —many nations will get in on this operation—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and haul you out with my dragnet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll dump you on the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: out in an open field
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bring in all the crows and vultures
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a sumptuous carrion lunch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll invite wild animals from all over the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: to gorge on your guts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll scatter hunks of your meat in the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strew your bones in the valleys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The country, right up to the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be drenched with your blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your blood filling every ditch and channel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I blot you out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll pull the curtain on the skies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shut out the stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll throw a cloud across the sun
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turn off the moonlight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll turn out every light in the sky above you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put your land in the dark.
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll shake up everyone worldwide
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I take you off captive to strange and far-off countries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll shock people with you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Kings will take one look and shudder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll shake my sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they’ll shake in their boots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the day you crash, they’ll tremble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thinking, “That could be me!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Lay Your Pride Low
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘The sword of the king of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: is coming against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use the swords of champions
- type: usfm
  marker: q2
  children:
  - type: text
    text: to lay your pride low,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Use the most brutal of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: to knock Egypt off her high horse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to puncture that hot-air pomposity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll destroy all their livestock
- type: usfm
  marker: q2
  children:
  - type: text
    text: that graze along the river.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither human foot nor animal hoof
- type: usfm
  marker: q2
  children:
  - type: text
    text: will muddy those waters anymore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll clear their springs and streams,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make their rivers flow clean and smooth.
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I turn Egypt back to the wild
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strip her clean of all her abundant produce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I strike dead all who live there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'then they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “This is a funeral song. Chant it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Daughters of the nations, chant it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chant it over Egypt for the death of its pomp.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'In the twelfth year, on the fifteenth day of the first month, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Son of man, lament over Egypt’s pompous ways.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Send her on her way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dispatch Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her proud daughter nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the underworld,
- type: usfm
  marker: q2
  children:
  - type: text
    text: down to the country of the dead and buried.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Say, ‘You think you’re so high and mighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Down! Take your place with the heathen in that unhallowed grave!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: '“She’ll be dumped in with those killed in battle. The sword is bared. Drag her off in all her proud pomp! All the big men and their helpers down among the dead and buried will greet them: ‘Welcome to the grave of the heathen! Join the ranks of the victims of war!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: “Assyria is there and its congregation, the whole nation a cemetery. Their graves are in the deepest part of the underworld, a congregation of graves, all killed in battle, these people who terrorized the land of the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: “Elam is there in all her pride, a cemetery—all killed in battle, dumped in her heathen grave with the dead and buried, these people who terrorized the land of the living. They carry their shame with them, along with the others in the grave. They turned Elam into a resort for the pompous dead, landscaped with heathen graves, slaughtered in battle. They once terrorized the land of the living. Now they carry their shame down with the others in deep earth. They’re in the section set aside for the slain in battle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: “Meshech-tubal is there in all her pride, a cemetery in uncircumcised ground, dumped in with those slaughtered in battle—just deserts for terrorizing the land of the living. Now they carry their shame down with the others in deep earth. They’re in the section set aside for the slain. They’re segregated from the heroes, the old-time giants who entered the grave in full battle dress, their swords placed under their heads and their shields covering their bones, those heroes who spread terror through the land of the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “And you, Egypt, will be dumped in a heathen grave, along with all the rest, in the section set aside for the slain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Edom is there, with her kings and princes. In spite of her vaunted greatness, she is dumped in a heathen grave with the others headed for the grave.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “The princes of the north are there, the whole lot of them, and all the Sidonians who carry their shame to their graves—all that terror they spread with their brute power!—dumped in unhallowed ground with those killed in battle, carrying their shame with the others headed for deep earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Pharaoh will see them all and, pompous old goat that he is, take comfort in the company he’ll keep—Pharaoh and his slaughtered army. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“I used him to spread terror in the land of the living and now I’m dumping him in heathen ground with those killed by the sword—Pharaoh and all his pomp. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.”'
