document_id: JOB.39,97
type_code: eng
verses:
  '1':
  - type: text
    content: “Do you know the month when mountain goats give birth?
  - type: text
    content: Have you ever watched a doe bear her fawn?
  - type: text
    content: Do you know how many months she is pregnant?
  - type: text
    content: Do you know the season of her delivery,
  - type: text
    content: when she crouches down and drops her offspring?
  - type: text
    content: Her young ones flourish and are soon on their own;
  - type: text
    content: they leave and don’t come back.
  '13':
  - type: text
    content: “The ostrich flaps her wings futilely—
  - type: text
    content: all those beautiful feathers, but useless!
  - type: text
    content: She lays her eggs on the hard ground,
  - type: text
    content: leaves them there in the dirt, exposed to the weather,
  - type: text
    content: Not caring that they might get stepped on and cracked
  - type: text
    content: or trampled by some wild animal.
  - type: text
    content: She’s negligent with her young, as if they weren’t even hers.
  - type: text
    content: She cares nothing about anything.
  - type: text
    content: She wasn’t created very smart, that’s for sure,
  - type: text
    content: wasn’t given her share of good sense.
  - type: text
    content: But when she runs, oh, how she runs,
  - type: text
    content: laughing, leaving horse and rider in the dust.
  '19':
  - type: text
    content: “Are you the one who gave the horse his prowess
  - type: text
    content: and adorned him with a shimmering mane?
  - type: text
    content: Did you create him to prance proudly
  - type: text
    content: and strike terror with his royal snorts?
  - type: text
    content: He paws the ground fiercely, eager and spirited,
  - type: text
    content: then charges into the fray.
  - type: text
    content: He laughs at danger, fearless,
  - type: text
    content: doesn’t shy away from the sword.
  - type: text
    content: The banging and clanging
  - type: text
    content: of quiver and lance don’t faze him.
  - type: text
    content: He quivers with excitement, and at the trumpet blast
  - type: text
    content: races off at a gallop.
  - type: text
    content: At the sound of the trumpet he neighs mightily,
  - type: text
    content: smelling the excitement of battle from a long way off,
  - type: text
    content: catching the rolling thunder of the war cries.
  '26':
  - type: text
    content: “Was it through your know-how that the hawk learned to fly,
  - type: text
    content: soaring effortlessly on thermal updrafts?
  - type: text
    content: Did you command the eagle’s flight,
  - type: text
    content: and teach her to build her nest in the heights,
  - type: text
    content: Perfectly at home on the high cliff face,
  - type: text
    content: invulnerable on pinnacle and crag?
  - type: text
    content: From her perch she searches for prey,
  - type: text
    content: spies it at a great distance.
  - type: text
    content: Her young gorge themselves on carrion;
  - type: text
    content: wherever there’s a roadkill, you’ll see her circling.”
  '5':
  - type: text
    content: “Who do you think set the wild donkey free,
  - type: text
    content: opened the corral gates and let him go?
  - type: text
    content: I gave him the whole wilderness to roam in,
  - type: text
    content: the rolling plains and wide-open places.
  - type: text
    content: He laughs at his city cousins, who are harnessed and harried.
  - type: text
    content: He’s oblivious to the cries of teamsters.
  - type: text
    content: He grazes freely through the hills,
  - type: text
    content: nibbling anything that’s green.
  '9':
  - type: text
    content: “Will the wild buffalo condescend to serve you,
  - type: text
    content: volunteer to spend the night in your barn?
  - type: text
    content: Can you imagine hitching your plow to a buffalo
  - type: text
    content: and getting him to till your fields?
  - type: text
    content: He’s hugely strong, yes, but could you trust him,
  - type: text
    content: would you dare turn the job over to him?
  - type: text
    content: You wouldn’t for a minute depend on him, would you,
  - type: text
    content: to do what you said when you said it?
