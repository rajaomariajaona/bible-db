document_id: JOB.39,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: “Do you know the month when mountain goats give birth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you ever watched a doe bear her fawn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know how many months she is pregnant?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you know the season of her delivery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when she crouches down and drops her offspring?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young ones flourish and are soon on their own;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they leave and don’t come back.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-18
    - type: text
      text: “The ostrich flaps her wings futilely—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all those beautiful feathers, but useless!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She lays her eggs on the hard ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaves them there in the dirt, exposed to the weather,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not caring that they might get stepped on and cracked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or trampled by some wild animal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s negligent with her young, as if they weren’t even hers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She cares nothing about anything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She wasn’t created very smart, that’s for sure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wasn’t given her share of good sense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when she runs, oh, how she runs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laughing, leaving horse and rider in the dust.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-25
    - type: text
      text: “Are you the one who gave the horse his prowess
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and adorned him with a shimmering mane?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did you create him to prance proudly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strike terror with his royal snorts?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He paws the ground fiercely, eager and spirited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then charges into the fray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He laughs at danger, fearless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doesn’t shy away from the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The banging and clanging
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of quiver and lance don’t faze him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He quivers with excitement, and at the trumpet blast
  - type: usfm
    marker: q2
    children:
    - type: text
      text: races off at a gallop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the sound of the trumpet he neighs mightily,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: smelling the excitement of battle from a long way off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: catching the rolling thunder of the war cries.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-30
    - type: text
      text: “Was it through your know-how that the hawk learned to fly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soaring effortlessly on thermal updrafts?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did you command the eagle’s flight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach her to build her nest in the heights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perfectly at home on the high cliff face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invulnerable on pinnacle and crag?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From her perch she searches for prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spies it at a great distance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young gorge themselves on carrion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wherever there’s a roadkill, you’ll see her circling.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: “Who do you think set the wild donkey free,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: opened the corral gates and let him go?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I gave him the whole wilderness to roam in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rolling plains and wide-open places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He laughs at his city cousins, who are harnessed and harried.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s oblivious to the cries of teamsters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He grazes freely through the hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nibbling anything that’s green.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: “Will the wild buffalo condescend to serve you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: volunteer to spend the night in your barn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you imagine hitching your plow to a buffalo
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and getting him to till your fields?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s hugely strong, yes, but could you trust him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would you dare turn the job over to him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You wouldn’t for a minute depend on him, would you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do what you said when you said it?
