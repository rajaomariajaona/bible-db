document_id: NUM.29,97
type_code: eng
verses:
  '1':
  - type: text
    content: '“On the first day of the seventh month, gather in holy worship and do no regular work. This is your Day-of-Trumpet-Blasts. Sacrifice a Whole-Burnt-Offering: one young bull, one ram, and seven male yearling lambs—all healthy—as a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: . Prepare a Grain-Offering of six quarts of fine flour mixed with oil for the bull, four quarts for the ram, and two quarts for each lamb, plus a he-goat as an Absolution-Offering to atone for you.
  '12':
  - type: text
    content: '“Gather in holy worship on the fifteenth day of the seventh month; do no regular work. Celebrate a Festival to '
  - type: text
    content: God
  - type: text
    content: ' for seven days. Bring a Whole-Burnt-Offering, a Fire-Gift of pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: ': thirteen young bulls, two rams, and fourteen yearling male lambs—all healthy. Prepare a Grain-Offering of six quarts of fine flour mixed with oil for each of the bulls, four quarts for each ram, and two quarts for each of the fourteen lambs. Also bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '17':
  - type: text
    content: '“On the second day: twelve young bulls, two rams, and fourteen yearling male lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '20':
  - type: text
    content: '“On the third day: eleven bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '23':
  - type: text
    content: '“On the fourth day: ten bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '26':
  - type: text
    content: '“On the fifth day: nine bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '29':
  - type: text
    content: '“On the sixth day: eight bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '32':
  - type: text
    content: '“On the seventh day: seven bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '35':
  - type: text
    content: '“On the eighth day: Gather in holy worship; do no regular work. Bring a Fire-Gift of pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: ', a Whole-Burnt-Offering: one bull, one ram, and seven male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  '39':
  - type: text
    content: '“Sacrifice these to '
  - type: text
    content: God
  - type: text
    content: ' as a congregation at your set feasts: your Whole-Burnt-Offerings, Grain-Offerings, Drink-Offerings, and Peace-Offerings. These are all over and above your personal Vow-Offerings and Freewill-Offerings.”'
  '40':
  - type: text
    content: 'Moses instructed the People of Israel in all that '
  - type: text
    content: God
  - type: text
    content: ' commanded him.'
  '6':
  - type: text
    content: '“These are all over and above the monthly and daily Whole-Burnt-Offerings with their Grain-Offerings and Drink-Offerings as prescribed, a pleasing fragrance, a Fire-Gift to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: “On the tenth day of this seventh month, gather in holy worship, humble yourselves, and do no work.
  '8':
  - type: text
    content: '“Bring a Whole-Burnt-Offering to '
  - type: text
    content: God
  - type: text
    content: ' as a pleasing fragrance: one young bull, one ram, and seven yearling male lambs—all healthy. Prepare a Grain-Offering of six quarts of fine flour mixed with oil for the bull, four quarts for the ram, and two quarts for each of the seven lambs. Also bring a he-goat as an Absolution-Offering to atone for you in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
  - type: text
    content: '* * *'
