segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: '“On the first day of the seventh month, gather in holy worship and do no regular work. This is your Day-of-Trumpet-Blasts. Sacrifice a Whole-Burnt-Offering: one young bull, one ram, and seven male yearling lambs—all healthy—as a pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Prepare a Grain-Offering of six quarts of fine flour mixed with oil for the bull, four quarts for the ram, and two quarts for each lamb, plus a he-goat as an Absolution-Offering to atone for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“These are all over and above the monthly and daily Whole-Burnt-Offerings with their Grain-Offerings and Drink-Offerings as prescribed, a pleasing fragrance, a Fire-Gift to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “On the tenth day of this seventh month, gather in holy worship, humble yourselves, and do no work.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: '“Bring a Whole-Burnt-Offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' as a pleasing fragrance: one young bull, one ram, and seven yearling male lambs—all healthy. Prepare a Grain-Offering of six quarts of fine flour mixed with oil for the bull, four quarts for the ram, and two quarts for each of the seven lambs. Also bring a he-goat as an Absolution-Offering to atone for you in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16
  - type: text
    text: '“Gather in holy worship on the fifteenth day of the seventh month; do no regular work. Celebrate a Festival to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for seven days. Bring a Whole-Burnt-Offering, a Fire-Gift of pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': thirteen young bulls, two rams, and fourteen yearling male lambs—all healthy. Prepare a Grain-Offering of six quarts of fine flour mixed with oil for each of the bulls, four quarts for each ram, and two quarts for each of the fourteen lambs. Also bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: '“On the second day: twelve young bulls, two rams, and fourteen yearling male lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: '“On the third day: eleven bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: '“On the fourth day: ten bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: '“On the fifth day: nine bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: '“On the sixth day: eight bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-34
  - type: text
    text: '“On the seventh day: seven bulls, two rams, and fourteen male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-38
  - type: text
    text: '“On the eighth day: Gather in holy worship; do no regular work. Bring a Fire-Gift of pleasing fragrance to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a Whole-Burnt-Offering: one bull, one ram, and seven male yearling lambs—all healthy. Prepare Grain-Offerings and Drink-Offerings to go with the bulls, rams, and lambs following the prescribed recipes. And bring a he-goat as an Absolution-Offering in addition to the regular Whole-Burnt-Offering with its Grain-Offering and Drink-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“Sacrifice these to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' as a congregation at your set feasts: your Whole-Burnt-Offerings, Grain-Offerings, Drink-Offerings, and Peace-Offerings. These are all over and above your personal Vow-Offerings and Freewill-Offerings.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Moses instructed the People of Israel in all that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded him.'
