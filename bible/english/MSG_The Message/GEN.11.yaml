document_id: GEN.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “God Turned Their Language into ‘Babble’”
  - type: text
    content: At one time, the whole Earth spoke the same language. It so happened that as they moved out of the east, they came upon a plain in the land of Shinar and settled down.
  '10':
  - type: text
    content: This is the story of Shem. When Shem was 100 years old, he had Arphaxad. It was two years after the flood. After he had Arphaxad, he lived 500 more years and had other sons and daughters.
  '12':
  - type: text
    content: When Arphaxad was thirty-five years old, he had Shelah. After Arphaxad had Shelah, he lived 403 more years and had other sons and daughters.
  '14':
  - type: text
    content: When Shelah was thirty years old, he had Eber. After Shelah had Eber, he lived 403 more years and had other sons and daughters.
  '16':
  - type: text
    content: When Eber was thirty-four years old, he had Peleg. After Eber had Peleg, he lived 430 more years and had other sons and daughters.
  '18':
  - type: text
    content: When Peleg was thirty years old, he had Reu. After he had Reu, he lived 209 more years and had other sons and daughters.
  '20':
  - type: text
    content: When Reu was thirty-two years old, he had Serug. After Reu had Serug, he lived 207 more years and had other sons and daughters.
  '22':
  - type: text
    content: When Serug was thirty years old, he had Nahor. After Serug had Nahor, he lived 200 more years and had other sons and daughters.
  '24':
  - type: text
    content: When Nahor was twenty-nine years old, he had Terah. After Nahor had Terah, he lived 119 more years and had other sons and daughters.
  '26':
  - type: text
    content: When Terah was seventy years old, he had Abram, Nahor, and Haran.
  - type: heading
    content: The Family Tree of Terah
  '27':
  - type: text
    content: This is the story of Terah. Terah had Abram, Nahor, and Haran.
  - type: text
    content: Haran had Lot. Haran died before his father, Terah, in the country of his family, Ur of the Chaldees.
  '29':
  - type: text
    content: Abram and Nahor each got married. Abram’s wife was Sarai; Nahor’s wife was Milcah, the daughter of his brother Haran. Haran had two daughters, Milcah and Iscah.
  '3':
  - type: text
    content: They said to one another, “Come, let’s make bricks and fire them well.” They used brick for stone and tar for mortar.
  '30':
  - type: text
    content: Sarai was barren; she had no children.
  '31':
  - type: text
    content: Terah took his son Abram, his grandson Lot (Haran’s son), and Sarai his daughter-in-law (his son Abram’s wife) and set out with them from Ur of the Chaldees for the land of Canaan. But when they got as far as Haran, they settled down there.
  '32':
  - type: text
    content: Terah lived 205 years. He died in Haran.
  '4':
  - type: text
    content: Then they said, “Come, let’s build ourselves a city and a tower that reaches Heaven. Let’s make ourselves famous so we won’t be scattered here and there across the Earth.”
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' came down to look over the city and the tower those people had built.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' took one look and said, “One people, one language; why, this is only a first step. No telling what they’ll come up with next—they’ll stop at nothing! Come, we’ll go down and garble their speech so they won’t understand each other.” Then '
  - type: text
    content: God
  - type: text
    content: ' scattered them from there all over the world. And they had to quit building the city. That’s how it came to be called Babel, because there '
  - type: text
    content: God
  - type: text
    content: ' turned their language into “babble.” From there '
  - type: text
    content: God
  - type: text
    content: ' scattered them all over the world.'
  - type: text
    content: '* * *'
