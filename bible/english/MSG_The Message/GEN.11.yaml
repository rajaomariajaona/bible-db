document_id: GEN.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Turned Their Language into ‘Babble’”'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: At one time, the whole Earth spoke the same language. It so happened that as they moved out of the east, they came upon a plain in the land of Shinar and settled down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They said to one another, “Come, let’s make bricks and fire them well.” They used brick for stone and tar for mortar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then they said, “Come, let’s build ourselves a city and a tower that reaches Heaven. Let’s make ourselves famous so we won’t be scattered here and there across the Earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came down to look over the city and the tower those people had built.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' took one look and said, “One people, one language; why, this is only a first step. No telling what they’ll come up with next—they’ll stop at nothing! Come, we’ll go down and garble their speech so they won’t understand each other.” Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' scattered them from there all over the world. And they had to quit building the city. That’s how it came to be called Babel, because there '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turned their language into “babble.” From there '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' scattered them all over the world.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: This is the story of Shem. When Shem was 100 years old, he had Arphaxad. It was two years after the flood. After he had Arphaxad, he lived 500 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: When Arphaxad was thirty-five years old, he had Shelah. After Arphaxad had Shelah, he lived 403 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: When Shelah was thirty years old, he had Eber. After Shelah had Eber, he lived 403 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: When Eber was thirty-four years old, he had Peleg. After Eber had Peleg, he lived 430 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: When Peleg was thirty years old, he had Reu. After he had Reu, he lived 209 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: When Reu was thirty-two years old, he had Serug. After Reu had Serug, he lived 207 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: When Serug was thirty years old, he had Nahor. After Serug had Nahor, he lived 200 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: When Nahor was twenty-nine years old, he had Terah. After Nahor had Terah, he lived 119 more years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When Terah was seventy years old, he had Abram, Nahor, and Haran.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family Tree of Terah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: This is the story of Terah. Terah had Abram, Nahor, and Haran.
- type: usfm
  marker: p
  children:
  - type: text
    text: Haran had Lot. Haran died before his father, Terah, in the country of his family, Ur of the Chaldees.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Abram and Nahor each got married. Abram’s wife was Sarai; Nahor’s wife was Milcah, the daughter of his brother Haran. Haran had two daughters, Milcah and Iscah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Sarai was barren; she had no children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Terah took his son Abram, his grandson Lot (Haran’s son), and Sarai his daughter-in-law (his son Abram’s wife) and set out with them from Ur of the Chaldees for the land of Canaan. But when they got as far as Haran, they settled down there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Terah lived 205 years. He died in Haran.
