document_id: HOS.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Religion Customized to Taste
  - type: text
    content: God once let loose against Ephraim
  - type: text
    content: 'a terrifying sentence against Israel:'
  - type: text
    content: Caught and convicted
  - type: text
    content: in the lewd sex-worship of Baal—they died!
  - type: text
    content: And now they’re back in the sin business again,
  - type: text
    content: manufacturing god-images they can use,
  - type: text
    content: 'Religion customized to taste. Professionals see to it:'
  - type: text
    content: Anything you want in a god you can get.
  - type: text
    content: Can you believe it? They sacrifice live babies to these dead gods—
  - type: text
    content: kill living babies and kiss golden calves!
  - type: text
    content: 'And now there’s nothing left to these people:'
  - type: text
    content: hollow men, desiccated women,
  - type: text
    content: Like scraps of paper blown down the street,
  - type: text
    content: like smoke in a gusty wind.
  '13':
  - type: text
    content: ' “When birth pangs signaled it was time to be born,'
  - type: text
    content: Ephraim was too stupid to come out of the womb.
  - type: text
    content: When the passage into life opened up,
  - type: text
    content: he didn’t show.
  - type: text
    content: Shall I intervene and pull them into life?
  - type: text
    content: Shall I snatch them from a certain death?
  - type: text
    content: Who is afraid of you, Death?
  - type: text
    content: Who cares about your threats, Tomb?
  - type: text
    content: In the end I’m abolishing regret,
  - type: text
    content: banishing sorrow,
  - type: text
    content: Even though Ephraim ran wild,
  - type: text
    content: the black sheep of the family.
  '15':
  - type: text
    content: ' “'
  - type: text
    content: God
  - type: text
    content: ’s tornado is on its way,
  - type: text
    content: roaring out of the desert.
  - type: text
    content: It will devastate the country,
  - type: text
    content: leaving a trail of ruin and wreckage.
  - type: text
    content: The cities will be gutted,
  - type: text
    content: dear possessions gone for good.
  - type: text
    content: Now Samaria has to face the charges
  - type: text
    content: 'because she has rebelled against her God:'
  - type: text
    content: Her people will be killed, babies smashed on the rocks,
  - type: text
    content: pregnant women ripped open.”
  '4':
  - type: text
    content: '“I’m still your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the God who saved you out of Egypt.
  - type: text
    content: I’m the only real God you’ve ever known.
  - type: text
    content: I’m the one and only God who delivers.
  - type: text
    content: I took care of you during the wilderness hard times,
  - type: text
    content: those years when you had nothing.
  - type: text
    content: I took care of you, took care of all your needs,
  - type: text
    content: gave you everything you needed.
  - type: text
    content: You were spoiled. You thought you didn’t need me.
  - type: text
    content: You forgot me.
  '7':
  - type: text
    content: “I’ll charge them like a lion,
  - type: text
    content: like a leopard stalking in the brush.
  - type: text
    content: I’ll jump them like a sow grizzly robbed of her cubs.
  - type: text
    content: I’ll rip out their guts.
  - type: text
    content: Coyotes will make a meal of them.
  - type: text
    content: Crows will clean their bones.
  - type: text
    content: I’m going to destroy you, Israel.
  - type: text
    content: Who is going to stop me?
  - type: text
    content: Where is your trusty king you thought would save you?
  - type: text
    content: Where are all the local leaders you wanted so badly?
  - type: text
    content: All these rulers you insisted on having,
  - type: text
    content: demanding, ‘Give me a king! Give me leaders!’?
  - type: text
    content: Well, long ago I gave you a king, but I wasn’t happy about it.
  - type: text
    content: Now, fed up, I’ve gotten rid of him.
  - type: text
    content: I have a detailed record of your infidelities—
  - type: text
    content: Ephraim’s sin documented and stored in a safe-deposit box.
