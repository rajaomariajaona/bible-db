document_id: HOS.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Religion Customized to Taste
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: God once let loose against Ephraim
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a terrifying sentence against Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Caught and convicted
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the lewd sex-worship of Baal—they died!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now they’re back in the sin business again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: manufacturing god-images they can use,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Religion customized to taste. Professionals see to it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Anything you want in a god you can get.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can you believe it? They sacrifice live babies to these dead gods—
- type: usfm
  marker: q2
  children:
  - type: text
    text: kill living babies and kiss golden calves!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And now there’s nothing left to these people:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: hollow men, desiccated women,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like scraps of paper blown down the street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like smoke in a gusty wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: '“I’m still your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God who saved you out of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m the only real God you’ve ever known.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m the one and only God who delivers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I took care of you during the wilderness hard times,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those years when you had nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I took care of you, took care of all your needs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gave you everything you needed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were spoiled. You thought you didn’t need me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You forgot me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-12
  - type: text
    text: “I’ll charge them like a lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a leopard stalking in the brush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll jump them like a sow grizzly robbed of her cubs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll rip out their guts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Coyotes will make a meal of them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Crows will clean their bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going to destroy you, Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is going to stop me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is your trusty king you thought would save you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where are all the local leaders you wanted so badly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: All these rulers you insisted on having,
- type: usfm
  marker: q2
  children:
  - type: text
    text: demanding, ‘Give me a king! Give me leaders!’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, long ago I gave you a king, but I wasn’t happy about it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now, fed up, I’ve gotten rid of him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have a detailed record of your infidelities—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim’s sin documented and stored in a safe-deposit box.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15a
  - type: text
    text: ' “When birth pangs signaled it was time to be born,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim was too stupid to come out of the womb.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the passage into life opened up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he didn’t show.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall I intervene and pull them into life?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall I snatch them from a certain death?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is afraid of you, Death?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who cares about your threats, Tomb?
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the end I’m abolishing regret,
- type: usfm
  marker: q2
  children:
  - type: text
    text: banishing sorrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though Ephraim ran wild,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the black sheep of the family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-16
  - type: text
    text: ' “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s tornado is on its way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: roaring out of the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will devastate the country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaving a trail of ruin and wreckage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cities will be gutted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dear possessions gone for good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now Samaria has to face the charges
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because she has rebelled against her God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her people will be killed, babies smashed on the rocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pregnant women ripped open.”
