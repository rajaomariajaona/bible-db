document_id: ISA.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: My Strength and Song
  - type: text
    content: And you will say in that day,
  - type: text
    content: '“I thank you, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: You were angry
  - type: text
    content: but your anger wasn’t forever.
  - type: text
    content: You withdrew your anger
  - type: text
    content: and moved in and comforted me.
  '2':
  - type: text
    content: “Yes, indeed—God is my salvation.
  - type: text
    content: I trust, I won’t be afraid.
  - type: text
    content: God
  - type: text
    content: '—yes '
  - type: text
    content: God
  - type: text
    content: '!—is my strength and song,'
  - type: text
    content: best of all, my salvation!”
  '3':
  - type: text
    content: Joyfully you’ll pull up buckets of water
  - type: text
    content: from the wells of salvation.
  - type: text
    content: And as you do it, you’ll say,
  - type: text
    content: '“Give thanks to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Call out his name.
  - type: text
    content: Ask him anything!
  - type: text
    content: Shout to the nations, tell them what he’s done,
  - type: text
    content: spread the news of his great reputation!
  '5':
  - type: text
    content: '“Sing praise-songs to '
  - type: text
    content: God
  - type: text
    content: . He’s done it all!
  - type: text
    content: Let the whole earth know what he’s done!
  - type: text
    content: Raise the roof! Sing your hearts out, O Zion!
  - type: text
    content: 'The Greatest lives among you: The Holy of Israel.”'
