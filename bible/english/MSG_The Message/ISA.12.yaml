document_id: ISA.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: My Strength and Song
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will say in that day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“I thank you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but your anger wasn’t forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You withdrew your anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and moved in and comforted me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, indeed—God is my salvation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I trust, I won’t be afraid.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '—yes '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!—is my strength and song,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: best of all, my salvation!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joyfully you’ll pull up buckets of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the wells of salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as you do it, you’ll say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Give thanks to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call out his name.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ask him anything!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout to the nations, tell them what he’s done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spread the news of his great reputation!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Sing praise-songs to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He’s done it all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the whole earth know what he’s done!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise the roof! Sing your hearts out, O Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Greatest lives among you: The Holy of Israel.”'
