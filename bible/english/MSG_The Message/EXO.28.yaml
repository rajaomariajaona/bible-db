document_id: EXO.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Vestments
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: '“Get your brother Aaron and his sons from among the Israelites to serve me as priests: Aaron and his sons Nadab, Abihu, Eleazar, Ithamar. Make sacred vestments for your brother Aaron to symbolize glory and beauty. Consult with the skilled craftsmen, those whom I have gifted in this work, and arrange for them to make Aaron’s vestments, to set him apart as holy, to act as priest for me. These are the articles of clothing they are to make: Breastpiece, Ephod, robe, woven tunic, turban, sash. They are making holy vestments for your brother Aaron and his sons as they work as priests for me. They will need gold; blue, purple, and scarlet material; and fine linen.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ephod
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-14
  - type: text
    text: '“Have the Ephod made from gold; blue, purple, and scarlet material; and fine twisted linen by a skilled craftsman. Give it two shoulder pieces at two of the corners so it can be fastened. The decorated band on it is to be just like it and of one piece with it: made of gold; blue, purple, and scarlet material; and of fine twisted linen. Next take two onyx stones and engrave the names of the sons of Israel on them in the order of their birth, six names on one stone and the remaining six on the other. Engrave the names of the sons of Israel on the two stones the way a jeweler engraves a seal. Then mount the stones in settings of filigreed gold. Fasten the two stones on the shoulder pieces of the Ephod—they are memorial stones for the Israelites. Aaron will wear these names on his shoulders as a memorial before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Make the settings of gold filigree. Make two chains of pure gold and braid them like cords, then attach the corded chains to the settings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Breastpiece
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-20a
  - type: text
    text: ' “Now make a Breastpiece of Judgment, using skilled craftsmen, the same as with the Ephod. Use gold; blue, purple, and scarlet material; and fine twisted linen. Make it nine inches square and folded double. Mount four rows of precious gemstones on it.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'First row: carnelian, topaz, emerald.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Second row: ruby, sapphire, crystal.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Third row: jacinth, agate, amethyst.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Fourth row: beryl, onyx, jasper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20b-21
  - type: text
    text: ' “Set them in gold filigree. The twelve stones correspond to the names of the Israelites, with twelve names engraved, one on each, as on a seal for the twelve tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-28
  - type: text
    text: “Then make braided chains of pure gold for the Breastpiece, like cords. Make two rings of gold for the Breastpiece and fasten them to the two ends. Fasten the two golden cords to the rings at the ends of the Breastpiece. Then fasten the other ends of the two cords to the two settings of filigree, attaching them to the shoulder pieces of the Ephod in front. Then make two rings of gold and fasten them to the two ends of the Breastpiece on its inside edge facing the Ephod. Then make two more rings of gold and fasten them in the front of the Ephod to the lower part of the two shoulder pieces, near the seam above the decorated band. Fasten the Breastpiece in place by running a cord of blue through its rings to the rings of the Ephod so that it rests secure on the decorated band of the Ephod and won’t come loose.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: '“Aaron will regularly carry the names of the sons of Israel on the Breastpiece of Judgment over his heart as he enters the Sanctuary into the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for remembrance. Place the Urim and Thummim in the Breastpiece of Judgment. They will be over Aaron’s heart when he enters the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. In this way Aaron will regularly carry the Breastpiece of Judgment into the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Robe
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-35
  - type: text
    text: '“Make the robe for the Ephod entirely of blue, with an opening for the head at the center and a hem on the edge so that it won’t tear. For the edge of the skirts make pomegranates of blue, purple, and scarlet material all around and alternate them with bells of gold—gold bell and pomegranate, gold bell and pomegranate—all around the hem of the robe. Aaron has to wear it when he does his priestly work. The bells will be heard when he enters the Holy Place and comes into the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and again when he comes out so that he won’t die.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Turban, Tunic, Underwear
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: '“Make a plate of pure gold. Engrave on it as on a seal: ‘Holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '.’ Tie it with a blue cord to the front of the turban. It is to rest there on Aaron’s forehead. He’ll take on any guilt involved in the sacred offerings that the Israelites dedicate, no matter what they bring. It will always be on Aaron’s forehead so that the offerings will be acceptable before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-41
  - type: text
    text: “Weave the tunic of fine linen. Make the turban of fine linen. The sash will be the work of an embroiderer. Make tunics, sashes, and hats for Aaron’s sons to express glory and beauty. Dress your brother Aaron and his sons in them. Anoint, ordain, and dedicate them to serve me as priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: “Make linen underwear to cover their nakedness from waist to thigh. Aaron and his sons must wear it whenever they enter the Tent of Meeting or approach the Altar to minister in the Holy Place so that they won’t incur guilt and die. This is a permanent rule for Aaron and all his priest-descendants.”
