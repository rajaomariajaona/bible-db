document_id: PSA.123,97
type_code: eng
verses:
  '1':
  - type: text
    content: I look to you, heaven-dwelling God,
  - type: text
    content: look up to you for help.
  - type: text
    content: Like servants, alert to their master’s commands,
  - type: text
    content: like a maiden attending her lady,
  - type: text
    content: We’re watching and waiting, holding our breath,
  - type: text
    content: awaiting your word of mercy.
  - type: text
    content: 'Mercy, '
  - type: text
    content: God
  - type: text
    content: ', mercy!'
  - type: text
    content: We’ve been kicked around long enough,
  - type: text
    content: Kicked in the teeth by complacent rich men,
  - type: text
    content: kicked when we’re down by arrogant brutes.
