    - type: text
      text: A Pile of Rubble
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, confront Mount Seir. Prophesy against it! Tell them, ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I’m coming down hard on you, Mount Seir.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m stepping in and turning you to a pile of rubble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll reduce your towns to piles of rocks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’ll be nothing left of you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then you’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: '“‘Because you said, “These two nations, these two countries, are mine. I’m taking over” (even though '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is right there watching, right there listening), I’ll turn your hate-bloated anger and rage right back on you. You’ll know I mean business when I bring judgment on you. You’ll realize then that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have overheard all the vile abuse you’ve poured out against the mountains of Israel, saying, “They’re roadkill and we’re going to eat them up.” You’ve strutted around, talking so big, insolently pitting yourselves against me. And I’ve heard it all.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: '“‘This is the verdict of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master: With the whole earth applauding, I’ll demolish you. Since you danced in the streets, thinking it was so wonderful when Israel’s inheritance was demolished, I’ll give you the same treatment: demolition. Mount Seir demolished—yes, every square inch of Edom. Then they’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!’”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: '“‘I’m doing this because you’ve kept this age-old grudge going against Israel: You viciously attacked them when they were already down, looking their final punishment in the face. Therefore, as sure as I am the living God, I’m lining you up for a real bloodbath. Since you loved blood so much, you’ll be chased by rivers of blood. I’ll reduce Mount Seir to a heap of rubble. No one will either come or go from that place! I’ll blanket your mountains with corpses. Massacred bodies will cover your hills and fill up your valleys and ditches. I’ll reduce you to ruins and all your towns will be ghost towns—population zero. Then you’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
