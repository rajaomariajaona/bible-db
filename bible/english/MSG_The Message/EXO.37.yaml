document_id: EXO.37,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chest
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Bezalel made the Chest using acacia wood: He made it three and three-quarters feet long and two and a quarter feet wide and deep. He covered it inside and out with a veneer of pure gold and made a molding of gold all around it. He cast four gold rings and attached them to its four feet, two rings on one side and two rings on the other. He made poles from acacia wood, covered them with a veneer of gold, and inserted the poles for carrying the Chest into the rings on the sides.'
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He made the Table from acacia wood. He made it three feet long, one and a half feet wide and two and a quarter feet high. He covered it with a veneer of pure gold and made a molding of gold all around it. He made a border a handbreadth wide all around it and a rim of gold for the border. He cast four rings of gold for it and attached the rings to the four legs parallel to the tabletop. They will serve as holders for the poles used to carry the Table. He made the poles of acacia wood and covered them with a veneer of gold. They will be used to carry the Table.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out of pure gold he made the utensils for the Table: its plates, bowls, jars, and jugs used for pouring.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lampstand
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He made a Lampstand of pure hammered gold, making its stem and branches, cups, calyxes, and petals all of one piece. It had six branches, three from one side and three from the other; three cups shaped like almond blossoms with calyxes and petals on one branch, three on the next, and so on—the same for all six branches. On the main stem of the Lampstand, there were four cups shaped like almonds, with calyxes and petals, a calyx extending from under each pair of the six branches. The entire Lampstand with its calyxes and stems was fashioned from one piece of hammered pure gold. He made seven of these lamps with their candle snuffers, all out of pure gold.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He used a seventy-five-pound brick of pure gold to make the Lampstand and its accessories.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar of Incense
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He made an Altar for burning incense from acacia wood. He made it a foot and a half square and three feet high, with its horns of one piece with it. He covered it with a veneer of pure gold, its top, sides, and horns, and made a gold molding around it with two rings of gold beneath the molding. He placed the rings on the two opposing sides to serve as holders for poles by which it will be carried. He made the poles of acacia wood and covered them with a veneer of gold.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also prepared with the art of a perfumer the holy anointing oil and the pure aromatic incense.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next he made a lid of pure gold for the Chest, an Atonement-Cover, three and three-quarters feet long and two and a quarter feet wide.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He sculpted two winged angel-cherubim out of hammered gold for the ends of the Atonement-Cover, one angel at one end, one angel at the other. He made them of one piece with the Atonement-Cover. The angels had outstretched wings and appeared to hover over the Atonement-Cover, facing one another but looking down on the Atonement-Cover.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Table
    marker-yv: yv-h
