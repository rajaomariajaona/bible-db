document_id: 1PE.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: So clean house! Make a clean sweep of malice and pretense, envy and hurtful talk. You’ve had a taste of God. Now, like infants at the breast, drink deep of God’s pure kindness. Then you’ll grow up mature and whole in God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Stone
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: 'Welcome to the living Stone, the source of life. The workmen took one look and threw it out; God set it in the place of honor. Present yourselves as building stones for the construction of a sanctuary vibrant with life, in which you’ll serve as holy priests offering Christ-approved lives up to God. The Scriptures provide precedent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look! I’m setting a stone in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cornerstone in the place of honor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever trusts in this stone as a foundation
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never have cause to regret it.
- type: usfm
  marker: m
  children:
  - type: text
    text: To you who trust him, he’s a Stone to be proud of, but to those who refuse to trust him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stone the workmen threw out
- type: usfm
  marker: q2
  children:
  - type: text
    text: is now the chief foundation stone.
- type: usfm
  marker: m
  children:
  - type: text
    text: For the untrusting it’s
- type: usfm
  marker: q1
  children:
  - type: text
    text: . . . a stone to trip over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a boulder blocking the way.
- type: usfm
  marker: m
  children:
  - type: text
    text: They trip and fall because they refuse to obey, just as predicted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: But you are the ones chosen by God, chosen for the high calling of priestly work, chosen to be a holy people, God’s instruments to do his work and speak out for him, to tell others of the night-and-day difference he made for you—from nothing to something, from rejected to accepted.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Friends, this world is not your home, so don’t make yourselves cozy in it. Don’t indulge your ego at the expense of your soul. Live an exemplary life in your neighborhood so that your actions will refute their prejudices. Then they’ll be won over to God’s side and be there to join in the celebration when he arrives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: Make the Master proud of you by being good citizens. Respect the authorities, whatever their level; they are God’s emissaries for keeping order. It is God’s will that by doing good, you might cure the ignorance of the fools who think you’re a danger to society. Exercise your freedom by serving God, not by breaking the rules. Treat everyone you meet with dignity. Love your spiritual family. Revere God. Respect the government.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Kind of Life He Lived
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: You who are servants, be good servants to your masters—not just to good masters, but also to bad ones. What counts is that you put up with it for God’s sake when you’re treated badly for no good reason. There’s no particular virtue in accepting punishment that you well deserve. But if you’re treated badly for good behavior and continue in spite of it to be a good servant, that is what counts with God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: This is the kind of life you’ve been invited into, the kind of life Christ lived. He suffered everything that came his way so you would know that it could be done, and also know how to do it, step-by-step.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He never did one thing wrong,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not once said anything amiss.
- type: usfm
  marker: m
  children:
  - type: text
    text: They called him every name in the book and he said nothing back. He suffered in silence, content to let God set things right. He used his servant body to carry our sins to the Cross so we could be rid of sin, free to live the right way. His wounds became your healing. You were lost sheep with no idea who you were or where you were going. Now you’re named and kept for good by the Shepherd of your souls.
