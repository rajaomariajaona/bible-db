document_id: ZEC.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Home Again in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'War Bulletin:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message concerning Israel, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree—the very '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who threw the skies into space, set earth on a firm foundation, and breathed his own life into men and women: “Watch for this: I’m about to turn Jerusalem into a cup of strong drink that will have the people who have set siege to Judah and Jerusalem staggering in a drunken stupor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “On the Big Day, I’ll turn Jerusalem into a huge stone blocking the way for everyone. All who try to lift it will rupture themselves. All the pagan nations will come together and try to get rid of it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: '“On the Big Day”—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' speaking—“I’ll throw all the war horses into a crazed panic, and their riders along with them. But I’ll keep my eye on Judah, watching out for her at the same time that I make the enemy horses go blind. The families of Judah will then realize, ‘Why, our leaders are strong and able through '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, their personal God.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “On the Big Day, I’ll turn the families of Judah into something like a burning match in a tinder-dry forest, like a fiercely flaming torch in a barn full of hay. They’ll burn up everything and everyone in sight—people to the right, people to the left—while Jerusalem fills up with people moving in and making themselves at home—home again in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will begin by restoring the common households of Judah so that the glory of David’s family and the leaders in Jerusalem won’t overshadow the ordinary people in Judah. On the Big Day, I’ll look after everyone who lives in Jerusalem so that the lowliest, weakest person will be as glorious as David and the family of David itself will be godlike, like the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' leading the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “On the Big Day, I’ll make a clean sweep of all the godless nations that fought against Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: '“Next I’ll deal with the family of David and those who live in Jerusalem. I’ll pour a spirit of grace and prayer over them. They’ll then be able to recognize me as the One they so grievously wounded—that piercing spear-thrust! And they’ll weep—oh, how they’ll weep! Deep mourning as of a parent grieving the loss of the firstborn child. The lamentation in Jerusalem that day will be massive, as famous as the lamentation over Hadad-Rimmon on the fields of Megiddo:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone will weep and grieve,
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'the land and everyone in it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The family of David off by itself
- type: usfm
  marker: q3
  children:
  - type: text
    text: and their women off by themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The family of Nathan off by itself
- type: usfm
  marker: q3
  children:
  - type: text
    text: and their women off by themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The family of Levi off by itself
- type: usfm
  marker: q3
  children:
  - type: text
    text: and their women off by themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The family of Shimei off by itself
- type: usfm
  marker: q3
  children:
  - type: text
    text: and their women off by themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the rest of the families off by themselves
- type: usfm
  marker: q3
  children:
  - type: text
    text: and their women off by themselves.”
