document_id: EZK.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bring the Pot to a Boil
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' came to me in the ninth year, the tenth month, and the tenth day of the month: “Son of man, write down this date. The king of Babylon has laid siege to Jerusalem this very day. Tell this company of rebels a story:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Put on the soup pot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fill it with water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put chunks of meat into it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the choice pieces—loin and brisket.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pick out the best soup bones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the best of the sheep in the flock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pile wood beneath the pot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring it to a boil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cook the soup.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘Your encrusted filth is your filthy sex. I wanted to clean you up, but you wouldn’t let me. I’ll make no more attempts at cleaning you up until my anger quiets down. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have said it, and I’ll do it. I’m not holding back. I’ve run out of compassion. I’m not changing my mind. You’re getting exactly what’s coming to you. Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.’”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Tears
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, I’m about to take from you the delight of your life—a real blow, I know. But, please, no tears. Keep your grief to yourself. No public mourning. Get dressed as usual and go about your work—none of the usual funeral rituals.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I preached to the people in the morning. That evening my wife died. The next morning I did as I’d been told.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people came to me, saying, “Tell us why you’re acting like this. What does it mean, anyway?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I told them, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word came to me, saying, ‘Tell the family of Israel, This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says: I will desecrate my Sanctuary, your proud impregnable fort, the delight of your life, your heart’s desire. The children you left behind will be killed.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘Then you’ll do exactly as I’ve done. You’ll perform none of the usual funeral rituals. You’ll get dressed as usual and go about your work. No tears. But your sins will eat away at you from within and you’ll groan among yourselves. Ezekiel will be your example. The way he did it is the way you’ll do it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘When this happens you’ll recognize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.’”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you, son of man: The day I take away the people’s refuge, their great joy, the delight of their life, what they’ve most longed for, along with all their children—on that very day a survivor will arrive and tell you what happened to the city. You’ll break your silence and start talking again, talking to the survivor. Again, you’ll be an example for them. And they’ll recognize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Doom to the city of murder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the pot thick with scum,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thick with a filth that can’t be scoured.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empty the pot piece by piece;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t bother who gets what.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘The blood from murders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has stained the whole city;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blood runs bold on the street stones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one bothering to wash it off—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blood out in the open to public view
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to provoke my wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to trigger my vengeance.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘Therefore, this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Doom to the city of murder!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I, too, will pile on the wood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stack the wood high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: light the match,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cook the meat, spice it well, pour out the broth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then burn the bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll set the empty pot on the coals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and heat it red-hot so the bronze glows,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the germs are killed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the corruption is burned off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it’s hopeless. It’s too far gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The filth is too thick.
