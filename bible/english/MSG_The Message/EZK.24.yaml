type_code: eng
verses:
  '1':
  - type: heading
    content: Bring the Pot to a Boil
  - type: text
    content: 'The Message of '
  - type: text
    content: God
  - type: text
    content: ' came to me in the ninth year, the tenth month, and the tenth day of the month: “Son of man, write down this date. The king of Babylon has laid siege to Jerusalem this very day. Tell this company of rebels a story:'
  - type: text
    content: “‘Put on the soup pot.
  - type: text
    content: Fill it with water.
  - type: text
    content: Put chunks of meat into it,
  - type: text
    content: all the choice pieces—loin and brisket.
  - type: text
    content: Pick out the best soup bones
  - type: text
    content: from the best of the sheep in the flock.
  - type: text
    content: Pile wood beneath the pot.
  - type: text
    content: Bring it to a boil
  - type: text
    content: and cook the soup.
  '13':
  - type: text
    content: '“‘Your encrusted filth is your filthy sex. I wanted to clean you up, but you wouldn’t let me. I’ll make no more attempts at cleaning you up until my anger quiets down. I, '
  - type: text
    content: God
  - type: text
    content: ', have said it, and I’ll do it. I’m not holding back. I’ve run out of compassion. I’m not changing my mind. You’re getting exactly what’s coming to you. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
  - type: heading
    content: No Tears
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, I’m about to take from you the delight of your life—a real blow, I know. But, please, no tears. Keep your grief to yourself. No public mourning. Get dressed as usual and go about your work—none of the usual funeral rituals.”'
  '18':
  - type: text
    content: I preached to the people in the morning. That evening my wife died. The next morning I did as I’d been told.
  '19':
  - type: text
    content: The people came to me, saying, “Tell us why you’re acting like this. What does it mean, anyway?”
  '20':
  - type: text
    content: So I told them, “
  - type: text
    content: God
  - type: text
    content: '’s Word came to me, saying, ‘Tell the family of Israel, This is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says: I will desecrate my Sanctuary, your proud impregnable fort, the delight of your life, your heart’s desire. The children you left behind will be killed.'
  '22':
  - type: text
    content: “‘Then you’ll do exactly as I’ve done. You’ll perform none of the usual funeral rituals. You’ll get dressed as usual and go about your work. No tears. But your sins will eat away at you from within and you’ll groan among yourselves. Ezekiel will be your example. The way he did it is the way you’ll do it.
  - type: text
    content: '“‘When this happens you’ll recognize that I am '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
  '25':
  - type: text
    content: '“And you, son of man: The day I take away the people’s refuge, their great joy, the delight of their life, what they’ve most longed for, along with all their children—on that very day a survivor will arrive and tell you what happened to the city. You’ll break your silence and start talking again, talking to the survivor. Again, you’ll be an example for them. And they’ll recognize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  '6':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘Doom to the city of murder,
  - type: text
    content: to the pot thick with scum,
  - type: text
    content: thick with a filth that can’t be scoured.
  - type: text
    content: Empty the pot piece by piece;
  - type: text
    content: don’t bother who gets what.
  '7':
  - type: text
    content: “‘The blood from murders
  - type: text
    content: has stained the whole city;
  - type: text
    content: Blood runs bold on the street stones,
  - type: text
    content: with no one bothering to wash it off—
  - type: text
    content: Blood out in the open to public view
  - type: text
    content: to provoke my wrath,
  - type: text
    content: to trigger my vengeance.
  '9':
  - type: text
    content: '“‘Therefore, this is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘Doom to the city of murder!
  - type: text
    content: I, too, will pile on the wood.
  - type: text
    content: Stack the wood high,
  - type: text
    content: light the match,
  - type: text
    content: Cook the meat, spice it well, pour out the broth,
  - type: text
    content: and then burn the bones.
  - type: text
    content: Then I’ll set the empty pot on the coals
  - type: text
    content: and heat it red-hot so the bronze glows,
  - type: text
    content: So the germs are killed
  - type: text
    content: and the corruption is burned off.
  - type: text
    content: But it’s hopeless. It’s too far gone.
  - type: text
    content: The filth is too thick.
