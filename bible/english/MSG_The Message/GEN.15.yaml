document_id: GEN.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After all these things, this word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came to Abram in a vision: “Don’t be afraid, Abram. I’m your shield. Your reward will be grand!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Abram said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Master, what use are your gifts as long as I’m childless and Eliezer of Damascus is going to inherit everything?” Abram continued, “See, you’ve given me no children, and now a mere house servant is going to get it all.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came: “Don’t worry, he won’t be your heir; a son from your body will be your heir.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he took him outside and said, “Look at the sky. Count the stars. Can you do it? Count your descendants! You’re going to have a big family, Abram!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he believed! Believed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! God declared him “Set-Right-with-God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' continued, “I’m the same '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who brought you from Ur of the Chaldees and gave you this land to own.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abram said, “Master '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', how am I to know this, that it will all be mine?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Bring me a heifer, a goat, and a ram, each three years old, and a dove and a young pigeon.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: He brought all these animals to him, split them down the middle, and laid the halves opposite each other. But he didn’t split the birds. Vultures swooped down on the carcasses, but Abram scared them off. As the sun went down a deep sleep overcame Abram and then a sense of dread, dark and heavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Abram, “Know this: your descendants will live as outsiders in a land not theirs; they’ll be enslaved and beaten down for 400 years. Then I’ll punish their slave masters; your offspring will march out of there loaded with plunder. But not you; you’ll have a long and full life and die a good and peaceful death. Not until the fourth generation will your descendants return here; sin is still a thriving business among the Amorites.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: 'When the sun was down and it was dark, a smoking firepot and a flaming torch moved between the split carcasses. That’s when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made a covenant with Abram: “I’m giving this land to your children, from the Nile River in Egypt to the River Euphrates in Assyria—the country of the Kenites, Kenizzites, Kadmonites, Hittites, Perizzites, Rephaim, Amorites, Canaanites, Girgashites, and Jebusites.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
