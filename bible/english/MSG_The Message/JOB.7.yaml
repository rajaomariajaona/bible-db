document_id: JOB.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: There’s Nothing to My Life
  - type: text
    content: “Human life is a struggle, isn’t it?
  - type: text
    content: It’s a life sentence to hard labor.
  - type: text
    content: Like field hands longing for quitting time
  - type: text
    content: and working stiffs with nothing to hope for but payday,
  - type: text
    content: I’m given a life that meanders and goes nowhere—
  - type: text
    content: months of aimlessness, nights of misery!
  - type: text
    content: I go to bed and think, ‘How long till I can get up?’
  - type: text
    content: I toss and turn as the night drags on—and I’m fed up!
  - type: text
    content: I’m covered with maggots and scabs.
  - type: text
    content: My skin gets scaly and hard, then oozes with pus.
  - type: text
    content: My days come and go swifter than the click of knitting needles,
  - type: text
    content: and then the yarn runs out—an unfinished life!
  '11':
  - type: text
    content: “And so I’m not keeping one bit of this quiet,
  - type: text
    content: I’m laying it all out on the table;
  - type: text
    content: my complaining to high heaven is bitter, but honest.
  - type: text
    content: Are you going to put a muzzle on me,
  - type: text
    content: the way you quiet the sea and still the storm?
  - type: text
    content: If I say, ‘I’m going to bed, then I’ll feel better.
  - type: text
    content: A little nap will lift my spirits,’
  - type: text
    content: You come and so scare me with nightmares
  - type: text
    content: and frighten me with ghosts
  - type: text
    content: That I’d rather strangle in the sheets
  - type: text
    content: than face this kind of life any longer.
  - type: text
    content: I hate this life! Who needs any more of this?
  - type: text
    content: Let me alone! There’s nothing to my life—it’s nothing
  - type: text
    content: but smoke.
  '17':
  - type: text
    content: “What are mortals anyway, that you bother with them,
  - type: text
    content: that you even give them the time of day?
  - type: text
    content: That you check up on them every morning,
  - type: text
    content: looking in on them to see how they’re doing?
  - type: text
    content: Let up on me, will you?
  - type: text
    content: Can’t you even let me spit in peace?
  - type: text
    content: Even suppose I’d sinned—how would that hurt you?
  - type: text
    content: You’re responsible for every human being.
  - type: text
    content: Don’t you have better things to do than pick on me?
  - type: text
    content: Why make a federal case out of me?
  - type: text
    content: Why don’t you just forgive my sins
  - type: text
    content: and start me off with a clean slate?
  - type: text
    content: The way things are going, I’ll soon be dead.
  - type: text
    content: You’ll look high and low, but I won’t be around.”
  '7':
  - type: text
    content: “God, don’t forget that I’m only a wisp of air!
  - type: text
    content: These eyes have had their last look at goodness.
  - type: text
    content: And your eyes have seen the last of me;
  - type: text
    content: even while you’re looking, there’ll be nothing left to look at.
  - type: text
    content: When a cloud evaporates, it’s gone for good;
  - type: text
    content: those who go to the grave never come back.
  - type: text
    content: They don’t return to visit their families;
  - type: text
    content: never again will friends drop in for coffee.
