document_id: JOB.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: There’s Nothing to My Life
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: “Human life is a struggle, isn’t it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s a life sentence to hard labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like field hands longing for quitting time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and working stiffs with nothing to hope for but payday,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m given a life that meanders and goes nowhere—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: months of aimlessness, nights of misery!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I go to bed and think, ‘How long till I can get up?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I toss and turn as the night drags on—and I’m fed up!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m covered with maggots and scabs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My skin gets scaly and hard, then oozes with pus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My days come and go swifter than the click of knitting needles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then the yarn runs out—an unfinished life!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-16
    - type: text
      text: “And so I’m not keeping one bit of this quiet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m laying it all out on the table;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my complaining to high heaven is bitter, but honest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you going to put a muzzle on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the way you quiet the sea and still the storm?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I say, ‘I’m going to bed, then I’ll feel better.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A little nap will lift my spirits,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You come and so scare me with nightmares
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and frighten me with ghosts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I’d rather strangle in the sheets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than face this kind of life any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate this life! Who needs any more of this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me alone! There’s nothing to my life—it’s nothing
  - type: usfm
    marker: q3
    children:
    - type: text
      text: but smoke.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-21
    - type: text
      text: “What are mortals anyway, that you bother with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you even give them the time of day?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you check up on them every morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking in on them to see how they’re doing?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let up on me, will you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can’t you even let me spit in peace?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even suppose I’d sinned—how would that hurt you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re responsible for every human being.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you have better things to do than pick on me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why make a federal case out of me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why don’t you just forgive my sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and start me off with a clean slate?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way things are going, I’ll soon be dead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll look high and low, but I won’t be around.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: “God, don’t forget that I’m only a wisp of air!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: These eyes have had their last look at goodness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your eyes have seen the last of me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even while you’re looking, there’ll be nothing left to look at.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a cloud evaporates, it’s gone for good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who go to the grave never come back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They don’t return to visit their families;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again will friends drop in for coffee.
