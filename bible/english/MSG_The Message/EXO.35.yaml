document_id: EXO.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Building the Place of Worship
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moses spoke to the entire congregation of Israel, saying, “These are the things that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has commanded you to do:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“Work six days, but the seventh day will be a holy rest day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s holy rest day. Anyone who works on this day must be put to death. Don’t light any fires in your homes on the Sabbath day.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Offerings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moses spoke to the entire congregation of Israel, saying, “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has commanded:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9
  - type: text
    text: '“Gather from among you an offering for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Receive on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s behalf what everyone is willing to give as an offering: gold, silver, bronze; blue, purple, and scarlet material; fine linen; goats’ hair; tanned rams’ skins; dolphin skins; acacia wood; lamp oil; spices for anointing oils and for fragrant incense; onyx stones and other stones for setting in the Ephod and the Breastpiece.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-19
  - type: text
    text: '“Come—all of you who have skills—come and make everything that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has commanded: The Dwelling with its tent and cover, its hooks, frames, crossbars, posts, and bases; the Chest with its poles, the Atonement-Cover and veiling curtain; the Table with its poles and implements and the Bread of the Presence; the Lampstand for giving light with its furnishings and lamps and the oil for lighting; the Altar of Incense with its poles, the anointing oil, the fragrant incense; the screen for the door at the entrance to The Dwelling; the Altar of Whole-Burnt-Offering with its bronze grate and poles and all its implements; the Washbasin with its base; the tapestry hangings for the Courtyard with the posts and bases, the screen for the Courtyard gate; the pegs for The Dwelling, the pegs for the Courtyard with their cords; the official vestments for ministering in the Holy Place, the sacred vestments for Aaron the priest and for his sons serving as priests.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-26
  - type: text
    text: 'So everyone in the community of Israel left the presence of Moses. Then they came back, every one whose heart was roused, whose spirit was freely responsive, bringing offerings to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for building the Tent of Meeting, furnishing it for worship and making the holy vestments. They came, both men and women, all the willing spirits among them, offering brooches, earrings, rings, necklaces—anything made of gold—offering up their gold jewelry to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. And anyone who had blue, purple, and scarlet fabrics; fine linen; goats’ hair; tanned leather; and dolphin skins brought them. Everyone who wanted to offer up silver or bronze as a gift to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brought it. Everyone who had acacia wood that could be used in the work, brought it. All the women skilled at weaving brought their weavings of blue and purple and scarlet fabrics and their fine linens. And all the women who were gifted in spinning, spun the goats’ hair.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: 'The leaders brought onyx and other precious stones for setting in the Ephod and the Breastpiece. They also brought spices and olive oil for lamp oil, anointing oil, and incense. Every man and woman in Israel whose heart moved them freely to bring something for the work that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' through Moses had commanded them to make, brought it, a voluntary offering for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bezalel and Oholiab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-35
  - type: text
    text: 'Moses told the Israelites, “See, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has selected Bezalel son of Uri, son of Hur, of the tribe of Judah. He’s filled him with the Spirit of God, with skill, ability, and know-how for making all sorts of things, to design and work in gold, silver, and bronze; to carve stones and set them; to carve wood, working in every kind of skilled craft. And he’s also made him a teacher, he and Oholiab son of Ahisamach, of the tribe of Dan. He’s gifted them with the know-how needed for carving, designing, weaving, and embroidering in blue, purple, and scarlet fabrics, and in fine linen. They can make anything and design anything.”'
