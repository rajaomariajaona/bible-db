document_id: 1CH.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Fights
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the days that followed, David struck hard at the Philistines, bringing them to their knees, captured Gath, and took control of the surrounding countryside.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Abishai son of Zeruiah fought and defeated the Edomites in the Valley of Salt—eighteen thousand of them. He set up a puppet government in Edom and the Edomites became subjects under David.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave David victory wherever he marched.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-17
    - type: text
      text: Thus David ruled over all of Israel. He ruled well, fair and evenhanded in all his duties and relationships.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joab son of Zeruiah was head of the army;
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat son of Ahilud was in charge of public records;
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zadok son of Ahitub and Abimelech son of Abiathar were priests;
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shavsha was secretary;
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benaiah son of Jehoiada was over the special forces, the Kerethites and Pelethites;
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David’s sons held high positions, close to the king.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He also fought and defeated Moab. The Moabites came under David’s rule and paid regular tribute.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: On his way to restore his sovereignty at the Euphrates River, David defeated Hadadezer king of Zobah (over toward Hamath). David captured a thousand chariots, seven thousand cavalry, and twenty thousand infantry from him. He hamstrung all the chariot horses, but saved back a hundred.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'When the Arameans from Damascus came to the aid of Hadadezer king of Zobah, David killed twenty-two thousand of them. David set up a puppet government in Aram-Damascus. The Arameans became subjects of David and were forced to bring tribute. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave victory to David wherever he marched.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: David plundered the gold shields that belonged to the servants of Hadadezer and brought them to Jerusalem. He also looted Tebah and Cun, cities of Hadadezer, of a huge quantity of bronze that Solomon later used to make the Great Bronze Sea, the Pillars, and bronze equipment in The Temple.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'Tou king of Hamath heard that David had struck down the entire army of Hadadezer king of Zobah. He sent his son Hadoram to King David to greet and congratulate him for fighting and defeating Hadadezer. Tou and Hadadezer were old enemies. Hadoram brought David various things made of silver, gold, and bronze. King David consecrated these things along with the silver and gold that he had plundered from other nations: Edom, Moab, the Ammonites, the Philistines, and Amalek.'
