document_id: 1CH.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: David Fights
  - type: text
    content: In the days that followed, David struck hard at the Philistines, bringing them to their knees, captured Gath, and took control of the surrounding countryside.
  '12':
  - type: text
    content: Abishai son of Zeruiah fought and defeated the Edomites in the Valley of Salt—eighteen thousand of them. He set up a puppet government in Edom and the Edomites became subjects under David.
  - type: text
    content: God
  - type: text
    content: ' gave David victory wherever he marched.'
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: Thus David ruled over all of Israel. He ruled well, fair and evenhanded in all his duties and relationships.
  - type: text
    content: Joab son of Zeruiah was head of the army;
  - type: text
    content: Jehoshaphat son of Ahilud was in charge of public records;
  - type: text
    content: Zadok son of Ahitub and Abimelech son of Abiathar were priests;
  - type: text
    content: Shavsha was secretary;
  - type: text
    content: Benaiah son of Jehoiada was over the special forces, the Kerethites and Pelethites;
  - type: text
    content: And David’s sons held high positions, close to the king.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: He also fought and defeated Moab. The Moabites came under David’s rule and paid regular tribute.
  '3':
  - type: text
    content: On his way to restore his sovereignty at the Euphrates River, David defeated Hadadezer king of Zobah (over toward Hamath). David captured a thousand chariots, seven thousand cavalry, and twenty thousand infantry from him. He hamstrung all the chariot horses, but saved back a hundred.
  '5':
  - type: text
    content: 'When the Arameans from Damascus came to the aid of Hadadezer king of Zobah, David killed twenty-two thousand of them. David set up a puppet government in Aram-Damascus. The Arameans became subjects of David and were forced to bring tribute. '
  - type: text
    content: God
  - type: text
    content: ' gave victory to David wherever he marched.'
  '7':
  - type: text
    content: David plundered the gold shields that belonged to the servants of Hadadezer and brought them to Jerusalem. He also looted Tebah and Cun, cities of Hadadezer, of a huge quantity of bronze that Solomon later used to make the Great Bronze Sea, the Pillars, and bronze equipment in The Temple.
  '9':
  - type: text
    content: 'Tou king of Hamath heard that David had struck down the entire army of Hadadezer king of Zobah. He sent his son Hadoram to King David to greet and congratulate him for fighting and defeating Hadadezer. Tou and Hadadezer were old enemies. Hadoram brought David various things made of silver, gold, and bronze. King David consecrated these things along with the silver and gold that he had plundered from other nations: Edom, Moab, the Ammonites, the Philistines, and Amalek.'
