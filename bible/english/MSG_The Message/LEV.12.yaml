    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Tell the People of Israel, A woman who conceives and gives birth to a boy is ritually unclean for seven days, the same as during her menstruation. On the eighth day circumcise the boy. The mother must stay home another thirty-three days for purification from her bleeding. She may not touch anything holy or enter the Sanctuary until the days of her purification are complete. If she gives birth to a girl, she is unclean for fourteen days, the same as during her menstruation. She must stay home for sixty-six days for purification from her bleeding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: '“When the days for her purification for either a boy or a girl are complete, she will bring a yearling lamb for a Whole-Burnt-Offering and a pigeon or dove for an Absolution-Offering to the priest at the entrance of the Tent of Meeting. He will offer it to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and make atonement for her. She is then clean from her flow of blood.'
- type: usfm
  marker: p
  children:
  - type: text
    text: “These are the instructions for a woman who gives birth to either a boy or a girl.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “If she can’t afford a lamb, she can bring two doves or two pigeons, one for the Whole-Burnt-Offering and one for the Absolution-Offering. The priest will make atonement for her and she will be clean.”
