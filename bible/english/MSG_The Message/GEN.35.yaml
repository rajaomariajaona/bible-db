document_id: GEN.35,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'God spoke to Jacob: “Go back to Bethel. Stay there and build an altar to the God who revealed himself to you when you were running for your life from your brother Esau.”'
  '11':
  - type: text
    content: God continued,
  - type: text
    content: I am The Strong God.
  - type: text
    content: Have children! Flourish!
  - type: text
    content: A nation—a whole company of nations!—
  - type: text
    content: will come from you.
  - type: text
    content: Kings will come from your loins;
  - type: text
    content: the land I gave Abraham and Isaac
  - type: text
    content: I now give to you,
  - type: text
    content: and pass it on to your descendants.
  '13':
  - type: text
    content: And then God was gone, ascended from the place where he had spoken with him.
  '14':
  - type: text
    content: Jacob set up a stone pillar on the spot where God had spoken with him. He poured a drink offering on it and anointed it with oil. Jacob dedicated the place where God had spoken with him, Bethel (God’s-House).
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: They left Bethel. They were still quite a ways from Ephrath when Rachel went into labor—hard, hard labor. When her labor pains were at their worst, the midwife said to her, “Don’t be afraid—you have another boy.”
  '18':
  - type: text
    content: With her last breath, for she was now dying, she named him Ben-oni (Son-of-My-Pain), but his father named him Ben-jamin (Son-of-Good-Fortune).
  '19':
  - type: text
    content: Rachel died and was buried on the road to Ephrath, that is, Bethlehem. Jacob set up a pillar to mark her grave. It is still there today, “Rachel’s Grave Stone.”
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: Jacob told his family and all those who lived with him, “Throw out all the alien gods which you have, take a good bath and put on clean clothes, we’re going to Bethel. I’m going to build an altar there to the God who answered me when I was in trouble and has stuck with me everywhere I’ve gone since.”
  '21':
  - type: text
    content: ' Israel kept on his way and set up camp at Migdal Eder. While Israel was living in that region, Reuben went and slept with his father’s concubine, Bilhah. And Israel heard of what he did.'
  - type: text
    content: '* * *'
  '22':
  - type: text
    content: ' There were twelve sons of Jacob.'
  - type: text
    content: 'The sons by Leah:'
  - type: text
    content: Reuben, Jacob’s firstborn
  - type: text
    content: Simeon
  - type: text
    content: Levi
  - type: text
    content: Judah
  - type: text
    content: Issachar
  - type: text
    content: Zebulun.
  - type: text
    content: 'The sons by Rachel:'
  - type: text
    content: Joseph
  - type: text
    content: Benjamin.
  - type: text
    content: 'The sons by Bilhah, Rachel’s maid:'
  - type: text
    content: Dan
  - type: text
    content: Naphtali.
  - type: text
    content: 'The sons by Zilpah, Leah’s maid:'
  - type: text
    content: Gad
  - type: text
    content: Asher.
  - type: text
    content: These were Jacob’s sons, born to him in Paddan Aram.
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: Finally, Jacob made it back home to his father Isaac at Mamre in Kiriath Arba, present-day Hebron, where Abraham and Isaac had lived. Isaac was now 180 years old. Isaac breathed his last and died—an old man full of years. He was buried with his family by his sons Esau and Jacob.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: They turned over to Jacob all the alien gods they’d been holding on to, along with their lucky-charm earrings. Jacob buried them under the oak tree in Shechem. Then they set out. A paralyzing fear descended on all the surrounding villages so that they were unable to pursue the sons of Jacob.
  '6':
  - type: text
    content: Jacob and his company arrived at Luz, that is, Bethel, in the land of Canaan. He built an altar there and named it El-Bethel (God-of-Bethel) because that’s where God revealed himself to him when he was running from his brother.
  '8':
  - type: text
    content: And that’s when Rebekah’s nurse, Deborah, died. She was buried just below Bethel under the oak tree. It was named Allon-Bacuth (Weeping-Oak).
  '9':
  - type: text
    content: 'God revealed himself once again to Jacob, after he had come back from Paddan Aram and blessed him: “Your name is Jacob (Heel); but that’s your name no longer. From now on your name is Israel (God-Wrestler).”'
