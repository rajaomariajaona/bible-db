document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'God spoke to Jacob: “Go back to Bethel. Stay there and build an altar to the God who revealed himself to you when you were running for your life from your brother Esau.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Jacob told his family and all those who lived with him, “Throw out all the alien gods which you have, take a good bath and put on clean clothes, we’re going to Bethel. I’m going to build an altar there to the God who answered me when I was in trouble and has stuck with me everywhere I’ve gone since.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: They turned over to Jacob all the alien gods they’d been holding on to, along with their lucky-charm earrings. Jacob buried them under the oak tree in Shechem. Then they set out. A paralyzing fear descended on all the surrounding villages so that they were unable to pursue the sons of Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Jacob and his company arrived at Luz, that is, Bethel, in the land of Canaan. He built an altar there and named it El-Bethel (God-of-Bethel) because that’s where God revealed himself to him when he was running from his brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And that’s when Rebekah’s nurse, Deborah, died. She was buried just below Bethel under the oak tree. It was named Allon-Bacuth (Weeping-Oak).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'God revealed himself once again to Jacob, after he had come back from Paddan Aram and blessed him: “Your name is Jacob (Heel); but that’s your name no longer. From now on your name is Israel (God-Wrestler).”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: God continued,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am The Strong God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have children! Flourish!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A nation—a whole company of nations!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kings will come from your loins;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land I gave Abraham and Isaac
- type: usfm
  marker: q1
  children:
  - type: text
    text: I now give to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pass it on to your descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And then God was gone, ascended from the place where he had spoken with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: Jacob set up a stone pillar on the spot where God had spoken with him. He poured a drink offering on it and anointed it with oil. Jacob dedicated the place where God had spoken with him, Bethel (God’s-House).
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: They left Bethel. They were still quite a ways from Ephrath when Rachel went into labor—hard, hard labor. When her labor pains were at their worst, the midwife said to her, “Don’t be afraid—you have another boy.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: With her last breath, for she was now dying, she named him Ben-oni (Son-of-My-Pain), but his father named him Ben-jamin (Son-of-Good-Fortune).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: Rachel died and was buried on the road to Ephrath, that is, Bethlehem. Jacob set up a pillar to mark her grave. It is still there today, “Rachel’s Grave Stone.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22a
  - type: text
    text: ' Israel kept on his way and set up camp at Migdal Eder. While Israel was living in that region, Reuben went and slept with his father’s concubine, Bilhah. And Israel heard of what he did.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22b-26
  - type: text
    text: ' There were twelve sons of Jacob.'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'The sons by Leah:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Reuben, Jacob’s firstborn
- type: usfm
  marker: p
  children:
  - type: text
    text: Simeon
- type: usfm
  marker: p
  children:
  - type: text
    text: Levi
- type: usfm
  marker: p
  children:
  - type: text
    text: Judah
- type: usfm
  marker: p
  children:
  - type: text
    text: Issachar
- type: usfm
  marker: p
  children:
  - type: text
    text: Zebulun.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'The sons by Rachel:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Joseph
- type: usfm
  marker: p
  children:
  - type: text
    text: Benjamin.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'The sons by Bilhah, Rachel’s maid:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dan
- type: usfm
  marker: p
  children:
  - type: text
    text: Naphtali.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'The sons by Zilpah, Leah’s maid:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Gad
- type: usfm
  marker: p
  children:
  - type: text
    text: Asher.
- type: usfm
  marker: m
  children:
  - type: text
    text: These were Jacob’s sons, born to him in Paddan Aram.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: Finally, Jacob made it back home to his father Isaac at Mamre in Kiriath Arba, present-day Hebron, where Abraham and Isaac had lived. Isaac was now 180 years old. Isaac breathed his last and died—an old man full of years. He was buried with his family by his sons Esau and Jacob.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
