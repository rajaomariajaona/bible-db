document_id: 1SA.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'During this time the Philistines mustered their troops to make war on Israel. Achish said to David, “You can count on this: You’re marching with my troops, you and your men.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And David said, “Good! Now you’ll see for yourself what I can do!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Great!” said Achish. “I’m making you my personal bodyguard—for life!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Saul Prayed, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Didn’t Answer'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samuel was now dead. All Israel had mourned his death and buried him in Ramah, his hometown. Saul had long since cleaned out all those who held séances with the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: The Philistines had mustered their troops and camped at Shunem. Saul had assembled all Israel and camped at Gilboa. But when Saul saw the Philistine troops, he shook in his boots, scared to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saul prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' didn’t answer—neither by dream nor by sign nor by prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So Saul ordered his officials, “Find me someone who can call up spirits so I may go and seek counsel from those spirits.”
- type: usfm
  marker: p
  children:
  - type: text
    text: His servants said, “There’s a witch at Endor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Saul disguised himself by putting on different clothes. Then, taking two men with him, he went under the cover of night to the woman and said, “I want you to consult a ghost for me. Call up the person I name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The woman said, “Just hold on now! You know what Saul did, how he swept the country clean of mediums. Why are you trying to trap me and get me killed?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saul swore solemnly, “As '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, you won’t get in any trouble for this.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The woman said, “So whom do you want me to bring up?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Samuel. Bring me Samuel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When the woman saw Samuel, she cried out loudly to Saul, “Why did you lie to me? You’re Saul!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The king told her, “You have nothing to fear ...but what do you see?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I see a spirit ascending from the underground.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “And what does he look like?” Saul asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “An old man ascending, robed like a priest.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Saul knew it was Samuel. He fell down, face to the ground, and worshiped.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samuel said to Saul, “Why have you disturbed me by calling me up?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Because I’m in deep trouble,” said Saul. “The Philistines are making war against me and God has deserted me—he doesn’t answer me any more, either by prophet or by dream. And so I’m calling on you to tell me what to do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: “Why ask me?” said Samuel. “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has turned away from you and is now on the side of your neighbor. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done exactly what he told you through me—ripped the kingdom right out of your hands and given it to your neighbor. It’s because you did not obey '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', refused to carry out his seething judgment on Amalek, that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' does to you what he is doing today. Worse yet, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is turning Israel, along with you, over to the Philistines. Tomorrow you and your sons will be with me. And, yes, indeed, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is giving Israel’s army up to the Philistines.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'Saul dropped to the ground, felled like a tree, terrified by Samuel’s words. There wasn’t an ounce of strength left in him—he’d eaten nothing all day and all night. The woman, realizing that he was in deep shock, said to him, “Listen to me. I did what you asked me to do, put my life in your hands in doing it, carried out your instructions to the letter. It’s your turn to do what I tell you: Let me give you some food. Eat it. It will give you strength so you can get on your way.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: He refused. “I’m not eating anything.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But when his servants joined the woman in urging him, he gave in to their pleas, picked himself up off the ground, and sat on the bed. The woman moved swiftly. She butchered a grain-fed calf she had, and took some flour, kneaded it, and baked some flat bread. Then she served it all up for Saul and his servants. After dining handsomely, they got up from the table and were on their way that same night.
