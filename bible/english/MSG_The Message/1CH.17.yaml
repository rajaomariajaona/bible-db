document_id: 1CH.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Submits and Prays
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After the king had made himself at home, he said to Nathan the prophet, “Look at this: Here I am comfortable in a luxurious palace of cedar and the Chest of the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sits under a tent.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “And now I’m telling you this: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' himself will build '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' a house! When your life is complete and you’re buried with your ancestors, then I’ll raise up your child to succeed you, a child from your own body, and I’ll firmly establish his rule. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'He '
    - type: text
      text: will build a house to honor me, and I will guarantee his kingdom’s rule forever. I’ll be a father to him, and he’ll be a son to me. I will never remove my gracious love from him as I did from the one who preceded you. I will set him over my house and my kingdom forever; his throne will always be there, rock solid.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nathan gave David a complete and accurate report of everything he heard and saw in the vision.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King David went in, took his place before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and prayed:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Who am I, my Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and what is my family, that you have brought me to this place in life? But that’s nothing compared to what’s coming, for you’ve also spoken of my family far into the future, given me a glimpse into tomorrow and looked on me, Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', as a Somebody. What’s left for David to say to this—to your honoring your servant, even though you know me, just as I am? O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', out of the goodness of your heart, you’ve taken your servant to do this great thing and put your great work on display. There’s none like you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' but you, nothing to compare with what we’ve heard with our own ears. And who is like your people, like Israel, a nation unique on earth, whom God set out to redeem as his own people (and became most famous for it), performing great and fearsome acts, throwing out nations and their gods left and right as you saved your people from Egypt? You established for yourself a people—your very own Israel!—your people forever. And you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', became their God.'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'So now, great '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', this word that you have spoken to me and my family, guarantee it forever! Do exactly what you’ve promised! Then your reputation will be confirmed and flourish always as people exclaim, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, the God over Israel, is Israel’s God!” And the house of your servant David will remain rock solid under your watchful presence. You, my God, have told me plainly, “I will build you a house.” That’s how I was able to find the courage to pray this prayer to you. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', being the God you are, you have spoken all these wonderful words to me. As if that weren’t enough, you’ve blessed my family so that it will continue in your presence always. Because you have blessed it, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', it’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: really
    - type: text
      text: ' blessed—blessed for good!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nathan told David, “Whatever is on your heart, go and do it; God is with you.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But that night, the word of God came to Nathan, saying, “Go and tell my servant David, This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s word on the matter: You will not build me a ‘house’ to live in. Why, I haven’t lived in a ‘house’ from the time I brought up the children of Israel from Egypt till now; I’ve gone from one tent and makeshift shelter to another. In all my travels with all Israel, did I ever say to any of the leaders I commanded to shepherd Israel, ‘Why haven’t you built me a house of cedar?’'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “So here is what you are to tell my servant David: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies has this word for you: I took you from the pasture, tagging after sheep, and made you prince over my people Israel. I was with you everywhere you went and mowed your enemies down before you; and now I’m about to make you famous, ranked with the great names on earth. I’m going to set aside a place for my people Israel and plant them there so they’ll have their own home and not be knocked around anymore; nor will evil nations afflict them as they always have, even during the days I set judges over my people Israel. And finally, I’m going to conquer all your enemies.'
