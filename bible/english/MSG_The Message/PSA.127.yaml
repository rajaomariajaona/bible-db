  - type: text
    text: 'If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t build the house,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the builders only build shacks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t guard the city,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the night watchman might as well nap.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s useless to rise early and go to bed late,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and work your worried fingers to the bone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you know he enjoys
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving rest to those he loves?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'Don’t you see that children are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s best gift?
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fruit of the womb his generous legacy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a warrior’s fistful of arrows
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the children of a vigorous youth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, how blessed are you parents,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your quivers full of children!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your enemies don’t stand a chance against you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll sweep them right off your doorstep.
