document_id: ISA.46,97
type_code: eng
verses:
  '1':
  - type: heading
    content: This Is Serious Business, Rebels
  - type: text
    content: The god Bel falls down, god Nebo slumps.
  - type: text
    content: The no-god hunks of wood are loaded on mules
  - type: text
    content: And have to be hauled off,
  - type: text
    content: wearing out the poor mules—
  - type: text
    content: Dead weight, burdens who can’t bear burdens,
  - type: text
    content: hauled off to captivity.
  '12':
  - type: text
    content: '“Now listen to me:'
  - type: text
    content: You’re a hardheaded bunch and hard to help.
  - type: text
    content: I’m ready to help you right now.
  - type: text
    content: Deliverance is not a long-range plan.
  - type: text
    content: Salvation isn’t on hold.
  - type: text
    content: I’m putting salvation to work in Zion now,
  - type: text
    content: and glory in Israel.”
  '3':
  - type: text
    content: “Listen to me, family of Jacob,
  - type: text
    content: everyone that’s left of the family of Israel.
  - type: text
    content: I’ve been carrying you on my back
  - type: text
    content: from the day you were born,
  - type: text
    content: And I’ll keep on carrying you when you’re old.
  - type: text
    content: I’ll be there, bearing you when you’re old and gray.
  - type: text
    content: I’ve done it and will keep on doing it,
  - type: text
    content: carrying you on my back, saving you.
  '5':
  - type: text
    content: “So to whom will you compare me, the Incomparable?
  - type: text
    content: Can you picture me without reducing me?
  - type: text
    content: People with a lot of money
  - type: text
    content: hire craftsmen to make them gods.
  - type: text
    content: The artisan delivers the god,
  - type: text
    content: and they kneel and worship it!
  - type: text
    content: They carry it around in holy parades,
  - type: text
    content: then take it home and put it on a shelf.
  - type: text
    content: And there it sits, day in and day out,
  - type: text
    content: a dependable god, always right where you put it.
  - type: text
    content: Say anything you want to it, it never talks back.
  - type: text
    content: 'Of course, it never '
  - type: text
    content: does
  - type: text
    content: ' anything either!'
  '8':
  - type: text
    content: “Think about this. Wrap your minds around it.
  - type: text
    content: This is serious business, rebels. Take it to heart.
  - type: text
    content: Remember your history,
  - type: text
    content: your long and rich history.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', the only God you’ve had or ever will have—'
  - type: text
    content: incomparable, irreplaceable—
  - type: text
    content: From the very beginning
  - type: text
    content: telling you what the ending will be,
  - type: text
    content: All along letting you in
  - type: text
    content: on what is going to happen,
  - type: text
    content: Assuring you, ‘I’m in this for the long haul,
  - type: text
    content: I’ll do exactly what I set out to do,’
  - type: text
    content: Calling that eagle, Cyrus, out of the east,
  - type: text
    content: from a far country the man I chose to help me.
  - type: text
    content: I’ve said it, and I’ll most certainly do it.
  - type: text
    content: I’ve planned it, so it’s as good as done.
