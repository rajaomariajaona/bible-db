document_id: ISA.46,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: This Is Serious Business, Rebels
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: The god Bel falls down, god Nebo slumps.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The no-god hunks of wood are loaded on mules
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have to be hauled off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wearing out the poor mules—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dead weight, burdens who can’t bear burdens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hauled off to captivity.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: '“Now listen to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re a hardheaded bunch and hard to help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m ready to help you right now.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deliverance is not a long-range plan.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Salvation isn’t on hold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m putting salvation to work in Zion now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glory in Israel.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: “Listen to me, family of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone that’s left of the family of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve been carrying you on my back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the day you were born,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’ll keep on carrying you when you’re old.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll be there, bearing you when you’re old and gray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve done it and will keep on doing it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carrying you on my back, saving you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: “So to whom will you compare me, the Incomparable?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you picture me without reducing me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People with a lot of money
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hire craftsmen to make them gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The artisan delivers the god,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they kneel and worship it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They carry it around in holy parades,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then take it home and put it on a shelf.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there it sits, day in and day out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a dependable god, always right where you put it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say anything you want to it, it never talks back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Of course, it never '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' anything either!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-11
    - type: text
      text: “Think about this. Wrap your minds around it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is serious business, rebels. Take it to heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember your history,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your long and rich history.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the only God you’ve had or ever will have—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: incomparable, irreplaceable—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the very beginning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: telling you what the ending will be,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All along letting you in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on what is going to happen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assuring you, ‘I’m in this for the long haul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll do exactly what I set out to do,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calling that eagle, Cyrus, out of the east,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from a far country the man I chose to help me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve said it, and I’ll most certainly do it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve planned it, so it’s as good as done.
