document_id: NUM.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Scouting Out Canaan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Send men to scout out the country of Canaan that I am giving to the People of Israel. Send one man from each ancestral tribe, each one a tried-and-true leader in the tribe.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-15
  - type: text
    text: 'So Moses sent them off from the Wilderness of Paran at the command of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. All of them were leaders in Israel, one from each tribe. These were their names:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Reuben: Shammua son of Zaccur'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Simeon: Shaphat son of Hori'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Judah: Caleb son of Jephunneh'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Issachar: Igal son of Joseph'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Ephraim: Hoshea son of Nun'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Benjamin: Palti son of Raphu'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Zebulun: Gaddiel son of Sodi'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Manasseh (a Joseph tribe): Gaddi son of Susi'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Dan: Ammiel son of Gemalli'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Asher: Sethur son of Michael'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Naphtali: Nahbi son of Vophsi'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Gad: Geuel son of Maki.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These are the names of the men Moses sent to scout out the land. Moses gave Hoshea (Salvation) son of Nun a new name—Joshua (
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -Saves).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: 'When Moses sent them off to scout out Canaan, he said, “Go up through the Negev and then into the hill country. Look the land over, see what it is like. Assess the people: Are they strong or weak? Are there few or many? Observe the land: Is it pleasant or harsh? Describe the towns where they live: Are they open camps or fortified with walls? And the soil: Is it fertile or barren? Are there forests? And try to bring back a sample of the produce that grows there—this is the season for the first ripe grapes.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: With that they were on their way. They scouted out the land from the Wilderness of Zin as far as Rehob toward Lebo Hamath. Their route went through the Negev Desert to the town of Hebron. Ahiman, Sheshai, and Talmai, descendants of the giant Anak, lived there. Hebron had been built seven years before Zoan in Egypt. When they arrived at the Eshcol Valley they cut off a branch with a single cluster of grapes—it took two men to carry it—slung on a pole. They also picked some pomegranates and figs. They named the place Eshcol Valley (Grape-Cluster-Valley) because of the huge cluster of grapes they had cut down there. After forty days of scouting out the land, they returned home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27a
  - type: text
    text: ' They presented themselves before Moses and Aaron and the whole congregation of the People of Israel in the Wilderness of Paran at Kadesh. They reported to the whole congregation and showed them the fruit of the land. Then they told the story of their trip:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27b-29
  - type: text
    text: ' “We went to the land to which you sent us and, oh! It '
  - type: usfm
    marker: it
    children:
    - type: text
      text: does
  - type: text
    text: ' flow with milk and honey! Just look at this fruit! The only thing is that the people who live there are fierce, their cities are huge and well fortified. Worse yet, we saw descendants of the giant Anak. Amalekites are spread out in the Negev; Hittites, Jebusites, and Amorites hold the hill country; and the Canaanites are established on the Mediterranean Sea and along the Jordan.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Caleb interrupted, called for silence before Moses and said, “Let’s go up and take the land—now. We can do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-33
  - type: text
    text: But the others said, “We can’t attack those people; they’re way stronger than we are.” They spread scary rumors among the People of Israel. They said, “We scouted out the land from one end to the other—it’s a land that swallows people whole. Everybody we saw was huge. Why, we even saw the Nephilim giants (the Anak giants come from the Nephilim). Alongside them we felt like grasshoppers. And they looked down on us as if we were grasshoppers.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
