type_code: eng
verses:
  '1':
  - type: heading
    content: Scouting Out Canaan
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Send men to scout out the country of Canaan that I am giving to the People of Israel. Send one man from each ancestral tribe, each one a tried-and-true leader in the tribe.”'
  '16':
  - type: text
    content: These are the names of the men Moses sent to scout out the land. Moses gave Hoshea (Salvation) son of Nun a new name—Joshua (
  - type: text
    content: God
  - type: text
    content: -Saves).
  '17':
  - type: text
    content: 'When Moses sent them off to scout out Canaan, he said, “Go up through the Negev and then into the hill country. Look the land over, see what it is like. Assess the people: Are they strong or weak? Are there few or many? Observe the land: Is it pleasant or harsh? Describe the towns where they live: Are they open camps or fortified with walls? And the soil: Is it fertile or barren? Are there forests? And try to bring back a sample of the produce that grows there—this is the season for the first ripe grapes.”'
  '21':
  - type: text
    content: With that they were on their way. They scouted out the land from the Wilderness of Zin as far as Rehob toward Lebo Hamath. Their route went through the Negev Desert to the town of Hebron. Ahiman, Sheshai, and Talmai, descendants of the giant Anak, lived there. Hebron had been built seven years before Zoan in Egypt. When they arrived at the Eshcol Valley they cut off a branch with a single cluster of grapes—it took two men to carry it—slung on a pole. They also picked some pomegranates and figs. They named the place Eshcol Valley (Grape-Cluster-Valley) because of the huge cluster of grapes they had cut down there. After forty days of scouting out the land, they returned home.
  '26':
  - type: text
    content: ' They presented themselves before Moses and Aaron and the whole congregation of the People of Israel in the Wilderness of Paran at Kadesh. They reported to the whole congregation and showed them the fruit of the land. Then they told the story of their trip:'
  '27':
  - type: text
    content: ' “We went to the land to which you sent us and, oh! It '
  - type: text
    content: does
  - type: text
    content: ' flow with milk and honey! Just look at this fruit! The only thing is that the people who live there are fierce, their cities are huge and well fortified. Worse yet, we saw descendants of the giant Anak. Amalekites are spread out in the Negev; Hittites, Jebusites, and Amorites hold the hill country; and the Canaanites are established on the Mediterranean Sea and along the Jordan.”'
  '3':
  - type: text
    content: 'So Moses sent them off from the Wilderness of Paran at the command of '
  - type: text
    content: God
  - type: text
    content: '. All of them were leaders in Israel, one from each tribe. These were their names:'
  - type: text
    content: 'from Reuben: Shammua son of Zaccur'
  - type: text
    content: 'from Simeon: Shaphat son of Hori'
  - type: text
    content: 'from Judah: Caleb son of Jephunneh'
  - type: text
    content: 'from Issachar: Igal son of Joseph'
  - type: text
    content: 'from Ephraim: Hoshea son of Nun'
  - type: text
    content: 'from Benjamin: Palti son of Raphu'
  - type: text
    content: 'from Zebulun: Gaddiel son of Sodi'
  - type: text
    content: 'from Manasseh (a Joseph tribe): Gaddi son of Susi'
  - type: text
    content: 'from Dan: Ammiel son of Gemalli'
  - type: text
    content: 'from Asher: Sethur son of Michael'
  - type: text
    content: 'from Naphtali: Nahbi son of Vophsi'
  - type: text
    content: 'from Gad: Geuel son of Maki.'
  '30':
  - type: text
    content: Caleb interrupted, called for silence before Moses and said, “Let’s go up and take the land—now. We can do it.”
  '31':
  - type: text
    content: But the others said, “We can’t attack those people; they’re way stronger than we are.” They spread scary rumors among the People of Israel. They said, “We scouted out the land from one end to the other—it’s a land that swallows people whole. Everybody we saw was huge. Why, we even saw the Nephilim giants (the Anak giants come from the Nephilim). Alongside them we felt like grasshoppers. And they looked down on us as if we were grasshoppers.”
  - type: text
    content: '* * *'
