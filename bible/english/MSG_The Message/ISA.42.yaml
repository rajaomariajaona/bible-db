document_id: ISA.42,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Servant Will Set Everything Right
  - type: text
    content: “Take a good look at my servant.
  - type: text
    content: I’m backing him to the hilt.
  - type: text
    content: He’s the one I chose,
  - type: text
    content: and I couldn’t be more pleased with him.
  - type: text
    content: 'I’ve bathed him with my Spirit, my '
  - type: text
    content: life.
  - type: text
    content: He’ll set everything right among the nations.
  - type: text
    content: He won’t call attention to what he does
  - type: text
    content: with loud speeches or gaudy parades.
  - type: text
    content: He won’t brush aside the bruised and the hurt
  - type: text
    content: and he won’t disregard the small and insignificant,
  - type: text
    content: but he’ll steadily and firmly set things right.
  - type: text
    content: He won’t tire out and quit. He won’t be stopped
  - type: text
    content: until he’s finished his work—to set things right on earth.
  - type: text
    content: Far-flung ocean islands
  - type: text
    content: wait expectantly for his teaching.”
  - type: heading
    content: The God Who Makes Us Alive with His Own Life
  '10':
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: ' a brand-new song,'
  - type: text
    content: sing his praises all over the world!
  - type: text
    content: Let the sea and its fish give a round of applause,
  - type: text
    content: with all the far-flung islands joining in.
  - type: text
    content: Let the desert and its camps raise a tune,
  - type: text
    content: calling the Kedar nomads to join in.
  - type: text
    content: Let the villagers in Sela round up a choir
  - type: text
    content: and perform from the tops of the mountains.
  - type: text
    content: 'Make '
  - type: text
    content: God
  - type: text
    content: ’s glory resound;
  - type: text
    content: echo his praises from coast to coast.
  - type: text
    content: God
  - type: text
    content: ' steps out like he means business.'
  - type: text
    content: You can see he’s primed for action.
  - type: text
    content: He shouts, announcing his arrival;
  - type: text
    content: 'he takes charge and his enemies fall into line:'
  - type: text
    content: “I’ve been quiet long enough.
  - type: text
    content: I’ve held back, biting my tongue.
  - type: text
    content: But now I’m letting loose, letting go,
  - type: text
    content: like a woman who’s having a baby—
  - type: text
    content: Stripping the hills bare,
  - type: text
    content: withering the wildflowers,
  - type: text
    content: Drying up the rivers,
  - type: text
    content: turning lakes into mudflats.
  - type: text
    content: But I’ll take the hand of those who don’t know the way,
  - type: text
    content: who can’t see where they’re going.
  - type: text
    content: I’ll be a personal guide to them,
  - type: text
    content: directing them through unknown country.
  - type: text
    content: I’ll be right there to show them what roads to take,
  - type: text
    content: make sure they don’t fall into the ditch.
  - type: text
    content: These are the things I’ll be doing for them—
  - type: text
    content: sticking with them, not leaving them for a minute.”
  '17':
  - type: text
    content: But those who invested in the no-gods
  - type: text
    content: are bankrupt—dead broke.
  - type: heading
    content: You’ve Seen a Lot, but Looked at Nothing
  '18':
  - type: text
    content: Pay attention! Are you deaf?
  - type: text
    content: Open your eyes! Are you blind?
  - type: text
    content: You’re my servant, and you’re not looking!
  - type: text
    content: You’re my messenger, and you’re not listening!
  - type: text
    content: 'The very people I depended upon, servants of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: blind as a bat—willfully blind!
  - type: text
    content: You’ve seen a lot, but looked at nothing.
  - type: text
    content: You’ve heard everything, but listened to nothing.
  - type: text
    content: God
  - type: text
    content: ' intended, out of the goodness of his heart,'
  - type: text
    content: to be lavish in his revelation.
  - type: text
    content: But this is a people battered and cowed,
  - type: text
    content: shut up in attics and closets,
  - type: text
    content: Victims licking their wounds,
  - type: text
    content: feeling ignored, abandoned.
  - type: text
    content: But is anyone out there listening?
  - type: text
    content: Is anyone paying attention to what’s coming?
  - type: text
    content: Who do you think turned Jacob over to the thugs,
  - type: text
    content: let loose the robbers on Israel?
  - type: text
    content: 'Wasn’t it '
  - type: text
    content: God
  - type: text
    content: ' himself, this God against whom we’ve sinned—'
  - type: text
    content: not doing what he commanded,
  - type: text
    content: not listening to what he said?
  - type: text
    content: Isn’t it God’s anger that’s behind all this,
  - type: text
    content: God’s punishing power?
  - type: text
    content: Their whole world collapsed but they still didn’t get it;
  - type: text
    content: their life is in ruins but they don’t take it to heart.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Message,
  - type: text
    content: the God who created the cosmos, stretched out the skies,
  - type: text
    content: laid out the earth and all that grows from it,
  - type: text
    content: Who breathes life into earth’s people,
  - type: text
    content: 'makes them alive with his own life:'
  - type: text
    content: '“I am '
  - type: text
    content: God
  - type: text
    content: . I have called you to live right and well.
  - type: text
    content: I have taken responsibility for you, kept you safe.
  - type: text
    content: I have set you among my people to bind them to me,
  - type: text
    content: and provided you as a lighthouse to the nations,
  - type: text
    content: 'To make a start at bringing people into the open, into light:'
  - type: text
    content: opening blind eyes,
  - type: text
    content: releasing prisoners from dungeons,
  - type: text
    content: emptying the dark prisons.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: . That’s my name.
  - type: text
    content: I don’t franchise my glory,
  - type: text
    content: don’t endorse the no-god idols.
  - type: text
    content: 'Take note: The earlier predictions of judgment have been fulfilled.'
  - type: text
    content: I’m announcing the new salvation work.
  - type: text
    content: Before it bursts on the scene,
  - type: text
    content: I’m telling you all about it.”
