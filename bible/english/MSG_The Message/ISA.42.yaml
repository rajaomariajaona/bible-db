document_id: ISA.42,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Servant Will Set Everything Right
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take a good look at my servant.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m backing him to the hilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s the one I chose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I couldn’t be more pleased with him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ve bathed him with my Spirit, my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll set everything right among the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t call attention to what he does
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with loud speeches or gaudy parades.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t brush aside the bruised and the hurt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he won’t disregard the small and insignificant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he’ll steadily and firmly set things right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t tire out and quit. He won’t be stopped
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until he’s finished his work—to set things right on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far-flung ocean islands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wait expectantly for his teaching.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The God Who Makes Us Alive with His Own Life
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' a brand-new song,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing his praises all over the world!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the sea and its fish give a round of applause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with all the far-flung islands joining in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the desert and its camps raise a tune,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calling the Kedar nomads to join in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the villagers in Sela round up a choir
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and perform from the tops of the mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s glory resound;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: echo his praises from coast to coast.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' steps out like he means business.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You can see he’s primed for action.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shouts, announcing his arrival;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he takes charge and his enemies fall into line:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ve been quiet long enough.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve held back, biting my tongue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now I’m letting loose, letting go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a woman who’s having a baby—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stripping the hills bare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: withering the wildflowers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drying up the rivers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turning lakes into mudflats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I’ll take the hand of those who don’t know the way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can’t see where they’re going.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be a personal guide to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: directing them through unknown country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be right there to show them what roads to take,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make sure they don’t fall into the ditch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the things I’ll be doing for them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sticking with them, not leaving them for a minute.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who invested in the no-gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are bankrupt—dead broke.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You’ve Seen a Lot, but Looked at Nothing
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention! Are you deaf?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open your eyes! Are you blind?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re my servant, and you’re not looking!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re my messenger, and you’re not listening!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The very people I depended upon, servants of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blind as a bat—willfully blind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve seen a lot, but looked at nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve heard everything, but listened to nothing.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' intended, out of the goodness of his heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be lavish in his revelation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But this is a people battered and cowed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shut up in attics and closets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Victims licking their wounds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feeling ignored, abandoned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But is anyone out there listening?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is anyone paying attention to what’s coming?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who do you think turned Jacob over to the thugs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let loose the robbers on Israel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wasn’t it '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' himself, this God against whom we’ve sinned—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not doing what he commanded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not listening to what he said?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t it God’s anger that’s behind all this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s punishing power?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their whole world collapsed but they still didn’t get it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their life is in ruins but they don’t take it to heart.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God who created the cosmos, stretched out the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laid out the earth and all that grows from it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who breathes life into earth’s people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'makes them alive with his own life:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . I have called you to live right and well.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have taken responsibility for you, kept you safe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have set you among my people to bind them to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provided you as a lighthouse to the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To make a start at bringing people into the open, into light:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: opening blind eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: releasing prisoners from dungeons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: emptying the dark prisons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . That’s my name.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t franchise my glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t endorse the no-god idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Take note: The earlier predictions of judgment have been fulfilled.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m announcing the new salvation work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before it bursts on the scene,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m telling you all about it.”
