document_id: JOB.42,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job Worships God
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: I Babbled On About Things Far Beyond Me
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Job answered '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I’m convinced: You can do anything and everything.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing and no one can upset your plans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You asked, ‘Who is this muddying the water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignorantly confusing the issue, second-guessing my purposes?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I admit it. I was the one. I babbled on about things far beyond me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made small talk about wonders way over my head.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You told me, ‘Listen, and let me do the talking.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let me ask the questions. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' give the answers.’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I admit I once lived by rumors of you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now I have it all firsthand—from my own eyes and ears!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m sorry—forgive me. I’ll never do that again, I promise!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll never again live on crusts of hearsay, crumbs of rumor.”
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: God Restores Job
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: I Will Accept His Prayer
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Job had interceded for his friends, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' restored his fortune—and then doubled it! All his brothers and sisters and friends came to his house and celebrated. They told him how sorry they were, and consoled him for all the trouble '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had brought him. Each of them brought generous housewarming gifts.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' blessed Job’s later life even more than his earlier life. He ended up with fourteen thousand sheep, six thousand camels, one thousand teams of oxen, and one thousand donkeys. He also had seven sons and three daughters. He named the first daughter Dove, the second, Cinnamon, and the third, Darkeyes. There was not a woman in that country as beautiful as Job’s daughters. Their father treated them as equals with their brothers, providing the same inheritance.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Job lived on another 140 years, living to see his children and grandchildren—four generations of them! Then he died—an old man, a full life.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had finished addressing Job, he turned to Eliphaz the Temanite and said, “I’ve had it with you and your two friends. I’m fed up! You haven’t been honest either with me or about me—not the way my friend Job has. So here’s what you must do. Take seven bulls and seven rams, and go to my friend Job. Sacrifice a burnt offering on your own behalf. My friend Job will pray for you, and I will accept his prayer. He will ask me not to treat you as you deserve for talking nonsense about me, and for not being honest with me, as he has.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did it. Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite did what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' accepted Job’s prayer.'
