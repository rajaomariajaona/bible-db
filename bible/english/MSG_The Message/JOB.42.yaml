document_id: JOB.42,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Worships God
  - type: heading
    content: I Babbled On About Things Far Beyond Me
  - type: text
    content: 'Job answered '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“I’m convinced: You can do anything and everything.'
  - type: text
    content: Nothing and no one can upset your plans.
  - type: text
    content: You asked, ‘Who is this muddying the water,
  - type: text
    content: ignorantly confusing the issue, second-guessing my purposes?’
  - type: text
    content: I admit it. I was the one. I babbled on about things far beyond me,
  - type: text
    content: made small talk about wonders way over my head.
  - type: text
    content: You told me, ‘Listen, and let me do the talking.
  - type: text
    content: 'Let me ask the questions. '
  - type: text
    content: You
  - type: text
    content: ' give the answers.’'
  - type: text
    content: I admit I once lived by rumors of you;
  - type: text
    content: now I have it all firsthand—from my own eyes and ears!
  - type: text
    content: I’m sorry—forgive me. I’ll never do that again, I promise!
  - type: text
    content: I’ll never again live on crusts of hearsay, crumbs of rumor.”
  - type: heading
    content: God Restores Job
  - type: heading
    content: I Will Accept His Prayer
  '10':
  - type: text
    content: 'After Job had interceded for his friends, '
  - type: text
    content: God
  - type: text
    content: ' restored his fortune—and then doubled it! All his brothers and sisters and friends came to his house and celebrated. They told him how sorry they were, and consoled him for all the trouble '
  - type: text
    content: God
  - type: text
    content: ' had brought him. Each of them brought generous housewarming gifts.'
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' blessed Job’s later life even more than his earlier life. He ended up with fourteen thousand sheep, six thousand camels, one thousand teams of oxen, and one thousand donkeys. He also had seven sons and three daughters. He named the first daughter Dove, the second, Cinnamon, and the third, Darkeyes. There was not a woman in that country as beautiful as Job’s daughters. Their father treated them as equals with their brothers, providing the same inheritance.'
  '16':
  - type: text
    content: Job lived on another 140 years, living to see his children and grandchildren—four generations of them! Then he died—an old man, a full life.
  '7':
  - type: text
    content: 'After '
  - type: text
    content: God
  - type: text
    content: ' had finished addressing Job, he turned to Eliphaz the Temanite and said, “I’ve had it with you and your two friends. I’m fed up! You haven’t been honest either with me or about me—not the way my friend Job has. So here’s what you must do. Take seven bulls and seven rams, and go to my friend Job. Sacrifice a burnt offering on your own behalf. My friend Job will pray for you, and I will accept his prayer. He will ask me not to treat you as you deserve for talking nonsense about me, and for not being honest with me, as he has.”'
  '9':
  - type: text
    content: 'They did it. Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite did what '
  - type: text
    content: God
  - type: text
    content: ' commanded. And '
  - type: text
    content: God
  - type: text
    content: ' accepted Job’s prayer.'
