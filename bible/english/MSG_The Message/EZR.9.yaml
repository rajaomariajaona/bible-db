document_id: EZR.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ezra Prays: “Look at Us . . . Guilty Before You”'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: After all this was done, the leaders came to me and said, “The People of Israel, priests and Levites included, have not kept themselves separate from the neighboring people around here with all their vulgar obscenities—Canaanites, Hittites, Perizzites, Jebusites, Ammonites, Moabites, Egyptians, Amorites. They have given some of their daughters in marriage to them and have taken some of their daughters for marriage to their sons. The holy seed is now all mixed in with these other peoples. And our leaders have led the way in this betrayal.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I heard all this, I ripped my clothes and my cape; I pulled hair from my head and out of my beard; I slumped to the ground, appalled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6a
  - type: text
    text: ' Many were in fear and trembling because of what God was saying about the betrayal by the exiles. They gathered around me as I sat there in despair, waiting for the evening sacrifice. At the evening sacrifice I picked myself up from my utter devastation, and in my ripped clothes and cape fell to my knees and stretched out my hands to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God. And I prayed:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6b-7
  - type: text
    text: ' “My dear God, I’m so totally ashamed, I can’t bear to face you. O my God—our iniquities are piled up so high that we can’t see out; our guilt touches the skies. We’ve been stuck in a muck of guilt since the time of our ancestors until right now; we and our kings and priests, because of our sins, have been turned over to foreign kings, to killing, to captivity, to looting, and to public shame—just as you see us now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: '“Now for a brief time '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, has allowed us, this battered band, to get a firm foothold in his holy place so that our God may brighten our eyes and lighten our burdens as we serve out this hard sentence. We were slaves; yet even as slaves, our God didn’t abandon us. He has put us in the good graces of the kings of Persia and given us the heart to build The Temple of our God, restore its ruins, and construct a defensive wall in Judah and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: “And now, our God, after all this what can we say for ourselves? For we have thrown your commands to the wind, the commands you gave us through your servants the prophets. They told us, ‘The land you’re taking over is a polluted land, polluted with the obscene vulgarities of the people who live there; they’ve filled it with their moral rot from one end to the other. Whatever you do, don’t give your daughters in marriage to their sons nor marry your sons to their daughters. Don’t cultivate their good opinion; don’t make over them and get them to like you so you can make a lot of money and build up a tidy estate to hand down to your children.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: '“And now this, on top of all we’ve already suffered because of our evil ways and accumulated guilt, even though you, dear God, punished us far less than we deserved and even went ahead and gave us this present escape. Yet here we are, at it again, breaking your commandments by intermarrying with the people who practice all these obscenities! Are you angry to the point of wiping us out completely, without even a few stragglers, with no way out at all? You are the righteous '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel. We are, right now, a small band of escapees. Look at us, openly standing here, guilty before you. No one can last long like this.”'
