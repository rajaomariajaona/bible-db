document_id: EZK.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sanctuary Rules
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the man brought me back to the outside gate complex of the Sanctuary that faces east. But it was shut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to me: “This gate is shut and it’s to stay shut. No one is to go through it because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, has gone through it. It stays shut. Only the prince, because he’s the prince, may sit there to eat in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . He is to enter the gate complex through the porch and leave by the same way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The man led me through the north gate to the front of the Temple. I looked, and—oh!—the bright Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filling the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! I fell on my face in worship.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to me, “Son of man, get a grip on yourself. Use your eyes, use your ears, pay careful attention to everything I tell you about the ordinances of this Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the way all the laws work, instructions regarding it and all the entrances and exits of the Sanctuary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: '“Tell this bunch of rebels, this family Israel, ‘Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: No more of these vile obscenities, Israel, dragging irreverent and unrepentant outsiders, uncircumcised in heart and flesh, into my Sanctuary, feeding them the sacrificial offerings as if it were the food for a neighborhood picnic. With all your vile obscenities, you’ve broken trust with me, the solemn covenant I made with you. You haven’t taken care of my holy things. You’ve hired out the work to foreigners who care nothing for this place, my Sanctuary. No irreverent and unrepentant aliens, uncircumcised in heart or flesh, not even the ones who live among Israelites, are to enter my Sanctuary.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: '“The Levites who walked off and left me, along with everyone else—all Israel—who took up with all the no-god idols, will pay for everything they did wrong. From now on they’ll do only the menial work in the Sanctuary: guard the gates and help out with the Temple chores—and also kill the sacrificial animals for the people and serve them. Because they acted as priests to the no-god idols and made my people Israel stumble and fall, I’ve taken an oath to punish them. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. Yes, they’ll pay for what they’ve done. They’re fired from the priesthood. No longer will they come into my presence and take care of my holy things. No more access to The Holy Place! They’ll have to live with what they’ve done, carry the shame of their vile and obscene lives. From now on, their job is to sweep up and run errands. That’s it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: '“But the Levitical priests who descend from Zadok, who faithfully took care of my Sanctuary when everyone else went off and left me, are going to come into my presence and serve me. They are going to carry out the priestly work of offering the solemn sacrifices of worship. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. They’re the only ones permitted to enter my Sanctuary. They’re the only ones to approach my table and serve me, accompanying me in my work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: “When they enter the gate complex of the inside courtyard, they are to dress in linen. No woolens are to be worn while serving at the gate complex of the inside courtyard or inside the Temple itself. They’re to wear linen turbans on their heads and linen underclothes—nothing that makes them sweat. When they go out into the outside courtyard where the people gather, they must first change out of the clothes they have been serving in, leaving them in the sacred rooms where they change to their everyday clothes, so that they don’t trivialize their holy work by the way they dress.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “They are to neither shave their heads nor let their hair become unkempt, but must keep their hair trimmed and neat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “No priest is to drink on the job—no wine while in the inside courtyard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Priests are not to marry widows or divorcees, but only Israelite virgins or widows of priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Their job is to teach my people the difference between the holy and the common, to show them how to discern between unclean and clean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “When there’s a difference of opinion, the priests will arbitrate. They’ll decide on the basis of my judgments, laws, and statutes. They are in charge of making sure the appointed feasts are honored and my Sabbaths kept holy in the ways I’ve commanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: '“A priest must not contaminate himself by going near a corpse. But when the dead person is his father or mother, son or daughter, brother or unmarried sister, he can approach the dead. But after he has been purified, he must wait another seven days. Then, when he returns to the inside courtyard of the Sanctuary to do his priestly work in the Sanctuary, he must first offer a sin offering for himself. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: '“As to priests owning land, I am their inheritance. Don’t give any land in Israel to them. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' am their ‘land,’ their inheritance. They’ll take their meals from the grain offerings, the sin offerings, and the guilt offerings. Everything in Israel offered to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in worship is theirs. The best of everything grown, plus all special gifts, comes to the priests. All that is given in worship to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' goes to them. Serve them first. Serve from your best and your home will be blessed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Priests are not to eat any meat from bird or animal unfit for ordinary human consumption, such as carcasses found dead on the road or in the field.”
