document_id: PRO.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Dressed to Seduce
  - type: text
    content: Dear friend, do what I tell you;
  - type: text
    content: treasure my careful instructions.
  - type: text
    content: Do what I say and you’ll live well.
  - type: text
    content: My teaching is as precious as your eyesight—guard it!
  - type: text
    content: Write it out on the back of your hands;
  - type: text
    content: etch it on the chambers of your heart.
  - type: text
    content: Talk to Wisdom as to a sister.
  - type: text
    content: Treat Insight as your companion.
  - type: text
    content: They’ll be with you to fend off the Temptress—
  - type: text
    content: that smooth-talking, honey-tongued Seductress.
  '13':
  - type: text
    content: She threw her arms around him and kissed him,
  - type: text
    content: boldly took his arm and said,
  - type: text
    content: “I’ve got all the makings for a feast—
  - type: text
    content: today I made my offerings, my vows are all paid,
  - type: text
    content: So now I’ve come to find you,
  - type: text
    content: hoping to catch sight of your face—and here you are!
  - type: text
    content: I’ve spread fresh, clean sheets on my bed,
  - type: text
    content: colorful imported linens.
  - type: text
    content: My bed is aromatic with spices
  - type: text
    content: and exotic fragrances.
  - type: text
    content: Come, let’s make love all night,
  - type: text
    content: spend the night in ecstatic lovemaking!
  - type: text
    content: My husband’s not home; he’s away on business,
  - type: text
    content: and he won’t be back for a month.”
  '21':
  - type: text
    content: Soon she has him eating out of her hand,
  - type: text
    content: bewitched by her honeyed speech.
  - type: text
    content: Before you know it, he’s trotting behind her,
  - type: text
    content: like a calf led to the butcher shop,
  - type: text
    content: Like a stag lured into ambush
  - type: text
    content: and then shot with an arrow,
  - type: text
    content: Like a bird flying into a net
  - type: text
    content: not knowing that its flying life is over.
  '24':
  - type: text
    content: So, friends, listen to me,
  - type: text
    content: take these words of mine most seriously.
  - type: text
    content: Don’t fool around with a woman like that;
  - type: text
    content: don’t even stroll through her neighborhood.
  - type: text
    content: Countless victims come under her spell;
  - type: text
    content: she’s the death of many a poor man.
  - type: text
    content: She runs a halfway house to hell,
  - type: text
    content: fits you out with a shroud and a coffin.
  '6':
  - type: text
    content: As I stood at the window of my house
  - type: text
    content: looking out through the shutters,
  - type: text
    content: Watching the mindless crowd stroll by,
  - type: text
    content: I spotted a young man without any sense
  - type: text
    content: Arriving at the corner of the street where she lived,
  - type: text
    content: then turning up the path to her house.
  - type: text
    content: It was dusk, the evening coming on,
  - type: text
    content: the darkness thickening into night.
  - type: text
    content: Just then, a woman met him—
  - type: text
    content: she’d been lying in wait for him, dressed to seduce him.
  - type: text
    content: Brazen and brash she was,
  - type: text
    content: restless and roaming, never at home,
  - type: text
    content: Walking the streets, loitering in the mall,
  - type: text
    content: hanging out at every corner in town.
