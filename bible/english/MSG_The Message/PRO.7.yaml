document_id: PRO.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dressed to Seduce
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: Dear friend, do what I tell you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: treasure my careful instructions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do what I say and you’ll live well.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My teaching is as precious as your eyesight—guard it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Write it out on the back of your hands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: etch it on the chambers of your heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Talk to Wisdom as to a sister.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Treat Insight as your companion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll be with you to fend off the Temptress—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that smooth-talking, honey-tongued Seductress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-12
  - type: text
    text: As I stood at the window of my house
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking out through the shutters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Watching the mindless crowd stroll by,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I spotted a young man without any sense
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arriving at the corner of the street where she lived,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then turning up the path to her house.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It was dusk, the evening coming on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the darkness thickening into night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just then, a woman met him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: she’d been lying in wait for him, dressed to seduce him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brazen and brash she was,
- type: usfm
  marker: q2
  children:
  - type: text
    text: restless and roaming, never at home,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Walking the streets, loitering in the mall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hanging out at every corner in town.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-20
  - type: text
    text: She threw her arms around him and kissed him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: boldly took his arm and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve got all the makings for a feast—
- type: usfm
  marker: q2
  children:
  - type: text
    text: today I made my offerings, my vows are all paid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So now I’ve come to find you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hoping to catch sight of your face—and here you are!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve spread fresh, clean sheets on my bed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: colorful imported linens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My bed is aromatic with spices
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exotic fragrances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come, let’s make love all night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spend the night in ecstatic lovemaking!
- type: usfm
  marker: q1
  children:
  - type: text
    text: My husband’s not home; he’s away on business,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he won’t be back for a month.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Soon she has him eating out of her hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bewitched by her honeyed speech.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before you know it, he’s trotting behind her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a calf led to the butcher shop,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a stag lured into ambush
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then shot with an arrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a bird flying into a net
- type: usfm
  marker: q2
  children:
  - type: text
    text: not knowing that its flying life is over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-27
  - type: text
    text: So, friends, listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: take these words of mine most seriously.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t fool around with a woman like that;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t even stroll through her neighborhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Countless victims come under her spell;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she’s the death of many a poor man.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She runs a halfway house to hell,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fits you out with a shroud and a coffin.
