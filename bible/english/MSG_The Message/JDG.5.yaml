document_id: JDG.5,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'That day Deborah and Barak son of Abinoam sang this song:'
  '10':
  - type: text
    content: You who ride on prize donkeys
  - type: text
    content: comfortably mounted on blankets
  - type: text
    content: And you who walk down the roads,
  - type: text
    content: ponder, attend!
  - type: text
    content: Gather at the town well
  - type: text
    content: and listen to them sing,
  - type: text
    content: 'Chanting the tale of '
  - type: text
    content: God
  - type: text
    content: ’s victories,
  - type: text
    content: his victories accomplished in Israel.
  - type: text
    content: 'Then the people of '
  - type: text
    content: God
  - type: text
    content: went down to the city gates.
  '12':
  - type: text
    content: Wake up, wake up, Deborah!
  - type: text
    content: Wake up, wake up, sing a song!
  - type: text
    content: On your feet, Barak!
  - type: text
    content: Take your prisoners, son of Abinoam!
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: Then the remnant went down to greet the brave ones.
  - type: text
    content: 'The people of '
  - type: text
    content: God
  - type: text
    content: ' joined the mighty ones.'
  - type: text
    content: The captains from Ephraim came to the valley,
  - type: text
    content: behind you, Benjamin, with your troops.
  - type: text
    content: Captains marched down from Makir,
  - type: text
    content: from Zebulun high-ranking leaders came down.
  - type: text
    content: Issachar’s princes rallied to Deborah,
  - type: text
    content: Issachar stood fast with Barak,
  - type: text
    content: backing him up on the field of battle.
  - type: text
    content: But in Reuben’s divisions there was much second-guessing.
  - type: text
    content: Why all those campfire discussions?
  - type: text
    content: Diverted and distracted,
  - type: text
    content: Reuben’s divisions couldn’t make up their minds.
  - type: text
    content: Gilead played it safe across the Jordan,
  - type: text
    content: and Dan, why did he go off sailing?
  - type: text
    content: Asher kept his distance on the seacoast,
  - type: text
    content: safe and secure in his harbors.
  - type: text
    content: But Zebulun risked life and limb, defied death,
  - type: text
    content: as did Naphtali on the battle heights.
  '19':
  - type: text
    content: The kings came, they fought,
  - type: text
    content: the kings of Canaan fought.
  - type: text
    content: At Taanach they fought, at Megiddo’s brook,
  - type: text
    content: but they took no silver, no plunder.
  - type: text
    content: The stars in the sky joined the fight,
  - type: text
    content: from their courses they fought against Sisera.
  - type: text
    content: The torrent Kishon swept them away,
  - type: text
    content: the torrent attacked them, the torrent Kishon.
  - type: text
    content: Oh, you’ll stomp on the necks of the strong!
  - type: text
    content: Then the hoofs of the horses pounded,
  - type: text
    content: charging, stampeding stallions.
  - type: text
    content: '“Curse Meroz,” says '
  - type: text
    content: God
  - type: text
    content: ’s angel.
  - type: text
    content: “Curse, double curse, its people,
  - type: text
    content: 'Because they didn’t come when '
  - type: text
    content: God
  - type: text
    content: ' needed them,'
  - type: text
    content: 'didn’t rally to '
  - type: text
    content: God
  - type: text
    content: ’s side with valiant fighters.”
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: When they let down their hair in Israel,
  - type: text
    content: they let it blow wild in the wind.
  - type: text
    content: The people volunteered with abandon,
  - type: text
    content: 'bless '
  - type: text
    content: God
  - type: text
    content: '!'
  '24':
  - type: text
    content: Most blessed of all women is Jael,
  - type: text
    content: wife of Heber the Kenite,
  - type: text
    content: most blessed of homemaking women.
  - type: text
    content: He asked for water,
  - type: text
    content: she brought milk;
  - type: text
    content: In a handsome bowl,
  - type: text
    content: she offered cream.
  - type: text
    content: She grabbed a tent peg in her left hand,
  - type: text
    content: with her right hand she seized a hammer.
  - type: text
    content: She hammered Sisera, she smashed his head,
  - type: text
    content: she drove a hole through his temple.
  - type: text
    content: He slumped at her feet. He fell. He sprawled.
  - type: text
    content: He slumped at her feet. He fell.
  - type: text
    content: Slumped. Fallen. Dead.
  - type: text
    content: '* * *'
  '28':
  - type: text
    content: Sisera’s mother waited at the window,
  - type: text
    content: a weary, anxious watch.
  - type: text
    content: “What’s keeping his chariot?
  - type: text
    content: What delays his chariot’s rumble?”
  - type: text
    content: The wisest of her ladies-in-waiting answers
  - type: text
    content: with calm, reassuring words,
  - type: text
    content: “Don’t you think they’re busy at plunder,
  - type: text
    content: dividing up the loot?
  - type: text
    content: A girl, maybe two girls,
  - type: text
    content: for each man,
  - type: text
    content: And for Sisera a bright silk shirt,
  - type: text
    content: a prize, fancy silk shirt!
  - type: text
    content: And a colorful scarf—make it two scarves—
  - type: text
    content: to grace the neck of the plunderer.”
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: Hear O kings! Listen O princes!
  - type: text
    content: 'To '
  - type: text
    content: God
  - type: text
    content: ', yes to '
  - type: text
    content: God
  - type: text
    content: ', I’ll sing,'
  - type: text
    content: 'Make music to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: to the God of Israel.
  '31':
  - type: text
    content: 'Thus may all '
  - type: text
    content: God
  - type: text
    content: ’s enemies perish,
  - type: text
    content: while his lovers be like the unclouded sun.
  - type: text
    content: The land was quiet for forty years.
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', when you left Seir,'
  - type: text
    content: marched across the fields of Edom,
  - type: text
    content: Earth quaked, yes, the skies poured rain,
  - type: text
    content: oh, the clouds made rivers.
  - type: text
    content: 'Mountains leapt before '
  - type: text
    content: God
  - type: text
    content: ', the Sinai God,'
  - type: text
    content: 'before '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel.'
  '6':
  - type: text
    content: In the time of Shamgar son of Anath,
  - type: text
    content: and in the time of Jael,
  - type: text
    content: Public roads were abandoned,
  - type: text
    content: travelers went by backroads.
  - type: text
    content: Warriors became fat and sloppy,
  - type: text
    content: no fight left in them.
  - type: text
    content: Then you, Deborah, rose up;
  - type: text
    content: you got up, a mother in Israel.
  - type: text
    content: God chose new leaders,
  - type: text
    content: who then fought at the gates.
  - type: text
    content: And not a shield or spear to be seen
  - type: text
    content: among the forty companies of Israel.
  '9':
  - type: text
    content: Lift your hearts high, O Israel,
  - type: text
    content: 'with abandon, volunteering yourselves with the people—bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: '* * *'
