document_id: JDG.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'That day Deborah and Barak son of Abinoam sang this song:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When they let down their hair in Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they let it blow wild in the wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people volunteered with abandon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'bless '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hear O kings! Listen O princes!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', yes to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', I’ll sing,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Make music to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', when you left Seir,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: marched across the fields of Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth quaked, yes, the skies poured rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oh, the clouds made rivers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mountains leapt before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Sinai God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: In the time of Shamgar son of Anath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the time of Jael,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Public roads were abandoned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: travelers went by backroads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Warriors became fat and sloppy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no fight left in them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you, Deborah, rose up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you got up, a mother in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God chose new leaders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who then fought at the gates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And not a shield or spear to be seen
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the forty companies of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lift your hearts high, O Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with abandon, volunteering yourselves with the people—bless '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: You who ride on prize donkeys
- type: usfm
  marker: q2
  children:
  - type: text
    text: comfortably mounted on blankets
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you who walk down the roads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ponder, attend!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gather at the town well
- type: usfm
  marker: q2
  children:
  - type: text
    text: and listen to them sing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Chanting the tale of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s victories,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his victories accomplished in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then the people of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: went down to the city gates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wake up, wake up, Deborah!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up, wake up, sing a song!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On your feet, Barak!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take your prisoners, son of Abinoam!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-18
  - type: text
    text: Then the remnant went down to greet the brave ones.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The people of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' joined the mighty ones.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The captains from Ephraim came to the valley,
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind you, Benjamin, with your troops.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Captains marched down from Makir,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Zebulun high-ranking leaders came down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Issachar’s princes rallied to Deborah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Issachar stood fast with Barak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: backing him up on the field of battle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But in Reuben’s divisions there was much second-guessing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why all those campfire discussions?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Diverted and distracted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Reuben’s divisions couldn’t make up their minds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gilead played it safe across the Jordan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Dan, why did he go off sailing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asher kept his distance on the seacoast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe and secure in his harbors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Zebulun risked life and limb, defied death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as did Naphtali on the battle heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-23
  - type: text
    text: The kings came, they fought,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the kings of Canaan fought.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At Taanach they fought, at Megiddo’s brook,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they took no silver, no plunder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stars in the sky joined the fight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from their courses they fought against Sisera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The torrent Kishon swept them away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the torrent attacked them, the torrent Kishon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, you’ll stomp on the necks of the strong!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the hoofs of the horses pounded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: charging, stampeding stallions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Curse Meroz,” says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Curse, double curse, its people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they didn’t come when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' needed them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'didn’t rally to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s side with valiant fighters.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-27
  - type: text
    text: Most blessed of all women is Jael,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wife of Heber the Kenite,
- type: usfm
  marker: q2
  children:
  - type: text
    text: most blessed of homemaking women.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He asked for water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she brought milk;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a handsome bowl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she offered cream.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She grabbed a tent peg in her left hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with her right hand she seized a hammer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She hammered Sisera, she smashed his head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she drove a hole through his temple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He slumped at her feet. He fell. He sprawled.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He slumped at her feet. He fell.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Slumped. Fallen. Dead.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: Sisera’s mother waited at the window,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a weary, anxious watch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What’s keeping his chariot?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What delays his chariot’s rumble?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wisest of her ladies-in-waiting answers
- type: usfm
  marker: q2
  children:
  - type: text
    text: with calm, reassuring words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t you think they’re busy at plunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dividing up the loot?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A girl, maybe two girls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for each man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for Sisera a bright silk shirt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a prize, fancy silk shirt!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a colorful scarf—make it two scarves—
- type: usfm
  marker: q2
  children:
  - type: text
    text: to grace the neck of the plunderer.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Thus may all '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s enemies perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while his lovers be like the unclouded sun.
- type: usfm
  marker: m
  children:
  - type: text
    text: The land was quiet for forty years.
