document_id: MAT.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The World Is Not a Stage
  - type: text
    content: “Be especially careful when you are trying to be good so that you don’t make a performance out of it. It might be good theater, but the God who made you won’t be applauding.
  '14':
  - type: text
    content: “In prayer there is a connection between what God does and what you do. You can’t get forgiveness from God, for instance, without also forgiving others. If you refuse to do your part, you cut yourself off from God’s part.
  '16':
  - type: text
    content: “When you practice some appetite-denying discipline to better concentrate on God, don’t make a production out of it. It might turn you into a small-time celebrity but it won’t make you a saint. If you ‘go into training’ inwardly, act normal outwardly. Shampoo and comb your hair, brush your teeth, wash your face. God doesn’t require attention-getting devices. He won’t overlook what you are doing; he’ll reward you well.
  - type: heading
    content: A Life of God-Worship
  '19':
  - type: text
    content: “Don’t hoard treasure down here where it gets eaten by moths and corroded by rust or—worse!—stolen by burglars. Stockpile treasure in heaven, where it’s safe from moth and rust and burglars. It’s obvious, isn’t it? The place where your treasure is, is the place you will most want to be, and end up being.
  '2':
  - type: text
    content: “When you do something for someone else, don’t call attention to yourself. You’ve seen them in action, I’m sure—‘playactors’ I call them—treating prayer meeting and street corner alike as a stage, acting compassionate as long as someone is watching, playing to the crowds. They get applause, true, but that’s all they get. When you help someone out, don’t think about how it looks. Just do it—quietly and unobtrusively. That is the way your God, who conceived you in love, working behind the scenes, helps you out.
  - type: heading
    content: Pray with Simplicity
  '22':
  - type: text
    content: “Your eyes are windows into your body. If you open your eyes wide in wonder and belief, your body fills up with light. If you live squinty-eyed in greed and distrust, your body is a musty cellar. If you pull the blinds on your windows, what a dark life you will have!
  '24':
  - type: text
    content: “You can’t worship two gods at once. Loving one god, you’ll end up hating the other. Adoration of one feeds contempt for the other. You can’t worship God and Money both.
  '25':
  - type: text
    content: “If you decide for God, living a life of God-worship, it follows that you don’t fuss about what’s on the table at mealtimes or whether the clothes in your closet are in fashion. There is far more to your life than the food you put in your stomach, more to your outer appearance than the clothes you hang on your body. Look at the birds, free and unfettered, not tied down to a job description, careless in the care of God. And you count far more to him than birds.
  '27':
  - type: text
    content: “Has anyone by fussing in front of the mirror ever gotten taller by so much as an inch? All this time and money wasted on fashion—do you think it makes that much difference? Instead of looking at the fashions, walk out into the fields and look at the wildflowers. They never primp or shop, but have you ever seen color and design quite like it? The ten best-dressed men and women in the country look shabby alongside them.
  '30':
  - type: text
    content: '“If God gives such attention to the appearance of wildflowers—most of which are never even seen—don’t you think he’ll attend to you, take pride in you, do his best for you? What I’m trying to do here is to get you to relax, to not be so preoccupied with '
  - type: text
    content: getting
  - type: text
    content: ', so you can respond to God’s '
  - type: text
    content: giving
  - type: text
    content: . People who don’t know God and the way he works fuss over these things, but you know both God and how he works. Steep your life in God-reality, God-initiative, God-provisions. Don’t worry about missing out. You’ll find all your everyday human concerns will be met.
  '34':
  - type: text
    content: “Give your entire attention to what God is doing right now, and don’t get worked up about what may or may not happen tomorrow. God will help you deal with whatever hard things come up when the time comes.
  '5':
  - type: text
    content: “And when you come before God, don’t turn that into a theatrical production either. All these people making a regular show out of their prayers, hoping for fifteen minutes of fame! Do you think God sits in a box seat?
  '6':
  - type: text
    content: '“Here’s what I want you to do: Find a quiet, secluded place so you won’t be tempted to role-play before God. Just be there as simply and honestly as you can manage. The focus will shift from you to God, and you will begin to sense his grace.'
  '7':
  - type: text
    content: '“The world is full of so-called prayer warriors who are prayer-ignorant. They’re full of formulas and programs and advice, peddling techniques for getting what you want from God. Don’t fall for that nonsense. This is your Father you are dealing with, and he knows better than you what you need. With a God like this loving you, you can pray very simply. Like this:'
  - type: text
    content: Our Father in heaven,
  - type: text
    content: Reveal who you are.
  - type: text
    content: Set the world right;
  - type: text
    content: Do what’s best—
  - type: text
    content: as above, so below.
  - type: text
    content: Keep us alive with three square meals.
  - type: text
    content: Keep us forgiven with you and forgiving others.
  - type: text
    content: Keep us safe from ourselves and the Devil.
  - type: text
    content: You’re in charge!
  - type: text
    content: You can do anything you want!
  - type: text
    content: You’re ablaze in beauty!
  - type: text
    content: Yes. Yes. Yes.
