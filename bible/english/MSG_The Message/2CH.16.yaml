document_id: 2CH.16,97
type_code: eng
verses:
  '1':
  - type: text
    content: But in the thirty-sixth year of Asa’s reign, Baasha king of Israel attacked. He started it by building a fort at Ramah and closing the border between Israel and Judah to keep Asa king of Judah from leaving or entering.
  '10':
  - type: text
    content: At that, Asa lost his temper. Angry, he put Hanani in the stocks. At the same time Asa started abusing some of the people.
  '11':
  - type: text
    content: 'A full account of Asa is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: '. In the thirty-ninth year of his reign Asa came down with a severe case of foot infection. He didn’t ask '
  - type: text
    content: God
  - type: text
    content: ' for help, but went instead to the doctors. Then Asa died; he died in the forty-first year of his reign. They buried him in a mausoleum that he had built for himself in the City of David. They laid him in a crypt full of aromatic oils and spices. Then they had a huge bonfire in his memory.'
  '2':
  - type: text
    content: 'Asa took silver and gold from the treasuries of The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and the royal palace and sent it to Ben-Hadad, king of Aram who lived in Damascus, with this message: “Let’s make a treaty like the one between our fathers. I’m showing my good faith with this gift of silver and gold. Break your deal with Baasha king of Israel so he’ll quit fighting against me.”'
  '4':
  - type: text
    content: Ben-Hadad went along with King Asa and sent his troops against the towns of Israel. They sacked Ijon, Dan, Abel Maim, and all the store-cities of Naphtali. When Baasha got the report, he quit fortifying Ramah.
  '6':
  - type: text
    content: Then King Asa issued orders to his people in Judah to haul away the logs and stones Baasha had used in the fortification of Ramah and used them himself to fortify Geba and Mizpah.
  '7':
  - type: text
    content: 'Just after that, Hanani the seer came to Asa king of Judah and said, “Because you went for help to the king of Aram and didn’t ask '
  - type: text
    content: God
  - type: text
    content: ' for help, you’ve lost a victory over the army of the king of Aram. Didn’t the Ethiopians and Libyans come against you with superior forces, completely outclassing you with their chariots and cavalry? But you asked '
  - type: text
    content: God
  - type: text
    content: ' for help and he gave you the victory. '
  - type: text
    content: God
  - type: text
    content: ' is always on the alert, constantly on the lookout for people who are totally committed to him. You were foolish to go for human help when you could have had God’s help. Now you’re in trouble—one round of war after another.”'
