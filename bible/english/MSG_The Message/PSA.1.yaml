document_id: PSA.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: How well God must like you—
  - type: text
    content: you don’t walk in the ruts of those blind-as-bats,
  - type: text
    content: you don’t stand with the good-for-nothings,
  - type: text
    content: you don’t take your seat among the know-it-alls.
  '2':
  - type: text
    content: 'Instead you thrill to '
  - type: text
    content: God
  - type: text
    content: ’s Word,
  - type: text
    content: you chew on Scripture day and night.
  - type: text
    content: You’re a tree replanted in Eden,
  - type: text
    content: bearing fresh fruit every month,
  - type: text
    content: Never dropping a leaf,
  - type: text
    content: always in blossom.
  '4':
  - type: text
    content: You’re not at all like the wicked,
  - type: text
    content: who are mere windblown dust—
  - type: text
    content: Without defense in court,
  - type: text
    content: unfit company for innocent people.
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' charts the road you take.'
  - type: text
    content: 'The road '
  - type: text
    content: they
  - type: text
    content: ' take leads to nowhere.'
