document_id: PRO.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Don’t Know Tomorrow
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Don’t brashly announce what you’re going to do tomorrow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you don’t know the first thing about tomorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Don’t call attention to yourself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let others do that for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Carrying a log across your shoulders
- type: usfm
  marker: q2
  children:
  - type: text
    text: while you’re hefting a boulder with your arms
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is nothing compared to the burden
- type: usfm
  marker: q2
  children:
  - type: text
    text: of putting up with a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We’re blasted by anger and swamped by rage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but who can survive jealousy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A spoken reprimand is better
- type: usfm
  marker: q2
  children:
  - type: text
    text: than approval that’s never expressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wounds from a lover are worth it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: kisses from an enemy do you in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When you’ve stuffed yourself, you refuse dessert;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you’re starved, you could eat a horse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: People who won’t settle down, wandering hither and yon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: are like restless birds, flitting to and fro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Just as lotions and fragrance give sensual delight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sweet friendship refreshes the soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t leave your friends or your parents’ friends
- type: usfm
  marker: q2
  children:
  - type: text
    text: and run home to your family when things get rough;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Better a nearby friend
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a distant family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Become wise, dear child, and make me happy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then nothing the world throws my way will upset me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A prudent person sees trouble coming and ducks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a simpleton walks in blindly and is clobbered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hold tight to collateral on any loan to a stranger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be wary of accepting what a transient has pawned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If you wake your friend in the early morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: by shouting “Rise and shine!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will sound to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: more like a curse than a blessing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: A nagging spouse is like
- type: usfm
  marker: q2
  children:
  - type: text
    text: the drip, drip, drip of a leaky faucet;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can’t turn it off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you can’t get away from it.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Your Face Mirrors Your Heart
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You use steel to sharpen steel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and one friend sharpens another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If you care for your orchard, you’ll enjoy its fruit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you honor your boss, you’ll be honored.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Just as water mirrors your face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so your face mirrors your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hell has a voracious appetite,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lust just never quits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The purity of silver and gold is tested
- type: usfm
  marker: q2
  children:
  - type: text
    text: by putting them in the fire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The purity of human hearts is tested
- type: usfm
  marker: q2
  children:
  - type: text
    text: by giving them a little fame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pound on a fool all you like—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you can’t pound out foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-27
  - type: text
    text: Know your sheep by name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: carefully attend to your flocks;
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Don’t take them for granted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: possessions don’t last forever, you know.)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then, when the crops are in
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the harvest is stored in the barns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can knit sweaters from lambs’ wool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sell your goats for a profit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be plenty of milk and meat
- type: usfm
  marker: q2
  children:
  - type: text
    text: to last your family through the winter.
