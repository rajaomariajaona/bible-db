document_id: PRO.27,97
type_code: eng
verses:
  '1':
  - type: heading
    content: You Don’t Know Tomorrow
  - type: text
    content: Don’t brashly announce what you’re going to do tomorrow;
  - type: text
    content: you don’t know the first thing about tomorrow.
  '10':
  - type: text
    content: Don’t leave your friends or your parents’ friends
  - type: text
    content: and run home to your family when things get rough;
  - type: text
    content: Better a nearby friend
  - type: text
    content: than a distant family.
  '11':
  - type: text
    content: Become wise, dear child, and make me happy;
  - type: text
    content: then nothing the world throws my way will upset me.
  '12':
  - type: text
    content: A prudent person sees trouble coming and ducks;
  - type: text
    content: a simpleton walks in blindly and is clobbered.
  '13':
  - type: text
    content: Hold tight to collateral on any loan to a stranger;
  - type: text
    content: be wary of accepting what a transient has pawned.
  '14':
  - type: text
    content: If you wake your friend in the early morning
  - type: text
    content: by shouting “Rise and shine!”
  - type: text
    content: It will sound to him
  - type: text
    content: more like a curse than a blessing.
  '15':
  - type: text
    content: A nagging spouse is like
  - type: text
    content: the drip, drip, drip of a leaky faucet;
  - type: text
    content: You can’t turn it off,
  - type: text
    content: and you can’t get away from it.
  - type: heading
    content: Your Face Mirrors Your Heart
  '17':
  - type: text
    content: You use steel to sharpen steel,
  - type: text
    content: and one friend sharpens another.
  '18':
  - type: text
    content: If you care for your orchard, you’ll enjoy its fruit;
  - type: text
    content: if you honor your boss, you’ll be honored.
  '19':
  - type: text
    content: Just as water mirrors your face,
  - type: text
    content: so your face mirrors your heart.
  '2':
  - type: text
    content: Don’t call attention to yourself;
  - type: text
    content: let others do that for you.
  '20':
  - type: text
    content: Hell has a voracious appetite,
  - type: text
    content: and lust just never quits.
  '21':
  - type: text
    content: The purity of silver and gold is tested
  - type: text
    content: by putting them in the fire;
  - type: text
    content: The purity of human hearts is tested
  - type: text
    content: by giving them a little fame.
  '22':
  - type: text
    content: Pound on a fool all you like—
  - type: text
    content: you can’t pound out foolishness.
  '23':
  - type: text
    content: Know your sheep by name;
  - type: text
    content: carefully attend to your flocks;
  - type: text
    content: (Don’t take them for granted;
  - type: text
    content: possessions don’t last forever, you know.)
  - type: text
    content: And then, when the crops are in
  - type: text
    content: and the harvest is stored in the barns,
  - type: text
    content: You can knit sweaters from lambs’ wool,
  - type: text
    content: and sell your goats for a profit;
  - type: text
    content: There will be plenty of milk and meat
  - type: text
    content: to last your family through the winter.
  '3':
  - type: text
    content: Carrying a log across your shoulders
  - type: text
    content: while you’re hefting a boulder with your arms
  - type: text
    content: Is nothing compared to the burden
  - type: text
    content: of putting up with a fool.
  '4':
  - type: text
    content: We’re blasted by anger and swamped by rage,
  - type: text
    content: but who can survive jealousy?
  '5':
  - type: text
    content: A spoken reprimand is better
  - type: text
    content: than approval that’s never expressed.
  '6':
  - type: text
    content: The wounds from a lover are worth it;
  - type: text
    content: kisses from an enemy do you in.
  '7':
  - type: text
    content: When you’ve stuffed yourself, you refuse dessert;
  - type: text
    content: when you’re starved, you could eat a horse.
  '8':
  - type: text
    content: People who won’t settle down, wandering hither and yon,
  - type: text
    content: are like restless birds, flitting to and fro.
  '9':
  - type: text
    content: Just as lotions and fragrance give sensual delight,
  - type: text
    content: a sweet friendship refreshes the soul.
