document_id: JDG.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tola
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Tola son of Puah, the son of Dodo, was next after Abimelech. He rose to the occasion to save Israel. He was a man of Issachar. He lived in Shamir in the hill country of Ephraim. He judged Israel for twenty-three years and then died and was buried at Shamir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jair
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: After him, Jair the Gileadite stepped into leadership. He judged Israel for twenty-two years. He had thirty sons who rode on thirty donkeys and had thirty towns in Gilead. The towns are still called Jair’s Villages. Jair died and was buried in Kamon.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'And then the People of Israel went back to doing evil in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s sight. They worshiped the Baal gods and Ashtoreth goddesses: gods of Aram, Sidon, and Moab; gods of the Ammonites and the Philistines. They just walked off and left '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', quit worshiping him. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' exploded in hot anger at Israel and sold them off to the Philistines and Ammonites, who, beginning that year, bullied and battered the People of Israel mercilessly. For eighteen years they had them under their thumb, all the People of Israel who lived east of the Jordan in the Amorite country of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the Ammonites crossed the Jordan to go to war also against Judah, Benjamin, and Ephraim. Israel was in a bad way!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The People of Israel cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for help: “We’ve sinned against you! We left our God and worshiped the Baal gods!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered the People of Israel: “When the Egyptians, Amorites, Ammonites, Philistines, Sidonians—even Amalek and Midian!—oppressed you and you cried out to me for help, I saved you from them. And now you’ve gone off and betrayed me, worshiping other gods. I’m not saving you anymore. Go ahead! Cry out for help to the gods you’ve chosen—let them get you out of the mess you’re in!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The People of Israel said to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “We’ve sinned. Do to us whatever you think best, but please, get us out of this!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then they cleaned house of the foreign gods and worshiped only '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' took Israel’s troubles to heart.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jephthah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: The Ammonites prepared for war, setting camp in Gilead. The People of Israel set their rival camp in Mizpah. The leaders in Gilead said, “Who will stand up for us against the Ammonites? We’ll make him head over everyone in Gilead!”
