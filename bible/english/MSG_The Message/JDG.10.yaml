document_id: JDG.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola
  - type: text
    content: Tola son of Puah, the son of Dodo, was next after Abimelech. He rose to the occasion to save Israel. He was a man of Issachar. He lived in Shamir in the hill country of Ephraim. He judged Israel for twenty-three years and then died and was buried at Shamir.
  - type: heading
    content: Jair
  '10':
  - type: text
    content: 'The People of Israel cried out to '
  - type: text
    content: God
  - type: text
    content: ' for help: “We’ve sinned against you! We left our God and worshiped the Baal gods!”'
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' answered the People of Israel: “When the Egyptians, Amorites, Ammonites, Philistines, Sidonians—even Amalek and Midian!—oppressed you and you cried out to me for help, I saved you from them. And now you’ve gone off and betrayed me, worshiping other gods. I’m not saving you anymore. Go ahead! Cry out for help to the gods you’ve chosen—let them get you out of the mess you’re in!”'
  '15':
  - type: text
    content: 'The People of Israel said to '
  - type: text
    content: God
  - type: text
    content: ': “We’ve sinned. Do to us whatever you think best, but please, get us out of this!”'
  '16':
  - type: text
    content: 'Then they cleaned house of the foreign gods and worshiped only '
  - type: text
    content: God
  - type: text
    content: '. And '
  - type: text
    content: God
  - type: text
    content: ' took Israel’s troubles to heart.'
  - type: heading
    content: Jephthah
  '17':
  - type: text
    content: The Ammonites prepared for war, setting camp in Gilead. The People of Israel set their rival camp in Mizpah. The leaders in Gilead said, “Who will stand up for us against the Ammonites? We’ll make him head over everyone in Gilead!”
  '3':
  - type: text
    content: After him, Jair the Gileadite stepped into leadership. He judged Israel for twenty-two years. He had thirty sons who rode on thirty donkeys and had thirty towns in Gilead. The towns are still called Jair’s Villages. Jair died and was buried in Kamon.
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: 'And then the People of Israel went back to doing evil in '
  - type: text
    content: God
  - type: text
    content: '’s sight. They worshiped the Baal gods and Ashtoreth goddesses: gods of Aram, Sidon, and Moab; gods of the Ammonites and the Philistines. They just walked off and left '
  - type: text
    content: God
  - type: text
    content: ', quit worshiping him. And '
  - type: text
    content: God
  - type: text
    content: ' exploded in hot anger at Israel and sold them off to the Philistines and Ammonites, who, beginning that year, bullied and battered the People of Israel mercilessly. For eighteen years they had them under their thumb, all the People of Israel who lived east of the Jordan in the Amorite country of Gilead.'
  '9':
  - type: text
    content: Then the Ammonites crossed the Jordan to go to war also against Judah, Benjamin, and Ephraim. Israel was in a bad way!
