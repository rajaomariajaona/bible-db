document_id: 1TI.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simple Faith and Plain Truth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: The first thing I want you to do is pray. Pray every way you know how, for everyone you know. Pray especially for rulers and their governments to rule well so we can be quietly about our business of living simply, in humble contemplation. This is the way our Savior God wants us to live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: 'He wants not only us but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: everyone
  - type: text
    text: ' saved, you know, everyone to get to know the truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we’ve
  - type: text
    text: ' learned: that there’s one God and only one, and one Priest-Mediator between God and us—Jesus, who offered himself in exchange for everyone held captive by sin, to set them all free. Eventually the news is going to get out. This and this only has been my appointed work: getting this news to those who have never heard of God, and explaining how it works by simple faith and plain truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: Since prayer is at the bottom of all this, what I want mostly is for men to pray—not shaking angry fists at enemies but raising holy hands to God. And I want women to get in there with the men in humility before God, not primping before a mirror or chasing the latest fashions but doing something beautiful for God and becoming beautiful doing it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: I don’t let women take over and tell the men what to do. They should study to be quiet and obedient along with everyone else. Adam was made first, then Eve; woman was deceived first—our pioneer in sin!—with Adam right on her heels. On the other hand, her childbearing brought about salvation, reversing Eve. But this salvation only comes to those who continue in faith, love, and holiness, gathering it all into maturity. You can depend on this.
