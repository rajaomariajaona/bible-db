document_id: ISA.62,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Look, Your Savior Comes!
  - type: text
    content: Regarding Zion, I can’t keep my mouth shut,
  - type: text
    content: regarding Jerusalem, I can’t hold my tongue,
  - type: text
    content: Until her righteousness blazes down like the sun
  - type: text
    content: and her salvation flames up like a torch.
  - type: text
    content: Foreign countries will see your righteousness,
  - type: text
    content: and world leaders your glory.
  - type: text
    content: You’ll get a brand-new name
  - type: text
    content: 'straight from the mouth of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: 'You’ll be a stunning crown in the palm of '
  - type: text
    content: God
  - type: text
    content: ’s hand,
  - type: text
    content: a jeweled gold cup held high in the hand of your God.
  - type: text
    content: No more will anyone call you Rejected,
  - type: text
    content: and your country will no more be called Ruined.
  - type: text
    content: You’ll be called Hephzibah (My Delight),
  - type: text
    content: and your land Beulah (Married),
  - type: text
    content: 'Because '
  - type: text
    content: God
  - type: text
    content: ' delights in you'
  - type: text
    content: and your land will be like a wedding celebration.
  - type: text
    content: For as a young man marries his virgin bride,
  - type: text
    content: so your builder marries you,
  - type: text
    content: And as a bridegroom is happy in his bride,
  - type: text
    content: so your God is happy with you.
  '10':
  - type: text
    content: Walk out of the gates. Get going!
  - type: text
    content: Get the road ready for the people.
  - type: text
    content: Build the highway. Get at it!
  - type: text
    content: Clear the debris,
  - type: text
    content: hoist high a flag, a signal to all peoples!
  - type: text
    content: 'Yes! '
  - type: text
    content: God
  - type: text
    content: ' has broadcast to all the world:'
  - type: text
    content: “Tell daughter Zion, ‘Look! Your Savior comes,
  - type: text
    content: Ready to do what he said he’d do,
  - type: text
    content: prepared to complete what he promised.’”
  - type: text
    content: 'Zion will be called new names: Holy People, '
  - type: text
    content: God
  - type: text
    content: -Redeemed,
  - type: text
    content: Sought-Out, City-Not-Forsaken.
  '6':
  - type: text
    content: I’ve posted watchmen on your walls, Jerusalem.
  - type: text
    content: Day and night they keep at it, praying, calling out,
  - type: text
    content: 'reminding '
  - type: text
    content: God
  - type: text
    content: ' to remember.'
  - type: text
    content: They are to give him no peace until he does what he said,
  - type: text
    content: until he makes Jerusalem famous as the City of Praise.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' has taken a solemn oath,'
  - type: text
    content: 'an oath he means to keep:'
  - type: text
    content: “Never again will I open your grain-filled barns
  - type: text
    content: to your enemies to loot and eat.
  - type: text
    content: Never again will foreigners drink the wine
  - type: text
    content: that you worked so hard to produce.
  - type: text
    content: No. The farmers who grow the food will eat the food
  - type: text
    content: 'and praise '
  - type: text
    content: God
  - type: text
    content: ' for it.'
  - type: text
    content: And those who make the wine will drink the wine
  - type: text
    content: in my holy courtyards.”
