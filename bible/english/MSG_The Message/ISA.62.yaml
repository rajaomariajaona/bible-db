document_id: ISA.62
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Look, Your Savior Comes!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: Regarding Zion, I can’t keep my mouth shut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: regarding Jerusalem, I can’t hold my tongue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until her righteousness blazes down like the sun
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her salvation flames up like a torch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreign countries will see your righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and world leaders your glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll get a brand-new name
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'straight from the mouth of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’ll be a stunning crown in the palm of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a jeweled gold cup held high in the hand of your God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more will anyone call you Rejected,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your country will no more be called Ruined.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll be called Hephzibah (My Delight),
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your land Beulah (Married),
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' delights in you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your land will be like a wedding celebration.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For as a young man marries his virgin bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so your builder marries you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as a bridegroom is happy in his bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so your God is happy with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I’ve posted watchmen on your walls, Jerusalem.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Day and night they keep at it, praying, calling out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'reminding '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to remember.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are to give him no peace until he does what he said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: until he makes Jerusalem famous as the City of Praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has taken a solemn oath,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'an oath he means to keep:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Never again will I open your grain-filled barns
- type: usfm
  marker: q2
  children:
  - type: text
    text: to your enemies to loot and eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never again will foreigners drink the wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you worked so hard to produce.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No. The farmers who grow the food will eat the food
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and praise '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for it.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who make the wine will drink the wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: in my holy courtyards.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: Walk out of the gates. Get going!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get the road ready for the people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Build the highway. Get at it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clear the debris,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hoist high a flag, a signal to all peoples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has broadcast to all the world:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Tell daughter Zion, ‘Look! Your Savior comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ready to do what he said he’d do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: prepared to complete what he promised.’”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Zion will be called new names: Holy People, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -Redeemed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sought-Out, City-Not-Forsaken.
