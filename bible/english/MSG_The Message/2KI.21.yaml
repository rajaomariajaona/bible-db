document_id: 2KI.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manasseh of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'Manasseh was twelve years old when he became king. He ruled for fifty-five years in Jerusalem. His mother’s name was Hephzibah. In '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s judgment he was a bad king—an evil king. He reintroduced all the moral rot and spiritual corruption that had been scoured from the country when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' dispossessed the pagan nations in favor of the children of Israel. He rebuilt all the sex-and-religion shrines that his father Hezekiah had torn down, and he built altars and phallic images for the sex god Baal and sex goddess Asherah, exactly what Ahab king of Israel had done. He worshiped the cosmic powers, taking orders from the constellations. He even built these pagan altars in The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the very Jerusalem Temple dedicated exclusively by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s decree (“in Jerusalem I place my Name”) to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Name. And he built shrines to the cosmic powers and placed them in both courtyards of The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. He burned his own son in a sacrificial offering. He practiced black magic and fortunetelling. He held séances and consulted spirits from the underworld. Much evil—in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s judgment, a career in evil. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'As a last straw he placed the carved image of the sex goddess Asherah in The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a flagrant and provocative violation of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s well-known statement to both David and Solomon, “In this Temple and in this city Jerusalem, my choice out of all the tribes of Israel, I place my Name—exclusively and forever. Never again will I let my people Israel wander off from this land I gave to their ancestors. But here’s the condition: They must keep everything I’ve commanded in the instructions my servant Moses passed on to them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But the people didn’t listen. Manasseh led them off the beaten path into practices of evil even exceeding the evil of the pagan nations that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had earlier destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', thoroughly fed up, sent word through his servants the prophets: “Because Manasseh king of Judah has committed these outrageous sins, eclipsing the sin-performance of the Amorites before him, setting new records in evil, using foul idols to debase Judah into a nation of sinners, this is my judgment, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s verdict: I, the God of Israel, will visit catastrophe on Jerusalem and Judah, a doom so terrible that when people hear of it they’ll shake their heads in disbelief, saying, ‘I can’t believe it!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: “I’ll visit the fate of Samaria on Jerusalem, a rerun of Ahab’s doom. I’ll wipe out Jerusalem as you would wipe out a dish, wiping it out and turning it over to dry. I’ll get rid of what’s left of my inheritance, dumping them on their enemies. If their enemies can salvage anything from them, they’re welcome to it. They’ve been nothing but trouble to me from the day their ancestors left Egypt until now. They pushed me to my limit; I won’t put up with their evil any longer.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The final word on Manasseh was that he was an indiscriminate murderer. He drenched Jerusalem with the innocent blood of his victims. That’s on top of all the sins in which he involved his people. As far as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was concerned, he’d turned them into a nation of sinners.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'The rest of the life and times of Manasseh, everything he did and his sorry record of sin, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: . Manasseh died and joined his ancestors. He was buried in the palace garden, the Garden of Uzza. His son Amon became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amon of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: 'Amon was twenty-two years old when he became king. He was king for two years in Jerusalem. His mother’s name was Meshullemeth, the daughter of Haruz. She was from Jotbah. In '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s opinion he lived an evil life, just like his father Manasseh. He followed in the footsteps of his father, serving and worshiping the same foul gods his father had served. He totally deserted the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of his ancestors; he did not live '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: Amon’s servants revolted and assassinated him, killing the king right in his own palace. But the people, in their turn, killed the conspirators against King Amon and then crowned Josiah, Amon’s son, as king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'The rest of the life and times of Amon is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: . They buried Amon in his burial plot in the Garden of Uzza. His son Josiah became the next king.
