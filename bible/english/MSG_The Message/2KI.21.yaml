document_id: 2KI.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh of Judah
  - type: text
    content: 'Manasseh was twelve years old when he became king. He ruled for fifty-five years in Jerusalem. His mother’s name was Hephzibah. In '
  - type: text
    content: God
  - type: text
    content: '’s judgment he was a bad king—an evil king. He reintroduced all the moral rot and spiritual corruption that had been scoured from the country when '
  - type: text
    content: God
  - type: text
    content: ' dispossessed the pagan nations in favor of the children of Israel. He rebuilt all the sex-and-religion shrines that his father Hezekiah had torn down, and he built altars and phallic images for the sex god Baal and sex goddess Asherah, exactly what Ahab king of Israel had done. He worshiped the cosmic powers, taking orders from the constellations. He even built these pagan altars in The Temple of '
  - type: text
    content: God
  - type: text
    content: ', the very Jerusalem Temple dedicated exclusively by '
  - type: text
    content: God
  - type: text
    content: '’s decree (“in Jerusalem I place my Name”) to '
  - type: text
    content: God
  - type: text
    content: '’s Name. And he built shrines to the cosmic powers and placed them in both courtyards of The Temple of '
  - type: text
    content: God
  - type: text
    content: '. He burned his own son in a sacrificial offering. He practiced black magic and fortunetelling. He held séances and consulted spirits from the underworld. Much evil—in '
  - type: text
    content: God
  - type: text
    content: '’s judgment, a career in evil. And '
  - type: text
    content: God
  - type: text
    content: ' was angry.'
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', thoroughly fed up, sent word through his servants the prophets: “Because Manasseh king of Judah has committed these outrageous sins, eclipsing the sin-performance of the Amorites before him, setting new records in evil, using foul idols to debase Judah into a nation of sinners, this is my judgment, '
  - type: text
    content: God
  - type: text
    content: '’s verdict: I, the God of Israel, will visit catastrophe on Jerusalem and Judah, a doom so terrible that when people hear of it they’ll shake their heads in disbelief, saying, ‘I can’t believe it!’'
  '13':
  - type: text
    content: “I’ll visit the fate of Samaria on Jerusalem, a rerun of Ahab’s doom. I’ll wipe out Jerusalem as you would wipe out a dish, wiping it out and turning it over to dry. I’ll get rid of what’s left of my inheritance, dumping them on their enemies. If their enemies can salvage anything from them, they’re welcome to it. They’ve been nothing but trouble to me from the day their ancestors left Egypt until now. They pushed me to my limit; I won’t put up with their evil any longer.”
  '16':
  - type: text
    content: 'The final word on Manasseh was that he was an indiscriminate murderer. He drenched Jerusalem with the innocent blood of his victims. That’s on top of all the sins in which he involved his people. As far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned, he’d turned them into a nation of sinners.'
  '17':
  - type: text
    content: 'The rest of the life and times of Manasseh, everything he did and his sorry record of sin, is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . Manasseh died and joined his ancestors. He was buried in the palace garden, the Garden of Uzza. His son Amon became the next king.
  - type: heading
    content: Amon of Judah
  '19':
  - type: text
    content: 'Amon was twenty-two years old when he became king. He was king for two years in Jerusalem. His mother’s name was Meshullemeth, the daughter of Haruz. She was from Jotbah. In '
  - type: text
    content: God
  - type: text
    content: '’s opinion he lived an evil life, just like his father Manasseh. He followed in the footsteps of his father, serving and worshiping the same foul gods his father had served. He totally deserted the '
  - type: text
    content: God
  - type: text
    content: ' of his ancestors; he did not live '
  - type: text
    content: God
  - type: text
    content: ’s way.
  '23':
  - type: text
    content: Amon’s servants revolted and assassinated him, killing the king right in his own palace. But the people, in their turn, killed the conspirators against King Amon and then crowned Josiah, Amon’s son, as king.
  '25':
  - type: text
    content: 'The rest of the life and times of Amon is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . They buried Amon in his burial plot in the Garden of Uzza. His son Josiah became the next king.
  '7':
  - type: text
    content: 'As a last straw he placed the carved image of the sex goddess Asherah in The Temple of '
  - type: text
    content: God
  - type: text
    content: ', a flagrant and provocative violation of '
  - type: text
    content: God
  - type: text
    content: '’s well-known statement to both David and Solomon, “In this Temple and in this city Jerusalem, my choice out of all the tribes of Israel, I place my Name—exclusively and forever. Never again will I let my people Israel wander off from this land I gave to their ancestors. But here’s the condition: They must keep everything I’ve commanded in the instructions my servant Moses passed on to them.”'
  '9':
  - type: text
    content: 'But the people didn’t listen. Manasseh led them off the beaten path into practices of evil even exceeding the evil of the pagan nations that '
  - type: text
    content: God
  - type: text
    content: ' had earlier destroyed.'
