document_id: ISA.48,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Tested in the Furnace of Affliction
  - type: text
    content: “And now listen to this, family of Jacob,
  - type: text
    content: 'you who are called by the name Israel:'
  - type: text
    content: Who got you started in the loins of Judah,
  - type: text
    content: 'you who use '
  - type: text
    content: God
  - type: text
    content: ’s name to back up your promises
  - type: text
    content: and pray to the God of Israel?
  - type: text
    content: But do you mean it?
  - type: text
    content: Do you live like it?
  - type: text
    content: You claim to be citizens of the Holy City;
  - type: text
    content: you act as though you lean on the God of Israel,
  - type: text
    content: 'named '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: 'For a long time now, I’ve let you in on the way I work:'
  - type: text
    content: I told you what I was going to do beforehand,
  - type: text
    content: then I did it and it was done, and that’s that.
  - type: text
    content: I know you’re a bunch of hardheads,
  - type: text
    content: obstinate and flint-faced,
  - type: text
    content: So I got a running start and began telling you
  - type: text
    content: what was going on before it even happened.
  - type: text
    content: That is why you can’t say,
  - type: text
    content: ‘My god-idol did this.’
  - type: text
    content: ‘My favorite god-carving commanded this.’
  - type: text
    content: You have all this evidence
  - type: text
    content: confirmed by your own eyes and ears.
  - type: text
    content: Shouldn’t you be talking about it?
  - type: text
    content: And that was just the beginning.
  - type: text
    content: I have a lot more to tell you,
  - type: text
    content: things you never knew existed.
  - type: text
    content: This isn’t a variation on the same old thing.
  - type: text
    content: This is new, brand-new,
  - type: text
    content: something you’d never guess or dream up.
  - type: text
    content: When you hear this you won’t be able to say,
  - type: text
    content: ‘I knew that all along.’
  - type: text
    content: You’ve never been good listeners to me.
  - type: text
    content: You have a history of ignoring me,
  - type: text
    content: A sorry track record of fickle attachments—
  - type: text
    content: rebels from the womb.
  - type: text
    content: But out of the sheer goodness of my heart,
  - type: text
    content: because of who I am,
  - type: text
    content: I keep a tight rein on my anger and hold my temper.
  - type: text
    content: I don’t wash my hands of you.
  - type: text
    content: Do you see what I’ve done?
  - type: text
    content: I’ve refined you, but not without fire.
  - type: text
    content: I’ve tested you like silver in the furnace of affliction.
  - type: text
    content: Out of myself, simply because of who I am, I do what I do.
  - type: text
    content: I have my reputation to keep up.
  - type: text
    content: I’m not playing second fiddle to either gods or people.
  '12':
  - type: text
    content: “Listen, Jacob. Listen, Israel—
  - type: text
    content: I’m the One who named you!
  - type: text
    content: I’m the One.
  - type: text
    content: I got things started and, yes, I’ll wrap them up.
  - type: text
    content: Earth is my work, handmade.
  - type: text
    content: And the skies—I made them, too, horizon to horizon.
  - type: text
    content: When I speak, they’re on their feet, at attention.
  '14':
  - type: text
    content: ' “Come everybody, gather around, listen:'
  - type: text
    content: Who among the gods has delivered the news?
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', love this man Cyrus, and I’m using him'
  - type: text
    content: to do what I want with Babylon.
  - type: text
    content: I, yes I, have spoken. I’ve called him.
  - type: text
    content: I’ve brought him here. He’ll be successful.
  - type: text
    content: 'Come close, listen carefully:'
  - type: text
    content: I’ve never kept secrets from you.
  - type: text
    content: I’ve always been present with you.”
  - type: heading
    content: Your Progeny, Like Grains of Sand
  '16':
  - type: text
    content: ' And now, the Master, '
  - type: text
    content: God
  - type: text
    content: ', sends me and his Spirit'
  - type: text
    content: 'with this Message from '
  - type: text
    content: God
  - type: text
    content: 'your Redeemer, The Holy of Israel:'
  - type: text
    content: '“I am '
  - type: text
    content: God
  - type: text
    content: ', your God,'
  - type: text
    content: who teaches you how to live right and well.
  - type: text
    content: I show you what to do, where to go.
  - type: text
    content: If you had listened all along to what I told you,
  - type: text
    content: your life would have flowed full like a river,
  - type: text
    content: blessings rolling in like waves from the sea.
  - type: text
    content: Children and grandchildren are like sand,
  - type: text
    content: your progeny like grains of sand.
  - type: text
    content: There would be no end of them,
  - type: text
    content: no danger of losing touch with me.”
  '20':
  - type: text
    content: Get out of Babylon! Run from the Babylonians!
  - type: text
    content: Shout the news. Broadcast it.
  - type: text
    content: Let the world know, the whole world.
  - type: text
    content: Tell them, “
  - type: text
    content: God
  - type: text
    content: ' redeemed his dear servant Jacob!”'
  '21':
  - type: text
    content: They weren’t thirsty when he led them through the deserts.
  - type: text
    content: He made water pour out of the rock;
  - type: text
    content: he split the rock and the water gushed.
  '22':
  - type: text
    content: '“There is no peace,” says '
  - type: text
    content: God
  - type: text
    content: ', “for the wicked.”'
