document_id: ISA.48,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tested in the Furnace of Affliction
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And now listen to this, family of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you who are called by the name Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who got you started in the loins of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you who use '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name to back up your promises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pray to the God of Israel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But do you mean it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you live like it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You claim to be citizens of the Holy City;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you act as though you lean on the God of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'named '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For a long time now, I’ve let you in on the way I work:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I told you what I was going to do beforehand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I did it and it was done, and that’s that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you’re a bunch of hardheads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: obstinate and flint-faced,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I got a running start and began telling you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what was going on before it even happened.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why you can’t say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My god-idol did this.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My favorite god-carving commanded this.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have all this evidence
  - type: usfm
    marker: q2
    children:
    - type: text
      text: confirmed by your own eyes and ears.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shouldn’t you be talking about it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that was just the beginning.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have a lot more to tell you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: things you never knew existed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This isn’t a variation on the same old thing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is new, brand-new,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: something you’d never guess or dream up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you hear this you won’t be able to say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I knew that all along.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve never been good listeners to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have a history of ignoring me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sorry track record of fickle attachments—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebels from the womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But out of the sheer goodness of my heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of who I am,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I keep a tight rein on my anger and hold my temper.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t wash my hands of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you see what I’ve done?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve refined you, but not without fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve tested you like silver in the furnace of affliction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of myself, simply because of who I am, I do what I do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have my reputation to keep up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m not playing second fiddle to either gods or people.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen, Jacob. Listen, Israel—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m the One who named you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m the One.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I got things started and, yes, I’ll wrap them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth is my work, handmade.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the skies—I made them, too, horizon to horizon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I speak, they’re on their feet, at attention.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “Come everybody, gather around, listen:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who among the gods has delivered the news?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', love this man Cyrus, and I’m using him'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do what I want with Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, yes I, have spoken. I’ve called him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve brought him here. He’ll be successful.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Come close, listen carefully:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve never kept secrets from you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve always been present with you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Your Progeny, Like Grains of Sand
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' And now, the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', sends me and his Spirit'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with this Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your Redeemer, The Holy of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who teaches you how to live right and well.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I show you what to do, where to go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you had listened all along to what I told you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your life would have flowed full like a river,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings rolling in like waves from the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Children and grandchildren are like sand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your progeny like grains of sand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There would be no end of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no danger of losing touch with me.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get out of Babylon! Run from the Babylonians!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout the news. Broadcast it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the world know, the whole world.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell them, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' redeemed his dear servant Jacob!”'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They weren’t thirsty when he led them through the deserts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He made water pour out of the rock;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he split the rock and the water gushed.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“There is no peace,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “for the wicked.”'
