document_id: JOB.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Don’t Blame Fate When Things Go Wrong
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Call for help, Job, if you think anyone will answer!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To which of the holy angels will you turn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hot temper of a fool eventually kills him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the jealous anger of an idiot does her in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve seen it myself—seen fools putting down roots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then, suddenly, their houses are cursed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children out in the cold, abused and exploited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to stick up for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hungry people off the street plunder their harvests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cleaning them out completely, taking thorns and all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insatiable for everything they have.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t blame fate when things go wrong—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trouble doesn’t come from nowhere.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s human! Mortals are born and bred for trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as certainly as sparks fly upward.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What a Blessing When God Corrects You!
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So, what a blessing when God steps in and corrects you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mind you, don’t despise the discipline of Almighty God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True, he wounds, but he also dresses the wound;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the same hand that hurts you, heals you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From one disaster after another he delivers you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no matter what the calamity, the evil can’t touch you—
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In famine, he’ll keep you from starving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in war, from being gutted by the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be protected from vicious gossip
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and live fearless through any catastrophe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll shrug off disaster and famine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stroll fearlessly among wild animals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be on good terms with rocks and mountains;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild animals will become your good friends.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll know that your place on earth is safe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll look over your goods and find nothing amiss.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll see your children grow up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your family lovely and graceful as orchard grass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll arrive at your grave ripe with many good years,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like sheaves of golden grain at harvest.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, this is the way things are—my word of honor!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take it to heart and you won’t go wrong.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If I were in your shoes, I’d go straight to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’d throw myself on the mercy of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After all, he’s famous for great and unexpected acts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there’s no end to his surprises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives rain, for instance, across the wide earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sends water to irrigate the fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He raises up the down-and-out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gives firm footing to those sinking in grief.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He aborts the schemes of conniving crooks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that none of their plots come to term.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He catches the know-it-alls in their conspiracies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all that intricate intrigue swept out with the trash!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suddenly they’re disoriented, plunged into darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they can’t see to put one foot in front of the other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the downtrodden are saved by God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saved from the murderous plots, saved from the iron fist.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so the poor continue to hope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while injustice is bound and gagged.
