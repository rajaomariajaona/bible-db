document_id: JOB.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Blame Fate When Things Go Wrong
  - type: text
    content: “Call for help, Job, if you think anyone will answer!
  - type: text
    content: To which of the holy angels will you turn?
  - type: text
    content: The hot temper of a fool eventually kills him,
  - type: text
    content: the jealous anger of an idiot does her in.
  - type: text
    content: I’ve seen it myself—seen fools putting down roots,
  - type: text
    content: and then, suddenly, their houses are cursed.
  - type: text
    content: Their children out in the cold, abused and exploited,
  - type: text
    content: with no one to stick up for them.
  - type: text
    content: Hungry people off the street plunder their harvests,
  - type: text
    content: cleaning them out completely, taking thorns and all,
  - type: text
    content: insatiable for everything they have.
  - type: text
    content: Don’t blame fate when things go wrong—
  - type: text
    content: trouble doesn’t come from nowhere.
  - type: text
    content: It’s human! Mortals are born and bred for trouble,
  - type: text
    content: as certainly as sparks fly upward.
  - type: heading
    content: What a Blessing When God Corrects You!
  '17':
  - type: text
    content: “So, what a blessing when God steps in and corrects you!
  - type: text
    content: Mind you, don’t despise the discipline of Almighty God!
  - type: text
    content: True, he wounds, but he also dresses the wound;
  - type: text
    content: the same hand that hurts you, heals you.
  - type: text
    content: From one disaster after another he delivers you;
  - type: text
    content: no matter what the calamity, the evil can’t touch you—
  '20':
  - type: text
    content: “In famine, he’ll keep you from starving,
  - type: text
    content: in war, from being gutted by the sword.
  - type: text
    content: You’ll be protected from vicious gossip
  - type: text
    content: and live fearless through any catastrophe.
  - type: text
    content: You’ll shrug off disaster and famine,
  - type: text
    content: and stroll fearlessly among wild animals.
  - type: text
    content: You’ll be on good terms with rocks and mountains;
  - type: text
    content: wild animals will become your good friends.
  - type: text
    content: You’ll know that your place on earth is safe,
  - type: text
    content: you’ll look over your goods and find nothing amiss.
  - type: text
    content: You’ll see your children grow up,
  - type: text
    content: your family lovely and graceful as orchard grass.
  - type: text
    content: You’ll arrive at your grave ripe with many good years,
  - type: text
    content: like sheaves of golden grain at harvest.
  '27':
  - type: text
    content: “Yes, this is the way things are—my word of honor!
  - type: text
    content: Take it to heart and you won’t go wrong.”
  '8':
  - type: text
    content: “If I were in your shoes, I’d go straight to God,
  - type: text
    content: I’d throw myself on the mercy of God.
  - type: text
    content: After all, he’s famous for great and unexpected acts;
  - type: text
    content: there’s no end to his surprises.
  - type: text
    content: He gives rain, for instance, across the wide earth,
  - type: text
    content: sends water to irrigate the fields.
  - type: text
    content: He raises up the down-and-out,
  - type: text
    content: gives firm footing to those sinking in grief.
  - type: text
    content: He aborts the schemes of conniving crooks,
  - type: text
    content: so that none of their plots come to term.
  - type: text
    content: He catches the know-it-alls in their conspiracies—
  - type: text
    content: all that intricate intrigue swept out with the trash!
  - type: text
    content: Suddenly they’re disoriented, plunged into darkness;
  - type: text
    content: they can’t see to put one foot in front of the other.
  - type: text
    content: But the downtrodden are saved by God,
  - type: text
    content: saved from the murderous plots, saved from the iron fist.
  - type: text
    content: And so the poor continue to hope,
  - type: text
    content: while injustice is bound and gagged.
