document_id: ISA.8,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told me, “Get a big sheet of paper and write in indelible ink, ‘This belongs to Maher-shalal-hash-baz (Spoil-Speeds-Plunder-Hurries).’”'
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke strongly to me, grabbed me with both hands and warned me not to go along with this people. He said:'
  - type: text
    content: “Don’t be like this people,
  - type: text
    content: always afraid somebody is plotting against them.
  - type: text
    content: Don’t fear what they fear.
  - type: text
    content: Don’t take on their worries.
  - type: text
    content: If you’re going to worry,
  - type: text
    content: 'worry about The Holy. Fear '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: The Holy can be either a Hiding Place
  - type: text
    content: or a Boulder blocking your way,
  - type: text
    content: The Rock standing in the willful way
  - type: text
    content: of both houses of Israel,
  - type: text
    content: A barbed-wire Fence preventing trespass
  - type: text
    content: to the citizens of Jerusalem.
  - type: text
    content: Many of them are going to run into that Rock
  - type: text
    content: and get their bones broken,
  - type: text
    content: Get tangled up in that barbed wire
  - type: text
    content: and not get free of it.”
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: Gather up the testimony,
  - type: text
    content: preserve the teaching for my followers,
  - type: text
    content: 'While I wait for '
  - type: text
    content: God
  - type: text
    content: ' as long as he remains in hiding,'
  - type: text
    content: while I wait and hope for him.
  - type: text
    content: I stand my ground and hope,
  - type: text
    content: 'I and the children '
  - type: text
    content: God
  - type: text
    content: ' gave me as signs to Israel,'
  - type: text
    content: 'Warning signs and hope signs from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: who makes his home in Mount Zion.
  '19':
  - type: text
    content: When people tell you, “Try out the fortunetellers.
  - type: text
    content: Consult the spiritualists.
  - type: text
    content: Why not tap into the spirit-world,
  - type: text
    content: get in touch with the dead?”
  - type: text
    content: Tell them, “No, we’re going to study the Scriptures.”
  - type: text
    content: People who try the other ways get nowhere—a dead end!
  - type: text
    content: Frustrated and famished,
  - type: text
    content: they try one thing after another.
  - type: text
    content: When nothing works out they get angry,
  - type: text
    content: cursing first this god and then that one,
  - type: text
    content: Looking this way and that,
  - type: text
    content: up, down, and sideways—and seeing nothing,
  - type: text
    content: A blank wall, an empty hole.
  - type: text
    content: They end up in the dark with nothing.
  '2':
  - type: text
    content: ' I got two honest men, Uriah the priest and Zechariah son of Jeberekiah, to witness the document. Then I went home to my wife, the prophetess. She conceived and gave birth to a son.'
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me, “Name him Maher-shalal-hash-baz. Before that baby says ‘Daddy’ or ‘Mamma’ the king of Assyria will have plundered the wealth of Damascus and the riches of Samaria.”'
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to me again, saying:'
  - type: text
    content: “Because this people has turned its back
  - type: text
    content: on the gently flowing stream of Shiloah
  - type: text
    content: And gotten all excited over Rezin
  - type: text
    content: and the son of Remaliah,
  - type: text
    content: I’m stepping in and facing them with
  - type: text
    content: the wild floodwaters of the Euphrates,
  - type: text
    content: The king of Assyria and all his fanfare,
  - type: text
    content: a river in flood, bursting its banks,
  - type: text
    content: Pouring into Judah, sweeping everything before it,
  - type: text
    content: water up to your necks,
  - type: text
    content: A huge wingspan of a raging river,
  - type: text
    content: O Immanuel, spreading across your land.”
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: But face the facts, all you oppressors, and then wring your hands.
  - type: text
    content: Listen, all of you, far and near.
  - type: text
    content: Prepare for the worst and wring your hands.
  - type: text
    content: Yes, prepare for the worst and wring your hands!
  - type: text
    content: Plan and plot all you want—nothing will come of it.
  - type: text
    content: All your talk is mere talk, empty words,
  - type: text
    content: Because when all is said and done,
  - type: text
    content: the last word is Immanuel—God-With-Us.
  - type: heading
    content: A Boulder Blocking Your Way
