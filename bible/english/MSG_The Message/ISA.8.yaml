document_id: ISA.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Get a big sheet of paper and write in indelible ink, ‘This belongs to Maher-shalal-hash-baz (Spoil-Speeds-Plunder-Hurries).’”'
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-15
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke strongly to me, grabbed me with both hands and warned me not to go along with this people. He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t be like this people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: always afraid somebody is plotting against them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t fear what they fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t take on their worries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’re going to worry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'worry about The Holy. Fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Holy can be either a Hiding Place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a Boulder blocking your way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Rock standing in the willful way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of both houses of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A barbed-wire Fence preventing trespass
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the citizens of Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many of them are going to run into that Rock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and get their bones broken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get tangled up in that barbed wire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not get free of it.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: Gather up the testimony,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preserve the teaching for my followers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'While I wait for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as long as he remains in hiding,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I wait and hope for him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stand my ground and hope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I and the children '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave me as signs to Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Warning signs and hope signs from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who makes his home in Mount Zion.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-22
    - type: text
      text: When people tell you, “Try out the fortunetellers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Consult the spiritualists.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why not tap into the spirit-world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get in touch with the dead?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell them, “No, we’re going to study the Scriptures.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: People who try the other ways get nowhere—a dead end!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frustrated and famished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they try one thing after another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When nothing works out they get angry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cursing first this god and then that one,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Looking this way and that,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: up, down, and sideways—and seeing nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A blank wall, an empty hole.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They end up in the dark with nothing.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3a
    - type: text
      text: ' I got two honest men, Uriah the priest and Zechariah son of Jeberekiah, to witness the document. Then I went home to my wife, the prophetess. She conceived and gave birth to a son.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3b-4
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Name him Maher-shalal-hash-baz. Before that baby says ‘Daddy’ or ‘Mamma’ the king of Assyria will have plundered the wealth of Damascus and the riches of Samaria.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to me again, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because this people has turned its back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the gently flowing stream of Shiloah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gotten all excited over Rezin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the son of Remaliah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m stepping in and facing them with
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wild floodwaters of the Euphrates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king of Assyria and all his fanfare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a river in flood, bursting its banks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pouring into Judah, sweeping everything before it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: water up to your necks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A huge wingspan of a raging river,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Immanuel, spreading across your land.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: But face the facts, all you oppressors, and then wring your hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen, all of you, far and near.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare for the worst and wring your hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, prepare for the worst and wring your hands!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plan and plot all you want—nothing will come of it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All your talk is mere talk, empty words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because when all is said and done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the last word is Immanuel—God-With-Us.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Boulder Blocking Your Way
    marker-yv: yv-h
