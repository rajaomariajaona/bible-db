document_id: PSA.79,97
type_code: eng
verses:
  '1':
  - type: text
    content: God! Barbarians have broken into your home,
  - type: text
    content: violated your holy temple,
  - type: text
    content: left Jerusalem a pile of rubble!
  - type: text
    content: They’ve served up the corpses of your servants
  - type: text
    content: as carrion food for birds of prey,
  - type: text
    content: Threw the bones of your holy people
  - type: text
    content: out to the wild animals to gnaw on.
  - type: text
    content: They dumped out their blood
  - type: text
    content: like buckets of water.
  - type: text
    content: All around Jerusalem, their bodies
  - type: text
    content: were left to rot, unburied.
  - type: text
    content: We’re nothing but a joke to our neighbors,
  - type: text
    content: graffiti scrawled on the city walls.
  '11':
  - type: text
    content: Give groaning prisoners a hearing;
  - type: text
    content: pardon those on death row from their doom—you can do it!
  - type: text
    content: Give our jeering neighbors what they’ve got coming to them;
  - type: text
    content: let their God-taunts boomerang and knock them flat.
  - type: text
    content: Then we, your people, the ones you love and care for,
  - type: text
    content: will thank you over and over and over.
  - type: text
    content: We’ll tell everyone we meet
  - type: text
    content: how wonderful you are, how praiseworthy you are!
  '5':
  - type: text
    content: 'How long do we have to put up with this, '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Do you have it in for us for good?
  - type: text
    content: Will your smoldering rage never cool down?
  - type: text
    content: If you’re going to be angry, be angry
  - type: text
    content: with the pagans who care nothing about you,
  - type: text
    content: or your rival kingdoms who ignore you.
  - type: text
    content: They’re the ones who ruined Jacob,
  - type: text
    content: who wrecked and looted the place where he lived.
  '8':
  - type: text
    content: Don’t blame us for the sins of our parents.
  - type: text
    content: Hurry up and help us; we’re at the end of our rope.
  - type: text
    content: 'You’re famous for helping; God, give '
  - type: text
    content: us
  - type: text
    content: ' a break.'
  - type: text
    content: Your reputation is on the line.
  - type: text
    content: Pull us out of this mess, forgive us our sins—
  - type: text
    content: do what you’re famous for doing!
  - type: text
    content: 'Don’t let the heathen get by with their sneers:'
  - type: text
    content: “Where’s your God? Is he out to lunch?”
  - type: text
    content: Go public and show the godless world
  - type: text
    content: that they can’t kill your servants and get by with it.
