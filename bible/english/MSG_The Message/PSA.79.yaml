document_id: PSA.79,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: God! Barbarians have broken into your home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: violated your holy temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left Jerusalem a pile of rubble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve served up the corpses of your servants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as carrion food for birds of prey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Threw the bones of your holy people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out to the wild animals to gnaw on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dumped out their blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like buckets of water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All around Jerusalem, their bodies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were left to rot, unburied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re nothing but a joke to our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: graffiti scrawled on the city walls.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: Give groaning prisoners a hearing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pardon those on death row from their doom—you can do it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give our jeering neighbors what they’ve got coming to them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let their God-taunts boomerang and knock them flat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we, your people, the ones you love and care for,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will thank you over and over and over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll tell everyone we meet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how wonderful you are, how praiseworthy you are!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: 'How long do we have to put up with this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you have it in for us for good?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will your smoldering rage never cool down?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’re going to be angry, be angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the pagans who care nothing about you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or your rival kingdoms who ignore you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re the ones who ruined Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who wrecked and looted the place where he lived.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: Don’t blame us for the sins of our parents.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hurry up and help us; we’re at the end of our rope.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’re famous for helping; God, give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' a break.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your reputation is on the line.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pull us out of this mess, forgive us our sins—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do what you’re famous for doing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Don’t let the heathen get by with their sneers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where’s your God? Is he out to lunch?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go public and show the godless world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they can’t kill your servants and get by with it.
