document_id: REV.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Door into Heaven
  - type: text
    content: Then I looked, and, oh!—a door open into Heaven. The trumpet-voice, the first voice in my vision, called out, “Ascend and enter. I’ll show you what happens next.”
  '2':
  - type: text
    content: ' I was caught up at once in deep worship and, oh!—a Throne set in Heaven with One Seated on the Throne, suffused in gem hues of amber and flame with a nimbus of emerald. Twenty-four thrones circled the Throne, with Twenty-four Elders seated, white-robed, gold-crowned. Lightning flash and thunder crash pulsed from the Throne. Seven fire-blazing torches fronted the Throne (these are the Sevenfold Spirit of God). Before the Throne it was like a clear crystal sea.'
  '6':
  - type: text
    content: ' Prowling around the Throne were Four Animals, all eyes. Eyes to look ahead, eyes to look behind. The first Animal like a lion, the second like an ox, the third with a human face, the fourth like an eagle in flight. The Four Animals were winged, each with six wings. They were all eyes, seeing around and within. And they chanted night and day, never taking a break:'
  - type: text
    content: Holy, holy, holy
  - type: text
    content: Is God our Master, Sovereign-Strong,
  - type: text
    content: The Was, The Is, The Coming.
  '9':
  - type: text
    content: Every time the Animals gave glory and honor and thanks to the One Seated on the Throne—the age-after-age Living One—the Twenty-four Elders would fall prostrate before the One Seated on the Throne. They worshiped the age-after-age Living One. They threw their crowns at the foot of the Throne, chanting,
  - type: text
    content: Worthy, O Master! Yes, our God!
  - type: text
    content: Take the glory! the honor! the power!
  - type: text
    content: You created it all;
  - type: text
    content: It was created because you wanted it.
