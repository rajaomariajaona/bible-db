document_id: REV.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Door into Heaven
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then I looked, and, oh!—a door open into Heaven. The trumpet-voice, the first voice in my vision, called out, “Ascend and enter. I’ll show you what happens next.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-6a
    - type: text
      text: ' I was caught up at once in deep worship and, oh!—a Throne set in Heaven with One Seated on the Throne, suffused in gem hues of amber and flame with a nimbus of emerald. Twenty-four thrones circled the Throne, with Twenty-four Elders seated, white-robed, gold-crowned. Lightning flash and thunder crash pulsed from the Throne. Seven fire-blazing torches fronted the Throne (these are the Sevenfold Spirit of God). Before the Throne it was like a clear crystal sea.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6b-8
    - type: text
      text: ' Prowling around the Throne were Four Animals, all eyes. Eyes to look ahead, eyes to look behind. The first Animal like a lion, the second like an ox, the third with a human face, the fourth like an eagle in flight. The Four Animals were winged, each with six wings. They were all eyes, seeing around and within. And they chanted night and day, never taking a break:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holy, holy, holy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is God our Master, Sovereign-Strong,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: The Was, The Is, The Coming.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: Every time the Animals gave glory and honor and thanks to the One Seated on the Throne—the age-after-age Living One—the Twenty-four Elders would fall prostrate before the One Seated on the Throne. They worshiped the age-after-age Living One. They threw their crowns at the foot of the Throne, chanting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Worthy, O Master! Yes, our God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take the glory! the honor! the power!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You created it all;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was created because you wanted it.
