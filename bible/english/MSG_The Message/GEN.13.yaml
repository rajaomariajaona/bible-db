    - type: text
      text: 1-2
  - type: text
    text: So Abram left Egypt and went back to the Negev, he and his wife and everything he owned, and Lot still with him. By now Abram was very rich, loaded with cattle and silver and gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'He moved on from the Negev, camping along the way, to Bethel, the place he had first set up his tent between Bethel and Ai and built his first altar. Abram prayed there to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: Lot, who was traveling with Abram, was also rich in sheep and cattle and tents. But the land couldn’t support both of them; they had too many possessions. They couldn’t both live there—quarrels broke out between Abram’s shepherds and Lot’s shepherds. The Canaanites and Perizzites were also living on the land at the time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Abram said to Lot, “Let’s not have fighting between us, between your shepherds and my shepherds. After all, we’re family. Look around. Isn’t there plenty of land out there? Let’s separate. If you go left, I’ll go right; if you go right, I’ll go left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11a
  - type: text
    text: ' Lot looked. He saw the whole plain of the Jordan spread out, well watered (this was before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' destroyed Sodom and Gomorrah), like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s garden, like Egypt, and stretching all the way to Zoar. Lot took the whole plain of the Jordan. Lot set out to the east.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11b-12
  - type: text
    text: ' That’s how they came to part company, uncle and nephew. Abram settled in Canaan; Lot settled in the cities of the plain and pitched his tent near Sodom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The people of Sodom were evil—flagrant sinners against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: 'After Lot separated from him, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Abram, “Open your eyes, look around. Look north, south, east, and west. Everything you see, the whole land spread out before you, I will give to you and your children forever. I’ll make your descendants like dust—counting your descendants will be as impossible as counting the dust of the Earth. So—on your feet, get moving! Walk through the country, its length and breadth; I’m giving it all to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abram moved his tent. He went and settled by the Oaks of Mamre in Hebron. There he built an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
