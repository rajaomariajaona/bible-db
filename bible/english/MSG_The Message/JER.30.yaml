document_id: JER.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Despair, Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'This is the Message Jeremiah received from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message, the God of Israel: ‘Write everything I tell you in a book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“‘Look. The time is coming when I will turn everything around for my people, both Israel and Judah. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', say so. I’ll bring them back to the land I gave their ancestors, and they’ll take up ownership again.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is the way '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' put it to Israel and Judah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘Cries of panic are being heard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The peace has been shattered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ask around! Look around!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can men bear babies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why do I see all these he-men
- type: usfm
  marker: q2
  children:
  - type: text
    text: holding their bellies like women in labor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faces contorted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pale as death?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The blackest of days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no day like it ever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time of deep trouble for Jacob—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he’ll come out of it alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: “‘And then I’ll enter the darkness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll break the yoke from their necks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cut them loose from the harness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No more slave labor to foreigners!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They’ll serve their '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the David-King I’ll establish for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “‘So fear no more, Jacob, dear servant.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t despair, Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look up! I’ll save you out of faraway places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll bring your children back from exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob will come back and find life good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe and secure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll be with you. I’ll save you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll finish off all the godless nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among which I’ve scattered you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I won’t finish you off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll punish you, but fairly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I won’t send you off with just a slap on the wrist.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: '“This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘You’re a burned-out case,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as good as dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone has given up on you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re hopeless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your fair-weather friends have skipped town
- type: usfm
  marker: q2
  children:
  - type: text
    text: without giving you a second thought.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I delivered the knockout blow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a punishment you will never forget,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the enormity of your guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the endless list of your sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why all this self-pity, licking your wounds?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You deserve all this, and more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the enormity of your guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the endless list of your sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve done all this to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: “‘Everyone who hurt you will be hurt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your enemies will end up as slaves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your plunderers will be plundered;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your looters will become loot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for you, I’ll come with healing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: curing the incurable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they all gave up on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dismissed you as hopeless—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that good-for-nothing Zion.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: '“Again, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘I’ll turn things around for Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll compassionately come in and rebuild homes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The town will be rebuilt on its old foundations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mansions will be splendid again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thanksgivings will pour out of the windows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: laughter will spill through the doors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Things will get better and better.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Depression days are over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll thrive, they’ll flourish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The days of contempt will be over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll look forward to having children again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to being a community in which I take pride.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll punish anyone who hurts them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their prince will come from their own ranks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One of their own people shall be their leader.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their ruler will come from their own ranks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll grant him free and easy access to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would anyone dare to do that on his own,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to enter my presence uninvited?’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“‘And that’s it: You’ll be my very own people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll be your very own God.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'Look out! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s hurricane is let loose,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hurricane blast,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spinning the heads of the wicked like dust devils!
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s raging anger won’t let up
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until he’s made a clean sweep
- type: usfm
  marker: q2
  children:
  - type: text
    text: completing the job he began.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the job’s done
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll see it’s been well done.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
