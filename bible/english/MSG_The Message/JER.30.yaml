document_id: JER.30,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Despair, Israel
  - type: text
    content: 'This is the Message Jeremiah received from '
  - type: text
    content: God
  - type: text
    content: ': “'
  - type: text
    content: God
  - type: text
    content: '’s Message, the God of Israel: ‘Write everything I tell you in a book.'
  '10':
  - type: text
    content: “‘So fear no more, Jacob, dear servant.
  - type: text
    content: Don’t despair, Israel.
  - type: text
    content: Look up! I’ll save you out of faraway places,
  - type: text
    content: I’ll bring your children back from exile.
  - type: text
    content: Jacob will come back and find life good,
  - type: text
    content: safe and secure.
  - type: text
    content: I’ll be with you. I’ll save you.
  - type: text
    content: I’ll finish off all the godless nations
  - type: text
    content: Among which I’ve scattered you,
  - type: text
    content: but I won’t finish you off.
  - type: text
    content: I’ll punish you, but fairly.
  - type: text
    content: I won’t send you off with just a slap on the wrist.’
  '12':
  - type: text
    content: '“This is '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “‘You’re a burned-out case,
  - type: text
    content: as good as dead.
  - type: text
    content: Everyone has given up on you.
  - type: text
    content: You’re hopeless.
  - type: text
    content: All your fair-weather friends have skipped town
  - type: text
    content: without giving you a second thought.
  - type: text
    content: But I delivered the knockout blow,
  - type: text
    content: a punishment you will never forget,
  - type: text
    content: Because of the enormity of your guilt,
  - type: text
    content: the endless list of your sins.
  - type: text
    content: So why all this self-pity, licking your wounds?
  - type: text
    content: You deserve all this, and more.
  - type: text
    content: Because of the enormity of your guilt,
  - type: text
    content: the endless list of your sins,
  - type: text
    content: I’ve done all this to you.
  '16':
  - type: text
    content: “‘Everyone who hurt you will be hurt;
  - type: text
    content: your enemies will end up as slaves.
  - type: text
    content: Your plunderers will be plundered;
  - type: text
    content: your looters will become loot.
  - type: text
    content: As for you, I’ll come with healing,
  - type: text
    content: curing the incurable,
  - type: text
    content: Because they all gave up on you
  - type: text
    content: and dismissed you as hopeless—
  - type: text
    content: that good-for-nothing Zion.’
  '18':
  - type: text
    content: '“Again, '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “‘I’ll turn things around for Jacob.
  - type: text
    content: I’ll compassionately come in and rebuild homes.
  - type: text
    content: The town will be rebuilt on its old foundations;
  - type: text
    content: the mansions will be splendid again.
  - type: text
    content: Thanksgivings will pour out of the windows;
  - type: text
    content: laughter will spill through the doors.
  - type: text
    content: Things will get better and better.
  - type: text
    content: Depression days are over.
  - type: text
    content: They’ll thrive, they’ll flourish.
  - type: text
    content: The days of contempt will be over.
  - type: text
    content: They’ll look forward to having children again,
  - type: text
    content: to being a community in which I take pride.
  - type: text
    content: I’ll punish anyone who hurts them,
  - type: text
    content: and their prince will come from their own ranks.
  - type: text
    content: One of their own people shall be their leader.
  - type: text
    content: Their ruler will come from their own ranks.
  - type: text
    content: I’ll grant him free and easy access to me.
  - type: text
    content: Would anyone dare to do that on his own,
  - type: text
    content: 'to enter my presence uninvited?’ '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '22':
  - type: text
    content: '“‘And that’s it: You’ll be my very own people,'
  - type: text
    content: I’ll be your very own God.’”
  '23':
  - type: text
    content: 'Look out! '
  - type: text
    content: God
  - type: text
    content: ’s hurricane is let loose,
  - type: text
    content: his hurricane blast,
  - type: text
    content: Spinning the heads of the wicked like dust devils!
  - type: text
    content: God’s raging anger won’t let up
  - type: text
    content: Until he’s made a clean sweep
  - type: text
    content: completing the job he began.
  - type: text
    content: When the job’s done
  - type: text
    content: you’ll see it’s been well done.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: '“‘Look. The time is coming when I will turn everything around for my people, both Israel and Judah. I, '
  - type: text
    content: God
  - type: text
    content: ', say so. I’ll bring them back to the land I gave their ancestors, and they’ll take up ownership again.’”'
  '4':
  - type: text
    content: 'This is the way '
  - type: text
    content: God
  - type: text
    content: ' put it to Israel and Judah:'
  '5':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “‘Cries of panic are being heard.
  - type: text
    content: The peace has been shattered.
  - type: text
    content: Ask around! Look around!
  - type: text
    content: Can men bear babies?
  - type: text
    content: So why do I see all these he-men
  - type: text
    content: holding their bellies like women in labor,
  - type: text
    content: Faces contorted,
  - type: text
    content: pale as death?
  - type: text
    content: The blackest of days,
  - type: text
    content: no day like it ever!
  - type: text
    content: A time of deep trouble for Jacob—
  - type: text
    content: but he’ll come out of it alive.
  '8':
  - type: text
    content: “‘And then I’ll enter the darkness.
  - type: text
    content: I’ll break the yoke from their necks,
  - type: text
    content: Cut them loose from the harness.
  - type: text
    content: No more slave labor to foreigners!
  - type: text
    content: 'They’ll serve their '
  - type: text
    content: God
  - type: text
    content: and the David-King I’ll establish for them.
