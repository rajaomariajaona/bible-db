- type: usfm
  marker: s1
  children:
  - type: text
    text: Washing Away Sins
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “On the Big Day, a fountain will be opened for the family of David and all the leaders of Jerusalem for washing away their sins, for scrubbing their stained and soiled lives clean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: '“On the Big Day”—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies speaking—“I will wipe out the store-bought gods, erase their names from memory. People will forget they ever heard of them. And I’ll get rid of the prophets who polluted the air with their diseased words. If anyone dares persist in spreading diseased, polluting words, his very own parents will step in and say, ‘That’s it! You’re finished! Your lies about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' put everyone in danger,’ and then they’ll stab him to death in the very act of prophesying lies about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —his own parents, mind you!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: '“On the Big Day, the lying prophets will be publicly exposed and humiliated. Then they’ll wish they’d never swindled people with their ‘visions.’ No more masquerading in prophet clothes. But they’ll deny they’ve even heard of such things: ‘Me, a prophet? Not me. I’m a farmer—grew up on the farm.’ And if someone says, ‘And so where did you get that black eye?’ they’ll say, ‘I ran into a door at a friend’s house.’'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: “Sword, get moving against my shepherd,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against my close associate!”
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Kill the shepherd! Scatter the sheep!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The back of my hand against even the lambs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All across the country”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “two-thirds will be devastated
- type: usfm
  marker: q2
  children:
  - type: text
    text: and one-third survive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll deliver the surviving third to the refinery fires.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll refine them as silver is refined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: test them for purity as gold is tested.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they’ll pray to me by name
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’ll answer them personally.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll say, ‘That’s my people.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll say, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —my God!’”
