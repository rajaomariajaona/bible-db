document_id: ZEC.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Washing Away Sins
  - type: text
    content: “On the Big Day, a fountain will be opened for the family of David and all the leaders of Jerusalem for washing away their sins, for scrubbing their stained and soiled lives clean.
  '2':
  - type: text
    content: '“On the Big Day”—this is '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaking—“I will wipe out the store-bought gods, erase their names from memory. People will forget they ever heard of them. And I’ll get rid of the prophets who polluted the air with their diseased words. If anyone dares persist in spreading diseased, polluting words, his very own parents will step in and say, ‘That’s it! You’re finished! Your lies about '
  - type: text
    content: God
  - type: text
    content: ' put everyone in danger,’ and then they’ll stab him to death in the very act of prophesying lies about '
  - type: text
    content: God
  - type: text
    content: —his own parents, mind you!
  '4':
  - type: text
    content: '“On the Big Day, the lying prophets will be publicly exposed and humiliated. Then they’ll wish they’d never swindled people with their ‘visions.’ No more masquerading in prophet clothes. But they’ll deny they’ve even heard of such things: ‘Me, a prophet? Not me. I’m a farmer—grew up on the farm.’ And if someone says, ‘And so where did you get that black eye?’ they’ll say, ‘I ran into a door at a friend’s house.’'
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: “Sword, get moving against my shepherd,
  - type: text
    content: against my close associate!”
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: “Kill the shepherd! Scatter the sheep!
  - type: text
    content: The back of my hand against even the lambs!
  - type: text
    content: All across the country”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “two-thirds will be devastated
  - type: text
    content: and one-third survive.
  - type: text
    content: I’ll deliver the surviving third to the refinery fires.
  - type: text
    content: I’ll refine them as silver is refined,
  - type: text
    content: test them for purity as gold is tested.
  - type: text
    content: Then they’ll pray to me by name
  - type: text
    content: and I’ll answer them personally.
  - type: text
    content: I’ll say, ‘That’s my people.’
  - type: text
    content: They’ll say, ‘
  - type: text
    content: God
  - type: text
    content: —my God!’”
