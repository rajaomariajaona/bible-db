document_id: ACT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Storm at Sea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: As soon as arrangements were complete for our sailing to Italy, Paul and a few other prisoners were placed under the supervision of a centurion named Julius, a member of an elite guard. We boarded a ship from Adramyttium that was bound for Ephesus and ports west. Aristarchus, a Macedonian from Thessalonica, went with us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The next day we put in at Sidon. Julius treated Paul most decently—let him get off the ship and enjoy the hospitality of his friends there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: Out to sea again, we sailed north under the protection of the northeast shore of Cyprus because winds out of the west were against us, and then along the coast westward to the port of Myra. There the centurion found an Egyptian ship headed for Italy and transferred us on board. We ran into bad weather and found it impossible to stay on course. After much difficulty, we finally made it to the southern coast of the island of Crete and docked at Good Harbor (appropriate name!).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: By this time we had lost a lot of time. We had passed the autumn equinox, so it would be stormy weather from now on through the winter, too dangerous for sailing. Paul warned, “I see only disaster ahead for cargo and ship—to say nothing of our lives!—if we put out to sea now.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12,11
  - type: text
    text: But it was not the best harbor for staying the winter. Phoenix, a few miles further on, was more suitable. The centurion set Paul’s warning aside and let the ship captain and the shipowner talk him into trying for the next harbor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: When a gentle southerly breeze came up, they weighed anchor, thinking it would be smooth sailing. But they were no sooner out to sea than a gale-force wind, the infamous nor’easter, struck. They lost all control of the ship. It was a cork in the storm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: We came under the lee of the small island named Clauda, and managed to get a lifeboat ready and reef the sails. But rocky shoals prevented us from getting close. We only managed to avoid them by throwing out drift anchors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: Next day, out on the high seas again and badly damaged now by the storm, we dumped the cargo overboard. The third day the sailors lightened the ship further by throwing off all the tackle and provisions. It had been many days since we had seen either sun or stars. Wind and waves were battering us unmercifully, and we lost all hope of rescue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: With our appetite for both food and life long gone, Paul took his place in our midst and said, “Friends, you really should have listened to me back in Crete. We could have avoided all this trouble and trial. But there’s no need to dwell on that now. From now on, things are looking up! I can assure you that there’ll not be a single drowning among us, although I can’t say as much for the ship—the ship itself is doomed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: “Last night God’s angel stood at my side, an angel of this God I serve, saying to me, ‘Don’t give up, Paul. You’re going to stand before Caesar yet—and everyone sailing with you is also going to make it.’ So, dear friends, take heart. I believe God will do exactly what he told me. But we’re going to shipwreck on some island or other.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: On the fourteenth night, adrift somewhere on the Adriatic Sea, at about midnight the sailors sensed that we were approaching land. Sounding, they measured a depth of 120 feet, and shortly after that ninety feet. Afraid that we were about to run aground, they threw out four anchors and prayed for daylight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-32
  - type: text
    text: Some of the sailors tried to jump ship. They let down the lifeboat, pretending they were going to set out more anchors from the bow. Paul saw through their guise and told the centurion and his soldiers, “If these sailors don’t stay with the ship, we’re all going down.” So the soldiers cut the lines to the lifeboat and let it drift off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: 'With dawn about to break, Paul called everyone together and proposed breakfast: “This is the fourteenth day we’ve gone without food. None of us has felt like eating! But I urge you to eat something now. You’ll need strength for the rescue ahead. You’re going to come out of this without even a scratch!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-38
  - type: text
    text: He broke the bread, gave thanks to God, passed it around, and they all ate heartily—276 of us, all told! With the meal finished and everyone full, the ship was further lightened by dumping the grain overboard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-41
  - type: text
    text: At daybreak, no one recognized the land—but then they did notice a bay with a nice beach. They decided to try to run the ship up on the beach. They cut the anchors, loosed the tiller, raised the sail, and ran before the wind toward the beach. But we didn’t make it. Still far from shore, we hit a reef and the ship began to break up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-44
  - type: text
    text: The soldiers decided to kill the prisoners so none could escape by swimming, but the centurion, determined to save Paul, stopped them. He gave orders for anyone who could swim to dive in and go for it, and for the rest to grab a plank. Everyone made it to shore safely.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
