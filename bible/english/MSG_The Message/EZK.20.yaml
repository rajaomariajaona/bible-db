document_id: EZK.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Get Rid of All the Things You’ve Become Addicted To
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the seventh year, the fifth month, on the tenth day of the month, some of the leaders of Israel came to ask for guidance from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . They sat down before me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, talk with the leaders of Israel. Tell them, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, “Have you come to ask me questions? As sure as I am the living God, I’ll not put up with questions from you. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.”’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5a
  - type: text
    text: ' “Son of man, why don’t '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' do it? Yes, go ahead. Hold them accountable. Confront them with the outrageous obscenities of their parents. Tell them that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5b-6
  - type: text
    text: ' “‘On the day I chose Israel, I revealed myself to them in the country of Egypt, raising my hand in a solemn oath to the people of Jacob, in which I said, “I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your personal God.” On the same day that I raised my hand in the solemn oath, I promised them that I would take them out of the country of Egypt and bring them into a country that I had searched out just for them, a country flowing with milk and honey, a jewel of a country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“‘At that time I told them, “Get rid of all the vile things that you’ve become addicted to. Don’t make yourselves filthy with the Egyptian no-god idols. I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: alone
  - type: text
    text: ' am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: '“‘But they rebelled against me, wouldn’t listen to a word I said. None got rid of the vile things they were addicted to. They held on to the no-gods of Egypt as if for dear life. I seriously considered inflicting my anger on them in force right there in Egypt. Then I thought better of it. I acted out of who I was, not by how I felt. And I acted in a way that would evoke honor, not blasphemy, from the nations around them, nations who had seen me reveal myself by promising to lead my people out of Egypt. And then I did it: I led them out of Egypt into the desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: '“‘I gave them laws for living, showed them how to live well and obediently before me. I also gave them my weekly holy rest days, my “Sabbaths,” a kind of signpost erected between me and them to show them that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', am in the business of making them holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: '“‘But Israel rebelled against me in the desert. They didn’t follow my statutes. They despised my laws for living well and obediently in the ways I had set out. And they totally desecrated my holy Sabbaths. I seriously considered unleashing my anger on them right there in the desert. But I thought better of it and acted out of who I was, not by what I felt, so that I might be honored and not blasphemed by the nations who had seen me bring them out. But I did lift my hand in a solemn oath there in the desert and promise them that I would not bring them into the country flowing with milk and honey that I had chosen for them, that jewel among all lands. I canceled my promise because they despised my laws for living obediently, wouldn’t follow my statutes, and went ahead and desecrated my holy Sabbaths. They preferred living by their no-god idols. But I didn’t go all the way: I didn’t wipe them out, didn’t finish them off in the desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: '“‘Then I addressed myself to their children in the desert: “Don’t do what your parents did. Don’t take up their practices. Don’t make yourselves filthy with their no-god idols. I myself am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God: Keep my statutes and live by my laws. Keep my Sabbaths as holy rest days, signposts between me and you, signaling that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “‘But the children also rebelled against me. They neither followed my statutes nor kept my laws for living upright and well. And they desecrated my Sabbaths. I seriously considered dumping my anger on them, right there in the desert. But I thought better of it and acted out of who I was, not by what I felt, so that I might be honored and not blasphemed by the nations who had seen me bring them out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: '“‘But I did lift my hand in solemn oath there in the desert, and swore that I would scatter them all over the world, disperse them every which way because they didn’t keep my laws nor live by my statutes. They desecrated my Sabbaths and remained addicted to the no-god idols of their parents. Since they were determined to live bad lives, I myself gave them statutes that could not produce goodness and laws that did not produce life. I abandoned them. Filthy in the gutter, they perversely sacrificed their firstborn children in the fire. The very horror should have shocked them into recognizing that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: '“Therefore, speak to Israel, son of man. Tell them that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, ‘As if that wasn’t enough, your parents further insulted me by betraying me. When I brought them into that land that I had solemnly promised with my upraised hand to give them, every time they saw a hill with a sex-and-religion shrine on it or a grove of trees where the sacred whores practiced, they were there, buying into the whole pagan system. I said to them, “What hill do you go to?”’ (It’s still called ‘Whore Hills.’)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '“Therefore, say to Israel, ‘The Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: You’re making your lives filthy by copying the ways of your parents. In repeating their vile practices, you’ve become whores yourselves. In burning your children as sacrifices, you’ve become as filthy as your no-god idols—as recently as today!'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“‘Am I going to put up with questions from people like you, Israel? As sure as I am the living God, I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, refuse to be called into question by you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “‘What you’re secretly thinking is never going to happen. You’re thinking, “We’re going to be like everybody else, just like the other nations. We’re going to worship gods we can make and control.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-35
  - type: text
    text: '“‘As sure as I am the living God, says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, think again! With a mighty show of strength and a terrifying rush of anger, I will be King over you! I’ll bring you back from the nations, collect you out of the countries to which you’ve been scattered, with a mighty show of strength and a terrifying rush of anger. I’ll bring you to the desert of nations and haul you into court, where you’ll be face-to-face with judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: “‘As I faced your parents with judgment in the desert of Egypt, so I’ll face you with judgment. I’ll scrutinize and search every person as you arrive, and I’ll bring you under the bond of the covenant. I’ll cull out the rebels and traitors. I’ll lead them out of their exile, but I won’t bring them back to Israel.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“‘Then you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-43
  - type: text
    text: '“‘But you, people of Israel, this is the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, to you: Go ahead, serve your no-god idols! But later, you’ll think better of it and quit throwing filth and mud on me with your pagan offerings and no-god idols. For on my holy mountain, the high mountain of Israel, I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, tell you that the entire people of Israel will worship me. I’ll receive them there with open arms. I’ll demand your best gifts and offerings, all your holy sacrifices. What’s more, I’ll receive you as the best kind of offerings when I bring you back from all the lands and countries in which you’ve been scattered. I’ll demonstrate in the eyes of the world that I am The Holy. When I return you to the land of Israel, the land that I solemnly promised with upraised arm to give to your parents, you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Then and there you’ll remember all that you’ve done, the way you’ve lived that has made you so filthy—and you’ll loathe yourselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“‘But, dear Israel, you’ll also realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' when I respond to you out of who I am, not by what I feel about the evil lives you’ve lived, the corrupt history you’ve compiled. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nobody Will Put Out the Fire
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, face south. Let the Message roll out against the south. Prophesy against the wilderness forest of the south.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-48
  - type: text
    text: '“Tell the forest of the south, ‘Listen to the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, I’ll set a fire in you that will burn up every tree, dead trees and live trees alike. Nobody will put out the fire. The whole country from south to north will be blackened by it. Everyone is going to see that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', started the fire and that it’s not going to be put out.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And I said, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', everyone is saying of me, ‘He just makes up stories.’”'
