type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '! Look! Enemies past counting!'
  - type: text
    content: Enemies sprouting like mushrooms,
  - type: text
    content: 'Mobs of them all around me, roaring their mockery:'
  - type: text
    content: '“Hah! No help for '
  - type: text
    content: him
  - type: text
    content: ' from God!”'
  '3':
  - type: text
    content: 'But you, '
  - type: text
    content: God
  - type: text
    content: ', shield me on all sides;'
  - type: text
    content: You ground my feet, you lift my head high;
  - type: text
    content: 'With all my might I shout up to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: His answers thunder from the holy mountain.
  '5':
  - type: text
    content: I stretch myself out. I sleep.
  - type: text
    content: Then I’m up again—rested, tall and steady,
  - type: text
    content: Fearless before the enemy mobs
  - type: text
    content: Coming at me from all sides.
  '7':
  - type: text
    content: 'Up, '
  - type: text
    content: God
  - type: text
    content: '! My God, help me!'
  - type: text
    content: Slap their faces,
  - type: text
    content: First this cheek, then the other,
  - type: text
    content: Your fist hard in their teeth!
  '8':
  - type: text
    content: 'Real help comes from '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Your blessing clothes your people!
