document_id: PSA.60,97
type_code: eng
verses:
  '1':
  - type: text
    content: God! you walked off and left us,
  - type: text
    content: kicked our defenses to bits
  - type: text
    content: And stomped off angry.
  - type: text
    content: Come back. Oh please, come back!
  - type: text
    content: You shook earth to the foundations,
  - type: text
    content: ripped open huge crevasses.
  - type: text
    content: Heal the breaks! Everything’s
  - type: text
    content: coming apart at the seams.
  '11':
  - type: text
    content: Give us help for the hard task;
  - type: text
    content: human help is worthless.
  - type: text
    content: In God we’ll do our very best;
  - type: text
    content: he’ll flatten the opposition for good.
  '3':
  - type: text
    content: You made your people look doom in the face,
  - type: text
    content: then gave us cheap wine to drown our troubles.
  - type: text
    content: Then you planted a flag to rally your people,
  - type: text
    content: an unfurled flag to look to for courage.
  - type: text
    content: Now do something quickly, answer right now,
  - type: text
    content: so the one you love best is saved.
  '6':
  - type: text
    content: That’s when God spoke in holy splendor,
  - type: text
    content: “Bursting with joy,
  - type: text
    content: I make a present of Shechem,
  - type: text
    content: I hand out Succoth Valley as a gift.
  - type: text
    content: Gilead’s in my pocket,
  - type: text
    content: to say nothing of Manasseh.
  - type: text
    content: Ephraim’s my hard hat,
  - type: text
    content: Judah my hammer;
  - type: text
    content: Moab’s a scrub bucket,
  - type: text
    content: I mop the floor with Moab,
  - type: text
    content: Spit on Edom,
  - type: text
    content: rain fireworks all over Philistia.”
  '9':
  - type: text
    content: Who will take me to the thick of the fight?
  - type: text
    content: Who’ll show me the road to Edom?
  - type: text
    content: You aren’t giving up on us, are you, God?
  - type: text
    content: refusing to go out with our troops?
