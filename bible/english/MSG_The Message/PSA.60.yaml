document_id: PSA.60
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: God! you walked off and left us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: kicked our defenses to bits
- type: usfm
  marker: q1
  children:
  - type: text
    text: And stomped off angry.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come back. Oh please, come back!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shook earth to the foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ripped open huge crevasses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heal the breaks! Everything’s
- type: usfm
  marker: q2
  children:
  - type: text
    text: coming apart at the seams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: You made your people look doom in the face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then gave us cheap wine to drown our troubles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you planted a flag to rally your people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an unfurled flag to look to for courage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now do something quickly, answer right now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the one you love best is saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: That’s when God spoke in holy splendor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Bursting with joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I make a present of Shechem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I hand out Succoth Valley as a gift.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gilead’s in my pocket,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to say nothing of Manasseh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim’s my hard hat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah my hammer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab’s a scrub bucket,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I mop the floor with Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spit on Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rain fireworks all over Philistia.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Who will take me to the thick of the fight?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who’ll show me the road to Edom?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You aren’t giving up on us, are you, God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: refusing to go out with our troops?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Give us help for the hard task;
- type: usfm
  marker: q2
  children:
  - type: text
    text: human help is worthless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In God we’ll do our very best;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll flatten the opposition for good.
