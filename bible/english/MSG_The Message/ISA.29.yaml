document_id: ISA.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blind Yourselves So That You See Nothing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Doom, Ariel, Ariel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city where David set camp!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the years add up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the festivals run their cycles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’m not letting up on Jerusalem.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The moaning and groaning will continue.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem to me is an Ariel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like David, I’ll set up camp against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll set siege, build towers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bring in siege engines, build siege ramps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Driven into the ground, you’ll speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll mumble words from the dirt—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your voice from the ground, like the muttering of a ghost.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your speech will whisper from the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: But it will be your enemies who are beaten to dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mob of tyrants who will be blown away like chaff.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because, surprise, as if out of nowhere,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a visit from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With thunderclaps, earthquakes, and earsplitting noise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: backed up by hurricanes, tornadoes, and lightning strikes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the mob of enemies at war with Ariel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who trouble and hassle and torment her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will turn out to be a bad dream, a nightmare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a hungry man dreaming he’s eating steak
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wakes up hungry as ever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a thirsty woman dreaming she’s drinking iced tea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wakes up thirsty as ever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that mob of nations at war against Mount Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: will wake up and find they haven’t shot an arrow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: haven’t killed a single soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Drug yourselves so you feel nothing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Blind yourselves so you see nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get drunk, but not on wine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Black out, but not from whiskey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has rocked you into a deep, deep sleep,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: put the discerning prophets to sleep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put the farsighted seers to sleep.
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Have Everything Backward
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: What you’ve been shown here is somewhat like a letter in a sealed envelope. If you give it to someone who can read and tell her, “Read this,” she’ll say, “I can’t. The envelope is sealed.” And if you give it to someone who can’t read and tell him, “Read this,” he’ll say, “I can’t read.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'The Master said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “These people make a big show of saying the right thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their hearts aren’t in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they act like they’re worshiping me
- type: usfm
  marker: q2
  children:
  - type: text
    text: but don’t mean it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going to step in and shock them awake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: astonish them, stand them on their ears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wise ones who had it all figured out
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be exposed as fools.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The smart people who thought they knew everything
- type: usfm
  marker: q2
  children:
  - type: text
    text: will turn out to know nothing.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: Doom to you! You pretend to have the inside track.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You shut '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' out and work behind the scenes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plotting the future as if you knew everything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: acting mysterious, never showing your hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have everything backward!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You treat the potter as a lump of clay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a book say to its author,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “He didn’t write a word of me”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a meal say to the woman who cooked it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “She had nothing to do with this”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: And then before you know it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and without you having anything to do with it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wasted Lebanon will be transformed into lush gardens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Mount Carmel reforested.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At that time the deaf will hear
- type: usfm
  marker: q2
  children:
  - type: text
    text: word-for-word what’s been written.
- type: usfm
  marker: q1
  children:
  - type: text
    text: After a lifetime in the dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the blind will see.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The castoffs of society will be laughing and dancing in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the down-and-outs shouting praise to The Holy of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For there’ll be no more gangs on the street.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cynical scoffers will be an extinct species.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who never missed a chance to hurt or demean
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will never be heard of again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gone the people who corrupted the courts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gone the people who cheated the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gone the people who victimized the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: 'And finally this, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message for the family of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the same '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who redeemed Abraham:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No longer will Jacob hang his head in shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer grow gaunt and pale with waiting.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he’s going to see his children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my personal gift to him—lots of children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And these children will honor me
- type: usfm
  marker: q2
  children:
  - type: text
    text: by living holy lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In holy worship they’ll honor the Holy One of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stand in holy awe of the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who got off-track will get back on-track,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and complainers and whiners will learn gratitude.”
