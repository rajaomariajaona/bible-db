document_id: ISA.29,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Blind Yourselves So That You See Nothing
  - type: text
    content: Doom, Ariel, Ariel,
  - type: text
    content: the city where David set camp!
  - type: text
    content: Let the years add up,
  - type: text
    content: let the festivals run their cycles,
  - type: text
    content: But I’m not letting up on Jerusalem.
  - type: text
    content: The moaning and groaning will continue.
  - type: text
    content: Jerusalem to me is an Ariel.
  - type: text
    content: Like David, I’ll set up camp against you.
  - type: text
    content: I’ll set siege, build towers,
  - type: text
    content: bring in siege engines, build siege ramps.
  - type: text
    content: Driven into the ground, you’ll speak,
  - type: text
    content: you’ll mumble words from the dirt—
  - type: text
    content: Your voice from the ground, like the muttering of a ghost.
  - type: text
    content: Your speech will whisper from the dust.
  '11':
  - type: text
    content: What you’ve been shown here is somewhat like a letter in a sealed envelope. If you give it to someone who can read and tell her, “Read this,” she’ll say, “I can’t. The envelope is sealed.” And if you give it to someone who can’t read and tell him, “Read this,” he’ll say, “I can’t read.”
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: 'The Master said:'
  - type: text
    content: “These people make a big show of saying the right thing,
  - type: text
    content: but their hearts aren’t in it.
  - type: text
    content: Because they act like they’re worshiping me
  - type: text
    content: but don’t mean it,
  - type: text
    content: I’m going to step in and shock them awake,
  - type: text
    content: astonish them, stand them on their ears.
  - type: text
    content: The wise ones who had it all figured out
  - type: text
    content: will be exposed as fools.
  - type: text
    content: The smart people who thought they knew everything
  - type: text
    content: will turn out to know nothing.”
  '15':
  - type: text
    content: Doom to you! You pretend to have the inside track.
  - type: text
    content: 'You shut '
  - type: text
    content: God
  - type: text
    content: ' out and work behind the scenes,'
  - type: text
    content: Plotting the future as if you knew everything,
  - type: text
    content: acting mysterious, never showing your hand.
  - type: text
    content: You have everything backward!
  - type: text
    content: You treat the potter as a lump of clay.
  - type: text
    content: Does a book say to its author,
  - type: text
    content: “He didn’t write a word of me”?
  - type: text
    content: Does a meal say to the woman who cooked it,
  - type: text
    content: “She had nothing to do with this”?
  '17':
  - type: text
    content: And then before you know it,
  - type: text
    content: and without you having anything to do with it,
  - type: text
    content: Wasted Lebanon will be transformed into lush gardens,
  - type: text
    content: and Mount Carmel reforested.
  - type: text
    content: At that time the deaf will hear
  - type: text
    content: word-for-word what’s been written.
  - type: text
    content: After a lifetime in the dark,
  - type: text
    content: the blind will see.
  - type: text
    content: 'The castoffs of society will be laughing and dancing in '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the down-and-outs shouting praise to The Holy of Israel.
  - type: text
    content: For there’ll be no more gangs on the street.
  - type: text
    content: Cynical scoffers will be an extinct species.
  - type: text
    content: Those who never missed a chance to hurt or demean
  - type: text
    content: 'will never be heard of again:'
  - type: text
    content: Gone the people who corrupted the courts,
  - type: text
    content: gone the people who cheated the poor,
  - type: text
    content: gone the people who victimized the innocent.
  '22':
  - type: text
    content: 'And finally this, '
  - type: text
    content: God
  - type: text
    content: ’s Message for the family of Jacob,
  - type: text
    content: 'the same '
  - type: text
    content: God
  - type: text
    content: ' who redeemed Abraham:'
  - type: text
    content: “No longer will Jacob hang his head in shame,
  - type: text
    content: no longer grow gaunt and pale with waiting.
  - type: text
    content: For he’s going to see his children,
  - type: text
    content: my personal gift to him—lots of children.
  - type: text
    content: And these children will honor me
  - type: text
    content: by living holy lives.
  - type: text
    content: In holy worship they’ll honor the Holy One of Jacob
  - type: text
    content: and stand in holy awe of the God of Israel.
  - type: text
    content: Those who got off-track will get back on-track,
  - type: text
    content: and complainers and whiners will learn gratitude.”
  '5':
  - type: text
    content: But it will be your enemies who are beaten to dust,
  - type: text
    content: the mob of tyrants who will be blown away like chaff.
  - type: text
    content: Because, surprise, as if out of nowhere,
  - type: text
    content: 'a visit from '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: With thunderclaps, earthquakes, and earsplitting noise,
  - type: text
    content: backed up by hurricanes, tornadoes, and lightning strikes,
  - type: text
    content: And the mob of enemies at war with Ariel,
  - type: text
    content: all who trouble and hassle and torment her,
  - type: text
    content: will turn out to be a bad dream, a nightmare.
  - type: text
    content: Like a hungry man dreaming he’s eating steak
  - type: text
    content: and wakes up hungry as ever,
  - type: text
    content: Like a thirsty woman dreaming she’s drinking iced tea
  - type: text
    content: and wakes up thirsty as ever,
  - type: text
    content: So that mob of nations at war against Mount Zion
  - type: text
    content: will wake up and find they haven’t shot an arrow,
  - type: text
    content: haven’t killed a single soul.
  '9':
  - type: text
    content: Drug yourselves so you feel nothing.
  - type: text
    content: Blind yourselves so you see nothing.
  - type: text
    content: Get drunk, but not on wine.
  - type: text
    content: Black out, but not from whiskey.
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' has rocked you into a deep, deep sleep,'
  - type: text
    content: put the discerning prophets to sleep,
  - type: text
    content: put the farsighted seers to sleep.
  - type: heading
    content: You Have Everything Backward
