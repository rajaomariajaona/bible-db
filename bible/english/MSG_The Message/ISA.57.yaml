document_id: ISA.57,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Never Tired of Trying New Religions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile, right-living people die
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one gives them a thought.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God-fearing people are carted off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one even notices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The right-living people are out of their misery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re finally at rest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lived well and with dignity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now they’re finally at peace.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who talked you into the pursuit of this nonsense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving me high and dry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgetting you ever knew me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I don’t yell and make a scene,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do you think I don’t exist?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll go over, detail by detail, all your ‘righteous’ attempts at religion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and expose the absurdity of it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Go ahead, cry for help to your collection of no-gods:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A good wind will blow them away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re smoke, nothing but smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But anyone who runs to me for help
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will inherit the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will end up owning my holy mountain!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Someone says: “Build, build! Make a road!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Clear the way, remove the rocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the road my people will travel.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Message from the high and towering God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lives in Eternity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whose name is Holy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I live in the high and holy places,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but also with the low-spirited, the spirit-crushed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what I do is put new spirit in them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get them up and on their feet again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I’m not going to haul people into court endlessly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m not going to be angry forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise, people would lose heart.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: These souls I created would tire out and give up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' angry, good and angry, because of Israel’s sins.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I struck him hard and turned away in anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while he kept at his stubborn, willful ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I looked again and saw what he was doing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I decided to heal him, lead him, and comfort him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: creating a new language of praise for the mourners.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Peace to the far-off, peace to the near-at-hand,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and yes, I will heal them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked are storm-battered seas
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that can’t quiet down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The waves stir up garbage and mud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no peace,” God says, “for the wicked.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you, children of a witch, come here!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sons of a slut, daughters of a whore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What business do you have taunting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sneering, and sticking out your tongue?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you have any idea what wretches you’ve turned out to be?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A race of rebels, a generation of liars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You satisfy your lust any place you find some shade
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fornicate at whim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You kill your children at any convenient spot—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: any cave or crevasse will do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You take stones from the creek
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set up your sex-and-religion shrines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve chosen your fate.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your worship will be your doom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve climbed a high mountain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to practice your foul sex-and-death religion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behind closed doors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you assemble your precious gods and goddesses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deserting me, you’ve gone all out, stripped down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made your bed your place of worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve climbed into bed with the ‘sacred’ whores
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and loved every minute of it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: adoring every curve of their naked bodies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You anoint your king-god with ointments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lavish perfumes on yourselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You send scouts to search out the latest in religion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: send them all the way to hell and back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You wear yourselves out trying the new and the different,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never see what a waste it all is.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve always found strength for the latest fad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never got tired of trying new religions.
