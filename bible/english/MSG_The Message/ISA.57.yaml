type_code: eng
verses:
  '1':
  - type: heading
    content: Never Tired of Trying New Religions
  - type: text
    content: Meanwhile, right-living people die
  - type: text
    content: and no one gives them a thought.
  - type: text
    content: God-fearing people are carted off
  - type: text
    content: and no one even notices.
  - type: text
    content: The right-living people are out of their misery,
  - type: text
    content: they’re finally at rest.
  - type: text
    content: They lived well and with dignity
  - type: text
    content: and now they’re finally at peace.
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: “Who talked you into the pursuit of this nonsense,
  - type: text
    content: leaving me high and dry,
  - type: text
    content: forgetting you ever knew me?
  - type: text
    content: Because I don’t yell and make a scene,
  - type: text
    content: do you think I don’t exist?
  - type: text
    content: I’ll go over, detail by detail, all your ‘righteous’ attempts at religion,
  - type: text
    content: and expose the absurdity of it all.
  - type: text
    content: 'Go ahead, cry for help to your collection of no-gods:'
  - type: text
    content: A good wind will blow them away.
  - type: text
    content: They’re smoke, nothing but smoke.
  - type: text
    content: “But anyone who runs to me for help
  - type: text
    content: will inherit the land,
  - type: text
    content: will end up owning my holy mountain!”
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: 'Someone says: “Build, build! Make a road!'
  - type: text
    content: Clear the way, remove the rocks
  - type: text
    content: from the road my people will travel.”
  '15':
  - type: text
    content: A Message from the high and towering God,
  - type: text
    content: who lives in Eternity,
  - type: text
    content: 'whose name is Holy:'
  - type: text
    content: “I live in the high and holy places,
  - type: text
    content: but also with the low-spirited, the spirit-crushed,
  - type: text
    content: And what I do is put new spirit in them,
  - type: text
    content: get them up and on their feet again.
  - type: text
    content: For I’m not going to haul people into court endlessly,
  - type: text
    content: I’m not going to be angry forever.
  - type: text
    content: Otherwise, people would lose heart.
  - type: text
    content: These souls I created would tire out and give up.
  - type: text
    content: 'I '
  - type: text
    content: was
  - type: text
    content: ' angry, good and angry, because of Israel’s sins.'
  - type: text
    content: I struck him hard and turned away in anger,
  - type: text
    content: while he kept at his stubborn, willful ways.
  - type: text
    content: When I looked again and saw what he was doing,
  - type: text
    content: I decided to heal him, lead him, and comfort him,
  - type: text
    content: creating a new language of praise for the mourners.
  - type: text
    content: 'Peace to the far-off, peace to the near-at-hand,” says '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: “and yes, I will heal them.
  - type: text
    content: But the wicked are storm-battered seas
  - type: text
    content: that can’t quiet down.
  - type: text
    content: The waves stir up garbage and mud.
  - type: text
    content: There’s no peace,” God says, “for the wicked.”
  '3':
  - type: text
    content: “But you, children of a witch, come here!
  - type: text
    content: Sons of a slut, daughters of a whore.
  - type: text
    content: What business do you have taunting,
  - type: text
    content: sneering, and sticking out your tongue?
  - type: text
    content: Do you have any idea what wretches you’ve turned out to be?
  - type: text
    content: A race of rebels, a generation of liars.
  - type: text
    content: You satisfy your lust any place you find some shade
  - type: text
    content: and fornicate at whim.
  - type: text
    content: You kill your children at any convenient spot—
  - type: text
    content: any cave or crevasse will do.
  - type: text
    content: You take stones from the creek
  - type: text
    content: and set up your sex-and-religion shrines.
  - type: text
    content: You’ve chosen your fate.
  - type: text
    content: Your worship will be your doom.
  - type: text
    content: You’ve climbed a high mountain
  - type: text
    content: to practice your foul sex-and-death religion.
  - type: text
    content: Behind closed doors
  - type: text
    content: you assemble your precious gods and goddesses.
  - type: text
    content: Deserting me, you’ve gone all out, stripped down
  - type: text
    content: and made your bed your place of worship.
  - type: text
    content: You’ve climbed into bed with the ‘sacred’ whores
  - type: text
    content: and loved every minute of it,
  - type: text
    content: adoring every curve of their naked bodies.
  - type: text
    content: You anoint your king-god with ointments
  - type: text
    content: and lavish perfumes on yourselves.
  - type: text
    content: You send scouts to search out the latest in religion,
  - type: text
    content: send them all the way to hell and back.
  - type: text
    content: You wear yourselves out trying the new and the different,
  - type: text
    content: and never see what a waste it all is.
  - type: text
    content: You’ve always found strength for the latest fad,
  - type: text
    content: never got tired of trying new religions.
