document_id: 2TI.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: I, Paul, am on special assignment for Christ, carrying out God’s plan laid out in the Message of Life by Jesus. I write this to you, Timothy, the son I love so much. All the best from our God and Christ be yours!
  - type: heading
    content: To Be Bold with God’s Gifts
  '11':
  - type: text
    content: This is the Message I’ve been set apart to proclaim as preacher, emissary, and teacher. It’s also the cause of all this trouble I’m in. But I have no regrets. I couldn’t be more sure of my ground—the One I’ve trusted in can take care of what he’s trusted me to do right to the end.
  '13':
  - type: text
    content: So keep at your work, this faith and love rooted in Christ, exactly as I set it out for you. It’s as sound as the day you first heard it from me. Guard this precious thing placed in your custody by the Holy Spirit who works in us.
  '15':
  - type: text
    content: I’m sure you know by now that everyone in the province of Asia deserted me, even Phygelus and Hermogenes. But God bless Onesiphorus and his family! Many’s the time I’ve been refreshed in that house. And he wasn’t embarrassed a bit that I was in jail. The first thing he did when he got to Rome was look me up. May God on the Last Day treat him as well as he treated me. And then there was all the help he provided in Ephesus—but you know that better than I.
  '3':
  - type: text
    content: Every time I say your name in prayer—which is practically all the time—I thank God for you, the God I worship with my whole life in the tradition of my ancestors. I miss you a lot, especially when I remember that last tearful good-bye, and I look forward to a joy-packed reunion.
  '5':
  - type: text
    content: 'That precious memory triggers another: your honest faith—and what a rich faith it is, handed down from your grandmother Lois to your mother Eunice, and now to you! And the special gift of ministry you received when I laid hands on you and prayed—keep that ablaze! God doesn’t want us to be shy with his gifts, but bold and loving and sensible.'
  '8':
  - type: text
    content: 'So don’t be embarrassed to speak up for our Master or for me, his prisoner. Take your share of suffering for the Message along with the rest of us. We can only keep on going, after all, by the power of God, who first saved us and then called us to this holy work. We had nothing to do with it. It was all '
  - type: text
    content: his
  - type: text
    content: ' idea, a gift prepared for us in Jesus long before we knew anything about it. But we know it now. Since the appearance of our Savior, nothing could be plainer: death defeated, life vindicated in a steady blaze of light, all through the work of Jesus.'
