document_id: 1KI.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: They enjoyed three years of peace—no fighting between Aram and Israel. In the third year, Jehoshaphat king of Judah had a meeting with the king of Israel. Israel’s king remarked to his aides, “Do you realize that Ramoth Gilead belongs to us, and we’re sitting around on our hands instead of taking it back from the king of Aram?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: He turned to Jehoshaphat and said, “Will you join me in fighting for Ramoth Gilead?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jehoshaphat said, “You bet. I’m with you all the way—my troops are your troops, my horses are your horses.” He then continued, “But before you do anything, ask '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for guidance.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The king of Israel got the prophets together—all four hundred of them—and put the question to them: “Should I attack Ramoth Gilead? Or should I hold back?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go for it,” they said. “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will hand it over to the king.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But Jehoshaphat dragged his heels: “Is there still another prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' around here we can consult?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The king of Israel told Jehoshaphat, “As a matter of fact, there is still one such man. But I hate him. He never preaches anything good to me, only doom, doom, doom—Micaiah son of Imlah.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “The king shouldn’t talk about a prophet like that,” said Jehoshaphat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So the king of Israel ordered one of his men, “On the double! Get Micaiah son of Imlah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: Meanwhile, the king of Israel and Jehoshaphat were seated on their thrones, dressed in their royal robes, resplendent in front of the Samaria city gates. All the prophets were staging a prophecy-performance for their benefit. Zedekiah son of Kenaanah had even made a set of iron horns, and brandishing them called out, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word! With these horns you’ll gore Aram until there’s nothing left of him!” All the prophets chimed in, “Yes! Go for Ramoth Gilead! An easy victory! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s gift to the king!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The messenger who went to get Micaiah said, “The prophets have all said Yes to the king. Make it unanimous—vote Yes!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Micaiah said, “As surely as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, I’ll say.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: With Micaiah before him, the king asked him, “So Micaiah—do we attack Ramoth Gilead, or do we hold back?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Go ahead,” he said. “An easy victory. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s gift to the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Not so fast,” said the king. “How many times have I made you promise under oath to tell me the truth and nothing but the truth?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “All right,” said Micaiah, “since you insist.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I saw all of Israel scattered over the hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sheep with no shepherd.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke: ‘These poor people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: have no one to tell them what to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them go home and do
- type: usfm
  marker: q2
  children:
  - type: text
    text: the best they can for themselves.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the king of Israel turned to Jehoshaphat, “See! What did I tell you? He never has a good word for me from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', only doom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-23
  - type: text
    text: 'Micaiah kept on: “I’m not done yet; listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' enthroned,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the angel armies of heaven
- type: usfm
  marker: q1
  children:
  - type: text
    text: Standing at attention
- type: usfm
  marker: q2
  children:
  - type: text
    text: ranged on his right and his left.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, ‘How can we seduce Ahab'
- type: usfm
  marker: q2
  children:
  - type: text
    text: into attacking Ramoth Gilead?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some said this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and some said that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then a bold angel stepped out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'stood before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I’ll seduce him.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘And how will you do it?’ said '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Easy,’ said the angel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I’ll get all the prophets to lie.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘That should do it,’ said '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘On your way—seduce him!’
- type: usfm
  marker: m
  children:
  - type: text
    text: '“And that’s what has happened. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled the mouths of your puppet prophets with seductive lies. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has pronounced your doom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Just then Zedekiah son of Kenaanah came up and punched Micaiah in the nose, saying, “Since when did the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' leave me and take up with you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Micaiah said, “You’ll know soon enough; you’ll know it when you’re frantically and futilely looking for a place to hide.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'The king of Israel had heard enough: “Get Micaiah out of here! Turn him over to Amon the city magistrate and to Joash the king’s son with this message, ‘King’s orders: Lock him up in jail; keep him on bread and water until I’m back in one piece.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Micaiah said, “If you ever get back in one piece, I’m no prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: text
    text: He added, “When it happens, O people, remember where you heard it!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: The king of Israel and Jehoshaphat king of Judah attacked Ramoth Gilead. The king of Israel said to Jehoshaphat, “Wear my kingly robe; I’m going into battle disguised.” So the king of Israel entered the battle in disguise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Meanwhile, the king of Aram had ordered his chariot commanders (there were thirty-two of them): “Don’t bother with anyone, whether small or great; go after the king of Israel and him only.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: When the chariot commanders saw Jehoshaphat they said, “There he is! The king of Israel!” and took after him. Jehoshaphat yelled out, and the chariot commanders realized they had the wrong man—it wasn’t the king of Israel after all. They let him go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Just then someone, without aiming, shot an arrow randomly into the crowd and hit the king of Israel in the chink of his armor. The king told his charioteer, “Turn back! Get me out of here—I’m wounded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-37a
  - type: text
    text: ' All day the fighting continued, hot and heavy. Propped up in his chariot, the king watched from the sidelines. He died that evening. Blood from his wound pooled in the chariot. As the sun went down, shouts reverberated through the ranks, “Abandon camp! Head for home! The king is dead!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37b-38
  - type: text
    text: ' The king was brought to Samaria and there they buried him. They washed down the chariot at the pool of Samaria where the town whores bathed, and the dogs lapped up the blood, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word had said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: 'The rest of Ahab’s life—everything he did, the ivory palace he built, the towns he founded, and the defense system he built up—is all written up in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: . He was buried in the family cemetery and his son Ahaziah was the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoshaphat of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-44
  - type: text
    text: 'Jehoshaphat son of Asa became king of Judah in the fourth year of Ahab king of Israel. Jehoshaphat was thirty-five years old when he became king and he ruled for twenty-five years in Jerusalem. His mother was Azubah daughter of Shilhi. He continued the kind of life characteristic of his father Asa—no detours, no dead ends—pleasing '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' with his life. But he failed to get rid of the neighborhood sex-and-religion shrines. People continued to pray and worship at these idolatrous shrines. And he kept on good terms with the king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: 'The rest of Jehoshaphat’s life, his achievements and his battles, is all written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: . Also, he got rid of the sacred prostitutes left over from the days of his father Asa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Edom was kingless during his reign; a deputy was in charge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 48-49
  - type: text
    text: Jehoshaphat built ocean-going ships to sail to Ophir for gold. But they never made it; they shipwrecked at Ezion Geber. During that time Ahaziah son of Ahab proposed a joint shipping venture, but Jehoshaphat wouldn’t go in with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Then Jehoshaphat died and was buried in the family cemetery in the City of David his ancestor. Jehoram his son was the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaziah of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 51-53
  - type: text
    text: 'Ahaziah son of Ahab became king over Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah. He ruled Israel for two years. As far as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was concerned, he lived an evil life, reproducing the bad life of his father and mother, repeating the pattern set down by Jeroboam son of Nebat, who led Israel into a life of sin. Worshiping at the Baal shrines, he made '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, angry, oh, so angry. If anything, he was worse than his father.'
