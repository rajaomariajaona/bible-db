verses:
  '1':
  - type: text
    content: They enjoyed three years of peace—no fighting between Aram and Israel. In the third year, Jehoshaphat king of Judah had a meeting with the king of Israel. Israel’s king remarked to his aides, “Do you realize that Ramoth Gilead belongs to us, and we’re sitting around on our hands instead of taking it back from the king of Aram?”
  '10':
  - type: text
    content: Meanwhile, the king of Israel and Jehoshaphat were seated on their thrones, dressed in their royal robes, resplendent in front of the Samaria city gates. All the prophets were staging a prophecy-performance for their benefit. Zedekiah son of Kenaanah had even made a set of iron horns, and brandishing them called out, “
  - type: text
    content: God
  - type: text
    content: '’s word! With these horns you’ll gore Aram until there’s nothing left of him!” All the prophets chimed in, “Yes! Go for Ramoth Gilead! An easy victory! '
  - type: text
    content: God
  - type: text
    content: ’s gift to the king!”
  '13':
  - type: text
    content: The messenger who went to get Micaiah said, “The prophets have all said Yes to the king. Make it unanimous—vote Yes!”
  '14':
  - type: text
    content: 'But Micaiah said, “As surely as '
  - type: text
    content: God
  - type: text
    content: ' lives, what '
  - type: text
    content: God
  - type: text
    content: ' says, I’ll say.”'
  '15':
  - type: text
    content: With Micaiah before him, the king asked him, “So Micaiah—do we attack Ramoth Gilead, or do we hold back?”
  - type: text
    content: '“Go ahead,” he said. “An easy victory. '
  - type: text
    content: God
  - type: text
    content: ’s gift to the king.”
  '16':
  - type: text
    content: “Not so fast,” said the king. “How many times have I made you promise under oath to tell me the truth and nothing but the truth?”
  '17':
  - type: text
    content: “All right,” said Micaiah, “since you insist.
  - type: text
    content: I saw all of Israel scattered over the hills,
  - type: text
    content: sheep with no shepherd.
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' spoke: ‘These poor people'
  - type: text
    content: have no one to tell them what to do.
  - type: text
    content: Let them go home and do
  - type: text
    content: the best they can for themselves.’”
  '18':
  - type: text
    content: 'Then the king of Israel turned to Jehoshaphat, “See! What did I tell you? He never has a good word for me from '
  - type: text
    content: God
  - type: text
    content: ', only doom.”'
  '19':
  - type: text
    content: 'Micaiah kept on: “I’m not done yet; listen to '
  - type: text
    content: God
  - type: text
    content: '’s word:'
  - type: text
    content: 'I saw '
  - type: text
    content: God
  - type: text
    content: ' enthroned,'
  - type: text
    content: and all the angel armies of heaven
  - type: text
    content: Standing at attention
  - type: text
    content: ranged on his right and his left.
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' said, ‘How can we seduce Ahab'
  - type: text
    content: into attacking Ramoth Gilead?’
  - type: text
    content: Some said this,
  - type: text
    content: and some said that.
  - type: text
    content: Then a bold angel stepped out,
  - type: text
    content: 'stood before '
  - type: text
    content: God
  - type: text
    content: ', and said,'
  - type: text
    content: ‘I’ll seduce him.’
  - type: text
    content: '‘And how will you do it?’ said '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: ‘Easy,’ said the angel,
  - type: text
    content: ‘I’ll get all the prophets to lie.’
  - type: text
    content: '‘That should do it,’ said '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: ‘On your way—seduce him!’
  - type: text
    content: '“And that’s what has happened. '
  - type: text
    content: God
  - type: text
    content: ' filled the mouths of your puppet prophets with seductive lies. '
  - type: text
    content: God
  - type: text
    content: ' has pronounced your doom.”'
  '24':
  - type: text
    content: 'Just then Zedekiah son of Kenaanah came up and punched Micaiah in the nose, saying, “Since when did the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' leave me and take up with you?”'
  '25':
  - type: text
    content: Micaiah said, “You’ll know soon enough; you’ll know it when you’re frantically and futilely looking for a place to hide.”
  '26':
  - type: text
    content: 'The king of Israel had heard enough: “Get Micaiah out of here! Turn him over to Amon the city magistrate and to Joash the king’s son with this message, ‘King’s orders: Lock him up in jail; keep him on bread and water until I’m back in one piece.’”'
  '28':
  - type: text
    content: 'Micaiah said, “If you ever get back in one piece, I’m no prophet of '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: He added, “When it happens, O people, remember where you heard it!”
  '29':
  - type: text
    content: The king of Israel and Jehoshaphat king of Judah attacked Ramoth Gilead. The king of Israel said to Jehoshaphat, “Wear my kingly robe; I’m going into battle disguised.” So the king of Israel entered the battle in disguise.
  '31':
  - type: text
    content: 'Meanwhile, the king of Aram had ordered his chariot commanders (there were thirty-two of them): “Don’t bother with anyone, whether small or great; go after the king of Israel and him only.”'
  '32':
  - type: text
    content: When the chariot commanders saw Jehoshaphat they said, “There he is! The king of Israel!” and took after him. Jehoshaphat yelled out, and the chariot commanders realized they had the wrong man—it wasn’t the king of Israel after all. They let him go.
  '34':
  - type: text
    content: Just then someone, without aiming, shot an arrow randomly into the crowd and hit the king of Israel in the chink of his armor. The king told his charioteer, “Turn back! Get me out of here—I’m wounded.”
  '35':
  - type: text
    content: ' All day the fighting continued, hot and heavy. Propped up in his chariot, the king watched from the sidelines. He died that evening. Blood from his wound pooled in the chariot. As the sun went down, shouts reverberated through the ranks, “Abandon camp! Head for home! The king is dead!”'
  '37':
  - type: text
    content: ' The king was brought to Samaria and there they buried him. They washed down the chariot at the pool of Samaria where the town whores bathed, and the dogs lapped up the blood, just as '
  - type: text
    content: God
  - type: text
    content: ’s word had said.
  '39':
  - type: text
    content: 'The rest of Ahab’s life—everything he did, the ivory palace he built, the towns he founded, and the defense system he built up—is all written up in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . He was buried in the family cemetery and his son Ahaziah was the next king.
  - type: heading
    content: Jehoshaphat of Judah
  '4':
  - type: text
    content: He turned to Jehoshaphat and said, “Will you join me in fighting for Ramoth Gilead?”
  - type: text
    content: 'Jehoshaphat said, “You bet. I’m with you all the way—my troops are your troops, my horses are your horses.” He then continued, “But before you do anything, ask '
  - type: text
    content: God
  - type: text
    content: ' for guidance.”'
  '41':
  - type: text
    content: 'Jehoshaphat son of Asa became king of Judah in the fourth year of Ahab king of Israel. Jehoshaphat was thirty-five years old when he became king and he ruled for twenty-five years in Jerusalem. His mother was Azubah daughter of Shilhi. He continued the kind of life characteristic of his father Asa—no detours, no dead ends—pleasing '
  - type: text
    content: God
  - type: text
    content: ' with his life. But he failed to get rid of the neighborhood sex-and-religion shrines. People continued to pray and worship at these idolatrous shrines. And he kept on good terms with the king of Israel.'
  '45':
  - type: text
    content: 'The rest of Jehoshaphat’s life, his achievements and his battles, is all written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . Also, he got rid of the sacred prostitutes left over from the days of his father Asa.
  '47':
  - type: text
    content: Edom was kingless during his reign; a deputy was in charge.
  '48':
  - type: text
    content: Jehoshaphat built ocean-going ships to sail to Ophir for gold. But they never made it; they shipwrecked at Ezion Geber. During that time Ahaziah son of Ahab proposed a joint shipping venture, but Jehoshaphat wouldn’t go in with him.
  '50':
  - type: text
    content: Then Jehoshaphat died and was buried in the family cemetery in the City of David his ancestor. Jehoram his son was the next king.
  - type: heading
    content: Ahaziah of Israel
  '51':
  - type: text
    content: 'Ahaziah son of Ahab became king over Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah. He ruled Israel for two years. As far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned, he lived an evil life, reproducing the bad life of his father and mother, repeating the pattern set down by Jeroboam son of Nebat, who led Israel into a life of sin. Worshiping at the Baal shrines, he made '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, angry, oh, so angry. If anything, he was worse than his father.'
  '6':
  - type: text
    content: 'The king of Israel got the prophets together—all four hundred of them—and put the question to them: “Should I attack Ramoth Gilead? Or should I hold back?”'
  - type: text
    content: “Go for it,” they said. “
  - type: text
    content: God
  - type: text
    content: ' will hand it over to the king.”'
  '7':
  - type: text
    content: 'But Jehoshaphat dragged his heels: “Is there still another prophet of '
  - type: text
    content: God
  - type: text
    content: ' around here we can consult?”'
  '8':
  - type: text
    content: The king of Israel told Jehoshaphat, “As a matter of fact, there is still one such man. But I hate him. He never preaches anything good to me, only doom, doom, doom—Micaiah son of Imlah.”
  - type: text
    content: “The king shouldn’t talk about a prophet like that,” said Jehoshaphat.
  '9':
  - type: text
    content: So the king of Israel ordered one of his men, “On the double! Get Micaiah son of Imlah.”
