type_code: eng
verses:
  '1':
  - type: text
    content: “And when that happens”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: '“it will be plain as the sun at high noon:'
  - type: text
    content: I’ll be the God of every man, woman, and child in Israel
  - type: text
    content: and they shall be my very own people.”
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: '“Hear this, nations! '
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: text
    content: Broadcast this all over the world!
  - type: text
    content: Tell them, ‘The One who scattered Israel
  - type: text
    content: will gather them together again.
  - type: text
    content: From now on he’ll keep a careful eye on them,
  - type: text
    content: like a shepherd with his flock.’
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', will pay a stiff ransom price for Jacob;'
  - type: text
    content: I’ll free him from the grip of the Babylonian bully.
  - type: text
    content: The people will climb up Zion’s slopes shouting with joy,
  - type: text
    content: 'their faces beaming because of '
  - type: text
    content: God
  - type: text
    content: ’s bounty—
  - type: text
    content: Grain and wine and oil,
  - type: text
    content: flocks of sheep, herds of cattle.
  - type: text
    content: Their lives will be like a well-watered garden,
  - type: text
    content: never again left to dry up.
  - type: text
    content: Young women will dance and be happy,
  - type: text
    content: young men and old men will join in.
  - type: text
    content: I’ll convert their weeping into laughter,
  - type: text
    content: lavishing comfort, invading their grief with joy.
  - type: text
    content: I’ll make sure that their priests get three square meals a day
  - type: text
    content: 'and that my people have more than enough.’” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: 'Again, '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Listen to this! Laments coming out of Ramah,
  - type: text
    content: wild and bitter weeping.
  - type: text
    content: It’s Rachel weeping for her children,
  - type: text
    content: Rachel refusing all solace.
  - type: text
    content: Her children are gone,
  - type: text
    content: gone—long gone into exile.”
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' says, “Stop your incessant weeping,'
  - type: text
    content: hold back your tears.
  - type: text
    content: 'Collect wages from your grief work.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “They’ll be coming back home!
  - type: text
    content: 'There’s hope for your children.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '18':
  - type: text
    content: “I’ve heard the contrition of Ephraim.
  - type: text
    content: Yes, I’ve heard it clearly, saying,
  - type: text
    content: ‘You trained me well.
  - type: text
    content: You broke me, a wild yearling horse, to the saddle.
  - type: text
    content: Now put me, trained and obedient, to use.
  - type: text
    content: 'You are my '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: After those years of running loose, I repented.
  - type: text
    content: After you trained me to obedience,
  - type: text
    content: I was ashamed of my past, my wild, unruly past.
  - type: text
    content: Humiliated, I beat on my chest.
  - type: text
    content: Will I ever live this down?’
  '2':
  - type: text
    content: 'This is the way '
  - type: text
    content: God
  - type: text
    content: ' put it:'
  - type: text
    content: “They found grace out in the desert,
  - type: text
    content: these people who survived the killing.
  - type: text
    content: Israel, out looking for a place to rest,
  - type: text
    content: met God out looking for them!”
  - type: text
    content: God
  - type: text
    content: ' told them, “I’ve never quit loving you and never will.'
  - type: text
    content: Expect love, love, and more love!
  - type: text
    content: And so now I’ll start over with you and build you up again,
  - type: text
    content: dear virgin Israel.
  - type: text
    content: You’ll resume your singing,
  - type: text
    content: grabbing tambourines and joining the dance.
  - type: text
    content: You’ll go back to your old work of planting vineyards
  - type: text
    content: on the Samaritan hillsides,
  - type: text
    content: And sit back and enjoy the fruit—
  - type: text
    content: oh, how you’ll enjoy those harvests!
  - type: text
    content: The time’s coming when watchmen will call out
  - type: text
    content: 'from the hilltops of Ephraim:'
  - type: text
    content: ‘On your feet! Let’s go to Zion,
  - type: text
    content: 'go to meet our '
  - type: text
    content: God
  - type: text
    content: '!’”'
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: “Oh! Ephraim is my dear, dear son,
  - type: text
    content: my child in whom I take pleasure!
  - type: text
    content: Every time I mention his name,
  - type: text
    content: my heart bursts with longing for him!
  - type: text
    content: Everything in me cries out for him.
  - type: text
    content: 'Softly and tenderly I wait for him.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '21':
  - type: text
    content: “Set up signposts to mark your trip home.
  - type: text
    content: Get a good map.
  - type: text
    content: Study the road conditions.
  - type: text
    content: The road out is the road back.
  - type: text
    content: Come back, dear virgin Israel,
  - type: text
    content: come back to your hometowns.
  - type: text
    content: How long will you flit here and there, indecisive?
  - type: text
    content: How long before you make up your fickle mind?
  - type: text
    content: God
  - type: text
    content: ' will create a new thing in this land:'
  - type: text
    content: 'A transformed woman will embrace the transforming '
  - type: text
    content: God
  - type: text
    content: '!”'
  - type: text
    content: '* * *'
  '23':
  - type: text
    content: 'A Message from Israel’s '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies: “When I’ve turned everything around and brought my people back, the old expressions will be heard on the streets: ‘'
  - type: text
    content: God
  - type: text
    content: ' bless you!’ . . . ‘O True Home!’ . . . ‘O Holy Mountain!’ All Judah’s people, whether in town or country, will get along just fine with each other.'
  '25':
  - type: text
    content: I’ll refresh tired bodies;
  - type: text
    content: I’ll restore tired souls.
  '26':
  - type: text
    content: Just then I woke up and looked around—what a pleasant and satisfying sleep!
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: “Be ready. The time’s coming”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—“when I will plant people and animals in Israel and Judah, just as a farmer plants seed. And in the same way that earlier I relentlessly pulled up and tore down, took apart and demolished, so now I am sticking with them as they start over, building and planting.
  '29':
  - type: text
    content: “When that time comes you won’t hear the old proverb anymore,
  - type: text
    content: Parents ate the green apples,
  - type: text
    content: their children got the stomachache.
  '30':
  - type: text
    content: “No, each person will pay for his own sin. You eat green apples, you’re the one who gets sick.
  - type: text
    content: '* * *'
  '31':
  - type: text
    content: '“That’s right. The time is coming when I will make a brand-new covenant with Israel and Judah. It won’t be a repeat of the covenant I made with their ancestors when I took their hand to lead them out of the land of Egypt. They broke that covenant even though I did my part as their Master.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '33':
  - type: text
    content: '“This is the brand-new covenant that I will make with Israel when the time comes. I will put my law within them—write it on their hearts!—and be their God. And they will be my people. They will no longer go around setting up schools to teach each other about '
  - type: text
    content: God
  - type: text
    content: '. They’ll know me firsthand, the dull and the bright, the smart and the slow. I’ll wipe the slate clean for each of them. I’ll forget they ever sinned!” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: If This Ordered Cosmos Ever Fell to Pieces
  '35':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Message, from the God who lights up the day with sun and
  - type: text
    content: brightens the night with moon and stars,
  - type: text
    content: Who whips the ocean into a billowy froth,
  - type: text
    content: 'whose name is '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  '36':
  - type: text
    content: “If this ordered cosmos ever fell to pieces,
  - type: text
    content: fell into chaos before me”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “Then and only then might Israel fall apart
  - type: text
    content: and disappear as a nation before me.”
  - type: text
    content: '* * *'
  '37':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “If the skies could be measured with a yardstick
  - type: text
    content: and the earth explored to its core,
  - type: text
    content: Then and only then would I turn my back on Israel,
  - type: text
    content: 'disgusted with all they’ve done.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '38':
  - type: text
    content: '“The time is coming”—it’s '
  - type: text
    content: God
  - type: text
    content: '’s Decree—“when '
  - type: text
    content: God
  - type: text
    content: ’s city will be rebuilt, rebuilt all the way from the Citadel of Hanamel to the Corner Gate. The master plan will extend west to Gareb Hill and then around to Goath. The whole valley to the south where incinerated corpses are dumped—a death valley if there ever was one!—and all the terraced fields out to the Brook Kidron on the east as far north as the Horse Gate will be consecrated to me as a holy place.
  - type: text
    content: “This city will never again be torn down or destroyed.”
  '7':
  - type: text
    content: 'Oh yes, '
  - type: text
    content: God
  - type: text
    content: ' says so:'
  - type: text
    content: “Shout for joy at the top of your lungs for Jacob!
  - type: text
    content: Announce the good news to the number-one nation!
  - type: text
    content: Raise cheers! Sing praises. Say,
  - type: text
    content: ‘
  - type: text
    content: God
  - type: text
    content: ' has saved his people,'
  - type: text
    content: saved the core of Israel.’
  '8':
  - type: text
    content: '“Watch what comes next:'
  - type: text
    content: “I’ll bring my people back
  - type: text
    content: from the north country
  - type: text
    content: And gather them up from the ends of the earth,
  - type: text
    content: gather those who’ve gone blind
  - type: text
    content: And those who are lame and limping,
  - type: text
    content: gather pregnant women,
  - type: text
    content: Even the mothers whose birth pangs have started,
  - type: text
    content: bring them all back, a huge crowd!
  '9':
  - type: text
    content: “Watch them come! They’ll come weeping for joy
  - type: text
    content: as I take their hands and lead them,
  - type: text
    content: Lead them to fresh flowing brooks,
  - type: text
    content: lead them along smooth, uncluttered paths.
  - type: text
    content: Yes, it’s because I’m Israel’s Father
  - type: text
    content: and Ephraim’s my firstborn son!
