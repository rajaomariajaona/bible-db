document_id: JER.31,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “And when that happens”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“it will be plain as the sun at high noon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be the God of every man, woman, and child in Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they shall be my very own people.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-14
    - type: text
      text: '“Hear this, nations! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Broadcast this all over the world!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell them, ‘The One who scattered Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will gather them together again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From now on he’ll keep a careful eye on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a shepherd with his flock.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', will pay a stiff ransom price for Jacob;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll free him from the grip of the Babylonian bully.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people will climb up Zion’s slopes shouting with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'their faces beaming because of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s bounty—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grain and wine and oil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flocks of sheep, herds of cattle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lives will be like a well-watered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again left to dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young women will dance and be happy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young men and old men will join in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll convert their weeping into laughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lavishing comfort, invading their grief with joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make sure that their priests get three square meals a day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and that my people have more than enough.’” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: 'Again, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to this! Laments coming out of Ramah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild and bitter weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s Rachel weeping for her children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rachel refusing all solace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her children are gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gone—long gone into exile.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, “Stop your incessant weeping,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hold back your tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Collect wages from your grief work.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “They’ll be coming back home!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There’s hope for your children.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: “I’ve heard the contrition of Ephraim.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I’ve heard it clearly, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You trained me well.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You broke me, a wild yearling horse, to the saddle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now put me, trained and obedient, to use.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You are my '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After those years of running loose, I repented.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: After you trained me to obedience,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was ashamed of my past, my wild, unruly past.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Humiliated, I beat on my chest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will I ever live this down?’
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-6
    - type: text
      text: 'This is the way '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They found grace out in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these people who survived the killing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel, out looking for a place to rest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: met God out looking for them!”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told them, “I’ve never quit loving you and never will.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Expect love, love, and more love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so now I’ll start over with you and build you up again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dear virgin Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll resume your singing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grabbing tambourines and joining the dance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll go back to your old work of planting vineyards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the Samaritan hillsides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sit back and enjoy the fruit—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oh, how you’ll enjoy those harvests!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The time’s coming when watchmen will call out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the hilltops of Ephraim:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘On your feet! Let’s go to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'go to meet our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!’”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Oh! Ephraim is my dear, dear son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my child in whom I take pleasure!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every time I mention his name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart bursts with longing for him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything in me cries out for him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Softly and tenderly I wait for him.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: “Set up signposts to mark your trip home.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get a good map.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Study the road conditions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The road out is the road back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come back, dear virgin Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come back to your hometowns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you flit here and there, indecisive?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long before you make up your fickle mind?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will create a new thing in this land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'A transformed woman will embrace the transforming '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'A Message from Israel’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies: “When I’ve turned everything around and brought my people back, the old expressions will be heard on the streets: ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' bless you!’ . . . ‘O True Home!’ . . . ‘O Holy Mountain!’ All Judah’s people, whether in town or country, will get along just fine with each other.'
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I’ll refresh tired bodies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll restore tired souls.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Just then I woke up and looked around—what a pleasant and satisfying sleep!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: “Be ready. The time’s coming”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—“when I will plant people and animals in Israel and Judah, just as a farmer plants seed. And in the same way that earlier I relentlessly pulled up and tore down, took apart and demolished, so now I am sticking with them as they start over, building and planting.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “When that time comes you won’t hear the old proverb anymore,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: Parents ate the green apples,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: their children got the stomachache.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “No, each person will pay for his own sin. You eat green apples, you’re the one who gets sick.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: '“That’s right. The time is coming when I will make a brand-new covenant with Israel and Judah. It won’t be a repeat of the covenant I made with their ancestors when I took their hand to lead them out of the land of Egypt. They broke that covenant even though I did my part as their Master.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: '“This is the brand-new covenant that I will make with Israel when the time comes. I will put my law within them—write it on their hearts!—and be their God. And they will be my people. They will no longer go around setting up schools to teach each other about '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. They’ll know me firsthand, the dull and the bright, the smart and the slow. I’ll wipe the slate clean for each of them. I’ll forget they ever sinned!” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If This Ordered Cosmos Ever Fell to Pieces
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message, from the God who lights up the day with sun and
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brightens the night with moon and stars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who whips the ocean into a billowy froth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whose name is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “If this ordered cosmos ever fell to pieces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fell into chaos before me”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then and only then might Israel fall apart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disappear as a nation before me.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If the skies could be measured with a yardstick
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth explored to its core,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then and only then would I turn my back on Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'disgusted with all they’ve done.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-40
    - type: text
      text: '“The time is coming”—it’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Decree—“when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s city will be rebuilt, rebuilt all the way from the Citadel of Hanamel to the Corner Gate. The master plan will extend west to Gareb Hill and then around to Goath. The whole valley to the south where incinerated corpses are dumped—a death valley if there ever was one!—and all the terraced fields out to the Brook Kidron on the east as far north as the Horse Gate will be consecrated to me as a holy place.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “This city will never again be torn down or destroyed.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Oh yes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shout for joy at the top of your lungs for Jacob!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Announce the good news to the number-one nation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise cheers! Sing praises. Say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has saved his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saved the core of Israel.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Watch what comes next:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ll bring my people back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the north country
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gather them up from the ends of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather those who’ve gone blind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who are lame and limping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather pregnant women,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the mothers whose birth pangs have started,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring them all back, a huge crowd!
  '9':
  - type: usfm
    marker: q1
