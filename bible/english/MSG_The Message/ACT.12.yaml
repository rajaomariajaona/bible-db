document_id: ACT.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Under Heavy Guard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: That’s when King Herod got it into his head to go after some of the church members. He murdered James, John’s brother. When he saw how much it raised his popularity ratings with the Jews, he arrested Peter—all this during Passover Week, mind you—and had him thrown in jail, putting four squads of four soldiers each to guard him. He was planning a public lynching after Passover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All the time that Peter was under heavy guard in the jailhouse, the church prayed for him most strenuously.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the time came for Herod to bring him out for the kill. That night, even though shackled to two soldiers, one on either side, Peter slept like a baby. And there were guards at the door keeping their eyes on the place. Herod was taking no chances!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'Suddenly there was an angel at his side and light flooding the room. The angel shook Peter and got him up: “Hurry!” The handcuffs fell off his wrists. The angel said, “Get dressed. Put on your shoes.” Peter did it. Then, “Grab your coat and let’s get out of here.” Peter followed him, but didn’t believe it was really an angel—he thought he was dreaming.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Past the first guard and then the second, they came to the iron gate that led into the city. It swung open before them on its own, and they were out on the street, free as the breeze. At the first intersection the angel left him, going his own way. That’s when Peter realized it was no dream. “I can’t believe it—this really happened! The Master sent his angel and rescued me from Herod’s vicious little production and the spectacle the Jewish mob was looking forward to.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: Still shaking his head, amazed, he went to Mary’s house, the Mary who was John Mark’s mother. The house was packed with praying friends. When he knocked on the door to the courtyard, a young woman named Rhoda came to see who it was. But when she recognized his voice—Peter’s voice!—she was so excited and eager to tell everyone Peter was there that she forgot to open the door and left him standing in the street.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16a
  - type: text
    text: ' But they wouldn’t believe her, dismissing her, dismissing her report. “You’re crazy,” they said. She stuck by her story, insisting. They still wouldn’t believe her and said, “It must be his angel.” All this time poor Peter was standing out in the street, knocking away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16b-17
  - type: text
    text: ' Finally they opened up and saw him—and went wild! Peter put his hands up and calmed them down. He described how the Master had gotten him out of jail, then said, “Tell James and the brothers what’s happened.” He left them and went off to another place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'At daybreak the jail was in an uproar. “Where is Peter? What’s happened to Peter?” When Herod sent for him and they could neither produce him nor explain why not, he ordered their execution: “Off with their heads!” Fed up with Judea and Jews, he went for a vacation to Caesarea.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Herod
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'But things went from bad to worse for Herod. Now people from Tyre and Sidon put him on the warpath. But they got Blastus, King Herod’s right-hand man, to put in a good word for them and got a delegation together to iron things out. Because they were dependent on Judea for food supplies, they couldn’t afford to let this go on too long. On the day set for their meeting, Herod, robed in pomposity, took his place on the throne and regaled them with a lot of hot air. The people played their part to the hilt and shouted flatteries: “The voice of God! The voice of God!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: That was the last straw. God had had enough of Herod’s arrogance and sent an angel to strike him down. Herod had given God no credit for anything. Down he went. Rotten to the core, a maggoty old man if there ever was one, he died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Meanwhile, the ministry of God’s Word grew by leaps and bounds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Barnabas and Saul, once they had delivered the relief offering to the church in Jerusalem, went back to Antioch. This time they took John with them, the one they called Mark.
