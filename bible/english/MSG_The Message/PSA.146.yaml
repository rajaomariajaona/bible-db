  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'O my soul, praise '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'All my life long I’ll praise '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: singing songs to my God as long as I live.
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s in charge—
  - type: text
    content: always.
  - type: text
    content: Zion’s God is God for good!
  - type: text
    content: Hallelujah!
  '3':
  - type: text
    content: Don’t put your life in the hands of experts
  - type: text
    content: 'who know nothing of life, of '
  - type: text
    content: salvation
  - type: text
    content: ' life.'
  - type: text
    content: Mere humans don’t have what it takes;
  - type: text
    content: when they die, their projects die with them.
  - type: text
    content: Instead, get help from the God of Jacob,
  - type: text
    content: 'put your hope in '
  - type: text
    content: God
  - type: text
    content: ' and know real blessing!'
  - type: text
    content: God
  - type: text
    content: ' made sky and soil,'
  - type: text
    content: sea and all the fish in it.
  - type: text
    content: He always does what he says—
  - type: text
    content: he defends the wronged,
  - type: text
    content: he feeds the hungry.
  - type: text
    content: God
  - type: text
    content: ' frees prisoners—'
  - type: text
    content: he gives sight to the blind,
  - type: text
    content: he lifts up the fallen.
  - type: text
    content: God
  - type: text
    content: ' loves good people, protects strangers,'
  - type: text
    content: takes the side of orphans and widows,
  - type: text
    content: but makes short work of the wicked.
