document_id: HOS.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim, obsessed with god-fantasies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chases ghosts and phantoms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He tells lies nonstop,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soul-destroying lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both Ephraim and Judah made deals with Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tried to get an inside track with Egypt.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is bringing charges against Israel.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob’s children are hauled into court to be punished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the womb, that heel, Jacob, got the best of his brother.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When he grew up, he tried to get the best of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' would not be bested.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' bested him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brought to his knees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob wept and prayed.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' found him at Bethel.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That’s where he spoke with him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-Revealed, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -Known.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you going to repeat the life of your ancestor Jacob?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He ran off guilty to Aram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then sold his soul to get ahead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made it big through treachery and deceit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your real identity is formed through God-sent prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who led you out of Egypt and served as faithful pastors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As it is, Ephraim has continually
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and inexcusably insulted God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now he has to pay for his life-destroying ways.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His Master will do to him what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' has done.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What are you waiting for? Return to your God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Commit yourself in love, in justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wait for your God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t give up on him—ever!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The businessmen engage in wholesale fraud.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They love to rip people off!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim boasted, “Look, I’m rich!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve made it big!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And look how well I’ve covered my tracks:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a hint of fraud, not a sign of sin!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But not so fast! I’m '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your God from the days in Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going to put you back to living in tents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as in the old days when you worshiped in the wilderness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I speak through the prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to give clear pictures of the way things are.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Using prophets, I tell revealing stories.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I show Gilead rampant with religious scandal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Gilgal teeming with empty-headed religion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I expose their worship centers as
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stinking piles of garbage in their gardens.”
