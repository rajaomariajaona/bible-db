  '12':
  - type: text
    content: Are you going to repeat the life of your ancestor Jacob?
  - type: text
    content: He ran off guilty to Aram,
  - type: text
    content: Then sold his soul to get ahead,
  - type: text
    content: and made it big through treachery and deceit.
  - type: text
    content: Your real identity is formed through God-sent prophets,
  - type: text
    content: who led you out of Egypt and served as faithful pastors.
  - type: text
    content: As it is, Ephraim has continually
  - type: text
    content: and inexcusably insulted God.
  - type: text
    content: Now he has to pay for his life-destroying ways.
  - type: text
    content: 'His Master will do to him what '
  - type: text
