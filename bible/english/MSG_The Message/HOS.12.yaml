  '6':
  - type: text
    content: What are you waiting for? Return to your God!
  - type: text
    content: Commit yourself in love, in justice!
  - type: text
    content: Wait for your God,
  - type: text
    content: and don’t give up on him—ever!
  '7':
  - type: text
    content: The businessmen engage in wholesale fraud.
  - type: text
    content: They love to rip people off!
  - type: text
    content: Ephraim boasted, “Look, I’m rich!
  - type: text
    content: I’ve made it big!
  - type: text
    content: 'And look how well I’ve covered my tracks:'
  - type: text
    content: not a hint of fraud, not a sign of sin!”
