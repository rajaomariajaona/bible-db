document_id: PSA.66,97
type_code: eng
verses:
  '1':
  - type: text
    content: All together now—applause for God!
  - type: text
    content: Sing songs to the tune of his glory,
  - type: text
    content: set glory to the rhythms of his praise.
  - type: text
    content: Say of God, “We’ve never seen anything like him!”
  - type: text
    content: When your enemies see you in action,
  - type: text
    content: they slink off like scolded dogs.
  - type: text
    content: The whole earth falls to its knees—
  - type: text
    content: it worships you, sings to you,
  - type: text
    content: can’t stop enjoying your name and fame.
  '13':
  - type: text
    content: I’m bringing my prizes and presents to your house.
  - type: text
    content: I’m doing what I said I’d do,
  - type: text
    content: What I solemnly swore I’d do
  - type: text
    content: 'that day when I was in so much trouble:'
  - type: text
    content: The choicest cuts of meat
  - type: text
    content: for the sacrificial meal;
  - type: text
    content: Even the fragrance
  - type: text
    content: of roasted lamb is like a meal!
  - type: text
    content: Or make it an ox
  - type: text
    content: garnished with goat meat!
  '16':
  - type: text
    content: All believers, come here and listen,
  - type: text
    content: let me tell you what God did for me.
  - type: text
    content: I called out to him with my mouth,
  - type: text
    content: my tongue shaped the sounds of music.
  - type: text
    content: If I had been cozy with evil,
  - type: text
    content: the Lord would never have listened.
  - type: text
    content: 'But he most surely '
  - type: text
    content: did
  - type: text
    content: ' listen,'
  - type: text
    content: he came on the double when he heard my prayer.
  - type: text
    content: 'Blessed be God: he didn’t turn a deaf ear,'
  - type: text
    content: he stayed with me, loyal in his love.
  '5':
  - type: text
    content: Take a good look at God’s wonders—
  - type: text
    content: they’ll take your breath away.
  - type: text
    content: He converted sea to dry land;
  - type: text
    content: travelers crossed the river on foot.
  - type: text
    content: Now isn’t that cause for a song?
  '7':
  - type: text
    content: Ever sovereign in his high tower, he keeps
  - type: text
    content: his eye on the godless nations.
  - type: text
    content: Rebels don’t dare
  - type: text
    content: raise a finger against him.
  '8':
  - type: text
    content: Bless our God, O peoples!
  - type: text
    content: Give him a thunderous welcome!
  - type: text
    content: Didn’t he set us on the road to life?
  - type: text
    content: Didn’t he keep us out of the ditch?
  - type: text
    content: He trained us first,
  - type: text
    content: passed us like silver through refining fires,
  - type: text
    content: Brought us into hardscrabble country,
  - type: text
    content: pushed us to our very limit,
  - type: text
    content: Road-tested us inside and out,
  - type: text
    content: took us to hell and back;
  - type: text
    content: Finally he brought us
  - type: text
    content: to this well-watered place.
