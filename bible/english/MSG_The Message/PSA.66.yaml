document_id: PSA.66
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: All together now—applause for God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sing songs to the tune of his glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set glory to the rhythms of his praise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Say of God, “We’ve never seen anything like him!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: When your enemies see you in action,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they slink off like scolded dogs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole earth falls to its knees—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it worships you, sings to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: can’t stop enjoying your name and fame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Take a good look at God’s wonders—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll take your breath away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He converted sea to dry land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: travelers crossed the river on foot.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now isn’t that cause for a song?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ever sovereign in his high tower, he keeps
- type: usfm
  marker: q2
  children:
  - type: text
    text: his eye on the godless nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rebels don’t dare
- type: usfm
  marker: q2
  children:
  - type: text
    text: raise a finger against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: Bless our God, O peoples!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give him a thunderous welcome!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Didn’t he set us on the road to life?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Didn’t he keep us out of the ditch?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He trained us first,
- type: usfm
  marker: q2
  children:
  - type: text
    text: passed us like silver through refining fires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brought us into hardscrabble country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pushed us to our very limit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Road-tested us inside and out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: took us to hell and back;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Finally he brought us
- type: usfm
  marker: q2
  children:
  - type: text
    text: to this well-watered place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: I’m bringing my prizes and presents to your house.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m doing what I said I’d do,
- type: usfm
  marker: q1
  children:
  - type: text
    text: What I solemnly swore I’d do
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that day when I was in so much trouble:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The choicest cuts of meat
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the sacrificial meal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the fragrance
- type: usfm
  marker: q2
  children:
  - type: text
    text: of roasted lamb is like a meal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or make it an ox
- type: usfm
  marker: q2
  children:
  - type: text
    text: garnished with goat meat!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-20
  - type: text
    text: All believers, come here and listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me tell you what God did for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I called out to him with my mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my tongue shaped the sounds of music.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I had been cozy with evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lord would never have listened.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he most surely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: did
  - type: text
    text: ' listen,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he came on the double when he heard my prayer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessed be God: he didn’t turn a deaf ear,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stayed with me, loyal in his love.
