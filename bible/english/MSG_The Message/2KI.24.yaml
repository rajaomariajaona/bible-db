document_id: 2KI.24,97
type_code: eng
verses:
  '1':
  - type: text
    content: It was during his reign that Nebuchadnezzar king of Babylon invaded the country. Jehoiakim became his puppet. But after three years he had had enough and revolted.
  '10':
  - type: text
    content: ' The next thing to happen was that the officers of Nebuchadnezzar king of Babylon attacked Jerusalem and put it under siege. While his officers were laying siege to the city, Nebuchadnezzar king of Babylon paid a personal visit. And Jehoiachin king of Judah, along with his mother, officers, advisors, and government leaders, surrendered.'
  '12':
  - type: text
    content: ' In the eighth year of his reign Jehoiachin was taken prisoner by the king of Babylon. Nebuchadnezzar emptied the treasuries of both The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and the royal palace and confiscated all the gold furnishings that Solomon king of Israel had made for The Temple of '
  - type: text
    content: God
  - type: text
    content: . This should have been no surprise—
  - type: text
    content: God
  - type: text
    content: ' had said it would happen. And then he emptied Jerusalem of people—all its leaders and soldiers, all its craftsmen and artisans. He took them into exile, something like ten thousand of them! The only ones he left were the very poor.'
  '15':
  - type: text
    content: He took Jehoiachin into exile to Babylon. With him he took the king’s mother, his wives, his chief officers, the community leaders, anyone who was anybody—in round numbers, seven thousand soldiers plus another thousand or so craftsmen and artisans, all herded off into exile in Babylon.
  '17':
  - type: text
    content: Then the king of Babylon made Jehoiachin’s uncle, Mattaniah, his puppet king, but changed his name to Zedekiah.
  - type: heading
    content: Zedekiah of Judah
  '18':
  - type: text
    content: Zedekiah was twenty-one years old when he started out as king. He was king in Jerusalem for eleven years. His mother’s name was Hamutal the daughter of Jeremiah. Her hometown was Libnah.
  '19':
  - type: text
    content: 'As far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned Zedekiah was just one more evil king, a carbon copy of Jehoiakim.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' dispatched a succession of raiding bands against him: Babylonian, Aramean, Moabite, and Ammonite. The strategy was to destroy Judah. Through the preaching of his servants and prophets, '
  - type: text
    content: God
  - type: text
    content: ' had said he would do this, and now he was doing it. None of this was by chance—it was '
  - type: text
    content: God
  - type: text
    content: '’s judgment as he turned his back on Judah because of the enormity of the sins of Manasseh—Manasseh, the killer-king, who made the Jerusalem streets flow with the innocent blood of his victims. '
  - type: text
    content: God
  - type: text
    content: ' wasn’t about to overlook such crimes.'
  '20':
  - type: text
    content: 'The source of all this doom to Jerusalem and Judah was '
  - type: text
    content: God
  - type: text
    content: ’s anger—
  - type: text
    content: God
  - type: text
    content: ' turned his back on them as an act of judgment. And then Zedekiah revolted against the king of Babylon.'
  '5':
  - type: text
    content: 'The rest of the life and times of Jehoiakim is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . Jehoiakim died and was buried with his ancestors. His son Jehoiachin became the next king.
  '7':
  - type: text
    content: The threat from Egypt was now over—no more invasions by the king of Egypt—for by this time the king of Babylon had captured all the land between the Brook of Egypt and the Euphrates River, land formerly controlled by the king of Egypt.
  - type: heading
    content: Jehoiachin of Judah
  '8':
  - type: text
    content: 'Jehoiachin was eighteen years old when he became king. His rule in Jerusalem lasted only three months. His mother’s name was Nehushta daughter of Elnathan; she was from Jerusalem. In '
  - type: text
    content: God
  - type: text
    content: ’s opinion he also was an evil king, no different from his father.
