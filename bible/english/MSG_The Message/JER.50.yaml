document_id: JER.50,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Get Out of Babylon as Fast as You Can
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'The Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' through the prophet Jeremiah on Babylon, land of the Chaldeans:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Get the word out to the nations! Preach it!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Go public with this, broadcast it far and wide:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon taken, god-Bel hanging his head in shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: god-Marduk exposed as a fraud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her god-idols shuffling in shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all her play-gods exposed as cheap frauds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a nation will come out of the north to attack her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reduce her cities to rubble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empty of life—no animals, no people—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a sound, not a movement, not a breath.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-16
    - type: text
      text: “You Babylonians had a good time while it lasted, didn’t you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You lived it up, exploiting and using my people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frisky calves romping in lush pastures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild stallions out having a good time!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, your mother would hardly be proud of you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The woman who bore you wouldn’t be pleased.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at what’s come of you! A nothing nation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rubble and garbage and weeds!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Emptied of life by my holy anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a desert of death and emptiness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Travelers who pass by Babylon will gasp, appalled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shaking their heads at such a comedown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gang up on Babylon! Pin her down!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Throw everything you have against her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold nothing back. Knock her flat.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She’s sinned—oh, how she’s sinned, against me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout battle cries from every direction.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the fight has gone out of her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her defenses have been flattened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her walls smashed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Operation '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Vengeance.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pile on the vengeance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do to her as she has done.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give her a good dose of her own medicine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destroy her farms and farmers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ravage her fields, empty her barns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you captives, while the destruction rages,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get out while the getting’s good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get out fast and run for home.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Israel is a scattered flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hunted down by lions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king of Assyria started the carnage.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The king of Babylon, Nebuchadnezzar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has completed the job,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gnawing the bones clean.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: 'And now this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the God of Israel, has to say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Just watch! I’m bringing doom on the king of Babylon and his land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the same doom I brought on the king of Assyria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Israel I’ll bring home to good pastures.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll graze on the hills of Carmel and Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the slopes of Ephraim and Gilead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will eat to his heart’s content.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In those days and at that time”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “they’ll look high and low for a sign of Israel’s guilt—nothing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Search nook and cranny for a trace of Judah’s sin—nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: These people that I’ve saved will start out with a clean slate.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Attack Merathaim, land of rebels!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go after Pekod, country of doom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hunt them down. Make a clean sweep.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “These are my orders. Do what I tell you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-24
    - type: text
      text: “The thunderclap of battle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shakes the foundations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Hammer has been hammered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: smashed and splintered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon pummeled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beyond recognition.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I set out a trap and you were caught in it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Babylon, you never knew what hit you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Caught and held in the steel grip of that trap!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That’s what you get for taking on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', opened my arsenal.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I brought out my weapons of wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has a job to do in Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come at her from all sides!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Break into her granaries!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shovel her into piles and burn her up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave nothing! Leave no one!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kill all her young turks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Send them to their doom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom to them! Yes, Doomsday!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The clock has finally run out on them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And here’s a surprise:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Runaways and escapees from Babylon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show up in Zion reporting the news of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: taking vengeance for my own Temple.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: “Call in the troops against Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anyone who can shoot straight!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tighten the noose!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave no loopholes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give her back as good as she gave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a dose of her own medicine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her brazen insolence is an outrage
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', The Holy of Israel.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now she pays: her young strewn dead in the streets,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'her soldiers dead, silent forever.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: “Do you get it, Mister Pride? I’m your enemy!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Decree of the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Time’s run out on you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That’s right: It’s Doomsday.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mister Pride will fall flat on his face.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will offer him a hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll set his towns on fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The fire will spread wild through the country.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: 'And here’s more from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Israel are beaten down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people of Judah along with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their oppressors have them in a grip of steel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They won’t let go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the Rescuer is strong:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, I will take their side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll come to their rescue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll soothe their land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but rough up the people of Babylon.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-40
    - type: text
      text: “It’s all-out war in Babylon”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “total war against people, leaders, and the wise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: War to the death on her boasting pretenders, fools one and all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: War to the death on her soldiers, cowards to a man!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: War to the death on her hired killers, gutless wonders!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: War to the death on her banks—looted!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: War to the death on her water supply—drained dry!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A land of make-believe gods gone crazy—hobgoblins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The place will be haunted with jackals and scorpions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: night-owls and vampire bats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will ever live there again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The land will reek with the stench of death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will join Sodom and Gomorrah and their neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the cities I did away with.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “No one will live there again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will again draw breath in that land, ever.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: “In those days, at that time”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “the people of Israel will come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the people of Judah with them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Walking and weeping, they’ll seek me, their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll ask directions to Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set their faces toward Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They’ll come and hold tight to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bound in a covenant eternal they’ll never forget.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-43
    - type: text
      text: “And now, watch this! People pouring
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of the north, hordes of people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A mob of kings stirred up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from far-off places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flourishing deadly weapons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: barbarians they are, cruel and pitiless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roaring and relentless, like ocean breakers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they come riding fierce stallions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In battle formation, ready to fight
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ', Daughter Babylon!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon’s king hears them coming.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He goes white as a ghost, limp as a dishrag.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terror-stricken, he doubles up in pain, helpless to fight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a woman giving birth to a baby.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: '“And now watch this: Like a lion coming up'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the thick jungle of the Jordan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Looking for prey in the mountain pastures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll take over and pounce.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll take my pick of the flock—and who’s to stop me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the so-called shepherds are helpless before me.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 45-46
    - type: text
      text: 'So, listen to this plan that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has worked out against Babylon, the blueprint of what he’s prepared for dealing with Chaldea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Believe it or not, the young,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the vulnerable—mere lambs and kids—will be dragged off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Believe it or not, the flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in shock, helpless to help, watches it happen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the shout goes up, “Babylon’s down!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very earth will shudder at the sound.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The news will be heard all over the world.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: “My people were lost sheep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their shepherds led them astray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They abandoned them in the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where they wandered aimless through the hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lost track of home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: couldn’t remember where they came from.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who met them took advantage of them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their enemies had no qualms:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Fair game,’ they said. ‘They walked out on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They abandoned the True Pasture, the hope of their parents.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: “But now, get out of Babylon as fast as you can.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be rid of that Babylonian country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On your way. Good sheepdogs lead, but don’t you be led.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead the way home!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you see what I’m doing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m rallying a host of nations against Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll come out of the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attack and take her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, they know how to fight, these armies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They never come home empty-handed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon is ripe for picking!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All her plunderers will fill their bellies!” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
