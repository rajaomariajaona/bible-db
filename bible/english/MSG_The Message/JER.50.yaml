document_id: JER.50,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Get Out of Babylon as Fast as You Can
  - type: text
    content: 'The Message of '
  - type: text
    content: God
  - type: text
    content: ' through the prophet Jeremiah on Babylon, land of the Chaldeans:'
  - type: text
    content: “Get the word out to the nations! Preach it!
  - type: text
    content: 'Go public with this, broadcast it far and wide:'
  - type: text
    content: Babylon taken, god-Bel hanging his head in shame,
  - type: text
    content: god-Marduk exposed as a fraud.
  - type: text
    content: All her god-idols shuffling in shame,
  - type: text
    content: all her play-gods exposed as cheap frauds.
  - type: text
    content: For a nation will come out of the north to attack her,
  - type: text
    content: reduce her cities to rubble.
  - type: text
    content: Empty of life—no animals, no people—
  - type: text
    content: not a sound, not a movement, not a breath.
  '11':
  - type: text
    content: “You Babylonians had a good time while it lasted, didn’t you?
  - type: text
    content: You lived it up, exploiting and using my people,
  - type: text
    content: Frisky calves romping in lush pastures,
  - type: text
    content: wild stallions out having a good time!
  - type: text
    content: Well, your mother would hardly be proud of you.
  - type: text
    content: The woman who bore you wouldn’t be pleased.
  - type: text
    content: Look at what’s come of you! A nothing nation!
  - type: text
    content: Rubble and garbage and weeds!
  - type: text
    content: Emptied of life by my holy anger,
  - type: text
    content: a desert of death and emptiness.
  - type: text
    content: Travelers who pass by Babylon will gasp, appalled,
  - type: text
    content: shaking their heads at such a comedown.
  - type: text
    content: Gang up on Babylon! Pin her down!
  - type: text
    content: Throw everything you have against her.
  - type: text
    content: Hold nothing back. Knock her flat.
  - type: text
    content: She’s sinned—oh, how she’s sinned, against me!
  - type: text
    content: Shout battle cries from every direction.
  - type: text
    content: All the fight has gone out of her.
  - type: text
    content: Her defenses have been flattened,
  - type: text
    content: her walls smashed.
  - type: text
    content: '‘Operation '
  - type: text
    content: God
  - type: text
    content: ’s Vengeance.’
  - type: text
    content: Pile on the vengeance!
  - type: text
    content: Do to her as she has done.
  - type: text
    content: Give her a good dose of her own medicine!
  - type: text
    content: Destroy her farms and farmers,
  - type: text
    content: ravage her fields, empty her barns.
  - type: text
    content: And you captives, while the destruction rages,
  - type: text
    content: get out while the getting’s good,
  - type: text
    content: get out fast and run for home.
  - type: text
    content: '* * *'
  '17':
  - type: text
    content: “Israel is a scattered flock,
  - type: text
    content: hunted down by lions.
  - type: text
    content: The king of Assyria started the carnage.
  - type: text
    content: The king of Babylon, Nebuchadnezzar,
  - type: text
    content: Has completed the job,
  - type: text
    content: gnawing the bones clean.”
  '18':
  - type: text
    content: 'And now this is what '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: 'the God of Israel, has to say:'
  - type: text
    content: “Just watch! I’m bringing doom on the king of Babylon and his land,
  - type: text
    content: the same doom I brought on the king of Assyria.
  - type: text
    content: But Israel I’ll bring home to good pastures.
  - type: text
    content: He’ll graze on the hills of Carmel and Bashan,
  - type: text
    content: On the slopes of Ephraim and Gilead.
  - type: text
    content: He will eat to his heart’s content.
  - type: text
    content: In those days and at that time”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “they’ll look high and low for a sign of Israel’s guilt—nothing;
  - type: text
    content: Search nook and cranny for a trace of Judah’s sin—nothing.
  - type: text
    content: These people that I’ve saved will start out with a clean slate.
  - type: text
    content: '* * *'
  '21':
  - type: text
    content: “Attack Merathaim, land of rebels!
  - type: text
    content: Go after Pekod, country of doom!
  - type: text
    content: 'Hunt them down. Make a clean sweep.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “These are my orders. Do what I tell you.
  '22':
  - type: text
    content: “The thunderclap of battle
  - type: text
    content: shakes the foundations!
  - type: text
    content: The Hammer has been hammered,
  - type: text
    content: smashed and splintered,
  - type: text
    content: Babylon pummeled
  - type: text
    content: beyond recognition.
  - type: text
    content: I set out a trap and you were caught in it.
  - type: text
    content: O Babylon, you never knew what hit you,
  - type: text
    content: Caught and held in the steel grip of that trap!
  - type: text
    content: 'That’s what you get for taking on '
  - type: text
    content: God
  - type: text
    content: .
  '25':
  - type: text
    content: '“I, '
  - type: text
    content: God
  - type: text
    content: ', opened my arsenal.'
  - type: text
    content: I brought out my weapons of wrath.
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: has a job to do in Babylon.
  - type: text
    content: Come at her from all sides!
  - type: text
    content: Break into her granaries!
  - type: text
    content: Shovel her into piles and burn her up.
  - type: text
    content: Leave nothing! Leave no one!
  - type: text
    content: Kill all her young turks.
  - type: text
    content: Send them to their doom!
  - type: text
    content: Doom to them! Yes, Doomsday!
  - type: text
    content: The clock has finally run out on them.
  - type: text
    content: 'And here’s a surprise:'
  - type: text
    content: Runaways and escapees from Babylon
  - type: text
    content: 'Show up in Zion reporting the news of '
  - type: text
    content: God
  - type: text
    content: ’s vengeance,
  - type: text
    content: taking vengeance for my own Temple.
  '29':
  - type: text
    content: “Call in the troops against Babylon,
  - type: text
    content: anyone who can shoot straight!
  - type: text
    content: Tighten the noose!
  - type: text
    content: Leave no loopholes!
  - type: text
    content: Give her back as good as she gave,
  - type: text
    content: a dose of her own medicine!
  - type: text
    content: Her brazen insolence is an outrage
  - type: text
    content: 'against '
  - type: text
    content: God
  - type: text
    content: ', The Holy of Israel.'
  - type: text
    content: 'And now she pays: her young strewn dead in the streets,'
  - type: text
    content: 'her soldiers dead, silent forever.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '31':
  - type: text
    content: “Do you get it, Mister Pride? I’m your enemy!”
  - type: text
    content: 'Decree of the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: '“Time’s run out on you:'
  - type: text
    content: 'That’s right: It’s Doomsday.'
  - type: text
    content: Mister Pride will fall flat on his face.
  - type: text
    content: No one will offer him a hand.
  - type: text
    content: I’ll set his towns on fire.
  - type: text
    content: The fire will spread wild through the country.”
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: 'And here’s more from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “The people of Israel are beaten down,
  - type: text
    content: the people of Judah along with them.
  - type: text
    content: Their oppressors have them in a grip of steel.
  - type: text
    content: They won’t let go.
  - type: text
    content: 'But the Rescuer is strong:'
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: Yes, I will take their side,
  - type: text
    content: I’ll come to their rescue.
  - type: text
    content: I’ll soothe their land,
  - type: text
    content: but rough up the people of Babylon.
  '35':
  - type: text
    content: “It’s all-out war in Babylon”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “total war against people, leaders, and the wise!
  - type: text
    content: War to the death on her boasting pretenders, fools one and all!
  - type: text
    content: War to the death on her soldiers, cowards to a man!
  - type: text
    content: War to the death on her hired killers, gutless wonders!
  - type: text
    content: War to the death on her banks—looted!
  - type: text
    content: War to the death on her water supply—drained dry!
  - type: text
    content: A land of make-believe gods gone crazy—hobgoblins!
  - type: text
    content: The place will be haunted with jackals and scorpions,
  - type: text
    content: night-owls and vampire bats.
  - type: text
    content: No one will ever live there again.
  - type: text
    content: The land will reek with the stench of death.
  - type: text
    content: It will join Sodom and Gomorrah and their neighbors,
  - type: text
    content: 'the cities I did away with.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “No one will live there again.
  - type: text
    content: No one will again draw breath in that land, ever.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: “In those days, at that time”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “the people of Israel will come,
  - type: text
    content: And the people of Judah with them.
  - type: text
    content: 'Walking and weeping, they’ll seek me, their '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They’ll ask directions to Zion
  - type: text
    content: and set their faces toward Zion.
  - type: text
    content: 'They’ll come and hold tight to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: bound in a covenant eternal they’ll never forget.
  '41':
  - type: text
    content: “And now, watch this! People pouring
  - type: text
    content: out of the north, hordes of people,
  - type: text
    content: A mob of kings stirred up
  - type: text
    content: from far-off places.
  - type: text
    content: Flourishing deadly weapons,
  - type: text
    content: barbarians they are, cruel and pitiless.
  - type: text
    content: Roaring and relentless, like ocean breakers,
  - type: text
    content: they come riding fierce stallions,
  - type: text
    content: In battle formation, ready to fight
  - type: text
    content: you
  - type: text
    content: ', Daughter Babylon!'
  - type: text
    content: Babylon’s king hears them coming.
  - type: text
    content: He goes white as a ghost, limp as a dishrag.
  - type: text
    content: Terror-stricken, he doubles up in pain, helpless to fight,
  - type: text
    content: like a woman giving birth to a baby.
  '44':
  - type: text
    content: '“And now watch this: Like a lion coming up'
  - type: text
    content: from the thick jungle of the Jordan,
  - type: text
    content: Looking for prey in the mountain pastures,
  - type: text
    content: I’ll take over and pounce.
  - type: text
    content: I’ll take my pick of the flock—and who’s to stop me?
  - type: text
    content: All the so-called shepherds are helpless before me.”
  '45':
  - type: text
    content: 'So, listen to this plan that '
  - type: text
    content: God
  - type: text
    content: ' has worked out against Babylon, the blueprint of what he’s prepared for dealing with Chaldea:'
  - type: text
    content: Believe it or not, the young,
  - type: text
    content: the vulnerable—mere lambs and kids—will be dragged off.
  - type: text
    content: Believe it or not, the flock
  - type: text
    content: in shock, helpless to help, watches it happen.
  - type: text
    content: When the shout goes up, “Babylon’s down!”
  - type: text
    content: the very earth will shudder at the sound.
  - type: text
    content: The news will be heard all over the world.
  '6':
  - type: text
    content: “My people were lost sheep.
  - type: text
    content: Their shepherds led them astray.
  - type: text
    content: They abandoned them in the mountains
  - type: text
    content: where they wandered aimless through the hills.
  - type: text
    content: They lost track of home,
  - type: text
    content: couldn’t remember where they came from.
  - type: text
    content: Everyone who met them took advantage of them.
  - type: text
    content: 'Their enemies had no qualms:'
  - type: text
    content: '‘Fair game,’ they said. ‘They walked out on '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They abandoned the True Pasture, the hope of their parents.’
  '8':
  - type: text
    content: “But now, get out of Babylon as fast as you can.
  - type: text
    content: Be rid of that Babylonian country.
  - type: text
    content: On your way. Good sheepdogs lead, but don’t you be led.
  - type: text
    content: Lead the way home!
  - type: text
    content: Do you see what I’m doing?
  - type: text
    content: I’m rallying a host of nations against Babylon.
  - type: text
    content: They’ll come out of the north,
  - type: text
    content: attack and take her.
  - type: text
    content: Oh, they know how to fight, these armies.
  - type: text
    content: They never come home empty-handed.
  - type: text
    content: Babylon is ripe for picking!
  - type: text
    content: 'All her plunderers will fill their bellies!” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
