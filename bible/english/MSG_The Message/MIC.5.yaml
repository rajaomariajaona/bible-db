document_id: MIC.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Leader Who Will Shepherd-Rule Israel
  - type: text
    content: But for now, prepare for the worst, victim daughter!
  - type: text
    content: The siege is set against us.
  - type: text
    content: They humiliate Israel’s king,
  - type: text
    content: slapping him around like a rag doll.
  '10':
  - type: text
    content: “The day is coming”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “When there will be no more war. None.
  - type: text
    content: I’ll slaughter your war horses and demolish your chariots.
  - type: text
    content: I’ll dismantle military posts
  - type: text
    content: and level your fortifications.
  - type: text
    content: I’ll abolish your religious black markets,
  - type: text
    content: your underworld traffic in black magic.
  - type: text
    content: I will smash your carved and cast gods
  - type: text
    content: and chop down your phallic posts.
  - type: text
    content: No more taking control of the world,
  - type: text
    content: worshiping what you do or make.
  - type: text
    content: I’ll root out your sacred sex-and-power centers
  - type: text
    content: and destroy the God-defiant.
  - type: text
    content: In raging anger, I’ll make a clean sweep
  - type: text
    content: of godless nations who haven’t listened.”
  '2':
  - type: text
    content: But you, Bethlehem, David’s country,
  - type: text
    content: the runt of the litter—
  - type: text
    content: From you will come the leader
  - type: text
    content: who will shepherd-rule Israel.
  - type: text
    content: He’ll be no upstart, no pretender.
  - type: text
    content: His family tree is ancient and distinguished.
  - type: text
    content: Meanwhile, Israel will be in foster homes
  - type: text
    content: until the birth pangs are over and the child is born,
  - type: text
    content: And the scattered brothers come back
  - type: text
    content: home to the family of Israel.
  - type: text
    content: 'He will stand tall in his shepherd-rule by '
  - type: text
    content: God
  - type: text
    content: ’s strength,
  - type: text
    content: 'centered in the majesty of '
  - type: text
    content: God
  - type: text
    content: -Revealed.
  - type: text
    content: And the people will have a good and safe home,
  - type: text
    content: for the whole world will hold him in respect—
  - type: text
    content: Peacemaker of the world!
  '5':
  - type: text
    content: And if some bullying Assyrian shows up,
  - type: text
    content: invades and violates our land, don’t worry.
  - type: text
    content: We’ll put him in his place, send him packing,
  - type: text
    content: and watch his every move.
  - type: text
    content: Shepherd-rule will extend as far as needed,
  - type: text
    content: to Assyria and all other Nimrod-bullies.
  - type: text
    content: Our shepherd-ruler will save us from old or new enemies,
  - type: text
    content: from anyone who invades or violates our land.
  '7':
  - type: text
    content: The purged and select company of Jacob will be
  - type: text
    content: like an island in the sea of peoples.
  - type: text
    content: 'They’ll be like dew from '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: like summer showers
  - type: text
    content: Not mentioned in the weather forecast,
  - type: text
    content: not subject to calculation or control.
  '8':
  - type: text
    content: Yes, the purged and select company of Jacob will be
  - type: text
    content: like an island in the sea of peoples,
  - type: text
    content: Like the king of beasts among wild beasts,
  - type: text
    content: like a young lion loose in a flock of sheep,
  - type: text
    content: Killing and devouring the lambs
  - type: text
    content: and no one able to stop him.
  - type: text
    content: With your arms raised in triumph over your foes,
  - type: text
    content: your enemies will be no more!
  - type: text
    content: '* * *'
