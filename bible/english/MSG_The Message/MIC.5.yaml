document_id: MIC.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Leader Who Will Shepherd-Rule Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But for now, prepare for the worst, victim daughter!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The siege is set against us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They humiliate Israel’s king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slapping him around like a rag doll.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The day is coming”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When there will be no more war. None.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll slaughter your war horses and demolish your chariots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll dismantle military posts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and level your fortifications.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll abolish your religious black markets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your underworld traffic in black magic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will smash your carved and cast gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chop down your phallic posts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more taking control of the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worshiping what you do or make.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll root out your sacred sex-and-power centers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy the God-defiant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In raging anger, I’ll make a clean sweep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of godless nations who haven’t listened.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, Bethlehem, David’s country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the runt of the litter—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From you will come the leader
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will shepherd-rule Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll be no upstart, no pretender.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His family tree is ancient and distinguished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile, Israel will be in foster homes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the birth pangs are over and the child is born,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the scattered brothers come back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: home to the family of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will stand tall in his shepherd-rule by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'centered in the majesty of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -Revealed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the people will have a good and safe home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the whole world will hold him in respect—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Peacemaker of the world!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if some bullying Assyrian shows up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invades and violates our land, don’t worry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll put him in his place, send him packing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and watch his every move.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shepherd-rule will extend as far as needed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Assyria and all other Nimrod-bullies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our shepherd-ruler will save us from old or new enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from anyone who invades or violates our land.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The purged and select company of Jacob will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an island in the sea of peoples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They’ll be like dew from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like summer showers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not mentioned in the weather forecast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not subject to calculation or control.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the purged and select company of Jacob will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an island in the sea of peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the king of beasts among wild beasts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a young lion loose in a flock of sheep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Killing and devouring the lambs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one able to stop him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your arms raised in triumph over your foes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your enemies will be no more!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
