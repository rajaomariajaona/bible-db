document_id: JOB.16
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Job Defends Himself
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: If You Were in My Shoes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'Then Job defended himself:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve had all I can take of your talk.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What a bunch of miserable comforters!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is there no end to your windbag speeches?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What’s your problem that you go on and on like this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you were in my shoes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could talk just like you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I could put together a terrific tirade
- type: usfm
  marker: q2
  children:
  - type: text
    text: and really let you have it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’d never do that. I’d console and comfort,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make things better, not worse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-14
  - type: text
    text: “When I speak up, I feel no better;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I say nothing, that doesn’t help either.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I feel worn down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God, you have wasted me totally—me and my family!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve shriveled me like a dried prune,
- type: usfm
  marker: q2
  children:
  - type: text
    text: showing the world that you’re against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My gaunt face stares back at me from the mirror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a mute witness to your treatment of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your anger tears at me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your teeth rip me to shreds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your eyes burn holes in me—God, my enemy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: People take one look at me and gasp.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Contemptuous, they slap me around
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gang up against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And God just stands there and lets them do it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lets wicked people do what they want with me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was contentedly minding my business when God beat me up.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He grabbed me by the neck and threw me around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He set me up as his target,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then rounded up archers to shoot at me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Merciless, they shot me full of arrows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: bitter bile poured from my gut to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He burst in on me, onslaught after onslaught,
- type: usfm
  marker: q2
  children:
  - type: text
    text: charging me like a mad bull.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: “I sewed myself a shroud and wore it like a shirt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I lay facedown in the dirt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now my face is blotched red from weeping;
- type: usfm
  marker: q2
  children:
  - type: text
    text: look at the dark shadows under my eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though I’ve never hurt a soul
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my prayers are sincere!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The One Who Represents Mortals Before God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-22
  - type: text
    text: “O Earth, don’t cover up the wrong done to me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t muffle my cry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: There must be Someone in heaven who knows the truth about me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in highest heaven, some Attorney who can clear my name—
- type: usfm
  marker: q1
  children:
  - type: text
    text: My Champion, my Friend,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while I’m weeping my eyes out before God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I appeal to the One who represents mortals before God
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a neighbor stands up for a neighbor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Only a few years are left
- type: usfm
  marker: q2
  children:
  - type: text
    text: before I set out on the road of no return.”
