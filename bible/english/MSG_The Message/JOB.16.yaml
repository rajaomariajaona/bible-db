document_id: JOB.16,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Defends Himself
  - type: heading
    content: If You Were in My Shoes
  - type: text
    content: 'Then Job defended himself:'
  - type: text
    content: “I’ve had all I can take of your talk.
  - type: text
    content: What a bunch of miserable comforters!
  - type: text
    content: Is there no end to your windbag speeches?
  - type: text
    content: What’s your problem that you go on and on like this?
  - type: text
    content: If you were in my shoes,
  - type: text
    content: I could talk just like you.
  - type: text
    content: I could put together a terrific tirade
  - type: text
    content: and really let you have it.
  - type: text
    content: But I’d never do that. I’d console and comfort,
  - type: text
    content: make things better, not worse!
  '15':
  - type: text
    content: “I sewed myself a shroud and wore it like a shirt;
  - type: text
    content: I lay facedown in the dirt.
  - type: text
    content: Now my face is blotched red from weeping;
  - type: text
    content: look at the dark shadows under my eyes,
  - type: text
    content: Even though I’ve never hurt a soul
  - type: text
    content: and my prayers are sincere!
  - type: heading
    content: The One Who Represents Mortals Before God
  '18':
  - type: text
    content: “O Earth, don’t cover up the wrong done to me!
  - type: text
    content: Don’t muffle my cry!
  - type: text
    content: There must be Someone in heaven who knows the truth about me,
  - type: text
    content: in highest heaven, some Attorney who can clear my name—
  - type: text
    content: My Champion, my Friend,
  - type: text
    content: while I’m weeping my eyes out before God.
  - type: text
    content: I appeal to the One who represents mortals before God
  - type: text
    content: as a neighbor stands up for a neighbor.
  - type: text
    content: “Only a few years are left
  - type: text
    content: before I set out on the road of no return.”
  '6':
  - type: text
    content: “When I speak up, I feel no better;
  - type: text
    content: if I say nothing, that doesn’t help either.
  - type: text
    content: I feel worn down.
  - type: text
    content: God, you have wasted me totally—me and my family!
  - type: text
    content: You’ve shriveled me like a dried prune,
  - type: text
    content: showing the world that you’re against me.
  - type: text
    content: My gaunt face stares back at me from the mirror,
  - type: text
    content: a mute witness to your treatment of me.
  - type: text
    content: Your anger tears at me,
  - type: text
    content: your teeth rip me to shreds,
  - type: text
    content: your eyes burn holes in me—God, my enemy!
  - type: text
    content: People take one look at me and gasp.
  - type: text
    content: Contemptuous, they slap me around
  - type: text
    content: and gang up against me.
  - type: text
    content: And God just stands there and lets them do it,
  - type: text
    content: lets wicked people do what they want with me.
  - type: text
    content: I was contentedly minding my business when God beat me up.
  - type: text
    content: He grabbed me by the neck and threw me around.
  - type: text
    content: He set me up as his target,
  - type: text
    content: then rounded up archers to shoot at me.
  - type: text
    content: Merciless, they shot me full of arrows;
  - type: text
    content: bitter bile poured from my gut to the ground.
  - type: text
    content: He burst in on me, onslaught after onslaught,
  - type: text
    content: charging me like a mad bull.
