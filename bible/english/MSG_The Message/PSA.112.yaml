document_id: PSA.112,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-10
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed man, blessed woman, who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who cherish and relish his commandments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children robust on the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the homes of the upright—how blessed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their houses brim with wealth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a generosity that never runs dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sunrise breaks through the darkness for good people—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s grace and mercy and justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The good person is generous and lends lavishly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No shuffling or stumbling around for this one,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a sterling and solid and lasting reputation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unfazed by rumor and gossip,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Heart ready, trusting in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spirit firm, unperturbed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ever blessed, relaxed among enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lavish gifts on the poor—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A generosity that goes on, and on, and on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An honored life! A beautiful life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Someone wicked takes one look and rages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blusters away but ends up speechless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing to the dreams of the wicked. Nothing.
