document_id: PSA.112,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Blessed man, blessed woman, who fear '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Who cherish and relish his commandments,
  - type: text
    content: Their children robust on the earth,
  - type: text
    content: And the homes of the upright—how blessed!
  - type: text
    content: Their houses brim with wealth
  - type: text
    content: And a generosity that never runs dry.
  - type: text
    content: Sunrise breaks through the darkness for good people—
  - type: text
    content: God’s grace and mercy and justice!
  - type: text
    content: The good person is generous and lends lavishly;
  - type: text
    content: No shuffling or stumbling around for this one,
  - type: text
    content: But a sterling and solid and lasting reputation.
  - type: text
    content: Unfazed by rumor and gossip,
  - type: text
    content: 'Heart ready, trusting in '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Spirit firm, unperturbed,
  - type: text
    content: Ever blessed, relaxed among enemies,
  - type: text
    content: They lavish gifts on the poor—
  - type: text
    content: A generosity that goes on, and on, and on.
  - type: text
    content: An honored life! A beautiful life!
  - type: text
    content: Someone wicked takes one look and rages,
  - type: text
    content: Blusters away but ends up speechless.
  - type: text
    content: There’s nothing to the dreams of the wicked. Nothing.
