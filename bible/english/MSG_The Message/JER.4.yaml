document_id: JER.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: “If you want to come back, O Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you must really come back to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You must get rid of your stinking sin paraphernalia
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not wander away from me anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you can say words like, ‘As '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lives . . . ’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have them mean something true and just and right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the godless nations will get caught up in the blessing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and find something in Israel to write home about.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then I said, “Alas, Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve fed lies to this people, this Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You assured them, ‘All is well, don’t worry,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the very moment when the sword was at their throats.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: At that time, this people, yes, this very Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will be told in plain words:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The northern hordes are sweeping in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the desert steppes—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wind that’s up to no good, a gale-force wind.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I ordered this wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m pronouncing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my hurricane judgment on my people.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Your Evil Life Is Piercing Your Heart
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: Look at them! Like banks of storm clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: racing, tumbling, their chariots a tornado,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their horses faster than eagles!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Woe to us! We’re done for!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem! Scrub the evil from your lives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you’ll be fit for salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much longer will you harbor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devious and malignant designs within you?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: What’s this? A messenger from Dan?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bad news from Ephraim’s hills!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the report public.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Broadcast the news to Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Invaders from far off are
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raising war cries against Judah’s towns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re all over her, like a dog on a bone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And why? Because she rebelled against me.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “It’s the way you’ve lived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s brought all this on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bitter taste is from your evil life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That’s what’s piercing your heart.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: I’m doubled up with cramps in my belly—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a poker burns in my gut.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My insides are tearing me up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never a moment’s peace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ram’s horn trumpet blast rings in my ears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the signal for all-out war.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster hard on the heels of disaster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole country in ruins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In one stroke my home is destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the walls flattened in the blink of an eye.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long do I have to look at the warning flares,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to the siren of danger?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Experts at Evil
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “What fools my people are!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have no idea who I am.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A company of half-wits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dopes and donkeys all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Experts at evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but klutzes at good.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-26
    - type: text
      text: I looked at the earth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was back to pre-Genesis chaos and emptiness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked at the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not a star to be seen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked at the mountains—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were trembling like aspen leaves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rocking back and forth in the wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked—what’s this! Not a man or woman in sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not a bird to be seen in the skies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked—this can’t be! Every garden and orchard shriveled up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the towns were ghost towns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all this because of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because of the blazing anger of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: 'Yes, this is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word on the matter:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The whole country will be laid waste—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: still it won’t be the end of the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will mourn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the skies lament
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I’ve given my word and won’t take it back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve decided and won’t change my mind.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You’re Not Going to Seduce Anyone
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Someone shouts, “Horsemen and archers!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everybody runs for cover.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hide in ditches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they climb into caves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cities are emptied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a person left anywhere.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Here’s another Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to the people of Judah and Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Plow your unplowed fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but then don’t plant weeds in the soil!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, circumcise your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lives
    - type: text
      text: ' for God’s sake.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Plow your unplowed hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you people of Judah and Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prevent fire—the fire of my anger—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for once it starts it can’t be put out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wicked ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are fuel for the fire.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Sledgehammer Anger
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-31
    - type: text
      text: And you, what do you think you’re up to?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dressing up in party clothes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Decking yourselves out in jewelry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting on lipstick and rouge and mascara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your primping goes for nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You’re not going to seduce anyone. They’re out to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kill
    - type: text
      text: ' you!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what’s that I hear? The cry of a woman in labor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the screams of a mother giving birth to her firstborn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s the cry of Daughter Zion, gasping for breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'reaching out for help:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Help, oh help me! I’m dying!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The killers are on me!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: “Sound the alarm in Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: broadcast the news in Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say, ‘Blow the ram’s horn trumpet through the land!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout out—a bullhorn bellow!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Close ranks!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Run for your lives to the shelters!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Send up a flare warning Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Not a minute to lose! Don’t sit on your hands!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster’s descending from the north. I set it off!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When it lands, it will shake the foundations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invaders have pounced like a lion from its cover,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to rip nations to shreds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leaving your land in wrack and ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your cities in rubble, abandoned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dress in funereal black.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Weep and wail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s sledgehammer anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has slammed into us head-on.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “When this happens”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “King and princes will lose heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: priests will be baffled and prophets stand dumbfounded.”
