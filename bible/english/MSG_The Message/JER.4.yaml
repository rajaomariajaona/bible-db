document_id: JER.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: “If you want to come back, O Israel,
  - type: text
    content: you must really come back to me.
  - type: text
    content: You must get rid of your stinking sin paraphernalia
  - type: text
    content: and not wander away from me anymore.
  - type: text
    content: 'Then you can say words like, ‘As '
  - type: text
    content: God
  - type: text
    content: ' lives . . . ’'
  - type: text
    content: and have them mean something true and just and right.
  - type: text
    content: And the godless nations will get caught up in the blessing
  - type: text
    content: and find something in Israel to write home about.”
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: 'Then I said, “Alas, Master '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: You’ve fed lies to this people, this Jerusalem.
  - type: text
    content: You assured them, ‘All is well, don’t worry,’
  - type: text
    content: at the very moment when the sword was at their throats.”
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: At that time, this people, yes, this very Jerusalem,
  - type: text
    content: 'will be told in plain words:'
  - type: text
    content: “The northern hordes are sweeping in
  - type: text
    content: from the desert steppes—
  - type: text
    content: A wind that’s up to no good, a gale-force wind.
  - type: text
    content: I ordered this wind.
  - type: text
    content: I’m pronouncing
  - type: text
    content: my hurricane judgment on my people.”
  - type: heading
    content: Your Evil Life Is Piercing Your Heart
  '13':
  - type: text
    content: Look at them! Like banks of storm clouds,
  - type: text
    content: racing, tumbling, their chariots a tornado,
  - type: text
    content: Their horses faster than eagles!
  - type: text
    content: Woe to us! We’re done for!
  - type: text
    content: Jerusalem! Scrub the evil from your lives
  - type: text
    content: so you’ll be fit for salvation.
  - type: text
    content: How much longer will you harbor
  - type: text
    content: devious and malignant designs within you?
  '15':
  - type: text
    content: What’s this? A messenger from Dan?
  - type: text
    content: Bad news from Ephraim’s hills!
  - type: text
    content: Make the report public.
  - type: text
    content: 'Broadcast the news to Jerusalem:'
  - type: text
    content: “Invaders from far off are
  - type: text
    content: raising war cries against Judah’s towns.
  - type: text
    content: They’re all over her, like a dog on a bone.
  - type: text
    content: And why? Because she rebelled against me.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '18':
  - type: text
    content: “It’s the way you’ve lived
  - type: text
    content: that’s brought all this on you.
  - type: text
    content: The bitter taste is from your evil life.
  - type: text
    content: That’s what’s piercing your heart.”
  - type: text
    content: '* * *'
  '19':
  - type: text
    content: I’m doubled up with cramps in my belly—
  - type: text
    content: a poker burns in my gut.
  - type: text
    content: My insides are tearing me up,
  - type: text
    content: never a moment’s peace.
  - type: text
    content: The ram’s horn trumpet blast rings in my ears,
  - type: text
    content: the signal for all-out war.
  - type: text
    content: Disaster hard on the heels of disaster,
  - type: text
    content: the whole country in ruins!
  - type: text
    content: In one stroke my home is destroyed,
  - type: text
    content: the walls flattened in the blink of an eye.
  - type: text
    content: How long do I have to look at the warning flares,
  - type: text
    content: listen to the siren of danger?
  - type: heading
    content: Experts at Evil
  '22':
  - type: text
    content: “What fools my people are!
  - type: text
    content: They have no idea who I am.
  - type: text
    content: A company of half-wits,
  - type: text
    content: dopes and donkeys all!
  - type: text
    content: Experts at evil
  - type: text
    content: but klutzes at good.”
  '23':
  - type: text
    content: I looked at the earth—
  - type: text
    content: it was back to pre-Genesis chaos and emptiness.
  - type: text
    content: I looked at the skies,
  - type: text
    content: and not a star to be seen.
  - type: text
    content: I looked at the mountains—
  - type: text
    content: they were trembling like aspen leaves,
  - type: text
    content: And all the hills
  - type: text
    content: rocking back and forth in the wind.
  - type: text
    content: I looked—what’s this! Not a man or woman in sight,
  - type: text
    content: and not a bird to be seen in the skies.
  - type: text
    content: I looked—this can’t be! Every garden and orchard shriveled up.
  - type: text
    content: All the towns were ghost towns.
  - type: text
    content: 'And all this because of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'because of the blazing anger of '
  - type: text
    content: God
  - type: text
    content: .
  '27':
  - type: text
    content: 'Yes, this is '
  - type: text
    content: God
  - type: text
    content: '’s Word on the matter:'
  - type: text
    content: “The whole country will be laid waste—
  - type: text
    content: still it won’t be the end of the world.
  - type: text
    content: The earth will mourn
  - type: text
    content: and the skies lament
  - type: text
    content: Because I’ve given my word and won’t take it back.
  - type: text
    content: I’ve decided and won’t change my mind.”
  - type: heading
    content: You’re Not Going to Seduce Anyone
  '29':
  - type: text
    content: Someone shouts, “Horsemen and archers!”
  - type: text
    content: and everybody runs for cover.
  - type: text
    content: They hide in ditches,
  - type: text
    content: they climb into caves.
  - type: text
    content: The cities are emptied,
  - type: text
    content: not a person left anywhere.
  '3':
  - type: text
    content: 'Here’s another Message from '
  - type: text
    content: God
  - type: text
    content: 'to the people of Judah and Jerusalem:'
  - type: text
    content: “Plow your unplowed fields,
  - type: text
    content: but then don’t plant weeds in the soil!
  - type: text
    content: 'Yes, circumcise your '
  - type: text
    content: lives
  - type: text
    content: ' for God’s sake.'
  - type: text
    content: Plow your unplowed hearts,
  - type: text
    content: all you people of Judah and Jerusalem.
  - type: text
    content: Prevent fire—the fire of my anger—
  - type: text
    content: for once it starts it can’t be put out.
  - type: text
    content: Your wicked ways
  - type: text
    content: are fuel for the fire.
  - type: heading
    content: God’s Sledgehammer Anger
  '30':
  - type: text
    content: And you, what do you think you’re up to?
  - type: text
    content: Dressing up in party clothes,
  - type: text
    content: Decking yourselves out in jewelry,
  - type: text
    content: putting on lipstick and rouge and mascara!
  - type: text
    content: Your primping goes for nothing.
  - type: text
    content: 'You’re not going to seduce anyone. They’re out to '
  - type: text
    content: kill
  - type: text
    content: ' you!'
  - type: text
    content: And what’s that I hear? The cry of a woman in labor,
  - type: text
    content: the screams of a mother giving birth to her firstborn.
  - type: text
    content: It’s the cry of Daughter Zion, gasping for breath,
  - type: text
    content: 'reaching out for help:'
  - type: text
    content: “Help, oh help me! I’m dying!
  - type: text
    content: The killers are on me!”
  '5':
  - type: text
    content: “Sound the alarm in Judah,
  - type: text
    content: broadcast the news in Jerusalem.
  - type: text
    content: Say, ‘Blow the ram’s horn trumpet through the land!’
  - type: text
    content: Shout out—a bullhorn bellow!—
  - type: text
    content: ‘Close ranks!
  - type: text
    content: Run for your lives to the shelters!’
  - type: text
    content: 'Send up a flare warning Zion:'
  - type: text
    content: ‘Not a minute to lose! Don’t sit on your hands!’
  - type: text
    content: Disaster’s descending from the north. I set it off!
  - type: text
    content: When it lands, it will shake the foundations.
  - type: text
    content: Invaders have pounced like a lion from its cover,
  - type: text
    content: ready to rip nations to shreds,
  - type: text
    content: Leaving your land in wrack and ruin,
  - type: text
    content: your cities in rubble, abandoned.
  - type: text
    content: Dress in funereal black.
  - type: text
    content: Weep and wail,
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ’s sledgehammer anger
  - type: text
    content: has slammed into us head-on.
  '9':
  - type: text
    content: “When this happens”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “King and princes will lose heart;
  - type: text
    content: priests will be baffled and prophets stand dumbfounded.”
