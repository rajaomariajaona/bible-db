document_id: ECC.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Quester
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the words of the Quester, David’s son and king in Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-11
  - type: text
    text: Smoke, nothing but smoke. [That’s what the Quester says.]
- type: usfm
  marker: q2
  children:
  - type: text
    text: There’s nothing to anything—it’s all smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s there to show for a lifetime of work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lifetime of working your fingers to the bone?
- type: usfm
  marker: q1
  children:
  - type: text
    text: One generation goes its way, the next one arrives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but nothing changes—it’s business as usual for old planet earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sun comes up and the sun goes down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then does it again, and again—the same old round.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wind blows south, the wind blows north.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Around and around and around it blows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blowing this way, then that—the whirling, erratic wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the rivers flow into the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the sea never fills up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rivers keep flowing to the same old place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then start all over and do it again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything’s boring, utterly boring—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one can find any meaning in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Boring to the eye,
- type: usfm
  marker: q2
  children:
  - type: text
    text: boring to the ear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What was will be again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what happened will happen again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s nothing new on this earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Year after year it’s the same old thing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does someone call out, “Hey, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' is new”?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t get excited—it’s the same old story.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nobody remembers what happened yesterday.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the things that will happen tomorrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nobody’ll remember them either.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t count on being remembered.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I’ve Seen It All
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: Call me “the Quester.” I’ve been king over Israel in Jerusalem. I looked most carefully into everything, searched out all that is done on this earth. And let me tell you, there’s not much to write home about. God hasn’t made it easy for us. I’ve seen it all and it’s nothing but smoke—smoke, and spitting into the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Life’s a corkscrew that can’t be straightened,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A minus that won’t add up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: I said to myself, “I know more and I’m wiser than anyone before me in Jerusalem. I’ve stockpiled wisdom and knowledge.” What I’ve finally concluded is that so-called wisdom and knowledge are mindless and witless—nothing but spitting into the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Much learning earns you much trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more you know, the more you hurt.
