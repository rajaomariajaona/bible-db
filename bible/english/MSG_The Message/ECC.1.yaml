document_id: ECC.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Quester
  - type: text
    content: 'These are the words of the Quester, David’s son and king in Jerusalem:'
  '12':
  - type: text
    content: Call me “the Quester.” I’ve been king over Israel in Jerusalem. I looked most carefully into everything, searched out all that is done on this earth. And let me tell you, there’s not much to write home about. God hasn’t made it easy for us. I’ve seen it all and it’s nothing but smoke—smoke, and spitting into the wind.
  '15':
  - type: text
    content: Life’s a corkscrew that can’t be straightened,
  - type: text
    content: A minus that won’t add up.
  '16':
  - type: text
    content: I said to myself, “I know more and I’m wiser than anyone before me in Jerusalem. I’ve stockpiled wisdom and knowledge.” What I’ve finally concluded is that so-called wisdom and knowledge are mindless and witless—nothing but spitting into the wind.
  '18':
  - type: text
    content: Much learning earns you much trouble.
  - type: text
    content: The more you know, the more you hurt.
  '2':
  - type: text
    content: Smoke, nothing but smoke. [That’s what the Quester says.]
  - type: text
    content: There’s nothing to anything—it’s all smoke.
  - type: text
    content: What’s there to show for a lifetime of work,
  - type: text
    content: a lifetime of working your fingers to the bone?
  - type: text
    content: One generation goes its way, the next one arrives,
  - type: text
    content: but nothing changes—it’s business as usual for old planet earth.
  - type: text
    content: The sun comes up and the sun goes down,
  - type: text
    content: then does it again, and again—the same old round.
  - type: text
    content: The wind blows south, the wind blows north.
  - type: text
    content: Around and around and around it blows,
  - type: text
    content: blowing this way, then that—the whirling, erratic wind.
  - type: text
    content: All the rivers flow into the sea,
  - type: text
    content: but the sea never fills up.
  - type: text
    content: The rivers keep flowing to the same old place,
  - type: text
    content: and then start all over and do it again.
  - type: text
    content: Everything’s boring, utterly boring—
  - type: text
    content: no one can find any meaning in it.
  - type: text
    content: Boring to the eye,
  - type: text
    content: boring to the ear.
  - type: text
    content: What was will be again,
  - type: text
    content: what happened will happen again.
  - type: text
    content: There’s nothing new on this earth.
  - type: text
    content: Year after year it’s the same old thing.
  - type: text
    content: 'Does someone call out, “Hey, '
  - type: text
    content: this
  - type: text
    content: ' is new”?'
  - type: text
    content: Don’t get excited—it’s the same old story.
  - type: text
    content: Nobody remembers what happened yesterday.
  - type: text
    content: And the things that will happen tomorrow?
  - type: text
    content: Nobody’ll remember them either.
  - type: text
    content: Don’t count on being remembered.
  - type: heading
    content: I’ve Seen It All
