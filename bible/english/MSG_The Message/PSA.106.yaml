document_id: PSA.106,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Thank '
  - type: text
    content: God
  - type: text
    content: '! And why?'
  - type: text
    content: Because he’s good, because his love lasts.
  - type: text
    content: But who on earth can do it—
  - type: text
    content: 'declaim '
  - type: text
    content: God
  - type: text
    content: ’s mighty acts, broadcast all his praises?
  - type: text
    content: You’re one happy man when you do what’s right,
  - type: text
    content: one happy woman when you form the habit of justice.
  '13':
  - type: text
    content: But it wasn’t long before they forgot the whole thing,
  - type: text
    content: wouldn’t wait to be told what to do.
  - type: text
    content: They only cared about pleasing themselves in that desert,
  - type: text
    content: provoked God with their insistent demands.
  - type: text
    content: He gave them exactly what they asked for—
  - type: text
    content: but along with it they got an empty heart.
  - type: text
    content: One day in camp some grew jealous of Moses,
  - type: text
    content: 'also of Aaron, holy priest of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: The ground opened and swallowed Dathan,
  - type: text
    content: then buried Abiram’s gang.
  - type: text
    content: Fire flared against that rebel crew
  - type: text
    content: and torched them to a cinder.
  '19':
  - type: text
    content: They cast in metal a bull calf at Horeb
  - type: text
    content: and worshiped the statue they’d made.
  - type: text
    content: They traded the Glory
  - type: text
    content: for a cheap piece of sculpture—a grass-chewing bull!
  - type: text
    content: They forgot God, their very own Savior,
  - type: text
    content: who turned things around in Egypt,
  - type: text
    content: Who created a world of wonders in the Land of Ham,
  - type: text
    content: who gave that stunning performance at the Red Sea.
  '23':
  - type: text
    content: Fed up, God decided to get rid of them—
  - type: text
    content: and except for Moses, his chosen, he would have.
  - type: text
    content: But Moses stood in the gap and deflected God’s anger,
  - type: text
    content: prevented it from destroying them utterly.
  - type: text
    content: They went on to reject the Blessed Land,
  - type: text
    content: didn’t believe a word of what God promised.
  - type: text
    content: They found fault with the life they had
  - type: text
    content: 'and turned a deaf ear to '
  - type: text
    content: God
  - type: text
    content: ’s voice.
  - type: text
    content: Exasperated, God swore
  - type: text
    content: that he’d lay them low in the desert,
  - type: text
    content: Scattering their children here and there,
  - type: text
    content: strewing them all over the earth.
  '28':
  - type: text
    content: Then they linked up with Baal Peor,
  - type: text
    content: attending funeral banquets and eating idol food.
  - type: text
    content: That made God so angry
  - type: text
    content: that a plague spread through their ranks;
  - type: text
    content: Phinehas stood up and pled their case
  - type: text
    content: and the plague was stopped.
  - type: text
    content: This was counted to his credit;
  - type: text
    content: his descendants will never forget it.
  '32':
  - type: text
    content: They angered God again at Meribah Springs;
  - type: text
    content: this time Moses got mixed up in their evil;
  - type: text
    content: 'Because they defied '
  - type: text
    content: God
  - type: text
    content: ' yet again,'
  - type: text
    content: Moses exploded and lost his temper.
  '34':
  - type: text
    content: They didn’t wipe out those godless cultures
  - type: text
    content: 'as ordered by '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: Instead they intermarried with the heathen,
  - type: text
    content: and in time became just like them.
  - type: text
    content: They worshiped their idols,
  - type: text
    content: were caught in the trap of idols.
  - type: text
    content: They sacrificed their sons and daughters
  - type: text
    content: at the altars of demon gods.
  - type: text
    content: They slit the throats of their babies,
  - type: text
    content: murdered their infant girls and boys.
  - type: text
    content: They offered their babies to Canaan’s gods;
  - type: text
    content: the blood of their babies stained the land.
  - type: text
    content: Their way of life reeked;
  - type: text
    content: they lived like prostitutes.
  '4':
  - type: text
    content: 'Remember me, '
  - type: text
    content: God
  - type: text
    content: ', when you enjoy your people;'
  - type: text
    content: include me when you save them;
  - type: text
    content: I want to see your chosen succeed,
  - type: text
    content: celebrate with your celebrating nation,
  - type: text
    content: join the Hallelujahs of your pride and joy!
  '40':
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' was furious—a wildfire anger;'
  - type: text
    content: he couldn’t stand even to look at his people.
  - type: text
    content: He turned them over to the heathen
  - type: text
    content: so that the people who hated them ruled them.
  - type: text
    content: Their enemies made life hard for them;
  - type: text
    content: they were tyrannized under that rule.
  - type: text
    content: Over and over God rescued them, but they never learned—
  - type: text
    content: until finally their sins destroyed them.
  '44':
  - type: text
    content: Still, when God saw the trouble they were in
  - type: text
    content: and heard their cries for help,
  - type: text
    content: He remembered his Covenant with them,
  - type: text
    content: and, immense with love, took them by the hand.
  - type: text
    content: He poured out his mercy on them
  - type: text
    content: while their captors looked on, amazed.
  '47':
  - type: text
    content: 'Save us, '
  - type: text
    content: God
  - type: text
    content: ', our God!'
  - type: text
    content: Gather us back out of exile
  - type: text
    content: So we can give thanks to your holy name
  - type: text
    content: and join in the glory when you are praised!
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: ', Israel’s God!'
  - type: text
    content: Bless now, bless always!
  - type: text
    content: Oh! Let everyone say Amen!
  - type: text
    content: Hallelujah!
  '6':
  - type: text
    content: We’ve sinned a lot, both we and our parents;
  - type: text
    content: We’ve fallen short, hurt a lot of people.
  - type: text
    content: After our parents left Egypt,
  - type: text
    content: they took your wonders for granted,
  - type: text
    content: forgot your great and wonderful love.
  - type: text
    content: They were barely beyond the Red Sea
  - type: text
    content: when they defied the High God
  - type: text
    content: —the very place he saved them!
  - type: text
    content: —the place he revealed his amazing power!
  - type: text
    content: He rebuked the Red Sea so that it dried up on the spot
  - type: text
    content: —he paraded them right through!
  - type: text
    content: —no one so much as got wet feet!
  - type: text
    content: He saved them from a life of oppression,
  - type: text
    content: pried them loose from the grip of the enemy.
  - type: text
    content: Then the waters flowed back on their oppressors;
  - type: text
    content: there wasn’t a single survivor.
  - type: text
    content: Then
  - type: text
    content: ' they believed his words were true'
  - type: text
    content: and broke out in songs of praise.
