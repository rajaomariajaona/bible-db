document_id: PSA.106,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thank '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! And why?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because he’s good, because his love lasts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But who on earth can do it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declaim '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s mighty acts, broadcast all his praises?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re one happy man when you do what’s right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one happy woman when you form the habit of justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it wasn’t long before they forgot the whole thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wouldn’t wait to be told what to do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They only cared about pleasing themselves in that desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provoked God with their insistent demands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave them exactly what they asked for—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but along with it they got an empty heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One day in camp some grew jealous of Moses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'also of Aaron, holy priest of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ground opened and swallowed Dathan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then buried Abiram’s gang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire flared against that rebel crew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and torched them to a cinder.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cast in metal a bull calf at Horeb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worshiped the statue they’d made.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They traded the Glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a cheap piece of sculpture—a grass-chewing bull!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot God, their very own Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who turned things around in Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who created a world of wonders in the Land of Ham,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who gave that stunning performance at the Red Sea.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fed up, God decided to get rid of them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and except for Moses, his chosen, he would have.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Moses stood in the gap and deflected God’s anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prevented it from destroying them utterly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They went on to reject the Blessed Land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: didn’t believe a word of what God promised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They found fault with the life they had
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and turned a deaf ear to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exasperated, God swore
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he’d lay them low in the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scattering their children here and there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strewing them all over the earth.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they linked up with Baal Peor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attending funeral banquets and eating idol food.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That made God so angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that a plague spread through their ranks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Phinehas stood up and pled their case
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the plague was stopped.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This was counted to his credit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his descendants will never forget it.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They angered God again at Meribah Springs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this time Moses got mixed up in their evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they defied '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' yet again,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Moses exploded and lost his temper.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They didn’t wipe out those godless cultures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as ordered by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead they intermarried with the heathen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in time became just like them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They worshiped their idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were caught in the trap of idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrificed their sons and daughters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the altars of demon gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They slit the throats of their babies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: murdered their infant girls and boys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They offered their babies to Canaan’s gods;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blood of their babies stained the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their way of life reeked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lived like prostitutes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', when you enjoy your people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: include me when you save them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want to see your chosen succeed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: celebrate with your celebrating nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: join the Hallelujahs of your pride and joy!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was furious—a wildfire anger;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he couldn’t stand even to look at his people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned them over to the heathen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that the people who hated them ruled them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their enemies made life hard for them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were tyrannized under that rule.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over and over God rescued them, but they never learned—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until finally their sins destroyed them.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Still, when God saw the trouble they were in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and heard their cries for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He remembered his Covenant with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and, immense with love, took them by the hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He poured out his mercy on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while their captors looked on, amazed.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gather us back out of exile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So we can give thanks to your holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and join in the glory when you are praised!
  - type: usfm
    marker: qc
    children:
    - type: text
      text: 'Blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', Israel’s God!'
  - type: usfm
    marker: qc
    children:
    - type: text
      text: Bless now, bless always!
  - type: usfm
    marker: qc
    children:
    - type: text
      text: Oh! Let everyone say Amen!
  - type: usfm
    marker: qc
    children:
    - type: text
      text: Hallelujah!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ve sinned a lot, both we and our parents;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’ve fallen short, hurt a lot of people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After our parents left Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they took your wonders for granted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgot your great and wonderful love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were barely beyond the Red Sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they defied the High God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —the very place he saved them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —the place he revealed his amazing power!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rebuked the Red Sea so that it dried up on the spot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —he paraded them right through!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —no one so much as got wet feet!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He saved them from a life of oppression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pried them loose from the grip of the enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the waters flowed back on their oppressors;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there wasn’t a single survivor.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' they believed his words were true'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and broke out in songs of praise.
