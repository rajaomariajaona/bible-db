document_id: 1SA.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Saul Murders the Priests of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: So David got away and escaped to the Cave of Adullam. When his brothers and others associated with his family heard where he was, they came down and joined him. Not only that, but all who were down on their luck came around—losers and vagrants and misfits of all sorts. David became their leader. There were about four hundred in all.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Saul sent for the priest Ahimelech son of Ahitub, along with the whole family of priests at Nob. They all came to the king.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Saul said, “You listen to me, son of Ahitub!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Certainly, master,” he said.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Why have you ganged up against me with the son of Jesse, giving him bread and a sword, even praying with him for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s guidance, setting him up as an outlaw, out to get me?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: Ahimelech answered the king, “There’s not an official in your administration as true to you as David, your own son-in-law and captain of your bodyguard. None more honorable either. Do you think that was the first time I prayed with him for God’s guidance? Hardly! But don’t accuse me of any wrongdoing, me or my family. I have no idea what you’re trying to get at with this ‘outlaw’ talk.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The king said, “Death, Ahimelech! You’re going to die—you and everyone in your family!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The king ordered his henchmen, “Surround and kill the priests of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! They’re hand in glove with David. They knew he was running away from me and didn’t tell me.” But the king’s men wouldn’t do it. They refused to lay a hand on the priests of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Then the king told Doeg, “You do it—massacre the priests!” Doeg the Edomite led the attack and slaughtered the priests, the eighty-five men who wore the sacred robes. He then carried the massacre into Nob, the city of priests, killing man and woman, child and baby, ox, donkey, and sheep—the works.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: 'Only one son of Ahimelech son of Ahitub escaped: Abiathar. He got away and joined up with David. Abiathar reported to David that Saul had murdered the priests of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: David said to Abiathar, “I knew it—that day I saw Doeg the Edomite there, I knew he’d tell Saul. I’m to blame for the death of everyone in your father’s family. Stay here with me. Don’t be afraid. The one out to kill you is out to kill me, too. Stick with me. I’ll protect you.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Then David went to Mizpah in Moab. He petitioned the king of Moab, “Grant asylum to my father and mother until I find out what God has planned for me.” David left his parents in the care of the king of Moab. They stayed there all through the time David was hiding out.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The prophet Gad told David, “Don’t go back to the cave. Go to Judah.” David did what he told him. He went to the forest of Hereth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: Saul got word of the whereabouts of David and his men. He was sitting under the big oak on the hill at Gibeah at the time, spear in hand, holding court surrounded by his officials. He said, “Listen here, you Benjaminites! Don’t think for a minute that you have any future with the son of Jesse! Do you think he’s going to hand over choice land, give you all influential jobs? Think again. Here you are, conspiring against me, whispering behind my back—not one of you is man enough to tell me that my own son is making deals with the son of Jesse, not one of you who cares enough to tell me that my son has taken the side of this, this ...outlaw!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Then Doeg the Edomite, who was standing with Saul’s officials, spoke up: “I saw the son of Jesse meet with Ahimelech son of Ahitub, in Nob. I saw Ahimelech pray with him for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s guidance, give him food, and arm him with the sword of Goliath the Philistine.”
