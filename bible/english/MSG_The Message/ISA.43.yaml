document_id: ISA.43,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: When You’re Between a Rock and a Hard Place
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'But now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God who made you in the first place, Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the One who got you started, Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t be afraid, I’ve redeemed you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve called your name. You’re mine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you’re in over your head, I’ll be there with you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When you’re in rough waters, you will not go down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you’re between a rock and a hard place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it won’t be a dead end—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your personal God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Holy of Israel, your Savior.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I paid a huge price for you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of Egypt, with rich Cush and Seba thrown in!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That’s
    - type: text
      text: ' how much you mean to me!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That’s
    - type: text
      text: ' how much I love you!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’d sell off the whole world to get you back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trade the creation just for you.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your Redeemer,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Holy of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Just for you, I will march on Babylon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll turn the tables on the Babylonians.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of whooping it up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll be wailing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your Holy One,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Creator of Israel, your King.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-21
    - type: text
      text: 'This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God who builds a road right through the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who carves a path through pounding waves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God who summons horses and chariots and armies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lie down and then can’t get up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they’re snuffed out like so many candles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Forget about what’s happened;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t keep going over old history.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be alert, be present. I’m about to do something brand-new.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s bursting out! Don’t you see it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There it is! I’m making a road through the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rivers in the badlands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild animals will say ‘Thank you!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —the coyotes and the buzzards—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I provided water in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rivers through the sunbaked earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drinking water for the people I chose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people I made especially for myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a people custom-made to praise me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-24
    - type: text
      text: “But you didn’t pay a bit of attention to me, Jacob.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You so quickly tired of me, Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You wouldn’t even bring sheep for offerings in worship.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You couldn’t be bothered with sacrifices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It wasn’t that I asked that much from you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I didn’t expect expensive presents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you didn’t even do the minimum—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so stingy with me, so closefisted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you haven’t been stingy with your sins.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve been plenty generous with them—and I’m fed up.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “But I, yes I, am the one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who takes care of your sins—that’s what I do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t keep a list of your sins.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-28
    - type: text
      text: “So, make your case against me. Let’s have this out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make your arguments. Prove you’re in the right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your original ancestor started the sinning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone since has joined in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I had to disqualify the Temple leaders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: repudiate Jacob and discredit Israel.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: '“So don’t be afraid: I’m with you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll round up all your scattered children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pull them in from east and west.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll send orders north and south:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Send them back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return my sons from distant lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my daughters from faraway places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want them back, every last one who bears my name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every man, woman, and child
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom I created for my glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, personally formed and made each one.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-13
    - type: text
      text: Get the blind and deaf out here and ready—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blind (though there’s nothing wrong with their eyes)
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the deaf (though there’s nothing wrong with their ears).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then get the other nations out here and ready.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s see what they have to say about this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how they account for what’s happened.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them present their expert witnesses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make their case;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them try to convince us what they say is true.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' are my witnesses.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “You’re my handpicked servant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you’ll come to know and trust me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'understand both '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' I am and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' I am.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Previous to me there was no such thing as a god,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will there be after me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, yes I, am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m the only Savior there is.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I spoke, I saved, I told you what existed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: long before these upstart gods appeared on the scene.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you know it, you’re my witnesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you’re the evidence.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, I am God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve always been God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I always will be God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one can take anything from me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I make; who can unmake it?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You Didn’t Even Do the Minimum
    marker-yv: yv-h
