verses:
  '1':
  - type: heading
    content: When You’re Between a Rock and a Hard Place
  - type: text
    content: 'But now, '
  - type: text
    content: God
  - type: text
    content: ’s Message,
  - type: text
    content: the God who made you in the first place, Jacob,
  - type: text
    content: 'the One who got you started, Israel:'
  - type: text
    content: “Don’t be afraid, I’ve redeemed you.
  - type: text
    content: I’ve called your name. You’re mine.
  - type: text
    content: When you’re in over your head, I’ll be there with you.
  - type: text
    content: When you’re in rough waters, you will not go down.
  - type: text
    content: When you’re between a rock and a hard place,
  - type: text
    content: it won’t be a dead end—
  - type: text
    content: 'Because I am '
  - type: text
    content: God
  - type: text
    content: ', your personal God,'
  - type: text
    content: The Holy of Israel, your Savior.
  - type: text
    content: 'I paid a huge price for you:'
  - type: text
    content: all of Egypt, with rich Cush and Seba thrown in!
  - type: text
    content: That’s
  - type: text
    content: ' how much you mean to me!'
  - type: text
    content: That’s
  - type: text
    content: ' how much I love you!'
  - type: text
    content: I’d sell off the whole world to get you back,
  - type: text
    content: trade the creation just for you.
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', your Redeemer,'
  - type: text
    content: 'The Holy of Israel, says:'
  - type: text
    content: “Just for you, I will march on Babylon.
  - type: text
    content: I’ll turn the tables on the Babylonians.
  - type: text
    content: Instead of whooping it up,
  - type: text
    content: they’ll be wailing.
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', your Holy One,'
  - type: text
    content: Creator of Israel, your King.”
  '16':
  - type: text
    content: 'This is what '
  - type: text
    content: God
  - type: text
    content: ' says,'
  - type: text
    content: the God who builds a road right through the ocean,
  - type: text
    content: who carves a path through pounding waves,
  - type: text
    content: The God who summons horses and chariots and armies—
  - type: text
    content: they lie down and then can’t get up;
  - type: text
    content: 'they’re snuffed out like so many candles:'
  - type: text
    content: “Forget about what’s happened;
  - type: text
    content: don’t keep going over old history.
  - type: text
    content: Be alert, be present. I’m about to do something brand-new.
  - type: text
    content: It’s bursting out! Don’t you see it?
  - type: text
    content: There it is! I’m making a road through the desert,
  - type: text
    content: rivers in the badlands.
  - type: text
    content: Wild animals will say ‘Thank you!’
  - type: text
    content: —the coyotes and the buzzards—
  - type: text
    content: Because I provided water in the desert,
  - type: text
    content: rivers through the sunbaked earth,
  - type: text
    content: Drinking water for the people I chose,
  - type: text
    content: the people I made especially for myself,
  - type: text
    content: a people custom-made to praise me.
  '22':
  - type: text
    content: “But you didn’t pay a bit of attention to me, Jacob.
  - type: text
    content: You so quickly tired of me, Israel.
  - type: text
    content: You wouldn’t even bring sheep for offerings in worship.
  - type: text
    content: You couldn’t be bothered with sacrifices.
  - type: text
    content: It wasn’t that I asked that much from you.
  - type: text
    content: I didn’t expect expensive presents.
  - type: text
    content: But you didn’t even do the minimum—
  - type: text
    content: so stingy with me, so closefisted.
  - type: text
    content: Yet you haven’t been stingy with your sins.
  - type: text
    content: You’ve been plenty generous with them—and I’m fed up.
  '25':
  - type: text
    content: “But I, yes I, am the one
  - type: text
    content: who takes care of your sins—that’s what I do.
  - type: text
    content: I don’t keep a list of your sins.
  '26':
  - type: text
    content: “So, make your case against me. Let’s have this out.
  - type: text
    content: Make your arguments. Prove you’re in the right.
  - type: text
    content: Your original ancestor started the sinning,
  - type: text
    content: and everyone since has joined in.
  - type: text
    content: That’s why I had to disqualify the Temple leaders,
  - type: text
    content: repudiate Jacob and discredit Israel.”
  '5':
  - type: text
    content: '“So don’t be afraid: I’m with you.'
  - type: text
    content: I’ll round up all your scattered children,
  - type: text
    content: pull them in from east and west.
  - type: text
    content: 'I’ll send orders north and south:'
  - type: text
    content: ‘Send them back.
  - type: text
    content: Return my sons from distant lands,
  - type: text
    content: my daughters from faraway places.
  - type: text
    content: I want them back, every last one who bears my name,
  - type: text
    content: every man, woman, and child
  - type: text
    content: Whom I created for my glory,
  - type: text
    content: yes, personally formed and made each one.’”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: Get the blind and deaf out here and ready—
  - type: text
    content: the blind (though there’s nothing wrong with their eyes)
  - type: text
    content: and the deaf (though there’s nothing wrong with their ears).
  - type: text
    content: Then get the other nations out here and ready.
  - type: text
    content: Let’s see what they have to say about this,
  - type: text
    content: how they account for what’s happened.
  - type: text
    content: Let them present their expert witnesses
  - type: text
    content: and make their case;
  - type: text
    content: let them try to convince us what they say is true.
  - type: text
    content: '“But '
  - type: text
    content: you
  - type: text
    content: ' are my witnesses.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “You’re my handpicked servant
  - type: text
    content: So that you’ll come to know and trust me,
  - type: text
    content: 'understand both '
  - type: text
    content: that
  - type: text
    content: ' I am and '
  - type: text
    content: who
  - type: text
    content: ' I am.'
  - type: text
    content: Previous to me there was no such thing as a god,
  - type: text
    content: nor will there be after me.
  - type: text
    content: 'I, yes I, am '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I’m the only Savior there is.
  - type: text
    content: I spoke, I saved, I told you what existed
  - type: text
    content: long before these upstart gods appeared on the scene.
  - type: text
    content: And you know it, you’re my witnesses,
  - type: text
    content: 'you’re the evidence.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Yes, I am God.
  - type: text
    content: I’ve always been God
  - type: text
    content: and I always will be God.
  - type: text
    content: No one can take anything from me.
  - type: text
    content: I make; who can unmake it?”
  - type: heading
    content: You Didn’t Even Do the Minimum
