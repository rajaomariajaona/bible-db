document_id: EZK.31,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Funeral of the Big Tree
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the eleventh year, on the first day of the third month, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, tell Pharaoh king of Egypt, that pompous old goat:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Who do you, astride the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: think you really are?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! Assyria was a Big Tree, huge as a Lebanon cedar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beautiful limbs offering cool shade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Skyscraper high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: piercing the clouds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waters gave it drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the primordial deep lifted it high,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gushing out rivers around
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the place where it was planted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then branching out in streams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to all the trees in the forest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was immense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dwarfing all the trees in the forest—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thick boughs, long limbs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roots delving deep into earth’s waters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the birds of the air
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nested in its boughs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the wild animals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave birth under its branches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the mighty nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lived in its shade.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was stunning in its majesty—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the reach of its branches!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the depth of its water-seeking roots!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a cedar in God’s garden came close to it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No pine tree was anything like it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mighty oaks looked like bushes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: growing alongside it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a tree in God’s garden
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was in the same class of beauty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I made it beautiful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a work of art in limbs and leaves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The envy of every tree in Eden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every last tree in God’s garden.’”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says, “‘Because it skyscrapered upward, piercing the clouds, swaggering and proud of its stature, I turned it over to a world-famous leader to call its evil to account. I’d had enough. Outsiders, unbelievably brutal, felled it across the mountain ranges. Its branches were strewn through all the valleys, its leafy boughs clogging all the streams and rivers. Because its shade was gone, everybody walked off. No longer a tree—just a log. On that dead log birds perch. Wild animals burrow under it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘That marks the end of the “big tree” nations. No more trees nourished from the great deep, no more cloud-piercing trees, no more earthborn trees taking over. They’re all slated for death—back to earth, right along with men and women, for whom it’s “dust to dust.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘The Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master: On the day of the funeral of the Big Tree, I threw the great deep into mourning. I stopped the flow of its rivers, held back great seas, and wrapped the Lebanon mountains in black. All the trees of the forest fainted and fell. I made the whole world quake when it crashed, and threw it into the underworld to take its place with all else that gets buried. All the trees of Eden and the finest and best trees of Lebanon, well-watered, were relieved—they had descended to the underworld with it—along with everyone who had lived in its shade and all who had been killed.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘Which of the trees of Eden came anywhere close to you in splendor and size? But you’re slated to be cut down to take your place in the underworld with the trees of Eden, to be a dead log stacked with all the other dead logs, among the other uncircumcised who are dead and buried.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘This means Pharaoh, the pompous old goat.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.’”'
