document_id: EZK.31,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Funeral of the Big Tree
  - type: text
    content: 'In the eleventh year, on the first day of the third month, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, tell Pharaoh king of Egypt, that pompous old goat:'
  - type: text
    content: “‘Who do you, astride the world,
  - type: text
    content: think you really are?
  - type: text
    content: Look! Assyria was a Big Tree, huge as a Lebanon cedar,
  - type: text
    content: beautiful limbs offering cool shade,
  - type: text
    content: Skyscraper high,
  - type: text
    content: piercing the clouds.
  - type: text
    content: The waters gave it drink,
  - type: text
    content: the primordial deep lifted it high,
  - type: text
    content: Gushing out rivers around
  - type: text
    content: the place where it was planted,
  - type: text
    content: And then branching out in streams
  - type: text
    content: to all the trees in the forest.
  - type: text
    content: It was immense,
  - type: text
    content: dwarfing all the trees in the forest—
  - type: text
    content: Thick boughs, long limbs,
  - type: text
    content: roots delving deep into earth’s waters.
  - type: text
    content: All the birds of the air
  - type: text
    content: nested in its boughs.
  - type: text
    content: All the wild animals
  - type: text
    content: gave birth under its branches.
  - type: text
    content: All the mighty nations
  - type: text
    content: lived in its shade.
  - type: text
    content: It was stunning in its majesty—
  - type: text
    content: the reach of its branches!
  - type: text
    content: the depth of its water-seeking roots!
  - type: text
    content: Not a cedar in God’s garden came close to it.
  - type: text
    content: No pine tree was anything like it.
  - type: text
    content: Mighty oaks looked like bushes
  - type: text
    content: growing alongside it.
  - type: text
    content: Not a tree in God’s garden
  - type: text
    content: was in the same class of beauty.
  - type: text
    content: I made it beautiful,
  - type: text
    content: a work of art in limbs and leaves,
  - type: text
    content: The envy of every tree in Eden,
  - type: text
    content: every last tree in God’s garden.’”
  '10':
  - type: text
    content: 'Therefore, '
  - type: text
    content: God
  - type: text
    content: ', the Master, says, “‘Because it skyscrapered upward, piercing the clouds, swaggering and proud of its stature, I turned it over to a world-famous leader to call its evil to account. I’d had enough. Outsiders, unbelievably brutal, felled it across the mountain ranges. Its branches were strewn through all the valleys, its leafy boughs clogging all the streams and rivers. Because its shade was gone, everybody walked off. No longer a tree—just a log. On that dead log birds perch. Wild animals burrow under it.'
  '14':
  - type: text
    content: “‘That marks the end of the “big tree” nations. No more trees nourished from the great deep, no more cloud-piercing trees, no more earthborn trees taking over. They’re all slated for death—back to earth, right along with men and women, for whom it’s “dust to dust.”
  '15':
  - type: text
    content: '“‘The Message of '
  - type: text
    content: God
  - type: text
    content: ', the Master: On the day of the funeral of the Big Tree, I threw the great deep into mourning. I stopped the flow of its rivers, held back great seas, and wrapped the Lebanon mountains in black. All the trees of the forest fainted and fell. I made the whole world quake when it crashed, and threw it into the underworld to take its place with all else that gets buried. All the trees of Eden and the finest and best trees of Lebanon, well-watered, were relieved—they had descended to the underworld with it—along with everyone who had lived in its shade and all who had been killed.'
  '18':
  - type: text
    content: “‘Which of the trees of Eden came anywhere close to you in splendor and size? But you’re slated to be cut down to take your place in the underworld with the trees of Eden, to be a dead log stacked with all the other dead logs, among the other uncircumcised who are dead and buried.
  - type: text
    content: “‘This means Pharaoh, the pompous old goat.
  - type: text
    content: '“‘Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
