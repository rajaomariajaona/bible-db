document_id: JER.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: It’s Doomsday for Philistines
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to the prophet Jeremiah regarding the Philistines just before Pharaoh attacked Gaza. This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look out! Water will rise in the north country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swelling like a river in flood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The torrent will flood the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: washing away city and citizen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Men and women will scream in terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wails from every door and window,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the thunder from the hooves of the horses will be heard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the clatter of chariots, the banging of wheels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fathers, paralyzed by fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t even grab up their babies
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because it will be doomsday for Philistines, one and all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no hope of help for Tyre and Sidon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will finish off the Philistines,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: what’s left of those from the island of Crete.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaza will be shaved bald as an egg,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ashkelon struck dumb as a post.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re on your last legs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you keep flailing?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Oh, Sword of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long will you keep this up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return to your scabbard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Haven’t you had enough? Can’t you call it quits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “But how can it quit
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', command the action?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve ordered it to cut down
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ashkelon and the seacoast.”
