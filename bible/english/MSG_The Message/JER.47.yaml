document_id: JER.47,97
type_code: eng
verses:
  '1':
  - type: heading
    content: It’s Doomsday for Philistines
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to the prophet Jeremiah regarding the Philistines just before Pharaoh attacked Gaza. This is what '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “Look out! Water will rise in the north country,
  - type: text
    content: swelling like a river in flood.
  - type: text
    content: The torrent will flood the land,
  - type: text
    content: washing away city and citizen.
  - type: text
    content: Men and women will scream in terror,
  - type: text
    content: wails from every door and window,
  - type: text
    content: As the thunder from the hooves of the horses will be heard,
  - type: text
    content: the clatter of chariots, the banging of wheels.
  - type: text
    content: Fathers, paralyzed by fear,
  - type: text
    content: won’t even grab up their babies
  - type: text
    content: Because it will be doomsday for Philistines, one and all,
  - type: text
    content: no hope of help for Tyre and Sidon.
  - type: text
    content: God
  - type: text
    content: ' will finish off the Philistines,'
  - type: text
    content: what’s left of those from the island of Crete.
  - type: text
    content: Gaza will be shaved bald as an egg,
  - type: text
    content: Ashkelon struck dumb as a post.
  - type: text
    content: You’re on your last legs.
  - type: text
    content: How long will you keep flailing?
  '6':
  - type: text
    content: '“Oh, Sword of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: how long will you keep this up?
  - type: text
    content: Return to your scabbard.
  - type: text
    content: Haven’t you had enough? Can’t you call it quits?
  '7':
  - type: text
    content: “But how can it quit
  - type: text
    content: 'when I, '
  - type: text
    content: God
  - type: text
    content: ', command the action?'
  - type: text
    content: I’ve ordered it to cut down
  - type: text
    content: Ashkelon and the seacoast.”
