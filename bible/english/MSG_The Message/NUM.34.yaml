document_id: NUM.34,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Land Inheritance
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Command the People of Israel. Tell them, When you enter Canaan, these are the borders of the land you are getting as an inheritance:'
  '10':
  - type: text
    content: “Your eastern border runs on a line from Hazar Enan to Shepham. The border goes south from Shepham to Riblah to the east of Ain, and continues along the slopes east of the Sea of Galilee. The border then follows the Jordan River and ends at the Dead Sea.
  - type: text
    content: “This is your land with its four borders.”
  '13':
  - type: text
    content: 'Moses then commanded the People of Israel: “This is the land: Divide up the inheritance by lot. '
  - type: text
    content: God
  - type: text
    content: ' has ordered it to be given to the nine and a half tribes. The tribe of Reuben, the tribe of Gad, and the half-tribe of Manasseh have already received their inheritance; the two tribes and the half-tribe got their inheritance east of Jordan-Jericho, facing the sunrise.”'
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “These are the men who will be in charge of distributing the inheritance of the land: Eleazar the priest and Joshua son of Nun. Assign one leader from each tribe to help them in distributing the land. Assign these:'
  '19':
  - type: text
    content: ' Caleb son of Jephunneh from the tribe of Judah;'
  - type: text
    content: Shemuel son of Ammihud from the tribe of Simeon;
  - type: text
    content: Elidad son of Kislon from the tribe of Benjamin;
  - type: text
    content: Bukki son of Jogli, leader from the tribe of Dan;
  - type: text
    content: Hanniel son of Ephod, leader from the tribe of Manasseh son of Joseph;
  - type: text
    content: Kemuel son of Shiphtan, leader from the tribe of Ephraim son of Joseph;
  - type: text
    content: Elizaphan son of Parnach, leader from the tribe of Zebulun;
  - type: text
    content: Paltiel son of Azzan, leader from the tribe of Issachar;
  - type: text
    content: Ahihud son of Shelomi, leader from the tribe of Asher;
  - type: text
    content: Pedahel son of Ammihud, leader from the tribe of Naphtali.”
  '29':
  - type: text
    content: 'These are the men '
  - type: text
    content: God
  - type: text
    content: ' commanded to hand out the assignments of land-inheritance to the People of Israel in the country of Canaan.'
  '3':
  - type: text
    content: “Your southern border will take in some of the Wilderness of Zin where it touches Edom. It starts in the east at the Dead Sea, curves south of Scorpion Pass and on to Zin, continues south of Kadesh Barnea, then to Hazar Addar and on to Azmon, where it takes a turn to the northwest to the Brook of Egypt and on to the Mediterranean Sea.
  '6':
  - type: text
    content: “Your western border will be the Mediterranean Sea.
  '7':
  - type: text
    content: “Your northern border runs on a line from the Mediterranean Sea to Mount Hor, and from Mount Hor to Lebo Hamath, connects to Zedad, continues to Ziphron, and ends at Hazar Enan. This is your northern border.
