document_id: NUM.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Land Inheritance
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Command the People of Israel. Tell them, When you enter Canaan, these are the borders of the land you are getting as an inheritance:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: “Your southern border will take in some of the Wilderness of Zin where it touches Edom. It starts in the east at the Dead Sea, curves south of Scorpion Pass and on to Zin, continues south of Kadesh Barnea, then to Hazar Addar and on to Azmon, where it takes a turn to the northwest to the Brook of Egypt and on to the Mediterranean Sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Your western border will be the Mediterranean Sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: “Your northern border runs on a line from the Mediterranean Sea to Mount Hor, and from Mount Hor to Lebo Hamath, connects to Zedad, continues to Ziphron, and ends at Hazar Enan. This is your northern border.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: “Your eastern border runs on a line from Hazar Enan to Shepham. The border goes south from Shepham to Riblah to the east of Ain, and continues along the slopes east of the Sea of Galilee. The border then follows the Jordan River and ends at the Dead Sea.
- type: usfm
  marker: p
  children:
  - type: text
    text: “This is your land with its four borders.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'Moses then commanded the People of Israel: “This is the land: Divide up the inheritance by lot. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has ordered it to be given to the nine and a half tribes. The tribe of Reuben, the tribe of Gad, and the half-tribe of Manasseh have already received their inheritance; the two tribes and the half-tribe got their inheritance east of Jordan-Jericho, facing the sunrise.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19a
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “These are the men who will be in charge of distributing the inheritance of the land: Eleazar the priest and Joshua son of Nun. Assign one leader from each tribe to help them in distributing the land. Assign these:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19b-28
  - type: text
    text: ' Caleb son of Jephunneh from the tribe of Judah;'
- type: usfm
  marker: p
  children:
  - type: text
    text: Shemuel son of Ammihud from the tribe of Simeon;
- type: usfm
  marker: p
  children:
  - type: text
    text: Elidad son of Kislon from the tribe of Benjamin;
- type: usfm
  marker: p
  children:
  - type: text
    text: Bukki son of Jogli, leader from the tribe of Dan;
- type: usfm
  marker: p
  children:
  - type: text
    text: Hanniel son of Ephod, leader from the tribe of Manasseh son of Joseph;
- type: usfm
  marker: p
  children:
  - type: text
    text: Kemuel son of Shiphtan, leader from the tribe of Ephraim son of Joseph;
- type: usfm
  marker: p
  children:
  - type: text
    text: Elizaphan son of Parnach, leader from the tribe of Zebulun;
- type: usfm
  marker: p
  children:
  - type: text
    text: Paltiel son of Azzan, leader from the tribe of Issachar;
- type: usfm
  marker: p
  children:
  - type: text
    text: Ahihud son of Shelomi, leader from the tribe of Asher;
- type: usfm
  marker: p
  children:
  - type: text
    text: Pedahel son of Ammihud, leader from the tribe of Naphtali.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These are the men '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded to hand out the assignments of land-inheritance to the People of Israel in the country of Canaan.'
