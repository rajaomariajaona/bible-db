document_id: PSA.114
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-8
  - type: text
    text: After Israel left Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the clan of Jacob left those barbarians behind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah became holy land for him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel the place of holy rule.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sea took one look and ran the other way;
- type: usfm
  marker: q2
  children:
  - type: text
    text: River Jordan turned around and ran off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mountains turned playful and skipped like rams,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hills frolicked like spring lambs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s wrong with you, Sea, that you ran away?
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you, River Jordan, that you turned and ran off?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And mountains, why did you skip like rams?
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you, hills, frolic like spring lambs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremble, Earth! You’re in the Lord’s presence!
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the presence of Jacob’s God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turned the rock into a pool of cool water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turned flint into fresh spring water.
