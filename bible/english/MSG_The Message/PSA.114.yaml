document_id: PSA.114,97
type_code: eng
verses:
  '1':
  - type: text
    content: After Israel left Egypt,
  - type: text
    content: the clan of Jacob left those barbarians behind;
  - type: text
    content: Judah became holy land for him,
  - type: text
    content: Israel the place of holy rule.
  - type: text
    content: Sea took one look and ran the other way;
  - type: text
    content: River Jordan turned around and ran off.
  - type: text
    content: The mountains turned playful and skipped like rams,
  - type: text
    content: the hills frolicked like spring lambs.
  - type: text
    content: What’s wrong with you, Sea, that you ran away?
  - type: text
    content: and you, River Jordan, that you turned and ran off?
  - type: text
    content: And mountains, why did you skip like rams?
  - type: text
    content: and you, hills, frolic like spring lambs?
  - type: text
    content: Tremble, Earth! You’re in the Lord’s presence!
  - type: text
    content: in the presence of Jacob’s God.
  - type: text
    content: He turned the rock into a pool of cool water,
  - type: text
    content: turned flint into fresh spring water.
