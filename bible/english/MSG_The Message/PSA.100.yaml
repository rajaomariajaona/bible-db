  - type: text
    content: 'On your feet now—applaud '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Bring a gift of laughter,
  - type: text
    content: sing yourselves into his presence.
  '3':
  - type: text
    content: 'Know this: '
  - type: text
    content: 'God '
  - type: text
    content: 'is God, and God, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He made us; we didn’t make him.
  - type: text
    content: We’re his people, his well-tended sheep.
  '4':
  - type: text
    content: 'Enter with the password: “Thank you!”'
  - type: text
    content: Make yourselves at home, talking praise.
  - type: text
    content: Thank him. Worship him.
  '5':
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' is sheer beauty,'
  - type: text
    content: all-generous in love,
  - type: text
