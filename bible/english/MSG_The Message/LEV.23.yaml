document_id: LEV.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Feasts
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell the People of Israel, These are my appointed feasts, the appointed feasts of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' which you are to decree as sacred assemblies.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-21
    - type: text
      text: '“Count seven full weeks from the morning after the Sabbath when you brought the sheaf as a Wave-Offering, fifty days until the morning of the seventh Sabbath. Then present a new Grain-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Bring from wherever you are living two loaves of bread made from four quarts of fine flour and baked with yeast as a Wave-Offering of the first ripe grain to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. In addition to the bread, offer seven yearling male lambs without defect, plus one bull and two rams. They will be a Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' together with their Grain-Offerings and Drink-Offerings—offered as Fire-Gifts, a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Offer one male goat for an Absolution-Offering and two yearling lambs for a Peace-Offering. The priest will wave the two lambs before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as a Wave-Offering, together with the bread of the first ripe grain. They are sacred offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for the priest. Proclaim the day as a sacred assembly. Don’t do any ordinary work. It is a perpetual decree wherever you live down through your generations.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“When you reap the harvest of your land, don’t reap the corners of your field or gather the gleanings. Leave them for the poor and the foreigners. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “Tell the People of Israel, On the first day of the seventh month, set aside a day of rest, a sacred assembly—mark it with loud blasts on the ram’s horn. Don’t do any ordinary work. Offer a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-32
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “The tenth day of the seventh month is the Day of Atonement. Hold a sacred assembly, fast, and offer a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Don’t work on that day because it is a day of atonement to make atonement for you before your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Anyone who doesn’t fast on that day must be cut off from his people. I will destroy from among his people anyone who works on that day. Don’t do any work that day—none. This is a perpetual decree for all the generations to come, wherever you happen to be living. It is a Sabbath of complete and total rest, a fast day. Observe your Sabbath from the evening of the ninth day of the month until the following evening.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Work six days. The seventh day is a Sabbath, a day of total and complete rest, a sacred assembly. Don’t do any work. Wherever you live, it is a Sabbath to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-36
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses: “Tell the People of Israel, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Feast of Booths begins on the fifteenth day of the seventh month. It lasts seven days. The first day is a sacred assembly; don’t do any ordinary work. Offer Fire-Gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for seven days. On the eighth day hold a sacred assembly and offer a gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . It is a solemn convocation. Don’t do any ordinary work.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-38
    - type: text
      text: '“These are the appointed feasts of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' which you will decree as sacred assemblies for presenting Fire-Gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': the Whole-Burnt-Offerings, Grain-Offerings, sacrifices, and Drink-Offerings assigned to each day. These are in addition to offerings for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Sabbaths and also in addition to other gifts connected with whatever you have vowed and all the Freewill-Offerings you give to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-43
    - type: text
      text: '“So, summing up: On the fifteenth day of the seventh month, after you have brought your crops in from your fields, celebrate the Feast of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for seven days. The first day is a complete rest and the eighth day is a complete rest. On the first day, pick the best fruit from the best trees; take fronds of palm trees and branches of leafy trees and from willows by the brook and celebrate in the presence of your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for seven days—yes, for seven full days celebrate it as a festival to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Every year from now on, celebrate it in the seventh month. Live in booths for seven days—every son and daughter of Israel is to move into booths so that your descendants will know that I made the People of Israel live in booths when I brought them out of the land of Egypt. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“These are the appointed feasts of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the sacred assemblies which you are to announce at the times set for them:'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Moses posted the calendar for the annual appointed feasts of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' which Israel was to celebrate.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Passover, beginning at sundown on the fourteenth day of the first month.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Feast of Unraised Bread, on the fifteenth day of this same month. You are to eat unraised bread for seven days. Hold a sacred assembly on the first day; don’t do any regular work. Offer Fire-Gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for seven days. On the seventh day hold a sacred assembly; don’t do any regular work.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-14
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell the People of Israel, When you arrive at the land that I am giving you and reap its harvest, bring to the priest a sheaf of the first grain that you harvest. He will wave the sheaf before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for acceptance on your behalf; on the morning after Sabbath, the priest will wave it. On the same day that you wave the sheaf, offer a year-old male lamb without defect for a Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and with it the Grain-Offering of four quarts of fine flour mixed with oil—a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', a pleasing fragrance—and also a Drink-Offering of a quart of wine. Don’t eat any bread or roasted or fresh grain until you have presented this offering to your God. This is a perpetual decree for all your generations to come, wherever you live.'
