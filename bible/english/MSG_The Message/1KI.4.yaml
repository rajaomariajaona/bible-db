document_id: 1KI.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' King Solomon was off to a good start ruling Israel.'
  - type: text
    content: 'These were the leaders in his government:'
  '2':
  - type: text
    content: ' Azariah son of Zadok—the priest;'
  - type: text
    content: Elihoreph and Ahijah, sons of Shisha—secretaries;
  - type: text
    content: Jehoshaphat son of Ahilud—historian;
  - type: text
    content: Benaiah son of Jehoiada—commander of the army;
  - type: text
    content: Zadok and Abiathar—priests;
  - type: text
    content: Azariah son of Nathan—in charge of the regional managers;
  - type: text
    content: Zabud son of Nathan—priest and friend to the king;
  - type: text
    content: Ahishar—manager of the palace;
  - type: text
    content: Adoniram son of Abda—manager of the slave labor.
  '20':
  - type: text
    content: Judah and Israel were densely populated—like sand on an ocean beach! All their needs were met; they ate and drank and were happy. Solomon was sovereign over all the kingdoms from the River Euphrates in the east to the country of the Philistines in the west, all the way to the border of Egypt. They brought tribute and were vassals of Solomon all his life.
  '22':
  - type: text
    content: 'One day’s food supply for Solomon’s household was:'
  - type: text
    content: 185 bushels of fine flour
  - type: text
    content: 375 bushels of meal
  - type: text
    content: 10 grain-fed cattle
  - type: text
    content: 20 range cattle
  - type: text
    content: 100 sheep
  - type: text
    content: and miscellaneous deer, gazelles, roebucks, and choice fowl.
  '24':
  - type: text
    content: Solomon was sovereign over everything, countries and kings, west of the River Euphrates from Tiphsah to Gaza. Peace reigned everywhere. Throughout Solomon’s life, everyone in Israel and Judah lived safe and sound, all of them from Dan in the north to Beersheba in the south—content with what they had.
  '26':
  - type: text
    content: Solomon had forty thousand stalls for chariot horses and twelve thousand horsemen. The district managers, each according to his assigned month, delivered food supplies for King Solomon and all who sat at the king’s table; there was always plenty. They also brought to the designated place their assigned quota of barley and straw for the horses.
  '29':
  - type: text
    content: God gave Solomon wisdom—the deepest of understanding and the largest of hearts. There was nothing beyond him, nothing he couldn’t handle. Solomon’s wisdom outclassed the vaunted wisdom of wise men of the East, outshone the famous wisdom of Egypt. He was wiser than anyone—wiser than Ethan the Ezrahite, wiser than Heman, wiser than Calcol and Darda the sons of Mahol. He became famous among all the surrounding nations. He created 3,000 proverbs; his songs added up to 1,005. He knew all about plants, from the huge cedar that grows in Lebanon to the tiny hyssop that grows in the cracks of a wall. He understood everything about animals and birds, reptiles and fish. Sent by kings from all over the earth who had heard of his reputation, people came from far and near to listen to the wisdom of Solomon.
  '7':
  - type: text
    content: 'Solomon had twelve regional managers distributed throughout Israel. They were responsible for supplying provisions for the king and his administration. Each was in charge of bringing supplies for one month of the year. These are the names:'
  - type: text
    content: Ben-Hur in the Ephraim hills;
  - type: text
    content: Ben-Deker in Makaz, Shaalbim, Beth Shemesh, and Elon Bethhanan;
  - type: text
    content: Ben-Hesed in Arubboth—this included Socoh and all of Hepher;
  - type: text
    content: Ben-Abinadab in Naphoth Dor (he was married to Solomon’s daughter Taphath);
  - type: text
    content: Baana son of Ahilud in Taanach and Megiddo, all of Beth Shan next to Zarethan below Jezreel, and from Beth Shan to Abel Meholah over to Jokmeam;
  - type: text
    content: Ben-Geber in Ramoth Gilead—this included the villages of Jair son of Manasseh in Gilead and the region of Argob in Bashan with its sixty large walled cities with bronze-studded gates;
  - type: text
    content: Ahinadab son of Iddo in Mahanaim;
  - type: text
    content: Ahimaaz in Naphtali (he was married to Solomon’s daughter Basemath);
  - type: text
    content: Baana son of Hushai in Asher and Aloth;
  - type: text
    content: Jehoshaphat son of Paruah in Issachar;
  - type: text
    content: Shimei son of Ela in Benjamin;
  - type: text
    content: Geber son of Uri in Gilead—this was the country of Sihon king of the Amorites and also of Og king of Bashan; he managed the whole district by himself.
  - type: heading
    content: Solomon’s Prosperity
