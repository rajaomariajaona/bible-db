document_id: 1KI.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' King Solomon was off to a good start ruling Israel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These were the leaders in his government:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-6
  - type: text
    text: ' Azariah son of Zadok—the priest;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elihoreph and Ahijah, sons of Shisha—secretaries;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoshaphat son of Ahilud—historian;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Benaiah son of Jehoiada—commander of the army;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zadok and Abiathar—priests;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Azariah son of Nathan—in charge of the regional managers;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zabud son of Nathan—priest and friend to the king;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahishar—manager of the palace;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Adoniram son of Abda—manager of the slave labor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-19
  - type: text
    text: 'Solomon had twelve regional managers distributed throughout Israel. They were responsible for supplying provisions for the king and his administration. Each was in charge of bringing supplies for one month of the year. These are the names:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-Hur in the Ephraim hills;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-Deker in Makaz, Shaalbim, Beth Shemesh, and Elon Bethhanan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-Hesed in Arubboth—this included Socoh and all of Hepher;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-Abinadab in Naphoth Dor (he was married to Solomon’s daughter Taphath);
- type: usfm
  marker: li1
  children:
  - type: text
    text: Baana son of Ahilud in Taanach and Megiddo, all of Beth Shan next to Zarethan below Jezreel, and from Beth Shan to Abel Meholah over to Jokmeam;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-Geber in Ramoth Gilead—this included the villages of Jair son of Manasseh in Gilead and the region of Argob in Bashan with its sixty large walled cities with bronze-studded gates;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahinadab son of Iddo in Mahanaim;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahimaaz in Naphtali (he was married to Solomon’s daughter Basemath);
- type: usfm
  marker: li1
  children:
  - type: text
    text: Baana son of Hushai in Asher and Aloth;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoshaphat son of Paruah in Issachar;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shimei son of Ela in Benjamin;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Geber son of Uri in Gilead—this was the country of Sihon king of the Amorites and also of Og king of Bashan; he managed the whole district by himself.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Prosperity
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Judah and Israel were densely populated—like sand on an ocean beach! All their needs were met; they ate and drank and were happy. Solomon was sovereign over all the kingdoms from the River Euphrates in the east to the country of the Philistines in the west, all the way to the border of Egypt. They brought tribute and were vassals of Solomon all his life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'One day’s food supply for Solomon’s household was:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 185 bushels of fine flour
- type: usfm
  marker: li1
  children:
  - type: text
    text: 375 bushels of meal
- type: usfm
  marker: li1
  children:
  - type: text
    text: 10 grain-fed cattle
- type: usfm
  marker: li1
  children:
  - type: text
    text: 20 range cattle
- type: usfm
  marker: li1
  children:
  - type: text
    text: 100 sheep
- type: usfm
  marker: li1
  children:
  - type: text
    text: and miscellaneous deer, gazelles, roebucks, and choice fowl.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: Solomon was sovereign over everything, countries and kings, west of the River Euphrates from Tiphsah to Gaza. Peace reigned everywhere. Throughout Solomon’s life, everyone in Israel and Judah lived safe and sound, all of them from Dan in the north to Beersheba in the south—content with what they had.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: Solomon had forty thousand stalls for chariot horses and twelve thousand horsemen. The district managers, each according to his assigned month, delivered food supplies for King Solomon and all who sat at the king’s table; there was always plenty. They also brought to the designated place their assigned quota of barley and straw for the horses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-34
  - type: text
    text: God gave Solomon wisdom—the deepest of understanding and the largest of hearts. There was nothing beyond him, nothing he couldn’t handle. Solomon’s wisdom outclassed the vaunted wisdom of wise men of the East, outshone the famous wisdom of Egypt. He was wiser than anyone—wiser than Ethan the Ezrahite, wiser than Heman, wiser than Calcol and Darda the sons of Mahol. He became famous among all the surrounding nations. He created 3,000 proverbs; his songs added up to 1,005. He knew all about plants, from the huge cedar that grows in Lebanon to the tiny hyssop that grows in the cracks of a wall. He understood everything about animals and birds, reptiles and fish. Sent by kings from all over the earth who had heard of his reputation, people came from far and near to listen to the wisdom of Solomon.
