document_id: 1SA.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Looks into the Heart'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' addressed Samuel: “So, how long are you going to mope over Saul? You know I’ve rejected him as king over Israel. Fill your flask with anointing oil and get going. I’m sending you to Jesse of Bethlehem. I’ve spotted the very king I want among his sons.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jesse presented his seven sons to Samuel. Samuel was blunt with Jesse, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hasn’t chosen any of these.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then he asked Jesse, “Is this it? Are there no more sons?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well, yes, there’s the runt. But he’s out tending the sheep.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel ordered Jesse, “Go get him. We’re not moving from this spot until he’s here.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jesse sent for him. He was brought in, the very picture of health—bright-eyed, good-looking.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Up on your feet! Anoint him! This is the one.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Samuel took his flask of oil and anointed him, with his brothers standing around watching. The Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' entered David like a rush of wind, God vitally empowering him for the rest of his life.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel left and went home to Ramah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David—An Excellent Musician
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'At that very moment the Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' left Saul and in its place a black mood sent by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' settled on him. He was terrified.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: Saul’s advisors said, “This awful tormenting depression from God is making your life miserable. O Master, let us help. Let us look for someone who can play the harp. When the black mood from God moves in, he’ll play his music and you’ll feel better.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Saul told his servants, “Go ahead. Find me someone who can play well and bring him to me.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'One of the young men spoke up, “I know someone. I’ve seen him myself: the son of Jesse of Bethlehem, an excellent musician. He’s also courageous, of age, well-spoken, and good-looking. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is with him.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So Saul sent messengers to Jesse requesting, “Send your son David to me, the one who tends the sheep.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: “I can’t do that,” said Samuel. “Saul will hear about it and kill me.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Take a heifer with you and announce, ‘I’ve come to lead you in worship of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', with this heifer as a sacrifice.’ Make sure Jesse gets invited. I’ll let you know what to do next. I’ll point out the one you are to anoint.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: Jesse took a donkey, loaded it with a couple of loaves of bread, a flask of wine, and a young goat, and sent his son David with it to Saul. David came to Saul and stood before him. Saul liked him immediately and made him his right-hand man.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Saul sent word back to Jesse: “Thank you. David will stay here. He’s just the one I was looking for. I’m very impressed by him.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: After that, whenever the bad depression from God tormented Saul, David got out his harp and played. That would calm Saul down, and he would feel better as the moodiness lifted.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Samuel did what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told him. When he arrived at Bethlehem, the town fathers greeted him, but apprehensively. “Is there something wrong?”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Nothing’s wrong. I’ve come to sacrifice this heifer and lead you in the worship of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Prepare yourselves, be consecrated, and join me in worship.” He made sure Jesse and his sons were also consecrated and called to worship.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When they arrived, Samuel took one look at Eliab and thought, “Here he is! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s anointed!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told Samuel, “Looks aren’t everything. Don’t be impressed with his looks and stature. I’ve already eliminated him. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' judges persons differently than humans do. Men and women look at the face; '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' looks into the heart.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jesse then called up Abinadab and presented him to Samuel. Samuel said, “This man isn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s choice either.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Next Jesse presented Shammah. Samuel said, “No, this man isn’t either.”
