document_id: 1SA.16,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Looks into the Heart
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' addressed Samuel: “So, how long are you going to mope over Saul? You know I’ve rejected him as king over Israel. Fill your flask with anointing oil and get going. I’m sending you to Jesse of Bethlehem. I’ve spotted the very king I want among his sons.”'
  '10':
  - type: text
    content: Jesse presented his seven sons to Samuel. Samuel was blunt with Jesse, “
  - type: text
    content: God
  - type: text
    content: ' hasn’t chosen any of these.”'
  '11':
  - type: text
    content: Then he asked Jesse, “Is this it? Are there no more sons?”
  - type: text
    content: “Well, yes, there’s the runt. But he’s out tending the sheep.”
  - type: text
    content: Samuel ordered Jesse, “Go get him. We’re not moving from this spot until he’s here.”
  '12':
  - type: text
    content: Jesse sent for him. He was brought in, the very picture of health—bright-eyed, good-looking.
  - type: text
    content: God
  - type: text
    content: ' said, “Up on your feet! Anoint him! This is the one.”'
  '13':
  - type: text
    content: 'Samuel took his flask of oil and anointed him, with his brothers standing around watching. The Spirit of '
  - type: text
    content: God
  - type: text
    content: ' entered David like a rush of wind, God vitally empowering him for the rest of his life.'
  - type: text
    content: Samuel left and went home to Ramah.
  - type: heading
    content: David—An Excellent Musician
  '14':
  - type: text
    content: 'At that very moment the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' left Saul and in its place a black mood sent by '
  - type: text
    content: God
  - type: text
    content: ' settled on him. He was terrified.'
  '15':
  - type: text
    content: Saul’s advisors said, “This awful tormenting depression from God is making your life miserable. O Master, let us help. Let us look for someone who can play the harp. When the black mood from God moves in, he’ll play his music and you’ll feel better.”
  '17':
  - type: text
    content: Saul told his servants, “Go ahead. Find me someone who can play well and bring him to me.”
  '18':
  - type: text
    content: 'One of the young men spoke up, “I know someone. I’ve seen him myself: the son of Jesse of Bethlehem, an excellent musician. He’s also courageous, of age, well-spoken, and good-looking. And '
  - type: text
    content: God
  - type: text
    content: ' is with him.”'
  '19':
  - type: text
    content: So Saul sent messengers to Jesse requesting, “Send your son David to me, the one who tends the sheep.”
  '2':
  - type: text
    content: “I can’t do that,” said Samuel. “Saul will hear about it and kill me.”
  - type: text
    content: God
  - type: text
    content: ' said, “Take a heifer with you and announce, ‘I’ve come to lead you in worship of '
  - type: text
    content: God
  - type: text
    content: ', with this heifer as a sacrifice.’ Make sure Jesse gets invited. I’ll let you know what to do next. I’ll point out the one you are to anoint.”'
  '20':
  - type: text
    content: Jesse took a donkey, loaded it with a couple of loaves of bread, a flask of wine, and a young goat, and sent his son David with it to Saul. David came to Saul and stood before him. Saul liked him immediately and made him his right-hand man.
  '22':
  - type: text
    content: 'Saul sent word back to Jesse: “Thank you. David will stay here. He’s just the one I was looking for. I’m very impressed by him.”'
  '23':
  - type: text
    content: After that, whenever the bad depression from God tormented Saul, David got out his harp and played. That would calm Saul down, and he would feel better as the moodiness lifted.
  '4':
  - type: text
    content: 'Samuel did what '
  - type: text
    content: God
  - type: text
    content: ' told him. When he arrived at Bethlehem, the town fathers greeted him, but apprehensively. “Is there something wrong?”'
  '5':
  - type: text
    content: '“Nothing’s wrong. I’ve come to sacrifice this heifer and lead you in the worship of '
  - type: text
    content: God
  - type: text
    content: . Prepare yourselves, be consecrated, and join me in worship.” He made sure Jesse and his sons were also consecrated and called to worship.
  '6':
  - type: text
    content: 'When they arrived, Samuel took one look at Eliab and thought, “Here he is! '
  - type: text
    content: God
  - type: text
    content: ’s anointed!”
  '7':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' told Samuel, “Looks aren’t everything. Don’t be impressed with his looks and stature. I’ve already eliminated him. '
  - type: text
    content: God
  - type: text
    content: ' judges persons differently than humans do. Men and women look at the face; '
  - type: text
    content: God
  - type: text
    content: ' looks into the heart.”'
  '8':
  - type: text
    content: 'Jesse then called up Abinadab and presented him to Samuel. Samuel said, “This man isn’t '
  - type: text
    content: God
  - type: text
    content: ’s choice either.”
  '9':
  - type: text
    content: Next Jesse presented Shammah. Samuel said, “No, this man isn’t either.”
