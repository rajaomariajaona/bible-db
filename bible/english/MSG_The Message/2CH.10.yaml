document_id: 2CH.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: King Rehoboam
  - type: text
    content: Rehoboam traveled to Shechem where all Israel had gathered to inaugurate him as king. Jeroboam was then in Egypt, where he had taken asylum from King Solomon; when he got the report of Solomon’s death, he came back.
  '10':
  - type: text
    content: 'The young turks he’d grown up with said, “These people who complain, ‘Your father was too hard on us; lighten up’—well, tell them this: ‘My little finger is thicker than my father’s waist. If you think life under my father was hard, you haven’t seen the half of it. My father thrashed you with whips; I’ll beat you bloody with chains!’”'
  '12':
  - type: text
    content: 'Three days later Jeroboam and the people showed up, just as Rehoboam had directed when he said, “Give me three days to think it over; then come back.” The king’s answer was harsh and rude. He spurned the counsel of the elders and went with the advice of the younger set: “If you think life under my father was hard, you haven’t seen the half of it: my father thrashed you with whips; I’ll beat you bloody with chains!”'
  '15':
  - type: text
    content: Rehoboam turned a deaf ear to the people. God was behind all this, confirming the message that he had given to Jeroboam son of Nebat through Ahijah of Shiloh.
  '16':
  - type: text
    content: When all Israel realized that the king hadn’t listened to a word they’d said, they stood up to him and said,
  - type: text
    content: Get lost, David!
  - type: text
    content: We’ve had it with you, son of Jesse!
  - type: text
    content: Let’s get out of here, Israel, and fast!
  - type: text
    content: From now on, David, mind your own business.
  - type: text
    content: And with that they left. Rehoboam continued to rule only those who lived in the towns of Judah.
  '18':
  - type: text
    content: When King Rehoboam next sent out Adoniram, head of the workforce, the Israelites ganged up on him, pelted him with stones, and killed him. King Rehoboam jumped in his chariot and escaped to Jerusalem as fast as he could. Israel has been in rebellion against the Davidic dynasty ever since.
  '3':
  - type: text
    content: Summoned by Israel, Jeroboam and all Israel went to Rehoboam and said, “Your father made life hard for us—worked our fingers to the bone. Give us a break; lighten up on us and we’ll willingly serve you.”
  '5':
  - type: text
    content: “Give me,” said Rehoboam, “three days to think it over; then come back.” So the people left.
  '6':
  - type: text
    content: 'King Rehoboam talked it over with the elders who had advised his father when he was alive: “What’s your counsel? How do you suggest that I answer the people?”'
  '7':
  - type: text
    content: They said, “If you will be a servant to this people, be considerate of their needs and respond with compassion, work things out with them, they’ll end up doing anything for you.”
  '8':
  - type: text
    content: But he rejected the counsel of the elders and asked the young men he’d grown up with who were now currying his favor, “What do you think? What should I say to these people who are saying, ‘Give us a break from your father’s harsh ways—lighten up on us’?”
