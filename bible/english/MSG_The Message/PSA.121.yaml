verses:
  '1':
  - type: text
    content: I look up to the mountains;
  - type: text
    content: does my strength come from mountains?
  - type: text
    content: 'No, my strength comes from '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: who made heaven, and earth, and mountains.
  '3':
  - type: text
    content: He won’t let you stumble,
  - type: text
    content: your Guardian God won’t fall asleep.
  - type: text
    content: Not on your life! Israel’s
  - type: text
    content: Guardian will never doze or sleep.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s your Guardian,
  - type: text
    content: right at your side to protect you—
  - type: text
    content: Shielding you from sunstroke,
  - type: text
    content: sheltering you from moonstroke.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' guards you from every evil,'
  - type: text
    content: he guards your very life.
  - type: text
    content: He guards you when you leave and when you return,
  - type: text
    content: he guards you now, he guards you always.
