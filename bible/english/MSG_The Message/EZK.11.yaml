document_id: EZK.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Heart and a New Spirit
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the Spirit picked me up and took me to the gate of the Temple that faces east. There were twenty-five men standing at the gate. I recognized the leaders, Jaazaniah son of Azzur and Pelatiah son of Benaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Son of man, these are the men who draw up blueprints for sin, who think up new programs for evil in this city. They say, ‘We can make anything happen here. We’re the best. We’re the choice pieces of meat in the soup pot.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Oppose them, son of man. Preach against them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Then the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came upon me and told me what to say: “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says: ‘That’s a fine public speech, Israel, but I know what you are thinking. You’ve murdered a lot of people in this city. The streets are piled high with corpses.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-12
  - type: text
    text: '“Therefore this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: ‘The corpses that you’ve piled in the streets are the meat and this city is the soup pot, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you’re
  - type: text
    text: ' not even in the pot! I’m throwing you out! You fear war, but war is what you’re going to get. I’m bringing war against you. I’m throwing you out of this city, giving you over to foreigners, and punishing you good. You’ll be killed in battle. I’ll carry out judgment on you at the borders of Israel. Then you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. This city will not be your soup pot and you won’t be the choice pieces of meat in it either. Hardly. I will carry out judgment on you at the borders of Israel and you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', for you haven’t followed my statutes and ordinances. Instead of following my ways, you’ve sunk to the level of the laws of the nations around you.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Even while I was preaching, Pelatiah son of Benaiah died. I fell down, face to the ground, and prayed loudly, “O Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Will you completely wipe out what’s left of Israel?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'The answer from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came back: “Son of man, your brothers—I mean the whole people of Israel who are in exile with you—are the people of whom the citizens of Jerusalem are saying, ‘They’re in the far country, far from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . This land has been given to us to own.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-20
  - type: text
    text: '“Well, tell them this, ‘This is your Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. True, I sent you to the far country and scattered you through other lands. All the same, I’ve provided you a temporary sanctuary in the countries where you’ve gone. I will gather you back from those countries and lands where you’ve been scattered and give you back the land of Israel. You’ll come back and clean house, throw out all the rotten images and obscene idols. I’ll give you a new heart. I’ll put a new spirit in you. I’ll cut out your stone heart and replace it with a red-blooded, firm-muscled heart. Then you’ll obey my statutes and be careful to obey my commands. You’ll be my people! I’ll be your God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“‘But not those who are self-willed and addicted to their rotten images and obscene idols! I’ll see that they’re paid in full for what they’ve done.’ Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'Then the cherubim spread their wings, with the wheels beside them and the Glory of the God of Israel hovering over them. The Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' ascended from within the city and rested on the mountain to the east of the city.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'Then, still in the vision given me by the Spirit of God, the Spirit took me and carried me back to the exiles in Babylon. And then the vision left me. I told the exiles everything that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had shown me.'
