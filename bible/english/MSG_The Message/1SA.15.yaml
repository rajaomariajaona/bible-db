document_id: 1SA.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Samuel said to Saul, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent me to anoint you king over his people, Israel. Now, listen again to what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says. This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies speaking:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Samuel: “I’m sorry I ever made Saul king. He’s turned his back on me. He refuses to do what I tell him.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Samuel was angry when he heard this. He prayed his anger and disappointment all through the night. He got up early in the morning to confront Saul but was told, “Saul’s gone. He went to Carmel to set up a victory monument in his own honor, and then was headed for Gilgal.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By the time Samuel caught up with him, Saul had just finished an act of worship, having used Amalekite plunder for the burnt offerings sacrificed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Samuel came close, Saul called out, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s blessings on you! I accomplished '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s plan to the letter!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel said, “So what’s this I’m hearing—this bleating of sheep, this mooing of cattle?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Only some Amalekite loot,” said Saul. “The soldiers saved back a few of the choice cattle and sheep to offer up in sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . But everything else we destroyed under the holy ban.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Enough!” interrupted Samuel. “Let me tell you what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me last night.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “Go ahead. Tell me.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samuel told him. “When you started out in this, you were nothing—and you knew it. Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put you at the head of Israel—made you king over Israel. Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent you off to do a job for him, ordering you, ‘Go and put those sinners, the Amalekites, under a holy ban. Go to war against them until you have totally wiped them out.’ So why did you not obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '? Why did you grab all this loot? Why, with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s eyes on you all the time, did you brazenly carry out this evil?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “‘I’m about to get even with Amalek for ambushing Israel when Israel came up out of Egypt. Here’s what you are to do: Go to war against Amalek. Put everything connected with Amalek under a holy ban. And no exceptions! This is to be total destruction—men and women, children and infants, cattle and sheep, camels and donkeys—the works.’”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul defended himself. “What are you talking about? I did obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. I did the job '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' set for me. I brought in King Agag and destroyed the Amalekites under the terms of the holy ban. So the soldiers saved back a few choice sheep and cattle from the holy ban for sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at Gilgal—what’s wrong with that?”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do you think all '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' wants are sacrifices—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: empty rituals just for show?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He wants you to listen to him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plain listening is the thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not staging a lavish religious production.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Not doing what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' tells you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is far worse than fooling around in the occult.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Getting self-important around '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is far worse than making deals with your dead ancestors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because you said No to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s command,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he says No to your kingship.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul gave in and confessed, “I’ve sinned. I’ve trampled roughshod over '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word and your instructions. I cared more about pleasing the people. I let them tell me what to do. Oh, absolve me of my sin! Take my hand and lead me to the altar so I can worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel refused: “No, I can’t come alongside you in this. You rejected '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s command. Now '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has rejected you as king over Israel.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Samuel turned to leave, Saul grabbed at his priestly robe and a piece tore off. Samuel said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has just now torn the kingdom from you, and handed it over to your neighbor, a better man than you are. Israel’s God-of-Glory doesn’t deceive and he doesn’t dither. He says what he means and means what he says.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul tried again, “I have sinned. But don’t abandon me! Support me with your presence before the leaders and the people. Come alongside me as I go back to worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel did. He went back with him. And Saul dropped to his knees before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and worshiped.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said, “Present King Agag of Amalek to me.” Agag came, dragging his feet, muttering that he’d be better off dead.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said, “Just as your sword made many a woman childless, so your mother will be childless among those women!” And Samuel cut Agag down in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' right there in Gilgal.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel left immediately for Ramah and Saul went home to Gibeah. Samuel had nothing to do with Saul from then on, though he grieved long and deeply over him. But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was sorry he had ever made Saul king in the first place.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul called the army together at Telaim and prepared them to go to war—two hundred companies of infantry from Israel and another ten companies from Judah. Saul marched to Amalek City and hid in the canyon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul got word to the Kenites: “Get out of here while you can. Evacuate the city right now or you’ll get lumped in with the Amalekites. I’m warning you because you showed real kindness to the Israelites when they came up out of Egypt.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they did. The Kenites evacuated the place.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul went after Amalek, from the canyon all the way to Shur near the Egyptian border. He captured Agag, king of Amalek, alive. Everyone else was killed under the terms of the holy ban. Saul and the army made an exception for Agag, and for the choice sheep and cattle. They didn’t include them under the terms of the holy ban. But all the rest, which nobody wanted anyway, they destroyed as decreed by the holy ban.
