document_id: 1SA.15,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Samuel said to Saul, “'
  - type: text
    content: God
  - type: text
    content: ' sent me to anoint you king over his people, Israel. Now, listen again to what '
  - type: text
    content: God
  - type: text
    content: ' says. This is the '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaking:'
  '10':
  - type: text
    content: ' Then '
  - type: text
    content: God
  - type: text
    content: ' spoke to Samuel: “I’m sorry I ever made Saul king. He’s turned his back on me. He refuses to do what I tell him.”'
  '11':
  - type: text
    content: ' Samuel was angry when he heard this. He prayed his anger and disappointment all through the night. He got up early in the morning to confront Saul but was told, “Saul’s gone. He went to Carmel to set up a victory monument in his own honor, and then was headed for Gilgal.”'
  - type: text
    content: 'By the time Samuel caught up with him, Saul had just finished an act of worship, having used Amalekite plunder for the burnt offerings sacrificed to '
  - type: text
    content: God
  - type: text
    content: .
  '13':
  - type: text
    content: As Samuel came close, Saul called out, “
  - type: text
    content: God
  - type: text
    content: '’s blessings on you! I accomplished '
  - type: text
    content: God
  - type: text
    content: ’s plan to the letter!”
  '14':
  - type: text
    content: Samuel said, “So what’s this I’m hearing—this bleating of sheep, this mooing of cattle?”
  '15':
  - type: text
    content: '“Only some Amalekite loot,” said Saul. “The soldiers saved back a few of the choice cattle and sheep to offer up in sacrifice to '
  - type: text
    content: God
  - type: text
    content: . But everything else we destroyed under the holy ban.”
  '16':
  - type: text
    content: '“Enough!” interrupted Samuel. “Let me tell you what '
  - type: text
    content: God
  - type: text
    content: ' told me last night.”'
  - type: text
    content: Saul said, “Go ahead. Tell me.”
  '17':
  - type: text
    content: 'And Samuel told him. “When you started out in this, you were nothing—and you knew it. Then '
  - type: text
    content: God
  - type: text
    content: ' put you at the head of Israel—made you king over Israel. Then '
  - type: text
    content: God
  - type: text
    content: ' sent you off to do a job for him, ordering you, ‘Go and put those sinners, the Amalekites, under a holy ban. Go to war against them until you have totally wiped them out.’ So why did you not obey '
  - type: text
    content: God
  - type: text
    content: '? Why did you grab all this loot? Why, with '
  - type: text
    content: God
  - type: text
    content: ’s eyes on you all the time, did you brazenly carry out this evil?”
  '2':
  - type: text
    content: ' “‘I’m about to get even with Amalek for ambushing Israel when Israel came up out of Egypt. Here’s what you are to do: Go to war against Amalek. Put everything connected with Amalek under a holy ban. And no exceptions! This is to be total destruction—men and women, children and infants, cattle and sheep, camels and donkeys—the works.’”'
  '20':
  - type: text
    content: 'Saul defended himself. “What are you talking about? I did obey '
  - type: text
    content: God
  - type: text
    content: '. I did the job '
  - type: text
    content: God
  - type: text
    content: ' set for me. I brought in King Agag and destroyed the Amalekites under the terms of the holy ban. So the soldiers saved back a few choice sheep and cattle from the holy ban for sacrifice to '
  - type: text
    content: God
  - type: text
    content: ' at Gilgal—what’s wrong with that?”'
  '22':
  - type: text
    content: Then Samuel said,
  - type: text
    content: 'Do you think all '
  - type: text
    content: God
  - type: text
    content: ' wants are sacrifices—'
  - type: text
    content: empty rituals just for show?
  - type: text
    content: He wants you to listen to him!
  - type: text
    content: Plain listening is the thing,
  - type: text
    content: not staging a lavish religious production.
  - type: text
    content: 'Not doing what '
  - type: text
    content: God
  - type: text
    content: ' tells you'
  - type: text
    content: is far worse than fooling around in the occult.
  - type: text
    content: 'Getting self-important around '
  - type: text
    content: God
  - type: text
    content: is far worse than making deals with your dead ancestors.
  - type: text
    content: 'Because you said No to '
  - type: text
    content: God
  - type: text
    content: ’s command,
  - type: text
    content: he says No to your kingship.
  '24':
  - type: text
    content: 'Saul gave in and confessed, “I’ve sinned. I’ve trampled roughshod over '
  - type: text
    content: God
  - type: text
    content: '’s Word and your instructions. I cared more about pleasing the people. I let them tell me what to do. Oh, absolve me of my sin! Take my hand and lead me to the altar so I can worship '
  - type: text
    content: God
  - type: text
    content: '!”'
  '26':
  - type: text
    content: 'But Samuel refused: “No, I can’t come alongside you in this. You rejected '
  - type: text
    content: God
  - type: text
    content: '’s command. Now '
  - type: text
    content: God
  - type: text
    content: ' has rejected you as king over Israel.”'
  '27':
  - type: text
    content: As Samuel turned to leave, Saul grabbed at his priestly robe and a piece tore off. Samuel said, “
  - type: text
    content: God
  - type: text
    content: ' has just now torn the kingdom from you, and handed it over to your neighbor, a better man than you are. Israel’s God-of-Glory doesn’t deceive and he doesn’t dither. He says what he means and means what he says.”'
  '30':
  - type: text
    content: 'Saul tried again, “I have sinned. But don’t abandon me! Support me with your presence before the leaders and the people. Come alongside me as I go back to worship '
  - type: text
    content: God
  - type: text
    content: .”
  '31':
  - type: text
    content: 'Samuel did. He went back with him. And Saul dropped to his knees before '
  - type: text
    content: God
  - type: text
    content: ' and worshiped.'
  '32':
  - type: text
    content: Then Samuel said, “Present King Agag of Amalek to me.” Agag came, dragging his feet, muttering that he’d be better off dead.
  '33':
  - type: text
    content: 'Samuel said, “Just as your sword made many a woman childless, so your mother will be childless among those women!” And Samuel cut Agag down in the presence of '
  - type: text
    content: God
  - type: text
    content: ' right there in Gilgal.'
  '34':
  - type: text
    content: 'Samuel left immediately for Ramah and Saul went home to Gibeah. Samuel had nothing to do with Saul from then on, though he grieved long and deeply over him. But '
  - type: text
    content: God
  - type: text
    content: ' was sorry he had ever made Saul king in the first place.'
  '4':
  - type: text
    content: Saul called the army together at Telaim and prepared them to go to war—two hundred companies of infantry from Israel and another ten companies from Judah. Saul marched to Amalek City and hid in the canyon.
  '6':
  - type: text
    content: 'Then Saul got word to the Kenites: “Get out of here while you can. Evacuate the city right now or you’ll get lumped in with the Amalekites. I’m warning you because you showed real kindness to the Israelites when they came up out of Egypt.”'
  - type: text
    content: And they did. The Kenites evacuated the place.
  '7':
  - type: text
    content: Then Saul went after Amalek, from the canyon all the way to Shur near the Egyptian border. He captured Agag, king of Amalek, alive. Everyone else was killed under the terms of the holy ban. Saul and the army made an exception for Agag, and for the choice sheep and cattle. They didn’t include them under the terms of the holy ban. But all the rest, which nobody wanted anyway, they destroyed as decreed by the holy ban.
