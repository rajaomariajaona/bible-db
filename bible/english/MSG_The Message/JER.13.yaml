document_id: JER.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: People Who Do Only What They Want to Do
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Go and buy yourself some linen shorts. Put them on and keep them on. Don’t even take them off to wash them.” So I bought the shorts as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' directed and put them on.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “And then tell them this, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message, personal from the God of Israel: Every wine jug should be full of wine.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And they’ll say, ‘Of course. We know that. Every wine jug should be full of wine!’
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: '“Then you’ll say, ‘This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says: Watch closely. I’m going to fill every person who lives in this country—the kings who rule from David’s throne, the priests, the prophets, the citizens of Jerusalem—with wine that will make them drunk. And then I’ll smash them, smash the wine-filled jugs—old and young alike. Nothing will stop me. Not an ounce of pity or mercy or compassion will slow me down. Every last drunken jug of them will be smashed!’”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Light You Always Took for Granted
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: 'Then I said, Listen. Listen carefully: Don’t stay stuck in your ways!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message we’re dealing with here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let your lives glow bright before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before he turns out the lights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before you trip and fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the dark mountain paths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The light you always took for granted will go out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the world will turn black.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you people won’t listen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll go off by myself and weep over you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep because of your stubborn arrogance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bitter, bitter tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rivers of tears from my eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s sheep will end up in exile.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Tell the king and the queen-mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Come down off your high horses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your dazzling crowns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will tumble off your heads.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The villages in the Negev will be surrounded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone trapped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Judah dragged off to exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole country dragged to oblivion.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: Look, look, Jerusalem!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look at the enemies coming out of the north!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What will become of your flocks of people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the beautiful flocks in your care?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How are you going to feel when the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve played up to, looked up to all these years
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now look down on you? You didn’t expect this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surprise! The pain of a woman having a baby!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do I hear you saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “What’s going on here? Why me?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The answer’s simple: You’re guilty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hugely guilty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your guilt has your life endangered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your guilt has you writhing in pain.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Can an African change skin?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can a leopard get rid of its spots?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So what are the odds on you doing good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who are so long-practiced in evil?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-27
    - type: text
      text: “I’ll blow these people away—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like wind-blown leaves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have it coming to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve measured it out precisely.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It’s because you forgot me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and embraced the Big Lie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that so-called god Baal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m the one who will rip off your clothes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: expose and shame you before the watching world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your obsessions with gods, gods, and more gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your goddess affairs, your god-adulteries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gods on the hills, gods in the fields—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every time I look you’re off with another god.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem, what a sordid life!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any hope for you!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Take the shorts that you bought and go straight to Perath and hide them there in a crack in the rock.” So I did what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me and hid them at Perath.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'Next, after quite a long time, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Go back to Perath and get the linen shorts I told you to hide there.” So I went back to Perath and dug them out of the place where I had hidden them. The shorts by then had rotted and were worthless.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-11
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' explained, “This is the way I am going to ruin the pride of Judah and the great pride of Jerusalem—a wicked bunch of people who won’t obey me, who do only what they want to do, who chase after all kinds of no-gods and worship them. They’re going to turn out as rotten as these old shorts. Just as shorts clothe and protect, so I kept the whole family of Israel under my care”—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—“so that everyone could see they were my people, a people I could show off to the world and be proud of. But they refused to do a thing I said.
