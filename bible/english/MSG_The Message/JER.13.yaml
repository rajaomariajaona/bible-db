type_code: eng
verses:
  '1':
  - type: heading
    content: People Who Do Only What They Want to Do
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me, “Go and buy yourself some linen shorts. Put them on and keep them on. Don’t even take them off to wash them.” So I bought the shorts as '
  - type: text
    content: God
  - type: text
    content: ' directed and put them on.'
  '12':
  - type: text
    content: “And then tell them this, ‘
  - type: text
    content: God
  - type: text
    content: '’s Message, personal from the God of Israel: Every wine jug should be full of wine.’'
  - type: text
    content: “And they’ll say, ‘Of course. We know that. Every wine jug should be full of wine!’
  '13':
  - type: text
    content: '“Then you’ll say, ‘This is what '
  - type: text
    content: God
  - type: text
    content: ' says: Watch closely. I’m going to fill every person who lives in this country—the kings who rule from David’s throne, the priests, the prophets, the citizens of Jerusalem—with wine that will make them drunk. And then I’ll smash them, smash the wine-filled jugs—old and young alike. Nothing will stop me. Not an ounce of pity or mercy or compassion will slow me down. Every last drunken jug of them will be smashed!’”'
  - type: heading
    content: The Light You Always Took for Granted
  '15':
  - type: text
    content: 'Then I said, Listen. Listen carefully: Don’t stay stuck in your ways!'
  - type: text
    content: 'It’s '
  - type: text
    content: God
  - type: text
    content: ’s Message we’re dealing with here.
  - type: text
    content: 'Let your lives glow bright before '
  - type: text
    content: God
  - type: text
    content: before he turns out the lights,
  - type: text
    content: Before you trip and fall
  - type: text
    content: on the dark mountain paths.
  - type: text
    content: The light you always took for granted will go out
  - type: text
    content: and the world will turn black.
  - type: text
    content: If you people won’t listen,
  - type: text
    content: I’ll go off by myself and weep over you,
  - type: text
    content: Weep because of your stubborn arrogance,
  - type: text
    content: bitter, bitter tears,
  - type: text
    content: Rivers of tears from my eyes,
  - type: text
    content: 'because '
  - type: text
    content: God
  - type: text
    content: ’s sheep will end up in exile.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: Tell the king and the queen-mother,
  - type: text
    content: “Come down off your high horses.
  - type: text
    content: Your dazzling crowns
  - type: text
    content: will tumble off your heads.”
  - type: text
    content: The villages in the Negev will be surrounded,
  - type: text
    content: everyone trapped,
  - type: text
    content: And Judah dragged off to exile,
  - type: text
    content: the whole country dragged to oblivion.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: Look, look, Jerusalem!
  - type: text
    content: Look at the enemies coming out of the north!
  - type: text
    content: What will become of your flocks of people,
  - type: text
    content: the beautiful flocks in your care?
  - type: text
    content: How are you going to feel when the people
  - type: text
    content: you’ve played up to, looked up to all these years
  - type: text
    content: Now look down on you? You didn’t expect this?
  - type: text
    content: Surprise! The pain of a woman having a baby!
  - type: text
    content: Do I hear you saying,
  - type: text
    content: “What’s going on here? Why me?”
  - type: text
    content: 'The answer’s simple: You’re guilty,'
  - type: text
    content: hugely guilty.
  - type: text
    content: Your guilt has your life endangered,
  - type: text
    content: your guilt has you writhing in pain.
  '23':
  - type: text
    content: Can an African change skin?
  - type: text
    content: Can a leopard get rid of its spots?
  - type: text
    content: So what are the odds on you doing good,
  - type: text
    content: you who are so long-practiced in evil?
  '24':
  - type: text
    content: “I’ll blow these people away—
  - type: text
    content: like wind-blown leaves.
  - type: text
    content: You have it coming to you.
  - type: text
    content: I’ve measured it out precisely.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “It’s because you forgot me
  - type: text
    content: and embraced the Big Lie,
  - type: text
    content: that so-called god Baal.
  - type: text
    content: I’m the one who will rip off your clothes,
  - type: text
    content: expose and shame you before the watching world.
  - type: text
    content: Your obsessions with gods, gods, and more gods,
  - type: text
    content: your goddess affairs, your god-adulteries.
  - type: text
    content: Gods on the hills, gods in the fields—
  - type: text
    content: every time I look you’re off with another god.
  - type: text
    content: O Jerusalem, what a sordid life!
  - type: text
    content: Is there any hope for you!”
  '3':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told me, “Take the shorts that you bought and go straight to Perath and hide them there in a crack in the rock.” So I did what '
  - type: text
    content: God
  - type: text
    content: ' told me and hid them at Perath.'
  '6':
  - type: text
    content: 'Next, after quite a long time, '
  - type: text
    content: God
  - type: text
    content: ' told me, “Go back to Perath and get the linen shorts I told you to hide there.” So I went back to Perath and dug them out of the place where I had hidden them. The shorts by then had rotted and were worthless.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' explained, “This is the way I am going to ruin the pride of Judah and the great pride of Jerusalem—a wicked bunch of people who won’t obey me, who do only what they want to do, who chase after all kinds of no-gods and worship them. They’re going to turn out as rotten as these old shorts. Just as shorts clothe and protect, so I kept the whole family of Israel under my care”—'
  - type: text
    content: God
  - type: text
    content: ’s Decree—“so that everyone could see they were my people, a people I could show off to the world and be proud of. But they refused to do a thing I said.
