document_id: JOB.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My spirit is broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my days used up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my grave dug and waiting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how these mockers close in on me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long do I have to put up with their insolence?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Maybe you’d all like to start over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to try it again, the bunch of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So far I haven’t come across one scrap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of wisdom in anything you’ve said.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My life’s about over. All my plans are shattered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all my hopes are snuffed out—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My hope that night would turn into day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my hope that dawn was about to break.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If all I have to look forward to is a home in the graveyard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if my only hope for comfort is a well-built coffin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If a family reunion means going six feet under,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the only family that shows up is worms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you call that hope?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who on earth could find any hope in that?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No. If hope and I are to be buried together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I suppose you’ll all come to the double funeral!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O God, pledge your support for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give it to me in writing, with your signature.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re the only one who can do it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These people are so useless!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You know firsthand how stupid they can be.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You wouldn’t let them have the last word, would you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who betray their own friends
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave a legacy of abuse to their children.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God, you’ve made me the talk of the town—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people spit in my face;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can hardly see from crying so much;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m nothing but skin and bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Decent people can’t believe what they’re seeing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the good-hearted wake up and insist I’ve given up on God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But principled people hold tight, keep a firm grip on life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sure that their clean, pure hands will get stronger and stronger!
