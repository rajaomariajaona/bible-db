document_id: JOB.17,97
type_code: eng
verses:
  '1':
  - type: text
    content: “My spirit is broken,
  - type: text
    content: my days used up,
  - type: text
    content: my grave dug and waiting.
  - type: text
    content: See how these mockers close in on me?
  - type: text
    content: How long do I have to put up with their insolence?
  '10':
  - type: text
    content: “Maybe you’d all like to start over,
  - type: text
    content: to try it again, the bunch of you.
  - type: text
    content: So far I haven’t come across one scrap
  - type: text
    content: of wisdom in anything you’ve said.
  - type: text
    content: My life’s about over. All my plans are shattered,
  - type: text
    content: all my hopes are snuffed out—
  - type: text
    content: My hope that night would turn into day,
  - type: text
    content: my hope that dawn was about to break.
  - type: text
    content: If all I have to look forward to is a home in the graveyard,
  - type: text
    content: if my only hope for comfort is a well-built coffin,
  - type: text
    content: If a family reunion means going six feet under,
  - type: text
    content: and the only family that shows up is worms,
  - type: text
    content: Do you call that hope?
  - type: text
    content: Who on earth could find any hope in that?
  - type: text
    content: No. If hope and I are to be buried together,
  - type: text
    content: I suppose you’ll all come to the double funeral!”
  '3':
  - type: text
    content: “O God, pledge your support for me.
  - type: text
    content: Give it to me in writing, with your signature.
  - type: text
    content: You’re the only one who can do it!
  - type: text
    content: These people are so useless!
  - type: text
    content: You know firsthand how stupid they can be.
  - type: text
    content: You wouldn’t let them have the last word, would you?
  - type: text
    content: Those who betray their own friends
  - type: text
    content: leave a legacy of abuse to their children.
  '6':
  - type: text
    content: “God, you’ve made me the talk of the town—
  - type: text
    content: people spit in my face;
  - type: text
    content: I can hardly see from crying so much;
  - type: text
    content: I’m nothing but skin and bones.
  - type: text
    content: Decent people can’t believe what they’re seeing;
  - type: text
    content: the good-hearted wake up and insist I’ve given up on God.
  '9':
  - type: text
    content: “But principled people hold tight, keep a firm grip on life,
  - type: text
    content: sure that their clean, pure hands will get stronger and stronger!
