  children:
  - type: text
    text: Wise Sayings of Solomon
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Manual for Living
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: These are the wise sayings of Solomon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: David’s son, Israel’s king—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Written down so we’ll know how to live well and right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to understand what life means and where it’s going;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A manual for living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for learning what’s right and just and fair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: To teach the inexperienced the ropes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give our young people a grasp on reality.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s something here also for seasoned men and women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: still a thing or two for the experienced to learn—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fresh wisdom to probe and penetrate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rhymes and reasons of wise men and women.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Start with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Start with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—the first step in learning is bowing down to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: only fools thumb their noses at such wisdom and learning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-19
  - type: text
    text: Pay close attention, friend, to what your father tells you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: never forget what you learned at your mother’s knee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wear their counsel like a winning crown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like rings on your fingers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dear friend, if bad companions tempt you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t go along with them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If they say—“Let’s go out and raise some hell.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s beat up some old man, mug some old woman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s pick them clean
- type: usfm
  marker: q2
  children:
  - type: text
    text: and get them ready for their funerals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll load up on top-quality loot.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ll haul it home by the truckload.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Join us for the time of your life!
- type: usfm
  marker: q2
  children:
  - type: text
    text: With us, it’s share and share alike!”—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, friend, don’t give them a second look;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t listen to them for a minute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re racing to a very bad end,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hurrying to ruin everything they lay hands on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nobody robs a bank
- type: usfm
  marker: q2
  children:
  - type: text
    text: with everyone watching,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet that’s what these people are doing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re doing themselves in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When you grab all you can get, that’s what happens:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more you get, the less you are.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lady Wisdom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Lady Wisdom goes out in the street and shouts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: At the town center she makes her speech.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the middle of the traffic she takes her stand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'At the busiest corner she calls out:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: “Simpletons! How long will you wallow in ignorance?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cynics! How long will you feed your cynicism?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Idiots! How long will you refuse to learn?
- type: usfm
  marker: q2
  children:
  - type: text
    text: About face! I can revise your life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look, I’m ready to pour out my spirit on you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m ready to tell you all I know.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As it is, I’ve called, but you’ve turned a deaf ear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve reached out to you, but you’ve ignored me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-28
  - type: text
    text: “Since you laugh at my counsel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make a joke of my advice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I take you seriously?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I’ll turn the tables and joke about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' troubles!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What if the roof falls in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your whole life goes to pieces?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What if catastrophe strikes and there’s nothing
- type: usfm
  marker: q2
  children:
  - type: text
    text: to show for your life but rubble and ashes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll need me then. You’ll call for me, but don’t expect an answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No matter how hard you look, you won’t find me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: “Because you hated Knowledge
- type: usfm
  marker: q2
  children:
  - type: text
    text: and had nothing to do with the Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you wouldn’t take my advice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brushed aside all my offers to train you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, you’ve made your bed—now lie in it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you wanted your own way—now, how do you like it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you see what happens, you simpletons, you idiots?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Carelessness kills; complacency is murder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: First pay attention to me, and then relax.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now you can take it easy—you’re in good hands.”
