type_code: eng
verses:
  '1':
  - type: heading
    content: Wise Sayings of Solomon
  - type: heading
    content: A Manual for Living
  - type: text
    content: These are the wise sayings of Solomon,
  - type: text
    content: David’s son, Israel’s king—
  - type: text
    content: Written down so we’ll know how to live well and right,
  - type: text
    content: to understand what life means and where it’s going;
  - type: text
    content: A manual for living,
  - type: text
    content: for learning what’s right and just and fair;
  - type: text
    content: To teach the inexperienced the ropes
  - type: text
    content: and give our young people a grasp on reality.
  - type: text
    content: There’s something here also for seasoned men and women,
  - type: text
    content: still a thing or two for the experienced to learn—
  - type: text
    content: Fresh wisdom to probe and penetrate,
  - type: text
    content: the rhymes and reasons of wise men and women.
  - type: heading
    content: Start with God
  '20':
  - type: text
    content: Lady Wisdom goes out in the street and shouts.
  - type: text
    content: At the town center she makes her speech.
  - type: text
    content: In the middle of the traffic she takes her stand.
  - type: text
    content: 'At the busiest corner she calls out:'
  '22':
  - type: text
    content: “Simpletons! How long will you wallow in ignorance?
  - type: text
    content: Cynics! How long will you feed your cynicism?
  - type: text
    content: Idiots! How long will you refuse to learn?
  - type: text
    content: About face! I can revise your life.
  - type: text
    content: Look, I’m ready to pour out my spirit on you;
  - type: text
    content: I’m ready to tell you all I know.
  - type: text
    content: As it is, I’ve called, but you’ve turned a deaf ear;
  - type: text
    content: I’ve reached out to you, but you’ve ignored me.
  '25':
  - type: text
    content: “Since you laugh at my counsel
  - type: text
    content: and make a joke of my advice,
  - type: text
    content: How can I take you seriously?
  - type: text
    content: 'I’ll turn the tables and joke about '
  - type: text
    content: your
  - type: text
    content: ' troubles!'
  - type: text
    content: What if the roof falls in,
  - type: text
    content: and your whole life goes to pieces?
  - type: text
    content: What if catastrophe strikes and there’s nothing
  - type: text
    content: to show for your life but rubble and ashes?
  - type: text
    content: You’ll need me then. You’ll call for me, but don’t expect an answer.
  - type: text
    content: No matter how hard you look, you won’t find me.
  '29':
  - type: text
    content: “Because you hated Knowledge
  - type: text
    content: and had nothing to do with the Fear-of-
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Because you wouldn’t take my advice
  - type: text
    content: and brushed aside all my offers to train you,
  - type: text
    content: Well, you’ve made your bed—now lie in it;
  - type: text
    content: you wanted your own way—now, how do you like it?
  - type: text
    content: Don’t you see what happens, you simpletons, you idiots?
  - type: text
    content: Carelessness kills; complacency is murder.
  - type: text
    content: First pay attention to me, and then relax.
  - type: text
    content: Now you can take it easy—you’re in good hands.”
  '7':
  - type: text
    content: 'Start with '
  - type: text
    content: God
  - type: text
    content: '—the first step in learning is bowing down to '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: only fools thumb their noses at such wisdom and learning.
  '8':
  - type: text
    content: Pay close attention, friend, to what your father tells you;
  - type: text
    content: never forget what you learned at your mother’s knee.
  - type: text
    content: Wear their counsel like a winning crown,
  - type: text
    content: like rings on your fingers.
  - type: text
    content: Dear friend, if bad companions tempt you,
  - type: text
    content: don’t go along with them.
  - type: text
    content: If they say—“Let’s go out and raise some hell.
  - type: text
    content: Let’s beat up some old man, mug some old woman.
  - type: text
    content: Let’s pick them clean
  - type: text
    content: and get them ready for their funerals.
  - type: text
    content: We’ll load up on top-quality loot.
  - type: text
    content: We’ll haul it home by the truckload.
  - type: text
    content: Join us for the time of your life!
  - type: text
    content: With us, it’s share and share alike!”—
  - type: text
    content: Oh, friend, don’t give them a second look;
  - type: text
    content: don’t listen to them for a minute.
  - type: text
    content: They’re racing to a very bad end,
  - type: text
    content: hurrying to ruin everything they lay hands on.
  - type: text
    content: Nobody robs a bank
  - type: text
    content: with everyone watching,
  - type: text
    content: Yet that’s what these people are doing—
  - type: text
    content: they’re doing themselves in.
  - type: text
    content: 'When you grab all you can get, that’s what happens:'
  - type: text
    content: the more you get, the less you are.
  - type: heading
    content: Lady Wisdom
