type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Thrown into a Sieve
  - type: text
    content: 'I saw my Master standing beside the altar at the shrine. He said:'
  - type: text
    content: “Hit the tops of the shrine’s pillars,
  - type: text
    content: make the floor shake.
  - type: text
    content: The roof’s about to fall on the heads of the people,
  - type: text
    content: and whoever’s still alive, I’ll kill.
  - type: text
    content: No one will get away,
  - type: text
    content: no runaways will make it.
  - type: text
    content: If they dig their way down into the underworld,
  - type: text
    content: I’ll find them and bring them up.
  - type: text
    content: If they climb to the stars,
  - type: text
    content: I’ll find them and bring them down.
  - type: text
    content: If they hide out at the top of Mount Carmel,
  - type: text
    content: I’ll find them and bring them back.
  - type: text
    content: If they dive to the bottom of the ocean,
  - type: text
    content: I’ll send Dragon to swallow them up.
  - type: text
    content: If they’re captured alive by their enemies,
  - type: text
    content: I’ll send Sword to kill them.
  - type: text
    content: I’ve made up my mind
  - type: text
    content: to hurt them, not help them.”
  '11':
  - type: text
    content: '“But also on that Judgment Day I will restore David’s house that has fallen to pieces. I’ll repair the holes in the roof, replace the broken windows, fix it up like new. David’s people will be strong again and seize what’s left of enemy Edom, plus everyone else under my sovereign judgment.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree. He will do this.
  '13':
  - type: text
    content: '“Yes indeed, it won’t be long now.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '“Things are going to happen so fast your head will swim, one thing fast on the heels of the other. You won’t be able to keep up. Everything will be happening at once—and everywhere you look, blessings! Blessings like wine pouring off the mountains and hills. I’ll make everything right again for my people Israel:'
  - type: text
    content: “They’ll rebuild their ruined cities.
  - type: text
    content: They’ll plant vineyards and drink good wine.
  - type: text
    content: They’ll work their gardens and eat fresh vegetables.
  - type: text
    content: 'And I’ll plant '
  - type: text
    content: them
  - type: text
    content: ', plant them on their own land.'
  - type: text
    content: They’ll never again be uprooted from the land I’ve given them.”
  - type: text
    content: God
  - type: text
    content: ', your God, says so.'
  '5':
  - type: text
    content: 'My Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: touches the earth, a mere touch, and it trembles.
  - type: text
    content: The whole world goes into mourning.
  - type: text
    content: Earth swells like the Nile at flood stage;
  - type: text
    content: then the water subsides, like the great Nile of Egypt.
  - type: text
    content: God builds his palace—towers soaring high in the skies,
  - type: text
    content: foundations set on the rock-firm earth.
  - type: text
    content: He calls ocean waters and they come,
  - type: text
    content: then he ladles them out on the earth.
  - type: text
    content: God
  - type: text
    content: ', your God, does all this.'
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: '“Do you Israelites think you’re any better than the far-off Cushites?” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '“Am I not involved with all nations? Didn’t I bring Israel up from Egypt, the Philistines from Caphtor, the Arameans from Qir? But you can be sure that I, '
  - type: text
    content: God
  - type: text
    content: ', the Master, have my eye on the Kingdom of Sin. I’m going to wipe it off the face of the earth. Still, I won’t totally destroy the family of Jacob.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '9':
  - type: text
    content: “I’m still giving the orders around here. I’m throwing Israel into a sieve among all the nations and shaking them good, shaking out all the sin, all the sinners. No real grain will be lost, but all the sinners will be sifted out and thrown away, the people who say, ‘Nothing bad will ever happen in our lifetime. It won’t even come close.’
  - type: heading
    content: Blessings Like Wine Pouring off the Mountains
