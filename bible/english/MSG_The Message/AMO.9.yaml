document_id: AMO.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Thrown into a Sieve
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'I saw my Master standing beside the altar at the shrine. He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hit the tops of the shrine’s pillars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make the floor shake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The roof’s about to fall on the heads of the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whoever’s still alive, I’ll kill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will get away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no runaways will make it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they dig their way down into the underworld,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll find them and bring them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they climb to the stars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll find them and bring them down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they hide out at the top of Mount Carmel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll find them and bring them back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they dive to the bottom of the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll send Dragon to swallow them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they’re captured alive by their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll send Sword to kill them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve made up my mind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hurt them, not help them.”
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: '“But also on that Judgment Day I will restore David’s house that has fallen to pieces. I’ll repair the holes in the roof, replace the broken windows, fix it up like new. David’s people will be strong again and seize what’s left of enemy Edom, plus everyone else under my sovereign judgment.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree. He will do this.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: '“Yes indeed, it won’t be long now.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Things are going to happen so fast your head will swim, one thing fast on the heels of the other. You won’t be able to keep up. Everything will be happening at once—and everywhere you look, blessings! Blessings like wine pouring off the mountains and hills. I’ll make everything right again for my people Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “They’ll rebuild their ruined cities.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll plant vineyards and drink good wine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll work their gardens and eat fresh vegetables.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I’ll plant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ', plant them on their own land.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll never again be uprooted from the land I’ve given them.”
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, says so.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'My Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: touches the earth, a mere touch, and it trembles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The whole world goes into mourning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth swells like the Nile at flood stage;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then the water subsides, like the great Nile of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God builds his palace—towers soaring high in the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foundations set on the rock-firm earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He calls ocean waters and they come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then he ladles them out on the earth.
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, does all this.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: '“Do you Israelites think you’re any better than the far-off Cushites?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Am I not involved with all nations? Didn’t I bring Israel up from Egypt, the Philistines from Caphtor, the Arameans from Qir? But you can be sure that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, have my eye on the Kingdom of Sin. I’m going to wipe it off the face of the earth. Still, I won’t totally destroy the family of Jacob.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: “I’m still giving the orders around here. I’m throwing Israel into a sieve among all the nations and shaking them good, shaking out all the sin, all the sinners. No real grain will be lost, but all the sinners will be sifted out and thrown away, the people who say, ‘Nothing bad will ever happen in our lifetime. It won’t even come close.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings Like Wine Pouring off the Mountains
    marker-yv: yv-h
