document_id: NUM.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Kohathites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses and Aaron. He said, “Number the Kohathite line of Levites by clan and family. Count all the men from thirty to fifty years of age, all who enter the ministry to work in the Tent of Meeting.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “They are to spread a blue cloth over the Gold Altar and cover it with dolphin skins and place it on a carrying frame.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “They are to take all the articles used in ministering in the Sanctuary, wrap them in a blue cloth, cover them with dolphin skins, and place them on a carrying frame.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: “They are to remove the ashes from the Altar and spread a purple cloth over it. They are to place on it all the articles used in ministering at the Altar—firepans, forks, shovels, bowls; everything used at the Altar—place them on the Altar, cover it with the dolphin skins, and insert the poles.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “When Aaron and his sons have finished covering the holy furnishings and all the holy articles, and the camp is ready to set out, the Kohathites are to come and do the carrying. But they must not touch the holy things or they will die. The Kohathites are in charge of carrying all the things that are in the Tent of Meeting.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Eleazar son of Aaron the priest, is to be in charge of the oil for the light, the fragrant incense, the regular Grain-Offering, and the anointing oil. He is to be in charge of the entire Dwelling and everything in it, including its holy furnishings and articles.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-20
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses and Aaron, “Don’t let the tribal families of the Kohathites be destroyed from among the Levites. Protect them so they will live and not die when they come near the most holy things. To protect them, Aaron and his sons are to precede them into the Sanctuary and assign each man his task and what he is to carry. But the Kohathites themselves must not go in to look at the holy things, not even a glance at them, or they will die.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Gershonites
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Number the Gershonites by tribes according to their ancestral families. Count all the men from thirty to fifty years of age who enter the ministry of work in the Tent of Meeting.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-28
    - type: text
      text: '“The Gershonites by family and clan will serve by carrying heavy loads: the curtains of the Sanctuary and the Tent of Meeting; the covering of the Tent and the outer covering of dolphin skins; the screens for the entrance to the Tent; the cords; and all the equipment used in its ministries. The Gershonites have the job of doing the work connected with these things. All their work of lifting and carrying and moving is to be done under the supervision of Aaron and his sons. Assign them specifically what they are to carry. This is the work of the Gershonite clans at the Tent of Meeting. Ithamar son of Aaron the priest is to supervise their work.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Merarites
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: “Number the Merarites by their ancestral families. Count all the men from thirty to fifty years of age who enter the ministry of work at the Tent of Meeting.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-33
    - type: text
      text: '“This is their assigned duty as they go to work at the Tent of Meeting: to carry the frames of The Dwelling, its crossbars, posts, and bases, as well as the posts of the surrounding Courtyard with their bases, tent pegs, cords, and all the equipment related to their use. Assign to each man exactly what he is to carry. This is the ministry of the Merarite clans as they work at the Tent of Meeting under the supervision of Ithamar son of Aaron the priest.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-37
    - type: text
      text: 'Moses, Aaron, and the leaders of the congregation counted the Kohathites by clan and family. All the men from thirty to fifty years of age who came to serve in the work in the Tent of Meeting, counted by clans, were 2,750. This was the total from the Kohathite clans who served in the Tent of Meeting. Moses and Aaron counted them just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded through Moses.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-41
    - type: text
      text: 'The Gershonites were counted by clan and family. All the men from thirty to fifty years of age who came to serve in the work in the Tent of Meeting, counted by clan and family, were 2,630. This was the total from the Gershonite clans who served in the Tent of Meeting. Moses and Aaron counted them just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“This is the assigned work of the Kohathites in the Tent of Meeting: care of the most holy things.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 42-45
    - type: text
      text: 'The Merarites were counted by clan and family. All the men from thirty to fifty years of age who came to serve in the work in the Tent of Meeting, counted by clan, were 3,200. This was the total from the Merarite clans. Moses and Aaron counted them just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded through Moses.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 46-49
    - type: text
      text: 'So Moses and Aaron and the leaders of Israel counted all the Levites by clan and family. All the men from thirty to fifty years of age who came to do the work of serving and carrying the Tent of Meeting numbered 8,580. At '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s command through Moses, each man was assigned his work and told what to carry.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that’s the story of their numbering, as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: “When the camp is ready to set out, Aaron and his sons are to go in and take down the covering curtain and cover the Chest of The Testimony with it. Then they are to cover this with a dolphin skin, spread a solid blue cloth on top, and insert the poles.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: “Then they are to spread a blue cloth on the Table of the Presence and set the Table with plates, incense dishes, bowls, and jugs for drink offerings. The bread that is always there stays on the Table. They are to cover these with a scarlet cloth, and on top of that spread the dolphin skin, and insert the poles.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: “They are to use a blue cloth to cover the light-giving Lampstand and the lamps, snuffers, trays, and the oil jars that go with it. Then they are to wrap it all in a covering of dolphin skin and place it on a carrying frame.
