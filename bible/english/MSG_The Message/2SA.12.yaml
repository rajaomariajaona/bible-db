document_id: 2SA.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' was not at all pleased with what David had done, and sent Nathan to David. Nathan said to him, “There were two men in the same city—one rich, the other poor. The rich man had huge flocks of sheep, herds of cattle. The poor man had nothing but one little female lamb, which he had bought and raised. It grew up with him and his children as a member of the family. It ate off his plate and drank from his cup and slept on his bed. It was like a daughter to him.'
  '13':
  - type: text
    content: 'Then David confessed to Nathan, “I’ve sinned against '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: 'Nathan pronounced, “Yes, but that’s not the last word. '
  - type: text
    content: God
  - type: text
    content: ' forgives your sin. You won’t die for it. But because of your blasphemous behavior, the son born to you will die.”'
  '15':
  - type: text
    content: 'After Nathan went home, '
  - type: text
    content: God
  - type: text
    content: ' afflicted the child that Uriah’s wife bore to David, and he came down sick. David prayed desperately to God for the little boy. He fasted, wouldn’t go out, and slept on the floor. The elders in his family came in and tried to get him off the floor, but he wouldn’t budge. Nor could they get him to eat anything. On the seventh day the child died. David’s servants were afraid to tell him. They said, “What do we do now? While the child was living he wouldn’t listen to a word we said. Now, with the child dead, if we speak to him there’s no telling what he’ll do.”'
  '19':
  - type: text
    content: David noticed that the servants were whispering behind his back, and realized that the boy must have died.
  - type: text
    content: He asked the servants, “Is the boy dead?”
  - type: text
    content: “Yes,” they answered. “He’s dead.”
  '20':
  - type: text
    content: David got up from the floor, washed his face and combed his hair, put on a fresh change of clothes, then went into the sanctuary and worshiped. Then he came home and asked for something to eat. They set it before him and he ate.
  '21':
  - type: text
    content: His servants asked him, “What’s going on with you? While the child was alive you fasted and wept and stayed up all night. Now that he’s dead, you get up and eat.”
  '22':
  - type: text
    content: '“While the child was alive,” he said, “I fasted and wept, thinking '
  - type: text
    content: God
  - type: text
    content: ' might have mercy on me and the child would live. But now that he’s dead, why fast? Can I bring him back now? I can go to him, but he can’t come to me.”'
  '24':
  - type: text
    content: 'David went and comforted his wife Bathsheba. And when he slept with her, they conceived a son. When he was born they named him Solomon. '
  - type: text
    content: God
  - type: text
    content: ' had a special love for him and sent word by Nathan the prophet that '
  - type: text
    content: God
  - type: text
    content: ' wanted him named Jedidiah (God’s Beloved).'
  - type: text
    content: '* * *'
  '26':
  - type: text
    content: Joab, at war in Rabbah against the Ammonites, captured the royal city. He sent messengers to David saying, “I’m fighting at Rabbah, and I’ve just captured the city’s water supply. Hurry and get the rest of the troops together and set up camp here at the city and complete the capture yourself. Otherwise, I’ll capture it and get all the credit instead of you.” So David marshaled all the troops, went to Rabbah, and fought and captured it. He took the crown from their king’s head—very heavy with gold, and with a precious stone in it. It ended up on David’s head. And they plundered the city, carrying off a great quantity of loot.
  '31':
  - type: text
    content: David emptied the city of its people and put them to slave labor using saws, picks, and axes, and making bricks. He did this to all the Ammonite cities. Then David and the whole army returned to Jerusalem.
  '4':
  - type: text
    content: “One day a traveler dropped in on the rich man. He was too stingy to take an animal from his own herds or flocks to make a meal for his visitor, so he took the poor man’s lamb and prepared a meal to set before his guest.”
  '5':
  - type: text
    content: 'David exploded in anger. “As surely as '
  - type: text
    content: God
  - type: text
    content: ' lives,” he said to Nathan, “the man who did this ought to be lynched! He must repay for the lamb four times over for his crime and his stinginess!”'
  '7':
  - type: text
    content: '“You’re the man!” said Nathan. “And here’s what '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, has to say to you: I made you king over Israel. I freed you from the fist of Saul. I gave you your master’s daughter and other wives to have and to hold. I gave you both Israel and Judah. And if that hadn’t been enough, I’d have gladly thrown in much more. So why have you treated the word of '
  - type: text
    content: God
  - type: text
    content: ' with brazen contempt, doing this great evil? You murdered Uriah the Hittite, then took his wife as your wife. Worse, you killed him with an Ammonite sword! And now, because you treated God with such contempt and took Uriah the Hittite’s wife as your wife, killing and murder will continually plague your family. This is '
  - type: text
    content: God
  - type: text
    content: ' speaking, remember! I’ll make trouble for you out of your own family. I’ll take your wives from right out in front of you. I’ll give them to some neighbor, and he’ll go to bed with them openly. You did your deed in secret; I’m doing mine with the whole country watching!”'
