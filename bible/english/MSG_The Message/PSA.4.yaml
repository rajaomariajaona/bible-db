document_id: PSA.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: When I call, give me answers. God, take my side!
  - type: text
    content: Once, in a tight place, you gave me room;
  - type: text
    content: 'Now I’m in trouble again: grace me! hear me!'
  '2':
  - type: text
    content: You rabble—how long do I put up with your scorn?
  - type: text
    content: How long will you lust after lies?
  - type: text
    content: How long will you live crazed by illusion?
  '3':
  - type: text
    content: 'Look at this: look'
  - type: text
    content: 'Who got picked by '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: He listens the split second I call to him.
  '4':
  - type: text
    content: Complain if you must, but don’t lash out.
  - type: text
    content: Keep your mouth shut, and let your heart do the talking.
  - type: text
    content: Build your case before God and wait for his verdict.
  '6':
  - type: text
    content: ' Why is everyone hungry for '
  - type: text
    content: more
  - type: text
    content: '? “More, more,” they say.'
  - type: text
    content: “More, more.”
  - type: text
    content: I have God’s more-than-enough,
  - type: text
    content: More joy in one ordinary day
  '7':
  - type: text
    content: ' Than they get in all their shopping sprees.'
  - type: text
    content: At day’s end I’m ready for sound sleep,
  - type: text
    content: 'For you, '
  - type: text
    content: God
  - type: text
    content: ', have put my life back together.'
