document_id: PSA.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I call, give me answers. God, take my side!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once, in a tight place, you gave me room;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now I’m in trouble again: grace me! hear me!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rabble—how long do I put up with your scorn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you lust after lies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you live crazed by illusion?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look at this: look'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who got picked by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He listens the split second I call to him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Complain if you must, but don’t lash out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep your mouth shut, and let your heart do the talking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Build your case before God and wait for his verdict.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' Why is everyone hungry for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: '? “More, more,” they say.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “More, more.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have God’s more-than-enough,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: More joy in one ordinary day
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' Than they get in all their shopping sprees.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At day’s end I’m ready for sound sleep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have put my life back together.'
