document_id: PSA.4
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When I call, give me answers. God, take my side!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Once, in a tight place, you gave me room;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now I’m in trouble again: grace me! hear me!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You rabble—how long do I put up with your scorn?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you lust after lies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you live crazed by illusion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Look at this: look'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who got picked by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He listens the split second I call to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Complain if you must, but don’t lash out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep your mouth shut, and let your heart do the talking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Build your case before God and wait for his verdict.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7a
  - type: text
    text: ' Why is everyone hungry for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: '? “More, more,” they say.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “More, more.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have God’s more-than-enough,
- type: usfm
  marker: q1
  children:
  - type: text
    text: More joy in one ordinary day
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7b-8
  - type: text
    text: ' Than they get in all their shopping sprees.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: At day’s end I’m ready for sound sleep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have put my life back together.'
