document_id: NUM.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Camp Hazeroth
  - type: text
    content: 'Miriam and Aaron talked against Moses behind his back because of his Cushite wife (he had married a Cushite woman). They said, “Is it only through Moses that '
  - type: text
    content: God
  - type: text
    content: ' speaks? Doesn’t he also speak through us?”'
  - type: text
    content: God
  - type: text
    content: ' overheard their talk.'
  '10':
  - type: text
    content: When the Cloud moved off from the Tent, oh! Miriam had turned leprous, her skin like snow. Aaron took one look at Miriam—a leper!
  '11':
  - type: text
    content: He said to Moses, “Please, my master, please don’t come down so hard on us for this foolish and thoughtless sin. Please don’t make her like a stillborn baby coming out of its mother’s womb with half its body decomposed.”
  '13':
  - type: text
    content: 'And Moses prayed to '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: Please, God, heal her,
  - type: text
    content: please heal her.
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' answered Moses, “If her father had spat in her face, wouldn’t she be ostracized for seven days? Quarantine her outside the camp for seven days. Then she can be readmitted to the camp.” So Miriam was in quarantine outside the camp for seven days. The people didn’t march on until she was readmitted. Only then did the people march from Hazeroth and set up camp in the Wilderness of Paran.'
  '3':
  - type: text
    content: 'Now the man Moses was a quietly humble man, more so than anyone living on Earth. '
  - type: text
    content: God
  - type: text
    content: ' broke in suddenly on Moses and Aaron and Miriam saying, “Come out, you three, to the Tent of Meeting.” The three went out. '
  - type: text
    content: God
  - type: text
    content: ' descended in a Pillar of Cloud and stood at the entrance to the Tent. He called Aaron and Miriam to him. When they stepped out, he said,'
  - type: text
    content: Listen carefully to what I’m telling you.
  - type: text
    content: 'If there is a prophet of '
  - type: text
    content: God
  - type: text
    content: ' among you,'
  - type: text
    content: I make myself known to him in visions,
  - type: text
    content: I speak to him in dreams.
  - type: text
    content: But I don’t do it that way with my servant Moses;
  - type: text
    content: he has the run of my entire house;
  - type: text
    content: I speak to him intimately, in person,
  - type: text
    content: 'in plain talk without riddles:'
  - type: text
    content: 'He ponders the very form of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: So why did you show no reverence or respect
  - type: text
    content: in speaking against my servant, against Moses?
  '9':
  - type: text
    content: 'The anger of '
  - type: text
    content: God
  - type: text
    content: ' blazed out against them. And then he left.'
