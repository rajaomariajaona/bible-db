document_id: NUM.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Camp Hazeroth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Miriam and Aaron talked against Moses behind his back because of his Cushite wife (he had married a Cushite woman). They said, “Is it only through Moses that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' speaks? Doesn’t he also speak through us?”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' overheard their talk.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Cloud moved off from the Tent, oh! Miriam had turned leprous, her skin like snow. Aaron took one look at Miriam—a leper!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to Moses, “Please, my master, please don’t come down so hard on us for this foolish and thoughtless sin. Please don’t make her like a stillborn baby coming out of its mother’s womb with half its body decomposed.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please, God, heal her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: please heal her.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' answered Moses, “If her father had spat in her face, wouldn’t she be ostracized for seven days? Quarantine her outside the camp for seven days. Then she can be readmitted to the camp.” So Miriam was in quarantine outside the camp for seven days. The people didn’t march on until she was readmitted. Only then did the people march from Hazeroth and set up camp in the Wilderness of Paran.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the man Moses was a quietly humble man, more so than anyone living on Earth. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' broke in suddenly on Moses and Aaron and Miriam saying, “Come out, you three, to the Tent of Meeting.” The three went out. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' descended in a Pillar of Cloud and stood at the entrance to the Tent. He called Aaron and Miriam to him. When they stepped out, he said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully to what I’m telling you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If there is a prophet of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' among you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I make myself known to him in visions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I speak to him in dreams.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I don’t do it that way with my servant Moses;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has the run of my entire house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I speak to him intimately, in person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in plain talk without riddles:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He ponders the very form of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why did you show no reverence or respect
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in speaking against my servant, against Moses?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The anger of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' blazed out against them. And then he left.'
