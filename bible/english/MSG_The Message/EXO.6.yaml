document_id: EXO.6,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Now you’ll see what I’ll do to Pharaoh: With a strong hand he’ll send them out free; with a strong hand he’ll drive them out of his land.”'
  '10':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Go and speak to Pharaoh king of Egypt so that he will release the Israelites from his land.”'
  '12':
  - type: text
    content: 'Moses answered '
  - type: text
    content: God
  - type: text
    content: ', “Look—the Israelites won’t even listen to me. How do you expect Pharaoh to? And besides, I stutter.”'
  '13':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' again laid out the facts to Moses and Aaron regarding the Israelites and Pharaoh king of Egypt, and he again commanded them to lead the Israelites out of the land of Egypt.'
  - type: heading
    content: The Family Tree of Moses and Aaron
  '14':
  - type: text
    content: 'These are the heads of the tribes:'
  - type: text
    content: 'The sons of Reuben, Israel’s firstborn: Hanoch, Pallu, Hezron, and Carmi—these are the families of Reuben.'
  '15':
  - type: text
    content: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jakin, Zohar, and Saul, the son of a Canaanite woman—these are the families of Simeon.'
  '16':
  - type: text
    content: 'These are the names of the sons of Levi in the order of their birth: Gershon, Kohath, and Merari. Levi lived 137 years.'
  '17':
  - type: text
    content: 'The sons of Gershon by family: Libni and Shimei.'
  '18':
  - type: text
    content: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. Kohath lived to be 133.'
  '19':
  - type: text
    content: 'The sons of Merari: Mahli and Mushi.'
  - type: text
    content: These are the sons of Levi in the order of their birth.
  '2':
  - type: text
    content: ' God continued speaking to Moses, reassuring him, “I am '
  - type: text
    content: God
  - type: text
    content: '. I appeared to Abraham, Isaac, and Jacob as The Strong God, but by my name '
  - type: text
    content: God
  - type: text
    content: ' (I-Am-Present) I was not known to them. I also established my covenant with them to give them the land of Canaan, the country in which they lived as sojourners. But now I’ve heard the groanings of the Israelites whom the Egyptians continue to enslave and I’ve remembered my covenant. Therefore tell the Israelites:'
  '20':
  - type: text
    content: Amram married his aunt Jochebed and she had Aaron and Moses. Amram lived to be 137.
  '21':
  - type: text
    content: 'The sons of Izhar: Korah, Nepheg, and Zicri.'
  '22':
  - type: text
    content: 'The sons of Uzziel: Mishael, Elzaphan, and Sithri.'
  '23':
  - type: text
    content: Aaron married Elisheba, the daughter of Amminadab and sister of Nahshon, and she had Nadab and Abihu, Eleazar and Ithamar.
  '24':
  - type: text
    content: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the families of the Korahites.'
  '25':
  - type: text
    content: Aaron’s son Eleazar married one of the daughters of Putiel and she had Phinehas.
  - type: text
    content: These are the heads of the Levite families, family by family.
  '26':
  - type: text
    content: 'This is the Aaron and Moses whom '
  - type: text
    content: God
  - type: text
    content: ' ordered: “Bring the Israelites out of the land of Egypt clan by clan.” These are the men, Moses and Aaron, who told Pharaoh king of Egypt to release the Israelites from Egypt.'
  - type: heading
    content: “I’ll Make You as a God to Pharaoh”
  '28':
  - type: text
    content: 'And that’s how things stood when '
  - type: text
    content: God
  - type: text
    content: ' next spoke to Moses in Egypt.'
  '29':
  - type: text
    content: 'God addressed Moses, saying, “I am '
  - type: text
    content: God
  - type: text
    content: . Tell Pharaoh king of Egypt everything I say to you.”
  '30':
  - type: text
    content: And Moses answered, “Look at me. I stutter. Why would Pharaoh listen to me?”
  '6':
  - type: text
    content: ' “I am '
  - type: text
    content: God
  - type: text
    content: '. I will bring you out from under the cruel hard labor of Egypt. I will rescue you from slavery. I will redeem you, intervening with great acts of judgment. I’ll take you as my own people and I’ll be God to you. You’ll know that I am '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: text
    content: your
  - type: text
    content: ' God who brings you out from under the cruel hard labor of Egypt. I’ll bring you into the land that I promised to give Abraham, Isaac, and Jacob and give it to you as your own country. '
  - type: text
    content: 'I AM '
  - type: text
    content: God.
  - type: text
    content: ”
  '9':
  - type: text
    content: But when Moses delivered this message to the Israelites, they didn’t even hear him—they were that beaten down in spirit by the harsh slave conditions.
