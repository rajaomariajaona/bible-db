document_id: EXO.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Now you’ll see what I’ll do to Pharaoh: With a strong hand he’ll send them out free; with a strong hand he’ll drive them out of his land.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Go and speak to Pharaoh king of Egypt so that he will release the Israelites from his land.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses answered '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “Look—the Israelites won’t even listen to me. How do you expect Pharaoh to? And besides, I stutter.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' again laid out the facts to Moses and Aaron regarding the Israelites and Pharaoh king of Egypt, and he again commanded them to lead the Israelites out of the land of Egypt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family Tree of Moses and Aaron
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These are the heads of the tribes:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Reuben, Israel’s firstborn: Hanoch, Pallu, Hezron, and Carmi—these are the families of Reuben.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jakin, Zohar, and Saul, the son of a Canaanite woman—these are the families of Simeon.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of the sons of Levi in the order of their birth: Gershon, Kohath, and Merari. Levi lived 137 years.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Gershon by family: Libni and Shimei.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. Kohath lived to be 133.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli and Mushi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the sons of Levi in the order of their birth.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God continued speaking to Moses, reassuring him, “I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. I appeared to Abraham, Isaac, and Jacob as The Strong God, but by my name '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' (I-Am-Present) I was not known to them. I also established my covenant with them to give them the land of Canaan, the country in which they lived as sojourners. But now I’ve heard the groanings of the Israelites whom the Egyptians continue to enslave and I’ve remembered my covenant. Therefore tell the Israelites:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amram married his aunt Jochebed and she had Aaron and Moses. Amram lived to be 137.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Izhar: Korah, Nepheg, and Zicri.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Uzziel: Mishael, Elzaphan, and Sithri.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron married Elisheba, the daughter of Amminadab and sister of Nahshon, and she had Nadab and Abihu, Eleazar and Ithamar.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the families of the Korahites.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron’s son Eleazar married one of the daughters of Putiel and she had Phinehas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the heads of the Levite families, family by family.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the Aaron and Moses whom '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' ordered: “Bring the Israelites out of the land of Egypt clan by clan.” These are the men, Moses and Aaron, who told Pharaoh king of Egypt to release the Israelites from Egypt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: “I’ll Make You as a God to Pharaoh”
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And that’s how things stood when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' next spoke to Moses in Egypt.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God addressed Moses, saying, “I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Tell Pharaoh king of Egypt everything I say to you.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Moses answered, “Look at me. I stutter. Why would Pharaoh listen to me?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. I will bring you out from under the cruel hard labor of Egypt. I will rescue you from slavery. I will redeem you, intervening with great acts of judgment. I’ll take you as my own people and I’ll be God to you. You’ll know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God who brings you out from under the cruel hard labor of Egypt. I’ll bring you into the land that I promised to give Abraham, Isaac, and Jacob and give it to you as your own country. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'I AM '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God.
    - type: text
      text: ”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when Moses delivered this message to the Israelites, they didn’t even hear him—they were that beaten down in spirit by the harsh slave conditions.
