type_code: eng
verses:
  '1':
  - type: heading
    content: Discipline in a Long-Distance Race
  - type: text
    content: 'Do you see what this means—all these pioneers who blazed the way, all these veterans cheering us on? It means we’d better get on with it. Strip down, start running—and never quit! No extra spiritual fat, no parasitic sins. Keep your eyes on '
  - type: text
    content: Jesus
  - type: text
    content: ', who both began and finished this race we’re in. Study how he did it. Because he never lost sight of where he was headed—that exhilarating finish in and with God—he could put up with anything along the way: Cross, shame, whatever. And now he’s '
  - type: text
    content: there
  - type: text
    content: ', in the place of honor, right alongside God. When you find yourselves flagging in your faith, go over that story again, item by item, that long litany of hostility he plowed through. '
  - type: text
    content: That
  - type: text
    content: ' will shoot adrenaline into your souls!'
  '12':
  - type: text
    content: So don’t sit around on your hands! No more dragging your feet! Clear the path for long-distance runners so no one will trip and fall, so no one will step in a hole and sprain an ankle. Help each other out. And run for it!
  '14':
  - type: text
    content: 'Work at getting along with each other and with God. Otherwise you’ll never get so much as a glimpse of God. Make sure no one gets left out of God’s generosity. Keep a sharp eye out for weeds of bitter discontent. A thistle or two gone to seed can ruin a whole garden in no time. Watch out for the Esau syndrome: trading away God’s lifelong gift in order to satisfy a short-term appetite. You well know how Esau later regretted that impulsive act and wanted God’s blessing—but by then it was too late, tears or no tears.'
  - type: heading
    content: An Unshakable Kingdom
  '18':
  - type: text
    content: Unlike your ancestors, you didn’t come to Mount Sinai—all that volcanic blaze and earthshaking rumble—to hear God speak. The earsplitting words and soul-shaking message terrified them and they begged him to stop. When they heard the words—“If an animal touches the Mountain, it’s as good as dead”—they were afraid to move. Even Moses was terrified.
  '22':
  - type: text
    content: 'No, that’s not '
  - type: text
    content: your
  - type: text
    content: ' experience at all. You’ve come to Mount Zion, the city where the living God resides. The invisible Jerusalem is populated by throngs of festive angels and Christian citizens. It is the city where God is Judge, with judgments that make us just. You’ve come to Jesus, who presents us with a new covenant, a fresh charter from God. He is the Mediator of this covenant. The murder of Jesus, unlike Abel’s—a homicide that cried out for vengeance—became a proclamation of grace.'
  '25':
  - type: text
    content: 'So don’t turn a deaf ear to these gracious words. If those who ignored earthly warnings didn’t get away with it, what will happen to us if we turn our backs on heavenly warnings? His voice that time shook the earth to its foundations; this time—he’s told us this quite plainly—he’ll also rock the heavens: “One last shaking, from top to bottom, stem to stern.” The phrase “one last shaking” means a thorough housecleaning, getting rid of all the historical and religious junk so that the unshakable essentials stand clear and uncluttered.'
  '28':
  - type: text
    content: Do you see what we’ve got? An unshakable kingdom! And do you see how thankful we must be? Not only thankful, but brimming with worship, deeply reverent before God. For God is not an indifferent bystander. He’s actively cleaning house, torching all that needs to burn, and he won’t quit until it’s all cleansed. God himself is Fire!
  '4':
  - type: text
    content: 'In this all-out match against sin, others have suffered far worse than you, to say nothing of what Jesus went through—all that bloodshed! So don’t feel sorry for yourselves. Or have you forgotten how good parents treat children, and that God regards you as '
  - type: text
    content: his
  - type: text
    content: ' children?'
  - type: text
    content: My dear child, don’t shrug off God’s discipline,
  - type: text
    content: but don’t be crushed by it either.
  - type: text
    content: It’s the child he loves that he disciplines;
  - type: text
    content: the child he embraces, he also corrects.
  - type: text
    content: 'God is educating you; that’s why you must never drop out. He’s treating you as dear children. This trouble you’re in isn’t punishment; it’s '
  - type: text
    content: training
  - type: text
    content: ', the normal experience of children. Only irresponsible parents leave children to fend for themselves. Would you prefer an irresponsible God? We respect our own parents for training and not spoiling us, so why not embrace God’s training so we can truly '
  - type: text
    content: live
  - type: text
    content: '? While we were children, our parents did what '
  - type: text
    content: seemed
  - type: text
    content: ' best to them. But God is doing what '
  - type: text
    content: is
  - type: text
    content: ' best for us, training us to live God’s holy best. At the time, discipline isn’t much fun. It always feels like it’s going against the grain. Later, of course, it pays off big-time, for it’s the well-trained who find themselves mature in their relationship with God.'
