document_id: HEB.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discipline in a Long-Distance Race
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Do you see what this means—all these pioneers who blazed the way, all these veterans cheering us on? It means we’d better get on with it. Strip down, start running—and never quit! No extra spiritual fat, no parasitic sins. Keep your eyes on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ', who both began and finished this race we’re in. Study how he did it. Because he never lost sight of where he was headed—that exhilarating finish in and with God—he could put up with anything along the way: Cross, shame, whatever. And now he’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ', in the place of honor, right alongside God. When you find yourselves flagging in your faith, go over that story again, item by item, that long litany of hostility he plowed through. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' will shoot adrenaline into your souls!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-11
  - type: text
    text: 'In this all-out match against sin, others have suffered far worse than you, to say nothing of what Jesus went through—all that bloodshed! So don’t feel sorry for yourselves. Or have you forgotten how good parents treat children, and that God regards you as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' children?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My dear child, don’t shrug off God’s discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but don’t be crushed by it either.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s the child he loves that he disciplines;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the child he embraces, he also corrects.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'God is educating you; that’s why you must never drop out. He’s treating you as dear children. This trouble you’re in isn’t punishment; it’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: training
  - type: text
    text: ', the normal experience of children. Only irresponsible parents leave children to fend for themselves. Would you prefer an irresponsible God? We respect our own parents for training and not spoiling us, so why not embrace God’s training so we can truly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: live
  - type: text
    text: '? While we were children, our parents did what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: seemed
  - type: text
    text: ' best to them. But God is doing what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' best for us, training us to live God’s holy best. At the time, discipline isn’t much fun. It always feels like it’s going against the grain. Later, of course, it pays off big-time, for it’s the well-trained who find themselves mature in their relationship with God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: So don’t sit around on your hands! No more dragging your feet! Clear the path for long-distance runners so no one will trip and fall, so no one will step in a hole and sprain an ankle. Help each other out. And run for it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: 'Work at getting along with each other and with God. Otherwise you’ll never get so much as a glimpse of God. Make sure no one gets left out of God’s generosity. Keep a sharp eye out for weeds of bitter discontent. A thistle or two gone to seed can ruin a whole garden in no time. Watch out for the Esau syndrome: trading away God’s lifelong gift in order to satisfy a short-term appetite. You well know how Esau later regretted that impulsive act and wanted God’s blessing—but by then it was too late, tears or no tears.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Unshakable Kingdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: Unlike your ancestors, you didn’t come to Mount Sinai—all that volcanic blaze and earthshaking rumble—to hear God speak. The earsplitting words and soul-shaking message terrified them and they begged him to stop. When they heard the words—“If an animal touches the Mountain, it’s as good as dead”—they were afraid to move. Even Moses was terrified.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: 'No, that’s not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' experience at all. You’ve come to Mount Zion, the city where the living God resides. The invisible Jerusalem is populated by throngs of festive angels and Christian citizens. It is the city where God is Judge, with judgments that make us just. You’ve come to Jesus, who presents us with a new covenant, a fresh charter from God. He is the Mediator of this covenant. The murder of Jesus, unlike Abel’s—a homicide that cried out for vengeance—became a proclamation of grace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: 'So don’t turn a deaf ear to these gracious words. If those who ignored earthly warnings didn’t get away with it, what will happen to us if we turn our backs on heavenly warnings? His voice that time shook the earth to its foundations; this time—he’s told us this quite plainly—he’ll also rock the heavens: “One last shaking, from top to bottom, stem to stern.” The phrase “one last shaking” means a thorough housecleaning, getting rid of all the historical and religious junk so that the unshakable essentials stand clear and uncluttered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: Do you see what we’ve got? An unshakable kingdom! And do you see how thankful we must be? Not only thankful, but brimming with worship, deeply reverent before God. For God is not an indifferent bystander. He’s actively cleaning house, torching all that needs to burn, and he won’t quit until it’s all cleansed. God himself is Fire!
