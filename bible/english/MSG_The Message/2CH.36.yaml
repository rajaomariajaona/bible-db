document_id: 2CH.36,97
type_code: eng
verses:
  '1':
  - type: heading
    content: King Jehoahaz
  - type: text
    content: Jehoahaz was twenty-three years old when he began to rule. He was king in Jerusalem for a mere three months. The king of Egypt dethroned him and forced the country to pay him nearly four tons of silver and seventy-five pounds of gold.
  - type: heading
    content: King Jehoiakim
  '11':
  - type: text
    content: 'Zedekiah was twenty-one years old when he started out as king. He was king in Jerusalem for eleven years. As far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned, he was just one more evil king; there wasn’t a trace of contrition in him when the prophet Jeremiah preached '
  - type: text
    content: God
  - type: text
    content: '’s word to him. Then he compounded his troubles by rebelling against King Nebuchadnezzar, who earlier had made him swear in God’s name that he would be loyal. He became set in his own stubborn ways—he never gave '
  - type: text
    content: God
  - type: text
    content: ' a thought; repentance never entered his mind.'
  '14':
  - type: text
    content: 'The evil mindset spread to the leaders and priests and filtered down to the people—it kicked off an epidemic of evil, repeating the abominations of the pagans and polluting The Temple of '
  - type: text
    content: God
  - type: text
    content: ' so recently consecrated in Jerusalem.'
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the God of their ancestors, repeatedly sent warning messages to them. Out of compassion for both his people and his Temple he wanted to give them every chance possible. But they wouldn’t listen; they poked fun at God’s messengers, despised the message itself, and in general treated the prophets like idiots. '
  - type: text
    content: God
  - type: text
    content: ' became more and more angry until there was no turning back—'
  - type: text
    content: God
  - type: text
    content: ' called in Nebuchadnezzar king of Babylon, who came and killed indiscriminately—and right in The Temple itself; it was a ruthless massacre: young men and virgins, the elderly and weak—they were all the same to him.'
  '18':
  - type: text
    content: And then he plundered The Temple of everything valuable, cleaned it out completely; he emptied the treasuries of The Temple of God, the treasuries of the king and his officials, and hauled it all, people and possessions, off to Babylon. He burned The Temple of God to the ground, knocked down the wall of Jerusalem, and set fire to all the buildings—everything valuable was burned up. Any survivor was taken prisoner into exile in Babylon and made a slave to Nebuchadnezzar and his family. The exile and slavery lasted until the kingdom of Persia took over.
  '21':
  - type: text
    content: 'This is exactly the message of '
  - type: text
    content: God
  - type: text
    content: ' that Jeremiah had preached: the desolate land put to an extended sabbath rest, a seventy-year Sabbath rest making up for all the unkept Sabbaths.'
  - type: heading
    content: King Cyrus
  '22':
  - type: text
    content: 'In the first year of Cyrus king of Persia—this fulfilled the message of '
  - type: text
    content: God
  - type: text
    content: ' preached by Jeremiah—'
  - type: text
    content: God
  - type: text
    content: ' moved Cyrus king of Persia to make an official announcement throughout his kingdom; he wrote it out as follows: “From Cyrus king of Persia a proclamation: '
  - type: text
    content: God
  - type: text
    content: ', the God of the heavens, has given me all the kingdoms of the earth. He has also assigned me to build him a Temple of worship at Jerusalem in Judah. All who belong to '
  - type: text
    content: God
  - type: text
    content: '’s people are urged to return—and may your '
  - type: text
    content: God
  - type: text
    content: ' be with you! Move forward!”'
  '4':
  - type: text
    content: Neco king of Egypt then made Eliakim, Jehoahaz’s brother, king of Judah and Jerusalem, but changed his name to Jehoiakim; then he took Jehoahaz back with him to Egypt.
  '5':
  - type: text
    content: 'Jehoiakim was twenty-five years old when he began to rule; he was king for eleven years in Jerusalem. In '
  - type: text
    content: God
  - type: text
    content: ’s opinion he was an evil king.
  '6':
  - type: text
    content: 'Nebuchadnezzar king of Babylon made war against him, and bound him in bronze chains, intending to take him prisoner to Babylon. Nebuchadnezzar also took things from The Temple of '
  - type: text
    content: God
  - type: text
    content: ' to Babylon and put them in his royal palace.'
  '8':
  - type: text
    content: 'The rest of the history of Jehoiakim, the outrageous sacrilege he committed and what happened to him as a consequence, is all written in the '
  - type: text
    content: Royal Annals of the Kings of Israel and Judah.
  - type: text
    content: Jehoiachin his son became the next king.
  - type: heading
    content: King Jehoiachin
  '9':
  - type: text
    content: 'Jehoiachin was eighteen years old when he became king. But he ruled for only three months and ten days in Jerusalem. In '
  - type: text
    content: God
  - type: text
    content: '’s opinion he was an evil king. In the spring King Nebuchadnezzar ordered him brought to Babylon along with the valuables remaining in The Temple of '
  - type: text
    content: God
  - type: text
    content: . Then he made his uncle Zedekiah a puppet king over Judah and Jerusalem.
  - type: heading
    content: King Zedekiah
