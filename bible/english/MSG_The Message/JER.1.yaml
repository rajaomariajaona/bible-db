document_id: JER.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Demolish, and Then Start Over
  - type: text
    content: 'The Message of Jeremiah son of Hilkiah of the family of priests who lived in Anathoth in the country of Benjamin. '
  - type: text
    content: God
  - type: text
    content: '’s Message began to come to him during the thirteenth year that Josiah son of Amon reigned over Judah. It continued to come to him during the time Jehoiakim son of Josiah reigned over Judah. And it continued to come to him clear down to the fifth month of the eleventh year of the reign of Zedekiah son of Josiah over Judah, the year that Jerusalem was taken into exile. This is what '
  - type: text
    content: God
  - type: text
    content: ' said:'
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “What do you see, Jeremiah?”'
  - type: text
    content: I said, “A walking stick—that’s all.”
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' said, “Good eyes! I’m sticking with you.'
  - type: text
    content: I’ll make every word I give you come true.”
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came again: “So what do you see now?”'
  - type: text
    content: I said, “I see a boiling pot, tipped down toward us.”
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told me, “Disaster will pour out of the north'
  - type: text
    content: on everyone living in this land.
  - type: text
    content: 'Watch for this: I’m calling all the kings out of the north.”'
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '15':
  - type: text
    content: ' “They’ll come and set up headquarters'
  - type: text
    content: facing Jerusalem’s gates,
  - type: text
    content: Facing all the city walls,
  - type: text
    content: facing all the villages of Judah.
  - type: text
    content: I’ll pronounce my judgment on the people of Judah
  - type: text
    content: for walking out on me—what a terrible thing to do!—
  - type: text
    content: And courting other gods with their offerings,
  - type: text
    content: worshiping as gods sticks they’d carved, stones they’d painted.
  '17':
  - type: text
    content: “But you—up on your feet and get dressed for work!
  - type: text
    content: Stand up and say your piece. Say exactly what I tell you to say.
  - type: text
    content: Don’t pull your punches
  - type: text
    content: or I’ll pull you out of the lineup.
  '18':
  - type: text
    content: “Stand at attention while I prepare you for your work.
  - type: text
    content: I’m making you as impregnable as a castle,
  - type: text
    content: Immovable as a steel post,
  - type: text
    content: solid as a concrete block wall.
  - type: text
    content: You’re a one-man defense system
  - type: text
    content: against this culture,
  - type: text
    content: Against Judah’s kings and princes,
  - type: text
    content: against the priests and local leaders.
  - type: text
    content: They’ll fight you, but they won’t
  - type: text
    content: even scratch you.
  - type: text
    content: I’ll back you up every inch of the way.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '5':
  - type: text
    content: “Before I shaped you in the womb,
  - type: text
    content: I knew all about you.
  - type: text
    content: Before you saw the light of day,
  - type: text
    content: 'I had holy plans for you:'
  - type: text
    content: A prophet to the nations—
  - type: text
    content: that’s what I had in mind for you.”
  '6':
  - type: text
    content: 'But I said, “Hold it, Master '
  - type: text
    content: God
  - type: text
    content: '! Look at me.'
  - type: text
    content: I don’t know anything. I’m only a boy!”
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me, “Don’t say, ‘I’m only a boy.’'
  - type: text
    content: I’ll tell you where to go and you’ll go there.
  - type: text
    content: I’ll tell you what to say and you’ll say it.
  - type: text
    content: Don’t be afraid of a soul.
  - type: text
    content: I’ll be right there, looking after you.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' reached out, touched my mouth, and said,'
  - type: text
    content: “Look! I’ve just put my words in your mouth—hand-delivered!
  - type: text
    content: See what I’ve done? I’ve given you a job to do
  - type: text
    content: among nations and governments—a red-letter day!
  - type: text
    content: Your job is to pull up and tear down,
  - type: text
    content: take apart and demolish,
  - type: text
    content: And then start over,
  - type: text
    content: building and planting.”
  - type: heading
    content: Stand Up and Say Your Piece
