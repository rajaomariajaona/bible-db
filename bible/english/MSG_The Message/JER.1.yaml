document_id: JER.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Demolish, and Then Start Over
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Message of Jeremiah son of Hilkiah of the family of priests who lived in Anathoth in the country of Benjamin. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message began to come to him during the thirteenth year that Josiah son of Amon reigned over Judah. It continued to come to him during the time Jehoiakim son of Josiah reigned over Judah. And it continued to come to him clear down to the fifth month of the eleventh year of the reign of Zedekiah son of Josiah over Judah, the year that Jerusalem was taken into exile. This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “What do you see, Jeremiah?”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I said, “A walking stick—that’s all.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Good eyes! I’m sticking with you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make every word I give you come true.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came again: “So what do you see now?”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I said, “I see a boiling pot, tipped down toward us.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Disaster will pour out of the north'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on everyone living in this land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Watch for this: I’m calling all the kings out of the north.”'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “They’ll come and set up headquarters'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: facing Jerusalem’s gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Facing all the city walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: facing all the villages of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll pronounce my judgment on the people of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for walking out on me—what a terrible thing to do!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And courting other gods with their offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worshiping as gods sticks they’d carved, stones they’d painted.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you—up on your feet and get dressed for work!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stand up and say your piece. Say exactly what I tell you to say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t pull your punches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or I’ll pull you out of the lineup.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stand at attention while I prepare you for your work.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m making you as impregnable as a castle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Immovable as a steel post,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: solid as a concrete block wall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re a one-man defense system
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against this culture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against Judah’s kings and princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the priests and local leaders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll fight you, but they won’t
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even scratch you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll back you up every inch of the way.”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Before I shaped you in the womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I knew all about you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before you saw the light of day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I had holy plans for you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A prophet to the nations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s what I had in mind for you.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I said, “Hold it, Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Look at me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t know anything. I’m only a boy!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told me, “Don’t say, ‘I’m only a boy.’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll tell you where to go and you’ll go there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll tell you what to say and you’ll say it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t be afraid of a soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be right there, looking after you.”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' reached out, touched my mouth, and said,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Look! I’ve just put my words in your mouth—hand-delivered!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See what I’ve done? I’ve given you a job to do
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among nations and governments—a red-letter day!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your job is to pull up and tear down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take apart and demolish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then start over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: building and planting.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stand Up and Say Your Piece
    marker-yv: yv-h
