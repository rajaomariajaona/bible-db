document_id: PSA.141,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', come close. Come quickly!'
  - type: text
    content: Open your ears—it’s my voice you’re hearing!
  - type: text
    content: Treat my prayer as sweet incense rising;
  - type: text
    content: my raised hands are my evening prayers.
  '3':
  - type: text
    content: 'Post a guard at my mouth, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: set a watch at the door of my lips.
  - type: text
    content: Don’t let me so much as dream of evil
  - type: text
    content: or thoughtlessly fall into bad company.
  - type: text
    content: And these people who only do wrong—
  - type: text
    content: don’t let them lure me with their sweet talk!
  - type: text
    content: May the Just One set me straight,
  - type: text
    content: may the Kind One correct me,
  - type: text
    content: Don’t let sin anoint my head.
  - type: text
    content: I’m praying hard against their evil ways!
  - type: text
    content: Oh, let their leaders be pushed off a high rock cliff;
  - type: text
    content: make them face the music.
  - type: text
    content: Like a rock pulverized by a maul,
  - type: text
    content: let their bones be scattered at the gates of hell.
  '8':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ', dear Lord,'
  - type: text
    content: I only have eyes for you.
  - type: text
    content: Since I’ve run for dear life to you,
  - type: text
    content: take good care of me.
  - type: text
    content: Protect me from their evil scheming,
  - type: text
    content: from all their demonic subterfuge.
  - type: text
    content: Let the wicked fall flat on their faces,
  - type: text
    content: while I walk off without a scratch.
