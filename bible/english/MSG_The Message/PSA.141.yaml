document_id: PSA.141,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', come close. Come quickly!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open your ears—it’s my voice you’re hearing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Treat my prayer as sweet incense rising;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my raised hands are my evening prayers.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Post a guard at my mouth, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set a watch at the door of my lips.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let me so much as dream of evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or thoughtlessly fall into bad company.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And these people who only do wrong—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t let them lure me with their sweet talk!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the Just One set me straight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may the Kind One correct me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let sin anoint my head.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m praying hard against their evil ways!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, let their leaders be pushed off a high rock cliff;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make them face the music.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a rock pulverized by a maul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let their bones be scattered at the gates of hell.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', dear Lord,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I only have eyes for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since I’ve run for dear life to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take good care of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me from their evil scheming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all their demonic subterfuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the wicked fall flat on their faces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I walk off without a scratch.
