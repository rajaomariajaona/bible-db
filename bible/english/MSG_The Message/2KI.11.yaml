document_id: 2KI.11,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Athaliah of Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'Athaliah was the mother of Ahaziah. When she saw that her son was dead, she took over. She began by massacring the entire royal family. But Jehosheba, daughter of King Jehoram and sister of Ahaziah, took Ahaziah’s son Joash and kidnapped him from among the king’s sons slated for slaughter. She hid him and his nurse in a private room away from Athaliah. He didn’t get killed. He was there with her, hidden away for six years in The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Athaliah, oblivious to his existence, ruled the country.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the priest brought the prince into view, crowned him, handed him the scroll of God’s covenant, and made him king. As they anointed him, everyone applauded and shouted, “Long live the king!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'Athaliah heard the shouting of guards and people and came to the crowd gathered at The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Astonished, she saw the king standing beside the throne, flanked by the captains and heralds, with everybody beside themselves with joy, trumpets blaring. Athaliah ripped her robes in dismay and shouted, “Treason! Treason!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: 'Jehoiada the priest ordered the military officers, “Drag her outside and kill anyone who tries to follow her!” (The priest had said, “Don’t kill her inside The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”) So they dragged her out to the palace’s horse corral; there they killed her.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jehoiada now made a covenant between '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and the king and the people: They were '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s people. Another covenant was made between the king and the people.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: The people poured into the temple of Baal and tore it down, smashing altar and images to smithereens. They killed Mattan the priest in front of the altar.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiada then stationed sentries in The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. He arranged for the officers of the bodyguard and the palace security, along with the people themselves, to escort the king down from The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' through the Gate of the Guards and into the palace. There he sat on the royal throne. Everybody celebrated the event. And the city was safe and undisturbed—they had killed Athaliah with the royal sword.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Joash was seven years old when he became king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In the seventh year Jehoiada sent for the captains of the bodyguards and the Palace Security Force. They met him in The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He made a covenant with them, swore them to secrecy, and only then showed them the young prince.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: 'Then he commanded them, “These are your instructions: Those of you who come on duty on the Sabbath and guard the palace, and those of you who go off duty on the Sabbath and guard The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', are to join forces at the time of the changing of the guard and form a ring around the young king, weapons at the ready. Kill anyone who tries to break through your ranks. Your job is to stay with the king at all times and places, coming and going.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'The captains obeyed the orders of Jehoiada the priest. Each took his men, those who came on duty on the Sabbath and those who went off duty on the Sabbath, and presented them to Jehoiada the priest. The priest armed the officers with spears and shields originally belonging to King David, stored in The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Well-armed, the guards took up their assigned positions for protecting the king, from one end of The Temple to the other, surrounding both Altar and Temple.
