document_id: JER.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And when the time comes”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree!—“I’ll see to it that they dig up the bones of the kings of Judah, the bones of the princes and priests and prophets, and yes, even the bones of the common people. They’ll dig them up and spread them out like a congregation at worship before sun, moon, and stars, all those sky gods they’ve been so infatuated with all these years, following their ‘lucky stars’ in doglike devotion. The bones will be left scattered and exposed, to reenter the soil as fertilizer, like manure.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“‘So here’s what will happen to the know-it-alls:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make them wifeless and homeless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone’s after the dishonest dollar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: little people and big people alike.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophets and priests and everyone in between
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twist words and doctor truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My dear Daughter—my people—broken, shattered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and yet they put on Band-Aids,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying, “It’s not so bad. You’ll be just fine.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But things are not “just fine”!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you suppose they are embarrassed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over this outrage?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not really. They have no shame.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t even know how to blush.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no hope for them. They’ve hit bottom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there’s no getting up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As far as I’m concerned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they’re finished.’” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has spoken.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I went out to see if I could salvage anything’”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“‘but found nothing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a grape, not a fig,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just a few withered leaves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m taking back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything I gave them.’”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why are we sitting here, doing nothing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s get organized.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s go to the big city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and at least die fighting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We’ve gotten '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s ultimatum:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’re damned if we do and damned if we don’t—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: damned because of our sin against him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We hoped things would turn out for the best,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it didn’t happen that way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were waiting around for healing—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terror showed up!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Dan at the northern borders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we hear the hooves of horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horses galloping, horses neighing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The ground shudders and quakes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re going to swallow up the whole country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Towns and people alike—fodder for war.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘What’s more, I’m dispatching
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poisonous snakes among you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Snakes that can’t be charmed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: snakes that will bite you and kill you.’”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Advancing from One Evil to the Next
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I drown in grief.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m heartsick.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, listen! Please listen! It’s the cry of my dear people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reverberating through the country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' no longer in Zion?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has the King gone away?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you tell me why they flaunt their plaything-gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their silly, imported no-gods before me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crops are in, the summer is over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but for us nothing’s changed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’re still waiting to be rescued.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my dear broken people, I’m heartbroken.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I weep, seized by grief.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are there no healing ointments in Gilead?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Isn’t there a doctor in the house?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why can’t something be done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to heal and save my dear, dear people?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Everyone left—all from this evil generation unlucky enough to still be alive in whatever godforsaken place I will have driven them to—will wish they were dead.” Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'To Know Everything but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Word
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Tell them this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Do people fall down and not get up?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or take the wrong road and then just keep going?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why does this people go backward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and just keep on going—
    - type: usfm
      marker: it
      children:
      - type: text
        text: backward
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stubbornly hold on to their illusions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refuse to change direction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I listened carefully
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but heard not so much as a whisper.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one expressed one word of regret.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not a single “I’m sorry” did I hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They just kept at it, blindly and stupidly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: banging their heads against a brick wall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cranes know when it’s time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to move south for winter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And robins, warblers, and bluebirds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: know when it’s time to come back again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people? My people know nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'not the first thing of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and his rule.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘How can you say, “We know the score.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We’re the proud owners of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s revelation”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look where it’s gotten you—stuck in illusion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your religion experts have taken you for a ride!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your know-it-alls will be unmasked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: caught and shown up for what they are.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look at them! They know everything but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Word.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you call that “knowing”?
