type_code: eng
verses:
  '1':
  - type: text
    content: “And when the time comes”—
  - type: text
    content: God
  - type: text
    content: ’s Decree!—“I’ll see to it that they dig up the bones of the kings of Judah, the bones of the princes and priests and prophets, and yes, even the bones of the common people. They’ll dig them up and spread them out like a congregation at worship before sun, moon, and stars, all those sky gods they’ve been so infatuated with all these years, following their ‘lucky stars’ in doglike devotion. The bones will be left scattered and exposed, to reenter the soil as fertilizer, like manure.
  '10':
  - type: text
    content: '“‘So here’s what will happen to the know-it-alls:'
  - type: text
    content: I’ll make them wifeless and homeless.
  - type: text
    content: Everyone’s after the dishonest dollar,
  - type: text
    content: little people and big people alike.
  - type: text
    content: Prophets and priests and everyone in between
  - type: text
    content: twist words and doctor truth.
  - type: text
    content: My dear Daughter—my people—broken, shattered,
  - type: text
    content: and yet they put on Band-Aids,
  - type: text
    content: Saying, “It’s not so bad. You’ll be just fine.”
  - type: text
    content: But things are not “just fine”!
  - type: text
    content: Do you suppose they are embarrassed
  - type: text
    content: over this outrage?
  - type: text
    content: Not really. They have no shame.
  - type: text
    content: They don’t even know how to blush.
  - type: text
    content: There’s no hope for them. They’ve hit bottom
  - type: text
    content: and there’s no getting up.
  - type: text
    content: As far as I’m concerned,
  - type: text
    content: 'they’re finished.’” '
  - type: text
    content: God
  - type: text
    content: ' has spoken.'
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: “‘I went out to see if I could salvage anything’”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: '“‘but found nothing:'
  - type: text
    content: Not a grape, not a fig,
  - type: text
    content: just a few withered leaves.
  - type: text
    content: I’m taking back
  - type: text
    content: everything I gave them.’”
  '14':
  - type: text
    content: So why are we sitting here, doing nothing?
  - type: text
    content: Let’s get organized.
  - type: text
    content: Let’s go to the big city
  - type: text
    content: and at least die fighting.
  - type: text
    content: 'We’ve gotten '
  - type: text
    content: God
  - type: text
    content: '’s ultimatum:'
  - type: text
    content: We’re damned if we do and damned if we don’t—
  - type: text
    content: damned because of our sin against him.
  - type: text
    content: We hoped things would turn out for the best,
  - type: text
    content: but it didn’t happen that way.
  - type: text
    content: We were waiting around for healing—
  - type: text
    content: and terror showed up!
  - type: text
    content: From Dan at the northern borders
  - type: text
    content: we hear the hooves of horses,
  - type: text
    content: Horses galloping, horses neighing.
  - type: text
    content: The ground shudders and quakes.
  - type: text
    content: They’re going to swallow up the whole country.
  - type: text
    content: Towns and people alike—fodder for war.
  '17':
  - type: text
    content: “‘What’s more, I’m dispatching
  - type: text
    content: poisonous snakes among you,
  - type: text
    content: Snakes that can’t be charmed,
  - type: text
    content: snakes that will bite you and kill you.’”
  - type: text
    content: God
  - type: text
    content: ’s Decree!
  - type: heading
    content: Advancing from One Evil to the Next
  '18':
  - type: text
    content: I drown in grief.
  - type: text
    content: I’m heartsick.
  - type: text
    content: Oh, listen! Please listen! It’s the cry of my dear people
  - type: text
    content: reverberating through the country.
  - type: text
    content: 'Is '
  - type: text
    content: God
  - type: text
    content: ' no longer in Zion?'
  - type: text
    content: Has the King gone away?
  - type: text
    content: Can you tell me why they flaunt their plaything-gods,
  - type: text
    content: their silly, imported no-gods before me?
  - type: text
    content: The crops are in, the summer is over,
  - type: text
    content: but for us nothing’s changed.
  - type: text
    content: We’re still waiting to be rescued.
  - type: text
    content: For my dear broken people, I’m heartbroken.
  - type: text
    content: I weep, seized by grief.
  - type: text
    content: Are there no healing ointments in Gilead?
  - type: text
    content: Isn’t there a doctor in the house?
  - type: text
    content: So why can’t something be done
  - type: text
    content: to heal and save my dear, dear people?
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: '“Everyone left—all from this evil generation unlucky enough to still be alive in whatever godforsaken place I will have driven them to—will wish they were dead.” Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: heading
    content: To Know Everything but God’s Word
  '4':
  - type: text
    content: '“Tell them this, '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “‘Do people fall down and not get up?
  - type: text
    content: Or take the wrong road and then just keep going?
  - type: text
    content: So why does this people go backward,
  - type: text
    content: and just keep on going—
  - type: text
    content: backward
  - type: text
    content: '!'
  - type: text
    content: They stubbornly hold on to their illusions,
  - type: text
    content: refuse to change direction.
  - type: text
    content: I listened carefully
  - type: text
    content: but heard not so much as a whisper.
  - type: text
    content: No one expressed one word of regret.
  - type: text
    content: Not a single “I’m sorry” did I hear.
  - type: text
    content: They just kept at it, blindly and stupidly
  - type: text
    content: banging their heads against a brick wall.
  - type: text
    content: Cranes know when it’s time
  - type: text
    content: to move south for winter.
  - type: text
    content: And robins, warblers, and bluebirds
  - type: text
    content: know when it’s time to come back again.
  - type: text
    content: But my people? My people know nothing,
  - type: text
    content: 'not the first thing of '
  - type: text
    content: God
  - type: text
    content: ' and his rule.'
  '8':
  - type: text
    content: “‘How can you say, “We know the score.
  - type: text
    content: 'We’re the proud owners of '
  - type: text
    content: God
  - type: text
    content: ’s revelation”?
  - type: text
    content: Look where it’s gotten you—stuck in illusion.
  - type: text
    content: Your religion experts have taken you for a ride!
  - type: text
    content: Your know-it-alls will be unmasked,
  - type: text
    content: caught and shown up for what they are.
  - type: text
    content: 'Look at them! They know everything but '
  - type: text
    content: God
  - type: text
    content: ’s Word.
  - type: text
    content: Do you call that “knowing”?
