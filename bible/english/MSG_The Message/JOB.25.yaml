    children:
    - type: text
      text: 1-6
  - type: text
    text: 'Bildad the Shuhite again attacked Job:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God is sovereign, God is fearsome—
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything in the cosmos fits and works in his plan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can anyone count his angel armies?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is there any place where his light doesn’t shine?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can a mere mortal presume to stand up to God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can an ordinary person pretend to be guiltless?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why, even the moon has its flaws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the stars aren’t perfect in God’s eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So how much less, plain men and women—
- type: usfm
  marker: q2
  children:
  - type: text
    text: slugs and maggots by comparison!”
