document_id: JOB.25,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s Third Attack
  - type: heading
    content: Even the Stars Aren’t Perfect in God’s Eyes
  - type: text
    content: 'Bildad the Shuhite again attacked Job:'
  - type: text
    content: “God is sovereign, God is fearsome—
  - type: text
    content: everything in the cosmos fits and works in his plan.
  - type: text
    content: Can anyone count his angel armies?
  - type: text
    content: Is there any place where his light doesn’t shine?
  - type: text
    content: How can a mere mortal presume to stand up to God?
  - type: text
    content: How can an ordinary person pretend to be guiltless?
  - type: text
    content: Why, even the moon has its flaws,
  - type: text
    content: even the stars aren’t perfect in God’s eyes,
  - type: text
    content: So how much less, plain men and women—
  - type: text
    content: slugs and maggots by comparison!”
