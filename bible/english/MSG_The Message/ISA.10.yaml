document_id: ISA.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: You Who Legislate Evil
  - type: text
    content: Doom to you who legislate evil,
  - type: text
    content: who make laws that make victims—
  - type: text
    content: Laws that make misery for the poor,
  - type: text
    content: that rob my destitute people of dignity,
  - type: text
    content: Exploiting defenseless widows,
  - type: text
    content: taking advantage of homeless children.
  - type: text
    content: What will you have to say on Judgment Day,
  - type: text
    content: when Doomsday arrives out of the blue?
  - type: text
    content: Who will you get to help you?
  - type: text
    content: What good will your money do you?
  - type: text
    content: A sorry sight you’ll be then, huddled with the prisoners,
  - type: text
    content: or just some corpses stacked in the street.
  - type: text
    content: Even after all this, God is still angry,
  - type: text
    content: his fist still raised, ready to hit them again.
  - type: heading
    content: Doom to Assyria!
  '12':
  - type: text
    content: ' When the Master has finished dealing with Mount Zion and Jerusalem, he’ll say, “Now it’s Assyria’s turn. I’ll punish the bragging arrogance of the king of Assyria, his high and mighty posturing, the way he goes around saying,'
  '13':
  - type: text
    content: ' “‘I’ve done all this by myself.'
  - type: text
    content: I know more than anyone.
  - type: text
    content: I’ve wiped out the boundaries of whole countries.
  - type: text
    content: I’ve walked in and taken anything I wanted.
  - type: text
    content: I charged in like a bull
  - type: text
    content: and toppled their kings from their thrones.
  - type: text
    content: I reached out my hand and took all that they treasured
  - type: text
    content: as easily as a boy taking a bird’s eggs from a nest.
  - type: text
    content: Like a farmer gathering eggs from the henhouse,
  - type: text
    content: I gathered the world in my basket,
  - type: text
    content: And no one so much as fluttered a wing
  - type: text
    content: or squawked or even chirped.’”
  '15':
  - type: text
    content: Does an ax take over from the one who swings it?
  - type: text
    content: Does a saw act more important than the sawyer?
  - type: text
    content: As if a shovel did its shoveling by using a ditch digger!
  - type: text
    content: As if a hammer used the carpenter to pound nails!
  - type: text
    content: 'Therefore the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: will send a debilitating disease on his robust Assyrian fighters.
  - type: text
    content: Under the canopy of God’s bright glory
  - type: text
    content: a fierce fire will break out.
  - type: text
    content: Israel’s Light will burst into a conflagration.
  - type: text
    content: The Holy will explode into a firestorm,
  - type: text
    content: And in one day burn to cinders
  - type: text
    content: every last Assyrian thornbush.
  - type: text
    content: God
  - type: text
    content: ' will destroy the splendid trees and lush gardens.'
  - type: text
    content: The Assyrian body and soul will waste away to nothing
  - type: text
    content: like a disease-ridden invalid.
  - type: text
    content: A child could count what’s left of the trees
  - type: text
    content: on the fingers of his two hands.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: 'And on that Day also, what’s left of Israel, the straggling survivors of Jacob, will no longer be fascinated by abusive, battering Assyria. They’ll lean on '
  - type: text
    content: God
  - type: text
    content: ', The Holy—yes, truly. The ragtag remnant—what’s left of Jacob—will come back to the Strong God. Your people Israel were once like the sand on the seashore, but only a scattered few will return. Destruction is ordered, brimming over with righteousness. For the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, will finish here what he started all over the globe.
  '24':
  - type: text
    content: ' Therefore the Master, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, says: “My dear, dear people who live in Zion, don’t be terrorized by the Assyrians when they beat you with clubs and threaten you with rods like the Egyptians once did. In just a short time my anger against you will be spent and I’ll turn my destroying anger on them. I, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, will go after them with a cat-o’-nine-tails and finish them off decisively—as Gideon downed Midian at the rock Oreb, as Moses turned the tables on Egypt. On that day, Assyria will be pulled off your back, and the yoke of slavery lifted from your neck.”
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: ' Assyria’s on the move: up from Rimmon,'
  - type: text
    content: on to Aiath,
  - type: text
    content: through Migron,
  - type: text
    content: with a bivouac at Micmash.
  - type: text
    content: They’ve crossed the pass,
  - type: text
    content: set camp at Geba for the night.
  - type: text
    content: Ramah trembles with fright.
  - type: text
    content: Gibeah of Saul has run off.
  - type: text
    content: Cry for help, daughter of Gallim!
  - type: text
    content: Listen to her, Laishah!
  - type: text
    content: Do something, Anathoth!
  - type: text
    content: Madmenah takes to the hills.
  - type: text
    content: The people of Gebim flee in panic.
  - type: text
    content: The enemy’s soon at Nob—nearly there!
  - type: text
    content: In sight of the city he shakes his fist
  - type: text
    content: At the mount of dear daughter Zion,
  - type: text
    content: the hill of Jerusalem.
  '33':
  - type: text
    content: 'But now watch this: The Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: swings his ax and lops the branches,
  - type: text
    content: Chops down the giant trees,
  - type: text
    content: lays flat the towering forest-on-the-march.
  - type: text
    content: His ax will make toothpicks of that forest,
  - type: text
    content: that Lebanon-like army reduced to kindling.
  '5':
  - type: text
    content: “Doom to Assyria, weapon of my anger.
  - type: text
    content: My wrath is a club in his hands!
  - type: text
    content: I send him against a godless nation,
  - type: text
    content: against the people I’m angry with.
  - type: text
    content: I command him to strip them clean, rob them blind,
  - type: text
    content: and then push their faces in the mud and leave them.
  - type: text
    content: But Assyria has another agenda;
  - type: text
    content: he has something else in mind.
  - type: text
    content: He’s out to destroy utterly,
  - type: text
    content: to stamp out as many nations as he can.
  - type: text
    content: Assyria says, ‘Aren’t my commanders all kings?
  - type: text
    content: Can’t they do whatever they like?
  - type: text
    content: Didn’t I destroy Calno as well as Carchemish?
  - type: text
    content: Hamath as well as Arpad? Level Samaria as I did Damascus?
  - type: text
    content: I’ve eliminated kingdoms full of gods
  - type: text
    content: far more impressive than anything in Jerusalem and Samaria.
  - type: text
    content: So what’s to keep me from destroying Jerusalem
  - type: text
    content: in the same way I destroyed Samaria and all her god-idols?’”
