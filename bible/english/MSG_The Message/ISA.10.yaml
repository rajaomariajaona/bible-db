document_id: ISA.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Who Legislate Evil
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Doom to you who legislate evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who make laws that make victims—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laws that make misery for the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that rob my destitute people of dignity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exploiting defenseless widows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking advantage of homeless children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What will you have to say on Judgment Day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Doomsday arrives out of the blue?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will you get to help you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What good will your money do you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A sorry sight you’ll be then, huddled with the prisoners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or just some corpses stacked in the street.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even after all this, God is still angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fist still raised, ready to hit them again.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doom to Assyria!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-11
  - type: text
    text: “Doom to Assyria, weapon of my anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My wrath is a club in his hands!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I send him against a godless nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the people I’m angry with.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I command him to strip them clean, rob them blind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then push their faces in the mud and leave them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Assyria has another agenda;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has something else in mind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s out to destroy utterly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to stamp out as many nations as he can.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assyria says, ‘Aren’t my commanders all kings?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can’t they do whatever they like?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Didn’t I destroy Calno as well as Carchemish?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hamath as well as Arpad? Level Samaria as I did Damascus?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve eliminated kingdoms full of gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: far more impressive than anything in Jerusalem and Samaria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So what’s to keep me from destroying Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the same way I destroyed Samaria and all her god-idols?’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13a
  - type: text
    text: ' When the Master has finished dealing with Mount Zion and Jerusalem, he’ll say, “Now it’s Assyria’s turn. I’ll punish the bragging arrogance of the king of Assyria, his high and mighty posturing, the way he goes around saying,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13b-14
  - type: text
    text: ' “‘I’ve done all this by myself.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know more than anyone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve wiped out the boundaries of whole countries.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve walked in and taken anything I wanted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I charged in like a bull
- type: usfm
  marker: q2
  children:
  - type: text
    text: and toppled their kings from their thrones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I reached out my hand and took all that they treasured
- type: usfm
  marker: q2
  children:
  - type: text
    text: as easily as a boy taking a bird’s eggs from a nest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a farmer gathering eggs from the henhouse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gathered the world in my basket,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And no one so much as fluttered a wing
- type: usfm
  marker: q2
  children:
  - type: text
    text: or squawked or even chirped.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19
  - type: text
    text: Does an ax take over from the one who swings it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does a saw act more important than the sawyer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As if a shovel did its shoveling by using a ditch digger!
- type: usfm
  marker: q2
  children:
  - type: text
    text: As if a hammer used the carpenter to pound nails!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will send a debilitating disease on his robust Assyrian fighters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Under the canopy of God’s bright glory
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fierce fire will break out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel’s Light will burst into a conflagration.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Holy will explode into a firestorm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in one day burn to cinders
- type: usfm
  marker: q2
  children:
  - type: text
    text: every last Assyrian thornbush.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will destroy the splendid trees and lush gardens.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Assyrian body and soul will waste away to nothing
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a disease-ridden invalid.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A child could count what’s left of the trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the fingers of his two hands.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: 'And on that Day also, what’s left of Israel, the straggling survivors of Jacob, will no longer be fascinated by abusive, battering Assyria. They’ll lean on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', The Holy—yes, truly. The ragtag remnant—what’s left of Jacob—will come back to the Strong God. Your people Israel were once like the sand on the seashore, but only a scattered few will return. Destruction is ordered, brimming over with righteousness. For the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, will finish here what he started all over the globe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-27a
  - type: text
    text: ' Therefore the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, says: “My dear, dear people who live in Zion, don’t be terrorized by the Assyrians when they beat you with clubs and threaten you with rods like the Egyptians once did. In just a short time my anger against you will be spent and I’ll turn my destroying anger on them. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, will go after them with a cat-o’-nine-tails and finish them off decisively—as Gideon downed Midian at the rock Oreb, as Moses turned the tables on Egypt. On that day, Assyria will be pulled off your back, and the yoke of slavery lifted from your neck.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27b-32
  - type: text
    text: ' Assyria’s on the move: up from Rimmon,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on to Aiath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: through Migron,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a bivouac at Micmash.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ve crossed the pass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set camp at Geba for the night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ramah trembles with fright.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gibeah of Saul has run off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cry for help, daughter of Gallim!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to her, Laishah!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do something, Anathoth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Madmenah takes to the hills.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The people of Gebim flee in panic.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The enemy’s soon at Nob—nearly there!
- type: usfm
  marker: q2
  children:
  - type: text
    text: In sight of the city he shakes his fist
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the mount of dear daughter Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hill of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: 'But now watch this: The Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swings his ax and lops the branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chops down the giant trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lays flat the towering forest-on-the-march.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His ax will make toothpicks of that forest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that Lebanon-like army reduced to kindling.
