document_id: LUK.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pilate
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Then they all took Jesus to Pilate and began to bring up charges against him. They said, “We found this man undermining our law and order, forbidding taxes to be paid to Caesar, setting himself up as Messiah-King.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: Mightily offended, Herod turned on Jesus. His soldiers joined in, taunting and jeering. Then they dressed him up in an elaborate king costume and sent him back to Pilate. That day Herod and Pilate became thick as thieves. Always before they had kept their distance.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: Then Pilate called in the high priests, rulers, and the others and said, “You brought this man to me as a disturber of the peace. I examined him in front of all of you and found there was nothing to your charge. And neither did Herod, for he has sent him back here with a clean bill of health. It’s clear that he’s done nothing wrong, let alone anything deserving death. I’m going to warn him to watch his step and let him go.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: 'At that, the crowd went wild: “Kill him! Give us Barabbas!” (Barabbas had been thrown in prison for starting a riot in the city and for murder.) Pilate still wanted to let Jesus go, and so spoke out again.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But they kept shouting back, “Crucify! Crucify him!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He tried a third time. “But for what crime? I’ve found nothing in him deserving death. I’m going to warn him to watch his step and let him go.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: But they kept at it, a shouting mob, demanding that he be crucified. And finally they shouted him down. Pilate caved in and gave them what they wanted. He released the man thrown in prison for rioting and murder, and gave them Jesus to do whatever they wanted.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Skull Hill
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-31
    - type: text
      text: As they led him off, they made Simon, a man from Cyrene who happened to be coming in from the countryside, carry the cross behind Jesus. A huge crowd of people followed, along with women weeping and carrying on. At one point Jesus turned to the women and said, “Daughters of Jerusalem, don’t cry for me. Cry for yourselves and for your children. The time is coming when they’ll say, ‘Lucky the women who never conceived! Lucky the wombs that never gave birth! Lucky the breasts that never gave milk!’ Then they’ll start calling to the mountains, ‘Fall down on us!’ calling to the hills, ‘Cover us up!’ If people do these things to a live, green tree, can you imagine what they’ll do with deadwood?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pilate asked him, “Is this true that you’re ‘King of the Jews’?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Those are your words, not mine,” Jesus replied.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Two others, both criminals, were taken along with him for execution.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: When they got to the place called Skull Hill, they crucified him, along with the criminals, one on his right, the other on his left.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: Jesus prayed, “Father, forgive them; they don’t know what they’re doing.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dividing up his clothes, they threw dice for them. The people stood there staring at Jesus, and the ringleaders made faces, taunting, “He saved others. Let’s see him save himself! The Messiah of God—ha! The Chosen—ha!”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-37
    - type: text
      text: 'The soldiers also came up and poked fun at him, making a game of it. They toasted him with sour wine: “So you’re King of the Jews! Save yourself!”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Printed over him was a sign: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: this is the king of the jews
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'One of the criminals hanging alongside cursed him: “Some Messiah you are! Save yourself! Save us!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Pilate told the high priests and the accompanying crowd, “I find nothing wrong here. He seems harmless enough to me.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-41
    - type: text
      text: 'But the other one made him shut up: “Have you no fear of God? You’re getting the same as him. We deserve this, but not him—he did nothing to deserve this.”'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Then he said, “Jesus, remember me when you enter your kingdom.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: He said, “Don’t worry, I will. Today you will join me in paradise.”
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-46
    - type: text
      text: By now it was noon. The whole earth became dark, the darkness lasting three hours—a total blackout. The Temple curtain split right down the middle. Jesus called loudly, “Father, I place my life in your hands!” Then he breathed his last.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'When the captain there saw what happened, he honored God: “This man was innocent! A good man, and innocent!”'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 48-49
    - type: text
      text: All who had come around as spectators to watch the show, when they saw what actually happened, were overcome with grief and headed home. Those who knew Jesus well, along with the women who had followed him from Galilee, stood at a respectful distance and kept vigil.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But they were vehement. “He’s stirring up unrest among the people with his teaching, disturbing the peace everywhere, starting in Galilee and now all through Judea. He’s a dangerous man, endangering the peace.”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 50-54
    - type: text
      text: There was a man by the name of Joseph, a member of the Jewish High Council, a man of good heart and good character. He had not gone along with the plans and actions of the council. His hometown was the Jewish village of Arimathea. He lived in alert expectation of the kingdom of God. He went to Pilate and asked for the body of Jesus. Taking him down, he wrapped him in a linen shroud and placed him in a tomb chiseled into the rock, a tomb never yet used. It was the day before Sabbath, the Sabbath just about to begin.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 55-56
    - type: text
      text: The women who had been companions of Jesus from Galilee followed along. They saw the tomb where Jesus’ body was placed. Then they went back to prepare burial spices and perfumes. They rested quietly on the Sabbath, as commanded.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: When Pilate heard that, he asked, “So, he’s a Galilean?” Realizing that he properly came under Herod’s jurisdiction, he passed the buck to Herod, who just happened to be in Jerusalem for a few days.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: Herod was delighted when Jesus showed up. He had wanted for a long time to see him, he’d heard so much about him. He hoped to see him do something spectacular. He peppered him with questions. Jesus didn’t answer—not one word. But the high priests and religion scholars were right there, saying their piece, strident and shrill in their accusations.
