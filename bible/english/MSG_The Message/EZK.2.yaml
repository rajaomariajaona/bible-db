document_id: EZK.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It said, “Son of man, stand up. I have something to say to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The moment I heard the voice, the Spirit entered me and put me on my feet. As he spoke to me, I listened.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: 'He said, “Son of man, I’m sending you to the family of Israel, a rebellious nation if there ever was one. They and their ancestors have fomented rebellion right up to the present. They’re a hard case, these people to whom I’m sending you—hardened in their sin. Tell them, ‘This is the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’ They are a defiant bunch. Whether or not they listen, at least they’ll know that a prophet’s been here. But don’t be afraid of them, son of man, and don’t be afraid of anything they say. Don’t be afraid when living among them is like stepping on thorns or finding scorpions in your bed. Don’t be afraid of their mean words or their hard looks. They’re a bunch of rebels. Your job is to speak to them. Whether they listen is not your concern. They’re hardened rebels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Only take care, son of man, that you don’t rebel like these rebels. Open your mouth and eat what I give you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: When I looked he had his hand stretched out to me, and in the hand a book, a scroll. He unrolled the scroll. On both sides, front and back, were written lamentations and mourning and doom.
