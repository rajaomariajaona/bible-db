document_id: JER.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sins Are Piled Sky-High
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Patrol Jerusalem’s streets.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look around. Take note.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Search the market squares.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See if you can find one man, one woman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A single soul who does what is right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tries to live a true life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want to forgive that person.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But if all they do is say, ‘As sure as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lives . . . ’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re nothing but a bunch of liars.”
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go down the rows of vineyards and rip out the vines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not all of them. Leave a few.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prune back those vines!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' growth didn’t come from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve betrayed me over and over again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah and Israel both.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They’ve spread lies about '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ve said, ‘There’s nothing to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing bad will happen to us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither famine nor war will come our way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophets are all windbags.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They speak nothing but nonsense.’”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because they have talked this way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are going to eat those words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch now! I’m putting my words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as fire in your mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the people are a pile of kindling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to go up in flames.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Attention! I’m bringing a far-off nation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against you, O house of Israel.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A solid nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an ancient nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A nation that speaks another language.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You won’t understand a word they say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they aim their arrows, you’re as good as dead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re a nation of real fighters!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll clean you out of house and home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rob you of crops and children alike.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll feast on your sheep and cattle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strip your vines and fig trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fortresses that made you feel so safe—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leveled with a stroke of the sword!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Even then, as bad as it will be”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Decree!—“it will not be the end of the world for you. And when people ask, ‘Why did our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' do all this to us?’ you must say to them, ‘This is back on you. Just as you left me and served foreign gods in your own country, so now you must serve foreigners in their own country.’'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Tell the house of Jacob this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'put out this bulletin in Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you scatterbrains, airheads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With eyes that see but don’t really look,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ears that hear but don’t really listen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why don’t you honor me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why aren’t you in awe before me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ', who made the shorelines'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to contain the ocean waters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I drew a line in the sand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that cannot be crossed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Waves roll in but cannot get through;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: breakers crash but that’s the end of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But this people—what a people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Uncontrollable, untamable runaways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It never occurs to them to say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘How can we honor our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' with our lives,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God who gives rain in both spring and autumn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and maintains the rhythm of the seasons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who sets aside time each year for harvest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keeps everything running smoothly for us?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of course you don’t! Your bad behavior blinds you to all this.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your sins keep my blessings at a distance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Stand for Nothing and Stand Up for No One
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My people are infiltrated by wicked men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unscrupulous men on the hunt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set traps for the unsuspecting.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their victims are innocent men and women.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their houses are stuffed with ill-gotten gain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a hunter’s bag full of birds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pretentious and powerful and rich,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hugely obese, oily with rolls of fat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Worse, they have no conscience.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Right and wrong mean nothing to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stand for nothing, stand up for no one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throw orphans to the wolves, exploit the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I’ll stand by and do nothing about this?”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t you think I’ll take serious measures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against a people like this?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have an eye for truth, don’t you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hit them hard, but it didn’t faze them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You disciplined them, but they refused correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hardheaded, harder than rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they wouldn’t change.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said to myself, “Well, these are just poor people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t know any better.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They were never taught anything about '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They never went to prayer meetings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll find some people from the best families.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll talk to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They’ll know what’s going on, the way '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' works.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll know the score.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they were no better! Rebels all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Off doing their own thing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The invaders are ready to pounce and kill,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a mountain lion, a wilderness wolf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Panthers on the prowl.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The streets aren’t safe anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And why? Because the people’s sins are piled sky-high;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their betrayals are past counting.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Unspeakable! Sickening!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What’s happened in this country?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophets preach lies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and priests hire on as their assistants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my people love it. They eat it up!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But what will you do when it’s time to pick up the pieces?”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why should I even bother with you any longer?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your children wander off, leaving me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taking up with gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that aren’t even gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I satisfied their deepest needs, and then they went off with the ‘sacred’ whores,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left me for orgies in sex shrines!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A bunch of well-groomed, lusty stallions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each one pawing and snorting for his neighbor’s wife.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I’m going to stand around and do nothing?”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t you think I’ll take serious measures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against a people like this?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eyes That Don’t Really Look, Ears That Don’t Really Listen
    marker-yv: yv-h
