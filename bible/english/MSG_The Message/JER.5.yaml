    content: Sins Are Piled Sky-High
  - type: text
    content: “Patrol Jerusalem’s streets.
  - type: text
    content: Look around. Take note.
  - type: text
    content: Search the market squares.
  - type: text
    content: See if you can find one man, one woman,
  - type: text
    content: A single soul who does what is right
  - type: text
    content: and tries to live a true life.
  - type: text
    content: I want to forgive that person.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '“But if all they do is say, ‘As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives . . . ’'
  - type: text
    content: they’re nothing but a bunch of liars.”
  '10':
  - type: text
    content: “Go down the rows of vineyards and rip out the vines,
  - type: text
    content: but not all of them. Leave a few.
  - type: text
    content: Prune back those vines!
  - type: text
    content: That
  - type: text
    content: ' growth didn’t come from '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: They’ve betrayed me over and over again,
  - type: text
    content: Judah and Israel both.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '12':
  - type: text
    content: '“They’ve spread lies about '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They’ve said, ‘There’s nothing to him.
  - type: text
    content: Nothing bad will happen to us,
  - type: text
    content: neither famine nor war will come our way.
  - type: text
    content: The prophets are all windbags.
  - type: text
    content: They speak nothing but nonsense.’”
  '14':
  - type: text
    content: 'Therefore, this is what '
  - type: text
    content: God
  - type: text
    content: ' said to me, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “Because they have talked this way,
  - type: text
    content: they are going to eat those words.
  - type: text
    content: Watch now! I’m putting my words
  - type: text
    content: as fire in your mouth.
  - type: text
    content: And the people are a pile of kindling
  - type: text
    content: ready to go up in flames.
  '15':
  - type: text
    content: “Attention! I’m bringing a far-off nation
  - type: text
    content: against you, O house of Israel.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “A solid nation,
  - type: text
    content: an ancient nation,
  - type: text
    content: A nation that speaks another language.
  - type: text
    content: You won’t understand a word they say.
  - type: text
    content: When they aim their arrows, you’re as good as dead.
  - type: text
    content: They’re a nation of real fighters!
  - type: text
    content: They’ll clean you out of house and home,
  - type: text
    content: rob you of crops and children alike.
  - type: text
    content: They’ll feast on your sheep and cattle,
  - type: text
    content: strip your vines and fig trees.
  - type: text
    content: And the fortresses that made you feel so safe—
  - type: text
    content: leveled with a stroke of the sword!
  '18':
  - type: text
    content: “Even then, as bad as it will be”—
  - type: text
    content: God
  - type: text
    content: '’s Decree!—“it will not be the end of the world for you. And when people ask, ‘Why did our '
  - type: text
    content: God
  - type: text
    content: ' do all this to us?’ you must say to them, ‘This is back on you. Just as you left me and served foreign gods in your own country, so now you must serve foreigners in their own country.’'
  '20':
  - type: text
    content: “Tell the house of Jacob this,
  - type: text
    content: 'put out this bulletin in Judah:'
  - type: text
    content: Listen to this,
  - type: text
    content: you scatterbrains, airheads,
  - type: text
    content: With eyes that see but don’t really look,
  - type: text
    content: and ears that hear but don’t really listen.
  - type: text
    content: Why don’t you honor me?
  - type: text
    content: Why aren’t you in awe before me?
  - type: text
    content: 'Yes, '
  - type: text
    content: me
  - type: text
    content: ', who made the shorelines'
  - type: text
    content: to contain the ocean waters.
  - type: text
    content: I drew a line in the sand
  - type: text
    content: that cannot be crossed.
  - type: text
    content: Waves roll in but cannot get through;
  - type: text
    content: breakers crash but that’s the end of them.
  - type: text
    content: But this people—what a people!
  - type: text
    content: Uncontrollable, untamable runaways.
  - type: text
    content: It never occurs to them to say,
  - type: text
    content: '‘How can we honor our '
  - type: text
    content: God
  - type: text
    content: ' with our lives,'
  - type: text
    content: The God who gives rain in both spring and autumn
  - type: text
    content: and maintains the rhythm of the seasons,
  - type: text
    content: Who sets aside time each year for harvest
  - type: text
    content: and keeps everything running smoothly for us?’
  - type: text
    content: Of course you don’t! Your bad behavior blinds you to all this.
  - type: text
    content: Your sins keep my blessings at a distance.
  - type: heading
    content: To Stand for Nothing and Stand Up for No One
  '26':
  - type: text
    content: “My people are infiltrated by wicked men,
  - type: text
    content: unscrupulous men on the hunt.
  - type: text
    content: They set traps for the unsuspecting.
  - type: text
    content: Their victims are innocent men and women.
  - type: text
    content: Their houses are stuffed with ill-gotten gain,
  - type: text
    content: like a hunter’s bag full of birds.
  - type: text
    content: Pretentious and powerful and rich,
  - type: text
    content: hugely obese, oily with rolls of fat.
  - type: text
    content: Worse, they have no conscience.
  - type: text
    content: Right and wrong mean nothing to them.
  - type: text
    content: They stand for nothing, stand up for no one,
  - type: text
    content: throw orphans to the wolves, exploit the poor.
  - type: text
    content: Do you think I’ll stand by and do nothing about this?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Don’t you think I’ll take serious measures
  - type: text
    content: against a people like this?
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'But you, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: you have an eye for truth, don’t you?
  - type: text
    content: You hit them hard, but it didn’t faze them.
  - type: text
    content: You disciplined them, but they refused correction.
  - type: text
    content: Hardheaded, harder than rock,
  - type: text
    content: they wouldn’t change.
  - type: text
    content: Then I said to myself, “Well, these are just poor people.
  - type: text
    content: They don’t know any better.
  - type: text
    content: 'They were never taught anything about '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They never went to prayer meetings.
  - type: text
    content: I’ll find some people from the best families.
  - type: text
    content: I’ll talk to them.
  - type: text
    content: 'They’ll know what’s going on, the way '
  - type: text
    content: God
  - type: text
    content: ' works.'
  - type: text
    content: They’ll know the score.”
  - type: text
    content: But they were no better! Rebels all!
  - type: text
    content: Off doing their own thing.
  - type: text
    content: The invaders are ready to pounce and kill,
  - type: text
    content: like a mountain lion, a wilderness wolf,
  - type: text
    content: Panthers on the prowl.
  - type: text
    content: The streets aren’t safe anymore.
  - type: text
    content: And why? Because the people’s sins are piled sky-high;
  - type: text
    content: their betrayals are past counting.
  '30':
  - type: text
    content: “Unspeakable! Sickening!
  - type: text
    content: What’s happened in this country?
  - type: text
    content: Prophets preach lies
  - type: text
    content: and priests hire on as their assistants.
  - type: text
    content: And my people love it. They eat it up!
  - type: text
    content: But what will you do when it’s time to pick up the pieces?”
  '7':
  - type: text
    content: “Why should I even bother with you any longer?
  - type: text
    content: Your children wander off, leaving me,
  - type: text
    content: Taking up with gods
  - type: text
    content: that aren’t even gods.
  - type: text
    content: I satisfied their deepest needs, and then they went off with the ‘sacred’ whores,
  - type: text
    content: left me for orgies in sex shrines!
  - type: text
    content: A bunch of well-groomed, lusty stallions,
  - type: text
    content: each one pawing and snorting for his neighbor’s wife.
  - type: text
    content: Do you think I’m going to stand around and do nothing?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Don’t you think I’ll take serious measures
  - type: text
    content: against a people like this?
