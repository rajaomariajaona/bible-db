verses:
  '1':
  - type: heading
    content: 'Sixth Vision: The Flying Book'
  - type: text
    content: I looked up again and saw—surprise!—a book on the wing! A book flying!
  '10':
  - type: text
    content: I said to the Messenger-Angel, “Where are they taking the bushel basket?”
  '11':
  - type: text
    content: He said, “East to the land of Shinar. They will build a garage to house it. When it’s finished, the basket will be stored there.”
  '2':
  - type: text
    content: The Messenger-Angel said to me, “What do you see now?”
  - type: text
    content: I said, “I see a book flying, a huge book—thirty feet long and fifteen wide!”
  '3':
  - type: text
    content: 'He told me, “This book is the verdict going out worldwide against thieves and liars. The first half of the book disposes of everyone who steals; the second half takes care of everyone who lies. I launched it”—Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies—“and so it will fly into the house of every thief and every liar. It will land in each house and tear it down, timbers and stones.”
  - type: heading
    content: 'Seventh Vision: A Woman in a Basket'
  '5':
  - type: text
    content: The Messenger-Angel appeared and said, “Look up. Tell me what you see.”
  '6':
  - type: text
    content: I said, “What in the world is that?”
  - type: text
    content: He said, “This is a bushel basket on a journey. It holds the sin of everyone, everywhere.”
  '7':
  - type: text
    content: Then the lid made of lead was removed from the basket—and there was a woman sitting in it!
  '8':
  - type: text
    content: He said, “This is Miss Wickedness.” He pushed her back down into the basket and clamped the lead lid over her.
  '9':
  - type: text
    content: Then I looked up and to my surprise saw two women flying. On outstretched wings they airlifted the bushel basket into the sky.
