document_id: ZEC.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixth Vision: The Flying Book'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I looked up again and saw—surprise!—a book on the wing! A book flying!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I said to the Messenger-Angel, “Where are they taking the bushel basket?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He said, “East to the land of Shinar. They will build a garage to house it. When it’s finished, the basket will be stored there.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The Messenger-Angel said to me, “What do you see now?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said, “I see a book flying, a huge book—thirty feet long and fifteen wide!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'He told me, “This book is the verdict going out worldwide against thieves and liars. The first half of the book disposes of everyone who steals; the second half takes care of everyone who lies. I launched it”—Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies—“and so it will fly into the house of every thief and every liar. It will land in each house and tear it down, timbers and stones.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Seventh Vision: A Woman in a Basket'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The Messenger-Angel appeared and said, “Look up. Tell me what you see.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I said, “What in the world is that?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “This is a bushel basket on a journey. It holds the sin of everyone, everywhere.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then the lid made of lead was removed from the basket—and there was a woman sitting in it!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He said, “This is Miss Wickedness.” He pushed her back down into the basket and clamped the lead lid over her.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then I looked up and to my surprise saw two women flying. On outstretched wings they airlifted the bushel basket into the sky.
