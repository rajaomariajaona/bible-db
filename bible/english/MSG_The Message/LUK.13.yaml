document_id: LUK.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unless You Turn to God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: About that time some people came up and told him about the Galileans Pilate had killed while they were at worship, mixing their blood with the blood of the sacrifices on the altar. Jesus responded, “Do you think those murdered Galileans were worse sinners than all other Galileans? Not at all. Unless you turn to God, you, too, will die. And those eighteen in Jerusalem the other day, the ones crushed and killed when the Tower of Siloam collapsed and fell on them, do you think they were worse citizens than all other Jerusalemites? Not at all. Unless you turn to God, you, too, will die.”
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: He was teaching in one of the meeting places on the Sabbath. There was a woman present, so twisted and bent over with arthritis that she couldn’t even look up. She had been afflicted with this for eighteen years. When Jesus saw her, he called her over. “Woman, you’re free!” He laid hands on her and suddenly she was standing straight and tall, giving glory to God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The meeting-place president, furious because Jesus had healed on the Sabbath, said to the congregation, “Six days have been defined as work days. Come on one of the six if you want to be healed, but not on the seventh, the Sabbath.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: But Jesus shot back, “You frauds! Each Sabbath every one of you regularly unties your cow or donkey from its stall, leads it out for water, and thinks nothing of it. So why isn’t it all right for me to untie this daughter of Abraham and lead her from the stall where Satan has had her tied these eighteen years?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When he put it that way, his critics were left looking quite silly and red-faced. The congregation was delighted and cheered him on.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Way to God
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Then he said, “How can I picture God’s kingdom for you? What kind of story can I use? It’s like an acorn that a man plants in his front yard. It grows into a huge oak tree with thick branches, and eagles build nests in it.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: He tried again. “How can I picture God’s kingdom? It’s like yeast that a woman works into enough dough for three loaves of bread—and waits while the dough rises.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He went on teaching from town to village, village to town, but keeping on a steady course toward Jerusalem.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: A bystander said, “Master, will only a few be saved?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Whether few or many is none of your business. Put your mind on your life with God. The way to life—to God!—is vigorous and requires your total attention. A lot of you are going to assume that you’ll sit down to God’s salvation banquet just because you’ve been hanging around the neighborhood all your lives. Well, one day you’re going to be banging on the door, wanting to get in, but you’ll find the door locked and the Master saying, ‘Sorry, you’re not on my guest list.’
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: “You’ll protest, ‘But we’ve known you all our lives!’ only to be interrupted with his abrupt, ‘Your kind of knowing can hardly be called knowing. You don’t know the first thing about me.’
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-30
    - type: text
      text: '“That’s when you’ll find yourselves out in the cold, strangers to grace. You’ll watch Abraham, Isaac, Jacob, and all the prophets march into God’s kingdom. You’ll watch outsiders stream in from east, west, north, and south and sit down at the table of God’s kingdom. And all the time you’ll be outside looking in—and wondering what happened. This is the Great Reversal: the last in line put at the head of the line, and the so-called first ending up last.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Just then some Pharisees came up and said, “Run for your life! Herod’s got your number. He’s out to kill you!”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-35
    - type: text
      text: Jesus said, “Tell that fox that I’ve no time for him right now. Today and tomorrow I’m busy clearing out the demons and healing the sick; the third day I’m wrapping things up. Besides, it’s not proper for a prophet to come to a bad end outside Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem, Jerusalem, killer of prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: abuser of the messengers of God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How often I’ve longed to gather your children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather your children like a hen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her brood safe under her wings—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you refused and turned away!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now it’s too late: You won’t see me again'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the day you say,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: ‘Blessed is he
  - type: usfm
    marker: q3
    children:
    - type: text
      text: who comes in
  - type: usfm
    marker: q3
    children:
    - type: text
      text: the name of God.’”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'Then he told them a story: “A man had an apple tree planted in his front yard. He came to it expecting to find apples, but there weren’t any. He said to his gardener, ‘What’s going on here? For three years now I’ve come to this tree expecting apples and not one apple have I found. Chop it down! Why waste good ground with it any longer?’'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: “The gardener said, ‘Let’s give it another year. I’ll dig around it and fertilize, and maybe it will produce next year; if it doesn’t, then chop it down.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Healing on the Sabbath
    marker-yv: yv-h
