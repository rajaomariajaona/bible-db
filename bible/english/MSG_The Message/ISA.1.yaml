document_id: ISA.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Messages of Judgment
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Quit Your Worship Charades
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The vision that Isaiah son of Amoz saw regarding Judah and Jerusalem during the times of the kings of Judah: Uzziah, Jotham, Ahaz, and Hezekiah.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to my Message,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you Sodom-schooled leaders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Receive God’s revelation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you Gomorrah-schooled people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why this frenzy of sacrifices?”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’s
    - type: text
      text: ' asking.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t you think I’ve had my fill of burnt sacrifices,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rams and plump grain-fed calves?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you think I’ve had my fill
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of blood from bulls, lambs, and goats?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you come before me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever gave you the idea of acting like this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Running here and there, doing this and that—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'all this sheer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: commotion
    - type: text
      text: ' in the place provided for worship?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Quit your worship charades.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I can’t stand your trivial religious games:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Monthly conferences, weekly Sabbaths, special meetings—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: meetings, meetings, meetings—I can’t stand one more!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meetings for this, meetings for that. I hate them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve worn me out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m sick of your religion, religion, religion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while you go right on sinning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you put on your next prayer-performance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll be looking the other way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No matter how long or loud or often you pray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll not be listening.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do you know why? Because you’ve been tearing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people to pieces, and your hands are bloody.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go home and wash up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Clean up your act.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sweep your lives clean of your evildoings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I don’t have to look at them any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say no to wrong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Learn to do good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Work for justice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Help the down-and-out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand up for the homeless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go to bat for the defenseless.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Let’s Argue This Out
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come. Sit down. Let’s argue this out.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If your sins are blood-red,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll be snow-white.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they’re red like crimson,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll be like wool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’ll willingly obey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll feast like kings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you’re willful and stubborn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll die like dogs.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That’s right. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Those Who Walk Out on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heaven and earth, you’re the jury.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s case:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I had children and raised them well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they turned on me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ox knows who’s boss,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mule knows the hand that feeds him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But not Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My people don’t know up from down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shame! Misguided '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -dropouts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: staggering under their guilt-baggage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Villainous gang,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: band of vandals—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My people have walked out on me, their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned their backs on The Holy of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walked off and never looked back.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Can you believe it? The chaste city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has become a whore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She was once all justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone living as good neighbors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now they’re all
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at one another’s throats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your coins are all counterfeits.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wine is watered down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your leaders are turncoats
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who keep company with crooks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sell themselves to the highest bidder
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grab anything not nailed down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They never stand up for the homeless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never stick up for the defenseless.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This Decree, therefore, of the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Strong One of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is it! I’ll get my oppressors off my back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll get back at my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give you the back of my hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: purge the junk from your life, clean you up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll set honest judges and wise counselors among you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just like it was back in the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you’ll be renamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: City-That-Treats-People-Right, the True-Blue City.”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s right ways will put Zion right again.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s right actions will restore her prodigals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But it’s curtains for rebels and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -traitors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a dead end for those who walk out on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your dalliances in those oak grove shrines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will leave you looking mighty foolish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that fooling around in god and goddess gardens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you thought was the latest thing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll end up like an oak tree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with all its leaves falling off,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an unwatered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: withered and brown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The Strong Man’ will turn out to be dead bark and twigs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his ‘work,’ the spark that starts the fire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That exposes man and work both
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as nothing but cinders and smoke.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why bother even trying to do anything with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you just keep to your bullheaded ways?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You keep beating your heads against brick walls.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything within you protests against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the bottom of your feet to the top of your head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing’s working right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wounds and bruises and running sores—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: untended, unwashed, unbandaged.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your country is laid waste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your cities burned down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your land is destroyed by outsiders while you watch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reduced to rubble by barbarians.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Zion is deserted—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a tumbledown shack on a dead-end street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a tarpaper shanty on the wrong side of the tracks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a sinking ship abandoned by the rats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies hadn’t left us a few survivors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’d be as desolate as Sodom, doomed just like Gomorrah.
