document_id: ISA.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Messages of Judgment
  - type: heading
    content: Quit Your Worship Charades
  - type: text
    content: 'The vision that Isaiah son of Amoz saw regarding Judah and Jerusalem during the times of the kings of Judah: Uzziah, Jotham, Ahaz, and Hezekiah.'
  '10':
  - type: text
    content: “Listen to my Message,
  - type: text
    content: you Sodom-schooled leaders.
  - type: text
    content: Receive God’s revelation,
  - type: text
    content: you Gomorrah-schooled people.
  '11':
  - type: text
    content: “Why this frenzy of sacrifices?”
  - type: text
    content: God
  - type: text
    content: ' '
  - type: text
    content: ’s
  - type: text
    content: ' asking.'
  - type: text
    content: “Don’t you think I’ve had my fill of burnt sacrifices,
  - type: text
    content: rams and plump grain-fed calves?
  - type: text
    content: Don’t you think I’ve had my fill
  - type: text
    content: of blood from bulls, lambs, and goats?
  - type: text
    content: When you come before me,
  - type: text
    content: whoever gave you the idea of acting like this,
  - type: text
    content: Running here and there, doing this and that—
  - type: text
    content: 'all this sheer '
  - type: text
    content: commotion
  - type: text
    content: ' in the place provided for worship?'
  '13':
  - type: text
    content: “Quit your worship charades.
  - type: text
    content: 'I can’t stand your trivial religious games:'
  - type: text
    content: Monthly conferences, weekly Sabbaths, special meetings—
  - type: text
    content: meetings, meetings, meetings—I can’t stand one more!
  - type: text
    content: Meetings for this, meetings for that. I hate them!
  - type: text
    content: You’ve worn me out!
  - type: text
    content: I’m sick of your religion, religion, religion,
  - type: text
    content: while you go right on sinning.
  - type: text
    content: When you put on your next prayer-performance,
  - type: text
    content: I’ll be looking the other way.
  - type: text
    content: No matter how long or loud or often you pray,
  - type: text
    content: I’ll not be listening.
  - type: text
    content: And do you know why? Because you’ve been tearing
  - type: text
    content: people to pieces, and your hands are bloody.
  - type: text
    content: Go home and wash up.
  - type: text
    content: Clean up your act.
  - type: text
    content: Sweep your lives clean of your evildoings
  - type: text
    content: so I don’t have to look at them any longer.
  - type: text
    content: Say no to wrong.
  - type: text
    content: Learn to do good.
  - type: text
    content: Work for justice.
  - type: text
    content: Help the down-and-out.
  - type: text
    content: Stand up for the homeless.
  - type: text
    content: Go to bat for the defenseless.
  - type: heading
    content: Let’s Argue This Out
  '18':
  - type: text
    content: “Come. Sit down. Let’s argue this out.”
  - type: text
    content: 'This is '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “If your sins are blood-red,
  - type: text
    content: they’ll be snow-white.
  - type: text
    content: If they’re red like crimson,
  - type: text
    content: they’ll be like wool.
  - type: text
    content: If you’ll willingly obey,
  - type: text
    content: you’ll feast like kings.
  - type: text
    content: But if you’re willful and stubborn,
  - type: text
    content: you’ll die like dogs.”
  - type: text
    content: 'That’s right. '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  - type: heading
    content: Those Who Walk Out on God
  '2':
  - type: text
    content: Heaven and earth, you’re the jury.
  - type: text
    content: 'Listen to '
  - type: text
    content: God
  - type: text
    content: '’s case:'
  - type: text
    content: “I had children and raised them well,
  - type: text
    content: and they turned on me.
  - type: text
    content: The ox knows who’s boss,
  - type: text
    content: the mule knows the hand that feeds him,
  - type: text
    content: But not Israel.
  - type: text
    content: My people don’t know up from down.
  - type: text
    content: 'Shame! Misguided '
  - type: text
    content: God
  - type: text
    content: -dropouts,
  - type: text
    content: staggering under their guilt-baggage,
  - type: text
    content: Villainous gang,
  - type: text
    content: band of vandals—
  - type: text
    content: 'My people have walked out on me, their '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: turned their backs on The Holy of Israel,
  - type: text
    content: walked off and never looked back.
  '21':
  - type: text
    content: Oh! Can you believe it? The chaste city
  - type: text
    content: has become a whore!
  - type: text
    content: She was once all justice,
  - type: text
    content: everyone living as good neighbors,
  - type: text
    content: And now they’re all
  - type: text
    content: at one another’s throats.
  - type: text
    content: Your coins are all counterfeits.
  - type: text
    content: Your wine is watered down.
  - type: text
    content: Your leaders are turncoats
  - type: text
    content: who keep company with crooks.
  - type: text
    content: They sell themselves to the highest bidder
  - type: text
    content: and grab anything not nailed down.
  - type: text
    content: They never stand up for the homeless,
  - type: text
    content: never stick up for the defenseless.
  '24':
  - type: text
    content: 'This Decree, therefore, of the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: 'the Strong One of Israel:'
  - type: text
    content: “This is it! I’ll get my oppressors off my back.
  - type: text
    content: I’ll get back at my enemies.
  - type: text
    content: I’ll give you the back of my hand,
  - type: text
    content: purge the junk from your life, clean you up.
  - type: text
    content: I’ll set honest judges and wise counselors among you
  - type: text
    content: just like it was back in the beginning.
  - type: text
    content: Then you’ll be renamed
  - type: text
    content: City-That-Treats-People-Right, the True-Blue City.”
  - type: text
    content: God
  - type: text
    content: ’s right ways will put Zion right again.
  - type: text
    content: God
  - type: text
    content: ’s right actions will restore her prodigals.
  - type: text
    content: 'But it’s curtains for rebels and '
  - type: text
    content: God
  - type: text
    content: -traitors,
  - type: text
    content: 'a dead end for those who walk out on '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: “Your dalliances in those oak grove shrines
  - type: text
    content: will leave you looking mighty foolish,
  - type: text
    content: All that fooling around in god and goddess gardens
  - type: text
    content: that you thought was the latest thing.
  - type: text
    content: You’ll end up like an oak tree
  - type: text
    content: with all its leaves falling off,
  - type: text
    content: Like an unwatered garden,
  - type: text
    content: withered and brown.
  - type: text
    content: ‘The Strong Man’ will turn out to be dead bark and twigs,
  - type: text
    content: and his ‘work,’ the spark that starts the fire
  - type: text
    content: That exposes man and work both
  - type: text
    content: as nothing but cinders and smoke.”
  '5':
  - type: text
    content: “Why bother even trying to do anything with you
  - type: text
    content: when you just keep to your bullheaded ways?
  - type: text
    content: You keep beating your heads against brick walls.
  - type: text
    content: Everything within you protests against you.
  - type: text
    content: From the bottom of your feet to the top of your head,
  - type: text
    content: nothing’s working right.
  - type: text
    content: Wounds and bruises and running sores—
  - type: text
    content: untended, unwashed, unbandaged.
  - type: text
    content: Your country is laid waste,
  - type: text
    content: your cities burned down.
  - type: text
    content: Your land is destroyed by outsiders while you watch,
  - type: text
    content: reduced to rubble by barbarians.
  - type: text
    content: Daughter Zion is deserted—
  - type: text
    content: like a tumbledown shack on a dead-end street,
  - type: text
    content: Like a tarpaper shanty on the wrong side of the tracks,
  - type: text
    content: like a sinking ship abandoned by the rats.
  - type: text
    content: 'If '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies hadn’t left us a few survivors,
  - type: text
    content: we’d be as desolate as Sodom, doomed just like Gomorrah.
