document_id: ISA.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Stretch the Borders of Life
  - type: text
    content: At that time, this song
  - type: text
    content: 'will be sung in the country of Judah:'
  - type: text
    content: We have a strong city, Salvation City,
  - type: text
    content: built and fortified with salvation.
  - type: text
    content: Throw wide the gates
  - type: text
    content: so good and true people can enter.
  - type: text
    content: People with their minds set on you,
  - type: text
    content: you keep completely whole,
  - type: text
    content: Steady on their feet,
  - type: text
    content: because they keep at it and don’t quit.
  - type: text
    content: 'Depend on '
  - type: text
    content: God
  - type: text
    content: ' and keep at it'
  - type: text
    content: 'because in the '
  - type: text
    content: 'Lord '
  - type: text
    content: God
  - type: text
    content: ' you have a sure thing.'
  - type: text
    content: Those who lived high and mighty
  - type: text
    content: he knocked off their high horse.
  - type: text
    content: He used the city built on the hill
  - type: text
    content: as fill for the marshes.
  - type: text
    content: All the exploited and outcast peoples
  - type: text
    content: build their lives on the reclaimed land.
  '11':
  - type: text
    content: 'You hold your hand up high, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: but they don’t see it.
  - type: text
    content: Open their eyes to what you do,
  - type: text
    content: to see your zealous love for your people.
  - type: text
    content: Shame them. Light a fire under them.
  - type: text
    content: Get the attention of these enemies of yours.
  - type: text
    content: God
  - type: text
    content: ', order a peaceful and whole life for us'
  - type: text
    content: because everything we’ve done, you’ve done for us.
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', our God, we’ve had other masters rule us,'
  - type: text
    content: but you’re the only Master we’ve ever known.
  - type: text
    content: The dead don’t talk,
  - type: text
    content: ghosts don’t walk,
  - type: text
    content: Because you’ve said, “Enough—that’s all for you,”
  - type: text
    content: and wiped them off the books.
  - type: text
    content: But the living you make larger than life.
  - type: text
    content: The more life you give, the more glory you display,
  - type: text
    content: and stretch the borders to accommodate more living!
  '16':
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', they begged you for help when they were in trouble,'
  - type: text
    content: when your discipline was so heavy
  - type: text
    content: they could barely whisper a prayer.
  - type: text
    content: Like a woman having a baby,
  - type: text
    content: writhing in distress, screaming her pain
  - type: text
    content: as the baby is being born,
  - type: text
    content: 'That’s how we were because of you, O '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: We were pregnant full-term.
  - type: text
    content: We writhed in labor but bore no baby.
  - type: text
    content: We gave birth to wind.
  - type: text
    content: Nothing came of our labor.
  - type: text
    content: We produced nothing living.
  - type: text
    content: We couldn’t save the world.
  '19':
  - type: text
    content: But friends, your dead will live,
  - type: text
    content: your corpses will get to their feet.
  - type: text
    content: All you dead and buried,
  - type: text
    content: wake up! Sing!
  - type: text
    content: Your dew is morning dew
  - type: text
    content: catching the first rays of sun,
  - type: text
    content: The earth bursting with life,
  - type: text
    content: giving birth to the dead.
  '20':
  - type: text
    content: Come, my people, go home
  - type: text
    content: and shut yourselves in.
  - type: text
    content: Go into seclusion for a while
  - type: text
    content: until the punishing wrath is past,
  - type: text
    content: 'Because '
  - type: text
    content: God
  - type: text
    content: ' is sure to come from his place'
  - type: text
    content: to punish the wrong of the people on earth.
  - type: text
    content: Earth itself will point out the bloodstains;
  - type: text
    content: it will show where the murdered have been hidden away.
  '7':
  - type: text
    content: The path of right-living people is level.
  - type: text
    content: The Leveler evens the road for the right-living.
  - type: text
    content: 'We’re in no hurry, '
  - type: text
    content: God
  - type: text
    content: . We’re content to linger
  - type: text
    content: in the path sign-posted with your decisions.
  - type: text
    content: Who you are and what you’ve done
  - type: text
    content: are all we’ll ever want.
  - type: text
    content: Through the night my soul longs for you.
  - type: text
    content: Deep from within me my spirit reaches out to you.
  - type: text
    content: When your decisions are on public display,
  - type: text
    content: everyone learns how to live right.
  - type: text
    content: If the wicked are shown grace,
  - type: text
    content: they don’t seem to get it.
  - type: text
    content: In the land of right living, they persist in wrong living,
  - type: text
    content: 'blind to the splendor of '
  - type: text
    content: God
  - type: text
    content: .
