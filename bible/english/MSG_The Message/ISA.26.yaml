document_id: ISA.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Stretch the Borders of Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: At that time, this song
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will be sung in the country of Judah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have a strong city, Salvation City,
- type: usfm
  marker: q2
  children:
  - type: text
    text: built and fortified with salvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Throw wide the gates
- type: usfm
  marker: q2
  children:
  - type: text
    text: so good and true people can enter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People with their minds set on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you keep completely whole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Steady on their feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they keep at it and don’t quit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Depend on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and keep at it'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' you have a sure thing.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who lived high and mighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knocked off their high horse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He used the city built on the hill
- type: usfm
  marker: q2
  children:
  - type: text
    text: as fill for the marshes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the exploited and outcast peoples
- type: usfm
  marker: q2
  children:
  - type: text
    text: build their lives on the reclaimed land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: The path of right-living people is level.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Leveler evens the road for the right-living.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We’re in no hurry, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . We’re content to linger
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the path sign-posted with your decisions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who you are and what you’ve done
- type: usfm
  marker: q2
  children:
  - type: text
    text: are all we’ll ever want.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through the night my soul longs for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deep from within me my spirit reaches out to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your decisions are on public display,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone learns how to live right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If the wicked are shown grace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they don’t seem to get it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the land of right living, they persist in wrong living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'blind to the splendor of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: 'You hold your hand up high, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they don’t see it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open their eyes to what you do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to see your zealous love for your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shame them. Light a fire under them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get the attention of these enemies of yours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', order a peaceful and whole life for us'
- type: usfm
  marker: q2
  children:
  - type: text
    text: because everything we’ve done, you’ve done for us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, we’ve had other masters rule us,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’re the only Master we’ve ever known.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The dead don’t talk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ghosts don’t walk,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you’ve said, “Enough—that’s all for you,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wiped them off the books.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the living you make larger than life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The more life you give, the more glory you display,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stretch the borders to accommodate more living!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', they begged you for help when they were in trouble,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when your discipline was so heavy
- type: usfm
  marker: q2
  children:
  - type: text
    text: they could barely whisper a prayer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a woman having a baby,
- type: usfm
  marker: q2
  children:
  - type: text
    text: writhing in distress, screaming her pain
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the baby is being born,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That’s how we were because of you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: We were pregnant full-term.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We writhed in labor but bore no baby.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We gave birth to wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing came of our labor.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We produced nothing living.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We couldn’t save the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But friends, your dead will live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your corpses will get to their feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All you dead and buried,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wake up! Sing!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your dew is morning dew
- type: usfm
  marker: q2
  children:
  - type: text
    text: catching the first rays of sun,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth bursting with life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving birth to the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Come, my people, go home
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shut yourselves in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go into seclusion for a while
- type: usfm
  marker: q2
  children:
  - type: text
    text: until the punishing wrath is past,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is sure to come from his place'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to punish the wrong of the people on earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth itself will point out the bloodstains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will show where the murdered have been hidden away.
