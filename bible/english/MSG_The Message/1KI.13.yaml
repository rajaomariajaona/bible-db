document_id: 1KI.13,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'And then this happened: Just as Jeroboam was at the Altar, about to make an offering, a holy man came from Judah by '
  - type: text
    content: God
  - type: text
    content: '’s command and preached (these were '
  - type: text
    content: God
  - type: text
    content: '’s orders) to the Altar: “Altar, Altar! '
  - type: text
    content: God
  - type: text
    content: '’s message! ‘A son will be born into David’s family named Josiah. The priests from the shrines who are making offerings on you, he will sacrifice—on you! Human bones burned on you!’” At the same time he announced a sign: “This is the proof '
  - type: text
    content: God
  - type: text
    content: ' gives—the Altar will split into pieces and the holy offerings spill into the dirt.”'
  '11':
  - type: text
    content: There was an old prophet who lived in Bethel. His sons came and told him the story of what the holy man had done that day in Bethel, told him everything that had happened and what the holy man had said to the king.
  '12':
  - type: text
    content: Their father said, “Which way did he go?” His sons pointed out the road that the holy man from Judah had taken.
  '13':
  - type: text
    content: He told his sons, “Saddle my donkey.” When they had saddled it, he got on and rode after the holy man. He found him sitting under an oak tree.
  - type: text
    content: He asked him, “Are you the holy man who came from Judah?”
  - type: text
    content: “Yes, I am,” he said.
  '15':
  - type: text
    content: “Well, come home with me and have a meal.”
  '16':
  - type: text
    content: '“Sorry, I can’t do that,” the holy man said. “I can neither go back with you nor eat with you in this country. I’m under strict orders from '
  - type: text
    content: God
  - type: text
    content: ': ‘Don’t eat a crumb; don’t drink a drop; and don’t come back the way you came.’”'
  '18':
  - type: text
    content: 'But he said, “I am also a prophet, just like you. And an angel came to me with a message from '
  - type: text
    content: God
  - type: text
    content: ': ‘Bring him home with you, and give him a good meal!’” But the man was lying. So the holy man went home with him and they had a meal together.'
  '20':
  - type: text
    content: 'There they were, sitting at the table together, when the word of '
  - type: text
    content: God
  - type: text
    content: ' came to the prophet who had brought him back. He confronted the holy man who had come from Judah: “'
  - type: text
    content: God
  - type: text
    content: '’s word to you: You disobeyed '
  - type: text
    content: God
  - type: text
    content: '’s command; you didn’t keep the strict orders your '
  - type: text
    content: God
  - type: text
    content: ' gave you; you came back and sat down to a good meal in the very place '
  - type: text
    content: God
  - type: text
    content: ' told you, ‘Don’t eat a crumb; don’t drink a drop.’ For that you’re going to die far from home and not be buried in your ancestral tomb.”'
  '23':
  - type: text
    content: When the meal was over, the prophet who had brought him back saddled his donkey for him. Down the road a way, a lion met him and killed him. His corpse lay crumpled on the road, the lion on one side and the donkey on the other. Some passersby saw the corpse in a heap on the road, with the lion standing guard beside it. They went to the village where the old prophet lived and told what they had seen.
  '26':
  - type: text
    content: 'When the prophet who had gotten him off track heard it, he said, “It’s the holy man who disobeyed '
  - type: text
    content: God
  - type: text
    content: '’s strict orders. '
  - type: text
    content: God
  - type: text
    content: ' turned him over to the lion who knocked him around and killed him, just as '
  - type: text
    content: God
  - type: text
    content: ' had told him.”'
  '27':
  - type: text
    content: The prophet told his sons, “Saddle my donkey.” They did it. He rode out and found the corpse in a heap in the road, with the lion and the donkey standing there. The lion hadn’t bothered either the corpse or the donkey. The old prophet loaded the corpse of the holy man on his donkey and returned it to his own town to give it a decent burial. He placed the body in his own tomb. The people mourned, saying, “A sad day, brother!”
  '31':
  - type: text
    content: 'After the funeral, the prophet said to his sons, “When I die, bury me in the same tomb where the holy man is buried, my bones alongside his bones. The message that he preached by '
  - type: text
    content: God
  - type: text
    content: ’s command against the Altar at Bethel and against all the sex-and-religion shrines in the towns of Samaria will come true.”
  '33':
  - type: text
    content: After this happened, Jeroboam kept right on doing evil, recruiting priests for the forbidden shrines indiscriminately—anyone who wanted to could be a priest at one of the local shrines. This was the root sin of Jeroboam’s government. And it was this that ruined him.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: 'When the king heard the message the holy man preached against the Altar at Bethel, he reached out to grab him, yelling, “Arrest him!” But his arm was paralyzed and hung useless. At the same time the Altar broke apart and the holy offerings all spilled into the dirt—the very sign the holy man had announced by '
  - type: text
    content: God
  - type: text
    content: ’s command.
  '6':
  - type: text
    content: 'The king pleaded with the holy man, “Help me! Pray to your '
  - type: text
    content: God
  - type: text
    content: ' for the healing of my arm.” The holy man prayed for him and the king’s arm was healed—as good as new!'
  '7':
  - type: text
    content: Then the king invited the holy man, “Join me for a meal; I have a gift for you.”
  '8':
  - type: text
    content: 'The holy man told the king, “Not on your life! You couldn’t pay me enough to get me to sit down with you at a meal in this place. I’m here under '
  - type: text
    content: God
  - type: text
    content: ’s orders, and he commanded, ‘Don’t eat a crumb, don’t drink a drop, and don’t go back the way you came.’” Then he left by a different road than the one on which he had walked to Bethel.
