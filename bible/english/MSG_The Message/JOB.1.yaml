  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sometime later, while Job’s children were having one of their parties at the home of the oldest son, a messenger came to Job and said, “The oxen were plowing and the donkeys grazing in the field next to us when Sabeans attacked. They stole the animals and killed the field hands. I’m the only one to get out alive and tell you what happened.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was still talking, another messenger arrived and said, “Bolts of lightning struck the sheep and the shepherds and fried them—burned them to a crisp. I’m the only one to get out alive and tell you what happened.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was still talking, another messenger arrived and said, “Chaldeans coming from three directions raided the camels and massacred the camel drivers. I’m the only one to get out alive and tell you what happened.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was still talking, another messenger arrived and said, “Your children were having a party at the home of the oldest brother when a tornado swept in off the desert and struck the house. It collapsed on the young people and they died. I’m the only one to get out alive and tell you what happened.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job got to his feet, ripped his robe, shaved his head, then fell to the ground and worshiped:'
