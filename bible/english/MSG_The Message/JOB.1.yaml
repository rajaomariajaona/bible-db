      text: A Man Devoted to God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Job was a man who lived in Uz. He was honest inside and out, a man of his word, who was totally devoted to God and hated evil with a passion. He had seven sons and three daughters. He was also very wealthy—seven thousand head of sheep, three thousand camels, five hundred teams of oxen, five hundred donkeys, and a huge staff of servants—the most influential man in all the East!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But what do you think would happen if you reached down and took away everything that is his? He’d curse you right to your face, that’s what.”
