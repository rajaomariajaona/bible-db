  '22':
  - type: text
    content: Not once through all this did Job sin; not once did he blame God.
  '4':
  - type: text
    content: His sons used to take turns hosting parties in their homes, always inviting their three sisters to join them in their merrymaking. When the parties were over, Job would get up early in the morning and sacrifice a burnt offering for each of his children, thinking, “Maybe one of them sinned by defying God inwardly.” Job made a habit of this sacrificial atonement, just in case they’d sinned.
  - type: heading
    content: 'The First Test: Family and Fortune'
