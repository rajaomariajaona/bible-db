  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not once through all this did Job sin; not once did he blame God.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His sons used to take turns hosting parties in their homes, always inviting their three sisters to join them in their merrymaking. When the parties were over, Job would get up early in the morning and sacrifice a burnt offering for each of his children, thinking, “Maybe one of them sinned by defying God inwardly.” Job made a habit of this sacrificial atonement, just in case they’d sinned.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The First Test: Family and Fortune'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day when the angels came to report to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', Satan, who was the Designated Accuser, came along with them. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' singled out Satan and said, “What have you been up to?”'
  - type: usfm
    marker: p
    children:
    - type: text
