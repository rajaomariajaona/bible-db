- type: usfm
  marker: s1
  children:
  - type: text
    text: A Man Devoted to God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Job was a man who lived in Uz. He was honest inside and out, a man of his word, who was totally devoted to God and hated evil with a passion. He had seven sons and three daughters. He was also very wealthy—seven thousand head of sheep, three thousand camels, five hundred teams of oxen, five hundred donkeys, and a huge staff of servants—the most influential man in all the East!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: His sons used to take turns hosting parties in their homes, always inviting their three sisters to join them in their merrymaking. When the parties were over, Job would get up early in the morning and sacrifice a burnt offering for each of his children, thinking, “Maybe one of them sinned by defying God inwardly.” Job made a habit of this sacrificial atonement, just in case they’d sinned.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The First Test: Family and Fortune'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'One day when the angels came to report to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Satan, who was the Designated Accuser, came along with them. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' singled out Satan and said, “What have you been up to?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Satan answered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “Going here and there, checking things out on earth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Satan, “Have you noticed my friend Job? There’s no one quite like him—honest and true to his word, totally devoted to God and hating evil.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Satan retorted, “So do you think Job does all that out of the sheer goodness of his heart? Why, no one ever had it so good! You pamper him like a pet, make sure nothing bad ever happens to him or his family or his possessions, bless everything he does—he can’t lose!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “But what do you think would happen if you reached down and took away everything that is his? He’d curse you right to your face, that’s what.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' replied, “We’ll see. Go ahead—do what you want with all that is his. Just don’t hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him.
  - type: text
    text: '” Then Satan left the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: Sometime later, while Job’s children were having one of their parties at the home of the oldest son, a messenger came to Job and said, “The oxen were plowing and the donkeys grazing in the field next to us when Sabeans attacked. They stole the animals and killed the field hands. I’m the only one to get out alive and tell you what happened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: While he was still talking, another messenger arrived and said, “Bolts of lightning struck the sheep and the shepherds and fried them—burned them to a crisp. I’m the only one to get out alive and tell you what happened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: While he was still talking, another messenger arrived and said, “Chaldeans coming from three directions raided the camels and massacred the camel drivers. I’m the only one to get out alive and tell you what happened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: While he was still talking, another messenger arrived and said, “Your children were having a party at the home of the oldest brother when a tornado swept in off the desert and struck the house. It collapsed on the young people and they died. I’m the only one to get out alive and tell you what happened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Job got to his feet, ripped his robe, shaved his head, then fell to the ground and worshiped:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Naked I came from my mother’s womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: naked I’ll return to the womb of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gives, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' takes.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s name be ever blessed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Not once through all this did Job sin; not once did he blame God.
