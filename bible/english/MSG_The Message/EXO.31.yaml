verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bezalel and Oholiab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “See what I’ve done; I’ve personally chosen Bezalel son of Uri, son of Hur of the tribe of Judah. I’ve filled him with the Spirit of God, giving him skill and know-how and expertise in every kind of craft to create designs and work in gold, silver, and bronze; to cut and set gemstones; to carve wood—he’s an all-around craftsman.'
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-17
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell the Israelites, ‘Above all, keep my Sabbaths, the sign between me and you, generation after generation, to keep the knowledge alive that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who makes you holy. Keep the Sabbath; it’s holy to you. Whoever profanes it will most certainly be put to death. Whoever works on it will be excommunicated from the people. There are six days for work but the seventh day is Sabbath, pure rest, holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Anyone who works on the Sabbath will most certainly be put to death. The Israelites will keep the Sabbath, observe Sabbath-keeping down through the generations, as a standing covenant. It’s a fixed sign between me and the Israelites. Yes, because in six days '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made the Heavens and the Earth and on the seventh day he stopped and took a long, deep breath.’”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When he finished speaking with him on Mount Sinai, he gave Moses two tablets of Testimony, slabs of stone, written with the finger of God.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-11
    - type: text
      text: '“Not only that, but I’ve given him Oholiab, son of Ahisamach of the tribe of Dan, to work with him. And to all who have an aptitude for crafts I’ve given the skills to make all the things I’ve commanded you: the Tent of Meeting, the Chest of The Testimony and its Atonement-Cover, all the implements for the Tent, the Table and its implements, the pure Lampstand and all its implements, the Altar of Incense, the Altar of Whole-Burnt-Offering and all its implements, the Washbasin and its base, the official vestments, the holy vestments for Aaron the priest and his sons in their priestly duties, the anointing oil, and the aromatic incense for the Holy Place—they’ll make everything just the way I’ve commanded you.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sabbath
    marker-yv: yv-h
