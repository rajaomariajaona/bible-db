document_id: ISA.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem on Its Last Legs
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is emptying Jerusalem and Judah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of all the basic necessities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plain bread and water to begin with.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s withdrawing police and protection,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: judges and courts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pastors and teachers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: captains and generals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doctors and nurses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and, yes, even the repairmen and jacks-of-all-trades.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says, “I’ll put little kids in charge of the city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Schoolboys and schoolgirls will order everyone around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will be at each other’s throats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'stabbing one another in the back:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neighbor against neighbor, young against old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the no-account against the well-respected.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One brother will grab another and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘You look like you’ve got a head on your shoulders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do something!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get us out of this mess.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he’ll say, ‘Me? Not me! I don’t have a clue.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t put me in charge of anything.’
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: “Reassure the righteous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that their good living will pay off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But doom to the wicked! Disaster!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything they did will be done to them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Skinny kids terrorize my people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Silly girls bully them around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My dear people! Your leaders are taking you down a blind alley.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re sending you off on a wild-goose chase.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A City Brought to Her Knees by Her Sorrows
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' enters the courtroom.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He takes his place at the bench to judge his people.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' calls for order in the court,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'hauls the leaders of his people into the dock:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You’ve played havoc with this country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your houses are stuffed with what you’ve stolen from the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is this anyway? Stomping on my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grinding the faces of the poor into the dirt?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s what the Master,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies, says.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, “Zion women are stuck-up,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prancing around in their high heels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making eyes at all the men in the street,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swinging their hips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tossing their hair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gaudy and garish in cheap jewelry.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Master will fix it so those Zion women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will all turn bald—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scabby, bald-headed women.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Master will do it.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-23
    - type: text
      text: The time is coming when the Master will strip them of their fancy baubles—the dangling earrings, anklets and bracelets, combs and mirrors and silk scarves, diamond brooches and pearl necklaces, the rings on their fingers and the rings on their toes, the latest fashions in hats, exotic perfumes and aphrodisiacs, gowns and capes, all the world’s finest in fabrics and design.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Instead of wearing seductive scents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these women are going to smell like rotting cabbages;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of modeling flowing gowns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll be sporting rags;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of their stylish hairdos,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scruffy heads;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of beauty marks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scabs and scars.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: Your finest fighting men will be killed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your soldiers left dead on the battlefield.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The entrance gate to Zion will be clotted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with people mourning their dead—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A city stooped under the weight of her loss,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brought to her knees by her sorrows.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: “Jerusalem’s on its last legs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah is soon down for the count.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything people say and do
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'is at cross-purposes with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a slap in my face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brazen in their depravity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they flaunt their sins like degenerate Sodom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom to their eternal souls! They’ve made their bed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now they’ll sleep in it.
