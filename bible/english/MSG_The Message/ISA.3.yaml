document_id: ISA.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem on Its Last Legs
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: is emptying Jerusalem and Judah
  - type: text
    content: Of all the basic necessities,
  - type: text
    content: plain bread and water to begin with.
  - type: text
    content: He’s withdrawing police and protection,
  - type: text
    content: judges and courts,
  - type: text
    content: pastors and teachers,
  - type: text
    content: captains and generals,
  - type: text
    content: doctors and nurses,
  - type: text
    content: and, yes, even the repairmen and jacks-of-all-trades.
  - type: text
    content: He says, “I’ll put little kids in charge of the city.
  - type: text
    content: Schoolboys and schoolgirls will order everyone around.
  - type: text
    content: People will be at each other’s throats,
  - type: text
    content: 'stabbing one another in the back:'
  - type: text
    content: Neighbor against neighbor, young against old,
  - type: text
    content: the no-account against the well-respected.
  - type: text
    content: One brother will grab another and say,
  - type: text
    content: ‘You look like you’ve got a head on your shoulders.
  - type: text
    content: Do something!
  - type: text
    content: Get us out of this mess.’
  - type: text
    content: And he’ll say, ‘Me? Not me! I don’t have a clue.
  - type: text
    content: Don’t put me in charge of anything.’
  '10':
  - type: text
    content: “Reassure the righteous
  - type: text
    content: that their good living will pay off.
  - type: text
    content: But doom to the wicked! Disaster!
  - type: text
    content: Everything they did will be done to them.
  '12':
  - type: text
    content: “Skinny kids terrorize my people.
  - type: text
    content: Silly girls bully them around.
  - type: text
    content: My dear people! Your leaders are taking you down a blind alley.
  - type: text
    content: They’re sending you off on a wild-goose chase.”
  - type: heading
    content: A City Brought to Her Knees by Her Sorrows
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' enters the courtroom.'
  - type: text
    content: He takes his place at the bench to judge his people.
  - type: text
    content: God
  - type: text
    content: ' calls for order in the court,'
  - type: text
    content: 'hauls the leaders of his people into the dock:'
  - type: text
    content: “You’ve played havoc with this country.
  - type: text
    content: Your houses are stuffed with what you’ve stolen from the poor.
  - type: text
    content: What is this anyway? Stomping on my people,
  - type: text
    content: grinding the faces of the poor into the dirt?”
  - type: text
    content: That’s what the Master,
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, says.
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' says, “Zion women are stuck-up,'
  - type: text
    content: prancing around in their high heels,
  - type: text
    content: Making eyes at all the men in the street,
  - type: text
    content: swinging their hips,
  - type: text
    content: Tossing their hair,
  - type: text
    content: gaudy and garish in cheap jewelry.”
  - type: text
    content: The Master will fix it so those Zion women
  - type: text
    content: will all turn bald—
  - type: text
    content: Scabby, bald-headed women.
  - type: text
    content: The Master will do it.
  '18':
  - type: text
    content: The time is coming when the Master will strip them of their fancy baubles—the dangling earrings, anklets and bracelets, combs and mirrors and silk scarves, diamond brooches and pearl necklaces, the rings on their fingers and the rings on their toes, the latest fashions in hats, exotic perfumes and aphrodisiacs, gowns and capes, all the world’s finest in fabrics and design.
  '24':
  - type: text
    content: Instead of wearing seductive scents,
  - type: text
    content: these women are going to smell like rotting cabbages;
  - type: text
    content: Instead of modeling flowing gowns,
  - type: text
    content: they’ll be sporting rags;
  - type: text
    content: Instead of their stylish hairdos,
  - type: text
    content: scruffy heads;
  - type: text
    content: Instead of beauty marks,
  - type: text
    content: scabs and scars.
  '25':
  - type: text
    content: Your finest fighting men will be killed,
  - type: text
    content: your soldiers left dead on the battlefield.
  - type: text
    content: The entrance gate to Zion will be clotted
  - type: text
    content: with people mourning their dead—
  - type: text
    content: A city stooped under the weight of her loss,
  - type: text
    content: brought to her knees by her sorrows.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: “Jerusalem’s on its last legs.
  - type: text
    content: Judah is soon down for the count.
  - type: text
    content: Everything people say and do
  - type: text
    content: 'is at cross-purposes with '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: a slap in my face.
  - type: text
    content: Brazen in their depravity,
  - type: text
    content: they flaunt their sins like degenerate Sodom.
  - type: text
    content: Doom to their eternal souls! They’ve made their bed;
  - type: text
    content: now they’ll sleep in it.
