document_id: PRO.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Fools Recycle Silliness
  - type: text
    content: We no more give honors to fools
  - type: text
    content: than pray for snow in summer or rain during harvest.
  '10':
  - type: text
    content: Hire a fool or a drunk
  - type: text
    content: and you shoot yourself in the foot.
  '11':
  - type: text
    content: As a dog eats its own vomit,
  - type: text
    content: so fools recycle silliness.
  '12':
  - type: text
    content: See that man who thinks he’s so smart?
  - type: text
    content: You can expect far more from a fool than from him.
  '13':
  - type: text
    content: Loafers say, “It’s dangerous out there!
  - type: text
    content: Tigers are prowling the streets!”
  - type: text
    content: and then pull the covers back over their heads.
  '14':
  - type: text
    content: Just as a door turns on its hinges,
  - type: text
    content: so a lazybones turns back over in bed.
  '15':
  - type: text
    content: A shiftless sluggard puts his fork in the pie,
  - type: text
    content: but is too lazy to lift it to his mouth.
  - type: heading
    content: Like Glaze on Cracked Pottery
  '16':
  - type: text
    content: Dreamers fantasize their self-importance;
  - type: text
    content: they think they are smarter
  - type: text
    content: than a whole college faculty.
  '17':
  - type: text
    content: You grab a mad dog by the ears
  - type: text
    content: when you butt into a quarrel that’s none of your business.
  '18':
  - type: text
    content: People who shrug off deliberate deceptions,
  - type: text
    content: saying, “I didn’t mean it, I was only joking,”
  - type: text
    content: Are worse than careless campers
  - type: text
    content: who walk away from smoldering campfires.
  '2':
  - type: text
    content: You have as little to fear from an undeserved curse
  - type: text
    content: as from the dart of a wren or the swoop of a swallow.
  '20':
  - type: text
    content: When you run out of wood, the fire goes out;
  - type: text
    content: when the gossip ends, the quarrel dies down.
  '21':
  - type: text
    content: A quarrelsome person in a dispute
  - type: text
    content: is like kerosene thrown on a fire.
  '22':
  - type: text
    content: Listening to gossip is like eating cheap candy;
  - type: text
    content: do you want junk like that in your belly?
  '23':
  - type: text
    content: Smooth talk from an evil heart
  - type: text
    content: is like glaze on cracked pottery.
  '24':
  - type: text
    content: Your enemy shakes hands and greets you like an old friend,
  - type: text
    content: all the while plotting against you.
  - type: text
    content: When he speaks warmly to you, don’t believe him for a minute;
  - type: text
    content: he’s just waiting for the chance to rip you off.
  - type: text
    content: No matter how shrewdly he conceals his malice,
  - type: text
    content: eventually his evil will be exposed in public.
  '27':
  - type: text
    content: Malice backfires;
  - type: text
    content: spite boomerangs.
  '28':
  - type: text
    content: Liars hate their victims;
  - type: text
    content: flatterers sabotage trust.
  '3':
  - type: text
    content: A whip for the racehorse, a tiller for the sailboat—
  - type: text
    content: and a stick for the back of fools!
  '4':
  - type: text
    content: Don’t respond to the stupidity of a fool;
  - type: text
    content: you’ll only look foolish yourself.
  '5':
  - type: text
    content: Answer a fool in simple terms
  - type: text
    content: so he doesn’t get a swelled head.
  '6':
  - type: text
    content: You’re only asking for trouble
  - type: text
    content: when you send a message by a fool.
  '7':
  - type: text
    content: A proverb quoted by fools
  - type: text
    content: is limp as a wet noodle.
  '8':
  - type: text
    content: Putting a fool in a place of honor
  - type: text
    content: is like setting a mud brick on a marble column.
  '9':
  - type: text
    content: To ask a moron to quote a proverb
  - type: text
    content: is like putting a scalpel in the hands of a drunk.
