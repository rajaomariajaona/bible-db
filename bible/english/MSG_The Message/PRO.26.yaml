document_id: PRO.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fools Recycle Silliness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: We no more give honors to fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than pray for snow in summer or rain during harvest.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hire a fool or a drunk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you shoot yourself in the foot.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As a dog eats its own vomit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so fools recycle silliness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: See that man who thinks he’s so smart?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You can expect far more from a fool than from him.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Loafers say, “It’s dangerous out there!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tigers are prowling the streets!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then pull the covers back over their heads.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Just as a door turns on its hinges,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a lazybones turns back over in bed.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A shiftless sluggard puts his fork in the pie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but is too lazy to lift it to his mouth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Like Glaze on Cracked Pottery
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dreamers fantasize their self-importance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they think they are smarter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a whole college faculty.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You grab a mad dog by the ears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you butt into a quarrel that’s none of your business.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: People who shrug off deliberate deceptions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, “I didn’t mean it, I was only joking,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are worse than careless campers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who walk away from smoldering campfires.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have as little to fear from an undeserved curse
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as from the dart of a wren or the swoop of a swallow.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When you run out of wood, the fire goes out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the gossip ends, the quarrel dies down.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: A quarrelsome person in a dispute
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like kerosene thrown on a fire.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Listening to gossip is like eating cheap candy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do you want junk like that in your belly?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Smooth talk from an evil heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like glaze on cracked pottery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-26
    - type: text
      text: Your enemy shakes hands and greets you like an old friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the while plotting against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he speaks warmly to you, don’t believe him for a minute;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s just waiting for the chance to rip you off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No matter how shrewdly he conceals his malice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eventually his evil will be exposed in public.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Malice backfires;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spite boomerangs.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Liars hate their victims;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flatterers sabotage trust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A whip for the racehorse, a tiller for the sailboat—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a stick for the back of fools!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t respond to the stupidity of a fool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll only look foolish yourself.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Answer a fool in simple terms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he doesn’t get a swelled head.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You’re only asking for trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you send a message by a fool.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A proverb quoted by fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is limp as a wet noodle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Putting a fool in a place of honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like setting a mud brick on a marble column.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: To ask a moron to quote a proverb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like putting a scalpel in the hands of a drunk.
