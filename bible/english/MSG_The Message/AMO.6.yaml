document_id: AMO.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Those Who Live Only for Today
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you who think you live on easy street in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who think Mount Samaria is the good life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You assume you’re at the top of the heap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: voted the number-one best place to live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, wake up and look around. Get off your pedestal.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take a look at Calneh.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go and visit Great Hamath.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look in on Gath of the Philistines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doesn’t that take you off your high horse?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Compared to them, you’re not much, are you?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Note well: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' issues the orders.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll knock large houses to smithereens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll smash little houses to bits.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you hold a horse race in a field of rocks?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you plow the sea with oxen?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d cripple the horses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drown the oxen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And yet you’ve made a shambles of justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bloated corpse of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bragging of your trivial pursuits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beating up on the weak and crowing, “Look what I’ve done!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Enjoy it while you can, you Israelites.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve got a pagan army on the move against you”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '—this is your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' speaking, God-of-the-Angel-Armies—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And they’ll make hash of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one end of the country to the other.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you who are rushing headlong to disaster!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Catastrophe is just around the corner!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to those who live in luxury
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and expect everyone else to serve them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to those who live only for today,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: indifferent to the fate of others!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the playboys, the playgirls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who think life is a party held just for them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to those addicted to feeling good—life without pain!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those obsessed with looking good—life without wrinkles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They could not care less
  - type: usfm
    marker: q2
    children:
    - type: text
      text: about their country going to ruin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But here’s what’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: really
    - type: text
      text: ' coming:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a forced march into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll leave the country whining,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rag-tag bunch of good-for-nothings.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You’ve Made a Shambles of Justice
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, has sworn, and solemnly stands by his Word.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The God-of-the-Angel-Armies speaks:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I hate the arrogance of Jacob.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have nothing but contempt for his forts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m about to hand over the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone in it.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ten men are in a house, all dead. A relative comes and gets the bodies to prepare them for a decent burial. He discovers a survivor huddled in a closet and asks, “Are there any more?” The answer: “Not a soul. But hush! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' must not be mentioned in this desecrated place.”'
