document_id: AMO.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Those Who Live Only for Today
  - type: text
    content: Woe to you who think you live on easy street in Zion,
  - type: text
    content: who think Mount Samaria is the good life.
  - type: text
    content: You assume you’re at the top of the heap,
  - type: text
    content: voted the number-one best place to live.
  - type: text
    content: Well, wake up and look around. Get off your pedestal.
  - type: text
    content: Take a look at Calneh.
  - type: text
    content: Go and visit Great Hamath.
  - type: text
    content: Look in on Gath of the Philistines.
  - type: text
    content: Doesn’t that take you off your high horse?
  - type: text
    content: Compared to them, you’re not much, are you?
  '11':
  - type: text
    content: 'Note well: '
  - type: text
    content: God
  - type: text
    content: ' issues the orders.'
  - type: text
    content: He’ll knock large houses to smithereens.
  - type: text
    content: He’ll smash little houses to bits.
  '12':
  - type: text
    content: Do you hold a horse race in a field of rocks?
  - type: text
    content: Do you plow the sea with oxen?
  - type: text
    content: You’d cripple the horses
  - type: text
    content: and drown the oxen.
  - type: text
    content: And yet you’ve made a shambles of justice,
  - type: text
    content: a bloated corpse of righteousness,
  - type: text
    content: Bragging of your trivial pursuits,
  - type: text
    content: beating up on the weak and crowing, “Look what I’ve done!”
  '14':
  - type: text
    content: “Enjoy it while you can, you Israelites.
  - type: text
    content: I’ve got a pagan army on the move against you”
  - type: text
    content: '—this is your '
  - type: text
    content: God
  - type: text
    content: ' speaking, God-of-the-Angel-Armies—'
  - type: text
    content: “And they’ll make hash of you,
  - type: text
    content: from one end of the country to the other.”
  '3':
  - type: text
    content: Woe to you who are rushing headlong to disaster!
  - type: text
    content: Catastrophe is just around the corner!
  - type: text
    content: Woe to those who live in luxury
  - type: text
    content: and expect everyone else to serve them!
  - type: text
    content: Woe to those who live only for today,
  - type: text
    content: indifferent to the fate of others!
  - type: text
    content: Woe to the playboys, the playgirls,
  - type: text
    content: who think life is a party held just for them!
  - type: text
    content: Woe to those addicted to feeling good—life without pain!
  - type: text
    content: those obsessed with looking good—life without wrinkles!
  - type: text
    content: They could not care less
  - type: text
    content: about their country going to ruin.
  '7':
  - type: text
    content: 'But here’s what’s '
  - type: text
    content: really
  - type: text
    content: ' coming:'
  - type: text
    content: a forced march into exile.
  - type: text
    content: They’ll leave the country whining,
  - type: text
    content: a rag-tag bunch of good-for-nothings.
  - type: heading
    content: You’ve Made a Shambles of Justice
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the Master, has sworn, and solemnly stands by his Word.'
  - type: text
    content: 'The God-of-the-Angel-Armies speaks:'
  - type: text
    content: “I hate the arrogance of Jacob.
  - type: text
    content: I have nothing but contempt for his forts.
  - type: text
    content: I’m about to hand over the city
  - type: text
    content: and everyone in it.”
  '9':
  - type: text
    content: 'Ten men are in a house, all dead. A relative comes and gets the bodies to prepare them for a decent burial. He discovers a survivor huddled in a closet and asks, “Are there any more?” The answer: “Not a soul. But hush! '
  - type: text
    content: God
  - type: text
    content: ' must not be mentioned in this desecrated place.”'
