document_id: JOB.31,97
type_code: eng
verses:
  '1':
  - type: heading
    content: What Can I Expect from God?
  - type: text
    content: “I made a solemn pact with myself
  - type: text
    content: never to undress a girl with my eyes.
  - type: text
    content: So what can I expect from God?
  - type: text
    content: What do I deserve from God Almighty above?
  - type: text
    content: Isn’t calamity reserved for the wicked?
  - type: text
    content: Isn’t disaster supposed to strike those who do wrong?
  - type: text
    content: Isn’t God looking, observing how I live?
  - type: text
    content: Doesn’t he mark every step I take?
  '13':
  - type: text
    content: “Have I ever been unfair to my employees
  - type: text
    content: when they brought a complaint to me?
  - type: text
    content: What, then, will I do when God confronts me?
  - type: text
    content: When God examines my books, what can I say?
  - type: text
    content: Didn’t the same God who made me, make them?
  - type: text
    content: Aren’t we all made of the same stuff, equals before God?
  '16':
  - type: text
    content: “Have I ignored the needs of the poor,
  - type: text
    content: turned my back on the indigent,
  - type: text
    content: Taken care of my own needs and fed my own face
  - type: text
    content: while they languished?
  - type: text
    content: Wasn’t my home always open to them?
  - type: text
    content: Weren’t they always welcome at my table?
  '19':
  - type: text
    content: “Have I ever left a poor family shivering in the cold
  - type: text
    content: when they had no warm clothes?
  - type: text
    content: Didn’t the poor bless me when they saw me coming,
  - type: text
    content: knowing I’d brought coats from my closet?
  '21':
  - type: text
    content: “If I’ve ever used my strength and influence
  - type: text
    content: to take advantage of the unfortunate,
  - type: text
    content: Go ahead, break both my arms,
  - type: text
    content: cut off all my fingers!
  - type: text
    content: The fear of God has kept me from these things—
  - type: text
    content: how else could I ever face him?
  - type: heading
    content: If Only Someone Would Give Me a Hearing!
  '24':
  - type: text
    content: “Did I set my heart on making big money
  - type: text
    content: or worship at the bank?
  - type: text
    content: Did I boast about my wealth,
  - type: text
    content: show off because I was well-off?
  - type: text
    content: Was I ever so awed by the sun’s brilliance
  - type: text
    content: and moved by the moon’s beauty
  - type: text
    content: That I let myself become seduced by them
  - type: text
    content: and worshiped them on the sly?
  - type: text
    content: If so, I would deserve the worst of punishments,
  - type: text
    content: for I would be betraying God himself.
  '29':
  - type: text
    content: “Did I ever gloat over my enemy’s ruin?
  - type: text
    content: Or get excited over my rival’s bad luck?
  - type: text
    content: No, I never said a word of detraction,
  - type: text
    content: never cursed them, even under my breath.
  '31':
  - type: text
    content: “Didn’t those who worked for me say,
  - type: text
    content: ‘He fed us well. There were always second helpings’?
  - type: text
    content: And no stranger ever had to spend a night in the street;
  - type: text
    content: my doors were always open to travelers.
  - type: text
    content: Did I hide my sin the way Adam did,
  - type: text
    content: or conceal my guilt behind closed doors
  - type: text
    content: Because I was afraid what people would say,
  - type: text
    content: fearing the gossip of the neighbors so much
  - type: text
    content: That I turned myself into a recluse?
  - type: text
    content: You know good and well that I didn’t.
  '35':
  - type: text
    content: “Oh, if only someone would give me a hearing!
  - type: text
    content: I’ve signed my name to my defense—let the Almighty One answer!
  - type: text
    content: I want to see my indictment in writing.
  - type: text
    content: Anyone’s welcome to read my defense;
  - type: text
    content: I’ll write it on a poster and carry it around town.
  - type: text
    content: I’m prepared to account for every move I’ve ever made—
  - type: text
    content: to anyone and everyone, prince or pauper.
  '38':
  - type: text
    content: “If the very ground that I farm accuses me,
  - type: text
    content: if even the furrows fill with tears from my abuse,
  - type: text
    content: If I’ve ever raped the earth for my own profit
  - type: text
    content: or dispossessed its rightful owners,
  - type: text
    content: Then curse it with thistles instead of wheat,
  - type: text
    content: curse it with weeds instead of barley.”
  - type: text
    content: The words of Job to his three friends were finished.
  '5':
  - type: text
    content: “Have I walked hand in hand with falsehood,
  - type: text
    content: or hung out in the company of deceit?
  - type: text
    content: Weigh me on a set of honest scales
  - type: text
    content: so God has proof of my integrity.
  - type: text
    content: If I’ve strayed off the straight and narrow,
  - type: text
    content: wanted things I had no right to,
  - type: text
    content: messed around with sin,
  - type: text
    content: Go ahead, then—
  - type: text
    content: give my portion to someone who deserves it.
  '9':
  - type: text
    content: “If I’ve let myself be seduced by a woman
  - type: text
    content: and conspired to go to bed with her,
  - type: text
    content: Fine, my wife has every right to go ahead
  - type: text
    content: and sleep with anyone she wants to.
  - type: text
    content: For disgusting behavior like that,
  - type: text
    content: I’d deserve the worst punishment you could hand out.
  - type: text
    content: Adultery is a fire that burns the house down;
  - type: text
    content: I wouldn’t expect anything I count dear to survive it.
