document_id: JOB.31,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What Can I Expect from God?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: “I made a solemn pact with myself
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to undress a girl with my eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So what can I expect from God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What do I deserve from God Almighty above?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t calamity reserved for the wicked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Isn’t disaster supposed to strike those who do wrong?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t God looking, observing how I live?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Doesn’t he mark every step I take?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: “Have I ever been unfair to my employees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they brought a complaint to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What, then, will I do when God confronts me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When God examines my books, what can I say?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Didn’t the same God who made me, make them?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Aren’t we all made of the same stuff, equals before God?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: “Have I ignored the needs of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned my back on the indigent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taken care of my own needs and fed my own face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while they languished?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wasn’t my home always open to them?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Weren’t they always welcome at my table?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: “Have I ever left a poor family shivering in the cold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they had no warm clothes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Didn’t the poor bless me when they saw me coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knowing I’d brought coats from my closet?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: “If I’ve ever used my strength and influence
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take advantage of the unfortunate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, break both my arms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cut off all my fingers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fear of God has kept me from these things—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how else could I ever face him?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If Only Someone Would Give Me a Hearing!
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-28
    - type: text
      text: “Did I set my heart on making big money
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or worship at the bank?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did I boast about my wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show off because I was well-off?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was I ever so awed by the sun’s brilliance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and moved by the moon’s beauty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I let myself become seduced by them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worshiped them on the sly?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If so, I would deserve the worst of punishments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I would be betraying God himself.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-30
    - type: text
      text: “Did I ever gloat over my enemy’s ruin?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or get excited over my rival’s bad luck?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, I never said a word of detraction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never cursed them, even under my breath.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-34
    - type: text
      text: “Didn’t those who worked for me say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘He fed us well. There were always second helpings’?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no stranger ever had to spend a night in the street;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my doors were always open to travelers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did I hide my sin the way Adam did,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or conceal my guilt behind closed doors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I was afraid what people would say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fearing the gossip of the neighbors so much
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I turned myself into a recluse?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You know good and well that I didn’t.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-37
    - type: text
      text: “Oh, if only someone would give me a hearing!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve signed my name to my defense—let the Almighty One answer!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want to see my indictment in writing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone’s welcome to read my defense;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll write it on a poster and carry it around town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m prepared to account for every move I’ve ever made—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to anyone and everyone, prince or pauper.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-40
    - type: text
      text: “If the very ground that I farm accuses me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if even the furrows fill with tears from my abuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I’ve ever raped the earth for my own profit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or dispossessed its rightful owners,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then curse it with thistles instead of wheat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: curse it with weeds instead of barley.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: The words of Job to his three friends were finished.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: “Have I walked hand in hand with falsehood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or hung out in the company of deceit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weigh me on a set of honest scales
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so God has proof of my integrity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I’ve strayed off the straight and narrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wanted things I had no right to,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: messed around with sin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, then—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give my portion to someone who deserves it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: “If I’ve let myself be seduced by a woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and conspired to go to bed with her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fine, my wife has every right to go ahead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sleep with anyone she wants to.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For disgusting behavior like that,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’d deserve the worst punishment you could hand out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adultery is a fire that burns the house down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wouldn’t expect anything I count dear to survive it.
