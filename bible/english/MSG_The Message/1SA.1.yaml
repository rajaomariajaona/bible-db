type_code: eng
verses:
  '1':
  - type: heading
    content: Hannah Pours Out Her Heart to God
  - type: text
    content: There once was a man who lived in Ramathaim. He was descended from the old Zuph family in the Ephraim hills. His name was Elkanah. (He was connected with the Zuphs from Ephraim through his father Jeroham, his grandfather Elihu, and his great-grandfather Tohu.) He had two wives. The first was Hannah; the second was Peninnah. Peninnah had children; Hannah did not.
  '12':
  - type: text
    content: 'It so happened that as she continued in prayer before '
  - type: text
    content: God
  - type: text
    content: ', Eli was watching her closely. Hannah was praying in her heart, silently. Her lips moved, but no sound was heard. Eli jumped to the conclusion that she was drunk. He approached her and said, “You’re drunk! How long do you plan to keep this up? Sober up, woman!”'
  '15':
  - type: text
    content: 'Hannah said, “Oh no, sir—please! I’m a woman brokenhearted. I haven’t been drinking. Not a drop of wine or beer. The only thing I’ve been pouring out is my heart, pouring it out to '
  - type: text
    content: God
  - type: text
    content: . Don’t for a minute think I’m a bad woman. It’s because I’m so desperately unhappy and in such pain that I’ve stayed here so long.”
  '17':
  - type: text
    content: Eli answered her, “Go in peace. And may the God of Israel give you what you have asked of him.”
  '18':
  - type: text
    content: “Think well of me—and pray for me!” she said, and went her way. Then she ate heartily, her face radiant.
  '19':
  - type: text
    content: 'Up before dawn, they worshiped '
  - type: text
    content: God
  - type: text
    content: ' and returned home to Ramah. Elkanah slept with Hannah his wife, and '
  - type: text
    content: God
  - type: text
    content: ' began making the necessary arrangements in response to what she had asked.'
  - type: heading
    content: Dedicating the Child to God
  '20':
  - type: text
    content: 'Before the year was out, Hannah had conceived and given birth to a son. She named him Samuel, explaining, “I asked '
  - type: text
    content: God
  - type: text
    content: ' for him.”'
  '21':
  - type: text
    content: 'When Elkanah next took his family on their annual trip to Shiloh to worship '
  - type: text
    content: God
  - type: text
    content: ', offering sacrifices and keeping his vow, Hannah didn’t go. She told her husband, “After the child is weaned, I’ll bring him myself and present him before '
  - type: text
    content: God
  - type: text
    content: —and that’s where he’ll stay, for good.”
  '23':
  - type: text
    content: 'Elkanah said to his wife, “Do what you think is best. Stay home until you have weaned him. Yes! Let '
  - type: text
    content: God
  - type: text
    content: ' complete what he has begun!”'
  - type: text
    content: So she did. She stayed home and nursed her son until she had weaned him. Then she took him up to Shiloh, bringing also the makings of a generous sacrificial meal—a prize bull, flour, and wine. The child was so young to be sent off!
  '25':
  - type: text
    content: 'They first butchered the bull, then brought the child to Eli. Hannah said, “Excuse me, sir. Would you believe that I’m the very woman who was standing before you at this very spot, praying to '
  - type: text
    content: God
  - type: text
    content: '? I prayed for this child, and '
  - type: text
    content: God
  - type: text
    content: ' gave me what I asked for. And now I have dedicated him to '
  - type: text
    content: God
  - type: text
    content: '. He’s dedicated to '
  - type: text
    content: God
  - type: text
    content: ' for life.”'
  - type: text
    content: 'Then and there, they worshiped '
  - type: text
    content: God
  - type: text
    content: .
  '3':
  - type: text
    content: 'Every year this man went from his hometown up to Shiloh to worship and offer a sacrifice to '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies. Eli and his two sons, Hophni and Phinehas, served as the priests of '
  - type: text
    content: God
  - type: text
    content: ' there. When Elkanah sacrificed, he passed helpings from the sacrificial meal around to his wife Peninnah and all her children, but he always gave an especially generous helping to Hannah because he loved her so much, and because '
  - type: text
    content: God
  - type: text
    content: ' had not given her children. But her rival wife taunted her cruelly, rubbing it in and never letting her forget that '
  - type: text
    content: God
  - type: text
    content: ' had not given her children. This went on year after year. Every time she went to the sanctuary of '
  - type: text
    content: God
  - type: text
    content: ' she could expect to be taunted. Hannah was reduced to tears and had no appetite.'
  '8':
  - type: text
    content: Her husband Elkanah said, “Oh, Hannah, why are you crying? Why aren’t you eating? And why are you so upset? Am I not of more worth to you than ten sons?”
  '9':
  - type: text
    content: 'So Hannah ate. Then she pulled herself together, slipped away quietly, and entered the sanctuary. The priest Eli was on duty at the entrance to '
  - type: text
    content: God
  - type: text
    content: '’s Temple in the customary seat. Crushed in soul, Hannah prayed to '
  - type: text
    content: God
  - type: text
    content: ' and cried and cried—inconsolably. Then she made a vow:'
  - type: text
    content: 'Oh, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: If you’ll take a good, hard look at my pain,
  - type: text
    content: If you’ll quit neglecting me and go into action for me
  - type: text
    content: By giving me a son,
  - type: text
    content: I’ll give him completely, unreservedly to you.
  - type: text
    content: I’ll set him apart for a life of holy discipline.
