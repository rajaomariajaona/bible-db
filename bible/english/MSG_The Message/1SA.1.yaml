document_id: 1SA.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Hannah Pours Out Her Heart to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: There once was a man who lived in Ramathaim. He was descended from the old Zuph family in the Ephraim hills. His name was Elkanah. (He was connected with the Zuphs from Ephraim through his father Jeroham, his grandfather Elihu, and his great-grandfather Tohu.) He had two wives. The first was Hannah; the second was Peninnah. Peninnah had children; Hannah did not.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'It so happened that as she continued in prayer before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', Eli was watching her closely. Hannah was praying in her heart, silently. Her lips moved, but no sound was heard. Eli jumped to the conclusion that she was drunk. He approached her and said, “You’re drunk! How long do you plan to keep this up? Sober up, woman!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: 'Hannah said, “Oh no, sir—please! I’m a woman brokenhearted. I haven’t been drinking. Not a drop of wine or beer. The only thing I’ve been pouring out is my heart, pouring it out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Don’t for a minute think I’m a bad woman. It’s because I’m so desperately unhappy and in such pain that I’ve stayed here so long.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Eli answered her, “Go in peace. And may the God of Israel give you what you have asked of him.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Think well of me—and pray for me!” she said, and went her way. Then she ate heartily, her face radiant.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Up before dawn, they worshiped '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and returned home to Ramah. Elkanah slept with Hannah his wife, and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' began making the necessary arrangements in response to what she had asked.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dedicating the Child to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Before the year was out, Hannah had conceived and given birth to a son. She named him Samuel, explaining, “I asked '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for him.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'When Elkanah next took his family on their annual trip to Shiloh to worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', offering sacrifices and keeping his vow, Hannah didn’t go. She told her husband, “After the child is weaned, I’ll bring him myself and present him before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —and that’s where he’ll stay, for good.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'Elkanah said to his wife, “Do what you think is best. Stay home until you have weaned him. Yes! Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' complete what he has begun!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she did. She stayed home and nursed her son until she had weaned him. Then she took him up to Shiloh, bringing also the makings of a generous sacrificial meal—a prize bull, flour, and wine. The child was so young to be sent off!
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: 'They first butchered the bull, then brought the child to Eli. Hannah said, “Excuse me, sir. Would you believe that I’m the very woman who was standing before you at this very spot, praying to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '? I prayed for this child, and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave me what I asked for. And now I have dedicated him to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. He’s dedicated to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for life.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then and there, they worshiped '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-7
    - type: text
      text: 'Every year this man went from his hometown up to Shiloh to worship and offer a sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies. Eli and his two sons, Hophni and Phinehas, served as the priests of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' there. When Elkanah sacrificed, he passed helpings from the sacrificial meal around to his wife Peninnah and all her children, but he always gave an especially generous helping to Hannah because he loved her so much, and because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had not given her children. But her rival wife taunted her cruelly, rubbing it in and never letting her forget that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had not given her children. This went on year after year. Every time she went to the sanctuary of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' she could expect to be taunted. Hannah was reduced to tears and had no appetite.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Her husband Elkanah said, “Oh, Hannah, why are you crying? Why aren’t you eating? And why are you so upset? Am I not of more worth to you than ten sons?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'So Hannah ate. Then she pulled herself together, slipped away quietly, and entered the sanctuary. The priest Eli was on duty at the entrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Temple in the customary seat. Crushed in soul, Hannah prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and cried and cried—inconsolably. Then she made a vow:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’ll take a good, hard look at my pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’ll quit neglecting me and go into action for me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By giving me a son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give him completely, unreservedly to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll set him apart for a life of holy discipline.
