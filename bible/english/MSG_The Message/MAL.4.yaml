document_id: MAL.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sun of Righteousness Will Dawn
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Count on it: The day is coming, raging like a forest fire. All the arrogant people who do evil things will be burned up like stove wood, burned to a crisp, nothing left but scorched earth and ash—a black day. But for you, sunrise! The sun of righteousness will dawn on those who honor my name, healing radiating from its wings. You will be bursting with energy, like colts frisky and frolicking. And you’ll tromp on the wicked. They’ll be nothing but ashes under your feet on that Day.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies says so.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Remember and keep the revelation I gave through my servant Moses, the revelation I commanded at Horeb for all Israel, all the rules and procedures for right living.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But also look ahead: I’m sending Elijah the prophet to clear the way for the Big Day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —the decisive Judgment Day! He will convince parents to look after their children and children to look up to their parents. If they refuse, I’ll come and put the land under a curse.”
