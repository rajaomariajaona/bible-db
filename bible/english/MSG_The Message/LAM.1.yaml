document_id: LAM.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Worthless, Cheap, Abject!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, oh, oh . . . 
- type: usfm
  marker: q1
  children:
  - type: text
    text: How empty the city, once teeming with people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A widow, this city, once in the front rank of nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: once queen of the ball, she’s now a drudge in the kitchen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She cries herself to sleep each night, tears soaking her pillow.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one’s left among her lovers to sit and hold her hand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her friends have all dumped her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: After years of pain and hard labor, Judah has gone into exile.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She camps out among the nations, never feels at home.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hunted by all, she’s stuck between a rock and a hard place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Zion’s roads weep, empty of pilgrims headed to the feasts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All her city gates are deserted, her priests in despair.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her virgins are sad. How bitter her fate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Her enemies have become her masters. Her foes are living it up
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' laid her low, punishing her repeated rebellions.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her children, prisoners of the enemy, trudge into exile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All beauty has drained from Daughter Zion’s face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her princes are like deer famished for food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: chased to exhaustion by hunters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jerusalem remembers the day she lost everything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when her people fell into enemy hands, and not a soul there to help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Enemies looked on and laughed, laughed at her helpless silence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerusalem, who outsinned the whole world, is an outcast.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All who admired her despise her now that they see beneath the surface.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Miserable, she groans and turns away in shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: She played fast and loose with life, she never considered tomorrow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and now she’s crashed royally, with no one to hold her hand:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Look at my pain, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! And how the enemy cruelly struts.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The enemy reached out to take all her favorite things. She watched
- type: usfm
  marker: q2
  children:
  - type: text
    text: as pagans barged into her Sanctuary, those very people for whom
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you posted orders: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'keep out: this assembly off-limits'
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All the people groaned, so desperate for food, so desperate to stay alive
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that they bartered their favorite things for a bit of breakfast:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', look at me! Worthless, cheap, abject!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “And you passersby, look at me! Have you ever seen anything like this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ever seen pain like my pain, seen what he did to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did to me in his rage?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “He struck me with lightning, skewered me from head to foot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then he set traps all around so I could hardly move.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He left me with nothing—left me sick, and sick of living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “He wove my sins into a rope
- type: usfm
  marker: q2
  children:
  - type: text
    text: and harnessed me to captivity’s yoke.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m goaded by cruel taskmasters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “The Master piled up my best soldiers in a heap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then called in thugs to break their fine young necks.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Master crushed the life out of fair virgin Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “For all this I weep, weep buckets of tears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not a soul within miles around cares for my soul.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My children are wasted, my enemy got his way.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Zion reached out for help, but no one helped.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' ordered Jacob’s enemies to surround him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now no one wants anything to do with Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has right on his side. I’m the one who did wrong.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen everybody! Look at what I’m going through!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My fair young women, my fine young men, all herded into exile!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “I called to my friends; they betrayed me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My priests and my leaders only looked after themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trying but failing to save their own skins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', look at the trouble I’m in! My stomach in knots,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my heart wrecked by a life of rebellion.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Massacres in the streets, starvation in the houses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Oh, listen to my groans. No one listens, no one cares.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When my enemies heard of the trouble you gave me, they cheered.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Bring on Judgment Day! Let them get what I got!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Take a good look at their evil ways and give it to them!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give them what you gave me for my sins.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Groaning in pain, body and soul, I’ve had all I can take.”
