document_id: LAM.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Worthless, Cheap, Abject!
  - type: text
    content: Oh, oh, oh . . . 
  - type: text
    content: How empty the city, once teeming with people.
  - type: text
    content: A widow, this city, once in the front rank of nations,
  - type: text
    content: once queen of the ball, she’s now a drudge in the kitchen.
  '10':
  - type: text
    content: The enemy reached out to take all her favorite things. She watched
  - type: text
    content: as pagans barged into her Sanctuary, those very people for whom
  - type: text
    content: 'you posted orders: '
  - type: text
    content: 'keep out: this assembly off-limits'
  - type: text
    content: .
  '11':
  - type: text
    content: All the people groaned, so desperate for food, so desperate to stay alive
  - type: text
    content: 'that they bartered their favorite things for a bit of breakfast:'
  - type: text
    content: '“O '
  - type: text
    content: God
  - type: text
    content: ', look at me! Worthless, cheap, abject!'
  '12':
  - type: text
    content: “And you passersby, look at me! Have you ever seen anything like this?
  - type: text
    content: Ever seen pain like my pain, seen what he did to me,
  - type: text
    content: 'what '
  - type: text
    content: God
  - type: text
    content: ' did to me in his rage?'
  '13':
  - type: text
    content: “He struck me with lightning, skewered me from head to foot,
  - type: text
    content: then he set traps all around so I could hardly move.
  - type: text
    content: He left me with nothing—left me sick, and sick of living.
  '14':
  - type: text
    content: “He wove my sins into a rope
  - type: text
    content: and harnessed me to captivity’s yoke.
  - type: text
    content: I’m goaded by cruel taskmasters.
  '15':
  - type: text
    content: “The Master piled up my best soldiers in a heap,
  - type: text
    content: then called in thugs to break their fine young necks.
  - type: text
    content: The Master crushed the life out of fair virgin Judah.
  '16':
  - type: text
    content: “For all this I weep, weep buckets of tears,
  - type: text
    content: and not a soul within miles around cares for my soul.
  - type: text
    content: My children are wasted, my enemy got his way.”
  '17':
  - type: text
    content: Zion reached out for help, but no one helped.
  - type: text
    content: God
  - type: text
    content: ' ordered Jacob’s enemies to surround him,'
  - type: text
    content: and now no one wants anything to do with Jerusalem.
  '18':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' has right on his side. I’m the one who did wrong.'
  - type: text
    content: Listen everybody! Look at what I’m going through!
  - type: text
    content: My fair young women, my fine young men, all herded into exile!
  '19':
  - type: text
    content: “I called to my friends; they betrayed me.
  - type: text
    content: My priests and my leaders only looked after themselves,
  - type: text
    content: trying but failing to save their own skins.
  '2':
  - type: text
    content: She cries herself to sleep each night, tears soaking her pillow.
  - type: text
    content: No one’s left among her lovers to sit and hold her hand.
  - type: text
    content: Her friends have all dumped her.
  '20':
  - type: text
    content: '“O '
  - type: text
    content: God
  - type: text
    content: ', look at the trouble I’m in! My stomach in knots,'
  - type: text
    content: my heart wrecked by a life of rebellion.
  - type: text
    content: Massacres in the streets, starvation in the houses.
  '21':
  - type: text
    content: “Oh, listen to my groans. No one listens, no one cares.
  - type: text
    content: When my enemies heard of the trouble you gave me, they cheered.
  - type: text
    content: Bring on Judgment Day! Let them get what I got!
  '22':
  - type: text
    content: “Take a good look at their evil ways and give it to them!
  - type: text
    content: Give them what you gave me for my sins.
  - type: text
    content: Groaning in pain, body and soul, I’ve had all I can take.”
  '3':
  - type: text
    content: After years of pain and hard labor, Judah has gone into exile.
  - type: text
    content: She camps out among the nations, never feels at home.
  - type: text
    content: Hunted by all, she’s stuck between a rock and a hard place.
  '4':
  - type: text
    content: Zion’s roads weep, empty of pilgrims headed to the feasts.
  - type: text
    content: All her city gates are deserted, her priests in despair.
  - type: text
    content: Her virgins are sad. How bitter her fate.
  '5':
  - type: text
    content: Her enemies have become her masters. Her foes are living it up
  - type: text
    content: 'because '
  - type: text
    content: God
  - type: text
    content: ' laid her low, punishing her repeated rebellions.'
  - type: text
    content: Her children, prisoners of the enemy, trudge into exile.
  '6':
  - type: text
    content: All beauty has drained from Daughter Zion’s face.
  - type: text
    content: Her princes are like deer famished for food,
  - type: text
    content: chased to exhaustion by hunters.
  '7':
  - type: text
    content: Jerusalem remembers the day she lost everything,
  - type: text
    content: when her people fell into enemy hands, and not a soul there to help.
  - type: text
    content: Enemies looked on and laughed, laughed at her helpless silence.
  '8':
  - type: text
    content: Jerusalem, who outsinned the whole world, is an outcast.
  - type: text
    content: All who admired her despise her now that they see beneath the surface.
  - type: text
    content: Miserable, she groans and turns away in shame.
  '9':
  - type: text
    content: She played fast and loose with life, she never considered tomorrow,
  - type: text
    content: 'and now she’s crashed royally, with no one to hold her hand:'
  - type: text
    content: '“Look at my pain, O '
  - type: text
    content: God
  - type: text
    content: '! And how the enemy cruelly struts.”'
