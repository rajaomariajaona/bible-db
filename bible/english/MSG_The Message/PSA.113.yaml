document_id: PSA.113,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'You who serve '
  - type: text
    content: God
  - type: text
    content: ', praise '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Just to speak his name is praise!
  - type: text
    content: 'Just to remember '
  - type: text
    content: God
  - type: text
    content: ' is a blessing—'
  - type: text
    content: now and tomorrow and always.
  - type: text
    content: From east to west, from dawn to dusk,
  - type: text
    content: 'keep lifting all your praises to '
  - type: text
    content: God
  - type: text
    content: '!'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is higher than anything and anyone,'
  - type: text
    content: outshining everything you can see in the skies.
  - type: text
    content: 'Who can compare with '
  - type: text
    content: God
  - type: text
    content: ', our God,'
  - type: text
    content: so majestically enthroned,
  - type: text
    content: Surveying his magnificent
  - type: text
    content: heavens and earth?
  - type: text
    content: He picks up the poor from out of the dirt,
  - type: text
    content: rescues the forgotten who’ve been thrown out with the trash,
  - type: text
    content: Seats them among the honored guests,
  - type: text
    content: a place of honor among the brightest and best.
  - type: text
    content: He gives childless couples a family,
  - type: text
    content: gives them joy as the parents of children.
  - type: text
    content: Hallelujah!
