document_id: EZK.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Story of Two Lions
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'Sing the blues over the princes of Israel. Say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a lioness was your mother
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among lions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She crouched in a pride of young lions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her cubs grew large.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She reared one of her cubs to maturity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a robust young lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He learned to hunt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He ate men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations sounded the alarm.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He was caught in a trap.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They took him with hooks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dragged him to Egypt.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-14
    - type: text
      text: 'Here’s another way to put it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your mother was like a vine in a vineyard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: transplanted alongside streams of water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Luxurious in branches and grapes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the ample water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It grew sturdy branches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit to be carved into a royal scepter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It grew high, reaching into the clouds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its branches filled the horizon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone could see it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then it was ripped up in a rage
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thrown to the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hot east wind shriveled it up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stripped its fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sturdy branches dried out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit for nothing but kindling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now it’s a stick stuck out in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bare stick in a desert of death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good for nothing but making fires,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: campfires in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a hint now of those sturdy branches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit for use as a royal scepter!
  - type: usfm
    marker: m
    children:
    - type: text
      text: (This is a sad song, a text for singing the blues.)
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: When the lioness saw she was luckless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that her hope for that cub was gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She took her other cub
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made him a strong young lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He prowled with the lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a robust young lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He learned to hunt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He ate men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rampaged through their defenses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left their cities in ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The country and everyone in it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was terrorized by the roars of the lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations got together to hunt him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everyone joined the hunt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set out their traps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and caught him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They put a wooden collar on him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and took him to the king of Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more would that voice be heard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disturbing the peace in the mountains of Israel!
