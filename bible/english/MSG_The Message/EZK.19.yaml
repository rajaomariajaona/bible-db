document_id: EZK.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Story of Two Lions
  - type: text
    content: 'Sing the blues over the princes of Israel. Say:'
  - type: text
    content: What a lioness was your mother
  - type: text
    content: among lions!
  - type: text
    content: She crouched in a pride of young lions.
  - type: text
    content: Her cubs grew large.
  - type: text
    content: She reared one of her cubs to maturity,
  - type: text
    content: a robust young lion.
  - type: text
    content: He learned to hunt.
  - type: text
    content: He ate men.
  - type: text
    content: Nations sounded the alarm.
  - type: text
    content: He was caught in a trap.
  - type: text
    content: They took him with hooks
  - type: text
    content: and dragged him to Egypt.
  '10':
  - type: text
    content: 'Here’s another way to put it:'
  - type: text
    content: Your mother was like a vine in a vineyard,
  - type: text
    content: transplanted alongside streams of water,
  - type: text
    content: Luxurious in branches and grapes
  - type: text
    content: because of the ample water.
  - type: text
    content: It grew sturdy branches
  - type: text
    content: fit to be carved into a royal scepter.
  - type: text
    content: It grew high, reaching into the clouds.
  - type: text
    content: Its branches filled the horizon,
  - type: text
    content: and everyone could see it.
  - type: text
    content: Then it was ripped up in a rage
  - type: text
    content: and thrown to the ground.
  - type: text
    content: The hot east wind shriveled it up
  - type: text
    content: and stripped its fruit.
  - type: text
    content: The sturdy branches dried out,
  - type: text
    content: fit for nothing but kindling.
  - type: text
    content: Now it’s a stick stuck out in the desert,
  - type: text
    content: a bare stick in a desert of death,
  - type: text
    content: Good for nothing but making fires,
  - type: text
    content: campfires in the desert.
  - type: text
    content: Not a hint now of those sturdy branches
  - type: text
    content: fit for use as a royal scepter!
  - type: text
    content: (This is a sad song, a text for singing the blues.)
  '5':
  - type: text
    content: When the lioness saw she was luckless,
  - type: text
    content: that her hope for that cub was gone,
  - type: text
    content: She took her other cub
  - type: text
    content: and made him a strong young lion.
  - type: text
    content: He prowled with the lions,
  - type: text
    content: a robust young lion.
  - type: text
    content: He learned to hunt.
  - type: text
    content: He ate men.
  - type: text
    content: He rampaged through their defenses,
  - type: text
    content: left their cities in ruins.
  - type: text
    content: The country and everyone in it
  - type: text
    content: was terrorized by the roars of the lion.
  - type: text
    content: The nations got together to hunt him.
  - type: text
    content: Everyone joined the hunt.
  - type: text
    content: They set out their traps
  - type: text
    content: and caught him.
  - type: text
    content: They put a wooden collar on him
  - type: text
    content: and took him to the king of Babylon.
  - type: text
    content: No more would that voice be heard
  - type: text
    content: disturbing the peace in the mountains of Israel!
