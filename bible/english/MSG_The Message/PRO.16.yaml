document_id: PRO.16,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Everything with a Place and a Purpose
  - type: text
    content: Mortals make elaborate plans,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ' has the last word.'
  '10':
  - type: text
    content: A good leader motivates,
  - type: text
    content: doesn’t mislead, doesn’t exploit.
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' cares about honesty in the workplace;'
  - type: text
    content: your business is his business.
  '12':
  - type: text
    content: Good leaders abhor wrongdoing of all kinds;
  - type: text
    content: sound leadership has a moral foundation.
  '13':
  - type: text
    content: Good leaders cultivate honest speech;
  - type: text
    content: they love advisors who tell them the truth.
  '14':
  - type: text
    content: An intemperate leader wreaks havoc in lives;
  - type: text
    content: you’re smart to stay clear of someone like that.
  '15':
  - type: text
    content: Good-tempered leaders invigorate lives;
  - type: text
    content: they’re like spring rain and sunshine.
  '16':
  - type: text
    content: Get wisdom—it’s worth more than money;
  - type: text
    content: choose insight over income every time.
  '17':
  - type: text
    content: The road of right living bypasses evil;
  - type: text
    content: watch your step and save your life.
  '18':
  - type: text
    content: First pride, then the crash—
  - type: text
    content: the bigger the ego, the harder the fall.
  '19':
  - type: text
    content: It’s better to live humbly among the poor
  - type: text
    content: than to live it up among the rich and famous.
  '2':
  - type: text
    content: Humans are satisfied with whatever looks good;
  - type: text
    content: God
  - type: text
    content: ' probes for what '
  - type: text
    content: is
  - type: text
    content: ' good.'
  '20':
  - type: text
    content: It pays to take life seriously;
  - type: text
    content: 'things work out when you trust in '
  - type: text
    content: God
  - type: text
    content: .
  '21':
  - type: text
    content: A wise person gets known for insight;
  - type: text
    content: gracious words add to one’s reputation.
  '22':
  - type: text
    content: True intelligence is a spring of fresh water,
  - type: text
    content: while fools sweat it out the hard way.
  '23':
  - type: text
    content: They make a lot of sense, these wise folks;
  - type: text
    content: whenever they speak, their reputation increases.
  '24':
  - type: text
    content: Gracious speech is like clover honey—
  - type: text
    content: good taste to the soul, quick energy for the body.
  '25':
  - type: text
    content: There’s a way that looks harmless enough;
  - type: text
    content: look again—it leads straight to hell.
  '26':
  - type: text
    content: Appetite is an incentive to work;
  - type: text
    content: hunger makes you work all the harder.
  '27':
  - type: text
    content: Mean people spread mean gossip;
  - type: text
    content: their words smart and burn.
  '28':
  - type: text
    content: Troublemakers start fights;
  - type: text
    content: gossips break up friendships.
  '29':
  - type: text
    content: Calloused climbers betray their very own friends;
  - type: text
    content: they’d stab their own grandmothers in the back.
  '3':
  - type: text
    content: 'Put '
  - type: text
    content: God
  - type: text
    content: ' in charge of your work,'
  - type: text
    content: then what you’ve planned will take place.
  '30':
  - type: text
    content: A shifty eye betrays an evil intention;
  - type: text
    content: a clenched jaw signals trouble ahead.
  '31':
  - type: text
    content: Gray hair is a mark of distinction,
  - type: text
    content: the award for a God-loyal life.
  '32':
  - type: text
    content: Moderation is better than muscle,
  - type: text
    content: self-control better than political power.
  '33':
  - type: text
    content: Make your motions and cast your votes,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ' has the final say.'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' made everything with a place and purpose;'
  - type: text
    content: 'even the wicked are included—but for '
  - type: text
    content: judgment.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' can’t stomach arrogance or pretense;'
  - type: text
    content: believe me, he’ll put those braggarts in their place.
  '6':
  - type: text
    content: Guilt is banished through love and truth;
  - type: text
    content: Fear-of-
  - type: text
    content: God
  - type: text
    content: ' deflects evil.'
  '7':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' approves of your life,'
  - type: text
    content: even your enemies will end up shaking your hand.
  '8':
  - type: text
    content: Far better to be right and poor
  - type: text
    content: than to be wrong and rich.
  '9':
  - type: text
    content: We plan the way we want to live,
  - type: text
    content: 'but only '
  - type: text
    content: God
  - type: text
    content: ' makes us able to live it.'
  - type: heading
    content: It Pays to Take Life Seriously
