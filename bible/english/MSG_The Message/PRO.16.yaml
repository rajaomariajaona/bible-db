document_id: PRO.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Everything with a Place and a Purpose
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mortals make elaborate plans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has the last word.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good leader motivates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doesn’t mislead, doesn’t exploit.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' cares about honesty in the workplace;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your business is his business.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good leaders abhor wrongdoing of all kinds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sound leadership has a moral foundation.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good leaders cultivate honest speech;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they love advisors who tell them the truth.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An intemperate leader wreaks havoc in lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re smart to stay clear of someone like that.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good-tempered leaders invigorate lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re like spring rain and sunshine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get wisdom—it’s worth more than money;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: choose insight over income every time.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The road of right living bypasses evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watch your step and save your life.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First pride, then the crash—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bigger the ego, the harder the fall.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to live humbly among the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to live it up among the rich and famous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Humans are satisfied with whatever looks good;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' probes for what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It pays to take life seriously;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'things work out when you trust in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise person gets known for insight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gracious words add to one’s reputation.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True intelligence is a spring of fresh water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while fools sweat it out the hard way.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They make a lot of sense, these wise folks;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whenever they speak, their reputation increases.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gracious speech is like clover honey—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good taste to the soul, quick energy for the body.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s a way that looks harmless enough;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look again—it leads straight to hell.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appetite is an incentive to work;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hunger makes you work all the harder.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mean people spread mean gossip;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their words smart and burn.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Troublemakers start fights;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gossips break up friendships.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calloused climbers betray their very own friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’d stab their own grandmothers in the back.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Put '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in charge of your work,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then what you’ve planned will take place.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A shifty eye betrays an evil intention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a clenched jaw signals trouble ahead.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gray hair is a mark of distinction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the award for a God-loyal life.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moderation is better than muscle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: self-control better than political power.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make your motions and cast your votes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has the final say.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made everything with a place and purpose;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'even the wicked are included—but for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: judgment.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' can’t stomach arrogance or pretense;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: believe me, he’ll put those braggarts in their place.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guilt is banished through love and truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' deflects evil.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' approves of your life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even your enemies will end up shaking your hand.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far better to be right and poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to be wrong and rich.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We plan the way we want to live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but only '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' makes us able to live it.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: It Pays to Take Life Seriously
    marker-yv: yv-h
