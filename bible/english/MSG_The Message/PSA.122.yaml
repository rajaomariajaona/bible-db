  - type: text
    text: Pray for Jerusalem’s peace!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prosperity to all you Jerusalem-lovers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Friendly insiders, get along!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hostile outsiders, keep your distance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the sake of my family and friends,
- type: usfm
  marker: q2
  children:
