verses:
  '1':
  - type: text
    content: 'When they said, “Let’s go to the house of '
  - type: text
    content: God
  - type: text
    content: ',”'
  - type: text
    content: my heart leaped for joy.
  - type: text
    content: And now we’re here, O Jerusalem,
  - type: text
    content: inside Jerusalem’s walls!
  '3':
  - type: text
    content: Jerusalem, well-built city,
  - type: text
    content: built as a place for worship!
  - type: text
    content: The city to which the tribes ascend,
  - type: text
    content: 'all '
  - type: text
    content: God
  - type: text
    content: ’s tribes go up to worship,
  - type: text
    content: 'To give thanks to the name of '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: this
  - type: text
    content: ' is what it means to be Israel.'
  - type: text
    content: Thrones for righteous judgment
  - type: text
    content: are set there, famous David-thrones.
  '6':
  - type: text
    content: Pray for Jerusalem’s peace!
  - type: text
    content: Prosperity to all you Jerusalem-lovers!
  - type: text
    content: Friendly insiders, get along!
  - type: text
    content: Hostile outsiders, keep your distance!
  - type: text
    content: For the sake of my family and friends,
  - type: text
    content: 'I say it again: live in peace!'
  - type: text
    content: 'For the sake of the house of our God, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I’ll do my very best for you.
