document_id: ISA.41,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Do You Feel Like a Lowly Worm?
  - type: text
    content: “Quiet down, far-flung ocean islands. Listen!
  - type: text
    content: Sit down and rest, everyone. Recover your strength.
  - type: text
    content: Gather around me. Say what’s on your heart.
  - type: text
    content: Together let’s decide what’s right.
  '11':
  - type: text
    content: '“Count on it: Everyone who had it in for you'
  - type: text
    content: will end up out in the cold—
  - type: text
    content: real losers.
  - type: text
    content: Those who worked against you
  - type: text
    content: will end up empty-handed—
  - type: text
    content: nothing to show for their lives.
  - type: text
    content: When you go out looking for your old adversaries
  - type: text
    content: you won’t find them—
  - type: text
    content: Not a trace of your old enemies,
  - type: text
    content: not even a memory.
  - type: text
    content: 'That’s right. Because I, your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: have a firm grip on you and I’m not letting go.
  - type: text
    content: I’m telling you, ‘Don’t panic.
  - type: text
    content: I’m right here to help you.’
  '14':
  - type: text
    content: “Do you feel like a lowly worm, Jacob?
  - type: text
    content: Don’t be afraid.
  - type: text
    content: Feel like a fragile insect, Israel?
  - type: text
    content: I’ll help you.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', want to reassure you.'
  - type: text
    content: The God who buys you back, The Holy of Israel.
  - type: text
    content: I’m transforming you from worm to harrow,
  - type: text
    content: from insect to iron.
  - type: text
    content: As a sharp-toothed harrow you’ll smooth out the mountains,
  - type: text
    content: turn those tough old hills into loamy soil.
  - type: text
    content: You’ll open the rough ground to the weather,
  - type: text
    content: to the blasts of sun and wind and rain.
  - type: text
    content: But you’ll be confident and exuberant,
  - type: text
    content: expansive in The Holy of Israel!
  '17':
  - type: text
    content: “The poor and homeless are desperate for water,
  - type: text
    content: their tongues parched and no water to be found.
  - type: text
    content: 'But '
  - type: text
    content: I’m
  - type: text
    content: ' there to be found, I’m there for them,'
  - type: text
    content: and I, God of Israel, will not leave them thirsty.
  - type: text
    content: I’ll open up rivers for them on the barren hills,
  - type: text
    content: spout fountains in the valleys.
  - type: text
    content: I’ll turn the baked-clay badlands into a cool pond,
  - type: text
    content: the waterless waste into splashing creeks.
  - type: text
    content: I’ll plant the red cedar in that treeless wasteland,
  - type: text
    content: also acacia, myrtle, and olive.
  - type: text
    content: I’ll place the cypress in the desert,
  - type: text
    content: with plenty of oaks and pines.
  - type: text
    content: Everyone will see this. No one can miss it—
  - type: text
    content: unavoidable, indisputable evidence
  - type: text
    content: 'That I, '
  - type: text
    content: God
  - type: text
    content: ', personally did this.'
  - type: text
    content: It’s created and signed by The Holy of Israel.
  '2':
  - type: text
    content: “Who got things rolling here,
  - type: text
    content: got this champion from the east on the move?
  - type: text
    content: Who recruited him for this job,
  - type: text
    content: then rounded up and corralled the nations
  - type: text
    content: so he could run roughshod over kings?
  - type: text
    content: He’s off and running,
  - type: text
    content: pulverizing nations into dust,
  - type: text
    content: leaving only stubble and chaff in his wake.
  - type: text
    content: He chases them and comes through unscathed,
  - type: text
    content: his feet scarcely touching the path.
  '21':
  - type: text
    content: '“Set out your case for your gods,” says '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: “Bring your evidence,” says the King of Jacob.
  - type: text
    content: “Take the stand on behalf of your idols, offer arguments,
  - type: text
    content: assemble reasons.
  - type: text
    content: Spread out the facts before us
  - type: text
    content: so that we can assess them ourselves.
  - type: text
    content: Ask them, ‘If you are gods, explain what the past means—
  - type: text
    content: or, failing that, tell us what will happen in the future.
  - type: text
    content: Can’t do that?
  - type: text
    content: How about doing something—anything!
  - type: text
    content: Good or bad—whatever.
  - type: text
    content: Can you hurt us or help us? Do we need to be afraid?’
  - type: text
    content: 'They say nothing, because they '
  - type: text
    content: are
  - type: text
    content: ' nothing—'
  - type: text
    content: sham gods, no-gods, fool-making gods.
  '25':
  - type: text
    content: “I, God, started someone out from the north and he’s come.
  - type: text
    content: He was called out of the east by name.
  - type: text
    content: He’ll stomp the rulers into the mud
  - type: text
    content: the way a potter works the clay.
  - type: text
    content: Let me ask you, Did anyone guess that this might happen?
  - type: text
    content: Did anyone tell us earlier so we might confirm it
  - type: text
    content: with ‘Yes, he’s right!’?
  - type: text
    content: No one mentioned it, no one announced it,
  - type: text
    content: no one heard a peep out of you.
  - type: text
    content: But I told Zion all about this beforehand.
  - type: text
    content: I gave Jerusalem a preacher of good news.
  - type: text
    content: But around here there’s no one—
  - type: text
    content: no one who knows what’s going on.
  - type: text
    content: I ask, but no one can tell me the score.
  - type: text
    content: Nothing here. It’s all smoke and hot air—
  - type: text
    content: sham gods, hollow gods, no-gods.”
  '4':
  - type: text
    content: “Who did this? Who made it happen?
  - type: text
    content: Who always gets things started?
  - type: text
    content: 'I did. '
  - type: text
    content: God
  - type: text
    content: . I’m first on the scene.
  - type: text
    content: I’m also the last to leave.
  '5':
  - type: text
    content: “Far-flung ocean islands see it and panic.
  - type: text
    content: The ends of the earth are shaken.
  - type: text
    content: Fearfully they huddle together.
  - type: text
    content: They try to help each other out,
  - type: text
    content: making up stories in the dark.
  - type: text
    content: The godmakers in the workshops
  - type: text
    content: go into overtime production, crafting new models of no-gods,
  - type: text
    content: Urging one another on—‘Good job!’ ‘Great design!’—
  - type: text
    content: pounding in nails at the base
  - type: text
    content: so that the things won’t tip over.
  '8':
  - type: text
    content: “But you, Israel, are my servant.
  - type: text
    content: You’re Jacob, my first choice,
  - type: text
    content: descendants of my good friend Abraham.
  - type: text
    content: I pulled you in from all over the world,
  - type: text
    content: called you in from every dark corner of the earth,
  - type: text
    content: Telling you, ‘You’re my servant, serving on my side.
  - type: text
    content: I’ve picked you. I haven’t dropped you.’
  - type: text
    content: Don’t panic. I’m with you.
  - type: text
    content: There’s no need to fear for I’m your God.
  - type: text
    content: I’ll give you strength. I’ll help you.
  - type: text
    content: I’ll hold you steady, keep a firm grip on you.
