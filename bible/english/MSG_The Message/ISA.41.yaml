document_id: ISA.41,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do You Feel Like a Lowly Worm?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Quiet down, far-flung ocean islands. Listen!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sit down and rest, everyone. Recover your strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather around me. Say what’s on your heart.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together let’s decide what’s right.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Count on it: Everyone who had it in for you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will end up out in the cold—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: real losers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who worked against you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will end up empty-handed—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing to show for their lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you go out looking for your old adversaries
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you won’t find them—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a trace of your old enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not even a memory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That’s right. Because I, your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have a firm grip on you and I’m not letting go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m telling you, ‘Don’t panic.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m right here to help you.’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you feel like a lowly worm, Jacob?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t be afraid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feel like a fragile insect, Israel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll help you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', want to reassure you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God who buys you back, The Holy of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m transforming you from worm to harrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from insect to iron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a sharp-toothed harrow you’ll smooth out the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn those tough old hills into loamy soil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll open the rough ground to the weather,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the blasts of sun and wind and rain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you’ll be confident and exuberant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: expansive in The Holy of Israel!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The poor and homeless are desperate for water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their tongues parched and no water to be found.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I’m
    - type: text
      text: ' there to be found, I’m there for them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I, God of Israel, will not leave them thirsty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll open up rivers for them on the barren hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spout fountains in the valleys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll turn the baked-clay badlands into a cool pond,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waterless waste into splashing creeks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll plant the red cedar in that treeless wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: also acacia, myrtle, and olive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll place the cypress in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with plenty of oaks and pines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone will see this. No one can miss it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unavoidable, indisputable evidence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', personally did this.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s created and signed by The Holy of Israel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who got things rolling here,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: got this champion from the east on the move?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who recruited him for this job,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then rounded up and corralled the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he could run roughshod over kings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s off and running,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pulverizing nations into dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving only stubble and chaff in his wake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He chases them and comes through unscathed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his feet scarcely touching the path.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Set out your case for your gods,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Bring your evidence,” says the King of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take the stand on behalf of your idols, offer arguments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: assemble reasons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spread out the facts before us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that we can assess them ourselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask them, ‘If you are gods, explain what the past means—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or, failing that, tell us what will happen in the future.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t do that?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How about doing something—anything!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good or bad—whatever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you hurt us or help us? Do we need to be afraid?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They say nothing, because they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' nothing—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sham gods, no-gods, fool-making gods.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I, God, started someone out from the north and he’s come.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He was called out of the east by name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll stomp the rulers into the mud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the way a potter works the clay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me ask you, Did anyone guess that this might happen?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Did anyone tell us earlier so we might confirm it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with ‘Yes, he’s right!’?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one mentioned it, no one announced it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one heard a peep out of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I told Zion all about this beforehand.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I gave Jerusalem a preacher of good news.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But around here there’s no one—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who knows what’s going on.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I ask, but no one can tell me the score.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing here. It’s all smoke and hot air—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sham gods, hollow gods, no-gods.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who did this? Who made it happen?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who always gets things started?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I did. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . I’m first on the scene.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m also the last to leave.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Far-flung ocean islands see it and panic.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The ends of the earth are shaken.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fearfully they huddle together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They try to help each other out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making up stories in the dark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godmakers in the workshops
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go into overtime production, crafting new models of no-gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Urging one another on—‘Good job!’ ‘Great design!’—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pounding in nails at the base
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that the things won’t tip over.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you, Israel, are my servant.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re Jacob, my first choice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: descendants of my good friend Abraham.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I pulled you in from all over the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called you in from every dark corner of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telling you, ‘You’re my servant, serving on my side.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve picked you. I haven’t dropped you.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t panic. I’m with you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s no need to fear for I’m your God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give you strength. I’ll help you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll hold you steady, keep a firm grip on you.
