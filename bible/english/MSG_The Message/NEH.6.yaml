document_id: NEH.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “I’m Doing a Great Work; I Can’t Come Down”
  - type: text
    content: ' When Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies heard that I had rebuilt the wall and that there were no more breaks in it—even though I hadn’t yet installed the gates—Sanballat and Geshem sent this message: “Come and meet with us at Kephirim in the valley of Ono.”'
  '10':
  - type: text
    content: 'Then I met secretly with Shemaiah son of Delaiah, the son of Mehetabel, at his house. He said:'
  - type: text
    content: Let’s meet at the house of God,
  - type: text
    content: inside The Temple;
  - type: text
    content: Let’s find safety behind locked doors
  - type: text
    content: because they’re coming to kill you,
  - type: text
    content: Yes, coming by night to kill you.
  '11':
  - type: text
    content: I said, “Why would a man like me run for cover? And why would a man like me use The Temple as a hideout? I won’t do it.”
  '12':
  - type: text
    content: I sensed that God hadn’t sent this man. The so-called prophecy he spoke to me was the work of Tobiah and Sanballat; they had hired him. He had been hired to scare me off—trick me—a layman, into desecrating The Temple and ruining my good reputation so they could accuse me.
  '14':
  - type: text
    content: “O my God, don’t let Tobiah and Sanballat get by with all the mischief they’ve done. And the same goes for the prophetess Noadiah and the other prophets who have been trying to undermine my confidence.”
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: The wall was finished on the twenty-fifth day of Elul. It had taken fifty-two days. When all our enemies heard the news and all the surrounding nations saw it, our enemies totally lost their nerve. They knew that God was behind this work.
  '17':
  - type: text
    content: All during this time letters were going back and forth constantly between the nobles of Judah and Tobiah. Many of the nobles had ties to him because he was son-in-law to Shecaniah son of Arah and his son Jehohanan had married the daughter of Meshullam son of Berekiah. They kept telling me all the good things he did and then would report back to him anything I would say. And then Tobiah would send letters to intimidate me.
  '2':
  - type: text
    content: ' I knew they were scheming to hurt me so I sent messengers back with this: “I’m doing a great work; I can’t come down. Why should the work come to a standstill just so I can come down to see you?”'
  '4':
  - type: text
    content: Four times they sent this message and four times I gave them my answer.
  '5':
  - type: text
    content: ' The fifth time—same messenger, same message—Sanballat sent an unsealed letter with this message:'
  '6':
  - type: text
    content: ' “The word is out among the nations—and Geshem says it’s true—that you and the Jews are planning to rebel. That’s why you are rebuilding the wall. The word is that you want to be king and that you have appointed prophets to announce in Jerusalem, ‘There’s a king in Judah!’ The king is going to be told all this—don’t you think we should sit down and have a talk?”'
  '8':
  - type: text
    content: 'I sent him back this: “There’s nothing to what you’re saying. You’ve made it all up.”'
  '9':
  - type: text
    content: They were trying to intimidate us into quitting. They thought, “They’ll give up; they’ll never finish it.”
  - type: text
    content: I prayed, “Give me strength.”
  - type: text
    content: '* * *'
