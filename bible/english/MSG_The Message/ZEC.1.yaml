  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'In the eighth month of the second year in the reign of Darius, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to the prophet Zechariah son of Berechiah, son of Iddo: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was very angry with your ancestors. So give to the people this Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies: ‘Come back to me and I’ll come back to you. Don’t be like your parents. The old-time prophets called out to them, “A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies: Leave your evil life. Quit your evil practices.” But they ignored everything I said to them, stubbornly refused to listen.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: “And where are your ancestors now? Dead and buried. And the prophets who preached to them? Also dead and buried. But the Message that my servants the prophets spoke, that isn’t dead and buried. That Message did its work on your ancestors, did it not? It woke them up and they came back, saying, ‘He did what he said he would do, sure enough. We didn’t get by with a thing.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'First Vision: Four Riders'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On the twenty-fourth day of the eleventh month in the second year of the reign of Darius, the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was given to the prophet Zechariah son of Berechiah, son of Iddo:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: One night I looked out and saw a man astride a red horse. He was in the shadows in a grove of birches. Behind him were more horses—a red, a chestnut, and a white.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I said, “Sir, what are these horses doing here? What’s the meaning of this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The Angel-Messenger said, “Let me show you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the rider in the birch grove spoke up, “These are the riders that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent to check things out on earth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They reported their findings to the Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the birch grove: “We have looked over the whole earth and all is well. Everything’s under control.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The Angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' reported back, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, how long are you going to stay angry with Jerusalem and the cities of Judah? When are you going to let up? Isn’t seventy years long enough?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' reassured the Angel-Messenger—good words, comforting words—who then addressed me: “Tell them this. Tell them that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies has spoken. This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: ‘I care deeply for Jerusalem and Zion. I feel very possessive of them. But I’m thoroughly angry with the godless nations that act as if they own the whole world. I was only moderately angry earlier, but now they’ve gone too far. I’m going into action.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: “‘I’ve come back to Jerusalem, but with compassion this time.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' speaking.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I’ll see to it that my Temple is rebuilt.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The rebuilding operation is already staked out.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Say it again—a Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘My cities will prosper again,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will comfort Zion again,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem will be back in my favor again.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Second Vision: Four Horns and Four Blacksmiths'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I looked up, and was surprised by another vision: four horns!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I asked the Messenger-Angel, “And what’s the meaning of this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “These are the powers that have scattered Judah, Israel, and Jerusalem abroad.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' expanded the vision to include four blacksmiths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I asked, “And what are these all about?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “Since the ‘horns’ scattered Judah so badly that no one had any hope left, these blacksmiths have arrived to combat the horns. They’ll dehorn the godless nations who used their horns to scatter Judah to the four winds.”
