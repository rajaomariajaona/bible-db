document_id: ZEC.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the eighth month of the second year in the reign of Darius, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to the prophet Zechariah son of Berechiah, son of Iddo: “'
  - type: text
    content: God
  - type: text
    content: ' was very angry with your ancestors. So give to the people this Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies: ‘Come back to me and I’ll come back to you. Don’t be like your parents. The old-time prophets called out to them, “A Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies: Leave your evil life. Quit your evil practices.” But they ignored everything I said to them, stubbornly refused to listen.’'
  '10':
  - type: text
    content: 'Then the rider in the birch grove spoke up, “These are the riders that '
  - type: text
    content: God
  - type: text
    content: ' sent to check things out on earth.”'
  '11':
  - type: text
    content: 'They reported their findings to the Angel of '
  - type: text
    content: God
  - type: text
    content: ' in the birch grove: “We have looked over the whole earth and all is well. Everything’s under control.”'
  '12':
  - type: text
    content: 'The Angel of '
  - type: text
    content: God
  - type: text
    content: ' reported back, “O '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, how long are you going to stay angry with Jerusalem and the cities of Judah? When are you going to let up? Isn’t seventy years long enough?”
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' reassured the Angel-Messenger—good words, comforting words—who then addressed me: “Tell them this. Tell them that '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies has spoken. This is '
  - type: text
    content: God
  - type: text
    content: '’s Message: ‘I care deeply for Jerusalem and Zion. I feel very possessive of them. But I’m thoroughly angry with the godless nations that act as if they own the whole world. I was only moderately angry earlier, but now they’ve gone too far. I’m going into action.'
  '16':
  - type: text
    content: “‘I’ve come back to Jerusalem, but with compassion this time.’
  - type: text
    content: 'This is '
  - type: text
    content: God
  - type: text
    content: ' speaking.'
  - type: text
    content: ‘I’ll see to it that my Temple is rebuilt.’
  - type: text
    content: 'A Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: ‘The rebuilding operation is already staked out.’
  - type: text
    content: 'Say it again—a Decree of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: ‘My cities will prosper again,
  - type: text
    content: God
  - type: text
    content: ' will comfort Zion again,'
  - type: text
    content: Jerusalem will be back in my favor again.’”
  - type: heading
    content: 'Second Vision: Four Horns and Four Blacksmiths'
  '18':
  - type: text
    content: 'I looked up, and was surprised by another vision: four horns!'
  '19':
  - type: text
    content: I asked the Messenger-Angel, “And what’s the meaning of this?”
  - type: text
    content: He said, “These are the powers that have scattered Judah, Israel, and Jerusalem abroad.”
  '20':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' expanded the vision to include four blacksmiths.'
  '21':
  - type: text
    content: I asked, “And what are these all about?”
  - type: text
    content: He said, “Since the ‘horns’ scattered Judah so badly that no one had any hope left, these blacksmiths have arrived to combat the horns. They’ll dehorn the godless nations who used their horns to scatter Judah to the four winds.”
  '5':
  - type: text
    content: “And where are your ancestors now? Dead and buried. And the prophets who preached to them? Also dead and buried. But the Message that my servants the prophets spoke, that isn’t dead and buried. That Message did its work on your ancestors, did it not? It woke them up and they came back, saying, ‘He did what he said he would do, sure enough. We didn’t get by with a thing.’”
  - type: heading
    content: 'First Vision: Four Riders'
  '7':
  - type: text
    content: 'On the twenty-fourth day of the eleventh month in the second year of the reign of Darius, the Message of '
  - type: text
    content: God
  - type: text
    content: ' was given to the prophet Zechariah son of Berechiah, son of Iddo:'
  '8':
  - type: text
    content: One night I looked out and saw a man astride a red horse. He was in the shadows in a grove of birches. Behind him were more horses—a red, a chestnut, and a white.
  '9':
  - type: text
    content: I said, “Sir, what are these horses doing here? What’s the meaning of this?”
  - type: text
    content: The Angel-Messenger said, “Let me show you.”
