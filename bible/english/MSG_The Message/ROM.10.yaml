document_id: ROM.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Reduced to Religion
  - type: text
    content: 'Believe me, friends, all I want for Israel is what’s best for Israel: salvation, nothing less. I want it with all my heart and pray to God for it all the time. I readily admit that the Jews are impressively energetic regarding God—but they are doing everything exactly backward. They don’t seem to realize that this comprehensive setting-things-right that is salvation is '
  - type: text
    content: God’s
  - type: text
    content: ' business, and a most flourishing business it is. Right across the street they set up their own salvation shops and noisily peddle their knockoffs. After all these years of refusing to really deal with God on his terms, insisting instead on making their own deals, they have nothing to show for it.'
  '11':
  - type: text
    content: 'Scripture reassures us, “No one who trusts God like this—heart and soul—will ever regret it.” It’s exactly the same no matter what a person’s religious background may be: the same God for all of us, acting the same incredibly generous way to everyone who calls out for help. “Everyone who calls, ‘Help, God!’ gets help.”'
  '14':
  - type: text
    content: But how can people call for help if they don’t know who to trust? And how can they know who to trust if they haven’t heard of the One who can be trusted? And how can they hear if nobody tells them? And how is anyone going to tell them, unless someone is sent to do it? That’s why Scripture exclaims,
  - type: text
    content: A sight to take your breath away!
  - type: text
    content: Grand processions of people
  - type: text
    content: telling all the good things of God!
  - type: text
    content: 'But not everybody is ready for this, ready to see and hear and act. Isaiah asked what we all ask at one time or another: “Does anyone care, God? Is anyone listening and believing a word of it?” The point is: Before you trust, you have to listen. But unless Christ’s Word is preached, there’s nothing to listen to.'
  '18':
  - type: text
    content: 'But haven’t there been plenty of opportunities for Israel to listen and understand what’s going on? '
  - type: text
    content: Plenty
  - type: text
    content: ', I’d say.'
  - type: text
    content: Preachers’ voices have gone ’round the world,
  - type: text
    content: Their message to earth’s seven seas.
  - type: text
    content: So the big question is, Why didn’t Israel understand that she had no corner on this message? Moses had it right when he predicted,
  - type: text
    content: When you see God reach out to those
  - type: text
    content: you consider your inferiors—outsiders!—
  - type: text
    content: you’ll become insanely jealous.
  - type: text
    content: When you see God reach out to people
  - type: text
    content: you think are religiously stupid,
  - type: text
    content: you’ll throw temper tantrums.
  - type: text
    content: 'Isaiah dared to speak out these words of God:'
  - type: text
    content: People found and welcomed me
  - type: text
    content: who never so much as looked for me.
  - type: text
    content: And I found and welcomed people
  - type: text
    content: who had never even asked about me.
  - type: text
    content: 'Then he capped it with a damning indictment:'
  - type: text
    content: Day after day after day,
  - type: text
    content: I beckoned Israel with open arms,
  - type: text
    content: And got nothing for my trouble
  - type: text
    content: but cold shoulders and icy stares.
  '4':
  - type: text
    content: The earlier revelation was intended simply to get us ready for the Messiah, who then puts everything right for those who trust him to do it. Moses wrote that anyone who insists on using the law code to live right before God soon discovers it’s not so easy—every detail of life regulated by fine print! But trusting God to shape the right living in us is a different story—no precarious climb up to heaven to recruit the Messiah, no dangerous descent into hell to rescue the Messiah. So what exactly was Moses saying?
  - type: text
    content: The word that saves is right here,
  - type: text
    content: as near as the tongue in your mouth,
  - type: text
    content: as close as the heart in your chest.
  - type: text
    content: 'It’s the word of faith that welcomes God to go to work and set things right for us. This is the core of our preaching. Say the welcoming word to God—“Jesus is my Master”—embracing, body and soul, God’s work of doing in us what he did in raising Jesus from the dead. That’s it. You’re not “doing” anything; you’re simply calling out to God, trusting him to do it for you. That’s salvation. With your whole being you embrace God setting things right, and then you say it, right out loud: “God has set everything right between him and me!”'
