    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Son of man, face Ammon and preach against the people: Listen to the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say: Because you cheered when my Sanctuary was desecrated and the land of Judah was devastated and the people of Israel were taken into exile, I’m giving you over to the people of the east. They’ll move in and make themselves at home, eating the food right off your tables and drinking your milk. I’ll turn your capital, Rabbah, into pasture for camels and all your villages into corrals for flocks. Then you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, Because you clapped and cheered, venting all your malicious contempt against the land of Israel, I’ll step in and hand you out as loot—first come, first served. I’ll cross you off the roster of nations. There’ll be nothing left of you. And you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: Because Moab said, ‘Look, Judah’s nothing special,’ I’ll lay wide open the flank of Moab by exposing its lovely frontier villages to attack: Beth-jeshimoth, Baal-meon, and Kiriathaim. I’ll lump Moab in with Ammon and give them to the people of the east for the taking. Ammon won’t be heard from again. I’ll punish Moab severely. And they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: Because Edom reacted against the people of Judah in spiteful revenge and was so criminally vengeful against them, therefore I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, will oppose Edom and kill the lot of them, people and animals both. I’ll waste it—corpses stretched from Teman to Dedan. I’ll use my people Israel to bring my vengeance down on Edom. My wrath will fuel their action. And they’ll realize it’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my
  - type: text
    text: ' vengeance. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the Master.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: Because the Philistines were so spitefully vengeful—all those centuries of stored-up malice!—and did their best to destroy Judah, therefore I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, will oppose the Philistines and cut down the Cretans and anybody else left along the seacoast. Huge acts of vengeance, massive punishments! When I bring vengeance, they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
