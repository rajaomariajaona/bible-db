document_id: PSA.105,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Thank '
  - type: text
    content: God
  - type: text
    content: '! Pray to him by name!'
  - type: text
    content: Tell everyone you meet what he has done!
  - type: text
    content: Sing him songs, belt out hymns,
  - type: text
    content: translate his wonders into music!
  - type: text
    content: Honor his holy name with Hallelujahs,
  - type: text
    content: 'you who seek '
  - type: text
    content: God
  - type: text
    content: . Live a happy life!
  - type: text
    content: 'Keep your eyes open for '
  - type: text
    content: God
  - type: text
    content: ', watch for his works;'
  - type: text
    content: be alert for signs of his presence.
  - type: text
    content: Remember the world of wonders he has made,
  - type: text
    content: his miracles, and the verdicts he’s rendered—
  - type: text
    content: O seed of Abraham, his servant,
  - type: text
    content: O child of Jacob, his chosen.
  '16':
  - type: text
    content: Then he called down a famine on the country,
  - type: text
    content: he broke every last blade of wheat.
  - type: text
    content: 'But he sent a man on ahead:'
  - type: text
    content: Joseph, sold as a slave.
  - type: text
    content: They put cruel chains on his ankles,
  - type: text
    content: an iron collar around his neck,
  - type: text
    content: Until God’s word came to the Pharaoh,
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' confirmed his promise.'
  - type: text
    content: God sent the king to release him.
  - type: text
    content: The Pharaoh set Joseph free;
  - type: text
    content: He appointed him master of his palace,
  - type: text
    content: put him in charge of all his business
  - type: text
    content: To personally instruct his princes
  - type: text
    content: and train his advisors in wisdom.
  '23':
  - type: text
    content: Then Israel entered Egypt,
  - type: text
    content: Jacob immigrated to the Land of Ham.
  - type: text
    content: God gave his people lots of babies;
  - type: text
    content: soon their numbers alarmed their foes.
  - type: text
    content: He turned the Egyptians against his people;
  - type: text
    content: they abused and cheated God’s servants.
  - type: text
    content: Then he sent his servant Moses,
  - type: text
    content: and Aaron, whom he also chose.
  - type: text
    content: They worked marvels in that spiritual wasteland,
  - type: text
    content: miracles in the Land of Ham.
  - type: text
    content: He spoke, “Darkness!” and it turned dark—
  - type: text
    content: they couldn’t see what they were doing.
  - type: text
    content: He turned all their water to blood
  - type: text
    content: so that all their fish died;
  - type: text
    content: He made frogs swarm through the land,
  - type: text
    content: even into the king’s bedroom;
  - type: text
    content: He gave the word and flies swarmed,
  - type: text
    content: gnats filled the air.
  - type: text
    content: He substituted hail for rain,
  - type: text
    content: he stabbed their land with lightning;
  - type: text
    content: He wasted their vines and fig trees,
  - type: text
    content: smashed their groves of trees to splinters;
  - type: text
    content: With a word he brought in locusts,
  - type: text
    content: millions of locusts, armies of locusts;
  - type: text
    content: They consumed every blade of grass in the country
  - type: text
    content: and picked the ground clean of produce;
  - type: text
    content: He struck down every firstborn in the land,
  - type: text
    content: the first fruits of their virile powers.
  - type: text
    content: He led Israel out, their arms filled with loot,
  - type: text
    content: and not one among his tribes even stumbled.
  - type: text
    content: Egypt was glad to have them go—
  - type: text
    content: they were scared to death of them.
  - type: text
    content: God spread a cloud to keep them cool through the day
  - type: text
    content: and a fire to light their way through the night;
  - type: text
    content: They prayed and he brought quail,
  - type: text
    content: filled them with the bread of heaven;
  - type: text
    content: He opened the rock and water poured out;
  - type: text
    content: it flowed like a river through that desert—
  - type: text
    content: All because he remembered his Covenant,
  - type: text
    content: his promise to Abraham, his servant.
  '43':
  - type: text
    content: Remember this! He led his people out singing for joy;
  - type: text
    content: his chosen people marched, singing their hearts out!
  - type: text
    content: He made them a gift of the country they entered,
  - type: text
    content: helped them seize the wealth of the nations
  - type: text
    content: So they could do everything he told them—
  - type: text
    content: could follow his instructions to the letter.
  - type: text
    content: Hallelujah!
  '7':
  - type: text
    content: 'He’s '
  - type: text
    content: God
  - type: text
    content: ', our God,'
  - type: text
    content: in charge of the whole earth.
  - type: text
    content: And he remembers, remembers his Covenant—
  - type: text
    content: for a thousand generations he’s been as good as his word.
  - type: text
    content: It’s the Covenant he made with Abraham,
  - type: text
    content: the same oath he swore to Isaac,
  - type: text
    content: The very statute he established with Jacob,
  - type: text
    content: the eternal Covenant with Israel,
  - type: text
    content: Namely, “I give you the land.
  - type: text
    content: Canaan is your hill-country inheritance.”
  - type: text
    content: When they didn’t count for much,
  - type: text
    content: a mere handful, and strangers at that,
  - type: text
    content: Wandering from country to country,
  - type: text
    content: drifting from pillar to post,
  - type: text
    content: He permitted no one to abuse them.
  - type: text
    content: 'He told kings to keep their hands off:'
  - type: text
    content: “Don’t you dare lay a hand on my anointed,
  - type: text
    content: don’t hurt a hair on the heads of my prophets.”
