document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: Hallelujah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Pray to him by name!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell everyone you meet what he has done!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing him songs, belt out hymns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: translate his wonders into music!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Honor his holy name with Hallelujahs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you who seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Live a happy life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Keep your eyes open for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', watch for his works;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: be alert for signs of his presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember the world of wonders he has made,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his miracles, and the verdicts he’s rendered—
- type: usfm
  marker: q3
  children:
  - type: text
    text: O seed of Abraham, his servant,
- type: usfm
  marker: q3
  children:
  - type: text
    text: O child of Jacob, his chosen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-15
  - type: text
    text: 'He’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in charge of the whole earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he remembers, remembers his Covenant—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a thousand generations he’s been as good as his word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s the Covenant he made with Abraham,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the same oath he swore to Isaac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very statute he established with Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the eternal Covenant with Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namely, “I give you the land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Canaan is your hill-country inheritance.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they didn’t count for much,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a mere handful, and strangers at that,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wandering from country to country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drifting from pillar to post,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He permitted no one to abuse them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He told kings to keep their hands off:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t you dare lay a hand on my anointed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t hurt a hair on the heads of my prophets.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-22
  - type: text
    text: Then he called down a famine on the country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he broke every last blade of wheat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he sent a man on ahead:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Joseph, sold as a slave.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They put cruel chains on his ankles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an iron collar around his neck,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until God’s word came to the Pharaoh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' confirmed his promise.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God sent the king to release him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Pharaoh set Joseph free;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He appointed him master of his palace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put him in charge of all his business
- type: usfm
  marker: q1
  children:
  - type: text
    text: To personally instruct his princes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and train his advisors in wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-42
  - type: text
    text: Then Israel entered Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob immigrated to the Land of Ham.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God gave his people lots of babies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: soon their numbers alarmed their foes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turned the Egyptians against his people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they abused and cheated God’s servants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he sent his servant Moses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Aaron, whom he also chose.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They worked marvels in that spiritual wasteland,
- type: usfm
  marker: q2
  children:
  - type: text
    text: miracles in the Land of Ham.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He spoke, “Darkness!” and it turned dark—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they couldn’t see what they were doing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turned all their water to blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that all their fish died;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He made frogs swarm through the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even into the king’s bedroom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gave the word and flies swarmed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gnats filled the air.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He substituted hail for rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stabbed their land with lightning;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wasted their vines and fig trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: smashed their groves of trees to splinters;
- type: usfm
  marker: q1
  children:
  - type: text
    text: With a word he brought in locusts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: millions of locusts, armies of locusts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They consumed every blade of grass in the country
- type: usfm
  marker: q2
  children:
  - type: text
    text: and picked the ground clean of produce;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He struck down every firstborn in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the first fruits of their virile powers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He led Israel out, their arms filled with loot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not one among his tribes even stumbled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Egypt was glad to have them go—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were scared to death of them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God spread a cloud to keep them cool through the day
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a fire to light their way through the night;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They prayed and he brought quail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filled them with the bread of heaven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He opened the rock and water poured out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it flowed like a river through that desert—
- type: usfm
  marker: q1
  children:
  - type: text
    text: All because he remembered his Covenant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his promise to Abraham, his servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-45
  - type: text
    text: Remember this! He led his people out singing for joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his chosen people marched, singing their hearts out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He made them a gift of the country they entered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: helped them seize the wealth of the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they could do everything he told them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: could follow his instructions to the letter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah!
