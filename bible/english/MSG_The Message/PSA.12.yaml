document_id: PSA.12
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Quick, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', I need your helping hand!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The last decent person just went down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the friends I depended on gone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone talks in lie language;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lies slide off their oily lips.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They doubletalk with forked tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Slice their lips off their faces! Pull
- type: usfm
  marker: q1
  children:
  - type: text
    text: The braggart tongues from their mouths!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m tired of hearing, “We can talk anyone into anything!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our lips manage the world.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Into the hovels of the poor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Into the dark streets where the homeless groan, God speaks:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve had enough; I’m on my way
- type: usfm
  marker: q1
  children:
  - type: text
    text: To heal the ache in the heart of the wretched.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: God’s words are pure words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pure silver words refined seven times
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the fires of his word-kiln,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pure on earth as well as in heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', keep us safe from their lies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the wicked who stalk us with lies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the wicked who collect honors
- type: usfm
  marker: q1
  children:
  - type: text
    text: For their wonderful lies.
