document_id: PSA.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Quick, '
  - type: text
    content: God
  - type: text
    content: ', I need your helping hand!'
  - type: text
    content: The last decent person just went down,
  - type: text
    content: All the friends I depended on gone.
  - type: text
    content: Everyone talks in lie language;
  - type: text
    content: Lies slide off their oily lips.
  - type: text
    content: They doubletalk with forked tongues.
  '3':
  - type: text
    content: Slice their lips off their faces! Pull
  - type: text
    content: The braggart tongues from their mouths!
  - type: text
    content: I’m tired of hearing, “We can talk anyone into anything!
  - type: text
    content: Our lips manage the world.”
  '5':
  - type: text
    content: Into the hovels of the poor,
  - type: text
    content: 'Into the dark streets where the homeless groan, God speaks:'
  - type: text
    content: “I’ve had enough; I’m on my way
  - type: text
    content: To heal the ache in the heart of the wretched.”
  '6':
  - type: text
    content: God’s words are pure words,
  - type: text
    content: Pure silver words refined seven times
  - type: text
    content: In the fires of his word-kiln,
  - type: text
    content: Pure on earth as well as in heaven.
  - type: text
    content: God
  - type: text
    content: ', keep us safe from their lies,'
  - type: text
    content: From the wicked who stalk us with lies,
  - type: text
    content: From the wicked who collect honors
  - type: text
    content: For their wonderful lies.
