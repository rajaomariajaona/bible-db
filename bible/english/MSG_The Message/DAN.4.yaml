document_id: DAN.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Dream of a Chopped-Down Tree
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'King Nebuchadnezzar to everyone, everywhere—every race, color, and creed: “Peace and prosperity to all! It is my privilege to report to you the gracious miracles that the High God has done for me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “His miracles are staggering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wonders are surprising.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His kingdom lasts and lasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his sovereign rule goes on forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: “I, Nebuchadnezzar, was at home taking it easy in my palace, without a care in the world. But as I was stretched out on my bed I had a dream that scared me—a nightmare that shook me. I sent for all the wise men of Babylon so that they could interpret the dream for me. When they were all assembled—magicians, enchanters, fortunetellers, witches—I told them the dream. None could tell me what it meant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And then Daniel came in. His Babylonian name is Belteshazzar, named after my god, a man full of the divine Holy Spirit. I told him my dream.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “‘Belteshazzar,’ I said, ‘chief of the magicians, I know that you are a man full of the divine Holy Spirit and that there is no mystery that you can’t solve. Listen to this dream that I had and interpret it for me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: “‘This is what I saw as I was stretched out on my bed. I saw a big towering tree at the center of the world. As I watched, the tree grew huge and strong. Its top reached the sky and it could be seen from the four corners of the earth. Its leaves were beautiful, its fruit abundant—enough food for everyone! Wild animals found shelter under it, birds nested in its branches, everything living was fed and sheltered by it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15a
  - type: text
    text: ' “‘And this also is what I saw as I was stretched out on my bed. I saw a holy watchman descend from heaven, and call out:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Chop down the tree, lop off its branches,
- type: usfm
  marker: q3
  children:
  - type: text
    text: strip its leaves and scatter its fruit.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Chase the animals from beneath it
- type: usfm
  marker: q3
  children:
  - type: text
    text: and shoo the birds from its branches.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But leave the stump and roots in the ground,
- type: usfm
  marker: q3
  children:
  - type: text
    text: belted with a strap of iron and bronze in the grassy meadow.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-16
  - type: text
    text: ' Let him be soaked in heaven’s dew'
- type: usfm
  marker: q3
  children:
  - type: text
    text: and take his meals with the animals that graze.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let him lose his mind
- type: usfm
  marker: q3
  children:
  - type: text
    text: and get an animal’s mind in exchange,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let this go on
- type: usfm
  marker: q3
  children:
  - type: text
    text: for seven seasons.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The angels announce this decree,
- type: usfm
  marker: q3
  children:
  - type: text
    text: the holy watchmen bring this sentence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that everyone living will know
- type: usfm
  marker: q3
  children:
  - type: text
    text: that the High God rules human kingdoms.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He arranges kingdom affairs however he wishes,
- type: usfm
  marker: q3
  children:
  - type: text
    text: and makes leaders out of losers.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “‘This is what I, King Nebuchadnezzar, dreamed. It’s your turn, Belteshazzar—interpret it for me. None of the wise men of Babylon could make heads or tails of it, but I’m sure you can do it. You’re full of the divine Holy Spirit.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: “You Will Graze on Grass Like an Ox”
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: At first Daniel, who had been renamed Belteshazzar in Babylon, was upset. The thoughts that came swarming into his mind terrified him.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Belteshazzar,” the king said, “stay calm. Don’t let the dream and its interpretation scare you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “My master,” said Belteshazzar, “I wish this dream were about your enemies and its interpretation for your foes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: “The tree you saw that grew so large and sturdy with its top touching the sky, visible from the four corners of the world; the tree with the luxuriant foliage and abundant fruit, enough for everyone; the tree under which animals took cover and in which birds built nests—you, O king, are that tree.
- type: usfm
  marker: p
  children:
  - type: text
    text: “You have grown great and strong. Your royal majesty reaches sky-high, and your sovereign rule stretches to the four corners of the world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: '“But the part about the holy angel descending from heaven and proclaiming, ‘Chop down the tree, destroy it, but leave stump and roots in the ground belted with a strap of iron and bronze in the grassy meadow; let him be soaked with heaven’s dew and take his meals with the grazing animals for seven seasons’—this, O king, also refers to you. It means that the High God has sentenced my master the king: You will be driven away from human company and live with the wild animals. You will graze on grass like an ox. You will be soaked in heaven’s dew. This will go on for seven seasons, and you will learn that the High God rules over human kingdoms and that he arranges all kingdom affairs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “The part about the tree stump and roots being left means that your kingdom will still be there for you after you learn that it is heaven that runs things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“So, king, take my advice: Make a clean break with your sins and start living for others. Quit your wicked life and look after the needs of the down-and-out. Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' will continue to have a good life.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Loss and Regaining of a Mind and a Kingdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: All this happened to King Nebuchadnezzar. Just twelve months later, he was walking on the balcony of the royal palace in Babylon and boasted, “Look at this, Babylon the great! And I built it all by myself, a royal palace adequate to display my honor and glory!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: 'The words were no sooner out of his mouth than a voice out of heaven spoke, “This is the verdict on you, King Nebuchadnezzar: Your kingdom is taken from you. You will be driven out of human company and live with the wild animals. You will eat grass like an ox. The sentence is for seven seasons, enough time to learn that the High God rules human kingdoms and puts whomever he wishes in charge.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: It happened at once. Nebuchadnezzar was driven out of human company, ate grass like an ox, and was soaked in heaven’s dew. His hair grew like the feathers of an eagle and his nails like the claws of a hawk.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: '“At the end of the seven years, I, Nebuchadnezzar, looked to heaven. I was given my mind back and I blessed the High God, thanking and glorifying God, who lives forever:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “His sovereign rule lasts and lasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his kingdom never declines and falls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Life on this earth doesn’t add up to much,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God’s heavenly army keeps everything going.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one can interrupt his work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one can call his rule into question.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: '“At the same time that I was given back my mind, I was also given back my majesty and splendor, making my kingdom shine. All the leaders and important people came looking for me. I was reestablished as king in my kingdom and became greater than ever. And that’s why I’m singing—I, Nebuchadnezzar—singing and praising the King of Heaven:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Everything he does is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he does it the right way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He knows how to turn a proud person
- type: usfm
  marker: q2
  children:
  - type: text
    text: into a humble man or woman.”
