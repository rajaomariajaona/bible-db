verses:
  '1':
  - type: heading
    content: A Dream of a Chopped-Down Tree
  - type: text
    content: 'King Nebuchadnezzar to everyone, everywhere—every race, color, and creed: “Peace and prosperity to all! It is my privilege to report to you the gracious miracles that the High God has done for me.'
  '10':
  - type: text
    content: “‘This is what I saw as I was stretched out on my bed. I saw a big towering tree at the center of the world. As I watched, the tree grew huge and strong. Its top reached the sky and it could be seen from the four corners of the earth. Its leaves were beautiful, its fruit abundant—enough food for everyone! Wild animals found shelter under it, birds nested in its branches, everything living was fed and sheltered by it.
  '13':
  - type: text
    content: ' “‘And this also is what I saw as I was stretched out on my bed. I saw a holy watchman descend from heaven, and call out:'
  - type: text
    content: Chop down the tree, lop off its branches,
  - type: text
    content: strip its leaves and scatter its fruit.
  - type: text
    content: Chase the animals from beneath it
  - type: text
    content: and shoo the birds from its branches.
  - type: text
    content: But leave the stump and roots in the ground,
  - type: text
    content: belted with a strap of iron and bronze in the grassy meadow.
  '15':
  - type: text
    content: ' Let him be soaked in heaven’s dew'
  - type: text
    content: and take his meals with the animals that graze.
  - type: text
    content: Let him lose his mind
  - type: text
    content: and get an animal’s mind in exchange,
  - type: text
    content: And let this go on
  - type: text
    content: for seven seasons.
  '17':
  - type: text
    content: The angels announce this decree,
  - type: text
    content: the holy watchmen bring this sentence,
  - type: text
    content: So that everyone living will know
  - type: text
    content: that the High God rules human kingdoms.
  - type: text
    content: He arranges kingdom affairs however he wishes,
  - type: text
    content: and makes leaders out of losers.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: “‘This is what I, King Nebuchadnezzar, dreamed. It’s your turn, Belteshazzar—interpret it for me. None of the wise men of Babylon could make heads or tails of it, but I’m sure you can do it. You’re full of the divine Holy Spirit.’”
  - type: heading
    content: “You Will Graze on Grass Like an Ox”
  '19':
  - type: text
    content: At first Daniel, who had been renamed Belteshazzar in Babylon, was upset. The thoughts that came swarming into his mind terrified him.
  - type: text
    content: “Belteshazzar,” the king said, “stay calm. Don’t let the dream and its interpretation scare you.”
  - type: text
    content: “My master,” said Belteshazzar, “I wish this dream were about your enemies and its interpretation for your foes.
  '20':
  - type: text
    content: “The tree you saw that grew so large and sturdy with its top touching the sky, visible from the four corners of the world; the tree with the luxuriant foliage and abundant fruit, enough for everyone; the tree under which animals took cover and in which birds built nests—you, O king, are that tree.
  - type: text
    content: “You have grown great and strong. Your royal majesty reaches sky-high, and your sovereign rule stretches to the four corners of the world.
  '23':
  - type: text
    content: '“But the part about the holy angel descending from heaven and proclaiming, ‘Chop down the tree, destroy it, but leave stump and roots in the ground belted with a strap of iron and bronze in the grassy meadow; let him be soaked with heaven’s dew and take his meals with the grazing animals for seven seasons’—this, O king, also refers to you. It means that the High God has sentenced my master the king: You will be driven away from human company and live with the wild animals. You will graze on grass like an ox. You will be soaked in heaven’s dew. This will go on for seven seasons, and you will learn that the High God rules over human kingdoms and that he arranges all kingdom affairs.'
  '26':
  - type: text
    content: “The part about the tree stump and roots being left means that your kingdom will still be there for you after you learn that it is heaven that runs things.
  '27':
  - type: text
    content: '“So, king, take my advice: Make a clean break with your sins and start living for others. Quit your wicked life and look after the needs of the down-and-out. Then '
  - type: text
    content: you
  - type: text
    content: ' will continue to have a good life.”'
  - type: heading
    content: The Loss and Regaining of a Mind and a Kingdom
  '28':
  - type: text
    content: All this happened to King Nebuchadnezzar. Just twelve months later, he was walking on the balcony of the royal palace in Babylon and boasted, “Look at this, Babylon the great! And I built it all by myself, a royal palace adequate to display my honor and glory!”
  '3':
  - type: text
    content: “His miracles are staggering,
  - type: text
    content: his wonders are surprising.
  - type: text
    content: His kingdom lasts and lasts,
  - type: text
    content: his sovereign rule goes on forever.
  '31':
  - type: text
    content: 'The words were no sooner out of his mouth than a voice out of heaven spoke, “This is the verdict on you, King Nebuchadnezzar: Your kingdom is taken from you. You will be driven out of human company and live with the wild animals. You will eat grass like an ox. The sentence is for seven seasons, enough time to learn that the High God rules human kingdoms and puts whomever he wishes in charge.”'
  '33':
  - type: text
    content: It happened at once. Nebuchadnezzar was driven out of human company, ate grass like an ox, and was soaked in heaven’s dew. His hair grew like the feathers of an eagle and his nails like the claws of a hawk.
  - type: text
    content: '* * *'
  '34':
  - type: text
    content: '“At the end of the seven years, I, Nebuchadnezzar, looked to heaven. I was given my mind back and I blessed the High God, thanking and glorifying God, who lives forever:'
  - type: text
    content: “His sovereign rule lasts and lasts,
  - type: text
    content: his kingdom never declines and falls.
  - type: text
    content: Life on this earth doesn’t add up to much,
  - type: text
    content: but God’s heavenly army keeps everything going.
  - type: text
    content: No one can interrupt his work,
  - type: text
    content: no one can call his rule into question.
  '36':
  - type: text
    content: '“At the same time that I was given back my mind, I was also given back my majesty and splendor, making my kingdom shine. All the leaders and important people came looking for me. I was reestablished as king in my kingdom and became greater than ever. And that’s why I’m singing—I, Nebuchadnezzar—singing and praising the King of Heaven:'
  - type: text
    content: “Everything he does is right,
  - type: text
    content: and he does it the right way.
  - type: text
    content: He knows how to turn a proud person
  - type: text
    content: into a humble man or woman.”
  '4':
  - type: text
    content: “I, Nebuchadnezzar, was at home taking it easy in my palace, without a care in the world. But as I was stretched out on my bed I had a dream that scared me—a nightmare that shook me. I sent for all the wise men of Babylon so that they could interpret the dream for me. When they were all assembled—magicians, enchanters, fortunetellers, witches—I told them the dream. None could tell me what it meant.
  '8':
  - type: text
    content: “And then Daniel came in. His Babylonian name is Belteshazzar, named after my god, a man full of the divine Holy Spirit. I told him my dream.
  '9':
  - type: text
    content: “‘Belteshazzar,’ I said, ‘chief of the magicians, I know that you are a man full of the divine Holy Spirit and that there is no mystery that you can’t solve. Listen to this dream that I had and interpret it for me.
