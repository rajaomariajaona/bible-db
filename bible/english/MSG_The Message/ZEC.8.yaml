      - type: text
        text: ”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “But things have changed. I’m taking the side of my core of surviving people:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sowing and harvesting will resume,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Vines will grow grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gardens will flourish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dew and rain will make everything green.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “My core survivors will get everything they need—and more. You’ve gotten a reputation as a bad-news people, you people of Judah and Israel, but I’m coming to save you. From now on, you’re the good-news people. Don’t be afraid. Keep a firm grip on what I’m doing.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Keep Your Lives Simple and Honest
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In the same way that I decided to punish you when your ancestors made me angry, and didn’t pull my punches, at this time I’ve decided to bless Jerusalem and the country of Judah. Don’t be afraid. And now here’s what I want you to do: Tell the truth, the whole truth, when you speak. Do the right thing by one another, both personally and in your courts. Don’t cook up plans to take unfair advantage of others. Don’t do or say what isn’t so. I hate all that stuff. Keep your lives simple and honest.” Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again I received a Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The days of mourning set for the fourth, fifth, seventh, and tenth months will be turned into days of feasting for Judah—celebration and holiday. Embrace truth! Love peace!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“People and their leaders will come from all over to see what’s going on. The leaders will confer with one another: ‘Shouldn’t we try to get in on this? Get in on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s blessings? Pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies? What’s keeping us? Let’s go!’
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Lots of people, powerful nations—they’ll come to Jerusalem looking for what they can get from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, looking to get a blessing from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “At that time, ten men speaking a variety of languages will grab the sleeve of one Jew, hold tight, and say, ‘Let us go with you. We’ve heard that God is with you.’”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ve come back to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve moved back to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem’s new names will be Truth City,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and Mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Mount Holiness.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Old men and old women will come back to Jerusalem, sit on benches on the streets and spin tales, move around safely with their canes—a good city to grow old in. And boys and girls will fill the public parks, laughing and playing—a good city to grow up in.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do the problems of returning and rebuilding by just a few survivors seem too much? But is anything too much for me? Not if I have my say.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’ll collect my people from countries to the east and countries to the west. I’ll bring them back and move them into Jerusalem. They’ll be my people and I’ll be their God. I’ll stick with them and do right by them.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Get a grip on things. Hold tight, you who are listening to what I say through the preaching of the prophets. The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies has been reestablished. The Temple is being rebuilt. We’ve come through a hard time: You worked for a pittance and were lucky to get that; the streets were dangerous; you could never let down your guard; I had turned the world into an armed camp.'
