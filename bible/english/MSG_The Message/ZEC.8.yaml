    children:
    - type: text
      text: '“I am zealous for Zion—I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: care
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’m angry about Zion—I’m '
    - type: usfm
