document_id: 2KI.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu of Israel
  - type: text
    content: One day Elisha the prophet ordered a member of the guild of prophets, “Get yourself ready, take a flask of oil, and go to Ramoth Gilead. Look for Jehu son of Jehoshaphat son of Nimshi. When you find him, get him away from his companions and take him to a back room. Take your flask of oil and pour it over his head and say, ‘
  - type: text
    content: God
  - type: text
    content: '’s word: I anoint you king over Israel.’ Then open the door and get out of there as fast as you can. Don’t wait around.”'
  '11':
  - type: text
    content: Jehu went back out to his master’s officers. They asked, “Is everything all right? What did that crazy fool want with you?”
  - type: text
    content: He said, “You know that kind of man—all talk.”
  '12':
  - type: text
    content: “That’s a lie!” they said. “Tell us what’s going on.”
  - type: text
    content: He said, “He told me this and this and this—in effect, ‘
  - type: text
    content: God
  - type: text
    content: '’s word: I anoint you king of Israel!’”'
  '13':
  - type: text
    content: They sprang into action. Each man grabbed his robe; they piled them at the top of the steps for a makeshift throne. Then they blew the trumpet and declared, “Jehu is king!”
  '14':
  - type: text
    content: That ignited the conspiracy of Jehu son of Jehoshaphat son of Nimshi against Joram.
  - type: text
    content: Meanwhile, Joram and the entire army were defending Ramoth Gilead against Hazael king of Aram. Except that Joram had pulled back to Jezreel to convalesce from the injuries he got from the Arameans in the battle with Hazael king of Aram.
  - type: text
    content: Jehu said, “If you really want me as king, don’t let anyone sneak out of the city and blab the news in Jezreel.”
  '16':
  - type: text
    content: Then Jehu mounted a chariot and rode to Jezreel, where Joram was in bed, resting. King Ahaziah of Judah had come down to visit Joram.
  '17':
  - type: text
    content: A sentry standing duty on the watchtower in Jezreel saw the company of Jehu arrive. He said, “I see a band of men.”
  - type: text
    content: Joram said, “Get a horseman and send him out to meet them and inquire, ‘Is anything wrong?’”
  '18':
  - type: text
    content: The horseman rode out to meet Jehu and said, “The king wants to know if there’s anything wrong.”
  - type: text
    content: Jehu said, “What’s it to you whether things are right or wrong? Fall in behind me.”
  - type: text
    content: The sentry said, “The messenger reached them, but he’s not returning.”
  '19':
  - type: text
    content: The king then sent a second horseman. When he reached them he said, “The king wants to know if there’s anything wrong.”
  - type: text
    content: Jehu said, “What’s it to you whether things are right or wrong? Fall in behind me.”
  '20':
  - type: text
    content: The sentry said, “The messenger reached them, but he’s not returning. The driving is like the driving of Jehu son of Nimshi—crazy!”
  '21':
  - type: text
    content: Joram ordered, “Get my chariot ready!” They hitched up his chariot. Joram king of Israel and Ahaziah king of Judah, each in his own chariot, drove out to meet Jehu. They met in the field of Naboth of Jezreel.
  '22':
  - type: text
    content: When Joram saw Jehu he called out, “Good day, Jehu!”
  - type: text
    content: Jehu answered, “What’s good about it? How can there be anything good about it as long as the promiscuous whoring and sorceries of your mother Jezebel pollute the country?”
  '23':
  - type: text
    content: Joram wheeled his chariot around and fled, yelling to Ahaziah, “It’s a trap, Ahaziah!”
  '24':
  - type: text
    content: Jehu pulled on his bow and released an arrow; it hit Joram between the shoulder blades and went right through his heart. He slumped to his knees in his chariot.
  '25':
  - type: text
    content: 'Jehu ordered Bidkar, his lieutenant, “Quick—throw him into the field of Naboth of Jezreel. Remember when you and I were driving our chariots behind Ahab his father? That’s when '
  - type: text
    content: God
  - type: text
    content: ' pronounced this doom upon him: ‘As surely as I saw the blood of murdered Naboth and his sons yesterday, you’ll pay for it on this exact piece of ground. '
  - type: text
    content: God
  - type: text
    content: '’s word!’ So take him and throw him out in the field. '
  - type: text
    content: God
  - type: text
    content: ’s instructions carried out to the letter!”
  '27':
  - type: text
    content: Ahaziah king of Judah saw what was going on and made his escape on the road toward Beth Haggan. Jehu chased him, yelling out, “Get him, too!” Jehu’s troops shot and wounded him in his chariot on the hill up to Gur, near Ibleam. He was able to make it as far as Megiddo; there he died.
  '28':
  - type: text
    content: His aides drove on to Jerusalem. They buried him in the family plot in the City of David.
  '29':
  - type: text
    content: In the eleventh year of the reign of Joram son of Ahab, Ahaziah had become king of Judah.
  '30':
  - type: text
    content: When Jezebel heard that Jehu had arrived in Jezreel, she made herself up—put on eyeshadow and arranged her hair—and posed seductively at the window. When Jehu came through the city gate, she called down, “So, how are things, ‘Zimri,’ you dashing king-killer?”
  '32':
  - type: text
    content: Jehu looked up at the window and called, “Is there anybody up there on my side?” Two or three palace eunuchs looked out.
  '33':
  - type: text
    content: He ordered, “Throw her down!” They threw her out the window. Her blood spattered the wall and the horses, and Jehu trampled her under his horse’s hooves.
  '34':
  - type: text
    content: Then Jehu went inside and ate his lunch. During lunch he gave orders, “Take care of that damned woman; give her a decent burial—she is, after all, a king’s daughter.”
  '35':
  - type: text
    content: 'They went out to bury her, but there was nothing left of her but skull, feet, and hands. They came back and told Jehu. He said, “It’s '
  - type: text
    content: God
  - type: text
    content: '’s word, the word spoken by Elijah the Tishbite:'
  - type: text
    content: In the field of Jezreel,
  - type: text
    content: dogs will eat Jezebel;
  '37':
  - type: text
    content: The body of Jezebel will be like
  - type: text
    content: dog-droppings on the ground in Jezreel.
  - type: text
    content: Old friends and lovers will say,
  - type: text
    content: '‘I wonder, is '
  - type: text
    content: this
  - type: text
    content: ' Jezebel?’”'
  '4':
  - type: text
    content: The young prophet went to Ramoth Gilead. On arrival he found the army officers all sitting around. He said, “I have a matter of business with you, officer.”
  - type: text
    content: Jehu said, “Which one of us?”
  - type: text
    content: “With you, officer.”
  '6':
  - type: text
    content: He got up and went inside the building. The young prophet poured the oil on his head and said, “
  - type: text
    content: God
  - type: text
    content: '’s word, the God of Israel: I’ve anointed you to be king over the people of '
  - type: text
    content: God
  - type: text
    content: ', over Israel. Your assignment is to attack the regime of Ahab your master. I am avenging the massacre of my servants the prophets—yes, the Jezebel-massacre of all the prophets of '
  - type: text
    content: God
  - type: text
    content: . The entire line of Ahab is doomed. I’m wiping out the entire bunch of that sad lot. I’ll see to it that the family of Ahab experiences the same fate as the family of Jeroboam son of Nebat and the family of Baasha son of Ahijah. As for Jezebel, the dogs will eat her carcass in the open fields of Jezreel. No burial for her!” Then he opened the door and made a run for it.
