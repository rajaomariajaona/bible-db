document_id: PSA.135,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise the works of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All you priests on duty in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: serving in the sacred halls of our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout “Hallelujah!” because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s so good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing anthems to his beautiful name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why? Because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' chose Jacob,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: embraced Israel as a prize possession.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-18
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your name is eternal,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you’ll never be out-of-date.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' stands up for his people,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' holds the hands of his people.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gods of the godless nations are mere trinkets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'made for quick sale in the markets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chiseled mouths that can’t talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: painted eyes that can’t see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Carved ears that can’t hear—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dead wood! cold metal!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who make and trust them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: become like them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: 'Family of Israel, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Family of Aaron, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Family of Levi, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: First Citizen of Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-12
    - type: text
      text: 'I, too, give witness to the greatness of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our Lord, high above all other gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does just as he pleases—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: however, wherever, whenever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the weather—clouds and thunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lightning and rain, wind pouring out of the north.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He struck down the Egyptian firstborn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both human and animal firstborn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made Egypt sit up and take notice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: confronted Pharaoh and his servants with miracles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, he struck down great nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he slew mighty kings—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihon king of the Amorites, also Og of Bashan—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every last one of the Canaanite kings!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he turned their land over to Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a gift of good land to his people.
