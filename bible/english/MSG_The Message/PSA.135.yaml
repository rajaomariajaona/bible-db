verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Praise the name of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'praise the works of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: 'All you priests on duty in '
  - type: text
    content: God
  - type: text
    content: ’s temple,
  - type: text
    content: serving in the sacred halls of our God,
  - type: text
    content: 'Shout “Hallelujah!” because '
  - type: text
    content: God
  - type: text
    content: ’s so good,
  - type: text
    content: sing anthems to his beautiful name.
  - type: text
    content: 'And why? Because '
  - type: text
    content: God
  - type: text
    content: ' chose Jacob,'
  - type: text
    content: embraced Israel as a prize possession.
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', your name is eternal,'
  - type: text
    content: God
  - type: text
    content: ', you’ll never be out-of-date.'
  - type: text
    content: God
  - type: text
    content: ' stands up for his people,'
  - type: text
    content: God
  - type: text
    content: ' holds the hands of his people.'
  - type: text
    content: The gods of the godless nations are mere trinkets,
  - type: text
    content: 'made for quick sale in the markets:'
  - type: text
    content: Chiseled mouths that can’t talk,
  - type: text
    content: painted eyes that can’t see,
  - type: text
    content: Carved ears that can’t hear—
  - type: text
    content: dead wood! cold metal!
  - type: text
    content: Those who make and trust them
  - type: text
    content: become like them.
  '19':
  - type: text
    content: 'Family of Israel, bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'Family of Aaron, bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'Family of Levi, bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'You who fear '
  - type: text
    content: God
  - type: text
    content: ', bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'Oh, blessed be '
  - type: text
    content: God
  - type: text
    content: ' of Zion,'
  - type: text
    content: First Citizen of Jerusalem!
  - type: text
    content: Hallelujah!
  '5':
  - type: text
    content: 'I, too, give witness to the greatness of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: our Lord, high above all other gods.
  - type: text
    content: He does just as he pleases—
  - type: text
    content: however, wherever, whenever.
  - type: text
    content: He makes the weather—clouds and thunder,
  - type: text
    content: lightning and rain, wind pouring out of the north.
  - type: text
    content: He struck down the Egyptian firstborn,
  - type: text
    content: both human and animal firstborn.
  - type: text
    content: He made Egypt sit up and take notice,
  - type: text
    content: confronted Pharaoh and his servants with miracles.
  - type: text
    content: Yes, he struck down great nations,
  - type: text
    content: he slew mighty kings—
  - type: text
    content: Sihon king of the Amorites, also Og of Bashan—
  - type: text
    content: every last one of the Canaanite kings!
  - type: text
    content: Then he turned their land over to Israel,
  - type: text
    content: a gift of good land to his people.
