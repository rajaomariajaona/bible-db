document_id: JER.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Change the Way You’re Living
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'At the beginning of the reign of Jehoiakim son of Josiah king of Judah, this Message came from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to Jeremiah:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Officials from the royal court of Judah were told of this. They left the palace immediately and came to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Temple to investigate. They held court on the spot, at the New Gate entrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The prophets and priests spoke first, addressing the officials, but also the people: “Death to this man! He deserves nothing less than death! He has preached against this city—you’ve heard the evidence with your own ears.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: 'Jeremiah spoke next, publicly addressing the officials before the crowd: “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent me to preach against both this Temple and city everything that’s been reported to you. So do something about it! Change the way you’re living, change your behavior. Listen obediently to the Message of your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Maybe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will reconsider the disaster he has threatened.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: '“As for me, I’m at your mercy—do whatever you think is best. But take warning: If you kill me, you’re killing an innocent man, and you and the city and the people in it will be liable. I didn’t say any of this on my own. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent me and told me what to say. You’ve been listening to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' speak, not Jeremiah.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The court officials, backed by the people, then handed down their ruling to the priests and prophets: “Acquittal. No death sentence for this man. He has spoken to us with the authority of our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'Then some of the respected leaders stood up and addressed the crowd: “In the reign of Hezekiah king of Judah, Micah of Moresheth preached to the people of Judah this sermon: This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies’ Message for you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Because of people like you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion will be turned back into farmland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem end up as a pile of rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and instead of the Temple on the mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a few scraggly scrub pines.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Did King Hezekiah or anyone else in Judah kill Micah of Moresheth because of that sermon? Didn’t Hezekiah honor him and pray for mercy from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '? And then didn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' call off the disaster he had threatened?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Friends, we’re at the brink of bringing a terrible calamity upon ourselves.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: Stand in the court of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Temple and preach to the people who come from all over Judah to worship in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple. Say everything I tell you to say to them. Don’t hold anything back. Just maybe they’ll listen and turn back from their bad lives. Then I’ll reconsider the disaster that I’m planning to bring on them because of their evil behavior.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-23
    - type: text
      text: '(At another time there had been a man, Uriah son of Shemaiah from Kiriath-jearim, who had preached similarly in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He preached against this same city and country just as Jeremiah did. When King Jehoiakim and his royal court heard his sermon, they determined to kill him. Uriah, afraid for his life, went into hiding in Egypt. King Jehoiakim sent Elnathan son of Achbor with a posse of men after him. They brought him back from Egypt and presented him to the king. And the king had him killed. They dumped his body unceremoniously outside the city.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But in Jeremiah’s case, Ahikam son of Shaphan stepped forward and took his side, preventing the mob from lynching him.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: '“Say to them, ‘This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: If you refuse to listen to me and live by my teaching that I’ve revealed so plainly to you, and if you continue to refuse to listen to my servants the prophets that I tirelessly keep on sending to you—but you’ve never listened! Why would you start now?—then I’ll make this Temple a pile of ruins like Shiloh, and I’ll make this city nothing but a bad joke worldwide.’”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: 'Everybody there—priests, prophets, and people—heard Jeremiah preaching this Message in the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. When Jeremiah had finished his sermon, saying everything God had commanded him to say, the priests and prophets and people all grabbed him, yelling, “Death! You’re going to die for this! How dare you preach—and using '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name!—saying that this Temple will become a heap of rubble like Shiloh and this city be wiped out without a soul left in it!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the people mobbed Jeremiah right in the Temple itself.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
