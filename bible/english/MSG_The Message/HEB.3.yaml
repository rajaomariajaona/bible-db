document_id: HEB.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Centerpiece of All We Believe
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6a
  - type: text
    text: ' So, my dear Christian friends, companions in following this call to the heights, take a good hard look at Jesus. He’s the centerpiece of everything we believe, faithful in everything God gave him to do. Moses was also faithful, but Jesus gets far more honor. A builder is more valuable than a building any day. Every house has a builder, but the Builder behind them all is God. Moses did a good job in God’s house, but it was all servant work, getting things ready for what was to come. Christ as Son is in charge of the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6b-11
  - type: text
    text: ' Now, if we can only keep a firm grip on this bold confidence, we’re the house! That’s why the Holy Spirit says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Today, please listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t turn a deaf ear as in “the bitter uprising,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: that time of wilderness testing!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though they watched me at work for forty years,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your ancestors refused to let me do it my way;
- type: usfm
  marker: q2
  children:
  - type: text
    text: over and over they tried my patience.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I was provoked, oh, so provoked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I said, “They’ll never keep their minds on God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they refuse to walk down my road.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exasperated, I vowed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “They’ll never get where they’re going,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never be able to sit down and rest.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: So watch your step, friends. Make sure there’s no evil unbelief lying around that will trip you up and throw you off course, diverting you from the living God. For as long as God’s still calling it Today, keep each other on your toes so sin doesn’t slow down your reflexes. If we can only keep our grip on the sure thing we started out with, we’re in this with Christ for the long haul.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These words keep ringing in our ears:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Today, please listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t turn a deaf ear as in the bitter uprising.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19
  - type: text
    text: For who were the people who turned a deaf ear? Weren’t they the very ones Moses led out of Egypt? And who was God provoked with for forty years? Wasn’t it those who turned a deaf ear and ended up corpses in the wilderness? And when he swore that they’d never get where they were going, wasn’t he talking to the ones who turned a deaf ear? They never got there because they never listened, never believed.
