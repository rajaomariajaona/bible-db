document_id: HEB.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Centerpiece of All We Believe
  - type: text
    content: ' So, my dear Christian friends, companions in following this call to the heights, take a good hard look at Jesus. He’s the centerpiece of everything we believe, faithful in everything God gave him to do. Moses was also faithful, but Jesus gets far more honor. A builder is more valuable than a building any day. Every house has a builder, but the Builder behind them all is God. Moses did a good job in God’s house, but it was all servant work, getting things ready for what was to come. Christ as Son is in charge of the house.'
  '12':
  - type: text
    content: So watch your step, friends. Make sure there’s no evil unbelief lying around that will trip you up and throw you off course, diverting you from the living God. For as long as God’s still calling it Today, keep each other on your toes so sin doesn’t slow down your reflexes. If we can only keep our grip on the sure thing we started out with, we’re in this with Christ for the long haul.
  - type: text
    content: 'These words keep ringing in our ears:'
  - type: text
    content: Today, please listen;
  - type: text
    content: don’t turn a deaf ear as in the bitter uprising.
  '15':
  - type: text
    content: For who were the people who turned a deaf ear? Weren’t they the very ones Moses led out of Egypt? And who was God provoked with for forty years? Wasn’t it those who turned a deaf ear and ended up corpses in the wilderness? And when he swore that they’d never get where they were going, wasn’t he talking to the ones who turned a deaf ear? They never got there because they never listened, never believed.
  '6':
  - type: text
    content: ' Now, if we can only keep a firm grip on this bold confidence, we’re the house! That’s why the Holy Spirit says,'
  - type: text
    content: Today, please listen;
  - type: text
    content: don’t turn a deaf ear as in “the bitter uprising,”
  - type: text
    content: that time of wilderness testing!
  - type: text
    content: Even though they watched me at work for forty years,
  - type: text
    content: your ancestors refused to let me do it my way;
  - type: text
    content: over and over they tried my patience.
  - type: text
    content: And I was provoked, oh, so provoked!
  - type: text
    content: I said, “They’ll never keep their minds on God;
  - type: text
    content: they refuse to walk down my road.”
  - type: text
    content: Exasperated, I vowed,
  - type: text
    content: “They’ll never get where they’re going,
  - type: text
    content: never be able to sit down and rest.”
