document_id: EXO.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consecration of Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: “This is the ceremony for dedicating them as priests. Take a young bull and two rams, healthy and without defects. Using fine wheat flour but no yeast make bread and cakes mixed with oil and wafers spread with oil. Place them in a basket and carry them along with the bull and the two rams. Bring Aaron and his sons to the entrance of the Tent of Meeting and wash them with water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9a
  - type: text
    text: ' “Then take the vestments and dress Aaron in the tunic, the robe of the Ephod, the Ephod, and the Breastpiece, belting the Ephod on him with the embroidered waistband. Set the turban on his head and place the sacred crown on the turban. Then take the anointing oil and pour it on his head, anointing him. Then bring his sons, put tunics on them and gird them with sashes, both Aaron and his sons, and set hats on them. Their priesthood is upheld by law and is permanent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9b-14
  - type: text
    text: ' “This is how you will ordain Aaron and his sons: Bring the bull to the Tent of Meeting. Aaron and his sons will place their hands on the head of the bull. Then you will slaughter the bull in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at the entrance to the Tent of Meeting. Take some of the bull’s blood and smear it on the horns of the Altar with your finger; pour the rest of the blood on the base of the Altar. Next take all the fat that covers the innards, fat from around the liver and the two kidneys, and burn it on the Altar. But the flesh of the bull, including its hide and dung, you will burn up outside the camp. It is an Absolution-Offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: '“Then take one of the rams. Have Aaron and his sons place their hands on the head of the ram. Slaughter the ram and take its blood and throw it against the Altar, all around. Cut the ram into pieces; wash its innards and legs, then gather the pieces and its head and burn the whole ram on the Altar. It is a Whole-Burnt-Offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a pleasant fragrance, an offering by fire to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: “Then take the second ram. Have Aaron and his sons place their hands on the ram’s head. Slaughter the ram. Take some of its blood and rub it on Aaron’s right earlobe and on the right earlobes of his sons, on the thumbs of their right hands and on the big toes of their right feet. Sprinkle the rest of the blood against all sides of the Altar. Then take some of the blood that is on the Altar, mix it with some of the anointing oil, and splash it on Aaron and his clothes and on his sons and their clothes so that Aaron and his clothes and his sons and his sons’ clothes will be made holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: '“Take the fat from the ram, the fat tail, the fat that covers the innards, the long lobe of the liver, the two kidneys and the fat on them, and the right thigh: this is the ordination ram. Also take one loaf of bread, an oil cake, and a wafer from the breadbasket that is in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: '“Place all of these in the open hands of Aaron and his sons who will wave them before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a Wave-Offering. Then take them from their hands and burn them on the Altar with the Whole-Burnt-Offering—a pleasing fragrance before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a gift to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Now take the breast from Aaron’s ordination ram and wave it before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', a Wave-Offering. That will be your portion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: “Bless the Wave-Offering breast and the thigh that was held up. These are the parts of the ordination ram that are for Aaron and his sons. Aaron and his sons are always to get this offering from the Israelites; the Israelites are to make this offering regularly from their Peace-Offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: “Aaron’s sacred garments are to be handed down to his descendants so they can be anointed and ordained in them. The son who succeeds him as priest is to wear them for seven days and enter the Tent of Meeting to minister in the Holy Place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-34
  - type: text
    text: “Take the ordination ram and boil the meat in the Holy Place. At the entrance to the Tent of Meeting, Aaron and his sons will eat the boiled ram and the bread that is in the basket. Atoned by these offerings, ordained and hallowed by them, they are the only ones who are to eat them. No outsiders are to eat them; they’re holy. Anything from the ordination ram or from the bread that is left over until morning you are to burn up. Don’t eat it; it’s holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-37
  - type: text
    text: '“Do everything for the ordination of Aaron and his sons exactly as I’ve commanded you throughout the seven days. Offer a bull as an Absolution-Offering for atonement each day. Offer it on the Altar when you make atonement for it: Anoint and hallow it. Make atonement for the Altar and hallow it for seven days; the Altar will become soaked in holiness—anyone who so much as touches the Altar will become holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-41
  - type: text
    text: '“This is what you are to offer on the Altar: two year-old lambs each and every day, one lamb in the morning and the second lamb at evening. With the sacrifice of the first lamb offer two quarts of fine flour with a quart of virgin olive oil, plus a quart of wine for a Drink-Offering. The sacrifice of the second lamb, the one at evening, is also to be accompanied by the same Grain-Offering and Drink-Offering of the morning sacrifice to give a pleasing fragrance, a gift to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-46
  - type: text
    text: '“This is to be your regular, daily Whole-Burnt-Offering before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', generation after generation, sacrificed at the entrance of the Tent of Meeting. That’s where I’ll meet you; that’s where I’ll speak with you; that’s where I’ll meet the Israelites, at the place made holy by my Glory. I’ll make the Tent of Meeting and the Altar holy. I’ll make Aaron and his sons holy in order to serve me as priests. I’ll move in and live with the Israelites. I’ll be their God. They’ll realize that I am their '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who brought them out of the land of Egypt so that I could live with them. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' God.”'
