document_id: JOS.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the People of Israel violated the holy curse. Achan son of Carmi, the son of Zabdi, the son of Zerah of the tribe of Judah, took some of the cursed things. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' became angry with the People of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Joshua sent men from Jericho to Ai (The Ruin), which is near Beth Aven just east of Bethel. He instructed them, “Go up and spy out the land.” The men went up and spied out Ai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They returned to Joshua and reported, “Don’t bother sending a lot of people—two or three thousand men are enough to defeat Ai. Don’t wear out the whole army; there aren’t that many people there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: So three thousand men went up—and then fled in defeat before the men of Ai! The men of Ai killed thirty-six—chased them from the city gate as far as The Quarries, killing them at the descent. The heart of the people sank, all spirit knocked out of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joshua ripped his clothes and fell on his face to the ground before the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', he and the leaders throwing dirt on their heads, prostrate until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'Joshua said, “Oh, oh, oh . . . Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Why did you insist on bringing this people across the Jordan? To make us victims of the Amorites? To wipe us out? Why didn’t we just settle down on the east side of the Jordan? Oh, Master, what can I say after this, after Israel has been run off by its enemies? When the Canaanites and all the others living here get wind of this, they’ll gang up on us and make short work of us—and then how will you keep up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' reputation?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Joshua, “Get up. Why are you groveling? Israel has sinned: They’ve broken the covenant I commanded them; they’ve taken forbidden plunder—stolen and then covered up the theft, hoarding it up with their own stuff. The People of Israel can no longer look their enemies in the eye—they themselves are plunder. I can’t continue with you if you don’t rid yourselves of the cursed things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“So get started. Purify the people. Tell them: Get ready for tomorrow by purifying yourselves. For this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, says: There are cursed things in the camp. You won’t be able to face your enemies until you have gotten rid of these cursed things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: '“First thing in the morning you will be called up by tribes. The tribe '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' names will come up clan by clan; the clan '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' names will come up family by family; and the family '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' names will come up man by man. The person found with the cursed things will be burned, he and everything he has, because he broke '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s covenant and did this despicable thing in Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: Joshua was up at the crack of dawn and called Israel up tribe by tribe. The tribe of Judah was singled out. Then he called up the clans and singled out the Zerahites. He called up the Zerahite families and singled out the Zabdi family. He called up the family members one by one and singled out Achan son of Carmi, the son of Zabdi, the son of Zerah of the tribe of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joshua spoke to Achan, “My son, give glory to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel. Make your confession to him. Tell me what you did. Don’t keep back anything from me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'Achan answered Joshua, “It’s true. I sinned against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel. This is how I did it. In the plunder I spotted a beautiful Shinar robe, two hundred shekels of silver, and a fifty-shekel bar of gold, and I coveted and took them. They are buried in my tent with the silver at the bottom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'Joshua sent off messengers. They ran to the tent. And there it was, buried in the tent with the silver at the bottom. They took the stuff from the tent and brought it to Joshua and to all the People of Israel and spread it out before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Joshua took Achan son of Zerah, took the silver, the robe, the gold bar, his sons and daughters, his ox, donkey, sheep, and tent—everything connected with him. All Israel was there. They led them off to the Valley of Achor (Trouble Valley).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'Joshua said, “Why have you troubled us? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will now trouble you. Today!” And all Israel stoned him—burned him with fire and stoned him with stones. They piled a huge pile of stones over him. It’s still there. Only then did '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turn from his hot anger. That’s how the place came to be called Trouble Valley right up to the present time.'
