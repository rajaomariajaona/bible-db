document_id: JHN.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anointing His Feet
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Six days before Passover, Jesus entered Bethany where Lazarus, so recently raised from the dead, was living. Lazarus and his sisters invited Jesus to dinner at their home. Martha served. Lazarus was one of those sitting at the table with them. Mary came in with a jar of very expensive aromatic oils, anointed and massaged Jesus’ feet, and then wiped them with her hair. The fragrance of the oils filled the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: Judas Iscariot, one of his disciples, even then getting ready to betray him, said, “Why wasn’t this oil sold and the money given to the poor? It would have easily brought three hundred silver pieces.” He said this not because he cared two cents about the poor but because he was a thief. He was in charge of their common funds, but also embezzled them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Jesus said, “Let her alone. She’s anticipating and honoring the day of my burial. You always have the poor with you. You don’t always have me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: Word got out among the Jews that he was back in town. The people came to take a look, not only at Jesus but also at Lazarus, who had been raised from the dead. So the high priests plotted to kill Lazarus because so many of the Jews were going over and believing in Jesus on account of him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: See How Your King Comes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: 'The next day the huge crowd that had arrived for the Feast heard that Jesus was entering Jerusalem. They broke off palm branches and went out to meet him. And they cheered:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Hosanna!
- type: usfm
  marker: p
  children:
  - type: text
    text: Blessed is he who comes in God’s name!
- type: usfm
  marker: p
  children:
  - type: text
    text: Yes! The King of Israel!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Jesus got a young donkey and rode it, just as the Scripture has it:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No fear, Daughter Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: See how your king comes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: riding a donkey’s colt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The disciples didn’t notice the fulfillment of many Scriptures at the time, but after Jesus was glorified, they remembered that what was written about him matched what was done to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'The crowd that had been with him when he called Lazarus from the tomb, raising him from the dead, was there giving eyewitness accounts. It was because they had spread the word of this latest God-sign that the crowd swelled to a welcoming parade. The Pharisees took one look and threw up their hands: “It’s out of control. The world’s in a stampede after him.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Grain of Wheat Must Die
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'There were some Greeks in town who had come up to worship at the Feast. They approached Philip, who was from Bethsaida in Galilee: “Sir, we want to see Jesus. Can you help us?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Philip went and told Andrew. Andrew and Philip together told Jesus. Jesus answered, “Time’s up. The time has come for the Son of Man to be glorified.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: '“Listen carefully: Unless a grain of wheat is buried in the ground, dead to the world, it is never any more than a grain of wheat. But if it is buried, it sprouts and reproduces itself many times over. In the same way, anyone who holds on to life just as it is destroys that life. But if you let it go, reckless in your love, you’ll have it forever, real and eternal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “If any of you wants to serve me, then follow me. Then you’ll be where I am, ready to serve at a moment’s notice. The Father will honor and reward anyone who serves me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: “Right now I am shaken. And what am I going to say? ‘Father, get me out of this’? No, this is why I came in the first place. I’ll say, ‘Father, put your glory on display.’”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A voice came out of the sky: “I have glorified it, and I’ll glorify it again.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The listening crowd said, “Thunder!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Others said, “An angel spoke to him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-33
  - type: text
    text: Jesus said, “The voice didn’t come for me but for you. At this moment the world is in crisis. Now Satan, the ruler of this world, will be thrown out. And I, as I am lifted up from the earth, will attract everyone to me and gather them around me.” He put it this way to show how he was going to be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Voices from the crowd answered, “We heard from God’s Law that the Messiah lasts forever. How can it be necessary, as you put it, that the Son of Man ‘be lifted up’? Who is this ‘Son of Man’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36a
  - type: text
    text: ' Jesus said, “For a brief time still, the light is among you. Walk by the light you have so darkness doesn’t destroy you. If you walk in darkness, you don’t know where you’re going. As you have the light, believe in the light. Then the light will be within you, and shining through your lives. You’ll be children of light.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Their Eyes Are Blinded
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36b-40
  - type: text
    text: ' Jesus said all this, and then went into hiding. All these God-signs he had given them and they still didn’t get it, still wouldn’t trust him. This proved that the prophet Isaiah was right:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, who believed what we preached?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who recognized God’s arm, outstretched and ready to act?
- type: usfm
  marker: m
  children:
  - type: text
    text: 'First they wouldn’t believe, then they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: couldn’t
  - type: text
    text: '—again, just as Isaiah said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their eyes are blinded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hearts are hardened,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that they wouldn’t see with their eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and perceive with their hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And turn to me, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I could heal them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Isaiah said these things after he got a glimpse of God’s overflowing glory that would pour through the Messiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: On the other hand, a considerable number from the ranks of the leaders did believe. But because of the Pharisees, they didn’t come out in the open with it. They were afraid of getting kicked out of the meeting place. When push came to shove they cared more for human approval than for God’s glory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-46
  - type: text
    text: Jesus summed it all up when he cried out, “Whoever believes in me, believes not just in me but in the One who sent me. Whoever looks at me is looking, in fact, at the One who sent me. I am Light that has come into the world so that all who believe in me won’t have to stay any longer in the dark.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-50
  - type: text
    text: '“If anyone hears what I am saying and doesn’t take it seriously, I don’t reject him. I didn’t come to reject the world; I came to save the world. But you need to know that whoever puts me off, refusing to take in what I’m saying, is willfully choosing rejection. The Word, the Word-made-flesh that I have spoken and that I am, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Word and no other is the last word. I’m not making any of this up on my own. The Father who sent me gave me orders, told me what to say and how to say it. And I know exactly what his command produces: real and eternal life. That’s all I have to say. What the Father told me, I tell you.”'
