document_id: ECC.9,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Well, I took all this in and thought it through, inside and out. Here’s what I understood: The good, the wise, and all that they do are in God’s hands—but, day by day, whether it’s love or hate they’re dealing with, they don’t know.'
  - type: text
    content: Anything’s possible. It’s one fate for everybody—righteous and wicked, good people, bad people, the nice and the nasty, worshipers and non-worshipers, committed and uncommitted. I find this outrageous—the worst thing about living on this earth—that everyone’s lumped together in one fate. Is it any wonder that so many people are obsessed with evil? Is it any wonder that people go crazy right and left? Life leads to death. That’s it.
  - type: heading
    content: Seize Life!
  '11':
  - type: text
    content: I took another walk around the neighborhood and realized that on this earth as it is—
  - type: text
    content: The race is not always to the swift,
  - type: text
    content: Nor the battle to the strong,
  - type: text
    content: Nor satisfaction to the wise,
  - type: text
    content: Nor riches to the smart,
  - type: text
    content: Nor grace to the learned.
  - type: text
    content: Sooner or later bad luck hits us all.
  '12':
  - type: text
    content: No one can predict misfortune.
  - type: text
    content: Like fish caught in a cruel net or birds in a trap,
  - type: text
    content: So men and women are caught
  - type: text
    content: By accidents evil and sudden.
  - type: heading
    content: Wisdom Is Better than Muscle
  '13':
  - type: text
    content: One day as I was observing how wisdom fares on this earth, I saw something that made me sit up and take notice. There was a small town with only a few people in it. A strong king came and mounted an attack, building trenches and attack posts around it. There was a poor but wise man in that town whose wisdom saved the town, but he was promptly forgotten. (He was only a poor man, after all.)
  '16':
  - type: text
    content: All the same, I still say that wisdom is better than muscle, even though the wise poor man was treated with contempt and soon forgotten.
  '17':
  - type: text
    content: The quiet words of the wise are more effective
  - type: text
    content: Than the ranting of a king of fools.
  '18':
  - type: text
    content: Wisdom is better than warheads,
  - type: text
    content: But one hothead can ruin the good earth.
  '4':
  - type: text
    content: 'Still, anyone selected out for life has hope, for, as they say, “A living dog is better than a dead lion.” The living at least know '
  - type: text
    content: something
  - type: text
    content: ', even if it’s only that they’re going to die. But the dead know nothing and get nothing. They’re a minus that no one remembers. Their loves, their hates, yes, even their dreams, are long gone. There’s not a trace of them left in the affairs of this earth.'
  '7':
  - type: text
    content: Seize life! Eat bread with gusto,
  - type: text
    content: Drink wine with a robust heart.
  - type: text
    content: 'Oh yes—God takes pleasure in '
  - type: text
    content: your
  - type: text
    content: ' pleasure!'
  - type: text
    content: Dress festively every morning.
  - type: text
    content: Don’t skimp on colors and scarves.
  - type: text
    content: Relish life with the spouse you love
  - type: text
    content: Each and every day of your precarious life.
  - type: text
    content: Each day is God’s gift. It’s all you get in exchange
  - type: text
    content: For the hard work of staying alive.
  - type: text
    content: Make the most of each one!
  - type: text
    content: Whatever turns up, grab it and do it. And heartily!
  - type: text
    content: This is your last and only chance at it,
  - type: text
    content: For there’s neither work to do nor thoughts to think
  - type: text
    content: In the company of the dead, where you’re most certainly headed.
  - type: text
    content: '* * *'
