document_id: ECC.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Well, I took all this in and thought it through, inside and out. Here’s what I understood: The good, the wise, and all that they do are in God’s hands—but, day by day, whether it’s love or hate they’re dealing with, they don’t know.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anything’s possible. It’s one fate for everybody—righteous and wicked, good people, bad people, the nice and the nasty, worshipers and non-worshipers, committed and uncommitted. I find this outrageous—the worst thing about living on this earth—that everyone’s lumped together in one fate. Is it any wonder that so many people are obsessed with evil? Is it any wonder that people go crazy right and left? Life leads to death. That’s it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seize Life!
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I took another walk around the neighborhood and realized that on this earth as it is—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The race is not always to the swift,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the battle to the strong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor satisfaction to the wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor riches to the smart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor grace to the learned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sooner or later bad luck hits us all.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one can predict misfortune.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like fish caught in a cruel net or birds in a trap,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So men and women are caught
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By accidents evil and sudden.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Is Better than Muscle
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day as I was observing how wisdom fares on this earth, I saw something that made me sit up and take notice. There was a small town with only a few people in it. A strong king came and mounted an attack, building trenches and attack posts around it. There was a poor but wise man in that town whose wisdom saved the town, but he was promptly forgotten. (He was only a poor man, after all.)
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the same, I still say that wisdom is better than muscle, even though the wise poor man was treated with contempt and soon forgotten.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The quiet words of the wise are more effective
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than the ranting of a king of fools.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is better than warheads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But one hothead can ruin the good earth.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Still, anyone selected out for life has hope, for, as they say, “A living dog is better than a dead lion.” The living at least know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ', even if it’s only that they’re going to die. But the dead know nothing and get nothing. They’re a minus that no one remembers. Their loves, their hates, yes, even their dreams, are long gone. There’s not a trace of them left in the affairs of this earth.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seize life! Eat bread with gusto,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drink wine with a robust heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh yes—God takes pleasure in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' pleasure!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dress festively every morning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t skimp on colors and scarves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Relish life with the spouse you love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each and every day of your precarious life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each day is God’s gift. It’s all you get in exchange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the hard work of staying alive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the most of each one!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whatever turns up, grab it and do it. And heartily!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is your last and only chance at it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there’s neither work to do nor thoughts to think
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the company of the dead, where you’re most certainly headed.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
