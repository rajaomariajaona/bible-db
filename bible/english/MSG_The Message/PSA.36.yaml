document_id: PSA.36,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: The God-rebel tunes in to sedition—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all ears, eager to sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has no regard for God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he stands insolent before him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has smooth-talked himself
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into believing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That his evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be noticed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Words gutter from his mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dishwater dirty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t remember when he
  - type: usfm
    marker: q2
    children:
    - type: text
      text: did anything decent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every time he goes to bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he fathers another evil plot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he’s loose on the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nobody’s safe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He plays with fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and doesn’t care who gets burned.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: Keep on loving your friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do your work in welcoming hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let the bullies kick me around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the moral midgets slap me down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send the upstarts sprawling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flat on their faces in the mud.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: God’s love is meteoric,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his loyalty astronomic,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His purpose titanic,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his verdicts oceanic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet in his largeness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing gets lost;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a man, not a mouse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slips through the cracks.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: How exquisite your love, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How eager we are to run under your wings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To eat our fill at the banquet you spread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you fill our tankards with Eden spring water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re a fountain of cascading light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you open our eyes to light.
