document_id: PSA.36,97
type_code: eng
verses:
  '1':
  - type: text
    content: The God-rebel tunes in to sedition—
  - type: text
    content: all ears, eager to sin.
  - type: text
    content: He has no regard for God,
  - type: text
    content: he stands insolent before him.
  - type: text
    content: He has smooth-talked himself
  - type: text
    content: into believing
  - type: text
    content: That his evil
  - type: text
    content: will never be noticed.
  - type: text
    content: Words gutter from his mouth,
  - type: text
    content: dishwater dirty.
  - type: text
    content: Can’t remember when he
  - type: text
    content: did anything decent.
  - type: text
    content: Every time he goes to bed,
  - type: text
    content: he fathers another evil plot.
  - type: text
    content: When he’s loose on the streets,
  - type: text
    content: nobody’s safe.
  - type: text
    content: He plays with fire
  - type: text
    content: and doesn’t care who gets burned.
  '10':
  - type: text
    content: Keep on loving your friends;
  - type: text
    content: do your work in welcoming hearts.
  - type: text
    content: Don’t let the bullies kick me around,
  - type: text
    content: the moral midgets slap me down.
  - type: text
    content: Send the upstarts sprawling
  - type: text
    content: flat on their faces in the mud.
  '5':
  - type: text
    content: God’s love is meteoric,
  - type: text
    content: his loyalty astronomic,
  - type: text
    content: His purpose titanic,
  - type: text
    content: his verdicts oceanic.
  - type: text
    content: Yet in his largeness
  - type: text
    content: nothing gets lost;
  - type: text
    content: Not a man, not a mouse,
  - type: text
    content: slips through the cracks.
  '7':
  - type: text
    content: How exquisite your love, O God!
  - type: text
    content: How eager we are to run under your wings,
  - type: text
    content: To eat our fill at the banquet you spread
  - type: text
    content: as you fill our tankards with Eden spring water.
  - type: text
    content: You’re a fountain of cascading light,
  - type: text
    content: and you open our eyes to light.
