    children:
    - type: text
      text: David Goes to Get the Chest of God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-14
    - type: text
      text: 'David consulted with all of his leaders, the commanders of thousands and of hundreds. Then David addressed the entire assembly of Israel, “If it seems right to you, and it is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s will, let’s invite all our relatives wherever they are throughout Israel, along with their relatives, including their priests and Levites from their cities and surrounding pastures, to join us. And let’s bring the Chest of our God back—the Chest that was out of sight, out of mind during the days of Saul.” The entire assembly of Israel agreed—everybody agreed that it was the right thing to do. So David gathered all Israel together, from Egypt’s Pond of Horus in the southwest to the Pass of Hamath in the northeast, to go and get the Chest of God from Kiriath Jearim. Then David and all Israel went to Baalah (Kiriath Jearim) in Judah to bring back the Chest of God, the “Cherubim-Throne-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ',” where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Name is invoked. They moved the Chest of God on a brand-new cart from the house of Abinadab with Uzzah and Ahio in charge. In procession with the Chest of God, David and all Israel worshiped exuberantly in song and dance, with a marching band of all kinds of instruments. When they were at the threshing floor of Kidon, the oxen stumbled and Uzzah grabbed the Chest to keep it from falling off. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' erupted in anger against Uzzah and killed him because he grabbed the Chest. He died on the spot—in the presence of God. David lost his temper, angry because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' exploded against Uzzah; the place is still called Perez Uzzah (Exploded Uzzah). David was terrified of God that day; he said, “How can I possibly continue this parade with the Chest of God?” So David called off the parade of the Chest to the City of David; instead he stored it in the house of Obed-Edom the Gittite. The Chest of God was in storage in the house of Obed-Edom for three months. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' blessed the family of Obed-Edom and everything around him.'
