document_id: PSA.78,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: Listen, dear friends, to God’s truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bend your ears to what I tell you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m chewing on the morsel of a proverb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll let you in on the sweet old truths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stories we heard from our fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: counsel we learned at our mother’s knee.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re not keeping this to ourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’re passing it along to the next generation—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s fame and fortune,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the marvelous things he has done.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-20
    - type: text
      text: All they did was sin even more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebel in the desert against the High God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tried to get their own way with God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clamored for favors, for special attention.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They whined like spoiled children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Why can’t God give us a decent meal in this desert?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sure, he struck the rock and the water flowed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: creeks cascaded from the rock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But how about some fresh-baked bread?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How about a nice cut of meat?”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-31
    - type: text
      text: 'When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' heard that, he was furious—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his anger flared against Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he lost his temper with Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was clear they didn’t believe God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had no intention of trusting in his help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God helped them anyway, commanded the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave orders that opened the gates of heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rained down showers of manna to eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he gave them the Bread of Heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ate the bread of the mighty angels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sent them all the food they could eat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He let East Wind break loose from the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave a strong push to South Wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This time it was birds that rained down—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: succulent birds, an abundance of birds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He aimed them right for the center of their camp;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all round their tents there were birds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ate and had their fill;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he handed them everything they craved on a platter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their greed knew no bounds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stuffed their mouths with more and more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Finally, God was fed up, his anger erupted—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he cut down their brightest and best,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he laid low Israel’s finest young men.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-37
    - type: text
      text: And—can you believe it?—they kept right on sinning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all those wonders and they still wouldn’t believe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So their lives wasted away to nothing—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing to show for their lives but a ghost town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he cut them down, they came running for help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they turned and pled for mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gave witness that God was their rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that High God was their redeemer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they didn’t mean a word of it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lied through their teeth the whole time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They could not have cared less about him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wanted nothing to do with his Covenant.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-55
    - type: text
      text: And God? Compassionate!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forgave the sin! Didn’t destroy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over and over he reined in his anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: restrained his considerable wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He knew what they were made of;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he knew there wasn’t much to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How often in the desert they had spurned him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tried his patience in those wilderness years.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Time and again they pushed him to the limit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provoked Israel’s Holy God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How quickly they forgot what he’d done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgot their day of rescue from the enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he did miracles in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wonders on the plain of Zoan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned the River and its streams to blood—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a drop of water fit to drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent flies, which ate them alive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and frogs, which drove them crazy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned their harvest over to caterpillars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything they had worked for to the locusts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He flattened their grapevines with hail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a killing frost ruined their orchards.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pounded their cattle with hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let thunderbolts loose on their herds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His anger flared,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wild firestorm of havoc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An advance guard of disease-carrying angels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to clear the ground, preparing the way before him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He didn’t spare those people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he let the plague rage through their lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He killed all the Egyptian firstborns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lusty infants, offspring of Ham’s virility.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he led his people out like sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: took his flock safely through the wilderness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He took good care of them; they had nothing to fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Sea took care of their enemies for good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought them into his holy land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this mountain he claimed for his own.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He scattered everyone who got in their way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he staked out an inheritance for them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the tribes of Israel all had their own places.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: He planted a witness in Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set his Word firmly in Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then commanded our parents
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to teach it to their children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the next generation would know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the generations to come—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Know the truth and tell the stories
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so their children can trust in God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never forget the works of God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but keep his commands to the letter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heaven forbid they should be like their parents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bullheaded and bad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fickle and faithless bunch
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who never stayed true to God.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 56-64
    - type: text
      text: But they kept on giving him a hard time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebelled against God, the High God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refused to do anything he told them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They were worse, if that’s possible, than their parents:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: traitors—crooked as a corkscrew.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their pagan orgies provoked God’s anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their obscene idolatries broke his heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God heard their carryings-on, he was furious;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he posted a huge No over Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He walked off and left Shiloh empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: abandoned the shrine where he had met with Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He let his pride and joy go to the dogs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned his back on the pride of his life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned them loose on fields of battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: angry, he let them fend for themselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their young men went to war and never came back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their young women waited in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their priests were massacred,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their widows never shed a tear.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 65-72
    - type: text
      text: Suddenly the Lord was up on his feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like someone roused from deep sleep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shouting like a drunken warrior.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hit his enemies hard, sent them running,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yelping, not daring to look back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He disqualified Joseph as leader,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: told Ephraim he didn’t have what it takes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And chose the Tribe of Judah instead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mount Zion, which he loves so much.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He built his sanctuary there, resplendent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: solid and lasting as the earth itself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he chose David, his servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: handpicked him from his work in the sheep pens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One day he was caring for the ewes and their lambs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the next day God had him shepherding Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his people Israel, his prize possession.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His good heart made him a good shepherd;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he guided the people wisely and well.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-16
    - type: text
      text: The Ephraimites, armed to the teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ran off when the battle began.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were cowards to God’s Covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refused to walk by his Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot what he had done—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: marvels he’d done right before their eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He performed miracles in plain sight of their parents
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Egypt, out on the fields of Zoan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He split the Sea and they walked right through it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he piled the waters to the right and the left.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led them by day with a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: led them all the night long with a fiery torch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He split rocks in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave them all they could drink from underground springs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made creeks flow out from sheer rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and water pour out like a river.
