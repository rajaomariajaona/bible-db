document_id: PSA.78,97
type_code: eng
verses:
  '1':
  - type: text
    content: Listen, dear friends, to God’s truth,
  - type: text
    content: bend your ears to what I tell you.
  - type: text
    content: I’m chewing on the morsel of a proverb;
  - type: text
    content: I’ll let you in on the sweet old truths,
  - type: text
    content: Stories we heard from our fathers,
  - type: text
    content: counsel we learned at our mother’s knee.
  - type: text
    content: We’re not keeping this to ourselves,
  - type: text
    content: we’re passing it along to the next generation—
  - type: text
    content: God
  - type: text
    content: ’s fame and fortune,
  - type: text
    content: the marvelous things he has done.
  '17':
  - type: text
    content: All they did was sin even more,
  - type: text
    content: rebel in the desert against the High God.
  - type: text
    content: They tried to get their own way with God,
  - type: text
    content: clamored for favors, for special attention.
  - type: text
    content: They whined like spoiled children,
  - type: text
    content: “Why can’t God give us a decent meal in this desert?
  - type: text
    content: Sure, he struck the rock and the water flowed,
  - type: text
    content: creeks cascaded from the rock.
  - type: text
    content: But how about some fresh-baked bread?
  - type: text
    content: How about a nice cut of meat?”
  '21':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' heard that, he was furious—'
  - type: text
    content: his anger flared against Jacob,
  - type: text
    content: he lost his temper with Israel.
  - type: text
    content: It was clear they didn’t believe God,
  - type: text
    content: had no intention of trusting in his help.
  - type: text
    content: But God helped them anyway, commanded the clouds
  - type: text
    content: and gave orders that opened the gates of heaven.
  - type: text
    content: He rained down showers of manna to eat,
  - type: text
    content: he gave them the Bread of Heaven.
  - type: text
    content: They ate the bread of the mighty angels;
  - type: text
    content: he sent them all the food they could eat.
  - type: text
    content: He let East Wind break loose from the skies,
  - type: text
    content: gave a strong push to South Wind.
  - type: text
    content: This time it was birds that rained down—
  - type: text
    content: succulent birds, an abundance of birds.
  - type: text
    content: He aimed them right for the center of their camp;
  - type: text
    content: all round their tents there were birds.
  - type: text
    content: They ate and had their fill;
  - type: text
    content: he handed them everything they craved on a platter.
  - type: text
    content: But their greed knew no bounds;
  - type: text
    content: they stuffed their mouths with more and more.
  - type: text
    content: Finally, God was fed up, his anger erupted—
  - type: text
    content: he cut down their brightest and best,
  - type: text
    content: he laid low Israel’s finest young men.
  '32':
  - type: text
    content: And—can you believe it?—they kept right on sinning;
  - type: text
    content: all those wonders and they still wouldn’t believe!
  - type: text
    content: So their lives wasted away to nothing—
  - type: text
    content: nothing to show for their lives but a ghost town.
  - type: text
    content: When he cut them down, they came running for help;
  - type: text
    content: they turned and pled for mercy.
  - type: text
    content: They gave witness that God was their rock,
  - type: text
    content: that High God was their redeemer,
  - type: text
    content: But they didn’t mean a word of it;
  - type: text
    content: they lied through their teeth the whole time.
  - type: text
    content: They could not have cared less about him,
  - type: text
    content: wanted nothing to do with his Covenant.
  '38':
  - type: text
    content: And God? Compassionate!
  - type: text
    content: Forgave the sin! Didn’t destroy!
  - type: text
    content: Over and over he reined in his anger,
  - type: text
    content: restrained his considerable wrath.
  - type: text
    content: He knew what they were made of;
  - type: text
    content: he knew there wasn’t much to them,
  - type: text
    content: How often in the desert they had spurned him,
  - type: text
    content: tried his patience in those wilderness years.
  - type: text
    content: Time and again they pushed him to the limit,
  - type: text
    content: provoked Israel’s Holy God.
  - type: text
    content: How quickly they forgot what he’d done,
  - type: text
    content: forgot their day of rescue from the enemy,
  - type: text
    content: When he did miracles in Egypt,
  - type: text
    content: wonders on the plain of Zoan.
  - type: text
    content: He turned the River and its streams to blood—
  - type: text
    content: not a drop of water fit to drink.
  - type: text
    content: He sent flies, which ate them alive,
  - type: text
    content: and frogs, which drove them crazy.
  - type: text
    content: He turned their harvest over to caterpillars,
  - type: text
    content: everything they had worked for to the locusts.
  - type: text
    content: He flattened their grapevines with hail;
  - type: text
    content: a killing frost ruined their orchards.
  - type: text
    content: He pounded their cattle with hail,
  - type: text
    content: let thunderbolts loose on their herds.
  - type: text
    content: His anger flared,
  - type: text
    content: a wild firestorm of havoc,
  - type: text
    content: An advance guard of disease-carrying angels
  - type: text
    content: to clear the ground, preparing the way before him.
  - type: text
    content: He didn’t spare those people,
  - type: text
    content: he let the plague rage through their lives.
  - type: text
    content: He killed all the Egyptian firstborns,
  - type: text
    content: lusty infants, offspring of Ham’s virility.
  - type: text
    content: Then he led his people out like sheep,
  - type: text
    content: took his flock safely through the wilderness.
  - type: text
    content: He took good care of them; they had nothing to fear.
  - type: text
    content: The Sea took care of their enemies for good.
  - type: text
    content: He brought them into his holy land,
  - type: text
    content: this mountain he claimed for his own.
  - type: text
    content: He scattered everyone who got in their way;
  - type: text
    content: he staked out an inheritance for them—
  - type: text
    content: the tribes of Israel all had their own places.
  '5':
  - type: text
    content: He planted a witness in Jacob,
  - type: text
    content: set his Word firmly in Israel,
  - type: text
    content: Then commanded our parents
  - type: text
    content: to teach it to their children
  - type: text
    content: So the next generation would know,
  - type: text
    content: and all the generations to come—
  - type: text
    content: Know the truth and tell the stories
  - type: text
    content: so their children can trust in God,
  - type: text
    content: Never forget the works of God
  - type: text
    content: but keep his commands to the letter.
  - type: text
    content: Heaven forbid they should be like their parents,
  - type: text
    content: bullheaded and bad,
  - type: text
    content: A fickle and faithless bunch
  - type: text
    content: who never stayed true to God.
  '56':
  - type: text
    content: But they kept on giving him a hard time,
  - type: text
    content: rebelled against God, the High God,
  - type: text
    content: refused to do anything he told them.
  - type: text
    content: 'They were worse, if that’s possible, than their parents:'
  - type: text
    content: traitors—crooked as a corkscrew.
  - type: text
    content: Their pagan orgies provoked God’s anger,
  - type: text
    content: their obscene idolatries broke his heart.
  - type: text
    content: When God heard their carryings-on, he was furious;
  - type: text
    content: he posted a huge No over Israel.
  - type: text
    content: He walked off and left Shiloh empty,
  - type: text
    content: abandoned the shrine where he had met with Israel.
  - type: text
    content: He let his pride and joy go to the dogs,
  - type: text
    content: turned his back on the pride of his life.
  - type: text
    content: He turned them loose on fields of battle;
  - type: text
    content: angry, he let them fend for themselves.
  - type: text
    content: Their young men went to war and never came back;
  - type: text
    content: their young women waited in vain.
  - type: text
    content: Their priests were massacred,
  - type: text
    content: and their widows never shed a tear.
  '65':
  - type: text
    content: Suddenly the Lord was up on his feet
  - type: text
    content: like someone roused from deep sleep,
  - type: text
    content: shouting like a drunken warrior.
  - type: text
    content: He hit his enemies hard, sent them running,
  - type: text
    content: yelping, not daring to look back.
  - type: text
    content: He disqualified Joseph as leader,
  - type: text
    content: told Ephraim he didn’t have what it takes,
  - type: text
    content: And chose the Tribe of Judah instead,
  - type: text
    content: Mount Zion, which he loves so much.
  - type: text
    content: He built his sanctuary there, resplendent,
  - type: text
    content: solid and lasting as the earth itself.
  - type: text
    content: Then he chose David, his servant,
  - type: text
    content: handpicked him from his work in the sheep pens.
  - type: text
    content: One day he was caring for the ewes and their lambs,
  - type: text
    content: the next day God had him shepherding Jacob,
  - type: text
    content: his people Israel, his prize possession.
  - type: text
    content: His good heart made him a good shepherd;
  - type: text
    content: he guided the people wisely and well.
  '9':
  - type: text
    content: The Ephraimites, armed to the teeth,
  - type: text
    content: ran off when the battle began.
  - type: text
    content: They were cowards to God’s Covenant,
  - type: text
    content: refused to walk by his Word.
  - type: text
    content: They forgot what he had done—
  - type: text
    content: marvels he’d done right before their eyes.
  - type: text
    content: He performed miracles in plain sight of their parents
  - type: text
    content: in Egypt, out on the fields of Zoan.
  - type: text
    content: He split the Sea and they walked right through it;
  - type: text
    content: he piled the waters to the right and the left.
  - type: text
    content: He led them by day with a cloud,
  - type: text
    content: led them all the night long with a fiery torch.
  - type: text
    content: He split rocks in the wilderness,
  - type: text
    content: gave them all they could drink from underground springs;
  - type: text
    content: He made creeks flow out from sheer rock,
  - type: text
    content: and water pour out like a river.
