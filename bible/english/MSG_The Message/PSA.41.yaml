document_id: PSA.41,97
type_code: eng
verses:
  '1':
  - type: text
    content: Dignify those who are down on their luck;
  - type: text
    content: you’ll feel good—
  - type: text
    content: that’s
  - type: text
    content: ' what '
  - type: text
    content: God
  - type: text
    content: ' does.'
  - type: text
    content: God
  - type: text
    content: ' looks after us all,'
  - type: text
    content: makes us robust with life—
  - type: text
    content: Lucky to be in the land,
  - type: text
    content: we’re free from enemy worries.
  - type: text
    content: Whenever we’re sick and in bed,
  - type: text
    content: God
  - type: text
    content: ' becomes our nurse,'
  - type: text
    content: nurses us back to health.
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', give grace, get me up on my feet.'
  - type: text
    content: I’ll show them a thing or two.
  '11':
  - type: text
    content: Meanwhile, I’m sure you’re on my side—
  - type: text
    content: no victory shouts yet from the enemy camp!
  - type: text
    content: You know me inside and out, you hold me together,
  - type: text
    content: you never fail to stand me tall in your presence
  - type: text
    content: so I can look you in the eye.
  '13':
  - type: text
    content: 'Blessed is '
  - type: text
    content: God
  - type: text
    content: ', Israel’s God,'
  - type: text
    content: always, always, always.
  - type: text
    content: Yes. Yes. Yes.
  '4':
  - type: text
    content: I said, “
  - type: text
    content: God
  - type: text
    content: ', be gracious!'
  - type: text
    content: Put me together again—
  - type: text
    content: my sins have torn me to pieces.”
  - type: text
    content: My enemies are wishing the worst for me;
  - type: text
    content: they make bets on what day I will die.
  - type: text
    content: If someone comes to see me,
  - type: text
    content: he mouths empty platitudes,
  - type: text
    content: All the while gathering gossip about me
  - type: text
    content: to entertain the street-corner crowd.
  - type: text
    content: These “friends” who hate me
  - type: text
    content: whisper slanders all over town.
  - type: text
    content: They form committees
  - type: text
    content: to plan misery for me.
  '8':
  - type: text
    content: The rumor goes out, “He’s got some dirty,
  - type: text
    content: deadly disease. The doctors
  - type: text
    content: have given up on him.”
  - type: text
    content: Even my best friend, the one I always told everything
  - type: text
    content: —he ate meals at my house all the time!—
  - type: text
    content: has bitten my hand.
