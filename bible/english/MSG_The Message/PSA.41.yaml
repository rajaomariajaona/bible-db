    children:
    - type: text
      text: 1-3
  - type: text
    text: Dignify those who are down on their luck;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll feel good—
  - type: usfm
    marker: it
    children:
    - type: text
      text: that’s
  - type: text
    text: ' what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' does.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' looks after us all,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: makes us robust with life—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lucky to be in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’re free from enemy worries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whenever we’re sick and in bed,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' becomes our nurse,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: nurses us back to health.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: I said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', be gracious!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put me together again—
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sins have torn me to pieces.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: My enemies are wishing the worst for me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they make bets on what day I will die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If someone comes to see me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he mouths empty platitudes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the while gathering gossip about me
- type: usfm
  marker: q2
  children:
  - type: text
    text: to entertain the street-corner crowd.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These “friends” who hate me
- type: usfm
  marker: q2
  children:
  - type: text
    text: whisper slanders all over town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They form committees
- type: usfm
  marker: q2
  children:
  - type: text
    text: to plan misery for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: The rumor goes out, “He’s got some dirty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deadly disease. The doctors
- type: usfm
  marker: q2
  children:
  - type: text
    text: have given up on him.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even my best friend, the one I always told everything
- type: usfm
  marker: q2
  children:
  - type: text
    text: —he ate meals at my house all the time!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: has bitten my hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', give grace, get me up on my feet.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll show them a thing or two.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Meanwhile, I’m sure you’re on my side—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no victory shouts yet from the enemy camp!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You know me inside and out, you hold me together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you never fail to stand me tall in your presence
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I can look you in the eye.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Blessed is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Israel’s God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: always, always, always.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes. Yes. Yes.
