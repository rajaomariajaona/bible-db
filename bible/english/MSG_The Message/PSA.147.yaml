document_id: PSA.147,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s a good thing to sing praise to our God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: praise is beautiful, praise is fitting.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-18
    - type: text
      text: 'Jerusalem, worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion, praise your God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made your city secure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he blessed your children among you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps the peace at your borders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he puts the best bread on your tables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He launches his promises earthward—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how swift and sure they come!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spreads snow like a white fleece,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he scatters frost like ashes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He broadcasts hail like birdseed—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can survive his winter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he gives the command and it all melts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he breathes on winter—suddenly it’s spring!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: He speaks the same way to Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: speaks words that work to Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He never did this to the other nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they never heard such commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-6
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s the one who rebuilds Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who regathers Israel’s scattered exiles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He heals the heartbroken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bandages their wounds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He counts the stars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and assigns each a name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our Lord is great, with limitless strength;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’ll never comprehend what he knows and does.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' puts the fallen on their feet again'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pushes the wicked into the ditch.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-11
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' a thanksgiving hymn,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: play music on your instruments to God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who fills the sky with clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preparing rain for the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then turning the mountains green with grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feeding both cattle and crows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s not impressed with horsepower;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the size of our muscles means little to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' get '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God’
    - type: text
      text: s attention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they can depend on his strength.
