verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: It’s a good thing to sing praise to our God;
  - type: text
    content: praise is beautiful, praise is fitting.
  '12':
  - type: text
    content: 'Jerusalem, worship '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Zion, praise your God!
  - type: text
    content: He made your city secure,
  - type: text
    content: he blessed your children among you.
  - type: text
    content: He keeps the peace at your borders,
  - type: text
    content: he puts the best bread on your tables.
  - type: text
    content: He launches his promises earthward—
  - type: text
    content: how swift and sure they come!
  - type: text
    content: He spreads snow like a white fleece,
  - type: text
    content: he scatters frost like ashes,
  - type: text
    content: He broadcasts hail like birdseed—
  - type: text
    content: who can survive his winter?
  - type: text
    content: Then he gives the command and it all melts;
  - type: text
    content: he breathes on winter—suddenly it’s spring!
  '19':
  - type: text
    content: He speaks the same way to Jacob,
  - type: text
    content: speaks words that work to Israel.
  - type: text
    content: He never did this to the other nations;
  - type: text
    content: they never heard such commands.
  - type: text
    content: Hallelujah!
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s the one who rebuilds Jerusalem,
  - type: text
    content: who regathers Israel’s scattered exiles.
  - type: text
    content: He heals the heartbroken
  - type: text
    content: and bandages their wounds.
  - type: text
    content: He counts the stars
  - type: text
    content: and assigns each a name.
  - type: text
    content: Our Lord is great, with limitless strength;
  - type: text
    content: we’ll never comprehend what he knows and does.
  - type: text
    content: God
  - type: text
    content: ' puts the fallen on their feet again'
  - type: text
    content: and pushes the wicked into the ditch.
  '7':
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: ' a thanksgiving hymn,'
  - type: text
    content: play music on your instruments to God,
  - type: text
    content: Who fills the sky with clouds,
  - type: text
    content: preparing rain for the earth,
  - type: text
    content: Then turning the mountains green with grass,
  - type: text
    content: feeding both cattle and crows.
  - type: text
    content: He’s not impressed with horsepower;
  - type: text
    content: the size of our muscles means little to him.
  - type: text
    content: 'Those who fear '
  - type: text
    content: God
  - type: text
    content: ' get '
  - type: text
    content: God’
  - type: text
    content: s attention;
  - type: text
    content: they can depend on his strength.
