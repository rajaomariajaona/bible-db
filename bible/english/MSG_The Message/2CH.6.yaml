document_id: 2CH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Dedication and Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Then Solomon said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said he would dwell in a cloud,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’ve built a temple most splendid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place for you to live in forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The king then turned to face the congregation that had come together and blessed them:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: '“Blessed be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, who spoke personally to my father David. Now he has done what he promised when he said, ‘From the day I brought my people Israel up from Egypt, I haven’t set apart one city among the tribes of Israel in which to build a temple to honor my Name, or chosen one person to be the leader. But now I have chosen both a city and a person: Jerusalem for honoring my Name and David to lead my people Israel.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: '“My father David very much wanted to build a temple honoring the Name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told him, ‘It was good that you wanted to build a temple in my honor—most commendable! But you are not the one to do it. Your son, who will carry on your dynasty, will build it for my Name.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: '“And now you see the promise completed. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done what he said he would do; I have succeeded David my father and now rule Israel; and I have built a temple to honor '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, and have secured a place for the Chest that holds the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the covenant he made with the people of Israel.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16
  - type: text
    text: 'Before the entire congregation of Israel, Solomon took his position at the Altar of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and stretched out his hands. Solomon had made a bronze dais seven and a half feet square and four and a half feet high and placed it inside the court; that’s where he now stood. Then he knelt in full view of the whole congregation, stretched his hands to heaven, and prayed:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', O God of Israel, there is no God like you in the skies above or on the earth below, who unswervingly keeps covenant with his servants and unfailingly loves them while they sincerely live in obedience to your way. You kept your word to David my father, your promise. You did exactly what you promised—every detail. The proof is before us today!'
- type: usfm
  marker: pm
  children:
  - type: text
    text: 'Keep it up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', O God of Israel! Continue to keep the promises you made to David my father when you said, “You’ll always have a descendant to represent my rule on Israel’s throne, on the one condition that your sons are as careful to live obediently in my presence as you have.”'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God of Israel, let this all happen—'
- type: usfm
  marker: q3
  children:
  - type: text
    text: confirm and establish it!
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: 'Can it be that God will actually move into our neighborhood? Why, the cosmos itself isn’t large enough to give you breathing room, let alone this Temple I’ve built. Even so, I’m bold to ask: Pay attention to these my prayers, both intercessory and personal, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God. Listen to my prayers, energetic and devout, that I’m setting before you right now. Keep your eyes open to this Temple day and night, this place you promised to dignify with your Name. And listen to the prayers that I pray in this place. And listen to your people Israel when they pray at this place.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven
- type: usfm
  marker: q3
  children:
  - type: text
    text: and when you hear, forgive.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When someone hurts a neighbor and promises to make things right, and then comes and repeats the promise before your Altar in this Temple,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Listen from heaven and act;
- type: usfm
  marker: q3
  children:
  - type: text
    text: judge your servants, making the offender pay for the offense
- type: usfm
  marker: q2
  children:
  - type: text
    text: And set the offended free,
- type: usfm
  marker: q3
  children:
  - type: text
    text: dismissing all charges.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: When your people Israel are beaten by an enemy because they’ve sinned against you, but then turn to you and acknowledge your rule in prayers desperate and devout in this Temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven;
- type: usfm
  marker: q3
  children:
  - type: text
    text: forgive the sin of your people Israel,
- type: usfm
  marker: q3
  children:
  - type: text
    text: return them to the land you gave to them and their ancestors.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: When the skies shrivel up and there is no rain because your people have sinned against you, but then they pray at this place, acknowledging your rule and quit their sins because you have scourged them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven,
- type: usfm
  marker: q3
  children:
  - type: text
    text: forgive the sins of your servants, your people Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then start over with them;
- type: usfm
  marker: q3
  children:
  - type: text
    text: train them to live right and well;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Send rain on the land
- type: usfm
  marker: q3
  children:
  - type: text
    text: you gave as inheritance to your people.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-31
  - type: text
    text: When disasters strike, famine or catastrophe, crop failure or disease, locust or beetle, or when an enemy attacks their defenses—calamity of any sort—any prayer that’s prayed from anyone at all among your people Israel, their hearts penetrated by disaster, hands and arms thrown out for help to this Temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Listen from your home in heaven, forgive and reward us:'
- type: usfm
  marker: q3
  children:
  - type: text
    text: reward each life and circumstance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For you know each life from the inside,
- type: usfm
  marker: q3
  children:
  - type: text
    text: (you’re the only one with such inside knowledge!),
- type: usfm
  marker: q2
  children:
  - type: text
    text: So they’ll live before you in lifelong reverence and believing
- type: usfm
  marker: q3
  children:
  - type: text
    text: obedience on this land you gave our ancestors.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And don’t forget the foreigner who is not a member of your people Israel but has come from a far country because of your reputation—people are going to be attracted here by your great reputation, your wonderworking power—and who come to pray to this Temple.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Listen from your home in heaven
- type: usfm
  marker: q3
  children:
  - type: text
    text: and honor the prayers of the foreigner,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that people all over the world
- type: usfm
  marker: q3
  children:
  - type: text
    text: will know who you are and what you’re like,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And live in reverent obedience before you,
- type: usfm
  marker: q3
  children:
  - type: text
    text: just as your own people Israel do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So they’ll know that you personally
- type: usfm
  marker: q3
  children:
  - type: text
    text: make this Temple that I’ve built what it is.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: 'When your people go to war against their enemies at the time and place you send them and they pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' toward the city you chose and The Temple I’ve built to honor your Name,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from heaven to what they pray and ask for
- type: usfm
  marker: q3
  children:
  - type: text
    text: and do what is right for them.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-39
  - type: text
    text: When they sin against you—and they certainly will; there’s no one without sin!—and in anger you turn them over to the enemy and they are taken captive to the enemy’s land, whether far or near, but repent in the country of their captivity and pray with changed hearts in their exile, “We’ve sinned; we’ve done wrong; we’ve been most wicked,” and turn back to you heart and soul in the land of the enemy who conquered them, and pray to you toward their homeland, the land you gave their ancestors, toward the city you chose, and this Temple I have built to the honor of your Name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven
- type: usfm
  marker: q3
  children:
  - type: text
    text: to their prayers desperate and devout;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do what is best for them.
- type: usfm
  marker: q3
  children:
  - type: text
    text: Forgive your people who have sinned against you.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And now, dear God, be alert and attentive to prayer, all prayer, offered in this place.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: 'Up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', enjoy your new place of quiet repose,'
- type: usfm
  marker: q3
  children:
  - type: text
    text: you and your mighty covenant Chest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Dress your priests up in salvation clothes,
- type: usfm
  marker: q3
  children:
  - type: text
    text: let your holy people celebrate goodness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And don’t, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', back out on your anointed ones,'
- type: usfm
  marker: q3
  children:
  - type: text
    text: keep in mind the love promised to David your servant.
