document_id: 2CH.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Dedication and Prayer
  - type: text
    content: Then Solomon said,
  - type: text
    content: God
  - type: text
    content: ' said he would dwell in a cloud,'
  - type: text
    content: But I’ve built a temple most splendid,
  - type: text
    content: A place for you to live in forever.
  '10':
  - type: text
    content: '“And now you see the promise completed. '
  - type: text
    content: God
  - type: text
    content: ' has done what he said he would do; I have succeeded David my father and now rule Israel; and I have built a temple to honor '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, and have secured a place for the Chest that holds the Covenant of '
  - type: text
    content: God
  - type: text
    content: ', the covenant he made with the people of Israel.”'
  '12':
  - type: text
    content: 'Before the entire congregation of Israel, Solomon took his position at the Altar of '
  - type: text
    content: God
  - type: text
    content: ' and stretched out his hands. Solomon had made a bronze dais seven and a half feet square and four and a half feet high and placed it inside the court; that’s where he now stood. Then he knelt in full view of the whole congregation, stretched his hands to heaven, and prayed:'
  - type: text
    content: God
  - type: text
    content: ', O God of Israel, there is no God like you in the skies above or on the earth below, who unswervingly keeps covenant with his servants and unfailingly loves them while they sincerely live in obedience to your way. You kept your word to David my father, your promise. You did exactly what you promised—every detail. The proof is before us today!'
  - type: text
    content: 'Keep it up, '
  - type: text
    content: God
  - type: text
    content: ', O God of Israel! Continue to keep the promises you made to David my father when you said, “You’ll always have a descendant to represent my rule on Israel’s throne, on the one condition that your sons are as careful to live obediently in my presence as you have.”'
  '17':
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', God of Israel, let this all happen—'
  - type: text
    content: confirm and establish it!
  '18':
  - type: text
    content: 'Can it be that God will actually move into our neighborhood? Why, the cosmos itself isn’t large enough to give you breathing room, let alone this Temple I’ve built. Even so, I’m bold to ask: Pay attention to these my prayers, both intercessory and personal, O '
  - type: text
    content: God
  - type: text
    content: ', my God. Listen to my prayers, energetic and devout, that I’m setting before you right now. Keep your eyes open to this Temple day and night, this place you promised to dignify with your Name. And listen to the prayers that I pray in this place. And listen to your people Israel when they pray at this place.'
  - type: text
    content: Listen from your home in heaven
  - type: text
    content: and when you hear, forgive.
  '22':
  - type: text
    content: When someone hurts a neighbor and promises to make things right, and then comes and repeats the promise before your Altar in this Temple,
  '23':
  - type: text
    content: Listen from heaven and act;
  - type: text
    content: judge your servants, making the offender pay for the offense
  - type: text
    content: And set the offended free,
  - type: text
    content: dismissing all charges.
  '24':
  - type: text
    content: When your people Israel are beaten by an enemy because they’ve sinned against you, but then turn to you and acknowledge your rule in prayers desperate and devout in this Temple,
  - type: text
    content: Listen from your home in heaven;
  - type: text
    content: forgive the sin of your people Israel,
  - type: text
    content: return them to the land you gave to them and their ancestors.
  '26':
  - type: text
    content: When the skies shrivel up and there is no rain because your people have sinned against you, but then they pray at this place, acknowledging your rule and quit their sins because you have scourged them,
  - type: text
    content: Listen from your home in heaven,
  - type: text
    content: forgive the sins of your servants, your people Israel.
  - type: text
    content: Then start over with them;
  - type: text
    content: train them to live right and well;
  - type: text
    content: Send rain on the land
  - type: text
    content: you gave as inheritance to your people.
  '28':
  - type: text
    content: When disasters strike, famine or catastrophe, crop failure or disease, locust or beetle, or when an enemy attacks their defenses—calamity of any sort—any prayer that’s prayed from anyone at all among your people Israel, their hearts penetrated by disaster, hands and arms thrown out for help to this Temple,
  - type: text
    content: 'Listen from your home in heaven, forgive and reward us:'
  - type: text
    content: reward each life and circumstance,
  - type: text
    content: For you know each life from the inside,
  - type: text
    content: (you’re the only one with such inside knowledge!),
  - type: text
    content: So they’ll live before you in lifelong reverence and believing
  - type: text
    content: obedience on this land you gave our ancestors.
  '3':
  - type: text
    content: 'The king then turned to face the congregation that had come together and blessed them:'
  '32':
  - type: text
    content: And don’t forget the foreigner who is not a member of your people Israel but has come from a far country because of your reputation—people are going to be attracted here by your great reputation, your wonderworking power—and who come to pray to this Temple.
  '33':
  - type: text
    content: Listen from your home in heaven
  - type: text
    content: and honor the prayers of the foreigner,
  - type: text
    content: So that people all over the world
  - type: text
    content: will know who you are and what you’re like,
  - type: text
    content: And live in reverent obedience before you,
  - type: text
    content: just as your own people Israel do,
  - type: text
    content: So they’ll know that you personally
  - type: text
    content: make this Temple that I’ve built what it is.
  '34':
  - type: text
    content: 'When your people go to war against their enemies at the time and place you send them and they pray to '
  - type: text
    content: God
  - type: text
    content: ' toward the city you chose and The Temple I’ve built to honor your Name,'
  - type: text
    content: Listen from heaven to what they pray and ask for
  - type: text
    content: and do what is right for them.
  '36':
  - type: text
    content: When they sin against you—and they certainly will; there’s no one without sin!—and in anger you turn them over to the enemy and they are taken captive to the enemy’s land, whether far or near, but repent in the country of their captivity and pray with changed hearts in their exile, “We’ve sinned; we’ve done wrong; we’ve been most wicked,” and turn back to you heart and soul in the land of the enemy who conquered them, and pray to you toward their homeland, the land you gave their ancestors, toward the city you chose, and this Temple I have built to the honor of your Name,
  - type: text
    content: Listen from your home in heaven
  - type: text
    content: to their prayers desperate and devout;
  - type: text
    content: Do what is best for them.
  - type: text
    content: Forgive your people who have sinned against you.
  '4':
  - type: text
    content: '“Blessed be '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, who spoke personally to my father David. Now he has done what he promised when he said, ‘From the day I brought my people Israel up from Egypt, I haven’t set apart one city among the tribes of Israel in which to build a temple to honor my Name, or chosen one person to be the leader. But now I have chosen both a city and a person: Jerusalem for honoring my Name and David to lead my people Israel.’'
  '40':
  - type: text
    content: And now, dear God, be alert and attentive to prayer, all prayer, offered in this place.
  '41':
  - type: text
    content: 'Up, '
  - type: text
    content: God
  - type: text
    content: ', enjoy your new place of quiet repose,'
  - type: text
    content: you and your mighty covenant Chest;
  - type: text
    content: Dress your priests up in salvation clothes,
  - type: text
    content: let your holy people celebrate goodness.
  - type: text
    content: 'And don’t, '
  - type: text
    content: God
  - type: text
    content: ', back out on your anointed ones,'
  - type: text
    content: keep in mind the love promised to David your servant.
  '7':
  - type: text
    content: '“My father David very much wanted to build a temple honoring the Name of '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, but '
  - type: text
    content: God
  - type: text
    content: ' told him, ‘It was good that you wanted to build a temple in my honor—most commendable! But you are not the one to do it. Your son, who will carry on your dynasty, will build it for my Name.’'
