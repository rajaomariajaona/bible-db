document_id: ECC.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Things Are Bad
  - type: text
    content: 'I looked long and hard at what goes on around here, and let me tell you, things are bad. And people feel it. There are people, for instance, on whom God showers everything—money, property, reputation—all they ever wanted or dreamed of. And then God doesn’t let them enjoy it. Some stranger comes along and has all the fun. It’s more of what I’m calling '
  - type: text
    content: smoke.
  - type: text
    content: ' A bad business.'
  '10':
  - type: text
    content: Whatever happens, happens. Its destiny is fixed.
  - type: text
    content: You can’t argue with fate.
  '11':
  - type: text
    content: The more words that are spoken, the more smoke there is in the air. And who is any better off? And who knows what’s best for us as we live out our meager smoke-and-shadow lives? And who can tell any of us the next chapter of our lives?
  '3':
  - type: text
    content: Say a couple have scores of children and live a long, long life but never enjoy themselves—even though they end up with a big funeral! I’d say that a stillborn baby gets the better deal. It gets its start in a mist and ends up in the dark—unnamed. It sees nothing and knows nothing, but is better off by far than anyone living.
  '6':
  - type: text
    content: Even if someone lived a thousand years—make it two thousand!—but didn’t enjoy anything, what’s the point? Doesn’t everyone end up in the same place?
  '7':
  - type: text
    content: We work to feed our appetites;
  - type: text
    content: Meanwhile our souls go hungry.
  '8':
  - type: text
    content: So what advantage has a sage over a fool, or over some poor wretch who barely gets by? Just grab whatever you can while you can; don’t assume something better might turn up by and by. All it amounts to anyway is smoke. And spitting into the wind.
