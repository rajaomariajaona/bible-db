document_id: ECC.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Things Are Bad
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'I looked long and hard at what goes on around here, and let me tell you, things are bad. And people feel it. There are people, for instance, on whom God showers everything—money, property, reputation—all they ever wanted or dreamed of. And then God doesn’t let them enjoy it. Some stranger comes along and has all the fun. It’s more of what I’m calling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: smoke.
  - type: text
    text: ' A bad business.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: Say a couple have scores of children and live a long, long life but never enjoy themselves—even though they end up with a big funeral! I’d say that a stillborn baby gets the better deal. It gets its start in a mist and ends up in the dark—unnamed. It sees nothing and knows nothing, but is better off by far than anyone living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Even if someone lived a thousand years—make it two thousand!—but didn’t enjoy anything, what’s the point? Doesn’t everyone end up in the same place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: We work to feed our appetites;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Meanwhile our souls go hungry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: So what advantage has a sage over a fool, or over some poor wretch who barely gets by? Just grab whatever you can while you can; don’t assume something better might turn up by and by. All it amounts to anyway is smoke. And spitting into the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whatever happens, happens. Its destiny is fixed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can’t argue with fate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: The more words that are spoken, the more smoke there is in the air. And who is any better off? And who knows what’s best for us as we live out our meager smoke-and-shadow lives? And who can tell any of us the next chapter of our lives?
