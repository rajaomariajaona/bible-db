document_id: 1CH.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The family of Aaron was grouped as follows: Aaron’s sons were Nadab, Abihu, Eleazar, and Ithamar. Nadab and Abihu died before their father and left no sons. So Eleazar and Ithamar filled the office of priest. David assigned Zadok from the family of Eleazar and Ahimelech from the family of Ithamar and assigned them to separate divisions for carrying out their appointed ministries. It turned out that there were more leaders in Eleazar’s family than in Ithamar’s and so they divided them proportionately: sixteen clan leaders from Eleazar’s family and eight clan leaders from Ithamar’s family. They assigned the leaders by lot, treating both families alike, for there were officials of the sanctuary and officials of God among both the Eleazar and Ithamar families.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They served in this appointed order when they entered The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', following the procedures laid down by their ancestor Aaron as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, had commanded him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the Levites are as follows:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the sons of Amram: Shubael; from the sons of Shubael: Jehdeiah.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning Rehabiah: from his sons, Isshiah was the first.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the Izharites: Shelomoth; from the sons of Shelomoth: Jahath.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Hebron: Jeriah the first, Amariah the second, Jahaziel the third, and Jekameam the fourth.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Uzziel: Micah, and from the sons of Micah: Shamir. The brother of Micah was Isshiah, and from the sons of Isshiah: Zechariah.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli and Mushi. The son of Jaaziah: Beno. The sons of Merari from Jaaziah: Beno, Shoham, Zaccur, and Ibri.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Mahli: Eleazar, who had no sons.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Kish: Jerahmeel, the son of Kish.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from the sons of Mushi: Mahli, Eder, and Jerimoth.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the Levites by their families. They also cast lots, the same as their kindred the sons of Aaron had done, in the presence of David the king, Zadok, Ahimelech, and the leaders of the priestly and Levitical families. The families of the oldest and youngest brothers were treated the same.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The secretary Shemaiah son of Nethanel, a Levite, wrote down their names in the presence of the king, the officials, Zadok the priest, Ahimelech son of Abiathar, and the leaders of the priestly and Levitical families. They took turns: One family was selected from Eleazar and then one from Ithamar.'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The first lot fell to Jehoiarib,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the second to Jedaiah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the third to Harim,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the fourth to Seorim,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the fifth to Malkijah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the sixth to Mijamin,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the seventh to Hakkoz,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the eighth to Abijah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the ninth to Jeshua,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the tenth to Shecaniah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the eleventh to Eliashib,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the twelfth to Jakim,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the thirteenth to Huppah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the fourteenth to Jeshebeab,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the fifteenth to Bilgah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the sixteenth to Immer,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the seventeenth to Hezir,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the eighteenth to Happizzez,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the nineteenth to Pethahiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the twentieth to Jehezkel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the twenty-first to Jakin,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the twenty-second to Gamul,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the twenty-third to Delaiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and the twenty-fourth to Maaziah.
