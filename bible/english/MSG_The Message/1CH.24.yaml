document_id: 1CH.24,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The family of Aaron was grouped as follows: Aaron’s sons were Nadab, Abihu, Eleazar, and Ithamar. Nadab and Abihu died before their father and left no sons. So Eleazar and Ithamar filled the office of priest. David assigned Zadok from the family of Eleazar and Ahimelech from the family of Ithamar and assigned them to separate divisions for carrying out their appointed ministries. It turned out that there were more leaders in Eleazar’s family than in Ithamar’s and so they divided them proportionately: sixteen clan leaders from Eleazar’s family and eight clan leaders from Ithamar’s family. They assigned the leaders by lot, treating both families alike, for there were officials of the sanctuary and officials of God among both the Eleazar and Ithamar families.'
  '19':
  - type: text
    content: 'They served in this appointed order when they entered The Temple of '
  - type: text
    content: God
  - type: text
    content: ', following the procedures laid down by their ancestor Aaron as '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, had commanded him.'
  '20':
  - type: text
    content: 'The rest of the Levites are as follows:'
  - type: text
    content: 'From the sons of Amram: Shubael; from the sons of Shubael: Jehdeiah.'
  '21':
  - type: text
    content: 'Concerning Rehabiah: from his sons, Isshiah was the first.'
  '22':
  - type: text
    content: 'From the Izharites: Shelomoth; from the sons of Shelomoth: Jahath.'
  '23':
  - type: text
    content: 'The sons of Hebron: Jeriah the first, Amariah the second, Jahaziel the third, and Jekameam the fourth.'
  '24':
  - type: text
    content: 'The son of Uzziel: Micah, and from the sons of Micah: Shamir. The brother of Micah was Isshiah, and from the sons of Isshiah: Zechariah.'
  '26':
  - type: text
    content: 'The sons of Merari: Mahli and Mushi. The son of Jaaziah: Beno. The sons of Merari from Jaaziah: Beno, Shoham, Zaccur, and Ibri.'
  '28':
  - type: text
    content: 'From Mahli: Eleazar, who had no sons.'
  '29':
  - type: text
    content: 'From Kish: Jerahmeel, the son of Kish.'
  '30':
  - type: text
    content: 'And from the sons of Mushi: Mahli, Eder, and Jerimoth.'
  - type: text
    content: These were the Levites by their families. They also cast lots, the same as their kindred the sons of Aaron had done, in the presence of David the king, Zadok, Ahimelech, and the leaders of the priestly and Levitical families. The families of the oldest and youngest brothers were treated the same.
  '6':
  - type: text
    content: 'The secretary Shemaiah son of Nethanel, a Levite, wrote down their names in the presence of the king, the officials, Zadok the priest, Ahimelech son of Abiathar, and the leaders of the priestly and Levitical families. They took turns: One family was selected from Eleazar and then one from Ithamar.'
  '7':
  - type: text
    content: The first lot fell to Jehoiarib,
  - type: text
    content: the second to Jedaiah,
  - type: text
    content: the third to Harim,
  - type: text
    content: the fourth to Seorim,
  - type: text
    content: the fifth to Malkijah,
  - type: text
    content: the sixth to Mijamin,
  - type: text
    content: the seventh to Hakkoz,
  - type: text
    content: the eighth to Abijah,
  - type: text
    content: the ninth to Jeshua,
  - type: text
    content: the tenth to Shecaniah,
  - type: text
    content: the eleventh to Eliashib,
  - type: text
    content: the twelfth to Jakim,
  - type: text
    content: the thirteenth to Huppah,
  - type: text
    content: the fourteenth to Jeshebeab,
  - type: text
    content: the fifteenth to Bilgah,
  - type: text
    content: the sixteenth to Immer,
  - type: text
    content: the seventeenth to Hezir,
  - type: text
    content: the eighteenth to Happizzez,
  - type: text
    content: the nineteenth to Pethahiah,
  - type: text
    content: the twentieth to Jehezkel,
  - type: text
    content: the twenty-first to Jakin,
  - type: text
    content: the twenty-second to Gamul,
  - type: text
    content: the twenty-third to Delaiah,
  - type: text
    content: and the twenty-fourth to Maaziah.
