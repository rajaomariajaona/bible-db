document_id: EXO.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: A man from the family of Levi married a Levite woman. The woman became pregnant and had a son. She saw there was something special about him and hid him. She hid him for three months. When she couldn’t hide him any longer she got a little basket-boat made of papyrus, waterproofed it with tar and pitch, and placed the child in it. Then she set it afloat in the reeds at the edge of the Nile.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After the child was weaned, she presented him to Pharaoh’s daughter who adopted him as her son. She named him Moses (Pulled-Out), saying, “I pulled him out of the water.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Time passed. Moses grew up. One day he went and saw his brothers, saw all that hard labor. Then he saw an Egyptian hit a Hebrew—one of his relatives! He looked this way and then that; when he realized there was no one in sight, he killed the Egyptian and buried him in the sand.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day he went out there again. Two Hebrew men were fighting. He spoke to the man who started it: “Why are you hitting your neighbor?”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man shot back: “Who do you think you are, telling us what to do? Are you going to kill me the way you killed that Egyptian?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses panicked: “Word’s gotten out—people know about this.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh heard about it and tried to kill Moses, but Moses got away to the land of Midian. He sat down by a well.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest of Midian had seven daughters. They came and drew water, filling the troughs and watering their father’s sheep. When some shepherds came and chased the girls off, Moses came to their rescue and helped them water their sheep.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they got home to their father, Reuel, he said, “That didn’t take long. Why are you back so soon?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “An Egyptian,” they said, “rescued us from a bunch of shepherds. Why, he even drew water for us and watered the sheep.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “So where is he? Why did you leave him behind? Invite him so he can have something to eat with us.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses agreed to settle down there with the man, who then gave his daughter Zipporah (Bird) to him for his wife. She had a son, and Moses named him Gershom (Sojourner), saying, “I’m a sojourner in a foreign country.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many years later the king of Egypt died. The Israelites groaned under their slavery and cried out. Their cries for relief from their hard labor ascended to God:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God listened to their groanings.
  - type: usfm
    marker: p
    children:
    - type: text
      text: God remembered his covenant with Abraham, with Isaac, and with Jacob.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God saw what was going on with Israel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: God understood.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The baby’s older sister found herself a vantage point a little way off and watched to see what would happen to him. Pharaoh’s daughter came down to the Nile to bathe; her maidens strolled on the bank. She saw the basket-boat floating in the reeds and sent her maid to get it. She opened it and saw the child—a baby crying! Her heart went out to him. She said, “This must be one of the Hebrew babies.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his sister was before her: “Do you want me to go and get a nursing mother from the Hebrews so she can nurse the baby for you?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh’s daughter said, “Yes. Go.” The girl went and called the child’s mother.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh’s daughter told her, “Take this baby and nurse him for me. I’ll pay you.” The woman took the child and nursed him.
