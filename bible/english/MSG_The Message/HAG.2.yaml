document_id: HAG.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: This Temple Will End Up Better Than It Started Out
  - type: text
    content: 'On the twenty-first day of the seventh month, the Word of '
  - type: text
    content: God
  - type: text
    content: ' came through the prophet Haggai: “Tell Governor Zerubbabel son of Shealtiel and High Priest Joshua son of Jehozadak and all the people: ‘Is there anyone here who saw the Temple the way it used to be, all glorious? And what do you see now? Not much, right?'
  '10':
  - type: text
    content: 'On the twenty-fourth day of the ninth month (again, this was in the second year of Darius), '
  - type: text
    content: God
  - type: text
    content: '’s Message came to Haggai: “'
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaks: Consult the priests for a ruling. If someone carries a piece of sacred meat in his pocket, meat that is set apart for sacrifice on the altar, and the pocket touches a loaf of bread, a dish of stew, a bottle of wine or oil, or any other food, will these foods be made holy by such contact?”'
  - type: text
    content: The priests said, “No.”
  '13':
  - type: text
    content: Then Haggai said, “How about someone who is contaminated by touching a corpse—if that person touches one of these foods, will it be contaminated?”
  - type: text
    content: The priests said, “Yes, it will be contaminated.”
  '14':
  - type: text
    content: 'Then Haggai said, “‘So, this people is contaminated. Their nation is contaminated. Everything they do is contaminated. Whatever they do for me is contaminated.’ '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  '15':
  - type: text
    content: '“‘Think back. Before you set out to lay the first foundation stones for the rebuilding of my Temple, how did it go with you? Isn’t it true that your foot-dragging, halfhearted efforts at rebuilding the Temple of '
  - type: text
    content: God
  - type: text
    content: ' were reflected in a sluggish, halfway return on your crops—half the grain you were used to getting, half the wine? I hit you with drought and blight and hail. Everything you were doing got hit. But it didn’t seem to faze you. You continued to ignore me.’ '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '18':
  - type: text
    content: “‘Now think ahead from this same date—this twenty-fourth day of the ninth month. Think ahead from when the Temple rebuilding was launched. Has anything in your fields—vine, fig tree, pomegranate, olive tree—failed to flourish? From now on you can count on a blessing.’”
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came a second time to Haggai on that most memorable day, the twenty-fourth day of the ninth month: “Speak to Zerubbabel, the governor of Judah:'
  '21':
  - type: text
    content: ' “‘I am about to shake up everything, to turn everything upside down and start over from top to bottom—overthrow governments, destroy foreign powers, dismantle the world of weapons and armaments, throw armies into confusion, so that they end up killing one another. And on that day’”—this is '
  - type: text
    content: God
  - type: text
    content: '’s Message—“‘I will take you, O Zerubbabel son of Shealtiel, as my personal servant and I will set you as a signet ring, the sign of my sovereign presence and authority. I’ve looked over the field and chosen you for this work.’” The Message of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '4':
  - type: text
    content: “‘So get to work, Zerubbabel!’—
  - type: text
    content: God
  - type: text
    content: ' is speaking.'
  - type: text
    content: “‘Get to work, Joshua son of Jehozadak—high priest!’
  - type: text
    content: “‘Get to work, all you people!’—
  - type: text
    content: God
  - type: text
    content: ' is speaking.'
  - type: text
    content: '“‘Yes, get to work! For I am with you.’ The '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies is speaking! ‘Put into action the word I covenanted with you when you left Egypt. I’m living and breathing among you right now. Don’t be timid. Don’t hold back.’
  '6':
  - type: text
    content: '“This is what '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies said: ‘Before you know it, I will shake up sky and earth, ocean and fields. And I’ll shake down all the godless nations. They’ll bring bushels of wealth and I will fill this Temple with splendor.’ '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies says so.
  '8':
  - type: text
    content: ‘I own the silver,
  - type: text
    content: I own the gold.’
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '9':
  - type: text
    content: '“‘This Temple is going to end up far better than it started out, a glorious beginning but an even more glorious finish: a place in which I will hand out wholeness and holiness.’ Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.”
  - type: text
    content: '* * *'
