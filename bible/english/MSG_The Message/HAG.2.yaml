document_id: HAG.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: This Temple Will End Up Better Than It Started Out
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'On the twenty-first day of the seventh month, the Word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came through the prophet Haggai: “Tell Governor Zerubbabel son of Shealtiel and High Priest Joshua son of Jehozadak and all the people: ‘Is there anyone here who saw the Temple the way it used to be, all glorious? And what do you see now? Not much, right?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: “‘So get to work, Zerubbabel!’—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is speaking.'
- type: usfm
  marker: p
  children:
  - type: text
    text: “‘Get to work, Joshua son of Jehozadak—high priest!’
- type: usfm
  marker: p
  children:
  - type: text
    text: “‘Get to work, all you people!’—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is speaking.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“‘Yes, get to work! For I am with you.’ The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies is speaking! ‘Put into action the word I covenanted with you when you left Egypt. I’m living and breathing among you right now. Don’t be timid. Don’t hold back.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: '“This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies said: ‘Before you know it, I will shake up sky and earth, ocean and fields. And I’ll shake down all the godless nations. They’ll bring bushels of wealth and I will fill this Temple with splendor.’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies says so.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ‘I own the silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I own the gold.’
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“‘This Temple is going to end up far better than it started out, a glorious beginning but an even more glorious finish: a place in which I will hand out wholeness and holiness.’ Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'On the twenty-fourth day of the ninth month (again, this was in the second year of Darius), '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to Haggai: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies speaks: Consult the priests for a ruling. If someone carries a piece of sacred meat in his pocket, meat that is set apart for sacrifice on the altar, and the pocket touches a loaf of bread, a dish of stew, a bottle of wine or oil, or any other food, will these foods be made holy by such contact?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: The priests said, “No.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Haggai said, “How about someone who is contaminated by touching a corpse—if that person touches one of these foods, will it be contaminated?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The priests said, “Yes, it will be contaminated.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Haggai said, “‘So, this people is contaminated. Their nation is contaminated. Everything they do is contaminated. Whatever they do for me is contaminated.’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: '“‘Think back. Before you set out to lay the first foundation stones for the rebuilding of my Temple, how did it go with you? Isn’t it true that your foot-dragging, halfhearted efforts at rebuilding the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' were reflected in a sluggish, halfway return on your crops—half the grain you were used to getting, half the wine? I hit you with drought and blight and hail. Everything you were doing got hit. But it didn’t seem to faze you. You continued to ignore me.’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: “‘Now think ahead from this same date—this twenty-fourth day of the ninth month. Think ahead from when the Temple rebuilding was launched. Has anything in your fields—vine, fig tree, pomegranate, olive tree—failed to flourish? From now on you can count on a blessing.’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21a
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came a second time to Haggai on that most memorable day, the twenty-fourth day of the ninth month: “Speak to Zerubbabel, the governor of Judah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21b-23
  - type: text
    text: ' “‘I am about to shake up everything, to turn everything upside down and start over from top to bottom—overthrow governments, destroy foreign powers, dismantle the world of weapons and armaments, throw armies into confusion, so that they end up killing one another. And on that day’”—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message—“‘I will take you, O Zerubbabel son of Shealtiel, as my personal servant and I will set you as a signet ring, the sign of my sovereign presence and authority. I’ve looked over the field and chosen you for this work.’” The Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
