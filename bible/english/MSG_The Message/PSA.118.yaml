      text: because his love never quits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the world, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His love never quits.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, clan of Aaron, tell the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His love never quits.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', join in,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His love never quits.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I didn’t die. I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lived
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And now I’m telling the world what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' did.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' tested me, he pushed me hard,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he didn’t hand me over to Death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Swing wide the city gates—the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: righteous
    - type: text
      text: ' gates!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’ll walk right through and thank '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This Temple Gate belongs to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the victors can enter and praise.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thank you for responding to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve truly become my salvation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stone the masons discarded as flawed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is now the capstone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s work.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We rub our eyes—we can hardly believe it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the very day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' acted—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let’s celebrate and be festive!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Salvation now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Salvation now!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Oh yes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —a free and full life!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed are you who enter in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s house we bless you!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has bathed us in light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adorn the shrine with garlands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hang colored banners above the altar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re my God, and I thank you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O my God, I lift high your praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thank '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —he’s so good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His love never quits!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pushed to the wall, I called to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the wide open spaces, he answered.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s now at my side and I’m not afraid;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who would dare lay a hand on me?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s my strong champion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I flick off my enemies like flies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Far better to take refuge in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than trust in people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Far better to take refuge in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than trust in celebrities.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hemmed in by barbarians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name I rubbed their faces in the dirt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hemmed in and with no way out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name I rubbed their faces in the dirt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like swarming bees, like wild prairie fire, they hemmed me in;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s name I rubbed their faces in the dirt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was right on the cliff-edge, ready to fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: grabbed and held me.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s my strength, he’s also my song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now he’s my salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the shouts, hear the triumph songs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the camp of the saved?
  - type: usfm
    marker: q3
    children:
    - type: text
      text: '“The hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has turned the tide!'
  - type: usfm
    marker: q3
    children:
    - type: text
      text: 'The hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: is raised in victory!
  - type: usfm
    marker: q3
    children:
    - type: text
      text: 'The hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has turned the tide!”'
