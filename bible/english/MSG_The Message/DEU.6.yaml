document_id: DEU.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'This is the commandment, the rules and regulations, that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commanded me to teach you to live out in the land you’re about to cross into to possess. This is so that you’ll live in deep reverence before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lifelong, observing all his rules and regulations that I’m commanding you, you and your children and your grandchildren, living good long lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Listen obediently, Israel. Do what you’re told so that you’ll have a good life, a life of abundance and bounty, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised, in a land abounding in milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Attention, Israel!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the one and only!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, with your whole heart: love him with all that’s in you, love him with all you’ve got!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: Write these commandments that I’ve given you today on your hearts. Get them inside of you and then get them inside your children. Talk about them wherever you are, sitting at home or walking in the street; talk about them from the time you get up in the morning to when you fall into bed at night. Tie them on your hands and foreheads as a reminder; inscribe them on the doorposts of your homes and on your city gates.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, ushers you into the land he promised through your ancestors Abraham, Isaac, and Jacob to give you, you’re going to walk into large, bustling cities you didn’t build, well-furnished houses you didn’t buy, come upon wells you didn’t dig, vineyards and olive orchards you didn’t plant. When you take it all in and settle down, pleased and content, make sure you don’t forget how you got there—'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brought you out of slavery in Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-19
  - type: text
    text: 'Deeply respect '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Serve and worship him exclusively. Back up your promises with his name only. Don’t fool around with other gods, the gods of your neighbors, because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, who is alive among you is a jealous God. Don’t provoke him, igniting his hot anger that would burn you right off the face of the Earth. Don’t push '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, to the wall as you did that day at Massah, the Testing-Place. Carefully keep the commands of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, all the requirements and regulations he gave you. Do what is right; do what is good in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s sight so you’ll live a good life and be able to march in and take this pleasant land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' so solemnly promised through your ancestors, throwing out your enemies left and right—exactly as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-24
  - type: text
    text: 'The next time your child asks you, “What do these requirements and regulations and rules that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, has commanded mean?” tell your child, “We were slaves to Pharaoh in Egypt and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' powerfully intervened and got us out of that country. We stood there and watched as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' delivered miracle-signs, great wonders, and evil-visitations on Egypt, on Pharaoh and his household. He pulled us out of there so he could bring us here and give us the land he so solemnly promised to our ancestors. That’s why '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded us to follow all these rules, so that we would live reverently before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, as he gives us this good life, keeping us alive for a long time to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“It will be a set-right and put-together life for us if we make sure that we do this entire commandment in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, just as he commanded us to do.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
