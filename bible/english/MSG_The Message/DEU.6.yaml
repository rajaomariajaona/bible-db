document_id: DEU.6,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is the commandment, the rules and regulations, that '
  - type: text
    content: God
  - type: text
    content: ', your God, commanded me to teach you to live out in the land you’re about to cross into to possess. This is so that you’ll live in deep reverence before '
  - type: text
    content: God
  - type: text
    content: ' lifelong, observing all his rules and regulations that I’m commanding you, you and your children and your grandchildren, living good long lives.'
  '10':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ', your God, ushers you into the land he promised through your ancestors Abraham, Isaac, and Jacob to give you, you’re going to walk into large, bustling cities you didn’t build, well-furnished houses you didn’t buy, come upon wells you didn’t dig, vineyards and olive orchards you didn’t plant. When you take it all in and settle down, pleased and content, make sure you don’t forget how you got there—'
  - type: text
    content: God
  - type: text
    content: ' brought you out of slavery in Egypt.'
  '13':
  - type: text
    content: 'Deeply respect '
  - type: text
    content: God
  - type: text
    content: ', your God. Serve and worship him exclusively. Back up your promises with his name only. Don’t fool around with other gods, the gods of your neighbors, because '
  - type: text
    content: God
  - type: text
    content: ', your God, who is alive among you is a jealous God. Don’t provoke him, igniting his hot anger that would burn you right off the face of the Earth. Don’t push '
  - type: text
    content: God
  - type: text
    content: ', your God, to the wall as you did that day at Massah, the Testing-Place. Carefully keep the commands of '
  - type: text
    content: God
  - type: text
    content: ', your God, all the requirements and regulations he gave you. Do what is right; do what is good in '
  - type: text
    content: God
  - type: text
    content: '’s sight so you’ll live a good life and be able to march in and take this pleasant land that '
  - type: text
    content: God
  - type: text
    content: ' so solemnly promised through your ancestors, throwing out your enemies left and right—exactly as '
  - type: text
    content: God
  - type: text
    content: ' said.'
  '20':
  - type: text
    content: 'The next time your child asks you, “What do these requirements and regulations and rules that '
  - type: text
    content: God
  - type: text
    content: ', our God, has commanded mean?” tell your child, “We were slaves to Pharaoh in Egypt and '
  - type: text
    content: God
  - type: text
    content: ' powerfully intervened and got us out of that country. We stood there and watched as '
  - type: text
    content: God
  - type: text
    content: ' delivered miracle-signs, great wonders, and evil-visitations on Egypt, on Pharaoh and his household. He pulled us out of there so he could bring us here and give us the land he so solemnly promised to our ancestors. That’s why '
  - type: text
    content: God
  - type: text
    content: ' commanded us to follow all these rules, so that we would live reverently before '
  - type: text
    content: God
  - type: text
    content: ', our God, as he gives us this good life, keeping us alive for a long time to come.'
  '25':
  - type: text
    content: '“It will be a set-right and put-together life for us if we make sure that we do this entire commandment in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', our God, just as he commanded us to do.”'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'Listen obediently, Israel. Do what you’re told so that you’ll have a good life, a life of abundance and bounty, just as '
  - type: text
    content: God
  - type: text
    content: ' promised, in a land abounding in milk and honey.'
  '4':
  - type: text
    content: Attention, Israel!
  - type: text
    content: God
  - type: text
    content: ', our God! '
  - type: text
    content: God
  - type: text
    content: ' the one and only!'
  '5':
  - type: text
    content: 'Love '
  - type: text
    content: God
  - type: text
    content: ', your God, with your whole heart: love him with all that’s in you, love him with all you’ve got!'
  '6':
  - type: text
    content: Write these commandments that I’ve given you today on your hearts. Get them inside of you and then get them inside your children. Talk about them wherever you are, sitting at home or walking in the street; talk about them from the time you get up in the morning to when you fall into bed at night. Tie them on your hands and foreheads as a reminder; inscribe them on the doorposts of your homes and on your city gates.
