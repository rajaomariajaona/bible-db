    content: The Whole World Has Its Eyes on God
  - type: text
    content: ' War Bulletin:'
  - type: text
    content: God
  - type: text
    content: ’s Message challenges the country of Hadrach.
  - type: text
    content: It will settle on Damascus.
  - type: text
    content: 'The whole world has its eyes on '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Israel isn’t the only one.
  - type: text
    content: That includes Hamath at the border,
  - type: text
    content: and Tyre and Sidon, clever as they think they are.
  - type: text
    content: Tyre has put together quite a kingdom for herself;
  - type: text
    content: she has stacked up silver like cordwood,
  - type: text
    content: piled gold high as haystacks.
  - type: text
    content: But God will certainly bankrupt her;
  - type: text
    content: he will dump all that wealth into the ocean
  - type: text
    content: and burn up what’s left in a big fire.
  - type: text
    content: Ashkelon will see it and panic,
  - type: text
    content: Gaza will wring its hands,
  - type: text
    content: Ekron will face a dead end.
  - type: text
    content: Gaza’s king will die.
  - type: text
    content: Ashkelon will be emptied out,
  - type: text
    content: And a villain will take over in Ashdod.
  '11':
  - type: text
    content: “And you, because of my blood covenant with you,
  - type: text
    content: I’ll release your prisoners from their hopeless cells.
  - type: text
    content: Come home, hope-filled prisoners!
  - type: text
    content: This very day I’m declaring a double bonus—
  - type: text
    content: everything you lost returned twice-over!
  - type: text
    content: Judah is now my weapon, the bow I’ll pull,
  - type: text
    content: setting Ephraim as an arrow to the string.
  - type: text
    content: I’ll wake up your sons, O Zion,
  - type: text
    content: to counter your sons, O Greece.
  - type: text
    content: From now on
  - type: text
    content: people are my swords.”
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' will come into view,'
  - type: text
    content: his arrows flashing like lightning!
  - type: text
    content: 'Master '
  - type: text
    content: God
  - type: text
    content: ' will blast his trumpet'
  - type: text
    content: and set out in a whirlwind.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will protect them—
  - type: text
    content: all-out war,
  - type: text
    content: The war to end all wars,
  - type: text
    content: no holds barred.
  - type: text
    content: 'Their '
  - type: text
    content: God
  - type: text
    content: ' will save the day. He’ll rescue them.'
  - type: text
    content: They’ll become like sheep, gentle and soft,
  - type: text
    content: Or like gemstones in a crown,
  - type: text
    content: catching all the colors of the sun.
  - type: text
    content: Then how they’ll shine! shimmer! glow!
  - type: text
    content: the young men robust, the young women lovely!
  '6':
  - type: text
    content: ' “I’ll take proud Philistia down a peg:'
  - type: text
    content: I’ll make him spit out his bloody spoils
  - type: text
    content: and abandon his vile ways.”
  - type: text
    content: What’s left will be all God’s—a core of survivors,
  - type: text
    content: a family brought together in Judah—
  - type: text
    content: But enemies like Ekron will go the way of the Jebusites,
  - type: text
    content: into the dustbin of history.
  - type: text
    content: “I will set up camp in my home country
  - type: text
    content: and defend it against invaders.
  - type: text
    content: Nobody is going to hurt my people ever again.
  - type: text
    content: I’m keeping my eye on them.
  - type: heading
    content: A Humble King Riding a Donkey
  '9':
  - type: text
    content: “Shout and cheer, Daughter Zion!
  - type: text
    content: Raise your voice, Daughter Jerusalem!
  - type: text
    content: Your king is coming!
  - type: text
    content: a good king who makes all things right,
  - type: text
    content: a humble king riding a donkey,
  - type: text
    content: a mere colt of a donkey.
  - type: text
    content: I’ve had it with war—no more chariots in Ephraim,
  - type: text
    content: no more war horses in Jerusalem,
  - type: text
    content: no more swords and spears, bows and arrows.
  - type: text
    content: He will offer peace to the nations,
  - type: text
    content: a peaceful rule worldwide,
  - type: text
    content: from the four winds to the seven seas.
