document_id: ZEC.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Whole World Has Its Eyes on God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6a
  - type: text
    text: ' War Bulletin:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message challenges the country of Hadrach.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will settle on Damascus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The whole world has its eyes on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel isn’t the only one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That includes Hamath at the border,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Tyre and Sidon, clever as they think they are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tyre has put together quite a kingdom for herself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has stacked up silver like cordwood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: piled gold high as haystacks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But God will certainly bankrupt her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will dump all that wealth into the ocean
- type: usfm
  marker: q2
  children:
  - type: text
    text: and burn up what’s left in a big fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ashkelon will see it and panic,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gaza will wring its hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ekron will face a dead end.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaza’s king will die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ashkelon will be emptied out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a villain will take over in Ashdod.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6b-8
  - type: text
    text: ' “I’ll take proud Philistia down a peg:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll make him spit out his bloody spoils
- type: usfm
  marker: q2
  children:
  - type: text
    text: and abandon his vile ways.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s left will be all God’s—a core of survivors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a family brought together in Judah—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But enemies like Ekron will go the way of the Jebusites,
- type: usfm
  marker: q2
  children:
  - type: text
    text: into the dustbin of history.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will set up camp in my home country
- type: usfm
  marker: q2
  children:
  - type: text
    text: and defend it against invaders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nobody is going to hurt my people ever again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m keeping my eye on them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Humble King Riding a Donkey
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “Shout and cheer, Daughter Zion!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Raise your voice, Daughter Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your king is coming!
- type: usfm
  marker: q2
  children:
  - type: text
    text: a good king who makes all things right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a humble king riding a donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a mere colt of a donkey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve had it with war—no more chariots in Ephraim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more war horses in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more swords and spears, bows and arrows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will offer peace to the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a peaceful rule worldwide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the four winds to the seven seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: “And you, because of my blood covenant with you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll release your prisoners from their hopeless cells.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come home, hope-filled prisoners!
- type: usfm
  marker: q2
  children:
  - type: text
    text: This very day I’m declaring a double bonus—
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything you lost returned twice-over!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah is now my weapon, the bow I’ll pull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: setting Ephraim as an arrow to the string.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll wake up your sons, O Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to counter your sons, O Greece.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From now on
- type: usfm
  marker: q2
  children:
  - type: text
    text: people are my swords.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will come into view,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his arrows flashing like lightning!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Master '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will blast his trumpet'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set out in a whirlwind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies will protect them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all-out war,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The war to end all wars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no holds barred.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will save the day. He’ll rescue them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll become like sheep, gentle and soft,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or like gemstones in a crown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: catching all the colors of the sun.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then how they’ll shine! shimmer! glow!
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young men robust, the young women lovely!
