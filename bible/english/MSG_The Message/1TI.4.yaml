document_id: 1TI.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teach with Your Life
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: The Spirit makes it clear that as time goes on, some are going to give up on the faith and chase after demonic illusions put forth by professional liars. These liars have lied so well and for so long that they’ve lost their capacity for truth. They will tell you not to get married. They’ll tell you not to eat this or that food—perfectly good food God created to be eaten heartily and with thanksgiving by believers who know better! Everything God created is good, and to be received with thanks. Nothing is to be sneered at and thrown out. God’s Word and our prayers make every item in creation holy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-14
    - type: text
      text: 'Get the word out. Teach all these things. And don’t let anyone put you down because you’re young. Teach believers with your life: by word, by demeanor, by love, by faith, by integrity. Stay at your post reading Scripture, giving counsel, teaching. And that special gift of ministry you were given when the leaders of the church laid hands on you and prayed—keep that dusted off and in use.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: Cultivate these things. Immerse yourself in them. The people will all see you mature right before their eyes! Keep a firm grasp on both your character and your teaching. Don’t be diverted. Just keep at it. Both you and those who hear you will experience salvation.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: You’ve been raised on the Message of the faith and have followed sound teaching. Now pass on this counsel to the followers of Jesus there, and you’ll be a good servant of Jesus. Stay clear of silly stories that get dressed up as religion. Exercise daily in God—no spiritual flabbiness, please! Workouts in the gymnasium are useful, but a disciplined life in God is far more so, making you fit both today and forever. You can count on this. Take it to heart. This is why we’ve thrown ourselves into this venture so totally. We’re banking on the living God, Savior of all men and women, especially believers.
