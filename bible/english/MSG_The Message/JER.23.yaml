document_id: JER.23,97
type_code: eng
verses:
  '1':
  - type: heading
    content: An Authentic David-Branch
  - type: text
    content: '“Doom to the shepherd-leaders who butcher and scatter my sheep!” '
  - type: text
    content: God
  - type: text
    content: '’s Decree. “So here is what I, '
  - type: text
    content: God
  - type: text
    content: ', Israel’s God, say to the shepherd-leaders who misled my people: ‘You’ve scattered my sheep. You’ve driven them off. You haven’t kept your eye on them. Well, let me tell you, I’m keeping my eye on '
  - type: text
    content: you
  - type: text
    content: ', keeping track of your criminal behavior. I’ll take over and gather what’s left of my sheep, gather them in from all the lands where I’ve driven them. I’ll bring them back where they belong, and they’ll recover and flourish. I’ll set shepherd-leaders over them who will take good care of them. They won’t live in fear or panic anymore. All the lost sheep rounded up!’ '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '10':
  - type: text
    content: 'Now for what '
  - type: text
    content: God
  - type: text
    content: ' says regarding the lying prophets:'
  - type: text
    content: “Can you believe it? A country teeming with adulterers!
  - type: text
    content: faithless, promiscuous idolater-adulterers!
  - type: text
    content: They’re a curse on the land.
  - type: text
    content: The land’s a wasteland.
  - type: text
    content: Their unfaithfulness
  - type: text
    content: is turning the country into a cesspool,
  - type: text
    content: Prophets and priests devoted to desecration.
  - type: text
    content: They have nothing to do with me as their God.
  - type: text
    content: My very own Temple, mind you—
  - type: text
    content: 'mud-spattered with their crimes.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “But they won’t get by with it.
  - type: text
    content: They’ll find themselves on a slippery slope,
  - type: text
    content: Careening into the darkness,
  - type: text
    content: somersaulting into the pitch-black dark.
  - type: text
    content: I’ll make them pay for their crimes.
  - type: text
    content: 'It will be the Year of Doom.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: “Over in Samaria I saw prophets
  - type: text
    content: acting like silly fools—shocking!
  - type: text
    content: They preached using that no-god Baal for a text,
  - type: text
    content: messing with the minds of my people.
  - type: text
    content: And the Jerusalem prophets are even worse—horrible!—
  - type: text
    content: sex-driven, living a lie,
  - type: text
    content: Subsidizing a culture of wickedness,
  - type: text
    content: and never giving it a second thought.
  - type: text
    content: They’re as bad as those wretches in old Sodom,
  - type: text
    content: the degenerates of old Gomorrah.”
  '15':
  - type: text
    content: 'So here’s the Message to the prophets from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “I’ll cook them a supper of maggoty meat
  - type: text
    content: with after-dinner drinks of strychnine.
  - type: text
    content: The Jerusalem prophets are behind all this.
  - type: text
    content: They’re the cause of the godlessness polluting this country.”
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: 'A Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “Don’t listen to the sermons of the prophets.
  - type: text
    content: It’s all hot air. Lies, lies, and more lies.
  - type: text
    content: They make it all up.
  - type: text
    content: Not a word they speak comes from me.
  - type: text
    content: They preach their ‘Everything Will Turn Out Fine’ sermon
  - type: text
    content: to congregations with no taste for God,
  - type: text
    content: Their ‘Nothing Bad Will Ever Happen to You’ sermon
  - type: text
    content: to people who are set in their own ways.
  '18':
  - type: text
    content: '“Have any of these prophets bothered to meet with me, the true '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: 'bothered to take in what '
  - type: text
    content: I
  - type: text
    content: ' have to say?'
  - type: text
    content: 'listened to and then '
  - type: text
    content: lived out
  - type: text
    content: ' my Word?'
  - type: text
    content: 'Look out! '
  - type: text
    content: God
  - type: text
    content: ’s hurricane will be let loose—
  - type: text
    content: my hurricane blast,
  - type: text
    content: Spinning the heads of the wicked like tops!
  - type: text
    content: God’s raging anger won’t let up
  - type: text
    content: Until I’ve made a clean sweep,
  - type: text
    content: completing the job I began.
  - type: text
    content: When the job’s done,
  - type: text
    content: you’ll see that it’s been well done.
  - type: heading
    content: Quit the “God Told Me This” Kind of Talk
  '21':
  - type: text
    content: “I never sent these prophets,
  - type: text
    content: but they ran anyway.
  - type: text
    content: I never spoke to them,
  - type: text
    content: but they preached away.
  - type: text
    content: If they’d have bothered to sit down and meet with me,
  - type: text
    content: they’d have preached my Message to my people.
  - type: text
    content: They’d have gotten them back on the right track,
  - type: text
    content: gotten them out of their evil ruts.
  - type: text
    content: '* * *'
  '23':
  - type: text
    content: “Am I not a God near at hand”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “and not a God far off?
  - type: text
    content: Can anyone hide out in a corner
  - type: text
    content: where I can’t see him?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Am I not present everywhere,
  - type: text
    content: whether seen or unseen?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '25':
  - type: text
    content: “I know what they’re saying, all these prophets who preach lies using me as their text, saying ‘I had this dream! I had this dream!’ How long do I have to put up with this? Do these prophets give two cents about me as they preach their lies and spew out their grandiose delusions? They swap dreams with one another, feed on each other’s delusive dreams, trying to distract my people from me just as their ancestors were distracted by the no-god Baal.
  '28':
  - type: text
    content: “You prophets who do nothing but dream—
  - type: text
    content: go ahead and tell your silly dreams.
  - type: text
    content: But you prophets who have a message from me—
  - type: text
    content: tell it truly and faithfully.
  - type: text
    content: What does straw have in common with wheat?
  - type: text
    content: 'Nothing else is like '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: 'Isn’t my Message like fire?” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Isn’t it like a sledgehammer busting a rock?
  '30':
  - type: text
    content: “I’ve had it with the ‘prophets’ who get all their sermons secondhand from each other. Yes, I’ve had it with them. They make up stuff and then pretend it’s a real sermon.
  '32':
  - type: text
    content: “Oh yes, I’ve had it with the prophets who preach the lies they dream up, spreading them all over the country, ruining the lives of my people with their cheap and reckless lies.
  - type: text
    content: “I never sent these prophets, never authorized a single one of them. They do nothing for this people—
  - type: text
    content: nothing
  - type: text
    content: '!” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '33':
  - type: text
    content: '“And anyone, including prophets and priests, who asks, ‘What’s '
  - type: text
    content: God
  - type: text
    content: ' got to say about all this, what’s troubling him?’ tell him, ‘You, you’re the trouble, and I’m getting rid of you.’” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '34':
  - type: text
    content: “And if anyone, including prophets and priests, goes around saying glibly ‘
  - type: text
    content: God
  - type: text
    content: '’s Message! '
  - type: text
    content: God
  - type: text
    content: ’s Message!’ I’ll punish him and his family.
  '35':
  - type: text
    content: '“Instead of claiming to know what '
  - type: text
    content: God
  - type: text
    content: ' says, ask questions of one another, such as ‘How do we understand '
  - type: text
    content: God
  - type: text
    content: ' in this?’ But don’t go around pretending to know it all, saying ‘God told me this . . . God told me that. . . . ’ I don’t want to hear it anymore. Only the person I authorize speaks for me. Otherwise, my Message gets twisted, the Message of the living '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '37':
  - type: text
    content: '“You can ask the prophets, ‘How did '
  - type: text
    content: God
  - type: text
    content: ' answer you? What did he tell you?’ But don’t pretend that you know all the answers yourselves and talk like you know it all. I’m telling you: Quit the ‘God told me this . . . God told me that . . . ’ kind of talk.'
  '39':
  - type: text
    content: “Are you paying attention? You’d better, because I’m about to take you in hand and throw you to the ground, you and this entire city that I gave to your ancestors. I’ve had it with the lot of you. You’re never going to live this down. You’re going down in history as a disgrace.”
  '5':
  - type: text
    content: “Time’s coming”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “when I’ll establish a truly righteous David-Branch,
  - type: text
    content: A ruler who knows how to rule justly.
  - type: text
    content: He’ll make sure of justice and keep people united.
  - type: text
    content: In his time Judah will be secure again
  - type: text
    content: and Israel will live in safety.
  - type: text
    content: 'This is the name they’ll give him:'
  - type: text
    content: ‘
  - type: text
    content: God
  - type: text
    content: -Who-Puts-Everything-Right.’
  '7':
  - type: text
    content: “So watch for this. The time’s coming”—
  - type: text
    content: God
  - type: text
    content: '’s Decree—“when no one will say, ‘As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives, the God who brought the Israelites out of Egypt,’ but, ‘As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives, the God who brought the descendants of Israel back from the north country and from the other countries where he’d driven them, so that they can live on their own good earth.’”'
  - type: heading
    content: The “Everything Will Turn Out Fine” Sermon
  '9':
  - type: text
    content: My head is reeling,
  - type: text
    content: my limbs are limp,
  - type: text
    content: I’m staggering like a drunk,
  - type: text
    content: seeing double from too much wine—
  - type: text
    content: 'And all because of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: because of his holy words.
