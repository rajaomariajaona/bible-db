document_id: JER.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Authentic David-Branch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: '“Doom to the shepherd-leaders who butcher and scatter my sheep!” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree. “So here is what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Israel’s God, say to the shepherd-leaders who misled my people: ‘You’ve scattered my sheep. You’ve driven them off. You haven’t kept your eye on them. Well, let me tell you, I’m keeping my eye on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ', keeping track of your criminal behavior. I’ll take over and gather what’s left of my sheep, gather them in from all the lands where I’ve driven them. I’ll bring them back where they belong, and they’ll recover and flourish. I’ll set shepherd-leaders over them who will take good care of them. They won’t live in fear or panic anymore. All the lost sheep rounded up!’ '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: “Time’s coming”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “when I’ll establish a truly righteous David-Branch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ruler who knows how to rule justly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll make sure of justice and keep people united.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In his time Judah will be secure again
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Israel will live in safety.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This is the name they’ll give him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -Who-Puts-Everything-Right.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “So watch for this. The time’s coming”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree—“when no one will say, ‘As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God who brought the Israelites out of Egypt,’ but, ‘As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God who brought the descendants of Israel back from the north country and from the other countries where he’d driven them, so that they can live on their own good earth.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The “Everything Will Turn Out Fine” Sermon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My head is reeling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my limbs are limp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m staggering like a drunk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: seeing double from too much wine—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all because of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of his holy words.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'Now for what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says regarding the lying prophets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Can you believe it? A country teeming with adulterers!
- type: usfm
  marker: q2
  children:
  - type: text
    text: faithless, promiscuous idolater-adulterers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re a curse on the land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The land’s a wasteland.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their unfaithfulness
- type: usfm
  marker: q2
  children:
  - type: text
    text: is turning the country into a cesspool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prophets and priests devoted to desecration.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have nothing to do with me as their God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My very own Temple, mind you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'mud-spattered with their crimes.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “But they won’t get by with it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll find themselves on a slippery slope,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Careening into the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: somersaulting into the pitch-black dark.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make them pay for their crimes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It will be the Year of Doom.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: “Over in Samaria I saw prophets
- type: usfm
  marker: q2
  children:
  - type: text
    text: acting like silly fools—shocking!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They preached using that no-god Baal for a text,
- type: usfm
  marker: q2
  children:
  - type: text
    text: messing with the minds of my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Jerusalem prophets are even worse—horrible!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: sex-driven, living a lie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Subsidizing a culture of wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never giving it a second thought.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re as bad as those wretches in old Sodom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the degenerates of old Gomorrah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So here’s the Message to the prophets from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll cook them a supper of maggoty meat
- type: usfm
  marker: q2
  children:
  - type: text
    text: with after-dinner drinks of strychnine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Jerusalem prophets are behind all this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’re the cause of the godlessness polluting this country.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t listen to the sermons of the prophets.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s all hot air. Lies, lies, and more lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They make it all up.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not a word they speak comes from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They preach their ‘Everything Will Turn Out Fine’ sermon
- type: usfm
  marker: q2
  children:
  - type: text
    text: to congregations with no taste for God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their ‘Nothing Bad Will Ever Happen to You’ sermon
- type: usfm
  marker: q2
  children:
  - type: text
    text: to people who are set in their own ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: '“Have any of these prophets bothered to meet with me, the true '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'bothered to take in what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' have to say?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'listened to and then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lived out
  - type: text
    text: ' my Word?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Look out! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s hurricane will be let loose—
- type: usfm
  marker: q2
  children:
  - type: text
    text: my hurricane blast,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spinning the heads of the wicked like tops!
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s raging anger won’t let up
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I’ve made a clean sweep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: completing the job I began.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the job’s done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll see that it’s been well done.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Quit the “God Told Me This” Kind of Talk
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “I never sent these prophets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they ran anyway.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I never spoke to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they preached away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If they’d have bothered to sit down and meet with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’d have preached my Message to my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’d have gotten them back on the right track,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gotten them out of their evil ruts.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: “Am I not a God near at hand”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and not a God far off?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can anyone hide out in a corner
- type: usfm
  marker: q2
  children:
  - type: text
    text: where I can’t see him?”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Am I not present everywhere,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether seen or unseen?”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: “I know what they’re saying, all these prophets who preach lies using me as their text, saying ‘I had this dream! I had this dream!’ How long do I have to put up with this? Do these prophets give two cents about me as they preach their lies and spew out their grandiose delusions? They swap dreams with one another, feed on each other’s delusive dreams, trying to distract my people from me just as their ancestors were distracted by the no-god Baal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: “You prophets who do nothing but dream—
- type: usfm
  marker: q2
  children:
  - type: text
    text: go ahead and tell your silly dreams.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you prophets who have a message from me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: tell it truly and faithfully.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What does straw have in common with wheat?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nothing else is like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Isn’t my Message like fire?” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Isn’t it like a sledgehammer busting a rock?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: “I’ve had it with the ‘prophets’ who get all their sermons secondhand from each other. Yes, I’ve had it with them. They make up stuff and then pretend it’s a real sermon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “Oh yes, I’ve had it with the prophets who preach the lies they dream up, spreading them all over the country, ruining the lives of my people with their cheap and reckless lies.
- type: usfm
  marker: p
  children:
  - type: text
    text: “I never sent these prophets, never authorized a single one of them. They do nothing for this people—
  - type: usfm
    marker: it
    children:
    - type: text
      text: nothing
  - type: text
    text: '!” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“And anyone, including prophets and priests, who asks, ‘What’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' got to say about all this, what’s troubling him?’ tell him, ‘You, you’re the trouble, and I’m getting rid of you.’” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “And if anyone, including prophets and priests, goes around saying glibly ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message!’ I’ll punish him and his family.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: '“Instead of claiming to know what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, ask questions of one another, such as ‘How do we understand '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in this?’ But don’t go around pretending to know it all, saying ‘God told me this . . . God told me that. . . . ’ I don’t want to hear it anymore. Only the person I authorize speaks for me. Otherwise, my Message gets twisted, the Message of the living '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-38
  - type: text
    text: '“You can ask the prophets, ‘How did '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answer you? What did he tell you?’ But don’t pretend that you know all the answers yourselves and talk like you know it all. I’m telling you: Quit the ‘God told me this . . . God told me that . . . ’ kind of talk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: “Are you paying attention? You’d better, because I’m about to take you in hand and throw you to the ground, you and this entire city that I gave to your ancestors. I’ve had it with the lot of you. You’re never going to live this down. You’re going down in history as a disgrace.”
