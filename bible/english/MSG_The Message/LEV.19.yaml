document_id: LEV.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: '“I Am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Your God”'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Speak to the congregation of Israel. Tell them, Be holy because I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, am holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Every one of you must respect his mother and father.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Keep my Sabbaths. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Don’t take up with no-god idols. Don’t make gods of cast metal. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: '“When you sacrifice a Peace-Offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', do it as you’ve been taught so it is acceptable. Eat it on the day you sacrifice it and the day following. Whatever is left until the third day is to be burned up. If it is eaten on the third day it is polluted meat and not acceptable. Whoever eats it will be held responsible because he has violated what is holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . That person will be cut off from his people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: '“When you harvest your land, don’t harvest right up to the edges of your field or gather the gleanings from the harvest. Don’t strip your vineyard bare or go back and pick up the fallen grapes. Leave them for the poor and the foreigner. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Don’t steal.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t lie.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t deceive anyone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Don’t swear falsely using my name, violating the name of your God. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Don’t exploit your friend or rob him.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t hold back the wages of a hired hand overnight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Don’t curse the deaf; don’t put a stumbling block in front of the blind; fear your God. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Don’t pervert justice. Don’t show favoritism to either the poor or the great. Judge on the basis of what is right.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Don’t spread gossip and rumors.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Don’t just stand by when your neighbor’s life is in danger. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Don’t secretly hate your neighbor. If you have something against him, get it out into the open; otherwise you are an accomplice in his guilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Don’t seek revenge or carry a grudge against any of your people.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Love your neighbor as yourself. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Keep my decrees.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t mate two different kinds of animals.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t plant your fields with two kinds of seed.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t wear clothes woven of two kinds of material.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: '“If a man has sex with a slave girl who is engaged to another man but has not yet been ransomed or given her freedom, there must be an investigation. But they aren’t to be put to death because she wasn’t free. The man must bring a Compensation-Offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at the entrance to the Tent of Meeting, a ram of compensation. The priest will perform the ritual of atonement for him before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' with the ram of compensation for the sin he has committed. Then he will stand forgiven of the sin he committed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: '“When you enter the land and plant any kind of fruit tree, don’t eat the fruit for three years; consider it inedible. By the fourth year its fruit is holy, an offering of praise to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Beginning in the fifth year you can eat its fruit; you’ll have richer harvests this way. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Don’t eat meat with blood in it.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t practice divination or sorcery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Don’t cut the hair on the sides of your head or trim your beard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Don’t gash your bodies on behalf of the dead.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Don’t tattoo yourselves. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Don’t violate your daughter by making her a whore—the whole country would soon become a brothel, filled with sordid sex.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Keep my Sabbaths and revere my Sanctuary: I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Don’t dabble in the occult or traffic with mediums; you’ll pollute your souls. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“Show respect to the aged; honor the presence of an elder; fear your God. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: '“When a foreigner lives with you in your land, don’t take advantage of him. Treat the foreigner the same as a native. Love him like one of your own. Remember that you were once foreigners in Egypt. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: '“Don’t cheat when measuring length, weight, or quantity. Use honest scales and weights and measures. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. I brought you out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“Keep all my decrees and all my laws. Yes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' them. I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
