verses:
  '1':
  - type: heading
    content: God Is a Safe Hiding Place
  - type: text
    content: “In those days, yes, at that very time
  - type: text
    content: when I put life back together again for Judah and Jerusalem,
  - type: text
    content: I’ll assemble all the godless nations.
  - type: text
    content: I’ll lead them down into Judgment Valley
  - type: text
    content: And put them all on trial, and judge them one and all
  - type: text
    content: because of their treatment of my own people Israel.
  - type: text
    content: They scattered my people all over the pagan world
  - type: text
    content: and grabbed my land for themselves.
  - type: text
    content: They threw dice for my people
  - type: text
    content: and used them for barter.
  - type: text
    content: They would trade a boy for a whore,
  - type: text
    content: sell a girl for a bottle of wine when they wanted a drink.
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: Let the pagan nations set out
  - type: text
    content: for Judgment Valley.
  - type: text
    content: There I’ll take my place at the bench
  - type: text
    content: and judge all the surrounding nations.
  '13':
  - type: text
    content: “Swing the sickle—
  - type: text
    content: the harvest is ready.
  - type: text
    content: Stomp on the grapes—
  - type: text
    content: the winepress is full.
  - type: text
    content: The wine vats are full,
  - type: text
    content: overflowing with vintage evil.
  '14':
  - type: text
    content: “Mass confusion, mob uproar—
  - type: text
    content: in Decision Valley!
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day has arrived
  - type: text
    content: in Decision Valley.
  '15':
  - type: text
    content: “The sky turns black,
  - type: text
    content: sun and moon go dark, stars burn out.
  - type: text
    content: God
  - type: text
    content: ' roars from Zion, shouts from Jerusalem.'
  - type: text
    content: Earth and sky quake in terror.
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' is a safe hiding place,'
  - type: text
    content: a granite safe house for the children of Israel.
  - type: text
    content: Then you’ll know for sure
  - type: text
    content: 'that I’m '
  - type: text
    content: 'your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Living in Zion,
  - type: text
    content: my sacred mountain.
  - type: text
    content: Jerusalem will be a sacred city,
  - type: text
    content: 'posted: ‘'
  - type: text
    content: no trespassing
  - type: text
    content: .’
  - type: heading
    content: Milk Rivering out of the Hills
  '18':
  - type: text
    content: “What a day!
  - type: text
    content: Wine streaming off the mountains,
  - type: text
    content: Milk rivering out of the hills,
  - type: text
    content: water flowing everywhere in Judah,
  - type: text
    content: 'A fountain pouring out of '
  - type: text
    content: God
  - type: text
    content: ’s Sanctuary,
  - type: text
    content: watering all the parks and gardens!
  - type: text
    content: But Egypt will be reduced to weeds in a vacant lot,
  - type: text
    content: Edom turned into barren badlands,
  - type: text
    content: All because of brutalities to the Judean people,
  - type: text
    content: the atrocities and murders of helpless innocents.
  - type: text
    content: Meanwhile, Judah will be filled with people,
  - type: text
    content: Jerusalem inhabited forever.
  - type: text
    content: The sins I haven’t already forgiven, I’ll forgive.”
  - type: text
    content: God
  - type: text
    content: ' has moved into Zion for good.'
  '4':
  - type: text
    content: “As for you, Tyre and Sidon and Philistia,
  - type: text
    content: why should I bother with you?
  - type: text
    content: Are you trying to get back at me
  - type: text
    content: for something I did to you?
  - type: text
    content: If you are, forget it.
  - type: text
    content: I’ll see to it that it boomerangs on you.
  - type: text
    content: You robbed me, cleaned me out of silver and gold,
  - type: text
    content: carted off everything valuable to furnish your own temples.
  - type: text
    content: You sold the people of Judah and Jerusalem
  - type: text
    content: into slavery to the Greeks in faraway places.
  - type: text
    content: But I’m going to reverse your crime.
  - type: text
    content: I’m going to free those slaves.
  - type: text
    content: 'I’ll have done to you what you did to them:'
  - type: text
    content: I’ll sell your children as slaves to your neighbors,
  - type: text
    content: And they’ll sell them to the far-off Sabeans.”
  - type: text
    content: God
  - type: text
    content: ’s Verdict.
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: 'Announce this to the godless nations:'
  - type: text
    content: Prepare for battle!
  - type: text
    content: Soldiers at attention!
  - type: text
    content: Present arms! Advance!
  - type: text
    content: Turn your shovels into swords,
  - type: text
    content: turn your hoes into spears.
  - type: text
    content: Let the weak one throw out his chest
  - type: text
    content: and say, “I’m tough, I’m a fighter.”
  - type: text
    content: Hurry up, pagans! Wherever you are, get a move on!
  - type: text
    content: Get your act together.
  - type: text
    content: Prepare to be
  - type: text
    content: 'shattered by '
  - type: text
    content: God
  - type: text
    content: '!'
