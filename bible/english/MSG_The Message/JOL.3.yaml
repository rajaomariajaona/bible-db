document_id: JOL.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Is a Safe Hiding Place'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In those days, yes, at that very time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I put life back together again for Judah and Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll assemble all the godless nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll lead them down into Judgment Valley
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And put them all on trial, and judge them one and all
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of their treatment of my own people Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They scattered my people all over the pagan world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grabbed my land for themselves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They threw dice for my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and used them for barter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They would trade a boy for a whore,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sell a girl for a bottle of wine when they wanted a drink.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the pagan nations set out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for Judgment Valley.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There I’ll take my place at the bench
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and judge all the surrounding nations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Swing the sickle—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the harvest is ready.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stomp on the grapes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the winepress is full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wine vats are full,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: overflowing with vintage evil.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Mass confusion, mob uproar—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Decision Valley!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Judgment Day has arrived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Decision Valley.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sky turns black,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sun and moon go dark, stars burn out.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' roars from Zion, shouts from Jerusalem.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Earth and sky quake in terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is a safe hiding place,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a granite safe house for the children of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you’ll know for sure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that I’m '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Living in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sacred mountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will be a sacred city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'posted: ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: no trespassing
    - type: text
      text: .’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Milk Rivering out of the Hills
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What a day!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wine streaming off the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milk rivering out of the hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: water flowing everywhere in Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A fountain pouring out of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watering all the parks and gardens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Egypt will be reduced to weeds in a vacant lot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Edom turned into barren badlands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All because of brutalities to the Judean people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the atrocities and murders of helpless innocents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile, Judah will be filled with people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem inhabited forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sins I haven’t already forgiven, I’ll forgive.”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has moved into Zion for good.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As for you, Tyre and Sidon and Philistia,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why should I bother with you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you trying to get back at me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for something I did to you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you are, forget it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll see to it that it boomerangs on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You robbed me, cleaned me out of silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carted off everything valuable to furnish your own temples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sold the people of Judah and Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into slavery to the Greeks in faraway places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I’m going to reverse your crime.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m going to free those slaves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll have done to you what you did to them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll sell your children as slaves to your neighbors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they’ll sell them to the far-off Sabeans.”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Verdict.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Announce this to the godless nations:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare for battle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soldiers at attention!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Present arms! Advance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn your shovels into swords,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your hoes into spears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the weak one throw out his chest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and say, “I’m tough, I’m a fighter.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurry up, pagans! Wherever you are, get a move on!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get your act together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare to be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'shattered by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
