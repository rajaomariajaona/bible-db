document_id: PRO.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cure Comes Through Discipline
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A sterling reputation is better than striking it rich;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a gracious spirit is better than money in the bank.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The rich and the poor shake hands as equals—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made them both!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A prudent person sees trouble coming and ducks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a simpleton walks in blindly and is clobbered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The payoff for meekness and Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: is plenty and honor and a satisfying life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The perverse travel a dangerous road, potholed and mud-slick;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you know what’s good for you, stay clear of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Point your kids in the right direction—
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they’re old they won’t be lost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The poor are always ruled over by the rich,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so don’t borrow and put yourself under their power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Whoever sows sin reaps weeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bullying anger sputters into nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Generous hands are blessed hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they give bread to the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Kick out the troublemakers and things will quiet down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you need a break from bickering and griping!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' loves the pure-hearted and well-spoken;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: good leaders also delight in their friendship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' guards knowledge with a passion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he’ll have nothing to do with deception.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The loafer says, “There’s a lion on the loose!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If I go out I’ll be eaten alive!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The mouth of a prostitute is a bottomless pit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you’ll fall in that pit if you’re on the outs with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Young people are prone to foolishness and fads;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cure comes through tough-minded discipline.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Exploit the poor or glad-hand the rich—whichever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll end up the poorer for it.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: The Thirty Precepts of the Sages
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Don’t Move Back the Boundary Lines
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: Listen carefully to my wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: take to heart what I can teach you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll treasure its sweetness deep within;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll give it bold expression in your speech.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To make sure your foundation is trust in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m laying it all out right now just for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m giving you thirty sterling principles—
- type: usfm
  marker: q2
  children:
  - type: text
    text: tested guidelines to live by.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Believe me—these are truths that work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will keep you accountable
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who sent you.
- type: usfm
  marker: s2
  children:
  - type: text
    text: '1'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Don’t walk on the poor just because they’re poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t use your position to crush the weak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God '
  - type: text
    text: will come to their defense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the life you took, he’ll take from you and give back to them.
- type: usfm
  marker: s2
  children:
  - type: text
    text: '2'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: Don’t hang out with angry people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t keep company with hotheads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bad temper is contagious—
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t get infected.
- type: usfm
  marker: s2
  children:
  - type: text
    text: '3'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: Don’t gamble on the pot of gold at the end of the rainbow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pawning your house against a lucky chance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time will come when you have to pay up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll be left with nothing but the shirt on your back.
- type: usfm
  marker: s2
  children:
  - type: text
    text: '4'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Don’t stealthily move back the boundary lines
- type: usfm
  marker: q2
  children:
  - type: text
    text: staked out long ago by your ancestors.
- type: usfm
  marker: s2
  children:
  - type: text
    text: '5'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Observe people who are good at their work—
- type: usfm
  marker: q2
  children:
  - type: text
    text: skilled workers are always in demand and admired;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they don’t take a backseat to anyone.
