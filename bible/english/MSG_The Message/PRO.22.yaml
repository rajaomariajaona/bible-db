document_id: PRO.22,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Cure Comes Through Discipline
  - type: text
    content: A sterling reputation is better than striking it rich;
  - type: text
    content: a gracious spirit is better than money in the bank.
  '10':
  - type: text
    content: Kick out the troublemakers and things will quiet down;
  - type: text
    content: you need a break from bickering and griping!
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' loves the pure-hearted and well-spoken;'
  - type: text
    content: good leaders also delight in their friendship.
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' guards knowledge with a passion,'
  - type: text
    content: but he’ll have nothing to do with deception.
  '13':
  - type: text
    content: The loafer says, “There’s a lion on the loose!
  - type: text
    content: If I go out I’ll be eaten alive!”
  '14':
  - type: text
    content: The mouth of a prostitute is a bottomless pit;
  - type: text
    content: 'you’ll fall in that pit if you’re on the outs with '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: Young people are prone to foolishness and fads;
  - type: text
    content: the cure comes through tough-minded discipline.
  '16':
  - type: text
    content: Exploit the poor or glad-hand the rich—whichever,
  - type: text
    content: you’ll end up the poorer for it.
  - type: heading
    content: The Thirty Precepts of the Sages
  - type: heading
    content: Don’t Move Back the Boundary Lines
  '17':
  - type: text
    content: Listen carefully to my wisdom;
  - type: text
    content: take to heart what I can teach you.
  - type: text
    content: You’ll treasure its sweetness deep within;
  - type: text
    content: you’ll give it bold expression in your speech.
  - type: text
    content: 'To make sure your foundation is trust in '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I’m laying it all out right now just for you.
  - type: text
    content: I’m giving you thirty sterling principles—
  - type: text
    content: tested guidelines to live by.
  - type: text
    content: Believe me—these are truths that work,
  - type: text
    content: and will keep you accountable
  - type: text
    content: to those who sent you.
  - type: heading
    content: '1'
  '2':
  - type: text
    content: The rich and the poor shake hands as equals—
  - type: text
    content: God
  - type: text
    content: ' made them both!'
  '22':
  - type: text
    content: Don’t walk on the poor just because they’re poor,
  - type: text
    content: and don’t use your position to crush the weak,
  - type: text
    content: 'Because '
  - type: text
    content: 'God '
  - type: text
    content: will come to their defense;
  - type: text
    content: the life you took, he’ll take from you and give back to them.
  - type: heading
    content: '2'
  '24':
  - type: text
    content: Don’t hang out with angry people;
  - type: text
    content: don’t keep company with hotheads.
  - type: text
    content: Bad temper is contagious—
  - type: text
    content: don’t get infected.
  - type: heading
    content: '3'
  '26':
  - type: text
    content: Don’t gamble on the pot of gold at the end of the rainbow,
  - type: text
    content: pawning your house against a lucky chance.
  - type: text
    content: The time will come when you have to pay up;
  - type: text
    content: you’ll be left with nothing but the shirt on your back.
  - type: heading
    content: '4'
  '28':
  - type: text
    content: Don’t stealthily move back the boundary lines
  - type: text
    content: staked out long ago by your ancestors.
  - type: heading
    content: '5'
  '29':
  - type: text
    content: Observe people who are good at their work—
  - type: text
    content: skilled workers are always in demand and admired;
  - type: text
    content: they don’t take a backseat to anyone.
  '3':
  - type: text
    content: A prudent person sees trouble coming and ducks;
  - type: text
    content: a simpleton walks in blindly and is clobbered.
  '4':
  - type: text
    content: The payoff for meekness and Fear-of-
  - type: text
    content: God
  - type: text
    content: is plenty and honor and a satisfying life.
  '5':
  - type: text
    content: The perverse travel a dangerous road, potholed and mud-slick;
  - type: text
    content: if you know what’s good for you, stay clear of it.
  '6':
  - type: text
    content: Point your kids in the right direction—
  - type: text
    content: when they’re old they won’t be lost.
  '7':
  - type: text
    content: The poor are always ruled over by the rich,
  - type: text
    content: so don’t borrow and put yourself under their power.
  '8':
  - type: text
    content: Whoever sows sin reaps weeds,
  - type: text
    content: and bullying anger sputters into nothing.
  '9':
  - type: text
    content: Generous hands are blessed hands
  - type: text
    content: because they give bread to the poor.
