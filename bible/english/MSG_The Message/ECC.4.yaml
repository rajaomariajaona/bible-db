document_id: ECC.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Slow Suicide
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Next I turned my attention to all the outrageous violence that takes place on this planet—the tears of the victims, no one to comfort them; the iron grip of oppressors, no one to rescue the victims from them. So I congratulated the dead who are already dead instead of the living who are still alive. But luckier than the dead or the living is the person who has never even been, who has never seen the bad business that takes place on this earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Two in a bed warm each other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alone, you shiver all night.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: By yourself you’re unprotected.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a friend you can face the worst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you round up a third?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A three-stranded rope isn’t easily snapped.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: A poor child with some wisdom is better off than an old but foolish king who doesn’t know which end is up. I saw a youth just like this start with nothing and go from rags to riches, and I saw everyone rally to the rule of this young successor to the king. Even so, the excitement died quickly, the throngs of people soon lost interest. Can’t you see it’s only smoke? And spitting into the wind?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then I observed all the work and ambition motivated by envy. What a waste! Smoke. And spitting into the wind.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The fool sits back and takes it easy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His sloth is slow suicide.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: One handful of peaceful repose
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is better than two fistfuls of worried work—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: More spitting into the wind.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Why Am I Working Like a Dog?
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'I turned my head and saw yet another wisp of smoke on its way to nothingness: a solitary person, completely alone—no children, no family, no friends—yet working obsessively late into the night, compulsively greedy for more and more, never bothering to ask, “Why am I working like a dog, never having any fun? And who cares?” More smoke. A bad business.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: It’s better to have a partner than go it alone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Share the work, share the wealth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if one falls down, the other helps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if there’s no one to help, tough!
