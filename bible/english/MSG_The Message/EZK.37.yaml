document_id: EZK.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Breath of Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' grabbed me. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Spirit took me up and set me down in the middle of an open plain strewn with bones. He led me around and among them—a lot of bones! There were bones all over the plain—dry bones, bleached by the sun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He said to me, “Son of man, can these bones live?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I said, “Master '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', only you know that.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He said to me, “Prophesy over these bones: ‘Dry bones, listen to the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, told the dry bones, “Watch this: I’m bringing the breath of life to you and you’ll come to life. I’ll attach sinews to you, put meat on your bones, cover you with skin, and breathe life into you. You’ll come alive and you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: I prophesied just as I’d been commanded. As I prophesied, there was a sound and, oh, rustling! The bones moved and came together, bone to bone. I kept watching. Sinews formed, then muscles on the bones, then skin stretched over them. But they had no breath in them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He said to me, “Prophesy to the breath. Prophesy, son of man. Tell the breath, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, Come from the four winds. Come, breath. Breathe on these slain bodies. Breathe life!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So I prophesied, just as he commanded me. The breath entered them and they came alive! They stood up on their feet, a huge army.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then God said to me, “Son of man, these bones are the whole house of Israel. Listen to what they’re saying: ‘Our bones are dried up, our hope is gone, there’s nothing left of us.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: “Therefore, prophesy. Tell them, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: I’ll dig up your graves and bring you out alive—O my people! Then I’ll take you straight to the land of Israel. When I dig up graves and bring you out as my people, you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. I’ll breathe my life into you and you’ll live. Then I’ll lead you straight back to your land and you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. I’ve said it and I’ll do it. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “You, son of man: Take a stick and write on it, ‘For Judah, with his Israelite companions.’ Then take another stick and write on it, ‘For Joseph—Ephraim’s stick, together with all his Israelite companions.’ Then tie the two sticks together so that you’re holding one stick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: “When your people ask you, ‘Are you going to tell us what you’re doing?’ tell them, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, Watch me! I’ll take the Joseph stick that is in Ephraim’s hand, with the tribes of Israel connected with him, and lay the Judah stick on it. I’ll make them into one stick. I’m holding one stick.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-24a
  - type: text
    text: ' “Then take the sticks you’ve inscribed and hold them up so the people can see them. Tell them, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, Watch me! I’m taking the Israelites out of the nations in which they’ve been exiled. I’ll gather them in from all directions and bring them back home. I’ll make them one nation in the land, on the mountains of Israel, and give them one king—one king over all of them. Never again will they be divided into two nations, two kingdoms. Never again will they pollute their lives with their no-god idols and all those vile obscenities and rebellions. I’ll save them out of all their old sinful haunts. I’ll clean them up. They’ll be my people! I’ll be their God! My servant David will be king over them. They’ll all be under one shepherd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24b-27
  - type: text
    text: ' “‘They’ll follow my laws and keep my statutes. They’ll live in the same land I gave my servant Jacob, the land where your ancestors lived. They and their children and their grandchildren will live there forever, and my servant David will be their prince forever. I’ll make a covenant of peace with them that will hold everything together, an everlasting covenant. I’ll make them secure and place my holy place of worship at the center of their lives forever. I’ll live right there with them. I’ll be their God! They’ll be my people!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“‘The nations will realize that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', make Israel holy when my holy place of worship is established at the center of their lives forever.’”'
