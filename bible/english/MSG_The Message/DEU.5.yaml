document_id: DEU.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Teaches Israel on the Plains of Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moses called all Israel together. He said to them,
- type: usfm
  marker: p
  children:
  - type: text
    text: Attention, Israel. Listen obediently to the rules and regulations I am delivering to your listening ears today. Learn them. Live them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, made a covenant with us at Horeb. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' didn’t just make this covenant with our parents; he made it also with us, with all of us who are alive right now. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to you personally out of the fire on the mountain. At the time I stood between '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and you, to tell you what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said. You were afraid, remember, of the fire and wouldn’t climb the mountain. He said:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God,'
- type: usfm
  marker: li1
  children:
  - type: text
    text: who brought you out of the land of Egypt,
- type: usfm
  marker: li1
  children:
  - type: text
    text: out of a house of slaves.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No other gods, only me.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'No carved gods of any size, shape, or form of anything whatever, whether of things that fly or walk or swim. Don’t bow down to them and don’t serve them because '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and I’m a most jealous God. I hold parents responsible for any sins they pass on to their children to the third, and yes, even to the fourth generation. But I’m lovingly loyal to the thousands who love me and keep my commandments.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'No using the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, in curses or silly banter; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' won’t put up with the irreverent use of his name.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: 'No working on the Sabbath; keep it holy just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commanded you. Work six days, doing everything you have to do, but the seventh day is a Sabbath, a Rest Day—no work: not you, your son, your daughter, your servant, your maid, your ox, your donkey (or any of your animals), and not even the foreigner visiting your town. That way your servants and maids will get the same rest as you. Don’t ever forget that you were slaves in Egypt and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, got you out of there in a powerful show of strength. That’s why '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commands you to observe the day of Sabbath rest.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Respect your father and mother—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commands it! You’ll have a long life; the land that God is giving you will treat you well.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: No murder.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: No adultery.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: No stealing.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: No lies about your neighbor.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: No coveting your neighbor’s wife. And no lusting for his house, field, servant, maid, ox, or donkey either—nothing that belongs to your neighbor!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These are the words that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to the whole congregation at the mountain. He spoke in a tremendous voice from the fire and cloud and dark mist. And that was it. No more words. Then he wrote them on two slabs of stone and gave them to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24a
  - type: text
    text: ' As it turned out, when you heard the Voice out of that dark cloud and saw the mountain on fire, you approached me, all the heads of your tribes and your leaders, and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24b-26
  - type: text
    text: ' “Our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has revealed to us his glory and greatness. We’ve heard him speak from the fire today! We’ve seen that God can speak to humans and they can still live. But why risk it further? This huge fire will devour us if we stay around any longer. If we hear '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s voice anymore, we’ll die for sure. Has anyone ever known of anyone who has heard the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the way we have and lived to tell the story?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“From now on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' go and listen to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, says and then tell us what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' tells you. We’ll listen and we’ll do it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' heard what you said to me and told me, “I’ve heard what the people said to you. They’re right—good and true words. What I wouldn’t give if they’d always feel this way, continuing to revere me and always keep all my commands; they’d have a good life forever, they and their children!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: “Go ahead and tell them to go home to their tents. But you, you stay here with me so I can tell you every commandment and all the rules and regulations that you must teach them so they’ll know how to live in the land that I’m giving them as their own.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: 'So be very careful to act exactly as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commands you. Don’t veer off to the right or the left. Walk straight down the road '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commands so that you’ll have a good life and live a long time in the land that you’re about to possess.'
