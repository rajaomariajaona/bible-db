document_id: DEU.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Teaches Israel on the Plains of Moab
  - type: text
    content: Moses called all Israel together. He said to them,
  - type: text
    content: Attention, Israel. Listen obediently to the rules and regulations I am delivering to your listening ears today. Learn them. Live them.
  '11':
  - type: text
    content: 'No using the name of '
  - type: text
    content: God
  - type: text
    content: ', your God, in curses or silly banter; '
  - type: text
    content: God
  - type: text
    content: ' won’t put up with the irreverent use of his name.'
  '12':
  - type: text
    content: 'No working on the Sabbath; keep it holy just as '
  - type: text
    content: God
  - type: text
    content: ', your God, commanded you. Work six days, doing everything you have to do, but the seventh day is a Sabbath, a Rest Day—no work: not you, your son, your daughter, your servant, your maid, your ox, your donkey (or any of your animals), and not even the foreigner visiting your town. That way your servants and maids will get the same rest as you. Don’t ever forget that you were slaves in Egypt and '
  - type: text
    content: God
  - type: text
    content: ', your God, got you out of there in a powerful show of strength. That’s why '
  - type: text
    content: God
  - type: text
    content: ', your God, commands you to observe the day of Sabbath rest.'
  '16':
  - type: text
    content: Respect your father and mother—
  - type: text
    content: God
  - type: text
    content: ', your God, commands it! You’ll have a long life; the land that God is giving you will treat you well.'
  '17':
  - type: text
    content: No murder.
  '18':
  - type: text
    content: No adultery.
  '19':
  - type: text
    content: No stealing.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', our God, made a covenant with us at Horeb. '
  - type: text
    content: God
  - type: text
    content: ' didn’t just make this covenant with our parents; he made it also with us, with all of us who are alive right now. '
  - type: text
    content: God
  - type: text
    content: ' spoke to you personally out of the fire on the mountain. At the time I stood between '
  - type: text
    content: God
  - type: text
    content: ' and you, to tell you what '
  - type: text
    content: God
  - type: text
    content: ' said. You were afraid, remember, of the fire and wouldn’t climb the mountain. He said:'
  '20':
  - type: text
    content: No lies about your neighbor.
  '21':
  - type: text
    content: No coveting your neighbor’s wife. And no lusting for his house, field, servant, maid, ox, or donkey either—nothing that belongs to your neighbor!
  '22':
  - type: text
    content: 'These are the words that '
  - type: text
    content: God
  - type: text
    content: ' spoke to the whole congregation at the mountain. He spoke in a tremendous voice from the fire and cloud and dark mist. And that was it. No more words. Then he wrote them on two slabs of stone and gave them to me.'
  '23':
  - type: text
    content: ' As it turned out, when you heard the Voice out of that dark cloud and saw the mountain on fire, you approached me, all the heads of your tribes and your leaders, and said,'
  '24':
  - type: text
    content: ' “Our '
  - type: text
    content: God
  - type: text
    content: ' has revealed to us his glory and greatness. We’ve heard him speak from the fire today! We’ve seen that God can speak to humans and they can still live. But why risk it further? This huge fire will devour us if we stay around any longer. If we hear '
  - type: text
    content: God
  - type: text
    content: '’s voice anymore, we’ll die for sure. Has anyone ever known of anyone who has heard the Voice of '
  - type: text
    content: God
  - type: text
    content: ' the way we have and lived to tell the story?'
  '27':
  - type: text
    content: '“From now on, '
  - type: text
    content: you
  - type: text
    content: ' go and listen to what '
  - type: text
    content: God
  - type: text
    content: ', our God, says and then tell us what '
  - type: text
    content: God
  - type: text
    content: ' tells you. We’ll listen and we’ll do it.”'
  '28':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' heard what you said to me and told me, “I’ve heard what the people said to you. They’re right—good and true words. What I wouldn’t give if they’d always feel this way, continuing to revere me and always keep all my commands; they’d have a good life forever, they and their children!'
  '30':
  - type: text
    content: “Go ahead and tell them to go home to their tents. But you, you stay here with me so I can tell you every commandment and all the rules and regulations that you must teach them so they’ll know how to live in the land that I’m giving them as their own.”
  '32':
  - type: text
    content: 'So be very careful to act exactly as '
  - type: text
    content: God
  - type: text
    content: ' commands you. Don’t veer off to the right or the left. Walk straight down the road '
  - type: text
    content: God
  - type: text
    content: ' commands so that you’ll have a good life and live a long time in the land that you’re about to possess.'
  '6':
  - type: text
    content: 'I am '
  - type: text
    content: God
  - type: text
    content: ', your God,'
  - type: text
    content: who brought you out of the land of Egypt,
  - type: text
    content: out of a house of slaves.
  '7':
  - type: text
    content: No other gods, only me.
  '8':
  - type: text
    content: 'No carved gods of any size, shape, or form of anything whatever, whether of things that fly or walk or swim. Don’t bow down to them and don’t serve them because '
  - type: text
    content: I
  - type: text
    content: ' am '
  - type: text
    content: God
  - type: text
    content: ', your God, and I’m a most jealous God. I hold parents responsible for any sins they pass on to their children to the third, and yes, even to the fourth generation. But I’m lovingly loyal to the thousands who love me and keep my commandments.'
