document_id: PSA.49,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Listen, everyone, listen—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earth-dwellers, don’t miss this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you haves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have-nots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All together now: listen.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Anyone can see that the brightest and best die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wiped out right along with fools and idiots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They leave all their prowess behind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: move into their new home, The Coffin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cemetery their permanent address.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to think they named counties after themselves!
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: We aren’t immortal. We don’t last long.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like our dogs, we age and weaken. And die.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: This is what happens to those who live for the moment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who only look out for themselves:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death herds them like sheep straight to hell;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they disappear down the gullet of the grave;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They waste away to nothing—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing left but a marker in a cemetery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But me? God snatches me from the clutch of death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he reaches down and grabs me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: So don’t be impressed with those who get rich
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pile up fame and fortune.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They can’t take it with them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fame and fortune all get left behind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just when they think they’ve arrived
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and folks praise them because they’ve made good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They enter the family burial plot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where they’ll never see sunshine again.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: We aren’t immortal. We don’t last long.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like our dogs, we age and weaken. And die.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: I set plainspoken wisdom before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart-seasoned understandings of life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I fine-tuned my ear to the sayings of the wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I solve life’s riddle with the help of a harp.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: So why should I fear in bad times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hemmed in by enemy malice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shoved around by bullies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: demeaned by the arrogant rich?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: Really! There’s no such thing as self-rescue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pulling yourself up by your bootstraps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cost of rescue is beyond our means,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even then it doesn’t guarantee
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Life forever, or insurance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the Black Hole.
