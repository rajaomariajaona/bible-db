document_id: PSA.49,97
type_code: eng
verses:
  '1':
  - type: text
    content: Listen, everyone, listen—
  - type: text
    content: earth-dwellers, don’t miss this.
  - type: text
    content: All you haves
  - type: text
    content: and have-nots,
  - type: text
    content: 'All together now: listen.'
  '10':
  - type: text
    content: Anyone can see that the brightest and best die,
  - type: text
    content: wiped out right along with fools and idiots.
  - type: text
    content: They leave all their prowess behind,
  - type: text
    content: move into their new home, The Coffin,
  - type: text
    content: The cemetery their permanent address.
  - type: text
    content: And to think they named counties after themselves!
  '12':
  - type: text
    content: We aren’t immortal. We don’t last long.
  - type: text
    content: Like our dogs, we age and weaken. And die.
  '13':
  - type: text
    content: This is what happens to those who live for the moment,
  - type: text
    content: 'who only look out for themselves:'
  - type: text
    content: Death herds them like sheep straight to hell;
  - type: text
    content: they disappear down the gullet of the grave;
  - type: text
    content: They waste away to nothing—
  - type: text
    content: nothing left but a marker in a cemetery.
  - type: text
    content: But me? God snatches me from the clutch of death,
  - type: text
    content: he reaches down and grabs me.
  '16':
  - type: text
    content: So don’t be impressed with those who get rich
  - type: text
    content: and pile up fame and fortune.
  - type: text
    content: They can’t take it with them;
  - type: text
    content: fame and fortune all get left behind.
  - type: text
    content: Just when they think they’ve arrived
  - type: text
    content: and folks praise them because they’ve made good,
  - type: text
    content: They enter the family burial plot
  - type: text
    content: where they’ll never see sunshine again.
  '20':
  - type: text
    content: We aren’t immortal. We don’t last long.
  - type: text
    content: Like our dogs, we age and weaken. And die.
  '3':
  - type: text
    content: I set plainspoken wisdom before you,
  - type: text
    content: my heart-seasoned understandings of life.
  - type: text
    content: I fine-tuned my ear to the sayings of the wise,
  - type: text
    content: I solve life’s riddle with the help of a harp.
  '5':
  - type: text
    content: So why should I fear in bad times,
  - type: text
    content: hemmed in by enemy malice,
  - type: text
    content: Shoved around by bullies,
  - type: text
    content: demeaned by the arrogant rich?
  '7':
  - type: text
    content: Really! There’s no such thing as self-rescue,
  - type: text
    content: pulling yourself up by your bootstraps.
  - type: text
    content: The cost of rescue is beyond our means,
  - type: text
    content: and even then it doesn’t guarantee
  - type: text
    content: Life forever, or insurance
  - type: text
    content: against the Black Hole.
