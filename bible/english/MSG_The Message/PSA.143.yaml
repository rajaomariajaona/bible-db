document_id: PSA.143,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Listen to this prayer of mine, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: pay attention to what I’m asking.
  - type: text
    content: Answer me—you’re famous for your answers!
  - type: text
    content: Do what’s right for me.
  - type: text
    content: But don’t, please don’t, haul me into court;
  - type: text
    content: not a person alive would be acquitted there.
  '11':
  - type: text
    content: Keep up your reputation, God—give me life!
  - type: text
    content: In your justice, get me out of this trouble!
  - type: text
    content: In your great love, vanquish my enemies;
  - type: text
    content: make a clean sweep of those who harass me.
  - type: text
    content: And why? Because I’m your servant.
  '3':
  - type: text
    content: The enemy hunted me down;
  - type: text
    content: he kicked me and stomped me within an inch of my life.
  - type: text
    content: He put me in a black hole,
  - type: text
    content: buried me like a corpse in that dungeon.
  - type: text
    content: I sat there in despair, my spirit draining away,
  - type: text
    content: my heart heavy, like lead.
  - type: text
    content: I remembered the old days,
  - type: text
    content: went over all you’ve done, pondered the ways you’ve worked,
  - type: text
    content: Stretched out my hands to you,
  - type: text
    content: as thirsty for you as a desert thirsty for rain.
  '7':
  - type: text
    content: 'Hurry with your answer, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: I’m nearly at the end of my rope.
  - type: text
    content: Don’t turn away; don’t ignore me!
  - type: text
    content: That would be certain death.
  - type: text
    content: If you wake me each morning with the sound of your loving voice,
  - type: text
    content: I’ll go to sleep each night trusting in you.
  - type: text
    content: Point out the road I must travel;
  - type: text
    content: I’m all ears, all eyes before you.
  - type: text
    content: 'Save me from my enemies, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: you’re my only hope!
  - type: text
    content: Teach me how to live to please you,
  - type: text
    content: because you’re my God.
  - type: text
    content: Lead me by your blessed Spirit
  - type: text
    content: into cleared and level pastureland.
