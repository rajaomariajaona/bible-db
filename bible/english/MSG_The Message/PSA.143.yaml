document_id: PSA.143,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to this prayer of mine, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention to what I’m asking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer me—you’re famous for your answers!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do what’s right for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t, please don’t, haul me into court;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a person alive would be acquitted there.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep up your reputation, God—give me life!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In your justice, get me out of this trouble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your great love, vanquish my enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make a clean sweep of those who harass me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And why? Because I’m your servant.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy hunted me down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he kicked me and stomped me within an inch of my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He put me in a black hole,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buried me like a corpse in that dungeon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sat there in despair, my spirit draining away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart heavy, like lead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I remembered the old days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: went over all you’ve done, pondered the ways you’ve worked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stretched out my hands to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as thirsty for you as a desert thirsty for rain.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hurry with your answer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m nearly at the end of my rope.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t turn away; don’t ignore me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That would be certain death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you wake me each morning with the sound of your loving voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll go to sleep each night trusting in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Point out the road I must travel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m all ears, all eyes before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save me from my enemies, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re my only hope!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach me how to live to please you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you’re my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lead me by your blessed Spirit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into cleared and level pastureland.
