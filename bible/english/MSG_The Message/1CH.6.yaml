document_id: 1CH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Levi
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-14
  - type: text
    text: The sons of Levi were Gershon, Kohath, and Merari. The sons of Kohath were Amram, Izhar, Hebron, and Uzziel. The children of Amram were Aaron, Moses, and Miriam. The sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar. Eleazar had Phinehas, Phinehas had Abishua, Abishua had Bukki, Bukki had Uzzi, Uzzi had Zerahiah, Zerahiah had Meraioth, Meraioth had Amariah, Amariah had Ahitub, Ahitub had Zadok, Zadok had Ahimaaz, Ahimaaz had Azariah, Azariah had Johanan, and Johanan had Azariah (who served as priest in the temple Solomon built in Jerusalem). Azariah had Amariah, Amariah had Ahitub, Ahitub had Zadok, Zadok had Shallum, Shallum had Hilkiah, Hilkiah had Azariah, Azariah had Seraiah, and Seraiah had Jehozadak.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jehozadak went off to exile when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' used Nebuchadnezzar to take Judah and Jerusalem into exile.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-30
  - type: text
    text: 'The sons of Levi were Gershon, Kohath, and Merari. These are the names of the sons of Gershon: Libni and Shimei. The sons of Kohath were Amram, Izhar, Hebron, and Uzziel. The sons of Merari were Mahli and Mushi. These are the Levitical clans according to families: the sons of Gershon were Libni his son, Jehath his son, Zimmah his son, Joah his son, Iddo his son, Zerah his son, and Jeatherai his son. The sons of Kohath were Amminadab his son, Korah his son, Assir his son, Elkanah his son, Ebiasaph his son, Assir his son, Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. The sons of Elkanah were Amasai and Ahimoth, Elkanah his son, Zophai his son, Nahath his son, Eliab his son, Jeroham his son, and Elkanah his son. The sons of Samuel were Joel his firstborn son and Abijah his second. The sons of Merari were Mahli, Libni his son, Shimei his son, Uzzah his son, Shimea his son, Haggiah his son, and Asaiah his son.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Worship Leaders
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: 'These are the persons David appointed to lead the singing in the house of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' after the Chest was placed there. They were the ministers of music in the place of worship, which was the Tent of Meeting until Solomon built The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in Jerusalem. As they carried out their work, they followed the instructions given to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-38
  - type: text
    text: 'These are the persons, together with their sons, who served by preparing for and directing worship: from the family of the Kohathites was Heman the choirmaster, the son of Joel, the son of Samuel, the son of Elkanah, the son of Jeroham, the son of Eliel, the son of Toah, the son of Zuph, the son of Elkanah, the son of Mahath, the son of Amasai, the son of Elkanah, the son of Joel, the son of Azariah, the son of Zephaniah, the son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah, the son of Izhar, the son of Kohath, the son of Levi, the son of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-43
  - type: text
    text: Heman’s associate Asaph stood at his right hand. Asaph was the son of Berekiah, the son of Shimea, the son of Michael, the son of Baaseiah, the son of Malkijah, the son of Ethni, the son of Zerah, the son of Adaiah, the son of Ethan, the son of Zimmah, the son of Shimei, the son of Jahath, the son of Gershon, the son of Levi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-47
  - type: text
    text: Of the sons of Merari, the associates who stood at his left hand, was Ethan the son of Kishi, the son of Abdi, the son of Malluch, the son of Hashabiah, the son of Amaziah, the son of Hilkiah, the son of Amzi, the son of Bani, the son of Shemer, the son of Mahli, the son of Mushi, the son of Merari, the son of Levi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: The rest of the Levites were assigned to all the other work in the place of worship, the house of God.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Aaron and his sons offered the sacrifices on the Altar of Burnt Offering and the Altar of Incense; they were in charge of all the work surrounding the Holy of Holies. They made atonement for Israel following the instructions commanded by Moses, servant of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 50-53
  - type: text
    text: 'These are the sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son, Bukki his son, Uzzi his son, Zerahiah his son, Meraioth his son, Amariah his son, Ahitub his son, Zadok his son, and Ahimaaz his son.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Priestly Cities
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 54-81
  - type: text
    text: 'And these are the places where the priestly families were assigned to live. The first assignment went by lot to the sons of Aaron of the Kohathite family; they were given Hebron in the land of Judah and all the neighboring pastures. Caleb the son of Jephunneh got the fields and villages around the city. The family of Aaron was also given the cities of refuge, with pastures included: Hebron, Libnah, Jattir, Eshtemoa, Hilen, Debir, Ashan, and Beth Shemesh. They were also given Geba from the tribe of Benjamin, Alemeth, and Anathoth, all with pastures included. In all, thirteen cities were distributed among the Kohathite families. The rest of the Kohathites were given another ten cities, distributed by lot from the half-tribe of Manasseh. The sons of Gershon were given, family by family, thirteen cities from the tribes of Issachar, Asher, Naphtali, and Manasseh in Bashan. The sons of Merari, family by family, were assigned by lot twelve cities from the tribes of Reuben, Gad, and Zebulun. The sons of Israel gave the Levites both the cities and their pastures. They also distributed by lot cities from the tribes of Judah, Simeon, and Benjamin. Some of the Kohath families were given their cities from the tribe of Ephraim, cities of refuge: Shechem in the hill country of Ephraim, Gezer, Jokmeam, Beth Horon, Aijalon, and Gath Rimmon—all with their pastures. The rest of the sons of Kohath were given Aner and Bileam with their pastures from the half-tribe of Manasseh. The sons of Gershon were given, family by family, from the half-tribe of Manasseh, Golan in Bashan and Ashtaroth; from the tribe of Issachar, Kedesh, Daberath, Ramoth, and Anem; from the tribe of Asher, Mashal, Abdon, Hukok, and Rehob; from the tribe of Naphtali, Kedesh in Galilee, Hammon, and Kiriathaim. The rest of the sons of Merari got Rimmono and Tabor from the tribe of Zebulun; Bezer in the desert, Jahzah, Kedemoth, and Mephaath from the tribe of Reuben to the east of the Jordan; and Ramoth in Gilead, Mahanaim, Heshbon, and Jazer from the tribe of Gad. Pastures were included in all these towns.'
