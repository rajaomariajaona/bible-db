type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', I’m not trying to rule the roost,'
  - type: text
    content: I don’t want to be king of the mountain.
  - type: text
    content: I haven’t meddled where I have no business
  - type: text
    content: or fantasized grandiose plans.
  '2':
  - type: text
    content: I’ve kept my feet on the ground,
  - type: text
    content: I’ve cultivated a quiet heart.
  - type: text
    content: Like a baby content in its mother’s arms,
  - type: text
    content: my soul is a baby content.
  '3':
  - type: text
    content: 'Wait, Israel, for '
  - type: text
    content: God
  - type: text
    content: . Wait with hope.
  - type: text
    content: Hope now; hope always!
