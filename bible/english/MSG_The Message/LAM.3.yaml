document_id: LAM.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Locked Me Up in Deep Darkness
  - type: text
    content: I’m the man who has seen trouble,
  - type: text
    content: 'trouble coming from the lash of '
  - type: text
    content: God
  - type: text
    content: ’s anger.
  - type: text
    content: He took me by the hand and walked me
  - type: text
    content: into pitch-black darkness.
  - type: text
    content: Yes, he’s given me the back of his hand
  - type: text
    content: over and over and over again.
  '10':
  - type: text
    content: He’s a prowling bear tracking me down,
  - type: text
    content: a lion in hiding ready to pounce.
  - type: text
    content: He knocked me from the path and ripped me to pieces.
  - type: text
    content: When he finished, there was nothing left of me.
  - type: text
    content: He took out his bow and arrows
  - type: text
    content: and used me for target practice.
  '13':
  - type: text
    content: He shot me in the stomach
  - type: text
    content: with arrows from his quiver.
  - type: text
    content: Everyone took me for a joke,
  - type: text
    content: made me the butt of their mocking ballads.
  - type: text
    content: He forced rotten, stinking food down my throat,
  - type: text
    content: bloated me with vile drinks.
  '16':
  - type: text
    content: He ground my face into the gravel.
  - type: text
    content: He pounded me into the mud.
  - type: text
    content: I gave up on life altogether.
  - type: text
    content: I’ve forgotten what the good life is like.
  - type: text
    content: I said to myself, “This is it. I’m finished.
  - type: text
    content: God
  - type: text
    content: ' is a lost cause.”'
  - type: heading
    content: It’s a Good Thing to Hope for Help from God
  '19':
  - type: text
    content: I’ll never forget the trouble, the utter lostness,
  - type: text
    content: the taste of ashes, the poison I’ve swallowed.
  - type: text
    content: I remember it all—oh, how well I remember—
  - type: text
    content: the feeling of hitting the bottom.
  - type: text
    content: But there’s one other thing I remember,
  - type: text
    content: 'and remembering, I keep a grip on hope:'
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s loyal love couldn’t have run out,
  - type: text
    content: his merciful love couldn’t have dried up.
  - type: text
    content: They’re created new every morning.
  - type: text
    content: How great your faithfulness!
  - type: text
    content: 'I’m sticking with '
  - type: text
    content: God
  - type: text
    content: ' (I say it over and over).'
  - type: text
    content: He’s all I’ve got left.
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' proves to be good to the man who passionately waits,'
  - type: text
    content: to the woman who diligently seeks.
  - type: text
    content: It’s a good thing to quietly hope,
  - type: text
    content: 'quietly hope for help from '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: It’s a good thing when you’re young
  - type: text
    content: to stick it out through the hard times.
  '28':
  - type: text
    content: When life is heavy and hard to take,
  - type: text
    content: go off by yourself. Enter the silence.
  - type: text
    content: 'Bow in prayer. Don’t ask questions:'
  - type: text
    content: Wait for hope to appear.
  - type: text
    content: Don’t run from trouble. Take it full-face.
  - type: text
    content: The “worst” is never the worst.
  '31':
  - type: text
    content: Why? Because the Master won’t ever
  - type: text
    content: walk out and fail to return.
  - type: text
    content: If he works severely, he also works tenderly.
  - type: text
    content: His stockpiles of loyal love are immense.
  - type: text
    content: He takes no pleasure in making life hard,
  - type: text
    content: 'in throwing roadblocks in the way:'
  '34':
  - type: text
    content: Stomping down hard
  - type: text
    content: on luckless prisoners,
  - type: text
    content: Refusing justice to victims
  - type: text
    content: in the court of High God,
  - type: text
    content: Tampering with evidence—
  - type: text
    content: the Master does not approve of such things.
  - type: heading
    content: God Speaks Both Good Things and Hard Things into Being
  '37':
  - type: text
    content: Who do you think “spoke and it happened”?
  - type: text
    content: It’s the Master who gives such orders.
  - type: text
    content: Doesn’t the High God speak everything,
  - type: text
    content: good things and hard things alike, into being?
  - type: text
    content: And why would anyone gifted with life
  - type: text
    content: complain when punished for sin?
  '4':
  - type: text
    content: He turned me into a skeleton
  - type: text
    content: of skin and bones, then broke the bones.
  - type: text
    content: He hemmed me in, ganged up on me,
  - type: text
    content: poured on the trouble and hard times.
  - type: text
    content: He locked me up in deep darkness,
  - type: text
    content: like a corpse nailed inside a coffin.
  '40':
  - type: text
    content: Let’s take a good look at the way we’re living
  - type: text
    content: 'and reorder our lives under '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Let’s lift our hearts and hands at one and the same time,
  - type: text
    content: 'praying to God in heaven:'
  - type: text
    content: “We’ve been contrary and willful,
  - type: text
    content: and you haven’t forgiven.
  '43':
  - type: text
    content: “You lost your temper with us, holding nothing back.
  - type: text
    content: You chased us and cut us down without mercy.
  - type: text
    content: You wrapped yourself in thick blankets of clouds
  - type: text
    content: so no prayers could get through.
  - type: text
    content: You treated us like dirty dishwater,
  - type: text
    content: threw us out in the backyard of the nations.
  '46':
  - type: text
    content: “Our enemies shout abuse,
  - type: text
    content: their mouths full of derision, spitting invective.
  - type: text
    content: We’ve been to hell and back.
  - type: text
    content: We’ve nowhere to turn, nowhere to go.
  - type: text
    content: Rivers of tears pour from my eyes
  - type: text
    content: at the smashup of my dear people.
  '49':
  - type: text
    content: “The tears stream from my eyes,
  - type: text
    content: an artesian well of tears,
  - type: text
    content: 'Until you, '
  - type: text
    content: God
  - type: text
    content: ', look down from on high,'
  - type: text
    content: look and see my tears.
  - type: text
    content: When I see what’s happened to the young women in the city,
  - type: text
    content: the pain breaks my heart.
  '52':
  - type: text
    content: “Enemies with no reason to be enemies
  - type: text
    content: hunted me down like a bird.
  - type: text
    content: They threw me into a pit,
  - type: text
    content: then pelted me with stones.
  - type: text
    content: Then the rains came and filled the pit.
  - type: text
    content: The water rose over my head. I said, ‘It’s all over.’
  '55':
  - type: text
    content: '“I called out your name, O '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: called from the bottom of the pit.
  - type: text
    content: You listened when I called out, ‘Don’t shut your ears!
  - type: text
    content: Get me out of here! Save me!’
  - type: text
    content: You came close when I called out.
  - type: text
    content: You said, ‘It’s going to be all right.’
  '58':
  - type: text
    content: “You took my side, Master;
  - type: text
    content: you brought me back alive!
  - type: text
    content: God
  - type: text
    content: ', you saw the wrongs heaped on me.'
  - type: text
    content: Give me my day in court!
  - type: text
    content: Yes, you saw their mean-minded schemes,
  - type: text
    content: their plots to destroy me.
  '61':
  - type: text
    content: '“You heard, '
  - type: text
    content: God
  - type: text
    content: ', their vicious gossip,'
  - type: text
    content: their behind-my-back plots to ruin me.
  - type: text
    content: They never quit, these enemies of mine, dreaming up mischief,
  - type: text
    content: hatching malice, day after day after day.
  - type: text
    content: Sitting down or standing up—just look at them!—
  - type: text
    content: they mock me with vulgar doggerel.
  '64':
  - type: text
    content: '“Make them pay for what they’ve done, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Give them their just deserts.
  - type: text
    content: Break their miserable hearts!
  - type: text
    content: Damn their eyes!
  - type: text
    content: Get good and angry. Hunt them down.
  - type: text
    content: Make a total demolition here under your heaven!”
  '7':
  - type: text
    content: He shuts me in so I’ll never get out,
  - type: text
    content: handcuffs my wrists, shackles my feet.
  - type: text
    content: Even when I cry out and plead for help,
  - type: text
    content: he locks up my prayers and throws away the key.
  - type: text
    content: He sets up blockades with quarried limestone.
  - type: text
    content: He’s got me cornered.
