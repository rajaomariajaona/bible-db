document_id: LAM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Locked Me Up in Deep Darkness'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: I’m the man who has seen trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'trouble coming from the lash of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took me by the hand and walked me
- type: usfm
  marker: q2
  children:
  - type: text
    text: into pitch-black darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, he’s given me the back of his hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: over and over and over again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: He turned me into a skeleton
- type: usfm
  marker: q2
  children:
  - type: text
    text: of skin and bones, then broke the bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hemmed me in, ganged up on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: poured on the trouble and hard times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He locked me up in deep darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a corpse nailed inside a coffin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: He shuts me in so I’ll never get out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: handcuffs my wrists, shackles my feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even when I cry out and plead for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he locks up my prayers and throws away the key.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He sets up blockades with quarried limestone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s got me cornered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: He’s a prowling bear tracking me down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lion in hiding ready to pounce.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He knocked me from the path and ripped me to pieces.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When he finished, there was nothing left of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He took out his bow and arrows
- type: usfm
  marker: q2
  children:
  - type: text
    text: and used me for target practice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: He shot me in the stomach
- type: usfm
  marker: q2
  children:
  - type: text
    text: with arrows from his quiver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone took me for a joke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made me the butt of their mocking ballads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He forced rotten, stinking food down my throat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bloated me with vile drinks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: He ground my face into the gravel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He pounded me into the mud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I gave up on life altogether.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve forgotten what the good life is like.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said to myself, “This is it. I’m finished.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is a lost cause.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'It’s a Good Thing to Hope for Help from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: I’ll never forget the trouble, the utter lostness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the taste of ashes, the poison I’ve swallowed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I remember it all—oh, how well I remember—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the feeling of hitting the bottom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But there’s one other thing I remember,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and remembering, I keep a grip on hope:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s loyal love couldn’t have run out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his merciful love couldn’t have dried up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re created new every morning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How great your faithfulness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’m sticking with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' (I say it over and over).'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s all I’ve got left.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' proves to be good to the man who passionately waits,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the woman who diligently seeks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s a good thing to quietly hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'quietly hope for help from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s a good thing when you’re young
- type: usfm
  marker: q2
  children:
  - type: text
    text: to stick it out through the hard times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: When life is heavy and hard to take,
- type: usfm
  marker: q2
  children:
  - type: text
    text: go off by yourself. Enter the silence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Bow in prayer. Don’t ask questions:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wait for hope to appear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t run from trouble. Take it full-face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The “worst” is never the worst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-33
  - type: text
    text: Why? Because the Master won’t ever
- type: usfm
  marker: q2
  children:
  - type: text
    text: walk out and fail to return.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If he works severely, he also works tenderly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His stockpiles of loyal love are immense.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He takes no pleasure in making life hard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'in throwing roadblocks in the way:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-36
  - type: text
    text: Stomping down hard
- type: usfm
  marker: q2
  children:
  - type: text
    text: on luckless prisoners,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Refusing justice to victims
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the court of High God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tampering with evidence—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Master does not approve of such things.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Speaks Both Good Things and Hard Things into Being
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-39
  - type: text
    text: Who do you think “spoke and it happened”?
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s the Master who gives such orders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t the High God speak everything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: good things and hard things alike, into being?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why would anyone gifted with life
- type: usfm
  marker: q2
  children:
  - type: text
    text: complain when punished for sin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-42
  - type: text
    text: Let’s take a good look at the way we’re living
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and reorder our lives under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s lift our hearts and hands at one and the same time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'praying to God in heaven:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We’ve been contrary and willful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you haven’t forgiven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-45
  - type: text
    text: “You lost your temper with us, holding nothing back.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You chased us and cut us down without mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You wrapped yourself in thick blankets of clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: so no prayers could get through.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You treated us like dirty dishwater,
- type: usfm
  marker: q2
  children:
  - type: text
    text: threw us out in the backyard of the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 46-48
  - type: text
    text: “Our enemies shout abuse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their mouths full of derision, spitting invective.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ve been to hell and back.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve nowhere to turn, nowhere to go.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rivers of tears pour from my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the smashup of my dear people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-51
  - type: text
    text: “The tears stream from my eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an artesian well of tears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', look down from on high,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: look and see my tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I see what’s happened to the young women in the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pain breaks my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 52-54
  - type: text
    text: “Enemies with no reason to be enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: hunted me down like a bird.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They threw me into a pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then pelted me with stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the rains came and filled the pit.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The water rose over my head. I said, ‘It’s all over.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 55-57
  - type: text
    text: '“I called out your name, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: called from the bottom of the pit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You listened when I called out, ‘Don’t shut your ears!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get me out of here! Save me!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: You came close when I called out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You said, ‘It’s going to be all right.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 58-60
  - type: text
    text: “You took my side, Master;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you brought me back alive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you saw the wrongs heaped on me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give me my day in court!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, you saw their mean-minded schemes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their plots to destroy me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 61-63
  - type: text
    text: '“You heard, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', their vicious gossip,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: their behind-my-back plots to ruin me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They never quit, these enemies of mine, dreaming up mischief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hatching malice, day after day after day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sitting down or standing up—just look at them!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they mock me with vulgar doggerel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 64-66
  - type: text
    text: '“Make them pay for what they’ve done, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give them their just deserts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Break their miserable hearts!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Damn their eyes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get good and angry. Hunt them down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make a total demolition here under your heaven!”
