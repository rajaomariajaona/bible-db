document_id: GEN.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac and Rebekah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Abraham was now an old man. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had blessed Abraham in every way.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The servant took ten of his master’s camels and, loaded with gifts from his master, traveled to Aram Naharaim and the city of Nahor. Outside the city, he made the camels kneel at a well. It was evening, the time when the women came to draw water. He prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', God of my master Abraham, make things go smoothly this day; treat my master Abraham well! As I stand here by the spring while the young women of the town come out to get water, let the girl to whom I say, ‘Lower your jug and give me a drink,’ and who answers, ‘Drink, and let me also water your camels’—let her be the woman you have picked out for your servant Isaac. Then I’ll know that you’re working graciously behind the scenes for my master.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It so happened that the words were barely out of his mouth when Rebekah, the daughter of Bethuel whose mother was Milcah the wife of Nahor, Abraham’s brother, came out with a water jug on her shoulder. The girl was stunningly beautiful, a pure virgin. She went down to the spring, filled her jug, and came back up. The servant ran to meet her and said, “Please, can I have a sip of water from your jug?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, “Certainly, drink!” And she held the jug so that he could drink. When he had satisfied his thirst she said, “I’ll get water for your camels, too, until they’ve drunk their fill.” She promptly emptied her jug into the trough and ran back to the well to fill it, and she kept at it until she had watered all the camels.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man watched, silent. Was this '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s answer? Had '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made his trip a success or not?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham spoke to the senior servant in his household, the one in charge of everything he had, “Put your hand under my thigh and swear by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —God of Heaven, God of Earth—that you will not get a wife for my son from among the young women of the Canaanites here, but will go to the land of my birth and get a wife for my son Isaac.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the camels had finished drinking, the man brought out gifts, a gold nose ring weighing a little over a quarter of an ounce and two arm bracelets weighing about four ounces, and gave them to her. He asked her, “Tell me about your family? Whose daughter are you? Is there room in your father’s house for us to stay the night?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, “I’m the daughter of Bethuel the son of Milcah and Nahor. And there’s plenty of room in our house for you to stay—and lots of straw and feed besides.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this the man bowed in worship before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and prayed, “Blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', God of my master Abraham: How generous and true you’ve been to my master; you’ve held nothing back. You led me right to the door of my master’s brother!”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the girl was off and running, telling everyone in her mother’s house what had happened.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rebekah had a brother named Laban. Laban ran outside to the man at the spring. He had seen the nose ring and the bracelets on his sister and had heard her say, “The man said this and this and this to me.” So he went to the man and there he was, still standing with his camels at the spring. Laban welcomed him: “Come on in, blessed of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Why are you standing out here? I’ve got the house ready for you; and there’s also a place for your camels.”'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the man went into the house. The camels were unloaded and given straw and feed. Water was brought to bathe the feet of the man and the men with him. Then Laban brought out food. But the man said, “I won’t eat until I tell my story.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Laban said, “Go ahead; tell us.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The servant said, “I’m the servant of Abraham. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has blessed my master—he’s a great man; '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given him sheep and cattle, silver and gold, servants and maidservants, camels and donkeys. And then to top it off, Sarah, my master’s wife, gave him a son in her old age and he has passed everything on to his son. My master made me promise, ‘Don’t get a wife for my son from the daughters of the Canaanites in whose land I live. No, go to my father’s home, back to my family, and get a wife for my son there.’ I said to my master, ‘But what if the woman won’t come with me?’ He said, ‘'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' before whom I’ve walked faithfully will send his angel with you and he’ll make things work out so that you’ll bring back a wife for my son from my family, from the house of my father. Then you’ll be free from the oath. If you go to my family and they won’t give her to you, you will also be free from the oath.’'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well, when I came this very day to the spring, I prayed, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', God of my master Abraham, make things turn out well in this task I’ve been given. I’m standing at this well. When a young woman comes here to draw water and I say to her, Please, give me a sip of water from your jug, and she says, Not only will I give you a drink, I’ll also water your camels—let that woman be the wife '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has picked out for my master’s son.’'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I had barely finished offering this prayer, when Rebekah arrived, her jug on her shoulder. She went to the spring and drew water and I said, ‘Please, can I have a drink?’ She didn’t hesitate. She held out her jug and said, ‘Drink; and when you’re finished I’ll also water your camels.’ I drank, and she watered the camels. I asked her, ‘Whose daughter are you?’ She said, ‘The daughter of Bethuel whose parents were Nahor and Milcah.’ I gave her a ring for her nose, bracelets for her arms, and bowed in worship to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. I praised '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of my master Abraham who had led me straight to the door of my master’s family to get a wife for his son.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now, tell me what you are going to do. If you plan to respond with a generous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yes
    - type: text
      text: ', tell me. But if not, tell me plainly so I can figure out what to do next.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The servant answered, “But what if the woman refuses to leave home and come with me? Do I then take your son back to your home country?”
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban and Bethuel answered, “This is undeniably from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. We have no say in the matter, either yes or no. Rebekah is yours: Take her and go; let her be the wife of your master’s son, as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has made plain.”'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Abraham’s servant heard their decision, he bowed in worship before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Then he brought out gifts of silver and gold and clothing and gave them to Rebekah. He also gave expensive gifts to her brother and mother. He and his men had supper and spent the night. But first thing in the morning they were up. He said, “Send me back to my master.”
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Her brother and mother said, “Let the girl stay a while, say another ten days, and then go.”
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “Oh, don’t make me wait! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has worked everything out so well—send me off to my master.”'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “We’ll call the girl; we’ll ask her.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They called Rebekah and asked her, “Do you want to go with this man?”
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, “I’m ready to go.”
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they sent them off, their sister Rebekah with her nurse, and Abraham’s servant with his men. And they blessed Rebekah saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re our sister—live bountifully!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your children, triumphantly!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham said, “Oh no. Never. By no means are you to take my son back there. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Heaven, took me from the home of my father and from the country of my birth and spoke to me in solemn promise, ‘I’m giving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'this '
    - type: text
      text: land to your descendants.’ This God will send his angel ahead of you to get a wife for my son. And if the woman won’t come, you are free from this oath you’ve sworn to me. But under no circumstances are you to take my son back there.”
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rebekah and her young maids mounted the camels and followed the man. The servant took Rebekah and set off for home.
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac was living in the Negev. He had just come back from a visit to Beer Lahai Roi. In the evening he went out into the field; while meditating he looked up and saw camels coming. When Rebekah looked up and saw Isaac, she got down from her camel and asked the servant, “Who is that man out in the field coming toward us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “That is my master.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: She took her veil and covered herself.
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After the servant told Isaac the whole story of the trip, Isaac took Rebekah into the tent of his mother Sarah. He married Rebekah and she became his wife and he loved her. So Isaac found comfort after his mother’s death.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the servant put his hand under the thigh of his master Abraham and gave his solemn oath.
