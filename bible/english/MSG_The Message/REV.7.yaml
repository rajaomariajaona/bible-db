document_id: REV.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Servants of God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Immediately I saw Four Angels standing at the four corners of earth, standing steady with a firm grip on the four winds so no wind would blow on earth or sea, not even rustle a tree.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Just then one of the Elders addressed me: “Who are these dressed in white robes, and where did they come from?” Taken aback, I said, “O Sir, I have no idea—but you must know.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he told me, “These are those who come from the great tribulation, and they’ve washed their robes, scrubbed them clean in the blood of the Lamb. That’s why they’re standing before God’s Throne. They serve him day and night in his Temple. The One on the Throne will pitch his tent there for them: no more hunger, no more thirst, no more scorching heat. The Lamb on the Throne will shepherd them, will lead them to spring waters of Life. And God will wipe every last tear from their eyes.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I saw another Angel rising from where the sun rose, carrying the seal of the Living God. He thundered to the Four Angels assigned the task of hurting earth and sea, “Don’t hurt the earth! Don’t hurt the sea! Don’t so much as hurt a tree until I’ve sealed the servants of our God on their foreheads!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I heard the count of those who were sealed: 144,000! They were sealed out of every Tribe of Israel: 12,000 sealed from Judah, 12,000 from Reuben, 12,000 from Gad, 12,000 from Asher, 12,000 from Naphtali, 12,000 from Manasseh, 12,000 from Simeon, 12,000 from Levi, 12,000 from Issachar, 12,000 from Zebulun, 12,000 from Joseph, 12,000 sealed from Benjamin.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked again. I saw a huge crowd, too huge to count. Everyone was there—all nations and tribes, all races and languages. And they were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: standing
    - type: text
      text: ', dressed in white robes and waving palm branches, standing before the Throne and the Lamb and heartily singing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salvation to our God on his Throne!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salvation to the Lamb!
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All who were standing around the Throne—Angels, Elders, Animals—fell on their faces before the Throne and worshiped God, singing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, Yes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The blessing and glory and wisdom and thanksgiving,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The honor and power and strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To our God forever and ever and ever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, Yes!
