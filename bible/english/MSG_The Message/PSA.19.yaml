document_id: PSA.19,97
type_code: eng
verses:
  '1':
  - type: text
    content: God’s glory is on tour in the skies,
  - type: text
    content: God-craft on exhibit across the horizon.
  - type: text
    content: Madame Day holds classes every morning,
  - type: text
    content: Professor Night lectures each evening.
  '10':
  - type: text
    content: God’s Word is better than a diamond,
  - type: text
    content: better than a diamond set between emeralds.
  - type: text
    content: You’ll like it better than strawberries in spring,
  - type: text
    content: better than red, ripe strawberries.
  '11':
  - type: text
    content: 'There’s more: God’s Word warns us of danger'
  - type: text
    content: and directs us to hidden treasure.
  - type: text
    content: Otherwise how will we find our way?
  - type: text
    content: Or know when we play the fool?
  - type: text
    content: Clean the slate, God, so we can start the day fresh!
  - type: text
    content: Keep me from stupid sins,
  - type: text
    content: from thinking I can take over your work;
  - type: text
    content: Then I can start this day sun-washed,
  - type: text
    content: scrubbed clean of the grime of sin.
  - type: text
    content: These are the words in my mouth;
  - type: text
    content: these are what I chew on and pray.
  - type: text
    content: Accept them when I place them
  - type: text
    content: on the morning altar,
  - type: text
    content: O God, my Altar-Rock,
  - type: text
    content: God, Priest-of-My-Altar.
  '3':
  - type: text
    content: ' Their words aren’t heard,'
  - type: text
    content: their voices aren’t recorded,
  - type: text
    content: 'But their silence fills the earth:'
  - type: text
    content: unspoken truth is spoken everywhere.
  '4':
  - type: text
    content: ' God makes a huge dome'
  - type: text
    content: for the sun—a superdome!
  - type: text
    content: The morning sun’s a new husband
  - type: text
    content: leaping from his honeymoon bed,
  - type: text
    content: The daybreaking sun an athlete
  - type: text
    content: racing to the tape.
  '6':
  - type: text
    content: That’s how God’s Word vaults across the skies
  - type: text
    content: from sunrise to sunset,
  - type: text
    content: Melting ice, scorching deserts,
  - type: text
    content: warming hearts to faith.
  '7':
  - type: text
    content: 'The revelation of '
  - type: text
    content: God
  - type: text
    content: ' is whole'
  - type: text
    content: and pulls our lives together.
  - type: text
    content: 'The signposts of '
  - type: text
    content: God
  - type: text
    content: ' are clear'
  - type: text
    content: and point out the right road.
  - type: text
    content: 'The life-maps of '
  - type: text
    content: God
  - type: text
    content: ' are right,'
  - type: text
    content: showing the way to joy.
  - type: text
    content: 'The directions of '
  - type: text
    content: God
  - type: text
    content: ' are plain'
  - type: text
    content: and easy on the eyes.
  - type: text
    content: God
  - type: text
    content: ’s reputation is twenty-four-carat gold,
  - type: text
    content: with a lifetime guarantee.
  - type: text
    content: 'The decisions of '
  - type: text
    content: God
  - type: text
    content: ' are accurate'
  - type: text
    content: down to the nth degree.
