document_id: PSA.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: God’s glory is on tour in the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God-craft on exhibit across the horizon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Madame Day holds classes every morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Professor Night lectures each evening.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: God’s Word is better than a diamond,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: better than a diamond set between emeralds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll like it better than strawberries in spring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: better than red, ripe strawberries.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-14
    - type: text
      text: 'There’s more: God’s Word warns us of danger'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and directs us to hidden treasure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise how will we find our way?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or know when we play the fool?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clean the slate, God, so we can start the day fresh!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep me from stupid sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from thinking I can take over your work;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I can start this day sun-washed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scrubbed clean of the grime of sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the words in my mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these are what I chew on and pray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accept them when I place them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the morning altar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, my Altar-Rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God, Priest-of-My-Altar.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4a
    - type: text
      text: ' Their words aren’t heard,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their voices aren’t recorded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But their silence fills the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unspoken truth is spoken everywhere.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4b-5
    - type: text
      text: ' God makes a huge dome'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sun—a superdome!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The morning sun’s a new husband
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaping from his honeymoon bed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The daybreaking sun an athlete
  - type: usfm
    marker: q2
    children:
    - type: text
      text: racing to the tape.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: That’s how God’s Word vaults across the skies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from sunrise to sunset,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Melting ice, scorching deserts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: warming hearts to faith.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: 'The revelation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is whole'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pulls our lives together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The signposts of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' are clear'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and point out the right road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The life-maps of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' are right,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: showing the way to joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The directions of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' are plain'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and easy on the eyes.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s reputation is twenty-four-carat gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a lifetime guarantee.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The decisions of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' are accurate'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down to the nth degree.
