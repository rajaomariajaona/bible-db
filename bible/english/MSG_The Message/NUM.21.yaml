document_id: NUM.21,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hormah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The Canaanite king of Arad, ruling in the Negev, heard that Israel was advancing up the road to Atharim. He attacked Israel and took prisoners of war.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-15
    - type: text
      text: 'The People of Israel set out and camped at Oboth. They left Oboth and camped at Iye Abarim in the wilderness that faces Moab on the east. They went from there and pitched camp in the Zered Valley. Their next camp was alongside the Arnon River, which marks the border between Amorite country and Moab. The Book of the Wars of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' refers to this place:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Waheb in Suphah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the canyons of Arnon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Along the canyon ravines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that lead to the village Ar
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lean hard against
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the border of Moab.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: 'They went on to Beer (The Well), where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Gather the people; I’ll give them water.” That’s where Israel sang this song:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Erupt, Well!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing the Song of the Well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the well sunk by princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dug out by the peoples’ leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: digging with their scepters and staffs.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: From the wilderness their route went from Mattanah to Nahaliel to Bamoth (The Heights) to the valley that opens into the fields of Moab from where Pisgah (The Summit) rises and overlooks Jeshimon (Wasteland).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Israel vowed a vow to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “If you will give this people into our power, we’ll destroy their towns and present the ruins to you as a holy destruction.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: Israel sent emissaries to Sihon, king of the Amorites, saying, “Let us cross your land. We won’t trespass into your fields or drink water in your vineyards. We’ll keep to the main road, the King’s Road, until we’re through your land.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-27
    - type: text
      text: But Sihon wouldn’t let Israel go through. Instead he got his army together and marched into the wilderness to fight Israel. At Jahaz he attacked Israel. But Israel fought hard, beat him soundly, and took possession of his land from the Arnon all the way to the Jabbok right up to the Ammonite border. They stopped there because the Ammonite border was fortified. Israel took and occupied all the Amorite cities, including Heshbon and all its surrounding villages. Heshbon was the capital city of Sihon king of the Amorites. He had attacked the former king of Moab and captured all his land as far north as the river Arnon. That is why the folk singers sing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come to Heshbon to rebuild the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: restore Sihon’s town.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: Fire once poured out of Heshbon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flames from the city of Sihon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Burning up Ar of Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the natives of Arnon’s heights.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom, Moab!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The people of Chemosh, done for!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sons turned out as fugitives, daughters abandoned as captives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the king of the Amorites, to Sihon.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' listened to Israel’s prayer and gave them the Canaanites. They destroyed both them and their towns, a holy destruction. They named the place Hormah (Holy Destruction).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Snake of Fiery Copper
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Oh, but we finished them off:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing left of Heshbon as far as Dibon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devastation as far off as Nophah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scorched earth all the way to Medeba.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: Israel moved in and lived in Amorite country. Moses sent men to scout out Jazer. They captured its villages and drove away the Amorites who lived there.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Then they turned north on the road to Bashan. Og king of Bashan marched out with his entire army to meet Moses in battle at Edrei.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Don’t be afraid of him. I’m making a present of him to you, him and all his people and his land. Treat him the same as Sihon king of the Amorites who ruled in Heshbon.”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: So they attacked him, his sons, and all the people—there was not a single survivor. Israel took the land.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'They set out from Mount Hor along the Red Sea Road, a detour around the land of Edom. The people became irritable and cross as they traveled. They spoke out against God and Moses: “Why did you drag us out of Egypt to die in this godforsaken country? No decent food; no water—we can’t stomach this stuff any longer.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent poisonous snakes among the people; they bit them and many in Israel died. The people came to Moses and said, “We sinned when we spoke out against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and you. Pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ; ask him to take these snakes from us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses prayed for the people.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Make a snake and put it on a flagpole: Whoever is bitten and looks at it will live.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So Moses made a snake of fiery copper and put it on top of a flagpole. Anyone bitten by a snake who then looked at the copper snake lived.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Camping on the Way to Moab
    marker-yv: yv-h
