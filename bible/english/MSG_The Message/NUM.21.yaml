document_id: NUM.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Hormah
  - type: text
    content: The Canaanite king of Arad, ruling in the Negev, heard that Israel was advancing up the road to Atharim. He attacked Israel and took prisoners of war.
  '10':
  - type: text
    content: 'The People of Israel set out and camped at Oboth. They left Oboth and camped at Iye Abarim in the wilderness that faces Moab on the east. They went from there and pitched camp in the Zered Valley. Their next camp was alongside the Arnon River, which marks the border between Amorite country and Moab. The Book of the Wars of '
  - type: text
    content: God
  - type: text
    content: ' refers to this place:'
  - type: text
    content: Waheb in Suphah,
  - type: text
    content: the canyons of Arnon;
  - type: text
    content: Along the canyon ravines
  - type: text
    content: that lead to the village Ar
  - type: text
    content: And lean hard against
  - type: text
    content: the border of Moab.
  '16':
  - type: text
    content: 'They went on to Beer (The Well), where '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Gather the people; I’ll give them water.” That’s where Israel sang this song:'
  - type: text
    content: Erupt, Well!
  - type: text
    content: Sing the Song of the Well,
  - type: text
    content: the well sunk by princes,
  - type: text
    content: Dug out by the peoples’ leaders
  - type: text
    content: digging with their scepters and staffs.
  '19':
  - type: text
    content: From the wilderness their route went from Mattanah to Nahaliel to Bamoth (The Heights) to the valley that opens into the fields of Moab from where Pisgah (The Summit) rises and overlooks Jeshimon (Wasteland).
  '2':
  - type: text
    content: 'Israel vowed a vow to '
  - type: text
    content: God
  - type: text
    content: ': “If you will give this people into our power, we’ll destroy their towns and present the ruins to you as a holy destruction.”'
  '21':
  - type: text
    content: Israel sent emissaries to Sihon, king of the Amorites, saying, “Let us cross your land. We won’t trespass into your fields or drink water in your vineyards. We’ll keep to the main road, the King’s Road, until we’re through your land.”
  '23':
  - type: text
    content: But Sihon wouldn’t let Israel go through. Instead he got his army together and marched into the wilderness to fight Israel. At Jahaz he attacked Israel. But Israel fought hard, beat him soundly, and took possession of his land from the Arnon all the way to the Jabbok right up to the Ammonite border. They stopped there because the Ammonite border was fortified. Israel took and occupied all the Amorite cities, including Heshbon and all its surrounding villages. Heshbon was the capital city of Sihon king of the Amorites. He had attacked the former king of Moab and captured all his land as far north as the river Arnon. That is why the folk singers sing,
  - type: text
    content: Come to Heshbon to rebuild the city,
  - type: text
    content: restore Sihon’s town.
  '28':
  - type: text
    content: Fire once poured out of Heshbon,
  - type: text
    content: flames from the city of Sihon;
  - type: text
    content: Burning up Ar of Moab,
  - type: text
    content: the natives of Arnon’s heights.
  - type: text
    content: Doom, Moab!
  - type: text
    content: The people of Chemosh, done for!
  - type: text
    content: Sons turned out as fugitives, daughters abandoned as captives
  - type: text
    content: to the king of the Amorites, to Sihon.
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' listened to Israel’s prayer and gave them the Canaanites. They destroyed both them and their towns, a holy destruction. They named the place Hormah (Holy Destruction).'
  - type: heading
    content: The Snake of Fiery Copper
  '30':
  - type: text
    content: 'Oh, but we finished them off:'
  - type: text
    content: Nothing left of Heshbon as far as Dibon;
  - type: text
    content: Devastation as far off as Nophah,
  - type: text
    content: scorched earth all the way to Medeba.
  '31':
  - type: text
    content: Israel moved in and lived in Amorite country. Moses sent men to scout out Jazer. They captured its villages and drove away the Amorites who lived there.
  '33':
  - type: text
    content: Then they turned north on the road to Bashan. Og king of Bashan marched out with his entire army to meet Moses in battle at Edrei.
  '34':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Don’t be afraid of him. I’m making a present of him to you, him and all his people and his land. Treat him the same as Sihon king of the Amorites who ruled in Heshbon.”'
  '35':
  - type: text
    content: So they attacked him, his sons, and all the people—there was not a single survivor. Israel took the land.
  '4':
  - type: text
    content: 'They set out from Mount Hor along the Red Sea Road, a detour around the land of Edom. The people became irritable and cross as they traveled. They spoke out against God and Moses: “Why did you drag us out of Egypt to die in this godforsaken country? No decent food; no water—we can’t stomach this stuff any longer.”'
  '6':
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ' sent poisonous snakes among the people; they bit them and many in Israel died. The people came to Moses and said, “We sinned when we spoke out against '
  - type: text
    content: God
  - type: text
    content: ' and you. Pray to '
  - type: text
    content: God
  - type: text
    content: ; ask him to take these snakes from us.”
  - type: text
    content: Moses prayed for the people.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Make a snake and put it on a flagpole: Whoever is bitten and looks at it will live.”'
  '9':
  - type: text
    content: So Moses made a snake of fiery copper and put it on top of a flagpole. Anyone bitten by a snake who then looked at the copper snake lived.
  - type: heading
    content: Camping on the Way to Moab
