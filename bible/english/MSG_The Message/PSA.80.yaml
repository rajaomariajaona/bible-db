document_id: PSA.80,97
type_code: eng
verses:
  '1':
  - type: text
    content: Listen, Shepherd, Israel’s Shepherd—
  - type: text
    content: get all your Joseph sheep together.
  - type: text
    content: Throw beams of light
  - type: text
    content: from your dazzling throne
  - type: text
    content: So Ephraim, Benjamin, and Manasseh
  - type: text
    content: can see where they’re going.
  - type: text
    content: Get out of bed—you’ve slept long enough!
  - type: text
    content: Come on the run before it’s too late.
  '19':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', God-of-the-Angel-Armies, come back!'
  - type: text
    content: 'Smile your blessing smile:'
  - type: text
    content: That
  - type: text
    content: ' will be our salvation.'
  '3':
  - type: text
    content: God, come back!
  - type: text
    content: 'Smile your blessing smile:'
  - type: text
    content: That
  - type: text
    content: ' will be our salvation.'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', God-of-the-Angel-Armies,'
  - type: text
    content: how long will you smolder like a sleeping volcano
  - type: text
    content: while your people call for fire and brimstone?
  - type: text
    content: You put us on a diet of tears,
  - type: text
    content: bucket after bucket of salty tears to drink.
  - type: text
    content: You make us look ridiculous to our friends;
  - type: text
    content: our enemies poke fun day after day.
  '7':
  - type: text
    content: God-of-the-Angel-Armies, come back!
  - type: text
    content: 'Smile your blessing smile:'
  - type: text
    content: That
  - type: text
    content: ' will be our salvation.'
  '8':
  - type: text
    content: Remember how you brought a young vine from Egypt,
  - type: text
    content: cleared out the brambles and briers
  - type: text
    content: and planted your very own vineyard?
  - type: text
    content: You prepared the good earth,
  - type: text
    content: you planted her roots deep;
  - type: text
    content: the vineyard filled the land.
  - type: text
    content: Your vine soared high and shaded the mountains,
  - type: text
    content: even dwarfing the giant cedars.
  - type: text
    content: Your vine ranged west to the Sea,
  - type: text
    content: east to the River.
  - type: text
    content: So why do you no longer protect your vine?
  - type: text
    content: Trespassers pick its grapes at will;
  - type: text
    content: Wild pigs crash through and crush it,
  - type: text
    content: and the mice nibble away at what’s left.
  - type: text
    content: God-of-the-Angel-Armies, turn our way!
  - type: text
    content: Take a good look at what’s happened
  - type: text
    content: and attend to this vine.
  - type: text
    content: Care for what you once tenderly planted—
  - type: text
    content: the vine you raised from a shoot.
  - type: text
    content: And those who dared to set it on fire—
  - type: text
    content: give them a look that will kill!
  - type: text
    content: Then take the hand of your once-favorite child,
  - type: text
    content: the child you raised to adulthood.
  - type: text
    content: We will never turn our back on you;
  - type: text
    content: breathe life into our lungs so we can shout your name!
