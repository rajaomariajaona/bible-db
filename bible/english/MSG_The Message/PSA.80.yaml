document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Listen, Shepherd, Israel’s Shepherd—
- type: usfm
  marker: q2
  children:
  - type: text
    text: get all your Joseph sheep together.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Throw beams of light
- type: usfm
  marker: q2
  children:
  - type: text
    text: from your dazzling throne
- type: usfm
  marker: q1
  children:
  - type: text
    text: So Ephraim, Benjamin, and Manasseh
- type: usfm
  marker: q2
  children:
  - type: text
    text: can see where they’re going.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get out of bed—you’ve slept long enough!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come on the run before it’s too late.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God, come back!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Smile your blessing smile:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' will be our salvation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God-of-the-Angel-Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long will you smolder like a sleeping volcano
- type: usfm
  marker: q2
  children:
  - type: text
    text: while your people call for fire and brimstone?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put us on a diet of tears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bucket after bucket of salty tears to drink.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You make us look ridiculous to our friends;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our enemies poke fun day after day.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God-of-the-Angel-Armies, come back!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Smile your blessing smile:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' will be our salvation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-18
  - type: text
    text: Remember how you brought a young vine from Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cleared out the brambles and briers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted your very own vineyard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You prepared the good earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you planted her roots deep;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the vineyard filled the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your vine soared high and shaded the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even dwarfing the giant cedars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your vine ranged west to the Sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: east to the River.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why do you no longer protect your vine?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Trespassers pick its grapes at will;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wild pigs crash through and crush it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mice nibble away at what’s left.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God-of-the-Angel-Armies, turn our way!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take a good look at what’s happened
- type: usfm
  marker: q2
  children:
  - type: text
    text: and attend to this vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Care for what you once tenderly planted—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the vine you raised from a shoot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who dared to set it on fire—
- type: usfm
  marker: q2
  children:
  - type: text
    text: give them a look that will kill!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then take the hand of your once-favorite child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the child you raised to adulthood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will never turn our back on you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: breathe life into our lungs so we can shout your name!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God-of-the-Angel-Armies, come back!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Smile your blessing smile:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' will be our salvation.'
