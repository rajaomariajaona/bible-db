document_id: PRO.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: If You Love Learning
  - type: text
    content: If you love learning, you love the discipline that goes with it—
  - type: text
    content: how shortsighted to refuse correction!
  '10':
  - type: text
    content: Good people are good to their animals;
  - type: text
    content: the “good-hearted” bad people kick and abuse them.
  '11':
  - type: text
    content: The one who stays on the job has food on the table;
  - type: text
    content: the witless chase whims and fancies.
  '12':
  - type: text
    content: What the wicked construct finally falls into ruin,
  - type: text
    content: while the roots of the righteous give life, and more life.
  - type: heading
    content: Wise People Take Advice
  '13':
  - type: text
    content: The gossip of bad people gets them in trouble;
  - type: text
    content: the conversation of good people keeps them out of it.
  '14':
  - type: text
    content: Well-spoken words bring satisfaction;
  - type: text
    content: well-done work has its own reward.
  '15':
  - type: text
    content: Fools are headstrong and do what they like;
  - type: text
    content: wise people take advice.
  '16':
  - type: text
    content: Fools have short fuses and explode all too quickly;
  - type: text
    content: the prudent quietly shrug off insults.
  '17':
  - type: text
    content: Truthful witness by a good person clears the air,
  - type: text
    content: but liars lay down a smoke screen of deceit.
  '18':
  - type: text
    content: Rash language cuts and maims,
  - type: text
    content: but there is healing in the words of the wise.
  '19':
  - type: text
    content: Truth lasts;
  - type: text
    content: lies are here today, gone tomorrow.
  '2':
  - type: text
    content: 'A good person basks in the delight of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: and he wants nothing to do with devious schemers.
  '20':
  - type: text
    content: Evil scheming distorts the schemer;
  - type: text
    content: peace-planning brings joy to the planner.
  '21':
  - type: text
    content: No evil can overwhelm a good person,
  - type: text
    content: but the wicked have their hands full of it.
  '22':
  - type: text
    content: God can’t stomach liars;
  - type: text
    content: he loves the company of those who keep their word.
  '23':
  - type: text
    content: Prudent people don’t flaunt their knowledge;
  - type: text
    content: talkative fools broadcast their silliness.
  '24':
  - type: text
    content: The diligent find freedom in their work;
  - type: text
    content: the lazy are oppressed by work.
  '25':
  - type: text
    content: Worry weighs us down;
  - type: text
    content: a cheerful word picks us up.
  '26':
  - type: text
    content: A good person survives misfortune,
  - type: text
    content: but a wicked life invites disaster.
  '27':
  - type: text
    content: A lazy life is an empty life,
  - type: text
    content: but “early to rise” gets the job done.
  '28':
  - type: text
    content: Good men and women travel right into life;
  - type: text
    content: sin’s detours take you straight to hell.
  '3':
  - type: text
    content: You can’t find firm footing in a swamp,
  - type: text
    content: but life rooted in God stands firm.
  '4':
  - type: text
    content: A hearty wife invigorates her husband,
  - type: text
    content: but a frigid woman is cancer in the bones.
  '5':
  - type: text
    content: The thinking of principled people makes for justice;
  - type: text
    content: the plots of degenerates corrupt.
  '6':
  - type: text
    content: The words of the wicked kill;
  - type: text
    content: the speech of the upright saves.
  '7':
  - type: text
    content: Wicked people fall to pieces—there’s nothing to them;
  - type: text
    content: the homes of good people hold together.
  '8':
  - type: text
    content: A person who talks sense is honored;
  - type: text
    content: airheads are held in contempt.
  '9':
  - type: text
    content: Better to be ordinary and work for a living
  - type: text
    content: than act important and starve in the process.
