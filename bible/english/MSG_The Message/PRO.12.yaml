document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: If You Love Learning
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: If you love learning, you love the discipline that goes with it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how shortsighted to refuse correction!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A good person basks in the delight of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he wants nothing to do with devious schemers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You can’t find firm footing in a swamp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but life rooted in God stands firm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A hearty wife invigorates her husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a frigid woman is cancer in the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The thinking of principled people makes for justice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the plots of degenerates corrupt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The words of the wicked kill;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the speech of the upright saves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Wicked people fall to pieces—there’s nothing to them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the homes of good people hold together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A person who talks sense is honored;
- type: usfm
  marker: q2
  children:
  - type: text
    text: airheads are held in contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Better to be ordinary and work for a living
- type: usfm
  marker: q2
  children:
  - type: text
    text: than act important and starve in the process.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Good people are good to their animals;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the “good-hearted” bad people kick and abuse them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The one who stays on the job has food on the table;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the witless chase whims and fancies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: What the wicked construct finally falls into ruin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the roots of the righteous give life, and more life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wise People Take Advice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The gossip of bad people gets them in trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the conversation of good people keeps them out of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Well-spoken words bring satisfaction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: well-done work has its own reward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fools are headstrong and do what they like;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wise people take advice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fools have short fuses and explode all too quickly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prudent quietly shrug off insults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Truthful witness by a good person clears the air,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but liars lay down a smoke screen of deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rash language cuts and maims,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is healing in the words of the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Truth lasts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: lies are here today, gone tomorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Evil scheming distorts the schemer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: peace-planning brings joy to the planner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: No evil can overwhelm a good person,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked have their hands full of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: God can’t stomach liars;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he loves the company of those who keep their word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Prudent people don’t flaunt their knowledge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: talkative fools broadcast their silliness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The diligent find freedom in their work;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lazy are oppressed by work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Worry weighs us down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cheerful word picks us up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A good person survives misfortune,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a wicked life invites disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A lazy life is an empty life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but “early to rise” gets the job done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Good men and women travel right into life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sin’s detours take you straight to hell.
