  marker: q2
  children:
  - type: text
    text: 'Where have you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: not
  - type: text
    text: ' had sex?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve camped out like hunters stalking deer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ve solicited many lover-gods,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a streetwalking whore
- type: usfm
  marker: q2
  children:
  - type: text
    text: chasing after other gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so the rain has stopped.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No more rain from the skies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it doesn’t even faze you. Brazen as whores,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you carry on as if you’ve done nothing wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you have the nerve to call out, ‘My father!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You took care of me when I was a child. Why not now?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are you going to keep up your anger nonstop?’
- type: usfm
  marker: q2
  children:
  - type: text
    text: That’s your line. Meanwhile you keep sinning nonstop.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Admit Your God-Defiance
  marker-yv: yv-h
- type: usfm
