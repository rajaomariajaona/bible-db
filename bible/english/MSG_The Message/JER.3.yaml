    - type: text
      text: God
  - type: text
    text: ’s Decree!—“when no one will say any longer, ‘Oh, for the good old days! Remember the Ark of the Covenant?’ It won’t even occur to anyone to say it—‘the good old days.’ The so-called good old days of the Ark are gone for good.
- type: usfm
