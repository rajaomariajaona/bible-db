- type: usfm
  marker: q1
  children:
  - type: text
    text: Wouldn’t that raise a huge stink
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the land?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And isn’t that what you’ve done—
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘whored’ your way with god after god?
- type: usfm
  marker: q1
  children:
