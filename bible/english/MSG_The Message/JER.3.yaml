  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to me during the reign of King Josiah: “You have noticed, haven’t you, how fickle Israel has visited every hill and grove of trees as a whore at large? I assumed that after she had gotten it out of her system, she’d come back, but she didn’t. Her flighty sister, Judah, saw what she did. She also saw that because of fickle Israel’s loose morals I threw her out, gave her her walking papers. But that didn’t faze flighty sister Judah. She went out, big as you please, and took up a whore’s life also. She took up cheap sex-and-religion as a sideline diversion, an indulgent recreation, and used anything and anyone, flouting sanity and sanctity alike, stinking up the country. And not once in all this did flighty sister Judah even give me a nod, although she made a show of it from time to time.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
