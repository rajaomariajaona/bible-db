    children:
    - type: text
      text: 19-20
  - type: text
    text: '“I planned what I’d say if you returned to me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Good! I’ll bring you back into the family.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll give you choice land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: land that the godless nations would die for.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I imagined that you would say, ‘Dear father!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and would never again go off and leave me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But no luck. Like a false-hearted woman walking out on her husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, the whole family of Israel, have proven false to me.”
- type: usfm
  marker: q3
