    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come back, wandering children!”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I, yes I, am your true husband.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll pick you out one by one—
- type: usfm
  marker: q1
  children:
  - type: text
    text: This one from the city, these two from the country—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring you to Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll give you good shepherd-rulers who rule my way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who rule you with intelligence and wisdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“And this is what will happen: You will increase and prosper in the land. The time will come”—'
  - type: usfm
    marker: nd
