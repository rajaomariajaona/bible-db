    - type: text
      text: 11-12a
  - type: text
    text: ' Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me, “Fickle Israel was a good sight better than flighty Judah. Go and preach this message. Face north toward Israel and say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12b-15
  - type: text
    text: ' “‘Turn back, fickle Israel.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m not just hanging back to punish you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m committed in love to you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My anger doesn’t seethe nonstop.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just admit your guilt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Admit your God-defiance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Admit to your promiscuous life with casual partners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pulling strangers into the sex-and-religion groves
- type: usfm
  marker: q1
  children:
  - type: text
    text: While turning a deaf ear to me.’”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
