  - type: text
    text: “Jerusalem will be the new Ark—‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Throne.’ All the godless nations, no longer stuck in the ruts of their evil ways, will gather there to honor '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “At that time, the House of Judah will join up with the House of Israel. Holding hands, they’ll leave the north country and come to the land I willed to your ancestors.
