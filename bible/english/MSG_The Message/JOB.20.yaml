document_id: JOB.20
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Zophar Attacks Job—The Second Round
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Savoring Evil as a Delicacy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Zophar from Naamath again took his turn:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I can’t believe what I’m hearing!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ve put my teeth on edge, my stomach in a knot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How dare you insult my intelligence like this!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Well, here’s a piece of my mind!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-11
  - type: text
    text: “Don’t you even know the basics,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how things have been since the earliest days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Adam and Eve were first placed on earth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The good times of the wicked are short-lived;
- type: usfm
  marker: q2
  children:
  - type: text
    text: godless joy is only momentary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The evil might become world famous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strutting at the head of the celebrity parade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still end up in a pile of dung.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Acquaintances look at them with disgust and say, ‘What’s that?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: They fly off like a dream that can’t be remembered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a shadowy illusion that vanishes in the light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though once notorious public figures, now they’re nobodies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: unnoticed, whether they come or go.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their children will go begging on skid row,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they’ll have to give back their ill-gotten gain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Right in the prime of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and youthful and vigorous, they’ll die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-19
  - type: text
    text: “They savor evil as a delicacy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: roll it around on their tongues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prolong the flavor, a dalliance in decadence—
- type: usfm
  marker: q2
  children:
  - type: text
    text: real gourmets of evil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But then they get stomach cramps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bad case of food poisoning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They gag on all that rich food;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God makes them vomit it up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They gorge on evil, make a diet of that poison—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a deadly diet—and it kills them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No quiet picnics for them beside gentle streams
- type: usfm
  marker: q2
  children:
  - type: text
    text: with fresh-baked bread and cheese, and tall, cool drinks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They spit out their food half-chewed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: unable to relax and enjoy anything they’ve worked for.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why? Because they exploited the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: took what never belonged to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-29
  - type: text
    text: “Such God-denying people are never content with what they have or who they are;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their greed drives them relentlessly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They plunder everything
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they can’t hold on to any of it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just when they think they have it all, disaster strikes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re served up a plate full of misery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they’ve filled their bellies with that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God gives them a taste of his anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they get to chew on that for a while.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As they run for their lives from one disaster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they run smack into another.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re knocked around from pillar to post,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beaten to within an inch of their lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re trapped in a house of horrors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see their loot disappear down a black hole.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their lives are a total loss—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a penny to their name, not so much as a bean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will strip them of their sin-soaked clothes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hang their dirty laundry out for all to see.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Life is a complete wipeout for them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing surviving God’s wrath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There! That’s God’s blueprint for the wicked—
- type: usfm
  marker: q2
  children:
  - type: text
    text: what they have to look forward to.”
