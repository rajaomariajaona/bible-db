document_id: JOB.20,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar Attacks Job—The Second Round
  - type: heading
    content: Savoring Evil as a Delicacy
  - type: text
    content: 'Zophar from Naamath again took his turn:'
  - type: text
    content: “I can’t believe what I’m hearing!
  - type: text
    content: You’ve put my teeth on edge, my stomach in a knot.
  - type: text
    content: How dare you insult my intelligence like this!
  - type: text
    content: Well, here’s a piece of my mind!
  '12':
  - type: text
    content: “They savor evil as a delicacy,
  - type: text
    content: roll it around on their tongues,
  - type: text
    content: Prolong the flavor, a dalliance in decadence—
  - type: text
    content: real gourmets of evil!
  - type: text
    content: But then they get stomach cramps,
  - type: text
    content: a bad case of food poisoning.
  - type: text
    content: They gag on all that rich food;
  - type: text
    content: God makes them vomit it up.
  - type: text
    content: They gorge on evil, make a diet of that poison—
  - type: text
    content: a deadly diet—and it kills them.
  - type: text
    content: No quiet picnics for them beside gentle streams
  - type: text
    content: with fresh-baked bread and cheese, and tall, cool drinks.
  - type: text
    content: They spit out their food half-chewed,
  - type: text
    content: unable to relax and enjoy anything they’ve worked for.
  - type: text
    content: And why? Because they exploited the poor,
  - type: text
    content: took what never belonged to them.
  '20':
  - type: text
    content: “Such God-denying people are never content with what they have or who they are;
  - type: text
    content: their greed drives them relentlessly.
  - type: text
    content: They plunder everything
  - type: text
    content: but they can’t hold on to any of it.
  - type: text
    content: Just when they think they have it all, disaster strikes;
  - type: text
    content: they’re served up a plate full of misery.
  - type: text
    content: When they’ve filled their bellies with that,
  - type: text
    content: God gives them a taste of his anger,
  - type: text
    content: and they get to chew on that for a while.
  - type: text
    content: As they run for their lives from one disaster,
  - type: text
    content: they run smack into another.
  - type: text
    content: They’re knocked around from pillar to post,
  - type: text
    content: beaten to within an inch of their lives.
  - type: text
    content: They’re trapped in a house of horrors,
  - type: text
    content: and see their loot disappear down a black hole.
  - type: text
    content: Their lives are a total loss—
  - type: text
    content: not a penny to their name, not so much as a bean.
  - type: text
    content: God will strip them of their sin-soaked clothes
  - type: text
    content: and hang their dirty laundry out for all to see.
  - type: text
    content: Life is a complete wipeout for them,
  - type: text
    content: nothing surviving God’s wrath.
  - type: text
    content: There! That’s God’s blueprint for the wicked—
  - type: text
    content: what they have to look forward to.”
  '4':
  - type: text
    content: “Don’t you even know the basics,
  - type: text
    content: how things have been since the earliest days,
  - type: text
    content: when Adam and Eve were first placed on earth?
  - type: text
    content: The good times of the wicked are short-lived;
  - type: text
    content: godless joy is only momentary.
  - type: text
    content: The evil might become world famous,
  - type: text
    content: strutting at the head of the celebrity parade,
  - type: text
    content: But still end up in a pile of dung.
  - type: text
    content: Acquaintances look at them with disgust and say, ‘What’s that?’
  - type: text
    content: They fly off like a dream that can’t be remembered,
  - type: text
    content: like a shadowy illusion that vanishes in the light.
  - type: text
    content: Though once notorious public figures, now they’re nobodies,
  - type: text
    content: unnoticed, whether they come or go.
  - type: text
    content: Their children will go begging on skid row,
  - type: text
    content: and they’ll have to give back their ill-gotten gain.
  - type: text
    content: Right in the prime of life,
  - type: text
    content: and youthful and vigorous, they’ll die.
