document_id: 1CH.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Appendix to the Family of Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Sons of Judah: Perez, Hezron, Carmi, Hur, and Shobal. Reaiah, Shobal’s son, had Jahath; and Jahath had Ahumai and Lahad. These made up the families of the Zorathites.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: Kelub, Shuhah’s brother, had Mehir; Mehir had Eshton; Eshton had Beth Rapha, Paseah, and Tehinnah, who founded Ir Nahash (City of Smiths). These were known as the men of Recah.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The sons of Kenaz: Othniel and Seraiah.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Othniel: Hathath and Meonothai.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Meonothai had Ophrah; Seraiah had Joab, the founder of Ge Harashim (Colony of Artisans).
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The sons of Caleb son of Jephunneh: Iru, Elah, and Naam.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Elah: Kenaz.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'The sons of Ezrah: Jether, Mered, Epher, and Jalon. One of Mered’s wives, Pharaoh’s daughter Bithiah, gave birth to Miriam, Shammai, and Ishbah the father of Eshtemoa. His Judean wife gave birth to Jered father of Gedor, Heber father of Soco, and Jekuthiel father of Zanoah.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The sons of Hodiah’s wife, Naham’s sister: the father of Keilah the Garmite, and Eshtemoa the Maacathite.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The sons of Shimon: Amnon, Rinnah, Ben-Hanan, and Tilon.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Ishi: Zoheth and Ben-Zoheth.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: 'The sons of Shelah son of Judah: Er the father of Lecah, Laadah the father of Mareshah and the family of linen workers at Beth Ashbea, Jokim, the men of Cozeba, and Joash and Saraph, who ruled in Moab and Jashubi Lehem. (These records are from very old traditions.) They were the potters who lived at Netaim and Gederah, resident potters who worked for the king.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Simeon
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: 'The Simeon family tree: Nemuel, Jamin, Jarib, Zerah, and Shaul; Shaul had Shallum, Shallum had Mibsam, and Mibsam had Mishma.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The sons of Mishma: Hammuel had Zaccur and Zaccur had Shimei.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-33
    - type: text
      text: Shimei had sixteen sons and six daughters, but his brothers were not nearly as prolific and never became a large family like Judah. They lived in Beersheba, Moladah, Hazar Shual, Bilhah, Ezem, Tolad, Bethuel, Hormah, Ziklag, Beth Marcaboth, Hazar Susim, Beth Biri, and Shaaraim. They lived in these towns until David became king. Other settlements in the vicinity were the five towns of Etam, Ain, Rimmon, Token, and Ashan, and all the villages around these towns as far as Baalath. These were their settlements. And they kept good family records.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Sons of Etam: Jezreel, Ishma, and Idbash. Their sister was named Hazzelelponi. Penuel had Gedor and Ezer had Hushah. These were the sons of Hur, firstborn son of Ephrathah, who was the father of Bethlehem.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-40a
    - type: text
      text: ' Meshobab; Jamlech; Joshah the son of Amaziah; Joel; Jehu the son of Joshibiah, the son of Seraiah, the son of Asiel; Elioenai; Jaakobah; Jeshohaiah; Asaiah; Adiel; Jesimiel; Benaiah; and Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah—all these were the leaders in their families. They prospered and increased in numbers so that they had to go as far as Gedor (Gerar) to the east of the valley looking for pasture for their flocks. And they found it—lush pasture, lots of elbow room, peaceful and quiet.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40b-43
    - type: text
      text: ' Some Hamites had lived there in former times. But the men in these family trees came when Hezekiah was king of Judah and attacked the Hamites, tearing down their tents and houses. There was nothing left of them, as you can see today. Then they moved in and took over because of the great pastureland. Five hundred of these Simeonites went on and invaded the hill country of Seir, led by Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi. They killed all the escaped Amalekites who were still around. And they still live there.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-8
    - type: text
      text: Ashhur the father of Tekoa had two wives, Helah and Naarah. Naarah gave birth to Ahuzzam, Hepher, Temeni, and Haahashtari—Naarah’s children. Helah’s sons were Zereth, Zohar, Ethnan, and Koz, who had Anub, Hazzobebah, and the families of Aharhel son of Harum.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Jabez was a better man than his brothers, a man of honor. His mother had named him Jabez (Oh, the pain!), saying, “A painful birth! I bore him in great pain!” Jabez prayed to the God of Israel: “Bless me, O bless me! Give me land, large tracts of land. And provide your personal protection—don’t let evil hurt me.” God gave him what he asked.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
