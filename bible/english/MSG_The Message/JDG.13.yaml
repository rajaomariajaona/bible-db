document_id: JDG.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson
  - type: text
    content: 'And then the People of Israel were back at it again, doing what was evil in '
  - type: text
    content: God
  - type: text
    content: '’s sight. '
  - type: text
    content: God
  - type: text
    content: ' put them under the domination of the Philistines for forty years.'
  '11':
  - type: text
    content: Manoah got up and, following his wife, came to the man. He said to him, “Are you the man who spoke to my wife?”
  - type: text
    content: He said, “I am.”
  '12':
  - type: text
    content: Manoah said, “So. When what you say comes true, what do you have to tell us about this boy and his work?”
  '13':
  - type: text
    content: 'The angel of God said to Manoah, “Keep in mind everything I told the woman. Eat nothing that comes from the vine: Drink no wine or beer; eat no ritually unclean foods. She’s to observe everything I commanded her.”'
  '15':
  - type: text
    content: Manoah said to the angel of God, “Please, stay with us a little longer; we’ll prepare a meal for you—a young goat.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s angel said to Manoah, “Even if I stay, I won’t eat your food. But if you want to prepare a Whole-Burnt-Offering for '
  - type: text
    content: God
  - type: text
    content: ', go ahead—offer it!” Manoah had no idea that he was talking to the angel of God.'
  '17':
  - type: text
    content: Then Manoah asked the angel of God, “What’s your name? When your words come true, we’d like to honor you.”
  '18':
  - type: text
    content: 'The angel of '
  - type: text
    content: God
  - type: text
    content: ' said, “What’s this? You ask for my name? You wouldn’t understand—it’s sheer wonder.”'
  '19':
  - type: text
    content: ' So Manoah took the kid and the Grain-Offering and sacrificed them on a rock altar to '
  - type: text
    content: God
  - type: text
    content: ' who works wonders. As the flames leapt up from the altar to heaven, '
  - type: text
    content: God
  - type: text
    content: '’s angel also ascended in the altar flames. When Manoah and his wife saw this, they fell facedown to the ground. Manoah and his wife never saw the angel of '
  - type: text
    content: God
  - type: text
    content: ' again.'
  '2':
  - type: text
    content: 'At that time there was a man named Manoah from Zorah from the tribe of Dan. His wife was barren and childless. The angel of God appeared to her and told her, “I know that you are barren and childless, but you’re going to become pregnant and bear a son. But take much care: Drink no wine or beer; eat nothing ritually unclean. You are, in fact, pregnant right now, carrying a son. No razor will touch his head—the boy will be God’s Nazirite from the moment of his birth. He will launch the deliverance from Philistine oppression.”'
  '21':
  - type: text
    content: ' Only then did Manoah realize that this was '
  - type: text
    content: God
  - type: text
    content: ’s angel. He said to his wife, “We’re as good as dead! We’ve looked on God!”
  '23':
  - type: text
    content: 'But his wife said, “If '
  - type: text
    content: God
  - type: text
    content: ' were planning to kill us, he wouldn’t have accepted our Whole-Burnt-Offering and Grain-Offering, or revealed all these things to us—given us this birth announcement.”'
  '24':
  - type: text
    content: 'The woman gave birth to a son. They named him Samson. The boy grew and '
  - type: text
    content: God
  - type: text
    content: ' blessed him. The Spirit of '
  - type: text
    content: God
  - type: text
    content: ' began working in him while he was staying at a Danite camp between Zorah and Eshtaol.'
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: The woman went to her husband and said, “A man of God came to me. He looked like the angel of God—terror laced with glory! I didn’t ask him where he was from and he didn’t tell me his name, but he told me, ‘You’re pregnant. You’re going to give birth to a son. Don’t drink any wine or beer and eat nothing ritually unclean. The boy will be God’s Nazirite from the moment of birth to the day of his death.’”
  '8':
  - type: text
    content: 'Manoah prayed to '
  - type: text
    content: God
  - type: text
    content: ': “Master, let the man of God you sent come to us again and teach us how to raise this boy who is to be born.”'
  '9':
  - type: text
    content: 'God listened to Manoah. God’s angel came again to the woman. She was sitting in the field; her husband Manoah wasn’t there with her. She jumped to her feet and ran and told her husband: “He’s back! The man who came to me that day!”'
