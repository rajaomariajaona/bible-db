document_id: JDG.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And then the People of Israel were back at it again, doing what was evil in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s sight. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' put them under the domination of the Philistines for forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-5
  - type: text
    text: 'At that time there was a man named Manoah from Zorah from the tribe of Dan. His wife was barren and childless. The angel of God appeared to her and told her, “I know that you are barren and childless, but you’re going to become pregnant and bear a son. But take much care: Drink no wine or beer; eat nothing ritually unclean. You are, in fact, pregnant right now, carrying a son. No razor will touch his head—the boy will be God’s Nazirite from the moment of his birth. He will launch the deliverance from Philistine oppression.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: The woman went to her husband and said, “A man of God came to me. He looked like the angel of God—terror laced with glory! I didn’t ask him where he was from and he didn’t tell me his name, but he told me, ‘You’re pregnant. You’re going to give birth to a son. Don’t drink any wine or beer and eat nothing ritually unclean. The boy will be God’s Nazirite from the moment of birth to the day of his death.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manoah prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “Master, let the man of God you sent come to us again and teach us how to raise this boy who is to be born.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'God listened to Manoah. God’s angel came again to the woman. She was sitting in the field; her husband Manoah wasn’t there with her. She jumped to her feet and ran and told her husband: “He’s back! The man who came to me that day!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manoah got up and, following his wife, came to the man. He said to him, “Are you the man who spoke to my wife?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “I am.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manoah said, “So. When what you say comes true, what do you have to tell us about this boy and his work?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'The angel of God said to Manoah, “Keep in mind everything I told the woman. Eat nothing that comes from the vine: Drink no wine or beer; eat no ritually unclean foods. She’s to observe everything I commanded her.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manoah said to the angel of God, “Please, stay with us a little longer; we’ll prepare a meal for you—a young goat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s angel said to Manoah, “Even if I stay, I won’t eat your food. But if you want to prepare a Whole-Burnt-Offering for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', go ahead—offer it!” Manoah had no idea that he was talking to the angel of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Manoah asked the angel of God, “What’s your name? When your words come true, we’d like to honor you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “What’s this? You ask for my name? You wouldn’t understand—it’s sheer wonder.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21a
  - type: text
    text: ' So Manoah took the kid and the Grain-Offering and sacrificed them on a rock altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who works wonders. As the flames leapt up from the altar to heaven, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s angel also ascended in the altar flames. When Manoah and his wife saw this, they fell facedown to the ground. Manoah and his wife never saw the angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21b-22
  - type: text
    text: ' Only then did Manoah realize that this was '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel. He said to his wife, “We’re as good as dead! We’ve looked on God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But his wife said, “If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' were planning to kill us, he wouldn’t have accepted our Whole-Burnt-Offering and Grain-Offering, or revealed all these things to us—given us this birth announcement.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'The woman gave birth to a son. They named him Samson. The boy grew and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' blessed him. The Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' began working in him while he was staying at a Danite camp between Zorah and Eshtaol.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
