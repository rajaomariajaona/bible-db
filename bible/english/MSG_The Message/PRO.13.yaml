document_id: PRO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Walk with the Wise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Intelligent children listen to their parents;
- type: usfm
  marker: q2
  children:
  - type: text
    text: foolish children do their own thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The good acquire a taste for helpful conversation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: bullies push and shove their way through life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Careful words make for a careful life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: careless talk may ruin everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indolence wants it all and gets nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the energetic have something to show for their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A good person hates false talk;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bad person wallows in gibberish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A God-loyal life keeps you on track;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sin dumps the wicked in the ditch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A pretentious, showy life is an empty life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a plain and simple life is a full life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The rich can be sued for everything they have,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the poor are free of such threats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The lives of good people are brightly lit streets;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lives of the wicked are dark alleys.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Arrogant know-it-alls stir up discord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wise men and women listen to each other’s counsel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Easy come, easy go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but steady diligence pays off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Unrelenting disappointment leaves you heartsick,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a sudden good break can turn life around.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ignore the Word and suffer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: honor God’s commands and grow rich.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The teaching of the wise is a fountain of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so, no more drinking from death-tainted wells!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sound thinking makes for gracious living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but liars walk a rough road.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A commonsense person '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lives
  - type: text
    text: ' good sense;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools litter the country with silliness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Irresponsible talk makes a real mess of things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a reliable reporter is a healing presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Refuse discipline and end up homeless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: embrace correction and live an honored life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Souls who follow their hearts thrive;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools bent on evil despise matters of soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Become wise by walking with the wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hang out with fools and watch your life fall to pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Disaster entraps sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God-loyal people get a good life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A good life gets passed on to the grandchildren;
- type: usfm
  marker: q2
  children:
  - type: text
    text: ill-gotten wealth ends up with good people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Banks foreclose on the farms of the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or else the poor lose their shirts to crooked lawyers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A refusal to correct is a refusal to love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: love your children by disciplining them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: An appetite for good brings much satisfaction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the belly of the wicked always wants more.
