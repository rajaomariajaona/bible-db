document_id: PRO.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Walk with the Wise
  - type: text
    content: Intelligent children listen to their parents;
  - type: text
    content: foolish children do their own thing.
  '10':
  - type: text
    content: Arrogant know-it-alls stir up discord,
  - type: text
    content: but wise men and women listen to each other’s counsel.
  '11':
  - type: text
    content: Easy come, easy go,
  - type: text
    content: but steady diligence pays off.
  '12':
  - type: text
    content: Unrelenting disappointment leaves you heartsick,
  - type: text
    content: but a sudden good break can turn life around.
  '13':
  - type: text
    content: Ignore the Word and suffer;
  - type: text
    content: honor God’s commands and grow rich.
  '14':
  - type: text
    content: The teaching of the wise is a fountain of life,
  - type: text
    content: so, no more drinking from death-tainted wells!
  '15':
  - type: text
    content: Sound thinking makes for gracious living,
  - type: text
    content: but liars walk a rough road.
  '16':
  - type: text
    content: 'A commonsense person '
  - type: text
    content: lives
  - type: text
    content: ' good sense;'
  - type: text
    content: fools litter the country with silliness.
  '17':
  - type: text
    content: Irresponsible talk makes a real mess of things,
  - type: text
    content: but a reliable reporter is a healing presence.
  '18':
  - type: text
    content: Refuse discipline and end up homeless;
  - type: text
    content: embrace correction and live an honored life.
  '19':
  - type: text
    content: Souls who follow their hearts thrive;
  - type: text
    content: fools bent on evil despise matters of soul.
  '2':
  - type: text
    content: The good acquire a taste for helpful conversation;
  - type: text
    content: bullies push and shove their way through life.
  '20':
  - type: text
    content: Become wise by walking with the wise;
  - type: text
    content: hang out with fools and watch your life fall to pieces.
  '21':
  - type: text
    content: Disaster entraps sinners,
  - type: text
    content: but God-loyal people get a good life.
  '22':
  - type: text
    content: A good life gets passed on to the grandchildren;
  - type: text
    content: ill-gotten wealth ends up with good people.
  '23':
  - type: text
    content: Banks foreclose on the farms of the poor,
  - type: text
    content: or else the poor lose their shirts to crooked lawyers.
  '24':
  - type: text
    content: A refusal to correct is a refusal to love;
  - type: text
    content: love your children by disciplining them.
  '25':
  - type: text
    content: An appetite for good brings much satisfaction,
  - type: text
    content: but the belly of the wicked always wants more.
  '3':
  - type: text
    content: Careful words make for a careful life;
  - type: text
    content: careless talk may ruin everything.
  '4':
  - type: text
    content: Indolence wants it all and gets nothing;
  - type: text
    content: the energetic have something to show for their lives.
  '5':
  - type: text
    content: A good person hates false talk;
  - type: text
    content: a bad person wallows in gibberish.
  '6':
  - type: text
    content: A God-loyal life keeps you on track;
  - type: text
    content: sin dumps the wicked in the ditch.
  '7':
  - type: text
    content: A pretentious, showy life is an empty life;
  - type: text
    content: a plain and simple life is a full life.
  '8':
  - type: text
    content: The rich can be sued for everything they have,
  - type: text
    content: but the poor are free of such threats.
  '9':
  - type: text
    content: The lives of good people are brightly lit streets;
  - type: text
    content: the lives of the wicked are dark alleys.
