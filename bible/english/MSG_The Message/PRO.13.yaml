document_id: PRO.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Walk with the Wise
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Intelligent children listen to their parents;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foolish children do their own thing.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrogant know-it-alls stir up discord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but wise men and women listen to each other’s counsel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Easy come, easy go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but steady diligence pays off.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unrelenting disappointment leaves you heartsick,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a sudden good break can turn life around.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ignore the Word and suffer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honor God’s commands and grow rich.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The teaching of the wise is a fountain of life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so, no more drinking from death-tainted wells!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sound thinking makes for gracious living,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but liars walk a rough road.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A commonsense person '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lives
    - type: text
      text: ' good sense;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools litter the country with silliness.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Irresponsible talk makes a real mess of things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a reliable reporter is a healing presence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refuse discipline and end up homeless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: embrace correction and live an honored life.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souls who follow their hearts thrive;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools bent on evil despise matters of soul.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The good acquire a taste for helpful conversation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bullies push and shove their way through life.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Become wise by walking with the wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hang out with fools and watch your life fall to pieces.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster entraps sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but God-loyal people get a good life.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good life gets passed on to the grandchildren;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ill-gotten wealth ends up with good people.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Banks foreclose on the farms of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or else the poor lose their shirts to crooked lawyers.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A refusal to correct is a refusal to love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: love your children by disciplining them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An appetite for good brings much satisfaction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the belly of the wicked always wants more.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Careful words make for a careful life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: careless talk may ruin everything.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indolence wants it all and gets nothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the energetic have something to show for their lives.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good person hates false talk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bad person wallows in gibberish.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A God-loyal life keeps you on track;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sin dumps the wicked in the ditch.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A pretentious, showy life is an empty life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a plain and simple life is a full life.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rich can be sued for everything they have,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the poor are free of such threats.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lives of good people are brightly lit streets;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lives of the wicked are dark alleys.
