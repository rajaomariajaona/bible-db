document_id: MRK.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anointing His Head
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: In only two days the eight-day Festival of Passover and the Feast of Unleavened Bread would begin. The high priests and religion scholars were looking for a way they could seize Jesus by stealth and kill him. They agreed that it should not be done during Passover Week. “We don’t want the crowds up in arms,” they said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: Jesus was at Bethany, a guest of Simon the Leper. While he was eating dinner, a woman came up carrying a bottle of very expensive perfume. Opening the bottle, she poured it on his head. Some of the guests became furious among themselves. “That’s criminal! A sheer waste! This perfume could have been sold for well over a year’s wages and handed out to the poor.” They swelled up in anger, nearly bursting with indignation over her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: But Jesus said, “Let her alone. Why are you giving her a hard time? She has just done something wonderfully significant for me. You will have the poor with you every day for the rest of your lives. Whenever you feel like it, you can do something for them. Not so with me. She did what she could when she could—she pre-anointed my body for burial. And you can be sure that wherever in the whole world the Message is preached, what she just did is going to be talked about admiringly.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Judas Iscariot, one of the Twelve, went to the cabal of high priests, determined to betray him. They couldn’t believe their ears, and promised to pay him well. He started looking for just the right moment to hand him over.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Traitor to the Son of Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On the first of the Days of Unleavened Bread, the day they prepare the Passover sacrifice, his disciples asked him, “Where do you want us to go and make preparations so you can eat the Passover meal?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: He directed two of his disciples, “Go into the city. A man carrying a water jug will meet you. Follow him. Ask the owner of whichever house he enters, ‘The Teacher wants to know, Where is my guest room where I can eat the Passover meal with my disciples?’ He will show you a spacious second-story room, swept and ready. Prepare for us there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The disciples left, came to the city, found everything just as he had told them, and prepared the Passover meal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'After sunset he came with the Twelve. As they were at the supper table eating, Jesus said, “I have something hard but important to say to you: One of you is going to hand me over to the conspirators, one who at this moment is eating with me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Stunned, they started asking, one after another, “It isn’t me, is it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: He said, “It’s one of the Twelve, one who eats with me out of the same bowl. In one sense, it turns out that the Son of Man is entering into a way of treachery well-marked by the Scriptures—no surprises here. In another sense, the man who turns him in, turns traitor to the Son of Man—better never to have been born than do this!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: “This Is My Body”
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: In the course of their meal, having taken and blessed the bread, he broke it and gave it to them. Then he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take, this is my body.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: Taking the chalice, he gave it to them, thanking God, and they all drank from it. He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is my blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s new covenant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poured out for many people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “I’ll not be drinking wine again until the new day when I drink it in the kingdom of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They sang a hymn and then went directly to Mount Olives.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: Jesus told them, “You’re all going to feel that your world is falling apart and that it’s my fault. There’s a Scripture that says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will strike the shepherd;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sheep will scatter.
- type: usfm
  marker: m
  children:
  - type: text
    text: “But after I am raised up, I will go ahead of you, leading the way to Galilee.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Peter blurted out, “Even if everyone else is ashamed of you when things fall to pieces, I won’t be.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Jesus said, “Don’t be so sure. Today, this very night in fact, before the rooster crows twice, you will deny me three times.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He blustered in protest, “Even if I have to die with you, I will never deny you.” All the others said the same thing.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-34
  - type: text
    text: They came to an area called Gethsemane. Jesus told his disciples, “Sit here while I pray.” He took Peter, James, and John with him. He sank into a pit of suffocating darkness. He told them, “I feel bad enough right now to die. Stay here and keep vigil with me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: 'Going a little ahead, he fell to the ground and prayed for a way out: “Papa, Father, you can—can’t you?—get me out of this. Take this cup away from me. But please, not what I want—what do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' want?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-38
  - type: text
    text: He came back and found them sound asleep. He said to Peter, “Simon, you went to sleep on me? Can’t you stick it out with me a single hour? Stay alert, be in prayer, so you don’t enter the danger zone without even knowing it. Don’t be naive. Part of you is eager, ready for anything in God; but another part is as lazy as an old dog sleeping by the fire.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: He then went back and prayed the same prayer. Returning, he again found them sound asleep. They simply couldn’t keep their eyes open, and they didn’t have a plausible excuse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: He came back a third time and said, “Are you going to sleep all night? No—you’ve slept long enough. Time’s up. The Son of Man is about to be betrayed into the hands of sinners. Get up. Let’s get going. My betrayer has arrived.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Bunch of Thugs
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-47
  - type: text
    text: 'No sooner were the words out of his mouth when Judas, the one out of the Twelve, showed up, and with him a bunch of thugs, sent by the high priests, religion scholars, and leaders, brandishing swords and clubs. The betrayer had worked out a signal with them: “The one I kiss, that’s the one—seize him. Make sure he doesn’t get away.” He went straight to Jesus and said, “Rabbi!” and kissed him. The others then grabbed him and roughed him up. One of the men standing there unsheathed his sword, swung, and came down on the Chief Priest’s servant, lopping off the man’s ear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 48-50
  - type: text
    text: Jesus said to them, “What is this, coming after me with swords and clubs as if I were a dangerous criminal? Day after day I’ve been sitting in the Temple teaching, and you never so much as lifted a hand against me. What you in fact have done is confirm the prophetic writings.” All the disciples bailed on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 51-52
  - type: text
    text: A young man was following along. All he had on was a bedsheet. Some of the men grabbed him but he got away, running off naked, leaving them holding the sheet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Condemned to Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 53-54
  - type: text
    text: They led Jesus to the Chief Priest, where the high priests, religious leaders, and scholars had gathered together. Peter followed at a safe distance until they got to the Chief Priest’s courtyard, where he mingled with the servants and warmed himself at the fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 55-59
  - type: text
    text: 'The high priests conspiring with the Jewish Council looked high and low for evidence against Jesus by which they could sentence him to death. They found nothing. Plenty of people were willing to bring in false charges, but nothing added up, and they ended up canceling each other out. Then a few of them stood up and lied: “We heard him say, ‘I am going to tear down this Temple, built by hard labor, and in three days build another without lifting a hand.’” But even they couldn’t agree exactly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 60-61
  - type: text
    text: In the middle of this, the Chief Priest stood up and asked Jesus, “What do you have to say to the accusation?” Jesus was silent. He said nothing.
- type: usfm
  marker: p
  children:
  - type: text
    text: The Chief Priest tried again, this time asking, “Are you the Messiah, the Son of the Blessed?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Jesus said, “Yes, I am, and you’ll see it yourself:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Son of Man seated
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the right hand of the Mighty One,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arriving on the clouds of heaven.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 63-64
  - type: text
    text: The Chief Priest lost his temper. Ripping his clothes, he yelled, “Did you hear that? After that do we need witnesses? You heard the blasphemy. Are you going to stand for it?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They condemned him, one and all. The sentence: death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Some of them started spitting at him. They blindfolded his eyes, then hit him, saying, “Who hit you? Prophesy!” The guards, punching and slapping, took him away.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rooster Crowed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 66-67
  - type: text
    text: While all this was going on, Peter was down in the courtyard. One of the Chief Priest’s servant girls came in and, seeing Peter warming himself there, looked hard at him and said, “You were with the Nazarene, Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'He denied it: “I don’t know what you’re talking about.” He went out on the porch. A rooster crowed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 69-70
  - type: text
    text: The girl spotted him and began telling the people standing around, “He’s one of them.” He denied it again.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'After a little while, the bystanders brought it up again. “You’ve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: got
  - type: text
    text: ' to be one of them. You’ve got ‘Galilean’ written all over you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 71-72
  - type: text
    text: Now Peter got really nervous and swore, “I never laid eyes on this man you’re talking about.” Just then the rooster crowed a second time. Peter remembered how Jesus had said, “Before a rooster crows twice, you’ll deny me three times.” He collapsed in tears.
