document_id: ECC.8
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: There’s nothing better than being wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Knowing how to interpret the meaning of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wisdom puts light in the eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gives gentleness to words and manners.
- type: usfm
  marker: s1
  children:
  - type: text
    text: No One Can Control the Wind
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-7
  - type: text
    text: Do what your king commands; you gave a sacred oath of obedience. Don’t worryingly second-guess your orders or try to back out when the task is unpleasant. You’re serving his pleasure, not yours. The king has the last word. Who dares say to him, “What are you doing?” Carrying out orders won’t hurt you a bit; the wise person obeys promptly and accurately. Yes, there’s a right time and way for everything, even though, unfortunately, we miss it for the most part. It’s true that no one knows what’s going to happen, or when. Who’s around to tell us?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: No one can control the wind or lock it in a box.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one has any say-so regarding the day of death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one can stop a battle in its tracks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one who does evil can be saved by evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All this I observed as I tried my best to understand all that’s going on in this world. As long as men and women have the power to hurt each other, this is the way it is.
- type: usfm
  marker: s1
  children:
  - type: text
    text: One Fate for Everybody
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: One time I saw wicked men given a solemn burial in holy ground. When the people returned to the city, they delivered flowery eulogies—and in the very place where wicked acts were done by those very men! More smoke. Indeed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Because the sentence against evil deeds is so long in coming, people in general think they can get by with murder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Even though a person sins and gets by with it hundreds of times throughout a long life, I’m still convinced that the good life is reserved for the person who fears God, who lives reverently in his presence, and that the evil person will not experience a “good” life. No matter how many days he lives, they’ll all be as flat and colorless as a shadow—because he doesn’t fear God.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Here’s something that happens all the time and makes no sense at all: Good people get what’s coming to the wicked, and bad people get what’s coming to the good. I tell you, this makes no sense. It’s smoke.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So, I’m all for just going ahead and having a good time—the best possible. The only earthly good men and women can look forward to is to eat and drink well and have a good time—compensation for the struggle for survival these few years God gives us on earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: When I determined to load up on wisdom and examine everything taking place on earth, I realized that if you keep your eyes open day and night without even blinking, you’ll still never figure out the meaning of what God is doing on this earth. Search as hard as you like, you’re not going to make sense of it. No matter how smart you are, you won’t get to the bottom of it.
