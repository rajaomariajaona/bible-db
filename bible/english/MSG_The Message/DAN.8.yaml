document_id: DAN.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Vision of a Ram and a Billy Goat
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “In King Belshazzar’s third year as king, another vision came to me, Daniel. This was now the second vision.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: '“In the vision, I saw myself in Susa, the capital city of the province Elam, standing at the Ulai Canal. Looking around, I was surprised to see a ram also standing at the gate. The ram had two huge horns, one bigger than the other, but the bigger horn was the last to appear. I watched as the ram charged: first west, then north, then south. No beast could stand up to him. He did just as he pleased, strutting as if he were king of the beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: “While I was watching this, wondering what it all meant, I saw a billy goat with an immense horn in the middle of its forehead come up out of the west and fly across the whole country, not once touching the ground. The billy goat approached the double-horned ram that I had earlier seen standing at the gate and, enraged, charged it viciously. I watched as, mad with rage, it charged the ram and hit it so hard that it broke off its two horns. The ram didn’t stand a chance against it. The billy goat knocked the ram to the ground and stomped all over it. Nothing could have saved the ram from the goat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: “Then the billy goat swelled to an enormous size. At the height of its power its immense horn broke off and four other big horns sprouted in its place, pointing to the four points of the compass. And then from one of these big horns another horn sprouted. It started small, but then grew to an enormous size, facing south and east—toward lovely Palestine. The horn grew tall, reaching to the stars, the heavenly army, and threw some of the stars to the earth and stomped on them. It even dared to challenge the power of God, Prince of the Celestial Army! And then it threw out daily worship and desecrated the Sanctuary. As judgment against their sin, the holy people of God got the same treatment as the daily worship. The horn cast God’s Truth aside. High-handed, it took over everything and everyone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Then I overheard two holy angels talking. One asked, ‘How long is what we see here going to last—the abolishing of daily worship, this devastating judgment against sin, the kicking around of God’s holy people and the Sanctuary?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The other answered, ‘Over the course of 2,300 sacrifices, evening and morning. Then the Sanctuary will be set right again.’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “While I, Daniel, was trying to make sense of what I was seeing, suddenly there was a humanlike figure standing before me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17a
  - type: text
    text: ' “Then I heard a man’s voice from over by the Ulai Canal calling out, ‘Gabriel, tell this man what is going on. Explain the vision to him.’ He came up to me, but when he got close I became terrified and fell facedown on the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17b-18
  - type: text
    text: ' “He said, ‘Understand that this vision has to do with the time of the end.’ As soon as he spoke, I fainted, my face in the dirt. But he picked me up and put me on my feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “And then he continued, ‘I want to tell you what is going to happen as the judgment days of wrath wind down, for there is going to be an end to all this.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: “‘The double-horned ram you saw stands for the two kings of the Medes and Persians. The billy goat stands for the kingdom of the Greeks. The huge horn on its forehead is the first Greek king. The four horns that sprouted after it was broken off are the four kings that come after him, but without his power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: “‘As their kingdoms cool down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rebellions heat up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A king will show up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hard-faced, a master trickster.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His power will swell enormously.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll talk big, high-handedly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doing whatever he pleases,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knocking off heroes and holy ones left and right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll plot and scheme to make crime flourish—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and oh, how it will flourish!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll think he’s invincible
- type: usfm
  marker: q2
  children:
  - type: text
    text: and get rid of anyone who gets in his way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when he takes on the Prince of all princes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll be smashed to bits—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not by human hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This vision of the 2,300 sacrifices, evening and morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is accurate but confidential.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep it to yourself.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It refers to the far future.’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I, Daniel, walked around in a daze, unwell for days. Then I got a grip on myself and went back to work taking care of the king’s affairs. But I continued to be upset by the vision. I couldn’t make sense of it.”
