document_id: NUM.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tribes East of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'The families of Reuben and Gad had huge herds of livestock. They saw that the country of Jazer and Gilead was just the place for grazing livestock. And so they came, the families of Gad and of Reuben, and spoke to Moses and Eleazar the priest and the leaders of the congregation, saying, “Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo, and Beon—the country that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' laid low before the community of Israel—is a country just right for livestock, and we have livestock.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They continued, “If you think we’ve done a good job so far, give us this country for our inheritance. Don’t make us go across the Jordan.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-12
  - type: text
    text: 'Moses answered the families of Gad and Reuben: “Do you mean that you are going to leave the fighting that’s ahead to your brothers while you settle down here? Why would you even think of letting the People of Israel down, demoralizing them just as they’re about to move into the land '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave them? That’s exactly what your ancestors did when I sent them from Kadesh Barnea to survey the country. They went as far as the Valley of Eshcol, took one look and quit. They completely demoralized the People of Israel from entering the land '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had given them. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' got angry—oh, did he get angry! He swore: ‘They’ll never get to see it; none of those who came up out of Egypt who are twenty years and older will ever get to see the land that I promised to Abraham, Isaac, and Jacob. They weren’t interested in following me—their hearts weren’t in it. None, except for Caleb son of Jephunneh the Kenizzite, and Joshua son of Nun; they followed me—their hearts were in it.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger smoked against Israel. He made them wander in the wilderness for forty years, until that entire generation that acted out evil in his sight had died out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: '“And now here you are, just one more mob of sinners stepping up to replace your ancestors, throwing fuel on the already blazing anger of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' against Israel. If you won’t follow him, he’ll do it again. He’ll dump them in the desert and the disaster will be all your fault.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: They came close to him and said, “All we want to do is build corrals for our livestock and towns for our families. Then we’ll take up arms and take the front lines, leading the People of Israel to their place. We’ll be able to leave our families behind, secure in fortified towns, safe from those who live in the land. But we won’t go back home until every Israelite is in full possession of his inheritance. We won’t expect any inheritance west of the Jordan; we are claiming all our inheritance east of the Jordan.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'Moses said, “If you do what you say, take up arms before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for battle and together go across the Jordan ready, before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', to fight until '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has cleaned his enemies out of the land, then when the land is secure you will have fulfilled your duty to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and Israel. Then this land will be yours to keep before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: '“But if you don’t do what you say, you will be sinning against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; you can be sure that your sin will track you down. So, go ahead. Build towns for your families and corrals for your livestock. Do what you said you’d do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: 'The families of Gad and Reuben told Moses: “We will do as our master commands. Our children and wives, our flocks and herds will stay behind here in the towns of Gilead. But we, every one of us fully armed, will cross the river to fight for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', just as our master has said.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: 'So Moses issued orders for them to Eleazar the priest, Joshua the son of Nun, and the heads of the ancestral tribes of the People of Israel. Moses said, “If the families of Gad and Reuben cross the Jordan River with you and before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', all armed and ready to fight, then after the land is secure, you may give them the land of Gilead as their inheritance. But if they don’t cross over with you, they’ll have to settle up with you in Canaan.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: 'The families of Gad and Reuben responded: “We will do what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has said. We will cross the Jordan before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', ready and willing to fight. But the land we inherit will be here, to the east of the Jordan.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Moses gave the families of Gad, Reuben, and the half-tribe of Manasseh son of Joseph the kingdom of Sihon, king of the Amorites, and the kingdom of Og, king of Bashan—the land, its towns, and all the territories connected with them—the works.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-36
  - type: text
    text: The Gadites rebuilt Dibon, Ataroth, Aroer, Atroth Shophan, Jazer, Jogbehah, Beth Nimrah, and Beth Haran as fortified cities; they also built corrals for their animals.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-38
  - type: text
    text: The Reubenites rebuilt Heshbon, Elealeh, and Kiriathaim, also Nebo and Baal Meon and Sibmah. They renamed the cities that they rebuilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: The family of Makir son of Manasseh went to Gilead, captured it, and drove out the Amorites who lived there. Moses then gave Gilead to the Makirites, the descendants of Manasseh. They moved in and settled there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Jair, another son of Manasseh, captured some villages and named them Havvoth Jair (Jair’s Tent-Camps).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nobah captured Kenath and its surrounding camps. He renamed it after himself, Nobah.
