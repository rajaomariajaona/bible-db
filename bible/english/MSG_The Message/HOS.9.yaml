document_id: HOS.9,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Starved for God
  - type: text
    content: Don’t waste your life in wild orgies, Israel.
  - type: text
    content: Don’t party away your life with the heathen.
  - type: text
    content: You walk away from your God at the drop of a hat
  - type: text
    content: and like a whore sell yourself promiscuously
  - type: text
    content: at every sex-and-religion party on the street.
  - type: text
    content: All that party food won’t fill you up.
  - type: text
    content: You’ll end up hungrier than ever.
  - type: text
    content: 'At this rate you’ll not last long in '
  - type: text
    content: God
  - type: text
    content: '’s land:'
  - type: text
    content: Some of you are going to end up bankrupt in Egypt.
  - type: text
    content: Some of you will be disillusioned in Assyria.
  - type: text
    content: As refugees in Egypt and Assyria,
  - type: text
    content: 'you won’t have much chance to worship '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: Sentenced to rations of bread and water,
  - type: text
    content: and your souls polluted by the spirit-dirty air.
  - type: text
    content: 'You’ll be starved for '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'exiled from '
  - type: text
    content: God
  - type: text
    content: ’s own country.
  - type: text
    content: Will you be homesick for the old Holy Days?
  - type: text
    content: 'Will you miss festival worship of '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Be warned! When you escape from the frying pan of disaster,
  - type: text
    content: you’ll fall into the fire of Egypt.
  - type: text
    content: Egypt will give you a fine funeral!
  - type: text
    content: What use will all your god-inspired silver be then
  - type: text
    content: as you eke out a living in a field of weeds?
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: “Long ago when I came upon Israel,
  - type: text
    content: it was like finding grapes out in the desert.
  - type: text
    content: When I found your ancestors, it was like finding
  - type: text
    content: a fig tree bearing fruit for the first time.
  - type: text
    content: But when they arrived at Baal-peor, that pagan shrine,
  - type: text
    content: they took to sin like a pig to filth,
  - type: text
    content: wallowing in the mud with their newfound friends.
  - type: text
    content: Ephraim is fickle and scattered, like a flock of blackbirds,
  - type: text
    content: their beauty dissipated in confusion and clamor,
  - type: text
    content: Frenetic and noisy, frigid and barren,
  - type: text
    content: and nothing to show for it—neither conception nor childbirth.
  - type: text
    content: Even if they did give birth, I’d declare them
  - type: text
    content: unfit parents and take away their children!
  - type: text
    content: Yes indeed—a black day for them
  - type: text
    content: when I turn my back and walk off!
  - type: text
    content: I see Ephraim letting his children run wild.
  - type: text
    content: He might just as well take them and kill them outright!”
  '14':
  - type: text
    content: 'Give it to them, '
  - type: text
    content: God
  - type: text
    content: '! But what?'
  - type: text
    content: Give them a dried-up womb and shriveled breasts.
  '15':
  - type: text
    content: “All their evil came out into the open
  - type: text
    content: at the pagan shrine at Gilgal. Oh, how I hated them there!
  - type: text
    content: Because of their evil practices,
  - type: text
    content: I’ll kick them off my land.
  - type: text
    content: I’m wasting no more love on them.
  - type: text
    content: Their leaders are a bunch of rebellious adolescents.
  - type: text
    content: Ephraim is hit hard—
  - type: text
    content: roots withered, no more fruit.
  - type: text
    content: Even if by some miracle they had children,
  - type: text
    content: the dear babies wouldn’t live—I’d make sure of that!”
  '17':
  - type: text
    content: My God has washed his hands of them.
  - type: text
    content: They wouldn’t listen.
  - type: text
    content: They’re doomed to be wanderers,
  - type: text
    content: vagabonds among the godless nations.
  '7':
  - type: text
    content: Time’s up. Doom’s at the doorstep.
  - type: text
    content: It’s payday!
  - type: text
    content: Did Israel bluster, “The prophet is crazy!
  - type: text
    content: The ‘man of the Spirit’ is nuts!”?
  - type: text
    content: Think again. Because of your great guilt,
  - type: text
    content: you’re in big trouble.
  - type: text
    content: The prophet is looking out for Ephraim,
  - type: text
    content: working under God’s orders.
  - type: text
    content: But everyone is trying to trip him up.
  - type: text
    content: He’s hated right in God’s house, of all places.
  - type: text
    content: The people are going from bad to worse,
  - type: text
    content: rivaling that ancient and unspeakable crime at Gibeah.
  - type: text
    content: God’s keeping track of their guilt.
  - type: text
    content: He’ll make them pay for their sins.
  - type: heading
    content: They Took to Sin Like a Pig to Filth
