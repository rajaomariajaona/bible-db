document_id: HOS.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Starved for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t waste your life in wild orgies, Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t party away your life with the heathen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You walk away from your God at the drop of a hat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like a whore sell yourself promiscuously
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at every sex-and-religion party on the street.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that party food won’t fill you up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll end up hungrier than ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At this rate you’ll not last long in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Some of you are going to end up bankrupt in Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Some of you will be disillusioned in Assyria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As refugees in Egypt and Assyria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you won’t have much chance to worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sentenced to rations of bread and water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your souls polluted by the spirit-dirty air.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’ll be starved for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'exiled from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s own country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you be homesick for the old Holy Days?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Will you miss festival worship of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be warned! When you escape from the frying pan of disaster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll fall into the fire of Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt will give you a fine funeral!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What use will all your god-inspired silver be then
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you eke out a living in a field of weeds?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Long ago when I came upon Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like finding grapes out in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I found your ancestors, it was like finding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fig tree bearing fruit for the first time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they arrived at Baal-peor, that pagan shrine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they took to sin like a pig to filth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wallowing in the mud with their newfound friends.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is fickle and scattered, like a flock of blackbirds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their beauty dissipated in confusion and clamor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frenetic and noisy, frigid and barren,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nothing to show for it—neither conception nor childbirth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they did give birth, I’d declare them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unfit parents and take away their children!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes indeed—a black day for them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I turn my back and walk off!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see Ephraim letting his children run wild.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He might just as well take them and kill them outright!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give it to them, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! But what?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give them a dried-up womb and shriveled breasts.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All their evil came out into the open
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the pagan shrine at Gilgal. Oh, how I hated them there!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of their evil practices,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll kick them off my land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m wasting no more love on them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their leaders are a bunch of rebellious adolescents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is hit hard—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roots withered, no more fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if by some miracle they had children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dear babies wouldn’t live—I’d make sure of that!”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God has washed his hands of them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They wouldn’t listen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re doomed to be wanderers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vagabonds among the godless nations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Time’s up. Doom’s at the doorstep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s payday!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did Israel bluster, “The prophet is crazy!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The ‘man of the Spirit’ is nuts!”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Think again. Because of your great guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re in big trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophet is looking out for Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: working under God’s orders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But everyone is trying to trip him up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s hated right in God’s house, of all places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people are going from bad to worse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rivaling that ancient and unspeakable crime at Gibeah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s keeping track of their guilt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll make them pay for their sins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: They Took to Sin Like a Pig to Filth
    marker-yv: yv-h
