document_id: DEU.29,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are the terms of the Covenant that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses to make with the People of Israel in the land of Moab, renewing the Covenant he made with them at Horeb.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Blesses Israel on the Plains of Moab
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: 'You are all standing here today in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God—the heads of your tribes, your leaders, your officials, all Israel: your babies, your wives, the resident foreigners in your camps who fetch your firewood and water—ready to cross over into the solemnly sworn Covenant that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is making with you today, the Covenant that this day confirms that you are his people and he is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, just as he promised you and your ancestors Abraham, Isaac, and Jacob.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-21
    - type: text
      text: 'I’m not making this Covenant and its oath with you alone. I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' making it with you who are standing here today in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God, yes, but also with those who are not here today. You know the conditions in which we lived in Egypt and how we crisscrossed through nations in our travels. You got an eyeful of their obscenities, their wood and stone, silver and gold junk-gods. Don’t let down your guard lest even now, today, someone—man or woman, clan or tribe—gets sidetracked from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God, and gets involved with the no-gods of the nations; lest some poisonous weed sprout and spread among you, a person who hears the words of the Covenant-oath but exempts himself, thinking, “I’ll live just the way I please, thank you,” and ends up ruining life for everybody. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' won’t let him off the hook. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s anger and jealousy will erupt like a volcano against that person. The curses written in this book will bury him. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will delete his name from the records. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will separate him out from all the tribes of Israel for special punishment, according to all the curses of the Covenant written in this Book of Revelation.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: 'Moses called all Israel together and said, You’ve seen with your own eyes everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' did in Egypt to Pharaoh and his servants, and to the land itself—the massive trials to which you were eyewitnesses, the great signs and miracle-wonders. But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' didn’t give you an understanding heart or perceptive eyes or attentive ears until right now, this very day.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'The next generation, your children who come after you and the foreigner who comes from a far country, will be appalled when they see the widespread devastation, how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made the whole land sick. They’ll see a fire-blackened wasteland of brimstone and salt flats, nothing planted, nothing growing, not so much as a blade of grass anywhere—like the overthrow of Sodom and Gomorrah, Admah and Zeboiim, which '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' overthrew in fiery rage.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'All the nations will ask, “Why did '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' do this to this country? What on earth could have made him this angry?”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: 'Your children will answer, “Because they abandoned the Covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of their ancestors that he made with them after he got them out of Egypt; they went off and worshiped other gods, submitted to gods they’d never heard of before, gods they had no business dealing with. So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s anger erupted against that land and all the curses written in this book came down on it. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', furiously angry, pulled them, roots and all, out of their land and dumped them in another country, as you can see.”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God, will take care of the hidden things but the revealed things are our business. It’s up to us and our children to attend to all the terms in this Revelation.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'I took you through the wilderness for forty years and through all that time the clothes on your backs didn’t wear out, the sandals on your feet didn’t wear out, and you lived well without bread and wine and beer, proving to you that I am in fact '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: When you arrived here in this place, Sihon king of Heshbon and Og king of Bashan met us primed for war but we beat them. We took their land and gave it as an inheritance to the Reubenites, the Gadites, and the half-tribe of Manasseh.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Diligently keep the words of this Covenant. Do what they say so that you will live well and wisely in every detail.
