document_id: NUM.31,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Midianite War
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Avenge the People of Israel on the Midianites. Afterward you will go to be with your dead ancestors.”'
  '13':
  - type: text
    content: 'Moses, Eleazar, and all the leaders of the congregation went to meet the returning army outside the camp. Moses was furious with the army officers—the commanders of thousands and commanders of hundreds—as they came back from the battlefield: “What’s this! You’ve let these women live! They’re the ones who, under Balaam’s direction, seduced the People of Israel away from '
  - type: text
    content: God
  - type: text
    content: ' in that mess at Peor, causing the plague that hit '
  - type: text
    content: God
  - type: text
    content: '’s people. Finish your job: kill all the boys. Kill every woman who has slept with a man. The younger women who are virgins you can keep alive for yourselves.'
  '19':
  - type: text
    content: '“Now here’s what you are to do: Pitch tents outside the camp. All who have killed anyone or touched a corpse must stay outside the camp for seven days. Purify yourselves and your captives on the third and seventh days. Purify every piece of clothing and every utensil—everything made of leather, goat hair, or wood.”'
  '21':
  - type: text
    content: 'Eleazar the priest then spoke to the soldiers who had fought in the battle: “This is the ruling from the Revelation that '
  - type: text
    content: God
  - type: text
    content: ' gave Moses: Gold, silver, bronze, iron, tin, and lead—and anything else that can survive fire—must be passed through the fire; then it will be ritually purified. It must also be ritually washed in the Water-of-Cleansing. Further, whatever cannot survive fire must be put through that water. On the seventh day scrub your clothes; you will be ritually clean. Then you can return to camp.”'
  - type: text
    content: '* * *'
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “I want you and Eleazar the priest and the family leaders in the community to count the captives, people and animals. Split the plunder between the soldiers who fought the battle and the rest of the congregation.'
  '28':
  - type: text
    content: '“Then tax the spoils that go to the soldiers at the rate of one life out of five hundred, whether humans, cattle, donkeys, or sheep. It’s a '
  - type: text
    content: God
  - type: text
    content: '-tax taken from their half-share to be turned over to Eleazar the priest on behalf of '
  - type: text
    content: God
  - type: text
    content: '. Tax the congregation’s half-share at the rate of one life out of fifty, whether persons, cattle, donkeys, sheep, goats, or other animals. Give this to the Levites who are in charge of the care of '
  - type: text
    content: God
  - type: text
    content: ’s Dwelling.”
  '3':
  - type: text
    content: 'Moses addressed the people: “Recruit men for a campaign against Midian, to exact '
  - type: text
    content: God
  - type: text
    content: ’s vengeance on Midian, a thousand from each tribe of Israel to go to war.”
  '31':
  - type: text
    content: 'Moses and Eleazar followed through with what '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '32':
  - type: text
    content: 'The rest of the plunder taken by the army:'
  - type: text
    content: 675,000 sheep
  - type: text
    content: 72,000 cattle
  - type: text
    content: 61,000 donkeys
  - type: text
    content: 32,000 women who were virgins
  '36':
  - type: text
    content: 'The half-share for those who had fought in the war:'
  - type: text
    content: '337,500 sheep, with a tax of 675 for '
  - type: text
    content: God
  - type: text
    content: '36,000 cattle, with a tax of 72 for '
  - type: text
    content: God
  - type: text
    content: '30,500 donkeys, with a tax of 61 for '
  - type: text
    content: God
  - type: text
    content: '16,000 people, with a tax of 32 for '
  - type: text
    content: God
  '41':
  - type: text
    content: 'Moses turned the tax over to Eleazar the priest as '
  - type: text
    content: God
  - type: text
    content: '’s part, following '
  - type: text
    content: God
  - type: text
    content: ’s instructions to Moses.
  '42':
  - type: text
    content: 'The other half-share for the Israelite community that Moses set apart from what was given to the men who fought the war was:'
  - type: text
    content: 337,500 sheep
  - type: text
    content: 36,000 cattle
  - type: text
    content: 30,500 donkeys
  - type: text
    content: 16,000 people
  '47':
  - type: text
    content: 'From the half-share going to the People of Israel, Moses, just as '
  - type: text
    content: God
  - type: text
    content: ' had instructed him, picked one out of every fifty persons and animals and gave them to the Levites, who were in charge of maintaining '
  - type: text
    content: God
  - type: text
    content: ’s Dwelling.
  '48':
  - type: text
    content: 'The military officers—commanders of thousands and commanders of hundreds—came to Moses and said, “We have counted the soldiers under our command and not a man is missing. We’ve brought offerings to '
  - type: text
    content: God
  - type: text
    content: ' from the gold jewelry we got—armlets, bracelets, rings, earrings, ornaments—to make atonement for our lives before '
  - type: text
    content: God
  - type: text
    content: .”
  '5':
  - type: text
    content: A fighting force of a thousand from each tribe of Israel—twelve thousand in all—was recruited. Moses sent them off to war, a thousand from each tribe, and also Phinehas son of Eleazar, who went as priest to the army, in charge of holy vessels and the signaling bugles.
  '51':
  - type: text
    content: 'Moses and Eleazar the priest received the gold from them, all that fine-crafted jewelry. In total, the gold from the commanders of thousands and hundreds that Moses and Eleazar offered as a gift to '
  - type: text
    content: God
  - type: text
    content: ' weighed about six hundred pounds, all donated by the soldiers who had taken the spoils. Moses and Eleazar took the gold from the commanders of thousands and hundreds and brought it to the Tent of Meeting, to serve as a reminder for the People of Israel before '
  - type: text
    content: God
  - type: text
    content: .
  '7':
  - type: text
    content: 'They attacked Midian, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses, and killed every last man. Among the fallen were Evi, Rekem, Zur, Hur, and Reba—the five kings of Midian. They also killed Balaam son of Beor with the sword. The People of Israel took the Midianite women and children captive and took all their animals and herds and goods as plunder. They burned to the ground all the towns in which Midianites lived and also their tent camps. They looted and plundered everything and everyone—belongings and people and animals. They took it all—captives and spoils and plunder—back to Moses and Eleazar the priest and the company of Israel where they were camped on the Plains of Moab, at Jordan-Jericho.'
