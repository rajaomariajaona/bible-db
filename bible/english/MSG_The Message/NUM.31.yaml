document_id: NUM.31,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Midianite War
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Avenge the People of Israel on the Midianites. Afterward you will go to be with your dead ancestors.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses, Eleazar, and all the leaders of the congregation went to meet the returning army outside the camp. Moses was furious with the army officers—the commanders of thousands and commanders of hundreds—as they came back from the battlefield: “What’s this! You’ve let these women live! They’re the ones who, under Balaam’s direction, seduced the People of Israel away from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in that mess at Peor, causing the plague that hit '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s people. Finish your job: kill all the boys. Kill every woman who has slept with a man. The younger women who are virgins you can keep alive for yourselves.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now here’s what you are to do: Pitch tents outside the camp. All who have killed anyone or touched a corpse must stay outside the camp for seven days. Purify yourselves and your captives on the third and seventh days. Purify every piece of clothing and every utensil—everything made of leather, goat hair, or wood.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eleazar the priest then spoke to the soldiers who had fought in the battle: “This is the ruling from the Revelation that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave Moses: Gold, silver, bronze, iron, tin, and lead—and anything else that can survive fire—must be passed through the fire; then it will be ritually purified. It must also be ritually washed in the Water-of-Cleansing. Further, whatever cannot survive fire must be put through that water. On the seventh day scrub your clothes; you will be ritually clean. Then you can return to camp.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “I want you and Eleazar the priest and the family leaders in the community to count the captives, people and animals. Split the plunder between the soldiers who fought the battle and the rest of the congregation.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then tax the spoils that go to the soldiers at the rate of one life out of five hundred, whether humans, cattle, donkeys, or sheep. It’s a '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-tax taken from their half-share to be turned over to Eleazar the priest on behalf of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Tax the congregation’s half-share at the rate of one life out of fifty, whether persons, cattle, donkeys, sheep, goats, or other animals. Give this to the Levites who are in charge of the care of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Dwelling.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses addressed the people: “Recruit men for a campaign against Midian, to exact '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s vengeance on Midian, a thousand from each tribe of Israel to go to war.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Eleazar followed through with what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the plunder taken by the army:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 675,000 sheep
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 72,000 cattle
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 61,000 donkeys
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 32,000 women who were virgins
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The half-share for those who had fought in the war:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: '337,500 sheep, with a tax of 675 for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: li2
    children:
    - type: text
      text: '36,000 cattle, with a tax of 72 for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: li2
    children:
    - type: text
      text: '30,500 donkeys, with a tax of 61 for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: li2
    children:
    - type: text
      text: '16,000 people, with a tax of 32 for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses turned the tax over to Eleazar the priest as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s part, following '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s instructions to Moses.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The other half-share for the Israelite community that Moses set apart from what was given to the men who fought the war was:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 337,500 sheep
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 36,000 cattle
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 30,500 donkeys
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 16,000 people
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the half-share going to the People of Israel, Moses, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had instructed him, picked one out of every fifty persons and animals and gave them to the Levites, who were in charge of maintaining '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Dwelling.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The military officers—commanders of thousands and commanders of hundreds—came to Moses and said, “We have counted the soldiers under our command and not a man is missing. We’ve brought offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from the gold jewelry we got—armlets, bracelets, rings, earrings, ornaments—to make atonement for our lives before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A fighting force of a thousand from each tribe of Israel—twelve thousand in all—was recruited. Moses sent them off to war, a thousand from each tribe, and also Phinehas son of Eleazar, who went as priest to the army, in charge of holy vessels and the signaling bugles.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Eleazar the priest received the gold from them, all that fine-crafted jewelry. In total, the gold from the commanders of thousands and hundreds that Moses and Eleazar offered as a gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' weighed about six hundred pounds, all donated by the soldiers who had taken the spoils. Moses and Eleazar took the gold from the commanders of thousands and hundreds and brought it to the Tent of Meeting, to serve as a reminder for the People of Israel before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They attacked Midian, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses, and killed every last man. Among the fallen were Evi, Rekem, Zur, Hur, and Reba—the five kings of Midian. They also killed Balaam son of Beor with the sword. The People of Israel took the Midianite women and children captive and took all their animals and herds and goods as plunder. They burned to the ground all the towns in which Midianites lived and also their tent camps. They looted and plundered everything and everyone—belongings and people and animals. They took it all—captives and spoils and plunder—back to Moses and Eleazar the priest and the company of Israel where they were camped on the Plains of Moab, at Jordan-Jericho.'
