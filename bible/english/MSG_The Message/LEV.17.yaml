document_id: LEV.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Holy Living: Sacrifices and Blood'
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Speak to Aaron and his sons and all the Israelites. Tell them, This is what '
  - type: text
    content: God
  - type: text
    content: ' commands: Any and every man who slaughters an ox or lamb or goat inside or outside the camp instead of bringing it to the entrance of the Tent of Meeting to offer it to '
  - type: text
    content: God
  - type: text
    content: ' in front of The Dwelling of '
  - type: text
    content: God
  - type: text
    content: '—that man is considered guilty of bloodshed; he has shed blood and must be cut off from his people. This is so the Israelites will bring to '
  - type: text
    content: God
  - type: text
    content: ' the sacrifices that they’re in the habit of sacrificing out in the open fields. They must bring them to '
  - type: text
    content: God
  - type: text
    content: ' and the priest at the entrance to the Tent of Meeting and sacrifice them as Peace-Offerings to '
  - type: text
    content: God
  - type: text
    content: '. The priest will splash the blood on the Altar of '
  - type: text
    content: God
  - type: text
    content: ' at the entrance to the Tent of Meeting and burn the fat as a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: . They must no longer offer their sacrifices to goat-demons—a kind of religious orgy. This is a perpetual decree down through the generations.
  '10':
  - type: text
    content: “If any Israelite or foreigner living among them eats blood, I will disown that person and cut him off from his people, for the life of an animal is in the blood. I have provided the blood for you to make atonement for your lives on the Altar; it is the blood, the life, that makes atonement. That’s why I tell the People of Israel, ‘Don’t eat blood.’ The same goes for the foreigner who lives among you, ‘Don’t eat blood.’
  '13':
  - type: text
    content: “Any and every Israelite—this also goes for the foreigners—who hunts down an animal or bird that is edible, must bleed it and cover the blood with dirt, because the life of every animal is its blood—the blood is its life. That’s why I tell the Israelites, ‘Don’t eat the blood of any animal because the life of every animal is its blood. Anyone who eats the blood must be cut off.’
  '15':
  - type: text
    content: “Anyone, whether native or foreigner, who eats from an animal that is found dead or mauled must wash his clothes and bathe in water; he remains unclean until evening and is then clean. If he doesn’t wash or bathe his body, he’ll be held responsible for his actions.”
  '8':
  - type: text
    content: '“Tell them, Any Israelite or foreigner living among them who offers a Whole-Burnt-Offering or Peace-Offering but doesn’t bring it to the entrance of the Tent of Meeting to sacrifice it to '
  - type: text
    content: God
  - type: text
    content: ', that person must be cut off from his people.'
