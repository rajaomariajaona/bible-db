document_id: ZEC.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Work of Rebuilding
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for rain—it’s time for the spring rain—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the rainmaker,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spring thunderstorm maker,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maker of grain and barley.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3a
    - type: text
      text: ' “Store-bought gods babble gibberish.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Religious experts spout rubbish.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pontificate hot air.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their prescriptions are nothing but smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so the people wander like lost sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poor lost sheep without a shepherd.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m furious with the so-called shepherds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re worse than billy goats, and I’ll treat them like goats.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3b-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies will step in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take care of his flock, the people of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll revive their spirits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make them proud to be on God’s side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will use them in his work of rebuilding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: use them as foundations and pillars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Use them as tools and instruments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: use them to oversee his work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll be a workforce to be proud of, working as one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their heads held high, striding through swamps and mud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Courageous and vigorous because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is with them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: undeterred by the world’s thugs.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-12
    - type: text
      text: “I’ll put muscle in the people of Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll save the people of Joseph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know their pain and will make them good as new.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll get a fresh start, as if nothing had ever happened.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why? Because I am their very own '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll do what needs to be done for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Ephraim will be famous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their lives brimming with joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children will get in on it, too—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'oh, let them feel blessed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll whistle and they’ll all come running.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve set them free—oh, how they’ll flourish!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though I scattered them to the far corners of earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll remember me in the faraway places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll keep the story alive in their children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will come back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring them back from the Egyptian west
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and round them up from the Assyrian east.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring them back to sweet Gilead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: back to leafy Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every square foot of land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be marked by homecoming.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll sail through troubled seas, brush aside brash ocean waves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Roaring rivers will turn to a trickle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaudy Assyria will be stripped bare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bully Egypt exposed as a fraud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But my people—oh, I’ll make them strong, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -strong!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and they’ll live my way.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so!'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
