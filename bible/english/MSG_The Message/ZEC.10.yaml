document_id: ZEC.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Work of Rebuilding
  - type: text
    content: 'Pray to '
  - type: text
    content: God
  - type: text
    content: ' for rain—it’s time for the spring rain—'
  - type: text
    content: 'to '
  - type: text
    content: God
  - type: text
    content: ', the rainmaker,'
  - type: text
    content: Spring thunderstorm maker,
  - type: text
    content: maker of grain and barley.
  '2':
  - type: text
    content: ' “Store-bought gods babble gibberish.'
  - type: text
    content: Religious experts spout rubbish.
  - type: text
    content: They pontificate hot air.
  - type: text
    content: Their prescriptions are nothing but smoke.
  - type: text
    content: And so the people wander like lost sheep,
  - type: text
    content: poor lost sheep without a shepherd.
  - type: text
    content: I’m furious with the so-called shepherds.
  - type: text
    content: They’re worse than billy goats, and I’ll treat them like goats.”
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will step in
  - type: text
    content: and take care of his flock, the people of Judah.
  - type: text
    content: He’ll revive their spirits,
  - type: text
    content: make them proud to be on God’s side.
  - type: text
    content: God will use them in his work of rebuilding,
  - type: text
    content: use them as foundations and pillars,
  - type: text
    content: Use them as tools and instruments,
  - type: text
    content: use them to oversee his work.
  - type: text
    content: They’ll be a workforce to be proud of, working as one,
  - type: text
    content: their heads held high, striding through swamps and mud,
  - type: text
    content: 'Courageous and vigorous because '
  - type: text
    content: God
  - type: text
    content: ' is with them,'
  - type: text
    content: undeterred by the world’s thugs.
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: “I’ll put muscle in the people of Judah;
  - type: text
    content: I’ll save the people of Joseph.
  - type: text
    content: I know their pain and will make them good as new.
  - type: text
    content: They’ll get a fresh start, as if nothing had ever happened.
  - type: text
    content: 'And why? Because I am their very own '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I’ll do what needs to be done for them.
  - type: text
    content: The people of Ephraim will be famous,
  - type: text
    content: their lives brimming with joy.
  - type: text
    content: Their children will get in on it, too—
  - type: text
    content: 'oh, let them feel blessed by '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: I’ll whistle and they’ll all come running.
  - type: text
    content: I’ve set them free—oh, how they’ll flourish!
  - type: text
    content: Even though I scattered them to the far corners of earth,
  - type: text
    content: they’ll remember me in the faraway places.
  - type: text
    content: They’ll keep the story alive in their children,
  - type: text
    content: and they will come back.
  - type: text
    content: I’ll bring them back from the Egyptian west
  - type: text
    content: and round them up from the Assyrian east.
  - type: text
    content: I’ll bring them back to sweet Gilead,
  - type: text
    content: back to leafy Lebanon.
  - type: text
    content: Every square foot of land
  - type: text
    content: will be marked by homecoming.
  - type: text
    content: They’ll sail through troubled seas, brush aside brash ocean waves.
  - type: text
    content: Roaring rivers will turn to a trickle.
  - type: text
    content: Gaudy Assyria will be stripped bare,
  - type: text
    content: bully Egypt exposed as a fraud.
  - type: text
    content: 'But my people—oh, I’ll make them strong, '
  - type: text
    content: God
  - type: text
    content: -strong!
  - type: text
    content: 'and they’ll live my way.” '
  - type: text
    content: God
  - type: text
    content: ' says so!'
  - type: text
    content: '* * *'
