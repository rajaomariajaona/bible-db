document_id: 1CH.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the complete family tree for all Israel, recorded in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Royal Annals of the Kings of Israel and Judah
  - type: text
    text: ' at the time they were exiled to Babylon because of their unbelieving and disobedient lives.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Back-from-Exile Community in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The first Israelites to return from exile to their homes and cities were the priests, the Levites, and the temple support staff.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: 'Returning to Jerusalem from the families of Judah, Benjamin, Ephraim, and Manasseh were the following: Uthai son of Ammihud, the son of Omri, the son of Imri, the son of Bani, from the line of Perez son of Judah; from the Shilonites were Asaiah the firstborn and his sons; from the family of Zerah there was Jeuel. There were 690 in the Judah group.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: From the family of Benjamin were Sallu son of Meshullam, the son of Hodaviah, the son of Hassenuah, and Ibneiah son of Jeroham, and Elah son of Uzzi, the son of Micri, and Meshullam son of Shephatiah, the son of Reuel, the son of Ibnijah. There were 956 in the Benjamin group. All these named were heads of families.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-13
  - type: text
    text: From the company of priests there were Jedaiah; Jehoiarib; Jakin; Azariah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, who was in charge of taking care of the house of God; Adaiah son of Jeroham, the son of Pashhur, the son of Malkijah; also Maasai son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer. The priests, all of them heads of families, numbered 1,760, skilled and seasoned servants in the work of worshiping God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: From the Levites were Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, a Merarite; then Bakbakkar, Heresh, Galal, Mattaniah son of Mica, the son of Zicri, the son of Asaph; also Obadiah son of Shemaiah, the son of Galal, the son of Jeduthun; and finally Berekiah son of Asa, the son of Elkanah, who lived in the villages of the Netophathites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: The security guards were Shallum, Akkub, Talmon, Ahiman, and their brothers. Shallum was the chief and up to now the security guard at the King’s Gate on the east. They also served as security guards at the camps of Levite families.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-25
  - type: text
    text: Shallum son of Kore, the son of Ebiasaph, the son of Korah, along with his brothers in the Korahite family, were in charge of the services of worship as doorkeepers of the Tent, as their ancestors had guarded the entrance to the camp of God. In the early days, Phinehas son of Eleazar was in charge of the security guards—God be with him! Now Zechariah son of Meshelemiah was the security guard at the entrance of the Tent of Meeting. The number of those who had been chosen to be security guards was 212—they were officially registered in their own camps. David and Samuel the seer handpicked them for their dependability. They and their sons had the permanent responsibility for guarding the gates of God’s house, the house of worship; the main security guards were posted at the four entrances, east, west, north, and south; their brothers in the villages were scheduled to give them relief weekly—the four main security guards were responsible for round-the-clock surveillance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-32
  - type: text
    text: Being Levites, they were responsible for the security of all supplies and valuables in the house of God. They kept watch all through the night and had the key to open the doors each morning. Some were in charge of the articles used in The Temple worship—they counted them both when they brought them in and when they took them out. Others were in charge of supplies in the sanctuary—flour, wine, oil, incense, and spices. And some of the priests were assigned to mixing the oils for the perfume. The Levite Mattithiah, the firstborn son of Shallum the Korahite, was responsible for baking the bread for the services of worship. Some of the brothers, sons of the Kohathites, were assigned to preparing the bread set out on the table each Sabbath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: And then there were the musicians, all heads of Levite families. They had permanent living quarters in The Temple; because they were on twenty-four-hour duty, they were exempt from all other duties. These were the heads of Levite families as designated in their family tree. They lived in Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Saul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-38
  - type: text
    text: Jeiel the father of Gibeon lived at Gibeon; his wife was Maacah. His firstborn son was Abdon, followed by Zur, Kish, Baal, Ner, Nadab, Gedor, Ahio, Zechariah, and Mikloth. Mikloth had Shimeam. They lived in the same neighborhood as their relatives in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-44
  - type: text
    text: 'Ner had Kish, Kish had Saul, Saul had Jonathan, Malki-Shua, Abinadab, and Esh-Baal. Merib-Baal was the son of Jonathan and Merib-Baal had Micah. Micah’s sons were Pithon, Melech, and Tahrea. Ahaz had Jarah, Jarah had Alemeth, Azmaveth, and Zimri; Zimri had Moza, Moza had Binea, Rephaiah was his son, Eleasah was his son, and Azel was his son. Azel had six sons: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan—the sons of Azel.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
