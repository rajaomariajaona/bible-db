  '1':
  - type: heading
    content: Desecrating the Holiness of God
  - type: text
    content: '“And now this indictment, you priests! If you refuse to obediently listen, and if you refuse to honor me, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, in worship, then I’ll put you under a curse. I’ll exchange all your blessings for curses. In fact, the curses are already at work because you’re not serious about honoring me. Yes, and the curse will extend to your children. I’m going to plaster your faces with rotting garbage, garbage thrown out from your feasts. That’s what you have to look forward to!
  '10':
  - type: text
    content: Don’t we all come from one Father? Aren’t we all created by the same God? So why can’t we get along? Why do we desecrate the covenant of our ancestors that binds us together?
  '11':
  - type: text
    content: 'Judah has cheated on '
  - type: text
    content: God
  - type: text
    content: '—a sickening violation of trust in Israel and Jerusalem: Judah has desecrated the holiness of '
  - type: text
    content: God
  - type: text
    content: ' by falling in love and running off with foreign women, women who worship alien gods. '
  - type: text
    content: God
  - type: text
    content: '’s curse on those who do this! Drive them out of house and home! They’re no longer fit to be part of the community no matter how many offerings they bring to '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '13':
  - type: text
    content: 'And here’s a second offense: You fill the place of worship with your whining and sniveling because you don’t get what you want from '
  - type: text
    content: God
  - type: text
    content: '. Do you know why? Simple. Because '
  - type: text
    content: God
  - type: text
    content: ' was there as a witness when you spoke your marriage vows to your young bride, and now you’ve broken those vows, broken the faith-bond with your vowed companion, your covenant wife. '
  - type: text
    content: God
  - type: text
    content: ', not you, made marriage. His Spirit inhabits even the smallest details of marriage. And what does he want from marriage? Children of God, that’s what. So guard the spirit of marriage within you. Don’t cheat on your spouse.'
  '16':
  - type: text
    content: '“I hate divorce,” says the '
  - type: text
    content: God
  - type: text
    content: ' of Israel. '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies says, “I hate the violent dismembering of the ‘one flesh’ of marriage.” So watch yourselves. Don’t let your guard down. Don’t cheat.
  '17':
  - type: text
    content: 'You make '
  - type: text
    content: God
  - type: text
    content: ' tired with all your talk.'
  - type: text
    content: “How do we tire him out?” you ask.
  - type: text
    content: By saying, “
  - type: text
    content: God
  - type: text
    content: ' loves sinners and sin alike. '
  - type: text
    content: God
  - type: text
    content: ' loves all.” And also by saying, “Judgment? '
  - type: text
    content: God
  - type: text
    content: ’s too nice to judge.”
  '4':
  - type: text
    content: '“Maybe that will wake you up. Maybe then you’ll realize that I’m indicting you in order to put new life into my covenant with the priests of Levi, the covenant of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies. My covenant with Levi was to give life and peace. I kept my covenant with him, and he honored me. He stood in reverent awe before me. He taught the truth and did not lie. He walked with me in peace and uprightness. He kept many out of the ditch, kept them on the road.
  '7':
  - type: text
    content: '“It’s the job of priests to teach the truth. People are supposed to look to them for guidance. The priest is the messenger of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies. But you priests have abandoned the way of priests. Your teaching has messed up many lives. You have corrupted the covenant of priest Levi. '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies says so. And so I am showing you up for who you are. Everyone will be disgusted with you and avoid you because you don’t live the way I told you to live, and you don’t teach my revelation truly and impartially.”
