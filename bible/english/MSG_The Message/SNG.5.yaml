document_id: SNG.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Man
  - type: text
    content: I went to my garden, dear friend, best lover!
  - type: text
    content: breathed the sweet fragrance.
  - type: text
    content: I ate the fruit and honey,
  - type: text
    content: I drank the nectar and wine.
  - type: text
    content: Celebrate with me, friends!
  - type: text
    content: Raise your glasses—“To life! To love!”
  - type: heading
    content: The Woman
  '10':
  - type: text
    content: My dear lover glows with health—
  - type: text
    content: red-blooded, radiant!
  - type: text
    content: He’s one in a million.
  - type: text
    content: There’s no one quite like him!
  - type: text
    content: My golden one, pure and untarnished,
  - type: text
    content: with raven black curls tumbling across his shoulders.
  - type: text
    content: His eyes are like doves, soft and bright,
  - type: text
    content: but deep-set, brimming with meaning, like wells of water.
  - type: text
    content: His face is rugged, his beard smells like sage,
  - type: text
    content: His voice, his words, warm and reassuring.
  - type: text
    content: Fine muscles ripple beneath his skin,
  - type: text
    content: quiet and beautiful.
  - type: text
    content: His torso is the work of a sculptor,
  - type: text
    content: hard and smooth as ivory.
  - type: text
    content: He stands tall, like a cedar,
  - type: text
    content: strong and deep-rooted,
  - type: text
    content: A rugged mountain of a man,
  - type: text
    content: aromatic with wood and stone.
  - type: text
    content: His words are kisses, his kisses words.
  - type: text
    content: Everything about him delights me, thrills me
  - type: text
    content: through and through!
  - type: text
    content: That’s my lover, that’s my man,
  - type: text
    content: dear Jerusalem sisters.
  '2':
  - type: text
    content: I was sound asleep, but in my dreams I was wide awake.
  - type: text
    content: Oh, listen! It’s the sound of my lover knocking, calling!
  - type: heading
    content: The Man
  - type: text
    content: “Let me in, dear companion, dearest friend,
  - type: text
    content: my dove, consummate lover!
  - type: text
    content: I’m soaked with the dampness of the night,
  - type: text
    content: drenched with dew, shivering and cold.”
  - type: heading
    content: The Woman
  '3':
  - type: text
    content: “But I’m in my nightgown—do you expect me to get dressed?
  - type: text
    content: I’m bathed and in bed—do you want me to get dirty?”
  '4':
  - type: text
    content: But my lover wouldn’t take no for an answer,
  - type: text
    content: and the longer he knocked, the more excited I became.
  - type: text
    content: I got up to open the door to my lover,
  - type: text
    content: sweetly ready to receive him,
  - type: text
    content: Desiring and expectant
  - type: text
    content: as I turned the door handle.
  - type: text
    content: But when I opened the door he was gone.
  - type: text
    content: My loved one had tired of waiting and left.
  - type: text
    content: And I died inside—oh, I felt so bad!
  - type: text
    content: I ran out looking for him
  - type: text
    content: But he was nowhere to be found.
  - type: text
    content: I called into the darkness—but no answer.
  - type: text
    content: The night watchmen found me
  - type: text
    content: as they patrolled the streets of the city.
  - type: text
    content: They slapped and beat and bruised me,
  - type: text
    content: ripping off my clothes,
  - type: text
    content: These watchmen,
  - type: text
    content: who were supposed to be guarding the city.
  '8':
  - type: text
    content: I beg you, sisters in Jerusalem—
  - type: text
    content: if you find my lover,
  - type: text
    content: Please tell him I want him,
  - type: text
    content: that I’m heartsick with love for him.
  - type: heading
    content: The Chorus
  '9':
  - type: text
    content: What’s so great about your lover, fair lady?
  - type: text
    content: What’s so special about him that you beg for our help?
  - type: heading
    content: The Woman
