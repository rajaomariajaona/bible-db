document_id: SNG.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I went to my garden, dear friend, best lover!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: breathed the sweet fragrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I ate the fruit and honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I drank the nectar and wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celebrate with me, friends!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Raise your glasses—“To life! To love!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-16
    - type: text
      text: My dear lover glows with health—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: red-blooded, radiant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s one in a million.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s no one quite like him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My golden one, pure and untarnished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with raven black curls tumbling across his shoulders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His eyes are like doves, soft and bright,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but deep-set, brimming with meaning, like wells of water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His face is rugged, his beard smells like sage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His voice, his words, warm and reassuring.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fine muscles ripple beneath his skin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quiet and beautiful.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His torso is the work of a sculptor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hard and smooth as ivory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stands tall, like a cedar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strong and deep-rooted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A rugged mountain of a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: aromatic with wood and stone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His words are kisses, his kisses words.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything about him delights me, thrills me
  - type: usfm
    marker: q3
    children:
    - type: text
      text: through and through!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s my lover, that’s my man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dear Jerusalem sisters.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I was sound asleep, but in my dreams I was wide awake.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, listen! It’s the sound of my lover knocking, calling!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let me in, dear companion, dearest friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my dove, consummate lover!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m soaked with the dampness of the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drenched with dew, shivering and cold.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “But I’m in my nightgown—do you expect me to get dressed?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m bathed and in bed—do you want me to get dirty?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: But my lover wouldn’t take no for an answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the longer he knocked, the more excited I became.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I got up to open the door to my lover,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sweetly ready to receive him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desiring and expectant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I turned the door handle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when I opened the door he was gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My loved one had tired of waiting and left.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I died inside—oh, I felt so bad!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I ran out looking for him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he was nowhere to be found.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I called into the darkness—but no answer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The night watchmen found me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they patrolled the streets of the city.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They slapped and beat and bruised me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ripping off my clothes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These watchmen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who were supposed to be guarding the city.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I beg you, sisters in Jerusalem—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you find my lover,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please tell him I want him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I’m heartsick with love for him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chorus
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: What’s so great about your lover, fair lady?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s so special about him that you beg for our help?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
