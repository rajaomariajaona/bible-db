document_id: JER.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Terms of This Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Message that came to Jeremiah from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4a
  - type: text
    text: ' “Preach to the people of Judah and citizens of Jerusalem. Tell them this: ‘This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message, the Message of Israel’s God to you. Anyone who does not keep the terms of this covenant is cursed. The terms are clear. I made them plain to your ancestors when I delivered them from Egypt, out of the iron furnace of suffering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4b-5
  - type: text
    text: ' “‘Obey what I tell you. Do exactly what I command you. Your obedience will close the deal. You’ll be mine and I’ll be yours. This will provide the conditions in which I will be able to do what I promised your ancestors: to give them a fertile and lush land. And, as you know, that’s what I did.’”'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Yes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ',” I replied. “That’s true.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' continued: “Preach all this in the towns of Judah and the streets of Jerusalem. Say, ‘Listen to the terms of this covenant and carry them out! I warned your ancestors when I delivered them from Egypt and I’ve kept up the warnings. I haven’t quit warning them for a moment. I warned them from morning to night: “Obey me or else!” But they didn’t obey. They paid no attention to me. They did whatever they wanted to do, whenever they wanted to do it, until finally I stepped in and ordered the punishments set out in the covenant, which, despite all my warnings, they had ignored.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “There’s a conspiracy among the people of Judah and the citizens of Jerusalem. They’ve plotted to reenact the sins of their ancestors—the ones who disobeyed me and decided to go after other gods and worship them. Israel and Judah are in this together, mindlessly breaking the covenant I made with their ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: '“Well, your God has something to say about this: Watch out! I’m about to visit doom on you, and no one will get out of it. You’re going to cry for help but I won’t listen. Then all the people in Judah and Jerusalem will start praying to the gods you’ve been sacrificing to all these years, but it won’t do a bit of good. You’ve got as many gods as you have villages, Judah! And you’ve got enough altars for sacrifices to that impotent sex god Baal to put one on every street corner in Jerusalem!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “And as for you, Jeremiah, I don’t want you praying for this people. Nothing! Not a word of petition. Indeed, I’m not going to listen to a single syllable of their crisis-prayers.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promises and Pious Programs
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: “What business do the ones I love have figuring out
- type: usfm
  marker: q2
  children:
  - type: text
    text: how to get off the hook? And right in the house of worship!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think making promises and devising pious programs
- type: usfm
  marker: q2
  children:
  - type: text
    text: will save you from doom?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think you can get out of this
- type: usfm
  marker: q2
  children:
  - type: text
    text: by becoming more religious?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mighty oak tree, majestic and glorious—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that’s how I once described you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it will only take a clap of thunder and a bolt of lightning
- type: usfm
  marker: q2
  children:
  - type: text
    text: to leave you a shattered wreck.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, who planted you—yes, I have pronounced doom on you. Why? Because of the disastrous life you’ve lived, Israel and Judah alike, goading me to anger with your continuous worship and offerings to that sorry god Baal.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me what was going on. That’s how I knew.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', opened my eyes to their evil scheming.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I had no idea what was going on—naive as a lamb
- type: usfm
  marker: q2
  children:
  - type: text
    text: being led to slaughter!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I didn’t know they had it in for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'didn’t know of their behind-the-scenes plots:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let’s get rid of the preacher.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That
  - type: text
    text: ' will stop the sermons!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s get rid of him for good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He won’t be remembered for long.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then I said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’re a fair judge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You examine and cross-examine
- type: usfm
  marker: q2
  children:
  - type: text
    text: human actions and motives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I want to see these people shown up and put down!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m an open book before you. Clear my name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'That sent a signal to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who spoke up: “Here’s what I’ll do to the men of Anathoth who are trying to murder you, the men who say, ‘Don’t preach to us in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s name or we’ll kill you.’ Yes, it’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies speaking. Indeed! I’ll call them to account: Their young people will die in battle, their children will die of starvation, and there will be no one left at all, none. I’m visiting the men of Anathoth with doom. Doomsday!”'
