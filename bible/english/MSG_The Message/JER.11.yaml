document_id: JER.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Terms of This Covenant
  - type: text
    content: 'The Message that came to Jeremiah from '
  - type: text
    content: God
  - type: text
    content: ':'
  '11':
  - type: text
    content: '“Well, your God has something to say about this: Watch out! I’m about to visit doom on you, and no one will get out of it. You’re going to cry for help but I won’t listen. Then all the people in Judah and Jerusalem will start praying to the gods you’ve been sacrificing to all these years, but it won’t do a bit of good. You’ve got as many gods as you have villages, Judah! And you’ve got enough altars for sacrifices to that impotent sex god Baal to put one on every street corner in Jerusalem!'
  '14':
  - type: text
    content: “And as for you, Jeremiah, I don’t want you praying for this people. Nothing! Not a word of petition. Indeed, I’m not going to listen to a single syllable of their crisis-prayers.”
  - type: heading
    content: Promises and Pious Programs
  '15':
  - type: text
    content: “What business do the ones I love have figuring out
  - type: text
    content: how to get off the hook? And right in the house of worship!
  - type: text
    content: Do you think making promises and devising pious programs
  - type: text
    content: will save you from doom?
  - type: text
    content: Do you think you can get out of this
  - type: text
    content: by becoming more religious?
  - type: text
    content: A mighty oak tree, majestic and glorious—
  - type: text
    content: that’s how I once described you.
  - type: text
    content: But it will only take a clap of thunder and a bolt of lightning
  - type: text
    content: to leave you a shattered wreck.
  '17':
  - type: text
    content: '“I, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, who planted you—yes, I have pronounced doom on you. Why? Because of the disastrous life you’ve lived, Israel and Judah alike, goading me to anger with your continuous worship and offerings to that sorry god Baal.”
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me what was going on. That’s how I knew.'
  - type: text
    content: 'You, '
  - type: text
    content: God
  - type: text
    content: ', opened my eyes to their evil scheming.'
  - type: text
    content: I had no idea what was going on—naive as a lamb
  - type: text
    content: being led to slaughter!
  - type: text
    content: I didn’t know they had it in for me,
  - type: text
    content: 'didn’t know of their behind-the-scenes plots:'
  - type: text
    content: “Let’s get rid of the preacher.
  - type: text
    content: That
  - type: text
    content: ' will stop the sermons!'
  - type: text
    content: Let’s get rid of him for good.
  - type: text
    content: He won’t be remembered for long.”
  '2':
  - type: text
    content: ' “Preach to the people of Judah and citizens of Jerusalem. Tell them this: ‘This is '
  - type: text
    content: God
  - type: text
    content: ’s Message, the Message of Israel’s God to you. Anyone who does not keep the terms of this covenant is cursed. The terms are clear. I made them plain to your ancestors when I delivered them from Egypt, out of the iron furnace of suffering.
  '20':
  - type: text
    content: Then I said, “
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: you’re a fair judge.
  - type: text
    content: You examine and cross-examine
  - type: text
    content: human actions and motives.
  - type: text
    content: I want to see these people shown up and put down!
  - type: text
    content: I’m an open book before you. Clear my name.”
  '21':
  - type: text
    content: 'That sent a signal to '
  - type: text
    content: God
  - type: text
    content: ', who spoke up: “Here’s what I’ll do to the men of Anathoth who are trying to murder you, the men who say, ‘Don’t preach to us in '
  - type: text
    content: God
  - type: text
    content: '’s name or we’ll kill you.’ Yes, it’s '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaking. Indeed! I’ll call them to account: Their young people will die in battle, their children will die of starvation, and there will be no one left at all, none. I’m visiting the men of Anathoth with doom. Doomsday!”'
  '4':
  - type: text
    content: ' “‘Obey what I tell you. Do exactly what I command you. Your obedience will close the deal. You’ll be mine and I’ll be yours. This will provide the conditions in which I will be able to do what I promised your ancestors: to give them a fertile and lush land. And, as you know, that’s what I did.’”'
  - type: text
    content: '“Yes, '
  - type: text
    content: God
  - type: text
    content: ',” I replied. “That’s true.”'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' continued: “Preach all this in the towns of Judah and the streets of Jerusalem. Say, ‘Listen to the terms of this covenant and carry them out! I warned your ancestors when I delivered them from Egypt and I’ve kept up the warnings. I haven’t quit warning them for a moment. I warned them from morning to night: “Obey me or else!” But they didn’t obey. They paid no attention to me. They did whatever they wanted to do, whenever they wanted to do it, until finally I stepped in and ordered the punishments set out in the covenant, which, despite all my warnings, they had ignored.’”'
  '9':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' said, “There’s a conspiracy among the people of Judah and the citizens of Jerusalem. They’ve plotted to reenact the sins of their ancestors—the ones who disobeyed me and decided to go after other gods and worship them. Israel and Judah are in this together, mindlessly breaking the covenant I made with their ancestors.'
