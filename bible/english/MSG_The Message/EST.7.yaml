document_id: EST.7,97
type_code: eng
verses:
  '1':
  - type: text
    content: So the king and Haman went to dinner with Queen Esther. At this second dinner, while they were drinking wine the king again asked, “Queen Esther, what would you like? Half of my kingdom! Just ask and it’s yours.”
  '10':
  - type: text
    content: So Haman was hanged on the very gallows that he had built for Mordecai. And the king’s hot anger cooled.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: Queen Esther answered, “If I have found favor in your eyes, O King, and if it please the king, give me my life, and give my people their lives.
  '4':
  - type: text
    content: “We’ve been sold, I and my people, to be destroyed—sold to be massacred, eliminated. If we had just been sold off into slavery, I wouldn’t even have brought it up; our troubles wouldn’t have been worth bothering the king over.”
  '5':
  - type: text
    content: King Xerxes exploded, “Who? Where is he? This is monstrous!”
  '6':
  - type: text
    content: “An enemy. An adversary. This evil Haman,” said Esther.
  - type: text
    content: Haman was terror-stricken before the king and queen.
  '7':
  - type: text
    content: The king, raging, left his wine and stomped out into the palace garden.
  - type: text
    content: Haman stood there pleading with Queen Esther for his life—he could see that the king was finished with him and that he was doomed. As the king came back from the palace garden into the banquet hall, Haman was groveling at the couch on which Esther reclined. The king roared out, “Will he even molest the queen while I’m just around the corner?”
  - type: text
    content: When that word left the king’s mouth, all the blood drained from Haman’s face.
  '9':
  - type: text
    content: 'Harbona, one of the eunuchs attending the king, spoke up: “Look over there! There’s the gallows that Haman had built for Mordecai, who saved the king’s life. It’s right next to Haman’s house—seventy-five feet high!”'
  - type: text
    content: The king said, “Hang him on it!”
