document_id: EST.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king and Haman went to dinner with Queen Esther. At this second dinner, while they were drinking wine the king again asked, “Queen Esther, what would you like? Half of my kingdom! Just ask and it’s yours.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Haman was hanged on the very gallows that he had built for Mordecai. And the king’s hot anger cooled.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Queen Esther answered, “If I have found favor in your eyes, O King, and if it please the king, give me my life, and give my people their lives.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We’ve been sold, I and my people, to be destroyed—sold to be massacred, eliminated. If we had just been sold off into slavery, I wouldn’t even have brought it up; our troubles wouldn’t have been worth bothering the king over.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Xerxes exploded, “Who? Where is he? This is monstrous!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “An enemy. An adversary. This evil Haman,” said Esther.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Haman was terror-stricken before the king and queen.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king, raging, left his wine and stomped out into the palace garden.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Haman stood there pleading with Queen Esther for his life—he could see that the king was finished with him and that he was doomed. As the king came back from the palace garden into the banquet hall, Haman was groveling at the couch on which Esther reclined. The king roared out, “Will he even molest the queen while I’m just around the corner?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: When that word left the king’s mouth, all the blood drained from Haman’s face.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Harbona, one of the eunuchs attending the king, spoke up: “Look over there! There’s the gallows that Haman had built for Mordecai, who saved the king’s life. It’s right next to Haman’s house—seventy-five feet high!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king said, “Hang him on it!”
