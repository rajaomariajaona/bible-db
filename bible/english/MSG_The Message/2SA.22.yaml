document_id: 2SA.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the words of this song after '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saved him from all his enemies and from Saul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is bedrock under my feet,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the castle in which I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my rescuing knight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My God—the high crag
- type: usfm
  marker: q2
  children:
  - type: text
    text: where I run for dear life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hiding behind the boulders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe in the granite hideout;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My mountaintop refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he saves me from ruthless men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I sing to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the Praise-Lofty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find myself safe and saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: The waves of death crashed over me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devil waters rushed over me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hell’s ropes cinched me tight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: death traps barred every exit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A hostile world! I called to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: to my God I cried out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From his palace he heard me call;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cry brought me right into his presence—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a private audience!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-16
  - type: text
    text: Earth wobbled and lurched;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the very heavens shook like leaves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quaked like aspen leaves
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of his rage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His nostrils flared, billowing smoke;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his mouth spit fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tongues of fire darted in and out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he lowered the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He stepped down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: under his feet an abyss opened up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rode a winged creature,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swift on wind-wings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wrapped himself
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a trenchcoat of black rain-cloud darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But his cloud-brightness burst through,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a grand comet of fireworks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' thundered out of heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the High God gave a great shout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God shot his arrows—pandemonium!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hurled his lightnings—a rout!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The secret sources of ocean were exposed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hidden depths of earth lay uncovered
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The moment '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' roared in protest,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: let loose his hurricane anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: But me he caught—reached all the way
- type: usfm
  marker: q2
  children:
  - type: text
    text: from sky to sea; he pulled me out
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of that ocean of hate, that enemy chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the void in which I was drowning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hit me when I was down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stuck by me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He stood me up on a wide-open field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stood there saved—surprised to be loved!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-25
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made my life complete'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I placed all the pieces before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I cleaned up my act,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he gave me a fresh start.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indeed, I’ve kept alert to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t taken God for granted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every day I review the ways he works,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I try not to miss a trick.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I feel put back together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’m watching my step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rewrote the text of my life'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I opened the book of my heart to his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: You stick by people who stick with you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’re straight with people who’re straight with you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re good to good people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you shrewdly work around the bad ones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You take the side of the down-and-out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the stuck-up you take down a peg.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: 'Suddenly, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your light floods my path,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' drives out the darkness.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I smash the bands of marauders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I vault the high fences.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a God! His road
- type: usfm
  marker: q2
  children:
  - type: text
    text: stretches straight and smooth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Every '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -direction is road-tested.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone who runs toward him
- type: usfm
  marker: q1
  children:
  - type: text
    text: Makes it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-46
  - type: text
    text: 'Is there any god like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are we not at bedrock?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is not this the God who armed me well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then aimed me in the right direction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I run like a deer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m king of the mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shows me how to fight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can bend a bronze bow!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You protect me with salvation-armor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you touch me and I feel ten feet tall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You cleared the ground under me
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my footing was firm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I chased my enemies I caught them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I didn’t let go till they were dead men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I nailed them; they were down for good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I walked all over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You armed me well for this fight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you smashed the upstarts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made my enemies turn tail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I wiped out the haters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cried “uncle”
- type: usfm
  marker: q2
  children:
  - type: text
    text: but Uncle didn’t come;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They yelled for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and got no for an answer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I ground them to dust; they gusted in the wind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I threw them out, like garbage in the gutter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You rescued me from a squabbling people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made me a leader of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People I’d never heard of served me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the moment they got wind of me they submitted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They gave up; they came trembling from their hideouts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-51
  - type: text
    text: 'Live, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Blessing to my Rock,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my towering Salvation-God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: This God set things right for me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shut up the people who talked back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescued me from enemy anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You pulled me from the grip of upstarts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You saved me from the bullies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That’s why I’m thanking you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: all over the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s why I’m singing songs
- type: usfm
  marker: q2
  children:
  - type: text
    text: that rhyme your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s king takes the trophy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s chosen is beloved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I mean David and all his children—
- type: usfm
  marker: q2
  children:
  - type: text
    text: always.
