document_id: PSA.22
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: God, God . . . my God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why did you dump me
- type: usfm
  marker: q2
  children:
  - type: text
    text: miles from nowhere?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doubled up with pain, I call to God
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the day long. No answer. Nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I keep at it all night, tossing and turning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: And you! Are you indifferent, above it all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaning back on the cushions of Israel’s praise?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We know you were there for our parents:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cried for your help and you gave it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they trusted and lived a good life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: And here I am, a nothing—an earthworm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: something to step on, to squash.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone pokes fun at me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they make faces at me, they shake their heads:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Let’s see how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' handles this one;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'since God likes him so much, let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' help him!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: And to think you were midwife at my birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: setting me at my mother’s breasts!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I left the womb you cradled me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: since the moment of birth you’ve been my God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you moved far away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trouble moved in next door.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I need a neighbor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Herds of bulls come at me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the raging bulls stampede,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horns lowered, nostrils flaring,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a herd of buffalo on the move.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: I’m a bucket kicked over and spilled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every joint in my body has been pulled apart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart is a blob
- type: usfm
  marker: q2
  children:
  - type: text
    text: of melted wax in my gut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m dry as a bone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my tongue black and swollen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have laid me out for burial
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the dirt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: Now packs of wild dogs come at me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: thugs gang up on me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They pin me down hand and foot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lock me in a cage—a bag
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of bones in a cage, stared at
- type: usfm
  marker: q2
  children:
  - type: text
    text: by every passerby.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They take my wallet and the shirt off my back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then throw dice for my clothes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —don’t put off my rescue!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hurry and help me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let them cut my throat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let those mongrels devour me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you don’t show up soon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m done for—gored by the bulls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: meat for the lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: Here’s the story I’ll tell my friends when they come to worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and punctuate it with Hallelujahs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout Hallelujah, you God-worshipers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give glory, you sons of Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: adore him, you daughters of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has never let you down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never looked the other way
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you were being kicked around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has never wandered off to do his own thing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has been right there, listening.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: Here in this great gathering for worship
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have discovered this praise-life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll do what I promised right here
- type: usfm
  marker: q2
  children:
  - type: text
    text: in front of the God-worshipers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Down-and-outers sit at '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s table
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eat their fill.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone on the hunt for God
- type: usfm
  marker: q2
  children:
  - type: text
    text: is here, praising him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Live it up, from head to toe.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t ever quit!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: From the four corners of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: people are coming to their senses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are running back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Long-lost families
- type: usfm
  marker: q2
  children:
  - type: text
    text: are falling on their faces before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has taken charge;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from now on he has the last word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: All the power-mongers are before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: —worshiping!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the poor and powerless, too
- type: usfm
  marker: q2
  children:
  - type: text
    text: —worshiping!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Along with those who never got it together
- type: usfm
  marker: q2
  children:
  - type: text
    text: —worshiping!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: Our children and their children
- type: usfm
  marker: q2
  children:
  - type: text
    text: will get in on this
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the word is passed along
- type: usfm
  marker: q2
  children:
  - type: text
    text: from parent to child.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babies not yet conceived
- type: usfm
  marker: q2
  children:
  - type: text
    text: will hear the good news—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God does what he says.
