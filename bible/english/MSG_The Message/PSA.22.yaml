document_id: PSA.22,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, God . . . my God!
  - type: text
    content: Why did you dump me
  - type: text
    content: miles from nowhere?
  - type: text
    content: Doubled up with pain, I call to God
  - type: text
    content: all the day long. No answer. Nothing.
  - type: text
    content: I keep at it all night, tossing and turning.
  '12':
  - type: text
    content: Herds of bulls come at me,
  - type: text
    content: the raging bulls stampede,
  - type: text
    content: Horns lowered, nostrils flaring,
  - type: text
    content: like a herd of buffalo on the move.
  '14':
  - type: text
    content: I’m a bucket kicked over and spilled,
  - type: text
    content: every joint in my body has been pulled apart.
  - type: text
    content: My heart is a blob
  - type: text
    content: of melted wax in my gut.
  - type: text
    content: I’m dry as a bone,
  - type: text
    content: my tongue black and swollen.
  - type: text
    content: They have laid me out for burial
  - type: text
    content: in the dirt.
  '16':
  - type: text
    content: Now packs of wild dogs come at me;
  - type: text
    content: thugs gang up on me.
  - type: text
    content: They pin me down hand and foot,
  - type: text
    content: and lock me in a cage—a bag
  - type: text
    content: Of bones in a cage, stared at
  - type: text
    content: by every passerby.
  - type: text
    content: They take my wallet and the shirt off my back,
  - type: text
    content: and then throw dice for my clothes.
  '19':
  - type: text
    content: 'You, '
  - type: text
    content: God
  - type: text
    content: —don’t put off my rescue!
  - type: text
    content: Hurry and help me!
  - type: text
    content: Don’t let them cut my throat;
  - type: text
    content: don’t let those mongrels devour me.
  - type: text
    content: If you don’t show up soon,
  - type: text
    content: I’m done for—gored by the bulls,
  - type: text
    content: meat for the lions.
  '22':
  - type: text
    content: Here’s the story I’ll tell my friends when they come to worship,
  - type: text
    content: 'and punctuate it with Hallelujahs:'
  - type: text
    content: Shout Hallelujah, you God-worshipers;
  - type: text
    content: give glory, you sons of Jacob;
  - type: text
    content: adore him, you daughters of Israel.
  - type: text
    content: He has never let you down,
  - type: text
    content: never looked the other way
  - type: text
    content: when you were being kicked around.
  - type: text
    content: He has never wandered off to do his own thing;
  - type: text
    content: he has been right there, listening.
  '25':
  - type: text
    content: Here in this great gathering for worship
  - type: text
    content: I have discovered this praise-life.
  - type: text
    content: And I’ll do what I promised right here
  - type: text
    content: in front of the God-worshipers.
  - type: text
    content: 'Down-and-outers sit at '
  - type: text
    content: God
  - type: text
    content: ’s table
  - type: text
    content: and eat their fill.
  - type: text
    content: Everyone on the hunt for God
  - type: text
    content: is here, praising him.
  - type: text
    content: “Live it up, from head to toe.
  - type: text
    content: Don’t ever quit!”
  '27':
  - type: text
    content: From the four corners of the earth
  - type: text
    content: people are coming to their senses,
  - type: text
    content: 'are running back to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Long-lost families
  - type: text
    content: are falling on their faces before him.
  - type: text
    content: God
  - type: text
    content: ' has taken charge;'
  - type: text
    content: from now on he has the last word.
  '29':
  - type: text
    content: All the power-mongers are before him
  - type: text
    content: —worshiping!
  - type: text
    content: All the poor and powerless, too
  - type: text
    content: —worshiping!
  - type: text
    content: Along with those who never got it together
  - type: text
    content: —worshiping!
  '3':
  - type: text
    content: And you! Are you indifferent, above it all,
  - type: text
    content: leaning back on the cushions of Israel’s praise?
  - type: text
    content: 'We know you were there for our parents:'
  - type: text
    content: they cried for your help and you gave it;
  - type: text
    content: they trusted and lived a good life.
  '30':
  - type: text
    content: Our children and their children
  - type: text
    content: will get in on this
  - type: text
    content: As the word is passed along
  - type: text
    content: from parent to child.
  - type: text
    content: Babies not yet conceived
  - type: text
    content: will hear the good news—
  - type: text
    content: that God does what he says.
  '6':
  - type: text
    content: And here I am, a nothing—an earthworm,
  - type: text
    content: something to step on, to squash.
  - type: text
    content: Everyone pokes fun at me;
  - type: text
    content: 'they make faces at me, they shake their heads:'
  - type: text
    content: '“Let’s see how '
  - type: text
    content: God
  - type: text
    content: ' handles this one;'
  - type: text
    content: 'since God likes him so much, let '
  - type: text
    content: him
  - type: text
    content: ' help him!”'
  '9':
  - type: text
    content: And to think you were midwife at my birth,
  - type: text
    content: setting me at my mother’s breasts!
  - type: text
    content: When I left the womb you cradled me;
  - type: text
    content: since the moment of birth you’ve been my God.
  - type: text
    content: Then you moved far away
  - type: text
    content: and trouble moved in next door.
  - type: text
    content: I need a neighbor.
