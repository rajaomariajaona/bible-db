document_id: PRO.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Without Good Direction, People Lose Their Way
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' hates cheating in the marketplace;'
  - type: text
    content: he loves it when business is aboveboard.
  '10':
  - type: text
    content: When it goes well for good people, the whole town cheers;
  - type: text
    content: when it goes badly for bad people, the town celebrates.
  '11':
  - type: text
    content: When right-living people bless the city, it flourishes;
  - type: text
    content: evil talk turns it into a ghost town in no time.
  '12':
  - type: text
    content: Mean-spirited slander is heartless;
  - type: text
    content: quiet discretion accompanies good sense.
  '13':
  - type: text
    content: A gadabout gossip can’t be trusted with a secret,
  - type: text
    content: but someone of integrity won’t violate a confidence.
  '14':
  - type: text
    content: Without good direction, people lose their way;
  - type: text
    content: the more wise counsel you follow, the better your chances.
  '15':
  - type: text
    content: Whoever makes deals with strangers is sure to get burned;
  - type: text
    content: if you keep a cool head, you’ll avoid rash bargains.
  '16':
  - type: text
    content: A woman of gentle grace gets respect,
  - type: text
    content: but men of rough violence grab for loot.
  - type: heading
    content: A God-Shaped Life
  '17':
  - type: text
    content: When you’re kind to others, you help yourself;
  - type: text
    content: when you’re cruel to others, you hurt yourself.
  '18':
  - type: text
    content: Bad work gets paid with a bad check;
  - type: text
    content: good work gets solid pay.
  '19':
  - type: text
    content: Take your stand with God’s loyal community and live,
  - type: text
    content: or chase after phantoms of evil and die.
  '2':
  - type: text
    content: The stuck-up fall flat on their faces,
  - type: text
    content: but down-to-earth people stand firm.
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' can’t stand deceivers,'
  - type: text
    content: but oh how he relishes integrity.
  '21':
  - type: text
    content: 'Count on this: The wicked won’t get off scot-free,'
  - type: text
    content: and God’s loyal people will triumph.
  '22':
  - type: text
    content: Like a gold ring in a pig’s snout
  - type: text
    content: is a beautiful face on an empty head.
  '23':
  - type: text
    content: The desires of good people lead straight to the best,
  - type: text
    content: but wicked ambition ends in angry frustration.
  '24':
  - type: text
    content: The world of the generous gets larger and larger;
  - type: text
    content: the world of the stingy gets smaller and smaller.
  '25':
  - type: text
    content: The one who blesses others is abundantly blessed;
  - type: text
    content: those who help others are helped.
  '26':
  - type: text
    content: Curses on those who drive a hard bargain!
  - type: text
    content: Blessings on all who play fair and square!
  '27':
  - type: text
    content: The one who seeks good finds delight;
  - type: text
    content: the student of evil becomes evil.
  '28':
  - type: text
    content: A life devoted to things is a dead life, a stump;
  - type: text
    content: a God-shaped life is a flourishing tree.
  '29':
  - type: text
    content: Exploit or abuse your family, and end up with a fistful of air;
  - type: text
    content: common sense tells you it’s a stupid way to live.
  '3':
  - type: text
    content: The integrity of the honest keeps them on track;
  - type: text
    content: the deviousness of crooks brings them to ruin.
  '30':
  - type: text
    content: A good life is a fruit-bearing tree;
  - type: text
    content: a violent life destroys souls.
  '31':
  - type: text
    content: If good people barely make it,
  - type: text
    content: what’s in store for the bad!
  '4':
  - type: text
    content: A thick bankroll is no help when life falls apart,
  - type: text
    content: but a principled life can stand up to the worst.
  '5':
  - type: text
    content: Moral character makes for smooth traveling;
  - type: text
    content: an evil life is a hard life.
  '6':
  - type: text
    content: Good character is the best insurance;
  - type: text
    content: crooks get trapped in their sinful lust.
  '7':
  - type: text
    content: When the wicked die, that’s it—
  - type: text
    content: the story’s over, end of hope.
  '8':
  - type: text
    content: A good person is saved from much trouble;
  - type: text
    content: a bad person runs straight into it.
  '9':
  - type: text
    content: The loose tongue of the godless spreads destruction;
  - type: text
    content: the common sense of the godly preserves them.
