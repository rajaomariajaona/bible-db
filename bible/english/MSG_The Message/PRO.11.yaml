document_id: PRO.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Without Good Direction, People Lose Their Way
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hates cheating in the marketplace;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he loves it when business is aboveboard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The stuck-up fall flat on their faces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but down-to-earth people stand firm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The integrity of the honest keeps them on track;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the deviousness of crooks brings them to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A thick bankroll is no help when life falls apart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a principled life can stand up to the worst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moral character makes for smooth traveling;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an evil life is a hard life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Good character is the best insurance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: crooks get trapped in their sinful lust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When the wicked die, that’s it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the story’s over, end of hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A good person is saved from much trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bad person runs straight into it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The loose tongue of the godless spreads destruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the common sense of the godly preserves them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When it goes well for good people, the whole town cheers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it goes badly for bad people, the town celebrates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When right-living people bless the city, it flourishes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: evil talk turns it into a ghost town in no time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mean-spirited slander is heartless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: quiet discretion accompanies good sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A gadabout gossip can’t be trusted with a secret,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but someone of integrity won’t violate a confidence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Without good direction, people lose their way;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more wise counsel you follow, the better your chances.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Whoever makes deals with strangers is sure to get burned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you keep a cool head, you’ll avoid rash bargains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A woman of gentle grace gets respect,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but men of rough violence grab for loot.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A God-Shaped Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When you’re kind to others, you help yourself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you’re cruel to others, you hurt yourself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Bad work gets paid with a bad check;
- type: usfm
  marker: q2
  children:
  - type: text
    text: good work gets solid pay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Take your stand with God’s loyal community and live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or chase after phantoms of evil and die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' can’t stand deceivers,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but oh how he relishes integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Count on this: The wicked won’t get off scot-free,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God’s loyal people will triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Like a gold ring in a pig’s snout
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a beautiful face on an empty head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The desires of good people lead straight to the best,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wicked ambition ends in angry frustration.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The world of the generous gets larger and larger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world of the stingy gets smaller and smaller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The one who blesses others is abundantly blessed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who help others are helped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Curses on those who drive a hard bargain!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Blessings on all who play fair and square!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The one who seeks good finds delight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the student of evil becomes evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A life devoted to things is a dead life, a stump;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a God-shaped life is a flourishing tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Exploit or abuse your family, and end up with a fistful of air;
- type: usfm
  marker: q2
  children:
  - type: text
    text: common sense tells you it’s a stupid way to live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A good life is a fruit-bearing tree;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a violent life destroys souls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If good people barely make it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what’s in store for the bad!
