document_id: EPH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Secret Plan of God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: This is why I, Paul, am in jail for Christ, having taken up the cause of you outsiders, so-called. I take it that you’re familiar with the part I was given in God’s plan for including everybody. I got the inside story on this from God himself, as I just wrote you in brief.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: As you read over what I have written to you, you’ll be able to see for yourselves into the mystery of Christ. None of our ancestors understood this. Only in our time has it been made clear by God’s Spirit through his holy apostles and prophets of this new order. The mystery is that people who have never heard of God and those who have heard of him all their lives (what I’ve been calling outsiders and insiders) stand on the same ground before God. They get the same offer, same help, same promises in Christ Jesus. The Message is accessible and welcoming to everyone, across the board.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8a
  - type: text
    text: ' This is my life work: helping people understand and respond to this Message. It came as a sheer gift to me, a real surprise, God handling all the details. When it came to presenting the Message to people who had no background in God’s way, I was the least qualified of any of the available Christians. God saw to it that I was equipped, but you can be sure that it had nothing to do with my natural abilities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8b-10
  - type: text
    text: ' And so here I am, preaching and writing about things that are way over my head, the inexhaustible riches and generosity of Christ. My task is to bring out in the open and make plain what God, who created all this in the first place, has been doing in secret and behind the scenes all along. Through followers of Jesus like yourselves gathered in churches, this extraordinary plan of God is becoming known and talked about even among the angels!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: All this is proceeding along lines planned all along by God and then executed in Christ Jesus. When we trust in him, we’re free to say whatever needs to be said, bold to go wherever we need to go. So don’t let my present trouble on your behalf get you down. Be proud!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-19
  - type: text
    text: My response is to get down on my knees before the Father, this magnificent Father who parcels out all heaven and earth. I ask him to strengthen you by his Spirit—not a brute strength but a glorious inner strength—that Christ will live in you as you open the door and invite him in. And I ask him that with both feet planted firmly on love, you’ll be able to take in with all followers of Jesus the extravagant dimensions of Christ’s love. Reach out and experience the breadth! Test its length! Plumb the depths! Rise to the heights! Live full lives, full in the fullness of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: God can do anything, you know—far more than you could ever imagine or guess or request in your wildest dreams! He does it not by pushing us around but by working within us, his Spirit deeply and gently within us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Glory to God in the church!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Glory to God in the Messiah, in Jesus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Glory down all the generations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Glory through all millennia! Oh, yes!
