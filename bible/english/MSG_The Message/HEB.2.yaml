document_id: HEB.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: It’s crucial that we keep a firm grip on what we’ve heard so that we don’t drift off. If the old message delivered by the angels was valid and nobody got away with anything, do you think we can risk neglecting this latest message, this magnificent salvation? First of all, it was delivered in person by the Master, then accurately passed on to us by those who heard it from him. All the while God was validating it with gifts through the Holy Spirit, all sorts of signs and miracles, as he saw fit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Salvation Pioneer
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: It makes good sense that the God who got everything started and keeps everything going now completes the work by making the Salvation Pioneer perfect through suffering as he leads all these people to glory. Since the One who saves and those who are saved have a common origin, Jesus doesn’t hesitate to treat them as family, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll tell my good friends, my brothers and sisters, all I know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: about you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll join them in worship and praise to you.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Again, he puts himself in the same family circle when he says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' live by placing my trust in God.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: And yet again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m here with the children God gave me.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: Since the children are made of flesh and blood, it’s logical that the Savior took on flesh and blood in order to rescue them by his death. By embracing death, taking it into himself, he destroyed the Devil’s hold on death and freed all who cower through life, scared to death of death.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: It’s obvious, of course, that he didn’t go to all this trouble for angels. It was for people like us, children of Abraham. That’s why he had to enter into every detail of human life. Then, when he came before God as high priest to get rid of the people’s sins, he would have already experienced it all himself—all the pain, all the testing—and would be able to help where help was needed.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: God didn’t put angels in charge of this business of salvation that we’re dealing with here. It says in Scripture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is man and woman that you bother with them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why take a second look their way?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made them not quite as high as angels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bright with Eden’s dawn light;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you put them in charge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your entire handcrafted world.
  - type: usfm
    marker: m
    children:
    - type: text
      text: When God put them in charge of everything, nothing was excluded. But we don’t see it yet, don’t see everything under human jurisdiction. What we do see is Jesus, made “not quite as high as angels,” and then, through the experience of death, crowned so much higher than any angel, with a glory “bright with Eden’s dawn light.” In that death, by God’s grace, he fully experienced death in every person’s place.
