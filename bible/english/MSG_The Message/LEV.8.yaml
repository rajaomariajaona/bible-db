document_id: LEV.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ordination of Priests
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: He said, “Take Aaron and with him his sons, the garments, the anointing oil, the bull for the Absolution-Offering, the two rams, and the basket of unraised bread. Gather the entire congregation at the entrance of the Tent of Meeting.” Moses did just as '
  - type: text
    content: God
  - type: text
    content: ' commanded him and the congregation gathered at the entrance of the Tent of Meeting.'
  '10':
  - type: text
    content: Then Moses took the anointing oil and anointed The Dwelling and everything that was in it, consecrating them. He sprinkled some of the oil on the Altar seven times, anointing the Altar and all its utensils, the Washbasin and its stand, consecrating them. He poured some of the anointing oil on Aaron’s head, anointing him and thus consecrating him.
  '13':
  - type: text
    content: 'Moses brought Aaron’s sons forward and put tunics on them, belted them with sashes, and put caps on them, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '14':
  - type: text
    content: 'Moses brought out the bull for the Absolution-Offering. Aaron and his sons placed their hands on its head. Moses slaughtered the bull and purified the Altar by smearing the blood on each of the horns of the Altar with his finger. He poured out the rest of the blood at the base of the Altar. He consecrated it so atonement could be made on it. Moses took all the fat on the entrails and the lobe of liver and the two kidneys with their fat and burned it all on the Altar. The bull with its hide and meat and guts he burned outside the camp, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '18':
  - type: text
    content: 'Moses presented the ram for the Whole-Burnt-Offering. Aaron and his sons laid their hands on the head of the ram. Moses slaughtered it and splashed the blood against all sides of the Altar. He cut the ram up into pieces and then burned the head, the pieces, and the fat. He washed the entrails and the legs with water and then burned the whole ram on the Altar. It was a Whole-Burnt-Offering, a pleasing fragrance—a gift to '
  - type: text
    content: God
  - type: text
    content: ', just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: 'Moses then presented the second ram, the ram for the Ordination-Offering. Aaron and his sons laid their hands on the ram’s head. Moses slaughtered it and smeared some of its blood on the lobe of Aaron’s right ear, on the thumb of his right hand, and on the big toe of his right foot. Then Aaron’s sons were brought forward and Moses smeared some of the blood on the lobes of their right ears, on the thumbs of their right hands, and on the big toes of their right feet. Moses threw the remaining blood against each side of the Altar. He took the fat, the fat tail, all the fat that was on the entrails, the lobe of the liver, the two kidneys with their fat, and the right thigh. From the basket of unraised bread that was in the presence of '
  - type: text
    content: God
  - type: text
    content: ' he took one loaf of the unraised bread made with oil and one wafer. He placed these on the fat portions and the right thigh. He put all this in the hands of Aaron and his sons who waved them before '
  - type: text
    content: God
  - type: text
    content: ' as a Wave-Offering. Then Moses took it all back from their hands and burned them on the Altar on top of the Whole-Burnt-Offering. These were the Ordination-Offerings, a pleasing fragrance to '
  - type: text
    content: God
  - type: text
    content: ', a gift to '
  - type: text
    content: God
  - type: text
    content: '. Then Moses took the breast and raised it up as a Wave-Offering before '
  - type: text
    content: God
  - type: text
    content: '; it was Moses’ portion from the Ordination-Offering ram, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '30':
  - type: text
    content: Moses took some of the anointing oil and some of the blood from the Altar and sprinkled Aaron and his garments, and his sons and their garments, consecrating Aaron and his garments and his sons and their garments.
  '31':
  - type: text
    content: 'Moses spoke to Aaron and his sons: “Boil the meat at the entrance of the Tent of Meeting and eat it there with the bread from the basket of ordination, just as I commanded, saying, ‘Aaron and his sons are to eat it.’ Burn up the leftovers from the meat and bread. Don’t leave through the entrance of the Tent of Meeting for the seven days that will complete your ordination. Your ordination will last seven days. '
  - type: text
    content: God
  - type: text
    content: ' commanded what has been done this day in order to make atonement for you. Stay at the entrance of the Tent of Meeting day and night for seven days. Be sure to do what '
  - type: text
    content: God
  - type: text
    content: ' requires, lest you die. This is what I have been commanded.”'
  '36':
  - type: text
    content: 'Aaron and his sons did everything that '
  - type: text
    content: God
  - type: text
    content: ' had commanded by Moses.'
  '5':
  - type: text
    content: 'Moses addressed the congregation: “This is what '
  - type: text
    content: God
  - type: text
    content: ' has commanded to be done.”'
  '6':
  - type: text
    content: 'Moses brought Aaron and his sons forward and washed them with water. He put the tunic on Aaron and tied it around him with a sash. Then he put the robe on him and placed the Ephod on him. He fastened the Ephod with a woven belt, making it snug. He put the Breastpiece on him and put the Urim and Thummim in the pouch of the Breastpiece. He placed the turban on his head with the gold plate fixed to the front of it, the holy crown, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
