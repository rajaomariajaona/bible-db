document_id: LEV.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If you sin by not stepping up and offering yourself as a witness to something you’ve heard or seen in cases of wrongdoing, you’ll be held responsible.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you cannot afford the two doves or pigeons, bring two quarts of fine flour for your Absolution-Offering. Don’t put oil or incense on it—it’s an Absolution-Offering. Bring it to the priest; he’ll take a handful from it as a memorial and burn it on the Altar with the gifts for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . It’s an Absolution-Offering.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The priest will make atonement for you and any of these sins you’ve committed and you’re forgiven. The rest of the offering belongs to the priest, the same as with the Grain-Offering.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Compensation-Offering
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “When a person betrays his trust and unknowingly sins by straying against any of the holy things of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he is to bring as his penalty to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' a ram without any defect from the flock, the value of the ram assessed in shekels, according to the Sanctuary shekel for a Compensation-Offering. He is to make additional compensation for the sin he has committed against any holy thing by adding twenty percent to the ram and giving it to the priest.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus the priest will make atonement for him with the ram of the Compensation-Offering and he’s forgiven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “If anyone sins by breaking any of the commandments of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' which must not be broken, but without being aware of it at the time, the moment he does realize his guilt he is held responsible. He is to bring to the priest a ram without any defect, assessed at the value of the Compensation-Offering.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “Thus the priest will make atonement for him for his error that he was unaware of and he’s forgiven. It is a Compensation-Offering; he was surely guilty before God.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Or if you touch anything ritually unclean, like the carcass of an unclean animal, wild or domestic, or a dead reptile, and you weren’t aware of it at the time, but you’re contaminated and you’re guilty;
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Or if you touch human uncleanness, any sort of ritually contaminating uncleanness, and you’re not aware of it at the time, but later you realize it and you’re guilty;
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Or if you impulsively swear to do something, whether good or bad—some rash oath that just pops out—and you aren’t aware of what you’ve done at the time, but later you come to realize it and you’re guilty in any of these cases;
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you are guilty, immediately confess the sin that you’ve committed and bring as your penalty to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for the sin you have committed a female lamb or goat from the flock for an Absolution-Offering.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In this way, the priest will make atonement for your sin.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you can’t afford a lamb, bring as your penalty to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for the sin you have committed two doves or two pigeons, one for the Absolution-Offering and the other for the Whole-Burnt-Offering. Bring them to the priest who will first offer the one for the Absolution-Offering: He’ll wring its neck but not sever it, splash some of the blood of the Absolution-Offering against the Altar, and squeeze the rest of it out at the base. It’s an Absolution-Offering. He’ll then take the second bird and offer it as a Whole-Burnt-Offering, following the procedures step-by-step.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In this way, the priest will make atonement for your sin and you’re forgiven.
