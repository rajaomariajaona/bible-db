    children:
    - type: text
      text: 1-8
  - type: text
    text: “Make an Altar of acacia wood. Make it seven and a half feet square and four and a half feet high. Make horns at each of the four corners. The horns are to be of one piece with the Altar and covered with a veneer of bronze. Make buckets for removing the ashes, along with shovels, basins, forks, and fire pans. Make all these utensils from bronze. Make a grate of bronze mesh and attach bronze rings at each of the four corners. Put the grate under the ledge of the Altar at the halfway point of the Altar. Make acacia wood poles for the Altar and cover them with a veneer of bronze. Insert the poles through the rings on the two sides of the Altar for carrying. Use boards to make the Altar, keeping the interior hollow.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Courtyard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: “Make a Courtyard for The Dwelling. The south side is to be 150 feet long. The hangings for the Courtyard are to be woven from fine twisted linen, with their twenty posts, twenty bronze bases, and fastening hooks and bands of silver. The north side is to be exactly the same.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-19
  - type: text
    text: “For the west end of the Courtyard you will need seventy-five feet of hangings with their ten posts and bases. Across the seventy-five feet at the front, or east end, you will need twenty-two and a half feet of hangings, with their three posts and bases on one side and the same for the other side. At the door of the Courtyard make a screen thirty feet long woven from blue, purple, and scarlet stuff, with fine twisted linen, embroidered by a craftsman, and hung on its four posts and bases. All the posts around the Courtyard are to be banded with silver, with hooks of silver and bases of bronze. The Courtyard is to be 150 feet long and seventy-five feet wide. The hangings of fine twisted linen set on their bronze bases are to be seven and a half feet high. All the tools used for setting up The Holy Dwelling, including all the pegs in it and the Courtyard, are to be made of bronze.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: '“Now, order the Israelites to bring you pure, clear olive oil for light so that the lamps can be kept burning. In the Tent of Meeting, the area outside the curtain that veils The Testimony, Aaron and his sons will keep this light burning from evening until morning before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . This is to be a permanent practice down through the generations for Israelites.”
