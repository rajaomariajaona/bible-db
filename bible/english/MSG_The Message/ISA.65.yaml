document_id: ISA.65,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Who Bothered to Reach Out to God
  - type: text
    content: “I’ve made myself available
  - type: text
    content: to those who haven’t bothered to ask.
  - type: text
    content: I’m here, ready to be found
  - type: text
    content: by those who haven’t bothered to look.
  - type: text
    content: I kept saying ‘I’m here, I’m right here’
  - type: text
    content: to a nation that ignored me.
  - type: text
    content: I reached out day after day
  - type: text
    content: to a people who turned their backs on me,
  - type: text
    content: People who make wrong turns,
  - type: text
    content: who insist on doing things their own way.
  - type: text
    content: They get on my nerves,
  - type: text
    content: are rude to my face day after day,
  - type: text
    content: Make up their own kitchen religion,
  - type: text
    content: a potluck religious stew.
  - type: text
    content: They spend the night in tombs
  - type: text
    content: to get messages from the dead,
  - type: text
    content: Eat forbidden foods
  - type: text
    content: and drink a witch’s brew of potions and charms.
  - type: text
    content: They say, ‘Keep your distance.
  - type: text
    content: Don’t touch me. I’m holier than thou.’
  - type: text
    content: These people gag me.
  - type: text
    content: I can’t stand their stench.
  - type: text
    content: Look at this! Their sins are all written out—
  - type: text
    content: I have the list before me.
  - type: text
    content: I’m not putting up with this any longer.
  - type: text
    content: I’ll pay them the wages
  - type: text
    content: They have coming for their sins.
  - type: text
    content: And for the sins of their parents lumped in,
  - type: text
    content: 'a bonus.” '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  - type: text
    content: “Because they’ve practiced their blasphemous worship,
  - type: text
    content: mocking me at their hillside shrines,
  - type: text
    content: I’ll let loose the consequences
  - type: text
    content: and pay them in full for their actions.”
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: '“But you who abandon me, your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: who forget the holy mountains,
  - type: text
    content: Who hold dinners for Lady Luck
  - type: text
    content: and throw cocktail parties for Sir Fate,
  - type: text
    content: 'Well, you asked for it. Fate it will be:'
  - type: text
    content: your destiny, Death.
  - type: text
    content: For when I invited you, you ignored me;
  - type: text
    content: when I spoke to you, you brushed me off.
  - type: text
    content: You did the very things I exposed as evil;
  - type: text
    content: you chose what I hate.”
  '13':
  - type: text
    content: 'Therefore, this is the Message from the Master, '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “My servants will eat,
  - type: text
    content: and you’ll go hungry;
  - type: text
    content: My servants will drink,
  - type: text
    content: and you’ll go thirsty;
  - type: text
    content: My servants will rejoice,
  - type: text
    content: and you’ll hang your heads.
  - type: text
    content: My servants will laugh from full hearts,
  - type: text
    content: and you’ll cry out heartbroken,
  - type: text
    content: yes, wail from crushed spirits.
  - type: text
    content: Your legacy to my chosen
  - type: text
    content: will be your name reduced to a cussword.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', will put you to death'
  - type: text
    content: and give a new name to my servants.
  - type: text
    content: Then whoever prays a blessing in the land
  - type: text
    content: will use my faithful name for the blessing,
  - type: text
    content: And whoever takes an oath in the land
  - type: text
    content: will use my faithful name for the oath,
  - type: text
    content: Because the earlier troubles are gone and forgotten,
  - type: text
    content: banished far from my sight.
  - type: heading
    content: New Heavens and a New Earth
  '17':
  - type: text
    content: '“Pay close attention now:'
  - type: text
    content: I’m creating new heavens and a new earth.
  - type: text
    content: All the earlier troubles, chaos, and pain
  - type: text
    content: are things of the past, to be forgotten.
  - type: text
    content: Look ahead with joy.
  - type: text
    content: 'Anticipate what I’m creating:'
  - type: text
    content: I’ll create Jerusalem as sheer joy,
  - type: text
    content: create my people as pure delight.
  - type: text
    content: I’ll take joy in Jerusalem,
  - type: text
    content: 'take delight in my people:'
  - type: text
    content: No more sounds of weeping in the city,
  - type: text
    content: no cries of anguish;
  - type: text
    content: No more babies dying in the cradle,
  - type: text
    content: or old people who don’t enjoy a full lifetime;
  - type: text
    content: One-hundredth birthdays will be considered normal—
  - type: text
    content: anything less will seem like a cheat.
  - type: text
    content: They’ll build houses
  - type: text
    content: and move in.
  - type: text
    content: They’ll plant fields
  - type: text
    content: and eat what they grow.
  - type: text
    content: No more building a house
  - type: text
    content: that some outsider takes over,
  - type: text
    content: No more planting fields
  - type: text
    content: that some enemy confiscates,
  - type: text
    content: For my people will be as long-lived as trees,
  - type: text
    content: my chosen ones will have satisfaction in their work.
  - type: text
    content: They won’t work and have nothing come of it,
  - type: text
    content: they won’t have children snatched out from under them.
  - type: text
    content: 'For they themselves are plantings blessed by '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'with their children and grandchildren likewise '
  - type: text
    content: God
  - type: text
    content: -blessed.
  - type: text
    content: Before they call out, I’ll answer.
  - type: text
    content: Before they’ve finished speaking, I’ll have heard.
  - type: text
    content: Wolf and lamb will graze the same meadow,
  - type: text
    content: lion and ox eat straw from the same trough,
  - type: text
    content: but snakes—they’ll get a diet of dirt!
  - type: text
    content: Neither animal nor human will hurt or kill
  - type: text
    content: 'anywhere on my Holy Mountain,” says '
  - type: text
    content: God
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “But just as one bad apple doesn’t ruin the whole bushel,
  - type: text
    content: there are still plenty of good apples left.
  - type: text
    content: So I’ll preserve those in Israel who obey me.
  - type: text
    content: I won’t destroy the whole nation.
  - type: text
    content: I’ll bring out my true children from Jacob
  - type: text
    content: and the heirs of my mountains from Judah.
  - type: text
    content: My chosen will inherit the land,
  - type: text
    content: my servants will move in.
  - type: text
    content: The lush valley of Sharon in the west
  - type: text
    content: will be a pasture for flocks,
  - type: text
    content: And in the east, the valley of Achor,
  - type: text
    content: a place for herds to graze.
  - type: text
    content: These will be for the people
  - type: text
    content: who bothered to reach out to me, who wanted me in their lives,
  - type: text
    content: who actually bothered to look for me.
  - type: text
    content: '* * *'
