document_id: ISA.65
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The People Who Bothered to Reach Out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: “I’ve made myself available
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who haven’t bothered to ask.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m here, ready to be found
- type: usfm
  marker: q2
  children:
  - type: text
    text: by those who haven’t bothered to look.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I kept saying ‘I’m here, I’m right here’
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a nation that ignored me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I reached out day after day
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a people who turned their backs on me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: People who make wrong turns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who insist on doing things their own way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They get on my nerves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: are rude to my face day after day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make up their own kitchen religion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a potluck religious stew.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They spend the night in tombs
- type: usfm
  marker: q2
  children:
  - type: text
    text: to get messages from the dead,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eat forbidden foods
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drink a witch’s brew of potions and charms.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say, ‘Keep your distance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t touch me. I’m holier than thou.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: These people gag me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t stand their stench.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at this! Their sins are all written out—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have the list before me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m not putting up with this any longer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll pay them the wages
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have coming for their sins.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And for the sins of their parents lumped in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a bonus.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says so.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because they’ve practiced their blasphemous worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mocking me at their hillside shrines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll let loose the consequences
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pay them in full for their actions.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “But just as one bad apple doesn’t ruin the whole bushel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there are still plenty of good apples left.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I’ll preserve those in Israel who obey me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I won’t destroy the whole nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll bring out my true children from Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heirs of my mountains from Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My chosen will inherit the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my servants will move in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lush valley of Sharon in the west
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be a pasture for flocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the east, the valley of Achor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place for herds to graze.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These will be for the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: who bothered to reach out to me, who wanted me in their lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who actually bothered to look for me.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: '“But you who abandon me, your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: who forget the holy mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who hold dinners for Lady Luck
- type: usfm
  marker: q2
  children:
  - type: text
    text: and throw cocktail parties for Sir Fate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Well, you asked for it. Fate it will be:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your destiny, Death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I invited you, you ignored me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I spoke to you, you brushed me off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You did the very things I exposed as evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you chose what I hate.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: 'Therefore, this is the Message from the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My servants will eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll go hungry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My servants will drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll go thirsty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My servants will rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll hang your heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My servants will laugh from full hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll cry out heartbroken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, wail from crushed spirits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your legacy to my chosen
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be your name reduced to a cussword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will put you to death'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give a new name to my servants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then whoever prays a blessing in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: will use my faithful name for the blessing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whoever takes an oath in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: will use my faithful name for the oath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the earlier troubles are gone and forgotten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: banished far from my sight.
- type: usfm
  marker: s1
  children:
  - type: text
    text: New Heavens and a New Earth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-25
  - type: text
    text: '“Pay close attention now:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m creating new heavens and a new earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the earlier troubles, chaos, and pain
- type: usfm
  marker: q2
  children:
  - type: text
    text: are things of the past, to be forgotten.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look ahead with joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Anticipate what I’m creating:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll create Jerusalem as sheer joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: create my people as pure delight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll take joy in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'take delight in my people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more sounds of weeping in the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no cries of anguish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more babies dying in the cradle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or old people who don’t enjoy a full lifetime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: One-hundredth birthdays will be considered normal—
- type: usfm
  marker: q2
  children:
  - type: text
    text: anything less will seem like a cheat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll build houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and move in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll plant fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eat what they grow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more building a house
- type: usfm
  marker: q2
  children:
  - type: text
    text: that some outsider takes over,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more planting fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: that some enemy confiscates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my people will be as long-lived as trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my chosen ones will have satisfaction in their work.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They won’t work and have nothing come of it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they won’t have children snatched out from under them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For they themselves are plantings blessed by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with their children and grandchildren likewise '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -blessed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before they call out, I’ll answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before they’ve finished speaking, I’ll have heard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wolf and lamb will graze the same meadow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lion and ox eat straw from the same trough,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but snakes—they’ll get a diet of dirt!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither animal nor human will hurt or kill
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'anywhere on my Holy Mountain,” says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
