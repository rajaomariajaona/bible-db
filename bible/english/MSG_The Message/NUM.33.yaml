document_id: NUM.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Campsites from Rameses to Jordan-Jericho
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'These are the camping sites in the journey of the People of Israel after they left Egypt, deployed militarily under the command of Moses and Aaron. Under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s instruction Moses kept a log of every time they moved, camp by camp:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'They marched out of Rameses the day after the Passover. It was the fifteenth day of the first month. They marched out heads high and confident. The Egyptians, busy burying their firstborn whom '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had killed, watched them go. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had exposed the nonsense of their gods.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-36
  - type: text
    text: 'The People of Israel:'
- type: usfm
  marker: p
  children:
  - type: text
    text: left Rameses and camped at Succoth;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Succoth and camped at Etham at the edge of the wilderness;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Etham, circled back to Pi Hahiroth east of Baal Zephon, and camped near Migdol;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Pi Hahiroth and crossed through the Sea into the wilderness; three days into the Wilderness of Etham they camped at Marah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Marah and came to Elim where there were twelve springs and seventy palm trees; they camped there;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Elim and camped by the Red Sea;
- type: usfm
  marker: p
  children:
  - type: text
    text: left the Red Sea and camped in the Wilderness of Sin;
- type: usfm
  marker: p
  children:
  - type: text
    text: left the Wilderness of Sin and camped at Dophkah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Dophkah and camped at Alush;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Alush and camped at Rephidim where there was no water for the people to drink;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Rephidim and camped in the Wilderness of Sinai;
- type: usfm
  marker: p
  children:
  - type: text
    text: left the Wilderness of Sinai and camped at Kibroth Hattaavah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Kibroth Hattaavah and camped at Hazeroth;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Hazeroth and camped at Rithmah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Rithmah and camped at Rimmon Perez;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Rimmon Perez and camped at Libnah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Libnah and camped at Rissah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Rissah and camped at Kehelathah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Kehelathah and camped at Mount Shepher;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Mount Shepher and camped at Haradah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Haradah and camped at Makheloth;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Makheloth and camped at Tahath;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Tahath and camped at Terah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Terah and camped at Mithcah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Mithcah and camped at Hashmonah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Hashmonah and camped at Moseroth;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Moseroth and camped at Bene Jaakan;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Bene Jaakan and camped at Hor Haggidgad;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Hor Haggidgad and camped at Jotbathah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Jotbathah and camped at Abronah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Abronah and camped at Ezion Geber;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Ezion Geber and camped at Kadesh in the Wilderness of Zin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-39
  - type: text
    text: 'After they left Kadesh and camped at Mount Hor at the border of Edom, Aaron the priest climbed Mount Hor at '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s command and died there. It was the first day of the fifth month in the fortieth year after the People of Israel had left Egypt. Aaron was 123 years old when he died on Mount Hor.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The Canaanite king of Arad—he ruled in the Negev of Canaan—heard that the People of Israel had arrived.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-47
  - type: text
    text: They left Mount Hor and camped at Zalmonah;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Zalmonah and camped at Punon;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Punon and camped at Oboth;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Oboth and camped at Iye Abarim on the border of Moab;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Iyim and camped at Dibon Gad;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Dibon Gad and camped at Almon Diblathaim;
- type: usfm
  marker: p
  children:
  - type: text
    text: left Almon Diblathaim and camped in the mountains of Abarim (Across-the-River), within sight of Nebo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 48-49
  - type: text
    text: After they left the mountains of Abarim they camped on the Plains of Moab at Jordan-Jericho. On the Plains of Moab their camp stretched along the banks of the Jordan from Beth Jeshimoth to Abel Shittim (Acacia Meadow).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 50-53
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses on the Plains of Moab at Jordan-Jericho: “Tell the People of Israel, When you cross the Jordan into the country of Canaan, drive out the native population before you, destroy their carved idols, destroy their cast images, level their worship-mounds so that you take over the land and make yourself at home in it; I’ve given it to you. It’s yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: '“Divide up the land by lot according to the size of your clans: Large clans will get large tracts of land, small clans will get smaller tracts of land. However the lot falls, that’s it. Divide it up according to your ancestral tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 55-56
  - type: text
    text: “But if you don’t drive out the native population, everyone you let stay there will become a cinder in your eye and a splinter in your foot. They’ll give you endless trouble right in your own backyards. And I’ll start treating you the way I planned to treat them.”
