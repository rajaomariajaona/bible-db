document_id: NUM.33,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Campsites from Rameses to Jordan-Jericho
  - type: text
    content: 'These are the camping sites in the journey of the People of Israel after they left Egypt, deployed militarily under the command of Moses and Aaron. Under '
  - type: text
    content: God
  - type: text
    content: '’s instruction Moses kept a log of every time they moved, camp by camp:'
  '3':
  - type: text
    content: 'They marched out of Rameses the day after the Passover. It was the fifteenth day of the first month. They marched out heads high and confident. The Egyptians, busy burying their firstborn whom '
  - type: text
    content: God
  - type: text
    content: ' had killed, watched them go. '
  - type: text
    content: God
  - type: text
    content: ' had exposed the nonsense of their gods.'
  '37':
  - type: text
    content: 'After they left Kadesh and camped at Mount Hor at the border of Edom, Aaron the priest climbed Mount Hor at '
  - type: text
    content: God
  - type: text
    content: ’s command and died there. It was the first day of the fifth month in the fortieth year after the People of Israel had left Egypt. Aaron was 123 years old when he died on Mount Hor.
  - type: text
    content: '* * *'
  '40':
  - type: text
    content: The Canaanite king of Arad—he ruled in the Negev of Canaan—heard that the People of Israel had arrived.
  '41':
  - type: text
    content: They left Mount Hor and camped at Zalmonah;
  - type: text
    content: left Zalmonah and camped at Punon;
  - type: text
    content: left Punon and camped at Oboth;
  - type: text
    content: left Oboth and camped at Iye Abarim on the border of Moab;
  - type: text
    content: left Iyim and camped at Dibon Gad;
  - type: text
    content: left Dibon Gad and camped at Almon Diblathaim;
  - type: text
    content: left Almon Diblathaim and camped in the mountains of Abarim (Across-the-River), within sight of Nebo.
  '48':
  - type: text
    content: After they left the mountains of Abarim they camped on the Plains of Moab at Jordan-Jericho. On the Plains of Moab their camp stretched along the banks of the Jordan from Beth Jeshimoth to Abel Shittim (Acacia Meadow).
  '5':
  - type: text
    content: 'The People of Israel:'
  - type: text
    content: left Rameses and camped at Succoth;
  - type: text
    content: left Succoth and camped at Etham at the edge of the wilderness;
  - type: text
    content: left Etham, circled back to Pi Hahiroth east of Baal Zephon, and camped near Migdol;
  - type: text
    content: left Pi Hahiroth and crossed through the Sea into the wilderness; three days into the Wilderness of Etham they camped at Marah;
  - type: text
    content: left Marah and came to Elim where there were twelve springs and seventy palm trees; they camped there;
  - type: text
    content: left Elim and camped by the Red Sea;
  - type: text
    content: left the Red Sea and camped in the Wilderness of Sin;
  - type: text
    content: left the Wilderness of Sin and camped at Dophkah;
  - type: text
    content: left Dophkah and camped at Alush;
  - type: text
    content: left Alush and camped at Rephidim where there was no water for the people to drink;
  - type: text
    content: left Rephidim and camped in the Wilderness of Sinai;
  - type: text
    content: left the Wilderness of Sinai and camped at Kibroth Hattaavah;
  - type: text
    content: left Kibroth Hattaavah and camped at Hazeroth;
  - type: text
    content: left Hazeroth and camped at Rithmah;
  - type: text
    content: left Rithmah and camped at Rimmon Perez;
  - type: text
    content: left Rimmon Perez and camped at Libnah;
  - type: text
    content: left Libnah and camped at Rissah;
  - type: text
    content: left Rissah and camped at Kehelathah;
  - type: text
    content: left Kehelathah and camped at Mount Shepher;
  - type: text
    content: left Mount Shepher and camped at Haradah;
  - type: text
    content: left Haradah and camped at Makheloth;
  - type: text
    content: left Makheloth and camped at Tahath;
  - type: text
    content: left Tahath and camped at Terah;
  - type: text
    content: left Terah and camped at Mithcah;
  - type: text
    content: left Mithcah and camped at Hashmonah;
  - type: text
    content: left Hashmonah and camped at Moseroth;
  - type: text
    content: left Moseroth and camped at Bene Jaakan;
  - type: text
    content: left Bene Jaakan and camped at Hor Haggidgad;
  - type: text
    content: left Hor Haggidgad and camped at Jotbathah;
  - type: text
    content: left Jotbathah and camped at Abronah;
  - type: text
    content: left Abronah and camped at Ezion Geber;
  - type: text
    content: left Ezion Geber and camped at Kadesh in the Wilderness of Zin.
  '50':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses on the Plains of Moab at Jordan-Jericho: “Tell the People of Israel, When you cross the Jordan into the country of Canaan, drive out the native population before you, destroy their carved idols, destroy their cast images, level their worship-mounds so that you take over the land and make yourself at home in it; I’ve given it to you. It’s yours.'
  '54':
  - type: text
    content: '“Divide up the land by lot according to the size of your clans: Large clans will get large tracts of land, small clans will get smaller tracts of land. However the lot falls, that’s it. Divide it up according to your ancestral tribes.'
  '55':
  - type: text
    content: “But if you don’t drive out the native population, everyone you let stay there will become a cinder in your eye and a splinter in your foot. They’ll give you endless trouble right in your own backyards. And I’ll start treating you the way I planned to treat them.”
