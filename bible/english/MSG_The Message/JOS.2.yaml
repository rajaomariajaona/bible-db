document_id: JOS.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rahab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joshua son of Nun secretly sent out from Shittim two men as spies: “Go. Look over the land. Check out Jericho.” They left and arrived at the house of a harlot named Rahab and stayed there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The king of Jericho was told, “We’ve just learned that men arrived tonight to spy out the land. They’re from the People of Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The king of Jericho sent word to Rahab: “Bring out the men who came to you to stay the night in your house. They’re spies; they’ve come to spy out the whole country.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: The woman had taken the two men and hidden them. She said, “Yes, two men did come to me, but I didn’t know where they’d come from. At dark, when the gate was about to be shut, the men left. But I have no idea where they went. Hurry up! Chase them—you can still catch them!” (She had actually taken them up on the roof and hidden them under the stalks of flax that were spread out for her on the roof.) So the men gave chase down the Jordan road toward the fords. As soon as they were gone, the gate was shut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: 'Before the spies were down for the night, the woman came up to them on the roof and said, “I know that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given you the land. We’re all afraid. Everyone in the country feels hopeless. We heard how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' dried up the waters of the Red Sea before you when you left Egypt, and what he did to the two Amorite kings east of the Jordan, Sihon and Og, whom you put under a holy curse and destroyed. We heard it and our hearts sank. We all had the wind knocked out of us. And all because of you, you and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, God of the heavens above and God of the earth below.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: '“Now promise me by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . I showed you mercy; now show my family mercy. And give me some tangible proof, a guarantee of life for my father and mother, my brothers and sisters—everyone connected with my family. Save our souls from death!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Our lives for yours!” said the men. “But don’t tell anyone our business. When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turns this land over to us, we’ll do right by you in loyal mercy.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: She lowered them down out a window with a rope because her house was on the city wall to the outside. She told them, “Run for the hills so your pursuers won’t find you. Hide out for three days and give your pursuers time to return. Then get on your way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: 'The men told her, “In order to keep this oath you made us swear, here is what you must do: Hang this red rope out the window through which you let us down and gather your entire family with you in your house—father, mother, brothers, and sisters. Anyone who goes out the doors of your house into the street and is killed, it’s his own fault—we aren’t responsible. But for everyone within the house we take full responsibility. If anyone lays a hand on one of them, it’s our fault. But if you tell anyone of our business here, the oath you made us swear is canceled—we’re no longer responsible.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She said, “If that’s what you say, that’s the way it is,” and sent them off. They left and she hung the red rope out the window.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They headed for the hills and stayed there for three days until the pursuers had returned. The pursuers had looked high and low but found nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'The men headed back. They came down out of the hills, crossed the river, and returned to Joshua son of Nun and reported all their experiences. They told Joshua, “Yes! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given the whole country to us. Everybody there is in a state of panic because of us.”'
