segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aaron’s Staff
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses: “Speak to the People of Israel. Get staffs from them—twelve staffs in all, one from the leader of each of their ancestral tribes. Write each man’s name on his staff. Start with Aaron; write Aaron’s name on the staff of Levi and then proceed with the rest, a staff for the leader of each ancestral tribe. Now lay them out in the Tent of Meeting in front of The Testimony where I keep appointments with you. What will happen next is this: The staff of the man I choose will sprout. I’m going to put a stop to this endless grumbling by the People of Israel against you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Moses spoke to the People of Israel. Their leaders handed over twelve staffs, one for the leader of each tribe. And Aaron’s staff was one of them. Moses laid out the staffs before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the Tent of Testimony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Moses walked into the Tent of Testimony the next day and saw that Aaron’s staff, the staff of the tribe of Levi, had in fact sprouted—buds, blossoms, and even ripe almonds! Moses brought out all the staffs from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s presence and presented them to the People of Israel. They took a good look. Each leader took the staff with his name on it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Return Aaron’s staff to the front of The Testimony. Keep it there as a sign to rebels. This will put a stop to the grumbling against me and save their lives.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moses did just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'The People of Israel said to Moses, “We’re as good as dead. This is our death sentence. Anyone who even gets close to The Dwelling of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is as good as dead. Are we all doomed?”'
