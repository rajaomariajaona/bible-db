document_id: GEN.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: The two angels arrived at Sodom in the evening. Lot was sitting at the city gate. He saw them and got up to welcome them, bowing before them and said, “Please, my friends, come to my house and stay the night. Wash up. You can rise early and be on your way refreshed.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They said, “No, we’ll sleep in the street.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But he insisted, wouldn’t take no for an answer; and they relented and went home with him. Lot fixed a hot meal for them and they ate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Before they went to bed, men from all over the city of Sodom, young and old, descended on the house from all sides and boxed them in. They yelled to Lot, “Where are the men who are staying with you for the night? Bring them out so we can have our sport with them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: Lot went out, barring the door behind him, and said, “Brothers, please, don’t be vile! Look, I have two daughters, virgins; let me bring them out; you can take your pleasure with them, but don’t touch these men—they’re my guests.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They said, “Get lost! You drop in from nowhere and now you’re going to tell us how to run our lives. We’ll treat you worse than them!” And they charged past Lot to break down the door.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: But the two men reached out and pulled Lot inside the house, locking the door. Then they struck blind the men who were trying to break down the door, both leaders and followers, leaving them groping in the dark.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'The two men said to Lot, “Do you have any other family here? Sons, daughters—anybody in the city? Get them out of here, and now! We’re going to destroy this place. The outcries of victims here to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' are deafening; we’ve been sent to blast this place into oblivion.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lot went out and warned the fiancés of his daughters, “Evacuate this place; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is about to destroy this city!” But his daughters’ would-be husbands treated it as a joke.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: At break of day, the angels pushed Lot to get going, “Hurry. Get your wife and two daughters out of here before it’s too late and you’re caught in the punishment of the city.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Lot was dragging his feet. The men grabbed Lot’s arm, and the arms of his wife and daughters—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was so merciful to them!—and dragged them to safety outside the city. When they had them outside, Lot was told, “Now run for your life! Don’t look back! Don’t stop anywhere on the plain—run for the hills or you’ll be swept away.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: But Lot protested, “No, masters, you can’t mean it! I know that you’ve taken a liking to me and have done me an immense favor in saving my life, but I can’t run for the mountains—who knows what terrible thing might happen to me in the mountains and leave me for dead. Look over there—that town is close enough to get to. It’s a small town, hardly anything to it. Let me escape there and save my life—it’s a mere wide place in the road.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “All right, Lot. If you insist. I’ll let you have your way. And I won’t stamp out the town you’ve spotted. But hurry up. Run for it! I can’t do anything until you get there.” That’s why the town was called Zoar, that is, Smalltown.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The sun was high in the sky when Lot arrived at Zoar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rained brimstone and fire down on Sodom and Gomorrah—a river of lava from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' out of the sky!—and destroyed these cities and the entire plain and everyone who lived in the cities and everything that grew from the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But Lot’s wife looked back and turned into a pillar of salt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: 'Abraham got up early the next morning and went to the place he had so recently stood with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . He looked out over Sodom and Gomorrah, surveying the whole plain. All he could see was smoke belching from the Earth, like smoke from a furnace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And that’s the story: When God destroyed the Cities of the Plain, he was mindful of Abraham and first got Lot out of there before he blasted those cities off the face of the Earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Lot left Zoar and went into the mountains to live with his two daughters; he was afraid to stay in Zoar. He lived in a cave with his daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: One day the older daughter said to the younger, “Our father is getting old and there’s not a man left in the country by whom we can get pregnant. Let’s get our father drunk with wine and lie with him. We’ll get children through our father—it’s our only chance to keep our family alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-35
  - type: text
    text: They got their father drunk with wine that very night. The older daughter went and lay with him. He was oblivious, knowing nothing of what she did. The next morning the older said to the younger, “Last night I slept with my father. Tonight, it’s your turn. We’ll get him drunk again and then you sleep with him. We’ll both get a child through our father and keep our family alive.” So that night they got their father drunk again and the younger went in and slept with him. Again he was oblivious, knowing nothing of what she did.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: Both daughters became pregnant by their father, Lot. The older daughter had a son and named him Moab, the ancestor of the present-day Moabites. The younger daughter had a son and named him Ben-Ammi, the ancestor of the present-day Ammonites.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
