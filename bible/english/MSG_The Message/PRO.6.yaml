verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Like a Deer from the Hunter
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dear friend, if you’ve gone into hock with your neighbor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or locked yourself into a deal with a stranger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’ve impulsively promised the shirt off your back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now find yourself shivering out in the cold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Friend, don’t waste a minute, get yourself out of that mess.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re in that man’s clutches!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go, put on a long face; act desperate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t procrastinate—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there’s no time to lose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Run like a deer from the hunter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fly like a bird from the trapper!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lesson from the Ant
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swindlers and scoundrels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: talk out of both sides of their mouths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wink at each other, they shuffle their feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cross their fingers behind their backs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their perverse minds are always cooking up something nasty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: always stirring up trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Catastrophe is just around the corner for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a total wreck, their lives ruined beyond repair.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Seven Things '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Hates'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here are six things '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hates,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and one more that he loathes with a passion:'
  - type: usfm
    marker: q3
    children:
    - type: text
      text: eyes that are arrogant,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a tongue that lies,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: hands that murder the innocent,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a heart that hatches evil plots,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: feet that race down a wicked track,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a mouth that lies under oath,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a troublemaker in the family.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning on Adultery
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good friend, follow your father’s good advice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t wander off from your mother’s teachings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrap yourself in them from head to foot;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wear them like a scarf around your neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherever you walk, they’ll guide you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whenever you rest, they’ll guard you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you wake up, they’ll tell you what’s next.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For sound advice is a beacon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good teaching is a light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: moral discipline is a life path.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll protect you from promiscuous women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the seductive talk of some temptress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t lustfully fantasize on her beauty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor be taken in by her bedroom eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can buy an hour with a prostitute for a loaf of bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but a promiscuous woman may well eat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' alive.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you build a fire in your lap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not burn your pants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you walk barefoot on hot coals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not get blisters?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s the same when you have sex with your neighbor’s wife:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Touch her and you’ll pay for it. No excuses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hunger is no excuse
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a thief to steal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he’s caught he has to pay it back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even if he has to put his whole house in hock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adultery is a brainless act,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soul-destroying, self-destructive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Expect a bloody nose, a black eye,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a reputation ruined for good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For jealousy detonates rage in a cheated husband;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild for revenge, he won’t make allowances.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing you say or pay will make it all right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither bribes nor reason will satisfy him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You lazy fool, look at an ant.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Watch it closely; let it teach you a thing or two.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody has to tell it what to do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All summer it stores up food;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at harvest it stockpiles provisions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how long are you going to laze around doing nothing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long before you get out of bed?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A nap here, a nap there, a day off here, a day off there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sit back, take it easy—do you know what comes next?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Just this: You can look forward to a dirt-poor life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poverty your permanent houseguest!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Always Cooking Up Something Nasty
    marker-yv: yv-h
