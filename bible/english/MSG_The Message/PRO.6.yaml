document_id: PRO.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Like a Deer from the Hunter
  - type: text
    content: Dear friend, if you’ve gone into hock with your neighbor
  - type: text
    content: or locked yourself into a deal with a stranger,
  - type: text
    content: If you’ve impulsively promised the shirt off your back
  - type: text
    content: and now find yourself shivering out in the cold,
  - type: text
    content: Friend, don’t waste a minute, get yourself out of that mess.
  - type: text
    content: You’re in that man’s clutches!
  - type: text
    content: Go, put on a long face; act desperate.
  - type: text
    content: Don’t procrastinate—
  - type: text
    content: there’s no time to lose.
  - type: text
    content: Run like a deer from the hunter,
  - type: text
    content: fly like a bird from the trapper!
  - type: heading
    content: A Lesson from the Ant
  '12':
  - type: text
    content: Swindlers and scoundrels
  - type: text
    content: talk out of both sides of their mouths.
  - type: text
    content: They wink at each other, they shuffle their feet,
  - type: text
    content: they cross their fingers behind their backs.
  - type: text
    content: Their perverse minds are always cooking up something nasty,
  - type: text
    content: always stirring up trouble.
  - type: text
    content: Catastrophe is just around the corner for them,
  - type: text
    content: a total wreck, their lives ruined beyond repair.
  - type: heading
    content: Seven Things God Hates
  '16':
  - type: text
    content: 'Here are six things '
  - type: text
    content: God
  - type: text
    content: ' hates,'
  - type: text
    content: 'and one more that he loathes with a passion:'
  - type: text
    content: eyes that are arrogant,
  - type: text
    content: a tongue that lies,
  - type: text
    content: hands that murder the innocent,
  - type: text
    content: a heart that hatches evil plots,
  - type: text
    content: feet that race down a wicked track,
  - type: text
    content: a mouth that lies under oath,
  - type: text
    content: a troublemaker in the family.
  - type: heading
    content: Warning on Adultery
  '20':
  - type: text
    content: Good friend, follow your father’s good advice;
  - type: text
    content: don’t wander off from your mother’s teachings.
  - type: text
    content: Wrap yourself in them from head to foot;
  - type: text
    content: wear them like a scarf around your neck.
  - type: text
    content: Wherever you walk, they’ll guide you;
  - type: text
    content: whenever you rest, they’ll guard you;
  - type: text
    content: when you wake up, they’ll tell you what’s next.
  - type: text
    content: For sound advice is a beacon,
  - type: text
    content: good teaching is a light,
  - type: text
    content: moral discipline is a life path.
  '24':
  - type: text
    content: They’ll protect you from promiscuous women,
  - type: text
    content: from the seductive talk of some temptress.
  - type: text
    content: Don’t lustfully fantasize on her beauty,
  - type: text
    content: nor be taken in by her bedroom eyes.
  - type: text
    content: You can buy an hour with a prostitute for a loaf of bread,
  - type: text
    content: 'but a promiscuous woman may well eat '
  - type: text
    content: you
  - type: text
    content: ' alive.'
  - type: text
    content: Can you build a fire in your lap
  - type: text
    content: and not burn your pants?
  - type: text
    content: Can you walk barefoot on hot coals
  - type: text
    content: and not get blisters?
  - type: text
    content: 'It’s the same when you have sex with your neighbor’s wife:'
  - type: text
    content: Touch her and you’ll pay for it. No excuses.
  - type: text
    content: Hunger is no excuse
  - type: text
    content: for a thief to steal;
  - type: text
    content: When he’s caught he has to pay it back,
  - type: text
    content: even if he has to put his whole house in hock.
  - type: text
    content: Adultery is a brainless act,
  - type: text
    content: soul-destroying, self-destructive;
  - type: text
    content: Expect a bloody nose, a black eye,
  - type: text
    content: and a reputation ruined for good.
  - type: text
    content: For jealousy detonates rage in a cheated husband;
  - type: text
    content: wild for revenge, he won’t make allowances.
  - type: text
    content: Nothing you say or pay will make it all right;
  - type: text
    content: neither bribes nor reason will satisfy him.
  '6':
  - type: text
    content: You lazy fool, look at an ant.
  - type: text
    content: Watch it closely; let it teach you a thing or two.
  - type: text
    content: Nobody has to tell it what to do.
  - type: text
    content: All summer it stores up food;
  - type: text
    content: at harvest it stockpiles provisions.
  - type: text
    content: So how long are you going to laze around doing nothing?
  - type: text
    content: How long before you get out of bed?
  - type: text
    content: A nap here, a nap there, a day off here, a day off there,
  - type: text
    content: sit back, take it easy—do you know what comes next?
  - type: text
    content: 'Just this: You can look forward to a dirt-poor life,'
  - type: text
    content: poverty your permanent houseguest!
  - type: heading
    content: Always Cooking Up Something Nasty
