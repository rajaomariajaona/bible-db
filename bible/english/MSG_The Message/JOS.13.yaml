document_id: JOS.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Receiving of the Land
  - type: text
    content: ' When Joshua had reached a venerable age, '
  - type: text
    content: God
  - type: text
    content: ' said to him, “You’ve had a good, long life, but there is a lot of land still to be taken. This is the land that remains:'
  - type: text
    content: all the districts of the Philistines and Geshurites;
  - type: text
    content: the land from the Shihor River east of Egypt to the border of Ekron up north, Canaanite country (there were five Philistine tyrants—in Gaza, in Ashdod, in Ashkelon, in Gath, in Ekron); also the Avvim from the south;
  - type: text
    content: all the Canaanite land from Arah (belonging to the Sidonians) to Aphek at the Amorite border;
  - type: text
    content: the country of the Gebalites;
  - type: text
    content: all Lebanon eastward from Baal Gad in the shadow of Mount Hermon to the Entrance of Hamath;
  - type: text
    content: all who live in the mountains, from Lebanon to Misrephoth Maim;
  - type: text
    content: all the Sidonians.
  '14':
  - type: text
    content: 'Levi was the only tribe that did not receive an inheritance. The Fire-Gift-Offerings to '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, are their inheritance, just as he told them.'
  - type: heading
    content: Reuben
  '15':
  - type: text
    content: 'To the tribe of Reuben, clan by clan, Moses gave:'
  - type: text
    content: the land from Aroer at the edge of the Arnon Gorge and the town in the middle of the valley, including the tableland around Medeba;
  - type: text
    content: Heshbon on the tableland with all its towns (Dibon, Bamoth Baal, Beth Baal Meon, Jahaz, Kedemoth, Mephaath, Kiriathaim, Sibmah, Zereth Shahar on Valley Mountain, Beth Peor, the slopes of Pisgah, Beth Jeshimoth);
  - type: text
    content: 'and all the cities of the tableland, the whole kingdom of Sihon king of the Amorites, who ruled at Heshbon, whom Moses put to death along with the princes of Midian: Evi, Rekem, Zur, Hur, and Reba, who lived in that country, all puppets of Sihon. (In addition to those killed in battle, Balaam son of Beor, the soothsayer, was put to death by the People of Israel.)'
  '23':
  - type: text
    content: The boundary for the Reubenites was the bank of the Jordan River. This was the inheritance of the Reubenites, their villages and cities, according to their clans.
  - type: heading
    content: Gad
  '24':
  - type: text
    content: 'To the tribe of Gad, clan by clan, Moses gave:'
  - type: text
    content: the territory of Jazer and all the towns of Gilead and half the Ammonite country as far as Aroer near Rabbah;
  - type: text
    content: the land from Heshbon to Ramath Mizpah and Betonim, and from Mahanaim to the region of Debir;
  - type: text
    content: 'in the valley: Beth Haram, Beth Nimrah, Succoth, and Zaphon, with the rest of the kingdom of Sihon king of Heshbon (the east side of the Jordan, north to the end of the Sea of Kinnereth).'
  '28':
  - type: text
    content: This was the inheritance of the Gadites, their cities and villages, clan by clan.
  - type: heading
    content: Half-Tribe of Manasseh
  '29':
  - type: text
    content: 'To the half-tribe of Manasseh, clan by clan, Moses gave:'
  - type: text
    content: the land stretching out from Mahanaim;
  - type: text
    content: all of Bashan, which is the entire kingdom of Og king of Bashan, and all the settlements of Jair in Bashan—sixty towns in all.
  - type: text
    content: Half of Gilead with Ashtaroth and Edrei, the royal cities of Og in Bashan, belong to the descendants of Makir, a son of Manasseh (in other words, the half-tribe of the children of Makir) for their clans.
  '32':
  - type: text
    content: 'This is the inheritance that Moses gave out when he was on the plains of Moab across the Jordan east of Jericho. But Moses gave no inheritance to the tribe of Levi. '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, is their inheritance, just as he told them.'
  '6':
  - type: text
    content: ' “I myself will drive them out before the People of Israel. All you have to do is allot this land to Israel as an inheritance, as I have instructed you. Do it now: Allot this land as an inheritance to the nine tribes and the half-tribe of Manasseh.”'
  - type: heading
    content: Land East of the Jordan
  '8':
  - type: text
    content: 'The other half-tribe of Manasseh, with the Reubenites and Gadites, had been given their inheritance by Moses on the other side of the Jordan eastward. Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' gave it to them.'
  '9':
  - type: text
    content: This land extended from Aroer at the edge of the Arnon Gorge and the city in the middle of the valley, taking in the entire tableland of Medeba as far as Dibon, and all the towns of Sihon king of the Amorites, who ruled from Heshbon, and out to the border of the Ammonites. It also included Gilead, the country of the people of Geshur and Maacah, all of Mount Hermon, and all Bashan as far as Salecah—the whole kingdom of Og in Bashan, who reigned in Ashtaroth and Edrei. He was one of the last survivors of the Rephaim. Moses had defeated them and taken their land. The People of Israel never did drive out the Geshurites and the Maacathites—they’re still there, living in Israel.
