document_id: JOS.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Receiving of the Land
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' When Joshua had reached a venerable age, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to him, “You’ve had a good, long life, but there is a lot of land still to be taken. This is the land that remains:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all the districts of the Philistines and Geshurites;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the land from the Shihor River east of Egypt to the border of Ekron up north, Canaanite country (there were five Philistine tyrants—in Gaza, in Ashdod, in Ashkelon, in Gath, in Ekron); also the Avvim from the south;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all the Canaanite land from Arah (belonging to the Sidonians) to Aphek at the Amorite border;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the country of the Gebalites;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all Lebanon eastward from Baal Gad in the shadow of Mount Hermon to the Entrance of Hamath;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all who live in the mountains, from Lebanon to Misrephoth Maim;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all the Sidonians.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Levi was the only tribe that did not receive an inheritance. The Fire-Gift-Offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, are their inheritance, just as he told them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reuben
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'To the tribe of Reuben, clan by clan, Moses gave:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the land from Aroer at the edge of the Arnon Gorge and the town in the middle of the valley, including the tableland around Medeba;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Heshbon on the tableland with all its towns (Dibon, Bamoth Baal, Beth Baal Meon, Jahaz, Kedemoth, Mephaath, Kiriathaim, Sibmah, Zereth Shahar on Valley Mountain, Beth Peor, the slopes of Pisgah, Beth Jeshimoth);
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'and all the cities of the tableland, the whole kingdom of Sihon king of the Amorites, who ruled at Heshbon, whom Moses put to death along with the princes of Midian: Evi, Rekem, Zur, Hur, and Reba, who lived in that country, all puppets of Sihon. (In addition to those killed in battle, Balaam son of Beor, the soothsayer, was put to death by the People of Israel.)'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The boundary for the Reubenites was the bank of the Jordan River. This was the inheritance of the Reubenites, their villages and cities, according to their clans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gad
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'To the tribe of Gad, clan by clan, Moses gave:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the territory of Jazer and all the towns of Gilead and half the Ammonite country as far as Aroer near Rabbah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the land from Heshbon to Ramath Mizpah and Betonim, and from Mahanaim to the region of Debir;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'in the valley: Beth Haram, Beth Nimrah, Succoth, and Zaphon, with the rest of the kingdom of Sihon king of Heshbon (the east side of the Jordan, north to the end of the Sea of Kinnereth).'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This was the inheritance of the Gadites, their cities and villages, clan by clan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Half-Tribe of Manasseh
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'To the half-tribe of Manasseh, clan by clan, Moses gave:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the land stretching out from Mahanaim;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: all of Bashan, which is the entire kingdom of Og king of Bashan, and all the settlements of Jair in Bashan—sixty towns in all.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Half of Gilead with Ashtaroth and Edrei, the royal cities of Og in Bashan, belong to the descendants of Makir, a son of Manasseh (in other words, the half-tribe of the children of Makir) for their clans.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the inheritance that Moses gave out when he was on the plains of Moab across the Jordan east of Jericho. But Moses gave no inheritance to the tribe of Levi. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, is their inheritance, just as he told them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “I myself will drive them out before the People of Israel. All you have to do is allot this land to Israel as an inheritance, as I have instructed you. Do it now: Allot this land as an inheritance to the nine tribes and the half-tribe of Manasseh.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Land East of the Jordan
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The other half-tribe of Manasseh, with the Reubenites and Gadites, had been given their inheritance by Moses on the other side of the Jordan eastward. Moses the servant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave it to them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This land extended from Aroer at the edge of the Arnon Gorge and the city in the middle of the valley, taking in the entire tableland of Medeba as far as Dibon, and all the towns of Sihon king of the Amorites, who ruled from Heshbon, and out to the border of the Ammonites. It also included Gilead, the country of the people of Geshur and Maacah, all of Mount Hermon, and all Bashan as far as Salecah—the whole kingdom of Og in Bashan, who reigned in Ashtaroth and Edrei. He was one of the last survivors of the Rephaim. Moses had defeated them and taken their land. The People of Israel never did drive out the Geshurites and the Maacathites—they’re still there, living in Israel.
