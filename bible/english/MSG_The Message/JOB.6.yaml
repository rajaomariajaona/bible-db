document_id: JOB.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Replies to Eliphaz
  - type: heading
    content: God Has Dumped the Works on Me
  - type: text
    content: 'Job answered:'
  - type: text
    content: “If my misery could be weighed,
  - type: text
    content: if you could pile the whole bitter load on the scales,
  - type: text
    content: It would be heavier than all the sand of the sea!
  - type: text
    content: Is it any wonder that I’m howling like a caged cat?
  - type: text
    content: The arrows of God Almighty are in me,
  - type: text
    content: poison arrows—and I’m poisoned all through!
  - type: text
    content: God has dumped the whole works on me.
  - type: text
    content: Donkeys bray and cows moo when they run out of pasture—
  - type: text
    content: so don’t expect me to keep quiet in this.
  - type: text
    content: Do you see what God has dished out for me?
  - type: text
    content: It’s enough to turn anyone’s stomach!
  - type: text
    content: Everything in me is repulsed by it—
  - type: text
    content: it makes me sick.
  - type: heading
    content: Pressed Past the Limits
  '14':
  - type: text
    content: “When desperate people give up on God Almighty,
  - type: text
    content: their friends, at least, should stick with them.
  - type: text
    content: But my brothers are fickle as a gulch in the desert—
  - type: text
    content: one day they’re gushing with water
  - type: text
    content: From melting ice and snow
  - type: text
    content: cascading out of the mountains,
  - type: text
    content: But by midsummer they’re dry,
  - type: text
    content: gullies baked dry in the sun.
  - type: text
    content: Travelers who spot them and go out of their way for a drink
  - type: text
    content: end up in a waterless gulch and die of thirst.
  - type: text
    content: Merchant caravans from Tema see them and expect water,
  - type: text
    content: tourists from Sheba hope for a cool drink.
  - type: text
    content: They arrive so confident—but what a disappointment!
  - type: text
    content: They get there, and their faces fall!
  - type: text
    content: And you, my so-called friends, are no better—
  - type: text
    content: there’s nothing to you!
  - type: text
    content: One look at a hard scene and you shrink in fear.
  - type: text
    content: It’s not as though I asked you for anything—
  - type: text
    content: I didn’t ask you for one red cent—
  - type: text
    content: Nor did I beg you to go out on a limb for me.
  - type: text
    content: So why all this dodging and shuffling?
  '24':
  - type: text
    content: “Confront me with the truth and I’ll shut up,
  - type: text
    content: show me where I’ve gone off the track.
  - type: text
    content: Honest words never hurt anyone,
  - type: text
    content: but what’s the point of all this pious bluster?
  - type: text
    content: You pretend to tell me what’s wrong with my life,
  - type: text
    content: but treat my words of anguish as so much hot air.
  - type: text
    content: Are people mere things to you?
  - type: text
    content: Are friends just items of profit and loss?
  '28':
  - type: text
    content: “Look me in the eyes!
  - type: text
    content: Do you think I’d lie to your face?
  - type: text
    content: Think it over—no double-talk!
  - type: text
    content: Think carefully—my integrity is on the line!
  - type: text
    content: Can you detect anything false in what I say?
  - type: text
    content: Don’t you trust me to discern good from evil?”
  '8':
  - type: text
    content: “All I want is an answer to one prayer,
  - type: text
    content: 'a last request to be honored:'
  - type: text
    content: Let God step on me—squash me like a bug,
  - type: text
    content: and be done with me for good.
  - type: text
    content: I’d at least have the satisfaction
  - type: text
    content: of not having blasphemed the Holy God,
  - type: text
    content: before being pressed past the limits.
  - type: text
    content: Where’s the strength to keep my hopes up?
  - type: text
    content: What future do I have to keep me going?
  - type: text
    content: Do you think I have nerves of steel?
  - type: text
    content: Do you think I’m made of iron?
  - type: text
    content: Do you think I can pull myself up by my bootstraps?
  - type: text
    content: Why, I don’t even have any boots!
  - type: heading
    content: My So-Called Friends
