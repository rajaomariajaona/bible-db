document_id: JOB.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job Replies to Eliphaz
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: God Has Dumped the Works on Me
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'Job answered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If my misery could be weighed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you could pile the whole bitter load on the scales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It would be heavier than all the sand of the sea!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is it any wonder that I’m howling like a caged cat?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arrows of God Almighty are in me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poison arrows—and I’m poisoned all through!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has dumped the whole works on me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donkeys bray and cows moo when they run out of pasture—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so don’t expect me to keep quiet in this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you see what God has dished out for me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s enough to turn anyone’s stomach!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything in me is repulsed by it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it makes me sick.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pressed Past the Limits
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-23
    - type: text
      text: “When desperate people give up on God Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their friends, at least, should stick with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my brothers are fickle as a gulch in the desert—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one day they’re gushing with water
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From melting ice and snow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cascading out of the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But by midsummer they’re dry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gullies baked dry in the sun.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Travelers who spot them and go out of their way for a drink
  - type: usfm
    marker: q2
    children:
    - type: text
      text: end up in a waterless gulch and die of thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Merchant caravans from Tema see them and expect water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tourists from Sheba hope for a cool drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They arrive so confident—but what a disappointment!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They get there, and their faces fall!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, my so-called friends, are no better—
  - type: usfm
    marker: q3
    children:
    - type: text
      text: there’s nothing to you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: One look at a hard scene and you shrink in fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s not as though I asked you for anything—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I didn’t ask you for one red cent—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor did I beg you to go out on a limb for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So why all this dodging and shuffling?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-27
    - type: text
      text: “Confront me with the truth and I’ll shut up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show me where I’ve gone off the track.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honest words never hurt anyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but what’s the point of all this pious bluster?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You pretend to tell me what’s wrong with my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but treat my words of anguish as so much hot air.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are people mere things to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are friends just items of profit and loss?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-30
    - type: text
      text: “Look me in the eyes!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you think I’d lie to your face?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Think it over—no double-talk!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Think carefully—my integrity is on the line!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you detect anything false in what I say?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you trust me to discern good from evil?”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-13
    - type: text
      text: “All I want is an answer to one prayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a last request to be honored:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let God step on me—squash me like a bug,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be done with me for good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’d at least have the satisfaction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of not having blasphemed the Holy God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before being pressed past the limits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where’s the strength to keep my hopes up?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What future do I have to keep me going?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I have nerves of steel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you think I’m made of iron?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you think I can pull myself up by my bootstraps?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why, I don’t even have any boots!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: My So-Called Friends
    marker-yv: yv-h
