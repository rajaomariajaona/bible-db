document_id: ECC.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said to myself, “Let’s go for it—experiment with pleasure, have a good time!” But there was nothing to it, nothing but smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What do I think of the fun-filled life? Insane! Inane!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My verdict on the pursuit of happiness? Who needs it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the help of a bottle of wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the wisdom I could muster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I tried my level best
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to penetrate the absurdity of life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wanted to get a handle on anything useful we mortals might do
  - type: usfm
    marker: q2
    children:
    - type: text
      text: during the years we spend on this earth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Never Said No to Myself
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then I took a good look at everything I’d done, looked at all the sweat and hard work. But when I looked, I saw nothing but smoke. Smoke and spitting into the wind. There was nothing to any of it. Nothing.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And then I took a hard look at what’s smart and what’s stupid. What’s left to do after you’ve been king? That’s a hard act to follow. You just do what you can, and that’s it. But I did see that it’s better to be smart than stupid, just as light is better than darkness. Even so, though the smart ones see where they’re going and the stupid ones grope in the dark, they’re all the same in the end. One fate for all—and that’s it.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I realized that my fate’s the same as the fool’s, I had to ask myself, “So why bother being wise?” It’s all smoke, nothing but smoke. The smart and the stupid both disappear out of sight. In a day or two they’re both forgotten. Yes, both the smart and the stupid die, and that’s it.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I hate life. As far as I can see, what happens on earth is a bad business. It’s smoke—and spitting into the wind.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I hated everything I’d accomplished and accumulated on this earth. I can’t take it with me—no, I have to leave it to whoever comes after me. Whether they’re worthy or worthless—and who’s to tell?—they’ll take over the earthly results of my intense thinking and hard work. Smoke.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s when I called it quits, gave up on anything that could be hoped for on this earth. What’s the point of working your fingers to the bone if you hand over what you worked for to someone who never lifted a finger for it? Smoke, that’s what it is. A bad business from start to finish. So what do you get from a life of hard labor? Pain and grief from dawn to dusk. Never a decent night’s rest. Nothing but smoke.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The best you can do with your life is have a good time and get by the best you can. The way I see it, that’s it—divine fate. Whether we feast or fast, it’s up to God. God may give wisdom and knowledge and joy to his favorites, but sinners are assigned a life of hard labor, and end up turning their wages over to God’s favorites. Nothing but smoke—and spitting into the wind.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, I did great things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: built houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planted vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: designed gardens and parks
  - type: usfm
    marker: q3
    children:
    - type: text
      text: and planted a variety of fruit trees in them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made pools of water
  - type: usfm
    marker: q3
    children:
    - type: text
      text: to irrigate the groves of trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bought slaves, male and female,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: who had children, giving me even more slaves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I acquired large herds and flocks,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: larger than any before me in Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I piled up silver and gold,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: loot from kings and kingdoms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I gathered a chorus of singers to entertain me with song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and—most exquisite of all pleasures—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: voluptuous maidens for my bed.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oh, how I prospered! I left all my predecessors in Jerusalem far behind, left them behind in the dust. What’s more, I kept a clear head through it all. Everything I wanted I took—I never said no to myself. I gave in to every impulse, held back nothing. I sucked the marrow of pleasure out of every task—my reward to myself for a hard day’s work!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Hate Life
    marker-yv: yv-h
