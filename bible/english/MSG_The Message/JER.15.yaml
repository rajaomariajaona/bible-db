document_id: JER.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to me: “Jeremiah, even if Moses and Samuel stood here and made their case, I wouldn’t feel a thing for this people. Get them out of here. Tell them to get lost! And if they ask you, ‘So where do we go?’ tell them '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘If you’re assigned to die, go and die;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if assigned to war, go and get killed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: If assigned to starve, go starve;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if assigned to exile, off to exile you go!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: '“I’ve arranged for four kinds of punishment: death in battle, the corpses dropped off by killer dogs, the rest picked clean by vultures, the bones gnawed by hyenas. They’ll be a sight to see, a sight to shock the whole world—and all because of Manasseh son of Hezekiah and all he did in Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who do you think will feel sorry for you, Jerusalem?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who do you think will waste tears on you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will bother to take the time to ask,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘So, how are things going?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You
  - type: text
    text: ' left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ', remember?” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You turned your back and walked out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I will grab you and hit you hard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m tired of letting you off the hook.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I threw you to the four winds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let the winds scatter you like leaves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I made sure you’ll lose everything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since nothing makes you change.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I created more widows among you
- type: usfm
  marker: q2
  children:
  - type: text
    text: than grains of sand on the ocean beaches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At noon mothers will get the news
- type: usfm
  marker: q2
  children:
  - type: text
    text: of their sons killed in action.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sudden anguish for the mothers—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all those terrible deaths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mother of seven falls to the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gasping for breath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Robbed of her children in their prime.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her sun sets at high noon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll round up any of you that are left alive
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see that you’re killed by your enemies.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Giving Everything Away for Nothing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Unlucky mother—that you had me as a son,
- type: usfm
  marker: q2
  children:
  - type: text
    text: given the unhappy job of indicting the whole country!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve never hurt or harmed a soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and yet everyone is out to get me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' knows, I’ve done everything I could to help them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: prayed for them and against their enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve always been on their side, trying to stave off disaster.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God knows how I’ve tried!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: “O Israel, O Judah, what are your chances
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the iron juggernaut from the north?
- type: usfm
  marker: q1
  children:
  - type: text
    text: In punishment for your sins, I’m giving away
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything you’ve got, giving it away for nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make you slaves to your enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a strange and far-off land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My anger is blazing and fierce,
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning in hot judgment against you.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: 'You know where I am, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Remember what I’m doing here!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take my side against my detractors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t stand back while they ruin me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Just look at the abuse I’m taking!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your words showed up, I ate them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: swallowed them whole. What a feast!
- type: usfm
  marker: q1
  children:
  - type: text
    text: What delight I took in being yours,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I never joined the party crowd
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their laughter and their fun.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Led by you, I went off by myself.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’d filled me with indignation. Their sin had me seething.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But why, why this chronic pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: this ever worsening wound and no healing in sight?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You’re nothing, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', but a mirage,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lovely oasis in the distance—and then nothing!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'This is how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Take back those words, and I’ll take you back.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then you’ll stand tall before me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Use words truly and well. Don’t stoop to cheap whining.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then, but only then, you’ll speak for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let your words change '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t change your words to suit them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll turn you into a steel wall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a thick steel wall, impregnable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll attack you but won’t put a dent in you
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I’m at your side, defending and delivering.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll deliver you from the grip of the wicked.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll get you out of the clutch of the ruthless.”
