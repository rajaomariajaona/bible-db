document_id: JER.15,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' said to me: “Jeremiah, even if Moses and Samuel stood here and made their case, I wouldn’t feel a thing for this people. Get them out of here. Tell them to get lost! And if they ask you, ‘So where do we go?’ tell them '
  - type: text
    content: God
  - type: text
    content: ' says,'
  - type: text
    content: “‘If you’re assigned to die, go and die;
  - type: text
    content: if assigned to war, go and get killed;
  - type: text
    content: If assigned to starve, go starve;
  - type: text
    content: if assigned to exile, off to exile you go!’
  '10':
  - type: text
    content: Unlucky mother—that you had me as a son,
  - type: text
    content: given the unhappy job of indicting the whole country!
  - type: text
    content: I’ve never hurt or harmed a soul,
  - type: text
    content: and yet everyone is out to get me.
  - type: text
    content: 'But, '
  - type: text
    content: God
  - type: text
    content: ' knows, I’ve done everything I could to help them,'
  - type: text
    content: prayed for them and against their enemies.
  - type: text
    content: I’ve always been on their side, trying to stave off disaster.
  - type: text
    content: God knows how I’ve tried!
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: “O Israel, O Judah, what are your chances
  - type: text
    content: against the iron juggernaut from the north?
  - type: text
    content: In punishment for your sins, I’m giving away
  - type: text
    content: everything you’ve got, giving it away for nothing.
  - type: text
    content: I’ll make you slaves to your enemies
  - type: text
    content: in a strange and far-off land.
  - type: text
    content: My anger is blazing and fierce,
  - type: text
    content: burning in hot judgment against you.”
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: 'You know where I am, '
  - type: text
    content: God
  - type: text
    content: '! Remember what I’m doing here!'
  - type: text
    content: Take my side against my detractors.
  - type: text
    content: Don’t stand back while they ruin me.
  - type: text
    content: Just look at the abuse I’m taking!
  - type: text
    content: When your words showed up, I ate them—
  - type: text
    content: swallowed them whole. What a feast!
  - type: text
    content: What delight I took in being yours,
  - type: text
    content: 'O '
  - type: text
    content: 'God, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: I never joined the party crowd
  - type: text
    content: in their laughter and their fun.
  - type: text
    content: Led by you, I went off by myself.
  - type: text
    content: You’d filled me with indignation. Their sin had me seething.
  - type: text
    content: But why, why this chronic pain,
  - type: text
    content: this ever worsening wound and no healing in sight?
  - type: text
    content: 'You’re nothing, '
  - type: text
    content: God
  - type: text
    content: ', but a mirage,'
  - type: text
    content: a lovely oasis in the distance—and then nothing!
  - type: text
    content: '* * *'
  '19':
  - type: text
    content: 'This is how '
  - type: text
    content: God
  - type: text
    content: ' answered me:'
  - type: text
    content: “Take back those words, and I’ll take you back.
  - type: text
    content: Then you’ll stand tall before me.
  - type: text
    content: Use words truly and well. Don’t stoop to cheap whining.
  - type: text
    content: Then, but only then, you’ll speak for me.
  - type: text
    content: 'Let your words change '
  - type: text
    content: them.
  - type: text
    content: Don’t change your words to suit them.
  - type: text
    content: I’ll turn you into a steel wall,
  - type: text
    content: a thick steel wall, impregnable.
  - type: text
    content: They’ll attack you but won’t put a dent in you
  - type: text
    content: because I’m at your side, defending and delivering.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “I’ll deliver you from the grip of the wicked.
  - type: text
    content: I’ll get you out of the clutch of the ruthless.”
  '3':
  - type: text
    content: '“I’ve arranged for four kinds of punishment: death in battle, the corpses dropped off by killer dogs, the rest picked clean by vultures, the bones gnawed by hyenas. They’ll be a sight to see, a sight to shock the whole world—and all because of Manasseh son of Hezekiah and all he did in Jerusalem.'
  '5':
  - type: text
    content: “Who do you think will feel sorry for you, Jerusalem?
  - type: text
    content: Who do you think will waste tears on you?
  - type: text
    content: Who will bother to take the time to ask,
  - type: text
    content: ‘So, how are things going?’
  '6':
  - type: text
    content: “
  - type: text
    content: You
  - type: text
    content: ' left '
  - type: text
    content: me
  - type: text
    content: ', remember?” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “You turned your back and walked out.
  - type: text
    content: So I will grab you and hit you hard.
  - type: text
    content: I’m tired of letting you off the hook.
  - type: text
    content: I threw you to the four winds
  - type: text
    content: and let the winds scatter you like leaves.
  - type: text
    content: I made sure you’ll lose everything,
  - type: text
    content: since nothing makes you change.
  - type: text
    content: I created more widows among you
  - type: text
    content: than grains of sand on the ocean beaches.
  - type: text
    content: At noon mothers will get the news
  - type: text
    content: of their sons killed in action.
  - type: text
    content: Sudden anguish for the mothers—
  - type: text
    content: all those terrible deaths.
  - type: text
    content: A mother of seven falls to the ground,
  - type: text
    content: gasping for breath,
  - type: text
    content: Robbed of her children in their prime.
  - type: text
    content: Her sun sets at high noon!
  - type: text
    content: Then I’ll round up any of you that are left alive
  - type: text
    content: and see that you’re killed by your enemies.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: Giving Everything Away for Nothing
