document_id: REV.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: Then the Angel showed me Water-of-Life River, crystal bright. It flowed from the Throne of God and the Lamb, right down the middle of the street. The Tree of Life was planted on each side of the River, producing twelve kinds of fruit, a ripe fruit each month. The leaves of the Tree are for healing the nations. Never again will anything be cursed. The Throne of God and of the Lamb is at the center. His servants will offer God service—worshiping, they’ll look on his face, their foreheads mirroring God. Never again will there be any night. No one will need lamplight or sunlight. The shining of God, the Master, is all the light anyone needs. And they will rule with him age after age after age.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Don’t Put It Away on the Shelf
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: The Angel continued, “Don’t seal the words of the prophecy of this book; don’t put it away on the shelf. Time is just about up. Let evildoers do their worst and the dirty-minded go all out in pollution, but let the righteous maintain a straight course and the holy continue on in holiness.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: “Yes, I’m on my way! I’ll be there soon! I’m bringing my payroll with me. I’ll pay all people in full for their life’s work. I’m A to Z, the First and the Final, Beginning and Conclusion.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: '“How blessed are those who wash their robes! The Tree of Life is theirs for good, and they’ll walk through the gates to the City. But outside for good are the filthy curs: sorcerers, fornicators, murderers, idolaters—all who love and live lies.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I, Jesus, sent my Angel to testify to these things for the churches. I’m the Root and Branch of David, the Bright Morning Star.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Come!” say the Spirit and the Bride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever hears, echo, “Come!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is anyone thirsty? Come!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who will, come and drink,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drink freely of the Water of Life!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'I give fair warning to all who hear the words of the prophecy of this book: If you add to the words of this prophecy, God will add to your life the disasters written in this book; if you subtract from the words of the book of this prophecy, God will subtract your part from the Tree of Life and the Holy City that are written in this book.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He who testifies to all these things says it again: “I’m on my way! I’ll be there soon!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yes! Come, Master Jesus!
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The grace of the Master Jesus be with all of you. Oh, Yes!
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: The Angel said to me, “These are dependable and accurate words, every one. The God and Master of the spirits of the prophets sent his Angel to show his servants what must take place, and soon. And tell them, ‘Yes, I’m on my way!’ Blessed be the one who keeps the words of the prophecy of this book.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: I, John, saw all these things with my own eyes, heard them with my ears. Immediately when I heard and saw, I fell on my face to worship at the feet of the Angel who laid it all out before me. He objected, “No you don’t! I’m a servant just like you and your companions, the prophets, and all who keep the words of this book. Worship God!”
