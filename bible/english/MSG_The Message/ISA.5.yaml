document_id: ISA.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Looking for a Crop of Justice
  - type: text
    content: I’ll sing a ballad to the one I love,
  - type: text
    content: 'a love ballad about his vineyard:'
  - type: text
    content: The one I love had a vineyard,
  - type: text
    content: a fine, well-placed vineyard.
  - type: text
    content: He hoed the soil and pulled the weeds,
  - type: text
    content: and planted the very best vines.
  - type: text
    content: He built a lookout, built a winepress,
  - type: text
    content: a vineyard to be proud of.
  - type: text
    content: He looked for a vintage yield of grapes,
  - type: text
    content: but for all his pains he got garbage grapes.
  '11':
  - type: text
    content: Doom to those who get up early
  - type: text
    content: and start drinking booze before breakfast,
  - type: text
    content: Who stay up all hours of the night
  - type: text
    content: drinking themselves into a stupor.
  - type: text
    content: They make sure their banquets are well-furnished
  - type: text
    content: with harps and flutes and plenty of wine,
  - type: text
    content: 'But they’ll have nothing to do with the work of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: pay no mind to what he is doing.
  - type: text
    content: Therefore my people will end up in exile
  - type: text
    content: because they don’t know the score.
  - type: text
    content: Their “honored men” will starve to death
  - type: text
    content: and the common people die of thirst.
  - type: text
    content: Sheol developed a huge appetite,
  - type: text
    content: swallowing people nonstop!
  - type: text
    content: Big people and little people alike
  - type: text
    content: down that gullet, to say nothing of all the drunks.
  - type: text
    content: The down-and-out on a par
  - type: text
    content: with the high-and-mighty,
  - type: text
    content: Windbag boasters crumpled,
  - type: text
    content: flaccid as a punctured bladder.
  - type: text
    content: But by working justice,
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will be a mountain.
  - type: text
    content: By working righteousness,
  - type: text
    content: Holy God will show what “holy” is.
  - type: text
    content: And lambs will graze
  - type: text
    content: as if they owned the place,
  - type: text
    content: Kids and calves
  - type: text
    content: right at home in the ruins.
  '18':
  - type: text
    content: Doom to you who use lies to sell evil,
  - type: text
    content: who haul sin to market by the truckload,
  - type: text
    content: Who say, “What’s God waiting for?
  - type: text
    content: Let him get a move on so we can see it.
  - type: text
    content: Whatever The Holy of Israel has cooked up,
  - type: text
    content: we’d like to check it out.”
  '20':
  - type: text
    content: Doom to you who call evil good
  - type: text
    content: and good evil,
  - type: text
    content: Who put darkness in place of light
  - type: text
    content: and light in place of darkness,
  - type: text
    content: Who substitute bitter for sweet
  - type: text
    content: and sweet for bitter!
  '21':
  - type: text
    content: Doom to you who think you’re so smart,
  - type: text
    content: who hold such a high opinion of yourselves!
  - type: text
    content: All you’re good at is drinking—champion boozers
  - type: text
    content: who collect trophies from drinking bouts
  - type: text
    content: And then line your pockets with bribes from the guilty
  - type: text
    content: while you violate the rights of the innocent.
  '24':
  - type: text
    content: But they won’t get by with it. As fire eats stubble
  - type: text
    content: and dry grass goes up in smoke,
  - type: text
    content: Their souls will atrophy,
  - type: text
    content: their achievements crumble into dust,
  - type: text
    content: Because they said no to the revelation
  - type: text
    content: 'of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: Would have nothing to do
  - type: text
    content: with The Holy of Israel.
  '25':
  - type: text
    content: 'That’s why '
  - type: text
    content: God
  - type: text
    content: ' flamed out in anger against his people,'
  - type: text
    content: reached out and knocked them down.
  - type: text
    content: The mountains trembled
  - type: text
    content: as their dead bodies piled up in the streets.
  - type: text
    content: But even after that, he was still angry,
  - type: text
    content: his fist still raised, ready to hit them again.
  - type: text
    content: He raises a flag, signaling a distant nation,
  - type: text
    content: whistles for people at the ends of the earth.
  - type: text
    content: And here they come—
  - type: text
    content: on the run!
  - type: text
    content: None drag their feet, no one stumbles,
  - type: text
    content: no one sleeps or dawdles.
  - type: text
    content: Shirts are on and pants buckled,
  - type: text
    content: every boot is spit-polished and tied.
  - type: text
    content: Their arrows are sharp,
  - type: text
    content: bows strung,
  - type: text
    content: The hooves of their horses shod,
  - type: text
    content: chariot wheels greased.
  - type: text
    content: Roaring like a pride of lions,
  - type: text
    content: the full-throated roars of young lions,
  - type: text
    content: They growl and seize their prey,
  - type: text
    content: dragging it off—no rescue for that one!
  - type: text
    content: They’ll roar and roar and roar on that Day,
  - type: text
    content: like the roar of ocean billows.
  - type: text
    content: Look as long and hard as you like at that land,
  - type: text
    content: you’ll see nothing but darkness and trouble.
  - type: text
    content: Every light in the sky
  - type: text
    content: will be blacked out by the clouds.
  '3':
  - type: text
    content: “Now listen to what I’m telling you,
  - type: text
    content: you who live in Jerusalem and Judah.
  - type: text
    content: What do you think is going on
  - type: text
    content: between me and my vineyard?
  - type: text
    content: Can you think of anything I could have done
  - type: text
    content: to my vineyard that I didn’t do?
  - type: text
    content: When I expected good grapes,
  - type: text
    content: why did I get bitter grapes?
  '5':
  - type: text
    content: “Well now, let me tell you
  - type: text
    content: 'what I’ll do to my vineyard:'
  - type: text
    content: I’ll tear down its fence
  - type: text
    content: and let it go to ruin.
  - type: text
    content: I’ll knock down the gate
  - type: text
    content: and let it be trampled.
  - type: text
    content: I’ll turn it into a patch of weeds, untended, uncared for—
  - type: text
    content: thistles and thorns will take over.
  - type: text
    content: 'I’ll give orders to the clouds:'
  - type: text
    content: ‘Don’t rain on that vineyard, ever!’”
  '7':
  - type: text
    content: 'Do you get it? The vineyard of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies
  - type: text
    content: is the country of Israel.
  - type: text
    content: All the men and women of Judah
  - type: text
    content: are the garden he was so proud of.
  - type: text
    content: He looked for a crop of justice
  - type: text
    content: and saw them murdering each other.
  - type: text
    content: He looked for a harvest of righteousness
  - type: text
    content: and heard only the moans of victims.
  - type: heading
    content: You Who Call Evil Good and Good Evil
  '8':
  - type: text
    content: Doom to you who buy up all the houses
  - type: text
    content: and grab all the land for yourselves—
  - type: text
    content: Evicting the old owners,
  - type: text
    content: 'posting '
  - type: text
    content: no trespassing
  - type: text
    content: ' signs,'
  - type: text
    content: Taking over the country,
  - type: text
    content: leaving everyone homeless and landless.
  - type: text
    content: 'I overheard '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies say:'
  - type: text
    content: “Those mighty houses will end up empty.
  - type: text
    content: Those extravagant estates will be deserted.
  - type: text
    content: A ten-acre vineyard will produce a pint of wine,
  - type: text
    content: a fifty-pound sack of seed, a quart of grain.”
