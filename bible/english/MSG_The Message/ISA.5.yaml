document_id: ISA.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Looking for a Crop of Justice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I’ll sing a ballad to the one I love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a love ballad about his vineyard:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one I love had a vineyard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fine, well-placed vineyard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hoed the soil and pulled the weeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted the very best vines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He built a lookout, built a winepress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a vineyard to be proud of.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He looked for a vintage yield of grapes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but for all his pains he got garbage grapes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: “Now listen to what I’m telling you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in Jerusalem and Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What do you think is going on
- type: usfm
  marker: q2
  children:
  - type: text
    text: between me and my vineyard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can you think of anything I could have done
- type: usfm
  marker: q2
  children:
  - type: text
    text: to my vineyard that I didn’t do?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I expected good grapes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why did I get bitter grapes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: “Well now, let me tell you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what I’ll do to my vineyard:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll tear down its fence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let it go to ruin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll knock down the gate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let it be trampled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll turn it into a patch of weeds, untended, uncared for—
- type: usfm
  marker: q2
  children:
  - type: text
    text: thistles and thorns will take over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’ll give orders to the clouds:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Don’t rain on that vineyard, ever!’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do you get it? The vineyard of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the country of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the men and women of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the garden he was so proud of.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He looked for a crop of justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and saw them murdering each other.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He looked for a harvest of righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heard only the moans of victims.
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Who Call Evil Good and Good Evil
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: Doom to you who buy up all the houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grab all the land for yourselves—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Evicting the old owners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'posting '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: no trespassing
  - type: text
    text: ' signs,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taking over the country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaving everyone homeless and landless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I overheard '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Those mighty houses will end up empty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those extravagant estates will be deserted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ten-acre vineyard will produce a pint of wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fifty-pound sack of seed, a quart of grain.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-17
  - type: text
    text: Doom to those who get up early
- type: usfm
  marker: q2
  children:
  - type: text
    text: and start drinking booze before breakfast,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who stay up all hours of the night
- type: usfm
  marker: q2
  children:
  - type: text
    text: drinking themselves into a stupor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They make sure their banquets are well-furnished
- type: usfm
  marker: q2
  children:
  - type: text
    text: with harps and flutes and plenty of wine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But they’ll have nothing to do with the work of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay no mind to what he is doing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore my people will end up in exile
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they don’t know the score.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their “honored men” will starve to death
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the common people die of thirst.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sheol developed a huge appetite,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swallowing people nonstop!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Big people and little people alike
- type: usfm
  marker: q2
  children:
  - type: text
    text: down that gullet, to say nothing of all the drunks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The down-and-out on a par
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the high-and-mighty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Windbag boasters crumpled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flaccid as a punctured bladder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But by working justice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies will be a mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By working righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Holy God will show what “holy” is.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lambs will graze
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if they owned the place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kids and calves
- type: usfm
  marker: q2
  children:
  - type: text
    text: right at home in the ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Doom to you who use lies to sell evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who haul sin to market by the truckload,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say, “What’s God waiting for?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let him get a move on so we can see it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whatever The Holy of Israel has cooked up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’d like to check it out.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Doom to you who call evil good
- type: usfm
  marker: q2
  children:
  - type: text
    text: and good evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who put darkness in place of light
- type: usfm
  marker: q2
  children:
  - type: text
    text: and light in place of darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who substitute bitter for sweet
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sweet for bitter!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Doom to you who think you’re so smart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who hold such a high opinion of yourselves!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All you’re good at is drinking—champion boozers
- type: usfm
  marker: q2
  children:
  - type: text
    text: who collect trophies from drinking bouts
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then line your pockets with bribes from the guilty
- type: usfm
  marker: q2
  children:
  - type: text
    text: while you violate the rights of the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But they won’t get by with it. As fire eats stubble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dry grass goes up in smoke,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their souls will atrophy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their achievements crumble into dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they said no to the revelation
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would have nothing to do
- type: usfm
  marker: q2
  children:
  - type: text
    text: with The Holy of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-30
  - type: text
    text: 'That’s why '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' flamed out in anger against his people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: reached out and knocked them down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mountains trembled
- type: usfm
  marker: q2
  children:
  - type: text
    text: as their dead bodies piled up in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even after that, he was still angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fist still raised, ready to hit them again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He raises a flag, signaling a distant nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whistles for people at the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And here they come—
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the run!
- type: usfm
  marker: q1
  children:
  - type: text
    text: None drag their feet, no one stumbles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one sleeps or dawdles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shirts are on and pants buckled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every boot is spit-polished and tied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their arrows are sharp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bows strung,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The hooves of their horses shod,
- type: usfm
  marker: q2
  children:
  - type: text
    text: chariot wheels greased.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Roaring like a pride of lions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the full-throated roars of young lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They growl and seize their prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dragging it off—no rescue for that one!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll roar and roar and roar on that Day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the roar of ocean billows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look as long and hard as you like at that land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll see nothing but darkness and trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every light in the sky
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be blacked out by the clouds.
