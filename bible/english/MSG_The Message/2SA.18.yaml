document_id: 2SA.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: David organized his forces. He appointed captains of thousands and captains of hundreds. Then David deployed his troops, a third under Joab, a third under Abishai son of Zeruiah, Joab’s brother, and a third under Ittai the Gittite.
- type: usfm
  marker: p
  children:
  - type: text
    text: The king then announced, “I’m marching with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They said, “No, you mustn’t march with us. If we’re forced to retreat, the enemy won’t give it a second thought. And if half of us die, they won’t do so either. But you are worth ten thousand of us. It will be better for us if you stay in the city and help from there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “If you say so,” said the king. “I’ll do what you think is best.” And so he stood beside the city gate as the whole army marched out by hundreds and by thousands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the king ordered Joab and Abishai and Ittai, “Deal gently for my sake with the young man Absalom.” The whole army heard what the king commanded the three captains regarding Absalom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: The army took the field to meet Israel. It turned out that the battle was joined in the Forest of Ephraim. The army of Israel was beaten badly there that day by David’s men, a terrific slaughter—twenty thousand men! There was dazed and confused fighting all over the place—the forest claimed more lives that day than the sword!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Absalom ran into David’s men, but was out in front of them riding his mule, when the mule ran under the branches of a huge oak tree. Absalom’s head was caught in the oak and he was left dangling between heaven and earth, the mule running right out from under him. A solitary soldier saw him and reported it to Joab, “I just saw Absalom hanging from an oak tree!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Joab said to the man who told him, “If you saw him, why didn’t you kill him then and there? I’d have rewarded you with ten pieces of silver and a fancy belt.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: The man told Joab, “Even if I’d had a chance at a thousand pieces of silver, I wouldn’t have laid a hand on the king’s son. We all heard the king command you and Abishai and Ittai, ‘For my sake, protect the young man Absalom.’ Why, I’d be risking my life, for nothing is hidden from the king. And you would have just stood there!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: Joab said, “I can’t waste my time with you.” He then grabbed three knives and stabbed Absalom in the heart while he was still alive in the tree; by then Absalom was surrounded by ten of Joab’s armor bearers; they hacked away at him and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Joab then blew the ram’s horn trumpet, calling off the army in its pursuit of Israel. They took Absalom, dumped him into a huge pit in the forest, and piled an immense mound of rocks over him.
- type: usfm
  marker: p
  children:
  - type: text
    text: Meanwhile the whole army of Israel was in flight, each man making his own way home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: While alive, Absalom had erected for himself a pillar in the Valley of the King, “because,” he said, “I have no son to carry on my name.” He inscribed the pillar with his own name. To this day it is called “The Absalom Memorial.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'Ahimaaz, Zadok’s son, said, “Let me run to the king and bring him the good news that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has delivered him from his enemies.” But Joab said, “You’re not the one to deliver the good news today; some other day, maybe, but it’s not ‘good news’ today.” (This was because the king’s son was dead.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Joab ordered a Cushite, “You go. Tell the king what you’ve seen.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes sir,” said the Cushite, and ran off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ahimaaz son of Zadok kept at it, begging Joab, “What does it matter? Let me run, too, following the Cushite.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Joab said, “Why all this ‘Run, run’? You’ll get no thanks for it, I can tell you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I don’t care; let me run.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Okay,” said Joab, “run.” So Ahimaaz ran, taking the lower valley road, and passed the Cushite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25a
  - type: text
    text: ' David was sitting between the two gates. The sentry had gone up to the top of the gate on the wall and looked around. He saw a solitary runner. The sentry called down and told the king. The king said, “If he’s alone, it must be good news!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25b-26
  - type: text
    text: ' As the runner came closer, the sentry saw another runner and called down to the gate, “Another runner all by himself.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And the king said, “This also must be good news.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the sentry said, “I can see the first man now; he runs like Ahimaaz son of Zadok.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “He’s a good man,” said the king. “He’s bringing good news for sure.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Ahimaaz called out and said to the king, “Peace!” Then he bowed deeply before the king, his face to the ground. “Blessed be your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; he has handed over the men who rebelled against my master the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The king asked, “But is the young man Absalom all right?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Ahimaaz said, “I saw a huge ruckus just as Joab was sending me off, but I don’t know what it was about.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The king said, “Step aside and stand over there.” So he stepped aside.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the Cushite arrived and said, “Good news, my master and king! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given victory today over all those who rebelled against you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “But,” said the king, “is the young man Absalom all right?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And the Cushite replied, “Would that all of the enemies of my master the king and all who maliciously rose against you end up like that young man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The king was stunned. Heartbroken, he went up to the room over the gate and wept. As he wept he cried out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my son Absalom, my dear, dear son Absalom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why not me rather than you, my death and not yours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Absalom, my dear, dear son!
