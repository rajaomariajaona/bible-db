document_id: JER.51,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Hurricane Persia
  - type: text
    content: 'There’s more. '
  - type: text
    content: God
  - type: text
    content: ' says more:'
  - type: text
    content: '“Watch this:'
  - type: text
    content: I’m whipping up
  - type: text
    content: A death-dealing hurricane against Babylon—‘Hurricane Persia’—
  - type: text
    content: against all who live in that perverse land.
  - type: text
    content: I’m sending a cleanup crew into Babylon.
  - type: text
    content: They’ll clean the place out from top to bottom.
  - type: text
    content: When they get through there’ll be nothing left of her
  - type: text
    content: worth taking or talking about.
  - type: text
    content: They won’t miss a thing.
  - type: text
    content: A total and final Doomsday!
  - type: text
    content: Fighters will fight with everything they’ve got.
  - type: text
    content: It’s no-holds-barred.
  - type: text
    content: They will spare nothing and no one.
  - type: text
    content: It’s final and wholesale destruction—the end!
  - type: text
    content: Babylon littered with the wounded,
  - type: text
    content: streets piled with corpses.
  - type: text
    content: It turns out that Israel and Judah
  - type: text
    content: are not widowed after all.
  - type: text
    content: 'As their God, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, I am still alive and well,
  - type: text
    content: committed to them even though
  - type: text
    content: They filled their land with sin
  - type: text
    content: against Israel’s most Holy God.
  '10':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' has set everything right for us.'
  - type: text
    content: Come! Let’s tell the good news
  - type: text
    content: Back home in Zion.
  - type: text
    content: 'Let’s tell what our '
  - type: text
    content: God
  - type: text
    content: ' did to set things right.'
  '11':
  - type: text
    content: “Sharpen the arrows!
  - type: text
    content: Fill the quivers!
  - type: text
    content: God
  - type: text
    content: ' has stirred up the kings of the Medes,'
  - type: text
    content: 'infecting them with war fever: ‘Destroy Babylon!’'
  - type: text
    content: God
  - type: text
    content: ’s on the warpath.
  - type: text
    content: He’s out to avenge his Temple.
  - type: text
    content: Give the signal to attack Babylon’s walls.
  - type: text
    content: Station guards around the clock.
  - type: text
    content: Bring in reinforcements.
  - type: text
    content: Set men in ambush.
  - type: text
    content: God
  - type: text
    content: ' will do what he planned,'
  - type: text
    content: what he said he’d do to the people of Babylon.
  - type: text
    content: You have more water than you need,
  - type: text
    content: you have more money than you need—
  - type: text
    content: But your life is over,
  - type: text
    content: your lifeline cut.”
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies has solemnly sworn:'
  - type: text
    content: “I’ll fill this place with soldiers.
  - type: text
    content: They’ll swarm through here like locusts
  - type: text
    content: chanting victory songs over you.”
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: By his power he made earth.
  - type: text
    content: His wisdom gave shape to the world.
  - type: text
    content: He crafted the cosmos.
  - type: text
    content: He thunders and rain pours down.
  - type: text
    content: He sends the clouds soaring.
  - type: text
    content: He embellishes the storm with lightnings,
  - type: text
    content: launches the wind from his warehouse.
  - type: text
    content: Stick-god worshipers look mighty foolish!
  - type: text
    content: god-makers embarrassed by their handmade gods!
  - type: text
    content: Their gods are frauds, dead sticks—
  - type: text
    content: deadwood gods, tasteless jokes.
  - type: text
    content: They’re nothing but stale smoke.
  - type: text
    content: When the smoke clears, they’re gone.
  - type: text
    content: But the Portion-of-Jacob is the real thing;
  - type: text
    content: he put the whole universe together,
  - type: text
    content: With special attention to Israel.
  - type: text
    content: 'His name? '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: heading
    content: They’ll Sleep and Never Wake Up
  '20':
  - type: text
    content: God says, “You, Babylon, are my hammer,
  - type: text
    content: my weapon of war.
  - type: text
    content: I’ll use you to smash godless nations,
  - type: text
    content: use you to knock kingdoms to bits.
  - type: text
    content: I’ll use you to smash horse and rider,
  - type: text
    content: use you to smash chariot and driver.
  - type: text
    content: I’ll use you to smash man and woman,
  - type: text
    content: use you to smash the old man and the boy.
  - type: text
    content: I’ll use you to smash the young man and young woman,
  - type: text
    content: use you to smash shepherd and sheep.
  - type: text
    content: I’ll use you to smash farmer and yoked oxen,
  - type: text
    content: use you to smash governors and senators.
  '24':
  - type: text
    content: '“Judeans, you’ll see it with your own eyes. I’ll pay Babylon and all the Chaldeans back for all the evil they did in Zion.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '25':
  - type: text
    content: “I’m your enemy, Babylon, Mount Destroyer,
  - type: text
    content: you ravager of the whole earth.
  - type: text
    content: I’ll reach out, I’ll take you in my hand,
  - type: text
    content: and I’ll crush you till there’s no mountain left.
  - type: text
    content: I’ll turn you into a gravel pit—
  - type: text
    content: no more cornerstones cut from you,
  - type: text
    content: No more foundation stones quarried from you!
  - type: text
    content: 'Nothing left of you but gravel.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: “Raise the signal in the land,
  - type: text
    content: blow the shofar-trumpet for the nations.
  - type: text
    content: Consecrate the nations for holy work against her.
  - type: text
    content: Call kingdoms into service against her.
  - type: text
    content: Enlist Ararat, Minni, and Ashkenaz.
  - type: text
    content: Appoint a field marshal against her,
  - type: text
    content: and round up horses, locust hordes of horses!
  - type: text
    content: Consecrate the nations for holy work against her—
  - type: text
    content: the king of the Medes, his leaders and people.
  '29':
  - type: text
    content: “The very land trembles in terror, writhes in pain,
  - type: text
    content: terrorized by my plans against Babylon,
  - type: text
    content: Plans to turn the country of Babylon
  - type: text
    content: into a lifeless moonscape—a wasteland.
  - type: text
    content: Babylon’s soldiers have quit fighting.
  - type: text
    content: They hide out in ruins and caves—
  - type: text
    content: Cowards who’ve given up without a fight,
  - type: text
    content: exposed as cowering crybabies.
  - type: text
    content: Babylon’s houses are going up in flames,
  - type: text
    content: the city gates torn off their hinges.
  - type: text
    content: Runner after runner comes racing in,
  - type: text
    content: each on the heels of the last,
  - type: text
    content: Bringing reports to the king of Babylon
  - type: text
    content: that his city is a lost cause.
  - type: text
    content: The fords of the rivers are all taken.
  - type: text
    content: Wildfire rages through the swamp grass.
  - type: text
    content: Soldiers desert left and right.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, said it would happen:'
  - type: text
    content: ‘Daughter Babylon is a threshing floor
  - type: text
    content: at threshing time.
  - type: text
    content: Soon, oh very soon, her harvest will come
  - type: text
    content: and then the chaff will fly!’
  - type: text
    content: '* * *'
  '34':
  - type: text
    content: “Nebuchadnezzar king of Babylon
  - type: text
    content: chewed up my people and spit out the bones.
  - type: text
    content: He wiped his dish clean, pushed back his chair,
  - type: text
    content: and belched—a huge gluttonous belch.
  - type: text
    content: Lady Zion says,
  - type: text
    content: ‘The brutality done to me be done to Babylon!’
  - type: text
    content: And Jerusalem says,
  - type: text
    content: ‘The blood spilled from me be charged to the Chaldeans!’
  - type: text
    content: 'Then I, '
  - type: text
    content: God
  - type: text
    content: ', step in and say,'
  - type: text
    content: ‘I’m on your side, taking up your cause.
  - type: text
    content: I’m your Avenger. You’ll get your revenge.
  - type: text
    content: I’ll dry up her rivers, plug up her springs.
  - type: text
    content: Babylon will be a pile of rubble,
  - type: text
    content: scavenged by stray dogs and cats,
  - type: text
    content: A dumping ground for garbage,
  - type: text
    content: a godforsaken ghost town.’
  - type: text
    content: '* * *'
  '38':
  - type: text
    content: “The Babylonians will be like lions and their cubs,
  - type: text
    content: ravenous, roaring for food.
  - type: text
    content: I’ll fix them a meal, all right—a banquet, in fact.
  - type: text
    content: They’ll drink themselves falling-down drunk.
  - type: text
    content: Dead drunk, they’ll sleep—and sleep, and sleep . . . 
  - type: text
    content: 'and they’ll never wake up.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “I’ll haul these ‘lions’ off to the slaughterhouse
  - type: text
    content: like the lambs, rams, and goats,
  - type: text
    content: never to be heard of again.
  - type: text
    content: '* * *'
  '41':
  - type: text
    content: “Babylon is finished—
  - type: text
    content: the pride of the whole earth is flat on her face.
  - type: text
    content: What a comedown for Babylon,
  - type: text
    content: to end up inglorious in the sewer!
  - type: text
    content: Babylon drowned in chaos,
  - type: text
    content: battered by waves of enemy soldiers.
  - type: text
    content: Her towns stink with decay and rot,
  - type: text
    content: the land empty and bare and sterile.
  - type: text
    content: No one lives in these towns anymore.
  - type: text
    content: Travelers give them a wide berth.
  - type: text
    content: I’ll bring doom on the glutton god-Bel in Babylon.
  - type: text
    content: I’ll make him vomit up all he gulped down.
  - type: text
    content: No more visitors stream into this place,
  - type: text
    content: admiring and gawking at the wonders of Babylon.
  - type: text
    content: The wonders of Babylon are no more.
  - type: text
    content: Run for your lives, my dear people!
  - type: text
    content: Run, and don’t look back!
  - type: text
    content: Get out of this place while you can,
  - type: text
    content: 'this place torched by '
  - type: text
    content: God
  - type: text
    content: ’s raging anger.
  - type: text
    content: Don’t lose hope. Don’t ever give up
  - type: text
    content: when the rumors pour in hot and heavy.
  - type: text
    content: One year it’s this, the next year it’s that—
  - type: text
    content: rumors of violence, rumors of war.
  - type: text
    content: Trust me, the time is coming
  - type: text
    content: when I’ll put the no-gods of Babylon in their place.
  - type: text
    content: I’ll show up the whole country as a sickening fraud,
  - type: text
    content: with dead bodies strewn all over the place.
  - type: text
    content: Heaven and earth, angels and people,
  - type: text
    content: will throw a victory party over Babylon
  - type: text
    content: When the avenging armies from the north
  - type: text
    content: 'descend on her.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree!
  - type: heading
    content: Remember God in Your Long and Distant Exile
  '49':
  - type: text
    content: “Babylon must fall—
  - type: text
    content: compensation for the war dead in Israel.
  - type: text
    content: Babylonians will be killed
  - type: text
    content: because of all that Babylonian killing.
  - type: text
    content: But you exiles who have escaped a Babylonian death,
  - type: text
    content: get out! And fast!
  - type: text
    content: 'Remember '
  - type: text
    content: God
  - type: text
    content: ' in your long and distant exile.'
  - type: text
    content: Keep Jerusalem alive in your memory.”
  '51':
  - type: text
    content: How we’ve been humiliated, taunted and abused,
  - type: text
    content: kicked around for so long that we hardly know who we are!
  - type: text
    content: And we hardly know what to think—
  - type: text
    content: 'our old Sanctuary, '
  - type: text
    content: God
  - type: text
    content: ’s house, desecrated by strangers.
  '52':
  - type: text
    content: '“I know, but trust me: The time is coming”'
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “When I will bring doom on her no-god idols,
  - type: text
    content: and all over this land her wounded will groan.
  - type: text
    content: Even if Babylon climbed a ladder to the moon
  - type: text
    content: and pulled up the ladder so that no one could get to her,
  - type: text
    content: That wouldn’t stop me.
  - type: text
    content: I’d make sure my avengers would reach her.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '54':
  - type: text
    content: “But now listen! Do you hear it? A cry out of Babylon!
  - type: text
    content: An unearthly wail out of Chaldea!
  - type: text
    content: God
  - type: text
    content: ' is taking his wrecking bar to Babylon.'
  - type: text
    content: We’ll be hearing the last of her noise—
  - type: text
    content: Death throes like the crashing of waves,
  - type: text
    content: death rattles like the roar of cataracts.
  - type: text
    content: 'The avenging destroyer is about to enter Babylon:'
  - type: text
    content: Her soldiers are taken, her weapons are trashed.
  - type: text
    content: 'Indeed, '
  - type: text
    content: God
  - type: text
    content: ' is a God who evens things out.'
  - type: text
    content: All end up with their just deserts.
  '57':
  - type: text
    content: “I’ll get them drunk, the whole lot of them—
  - type: text
    content: princes, sages, governors, soldiers.
  - type: text
    content: Dead drunk, they’ll sleep—and sleep and sleep . . . 
  - type: text
    content: and never wake up.” The King’s Decree.
  - type: text
    content: 'His name? '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  '58':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies speaks:'
  - type: text
    content: “The city walls of Babylon—those massive walls!—
  - type: text
    content: will be flattened.
  - type: text
    content: And those city gates—huge gates!—
  - type: text
    content: will be set on fire.
  - type: text
    content: The harder you work at this empty life,
  - type: text
    content: the less you are.
  - type: text
    content: Nothing comes of ambition like this
  - type: text
    content: but ashes.”
  - type: text
    content: '* * *'
  '59':
  - type: text
    content: Jeremiah the prophet gave a job to Seraiah son of Neriah, son of Mahseiah, when Seraiah went with Zedekiah king of Judah to Babylon. It was in the fourth year of Zedekiah’s reign. Seraiah was in charge of travel arrangements.
  '6':
  - type: text
    content: “Get out of Babylon as fast as you can.
  - type: text
    content: Run for your lives! Save your necks!
  - type: text
    content: Don’t linger and lose your lives to my vengeance on her
  - type: text
    content: as I pay her back for her sins.
  - type: text
    content: Babylon was a fancy gold chalice
  - type: text
    content: held in my hand,
  - type: text
    content: Filled with the wine of my anger
  - type: text
    content: to make the whole world drunk.
  - type: text
    content: The nations drank the wine
  - type: text
    content: and they’ve all gone crazy.
  - type: text
    content: Babylon herself will stagger and crash,
  - type: text
    content: senseless in a drunken stupor—tragic!
  - type: text
    content: Get anointing balm for her wound.
  - type: text
    content: Maybe she can be cured.”
  - type: text
    content: '* * *'
  '60':
  - type: text
    content: 'Jeremiah had written down in a little booklet all the bad things that would come down on Babylon. He told Seraiah, “When you get to Babylon, read this out in public. Read, ‘You, O '
  - type: text
    content: God
  - type: text
    content: ', said that you would destroy this place so that nothing could live here, neither human nor animal—a wasteland to top all wastelands, an eternal nothing.’'
  '63':
  - type: text
    content: “When you’ve finished reading the page, tie a stone to it, throw it into the River Euphrates, and watch it sink. Then say, ‘That’s how Babylon will sink to the bottom and stay there after the disaster I’m going to bring upon her.’”
  '9':
  - type: text
    content: “We did our best, but she can’t be helped.
  - type: text
    content: Babylon is past fixing.
  - type: text
    content: Give her up to her fate.
  - type: text
    content: Go home.
  - type: text
    content: The judgment on her will be vast,
  - type: text
    content: a skyscraper-memorial of vengeance.
  - type: heading
    content: Your Lifeline Is Cut
