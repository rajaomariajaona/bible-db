document_id: JER.51
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hurricane Persia
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'There’s more. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says more:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Watch this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m whipping up
- type: usfm
  marker: q1
  children:
  - type: text
    text: A death-dealing hurricane against Babylon—‘Hurricane Persia’—
- type: usfm
  marker: q2
  children:
  - type: text
    text: against all who live in that perverse land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m sending a cleanup crew into Babylon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll clean the place out from top to bottom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they get through there’ll be nothing left of her
- type: usfm
  marker: q2
  children:
  - type: text
    text: worth taking or talking about.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They won’t miss a thing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A total and final Doomsday!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fighters will fight with everything they’ve got.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s no-holds-barred.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will spare nothing and no one.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s final and wholesale destruction—the end!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon littered with the wounded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: streets piled with corpses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It turns out that Israel and Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: are not widowed after all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As their God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, I am still alive and well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: committed to them even though
- type: usfm
  marker: q1
  children:
  - type: text
    text: They filled their land with sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: against Israel’s most Holy God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: “Get out of Babylon as fast as you can.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Run for your lives! Save your necks!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t linger and lose your lives to my vengeance on her
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I pay her back for her sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon was a fancy gold chalice
- type: usfm
  marker: q2
  children:
  - type: text
    text: held in my hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Filled with the wine of my anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make the whole world drunk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nations drank the wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they’ve all gone crazy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon herself will stagger and crash,
- type: usfm
  marker: q2
  children:
  - type: text
    text: senseless in a drunken stupor—tragic!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get anointing balm for her wound.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Maybe she can be cured.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “We did our best, but she can’t be helped.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Babylon is past fixing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give her up to her fate.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Go home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The judgment on her will be vast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a skyscraper-memorial of vengeance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Your Lifeline Is Cut
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has set everything right for us.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come! Let’s tell the good news
- type: usfm
  marker: q1
  children:
  - type: text
    text: Back home in Zion.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let’s tell what our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did to set things right.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: “Sharpen the arrows!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fill the quivers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has stirred up the kings of the Medes,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'infecting them with war fever: ‘Destroy Babylon!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s on the warpath.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s out to avenge his Temple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give the signal to attack Babylon’s walls.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Station guards around the clock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring in reinforcements.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Set men in ambush.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will do what he planned,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: what he said he’d do to the people of Babylon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have more water than you need,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have more money than you need—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But your life is over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your lifeline cut.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies has solemnly sworn:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’ll fill this place with soldiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll swarm through here like locusts
- type: usfm
  marker: q2
  children:
  - type: text
    text: chanting victory songs over you.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-19
  - type: text
    text: By his power he made earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His wisdom gave shape to the world.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He crafted the cosmos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He thunders and rain pours down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sends the clouds soaring.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He embellishes the storm with lightnings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: launches the wind from his warehouse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stick-god worshipers look mighty foolish!
- type: usfm
  marker: q2
  children:
  - type: text
    text: god-makers embarrassed by their handmade gods!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their gods are frauds, dead sticks—
- type: usfm
  marker: q2
  children:
  - type: text
    text: deadwood gods, tasteless jokes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re nothing but stale smoke.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the smoke clears, they’re gone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the Portion-of-Jacob is the real thing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he put the whole universe together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With special attention to Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His name? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: s1
  children:
  - type: text
    text: They’ll Sleep and Never Wake Up
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: God says, “You, Babylon, are my hammer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my weapon of war.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use you to smash godless nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use you to knock kingdoms to bits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use you to smash horse and rider,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use you to smash chariot and driver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use you to smash man and woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use you to smash the old man and the boy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use you to smash the young man and young woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use you to smash shepherd and sheep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll use you to smash farmer and yoked oxen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use you to smash governors and senators.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Judeans, you’ll see it with your own eyes. I’ll pay Babylon and all the Chaldeans back for all the evil they did in Zion.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: “I’m your enemy, Babylon, Mount Destroyer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you ravager of the whole earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll reach out, I’ll take you in my hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’ll crush you till there’s no mountain left.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll turn you into a gravel pit—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more cornerstones cut from you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more foundation stones quarried from you!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nothing left of you but gravel.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: “Raise the signal in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blow the shofar-trumpet for the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Consecrate the nations for holy work against her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Call kingdoms into service against her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Enlist Ararat, Minni, and Ashkenaz.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Appoint a field marshal against her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and round up horses, locust hordes of horses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Consecrate the nations for holy work against her—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the king of the Medes, his leaders and people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: “The very land trembles in terror, writhes in pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: terrorized by my plans against Babylon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plans to turn the country of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: into a lifeless moonscape—a wasteland.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon’s soldiers have quit fighting.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They hide out in ruins and caves—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cowards who’ve given up without a fight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: exposed as cowering crybabies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon’s houses are going up in flames,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city gates torn off their hinges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Runner after runner comes racing in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each on the heels of the last,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bringing reports to the king of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: that his city is a lost cause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fords of the rivers are all taken.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wildfire rages through the swamp grass.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soldiers desert left and right.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, said it would happen:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Daughter Babylon is a threshing floor
- type: usfm
  marker: q2
  children:
  - type: text
    text: at threshing time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soon, oh very soon, her harvest will come
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then the chaff will fly!’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-37
  - type: text
    text: “Nebuchadnezzar king of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: chewed up my people and spit out the bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wiped his dish clean, pushed back his chair,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and belched—a huge gluttonous belch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lady Zion says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘The brutality done to me be done to Babylon!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Jerusalem says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘The blood spilled from me be charged to the Chaldeans!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', step in and say,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I’m on your side, taking up your cause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m your Avenger. You’ll get your revenge.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll dry up her rivers, plug up her springs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon will be a pile of rubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scavenged by stray dogs and cats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A dumping ground for garbage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a godforsaken ghost town.’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-40
  - type: text
    text: “The Babylonians will be like lions and their cubs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ravenous, roaring for food.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll fix them a meal, all right—a banquet, in fact.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll drink themselves falling-down drunk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dead drunk, they’ll sleep—and sleep, and sleep . . . 
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and they’ll never wake up.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll haul these ‘lions’ off to the slaughterhouse
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the lambs, rams, and goats,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never to be heard of again.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-48
  - type: text
    text: “Babylon is finished—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pride of the whole earth is flat on her face.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a comedown for Babylon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to end up inglorious in the sewer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon drowned in chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: battered by waves of enemy soldiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her towns stink with decay and rot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land empty and bare and sterile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one lives in these towns anymore.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Travelers give them a wide berth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll bring doom on the glutton god-Bel in Babylon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll make him vomit up all he gulped down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more visitors stream into this place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: admiring and gawking at the wonders of Babylon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wonders of Babylon are no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Run for your lives, my dear people!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Run, and don’t look back!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get out of this place while you can,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'this place torched by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s raging anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t lose hope. Don’t ever give up
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the rumors pour in hot and heavy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One year it’s this, the next year it’s that—
- type: usfm
  marker: q2
  children:
  - type: text
    text: rumors of violence, rumors of war.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trust me, the time is coming
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I’ll put the no-gods of Babylon in their place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll show up the whole country as a sickening fraud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with dead bodies strewn all over the place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heaven and earth, angels and people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will throw a victory party over Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the avenging armies from the north
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'descend on her.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Remember '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in Your Long and Distant Exile'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-50
  - type: text
    text: “Babylon must fall—
- type: usfm
  marker: q2
  children:
  - type: text
    text: compensation for the war dead in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylonians will be killed
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all that Babylonian killing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you exiles who have escaped a Babylonian death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get out! And fast!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Remember '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in your long and distant exile.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep Jerusalem alive in your memory.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: How we’ve been humiliated, taunted and abused,
- type: usfm
  marker: q2
  children:
  - type: text
    text: kicked around for so long that we hardly know who we are!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And we hardly know what to think—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'our old Sanctuary, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s house, desecrated by strangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 52-53
  - type: text
    text: '“I know, but trust me: The time is coming”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: —
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I will bring doom on her no-god idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all over this land her wounded will groan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if Babylon climbed a ladder to the moon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pulled up the ladder so that no one could get to her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That wouldn’t stop me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’d make sure my avengers would reach her.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 54-56
  - type: text
    text: “But now listen! Do you hear it? A cry out of Babylon!
- type: usfm
  marker: q2
  children:
  - type: text
    text: An unearthly wail out of Chaldea!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is taking his wrecking bar to Babylon.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ll be hearing the last of her noise—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Death throes like the crashing of waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: death rattles like the roar of cataracts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The avenging destroyer is about to enter Babylon:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her soldiers are taken, her weapons are trashed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indeed, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is a God who evens things out.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All end up with their just deserts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: “I’ll get them drunk, the whole lot of them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: princes, sages, governors, soldiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dead drunk, they’ll sleep—and sleep and sleep . . . 
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never wake up.” The King’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His name? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies speaks:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The city walls of Babylon—those massive walls!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be flattened.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those city gates—huge gates!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be set on fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The harder you work at this empty life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the less you are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing comes of ambition like this
- type: usfm
  marker: q2
  children:
  - type: text
    text: but ashes.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Jeremiah the prophet gave a job to Seraiah son of Neriah, son of Mahseiah, when Seraiah went with Zedekiah king of Judah to Babylon. It was in the fourth year of Zedekiah’s reign. Seraiah was in charge of travel arrangements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 60-62
  - type: text
    text: 'Jeremiah had written down in a little booklet all the bad things that would come down on Babylon. He told Seraiah, “When you get to Babylon, read this out in public. Read, ‘You, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', said that you would destroy this place so that nothing could live here, neither human nor animal—a wasteland to top all wastelands, an eternal nothing.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 63-64
  - type: text
    text: “When you’ve finished reading the page, tie a stone to it, throw it into the River Euphrates, and watch it sink. Then say, ‘That’s how Babylon will sink to the bottom and stay there after the disaster I’m going to bring upon her.’”
