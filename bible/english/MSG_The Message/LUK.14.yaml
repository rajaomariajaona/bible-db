document_id: LUK.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: One time when Jesus went for a Sabbath meal with one of the top leaders of the Pharisees, all the guests had their eyes on him, watching his every move. Right before him there was a man hugely swollen in his joints. So Jesus asked the religion scholars and Pharisees present, “Is it permitted to heal on the Sabbath? Yes or no?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: “When you’re invited to dinner, go and sit at the last place. Then when the host comes he may very well say, ‘Friend, come up to the front.’ That will give the dinner guests something to talk about! What I’m saying is, If you walk around all high and mighty, you’re going to end up flat on your face. But if you’re content to be simply yourself, you will become more than yourself.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: Then he turned to the host. “The next time you put on a dinner, don’t just invite your friends and family and rich neighbors, the kind of people who will return the favor. Invite some people who never get invited out, the misfits from the wrong side of the tracks. You’ll be—and experience—a blessing. They won’t be able to return the favor, but the favor will be returned—oh, how it will be returned!—at the resurrection of God’s people.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story of the Dinner Party
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'That triggered a response from one of the guests: “How fortunate the one who gets to eat dinner in God’s kingdom!”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Jesus followed up. “Yes. For there was once a man who threw a great dinner party and invited many. When it was time for dinner, he sent out his servant to the invited guests, saying, ‘Come on in; the food’s on the table.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Then they all began to beg off, one after another making excuses. The first said, ‘I bought a piece of property and need to look it over. Send my regrets.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Another said, ‘I just bought five teams of oxen, and I really need to check them out. Send my regrets.’
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “And yet another said, ‘I just got married and need to get home to my wife.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “The servant went back and told the master what had happened. He was outraged and told the servant, ‘Quickly, get out into the city streets and alleys. Collect all who look like they need a square meal, all the misfits and homeless and down-and-out you can lay your hands on, and bring them here.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “The servant reported back, ‘Master, I did what you commanded—and there’s still room.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: “The master said, ‘Then go to the country roads. Whoever you find, drag them in. I want my house full! Let me tell you, not one of those originally invited is going to get so much as a bite at my dinner party.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Figure the Cost
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-27
    - type: text
      text: One day when large groups of people were walking along with him, Jesus turned and told them, “Anyone who comes to me but refuses to let go of father, mother, spouse, children, brothers, sisters—yes, even one’s own self!—can’t be my disciple. Anyone who won’t shoulder his own cross and follow behind me can’t be my disciple.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-30
    - type: text
      text: '“Is there anyone here who, planning to build a new house, doesn’t first sit down and figure the cost so you’ll know if you can complete it? If you only get the foundation laid and then run out of money, you’re going to look pretty foolish. Everyone passing by will poke fun at you: ‘He started something he couldn’t finish.’'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: “Or can you imagine a king going into battle against another king without first deciding whether it is possible with his ten thousand troops to face the twenty thousand troops of the other? And if he decides he can’t, won’t he send an emissary and work out a truce?
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “Simply put, if you’re not willing to take what is dearest to you, whether plans or people, and kiss it good-bye, you can’t be my disciple.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: “Salt is excellent. But if the salt goes flat, it’s useless, good for nothing.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Are you listening to this? Really listening?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: They were silent. So he took the man, healed him, and sent him on his way. Then he said, “Is there anyone here who, if a child or animal fell down a well, wouldn’t rush to pull him out immediately, not asking whether or not it was the Sabbath?” They were stumped. There was nothing they could say to that.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invite the Misfits
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: He went on to tell a story to the guests around the table. Noticing how each had tried to elbow into the place of honor, he said, “When someone invites you to dinner, don’t take the place of honor. Somebody more important than you might have been invited by the host. Then he’ll come and call out in front of everybody, ‘You’re in the wrong place. The place of honor belongs to this man.’ Embarrassed, you’ll have to make your way to the very last table, the only place left.
