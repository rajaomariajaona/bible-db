document_id: ZEC.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fourth Vision: Joshua’s New Clothes'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Next the Messenger-Angel showed me the high priest Joshua. He was standing before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Angel where the Accuser showed up to accuse him. Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to the Accuser, “I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', rebuke you, Accuser! I rebuke you and choose Jerusalem. Surprise! Everything is going up in flames, but I reach in and pull out Jerusalem!”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “‘At that time, everyone will get along with one another, with friendly visits across the fence, friendly visits on one another’s porches.’”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Joshua, standing before the angel, was dressed in dirty clothes. The angel spoke to his attendants, “Get him out of those filthy clothes,” and then said to Joshua, “Look, I’ve stripped you of your sin and dressed you up in clean clothes.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I spoke up and said, “How about a clean new turban for his head also?” And they did it—put a clean new turban on his head. Then they finished dressing him, with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Angel looking on.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Angel then charged Joshua, “Orders from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies: ‘If you live the way I tell you and remain obedient in my service, then you’ll make the decisions around here and oversee my affairs. And all my attendants standing here will be at your service.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: '“‘Careful, High Priest Joshua—both you and your friends sitting here with you, for your friends are in on this, too! Here’s what I’m doing next: I’m introducing my servant Branch. And note this: This stone that I’m placing before Joshua, a single stone with seven eyes’—Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies—‘I’ll engrave with these words: “I’ll strip this land of its filthy sin, all at once, in a single day.”'
