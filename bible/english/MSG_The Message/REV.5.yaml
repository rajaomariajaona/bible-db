document_id: REV.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lion Is a Lamb
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I saw a scroll in the right hand of the One Seated on the Throne. It was written on both sides, fastened with seven seals. I also saw a powerful Angel, calling out in a voice like thunder, “Is there anyone who can open the scroll, who can break its seals?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There was no one—no one in Heaven, no one on earth, no one from the underworld—able to break open the scroll and read it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: I wept and wept and wept that no one was found able to open the scroll, able to read it. One of the Elders said, “Don’t weep. Look—the Lion from Tribe Judah, the Root of David’s Tree, has conquered. He can open the scroll, can rip through the seven seals.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-10
  - type: text
    text: 'So I looked, and there, surrounded by Throne, Animals, and Elders, was a Lamb, slaughtered but standing tall. Seven horns he had, and seven eyes, the Seven Spirits of God sent into all the earth. He came to the One Seated on the Throne and took the scroll from his right hand. The moment he took the scroll, the Four Animals and Twenty-four Elders fell down and worshiped the Lamb. Each had a harp and each had a bowl, a gold bowl filled with incense, the prayers of God’s holy people. And they sang a new song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Worthy! Take the scroll, open its seals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Slain! Paying in blood, you bought men and women,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bought them back from all over the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bought them back for God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you made them a Kingdom, Priests for our God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Priest-kings to rule over the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: 'I looked again. I heard a company of Angels around the Throne, the Animals, and the Elders—ten thousand times ten thousand their number, thousand after thousand after thousand in full song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The slain Lamb is worthy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take the power, the wealth, the wisdom, the strength!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take the honor, the glory, the blessing!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Then I heard every creature in Heaven and earth, in underworld and sea, join in, all voices in all places, singing:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the One on the Throne! To the Lamb!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The blessing, the honor, the glory, the strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For age after age after age.
- type: usfm
  marker: m
  children:
  - type: text
    text: The Four Animals called out, “Oh, Yes!” The Elders fell to their knees and worshiped.
