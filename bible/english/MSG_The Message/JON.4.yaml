document_id: JON.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: “I Knew This Was Going to Happen!”
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Jonah was furious. He lost his temper. He yelled at '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! I knew it—when I was back home, I knew this was going to happen! That’s why I ran off to Tarshish! I knew you were sheer grace and mercy, not easily angered, rich in love, and ready at the drop of a hat to turn your plans of punishment into a program of forgiveness!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“So, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', if you won’t kill them, kill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: '! I’m better off dead!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “What do you have to be angry about?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But Jonah just left. He went out of the city to the east and sat down in a sulk. He put together a makeshift shelter of leafy branches and sat there in the shade to see what would happen to the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' arranged for a broad-leafed tree to spring up. It grew over Jonah to cool him off and get him out of his angry sulk. Jonah was pleased and enjoyed the shade. Life was looking up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'But then God sent a worm. By dawn of the next day, the worm had bored into the shade tree and it withered away. The sun came up and God sent a hot, blistering wind from the east. The sun beat down on Jonah’s head and he started to faint. He prayed to die: “I’m better off dead!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then God said to Jonah, “What right do you have to get angry about this shade tree?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Jonah said, “Plenty of right. It’s made me angry enough to die!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “What’s this? How is it that you can change your feelings from pleasure to anger overnight about a mere shade tree that you did nothing to get? You neither planted nor watered it. It grew up one night and died the next night. So, why can’t I likewise change what I feel about Nineveh from anger to pleasure, this big city of more than 120,000 childlike people who don’t yet know right from wrong, to say nothing of all the innocent animals?”'
