type_code: eng
verses:
  '1':
  - type: heading
    content: “I Knew This Was Going to Happen!”
  - type: text
    content: 'Jonah was furious. He lost his temper. He yelled at '
  - type: text
    content: God
  - type: text
    content: ', “'
  - type: text
    content: God
  - type: text
    content: '! I knew it—when I was back home, I knew this was going to happen! That’s why I ran off to Tarshish! I knew you were sheer grace and mercy, not easily angered, rich in love, and ready at the drop of a hat to turn your plans of punishment into a program of forgiveness!'
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “What’s this? How is it that you can change your feelings from pleasure to anger overnight about a mere shade tree that you did nothing to get? You neither planted nor watered it. It grew up one night and died the next night. So, why can’t I likewise change what I feel about Nineveh from anger to pleasure, this big city of more than 120,000 childlike people who don’t yet know right from wrong, to say nothing of all the innocent animals?”'
  '3':
  - type: text
    content: '“So, '
  - type: text
    content: God
  - type: text
    content: ', if you won’t kill them, kill '
  - type: text
    content: me
  - type: text
    content: '! I’m better off dead!”'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “What do you have to be angry about?”'
  '5':
  - type: text
    content: But Jonah just left. He went out of the city to the east and sat down in a sulk. He put together a makeshift shelter of leafy branches and sat there in the shade to see what would happen to the city.
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' arranged for a broad-leafed tree to spring up. It grew over Jonah to cool him off and get him out of his angry sulk. Jonah was pleased and enjoyed the shade. Life was looking up.'
  '7':
  - type: text
    content: 'But then God sent a worm. By dawn of the next day, the worm had bored into the shade tree and it withered away. The sun came up and God sent a hot, blistering wind from the east. The sun beat down on Jonah’s head and he started to faint. He prayed to die: “I’m better off dead!”'
  '9':
  - type: text
    content: Then God said to Jonah, “What right do you have to get angry about this shade tree?”
  - type: text
    content: Jonah said, “Plenty of right. It’s made me angry enough to die!”
