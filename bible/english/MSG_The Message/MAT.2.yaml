document_id: MAT.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Scholars from the East
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: After Jesus was born in Bethlehem village, Judah territory—this was during Herod’s kingship—a band of scholars arrived in Jerusalem from the East. They asked around, “Where can we find and pay homage to the newborn King of the Jews? We observed a star in the eastern sky that signaled his birth. We’re on pilgrimage to worship him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: When word of their inquiry got to Herod, he was terrified—and not Herod alone, but most of Jerusalem as well. Herod lost no time. He gathered all the high priests and religion scholars in the city together and asked, “Where is the Messiah supposed to be born?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'They told him, “Bethlehem, Judah territory. The prophet Micah wrote it plainly:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s you, Bethlehem, in Judah’s land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer bringing up the rear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From you will come the leader
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will shepherd-rule my people, my Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Herod then arranged a secret meeting with the scholars from the East. Pretending to be as devout as they were, he got them to tell him exactly when the birth-announcement star appeared. Then he told them the prophecy about Bethlehem, and said, “Go find this child. Leave no stone unturned. As soon as you find him, send word and I’ll join you at once in your worship.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Instructed by the king, they set off. Then the star appeared again, the same star they had seen in the eastern skies. It led them on until it hovered over the place of the child. They could hardly contain themselves: They were in the right place! They had arrived at the right time!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They entered the house and saw the child in the arms of Mary, his mother. Overcome, they kneeled and worshiped him. Then they opened their luggage and presented gifts: gold, frankincense, myrrh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: In a dream, they were warned not to report back to Herod. So they worked out another route, left the territory without being seen, and returned to their own country.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: After the scholars were gone, God’s angel showed up again in Joseph’s dream and commanded, “Get up. Take the child and his mother and flee to Egypt. Stay until further notice. Herod is on the hunt for this child, and wants to kill him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'Joseph obeyed. He got up, took the child and his mother under cover of darkness. They were out of town and well on their way by daylight. They lived in Egypt until Herod’s death. This Egyptian exile fulfilled what Hosea had preached: “I called my son out of Egypt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'Herod, when he realized that the scholars had tricked him, flew into a rage. He commanded the murder of every little boy two years old and under who lived in Bethlehem and its surrounding hills. (He determined that age from information he’d gotten from the scholars.) That’s when Jeremiah’s revelation was fulfilled:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A sound was heard in Ramah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weeping and much lament.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rachel weeping for her children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rachel refusing all solace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her children gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dead and buried.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'Later, when Herod died, God’s angel appeared in a dream to Joseph in Egypt: “Up, take the child and his mother and return to Israel. All those out to murder the child are dead.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: Joseph obeyed. He got up, took the child and his mother, and reentered Israel. When he heard, though, that Archelaus had succeeded his father, Herod, as king in Judea, he was afraid to go there. But then Joseph was directed in a dream to go to the hills of Galilee. On arrival, he settled in the village of Nazareth. This move was a fulfillment of the prophetic words, “He shall be called a Nazarene.”
