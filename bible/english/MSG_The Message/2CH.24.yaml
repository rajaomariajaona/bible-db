document_id: 2CH.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: King Joash
  - type: text
    content: Joash was seven years old when he became king; he was king for forty years in Jerusalem. His mother’s name was Gazelle (Zibiah). She was from Beersheba.
  '10':
  - type: text
    content: The people and their leaders were glad to do it and cheerfully brought their money until the chest was full.
  '11':
  - type: text
    content: ' Whenever the Levites brought the chest in for a royal audit and found it to be full, the king’s secretary and the official of the chief priest would empty the chest and put it back in its place. Day after day they did this and collected a lot of money. The king and Jehoiada gave the money to the managers of The Temple project; they in turn paid the masons and carpenters for the repair work on The Temple of '
  - type: text
    content: God
  - type: text
    content: '. The construction workers kept at their jobs steadily until the restoration was complete—the house of '
  - type: text
    content: God
  - type: text
    content: ' as good as new! When they had finished the work, they returned the surplus money to the king and Jehoiada, who used the money for making sacred vessels for Temple worship, vessels for the daily worship, for the Whole-Burnt-Offerings, bowls, and other gold and silver liturgical artifacts.'
  '14':
  - type: text
    content: ' Whole-Burnt-Offerings were made regularly in The Temple of '
  - type: text
    content: God
  - type: text
    content: ' throughout Jehoiada’s lifetime. He died at a ripe old age—130 years old! They buried him in the royal cemetery because he had such a distinguished life of service to Israel and God and God’s Temple.'
  '17':
  - type: text
    content: 'But after the death of Jehoiada things fell apart. The leaders of Judah made a formal presentation to the king and he went along with them. Things went from bad to worse; they deserted The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and took up with the cult of sex goddesses. An angry cloud hovered over Judah and Jerusalem because of this sin. '
  - type: text
    content: God
  - type: text
    content: ' sent prophets to straighten them out, warning of judgment. But nobody paid attention.'
  '2':
  - type: text
    content: 'Taught and trained by Jehoiada the priest, Joash did what pleased '
  - type: text
    content: God
  - type: text
    content: ' throughout Jehoiada’s lifetime. Jehoiada picked out two wives for him; he had a family of both sons and daughters.'
  '20':
  - type: text
    content: 'Then the Spirit of God moved Zechariah son of Jehoiada the priest to speak up: “God’s word: Why have you deliberately walked away from '
  - type: text
    content: God
  - type: text
    content: '’s commandments? You can’t live this way! If you walk out on '
  - type: text
    content: God
  - type: text
    content: ', he’ll walk out on you.”'
  '21':
  - type: text
    content: 'But they worked out a plot against Zechariah, and with the complicity of the king—he actually gave the order!—they murdered him, pelting him with rocks, right in the court of The Temple of '
  - type: text
    content: God
  - type: text
    content: '. That’s the thanks King Joash showed the loyal Jehoiada, the priest who had made him king. He murdered Jehoiada’s son. Zechariah’s last words were, “Look, '
  - type: text
    content: God
  - type: text
    content: '! Make them pay for this!”'
  '23':
  - type: text
    content: 'A year or so later Aramean troops attacked Joash. They invaded Judah and Jerusalem, massacred the leaders, and shipped all their plunder back to the king in Damascus. The Aramean army was quite small, but '
  - type: text
    content: God
  - type: text
    content: ' used them to wipe out Joash’s large army—their punishment for deserting '
  - type: text
    content: God
  - type: text
    content: ', the God of their ancestors. Arameans implemented God’s judgment against Joash.'
  '25':
  - type: text
    content: They left Joash badly wounded and his own servants finished him off—it was a palace conspiracy, avenging the murder of the son of Jehoiada the priest. They killed him in his bed. Afterward they buried him in the City of David, but he was not honored with a grave in the royal cemetery. The temple conspirators were Zabad, whose mother was Shimeath from Ammon, and Jehozabad, whose mother was Shimrith from Moab. The story of his sons, the many sermons preached to Joash, and the account of his repairs on The Temple of God can be found contained in the commentary on the royal history.
  - type: text
    content: Amaziah, Joash’s son, was the next king.
  '4':
  - type: text
    content: 'The time came when Joash determined to renovate The Temple of '
  - type: text
    content: God
  - type: text
    content: . He got the priests and Levites together and said, “Circulate through the towns of Judah every year and collect money from the people to repair The Temple of your God. You are in charge of carrying this out.” But the Levites dragged their feet and didn’t do anything.
  '7':
  - type: text
    content: 'Then the king called in Jehoiada the chief priest and said, “Why haven’t you made the Levites bring in from Judah and Jerusalem the tax Moses, servant of '
  - type: text
    content: God
  - type: text
    content: ' and the congregation, set for the upkeep of the place of worship? You can see how bad things are—wicked Queen Athaliah and her sons let The Temple of God go to ruin and took all its sacred artifacts for use in Baal worship.”'
  '8':
  - type: text
    content: 'Following the king’s orders, they made a chest and placed it at the entrance to The Temple of '
  - type: text
    content: God
  - type: text
    content: '. Then they sent out a tax notice throughout Judah and Jerusalem: “Pay the tax that Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' set when Israel was in the wilderness.”'
