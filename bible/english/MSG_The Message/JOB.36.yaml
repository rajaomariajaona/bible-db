document_id: JOB.36,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Those Who Learn from Their Suffering
  - type: text
    content: 'Here Elihu took a deep breath, but kept going:'
  - type: text
    content: “Stay with me a little longer. I’ll convince you.
  - type: text
    content: There’s still more to be said on God’s side.
  - type: text
    content: I learned all this firsthand from the Source;
  - type: text
    content: everything I know about justice I owe to my Maker himself.
  - type: text
    content: Trust me, I’m giving you undiluted truth;
  - type: text
    content: believe me, I know these things inside and out.
  '16':
  - type: text
    content: “Oh, Job, don’t you see how God’s wooing you
  - type: text
    content: from the jaws of danger?
  - type: text
    content: How he’s drawing you into wide-open places—
  - type: text
    content: inviting you to feast at a table laden with blessings?
  - type: text
    content: And here you are laden with the guilt of the wicked,
  - type: text
    content: 'obsessed with putting the blame on '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Don’t let your great riches mislead you;
  - type: text
    content: don’t think you can bribe your way out of this.
  - type: text
    content: Did you plan to buy your way out of this?
  - type: text
    content: Not on your life!
  - type: text
    content: And don’t think that night,
  - type: text
    content: when people sleep off their troubles,
  - type: text
    content: will bring you any relief.
  - type: text
    content: Above all, don’t make things worse with more evil—
  - type: text
    content: that’s what’s behind your suffering as it is!
  '22':
  - type: text
    content: “Do you have any idea how powerful God is?
  - type: text
    content: Have you ever heard of a teacher like him?
  - type: text
    content: Has anyone ever had to tell him what to do,
  - type: text
    content: or correct him, saying, ‘You did that all wrong!’?
  - type: text
    content: Remember, then, to praise his workmanship,
  - type: text
    content: which is so often celebrated in song.
  - type: text
    content: Everybody sees it;
  - type: text
    content: nobody is too far away to see it.
  - type: heading
    content: No One Can Escape from God
  '26':
  - type: text
    content: “Take a long, hard look. See how great he is—infinite,
  - type: text
    content: greater than anything you could ever imagine or figure out!
  '27':
  - type: text
    content: “He pulls water up out of the sea,
  - type: text
    content: distills it, and fills up his rain-cloud cisterns.
  - type: text
    content: Then the skies open up
  - type: text
    content: and pour out soaking showers on everyone.
  - type: text
    content: Does anyone have the slightest idea how this happens?
  - type: text
    content: How he arranges the clouds, how he speaks in thunder?
  - type: text
    content: Just look at that lightning, his sky-filling light show
  - type: text
    content: illumining the dark depths of the sea!
  - type: text
    content: These are the symbols of his sovereignty,
  - type: text
    content: his generosity, his loving care.
  - type: text
    content: He hurls arrows of light,
  - type: text
    content: taking sure and accurate aim.
  - type: text
    content: The High God roars in the thunder,
  - type: text
    content: angry against evil.”
  '5':
  - type: text
    content: “It’s true that God is all-powerful,
  - type: text
    content: but he doesn’t bully innocent people.
  - type: text
    content: For the wicked, though, it’s a different story—
  - type: text
    content: he doesn’t give them the time of day,
  - type: text
    content: but champions the rights of their victims.
  - type: text
    content: He never takes his eyes off the righteous;
  - type: text
    content: he honors them lavishly, promotes them endlessly.
  - type: text
    content: When things go badly,
  - type: text
    content: when affliction and suffering descend,
  - type: text
    content: God tells them where they’ve gone wrong,
  - type: text
    content: shows them how their pride has caused their trouble.
  - type: text
    content: He forces them to heed his warning,
  - type: text
    content: tells them they must repent of their bad life.
  - type: text
    content: If they obey and serve him,
  - type: text
    content: they’ll have a good, long life on easy street.
  - type: text
    content: But if they disobey, they’ll be cut down in their prime
  - type: text
    content: and never know the first thing about life.
  - type: text
    content: Angry people without God pile grievance upon grievance,
  - type: text
    content: always blaming others for their troubles.
  - type: text
    content: Living it up in sexual excesses,
  - type: text
    content: virility wasted, they die young.
  - type: text
    content: But those who learn from their suffering,
  - type: text
    content: God delivers from their suffering.
  - type: heading
    content: Obsessed with Putting the Blame on God
